Name:
  ExpectColumnMeanToBeBetween
URL:
  https://greatexpectations.io/expectations/expect_column_mean_to_be_between/
Description:
  Expect the column mean to be between a minimum value and a maximum value (inclusive).   ExpectColumnMeanToBeBetween is a Column Aggregate Expectation.   Column Aggregate Expectations are one of the most common types of Expectation.   They are evaluated for a single column, and produce an aggregate Metric, such as a mean, standard deviation, number of unique values, column type, etc.   If that Metric meets the conditions you set, the Expectation considers that data valid.
Args:
  - column:
      type: str
      description: The column name.
  - min_value:
      type: float or None
      description: The minimum value for the column mean.
  - max_value:
      type: float or None
      description: The maximum value for the column mean.
  - strict_min:
      type: boolean
      description: If True, the column mean must be strictly larger than min_value, default=False
  - strict_max:
      type: boolean
      description: If True, the column mean must be strictly smaller than max_value, default=False
Examples:
  Sample data:
    - column: "test"
      value_set: [ 1, 1.3, .8, 2 ]
    - column: "test2"
      value_set: [ 1, 7, 2.5, 3 ]
  Passing case:
    'ExpectColumnMeanToBeBetween(column="test",min_value=1,max_value=3)'
  Failing case:
    'ExpectColumnMeanToBeBetween(column="test2",min_value=1,max_value=3)'
Other Parameters:
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Notes:
  - min_value and max_value are both inclusive unless strict_min or strict_max are set to True.
  - If min_value is None, then max_value is treated as an upper bound.
  - If max_value is None, then min_value is treated as a lower bound.
  - observed_value field in the result object is customized for this expectation to be a float representing the true mean for the column.
Data quality issues:
  Numeric
Related Expectations:
  - ExpectColumnMedianToBeBetween
  - ExpectColumnStdevToBeBetween
