Name:
  ExpectColumnValueZScoresToBeLessThan
URL:
  https://greatexpectations.io/expectations/expect_column_value_z_scores_to_be_less_than/
Description:
  Expect the column entries to be strings with length equal to the provided value. This expectation only works for string-type values. Invoking it on ints or floats will raise a TypeError. ExpectColumnValueLengthsToEqual is a Column Map Expectation. Column Map Expectations are one of the most common types of Expectation. They are evaluated for a single column and ask a yes/no question for every row in that column. Based on the result, they then calculate the percentage of rows that gave a positive answer. If the percentage is high enough, the Expectation considers that data valid.
Args:
  - column:
      type: str
      description: The column name.
  - threshold:
      type: number
      description: A maximum Z-score threshold. All column Z-scores that are lower than this threshold will evaluate successfully.
  - double_sided:
      type: boolean
      description: A True or False value indicating whether to evaluate double sidedly.
Examples:
  Sample data:
    - column: "test"
      value_set: [ 1, 1, 1, 3, 3 ]
    - column: "test2"
      value_set: [ -100000000000, -1, 0, 1, 1 ]
  Passing case:
    'ExpectColumnValueZScoresToBeLessThan(column="test",threshold=1.96,double_sided=True)'
  Failing case:
    'ExpectColumnValueZScoresToBeLessThan(column="test2",threshold=1,double_sided=True)'
Other Parameters:
  - mostly:
      type: None or a float between 0 and 1
      description: Successful if at least `mostly` fraction of values match the expectation. Default 1.
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Notes:
  - 'Example: (double_sided = True, threshold = 2) -> Z scores in non-inclusive interval(-2,2) | (double_sided = False, threshold = 2) -> Z scores in non-inclusive interval (-infinity,2)'
Data quality issues:
  Numeric
Related Expectations:
  - ExpectColumnValueLengthsToBeBetween