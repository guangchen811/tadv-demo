Name:
  ExpectColumnValuesToMatchLikePattern
URL:
  https://greatexpectations.io/expectations/expect_column_values_to_match_like_pattern/
Description:
  Expect the column entries to be strings that match a given like pattern expression. ExpectColumnValuesToMatchLikePattern is a Column Map Expectation. Column Map Expectations are one of the most common types of Expectation. They are evaluated for a single column and ask a yes/no question for every row in that column. Based on the result, they then calculate the percentage of rows that gave a positive answer. If the percentage is high enough, the Expectation considers that data valid.
Args:
  - column:
      type: str
      description: The column name.
  - like_pattern:
      type: str
      description: The SQL like pattern expression the column entries should match.
Examples:
  Sample data:
    - column: "test"
      value_set: [ "aaa", "bbb", "acc" ]
    - column: "test2"
      value_set: [ "ade", "bee", "24601" ]
  Passing case:
    'ExpectColumnValuesToMatchLikePattern(column="test",like_pattern="[a]%")'
  Failing case:
    'ExpectColumnValuesToMatchLikePattern(column="test2",like_pattern="[a]%")'
Other Parameters:
  - mostly:
      type: None or a float between 0 and 1
      description: Successful if at least `mostly` fraction of values match the expectation. Default 1.
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Notes:
  None
Data quality issues:
  Validity
