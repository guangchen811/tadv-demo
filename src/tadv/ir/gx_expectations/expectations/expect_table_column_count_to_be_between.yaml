Name:
  ExpectTableColumnCountToBeBetween
URL:
  https://greatexpectations.io/expectations/expect_table_column_count_to_be_between/
Description:
  Expect the number of columns in a table to be between two values. ExpectTableColumnCountToBeBetween is a Batch Expectation. BatchExpectations are one of the most common types of Expectation. They are evaluated for an entire Batch, and answer a semantic question about the Batch itself.
Args:
  - min_value:
      type: int or None
      description: The minimum number of columns, inclusive.
  - max_value:
      type: int or None
      description: The maximum number of columns, inclusive.
Examples:
  Sample data:
    - column: "test"
      value_set: [ 1.00, 2.30, 4.33 ]
    - column: "test2"
      value_set: [ 2, 5, 0 ]
  Passing case:
    'ExpectTableColumnCountToBeBetween(min_value=1,max_value=3)'
  Failing case:
    'ExpectTableColumnCountToBeBetween(min_value=3)'
Other Parameters:
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Notes:
  None
Data quality issues:
  Schema
