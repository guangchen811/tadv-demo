Name:
  ExpectTableColumnsToMatchSet
URL:
  https://greatexpectations.io/expectations/expect_table_columns_to_match_set/
Description:
  Expect the columns in a table to match an unordered set. ExpectTableColumnsToMatchSet is a Batch Expectation. BatchExpectations are one of the most common types of Expectation. They are evaluated for an entire Batch, and answer a semantic question about the Batch itself.
Args:
  - column_set:
      type: list of str
      description: The column names, in any order.
  - exact_match:
      type: boolean
      description: If True, the list of columns must exactly match the observed columns. If False, observed columns must include column_set but additional columns will pass. Default True.
Examples:
  Sample data:
    - column: "test"
      value_set: [ 1.00, 2.33, 4.33 ]
    - column: "test2"
      value_set: [ 2, 5, 0 ]
  Passing case:
    'ExpectTableColumnsToMatchSet(column_set=["test"],exact_match=False)'
  Failing case:
    'ExpectTableColumnsToMatchSet(column_set=["test2", "test3"],exact_match=True)'
Other Parameters:
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Notes:
  None
