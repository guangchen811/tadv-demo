Name:
  ExpectColumnUniqueValueCountToBeBetween
URL:
  https://greatexpectations.io/expectations/expect_column_unique_value_count_to_be_between/
Description:
  Expect the number of unique values to be between a minimum value and a maximum value. ExpectColumnUniqueValueCountToBeBetween is a Column Aggregate Expectation. Column Aggregate Expectations are one of the most common types of Expectation. They are evaluated for a single column, and produce an aggregate Metric, such as a mean, standard deviation, number of unique values, column type, etc. If that Metric meets the conditions you set, the Expectation considers that data valid.
Args:
  - column:
      type: str
      description: The column name.
  - min_value:
      type: int or None
      description: The minimal number of unique values allowed.
  - max_value:
      type: int or None
      description: The maximal number of unique values allowed.
  - strict_min:
      type: boolean
      description: If True, the column must have strictly more unique value count than min_value.
  - strict_max:
      type: boolean
      description: If True, the column must have strictly less unique value count than max_value.
Examples:
  Sample data:
    - column: "test"
      value_set: [ "aaa", "abb", "acc", "aaa" ]
    - column: "test2"
      value_set: [ 1, 1, 1, 3 ]
  Passing case:
    'ExpectColumnUniqueValueCountToBeBetween(column="test",min_value=2,max_value=4)'
  Failing case:
    'ExpectColumnUniqueValueCountToBeBetween(column="test2",min_value=3,max_value=5)'
Other Parameters:
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Notes:
  - min_value and max_value are both inclusive.
  - If min_value is None, then max_value is treated as an upper bound
  - If max_value is None, then min_value is treated as a lower bound
  - observed_value field in the result object is customized for this expectation to be an int representing the number of unique values the column
Data quality issues:
  Uniqueness
Related Expectations:
  - ExpectColumnProportionOfUniqueValuesToBeBetween