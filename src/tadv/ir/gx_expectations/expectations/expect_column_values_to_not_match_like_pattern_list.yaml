Name:
  ExpectColumnValuesToNotMatchLikePatternList
URL:
  https://greatexpectations.io/expectations/expect_column_values_to_not_match_like_pattern_list/
Description:
  Expect the column entries to be strings that do NOT match any of a provided list of like pattern expressions. ExpectColumnValuesToNotMatchLikePatternList is a Column Map Expectation. Column Map Expectations are one of the most common types of Expectation. They are evaluated for a single column and ask a yes/no question for every row in that column. Based on the result, they then calculate the percentage of rows that gave a positive answer. If the percentage is high enough, the Expectation considers that data valid.
Args:
  - column:
      type: str
      description: The column name.
  - like_pattern_list:
      type: List[str]
      description: The list of SQL like pattern expressions the column entries should NOT match.
Examples:
  Sample data:
    - column: "test"
      value_set: [ "aaa", "abb", "acc" ]
    - column: "test2"
      value_set: [ "ade", "adb", "aaa" ]
  Passing case:
    'ExpectColumnValuesToNotMatchLikePatternList(column="test2",like_pattern_list=["[aa]%", "[ab]%", "[ac]%"],mostly=.66)'
  Failing case:
    'ExpectColumnValuesToNotMatchLikePatternList(column="test",like_pattern_list=["[aa]%", "[ab]%", "[ac]%"],)'
Other Parameters:
  - mostly:
      type: None or a float between 0 and 1
      description: Successful if at least `mostly` fraction of values match the expectation. Default 1.
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Notes:
  None
Data quality issues:
