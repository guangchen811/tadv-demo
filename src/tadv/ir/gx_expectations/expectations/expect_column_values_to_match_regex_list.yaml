Name:
  ExpectColumnValuesToMatchRegexList
URL:
  https://greatexpectations.io/expectations/expect_column_values_to_match_regex_list/
Description:
  Expect the column entries to be strings that can be matched to either any of or all of a list of regular expressions. Matches can be anywhere in the string. ExpectColumnValuesToMatchRegexList is a Column Map Expectation. Column Map Expectations are one of the most common types of Expectation. They are evaluated for a single column and ask a yes/no question for every row in that column. Based on the result, they then calculate the percentage of rows that gave a positive answer. If the percentage is high enough, the Expectation considers that data valid.
Args:
  - column:
      type: str
      description: The column name.
  - regex_list:
      type: list
      description: The list of regular expressions which the column entries should match.
  - match_on:
      type: string
      description: "'any' or 'all'. Use 'any' if the value should match at least one regular expression in the list. Use 'all' if it should match each regular expression in the list."
Examples:
  Sample data:
    - column: "test"
      value_set: [ "aaa", "abb", "acc" ]
    - column: "test2"
      value_set: [ "bcc", "bdd", "abc" ]
  Passing case:
    'ExpectColumnValuesToMatchRegexList(column="test2",regex_list=["^a.*", "^b.*"],match_on="any")'
  Failing case:
    'ExpectColumnValuesToMatchRegexList(column="test",regex_list=["^a.*", "^b.*"],match_on="all")'
Other Parameters:
  - mostly:
      type: None or a float between 0 and 1
      description: Successful if at least `mostly` fraction of values match the expectation. Default 1.
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Notes:
  None
Data quality issues:
  Validity
