Name:
  ExpectColumnDistinctValuesToEqualSet
URL:
  https://greatexpectations.io/expectations/expect_column_distinct_values_to_equal_set/
Description:
  Expect the set of distinct column values to equal a given set. ExpectColumnDistinctValuesToEqualSet is a Column Aggregate Expectation. Column Aggregate Expectations are one of the most common types of Expectation. They are evaluated for a single column, and produce an aggregate Metric, such as a mean, standard deviation, number of unique values, column type, etc. If that Metric meets the conditions you set, the Expectation considers that data valid.
Args:
  - column:
      type: str
      description: The column name.
  - value_set:
      type: set-like
      description: A set of objects used for comparison.
Examples:
  Sample data:
    - column: "test"
      value_set: [ 1, 2, 4 ]
    - column: "test2"
      value_set: [ 1, 1, 1 ]
  Passing case:
    ExpectColumnDistinctValuesToEqualSet(column="test",value_set=[1, 2, 4])
  Failing case:
    ExpectColumnDistinctValuesToEqualSet(column="test2",value_set=[3, 2, 4])
Other Parameters:
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Data quality issues:
  Uniqueness
Related Expectations:
  - ExpectColumnDistinctValuesToBeInSet
  - ExpectColumnDistinctValuesToContainSet
