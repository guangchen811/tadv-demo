Name:
  ExpectColumnMostCommonValueToBeInSet
URL:
  https://greatexpectations.io/expectations/expect_column_most_common_value_to_be_in_set/
Description:
  Expect the most common value to be within the designated value set. ExpectColumnMostCommonValueToBeInSet is a Column Aggregate Expectation. Column Aggregate Expectations are one of the most common types of Expectation. They are evaluated for a single column, and produce an aggregate Metric, such as a mean, standard deviation, number of unique values, column type, etc. If that Metric meets the conditions you set, the Expectation considers that data valid.
Args:
  - column:
      type: str
      description: The column name.
  - value_set:
      type: set-like
      description: A list of potential values to match.
  - ties_okay:
      type: boolean or None
      description: If True, then the expectation will still succeed if values outside the designated set are as common (but not more common) than designated values. Default False.
Examples:
  Sample data:
    - column: "test"
      value_set: [ 1, 2, 4 ]
    - column: "test2"
      value_set: [ 1, 1, 1 ]
  Passing case:
    'ExpectColumnMostCommonValueToBeInSet(column="test2",value_set=[1, 2, 4],ties_okay=True)'
  Failing case:
    'ExpectColumnMostCommonValueToBeInSet(column="test",value_set=[1, 2, 4])'
Other Parameters:
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Notes:
  - observed_value field in the result object is customized for this expectation to be a list representing the most common values in the column, which is often a single element... if there is a tie for most common among multiple values, observed_value will contain a single copy of each most common value
Data quality issues:
  Validity
Related Expectations:
