Name:
  ExpectColumnKLDivergenceToBeLessThan
URL:
  https://greatexpectations.io/expectations/expect_column_kl_divergence_to_be_less_than/
Description:
  "Expect the Kulback-Leibler (KL) divergence (relative entropy) of the specified column with respect to the partition object to be lower than the provided threshold. KL divergence compares two distributions. The higher the divergence value (relative entropy), the larger the difference between the two distributions. A relative entropy of zero indicates that the data are distributed identically, when binned according to the provided partition. In many practical contexts, choosing a value between 0.5 and 1 will provide a useful test. This expectation works on both categorical and continuous partitions. See notes below for details. ExpectColumnKlDivergenceToBeLessThan is a Column Aggregate Expectation. Column Aggregate Expectations are one of the most common types of Expectation. They are evaluated for a single column, and produce an aggregate Metric, such as a mean, standard deviation, number of unique values, column type, etc. If that Metric meets the conditions you set, the Expectation considers that data valid."
Args:
  - column:
      type: str
      description: The column name.
  - partition_object:
      type: dict or None
      description: The expected partition object.
  - threshold:
      type: float or None
      description: The maximum KL divergence to for which to return success=True. If KL divergence is larger than the provided threshold, the test will return success=False.
  - internal_weight_holdout:
      type: float between 0 and 1 or None
      description: The amount of weight to split uniformly among zero-weighted partition bins. internal_weight_holdout provides a mechanisms to make the test less strict by assigning positive weights to values observed in the data for which the partition explicitly expected zero weight. With no internal_weight_holdout, any value observed in such a region will cause KL divergence to rise to +Infinity. Defaults to 0.
  - tail_weight_holdout:
      type: float between 0 and 1 or None
      description: The amount of weight to add to the tails of the histogram.Tail weight holdout is split evenly between (-Infinity, min(partition_object['bins'])) and (max(partition_object['bins']), +Infinity). tail_weight_holdout provides a mechanism to make the test less strict by assigning positive weights to values observed in the data that are not present in the partition. With no tail_weight_holdout, any value observed outside the provided partition_object will cause KL divergence to rise to +Infinity. Defaults to 0.
  - bucketize_data:
      type: boolean
      description: If True, then continuous data will be bucketized before evaluation. Setting this parameter to false allows evaluation of KL divergence with a None partition object for profiling against discrete data.
  - min_value:
      type: float or None
      description: The minimum value for the column.
  - max_value:
      type: float or None
      description: The maximum value for the column.

Examples:
  Sample data:
    - column: "test"
      value_set: [ "A", "A", "A", "A", "A", "B", "B", "B", "C", "C" ]
  Passing case:
    'ExpectColumnKLDivergenceToBeLessThan(column="test",partition_object={"weights": [ 0.5, 0.3, 0.2 ], "values": [ "A", "B", "C" ] },threshold=0.1)'
  Failing case:
    'ExpectColumnKLDivergenceToBeLessThan(column="test",partition_object={"weights": [ 0.3333333333333333, 0.3333333333333333, 0.3333333333333333 ], "values": [ "A", "B", "C" ] },threshold=0.01)'
Other Parameters:
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Notes:
  - observed_value field in the result object is customized for this expectation to be a float representing the true KL divergence (relative entropy) or None if the value is calculated as infinity, -infinity, or NaN
  - details.observed_partition in the result object is customized for this expectation to be a dict representing the partition observed in the data
  - details.expected_partition in the result object is customized for this expectation to be a dict representing the partition against which the data were compared, after applying specified weight holdouts
Data quality issues:
  Numeric
Related Expectations:
