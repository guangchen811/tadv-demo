Name:
  ExpectColumnValueLengthsToBeBetween
URL:
  https://greatexpectations.io/expectations/expect_column_value_lengths_to_be_between/
Description:
  Expect the column entries to be strings with length between a minimum value and a maximum value (inclusive). This expectation only works for string-type values. Invoking it on ints or floats will raise a TypeError. ExpectColumnValueLengthsToBeBetween is a Column Map Expectation. Column Map Expectations are one of the most common types of Expectation. They are evaluated for a single column and ask a yes/no question for every row in that column. Based on the result, they then calculate the percentage of rows that gave a positive answer. If the percentage is high enough, the Expectation considers that data valid.
Args:
  - column:
      type: str
      description: The column name.
  - min_value:
      type: int or None
      description: The minimal number of unique values allowed.
  - max_value:
      type: int or None
      description: The maximal number of unique values allowed.
  - strict_min:
      type: boolean
      description: If True, the column must have strictly more unique value count than min_value.
  - strict_max:
      type: boolean
      description: If True, the column must have strictly less unique value count than max_value.
Examples:
  Sample data:
    - column: "test"
      value_set: [ "12345", "abcde", "1b3d5" ]
    - column: "test2"
      value_set: [ "A", "13579", "24680" ]
  Passing case:
    'ExpectColumnValueLengthsToBeBetween(column="test2",min_value=1,max_value=5)'
  Failing case:
    'ExpectColumnValueLengthsToBeBetween(column="test",min_value=5,max_value=5,strict_min=True,strict_max=True)'
Other Parameters:
  - mostly:
      type: None or a float between 0 and 1
      description: Successful if at least `mostly` fraction of values match the expectation. Default 1.
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Notes:
  - min_value and max_value are both inclusive.
  - If min_value is None, then max_value is treated as an upper bound, and the number of acceptable rows has no minimum.
  - If max_value is None, then min_value is treated as a lower bound, and the number of acceptable rows has no maximum.
Data quality issues:
  Validity
