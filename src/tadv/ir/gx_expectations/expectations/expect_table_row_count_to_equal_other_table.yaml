Name:
  ExpectTableRowCountToEqualOtherTable
URL:
  https://greatexpectations.io/expectations/expect_table_row_count_to_equal_other_table/
Description:
  Expect the number of rows to equal the number in another table within the same database. ExpectTableRowCountToEqualOtherTable is a Batch Expectation. BatchExpectations are one of the most common types of Expectation. They are evaluated for an entire Batch, and answer a semantic question about the Batch itself.
Args:
  - other_table_name:
      type: str
      description: The name of the other table. Other table must be located within the same database.
Examples:
  Sample data:
    - column: "test"
      value_set: [ 1.00, 2.33, 4.33 ]
    - column: "test2"
      value_set: [ 2, 5, 0 ]
  Passing case:
    'ExpectTableRowCountToEqualOtherTable(other_table_name=test_table_two)'
  Failing case:
    'ExpectTableRowCountToEqualOtherTable(other_table_name=test_table_three)'
Other Parameters:
  - result_format:
      type: str or None
      description: Which output mode to use, BOOLEAN_ONLY, BASIC, COMPLETE, or SUMMARY.
  - catch_exceptions:
      type: boolean or None
      description: If True, then catch exceptions and include them as part of the result object.
  - meta:
      type: dict or None
      description: A JSON-serializable dictionary (nesting allowed) that will be included in the output without modification.
Notes:
  None
Data quality issues:
  Volume
Related Expectations:
  - ExpectTableRowCountToBeBetween
  - ExpectTableRowCountToEqual