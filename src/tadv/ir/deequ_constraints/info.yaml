hasSize:
  description: |
    Validates the total number of rows in the dataframe. The assertion is a lambda function that receives the row count as input and returns a boolean indicating whether the size meets the expectation.
  example: ".hasSize(lambda x: x >= 1000)"
  required:
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: false
isComplete:
  description: |
    Validates that a column contains no null values. A column is considered complete if all rows have non-null values.
  example: ".isComplete('student_id')"
  required:
    - column
  optional: null
  canUseSatisfies: true
  canBeUsedForMultipleColumns: false
hasCompleteness:
  description: |
    Validates the completeness fraction of a column. Completeness is the ratio of non-null values to total rows. The assertion lambda receives the completeness fraction (0.0 to 1.0) and returns a boolean indicating if it meets the threshold.
  example: ".hasCompleteness('credits_attempted', lambda x: x >= 0.95)"
  required:
    - column
    - assertion
  optional: null
  canUseSatisfies: true
  canBeUsedForMultipleColumns: false
areComplete:
  description: |
    Validates that all columns in a set are complete (contain no null values). All specified columns must have non-null values in every row.
  example: ".areComplete(['student_id', 'target'])"
  required:
    - columns
  optional: null
  canUseSatisfies: true
  forMultipleColumns: true
haveCompleteness:
  description: |
    Validates the completeness fraction across a set of columns. The assertion lambda receives the completeness fraction and returns a boolean indicating if it meets the threshold.
  example: ".haveCompleteness(['credits_attempted', 'credits_completed'], lambda x: x >= 0.95)"
  required:
    - columns
    - assertion
  optional: null
  canUseSatisfies: true
  canBeUsedForMultipleColumns: true
areAnyComplete:
  description: |
    Validates that at least one column in a set is complete (contains no null values). At least one of the specified columns must have non-null values in every row.
  example: ".areAnyComplete(['student_id', 'target'])"
  required:
    - columns
  optional: null
  canUseSatisfies: true
  canBeUsedForMultipleColumns: true
haveAnyCompleteness:
  description: |
    Validates that at least one column in a set meets the specified completeness threshold. The assertion lambda receives the completeness fraction and returns a boolean indicating if at least one column meets the threshold.
  example: ".haveAnyCompleteness(['credits_attempted', 'credits_completed'], lambda x: x >= 0.95)"
  required:
    - columns
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: true
isUnique:
  description: |
    Validates that a column contains only unique values with no duplicates. Every value in the column must appear exactly once.
  example: ".isUnique('student_id')"
  required:
    - column
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: false
hasUniqueness:
  description: |
    Validates the uniqueness fraction of a single column or combined set of columns. Uniqueness is the ratio of values that occur exactly once. The assertion lambda receives the uniqueness fraction (0.0 to 1.0) and returns a boolean indicating if it meets the threshold.
  example: ".hasUniqueness(['student_id'], lambda x: x >= 0.99)"
  required:
    - columns
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: true
hasDistinctness:
  description: |
    Validates the distinctness fraction of a single column or combined set of columns. Distinctness is the ratio of distinct values to total rows. The assertion lambda receives the distinctness fraction (0.0 to 1.0) and returns a boolean indicating if it meets the threshold.
  example: ".hasDistinctness(['student_id'], lambda x: x >= 0.99)"
  required:
    - columns
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: true
hasUniqueValueRatio:
  description: |
    Validates the unique value ratio of a single column or combined set of columns. The unique value ratio is the fraction of unique values compared to the total number of distinct values. The assertion lambda receives the ratio (0.0 to 1.0) and returns a boolean indicating if it meets the expectation.
  example: ".hasUniqueValueRatio(['student_id'], lambda x: x >= 0.99)"
  required:
    - columns
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: true
hasNumberOfDistinctValues:
  description: |
    Validates the absolute number of distinct values in a column. The assertion lambda receives the count of distinct values and returns a boolean indicating if it meets the expectation. Note: This constraint requires additional parameters (binningUdf and maxBins) when used in practice.
  example: ".hasNumberOfDistinctValues('credits_attempted', lambda x: x >= 0, binningUdf=None, maxBins=1000)"
  required:
    - column
    - assertion
    - binningUdf
    - maxBins
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: false
hasMutualInformation:
  description: |
    Validates the mutual information between two columns. Mutual information measures how much information about one column can be inferred from another. The assertion lambda receives the mutual information value and returns a boolean indicating if it meets the threshold.
  example: ".hasMutualInformation('credits_attempted', 'credits_completed', lambda x: x >= 0)"
  required:
    - columnA
    - columnB
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: true
hasApproxQuantile:
  description: |
    Validates a specific quantile value of a numeric column. The assertion lambda receives the computed quantile value and returns a boolean indicating if it meets the expectation.
  example: ".hasApproxQuantile('gpa', 0.5, lambda x: x >= 0)"
  required:
    - column
    - quantile
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: false
hasMinLength:
  description: |
    Validates the minimum string length in a column. The assertion lambda receives the minimum length value and returns a boolean indicating if it meets the expectation.
  example: ".hasMinLength('student_id', lambda x: x >= 3)"
  required:
    - column
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: false
hasMaxLength:
  description: |
    Validates the maximum string length in a column. The assertion lambda receives the maximum length value and returns a boolean indicating if it meets the expectation.
  example: ".hasMaxLength('student_id', lambda x: x <= 20)"
  required:
    - column
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: false
hasMin:
  description: |
    Validates the minimum value of a numeric column. The assertion lambda receives the minimum value and returns a boolean indicating if it meets the expectation.
  example: ".hasMin('credits_attempted', lambda x: x >= 18)"
  required:
    - column
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: false
hasMax:
  description: |
    Validates the maximum value of a numeric column. The assertion lambda receives the maximum value and returns a boolean indicating if it meets the expectation.
  example: ".hasMax('credits_attempted', lambda x: x <= 48)"
  required:
    - column
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: false
hasMean:
  description: |
    Validates the mean (average) value of a numeric column. The assertion lambda receives the mean value and returns a boolean indicating if it meets the expectation.
  example: ".hasMean('gpa', lambda x: x >= 2.0 and x <= 3.5)"
  required:
    - column
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: false
hasStandardDeviation:
  description: |
    Validates the standard deviation of a numeric column. The assertion lambda receives the standard deviation value and returns a boolean indicating if it meets the expectation.
  example: ".hasStandardDeviation('gpa', lambda x: x >= 0.5 and x <= 1.5)"
  required:
    - column
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: false
hasCorrelation:
  description: |
    Validates the Pearson correlation coefficient between two numeric columns. The assertion lambda receives the correlation value (-1.0 to 1.0) and returns a boolean indicating if it meets the expectation.
  example: ".hasCorrelation('credits_attempted', 'credits_completed', lambda x: x >= 0)"
  required:
    - columnA
    - columnB
    - assertion
  optional: null
  canUseSatisfies: false
  canBeUsedForMultipleColumns: true
satisfies:
  description: |
    Validates a custom SQL-like condition on the dataframe. The columnCondition should be written as a SQL WHERE clause condition (e.g., '`col1` <= `col2`'). The constraintName is a descriptive name for the constraint. The optional assertion lambda receives the fraction of rows that satisfy the condition and returns a boolean indicating if it meets the threshold.
  examples:
    - ".satisfies('`credits_completed` <= `credits_attempted`', 'completed_le_attempted')"
    - ".satisfies('`credits_completed` <= `credits_attempted`', 'completed_le_attempted', lambda x: x >= 0.95)"
  required:
    - columnCondition
    - constraintName
  optional:
    - assertion
  canUseSatisfies: true
  canBeUsedForMultipleColumns: true
hasPattern:
  description: |
    Validates that column values match a regular expression pattern. The pattern is a regex string. The optional assertion lambda receives the fraction of matching rows and returns a boolean indicating if it meets the threshold. The optional name parameter provides a descriptive name for the constraint.
    IMPORTANT: Use raw strings (r"...") for regex patterns to avoid escape sequence issues. For example, use r"^\d+$" instead of "^\\d+$".
  examples:
    - '.hasPattern(''student_id'', r''^id_\d+$'')'
    - '.hasPattern(''student_id'', r''^id_\d+$'', lambda x: x >= 0.95)'
  required:
    - column
    - pattern
  optional:
    - assertion
    - name
  canUseSatisfies: true
  canBeUsedForMultipleColumns: false
containsCreditCardNumber:
  description: |
    Validates that values in a string column are valid credit card numbers. The optional assertion lambda receives the fraction of valid credit card numbers and returns a boolean indicating if it meets the threshold.
  examples:
    - ".containsCreditCardNumber('credit_card')"
    - ".containsCreditCardNumber('credit_card', lambda x: x >= 0)"
  required:
    - column
  optional:
    - assertion
  canUseSatisfies: true
  canBeUsedForMultipleColumns: false
containsEmail:
  description: |
    Validates that values in a string column are valid email addresses. The optional assertion lambda receives the fraction of valid emails and returns a boolean indicating if it meets the threshold.
  examples:
    - ".containsEmail('email')"
    - ".containsEmail('email', lambda x: x >= 0)"
  required:
    - column
  optional:
    - assertion
  canUseSatisfies: true
  canBeUsedForMultipleColumns: false
containsURL:
  description: |
    Validates that values in a string column are valid URLs. The optional assertion lambda receives the fraction of valid URLs and returns a boolean indicating if it meets the threshold.
  examples:
    - ".containsURL('url')"
    - ".containsURL('url', lambda x: x >= 0)"
  required:
    - column
  optional:
    - assertion
  canUseSatisfies: true
  canBeUsedForMultipleColumns: false
containsSocialSecurityNumber:
  description: |
    Validates that values in a string column are valid US social security numbers. The optional assertion lambda receives the fraction of valid SSNs and returns a boolean indicating if it meets the threshold.
  examples:
    - ".containsSocialSecurityNumber('ssn')"
    - ".containsSocialSecurityNumber('ssn', lambda x: x >= 0)"
  required:
    - column
  optional:
    - assertion
  canUseSatisfies: true
  canBeUsedForMultipleColumns: false
hasDataType:
  description: |
    Validates that values in a column conform to the specified data type. The datatype parameter must be a ConstrainableDataTypes enum value from pydeequ.checks.ConstrainableDataTypes. Valid enum values are: ConstrainableDataTypes.Null, ConstrainableDataTypes.Fractional, ConstrainableDataTypes.Integral, ConstrainableDataTypes.Boolean, ConstrainableDataTypes.String, and ConstrainableDataTypes.Numeric (union of Integral and Fractional). The optional assertion lambda receives the fraction of conforming rows and returns a boolean indicating if it meets the threshold.
  examples:
    - ".hasDataType('student_id', ConstrainableDataTypes.String)"
    - ".hasDataType('student_id', ConstrainableDataTypes.String, lambda x: x >= 0.95)"
  required:
    - column
    - datatype
  optional:
    - assertion
  canUseSatisfies: true
  canBeUsedForMultipleColumns: false
isNonNegative:
  description: |
    Validates that a numeric column contains no negative values (values >= 0). The optional assertion lambda receives the fraction of non-negative rows and returns a boolean indicating if it meets the threshold.
  examples:
    - ".isNonNegative('credits_attempted')"
    - ".isNonNegative('credits_attempted', lambda x: x >= 0.95)"
  required:
    - column
  optional:
    - assertion
  canUseSatisfies: true
  canBeUsedForMultipleColumns: false
isPositive:
  description: |
    Validates that a numeric column contains only positive values (values > 0). The optional assertion lambda receives the fraction of positive rows and returns a boolean indicating if it meets the threshold.
  examples:
    - ".isPositive('credits_attempted')"
    - ".isPositive('credits_attempted', lambda x: x >= 0.95)"
  required:
    - column
  optional:
    - assertion
  canUseSatisfies: true
  canBeUsedForMultipleColumns: false
isLessThan:
  description: |
    Validates that values in columnA are less than corresponding values in columnB for each row. The optional assertion lambda receives the fraction of rows where columnA < columnB and returns a boolean indicating if it meets the threshold.
  examples:
    - ".isLessThan('credits_completed', 'credits_attempted')"
    - ".isLessThan('credits_completed', 'credits_attempted', lambda x: x >= 0.95)"
  required:
    - columnA
    - columnB
  optional:
    - assertion
  canUseSatisfies: true
  canBeUsedForMultipleColumns: True
isLessThanOrEqualTo:
  description: |
    Validates that values in columnA are less than or equal to corresponding values in columnB for each row. The optional assertion lambda receives the fraction of rows where columnA <= columnB and returns a boolean indicating if it meets the threshold.
  examples:
    - ".isLessThanOrEqualTo('credits_completed', 'credits_attempted')"
    - ".isLessThanOrEqualTo('credits_completed', 'credits_attempted', lambda x: x >= 0.95)"
  required:
    - columnA
    - columnB
  optional:
    - assertion
  canUseSatisfies: true
  canBeUsedForMultipleColumns: true
isGreaterThan:
  description: |
    Validates that values in columnA are greater than corresponding values in columnB for each row. The optional assertion lambda receives the fraction of rows where columnA > columnB and returns a boolean indicating if it meets the expectation.
  examples:
    - ".isGreaterThan('credits_attempted', 'credits_completed')"
    - ".isGreaterThan('credits_attempted', 'credits_completed', lambda x: x >= 0.95)"
  required:
    - columnA
    - columnB
  optional:
    - assertion
  canUseSatisfies: true
  canBeUsedForMultipleColumns: true
isGreaterThanOrEqualTo:
  description: |
    Validates that values in columnA are greater than or equal to corresponding values in columnB for each row. The optional assertion lambda receives the fraction of rows where columnA >= columnB and returns a boolean indicating if it meets the threshold.
  examples:
    - ".isGreaterThanOrEqualTo('credits_attempted', 'credits_completed')"
    - ".isGreaterThanOrEqualTo('credits_attempted', 'credits_completed', lambda x: x >= 0.95)"
  required:
    - columnA
    - columnB
  optional:
    - assertion
  canUseSatisfies: true
  canBeUsedForMultipleColumns: true
isContainedIn:
  description: |
    Validates that each non-NULL value in a column is contained in the specified set of allowed values. The optional assertion lambda receives the fraction of matching rows and returns a boolean indicating if it meets the threshold.
  examples:
    - ".isContainedIn('target', ['Graduate', 'Dropout', 'Enrolled'])"
    - ".isContainedIn('target', ['Graduate', 'Dropout', 'Enrolled'], lambda x: x >= 0.95)"
  required:
    - column
    - allowed_values
  optional:
    - assertion
    - hint
  canUseSatisfies: true
  canBeUsedForMultipleColumns: false
