    assumptions:
    - text: 'The ''booking_status'' column must be present and fully populated (no
        null values), as it is directly used to generate the target variable ''y''
        for model training without any missing value handling. This means every row
        in the input data is expected to have a valid ''booking_status'' value.

        We could represent this assumption as a deequ constraint like this:

        .satisfies(''booking_status IS NOT NULL'', ''No nulls in booking_status'',
        lambda x: x == 1.0)'
      sources:
      - start_line: 10
