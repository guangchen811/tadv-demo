raw_constraints:
- column_name: Curricular units 1st sem (enrolled)
  code_for_constraint: .isComplete('Curricular units 1st sem (enrolled)')
- column_name: Curricular units 1st sem (enrolled)
  code_for_constraint: .isNonNegative('Curricular units 1st sem (enrolled)')
- column_name: Curricular units 1st sem (evaluations)
  code_for_constraint: .isComplete('Curricular units 1st sem (evaluations)')
- column_name: Curricular units 1st sem (evaluations)
  code_for_constraint: .isNonNegative('Curricular units 1st sem (evaluations)')
- column_name: Curricular units 1st sem (without evaluations)
  code_for_constraint: .isComplete('Curricular units 1st sem (without evaluations)')
- column_name: Curricular units 1st sem (without evaluations)
  code_for_constraint: .isNonNegative('Curricular units 1st sem (without evaluations)')
- column_name: Curricular units 1st sem (approved)
  code_for_constraint: .isComplete('Curricular units 1st sem (approved)')
- column_name: Curricular units 1st sem (approved)
  code_for_constraint: .isNonNegative('Curricular units 1st sem (approved)')
- column_name: Curricular units 1st sem (credited)
  code_for_constraint: .isComplete('Curricular units 1st sem (credited)')
- column_name: Curricular units 1st sem (credited)
  code_for_constraint: .isNonNegative('Curricular units 1st sem (credited)')
- column_name: Curricular units 1st sem (grade)
  code_for_constraint: .isComplete('Curricular units 1st sem (grade)')
- column_name: Curricular units 1st sem (grade)
  code_for_constraint: .isNonNegative('Curricular units 1st sem (grade)')
- column_name: Curricular units 1st sem (grade)
  code_for_constraint: '.hasMax(''Curricular units 1st sem (grade)'', lambda x: x
    <= 20.0)'
- column_name: Debtor
  code_for_constraint: .isComplete('Debtor')
- column_name: Debtor
  code_for_constraint: .isContainedIn('Debtor', [0, 1])
- column_name: Tuition fees up to date
  code_for_constraint: .isComplete('Tuition fees up to date')
- column_name: Tuition fees up to date
  code_for_constraint: .isContainedIn('Tuition fees up to date', [0, 1])
- column_name: International
  code_for_constraint: .isComplete('International')
- column_name: International
  code_for_constraint: .isContainedIn('International', [0, 1])
- column_name: Nacionality
  code_for_constraint: .isComplete('Nacionality')
- column_name: Nacionality
  code_for_constraint: .isNonNegative('Nacionality')
- column_name: Curricular units 1st sem (evaluations)
  code_for_constraint: '.satisfies(''`Curricular units 1st sem (evaluations)` <= `Curricular
    units 1st sem (enrolled)`'', ''evals_le_enrolled'', lambda x: x == 1.0)'
- column_name: Curricular units 1st sem (without evaluations)
  code_for_constraint: '.satisfies(''`Curricular units 1st sem (without evaluations)`
    <= `Curricular units 1st sem (enrolled)`'', ''without_le_enrolled'', lambda x:
    x == 1.0)'
- column_name: Curricular units 1st sem (approved)
  code_for_constraint: '.satisfies(''`Curricular units 1st sem (approved)` <= `Curricular
    units 1st sem (evaluations)`'', ''approved_le_evaluations'', lambda x: x == 1.0)'
- column_name: Curricular units 1st sem (credited)
  code_for_constraint: '.satisfies(''`Curricular units 1st sem (credited)` <= `Curricular
    units 1st sem (enrolled)`'', ''credited_le_enrolled'', lambda x: x == 1.0)'
