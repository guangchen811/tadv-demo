    - text: 'For the 1st semester, the combined total of ''approved'' + ''without
        evaluations'' + ''credited'' must not exceed ''enrolled'' (leaving room for
        failed/other outcomes). Deequ example: .satisfies("(`Curricular units 1st
        sem (approved)` + `Curricular units 1st sem (without evaluations)` + `Curricular
        units 1st sem (credited)`) <= `Curricular units 1st sem (enrolled)`", "sem1_sum_components_le_enrolled")'
