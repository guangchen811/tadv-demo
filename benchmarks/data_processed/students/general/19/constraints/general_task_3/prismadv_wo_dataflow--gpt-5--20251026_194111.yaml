        1st sem (approved)'', ''Curricular units 1st sem (without evaluations)'',
        and ''Curricular units 1st sem (credited)'' must all be 0 (i.e., no positive
        numerators when the denominator is zero). Deequ example: .satisfies("CASE
        WHEN `Curricular units 1st sem (enrolled)` = 0 THEN (`Curricular units 1st
        sem (approved)` = 0 AND `Curricular units 1st sem (without evaluations)` =
        0 AND `Curricular units 1st sem (credited)` = 0) ELSE true END", "sem1_no_counts_when_enrolled_zero")'
