    - text: 'No student record should have ''Tuition fees up to date'' = 1 and ''Debtor''
        = 1 simultaneously (these states are mutually exclusive). Representable in
        Deequ as a multi-column compliance constraint: .satisfies(''NOT((`Tuition
        fees up to date` = 1) AND (`Debtor` = 1))'', fraction => fraction == 1.0).'
