    assumptions:
    - text: 'The ''Target'' column must exist in the input dataset because the code
        directly references it to compute the graduate ratio used for alert budget
        calibration and threshold selection. This can be validated with checks like
        Deequ: .hasColumn(''Target'') or Great Expectations: expect_column_to_exist(''Target'').'
      sources:
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 93
        end_line: 99
        file: ''
      uid: ec6739ad-a20b-4689-b917-f26b14ac5b31
    - text: 'The ''Target'' column should be nearly complete (e.g., at least 99% non-null).
        Nulls are implicitly treated as non-''Graduate'' by the equality comparison,
        which would bias the graduate ratio downward and distort the alert budget
        and threshold calibration. This can be enforced with Deequ: .hasCompleteness(''Target'',
        lambda v: v >= 0.99) or Great Expectations: expect_column_values_to_not_be_null
        with mostly >= 0.99.'
      sources:
      - start_line: 93
        end_line: 99
        file: ''
      uid: a84b4978-418f-411b-9478-2012bd15b7ce
    - text: 'The ''Target'' column should be a categorical/text field with values
        constrained to a small known set, specifically: {''Graduate'', ''Dropout'',
        ''Enrolled''}. Any other value (including misspellings) will be treated as
        non-graduate and will bias calibration. This can be validated with Deequ:
        .isContainedIn(''Target'', [''Graduate'',''Dropout'',''Enrolled''], lambda
        v: v >= 0.99) or Great Expectations: expect_column_values_to_be_in_set with
        mostly >= 0.99.'
      sources:
      - start_line: 93
        end_line: 93
        file: ''
      uid: 56e13b48-c9ce-427c-87e4-458b1f8d3389
    - text: 'Values in ''Target'' must use exact spelling and casing (e.g., ''Graduate''
        exactly, without leading/trailing whitespace). Otherwise, true graduates may
        be miscounted as non-graduates. This can be validated by ensuring trimmed
        values and exact matches, e.g., Deequ: .satisfies("`Target` = trim(`Target`)",
        "No leading/trailing whitespace in Target", lambda x: x == 1.0) and .satisfies("CASE
        WHEN `Target` IN (''Graduate'',''Dropout'',''Enrolled'') THEN 1 ELSE 0 END",
        "Valid Target categories", lambda x: x >= 0.99).'
      sources:
      - start_line: 93
        end_line: 93
        file: ''
      uid: a0136c92-5e9e-4cf0-93e8-dde46f18f5eb
    - text: 'The proportion of ''Graduate'' in ''Target'' should be bounded away from
        extremes to avoid degenerate calibration (e.g., 0.05 <= share of ''Graduate''
        <= 0.95). If the fraction is near 0 or 1, the quantile cut will push the threshold
        to dataset extremes, undermining intended alert budgeting. This can be represented
        with two Deequ checks: .satisfies("CASE WHEN `Target` = ''Graduate'' THEN
        1 ELSE 0 END", "Graduate share lower bound", lambda x: x >= 0.05) and .satisfies("CASE
        WHEN `Target` = ''Graduate'' THEN 1 ELSE 0 END", "Graduate share upper bound",
        lambda x: x <= 0.95).'
      sources:
      - start_line: 93
        end_line: 99
        file: ''
      uid: e78060c4-1933-4da8-a3d6-700acde68484
    - text: "The 'Target' column should have a small number of distinct values (2\u2013\
        3), consistent with the expected categories ('Graduate', 'Dropout', 'Enrolled').\
        \ This helps detect schema drift. This can be validated with Deequ: .hasNumberOfDistinctValues('Target',\
