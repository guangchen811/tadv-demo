    - text: 'For rows with ''Curricular units 1st sem (enrolled)'' > 0, the ratios
        approved/enrolled, without_evaluations/enrolled, and credited/enrolled must
        each lie within [0, 1]. This ensures the derived pass_rate1 and related rates
        are valid and that fail_rate1 = 1 - pass_rate1 remains within [0, 1]. Deequ
        example: .satisfies("CASE WHEN `Curricular units 1st sem (enrolled)` > 0 THEN
        (`Curricular units 1st sem (approved)` / `Curricular units 1st sem (enrolled)`
        BETWEEN 0 AND 1 AND `Curricular units 1st sem (without evaluations)` / `Curricular
        units 1st sem (enrolled)` BETWEEN 0 AND 1 AND `Curricular units 1st sem (credited)`
        / `Curricular units 1st sem (enrolled)` BETWEEN 0 AND 1) ELSE true END", "sem1_component_ratios_in_0_1")'
