constraints:
  Admission grade:
    code:
    - - .isNonNegative('Admission grade')
      - Invalid
    assumptions: []
  Application order:
    code:
    - - .isContainedIn('Application order', ['1', '2', '3', '4', '5', '6', '7', '8',
        '9'])
      - Valid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - '.hasCorrelation(''Curricular units 1st sem (approved)'', ''Curricular units
        1st sem (enrolled)'', lambda c: c > 0.5)'
      - Valid
    - - .satisfies('`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (enrolled)`', 'approved_le_enrolled_sem1')
      - Valid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isBetween('Curricular units 1st sem (grade)', 0, 20, inclusive=True)
      - Invalid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .satisfies('`Curricular units 2nd sem (approved)` <= `Curricular units 2nd
        sem (enrolled)`', 'approved_le_enrolled_sem2')
      - Valid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .isBetween('Curricular units 2nd sem (grade)', 0, 20, inclusive=True)
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', ['0', '1'])
      - Valid
    assumptions: []
  GDP:
    code:
    - - .isComplete('GDP')
      - Valid
    assumptions: []
  Previous qualification (grade):
    code:
    - - .isNonNegative('Previous qualification (grade)')
      - Invalid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', ['0', '1'])
      - Valid
    assumptions: []
  Unemployment rate:
    code:
    - - '.hasStandardDeviation(''Unemployment rate'', lambda sd: sd > 0)'
      - Valid
    - - .isComplete('Unemployment rate')
      - Valid
    assumptions: []
