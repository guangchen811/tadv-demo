constraints:
  Admission grade:
    code:
    - - .isComplete('Admission grade')
      - Valid
    - - .isGreaterThanOrEqualTo('Admission grade',0)
      - Invalid
    - - .isLessThanOrEqualTo('Admission grade',200)
      - Invalid
    - - .isNumeric('Admission grade')
      - Invalid
    assumptions: []
  Application order:
    code:
    - - .isComplete('Application order')
      - Valid
    - - .isContainedIn('Application order',[1,2,3,4,5,6,7,8,9])
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isComplete('Curricular units 1st sem (approved)')
      - Valid
    - - .isNonNegative('Curricular units 1st sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved) vs enrolled:
    code:
    - - .isLessThanOrEqualTo('Curricular units 1st sem (approved)','Curricular units
        1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isComplete('Curricular units 1st sem (enrolled)')
      - Valid
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .isComplete('Curricular units 2nd sem (approved)')
      - Valid
    - - .isNonNegative('Curricular units 2nd sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (approved) vs enrolled:
    code:
    - - .isLessThanOrEqualTo('Curricular units 2nd sem (approved)','Curricular units
        2nd sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (enrolled):
    code:
    - - .isComplete('Curricular units 2nd sem (enrolled)')
      - Valid
    - - .isNonNegative('Curricular units 2nd sem (enrolled)')
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isComplete('Debtor')
      - Valid
    - - .isContainedIn('Debtor',[0,1])
      - Invalid
    assumptions: []
  GDP:
    code:
    - - .isComplete('GDP')
      - Valid
    - - .isNumeric('GDP')
      - Invalid
    assumptions: []
  Inflation rate:
    code:
    - - .isComplete('Inflation rate')
      - Valid
    - - .isNumeric('Inflation rate')
      - Invalid
    assumptions: []
  Previous qualification (grade):
    code:
    - - .isComplete('Previous qualification (grade)')
      - Valid
    - - .isGreaterThanOrEqualTo('Previous qualification (grade)',0)
      - Invalid
    - - .isLessThanOrEqualTo('Previous qualification (grade)',200)
      - Invalid
    - - .isNumeric('Previous qualification (grade)')
      - Invalid
    assumptions: []
  Target:
    code:
    - - .isComplete('Target')
      - Valid
    - - .isContainedIn('Target',['Graduate','Dropout','Enrolled'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isComplete('Tuition fees up to date')
      - Valid
    - - .isContainedIn('Tuition fees up to date',[0,1])
      - Invalid
    assumptions: []
  Unemployment rate:
    code:
    - - .isComplete('Unemployment rate')
      - Valid
    - - .isNumeric('Unemployment rate')
      - Invalid
    assumptions: []
