    - text: 'Across semesters, totals must be coherent: (''Curricular units 1st sem
        (approved)'' + ''Curricular units 2nd sem (approved)'') <= (''Curricular units
        1st sem (enrolled)'' + ''Curricular units 2nd sem (enrolled)'') AND also <=
