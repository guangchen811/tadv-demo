        <= (`Curricular units 1st sem (enrolled)` + `Curricular units 2nd sem (enrolled)`)")
        and .addCompliance("approved_total_le_eligible_total", "(`Curricular units
        1st sem (approved)` + `Curricular units 2nd sem (approved)`) <= ((`Curricular
        units 1st sem (enrolled)` - `Curricular units 1st sem (without evaluations)`)
        + (`Curricular units 2nd sem (enrolled)` - `Curricular units 2nd sem (without
        evaluations)`))").'
