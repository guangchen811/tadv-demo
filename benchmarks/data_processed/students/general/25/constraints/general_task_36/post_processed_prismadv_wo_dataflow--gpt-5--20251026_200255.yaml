        file: ''
      uid: ef7e27fc-36b2-413b-8fcf-2a40207f8769
    - text: 'Zero-enrollment rows imply zero activity: If ''enrolled'' is 0 in a semester,
        then ''approved'', ''evaluations'', and ''without evaluations'' must all be
        0 for that semester. Deequ examples: .satisfies("(`Curricular units 1st sem
