    - text: 'Enrollment accounting consistency per semester: evaluations + without
        evaluations equals enrolled. That is, ''Curricular units 1st sem (evaluations)''
        + ''Curricular units 1st sem (without evaluations)'' == ''Curricular units
        1st sem (enrolled)'' and ''Curricular units 2nd sem (evaluations)'' + ''Curricular
        units 2nd sem (without evaluations)'' == ''Curricular units 2nd sem (enrolled)''.
        This makes ''eligible'' equal to ''evaluations'', aligning pass-rate with
