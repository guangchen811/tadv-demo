        end_line: 44
        file: ''
      uid: 4f2255f7-15c1-419e-a72a-cb0cfaa9006a
    - text: 'Per semester, approvals imply a positive eligible population: If ''Curricular
        units 1st sem (approved)'' > 0 then (''Curricular units 1st sem (enrolled)''
        - ''Curricular units 1st sem (without evaluations)'') > 0; and if ''Curricular
        units 2nd sem (approved)'' > 0 then (''Curricular units 2nd sem (enrolled)''
        - ''Curricular units 2nd sem (without evaluations)'') > 0. Deequ example:
