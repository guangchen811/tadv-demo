        sem (enrolled)'' and ''Curricular units 1st sem (without evaluations)'' <=
        ''Curricular units 1st sem (enrolled)''. Example Deequ constraints: .isLessThanOrEqual(''Curricular
        units 2nd sem (without evaluations)'', ''Curricular units 2nd sem (enrolled)'')
        and .isLessThanOrEqual(''Curricular units 1st sem (without evaluations)'',
