        units 2nd sem (evaluations)'' = ''Curricular units 2nd sem (enrolled)'' -
        ''Curricular units 2nd sem (without evaluations)'' and similarly for 1st semester.
        This aligns the ''eligible'' denominator used in pass rates with the evaluations
        column. Example Deequ constraint (compliance): .compliance(''c2_eval_equals_enrolled_minus_without'',
        "`Curricular units 2nd sem (evaluations)` = `Curricular units 2nd sem (enrolled)`
        - `Curricular units 2nd sem (without evaluations)`") and the analogous 1st-semester
