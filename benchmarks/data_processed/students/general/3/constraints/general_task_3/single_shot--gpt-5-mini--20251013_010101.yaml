constraints:
  Admission grade:
    code:
    - - .isComplete('Admission grade').hasDataType('Admission grade','Fractional').satisfies("`Admission
        grade` >= 0 AND `Admission grade` <= 200", 'admission_grade_range')
      - Invalid
    assumptions: []
  Age at enrollment:
    code:
    - - .isComplete('Age at enrollment').hasDataType('Age at enrollment','Integral').satisfies("`Age
        at enrollment` >= 16 AND `Age at enrollment` <= 80", 'age_reasonable_range')
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isComplete('Curricular units 1st sem (approved)').hasDataType('Curricular
        units 1st sem (approved)','Integral').isNonNegative('Curricular units 1st
        sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isComplete('Curricular units 1st sem (enrolled)').hasDataType('Curricular
        units 1st sem (enrolled)','Integral').isNonNegative('Curricular units 1st
        sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isComplete('Curricular units 1st sem (grade)').hasDataType('Curricular units
        1st sem (grade)','Fractional').satisfies("`Curricular units 1st sem (grade)`
        >= 0 AND `Curricular units 1st sem (grade)` <= 20", 'grade_range_1')
      - Invalid
    assumptions: []
  Curricular units 1st sem consistency:
    code:
    - - .satisfies("`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (enrolled)`", 'approved_le_enrolled_1').satisfies("`Curricular units 1st
        sem (credited)` <= `Curricular units 1st sem (enrolled)`", 'credited_le_enrolled_1').satisfies("`Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`",
        'woe_le_enrolled_1')
      - Valid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .isComplete('Curricular units 2nd sem (approved)').hasDataType('Curricular
        units 2nd sem (approved)','Integral').isNonNegative('Curricular units 2nd
        sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (enrolled):
    code:
    - - .isComplete('Curricular units 2nd sem (enrolled)').hasDataType('Curricular
        units 2nd sem (enrolled)','Integral').isNonNegative('Curricular units 2nd
        sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .isComplete('Curricular units 2nd sem (grade)').hasDataType('Curricular units
        2nd sem (grade)','Fractional').satisfies("`Curricular units 2nd sem (grade)`
        >= 0 AND `Curricular units 2nd sem (grade)` <= 20", 'grade_range_2')
      - Invalid
    assumptions: []
  Curricular units 2nd sem consistency:
    code:
    - - .satisfies("`Curricular units 2nd sem (approved)` <= `Curricular units 2nd
        sem (enrolled)`", 'approved_le_enrolled_2').satisfies("`Curricular units 2nd
        sem (credited)` <= `Curricular units 2nd sem (enrolled)`", 'credited_le_enrolled_2').satisfies("`Curricular
        units 2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`",
        'woe_le_enrolled_2')
      - Valid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - .isComplete('Daytime/evening attendance\t').hasDataType('Daytime/evening attendance\t','Integral').isContainedIn('Daytime/evening
        attendance\t',[0,1])
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isComplete('Debtor').hasDataType('Debtor','Integral').isContainedIn('Debtor',[0,1])
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender').hasDataType('Gender','Integral').isContainedIn('Gender',[0,1])
      - Invalid
    assumptions: []
  International:
    code:
    - - .isComplete('International').hasDataType('International','Integral').isContainedIn('International',[0,1])
      - Invalid
    assumptions: []
  Previous qualification (grade):
    code:
    - - .isComplete('Previous qualification (grade)').hasDataType('Previous qualification
        (grade)','Fractional').satisfies("`Previous qualification (grade)` >= 0 AND
        `Previous qualification (grade)` <= 200", 'prev_grade_range')
      - Invalid
    assumptions: []
  Scholarship holder:
    code:
    - - .isComplete('Scholarship holder').hasDataType('Scholarship holder','Integral').isContainedIn('Scholarship
        holder',[0,1])
      - Invalid
    assumptions: []
  Target:
    code:
    - - .isComplete('Target').isContainedIn('Target', ['Graduate','Dropout','Enrolled']).hasDataType('Target','String')
      - Invalid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isComplete('Tuition fees up to date').hasDataType('Tuition fees up to date','Integral').isContainedIn('Tuition
