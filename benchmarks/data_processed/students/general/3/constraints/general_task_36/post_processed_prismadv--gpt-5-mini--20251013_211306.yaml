      source_assumptions:
      - 6b30be90-03d0-4de0-8673-445e5d701e19
    - suggestion: '.satisfies("CASE WHEN `Debtor` = 1 AND `Tuition fees up to date`
        = 1 THEN 1 ELSE 0 END", "Debtor vs paid consistency (Debtor=1 implies paid=0)",
        lambda x: x == 0.0)'
      validity: false
      reason_if_invalid: 'Constraint ''.satisfies("CASE WHEN `Debtor` = 1 AND `Tuition
        fees up to date` = 1 THEN 1 ELSE 0 END", "Debtor vs paid consistency (Debtor=1
        implies paid=0)", lambda x: x == 0.0)'' failed on data sample: Value: 0.06447963800904978
        does not meet the constraint requirement!'
      level: warning
