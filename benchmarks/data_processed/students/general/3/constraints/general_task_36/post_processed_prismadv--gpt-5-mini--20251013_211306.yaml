        students. Concretely: if (''Curricular units 1st sem (enrolled)'' + ''Curricular
        units 2nd sem (enrolled)'') > 0 then ''Curricular units 1st sem (grade)''
        and ''Curricular units 2nd sem (grade)'' should be numeric and lie in the
