      source_assumptions:
      - 2a99b65e-a123-4e84-bb3a-83781cc35046
    assumptions:
    - text: 'The ''Debtor'' column is expected to be numeric/integral (convertible
        by pd.to_numeric without producing NaNs). The code explicitly calls pd.to_numeric(...)
        on this column before using it, so the input should contain values that can
        be parsed as numbers. Example validation: ensure casting to numeric does not
        produce nulls, e.g. a Deequ-style check: .satisfies("CASE WHEN CAST(`Debtor`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Debtor numeric", lambda x: x ==
        1.0).'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      uid: ebb6e98f-1dc8-44ba-804b-5409d7f18213
    - text: 'The ''Debtor'' column should be binary with values only in {0, 1}. The
        code treats Debtor as an indicator (compares to 1) to compute financial_flag
        and metrics; unexpected values (e.g. 2, -1, text) would change behavior. Example
        validation: .satisfies("CASE WHEN `Debtor` IN (0,1) THEN 1 ELSE 0 END", "Debtor
        is binary", lambda x: x == 1.0).'
      sources:
      - start_line: 56
        end_line: 56
        file: ''
      - start_line: 96
        end_line: 96
        file: ''
      uid: 6b30be90-03d0-4de0-8673-445e5d701e19
    - text: 'The ''Debtor'' column should be complete (no missing/null values) in
        the input. The script computes metrics (pct_debtor = (df[''Debtor''] == 1).mean())
        and uses Debtor in logical expressions; missing values would alter means or
        be implicitly treated as False in comparisons. Example validation: .satisfies("CASE
        WHEN `Debtor` IS NOT NULL THEN 1 ELSE 0 END", "Debtor not null", lambda x:
        x == 1.0) or a Great Expectations expectation that the column has no nulls.'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      - start_line: 95
        end_line: 96
        file: ''
      uid: f5f26233-33af-4382-bc13-cd8729027857
    - text: 'Semantically, value 1 in ''Debtor'' indicates a student who owes money
        (is a debtor) and value 0 indicates not a debtor. The downstream calculation
        sets financial_flag = 1.0 when Debtor == 1 (or when paid flag == 0), so this
        semantic meaning must hold in the input. Example validation: if there is a
        ground-truth ''Tuition fees up to date'' column, check consistency: .satisfies("CASE
        WHEN `Debtor` = 1 AND `Tuition fees up to date` = 1 THEN 0 ELSE 1 END", "Debtor/paid
        consistency", lambda x: x == 0) or domain-specific consistency checks.'
      sources:
      - start_line: 56
        end_line: 56
        file: ''
      uid: 2a99b65e-a123-4e84-bb3a-83781cc35046
  '["Debtor","International","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'For each semester, the number of "without evaluations" must not exceed
        the number enrolled. Concretely: ''Curricular units 1st sem (without evaluations)''
        <= ''Curricular units 1st sem (enrolled)'' and ''Curricular units 2nd sem
        (without evaluations)'' <= ''Curricular units 2nd sem (enrolled)''. This is
        required because eligible counts are computed as enrolled - without_evaluations
        and used as denominators. Example Deequ row-level constraint: .satisfies("`Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`",
        "c1_wo_le_c1_en") and similarly for the 2nd semester.'
      sources:
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: be694044-f11d-4646-a98c-f48a3388190b
    - text: 'Approved counts must not exceed eligible students. Concretely: ''Curricular
        units 1st sem (approved)'' <= (''Curricular units 1st sem (enrolled)'' - ''Curricular
        units 1st sem (without evaluations)'') and the same for the 2nd semester.
        At the dataset level, (c1_ap + c2_ap) <= ((c1_en - c1_wo) + (c2_en - c2_wo)).
        This guarantees pass_rate values are in [0,1]. Example Deequ constraint: .satisfies("`Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)` - `Curricular
        units 1st sem (without evaluations)`", "c1_ap_le_eligible") and a combined
        constraint .satisfies("`Curricular units 1st sem (approved)` + `Curricular
        units 2nd sem (approved)` <= `Curricular units 1st sem (enrolled)` - `Curricular
        units 1st sem (without evaluations)` + `Curricular units 2nd sem (enrolled)`
        - `Curricular units 2nd sem (without evaluations)`", "approved_le_total_eligible").'
      sources:
      - start_line: 40
        end_line: 48
        file: ''
      uid: b3fcade3-7525-4b14-889a-c53baaf96834
    - text: 'Enrollment, without-evaluation and approved counts must be non-negative
        integers. Concretely: ''Curricular units X (enrolled)'', ''... (without evaluations)'',
        ''... (approved)'' >= 0 and integral. Example Deequ constraints: .isNonNegative("Curricular
        units 1st sem (enrolled)") and .hasDataType("Curricular units 1st sem (enrolled)",
        "Integral") or row-level: .satisfies("`Curricular units 1st sem (enrolled)`
        >= 0 AND `Curricular units 1st sem (approved)` >= 0 AND `Curricular units
        1st sem (without evaluations)` >= 0", "counts_non_negative").'
      sources:
      - start_line: 34
        end_line: 49
        file: ''
      uid: 82540ecb-5a10-48f1-9236-e033999757dc
    - text: 'Grades used for weighted average must be within expected academic ranges
        so that grade_shortfall calculation is meaningful. Concretely: ''Curricular
        units 1st sem (grade)'' and ''Curricular units 2nd sem (grade)'' should be
        within [0, 20]. Example Deequ constraint: .satisfies("`Curricular units 1st
        sem (grade)` >= 0 AND `Curricular units 1st sem (grade)` <= 20 AND `Curricular
        units 2nd sem (grade)` >= 0 AND `Curricular units 2nd sem (grade)` <= 20",
        "grades_in_0_20").'
      sources:
      - start_line: 34
        end_line: 52
        file: ''
      - start_line: 53
        end_line: 53
        file: ''
      uid: d70830cb-0876-4f8f-9c6d-5862b9267488
    - text: 'Admission grade must be within the scale expected by the admission_risk
        formula. Concretely: ''Admission grade'' should be in [0, 200] so that admission_risk
        = 1 - adm_gr/200 yields a value in [0,1]. Example Deequ constraint: .satisfies("`Admission
        grade` >= 0 AND `Admission grade` <= 200", "admission_grade_in_0_200").'
      sources:
      - start_line: 29
        end_line: 54
        file: ''
      uid: de9dff75-f98a-4cc2-a348-4163b34f8464
    - text: 'Binary indicator columns must contain only 0/1 values. Concretely: ''Tuition
        fees up to date'', ''Debtor'' and ''International'' should each be in the
        set {0,1} because they''re used as binary flags in financial_flag, intl_modifier
        and metrics. Example Deequ constraint: .isContainedIn("Tuition fees up to
        date", [0,1]) and similarly for the other two columns, or row-level: .satisfies("`Tuition
        fees up to date` IN (0,1) AND `Debtor` IN (0,1) AND `International` IN (0,1)",
        "binary_flags").'
      sources:
      - start_line: 31
        end_line: 36
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      - start_line: 74
        end_line: 76
        file: ''
      - start_line: 95
        end_line: 97
        file: ''
      uid: 1028b75f-d9fc-4378-9112-2dd36cb6777b
    - text: 'Derived rate metrics should be bounded in [0,1]. Concretely: row-level
        constraints implied by the above (approved <= eligible and binary flags) ensure
        ''pass_rate'' and the computed overall pass_rate remain between 0 and 1. To
        enforce explicitly: .satisfies("( (`Curricular units 1st sem (approved)` <=
        `Curricular units 1st sem (enrolled)` - `Curricular units 1st sem (without
        evaluations)` ) OR `Curricular units 1st sem (enrolled)` - `Curricular units
        1st sem (without evaluations)` = 0) AND (similar for 2nd sem)", "rates_well_formed")."'
      sources:
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 58
        end_line: 64
        file: ''
      uid: fa1b5457-b88c-450f-8e85-18e7c26b4936
  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'Both ''Tuition fees up to date'' and ''Debtor'' are binary indicator
        columns taking only values 0 or 1 and contain no nulls. Actionable checks:
        assert completeness for both columns and assert all values belong to the set
        {0,1}. Example (Deequ-style): .isComplete(''Tuition fees up to date'') &&
        .isContainedIn(''Tuition fees up to date'', [0,1]) and similarly for ''Debtor''.'
      sources:
      - start_line: 31
        end_line: 38
        file: ''
      - start_line: 95
        end_line: 96
        file: ''
      uid: 971aacbf-5331-4427-8bd8-2ac023596f7b
    - text: 'A student should not be simultaneously marked as "paid up to date" and
        as a "Debtor". Concretely, there should be zero rows where ''Tuition fees
        up to date'' == 1 AND ''Debtor'' == 1. Actionable check: assert count(rows
        where `Tuition fees up to date` = 1 AND `Debtor` = 1) == 0.'
      sources:
      - start_line: 56
        end_line: 56
        file: ''
      - start_line: 95
        end_line: 96
        file: ''
      uid: c00c1878-9e56-4b66-a631-c32400a73c88
    - text: 'The computed financial_flag in the output must exactly reflect the input
        indicators: financial_flag == 1 iff ((''Tuition fees up to date'' == 0) OR
        (''Debtor'' == 1)). Actionable check: for every row, assert df_out.financial_flag
        == (CASE WHEN `Tuition fees up to date` = 0 OR `Debtor` = 1 THEN 1 ELSE 0
        END).'
      sources:
      - start_line: 56
        end_line: 56
        file: ''
      - start_line: 68
        end_line: 72
        file: ''
      uid: 158af311-e16b-4c36-851f-32b08ea02ea2
