    assumptions:
    - text: 'The ''International'' column must be non-null for all input rows. The
        code casts this column to numeric and later uses it in arithmetic (intl_modifier
        = 0.03 * df[''International'']) and casts it to int for output, so missing
        values would lead to NaNs or errors and change the computed risk_score. You
        can express this as a completeness constraint (e.g., Deequ: .hasCompleteness(''International'',
        lambda x: x == 1.0) or Great Expectations: expect_column_values_to_not_be_null(''International'')).'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 55
        end_line: 55
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: d5c0e209-98d5-45ff-9ad2-5607a61409b8
    - text: 'The ''International'' column must be numeric/integer (or convertible
        to numeric). The script explicitly includes ''International'' in to_numeric_cols
        and calls pd.to_numeric(..., errors=''coerce''), then performs numeric multiplication
        and comparisons. Input values should therefore be valid integers/ numerics
        (not free-form strings). You can express this as a type/coercion check (e.g.,
        Deequ: .isNumeric(''International'') or Great Expectations: expect_column_values_to_be_of_type(''International'',
        ''int'') or expect_column_values_to_be_of_type(''International'', ''float'')
        after coercion).'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 55
        end_line: 55
        file: ''
      uid: 10ca5748-9bbe-4878-b1c9-03328d26893e
    - text: 'The ''International'' column should be binary with values only in {0,
        1}, where 0 appears to indicate ''domestic'' and 1 indicates ''international''.
        The code treats 0 vs 1 semantically (pct_domestic = (df[''International'']
        == 0).mean()), multiplies the value by 0.03 for a modifier, and casts to int
        for output, so unexpected values (e.g., 2, -1, or arbitrary categories) will
        produce incorrect metrics and scoring. Represent this as a set-membership
        constraint (e.g., Deequ: .hasPattern(''CASE WHEN `International` IN (0,1)
        THEN 1 ELSE 0 END'', ''International binary'', lambda x: x == 1.0) or Great
        Expectations: expect_column_values_to_be_in_set(''International'', [0,1])).'
      sources:
      - start_line: 55
        end_line: 55
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      uid: 2948b7c1-eca1-4016-a027-f594a9339e6c
    - text: 'The share of records with International == 1 is expected to be small
        (historical data shows ~2.3% international). This is not required for correctness
        but is a validation for data drift: if the proportion of 1s changes drastically,
        downstream metrics (pct_domestic, risk scoring composition) will shift. You
