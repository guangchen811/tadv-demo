        sem (approved)'') <= ((`Curricular units 1st sem (enrolled)` - `Curricular
        units 1st sem (without evaluations)`) + (`Curricular units 2nd sem (enrolled)`
        - `Curricular units 2nd sem (without evaluations)`)). Actionable check: .satisfies("`Curricular
        units 1st sem (approved)` + `Curricular units 2nd sem (approved)` <= (`Curricular
        units 1st sem (enrolled)` - `Curricular units 1st sem (without evaluations)`)
        + (`Curricular units 2nd sem (enrolled)` - `Curricular units 2nd sem (without
        evaluations)`)", "total_approved_le_total_eligible")'
      sources:
      - start_line: 40
        end_line: 48
        file: ''
      uid: 9b33579a-7451-42d0-988b-300f8912bc1c
    - text: 'If a semester has students enrolled then its grade value should be present
        (not null) so the weighted average grade is meaningful. Concretely: if ''Curricular
        units 2nd sem (enrolled)'' > 0 then ''Curricular units 2nd sem (grade)'' is
        not null; similarly for 1st sem. Actionable checks: .satisfies("(`Curricular
        units 2nd sem (enrolled)` > 0) implies `Curricular units 2nd sem (grade)`
        is not null", "c2_grade_present_if_enrolled"); .satisfies("(`Curricular units
        1st sem (enrolled)` > 0) implies `Curricular units 1st sem (grade)` is not
        null", "c1_grade_present_if_enrolled")'
      sources:
      - start_line: 34
        end_line: 52
        file: ''
      uid: dd5da0be-6c63-4da2-9447-53c6f38ea553
    - text: 'Grades used to compute grade_shortfall must be on the expected scale:
        ''Curricular units 1st sem (grade)'' and ''Curricular units 2nd sem (grade)''
        should lie in [0, 20]. Actionable checks: .satisfies("`Curricular units 1st
        sem (grade)` >= 0 AND `Curricular units 1st sem (grade)` <= 20", "c1_grade_range");
        .satisfies("`Curricular units 2nd sem (grade)` >= 0 AND `Curricular units
        2nd sem (grade)` <= 20", "c2_grade_range")'
      sources:
      - start_line: 50
        end_line: 53
        file: ''
      uid: 9fc2065d-ecbc-47b5-a024-5200bcdfe0e1
    - text: 'Admission grade should be within the expected range used by the formula:
        ''Admission grade'' in [0, 200]. Actionable check: .satisfies("`Admission
        grade` >= 0 AND `Admission grade` <= 200", "admission_grade_range")'
      sources:
      - start_line: 29
        end_line: 54
        file: ''
      uid: a3f9facf-7dcf-4b35-b095-bb1694ff0db6
    - text: 'Financial-related flags should be binary and consistent: ''Tuition fees
        up to date'' in {0,1} and ''Debtor'' in {0,1}. Additionally, a paid-up student
        should not be marked as debtor: if ''Tuition fees up to date'' == 1 then ''Debtor''
        == 0. Actionable checks: .isContainedIn("Tuition fees up to date", ["0","1"]);
        .isContainedIn("Debtor", ["0","1"]); .satisfies("NOT (`Tuition fees up to
        date` == 1 AND `Debtor` == 1)", "paid_and_debtor_inconsistent")'
      sources:
      - start_line: 30
        end_line: 56
        file: ''
      - start_line: 95
        end_line: 96
        file: ''
      uid: 1e526831-02d0-46f9-a3ff-a35335c082e0
    - text: 'International indicator must be binary (0 domestic, 1 international)
        because it is used multiplicatively and in metrics as a boolean. Actionable
        checks: .isContainedIn("International", ["0","1"]); .satisfies("`International`
        IN (0,1)", "intl_binary")'
      sources:
      - start_line: 32
        end_line: 75
        file: ''
      uid: c84af678-df40-48f8-ae3f-40dcf5565a21
  ? '["Curricular units 2nd sem (enrolled)","Curricular units 2nd sem (evaluations)","Curricular
    units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For every record, ''Curricular units 2nd sem (without evaluations)''
        must be less than or equal to ''Curricular units 2nd sem (enrolled)''. This
        ensures eligible2 = enrolled - without_evaluations is non-negative and the
        subtraction used to compute eligible2 is valid. Actionable check (Deequ-like):
        satisfies("`Curricular units 2nd sem (without evaluations)` <= `Curricular
        units 2nd sem (enrolled)`", ...) or a row-level check that (enrolled - without_evaluations)
        >= 0.'
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 1dd8aafe-9c25-400e-87d5-eb6df67719ad
    - text: '''Curricular units 2nd sem (evaluations)'' should equal ''Curricular
        units 2nd sem (enrolled)'' minus ''Curricular units 2nd sem (without evaluations)''
        for each record. In other words, evaluations = enrolled - without_evaluations.
        Actionable check: satisfies("`Curricular units 2nd sem (evaluations)` = `Curricular
        units 2nd sem (enrolled)` - `Curricular units 2nd sem (without evaluations)`",
        ...) or assert row-level equality when enrolled and without_evaluations are
        defined.'
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: fcc2b87d-f2f3-4240-b761-13a3d578dfef
    - text: '''Curricular units 2nd sem (approved)'' must not exceed the number of
        students eligible for evaluation or the number enrolled. Concretely, for each
        record: approved <= (enrolled - without_evaluations) and approved <= enrolled.
        This prevents impossible pass counts and keeps pass_rate (approved/eligible)
        meaningful. Actionable checks: satisfies("`Curricular units 2nd sem (approved)`
        <= `Curricular units 2nd sem (enrolled)`", ...) and satisfies("`Curricular
        units 2nd sem (approved)` <= (`Curricular units 2nd sem (enrolled)` - `Curricular
        units 2nd sem (without evaluations)`)", ...).'
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 44
        end_line: 47
        file: ''
