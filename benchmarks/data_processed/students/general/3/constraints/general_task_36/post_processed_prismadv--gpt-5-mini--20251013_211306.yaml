    - text: 'Across both semesters, the total approved should not exceed the total
        eligible. Concretely: (''Curricular units 1st sem (approved)'' + ''Curricular
        units 2nd sem (approved)'') <= ((''Curricular units 1st sem (enrolled)'' -
        ''Curricular units 1st sem (without evaluations)'') + (''Curricular units
        2nd sem (enrolled)'' - ''Curricular units 2nd sem (without evaluations)'')).
