        enrolled_total = enrolled_sem1 + enrolled_sem2. In practice assert (''Curricular
        units 1st sem (enriched total of eligibles)'') <= (''Curricular units 1st
        sem (enrolled)'' + ''Curricular units 2nd sem (enrolled)''). (Use explicit
        column-expression checks to validate this inequality before computing pass_rate.)'
