    - text: 'The number of distinct (Inflation rate, Unemployment rate) pairs is small
        relative to the dataset (macro indicators are shared across many rows). Concretely,
        the dataset should have at most 12 distinct pairs (or distinctness ratio <=
        0.01) to reflect year/period-level macro values. In Deequ terms: hasDistinctness(["Inflation
        rate", "Unemployment rate"], _ <= 0.01) or checking approxCountDistinct over
        the pair <= 12.'
