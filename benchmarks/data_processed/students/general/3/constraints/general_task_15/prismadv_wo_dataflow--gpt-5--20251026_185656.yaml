    assumptions:
    - text: 'Both ''Inflation rate'' and ''Unemployment rate'' are jointly complete
        and numeric for every row (no nulls, NaN, or non-parsable values), since they
        are both cast to float and passed to a StandardScaler/LogisticRegression without
        any imputation. This can be captured with a multi-column compliance such as:
        compliance("both_macro_present", "Inflation rate IS NOT NULL AND Unemployment
        rate IS NOT NULL").'
      sources:
