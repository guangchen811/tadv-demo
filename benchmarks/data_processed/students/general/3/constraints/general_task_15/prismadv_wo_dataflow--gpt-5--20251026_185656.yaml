    assumptions:
    - text: 'First-semester count columns are consistent so that all derived rates
        are in [0,1]: ''Curricular units 1st sem (approved)'' <= ''Curricular units
        1st sem (enrolled)'', ''Curricular units 1st sem (without evaluations)'' <=
        ''Curricular units 1st sem (enrolled)'', and ''Curricular units 1st sem (evaluations)''
        <= ''Curricular units 1st sem (enrolled)''. All four are non-negative, and
        when ''enrolled'' == 0 then approved == 0 and without evaluations == 0 and
        evaluations == 0. This ensures first_sem_pass_rate, first_sem_engagement,
        and first_sem_eval_load are bounded in [0,1] and avoids pathological divisions.

        Deequ-style constraints:

        - .satisfies("`Curricular units 1st sem (enrolled)` >= 0 AND `Curricular units
        1st sem (approved)` >= 0 AND `Curricular units 1st sem (without evaluations)`
        >= 0 AND `Curricular units 1st sem (evaluations)` >= 0", "s1_nonnegative")

        - .satisfies("`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (enrolled)` AND `Curricular units 1st sem (without evaluations)` <= `Curricular
        units 1st sem (enrolled)` AND `Curricular units 1st sem (evaluations)` <=
        `Curricular units 1st sem (enrolled)`", "s1_counts_within_enrolled")

        - .satisfies("CASE WHEN `Curricular units 1st sem (enrolled)` = 0 THEN (`Curricular
        units 1st sem (approved)` = 0 AND `Curricular units 1st sem (without evaluations)`
        = 0 AND `Curricular units 1st sem (evaluations)` = 0) ELSE true END", "s1_zero_enrolled_consistency")'
      sources:
      - start_line: 55
        end_line: 58
        file: ''
      - start_line: 63
        end_line: 66
        file: ''
      uid: e621d397-4382-476d-bbbe-10d6769a4f9e
    - text: 'Second-semester count columns are consistent so that all derived rates
        are in [0,1]: ''Curricular units 2nd sem (approved)'' <= ''Curricular units
        2nd sem (enrolled)'', ''Curricular units 2nd sem (without evaluations)'' <=
        ''Curricular units 2nd sem (enrolled)'', and ''Curricular units 2nd sem (evaluations)''
        <= ''Curricular units 2nd sem (enrolled)''. All four are non-negative, and
        when ''enrolled'' == 0 then approved == 0 and without evaluations == 0 and
        evaluations == 0.

        Deequ-style constraints:

        - .satisfies("`Curricular units 2nd sem (enrolled)` >= 0 AND `Curricular units
        2nd sem (approved)` >= 0 AND `Curricular units 2nd sem (without evaluations)`
        >= 0 AND `Curricular units 2nd sem (evaluations)` >= 0", "s2_nonnegative")

        - .satisfies("`Curricular units 2nd sem (approved)` <= `Curricular units 2nd
        sem (enrolled)` AND `Curricular units 2nd sem (without evaluations)` <= `Curricular
        units 2nd sem (enrolled)` AND `Curricular units 2nd sem (evaluations)` <=
        `Curricular units 2nd sem (enrolled)`", "s2_counts_within_enrolled")

        - .satisfies("CASE WHEN `Curricular units 2nd sem (enrolled)` = 0 THEN (`Curricular
        units 2nd sem (approved)` = 0 AND `Curricular units 2nd sem (without evaluations)`
        = 0 AND `Curricular units 2nd sem (evaluations)` = 0) ELSE true END", "s2_zero_enrolled_consistency")'
      sources:
      - start_line: 55
        end_line: 58
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      uid: fdbbbd00-c504-4573-a06d-922351151085
    - text: "Admission grade and Previous qualification (grade) are both on a 0\u2013\
        200 scale and positively associated: values must lie within [0,200], and their\
        \ dataset-level Pearson correlation should be positive (e.g., >= 0.2). This\
        \ underpins the weighted consensus feature.\nDeequ-style constraints:\n- .satisfies(\"\
        `Admission grade` BETWEEN 0 AND 200 AND `Previous qualification (grade)` BETWEEN\
        \ 0 AND 200\", \"grade_range_0_200\")\n- .hasCorrelation(\"Admission grade\"\
        , \"Previous qualification (grade)\", lowerBound=0.2, upperBound=1.0)"
      sources:
      - start_line: 51
        end_line: 54
        file: ''
      - start_line: 59
        end_line: 62
        file: ''
      uid: cc2d13a8-4139-4598-9799-e7666c2a871b
    - text: 'Macroeconomic indicators used together must be complete and numeric:
        ''GDP'', ''Unemployment rate'', and ''Inflation rate'' contain no nulls/NaNs
        and are finite so they can be cast to float and scaled together.

        Deequ-style constraints:

        - .isComplete("GDP").isComplete("Unemployment rate").isComplete("Inflation
        rate")

        - .satisfies("isFinite(`GDP`) AND isFinite(`Unemployment rate`) AND isFinite(`Inflation
        rate`)", "macro_finite_numeric")'
      sources:
      - start_line: 86
        end_line: 109
        file: ''
      uid: d98507bb-7e23-4b4a-b3e2-d1fb9ee26605
    - text: 'GDP and Unemployment rate move in opposite directions at the dataset
        level (countercyclical): the Pearson correlation between ''GDP'' and ''Unemployment
        rate'' should be non-positive, e.g., <= -0.05.

        Deequ-style constraint:

        - .hasCorrelation("GDP", "Unemployment rate", lowerBound=-1.0, upperBound=-0.05)'
      sources:
      - start_line: 99
        end_line: 103
        file: ''
      uid: b6ee5258-8b0a-451c-9c36-dd71faae44f9
    - text: 'The pair (GDP, Unemployment rate) should come from a small, fixed set
        of macro states (e.g., by year/term): the number of distinct (GDP, Unemployment
        rate) combinations should be limited (observed ~10), e.g., <= 12.

        Deequ-style constraint (expressed via a composite key or custom analyzer):

        - .satisfies("countDistinct(concat_ws(''|'', cast(`GDP` as string), cast(`Unemployment
        rate` as string))) <= 12", "gdp_unemp_states_limited")'
      sources:
      - start_line: 86
        end_line: 109
        file: ''
      uid: 4dac6ff0-f330-4782-894d-b20b09511062
    - text: "Financial indicator columns are binary and jointly used to compute a\
        \ risk score: 'Debtor' \u2208 {0,1}, 'Tuition fees up to date' \u2208 {0,1},\
        \ and 'Scholarship holder' \u2208 {0,1}. This prevents unexpected scaling\
        \ in 'financial_risk'.\nDeequ-style constraints:\n- .isContainedIn(\"Debtor\"\
        , Array(\"0\",\"1\"))\n- .isContainedIn(\"Tuition fees up to date\", Array(\"\
        0\",\"1\"))\n- .isContainedIn(\"Scholarship holder\", Array(\"0\",\"1\"))"
      sources:
