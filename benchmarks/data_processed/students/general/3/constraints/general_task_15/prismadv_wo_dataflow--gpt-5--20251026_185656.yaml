    - text: 'Scale consistency between the two columns: for every row, Unemployment
        rate should be greater than the absolute value of Inflation rate (i.e., Unemployment
        rate > abs(Inflation rate)). This reflects that both are expressed in percentage
        points (not proportions), and catches scale mix-ups (e.g., inflation entered
