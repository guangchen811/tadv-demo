        sem (enrolled)''; and ''Curricular units 1st sem (approved)'' + ''Curricular
        units 1st sem (without evaluations)'' <= ''Curricular units 1st sem (enrolled)''.
        Also, ''Curricular units 1st sem (credited)'' <= ''Curricular units 1st sem
        (approved)''. Additionally, if ''Curricular units 1st sem (enrolled)'' ==
        0 then ''approved'', ''without evaluations'', ''evaluations'', and ''credited''
        should all be 0. Example Deequ checks (compliance >= 0.95): satisfies(''`Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)` and `Curricular
        units 1st sem (approved)` >= 0'', ...), satisfies(''`Curricular units 1st
        sem (without evaluations)` <= `Curricular units 1st sem (enrolled)` and `Curricular
        units 1st sem (without evaluations)` >= 0'', ...), satisfies(''`Curricular
        units 1st sem (approved)` + `Curricular units 1st sem (without evaluations)`
        <= `Curricular units 1st sem (enrolled)`'', ...), satisfies(''`Curricular
        units 1st sem (credited)` <= `Curricular units 1st sem (approved)`'', ...),
        satisfies(''case when `Curricular units 1st sem (enrolled)` = 0 then `Curricular
        units 1st sem (approved)` = 0 and `Curricular units 1st sem (without evaluations)`
        = 0 and `Curricular units 1st sem (evaluations)` = 0 and `Curricular units
        1st sem (credited)` = 0 else true end'', ...).'
