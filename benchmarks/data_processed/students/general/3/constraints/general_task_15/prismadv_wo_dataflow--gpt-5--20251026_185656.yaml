        end_line: 101
        file: ''
      - start_line: 120
        end_line: 125
        file: ''
      uid: c2bb9168-1036-481d-942a-d3961d32b45d
    - text: 'Joint range assumption based on training data: for all rows, -0.8 <=
        Inflation rate <= 3.7 AND 7.6 <= Unemployment rate <= 16.2. This guards against
        unit/scale drift for both features used together by the model. Can be represented
        as a multi-column compliance: compliance("macro_within_training_box", "Inflation
        rate >= -0.8 AND Inflation rate <= 3.7 AND Unemployment rate >= 7.6 AND Unemployment
        rate <= 16.2").'
