  '["Debtor","Scholarship holder","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'Financial status flags must be semantically consistent: no record should
        simultaneously have Debtor = 1 and Tuition fees up to date = 1. Deequ example:
        .addCheck(Check(Level.Error, "consistency").hasCompliance("no_debtor_when_tuition_up",
        "NOT (`Debtor` = 1 AND `Tuition fees up to date` = 1)", _ >= 0.995))'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      uid: 85b98097-c220-405b-8fe9-b37c391c89e2
    - text: 'Scholarship holders should rarely be debtors. At least 95% of rows with
        Scholarship holder = 1 must have Debtor = 0. Deequ example: .addCheck(Check(Level.Warning,
        "scholarship_vs_debt").hasCompliance("scholars_not_debtors", "NOT(`Scholarship
        holder` = 1 AND `Debtor` = 1)", _ >= 0.95))'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      uid: bf112e13-10c0-40ce-8bf3-6cf4b025adb4
    - text: 'Scholarship holders should typically be up to date on tuition. At least
        80% of rows with Scholarship holder = 1 must have Tuition fees up to date
        = 1. Deequ example: .addCheck(Check(Level.Warning, "scholarship_vs_tuition").hasCompliance("scholars_tuition_up",
        "NOT(`Scholarship holder` = 1 AND `Tuition fees up to date` = 0)", _ >= 0.80))'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      uid: 94369578-1b05-4981-9fd2-4bfff44e3ac9
    - text: 'The raw financial risk derived from Debtor, Tuition fees up to date,
        and Scholarship holder should fall within the expected range implied by binary
        encodings. Specifically, for every row: 0 <= (CASE WHEN `Debtor` = 1 THEN
        1 ELSE 0 END) + 0.5*(CASE WHEN `Tuition fees up to date` = 0 THEN 1 ELSE 0
        END) - 0.5*(CASE WHEN `Scholarship holder` = 1 THEN 1 ELSE 0 END) <= 1.5.
        Deequ example: .addCheck(Check(Level.Error, "financial_risk_range").hasCompliance("financial_risk_in_range",
        "((CASE WHEN `Debtor` = 1 THEN 1 ELSE 0 END) + 0.5*(CASE WHEN `Tuition fees
        up to date` = 0 THEN 1 ELSE 0 END) - 0.5*(CASE WHEN `Scholarship holder` =
        1 THEN 1 ELSE 0 END)) >= 0 AND ((CASE WHEN `Debtor` = 1 THEN 1 ELSE 0 END)
        + 0.5*(CASE WHEN `Tuition fees up to date` = 0 THEN 1 ELSE 0 END) - 0.5*(CASE
        WHEN `Scholarship holder` = 1 THEN 1 ELSE 0 END)) <= 1.5", _ >= 1.0))'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      uid: 7a6ab516-8971-4cd6-a841-73d130dbb622
