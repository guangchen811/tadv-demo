constraints:
  Admission grade:
    code:
    - - .isNonNegative('Admission grade')
      - Invalid
    assumptions: []
  Age at enrollment:
    code:
    - - .isNonNegative('Age at enrollment')
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 2nd sem (enrolled)')
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', ['0', '1'])
      - Valid
    assumptions: []
  GDP:
    code:
    - - .isComplete('GDP')
      - Valid
    assumptions: []
  Previous qualification (grade):
    code:
    - - .isNonNegative('Previous qualification (grade)')
      - Invalid
    assumptions: []
  Scholarship holder:
    code:
    - - .isContainedIn('Scholarship holder', ['0', '1'])
      - Valid
    assumptions: []
  Target:
    code:
    - - .isContainedIn('Target', ['Graduate', 'Dropout', 'Enrolled'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', ['0', '1'])
      - Valid
    assumptions: []
