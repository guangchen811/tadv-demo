        file: ''
      uid: 60f4c240-10d7-4f3c-9e0b-b688ad196d15
    - text: 'For 2nd semester, the combined volume of outcomes must not exceed enrollments:
        `Curricular units 2nd sem (approved)` + `Curricular units 2nd sem (without
        evaluations)` + `Curricular units 2nd sem (credited)` <= `Curricular units
        2nd sem (enrolled)`. Deequ example: .addConstraint(Constraint.satisfies("`Curricular
        units 2nd sem (approved)` + `Curricular units 2nd sem (without evaluations)`
        + `Curricular units 2nd sem (credited)` <= `Curricular units 2nd sem (enrolled)`",
        "c2_sum_le_enr"))'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      uid: cc6fe33e-1cac-4b70-b675-e42de11397f8
    - text: 'If no units are enrolled in 2nd semester, then all related counts must
        be zero: when `Curricular units 2nd sem (enrolled)` = 0, then `Curricular
        units 2nd sem (approved)` = 0 AND `Curricular units 2nd sem (without evaluations)`
        = 0 AND `Curricular units 2nd sem (credited)` = 0. Deequ example: .addConstraint(Constraint.satisfies("CASE
        WHEN `Curricular units 2nd sem (enrolled)` = 0 THEN (`Curricular units 2nd
        sem (approved)` = 0 AND `Curricular units 2nd sem (without evaluations)` =
        0 AND `Curricular units 2nd sem (credited)` = 0) ELSE true END", "c2_zero_enr_implies_zero_counts"))'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      uid: 6974e1cd-4027-4f16-b867-a4194886fdb1
    - text: "When there are enrolled units in 2nd semester, the 2nd-semester grade\
        \ must be on the 0\u201320 scale: (`Curricular units 2nd sem (enrolled)` =\
        \ 0) OR (0 <= `Curricular units 2nd sem (grade)` <= 20). Deequ example: .addConstraint(Constraint.satisfies(\"\
        (`Curricular units 2nd sem (enrolled)` = 0) OR (`Curricular units 2nd sem\
        \ (grade)` >= 0 AND `Curricular units 2nd sem (grade)` <= 20)\", \"c2_grade_range_when_enrolled\"\
        ))"
      sources:
      - start_line: 63
        end_line: 63
        file: ''
      uid: 3531633c-ff36-4e93-9935-71ad60b0d8dd
  '["Curricular units 2nd sem (enrolled)","Curricular units 2nd sem (without evaluations)"]':
    code: []
    assumptions:
    - text: 'For every record, the count in ''Curricular units 2nd sem (without evaluations)''
        must be less than or equal to the count in ''Curricular units 2nd sem (enrolled)''
        (and both must be non-negative). This ensures the computed no_eval_ratio2
        = `without evaluations` / `enrolled` remains within [0, 1]. We could represent
        this as a Deequ constraint: .satisfies("`Curricular units 2nd sem (without
        evaluations)` >= 0 AND `Curricular units 2nd sem (enrolled)` >= 0 AND `Curricular
        units 2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`",
        "c2_woe_le_enrolled")'
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      uid: ff160b76-4487-4a61-8805-f86b6422632a
    - text: 'If ''Curricular units 2nd sem (enrolled)'' equals 0 for a record, then
        ''Curricular units 2nd sem (without evaluations)'', ''Curricular units 2nd
        sem (approved)'', and ''Curricular units 2nd sem (credited)'' must all be
        0 for that record. This matches the semantics that without any enrolled units
        there can be no outcomes, and avoids undefined ratios when the code sets the
        denominator to NaN for zeros. Deequ constraint example: .satisfies("CASE WHEN
        `Curricular units 2nd sem (enrolled)` = 0 THEN (`Curricular units 2nd sem
        (without evaluations)` = 0 AND `Curricular units 2nd sem (approved)` = 0 AND
        `Curricular units 2nd sem (credited)` = 0) ELSE true END", "zero_enrolled_implies_zero_outcomes_sem2")'
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      uid: 84d2af32-0b3b-45c6-a347-623fbb551cfb
    - text: 'When ''Curricular units 2nd sem (enrolled)'' > 0, each of the outcome
        counts (''approved'', ''without evaluations'', and ''credited'') must lie
        between 0 and ''enrolled'' (inclusive), so that the derived ratios pass_rate2,
        no_eval_ratio2, and credit_ratio2 are all within [0, 1]. Deequ constraint
        example: .satisfies("CASE WHEN `Curricular units 2nd sem (enrolled)` > 0 THEN
        (`Curricular units 2nd sem (approved)` >= 0 AND `Curricular units 2nd sem
        (approved)` <= `Curricular units 2nd sem (enrolled)` AND `Curricular units
        2nd sem (without evaluations)` >= 0 AND `Curricular units 2nd sem (without
        evaluations)` <= `Curricular units 2nd sem (enrolled)` AND `Curricular units
        2nd sem (credited)` >= 0 AND `Curricular units 2nd sem (credited)` <= `Curricular
        units 2nd sem (enrolled)`) ELSE true END", "bounded_sem2_outcomes_by_enrolled")'
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      uid: 6947ee28-d2ea-4bb8-9624-1b9749cda18d
  Debtor:
    code:
    - suggestion: .isComplete('Debtor')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 1a6086c8-2e70-448f-a5d9-75ab007f07a8
      source_assumptions:
      - ec6941cf-d68b-42e2-abea-09cde0fe33dd
      - 8edbe1e4-cdc8-41b0-aa0e-53dbbc5afec6
    - suggestion: .isContainedIn('Debtor', ['0', '1'])
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: c4ccea03-c68c-4615-ac7b-ada22d3788ea
      source_assumptions:
      - 85e9ad49-e164-4420-80f9-647fc1c96c01
    assumptions:
    - text: 'The input must include a column named ''Debtor'' (case-sensitive). The
        script references it directly to compute finance risk and to export it; absence
        would cause a KeyError. This can be validated with an expectation like: expect_column_to_exist(''Debtor'').'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      uid: ec6941cf-d68b-42e2-abea-09cde0fe33dd
    - text: 'The ''Debtor'' column is a numeric binary indicator with allowed values
        {0, 1}, where 1 means the student is a debtor and 0 means not a debtor. Non-binary
        values should not appear. This can be validated with a rule such as: values
        in set {0,1} for all non-null rows (e.g., Deequ .isContainedIn(''Debtor'',
        [0,1]) >= 1.0 or Great Expectations expect_column_values_to_be_in_set([''0'',''1'',0,1])
        with success >= 1.0).'
      sources:
      - start_line: 46
        end_line: 48
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      uid: 85e9ad49-e164-4420-80f9-647fc1c96c01
    - text: 'The ''Debtor'' column should have no nulls after parsing to numeric.
        The code does not impute or specially handle missing values; NaNs would be
        treated as non-debtor in the risk computation and bias finance_risk downward.
        Validate with a completeness constraint of 1.0 (e.g., Deequ .hasCompleteness(''Debtor'',
        lambda x: x == 1.0) or Great Expectations expect_column_values_to_not_be_null).'
      sources:
      - start_line: 46
        end_line: 48
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      uid: 8edbe1e4-cdc8-41b0-aa0e-53dbbc5afec6
  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'Both ''Tuition fees up to date'' and ''Debtor'' must be present, numeric,
        complete, and strictly binary {0,1} so that equality comparisons to 0/1 and
        the downstream weighting behave as intended. Example Deequ constraints: .hasColumn(''Tuition
        fees up to date''); .hasColumn(''Debtor''); .isComplete(''Tuition fees up
        to date''); .isComplete(''Debtor''); .isContainedIn(''Tuition fees up to date'',
        [0,1]); .isContainedIn(''Debtor'', [0,1]).'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 41
        end_line: 49
        file: ''
      uid: f049223f-e19e-4233-aa9d-884844f583c9
    - text: 'No record should simultaneously indicate fees are up to date and also
        be flagged as a debtor; i.e., the pair (''Tuition fees up to date'' = 1 AND
        ''Debtor'' = 1) is invalid. This keeps the two financial-status flags consistent
        when used together to compute finance_risk via an OR. Deequ: .satisfies(''NOT((`Tuition
        fees up to date` = 1) AND (`Debtor` = 1))'', ''no_conflicting_finance_flags'',
        assertion = _ >= 1.0).'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      uid: 1b39358a-beac-4941-8f0b-c1c0a190f2fe
    - text: 'Debt flag implies fees are not up to date: IF Debtor = 1 THEN ''Tuition
        fees up to date'' = 0. This enforces directional consistency between the two
        indicators used jointly in finance risk. Deequ: .satisfies(''(`Debtor` <>
        1) OR (`Tuition fees up to date` = 0)'', ''debtor_implies_not_up_to_date'',
        assertion = _ >= 1.0).'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      uid: c339c380-2db7-44ea-9895-5042e48d06ac
