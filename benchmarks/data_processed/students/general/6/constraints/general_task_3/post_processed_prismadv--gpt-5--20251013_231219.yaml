    - text: 'First semester unit counts are internally consistent: per row, 0 <= approved
        <= enrolled, 0 <= credited <= enrolled, 0 <= without_evaluations <= enrolled,
        and (approved + credited + without_evaluations) <= enrolled; additionally,
        if enrolled == 0 then approved == 0 and credited == 0 and without_evaluations
        == 0. Example constraint: compliance(''c1_consistency'', ''Curricular units
        1st sem (enrolled) >= 0 and Curricular units 1st sem (approved) >= 0 and Curricular
        units 1st sem (credited) >= 0 and Curricular units 1st sem (without evaluations)
        >= 0 and Curricular units 1st sem (approved) <= Curricular units 1st sem (enrolled)
        and Curricular units 1st sem (credited) <= Curricular units 1st sem (enrolled)
        and Curricular units 1st sem (without evaluations) <= Curricular units 1st
        sem (enrolled) and Curricular units 1st sem (approved) + Curricular units
        1st sem (credited) + Curricular units 1st sem (without evaluations) <= Curricular
        units 1st sem (enrolled) and (Curricular units 1st sem (enrolled) != 0 or
        (Curricular units 1st sem (approved) = 0 and Curricular units 1st sem (credited)
        = 0 and Curricular units 1st sem (without evaluations) = 0))'').'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: 2a1a1edc-4697-4a4e-a1f1-9a634f6cc3d1
    - text: 'Second semester unit counts are internally consistent: per row, 0 <=
        approved <= enrolled, 0 <= credited <= enrolled, 0 <= without_evaluations
        <= enrolled, and (approved + credited + without_evaluations) <= enrolled;
        additionally, if enrolled == 0 then approved == 0 and credited == 0 and without_evaluations
        == 0. Example constraint: compliance(''c2_consistency'', ''Curricular units
        2nd sem (enrolled) >= 0 and Curricular units 2nd sem (approved) >= 0 and Curricular
        units 2nd sem (credited) >= 0 and Curricular units 2nd sem (without evaluations)
        >= 0 and Curricular units 2nd sem (approved) <= Curricular units 2nd sem (enrolled)
        and Curricular units 2nd sem (credited) <= Curricular units 2nd sem (enrolled)
        and Curricular units 2nd sem (without evaluations) <= Curricular units 2nd
        sem (enrolled) and Curricular units 2nd sem (approved) + Curricular units
        2nd sem (credited) + Curricular units 2nd sem (without evaluations) <= Curricular
        units 2nd sem (enrolled) and (Curricular units 2nd sem (enrolled) != 0 or
        (Curricular units 2nd sem (approved) = 0 and Curricular units 2nd sem (credited)
        = 0 and Curricular units 2nd sem (without evaluations) = 0))'').'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      uid: 9ae75114-8164-4bab-8712-02364c3edca0
    - text: '''Tuition fees up to date'' and ''Debtor'' are binary indicators in {0,1},
        and the combination (''Tuition fees up to date'' = 1, ''Debtor'' = 1) should
        not occur (tuition up to date implies not a debtor). Example constraints:
