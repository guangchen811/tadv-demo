    - suggestion: '.hasDataType(''Target'', ''String'', lambda v: v == 1.0)'
      validity: false
      reason_if_invalid: 'Skipping data type constraint: .hasDataType(''Target'',
        ''String'', lambda v: v == 1.0)'
      level: warning
      uid: 87b65768-78f2-4dd2-b7e7-22075c2ea560
      source_assumptions:
      - c09ac2f4-902d-4774-b414-550ffed24d79
      - df04d7f0-61dc-476a-9eb7-a6c023fac235
    assumptions:
    - text: The 'Target' column must exist in the input CSV with the exact header
        name 'Target'. This is required because the code directly accesses df['Target']
        to compute grad_ratio and later includes it in outputs.
      sources:
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 93
        end_line: 93
        file: ''
      uid: df04d7f0-61dc-476a-9eb7-a6c023fac235
    - text: The 'Target' column should be complete (no nulls). Nulls are implicitly
        treated as non-'Graduate' and will distort grad_ratio and the alert budget;
        enforce completeness close to 1.0 (e.g., completeness >= 0.99, ideally 1.0).
        This can be validated with a completeness check.
      sources:
      - start_line: 93
        end_line: 97
        file: ''
      uid: 7200a7a9-6b09-44f5-8ae5-299d44588ec5
    - text: All non-null values in 'Target' must be from the closed set {'Graduate',
        'Dropout', 'Enrolled'}, with exact spelling and case and no leading/trailing
        whitespace. This can be validated with a set-membership check (and optionally
        a regex ^(Graduate|Dropout|Enrolled)$).
      sources:
      - start_line: 93
        end_line: 93
        file: ''
      uid: 412be8a5-6fdf-4089-b336-ab14ed7199a0
    - text: The proportion of 'Graduate' in 'Target' should be bounded away from 0
        and 1 to avoid degenerate alert budgets and thresholds. For example, enforce
        0.05 <= share_of('Graduate') <= 0.95. This can be validated by computing the
        fraction of rows where Target == 'Graduate' and checking it falls within [0.05,
        0.95].
      sources:
      - start_line: 93
        end_line: 99
        file: ''
      uid: 5bc33683-8b98-4b6c-af39-88502c1de07a
    - text: The 'Target' column should be string/categorical (string-like). Non-string
        encodings (e.g., numeric labels) would make the comparison to the literal
        'Graduate' always False, collapsing grad_ratio. Validate with a column data
        type check or by ensuring all values match the allowed string set.
      sources:
      - start_line: 93
        end_line: 93
        file: ''
      uid: c09ac2f4-902d-4774-b414-550ffed24d79
