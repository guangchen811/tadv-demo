constraints:
  Age at enrollment:
    code:
    - - .isNonNegative('Age at enrollment')
      - Invalid
    assumptions: []
  Application order:
    code:
    - - .satisfies('sum(case when `Application order` = 1 then 1 else 0 end) / count(*)
        >= 0.60', 'first_choice_share_gte_0_60')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isBetween('Curricular units 1st sem (grade)', 0.0, 20.0)
      - Invalid
    assumptions: []
  Curricular units 2nd sem (without evaluations):
    code:
    - - .satisfies('sum(case when `Curricular units 2nd sem (without evaluations)`
        <> 0 then 1 else 0 end) / count(*) <= 0.10', 'no_eval_2nd_sem_sparsity_lte_0_10')
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isComplete('Debtor')
      - Valid
    assumptions: []
  GDP:
    code:
    - - .isContainedIn('GDP', [-4.06, -3.12, -1.7, -0.92, 0.32, 0.79, 1.74, 1.79,
        2.02, 3.51])
      - Invalid
    assumptions: []
  Target:
    code:
    - - .isContainedIn('Target', ['Graduate', 'Dropout', 'Enrolled'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', ['0', '1'])
      - Valid
    assumptions: []
