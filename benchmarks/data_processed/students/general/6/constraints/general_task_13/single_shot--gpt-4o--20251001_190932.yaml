      - Valid
    assumptions: []
  Scholarship holder:
    code:
    - - .isContainedIn('Scholarship holder', ['0', '1'])
      - Valid
    assumptions: []
  Target:
    code:
    - - .isComplete('Target')
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', ['0', '1'])
      - Valid
    assumptions: []
  Unemployment rate:
    code:
    - - .isContainedIn('Unemployment rate', ['7.6', '8.9', '9.4', '10.8', '11.1',
        '12.4', '12.7', '13.9', '15.5', '16.2'])
      - Valid
    assumptions: []
