    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - ".isContainedIn('Daytime/evening attendance\t', ['0', '1'])"
      - Valid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', ['0', '1'])
      - Valid
    assumptions: []
  GDP:
    code:
    - - .isContainedIn('GDP', ['-4.06', '-3.12', '-1.7', '-0.92', '0.32', '0.79',
