constraints:
  Admission grade:
    code:
    - - .isBetween('Admission grade', 95.0, 200.0)
      - Invalid
    - - .isComplete('Admission grade')
      - Valid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isNonNegative('Curricular units 1st sem (approved)')
      - Invalid
    - - .satisfies("'Curricular units 1st sem (approved)' <= 'Curricular units 1st
        sem (enrolled)'", "'Approved <= Enrolled (1st Sem)'")
      - Valid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isComplete('Curricular units 1st sem (enrolled)')
      - Valid
    - - .satisfies("'Curricular units 1st sem (enrolled)' >= 'Curricular units 1st
        sem (without evaluations)'", "'Enrolled >= Without Evaluations (1st Sem)'")
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isBetween('Curricular units 1st sem (grade)', 0.0, 20.0)
      - Invalid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .satisfies("'Curricular units 2nd sem (approved)' <= 'Curricular units 2nd
        sem (enrolled)'", "'Approved <= Enrolled (2nd Sem)'")
      - Valid
    assumptions: []
  Curricular units 2nd sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 2nd sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .isBetween('Curricular units 2nd sem (grade)', 0.0, 20.0)
      - Invalid
    - - .isComplete('Curricular units 2nd sem (grade)')
      - Valid
    assumptions: []
  Debtor:
    code:
    - - .hasDataType('Debtor', 'Integral')
      - Invalid
    - - .isContainedIn('Debtor', ['0', '1'])
      - Valid
    assumptions: []
  International:
    code:
    - - .isContainedIn('International', ['0', '1'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', ['0', '1'])
      - Valid
    assumptions: []
