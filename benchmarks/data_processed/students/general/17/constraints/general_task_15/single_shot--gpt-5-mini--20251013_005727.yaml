    assumptions: []
  Curricular units 2nd sem (enrolled):
    code:
    - - .isComplete('Curricular units 2nd sem (enrolled)')
      - Valid
    - - .isGreaterThanOrEqualTo('Curricular units 2nd sem (enrolled)', 0)
      - Invalid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .isGreaterThanOrEqualTo('Curricular units 2nd sem (grade)', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('Curricular units 2nd sem (grade)', 20.0)
      - Invalid
    assumptions: []
  Curricular units 2nd sem (without evaluations):
    code:
    - - .isGreaterThanOrEqualTo('Curricular units 2nd sem (without evaluations)',
        0)
      - Invalid
    - - .isLessThanOrEqualTo('Curricular units 2nd sem (without evaluations)', 'Curricular
        units 2nd sem (enrolled)')
      - Invalid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - .isComplete('Daytime/evening attendance\t')
      - Valid
    - - .isContainedIn('Daytime/evening attendance\t', [0, 1])
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', [0, 1])
      - Invalid
    assumptions: []
  Displaced:
    code:
    - - .isContainedIn('Displaced', [0, 1])
