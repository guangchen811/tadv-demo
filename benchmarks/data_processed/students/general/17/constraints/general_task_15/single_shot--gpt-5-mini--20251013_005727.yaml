constraints:
  Admission grade:
    code:
    - - .isComplete('Admission grade')
      - Valid
    - - .isGreaterThanOrEqualTo('Admission grade', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('Admission grade', 200.0)
      - Invalid
    assumptions: []
  Age at enrollment:
    code:
    - - .isGreaterThanOrEqualTo('Age at enrollment', 15)
      - Invalid
    - - .isLessThanOrEqualTo('Age at enrollment', 100)
      - Invalid
    assumptions: []
  Application order:
    code:
    - - .isComplete('Application order')
      - Valid
    - - .isGreaterThanOrEqualTo('Application order', 1)
      - Invalid
    - - .isLessThanOrEqualTo('Application order', 9)
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isGreaterThanOrEqualTo('Curricular units 1st sem (approved)', 0)
      - Invalid
    - - .isLessThanOrEqualTo('Curricular units 1st sem (approved)', 'Curricular units
        1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isComplete('Curricular units 1st sem (enrolled)')
      - Valid
    - - .isGreaterThanOrEqualTo('Curricular units 1st sem (enrolled)', 0)
      - Invalid
    assumptions: []
  Curricular units 1st sem (evaluations):
    code:
    - - .isGreaterThanOrEqualTo('Curricular units 1st sem (evaluations)', 'Curricular
        units 1st sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isGreaterThanOrEqualTo('Curricular units 1st sem (grade)', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('Curricular units 1st sem (grade)', 20.0)
      - Invalid
    assumptions: []
  Curricular units 2nd sem (approved):
