        end_line: 1119
        file: ''
      uid: 8df15f33-d832-4f31-9c66-ced2d6b6d2fd
    - text: 'For every record, the sum ''Curricular units 2nd sem (approved)'' + ''Curricular
        units 2nd sem (without evaluations)'' must be less than or equal to ''Curricular
        units 2nd sem (enrolled)''. This ensures category counts do not exceed total
        enrolled units and keeps derived ratios logically bounded. This can be enforced
        as a Deequ compliance: approved + without_evaluations <= enrolled (expected
        fraction 1.0).'
      sources:
