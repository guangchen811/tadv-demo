        end_line: 1113
        file: ''
      uid: f95cc3b7-5478-4455-81a3-ba47e4d87141
    - text: 'For every record, the value in ''Curricular units 2nd sem (without evaluations)''
        must be less than or equal to the value in ''Curricular units 2nd sem (enrolled)''.
        This can be enforced as a Deequ compliance constraint such as: without_evaluations
        <= enrolled (expected fraction 1.0).'
      sources:
      - start_line: 1106
        end_line: 1113
        file: ''
      uid: ee812e7c-4f87-40fe-a954-a9082d59553d
    - text: 'If ''Curricular units 2nd sem (enrolled)'' equals 0 for a record, then
        both ''Curricular units 2nd sem (approved)'' and ''Curricular units 2nd sem
        (without evaluations)'' must be 0 for that record (no approvals or no-eval
        units without enrollment). This can be enforced as a conditional Deequ compliance:
        when enrolled = 0 then approved = 0 and without_evaluations = 0 (expected
        fraction 1.0).'
      sources:
