  '["Curricular units 2nd sem (credited)","Curricular units 2nd sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For 2nd semester, category counts must be bounded by total enrolled:
        ''Curricular units 2nd sem (approved)'', ''Curricular units 2nd sem (credited)'',
        and ''Curricular units 2nd sem (without evaluations)'' should each be less
        than or equal to ''Curricular units 2nd sem (enrolled)''. This keeps pass_rate2
        = approved/enrolled and no_eval_ratio2 = without_evaluations/enrolled naturally
        within [0,1] without relying on clipping. Example Deequ constraint: .satisfies("`Curricular
        units 2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)` AND `Curricular
        units 2nd sem (credited)` <= `Curricular units 2nd sem (enrolled)` AND `Curricular
        units 2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`",
        "sem2_components_le_enrolled")'
      sources:
      - start_line: 107
        end_line: 113
        file: ''
      uid: b9c55991-024c-41a9-870d-4f30bf88076d
    - text: 'If ''Curricular units 2nd sem (enrolled)'' is 0, then ''Curricular units
        2nd sem (approved)'', ''Curricular units 2nd sem (credited)'', and ''Curricular
        units 2nd sem (without evaluations)'' must all be 0 (cannot have outcomes
        without enrollment). Example Deequ constraint: .satisfies("CASE WHEN `Curricular
        units 2nd sem (enrolled)` = 0 THEN (`Curricular units 2nd sem (approved)`
        = 0 AND `Curricular units 2nd sem (credited)` = 0 AND `Curricular units 2nd
        sem (without evaluations)` = 0) ELSE TRUE END", "sem2_zero_enrolled_implies_zero_counts")'
      sources:
      - start_line: 107
        end_line: 113
        file: ''
      uid: 635bd4ff-cd2e-482d-b76d-6009bb9b0c93
    - text: 'The 2nd-semester category counts are non-overlapping within the total:
        the sum of ''Curricular units 2nd sem (approved)'' + ''Curricular units 2nd
        sem (credited)'' + ''Curricular units 2nd sem (without evaluations)'' should
        not exceed ''Curricular units 2nd sem (enrolled)''. Example Deequ constraint:
        .satisfies("`Curricular units 2nd sem (approved)` + `Curricular units 2nd
        sem (credited)` + `Curricular units 2nd sem (without evaluations)` <= `Curricular
        units 2nd sem (enrolled)`", "sem2_sum_components_le_enrolled")'
      sources:
      - start_line: 107
        end_line: 113
        file: ''
      uid: 408afb0c-8dde-44c9-a6a2-a48b1e040bf6
  '["Curricular units 2nd sem (enrolled)","Curricular units 2nd sem (without evaluations)"]':
    code: []
    assumptions:
    - text: 'For every record, the number of ''Curricular units 2nd sem (without evaluations)''
        must be less than or equal to the number of ''Curricular units 2nd sem (enrolled)''.
        This prevents ratios like (ne2 / e2) from exceeding 1 when computing no-evaluation
        ratios. Deequ example: .satisfies("`Curricular units 2nd sem (without evaluations)`
        <= `Curricular units 2nd sem (enrolled)`", "c2_noeval_le_enrolled", lambda
        c: c == 1.0)'
      sources:
      - start_line: 1106
        end_line: 1114
        file: ''
      uid: 1f9d6c3a-2745-4b78-80b6-c5b6fc7da363
    - text: 'If ''Curricular units 2nd sem (enrolled)'' equals 0, then both ''Curricular
        units 2nd sem (without evaluations)'' and ''Curricular units 2nd sem (approved)''
        must be 0. This avoids logically impossible states and ensures derived ratios
        default to 0 only when appropriate. Deequ example: .satisfies("(`Curricular
        units 2nd sem (enrolled)` != 0) OR ((`Curricular units 2nd sem (enrolled)`
        = 0) AND (`Curricular units 2nd sem (without evaluations)` = 0) AND (`Curricular
        units 2nd sem (approved)` = 0))", "c2_zero_enrolled_implies_zero_components",
        lambda c: c == 1.0)'
      sources:
      - start_line: 1106
        end_line: 1113
        file: ''
      uid: 23907199-7803-4f22-9322-8068268088a7
    - text: 'For every record, ''Curricular units 2nd sem (approved)'' plus ''Curricular
        units 2nd sem (without evaluations)'' must not exceed ''Curricular units 2nd
        sem (enrolled)''. This enforces that subcategories do not sum beyond the total
        enrolled and is equivalent to keeping pass_rate2 + no_eval_ratio2 <= 1. Deequ
        example: .satisfies("(`Curricular units 2nd sem (approved)` + `Curricular
        units 2nd sem (without evaluations)`) <= `Curricular units 2nd sem (enrolled)`",
        "c2_approved_plus_noeval_le_enrolled", lambda c: c == 1.0)'
      sources:
      - start_line: 1106
        end_line: 1113
        file: ''
      uid: 5d96c968-6b73-4ffe-8abb-80d69e6adf8b
    - text: 'Among rows where ''Curricular units 2nd sem (enrolled)'' > 0, at least
        90% should have ''Curricular units 2nd sem (without evaluations)'' = 0. This
        maintains the sparsity assumption required by the sqrt-based scaling (non-zero
        share <= 10%) and prevents runtime errors. Deequ example: .where("`Curricular
        units 2nd sem (enrolled)` > 0").satisfies("`Curricular units 2nd sem (without
        evaluations)` = 0", "c2_noeval_sparsity_given_enrolled", lambda compliance:
        compliance >= 0.90)'
      sources:
      - start_line: 1116
        end_line: 1119
        file: ''
