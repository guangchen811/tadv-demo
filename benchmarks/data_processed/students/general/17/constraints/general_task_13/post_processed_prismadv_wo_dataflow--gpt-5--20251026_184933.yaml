  '["Application order","Daytime/evening attendance\t"]':
    code: []
    assumptions:
    - text: 'For each semester, the number of approved and the number of without evaluations
        must not exceed the number of enrolled. Formally, per row: 0 <= ''Curricular
        units 1st sem (approved)'' <= ''Curricular units 1st sem (enrolled)'' and
        0 <= ''Curricular units 1st sem (without evaluations)'' <= ''Curricular units
        1st sem (enrolled)''; and similarly for the 2nd semester. This keeps pass_rate
        and no_eval_ratio within [0,1] as used by the risk computation. Example Deequ
        compliance: .hasCompliance("acad_bounds", "`Curricular units 1st sem (approved)`
        <= `Curricular units 1st sem (enrolled)` AND `Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)` AND `Curricular units
        2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)` AND `Curricular
        units 2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`").'
      sources:
      - start_line: 95
        end_line: 103
        file: ''
      - start_line: 105
        end_line: 114
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 3d4f6731-24ca-4e50-8f63-65de973e60e6
    - text: "All three macroeconomic inputs must be restricted to enumerated allowed\
        \ values so that the rank mapping is defined for every row. Specifically:\
        \ 'GDP' \u2208 allowed_gdp, 'Unemployment rate' \u2208 allowed_unemp, and\
        \ 'Inflation rate' \u2208 allowed_infl. Example Deequ compliance: .hasCompliance(\"\
        macro_in_domain\", \"GDP IN (-4.06,-3.12,-1.7,-0.92,0.32,0.79,1.74,1.79,2.02,3.51)\
        \ AND `Unemployment rate` IN (7.6,8.9,9.4,10.8,11.1,12.4,12.7,13.9,15.5,16.2)\
        \ AND `Inflation rate` IN (-0.8,-0.3,0.3,0.5,0.6,1.4,2.6,2.8,3.7)\")."
      sources:
      - start_line: 77
        end_line: 87
        file: ''
      uid: 1f4586bf-c9cb-49eb-a5dc-1b85685dba4b
    - text: 'Application-order cohesion: at least 95% of records must have ''Application
        order'' in {1,2,3,4,5,6} so that sqrt(share_in_allowed - 0.95) is defined
        and the scaling does not error. Example Deequ: .hasCompliance("app_in_allowed",
        "`Application order` IN (1,2,3,4,5,6)").assertion(Compliance >= 0.95).'
      sources:
      - start_line: 62
        end_line: 66
        file: ''
      uid: b8fe1c4f-e425-475d-b8f0-67def93410eb
    - text: 'Fee and scholarship flags used together must be binary and complete.
        ''Debtor'', ''Tuition fees up to date'', and ''Scholarship holder'' should
        each be in {0,1} for 100% of rows to make fee_risk, scholar_bonus, and urgent_fee_flag
        well-defined. Example Deequ: .hasCompleteness("Debtor", 1.0).isContainedIn("Debtor",
        [0,1]); .hasCompleteness("Tuition fees up to date", 1.0).isContainedIn("Tuition
        fees up to date", [0,1]); .hasCompleteness("Scholarship holder", 1.0).isContainedIn("Scholarship
        holder", [0,1]).'
      sources:
      - start_line: 69
        end_line: 75
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: 7eaf14de-7bcb-4aa8-a40f-52b291df9cc9
    - text: "Joint validity of the two target columns used together in the risk computation:\
        \ rows should have both 'Application order' and 'Daytime/evening attendance\\\
        t' populated, with 'Application order' \u2208 {1,2,3,4,5,6} and 'Daytime/evening\
        \ attendance\\t' \u2208 {0,1} for at least 95% of rows. This ensures attendance_risk\
        \ modulation by application-order cohesion remains valid. Example Deequ compliance:\
        \ .hasCompliance(\"app_day_domain\", \"(`Application order` IN (1,2,3,4,5,6))\
        \ AND (`Daytime/evening attendance\\t` IN (0,1))\").assertion(Compliance >=\
        \ 0.95)."
      sources:
      - start_line: 54
        end_line: 58
        file: ''
      - start_line: 62
        end_line: 67
        file: ''
      - start_line: 128
        end_line: 129
        file: ''
      uid: 97f2b64e-8ac7-49d8-8ece-20b3335218bb
  '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For the 1st semester, the number of approved curricular units must be
        between 0 and the number of enrolled curricular units (i.e., 0 <= ''Curricular
        units 1st sem (approved)'' <= ''Curricular units 1st sem (enrolled)''). This
        reflects the intended pass_rate = approved/enrolled in [0,1] without relying
        on clipping. Deequ example: .addConstraint(Compliance(''c1_approved_le_enrolled'',
        ''`Curricular units 1st sem (approved)` >= 0 AND `Curricular units 1st sem
        (approved)` <= `Curricular units 1st sem (enrolled)`''))'
      sources:
      - start_line: 96
        end_line: 102
        file: ''
      uid: 1995044b-40e5-447c-8beb-fa60dc0aed5c
    - text: 'If 1st-semester enrollment is zero, then the number of approved curricular
        units must also be zero (i.e., ''Curricular units 1st sem (enrolled)'' = 0
        implies ''Curricular units 1st sem (approved)'' = 0). This avoids nonsensical
        positive approvals when no one is enrolled and aligns with how the code sets
        pass_rate to 0 when enrollment is 0. Deequ example: .addConstraint(Compliance(''c1_zero_enrolled_implies_zero_approved'',
        ''CASE WHEN `Curricular units 1st sem (enrolled)` = 0 THEN `Curricular units
        1st sem (approved)` = 0 ELSE true END''))'
      sources:
      - start_line: 96
        end_line: 102
        file: ''
      uid: 925eb1a2-d51b-478f-8554-375349305b7d
  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)","Curricular
    units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For every row, the counts in ''Curricular units 1st sem (approved)''
        and ''Curricular units 1st sem (without evaluations)'' must each be less than
        or equal to, and together not exceed, the count in ''Curricular units 1st
        sem (enrolled)''. This ensures the ratios used in the code do not rely on
        clipping. Example Deequ constraint: .hasCompliance("c1_bounds", "`Curricular
        units 1st sem (approved)` >= 0 AND `Curricular units 1st sem (without evaluations)`
        >= 0 AND `Curricular units 1st sem (approved)` <= `Curricular units 1st sem
        (enrolled)` AND `Curricular units 1st sem (without evaluations)` <= `Curricular
        units 1st sem (enrolled)` AND (`Curricular units 1st sem (approved)` + `Curricular
        units 1st sem (without evaluations)`) <= `Curricular units 1st sem (enrolled)`")'
      sources:
      - start_line: 95
        end_line: 103
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: b5df7e83-89fd-4dde-9dbd-d4bbfdddc72f
    - text: 'If ''Curricular units 1st sem (enrolled)'' = 0, then both ''Curricular
        units 1st sem (approved)'' and ''Curricular units 1st sem (without evaluations)''
        must be 0 (no activity when not enrolled). Example Deequ constraint: .hasCompliance("c1_zero_enrolled_implies_zero_others",
        "(`Curricular units 1st sem (enrolled)` = 0 AND `Curricular units 1st sem
        (approved)` = 0 AND `Curricular units 1st sem (without evaluations)` = 0)
        OR (`Curricular units 1st sem (enrolled)` <> 0)")'
      sources:
      - start_line: 100
        end_line: 103
        file: ''
      uid: 03022df1-f552-4e34-b110-08bb07507e35
    - text: 'Mutual exclusivity at extremes: if all enrolled units are without evaluation,
        none can be approved, and vice versa. Specifically: (a) If ''Curricular units
        1st sem (without evaluations)'' = ''Curricular units 1st sem (enrolled)'',
        then ''Curricular units 1st sem (approved)'' = 0; (b) If ''Curricular units
        1st sem (approved)'' = ''Curricular units 1st sem (enrolled)'', then ''Curricular
        units 1st sem (without evaluations)'' = 0. Example Deequ constraints: .hasCompliance("c1_all_noeval_implies_zero_approved",
        "`Curricular units 1st sem (without evaluations)` = `Curricular units 1st
        sem (enrolled)` ==> `Curricular units 1st sem (approved)` = 0") and .hasCompliance("c1_all_approved_implies_zero_noeval",
        "`Curricular units 1st sem (approved)` = `Curricular units 1st sem (enrolled)`
        ==> `Curricular units 1st sem (without evaluations)` = 0")'
      sources:
      - start_line: 101
        end_line: 103
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 313d5e46-200b-4bdd-b918-4854174ff06c
  '["Curricular units 1st sem (credited)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For each record, ''Curricular units 1st sem (credited)'' must be less
        than or equal to ''Curricular units 1st sem (enrolled)''. This keeps credited
        as a subset of the semester''s enrolled units. Deequ example: .satisfies("`Curricular
        units 1st sem (credited)` <= `Curricular units 1st sem (enrolled)`", "c1_crd_le_enr")'
      sources:
      - start_line: 96
        end_line: 96
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      - start_line: 101
        end_line: 102
        file: ''
      uid: c88daa57-b51a-4f6b-9617-c6890b2856a1
    - text: 'If ''Curricular units 1st sem (enrolled)'' equals 0, then ''Curricular
        units 1st sem (credited)'' must be 0. Deequ example: .satisfies("CASE WHEN
        `Curricular units 1st sem (enrolled)` = 0 THEN `Curricular units 1st sem (credited)`
        = 0 ELSE true END", "c1_crd_zero_when_no_enroll")'
      sources:
      - start_line: 96
        end_line: 96
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: dd52eab9-edcb-4b64-a0ed-c30a1df8a672
    - text: '1st-semester outcome counts must not exceed enrollments: ''Curricular
        units 1st sem (approved)'' <= ''Curricular units 1st sem (enrolled)'' and
        ''Curricular units 1st sem (without evaluations)'' <= ''Curricular units 1st
        sem (enrolled)''. This ensures pass_rate1 and no_eval_ratio1 are proper fractions
        without relying on clipping. Deequ examples: .satisfies("`Curricular units
        1st sem (approved)` <= `Curricular units 1st sem (enrolled)`", "c1_apr_le_enr")
        and .satisfies("`Curricular units 1st sem (without evaluations)` <= `Curricular
        units 1st sem (enrolled)`", "c1_noe_le_enr")'
      sources:
      - start_line: 96
        end_line: 103
        file: ''
      uid: e539f51a-3f01-4fd4-b464-569785e571c9
    - text: 'Fee-status consistency: if ''Tuition fees up to date'' = 1 then ''Debtor''
        must be 0 (i.e., the pair (Debtor=1, Tuition fees up to date=1) is invalid).
        Deequ example: .satisfies("NOT(`Debtor` = 1 AND `Tuition fees up to date`
        = 1)", "debtor_tuition_consistent")'
      sources:
      - start_line: 69
        end_line: 75
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: 6d880b97-71ee-4fc3-8f10-6c777e8b54ec
  '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]':
    code: []
    assumptions:
    - text: For every row, 'Curricular units 1st sem (without evaluations)' must be
        between 0 and 'Curricular units 1st sem (enrolled)' (inclusive). This ensures
        the derived ratio no_eval_ratio1 = ne1/e1 is in [0,1] without relying on clipping.
      sources:
      - start_line: 96
        end_line: 103
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: c3503d3b-b64d-4216-9684-50a3a9531269
    - text: If 'Curricular units 1st sem (enrolled)' = 0, then 'Curricular units 1st
        sem (without evaluations)' must be 0. (Equivalently, ne1 > 0 implies e1 >
        0.) This avoids undefined ratios that are currently masked via e1_safe and
        fillna.
      sources:
      - start_line: 100
        end_line: 103
        file: ''
      uid: 00164a18-1989-49f1-8cf4-5755310aed9b
    - text: "Among rows with 'Curricular units 1st sem (enrolled)' > 0, the share\
        \ of rows with 'Curricular units 1st sem (without evaluations)' > 0 should\
        \ be at most 0.10, reflecting the model\u2019s expectation of strong sparsity\
        \ in no-evaluation counts (mirroring the 10% sparsity assumption used for\
        \ 2nd semester)."
      sources:
      - start_line: 96
        end_line: 99
        file: ''
      - start_line: 116
        end_line: 119
        file: ''
      uid: b7353c27-637c-4191-999b-af71ad541c89
    - text: '''Curricular units 1st sem (approved)'' must not exceed ''Curricular
        units 1st sem (enrolled)'' for any row (pass_rate1 = a1/e1 should be in [0,1]
        without requiring clipping).'
      sources:
      - start_line: 96
        end_line: 97
        file: ''
      - start_line: 101
        end_line: 101
        file: ''
      uid: b96d3860-481f-4ea5-8bc9-db9e20db5520
  '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For each record, ''Curricular units 2nd sem (approved)'' must be between
        0 and ''Curricular units 2nd sem (enrolled)'' (inclusive). This keeps the
        derived pass_rate2 = approved/enrolled naturally within [0,1] without relying
        on clipping. Deequ example: .addConstraint(Compliance("c2_approved_le_enrolled",
        "`Curricular units 2nd sem (approved)` >= 0 AND `Curricular units 2nd sem
        (enrolled)` >= 0 AND `Curricular units 2nd sem (approved)` <= `Curricular
        units 2nd sem (enrolled)`"))'
      sources:
      - start_line: 30
        end_line: 34
        file: ''
      - start_line: 106
        end_line: 114
        file: ''
      uid: 26fc64c5-b5e6-416e-9bcc-850329209ca6
    - text: 'No approvals without enrollment: if ''Curricular units 2nd sem (enrolled)''
        = 0, then ''Curricular units 2nd sem (approved)'' must be 0. This matches
        the division guard e2_safe = e2.replace(0, np.nan). Deequ example: .addConstraint(Compliance("c2_no_approvals_without_enrollment",
        "CASE WHEN `Curricular units 2nd sem (enrolled)` = 0 THEN `Curricular units
        2nd sem (approved)` = 0 ELSE true END"))'
      sources:
      - start_line: 30
        end_line: 34
        file: ''
      - start_line: 106
        end_line: 112
        file: ''
      uid: 281c7881-25f5-4192-92e6-9ec23fdce3f6
    - text: 'Outcome components for 2nd semester should not exceed enrollments: ''Curricular
        units 2nd sem (approved)'' + ''Curricular units 2nd sem (credited)'' + ''Curricular
        units 2nd sem (without evaluations)'' <= ''Curricular units 2nd sem (enrolled)''.
        This ensures the separate ratios used downstream are coherent. Deequ example:
        .addConstraint(Compliance("c2_components_bound", "(`Curricular units 2nd sem
        (approved)` + `Curricular units 2nd sem (credited)` + `Curricular units 2nd
        sem (without evaluations)`) <= `Curricular units 2nd sem (enrolled)`"))'
      sources:
      - start_line: 30
        end_line: 34
        file: ''
      - start_line: 106
        end_line: 114
        file: ''
      uid: 584dae74-79bc-4a4b-a475-b361e285a322
  ? '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (enrolled)","Curricular
    units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For every record, the value in ''Curricular units 2nd sem (approved)''
        must be less than or equal to the value in ''Curricular units 2nd sem (enrolled)''.
        This can be enforced as a Deequ compliance constraint such as: approved <=
        enrolled (expected fraction 1.0).'
