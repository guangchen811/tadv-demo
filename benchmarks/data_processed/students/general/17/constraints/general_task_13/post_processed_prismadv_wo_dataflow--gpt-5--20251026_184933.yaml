        end_line: 1113
        file: ''
      uid: db635f42-cab9-4110-85ac-eef7853b3c1d
    - text: 'The share of records with a non-zero value in ''Curricular units 2nd
        sem (without evaluations)'' must be at most 0.10 (i.e., at least 90% of rows
        should have this column equal to 0). This avoids taking the square root of
        a negative number in the downstream calculation. This can be enforced as a
        Deequ compliance like: (without_evaluations = 0) with expected fraction >=
        0.90.'
      sources:
