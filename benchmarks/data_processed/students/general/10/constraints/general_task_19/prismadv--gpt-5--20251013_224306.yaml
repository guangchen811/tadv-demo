      source_assumptions:
      - ab12ebc2-f1f7-4803-a616-604d2d2c24f6
    - suggestion: '.satisfies(''CASE WHEN `Debtor` = 1 THEN 1 ELSE 0 END'', ''Share
        of Debtor=1 between 5% and 25%'', lambda x: x >= 0.05 and x <= 0.25)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 4b0f6450-e49e-43b2-8ec1-736249eb23f4
      source_assumptions:
      - ecca23bf-d9d8-4ff3-8a1c-665a974e149e
    assumptions:
    - text: 'The ''Debtor'' column must be complete (no nulls). The code directly
        compares it to 0 to derive financial_ok, scholarship_renewal_eligible, and
        needs_intervention; nulls would propagate to False and misclassify records.
        Possible validations: Deequ -> hasCompleteness(''Debtor'', lambda x: x ==
        1.0); Great Expectations -> expect_column_values_to_not_be_null(''Debtor'',
        mostly=1.0).'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 68
        end_line: 68
        file: ''
      - start_line: 76
        end_line: 76
        file: ''
      - start_line: 94
        end_line: 98
        file: ''
      uid: 34e95738-d737-48f2-a31a-c54e4b70339a
    - text: 'The ''Debtor'' column is a binary indicator and should only contain values
        {0, 1}, where 0 means no outstanding debt and 1 means debtor. Possible validations:
        Deequ -> satisfies("CASE WHEN `Debtor` IN (0,1) THEN 1 ELSE 0 END", "Debtor
        in {0,1}", lambda x: x == 1.0); Great Expectations -> expect_column_values_to_be_in_set(''Debtor'',
        [0, 1], mostly=1.0).'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 68
        end_line: 68
        file: ''
      uid: 052daced-5d10-4c99-a706-67bd520b7ee8
    - text: 'The ''Debtor'' column should be numeric/integral (not string-coded),
        so that comparisons to the integer 0 behave as intended. Possible validations:
        Deequ -> hasDataType(''Debtor'', ConstrainableDataTypes.Integral); Great Expectations
        -> expect_column_values_to_be_in_type_list(''Debtor'', [''int64'',''int32'',''int'',''long'',''byte'',''short'',''bool'',''boolean'']).'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 68
        end_line: 68
        file: ''
      uid: ab12ebc2-f1f7-4803-a616-604d2d2c24f6
    - text: 'To detect distribution drift consistent with current data (about 11.7%
        of values are 1), the proportion of ''Debtor'' == 1 should be within a reasonable
        band, e.g., between 0.05 and 0.25. This keeps downstream financial_ok rates
        aligned with expectations. Possible validations: Deequ -> satisfies("CASE
        WHEN `Debtor` = 1 THEN 1 ELSE 0 END", "Share of Debtor=1", lambda x: x >=
        0.05 and x <= 0.25); Great Expectations -> expect_column_mean_to_be_between(''Debtor'',
        min_value=0.05, max_value=0.25).'
      sources:
      - start_line: 68
        end_line: 68
        file: ''
      - start_line: 94
        end_line: 98
        file: ''
      uid: ecca23bf-d9d8-4ff3-8a1c-665a974e149e
  '["Debtor","Scholarship holder","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'The ''Tuition fees up to date'' and ''Debtor'' columns are mutually exclusive:
        no record should have both Tuition fees up to date = 1 and Debtor = 1. (Deequ
        example: .addConstraint(Constraints.satisfies(''NOT((`Tuition fees up to date`
        = 1) AND (`Debtor` = 1))'', [''Tuition fees up to date'',''Debtor''], ''fees_and_debtor_conflict'')))'
      sources:
      - start_line: 68
        end_line: 68
        file: ''
      uid: ebf18114-caaf-4809-99ab-ac6eb180b63b
    - text: 'The three indicator columns ''Tuition fees up to date'', ''Debtor'',
        and ''Scholarship holder'' are used as complete binary flags taking only values
        {0,1} across all records. (Deequ example: .addConstraint(Constraints.satisfies(''(`Tuition
        fees up to date` IN (0,1)) AND (`Debtor` IN (0,1)) AND (`Scholarship holder`
        IN (0,1))'', [''Tuition fees up to date'',''Debtor'',''Scholarship holder''],
        ''binary_flags''))) '
      sources:
      - start_line: 40
        end_line: 42
        file: ''
      - start_line: 68
        end_line: 68
        file: ''
      - start_line: 76
        end_line: 76
        file: ''
      - start_line: 88
        end_line: 89
        file: ''
      uid: 1fb254fb-5e83-4c57-b432-0d4cbdd6cf69
    - text: 'In the output, ''financial_ok'' must equal the conjunction of input flags:
        (Tuition fees up to date = 1) AND (Debtor = 0) for every row. (Deequ example
        on the output dataset: .addConstraint(Constraints.satisfies(''`financial_ok`
        = ((`Tuition fees up to date` = 1) AND (`Debtor` = 0))'', [''financial_ok'',''Tuition
        fees up to date'',''Debtor''], ''financial_ok_definition'')))'
      sources:
      - start_line: 68
        end_line: 68
        file: ''
      - start_line: 87
        end_line: 87
        file: ''
      uid: 47338c8a-b7f9-4b66-8d65-4b4e19d9aab0
    - text: 'A row can be marked ''scholarship_renewal_eligible'' only if it is a
        scholarship holder and is financially OK; i.e., scholarship_renewal_eligible
        => (scholarship_holder = True) AND (financial_ok = True). (Deequ example on
        the output dataset: .addConstraint(Constraints.satisfies(''NOT (`scholarship_renewal_eligible`
        AND (NOT `scholarship_holder` OR NOT `financial_ok`))'', [''scholarship_renewal_eligible'',''scholarship_holder'',''financial_ok''],
        ''renewal_requires_holder_and_financial_ok'')))'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 87
        end_line: 89
        file: ''
      uid: 02a2b402-a56e-4b1b-8592-6504ff2607be
    - text: 'In the output, any scholarship holder who is not renewal-eligible must
        be flagged as needing intervention; i.e., (scholarship_holder = True AND scholarship_renewal_eligible
        = False) => needs_intervention = True. (Deequ example on the output dataset:
        .addConstraint(Constraints.satisfies(''NOT (`scholarship_holder` AND NOT `scholarship_renewal_eligible`
        AND NOT `needs_intervention`)'', [''scholarship_holder'',''scholarship_renewal_eligible'',''needs_intervention''],
        ''intervention_required_for_ineligible_scholars'')))'
      sources:
      - start_line: 94
        end_line: 98
        file: ''
      uid: 38de8a3d-2404-4503-9f9c-29d6d40e087f
  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'Both ''Tuition fees up to date'' and ''Debtor'' are binary (0/1) and
        non-null flags used together to derive financial status. This can be validated
        with Deequ constraints such as: .hasCompleteness(''Tuition fees up to date'',
        1.0), .hasCompleteness(''Debtor'', 1.0), .isContainedIn(''Tuition fees up
        to date'', [0, 1]), .isContainedIn(''Debtor'', [0, 1]).'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      - start_line: 68
        end_line: 68
        file: ''
      uid: f4defe1f-17af-4b39-b163-6f0b1f5a7819
    - text: 'Semantic consistency between the two flags: a student cannot simultaneously
        have tuition fees up to date and be a debtor. Enforce that there are no rows
        where (''Tuition fees up to date'' = 1 AND ''Debtor'' = 1). In Deequ: .satisfies(''NOT((`Tuition
        fees up to date` = 1 AND `Debtor` = 1))'', ''no_paid_and_debtor_conflict'').'
      sources:
      - start_line: 68
        end_line: 68
        file: ''
      uid: 36420a35-b304-4667-b8fb-a312e8ba4ddd
    - text: 'The financially OK condition is defined jointly by the two columns and
        should hold for a large majority of records: (''Tuition fees up to date''
        = 1 AND ''Debtor'' = 0). Validate a minimum compliance rate (e.g., >= 0.75)
        with Deequ: .satisfies(''(`Tuition fees up to date` = 1 AND `Debtor` = 0)'',
        ''financial_ok_majority'', minCompliance = 0.75).'
      sources:
      - start_line: 68
        end_line: 68
        file: ''
      - start_line: 94
        end_line: 98
        file: ''
      uid: 25521bd3-57b5-4fe1-8d4f-d5cd4e8045a9
