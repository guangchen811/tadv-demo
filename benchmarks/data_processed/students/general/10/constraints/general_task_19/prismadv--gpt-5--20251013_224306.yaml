    - suggestion: '.isContainedIn(''Debtor'', [0, 1], lambda x: x == 1.0)'
      validity: false
      reason_if_invalid: "Unable to instantiate constraint '.isContainedIn('Debtor',\
        \ [0, 1], lambda x: x == 1.0)': An error occurred while calling None.None.\
        \ Trace:\npy4j.Py4JException: Cannot convert java.lang.Integer to java.lang.String\n\
        \tat py4j.commands.ArrayCommand.convertArgument(ArrayCommand.java:166)\n\t\
