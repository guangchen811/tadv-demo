      uid: 9d807096-60c6-4fed-b88c-2cff1398a669
    - text: 'If there is at least one unit without evaluation in term 2, then not
        all enrolled units were evaluated: (`Curricular units 2nd sem (without evaluations)`
        > 0) -> (`Curricular units 2nd sem (evaluations)` < `Curricular units 2nd
        sem (enrolled)`). Deequ: .satisfies("(`Curricular units 2nd sem (without evaluations)`
        <= 0) OR (`Curricular units 2nd sem (evaluations)` < `Curricular units 2nd
        sem (enrolled)`)", "Term2 no-show implies evaluations < enrolled")'
      sources:
      - start_line: 56
        end_line: 59
        file: ''
      - start_line: 33
        end_line: 34
        file: ''
      uid: 2b326571-d189-46ff-a8d2-2471de25829e
    - text: 'If a student is not enrolled in any unit in term 2, then both evaluations
        and without-evaluations counts must be zero: (`Curricular units 2nd sem (enrolled)`
        = 0) -> (`Curricular units 2nd sem (evaluations)` = 0 AND `Curricular units
        2nd sem (without evaluations)` = 0). Deequ: .satisfies("(`Curricular units
        2nd sem (enrolled)` != 0) OR ((`Curricular units 2nd sem (evaluations)` =
        0) AND (`Curricular units 2nd sem (without evaluations)` = 0))", "Term2 zero
        enrollment implies zero evaluations and zero without-evaluations")'
      sources:
      - start_line: 33
        end_line: 37
        file: ''
      - start_line: 50
        end_line: 52
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      uid: 6b51b051-8561-466c-9128-4001581ac231
    - text: 'If there are no units without evaluation in term 2, all enrolled units
        should be counted as evaluated: (`Curricular units 2nd sem (without evaluations)`
        = 0) -> (`Curricular units 2nd sem (evaluations)` = `Curricular units 2nd
        sem (enrolled)`). Deequ: .satisfies("(`Curricular units 2nd sem (without evaluations)`
        != 0) OR (`Curricular units 2nd sem (evaluations)` = `Curricular units 2nd
        sem (enrolled)`)", "Term2 no ''without evaluations'' implies evaluations equals
        enrolled")'
      sources:
      - start_line: 33
        end_line: 37
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      uid: ed48d76b-9723-44c0-b4cf-b400fd7305ff
    - text: 'Approval rate computation assumes approvals do not exceed evaluated units
        in term 2: `Curricular units 2nd sem (approved)` <= `Curricular units 2nd
        sem (evaluations)`; additionally, if `Curricular units 2nd sem (evaluations)`
        = 0 then `Curricular units 2nd sem (approved)` = 0. Deequ: .satisfies("(`Curricular
        units 2nd sem (approved)` <= `Curricular units 2nd sem (evaluations)`) AND
        ((`Curricular units 2nd sem (evaluations)` != 0) OR (`Curricular units 2nd
        sem (approved)` = 0))", "Term2 approvals within evaluations and zero when
        no evaluations")'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: b16bfb44-d015-42b6-b5a3-30e003109ec9
  '["Curricular units 2nd sem (enrolled)","Curricular units 2nd sem (without evaluations)"]':
    code: []
    assumptions:
    - text: 'For every row, ''Curricular units 2nd sem (without evaluations)'' must
        be a subset of ''Curricular units 2nd sem (enrolled)'': 0 <= `Curricular units
        2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`. Deequ
        example: .satisfies("`Curricular units 2nd sem (without evaluations)` >= 0
        AND `Curricular units 2nd sem (without evaluations)` <= `Curricular units
        2nd sem (enrolled)`", "we2_within_enrolled_sem2").'
      sources:
      - start_line: 33
        end_line: 37
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      uid: aa78fe7c-1cdb-4031-a490-598710a3ecab
    - text: 'If ''Curricular units 2nd sem (enrolled)'' is 0, then ''Curricular units
        2nd sem (without evaluations)'' must be 0 (no enrolled units implies no units
        without evaluations). Deequ example: .satisfies("CASE WHEN `Curricular units
        2nd sem (enrolled)` = 0 THEN `Curricular units 2nd sem (without evaluations)`
        = 0 ELSE true END", "no_we2_when_no_enroll_sem2").'
      sources:
      - start_line: 33
        end_line: 37
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      uid: 2c2f2820-8a68-4a51-8bc4-c185f1951f63
    - text: 'The enrolled 2nd-semester units should equal the sum of units with evaluations
        and units without evaluations: `Curricular units 2nd sem (enrolled)` = `Curricular
        units 2nd sem (evaluations)` + `Curricular units 2nd sem (without evaluations)`.
        Deequ example: .satisfies("`Curricular units 2nd sem (enrolled)` = `Curricular
        units 2nd sem (evaluations)` + `Curricular units 2nd sem (without evaluations)`",
        "enrolled_eq_eval_plus_noeval_sem2").'
      sources:
      - start_line: 33
        end_line: 37
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: ab56321f-86d2-43c5-9549-8dd832b7d529
  Debtor:
    code:
    - suggestion: .isComplete('Debtor')
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 3f78965e-5e25-41f6-a04b-b278c5c7fa09
