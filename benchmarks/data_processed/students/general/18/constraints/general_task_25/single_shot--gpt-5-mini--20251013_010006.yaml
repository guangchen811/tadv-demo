constraints:
  Curricular units 1st sem (approved):
    code:
    - - .isComplete('Curricular units 1st sem (approved)')
      - Valid
    assumptions: []
  Curricular units 1st sem (credited):
    code:
    - - .isComplete('Curricular units 1st sem (credited)')
      - Valid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isComplete('Curricular units 1st sem (enrolled)')
      - Valid
    assumptions: []
  Curricular units 1st sem (evaluations):
    code:
    - - .isComplete('Curricular units 1st sem (evaluations)')
      - Valid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isComplete('Curricular units 1st sem (grade)')
      - Valid
    assumptions: []
  Curricular units 1st sem (without evaluations):
    code:
    - - .isComplete('Curricular units 1st sem (without evaluations)')
      - Valid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - ".isComplete('Daytime/evening attendance\t')"
      - Valid
    assumptions: []
  Debtor:
    code:
    - - .isComplete('Debtor')
      - Valid
    assumptions: []
  International:
    code:
    - - .isComplete('International')
      - Valid
    assumptions: []
  Nacionality:
    code:
    - - .isComplete('Nacionality')
      - Valid
    assumptions: []
  Target:
    code:
    - - .isComplete('Target')
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isComplete('Tuition fees up to date')
      - Valid
    assumptions: []
  approved_le_enrolled:
    code:
    - - .satisfies("`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (enrolled)`", 'approved_le_enrolled')
      - Valid
    assumptions: []
  approved_le_evals:
    code:
    - - .satisfies("`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (evaluations)`", 'approved_le_evals')
      - Valid
    assumptions: []
  boolean_flags_in_0_1:
    code:
    - - .satisfies("`Debtor` IN (0,1) AND `Tuition fees up to date` IN (0,1) AND `International`
        IN (0,1) AND `Daytime/evening attendance\t` IN (0,1)", 'boolean_flags_in_0_1')
      - Valid
    assumptions: []
  credited_le_enrolled:
    code:
    - - .satisfies("`Curricular units 1st sem (credited)` <= `Curricular units 1st
        sem (enrolled)`", 'credited_le_enrolled')
      - Valid
    assumptions: []
  enrolled_ge_without:
    code:
    - - .satisfies("`Curricular units 1st sem (enrolled)` >= `Curricular units 1st
        sem (without evaluations)`", 'enrolled_ge_without')
      - Valid
    assumptions: []
  grade_between_0_20:
    code:
    - - .satisfies("`Curricular units 1st sem (grade)` >= 0 AND `Curricular units
        1st sem (grade)` <= 20", 'grade_between_0_20')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
  nationality_non_negative:
    code:
    - - .satisfies("`Nacionality` >= 0", 'nationality_non_negative')
      - Valid
    assumptions: []
  non_negative_counts:
    code:
    - - .satisfies("`Curricular units 1st sem (enrolled)` >= 0 AND `Curricular units
        1st sem (evaluations)` >= 0 AND `Curricular units 1st sem (without evaluations)`
        >= 0 AND `Curricular units 1st sem (approved)` >= 0 AND `Curricular units
        1st sem (credited)` >= 0", 'non_negative_counts')
      - Valid
    assumptions: []
  target_values:
    code:
    - - .satisfies("`Target` IN ('Graduate','Dropout','Enrolled')", 'target_values')
      - Valid
    assumptions: []
