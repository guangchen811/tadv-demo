        end_line: 50
        file: ''
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 38
        end_line: 38
        file: ''
      uid: 83e18069-3294-4a6e-b566-dccdc92a7069
    - text: 'The enrolled units are partitioned into those with and without evaluations:
        `Curricular units 1st sem (evaluations)` + `Curricular units 1st sem (without
        evaluations)` equals `Curricular units 1st sem (enrolled)` for every row (equivalently,
        evaluations = enrolled - without evaluations). Deequ example: .satisfies(''`Curricular
        units 1st sem (evaluations)` + `Curricular units 1st sem (without evaluations)`
        = `Curricular units 1st sem (enrolled)`'', ''evals_partition_enrolled'').'
