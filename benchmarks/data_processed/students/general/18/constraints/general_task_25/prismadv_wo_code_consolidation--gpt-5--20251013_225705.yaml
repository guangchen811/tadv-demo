    assumptions:
    - text: 'For every record, ''Curricular units 1st sem (without evaluations)''
        must be between 0 and ''Curricular units 1st sem (enrolled)''. This ensures
        attended = enrolled - without_evals is non-negative and evaluation_rate remains
        within [0,1]. Deequ example: .satisfies(''`Curricular units 1st sem (without
        evaluations)` >= 0 AND `Curricular units 1st sem (without evaluations)` <=
        `Curricular units 1st sem (enrolled)`'').'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      uid: c3bbae21-ae16-415e-afe7-19e3994bde3f
    - text: 'The balance identity should hold row-wise: ''Curricular units 1st sem
        (evaluations)'' + ''Curricular units 1st sem (without evaluations)'' = ''Curricular
        units 1st sem (enrolled)''. This aligns the notion of evaluated vs. non-evaluated
        enrolled units. Deequ example: .satisfies(''`Curricular units 1st sem (evaluations)`
        + `Curricular units 1st sem (without evaluations)` = `Curricular units 1st
        sem (enrolled)`'').'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: 97d6cdca-de9a-4bed-a16b-2037ffcdba27
    - text: 'If ''Curricular units 1st sem (enrolled)'' = 0, then both ''Curricular
        units 1st sem (evaluations)'' and ''Curricular units 1st sem (without evaluations)''
        must be 0 (no enrolled units implies no evaluated or unevaluated units). Deequ
        example: .satisfies(''CASE WHEN `Curricular units 1st sem (enrolled)` = 0
        THEN `Curricular units 1st sem (evaluations)` = 0 AND `Curricular units 1st
        sem (without evaluations)` = 0 ELSE true END'').'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: bd426d49-9759-4302-ab63-4a52e087e708
  '["Curricular units 1st sem (evaluations)","Curricular units 1st sem (grade)"]':
    code: []
    assumptions:
    - text: 'Evaluations should be consistent with enrollment and non-evaluated units:
        the number of curricular units with evaluations equals enrolled minus without
        evaluations, and never exceeds enrolled. This can be enforced as Deequ constraints
        such as: .satisfies(''`Curricular units 1st sem (evaluations)` >= 0 AND `Curricular
        units 1st sem (evaluations)` <= `Curricular units 1st sem (enrolled)`'', ''evals_within_enrolled'')
        and .satisfies(''`Curricular units 1st sem (evaluations)` = `Curricular units
        1st sem (enrolled)` - `Curricular units 1st sem (without evaluations)`'',
        ''evals_match_attended'').'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 44
        end_line: 46
        file: ''
      uid: 6de93423-aa3e-4c43-b548-62977dfa1533
    - text: 'Pass rate computation assumes approvals are bounded by evaluations: 0
        <= approved <= evaluations, and if evaluations = 0 then approved must be 0.
        Example Deequ constraints: .satisfies(''`Curricular units 1st sem (approved)`
        >= 0 AND `Curricular units 1st sem (approved)` <= `Curricular units 1st sem
        (evaluations)`'', ''approved_within_evals'') and .satisfies(''(`Curricular
        units 1st sem (evaluations)` != 0) OR (`Curricular units 1st sem (approved)`
        = 0)'', ''no_approvals_when_no_evals'').'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 47
        end_line: 48
        file: ''
      uid: 05fada13-236d-46b8-9c0a-75afb1e45b96
    - text: 'Grades are used as a [0, 20] score and normalized by 20 before risk aggregation;
        to avoid invalid risk calculations, grade must be present and within [0, 20].
        Additionally, when evaluations = 0 (no evaluated units), grade should be 0
        (no grade realized). Example Deequ constraints: .satisfies(''`Curricular units
        1st sem (grade)` >= 0 AND `Curricular units 1st sem (grade)` <= 20'', ''grade_in_0_20'')
        and .satisfies(''(`Curricular units 1st sem (evaluations)` != 0) OR (`Curricular
        units 1st sem (grade)` = 0)'', ''zero_grade_when_no_evals'').'
      sources:
      - start_line: 23
        end_line: 23
        file: ''
      - start_line: 39
        end_line: 39
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
      - start_line: 57
        end_line: 63
        file: ''
      uid: 4430bc78-6404-44e0-a98f-8c31b7dbcb97
    - text: 'All ratios used in risk (evaluation_rate, pass_rate, credit_ratio, grade_norm)
        must be in [0, 1], which implies the following multi-column bounds hold simultaneously:
        0 <= approved <= evaluations; 0 <= credited <= enrolled; 0 <= without evaluations
        <= enrolled; and 0 <= grade <= 20. Example Deequ constraints: .satisfies(''`Curricular
        units 1st sem (approved)` >= 0 AND `Curricular units 1st sem (approved)` <=
        `Curricular units 1st sem (evaluations)`'', ''approved_le_evals''), .satisfies(''`Curricular
        units 1st sem (credited)` >= 0 AND `Curricular units 1st sem (credited)` <=
        `Curricular units 1st sem (enrolled)`'', ''credited_le_enrolled''), .satisfies(''`Curricular
        units 1st sem (without evaluations)` >= 0 AND `Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)`'', ''without_le_enrolled''),
        .satisfies(''`Curricular units 1st sem (grade)` >= 0 AND `Curricular units
        1st sem (grade)` <= 20'', ''grade_in_range'').'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      - start_line: 47
        end_line: 51
        file: ''
      - start_line: 57
        end_line: 63
        file: ''
