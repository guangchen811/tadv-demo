  '["Curricular units 1st sem (credited)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'Per record, credited curricular units for 1st semester must not exceed
        enrolled units, and must be 0 when enrolled is 0. This keeps credit_ratio
        in [0,1] and avoids inflating risk. Deequ examples: .satisfies(''`Curricular
        units 1st sem (credited)` <= `Curricular units 1st sem (enrolled)`'', ''credited_le_enrolled'')
        and .satisfies(''(`Curricular units 1st sem (enrolled)` != 0) OR (`Curricular
        units 1st sem (credited)` = 0)'', ''no_credit_when_no_enrollment'').'
