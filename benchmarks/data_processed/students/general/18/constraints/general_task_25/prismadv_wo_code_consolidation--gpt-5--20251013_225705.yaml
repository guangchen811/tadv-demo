    - text: 'Approved units cannot exceed evaluated units, and evaluated units cannot
        exceed enrolled units: `Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (evaluations)` <= `Curricular units 1st sem (enrolled)`. Deequ
        examples: .satisfies(''`Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (evaluations)`'', ''approved_le_evals'') and .satisfies(''`Curricular
        units 1st sem (evaluations)` <= `Curricular units 1st sem (enrolled)`'', ''evals_le_enrolled'').'
