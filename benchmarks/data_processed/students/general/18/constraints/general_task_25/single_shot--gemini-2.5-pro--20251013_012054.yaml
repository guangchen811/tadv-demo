constraints:
  Curricular units 1st sem (approved):
    code:
    - - .isNonNegative('Curricular units 1st sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (evaluations):
    code:
    - - .isNonNegative('Curricular units 1st sem (evaluations)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isComplete('Curricular units 1st sem (grade)')
      - Valid
    - - .isContainedIn('Curricular units 1st sem (grade)', 0.0, 20.0)
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', ['0', '1'])
      - Valid
    assumptions: []
  International:
    code:
    - - .isContainedIn('International', ['0', '1'])
      - Valid
    assumptions: []
  'Logical Consistency: Approved vs Evaluations':
    code:
    - - .hasConstraint("`Curricular units 1st sem (approved)` <= `Curricular units
        1st sem (evaluations)`", "approved_units_le_evaluated_units")
      - Invalid
    assumptions: []
  'Logical Consistency: Credited vs Enrolled':
    code:
    - - .hasConstraint("`Curricular units 1st sem (credited)` <= `Curricular units
        1st sem (enrolled)`", "credited_units_le_enrolled_units")
      - Invalid
    assumptions: []
  'Logical Consistency: Evaluations vs Enrolled':
    code:
    - - .hasConstraint("`Curricular units 1st sem (evaluations)` <= `Curricular units
        1st sem (enrolled)`", "evaluated_units_le_enrolled_units")
      - Invalid
    assumptions: []
  Nacionality:
    code:
    - - .isPositive('Nacionality')
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', ['0', '1'])
      - Valid
    assumptions: []
