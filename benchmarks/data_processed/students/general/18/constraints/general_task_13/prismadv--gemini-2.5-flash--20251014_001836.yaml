      - start_line: 101
        end_line: 102
        file: ''
      uid: b506f2d8-310e-49dd-b51c-a356228eb765
    - text: For each record, the value in 'Curricular units 2nd sem (approved)' must
        be less than or equal to the value in 'Curricular units 2nd sem (enrolled)'.
        Similarly, the value in 'Curricular units 2nd sem (without evaluations)' must
        be less than or equal to the value in 'Curricular units 2nd sem (enrolled)'.
        All three columns are expected to contain non-negative numerical values. This
        prevents ratios from exceeding 1.0 and ensures valid academic progress metrics.
      sources:
      - start_line: 112
        end_line: 113
        file: ''
      uid: 90d92d5f-ffb3-45f0-ae7f-f369f0199db1
    - text: All values in the 'GDP' column must be present in the predefined list
        of allowed GDP values (allowed_gdp). Similarly, all values in the 'Unemployment
        rate' column must be present in the predefined list of allowed unemployment
        rates (allowed_unemp), and all values in the 'Inflation rate' column must
        be present in the predefined list of allowed inflation rates (allowed_infl).
        Any value not in these lists would result in NaN during the mapping process,
        leading to errors or incorrect macro stress calculations.
      sources:
      - start_line: 77
        end_line: 87
        file: ''
      uid: 740fb606-524c-452a-b3da-6c6c88d64d80
    - text: 'The columns ''Debtor'', ''Tuition fees up to date'', and ''Scholarship
        holder'' are expected to contain only binary values (0 or 1). The code relies
        on specific logical combinations of these columns for risk assessment and
        flagging: (1) a record is flagged as ''urgent fee'' if ''Debtor'' is 1 AND
        ''Tuition fees up to date'' is 0, and (2) a ''Scholarship holder'' receives
        a bonus only if ''Tuition fees up to date'' is 1. These specific binary state
        combinations are assumed to be valid and meaningful for the downstream logic.'
      sources:
      - start_line: 73
        end_line: 74
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: b14e225c-169e-4960-9380-460d1913469c
