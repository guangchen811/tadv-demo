constraints:
  Admission grade:
    code:
    - - .hasDataType('Admission grade', 'Fractional')
      - Invalid
    - - .isNonNegative('Admission grade')
      - Invalid
    assumptions: []
  Age at enrollment:
    code:
    - - .hasDataType('Age at enrollment', 'Integral')
      - Invalid
    - - .hasMin('Age at enrollment', 16)
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isNonNegative('Curricular units 1st sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .hasMax('Curricular units 1st sem (grade)', 20.0)
      - Invalid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .isNonNegative('Curricular units 2nd sem (grade)')
      - Invalid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - .isComplete('Daytime/evening attendance\t')
      - Valid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', [0, 1])
      - Invalid
    assumptions: []
  Target:
    code:
    - - .hasDataType('Target', 'String')
      - Invalid
    - - .isComplete('Target')
      - Valid
    - - .isContainedIn('Target', ['Graduate', 'Dropout', 'Enrolled'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', [0, 1])
      - Invalid
    assumptions: []
  dataframe:
    code:
    - - .satisfies("'Curricular units 1st sem (approved)' <= 'Curricular units 1st
        sem (enrolled)'", 'sem1_approved_le_enrolled')
      - Valid
    - - .satisfies("'Curricular units 2nd sem (approved)' <= 'Curricular units 2nd
        sem (enrolled)'", 'sem2_approved_le_enrolled')
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
