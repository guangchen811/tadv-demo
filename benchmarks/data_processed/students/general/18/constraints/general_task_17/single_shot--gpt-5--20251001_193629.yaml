constraints:
  Admission grade:
    code:
    - - '.hasMax(''Admission grade'', lambda v: v <= 200.0)'
      - Valid
    - - '.hasMin(''Admission grade'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('Admission grade')
      - Valid
    assumptions: []
  Application order:
    code:
    - - .isComplete('Application order')
      - Valid
    - - .isContainedIn('Application order', [1,2,3,4,5,6,7,8,9])
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - '.hasCorrelation(''Curricular units 1st sem (approved)'', ''Curricular units
        1st sem (enrolled)'', lambda v: v >= 0.5)'
