    - text: "Debtor and Tuition fees up to date are complementary binary indicators\
        \ and must be jointly consistent per row. Specifically: Debtor \u2208 {0,1},\
        \ Tuition fees up to date \u2208 {0,1}, and Debtor + Tuition fees up to date\
        \ = 1 (i.e., a student cannot be a debtor while also having fees up to date,\
        \ and cannot have fees not up to date while not being a debtor). Constraint\
        \ suggestion: satisfies('(`Debtor` in (0,1)) and (`Tuition fees up to date`\
        \ in (0,1)) and (`Debtor` + `Tuition fees up to date` = 1)', 'payment status\
        \ consistency')."
