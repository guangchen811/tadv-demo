      - start_line: 61
        end_line: 65
        file: ''
      uid: c321db0e-7d27-404b-b687-abb6974d88f0
    - text: 'Semester 1 counts must be internally consistent: all are non-negative
        integers and bounded by enrollment. Specifically: 0 <= Approved1 <= Enrolled1,
        0 <= Credited1 <= Enrolled1, 0 <= WithoutEval1 <= Enrolled1, and Approved1
        + Credited1 + WithoutEval1 <= Enrolled1. Constraint suggestion: satisfies(''(`Curricular
        units 1st sem (enrolled)` >= 0) and (`Curricular units 1st sem (approved)`
        >= 0) and (`Curricular units 1st sem (credited)` >= 0) and (`Curricular units
        1st sem (without evaluations)` >= 0) and (`Curricular units 1st sem (approved)`
        <= `Curricular units 1st sem (enrolled)`) and (`Curricular units 1st sem (credited)`
        <= `Curricular units 1st sem (enrolled)`) and (`Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)`) and ((`Curricular
        units 1st sem (approved)` + `Curricular units 1st sem (credited)` + `Curricular
        units 1st sem (without evaluations)`) <= `Curricular units 1st sem (enrolled)`)'',
        ''S1 count consistency'').'
      sources:
      - start_line: 71
        end_line: 79
        file: ''
      uid: 01c34b37-9684-4dbb-a4da-2c01b74c0477
    - text: 'Semester 2 counts must be internally consistent: all are non-negative
        integers and bounded by enrollment. Specifically: 0 <= Approved2 <= Enrolled2,
        0 <= Credited2 <= Enrolled2, 0 <= WithoutEval2 <= Enrolled2, and Approved2
        + Credited2 + WithoutEval2 <= Enrolled2. Constraint suggestion: satisfies(''(`Curricular
        units 2nd sem (enrolled)` >= 0) and (`Curricular units 2nd sem (approved)`
        >= 0) and (`Curricular units 2nd sem (credited)` >= 0) and (`Curricular units
        2nd sem (without evaluations)` >= 0) and (`Curricular units 2nd sem (approved)`
        <= `Curricular units 2nd sem (enrolled)`) and (`Curricular units 2nd sem (credited)`
        <= `Curricular units 2nd sem (enrolled)`) and (`Curricular units 2nd sem (without
        evaluations)` <= `Curricular units 2nd sem (enrolled)`) and ((`Curricular
        units 2nd sem (approved)` + `Curricular units 2nd sem (credited)` + `Curricular
        units 2nd sem (without evaluations)`) <= `Curricular units 2nd sem (enrolled)`)'',
        ''S2 count consistency'').'
      sources:
      - start_line: 89
        end_line: 97
        file: ''
      uid: 4ff4ad27-f8bc-4844-b099-c98d36a3e111
    - text: 'Approvals should be strongly positively correlated with enrollments in
        each semester to justify the linear expectation model. Constraint suggestion:
        hasCorrelation(''Curricular units 1st sem (enrolled)'', ''Curricular units
        1st sem (approved)'', c => c >= 0.6) and hasCorrelation(''Curricular units
        2nd sem (enrolled)'', ''Curricular units 2nd sem (approved)'', c => c >= 0.6).'
