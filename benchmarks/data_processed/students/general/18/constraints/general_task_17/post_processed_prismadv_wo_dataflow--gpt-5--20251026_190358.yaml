    - text: 'Across the dataset, there should be a strong positive relationship between
        ''Curricular units 1st sem (approved)'' and ''Curricular units 1st sem (enrolled)''
        so the linear expectation model is valid; e.g., Pearson correlation(ap1, en1)
        >= 0.6 and both columns have non-zero variance (implied by correlation check).
