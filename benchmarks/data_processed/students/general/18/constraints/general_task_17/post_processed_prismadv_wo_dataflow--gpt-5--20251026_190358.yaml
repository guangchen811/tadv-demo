        (approved)'') <= (''Curricular units 1st sem (enrolled)'' + ''Curricular units
        2nd sem (enrolled)''). Deequ example: .satisfies(''(`Curricular units 1st
        sem (approved)` + `Curricular units 2nd sem (approved)`) <= (`Curricular units
        1st sem (enrolled)` + `Curricular units 2nd sem (enrolled)`)'', ''appr_total_le_enr_total'',
        assertion = ''Compliance = 1.0'')'
      sources:
      - start_line: 105
        end_line: 109
        file: ''
      uid: 89f66532-e448-4a21-9a5a-225a834338e5
    - text: 'Queue export completeness for key flags: for all rows in the advisor
        queue, ''Application order'', ''Debtor'', and ''Tuition fees up to date''
