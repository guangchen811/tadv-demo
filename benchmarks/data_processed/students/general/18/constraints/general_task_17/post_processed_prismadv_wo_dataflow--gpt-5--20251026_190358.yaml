    - text: 'Macro indicators GDP, Unemployment rate, and Inflation rate must be jointly
        present (non-null) and numeric per row and each must have non-zero variance
        over the dataset to permit z-score standardization and avoid NaN/inf in macro_stress
        and risk_score. Constraint suggestion: isComplete([''GDP'',''Unemployment
        rate'',''Inflation rate'']) and satisfies_dataset_level(''stddev(GDP) > 0
        and stddev(`Unemployment rate`) > 0 and stddev(`Inflation rate`) > 0'', ''macro
