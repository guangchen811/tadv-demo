        end_line: 97
        file: ''
      uid: 98fbd89a-c223-4f24-8b64-9f9c54d61670
    - text: 'Semester 2 zero-enrollment rule: if ''Curricular units 2nd sem (enrolled)''
        = 0 then ''approved'', ''credited'', and ''without evaluations'' must all
        be 0. Deequ example: .satisfies(''`Curricular units 2nd sem (enrolled)` =
        0 OR (`Curricular units 2nd sem (approved)` = 0 AND `Curricular units 2nd
        sem (credited)` = 0 AND `Curricular units 2nd sem (without evaluations)` =
        0)'', ''s2_zero_enrollment_consistency'', assertion = ''Compliance = 1.0'')'
      sources:
