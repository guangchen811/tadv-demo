  '["Curricular units 2nd sem (credited)","Curricular units 2nd sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For each record, ''Curricular units 2nd sem (credited)'' must be less
        than or equal to ''Curricular units 2nd sem (enrolled)'', and both are non-negative
        integer counts. This can be represented in Deequ as: .isNonNegative([''Curricular
        units 2nd sem (enrolled)'', ''Curricular units 2nd sem (credited)'']) and
        .satisfies(''`Curricular units 2nd sem (credited)` <= `Curricular units 2nd
