  '["Debtor","Tuition fees up to date"]':
    code:
    - suggestion: '.satisfies(''(`Debtor` IN (0, 1)) AND (`Tuition fees up to date`
        IN (0, 1))'', ''Payment flags are binary 0/1'', lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 1631263a-aa69-47f9-a1cc-39e82c5cb533
      source_assumptions:
      - 789b8848-b226-4e1f-9efb-44541af79b26
    - suggestion: '.satisfies(''NOT((`Debtor` = 1) AND (`Tuition fees up to date`
        = 1))'', ''No debtor with fees up to date simultaneously'', lambda v: v ==
        1.0)'
      validity: false
      reason_if_invalid: 'Constraint ''.satisfies(''NOT((`Debtor` = 1) AND (`Tuition
        fees up to date` = 1))'', ''No debtor with fees up to date simultaneously'',
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9355203619909502 does
        not meet the constraint requirement!'
      level: warning
      uid: 6fc5af07-75d6-44fa-bbf5-c9820b87615f
      source_assumptions:
      - bab08ccd-1288-467c-b50d-83c76afc67dc
    assumptions:
    - text: 'Payment status fields are consistent: it is invalid for a record to have
        Debtor = 1 and Tuition fees up to date = 1 simultaneously. We could represent
        this as a Deequ constraint like: .satisfies(''NOT(Debtor = 1 AND Tuition fees
        up to date = 1)'')'
      sources:
      - start_line: 61
        end_line: 65
        file: ''
      uid: 7a4bbfe9-c8a8-4419-9449-f73e87fc7e6d
    - text: 'Both payment status columns are complete binary indicators with a shared
        0/1 coding (0 = no, 1 = yes) and must be castable to integers. Deequ examples:
        .isComplete(''Debtor''), .isContainedIn(''Debtor'',[0,1]), .isComplete(''Tuition
        fees up to date''), .isContainedIn(''Tuition fees up to date'',[0,1])'
      sources:
      - start_line: 62
        end_line: 64
        file: ''
      uid: bab08ccd-1288-467c-b50d-83c76afc67dc
    - text: 'Per semester, the number of approved curricular units cannot exceed the
        number enrolled: ap1 <= en1 and ap2 <= en2. Deequ examples: .satisfies(''Curricular
        units 1st sem (approved) <= Curricular units 1st sem (enrolled)''), .satisfies(''Curricular
        units 2nd sem (approved) <= Curricular units 2nd sem (enrolled)'')'
      sources:
      - start_line: 71
        end_line: 74
        file: ''
      - start_line: 89
        end_line: 92
        file: ''
      uid: 789b8848-b226-4e1f-9efb-44541af79b26
    - text: 'Per semester, the counts of credited and without evaluations cannot exceed
        enrollments: cr1 <= en1, wo1 <= en1, cr2 <= en2, wo2 <= en2. Deequ examples:
        .satisfies(''Curricular units 1st sem (credited) <= Curricular units 1st sem
        (enrolled)''), .satisfies(''Curricular units 1st sem (without evaluations)
        <= Curricular units 1st sem (enrolled)''), and analogous constraints for the
        2nd semester.'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 89
        end_line: 94
        file: ''
      uid: 434614f5-b896-4bca-8ecb-8ccd8ee1a707
    - text: 'Across semesters, total approvals cannot exceed total enrollments: (ap1
        + ap2) <= (en1 + en2). Deequ example: .satisfies(''(Curricular units 1st sem
        (approved) + Curricular units 2nd sem (approved)) <= (Curricular units 1st
        sem (enrolled) + Curricular units 2nd sem (enrolled))'')'
      sources:
      - start_line: 105
        end_line: 108
        file: ''
      uid: 847318fe-5a3b-4c7e-a8fa-9eee5f889fa3
    - text: 'Approvals should be strongly positively correlated with enrollments in
        each semester (a precondition for the linear expectation of approvals): corr(en1,
        ap1) and corr(en2, ap2) should be >= 0.5. Deequ examples: .hasCorrelation(''Curricular
        units 1st sem (enrolled)'', ''Curricular units 1st sem (approved)'', lowerBound=0.5),
        .hasCorrelation(''Curricular units 2nd sem (enrolled)'', ''Curricular units
        2nd sem (approved)'', lowerBound=0.5)'
      sources:
      - start_line: 82
        end_line: 85
        file: ''
      - start_line: 99
        end_line: 101
        file: ''
      uid: b9bc978c-0d68-4a3d-8437-fdba800a0b02
  '["GDP","Inflation rate","Unemployment rate"]':
    code: []
    assumptions:
    - text: 'GDP, Unemployment rate, and Inflation rate are all numeric, complete,
        and each has strictly positive variance so that z-score normalization (zg,
        zu, zi) and macro_stress = sigmoid(zu - zg + 0.3 * zi) are well-defined for
        every row. Basis for constraints (Deequ examples): hasCompleteness("GDP",
        _ == 1.0); hasCompleteness("Unemployment rate", _ == 1.0); hasCompleteness("Inflation
        rate", _ == 1.0); hasStandardDeviation("GDP", _ > 0); hasStandardDeviation("Unemployment
        rate", _ > 0); hasStandardDeviation("Inflation rate", _ > 0).'
      sources:
      - start_line: 44
        end_line: 52
        file: ''
      uid: 59dc22f7-9b2d-407d-bda6-2b201be76aec
    - text: 'Debtor and Tuition fees up to date are complementary, mutually exclusive
        binary indicators for payment status: Debtor == 1 implies Tuition fees up
        to date == 0 and Tuition fees up to date == 1 implies Debtor == 0 (equivalently,
        Debtor == 1 - Tuition fees up to date) for all rows. Basis for constraints
        (Deequ example): satisfies("debtor_fees_consistency", "`Debtor` IN (0,1) AND
        `Tuition fees up to date` IN (0,1) AND `Debtor` = 1 - `Tuition fees up to
        date`", _ == 1.0).'
      sources:
      - start_line: 61
        end_line: 65
        file: ''
      uid: 4a270b26-2dad-4bb2-84f0-db33c9a1683e
    - text: 'Semester 1 counts are coherent: approved, credited, and without evaluations
        must each be between 0 and enrolled, and enrolled must be non-negative. Concretely,
        0 <= approved <= enrolled, 0 <= credited <= enrolled, and 0 <= without evaluations
        <= enrolled. This keeps pass_rate1 and noeval_ratio1 within [0,1] (except
        when enrolled == 0 where the code handles it). Basis for constraints (Deequ
        examples): satisfies("s1_bounds", "`Curricular units 1st sem (enrolled)` >=
        0 AND `Curricular units 1st sem (approved)` BETWEEN 0 AND `Curricular units
        1st sem (enrolled)` AND `Curricular units 1st sem (credited)` BETWEEN 0 AND
        `Curricular units 1st sem (enrolled)` AND `Curricular units 1st sem (without
        evaluations)` BETWEEN 0 AND `Curricular units 1st sem (enrolled)`", _ >= 0.99).'
      sources:
      - start_line: 71
        end_line: 80
        file: ''
      uid: 8ab9a119-fea0-435b-abc2-3fe319d26c8b
    - text: 'Semester 2 counts are coherent: approved, credited, and without evaluations
        must each be between 0 and enrolled, and enrolled must be non-negative. Concretely,
        0 <= approved <= enrolled, 0 <= credited <= enrolled, and 0 <= without evaluations
        <= enrolled. This keeps pass_rate2 and noeval_ratio2 within [0,1] (except
        when enrolled == 0 where the code handles it). Basis for constraints (Deequ
        examples): satisfies("s2_bounds", "`Curricular units 2nd sem (enrolled)` >=
        0 AND `Curricular units 2nd sem (approved)` BETWEEN 0 AND `Curricular units
        2nd sem (enrolled)` AND `Curricular units 2nd sem (credited)` BETWEEN 0 AND
        `Curricular units 2nd sem (enrolled)` AND `Curricular units 2nd sem (without
        evaluations)` BETWEEN 0 AND `Curricular units 2nd sem (enrolled)`", _ >= 0.99).'
      sources:
      - start_line: 89
        end_line: 97
        file: ''
      uid: 872dfae7-148d-4cb8-87b0-6d42d7195a46
    - text: 'Approved vs. enrolled should be strongly positively related for each
        semester and both series must vary (std > 0), as the linear expectation model
        relies on this. Concretely: corr(enrolled_1, approved_1) >= 0.6 and corr(enrolled_2,
        approved_2) >= 0.6; std(enrolled_1) > 0, std(approved_1) > 0, std(enrolled_2)
        > 0, std(approved_2) > 0. Basis for constraints (Deequ examples): hasCorrelation("Curricular
        units 1st sem (enrolled)", "Curricular units 1st sem (approved)", _ >= 0.6);
        hasCorrelation("Curricular units 2nd sem (enrolled)", "Curricular units 2nd
        sem (approved)", _ >= 0.6); hasStandardDeviation("Curricular units 1st sem
        (enrolled)", _ > 0); hasStandardDeviation("Curricular units 1st sem (approved)",
        _ > 0); hasStandardDeviation("Curricular units 2nd sem (enrolled)", _ > 0);
        hasStandardDeviation("Curricular units 2nd sem (approved)", _ > 0).'
      sources:
      - start_line: 71
        end_line: 74
        file: ''
      - start_line: 81
        end_line: 86
        file: ''
      - start_line: 90
        end_line: 92
        file: ''
      - start_line: 99
        end_line: 103
        file: ''
      uid: 48d2acb8-c013-452d-890a-133065e4ff96
    - text: 'Across both semesters combined, total approved must not exceed total
        enrolled per student: (approved_1 + approved_2) <= (enrolled_1 + enrolled_2).
        This keeps the combined progress ratio within [0,1] before clipping. Basis
        for constraints (Deequ example): satisfies("combined_progress_bounds", "(`Curricular
        units 1st sem (approved)` + `Curricular units 2nd sem (approved)`) <= (`Curricular
        units 1st sem (enrolled)` + `Curricular units 2nd sem (enrolled)`)", _ >=
        0.99).'
      sources:
      - start_line: 105
        end_line: 111
        file: ''
      uid: ef8dd139-060f-4e9a-ad5b-8f5520331bd5
