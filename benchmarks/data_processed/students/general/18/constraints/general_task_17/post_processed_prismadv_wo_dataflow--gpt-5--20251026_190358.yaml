        end_line: 76
        file: ''
      - start_line: 77
        end_line: 80
        file: ''
      uid: 68caa248-1ee7-4806-9547-3e005e08463b
    - text: 'If ''Curricular units 1st sem (enrolled)'' == 0, then ''Curricular units
        1st sem (approved)'' == 0 and ''Curricular units 1st sem (without evaluations)''
        == 0 and ''Curricular units 1st sem (credited)'' == 0. This prevents undefined
        ratios and aligns with the code path that assigns defaults when enrollment
        is zero. Example Deequ constraint: .forAllRows("case when `Curricular units
        1st sem (enrolled)` = 0 then (`Curricular units 1st sem (approved)` = 0 and
        `Curricular units 1st sem (without evaluations)` = 0 and `Curricular units
        1st sem (credited)` = 0) else true end").'
