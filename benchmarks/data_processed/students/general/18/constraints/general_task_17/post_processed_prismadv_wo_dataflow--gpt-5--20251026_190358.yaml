    - text: 'For each record, the category counts for the 2nd semester should not
        exceed enrollment: ''Curricular units 2nd sem (approved)'' + ''Curricular
        units 2nd sem (credited)'' + ''Curricular units 2nd sem (without evaluations)''
        <= ''Curricular units 2nd sem (enrolled)''. This ensures ratios using ''enrolled''
