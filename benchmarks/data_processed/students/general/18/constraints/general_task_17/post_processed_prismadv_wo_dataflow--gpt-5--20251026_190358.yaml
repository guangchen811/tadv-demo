    - text: 'Semester 1 load-consistency: counts derived from enrollment must be bounded
        by enrollment. Specifically: approved <= enrolled, credited <= enrolled, without
        evaluations <= enrolled, and approved + credited + without evaluations <=
        enrolled. This keeps pass-rate and ratios within [0,1] and avoids impossible
        counts. Deequ example: .satisfies(''`Curricular units 1st sem (approved)`
        <= `Curricular units 1st sem (enrolled)` AND `Curricular units 1st sem (credited)`
        <= `Curricular units 1st sem (enrolled)` AND `Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)` AND (`Curricular units
        1st sem (approved)` + `Curricular units 1st sem (credited)` + `Curricular
        units 1st sem (without evaluations)`) <= `Curricular units 1st sem (enrolled)`'',
        ''s1_counts_le_enrolled'', assertion = ''Compliance = 1.0'')'
      sources:
