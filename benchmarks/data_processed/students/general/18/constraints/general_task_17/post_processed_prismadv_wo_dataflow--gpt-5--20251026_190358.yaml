    - text: 'If ''Curricular units 2nd sem (enrolled)'' equals 0 for a record, then
        ''Curricular units 2nd sem (credited)'' must be 0 (and typically ''approved''
        and ''without evaluations'' should also be 0). This prevents inconsistent
        non-zero outcomes when the denominator is 0. Deequ example: .satisfies(''(`Curricular
        units 2nd sem (enrolled)` == 0) => (`Curricular units 2nd sem (credited)`
        == 0 and `Curricular units 2nd sem (approved)` == 0 and `Curricular units
        2nd sem (without evaluations)` == 0)'', ''zero_en2_zero_cats'').'
