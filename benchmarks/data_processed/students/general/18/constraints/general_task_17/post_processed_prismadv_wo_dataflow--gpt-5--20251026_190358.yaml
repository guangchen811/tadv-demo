    - text: 'Semester 2 load-consistency: approved <= enrolled, credited <= enrolled,
        without evaluations <= enrolled, and approved + credited + without evaluations
        <= enrolled. Deequ example: .satisfies(''`Curricular units 2nd sem (approved)`
        <= `Curricular units 2nd sem (enrolled)` AND `Curricular units 2nd sem (credited)`
        <= `Curricular units 2nd sem (enrolled)` AND `Curricular units 2nd sem (without
        evaluations)` <= `Curricular units 2nd sem (enrolled)` AND (`Curricular units
        2nd sem (approved)` + `Curricular units 2nd sem (credited)` + `Curricular
        units 2nd sem (without evaluations)`) <= `Curricular units 2nd sem (enrolled)`'',
        ''s2_counts_le_enrolled'', assertion = ''Compliance = 1.0'')'
