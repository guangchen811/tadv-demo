        units 1st sem (approved)` >= 0 and `Curricular units 1st sem (approved)` <=
        `Curricular units 1st sem (enrolled)`"), .forAllRows("`Curricular units 1st
        sem (without evaluations)` >= 0 and `Curricular units 1st sem (without evaluations)`
        <= `Curricular units 1st sem (enrolled)`"), .forAllRows("`Curricular units
        1st sem (approved)` + `Curricular units 1st sem (without evaluations)` <=
        `Curricular units 1st sem (enrolled)`").'
