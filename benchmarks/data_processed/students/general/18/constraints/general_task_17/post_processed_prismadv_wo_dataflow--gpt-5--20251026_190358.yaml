    - text: 'If ''Curricular units 1st sem (enrolled)'' is 0, then there should be
        no semester-1 unit activity: ''Curricular units 1st sem (credited)'' = 0,
        ''Curricular units 1st sem (approved)'' = 0, and ''Curricular units 1st sem
        (without evaluations)'' = 0. We could represent this as a Deequ constraint:
        .satisfies("CASE WHEN `Curricular units 1st sem (enrolled)` = 0 THEN (`Curricular
        units 1st sem (credited)` = 0 AND `Curricular units 1st sem (approved)` =
        0 AND `Curricular units 1st sem (without evaluations)` = 0) ELSE true END",
        "sem1_zero_enrollment_zero_counts").'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 77
        end_line: 79
        file: ''
      uid: cefa4741-ee0c-407a-bef8-4f82ca81a955
  '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]':
    code:
    - suggestion: .satisfies("`Curricular units 1st sem (without evaluations)` >=
        0 AND `Curricular units 1st sem (without evaluations)` <= `Curricular units
        1st sem (enrolled)`", "wo1_within_en1")
      validity: true
