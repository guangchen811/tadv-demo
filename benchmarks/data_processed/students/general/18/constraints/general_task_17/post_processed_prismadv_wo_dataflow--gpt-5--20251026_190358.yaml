    - text: '''Curricular units 1st sem (credited)'' are bounded by enrollment and,
        together with other outcomes, cannot exceed enrollment: 0 <= ''Curricular
        units 1st sem (credited)'' <= ''Curricular units 1st sem (enrolled)'' and
        ''Curricular units 1st sem (approved)'' + ''Curricular units 1st sem (credited)''
        + ''Curricular units 1st sem (without evaluations)'' <= ''Curricular units
        1st sem (enrolled)''. Example Deequ constraints: .forAllRows("`Curricular
        units 1st sem (credited)` >= 0 and `Curricular units 1st sem (credited)` <=
        `Curricular units 1st sem (enrolled)`"), .forAllRows("`Curricular units 1st
