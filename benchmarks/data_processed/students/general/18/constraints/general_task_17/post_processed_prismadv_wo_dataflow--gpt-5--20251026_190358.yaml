    - text: 'If ''Curricular units 2nd sem (enrolled)'' equals 0, then ''Curricular
        units 2nd sem (without evaluations)'' must also be 0 for that record. This
        reflects that there cannot be units without evaluation when no units are enrolled
        and aligns with the code path that sets the ratio to 0 when en2 == 0. Deequ
