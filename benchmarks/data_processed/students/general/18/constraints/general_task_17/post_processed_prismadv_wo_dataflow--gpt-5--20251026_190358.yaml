        end_line: 87
        file: ''
      uid: 4e3a30f6-622f-4db8-9e20-9bd9eb294836
  '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'Row-level monotonicity: For every record, ''Curricular units 1st sem
        (approved)'' must be between 0 and ''Curricular units 1st sem (enrolled)''
