    - text: 'For every record, the combined count of ''Curricular units 2nd sem (approved)''
        and ''Curricular units 2nd sem (without evaluations)'' must not exceed ''Curricular
        units 2nd sem (enrolled)''. Concretely: approved + without_evaluations <=
        enrolled. Deequ example: .satisfies("`Curricular units 2nd sem (approved)`
        + `Curricular units 2nd sem (without evaluations)` <= `Curricular units 2nd
        sem (enrolled)`", "ap2_plus_wo2_le_en2").'
