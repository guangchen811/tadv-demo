    - suggestion: .satisfies("`Curricular units 1st sem (approved)` >= 0 AND `Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)`", "ap1_le_en1")
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 81d7b8a5-d490-4097-99dd-405fb6154fb0
      source_assumptions:
      - f1c3841c-faf7-4cc3-83db-da75e96011a5
    - suggestion: '.satisfies("(`Curricular units 1st sem (approved)` + `Curricular
        units 1st sem (without evaluations)`) <= `Curricular units 1st sem (enrolled)`",
        "ap1_plus_wo1_le_en1", lambda v: v >= 0.98)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 4e7870a8-1804-4f5a-b454-e6a20b902412
      source_assumptions:
      - 82d071e5-01d0-4c8f-9901-8ceff8603a5c
    - suggestion: '.hasCorrelation("Curricular units 1st sem (approved)", "Curricular
        units 1st sem (enrolled)", lambda v: v >= 0.6)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 910e7bc1-30dd-44db-8e06-dcce76c1f55e
      source_assumptions:
      - 4494ee52-17d4-44f8-b49d-babc4014fee6
    assumptions:
    - text: 'For semester 1, ''Curricular units 1st sem (without evaluations)'' must
        be a non-negative count that never exceeds ''Curricular units 1st sem (enrolled)''.
        Additionally, if ''Curricular units 1st sem (enrolled)'' is 0, then ''Curricular
        units 1st sem (without evaluations)'' must be 0. We could represent this as
        Deequ constraints:

        - .satisfies("`Curricular units 1st sem (without evaluations)` >= 0 AND `Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`",
        "wo1_within_en1")

        - .satisfies("(`Curricular units 1st sem (enrolled)` = 0) => (`Curricular
        units 1st sem (without evaluations)` = 0)", "wo1_zero_when_no_en1")'
      sources:
      - start_line: 71
        end_line: 79
        file: ''
      uid: 9d5d3134-e33b-4f38-8e74-d13eb530e316
    - text: 'For semester 1, approvals cannot exceed enrollments; if ''Curricular
        units 1st sem (enrolled)'' is 0, then ''Curricular units 1st sem (approved)''
        must be 0. We could represent this as Deequ constraints:

        - .satisfies("`Curricular units 1st sem (approved)` >= 0 AND `Curricular units
        1st sem (approved)` <= `Curricular units 1st sem (enrolled)`", "ap1_le_en1")

        - .satisfies("(`Curricular units 1st sem (enrolled)` = 0) => (`Curricular
        units 1st sem (approved)` = 0)", "ap1_zero_when_no_en1")'
      sources:
      - start_line: 71
        end_line: 79
        file: ''
      uid: 43b67b46-066b-4cf5-a252-dbe2a97daf5a
    - text: 'To justify the linear expectation of approvals from enrollment in semester
        1, there must be a strong positive correlation between ''Curricular units
        1st sem (approved)'' and ''Curricular units 1st sem (enrolled)'' (e.g., Pearson
        correlation >= 0.6). We could represent this as a Deequ constraint:

        - .hasCorrelation("Curricular units 1st sem (approved)", "Curricular units
        1st sem (enrolled)", _ >= 0.6)'
      sources:
      - start_line: 81
        end_line: 85
        file: ''
      uid: f1c3841c-faf7-4cc3-83db-da75e96011a5
    - text: 'Combined consistency for semester 1: since ''approved'' and ''without
        evaluations'' are disjoint outcomes within the set of enrolled units, their
        sum must not exceed ''enrolled'': ''Curricular units 1st sem (approved)''
        + ''Curricular units 1st sem (without evaluations)'' <= ''Curricular units
        1st sem (enrolled)''. We could represent this as a Deequ constraint:

        - .satisfies("`Curricular units 1st sem (approved)` + `Curricular units 1st
        sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`", "ap1_plus_wo1_le_en1")'
      sources:
      - start_line: 71
        end_line: 79
        file: ''
      uid: 4494ee52-17d4-44f8-b49d-babc4014fee6
    - text: 'Cross-semester zero-enrollment consistency: if total enrollment across
        both semesters is 0, then both total approvals and total ''without evaluations''
        across both semesters must be 0. We could represent this as a Deequ constraint:

        - .satisfies("(`Curricular units 1st sem (enrolled)` + `Curricular units 2nd
        sem (enrolled)`) = 0 => ((`Curricular units 1st sem (approved)` + `Curricular
        units 2nd sem (approved)`) = 0 AND (`Curricular units 1st sem (without evaluations)`
        + `Curricular units 2nd sem (without evaluations)`) = 0)", "zero_totals_when_zero_total_enrolled")'
      sources:
      - start_line: 89
        end_line: 97
        file: ''
      - start_line: 105
        end_line: 111
        file: ''
      uid: 82d071e5-01d0-4c8f-9901-8ceff8603a5c
    - text: 'Payment status flags should be consistent: a student cannot be both a
        debtor and fully up to date on tuition. If ''Tuition fees up to date'' = 1,
        then ''Debtor'' must be 0; if ''Debtor'' = 1, then ''Tuition fees up to date''
        must be 0. We could represent this as Deequ constraints:

        - .satisfies("NOT(`Debtor` = 1 AND `Tuition fees up to date` = 1)", "no_conflicting_payment_flags")

        - .satisfies("(`Tuition fees up to date` = 1) => (`Debtor` = 0)", "fees_up_to_date_implies_not_debtor")'
      sources:
      - start_line: 61
        end_line: 64
        file: ''
      uid: eaa71286-cfa0-42cc-91b3-827fd804af34
  '["Curricular units 1st sem (grade)","Curricular units 2nd sem (grade)"]':
    code: []
    assumptions:
    - text: "Both 'Curricular units 1st sem (grade)' and 'Curricular units 2nd sem\
        \ (grade)' must be present (non-null), numeric, finite, and on the same 0\u2013\
        20 scale for every record, because they are divided by 20 and averaged without\
        \ any null handling. This can be represented as Deequ constraints: .areComplete(['Curricular\
        \ units 1st sem (grade)', 'Curricular units 2nd sem (grade)']) and .satisfies('`Curricular\
        \ units 1st sem (grade)` >= 0 and `Curricular units 1st sem (grade)` <= 20\
        \ and `Curricular units 2nd sem (grade)` >= 0 and `Curricular units 2nd sem\
        \ (grade)` <= 20', 'grades_in_0_20')."
      sources:
      - start_line: 76
        end_line: 79
        file: ''
      - start_line: 94
        end_line: 97
        file: ''
      - start_line: 109
        end_line: 116
        file: ''
      uid: d408e290-4ced-460e-be8a-a53322ff36f5
    - text: 'Per-semester academic counts must be coherent: for each semester, 0 <=
        approved <= enrolled, 0 <= credited <= enrolled, 0 <= without_evaluations
        <= enrolled, and approved + credited + without_evaluations <= enrolled. This
        ensures the pass-rate and no-evaluation ratios are valid. Example Deequ (semester
        1): .satisfies(''`Curricular units 1st sem (approved)` >= 0 and `Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)` and `Curricular
        units 1st sem (credited)` >= 0 and `Curricular units 1st sem (credited)` <=
        `Curricular units 1st sem (enrolled)` and `Curricular units 1st sem (without
        evaluations)` >= 0 and `Curricular units 1st sem (without evaluations)` <=
        `Curricular units 1st sem (enrolled)` and `Curricular units 1st sem (approved)`
        + `Curricular units 1st sem (credited)` + `Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)`'', ''sem1_count_coherence'')
        and similarly for semester 2.'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      - start_line: 90
        end_line: 97
        file: ''
      uid: 34fb28b7-b582-44d7-a636-138f4db5b0fb
    - text: 'Total approvals must not exceed total enrollments across semesters: (`Curricular
        units 1st sem (approved)` + `Curricular units 2nd sem (approved)`) <= (`Curricular
        units 1st sem (enrolled)` + `Curricular units 2nd sem (enrolled)`). This aligns
        with the progress computation and prevents progress > 1 due to data errors.
        Deequ: .satisfies(''(`Curricular units 1st sem (approved)` + `Curricular units
        2nd sem (approved)`) <= (`Curricular units 1st sem (enrolled)` + `Curricular
        units 2nd sem (enrolled)`)'', ''total_approved_le_total_enrolled'').'
      sources:
      - start_line: 105
        end_line: 109
        file: ''
      uid: 988f1e5b-9bac-4fda-84e8-ce6b24ff7190
    - text: 'Enrollments and approvals should exhibit a strong positive correlation
        in each semester, and both series must have non-zero variance, to justify
        the linear expectation model for approvals. Suggested thresholds: std(enrolled)
        > 0, std(approved) > 0, and corr(enrolled, approved) >= 0.5 for both semesters.
        Deequ: .hasCorrelation(''Curricular units 1st sem (enrolled)'',''Curricular
        units 1st sem (approved)'', _ >= 0.5) and similarly for semester 2.'
      sources:
      - start_line: 81
        end_line: 85
        file: ''
      - start_line: 99
        end_line: 101
        file: ''
      uid: 1f3ca750-503f-4017-baf4-3d83805f0ea8
  ? '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (credited)","Curricular
    units 2nd sem (enrolled)","Curricular units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For 2nd semester records, the counts of ''approved'' and ''without evaluations''
        are subsets of ''enrolled'': for every row, (approved + without_evaluations)
        <= enrolled. This keeps derived ratios in [0,1]. Deequ example: .hasCompliance("ap2_plus_wo2_le_en2",
        "`Curricular units 2nd sem (approved)` + `Curricular units 2nd sem (without
        evaluations)` <= `Curricular units 2nd sem (enrolled)`").'
      sources:
      - start_line: 95
        end_line: 98
        file: ''
      uid: b3ca79e9-c11d-498d-bf2a-249c36e14080
    - text: 'When there is no 2nd semester enrollment, there should be neither approvals
        nor ''without evaluations'': if enrolled == 0 then approved == 0 and without_evaluations
        == 0. Deequ example: .hasCompliance("no_activity_when_en2_zero", "(`Curricular
        units 2nd sem (enrolled)` == 0) -> (`Curricular units 2nd sem (approved)`
        == 0 and `Curricular units 2nd sem (without evaluations)` == 0)").'
      sources:
      - start_line: 95
        end_line: 97
        file: ''
      uid: 8061311a-bc1e-43ed-bfbb-47f52818f8ab
    - text: '2nd semester approvals should be strongly and positively correlated with
        2nd semester enrollments, and both should have non-zero variance, to make
        the linear expectation model meaningful. For example: corr(enrolled, approved)
        >= 0.6 and stddev(enrolled) > 0 and stddev(approved) > 0. Deequ example: .hasCorrelation("Curricular
        units 2nd sem (enrolled)", "Curricular units 2nd sem (approved)", _ >= 0.6)
        and .hasStandardDeviation("Curricular units 2nd sem (enrolled)", _ > 0) and
        .hasStandardDeviation("Curricular units 2nd sem (approved)", _ > 0).'
      sources:
      - start_line: 99
        end_line: 103
        file: ''
      - start_line: 81
        end_line: 87
        file: ''
      uid: 336d7976-9f69-4566-9b2c-f36feeb0caa6
    - text: 'Across semesters, total approvals must not exceed total enrollments:
        (approved_sem1 + approved_sem2) <= (enrolled_sem1 + enrolled_sem2). This ensures
        progress is bounded in [0,1]. Deequ example: .hasCompliance("total_approved_le_total_enrolled",
        "(`Curricular units 1st sem (approved)` + `Curricular units 2nd sem (approved)`)
        <= (`Curricular units 1st sem (enrolled)` + `Curricular units 2nd sem (enrolled)`)").'
      sources:
      - start_line: 105
        end_line: 108
        file: ''
      uid: 7518a79b-93fd-402f-b5af-74cd21432763
    - text: 'Given the observed distribution (about 94% zeros) of ''without evaluations''
        and its use as a ratio over enrollments, rows with enrollment should rarely
        have units without evaluation. For robustness, require at least 90% of rows
        with enrolled > 0 to have without_evaluations == 0. Deequ example: .hasCompliance("wo2_rare_when_en2_positive",
        "(`Curricular units 2nd sem (enrolled)` > 0) -> (`Curricular units 2nd sem
        (without evaluations)` == 0)", _ >= 0.9).'
      sources:
      - start_line: 97
        end_line: 97
        file: ''
      uid: 8f05f927-5827-4843-8d37-c2df0bd738a6
  '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For each record, ''Curricular units 2nd sem (approved)'' must not exceed
        ''Curricular units 2nd sem (enrolled)'' and both must be consistent with a
        valid pass-rate: if ''Curricular units 2nd sem (enrolled)'' = 0 then ''Curricular
        units 2nd sem (approved)'' = 0. This keeps pass_rate2 and success_gap_ratio2
        well-defined and within [0,1]. We could represent this with Deequ constraints
        such as: .satisfies("`Curricular units 2nd sem (approved)` <= `Curricular
        units 2nd sem (enrolled)`", "ap2_le_en2", assertionLevel=Success) and .satisfies("(`Curricular
        units 2nd sem (enrolled)` != 0) OR (`Curricular units 2nd sem (approved)`
        = 0)", "if_en2_zero_then_ap2_zero", assertionLevel=Success).'
