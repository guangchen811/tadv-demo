        end_line: 109
        file: ''
      uid: ea295ad8-e1ec-47d0-9eaa-a1dbe034525c
    - text: 'Pairwise completeness: Both ''Curricular units 1st sem (enrolled)'' and
        ''Curricular units 1st sem (approved)'' must be present (non-null) together
        for all rows to allow int casting, correlation, and ratio computations. Deequ
        example: satisfies(''`Curricular units 1st sem (enrolled)` IS NOT NULL AND
        `Curricular units 1st sem (approved)` IS NOT NULL'', ''ap1_en1_non_null'')'
