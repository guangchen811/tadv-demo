        end_line: 85
        file: ''
      uid: 8b2e7469-fe7b-4f34-acca-0a3e32fd62c4
    - text: 'Aggregate across semesters: total approvals cannot exceed total enrollments,
        i.e., (''Curricular units 1st sem (approved)'' + ''Curricular units 2nd sem
        (approved)'') <= (''Curricular units 1st sem (enrolled)'' + ''Curricular units
        2nd sem (enrolled)''). This keeps ''progress'' <= 1 before clipping. Deequ
        example: satisfies(''`Curricular units 1st sem (approved)` + `Curricular units
        2nd sem (approved)` <= `Curricular units 1st sem (enrolled)` + `Curricular
        units 2nd sem (enrolled)`'', ''total_approved_le_total_enrolled'')'
      sources:
