        end_line: 79
        file: ''
      uid: c0e20b65-7720-4d22-9b52-6da7dded44f8
    - text: 'Semester 1 zero-enrollment rule: if ''Curricular units 1st sem (enrolled)''
        = 0 then ''approved'', ''credited'', and ''without evaluations'' must all
        be 0 for that semester. This prevents division by zero paths from masking
        inconsistent data. Deequ example: .satisfies(''`Curricular units 1st sem (enrolled)`
        = 0 OR (`Curricular units 1st sem (approved)` = 0 AND `Curricular units 1st
        sem (credited)` = 0 AND `Curricular units 1st sem (without evaluations)` =
        0)'', ''s1_zero_enrollment_consistency'', assertion = ''Compliance = 1.0'')'
      sources:
