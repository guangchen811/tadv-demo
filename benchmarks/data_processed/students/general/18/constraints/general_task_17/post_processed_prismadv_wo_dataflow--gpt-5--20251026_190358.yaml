        end_line: 97
        file: ''
      uid: 93e77936-120a-4653-8d74-af43086b60e3
    - text: 'Strong positive relationship between ''enrolled'' and ''approved'' per
        semester to justify the linear expectation model: Pearson correlation(enrolled,
        approved) should be high and positive (e.g., >= 0.5) for both semesters. Deequ
        examples: .hasCorrelation(''Curricular units 1st sem (approved)'', ''Curricular
        units 1st sem (enrolled)'', _ >= 0.5) and .hasCorrelation(''Curricular units
        2nd sem (approved)'', ''Curricular units 2nd sem (enrolled)'', _ >= 0.5)'
