        file: ''
      - start_line: 103
        end_line: 103
        file: ''
      uid: fbd95895-e64d-4e49-a5c7-4182cb09d418
    - text: 'Across records, ''Curricular units 2nd sem (enrolled)'' and ''Curricular
        units 2nd sem (approved)'' should be positively correlated so that a simple
        linear expectation of approvals from enrollments is meaningful (and correlation
        is defined, i.e., not NaN). This can be enforced as: .hasCorrelation("Curricular
        units 2nd sem (enrolled)", "Curricular units 2nd sem (approved)", lowerBound=0.0,
        upperBound=1.0).'
      sources:
      - start_line: 99
        end_line: 102
        file: ''
      uid: eeaf08a1-b986-4c9d-9f31-bfded82bcbf8
    - text: 'Total approvals across semesters must not exceed total enrollments across
        semesters, ensuring overall progress <= 1: (''Curricular units 1st sem (approved)''
        + ''Curricular units 2nd sem (approved)'') <= (''Curricular units 1st sem
        (enrolled)'' + ''Curricular units 2nd sem (enrolled)''). As a Deequ constraint:
        .satisfies("`Curricular units 1st sem (approved)` + `Curricular units 2nd
        sem (approved)` <= `Curricular units 1st sem (enrolled)` + `Curricular units
        2nd sem (enrolled)`", "tot_approved_le_tot_enrolled", assertionLevel=Success).'
      sources:
      - start_line: 106
        end_line: 109
        file: ''
      uid: 7d198576-896b-4840-b7cf-12f4d0cf5653
  ? '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (enrolled)","Curricular
