    - text: 'Population-level relationship: ''Curricular units 1st sem (approved)''
        and ''Curricular units 1st sem (enrolled)'' should have a strong positive
        Pearson correlation, and both columns must be non-constant (std > 0) so the
        linear expectation (slope1) is well-defined. Deequ examples: hasCorrelation(''Curricular
        units 1st sem (approved)'', ''Curricular units 1st sem (enrolled)'', _ >=
        0.5); hasStandardDeviation(''Curricular units 1st sem (enrolled)'', _ > 0);
        hasStandardDeviation(''Curricular units 1st sem (approved)'', _ > 0)'
      sources:
