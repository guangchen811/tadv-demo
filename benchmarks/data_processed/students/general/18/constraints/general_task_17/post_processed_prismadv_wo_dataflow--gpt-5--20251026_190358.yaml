    - text: 'Across the dataset, ''Curricular units 2nd sem (enrolled)'' and ''Curricular
        units 2nd sem (approved)'' should exhibit a strong positive linear relationship
        so that the regression-based expectation is well-defined. Concretely: Pearson
        correlation(enrolled, approved) >= 0.5 (or another agreed positive threshold),
        and both columns have non-zero variance. Deequ example: .hasCorrelation("Curricular
        units 2nd sem (enrolled)", "Curricular units 2nd sem (approved)", _ >= 0.5).'
