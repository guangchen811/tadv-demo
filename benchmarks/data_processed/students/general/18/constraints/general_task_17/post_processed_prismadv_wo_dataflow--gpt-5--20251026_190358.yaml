    - text: 'No approvals without enrollment: If ''Curricular units 1st sem (enrolled)''
        equals 0, then ''Curricular units 1st sem (approved)'' must equal 0. This
        avoids inconsistent cases masked by the np.where default. Deequ example: satisfies(''CASE
        WHEN `Curricular units 1st sem (enrolled)` = 0 THEN `Curricular units 1st
        sem (approved)` = 0 ELSE true END'', ''no_approvals_when_enrolled_zero'')'
