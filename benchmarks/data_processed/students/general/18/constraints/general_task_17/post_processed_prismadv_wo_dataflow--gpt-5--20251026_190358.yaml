    code:
    - suggestion: '.satisfies("`Curricular units 2nd sem (enrolled)` >= 0 AND `Curricular
        units 2nd sem (without evaluations)` >= 0 AND `Curricular units 2nd sem (without
        evaluations)` <= `Curricular units 2nd sem (enrolled)`", "wo2_between_0_and_en2",
        lambda v: v == 1.0)'
      validity: true
