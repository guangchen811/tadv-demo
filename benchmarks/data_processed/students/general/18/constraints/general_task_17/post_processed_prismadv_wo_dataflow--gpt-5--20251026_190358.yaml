    - text: 'Across semesters, total approved must not exceed total enrolled: (Approved1
        + Approved2) <= (Enrolled1 + Enrolled2). This keeps the overall progress ratio
        within [0,1] without relying on clipping. Constraint suggestion: satisfies(''(`Curricular
        units 1st sem (approved)` + `Curricular units 2nd sem (approved)`) <= (`Curricular
        units 1st sem (enrolled)` + `Curricular units 2nd sem (enrolled)`)'', ''cross-semester
        approval bound'').'
