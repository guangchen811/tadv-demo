    assumptions:
    - text: 'For every record, the count in ''Curricular units 2nd sem (without evaluations)''
        must be between 0 and the count in ''Curricular units 2nd sem (enrolled)''
        (inclusive). This prevents impossible ratios when computing noeval_ratio2
        = wo2/en2 and ensures the ratio is within [0, 1]. Example Deequ constraints:
        .isNonNegative(''Curricular units 2nd sem (enrolled)'').isNonNegative(''Curricular
        units 2nd sem (without evaluations)'').satisfies(''`Curricular units 2nd sem
        (without evaluations)` <= `Curricular units 2nd sem (enrolled)`'', ''wo2_le_en2'',
        1.0)'
