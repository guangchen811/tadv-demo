    - text: 'International must be complete (no nulls) and numeric/finite because
        it is cast to float and used directly in a scikit-learn pipeline (StandardScaler
        and LogisticRegression) without any imputation; NaN or non-numeric values
        would cause the pipeline to fail. Example rule: Deequ hasCompleteness(''International'',
        lambda x: x == 1.0) and satisfies(''CASE WHEN CAST(`International` AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END'', ''International numeric'', lambda x: x ==
        1.0).'
