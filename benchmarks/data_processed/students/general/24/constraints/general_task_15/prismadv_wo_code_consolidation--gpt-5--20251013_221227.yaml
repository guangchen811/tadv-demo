  '["Debtor","Scholarship holder","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'The columns ''Debtor'', ''Tuition fees up to date'', and ''Scholarship
        holder'' are binary 0/1 flags with no nulls and are used jointly as boolean
        indicators in the financial_risk feature. We could represent this as a Deequ
        compliance check requiring all three to be in {0,1}: .hasCompliance(''finance_flags_binary'',
        ''(Debtor IN (0,1)) AND (`Tuition fees up to date` IN (0,1)) AND (`Scholarship
        holder` IN (0,1))'', 1.0).'
      sources:
      - start_line: 32
        end_line: 34
        file: ''
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 106
        end_line: 109
        file: ''
      uid: f6cf9334-c5b4-41ec-9b60-3b51a7579130
    - text: 'If ''Tuition fees up to date'' == 1, then ''Debtor'' must be 0 (paid-up
        students should not simultaneously be marked as debtors). Deequ example: .hasCompliance(''tuition_implies_no_debt'',
        ''CASE WHEN `Tuition fees up to date` = 1 THEN `Debtor` = 0 ELSE TRUE END'',
        0.98).'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      uid: 563a76bd-a51b-47fe-99af-450a892ea78c
    - text: 'If ''Tuition fees up to date'' == 0, then ''Debtor'' should be 1 in the
        vast majority of cases (not up to date typically implies debt). Deequ example:
        .hasCompliance(''not_up_to_date_implies_debt'', ''CASE WHEN `Tuition fees
        up to date` = 0 THEN `Debtor` = 1 ELSE TRUE END'', 0.95).'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      uid: 37933cf1-9623-4358-b82a-da92a567b6fd
    - text: 'If ''Scholarship holder'' == 1, then ''Tuition fees up to date'' should
        be 1 (scholarship coverage implies fees are up to date). Deequ example: .hasCompliance(''scholar_implies_tuition_up_to_date'',
        ''CASE WHEN `Scholarship holder` = 1 THEN `Tuition fees up to date` = 1 ELSE
        TRUE END'', 0.98).'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      uid: ec91c7ac-6e00-4469-b5ba-59661f12a3f7
    - text: 'If ''Scholarship holder'' == 1, then ''Debtor'' should be 0 (scholarship
        students should not be in debt). Deequ example: .hasCompliance(''scholar_implies_no_debt'',
        ''CASE WHEN `Scholarship holder` = 1 THEN `Debtor` = 0 ELSE TRUE END'', 0.98).'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      uid: 07b67c74-cd53-4c59-a162-1d5acbf11396
    - text: 'The triad (''Debtor'', ''Tuition fees up to date'', ''Scholarship holder'')
        should combine so that the pre-clipping financial_risk = (Debtor==1) + 0.5*(Tuition
        fees up to date==0) - 0.5*(Scholarship holder==1) falls within [0.0, 1.5]
        for every row; otherwise clipping would mask invalid inputs. Deequ example:
        .hasCompliance(''financial_risk_range'', ''((CASE WHEN `Debtor`=1 THEN 1 ELSE
        0 END) + 0.5*(CASE WHEN `Tuition fees up to date`=0 THEN 1 ELSE 0 END) - 0.5*(CASE
        WHEN `Scholarship holder`=1 THEN 1 ELSE 0 END)) BETWEEN 0.0 AND 1.5'', 1.0).'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      uid: a0469134-c1cc-4603-8b0c-fe7f9091284c
  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'Both ''Debtor'' and ''Tuition fees up to date'' are complete, numeric
        binary indicators encoded as 0 or 1 (no nulls), since the code casts them
        to float and compares them to exact 0/1. Example Deequ constraints: .hasCompleteness(''Debtor'',
        1.0); .hasCompleteness(''Tuition fees up to date'', 1.0); .satisfies(''(`Debtor`
        IN (0,1)) AND (`Tuition fees up to date` IN (0,1))'', assertion=''>= 1.0'').'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 106
        end_line: 107
        file: ''
      uid: c8e35d61-0336-4618-9438-45569d512c14
    - text: 'Business consistency between the two indicators: ''Tuition fees up to
        date'' and ''Debtor'' are mutually exclusive and should be complements (i.e.,
        if fees are up to date then not a debtor, and if debtor then fees not up to
        date). This avoids contradictory states in the financial risk feature. Deequ
        constraint example (single rule): .satisfies(''(`Debtor` + `Tuition fees up
        to date`) = 1'', assertion=''>= 0.98''). Alternatively, two implication rules:
        .satisfies(''NOT (`Tuition fees up to date` = 1 AND `Debtor` <> 0)'', ''>=
        0.99'') and .satisfies(''NOT (`Debtor` = 1 AND `Tuition fees up to date` <>
        0)'', ''>= 0.99'').'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      uid: 5029b59d-a887-47d2-8629-3282d662ff1c
    - text: "The dominant joint state should be ('Debtor' = 0 AND 'Tuition fees up\
        \ to date' = 1) for the majority of rows, reflecting the observed marginals\
        \ (\u22480.883 non-debtors and \u22480.888 up-to-date). Enforce a minimum\
        \ joint compliance threshold. Deequ example: .satisfies('(`Debtor` = 0 AND\
        \ `Tuition fees up to date` = 1)', assertion='>= 0.75')."
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      uid: c0a1f89a-4d6e-4426-b04a-a0cae70a9ba2
