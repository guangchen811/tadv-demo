    - text: 'All second-semester rate features used downstream should be bounded in
        [0,1]: approved/enrolled, without_evaluations/enrolled, and evaluations/enrolled.
        Equivalent raw-count constraints: 0 <= approved <= enrolled, 0 <= without_evaluations
        <= enrolled, 0 <= evaluations <= enrolled; and when enrolled = 0, the numerators
        must be 0. These bounds prevent negative engagement or ratios > 1 from entering
        the model. Deequ can enforce via the raw-count compliance constraints above
        or via guarded expressions with CASE to avoid divide-by-zero.'
