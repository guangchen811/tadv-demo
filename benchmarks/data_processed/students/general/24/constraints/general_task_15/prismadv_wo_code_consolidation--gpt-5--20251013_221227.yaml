  '["Admission grade","Previous qualification (grade)"]':
    code: []
    assumptions:
    - text: "Admission grade and Previous qualification (grade) are on the same 0\u2013\
        200 scale (non-negative and not exceeding 200). This justifies dividing both\
        \ by 200 and combining them linearly. Possible Deequ representation: .satisfies('`Admission\
        \ grade` >= 0 AND `Admission grade` <= 200 AND `Previous qualification (grade)`\
        \ >= 0 AND `Previous qualification (grade)` <= 200', 'grades_in_0_200', r\
        \ => r == 1.0)"
      sources:
      - start_line: 36
        end_line: 37
        file: ''
      - start_line: 59
        end_line: 60
        file: ''
      - start_line: 86
        end_line: 89
        file: ''
      uid: a4a4f5a6-3a12-460b-a1a8-88cee2c4e732
    - text: 'Admission grade and Previous qualification (grade) measure the same construct
        and should be positively correlated (e.g., Pearson correlation >= 0.3) to
        make the weighted consensus meaningful. Possible Deequ representation: .hasCorrelation(''Admission
        grade'', ''Previous qualification (grade)'', _ >= 0.3)'
      sources:
      - start_line: 51
        end_line: 51
        file: ''
      - start_line: 59
        end_line: 61
        file: ''
      - start_line: 86
        end_line: 89
        file: ''
      uid: ad67287c-e341-4bd2-b541-e19c5cec668d
    - text: 'The weighted consensus grade (0.6 * Admission grade/200 + 0.4 * Previous
        qualification (grade)/200) must lie within [0, 1] for all rows. Possible Deequ
