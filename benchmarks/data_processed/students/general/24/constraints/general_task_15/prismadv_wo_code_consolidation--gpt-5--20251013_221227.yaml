    - text: 'Cross-column consistency when there are no enrollments: if ''Curricular
        units 2nd sem (enrolled)'' == 0, then ''Curricular units 2nd sem (approved)''
        and ''Curricular units 2nd sem (without evaluations)'' should both be 0. This
        prevents logically inconsistent states that would otherwise be masked by safe_divide
        returning 0.0. Deequ example: .satisfies(''CASE WHEN `Curricular units 2nd
        sem (enrolled)` = 0 THEN ( (`Curricular units 2nd sem (approved)` = 0) AND
        (`Curricular units 2nd sem (without evaluations)` = 0 ) ) ELSE 1 END'', ''Zero-enrollment
        consistency'', lambda x: x == 1).'
