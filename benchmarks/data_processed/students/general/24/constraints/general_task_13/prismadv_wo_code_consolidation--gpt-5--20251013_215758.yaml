    - text: 'No record should have Debtor = 1 and Tuition fees up to date = 1 simultaneously
        (being a debtor is incompatible with having fees up to date). We can represent
        this as a Deequ compliance constraint: .hasCompliance(''no_debtor_when_up_to_date'',
        ''NOT(`Debtor` = 1 AND `Tuition fees up to date` = 1)'', assertion=equals(1.0))'
