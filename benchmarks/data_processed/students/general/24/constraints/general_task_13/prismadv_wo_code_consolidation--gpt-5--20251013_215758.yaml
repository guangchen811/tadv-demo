  : code: []
    assumptions:
    - text: 'For every row, the 2nd-semester ''approved'' and ''without evaluations''
        counts must each be less than or equal to the 2nd-semester ''enrolled'' count.
        This keeps pass_rate2 = approved/enrolled and no_eval_ratio2 = without_evaluations/enrolled
        naturally within [0,1]. Example Deequ constraints: .addConstraint(Compliance(''approved_le_enrolled_2nd_sem'',
        ''`Curricular units 2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)`'')).addConstraint(Compliance(''noeval_le_enrolled_2nd_sem'',
        ''`Curricular units 2nd sem (without evaluations)` <= `Curricular units 2nd
        sem (enrolled)`''))'
      sources:
      - start_line: 107
        end_line: 113
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 47f17994-d135-4dc3-ad05-aef235825844
    - text: 'If 2nd-semester ''enrolled'' equals 0 for a row, then both ''approved''
        and ''without evaluations'' must be 0 for that row. Conversely, if either
        ''approved'' > 0 or ''without evaluations'' > 0, then ''enrolled'' must be
        > 0. Example Deequ constraints: .addConstraint(Compliance(''if_enrolled_zero_then_others_zero_2nd_sem'',
        ''CASE WHEN `Curricular units 2nd sem (enrolled)` = 0 THEN (`Curricular units
        2nd sem (approved)` = 0 AND `Curricular units 2nd sem (without evaluations)`
        = 0) ELSE true END'')).addConstraint(Compliance(''if_any_positive_then_enrolled_positive_2nd_sem'',
        ''CASE WHEN (`Curricular units 2nd sem (approved)` > 0 OR `Curricular units
        2nd sem (without evaluations)` > 0) THEN `Curricular units 2nd sem (enrolled)`
        > 0 ELSE true END''))'
      sources:
