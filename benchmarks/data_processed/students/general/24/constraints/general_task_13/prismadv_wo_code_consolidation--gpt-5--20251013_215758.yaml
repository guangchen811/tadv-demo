        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: b2ab7dda-9cfd-4ef7-a873-7a15b30ea3ad
    - text: 'Fee-status complement holds for most rows: (`Debtor` + `Tuition fees
        up to date`) = 1 in at least 98% of records (i.e., states are almost always
        (1,0) or (0,1); (1,1) and (0,0) are rare). Example Deequ: .satisfies(''(`Debtor`
        + `Tuition fees up to date`) = 1'', ''fee_status_complement'', lambda v: v
        >= 0.98)'
      sources:
