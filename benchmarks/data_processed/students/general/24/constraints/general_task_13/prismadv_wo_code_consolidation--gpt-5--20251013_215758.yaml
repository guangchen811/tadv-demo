    - text: 'The pass-rate computation assumes ''Curricular units 1st sem (approved)''
        does not exceed ''Curricular units 1st sem (enrolled)'' and that approvals
        are 0 when enrollments are 0. We could represent this as a Deequ constraint:
        .addConstraint(Compliance("approved_vs_enrolled_1st_sem", "((`Curricular units
        1st sem (enrolled)` > 0 AND `Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (enrolled)`) OR (`Curricular units 1st sem (enrolled)` = 0 AND
