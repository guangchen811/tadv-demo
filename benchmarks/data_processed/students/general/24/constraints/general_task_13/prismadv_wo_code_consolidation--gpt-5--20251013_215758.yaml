    - text: '1st-semester academic accounting should not exceed enrollment and should
        typically close exactly: ''approved'' + ''credited'' + ''without evaluations''
        <= ''enrolled'' for all rows, and equality should hold for the vast majority
        of rows (e.g., compliance >= 0.95). Possible Deequ constraints: .satisfies(''`Curricular
        units 1st sem (approved)` + `Curricular units 1st sem (credited)` + `Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`'',
        ''counts_not_exceed_enr_1'') and a compliance/equality check with required
        compliance >= 0.95 for ''`Curricular units 1st sem (enrolled)` = `Curricular
        units 1st sem (approved)` + `Curricular units 1st sem (credited)` + `Curricular
        units 1st sem (without evaluations)`''.'
