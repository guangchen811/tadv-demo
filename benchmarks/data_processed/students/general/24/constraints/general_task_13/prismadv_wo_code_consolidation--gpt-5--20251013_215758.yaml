        file: ''
      - start_line: 96
        end_line: 102
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 229c1fd8-f6b2-4ca0-9179-cfdd967dadab
    - text: 'Each component count used to form pass/no-evaluation ratios is bounded
        by enrollment: ''approved'' <= ''enrolled'' and ''without evaluations'' <=
        ''enrolled''. This ensures the ratios a1/e1 and ne1/e1 stay within [0,1] without
        relying on clipping. Possible Deequ constraints: .satisfies(''`Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)`'', ''apr_le_enr_1'')
        and .satisfies(''`Curricular units 1st sem (without evaluations)` <= `Curricular
        units 1st sem (enrolled)`'', ''noeval_le_enr_1'').'
      sources:
