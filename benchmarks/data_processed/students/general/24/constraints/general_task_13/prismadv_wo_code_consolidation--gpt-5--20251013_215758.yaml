  '["GDP","Inflation rate","Unemployment rate"]':
    code:
    - suggestion: '.satisfies("`GDP` IS NOT NULL AND `Unemployment rate` IS NOT NULL
        AND `Inflation rate` IS NOT NULL AND `GDP` IN (-4.06, -3.12, -1.7, -0.92,
        0.32, 0.79, 1.74, 1.79, 2.02, 3.51) AND `Unemployment rate` IN (7.6, 8.9,
        9.4, 10.8, 11.1, 12.4, 12.7, 13.9, 15.5, 16.2) AND `Inflation rate` IN (-0.8,
        -0.3, 0.3, 0.5, 0.6, 1.4, 2.6, 2.8, 3.7)", "Macro columns complete and within
        enumerations", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
