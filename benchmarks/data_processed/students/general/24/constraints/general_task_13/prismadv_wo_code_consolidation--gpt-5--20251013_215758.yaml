        values drawn from the fixed allowed sets defined in the code, for every row
        (no nulls and no out-of-vocabulary values). This ensures the .map(...).astype(int)
        rank lookups succeed for all three simultaneously. We could represent this
        as Deequ constraints such as: areComplete(["GDP", "Unemployment rate", "Inflation
        rate"]) and satisfies("(GDP IN {-4.06,-3.12,-1.7,-0.92,0.32,0.79,1.74,1.79,2.02,3.51})
        AND (Unemployment rate IN {7.6,8.9,9.4,10.8,11.1,12.4,12.7,13.9,15.5,16.2})
        AND (Inflation rate IN {-0.8,-0.3,0.3,0.5,0.6,1.4,2.6,2.8,3.7})", compliance
        = 1.0).'
      sources:
      - start_line: 77
        end_line: 83
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: d9c2981e-94ae-4767-b0bd-eb3eb5345d38
    - text: 'Second-semester counts must be internally consistent row-wise: (1) Curricular
        units 2nd sem (approved) <= Curricular units 2nd sem (enrolled), (2) Curricular
        units 2nd sem (without evaluations) <= Curricular units 2nd sem (enrolled),
        and (3) if Curricular units 2nd sem (enrolled) = 0 then both approved and
        without evaluations must equal 0. This preserves meaningful pass_rate2 and
        no_eval_ratio2 and avoids undefined ratios. In Deequ: satisfies("(`Curricular
        units 2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)`) AND (`Curricular
        units 2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`)
        AND ((`Curricular units 2nd sem (enrolled)` > 0) OR (`Curricular units 2nd
        sem (approved)` = 0 AND `Curricular units 2nd sem (without evaluations)` =
        0))", compliance = 1.0).'
      sources:
      - start_line: 107
        end_line: 113
        file: ''
      uid: ce5884bd-171e-49d4-a618-2ddb90c918b4
    - text: 'The ''no-evaluation'' count for the 2nd semester must be sparse: at least
        90% of rows must have Curricular units 2nd sem (without evaluations) = 0 (equivalently,
        the share of non-zero values <= 0.10). This ensures noeval_sparsity_scale
        = sqrt(0.10 - share_non_zero_noeval2) is real and that macro_risk scaling
        remains well-defined. In Deequ: hasCompliance(''ne2_mostly_zero'', ''`Curricular
        units 2nd sem (without evaluations)` = 0'', _ >= 0.90).'
      sources:
      - start_line: 117
        end_line: 118
        file: ''
      - start_line: 135
        end_line: 135
        file: ''
      uid: 3d42c772-8958-4a10-841f-9535c4830ad6
    - text: 'Second-semester composition constraint: approved + credited + without
        evaluations must not exceed enrolled, i.e., (`Curricular units 2nd sem (approved)`
        + `Curricular units 2nd sem (credited)` + `Curricular units 2nd sem (without
        evaluations)`) <= `Curricular units 2nd sem (enrolled)`. This guards against
        impossible course-count combinations and keeps the derived ratios (pass_rate2,
        no_eval_ratio2) meaningful. In Deequ: satisfies("(`Curricular units 2nd sem
        (approved)` + `Curricular units 2nd sem (credited)` + `Curricular units 2nd
        sem (without evaluations)`) <= `Curricular units 2nd sem (enrolled)`", compliance
        = 1.0).'
      sources:
      - start_line: 106
        end_line: 113
        file: ''
      uid: 3b496939-b4f9-4f78-b3e0-952e5859b771
