        must be less than or equal to ''Curricular units 1st sem (enrolled)''. Additionally,
        if ''enrolled'' is 0, then ''credited'' must be 0. Possible Deequ constraints:
        .satisfies(''`Curricular units 1st sem (credited)` <= `Curricular units 1st
        sem (enrolled)`'', ''cred_le_enr_1'') and .satisfies(''(`Curricular units
