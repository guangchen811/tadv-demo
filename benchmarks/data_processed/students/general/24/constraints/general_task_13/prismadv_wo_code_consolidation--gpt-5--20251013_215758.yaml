      uid: 00eb118d-fc8c-446b-9c97-0dd8ff4a26f9
    - text: "Group-level stability of first-choice rate across attendance groups:\
        \ Because a single global first_choice_lift scales attendance_risk for both\
        \ day and evening students, the first-choice prevalence should be similar\
        \ across groups. Enforce |P(Application order = 1 | Daytime/evening attendance\\\
        t = 1) \u2212 P(Application order = 1 | Daytime/evening attendance\\t = 0)|\
        \ \u2264 0.10, with each conditional rate also \u2265 0.60. In Deequ, implement\
        \ as two compliances: .satisfies('`Application order` = 1', where='`Daytime/evening\
        \ attendance\\t` = 1', assertion=lambda v: v >= 0.60) and .satisfies('`Application\
        \ order` = 1', where='`Daytime/evening attendance\\t` = 0', assertion=lambda\
        \ v: v >= 0.60), plus a custom check on the absolute difference \u2264 0.10."
      sources:
      - start_line: 54
        end_line: 58
        file: ''
      - start_line: 60
        end_line: 65
        file: ''
      - start_line: 129
        end_line: 129
        file: ''
      uid: e328d33b-7f3f-4dd0-b93e-84c586dbc5e8
    - text: 'Group-wise allowed-set coverage for application order: To keep allowed_order_cohesion
        stable and not driven by a single attendance group, within each value of ''Daytime/evening
        attendance\t'' at least 95% of ''Application order'' values must be in {1,2,3,4,5,6}.
        Deequ representation: .satisfies(''`Application order` IN (1,2,3,4,5,6)'',
        where=''`Daytime/evening attendance\t` = 1'', assertion=lambda v: v >= 0.95)
        and the same with where=''... = 0''.'
      sources:
