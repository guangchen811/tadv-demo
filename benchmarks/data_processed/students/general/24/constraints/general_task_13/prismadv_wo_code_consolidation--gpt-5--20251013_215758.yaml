        end_line: 113
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 01b8f3b6-16c4-4a5b-a7dd-c8c372989bfb
    - text: 'For every row, the sum of 2nd-semester ''approved'' and ''without evaluations''
        must not exceed the 2nd-semester ''enrolled'' count: approved + without_evaluations
        <= enrolled. This prevents combined ratios from exceeding 1. Example Deequ
        constraint: .addConstraint(Compliance(''approved_plus_noeval_le_enrolled_2nd_sem'',
        ''(`Curricular units 2nd sem (approved)` + `Curricular units 2nd sem (without
        evaluations)`) <= `Curricular units 2nd sem (enrolled)`''))'
      sources:
