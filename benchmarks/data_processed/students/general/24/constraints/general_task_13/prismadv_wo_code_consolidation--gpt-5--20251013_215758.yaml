        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: 21b0a867-378d-4335-9e4b-ce9df45b8f01
    - text: 'Students not up to date on tuition are almost always labeled as debtors:
        P(Debtor = 1 | Tuition fees up to date = 0) >= 0.98. Example Deequ: .satisfies(''CASE
        WHEN `Tuition fees up to date` = 0 THEN `Debtor` = 1 ELSE true END'', ''not_up_to_date_implies_debtor'',
        lambda v: v >= 0.98)'
