      uid: 95f36472-fe9a-4c10-aaf5-37be20c43fb6
  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (credited)","Curricular
    units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For each record, ''Curricular units 1st sem (approved)'' must be between
        0 and ''Curricular units 1st sem (enrolled)''. This ensures the computed pass_rate1
        = approved/enrolled stays within [0,1] without relying on clipping. Deequ-style
        constraint: .addConstraint(Compliance(''c1_approved_le_enrolled'', ''`Curricular
        units 1st sem (approved)` >= 0 AND `Curricular units 1st sem (approved)` <=
        `Curricular units 1st sem (enrolled)`''))'
