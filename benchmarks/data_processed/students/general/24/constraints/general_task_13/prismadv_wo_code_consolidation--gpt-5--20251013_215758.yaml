    - text: 'Because ''approved'' and ''without evaluations'' represent disjoint subsets
        of the enrolled curricular units, their sum should not exceed ''Curricular
        units 1st sem (enrolled)'': `approved + without_evaluations <= enrolled`.
        We could represent this as a Deequ constraint: .addConstraint(Compliance("approved_plus_noeval_le_enrolled_1st_sem",
        "`Curricular units 1st sem (approved)` + `Curricular units 1st sem (without
