    - text: 'For each record, ''Curricular units 1st sem (without evaluations)'' must
        be between 0 and ''Curricular units 1st sem (enrolled)''. This ensures the
        computed no_eval_ratio1 = without_evaluations/enrolled is naturally in [0,1]
        without relying on clipping. Deequ-style constraint: .addConstraint(Compliance(''c1_noeval_le_enrolled'',
        ''`Curricular units 1st sem (without evaluations)` >= 0 AND `Curricular units
        1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`''))'
      sources:
      - start_line: 24
        end_line: 27
        file: ''
      - start_line: 96
        end_line: 102
        file: ''
      uid: 719fd8d4-f911-4263-a4a9-4d7675c79f14
    - text: 'The combined share of ''approved'' and ''without evaluations'' cannot
        exceed ''enrolled'' for 1st semester: ''Curricular units 1st sem (approved)''
        + ''Curricular units 1st sem (without evaluations)'' <= ''Curricular units
        1st sem (enrolled)''. Equivalently, pass_rate1 + no_eval_ratio1 <= 1 without
        needing clipping. Deequ-style constraint: .addConstraint(Compliance(''c1_approved_plus_noeval_le_enrolled'',
        ''`Curricular units 1st sem (approved)` + `Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)`''))'
      sources:
      - start_line: 101
        end_line: 102
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: a8bfd74a-a476-45bf-a3b1-9a70ddfecae0
    - text: 'If ''Curricular units 1st sem (enrolled)'' is 0 for a record, then ''Curricular
        units 1st sem (approved)'', ''Curricular units 1st sem (without evaluations)'',
        and ''Curricular units 1st sem (credited)'' must all be 0. This avoids undefined
        ratios being silently coerced to 0 and enforces semantic consistency when
        no units are enrolled. Deequ-style constraint: .addConstraint(Compliance(''c1_zero_enrolled_implies_all_zero'',
        ''(`Curricular units 1st sem (enrolled)` = 0) => (`Curricular units 1st sem
        (approved)` = 0 AND `Curricular units 1st sem (without evaluations)` = 0 AND
        `Curricular units 1st sem (credited)` = 0)''))'
      sources:
