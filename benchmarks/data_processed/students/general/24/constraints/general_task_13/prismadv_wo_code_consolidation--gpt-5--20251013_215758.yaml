  '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]':
    code: []
    assumptions:
    - text: 'The count of ''Curricular units 1st sem (without evaluations)'' must
        be less than or equal to the count of ''Curricular units 1st sem (enrolled)''.
        Additionally, if ''Curricular units 1st sem (enrolled)'' is 0, then ''Curricular
        units 1st sem (without evaluations)'' must be 0. We could represent this as
        a Deequ compliance constraint like: .addConstraint(Compliance("noeval_vs_enrolled_1st_sem",
        "((`Curricular units 1st sem (enrolled)` > 0 AND `Curricular units 1st sem
