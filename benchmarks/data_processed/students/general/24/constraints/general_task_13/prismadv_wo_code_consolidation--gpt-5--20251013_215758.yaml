      - 53e4ab10-8a43-4455-984c-d87f8e53127c
    - suggestion: '.satisfies("`Curricular units 2nd sem (without evaluations)` =
        0", "Non-zero share of 2nd-sem without evaluations <= 10%", lambda x: x >=
        0.90)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: f7636b7c-c2be-4c84-8319-92d05bd56682
      source_assumptions:
      - d0c2fb6a-2ba2-4e09-930a-1d0a289230ee
    assumptions:
    - text: "Across all records, the columns 'GDP', 'Unemployment rate', and 'Inflation\
        \ rate' must be complete (no nulls) and each value must be exactly one of\
        \ the fixed enumerations encoded in the script (GDP \u2208 [-4.06, -3.12,\
        \ -1.7, -0.92, 0.32, 0.79, 1.74, 1.79, 2.02, 3.51], Unemployment rate \u2208\
        \ [7.6, 8.9, 9.4, 10.8, 11.1, 12.4, 12.7, 13.9, 15.5, 16.2], Inflation rate\
        \ \u2208 [-0.8, -0.3, 0.3, 0.5, 0.6, 1.4, 2.6, 2.8, 3.7]). Otherwise, the\
        \ map-to-rank step will yield NaN and the subsequent .astype(int) cast will\
        \ fail. Deequ-style representation: .isComplete(\"GDP\"), .isComplete(\"Unemployment\
        \ rate\"), .isComplete(\"Inflation rate\"), and .isContainedIn(\"GDP\", [...]),\
        \ .isContainedIn(\"Unemployment rate\", [...]), .isContainedIn(\"Inflation\
        \ rate\", [...])."
      sources:
      - start_line: 77
        end_line: 79
        file: ''
      - start_line: 81
        end_line: 87
        file: ''
      uid: bd8556c4-3c8b-4581-a776-11cbccb241b7
    - text: "Directional monotonicity of the macro component: after converting the\
        \ three macro columns to ordinal indices (gdp_idx, unemp_idx, infl_idx), the\
        \ macro stress term must be non-decreasing with unemp_idx and infl_idx and\
        \ non-increasing with gdp_idx (before clipping). Concretely, holding GDP and\
        \ Inflation ranks fixed, higher Unemployment rank should not reduce the macro\
        \ stress; holding Unemployment and Inflation ranks fixed, higher GDP rank\
        \ should not increase the macro stress. This reflects the signed weights (unemployment\
        \ +0.8, inflation +0.3, GDP \u22120.2) used in the formula and can be validated\
        \ by deriving these indices and checking grouped monotonicity or sign of correlations."
      sources:
      - start_line: 90
        end_line: 92
        file: ''
      uid: 53e4ab10-8a43-4455-984c-d87f8e53127c
    - text: "The macro risk scaling factor requires a sparsity condition on 'Curricular\
        \ units 2nd sem (without evaluations)': the share of rows with a non-zero\
        \ value in this column must be \u2264 10%, so that 0.10 \u2212 share_non_zero_noeval2\
        \ \u2265 0 and sqrt(...) is defined. Otherwise macro_risk becomes NaN when\
        \ applying (1 + 0.5 * noeval_sparsity_scale). This ties the macro environment\
        \ effect to academic sparsity and should be enforced as: AVG(CASE WHEN `Curricular\
        \ units 2nd sem (without evaluations)` <> 0 THEN 1 ELSE 0 END) \u2264 0.10."
      sources:
      - start_line: 116
        end_line: 119
        file: ''
      - start_line: 135
        end_line: 135
        file: ''
      uid: ea2a00be-c36c-4e37-b2f7-f7a7498b7b12
    - text: "Exact-value encoding/precision across the three macro columns: because\
        \ rank mapping uses exact float keys, the datasets must present the macro\
        \ values with the exact decimals expected (no stray formatting like percent\
        \ signs, and no rounding drift). As a proxy integrity check across columns,\
        \ enforce that the number of distinct values equals the script\u2019s enumerations:\
        \ GDP has exactly 10 distinct values, Unemployment rate exactly 10, and Inflation\
        \ rate exactly 9."
      sources:
      - start_line: 77
        end_line: 79
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: d0c2fb6a-2ba2-4e09-930a-1d0a289230ee
