    - text: 'Dataset-level sparsity assumption: at least 90% of rows must have 2nd-semester
        ''without evaluations'' equal to 0 (i.e., share of rows with ''without evaluations''
        > 0 is <= 0.10). This is required for sqrt(0.10 - share_non_zero_noeval2)
        to be real and for macro scaling to be well-defined. Example Deequ constraint:
        .addConstraint(Compliance(''noeval_sparsity_2nd_sem'', ''`Curricular units
        2nd sem (without evaluations)` = 0'', 0.90))'
      sources:
      - start_line: 117
        end_line: 118
        file: ''
      - start_line: 135
