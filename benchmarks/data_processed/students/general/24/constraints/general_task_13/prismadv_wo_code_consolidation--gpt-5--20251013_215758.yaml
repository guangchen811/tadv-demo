      uid: de83a5ab-f9b0-43b1-b716-27d6a98935b4
  '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'The number of ''Curricular units 1st sem (approved)'' must be less than
        or equal to ''Curricular units 1st sem (enrolled)'' for every record, so the
        computed pass_rate1 = approved/enrolled naturally falls within [0,1] without
        relying on clipping. We could represent this as a Deequ constraint: .satisfies("`Curricular
