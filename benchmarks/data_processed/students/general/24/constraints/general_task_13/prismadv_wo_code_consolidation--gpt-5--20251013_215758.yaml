      uid: d0738c93-56db-4b6b-9312-36eecb86165f
    - text: 'Scholarship holder = 1 should imply Tuition fees up to date = 1 (scholarship
        students are expected to be fee-compliant). Deequ: .hasCompliance(''scholarship_requires_up_to_date'',
        ''(`Scholarship holder` = 0) OR (`Tuition fees up to date` = 1)'', assertion=equals(1.0))'
