  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'Debtor and Tuition fees up to date are logically mutually exclusive:
        if Debtor = 1 then Tuition fees up to date must be 0 (i.e., no row should
        have Debtor = 1 and Tuition fees up to date = 1). Allow at most 1% exceptions.
        Example Deequ: .satisfies(''NOT(`Debtor` = 1 AND `Tuition fees up to date`
        = 1)'', ''no_debtor_and_up_to_date'', lambda v: v >= 0.99)'
      sources:
