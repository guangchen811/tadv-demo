constraints:
  Admission grade:
    code:
    - - .isComplete('Admission grade')
      - Valid
    - - .satisfies('`Admission grade` >= 0 AND `Admission grade` <= 200', 'admission_grade_0_200')
      - Valid
    assumptions: []
  Age at enrollment:
    code:
    - - .isComplete('Age at enrollment')
      - Valid
    - - .satisfies('`Age at enrollment` >= 16 AND `Age at enrollment` <= 70', 'age_between_16_70')
      - Valid
    assumptions: []
  Application order:
    code:
    - - .isComplete('Application order')
      - Valid
    - - .satisfies('`Application order` >= 1 AND `Application order` <= 9', 'app_order_range')
      - Valid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isComplete('Curricular units 1st sem (approved)')
      - Valid
    - - .satisfies('`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (enrolled)`', 'c1_approved_le_enrolled')
      - Valid
    assumptions: []
  Curricular units 1st sem (credited):
    code:
    - - .isComplete('Curricular units 1st sem (credited)')
      - Valid
