  ? '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (credited)","Curricular
    units 2nd sem (enrolled)","Curricular units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For each record, second-semester counts are internally consistent: ''Curricular
        units 2nd sem (approved)'' <= ''Curricular units 2nd sem (enrolled)'', ''Curricular
        units 2nd sem (credited)'' <= ''Curricular units 2nd sem (enrolled)'', and
        ''Curricular units 2nd sem (without evaluations)'' <= ''Curricular units 2nd
        sem (enrolled)''. These constraints keep the derived ratios (approved/enrolled,
        credited/enrolled, without evaluations/enrolled) within [0,1]. Deequ examples:
        .isLessThanOrEqualTo(''Curricular units 2nd sem (approved)'', ''Curricular
        units 2nd sem (enrolled)''); .isLessThanOrEqualTo(''Curricular units 2nd sem
        (credited)'', ''Curricular units 2nd sem (enrolled)''); .isLessThanOrEqualTo(''Curricular
        units 2nd sem (without evaluations)'', ''Curricular units 2nd sem (enrolled)'').'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 6c964008-2c57-4826-b1cb-9075dfe2d660
    - text: 'If ''Curricular units 2nd sem (enrolled)'' = 0, then ''Curricular units
        2nd sem (approved)'' = 0 AND ''Curricular units 2nd sem (credited)'' = 0 AND
        ''Curricular units 2nd sem (without evaluations)'' = 0 (i.e., no approvals/credits/evaluations
        without enrollment). Deequ example: .satisfies("`Curricular units 2nd sem
        (enrolled)` > 0 OR (`Curricular units 2nd sem (approved)` = 0 AND `Curricular
        units 2nd sem (credited)` = 0 AND `Curricular units 2nd sem (without evaluations)`
        = 0)", ''no_activity_when_not_enrolled'', assertion=1.0).'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: cadd8efd-e727-41fa-b5b8-a1bd01c94c2d
    - text: 'The sum of second-semester approved units and units without evaluations
        does not exceed total enrolled units: ''Curricular units 2nd sem (approved)''
        + ''Curricular units 2nd sem (without evaluations)'' <= ''Curricular units
        2nd sem (enrolled)''. This prevents the combination used in fail_rate and
        no_eval_rate from implying more outcomes than enrollments. Deequ example:
        .satisfies("`Curricular units 2nd sem (approved)` + `Curricular units 2nd
        sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`", ''approved_plus_woeval_le_enrolled'',
        assertion=1.0).'
      sources:
      - start_line: 82
        end_line: 82
        file: ''
      - start_line: 89
        end_line: 90
        file: ''
      - start_line: 116
        end_line: 116
        file: ''
      uid: 90423977-9ebe-4514-97a9-12a9966e00e1
  '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For every row, ''Curricular units 2nd sem (approved)'' must be less than
        or equal to ''Curricular units 2nd sem (enrolled)'' and both counts must be
        non-negative. This ensures fail_rate_2''s numerator is non-negative and approval_rate_2
        lies in [0,1]. Example Deequ: .satisfies("`Curricular units 2nd sem (approved)`
        >= 0 AND `Curricular units 2nd sem (enrolled)` >= 0 AND `Curricular units
        2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)`", "c2_app_le_enr_and_nonneg")'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 7c16c337-73a7-48d4-beb0-02e40cedf992
    - text: 'No approvals without enrollment: if ''Curricular units 2nd sem (enrolled)''
        equals 0, then ''Curricular units 2nd sem (approved)'' must be 0. Example
        Deequ: .satisfies("(`Curricular units 2nd sem (enrolled)` != 0) OR (`Curricular
        units 2nd sem (approved)` = 0)", "no_approval_without_enrollment_c2")'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 8e653eac-3d80-425f-b8f1-3cc1c9a242c8
    - text: 'For 2nd semester, approvals plus ''without evaluations'' cannot exceed
        enrollments: ''Curricular units 2nd sem (approved)'' + ''Curricular units
        2nd sem (without evaluations)'' <= ''Curricular units 2nd sem (enrolled)''.
        Example Deequ: .satisfies("`Curricular units 2nd sem (approved)` + `Curricular
        units 2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`",
        "c2_app_plus_woeval_le_enr")'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      - start_line: 90
        end_line: 90
        file: ''
      uid: c8222e0a-0bc9-4ae6-a5fb-230d47099957
  ? '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (enrolled)","Curricular
    units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: "For each record, the number of 2nd-semester approved curricular units\
        \ must be between 0 and the number of 2nd-semester enrolled units (0 \u2264\
        \ approved \u2264 enrolled). We could represent this as a Deequ constraint\
        \ like: satisfies(\"`Curricular units 2nd sem (approved)` >= 0 AND `Curricular\
        \ units 2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)`\", \"\
        approved_within_enrolled_2nd_sem\")."
      sources:
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 82bda9f2-315d-4840-b040-186a2b6c8c41
    - text: "For each record, the number of 2nd-semester curricular units without\
        \ evaluations must be between 0 and the number of 2nd-semester enrolled units\
        \ (0 \u2264 without evaluations \u2264 enrolled). We could represent this\
        \ as a Deequ constraint like: satisfies(\"`Curricular units 2nd sem (without\
        \ evaluations)` >= 0 AND `Curricular units 2nd sem (without evaluations)`\
        \ <= `Curricular units 2nd sem (enrolled)`\", \"woeval_within_enrolled_2nd_sem\"\
        )."
      sources:
      - start_line: 82
        end_line: 82
        file: ''
      - start_line: 90
        end_line: 90
        file: ''
      uid: 0a35c5c3-d21d-4ed9-91ce-b38eaeca42db
    - text: "For each record, approved units and units without evaluations in the\
        \ 2nd semester should not exceed the number of enrolled units (approved +\
        \ without evaluations \u2264 enrolled). We could represent this as a Deequ\
        \ constraint like: satisfies(\"`Curricular units 2nd sem (approved)` + `Curricular\
        \ units 2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`\"\
        , \"approved_plus_woeval_le_enrolled_2nd_sem\")."
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 89
        end_line: 90
        file: ''
      uid: bd27bd0b-e2d5-4f84-a97e-f7aa98e43a18
    - text: 'If the number of 2nd-semester enrolled units is 0, then both approved
        units and units without evaluations must be 0 (to avoid defaulted divide outcomes
        distorting rates). We could represent this as a Deequ constraint like: satisfies("CASE
        WHEN `Curricular units 2nd sem (enrolled)` = 0 THEN (`Curricular units 2nd
        sem (approved)` = 0 AND `Curricular units 2nd sem (without evaluations)` =
        0) ELSE true END", "zero_enrolled_implies_zero_approved_and_woeval_2nd_sem").'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 51a1664a-223f-4a4e-879e-ca60a1794929
  '["Curricular units 2nd sem (credited)","Curricular units 2nd sem (enrolled)"]':
    code: []
    assumptions:
    - text: "Second\u2011semester credited units must never exceed second\u2011semester\
        \ enrolled units. Additionally, if `Curricular units 2nd sem (enrolled)` =\
        \ 0 then `Curricular units 2nd sem (credited)` must be 0 (to avoid undefined\
        \ or inflated credit_rate_2). Example Deequ: .satisfies(\"`Curricular units\
        \ 2nd sem (credited)` <= `Curricular units 2nd sem (enrolled)`\", \"cred_le_enr\"\
        ) and .satisfies(\"(`Curricular units 2nd sem (enrolled)` = 0) OR (`Curricular\
        \ units 2nd sem (credited)` = 0)\", \"no_credits_when_no_enrollment\")."
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 1ac8cdb4-3ca2-446a-a7be-390de4386b7a
    - text: "For rows used to output scores (Target = 'Enrolled'), the second\u2011\
        semester enrollment count must be positive and both `Curricular units 2nd\
        \ sem (enrolled)` and `Curricular units 2nd sem (credited)` must be non\u2011\
        null. This prevents divide\u2011by\u2011zero defaults (1.0/0.0) and NaNs from\
        \ propagating into the risk score. Example Deequ: .satisfies(\"(`Target` !=\
        \ 'Enrolled') OR (`Curricular units 2nd sem (enrolled)` > 0)\", \"enrolled_rows_have_positive_denominator\"\
        ) and .satisfies(\"(`Target` != 'Enrolled') OR (`Curricular units 2nd sem\
        \ (enrolled)` IS NOT NULL AND `Curricular units 2nd sem (credited)` IS NOT\
        \ NULL)\", \"enrolled_rows_have_values\")."
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 131
        end_line: 133
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 327c466c-ed95-40cc-af60-8ba1cb262d7e
    - text: "To avoid default-on-zero denominators in second\u2011semester rate calculations,\
        \ if `Curricular units 2nd sem (enrolled)` = 0 then all second\u2011semester\
        \ numerators must be 0 (approved, credited, and without evaluations). Example\
        \ Deequ: .satisfies(\"(`Curricular units 2nd sem (enrolled)` > 0) OR (`Curricular\
        \ units 2nd sem (approved)` = 0 AND `Curricular units 2nd sem (credited)`\
        \ = 0 AND `Curricular units 2nd sem (without evaluations)` = 0)\", \"no_positive_numerators_with_zero_denominator\"\
        )."
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 89
        end_line: 90
        file: ''
      uid: 45631086-ed82-47e8-a6ae-92570c9a3cac
  '["Curricular units 2nd sem (enrolled)","Curricular units 2nd sem (grade)"]':
    code: []
    assumptions:
    - text: 'For rows where ''Curricular units 2nd sem (enrolled)'' > 0, ''Curricular
        units 2nd sem (approved)'' must be within [0, ''Curricular units 2nd sem (enrolled)'']
        so that approval_rate_2 and fail_rate_2 remain in [0,1] prior to clipping.
        Deequ example: .satisfies(''(`Curricular units 2nd sem (enrolled)` <= 0) OR
        ((`Curricular units 2nd sem (approved)` >= 0) AND (`Curricular units 2nd sem
        (approved)` <= `Curricular units 2nd sem (enrolled)`))'', ''sem2_approved_within_enrolled'')'
      sources:
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: f975f20c-7f9c-457e-a1a4-1a8179a3112d
    - text: 'For rows where ''Curricular units 2nd sem (enrolled)'' > 0, ''Curricular
        units 2nd sem (without evaluations)'' must be within [0, ''Curricular units
        2nd sem (enrolled)''] so that woeval_rate_2 is bounded in [0,1]. Deequ example:
        .satisfies(''(`Curricular units 2nd sem (enrolled)` <= 0) OR ((`Curricular
        units 2nd sem (without evaluations)` >= 0) AND (`Curricular units 2nd sem
        (without evaluations)` <= `Curricular units 2nd sem (enrolled)`))'', ''sem2_woeval_within_enrolled'')'
      sources:
      - start_line: 82
        end_line: 82
        file: ''
      - start_line: 90
        end_line: 90
        file: ''
      uid: 1eaecabe-21ee-4b1a-ad77-3dd540926c77
    - text: 'For rows where ''Curricular units 2nd sem (enrolled)'' > 0, ''Curricular
        units 2nd sem (credited)'' must be within [0, ''Curricular units 2nd sem (enrolled)'']
        so that credit_rate_2 stays in [0,1]. Deequ example: .satisfies(''(`Curricular
        units 2nd sem (enrolled)` <= 0) OR ((`Curricular units 2nd sem (credited)`
        >= 0) AND (`Curricular units 2nd sem (credited)` <= `Curricular units 2nd
        sem (enrolled)`))'', ''sem2_credited_within_enrolled'')'
      sources:
      - start_line: 83
        end_line: 83
        file: ''
      uid: f9221f6f-d3b7-4fbd-9e53-7df979cb21db
    - text: 'No second-semester outcomes without second-semester enrollment: if ''Curricular
        units 2nd sem (enrolled)'' == 0 then ''Curricular units 2nd sem (approved)''
        == 0 AND ''Curricular units 2nd sem (credited)'' == 0 AND ''Curricular units
        2nd sem (without evaluations)'' == 0. This prevents spurious nonzero numerators
        when the denominator is zero. Deequ example: .satisfies(''(`Curricular units
        2nd sem (enrolled)` != 0) OR ((`Curricular units 2nd sem (approved)` = 0)
        AND (`Curricular units 2nd sem (credited)` = 0) AND (`Curricular units 2nd
        sem (without evaluations)` = 0))'', ''sem2_no_events_when_not_enrolled'')'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 644e6869-2a94-4b65-bb48-c45a982eb671
    - text: '''Curricular units 2nd sem (approved)'' + ''Curricular units 2nd sem
        (without evaluations)'' must not exceed ''Curricular units 2nd sem (enrolled)''
        (disjoint subcounts within the same semester). Deequ example: .satisfies(''(`Curricular
        units 2nd sem (approved)` + `Curricular units 2nd sem (without evaluations)`
        <= `Curricular units 2nd sem (enrolled)`)'', ''sem2_app_plus_woeval_le_enrolled'')'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 89
        end_line: 90
        file: ''
      uid: 7cdddc73-ecdd-4734-8469-ba1f101e07ba
    - text: "When there is second-semester enrollment (enrolled > 0), the second-semester\
        \ average grade should be on the 0\u201320 scale. Deequ example: .satisfies('(`Curricular\
        \ units 2nd sem (enrolled)` <= 0) OR ((`Curricular units 2nd sem (grade)`\
        \ >= 0.0) AND (`Curricular units 2nd sem (grade)` <= 20.0))', 'sem2_grade_range_when_enrolled')"
      sources:
      - start_line: 85
        end_line: 85
        file: ''
      - start_line: 115
        end_line: 115
        file: ''
      uid: 4dd156d4-ad9c-4156-9ee1-cd3c0d19f668
  '["Curricular units 2nd sem (enrolled)","Curricular units 2nd sem (without evaluations)"]':
    code: []
    assumptions:
    - text: 'For every record, the count in ''Curricular units 2nd sem (without evaluations)''
        must be between 0 and the count in ''Curricular units 2nd sem (enrolled)''.
        This keeps woeval_rate_2 = without_evaluations/enrolled within [0,1] as expected
        by downstream scoring. Example Deequ: .hasCompliance("woeval_le_enr", "`Curricular
        units 2nd sem (without evaluations)` >= 0 AND `Curricular units 2nd sem (without
        evaluations)` <= `Curricular units 2nd sem (enrolled)`")'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 90
        end_line: 90
        file: ''
      uid: b2e0e959-17e8-48c2-ba50-b890d6f466a5
    - text: 'For every record, the count in ''Curricular units 2nd sem (approved)''
        must be between 0 and the count in ''Curricular units 2nd sem (enrolled)''.
        This ensures fail_rate_2 = (enrolled - approved)/enrolled is well-defined
        and within [0,1]. Example Deequ: .hasCompliance("app_le_enr", "`Curricular
        units 2nd sem (approved)` >= 0 AND `Curricular units 2nd sem (approved)` <=
        `Curricular units 2nd sem (enrolled)`")'
      sources:
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 41ed810f-223a-41bb-827f-1d6adc0a995a
    - text: 'For every record, the count in ''Curricular units 2nd sem (credited)''
        must be between 0 and the count in ''Curricular units 2nd sem (enrolled)''.
        This keeps credit_rate_2 within [0,1] and prevents ratios > 1. Example Deequ:
        .hasCompliance("cred_le_enr", "`Curricular units 2nd sem (credited)` >= 0
        AND `Curricular units 2nd sem (credited)` <= `Curricular units 2nd sem (enrolled)`")'
      sources:
      - start_line: 83
        end_line: 83
        file: ''
      uid: af04312b-f764-4b09-bb2c-9f49c985c79f
    - text: 'The categories ''approved'' and ''without evaluations'' are disjoint
        subsets of ''enrolled'': ''Curricular units 2nd sem (approved)'' + ''Curricular
        units 2nd sem (without evaluations)'' <= ''Curricular units 2nd sem (enrolled)''.
        This prevents double counting and ensures engagement/failure features are
        consistent. Example Deequ: .hasCompliance("app_plus_woeval_le_enr", "`Curricular
        units 2nd sem (approved)` + `Curricular units 2nd sem (without evaluations)`
        <= `Curricular units 2nd sem (enrolled)`")'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      - start_line: 116
        end_line: 116
        file: ''
      uid: d6554ee2-85f4-40e5-b263-0fdf86bf259d
    - text: 'If ''Curricular units 2nd sem (enrolled)'' is 0, then ''Curricular units
        2nd sem (approved)'', ''Curricular units 2nd sem (without evaluations)'',
        and ''Curricular units 2nd sem (credited)'' must all be 0. This avoids logically
        impossible positive counts when no students are enrolled and avoids reliance
        on default ratios from robust_divide. Example Deequ: .hasCompliance("zero_enr_implies_zero_counts",
        "`Curricular units 2nd sem (enrolled)` != 0 OR (`Curricular units 2nd sem
        (approved)` = 0 AND `Curricular units 2nd sem (without evaluations)` = 0 AND
        `Curricular units 2nd sem (credited)` = 0)")'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 41ed88b7-d7e0-418f-ae3f-fd0af70d8508
    - text: 'For rows where Target == ''Enrolled'', the count in ''Curricular units
        2nd sem (enrolled)'' must be > 0. This prevents zero-denominator defaults
        from distorting risk scores for the scored cohort. Example Deequ: .hasCompliance("enrolled_rows_have_c2_enr_positive",
        "Target != ''Enrolled'' OR `Curricular units 2nd sem (enrolled)` > 0")'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 133
        end_line: 133
        file: ''
      uid: e63e4dde-da7f-4adb-b174-da8111e4bc33
