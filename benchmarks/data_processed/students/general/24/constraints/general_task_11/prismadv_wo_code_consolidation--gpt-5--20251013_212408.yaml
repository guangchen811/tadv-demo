        file: ''
      uid: d2f21cb5-2780-4781-b4f3-7215285c7d2f
    - text: 'Semester 1 ''without evaluations'' counts must be bounded by enrollments:
        0 <= ''Curricular units 1st sem (without evaluations)'' <= ''Curricular units
        1st sem (enrolled)''. This keeps woeval_rate_1 in [0,1]. Example Deequ: .hasCompliance(''c1_woeval_between_0_and_enr'',
        ''`Curricular units 1st sem (without evaluations)` >= 0 AND `Curricular units
        1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`'')'
      sources:
      - start_line: 76
        end_line: 76
        file: ''
      - start_line: 90
        end_line: 90
        file: ''
      uid: 695a0fc0-c6f2-404a-9fba-43494e29be6d
    - text: 'Semester 2 ''without evaluations'' counts must be bounded by enrollments:
        0 <= ''Curricular units 2nd sem (without evaluations)'' <= ''Curricular units
        2nd sem (enrolled)''. This keeps woeval_rate_2 in [0,1]. Example Deequ: .hasCompliance(''c2_woeval_between_0_and_enr'',
        ''`Curricular units 2nd sem (without evaluations)` >= 0 AND `Curricular units
        2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`'')'
      sources:
      - start_line: 82
        end_line: 82
        file: ''
      - start_line: 90
        end_line: 90
        file: ''
      uid: 3961af7d-dd66-4bbc-864a-d07824f19877
    - text: 'Semester 1 credits must be bounded by enrollments: 0 <= ''Curricular
        units 1st sem (credited)'' <= ''Curricular units 1st sem (enrolled)''. This
        keeps credit_rate_1 in [0,1]. Example Deequ: .hasCompliance(''c1_cred_between_0_and_enr'',
        ''`Curricular units 1st sem (credited)` >= 0 AND `Curricular units 1st sem
        (credited)` <= `Curricular units 1st sem (enrolled)`'')'
      sources:
      - start_line: 77
        end_line: 77
        file: ''
      uid: 50f4fa44-0985-4d02-84d5-0bfbd6315050
    - text: 'Semester 2 credits must be bounded by enrollments: 0 <= ''Curricular
        units 2nd sem (credited)'' <= ''Curricular units 2nd sem (enrolled)''. This
        keeps credit_rate_2 in [0,1]. Example Deequ: .hasCompliance(''c2_cred_between_0_and_enr'',
        ''`Curricular units 2nd sem (credited)` >= 0 AND `Curricular units 2nd sem
        (credited)` <= `Curricular units 2nd sem (enrolled)`'')'
      sources:
      - start_line: 83
        end_line: 83
        file: ''
      uid: 9ed71cee-0787-43ec-9fe1-21049b237ee3
    - text: 'Zero-enrollment safeguard (both semesters): If ''... (enrolled)'' ==
        0, then ''approved'' == 0 AND ''credited'' == 0 AND ''without evaluations''
        == 0 for that semester. This avoids defaulting division outputs (1.0 or 0.0)
        from injecting spurious rates. Example Deequ: .hasCompliance(''c1_zero_enr_implies_zero_counts'',
        ''`Curricular units 1st sem (enrolled)` != 0 OR (`Curricular units 1st sem
        (approved)` = 0 AND `Curricular units 1st sem (credited)` = 0 AND `Curricular
        units 1st sem (without evaluations)` = 0)''); and similarly for 2nd sem with
        the corresponding columns.'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 75
        end_line: 77
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: e96790f4-eec1-4143-982d-2f70b467460a
    - text: 'Disjointness bound (both semesters): ''approved'' + ''without evaluations''
        must not exceed ''enrolled'' for the same semester, i.e., `approved + without_evaluations
        <= enrolled`. This enforces that these categories are non-overlapping subsets
        of enrolled. Example Deequ: .hasCompliance(''c1_app_plus_woeval_le_enr'',
        ''`Curricular units 1st sem (approved)` + `Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)`''); and .hasCompliance(''c2_app_plus_woeval_le_enr'',
        ''`Curricular units 2nd sem (approved)` + `Curricular units 2nd sem (without
        evaluations)` <= `Curricular units 2nd sem (enrolled)`'')'
      sources:
      - start_line: 75
        end_line: 77
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 88
        end_line: 90
        file: ''
      uid: 78b32d58-2138-4d59-a15a-662168e2048c
    - text: 'For rows with Target = ''Enrolled'', at least one of the semester enrollment
        counts must be positive: `(`Curricular units 1st sem (enrolled)` + `Curricular
        units 2nd sem (enrolled)`) > 0`. This ensures we are producing meaningful
        risk scores for currently enrolled students. Example Deequ: .hasCompliance(''enrolled_target_has_any_sem_enrollment'',
        ''(`Target` != "Enrolled") OR (`Curricular units 1st sem (enrolled)` + `Curricular
        units 2nd sem (enrolled)` > 0)'')'
      sources:
      - start_line: 73
