  '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For every record, the count in ''Curricular units 1st sem (approved)''
        must be less than or equal to the count in ''Curricular units 1st sem (enrolled)''
        (i.e., 0 <= approved <= enrolled). This keeps the derived fail_rate_1 = (enrolled
        - approved)/enrolled non-negative and avoids impossible approval rates above
        100%. Deequ example: .addConstraint(Compliance("app_le_enr_sem1", "`Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)`"))'
      sources:
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: 8e470a37-916e-4454-9830-677816a4e961
    - text: 'If ''Curricular units 1st sem (enrolled)'' equals 0, then ''Curricular
        units 1st sem (approved)'' must also be 0. This prevents undefined ratios
        and avoids the default backfill in robust_divide (which would otherwise set
        approval_rate_1 to 1.0) from masking data issues. Deequ example: .addConstraint(Compliance("no_approvals_when_no_enrollments_sem1",
        "(`Curricular units 1st sem (enrolled)` = 0 AND `Curricular units 1st sem
        (approved)` = 0) OR (`Curricular units 1st sem (enrolled)` > 0)"))'
      sources:
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      - start_line: 8
        end_line: 15
        file: ''
      uid: 01cefaf1-9155-4877-80c2-aa40622e6e71
    - text: 'When ''Curricular units 1st sem (enrolled)'' > 0, the approval ratio
        approved/enrolled must lie within [0, 1]. Deequ example: .addConstraint(Compliance("approval_ratio_sem1_in_0_1",
        "CASE WHEN `Curricular units 1st sem (enrolled)` > 0 THEN (`Curricular units
        1st sem (approved)` * 1.0) / `Curricular units 1st sem (enrolled)` BETWEEN
        0.0 AND 1.0 ELSE true END"))'
      sources:
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      - start_line: 8
        end_line: 15
        file: ''
      uid: d4829bdd-fffb-496d-ab7a-6965c8230b16
  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)","Curricular
    units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For 1st semester, the number of approved curricular units must not exceed
        the number of enrolled curricular units (enrolled >= approved). Deequ example:
        .hasCompliance(''approved_le_enrolled_1st'', ''`Curricular units 1st sem (approved)`
        <= `Curricular units 1st sem (enrolled)`'')'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: db49fa64-5de6-40b8-a306-c325b0329f59
    - text: 'For 1st semester, the number of curricular units without evaluations
        must not exceed the number of enrolled curricular units (enrolled >= without_evaluations).
        Deequ example: .hasCompliance(''woeval_le_enrolled_1st'', ''`Curricular units
        1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`'')'
      sources:
