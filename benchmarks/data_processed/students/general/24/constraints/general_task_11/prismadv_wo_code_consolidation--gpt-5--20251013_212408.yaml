        end_line: 77
        file: ''
      uid: 786509a0-d9ee-4928-80a7-c6627ff0c3d3
    - text: 'For every record, the sum of ''Curricular units 1st sem (approved)''
        and ''Curricular units 1st sem (without evaluations)'' must not exceed ''Curricular
        units 1st sem (enrolled)''. Deequ example: .hasCompliance(''`Curricular units
        1st sem (approved)` + `Curricular units 1st sem (without evaluations)` <=
        `Curricular units 1st sem (enrolled)`'')'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      uid: 4510f05d-1bcd-434f-8a27-b074890aba19
    - text: 'If ''Curricular units 1st sem (enrolled)'' equals 0, then ''Curricular
        units 1st sem (approved)'', ''Curricular units 1st sem (credited)'', and ''Curricular
        units 1st sem (without evaluations)'' must all be 0 (no activity without enrollment).
        Deequ example: .hasCompliance(''case when `Curricular units 1st sem (enrolled)`
        = 0 then `Curricular units 1st sem (approved)` = 0 and `Curricular units 1st
        sem (credited)` = 0 and `Curricular units 1st sem (without evaluations)` =
        0 else true end'')'
      sources:
      - start_line: 8
        end_line: 15
