  '["Admission grade","Previous qualification (grade)"]':
    code: []
    assumptions:
    - text: 'Admission grade and Previous qualification (grade) share the same grading
        scale and must both lie within [0, 200]. This prevents clipping-induced distortion
        in adm_norm and prev_norm and ensures the weighted preparedness is meaningful.
        Example Deequ constraint: .addConstraint(Compliance("grades_in_range", "(`Admission
        grade` >= 0 AND `Admission grade` <= 200) AND (`Previous qualification (grade)`
        >= 0 AND `Previous qualification (grade)` <= 200)"))'
      sources:
      - start_line: 93
        end_line: 95
        file: ''
      uid: fd936dbb-c608-4595-b62d-0e177cd32141
    - text: 'For all rows used to produce outputs (Target == ''Enrolled''), both Admission
        grade and Previous qualification (grade) must be present (non-null) after
        parsing; otherwise preparedness (and hence risk_score) becomes NaN and propagates
        to outputs. Example Deequ multi-column compliance: .addConstraint(Compliance("enrolled_has_grades",
        "(`Target` != ''Enrolled'') OR (isNotNull(`Admission grade`) AND isNotNull(`Previous
        qualification (grade)`))"))'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 93
        end_line: 95
        file: ''
      - start_line: 131
        end_line: 139
        file: ''
      uid: 20bb60ac-10fa-4804-91ce-ee7065ebdfee
    - text: 'Both Admission grade and Previous qualification (grade) must be numerically
        parseable (no non-numeric strings) across the dataset since they are converted
        with errors=''coerce'' and used arithmetically together; any coercion to NaN
        would break preparedness. Example Deequ-style combined completeness check:
        .addConstraint(CompletenessOfColumns(Seq("Admission grade", "Previous qualification
        (grade)"), required = true)) or a compliance: .addConstraint(Compliance("grades_not_null",
        "isNotNull(`Admission grade`) AND isNotNull(`Previous qualification (grade)`)"))'
      sources:
      - start_line: 67
        end_line: 71
        file: ''
      - start_line: 93
        end_line: 95
        file: ''
      uid: 5167af36-ccd6-4ec1-b051-d2b6e38341e2
  '["Age at enrollment","Daytime/evening attendance"]':
    code: []
    assumptions:
    - text: 'For rows where Target = ''Enrolled'', both ''Daytime/evening attendance''
        and ''Age at enrollment'' must be present and valid for risk computation:
        ''Daytime/evening attendance'' must be numeric and in {0,1} (1 = day, 0 =
        evening), and ''Age at enrollment'' must be numeric and within [16, 70]. Deequ-style:
        .addConstraint(Compliance("enrolled_age_attendance_valid", "Target <> ''Enrolled''
        OR ((`Daytime/evening attendance` IN (0,1)) AND (`Age at enrollment` >= 16
        AND `Age at enrollment` <= 70))"))'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 101
        end_line: 103
        file: ''
      - start_line: 131
        end_line: 139
        file: ''
      uid: 52e1b168-4aca-4738-888e-80842cb4c86e
    - text: 'Within each semester, activity counts must not exceed enrollments: ''Curricular
        units 1st sem (approved)'' <= ''Curricular units 1st sem (enrolled)'', ''Curricular
        units 1st sem (credited)'' <= ''Curricular units 1st sem (enrolled)'', ''Curricular
        units 1st sem (without evaluations)'' <= ''Curricular units 1st sem (enrolled)'';
        and the same for 2nd semester. Deequ-style: .addConstraint(Compliance("sem1_counts_le_enrolled",
        "`Curricular units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)`
        AND `Curricular units 1st sem (credited)` <= `Curricular units 1st sem (enrolled)`
        AND `Curricular units 1st sem (without evaluations)` <= `Curricular units
        1st sem (enrolled)`")).addConstraint(Compliance("sem2_counts_le_enrolled",
        "`Curricular units 2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)`
        AND `Curricular units 2nd sem (credited)` <= `Curricular units 2nd sem (enrolled)`
        AND `Curricular units 2nd sem (without evaluations)` <= `Curricular units
        2nd sem (enrolled)`"))'
      sources:
      - start_line: 75
        end_line: 83
        file: ''
      - start_line: 88
        end_line: 90
        file: ''
      uid: fa0f8a21-edc6-4ab1-b655-800d08829711
    - text: 'If enrollments are zero in a semester, then approvals, credits, and without
        evaluations for that semester must all be zero (to avoid default ratios masking
        data issues). Formally: if ''Curricular units 1st sem (enrolled)'' = 0 then
        ''approved'' = 0 and ''credited'' = 0 and ''without evaluations'' = 0; same
        rule for 2nd semester. Deequ-style: .addConstraint(Compliance("sem1_zero_enrolled_zero_others",
        "(`Curricular units 1st sem (enrolled)` <> 0) OR (`Curricular units 1st sem
        (approved)` = 0 AND `Curricular units 1st sem (credited)` = 0 AND `Curricular
        units 1st sem (without evaluations)` = 0)")) and analogous for semester 2'
      sources:
      - start_line: 75
        end_line: 83
        file: ''
      - start_line: 88
        end_line: 90
        file: ''
      uid: 7a77ec1d-fd14-4157-b2f8-9bb2908b3360
    - text: "Grade columns are on a 0\u201320 scale for both semesters: 'Curricular\
        \ units 1st sem (grade)' and 'Curricular units 2nd sem (grade)' must be numeric\
        \ and in [0, 20]. Deequ-style: .addConstraint(Compliance(\"grades_range\"\
        , \"`Curricular units 1st sem (grade)` BETWEEN 0 AND 20 AND `Curricular units\
        \ 2nd sem (grade)` BETWEEN 0 AND 20\"))"
      sources:
      - start_line: 79
        end_line: 79
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: 1a6e1ef3-3a88-48af-b486-02802146d707
    - text: 'Financial status flags are binary in {0,1}: ''Debtor'', ''Tuition fees
        up to date'', and ''Scholarship holder'' must each be 0 or 1 (note ''Tuition
        fees up to date'' is used as 1 - value in the formula). Deequ-style: .isContainedIn("Debtor",
        [0,1]).isContainedIn("Tuition fees up to date", [0,1]).isContainedIn("Scholarship
        holder", [0,1])'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: be8247d3-fcbb-4c9f-9d5d-d66d47f92e5f
    - text: 'Macro indicators are expected within ranges consistent with the normalization:
        ''Unemployment rate'' in [5, 20], ''GDP'' in [-5, 5], and ''Inflation rate''
        in [-2, 5]. Deequ-style: .addConstraint(Compliance("macro_ranges", "`Unemployment
        rate` BETWEEN 5 AND 20 AND `GDP` BETWEEN -5 AND 5 AND `Inflation rate` BETWEEN
        -2 AND 5"))'
      sources:
      - start_line: 109
        end_line: 112
        file: ''
      uid: 38ebfe05-6fdc-4fd5-8cf2-62c68a266269
    - text: '''Application order'' must be an integer >= 1 and typically <= 9 (as
        normalized by ((order - 1)/8)). Deequ-style: .addConstraint(Compliance("app_order_range",
        "`Application order` >= 1 AND `Application order` <= 9"))'
      sources:
      - start_line: 106
        end_line: 106
        file: ''
      uid: df9b6d8b-df95-4f6d-9e2a-40fbc0c8acea
    - text: 'For rows where Target = ''Enrolled'', all inputs to the risk score must
        be non-null to ensure a valid risk_score and priority_tier: ''Daytime/evening
        attendance'', ''Age at enrollment'', ''Application order'', all semester counts
        and grades for 1st and 2nd semesters, ''Debtor'', ''Tuition fees up to date'',
        ''Scholarship holder'', ''Previous qualification (grade)'', ''Admission grade'',
        ''Unemployment rate'', ''GDP'', and ''Inflation rate''. Deequ-style: .addConstraint(Compliance("enrolled_all_features_present",
        "Target <> ''Enrolled'' OR (NOT(isnull(`Daytime/evening attendance`)) AND
        NOT(isnull(`Age at enrollment`)) AND NOT(isnull(`Application order`)) AND
        NOT(isnull(`Curricular units 1st sem (enrolled)`)) AND NOT(isnull(`Curricular
        units 1st sem (approved)`)) AND NOT(isnull(`Curricular units 1st sem (credited)`))
        AND NOT(isnull(`Curricular units 1st sem (without evaluations`)) AND NOT(isnull(`Curricular
        units 1st sem (grade)`)) AND NOT(isnull(`Curricular units 2nd sem (enrolled)`))
        AND NOT(isnull(`Curricular units 2nd sem (approved)`)) AND NOT(isnull(`Curricular
        units 2nd sem (credited)`)) AND NOT(isnull(`Curricular units 2nd sem (without
        evaluations`)) AND NOT(isnull(`Curricular units 2nd sem (grade)`)) AND NOT(isnull(`Debtor`))
        AND NOT(isnull(`Tuition fees up to date`)) AND NOT(isnull(`Scholarship holder`))
        AND NOT(isnull(`Previous qualification (grade)`)) AND NOT(isnull(`Admission
        grade`)) AND NOT(isnull(`Unemployment rate`)) AND NOT(isnull(`GDP`)) AND NOT(isnull(`Inflation
        rate`)))"))'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 121
        end_line: 128
        file: ''
      - start_line: 131
        end_line: 139
        file: ''
      uid: c2967b7c-326f-48a7-88c9-2ae3abe48a4a
  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (credited)","Curricular
    units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For every record, the number of ''Curricular units 1st sem (approved)''
        must be less than or equal to ''Curricular units 1st sem (enrolled)''; equivalently,
        when enrolled > 0, the approval rate is in [0,1]. Deequ example: .hasCompliance(''`Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)`'')'
      sources:
