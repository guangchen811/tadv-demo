        file: ''
      uid: ee7cb6ae-577d-4e00-ac01-36cac98c967d
    - text: "The 'GDP' column is expected to be in percentage points (not a 0\u2013\
        1 fraction) and within a realistic macroeconomic range, so that the normalization\
        \ ((5 - GDP) / 10).clip(0, 1) is meaningful. At least 95% of values should\
        \ lie between -10 and 10. We could represent this assumption as a Great Expectations\
        \ rule: expect_column_values_to_be_between('GDP', min_value=-10, max_value=10,\
        \ mostly=0.95); or as a Deequ constraint with a metric assertion on fraction\
        \ within [-10, 10]."
      sources:
      - start_line: 110
        end_line: 110
        file: ''
      - start_line: 112
        end_line: 112
        file: ''
      uid: 97bead27-aa46-4c7e-8d4e-7ceb87dd7060
  Debtor:
    code:
    - suggestion: .isContainedIn('Debtor', ['0', '1'])
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 2ddc8ae3-3a18-44fa-a9ae-085ad562865a
      source_assumptions:
      - ccf0d4bf-3cf2-4fe4-bb6e-c1a114509e35
    - suggestion: '.satisfies(''(`Target` != \''Enrolled\'') OR (`Debtor` IS NOT NULL)'',
        ''Debtor complete when enrolled'', lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 281fa004-ff86-4afe-b2e8-2fe68124203b
      source_assumptions:
      - 3b69d93b-3904-4bb0-985d-09eeec9d272c
    - suggestion: '.hasDataType(''Debtor'', ConstrainableDataTypes.Integral, lambda
        f: f >= 0.99)'
      validity: false
      reason_if_invalid: 'Skipping data type constraint: .hasDataType(''Debtor'',
        ConstrainableDataTypes.Integral, lambda f: f >= 0.99)'
      level: warning
      uid: c07d5028-08a7-4096-abf0-9761f9ddbea8
      source_assumptions:
      - 2b97c6df-392c-4abe-9717-efc0e97a99c5
    assumptions:
    - text: 'Debtor must be a binary indicator encoded as 0 (no debt) or 1 (has debt).
        No other values are allowed. This can be validated as: Great Expectations:
        expect_column_values_to_be_in_set(column=''Debtor'', value_set=[0, 1]); Deequ:
        .isContainedIn(''Debtor'', Array(0, 1)).'
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: ccf0d4bf-3cf2-4fe4-bb6e-c1a114509e35
    - text: 'Debtor must be non-null (and parseable to numeric) for all rows where
        Target == ''Enrolled'', otherwise risk_score and priority_tier will be null
        for those students. This can be validated as: Great Expectations: expect_column_values_to_not_be_null(column=''Debtor'',
        row_condition=''Target == "Enrolled"''); Deequ: .where("`Target` = ''Enrolled''").isComplete(''Debtor'').'
      sources:
      - start_line: 71
        end_line: 71
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      - start_line: 121
        end_line: 129
        file: ''
      - start_line: 130
        end_line: 139
        file: ''
      uid: 3b69d93b-3904-4bb0-985d-09eeec9d272c
    - text: 'All (or at least a very high proportion, e.g., >= 99%) of Debtor values
        should be parseable as numeric to avoid coercion to NaN during pd.to_numeric(...,
        errors=''coerce''). This can be validated as: Great Expectations: expect_column_values_to_be_in_type_list(column=''Debtor'',
        type_list=[''int64'', ''float64'']); Deequ: .hasDataType(''Debtor'', ConstrainableDataTypes.Integral)
        or .hasCompleteness(''Debtor'', _ >= 0.99).'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      uid: 2b97c6df-392c-4abe-9717-efc0e97a99c5
  '["Debtor","Scholarship holder","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'The columns ''Debtor'', ''Tuition fees up to date'', and ''Scholarship
        holder'' are required to be numeric binary indicators with values in {0,1}
        and have no nulls across all rows. This is necessary because they are coerced
        to numeric and used arithmetically (including ''1 - Tuition fees up to date'')
        without any null handling, and any non-binary or null values would propagate
        NaNs into financial_risk and downstream risk_score. Example Deequ constraint:
        .satisfies(''(`Debtor` IN (0,1)) AND (`Tuition fees up to date` IN (0,1))
        AND (`Scholarship holder` IN (0,1))'', atLeast=1.0).'
      sources:
      - start_line: 50
        end_line: 52
        file: ''
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: e8c2f934-d5da-42fb-af74-6c58868c259a
    - text: 'Given these three columns are binary, the un-clipped financial risk component
        r = 0.6*Debtor + 0.3*(1 - Tuition fees up to date) - 0.2*Scholarship holder
        should always lie within [-0.2, 0.9]. Values outside this range indicate non-binary
        or out-of-range inputs that are being masked by the clip. Enforce that at
        least 99% of rows satisfy -0.2 <= r <= 0.9. Example Deequ constraint: .satisfies(''(-0.2
        <= 0.6*`Debtor` + 0.3*(1 - `Tuition fees up to date`) - 0.2*`Scholarship holder`)
        AND (0.6*`Debtor` + 0.3*(1 - `Tuition fees up to date`) - 0.2*`Scholarship
        holder` <= 0.9)'', atLeast=0.99).'
      sources:
      - start_line: 98
        end_line: 98
        file: ''
      uid: 11357250-2a32-4818-88ae-26031a7b2cc8
    - text: 'When ''Tuition fees up to date'' == 1 and ''Debtor'' == 0, the financial
        risk component should be non-positive (specifically 0 if ''Scholarship holder''
        == 0 and -0.2 if ''Scholarship holder'' == 1), which after clipping yields
        0. This validates the intended boolean encoding and polarity across the three
        indicators. Example Deequ constraint: .satisfies(''NOT ((`Tuition fees up
        to date` = 1 AND `Debtor` = 0) AND (0.6*`Debtor` + 0.3*(1 - `Tuition fees
        up to date`) - 0.2*`Scholarship holder` > 0))'', atLeast=1.0).'
      sources:
      - start_line: 98
        end_line: 98
        file: ''
      uid: 7955a9ea-08ff-4ad2-a52e-37d48f712a74
  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'Both ''Debtor'' and ''Tuition fees up to date'' must be complete, numeric,
        and 0/1-encoded across all rows because the code performs arithmetic with
        them (including 1 - fees). This can be enforced with Deequ as a multi-column
        predicate: .satisfies("((`Debtor` IN (0, 1)) AND (`Tuition fees up to date`
        IN (0, 1)))", assertion=1.0) along with completeness checks .hasCompleteness("Debtor",
        1.0) and .hasCompleteness("Tuition fees up to date", 1.0).'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: c550e1cf-759b-48f9-a255-631f970f1425
    - text: 'No row should simultaneously have Debtor = 1 and Tuition fees up to date
        = 1 (being up to date on tuition implies not being a debtor). This can be
        represented as a multi-column constraint: .satisfies("(`Debtor` + `Tuition
        fees up to date`) <= 1", assertion=1.0).'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: eca0aa74-e2d1-46e2-99ef-e38a7ba8fc79
  '["GDP","Inflation rate","Unemployment rate"]':
    code: []
    assumptions:
    - text: 'The macroeconomic inputs ''Unemployment rate'', ''GDP'', and ''Inflation
        rate'' must be present and parseable as numeric (no coercion to NaN) for every
        row, because they are used in arithmetic without imputation and directly influence
        the final risk score. This can be enforced as a combined completeness constraint
        such as: .satisfies("`Unemployment rate` IS NOT NULL AND `GDP` IS NOT NULL
        AND `Inflation rate` IS NOT NULL", "macros_complete", _ >= 1.0).'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      - start_line: 109
        end_line: 112
        file: ''
      - start_line: 121
        end_line: 128
        file: ''
      uid: ff4740fb-2a50-4f5e-8f9d-11533fde2bd1
    - text: "The macroeconomic variables are expressed in percentage-point units and\
        \ should lie within the model\u2019s calibration ranges so that normalization\
        \ does not clip: 5 <= Unemployment rate <= 20 AND -5 <= GDP <= 5 AND -2 <=\
        \ Inflation rate <= 5 for all rows. This can be represented as a single multi-column\
        \ predicate: .satisfies(\"(`Unemployment rate` >= 5 AND `Unemployment rate`\
        \ <= 20) AND (`GDP` >= -5 AND `GDP` <= 5) AND (`Inflation rate` >= -2 AND\
        \ `Inflation rate` <= 5)\", \"macros_in_calibrated_ranges\", _ >= 1.0)."
      sources:
      - start_line: 109
        end_line: 112
        file: ''
      uid: 89260397-7f41-486e-a0ce-94941c9ee624
    - text: 'For records used to produce outputs (Target == ''Enrolled''), ''Unemployment
        rate'', ''GDP'', and ''Inflation rate'' must be non-null so that risk_score
        and priority_tier can be computed. Enforce with a conditional multi-column
        constraint: .satisfies("(`Target` <> ''Enrolled'') OR (`Unemployment rate`
        IS NOT NULL AND `GDP` IS NOT NULL AND `Inflation rate` IS NOT NULL)", "macros_present_for_enrolled",
        _ >= 1.0).'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 109
        end_line: 112
        file: ''
      - start_line: 121
        end_line: 128
        file: ''
      - start_line: 131
        end_line: 139
        file: ''
      uid: 35b6fd6f-06cd-46fd-9b5e-f169a2eeed24
  Target:
    code:
    - suggestion: '.hasCompleteness(''Target'', lambda v: v >= 0.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 1a952409-f567-4471-b93d-98e11c9d6133
      source_assumptions:
      - 30378b93-2b67-4784-b2ec-6d1aba6bb58d
    - suggestion: .isComplete('Target')
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 24fcb1b2-7989-4880-9f4d-91a68c9ebe3f
      source_assumptions:
      - d631a685-2037-44a3-84d4-82c6692dbad4
    - suggestion: '.isContainedIn(''Target'', [''Graduate'',''Dropout'',''Enrolled''],
        lambda f: f == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 97b257e0-8b76-4c4e-8878-9bbc3dd0024e
      source_assumptions:
      - a1fd1e86-b881-413b-920c-5aed44ff298b
    - suggestion: '.satisfies("`Target` = TRIM(`Target`)", "Target has no leading/trailing
        whitespace", lambda f: f == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 2122259d-23f4-4090-b77f-d1a7e330ce50
      source_assumptions:
      - ec0ba589-f589-4cdc-baaf-c7434d880e0d
    - suggestion: '.satisfies("`Target` = ''Enrolled''", "At least one ''Enrolled''
        record", lambda f: f > 0.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: e66dea69-a425-4da9-aed4-75aab95f4fbb
      source_assumptions:
      - 0045c08a-19a4-440e-8ab4-d686458ca488
    - suggestion: .hasDataType('Target', ConstrainableDataTypes.String)
      validity: false
      reason_if_invalid: 'Skipping data type constraint: .hasDataType(''Target'',
        ConstrainableDataTypes.String)'
      level: warning
      uid: e3f61d4e-9163-4fb9-aa36-ef91f4570be7
      source_assumptions:
      - 631e11fd-382b-4aba-add6-076967272d30
    assumptions:
    - text: 'The input must contain a column whose trimmed name is exactly ''Target''.
        This column is referenced directly after column-name trimming. A suitable
        validation would be: Deequ hasColumn(''Target'') or Great Expectations expect_table_columns_to_contain_set({''Target''}).'
      sources:
      - start_line: 30
        end_line: 30
        file: ''
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 131
        end_line: 131
        file: ''
      uid: 30378b93-2b67-4784-b2ec-6d1aba6bb58d
    - text: 'The ''Target'' column should be complete (no nulls). Nulls would be excluded
        from the enrolled mask and unintentionally drop records from scoring. Example
        validations: Deequ completeness(''Target'') >= 1.0 or Great Expectations expect_column_values_to_not_be_null(''Target'').'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 131
        end_line: 131
        file: ''
      uid: d631a685-2037-44a3-84d4-82c6692dbad4
    - text: 'The ''Target'' values must be in the allowed set {''Graduate'', ''Dropout'',
        ''Enrolled''} with exact spelling and case, since the code checks equality
        to the literal ''Enrolled''. Example validations: Deequ isContainedIn(''Target'',
        [''Graduate'',''Dropout'',''Enrolled'']) or Great Expectations expect_column_values_to_be_in_set(''Target'',
        [''Graduate'',''Dropout'',''Enrolled'']).'
      sources:
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: a1fd1e86-b881-413b-920c-5aed44ff298b
    - text: 'The ''Target'' values should not contain leading or trailing whitespace
        (e.g., ''Enrolled '' would be missed). Example validation: Deequ satisfies("CASE
        WHEN TRIM(`Target`) = `Target` THEN 1 ELSE 0 END", ''Target trimmed'', lambda
        x: x == 1) or Great Expectations expect_column_values_to_match_regex(''Target'',
        ''^\S(.*\S)?$'').'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      uid: ec0ba589-f589-4cdc-baaf-c7434d880e0d
    - text: 'There should be at least one record with Target == ''Enrolled'' so that
        a non-empty scoring output is produced. Example validation: Deequ satisfies("CASE
        WHEN `Target` = ''Enrolled'' THEN 1 ELSE 0 END", ''Has Enrolled'', lambda
        x: x > 0) or Great Expectations conditional expectation with row_condition="Target
        == ''Enrolled''" and expect_condition_number_of_rows_to_be_between(min_value=1).'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 131
        end_line: 131
        file: ''
      uid: 0045c08a-19a4-440e-8ab4-d686458ca488
    - text: 'The ''Target'' column should be of string/categorical type to support
        exact string comparison against ''Enrolled''. Example validation: Deequ hasDataType(''Target'',
        ConstrainableDataTypes.String) or Great Expectations expect_column_values_to_be_of_type(''Target'',
        ''str'' or ''object'').'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      uid: 631e11fd-382b-4aba-add6-076967272d30
