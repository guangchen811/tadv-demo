        end_line: 76
        file: ''
      - start_line: 90
        end_line: 90
        file: ''
      uid: 483186d6-5024-402f-a461-463c9e33b08a
    - text: 'For 1st semester, the sum of approved curricular units and curricular
        units without evaluations must not exceed the number of enrolled curricular
        units (approved + without_evaluations <= enrolled). Deequ example: .hasCompliance(''approved_plus_woeval_le_enrolled_1st'',
        ''`Curricular units 1st sem (approved)` + `Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)`'')'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      uid: fbeb9d67-3bc6-47b2-a46f-b74de56a10ee
    - text: 'If 1st semester enrolled equals 0, then both approved and without evaluations
        must also be 0 (no approvals or unevaluated units without any enrollment).
        Deequ example: .hasCompliance(''zero_enrolled_implies_zero_counts_1st'', ''CASE
        WHEN `Curricular units 1st sem (enrolled)` = 0 THEN (`Curricular units 1st
        sem (approved)` = 0 AND `Curricular units 1st sem (without evaluations)` =
        0) ELSE TRUE END'')'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: 819bea72-3e40-44b8-9d00-e36fa08a0999
    - text: 'For rows where 1st semester enrolled > 0, both the approval rate and
        the without-evaluation rate must be within [0, 1]. Deequ example: .hasCompliance(''rates_bounded_1st'',
        ''CASE WHEN `Curricular units 1st sem (enrolled)` > 0 THEN (`Curricular units
        1st sem (approved)` / `Curricular units 1st sem (enrolled)` BETWEEN 0 AND
        1 AND `Curricular units 1st sem (without evaluations)` / `Curricular units
        1st sem (enrolled)` BETWEEN 0 AND 1) ELSE TRUE END'')'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 88
        end_line: 90
        file: ''
      uid: 855d6882-dca4-489a-9850-a0300dece0f6
  '["Curricular units 1st sem (credited)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'First-semester unit counts must be coherent so that all derived rates
        stay within [0,1]: 0 <= ''Curricular units 1st sem (approved)'' <= ''Curricular
        units 1st sem (enrolled)'', 0 <= ''Curricular units 1st sem (credited)'' <=
        ''Curricular units 1st sem (enrolled)'', and 0 <= ''Curricular units 1st sem
        (without evaluations)'' <= ''Curricular units 1st sem (enrolled)''. This keeps
        approval_rate_1, credit_rate_1, and woeval_rate_1 bounded. We could represent
        this as Deequ constraints like: satisfies("`Curricular units 1st sem (approved)`
        >= 0 AND `Curricular units 1st sem (approved)` <= `Curricular units 1st sem
        (enrolled)`", "c1_app_le_enr", lambda v: v == 1.0), satisfies("`Curricular
        units 1st sem (credited)` >= 0 AND `Curricular units 1st sem (credited)` <=
        `Curricular units 1st sem (enrolled)`", "c1_cred_le_enr", lambda v: v == 1.0),
        satisfies("`Curricular units 1st sem (without evaluations)` >= 0 AND `Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`",
        "c1_woeval_le_enr", lambda v: v == 1.0).'
      sources:
      - start_line: 75
        end_line: 77
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: 8b0fd259-8479-4188-9a40-1d7a16bbf65b
    - text: "Approved plus without-evaluation units must not exceed enrolled units\
        \ in the first semester: 'Curricular units 1st sem (approved)' + 'Curricular\
        \ units 1st sem (without evaluations)' <= 'Curricular units 1st sem (enrolled)'.\
        \ This ensures that the implied number of failed-with-evaluation units (enrolled\
        \ \u2212 approved \u2212 without evaluations) is non-negative. Deequ: satisfies(\"\
        `Curricular units 1st sem (approved)` + `Curricular units 1st sem (without\
        \ evaluations)` <= `Curricular units 1st sem (enrolled)`\", \"app_plus_woeval_le_enr\"\
        , lambda v: v == 1.0)."
      sources:
      - start_line: 88
        end_line: 90
        file: ''
      uid: 0467fe92-ac9c-485b-8c95-dec394c1c155
    - text: 'If no units were enrolled in the first semester, then no units can be
        approved, credited, or without evaluation in that semester: if ''Curricular
        units 1st sem (enrolled)'' = 0 then ''Curricular units 1st sem (approved)''
        = 0 AND ''Curricular units 1st sem (credited)'' = 0 AND ''Curricular units
        1st sem (without evaluations)'' = 0. This avoids division-by-zero fallbacks
        (set to 1.0 for approval/credit rates and 0.0 for no-eval rate) from distorting
        scores. Deequ: satisfies("CASE WHEN `Curricular units 1st sem (enrolled)`
        = 0 THEN (`Curricular units 1st sem (approved)` = 0 AND `Curricular units
        1st sem (credited)` = 0 AND `Curricular units 1st sem (without evaluations)`
        = 0) ELSE true END", "no_counts_when_no_enrollment_sem1", lambda v: v == 1.0).'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 75
        end_line: 77
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: ed3acd61-d313-447a-b3a0-bd6fe65bf3aa
    - text: 'For records where Target = ''Enrolled'', first-semester enrolled units
        should be greater than 0 to prevent defaulted rates (e.g., approval_rate_1
        defaulting to 1.0) from skewing risk scoring: if Target = ''Enrolled'' then
        ''Curricular units 1st sem (enrolled)'' > 0. Deequ: satisfies("CASE WHEN `Target`
        = ''Enrolled'' THEN `Curricular units 1st sem (enrolled)` > 0 ELSE true END",
        "enrolled_rows_have_sem1_units", lambda v: v == 1.0).'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 75
        end_line: 77
        file: ''
      - start_line: 131
        end_line: 134
        file: ''
      uid: 9aea5c0a-458a-4a94-a879-57235e63d2a5
  '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (grade)"]':
    code: []
    assumptions:
    - text: '1st-semester outcome counts must be bounded by 1st-semester enrollment:
        each of ''Curricular units 1st sem (approved)'', ''Curricular units 1st sem
        (credited)'', and ''Curricular units 1st sem (without evaluations)'' is non-negative
        and <= ''Curricular units 1st sem (enrolled)''. This keeps approval_rate_1,
        woeval_rate_1, credit_rate_1, and fail_rate_1 meaningful without relying on
        clipping. Example Deequ constraints: .satisfies("`Curricular units 1st sem
        (approved)` >= 0 AND `Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (enrolled)`", "c1_app_within_enrolled"), .satisfies("`Curricular
        units 1st sem (credited)` >= 0 AND `Curricular units 1st sem (credited)` <=
        `Curricular units 1st sem (enrolled)`", "c1_cred_within_enrolled"), .satisfies("`Curricular
        units 1st sem (without evaluations)` >= 0 AND `Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)`", "c1_woeval_within_enrolled").'
      sources:
      - start_line: 75
        end_line: 77
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: fa2b5b4a-8449-4ce2-9796-eb73c6b455c0
    - text: 'If ''Curricular units 1st sem (enrolled)'' = 0, then the related 1st-semester
        counts must be 0 and the 1st-semester grade must be 0 to avoid defaulted ratios
        and a non-informative normalized grade: ''Curricular units 1st sem (approved)''
        = 0 AND ''Curricular units 1st sem (credited)'' = 0 AND ''Curricular units
        1st sem (without evaluations)'' = 0 AND ''Curricular units 1st sem (grade)''
        = 0. Example Deequ constraint: .satisfies("CASE WHEN `Curricular units 1st
        sem (enrolled)` = 0 THEN (`Curricular units 1st sem (approved)` = 0 AND `Curricular
        units 1st sem (credited)` = 0 AND `Curricular units 1st sem (without evaluations)`
        = 0 AND `Curricular units 1st sem (grade)` = 0) ELSE TRUE END", "c1_zero_enr_implies_zeros").'
      sources:
      - start_line: 75
        end_line: 79
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: b0633f83-1b9a-4b3d-93f6-22529e031ec2
    - text: 'For rows where Target = ''Enrolled'', the student must have some current
        enrollment: (''Curricular units 1st sem (enrolled)'' + ''Curricular units
        2nd sem (enrolled)'') > 0. This prevents the risk model from relying on default
        ratios for students being scored/output. Example Deequ constraint: .satisfies("CASE
        WHEN `Target` = ''Enrolled'' THEN (`Curricular units 1st sem (enrolled)` +
        `Curricular units 2nd sem (enrolled)`) > 0 ELSE TRUE END", "enrolled_have_any_units").'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 81
        end_line: 85
        file: ''
      - start_line: 131
        end_line: 139
        file: ''
      uid: 7c79fc7a-ec0d-4aca-b79b-86061e9f14e8
    - text: "When there is 1st-semester enrollment, the 1st-semester grade must be\
        \ on the 0\u201320 scale used by the normalization: if 'Curricular units 1st\
        \ sem (enrolled)' > 0 then 0 <= 'Curricular units 1st sem (grade)' <= 20.\
        \ Example Deequ constraint: .satisfies(\"CASE WHEN `Curricular units 1st sem\
        \ (enrolled)` > 0 THEN (`Curricular units 1st sem (grade)` >= 0 AND `Curricular\
        \ units 1st sem (grade)` <= 20) ELSE TRUE END\", \"c1_grade_range_when_enrolled\"\
        )."
      sources:
      - start_line: 75
        end_line: 79
        file: ''
      uid: cb350dd7-86f9-47fa-94d2-ef7102f4f938
  '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]':
    code: []
    assumptions:
    - text: 'For every row, ''Curricular units 1st sem (without evaluations)'' must
        be less than or equal to ''Curricular units 1st sem (enrolled)''. This keeps
        the computed woeval_rate_1 = wo_eval/enrolled within [0,1]. Deequ example:
        .addConstraint(Compliance(''woeval_le_enrolled_sem1'', ''`Curricular units
        1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`''))'
      sources:
      - start_line: 76
        end_line: 76
        file: ''
      - start_line: 90
        end_line: 90
        file: ''
      - start_line: 115
        end_line: 118
        file: ''
      uid: 6c6bf729-e6bc-4ab3-b86b-db741eff63e3
    - text: 'The ratio ''Curricular units 1st sem (without evaluations)'' / ''Curricular
        units 1st sem (enrolled)'' must be defined and bounded: if enrolled == 0 then
        wo_eval must be 0; otherwise 0 <= wo_eval/enrolled <= 1. Deequ example: .addConstraint(Compliance(''woeval_rate_sem1_bounded'',
        ''((`Curricular units 1st sem (enrolled)` = 0 AND `Curricular units 1st sem
        (without evaluations)` = 0) OR (`Curricular units 1st sem (enrolled)` > 0
        AND `Curricular units 1st sem (without evaluations)` >= 0 AND `Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`))''))'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 76
        end_line: 76
        file: ''
      - start_line: 90
        end_line: 90
        file: ''
      uid: 7d597826-9cee-41f2-b19c-dee92c0cadad
    - text: 'For records scored (Target == ''Enrolled''), ''Curricular units 1st sem
        (enrolled)'' should be at least 1 (students flagged as enrolled should have
        enrolled units). Deequ example: .addConstraint(Compliance(''enrolled_target_has_units_sem1'',
        ''(`Target` <> "Enrolled") OR (`Curricular units 1st sem (enrolled)` >= 1)''))'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 131
        end_line: 139
        file: ''
      - start_line: 76
        end_line: 76
        file: ''
      uid: 757e6089-fd42-4391-870e-67d023ab47a8
    - text: 'In 1st semester, the sum of ''approved'' and ''without evaluations''
        should not exceed ''enrolled'': ''Curricular units 1st sem (approved)'' +
        ''Curricular units 1st sem (without evaluations)'' <= ''Curricular units 1st
        sem (enrolled)''. This ensures category counts do not surpass total enrollments.
        Deequ example: .addConstraint(Compliance(''app_plus_woeval_le_enrolled_sem1'',
        ''(`Curricular units 1st sem (approved)` + `Curricular units 1st sem (without
        evaluations)`) <= `Curricular units 1st sem (enrolled)`''))'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: 851b043a-06fc-4e74-b768-d0636a8c0837
  '["Curricular units 1st sem (enrolled)","Curricular units 2nd sem (enrolled)","Target"]':
    code: []
    assumptions:
    - text: 'Semester 1 approvals must be bounded by enrollments: 0 <= ''Curricular
        units 1st sem (approved)'' <= ''Curricular units 1st sem (enrolled)''. This
        ensures approval_rate_1 and fail_rate_1 remain in [0,1]. Example Deequ: .hasCompliance(''c1_app_between_0_and_enr'',
        ''`Curricular units 1st sem (approved)` >= 0 AND `Curricular units 1st sem
        (approved)` <= `Curricular units 1st sem (enrolled)`'')'
      sources:
