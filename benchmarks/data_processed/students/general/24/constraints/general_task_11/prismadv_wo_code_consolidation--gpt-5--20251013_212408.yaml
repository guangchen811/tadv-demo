      - start_line: 88
        end_line: 88
        file: ''
      uid: 1ce2c7b4-1cdf-4644-abea-da4298d7ff6f
    - text: 'Semester 2 approvals must be bounded by enrollments: 0 <= ''Curricular
        units 2nd sem (approved)'' <= ''Curricular units 2nd sem (enrolled)''. This
        ensures approval_rate_2 and fail_rate_2 remain in [0,1]. Example Deequ: .hasCompliance(''c2_app_between_0_and_enr'',
        ''`Curricular units 2nd sem (approved)` >= 0 AND `Curricular units 2nd sem
        (approved)` <= `Curricular units 2nd sem (enrolled)`'')'
      sources:
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
