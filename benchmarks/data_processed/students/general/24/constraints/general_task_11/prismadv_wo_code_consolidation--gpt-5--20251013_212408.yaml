        end_line: 75
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: e75d671b-6887-48a6-97b9-12993bb65081
    - text: 'For every record, the number of ''Curricular units 1st sem (without evaluations)''
        must be less than or equal to ''Curricular units 1st sem (enrolled)''; equivalently,
        when enrolled > 0, the no-evaluation rate is in [0,1]. Deequ example: .hasCompliance(''`Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`'')'
      sources:
      - start_line: 76
        end_line: 76
        file: ''
      uid: b126eaea-f136-4170-860e-3cdd2445c051
    - text: 'For every record, the number of ''Curricular units 1st sem (credited)''
        must be less than or equal to ''Curricular units 1st sem (enrolled)''; equivalently,
        when enrolled > 0, the credit rate is in [0,1]. Deequ example: .hasCompliance(''`Curricular
        units 1st sem (credited)` <= `Curricular units 1st sem (enrolled)`'')'
      sources:
