- column_name: Curricular units 1st sem (without evaluations)
  code_for_constraint: .isNonNegative('Curricular units 1st sem (without evaluations)')
- column_name: Curricular units 1st sem (without evaluations)
  code_for_constraint: .satisfies('`Curricular units 1st sem (without evaluations)`
