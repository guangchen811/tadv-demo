raw_constraints:
- column_name: Tuition fees up to date
  code_for_constraint: .isComplete('Tuition fees up to date')
- column_name: Tuition fees up to date
  code_for_constraint: .isContainedIn('Tuition fees up to date', [0, 1])
- column_name: Debtor
  code_for_constraint: .isComplete('Debtor')
- column_name: Debtor
  code_for_constraint: .isContainedIn('Debtor', [0, 1])
- column_name: "Daytime/evening attendance\t"
  code_for_constraint: ".isComplete('Daytime/evening attendance\t')"
- column_name: "Daytime/evening attendance\t"
  code_for_constraint: ".isContainedIn('Daytime/evening attendance\t', [0, 1])"
- column_name: Age at enrollment
  code_for_constraint: .isComplete('Age at enrollment')
- column_name: Age at enrollment
  code_for_constraint: .isNonNegative('Age at enrollment')
- column_name: Admission grade
  code_for_constraint: .isComplete('Admission grade')
- column_name: Admission grade
  code_for_constraint: .isNonNegative('Admission grade')
- column_name: Admission grade
  code_for_constraint: .satisfies('`Admission grade` >= 0 AND `Admission grade` <=
    200', 'admission_grade_range')
- column_name: Previous qualification (grade)
  code_for_constraint: .isComplete('Previous qualification (grade)')
- column_name: Previous qualification (grade)
  code_for_constraint: .isNonNegative('Previous qualification (grade)')
- column_name: Previous qualification (grade)
  code_for_constraint: .satisfies('`Previous qualification (grade)` >= 0 AND `Previous
