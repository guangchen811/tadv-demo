  ? '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (evaluations)","Curricular
    units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For every record, the number of ''Curricular units 1st sem (evaluations)''
        must be less than or equal to ''Curricular units 1st sem (enrolled)''. This
        keeps eval_ratio in [0,1] when enrolled > 0. Deequ example: .satisfies("`Curricular
        units 1st sem (evaluations)` <= `Curricular units 1st sem (enrolled)`", "evals_le_enrolled")'
      sources:
      - start_line: 39
        end_line: 44
        file: ''
      uid: 6c48640e-26e5-4d0c-88b2-0d2d43f44a02
    - text: 'For every record, the sum of ''Curricular units 1st sem (evaluations)''
        and ''Curricular units 1st sem (without evaluations)'' must be less than or
        equal to ''Curricular units 1st sem (enrolled)''. This reflects that enrolled
        units are either evaluated or not. Deequ example: .satisfies("`Curricular
        units 1st sem (evaluations)` + `Curricular units 1st sem (without evaluations)`
        <= `Curricular units 1st sem (enrolled)`", "evals_plus_without_le_enrolled")'
      sources:
      - start_line: 39
        end_line: 41
        file: ''
      - start_line: 70
        end_line: 71
        file: ''
      uid: 0d309096-2ebc-48d3-ae60-4680511d325b
    - text: 'If ''Curricular units 1st sem (enrolled)'' equals 0, then both ''Curricular
        units 1st sem (evaluations)'' and ''Curricular units 1st sem (without evaluations)''
        must be 0. This prevents spurious evaluations/nonevaluations when the student
        is not enrolled. Deequ example: .satisfies("CASE WHEN `Curricular units 1st
        sem (enrolled)` = 0 THEN (`Curricular units 1st sem (evaluations)` = 0 AND
        `Curricular units 1st sem (without evaluations)` = 0) ELSE true END", "no_activity_when_not_enrolled")'
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      uid: 3b533e44-138f-4cef-af09-18a42febd644
    - text: 'The three columns ''Curricular units 1st sem (enrolled)'', ''Curricular
        units 1st sem (evaluations)'', and ''Curricular units 1st sem (without evaluations)''
        represent non-negative integer counts with no missing values. Deequ examples:
        hasDataType(col, Integral) for each; isNonNegative(col) for each; isComplete(col)
        for each.'
      sources:
      - start_line: 20
        end_line: 37
        file: ''
      - start_line: 39
        end_line: 41
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      uid: 24bb564f-55ee-439c-b2e8-19faada986db
  '["Curricular units 1st sem (grade)","Curricular units 2nd sem (grade)"]':
    code: []
    assumptions:
    - text: "Both `Curricular units 1st sem (grade)` and `Curricular units 2nd sem\
        \ (grade)` are on the same 0\u201320 grading scale and are directly comparable;\
        \ every value in both columns must be between 0 and 20 inclusive. Deequ-style\
        \ constraint: satisfies expr: (`Curricular units 1st sem (grade)` between\
        \ 0 and 20) AND (`Curricular units 2nd sem (grade)` between 0 and 20)."
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: 3ef5e0ee-ef2a-4736-b0a0-a165a1a9e51d
    - text: 'The two grade columns are expected to be present together per row (no
        row should have one grade missing while the other is present), so that avg_grade
        and grade_diff are well-defined for all rows. Deequ-style constraint: satisfies
        expr: ((`Curricular units 1st sem (grade)` IS NULL AND `Curricular units 2nd
        sem (grade)` IS NULL) OR (`Curricular units 1st sem (grade)` IS NOT NULL AND
        `Curricular units 2nd sem (grade)` IS NOT NULL)).'
      sources:
      - start_line: 50
        end_line: 53
        file: ''
      uid: 9c33d884-e616-46c3-82f8-a0dbc446e067
    - text: 'Grade stability across semesters: for most records, the absolute difference
        between `Curricular units 1st sem (grade)` and `Curricular units 2nd sem (grade)`
        should be at most 6 points (the scale used to compute consistency). Deequ-style
        constraint: satisfies expr: abs(`Curricular units 1st sem (grade)` - `Curricular
        units 2nd sem (grade)`) <= 6 with minimum compliance (e.g., >= 0.9).'
      sources:
      - start_line: 51
        end_line: 53
        file: ''
      uid: a3ee362e-9bb6-477f-8c78-ac888ccd736f
    - text: 'First-semester evaluation arithmetic coherence: (a) `Curricular units
        1st sem (evaluations)` + `Curricular units 1st sem (without evaluations)`
        equals `Curricular units 1st sem (enrolled)`; (b) `Curricular units 1st sem
        (evaluations)` <= `Curricular units 1st sem (enrolled)`; (c) `Curricular units
        1st sem (approved)` <= `Curricular units 1st sem (evaluations)`. Deequ-style
        constraints: three satisfies expressions enforcing these relationships.'
      sources:
      - start_line: 39
        end_line: 46
        file: ''
      uid: 351cb970-7b1b-4b70-8e3c-604ff7bf6746
    - text: "`Admission grade` and `Previous qualification (grade)` share the same\
        \ 0\u2013200 scale and are comparable; their absolute difference is expected\
        \ to be within 50 points for most rows (as used to normalize prep_closeness).\
        \ Deequ-style constraints: (a) satisfies expr: (`Admission grade` between\
        \ 0 and 200) AND (`Previous qualification (grade)` between 0 and 200); (b)\
        \ satisfies expr: abs(`Admission grade` - `Previous qualification (grade)`)\
        \ <= 50 with minimum compliance (e.g., >= 0.9)."
      sources:
      - start_line: 58
        end_line: 61
        file: ''
      uid: 9ba71d6a-cbcb-4ba7-b06e-af4536602962
    - text: '`Debtor`, `Tuition fees up to date`, and `Scholarship holder` are binary
        indicators taking only the values 0 or 1 (they are cast to Int and used in
        boolean-style logic). Deequ-style constraints: isContainedIn for each column
        with allowed values {0, 1}.'
      sources:
      - start_line: 64
        end_line: 67
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 85
        end_line: 86
        file: ''
      uid: ba4ad53f-0395-453b-ae10-643fabc4608b
