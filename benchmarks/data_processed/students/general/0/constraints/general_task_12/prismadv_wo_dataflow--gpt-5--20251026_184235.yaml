    assumptions:
    - text: The 'Debtor' column must exist in the input data with this exact name,
        since it is accessed without a prior existence check.
      sources:
      - start_line: 29
        end_line: 29
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      uid: 244685e6-9238-4dac-a12a-3919c6bf78c8
    - text: 'All non-null ''Debtor'' values must be numeric and integer-valued (no
        free-text or decimal numbers). The pipeline coerces to numeric and then casts
        to a nullable integer type, which will fail on non-integer numeric strings
        (e.g., 0.5). This can be validated with a rule like: values are of integer
        type or are integer-valued numerics.'
      sources:
      - start_line: 34
        end_line: 37
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      uid: 923d87bf-7d4a-4718-a7e8-71201432ef6c
    - text: "The 'Debtor' column should be binary with values in {0, 1}. This keeps\
        \ the financial risk component within the intended 0\u20131 scale before clipping."
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      uid: 46923cf8-7e0d-43e1-89cf-185339356bcf
    - text: '''Debtor'' should not contain nulls. Missing values propagate to NaN
        in risk_financial and risk_score and affect downstream decisions (recommended_action),
        and the code does not impute this column.'
      sources:
      - start_line: 64
        end_line: 64
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 112
        end_line: 114
        file: ''
      uid: b957e686-d3cf-4798-a4af-d758cca9e30c
    - text: '''Debtor'' encoding must be 1 = debtor/in arrears and 0 = not a debtor,
        because a higher value directly increases the financial risk via 0.6 * Debtor.
        Reversed or alternative encodings (e.g., ''Yes''/''No'') would mis-score risk.'
      sources:
      - start_line: 63
        end_line: 67
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 7671a318-44e0-451b-931a-4ab645a29a8f
  '["Debtor","Scholarship holder","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'The ''Debtor'' and ''Tuition fees up to date'' flags are mutually exclusive:
        no record should have both Debtor = 1 and Tuition fees up to date = 1. Equivalently,
        Debtor implies fees are not up to date (Debtor <= 1 - `Tuition fees up to
        date`). This can be enforced with a Deequ Compliance constraint such as: Compliance(''no_debtor_if_fees_ok'',
        ''NOT(`Debtor` = 1 AND `Tuition fees up to date` = 1)'').'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      uid: cdb3cd02-0ddf-407f-a625-952d7c7fa29d
    - text: '''Debtor'', ''Tuition fees up to date'', and ''Scholarship holder'' are
        integer-coded boolean indicators and must take only values {0,1} with no nulls
        across all rows (to allow the arithmetic and boolean conditions used in risk_financial
        and the scholarship-fee penalty to evaluate without NA/Type errors). In Deequ,
        enforce via a combined Compliance constraint like: Compliance(''financial_flags_binary_nonnull'',
        ''`Debtor` in (0,1) AND `Tuition fees up to date` in (0,1) AND `Scholarship
        holder` in (0,1)'') together with completeness 1.0 on each of the three columns.'
      sources:
      - start_line: 20
        end_line: 37
        file: ''
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: df79ec3f-de1f-4bba-949a-11d849649097
  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'Debtor and ''Tuition fees up to date'' are binary flags and complete.
        Each record must have non-null values and each value must be in {0, 1} for
        both columns. Example Deequ constraints: Compliance(''debtor_and_fees_binary'',
        ''Debtor IN (0, 1) AND `Tuition fees up to date` IN (0, 1)'') and Compliance(''debtor_and_fees_not_null'',
        ''Debtor IS NOT NULL AND `Tuition fees up to date` IS NOT NULL'').'
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 637726c4-6be0-4012-9ce0-08e79d97c2be
    - text: 'No record should indicate both being a debtor and having tuition fees
        up to date. In other words, it must never be the case that Debtor = 1 and
        ''Tuition fees up to date'' = 1 simultaneously. This can be expressed as a
        multi-column constraint like: Compliance(''no_conflicting_financial_status'',
        ''NOT (Debtor = 1 AND `Tuition fees up to date` = 1)'') or Compliance(''debtor_plus_fees_leq_one'',
        ''Debtor + `Tuition fees up to date` <= 1'').'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      uid: 5e6dea4c-2873-43b2-8b02-a9fa5397b7a3
    - text: 'In the produced output, any row with recommended_action = ''tuition_collection''
        must correspond to a financially at-risk case driven by Debtor = 1 or ''Tuition
        fees up to date'' = 0. A compliance check on the output could be: Compliance(''tuition_collection_requires_financial_flag'',
        "recommended_action != ''tuition_collection'' OR (Debtor = 1 OR `Tuition fees
        up to date` = 0)").'
      sources:
