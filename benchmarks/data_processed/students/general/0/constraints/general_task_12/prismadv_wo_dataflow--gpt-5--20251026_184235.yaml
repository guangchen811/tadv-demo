  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)","Curricular
    units 1st sem (evaluations)","Curricular units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'Monotonic counts across the four fields: For every row, ''Curricular
        units 1st sem (approved)'' <= ''Curricular units 1st sem (evaluations)'' <=
        ''Curricular units 1st sem (enrolled)''. Actionable check (Deequ): satisfies("`Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (evaluations)` AND
        `Curricular units 1st sem (evaluations)` <= `Curricular units 1st sem (enrolled)`",
        1.0).'
      sources:
      - start_line: 39
        end_line: 45
        file: ''
      uid: 3431c26a-3a21-4530-8f6f-e9a801f441b6
    - text: 'Zero-enrollment implies zero activity: If ''Curricular units 1st sem
        (enrolled)'' == 0, then ''Curricular units 1st sem (evaluations)'' == 0 AND
        ''Curricular units 1st sem (approved)'' == 0 AND ''Curricular units 1st sem
        (without evaluations)'' == 0. Actionable check (Deequ): satisfies("CASE WHEN
        `Curricular units 1st sem (enrolled)` = 0 THEN (`Curricular units 1st sem
        (evaluations)` = 0 AND `Curricular units 1st sem (approved)` = 0 AND `Curricular
        units 1st sem (without evaluations)` = 0) ELSE true END", 1.0).'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      uid: a4ce60b0-a508-4a77-9e8f-6e5c8a883915
    - text: 'No approvals without evaluations: If ''Curricular units 1st sem (evaluations)''
        == 0, then ''Curricular units 1st sem (approved)'' == 0. Actionable check
        (Deequ): satisfies("CASE WHEN `Curricular units 1st sem (evaluations)` = 0
        THEN `Curricular units 1st sem (approved)` = 0 ELSE true END", 1.0).'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      uid: 94ffb24b-c008-479c-be0c-c7b04dbb2124
    - text: 'Coverage of enrolled units by with/without evaluation buckets: ''Curricular
        units 1st sem (evaluations)'' + ''Curricular units 1st sem (without evaluations)''
        should be less than or equal to ''Curricular units 1st sem (enrolled)'' for
        all rows; and equals it for the vast majority (e.g., >= 0.95 of rows). Actionable
        checks (Deequ): satisfies("`Curricular units 1st sem (evaluations)` + `Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`",
        1.0) and satisfies("`Curricular units 1st sem (evaluations)` + `Curricular
        units 1st sem (without evaluations)` = `Curricular units 1st sem (enrolled)`",
        0.95).'
      sources:
      - start_line: 39
        end_line: 45
        file: ''
      - start_line: 70
        end_line: 71
        file: ''
      uid: 543101e4-a5a7-4d06-9e89-ca1b32458071
    - text: 'If any units are ''without evaluations'' (> 0), then not all enrolled
        units had evaluations: ''Curricular units 1st sem (without evaluations)''
        > 0 implies ''Curricular units 1st sem (evaluations)'' < ''Curricular units
        1st sem (enrolled)''. Actionable check (Deequ): satisfies("CASE WHEN `Curricular
        units 1st sem (without evaluations)` > 0 THEN `Curricular units 1st sem (evaluations)`
        < `Curricular units 1st sem (enrolled)` ELSE true END", 1.0).'
      sources:
      - start_line: 70
        end_line: 71
        file: ''
      uid: 8970024b-fd0a-468b-bf02-95a1d3e30171
    - text: 'Ratios implied by the code must be bounded: when ''Curricular units 1st
        sem (enrolled)'' > 0, 0 <= ''Curricular units 1st sem (evaluations)'' / ''Curricular
        units 1st sem (enrolled)'' <= 1; when ''Curricular units 1st sem (evaluations)''
        > 0, 0 <= ''Curricular units 1st sem (approved)'' / ''Curricular units 1st
        sem (evaluations)'' <= 1. Actionable checks (Deequ): satisfies("CASE WHEN
        `Curricular units 1st sem (enrolled)` > 0 THEN (`Curricular units 1st sem
        (evaluations)` >= 0 AND `Curricular units 1st sem (evaluations)` <= `Curricular
        units 1st sem (enrolled)`) ELSE true END", 1.0) and satisfies("CASE WHEN `Curricular
        units 1st sem (evaluations)` > 0 THEN (`Curricular units 1st sem (approved)`
        >= 0 AND `Curricular units 1st sem (approved)` <= `Curricular units 1st sem
        (evaluations)`) ELSE true END", 1.0).'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      uid: 82a08740-e5a6-4705-883f-102cf7f273eb
    - text: 'Completeness across the four columns: all of ''Curricular units 1st sem
        (enrolled)'', ''Curricular units 1st sem (evaluations)'', ''Curricular units
        1st sem (without evaluations)'', and ''Curricular units 1st sem (approved)''
        should be non-null (computations do not handle nulls). Actionable checks (Deequ):
        hasCompleteness for each column = 1.0, or a single satisfies over all four:
        satisfies("`Curricular units 1st sem (enrolled)` IS NOT NULL AND `Curricular
        units 1st sem (evaluations)` IS NOT NULL AND `Curricular units 1st sem (without
