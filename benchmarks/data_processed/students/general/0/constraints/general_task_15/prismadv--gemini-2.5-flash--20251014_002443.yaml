    - text: 'For each record, the number of approved curricular units (''Curricular
        units 1st sem (approved)'') must be less than or equal to the total number
        of enrolled curricular units (''Curricular units 1st sem (enrolled)''). Similarly,
        the number of units without evaluations (''Curricular units 1st sem (without
        evaluations)'') must be less than or equal to the enrolled units, and the
        number of units with evaluations (''Curricular units 1st sem (evaluations)'')
        must be less than or equal to the enrolled units. All these columns are expected
        to contain non-negative integer values. We could represent this assumption
        as deequ constraints like this: .isNonNegative("Curricular units 1st sem (enrolled)")
        .isNonNegative("Curricular units 1st sem (approved)") .isNonNegative("Curricular
        units 1st sem (without evaluations)") .isNonNegative("Curricular units 1st
        sem (evaluations)") .isLessThanOrEqualTo("Curricular units 1st sem (approved)",
