constraints:
  Admission grade:
    code:
    - - .isBetween('Admission grade', 90, 200)
      - Invalid
    assumptions: []
  Age at enrollment:
    code:
    - - .isBetween('Age at enrollment', 16, 70)
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .satisfies("'Curricular units 1st sem (approved)' <= 'Curricular units 1st
        sem (enrolled)'")
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isBetween('Curricular units 1st sem (grade)', 0, 20)
      - Invalid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .satisfies("'Curricular units 2nd sem (approved)' <= 'Curricular units 2nd
        sem (enrolled)'")
      - Invalid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .isBetween('Curricular units 2nd sem (grade)', 0, 20)
      - Invalid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - ".isContainedIn('Daytime/evening attendance\t', ['0', '1'])"
      - Valid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', ['0', '1'])
      - Valid
    assumptions: []
  Target:
    code:
    - - .isComplete('Target')
      - Valid
    - - .isContainedIn('Target', ['Enrolled', 'Graduate', 'Dropout'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', ['0', '1'])
      - Valid
    assumptions: []
