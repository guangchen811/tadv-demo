    - text: 'The ''hold_reason'' and ''hold_severity'' output columns are categorized
        based on the combination of financial status flags (''Tuition fees up to date'',
        ''Debtor'') and the ''advisory_flag'' (which itself depends on ''International'',
        ''Debtor'', ''Tuition fees up to date'', and other academic metrics). It is
        assumed that:

        1. If a tuition hold is required (derived from ''Tuition fees up to date''
        = 0 OR ''Debtor'' = 1) AND an academic advisory is flagged (`advisory_flag`
        is true), then `hold_reason` should be ''FEE+ACADEMIC'' and `hold_severity`
        should be ''STRICT''.

        2. If a tuition hold is required BUT no academic advisory is flagged (`advisory_flag`
        is false), then `hold_reason` should be ''FEE'' and `hold_severity` should
        be ''STANDARD''.

