    - text: 'The ''tuition_hold'' output column is strictly derived from the ''Tuition
        fees up to date'' and ''Debtor'' columns. It is assumed that a tuition hold
        is required (`tuition_hold` = 1) if ''Tuition fees up to date'' is 0 (not
        up to date) OR ''Debtor'' is 1 (is a debtor). Conversely, no tuition hold
        is required (`tuition_hold` = 0) only if ''Tuition fees up to date'' is 1
        (up to date) AND ''Debtor'' is 0 (not a debtor). This implies a strict logical
        dependency between these input columns and the derived output.

        We could represent this assumption as a deequ constraint:

        .satisfies("NOT (`Tuition fees up to date` = 1 AND `Debtor` = 0) = (`tuition_hold`
        = 1)", "Tuition hold derivation consistency")'
