    assumptions:
    - text: 'The calculation of `macro_stress` (lines 49-52), which combines standardized
        ''Unemployment rate'', ''GDP'', and ''Inflation rate'' using the formula `zu
        - zg + 0.3 * zi`, implies specific expected correlations between these economic
        indicators. It is assumed that ''Unemployment rate'' is negatively correlated
        with ''GDP'', ''Unemployment rate'' is positively correlated with ''Inflation
        rate'', and ''GDP'' is negatively correlated with ''Inflation rate''. These
        relationships are crucial for the `macro_stress` index to accurately reflect
        economic stress as designed by the formula''s coefficients. We could represent
        this assumption as Deequ constraints like this:

        .hasCorrelation("Unemployment rate", "GDP", lambda corr: corr < 0)

        .hasCorrelation("Unemployment rate", "Inflation rate", lambda corr: corr >
        0)

        .hasCorrelation("GDP", "Inflation rate", lambda corr: corr < 0)'
      sources:
