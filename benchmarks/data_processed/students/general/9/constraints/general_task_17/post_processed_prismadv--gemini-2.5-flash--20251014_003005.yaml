        end_line: 52
        file: ''
      uid: 2ee680a3-093b-470f-918b-ab44149c9ac4
    - text: 'The ''Unemployment rate'', ''GDP'', and ''Inflation rate'' columns are
        assumed to be entirely numeric and complete across all records, ensuring that
        their standardization (lines 49-51) and subsequent arithmetic combination
        (line 52) can be performed without producing null values or errors due to
        non-numeric data. This also implies that each of these columns must have a
        standard deviation greater than zero to avoid division by zero during standardization.
        We could represent this assumption as Deequ constraints like this:

        .hasCompleteness("Unemployment rate", 1.0)

        .hasCompleteness("GDP", 1.0)

        .hasCompleteness("Inflation rate", 1.0)

        .hasDataType("Unemployment rate", Double)

        .hasDataType("GDP", Double)

        .hasDataType("Inflation rate", Double)

        .hasStandardDeviation("Unemployment rate", lambda s: s > 0)

        .hasStandardDeviation("GDP", lambda s: s > 0)

        .hasStandardDeviation("Inflation rate", lambda s: s > 0)'
