    assumptions:
    - text: 'The ''Application order'' column must contain integer values between
        1 and 9 (inclusive) and must not have any missing values after numerical conversion.
        This is critical for correctly indexing the ''commit_weights'' array, as indicated
        by the code comment ''relies on 1..9 constraint''. We could represent this
        assumption as a deequ constraint like this: .isContainedIn("Application order",
        [1, 2, 3, 4, 5, 6, 7, 8, 9]) and .isComplete("Application order")'
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      uid: 22c60694-f105-4ef3-b50f-b158b53365fb
    - text: The 'Debtor' and 'Tuition fees up to date' columns must contain only binary
        values (0 or 1) and must not have any missing values after numerical conversion.
        This is because they are used in a boolean operation (OR) and then explicitly
        cast to an integer type, which would fail on nulls or non-binary values.
      sources:
      - start_line: 62
        end_line: 64
        file: ''
      uid: a2ead585-eb13-4ca8-8026-7fe34d68e7a5
    - text: 'For both semesters, the number of ''Curricular units (approved)'' and
        ''Curricular units (without evaluations)'' must be less than or equal to the
        ''Curricular units (enrolled)'' for the respective semester. Additionally,
        all these columns must contain non-negative integer values and have high completeness.
        This consistency is crucial for calculating meaningful pass rates and no-evaluation
        ratios. We could represent this assumption as deequ constraints like: .isNonNegative("Curricular
        units 1st sem (enrolled)"), .isLessThanOrEqualTo("Curricular units 1st sem
        (approved)", "Curricular units 1st sem (enrolled)"), and .isLessThanOrEqualTo("Curricular
        units 1st sem (without evaluations)", "Curricular units 1st sem (enrolled)")
        (similar for 2nd sem).'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      - start_line: 90
        end_line: 97
        file: ''
      - start_line: 106
        end_line: 108
        file: ''
      uid: 3b7d2bfd-ee31-46e2-b0ed-5299d62b3d05
    - text: 'The ''Curricular units 1st sem (approved)'' and ''Curricular units 1st
        sem (enrolled)'' columns are expected to have a strong positive correlation,
        as indicated by the code comment ''Precondition: strong positive correlation
        ensured above''. Furthermore, the standard deviation of ''Curricular units
        1st sem (enrolled)'' must be non-zero for the slope calculation to avoid division
        by zero. The same assumptions apply to the corresponding 2nd semester units.
        We could represent this assumption as deequ constraints like: .hasCorrelation("Curricular
        units 1st sem (approved)", "Curricular units 1st sem (enrolled)", Some(0.5),
        Some(1.0)) and .hasStandardDeviation("Curricular units 1st sem (enrolled)",
        Some(0.001), None).'
      sources:
      - start_line: 82
        end_line: 84
        file: ''
      - start_line: 99
        end_line: 100
        file: ''
      uid: 7c1d1d81-f773-447d-a849-4faf35e89980
    - text: 'The ''Admission grade'' and ''Previous qualification (grade)'' columns
        are expected to be numeric, non-negative, and ideally not exceed 200.0. This
        ensures that their normalized values (when divided by 200.0) remain within
        a [0,1] range, contributing meaningfully to the ''preparedness'' score. These
        columns should also have high completeness. We could represent this assumption
        as deequ constraints like: .isNonNegative("Admission grade"), .isLessThanOrEqualTo("Admission
        grade", 200.0), and .isComplete("Admission grade").'
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      uid: 36c75fbc-d98c-4981-8a26-60f6b2085ecb
    - text: 'The ''GDP'', ''Unemployment rate'', and ''Inflation rate'' columns are
        expected to be numeric and have a high degree of completeness. Their standard
        deviations must also be non-zero for the standardization step (`std(ddof=0)`).
        Significant non-numeric values or nulls after coercion would compromise the
        macro stress calculation. We could represent this assumption as deequ constraints
        like: .isComplete("GDP") and .hasStandardDeviation("GDP", Some(0.001), None).'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
