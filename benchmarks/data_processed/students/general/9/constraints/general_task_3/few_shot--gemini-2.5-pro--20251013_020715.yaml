constraints:
  Admission grade:
    code:
    - - .isNonNegative('Admission grade')
      - Invalid
    assumptions: []
  Age at enrollment:
    code:
    - - .isNonNegative('Age at enrollment')
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isNonNegative('Curricular units 1st sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - '.hasMax(''Curricular units 1st sem (grade)'', lambda x: x <= 20)'
      - Valid
    - - '.hasMin(''Curricular units 1st sem (grade)'', lambda x: x >= 0)'
      - Valid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - '.hasMax(''Curricular units 2nd sem (grade)'', lambda x: x <= 20)'
      - Valid
    - - '.hasMin(''Curricular units 2nd sem (grade)'', lambda x: x >= 0)'
      - Valid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - .isContainedIn('Daytime/evening attendance\t', ['0', '1'])
      - Valid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', ['0', '1'])
      - Valid
    assumptions: []
  Previous qualification (grade):
    code:
    - - .isNonNegative('Previous qualification (grade)')
      - Invalid
    assumptions: []
  Target:
    code:
    - - .isComplete('Target')
      - Valid
    - - .isContainedIn('Target', ['Graduate', 'Dropout', 'Enrolled'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', ['0', '1'])
      - Valid
    assumptions: []
