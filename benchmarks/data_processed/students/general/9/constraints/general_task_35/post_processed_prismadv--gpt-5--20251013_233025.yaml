    - text: 'Recorded activity coverage for the second semester assumes that the sum
        of Evaluations and Without Evaluations does not exceed Enrolled; equivalently,
        for Enrolled > 0, the coverage gap (Enrolled - (Evaluations + Without)) /
        Enrolled lies in [0, 1]. In Deequ: satisfies(''case when `Curricular units
        2nd sem (enrolled)` > 0 then (`Curricular units 2nd sem (evaluations)` + `Curricular
        units 2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`)
        else true end'', ''c2_eval_plus_without_le_enrolled'').'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      uid: 31a7c96e-12e0-46a7-87e5-2f61bb8acf91
    - text: 'Zero enrollment implies zero counts elsewhere for second semester: if
        Enrolled = 0 then Evaluations = 0 and Without Evaluations = 0 and Approved
        = 0 and Credited = 0. In Deequ: satisfies(''case when `Curricular units 2nd
        sem (enrolled)` = 0 then (`Curricular units 2nd sem (evaluations)` = 0 and
        `Curricular units 2nd sem (without evaluations)` = 0 and `Curricular units
        2nd sem (approved)` = 0 and `Curricular units 2nd sem (credited)` = 0) else
        true end'', ''c2_zero_enroll_zero_counts'').'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      - start_line: 49
        end_line: 50
        file: ''
      uid: 9a4e9314-701c-451f-bea0-c98f4fd5bb70
    - text: 'Each second-semester count should not exceed Enrolled: Evaluations <=
        Enrolled, Approved <= Enrolled, Without Evaluations <= Enrolled, and Credited
        <= Enrolled. In Deequ: satisfies(''`Curricular units 2nd sem (evaluations)`
        <= `Curricular units 2nd sem (enrolled)` and `Curricular units 2nd sem (approved)`
        <= `Curricular units 2nd sem (enrolled)` and `Curricular units 2nd sem (without
        evaluations)` <= `Curricular units 2nd sem (enrolled)` and `Curricular units
        2nd sem (credited)` <= `Curricular units 2nd sem (enrolled)`'', ''c2_all_counts_le_enrolled'').'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      uid: bb07cdf0-d061-4d90-b1f1-17cb6331fb1d
  '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (credited)","Curricular units 2nd sem (evaluations)"]':
    code: []
    assumptions:
    - text: 'For 2nd semester, the number of ''Curricular units 2nd sem (approved)''
        must not exceed ''Curricular units 2nd sem (evaluations)''; additionally,
        if ''Curricular units 2nd sem (evaluations)'' equals 0 then ''Curricular units
        2nd sem (approved)'' must be 0. This keeps pass_rate_2 = approved/evaluations
        well-defined and bounded in [0,1]. Example Deequ constraints: .satisfies("`Curricular
        units 2nd sem (approved)` <= `Curricular units 2nd sem (evaluations)`", "approved_lte_evals_sem2")
        and .satisfies("(`Curricular units 2nd sem (evaluations)` > 0) OR (`Curricular
        units 2nd sem (approved)` = 0)", "no_approvals_without_evals_sem2").'
      sources:
      - start_line: 49
        end_line: 50
        file: ''
      uid: c00c0a00-85e4-41e5-aa37-9ece7a96eedb
    - text: 'For 2nd semester, the sum of ''Curricular units 2nd sem (evaluations)''
        and ''Curricular units 2nd sem (without evaluations)'' must be less than or
        equal to ''Curricular units 2nd sem (enrolled)''. This prevents negative or
        >1 coverage gaps when computing coverage_gap_2. Example Deequ constraint:
        .satisfies("`Curricular units 2nd sem (evaluations)` + `Curricular units 2nd
        sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`", "evals_plus_without_lte_enrolled_sem2").'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      uid: 24baed94-c87b-49a1-9df6-b7ba6f1ba176
    - text: 'For 2nd semester, ''Curricular units 2nd sem (credited)'' should be less
        than or equal to ''Curricular units 2nd sem (enrolled)'' (cannot obtain credit
        for more units than enrolled in the same semester). Example Deequ constraint:
        .satisfies("`Curricular units 2nd sem (credited)` <= `Curricular units 2nd
        sem (enrolled)`", "credited_lte_enrolled_sem2").'
      sources:
      - start_line: 27
        end_line: 32
        file: ''
      - start_line: 36
        end_line: 42
        file: ''
      uid: 684b9853-b8b4-43c2-b5eb-584d151c7f62
  '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (evaluations)"]':
    code: []
    assumptions:
    - text: 'Second-semester assessment counts are consistent: ''Curricular units
        2nd sem (approved)'' must be >= 0 and <= ''Curricular units 2nd sem (evaluations)'',
        and ''Curricular units 2nd sem (evaluations)'' must be >= 0. If ''Curricular
        units 2nd sem (evaluations)'' = 0, then ''Curricular units 2nd sem (approved)''
        must be 0. This guarantees pass_rate_2 = approved/evaluations is in [0,1]
        (or 0 when evaluations = 0). Example Deequ constraints: hasSatisfying(''`Curricular
        units 2nd sem (evaluations)` >= 0 AND `Curricular units 2nd sem (approved)`
        >= 0 AND `Curricular units 2nd sem (approved)` <= `Curricular units 2nd sem
        (evaluations)`'',''all''); hasSatisfying(''(`Curricular units 2nd sem (evaluations)`
        != 0) OR (`Curricular units 2nd sem (approved)` = 0)'',''all'').'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 49
        end_line: 50
        file: ''
      uid: 0f0115bd-1666-4e01-99c7-9ee493b0dcb1
    - text: 'Second-semester coverage consistency: ''Curricular units 2nd sem (evaluations)''
        + ''Curricular units 2nd sem (without evaluations)'' must be <= ''Curricular
        units 2nd sem (enrolled)'' with all three being non-negative. Equivalently,
        missing_recorded_2 = enrolled - (evaluations + without) >= 0 and when enrolled
        > 0, coverage_gap_2 = missing_recorded_2/enrolled lies in [0,1]. Example Deequ
        constraint: hasSatisfying(''`Curricular units 2nd sem (evaluations)` >= 0
        AND `Curricular units 2nd sem (without evaluations)` >= 0 AND `Curricular
        units 2nd sem (enrolled)` >= 0 AND `Curricular units 2nd sem (evaluations)`
        + `Curricular units 2nd sem (without evaluations)` <= `Curricular units 2nd
        sem (enrolled)`'',''all'').'
      sources:
      - start_line: 27
        end_line: 31
        file: ''
      - start_line: 51
        end_line: 52
        file: ''
      uid: fab3e711-9e24-40e6-981e-7621933c2025
    - text: 'Financial-status consistency: If ''Tuition fees up to date'' = 1 then
        ''Debtor'' must be 0 (cannot be a debtor while being up to date). Both columns
        are expected to be binary {0,1}. Example Deequ constraints: hasSatisfying(''`Tuition
        fees up to date` IN (0,1) AND `Debtor` IN (0,1)'',''all''); hasSatisfying(''(`Tuition
        fees up to date` = 1) => (`Debtor` = 0)'',''all'').'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: 45ddeea5-00ea-46f4-aeb5-4525c33b22bd
  ? '["Curricular units 2nd sem (enrolled)","Curricular units 2nd sem (evaluations)","Curricular
    units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For each record, the number of curricular units with evaluations plus
        the number without evaluations in 2nd semester must not exceed the number
        of enrolled curricular units in 2nd semester. This keeps the derived missing_recorded_2
        non-negative and prevents negative coverage_gap_2. We could represent this
        as a Deequ compliance constraint like: .addConstraint(Compliance(''c2_evals_plus_without_le_enrolled'',
        ''(`Curricular units 2nd sem (evaluations)` + `Curricular units 2nd sem (without
        evaluations)`) <= `Curricular units 2nd sem (enrolled)`'')).'
      sources:
      - start_line: 27
        end_line: 31
        file: ''
      - start_line: 51
        end_line: 52
        file: ''
      uid: 4044acea-254a-482f-939a-0ea1adc2335e
    - text: 'If 2nd-semester enrollment is zero, then both 2nd-semester evaluations
        and 2nd-semester without-evaluations counts must be zero (no activity without
        enrollment). In Deequ, expressible as an implication: .addConstraint(Compliance(''c2_zero_enrolled_implies_zero_counts'',
        ''(`Curricular units 2nd sem (enrolled)` > 0) OR ((`Curricular units 2nd sem
        (evaluations)` = 0) AND (`Curricular units 2nd sem (without evaluations)`
        = 0))'')).'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      uid: 90336b97-5537-4391-ae4f-9c65ff79f574
    - text: 'Each of the 2nd-semester counts for evaluations and without-evaluations
        must be bounded between 0 and the 2nd-semester enrolled count for that row.
        In Deequ: .addConstraint(Compliance(''c2_counts_bounded_by_enrolled'', ''(`Curricular
        units 2nd sem (evaluations)` >= 0) AND (`Curricular units 2nd sem (evaluations)`
        <= `Curricular units 2nd sem (enrolled)`) AND (`Curricular units 2nd sem (without
        evaluations)` >= 0) AND (`Curricular units 2nd sem (without evaluations)`
        <= `Curricular units 2nd sem (enrolled)`)'')).'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      uid: 8cb18ec0-09c8-4429-bce3-332237629eec
    - text: 'For rows with positive 2nd-semester enrollment, the coverage ratio (enrolled
        - (evaluations + without-evaluations)) / enrolled must lie within [0, 1].
        This is equivalent to non-negative and not-overcounting, and avoids negative
        or >1 coverage_gap_2 that would distort the risk score. In Deequ: .addConstraint(Compliance(''c2_coverage_gap_in_range'',
        ''(`Curricular units 2nd sem (enrolled)` = 0) OR (((`Curricular units 2nd
        sem (enrolled)` - (`Curricular units 2nd sem (evaluations)` + `Curricular
        units 2nd sem (without evaluations)`)) / `Curricular units 2nd sem (enrolled)`)
        >= 0 AND ((`Curricular units 2nd sem (enrolled)` - (`Curricular units 2nd
        sem (evaluations)` + `Curricular units 2nd sem (without evaluations)`)) /
        `Curricular units 2nd sem (enrolled)`) <= 1))'')).'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      - start_line: 63
        end_line: 71
        file: ''
      uid: 3fa3024f-443f-4676-927d-725243b59864
  Debtor:
    code:
    - suggestion: .isComplete('Debtor')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 851aedd6-e10c-437c-827b-8b1981731c0b
      source_assumptions:
      - e29db89f-cd96-41f1-984e-6a5c2a86e7be
      - 160efed6-7a7f-474a-9c50-b4ea04aa83a8
    - suggestion: '.isContainedIn(''Debtor'', [''0'', ''1''], assertion=lambda x:
        x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 7772e694-8c8c-4abf-bf93-7186c6a4e019
      source_assumptions:
      - 930f86ea-442b-42fa-920b-ed8bd0288391
      - c1e5b45b-ce5d-4053-9610-fdd3120e5bf4
    assumptions:
    - text: The input must contain the 'Debtor' column. If it is missing, the numeric
        casting and downstream risk calculation will fail.
      sources:
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: e29db89f-cd96-41f1-984e-6a5c2a86e7be
    - text: 'The ''Debtor'' column should be binary with values only in {0, 1}. This
        reflects the logic that compares the column to 1 to determine fee risk (1
        = debtor, 0 = not debtor). A suitable rule is: all values of Debtor are in
        {0,1}.'
      sources:
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: 930f86ea-442b-42fa-920b-ed8bd0288391
    - text: The 'Debtor' column should be non-null for all rows. The code does not
        impute or handle nulls for 'Debtor'; nulls would be treated as not equal to
        1 and default to the mid fee risk (0.3), which may mask true debtors.
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: 160efed6-7a7f-474a-9c50-b4ea04aa83a8
    - text: The 'Debtor' column should be numeric/castable to numeric without coercion.
        At least 99% (ideally 100%) of the values should parse to numbers so that
        equality checks against 1 behave as intended. This can be enforced by requiring
        the column type to be integer-like or by checking that the share of values
        in {0,1} is >= 0.99.
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: c1e5b45b-ce5d-4053-9610-fdd3120e5bf4
  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'Debtor and Tuition fees up to date are mutually exclusive per row. If
        tuition is up to date (1), the student cannot be a debtor (0), and if a student
        is a debtor (1), tuition cannot be up to date (0). Equivalent constraint:
        Debtor + `Tuition fees up to date` <= 1. Example Deequ: .satisfies(''Debtor
        + `Tuition fees up to date` <= 1'', ''Debtor and Tuition up-to-date are mutually
        exclusive'')'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: 760aa06e-fc7a-4a8c-a6a3-d3e2076803ed
    - text: 'First semester pass counts are consistent: if `Curricular units 1st sem
        (evaluations)` = 0 then `Curricular units 1st sem (approved)` must be 0; otherwise
        `Curricular units 1st sem (approved)` <= `Curricular units 1st sem (evaluations)`.
        Example Deequ: .satisfies(''((`Curricular units 1st sem (evaluations)` = 0
        AND `Curricular units 1st sem (approved)` = 0) OR (`Curricular units 1st sem
        (evaluations)` >= `Curricular units 1st sem (approved)`))'', ''1st sem approvals
        consistent with evaluations'')'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      uid: f9059e88-c0d1-4450-9406-d1cf795f3871
    - text: 'Second semester pass counts are consistent: if `Curricular units 2nd
        sem (evaluations)` = 0 then `Curricular units 2nd sem (approved)` must be
        0; otherwise `Curricular units 2nd sem (approved)` <= `Curricular units 2nd
        sem (evaluations)`. Example Deequ: .satisfies(''((`Curricular units 2nd sem
        (evaluations)` = 0 AND `Curricular units 2nd sem (approved)` = 0) OR (`Curricular
        units 2nd sem (evaluations)` >= `Curricular units 2nd sem (approved)`))'',
        ''2nd sem approvals consistent with evaluations'')'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      uid: e075a915-b2f2-4d47-a825-547473a2133d
    - text: 'Enrollment accounting within a semester: evaluated students plus students
        without evaluations must not exceed enrolled students. Constraints: `Curricular
        units 1st sem (evaluations)` + `Curricular units 1st sem (without evaluations)`
        <= `Curricular units 1st sem (enrolled)` and `Curricular units 2nd sem (evaluations)`
        + `Curricular units 2nd sem (without evaluations)` <= `Curricular units 2nd
        sem (enrolled)`. Example Deequ: .satisfies(''`Curricular units 1st sem (evaluations)`
        + `Curricular units 1st sem (without evaluations)` <= `Curricular units 1st
        sem (enrolled)`'') and .satisfies(''`Curricular units 2nd sem (evaluations)`
        + `Curricular units 2nd sem (without evaluations)` <= `Curricular units 2nd
        sem (enrolled)`'')'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      - start_line: 51
        end_line: 52
        file: ''
      uid: 0abdceb6-ad12-487e-aba4-ffc4635c86d3
    - text: 'Both Debtor and Tuition fees up to date are numeric binary indicators
        {0,1} with no nulls (so equality checks to 1 are meaningful and no coercion
        to NaN should occur). Example Deequ: .isContainedIn(''Debtor'', [0,1]) and
        .isContainedIn(''Tuition fees up to date'', [0,1])'
      sources:
      - start_line: 36
        end_line: 42
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: 56b77026-2d7e-46c2-82c2-993c2b923849
