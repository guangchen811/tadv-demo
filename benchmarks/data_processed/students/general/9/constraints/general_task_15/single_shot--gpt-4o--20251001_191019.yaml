constraints:
  Admission grade:
    code:
    - - .isBetween('Admission grade', 0.0, 200.0)
      - Invalid
    assumptions: []
  Application order:
    code:
    - - .isContainedIn('Application order', ['1', '2', '3', '4', '5', '6', '9'])
      - Valid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isLessThanOrEqualTo('Curricular units 1st sem (approved)', 'Curricular units
        1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (without evaluations):
    code:
    - - .isNonNegative('Curricular units 1st sem (without evaluations)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .isLessThanOrEqualTo('Curricular units 2nd sem (approved)', 'Curricular units
        2nd sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 2nd sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (without evaluations):
    code:
    - - .isNonNegative('Curricular units 2nd sem (without evaluations)')
      - Invalid
    assumptions: []
  Daytime/evening attendance:
    code:
    - - .isContainedIn('Daytime/evening attendance\t', ['0', '1'])
      - Valid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', ['0', '1'])
      - Valid
    assumptions: []
  Displaced:
    code:
    - - .isContainedIn('Displaced', ['0', '1'])
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['0', '1'])
      - Valid
    assumptions: []
  International:
    code:
    - - .isContainedIn('International', ['0', '1'])
      - Valid
    assumptions: []
  Previous qualification (grade):
    code:
    - - .isBetween('Previous qualification (grade)', 0.0, 200.0)
      - Invalid
    assumptions: []
  Scholarship holder:
    code:
    - - .isContainedIn('Scholarship holder', ['0', '1'])
      - Valid
    assumptions: []
  Target:
    code:
    - - .isContainedIn('Target', ['Graduate', 'Dropout', 'Enrolled'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', ['0', '1'])
      - Valid
    assumptions: []
