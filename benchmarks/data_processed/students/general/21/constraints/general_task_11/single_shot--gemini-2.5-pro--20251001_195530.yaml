constraints:
  Admission grade:
    code:
    - - .isBetween('Admission grade', 0.0, 200.0)
      - Invalid
    assumptions: []
  Age at enrollment:
    code:
    - - .isGreaterOrEqual('Age at enrollment', 16)
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isBetween('Curricular units 1st sem (grade)', 0.0, 20.0)
      - Invalid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .isNonNegative('Curricular units 2nd sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .isBetween('Curricular units 2nd sem (grade)', 0.0, 20.0)
      - Invalid
    assumptions: []
  'Custom: Approved vs Enrolled (1st Sem)':
    code:
    - - .addConstraint(Constraint.fromSQL("`Curricular units 1st sem (approved)` <=
        `Curricular units 1st sem (enrolled)`", "Approved units should not exceed
        enrolled units for 1st semester"))
      - Invalid
    assumptions: []
  'Custom: Approved vs Enrolled (2nd Sem)':
    code:
    - - .addConstraint(Constraint.fromSQL("`Curricular units 2nd sem (approved)` <=
        `Curricular units 2nd sem (enrolled)`", "Approved units should not exceed
        enrolled units for 2nd semester"))
      - Invalid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - .isComplete('Daytime/evening attendance\t')
      - Valid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', ['0', '1'])
      - Valid
    assumptions: []
  Previous qualification (grade):
    code:
    - - .isBetween('Previous qualification (grade)', 0.0, 200.0)
      - Invalid
    assumptions: []
  Target:
    code:
    - - .isContainedIn('Target', ['Enrolled', 'Dropout', 'Graduate'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', ['0', '1'])
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
