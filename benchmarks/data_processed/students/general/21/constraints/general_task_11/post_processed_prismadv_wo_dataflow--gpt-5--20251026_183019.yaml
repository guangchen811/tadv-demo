        end_line: 71
        file: ''
      - start_line: 101
        end_line: 103
        file: ''
      uid: 8d49d6e7-2db0-44b1-b023-fb75498f4cce
    - text: 'The ''Daytime/evening attendance'' column should have high completeness
        (few nulls), because nulls get coerced to NaN and are treated as not day (i.e.,
        evening) in the equality check, which would bias risk. Require completeness
        >= 0.95. We could represent this as a Deequ constraint: .hasCompleteness(''Daytime/evening
        attendance'', lambda x: x >= 0.95), or Great Expectations: expect_column_values_to_not_be_null
        with mostly=0.95.'
      sources:
