        code, with 1 meaning day-time attendance and 0 meaning evening (or non-day).
        At least 99% of non-null values should be in {0, 1}. We could represent this
        as a Deequ constraint: .satisfies("CASE WHEN `Daytime/evening attendance`
        IN (0, 1) THEN 1 ELSE 0 END", "Binary day/evening code", lambda x: x >= 0.99),
        or a Great Expectations rule: expect_column_values_to_be_in_set(''Daytime/evening
        attendance'', [0, 1]).'
      sources:
