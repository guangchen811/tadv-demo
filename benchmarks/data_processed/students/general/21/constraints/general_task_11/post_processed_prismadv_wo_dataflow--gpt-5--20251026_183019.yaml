        file: ''
      uid: 9e9b4bf5-5d6d-414c-96f1-a5cdfe6bbaa4
  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (credited)","Curricular
    units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: '1st-semester approved units must not exceed 1st-semester enrolled units
        (i.e., 0 <= ''Curricular units 1st sem (approved)'' <= ''Curricular units
        1st sem (enrolled)''). Suggested constraint: satisfies("`Curricular units
        1st sem (approved)` <= `Curricular units 1st sem (enrolled)`", ''app_leq_enr'').'
      sources:
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: cd5b6405-3e40-4138-8e30-074718bf583e
    - text: '1st-semester units without evaluations must not exceed 1st-semester enrolled
        units (i.e., 0 <= ''Curricular units 1st sem (without evaluations)'' <= ''Curricular
        units 1st sem (enrolled)''). Suggested constraint: satisfies("`Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`",
        ''woeval_leq_enr'').'
      sources:
      - start_line: 76
        end_line: 76
        file: ''
      uid: b63e7298-1c0b-41e0-a0ab-51e96bf90587
    - text: '1st-semester units without evaluations are a subset of the not-approved
        units: ''Curricular units 1st sem (approved)'' + ''Curricular units 1st sem
        (without evaluations)'' <= ''Curricular units 1st sem (enrolled)''. Suggested
        constraint: satisfies("`Curricular units 1st sem (approved)` + `Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`",
        ''app_plus_woeval_leq_enr'').'
      sources:
      - start_line: 76
        end_line: 76
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: 5f75ab11-3d8a-4a8a-b0f6-a80b00a698a0
    - text: 'If 1st-semester enrolled units are zero, then approved, credited, and
        without-evaluations counts must all be zero (to avoid default-based division
        artifacts). Suggested constraint: satisfies("case when `Curricular units 1st
        sem (enrolled)` = 0 then (`Curricular units 1st sem (approved)` = 0 and `Curricular
        units 1st sem (credited)` = 0 and `Curricular units 1st sem (without evaluations)`
        = 0) else true end", ''zero_enr_implies_zero_counts'').'
      sources:
      - start_line: 75
        end_line: 77
        file: ''
      uid: 12a2b73d-38cc-4afe-b110-1859806b2fa6
    - text: '1st-semester credited units should not exceed 1st-semester enrolled units
        (so the credited rate is bounded when used). Suggested constraint: satisfies("`Curricular
        units 1st sem (credited)` <= `Curricular units 1st sem (enrolled)`", ''cred_leq_enr'').'
      sources:
      - start_line: 77
        end_line: 77
        file: ''
      uid: d681fad3-feac-429c-9e2d-8886b56a2ae5
  '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For every record, the number of ''Curricular units 1st sem (approved)''
        must be less than or equal to ''Curricular units 1st sem (enrolled)'' (and
        both are non-negative). This prevents negative values in (enrolled - approved)
        and keeps approval_rate within [0,1] when enrollment > 0. We could represent
        this as a Deequ constraint: .isLessOrEqual("Curricular units 1st sem (approved)",
        "Curricular units 1st sem (enrolled)")'
      sources:
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 88
        end_line: 89
        file: ''
      uid: 1bb151b4-041c-49ba-a5e4-efe460acb9f4
    - text: 'If ''Curricular units 1st sem (enrolled)'' equals 0, then ''Curricular
        units 1st sem (approved)'' must be 0 (no approvals without enrollment). This
        avoids default fallbacks in ratio features from distorting risk. Deequ example:
        .satisfies("CASE WHEN `Curricular units 1st sem (enrolled)` = 0 THEN `Curricular
        units 1st sem (approved)` = 0 ELSE TRUE END", "no_approvals_when_no_enrollment")'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 88
        end_line: 89
        file: ''
      uid: 32498e8c-dfbc-499e-8f37-b5f59dcf6afc
    - text: 'The number of ''Curricular units 1st sem (without evaluations)'' must
        be less than or equal to the number of non-approved enrollments: ''Curricular
        units 1st sem (without evaluations)'' <= ''Curricular units 1st sem (enrolled)''
        - ''Curricular units 1st sem (approved)''. This ensures that the subset of
        "without evaluations" does not exceed the total not-approved. Deequ example:
        .satisfies("`Curricular units 1st sem (without evaluations)` <= `Curricular
        units 1st sem (enrolled)` - `Curricular units 1st sem (approved)`", "woeval_within_not_approved")'
      sources:
      - start_line: 76
        end_line: 76
        file: ''
      - start_line: 88
        end_line: 90
        file: ''
      uid: 383b32e6-3cf1-46bc-ac6e-2954dfe4f357
    - text: 'For rows where Target = ''Enrolled'', ''Curricular units 1st sem (enrolled)''
        should be > 0 to avoid relying on default ratios (e.g., approval_rate defaulting
        to 1.0). Deequ example: .satisfies("CASE WHEN Target = ''Enrolled'' THEN `Curricular
        units 1st sem (enrolled)` > 0 ELSE TRUE END", "enrolled_students_have_enrollments")'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 131
        end_line: 133
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: 4bdaa858-fb14-4bb9-aea3-40ec804f0505
  '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)","Curricular units 1st sem (grade)"]':
    code: []
    assumptions:
    - text: 'The number of ''Curricular units 1st sem (approved)'' must be between
        0 and ''Curricular units 1st sem (enrolled)'' inclusive for every row, ensuring
        approval_rate_1 = approved/enrolled and fail_rate_1 = (enrolled - approved)/enrolled
        are in [0,1] without relying on clipping/defaults. Deequ example: .satisfies("`Curricular
        units 1st sem (approved)` >= 0 AND `Curricular units 1st sem (enrolled)` >=
        0 AND `Curricular units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)`",
        "c1_approved_le_enrolled")'
      sources:
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: 2514eb7d-5ae9-488e-ba84-671e5082205f
    - text: 'If ''Curricular units 1st sem (enrolled)'' equals 0, then ''Curricular
        units 1st sem (approved)'' must be 0 and ''Curricular units 1st sem (grade)''
        must be 0 (no grade when no enrollment). This avoids approval_rate_1 defaulting
        to 1.0 on 0/0 and prevents grades from contributing when no units were taken.
        Deequ example: .satisfies("CASE WHEN `Curricular units 1st sem (enrolled)`
        = 0 THEN (`Curricular units 1st sem (approved)` = 0 AND `Curricular units
        1st sem (grade)` = 0) ELSE true END", "c1_zero_enrolled_consistency")'
      sources:
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: b45bba9b-fb3b-4194-aa94-9cbae700b58b
    - text: "When 'Curricular units 1st sem (enrolled)' > 0, 'Curricular units 1st\
        \ sem (grade)' must be within the 0\u201320 scale assumed by the model (so\
        \ normalization grade/20 does not rely on clipping). Deequ example: .satisfies(\"\
        CASE WHEN `Curricular units 1st sem (enrolled)` > 0 THEN (`Curricular units\
        \ 1st sem (grade)` >= 0 AND `Curricular units 1st sem (grade)` <= 20) ELSE\
        \ true END\", \"c1_grade_scale_if_enrolled\")"
      sources:
      - start_line: 79
        end_line: 79
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: 907a61d7-2c36-4db3-a6a9-90f90c9aa5f9
    - text: 'For rows that will be scored (Target = ''Enrolled''), ''Curricular units
        1st sem (enrolled)'' should be >= 1 so that rates are computed from actual
        coursework rather than 0-denominator defaults. Deequ example: .satisfies("CASE
        WHEN `Target` = ''Enrolled'' THEN `Curricular units 1st sem (enrolled)` >=
        1 ELSE true END", "c1_enrolled_positive_for_scored_rows")'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: 22a0949b-1d40-4022-8716-7abc5b351b95
  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)","Curricular
    units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For every record, the 1st-semester approved units must be within [0,
        enrolled] so that approval_rate_1 stays in [0,1] and fail_rate_1 is non-negative.
        Deequ example: .satisfies(''`Curricular units 1st sem (approved)` >= 0 AND
        `Curricular units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)`'',
        name=''approved_within_enrolled_1stsem'', columns=[''Curricular units 1st
        sem (approved)'', ''Curricular units 1st sem (enrolled)'']).'
      sources:
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: b7ff480b-1dbd-4044-843d-21ed1a761537
    - text: 'For every record, the 1st-semester ''without evaluations'' units must
        be within [0, enrolled] so that woeval_rate_1 stays in [0,1]. Deequ example:
        .satisfies(''`Curricular units 1st sem (without evaluations)` >= 0 AND `Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`'',
        name=''woeval_within_enrolled_1stsem'', columns=[''Curricular units 1st sem
        (without evaluations)'', ''Curricular units 1st sem (enrolled)'']).'
      sources:
      - start_line: 76
        end_line: 76
        file: ''
      uid: b206a740-b4a4-40b8-90fc-cbd0251e4c7b
    - text: 'For every record, the combined count of approved and without-evaluations
        units in 1st semester must not exceed enrolled (to avoid category double counting):
        approved + without_evaluations <= enrolled. Deequ example: .satisfies(''`Curricular
        units 1st sem (approved)` + `Curricular units 1st sem (without evaluations)`
        <= `Curricular units 1st sem (enrolled)`'', name=''no_double_counting_1stsem'',
        columns=[''Curricular units 1st sem (approved)'', ''Curricular units 1st sem
        (without evaluations)'', ''Curricular units 1st sem (enrolled)'']).'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 116
        end_line: 116
        file: ''
      uid: 893b48a9-d604-4c65-a45f-ed03edbd7198
    - text: 'If the 1st-semester enrolled count is zero, then both approved and without-evaluations
        counts must be zero (no approved or unevaluated units when nothing is enrolled).
        Deequ example: .satisfies(''CASE WHEN `Curricular units 1st sem (enrolled)`
        = 0 THEN (`Curricular units 1st sem (approved)` = 0 AND `Curricular units
        1st sem (without evaluations)` = 0) ELSE true END'', name=''zero_enrolled_implies_zero_others_1stsem'',
        columns=[''Curricular units 1st sem (enrolled)'', ''Curricular units 1st sem
        (approved)'', ''Curricular units 1st sem (without evaluations)'']).'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: ed99638a-c44e-4b63-8afd-97ddf45fb1f3
    - text: 'If the 1st-semester approved count equals the enrolled count, then the
        ''without evaluations'' count must be zero (no unevaluated units when all
        enrolled units are approved). Deequ example: .satisfies(''CASE WHEN `Curricular
        units 1st sem (approved)` = `Curricular units 1st sem (enrolled)` THEN `Curricular
        units 1st sem (without evaluations)` = 0 ELSE true END'', name=''all_approved_implies_no_woeval_1stsem'',
        columns=[''Curricular units 1st sem (approved)'', ''Curricular units 1st sem
        (enrolled)'', ''Curricular units 1st sem (without evaluations)'']).'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: a374ee4e-0635-43d1-8d2e-f8eb47b260c5
  '["Curricular units 1st sem (credited)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For every record, ''Curricular units 1st sem (credited)'' must be less
        than or equal to ''Curricular units 1st sem (enrolled)''. Additionally, if
        ''Curricular units 1st sem (enrolled)'' equals 0, then ''Curricular units
        1st sem (credited)'' must be 0. This keeps the credit_rate_1 = credited/enrolled
        ratio meaningful and bounded in [0,1]. Example Deequ constraints: .satisfies("`Curricular
        units 1st sem (credited)` <= `Curricular units 1st sem (enrolled)`", 1.0)
        and .satisfies("(`Curricular units 1st sem (enrolled)` > 0) OR (`Curricular
        units 1st sem (credited)` = 0)", 1.0).'
      sources:
      - start_line: 75
        end_line: 77
        file: ''
      uid: 28c09f16-8915-4936-adcf-8d0c2855f3a0
    - text: 'For 1st-semester activity counts, each numerator used in a rate must
        be bounded by its enrollment denominator, and the combined counts cannot exceed
        enrollment: 0 <= ''Curricular units 1st sem (approved)'' <= ''Curricular units
        1st sem (enrolled)'', 0 <= ''Curricular units 1st sem (without evaluations)''
        <= ''Curricular units 1st sem (enrolled)'', and ''Curricular units 1st sem
        (approved)'' + ''Curricular units 1st sem (without evaluations)'' <= ''Curricular
        units 1st sem (enrolled)''. These ensure approval_rate_1 and woeval_rate_1
        are in [0,1] and that the fail-rate numerator (enrolled - approved) is non-negative.
        Example Deequ constraint: .satisfies("`Curricular units 1st sem (approved)`
        <= `Curricular units 1st sem (enrolled)` AND `Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)` AND `Curricular units
        1st sem (approved)` + `Curricular units 1st sem (without evaluations)` <=
        `Curricular units 1st sem (enrolled)`", 1.0).'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 88
        end_line: 90
        file: ''
      uid: 6fb773bb-ebb9-4f1a-94ca-9941de783e6a
  '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]':
    code: []
    assumptions:
    - text: 'For each record, the number of ''Curricular units 1st sem (without evaluations)''
        must be between 0 and the number of ''Curricular units 1st sem (enrolled)''.
        This keeps the derived rate ''without evaluations'' / ''enrolled'' within
        [0, 1] when used downstream. Example Deequ constraint: .addConstraint(Compliance(''woeval1_within_enrolled'',
        ''`Curricular units 1st sem (without evaluations)` >= 0 AND `Curricular units
        1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`''))'
      sources:
      - start_line: 76
        end_line: 76
        file: ''
      - start_line: 90
        end_line: 90
        file: ''
      - start_line: 116
        end_line: 116
        file: ''
      uid: 784a52cd-8bdc-400d-9c2e-f5a1084ded63
    - text: 'For each record, the counts of ''Curricular units 1st sem (approved)''
        and ''Curricular units 1st sem (credited)'' must each be between 0 and the
        number of ''Curricular units 1st sem (enrolled)''. This ensures approval_rate_1
        and credit_rate_1 are valid proportions in [0, 1] and prevents negative values
        in the derived fail_rate_1 numerator (enrolled - approved). Example Deequ
        constraint: .addConstraint(Compliance(''c1_counts_within_enrolled'', ''`Curricular
        units 1st sem (approved)` >= 0 AND `Curricular units 1st sem (approved)` <=
        `Curricular units 1st sem (enrolled)` AND `Curricular units 1st sem (credited)`
        >= 0 AND `Curricular units 1st sem (credited)` <= `Curricular units 1st sem
        (enrolled)`''))'
      sources:
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 77
        end_line: 77
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: 4fd8badb-d571-4782-8907-3b7fa70ffa13
    - text: 'If ''Curricular units 1st sem (enrolled)'' equals 0 for a record, then
        ''Curricular units 1st sem (without evaluations)'', ''Curricular units 1st
        sem (approved)'', and ''Curricular units 1st sem (credited)'' must all be
        0 for that record (no units can be approved/credited/unevaluated if none were
        enrolled). Example Deequ constraint: .addConstraint(Compliance(''c1_zero_enrolled_implies_zero_counts'',
        ''(`Curricular units 1st sem (enrolled)` != 0) OR (`Curricular units 1st sem
        (approved)` = 0 AND `Curricular units 1st sem (credited)` = 0 AND `Curricular
        units 1st sem (without evaluations)` = 0)''))'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 75
        end_line: 78
        file: ''
      uid: eabbbd55-d943-43b0-adaa-5bf0b9f9b917
  ? '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (credited)","Curricular
    units 2nd sem (enrolled)","Curricular units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'Bounds by enrollment for 2nd semester counts: For every row, 0 <= ''Curricular
        units 2nd sem (approved)'' <= ''Curricular units 2nd sem (enrolled)'', 0 <=
        ''Curricular units 2nd sem (without evaluations)'' <= ''Curricular units 2nd
        sem (enrolled)'', and 0 <= ''Curricular units 2nd sem (credited)'' <= ''Curricular
        units 2nd sem (enrolled)''. Deequ examples: .satisfies("`Curricular units
        2nd sem (approved)` >= 0 AND `Curricular units 2nd sem (approved)` <= `Curricular
        units 2nd sem (enrolled)`", "c2_app_le_enr"); .satisfies("`Curricular units
        2nd sem (without evaluations)` >= 0 AND `Curricular units 2nd sem (without
        evaluations)` <= `Curricular units 2nd sem (enrolled)`", "c2_woeval_le_enr");
        .satisfies("`Curricular units 2nd sem (credited)` >= 0 AND `Curricular units
        2nd sem (credited)` <= `Curricular units 2nd sem (enrolled)`", "c2_cred_le_enr").'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: c8dd3181-25fe-40ad-9a46-dd69566118ab
    - text: 'Joint feasibility: The sum of approved and without-evaluations must not
        exceed enrollments: ''Curricular units 2nd sem (approved)'' + ''Curricular
        units 2nd sem (without evaluations)'' <= ''Curricular units 2nd sem (enrolled)''.
        Deequ example: .satisfies("`Curricular units 2nd sem (approved)` + `Curricular
        units 2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`",
        "c2_app_plus_woeval_le_enr").'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 89
        end_line: 90
        file: ''
      uid: f6099015-ffaa-478e-942f-3dd511e29648
    - text: 'No outcomes without enrollment: If ''Curricular units 2nd sem (enrolled)''
        = 0, then ''Curricular units 2nd sem (approved)'' = 0 AND ''Curricular units
        2nd sem (without evaluations)'' = 0 AND ''Curricular units 2nd sem (credited)''
        = 0. Deequ example: .satisfies("CASE WHEN `Curricular units 2nd sem (enrolled)`
        = 0 THEN (`Curricular units 2nd sem (approved)` = 0 AND `Curricular units
        2nd sem (without evaluations)` = 0 AND `Curricular units 2nd sem (credited)`
        = 0) ELSE true END", "c2_zero_enr_zero_outcomes").'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      uid: 26a2bb62-bd50-455e-b9cf-addfe5e6d588
  '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For every record, the count in ''Curricular units 2nd sem (approved)''
        must not exceed the count in ''Curricular units 2nd sem (enrolled)'' (i.e.,
        0 <= approved <= enrolled). Deequ compliance example: `"`Curricular units
        2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)`"`.'
      sources:
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 688127c3-6bfb-48cb-83ab-fa3207c2b69d
    - text: 'If ''Curricular units 2nd sem (enrolled)'' equals 0, then ''Curricular
        units 2nd sem (approved)'' must be 0 (to avoid undefined/biased approval rates).
        Deequ compliance example: `"CASE WHEN `Curricular units 2nd sem (enrolled)`
        = 0 THEN `Curricular units 2nd sem (approved)` = 0 ELSE true END"`.'
      sources:
      - start_line: 81
        end_line: 81
        file: ''
      uid: 41bcaecb-cb6c-46d2-ac2e-464d411a5ac9
