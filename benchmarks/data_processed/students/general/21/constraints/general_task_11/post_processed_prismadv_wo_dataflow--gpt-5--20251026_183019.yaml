    - text: The 'Application order' column should be numeric/coercible to numeric
        and non-null for rows used in scoring (especially for 'Enrolled' students).
        No imputation is performed; invalid or missing values will be coerced to NaN
        and propagate to app_risk, risk_score, and priority_tier, yielding null outputs.
        This can be validated as completeness == 1.0 and values parsable as numbers.
