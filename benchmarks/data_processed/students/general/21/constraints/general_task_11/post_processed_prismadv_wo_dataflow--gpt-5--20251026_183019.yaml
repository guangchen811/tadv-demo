        file: ''
      uid: 18227948-4ca5-45fc-a5e8-16a5203b4bd9
    - text: "Semantic encoding assumption: Scholarship holder = 1 means the student\
        \ has a scholarship, and = 0 means no scholarship. The code subtracts 0.2\
        \ \xD7 Scholarship holder in financial_risk, implying that a value of 1 should\
