      uid: 03771f4a-0b64-486d-a942-b5b02b562fc8
    - text: 'Semester consistency: For each semester, counts for Approved, Credited,
        and Without evaluations must be within [0, Enrolled]; specifically: 0 <= approved
        <= enrolled, 0 <= credited <= enrolled, 0 <= without_evaluations <= enrolled
        (for both 1st and 2nd semesters). Deequ examples: .satisfies(''`Curricular
        units 1st sem (approved)` >= 0 AND `Curricular units 1st sem (approved)` <=
        `Curricular units 1st sem (enrolled)`'', ''sem1_approved_le_enrolled'') and
        analogous constraints for credited and without evaluations; repeat for 2nd
        semester columns.'
      sources:
      - start_line: 75
        end_line: 77
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 88
        end_line: 89
        file: ''
      uid: 8001a9fc-77b4-469d-9232-ca37fa9f9d67
    - text: 'Non-null semester details when enrolled > 0: If Curricular units 1st
        sem (enrolled) > 0, then the corresponding Approved, Credited, and Without
        evaluations values for 1st semester must be non-null; similarly for 2nd semester.
        Deequ examples: .satisfies(''CASE WHEN `Curricular units 1st sem (enrolled)`
        > 0 THEN `Curricular units 1st sem (approved)` IS NOT NULL AND `Curricular
        units 1st sem (credited)` IS NOT NULL AND `Curricular units 1st sem (without
        evaluations)` IS NOT NULL ELSE true END'', ''sem1_nonnull_if_enrolled'') and
        analogous for 2nd semester.'
      sources:
      - start_line: 75
        end_line: 77
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 60b077d9-1d6b-4221-bcd5-255ee9196545
    - text: "Grade scale consistency across semesters: Both 'Curricular units 1st\
        \ sem (grade)' and 'Curricular units 2nd sem (grade)' are on a 0\u201320 scale.\
        \ Deequ examples: .hasNumberBetween('Curricular units 1st sem (grade)', 0,\
        \ 20) and .hasNumberBetween('Curricular units 2nd sem (grade)', 0, 20)."
      sources:
      - start_line: 79
        end_line: 79
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: 26470dc5-1a15-4224-8c42-a03143908966
    - text: 'Financial indicator columns share a 0/1 encoding: Debtor, Tuition fees
        up to date, and Scholarship holder must each be in {0,1}. Deequ examples:
        .isContainedIn(''Debtor'', [0,1]); .isContainedIn(''Tuition fees up to date'',
        [0,1]); .isContainedIn(''Scholarship holder'', [0,1]).'
      sources:
      - start_line: 61
        end_line: 71
