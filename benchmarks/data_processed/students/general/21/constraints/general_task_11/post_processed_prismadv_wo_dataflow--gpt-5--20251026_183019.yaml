    - text: 'The ''Application order'' values are expected to lie within the inclusive
        range [1, 9]. The transformation ((Application order - 1) / 8.0).clip(0, 1)
        implies that 1 maps to the minimum effect and 9 to the maximum; values outside
        this range would be clipped and should be rare or absent. This can be validated
        with a rule like: values between 1 and 9 (mostly 1.0).'
