  '["Admission grade","Previous qualification (grade)"]':
    code: []
    assumptions:
    - text: 'For all rows where ''Target'' == ''Enrolled'', both ''Admission grade''
        and ''Previous qualification (grade)'' must be present (non-null), numeric,
        and finite, since they are used directly (without imputation) in preparedness
        and flow into the risk score for enrolled students. Suggested constraints:
        isComplete(''Admission grade'').where(''Target = "Enrolled"'') AND isComplete(''Previous
        qualification (grade)'').where(''Target = "Enrolled"''); optionally also hasDataType(''Admission
        grade'', Fractional) and hasDataType(''Previous qualification (grade)'', Fractional)
        with the same where clause.'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 93
        end_line: 96
        file: ''
      - start_line: 130
        end_line: 139
        file: ''
      uid: 11ebb82c-f83b-4e70-bd22-4d46d4d056d6
    - text: '''Admission grade'' and ''Previous qualification (grade)'' are on the
        same grading scale [0,200]. All records should satisfy 0 <= ''Admission grade''
        <= 200 and 0 <= ''Previous qualification (grade)'' <= 200 (to avoid clipping-induced
        distortions). Suggested Deequ constraint: satisfies(''`Admission grade` BETWEEN
        0 AND 200 AND `Previous qualification (grade)` BETWEEN 0 AND 200'', ''grades_in_expected_range'',
        lambda=1.0).'
      sources:
      - start_line: 93
        end_line: 96
        file: ''
      uid: 3fd792e1-88ad-46e1-ab8f-24bb6e1d63a9
    - text: "The normalized weighted combination of the two grade columns (preparedness)\
        \ should always lie in [0,1]: 0.6*('Admission grade'/200.0) + 0.4*('Previous\
        \ qualification (grade)'/200.0) \u2208 [0,1] for every row. Suggested Deequ\
        \ constraint: satisfies('0.6*(`Admission grade`/200.0) + 0.4*(`Previous qualification\
        \ (grade)`/200.0) >= 0 AND 0.6*(`Admission grade`/200.0) + 0.4*(`Previous\
        \ qualification (grade)`/200.0) <= 1', 'preparedness_in_01', lambda=1.0)."
      sources:
      - start_line: 93
        end_line: 96
        file: ''
      uid: 6fa48b21-dc25-4554-8dd8-18974cf46116
    - text: 'Because both columns measure academic preparedness on the same scale
        and are combined linearly, they should be positively correlated across the
        dataset. Suggested Deequ constraint: hasCorrelation(''Admission grade'', ''Previous
        qualification (grade)'', lowerBound=0.2, upperBound=1.0).'
      sources:
      - start_line: 93
        end_line: 96
        file: ''
      uid: c2c40ab6-1404-4680-9d66-615250e82ad6
