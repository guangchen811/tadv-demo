    assumptions:
    - text: 'GDP must be parseable as numeric (fractional) for essentially all rows,
        since the code coerces non-numeric GDP values to null and uses GDP in arithmetic.
        A suitable validation is: GDP has a numeric/fractional data type and a very
        high success rate of parsing (e.g., >= 99%). Example rules: Deequ hasDataType(''GDP'',
        ConstrainableDataTypes.Fractional) and/or satisfies(''CASE WHEN GDP IS NULL
        THEN 0 ELSE 1 END'', ''GDP numeric parse rate'', lambda x: x >= 0.99).'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: 4d87cde4-ab46-4398-856c-bad7bc6b7a3e
    - text: 'GDP must be non-null for all rows that will be scored (Target = ''Enrolled'').
        If GDP is null, gdp_headwind becomes null, propagating to macro_risk and risk_score,
        which prevents proper tiering. A suitable validation is: Among rows where
        Target = ''Enrolled'', GDP completeness is 100%. Example rules: Deequ .where("`Target`
        = ''Enrolled''").isComplete(''GDP'') or satisfies("CASE WHEN `Target` = ''Enrolled''
        AND `GDP` IS NULL THEN 0 ELSE 1 END", ''GDP present for enrolled'', lambda
        x: x == 1).'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 110
        end_line: 112
        file: ''
      - start_line: 121
        end_line: 129
        file: ''
      - start_line: 130
        end_line: 139
        file: ''
      uid: 641a84cb-8ab1-4d75-af7f-6f497be84d2c
    - text: 'GDP should be expressed in percentage points (not proportions), consistent
        with subtracting it from the constant 5 (interpretable as 5%). A practical
        validation to guard against proportion-encoded values is: at least 10% of
        non-null GDP values have absolute value >= 1.0. Example rule: Deequ satisfies(''CASE
        WHEN ABS(`GDP`) >= 1 THEN 1 ELSE 0 END'', ''GDP not proportion scale'', lambda
        x: x >= 0.1).'
      sources:
      - start_line: 110
        end_line: 110
        file: ''
      uid: 4877a7d8-100f-444b-8933-895322da8362
    - text: 'GDP should fall within a plausible macroeconomic range for the vast majority
        of rows. Because gdp_headwind = ((5 - GDP)/10).clip(0,1), the intended working
        range is roughly GDP in [-5, 15] (beyond which the metric saturates). A suitable
        validation is: at least 95% of GDP values are between -5 and 15. Example rule:
        Deequ satisfies(''CASE WHEN `GDP` BETWEEN -5 AND 15 THEN 1 ELSE 0 END'', ''GDP
        plausible working range'', lambda x: x >= 0.95). The provided dataset (values
        roughly between -4.06 and 3.51) is consistent with this.'
      sources:
      - start_line: 110
        end_line: 110
        file: ''
      uid: 9ce6f311-c8aa-43a3-9ba9-998eae61755e
    - text: 'GDP should not contain extreme outliers indicative of unit errors (e.g.,
        thousands). A hard sanity bound can be enforced: all values within [-20, 25].
        Example rule: Deequ satisfies(''CASE WHEN `GDP` >= -20 AND `GDP` <= 25 THEN
        1 ELSE 0 END'', ''GDP hard bounds'', lambda x: x == 1).'
      sources:
      - start_line: 110
        end_line: 110
        file: ''
