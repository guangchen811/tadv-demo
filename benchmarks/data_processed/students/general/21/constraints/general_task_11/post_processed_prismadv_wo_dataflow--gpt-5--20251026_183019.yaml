  '["Debtor","Scholarship holder","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'Financial status consistency: No record should simultaneously have Debtor
        = 1 and "Tuition fees up to date" = 1 (these states are logically incompatible
        for the risk logic). Deequ example: .satisfies("NOT (Debtor = 1 AND `Tuition
        fees up to date` = 1)", "no_conflicting_financial_status", 1.0)'
      sources:
      - start_line: 97
        end_line: 99
        file: ''
      uid: 0ecc5391-9bb3-42ca-9b56-8c2e87b4a082
    - text: 'Scholarship vs. indebtedness: Scholarship holders should almost never
        be debtors. Compliance target: at least 95% of rows satisfy (Scholarship holder
        = 1) => (Debtor = 0). Deequ example: .satisfies("NOT (`Scholarship holder`
        = 1 AND Debtor = 1)", "scholar_not_debtor", 0.95)'
      sources:
      - start_line: 97
        end_line: 99
        file: ''
      uid: 5000e423-b3b8-469a-b900-3bd7839bfb23
    - text: 'Scholarship vs. fees timeliness: Scholarship holders should largely have
        fees up to date. Compliance target: P(`Tuition fees up to date` = 1 | `Scholarship
        holder` = 1) >= 0.8. Deequ example (row-level surrogate): .satisfies("(`Scholarship
        holder` = 0) OR (`Tuition fees up to date` = 1)", "scholar_has_fees_up_to_date",
        0.8)'
      sources:
      - start_line: 97
        end_line: 99
        file: ''
      uid: ac96447f-cfa0-46b3-958b-801b98c53948
    - text: 'Binary encoding across financial columns: The triplet (Debtor, "Tuition
        fees up to date", "Scholarship holder") should be complete and strictly binary
        in {0,1}. Deequ example: .satisfies("(Debtor IN (0,1)) AND (`Tuition fees
        up to date` IN (0,1)) AND (`Scholarship holder` IN (0,1))", "financial_flags_binary",
        1.0)'
      sources:
      - start_line: 66
        end_line: 71
        file: ''
      - start_line: 97
        end_line: 99
        file: ''
      uid: d390759b-f52b-42bf-bc96-36b75ca2521e
    - text: 'Financial risk formula should not rely on clipping: the pre-clip weighted
        sum 0.6*Debtor + 0.3*(1 - "Tuition fees up to date") - 0.2*"Scholarship holder"
        should fall in [0,1] for at least 99% of rows. Deequ example: .satisfies("(0
        <= 0.6*Debtor + 0.3*(1 - `Tuition fees up to date`) - 0.2*`Scholarship holder`)
        AND (0.6*Debtor + 0.3*(1 - `Tuition fees up to date`) - 0.2*`Scholarship holder`
        <= 1)", "financial_risk_preclip_bounds", 0.99)'
      sources:
      - start_line: 97
        end_line: 99
        file: ''
      - start_line: 128
        end_line: 128
        file: ''
      uid: 71f5eac3-00ca-43e5-a822-828033d123f8
    - text: 'Semester counts are bounded by enrollments: For each semester, Approved
        <= Enrolled, Credited <= Enrolled, and Without evaluations <= Enrolled; all
        are non-negative. Applies to both 1st and 2nd semesters. Deequ examples: .satisfies("`Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)` AND `Curricular
        units 1st sem (approved)` >= 0", ..., 1.0) and analogous constraints for credited/woeval
        and for 2nd semester.'
      sources:
      - start_line: 75
        end_line: 90
        file: ''
      uid: 7fb62ae8-87cc-4a15-83b9-8b59f1606f73
    - text: 'Zero-enrollment rows should have zero activity counts: If `Curricular
        units 1st sem (enrolled)` = 0 then `Curricular units 1st sem (approved)` =
        0 AND `Curricular units 1st sem (credited)` = 0 AND `Curricular units 1st
        sem (without evaluations)` = 0; similarly for 2nd semester. Deequ example:
        .satisfies("(CASE WHEN `Curricular units 1st sem (enrolled)` = 0 THEN (`Curricular
        units 1st sem (approved)` = 0 AND `Curricular units 1st sem (credited)` =
        0 AND `Curricular units 1st sem (without evaluations)` = 0) ELSE TRUE END)",
        "no_activity_when_not_enrolled_sem1", 1.0) and analogous for sem2.'
      sources:
      - start_line: 75
        end_line: 83
        file: ''
      - start_line: 88
        end_line: 90
        file: ''
      uid: 4241b775-40c8-41b5-bb27-1765aa72054f
    - text: 'Grades present and bounded when there is enrollment: If `Curricular units
        1st sem (enrolled)` > 0 then `Curricular units 1st sem (grade)` is not null
        and in [0,20]; similarly for 2nd semester. Deequ example: .satisfies("(CASE
        WHEN `Curricular units 1st sem (enrolled)` > 0 THEN (`Curricular units 1st
        sem (grade)` BETWEEN 0 AND 20) ELSE TRUE END)", "grade_present_and_bounded_sem1",
        1.0) and analogous for sem2.'
      sources:
      - start_line: 79
        end_line: 86
        file: ''
      uid: 0ca3dc5d-8abb-40ca-b3ff-43c8247bdabb
  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'Both ''Debtor'' and ''Tuition fees up to date'' are binary numeric flags
        encoded as integers in {0,1} with no nulls across all rows, since they are
        numerically combined in the financial risk calculation. This can be enforced
        with constraints like: .isContainedIn(''Debtor'', [0,1]) and .isContainedIn(''Tuition
        fees up to date'', [0,1]) and completeness == 1.0 for both.'
      sources:
      - start_line: 66
        end_line: 71
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: 19de9ff4-84c1-4efd-a281-930732f39b94
    - text: 'Logical consistency: a student cannot simultaneously be a debtor and
        have tuition fees up to date. Enforce: NOT (Debtor = 1 AND `Tuition fees up
        to date` = 1), equivalently (`Debtor` + `Tuition fees up to date`) <= 1. In
        Deequ, this can be expressed via a compliance constraint on that predicate.'
      sources:
      - start_line: 98
        end_line: 98
        file: ''
      uid: b4a12741-7312-47e3-b394-fe6beb2cf0b3
    - text: 'Directionality of arrears status: when `Tuition fees up to date` = 0,
        `Debtor` should be 1 for the vast majority of rows (e.g., >= 0.95 compliance),
        reflecting that not being up to date implies debtor status in practice. Deequ
        compliance example: (`Tuition fees up to date` = 1) OR (Debtor = 1) with required
        ratio >= 0.95.'
      sources:
      - start_line: 98
        end_line: 98
        file: ''
      uid: 1227ae2f-6934-4757-9c76-0d6baa476e79
  '["GDP","Inflation rate","Unemployment rate"]':
    code: []
    assumptions:
    - text: 'The macroeconomic inputs ''Unemployment rate'', ''GDP'', and ''Inflation
        rate'' must all be present and numeric for every row (no nulls after coercion),
        since they are jointly combined to compute macro_risk and ultimately risk_score.
        This can be enforced with a multi-column completeness check, e.g., Deequ satisfies:
        (Unemployment rate IS NOT NULL) AND (GDP IS NOT NULL) AND (Inflation rate
        IS NOT NULL) with required fraction = 1.0.'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 108
        end_line: 112
        file: ''
      - start_line: 120
        end_line: 128
        file: ''
      uid: 1cc166a2-2184-44fb-869c-270a3283cf74
    - text: 'The three macro columns should simultaneously fall within the expected
        ranges implied by the normalization: Unemployment rate in [5, 20], GDP in
        [-5, 5], and Inflation rate in [-2, 5]. This prevents systematic clipping
        and preserves the intended scaling across all three inputs. This can be expressed
        as a single multi-column range constraint, e.g., Deequ satisfies: (Unemployment
        rate BETWEEN 5 AND 20) AND (GDP BETWEEN -5 AND 5) AND (Inflation rate BETWEEN
        -2 AND 5) with required fraction = 1.0.'
      sources:
      - start_line: 109
        end_line: 111
        file: ''
      uid: d43f89fa-5313-4928-95d8-16f8ee2ad1e4
    - text: Given the weights used for macro_risk, the un-clipped weighted sum 0.7*((Unemployment
        rate - 5)/15) + 0.2*((5 - GDP)/10) + 0.1*((Inflation rate + 2)/7) should lie
        within [0, 1] for each row (i.e., before applying clip), ensuring the normalization
        across the three columns is coherent. This can be validated with a multi-column
        expression in Deequ satisfies checking 0 <= expression AND expression <= 1.0
        for all rows.
      sources:
      - start_line: 109
        end_line: 112
        file: ''
      uid: 4b6c12eb-95e2-4085-b37a-fffd1b2694e7
