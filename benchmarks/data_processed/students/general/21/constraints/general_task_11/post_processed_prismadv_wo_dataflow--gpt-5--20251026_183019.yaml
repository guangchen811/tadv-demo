    assumptions:
    - text: 'Target must be complete (no nulls). Because the code filters rows with
        Target == ''Enrolled'', any nulls would be silently excluded and could cause
        empty outputs. Example validations: Deequ: .isComplete("Target"); Great Expectations:
        expect_column_values_to_not_be_null(column="Target").'
      sources:
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 8d1290fc-1814-44e8-a771-9f492b31096a
    - text: 'Target values must be in the exact, case-sensitive set {''Graduate'',
        ''Dropout'', ''Enrolled''} with no leading/trailing whitespace. The code uses
        a literal equality check to ''Enrolled'', so unexpected spellings or casing
        would be missed. Example validations: Deequ: .satisfies("CASE WHEN `Target`
        IN (''Graduate'',''Dropout'',''Enrolled'') THEN 1 ELSE 0 END", "Valid Target
        Set", lambda v: v == 1.0); Great Expectations: expect_column_values_to_be_in_set(column="Target",
        value_set=["Graduate","Dropout","Enrolled"]).'
