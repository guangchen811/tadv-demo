      uid: b2fb56c9-b75a-4125-84ac-65e5a8e321ef
    - text: The 'Application order' column represents an ordinal rank and should consist
        of whole numbers (integers). Fractional values would not be meaningful for
        the risk scaling that assumes rank steps. This can be validated by checking
        that each value equals its integer cast (i.e., value == CAST(value AS INT)).
