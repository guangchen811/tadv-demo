constraints:
  Admission grade:
    code:
    - - .satisfies('`Admission grade` >= 0 AND `Admission grade` <= 200', 'admission_grade_range')
      - Valid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isNonNegative('Curricular units 1st sem (approved)')
      - Invalid
    - - .satisfies('`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (evaluations)`', 'approved_le_evaluations_1')
      - Valid
    assumptions: []
  Curricular units 1st sem (credited):
    code:
    - - .satisfies('`Curricular units 1st sem (credited)` <= `Curricular units 1st
        sem (enrolled)`', 'credited_le_enrolled_1')
      - Valid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isComplete('Curricular units 1st sem (enrolled)')
      - Valid
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (evaluations):
    code:
    - - .isNonNegative('Curricular units 1st sem (evaluations)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .satisfies('`Curricular units 1st sem (grade)` >= 0 AND `Curricular units
        1st sem (grade)` <= 20', 'grade1_in_range')
      - Valid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .satisfies('`Curricular units 2nd sem (approved)` <= `Curricular units 2nd
        sem (evaluations)`', 'approved_le_evaluations_2')
      - Valid
    assumptions: []
  Curricular units 2nd sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 2nd sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .satisfies('`Curricular units 2nd sem (grade)` >= 0 AND `Curricular units
        2nd sem (grade)` <= 20', 'grade2_in_range')
      - Valid
    assumptions: []
  Curricular units 2nd sem (without evaluations):
    code:
    - - .isNonNegative('Curricular units 2nd sem (without evaluations)')
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', [0, 1])
      - Invalid
    assumptions: []
  Scholarship holder:
    code:
    - - .isContainedIn('Scholarship holder', [0, 1])
      - Invalid
    assumptions: []
  Target:
    code:
    - - .isComplete('Target')
      - Valid
    - - .isContainedIn('Target', ['Graduate', 'Dropout', 'Enrolled'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', [0, 1])
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
