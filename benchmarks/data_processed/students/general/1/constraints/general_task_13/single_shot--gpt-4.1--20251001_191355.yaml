constraints:
  Application order:
    code:
    - - .isContainedIn('Application order', [1,2,3,4,5,6,9])
      - Invalid
    assumptions: []
  Curricular units 2nd sem (credited):
    code:
    - - .isComplete('Curricular units 2nd sem (credited)')
      - Valid
    assumptions: []
  Curricular units 2nd sem (enrolled):
    code:
    - - .isComplete('Curricular units 2nd sem (enrolled)')
      - Valid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .isComplete('Curricular units 2nd sem (grade)')
      - Valid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - ".isComplete('Daytime/evening attendance\t')"
      - Valid
    - - ".isContainedIn('Daytime/evening attendance\t', [0, 1])"
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', [0, 1])
      - Invalid
    assumptions: []
  Displaced:
    code:
    - - .isContainedIn('Displaced', [0, 1])
      - Invalid
    assumptions: []
  Educational special needs:
    code:
    - - .isContainedIn('Educational special needs', [0, 1])
      - Invalid
    assumptions: []
  GDP:
    code:
    - - .isContainedIn('GDP', [-4.06, -3.12, -1.7, -0.92, 0.32, 0.79, 1.74, 1.79,
        2.02, 3.51])
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', [0, 1])
      - Invalid
    assumptions: []
  Inflation rate:
    code:
    - - .isContainedIn('Inflation rate', [-0.8, -0.3, 0.3, 0.5, 0.6, 1.4, 2.6, 2.8,
        3.7])
      - Invalid
    assumptions: []
  International:
    code:
    - - .isContainedIn('International', [0, 1])
      - Invalid
    assumptions: []
  Marital status:
    code:
    - - .isContainedIn('Marital status', [1,2,3,4,5,6])
      - Invalid
    assumptions: []
  Previous qualification (grade):
    code:
    - - .isComplete('Previous qualification (grade)')
      - Valid
    assumptions: []
  Scholarship holder:
    code:
    - - .isContainedIn('Scholarship holder', [0, 1])
      - Invalid
    assumptions: []
  Target:
    code:
    - - '.hasDistinctness(''Target'', lambda x: x <= 3)'
      - Invalid
    - - .hasHistogramValues('Target', ['Graduate', 'Dropout', 'Enrolled'])
      - Invalid
    - - .isComplete('Target')
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', [0, 1])
      - Invalid
    assumptions: []
  Unemployment rate:
    code:
    - - .isContainedIn('Unemployment rate', [7.6, 8.9, 9.4, 10.8, 11.1, 12.4, 12.7,
        13.9, 15.5, 16.2])
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
