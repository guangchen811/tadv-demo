  '["GDP","Inflation rate","Unemployment rate"]':
    code: []
    assumptions:
    - text: 'The three macro columns ''GDP'', ''Unemployment rate'', and ''Inflation
        rate'' are numeric and complete (no nulls) for every row. The code converts
        these columns to numeric and then computes z-scores and a combined macro_stress,
        so missing or non-numeric values would produce NaNs and break downstream calculations.
        Actionable constraint examples: Deequ-style - .isComplete(''GDP''), .isComplete(''Unemployment
        rate''), .isComplete(''Inflation rate'') or a single predicate ensuring all
        three are non-null for each row.'
      sources:
      - start_line: 45
        end_line: 52
        file: ''
      uid: 0ff5312e-8548-4b94-a788-2232f6051f9e
    - text: 'Each of ''GDP'', ''Unemployment rate'', and ''Inflation rate'' must have
        non-zero standard deviation across the dataset (std > 0). The code standardizes
        each column using its mean and std; a zero std would cause division by zero
        or produce NaNs. Actionable constraint example: assert df[''GDP''].std(ddof=0)
        > 0 and df[''Unemployment rate''].std(ddof=0) > 0 and df[''Inflation rate''].std(ddof=0)
        > 0. In Deequ-like form, a custom analyzer/predicate enforcing variance >
        0 per column.'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      uid: 932a849f-bc09-4333-9177-60547bab5061
    - text: '''Application order'' must be integer-valued, complete, and constrained
        to the range 1..9 (inclusive). The code indexes the commit_weights array by
        application order (commit_weights[app_order.to_numpy()]) and assumes values
        align to indices 1..9; out-of-range or missing values will cause indexing
        errors or invalid commitments. Actionable constraint examples: .isComplete(''Application
        order'') and .isContainedIn(''Application order'', [1,2,3,4,5,6,7,8,9]) (and
        ensure integer type).'
      sources:
      - start_line: 55
        end_line: 59
        file: ''
      uid: d95964f3-f966-4e2a-9c48-42d2a2a7639b
    - text: '''Debtor'' and ''Tuition fees up to date'' are binary indicators (expected
        values 0 or 1), both complete, and mutually consistent: if ''Tuition fees
        up to date'' == 1 then ''Debtor'' should be 0. The code computes arrears as
        (Debtor == 1) OR (Tuition fees up to date == 0), so inconsistent combinations
        (e.g., fees_up_to_date == 1 AND Debtor == 1) indicate data problems. Actionable
        constraints: .isContainedIn(''Debtor'',[0,1]), .isContainedIn(''Tuition fees
        up to date'',[0,1]), and a predicate like NOT(`Tuition fees up to date` =
        1 AND `Debtor` = 1).'
      sources:
      - start_line: 62
        end_line: 64
        file: ''
      uid: 1a5f77e6-587a-4163-bc7d-ed802b671470
    - text: 'Within each semester, counts must be internally consistent: ''approved''
        <= ''enrolled'', ''credited'' <= ''approved'', and ''without evaluations''
        <= ''enrolled''; enrollments should be non-negative integers and complete.
        The code computes pass rates as ap/en and uses enrollments as denominators
        and in regressions, so violations (e.g., ap > en) are logically invalid and
        break rate calculations. Actionable constraints (semester 1 and 2): enforce
        ap1 <= en1, cr1 <= ap1, wo1 <= en1; ap2 <= en2, cr2 <= ap2, wo2 <= en2; and
        .isComplete + integer/non-negative checks for en1,en2.'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      - start_line: 90
        end_line: 97
        file: ''
      uid: 85b61ae3-07c9-4147-b857-147346eb672e
    - text: 'Grades used for normalization (''Curricular units ... (grade)'' for semester
        1 and 2) must lie in the expected range 0..20 and be numeric/complete. The
