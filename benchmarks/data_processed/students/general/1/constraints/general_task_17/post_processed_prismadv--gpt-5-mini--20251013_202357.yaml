        end_line: 69
        file: ''
      - start_line: 29
        end_line: 30
        file: ''
      uid: 368c5dd2-3597-47c9-9b81-ae362e5432e9
    - text: 'Preparedness calculation assumes both columns contribute comparably (i.e.,
        neither column should be systematically constant or have zero variance). The
        code computes a weighted average of normalized grades (0.6 * adm_normalized
        + 0.4 * prev_normalized); if one column is constant (zero variance) or identical
        across most rows, the combined signal is degraded. Actionable constraints:

        - Require that both columns have non-zero variance (std > 0) across the dataset
        (or at least above a small threshold).

        - Require sufficient distinct values: approximateNumDistinctValues for each
        should be > 1 (or above a chosen threshold) to ensure meaningful weighting.

        '
