  '["Admission grade","Previous qualification (grade)"]':
    code: []
    assumptions:
    - text: "Both 'Admission grade' and 'Previous qualification (grade)' are numeric\
        \ and present for every row. The code converts these columns with pd.to_numeric(errors='coerce')\
        \ and then uses them together to compute 'preparedness', so non-numeric or\
        \ missing values would produce NaNs and break the intended calculation. Actionable\
        \ constraint examples (Deequ / SQL-like):\n- Ensure completeness for both\
        \ columns: require both columns to be non-null for all rows (completeness\
        \ = 1.0).\n  e.g. assert all rows satisfy: `Admission grade IS NOT NULL AND\
        \ Previous qualification (grade) IS NOT NULL` (expected fraction = 1.0).\n\
        - Ensure values are numeric/finite: require both columns to be convertible\
        \ to numeric (no infinities/NaNs).\n"
      sources:
      - start_line: 29
        end_line: 30
        file: ''
      - start_line: 66
        end_line: 69
        file: ''
      uid: 42329253-8674-48f5-8747-30c8626db2b3
    - text: 'The two grade columns are on the same, comparable 0..200 scoring scale.
        The code divides each by 200 (adm_grade / 200.0 and prev_grade / 200.0) and
        forms a weighted average, so each column should be bounded within a reasonable
        score range (typically 0 to 200) and share the same orientation (higher =
        better). Actionable constraints:

        - For every row require 0.0 <= Admission grade <= 200.0 AND 0.0 <= Previous
        qualification (grade) <= 200.0 (expected fraction = 1.0).

        - Optionally enforce no negative values and sensible upper bound (<=200).

        '
      sources:
