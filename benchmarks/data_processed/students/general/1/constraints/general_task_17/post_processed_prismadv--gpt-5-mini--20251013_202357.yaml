    assumptions:
    - text: 'Semester 1 enrollment/approval/credit/without-eval consistency: ''Curricular
        units 1st sem (enrolled)'' (en1), ''Curricular units 1st sem (approved)''
        (ap1), ''Curricular units 1st sem (credited)'' (cr1) and ''Curricular units
        1st sem (without evaluations)'' (wo1) are non-negative integers, ap1 <= en1,
        cr1 <= ap1 (and therefore cr1 <= en1), and wo1 <= en1. Additionally, when
        en1 == 0 then ap1 == 0, cr1 == 0 and wo1 == 0 to avoid ill-defined pass/ratio
        computations. Example actionable constraints (Deequ-style):

        - isContainedIn([''ap1'',''cr1'',''wo1''], ranges implied by en1 and non-negativity)

        - isNonNegative([''en1'',''ap1'',''cr1'',''wo1''])

        - ap1 <= en1

        - cr1 <= ap1

        - wo1 <= en1

        - if en1 == 0 then ap1 == 0 and cr1 == 0 and wo1 == 0'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      uid: 1d9ef64e-242f-462c-a349-5db8dee82c44
    - text: 'Semester 2 enrollment/approval/credit/without-eval consistency: ''Curricular
        units 2nd sem (enrolled)'' (en2), ''Curricular units 2nd sem (approved)''
        (ap2), ''Curricular units 2nd sem (credited)'' (cr2) and ''Curricular units
        2nd sem (without evaluations)'' (wo2) are non-negative integers, ap2 <= en2,
        cr2 <= ap2, wo2 <= en2, and when en2 == 0 then ap2 == 0, cr2 == 0 and wo2
        == 0. Example actionable constraints:

        - isNonNegative([''en2'',''ap2'',''cr2'',''wo2''])

        - ap2 <= en2

        - cr2 <= ap2

        - wo2 <= en2

        - if en2 == 0 then ap2 == 0 and cr2 == 0 and wo2 == 0'
      sources:
      - start_line: 90
        end_line: 97
        file: ''
      uid: 75b38b4b-2d3a-4adb-b5fa-2c253dd90783
    - text: 'Approval vs enrollment statistical precondition (semester 1): ''Curricular
        units 1st sem (approved)'' (ap1) and ''... (enrolled)'' (en1) must have non-zero
        variance (std > 0) and meaningful positive relationship so that slope1 = (std(ap1)/std(en1))*corr(ap1,en1)
        is defined and useful. Actionable checks:

        - en1 and ap1 are not constant (variance > 0)

        - empirical correlation(ap1,en1) is positive and above a minimum threshold
        (e.g. > 0.2) to rely on linear estimate'
      sources:
      - start_line: 83
        end_line: 86
        file: ''
      uid: 6ec92089-1803-4d26-bc56-c40f148290f4
    - text: 'Approval vs enrollment statistical precondition (semester 2): ''ap2''
        and ''en2'' must have non-zero variance and a positive correlation so slope2/intercept2
        computation is valid. Actionable checks:

        - en2 and ap2 are not constant (variance > 0)

        - correlation(ap2,en2) > 0 (or above a small threshold) to ensure expected_ap2
        is meaningful'
      sources:
      - start_line: 99
        end_line: 102
        file: ''
      uid: ff7d73fd-97e0-4bc5-863c-13b45412da88
    - text: 'Aggregated approvals vs aggregated enrollments: total_approved = ap1
        + ap2 must be <= total_enrolled = en1 + en2 for each record (progress = total_approved
        / total_enrolled is only meaningful if approvals do not exceed enrollments).
        Actionable constraint:

        - (ap1 + ap2) <= (en1 + en2) for every row; non-negativity for totals.'
      sources:
      - start_line: 106
        end_line: 108
        file: ''
      uid: 08a09aae-31b9-4fd5-8994-8dd810455827
    - text: 'Grades numeric range and normalization: ''Curricular units 1st sem (grade)''
        (gr1) and ''Curricular units 2nd sem (grade)'' (gr2) should be numeric and
        lie within the expected 0..20 range (so that grade_norm1 = gr1/20 and grade_norm2
        = gr2/20 produce values in [0,1]). Also ensure completeness (or defined missing
        policy) when enrolled > 0. Actionable constraints:

        - gr1 and gr2 are numeric and 0 <= gr <= 20

        - if en1 > 0 then gr1 is present (similarly for en2 and gr2)'
      sources:
      - start_line: 76
        end_line: 78
        file: ''
      - start_line: 94
        end_line: 96
        file: ''
      uid: faa17093-0793-4c1e-ab41-dfc9496a406f
    - text: 'Macro variables must be numeric and have non-zero spread: ''GDP'', ''Unemployment
        rate'' and ''Inflation rate'' are numeric, largely complete, and none of mac_gdp,
        mac_unemp, mac_infl should be constant (std > 0) across the dataset because
        the code standardizes each (zg, zu, zi) dividing by std and then computes
        macro_stress = sigmoid(zu - zg + 0.3 * zi). Actionable checks:

        - numeric conversion of the three macro columns succeeds (no pervasive coercion
        to NaN)

        - std(mac_gdp), std(mac_unemp), std(mac_infl) > 0

        - completeness above a threshold'
      sources:
      - start_line: 45
        end_line: 52
        file: ''
      uid: 5dba8c9b-c38a-4d82-b6e6-6e317b6cc6fc
    - text: "Payment status logical consistency: 'Debtor' and 'Tuition fees up to\
        \ date' are binary indicators (0/1) and should be consistent with the derived\
        \ 'arrears' logic: arrears = (Debtor == 1) OR (Tuition fees up to date ==\
        \ 0). Actionable constraints:\n- Debtor \u2208 {0,1} and Tuition fees up to\
        \ date \u2208 {0,1}\n- completeness for these two columns\n- logical check:\
        \ arrears_flag == 1 iff (Debtor == 1 or Tuition == 0) (this can be validated\
        \ by recomputing and checking equality across rows)"
      sources:
      - start_line: 62
        end_line: 64
        file: ''
      uid: a3fb0fed-1f05-4f06-8ea9-2d8504a61b10
    - text: 'Enrollment zero implies zero academic counts across both semesters: when
        enrolled == 0 for a semester, the associated approved, credited and without-evaluation
        counts should be 0 for that semester. This prevents divisions by zero being
        masked by inconsistent counts and ensures pass_rate/noeval_ratio semantics
        are correct. Actionable constraints:

        - if en1 == 0 then ap1 == 0 and cr1 == 0 and wo1 == 0

        - if en2 == 0 then ap2 == 0 and cr2 == 0 and wo2 == 0'
