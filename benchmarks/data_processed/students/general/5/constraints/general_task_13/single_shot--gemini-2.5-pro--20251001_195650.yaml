constraints:
  Age at enrollment:
    code:
    - - .isPositive('`Age at enrollment`')
      - Valid
    assumptions: []
  Application order:
    code:
    - - '.hasCompliance(''share_of_allowed_order_is_sufficient'', "`Application order`
        IN (1, 2, 3, 4, 5, 6)", lambda x: x >= 0.95)'
      - Invalid
    - - '.hasCompliance(''share_of_first_choice_applicants_is_sufficient'', "`Application
        order` = 1", lambda x: x >= 0.60)'
      - Invalid
    - - .isComplete('`Application order`')
      - Valid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('`Curricular units 1st sem (enrolled)`')
      - Valid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isBetween('`Curricular units 1st sem (grade)`', 0, 20, inclusive=True)
      - Invalid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .isNonNegative('`Curricular units 2nd sem (approved)`')
      - Valid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .isBetween('`Curricular units 2nd sem (grade)`', 0, 20, inclusive=True)
      - Invalid
    assumptions: []
  Curricular units 2nd sem (without evaluations):
    code:
    - - '.hasCompliance(''share_of_students_with_no_evals_is_low'', "`Curricular units
        2nd sem (without evaluations)` > 0", lambda x: x <= 0.10)'
      - Invalid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - .isContainedIn('`Daytime/evening attendance\t`', [0, 1])
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', [0, 1])
      - Invalid
    assumptions: []
  GDP:
    code:
    - - .isComplete('GDP')
      - Valid
    - - .isContainedIn('GDP', [-4.06, -3.12, -1.7, -0.92, 0.32, 0.79, 1.74, 1.79,
        2.02, 3.51])
      - Invalid
    assumptions: []
  Inflation rate:
    code:
    - - .isContainedIn('Inflation rate', [-0.8, -0.3, 0.3, 0.5, 0.6, 1.4, 2.6, 2.8,
        3.7])
      - Invalid
    assumptions: []
  Scholarship holder:
    code:
    - - .isContainedIn('`Scholarship holder`', [0, 1])
      - Invalid
    assumptions: []
  Target:
    code:
    - - .isContainedIn('Target', ['Graduate', 'Dropout', 'Enrolled'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('`Tuition fees up to date`', [0, 1])
      - Invalid
    assumptions: []
  Unemployment rate:
    code:
    - - .isContainedIn('Unemployment rate', [7.6, 8.9, 9.4, 10.8, 11.1, 12.4, 12.7,
        13.9, 15.5, 16.2])
      - Invalid
    assumptions: []
