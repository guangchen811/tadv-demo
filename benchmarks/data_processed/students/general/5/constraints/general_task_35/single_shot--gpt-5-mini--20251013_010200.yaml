constraints:
  Admission grade:
    code:
    - - .satisfies('`Admission grade` >= 0 AND `Admission grade` <= 200', 'admission_grade_range')
      - Valid
    assumptions: []
  Age at enrollment:
    code:
    - - .satisfies('`Age at enrollment` >= 15 AND `Age at enrollment` <= 100', 'age_reasonable_range')
      - Valid
    assumptions: []
  Curricular units 1st sem (approved),Curricular units 1st sem (evaluations):
    code:
    - - .satisfies('`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (evaluations)`', 'c1_approved_le_evals')
      - Valid
    assumptions: []
  Curricular units 1st sem (enrolled),Curricular units 1st sem (evaluations),Curricular units 1st sem (without evaluations):
    code:
    - - .satisfies('`Curricular units 1st sem (enrolled)` >= `Curricular units 1st
        sem (evaluations)` + `Curricular units 1st sem (without evaluations)`', 'c1_enrolled_ge_evals_plus_without')
      - Invalid
    assumptions: []
  Curricular units 1st sem (evaluations):
    code:
    - - .isComplete('Curricular units 1st sem (evaluations)')
      - Valid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .satisfies('`Curricular units 1st sem (grade)` >= 0 AND `Curricular units
        1st sem (grade)` <= 20', 'c1_grade_0_20')
      - Valid
    assumptions: []
  Curricular units 2nd sem (approved),Curricular units 2nd sem (evaluations):
    code:
    - - .satisfies('`Curricular units 2nd sem (approved)` <= `Curricular units 2nd
        sem (evaluations)`', 'c2_approved_le_evals')
      - Valid
    assumptions: []
  Curricular units 2nd sem (enrolled),Curricular units 2nd sem (evaluations),Curricular units 2nd sem (without evaluations):
    code:
    - - .satisfies('`Curricular units 2nd sem (enrolled)` >= `Curricular units 2nd
        sem (evaluations)` + `Curricular units 2nd sem (without evaluations)`', 'c2_enrolled_ge_evals_plus_without')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (evaluations):
    code:
    - - .isComplete('Curricular units 2nd sem (evaluations)')
      - Valid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .satisfies('`Curricular units 2nd sem (grade)` >= 0 AND `Curricular units
        2nd sem (grade)` <= 20', 'c2_grade_0_20')
      - Valid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - .isContainedIn('Daytime/evening attendance\t', [0, 1])
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', [0, 1])
      - Invalid
    assumptions: []
  Target:
    code:
    - - .isComplete('Target')
      - Valid
    - - .isContainedIn('Target', ['Graduate', 'Dropout', 'Enrolled'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', [0, 1])
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
