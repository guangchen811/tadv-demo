    assumptions:
    - text: 'If ''Tuition fees up to date'' equals 0 (fees not current), then ''Debtor''
        must equal 1 for that record. This captures that any student not up to date
        on tuition is marked as a debtor. Deequ example: .satisfies(''CASE WHEN `Tuition
        fees up to date` = 0 THEN `Debtor` = 1 ELSE TRUE END'', ''not_paid_implies_debtor'')'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      uid: 115a7e94-bc02-44c5-8b91-8e843e55a16d
    - text: 'The state where ''Tuition fees up to date'' = 1 and ''Debtor'' = 1 should
        be rare (<= 2% of rows), as it indicates an inconsistent financial status
        (paid up-to-date yet marked debtor). Deequ example: .hasCompliance(''NOT(`Tuition
        fees up to date` = 1 AND `Debtor` = 1)'', _ >= 0.98)'
      sources:
