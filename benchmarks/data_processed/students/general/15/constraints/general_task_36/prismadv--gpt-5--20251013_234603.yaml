    - text: 'Enrollment splits into ''evaluations'' and ''without evaluations'' for
        each semester: (Curricular units 1st sem (enrolled) == Curricular units 1st
        sem (evaluations) + Curricular units 1st sem (without evaluations)) and (Curricular
        units 2nd sem (enrolled) == Curricular units 2nd sem (evaluations) + Curricular
        units 2nd sem (without evaluations)).'
      sources:
      - start_line: 17
        end_line: 21
        file: ''
      - start_line: 23
        end_line: 27
        file: ''
      - start_line: 40
        end_line: 43
        file: ''
      uid: 1f323a41-48fc-474e-839c-a1c2c1a58124
    - text: 'Across semesters, total approved units must not exceed total eligible
        units: (Curricular units 1st sem (approved) + Curricular units 2nd sem (approved))
        <= ((Curricular units 1st sem (enrolled) - Curricular units 1st sem (without
        evaluations)) + (Curricular units 2nd sem (enrolled) - Curricular units 2nd
        sem (without evaluations))). This ensures the overall pass_rate is in [0,1].'
      sources:
      - start_line: 46
        end_line: 48
        file: ''
      uid: 122773b7-d345-4766-87dd-58e51d6c6441
    - text: "Grades are on a 0\u201320 scale and must be present whenever there is\
        \ enrollment: If Curricular units 1st sem (enrolled) > 0 then 0 <= Curricular\
        \ units 1st sem (grade) <= 20; If Curricular units 2nd sem (enrolled) > 0\
        \ then 0 <= Curricular units 2nd sem (grade) <= 20. Additionally, when (Curricular\
        \ units 1st sem (enrolled) + Curricular units 2nd sem (enrolled)) > 0, the\
        \ weighted average ((c1_gr*c1_en + c2_gr*c2_en)/(c1_en + c2_en)) must lie\
        \ in [0,20]."
      sources:
      - start_line: 49
        end_line: 53
        file: ''
      uid: 628bb6cf-af8c-418c-8527-788ed3c1d5c7
    - text: 'Financial status consistency: a row marked ''Tuition fees up to date''
        = 1 should not simultaneously have ''Debtor'' = 1 (i.e., not (paid_up == 1
        and debtor == 1)).'
      sources:
      - start_line: 56
        end_line: 56
        file: ''
      - start_line: 95
        end_line: 96
        file: ''
      uid: 1d32408a-1a05-4806-947b-743d59ce04a1
  '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]':
    code: []
    assumptions:
    - text: '1) The count of ''Curricular units 1st sem (without evaluations)'' must
        be between 0 and the count of ''Curricular units 1st sem (enrolled)'' for
        every record (0 <= without_evaluations <= enrolled). This keeps the computed
        eligible1 = enrolled - without_evaluations non-negative. We could represent
        this as a Deequ constraint: .satisfies(''`Curricular units 1st sem (without
        evaluations)` >= 0 AND `Curricular units 1st sem (without evaluations)` <=
        `Curricular units 1st sem (enrolled)`'', ''woeval_within_enrolled_1st'').'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      uid: 11b65a40-e605-4620-93ad-8d4f7188b7e6
    - text: '2) If ''Curricular units 1st sem (enrolled)'' is 0, then ''Curricular
        units 1st sem (without evaluations)'' must also be 0 (no unenrolled students
        can be counted as ''without evaluations''). Deequ: .satisfies(''(`Curricular
        units 1st sem (enrolled)` != 0) OR (`Curricular units 1st sem (without evaluations)`
        = 0)'', ''no_woeval_without_enrollment_1st'').'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      uid: d69878d1-82a0-4147-9c7a-ac70ec94420c
    - text: '3) The number of approved curricular units in 1st semester cannot exceed
        the number of eligible units (enrolled minus without evaluations) and must
        be non-negative. Deequ: .satisfies(''`Curricular units 1st sem (approved)`
        >= 0 AND `Curricular units 1st sem (approved)` <= (`Curricular units 1st sem
        (enrolled)` - `Curricular units 1st sem (without evaluations)`)'', ''approved_le_eligible_1st'').'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      uid: 2b6ba18c-45f5-40a4-9c80-85e69e81ca66
    - text: '4) When no one is eligible for evaluation in 1st semester (i.e., ''Curricular
        units 1st sem (enrolled)'' equals ''Curricular units 1st sem (without evaluations)''),
        then the number of approved units must be 0. Deequ: .satisfies(''(`Curricular
        units 1st sem (enrolled)` != `Curricular units 1st sem (without evaluations)`)
        OR (`Curricular units 1st sem (approved)` = 0)'', ''no_approvals_when_no_eligible_1st'').'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      uid: 6c92bf93-ee70-4a96-9d4b-5927ecac4583
    - text: '5) Both ''Curricular units 1st sem (enrolled)'' and ''Curricular units
        1st sem (without evaluations)'' must be present (no nulls), numeric, and non-negative
        counts, since they are used in arithmetic and as weights. Deequ: .isComplete(''Curricular
        units 1st sem (enrolled)''), .isComplete(''Curricular units 1st sem (without
        evaluations)''), .satisfies(''`Curricular units 1st sem (enrolled)` >= 0 AND
        `Curricular units 1st sem (without evaluations)` >= 0'', ''nonneg_enrolled_woeval_1st'').'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 49
        end_line: 53
        file: ''
      uid: eac3c2d0-229c-49db-865a-5e2193f1cd97
  ? '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (enrolled)","Curricular
    units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: "For each record, 'Curricular units 2nd sem (without evaluations)' must\
        \ be less than or equal to 'Curricular units 2nd sem (enrolled)' so that eligible2\
        \ = enrolled \u2212 without_evaluations is non-negative. Deequ example: .isLessThanOrEqualTo(\"\
        Curricular units 2nd sem (without evaluations)\", \"Curricular units 2nd sem\
        \ (enrolled)\")"
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 4479c973-586b-4331-83f2-fbf12209feec
    - text: "For each record, 'Curricular units 2nd sem (approved)' must not exceed\
        \ the number of eligible units, i.e., 'Curricular units 2nd sem (approved)'\
        \ \u2264 ('Curricular units 2nd sem (enrolled)' \u2212 'Curricular units 2nd\
        \ sem (without evaluations)'). This keeps pass_rate2 within [0,1] and avoids\
        \ overstating approvals. Deequ example: .satisfies(\"`Curricular units 2nd\
        \ sem (approved)` <= (`Curricular units 2nd sem (enrolled)` - `Curricular\
        \ units 2nd sem (without evaluations)`)\", \"approved_leq_eligible_2ndsem\"\
        )"
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 97d1b764-57e9-48f0-afb5-c224600adfdb
    - text: "If there are no eligible units in 2nd semester (i.e., 'Curricular units\
        \ 2nd sem (enrolled)' \u2212 'Curricular units 2nd sem (without evaluations)'\
        \ = 0), then 'Curricular units 2nd sem (approved)' must be 0. Deequ example:\
        \ .satisfies(\"((`Curricular units 2nd sem (enrolled)` - `Curricular units\
        \ 2nd sem (without evaluations)`) > 0) OR (`Curricular units 2nd sem (approved)`\
        \ = 0)\", \"no_approvals_when_no_evaluations_2ndsem\")"
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      uid: 02c42bf4-e4c2-444a-8751-8c07c4756077
    - text: "Across semesters, per record, total approved units must not exceed total\
        \ eligible units: ('Curricular units 1st sem (approved)' + 'Curricular units\
        \ 2nd sem (approved)') \u2264 (('Curricular units 1st sem (enrolled)' \u2212\
        \ 'Curricular units 1st sem (without evaluations)') + ('Curricular units 2nd\
        \ sem (enrolled)' \u2212 'Curricular units 2nd sem (without evaluations)')).\
        \ Deequ example: .satisfies(\"(`Curricular units 1st sem (approved)` + `Curricular\
        \ units 2nd sem (approved)`) <= ((`Curricular units 1st sem (enrolled)` -\
        \ `Curricular units 1st sem (without evaluations)`) + (`Curricular units 2nd\
        \ sem (enrolled)` - `Curricular units 2nd sem (without evaluations)`))\",\
        \ \"approved_total_leq_eligible_total\")"
      sources:
      - start_line: 40
        end_line: 44
        file: ''
      - start_line: 46
        end_line: 48
        file: ''
      uid: 79af87a1-bcf2-42f8-af68-14707a94caf5
    - text: 'The 2nd-semester enrollment, without-evaluations, and approved columns
        must be jointly present and numeric for each record (no nulls across the trio),
        since they are used together in arithmetic (differences and ratios) without
        null handling. Deequ example: .satisfies("`Curricular units 2nd sem (enrolled)`
        IS NOT NULL AND `Curricular units 2nd sem (without evaluations)` IS NOT NULL
        AND `Curricular units 2nd sem (approved)` IS NOT NULL", "non_null_triplet_2ndsem")'
      sources:
      - start_line: 35
        end_line: 38
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 2b3a9592-23e5-4331-b2bb-d3745e4d32e9
  '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (evaluations)"]':
    code: []
    assumptions:
    - text: '2nd-semester approvals must not exceed 2nd-semester evaluations; if evaluations
        = 0 then approvals must be 0. Suggested Deequ constraints: satisfies("`Curricular
        units 2nd sem (approved)` <= `Curricular units 2nd sem (evaluations)`") and
        satisfies("(`Curricular units 2nd sem (evaluations)` > 0) OR (`Curricular
        units 2nd sem (approved)` = 0)").'
      sources:
      - start_line: 24
        end_line: 25
        file: ''
      - start_line: 44
        end_line: 44
        file: ''
      uid: 72e6c554-013c-4a11-a15f-6f4b2b7ec3a7
    - text: 'The number of 2nd-semester evaluations should equal the number considered
        eligible by the code: `Curricular units 2nd sem (evaluations)` = `Curricular
        units 2nd sem (enrolled)` - `Curricular units 2nd sem (without evaluations)`.
        This aligns the pass_rate2 denominator with the actual evaluations. Suggested
        Deequ constraint: satisfies("`Curricular units 2nd sem (evaluations)` = (`Curricular
        units 2nd sem (enrolled)` - `Curricular units 2nd sem (without evaluations)`)
        ").'
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 603927a3-873b-46eb-82a5-3b95374e69e6
    - text: '2nd-semester approvals cannot exceed the eligible count used as the denominator:
        `Curricular units 2nd sem (approved)` <= (`Curricular units 2nd sem (enrolled)`
        - `Curricular units 2nd sem (without evaluations)`). This keeps pass_rate2
        within [0, 1]. Suggested Deequ constraint: satisfies("`Curricular units 2nd
        sem (approved)` <= (`Curricular units 2nd sem (enrolled)` - `Curricular units
        2nd sem (without evaluations)`) ").'
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 6a4dd6e3-8dec-4787-8791-92bc6b3cbc9d
    - text: 'Across semesters, total approvals must not exceed total eligible evaluations:
        (`Curricular units 1st sem (approved)` + `Curricular units 2nd sem (approved)`)
        <= ((`Curricular units 1st sem (enrolled)` - `Curricular units 1st sem (without
        evaluations)`) + (`Curricular units 2nd sem (enrolled)` - `Curricular units
        2nd sem (without evaluations)`)). This ensures pass_rate is in [0, 1] before
        it is used in the risk calculation. Suggested Deequ constraint: satisfies("(`Curricular
        units 1st sem (approved)` + `Curricular units 2nd sem (approved)`) <= ((`Curricular
        units 1st sem (enrolled)` - `Curricular units 1st sem (without evaluations)`)
        + (`Curricular units 2nd sem (enrolled)` - `Curricular units 2nd sem (without
        evaluations)`)) ").'
      sources:
      - start_line: 40
        end_line: 48
        file: ''
      uid: b3e15e20-020b-4ea0-bd5d-0f6639b76583
  '["Curricular units 2nd sem (enrolled)","Curricular units 2nd sem (evaluations)"]':
    code: []
    assumptions:
    - text: 'For the 2nd semester, the number of evaluated curricular units equals
        the number of enrolled units minus the number without evaluation (row-wise):
        `Curricular units 2nd sem (evaluations)` = `Curricular units 2nd sem (enrolled)`
        - `Curricular units 2nd sem (without evaluations)`. This aligns with the use
        of `eligible2` as the evaluation count in pass-rate calculation. Deequ example:
        .satisfies(''`Curricular units 2nd sem (evaluations)` = `Curricular units
        2nd sem (enrolled)` - `Curricular units 2nd sem (without evaluations)`'',
        ''>= 1.0'')'
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 98c78e1f-ce7c-49da-8979-1698d680b89b
    - text: '2nd-semester counts are coherent and bounded: 0 <= `Curricular units
        2nd sem (approved)` <= `Curricular units 2nd sem (evaluations)` <= `Curricular
        units 2nd sem (enrolled)`. This ensures pass rates are well-defined and <=
        1.0. Deequ example: .satisfies(''`Curricular units 2nd sem (approved)` >=
        0 and `Curricular units 2nd sem (approved)` <= `Curricular units 2nd sem (evaluations)`
        and `Curricular units 2nd sem (evaluations)` >= 0 and `Curricular units 2nd
        sem (evaluations)` <= `Curricular units 2nd sem (enrolled)`'', ''>= 1.0'')'
      sources:
      - start_line: 23
        end_line: 25
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 7bc9e312-7502-407d-88b4-8cd7206ff88f
    - text: 'No-evaluation cannot exceed enrollment in 2nd semester (eligibility is
        non-negative): `Curricular units 2nd sem (without evaluations)` <= `Curricular
        units 2nd sem (enrolled)`. Deequ example: .satisfies(''`Curricular units 2nd
        sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)` and `Curricular
        units 2nd sem (without evaluations)` >= 0'', ''>= 1.0'')'
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      uid: 675bba7f-5a34-44dd-8fd5-9d2ebc531aff
    - text: 'When no one is enrolled in 2nd semester, there should be no evaluations,
        approvals, or units without evaluation for that semester: if `Curricular units
        2nd sem (enrolled)` = 0 then `Curricular units 2nd sem (evaluations)` = 0
        and `Curricular units 2nd sem (approved)` = 0 and `Curricular units 2nd sem
        (without evaluations)` = 0. Deequ example: .satisfies(''case when `Curricular
        units 2nd sem (enrolled)` = 0 then `Curricular units 2nd sem (evaluations)`
        = 0 and `Curricular units 2nd sem (approved)` = 0 and `Curricular units 2nd
        sem (without evaluations)` = 0 else true end'', ''>= 1.0'')'
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 5ae49b1c-ad90-4399-8035-c7354601178a
    - text: 'If 2nd-semester enrollment contributes to the weighted average, the 2nd-semester
        grade must be present and within [0, 20]: if `Curricular units 2nd sem (enrolled)`
        > 0 then `Curricular units 2nd sem (grade)` is not null and between 0 and
        20. Deequ example: .satisfies(''case when `Curricular units 2nd sem (enrolled)`
        > 0 then `Curricular units 2nd sem (grade)` is not null and `Curricular units
        2nd sem (grade)` >= 0 and `Curricular units 2nd sem (grade)` <= 20 else true
        end'', ''>= 1.0'')'
      sources:
      - start_line: 49
        end_line: 53
        file: ''
      uid: 7d4d28f1-f715-4189-a2d5-d95a17edd603
  ? '["Curricular units 2nd sem (enrolled)","Curricular units 2nd sem (evaluations)","Curricular
    units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: "For each record, 'Curricular units 2nd sem (without evaluations)' must\
        \ be less than or equal to 'Curricular units 2nd sem (enrolled)' so that eligible2\
        \ = enrolled \u2212 without evaluations is never negative. This can be represented\
        \ as a Deequ constraint: .satisfies('`Curricular units 2nd sem (without evaluations)`\
        \ <= `Curricular units 2nd sem (enrolled)`', 'c2_wo_le_en')."
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      uid: 3968bd07-f8a0-4040-b6fb-4801480796af
    - text: "The counts should balance in 2nd semester: 'Curricular units 2nd sem\
        \ (evaluations)' + 'Curricular units 2nd sem (without evaluations)' equals\
        \ 'Curricular units 2nd sem (enrolled)'. This aligns with the code using (enrolled\
        \ \u2212 without evaluations) as the evaluated count. Deequ example: .satisfies('`Curricular\
        \ units 2nd sem (evaluations)` + `Curricular units 2nd sem (without evaluations)`\
        \ = `Curricular units 2nd sem (enrolled)`', 'c2_eval_balance')."
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: a6fc506f-49db-4078-97ac-1202c8b33c1b
    - text: "2nd-semester approved units must not exceed the number evaluated; equivalently,\
        \ 'Curricular units 2nd sem (approved)' <= 'Curricular units 2nd sem (evaluations)'\
        \ and also <= ('Curricular units 2nd sem (enrolled)' \u2212 'Curricular units\
        \ 2nd sem (without evaluations)'). This ensures pass_rate2 is in [0, 1]. Deequ\
        \ examples: .satisfies('`Curricular units 2nd sem (approved)` <= `Curricular\
        \ units 2nd sem (evaluations)`', 'c2_ap_le_ev') and .satisfies('`Curricular\
        \ units 2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)` - `Curricular\
        \ units 2nd sem (without evaluations)`', 'c2_ap_le_eligible')."
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 44
        end_line: 44
        file: ''
      uid: a9b23ed8-bc9f-41df-8ac6-31c15e7600bd
  '["Curricular units 2nd sem (enrolled)","Curricular units 2nd sem (without evaluations)"]':
    code: []
    assumptions:
    - text: 'For every record, ''Curricular units 2nd sem (without evaluations)''
        must be less than or equal to ''Curricular units 2nd sem (enrolled)'' (i.e.,
        0 <= without_evaluations <= enrolled). This prevents negative eligibility
        when computing eligible2 = enrolled - without_evaluations.

        Deequ example: Check(...).satisfies(''`Curricular units 2nd sem (without evaluations)`
        <= `Curricular units 2nd sem (enrolled)`'', ''c2_wo_le_c2_en'')'
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      uid: d7ca20ad-090b-4010-b6f3-9b46375fa472
    - text: 'If ''Curricular units 2nd sem (enrolled)'' = 0, then ''Curricular units
        2nd sem (without evaluations)'' must be 0 (no unit can be without evaluation
        if none are enrolled). Equivalent logical form: (enrolled <> 0) OR (without_evaluations
        = 0).

        Deequ example: Check(...).satisfies(''(`Curricular units 2nd sem (enrolled)`
        <> 0) OR (`Curricular units 2nd sem (without evaluations)` = 0)'', ''c2_zero_en_implies_zero_wo'')'
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      uid: 3d1623e5-e3f6-426e-afeb-166e30eb956c
    - text: '''Curricular units 2nd sem (approved)'' must not exceed the number of
        eligible units in the 2nd semester, where eligible = enrolled - without_evaluations.
        Formally: 0 <= approved <= (enrolled - without_evaluations). This keeps pass
        rates within [0,1].

        Deequ example: Check(...).satisfies(''`Curricular units 2nd sem (approved)`
        <= (`Curricular units 2nd sem (enrolled)` - `Curricular units 2nd sem (without
        evaluations)`)'', ''c2_ap_le_eligible2'')'
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 61bbd260-a7c7-4ddc-91a6-fed496c32257
    - text: 'Both ''Curricular units 2nd sem (enrolled)'' and ''Curricular units 2nd
        sem (without evaluations)'' must be present and numeric-convertible in every
        row so that arithmetic on these columns does not produce NaNs after coercion.
        Practically: both columns are non-null post-read.

        Deequ example: Check(...).satisfies(''`Curricular units 2nd sem (enrolled)`
        IS NOT NULL AND `Curricular units 2nd sem (without evaluations)` IS NOT NULL'',
        ''c2_pair_non_null'')'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 1fcab923-9388-4f19-83fa-dd406d09901e
