        file: ''
      uid: 81d9a150-8606-474a-b0cd-b90293df5645
    - text: 'In the output dataset, ''financial_flag'' must be 1 if and only if (''Tuition
        fees up to date'' = 0 OR ''Debtor'' = 1); otherwise it must be 0. This ensures
        the derived flag faithfully represents the intended OR logic over the two
        input columns. Deequ (on the output) example: .satisfies(''`financial_flag`
        = CASE WHEN (`Tuition fees up to date` = 0 OR `Debtor` = 1) THEN 1 ELSE 0
        END'', ''financial_flag_consistency'')'
