  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)","Curricular
    units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'The three 1st-semester unit count columns must be parseable numeric (integral)
        and complete for every row: ''Curricular units 1st sem (enrolled)'', ''Curricular
        units 1st sem (without evaluations)'', and ''Curricular units 1st sem (approved)''.
        Suggested constraints: .isComplete(...) on each, plus .hasDataType(..., ConstrainableDataTypes.Integral,
        Complete) on each.'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      uid: 3317f02d-0e58-4618-92b0-bca021afaa2f
    - text: "'Curricular units 1st sem (without evaluations)' must be less than or\
        \ equal to 'Curricular units 1st sem (enrolled)' for every row (eligible1\
        \ = enrolled \u2212 without_evaluations cannot be negative). Suggested Deequ:\
        \ .satisfies(\"`Curricular units 1st sem (enrolled)` >= `Curricular units\
        \ 1st sem (without evaluations)`\", \"woEval_le_enrolled\") and .satisfies(\"\
        (`Curricular units 1st sem (enrolled)` - `Curricular units 1st sem (without\
        \ evaluations)`) >= 0\", \"eligible_nonneg\")."
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      uid: 9af268be-f158-40bf-95c8-8347930d3856
    - text: "'Curricular units 1st sem (evaluations)' should equal the computed eligible\
        \ count: 'Curricular units 1st sem (enrolled)' \u2212 'Curricular units 1st\
        \ sem (without evaluations)'. Suggested Deequ: .satisfies(\"`Curricular units\
        \ 1st sem (evaluations)` = (`Curricular units 1st sem (enrolled)` - `Curricular\
        \ units 1st sem (without evaluations)`) AND `Curricular units 1st sem (evaluations)`\
        \ >= 0\", \"eval_equals_eligible\")."
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 40
        end_line: 41
        file: ''
      uid: 244f1c17-d22f-43d1-96d3-fbf27e32d268
    - text: "'Curricular units 1st sem (approved)' must not exceed the number eligible\
        \ to be evaluated and must be non-negative: 'Curricular units 1st sem (approved)'\
        \ \u2264 'Curricular units 1st sem (enrolled)' \u2212 'Curricular units 1st\
        \ sem (without evaluations)' and 'Curricular units 1st sem (approved)' \u2265\
        \ 0. This ensures the per-semester pass rate stays within [0, 1]. Suggested\
        \ Deequ: .satisfies(\"`Curricular units 1st sem (approved)` <= (`Curricular\
        \ units 1st sem (enrolled)` - `Curricular units 1st sem (without evaluations)`)\
        \ AND `Curricular units 1st sem (approved)` >= 0\", \"approved_le_eligible\"\
        )."
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      uid: f76f0142-e2a2-4ebc-af02-fb39b37e8bf0
    - text: "If there are no eligible students in 1st semester (i.e., 'Curricular\
        \ units 1st sem (enrolled)' \u2212 'Curricular units 1st sem (without evaluations)'\
        \ = 0), then 'Curricular units 1st sem (approved)' must be 0. Suggested Deequ:\
        \ .satisfies(\"CASE WHEN (`Curricular units 1st sem (enrolled)` - `Curricular\
        \ units 1st sem (without evaluations)`) = 0 THEN `Curricular units 1st sem\
        \ (approved)` = 0 ELSE true END\", \"noEligible_then_noApproved\")."
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      uid: a6adbfbb-c41d-45bd-abce-c2893ee2d39d
  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)","Curricular
    units 1st sem (without evaluations)","Curricular units 2nd sem (approved)","Curricular
    units 2nd sem (enrolled)","Curricular units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For each record, ''Curricular units 1st sem (without evaluations)'' must
        be between 0 and ''Curricular units 1st sem (enrolled)'' inclusive, and ''Curricular
        units 2nd sem (without evaluations)'' must be between 0 and ''Curricular units
        2nd sem (enrolled)'' inclusive. We could represent this as a Deequ constraint
        like: .satisfies("`Curricular units 1st sem (without evaluations)` >= 0 AND
        `Curricular units 1st sem (without evaluations)` <= `Curricular units 1st
        sem (enrolled)` AND `Curricular units 2nd sem (without evaluations)` >= 0
        AND `Curricular units 2nd sem (without evaluations)` <= `Curricular units
        2nd sem (enrolled)`", "wo_within_enrolled_both_semesters")'
      sources:
      - start_line: 40
        end_line: 44
        file: ''
      uid: 611caec1-39bd-4b10-843d-1bec31e270df
    - text: 'Approved counts cannot exceed the number of eligible (evaluated) curricular
        units in each semester: ''Curricular units 1st sem (approved)'' <= ''Curricular
        units 1st sem (enrolled)'' - ''Curricular units 1st sem (without evaluations)''
        and ''Curricular units 2nd sem (approved)'' <= ''Curricular units 2nd sem
        (enrolled)'' - ''Curricular units 2nd sem (without evaluations)''. Also, approved
        counts must be >= 0. Deequ example: .satisfies("`Curricular units 1st sem
        (approved)` >= 0 AND `Curricular units 1st sem (approved)` <= (`Curricular
        units 1st sem (enrolled)` - `Curricular units 1st sem (without evaluations)`)
        AND `Curricular units 2nd sem (approved)` >= 0 AND `Curricular units 2nd sem
        (approved)` <= (`Curricular units 2nd sem (enrolled)` - `Curricular units
        2nd sem (without evaluations)`)", "approved_within_eligible_each_semester")'
      sources:
      - start_line: 40
        end_line: 44
        file: ''
      uid: c1e25460-b370-430d-a9d3-1e454edc6717
    - text: 'Across semesters, total approved must not exceed total eligible: (''Curricular
        units 1st sem (approved)'' + ''Curricular units 2nd sem (approved)'') <= ((''Curricular
        units 1st sem (enrolled)'' - ''Curricular units 1st sem (without evaluations)'')
        + (''Curricular units 2nd sem (enrolled)'' - ''Curricular units 2nd sem (without
        evaluations)'')). This ensures the overall pass_rate is within [0, 1]. Deequ
        example: .satisfies("(`Curricular units 1st sem (approved)` + `Curricular
        units 2nd sem (approved)`) <= ((`Curricular units 1st sem (enrolled)` - `Curricular
        units 1st sem (without evaluations)`) + (`Curricular units 2nd sem (enrolled)`
        - `Curricular units 2nd sem (without evaluations)`))", "approved_total_le_eligible_total")'
      sources:
      - start_line: 46
        end_line: 48
        file: ''
      uid: 3f02cb3d-bac0-467b-b065-ac0f03f5377a
    - text: 'Zero enrollment in a semester implies zero ''without evaluations'' and
        zero ''approved'' for that semester. Formally: if ''Curricular units 1st sem
        (enrolled)'' = 0 then ''Curricular units 1st sem (without evaluations)'' =
        0 and ''Curricular units 1st sem (approved)'' = 0; and if ''Curricular units
        2nd sem (enrolled)'' = 0 then ''Curricular units 2nd sem (without evaluations)''
        = 0 and ''Curricular units 2nd sem (approved)'' = 0. Deequ example: .satisfies("CASE
        WHEN `Curricular units 1st sem (enrolled)` = 0 THEN (`Curricular units 1st
        sem (without evaluations)` = 0 AND `Curricular units 1st sem (approved)` =
        0) ELSE true END", "sem1_zero_enrollment_implies_zeros").satisfies("CASE WHEN
        `Curricular units 2nd sem (enrolled)` = 0 THEN (`Curricular units 2nd sem
        (without evaluations)` = 0 AND `Curricular units 2nd sem (approved)` = 0)
        ELSE true END", "sem2_zero_enrollment_implies_zeros")'
      sources:
      - start_line: 40
        end_line: 44
        file: ''
      uid: 10aa6f5c-09cc-49fc-90ab-be0383c48aff
    - text: 'Approvals imply prior enrollment in the same semester: if ''Curricular
        units 1st sem (approved)'' > 0 then ''Curricular units 1st sem (enrolled)''
        > 0; and if ''Curricular units 2nd sem (approved)'' > 0 then ''Curricular
        units 2nd sem (enrolled)'' > 0. Deequ example: .satisfies("CASE WHEN `Curricular
        units 1st sem (approved)` > 0 THEN `Curricular units 1st sem (enrolled)` >
        0 ELSE true END", "sem1_approvals_imply_enrollment").satisfies("CASE WHEN
        `Curricular units 2nd sem (approved)` > 0 THEN `Curricular units 2nd sem (enrolled)`
        > 0 ELSE true END", "sem2_approvals_imply_enrollment")'
      sources:
      - start_line: 40
        end_line: 44
        file: ''
      uid: 4522aa61-506b-449d-a72e-a8fc42b4637e
