        end_line: 66
        file: ''
      - start_line: 86
        end_line: 93
        file: ''
      uid: 2f06aba9-227b-40a5-a11f-de5f9b82e723
    - text: 'Per-row ordering and non-negativity: 0 <= ''Curricular units 1st sem
        (approved)'' <= ''Curricular units 1st sem (evaluations)'' <= ''Curricular
        units 1st sem (enrolled)''.

        This ensures approved cannot exceed evaluated units, and evaluated cannot
        exceed enrolled. Actionable constraints:

        .satisfies("`Curricular units 1st sem (approved)` >= 0", "s1_approved_non_negative")

        .satisfies("`Curricular units 1st sem (evaluations)` >= 0", "s1_evals_non_negative")

        .satisfies("`Curricular units 1st sem (enrolled)` >= 0", "s1_enrolled_non_negative")

        .satisfies("`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (evaluations)`", "approved_le_evals")

        .satisfies("`Curricular units 1st sem (evaluations)` <= `Curricular units
        1st sem (enrolled)`", "evals_le_enrolled")'
      sources:
      - start_line: 63
        end_line: 66
        file: ''
      - start_line: 86
        end_line: 96
        file: ''
      uid: 32c70a20-eaa1-4b99-bd8a-5571856682e9
    - text: 'Zero-enrollment consistency: when ''Curricular units 1st sem (enrolled)''
        == 0 then all related counts should be zero: ''Curricular units 1st sem (evaluations)''
        == 0, ''Curricular units 1st sem (without evaluations)'' == 0, and ''Curricular
        units 1st sem (approved)'' == 0.

        This prevents meaningless ratios computed by safe_divide and ensures feature
        semantics. Actionable constraint:

        .satisfies("`Curricular units 1st sem (enrolled)` == 0 implies (`Curricular
        units 1st sem (evaluations)` == 0 AND `Curricular units 1st sem (without evaluations)`
        == 0 AND `Curricular units 1st sem (approved)` == 0)", "zero_enrollment_implies_zero_components")'
      sources:
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 63
        end_line: 66
        file: ''
      uid: cb14369e-684a-444e-934e-41e3ae287b5c
    - text: 'Per-row ratio bounds: for rows with ''Curricular units 1st sem (enrolled)''
        > 0, the ratios (''approved''/''enrolled''), (''evaluations''/''enrolled''),
        and (''without evaluations''/''enrolled'') must be within [0, 1], and the
        computed engagement 1 - (''without evaluations''/''enrolled'') must also fall
        into [0, 1].

        Actionable constraints:

        .satisfies("(`Curricular units 1st sem (approved)` / `Curricular units 1st
        sem (enrolled)`) >= 0 AND (`Curricular units 1st sem (approved)` / `Curricular
        units 1st sem (enrolled)`) <= 1", "approved_ratio_between_0_and_1")

        .satisfies("(`Curricular units 1st sem (evaluations)` / `Curricular units
        1st sem (enrolled)`) BETWEEN 0 AND 1", "evals_ratio_between_0_and_1")

        .satisfies("(`Curricular units 1st sem (without evaluations)` / `Curricular
        units 1st sem (enrolled)`) BETWEEN 0 AND 1", "noeval_ratio_between_0_and_1")

        .satisfies("(1 - (`Curricular units 1st sem (without evaluations)` / `Curricular
        units 1st sem (enrolled)`)) BETWEEN 0 AND 1", "engagement_between_0_and_1")'
      sources:
      - start_line: 55
        end_line: 66
        file: ''
      - start_line: 86
        end_line: 93
        file: ''
      uid: b7ad916f-2750-493b-a505-489dd8e593ff
