    - text: 'Values in ''Curricular units 1st sem (enrolled)'' are expected to be
        numeric whole counts (integral values). The column is used as a denominator
        in arithmetic operations and should not contain fractional values.

        Deequ-like constraint example:

        .satisfies(''CASE WHEN `Curricular units 1st sem (enrolled)` = CAST(`Curricular
        units 1st sem (enrolled)` AS INT) THEN 1 ELSE 0 END'', ''Enrolled is integer'',
        lambda x: x == 1)'
      sources:
      - start_line: 39
        end_line: 39
        file: ''
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 63
        end_line: 65
        file: ''
      uid: 1ce02ec5-f1fd-41bc-b964-a69ebc4d5c04
    - text: 'The ''Curricular units 1st sem (enrolled)'' values must be non-negative
        (>= 0). It represents a count and is used with a check den > 0 in the safe_divide
        helper, so negative denominators would be invalid/unexpected.

        Deequ-like constraint example:

        .satisfies(''CASE WHEN `Curricular units 1st sem (enrolled)` >= 0 THEN 1 ELSE
        0 END'', ''Enrolled non-negative'', lambda x: x == 1)'
      sources:
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 63
        end_line: 65
        file: ''
      uid: 8c72e17d-f2fc-41ec-af2c-f8ac406538e8
    - text: 'For the computed rates to be meaningful, the semester-level numerators
        used with this column should not exceed it. Concretely: ''Curricular units
        1st sem (approved)'', ''Curricular units 1st sem (without evaluations)'',
        and ''Curricular units 1st sem (evaluations)'' should each be <= ''Curricular
        units 1st sem (enrolled)'' on a per-row basis (and also be >= 0).

        Deequ-like constraints examples:

        .satisfies(''CASE WHEN `Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (enrolled)` THEN 1 ELSE 0 END'', ''Approved <= Enrolled'', lambda
        x: x == 1)

        .satisfies(''CASE WHEN `Curricular units 1st sem (without evaluations)` <=
        `Curricular units 1st sem (enrolled)` THEN 1 ELSE 0 END'', ''No-eval <= Enrolled'',
        lambda x: x == 1)

        .satisfies(''CASE WHEN `Curricular units 1st sem (evaluations)` <= `Curricular
        units 1st sem (enrolled)` THEN 1 ELSE 0 END'', ''Evals <= Enrolled'', lambda
        x: x == 1)'
      sources:
      - start_line: 63
        end_line: 65
        file: ''
      uid: 52b718e0-048e-48f7-adbd-4129667f3603
    - text: 'Not all rows should have enrolled == 0. The safe_divide helper returns
        0 when the denominator is <= 0, which would collapse pass rate / engagement
        / eval load features to 0 if every enrolled value is zero. At least some rows
        must have enrolled > 0 so the ratios are computable for a subset of the dataset.

        Deequ-like constraint example:

        .satisfies(''CASE WHEN `Curricular units 1st sem (enrolled)` > 0 THEN 1 ELSE
        0 END'', ''Some positive enrolled'', lambda x: x > 0)'
