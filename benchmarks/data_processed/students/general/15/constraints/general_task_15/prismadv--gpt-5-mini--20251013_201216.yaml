    assumptions:
    - text: 'The ''Curricular units 1st sem (enrolled)'' column must contain no NULL
        values. The code reads the csv and then uses this column directly to compute
        ratios (division), so missing values in the input would break or change the
        intended feature calculations.

        We could represent this assumption as a Deequ/Greatexpressions-style constraint
        like this:

