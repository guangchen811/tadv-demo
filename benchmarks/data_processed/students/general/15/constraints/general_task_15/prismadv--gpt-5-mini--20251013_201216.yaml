    - text: 'The scaled grades and their weighted average (''grade_scaled'' = Admission
        grade / 200, ''prevq_scaled'' = Previous qualification (grade) / 200, ''grade_consensus''
        = 0.6*grade_scaled + 0.4*prevq_scaled) must fall in [0.0, 1.0]. Enforceable
        constraints after feature construction: .isNonNegative("grade_scaled") ; .isLessThanOrEqualTo("grade_scaled",
