    - text: 'None of the three macroeconomic columns should be constant across the
        dataset (each must have >1 distinct value). StandardScaler divides by standard
        deviation; zero variance would lead to invalid scaled features. Actionable
        check: distinctness or variance threshold per column (e.g., countDistinct(''Unemployment
        rate'') > 1, etc.).'
