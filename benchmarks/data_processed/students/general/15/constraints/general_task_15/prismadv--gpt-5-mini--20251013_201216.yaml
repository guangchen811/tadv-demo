        end_line: 66
        file: ''
      uid: 31c21f68-f37c-4ae4-92fb-0e200f9c2353
  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)","Curricular
    units 1st sem (evaluations)","Curricular units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For every row, ''Curricular units 1st sem (evaluations)'' + ''Curricular
        units 1st sem (without evaluations)'' should equal ''Curricular units 1st
        sem (enrolled)''.

        This enforces that enrolled units are partitioned into evaluated and non-evaluated
        units. Actionable constraint examples (Deequ-like):

        .satisfies("`Curricular units 1st sem (evaluations)` + `Curricular units 1st
        sem (without evaluations)` == `Curricular units 1st sem (enrolled)`", "evals_plus_noeval_equals_enrolled")'
      sources:
