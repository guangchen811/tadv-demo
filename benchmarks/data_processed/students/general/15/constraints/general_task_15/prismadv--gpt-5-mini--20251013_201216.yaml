    - text: 'Each of the three columns should lie within expected/observed numeric
        ranges to catch data corruption before scaling/modeling: ''Unemployment rate''
        in [7.6, 16.2], ''Inflation rate'' in [-0.8, 3.7], and ''GDP'' in [-4.06,
        3.51]. Actionable constraints: per-column range checks (e.g., .isContainedInRange(''Unemployment
        rate'', 7.6, 16.2), etc.).'
