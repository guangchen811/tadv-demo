        end_line: 66
        file: ''
      uid: 5ddfc17e-b543-4eeb-a619-d85d441782a4
    - text: "If 'Curricular units 1st sem (enrolled)' is zero, then 'Curricular units\
        \ 1st sem (approved)' must also be zero. This prevents spurious non-zero numerators\
        \ when no students were enrolled and matches the semantic expectation used\
        \ by safe_divide. Actionable constraint (Deequ-like): .satisfies('(`Curricular\
        \ units 1st sem (enrolled)` = 0) implies (`Curricular units 1st sem (approved)`\
        \ = 0)', 'if_enrolled_zero_then_approved_zero') \u2014 equivalently .satisfies('NOT\
        \ (`Curricular units 1st sem (enrolled)` = 0) OR (`Curricular units 1st sem\
        \ (approved)` = 0)', 'if_enrolled_zero_then_approved_zero')"
      sources:
      - start_line: 39
        end_line: 66
        file: ''
      uid: bbebfa1e-67b9-4497-bb5a-04c70f52ab87
    - text: 'For rows with enrolled > 0, the ratio approved/enrolled (first_sem_pass_rate)
        must lie between 0.0 and 1.0 inclusive. This guards against negative values
        or approved counts exceeding enrolled after data errors. Actionable constraint
        (Deequ-like): .satisfies(''(`Curricular units 1st sem (enrolled)` = 0) OR
        ((`Curricular units 1st sem (approved)` / `Curricular units 1st sem (enrolled)`)
        >= 0 AND (`Curricular units 1st sem (approved)` / `Curricular units 1st sem
        (enrolled)`) <= 1)'', ''s1_pass_rate_between_0_and_1'')'
      sources:
