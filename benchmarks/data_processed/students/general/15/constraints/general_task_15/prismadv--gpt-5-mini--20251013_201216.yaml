  '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For every row, ''Curricular units 1st sem (approved)'' must be less than
        or equal to ''Curricular units 1st sem (enrolled)''. This ensures the computed
        first_sem_pass_rate = approved/enrolled is meaningful and within expected
        bounds. Actionable constraint (Deequ-like): .satisfies(''`Curricular units
        1st sem (approved)` <= `Curricular units 1st sem (enrolled)`'', ''s1_approved_le_enrolled'')'
      sources:
