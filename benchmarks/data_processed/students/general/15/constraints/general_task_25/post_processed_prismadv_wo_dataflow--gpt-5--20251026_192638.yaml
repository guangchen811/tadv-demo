        end_line: 50
        file: ''
      uid: 03929e01-f0a3-4d31-8f65-2fe68a0d7468
    - text: 'Evaluated units cannot exceed enrolled units: 0 <= `Curricular units
        1st sem (evaluations)` <= `Curricular units 1st sem (enrolled)`. Deequ example:
        .satisfies("`Curricular units 1st sem (evaluations)` >= 0 AND `Curricular
        units 1st sem (evaluations)` <= `Curricular units 1st sem (enrolled)`", ">=
        1.0").'
      sources:
