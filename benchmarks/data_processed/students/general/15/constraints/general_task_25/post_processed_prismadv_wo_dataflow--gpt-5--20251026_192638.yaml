        file: ''
      uid: e2cd2074-6c71-4fc7-99f8-74afb60fe71c
    - text: "When there is any evaluation, the grade must be on the 0\u201320 scale:\
        \ if 'Curricular units 1st sem (evaluations)' > 0 then 0 <= 'Curricular units\
        \ 1st sem (grade)' <= 20. Deequ example: .addConstraint(satisfies('(`Curricular\
