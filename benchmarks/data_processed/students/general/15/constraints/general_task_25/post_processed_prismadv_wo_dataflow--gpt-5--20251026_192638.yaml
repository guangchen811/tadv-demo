        keeps pass_rate in [0,1]. Deequ example: .satisfies("`Curricular units 1st
        sem (approved)` >= 0 AND `Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (evaluations)`", ">= 1.0").'
      sources:
