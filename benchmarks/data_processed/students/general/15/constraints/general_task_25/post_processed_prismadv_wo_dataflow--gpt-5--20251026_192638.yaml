        file: ''
      uid: 5057bb97-04b7-4179-a5d5-a97eda8fda83
    - text: 'Approved units cannot exceed evaluated units and cannot be negative;
        if evaluations = 0 then approved must be 0: 0 <= ''Curricular units 1st sem
        (approved)'' <= ''Curricular units 1st sem (evaluations)'' and (''Curricular
        units 1st sem (evaluations)'' > 0 OR ''Curricular units 1st sem (approved)''
        = 0). Deequ example: .addConstraint(satisfies(''`Curricular units 1st sem
        (approved)` >= 0 AND `Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (evaluations)` AND (`Curricular units 1st sem (evaluations)`
        > 0 OR `Curricular units 1st sem (approved)` = 0)'', ''approved_within_evals''))'
      sources:
      - start_line: 48
        end_line: 48
        file: ''
      uid: ea472a49-7757-45cd-aac0-ea49c62d5971
    - text: 'Credited units must be between 0 and the number of enrolled units: 0
        <= ''Curricular units 1st sem (credited)'' <= ''Curricular units 1st sem (enrolled)''.
        This bounds credit_ratio in [0,1]. Deequ example: .addConstraint(satisfies(''`Curricular
        units 1st sem (credited)` >= 0 AND `Curricular units 1st sem (credited)` <=
        `Curricular units 1st sem (enrolled)`'', ''credited_within_enrolled''))'
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      uid: 001717ac-7c4c-43f0-8e17-05cc5ffee872
    - text: 'When no curricular units are enrolled, all other 1st-semester count columns
        should be zero: if ''Curricular units 1st sem (enrolled)'' = 0 then ''Curricular
        units 1st sem (without evaluations)'' = 0 AND ''Curricular units 1st sem (evaluations)''
        = 0 AND ''Curricular units 1st sem (approved)'' = 0 AND ''Curricular units
        1st sem (credited)'' = 0. Deequ example: .addConstraint(satisfies(''(`Curricular
        units 1st sem (enrolled)` != 0) OR (`Curricular units 1st sem (without evaluations)`
        = 0 AND `Curricular units 1st sem (evaluations)` = 0 AND `Curricular units
        1st sem (approved)` = 0 AND `Curricular units 1st sem (credited)` = 0)'',
