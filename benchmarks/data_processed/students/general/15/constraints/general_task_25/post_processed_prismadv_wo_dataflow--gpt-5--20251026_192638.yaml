        end_line: 46
        file: ''
      uid: b0d22c67-b363-46b3-9882-abad2faf6508
  '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]':
    code: []
    assumptions:
    - text: 'For every record, the number of curricular units without evaluations
        must be between 0 and the number of enrolled units (0 <= ''Curricular units
        1st sem (without evaluations)'' <= ''Curricular units 1st sem (enrolled)'').
        This ensures attended = enrolled - without_evaluations is non-negative and
        keeps evaluation_rate within [0,1] when enrolled > 0. Deequ example: .addConstraint(satisfies(''`Curricular
        units 1st sem (without evaluations)` >= 0 AND `Curricular units 1st sem (without
