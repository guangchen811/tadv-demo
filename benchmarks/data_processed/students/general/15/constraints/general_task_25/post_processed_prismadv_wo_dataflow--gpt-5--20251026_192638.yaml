        end_line: 46
        file: ''
      uid: 6861c8af-34b3-4e1d-a64e-43fb216fc215
    - text: 'The number of evaluated curricular units plus the number without evaluations
        should exactly equal the number enrolled: ''Curricular units 1st sem (evaluations)''
        + ''Curricular units 1st sem (without evaluations)'' = ''Curricular units
        1st sem (enrolled)''. This aligns evaluations with attended units. Deequ example:
        .satisfies(''`Curricular units 1st sem (evaluations)` + `Curricular units
        1st sem (without evaluations)` = `Curricular units 1st sem (enrolled)`'',
        ''evaluations + without = enrolled'')'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: d3645939-5c9a-455e-bc22-8d77c5a1d8f0
    - text: 'If no units are enrolled, then there should be neither evaluations nor
        units without evaluations: when ''Curricular units 1st sem (enrolled)'' =
        0, both ''Curricular units 1st sem (evaluations)'' = 0 and ''Curricular units
        1st sem (without evaluations)'' = 0. Deequ example: .satisfies(''CASE WHEN
        `Curricular units 1st sem (enrolled)` = 0 THEN (`Curricular units 1st sem
        (evaluations)` = 0 AND `Curricular units 1st sem (without evaluations)` =
        0) ELSE true END'', ''no evals or without when no enrollment'')'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      uid: 34a0829a-8149-40c0-b4a2-6376773266bd
    - text: 'If no units are marked as without evaluations, then all enrolled units
        should appear as evaluated: when ''Curricular units 1st sem (without evaluations)''
        = 0, ''Curricular units 1st sem (evaluations)'' = ''Curricular units 1st sem
        (enrolled)''. Deequ example: .satisfies(''CASE WHEN `Curricular units 1st
        sem (without evaluations)` = 0 THEN `Curricular units 1st sem (evaluations)`
        = `Curricular units 1st sem (enrolled)` ELSE true END'', ''full evaluation
        when none without'')'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      uid: 880d0da9-a380-4bc8-b6fa-7b3ebd0e0187
    - text: 'If all enrolled units are without evaluations, then there should be zero
        evaluated units: when ''Curricular units 1st sem (without evaluations)'' =
        ''Curricular units 1st sem (enrolled)'', ''Curricular units 1st sem (evaluations)''
        = 0. Deequ example: .satisfies(''CASE WHEN `Curricular units 1st sem (without
        evaluations)` = `Curricular units 1st sem (enrolled)` THEN `Curricular units
        1st sem (evaluations)` = 0 ELSE true END'', ''no evaluations when all without'')'
      sources:
