    - text: 'Credited curricular units must not exceed enrolled units: 0 <= `Curricular
        units 1st sem (credited)` <= `Curricular units 1st sem (enrolled)`. This keeps
        credit_ratio in [0,1]. Deequ example: .satisfies("`Curricular units 1st sem
        (credited)` >= 0 AND `Curricular units 1st sem (credited)` <= `Curricular
        units 1st sem (enrolled)`", ">= 1.0").'
