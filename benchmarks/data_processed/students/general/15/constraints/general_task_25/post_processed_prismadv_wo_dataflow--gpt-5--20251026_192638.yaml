  ? '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (evaluations)","Curricular
    units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For every record: 0 <= ''Curricular units 1st sem (without evaluations)''
        <= ''Curricular units 1st sem (enrolled)''. This ensures attended = enrolled
        - without_evals is non-negative and the evaluation_rate stays within [0,1].
        Deequ example: .satisfies(''`Curricular units 1st sem (without evaluations)`
        >= 0 AND `Curricular units 1st sem (without evaluations)` <= `Curricular units
        1st sem (enrolled)`'', ''without_evals within [0,enrolled]'')'
      sources:
