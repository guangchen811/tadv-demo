  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (credited)","Curricular
    units 1st sem (enrolled)","Curricular units 1st sem (evaluations)","Curricular
    units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For each record, the enrolled curricular units are exactly partitioned
        into units with evaluations and units without evaluations: `Curricular units
        1st sem (evaluations)` + `Curricular units 1st sem (without evaluations)`
        = `Curricular units 1st sem (enrolled)`, with both components in [0, enrolled].
        We could represent this as Deequ constraints like: .satisfies("`Curricular
        units 1st sem (evaluations)` + `Curricular units 1st sem (without evaluations)`
        = `Curricular units 1st sem (enrolled)`", "all rows") and .isLessThanOrEqualTo("Curricular
        units 1st sem (evaluations)", "Curricular units 1st sem (enrolled)").'
      sources:
      - start_line: 18
        end_line: 22
        file: ''
      - start_line: 44
        end_line: 46
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: 82be05d9-a920-4571-acef-cb797d3648a0
    - text: "Approvals cannot exceed the number of evaluated units; if there are zero\
        \ evaluated units, there must be zero approvals: `Curricular units 1st sem\
        \ (approved)` \u2264 `Curricular units 1st sem (evaluations)` and (if `Curricular\
        \ units 1st sem (evaluations)` = 0 then `Curricular units 1st sem (approved)`\
        \ = 0). Deequ examples: .isLessThanOrEqualTo(\"Curricular units 1st sem (approved)\"\
        , \"Curricular units 1st sem (evaluations)\") and .satisfies(\"(`Curricular\
        \ units 1st sem (evaluations)` > 0) OR (`Curricular units 1st sem (approved)`\
        \ = 0)\", \"all rows\")."
      sources:
      - start_line: 18
        end_line: 22
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: 4f5452d0-93aa-4bdb-80fe-ec35dd002b6b
    - text: "Credited units cannot exceed the number of enrolled units; if there are\
        \ zero enrolled units, there must be zero credited units: `Curricular units\
        \ 1st sem (credited)` \u2264 `Curricular units 1st sem (enrolled)` and (if\
        \ `Curricular units 1st sem (enrolled)` = 0 then `Curricular units 1st sem\
        \ (credited)` = 0). Deequ examples: .isLessThanOrEqualTo(\"Curricular units\
        \ 1st sem (credited)\", \"Curricular units 1st sem (enrolled)\") and .satisfies(\"\
        (`Curricular units 1st sem (enrolled)` > 0) OR (`Curricular units 1st sem\
        \ (credited)` = 0)\", \"all rows\")."
      sources:
      - start_line: 18
        end_line: 22
        file: ''
      - start_line: 49
        end_line: 50
        file: ''
      uid: 9f440370-beb1-4192-b054-2413daa0f160
    - text: 'Zero-enrollment consistency: if a student has zero enrolled units, then
        both evaluated and without-evaluation counts must be zero (i.e., no activity
        can exist without enrollment): if `Curricular units 1st sem (enrolled)` =
        0 then (`Curricular units 1st sem (evaluations)` = 0 AND `Curricular units
        1st sem (without evaluations)` = 0). Deequ example: .satisfies("CASE WHEN
        `Curricular units 1st sem (enrolled)` = 0 THEN (`Curricular units 1st sem
        (evaluations)` = 0 AND `Curricular units 1st sem (without evaluations)` =
        0) ELSE true END", "all rows").'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      - start_line: 49
        end_line: 50
        file: ''
      uid: 9a49218a-a0ed-42a0-a532-6a5aec7b0e27
  '["Curricular units 1st sem (approved)","Curricular units 1st sem (evaluations)"]':
    code: []
    assumptions:
    - text: 'Per row, the number of approved curricular units must be between 0 and
        the number of evaluated curricular units (0 <= approved <= evaluations). This
        ensures the computed pass_rate = approved/evaluations is well-defined and
        bounded in [0,1]. We could represent this as a Deequ constraint like: .satisfies(''`Curricular
        units 1st sem (approved)` >= 0 AND `Curricular units 1st sem (evaluations)`
        >= 0 AND `Curricular units 1st sem (approved)` <= `Curricular units 1st sem
        (evaluations)`'', ''valid_pass_components'')'
      sources:
      - start_line: 19
        end_line: 21
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: 4358e887-2038-44b7-9a93-30d1ac72fc80
    - text: 'No approvals without evaluations: if `Curricular units 1st sem (evaluations)`
        = 0 then `Curricular units 1st sem (approved)` must be 0. This aligns with
        the logic that forces pass_rate to 0 when evaluations are 0. Deequ representation:
        .satisfies(''(`Curricular units 1st sem (evaluations)` > 0) OR (`Curricular
        units 1st sem (approved)` = 0)'', ''no_approvals_without_evals'')'
      sources:
      - start_line: 48
        end_line: 48
        file: ''
      uid: 09853307-3fea-4bfa-b853-75aa42aa2145
    - text: 'Consistency between enrollment, lack of evaluation, and evaluations:
        the number of evaluated curricular units should equal the number enrolled
        minus those without evaluation, i.e., `Curricular units 1st sem (evaluations)`
        = `Curricular units 1st sem (enrolled)` - `Curricular units 1st sem (without
        evaluations)`. This keeps evaluation_rate (derived from enrolled and without
        evaluations) consistent with the denominator used for pass_rate. Deequ representation:
        .satisfies(''`Curricular units 1st sem (evaluations)` = `Curricular units
        1st sem (enrolled)` - `Curricular units 1st sem (without evaluations)`'',
        ''evals_consistent_with_enrollment'')'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 44
        end_line: 46
        file: ''
      uid: b984e156-cc92-43cd-a7f8-63b7a8eedb7a
  '["Curricular units 1st sem (credited)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For every record, the number of ''Curricular units 1st sem (credited)''
        must be less than or equal to ''Curricular units 1st sem (enrolled)''; additionally,
        if ''Curricular units 1st sem (enrolled)'' = 0, then ''Curricular units 1st
        sem (credited)'' must be 0. This keeps the computed credit_ratio within [0,
        1] and avoids masking anomalies when the denominator is 0. Example Deequ constraints:
        .isLessThanOrEqualTo(''Curricular units 1st sem (credited)'', ''Curricular
        units 1st sem (enrolled)'') and .where(''Curricular units 1st sem (enrolled)
        = 0'').hasMax(''Curricular units 1st sem (credited)'', 0).'
      sources:
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 38
        end_line: 38
        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      uid: a050665c-2cdb-42d5-9e21-7985499d474d
    - text: 'For each record, ''Curricular units 1st sem (evaluations)'' plus ''Curricular
        units 1st sem (without evaluations)'' must equal ''Curricular units 1st sem
        (enrolled)''. This expresses that every enrolled unit is either evaluated
        or not (a full partition), aligning with the use of attended = enrolled -
