    - text: 'The number of evaluations must be non-negative and must not exceed the
        number of attended units or total enrolled units: 0 <= ''Curricular units
        1st sem (evaluations)'' <= (''Curricular units 1st sem (enrolled)'' - ''Curricular
        units 1st sem (without evaluations)'') and <= ''Curricular units 1st sem (enrolled)''.
        Deequ example: .addConstraint(satisfies(''`Curricular units 1st sem (evaluations)`
        >= 0 AND `Curricular units 1st sem (evaluations)` <= (`Curricular units 1st
        sem (enrolled)` - `Curricular units 1st sem (without evaluations)`) AND `Curricular
        units 1st sem (evaluations)` <= `Curricular units 1st sem (enrolled)`'', ''evals_leq_attended''))'
