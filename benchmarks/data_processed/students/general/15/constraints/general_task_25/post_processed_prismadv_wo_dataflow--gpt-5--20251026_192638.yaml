        file: ''
      uid: 1a82fc6a-63ec-4dff-98fe-27f9a85bc293
    - text: 'If no units are enrolled (enrolled = 0), then all related counts must
        be zero: `Curricular units 1st sem (evaluations)` = 0 AND `Curricular units
        1st sem (without evaluations)` = 0 AND `Curricular units 1st sem (approved)`
        = 0 AND `Curricular units 1st sem (credited)` = 0. Deequ example: .satisfies("CASE
        WHEN `Curricular units 1st sem (enrolled)` = 0 THEN (`Curricular units 1st
        sem (evaluations)` = 0 AND `Curricular units 1st sem (without evaluations)`
        = 0 AND `Curricular units 1st sem (approved)` = 0 AND `Curricular units 1st
