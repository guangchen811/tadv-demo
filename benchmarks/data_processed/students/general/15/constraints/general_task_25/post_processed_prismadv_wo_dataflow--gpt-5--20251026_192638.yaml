  '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (evaluations)"]':
    code: []
    assumptions:
    - text: 'For each record, the number of curricular units with evaluations plus
        the number without evaluations equals the number enrolled in 1st semester:
        `Curricular units 1st sem (evaluations)` + `Curricular units 1st sem (without
        evaluations)` = `Curricular units 1st sem (enrolled)`. Deequ example: .satisfies("`Curricular
        units 1st sem (evaluations)` + `Curricular units 1st sem (without evaluations)`
        = `Curricular units 1st sem (enrolled)`", ">= 1.0").'
