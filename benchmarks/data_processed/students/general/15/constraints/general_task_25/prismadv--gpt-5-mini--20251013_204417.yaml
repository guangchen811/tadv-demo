        end_line: 46
        file: ''
      uid: b91ed592-92ac-4fe9-8cb4-38e2e499b916
    - text: 'For rows with ''Curricular units 1st sem (enrolled)'' > 0, ''Curricular
        units 1st sem (credited)'' must be between 0 and ''Curricular units 1st sem
        (enrolled)'' (inclusive). This ensures credit_ratio = credited / enrolled
        is in [0,1]. Example Deequ: .satisfies(''(`Curricular units 1st sem (credited)`
        >= 0) and (`Curricular units 1st sem (credited)` <= `Curricular units 1st
        sem (enrolled)`)'', [ ''Curricular units 1st sem (credited)'', ''Curricular
        units 1st sem (enrolled)'' ])'
      sources:
