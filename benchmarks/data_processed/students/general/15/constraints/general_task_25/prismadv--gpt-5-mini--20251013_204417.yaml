  : code: []
    assumptions:
    - text: 'For every record, ''Curricular units 1st sem (without evaluations)''
        must be less than or equal to ''Curricular units 1st sem (enrolled)''. The
        code computes attended = enrolled - without_evals and uses attended/enrolled,
        so negative attended would be invalid. Example Deequ representation: .satisfies(''`Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`'',
        [ ''Curricular units 1st sem (without evaluations)'', ''Curricular units 1st
        sem (enrolled)'' ])'
