    assumptions:
    - text: 'For each record, the number of students who were evaluated plus the number
        without evaluations should equal the number enrolled. In other words: ''Curricular
        units 1st sem (evaluations)'' + ''Curricular units 1st sem (without evaluations)''
        == ''Curricular units 1st sem (enrolled)''. This can be expressed as a Deequ-style
        constraint, e.g. .satisfies("`Curricular units 1st sem (evaluations)` + `Curricular
        units 1st sem (without evaluations)` = `Curricular units 1st sem (enrolled)`",
