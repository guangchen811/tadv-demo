    - text: 'For each record, the number approved should be no greater than the number
        evaluated and should be non-negative: ''Curricular units 1st sem (approved)''
        <= ''Curricular units 1st sem (evaluations)'' and ''Curricular units 1st sem
        (approved)'' >= 0. This is required because pass_rate is computed as approved
        / evaluations. Deequ-style: .satisfies("`Curricular units 1st sem (approved)`
        <= `Curricular units 1st sem (evaluations)` AND `Curricular units 1st sem
        (approved)` >= 0", "approved_le_evals_nonneg").'
