      uid: 60d5d77f-5dc7-4507-ba79-bf6e641e0a44
    - text: 'Semantics: the code treats 1 as ''international student'' and 0 as ''domestic/non-international''.
        This semantic mapping is relied upon when computing the international rate,
        applying a risk uplift, and writing the ''international'' column to output.
        Validation should ensure those semantics match downstream expectations (e.g.,
        no other encodings like ''Y''/''N'' or country codes). Great Expectations
        equivalent: expect_column_values_to_be_in_set(column=''International'', value_set=[0,1])
        and a manual check that 1 corresponds to international.'
      sources:
      - start_line: 53
        end_line: 64
        file: ''
      - start_line: 92
        end_line: 105
        file: ''
      uid: 1298f54b-8464-4164-a39a-997fe275e3c7
  '["International","Nacionality"]':
    code: []
    assumptions:
    - text: 'For every row, ''Curricular units 1st sem (without evaluations)'' must
        be between 0 and ''Curricular units 1st sem (enrolled)'' (i.e. 0 <= without_evals
        <= enrolled). This is required because attended is computed as enrolled -
        without_evals and evaluation_rate divides attended by enrolled when enrolled>0.
        Example actionable constraint: WHERE enrolled IS NOT NULL: assert 0 <= `Curricular
        units 1st sem (without evaluations)` AND `Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)` (Deequ-style: .satisfies("`Curricular
        units 1st sem (without evaluations)` >= 0 AND `Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)`", "without_le_enrolled"))'
      sources:
      - start_line: 34
        end_line: 46
        file: ''
      uid: 2e88b109-69a9-4f91-a294-45b1dd3c5501
    - text: 'For every row where ''Curricular units 1st sem (evaluations)'' > 0, ''Curricular
        units 1st sem (approved)'' must be between 0 and ''Curricular units 1st sem
        (evaluations)'' (i.e. 0 <= approved <= evals). This ensures pass_rate = approved
        / evals is meaningful and non-negative. Example actionable constraint: .satisfies("`Curricular
        units 1st sem (approved)` >= 0 AND `Curricular units 1st sem (approved)` <=
        `Curricular units 1st sem (evaluations)`", "approved_le_evals")'
      sources:
      - start_line: 35
        end_line: 48
        file: ''
      uid: 7dcb248b-8c7a-415b-afaa-d565886b2306
    - text: 'For every row, ''Curricular units 1st sem (credited)'' must be between
        0 and ''Curricular units 1st sem (enrolled)'' (i.e. 0 <= credited <= enrolled).
        This is required because credit_ratio = credited / enrolled (when enrolled>0).
        Example actionable constraint: .satisfies("`Curricular units 1st sem (credited)`
        >= 0 AND `Curricular units 1st sem (credited)` <= `Curricular units 1st sem
        (enrolled)`", "credited_le_enrolled")'
      sources:
      - start_line: 34
        end_line: 50
        file: ''
      uid: c71e5a7c-0a4d-4162-a999-3b710950a770
    - text: 'Grades in ''Curricular units 1st sem (grade)'' must be within the expected
        scale [0, 20]. The code computes grade_norm = grade / 20.0 and assumes normalization
        to [0,1]. Example actionable constraint: .satisfies("`Curricular units 1st
        sem (grade)` >= 0 AND `Curricular units 1st sem (grade)` <= 20", "grade_in_0_20")'
      sources:
      - start_line: 39
        end_line: 51
        file: ''
      uid: 067846cd-5eee-4e2a-8afa-8f4a24df8f39
    - text: '''Debtor'', ''Tuition fees up to date'' and ''International'' are treated
        as binary flags (expected values 0 or 1) and must be non-null. The code casts
        these to int and uses boolean tests like (international == 1), (uptodate ==
        1), (debtor == 1) and later uses them in logical combinations for holds. Example
        actionable constraint: .isContainedIn("Debtor", [0,1]) ; .isContainedIn("Tuition
        fees up to date", [0,1]) ; .isContainedIn("International", [0,1]) and assert
        no nulls on these columns.'
      sources:
      - start_line: 31
        end_line: 43
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      uid: 5ed696ed-80b2-4c63-b31c-10046891a020
    - text: '''Nacionality'' is expected to be present (non-null) and take values
        from the known finite set of category codes (the dataset reports ~19 distinct
        integer codes). The code casts nationality to int and exports it; downstream
        consumers will expect valid categorical codes. Example actionable constraint:
        .isComplete("Nacionality") ; .hasApproximateDistinctness(19) OR .isContainedIn("Nacionality",
        [list_of_valid_codes])'
      sources:
      - start_line: 26
        end_line: 27
        file: ''
      - start_line: 31
        end_line: 43
        file: ''
      - start_line: 92
        end_line: 93
        file: ''
      uid: 38d65445-e914-4621-919e-0bddadbeac33
    - text: 'All count-like curricular columns that are used together should be non-negative
        integers: ''Curricular units 1st sem (enrolled)'', ''Curricular units 1st
        sem (evaluations)'', ''Curricular units 1st sem (without evaluations)'', ''Curricular
        units 1st sem (approved)'', ''Curricular units 1st sem (credited)''. Additionally,
        when enrolled>0 or evals>0 the ratios computed (evaluation_rate, pass_rate,
        credit_ratio) assume numerators are within [0, denominator]. Example actionable
        constraints: .satisfies("`Curricular units 1st sem (enrolled)` >= 0 AND `Curricular
        units 1st sem (evaluations)` >= 0 AND `Curricular units 1st sem (approved)`
        >= 0 AND `Curricular units 1st sem (credited)` >= 0", "counts_non_negative");
        together with the pairwise bounds already specified (without_evals <= enrolled,
        approved <= evals, credited <= enrolled).'
      sources:
      - start_line: 29
        end_line: 39
        file: ''
      - start_line: 44
        end_line: 50
        file: ''
      uid: 9d649f07-dfff-47f6-955c-144a5ed8653a
