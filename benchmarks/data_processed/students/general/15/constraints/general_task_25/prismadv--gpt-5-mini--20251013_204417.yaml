        file: ''
      uid: 2eb39578-9570-4a0c-af98-3fb8d672275c
    - text: 'When ''Curricular units 1st sem (enrolled)'' == 0, then both ''Curricular
        units 1st sem (without evaluations)'' and ''Curricular units 1st sem (credited)''
        should be 0. If a student is enrolled in zero units they cannot have nonzero
        ''without evaluations'' or ''credited'' counts. Example Deequ checks: .satisfies(''(`Curricular
        units 1st sem (enrolled)` = 0) => (`Curricular units 1st sem (without evaluations)`
        = 0)'', [...]) and .satisfies(''(`Curricular units 1st sem (enrolled)` = 0)
        => (`Curricular units 1st sem (credited)` = 0)'', [...])'
      sources:
      - start_line: 34
        end_line: 50
        file: ''
      uid: aa02277a-2a8f-4742-b953-c268dcfa06bf
    - text: 'For records where ''Curricular units 1st sem (evaluations)'' > 0, ''Curricular
        units 1st sem (approved)'' must be less than or equal to ''Curricular units
        1st sem (evaluations)''. Also if evaluations == 0 then approved should be
        0. This ensures pass_rate = approved / evals is well-defined and <= 1. Example
        Deequ: .satisfies(''`Curricular units 1st sem (approved)` <= `Curricular units
        1st sem (evaluations)`'', [ ''Curricular units 1st sem (approved)'', ''Curricular
        units 1st sem (evaluations)'' ]) and .satisfies(''(`Curricular units 1st sem
        (evaluations)` = 0) => (`Curricular units 1st sem (approved)` = 0)'', [...])'
      sources:
      - start_line: 35
        end_line: 48
        file: ''
      uid: 825311e0-ce0a-479f-9b73-d1773d8a3c9f
    - text: '''Curricular units 1st sem (evaluations)'' should be less than or equal
        to attended, where attended = enrolled - `Curricular units 1st sem (without
        evaluations)`. In other words, the number of evaluations cannot exceed the
        number of units actually attended. Example Deequ: .satisfies(''`Curricular
        units 1st sem (evaluations)` <= (`Curricular units 1st sem (enrolled)` - `Curricular
        units 1st sem (without evaluations)`)'', [ ''Curricular units 1st sem (evaluations)'',
        ''Curricular units 1st sem (enrolled)'', ''Curricular units 1st sem (without
        evaluations)'' ])'
      sources:
