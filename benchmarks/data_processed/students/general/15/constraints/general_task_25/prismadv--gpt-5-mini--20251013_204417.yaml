    - text: 'Enrollment consistency: the counts of evaluations and of students without
        evaluations should each be less than or equal to total enrolled, and enrolled
        should be non-negative. Concretely: ''Curricular units 1st sem (evaluations)''
        <= ''Curricular units 1st sem (enrolled)'' AND ''Curricular units 1st sem
        (without evaluations)'' <= ''Curricular units 1st sem (enrolled)'' AND ''Curricular
        units 1st sem (enrolled)'' >= 0. Deequ-style: .satisfies("`Curricular units
        1st sem (evaluations)` <= `Curricular units 1st sem (enrolled)` AND `Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`
        AND `Curricular units 1st sem (enrolled)` >= 0", "counts_le_enrolled_nonneg").'
