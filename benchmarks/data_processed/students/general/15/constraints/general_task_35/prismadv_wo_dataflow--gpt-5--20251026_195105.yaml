    assumptions:
    - text: 'The pair of columns ''Tuition fees up to date'' and ''Debtor'' represent
        a consistent binary financial status. Values are restricted to {0,1} for both
        columns, and the only allowed joint states are: (Tuition=1, Debtor=0), (Tuition=0,
