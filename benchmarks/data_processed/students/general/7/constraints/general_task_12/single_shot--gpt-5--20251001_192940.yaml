constraints:
  Admission grade:
    code:
    - - .isComplete('Admission grade')
      - Valid
    - - .isContainedInRange('Admission grade', 0.0, 200.0, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    assumptions: []
  Application order:
    code:
    - - .isComplete('Application order')
      - Valid
    - - .isContainedIn('Application order', [0, 1, 2, 3, 4, 5, 6, 9])
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isComplete('Curricular units 1st sem (approved)')
      - Valid
    - - .isNonNegative('Curricular units 1st sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isComplete('Curricular units 1st sem (enrolled)')
      - Valid
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (evaluations):
    code:
    - - .isComplete('Curricular units 1st sem (evaluations)')
      - Valid
    - - .isNonNegative('Curricular units 1st sem (evaluations)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isComplete('Curricular units 1st sem (grade)')
      - Valid
    - - .isContainedInRange('Curricular units 1st sem (grade)', 0.0, 20.0, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    assumptions: []
  Curricular units 1st sem (without evaluations):
    code:
    - - .isComplete('Curricular units 1st sem (without evaluations)')
      - Valid
    - - .isNonNegative('Curricular units 1st sem (without evaluations)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .isComplete('Curricular units 2nd sem (grade)')
      - Valid
    - - .isContainedInRange('Curricular units 2nd sem (grade)', 0.0, 20.0, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isComplete('Debtor')
      - Valid
    - - .isContainedIn('Debtor', [0, 1])
      - Invalid
    assumptions: []
  Previous qualification (grade):
    code:
    - - .isComplete('Previous qualification (grade)')
      - Valid
    - - .isContainedInRange('Previous qualification (grade)', 0.0, 200.0, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    assumptions: []
  Scholarship holder:
    code:
    - - .isComplete('Scholarship holder')
      - Valid
    - - .isContainedIn('Scholarship holder', [0, 1])
      - Invalid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isComplete('Tuition fees up to date')
      - Valid
    - - .isContainedIn('Tuition fees up to date', [0, 1])
      - Invalid
    assumptions: []
  approved_vs_evaluations_rule:
    code:
    - - '.satisfies(''`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (evaluations)`'', ''approved_le_eval'', lambda d: d == 1.0)'
      - Valid
    assumptions: []
  without_vs_enrolled_rule:
    code:
    - - '.satisfies(''`Curricular units 1st sem (without evaluations)` <= `Curricular
        units 1st sem (enrolled)`'', ''without_le_enrolled'', lambda d: d == 1.0)'
      - Valid
    assumptions: []
