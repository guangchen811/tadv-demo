    assumptions:
    - text: 'For every record, ''Curricular units 2nd sem (enrolled)'' must be greater
        than or equal to the sum of ''Curricular units 2nd sem (evaluations)'' and
        ''Curricular units 2nd sem (without evaluations)''. This enforces that missing_recorded_2
        = enrolled - (evaluations + without) is not negative and that coverage_gap_2
        lies in a sensible range. Example actionable constraint (Deequ-like): .where("`Curricular
        units 2nd sem (enrolled)` >= `Curricular units 2nd sem (evaluations)` + `Curricular
        units 2nd sem (without evaluations)`") or a row-level check that the inequality
