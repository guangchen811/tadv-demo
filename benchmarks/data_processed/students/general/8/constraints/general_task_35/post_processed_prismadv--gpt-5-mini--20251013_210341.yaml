    - text: 'For every record, ''Curricular units 2nd sem (approved)'' must be less
        than or equal to ''Curricular units 2nd sem (evaluations)''. This guarantees
        pass_rate_2 = approved / evaluations is not producing values > 1 and matches
        the expected meaning of approvals being a subset of evaluations. Example actionable
        constraint: .where("`Curricular units 2nd sem (approved)` <= `Curricular units
        2nd sem (evaluations)`").'
