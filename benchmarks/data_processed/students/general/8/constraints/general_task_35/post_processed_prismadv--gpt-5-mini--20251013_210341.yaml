    - text: 'For every record, ''Curricular units 1st sem (evaluations)'' + ''Curricular
        units 1st sem (without evaluations)'' must be <= ''Curricular units 1st sem
        (enrolled)''. If this is violated, missing_recorded_1 (enrolled - (evaluations
        + without)) becomes negative and coverage_gap_1 is not meaningful. Representable
        as a Deequ-style constraint, e.g.: .satisfies("`Curricular units 1st sem (evaluations)`
        + `Curricular units 1st sem (without evaluations)` <= `Curricular units 1st
        sem (enrolled)`", "recorded_plus_without_le_enrolled").'
