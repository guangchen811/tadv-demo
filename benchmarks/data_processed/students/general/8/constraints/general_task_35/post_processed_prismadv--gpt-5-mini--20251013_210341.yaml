    - text: 'If ''Curricular units 2nd sem (enrolled)'' == 0 then both ''Curricular
        units 2nd sem (evaluations)'' and ''Curricular units 2nd sem (without evaluations)''
        should be 0. This aligns with the logic that there should be no evaluations
        or ''without'' units when a student is not enrolled for the semester. Example
        check: .where("(`Curricular units 2nd sem (enrolled)` = 0) => (`Curricular
        units 2nd sem (evaluations)` = 0 AND `Curricular units 2nd sem (without evaluations)`
        = 0)").'
