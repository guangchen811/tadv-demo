    - text: 'For rows where ''Curricular units 1st sem (enrolled)'' > 0, coverage_gap_1
        = (enrolled - (evaluations + without)) / enrolled should be between 0.0 and
        1.0. In other words, where enrolled > 0 assert 0.0 <= (enrolled - (evaluations
        + without)) / enrolled <= 1.0. Representable in Deequ as a conditional satisfies
