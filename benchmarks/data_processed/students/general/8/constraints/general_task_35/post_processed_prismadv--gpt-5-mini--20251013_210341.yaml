    - text: 'When there are evaluations (> 0), the first-semester pass rate computed
        as ''Curricular units 1st sem (approved)'' / ''Curricular units 1st sem (evaluations)''
        must be between 0 and 1 inclusive. Practically this requires 0 <= approved
        <= evaluations. Example constraint: .satisfies(''CASE WHEN Curricular units
        1st sem (evaluations) > 0 THEN (Curricular units 1st sem (approved) / Curricular
        units 1st sem (evaluations)) BETWEEN 0 AND 1 ELSE true END'', ''c1_passrate_bounds'')'
      sources:
      - start_line: 36
        end_line: 44
        file: ''
      uid: 03cf6649-c080-42b2-b6c8-dc03fa651495
    - text: 'The coverage gap for 1st sem is calculated as (enrolled - (evaluations
        + without)) / enrolled when enrolled > 0; this ratio should lie between 0
        and 1 for rows with enrolled > 0. Example constraint: .satisfies(''CASE WHEN
        Curricular units 1st sem (enrolled) > 0 THEN (Curricular units 1st sem (enrolled)
        - (Curricular units 1st sem (evaluations) + Curricular units 1st sem (without
        evaluations))) / Curricular units 1st sem (enrolled) BETWEEN 0 AND 1 ELSE
