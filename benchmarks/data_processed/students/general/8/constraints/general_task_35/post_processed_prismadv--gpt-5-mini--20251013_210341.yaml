      uid: f53810f6-236d-405e-a09f-e6a48538a00a
    - text: '''Curricular units 2nd sem (without evaluations)'' should be a non-negative
        integer and should not exceed ''Curricular units 2nd sem (enrolled)'' (0 <=
        without <= enrolled). This ensures the ''without'' count is valid and consistent
        with enrollment. Example actionable constraints: .isNonNegative("Curricular
        units 2nd sem (without evaluations)") and .where("`Curricular units 2nd sem
        (without evaluations)` <= `Curricular units 2nd sem (enrolled)`").'
