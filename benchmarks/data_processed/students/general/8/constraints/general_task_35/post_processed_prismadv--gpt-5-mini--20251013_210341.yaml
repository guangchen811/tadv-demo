    - text: 'When ''Curricular units 2nd sem (evaluations)'' == 0 then ''Curricular
        units 2nd sem (approved)'' must be 0. The code replaces zero evaluations with
        NaN and then fills pass_rate_2 with 0.0; if approvals > 0 while evaluations
        == 0 the computed pass_rate_2 will be coerced to 0, hiding inconsistent data.
