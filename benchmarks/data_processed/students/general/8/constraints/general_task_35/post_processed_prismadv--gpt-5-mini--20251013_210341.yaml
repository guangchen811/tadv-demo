    - text: 'The sum of evaluated and ''without evaluations'' students should not
        exceed the enrolled count: ''Curricular units 1st sem (evaluations)'' + ''Curricular
        units 1st sem (without evaluations)'' <= ''Curricular units 1st sem (enrolled)''.
        This directly corresponds to the missing_recorded_1 calculation and prevents
        negative missing_recorded values. Example constraint: .satisfies(''Curricular
        units 1st sem (evaluations) + Curricular units 1st sem (without evaluations)
        <= Curricular units 1st sem (enrolled)'', ''c1_eval_without_le_enrolled'')'
