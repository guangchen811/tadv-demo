        end_line: 97
        file: ''
      uid: 54eccefe-26be-4f9b-a7c6-2f8efc403be1
    - text: 'The ''Debtor'' column should be numeric/integer-like (not free-form text).
        The code performs numeric equality comparisons (== 0); to ensure comparisons
        behave as intended the values should be stored as integers or be safely castable
        to integers.

        Example Deequ-style check: .satisfies("CASE WHEN `Debtor` = TRUNC(`Debtor`)
        AND `Debtor` IS NOT NULL THEN 1 ELSE 0 END", "Debtor integer-like", lambda
        x: x == 1.0)'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 68
        end_line: 68
        file: ''
      uid: d33597de-4f9b-46b3-babf-8ad343b54820
  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'The columns ''Tuition fees up to date'' and ''Debtor'' are binary indicator
        flags and should only contain the values 0 or 1. Actionable constraint examples:

        - Deequ (per-column): .isContainedIn("Tuition fees up to date", [0, 1]) and
        .isContainedIn("Debtor", [0, 1])

        - Deequ (multi-column predicate): .satisfies("(Tuition fees up to date IN
        (0,1)) AND (Debtor IN (0,1))")'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      - start_line: 68
        end_line: 68
        file: ''
      uid: a4544b3d-8d41-4841-9949-7c306f95089b
    - text: 'The ''Tuition fees up to date'' and ''Debtor'' flags should be mutually
        consistent: a record must not have both ''Tuition fees up to date'' == 1 and
        ''Debtor'' == 1 at the same time (i.e., a student cannot be simultaneously
        up-to-date and a debtor). Actionable constraint example:

        - Deequ: .satisfies("NOT (`Tuition fees up to date` = 1 AND `Debtor` = 1)")'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      - start_line: 68
        end_line: 68
        file: ''
      uid: 905205bd-c5c5-4225-8f13-0148d72e77d0
    - text: 'Rows marked as scholarship renewal eligible must meet the financial and
        academic preconditions used to compute that flag. Concretely, whenever ''scholarship_renewal_eligible''
        is true (this is computed in the output), the input must satisfy: ''Scholarship
        holder'' == 1, ''Tuition fees up to date'' == 1, ''Debtor'' == 0, ''Curricular
        units 1st sem (grade)'' >= 12 (since grade_norm_1 = GR1/20 and grade_norm_1
        >= 0.60), ''Curricular units 2nd sem (grade)'' >= 12, and approved rates >=
        0.50 for both semesters (i.e. AP1/EV1 >= 0.5 and AP2/EV2 >= 0.5, taking into
        account the code''s treatment of EV==0 which yields an approved rate of 0).
        Actionable constraint example (Deequ-like):

        - .satisfies("NOT(scholarship_renewal_eligible) OR (Scholarship holder = 1
        AND `Tuition fees up to date` = 1 AND Debtor = 0 AND `Curricular units 1st
        sem (grade)` >= 12 AND `Curricular units 2nd sem (grade)` >= 12 AND (CASE
        WHEN `Curricular units 1st sem (evaluations)` = 0 THEN 0 ELSE `Curricular
        units 1st sem (approved)` / `Curricular units 1st sem (evaluations)` END)
        >= 0.5 AND (CASE WHEN `Curricular units 2nd sem (evaluations)` = 0 THEN 0
        ELSE `Curricular units 2nd sem (approved)` / `Curricular units 2nd sem (evaluations)`
        END) >= 0.5)")'
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 40
        end_line: 41
        file: ''
      - start_line: 71
        end_line: 76
        file: ''
      uid: 47430a3c-ec2a-48f6-b3a1-b5b88e1c27d4
    - text: 'Approved counts should not exceed evaluations for each semester: ''Curricular
        units 1st sem (approved)'' <= ''Curricular units 1st sem (evaluations)'' and
        ''Curricular units 2nd sem (approved)'' <= ''Curricular units 2nd sem (evaluations)''.
        This is required for the approved-rate calculations to be meaningful. Actionable
        constraint examples:

        - Deequ: .satisfies("`Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (evaluations)`") and .satisfies("`Curricular units 2nd sem (approved)`
        <= `Curricular units 2nd sem (evaluations)`")'
      sources:
      - start_line: 28
        end_line: 28
        file: ''
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      uid: 9c490c3c-6791-406b-8497-8401238f7fe7
    - text: 'Credited counts should not exceed enrolled counts for each semester:
        ''Curricular units 1st sem (credited)'' <= ''Curricular units 1st sem (enrolled)''
        and ''Curricular units 2nd sem (credited)'' <= ''Curricular units 2nd sem
        (enrolled)''. This is required for the credit-load calculations (CR/CE) to
        be valid. Actionable constraint examples:

        - Deequ: .satisfies("`Curricular units 1st sem (credited)` <= `Curricular
        units 1st sem (enrolled)`") and .satisfies("`Curricular units 2nd sem (credited)`
        <= `Curricular units 2nd sem (enrolled)`")'
      sources:
      - start_line: 29
        end_line: 29
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      - start_line: 36
        end_line: 36
