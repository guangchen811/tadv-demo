    - text: 'The ''Debtor'' column is expected to be a binary flag with only the values
        0 and 1. The downstream logic treats 0/1 as the two possible states (used
        in boolean expressions); unexpected values (e.g. 2, -1, or arbitrary strings)
        would lead to incorrect financial_ok and renewal decisions.

        Example Deequ constraint: .satisfies("CASE WHEN `Debtor` IN (0,1) THEN 1 ELSE
        0 END", "Debtor in {0,1}", lambda x: x == 1.0)'
