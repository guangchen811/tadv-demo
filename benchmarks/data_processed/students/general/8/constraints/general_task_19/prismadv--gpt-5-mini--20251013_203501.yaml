      uid: 3170bc35-3619-41d8-93dc-520a8dbf48c6
    - text: 'Semantic mapping: 0 must mean ''no outstanding debt'' (eligible on that
        criterion) and 1 must mean ''debtor''. The code computes financial_ok = (FEES
        == 1) & (Debtor == 0) and uses financial_ok for scholarship renewal and intervention
        logic, so these semantics are required for correct behavior.

        This can be enforced operationally by validating domain documentation and
        ensuring Debtor uses that encoding; as a data check one can verify only 0/1
        present and that metadata explains the mapping.'
