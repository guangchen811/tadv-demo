raw_constraints:
- column_name: id
  code_for_constraint: .isComplete('id')
- column_name: id
  code_for_constraint: .isUnique('id')
- column_name: Admission grade
  code_for_constraint: .isComplete('Admission grade')
- column_name: Admission grade
  code_for_constraint: .isNonNegative('Admission grade')
- column_name: Admission grade
  code_for_constraint: '.satisfies(''`Admission grade` >= 0 AND `Admission grade`
    <= 200'', ''admission_grade_range'', lambda v: v == 1.0)'
- column_name: Previous qualification (grade)
  code_for_constraint: .isComplete('Previous qualification (grade)')
- column_name: Previous qualification (grade)
  code_for_constraint: .isNonNegative('Previous qualification (grade)')
- column_name: Previous qualification (grade)
  code_for_constraint: '.satisfies(''`Previous qualification (grade)` >= 0 AND `Previous
    qualification (grade)` <= 200'', ''prev_qual_grade_range'', lambda v: v == 1.0)'
- column_name: Age at enrollment
  code_for_constraint: .isComplete('Age at enrollment')
- column_name: Age at enrollment
  code_for_constraint: .isNonNegative('Age at enrollment')
- column_name: Age at enrollment
  code_for_constraint: '.satisfies(''`Age at enrollment` >= 15 AND `Age at enrollment`
    <= 100'', ''age_reasonable_range'', lambda v: v >= 0.99)'
- column_name: Debtor
  code_for_constraint: .isComplete('Debtor')
- column_name: Debtor
  code_for_constraint: .isContainedIn('Debtor', [0, 1])
- column_name: Tuition fees up to date
  code_for_constraint: .isComplete('Tuition fees up to date')
- column_name: Tuition fees up to date
  code_for_constraint: .isContainedIn('Tuition fees up to date', [0, 1])
- column_name: Educational special needs
  code_for_constraint: .isContainedIn('Educational special needs', [0, 1])
- column_name: Gender
  code_for_constraint: .isContainedIn('Gender', [0, 1])
- column_name: Scholarship holder
  code_for_constraint: .isContainedIn('Scholarship holder', [0, 1])
- column_name: International
  code_for_constraint: .isContainedIn('International', [0, 1])
- column_name: Displaced
  code_for_constraint: .isContainedIn('Displaced', [0, 1])
- column_name: Application order
  code_for_constraint: .isPositive('Application order')
- column_name: Unemployment rate
  code_for_constraint: .isComplete('Unemployment rate')
- column_name: Inflation rate
  code_for_constraint: .isComplete('Inflation rate')
- column_name: GDP
  code_for_constraint: .isComplete('GDP')
- column_name: Curricular units 1st sem (enrolled)
  code_for_constraint: .isComplete('Curricular units 1st sem (enrolled)')
- column_name: Curricular units 1st sem (enrolled)
  code_for_constraint: .isNonNegative('Curricular units 1st sem (enrolled)')
- column_name: Curricular units 1st sem (approved)
  code_for_constraint: .isComplete('Curricular units 1st sem (approved)')
- column_name: Curricular units 1st sem (approved)
  code_for_constraint: .isNonNegative('Curricular units 1st sem (approved)')
- column_name: Curricular units 1st sem (grade)
  code_for_constraint: .isComplete('Curricular units 1st sem (grade)')
- column_name: Curricular units 1st sem (without evaluations)
  code_for_constraint: .isNonNegative('Curricular units 1st sem (without evaluations)')
- column_name: Curricular units 1st sem (evaluations)
  code_for_constraint: .isNonNegative('Curricular units 1st sem (evaluations)')
- column_name: Curricular units 2nd sem (enrolled)
  code_for_constraint: .isComplete('Curricular units 2nd sem (enrolled)')
- column_name: Curricular units 2nd sem (enrolled)
  code_for_constraint: .isNonNegative('Curricular units 2nd sem (enrolled)')
- column_name: Curricular units 2nd sem (approved)
  code_for_constraint: .isComplete('Curricular units 2nd sem (approved)')
- column_name: Curricular units 2nd sem (approved)
  code_for_constraint: .isNonNegative('Curricular units 2nd sem (approved)')
- column_name: Curricular units 2nd sem (grade)
  code_for_constraint: .isComplete('Curricular units 2nd sem (grade)')
- column_name: Curricular units 2nd sem (without evaluations)
  code_for_constraint: .isNonNegative('Curricular units 2nd sem (without evaluations)')
- column_name: Curricular units 2nd sem (evaluations)
  code_for_constraint: .isNonNegative('Curricular units 2nd sem (evaluations)')
- column_name: ap1_le_en1
  code_for_constraint: '.satisfies(''`Curricular units 1st sem (approved)` <= `Curricular
    units 1st sem (enrolled)`'', ''ap1_le_en1'', lambda v: v == 1.0)'
- column_name: ap2_le_en2
  code_for_constraint: '.satisfies(''`Curricular units 2nd sem (approved)` <= `Curricular
    units 2nd sem (enrolled)`'', ''ap2_le_en2'', lambda v: v == 1.0)'
- column_name: wo1_le_en1
  code_for_constraint: '.satisfies(''`Curricular units 1st sem (without evaluations)`
    <= `Curricular units 1st sem (enrolled)`'', ''wo1_le_en1'', lambda v: v == 1.0)'
- column_name: wo2_le_en2
  code_for_constraint: '.satisfies(''`Curricular units 2nd sem (without evaluations)`
    <= `Curricular units 2nd sem (enrolled)`'', ''wo2_le_en2'', lambda v: v == 1.0)'
- column_name: ap1_le_eval1
  code_for_constraint: '.satisfies(''`Curricular units 1st sem (approved)` <= `Curricular
    units 1st sem (evaluations)`'', ''ap1_le_eval1'', lambda v: v >= 0.99)'
- column_name: ap2_le_eval2
  code_for_constraint: '.satisfies(''`Curricular units 2nd sem (approved)` <= `Curricular
    units 2nd sem (evaluations)`'', ''ap2_le_eval2'', lambda v: v >= 0.99)'
- column_name: corr_en1_ap1
  code_for_constraint: '.hasCorrelation(''Curricular units 1st sem (enrolled)'', ''Curricular
    units 1st sem (approved)'', lambda v: v >= 0.6)'
- column_name: corr_en2_ap2
  code_for_constraint: '.hasCorrelation(''Curricular units 2nd sem (enrolled)'', ''Curricular
    units 2nd sem (approved)'', lambda v: v >= 0.6)'
