    - text: 'The ''Debtor'', ''Tuition fees up to date'', and ''Scholarship holder''
        columns are assumed to be strictly binary indicators (containing only 0 or
        1 values) for the ''financial_risk'' calculation. Any other values would lead
        to incorrect interpretation and calculation of financial risk due to the linear
        combination and `(1 - df[c_fees])` operation.

        We could represent this assumption as deequ constraints like this:

        .isContainedIn("Debtor", [0, 1])

        .isContainedIn("Tuition fees up to date", [0, 1])

        .isContainedIn("Scholarship holder", [0, 1])'
