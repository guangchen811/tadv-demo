    - text: 'All intermediate risk components (''academic_risk'', ''financial_risk'',
        ''attendance_risk'', ''macro_risk'', ''app_risk'') contributing to the final
        ''raw_risk'' are assumed to be complete (i.e., contain no null or NaN values)
        and to be within a normalized range of 0 to 1. This ensures that their weighted
        sum (lines 121-127) is meaningful and produces a valid overall risk score
        without unexpected NaN propagation or out-of-range values.

        We could represent this assumption as deequ constraints on the derived features,
        such as:

        .isComplete("academic_risk")

        .isBetween("academic_risk", 0.0, 1.0)

        .isComplete("financial_risk")

        .isBetween("financial_risk", 0.0, 1.0)

        .isComplete("attendance_risk")

        .isBetween("attendance_risk", 0.0, 1.0)

        .isComplete("macro_risk")

        .isBetween("macro_risk", 0.0, 1.0)

        .isComplete("app_risk")

        .isBetween("app_risk", 0.0, 1.0)'
