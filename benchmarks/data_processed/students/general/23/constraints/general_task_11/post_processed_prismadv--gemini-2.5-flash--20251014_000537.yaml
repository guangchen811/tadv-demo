    assumptions:
    - text: 'For calculations involving 1st semester curricular units, such as approval,
        without evaluations, credited, and failure rates, the number of approved,
        without evaluations, and credited units (''Curricular units 1st sem (approved)'',
        ''Curricular units 1st sem (without evaluations)'', ''Curricular units 1st
        sem (credited)'') are assumed to be non-negative and should not exceed the
        total number of enrolled units (''Curricular units 1st sem (enrolled)'').
        The ''Curricular units 1st sem (enrolled)'' column must also be non-negative.
        This ensures that the calculated rates are meaningful (e.g., between 0 and
        1) before any explicit clipping or default values from `robust_divide` are
        applied.

        We could represent this assumption as deequ constraints like this:

        .isNonNegative("Curricular units 1st sem (enrolled)")

        .isNonNegative("Curricular units 1st sem (approved)")

        .isLessThanOrEqualTo("Curricular units 1st sem (approved)", "Curricular units
        1st sem (enrolled)")

        .isNonNegative("Curricular units 1st sem (credited)")

        .isLessThanOrEqualTo("Curricular units 1st sem (credited)", "Curricular units
        1st sem (enrolled)")

        .isNonNegative("Curricular units 1st sem (without evaluations)")

        .isLessThanOrEqualTo("Curricular units 1st sem (without evaluations)", "Curricular
        units 1st sem (enrolled)")'
