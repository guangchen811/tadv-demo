    - text: 'For the ''preparedness'' calculation, the ''Admission grade'' and ''Previous
        qualification (grade)'' columns are assumed to be on a consistent numerical
        scale (e.g., both out of 200). Values are expected to be non-negative, and
        ideally within the 0-200 range, to ensure their normalized weighted average
        is meaningful and falls between 0 and 1.

        We could represent this assumption as deequ constraints like this:

        .isNonNegative("Admission grade")

        .isLessThanOrEqualTo("Admission grade", 200.0)

        .isNonNegative("Previous qualification (grade)")

        .isLessThanOrEqualTo("Previous qualification (grade)", 200.0)'
