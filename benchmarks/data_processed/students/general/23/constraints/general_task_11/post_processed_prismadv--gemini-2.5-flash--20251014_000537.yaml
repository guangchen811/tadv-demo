      uid: 31322ef1-c6a6-4019-8ab6-4286515f9d5d
    - text: 'For the ''macro_risk'' calculation, the ''Unemployment rate'', ''GDP'',
        and ''Inflation rate'' columns are assumed to contain values within specific
        and expected numerical ranges (Unemployment rate: [5, 20], GDP: [-5, 5], Inflation
        rate: [-2, 5]). This ensures that their respective linear normalizations (lines
        109-111) produce meaningful risk contributions between 0 and 1 before clipping,
        and that their weighted sum in line 112 is interpretable.

        We could represent this assumption as deequ constraints like this:

        .isBetween("Unemployment rate", 5.0, 20.0)

        .isBetween("GDP", -5.0, 5.0)

        .isBetween("Inflation rate", -2.0, 5.0)'
