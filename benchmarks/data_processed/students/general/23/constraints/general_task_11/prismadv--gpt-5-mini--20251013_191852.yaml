        end_line: 15
        file: ''
      - start_line: 75
        end_line: 77
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 38f584ca-1a57-4659-a4ae-6f0e3e19c4ba
    - text: 'Both ''Admission grade'' and ''Previous qualification (grade)'' are used
        together to compute ''preparedness'' after normalizing by 200. They should
        therefore be numeric, non-missing and lie within a plausible range [0, 200].
        Actionable checks: both columns should be numeric (no coercion-produced NaNs)
        and the fraction of rows where 0 <= Admission grade <= 200 AND 0 <= Previous
        qualification (grade) <= 200 should be 1.0.'
      sources:
      - start_line: 70
        end_line: 71
        file: ''
      - start_line: 93
        end_line: 95
        file: ''
      uid: 3f27969b-b2bf-47ff-ba6e-48a6d2fa52c8
    - text: 'The curricular unit grades for semester 1 and semester 2 (''Curricular
        units 1st sem (grade)'' and ''Curricular units 2nd sem (grade)'') are normalized
        by dividing by 20 and clipped to [0,1], implying valid raw grade values should
        be in the range [0,20] and numeric. Actionable checks: both grade columns
        should be numeric/non-missing and satisfy 0 <= grade <= 20 for all rows (or
        the acceptable fraction threshold).'
      sources:
