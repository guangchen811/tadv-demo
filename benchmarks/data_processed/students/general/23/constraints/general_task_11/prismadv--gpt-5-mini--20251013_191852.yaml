        file: ''
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 81
        end_line: 89
        file: ''
      uid: fb504dac-c1ef-4bd4-a394-906997a424f6
    - text: 'When `Curricular units 2nd sem (enrolled)` is zero, the related counts
        should also be zero: for every row where `Curricular units 2nd sem (enrolled)`
        == 0, enforce `Curricular units 2nd sem (approved)` == 0, `Curricular units
        2nd sem (credited)` == 0, and `Curricular units 2nd sem (without evaluations)`
        == 0. Actionable check: ensure df.filter((enr == 0) & ((app != 0) | (cred
        != 0) | (woeval != 0))).count() == 0. This guards downstream logic that treats
        zero-enrollment rows specially (the code supplies defaults when dividing by
