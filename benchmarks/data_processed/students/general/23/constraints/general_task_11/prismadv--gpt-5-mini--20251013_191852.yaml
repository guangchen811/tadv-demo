    - text: 'The ''Debtor'' column should have no null values in the input data. The
        code does not fill missing Debtor values after coercion, and downstream arithmetic
        assumes a defined numeric value for every row. Represent this as a completeness
        constraint, e.g.:

        .satisfies("CASE WHEN `Debtor` IS NOT NULL THEN 1 ELSE 0 END", "Non-null Debtor",
