      - start_line: 110
        end_line: 112
        file: ''
      uid: 6c1a6374-0fa3-42d7-8031-ef22c0be7f18
    - text: 'The ''GDP'' values are expected to be small percentage-style numbers
        (e.g., GDP growth rates), not large absolute GDP figures. The formula gdp_headwind
        = (5 - GDP) / 10 implies 5 is a meaningful reference point (likely 5%). Based
        on the data histogram, typical values fall roughly between -5 and +4. Enforce
        that most input values are within a reasonable range such as [-10, 10].

        Suggested checks:

        - Deequ-style: .satisfies("CASE WHEN `GDP` BETWEEN -10 AND 10 THEN 1 ELSE
        0 END", "GDP_within_expected_growth_range", lambda x: x >= 0.95)

        - Great Expectations: expect_column_values_to_be_between(''GDP'', min_value=-10,
        max_value=10, mostly=0.95)'
