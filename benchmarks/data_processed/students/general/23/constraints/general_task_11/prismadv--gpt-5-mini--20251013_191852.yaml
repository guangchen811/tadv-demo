        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: f9614a73-9e06-4ee0-aa3d-870ef3560b9e
    - text: 'The ''GDP'' column values must be finite and not extreme outliers (no
        +/- Inf, and absolute magnitude should be bounded). Extreme values will distort
        the gdp_headwind calculation and downstream macro_risk; enforce that nearly
        all values have |GDP| < 100 (or another domain-appropriate cap).

        Suggested checks:

        - Deequ-style: .satisfies("CASE WHEN `GDP` IS NOT NULL AND ABS(`GDP`) < 100
        THEN 1 ELSE 0 END", "GDP_finite_and_not_extreme", lambda x: x >= 0.99)

        - Great Expectations: expect_column_values_to_be_between(''GDP'', min_value=-100,
        max_value=100, mostly=0.99)'
