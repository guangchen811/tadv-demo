    assumptions:
    - text: 'For each semester, the counts of approved, credited and ''without evaluations''
        should never exceed the number enrolled and should be non-negative. Concretely:
        for all rows, c1_app <= c1_enr, c1_cred <= c1_enr, c1_woeval <= c1_enr (and
        similarly for semester 2: c2_app <= c2_enr, c2_cred <= c2_enr, c2_woeval <=
        c2_enr). These constraints ensure the numerator used in rate calculations
        is <= denominator and that fail_rate (enr - app) is non-negative. Example
        Deequ-style checks: .satisfies(''c1_app <= c1_enr AND c1_cred <= c1_enr AND
        c1_woeval <= c1_enr'', ''sem1_counts_le_enrolled'') and .satisfies(''c2_app
        <= c2_enr AND c2_cred <= c2_enr AND c2_woeval <= c2_enr'', ''sem2_counts_le_enrolled'').'
      sources:
      - start_line: 75
        end_line: 89
        file: ''
      uid: 47141bcd-58ce-4536-bbdd-3d69ce675676
    - text: 'When enrolled is zero for a semester, the corresponding approved, credited
        and without-evaluations counts should be zero as well (e.g., if c1_enr ==
        0 then c1_app == 0, c1_cred == 0, c1_woeval == 0; and analogously for semester
        2). This avoids inconsistent rows like having approvals when no students were
        enrolled. Example Deequ constraint: .satisfies(''NOT(c1_enr = 0) OR (c1_app
        = 0 AND c1_cred = 0 AND c1_woeval = 0)'', ''sem1_zero_enrolled_consistency'').'
      sources:
      - start_line: 75
        end_line: 83
        file: ''
      uid: 3c01b0e1-ffe6-4e4b-be81-fa51dec7a31d
    - text: 'Course grades for both semesters should be on the 0..20 scale. Concretely:
        0 <= c1_grade <= 20 and 0 <= c2_grade <= 20. The code normalizes by dividing
        by 20 and clipping, so values outside this range indicate input errors. Example
        Deequ checks: .satisfies(''c1_grade >= 0 AND c1_grade <= 20 AND c2_grade >=
        0 AND c2_grade <= 20'', ''grades_in_0_20'').'
      sources:
      - start_line: 79
        end_line: 85
        file: ''
      uid: 5322a0e0-fc5f-46b8-a46f-bd3fabd665c8
    - text: 'Admission and previous-qualification grades share the same 0..200 scale
        expected by the normalization. Concretely: 0 <= c_admission <= 200 AND 0 <=
        c_prev_grade <= 200. Example Deequ: .satisfies(''c_admission >= 0 AND c_admission
        <= 200 AND c_prev_grade >= 0 AND c_prev_grade <= 200'', ''admission_prev_in_0_200'').'
      sources:
      - start_line: 93
        end_line: 95
        file: ''
      uid: c4450194-b7e3-4940-86f2-316dbe23d901
    - text: 'Financial indicator columns used together should be binary indicators
        (0/1). Concretely: c_debtor in {0,1}, c_fees in {0,1}, c_scholar in {0,1}.
        The financial_risk formula treats these as proportions/flags (including 1
        - c_fees), so non-binary values can break interpretation. Example Deequ: .satisfies(''(c_debtor
        IN (0,1)) AND (c_fees IN (0,1)) AND (c_scholar IN (0,1))'', ''financial_flags_binary'').'
      sources:
      - start_line: 98
        end_line: 98
        file: ''
      uid: ba79700c-a6f1-4db0-9a26-90838bfd41cf
    - text: 'Attendance and age inputs used together should be consistent: c_day is
        a binary indicator (expected values 0 or 1) and c_age should fall in the 16..70
        range used for normalization. Concretely: c_day in {0,1} AND c_age >= 16 AND
        c_age <= 70. Example Deequ: .satisfies(''c_day IN (0,1) AND c_age >= 16 AND
        c_age <= 70'', ''attendance_age_valid'').'
      sources:
      - start_line: 101
        end_line: 103
        file: ''
      uid: 711f90f4-30a1-4179-abeb-93517c0cd739
    - text: 'Application order values are positive integers within the expected ordinal
        range used for scaling. Concretely: c_app_order is integer AND 1 <= c_app_order
        <= 9 (the code scales (c_app_order - 1)/8). Example Deequ: .satisfies(''c_app_order
        >= 1 AND c_app_order <= 9'', ''app_order_range'').'
      sources:
      - start_line: 106
        end_line: 106
        file: ''
      uid: c79b470e-7862-4681-b9e9-a3e924cafe74
    - text: 'Macro indicators used together (unemployment, GDP, inflation) should
        be numeric and within reasonable ranges so the normalization behaves as intended.
        A practical multi-column constraint: none of c_unemp, c_gdp, c_infl are null
        simultaneously and each is numeric (e.g., isFinite). Example Deequ: .satisfies(''NOT(c_unemp
        IS NULL AND c_gdp IS NULL AND c_infl IS NULL)'', ''macro_at_least_one_present'')
        and separate numeric checks per column.'
      sources:
      - start_line: 109
        end_line: 111
        file: ''
      uid: 921e1ca0-fb9f-458c-8595-1857fd359e73
    - text: 'The produced risk_score is computed from multiple components and later
        filtered to enrolled students. Ensure the mapping from df rows to enrolled_scores
        respects indexing: risk_score aligns with df rows such that selecting by (c_target
        == ''Enrolled'') yields the corresponding scores. Concretely: len(risk_score)
        == len(df) and after subsetting by is_enrolled the resulting risk_score slice
        aligns with enrolled_scores.index. Example validation: .satisfies(''size(risk_score)
        = size(df) AND /* alignment check implemented externally */'', ''risk_score_alignment'').'
      sources:
      - start_line: 121
        end_line: 133
        file: ''
      uid: a404a600-ea56-417b-aef5-13d88cdff3cb
  Admission grade:
    code: []
    assumptions:
    - text: 'For both semesters, the counts used as numerators ("Curricular units
        1st sem (approved)", "Curricular units 1st sem (credited)", "Curricular units
        1st sem (without evaluations)", and the corresponding 2nd-semester columns)
        must be non-negative and less than or equal to the corresponding enrolled
        counts ("Curricular units X sem (enrolled)").

        Rationale/actionable constraint: approvals/credits/woeval should not exceed
        enrolled. Example Deequ-like constraints (replace placeholders with actual
        column names):

        .satisfies("`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (enrolled)`", ["Curricular units 1st sem (approved)", "Curricular units
        1st sem (enrolled)"])

        .satisfies("`Curricular units 1st sem (credited)` <= `Curricular units 1st
        sem (enrolled)`", [...])

        .satisfies("`Curricular units 1st sem (without evaluations)` <= `Curricular
        units 1st sem (enrolled)`", [...])

        (and the same three constraints for the 2nd semester).'
      sources:
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 75
        end_line: 89
        file: ''
      uid: 4939a8d0-8ece-48a5-af21-5c3547128f1a
    - text: "Semester course grades used for normalization (\"Curricular units 1st\
        \ sem (grade)\" and \"Curricular units 2nd sem (grade)\") are expected to\
        \ be on a 0\u201320 scale (numeric, >=0 and <=20) so that dividing by 20.0\
        \ and clipping to [0,1] yields meaningful normalized grades.\nActionable constraint\
        \ examples:\n.satisfies(\"`Curricular units 1st sem (grade)` >= 0 AND `Curricular\
        \ units 1st sem (grade)` <= 20\", [\"Curricular units 1st sem (grade)\", \"\
        Curricular units 1st sem (grade)\"])\n.satisfies(\"`Curricular units 2nd sem\
        \ (grade)` >= 0 AND `Curricular units 2nd sem (grade)` <= 20\", [...])"
      sources:
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 79
        end_line: 86
        file: ''
      uid: 10930e22-f94f-4e51-9c34-ca5ea90ff401
    - text: "The preparedness inputs (\"Admission grade\" and \"Previous qualification\
        \ (grade)\") are expected to share the same numeric scale and fall in the\
        \ 0\u2013200 range (so dividing by 200.0 and clipping to [0,1] is appropriate).\
        \ Enforce numeric and range consistency across these two columns.\nActionable\
        \ constraint examples:\n.satisfies(\"`Admission grade` >= 0 AND `Admission\
        \ grade` <= 200\", [\"Admission grade\"])\n.satisfies(\"`Previous qualification\
        \ (grade)` >= 0 AND `Previous qualification (grade)` <= 200\", [\"Previous\
        \ qualification (grade)\"])\n.or a multi-column check ensuring both are within\
        \ the range."
      sources:
      - start_line: 54
        end_line: 55
        file: ''
      - start_line: 93
        end_line: 95
        file: ''
      uid: 10216e48-1d52-428a-bcf3-6efb7048acbc
    - text: "Financial indicator columns used together in the financial risk formula\
        \ (\"Debtor\", \"Tuition fees up to date\", \"Scholarship holder\") must be\
        \ numeric and lie in a 0\u20131 domain (ideally binary 0/1). The calculation\
        \ (0.6*debtor + 0.3*(1-fees) - 0.2*scholar) assumes these columns represent\
        \ proportions/flags in [0,1].\nActionable constraint examples:\n.satisfies(\"\
        `Debtor` IN (0,1)\", [\"Debtor\"]) or .satisfies(\"`Debtor` >= 0 AND `Debtor`\
        \ <= 1\", [\"Debtor\"]) and similarly for the other two columns.\n.Alternatively\
        \ use a multi-column check ensuring all three are within [0,1]."
      sources:
      - start_line: 50
        end_line: 53
        file: ''
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 97
        end_line: 99
        file: ''
      uid: 91b4b23d-51ba-41d3-b7b8-6918b06685f0
    - text: 'For rows that will be scored (Target == ''Enrolled''), all numeric input
        columns used to compute risk_score must be present (non-null) and numeric.
        The risk computation combines many columns (approval/credited/enrolled counts,
        grades, debtor/fees/scholar, age, day indicator, application order, unemployment/GDP/inflation).
        If any of these are NULL for an enrolled student, risk_score will be NaN or
        misleading. Enforce non-nullness for the numeric columns for rows where Target
        == ''Enrolled''.

        Actionable constraint example (pseudo Deequ):

        .satisfies("(Target = ''Enrolled'') ==> (`Curricular units 1st sem (enrolled)`
        IS NOT NULL AND `Curricular units 1st sem (approved)` IS NOT NULL AND ...
        )", [list of numeric columns])'
      sources:
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 72
        end_line: 75
        file: ''
      - start_line: 121
        end_line: 133
        file: ''
      uid: 619a1aac-0461-41cf-9c18-2a485bb3cb99
