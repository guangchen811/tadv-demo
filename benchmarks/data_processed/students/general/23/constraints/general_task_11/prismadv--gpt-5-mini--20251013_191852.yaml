    assumptions:
    - text: 'Both ''Debtor'' and ''Tuition fees up to date'' are binary indicator
        columns with no missing values and only take values 0 or 1. Actionable checks
        (Deequ-style) to enforce this:

        - .hasCompleteness("Debtor", 1.0)

        - .isContainedIn("Debtor", [0, 1])

        - .hasCompleteness("Tuition fees up to date", 1.0)

        - .isContainedIn("Tuition fees up to date", [0, 1])

        These constraints ensure the subsequent arithmetic (e.g., 1 - df[c_fees],
        weighting of df[c_debtor]) behaves as intended.'
