    - text: 'To avoid unintended clipping in the normalization step ((inflation +
        2) / 7.0).clip(0,1), the majority of input values should lie within [-2, 5]
        so they map to the un-clipped 0..1 range. Enforce that a high fraction (e.g.,
        >= 0.95) of rows have Inflation rate between -2 and 5. Example Deequ constraint:

        - .satisfies("CASE WHEN `Inflation rate` >= -2 AND `Inflation rate` <= 5 THEN
        1 ELSE 0 END", "Inflation within [-2,5]", lambda x: x >= 0.95)'
