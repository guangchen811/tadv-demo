    assumptions:
    - text: 'The ''Inflation rate'' column must be numeric (parsable to a floating-point
        value) and should not contain NULLs. The code converts this column to numeric
        with pd.to_numeric(errors=''coerce'') and then uses it in arithmetic without
        any fillna, so the input must already be numeric and present for rows used
        in scoring. Example validation rules you could apply:

        - Deequ: .satisfies("CASE WHEN `Inflation rate` IS NOT NULL THEN 1 ELSE 0
        END", "Inflation not null", lambda x: x == 1)

        - Deequ (numeric parse): .satisfies("CASE WHEN TRY_CAST(`Inflation rate` AS
        DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Inflation numeric", lambda x: x ==
        1)

        (If you prefer Great Expectations, use expect_column_values_to_not_be_null
        and expect_column_values_to_be_in_type_list/expect_column_values_to_be_of_type.)'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 111
        end_line: 111
        file: ''
      uid: 1f1989b7-4dc6-4b4a-a119-659792bcbc19
    - text: 'The ''Inflation rate'' values are expected to be expressed as percentage-like
        numbers (e.g., 2.8 representing 2.8%), since the code uses a linear shift
        and scale (infl_norm = (inflation + 2) / 7.0). Validate that values are in
        a reasonable percent-scale range (not e.g. tiny fractions like 0.03 meaning
        3%) by asserting most values fall within realistic percent bounds. Example
        constraint:

