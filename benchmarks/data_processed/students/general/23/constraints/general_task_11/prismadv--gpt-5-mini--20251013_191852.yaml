    - text: 'The ''Age at enrollment'' column must be numeric and is expected to lie
        in the range 16 to 70 (the normalization uses (age - 16)/(70 - 16)). While
        values outside this range are clipped, for meaningful risk contributions age
        should be within [16,70]. An actionable constraint: numeric type + 16 <= Age
        at enrollment <= 70 (or at least flag ages outside this interval).'
      sources:
