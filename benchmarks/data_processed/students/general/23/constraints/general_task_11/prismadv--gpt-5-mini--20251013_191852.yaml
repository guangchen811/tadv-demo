        end_line: 71
        file: ''
      - start_line: 79
        end_line: 85
        file: ''
      uid: 496d8deb-38a5-4c78-bc08-3644e30e762e
    - text: The calculations of fail rates assume approved <= enrolled because fail_rate
        = (enrolled - approved) / enrolled. To avoid semantically invalid negative
        failures, assert for each semester that Curricular units Xth sem (approved)
        <= Curricular units Xth sem (enrolled). This is an important multi-column
        relation used by both fail_rate and derived engagement_penalty.
