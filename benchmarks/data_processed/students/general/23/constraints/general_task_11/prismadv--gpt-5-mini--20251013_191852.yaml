    - text: '`Curricular units 2nd sem (without evaluations)` must be within the enrolled
        range: for every row 0 <= `Curricular units 2nd sem (without evaluations)`
        <= `Curricular units 2nd sem (enrolled)`. Actionable check: no rows where
        (`Curricular units 2nd sem (without evaluations)` > `Curricular units 2nd
        sem (enrolled)`) or (`Curricular units 2nd sem (without evaluations)` < 0).
        (Pseudocode: df.filter((woeval > enr) | (woeval < 0)).count() == 0).'
