  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (credited)","Curricular
    units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'When computing rates for 1st-semester units, the counts of approved,
        credited and without-evaluations must be within the enrolled population. Concretely:
        for any row with Curricular units 1st sem (enrolled) > 0, the following must
        hold simultaneously: 0 <= Curricular units 1st sem (approved) <= Curricular
        units 1st sem (enrolled); 0 <= Curricular units 1st sem (credited) <= Curricular
        units 1st sem (enrolled); 0 <= Curricular units 1st sem (without evaluations)
        <= Curricular units 1st sem (enrolled). This can be expressed as Deequ-style
        / predicate constraints, e.g. a satisfies constraint such as:

        .satisfies("(c1_app >= 0) AND (c1_app <= c1_enr) AND (c1_cred >= 0) AND (c1_cred
        <= c1_enr) AND (c1_woeval >= 0) AND (c1_woeval <= c1_enr)", "first_sem_counts_within_enrolled")'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 75
        end_line: 77
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: 83817807-9d83-440f-a031-ab73bedd39a1
    - text: 'If Curricular units 1st sem (enrolled) == 0 then approval/credit/without-evaluations
        counts should all be zero. The code supplies defaults for division when enrolled==0
        (e.g., approval_rate default=1.0, woeval_rate default=0.0, credit_rate default=1.0),
        but to make those defaults semantically consistent we assume: when c1_enr
        == 0 then c1_app == 0 AND c1_cred == 0 AND c1_woeval == 0. Representable as
        e.g. .satisfies("(c1_enr != 0) OR (c1_app == 0 AND c1_cred == 0 AND c1_woeval
        == 0)", "zero_enrolled_zero_component_counts")'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 75
        end_line: 77
        file: ''
      uid: d0f47a3c-6a03-4f41-8400-1b1e92744957
    - text: 'Approved plus without-evaluations should not exceed enrolled: Curricular
        units 1st sem (approved) + Curricular units 1st sem (without evaluations)
        <= Curricular units 1st sem (enrolled). This prevents negative fail_rate numerators
        or impossible category overlaps and can be encoded as:

        .satisfies("c1_app + c1_woeval <= c1_enr", "approved_plus_noeval_le_enrolled")'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: f462b0b4-ae19-4812-9dae-29b890264c43
    - text: 'Credited units should not exceed approved units for the same semester:
        Curricular units 1st sem (credited) <= Curricular units 1st sem (approved).
        Enforceable with a predicate constraint such as:

        .satisfies("c1_cred <= c1_app", "credited_le_approved")'
      sources:
      - start_line: 77
        end_line: 77
        file: ''
      - start_line: 38
        end_line: 41
        file: ''
      uid: 8b90e018-0d6d-44e5-91f0-71b2f9b9f9a5
  '["Curricular units 1st sem (grade)","Curricular units 2nd sem (grade)"]':
    code: []
    assumptions:
    - text: 'Both ''Curricular units 1st sem (grade)'' and ''Curricular units 2nd
        sem (grade)'' are numeric (convertible to floats) and complete (no nulls)
        across the dataset. The code coerces numeric types (pd.to_numeric(..., errors=''coerce''))
        and subsequently performs arithmetic on these columns so missing or non-numeric
        values would break/alter results. Example actionable constraints: assert completeness
        == 1.0 for both columns (or .hasCompleteness on each column) and assert zero
        nulls for them. In Deequ-style terms: check.hasCompleteness(''Curricular units
        1st sem (grade)'', 1.0) and check.hasCompleteness(''Curricular units 2nd sem
        (grade)'', 1.0) (or run the check on the dataset after filtering/coercion).'
      sources:
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 79
        end_line: 85
        file: ''
      uid: bff137ec-98b0-4b7a-b132-17ea14125aa8
    - text: 'Both grade columns are expressed on a 0..20 scale and should fall inside
        that range. The script divides each grade by 20.0 and clips to [0,1], implying
        the original values are expected to be between 0 and 20; values outside that
        range will be clipped and distort normalized scores. Actionable constraint:
        assert each column is contained in range [0, 20]. In Deequ-style terms: check.isContainedInRange(''Curricular
        units 1st sem (grade)'', 0.0, 20.0) and check.isContainedInRange(''Curricular
        units 2nd sem (grade)'', 0.0, 20.0).'
      sources:
      - start_line: 79
        end_line: 85
        file: ''
      uid: 54b601f1-1754-4bb1-ae62-1eab722feb4c
    - text: 'For rows used to produce risk scores (rows where Target == ''Enrolled''),
        both semester grade columns must be present (non-null) so that academic_perf
        and academic_risk calculations are meaningful. The script filters enrolled
        rows (is_enrolled) and later computes risk_score using grade-derived features;
        missing grades for enrolled students would propagate NaNs into risk_score
        or result in incorrect normalization. Actionable constraint: on the filtered
        subset Target == ''Enrolled'', assert completeness == 1.0 for both grade columns
        (or equivalently assert zero nulls on that subset). In Deequ-style terms:
        apply the completeness checks to df.filter(col(''Target'') == ''Enrolled'').'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 79
        end_line: 85
        file: ''
      - start_line: 131
        end_line: 133
        file: ''
      uid: 45f9bf23-f9ca-490f-9911-033e0ff125f1
  '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (credited)","Curricular units 2nd sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'The three columns ''Curricular units 2nd sem (enrolled)'', ''Curricular
        units 2nd sem (approved)'', and ''Curricular units 2nd sem (credited)'' must
        not contain nulls (completeness = 100%) because they are converted to numeric
        and used together to compute rates. This can be expressed as row-level non-null
        constraints, e.g. in Deequ as: .hasCompleteness([''Curricular units 2nd sem
        (enrolled)'', ''Curricular units 2nd sem (approved)'', ''Curricular units
        2nd sem (credited)''], _ => 1.0) or as per-row checks with .satisfies for
        each column != null.'
      sources:
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: af902fea-2f22-48a5-8cb3-d10f04da85b5
    - text: 'All three columns represent non-negative integer counts. Each value in
        ''Curricular units 2nd sem (enrolled)'', ''Curricular units 2nd sem (approved)'',
        and ''Curricular units 2nd sem (credited)'' should be >= 0 (and integral).
        Actionable constraints: assert non-negativity and integer-ness, e.g. Deequ-like:
        .satisfies(''Curricular units 2nd sem (enrolled) >= 0'', ''enr_nonneg'') and
        similarly for the other two; optionally enforce integer by checking value
        == floor(value).'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 81
        end_line: 89
        file: ''
      uid: 4cfa0075-5b45-4c08-b362-3c9733bf29f6
    - text: 'Logical ordering between the columns: for each row, ''Curricular units
        2nd sem (approved)'' must be less than or equal to ''Curricular units 2nd
        sem (enrolled)'', and ''Curricular units 2nd sem (credited)'' must be less
        than or equal to ''Curricular units 2nd sem (approved)'' (so credited <= approved
        <= enrolled). Actionable constraint examples: .satisfies(''`Curricular units
        2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)`'', ''app_le_enr'')
        and .satisfies(''`Curricular units 2nd sem (credited)` <= `Curricular units
        2nd sem (approved)`'', ''cred_le_app'').'
      sources:
      - start_line: 81
        end_line: 89
        file: ''
      uid: 657cf966-1b82-40b2-97e8-97d451ab26d2
    - text: 'When ''Curricular units 2nd sem (enrolled)'' is zero, both ''Curricular
        units 2nd sem (approved)'' and ''Curricular units 2nd sem (credited)'' should
        be zero. This avoids relying on the robust_divide default behavior (which
        substitutes rates when denom==0) and ensures those defaulted rates reflect
        a logically consistent absence of courses. Enforceable as: .satisfies(''`Curricular
        units 2nd sem (enrolled)` == 0 => (`Curricular units 2nd sem (approved)` ==
        0 AND `Curricular units 2nd sem (credited)` == 0)'', ''zero_enrolled_zero_app_cred'').'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 88
        end_line: 89
        file: ''
      uid: 93755a4a-be98-4083-a9ad-808f538a2410
  ? '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (credited)","Curricular
    units 2nd sem (enrolled)","Curricular units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'Counts across 2nd-semester curricular-unit columns should form a coherent
        nonnegative hierarchy: for every row, 0 <= `Curricular units 2nd sem (credited)`
        <= `Curricular units 2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)`.
        Actionable checks: assert there are no rows where (`Curricular units 2nd sem
        (credited)` > `Curricular units 2nd sem (approved)`) OR (`Curricular units
        2nd sem (approved)` > `Curricular units 2nd sem (enrolled)`) OR any of these
        three columns < 0. (Deequ/pseudocode example: df.filter((cred > app) | (app
        > enr) | (cred < 0) | (app < 0)).count() == 0 or implement as a row-level
        implication constraint: app <= enr AND cred <= app.)'
