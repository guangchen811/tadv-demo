  '["Admission grade","Previous qualification (grade)"]':
    code: []
    assumptions:
    - text: 'For each semester (1st and 2nd): when the ''enrolled'' count > 0, the
        related counts ''approved'', ''credited'' and ''without evaluations'' must
        be non-negative and less than or equal to the ''enrolled'' count for the same
        semester. Actionable checks: for every row assert 0 <= Curricular units Xth
        sem (approved) <= Curricular units Xth sem (enrolled), 0 <= Curricular units
        Xth sem (credited) <= Curricular units Xth sem (enrolled), and 0 <= Curricular
        units Xth sem (without evaluations) <= Curricular units Xth sem (enrolled).
        In Deequ-style wording you can enforce these as row-level/aggregate constraints
        (e.g. fraction of rows where approved <= enrolled == 1.0, credited <= enrolled
        == 1.0, etc.).'
      sources:
      - start_line: 75
        end_line: 89
        file: ''
      uid: d7368c52-2413-4040-827d-f229ecff7365
    - text: 'For each semester (1st and 2nd): when the ''enrolled'' count == 0 the
        script''s defaults imply there should be no approved, credited or ''without
        evaluations'' units. Actionable check: for rows with Curricular units Xth
        sem (enrolled) == 0, assert Curricular units Xth sem (approved) == 0 AND Curricular
        units Xth sem (credited) == 0 AND Curricular units Xth sem (without evaluations)
        == 0. This prevents relying on the function defaults masking inconsistent
        data.'
      sources:
