  '["GDP","Inflation rate","Unemployment rate"]':
    code: []
    assumptions:
    - text: 'The three macroeconomic columns [''Unemployment rate'',''GDP'',''Inflation
        rate''] must be present and convertible to numeric, and contain no missing
        values because macro_risk is computed for every row using them. Actionable
        constraint example (Deequ): .isComplete([''Unemployment rate'',''GDP'',''Inflation
        rate'']) or .hasCompleteness(1.0, [''Unemployment rate'',''GDP'',''Inflation
        rate'']).'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 108
        end_line: 112
        file: ''
      uid: a339c3e5-9fc5-4504-bc7f-99a2eef9cedb
    - text: 'The three macro columns should lie inside reasonable economic bounds
        so the normalizations are meaningful. A practical, actionable assumption is:
        at least 95% of rows should satisfy (0 <= Unemployment rate <= 30) AND (-10
        <= GDP <= 10) AND (-10 <= Inflation rate <= 10). Actionable constraint example
        (Deequ): .satisfies("(Unemployment rate >= 0 AND Unemployment rate <= 30)
        AND (GDP >= -10 AND GDP <= 10) AND (Inflation rate >= -10 AND Inflation rate
        <= 10)", "macro_ranges") with a requirement that the constraint holds for
        >= 0.95 of rows.'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 108
        end_line: 112
        file: ''
      uid: 23b635a9-a77e-4f14-9c14-325ca11bdea6
    - text: 'The derived macro_risk (0.7 * unemp_norm + 0.2 * gdp_headwind + 0.1 *
        infl_norm) must be finite and within [0,1] for all rows (no NaN/Inf), since
        it is combined into the final risk_score. Actionable constraint examples:
        (1) compute macro_risk as an expression and assert .isComplete([''macro_risk''])
        and .hasMin(''macro_risk'', 0.0) and .hasMax(''macro_risk'', 1.0); or (2)
        use a Deequ .satisfies expression equivalent to the weighted normalization
        and clipping and assert all rows satisfy it (or no NaNs in the derived value).'
      sources:
      - start_line: 108
        end_line: 112
        file: ''
      - start_line: 121
        end_line: 127
        file: ''
      uid: e33b0af8-0c72-468c-8996-d3c861ca559c
