    code: []
    assumptions:
    - text: 'The ''Daytime/evening attendance'' column is a binary indicator where
        1 means day attendance and 0 means non-day/evening. The code computes is_day
        = (df[''Daytime/evening attendance''] == 1).astype(int) and uses it directly
        in attendance_risk, so values outside {0,1} are unexpected and should be constrained.
        An actionable constraint: restrict ''Daytime/evening attendance'' to the set
        {0,1} (optionally scoped to rows used for scoring).'
