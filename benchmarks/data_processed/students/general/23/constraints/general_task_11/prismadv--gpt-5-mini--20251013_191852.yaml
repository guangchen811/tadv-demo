    - text: "All academic enrollment/count columns used as denominators when computing\
        \ rates \u2014 specifically 'Curricular units 1st sem (enrolled)' and 'Curricular\
        \ units 2nd sem (enrolled)' \u2014 must be numeric and non-null (and >= 0).\
        \ The robust_divide helper only substitutes defaults when denom == 0; it does\
        \ not handle NaN denominators. If these enrollment counts are NaN the computed\
        \ approval_rate_*, woeval_rate_*, credit_rate_* and fail_rate_* will be NaN\
        \ and will break downstream risk_score computation for rows of interest (e.g.,\
        \ enrolled students). Suggested constraints: .isComplete([...enrolled columns...])\
        \ and .isNonNegative([...enrolled columns...]) for rows where Target == 'Enrolled'\
        \ or globally."
