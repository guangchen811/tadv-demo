  '["Debtor","Scholarship holder","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'The three financial indicator columns ''Debtor'', ''Tuition fees up to
        date'', and ''Scholarship holder'' are intended as binary indicator flags
        and must contain only the values 0 or 1 (or be coercible to numeric 0/1).
        This is required because financial_risk is computed as a linear combination
        that assumes these signals lie in [0,1] (and uses 1 - Tuition fees up to date).
        Example actionable checks (Deequ-style): for each col in [''Debtor'',''Tuition
        fees up to date'',''Scholarship holder''] assert that values are contained
        in the set {0,1} (or satisfy 0.0 <= col <= 1.0 and col in integers).'
      sources:
      - start_line: 50
        end_line: 52
        file: ''
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: b22cd94a-e159-4744-8b39-b9eb9024c585
    - text: 'For both semesters, any count used as a numerator (approved, credited,
        without-evaluations) must be less than or equal to the corresponding enrolled
        count. Concretely: c1_app <= c1_enr, c1_cred <= c1_enr, c1_woeval <= c1_enr,
        and the same for c2_app/c2_cred/c2_woeval vs c2_enr. This ensures the computed
        rates (numerator/denominator) are logically bounded <= 1 before clipping and
        avoids negative fail_rate values caused by inconsistent counts. Actionable
        checks: assert every row satisfies these inequalities.'
      sources:
      - start_line: 38
        end_line: 48
        file: ''
      - start_line: 62
        end_line: 69
        file: ''
      - start_line: 75
        end_line: 89
        file: ''
      uid: 12a88353-411f-4fbb-b027-42b136a20362
    - text: 'When enrolled count is zero for a semester (c1_enr == 0 or c2_enr ==
        0), the corresponding numerator counts should also be zero (e.g., if c1_enr
        == 0 then c1_app == 0, c1_cred == 0, c1_woeval == 0). The code supplies default
        rates for denom==0 (e.g., approval_rate default=1.0) but semantically rows
        with zero enrollment should not have positive approved/credited counts. Actionable
        checks: assert (enr == 0) implies (app == 0 and cred == 0 and woeval == 0)
        row-wise for both semesters.'
      sources:
      - start_line: 75
        end_line: 78
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 87
        end_line: 89
        file: ''
      uid: 24a4bab3-0b62-4a15-9e24-60b9b98afc38
    - text: 'Grade and prior-admission fields must fall in the expected ranges so
        the normalizations are meaningful: c1_grade and c2_grade should be within
        [0,20]; ''Previous qualification (grade)'' and ''Admission grade'' should
        be within [0,200]. Actionable checks: assert 0 <= c1_grade <= 20 and 0 <=
        c2_grade <= 20; assert 0 <= c_prev_grade <= 200 and 0 <= c_admission <= 200
        (or be null when not applicable).'
      sources:
      - start_line: 42
        end_line: 49
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 79
        end_line: 95
        file: ''
      uid: cfe0cb96-e4e5-4a03-afdf-86e1c9b5a77b
