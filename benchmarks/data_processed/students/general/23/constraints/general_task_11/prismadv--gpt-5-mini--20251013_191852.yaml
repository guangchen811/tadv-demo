        file: ''
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 102
        end_line: 102
        file: ''
      uid: a29cdfe3-afe9-4750-b292-b96014d856b7
    - text: 'For rows that will be scored (Target == ''Enrolled''), both ''Daytime/evening
        attendance'' and ''Age at enrollment'' should be present (non-missing) and
        numeric. attendance_risk is computed as ((1 - is_day) * 0.25 + age_norm *
        0.15) and thus depends on both columns; missingness in either for enrolled
        students will degrade or change the risk calculation. An actionable constraint:
        for rows with Target == ''Enrolled'', require completeness/isNotNull on both
        columns (and numeric type).'
