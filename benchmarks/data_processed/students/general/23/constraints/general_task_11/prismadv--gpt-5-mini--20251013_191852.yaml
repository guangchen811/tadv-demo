        file: ''
      uid: d5bb5851-c09d-4d56-93b0-abda0731f0e7
    - text: 'Logical consistency between the two flags: a row should not indicate
        that a student is a debtor and simultaneously have tuition fees marked up
        to date. In other words, there should be no rows where Debtor = 1 and `Tuition
        fees up to date` = 1. Actionable Deequ-style constraint:

        - .satisfies("NOT (Debtor = 1 AND `Tuition fees up to date` = 1)", "debtors_must_not_be_fees_up_to_date")

        (or equivalently: .satisfies("Debtor = 0 OR `Tuition fees up to date` = 0",
        "debtors_imply_fees_not_up_to_date")).

        This ensures the financial_risk formula (which uses both fields together)
        reflects a consistent business meaning.'
