    - text: 'The ''Debtor'' column is expected to be a binary indicator (0 or 1) or
        at least bounded to [0, 1]. The financial_risk computation multiplies this
        value by 0.6 and treats it as a proportion/flag; values outside {0,1} or outside
        [0,1] will change the intended scale of the risk score. Enforce that values
        are in {0,1} (preferred) or at minimum within [0,1]. Example Deequ constraint
        for binary:

        .satisfies("CASE WHEN `Debtor` IN (0, 1) THEN 1 ELSE 0 END", "Debtor is binary
        0/1", lambda x: x == 1.0)

        Or for bounded continuous values:

        .satisfies("CASE WHEN `Debtor` >= 0 AND `Debtor` <= 1 THEN 1 ELSE 0 END",
        "Debtor in [0,1]", lambda x: x == 1.0)

        '
      sources:
