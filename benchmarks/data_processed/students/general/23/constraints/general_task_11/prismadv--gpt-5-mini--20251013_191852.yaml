        enrolled). This ensures credit_rate calculations are meaningful. Example Deequ
        constraint: .satisfies("`Curricular units 1st sem (credited)` <= `Curricular
        units 1st sem (enrolled)`", "c1_cred_le_c1_enr") and similarly for the 2nd
        sem: .satisfies("`Curricular units 2nd sem (credited)` <= `Curricular units
        2nd sem (enrolled)`", "c2_cred_le_c2_enr").'
      sources:
      - start_line: 40
        end_line: 46
        file: ''
      - start_line: 77
        end_line: 83
        file: ''
      uid: 71ae86e9-bb8d-4170-82e3-f95d5dd4e657
    - text: 'For each semester, the number of curricular units without evaluations
        should be less than or equal to the number of enrolled curricular units (without_evaluations
        <= enrolled). This makes the woeval_rate ratios consistent. Example Deequ
        constraint: .satisfies("`Curricular units 1st sem (without evaluations)` <=
        `Curricular units 1st sem (enrolled)`", "c1_woeval_le_c1_enr") and similarly
        for the 2nd sem.'
      sources:
      - start_line: 41
        end_line: 47
        file: ''
      - start_line: 76
        end_line: 83
        file: ''
      uid: 9cbd6869-51b1-45b6-b478-cd4563e4bb05
    - text: 'Rows where Target == ''Enrolled'' should have at least one enrolled curricular
        unit in at least one semester (e.g., Curricular units 1st sem (enrolled) >
        0 OR Curricular units 2nd sem (enrolled) > 0). This ensures the script''s
        enrolled subset corresponds to actual enrolled students. Example Deequ-style
        check (SQL expression): .satisfies("`Target` <> ''Enrolled'' OR (`Curricular
        units 1st sem (enrolled)` > 0 OR `Curricular units 2nd sem (enrolled)` > 0)",
        "enrolled_flag_matches_enrollment_counts").'
      sources:
      - start_line: 73
        end_line: 75
        file: ''
      - start_line: 131
        end_line: 133
        file: ''
      uid: 3e91f466-1c44-4708-8320-364f216079b1
    - text: 'The financial indicator columns used together (Debtor, Tuition fees up
        to date, Scholarship holder) are expected to be binary-like indicators (0/1).
        The financial_risk arithmetic assumes these behave as proportions in [0,1].
        Example Deequ constraints: .satisfies("`Debtor` IN (0,1)", "debtor_binary"),
        .satisfies("`Tuition fees up to date` IN (0,1)", "fees_binary"), .satisfies("`Scholarship
        holder` IN (0,1)", "scholar_binary").'
      sources:
      - start_line: 50
        end_line: 53
        file: ''
      - start_line: 98
        end_line: 99
        file: ''
      uid: d3828aba-c5bd-458e-af8f-e269db921e84
    - text: 'Admission grade and Previous qualification (grade) are both expected
        to be on scales that map into [0,200] (the code divides by 200 then clips
        to [0,1]). Constrain both to fall in a plausible range such as [0,200]. Example
        Deequ constraints: .satisfies("`Admission grade` BETWEEN 0 AND 200", "admission_in_range"),
        .satisfies("`Previous qualification (grade)` BETWEEN 0 AND 200", "prev_grade_in_range").'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 93
        end_line: 95
        file: ''
      uid: 163d362c-03e2-4670-9901-b38cb9a2cece
    - text: 'Both semester grade columns are expected to be on a 0-20 scale (the code
        divides by 20 and clips to [0,1]). Enforce that Curricular units 1st sem (grade)
        and Curricular units 2nd sem (grade) lie within [0,20]. Example constraint:
        .satisfies("`Curricular units 1st sem (grade)` BETWEEN 0 AND 20 AND `Curricular
        units 2nd sem (grade)` BETWEEN 0 AND 20", "grades_in_0_20").'
      sources:
      - start_line: 42
        end_line: 48
        file: ''
      - start_line: 79
        end_line: 85
        file: ''
      uid: d89dd1a0-1f54-405a-80ac-ee5fcddfd0ea
    - text: 'Application order is expected to be an integer in the range [1,9] because
        the code normalizes it via (app_order - 1) / 8 and clips to [0,1]. Example
        Deequ constraint: .satisfies("`Application order` BETWEEN 1 AND 9", "app_order_in_range").'
      sources:
