        students. This can be expressed as Deequ-like constraints: .isComplete([''Previous
        qualification (grade)'', ''Admission grade'']) and .isContainedInRange(''Previous
        qualification (grade)'', 0, 200) and .isContainedInRange(''Admission grade'',
        0, 200) applied at least on rows where Target == ''Enrolled''.'
