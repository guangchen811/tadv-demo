constraints:
  Admission grade:
    code:
    - - .isBetween('Admission grade', 0.0, 200.0)
      - Invalid
    assumptions: []
  Age at enrollment:
    code:
    - - .isPositive('Age at enrollment')
      - Invalid
    assumptions: []
  Application order:
    code:
    - - .isPositive('Application order')
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isNonNegative('Curricular units 1st sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .isNonNegative('Curricular units 2nd sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 2nd sem (enrolled)')
      - Invalid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - .isComplete('`Daytime/evening attendance\t`')
      - Valid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', [0, 1])
      - Invalid
    assumptions: []
  Displaced:
    code:
    - - .isContainedIn('Displaced', [0, 1])
      - Invalid
    assumptions: []
  GDP:
    code:
    - - .isComplete('GDP')
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', [0, 1])
      - Invalid
    assumptions: []
  International:
    code:
    - - .isContainedIn('International', [0, 1])
      - Invalid
    assumptions: []
  Previous qualification (grade):
    code:
    - - .isBetween('Previous qualification (grade)', 0.0, 200.0)
      - Invalid
    assumptions: []
  Scholarship holder:
    code:
    - - .isContainedIn('Scholarship holder', [0, 1])
      - Invalid
    assumptions: []
  Target:
    code:
    - - .isComplete('Target')
      - Valid
    - - .isContainedIn('Target', ['Graduate', 'Dropout', 'Enrolled'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', [0, 1])
      - Invalid
    assumptions: []
  Unemployment rate:
    code:
    - - .isComplete('Unemployment rate')
      - Valid
    assumptions: []
  first_sem_consistency:
    code:
    - - '.satisfies(''`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (enrolled)`'', ''S1: Approved units should not exceed enrolled units'')'
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  second_sem_consistency:
    code:
    - - '.satisfies(''`Curricular units 2nd sem (approved)` <= `Curricular units 2nd
        sem (enrolled)`'', ''S2: Approved units should not exceed enrolled units'')'
      - Valid
    assumptions: []
