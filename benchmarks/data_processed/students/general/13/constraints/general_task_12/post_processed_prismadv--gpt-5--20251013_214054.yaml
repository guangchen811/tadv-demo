  '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (evaluations)"]':
    code: []
    assumptions:
    - text: 'For 1st semester, the number of curricular units with evaluations must
        not exceed the number enrolled, and if enrolled is 0 then evaluations must
        be 0. This keeps the eval_ratio within [0, 1] and prevents invalid ratios.
        Possible Deequ: .hasCompliance(''eval_le_enrolled'', ''(`Curricular units
        1st sem (enrolled)` == 0 AND `Curricular units 1st sem (evaluations)` == 0)
        OR (`Curricular units 1st sem (enrolled)` > 0 AND `Curricular units 1st sem
        (evaluations)` <= `Curricular units 1st sem (enrolled)`)'')'
      sources:
      - start_line: 39
        end_line: 45
        file: ''
      uid: b8e7b211-7f5c-4702-a137-b9b40d6d2ed8
    - text: 'For 1st semester, the number of approved curricular units must be less
        than or equal to the number evaluated, and the number evaluated must be less
        than or equal to the number enrolled. This keeps approved_ratio within [0,
        1]. Possible Deequ: .hasCompliance(''approved_le_eval'', ''`Curricular units
        1st sem (approved)` <= `Curricular units 1st sem (evaluations)` AND `Curricular
        units 1st sem (evaluations)` <= `Curricular units 1st sem (enrolled)`'')'
      sources:
      - start_line: 39
        end_line: 45
        file: ''
      uid: 871df027-4b5e-4e5b-9b9c-7900d91414c2
    - text: 'For 1st semester, the three counts must be consistent: evaluations +
        without evaluations equals enrolled. This ensures lack_eval_flag aligns with
        shortfalls in evaluations. Possible Deequ: .hasCompliance(''eval_without_sum_enrolled'',
        ''`Curricular units 1st sem (evaluations)` + `Curricular units 1st sem (without
        evaluations)` = `Curricular units 1st sem (enrolled)`'')'
      sources:
