        end_line: 45
        file: ''
      uid: d13670be-25c0-4796-af65-f2df482a0ffb
  '["Curricular units 1st sem (approved)","Curricular units 1st sem (evaluations)"]':
    code: []
    assumptions:
    - text: 'Counts are consistent and bounded across 1st-semester columns: ''Curricular
        units 1st sem (approved)'' must be between 0 and ''Curricular units 1st sem
        (evaluations)'', and ''Curricular units 1st sem (evaluations)'' must be between
        0 and ''Curricular units 1st sem (enrolled)''. This keeps derived ratios in
        [0,1]. Deequ-style: .satisfies("`Curricular units 1st sem (approved)` >= 0
        AND `Curricular units 1st sem (approved)` <= `Curricular units 1st sem (evaluations)`
        AND `Curricular units 1st sem (evaluations)` >= 0 AND `Curricular units 1st
        sem (evaluations)` <= `Curricular units 1st sem (enrolled)`", "approved_eval_enrolled_bounds")'
      sources:
      - start_line: 39
        end_line: 45
        file: ''
      uid: e7487d58-c282-4e64-86e4-0ea896892419
    - text: '''Curricular units 1st sem (without evaluations)'' represents the remainder
        of enrolled units that were not evaluated and must equal ''Curricular units
        1st sem (enrolled)'' - ''Curricular units 1st sem (evaluations)'', and be
        non-negative. Deequ-style: .satisfies("`Curricular units 1st sem (without
        evaluations)` = `Curricular units 1st sem (enrolled)` - `Curricular units
        1st sem (evaluations)` AND `Curricular units 1st sem (without evaluations)`
        >= 0", "without_equals_enrolled_minus_evaluations")'
      sources:
      - start_line: 39
        end_line: 41
        file: ''
      - start_line: 70
        end_line: 71
        file: ''
      uid: db4882cc-2f35-41d0-87b5-660e5f0fc239
    - text: 'Zero-enrollment rows must have zero evaluations and zero approvals: If
        ''Curricular units 1st sem (enrolled)'' = 0 then ''Curricular units 1st sem
        (evaluations)'' = 0 and ''Curricular units 1st sem (approved)'' = 0. Deequ-style:
        .satisfies("CASE WHEN `Curricular units 1st sem (enrolled)` = 0 THEN (`Curricular
        units 1st sem (evaluations)` = 0 AND `Curricular units 1st sem (approved)`
        = 0) ELSE true END", "zero_enrolled_implies_zero_eval_and_approved")'
      sources:
