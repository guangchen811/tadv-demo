        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: c4befd20-b4d3-47ba-abbc-4fba7dfe08e5
    - text: 'The ''Debtor'' column should be a binary indicator with values only in
        {0, 1}. It is used as an indicator in a weighted risk formula; non-binary
        values would distort the financial risk before clipping. Example validations:
        Deequ .isContainedIn(''Debtor'', [0, 1]) OR Great Expectations expect_column_values_to_be_in_set(''Debtor'',
        [0, 1]).'
      sources:
