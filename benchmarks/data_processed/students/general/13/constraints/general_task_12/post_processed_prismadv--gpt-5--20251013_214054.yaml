        end_line: 45
        file: ''
      uid: 6077daeb-e188-4e0d-b192-b157bff5e6bd
    - text: 'Zero-evaluations rows must have zero approvals: If ''Curricular units
        1st sem (evaluations)'' = 0 then ''Curricular units 1st sem (approved)'' =
        0. Deequ-style: .satisfies("CASE WHEN `Curricular units 1st sem (evaluations)`
        = 0 THEN `Curricular units 1st sem (approved)` = 0 ELSE true END", "zero_evaluations_implies_zero_approved")'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
