    assumptions:
    - text: 'The input must contain the column ''Debtor''. If the column is missing,
        the script will fail when accessing df[''Debtor''] and during downstream computations
        and outputs. Example validation: Great Expectations expect_column_to_exist(''Debtor'').'
      sources:
