        end_line: 45
        file: ''
      uid: dd10ca7f-d424-4427-9f24-e4a50658bf0f
    - text: '''Curricular units 1st sem (without evaluations)'' must be a subset of
        ''Curricular units 1st sem (enrolled)'': it is non-negative and cannot exceed
        ''enrolled''. Deequ example: .satisfies("`Curricular units 1st sem (without
        evaluations)` >= 0 AND `Curricular units 1st sem (without evaluations)` <=
        `Curricular units 1st sem (enrolled)`", "without_within_enrolled")'
      sources:
      - start_line: 39
        end_line: 41
        file: ''
      - start_line: 70
        end_line: 72
        file: ''
      uid: 25318f3c-50be-4be5-a95c-2fb721607fd3
    - text: 'The combined counts of ''Curricular units 1st sem (evaluations)'' and
        ''Curricular units 1st sem (without evaluations)'' must not exceed ''Curricular
        units 1st sem (enrolled)''. Deequ example: .satisfies("`Curricular units 1st
        sem (evaluations)` + `Curricular units 1st sem (without evaluations)` <= `Curricular
        units 1st sem (enrolled)`", "eval_plus_without_le_enrolled")'
      sources:
      - start_line: 39
        end_line: 41
        file: ''
      uid: e70819a9-72c1-437c-9a67-b1719f365095
    - text: 'If ''Curricular units 1st sem (enrolled)'' equals 0, then both ''Curricular
        units 1st sem (evaluations)'' and ''Curricular units 1st sem (without evaluations)''
        must be 0. Deequ example: .satisfies("(`Curricular units 1st sem (enrolled)`
        > 0) OR ((`Curricular units 1st sem (evaluations)` = 0) AND (`Curricular units
        1st sem (without evaluations)` = 0))", "zero_enrolled_implies_zero_counts")'
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      uid: aaea3f32-7bf4-4140-9c7c-72700a7b0258
  '["Curricular units 1st sem (grade)","Curricular units 2nd sem (grade)"]':
    code: []
    assumptions:
    - text: 'Both ''Curricular units 1st sem (grade)'' and ''Curricular units 2nd
        sem (grade)'' must exist, be numeric, and be non-null for all rows so that
        avg_grade, grade_diff, consistency, and risk_grades are computable without
        producing NaN. Example Deequ: isComplete(''Curricular units 1st sem (grade)''),
        isComplete(''Curricular units 2nd sem (grade)''), hasDataType(..., Fractional,
        ConstrainableDataTypes.Integral=false) for both, or satisfies(''isnotnull(g1)
        and isnotnull(g2)'', ''forall'').'
      sources:
      - start_line: 20
        end_line: 36
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 48
        end_line: 53
        file: ''
      - start_line: 74
        end_line: 76
        file: ''
      uid: 420a48da-bd63-4e45-bef3-b7a5a70f30f7
    - text: "Both semester grade columns share the same 0\u201320 grading scale: enforce\
        \ 0 <= 'Curricular units 1st sem (grade)' <= 20 and 0 <= 'Curricular units\
        \ 2nd sem (grade)' <= 20. Example Deequ: satisfies('(g1 >= 0 and g1 <= 20)\
        \ and (g2 >= 0 and g2 <= 20)', 'forall') or hasMin/hasMax per column."
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: e61bd2b0-2bed-4834-bbb8-724cf234c125
    - text: 'The cross-semester grade gap should be bounded: abs(''Curricular units
        1st sem (grade)'' - ''Curricular units 2nd sem (grade)'') <= 6 for all rows
        (the consistency scaling uses 6 points as the full spread). Example Deequ:
        satisfies(''abs(g1 - g2) <= 6'', ''forall'').'
      sources:
      - start_line: 51
        end_line: 53
        file: ''
      uid: bf9b6be9-64d0-455f-84a9-035894fb1b98
    - text: "The pairwise average of the two semester grades must also lie on the\
        \ same 0\u201320 scale: 0 <= (g1 + g2)/2 <= 20. Example Deequ: satisfies('((g1\
        \ + g2)/2) >= 0 and ((g1 + g2)/2) <= 20', 'forall')."
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: e6405caf-6086-481d-8c7a-8ba3f52523c1
    - text: 'The two semester grade columns should be positively correlated (students
        tend to perform similarly across semesters); enforce a minimum correlation
        threshold, e.g., corr(g1, g2) >= 0.2. Example Deequ: hasCorrelation(''Curricular
        units 1st sem (grade)'', ''Curricular units 2nd sem (grade)'', lowerBound=0.2).'
      sources:
      - start_line: 51
        end_line: 53
        file: ''
      uid: 3578323b-1e9c-410a-9a0c-360804494292
    - text: '1st-semester activity counts must be logically consistent: 0 <= ''Curricular
        units 1st sem (approved)'' <= ''Curricular units 1st sem (evaluations)'' <=
        ''Curricular units 1st sem (enrolled)''; 0 <= ''Curricular units 1st sem (without
        evaluations)'' <= ''Curricular units 1st sem (enrolled)''; and ''Curricular
        units 1st sem (evaluations)'' + ''Curricular units 1st sem (without evaluations)''
        <= ''Curricular units 1st sem (enrolled)''. Example Deequ: satisfies(''approved
        <= evaluations and evaluations <= enrolled and without_evaluations <= enrolled
        and evaluations + without_evaluations <= enrolled'', ''forall'').'
      sources:
      - start_line: 39
        end_line: 45
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      uid: 7e69d21d-8996-43c3-90e1-ed43bf43b26b
  Debtor:
