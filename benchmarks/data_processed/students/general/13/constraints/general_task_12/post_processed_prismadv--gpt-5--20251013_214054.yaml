  '["Admission grade","Previous qualification (grade)"]':
    code: []
    assumptions:
    - text: 'Admission grade and Previous qualification (grade) must both be present
        (non-null) and parseable as numeric for every record. This ensures downstream
        arithmetic (averages, differences) does not introduce NaNs. Possible Deequ:
        .isComplete(''Admission grade'') AND .isComplete(''Previous qualification
        (grade)'') AND .hasDataType(''Admission grade'', ConstrainableDataTypes.Integral
        OR Fractional) AND .hasDataType(''Previous qualification (grade)'', ConstrainableDataTypes.Integral
        OR Fractional).'
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 56
        end_line: 57
        file: ''
      uid: fb71f0a8-1ce6-4ed6-8c82-237b72c3858c
    - text: "Admission grade and Previous qualification (grade) are on the same 0\u2013\
        200 scale (both within [0, 200]). This is implied by dividing their mean by\
        \ 200. Deequ example: .satisfies('Admission grade >= 0 AND Admission grade\
        \ <= 200 AND `Previous qualification (grade)` >= 0 AND `Previous qualification\
        \ (grade)` <= 200', 'grades_in_0_200', v => v == 1.0)."
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      uid: 59efa783-b00b-4e08-990d-f48afcda9c94
    - text: 'The absolute difference between Admission grade and Previous qualification
        (grade) should typically be <= 50 (reflecting comparable pre-entry measures).
        Enforce as a soft rule, e.g., at least 95% compliance. Deequ: .satisfies(''abs(Admission
        grade - `Previous qualification (grade)`) <= 50'', ''grade_diff_within_50'',
        v => v >= 0.95).'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: 827c05e9-fe91-4b71-a9f5-84b8b22abd29
    - text: 'risk_prep must equal the deterministic function of Admission grade and
        Previous qualification (grade): risk_prep = clip( (1 - ((Admission grade +
        `Previous qualification (grade)`) / 2) / 200) * 0.75 + (1 - abs(Admission
        grade - `Previous qualification (grade)`) / 50) * 0.25, 0, 1 ). This ties
        the output feature to the two input grade columns. Deequ (row-level): .satisfies(''risk_prep
        = greatest(0.0, least(1.0, (1 - ((`Admission grade` + `Previous qualification
        (grade)`) / 2) / 200) * 0.75 + (1 - abs(`Admission grade` - `Previous qualification
        (grade)`)/50) * 0.25)))'', ''risk_prep_formula'', v => v == 1.0).'
      sources:
      - start_line: 56
        end_line: 61
        file: ''
      - start_line: 78
        end_line: 79
        file: ''
      uid: 31a2eebf-0120-46fb-b7e6-bf05b39eb3d2
    - text: 'Curricular units 1st sem (evaluations) must not exceed Curricular units
        1st sem (enrolled), and Curricular units 1st sem (approved) must not exceed
        Curricular units 1st sem (evaluations). Also, Curricular units 1st sem (without
        evaluations) + Curricular units 1st sem (evaluations) should equal Curricular
        units 1st sem (enrolled) for most records (>= 0.98). Deequ: .satisfies(''`Curricular
        units 1st sem (evaluations)` <= `Curricular units 1st sem (enrolled)` AND
        `Curricular units 1st sem (approved)` <= `Curricular units 1st sem (evaluations)`'',
        ''s1_monotone'', v => v == 1.0) AND .satisfies(''`Curricular units 1st sem
        (without evaluations)` + `Curricular units 1st sem (evaluations)` = `Curricular
        units 1st sem (enrolled)`'', ''s1_parts_sum'', v => v >= 0.98).'
      sources:
      - start_line: 39
        end_line: 46
        file: ''
      uid: 1748e88f-43fc-4baa-9e32-220b6ba832e9
    - text: 'risk_score must equal the weighted sum of its components plus the Application
        order adjustment, then clipped to [0,1]: risk_score = clip(0.35*risk_engagement
        + 0.25*risk_grades + 0.20*risk_prep + 0.20*risk_financial + (case when `Application
        order`=1 then -0.05 when `Application order` in (0,9) then 0.05 else 0 end),
        0, 1). Deequ: .satisfies(''risk_score = greatest(0.0, least(1.0, 0.35*risk_engagement
        + 0.25*risk_grades + 0.20*risk_prep + 0.20*risk_financial + (case when `Application
        order`=1 then -0.05 when `Application order` in (0,9) then 0.05 else 0 end)))'',
        ''risk_score_formula'', v => v == 1.0).'
      sources:
      - start_line: 85
        end_line: 88
        file: ''
      - start_line: 70
        end_line: 76
        file: ''
      uid: ae03ca68-e37e-43bb-9fa4-2e9721183de9
    - text: 'risk_band must be a binning of risk_score using the exact intervals [0.0,
        0.33] -> ''low'', (0.33, 0.66] -> ''medium'', (0.66, 1.0] -> ''high''. Deequ:
        .satisfies(''(risk_score >= 0.0 AND risk_score <= 0.33 AND risk_band = "low")
        OR (risk_score > 0.33 AND risk_score <= 0.66 AND risk_band = "medium") OR
        (risk_score > 0.66 AND risk_score <= 1.0 AND risk_band = "high") OR risk_score
        IS NULL AND risk_band IS NULL'', ''risk_band_from_score'', v => v == 1.0).'
      sources:
      - start_line: 108
        end_line: 111
        file: ''
      uid: 8b9ffbe8-7302-48d7-95b0-9844f72978a2
    - text: 'recommended_action must deterministically follow from risk_financial
        and risk_score: recommended_action = ''tuition_collection'' iff (risk_financial
        >= 0.5 AND risk_score >= 0.4), otherwise ''retention_outreach''. Deequ: .satisfies(''(risk_financial
        >= 0.5 AND risk_score >= 0.4 AND recommended_action = "tuition_collection")
        OR (NOT (risk_financial >= 0.5 AND risk_score >= 0.4) AND recommended_action
        = "retention_outreach")'', ''recommended_action_rule'', v => v == 1.0).'
      sources:
      - start_line: 112
        end_line: 113
        file: ''
      uid: e7378d46-5c32-405a-a2ae-bb79c8a4436a
    - text: 'priority_score must equal risk_score*0.7 + risk_financial*0.3 + 0.05
        when recommended_action == ''tuition_collection'', else risk_score*0.7 + risk_financial*0.3.
        Deequ: .satisfies(''priority_score = risk_score*0.7 + risk_financial*0.3 +
        case when recommended_action = "tuition_collection" then 0.05 else 0.0 end'',
        ''priority_score_rule'', v => v == 1.0).'
      sources:
      - start_line: 115
        end_line: 116
        file: ''
      uid: ee66e14d-b897-4402-b28e-3b0d7776618a
    - text: 'Admission grade and Previous qualification (grade) should be positively
        correlated (they measure similar constructs); target Pearson correlation >=
        0.5 as a health check. Deequ: .hasCorrelation(''Admission grade'', ''Previous
        qualification (grade)'', _ >= 0.5).'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: de87d160-d94b-41ab-ae96-11ccb73fcc9b
  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)","Curricular
    units 1st sem (evaluations)","Curricular units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For each record, ''Curricular units 1st sem (evaluations)'' must be between
        0 and ''Curricular units 1st sem (enrolled)''. If ''Curricular units 1st sem
        (enrolled)'' == 0, then ''Curricular units 1st sem (evaluations)'' must be
        0. This keeps the evaluation/enrolled division well-defined and bounded. Example
        Deequ: hasCompliance(''eval_le_enrolled'', ''`Curricular units 1st sem (evaluations)`
        >= 0 AND `Curricular units 1st sem (evaluations)` <= `Curricular units 1st
        sem (enrolled)` AND (CASE WHEN `Curricular units 1st sem (enrolled)` = 0 THEN
        `Curricular units 1st sem (evaluations)` = 0 ELSE true END)'')'
      sources:
      - start_line: 39
        end_line: 45
        file: ''
      uid: 3f2ce5ec-fdb4-4257-8d26-3e21dbe64808
    - text: 'For each record, ''Curricular units 1st sem (approved)'' must be between
        0 and ''Curricular units 1st sem (evaluations)''. If ''Curricular units 1st
        sem (evaluations)'' == 0, then ''Curricular units 1st sem (approved)'' must
        be 0. This keeps the approved/evaluated division well-defined and bounded.
        Example Deequ: hasCompliance(''approved_le_evaluations'', ''`Curricular units
        1st sem (approved)` >= 0 AND `Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (evaluations)` AND (CASE WHEN `Curricular units 1st sem (evaluations)`
        = 0 THEN `Curricular units 1st sem (approved)` = 0 ELSE true END)'')'
      sources:
      - start_line: 41
        end_line: 45
        file: ''
      uid: a76c766a-56c1-47aa-84a8-e2f7fa36fc26
    - text: '''Curricular units 1st sem (without evaluations)'' should be the complement
        of evaluations within enrolled: for every record, `evaluations + without_evaluations
        = enrolled`. This implies 0 <= ''without evaluations'' <= ''enrolled'' and
        aligns the lack-evaluation flag with enrollment/evaluation counts. Example
        Deequ: hasCompliance(''eval_plus_without_eq_enrolled'', ''`Curricular units
        1st sem (evaluations)` + `Curricular units 1st sem (without evaluations)`
        = `Curricular units 1st sem (enrolled)`'')'
      sources:
      - start_line: 39
        end_line: 42
        file: ''
      - start_line: 70
        end_line: 71
        file: ''
      uid: e6cbd154-1ff5-4327-97d9-e4672bd64286
    - text: "The ratios implied by the counts must be bounded in [0,1]: when 'enrolled'\
        \ > 0, `evaluations / enrolled` \u2208 [0,1]; when 'evaluations' > 0, `approved\
        \ / evaluations` \u2208 [0,1]. This ensures the downstream eval_ratio and\
        \ approved_ratio features are valid probabilities. Example Deequ: hasCompliance('ratios_in_01',\
        \ '(CASE WHEN `Curricular units 1st sem (enrolled)` > 0 THEN `Curricular units\
        \ 1st sem (evaluations)` / `Curricular units 1st sem (enrolled)` BETWEEN 0\
        \ AND 1 ELSE true END) AND (CASE WHEN `Curricular units 1st sem (evaluations)`\
        \ > 0 THEN `Curricular units 1st sem (approved)` / `Curricular units 1st sem\
        \ (evaluations)` BETWEEN 0 AND 1 ELSE true END)')"
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 104
        end_line: 105
        file: ''
      uid: 37eccd2a-0f62-43d5-8384-6f9ca9d91452
    - text: 'Monotonicity across the four counts should hold per record: 0 <= ''Curricular
        units 1st sem (approved)'' <= ''Curricular units 1st sem (evaluations)'' <=
        ''Curricular units 1st sem (enrolled)''. Example Deequ: hasCompliance(''approved_eval_enrolled_chain'',
        ''`Curricular units 1st sem (approved)` >= 0 AND `Curricular units 1st sem
        (evaluations)` >= 0 AND `Curricular units 1st sem (enrolled)` >= 0 AND `Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (evaluations)` AND
        `Curricular units 1st sem (evaluations)` <= `Curricular units 1st sem (enrolled)`'')'
