  ? '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (evaluations)","Curricular
    units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For rows with ''Curricular units 1st sem (enrolled)'' > 0, the count
        of ''Curricular units 1st sem (evaluations)'' must be between 0 and ''Curricular
        units 1st sem (enrolled)'' (i.e., the ratio evaluations/enrolled is in [0,1]).
        We could represent this as a Deequ constraint: .satisfies("`Curricular units
        1st sem (enrolled)` = 0 OR (`Curricular units 1st sem (evaluations)` >= 0
        AND `Curricular units 1st sem (evaluations)` <= `Curricular units 1st sem
        (enrolled)`)", "eval_within_enrolled")'
      sources:
