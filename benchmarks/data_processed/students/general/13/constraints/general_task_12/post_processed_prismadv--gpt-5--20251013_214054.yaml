  '["Debtor","Scholarship holder","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'The financial indicator columns Debtor, Tuition fees up to date, and
        Scholarship holder must be present, non-null, and binary (values only in {0,1})
        for every record; they are cast to integers and used in arithmetic/boolean
        logic without null handling. This can be checked with Deequ as a combined
        compliance like: Debtor IN (0,1) AND `Tuition fees up to date` IN (0,1) AND
        `Scholarship holder` IN (0,1), together with completeness checks on all three
        columns.'
      sources:
      - start_line: 29
        end_line: 36
        file: ''
      - start_line: 64
        end_line: 66
        file: ''
      uid: 3bd94d8e-f092-4dcc-8d29-0c13ec2de4c4
    - text: 'Debtor and Tuition fees up to date must be mutually exclusive in the
        ''1'' state: no row should have Debtor = 1 and Tuition fees up to date = 1
        simultaneously (non-contradictory financial flags). Deequ compliance example:
        NOT (Debtor = 1 AND `Tuition fees up to date` = 1).'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      uid: bcbcbf59-5ae0-4a03-82e2-0bd4d9cb1d7f
    - text: 'If Tuition fees up to date = 1 then Debtor must be 0 (being fully up
        to date precludes being a debtor). Deequ compliance example: (`Tuition fees
        up to date` = 1) => (Debtor = 0).'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      uid: d5fdf223-8dcf-4b80-8676-80bdfcef6739
    - text: 'For rows with Debtor = 0 and Tuition fees up to date = 1, the derived
        risk_financial must be exactly 0 after clipping (0.6*0 + 0.4*(1-1) + scholarship
        adjustment 0 = 0). Deequ compliance example on the produced output: (`Tuition
        fees up to date` = 1 AND Debtor = 0) => (risk_financial = 0.0).'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      uid: b110d715-2235-444d-8aad-91fd315987ed
    - text: 'For rows with Scholarship holder = 1 and Tuition fees up to date = 0
        and Debtor = 1, the derived risk_financial must equal 1.0 after clipping (0.6*1
        + 0.4*(1-0) + 0.2 = 1.2, clipped to 1.0). Deequ compliance example on the
        produced output: (`Scholarship holder` = 1 AND `Tuition fees up to date` =
        0 AND Debtor = 1) => (risk_financial = 1.0).'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      uid: 9d2c1f79-805b-4347-bd9a-ad2eb361b9cf
  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'The columns ''Debtor'' and ''Tuition fees up to date'' must both be present,
        parseable as integers, and binary indicators taking only values 0 or 1. This
        is required because they are cast to integers and used arithmetically to compute
        financial risk. We could represent this as Deequ constraints like: .hasCompleteness(''Debtor'',
        1.0), .hasCompleteness(''Tuition fees up to date'', 1.0), and .addConstraint(Compliance(''debtor_and_fees_binary'',
        "(Debtor IN (0,1)) AND (`Tuition fees up to date` IN (0,1))"))).'
      sources:
      - start_line: 29
        end_line: 36
        file: ''
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: b9d2fb9a-ecba-40e9-a5a1-ef5192c98c8d
    - text: 'Logical consistency between the two financial flags: if ''Tuition fees
        up to date'' = 1 (fees current), then ''Debtor'' must be 0 (not a debtor).
        This prevents contradictory states that would otherwise distort ''risk_financial''.
        As a Deequ compliance rule: Compliance(''fees_current_implies_not_debtor'',
        "CASE WHEN `Tuition fees up to date` = 1 THEN Debtor = 0 ELSE true END").'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      uid: 77ba39c3-5c73-4091-be4d-c084cb86addf
    - text: 'The derived ''risk_financial'' in the output must equal the clipped linear
        combination of ''Debtor'' and ''Tuition fees up to date'' (with the scholarship
        penalty), i.e., risk_financial = clip(0.6 * Debtor + 0.4 * (1 - `Tuition fees
        up to date`) + 0.2 * I(`Scholarship holder` = 1 AND `Tuition fees up to date`
        = 0), 0, 1). This cross-column relation should hold row-wise in the produced
        DataFrame. Representable as a Deequ compliance on the output table: Compliance(''risk_financial_formula'',
        "ABS(risk_financial - LEAST(1.0, GREATEST(0.0, 0.6*Debtor + 0.4*(1-`Tuition
        fees up to date`) + 0.2*CASE WHEN `Scholarship holder`=1 AND `Tuition fees
        up to date`=0 THEN 1 ELSE 0 END))) < 1e-6").'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 91
        end_line: 101
        file: ''
      uid: 5e70b6de-f49e-44ce-af41-2de5a42523be
    - text: 'The ''recommended_action'' must be consistent with ''risk_financial''
        and ''risk_score'': it must be ''tuition_collection'' if and only if (risk_financial
        >= 0.5 AND risk_score >= 0.4); otherwise it must be ''retention_outreach''.
        This can be enforced with a Deequ compliance: Compliance(''recommended_action_mapping'',
        "(risk_financial >= 0.5 AND risk_score >= 0.4 AND recommended_action = ''tuition_collection'')
        OR (NOT (risk_financial >= 0.5 AND risk_score >= 0.4) AND recommended_action
        = ''retention_outreach'')").'
      sources:
      - start_line: 112
        end_line: 116
        file: ''
      uid: b33c4382-1ba9-4a4f-9609-4c24a6286616
    - text: 'The ''priority_score'' must equal the weighted combination of ''risk_score''
        and ''risk_financial'' with an additional 0.05 only when ''recommended_action''
        is ''tuition_collection'': priority_score = 0.7*risk_score + 0.3*risk_financial
        + CASE WHEN recommended_action = ''tuition_collection'' THEN 0.05 ELSE 0.0
        END. Enforceable via a Deequ compliance: Compliance(''priority_score_formula'',
        "ABS(priority_score - (0.7*risk_score + 0.3*risk_financial + CASE WHEN recommended_action
        = ''tuition_collection'' THEN 0.05 ELSE 0.0 END)) < 1e-6").'
      sources:
      - start_line: 115
        end_line: 116
        file: ''
      uid: 1b6ad0d4-666e-42e6-b486-3cd0cb3aee42
