        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 99
        end_line: 99
        file: ''
      uid: 936b7c15-c726-4ffe-a5f9-2496b6ab84a1
    - text: 'All ''Debtor'' values must be parseable as numeric integers (no non-numeric
        tokens). The code coerces non-numeric values to NaN and then uses the column
        in arithmetic; any NaN would propagate into risk_financial/risk_score. Example
        validations: Deequ .isComplete(''Debtor'') and (optionally) .hasDataType(''Debtor'',
        Integral, ConstrainableDataTypes.Strict) OR Great Expectations expect_column_values_to_not_be_null(''Debtor'').'
      sources:
