        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      uid: 683fbd29-dfb2-445f-a2ec-9e8a92905927
    - text: 'There should be no nulls in ''Debtor'' after parsing/coercion; completeness
        should be 1.0. Nulls will produce NaNs in risk_financial and subsequent outputs.
        Example validations: Deequ .isComplete(''Debtor'') OR Great Expectations expect_column_values_to_not_be_null(''Debtor'').'
      sources:
      - start_line: 64
        end_line: 64
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 92f5e145-4134-4189-9023-9f4c54115080
    - text: 'The ''Debtor'' column should have at most 2 distinct values (binary encoding).
        Example validation: Deequ .hasNumberOfDistinctValues(''Debtor'', lambda c:
        c <= 2) OR Great Expectations expect_column_unique_value_count_to_be_between(''Debtor'',
