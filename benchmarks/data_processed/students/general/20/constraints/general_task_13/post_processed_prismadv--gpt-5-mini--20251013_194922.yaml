    - text: 'The ''GDP'' column must contain only the discrete set of allowed values:
        [-4.06, -3.12, -1.7, -0.92, 0.32, 0.79, 1.74, 1.79, 2.02, 3.51]. The code
        maps each GDP value to an ordinal via a dictionary of these values and then
        uses the mapped index in numeric arithmetic, so any value outside this set
        will produce NaNs or incorrect mapping. Example validation rules: Great Expectations:
        expect_column_values_to_be_in_set(''GDP'', [-4.06, -3.12, -1.7, -0.92, 0.32,
        0.79, 1.74, 1.79, 2.02, 3.51]). Deequ style: .satisfies("CASE WHEN `GDP` IN
        (-4.06, -3.12, -1.7, -0.92, 0.32, 0.79, 1.74, 1.79, 2.02, 3.51) THEN 1 ELSE
        0 END", "GDP_in_allowed_set", lambda x: x == 1.0).'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 77
        end_line: 85
        file: ''
      uid: 74eabac6-65bc-4b57-a8fa-c6988a5f886d
    - text: 'The ''GDP'' column must not contain nulls (completeness == 100%). The
        code calls df[gdp_col].map(...).astype(int) and later uses the resulting indices
        in arithmetic; if mapping yields NaN or any original GDP is null the astype(int)
        or arithmetic will fail or produce unexpected results. Example validation
        rules: Great Expectations: expect_column_values_to_not_be_null(''GDP''). Deequ
        style: .satisfies("CASE WHEN `GDP` IS NOT NULL THEN 1 ELSE 0 END", "GDP_not_null",
        lambda x: x == 1.0).'
      sources:
      - start_line: 85
        end_line: 85
        file: ''
      - start_line: 90
        end_line: 92
        file: ''
      uid: d2cf7705-ac93-4cc5-8d20-c8ca84077e48
    - text: 'The ''GDP'' values must be represented in a type/format that matches
        the mapping keys (i.e., numeric floats matching the allowed floats). The code
        uses exact dictionary mapping with float keys (gdp_rank) and .map(gdp_rank),
        which requires the input values to be equal (by Python equality) to those
        float keys. If GDP values are strings (e.g., ''0.32'') or have extra whitespace/formatting
        they may not map correctly. Suggested validations: ensure GDP is numeric (e.g.,
        castable to float) and after casting equals one of the allowed floats. Great
        Expectations: first expect_column_values_to_be_of_type(''GDP'', ''FLOAT'')
        or expect_column_values_to_be_in_set after casting; Deequ: .satisfies("CASE
        WHEN TRY_CAST(`GDP` AS DOUBLE) IN (-4.06, -3.12, -1.7, -0.92, 0.32, 0.79,
        1.74, 1.79, 2.02, 3.51) THEN 1 ELSE 0 END", "GDP_castable_and_in_set", lambda
        x: x == 1.0).'
      sources:
      - start_line: 77
        end_line: 85
        file: ''
      - start_line: 81
        end_line: 85
        file: ''
      uid: 59bdcd66-0b51-4046-bb6a-a1593fb77880
  Debtor:
    code:
    - suggestion: '.satisfies(''CASE WHEN TRY_CAST(`Debtor` AS INT) IS NOT NULL THEN
        1 ELSE 0 END'', ''Debtor integer-convertible'', lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
