  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (credited)","Curricular
    units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For every record, the counts of approved, credited and without-evaluations
        courses in the 1st semester must not exceed the number of enrolled courses.
        Concretely: ''Curricular units 1st sem (approved)'' <= ''Curricular units
        1st sem (enrolled)'', ''Curricular units 1st sem (credited)'' <= ''Curricular
        units 1st sem (enrolled)'' and ''Curricular units 1st sem (without evaluations)''
        <= ''Curricular units 1st sem (enrolled)''.

        This can be represented as actionable constraints (Deequ-like):

        .assertConstraint("`Curricular units 1st sem (approved)` <= `Curricular units
        1st sem (enrolled)`")

        .assertConstraint("`Curricular units 1st sem (credited)` <= `Curricular units
        1st sem (enrolled)`")

        .assertConstraint("`Curricular units 1st sem (without evaluations)` <= `Curricular
        units 1st sem (enrolled)`")'
      sources:
      - start_line: 95
        end_line: 99
        file: ''
      uid: 15f8eb8f-96ee-481b-ab0a-ac777e2b68d7
    - text: 'If there are zero enrolled courses in the 1st semester for a record (enrolled
        == 0), then approved, credited and without-evaluations counts should also
        be zero for that record. This prevents divide-by-zero / spurious rate calculations
        and matches the intended numerator/denominator semantics used when computing
        pass_rate1 and no_eval_ratio1.

        Actionable (Deequ-like) form:

        .assertConstraint("if(`Curricular units 1st sem (enrolled)` = 0, `Curricular
        units 1st sem (approved)` = 0 AND `Curricular units 1st sem (credited)` =
        0 AND `Curricular units 1st sem (without evaluations)` = 0, true)")'
      sources:
      - start_line: 100
        end_line: 102
        file: ''
      uid: eae2e5bb-876d-46ac-a148-d7a824c8adb0
    - text: 'Approved plus without-evaluations should not exceed enrolled for each
        record: ''Curricular units 1st sem (approved)'' + ''Curricular units 1st sem
        (without evaluations)'' <= ''Curricular units 1st sem (enrolled)''. This encodes
        that approved and no-evaluation are (together) a subset of enrolled courses
        and ensures the derived ratios (pass_rate1, no_eval_ratio1) are <= 1 without
        relying solely on clipping.

        Actionable (Deequ-like):

        .assertConstraint("`Curricular units 1st sem (approved)` + `Curricular units
        1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`")'
      sources:
      - start_line: 96
        end_line: 102
        file: ''
      uid: 590d6c6a-8eed-4930-8c1d-41b8e1981ae1
  '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (grade)"]':
    code: []
    assumptions:
    - text: 'For 1st-semester curricular units, the number of approved units should
        never exceed the number of enrolled units for the same record. This is used
        when computing pass_rate = approved / enrolled and ensures the ratio is sensible.
        Actionable constraint (Deequ-style): .satisfies("`Curricular units 1st sem
        (approved)` <= `Curricular units 1st sem (enrolled)`", ["Curricular units
        1st sem (approved)", "Curricular units 1st sem (enrolled)"]) or as a row-level
        check: all(approved <= enrolled).'
      sources:
      - start_line: 95
        end_line: 101
        file: ''
      uid: f40c6118-e389-46f2-a17a-5d09ebf10596
    - text: 'For 1st-semester curricular units, the number of ''without evaluations''
        units should never exceed the number of enrolled units. This is used when
        computing no_eval_ratio = noeval / enrolled. Actionable constraint: .satisfies("`Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`",
        ["Curricular units 1st sem (without evaluations)", "Curricular units 1st sem
        (enrolled)"]).'
      sources:
      - start_line: 95
        end_line: 102
        file: ''
      uid: b232e1bc-25e8-4948-9ca2-c11ab39bebe1
    - text: 'When enrolled == 0 for a 1st-semester record, there should be no approved
        units and no ''without evaluations'' units for that record (approved == 0
        and without_evaluations == 0). The code replaces zero enrollments with NaN
        to avoid divide-by-zero and then treats the resulting rates as 0, which assumes
        there were no approvals/no-evals when enrollment is zero. Actionable constraint:
        .satisfies("( `Curricular units 1st sem (enrolled)` = 0 ) -> ( `Curricular
        units 1st sem (approved)` = 0 AND `Curricular units 1st sem (without evaluations)`
        = 0 )", ["Curricular units 1st sem (enrolled)", "Curricular units 1st sem
        (approved)", "Curricular units 1st sem (without evaluations)"]).'
      sources:
      - start_line: 96
        end_line: 102
        file: ''
      uid: 9dd0f617-b04d-4a90-94ea-4da5444d0d63
    - text: 'If there are enrolled units for the 1st semester (enrolled > 0), the
        reported grade should be within the valid range [0, 20]. The grade is used
        to compute grade_gap = (20 - grade) / 20, so grades outside [0,20] produce
        invalid gap values. Actionable constraint: .satisfies("( `Curricular units
        1st sem (enrolled)` > 0 ) -> ( `Curricular units 1st sem (grade)` >= 0 AND
        `Curricular units 1st sem (grade)` <= 20 )", ["Curricular units 1st sem (enrolled)",
        "Curricular units 1st sem (grade)"]).'
      sources:
      - start_line: 95
        end_line: 103
        file: ''
      uid: edee05dd-cb2d-4265-b671-8960eea0efe1
  ? '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (credited)","Curricular
    units 2nd sem (enrolled)","Curricular units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'The dataset must be sparse in 2nd-semester "without evaluations": the
        share of rows with Curricular units 2nd sem (without evaluations) != 0 must
        be at most 0.10 (<= 10%). The code takes noeval_sparsity_scale = sqrt(0.10
        - share_non_zero_noeval2) and will raise a math domain error if the share
        > 0.10. Example actionable constraint (Deequ-style / SQL-style):

        - Deequ / Scala-like: assertConstraint("size(filter(df, `Curricular units
        2nd sem (without evaluations)` != 0)) / size(df) <= 0.10")

        - SQL-like: SELECT (SUM(CASE WHEN `Curricular units 2nd sem (without evaluations)`
        <> 0 THEN 1 ELSE 0 END) * 1.0 / COUNT(*)) <= 0.10 FROM table;'
      sources:
      - start_line: 116
        end_line: 118
        file: ''
      uid: 6830c4ad-9a41-4c2e-9d7d-dda049ea96f9
    - text: 'Row-level consistency: for every record, the semester-2 counts must be
        bounded by enrolled. Concretely: Curricular units 2nd sem (approved) <= Curricular
        units 2nd sem (enrolled); Curricular units 2nd sem (credited) <= Curricular
        units 2nd sem (enrolled); Curricular units 2nd sem (without evaluations) <=
        Curricular units 2nd sem (enrolled). These inequalities are required because
        pass_rate2 = approved / enrolled and no_eval_ratio2 = without_evaluations
        / enrolled assume those numerators are subsets of the enrolled denominator.
        Example actionable constraints:

        - Deequ-like assertions: assertConstraint("`Curricular units 2nd sem (approved)`
        <= `Curricular units 2nd sem (enrolled)`"), assertConstraint("`Curricular
        units 2nd sem (credited)` <= `Curricular units 2nd sem (enrolled)`"), assertConstraint("`Curricular
        units 2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`");

        - SQL-like: SELECT COUNT(*) WHERE approved > enrolled OR credited > enrolled
        OR without_evaluations > enrolled = 0'
      sources:
      - start_line: 105
        end_line: 113
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 97a45f6b-fe40-4659-b265-bd74b83336d4
    - text: 'Disjointness / sum constraint (stronger consistency): for each row, approved
        + without_evaluations <= enrolled (i.e., approved units and units without
        evaluations do not double-count beyond enrolled). This ensures pass_rate2
        and no_eval_ratio2 are meaningful and the sum of accounted units does not
        exceed the enrollment count. Example actionable constraint:

        - Deequ/SQL-like: assertConstraint("`Curricular units 2nd sem (approved)`
        + `Curricular units 2nd sem (without evaluations)` <= `Curricular units 2nd
        sem (enrolled)`");

        - SQL: SELECT COUNT(*) WHERE (approved + without_evaluations) > enrolled =
        0'
      sources:
      - start_line: 105
        end_line: 113
        file: ''
      uid: 8ed826e2-5c16-41ad-af7b-7067fd326b77
    - text: 'Zero-enrollment implication: when Curricular units 2nd sem (enrolled)
        == 0, then Curricular units 2nd sem (approved), Curricular units 2nd sem (credited),
        and Curricular units 2nd sem (without evaluations) should be 0 (or null) and
        there should be no valid grade for that semester (grade should be null/NaN).
        The code treats e2==0 via e2_safe (replace(0, NaN)) and subsequently fillna(0)
        for rates, so presence of non-zero numerators or a concrete grade when enrolled==0
        would be semantically inconsistent. Example actionable constraint:

        - Deequ/SQL-like conditional: assertConstraint("COUNT(CASE WHEN enrolled =
        0 AND (approved <> 0 OR credited <> 0 OR without_evaluations <> 0) THEN 1
        END) = 0"); assertConstraint("COUNT(CASE WHEN enrolled = 0 AND grade IS NOT
        NULL THEN 1 END) = 0").'
      sources:
      - start_line: 111
        end_line: 114
        file: ''
      uid: d9d32b55-8721-48dc-89ec-ce5106eaeffb
    - text: 'Grades scaling consistency across semesters: grade columns used in the
        academic_gap calculation (Curricular units 1st sem (grade) and Curricular
        units 2nd sem (grade)) must lie within the expected 0..20 range so that grade_gap
        = (20 - grade)/20 yields values in [0,1]. Example actionable constraints:

        - Deequ/SQL-like: assertConstraint("MIN(`Curricular units 1st sem (grade)`)
        >= 0 AND MAX(`Curricular units 1st sem (grade)`) <= 20"); assertConstraint("MIN(`Curricular
        units 2nd sem (grade)`) >= 0 AND MAX(`Curricular units 2nd sem (grade)`) <=
        20").'
      sources:
      - start_line: 95
        end_line: 104
        file: ''
      - start_line: 106
        end_line: 114
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 2e587ff9-627f-46ca-beb1-513ab08b0ab9
  '["Curricular units 2nd sem (enrolled)","Curricular units 2nd sem (grade)"]':
    code: []
    assumptions:
    - text: 'For any row with Curricular units 2nd sem (enrolled) > 0, the related
        per-semester counts should be non-negative and not exceed the enrolled count.
        Concretely: 0 <= ''Curricular units 2nd sem (approved)'' <= ''Curricular units
        2nd sem (enrolled)'', 0 <= ''Curricular units 2nd sem (credited)'' <= ''Curricular
        units 2nd sem (enrolled)'', and 0 <= ''Curricular units 2nd sem (without evaluations)''
        <= ''Curricular units 2nd sem (enrolled)''. These can be enforced as row-level
        predicates (e.g. for Deequ: .isTrueForAll("approved <= enrolled AND credited
        <= enrolled AND without_evaluations <= enrolled AND approved >= 0 AND credited
        >= 0 AND without_evaluations >= 0")).'
      sources:
      - start_line: 106
        end_line: 114
        file: ''
      uid: 069919e9-45a3-49eb-81ec-85bd45563d4e
    - text: 'For rows where ''Curricular units 2nd sem (enrolled)'' > 0, the computed
        pass rate a2/e2 should naturally lie within [0, 1]. In other words, ''Curricular
        units 2nd sem (approved)'' / ''Curricular units 2nd sem (enrolled)'' should
        be between 0 and 1 whenever enrolled > 0. (Deequ-style check: .isTrueForAll("enrolled
        = 0 OR (approved / enrolled >= 0 AND approved / enrolled <= 1)")).'
      sources:
      - start_line: 106
        end_line: 112
        file: ''
      uid: a407d836-dc7a-48a0-be85-6a308dcdfe75
    - text: 'For rows with ''Curricular units 2nd sem (enrolled)'' > 0, the semester
        grade ''Curricular units 2nd sem (grade)'' should be present (non-null) and
        fall in the expected scale [0, 20]. This ensures the grade_gap calculation
        (20 - g2) / 20 is meaningful. (Deequ-style: .isComplete("Curricular units
        2nd sem (grade)") on the subset where enrolled > 0 and .isContainedIn("Curricular
        units 2nd sem (grade)", [0..20]) ).'
      sources:
      - start_line: 106
        end_line: 114
        file: ''
      uid: 85185a0a-ca66-4afa-8e4f-d73d3090dc70
    - text: 'The dataset-level sparsity assumption used for noeval_sparsity_scale
        requires that the proportion of rows (restricted to those with enrollment
        > 0) having ''Curricular units 2nd sem (without evaluations)'' != 0 is at
        most 0.10. Formally: (count( (without_evaluations != 0) AND (enrolled > 0)
        ) / count(enrolled > 0)) <= 0.10. If this is violated the sqrt(0.10 - share_non_zero_noeval2)
        will be invalid. (Deequ-style: a metric asserting the fraction of rows with
        without_evaluations != 0 among enrolled > 0 is <= 0.10).'
      sources:
      - start_line: 111
        end_line: 118
        file: ''
      uid: fd33827e-8245-4bc5-a9ec-fb7e727ba06a
    - text: 'Where ''Curricular units 2nd sem (enrolled)'' == 0, the other per-semester
        counts should be zero (approved == 0, credited == 0, without_evaluations ==
        0) and grade should typically be missing. This keeps derived ratios and summaries
        consistent (pass_rate treated as 0 and no_eval_ratio as 0 for such rows).
        (Deequ-style: .isTrueForAll("enrolled != 0 OR (approved = 0 AND credited =
        0 AND without_evaluations = 0)") and optionally .isNull("Curricular units
        2nd sem (grade)") for those rows).'
      sources:
      - start_line: 106
        end_line: 113
        file: ''
      uid: 2c78c7bb-bab6-4804-a86e-bc315672da91
    - text: 'A tighter consistency rule (optional): the sum of the per-student per-semester
        categories should not exceed enrollment. For each row: (''Curricular units
        2nd sem (approved)''+ ''Curricular units 2nd sem (credited)'' + ''Curricular
        units 2nd sem (without evaluations)'') <= ''Curricular units 2nd sem (enrolled)''.
        This prevents inconsistent over-counting across these related columns. (Deequ-style:
        .isTrueForAll("approved + credited + without_evaluations <= enrolled")).'
      sources:
      - start_line: 106
        end_line: 114
        file: ''
      - start_line: 120
        end_line: 123
        file: ''
      uid: 09c948c0-7bf0-49a9-9ec7-3f37120c1e53
