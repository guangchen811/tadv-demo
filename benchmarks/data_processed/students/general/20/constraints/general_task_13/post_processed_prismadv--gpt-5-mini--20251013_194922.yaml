        lambda x: x == 3)'': Check.hasNumberOfDistinctValues() missing 2 required
        positional arguments: ''binningUdf'' and ''maxBins'''
      level: warning
      uid: 70fb4fb5-5490-4bc0-9697-1514ad3f86f3
      source_assumptions:
      - e4dfd8fd-f27f-408e-a5fc-4db412fd0bc1
    assumptions:
    - text: 'The ''Target'' column should contain only the categorical labels ''Graduate'',
        ''Dropout'', or ''Enrolled'' (no other unexpected categories). The code explicitly
        reads normalized counts for these three labels and uses them as priors. Example
        validation (Deequ/GE): ensure fraction of rows with Target in (''Graduate'',''Dropout'',''Enrolled'')
        >= 0.99 (or == 1.0 if you require exact).'
      sources:
      - start_line: 20
        end_line: 48
        file: ''
      uid: c328aae8-1545-44b4-a12a-99a0f983cc03
    - text: 'The ''Target'' column should be essentially complete (no or very few
        NULLs). The script computes category proportions with value_counts(normalize=True)
        and treats the resulting proportions as priors, so missing Target values would
        distort those priors. Example validation: fraction of non-null Target values
        >= 0.99 (or == 1.0 if you require none).'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      uid: 799d0a53-81e6-46d5-96a1-6961b89aedb0
    - text: 'The proportion of ''Dropout'' in the ''Target'' column must be bounded
        away from 0 and 1 so that the logit prior is well-defined and stable. Concretely,
        require p_dropout in (eps, 1-eps) for a small eps (e.g. eps = 1e-6 or use
        a more conservative eps = 1e-3). Example validation: compute p_dropout = count(Target
        == ''Dropout'') / count(Target) and assert eps <= p_dropout <= 1 - eps.'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      - start_line: 151
        end_line: 153
        file: ''
      uid: 5d95bc23-df93-4b02-af38-85f8ef6e4348
    - text: 'At runtime the code expects to be able to fetch normalized counts for
        specific labels ''Graduate'', ''Dropout'', ''Enrolled'' (it uses .get on the
        value_counts result). Therefore the input should include at least one row
        for each label if you want non-zero priors for all classes; otherwise missing
        classes will yield a zero prior (which may violate the logit requirement).
        Example validation: optionally assert count(Target == label) > 0 for each
        label you require a non-zero prior for.'
      sources:
      - start_line: 45
        end_line: 48
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
      uid: e4dfd8fd-f27f-408e-a5fc-4db412fd0bc1
