      source_assumptions:
      - d1c5f3bb-3e74-410f-b9fe-6522df7709ce
    - suggestion: '.isContainedIn(''Debtor'', [''0'', ''1''], lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 1f6657ad-6ea0-4241-91b6-538c0ea5c296
      source_assumptions:
      - 6340ade6-1813-48aa-9927-0d8ffdd915a6
    - suggestion: '.satisfies(''CASE WHEN `Debtor` = 1 AND `Tuition fees up to date`
        = 0 THEN 1 ELSE 0 END'', ''Debtor semantics spot-check: debtors plausibly
        not up-to-date'', lambda x: x >= 0.01)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: e55ec0f2-2a10-4820-8c3e-7e47a3b0e5e0
      source_assumptions:
      - ee0a060a-dffc-40d7-987c-e287068a227a
    assumptions:
    - text: 'The ''Debtor'' column must not contain nulls because the code immediately
        casts it to int (df[''Debtor''].astype(int)) and later uses it in arithmetic
        and boolean expressions. Represent this as a validation such as: .satisfies("CASE
        WHEN `Debtor` IS NOT NULL THEN 1 ELSE 0 END", "Debtor non-null", lambda x:
        x == 1) or a Great Expectations expectation: expect_column_values_to_not_be_null(''Debtor'').'
      sources:
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: 18fa6b04-c3a5-4e27-805c-debb69a76eb3
    - text: 'The ''Debtor'' column must be numeric / integer-convertible (e.g., integers
        or strings like ''0''/''1'') because the code does df[''Debtor''].astype(int)
        and uses numeric operations (0.6 * debtor). A suitable check: .satisfies("CASE
        WHEN TRY_CAST(`Debtor` AS INT) IS NOT NULL THEN 1 ELSE 0 END", "Debtor integer-convertible",
        lambda x: x == 1) or expect_column_values_to_be_in_type_list(''Debtor'', [''int64'',
        ''int32'']) after casting.'
      sources:
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: d1c5f3bb-3e74-410f-b9fe-6522df7709ce
    - text: 'The ''Debtor'' column should be a binary flag with allowed values {0,
        1}. The code assumes 1 means debtor and 0 means not (it computes fee_risk
        = 0.6 * debtor and uses (debtor == 1) in urgent fee logic). Enforceable as:
        .satisfies("CASE WHEN `Debtor` IN (0, 1) THEN 1 ELSE 0 END", "Debtor is binary",
        lambda x: x == 1) or a Great Expectations rule expect_column_values_to_be_in_set(''Debtor'',
        [0,1]).'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      - start_line: 163
        end_line: 163
        file: ''
      uid: 6340ade6-1813-48aa-9927-0d8ffdd915a6
    - text: 'Semantic mapping: 1 indicates the student is a debtor and 0 indicates
        not a debtor. Downstream logic (fee_risk, urgent_fee_flag) depends on this
        interpretation. This can be validated via a documentation/metadata check or
        a small spot-check rule (e.g., verify that rows with Debtor==1 are plausible
        debt cases by cross-checking ''Tuition fees up to date'').'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: ee0a060a-dffc-40d7-987c-e287068a227a
  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'The columns ''Debtor'' and ''Tuition fees up to date'' are binary indicator
        variables taking only the values {0, 1}. (Actionable check: assert both columns
        contain no values outside {0,1}, e.g. Deequ: .isContainedIn([''0'',''1''],
        ''Debtor'') and .isContainedIn([''0'',''1''], ''Tuition fees up to date'')
        or a multi-column domain check.)'
      sources:
      - start_line: 69
        end_line: 71
        file: ''
      uid: 667f30d9-27ed-4720-bba2-716ece3130b0
    - text: 'Logical consistency between the two fee columns: when ''Debtor'' == 1
        the record should reflect not being up-to-date on fees, i.e. ''Tuition fees
        up to date'' == 0. (Actionable check: enforce that no row exists with Debtor
        == 1 AND Tuition fees up to date == 1; Deequ example: .hasSize(df.filter("Debtor
        = 1 AND `Tuition fees up to date` = 1").count() == 0) or a uniqueness/conditional
        constraint.)'
      sources:
      - start_line: 69
        end_line: 73
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: 93d4cc00-a20f-42c0-bffc-77170822e6ed
    - text: 'The ''Scholarship holder'' column is a binary indicator (0/1) and interacts
        with ''Tuition fees up to date'': rows with Scholarship holder == 1 and Tuition
        fees up to date == 1 receive a scholarship bonus (scholar_bonus). (Actionable
        checks: ensure Scholarship holder is in {0,1}, ensure the joint condition
        Scholarship holder == 1 AND Tuition fees up to date == 1 is present/expected;
        and validate downstream application of the bonus via equality in derived column
        logic.)'
      sources:
      - start_line: 69
        end_line: 74
        file: ''
      - start_line: 131
        end_line: 132
        file: ''
      uid: cd5d2f5b-d19d-45fc-b89a-bdd66894bbe8
    - text: 'The urgent fee management rule depends on three columns: rows must be
        flagged urgent when risk_score >= 70 OR when (Debtor == 1 AND Tuition fees
        up to date == 0). (Actionable check: after score computation, assert that
        for all rows (risk_score >= 70) OR (Debtor == 1 AND `Tuition fees up to date`
        == 0) implies urgent_fee_flag == 1, and conversely rows not meeting either
        condition should have urgent_fee_flag == 0.)'
      sources:
      - start_line: 142
        end_line: 153
        file: ''
      - start_line: 161
        end_line: 166
        file: ''
      uid: 79401da7-296b-4fc1-bc30-37f20353030a
  '["GDP","Inflation rate","Unemployment rate"]':
    code: []
    assumptions:
    - text: 'The macroeconomic columns (''GDP'', ''Unemployment rate'', ''Inflation
        rate'') must contain only the discrete allowed values enumerated in the code
        (exact matches) and must be non-null so that mapping to ordinal ranks succeeds.
        If any value is outside the allowed lists the .map(gdp_rank/.map(unemp_rank)/.map(infl_rank))
        will produce NaN and the subsequent .astype(int) will fail. Represent as Deequ-like
        constraints:

        - .isComplete(["GDP", "Unemployment rate", "Inflation rate"])  # no nulls

        - .isContainedIn("GDP", [-4.06, -3.12, -1.7, -0.92, 0.32, 0.79, 1.74, 1.79,
        2.02, 3.51])

        - .isContainedIn("Unemployment rate", [7.6, 8.9, 9.4, 10.8, 11.1, 12.4, 12.7,
        13.9, 15.5, 16.2])

        - .isContainedIn("Inflation rate", [-0.8, -0.3, 0.3, 0.5, 0.6, 1.4, 2.6, 2.8,
        3.7])'
      sources:
      - start_line: 40
        end_line: 42
        file: ''
      - start_line: 77
        end_line: 83
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: e984a7c8-795b-411d-807b-83a8e03cd074
    - text: 'The mapping from macro values to ordinal indices must produce no missing
        ranks (i.e., after .map(...) there are no NaNs). Concretely, after mapping
        gdp_rank/unemp_rank/infl_rank every row must have a valid integer index so
        .astype(int) is safe. Represent as Deequ-like constraints:

        - .hasNoNulls(["GDP", "Unemployment rate", "Inflation rate"]) (post-mapping
        check: no nulls in derived gdp_idx/unemp_idx/infl_idx)

        - (If using SQL/DF checks) assert df[''GDP''].isin(allowed_gdp).all() and
        similarly for the other two columns.'
      sources:
      - start_line: 85
        end_line: 87
        file: ''
      uid: 2df00ab2-3e5c-4567-b56e-a18d24b0d6d3
    - text: 'The macro risk scaling uses a sqrt(0.10 - share_non_zero_noeval2). To
        avoid a math domain error the dataset-level proportion of non-zero values
        in ''Curricular units 2nd sem (without evaluations)'' (ne2) must be strictly
        less than 0.10 (i.e., share_non_zero_noeval2 <= 0.10 so 0.10 - share_non_zero_noeval2
        >= 0). This ties the second-semester no-eval column with the macro adjustment
        step. Represent as checks:

        - Compute share_non_zero_noeval2 = 1.0 - (ne2 == 0).mean(); assert share_non_zero_noeval2
        <= 0.10

        - In Deequ: evaluateConstraint that the fraction of rows where ne2 != 0 <=
        0.10'
      sources:
      - start_line: 106
        end_line: 118
        file: ''
      - start_line: 89
        end_line: 92
        file: ''
      - start_line: 135
        end_line: 135
        file: ''
      uid: 75d8b88e-f1b1-423d-a6cf-2db26437beac
    - text: 'The fee-related columns used together (''Debtor'', ''Tuition fees up
        to date'', ''Scholarship holder'') must be integer/binary indicators (0 or
        1), non-null, and convertible to int without information loss because the
        code casts them to int and computes combined logic (fee_risk, scholar_bonus,
        urgent_fee_flag). Represent as Deequ-like constraints:

        - .isComplete(["Debtor", "Tuition fees up to date", "Scholarship holder"])  #
        no nulls

        - Check that distinct values subset of {0,1} for each column: .isContainedIn("Debtor",
        [0,1]) etc.

        - (Optionally) assert dtype is integer-like for all rows.'
      sources:
      - start_line: 69
        end_line: 75
        file: ''
      - start_line: 131
        end_line: 134
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: 369852ef-f821-4cea-9604-675cc6d3da2a
    - text: 'Application-order statistics are used inside sqrt calls: first_choice_lift
        = sqrt(share_first_choice - 0.60) and allowed_order_cohesion = sqrt(share_in_allowed
        - 0.95). To avoid math domain errors the dataset-level proportions must satisfy
        share_first_choice >= 0.60 and share_in_allowed >= 0.95. Represent as dataset-level
        checks:

        - assert (app == 1).mean() >= 0.60

        - assert app.isin([1,2,3,4,5,6]).mean() >= 0.95

        - In Deequ: metric assertions on the fraction of rows meeting those conditions.'
      sources:
      - start_line: 60
        end_line: 66
        file: ''
      uid: cd2ee041-5308-464f-aff2-84f009c622b7
    - text: 'The attendance column (''Daytime/evening attendance\t'') is used numerically
        as a 0/1 indicator (daytime = 1, nighttime = 0) and averaged; it must be non-null
        and convertible to numeric 0/1 for attendance_penalty = (1 - day_series).astype(float)
        and subsequent multiplications. Represent as constraints:

        - .isComplete(["Daytime/evening attendance\t"])  # no nulls

        - .isContainedIn("Daytime/evening attendance\t", [0,1])'
      sources:
      - start_line: 54
        end_line: 57
        file: ''
      - start_line: 128
        end_line: 129
        file: ''
      uid: c93380c0-a1cc-4304-a859-958c6ab9f6a4
  '["Scholarship holder","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'Both ''Tuition fees up to date'' and ''Scholarship holder'' are binary
        indicator columns (only values 0 or 1) and contain no nulls. Actionable constraint
        examples: assert completeness for both columns and assert values are contained
        in {0,1}. In Deequ-like form: .isComplete(''Tuition fees up to date'') AND
        .isComplete(''Scholarship holder'') and a value-set check such as: every row
        has `Tuition fees up to date` IN (0,1) and `Scholarship holder` IN (0,1).'
      sources:
      - start_line: 36
        end_line: 38
        file: ''
      - start_line: 69
        end_line: 71
        file: ''
      uid: 73cc1361-eac8-46cd-a093-42d5d11edf6c
    - text: 'The scholar bonus branch is only applied when a student is both a scholarship
        holder and up-to-date with tuition. Therefore there must be at least one record
        (preferably a non-trivial fraction) where Scholarship holder == 1 AND Tuition
        fees up to date == 1 so that the scholar_bonus condition is exercised. Actionable
        constraint example: require count(rows where `Scholarship holder` = 1 AND
        `Tuition fees up to date` = 1) > 0 (or > threshold).'
      sources:
      - start_line: 71
        end_line: 74
        file: ''
      - start_line: 132
        end_line: 133
        file: ''
      uid: 7456cf7e-01f8-4d59-8992-7bd333f93db2
    - text: 'Debtor and Tuition-up-to-date should be logically consistent: it is expected
        that a student marked as a debtor (Debtor == 1) is not up-to-date on tuition
        (Tuition fees up to date == 0). Rows with Debtor == 1 AND Tuition fees up
        to date == 1 are logically inconsistent and should be absent or extremely
        rare. Actionable constraint example: require count(rows where `Debtor` = 1
        AND `Tuition fees up to date` = 1) == 0 (or <= small tolerance).'
      sources:
      - start_line: 69
        end_line: 74
        file: ''
      - start_line: 160
        end_line: 161
        file: ''
      uid: 8cfd1a21-d369-40f0-9040-61a657a191f6
  Target:
    code:
    - suggestion: '.isContainedIn(''Target'', [''Graduate'',''Dropout'',''Enrolled''],
        lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
