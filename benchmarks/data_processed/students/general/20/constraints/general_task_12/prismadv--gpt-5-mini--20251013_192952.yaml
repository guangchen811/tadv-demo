    - text: '''Curricular units 1st sem (grade)'' and ''Curricular units 2nd sem (grade)''
        are on the same numeric grading scale (expected 0..20). Consequently their
        average ((g1+g2)/2) should fall within [0,20] and their absolute difference
        should be a small number relative to that scale. Enforce bounds and non-nullness
        for both grade columns.'
      sources:
      - start_line: 48
        end_line: 53
        file: ''
      uid: c6489458-5c02-48c4-aff8-f0558d946b38
    - text: '''Admission grade'' and ''Previous qualification (grade)'' are on the
        same scale (expected 0..100). Their mean is divided by 200 to produce prep_score
        in [0,1], and prep_closeness is based on abs(adm - pq)/50. Enforce that both
