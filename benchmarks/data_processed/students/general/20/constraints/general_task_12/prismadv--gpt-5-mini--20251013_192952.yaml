        end_line: 45
        file: ''
      uid: 951223b5-da0e-4f13-bc10-c467d576f6be
    - text: 'For every record where evaluations > 0, ''Curricular units 1st sem (approved)''
        should be non-negative and less than or equal to ''Curricular units 1st sem
        (evaluations)''. This ensures approved_ratio = approved / evaluations is in
        [0,1] when the denominator is positive. (Deequ-style: .isNonNegative("Curricular
        units 1st sem (approved)") + .satisfies("`Curricular units 1st sem (approved)`
        <= `Curricular units 1st sem (evaluations)`","approved_le_evaluations"))'
