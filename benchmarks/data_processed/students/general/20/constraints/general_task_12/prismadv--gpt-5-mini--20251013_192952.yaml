    - text: 'Admission grade must not contain missing/null values in the input (after
        conversion to numeric). The script does not handle NaNs produced by pd.to_numeric
        and then uses the column in calculations (prep_mean, prep_score, prep_closeness),
        so the input should provide a value for every row. Represent as: percent_non_null(`Admission
        grade`) == 1.0 (or >= 0.99 if small tolerance is desired).'
