    - text: 'Admission grade should be on a sensible positive numeric scale (expected
        range 0 to 200). The code divides the mean of Admission grade and Previous
        qualification by 200 to create prep_score, and uses differences divided by
        50 for prep_closeness; these operations imply admission grades are non-negative
        and generally <= 200. Represent as: 0 <= `Admission grade` <= 200 (or allow
        a small fraction of rows outside this range if needed).'
