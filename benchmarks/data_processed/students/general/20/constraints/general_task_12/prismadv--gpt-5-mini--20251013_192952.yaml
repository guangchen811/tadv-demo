        end_line: 36
        file: ''
      - start_line: 48
        end_line: 51
        file: ''
      - start_line: 102
        end_line: 103
        file: ''
      uid: 020e13e3-adbb-4907-9e89-a3740db8e18a
    - text: "The two semester grade columns use a 0\u201320 grading scale: both 'Curricular\
        \ units 1st sem (grade)' and 'Curricular units 2nd sem (grade)' should be\
        \ within the inclusive range [0, 20]. This is required because avg_grade is\
        \ divided by 20 to compute risk and consistency is computed from grade differences.\
        \ Actionable constraint examples:\n- Per-column range checks: .isContainedInRange(\"\
        Curricular units 1st sem (grade)\", 0.0, 20.0) and .isContainedInRange(\"\
        Curricular units 2nd sem (grade)\", 0.0, 20.0)\n- Or a combined predicate:\
        \ .satisfies(\"`Curricular units 1st sem (grade)` >= 0 AND `Curricular units\
        \ 1st sem (grade)` <= 20 AND `Curricular units 2nd sem (grade)` >= 0 AND `Curricular\
        \ units 2nd sem (grade)` <= 20\", \"grades_in_0_20\")"
      sources:
      - start_line: 50
        end_line: 53
        file: ''
      - start_line: 74
        end_line: 76
        file: ''
      uid: 224dc789-3c30-4ab5-b096-c3277f46fc4a
    - text: 'Grades between semesters should be reasonably similar: the absolute difference
        between ''Curricular units 1st sem (grade)'' and ''Curricular units 2nd sem
        (grade)'' should not exceed 6 for (ideally) all records because consistency
        is computed as 1 - (|g1 - g2| / 6.0). Actionable constraint examples:

        - Hard constraint: .satisfies("abs(`Curricular units 1st sem (grade)` - `Curricular
        units 2nd sem (grade)`) <= 6", "grade_diff_le_6")

        - Soft constraint (fractional tolerance): assert at least X% of rows satisfy
        |g1 - g2| <= 6 (e.g., coverage >= 0.99).'
      sources:
      - start_line: 51
        end_line: 53
        file: ''
      - start_line: 74
        end_line: 76
        file: ''
      uid: 734ce18a-4676-4136-ac46-6d50bc2ee37b
    - text: 'First-semester engagement columns must be coherent: ''Curricular units
        1st sem (evaluations)'' plus ''Curricular units 1st sem (without evaluations)''
        should equal (or be <=) ''Curricular units 1st sem (enrolled)'', and ''Curricular
        units 1st sem (approved)'' should be less than or equal to ''Curricular units
        1st sem (evaluations)''. These relationships ensure eval_ratio and approved_ratio
        are meaningful. Actionable constraint examples:

        - Equality or inequality check: .satisfies("`Curricular units 1st sem (evaluations)`
        + `Curricular units 1st sem (without evaluations)` == `Curricular units 1st
        sem (enrolled)`", "eval_plus_without_eq_enrolled")

        - If equality is too strict, use inequality: .satisfies("`Curricular units
        1st sem (evaluations)` + `Curricular units 1st sem (without evaluations)`
        <= `Curricular units 1st sem (enrolled)`", "evals_plus_without_le_enrolled")

        - Approved bound: .satisfies("`Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (evaluations)`", "approved_le_evaluations")'
      sources:
