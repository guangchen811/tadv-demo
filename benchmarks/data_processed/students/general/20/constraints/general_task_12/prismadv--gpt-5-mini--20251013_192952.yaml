    - text: 'Values in ''Previous qualification (grade)'' should be within a realistic
        numeric range consistent with how they are used: roughly 0 to 200. The code
        divides the mean of Admission grade and Previous qualification by 200 (prep_score
        = prep_mean / 200.0), implying the expected scale is up to about 200. Values
        outside this range are likely erroneous and will distort prep_score.


        Example check:

        .satisfies("CASE WHEN `Previous qualification (grade)` >= 0 AND `Previous
        qualification (grade)` <= 200 THEN 1 ELSE 0 END", "Previous qualification
        range 0-200", lambda x: x == 1.0)


