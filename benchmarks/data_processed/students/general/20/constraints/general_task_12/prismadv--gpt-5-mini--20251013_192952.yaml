        file: ''
      uid: 3b85dd66-738a-407b-905c-4c81d75aa668
    - text: 'Admission grade must be on the same scale as ''Previous qualification
        (grade)''. The code computes prep_mean = (Admission grade + Previous qualification
        (grade)) / 2 and computes closeness from their difference; if the two columns
        use different scales the derived prep features will be meaningless. Represent
        as: distributional or min/max checks comparing the two columns (e.g. quantile-based
        ratio checks or require both columns to lie in the same expected range).'
