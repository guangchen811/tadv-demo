        end_line: 46
        file: ''
      - start_line: 70
        end_line: 71
        file: ''
      uid: 7bfc386a-5531-49ba-a8a8-44b87d7839f1
    - text: "Pre-entry grades ('Admission grade' and 'Previous qualification (grade)')\
        \ must be on the same numeric scale and non-null (expected 0\u2013100) because\
        \ prep_score divides their mean by 200 and prep_closeness uses difference/50.\
