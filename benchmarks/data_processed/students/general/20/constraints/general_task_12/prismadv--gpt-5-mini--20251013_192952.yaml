    assumptions:
    - text: 'Both ''Curricular units 1st sem (grade)'' and ''Curricular units 2nd
        sem (grade)'' are required for downstream computations: they must be present,
        parsable as numeric, and non-null for every record. Actionable constraint
        examples:

        - Deequ (two separate column checks): .hasCompleteness("Curricular units 1st
        sem (grade)", _ >= 1.0) and .hasCompleteness("Curricular units 2nd sem (grade)",
        _ >= 1.0)

        - or a data-frame level check: every row must have non-null numeric values
        for both columns (e.g. .satisfies("isNotNull(`Curricular units 1st sem (grade)`)
        AND isNotNull(`Curricular units 2nd sem (grade)`)", "grades_not_null"))'
      sources:
