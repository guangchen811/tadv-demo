    - text: 'The ''Previous qualification (grade)'' is expected to be on the same
        scale and comparable to ''Admission grade'' (same units and meaning). The
        code computes prep_mean = (Admission grade + Previous qualification (grade))
        / 2 and uses their difference to compute prep_closeness, so both columns must
        be measured in the same scale; otherwise prep_score and prep_closeness are
        meaningless.


        Validation approach: verify statistical similarity / comparable ranges (e.g.,
        same min/max order of magnitude) or ensure both are in [0,200]. Example quick
        check: proportion of rows where abs(adm - pq) < 100 should be high (e.g.,
        >= 0.99) to catch mis-scaled values.


        Example (Deequ-style):

        .satisfies("CASE WHEN ABS(`Admission grade` - `Previous qualification (grade)`)
        <= 100 THEN 1 ELSE 0 END", "Comparable scales Admission vs Previous qualification",
        lambda x: x >= 0.99)

