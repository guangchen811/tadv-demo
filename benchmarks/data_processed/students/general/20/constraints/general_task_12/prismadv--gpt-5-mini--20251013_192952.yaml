    - text: '''Curricular units 1st sem (evaluations)'' must be less than or equal
        to ''Curricular units 1st sem (enrolled)'' for each record (evaluations cannot
        exceed enrolled). This is required for the eval_ratio calculation to be meaningful
        and to avoid logical inconsistencies.'
