constraints:
  Age at enrollment:
    code:
    - - .hasDataType('Age at enrollment', 'Integral')
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isNonNegative('Curricular units 1st sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isBetween('Curricular units 1st sem (grade)', 0.0, 20.0, inclusive=True)
      - Invalid
    - - .isComplete('Curricular units 1st sem (grade)')
      - Valid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .isNonNegative('Curricular units 2nd sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .isComplete('Curricular units 2nd sem (grade)')
      - Valid
    assumptions: []
  Debtor:
    code:
    - - .isComplete('Debtor')
      - Valid
    - - .isContainedIn('Debtor', ['0', '1'])
      - Valid
    assumptions: []
  GDP:
    code:
    - - .hasDataType('GDP', 'Fractional')
      - Invalid
    assumptions: []
  'Inter-column check: 1st Semester':
    code:
    - - .satisfies("`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (evaluations)`", 'approved_le_evaluations_sem1')
      - Valid
    assumptions: []
  'Inter-column check: 2nd Semester':
    code:
    - - .satisfies("`Curricular units 2nd sem (approved)` <= `Curricular units 2nd
        sem (evaluations)`", 'approved_le_evaluations_sem2')
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isComplete('Tuition fees up to date')
      - Valid
    - - .isContainedIn('Tuition fees up to date', ['0', '1'])
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
