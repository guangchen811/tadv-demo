constraints:
  Admission grade:
    code:
    - - '.hasMax(''Admission grade'', lambda v: v <= 200.0)'
      - Valid
    - - '.hasMin(''Admission grade'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('Admission grade')
      - Valid
    assumptions: []
  Age at enrollment:
    code:
    - - '.hasMax(''Age at enrollment'', lambda v: v <= 80)'
      - Valid
    - - '.hasMin(''Age at enrollment'', lambda v: v >= 15)'
      - Valid
    - - .isComplete('Age at enrollment')
      - Valid
    assumptions: []
  Application order:
    code:
    - - .isComplete('Application order')
      - Valid
    - - .isContainedIn('Application order', [1,2,3,4,5,6,7,8,9])
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isNonNegative('Curricular units 1st sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (evaluations):
    code:
    - - .isNonNegative('Curricular units 1st sem (evaluations)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (without evaluations):
    code:
    - - .isNonNegative('Curricular units 1st sem (without evaluations)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .isNonNegative('Curricular units 2nd sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 2nd sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (evaluations):
    code:
    - - .isNonNegative('Curricular units 2nd sem (evaluations)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (without evaluations):
    code:
    - - .isNonNegative('Curricular units 2nd sem (without evaluations)')
      - Invalid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - .isComplete('Daytime/evening attendance\t')
      - Valid
    - - .isContainedIn('Daytime/evening attendance\t', [0, 1])
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', [0, 1])
      - Invalid
    assumptions: []
  Displaced:
    code:
    - - .isContainedIn('Displaced', [0, 1])
      - Invalid
    assumptions: []
  Financial consistency (debtor implies fees not up to date):
    code:
    - - '.satisfies(''(`Debtor` = 0) OR (`Tuition fees up to date` = 0)'', ''debtor_implies_fees_not_up_to_date'',
        lambda v: v >= 0.95)'
      - Invalid
    assumptions: []
  GDP:
    code:
    - - '.hasMax(''GDP'', lambda v: v <= 3.51)'
      - Valid
    - - '.hasMin(''GDP'', lambda v: v >= -4.06)'
      - Valid
    - - .isComplete('GDP')
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', [0, 1])
      - Invalid
    assumptions: []
  Inflation rate:
    code:
    - - '.hasMax(''Inflation rate'', lambda v: v <= 3.7)'
      - Valid
    - - '.hasMin(''Inflation rate'', lambda v: v >= -0.8)'
      - Valid
    - - .isComplete('Inflation rate')
      - Valid
    assumptions: []
  International:
    code:
    - - .isContainedIn('International', [0, 1])
      - Invalid
    assumptions: []
  Previous qualification (grade):
    code:
    - - '.hasMax(''Previous qualification (grade)'', lambda v: v <= 200.0)'
      - Valid
    - - '.hasMin(''Previous qualification (grade)'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('Previous qualification (grade)')
      - Valid
    assumptions: []
  Scholarship holder:
    code:
    - - .isContainedIn('Scholarship holder', [0, 1])
      - Invalid
    assumptions: []
  Sem1 approved <= enrolled:
    code:
    - - '.satisfies(''`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (enrolled)`'', ''sem1_approved_le_enrolled'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Sem1 evals >= approved:
    code:
    - - '.satisfies(''`Curricular units 1st sem (evaluations)` >= `Curricular units
        1st sem (approved)`'', ''sem1_evals_ge_approved'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Sem1 evals >= noeval:
    code:
    - - '.satisfies(''`Curricular units 1st sem (evaluations)` >= `Curricular units
        1st sem (without evaluations)`'', ''sem1_evals_ge_noeval'', lambda v: v ==
        1.0)'
      - Valid
    assumptions: []
  Sem1 noeval <= enrolled:
    code:
    - - '.satisfies(''`Curricular units 1st sem (without evaluations)` <= `Curricular
        units 1st sem (enrolled)`'', ''sem1_noeval_le_enrolled'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Sem1 zero-enrolled implies zero counts:
    code:
    - - '.satisfies(''(`Curricular units 1st sem (enrolled)` > 0) OR ((`Curricular
        units 1st sem (approved)` = 0) AND (`Curricular units 1st sem (without evaluations)`
        = 0) AND (`Curricular units 1st sem (evaluations)` = 0))'', ''sem1_zero_enrolled_zero_counts'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  Sem2 approved <= enrolled:
    code:
    - - '.satisfies(''`Curricular units 2nd sem (approved)` <= `Curricular units 2nd
        sem (enrolled)`'', ''sem2_approved_le_enrolled'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Sem2 evals >= approved:
    code:
    - - '.satisfies(''`Curricular units 2nd sem (evaluations)` >= `Curricular units
        2nd sem (approved)`'', ''sem2_evals_ge_approved'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Sem2 evals >= noeval:
    code:
    - - '.satisfies(''`Curricular units 2nd sem (evaluations)` >= `Curricular units
        2nd sem (without evaluations)`'', ''sem2_evals_ge_noeval'', lambda v: v ==
        1.0)'
      - Valid
    assumptions: []
  Sem2 noeval <= enrolled:
    code:
    - - '.satisfies(''`Curricular units 2nd sem (without evaluations)` <= `Curricular
        units 2nd sem (enrolled)`'', ''sem2_noeval_le_enrolled'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Sem2 zero-enrolled implies zero counts:
    code:
    - - '.satisfies(''(`Curricular units 2nd sem (enrolled)` > 0) OR ((`Curricular
        units 2nd sem (approved)` = 0) AND (`Curricular units 2nd sem (without evaluations)`
        = 0) AND (`Curricular units 2nd sem (evaluations)` = 0))'', ''sem2_zero_enrolled_zero_counts'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  Target:
    code:
    - - '.hasNumberOfDistinctValues(''Target'', lambda v: v == 3)'
      - Invalid
    - - .isComplete('Target')
      - Valid
    - - .isContainedIn('Target', ['Graduate', 'Dropout', 'Enrolled'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', [0, 1])
      - Invalid
    assumptions: []
  Unemployment rate:
    code:
    - - '.hasMax(''Unemployment rate'', lambda v: v <= 16.2)'
      - Valid
    - - '.hasMin(''Unemployment rate'', lambda v: v >= 7.6)'
      - Valid
    - - .isComplete('Unemployment rate')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
