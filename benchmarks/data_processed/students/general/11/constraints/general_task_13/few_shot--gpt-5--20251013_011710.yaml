constraints:
  Age at enrollment:
    code:
    - - .isComplete('Age at enrollment')
      - Valid
    - - .isNonNegative('Age at enrollment')
      - Invalid
    assumptions: []
  Application order:
    code:
    - - .isComplete('Application order')
      - Valid
    - - .isPositive('Application order')
      - Invalid
    - - '.satisfies(''`Application order` = 1'', ''share_first_choice_at_least_0.60'',
        lambda d: d >= 0.60)'
      - Valid
    - - '.satisfies(''`Application order` IN (1,2,3,4,5,6)'', ''share_in_allowed_orders_at_least_0.95'',
        lambda d: d >= 0.95)'
      - Valid
    assumptions: []
