        assumes that the ratio and gap metrics derived from ''Curricular units 2nd
        sem (grade)'' and ''Curricular units 2nd sem (enrolled)'' (as well as their
        1st semester counterparts) are comparable and consistently scaled across records.
        This means that the distributions of these columns should not have extreme
        outliers or impossible values (e.g., negative enrollments, grades outside
        expected range), and that their combined use in weighted sums is meaningful.
        This can be represented as constraints such as: ''The values of "Curricular
        units 2nd sem (grade)" must be in [0, 20] when "Curricular units 2nd sem (enrolled)"
        > 0'', and ''The weighted sum of normalized gap and ratio metrics should be
        in [0, 1] after clipping''.'
