    - text: The denominator columns used for division in academic metrics, specifically
        'Curricular units 1st sem (enrolled)' and 'Curricular units 2nd sem (enrolled)',
        may be zero for some records, but all downstream calculations handle this
        by replacing zeros with NaN and then filling NaN with zero after clipping
        to [0,1]. Thus, the code assumes that wherever 'enrolled' is zero, the corresponding
        'approved', 'credited', or 'without evaluations' counts must also be zero
        or missing, to avoid undefined or misleading ratios.
