constraints:
  Age at enrollment:
    code:
    - - .isGreaterThanOrEqualTo('Age at enrollment', 15)
      - Invalid
    - - .isLessOrEqualTo('Age at enrollment', 80)
      - Invalid
    assumptions: []
  Application order:
    code:
    - - .isComplete('Application order')
      - Valid
    - - .isLessOrEqualTo('Application order', 9)
      - Invalid
    - - .isNonNegative('Application order')
      - Invalid
    assumptions: []
  Curricular units 1st sem (approved):
    code:
    - - .isNonNegative('Curricular units 1st sem (approved)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .isGreaterThanOrEqualTo('Curricular units 1st sem (grade)', 0.0)
      - Invalid
    - - .isLessOrEqualTo('Curricular units 1st sem (grade)', 20.0)
      - Invalid
    assumptions: []
  Curricular units 1st sem (without evaluations):
    code:
    - - .isNonNegative('Curricular units 1st sem (without evaluations)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 2nd sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .isGreaterThanOrEqualTo('Curricular units 2nd sem (grade)', 0.0)
      - Invalid
    - - .isLessOrEqualTo('Curricular units 2nd sem (grade)', 20.0)
      - Invalid
    assumptions: []
  Curricular units 2nd sem (without evaluations):
    code:
    - - .isNonNegative('Curricular units 2nd sem (without evaluations)')
      - Invalid
    assumptions: []
  "Daytime/evening attendance\t":
    code:
    - - .isComplete('Daytime/evening attendance\t')
      - Valid
    - - .isContainedIn('Daytime/evening attendance\t', [0, 1])
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', [0, 1])
      - Invalid
    assumptions: []
  GDP:
    code:
    - - .isContainedIn('GDP', [-4.06, -3.12, -1.7, -0.92, 0.32, 0.79, 1.74, 1.79,
        2.02, 3.51])
      - Invalid
    assumptions: []
  Inflation rate:
    code:
    - - .isContainedIn('Inflation rate', [-0.8, -0.3, 0.3, 0.5, 0.6, 1.4, 2.6, 2.8,
        3.7])
      - Invalid
    assumptions: []
  Scholarship holder:
    code:
    - - .isContainedIn('Scholarship holder', [0, 1])
      - Invalid
    assumptions: []
  Target:
    code:
    - - .isComplete('Target')
      - Valid
    - - .isContainedIn('Target', ['Graduate', 'Dropout', 'Enrolled'])
      - Valid
    assumptions: []
  Tuition fees up to date:
    code:
    - - .isContainedIn('Tuition fees up to date', [0, 1])
      - Invalid
    assumptions: []
  Unemployment rate:
    code:
    - - .isContainedIn('Unemployment rate', [7.6, 8.9, 9.4, 10.8, 11.1, 12.4, 12.7,
        13.9, 15.5, 16.2])
      - Invalid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
