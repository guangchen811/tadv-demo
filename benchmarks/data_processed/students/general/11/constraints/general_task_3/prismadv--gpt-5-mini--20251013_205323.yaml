  ? '["Curricular units 2nd sem (approved)","Curricular units 2nd sem (credited)","Curricular
    units 2nd sem (enrolled)","Curricular units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For any row with ''Curricular units 2nd sem (enrolled)'' > 0, the other
        three semester count columns must be in the range [0, ''Curricular units 2nd
        sem (enrolled)'']. Concretely: ''Curricular units 2nd sem (approved)'' <=
        ''Curricular units 2nd sem (enrolled)'', ''Curricular units 2nd sem (credited)''
        <= ''Curricular units 2nd sem (enrolled)'', and ''Curricular units 2nd sem
        (without evaluations)'' <= ''Curricular units 2nd sem (enrolled)''. This enables
        safe computation of pass_rate2, no_eval_ratio2 and credit_ratio2 without producing
        ratios > 1. Example Deequ-style constraints: .satisfies("`Curricular units
        2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)`"), similarly
        for credited and without evaluations.'
      sources:
      - start_line: 30
        end_line: 34
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      uid: 66ede896-ac7c-419b-b19f-46282580dccd
    - text: '''Curricular units 2nd sem (approved)'' plus ''Curricular units 2nd sem
        (without evaluations)'' should not exceed ''Curricular units 2nd sem (enrolled)''
        for each record: ''Curricular units 2nd sem (approved)'' + ''Curricular units
        2nd sem (without evaluations)'' <= ''Curricular units 2nd sem (enrolled)''.
        This reflects that approved and without-evaluation units are disjoint parts
        of enrolled units. Example constraint: .satisfies("`Curricular units 2nd sem
        (approved)` + `Curricular units 2nd sem (without evaluations)` <= `Curricular
        units 2nd sem (enrolled)`").'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      - start_line: 71
        end_line: 74
        file: ''
      uid: 3b222294-7263-4656-aed1-de50d851beda
    - text: '''Curricular units 2nd sem (credited)'' is expected to be less than or
        equal to ''Curricular units 2nd sem (approved)'' (credited units are a subset
        of approved units): ''Curricular units 2nd sem (credited)'' <= ''Curricular
        units 2nd sem (approved)''. Example constraint: .satisfies("`Curricular units
        2nd sem (credited)` <= `Curricular units 2nd sem (approved)`").'
      sources:
      - start_line: 30
        end_line: 34
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      uid: cae00b19-a44b-4bca-85bd-4cc86a3fa119
    - text: 'When ''Curricular units 2nd sem (enrolled)'' == 0, the expected (semantically
        consistent) state is that ''Curricular units 2nd sem (approved)'', ''Curricular
        units 2nd sem (credited)'', and ''Curricular units 2nd sem (without evaluations)''
        are all 0. The code replaces zero denominators with NaN then fills ratios
        with 0.0, so non-zero counts when enrolled==0 indicate inconsistent data.
        Example constraint: .satisfies("(`Curricular units 2nd sem (enrolled)` ==
        0) => (`Curricular units 2nd sem (approved)` == 0 AND `Curricular units 2nd
        sem (credited)` == 0 AND `Curricular units 2nd sem (without evaluations)`
        == 0)").'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      uid: 381fbd17-880e-41e6-a031-da8ec38ae52c
    - text: 'All four columns (''Curricular units 2nd sem (enrolled)'', ''Curricular
        units 2nd sem (approved)'', ''Curricular units 2nd sem (credited)'', ''Curricular
        units 2nd sem (without evaluations)'') should be non-negative integers (no
        negative values). This supports the numeric coercion performed earlier and
        the semantic interpretation of these columns as counts. Example constraints:
        .hasDataType("Integral") and .satisfies("`Curricular units 2nd sem (enrolled)`
        >= 0 AND `Curricular units 2nd sem (approved)` >= 0 AND `Curricular units
        2nd sem (credited)` >= 0 AND `Curricular units 2nd sem (without evaluations)`
        >= 0").'
      sources:
