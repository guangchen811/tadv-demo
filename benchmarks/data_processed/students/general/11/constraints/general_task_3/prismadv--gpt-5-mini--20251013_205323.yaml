        file: ''
      - start_line: 107
        end_line: 108
        file: ''
      uid: de604c19-f086-4350-9cbe-4cfa878054de
    - text: "No missing values are expected for 'Debtor' in the input (completeness\
        \ should be 100%). Additionally, coercion to numeric should not create nulls\
        \ \u2014 otherwise finance_risk computation will be affected. Example validation:\
        \ .satisfies('CASE WHEN `Debtor` IS NOT NULL THEN 1 ELSE 0 END', 'Debtor completeness',\
        \ lambda x: x == 1)"
