    - text: 'The ''Previous qualification (grade)'' values are expected to be on the
        same scale as ''Admission grade'' and fall within a reasonable upper bound
        (for example, <= 200) so that expressions like (admission + previous)/400.0
        behave as intended. The prep_risk computation divides the sum by 400.0 (and
