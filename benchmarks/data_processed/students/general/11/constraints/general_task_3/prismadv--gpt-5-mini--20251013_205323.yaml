  : code: []
    assumptions:
    - text: 'The columns ''Tuition fees up to date'' and ''Debtor'' are binary indicators
        (only values 0 or 1), coerced to numeric, and must not be simultaneously 1
        for any record (i.e., a student cannot be marked both ''tuition up to date''
