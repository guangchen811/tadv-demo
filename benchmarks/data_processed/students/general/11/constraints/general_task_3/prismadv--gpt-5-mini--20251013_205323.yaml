        units 1st sem (without evaluations)'' must be numeric, non-negative and for
        any row with ''Curricular units 1st sem (enrolled)'' > 0 they must be <= ''Curricular
        units 1st sem (enrolled)''. Actionable constraint: for rows where enrolled>0
        assert c1_app <= c1_enr, c1_cred <= c1_enr, c1_woe <= c1_enr. Example Deequ-style
        predicate: .satisfies(''if(`Curricular units 1st sem (enrolled)` > 0, `Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)`, true)'',
        ''c1_app_le_enr'') (repeat for credited and without-evaluations).'
