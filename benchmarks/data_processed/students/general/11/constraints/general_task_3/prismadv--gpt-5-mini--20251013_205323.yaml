    assumptions:
    - text: 'For 2nd-semester ratio calculations, the enrolled count (''Curricular
        units 2nd sem (enrolled)'') is used as the denominator for approved, without-evaluations
        and credited counts. Therefore, for each row where enrolled > 0, the related
        counts should be non-negative and not exceed enrolled. Concretely: 0 <= ''Curricular
        units 2nd sem (approved)'' <= ''Curricular units 2nd sem (enrolled)'', 0 <=
        ''Curricular units 2nd sem (without evaluations)'' <= ''Curricular units 2nd
        sem (enrolled)'', and 0 <= ''Curricular units 2nd sem (credited)'' <= ''Curricular
        units 2nd sem (enrolled)''. (Can be expressed in Deequ as row-level constraints
        like: forAll(row => row("c2_app") >= 0 && row("c2_app") <= row("c2_enr"))
        and similarly for c2_woe and c2_cred.)'
