    - text: Values in these two columns are parsable as numeric without coercion failures
        (i.e., pd.to_numeric(errors='coerce') should not produce NaN). The code relies
        on numeric comparisons after coercion and does not handle NaNs for these flags,
        so both columns must be numeric/parseable as 0/1 for all rows. In Deequ this
        can be enforced by combining completeness checks and the contained-in checks
        above, e.g. .isComplete(['Tuition fees up to date','Debtor']) plus .isContainedIn(...)
