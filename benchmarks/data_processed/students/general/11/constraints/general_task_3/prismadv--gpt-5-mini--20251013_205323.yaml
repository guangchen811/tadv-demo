    assumptions:
    - text: 'The input must contain a column named ''Target'' because the code references
        df[''Target''] to compute graduate ratio and to include in output files. If
        the column is missing the script will not be able to compute grad_ratio or
        write expected output columns.

        Representation for a validation rule: assert that the column ''Target'' exists
        in the input schema/CSV.'
      sources:
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 107
        end_line: 111
        file: ''
      - start_line: 93
        end_line: 93
        file: ''
      uid: afadd6fb-05a8-4aa6-ba67-14b3952e8ffe
    - text: 'The ''Target'' column should contain no nulls (completeness = 1.0). The
        code computes grad_ratio = (df[''Target''] == ''Graduate'').mean() and then
        uses grad_ratio in downstream calculations and outputs; missing values would
        be treated as False in the comparison and could distort expected budget/quantile
        behavior. A corresponding validation rule: require non-null values for ''Target''
        (or at least a very small null rate if appropriate). Example deequ-like check:
        .satisfies("CASE WHEN `Target` IS NOT NULL THEN 1 ELSE 0 END", ''Target non-null
        fraction'', lambda x: x == 1)'
      sources:
      - start_line: 93
        end_line: 93
        file: ''
      - start_line: 111
        end_line: 111
        file: ''
      uid: 84357650-f258-4baf-826a-e6e0f3d0ef5b
    - text: 'The ''Target'' column values are expected to be categorical and to match
        the exact strings ''Graduate'', ''Dropout'', or ''Enrolled'' (exact, case-sensitive
        matches). The code checks equality to the literal ''Graduate'', so spelling/case
        differences or unexpected categories will change grad_ratio and downstream
        behavior. Example validation (deequ-style): .satisfies("CASE WHEN `Target`
        IN (''Graduate'',''Dropout'',''Enrolled'') THEN 1 ELSE 0 END", ''Valid Target
        categories'', lambda x: x == 1)'
      sources:
      - start_line: 93
        end_line: 93
        file: ''
      - start_line: 107
        end_line: 111
        file: ''
      uid: 7d0669b5-257e-4962-870a-6e9a3d0eb57d
    - text: 'There should be at least one row with Target == ''Graduate'' (i.e., the
        ''Graduate'' category must be present). The code uses the proportion of ''Graduate''
        rows to set alert budget; if no ''Graduate'' rows exist this may produce an
        unintended alert budget behavior. Example validation: .satisfies("SUM(CASE
        WHEN `Target` = ''Graduate'' THEN 1 ELSE 0 END)", ''Has at least one Graduate'',
        lambda x: x >= 1)'
      sources:
      - start_line: 93
        end_line: 93
        file: ''
