        end_line: 34
        file: ''
      - start_line: 63
        end_line: 63
        file: ''
      uid: 52cc75ef-74db-424b-be4c-d283fa6914ae
    - text: 'The code computes an aggregated academic risk using averages of semester-level
        ratios. It therefore assumes the semester-level ratios are valid probabilities
        in [0,1]. Concretely, for both semesters the pass_rate, no_eval_ratio and
        credit_ratio should be within [0.0, 1.0]. This implies, in particular, that
        approved/enrolled and without_evaluations/enrolled and credited/enrolled should
        produce values between 0 and 1 for rows with enrolled > 0. (Deequ: forAll
        rows ensure 0.0 <= c2_app / c2_enr <= 1.0 when c2_enr > 0, and analogous constraints
        for c2_woe and c2_cred; same for semester 1.)'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      - start_line: 71
        end_line: 74
