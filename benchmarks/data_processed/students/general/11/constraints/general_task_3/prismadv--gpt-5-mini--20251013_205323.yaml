      uid: 8e029faa-185e-41fc-a54b-b7b34ddb30a0
    - text: 'Admission grade is expected to lie in a bounded, positive range so that
        (admission + previous) / 400.0 produces a meaningful 0..1 term. The code divides
        (Admission grade + Previous qualification) by 400 and clips the result to
        [0,1], which implies each grade is expected to be on a similar scale (plausibly
        0..200). A suitable validation is to require values be within a reasonable
        range, e.g. 0 <= Admission grade <= 200. Example validation: .satisfies("CASE
