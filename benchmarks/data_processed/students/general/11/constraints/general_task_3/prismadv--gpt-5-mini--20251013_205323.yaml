  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (credited)","Curricular
    units 1st sem (enrolled)","Curricular units 1st sem (grade)","Curricular units
    1st sem (without evaluations)","Curricular units 2nd sem (approved)","Curricular
    units 2nd sem (credited)","Curricular units 2nd sem (enrolled)","Curricular units
    2nd sem (grade)","Curricular units 2nd sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For each semester, the counts of approved, credited and ''without evaluations''
        should not exceed the number enrolled. Concretely:

        - Curricular units 1st sem (approved) <= Curricular units 1st sem (enrolled)

        - Curricular units 1st sem (credited) <= Curricular units 1st sem (enrolled)

        - Curricular units 1st sem (without evaluations) <= Curricular units 1st sem
        (enrolled)

        You can enforce this in Deequ with SQL-style constraints, for example:

        .satisfies("`Curricular units 1st sem (approved)` >= 0 AND `Curricular units
        1st sem (approved)` <= `Curricular units 1st sem (enrolled)`", "c1_approved_range")

        .satisfies("`Curricular units 1st sem (credited)` >= 0 AND `Curricular units
        1st sem (credited)` <= `Curricular units 1st sem (enrolled)`", "c1_credited_range")

        .satisfies("`Curricular units 1st sem (without evaluations)` >= 0 AND `Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`",
        "c1_woe_range")'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: 9752fa1d-b083-4fd0-a6a9-cdb096aca169
    - text: 'For the second semester, the same ordering constraints must hold:

        - Curricular units 2nd sem (approved) <= Curricular units 2nd sem (enrolled)

        - Curricular units 2nd sem (credited) <= Curricular units 2nd sem (enrolled)

        - Curricular units 2nd sem (without evaluations) <= Curricular units 2nd sem
        (enrolled)

        Deequ examples:

        .satisfies("`Curricular units 2nd sem (approved)` >= 0 AND `Curricular units
        2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)`", "c2_approved_range")

        (similar for credited and without evaluations).'
      sources:
      - start_line: 30
        end_line: 34
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      uid: eeb429d2-f428-4c4d-b04c-0868a2b402d3
    - text: 'Ratios computed as count/enrolled should be valid proportions in [0,1]
        when enrolled > 0. In practice this means for each semester, when enrolled
        > 0:

        - approved / enrolled is between 0 and 1

        - credited / enrolled is between 0 and 1

        - without_evaluations / enrolled is between 0 and 1

        A Deequ-style constraint (combined) could be:

        .satisfies("(`Curricular units 1st sem (enrolled)` = 0) OR ( `Curricular units
        1st sem (approved)`*1.0 / `Curricular units 1st sem (enrolled)` BETWEEN 0
        AND 1 AND `Curricular units 1st sem (credited)`*1.0 / `Curricular units 1st
        sem (enrolled)` BETWEEN 0 AND 1 AND `Curricular units 1st sem (without evaluations)`*1.0
        / `Curricular units 1st sem (enrolled)` BETWEEN 0 AND 1)", "c1_ratio_bounds")

        (and an analogous constraint for 2nd semester).'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      uid: 46256aec-07d9-424a-98c7-e9aaa54fa045
    - text: 'Grades are normalized by dividing by 20 (grade_risk = 1 - grade/20).
        Therefore, when a student is enrolled in a semester (enrolled > 0), the semester
        grade should lie in the valid [0,20] range. Deequ example:

        .satisfies("(`Curricular units 1st sem (enrolled)` = 0) OR (`Curricular units
        1st sem (grade)` BETWEEN 0 AND 20)", "c1_grade_range")

        (and similarly for Curricular units 2nd sem (grade)).'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      uid: 5ed3d462-e107-4785-b2d4-38d433b62edb
    - text: 'Admission grade and Previous qualification are used together to compute
        a preparedness metric (difference and normalized sum). They must be present
        and on the same numeric scale. Practically assert both columns are complete
        and lie in an expected numeric range (e.g. 0..200 so that (a+b)/400 is in
        [0,1]). Deequ example:

        .isComplete(["Admission grade", "Previous qualification (grade)"])

        .satisfies("`Admission grade` BETWEEN 0 AND 200 AND `Previous qualification
        (grade)` BETWEEN 0 AND 200", "admission_prev_range")'
      sources:
      - start_line: 23
        end_line: 24
        file: ''
      - start_line: 66
        end_line: 68
        file: ''
      uid: 04a95188-e4ad-423b-ab7a-0230728ebb2a
    - text: 'The financial flags used to compute finance_risk are compared to 0/1
        ((Tuition fees up to date == 0) | (Debtor == 1)). Both columns should therefore
        contain discrete flag values (0 or 1). Enforce with Deequ e.g.:

        .satisfies("`Tuition fees up to date` IN (0,1) AND `Debtor` IN (0,1)", "finance_flags_binary")

        and ensure they are present (isComplete) if the downstream logic expects them.'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      uid: 23de34ae-8cc4-4e59-aea5-cea6190cc22f
  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (credited)","Curricular
    units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For semester 1, the counts in ''Curricular units 1st sem (approved)'',
        ''Curricular units 1st sem (credited)'', and ''Curricular units 1st sem (without
        evaluations)'' should never exceed ''Curricular units 1st sem (enrolled)''.

        Rationale: the code computes pass_rate1 = approved / enrolled, credit_ratio1
        = credited / enrolled and no_eval_ratio1 = without_evaluations / enrolled,
        so these numerators must be <= the enrolled denominator to keep ratios in
        [0,1].

        Actionable constraint examples (Deequ-style):

        - All rows satisfy approved <= enrolled

        - All rows satisfy credited <= enrolled

        - All rows satisfy without_evaluations <= enrolled

        Representable as e.g. (pseudo-Deequ):

        .assertThat(''Curricular units 1st sem (approved) <= Curricular units 1st
        sem (enrolled)'')

        .assertThat(''Curricular units 1st sem (credited) <= Curricular units 1st
        sem (enrolled)'')

        .assertThat(''Curricular units 1st sem (without evaluations) <= Curricular
        units 1st sem (enrolled)'')'
      sources:
      - start_line: 25
        end_line: 28
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 40
        end_line: 48
        file: ''
      uid: adc6bd30-b93c-4546-ab04-2778e4747c09
    - text: 'The sum of ''Curricular units 1st sem (approved)'' and ''Curricular units
        1st sem (without evaluations)'' should be less than or equal to ''Curricular
        units 1st sem (enrolled)''.

        Rationale: approved + without_evaluations are (respectively) evaluated-and-passed
        and not-evaluated subsets of enrolled; the code treats these as parts of the
        enrolled population when computing pass and no-eval ratios.

        Actionable constraint example:

        .assertThat(''Curricular units 1st sem (approved) + Curricular units 1st sem
        (without evaluations) <= Curricular units 1st sem (enrolled)'')'
      sources:
      - start_line: 25
        end_line: 28
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: 8a2a9c33-1285-4b3c-b4fd-1aff16c0e45d
    - text: 'When ''Curricular units 1st sem (enrolled)'' is zero, the related counts
        ''Curricular units 1st sem (approved)'', ''Curricular units 1st sem (credited)'',
        and ''Curricular units 1st sem (without evaluations)'' should all be zero.

        Rationale: the code replaces enrolled zeros with NaN to avoid division-by-zero
        and then fillna(0.0) on ratios. A more consistent dataset property is that
        if nobody was enrolled, there cannot be approved/credited/without-evaluations
        counts > 0.

        Actionable constraint example (conditional):

        .assertThat(''IF("Curricular units 1st sem (enrolled)" = 0, "Curricular units
        1st sem (approved)" = 0 AND "Curricular units 1st sem (credited)" = 0 AND
        "Curricular units 1st sem (without evaluations)" = 0, TRUE)'')'
      sources:
      - start_line: 25
        end_line: 28
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: 8fd96759-892b-4d1a-b108-1738c5d192fb
    - text: 'Across semesters the credit ratios used in aggregation should be in [0,1]:
        for rows where enrolled > 0, (''Curricular units 1st sem (credited)'' / ''Curricular
        units 1st sem (enrolled)'') and (''Curricular units 2nd sem (credited)'' /
        ''Curricular units 2nd sem (enrolled)'') must be between 0 and 1. This is
        required because credit_ratio1 and credit_ratio2 are averaged and used to
        compute credit_gap_avg = 1.0 - (credit_ratio1 + credit_ratio2)/2.0.

        Actionable constraint examples:

        - For rows with enrolled1 > 0: 0 <= credited1 <= enrolled1

        - For rows with enrolled2 > 0: 0 <= credited2 <= enrolled2

        Representable as conditional Deequ assertions or SQL-like checks.'
      sources:
      - start_line: 25
        end_line: 33
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      - start_line: 71
        end_line: 74
        file: ''
      uid: 83a7c8e7-4aa5-4c9f-9b07-cc5d0d24028d
