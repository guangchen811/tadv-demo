        end_line: 48
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      uid: ac00cac6-527e-4506-85fc-243bf38d29a6
    - text: 'The ''Debtor'' column is expected to be a binary indicator with allowed
        values {0, 1} where 1 indicates a debtor and 0 indicates not a debtor. The
        code uses (df[''Debtor''] == 1) to mark finance risk, so other values would
        break the intended logic. Example validation: .satisfies(''CASE WHEN `Debtor`
        IN (0,1) THEN 1 ELSE 0 END'', ''Debtor binary'', lambda x: x == 1)'
      sources:
      - start_line: 22
