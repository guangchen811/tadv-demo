    assumptions:
    - text: Both 'Tuition fees up to date' and 'Debtor' are binary indicator columns
        taking values {0, 1}. The code coerces these columns to numeric and later
        tests equality against 0 and 1, so it assumes no other values appear. This
        can be encoded in Deequ as isContainedIn constraints for each column, e.g.
        .isContainedIn(['Tuition fees up to date'], [0, 1]) and .isContainedIn(['Debtor'],
        [0, 1]).
      sources:
