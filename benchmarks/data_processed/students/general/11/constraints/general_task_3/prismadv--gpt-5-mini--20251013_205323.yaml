      - start_line: 49
        end_line: 49
        file: ''
      uid: 2374fc58-840a-433c-b16d-5d001ddcaad2
    - text: 'The two columns are complementary/consistent: a record marked as Debtor
        == 1 should correspond to Tuition fees up to date == 0 (and vice versa). The
        finance_risk calculation uses these as logical opposites (Debtor OR Tuition==0),
        so the code implicitly expects Debtor to indicate unpaid tuition. This can
        be expressed as a row-level constraint such as ( `Tuition fees up to date`
        + `Debtor` ) == 1 for every row, or .satisfies(''`Tuition fees up to date`
        + `Debtor` = 1'', ''tuition_debtor_inverse'').'
