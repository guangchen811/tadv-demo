        in {0,1} and per-row (Tuition fees up to date + Debtor) <= 1. Example Deequ-style
        checks: .isContainedIn(''Tuition fees up to date'', [0,1]) and .isContainedIn(''Debtor'',
        [0,1]) and .satisfies(''`Tuition fees up to date` + `Debtor` <= 1'', ''no_conflicting_financial_flags'').'
