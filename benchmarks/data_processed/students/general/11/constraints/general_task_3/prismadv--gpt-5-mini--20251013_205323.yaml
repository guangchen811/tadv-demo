      uid: 0994a930-87be-4bfa-8a15-87776ba38554
    - text: 'The ''Debtor'' column values must be numeric / integer-convertible. The
        code calls pd.to_numeric(..., errors=''coerce'') on this column and later
        compares values to 1, so all input values should be valid numbers (or numeric
        strings) so conversion does not produce NaNs. Example validation (deequ-style):
        .satisfies(''CASE WHEN `Debtor` IS NOT NULL THEN 1 ELSE 0 END'', ''Debtor
        not null after coercion'', lambda x: x == 1)'
