    - text: 'The grade used for 2nd-semester grade risk must be a valid numeric grade
        on the expected scale. Specifically, ''Curricular units 2nd sem (grade)''
        should be present, non-null, and lie within the range [0, 20]. (Useful as
        Deequ constraints: isComplete(''c2_grade'') and forAll(row => row(''c2_grade'')
        >= 0 && row(''c2_grade'') <= 20).)'
      sources:
