      uid: daa99b8a-2a59-4622-8ea4-8efab4b8dd01
    - text: 'Counts within a semester should be internally consistent: the sum of
        approved and without-evaluations should not exceed enrolled (approved + without_evaluations
        <= enrolled). This must hold for the 2nd semester (and similarly for the 1st
        semester) because approved and without-evaluations are subsets of the enrolled
        units used to compute rates. (Deequ: forAll(row => row(''c2_app'') + row(''c2_woe'')
        <= row(''c2_enr'')).)'
