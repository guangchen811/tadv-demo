  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (credited)","Curricular
    units 1st sem (enrolled)","Curricular units 1st sem (grade)","Curricular units
    1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For each record, the number of approved first-semester curricular units
        should never exceed the number enrolled. Concretely: Curricular units 1st
        sem (approved) <= Curricular units 1st sem (enrolled) for rows with enrolled
        > 0. This keeps pass_rate1 = c1_app / c1_enr in [0,1]. Actionable constraint
        (Deequ-like): .satisfies("`Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (enrolled)`", "approved_le_enrolled").'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: 5be57340-b34b-4711-bfa8-50ba0067ca7e
    - text: 'For each record, the number of courses without evaluations in the first
        semester should not exceed the number enrolled: Curricular units 1st sem (without
        evaluations) <= Curricular units 1st sem (enrolled). This ensures no_eval_ratio1
        = c1_woe / c1_enr is in [0,1]. Actionable constraint: .satisfies("`Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`",
        "woe_le_enrolled").'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: 6cc01e83-c57c-4fbe-b03e-3f9d32b42264
    - text: 'For each record, the number of credited first-semester curricular units
        should not exceed the number enrolled: Curricular units 1st sem (credited)
        <= Curricular units 1st sem (enrolled). This keeps credit_ratio1 = c1_cred
        / c1_enr in [0,1]. Actionable constraint: .satisfies("`Curricular units 1st
        sem (credited)` <= `Curricular units 1st sem (enrolled)`", "cred_le_enrolled").'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: 08059fcd-3842-4169-820f-eedd9a9f9f97
    - text: 'Combined consistency: the sum of approved and without-evaluations should
        not exceed enrolled for the first semester: Curricular units 1st sem (approved)
        + Curricular units 1st sem (without evaluations) <= Curricular units 1st sem
        (enrolled). This prevents impossible proportions when computing pass_rate1
        and no_eval_ratio1. Actionable constraint: .satisfies("(`Curricular units
        1st sem (approved)` + `Curricular units 1st sem (without evaluations)`) <=
        `Curricular units 1st sem (enrolled)`", "approved_plus_woe_le_enrolled").'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: 1546e409-edc7-4a83-9637-7991cb8028ee
    - text: 'If enrolled is zero for the first semester, the related counts should
        also be zero: when Curricular units 1st sem (enrolled) == 0 then Curricular
        units 1st sem (approved) == 0, Curricular units 1st sem (without evaluations)
        == 0, and Curricular units 1st sem (credited) == 0. This avoids creating nonzero
        numerators that get coerced via the den1 replacement and produce misleading
        ratios. Actionable constraint (Deequ-like): .satisfies("if(`Curricular units
        1st sem (enrolled)` = 0, `Curricular units 1st sem (approved)` = 0 AND `Curricular
        units 1st sem (without evaluations)` = 0 AND `Curricular units 1st sem (credited)`
        = 0, true)", "zero_enrolled_zero_components").'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: ed4e2fd6-45c2-401a-ba8f-df95f4a2cc94
    - text: "Grades interaction: for records that have at least one approved first-semester\
        \ unit (Curricular units 1st sem (approved) > 0), the first-semester grade\
        \ should be present and fall within the expected 0\u201320 range: 0.0 <= Curricular\
        \ units 1st sem (grade) <= 20.0. This keeps grade_risk_1 = 1.0 - (c1_grade\
        \ / 20.0) well-defined and in a sensible range. Actionable constraint: .satisfies(\"\
        if(`Curricular units 1st sem (approved)` > 0, `Curricular units 1st sem (grade)`\
        \ IS NOT NULL AND `Curricular units 1st sem (grade)` >= 0 AND `Curricular\
        \ units 1st sem (grade)` <= 20, true)\", \"grade_present_and_in_range_when_approved\"\
        )."
      sources:
