        so the two columns must represent grades using the same units/scale. Example
        validation: require both columns to share the same bounds (e.g. both in [0,200])
        or check that their pairwise ratios/means are reasonable (e.g. median(Admission
        / Previous) is finite and within a small factor around 1).'
