constraints:
  Curricular units 1st sem (approved):
    code:
    - - .isNonNegative('Curricular units 1st sem (approved)')
      - Invalid
    - - .satisfies('`Curricular units 1st sem (approved)` <= `Curricular units 1st
        sem (evaluations)`', 'Approved units must be less than or equal to evaluated
        units for 1st semester')
      - Valid
    assumptions: []
  Curricular units 1st sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 1st sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (evaluations):
    code:
    - - .isNonNegative('Curricular units 1st sem (evaluations)')
      - Invalid
    assumptions: []
  Curricular units 1st sem (grade):
    code:
    - - .hasMax('Curricular units 1st sem (grade)', 20.0)
      - Invalid
    - - .isComplete('Curricular units 1st sem (grade)')
      - Valid
    - - .isNonNegative('Curricular units 1st sem (grade)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (approved):
    code:
    - - .isNonNegative('Curricular units 2nd sem (approved)')
      - Invalid
    - - .satisfies('`Curricular units 2nd sem (approved)` <= `Curricular units 2nd
        sem (evaluations)`', 'Approved units must be less than or equal to evaluated
        units for 2nd semester')
      - Valid
    assumptions: []
  Curricular units 2nd sem (enrolled):
    code:
    - - .isNonNegative('Curricular units 2nd sem (enrolled)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (evaluations):
    code:
    - - .isNonNegative('Curricular units 2nd sem (evaluations)')
      - Invalid
    assumptions: []
  Curricular units 2nd sem (grade):
    code:
    - - .hasMax('Curricular units 2nd sem (grade)', 20.0)
      - Invalid
    - - .isComplete('Curricular units 2nd sem (grade)')
      - Valid
    - - .isNonNegative('Curricular units 2nd sem (grade)')
      - Invalid
    assumptions: []
  Debtor:
    code:
    - - .isContainedIn('Debtor', ['0', '1'])
      - Valid
    assumptions: []
  Scholarship holder:
    code:
    - - .isContainedIn('Scholarship holder', ['0', '1'])
      - Valid
    assumptions: []
  Tuition fees up to date:
