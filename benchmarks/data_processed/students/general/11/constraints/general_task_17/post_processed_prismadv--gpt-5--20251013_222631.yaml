    - text: 'The ''Unemployment rate'' column should not be constant; it must have
        positive variance (stddev_pop > 0) or at least two distinct numeric values.
        Otherwise the z-score normalization will divide by zero, leading to NaNs that
        propagate to the risk score. Possible validation: stddev(''Unemployment rate'')
        > 0 and approx_count_distinct(''Unemployment rate'') >= 2.'
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      - start_line: 120
        end_line: 120
        file: ''
      - start_line: 123
        end_line: 124
        file: ''
      uid: fef9a859-8c43-4735-b0b6-66f9d6dcbce1
    - text: 'The ''Unemployment rate'' values must be finite (no ''inf'' or ''-inf'')
        after parsing; infinite values would corrupt mean/std and produce NaNs downstream.
        Possible validation: all parsed values are finite.'
      sources:
      - start_line: 46
        end_line: 46
        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      uid: d26fbec8-c530-41e4-a490-e469fd39471f
    - text: 'The ''Unemployment rate'' should be within a realistic percentage range,
        e.g., between 0 and 100 inclusive, with no negatives. This keeps the macro-stress
        signal meaningful and prevents pathological inputs from saturating the sigmoid.
        Possible validation: values_between(0, 100, mostly=1.0) and nonNegative.'
      sources:
      - start_line: 46
        end_line: 46
        file: ''
      - start_line: 50
        end_line: 52
        file: ''
      - start_line: 120
        end_line: 120
        file: ''
      uid: 7bb24e0f-31cc-4ed2-9c3e-59ee1a0fbceb
    - text: The 'Unemployment rate' should use a consistent unit across rows (percentages
        rather than a mix of percentages and fractions). A practical check is that
        the vast majority of values lie well above 1 but below 100 (e.g., between
        1 and 100 for at least 95% of rows).
      sources:
      - start_line: 46
        end_line: 46
        file: ''
      - start_line: 50
        end_line: 52
        file: ''
      uid: 8ec8997e-2b66-429e-aad3-2b420a98054d
  '["Admission grade","Previous qualification (grade)"]':
    code: []
    assumptions:
    - text: 'Both ''Admission grade'' and ''Previous qualification (grade)'' must
        be present, finite, and parseable as numeric in every row; otherwise preparedness
        becomes NaN and propagates to the final risk and priority outputs. This can
        be enforced with a multi-column Deequ constraint like: .satisfies("NOT (isnull(`Admission
        grade`) OR isnan(`Admission grade`) OR isnull(`Previous qualification (grade)`)
        OR isnan(`Previous qualification (grade)`))", "grades_both_present_and_finite",
        assertionLevel=AssertionLevel.Error, filterNulls=false)'
      sources:
      - start_line: 29
        end_line: 30
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 121
        end_line: 124
        file: ''
      - start_line: 127
        end_line: 133
        file: ''
      uid: 0eb423f8-aa01-47c7-bf82-165e3c68712d
    - text: "Both 'Admission grade' and 'Previous qualification (grade)' are assumed\
        \ to be on the same 0\u2013200 scale used in the formula (division by 200).\
        \ Enforce that each row has both grades within [0, 200] simultaneously. Example\
        \ Deequ constraint: .satisfies(\"(`Admission grade` BETWEEN 0 AND 200) AND\
        \ (`Previous qualification (grade)` BETWEEN 0 AND 200)\", \"grades_within_0_200\"\
        )"
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      uid: 15680e90-c51c-4163-b808-567f20304674
    - text: "The weighted preparedness computed from the two grades must fall within\
        \ [0, 1] for every row: 0.6*(Admission grade/200) + 0.4*(Previous qualification\
        \ (grade)/200) \u2208 [0, 1]. Example Deequ constraint: .satisfies(\"(0.6\
        \ * (`Admission grade` / 200.0) + 0.4 * (`Previous qualification (grade)`\
        \ / 200.0)) >= 0.0 AND (0.6 * (`Admission grade` / 200.0) + 0.4 * (`Previous\
        \ qualification (grade)` / 200.0)) <= 1.0\", \"preparedness_in_unit_interval\"\
        )"
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 121
        end_line: 121
        file: ''
      uid: 5a1c1c1a-5110-4ee9-b504-5965d1cea2ee
  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (credited)","Curricular
    units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'Approved curricular units in 1st semester should be a subset of enrolled
        units: for every row with ''Curricular units 1st sem (enrolled)'' > 0, 0 <=
        ''Curricular units 1st sem (approved)'' <= ''Curricular units 1st sem (enrolled)''.
        This keeps pass_rate1 within [0,1]. Deequ example: Compliance("ap1_le_en1",
        "`Curricular units 1st sem (approved)` >= 0 AND `Curricular units 1st sem
        (approved)` <= `Curricular units 1st sem (enrolled)`").'
      sources:
      - start_line: 72
        end_line: 77
        file: ''
      uid: e08ce704-524b-4240-86b0-2f9791cba555
    - text: 'Curricular units without evaluations in 1st semester should also be a
        subset of enrolled units: for every row with ''Curricular units 1st sem (enrolled)''
        > 0, 0 <= ''Curricular units 1st sem (without evaluations)'' <= ''Curricular
        units 1st sem (enrolled)''. This keeps noeval_ratio1 within [0,1]. Deequ example:
        Compliance("wo1_le_en1", "`Curricular units 1st sem (without evaluations)`
        >= 0 AND `Curricular units 1st sem (without evaluations)` <= `Curricular units
        1st sem (enrolled)`").'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      uid: 8a9a4c19-fb3e-4963-b399-09383182eee9
    - text: 'Approved and without-evaluation counts are disjoint categories over the
        same enrolled set, so their sum should not exceed enrollments: ''Curricular
        units 1st sem (approved)'' + ''Curricular units 1st sem (without evaluations)''
        <= ''Curricular units 1st sem (enrolled)''. Deequ example: Compliance("ap1_wo1_sum_le_en1",
        "`Curricular units 1st sem (approved)` + `Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)`").'
      sources:
      - start_line: 77
        end_line: 79
        file: ''
      uid: a2caa0d7-2c03-4952-9e27-38605123e0d3
    - text: 'If no curricular units were enrolled in 1st semester, there should be
        no approvals or no-evaluation counts recorded: if ''Curricular units 1st sem
        (enrolled)'' = 0 then ''Curricular units 1st sem (approved)'' = 0 and ''Curricular
        units 1st sem (without evaluations)'' = 0. Deequ example: Compliance("en1_zero_implies_zero_others",
        "CASE WHEN `Curricular units 1st sem (enrolled)` = 0 THEN (`Curricular units
        1st sem (approved)` = 0 AND `Curricular units 1st sem (without evaluations)`
        = 0) ELSE true END").'
      sources:
      - start_line: 77
        end_line: 79
        file: ''
      uid: 62760683-b3a7-4c2f-b197-bfbec6528ca3
    - text: 'There is a strong positive linear relationship between 1st-semester enrollments
        and approvals across the dataset: corr(''Curricular units 1st sem (approved)'',
        ''Curricular units 1st sem (enrolled)'') >= 0.5 and both columns have non-zero
        standard deviation. This is required to compute a meaningful regression slope
        and expected approvals. Deequ example: Correlation("Curricular units 1st sem
        (approved)", "Curricular units 1st sem (enrolled)", lowerBound=0.5).'
      sources:
      - start_line: 83
        end_line: 87
        file: ''
      uid: b48ef58b-c499-41e6-9c3e-58b5f2ce608f
  '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'For every record, ''Curricular units 1st sem (approved)'' must be between
        0 and ''Curricular units 1st sem (enrolled)'' (0 <= approved <= enrolled).
        This ensures pass_rate1 = approved/enrolled is defined and bounded in [0,1].
        Example Deequ compliance: ap1_le_en1 = "`Curricular units 1st sem (approved)`
        >= 0 AND `Curricular units 1st sem (enrolled)` >= 0 AND `Curricular units
        1st sem (approved)` <= `Curricular units 1st sem (enrolled)`".'
      sources:
      - start_line: 72
        end_line: 77
        file: ''
      uid: 45554f8d-6b24-409c-89a8-85e1a4bc8798
    - text: 'If ''Curricular units 1st sem (enrolled)'' equals 0, then ''Curricular
        units 1st sem (approved)'' must be 0 (no approvals without enrollment). Example
        Deequ compliance: zero_enrolled_implies_zero_approved = "CASE WHEN `Curricular
        units 1st sem (enrolled)` = 0 THEN `Curricular units 1st sem (approved)` =
        0 ELSE true END".'
      sources:
      - start_line: 72
        end_line: 77
        file: ''
      uid: 732250ef-fc6d-41e6-8672-fcb2cc585685
    - text: 'Across the dataset, ''Curricular units 1st sem (enrolled)'' and ''Curricular
        units 1st sem (approved)'' should have a strong positive Pearson correlation
        (e.g., >= 0.7), and both columns must have non-zero standard deviation. This
        guarantees the regression-based expected approvals (slope/intercept) are well-defined
        and meaningful. Example Deequ: hasCorrelation(''Curricular units 1st sem (enrolled)'',
        ''Curricular units 1st sem (approved)'', _ >= 0.7) plus hasStdDev(''Curricular
        units 1st sem (enrolled)'', _ > 0) and hasStdDev(''Curricular units 1st sem
        (approved)'', _ > 0).'
      sources:
      - start_line: 81
        end_line: 87
        file: ''
      uid: 0490cc4c-3b1f-4b36-b91e-8ca60bfafa92
    - text: 'Both ''Curricular units 1st sem (enrolled)'' and ''Curricular units 1st
        sem (approved)'' must be fully numeric and non-null for all rows (joint completeness),
        since the code coerces to numeric and immediately casts to integer. Example
        Deequ compliance: non_null_both = "`Curricular units 1st sem (enrolled)` IS
        NOT NULL AND `Curricular units 1st sem (approved)` IS NOT NULL".'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      uid: af99472f-86e1-4a1f-b691-e7fb68c24f7a
  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (enrolled)","Curricular
    units 2nd sem (approved)","Curricular units 2nd sem (enrolled)"]'
  : code: []
    assumptions:
    - text: 'For each semester, approvals must be feasible given enrollments: 0 <=
        `Curricular units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)`
        and 0 <= `Curricular units 2nd sem (approved)` <= `Curricular units 2nd sem
        (enrolled)`. Additionally, if enrollment is 0 in a semester, approvals must
        be 0 in that semester. In Deequ, two row-level constraints like these can
        be used: .satisfies("`Curricular units 1st sem (approved)` >= 0 AND `Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)` AND ( `Curricular
        units 1st sem (enrolled)` > 0 OR `Curricular units 1st sem (approved)` = 0
        )", "ap1_vs_en1", lambda r: r == 1.0) and .satisfies("`Curricular units 2nd
        sem (approved)` >= 0 AND `Curricular units 2nd sem (approved)` <= `Curricular
        units 2nd sem (enrolled)` AND ( `Curricular units 2nd sem (enrolled)` > 0
        OR `Curricular units 2nd sem (approved)` = 0 )", "ap2_vs_en2", lambda r: r
        == 1.0).'
      sources:
      - start_line: 72
        end_line: 77
        file: ''
      - start_line: 90
        end_line: 95
        file: ''
      uid: 2361cd16-f0a9-4951-b02c-add34dac0bf8
    - text: 'Within each semester, enrollments and approvals should have a strong
        positive correlation to justify the linear expectation model: corr(`Curricular
        units 1st sem (enrolled)`, `Curricular units 1st sem (approved)`) >= 0.6 and
        corr(`Curricular units 2nd sem (enrolled)`, `Curricular units 2nd sem (approved)`)
        >= 0.6. This can be represented with Deequ correlation constraints, e.g.,
        .hasCorrelation("Curricular units 1st sem (enrolled)", "Curricular units 1st
        sem (approved)", lowerBound=0.6, upperBound=1.0) and similarly for the 2nd
        semester.'
      sources:
      - start_line: 83
        end_line: 87
        file: ''
      - start_line: 99
        end_line: 103
        file: ''
      uid: 422695fd-aad1-40fb-b0e9-1875191450fa
    - text: 'For the linear expectation computations to be well-defined, both enrollment
        and approval counts must exhibit non-zero variance per semester: std(`Curricular
        units 1st sem (enrolled)`) > 0 and std(`Curricular units 1st sem (approved)`)
        > 0; std(`Curricular units 2nd sem (enrolled)`) > 0 and std(`Curricular units
        2nd sem (approved)`) > 0. In Deequ, use standard deviation constraints like
        .hasStandardDeviation(column, lambda s: s > 0) for each of the four columns.'
      sources:
      - start_line: 83
        end_line: 84
        file: ''
      - start_line: 99
        end_line: 100
        file: ''
      uid: b500ed19-2d6d-4285-8995-5f92e24498c0
    - text: 'Across semesters, the total number of approvals must not exceed total
        enrollments, and if total enrollment is 0 then total approvals must be 0:
        (`Curricular units 1st sem (approved)` + `Curricular units 2nd sem (approved)`)
        <= (`Curricular units 1st sem (enrolled)` + `Curricular units 2nd sem (enrolled)`),
        and ((`Curricular units 1st sem (enrolled)` + `Curricular units 2nd sem (enrolled)`)
        > 0 OR (`Curricular units 1st sem (approved)` + `Curricular units 2nd sem
        (approved)`) = 0). In Deequ, this can be expressed as a row-level .satisfies
        constraint on the combined expression.'
      sources:
      - start_line: 106
        end_line: 108
        file: ''
      uid: 329a3975-776a-463f-a3fc-d2298b749c13
  '["Curricular units 1st sem (credited)","Curricular units 1st sem (enrolled)"]':
    code: []
    assumptions:
    - text: 'Semester 1 credited units must not exceed enrolled units for any record,
        and zero enrollment implies zero credited units. We could represent this as
        Deequ compliance constraints like: addConstraint(Compliance("cr1_le_en1",
        "`Curricular units 1st sem (credited)` <= `Curricular units 1st sem (enrolled)`",
        1.0)) and addConstraint(Compliance("zero_en1_zero_cr1", "(`Curricular units
        1st sem (enrolled)` == 0) ==> (`Curricular units 1st sem (credited)` == 0)",
        1.0)).'
      sources:
      - start_line: 32
        end_line: 34
        file: ''
      - start_line: 72
        end_line: 79
        file: ''
      uid: 241b77d0-8769-40a6-a8f1-41f2e8dd4e62
    - text: 'Semester 1 approved and without-evaluation counts must not exceed enrolled
        units, and zero enrollment implies both are zero. This ensures pass_rate1
        and noeval_ratio1 are bounded in [0, 1]. Deequ examples: addConstraint(Compliance("ap1_le_en1",
        "`Curricular units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)`",
        1.0)); addConstraint(Compliance("wo1_le_en1", "`Curricular units 1st sem (without
        evaluations)` <= `Curricular units 1st sem (enrolled)`", 1.0)); addConstraint(Compliance("zero_en1_zero_ap1_wo1",
        "(`Curricular units 1st sem (enrolled)` == 0) ==> ((`Curricular units 1st
        sem (approved)` == 0) and (`Curricular units 1st sem (without evaluations)`
        == 0))", 1.0)).'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      uid: 98967988-31ab-4295-9b09-95853d6871e8
    - text: 'Across the dataset, Semester 1 approvals and enrollments should exhibit
        a strong positive relationship so that the linear expectation model is meaningful:
        Pearson correlation(ap1, en1) >= 0.5 and both columns have non-zero standard
        deviation. Deequ examples: hasCorrelation("Curricular units 1st sem (approved)",
        "Curricular units 1st sem (enrolled)", _ >= 0.5); hasStandardDeviation("Curricular
        units 1st sem (approved)", _ > 0); hasStandardDeviation("Curricular units
        1st sem (enrolled)", _ > 0).'
      sources:
      - start_line: 83
        end_line: 87
        file: ''
      uid: 60d36c7a-04ee-4307-b0dc-d9d7e6b5d3f7
    - text: 'If a student has any credited/approved/without-evaluation units in Semester
        1, they must have been enrolled in at least one unit that semester. Deequ
        compliance (implication) examples: addConstraint(Compliance("cr1_implies_en1_pos",
        "(`Curricular units 1st sem (credited)` > 0) ==> (`Curricular units 1st sem
        (enrolled)` > 0)", 1.0)); addConstraint(Compliance("ap1_implies_en1_pos",
        "(`Curricular units 1st sem (approved)` > 0) ==> (`Curricular units 1st sem
        (enrolled)` > 0)", 1.0)); addConstraint(Compliance("wo1_implies_en1_pos",
        "(`Curricular units 1st sem (without evaluations)` > 0) ==> (`Curricular units
        1st sem (enrolled)` > 0)", 1.0)).'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      uid: b6fbce6a-b0d2-49c6-8483-41d1e0a12edb
  '["Curricular units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]':
    code: []
    assumptions:
    - text: 'For every record, ''Curricular units 1st sem (without evaluations)''
        must be less than or equal to ''Curricular units 1st sem (enrolled)''. Deequ
        example: .satisfies(''`Curricular units 1st sem (without evaluations)` <=
        `Curricular units 1st sem (enrolled)`'', ''wo1_le_en1'')'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      uid: f9d0f3d5-80c0-42b5-aee3-0220e6dbe564
    - text: 'If ''Curricular units 1st sem (enrolled)'' is 0, then ''Curricular units
        1st sem (without evaluations)'' must be 0 (no units can be without evaluation
        if none are enrolled). Deequ example: .satisfies(''(`Curricular units 1st
        sem (enrolled)` > 0) OR (`Curricular units 1st sem (without evaluations)`
        = 0)'', ''wo1_zero_when_en1_zero'')'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      uid: 5792fa4e-12a9-4b41-bfc0-394f42ebc379
    - text: 'When ''Curricular units 1st sem (enrolled)'' > 0, the ratio (''Curricular
        units 1st sem (without evaluations)'' / ''Curricular units 1st sem (enrolled)'')
        must lie in [0, 1]. Deequ example: .satisfies(''(`Curricular units 1st sem
        (enrolled)` = 0) OR ((`Curricular units 1st sem (without evaluations)` / `Curricular
        units 1st sem (enrolled)`) >= 0 AND (`Curricular units 1st sem (without evaluations)`
        / `Curricular units 1st sem (enrolled)`) <= 1)'', ''noeval_ratio1_in_0_1'')'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      uid: 99a6d250-7cc3-44ca-b3a9-91f20dbed693
    - text: 'Both ''Curricular units 1st sem (enrolled)'' and ''Curricular units 1st
        sem (without evaluations)'' must be non-null on the same records (the script
        casts both to int and computes ratios). Deequ example: .satisfies(''`Curricular
        units 1st sem (enrolled)` IS NOT NULL AND `Curricular units 1st sem (without
        evaluations)` IS NOT NULL'', ''en1_wo1_non_null'')'
      sources:
      - start_line: 72
        end_line: 75
        file: ''
      uid: b198bb25-edda-472e-bd2a-ad1995832fdf
  '["Curricular units 1st sem (grade)","Curricular units 2nd sem (grade)"]':
    code: []
    assumptions:
    - text: 'Both ''Curricular units 1st sem (grade)'' and ''Curricular units 2nd
        sem (grade)'' must be present, numeric, and bounded in [0, 20] for every row,
        since they are each divided by 20 and then averaged to affect risk. This can
        be expressed as Deequ constraints such as: .isComplete(''Curricular units
        1st sem (grade)''), .isComplete(''Curricular units 2nd sem (grade)''), and
        .satisfies(''`Curricular units 1st sem (grade)` >= 0 and `Curricular units
        1st sem (grade)` <= 20 and `Curricular units 2nd sem (grade)` >= 0 and `Curricular
        units 2nd sem (grade)` <= 20'', ''grades_in_0_20'').'
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 76
        end_line: 78
        file: ''
      - start_line: 94
        end_line: 96
        file: ''
      - start_line: 109
        end_line: 109
        file: ''
      - start_line: 116
        end_line: 116
        file: ''
      uid: 48ee8679-b05e-4e4e-9c94-cfad416e9327
    - text: "The normalized mean of the two semester grades must be defined and within\
        \ [0, 1] for every record, because it directly feeds the grade_component,\
        \ overall risk_score, and priority_tier. Enforce that both grades are non-null\
        \ and ((gr1 + gr2) / 40) \u2208 [0, 1]. Example Deequ constraint: .satisfies('isnotnull(`Curricular\
        \ units 1st sem (grade)`) and isnotnull(`Curricular units 2nd sem (grade)`)\
        \ and ((`Curricular units 1st sem (grade)` + `Curricular units 2nd sem (grade)`)\
        \ / 40) >= 0 and ((`Curricular units 1st sem (grade)` + `Curricular units\
        \ 2nd sem (grade)`) / 40) <= 1', 'mean_grade_norm_defined')."
      sources:
      - start_line: 109
        end_line: 109
        file: ''
      - start_line: 116
        end_line: 116
        file: ''
      - start_line: 123
        end_line: 131
        file: ''
      uid: b1fef18e-671b-4e42-b50d-25d14865864d
    - text: 'Per-semester academic counts are internally consistent: 0 <= approved
        <= enrolled, 0 <= credited <= enrolled, 0 <= without_evaluations <= enrolled,
        and (approved + credited + without_evaluations) <= enrolled for both semesters.
        This keeps pass_rate and noeval_ratio within [0, 1] and makes the success-gap
        ratios meaningful. Deequ examples: .satisfies(''`Curricular units 1st sem
        (approved)` >= 0 and `Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (enrolled)` and `Curricular units 1st sem (credited)` >= 0 and
        `Curricular units 1st sem (credited)` <= `Curricular units 1st sem (enrolled)`
        and `Curricular units 1st sem (without evaluations)` >= 0 and `Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`
        and (`Curricular units 1st sem (approved)` + `Curricular units 1st sem (credited)`
        + `Curricular units 1st sem (without evaluations)`) <= `Curricular units 1st
        sem (enrolled)`'', ''sem1_counts_consistent'') and an analogous constraint
        for semester 2.'
      sources:
      - start_line: 71
        end_line: 79
        file: ''
      - start_line: 89
        end_line: 97
        file: ''
      uid: 74023fb1-c9fa-4d42-aab5-24b753b695bc
    - text: 'Approved and enrolled counts are strongly positively correlated in each
        semester, and enrolled must have nonzero variance, so the linear expectation
        model (slope/intercept) is well-defined. Deequ examples: .hasCorrelation(''Curricular
        units 1st sem (enrolled)'', ''Curricular units 1st sem (approved)'', lowerBound=0.5)
        and .hasCorrelation(''Curricular units 2nd sem (enrolled)'', ''Curricular
        units 2nd sem (approved)'', lowerBound=0.5).'
      sources:
      - start_line: 81
        end_line: 87
        file: ''
      - start_line: 99
        end_line: 103
        file: ''
      uid: 88fb5f23-ed48-4189-bb39-f5d58feb68a7
    - text: 'Payment status flags are consistent: there should be no record where
        ''Tuition fees up to date'' == 0 and ''Debtor'' == 0 (fees not up to date
        should imply debtor). Deequ example: .satisfies(''not((`Tuition fees up to
        date` = 0 and `Debtor` = 0))'', ''tuition_debtor_consistency'').'
      sources:
      - start_line: 61
        end_line: 65
        file: ''
      uid: f94fad26-ac3d-4e48-b1a1-f0169226ee71
    - text: 'Macro variables used to compute macro_stress are numeric with nonzero
        variance so z-scores are defined: std(GDP) > 0, std(Unemployment rate) > 0,
        std(Inflation rate) > 0. Deequ examples: .isComplete(''GDP''), .isComplete(''Unemployment
        rate''), .isComplete(''Inflation rate''), and .satisfies(''stddev_pop(`GDP`)
        > 0 and stddev_pop(`Unemployment rate`) > 0 and stddev_pop(`Inflation rate`)
