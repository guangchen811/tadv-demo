      uid: 879f3f5d-6df3-4875-9432-1d08abb5385d
  '["Debtor","Tuition fees up to date"]':
    code: []
    assumptions:
    - text: 'The ''Debtor'' and ''Tuition fees up to date'' columns encode the same
        payment status and must be mutually exclusive complements per row: Debtor
        + `Tuition fees up to date` == 1. Only the pairs (Debtor=1, Tuition fees up
        to date=0) and (Debtor=0, Tuition fees up to date=1) are allowed; (1,1) and
        (0,0) are disallowed. Deequ representation examples: .satisfies(''Debtor +
        `Tuition fees up to date` == 1'', ''debtor_tuition_complement'', assertion
        = lambda r: r[''compliance''] >= 0.98) or, equivalently, two constraints:
        .satisfies(''NOT (Debtor == 1 AND `Tuition fees up to date` == 1)'', ''no_conflicting_paid_and_debtor'',
        lambda r: r[''compliance''] >= 0.98) and .satisfies(''NOT (Debtor == 0 AND
        `Tuition fees up to date` == 0)'', ''no_both_clear_and_not_up_to_date'', lambda
        r: r[''compliance''] >= 0.98).'
      sources:
      - start_line: 62
        end_line: 64
        file: ''
      - start_line: 114
        end_line: 114
        file: ''
      uid: 2bff284f-c42f-45df-90fc-c6dd6feea7f3
    - text: 'Both ''Debtor'' and ''Tuition fees up to date'' are binary, numeric,
        and non-null flags on every row (values restricted to {0,1}) so they can be
        safely cast to integers and combined. Deequ representation examples: .isContainedIn(''Debtor'',
        [0,1]) and .isContainedIn(''Tuition fees up to date'', [0,1]) with .hasCompleteness(''Debtor'',
        c => c == 1.0) and .hasCompleteness(''Tuition fees up to date'', c => c ==
        1.0); or a single row-level check: .satisfies(''(Debtor in (0,1)) AND (`Tuition
        fees up to date` in (0,1))'', ''debtor_tuition_binary'', lambda r: r[''compliance'']
        == 1.0).'
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      uid: 623b8a76-a130-4e26-83df-a256268566b5
    - text: 'Arrears prevalence (defined as (Debtor == 1) OR (`Tuition fees up to
        date` == 0)) should remain within an expected range to keep risk calibration
        stable; target overall share between 0.09 and 0.15. Deequ representation:
        .satisfies(''(Debtor == 1) OR (`Tuition fees up to date` == 0)'', ''arrears_lower_bound'',
        lambda r: r[''compliance''] >= 0.09) and .satisfies(''NOT ((Debtor == 1) OR
        (`Tuition fees up to date` == 0))'', ''arrears_upper_bound'', lambda r: r[''compliance'']
        >= 0.85).'
      sources:
      - start_line: 62
        end_line: 64
        file: ''
      - start_line: 114
        end_line: 114
        file: ''
      uid: 8d886a0a-47bf-4365-bfd8-77a3c789fec5
  '["GDP","Inflation rate","Unemployment rate"]':
    code: []
    assumptions:
    - text: 'Macro inputs are row-wise jointly complete and numeric-convertible: every
        row must have non-null, parseable values for ''GDP'', ''Unemployment rate'',
        and ''Inflation rate'', and each column must have non-zero variance so z-scores
        are defined. Example Deequ checks: .satisfies("GDP IS NOT NULL AND `Unemployment
        rate` IS NOT NULL AND `Inflation rate` IS NOT NULL", "macro_all_present",
        lambda v: v == 1.0) and per-column variability checks such as .hasStandardDeviation("GDP",
        lambda s: s > 0), .hasStandardDeviation("Unemployment rate", lambda s: s >
        0), .hasStandardDeviation("Inflation rate", lambda s: s > 0).'
      sources:
      - start_line: 45
        end_line: 47
        file: ''
      - start_line: 49
        end_line: 52
        file: ''
      uid: a52729c7-8959-4c22-85a6-aa21761734cc
    - text: 'GDP and Unemployment rate should be negatively correlated (consistent
        with the macro_stress formula using zu - zg). Example Deequ check: .hasCorrelation("GDP",
        "Unemployment rate", lambda c: c <= -0.1).'
      sources:
      - start_line: 49
        end_line: 52
        file: ''
      uid: 836347ad-ab4c-4b53-8eaa-08c232fd9d57
    - text: 'Semester 1 counts are coherent: approvals and without-evaluations cannot
        exceed enrollments. Constraint: `Curricular units 1st sem (approved)` <= `Curricular
        units 1st sem (enrolled)` AND `Curricular units 1st sem (without evaluations)`
        <= `Curricular units 1st sem (enrolled)`. Example Deequ: .satisfies("`Curricular
        units 1st sem (approved)` <= `Curricular units 1st sem (enrolled)` AND `Curricular
        units 1st sem (without evaluations)` <= `Curricular units 1st sem (enrolled)`",
        "sem1_counts_consistent", lambda v: v == 1.0).'
      sources:
      - start_line: 71
        end_line: 79
        file: ''
      uid: d66bb3ab-0568-433a-846f-f9b6c6cefa94
    - text: 'Semester 2 counts are coherent: approvals and without-evaluations cannot
        exceed enrollments. Constraint: `Curricular units 2nd sem (approved)` <= `Curricular
        units 2nd sem (enrolled)` AND `Curricular units 2nd sem (without evaluations)`
        <= `Curricular units 2nd sem (enrolled)`. Example Deequ: .satisfies("`Curricular
        units 2nd sem (approved)` <= `Curricular units 2nd sem (enrolled)` AND `Curricular
        units 2nd sem (without evaluations)` <= `Curricular units 2nd sem (enrolled)`",
        "sem2_counts_consistent", lambda v: v == 1.0).'
      sources:
      - start_line: 90
        end_line: 97
        file: ''
      uid: b3749a6d-b3ec-4c3f-8402-81dd5f77f4d8
    - text: 'Approvals should increase with enrollments (strong positive correlation
        assumed by the linear fit). Example Deequ checks: .hasCorrelation("Curricular
        units 1st sem (enrolled)", "Curricular units 1st sem (approved)", lambda c:
        c >= 0.5) and .hasCorrelation("Curricular units 2nd sem (enrolled)", "Curricular
        units 2nd sem (approved)", lambda c: c >= 0.5).'
      sources:
      - start_line: 81
        end_line: 84
        file: ''
      - start_line: 99
        end_line: 101
        file: ''
      uid: 6b207de5-2563-45c7-8af3-263345c32697
    - text: 'Total approved cannot exceed total enrolled across semesters. Constraint:
        (`Curricular units 1st sem (approved)` + `Curricular units 2nd sem (approved)`)
        <= (`Curricular units 1st sem (enrolled)` + `Curricular units 2nd sem (enrolled)`).
        Example Deequ: .satisfies("(`Curricular units 1st sem (approved)` + `Curricular
        units 2nd sem (approved)`) <= (`Curricular units 1st sem (enrolled)` + `Curricular
        units 2nd sem (enrolled)`) ", "totals_consistent", lambda v: v == 1.0).'
      sources:
      - start_line: 105
        end_line: 108
        file: ''
      uid: b64d6ec2-4146-456b-8530-9f7a0cc76cca
    - text: 'Payment status fields are logically consistent: a student cannot be marked
        as both a debtor and up-to-date on tuition. Constraint: NOT(`Debtor` = 1 AND
        `Tuition fees up to date` = 1). Example Deequ: .satisfies("NOT(`Debtor` =
        1 AND `Tuition fees up to date` = 1)", "tuition_debtor_consistency", lambda
        v: v == 1.0).'
      sources:
      - start_line: 61
        end_line: 65
        file: ''
      uid: 5757a1f3-c9f9-485d-82a3-40f4e92d4b21
