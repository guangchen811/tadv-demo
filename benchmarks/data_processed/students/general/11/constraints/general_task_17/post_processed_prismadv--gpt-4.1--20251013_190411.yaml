    assumptions:
    - text: 'For each record, the value in ''Curricular units 1st sem (approved)''
        must be less than or equal to the value in ''Curricular units 1st sem (enrolled)''.
        This ensures that a student cannot have more approved units than enrolled
        units in the first semester. This can be expressed as a Deequ constraint:
        .where(''Curricular units 1st sem (approved) <= Curricular units 1st sem (enrolled)'')'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 77
        end_line: 77
        file: ''
      uid: a37de9aa-8473-4280-86aa-03ebbef86dd1
    - text: 'When calculating the pass rate for the first semester (i.e., ''Curricular
        units 1st sem (approved)'' divided by ''Curricular units 1st sem (enrolled)''),
        it is assumed that ''Curricular units 1st sem (enrolled)'' is non-negative
        and only zero when there are no enrolled units. Division by zero is handled,
        but negative enrolled values must not occur. Enforce: .where(''Curricular
        units 1st sem (enrolled) >= 0 AND Curricular units 1st sem (approved) >= 0'')'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 77
        end_line: 77
        file: ''
      uid: ac5b1fdf-4a14-4602-b0d4-7e43214d0cfe
    - text: 'A strong positive correlation is assumed between ''Curricular units 1st
        sem (enrolled)'' and ''Curricular units 1st sem (approved)'' for the linear
        regression estimation of approvals from enrolled units. This means that as
        the number of enrolled units increases, the number of approved units should
        also increase, and the correlation coefficient should be significantly greater
