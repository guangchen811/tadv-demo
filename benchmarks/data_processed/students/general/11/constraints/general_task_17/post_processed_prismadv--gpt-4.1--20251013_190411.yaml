  ? '["Curricular units 1st sem (approved)","Curricular units 1st sem (credited)","Curricular
    units 1st sem (enrolled)","Curricular units 1st sem (without evaluations)"]'
  : code: []
    assumptions:
    - text: 'For every record, the values in ''Curricular units 1st sem (approved)''
        (ap1) and ''Curricular units 1st sem (credited)'' (cr1) must not exceed ''Curricular
        units 1st sem (enrolled)'' (en1), and all these columns must be non-negative.
        This ensures that the number of approved/credited curricular units cannot
        be greater than the number enrolled. This can be represented in Deequ as:
        .where(''`Curricular units 1st sem (approved)` <= `Curricular units 1st sem
        (enrolled)` and `Curricular units 1st sem (credited)` <= `Curricular units
        1st sem (enrolled)` and `Curricular units 1st sem (enrolled)` >= 0 and `Curricular
        units 1st sem (approved)` >= 0 and `Curricular units 1st sem (credited)` >=
        0'')'
      sources:
      - start_line: 32
        end_line: 35
        file: ''
      - start_line: 72
        end_line: 74
        file: ''
      uid: d3f989c3-339c-4bcd-a8c8-469d61d9bfa0
    - text: 'For every record, the sum of ''Curricular units 1st sem (approved)''
        (ap1), ''Curricular units 1st sem (credited)'' (cr1), and ''Curricular units
        1st sem (without evaluations)'' (wo1) must not exceed ''Curricular units 1st
        sem (enrolled)'' (en1). This reflects that all outcomes together cannot be
        more than the number of units enrolled. This can be represented in Deequ as:
        .where(''`Curricular units 1st sem (approved)` + `Curricular units 1st sem
        (credited)` + `Curricular units 1st sem (without evaluations)` <= `Curricular
        units 1st sem (enrolled)`'')'
      sources:
      - start_line: 32
        end_line: 35
        file: ''
      - start_line: 72
        end_line: 75
        file: ''
      uid: df245f01-fe5e-4ff1-8637-c0a8faad33c9
    - text: 'For every record where ''Curricular units 1st sem (enrolled)'' (en1)
        > 0, the ratio features such as pass_rate1 (ap1 / en1) and noeval_ratio1 (wo1
        / en1) are computed. This assumes that ''Curricular units 1st sem (enrolled)''
        is never negative and that division by zero is avoided by replacing zero with
        NaN. In practice, this requires that en1 >= 0, and wherever en1 == 0, ap1
        == 0 and wo1 == 0 (since you cannot have approvals or evaluations without
        enrollment). This can be represented in Deequ as: .where(''(`Curricular units
        1st sem (enrolled)` = 0) => (`Curricular units 1st sem (approved)` = 0 and
        `Curricular units 1st sem (without evaluations)` = 0)'')'
      sources:
      - start_line: 32
        end_line: 35
        file: ''
      - start_line: 72
        end_line: 79
        file: ''
      uid: ad416bd0-b86b-485e-9ad7-973cd03c061c
    - text: 'There is an assumed strong positive correlation between ''Curricular
        units 1st sem (approved)'' (ap1) and ''Curricular units 1st sem (enrolled)''
        (en1), since a linear model is fitted and used to estimate expected approvals.
        This assumes that the relationship between these two columns is approximately
        linear and that their standard deviations are non-zero. This can be represented
        as a Deequ correlation constraint: .hasCorrelation(''Curricular units 1st
        sem (approved)'', ''Curricular units 1st sem (enrolled)'', _ >= 0.7)'
      sources:
      - start_line: 32
        end_line: 35
        file: ''
      - start_line: 72
        end_line: 87
        file: ''
      uid: a8e6183f-6dd4-4e3b-804e-e2f2b0678922
