    - text: The calculation of 'macro_stress' assumes that the standardized values
        of 'GDP', 'Unemployment rate', and 'Inflation rate' (after z-score normalization)
        are meaningful and comparable for each record, and that their linear combination
        (zu - zg + 0.3 * zi) yields a value interpretable by a sigmoid transformation.
        This requires that the three columns are measured on consistent and compatible
        scales across all records and that their distributions are stable (no extreme
        outliers or data drift). In Deequ, a multi-column constraint could check for
        reasonable ranges and standard deviations for each, e.g., .where('ABS((GDP
        - AVG(GDP))/STDDEV(GDP)) < k AND ABS((Unemployment rate - AVG(Unemployment
        rate))/STDDEV(Unemployment rate)) < k AND ABS((Inflation rate - AVG(Inflation
        rate))/STDDEV(Inflation rate)) < k') for some threshold k.
      sources:
