    assumptions:
    - text: 'The columns ''GDP'', ''Unemployment rate'', and ''Inflation rate'' must
        all be present, complete (no missing values), and convertible to numeric values
        for every record. All three columns are jointly required to compute the ''macro_stress''
        feature, which is subsequently used in risk scoring. If any of these columns
        are missing or non-numeric for a record, the risk score calculation may be
        invalid for that record. This can be represented in Deequ as: .hasCompleteness(''GDP'',
        1.0) AND .hasCompleteness(''Unemployment rate'', 1.0) AND .hasCompleteness(''Inflation
        rate'', 1.0) AND .where(''GDP IS NOT NULL AND Unemployment rate IS NOT NULL
        AND Inflation rate IS NOT NULL'')'
