  code_for_constraint: '.hasMin(''EnvironmentSatisfaction'', lambda v: v >= 1)'
- column_name: EnvironmentSatisfaction
  code_for_constraint: '.hasMax(''EnvironmentSatisfaction'', lambda v: v <= 4)'
