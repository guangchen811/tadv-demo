constraints:
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isComplete('EmployeeCount')
      - Valid
    - - .isContainedIn('EmployeeCount', ['1'])
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', ['1', '2', '3', '4', '5'])
      - Valid
    - - .isDataType('JobLevel', 'IntegerType')
      - Invalid
    - - .isNonNegative('JobLevel')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isDataType('MonthlyIncome', 'IntegerType')
      - Invalid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  NewJobLevel:
    code:
    - - .isComplete('NewJobLevel')
      - Invalid
    - - .isDataType('NewJobLevel', 'IntegerType')
      - Invalid
    - - .isNonNegative('NewJobLevel')
      - Invalid
    assumptions: []
  NewMonthlyIncome:
    code:
    - - .isComplete('NewMonthlyIncome')
      - Invalid
    - - .isDataType('NewMonthlyIncome', 'IntegerType')
      - Invalid
    - - .isNonNegative('NewMonthlyIncome')
      - Invalid
    assumptions: []
  NewSalarySlab:
    code:
    - - .isComplete('NewSalarySlab')
      - Invalid
    - - .isContainedIn('NewSalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Invalid
    - - .isDataType('NewSalarySlab', 'StringType')
      - Invalid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18')
      - Valid
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', ['3', '4'])
      - Valid
    - - .isDataType('PerformanceRating', 'IntegerType')
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    - - .isDataType('SalarySlab', 'StringType')
      - Invalid
    assumptions: []
  StandardHours:
    code:
    - - .isComplete('StandardHours')
      - Valid
    - - .isContainedIn('StandardHours', ['80'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isDataType('TotalWorkingYears', 'IntegerType')
      - Invalid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isDataType('YearsAtCompany', 'IntegerType')
      - Invalid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isDataType('YearsSinceLastPromotion', 'IntegerType')
      - Invalid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
