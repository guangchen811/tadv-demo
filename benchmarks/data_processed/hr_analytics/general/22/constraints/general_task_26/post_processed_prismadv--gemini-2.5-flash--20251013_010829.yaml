        >= 0 AND `YearsSinceLastPromotion` <= `YearsAtCompany` AND (`YearsAtCompany`
        != 0 OR `YearsSinceLastPromotion` = 0)", "Tenure Consistency", lambda x: x
        == 1.0)'
