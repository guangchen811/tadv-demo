    - text: For all records, the value in 'YearsSinceLastPromotion' must be less than
        or equal to the value in 'YearsAtCompany'. Both columns are also assumed to
        contain non-negative values. Specifically, if 'YearsAtCompany' is 0, 'YearsSinceLastPromotion'
        must also be 0 to maintain logical consistency, as one cannot have been promoted
        if they have not been at the company for any years. This hierarchical consistency
        is crucial for the 'TenureRatio' calculation.
      sources:
