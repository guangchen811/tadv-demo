    assumptions:
    - text: For each employee, the number of years since their last promotion ('YearsSinceLastPromotion')
        must be less than or equal to the total number of years they have been employed
        at the current company ('YearsAtCompany'). This ensures that the time since
        a promotion is logically consistent with the employee's tenure at the company
        and that the calculated 'TenureRatio' is meaningful.
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      uid: 0967015c-53d4-4358-97f2-18b2f63b5dd0
    - text: For each employee, the number of years spent at the current company ('YearsAtCompany')
        must be less than or equal to their total working years across all companies
        ('TotalWorkingYears'). This reflects the logical impossibility of having spent
        more time at a single company than in one's entire professional career.
      sources:
      - start_line: 56
        end_line: 65
        file: ''
      - start_line: 116
        end_line: 132
