  '["Department","JobRole"]':
    code: []
    assumptions:
    - text: 'JobRole implies Department for all non-manager roles: Sales Executive,
        Sales Representative, and Healthcare Representative must have Department =
        ''Sales''; Research Scientist, Research Director, Laboratory Technician, and
        Manufacturing Director must have Department = ''Research & Development'';
        Human Resources must have Department = ''Human Resources''. Manager is exempt
        (may appear in any Department). This can be represented as Deequ compliance
        checks, e.g., a single rule: ((JobRole IN (''Sales Executive'',''Sales Representative'',''Healthcare
        Representative'') AND Department = ''Sales'') OR (JobRole IN (''Research Scientist'',''Research
        Director'',''Laboratory Technician'',''Manufacturing Director'') AND Department
        = ''Research & Development'') OR (JobRole = ''Human Resources'' AND Department
        = ''Human Resources'') OR (JobRole = ''Manager'')).'
      sources:
      - start_line: 148
        end_line: 156
        file: ''
      uid: 6d6e1360-ac30-4dff-a1bc-b63c152b415e
    - text: 'Department constrains the allowed JobRole set: if Department = ''Sales''
        then JobRole must be one of {''Sales Executive'',''Sales Representative'',''Healthcare
        Representative'',''Manager''}; if Department = ''Research & Development''
        then JobRole must be one of {''Research Scientist'',''Research Director'',''Laboratory
        Technician'',''Manufacturing Director'',''Manager''}; if Department = ''Human
        Resources'' then JobRole must be one of {''Human Resources'',''Manager''}.
        This can be encoded with three Deequ .hasCompliance rules (one per Department)
        expecting 100% compliance.'
      sources:
      - start_line: 148
        end_line: 156
        file: ''
      uid: 11aea95d-2d4e-4f29-976f-5b971ea7d37a
    - text: 'Functional dependency (near-deterministic): For all rows where JobRole
        != ''Manager'', Department is uniquely determined by JobRole (i.e., countDistinct(Department)
        by JobRole is 1). This can be enforced by compliance rules per JobRole or
        by a grouped validation ensuring a single Department per non-manager role.'
      sources:
      - start_line: 148
        end_line: 156
        file: ''
