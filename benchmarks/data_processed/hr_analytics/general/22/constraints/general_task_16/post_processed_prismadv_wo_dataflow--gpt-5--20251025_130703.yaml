        = ''10k-15k'' THEN MonthlyIncome IS NULL OR (MonthlyIncome >= 10001 AND MonthlyIncome
        <= 15000) WHEN SalarySlab = ''15k+'' THEN MonthlyIncome IS NULL OR (MonthlyIncome
