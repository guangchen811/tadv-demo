    - text: 'MonthlyIncome must be consistent with SalarySlab bounds: ''Upto 5k''
        => [0,5000], ''5k-10k'' => [5001,10000], ''10k-15k'' => [10001,15000], ''15k+''
        => [15001, +inf). Non-null MonthlyIncome values should fall within the corresponding
        slab, ensuring the within-slab rank is meaningful. Example Deequ: addConstraint(Compliance(''income_matches_slab'',
        "CASE WHEN SalarySlab = ''Upto 5k'' THEN MonthlyIncome IS NULL OR (MonthlyIncome
        >= 0 AND MonthlyIncome <= 5000) WHEN SalarySlab = ''5k-10k'' THEN MonthlyIncome
