        by replacing YearsAtCompany with NaN and the expectation that sub-tenures
        cannot be positive when total company tenure is zero. Example Deequ: addConstraint(Compliance(''yac_zero_implies_subtenures_zero'',
        ''CASE WHEN YearsAtCompany = 0 THEN coalesce(YearsInCurrentRole,0) = 0 AND
        coalesce(YearsSinceLastPromotion,0) = 0 AND coalesce(YearsWithCurrManager,0)
        = 0 ELSE true END''))'
