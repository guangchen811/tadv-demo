    - text: 'Age and AgeGroup must be coherent: AgeGroup should equal the bucket derived
        from Age using the same boundaries used in code: ''18-25'' => 18 <= Age <=
        25; ''26-35'' => 26 <= Age <= 35; ''36-45'' => 36 <= Age <= 45; ''46-55''
