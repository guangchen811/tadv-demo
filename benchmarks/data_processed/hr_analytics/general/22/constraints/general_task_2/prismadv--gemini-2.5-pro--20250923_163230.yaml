      uid: 9e422a59-3af0-4b80-9799-87fc8c1dd302
    - text: 'The calculated ''adj_income'' must be greater than or equal to ''MonthlyIncome''.
        The calculation multiplies ''MonthlyIncome'' by a factor based on ''PercentSalaryHike'',
        which is expected to be non-negative. This reflects the business logic that
        an adjusted income after a salary hike should not be less than the original
        income.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("adj_income >= MonthlyIncome", "AdjustedIncome_Check")'
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      uid: a9f12a77-7806-4ca7-80bd-fe581b4b0574
    - text: 'The final calculated compensation, ''monthly_comp_w_overheads'', which
        is a function of ''MonthlyIncome'', ''PercentSalaryHike'', ''AgeGroup'', ''BusinessTravel'',
        ''OverTime'', ''SalarySlab'', ''JobLevel'', ''YearsWithCurrManager'', and
        ''StandardHours'', should be greater than or equal to the ''MonthlyIncome''.
        This is because the calculation only involves adding non-negative premiums
        and adjustments to the base income.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("monthly_comp_w_overheads >= MonthlyIncome", "TotalCompensation_Check")'
      sources:
      - start_line: 52
        end_line: 62
        file: ''
      uid: b3b3d7e4-19f5-427c-bd76-74238399f60e
    - text: 'For any group defined by ''Department'' and ''JobRole'', the ''attrition_count''
        must be less than or equal to the ''headcount''. This is a logical requirement
        for the subsequent calculation of ''attrition_rate'', ensuring the number
        of attrited employees does not exceed the total number of employees in the
