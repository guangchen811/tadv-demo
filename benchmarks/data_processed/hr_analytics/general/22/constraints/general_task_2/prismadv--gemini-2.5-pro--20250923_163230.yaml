    assumptions:
    - text: 'The ''SalarySlab'' column''s value is expected to be consistent with
        the ''MonthlyIncome'' column. The code uses a mapping from ''SalarySlab''
        to a premium, which is then applied to the income. This implies a functional
        dependency where ''MonthlyIncome'' determines the ''SalarySlab''. For example,
        a ''MonthlyIncome'' of 4000 should correspond to the ''Upto 5k'' slab, and
        a ''MonthlyIncome'' of 8000 should correspond to the ''5k-10k'' slab.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN MonthlyIncome <= 5000 THEN SalarySlab = ''Upto 5k''
        WHEN MonthlyIncome > 5000 AND MonthlyIncome <= 10000 THEN SalarySlab = ''5k-10k''
        WHEN MonthlyIncome > 10000 AND MonthlyIncome <= 15000 THEN SalarySlab = ''10k-15k''
        ELSE SalarySlab = ''15k+'' END", "SalarySlab_consistent_with_MonthlyIncome")'
      sources:
