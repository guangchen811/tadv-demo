constraints:
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25','26-35','36-45','46-55','55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes','No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Research & Development','Sales','Human Resources'])
      - Valid
    assumptions: []
  DistanceFromHome:
    code:
    - - .hasDataType('DistanceFromHome', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''DistanceFromHome'', lambda v: v <= 30)'
      - Valid
    - - .isComplete('DistanceFromHome')
      - Valid
    - - .isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  Education:
    code:
    - - .isContainedIn('Education', [1,2,3,4,5])
      - Invalid
    assumptions: []
  EducationField:
    code:
    - - .isContainedIn('EducationField', ['Life Sciences','Medical','Marketing','Technical
        Degree','Human Resources','Other'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isComplete('EmployeeCount')
      - Valid
    - - .satisfies('EmployeeCount = 1', 'employee_count_eq_1')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isContainedIn('EnvironmentSatisfaction', [1,2,3,4])
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male','Female'])
      - Valid
    assumptions: []
  JobInvolvement:
    code:
    - - .isContainedIn('JobInvolvement', [1,2,3,4])
      - Invalid
    assumptions: []
  JobLevel:
    code:
    - - .isContainedIn('JobLevel', [1,2,3,4,5])
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    - - .isContainedIn('JobRole', ['Research Director','Sales Representative','Research
        Scientist','Manufacturing Director','Healthcare Representative','Sales Executive','Manager','Human
        Resources','Laboratory Technician'])
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .hasDataType('JobSatisfaction', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('JobSatisfaction')
      - Valid
    - - .isContainedIn('JobSatisfaction', [1,2,3,4])
      - Invalid
    assumptions: []
  MaritalStatus:
    code:
    - - .isContainedIn('MaritalStatus', ['Single','Married','Divorced'])
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .hasDataType('MonthlyIncome', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18')
      - Valid
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes','No'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3,4])
      - Invalid
    assumptions: []
  RelationshipSatisfaction:
    code:
    - - .isContainedIn('RelationshipSatisfaction', [1,2,3,4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k','5k-10k','10k-15k','15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isComplete('StandardHours')
      - Valid
    - - .satisfies('StandardHours = 80', 'standard_hours_eq_80')
      - Valid
    assumptions: []
  StockOptionLevel:
    code:
    - - .isContainedIn('StockOptionLevel', [0,1,2,3])
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .hasDataType('TotalWorkingYears', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  TotalWorkingYears_vs_YearsAtCompany:
    code:
    - - .satisfies('TotalWorkingYears >= YearsAtCompany', 'twy_ge_tenure')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .hasDataType('WorkLifeBalance', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('WorkLifeBalance')
      - Valid
    - - .isContainedIn('WorkLifeBalance', [1,2,3,4])
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .hasDataType('YearsAtCompany', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .hasDataType('YearsInCurrentRole', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsInCurrentRole_vs_YearsAtCompany:
    code:
    - - .satisfies('YearsInCurrentRole <= YearsAtCompany', 'role_leq_tenure')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .hasDataType('YearsSinceLastPromotion', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsSinceLastPromotion_vs_YearsAtCompany:
    code:
    - - .satisfies('YearsSinceLastPromotion <= YearsAtCompany', 'promo_lag_leq_tenure')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - .hasDataType('YearsWithCurrManager', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
  YearsWithCurrManager_vs_YearsAtCompany:
    code:
    - - .satisfies('YearsWithCurrManager <= YearsAtCompany', 'mgr_years_leq_tenure')
      - Invalid
    assumptions: []
