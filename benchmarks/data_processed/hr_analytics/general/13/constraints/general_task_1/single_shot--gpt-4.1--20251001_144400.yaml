constraints:
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Age_vs_TotalWorkingYears:
    code:
    - - .satisfies('Age >= TotalWorkingYears + 15', 'Age_gte_TWY_plus_15')
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - '.hasDistinctness(''EmployeeCount'', lambda x: x == 1.0)'
      - Invalid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isContainedIn('EnvironmentSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - '.hasCompleteness(''JobRole'', lambda x: x == 1.0)'
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isContainedIn('JobSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  SalarySlab_vs_MonthlyIncome:
    code:
    - - .satisfies('(SalarySlab = "Upto 5k" AND MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) OR (SalarySlab = "5k-10k" AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab = "10k-15k" AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab = "15k+" AND MonthlyIncome > 15000)', 'SalarySlab_MonthlyIncome_match')
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  TotalWorkingYears_vs_YearsAtCompany:
    code:
    - - .satisfies('TotalWorkingYears >= YearsAtCompany', 'TotalWorkingYears_gte_YearsAtCompany')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isContainedIn('WorkLifeBalance', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95)'
      - Valid
    assumptions: []
