        end_line: 43
        file: ''
      uid: fab0fee9-760d-4f22-98ea-259a4687a797
    - text: 'For the calculation of ''base_merit_pct'', both ''perf_guideline_pct''
        and ''PercentSalaryHike'' must be non-null and numeric. As they represent
        percentages, they are assumed to be non-negative.

        We could represent this assumption as a Deequ constraint like this:

        .isNotNull(''perf_guideline_pct'')

        .isNumeric(''perf_guideline_pct'')

        .hasMin(''perf_guideline_pct'', 0.0)

        .isNotNull(''PercentSalaryHike'')

        .isNumeric(''PercentSalaryHike'')

        .hasMin(''PercentSalaryHike'', 0.0)'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      uid: 0c5ca7d8-3be7-4247-bcca-00e991429a62
    - text: 'For the calculation of ''adjusted_merit_pct'', ''base_merit_pct'', ''age_weight'',
        and ''travel_multiplier'' must all be non-null and numeric. Given their roles
        as percentages and multipliers, they are assumed to be non-negative.

        We could represent this assumption as a Deequ constraint like this:

        .isNotNull(''base_merit_pct'')

        .isNumeric(''base_merit_pct'')

        .hasMin(''base_merit_pct'', 0.0)

        .isNotNull(''age_weight'')

        .isNumeric(''age_weight'')

        .hasMin(''age_weight'', 0.0)

        .isNotNull(''travel_multiplier'')

        .isNumeric(''travel_multiplier'')

        .hasMin(''travel_multiplier'', 0.0)'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      uid: 2d51e1f6-77dd-4c0a-a5ea-edbc40c6819e
    - text: 'For determining the final ''proposed_merit_pct'', both ''adjusted_merit_pct''
        and ''slab_cap_pct'' must be non-null and numeric. As they represent percentages
        or caps, they are assumed to be non-negative.

        We could represent this assumption as a Deequ constraint like this:

        .isNotNull(''adjusted_merit_pct'')

        .isNumeric(''adjusted_merit_pct'')

        .hasMin(''adjusted_merit_pct'', 0.0)

        .isNotNull(''slab_cap_pct'')

        .isNumeric(''slab_cap_pct'')

        .hasMin(''slab_cap_pct'', 0.0)'
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      uid: c7c9824f-0047-4fe0-8b17-b4e59ce3b0a3
    - text: 'The ''Department'' column, used as a grouping key in the aggregation,
        is assumed not to contain null values to ensure all records are correctly
        categorized and aggregated into department-level budgets.

        We could represent this assumption as a Deequ constraint like this:

        .hasCompleteness(''Department'', 1.0)'
      sources:
      - start_line: 68
        end_line: 75
        file: ''
      uid: 0f90b9c5-a9fa-4b2e-840b-0d054e121273
    - text: 'All columns used for ''sum'' aggregations in the department-level budgets
        (''MonthlyIncome'', ''proposed_merit_amount'', ''promotion_amount'', ''compression_amount'',
        ''emerging_talent_amount'') must be non-null and numeric. Based on the dataset
        description, ''MonthlyIncome'' is complete and integral. Given their nature
        as monetary amounts or income, they are all assumed to be non-negative.

        We could represent this assumption as a Deequ constraint like this:

        .isNotNull(''MonthlyIncome'').isNumeric(''MonthlyIncome'').isNonNegative(''MonthlyIncome'')

        .isNotNull(''proposed_merit_amount'').isNumeric(''proposed_merit_amount'').isNonNegative(''proposed_merit_amount'')

        .isNotNull(''promotion_amount'').isNumeric(''promotion_amount'').isNonNegative(''promotion_amount'')

        .isNotNull(''compression_amount'').isNumeric(''compression_amount'').isNonNegative(''compression_amount'')

        .isNotNull(''emerging_talent_amount'').isNumeric(''emerging_talent_amount'').isNonNegative(''emerging_talent_amount'')'
      sources:
      - start_line: 68
        end_line: 75
        file: ''
      uid: 855c8733-12cc-4da4-8db9-e01a3a778415
    - text: 'The ''total_budget'' is calculated as the sum of ''merit_pool'', ''promotion_pool'',
        ''compression_pool'', and ''emerging_talent_pool''. It is assumed that all
        these constituent pools are non-null and numeric, and non-negative. Consequently,
        ''total_budget'' should also be non-negative and have at most two decimal
        places.

        We could represent this assumption as a Deequ constraint like this:

        .isNotNull(''merit_pool'').isNumeric(''merit_pool'').isNonNegative(''merit_pool'')

        .isNotNull(''promotion_pool'').isNumeric(''promotion_pool'').isNonNegative(''promotion_pool'')

        .isNotNull(''compression_pool'').isNumeric(''compression_pool'').isNonNegative(''compression_pool'')

        .isNotNull(''emerging_talent_pool'').isNumeric(''emerging_talent_pool'').isNonNegative(''emerging_talent_pool'')

        .satisfies(List(''merit_pool'', ''promotion_pool'', ''compression_pool'',
        ''emerging_talent_pool''), ''merit_pool + promotion_pool + compression_pool
        + emerging_talent_pool >= 0'', ''total_budget_non_negative'')

        .satisfies(''total_budget'', ''floor(total_budget * 100) == total_budget *
        100'', ''has_two_decimal_places'')'
      sources:
      - start_line: 77
        end_line: 78
        file: ''
