constraints:
  Age:
    code:
    - - .isComplete('Age').isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - '.isComplete(''AgeGroup'').hasNumberOfDistinctValues(''AgeGroup'', lambda
        x: x == 5)'
      - Invalid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition').isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - '.isComplete(''Department'').hasDistinctness(''Department'', lambda x: x >=
        (1.0/3.0))'
      - Invalid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  JobRole:
    code:
    - - '.isComplete(''JobRole'').hasNumberOfDistinctValues(''JobRole'', lambda x:
        x == 9)'
      - Invalid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction').isContainedIn('JobSatisfaction', [1, 2, 3,
        4])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome').isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime').isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - '.isComplete(''SalarySlab'').hasNumberOfDistinctValues(''SalarySlab'', lambda
        x: x == 4)'
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears').isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isComplete('WorkLifeBalance').isContainedIn('WorkLifeBalance', [1, 2, 3,
        4])
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany').isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole').isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion').isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95)'
      - Valid
    assumptions: []
