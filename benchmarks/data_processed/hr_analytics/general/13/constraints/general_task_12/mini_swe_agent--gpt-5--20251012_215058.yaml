raw_constraints:
- column_name: EmpID
  code_for_constraint: .isComplete('EmpID')
- column_name: EmpID
  code_for_constraint: .isUnique('EmpID')
- column_name: Age
  code_for_constraint: .isComplete('Age')
- column_name: Age
  code_for_constraint: .isNonNegative('Age')
- column_name: Age
  code_for_constraint: '.satisfies("Age >= 18", ''age_adult'', lambda x: x == 1.0)'
- column_name: AgeGroup
  code_for_constraint: .isComplete('AgeGroup')
- column_name: AgeGroup
  code_for_constraint: .isContainedIn('AgeGroup', ['18-25','26-35','36-45','46-55','55+'])
- column_name: Age_AgeGroup
  code_for_constraint: '.satisfies("(Age >= 18 AND Age <= 25 AND AgeGroup = ''18-25'')
    OR (Age > 25 AND Age <= 35 AND AgeGroup = ''26-35'') OR (Age > 35 AND Age <= 45
    AND AgeGroup = ''36-45'') OR (Age > 45 AND Age <= 55 AND AgeGroup = ''46-55'')
    OR (Age > 55 AND AgeGroup = ''55+'')", ''agegroup_matches_age'', lambda x: x ==
    1.0)'
- column_name: MonthlyIncome
  code_for_constraint: .isComplete('MonthlyIncome')
- column_name: MonthlyIncome
  code_for_constraint: .isNonNegative('MonthlyIncome')
- column_name: SalarySlab
  code_for_constraint: .isComplete('SalarySlab')
- column_name: SalarySlab
  code_for_constraint: .isContainedIn('SalarySlab', ['Upto 5k','5k-10k','10k-15k','15k+'])
- column_name: SalarySlab
  code_for_constraint: '.satisfies("(MonthlyIncome <= 5000 AND SalarySlab = ''Upto
    5k'') OR (MonthlyIncome > 5000 AND MonthlyIncome <= 10000 AND SalarySlab = ''5k-10k'')
    OR (MonthlyIncome > 10000 AND MonthlyIncome <= 15000 AND SalarySlab = ''10k-15k'')
    OR (MonthlyIncome > 15000 AND SalarySlab = ''15k+'')", ''salary_slab_matches_income'',
    lambda x: x == 1.0)'
- column_name: Department
  code_for_constraint: .isComplete('Department')
- column_name: JobRole
  code_for_constraint: .isComplete('JobRole')
- column_name: JobLevel
  code_for_constraint: .isComplete('JobLevel')
- column_name: PerformanceRating
  code_for_constraint: .isComplete('PerformanceRating')
- column_name: PerformanceRating
  code_for_constraint: .isContainedIn('PerformanceRating', [1,2,3,4])
- column_name: YearsInCurrentRole
  code_for_constraint: .isNonNegative('YearsInCurrentRole')
- column_name: YearsSinceLastPromotion
  code_for_constraint: .isNonNegative('YearsSinceLastPromotion')
- column_name: YearsAtCompany
  code_for_constraint: .isNonNegative('YearsAtCompany')
- column_name: TotalWorkingYears
  code_for_constraint: .isNonNegative('TotalWorkingYears')
- column_name: YearsWithCurrManager
  code_for_constraint: .isNonNegative('YearsWithCurrManager')
- column_name: TenureConsistency
  code_for_constraint: '.satisfies("YearsInCurrentRole <= YearsAtCompany AND YearsAtCompany
    <= TotalWorkingYears", ''tenure_consistency'', lambda x: x == 1.0)'
- column_name: StandardHours
  code_for_constraint: '.satisfies("StandardHours = 80", ''standard_hours_80'', lambda
    x: x == 1.0)'
- column_name: EmployeeCount
  code_for_constraint: '.satisfies("EmployeeCount = 1", ''employee_count_one'', lambda
    x: x == 1.0)'
- column_name: Over18
  code_for_constraint: '.satisfies("Over18 = ''Y''", ''over18_flag'', lambda x: x
    == 1.0)'
- column_name: OverTime
  code_for_constraint: .isContainedIn('OverTime', ['Yes','No'])
- column_name: Gender
  code_for_constraint: .isContainedIn('Gender', ['Male','Female'])
