constraints:
  Age:
    code:
    - - .isComplete("Age")
      - Valid
    - - .isNonNegative("Age")
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - '.hasNumberOfDistinctValues("AgeGroup", lambda x: x == 5)'
      - Invalid
    - - .isComplete("AgeGroup")
      - Valid
    assumptions: []
  Attrition:
    code:
    - - '.hasNumberOfDistinctValues("Attrition", lambda x: x == 2)'
      - Invalid
    - - .isComplete("Attrition")
      - Valid
    - - .isContainedIn("Attrition", ["Yes", "No"])
      - Valid
    assumptions: []
  Department:
    code:
    - - '.hasNumberOfDistinctValues("Department", lambda x: x == 3)'
      - Invalid
    - - .isComplete("Department")
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete("EmpID")
      - Valid
    - - .isUnique("EmpID")
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .isComplete("JobRole")
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - '.hasNumberOfDistinctValues("MonthlyIncome", lambda x: x > 1)'
      - Invalid
    - - .isComplete("MonthlyIncome")
      - Valid
    - - .isNonNegative("MonthlyIncome")
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete("OverTime")
      - Valid
    - - .isContainedIn("OverTime", ["Yes", "No"])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - '.hasNumberOfDistinctValues("SalarySlab", lambda x: x == 4)'
      - Invalid
    - - .isComplete("SalarySlab")
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete("TotalWorkingYears")
      - Valid
    - - .isNonNegative("TotalWorkingYears")
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete("YearsAtCompany")
      - Valid
    - - .isNonNegative("YearsAtCompany")
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete("YearsInCurrentRole")
      - Valid
    - - .isNonNegative("YearsInCurrentRole")
      - Valid
    assumptions: []
