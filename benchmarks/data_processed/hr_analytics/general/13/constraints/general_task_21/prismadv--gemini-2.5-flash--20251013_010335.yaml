        be less than or equal to the value in the ''YearsAtCompany'' column. This
        is implied by the calculation of `role_gap = df[''YearsAtCompany''] - df[''YearsInCurrentRole'']`
        followed by `np.sqrt(role_gap)`. Taking the square root of a value requires
        that value to be non-negative, thus ''YearsAtCompany'' must be greater than
        or equal to ''YearsInCurrentRole''. We could represent this assumption as
        a deequ constraint like this: .isLessThanOrEqualTo("YearsInCurrentRole", "YearsAtCompany")'
