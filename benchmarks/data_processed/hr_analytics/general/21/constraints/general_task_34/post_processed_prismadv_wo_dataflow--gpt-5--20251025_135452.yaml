        file: ''
      uid: 5c44e957-1ace-4d46-9752-1c881f738441
    - text: 'There should be some variability around the <=3 threshold so that the
        derived feature ''perf_low'' is not constant. For example, require the fraction
        of rows with PerformanceRating <= 3 to be between 0.01 and 0.99. We could
        represent this as: Deequ .satisfies(''CASE WHEN PerformanceRating <= 3 THEN
        1 ELSE 0 END'', ''Share of low performance'', lambda x: x >= 0.01 and x <=
