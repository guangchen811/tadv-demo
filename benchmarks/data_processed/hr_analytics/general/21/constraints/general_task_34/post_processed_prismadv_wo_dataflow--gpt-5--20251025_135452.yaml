        ''Upto 5k'' => MonthlyIncome <= 5000; ''5k-10k'' => 5000 < MonthlyIncome <=
        10000; ''10k-15k'' => 10000 < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome
        > 15000. This can be enforced with a multi-column compliance constraint, e.g.,
        in Deequ: .hasCompliance(''income_slab_alignment'', ''(SalarySlab = ''''Upto
        5k'''' AND MonthlyIncome <= 5000) OR (SalarySlab = ''''5k-10k'''' AND MonthlyIncome
        > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab = ''''10k-15k'''' AND MonthlyIncome
        > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab = ''''15k+'''' AND MonthlyIncome
        > 15000)'')'
