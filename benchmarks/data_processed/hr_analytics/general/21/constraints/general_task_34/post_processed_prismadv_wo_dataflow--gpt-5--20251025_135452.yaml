    - text: "The 'PerformanceRating' values should lie within the canonical 1\u2013\
        4 rating scale; values outside [1, 4] are considered invalid. This keeps the\
        \ <=3 threshold meaningful and avoids extreme values being misinterpreted\
        \ as high performance. We could represent this as: Deequ .satisfies('CASE\
        \ WHEN PerformanceRating BETWEEN 1 AND 4 THEN 1 ELSE 0 END', 'PerformanceRating\
        \ in [1,4]', lambda x: x == 1.0). In Great Expectations: expect_column_values_to_be_between('PerformanceRating',\
        \ min_value=1, max_value=4, allow_cross_type_comparisons=True)."
