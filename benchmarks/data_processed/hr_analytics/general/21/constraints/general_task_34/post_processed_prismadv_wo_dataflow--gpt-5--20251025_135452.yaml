        end_line: 46
        file: ''
      uid: 223f88d0-4d10-4174-bd71-3246ba3f3b54
    - text: 'The ''PerformanceRating'' column must be numeric (preferably integral)
        so that comparison to the numeric literal 3 is valid. Non-numeric strings
        would raise errors or be misinterpreted. We could represent this as: Deequ
        .hasDataType(''PerformanceRating'', ConstrainableDataTypes.Integral) or .satisfies(''try_cast(PerformanceRating
        as double) IS NOT NULL'', ''PerformanceRating numeric'', lambda x: x == 1.0).
