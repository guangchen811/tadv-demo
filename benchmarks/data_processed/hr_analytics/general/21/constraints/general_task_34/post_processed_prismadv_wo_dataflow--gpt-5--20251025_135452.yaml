    assumptions:
    - text: 'TrainingTimesLastYear must be present and non-null for all rows. The
        code uses it directly in arithmetic (division and clipping) to compute train_low,
        which feeds the linear score and downstream threshold/risk banding; nulls
        would propagate and degrade or break scoring. This can be enforced with a
        completeness constraint (e.g., Deequ isComplete(''TrainingTimesLastYear'')
        or satisfies(''CASE WHEN TrainingTimesLastYear IS NOT NULL THEN 1 ELSE 0 END'',
        ..., lambda x: x == 1.0)).'
      sources:
