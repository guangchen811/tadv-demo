      uid: 0298ab1a-630b-436a-923e-687c3576ec93
    - text: 'TrainingTimesLastYear values must be numeric (ideally integral counts).
        The column is divided by 6.0; non-numeric values would cause type errors or
        be coerced to NaN. Enforce with a type constraint (e.g., Deequ hasDataType(''TrainingTimesLastYear'',
        Integral) or a satisfies check that TRY_CAST to DOUBLE is not NULL; Great
        Expectations: expect_column_values_to_be_in_type_list with integer types).'
      sources:
