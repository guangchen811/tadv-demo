        be exactly one corresponding SalarySlab (no two rows share the same MonthlyIncome
        but have different SalarySlab). This can be checked as a multi-column constraint,
        e.g., SQL/Deequ-style: assert df.groupBy(''MonthlyIncome'').agg(count_distinct(''SalarySlab'').alias(''n'')).filter(''n
        > 1'').count() = 0.'
