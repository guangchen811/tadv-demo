      uid: 8fdacd1c-c08b-4498-8497-47721d09e6e9
    - text: 'If TotalWorkingYears == 0, then YearsAtCompany must be 0 and YearsSinceLastPromotion
        must be 0 (new entrants have no tenure and no prior promotions). Deequ example:
        .satisfies(''(TotalWorkingYears > 0) OR (TotalWorkingYears = 0 AND YearsAtCompany
        = 0 AND YearsSinceLastPromotion = 0)'', ''zero_experience_coherence'')'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      - start_line: 41
        end_line: 41
        file: ''
      uid: c46ac7e8-aff1-45d3-95f7-3d7d95101f95
  '["TotalWorkingYears","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'TotalWorkingYears should not exceed the feasible working experience implied
        by Age: TotalWorkingYears <= Age - 18. This can be enforced with a Deequ constraint
        like: .satisfies("TotalWorkingYears <= Age - 18", "twy_leq_age_minus_18").'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: 112be0d6-0612-453c-b566-ed574d13f94e
    - text: 'YearsAtCompany must be less than or equal to TotalWorkingYears, and if
        TotalWorkingYears is 0 then YearsAtCompany must be 0. This can be expressed
        as: .isLessThanOrEqualTo("YearsAtCompany", "TotalWorkingYears") and .satisfies("CASE
        WHEN TotalWorkingYears = 0 THEN YearsAtCompany = 0 ELSE true END", "yac_zero_implies_twy_zero").'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: d6ac3a26-7ea7-42b8-bd82-e8e078f519be
    - text: 'YearsWithCurrManager must be less than or equal to YearsAtCompany (a
        manager tenure cannot exceed tenure at the company). This can be enforced
        as: .isLessThanOrEqualTo("YearsWithCurrManager", "YearsAtCompany").'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      uid: c6eb90f0-7df8-4649-888a-a87c47eca4fd
    - text: 'YearsWithCurrManager must not exceed TotalWorkingYears (total experience
        should cover current manager tenure): TotalWorkingYears >= YearsWithCurrManager.
        Deequ: .isLessThanOrEqualTo("YearsWithCurrManager", "TotalWorkingYears").'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: 0909ca8c-122e-4449-8719-f9927861f839
    - text: 'If YearsAtCompany is 0, then YearsWithCurrManager must also be 0 (cannot
        have time with current manager without company tenure). Deequ: .satisfies("CASE
        WHEN YearsAtCompany = 0 THEN YearsWithCurrManager = 0 ELSE true END", "yac_zero_implies_ywcm_zero").'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      uid: c5b81a0b-12f7-4ece-a889-5986a4df4efb
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'YearsSinceLastPromotion must be less than or equal to YearsAtCompany
        for every record, and both should be non-negative. Deequ example: .satisfies("YearsSinceLastPromotion
        >= 0 AND YearsAtCompany >= 0 AND YearsSinceLastPromotion <= YearsAtCompany",
        "yslp_le_tenure")'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      - start_line: 53
        end_line: 55
        file: ''
      uid: c5b8b3c8-a966-469b-a089-4b1a78506bda
    - text: 'If YearsAtCompany equals 0, then YearsSinceLastPromotion must also be
        0 (you cannot have time since last promotion without any tenure). Deequ example:
        .satisfies("(YearsAtCompany <> 0) OR (YearsSinceLastPromotion = 0)", "zero_tenure_zero_yslp")'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      - start_line: 53
        end_line: 55
        file: ''
      uid: 35270c78-0533-4f3e-9bf9-4ece639db41a
    - text: 'YearsAtCompany must be less than or equal to TotalWorkingYears; additionally,
        if TotalWorkingYears is 0, then YearsAtCompany must be 0. Deequ example: .satisfies("(TotalWorkingYears
        >= YearsAtCompany) AND (TotalWorkingYears > 0 OR YearsAtCompany = 0)", "tenure_le_twy_and_zero_rule")'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      uid: df217343-6380-4856-927c-e47ebdfb5b7c
    - text: 'YearsAtCompany must not exceed the maximum feasible working years given
        age: YearsAtCompany <= (Age - 18). Deequ example: .satisfies("YearsAtCompany
        <= (Age - 18)", "tenure_le_age_cap")'
      sources:
      - start_line: 50
        end_line: 55
        file: ''
      uid: 05e93d01-589a-4535-a6c0-4358b53ded0d
  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'Years with current manager must not exceed years at the company for the
        same employee, and when provided must be non-negative. Allow nulls in YearsWithCurrManager,
        but if not null then enforce 0 <= YearsWithCurrManager <= YearsAtCompany.
        Example Deequ: .satisfies("YearsWithCurrManager IS NULL OR (YearsWithCurrManager
        >= 0 AND YearsWithCurrManager <= YearsAtCompany)", "manager_years_le_company_tenure")'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      - start_line: 25
        end_line: 25
        file: ''
      uid: 5930b975-4322-44c8-a77e-f43605aa4c2a
    - text: 'Years at company should not exceed total working years. Additionally,
        if TotalWorkingYears = 0 then YearsAtCompany must be 0 (no company tenure
        without any working years). Example Deequ: .satisfies("TotalWorkingYears >=
        YearsAtCompany", "company_tenure_le_total") and .satisfies("(TotalWorkingYears
        <> 0) OR (YearsAtCompany = 0)", "zero_total_implies_zero_company_tenure")'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      - start_line: 25
        end_line: 25
        file: ''
      uid: f3262a58-a067-4347-be12-2da87e9c69a8
    - text: 'Time since last promotion must not exceed years at company (promotions
        are company-specific) and should be non-negative. Example Deequ: .satisfies("YearsSinceLastPromotion
        >= 0 AND YearsSinceLastPromotion <= YearsAtCompany", "promotion_interval_within_company_tenure")'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      - start_line: 25
        end_line: 25
        file: ''
      uid: 6a763e71-1c0c-4db2-b3c6-e9be617a8ad2
    - text: 'If YearsAtCompany = 0, then YearsWithCurrManager must be either null
        or 0 (cannot have manager tenure without any company tenure). Example Deequ:
        .satisfies("(YearsAtCompany <> 0) OR (YearsWithCurrManager IS NULL OR YearsWithCurrManager
        = 0)", "zero_company_tenure_implies_zero_or_null_manager_years")'
      sources:
      - start_line: 43
        end_line: 44
