    assumptions:
    - text: 'Attrition must be present (non-null) for every record. Nulls would be
        treated as non-"Yes" and bias the base rate downward used for calibration.
        We could represent this as a Deequ constraint like: .isComplete("Attrition").'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 80
        end_line: 80
        file: ''
      uid: c1c9544a-7598-4933-ae18-ca48a2b77691
    - text: 'Attrition must be a binary label with exact, case-consistent values in
        {''Yes'',''No''} and no leading/trailing whitespace. Any other value (e.g.,
        ''YES'', ''Y'', ''No '', None) is counted as not ''Yes'' and skews the base
        rate. We could represent this as Deequ constraints like: .isContainedIn("Attrition",
        ["Yes","No"]) and .satisfies("CASE WHEN TRIM(`Attrition`) = `Attrition` THEN
        1 ELSE 0 END", "No extra whitespace", lambda x: x == 1).'
      sources:
      - start_line: 80
        end_line: 80
        file: ''
      uid: 7fe24b59-c4b0-4897-9a3b-5aa3c9adadd7
    - text: 'The proportion of ''Yes'' in Attrition should typically fall between
        0.05 and 0.20 to align with the alert-share design (alert_share = clip(2 *
        base_yes, 0.10, 0.40)). If it falls outside this range, threshold calibration
        may over/under-alert relative to design. We could represent this as a Deequ
        constraint like: .satisfies("CASE WHEN `Attrition` = ''Yes'' THEN 1 ELSE 0
        END", "Yes rate between 5% and 20%", lambda x: x >= 0.05 and x <= 0.20).'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 81
        end_line: 82
        file: ''
      uid: 409033b8-886c-475c-8ad4-56e03181fdba
    - text: 'Both classes (''Yes'' and ''No'') should be present in the input to ensure
        meaningful base-rate estimation and calibration. We could represent this as
        a Deequ constraint like: .hasNumberOfDistinctValues("Attrition", lambda x:
        x >= 2).'
      sources:
      - start_line: 80
        end_line: 82
        file: ''
      uid: 6dbef88e-966f-4bfe-968e-191641b2b7c9
