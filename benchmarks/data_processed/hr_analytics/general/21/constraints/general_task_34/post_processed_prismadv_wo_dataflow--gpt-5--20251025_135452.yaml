        end_line: 47
        file: ''
      uid: fcb4ea80-6b85-45d1-8ed5-3f082da60004
    - text: "TrainingTimesLastYear should lie within the closed interval [0, 6] (inclusive).\
        \ The model scales by 6 and clips the upper bound to 1.0, and historical data\
        \ shows values only in 0\u20136; negative values would invert the intended\
        \ risk signal and values >6 will saturate the feature. Enforce with a range\
        \ and non-negativity/integer constraint (e.g., Deequ satisfies('TrainingTimesLastYear\
        \ BETWEEN 0 AND 6', 'TrainingTimesLastYear in [0,6]', lambda x: x == 1.0))."
