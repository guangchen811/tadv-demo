    assumptions:
    - text: 'The ''PerformanceRating'' column must exist and contain no null values.
        The code does not impute or guard against missing values and directly compares
        the field to 3; missing values would otherwise be implicitly treated as not
        low, which is unintended. We could represent this assumption as a Deequ constraint
        like: .hasColumn(''PerformanceRating'') and .completeness(''PerformanceRating'',
        lambda x: x == 1.0). In Great Expectations: expect_column_to_exist(''PerformanceRating'')
        and expect_column_values_to_not_be_null(''PerformanceRating'').'
