    - text: 'Ordinal consistency between SalarySlab and MonthlyIncome at the cohort
        level: the maximum MonthlyIncome in a lower slab must not exceed the minimum
        MonthlyIncome in the immediately higher slab (i.e., max(Upto 5k) <= min(5k-10k),
        max(5k-10k) <= min(10k-15k), and max(10k-15k) <= min(15k+)). This can be enforced
        by computing per-slab mins and maxes and asserting these cross-slab inequalities.'
