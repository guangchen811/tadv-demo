constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isDataType('Age', 'Integral')
      - Invalid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - '.hasValues(''AgeGroup'', [''18-25'', ''26-35'', ''36-45'', ''46-55'', ''55+''],
        lambda x: x == 1.0)'
      - Invalid
    - - .isComplete('AgeGroup')
      - Valid
    - - .isDataType('AgeGroup', 'String')
      - Invalid
    assumptions: []
  Attrition:
    code:
    - - '.hasValues(''Attrition'', [''Yes'', ''No''], lambda x: x == 1.0)'
      - Invalid
    - - .isComplete('Attrition')
      - Valid
    - - .isDataType('Attrition', 'String')
      - Invalid
    assumptions: []
  BusinessTravel:
    code:
    - - '.hasValues(''BusinessTravel'', [''TravelRarely'', ''Travel_Frequently'',
        ''Travel_Rarely'', ''Non-Travel''], lambda x: x == 1.0)'
      - Invalid
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isDataType('BusinessTravel', 'String')
      - Invalid
    assumptions: []
  DailyRate:
    code:
    - - .isComplete('DailyRate')
      - Valid
    - - .isDataType('DailyRate', 'Integral')
      - Invalid
    - - .isPositive('DailyRate')
      - Valid
    assumptions: []
  Department:
    code:
    - - '.hasValues(''Department'', [''Sales'', ''Research & Development'', ''Human
        Resources''], lambda x: x == 1.0)'
      - Invalid
    - - .isComplete('Department')
      - Valid
    - - .isDataType('Department', 'String')
      - Invalid
    assumptions: []
  Department, JobRole:
    code:
    - - '.satisfies("CASE WHEN Department = ''Sales'' THEN JobRole IN (''Sales Executive'',
        ''Sales Representative'') WHEN Department = ''Research & Development'' THEN
        JobRole IN (''Research Scientist'', ''Laboratory Technician'', ''Research
        Director'', ''Manufacturing Director'') WHEN Department = ''Human Resources''
        THEN JobRole IN (''Human Resources'') ELSE FALSE END", "Department and JobRole
        consistency", lambda x: x == 1.0)'
      - Invalid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isComplete('DistanceFromHome')
      - Valid
    - - .isDataType('DistanceFromHome', 'Integral')
      - Invalid
    - - .isPositive('DistanceFromHome')
      - Valid
    assumptions: []
  Education:
    code:
    - - .hasMax('Education', 5)
      - Invalid
    - - .hasMin('Education', 1)
      - Invalid
    - - .isComplete('Education')
      - Valid
    - - .isDataType('Education', 'Integral')
      - Invalid
    assumptions: []
  EducationField:
    code:
    - - '.hasValues(''EducationField'', [''Other'', ''Medical'', ''Technical Degree'',
        ''Marketing'', ''Human Resources'', ''Life Sciences''], lambda x: x == 1.0)'
      - Invalid
    - - .isComplete('EducationField')
      - Valid
    - - .isDataType('EducationField', 'String')
      - Invalid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isDataType('EmpID', 'String')
      - Invalid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .hasMax('EmployeeCount', 1)
      - Invalid
    - - .hasMin('EmployeeCount', 1)
      - Invalid
    - - '.hasNumberOfDistinctValues(''EmployeeCount'', lambda x: x == 1)'
      - Invalid
    - - .isComplete('EmployeeCount')
      - Valid
    - - .isDataType('EmployeeCount', 'Integral')
      - Invalid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    - - .isDataType('EmployeeNumber', 'Integral')
      - Invalid
    - - .isUnique('EmployeeNumber')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .hasMax('EnvironmentSatisfaction', 4)
      - Invalid
    - - .hasMin('EnvironmentSatisfaction', 1)
      - Invalid
    - - .isComplete('EnvironmentSatisfaction')
      - Valid
    - - .isDataType('EnvironmentSatisfaction', 'Integral')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - '.hasValues(''Gender'', [''Male'', ''Female''], lambda x: x == 1.0)'
      - Invalid
    - - .isComplete('Gender')
      - Valid
    - - .isDataType('Gender', 'String')
      - Invalid
    assumptions: []
  HourlyRate:
    code:
    - - .isComplete('HourlyRate')
      - Valid
    - - .isDataType('HourlyRate', 'Integral')
      - Invalid
    - - .isPositive('HourlyRate')
      - Valid
    assumptions: []
  JobInvolvement:
    code:
    - - .hasMax('JobInvolvement', 4)
      - Invalid
    - - .hasMin('JobInvolvement', 1)
      - Invalid
    - - .isComplete('JobInvolvement')
      - Valid
    - - .isDataType('JobInvolvement', 'Integral')
      - Invalid
    assumptions: []
  JobLevel:
    code:
    - - .hasMax('JobLevel', 5)
      - Invalid
    - - .hasMin('JobLevel', 1)
      - Invalid
    - - .isComplete('JobLevel')
      - Valid
    - - .isDataType('JobLevel', 'Integral')
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - '.hasValues(''JobRole'', [''Research Director'', ''Sales Representative'',
        ''Research Scientist'', ''Manufacturing Director'', ''Healthcare Representative'',
        ''Sales Executive'', ''Manager'', ''Human Resources'', ''Laboratory Technician''],
        lambda x: x == 1.0)'
      - Invalid
    - - .isComplete('JobRole')
      - Valid
    - - .isDataType('JobRole', 'String')
      - Invalid
    assumptions: []
  JobSatisfaction:
    code:
    - - .hasMax('JobSatisfaction', 4)
      - Invalid
    - - .hasMin('JobSatisfaction', 1)
      - Invalid
    - - .isComplete('JobSatisfaction')
      - Valid
    - - .isDataType('JobSatisfaction', 'Integral')
      - Invalid
    assumptions: []
  MaritalStatus:
    code:
    - - '.hasValues(''MaritalStatus'', [''Divorced'', ''Single'', ''Married''], lambda
        x: x == 1.0)'
      - Invalid
    - - .isComplete('MaritalStatus')
      - Valid
    - - .isDataType('MaritalStatus', 'String')
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isDataType('MonthlyIncome', 'Integral')
      - Invalid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyIncome, SalarySlab:
    code:
    - - '.satisfies("CASE WHEN SalarySlab = ''Upto 5k'' THEN MonthlyIncome > 0 AND
        MonthlyIncome <= 5000 WHEN SalarySlab = ''5k-10k'' THEN MonthlyIncome > 5000
        AND MonthlyIncome <= 10000 WHEN SalarySlab = ''10k-15k'' THEN MonthlyIncome
        > 10000 AND MonthlyIncome <= 15000 WHEN SalarySlab = ''15k+'' THEN MonthlyIncome
        > 15000 ELSE FALSE END", "MonthlyIncome and SalarySlab consistency", lambda
        x: x == 1.0)'
      - Valid
    assumptions: []
  MonthlyRate:
    code:
    - - .isComplete('MonthlyRate')
      - Valid
    - - .isDataType('MonthlyRate', 'Integral')
      - Invalid
    - - .isPositive('MonthlyRate')
      - Valid
    assumptions: []
  NumCompaniesWorked:
    code:
    - - .isComplete('NumCompaniesWorked')
      - Valid
    - - .isDataType('NumCompaniesWorked', 'Integral')
      - Invalid
    - - .isNonNegative('NumCompaniesWorked')
      - Valid
    assumptions: []
  Over18:
    code:
    - - '.hasValues(''Over18'', [''Y''], lambda x: x == 1.0)'
      - Invalid
    - - .isComplete('Over18')
      - Valid
    - - .isDataType('Over18', 'String')
      - Invalid
    assumptions: []
  OverTime:
    code:
    - - '.hasValues(''OverTime'', [''Yes'', ''No''], lambda x: x == 1.0)'
      - Invalid
    - - .isComplete('OverTime')
      - Valid
    - - .isDataType('OverTime', 'String')
      - Invalid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .hasMax('PercentSalaryHike', 25)
      - Invalid
    - - .isComplete('PercentSalaryHike')
      - Valid
    - - .isDataType('PercentSalaryHike', 'Integral')
      - Invalid
    - - .isNonNegative('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - '.hasValues(''PerformanceRating'', [''3'', ''4''], lambda x: x == 1.0)'
      - Invalid
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isDataType('PerformanceRating', 'Integral')
      - Invalid
    assumptions: []
  RelationshipSatisfaction:
    code:
    - - .hasMax('RelationshipSatisfaction', 4)
      - Invalid
    - - .hasMin('RelationshipSatisfaction', 1)
      - Invalid
    - - .isComplete('RelationshipSatisfaction')
      - Valid
    - - .isDataType('RelationshipSatisfaction', 'Integral')
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - '.hasValues(''SalarySlab'', [''Upto 5k'', ''5k-10k'', ''10k-15k'', ''15k+''],
        lambda x: x == 1.0)'
      - Invalid
    - - .isComplete('SalarySlab')
      - Valid
    - - .isDataType('SalarySlab', 'String')
      - Invalid
    assumptions: []
  StandardHours:
    code:
    - - .hasMax('StandardHours', 80)
      - Invalid
    - - .hasMin('StandardHours', 80)
      - Invalid
    - - '.hasNumberOfDistinctValues(''StandardHours'', lambda x: x == 1)'
      - Invalid
    - - .isComplete('StandardHours')
      - Valid
    - - .isDataType('StandardHours', 'Integral')
      - Invalid
    assumptions: []
  StockOptionLevel:
    code:
    - - .hasMax('StockOptionLevel', 3)
      - Invalid
    - - .hasMin('StockOptionLevel', 0)
      - Invalid
    - - .isComplete('StockOptionLevel')
      - Valid
    - - .isDataType('StockOptionLevel', 'Integral')
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isDataType('TotalWorkingYears', 'Integral')
      - Invalid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  TotalWorkingYears, YearsAtCompany:
    code:
    - - '.satisfies("TotalWorkingYears >= YearsAtCompany", "TotalWorkingYears is greater
        than or equal to YearsAtCompany", lambda x: x == 1.0)'
      - Valid
    assumptions: []
  TrainingTimesLastYear:
    code:
    - - .hasMax('TrainingTimesLastYear', 6)
      - Invalid
    - - .hasMin('TrainingTimesLastYear', 0)
      - Invalid
    - - .isComplete('TrainingTimesLastYear')
      - Valid
    - - .isDataType('TrainingTimesLastYear', 'Integral')
      - Invalid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .hasMax('WorkLifeBalance', 4)
      - Invalid
    - - .hasMin('WorkLifeBalance', 1)
      - Invalid
    - - .isComplete('WorkLifeBalance')
      - Valid
    - - .isDataType('WorkLifeBalance', 'Integral')
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isDataType('YearsAtCompany', 'Integral')
      - Invalid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isDataType('YearsInCurrentRole', 'Integral')
      - Invalid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isDataType('YearsSinceLastPromotion', 'Integral')
      - Invalid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsSinceLastPromotion, YearsAtCompany:
    code:
    - - '.satisfies("YearsSinceLastPromotion <= YearsAtCompany", "YearsSinceLastPromotion
        is less than or equal to YearsAtCompany", lambda x: x >= 0.95)'
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - .isDataType('YearsWithCurrManager', 'Fractional')
      - Invalid
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
  YearsWithCurrManager, YearsAtCompany:
    code:
    - - '.satisfies("YearsWithCurrManager IS NULL OR YearsWithCurrManager <= YearsAtCompany",
        "YearsWithCurrManager is less than or equal to YearsAtCompany (or null)",
        lambda x: x >= 0.95)'
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', 'Integral')
      - Invalid
    assumptions: []
