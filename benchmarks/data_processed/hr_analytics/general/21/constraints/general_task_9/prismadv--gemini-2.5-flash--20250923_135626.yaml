    assumptions:
    - text: 'The calculation of `uplift_ot` (lines 48-49) involves comparing attrition
        rates based on the `OverTime` and `Attrition` columns. It is assumed that
        `OverTime` contains only ''Yes'' or ''No'' values, and `Attrition` contains
        only ''Yes'' or ''No'' values. Furthermore, for the uplift to be meaningfully
        calculated as a ratio (i.e., not defaulting to 0.0), there should be at least
        one record where `OverTime` is ''No'' and `Attrition` is ''Yes'', ensuring
        that `rate_ot_no` (the attrition rate for `OverTime == ''No''`) is greater
        than zero. We could represent this assumption as Deequ constraints like: `.isContainedIn(''OverTime'',
        [''Yes'', ''No''])`, `.isContainedIn(''Attrition'', [''Yes'', ''No''])`, and
        `.hasMinCount(1, where=(col(''OverTime'') == ''No'').and(col(''Attrition'')
        == ''Yes''))`.'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: 800f63e0-d286-40ba-a691-39044889d73c
    - text: 'The `role_ratio` (line 62) is computed as `YearsInCurrentRole` divided
        by `YearsAtCompany`. It is assumed that `YearsInCurrentRole` must be less
        than or equal to `YearsAtCompany` for all records. A `role_ratio` greater
        than 1.0 would indicate an inconsistency where an employee has spent more
        time in their current role than their total tenure at the company. We could
        represent this assumption as a Deequ constraint like: `.isLessThanOrEqualTo(''YearsInCurrentRole'',
        ''YearsAtCompany'')`. Additionally, `YearsAtCompany` and `YearsInCurrentRole`
        are expected to be non-negative, which can be checked with `.isNonNegative(''YearsAtCompany'')`
        and `.isNonNegative(''YearsInCurrentRole'')`.'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: 565c60be-ebe1-4ced-b6d6-5ead91fd42a1
    - text: 'The `mgr_ratio` (line 69) is computed as `YearsWithCurrManager` divided
        by `YearsAtCompany`. It is assumed that `YearsWithCurrManager` must be less
        than or equal to `YearsAtCompany` for all records. A `mgr_ratio` greater than
        1.0 would indicate an inconsistency where an employee has spent more time
        with their current manager than their total tenure at the company. We could
        represent this assumption as a Deequ constraint like: `.isLessThanOrEqualTo(''YearsWithCurrManager'',
        ''YearsAtCompany'')`. Additionally, `YearsWithCurrManager` is expected to
        be non-negative, which can be checked with `.isNonNegative(''YearsWithCurrManager'')`.'
      sources:
      - start_line: 69
        end_line: 70
        file: ''
      uid: bc7ccb41-9342-4de9-b71b-62a34a1a6110
    - text: 'The `risk_raw` score (lines 97-107) is calculated as a weighted sum of
        nine individual risk component columns (`risk_income`, `risk_ot`, `risk_wlb`,
        `risk_js`, `risk_role_stagnation`, `risk_promo_lag`, `risk_mgr_churn`, `risk_age_band`,
        `risk_commute`). It is assumed that all these columns exist in the DataFrame
        and contain valid numeric values (e.g., Double type) for the arithmetic operations
        to proceed correctly. We could represent this assumption as Deequ constraints
        like: `.hasType(''risk_income'', ''Double'')`, `.hasType(''risk_ot'', ''Double'')`,
        ..., `.hasType(''risk_commute'', ''Double'')`. Given their derivation, these
        columns are also expected to be complete, e.g., `.hasCompleteness(''risk_income'',
        1.0)`.'
      sources:
      - start_line: 97
        end_line: 107
        file: ''
      uid: 583cab9c-0646-49de-9f4d-97e0fa2f4691
    - text: 'The `risk_tier` column (lines 117-120) is assigned based on `risk_score`
        and thresholds derived from the `overall_attr_rate`, which in turn depends
        on the `Attrition` column. It is assumed that `Attrition` exclusively contains
        ''Yes'' or ''No'' values for the `overall_attr_rate` calculation to be accurate.
        Furthermore, `risk_score` is assumed to contain numeric values between 0 and
        1 (as it is clipped to this range in line 110) for meaningful comparison against
        the derived thresholds. We could represent this assumption as Deequ constraints
        like: `.isContainedIn(''Attrition'', [''Yes'', ''No''])`, `.isNonNegative(''risk_score'')`,
        and `.isLessThanOrEqualTo(''risk_score'', 1.0)`.'
      sources:
      - start_line: 113
        end_line: 120
        file: ''
      uid: 77c0c11d-28ce-4a82-ba1a-63be7274c6c0
    - text: 'The `recommend_action` function (lines 123-135) makes conditional decisions
        based on several columns. It is assumed that: `risk_tier` contains only ''High'',
        ''Medium'', or ''Low'' values; `OverTime` contains only ''Yes'' or ''No''
        values; `JobSatisfaction` and `WorkLifeBalance` are numeric (likely integral)
        and within expected ranges (e.g., [1, 4] for both, based on upstream mappings)
        for the comparisons to be meaningful; and `risk_income`, `risk_role_stagnation`,
        `risk_promo_lag`, and `risk_mgr_churn` are numeric and non-negative, consistent
        with their derivations and comparisons (e.g., `risk_income >= 0.8`). We could
        represent this assumption as Deequ constraints like: `.isContainedIn(''risk_tier'',
        [''High'', ''Medium'', ''Low''])`, `.isContainedIn(''OverTime'', [''Yes'',
        ''No''])`, `.hasMin(''JobSatisfaction'', 1).hasMax(''JobSatisfaction'', 4).hasType(''JobSatisfaction'',
        ''Integral'')`, `.hasMin(''WorkLifeBalance'', 1).hasMax(''WorkLifeBalance'',
        4).hasType(''WorkLifeBalance'', ''Integral'')`, `.isNonNegative(''risk_income'')`,
        `.isNonNegative(''risk_role_stagnation'')`, `.isNonNegative(''risk_promo_lag'')`,
        and `.isNonNegative(''risk_mgr_churn'')`.'
      sources:
