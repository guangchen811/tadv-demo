    - text: 'The ''OverTime'' column is expected to contain only ''Yes'' or ''No''
        values. Similarly, the ''Attrition'' column is expected to contain only ''Yes''
        or ''No'' values. This is crucial for the correct calculation of attrition
        rates for overtime and non-overtime groups.

        We could represent this assumption as Deequ constraints like this:

        .isContainedIn("OverTime", Seq("Yes", "No"))

        .isContainedIn("Attrition", Seq("Yes", "No"))'
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      uid: 54a8fb65-5a06-4421-8a64-166449c051b0
    - text: 'The ''risk_tier'' column is derived from ''risk_score'' using dynamically
        calculated thresholds (`high_threshold`, `med_threshold`). It is assumed that
        the ''risk_tier'' accurately reflects the ''risk_score'' based on these thresholds.
        Specifically, if ''risk_tier'' is ''High'', then ''risk_score'' must be greater
        than or equal to `high_threshold`; if ''Medium'', then `med_threshold` <=
        `risk_score` < `high_threshold`; and if ''Low'', then ''risk_score'' < `med_threshold`.

        Representing this directly in Deequ with dynamic thresholds requires them
        to be known at constraint definition time. However, general type and range
        checks, and conditional checks can be used:

        .isContainedIn("risk_tier", Seq("High", "Medium", "Low"))

        .isNonNegative("risk_score")

        .isLessThanOrEqualTo("risk_score", 1.0)

        For consistency, a custom Deequ check would be needed, e.g.:

        .check(col("risk_tier") === "High").implies(col("risk_score") >= <calculated_high_threshold>)

        .check(col("risk_tier") === "Medium").implies(col("risk_score") >= <calculated_med_threshold>
        && col("risk_score") < <calculated_high_threshold>)

        .check(col("risk_tier") === "Low").implies(col("risk_score") < <calculated_med_threshold>)'
      sources:
      - start_line: 117
        end_line: 120
        file: ''
      uid: da4492f0-1be7-47ae-b820-471078cfb554
    - text: 'The ''recommend_action'' logic for ''CompensationReview'' assumes that
        ''risk_income'' contains numerical values and ''JobSatisfaction'' contains
        numerical values. Specifically, it expects `risk_income` >= 0.8 and `JobSatisfaction`
        <= 2. This implies a critical interaction between these two metrics for a
        specific action.

        We could represent this assumption as Deequ constraints like this:

        .isNumerical("risk_income")

        .isNumerical("JobSatisfaction")

        .check(col("recommended_action") === "CompensationReview").implies(col("risk_income")
        >= 0.8 && col("JobSatisfaction") <= 2)'
      sources:
      - start_line: 127
        end_line: 128
        file: ''
      uid: b3376e6e-2831-4638-8710-7d831e7f02a7
    - text: 'The ''recommend_action'' logic for ''FlexibleSchedule'' assumes that
        ''OverTime'' contains ''Yes'' or ''No'' values and ''WorkLifeBalance'' contains
        numerical values. Specifically, it expects `OverTime` == ''Yes'' and `WorkLifeBalance`
        <= 2. This implies a critical interaction between working overtime and having
        poor work-life balance for a specific action.

        We could represent this assumption as Deequ constraints like this:

        .isContainedIn("OverTime", Seq("Yes", "No"))

        .isNumerical("WorkLifeBalance")

        .check(col("recommended_action") === "FlexibleSchedule").implies(col("OverTime")
        === "Yes" && col("WorkLifeBalance") <= 2)'
      sources:
      - start_line: 129
        end_line: 130
        file: ''
      uid: a4fe9833-6d14-4a8c-9dbd-3473a0f8485e
    - text: 'The ''recommend_action'' logic for ''CareerProgressionPlan'' assumes
        that both ''risk_role_stagnation'' and ''risk_promo_lag'' columns contain
        numerical values. Specifically, it expects `risk_role_stagnation` >= 0.7 or
        `risk_promo_lag` >= 0.8. This implies a critical interaction between these
        two risk factors for a specific action.

        We could represent this assumption as Deequ constraints like this:

        .isNumerical("risk_role_stagnation")

        .isNumerical("risk_promo_lag")

        .check(col("recommended_action") === "CareerProgressionPlan").implies(col("risk_role_stagnation")
        >= 0.7 || col("risk_promo_lag") >= 0.8)'
      sources:
