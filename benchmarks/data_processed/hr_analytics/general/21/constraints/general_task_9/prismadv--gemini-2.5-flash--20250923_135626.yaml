    assumptions:
    - text: 'For every record, the value in ''YearsInCurrentRole'' must be less than
        or equal to the value in ''YearsAtCompany''. Both columns are expected to
        contain non-negative numerical values. This ensures that the ''role_ratio''
        (YearsInCurrentRole / YearsAtCompany) is logically sound and within expected
        bounds before clipping.

        We could represent this assumption as Deequ constraints like this:

        .isNonNegative("YearsInCurrentRole")

        .isNonNegative("YearsAtCompany")

        .isLessThanOrEqualTo("YearsInCurrentRole", "YearsAtCompany")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: 85ebd185-20f0-4917-b588-2a457e6e9aba
    - text: 'For every record, the value in ''YearsWithCurrManager'' must be less
        than or equal to the value in ''YearsAtCompany''. Both columns are expected
        to contain non-negative numerical values. This ensures that the ''mgr_ratio''
        (YearsWithCurrManager / YearsAtCompany) is logically sound and within expected
        bounds before clipping.

        We could represent this assumption as Deequ constraints like this:

        .isNonNegative("YearsWithCurrManager")

        .isNonNegative("YearsAtCompany")

        .isLessThanOrEqualTo("YearsWithCurrManager", "YearsAtCompany")'
      sources:
