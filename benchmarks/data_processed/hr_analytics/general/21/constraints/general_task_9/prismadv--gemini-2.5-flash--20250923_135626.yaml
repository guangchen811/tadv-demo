    assumptions:
    - text: 'For each employee, the ''YearsInCurrentRole'' must be less than or equal
        to ''YearsAtCompany'', and ''YearsWithCurrManager'' must be less than or equal
        to ''YearsAtCompany''. These relationships are fundamental for the derived
        ratios (''role_ratio'', ''mgr_ratio'') to be logically consistent and within
        expected bounds (0 to 1 before clipping). Additionally, ''YearsAtCompany''
        is expected to be a non-negative numerical value, as a zero value is specifically
        handled by `replace(0, np.nan)` and subsequent `fillna(0.0)` for the denominator.

        We could represent this assumption as deequ constraints like this:

        .isLessThanOrEqualTo("YearsInCurrentRole", "YearsAtCompany")

        .isLessThanOrEqualTo("YearsWithCurrManager", "YearsAtCompany")

        .isNonNegative("YearsAtCompany")'
      sources:
      - start_line: 61
        end_line: 62
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: b353c1aa-dd49-4e95-b522-fddb567980b6
    - text: 'The columns ''SalarySlab'', ''JobSatisfaction'', ''YearsInCurrentRole'',
        ''YearsSinceLastPromotion'', ''YearsWithCurrManager'', and ''DistanceFromHome''
        are critical for calculating `risk_income`, `risk_js`, `risk_role_stagnation`,
        `risk_promo_lag`, `risk_mgr_churn`, and `risk_commute` respectively. It is
        assumed that these underlying columns are sufficiently complete (e.g., non-null)
        such that their derived risk features do not contain null values, as any nulls
        would propagate to ''risk_raw'' during the weighted summation, potentially
        leading to null ''risk_score'' and incorrect ''risk_tier'' assignments.

        We could represent this assumption as deequ constraints like this:

        .hasNoNulls("SalarySlab")

        .hasNoNulls("JobSatisfaction")

        .hasNoNulls("YearsInCurrentRole")

        .hasNoNulls("YearsSinceLastPromotion")

        .hasNoNulls("YearsWithCurrManager")

        .hasNoNulls("DistanceFromHome")'
