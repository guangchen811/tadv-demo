    - text: 'For the ''OverTime'' risk uplift calculation to be meaningful and not
        always default to zero, it is assumed that the ''OverTime'' column contains
        both ''Yes'' and ''No'' values, and the ''Attrition'' column consistently
        uses ''Yes'' and ''No'' values. Specifically, there must be at least one record
        where ''OverTime'' is ''No'' to allow for the calculation of `rate_ot_no`
        as a non-zero value, which is used as a denominator. Without sufficient data
        for both ''OverTime'' categories, the uplift calculation may not reflect actual
        trends.

        We could represent this assumption as deequ constraints like this:

        .isContainedIn("OverTime", Array("Yes", "No"))

        .isContainedIn("Attrition", Array("Yes", "No"))

        .hasMin("OverTime", "Yes", 1)

        .hasMin("OverTime", "No", 1)'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: 3ce282d7-d923-4c2e-9ddf-6a46be102f01
    - text: 'The `recommend_action` function relies on specific data types and value
        ranges for its conditional logic involving multiple columns. It assumes:

        *   ''risk_tier'' is a categorical string with values ''High'', ''Medium'',
        or ''Low''.

        *   ''risk_income'' is a numerical value, typically within the range [0.0,
        1.0].

        *   ''JobSatisfaction'' is an integer, typically within the range [1, 4].

        *   ''OverTime'' is a categorical string with values ''Yes'' or ''No''.

        *   ''WorkLifeBalance'' is an integer, typically within the range [1, 4].

        *   ''risk_role_stagnation'', ''risk_promo_lag'', and ''risk_mgr_churn'' are
        numerical values, typically within the range [0.0, 1.0].

        Violations of these assumptions could lead to incorrect action recommendations
        or runtime errors if types are incompatible (e.g., comparing string to number).

        We could represent this assumption as deequ constraints like this:

        .isContainedIn("risk_tier", Array("High", "Medium", "Low"))

        .isNonNegative("risk_income").isLessThanOrEqualTo("risk_income", 1.0)

        .isContainedIn("JobSatisfaction", Array(1, 2, 3, 4))

        .isContainedIn("OverTime", Array("Yes", "No"))

        .isContainedIn("WorkLifeBalance", Array(1, 2, 3, 4))

        .isNonNegative("risk_role_stagnation").isLessThanOrEqualTo("risk_role_stagnation",
        1.0)

        .isNonNegative("risk_promo_lag").isLessThanOrEqualTo("risk_promo_lag", 1.0)

        .isNonNegative("risk_mgr_churn").isLessThanOrEqualTo("risk_mgr_churn", 1.0)'
      sources:
