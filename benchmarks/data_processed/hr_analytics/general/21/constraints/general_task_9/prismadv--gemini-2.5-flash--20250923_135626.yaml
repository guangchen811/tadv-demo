        an action. Specifically, it assumes: 1. `risk_tier` is a categorical column
        containing ''High'', ''Medium'', or ''Low''. 2. `OverTime` is a categorical
        column containing ''Yes'' or ''No''. 3. `risk_income`, `JobSatisfaction`,
        `WorkLifeBalance`, `risk_role_stagnation`, `risk_promo_lag`, and `risk_mgr_churn`
        are all numeric columns. 4. The numeric columns have values within their expected
        operational ranges (e.g., `JobSatisfaction` and `WorkLifeBalance` typically
        1-4, risk scores 0-1) for the conditional comparisons (e.g., `JobSatisfaction
        <= 2`, `WorkLifeBalance <= 2`, `risk_income >= 0.8`) to function correctly.
        This can be validated with Deequ constraints such as: `.isContainedIn(''risk_tier'',
