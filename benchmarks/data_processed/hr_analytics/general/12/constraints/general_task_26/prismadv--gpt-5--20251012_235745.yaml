        CASE expression over (SalarySlab, MonthlyIncome).'
      sources:
      - start_line: 8
        end_line: 19
        file: ''
      - start_line: 68
        end_line: 70
        file: ''
      - start_line: 101
        end_line: 101
        file: ''
      uid: fe5fdbcc-88f6-430f-a42a-c63237a4116b
    - text: 'BandMidpoint must align with SalarySlab: if SalarySlab is ''Upto 5k''
        then BandMidpoint = 2500; if ''5k-10k'' then 7500; if ''10k-15k'' then 12500;
        if ''15k+'' then BandMidpoint must be non-null (derived from the median MonthlyIncome
        within the ''15k+'' subset, with a fallback if none exist). Row-level checks
        can enforce the first three equalities and non-null for the ''15k+'' case.'
      sources:
      - start_line: 22
        end_line: 31
        file: ''
      - start_line: 68
        end_line: 70
        file: ''
      uid: a2b8ff5c-7f19-4955-b657-a4a310d01bd4
    - text: 'MarketAdjPct must be determined by CompaRatio = MonthlyIncome / BandMidpoint:
        MarketAdjPct = 0.02 when CompaRatio < 0.90; = -0.01 when CompaRatio > 1.10;
        = 0.0 otherwise. This is a multi-column functional dependency among MonthlyIncome,
        BandMidpoint, CompaRatio, and MarketAdjPct and can be expressed as a .satisfies
        CASE check.'
      sources:
      - start_line: 68
        end_line: 70
        file: ''
      - start_line: 75
        end_line: 78
        file: ''
      uid: fb9ecde6-346b-432a-8a43-53f219931099
    - text: 'Tenure consistency: YearsSinceLastPromotion must be <= YearsAtCompany,
        and YearsAtCompany must be <= TotalWorkingYears; all three should be non-negative.
        This enforces the hierarchical year consistency the later ratios rely on.'
      sources:
      - start_line: 81
        end_line: 85
        file: ''
      uid: 61ac3109-46b6-451e-9367-291b1764fc31
    - text: 'LevelPercentile must reflect within-level salary ranking: within each
        JobLevel, LevelPercentile should be in [0, 1], and for any two rows in the
        same JobLevel, the row with higher MonthlyIncome should not have a lower LevelPercentile.
        This can be validated by recomputing the percentile rank per JobLevel over
        MonthlyIncome and comparing.'
      sources:
      - start_line: 86
        end_line: 88
        file: ''
      uid: 1e35dc4a-4e64-4ee2-b102-9f8a24e37e97
    - text: 'PromotionRecommended must exactly equal the conjunction: (PerformanceRating
        >= 4) AND (YearsSinceLastPromotion >= 2) AND (LevelPercentile >= 0.85) AND
        (JobLevel < max(JobLevel)). This is a multi-column logical dependency and
        can be checked with a .satisfies expression.'
      sources:
      - start_line: 90
        end_line: 95
        file: ''
      uid: e2c5238a-63f1-419e-9cff-f668a59b6375
    - text: 'NextBandMin must be consistent with SalarySlab: ''Upto 5k'' => 5001;
        ''5k-10k'' => 10001; ''10k-15k'' => 15001; ''15k+'' => null. This can be enforced
        via a multi-column conditional equality check.'
      sources:
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 101
        end_line: 101
        file: ''
      uid: f83ae607-c385-45c1-a47e-ec53fa0567e1
    - text: RecommendedRaisePct must equal BaseRaisePct + MarketAdjPct + TenureAdjPct,
        and TotalRaisePct must equal clip(RecommendedRaisePct + PromoKickerPct, 0.0,
        0.20). These multi-column arithmetic relationships can be verified with .satisfies
        checks (with a small tolerance for floating-point).
      sources:
      - start_line: 97
        end_line: 99
        file: ''
      uid: a51cfa9c-33af-45ae-9c6e-c53955cc26c0
    - text: NewMonthlyIncome must equal round(MonthlyIncome * (1 + TotalRaisePct))
        for rows where NOT (PromotionRecommended AND NextBandMin is not null). For
        rows where PromotionRecommended is true and NextBandMin is not null, NewMonthlyIncome
        must equal max(round(MonthlyIncome * (1 + TotalRaisePct)), NextBandMin).
      sources:
      - start_line: 99
        end_line: 111
        file: ''
      - start_line: 101
        end_line: 101
        file: ''
      uid: eb0681a6-c60c-491c-ac04-794ccec5f78d
    - text: 'NewSalarySlab must be consistent with NewMonthlyIncome using the same
        banding rules as assign_salary_slab: ''Upto 5k'' <= 5000, ''5k-10k'' 5001-10000,
        ''10k-15k'' 10001-15000, ''15k+'' >= 15001.'
      sources:
      - start_line: 8
        end_line: 19
        file: ''
      - start_line: 112
        end_line: 114
        file: ''
      uid: 3a8a28c7-ed2e-4c11-bf10-e139de0e05a2
    - text: 'NewJobLevel must follow promotion logic: if PromotionRecommended is true
        then NewJobLevel = JobLevel + 1, otherwise NewJobLevel = JobLevel.'
      sources:
      - start_line: 113
        end_line: 114
        file: ''
      uid: c5997501-24b6-40dc-a05b-302af9b1f568
    - text: 'Monotonic level-compensation sanity: aggregated by JobLevel, the median
        (or mean) MonthlyIncome should be non-decreasing as JobLevel increases. This
        supports the level-based percentile and promotion logic and can be validated
        via a grouped aggregate check.'
      sources:
      - start_line: 86
        end_line: 88
        file: ''
      uid: 32c435a4-2900-48a2-9641-c8f605d5ab54
  '["JobLevel","MonthlyIncome","PerformanceRating","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'SalarySlab must be consistent with MonthlyIncome based on the slab definitions
        used by the code. Allowed slabs are exactly {"Upto 5k","5k-10k","10k-15k","15k+"}.
        Row-level rules: (a) SalarySlab = ''Upto 5k'' => MonthlyIncome <= 5000; (b)
        ''5k-10k'' => 5001 <= MonthlyIncome <= 10000; (c) ''10k-15k'' => 10001 <=
        MonthlyIncome <= 15000; (d) ''15k+'' => MonthlyIncome >= 15001. This ensures
        valid band midpoint mapping and next-band logic. Example Deequ: .satisfies("(SalarySlab
        = ''Upto 5k'' AND MonthlyIncome <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome
        BETWEEN 5001 AND 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome BETWEEN
        10001 AND 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome >= 15001)", "slab_income_alignment",
        1.0)'
