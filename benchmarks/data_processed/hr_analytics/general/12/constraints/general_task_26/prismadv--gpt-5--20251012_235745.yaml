    - suggestion: '.satisfies(''YearsSinceLastPromotion >= 0 AND YearsAtCompany >=
        0 AND TotalWorkingYears >= 0'', ''Tenure fields are non-negative'', lambda
        x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: a834ebae-33fa-4637-984c-e3a8f44055e1
      source_assumptions:
      - b2efc4d0-838a-4e4a-b68f-6ebb54e373f5
    assumptions:
    - text: 'SalarySlab must be consistent with MonthlyIncome per the slab thresholds:
        MonthlyIncome <= 5000 -> ''Upto 5k''; 5000 < MonthlyIncome <= 10000 -> ''5k-10k'';
        10000 < MonthlyIncome <= 15000 -> ''10k-15k''; MonthlyIncome > 15000 -> ''15k+''.
        This can be enforced with a row-level rule (e.g., Deequ satisfies) that the
        pair (SalarySlab, MonthlyIncome) matches one of these ranges.'
      sources:
      - start_line: 8
        end_line: 19
        file: ''
      - start_line: 68
        end_line: 70
        file: ''
      uid: 1f3ce995-4db8-4d30-9d19-af338c17c50d
    - text: 'Hierarchical tenure consistency: YearsSinceLastPromotion <= YearsAtCompany
        and YearsAtCompany <= TotalWorkingYears, with all three being non-negative
        numeric values. This prevents nonsensical ratios and ensures tenure-derived
        calculations behave as intended.'
      sources:
      - start_line: 56
        end_line: 65
        file: ''
      - start_line: 80
        end_line: 84
        file: ''
      uid: 469ef213-e512-4aaf-8314-609f6b0e0887
    - text: 'PromotionRecommended must equal the conjunction of the four gating conditions:
        (PerformanceRating >= 4) AND (YearsSinceLastPromotion >= 2) AND (LevelPercentile
        >= 0.85) AND (JobLevel < max(JobLevel) in the dataset). This can be encoded
        as a boolean equivalence check between PromotionRecommended and the condition.'
      sources:
      - start_line: 87
        end_line: 95
        file: ''
      uid: b2efc4d0-838a-4e4a-b68f-6ebb54e373f5
    - text: For rows that meet the promotion preconditions (PerformanceRating >= 4
        and YearsSinceLastPromotion >= 2 and JobLevel < max level), LevelPercentile
        must be non-null to allow a valid comparison against the 0.85 threshold.
      sources:
      - start_line: 87
        end_line: 95
        file: ''
      uid: 0fa68753-2a99-4bdb-af56-83abd4950758
    - text: If PromotionRecommended is true and NextBandMin is not null (i.e., current
        SalarySlab is not '15k+'), then NewMonthlyIncome must be at least NextBandMin.
        This enforces the next-band floor for promoted employees.
      sources:
      - start_line: 101
        end_line: 101
        file: ''
      - start_line: 103
        end_line: 111
        file: ''
      uid: 39dfcb93-8c16-41d3-ada4-6c328ccc1168
    - text: NewSalarySlab must be consistent with NewMonthlyIncome using the same
        slab thresholds as the current slab logic. That is, the pair (NewSalarySlab,
        NewMonthlyIncome) must satisfy the same band-range mapping as for current
        income.
      sources:
      - start_line: 8
        end_line: 19
        file: ''
      - start_line: 112
        end_line: 114
        file: ''
      uid: e41c3ce6-a6f0-4ccd-a09a-d8dbf1a5ebd1
    - text: NewJobLevel must equal JobLevel + 1 when PromotionRecommended is true;
        otherwise NewJobLevel must equal JobLevel. This validates the promotion-level
        update behavior.
      sources:
      - start_line: 90
        end_line: 95
        file: ''
      - start_line: 114
        end_line: 114
        file: ''
      uid: 58329bc0-0f23-4a69-8277-50b2c5098c55
    - text: 'CompaRatio must be defined as MonthlyIncome / BandMidpoint, with BandMidpoint
        > 0 for all known SalarySlab values. MarketAdjPct must follow the CompaRatio
        thresholds: 0.02 if CompaRatio < 0.90; -0.01 if CompaRatio > 1.10; 0.0 otherwise.
        These relationships can be checked with two rules: one for the CompaRatio
        formula and positivity of BandMidpoint, and one for the piecewise MarketAdjPct
        mapping.'
      sources:
      - start_line: 22
        end_line: 31
        file: ''
      - start_line: 68
        end_line: 70
        file: ''
      - start_line: 75
        end_line: 78
        file: ''
      uid: ced05888-6728-42f2-9343-0c6723c4c17b
    - text: RecommendedRaisePct must equal the row-wise sum of BaseRaisePct + MarketAdjPct
        + TenureAdjPct; TotalRaisePct must equal min(0.20, max(0.0, RecommendedRaisePct
        + PromoKickerPct)). In addition, TotalRaisePct should be bounded in [0.0,
        0.20].
      sources:
      - start_line: 97
        end_line: 100
        file: ''
      uid: e77264af-103e-46a4-92f2-8344dbcb4d22
    - text: 'BaseRaisePct must be the mapping of PerformanceRating: 3 -> 0.03, 4 ->
        0.08, and 0.0 for any other or missing rating. This validates the rating-to-base-raise
        policy.'
      sources:
      - start_line: 72
        end_line: 74
        file: ''
      uid: 67ebaba2-4143-42e9-8fce-1dd0ac97ef3b
