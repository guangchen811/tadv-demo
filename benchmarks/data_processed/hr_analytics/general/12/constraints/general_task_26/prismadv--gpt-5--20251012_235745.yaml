  ? '["EmpID","JobLevel","MonthlyIncome","PerformanceRating","SalarySlab","TotalWorkingYears","YearsAtCompany","YearsSinceLastPromotion"]'
  : code:
    - suggestion: '.haveCompleteness([''MonthlyIncome'', ''SalarySlab''], lambda x:
