    - text: 'All values in ''MonthlyIncome'' must be numeric (parsable as numbers).
        The code coerces to numeric with errors=''coerce'', so any non-numeric value
        would become null and later operations would fail. This can be represented
        as: Deequ hasDataType(''MonthlyIncome'', ConstrainableDataTypes.Integral)
        OR hasDataType(''MonthlyIncome'', ConstrainableDataTypes.Fractional); or Great
        Expectations expect_column_values_to_be_in_type_list([''int'', ''float'']).'
      sources:
      - start_line: 57
        end_line: 65
        file: ''
      uid: eeb5bb24-a179-494d-be8c-9a656ac6b521
    - text: '''MonthlyIncome'' must be complete (no nulls) after coercion. Nulls would
        propagate into ''new_income'' and cause df[''NewMonthlyIncome''] = new_income.astype(int)
        to fail. Represent with: Deequ isComplete(''MonthlyIncome'') or Great Expectations
        expect_column_values_to_not_be_null.'
      sources:
      - start_line: 103
        end_line: 103
        file: ''
      - start_line: 112
        end_line: 112
        file: ''
      uid: a0287f26-0b40-4d95-93cf-931149d436fb
    - text: '''MonthlyIncome'' should be non-negative. Negative incomes would break
        the intended salary band semantics and distort compa-ratio logic. Represent
        with: Deequ satisfies(''MonthlyIncome >= 0'', ''Non-negative MonthlyIncome'',
        lambda x: x == 1.0) or Great Expectations expect_column_min_to_be_greater_than_or_equal_to(0).'
      sources:
      - start_line: 23
        end_line: 41
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      uid: 8ce471b0-d1ca-4944-aa16-bda3d6ba072b
    - text: '''MonthlyIncome'' should align with the declared ''SalarySlab'' ranges.
        For rows with SalarySlab: Upto 5k => MonthlyIncome between 0 and 5000; 5k-10k
        => between 5001 and 10000; 10k-15k => between 10001 and 15000; 15k+ => >=
        15001. A Deequ constraint could be: satisfies("CASE WHEN SalarySlab = ''Upto
        5k'' THEN MonthlyIncome BETWEEN 0 AND 5000 WHEN SalarySlab = ''5k-10k'' THEN
        MonthlyIncome BETWEEN 5001 AND 10000 WHEN SalarySlab = ''10k-15k'' THEN MonthlyIncome
        BETWEEN 10001 AND 15000 WHEN SalarySlab = ''15k+'' THEN MonthlyIncome >= 15001
        ELSE TRUE END", ''Salary slab-income alignment'', lambda x: x >= 0.95).'
      sources:
      - start_line: 8
        end_line: 19
        file: ''
      - start_line: 23
        end_line: 27
        file: ''
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 101
        end_line: 101
        file: ''
      uid: f10d6ca0-e3cc-4edb-a78f-3b41f4bdb967
