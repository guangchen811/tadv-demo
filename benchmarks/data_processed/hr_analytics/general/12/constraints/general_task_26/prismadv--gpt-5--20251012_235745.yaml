        NOT PromotionRecommended OR YearsSinceLastPromotion >= 2. Example deequ constraint:
        Check.satisfies("(NOT PromotionRecommended) OR (YearsSinceLastPromotion >=
        2)", "promo_requires_two_years_since_last").'
