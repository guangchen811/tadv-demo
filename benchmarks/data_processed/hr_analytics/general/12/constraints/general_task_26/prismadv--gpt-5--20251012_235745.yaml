    - text: 'Hierarchical consistency: For rows with a non-null, non-negative YearsAtCompany,
        ''YearsSinceLastPromotion'' should not exceed ''YearsAtCompany'' (0 <= YSLP
        <= YearsAtCompany). This prevents ratios > 1 and aligns with the "hierarchical
