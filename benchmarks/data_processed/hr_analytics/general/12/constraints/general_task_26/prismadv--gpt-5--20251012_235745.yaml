      source_assumptions:
      - 4558d993-0476-4462-b6d0-6e7d3af50c00
    assumptions:
    - text: The 'YearsAtCompany' column must exist in the input dataset; otherwise,
        tenure-based calculations (e.g., TenureRatio) will fail.
      sources:
      - start_line: 81
        end_line: 84
        file: ''
      uid: 0edda4c5-ad32-423c-a921-8e59071d896c
    - text: 'The ''YearsAtCompany'' column should be numeric (coercible to number)
        for the vast majority of rows. Non-numeric values will be coerced to null
        and effectively treated as zero-tenure in downstream calculations. Example
        Deequ constraint: .satisfies(''CASE WHEN `YearsAtCompany` IS NULL THEN 1 WHEN
        CAST(`YearsAtCompany` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END'', ''YearsAtCompany
        is numeric or null'', lambda x: x >= 0.95)'
      sources:
      - start_line: 56
        end_line: 65
        file: ''
      uid: 319cc4fa-a29d-4c1b-af5d-48e73b60e894
    - text: 'The ''YearsAtCompany'' values should be non-negative (>= 0). Negative
        values would be nonsensical for tenure and will be treated as not greater
        than zero, leading to a zero TenureRatio. Example Deequ constraint: .hasMin(''YearsAtCompany'',
        lambda x: x >= 0)'
      sources:
      - start_line: 81
        end_line: 84
        file: ''
      uid: 0315f4f8-105d-4ebe-9e44-c48f7e250a0e
    - text: 'The ''YearsAtCompany'' represents whole years and should be integer-valued
        when present (no fractional years). Example Deequ constraint: .satisfies(''CASE
        WHEN `YearsAtCompany` IS NULL THEN 1 WHEN `YearsAtCompany` = CAST(`YearsAtCompany`
        AS BIGINT) THEN 1 ELSE 0 END'', ''YearsAtCompany is whole years'', lambda
        x: x >= 0.98)'
      sources:
      - start_line: 56
        end_line: 65
        file: ''
      uid: 2c148511-a3fa-457e-91b4-1a40cae4c527
    - text: 'Hierarchical year consistency: for rows where both are present, ''YearsSinceLastPromotion''
        should not exceed ''YearsAtCompany''. This aligns with the tenure-based ratio
        logic. Example Deequ constraint: .satisfies(''CASE WHEN `YearsAtCompany` IS
        NULL OR `YearsSinceLastPromotion` IS NULL THEN 1 WHEN `YearsSinceLastPromotion`
        <= `YearsAtCompany` THEN 1 ELSE 0 END'', ''YSLP <= YearsAtCompany'', lambda
        x: x >= 0.95)'
      sources:
      - start_line: 80
        end_line: 84
        file: ''
      uid: 3bb1190d-2474-4124-8f1e-b772b2215cf0
    - text: 'Hierarchical year consistency: for rows where both are present, ''YearsAtCompany''
        should not exceed ''TotalWorkingYears''. Example Deequ constraint: .satisfies(''CASE
        WHEN `YearsAtCompany` IS NULL OR `TotalWorkingYears` IS NULL THEN 1 WHEN `YearsAtCompany`
        <= `TotalWorkingYears` THEN 1 ELSE 0 END'', ''YearsAtCompany <= TotalWorkingYears'',
        lambda x: x >= 0.95)'
      sources:
      - start_line: 56
        end_line: 65
        file: ''
      - start_line: 80
        end_line: 84
        file: ''
      uid: 4558d993-0476-4462-b6d0-6e7d3af50c00
