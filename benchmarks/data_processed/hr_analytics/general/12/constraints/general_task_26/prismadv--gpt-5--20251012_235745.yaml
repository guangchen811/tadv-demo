        end_line: 19
        file: ''
      - start_line: 22
        end_line: 29
        file: ''
      - start_line: 68
        end_line: 70
        file: ''
      - start_line: 101
        end_line: 102
        file: ''
      uid: 59b94406-7bdb-47a4-9a36-cd0e611c03e7
    - text: 'Tenure hierarchy must hold: YearsSinceLastPromotion <= YearsAtCompany
        <= TotalWorkingYears, and all three are non-negative. This underpins TenureRatio
        and avoids invalid divisions or negative ratios. Example Deequ: .satisfies("YearsSinceLastPromotion
        >= 0 AND YearsAtCompany >= 0 AND TotalWorkingYears >= 0 AND YearsSinceLastPromotion
        <= YearsAtCompany AND YearsAtCompany <= TotalWorkingYears", "tenure_hierarchy",
        1.0)'
      sources:
      - start_line: 55
        end_line: 65
        file: ''
      - start_line: 81
        end_line: 84
        file: ''
      uid: cfe73327-f627-4dc7-bffb-53e34f6ae1cb
    - text: 'Within each JobLevel, MonthlyIncome serves as a basis for percentile
        ranking; therefore, compensation should increase with level. A practical,
        testable assumption is that the per-level median MonthlyIncome is non-decreasing
        with JobLevel. Example (aggregate check): compute median MonthlyIncome by
        JobLevel and assert it is non-decreasing across ascending JobLevel values.'
      sources:
      - start_line: 86
        end_line: 87
        file: ''
      uid: 5f1e6709-7efb-4946-a300-7bcc72372daa
    - text: 'BaseRaisePct must be consistent with PerformanceRating mapping: PerformanceRating
        = 3 => BaseRaisePct = 0.03; PerformanceRating = 4 => 0.08; for all other ratings
        => 0.0. Example Deequ: .satisfies("(PerformanceRating = 3 AND BaseRaisePct
        = 0.03) OR (PerformanceRating = 4 AND BaseRaisePct = 0.08) OR (PerformanceRating
        NOT IN (3,4) AND BaseRaisePct = 0.0)", "rating_to_raise_mapping", 1.0)'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      uid: 918977a8-d140-42d6-9244-4eef25cd4196
    - text: 'PromotionRecommended must exactly reflect the cross-column gating logic:
        PromotionRecommended = (PerformanceRating >= 4 AND YearsSinceLastPromotion
        >= 2 AND LevelPercentile >= 0.85 AND JobLevel < max(JobLevel)). In validation,
        substitute max(JobLevel) with the dataset-level maximum. Example Deequ: .satisfies("PromotionRecommended
        = (PerformanceRating >= 4 AND YearsSinceLastPromotion >= 2 AND LevelPercentile
        >= 0.85 AND JobLevel < {JOBLEVEL_MAX})", "promotion_flag_logic", 1.0)'
      sources:
      - start_line: 90
        end_line: 95
        file: ''
      uid: d1e3589a-7ba7-4b9b-9022-0ab831f27f1f
    - text: 'If PromotionRecommended is true, NewJobLevel must equal JobLevel + 1;
        otherwise NewJobLevel must equal JobLevel. Example Deequ: .satisfies("(PromotionRecommended
        AND NewJobLevel = JobLevel + 1) OR (NOT PromotionRecommended AND NewJobLevel
        = JobLevel)", "promotion_level_transition", 1.0)'
      sources:
      - start_line: 113
        end_line: 114
        file: ''
      uid: f179c555-9bd0-43a9-9842-1b5dfde7efc8
    - text: 'For rows eligible for promotion where NextBandMin is defined, NewMonthlyIncome
        must be at least NextBandMin (after applying raises). Example Deequ: .satisfies("(NOT
        PromotionRecommended) OR (NextBandMin IS NULL) OR (NewMonthlyIncome >= NextBandMin)",
        "promo_next_band_floor", 1.0)'
