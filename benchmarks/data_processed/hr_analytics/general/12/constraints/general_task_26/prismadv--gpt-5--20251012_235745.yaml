      sources:
      - start_line: 81
        end_line: 83
        file: ''
      uid: 7cedb6d2-72fe-450b-a7fb-b9dad96cc55f
    - text: 'TenureRatio must be consistent with the two tenure columns: For YearsAtCompany
        > 0, TenureRatio == YearsSinceLastPromotion / YearsAtCompany; for YearsAtCompany
        = 0, TenureRatio == 0. Example deequ constraint: Check.satisfies("CASE WHEN
        YearsAtCompany > 0 THEN abs(TenureRatio - (YearsSinceLastPromotion / YearsAtCompany))
        < 1e-6 ELSE TenureRatio = 0 END", "tenure_ratio_definition").'
