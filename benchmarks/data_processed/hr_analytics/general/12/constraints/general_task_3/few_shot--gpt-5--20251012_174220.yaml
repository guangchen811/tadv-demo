constraints:
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['Non-Travel', 'Travel_Rarely', 'Travel_Frequently',
        'TravelRarely'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isComplete('EmployeeCount')
      - Valid
    - - .isContainedIn('EmployeeCount', [1])
      - Invalid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18')
      - Valid
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isComplete('PercentSalaryHike')
      - Valid
    - - .isNonNegative('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isComplete('StandardHours')
      - Valid
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isPositive('YearsAtCompany')
      - Invalid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    - - .satisfies('YearsInCurrentRole <= YearsAtCompany', 'yicr_leq_yac')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
