constraints:
  '*':
    code:
    - - '.hasSize(lambda x: x > 0)'
      - Valid
    assumptions: []
  Age:
    code:
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .hasConstraint('AgeGroup consistent with Age', "CASE WHEN `Age` >= 55 THEN
        '55+' WHEN `Age` >= 46 THEN '46-55' WHEN `Age` >= 36 THEN '36-45' WHEN `Age`
        >= 26 THEN '26-35' ELSE '18-25' END = `AgeGroup`")
      - Invalid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isIn('Attrition', ['Yes', 'No'])
      - Invalid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Research & Development', 'Sales', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isContainedIn('EmployeeCount', [1])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .hasConstraint('SalarySlab consistent with MonthlyIncome', "CASE WHEN `MonthlyIncome`
        <= 5000 THEN 'Upto 5k' WHEN `MonthlyIncome` <= 10000 THEN '5k-10k' WHEN `MonthlyIncome`
        <= 15000 THEN '10k-15k' ELSE '15k+' END = `SalarySlab`")
      - Invalid
    assumptions: []
  StandardHours:
    code:
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .hasConstraint('TotalWorkingYears >= YearsAtCompany', '`TotalWorkingYears`
        >= `YearsAtCompany`')
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .hasConstraint('YearsAtCompany >= YearsInCurrentRole', '`YearsAtCompany` >=
        `YearsInCurrentRole`')
      - Invalid
    assumptions: []
