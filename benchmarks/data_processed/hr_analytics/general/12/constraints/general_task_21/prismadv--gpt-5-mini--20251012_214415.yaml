  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'The existing SalarySlab label for each row must be consistent with the
        MonthlyIncome value according to the binning implemented in compute_salary_slab.
        Concretely, using the bins = [0, 5000, 10000, 15000, inf] and labels = [''Upto
        5k'', ''5k-10k'', ''10k-15k'', ''15k+''], the row-level mapping must hold:


        - SalarySlab == ''Upto 5k''  =>  0 < MonthlyIncome <= 5000

        - SalarySlab == ''5k-10k''  =>  5000 < MonthlyIncome <= 10000

        - SalarySlab == ''10k-15k'' =>  10000 < MonthlyIncome <= 15000

        - SalarySlab == ''15k+''     =>  MonthlyIncome > 15000


        This can be enforced as a Deequ row-level predicate (satisfies) or as four
        predicates, e.g.:

        .satisfies("(SalarySlab = ''Upto 5k'' AND MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR ...", "salary_slab_matches_monthlyincome")'
      sources:
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 59
        end_line: 63
        file: ''
      uid: 3100ac3c-0b99-4675-ba68-29a76cf4b4b4
    - text: 'MonthlyIncome must be strictly positive whenever SalarySlab is one of
        the expected slab labels. The code computes salary_log = np.log(mi) (line
        computing np.log) and later uses the log and its z-score without protecting
        against zeros/negatives; therefore MonthlyIncome should be > 0 for rows that
        contribute to salary-derived features. This can be enforced as a multi-column
        constraint like:

        .satisfies("(SalarySlab IN (''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'') AND
        MonthlyIncome > 0) OR (SalarySlab IS NULL)", "monthlyincome_positive_for_salary_slab")

        (or simpler: require MonthlyIncome > 0 for all rows if SalarySlab is always
        present).'
      sources:
      - start_line: 59
        end_line: 61
        file: ''
      - start_line: 62
        end_line: 63
        file: ''
      uid: 8c9f83eb-d656-466d-bbe2-12ed2eae180b
    - text: 'SalarySlab should only contain the four labels produced by compute_salary_slab
        (''Upto 5k'', ''5k-10k'', ''10k-15k'', ''15k+''). Unexpected categories (typos,
        other strings) will cause slab_rates grouping/mapping to be incomplete and
        cause fillna(base_rate) to silently replace missing categories. Enforceable
        as a multi-column/domain constraint (useful together with MonthlyIncome consistency):

        .isContainedIn(''SalarySlab'', [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''])


        Optionally add a cross-check that the computed slab_from_income equals the
        recorded SalarySlab for all rows:

        .satisfies("SalarySlab = computed_slab_from(MonthlyIncome)", "salary_slab_equals_computed_from_monthlyincome")'
      sources:
