    - text: '''YearsAtCompany'' should not contain nulls after numeric coercion (i.e.,
        almost all rows must have a numeric YearsAtCompany). The code does not handle
        NaNs for the subtract/sqrt downstream operations, so missing values will propagate
        NaN into risk. Example validation: .satisfies("CASE WHEN `YearsAtCompany`
        IS NOT NULL THEN 1 ELSE 0 END", "Non-null YearsAtCompany", lambda x: x >=
