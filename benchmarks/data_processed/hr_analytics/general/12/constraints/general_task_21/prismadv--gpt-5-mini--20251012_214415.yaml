        end_line: 50
        file: ''
      - start_line: 65
        end_line: 68
        file: ''
      uid: 9c4a4680-f1ff-4050-9900-d80fac366879
    - text: 'Values in ''YearsAtCompany'' must be consistent relative to other tenure
        fields: specifically YearsAtCompany <= TotalWorkingYears (so exp_gap = TotalWorkingYears
