        file: ''
      - start_line: 63
        end_line: 72
        file: ''
      uid: 1294706f-2425-4bc9-9997-c6ed2262d3e2
    - text: 'AgeGroup values must exactly match the expected labels (case, punctuation,
        and no leading/trailing whitespace) because the mapping relies on exact string
        equality (e.g., ''55+'' includes a ''+'' and will not match variants like
        ''55 +'', ''55-plus'', or ''55+ ''). We could represent this as: Deequ satisfies("CASE
        WHEN TRIM(`AgeGroup`) REGEXP ''^(18-25|26-35|36-45|46-55|55\+)$'' THEN 1 ELSE
        0 END", "Canonical AgeGroup labels", lambda x: x == 1.0) or GE expect_column_values_to_match_regex
