        this as: Deequ hasCompleteness(''AgeGroup'', lambda x: x == 1.0) or Great
        Expectations expect_column_values_to_not_be_null.'
      sources:
      - start_line: 35
        end_line: 42
        file: ''
      - start_line: 63
        end_line: 72
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 2258fa53-d8a8-477a-874a-d0f8da196917
    - text: 'AgeGroup values must be restricted to the allowed set {''18-25'', ''26-35'',
        ''36-45'', ''46-55'', ''55+''}, because the code maps only these categories
        to age_weight; any other value would map to NaN and break the risk computation.
        We could represent this as: Deequ isContainedIn(''AgeGroup'', [''18-25'',''26-35'',''36-45'',''46-55'',''55+''],
        lambda x: x == 1.0) or GE expect_column_values_to_be_in_set with the same
        set and mostly/strictly 100% success.'
