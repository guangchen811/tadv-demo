  '["MonthlyIncome","PercentSalaryHike","PerformanceRating","SalarySlab"]':
    code: []
    assumptions:
    - text: 'PerformanceRating-to-bonus mapping is exhaustive and consistent: only
        ratings {3, 4} are present and rating_bonus equals 0.0 when PerformanceRating=3
        and 2.0 when PerformanceRating=4 (no nulls produced by the map). Deequ examples:
        .isContainedIn(''PerformanceRating'', [3, 4]) and .satisfies("(PerformanceRating
        = 3 AND rating_bonus = 0.0) OR (PerformanceRating = 4 AND rating_bonus = 2.0)",
        ''rating_bonus_matches_rating'')'
      sources:
      - start_line: 17
        end_line: 18
        file: ''
      uid: 78d523b8-da7d-4ec5-a1bb-a95a8ef2ea5e
    - text: 'recommended_percent is deterministically derived from PercentSalaryHike
        and PerformanceRating via rating_bonus: recommended_percent = PercentSalaryHike
        + rating_bonus (no nulls). Deequ example: .satisfies(''recommended_percent
        = PercentSalaryHike + rating_bonus'', ''recommended_percent_formula'')'
      sources:
      - start_line: 18
        end_line: 19
        file: ''
      uid: bbcf7bf3-1458-473d-af43-59188447d08c
    - text: 'SalarySlab-to-cap mapping is exhaustive and consistent: SalarySlab is
        in {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''} and cap_percent equals the
        mapped value {20.0,15.0,12.0,10.0} respectively. Deequ examples: .isContainedIn(''SalarySlab'',
        [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'']) and .satisfies("(SalarySlab
        = ''Upto 5k'' AND cap_percent = 20.0) OR (SalarySlab = ''5k-10k'' AND cap_percent
        = 15.0) OR (SalarySlab = ''10k-15k'' AND cap_percent = 12.0) OR (SalarySlab
        = ''15k+'' AND cap_percent = 10.0)", ''cap_matches_slab'')'
      sources:
      - start_line: 20
        end_line: 21
        file: ''
      uid: a745cbf2-a740-42b1-ad52-7fd7d1268b39
    - text: 'approved_percent is the minimum of recommended_percent and cap_percent
        for every record: approved_percent = least(recommended_percent, cap_percent).
        Equivalent implications: approved_percent <= cap_percent AND approved_percent
        <= recommended_percent, and equals whichever is smaller. Deequ example: .satisfies(''approved_percent
        = least(recommended_percent, cap_percent)'', ''approved_percent_is_min'')'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      uid: d45bfab1-cca7-486c-8f7c-0e4826d860ab
    - text: 'approved_amount is computed from MonthlyIncome and approved_percent:
        approved_amount = MonthlyIncome * (approved_percent / 100.0). Deequ example:
        .satisfies(''approved_amount = MonthlyIncome * (approved_percent / 100.0)'',
        ''approved_amount_formula'')'
      sources:
      - start_line: 23
        end_line: 23
        file: ''
      uid: 029d3581-6c77-4945-972d-04a20df2904b
    - text: 'MonthlyIncome is consistent with SalarySlab brackets used by the business
        labels: ''Upto 5k'' => MonthlyIncome <= 5000; ''5k-10k'' => 5000 < MonthlyIncome
        <= 10000; ''10k-15k'' => 10000 < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome
        > 15000. Deequ example: .satisfies("(SalarySlab = ''Upto 5k'' AND MonthlyIncome
        <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome > 15000)", ''monthly_income_matches_slab'')'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      uid: e2be354e-dc41-4677-adf3-552e27f6dabd
  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'SalarySlab must be consistent with MonthlyIncome via deterministic bins:
        ''Upto 5k'' => MonthlyIncome <= 5000; ''5k-10k'' => 5000 < MonthlyIncome <=
        10000; ''10k-15k'' => 10000 < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome
        > 15000. This enforces a functional dependency MonthlyIncome -> SalarySlab.
        Example Deequ compliance: (SalarySlab = ''Upto 5k'' AND MonthlyIncome <= 5000)
        OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome <=
        10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome > 15000).'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: b7a80bcc-83ca-434c-b2ea-4fad82e34487
    - text: 'cap_percent is fully determined by SalarySlab according to the fixed
        mapping: (''Upto 5k'' -> 20.0), (''5k-10k'' -> 15.0), (''10k-15k'' -> 12.0),
        (''15k+'' -> 10.0). The (SalarySlab, cap_percent) pair must match exactly
        one of these four combinations. Example Deequ compliance: (SalarySlab = ''Upto
        5k'' AND cap_percent = 20.0) OR (SalarySlab = ''5k-10k'' AND cap_percent =
        15.0) OR (SalarySlab = ''10k-15k'' AND cap_percent = 12.0) OR (SalarySlab
        = ''15k+'' AND cap_percent = 10.0).'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: 3145cddc-20ba-4989-b4d0-3e9560df59c9
    - text: 'approved_percent must equal the minimum of recommended_percent and cap_percent
        (i.e., approved_percent = min(recommended_percent, cap_percent)). Enforce
        with: approved_percent <= cap_percent AND approved_percent <= recommended_percent
        AND (approved_percent = cap_percent OR approved_percent = recommended_percent)
        with a small numeric tolerance for floating point.'
      sources:
      - start_line: 17
        end_line: 23
        file: ''
      uid: 389c8df6-72b1-4c8b-ab75-93b2c28dcdff
    - text: 'approved_amount must equal MonthlyIncome * (approved_percent / 100.0)
        and must not exceed the slab cap amount: approved_amount <= MonthlyIncome
        * (cap_percent / 100.0). Example Deequ compliance: abs(approved_amount - MonthlyIncome
        * approved_percent / 100.0) <= 1e-6 AND approved_amount <= MonthlyIncome *
        cap_percent / 100.0.'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: 758fdb09-d0ab-41ed-aa9e-ad18debc61b9
