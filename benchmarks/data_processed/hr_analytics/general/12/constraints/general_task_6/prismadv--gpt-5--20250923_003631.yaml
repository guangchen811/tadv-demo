    - text: 'Merit math across multiple columns must hold: (a) recommended_percent
        = PercentSalaryHike + rating_bonus(PerformanceRating); (b) cap_percent = cap_map(SalarySlab);
        (c) approved_percent = min(recommended_percent, cap_percent); (d) approved_amount
        = MonthlyIncome * (approved_percent / 100.0). Enforceable with row-level constraints
        such as .satisfies(''recommended_percent = PercentSalaryHike + rating_bonus'',
        ''recommended_formula''), .satisfies(''approved_percent <= cap_percent'',
        ''approved_under_cap''), and .satisfies(''approved_amount = MonthlyIncome
        * approved_percent / 100.0'', ''approved_amount_formula'').'
      sources:
      - start_line: 17
        end_line: 23
        file: ''
      uid: cdecce74-bae3-42d3-bd3b-1af941e289f7
    - text: 'AgeGroup must be in {''18-25'',''26-35'',''36-45'',''46-55'',''55+''}
        so that age_weight is non-null and usable in risk scoring. In effect: isContainedIn(''AgeGroup'',
        [...]) and completeness of the derived ''age_weight'' used in raw_score should
        be 1.0.'
      sources:
      - start_line: 35
        end_line: 42
        file: ''
      - start_line: 63
        end_line: 69
        file: ''
      uid: 758f252b-10ab-4764-828a-80b1aa82bcaf
    - text: 'RiskTier must be consistent with the binning of AttritionRiskScore: RiskTier=''Low''
        iff 0.0 <= AttritionRiskScore < 0.4; ''Medium'' iff 0.4 <= AttritionRiskScore
        < 0.6; ''High'' iff 0.6 <= AttritionRiskScore <= 1.0. This can be enforced
        via a CASE predicate in a satisfies constraint.'
      sources:
      - start_line: 74
        end_line: 78
        file: ''
      uid: 08488ed8-8f8c-4a7a-9d92-5833632e404f
    - text: 'Both OverTime and Attrition use the same binary domain {''Yes'',''No''}:
        OverTime is compared to ''Yes'' to create ot_flag, and Attrition contributes
        to yes_rate via (Attrition==''Yes''). Enforce that both columns are contained
        in {''Yes'',''No''}.'
      sources:
      - start_line: 49
        end_line: 49
        file: ''
      - start_line: 60
        end_line: 61
        file: ''
      uid: 74e4901c-fbef-48d8-ae3f-4acb94aee910
    - text: JobSatisfaction and WorkLifeBalance must both be in {1,2,3,4} to successfully
        map to penalty weights used in the risk score. Enforce with isContainedIn
        for each column and, if the derived columns are kept, check that job_penalty
        = map(JobSatisfaction) and wlb_penalty = map(WorkLifeBalance).
      sources:
      - start_line: 50
        end_line: 53
        file: ''
      - start_line: 63
        end_line: 67
        file: ''
      uid: 5c6595b8-6664-4472-89d6-16e68cd098b4
    - text: YearsWithCurrManager is treated as 0 when null and contributes a fixed
        penalty when < 1 year. If a derived column is materialized, enforce mgr_penalty
        = CASE WHEN YearsWithCurrManager IS NULL OR YearsWithCurrManager < 1.0 THEN
        0.2 ELSE 0.0 END, and ensure this penalty is the one used in raw_score.
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      - start_line: 63
