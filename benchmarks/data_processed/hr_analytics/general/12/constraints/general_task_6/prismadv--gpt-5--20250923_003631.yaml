  '["PercentSalaryHike","PerformanceRating","SalarySlab"]':
    code: []
    assumptions:
    - text: 'PerformanceRating is restricted to the supported mapping domain and deterministically
        drives rating_bonus: only ratings {3, 4} are expected; rating_bonus must equal
        0.0 when PerformanceRating=3 and 2.0 when PerformanceRating=4. Deequ examples:
        .isContainedIn(''PerformanceRating'', Array(3,4)) and .satisfies("(PerformanceRating
        = 3 AND rating_bonus = 0.0) OR (PerformanceRating = 4 AND rating_bonus = 2.0)",
        "rating_bonus_mapping")'
      sources:
      - start_line: 17
        end_line: 19
        file: ''
      uid: 9ba338a6-0243-4439-8a55-7725ba2c70ae
    - text: 'recommended_percent must equal the sum of PercentSalaryHike and rating_bonus
        for every row (i.e., no missing or malformed values in either input column).
        Deequ example: .satisfies("recommended_percent = PercentSalaryHike + rating_bonus",
        "recommended_is_sum")'
      sources:
      - start_line: 17
        end_line: 19
        file: ''
      uid: 42403b74-898e-4b27-99b7-a58d1b450dda
    - text: 'SalarySlab values are limited to {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}
        and deterministically map to cap_percent {20.0,15.0,12.0,10.0} respectively.
        Deequ examples: .isContainedIn(''SalarySlab'', Array("Upto 5k","5k-10k","10k-15k","15k+"))
        and .satisfies("(SalarySlab=''Upto 5k'' AND cap_percent=20.0) OR (SalarySlab=''5k-10k''
        AND cap_percent=15.0) OR (SalarySlab=''10k-15k'' AND cap_percent=12.0) OR
        (SalarySlab=''15k+'' AND cap_percent=10.0)", "slab_to_cap_mapping")'
      sources:
      - start_line: 20
        end_line: 22
        file: ''
      uid: 7882d36c-5bb6-4718-be38-fd59c2006681
    - text: 'approved_percent is the capped merit percent: it must equal min(PercentSalaryHike
        + rating_bonus, cap_percent). Equivalent conditional form: if recommended_percent
        <= cap_percent then approved_percent = recommended_percent else approved_percent
        = cap_percent. Deequ example: .satisfies("approved_percent = CASE WHEN PercentSalaryHike
        + rating_bonus <= cap_percent THEN PercentSalaryHike + rating_bonus ELSE cap_percent
        END", "approved_is_min")'
      sources:
      - start_line: 19
        end_line: 22
        file: ''
      uid: 41e4ada7-e7e8-47ee-a290-76fafaf7d885
    - text: 'approved_amount must equal MonthlyIncome * (approved_percent / 100.0)
        and be non-negative (implying MonthlyIncome >= 0 and approved_percent >= 0).
        Deequ example: .satisfies("approved_amount = MonthlyIncome * (approved_percent
        / 100.0) AND approved_amount >= 0", "approved_amount_calc")'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      uid: 8aad7ba6-2b8c-47b6-aedd-07b39a52e749
    - text: 'SalarySlab should be consistent with MonthlyIncome brackets used by the
        business semantics: ''Upto 5k'' => MonthlyIncome <= 5000; ''5k-10k'' => 5000
        < MonthlyIncome <= 10000; ''10k-15k'' => 10000 < MonthlyIncome <= 15000; ''15k+''
        => MonthlyIncome > 15000. Deequ example: .satisfies("(SalarySlab=''Upto 5k''
        AND MonthlyIncome <= 5000) OR (SalarySlab=''5k-10k'' AND MonthlyIncome > 5000
        AND MonthlyIncome <= 10000) OR (SalarySlab=''10k-15k'' AND MonthlyIncome >
        10000 AND MonthlyIncome <= 15000) OR (SalarySlab=''15k+'' AND MonthlyIncome
        > 15000)", "slab_matches_income")'
      sources:
      - start_line: 20
        end_line: 21
        file: ''
      - start_line: 23
        end_line: 23
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: 6795f033-c0a1-4806-88de-ab80b4fa0308
    - text: 'Completeness across merit inputs: PercentSalaryHike, PerformanceRating,
        and SalarySlab must all be non-null for every row used in merit calculations
        (no fillna or defaulting is applied). Deequ examples: .hasCompleteness(''PercentSalaryHike'',
        1.0), .hasCompleteness(''PerformanceRating'', 1.0), .hasCompleteness(''SalarySlab'',
        1.0) or a composite .satisfies("PercentSalaryHike IS NOT NULL AND PerformanceRating
        IS NOT NULL AND SalarySlab IS NOT NULL", "merit_inputs_complete")'
      sources:
      - start_line: 18
        end_line: 22
        file: ''
      uid: 9a46d4b3-2e96-45aa-a40e-d454a43e099a
