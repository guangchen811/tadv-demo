fixing_results:
  ? '["AgeGroup","DistanceFromHome","JobSatisfaction","OverTime","WorkLifeBalance","YearsAtCompany","YearsSinceLastPromotion","YearsWithCurrManager"]'
  : d9e07be5-1a6c-4cf6-9832-1a83212ce8f1: '.satisfies("(YearsWithCurrManager IS NULL)
      OR (YearsWithCurrManager <= YearsAtCompany)", "YearsWithCurrManager_le_YearsAtCompany",
      lambda x: x == 1.0)'
  WorkLifeBalance:
    6fa3d392-5457-4127-84a0-a3ae0e4ad14c: .isContainedIn("WorkLifeBalance", ["1",
      "2", "3", "4"])
  '["Department","JobRole"]':
    71896a18-31a5-47d5-b616-64aeb7ee95a2: '.satisfies("(Department = ''Sales'' AND
      JobRole IN (''Sales Executive'', ''Sales Representative'')) OR (Department =
      ''Research & Development'' AND JobRole IN (''Research Scientist'', ''Laboratory
      Technician'', ''Manufacturing Director'', ''Research Director'', ''Healthcare
      Representative'')) OR (Department = ''Human Resources'' AND JobRole = ''Human
      Resources'') OR (JobRole = ''Manager'')", "JobRole and Department Consistency",
      lambda x: x == 1)'
  JobSatisfaction:
    0de813ef-93c7-4696-9cd7-f0edd376be06: .isContainedIn("JobSatisfaction", ["1",
      "2", "3", "4"])
  '["MonthlyIncome","SalarySlab"]':
    bc294735-d52c-4cbb-bee1-91b7b35ba4e4: '.satisfies("CASE WHEN MonthlyIncome <=
      5000 THEN SalarySlab = ''Upto 5k'' WHEN MonthlyIncome > 5000 AND MonthlyIncome
      <= 10000 THEN SalarySlab = ''5k-10k'' WHEN MonthlyIncome > 10000 AND MonthlyIncome
      <= 15000 THEN SalarySlab = ''10k-15k'' WHEN MonthlyIncome > 15000 THEN SalarySlab
      = ''15k+'' ELSE false END", "SalarySlab_MonthlyIncome_Consistency", lambda x:
      x == 1.0)'
