constraints:
  Age:
    code:
    - - '.hasMin(''Age'', lambda x: x >= 18)'
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .satisfies("CASE WHEN JobRole = 'Sales Executive' THEN Department = 'Sales'
        WHEN JobRole = 'Sales Representative' THEN Department = 'Sales' WHEN JobRole
        = 'Healthcare Representative' THEN Department = 'Sales' WHEN JobRole = 'Research
        Scientist' THEN Department = 'Research & Development' WHEN JobRole = 'Laboratory
        Technician' THEN Department = 'Research & Development' WHEN JobRole = 'Research
        Director' THEN Department = 'Research & Development' WHEN JobRole = 'Manufacturing
        Director' THEN Department = 'Research & Development' WHEN JobRole = 'Human
        Resources' THEN Department = 'Human Resources' ELSE TRUE END", 'RoleDepartmentConsistency')
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - .isComplete('YearsWithCurrManager')
      - Invalid
    assumptions: []
