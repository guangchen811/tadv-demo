constraints:
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isContainedIn('BusinessTravel', ['Travel_Rarely', 'TravelRarely', 'Travel_Frequently',
        'Non-Travel'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Research & Development', 'Sales', 'Human Resources'])
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - '.hasMean(''EmployeeCount'', lambda x: x == 1)'
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    - - .isUnique('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isContainedIn('JobLevel', ['1', '2', '3', '4', '5'])
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isNonNegative('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', ['3', '4'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - '.hasStandardDeviation(''StandardHours'', lambda x: x == 0)'
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  dataset:
    code:
    - - '.hasSize(lambda x: x > 0)'
      - Valid
    assumptions: []
