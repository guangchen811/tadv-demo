constraints:
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25','26-35','36-45','46-55','55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - '.satisfies(''upper(Attrition) IN (\''YES\'', \''NO\'')'', ''Attrition_allowed_values'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales','Research & Development','Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isComplete('EmployeeCount')
      - Valid
    - - .isContainedInRange('EmployeeCount', 1, 1)
      - Invalid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedInRange('JobLevel', 1, 5)
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyIncome_vs_SalarySlab:
    code:
    - - '.satisfies(''(SalarySlab = \''Upto 5k\'' AND MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) OR (SalarySlab = \''5k-10k\'' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab = \''10k-15k\'' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab = \''15k+\'' AND MonthlyIncome > 15000)'', ''MonthlyIncome_matches_SalarySlab'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18')
      - Valid
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedInRange('PerformanceRating', 3, 4)
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k','5k-10k','10k-15k','15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isComplete('StandardHours')
      - Valid
    - - .isContainedInRange('StandardHours', 80, 80)
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsInCurrentRole_vs_YearsAtCompany:
    code:
    - - '.satisfies(''YearsInCurrentRole <= YearsAtCompany'', ''InRole_lte_AtCompany'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsSinceLastPromotion_vs_YearsAtCompany:
    code:
    - - '.satisfies(''YearsSinceLastPromotion <= YearsAtCompany'', ''SincePromo_lte_AtCompany'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
