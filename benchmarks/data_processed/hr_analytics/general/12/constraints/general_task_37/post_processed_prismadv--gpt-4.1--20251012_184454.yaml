  '["YearsAtCompany","YearsInCurrentRole"]':
    code:
    - suggestion: .isGreaterThanOrEqualTo('YearsAtCompany', 'YearsInCurrentRole')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 1d0d0186-9a15-4228-b6f0-6850bd96b64e
      source_assumptions:
      - 6d23e506-10ea-4806-98e7-e854ba351876
    - suggestion: .satisfies('YearsAtCompany >= 0', 'YearsAtCompany non-negative')
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: df98b5bd-055d-45eb-9189-fabf2b801367
      source_assumptions:
      - f05cd554-bcba-4e34-980d-3e741cc5fa54
    - suggestion: '.haveCompleteness([''YearsAtCompany'', ''YearsInCurrentRole''],
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 5896ab89-ae55-4dfe-bb9b-27aff41dc8df
      source_assumptions:
      - f47eea8b-cb61-474c-aaf7-53aee1060df1
    assumptions:
    - text: 'The ''YearsAtCompany'' column must always be greater than or equal to
        the ''YearsInCurrentRole'' column for every record. This ensures that an employee''s
        years in their current role does not exceed their total years at the company.
        This can be represented in Deequ as: .where(''YearsAtCompany >= YearsInCurrentRole'')'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      uid: 6d23e506-10ea-4806-98e7-e854ba351876
    - text: 'The ''YearsAtCompany'' column must be strictly positive (greater than
        zero) for all records, since it is used as a denominator in a division with
        ''YearsInCurrentRole''. Division by zero is explicitly handled by replacing
        inf/nan with 0.0, but zero values for ''YearsAtCompany'' may indicate data
        quality issues and should be monitored. This can be represented in Deequ as:
        .where(''YearsAtCompany > 0'')'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      uid: f05cd554-bcba-4e34-980d-3e741cc5fa54
    - text: 'All records in the output datasets ''comp_out'', ''promo_out'', and ''downstream_feed''
        must have non-null values for both ''YearsAtCompany'' and ''YearsInCurrentRole'',
        as these columns are used in eligibility and compensation calculations and
        included in the outputs. This can be represented in Deequ as: .hasCompleteness(''YearsAtCompany'',
        1.0) and .hasCompleteness(''YearsInCurrentRole'', 1.0)'
      sources:
      - start_line: 15
        end_line: 116
        file: ''
      uid: f47eea8b-cb61-474c-aaf7-53aee1060df1
    - text: 'For promotion eligibility, the ''YearsInCurrentRole'' column must be
        greater than or equal to the role-specific required years for the employee''s
        career stage. This implies that the mapping from ''CareerStage'' to ''required_years''
        is valid and that ''YearsInCurrentRole'' >= required_years for a record to
        be eligible. This can be represented in Deequ as: .where(''YearsInCurrentRole
        >= required_years_by_stage[CareerStage]'')'
      sources:
      - start_line: 90
        end_line: 90
        file: ''
      uid: 5c10575f-0c92-49e4-a093-08f82c264468
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code:
    - suggestion: .isLessThanOrEqualTo('YearsSinceLastPromotion', 'YearsAtCompany')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: e1df9eb2-d230-409d-ae64-f0a7a13a3551
      source_assumptions:
      - be2e2dba-ccd2-4a7a-9d1c-7b145eb6231d
    - suggestion: '.haveCompleteness([''YearsSinceLastPromotion'', ''YearsAtCompany''],
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 69994979-79e2-4332-83e2-7c9676d3cf42
      source_assumptions:
      - b4bc55ce-7d16-47fb-9e11-51a41602e02c
    - suggestion: .satisfies('CASE WHEN `YearsAtCompany` = 0 THEN `YearsSinceLastPromotion`
        = 0 ELSE TRUE END', 'YearsSinceLastPromotion Zero If Company Zero')
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 792992b0-a05a-414b-89c3-4b42053942a1
      source_assumptions:
      - 02610572-91a8-4b9f-acc1-034a2fef64b7
    assumptions:
    - text: 'For every record, the value in ''YearsSinceLastPromotion'' must be less
        than or equal to the value in ''YearsAtCompany''; i.e., an employee cannot
        have been promoted longer ago than they have been at the company. This can
        be represented as a multi-column constraint: .where(''YearsSinceLastPromotion
        <= YearsAtCompany'')'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 91
        end_line: 91
        file: ''
      - start_line: 104
        end_line: 104
        file: ''
      uid: be2e2dba-ccd2-4a7a-9d1c-7b145eb6231d
    - text: 'Both ''YearsSinceLastPromotion'' and ''YearsAtCompany'' must be non-null
        and integral for all records, as they are used together in arithmetic operations
        (subtraction, eligibility checks). This can be represented as a completeness
        and data type constraint on both columns: .hasCompleteness(''YearsSinceLastPromotion'',
        1.0) AND .hasCompleteness(''YearsAtCompany'', 1.0) AND .hasDataType(''YearsSinceLastPromotion'',
        ''Integral'') AND .hasDataType(''YearsAtCompany'', ''Integral'')'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 91
        end_line: 91
        file: ''
      uid: b4bc55ce-7d16-47fb-9e11-51a41602e02c
    - text: 'For any record where ''YearsAtCompany'' is zero, ''YearsSinceLastPromotion''
        must also be zero, since an employee who just joined cannot have had a promotion
        at the company. This can be represented as a conditional multi-column constraint:
        .forall(rows => (rows[''YearsAtCompany''] == 0) => (rows[''YearsSinceLastPromotion'']
        == 0))'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      uid: 02610572-91a8-4b9f-acc1-034a2fef64b7
