        > 0)", "YearsAtCompany_0_implies_YearsWithCurrManager_0")'
      sources:
      - start_line: 56
        end_line: 56
        file: ''
      uid: a53e8595-1504-431a-bc86-18858bc53f71
    - text: 'The total working years (''TotalWorkingYears'') for an employee should
        be greater than or equal to their years at the current company (''YearsAtCompany'').
        This is a logical consistency check, as years at the current company are a
        subset of total working years.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("TotalWorkingYears >= YearsAtCompany", "TotalWorkingYears_ge_YearsAtCompany")'
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      uid: b6c24376-c935-43cb-90e8-b527883426f7
    - text: 'The number of years since an employee''s last promotion (''YearsSinceLastPromotion'')
        should be less than or equal to their total years at the company (''YearsAtCompany'').
        This ensures that a promotion event did not occur before the employee joined
        the company or after they left.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("YearsSinceLastPromotion <= YearsAtCompany", "YearsSinceLastPromotion_le_YearsAtCompany")'
      sources:
      - start_line: 84
        end_line: 87
        file: ''
      uid: e334d53d-9e38-4e1a-b7ae-42ed2c29ed62
    - text: 'If an employee has been at the company for 0 years (''YearsAtCompany''),
        then their ''YearsSinceLastPromotion'' must also be 0. This ensures logical
        consistency, as a promotion cannot have occurred if the employee has no tenure
        at the company.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("NOT (YearsAtCompany = 0 AND YearsSinceLastPromotion > 0)", "YearsAtCompany_0_implies_YearsSinceLastPromotion_0")'
