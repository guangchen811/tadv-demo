raw_constraints:
- column_name: EmpID
  code_for_constraint: .isComplete('EmpID')
- column_name: EmpID
  code_for_constraint: .isUnique('EmpID')
- column_name: EmployeeNumber
  code_for_constraint: .isComplete('EmployeeNumber')
- column_name: EmployeeNumber
  code_for_constraint: .isUnique('EmployeeNumber')
- column_name: Department
  code_for_constraint: .isComplete('Department')
- column_name: Department
  code_for_constraint: .isContainedIn('Department', ['Sales', 'Research & Development',
    'Human Resources'])
- column_name: SalarySlab
  code_for_constraint: .isComplete('SalarySlab')
- column_name: SalarySlab
  code_for_constraint: .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k',
    '15k+'])
- column_name: MonthlyIncome
  code_for_constraint: .isComplete('MonthlyIncome')
- column_name: MonthlyIncome
  code_for_constraint: '.hasMin(''MonthlyIncome'', lambda x: x > 0)'
- column_name: MonthlyIncome_by_SalarySlab
  code_for_constraint: '.satisfies("((SalarySlab = ''Upto 5k'' AND MonthlyIncome >
    0 AND MonthlyIncome <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000
    AND MonthlyIncome <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome > 10000
    AND MonthlyIncome <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome > 15000))",
    ''income_by_slab'', lambda v: v == 1.0)'
- column_name: AgeGroup
  code_for_constraint: .isComplete('AgeGroup')
- column_name: AgeGroup
  code_for_constraint: .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55',
    '55+'])
- column_name: Age_AgeGroup_consistency
  code_for_constraint: '.satisfies("((Age >= 18 AND Age <= 25 AND AgeGroup = ''18-25'')
    OR (Age >= 26 AND Age <= 35 AND AgeGroup = ''26-35'') OR (Age >= 36 AND Age <=
    45 AND AgeGroup = ''36-45'') OR (Age >= 46 AND Age <= 55 AND AgeGroup = ''46-55'')
    OR (Age >= 56 AND AgeGroup = ''55+''))", ''age_group_consistency'', lambda v:
    v == 1.0)'
- column_name: Attrition
  code_for_constraint: .isComplete('Attrition')
- column_name: Attrition
  code_for_constraint: .isContainedIn('Attrition', ['Yes', 'No'])
- column_name: OverTime
  code_for_constraint: .isComplete('OverTime')
- column_name: OverTime
  code_for_constraint: .isContainedIn('OverTime', ['Yes', 'No'])
- column_name: Gender
  code_for_constraint: .isComplete('Gender')
- column_name: Gender
  code_for_constraint: .isContainedIn('Gender', ['Male', 'Female'])
- column_name: JobSatisfaction
  code_for_constraint: '.hasMin(''JobSatisfaction'', lambda x: x >= 1)'
- column_name: JobSatisfaction
  code_for_constraint: '.hasMax(''JobSatisfaction'', lambda x: x <= 4)'
- column_name: EnvironmentSatisfaction
  code_for_constraint: '.hasMin(''EnvironmentSatisfaction'', lambda x: x >= 1)'
- column_name: EnvironmentSatisfaction
  code_for_constraint: '.hasMax(''EnvironmentSatisfaction'', lambda x: x <= 4)'
- column_name: WorkLifeBalance
  code_for_constraint: '.hasMin(''WorkLifeBalance'', lambda x: x >= 1)'
- column_name: WorkLifeBalance
  code_for_constraint: '.hasMax(''WorkLifeBalance'', lambda x: x <= 4)'
- column_name: Age
  code_for_constraint: .isNonNegative('Age')
- column_name: DistanceFromHome
  code_for_constraint: .isNonNegative('DistanceFromHome')
- column_name: TotalWorkingYears
  code_for_constraint: .isNonNegative('TotalWorkingYears')
- column_name: YearsAtCompany
  code_for_constraint: .isNonNegative('YearsAtCompany')
- column_name: YearsSinceLastPromotion
  code_for_constraint: .isNonNegative('YearsSinceLastPromotion')
- column_name: YearsWithCurrManager
  code_for_constraint: .isNonNegative('YearsWithCurrManager')
- column_name: PercentSalaryHike
  code_for_constraint: .isNonNegative('PercentSalaryHike')
- column_name: StandardHours
  code_for_constraint: '.hasMin(''StandardHours'', lambda x: x == 80)'
- column_name: StandardHours
  code_for_constraint: '.hasMax(''StandardHours'', lambda x: x == 80)'
- column_name: Over18
  code_for_constraint: .isComplete('Over18')
- column_name: Over18
  code_for_constraint: .isContainedIn('Over18', ['Y'])
- column_name: EmployeeCount
  code_for_constraint: '.hasMin(''EmployeeCount'', lambda x: x == 1)'
- column_name: EmployeeCount
  code_for_constraint: '.hasMax(''EmployeeCount'', lambda x: x == 1)'
