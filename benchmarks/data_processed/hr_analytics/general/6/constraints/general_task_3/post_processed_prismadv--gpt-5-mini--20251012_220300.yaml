        should satisfy one of: (SalarySlab = ''Upto 5k'' AND slab_base_rate = 0.060)
        OR (SalarySlab = ''5k-10k'' AND slab_base_rate = 0.050) OR (SalarySlab = ''10k-15k''
        AND slab_base_rate = 0.040) OR (SalarySlab = ''15k+'' AND slab_base_rate =
        0.030). This can be enforced as a row-level predicate/satisfies constraint.'
      sources:
