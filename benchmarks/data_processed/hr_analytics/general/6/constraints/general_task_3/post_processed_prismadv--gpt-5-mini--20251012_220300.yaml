    - text: 'BusinessTravel, AgeGroup and SalarySlab must all map to their respective
        adjustment values for every row used in merit computation. Concretely: after
        the replacement of ''TravelRarely'' -> ''Travel_Rarely'', BusinessTravel values
        must be in {''Non-Travel'',''Travel_Rarely'',''Travel_Frequently''}; AgeGroup
        values must be in the age_cohort_adj_map keys {''18-25'',''26-35'',''36-45'',''46-55'',''55+''};
        and SalarySlab must be in its mapped keys. If any of these mappings produce
        null, MeritIncreasePct will be partially undefined. Actionable checks: for
        every row assert that slab_base_rate, travel_adj and age_adj are non-null
        (e.g. Deequ: isComplete([''slab_base_rate'',''travel_adj'',''age_adj'']) and
