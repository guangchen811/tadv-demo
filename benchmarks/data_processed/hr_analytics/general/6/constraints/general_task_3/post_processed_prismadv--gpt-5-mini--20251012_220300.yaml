    c1b9520b-482e-4c72-8478-472367d9122a: '.satisfies("PerformanceRating = 4 AND PercentSalaryHike
      IS NOT NULL", "PercentSalaryHike present for PR=4", lambda x: x > 0)'
  JobLevel:
    9b3fb8c0-b3a0-4f26-bafa-7782772a6257: '.satisfies("CASE WHEN `JobLevel` IN (1,2,3,4,5)
