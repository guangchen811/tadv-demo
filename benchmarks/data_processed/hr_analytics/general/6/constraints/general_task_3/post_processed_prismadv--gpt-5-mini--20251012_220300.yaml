    - text: "All columns used in the promotion eligibility predicate \u2014 PerformanceRating,\
        \ JobLevel, YearsInCurrentRole, YearsSinceLastPromotion, TotalWorkingYears\
        \ \u2014 must be present, non-null and numeric. Additionally, the numeric\
        \ ranges implied by the predicate should hold (JobLevel is comparable to 5,\
        \ YearsInCurrentRole >= 0, YearsSinceLastPromotion >= 0, TotalWorkingYears\
        \ >= 0) so the boolean eligible mask is meaningful. (Deequ-style: isComplete\
        \ & isNumeric on these columns; optionally assert sensible lower bounds)."
