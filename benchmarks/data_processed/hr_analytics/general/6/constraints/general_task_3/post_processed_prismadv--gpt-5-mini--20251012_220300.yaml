    - text: 'PromotionEligible is computed as a conjunction across multiple columns:
        PerformanceRating, JobLevel, YearsInCurrentRole, YearsSinceLastPromotion,
        and TotalWorkingYears. Assumption: these columns are present, numeric and
        have sensible ranges so the boolean expression is well-defined (e.g., JobLevel
        numeric, Years* numeric and non-negative). Actionable checks: complete and
        numeric types for these columns and e.g. no nulls in JobLevel/Years* for rows
        expected to be considered for promotion (Deequ: isComplete([...]) and isNonNegative
        for tenure columns).'
