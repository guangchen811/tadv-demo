  '["JobLevel","PerformanceRating","TotalWorkingYears","YearsInCurrentRole","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'For every record, ''YearsInCurrentRole'' must be less than or equal to
        ''YearsAtCompany'' (tenure consistency). This is required because the code
        computes a ratio yicr / yac and clips it to 1.0; if ''YearsInCurrentRole''
        > ''YearsAtCompany'' the ratio would be >1 and the logical relationship is
        violated. Example Deequ-style constraint: .satisfies(''YearsInCurrentRole
        <= YearsAtCompany'', ''yicr_le_yac'')'
      sources:
      - start_line: 53
        end_line: 56
        file: ''
      uid: 9899b4c5-b01e-49a5-a827-60f22e3876d2
    - text: 'The number of years since last promotion must not exceed total working
        years: ''YearsSinceLastPromotion'' <= ''TotalWorkingYears'' for every record.
        This logical consistency is needed for promotion-eligibility checks that compare
        these tenures. Example Deequ-style constraint: .satisfies(''YearsSinceLastPromotion
        <= TotalWorkingYears'', ''years_since_promo_le_total_working'')'
      sources:
      - start_line: 71
        end_line: 78
        file: ''
      uid: a9fecc55-0d13-4160-92ed-3f54a781222b
    - text: '''PromotionEligible'' must be exactly the boolean result of the combined
        conditions: (PerformanceRating == 4) AND (JobLevel < 5) AND (YearsInCurrentRole
        >= 1) AND (YearsSinceLastPromotion >= 1) AND (TotalWorkingYears >= 2). In
        other words, for all rows the derived flag should equal this predicate. Example
        Deequ-style constraint: .satisfies(''((PerformanceRating = 4 AND JobLevel
        < 5 AND YearsInCurrentRole >= 1 AND YearsSinceLastPromotion >= 1 AND TotalWorkingYears
        >= 2) = PromotionEligible)'', ''promotion_flag_consistent'')'
      sources:
      - start_line: 71
        end_line: 79
        file: ''
      uid: a9f0fb5d-9d0f-4072-860b-4249dc950eaa
    - text: '''MeritIncreaseAmt'' should be consistent with ''MonthlyIncome'' and
        ''MeritIncreasePct'': MeritIncreaseAmt == round(MonthlyIncome * MeritIncreasePct,
        2) (allow small numeric tolerance, e.g. 0.01). This ensures the per-employee
        monetary merit pool is computed correctly before aggregation. Example Deequ-style
        constraint: .satisfies(''abs(MeritIncreaseAmt - (MonthlyIncome * MeritIncreasePct))
        <= 0.01'', ''merit_amt_matches_pct'')'
      sources:
      - start_line: 58
        end_line: 69
        file: ''
      uid: a6784179-109d-47a1-a7a9-d61f46272720
    - text: 'Rows must have a ''SalarySlab'' that maps to a defined ''slab_base_rate''
        and consequently produce a finite ''MeritIncreasePct'' within the clipped
        range [0.0, 0.20]. Concretely: ''SalarySlab'' should be one of {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}
        so slab_base_rate is not null, and for all rows MeritIncreasePct >= 0.0 and
        <= 0.20. Example Deequ-style constraints: .satisfies(''SalarySlab in ("Upto
        5k","5k-10k","10k-15k","15k+")'', ''valid_salary_slab'') and .satisfies(''MeritIncreasePct
        >= 0.0 AND MeritIncreasePct <= 0.20'', ''merit_pct_in_range'')'
      sources:
      - start_line: 23
        end_line: 29
        file: ''
      - start_line: 58
        end_line: 67
        file: ''
      uid: 8be0602c-8f2c-47f1-bf59-a429a7a28fed
    - text: 'The code expects meaningful rating gap information between PerformanceRating
        4 and 3. Preferably both ratings 3 and 4 should exist and the mean PercentSalaryHike
        for rating 4 should be >= mean for rating 3 (so rating_gap_pct is non-negative).
        If either rating is absent the code falls back to a default gap. Example checks:
        ensure count(PerformanceRating = 3) > 0 and count(PerformanceRating = 4) >
        0, and .satisfies(''avg(PercentSalaryHike WHERE PerformanceRating = 4) >=
        avg(PercentSalaryHike WHERE PerformanceRating = 3)'', ''rating_gap_nonnegative'')'
      sources:
      - start_line: 19
        end_line: 21
        file: ''
