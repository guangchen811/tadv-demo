        end_line: 56
        file: ''
      - start_line: 58
        end_line: 64
        file: ''
      uid: 0919739f-874b-4287-ac5f-6ac2d1902707
    - text: 'MeritIncreaseAmt must equal MonthlyIncome multiplied by MeritIncreasePct,
        rounded to 2 decimal places for every row. Actionable check (row-level): round(MonthlyIncome
        * MeritIncreasePct, 2) == MeritIncreaseAmt.'
