    - text: 'Computation and use of the rating-based component assume PerformanceRating
        and PercentSalaryHike are present and that ratings 3 and 4 exist (so rating_gap_pct
        is meaningfully computed). If either rating 3 or 4 is missing the code uses
        a fallback default (1.5). Actionable checks: ensure PercentSalaryHike is numeric
        and non-null, PerformanceRating is complete and that values 3 and 4 are present
        (or explicitly accept the fallback). In Deequ: isComplete([''PerformanceRating'',''PercentSalaryHike''])
