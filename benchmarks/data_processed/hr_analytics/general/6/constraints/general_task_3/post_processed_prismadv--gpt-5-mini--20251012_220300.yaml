fixing_results:
  '["AgeGroup","BusinessTravel","PerformanceRating","SalarySlab"]':
    baa65820-e2c8-4802-9656-5d686445cbdc: '.haveCompleteness(columns=[''SalarySlab'',''BusinessTravel'',''AgeGroup''],
      assertion=lambda x: x == 1)'
    17b10e63-ac9b-45db-b6f3-b636a441f037: '.satisfies("CASE WHEN `BusinessTravel`
      IN (''Non-Travel'',''Travel_Rarely'',''TravelRarely'',''Travel_Frequently'')
      AND `AgeGroup` IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'') THEN 1 ELSE
      0 END", "BusinessTravel and AgeGroup mapped values", lambda x: x == 1)'
    15cbb3dd-e143-4a48-92a1-1c0690a8ea7d: '.haveCompleteness(columns=[''MonthlyIncome'',''EmpID'',''Department''],
      assertion=lambda x: x == 1)'
  '["AgeGroup","age_adj"]':
    13bc62e1-f203-4436-ad16-1bbb90212f20: '.satisfies("PerformanceRating = 3 AND PercentSalaryHike
      IS NOT NULL AND PercentSalaryHike RLIKE ''^[0-9]+(\\.[0-9]+)?$''", "PerfRating_3_has_numeric_PercentSalaryHike",
      lambda x: x > 0)'
    1244fd42-a89c-4726-aea9-c884e4a0c233: '.satisfies("PerformanceRating = 4 AND PercentSalaryHike
      IS NOT NULL AND PercentSalaryHike RLIKE ''^[0-9]+(\\.[0-9]+)?$''", "PerfRating_4_has_numeric_PercentSalaryHike",
      lambda x: x > 0.0)'
    6a4baca0-e652-4a7a-aab9-5f109e4aa12f: '.haveCompleteness(columns=[''SalarySlab''],
      assertion=lambda x: x == 1)'
    506d3902-14c7-4fbd-9ba2-23b06ecfc159: '.satisfies("CASE WHEN BusinessTravel IN
      (''Non-Travel'',''Travel_Rarely'',''Travel_Frequently'') THEN 1 ELSE 0 END",
      "BusinessTravel_values_allowed", lambda x: x >= 0.995)'
    bf3d233b-be79-45aa-8b78-d531ecf0c4eb: '.haveCompleteness(columns=[''AgeGroup''],
      assertion=lambda x: x == 1)'
    df1ab428-eed6-4696-807f-c90e892660f3: '.satisfies("CASE WHEN MonthlyIncome IS
      NOT NULL AND MonthlyIncome >= 0 THEN 1 ELSE 0 END", "MonthlyIncome_non_negative",
      lambda x: x == 1)'
  YearsInCurrentRole:
    4aefefc8-a07b-45ff-92ac-eae7ea1c51e5: '.satisfies("CASE WHEN `YearsInCurrentRole`
      >= 1 THEN 1 ELSE 0 END", "Exists_YICR_ge_1", lambda x: x > 0.0)'
