    assumptions:
    - text: 'To compute the rating-based gap, the dataset must contain PerformanceRating
        values 3 and 4 and PercentSalaryHike must be numeric and non-null for those
        ratings. Otherwise rating_means[4] and rating_means[3] cannot be computed
        as intended. (Deequ-style constraint: assert that both ratings 3 and 4 exist;
        also PercentSalaryHike isComplete and isNumeric for rows with PerformanceRating
        in [3,4].)'
