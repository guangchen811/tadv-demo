        end_line: 21
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
      uid: 941b9f30-c6d7-437e-8493-9a57e9e682f3
    - text: 'All SalarySlab values used in merit calculation must be mappable to slab_base_rate_map
        (i.e., SalarySlab should be a subset of {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''})
        so slab_base_rate is not null when used to compute MeritIncreasePct. (Deequ-style:
        assert that SalarySlab values are contained in the allowed set and that slab_base_rate
        isComplete).'
      sources:
      - start_line: 23
        end_line: 29
        file: ''
      - start_line: 58
        end_line: 64
        file: ''
      uid: 9f8aa3d7-18d2-4121-9533-923c557a5d53
    - text: "BusinessTravel values (after the replacement of 'TravelRarely' -> 'Travel_Rarely')\
        \ must be within the travel_adj_map keys {'Non-Travel','Travel_Rarely','Travel_Frequently'}\
        \ so travel_adj is defined (non-null) for all rows used in MeritIncreasePct.\
        \ (Deequ-style: values in BusinessTravel \u2286 allowed set; travel_adj isComplete)."
      sources:
      - start_line: 17
        end_line: 17
        file: ''
      - start_line: 32
        end_line: 37
        file: ''
      - start_line: 58
        end_line: 64
        file: ''
      uid: 66882ee1-9a43-4495-b411-a54c69eaa6c9
    - text: 'AgeGroup must be one of the expected cohorts {''18-25'',''26-35'',''36-45'',''46-55'',''55+''}
        so age_adj is defined for every row used in MeritIncreasePct. (Deequ-style:
        AgeGroup values are contained in allowed set; age_adj isComplete).'
      sources:
