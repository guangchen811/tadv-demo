    - text: "For tenure ratio calculation, YearsAtCompany and YearsInCurrentRole must\
        \ be numeric and non-null. Additionally, for rows where YearsAtCompany > 0,\
        \ YearsInCurrentRole should be <= YearsAtCompany to avoid logically inconsistent\
        \ ratios (the code clips to 1.0, but the expected assumption is YearsInCurrentRole\
        \ \u2264 YearsAtCompany). (Deequ-style: isNumeric & isComplete on both columns;\
        \ conditional assertion YearsInCurrentRole <= YearsAtCompany whenever YearsAtCompany\
        \ > 0)."
      sources:
      - start_line: 53
        end_line: 56
        file: ''
      - start_line: 58
        end_line: 64
        file: ''
      uid: 7c4a079a-f860-495a-b6bc-4fdcc39703ed
    - text: 'MonthlyIncome must be numeric and non-null for every row so MeritIncreaseAmt
        = MonthlyIncome * MeritIncreasePct can be computed without producing null
        or invalid values. (Deequ-style: MonthlyIncome isComplete and isNumeric; resulting
        MeritIncreaseAmt isComplete and non-negative).'
