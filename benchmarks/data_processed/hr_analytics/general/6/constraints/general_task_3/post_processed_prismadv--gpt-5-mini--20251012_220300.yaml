        file: ''
      uid: 55807b5c-0528-4224-85ec-3df230dff82d
    - text: 'For every record, ''YearsInCurrentRole'' should be less than or equal
        to ''YearsAtCompany'' (an employee cannot be in their current role longer
        than they''ve been at the company). Example constraint: .satisfies("YearsInCurrentRole
        <= YearsAtCompany", "role_years_leq_company_years")'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 63
        end_line: 63
        file: ''
      uid: 87b5a262-465e-4e26-a936-d46bdd0564de
    - text: 'If ''YearsAtCompany'' == 0 then ''YearsInCurrentRole'' must also be 0
        (consistent tenure semantics). Example constraint: .satisfies("YearsAtCompany
        != 0 OR YearsInCurrentRole == 0", "zero_yac_implies_zero_yicr")'
      sources:
      - start_line: 53
        end_line: 56
        file: ''
      uid: 3cacd7f8-122d-47ad-9968-508707c10d45
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'For each record, YearsSinceLastPromotion must be less than or equal to
        YearsAtCompany. This enforces that the time since an employee''s last promotion
        cannot exceed their total tenure at the company. Example Deequ-style constraint:
        .satisfies("YearsSinceLastPromotion <= YearsAtCompany", "yrs_since_last_promo_le_yrs_at_company").'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 72
        end_line: 77
        file: ''
      uid: f4529019-82dc-4ca8-8de7-d6abe12714a8
    - text: 'For each record, YearsInCurrentRole must be less than or equal to YearsAtCompany.
        This ensures the reported time in the current role does not exceed total company
        tenure. Example Deequ-style constraint: .satisfies("YearsInCurrentRole <=
        YearsAtCompany", "yrs_in_current_role_le_years_at_company").'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 72
        end_line: 76
        file: ''
      uid: ea3095ae-c4f0-4a8a-8ed6-779be72434c6
    - text: 'If YearsAtCompany == 0 then YearsInCurrentRole must also be 0 (i.e.,
        YearsAtCompany == 0 implies YearsInCurrentRole == 0). This guards against
        inconsistent zero-tenure records where a positive time-in-role would be impossible.
        Example Deequ expression: .satisfies("YearsAtCompany != 0 OR YearsInCurrentRole
        == 0", "zero_yac_implies_zero_yicr").'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: 09cbe975-489d-448b-9ab0-e7940b9f78a9
    - text: 'YearsAtCompany should be less than or equal to TotalWorkingYears for
        each record, because total working years may include prior employers while
        YearsAtCompany is tenure with this company. Example Deequ-style constraint:
        .satisfies("YearsAtCompany <= TotalWorkingYears", "years_at_company_le_total_working_years").'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 72
        end_line: 77
        file: ''
      uid: f86e9af9-45f4-4c55-b4d8-e963ad9a22e1
