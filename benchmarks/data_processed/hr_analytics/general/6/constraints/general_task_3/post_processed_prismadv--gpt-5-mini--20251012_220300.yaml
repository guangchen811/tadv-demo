    - text: 'The categorical ''SalarySlab'' should be consistent with the numeric
        ''MonthlyIncome''. Concretely enforce per-row implications mapping slab labels
        to income ranges:

        - If SalarySlab = ''Upto 5k'' then MonthlyIncome <= 5000

        - If SalarySlab = ''5k-10k'' then MonthlyIncome > 5000 AND MonthlyIncome <=
        10000

        - If SalarySlab = ''10k-15k'' then MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000

        - If SalarySlab = ''15k+'' then MonthlyIncome > 15000

        Actionable constraint formulation (Deequ-like examples):

        - .satisfies("(SalarySlab = ''Upto 5k'') => MonthlyIncome <= 5000", ''slab_vs_income_upto5k'')

        - .satisfies("(SalarySlab = ''5k-10k'') => (MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000)", ''slab_vs_income_5k_10k'')

        - .satisfies("(SalarySlab = ''10k-15k'') => (MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000)", ''slab_vs_income_10k_15k'')

        - .satisfies("(SalarySlab = ''15k+'') => MonthlyIncome > 15000", ''slab_vs_income_15k_plus'')

        This ensures the banding implied by SalarySlab matches the actual MonthlyIncome
        values used later to compute MeritIncreaseAmt.'
