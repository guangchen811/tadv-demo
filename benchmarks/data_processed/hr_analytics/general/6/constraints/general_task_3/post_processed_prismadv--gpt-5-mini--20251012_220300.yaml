        end_line: 29
        file: ''
      uid: e1c045d5-5cf8-4a7b-bb07-e499d7e95742
    - text: 'MeritIncreasePct is computed as the sum of slab_base_rate plus non-negative
        components (base_rating_component >= 0.03, travel_adj >= 0.0, age_adj >= 0.0,
        (1 - ratio) * 0.010 >= 0.0). Therefore, for every row MeritIncreasePct - slab_base_rate
        >= 0.03. Actionable constraint: for all rows, MeritIncreasePct >= slab_base_rate
        + 0.03.'
      sources:
