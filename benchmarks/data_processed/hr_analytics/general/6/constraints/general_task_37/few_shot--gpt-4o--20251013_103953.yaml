constraints:
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['No', 'Yes'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .hasMax('EmployeeCount', 1)
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .hasMax('Over18', 'Y')
      - Invalid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .hasMax('StandardHours', 80)
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
