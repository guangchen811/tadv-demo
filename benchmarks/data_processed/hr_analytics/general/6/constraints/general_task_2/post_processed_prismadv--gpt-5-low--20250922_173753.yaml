  '["EmpID","EmployeeCount"]':
    code: []
    assumptions:
    - text: 'Dataset-level identity and counting: (a) EmpID must be unique across
        the dataset; (b) EmployeeCount should be 1 for each record, so that sum(EmployeeCount)
        equals countDistinct(EmpID) and equals the total row count. Example constraints:
        .isUnique(["EmpID"]). And a compliance check: sum(EmployeeCount) = count(*)
        and countDistinct(EmpID) = count(*).'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 70
        end_line: 75
        file: ''
      uid: 1b5651d2-24c8-4866-bad8-81bc815716b2
    - text: 'Group-level headcount identity: For every (Department, JobRole) group,
        sum(EmployeeCount) must equal both the number of rows in that group and the
        countDistinct(EmpID) in that group. This ensures the aggregated headcount
        truly reflects member employees. Example constraint: group-wise compliance
        sum(EmployeeCount) = count(*); countDistinct(EmpID) = count(*).'
      sources:
      - start_line: 70
        end_line: 75
        file: ''
      uid: c01b332e-426a-4bea-acac-e8cf0ab864b4
    - text: 'Group-level attrition rate well-defined: For every (Department, JobRole)
        group, headcount (i.e., sum(EmployeeCount)) must be > 0 to avoid division
        by zero in attrition_rate = attrition_count / headcount. Example constraint:
        group-wise compliance sum(EmployeeCount) > 0.'
      sources:
      - start_line: 70
        end_line: 75
        file: ''
      uid: c674b674-26e6-4843-a6ec-501fb48bafe9
    - text: 'Active compensation logic: active_quarterly_comp must equal quarterly_comp
        when Attrition == ''No'' and 0.0 otherwise. Example compliance: (Attrition
        = ''No'' AND active_quarterly_comp = quarterly_comp) OR (Attrition <> ''No''
        AND active_quarterly_comp = 0).'
      sources:
      - start_line: 64
        end_line: 68
        file: ''
      uid: 9f02decf-c38b-4766-8b4b-295c086961c6
    - text: 'Quarterly comp scaling: quarterly_comp must equal monthly_comp_w_overheads
        multiplied by 3. Example compliance: abs(quarterly_comp - 3.0 * monthly_comp_w_overheads)
        <= epsilon.'
      sources:
      - start_line: 64
        end_line: 65
        file: ''
      uid: 9978d3f6-51f0-443c-ac6f-84f3b76e4acb
    - text: 'BusinessTravel to travel_premium deterministic mapping: After normalization
        (TravelRarely -> Travel_Rarely), BusinessTravel values must be in {''Non-Travel'',''Travel_Rarely'',''Travel_Frequently''}
        and travel_premium must equal the mapped rates {Non-Travel:0.00, Travel_Rarely:0.02,
        Travel_Frequently:0.05}. Example compliance: CASE BusinessTravel WHEN ''Non-Travel''
        THEN travel_premium=0.00 WHEN ''Travel_Rarely'' THEN travel_premium=0.02 WHEN
        ''Travel_Frequently'' THEN travel_premium=0.05 END.'
      sources:
      - start_line: 30
        end_line: 36
        file: ''
      uid: 644c1059-ee98-4efc-8c1c-1082de1ca9a3
    - text: 'OverTime to overtime_premium deterministic mapping: OverTime in {''No'',''Yes''}
        and overtime_premium must be {No:0.0, Yes:0.10}. Example compliance: (OverTime=''No''
        AND overtime_premium=0.0) OR (OverTime=''Yes'' AND overtime_premium=0.10).'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: 5c55b3ad-b67b-4ba8-962b-fcb524bd7e0a
    - text: 'SalarySlab to slab_premium deterministic mapping: SalarySlab in {''Upto
        5k'',''5k-10k'',''10k-15k'',''15k+''} and slab_premium equals {Upto 5k:0.00,
        5k-10k:0.02, 10k-15k:0.04, 15k+:0.06}.'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      uid: a3c8cd80-ef32-44b9-a26f-7f236a83eff1
    - text: 'AgeGroup to benefits_rate deterministic mapping: AgeGroup in {''18-25'',''26-35'',''36-45'',''46-55'',''55+''}
        and benefits_rate equals {18-25:0.25, 26-35:0.28, 36-45:0.30, 46-55:0.33,
        55+:0.35}.'
      sources:
      - start_line: 32
        end_line: 35
        file: ''
      uid: 583a0a81-a411-4c34-8a09-365dc68a0daa
    - text: 'JobLevel to joblevel_adj functional relation: joblevel_adj must equal
        0.005 * (JobLevel - 1). Example compliance: abs(joblevel_adj - 0.005 * (JobLevel
        - 1)) <= epsilon.'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      uid: 6714e895-4004-4ab3-8693-548f5c0a94e4
    - text: 'YearsWithCurrManager to manager_adj functional relation: manager_adj
        must equal 0.01 when YearsWithCurrManager < 1 (null treated as 0), and 0.0
        otherwise. Example compliance: (coalesce(YearsWithCurrManager,0) < 1 AND manager_adj=0.01)
        OR (coalesce(YearsWithCurrManager,0) >= 1 AND manager_adj=0.0).'
      sources:
      - start_line: 46
        end_line: 47
        file: ''
      uid: af107ca7-1c8f-42af-afee-b945e25ca485
    - text: 'StandardHours to fte functional relation: fte must equal StandardHours
        / 80.0. Example compliance: abs(fte - StandardHours/80.0) <= epsilon.'
      sources:
      - start_line: 48
        end_line: 49
        file: ''
      uid: 2d8decf0-14b2-4635-b3a6-d83feb0edd51
    - text: 'MonthlyIncome and PercentSalaryHike to adj_income functional relation:
        adj_income must equal MonthlyIncome * (1 + PercentSalaryHike/100). Example
        compliance: abs(adj_income - MonthlyIncome*(1 + PercentSalaryHike/100.0))
        <= epsilon.'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: f4d96aef-a73f-4b3e-ac6d-63645c33927a
    - text: 'Composed compensation formula: monthly_comp_w_overheads must equal adj_income
        multiplied by (1 + benefits_rate + travel_premium + overtime_premium + slab_premium
        + joblevel_adj + manager_adj) and then scaled by fte. Example compliance:
        abs(monthly_comp_w_overheads - adj_income*(1 + benefits_rate + travel_premium
        + overtime_premium + slab_premium + joblevel_adj + manager_adj)*fte) <= epsilon.'
      sources:
      - start_line: 52
        end_line: 61
        file: ''
      - start_line: 48
        end_line: 51
        file: ''
      - start_line: 32
        end_line: 47
        file: ''
      uid: 6a874a42-d2e2-45db-a7ce-bb88fbbde786
