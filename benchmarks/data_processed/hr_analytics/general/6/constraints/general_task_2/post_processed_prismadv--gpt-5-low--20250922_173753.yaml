  '["TotalWorkingYears","YearsAtCompany"]':
    code: []
    assumptions:
    - text: 'For every record, YearsAtCompany must be less than or equal to TotalWorkingYears
        (an employee cannot have spent more years at the current company than their
        total working years). We could represent this as a Deequ compliance constraint:
        .addConstraint(Compliance("years_at_company_le_total", "YearsAtCompany <=
        TotalWorkingYears"))'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 25
        end_line: 27
        file: ''
      uid: d9890dcc-19c2-4600-9303-543c28e373d9
    - text: 'If TotalWorkingYears is 0, then YearsAtCompany must also be 0 (since
        company tenure is a subset of total working years). We could represent this
        as a Deequ compliance constraint: .addConstraint(Compliance("zero_total_implies_zero_company",
        "(TotalWorkingYears = 0 AND YearsAtCompany = 0) OR (TotalWorkingYears > 0)"))'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 25
        end_line: 27
        file: ''
      uid: d30746a8-d356-4893-b30e-ae8323e01177
  '["YearsAtCompany","YearsInCurrentRole"]':
    code: []
    assumptions:
    - text: 'Both ''YearsInCurrentRole'' and ''YearsAtCompany'' must be present, non-null,
        numeric (integral) and non-negative for every record. Representable as Deequ
        constraints such as: hasCompleteness(''YearsInCurrentRole'', 1.0), hasCompleteness(''YearsAtCompany'',
        1.0), isNonNegative(''YearsInCurrentRole''), isNonNegative(''YearsAtCompany''),
        and hasDataType(''YearsInCurrentRole'', Integral, false), hasDataType(''YearsAtCompany'',
        Integral, false).'
      sources:
      - start_line: 19
        end_line: 27
        file: ''
      uid: 23d48900-8947-4ccb-9faa-034320e824cd
    - text: 'For every employee, ''YearsInCurrentRole'' should be less than or equal
        to ''YearsAtCompany''. This captures the logical tenure relationship. Representable
        as a Deequ row-level constraint: satisfies("YearsInCurrentRole <= YearsAtCompany",
        "role_le_company_tenure").'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      uid: 4c9fd189-87be-4261-9352-ec8a991ab326
    - text: 'If ''YearsAtCompany'' is 0, then ''YearsInCurrentRole'' must also be
        0 (cannot have positive role tenure with zero company tenure). Representable
        as a Deequ conditional constraint: satisfies("(YearsAtCompany != 0) OR (YearsInCurrentRole
        = 0)", "zero_company_implies_zero_role").'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      uid: 5af2ed95-9dc4-45c0-924f-5af7b7c9faa9
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'YearsSinceLastPromotion must be less than or equal to YearsAtCompany
        for every record (time since last promotion cannot exceed tenure). We could
        represent this as a Deequ constraint: .satisfies("YearsSinceLastPromotion
        <= YearsAtCompany", ["YearsSinceLastPromotion", "YearsAtCompany"]).'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 510bed06-5ba6-4481-8f4b-e0d31b33b247
    - text: 'If YearsAtCompany is 0, then YearsSinceLastPromotion must also be 0 (no
        tenure implies no time since last promotion). We could represent this as a
        Deequ constraint: .satisfies("(YearsAtCompany != 0) OR (YearsSinceLastPromotion
        = 0)", ["YearsSinceLastPromotion", "YearsAtCompany"]).'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 4081b634-217e-4c53-8fee-5922076ab3d5
    - text: 'Both YearsSinceLastPromotion and YearsAtCompany should be non-negative
        numeric values for all rows. We could represent this as a Deequ constraint:
        .satisfies("YearsSinceLastPromotion >= 0 AND YearsAtCompany >= 0", ["YearsSinceLastPromotion",
        "YearsAtCompany"]).'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 5f431c85-f6d0-4d69-be8b-45b853824312
  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'YearsWithCurrManager must be less than or equal to YearsAtCompany for
        every record (a person cannot have spent more time with the current manager
        than at the company). We could represent this as a Deequ constraint like:
        Check.satisfies("YearsWithCurrManager <= YearsAtCompany", "mgr_years_le_company_years")'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: b5af731b-cf86-4d4c-8620-53560544f467
    - text: 'Both YearsAtCompany and YearsWithCurrManager should be non-negative,
        and if YearsAtCompany < 1 then YearsWithCurrManager < 1 (new hires cannot
        have >=1 year with their current manager). We could represent this as Deequ
        constraints like: Check.isNonNegative("YearsAtCompany").isNonNegative("YearsWithCurrManager").satisfies("(YearsAtCompany
        >= 1) OR (YearsWithCurrManager < 1)", "new_hire_mgr_tenure_lt1")'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: 7533d698-4755-4c33-bd64-ecc3099c65ea
    - text: 'The pair (YearsAtCompany, YearsWithCurrManager) should have complete
        YearsAtCompany and a high completeness for YearsWithCurrManager, since nulls
        in YearsWithCurrManager are coerced to 0 and affect compensation. Enforce:
        isComplete("YearsAtCompany") and completeness("YearsWithCurrManager") >= 0.95;
        optionally, require that not both are null: satisfies("YearsAtCompany IS NOT
        NULL AND (YearsWithCurrManager IS NOT NULL OR true)", "tenure_pair_completeness").'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      - start_line: 52
        end_line: 61
        file: ''
      uid: a55d10db-e4ff-4fa1-843e-58c309277186
    - text: 'Consistency for business logic that drives pay: for any record where
        YearsWithCurrManager is null it is treated as 0 in downstream compensation;
        therefore, if YearsAtCompany >= 1 then YearsWithCurrManager should rarely
        be null (e.g., <=5% of such rows). Express as a Deequ conditional: satisfies("(YearsAtCompany
        < 1) OR (YearsWithCurrManager IS NOT NULL)", "mgr_years_present_for_non_new_hires").'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      - start_line: 52
        end_line: 61
        file: ''
