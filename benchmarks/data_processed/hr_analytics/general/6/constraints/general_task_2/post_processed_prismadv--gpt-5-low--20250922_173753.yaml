  '["Department","JobRole"]':
    code: []
    assumptions:
    - text: 'Within each (Department, JobRole) group, the summed EmployeeCount should
        equal the number of records (employees) in that group, i.e., sum(EmployeeCount)
        == count(EmpID). This ensures that ''headcount'' is a true headcount and not
        distorted by EmployeeCount values other than 1. Deequ-style: .addConstraint(Constraint.compliance("sum_empcount_eq_rowcount",
        "sum(EmployeeCount) == count(EmpID)").onColumns(["Department","JobRole","EmployeeCount","EmpID"]))'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 70
        end_line: 76
        file: ''
      uid: c9b6d936-c13c-4856-9746-1e441344d5de
    - text: 'For every (Department, JobRole) group, attrition_count must not exceed
        headcount and headcount must be > 0, implying 0 <= attrition_rate <= 1. Deequ-style:
        .addConstraint(Constraint.compliance("attrition_le_headcount", "attrition_count
        <= headcount AND headcount > 0").onColumns(["Department","JobRole","attrition_count","headcount"]))'
      sources:
      - start_line: 70
        end_line: 76
        file: ''
      uid: 4efa42a1-5d33-4521-b2cc-6fd6cd73d131
    - text: 'active_quarterly_comp must be 0 whenever Attrition == ''Yes'', and equal
        to quarterly_comp whenever Attrition == ''No''. This guarantees that group-level
        quarterly_budget sums only include active employees. Deequ-style: .addConstraint(Constraint.compliance("active_budget_matches_attrition",
        "(Attrition = ''Yes'' AND active_quarterly_comp = 0.0) OR (Attrition = ''No''
        AND active_quarterly_comp = quarterly_comp)").onColumns(["Attrition","active_quarterly_comp","quarterly_comp"]))'
      sources:
      - start_line: 64
        end_line: 68
        file: ''
      - start_line: 70
        end_line: 74
        file: ''
      uid: 1655cd88-92be-4928-8787-a5d5da4c23cd
    - text: 'Both Department and JobRole must be non-null for all records used in
        aggregation so that every row can be assigned to a (Department, JobRole) group.
        Deequ-style: .isComplete("Department").isComplete("JobRole") and compliance
        that both are non-null together: .addConstraint(Constraint.compliance("dept_role_complete",
        "Department IS NOT NULL AND JobRole IS NOT NULL").onColumns(["Department","JobRole"]))'
      sources:
      - start_line: 70
        end_line: 74
        file: ''
      uid: 9d111a01-85e5-4a1d-8ce4-f26c84fded8b
