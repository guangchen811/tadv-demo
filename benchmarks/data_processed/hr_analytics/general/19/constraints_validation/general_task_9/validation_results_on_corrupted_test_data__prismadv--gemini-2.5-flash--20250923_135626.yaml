results:
  YearsAtCompany:
    code:
    - suggestion: .isComplete('YearsAtCompany')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''YearsAtCompany'', assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  AgeGroup:
    code:
    - suggestion: .isComplete("AgeGroup")
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete("Age")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMin("Age", lambda x: x >= 18)'
      status: true
      reason_if_failed: ''
      level: warning
  Attrition:
    code:
    - suggestion: .isComplete("Attrition")
      status: true
      reason_if_failed: ''
      level: error
  '["AgeGroup","risk_age_band"]':
    code:
    - suggestion: '.satisfies("AgeGroup IN (''18-25'', ''26-35'', ''36-45'', ''46-55'',
        ''55+'')", "AgeGroupValidValues", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Attrition","OverTime"]':
    code:
    - suggestion: '.satisfies("`OverTime` IN (''Yes'', ''No'')", "OverTime_ValidValues",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Attrition` IN (''Yes'', ''No'')", "Attrition_ValidValues",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`OverTime` = ''No'' AND `Attrition` = ''Yes''", "NonZero_Baseline_Attrition",
        lambda x: x >= 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.haveCompleteness([''WorkLifeBalance''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`WorkLifeBalance` >= 1 AND `WorkLifeBalance` <= 4",
        "WorkLifeBalance_Range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Attrition","risk_score","risk_tier"]':
    code:
    - suggestion: '.satisfies("OverTime IN (''Yes'', ''No'') AND Attrition IN (''Yes'',
        ''No'')", "Valid OverTime and Attrition values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("YearsAtCompany >= 0 AND YearsInCurrentRole >= 0", "Non-negative
        tenure years", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("JobSatisfaction >= 1 AND JobSatisfaction <= 4 AND WorkLifeBalance
        >= 1 AND WorkLifeBalance <= 4", "JobSatisfaction and WorkLifeBalance within
        [1,4]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code:
    - suggestion: '.isLessThanOrEqualTo(''YearsInCurrentRole'', ''YearsAtCompany'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isLessThanOrEqualTo(''YearsSinceLastPromotion'', ''YearsAtCompany'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  WorkLifeBalance:
    code:
    - suggestion: '.hasCompleteness(''WorkLifeBalance'', lambda c: c >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  YearsInCurrentRole:
    code:
    - suggestion: '.isNonNegative(''YearsInCurrentRole'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''YearsInCurrentRole'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  YearsWithCurrManager:
    code:
    - suggestion: '.hasCompleteness(''YearsWithCurrManager'', assertion=lambda x:
        x > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative(''YearsWithCurrManager'', assertion=lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  EmpID:
    code:
    - suggestion: .isComplete("EmpID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("EmpID")
      status: true
      reason_if_failed: ''
      level: error
  DistanceFromHome:
    code:
    - suggestion: .isComplete('DistanceFromHome')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative(''DistanceFromHome'', assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Department:
    code:
    - suggestion: .isComplete("Department")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("Department", ["Sales", "Research & Development",
        "Human Resources"])
      status: true
      reason_if_failed: ''
      level: warning
  '["DistanceFromHome","risk_commute"]':
    code:
    - suggestion: '.satisfies("DistanceFromHome >= 0", "DistanceFromHome_non_negative",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  MonthlyIncome:
    code:
    - suggestion: .isComplete('MonthlyIncome')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('MonthlyIncome')
      status: true
      reason_if_failed: ''
      level: error
  JobRole:
    code:
    - suggestion: '.hasCompleteness("JobRole", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  JobSatisfaction:
    code:
    - suggestion: .isComplete("JobSatisfaction")
      status: true
      reason_if_failed: ''
      level: error
  ? '["JobSatisfaction","OverTime","WorkLifeBalance","recommended_action","risk_income","risk_mgr_churn","risk_promo_lag","risk_role_stagnation","risk_tier"]'
  : code:
    - suggestion: .isLessThanOrEqualTo("YearsInCurrentRole", "YearsAtCompany")
      status: true
      reason_if_failed: ''
      level: error
  '["JobSatisfaction","risk_js"]':
    code:
    - suggestion: '.haveCompleteness([''JobSatisfaction''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `JobSatisfaction` >= 1 AND `JobSatisfaction`
        <= 4 THEN 1 ELSE 0 END", "JobSatisfaction_valid_range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `YearsInCurrentRole` >= 0 THEN 1 ELSE 0 END",
        "YearsInCurrentRole_non_negative", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `YearsAtCompany` >= 0 THEN 1 ELSE 0 END",
        "YearsAtCompany_non_negative", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  YearsSinceLastPromotion:
    code:
    - suggestion: .isComplete("YearsSinceLastPromotion")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin("YearsSinceLastPromotion", lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["MonthlyIncome","SalarySlab"]':
    code:
    - suggestion: '.satisfies("((`SalarySlab` = ''Upto 5k'' AND `MonthlyIncome` <=
        5000) OR (`SalarySlab` = ''5k-10k'' AND `MonthlyIncome` > 5000 AND `MonthlyIncome`
        <= 10000) OR (`SalarySlab` = ''10k-15k'' AND `MonthlyIncome` > 10000 AND `MonthlyIncome`
        <= 15000) OR (`SalarySlab` = ''15k+'' AND `MonthlyIncome` > 15000))", "MonthlyIncome
        and SalarySlab Consistency", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  OverTime:
    code:
    - suggestion: .isComplete("OverTime")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("OverTime", ["Yes", "No"])
      status: true
      reason_if_failed: ''
      level: error
  SalarySlab:
    code:
    - suggestion: .isComplete("SalarySlab")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("SalarySlab", ["Upto 5k", "5k-10k", "10k-15k", "15k+"])
      status: true
      reason_if_failed: ''
      level: error
  '["SalarySlab","risk_income"]':
    code:
    - suggestion: '.satisfies("SalarySlab IN (''Upto 5k'', ''5k-10k'', ''10k-15k'',
        ''15k+'')", "SalarySlab_ValidValues", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  TotalWorkingYears:
    code:
    - suggestion: '.hasCompleteness("TotalWorkingYears", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["TotalWorkingYears","YearsAtCompany"]':
    code:
    - suggestion: .isLessThanOrEqualTo("YearsAtCompany", "TotalWorkingYears")
      status: true
      reason_if_failed: ''
      level: error
  '["WorkLifeBalance","risk_wlb"]':
    code:
    - suggestion: '.satisfies("(`WorkLifeBalance` IN (1, 2, 3, 4)) AND (`OverTime`
        IN (''Yes'', ''No''))", "WorkLifeBalance_OverTime_ValidValues", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["YearsSinceLastPromotion","risk_promo_lag"]':
    code:
    - suggestion: '.isLessThanOrEqualTo("YearsInCurrentRole", "YearsAtCompany", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("JobSatisfaction >= 1 AND JobSatisfaction <= 4", "JobSatisfaction
        range [1,4]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness(["OverTime", "WorkLifeBalance"], lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("OverTime = ''Yes'' OR OverTime = ''No''", "OverTime
        values are Yes/No", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("WorkLifeBalance >= 1 AND WorkLifeBalance <= 4", "WorkLifeBalance
        range [1,4]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness(["YearsSinceLastPromotion"], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("YearsSinceLastPromotion >= 0", "Non-negative YearsSinceLastPromotion",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["YearsAtCompany","YearsInCurrentRole","risk_role_stagnation"]':
    code:
    - suggestion: '.satisfies("`SalarySlab` IS NOT NULL AND `JobSatisfaction` IS NOT
        NULL", "CompensationReviewWarrantingConditions", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`OverTime` IS NOT NULL AND `WorkLifeBalance` IS NOT
        NULL", "FlexibleScheduleRecommendationConditions", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`YearsInCurrentRole` IS NOT NULL AND `YearsAtCompany`
        IS NOT NULL AND `YearsSinceLastPromotion` IS NOT NULL", "CareerProgressionPlanConditions",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["YearsAtCompany","YearsWithCurrManager"]':
    code:
    - suggestion: '.satisfies("COALESCE(CAST(YearsWithCurrManager AS DOUBLE), 0.0)
        <= CAST(YearsAtCompany AS DOUBLE)", "Manager Tenure vs Company Tenure Consistency",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["YearsAtCompany","YearsWithCurrManager","risk_mgr_churn"]':
    code:
    - suggestion: '.satisfies("`YearsInCurrentRole` >= 0 AND `YearsInCurrentRole`
        <= `YearsAtCompany`", "YearsInCurrentRole_vs_YearsAtCompany_Consistency",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`YearsSinceLastPromotion` >= 0 AND `YearsSinceLastPromotion`
        <= `YearsAtCompany`", "YearsSinceLastPromotion_vs_YearsAtCompany_Consistency",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  ? '["risk_age_band","risk_commute","risk_income","risk_js","risk_mgr_churn","risk_ot","risk_promo_lag","risk_raw","risk_role_stagnation","risk_wlb"]'
  : code:
    - suggestion: '.isLessThanOrEqualTo("YearsInCurrentRole", "YearsAtCompany", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`OverTime` IN (''Yes'', ''No'') AND `Attrition` IN
        (''Yes'', ''No'')", "OverTime and Attrition categories", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["risk_raw","risk_score"]':
    code:
    - suggestion: '.isLessThanOrEqualTo("YearsInCurrentRole", "YearsAtCompany", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`YearsAtCompany` >= 0", "YearsAtCompany_non_negative",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`OverTime` IS NOT NULL AND (`OverTime` = ''Yes'' OR
        `OverTime` = ''No'')", "OverTime_ValidValues", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Attrition` IS NOT NULL AND (`Attrition` = ''Yes''
        OR `Attrition` = ''No'')", "Attrition_ValidValues", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`WorkLifeBalance` IN (1, 2, 3, 4)", "WorkLifeBalance_ValidRange",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
