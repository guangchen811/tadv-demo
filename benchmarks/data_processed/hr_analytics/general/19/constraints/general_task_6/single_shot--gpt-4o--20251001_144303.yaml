constraints:
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .hasValue('EmployeeCount', 1)
      - Invalid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isContainedIn('JobSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .hasValue('Over18', 'Y')
      - Invalid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isPositive('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .hasValue('StandardHours', 80)
      - Invalid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isContainedIn('WorkLifeBalance', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
