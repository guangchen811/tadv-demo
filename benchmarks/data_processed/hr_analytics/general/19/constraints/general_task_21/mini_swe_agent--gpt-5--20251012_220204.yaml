raw_constraints:
- column_name: EmpID
  code_for_constraint: .isComplete('EmpID')
- column_name: EmpID
  code_for_constraint: .isUnique('EmpID')
- column_name: Attrition
  code_for_constraint: .isComplete('Attrition')
- column_name: Attrition
  code_for_constraint: .satisfies("Attrition IN ('Yes','No')", 'Attrition_valid')
- column_name: OverTime
  code_for_constraint: .isComplete('OverTime')
- column_name: OverTime
  code_for_constraint: .satisfies("OverTime IN ('Yes','No')", 'OverTime_valid')
- column_name: Department
  code_for_constraint: .isComplete('Department')
- column_name: JobRole
  code_for_constraint: .isComplete('JobRole')
- column_name: AgeGroup
  code_for_constraint: .isComplete('AgeGroup')
- column_name: AgeGroup
  code_for_constraint: .satisfies("AgeGroup IN ('18-25','26-35','36-45','46-55','55+')",
    'AgeGroup_valid')
- column_name: SalarySlab
  code_for_constraint: .isComplete('SalarySlab')
- column_name: SalarySlab
  code_for_constraint: .satisfies("SalarySlab IN ('Upto 5k','5k-10k','10k-15k','15k+')",
    'SalarySlab_valid')
- column_name: MonthlyIncome
  code_for_constraint: .isComplete('MonthlyIncome')
- column_name: MonthlyIncome
  code_for_constraint: .satisfies('MonthlyIncome > 0', 'MonthlyIncome_positive')
- column_name: Age
  code_for_constraint: .isNonNegative('Age')
- column_name: TotalWorkingYears
  code_for_constraint: .isNonNegative('TotalWorkingYears')
- column_name: YearsAtCompany
  code_for_constraint: .isNonNegative('YearsAtCompany')
- column_name: YearsInCurrentRole
  code_for_constraint: .isNonNegative('YearsInCurrentRole')
- column_name: TotalWorkingYears
  code_for_constraint: .satisfies('TotalWorkingYears >= YearsAtCompany', 'experience_ge_tenure')
- column_name: YearsAtCompany
  code_for_constraint: .satisfies('YearsAtCompany >= YearsInCurrentRole', 'tenure_ge_role_tenure')
- column_name: Department
  code_for_constraint: .satisfies("(JobRole != 'Research Scientist' OR Department
    = 'Research & Development') AND (JobRole != 'Laboratory Technician' OR Department
    = 'Research & Development') AND (JobRole != 'Research Director' OR Department
    = 'Research & Development') AND (JobRole != 'Manufacturing Director' OR Department
    = 'Research & Development') AND (JobRole != 'Sales Executive' OR Department =
    'Sales') AND (JobRole != 'Sales Representative' OR Department = 'Sales') AND (JobRole
    != 'Healthcare Representative' OR Department = 'Sales')", 'role_department_consistency')
- column_name: AgeGroup
  code_for_constraint: .satisfies("(Age IS NULL) OR (AgeGroup = CASE WHEN Age >= 55
    THEN '55+' WHEN Age >= 46 THEN '46-55' WHEN Age >= 36 THEN '36-45' WHEN Age >=
    26 THEN '26-35' ELSE '18-25' END)", 'AgeGroup_matches_Age')
- column_name: SalarySlab
  code_for_constraint: .satisfies("(MonthlyIncome > 15000 AND SalarySlab = '15k+')
    OR (MonthlyIncome > 10000 AND MonthlyIncome <= 15000 AND SalarySlab = '10k-15k')
    OR (MonthlyIncome > 5000 AND MonthlyIncome <= 10000 AND SalarySlab = '5k-10k')
    OR (MonthlyIncome > 0 AND MonthlyIncome <= 5000 AND SalarySlab = 'Upto 5k')",
    'SalarySlab_matches_MonthlyIncome')
