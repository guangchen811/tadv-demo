constraints:
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18')
      - Valid
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    - - '.satisfies("(SalarySlab = ''Upto 5k'' AND MonthlyIncome <= 5000) OR (SalarySlab
        = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab
        = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab
        = ''15k+'' AND MonthlyIncome > 15000)", ''slab_income_alignment'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    - - '.satisfies(''YearsAtCompany <= TotalWorkingYears'', ''yac_le_twy'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    - - '.satisfies(''YearsSinceLastPromotion <= YearsAtCompany'', ''yslp_le_yac'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
