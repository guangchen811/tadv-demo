constraints:
  Age:
    code:
    - - '.hasMax(''Age'', lambda x: x <= 70)'
      - Valid
    - - '.hasMin(''Age'', lambda x: x >= 18)'
      - Valid
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['TravelRarely', 'Travel_Frequently', 'Travel_Rarely',
        'Non-Travel'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EducationField:
    code:
    - - .isComplete('EducationField')
      - Valid
    - - .isContainedIn('EducationField', ['Other', 'Medical', 'Technical Degree',
        'Marketing', 'Human Resources', 'Life Sciences'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - '.hasMin(''EmployeeCount'', lambda x: x == 1)'
      - Valid
    - - '.hasNumberOfDistinctValues(''EmployeeCount'', lambda x: x == 1)'
      - Invalid
    - - .isComplete('EmployeeCount')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - '.hasMax(''EnvironmentSatisfaction'', lambda x: x <= 4)'
      - Valid
    - - '.hasMin(''EnvironmentSatisfaction'', lambda x: x >= 1)'
      - Valid
    - - .isComplete('EnvironmentSatisfaction')
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    - - .isContainedIn('JobRole', ['Research Director', 'Sales Representative', 'Research
        Scientist', 'Manufacturing Director', 'Healthcare Representative', 'Sales
        Executive', 'Manager', 'Human Resources', 'Laboratory Technician'])
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - '.hasMax(''JobSatisfaction'', lambda x: x <= 4)'
      - Valid
    - - '.hasMin(''JobSatisfaction'', lambda x: x >= 1)'
      - Valid
    - - .isComplete('JobSatisfaction')
      - Valid
    assumptions: []
  MaritalStatus:
    code:
    - - .isComplete('MaritalStatus')
      - Valid
    - - .isContainedIn('MaritalStatus', ['Divorced', 'Single', 'Married'])
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - '.hasMin(''Over18'', lambda x: x == ''Y'')'
      - Invalid
    - - '.hasNumberOfDistinctValues(''Over18'', lambda x: x == 1)'
      - Invalid
    - - .isComplete('Over18')
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - '.hasMin(''StandardHours'', lambda x: x == 80)'
      - Valid
    - - '.hasNumberOfDistinctValues(''StandardHours'', lambda x: x == 1)'
      - Invalid
    - - .isComplete('StandardHours')
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - '.hasMax(''WorkLifeBalance'', lambda x: x <= 4)'
      - Valid
    - - '.hasMin(''WorkLifeBalance'', lambda x: x >= 1)'
      - Valid
    - - .isComplete('WorkLifeBalance')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - '.hasMax(''YearsAtCompany'', lambda x: x <= F.col(''TotalWorkingYears''))'
      - Invalid
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - '.hasMax(''YearsInCurrentRole'', lambda x: x <= F.col(''YearsAtCompany''))'
      - Invalid
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - '.hasMax(''YearsSinceLastPromotion'', lambda x: x <= F.col(''YearsAtCompany''))'
      - Invalid
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95)'
      - Valid
    - - '.hasMax(''YearsWithCurrManager'', lambda x: x <= F.col(''YearsAtCompany''))'
      - Invalid
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
