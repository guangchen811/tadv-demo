      `SalarySlab` = '10k-15k' THEN (`MonthlyIncome` >= 10001 AND `MonthlyIncome`
      <= 15000) WHEN `SalarySlab` = '15k+' THEN (`MonthlyIncome` >= 15001) ELSE `MonthlyIncome`
      IS NULL END", "MonthlyIncome within SalarySlab bounds")
