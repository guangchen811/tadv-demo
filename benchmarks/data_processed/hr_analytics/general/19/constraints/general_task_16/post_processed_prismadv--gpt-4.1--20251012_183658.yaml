    - text: '''MonthlyIncomeFilled'', which is imputed using the median ''MonthlyIncome''
        per ''SalarySlab'', assumes that there are enough non-null ''MonthlyIncome''
        values within each ''SalarySlab'' group to compute a meaningful median. Therefore,
        for each ''SalarySlab'', there should be at least one non-null ''MonthlyIncome''
