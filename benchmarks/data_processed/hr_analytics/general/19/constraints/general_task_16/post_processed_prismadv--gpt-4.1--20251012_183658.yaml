    - text: 'For each row, ''YearsInCurrentRole'', ''YearsSinceLastPromotion'', and
        ''YearsWithCurrManager'' should not exceed ''YearsAtCompany''. That is, these
        tenure-related fields must be less than or equal to the total years at the
        company. This can be formalized as: ''YearsInCurrentRole'' <= ''YearsAtCompany'',
        ''YearsSinceLastPromotion'' <= ''YearsAtCompany'', and ''YearsWithCurrManager''
        <= ''YearsAtCompany''.'
