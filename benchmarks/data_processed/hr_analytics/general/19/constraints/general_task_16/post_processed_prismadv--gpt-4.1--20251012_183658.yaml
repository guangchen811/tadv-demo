        end_line: 94
        file: ''
      uid: 2e1c4370-60cb-4a9c-ba22-618e9cf96d0d
    - text: The combination of 'SalarySlab' and 'MonthlyIncomeFilled' is used to compute
        the within-slab income rank. Therefore, within each 'SalarySlab', 'MonthlyIncomeFilled'
