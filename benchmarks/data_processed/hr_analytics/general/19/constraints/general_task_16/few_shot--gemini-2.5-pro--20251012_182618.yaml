constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isBetween('EnvironmentSatisfaction', 1, 4, inclusive=True)
      - Invalid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isBetween('JobSatisfaction', 1, 4, inclusive=True)
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isBetween('WorkLifeBalance', 1, 4, inclusive=True)
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .satisfies('YearsAtCompany <= TotalWorkingYears', 'YearsAtCompany should be
        less than or equal to TotalWorkingYears')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .satisfies('YearsInCurrentRole <= YearsAtCompany', 'YearsInCurrentRole should
        be less than or equal to YearsAtCompany')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - .satisfies('YearsWithCurrManager <= YearsAtCompany', 'YearsWithCurrManager
        should be less than or equal to YearsAtCompany')
      - Invalid
    assumptions: []
