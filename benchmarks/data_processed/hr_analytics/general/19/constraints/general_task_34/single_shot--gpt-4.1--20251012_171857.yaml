constraints:
  Age:
    code:
    - - .hasMax('Age', _ <= 70)
      - Invalid
    - - .hasMin('Age', _ >= 18)
      - Invalid
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .hasDistinctness('EmpID', _ >= 0.95)
      - Invalid
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .hasMax('EmployeeCount', _ == 1)
      - Invalid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isContainedIn('EnvironmentSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isContainedIn('JobSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  Over18:
    code:
    - - .hasMax('Over18', _ == 'Y')
      - Invalid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StockOptionLevel:
    code:
    - - .isContainedIn('StockOptionLevel', [0, 1, 2, 3])
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isContainedIn('WorkLifeBalance', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - '.hasMax(''YearsAtCompany'', lambda x: x <= 40)'
      - Valid
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - .hasCompleteness('YearsWithCurrManager', _ >= 0.95)
      - Invalid
    assumptions: []
