  '["YearsAtCompany","YearsInCurrentRole"]':
    code: []
    assumptions:
    - text: 'For any employee with positive company tenure, time in current role must
        not exceed total years at company. Constraint example (Deequ): .satisfies(''case
        when YearsAtCompany > 0 then YearsInCurrentRole <= YearsAtCompany else true
        end'', ''forall'')'
      sources:
      - start_line: 61
        end_line: 64
        file: ''
      uid: dd73a35a-65c4-4bc6-a4f3-cfe5e41902df
    - text: 'Zero company tenure implies zero time in current role (no role tenure
        without company tenure). Constraint example (Deequ): .satisfies(''(YearsAtCompany
        != 0) OR (YearsInCurrentRole = 0)'', ''forall'')'
      sources:
      - start_line: 61
        end_line: 64
        file: ''
      uid: bd347910-2792-47af-9248-67e296e56871
    - text: 'Time with the current manager cannot exceed total years at company (another
        tenure-vs-company bound using the same denominator). Constraint example (Deequ):
        .satisfies(''case when YearsAtCompany > 0 then YearsWithCurrManager <= YearsAtCompany
        else true end'', ''forall'')'
      sources:
      - start_line: 68
        end_line: 70
        file: ''
      uid: 5bd0634c-9da8-419d-8d89-0cb262f7f61c
  '["YearsAtCompany","YearsInCurrentRole","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: "Tenure monotonicity: An employee\u2019s time in current role and time\
        \ with current manager must not exceed their total company tenure. Representable\
        \ in Deequ as two compliance constraints: .satisfies('YearsInCurrentRole <=\
        \ YearsAtCompany', 'role_leq_tenure') and .satisfies('YearsWithCurrManager\
        \ <= YearsAtCompany', 'mgr_leq_tenure')."
      sources:
      - start_line: 61
        end_line: 64
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      uid: b54df6f1-76e0-4b86-bb19-9e9b20e87a22
    - text: 'Zero-tenure consistency: If YearsAtCompany = 0, then YearsInCurrentRole
        must be 0 and YearsWithCurrManager must be either 0 or null. Deequ compliance
        example: .satisfies(''CASE WHEN YearsAtCompany = 0 THEN (YearsInCurrentRole
        = 0 AND COALESCE(YearsWithCurrManager, 0) = 0) ELSE true END'', ''zero_tenure_implies_zero_subtenures'').'
      sources:
      - start_line: 61
        end_line: 64
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      uid: 5acf1fea-d2cd-48be-8109-21094954b5f4
    - text: 'Positive-tenure completeness: For rows where YearsAtCompany > 0, YearsWithCurrManager
        should be non-null (to avoid defaulting the manager ratio to 0 and overstating
        risk). Target compliance >= 0.95 (aligned with observed completeness). Deequ
        example: .satisfies(''YearsAtCompany = 0 OR YearsWithCurrManager IS NOT NULL'',
        ''mgr_present_when_tenure_positive'').'
      sources:
      - start_line: 61
        end_line: 64
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      uid: f7d6b030-3b4b-4634-9e69-5486aaca823e
    - text: 'Ratio bounds when tenure > 0: The ratios YearsInCurrentRole/YearsAtCompany
        and YearsWithCurrManager/YearsAtCompany should lie within [0, 1]. Deequ examples:
        .satisfies(''YearsAtCompany = 0 OR (YearsInCurrentRole / YearsAtCompany BETWEEN
        0 AND 1)'', ''role_ratio_in_unit_interval'') and .satisfies(''YearsAtCompany
        = 0 OR (YearsWithCurrManager / YearsAtCompany BETWEEN 0 AND 1)'', ''mgr_ratio_in_unit_interval'').'
      sources:
      - start_line: 61
        end_line: 64
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      uid: a431d56c-ea22-46f6-a0c9-f09a188ea69f
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'YearsSinceLastPromotion must be less than or equal to YearsAtCompany
