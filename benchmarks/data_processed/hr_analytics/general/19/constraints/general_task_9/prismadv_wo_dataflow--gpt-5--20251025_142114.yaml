  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'Manager tenure must not exceed company tenure: YearsWithCurrManager <=
        YearsAtCompany (and ideally >= 0). This keeps mgr_ratio in [0,1] without relying
        on clipping. Example Deequ: .hasCompliance("mgr_leq_tenure", "YearsWithCurrManager
        <= YearsAtCompany AND YearsWithCurrManager >= 0")'
      sources:
      - start_line: 68
        end_line: 70
        file: ''
      uid: be6f5f3a-c28f-4d00-85dc-d74b14892e93
    - text: 'If YearsAtCompany is 0, then YearsWithCurrManager must be 0 (treating
        null as 0 to avoid hidden infinite/undefined ratios). Example Deequ: .hasCompliance("zero_tenure_zero_mgr",
        "CASE WHEN YearsAtCompany = 0 THEN coalesce(YearsWithCurrManager, 0) = 0 ELSE
        true END")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 68
        end_line: 70
        file: ''
      uid: f249115d-f4aa-49b4-a4e0-191d3d419d74
    - text: 'For employees with positive company tenure, manager tenure should be
        recorded (non-null): YearsAtCompany > 0 implies YearsWithCurrManager is not
        null. This prevents missing manager tenure from being silently treated as
        0 risk. Example Deequ: .hasCompliance("mgr_years_present_when_tenured", "YearsAtCompany
        = 0 OR YearsWithCurrManager IS NOT NULL")'
      sources:
      - start_line: 68
        end_line: 70
        file: ''
      uid: e29aeb49-c059-4e16-beb2-86654b7b2c13
    - text: 'Time in current role must not exceed company tenure: YearsInCurrentRole
        <= YearsAtCompany (and >= 0). This ensures role_ratio naturally lies within
        [0,1] without reliance on clipping. Example Deequ: .hasCompliance("role_leq_tenure",
        "coalesce(YearsInCurrentRole, 0) <= YearsAtCompany AND coalesce(YearsInCurrentRole,
        0) >= 0")'
      sources:
      - start_line: 60
        end_line: 64
        file: ''
      uid: 550533e1-d757-4450-906c-392ed28111c8
    - text: 'If YearsAtCompany is 0, then YearsInCurrentRole must be 0 (treat null
        as 0). Example Deequ: .hasCompliance("zero_tenure_zero_role", "CASE WHEN YearsAtCompany
        = 0 THEN coalesce(YearsInCurrentRole, 0) = 0 ELSE true END")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
