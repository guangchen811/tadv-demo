    - text: 'For rows where both values are present, ''YearsWithCurrManager'' should
        be less than or equal to ''YearsAtCompany'' (cannot have more years with current
        manager than company tenure). Example (Deequ): .satisfies("(`YearsWithCurrManager`
        IS NULL OR `YearsAtCompany` IS NULL) OR (`YearsWithCurrManager` <= `YearsAtCompany`)",
        "YWCM <= YAC", lambda x: x == 1).'
