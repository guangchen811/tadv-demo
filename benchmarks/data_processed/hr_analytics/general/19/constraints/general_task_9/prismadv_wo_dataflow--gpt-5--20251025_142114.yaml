    - text: 'All non-null ''YearsWithCurrManager'' values should be non-negative (years
        cannot be negative). Example (Deequ): .satisfies("`YearsWithCurrManager` IS
        NULL OR `YearsWithCurrManager` >= 0", "YWCM non-negative", lambda x: x ==
        1).'
