    - text: 'YearsInCurrentRole must be less than or equal to YearsAtCompany so that
        role_ratio remains within [0,1] without relying on clipping. Deequ example:
        .satisfies(''YearsInCurrentRole <= YearsAtCompany'', ''role_le_tenure'').'
