    - text: 'The ''YearsWithCurrManager'' column should be at least 95% complete (non-null)
        to avoid systematically inflating ''risk_mgr_churn'' via defaulting the manager-tenure
        ratio to 0. Example (Deequ): .hasCompleteness("YearsWithCurrManager", lambda
        x: x >= 0.95).'
