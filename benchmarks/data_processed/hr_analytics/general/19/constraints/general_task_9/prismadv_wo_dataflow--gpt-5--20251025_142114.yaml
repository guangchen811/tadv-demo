        end_line: 64
        file: ''
      uid: 426f6add-434b-4df0-aa93-fe6ca629fddb
    - text: 'YearsWithCurrManager must be less than or equal to YearsAtCompany so
        that mgr_ratio remains within [0,1] without relying on clipping. Deequ example:
        .satisfies(''YearsWithCurrManager <= YearsAtCompany'', ''mgr_le_tenure'').'
      sources:
