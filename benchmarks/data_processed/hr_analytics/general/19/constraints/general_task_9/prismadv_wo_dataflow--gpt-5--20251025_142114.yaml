    - suggestion: '.satisfies("Attrition = ''Yes''", ''Attrition rate between 0.10
        and 0.30'', lambda f: (f >= 0.10) and (f <= 0.30))'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 0dd7aa8a-d44c-4c19-884d-275e5091c666
      source_assumptions:
      - e1f1cebf-d7a1-4781-bf17-0d846831ceb1
    assumptions:
    - text: The input must include the 'Attrition' column and it should be complete
        (no nulls). The code computes (Attrition == 'Yes').mean() globally and within
        OverTime groups; any nulls would be implicitly treated as non-Yes and bias
        rates and thresholds. This can be represented as a completeness constraint
        on 'Attrition' equal to 1.0.
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      - start_line: 113
        end_line: 116
        file: ''
      - start_line: 156
        end_line: 168
        file: ''
      uid: 961f394c-2a1d-4125-8b33-90b047e671b0
    - text: The 'Attrition' values must be exactly one of {'Yes','No'} (case-sensitive,
        no leading/trailing whitespace). The code relies on exact string equality
        to 'Yes' to calculate rates; any other encoding (e.g., 'Y', 'yes', ' No')
        will be misinterpreted as non-attrition. This can be enforced with a set-membership
        check on 'Attrition'.
      sources:
      - start_line: 46
        end_line: 47
        file: ''
      - start_line: 113
        end_line: 113
        file: ''
      uid: 864278b3-d366-4376-94da-2b4773ddadd2
    - text: The dataset should contain both classes in 'Attrition' (at least one 'Yes'
        and at least one 'No') so that prevalence- and uplift-based calibration is
        meaningful. This can be represented as count(Attrition='Yes') > 0 and count(Attrition='No')
        > 0.
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      - start_line: 113
        end_line: 116
        file: ''
      uid: ec675417-2c58-4578-ba74-0ddc0a018103
    - text: The overall 'Attrition' positive rate is expected to be within a reasonable
        band near historical levels (e.g., between 0.10 and 0.30; current data shows
        ~0.179). This keeps the threshold calibration (2x rate, clipped to [0.20,
        0.50]) from saturating at the clip bounds. This can be represented as the
        mean of CASE WHEN Attrition='Yes' THEN 1 ELSE 0 END being between 0.10 and
        0.30.
      sources:
      - start_line: 113
        end_line: 116
        file: ''
      uid: e1f1cebf-d7a1-4781-bf17-0d846831ceb1
    - text: 'If OverTime subgroup(s) exist, ''Attrition'' should be present and valid
        within those subgroups; specifically, for OverTime=''No'' rows the rate of
        Attrition=''Yes'' should be computable and greater than 0 to avoid defaulting
        the overtime uplift to 0. This can be represented as: if count(OverTime=''No'')
        > 0 then mean(CASE WHEN OverTime=''No'' AND Attrition=''Yes'' THEN 1 ELSE
        0 END) > 0.'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: 0e8e9174-0137-46fd-ada3-e42a5f2a894d
  '["Age","AgeGroup"]':
    code: []
    assumptions:
    - text: 'AgeGroup must be consistent with Age via fixed bins: 18-25 if 18 <= Age
        <= 25; 26-35 if 26 <= Age <= 35; 36-45 if 36 <= Age <= 45; 46-55 if 46 <=
        Age <= 55; 55+ if Age >= 56. This can be enforced with a row-level rule like:
        CASE WHEN Age BETWEEN 18 AND 25 THEN ''18-25'' WHEN Age BETWEEN 26 AND 35
        THEN ''26-35'' WHEN Age BETWEEN 36 AND 45 THEN ''36-45'' WHEN Age BETWEEN
        46 AND 55 THEN ''46-55'' ELSE ''55+'' END = AgeGroup.'
      sources:
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 72
        end_line: 81
        file: ''
      - start_line: 140
        end_line: 145
        file: ''
      uid: ea7b0f67-60d0-46be-baf5-30a3a09ef2da
    - text: 'MonthlyIncome and SalarySlab must agree: Upto 5k if MonthlyIncome <=
        5000; 5k-10k if 5000 < MonthlyIncome <= 10000; 10k-15k if 10000 < MonthlyIncome
        <= 15000; 15k+ if MonthlyIncome > 15000. Representable as a single satisfies
        constraint comparing SalarySlab to a CASE expression on MonthlyIncome.'
      sources:
      - start_line: 18
        end_line: 27
        file: ''
      - start_line: 35
        end_line: 41
        file: ''
      - start_line: 140
        end_line: 145
        file: ''
      uid: 130343fe-e5ab-46fb-bfbf-0d02b3a3ec2e
    - text: YearsInCurrentRole must be between 0 and YearsAtCompany (inclusive), i.e.,
        0 <= YearsInCurrentRole <= YearsAtCompany, to keep the role_ratio (YearsInCurrentRole
        / YearsAtCompany) naturally in [0,1] without relying on clipping.
      sources:
      - start_line: 60
        end_line: 64
        file: ''
      - start_line: 18
        end_line: 27
        file: ''
      uid: c3f050a0-f917-4b61-8fb3-7ea004473fcd
    - text: YearsWithCurrManager must be between 0 and YearsAtCompany (inclusive),
        i.e., 0 <= YearsWithCurrManager <= YearsAtCompany, to ensure mgr_ratio (YearsWithCurrManager
        / YearsAtCompany) is in [0,1] without requiring inf/NaN handling.
      sources:
      - start_line: 68
        end_line: 71
        file: ''
      - start_line: 18
        end_line: 27
        file: ''
      uid: fb0a556a-9adf-4cd4-be9d-fd0e9e7ff8e5
    - text: YearsSinceLastPromotion must not exceed YearsAtCompany and must be non-negative,
        i.e., 0 <= YearsSinceLastPromotion <= YearsAtCompany, so that promotion lag
        reflects time within the current company.
      sources:
      - start_line: 65
        end_line: 67
        file: ''
      - start_line: 18
        end_line: 27
        file: ''
      uid: 46a150e9-1ebc-499f-a239-420b74c056ae
    - text: When YearsAtCompany = 0, both YearsInCurrentRole and YearsWithCurrManager
        must be 0 (no tenure implies no time in role/with manager).
      sources:
      - start_line: 60
        end_line: 64
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      uid: bc450ab7-1075-49a1-bc2d-21822e2f6354
    - text: YearsAtCompany must not exceed TotalWorkingYears, i.e., 0 <= YearsAtCompany
        <= TotalWorkingYears, since company tenure cannot be greater than overall
        experience.
      sources:
      - start_line: 18
        end_line: 23
        file: ''
      - start_line: 140
        end_line: 145
        file: ''
      uid: 08fbbc5f-3e33-44b4-b2bb-c752a85177b8
  '["Age","TotalWorkingYears"]':
    code: []
    assumptions:
    - text: 'TotalWorkingYears must be coherent with Age: an employee cannot have
        more years of total experience than their age minus a plausible starting working
        age. Represent as Deequ: .satisfies(''Age - TotalWorkingYears >= 14'', ''age_minus_tww_at_least_14'')'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 140
        end_line: 146
        file: ''
      uid: daacecb0-7c2d-44cb-a3d3-30e68930734b
    - text: 'TotalWorkingYears should be at least as large as YearsAtCompany (you
        cannot have spent more years at the current company than total career years).
        Represent as Deequ: .satisfies(''TotalWorkingYears >= YearsAtCompany'', ''tww_gte_yac'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 140
        end_line: 146
        file: ''
      uid: 57f67da9-b648-41e6-9e99-b18ac2c20cb5
    - text: 'YearsInCurrentRole must not exceed YearsAtCompany. Represent as Deequ:
        .satisfies(''YearsInCurrentRole <= YearsAtCompany'', ''yicr_le_yac'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: 5b4faf4c-e90b-4819-b933-4979d8d186f9
    - text: 'YearsWithCurrManager must not exceed YearsAtCompany. Represent as Deequ:
        .satisfies(''YearsWithCurrManager <= YearsAtCompany'', ''ywcm_le_yac'')'
      sources:
      - start_line: 68
        end_line: 70
        file: ''
      uid: 4ff2116a-3561-4488-8d03-fd63c5b4e64e
    - text: 'YearsSinceLastPromotion should not exceed YearsAtCompany. Represent as
        Deequ: .satisfies(''YearsSinceLastPromotion <= YearsAtCompany'', ''yslp_le_yac'')'
      sources:
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 32827f8a-bd72-4313-b501-5400938c4752
    - text: 'AgeGroup must be consistent with Age and within the expected set {''18-25'',''26-35'',''36-45'',''46-55'',''55+''}.
        Represent as Deequ: .satisfies("CASE WHEN Age BETWEEN 18 AND 25 THEN AgeGroup
        = ''18-25'' WHEN Age BETWEEN 26 AND 35 THEN AgeGroup = ''26-35'' WHEN Age
        BETWEEN 36 AND 45 THEN AgeGroup = ''36-45'' WHEN Age BETWEEN 46 AND 55 THEN
        AgeGroup = ''46-55'' WHEN Age >= 56 THEN AgeGroup = ''55+'' ELSE false END",
        ''agegroup_matches_age'')'
      sources:
      - start_line: 73
        end_line: 81
        file: ''
      - start_line: 140
        end_line: 146
        file: ''
      uid: 782d4c34-2365-46c7-bb13-9f8c9dbbef67
    - text: 'SalarySlab must be consistent with MonthlyIncome and within the expected
        set {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}. Example Deequ: .satisfies("CASE
        WHEN MonthlyIncome <= 5000 THEN SalarySlab = ''Upto 5k'' WHEN MonthlyIncome
        > 5000 AND MonthlyIncome <= 10000 THEN SalarySlab = ''5k-10k'' WHEN MonthlyIncome
        > 10000 AND MonthlyIncome <= 15000 THEN SalarySlab = ''10k-15k'' ELSE SalarySlab
        = ''15k+'' END", ''salaryslab_matches_income'')'
      sources:
      - start_line: 35
        end_line: 42
        file: ''
      - start_line: 140
        end_line: 145
        file: ''
      uid: 0f0296c6-ba3d-414c-9f8d-c95cf659bb0a
  '["Age","YearsAtCompany"]':
    code: []
    assumptions:
    - text: 'Tenure vs role duration consistency: For any row with YearsAtCompany
        > 0, YearsInCurrentRole must be <= YearsAtCompany. If YearsAtCompany == 0,
        then YearsInCurrentRole must be 0. Deequ examples: .where("YearsAtCompany
        > 0").hasCompliance("role_le_tenure", "YearsInCurrentRole <= YearsAtCompany",
        1.0) and .hasCompliance("zero_tenure_implies_zero_role", "(YearsAtCompany
        != 0) OR (YearsInCurrentRole == 0)", 1.0).'
      sources:
      - start_line: 61
        end_line: 64
        file: ''
      uid: c0e1f905-30bc-4e2a-bdf3-405318353f8a
    - text: 'Tenure vs time-with-manager consistency: For any row with YearsAtCompany
        > 0, YearsWithCurrManager must be <= YearsAtCompany. If YearsAtCompany ==
        0, then YearsWithCurrManager must be 0. Deequ examples: .where("YearsAtCompany
        > 0").hasCompliance("mgr_le_tenure", "YearsWithCurrManager <= YearsAtCompany",
        1.0) and .hasCompliance("zero_tenure_implies_zero_mgr", "(YearsAtCompany !=
        0) OR (YearsWithCurrManager == 0)", 1.0).'
      sources:
      - start_line: 68
        end_line: 70
        file: ''
      uid: 8ca46b3f-0bf3-4d44-9061-354cd92cf79e
    - text: 'Promotion lag bounded by tenure: YearsSinceLastPromotion should not exceed
        YearsAtCompany, and if YearsAtCompany == 0 then YearsSinceLastPromotion must
        be 0. Deequ examples: .hasCompliance("promo_le_tenure", "YearsSinceLastPromotion
        <= YearsAtCompany", 1.0) and .hasCompliance("zero_tenure_implies_zero_promo",
        "(YearsAtCompany != 0) OR (YearsSinceLastPromotion == 0)", 1.0).'
      sources:
      - start_line: 59
        end_line: 66
        file: ''
      uid: 35a5f2a4-9f9e-42fa-ab95-06681e95bd36
    - text: 'AgeGroup must be consistent with Age: ''18-25'' -> 18 <= Age <= 25; ''26-35''
        -> 26 <= Age <= 35; ''36-45'' -> 36 <= Age <= 45; ''46-55'' -> 46 <= Age <=
        55; ''55+'' -> Age >= 55. Deequ example: .hasCompliance("agegroup_matches_age",
        "(AgeGroup == ''18-25'' AND Age >= 18 AND Age <= 25) OR (AgeGroup == ''26-35''
        AND Age >= 26 AND Age <= 35) OR (AgeGroup == ''36-45'' AND Age >= 36 AND Age
        <= 45) OR (AgeGroup == ''46-55'' AND Age >= 46 AND Age <= 55) OR (AgeGroup
        == ''55+'' AND Age >= 55)", 1.0).'
      sources:
      - start_line: 72
        end_line: 81
        file: ''
      uid: 956daf0a-7705-43a9-8a95-f53c534e8965
    - text: 'Basic age-tenure plausibility: An employee''s Age must be greater than
        YearsAtCompany. (Optionally enforce a minimum starting age if applicable,
        e.g., Age >= YearsAtCompany + 16.) Deequ example: .hasCompliance("age_gt_tenure",
        "Age > YearsAtCompany", 1.0).'
      sources:
      - start_line: 19
        end_line: 23
        file: ''
      uid: 4437235f-551b-4068-bc6e-80ce9d2cec03
    - text: 'Salary slab must match MonthlyIncome: ''Upto 5k'' -> MonthlyIncome <=
        5000; ''5k-10k'' -> 5000 < MonthlyIncome <= 10000; ''10k-15k'' -> 10000 <
        MonthlyIncome <= 15000; ''15k+'' -> MonthlyIncome > 15000. Deequ example:
        .hasCompliance("slab_matches_income", "(SalarySlab == ''Upto 5k'' AND MonthlyIncome
        <= 5000) OR (SalarySlab == ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab == ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab == ''15k+'' AND MonthlyIncome > 15000)", 1.0).'
      sources:
      - start_line: 35
        end_line: 41
        file: ''
      - start_line: 140
        end_line: 145
        file: ''
      uid: 04dfa4f5-6a60-4183-af21-082e47352cac
    - text: 'OverTime-Attrition uplift requires coverage: The dataset should contain
        at least one row with OverTime == ''Yes'' and at least one with OverTime ==
        ''No'', each having non-null Attrition in {''Yes'',''No''}, so that both rate_ot_yes
        and rate_ot_no are computable. Possible checks: .hasNumberOfDistinctValues("OverTime",
        _ >= 2), .where("OverTime in (''Yes'',''No'')").isComplete("Attrition"), and
        .hasCompliance("attrition_values", "Attrition in (''Yes'',''No'')", 1.0).'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: 448fa2b0-758d-4e30-803c-752bf2633a1e
  '["Attrition","OverTime"]':
    code: []
    assumptions:
    - text: 'Both OverTime groups (''Yes'' and ''No'') must exist, and the baseline
        group OverTime=''No'' must contain at least one Attrition=''Yes'' and at least
        one Attrition=''No'' record so the uplift rate (rate_ot_yes / rate_ot_no)
        is well-defined and non-zero. This can be represented with Deequ-style checks
        such as: size where "OverTime = ''No'' and Attrition = ''Yes''" >= 1; size
        where "OverTime = ''No'' and Attrition = ''No''" >= 1; and size where "OverTime
        = ''Yes''" >= 1.'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: e8bd8be9-da41-4d5c-85f4-220a2cd83533
    - text: 'Tenure consistency: YearsInCurrentRole must be less than or equal to
        YearsAtCompany; additionally, if YearsAtCompany == 0 then YearsInCurrentRole
        must be 0. This can be enforced with a compliance rule like: YearsAtCompany
        IS NULL OR (YearsInCurrentRole <= YearsAtCompany AND (YearsAtCompany != 0
        OR YearsInCurrentRole = 0)).'
      sources:
      - start_line: 61
        end_line: 64
        file: ''
      uid: 5502d803-76c6-4567-b4bd-69d34f33fd21
    - text: 'Manager-tenure consistency: YearsWithCurrManager must be less than or
        equal to YearsAtCompany; additionally, if YearsAtCompany == 0 then YearsWithCurrManager
        must be 0. This can be enforced with a compliance rule like: YearsAtCompany
        IS NULL OR (YearsWithCurrManager <= YearsAtCompany AND (YearsAtCompany !=
        0 OR YearsWithCurrManager = 0)).'
      sources:
      - start_line: 61
        end_line: 62
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: b2509577-7d88-406f-9941-a514aa2ea913
    - text: 'Conditional domain validity: When OverTime = ''Yes'', WorkLifeBalance
        must be present and within {1,2,3,4} so the action rule (OverTime == ''Yes''
        and WorkLifeBalance <= 2) can evaluate deterministically. This can be expressed
        as a compliance: NOT(OverTime = ''Yes'') OR WorkLifeBalance IN (1,2,3,4).'
      sources:
      - start_line: 52
        end_line: 54
        file: ''
      - start_line: 129
        end_line: 130
        file: ''
      uid: 3be3526e-845c-430f-a2cc-b319fcad6a0c
