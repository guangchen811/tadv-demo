    assumptions:
    - text: 'The ''DistanceFromHome'' column must exist in the input data, as it is
        referenced unconditionally to compute commute risk. We could represent this
        assumption as a constraint like: Deequ hasColumn(''DistanceFromHome'') or
        Great Expectations expect_column_to_exist(''DistanceFromHome'').'
