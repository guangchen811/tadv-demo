        end_line: 83
        file: ''
      uid: 76ad8822-37bc-46fa-b827-d9fc051edee5
    - text: 'The ''DistanceFromHome'' column should be complete (no nulls) because
        it is used in arithmetic to derive ''risk_commute'' and then combined into
        ''risk_raw''/''risk_score'' without imputation; nulls would propagate and
        distort risk scoring. We could represent this assumption as: Deequ completeness(''DistanceFromHome'')
        >= 1.0 (or at least >= 0.99), or Great Expectations expect_column_values_to_not_be_null(''DistanceFromHome'').'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 83
        end_line: 83
        file: ''
      - start_line: 97
        end_line: 107
        file: ''
      uid: e801f477-6873-4aa8-8359-7be635a19924
    - text: 'The ''DistanceFromHome'' values should be numeric integers (no textual
        values and no fractional numbers). The code coerces to numeric and later performs
        division; non-numeric strings would become NaN and break downstream risk calculations.
        We could represent this as: Deequ hasDataType(''DistanceFromHome'', ConstrainableDataTypes.Integral,
        enforceType=True) or Great Expectations expect_column_values_to_be_in_type_list([''int64'',
        ''int32'']).'
      sources:
      - start_line: 19
        end_line: 23
        file: ''
      - start_line: 24
        end_line: 26
        file: ''
      uid: 8a4701df-5b1f-4a11-b04c-144487ccf9af
    - text: 'The ''DistanceFromHome'' values should be non-negative (>= 0). Negative
        distances are not meaningful; the code clips negative contributions to zero.
        We could represent this as: Deequ hasMin(''DistanceFromHome'', lambda m: m
        >= 0) or Great Expectations expect_column_min_to_be_between(min_value=0, max_value=None).'
      sources:
      - start_line: 83
        end_line: 83
        file: ''
      uid: 064141bd-7c9d-45c7-96e6-e8dbb74c4f1b
    - text: 'The ''DistanceFromHome'' values should generally be within 0 to 30 in
        the same unit the model expects (e.g., kilometers), since commute risk is
        scaled by dividing by 30 and then clipped. Values above 30 are allowed but
        should be relatively rare (e.g., at least 95% within [0, 30]). We could represent
        this as: Deequ satisfies("CASE WHEN `DistanceFromHome` BETWEEN 0 AND 30 THEN
        1 ELSE 0 END", "Typical commute range", lambda x: x >= 0.95) or Great Expectations
        expect_column_values_to_be_between(0, 30, mostly=0.95).'
