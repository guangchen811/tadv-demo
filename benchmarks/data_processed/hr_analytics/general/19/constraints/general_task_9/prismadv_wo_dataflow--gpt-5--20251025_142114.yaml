    - text: 'At least 95% of non-null ''YearsWithCurrManager'' values should be numeric-parseable
        (castable to a number). Non-numeric values are coerced to null and later treated
        as zero ratio, inflating manager-churn risk. Example (Deequ): .satisfies("CASE
        WHEN `YearsWithCurrManager` IS NULL THEN 1 WHEN CAST(`YearsWithCurrManager`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "YWCM numeric parseable", lambda
        x: x >= 0.95).'
