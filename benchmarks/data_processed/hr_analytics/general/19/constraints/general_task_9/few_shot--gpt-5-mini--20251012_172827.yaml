constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25','26-35','36-45','46-55','55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes','No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - '.hasNumberOfDistinctValues(''Department'', lambda x: x == 3)'
      - Invalid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isComplete('DistanceFromHome')
      - Valid
    - - .isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction')
      - Valid
    - - .isNonNegative('JobSatisfaction')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes','No'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k','5k-10k','10k-15k','15k+'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isComplete('WorkLifeBalance')
      - Valid
    - - .isNonNegative('WorkLifeBalance')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
