constraints:
  Age:
    code:
    - - .hasMax('Age', 100)
      - Invalid
    - - .hasMin('Age', 18)
      - Invalid
    assumptions: []
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  DailyRate:
    code:
    - - .isNonNegative('DailyRate')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  Dept_JobRole_mapping:
    code:
    - - .satisfies("((Department != 'Sales') OR (JobRole IN ('Sales Executive','Sales
        Representative'))) AND ((Department != 'Research & Development') OR (JobRole
        IN ('Research Scientist','Laboratory Technician','Research Director','Manufacturing
        Director'))) AND ((Department != 'Human Resources') OR (JobRole = 'Human Resources'))",
        'department_role_integrity')
      - Invalid
    assumptions: []
  EmpID:
    code:
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .hasMax('EmployeeCount', 1)
      - Invalid
    - - .hasMin('EmployeeCount', 1)
      - Invalid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isUnique('EmployeeNumber')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .hasMin('MonthlyIncome', 1)
      - Invalid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyRate:
    code:
    - - .isNonNegative('MonthlyRate')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .hasMax('PercentSalaryHike', 100)
      - Invalid
    - - .hasMin('PercentSalaryHike', 0)
      - Invalid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  SalarySlab_MonthlyIncome_consistency:
    code:
    - - .satisfies("((SalarySlab = 'Upto 5k' AND MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) OR (SalarySlab = '5k-10k' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab = '10k-15k' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab = '15k+' AND MonthlyIncome > 15000))", 'salary_band_consistency')
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .hasMax('StandardHours', 80)
      - Invalid
    - - .hasMin('StandardHours', 80)
      - Invalid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda v: v >= 0.90)'
      - Valid
    assumptions: []
