results:
  Age:
    code:
    - suggestion: .isNonNegative('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('Age - TotalWorkingYears >= 15', 'Career start age should
        be at least 15')
      status: true
      reason_if_failed: ''
      level: error
  AgeGroup:
    code:
    - suggestion: .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55',
        '55+'])
      status: true
      reason_if_failed: ''
      level: error
  Department:
    code:
    - suggestion: .isContainedIn('Department', ['Sales', 'Research & Development',
        'Human Resources'])
      status: true
      reason_if_failed: ''
      level: error
  MonthlyIncome:
    code:
    - suggestion: .isNonNegative('MonthlyIncome')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(SalarySlab = 'Upto 5k' AND MonthlyIncome <= 5000) OR
        (SalarySlab = '5k-10k' AND MonthlyIncome > 5000 AND MonthlyIncome <= 10000)
        OR (SalarySlab = '10k-15k' AND MonthlyIncome > 10000 AND MonthlyIncome <=
        15000) OR (SalarySlab = '15k+' AND MonthlyIncome > 15000)", 'MonthlyIncome
        must fall within the range of its SalarySlab')
      status: true
      reason_if_failed: ''
      level: error
  PerformanceRating:
    code:
    - suggestion: .isContainedIn('PerformanceRating', ['3', '4'])
      status: true
      reason_if_failed: ''
      level: error
  SalarySlab:
    code:
    - suggestion: .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      status: true
      reason_if_failed: ''
      level: error
  TotalWorkingYears:
    code:
    - suggestion: .isComplete('TotalWorkingYears')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('TotalWorkingYears >= YearsAtCompany', 'TotalWorkingYears
        must be greater than or equal to YearsAtCompany')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''TotalWorkingYears >= YearsAtCompany'',
        ''TotalWorkingYears must be greater than or equal to YearsAtCompany'')'' failed
        on data sample: Value: 0.8605442176870748 does not meet the constraint requirement!'
      level: error
  YearsAtCompany:
    code:
    - suggestion: .isComplete('YearsAtCompany')
      status: true
      reason_if_failed: ''
      level: error
