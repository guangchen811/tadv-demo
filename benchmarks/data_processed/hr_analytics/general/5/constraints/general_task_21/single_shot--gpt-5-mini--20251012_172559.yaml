constraints:
  Age:
    code:
    - - .hasDataType('Age', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Age')
      - Valid
    assumptions: []
  Age <-> AgeGroup consistency:
    code:
    - - .satisfies("((Age >= 55) AND AgeGroup = '55+') OR ((Age >= 46 AND Age < 55)
        AND AgeGroup = '46-55') OR ((Age >= 36 AND Age < 46) AND AgeGroup = '36-45')
        OR ((Age >= 26 AND Age < 36) AND AgeGroup = '26-35') OR ((Age < 26) AND AgeGroup
        = '18-25')", "age_group_consistency")
      - Invalid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .hasDataType('EmpID', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('EmpID')
      - Valid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  JobRole->Department:
    code:
    - - .satisfies("(JobRole NOT IN ('Research Scientist','Laboratory Technician','Research
        Director','Manufacturing Director','Sales Executive','Sales Representative','Healthcare
        Representative')) OR ((JobRole = 'Research Scientist' AND Department = 'Research
        & Development') OR (JobRole = 'Laboratory Technician' AND Department = 'Research
        & Development') OR (JobRole = 'Research Director' AND Department = 'Research
        & Development') OR (JobRole = 'Manufacturing Director' AND Department = 'Research
        & Development') OR (JobRole = 'Sales Executive' AND Department = 'Sales')
        OR (JobRole = 'Sales Representative' AND Department = 'Sales') OR (JobRole
        = 'Healthcare Representative' AND Department = 'Sales'))", "role_dept_consistency")
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .hasDataType('YearsAtCompany', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    assumptions: []
