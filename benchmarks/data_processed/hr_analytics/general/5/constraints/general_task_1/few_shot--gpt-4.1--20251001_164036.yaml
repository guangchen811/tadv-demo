constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ["18-25", "26-35", "36-45", "46-55", "55+"])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ["Yes", "No"])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ["Sales", "Research & Development", "Human Resources"])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - '.hasNumberOfDistinctValues(''EmpID'', lambda x: x >= 848)'
      - Invalid
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isComplete('EmployeeCount')
      - Valid
    - - .isContainedIn('EmployeeCount', [1])
      - Invalid
    assumptions: []
  EmployeeNumber:
    code:
    - - '.hasNumberOfDistinctValues(''EmployeeNumber'', lambda x: x >= 876)'
      - Invalid
    - - .isComplete('EmployeeNumber')
      - Valid
    assumptions: []
  JobRole:
    code:
    - - '.hasNumberOfDistinctValues(''JobRole'', lambda x: x >= 9)'
      - Invalid
    - - .isComplete('JobRole')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18')
      - Valid
    - - .isContainedIn('Over18', ["Y"])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ["Yes", "No"])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ["Upto 5k", "5k-10k", "10k-15k", "15k+"])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isComplete('StandardHours')
      - Valid
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95)'
      - Valid
    assumptions: []
  id:
    code:
    - - '.hasNumberOfDistinctValues(''id'', lambda x: x >= 864)'
      - Invalid
    - - .isComplete('id')
      - Valid
    assumptions: []
