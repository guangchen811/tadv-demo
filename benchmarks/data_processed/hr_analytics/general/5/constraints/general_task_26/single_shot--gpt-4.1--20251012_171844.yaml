constraints:
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', [1,2,3,4,5])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  NewJobLevel:
    code:
    - - .isComplete('NewJobLevel')
      - Invalid
    - - .isContainedIn('NewJobLevel', [1,2,3,4,5,6])
      - Invalid
    assumptions: []
  NewMonthlyIncome:
    code:
    - - .isComplete('NewMonthlyIncome')
      - Invalid
    - - .isNonNegative('NewMonthlyIncome')
      - Invalid
    assumptions: []
  NewSalarySlab:
    code:
    - - .isComplete('NewSalarySlab')
      - Invalid
    - - .isContainedIn('NewSalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Invalid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3,4])
      - Invalid
    assumptions: []
  PromoKickerPct:
    code:
    - - .isComplete('PromoKickerPct')
      - Invalid
    - - .isNonNegative('PromoKickerPct')
      - Invalid
    assumptions: []
  PromotionRecommended:
    code:
    - - .isComplete('PromotionRecommended')
      - Invalid
    assumptions: []
  RecommendedRaisePct:
    code:
    - - .isComplete('RecommendedRaisePct')
      - Invalid
    - - .isNonNegative('RecommendedRaisePct')
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  TotalRaisePct:
    code:
    - - '.hasMax(''TotalRaisePct'', lambda x: x <= 0.2)'
      - Invalid
    - - .isComplete('TotalRaisePct')
      - Invalid
    - - .isNonNegative('TotalRaisePct')
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
