constraints:
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['Non-Travel', 'Travel_Rarely', 'Travel_Frequently',
        'TravelRarely'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .hasMax('JobLevel', 5)
      - Invalid
    - - .hasMin('JobLevel', 1)
      - Invalid
    - - .isComplete('JobLevel')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .hasMin('MonthlyIncome', 0)
      - Invalid
    - - .isComplete('MonthlyIncome')
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .hasMin('PercentSalaryHike', 0)
      - Invalid
    - - .isComplete('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .hasMin('YearsAtCompany', 0)
      - Invalid
    - - .isComplete('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .hasMin('YearsInCurrentRole', 0)
      - Invalid
    - - .isComplete('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    assumptions: []
