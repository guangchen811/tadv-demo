  '["EnvironmentSatisfaction","JobSatisfaction","OverTime","WorkLifeBalance"]':
    code: []
    assumptions:
    - text: "WorkLifeBalance, JobSatisfaction, and EnvironmentSatisfaction are 1\u2013\
        4 ordinal integers (no nulls) so that the normalization ((x - 1) / 3) yields\
        \ values in [0,1] without clipping. Deequ example: .satisfies(\"WorkLifeBalance\
        \ BETWEEN 1 AND 4 AND JobSatisfaction BETWEEN 1 AND 4 AND EnvironmentSatisfaction\
        \ BETWEEN 1 AND 4\", \"sat_1_to_4\") and .areComplete([\"WorkLifeBalance\"\
        ,\"JobSatisfaction\",\"EnvironmentSatisfaction\"])."
      sources:
      - start_line: 90
        end_line: 94
        file: ''
      uid: 252c996c-376f-4c48-adcd-e063e6522136
    - text: 'The normalized satisfaction score columns are deterministic functions
        of their raw counterparts: WLBScore == ((WorkLifeBalance - 1) / 3), JobSatScore
        == ((JobSatisfaction - 1) / 3), EnvSatScore == ((EnvironmentSatisfaction -
        1) / 3). Deequ examples: .satisfies("abs(WLBScore - ((WorkLifeBalance - 1.0)/3.0))
        < 1e-6", "wlb_norm_ok"); .satisfies("abs(JobSatScore - ((JobSatisfaction -
        1.0)/3.0)) < 1e-6", "jobsat_norm_ok"); .satisfies("abs(EnvSatScore - ((EnvironmentSatisfaction
        - 1.0)/3.0)) < 1e-6", "envsat_norm_ok").'
      sources:
      - start_line: 90
        end_line: 94
        file: ''
      uid: 6e28e544-b95e-422f-9829-be1da85b3819
    - text: 'OverTime must be exactly one of {''Yes'',''No''}, and OverTimeInd is
        its faithful encoding: OverTime == ''Yes'' implies OverTimeInd == 1, and OverTime
        == ''No'' implies OverTimeInd == 0. Deequ examples: .satisfies("OverTime IN
        (''Yes'',''No'')", "overtime_domain"); .satisfies("(OverTime = ''Yes'' AND
        OverTimeInd = 1) OR (OverTime = ''No'' AND OverTimeInd = 0)", "overtime_ind_mapping").'
      sources:
      - start_line: 88
        end_line: 88
        file: ''
      - start_line: 126
        end_line: 131
        file: ''
      uid: 9f2a2dcd-d183-485b-b4fa-5974452e11fb
    - text: 'AttritionRiskScore is exactly the logistic of a fixed weighted linear
        combination of feature columns: AttritionRiskScore == 1/(1 + exp(-linear)),
        where linear = (-1.0) + 1.2*OverTimeInd - 1.0*WLBScore - 0.8*JobSatScore -
        0.5*EnvSatScore + 0.6*RoleTenureRatio + 0.4*MgrTenureRatio + 0.7*SincePromoRatio
        + 0.5*AgeGroupRisk + 0.8*SlabRiskComponent + 0.6*WithinSlabUnderpay. Deequ
        example: .satisfies("abs(AttritionRiskScore - (1.0/(1.0 + exp(-(-1.0 + 1.2*OverTimeInd
        - 1.0*WLBScore - 0.8*JobSatScore - 0.5*EnvSatScore + 0.6*RoleTenureRatio +
        0.4*MgrTenureRatio + 0.7*SincePromoRatio + 0.5*AgeGroupRisk + 0.8*SlabRiskComponent
        + 0.6*WithinSlabUnderpay)))) ) < 1e-6", "risk_score_formula_ok").'
      sources:
      - start_line: 112
        end_line: 140
        file: ''
      uid: a78c4aeb-d53c-4b81-a5c5-2a1efc0e42e3
    - text: 'RiskTier must be consistent with the binning of AttritionRiskScore using
        bins [0.0, 0.35, 0.60, 1.0] (include_lowest, right-closed): ''Low'' for 0.0
        <= score <= 0.35, ''Medium'' for 0.35 < score <= 0.60, ''High'' for 0.60 <
        score <= 1.0. Deequ example: .satisfies("(AttritionRiskScore >= 0.0 AND AttritionRiskScore
        <= 0.35 AND RiskTier = ''Low'') OR (AttritionRiskScore > 0.35 AND AttritionRiskScore
        <= 0.60 AND RiskTier = ''Medium'') OR (AttritionRiskScore > 0.60 AND AttritionRiskScore
        <= 1.0 AND RiskTier = ''High'')", "risk_tier_binning_ok").'
      sources:
      - start_line: 140
        end_line: 145
        file: ''
      uid: 1860dc3b-05c3-49ab-a0d9-c39c9f7ec736
