        and AgeGroupOrd must equal {1,2,3,4,5} respectively (no null ordinals). This
        ensures downstream AgeGroupRisk mapping is well-defined. Example Deequ: .satisfies(''CASE
        WHEN AgeGroup = ''''18-25'''' THEN AgeGroupOrd = 1 WHEN AgeGroup = ''''26-35''''
        THEN AgeGroupOrd = 2 WHEN AgeGroup = ''''36-45'''' THEN AgeGroupOrd = 3 WHEN
        AgeGroup = ''''46-55'''' THEN AgeGroupOrd = 4 WHEN AgeGroup = ''''55+''''
