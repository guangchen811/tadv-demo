    - text: 'Department constrains the set of allowed JobRoles: Sales allows {''Sales
        Executive'',''Sales Representative'',''Healthcare Representative'',''Manager''};
        Research & Development allows {''Research Scientist'',''Research Director'',''Laboratory
        Technician'',''Manufacturing Director'',''Manager''}; Human Resources allows
        {''Human Resources'',''Manager''}. This can be expressed with Deequ: .satisfies("case
        when Department = ''Sales'' then JobRole in (''Sales Executive'',''Sales Representative'',''Healthcare
        Representative'',''Manager'') when Department = ''Research & Development''
        then JobRole in (''Research Scientist'',''Research Director'',''Laboratory
        Technician'',''Manufacturing Director'',''Manager'') when Department = ''Human
        Resources'' then JobRole in (''Human Resources'',''Manager'') else false end",
        assertionName = ''department_to_jobrole_allowed_set'', minFraction = 1.0).'
      sources:
      - start_line: 148
        end_line: 155
        file: ''
      uid: cef07cab-053d-4a40-8ec6-ed7f0b5618d1
    - text: 'Only an enumerated set of (Department, JobRole) pairs is allowed across
        the dataset: {''Sales|Sales Executive'',''Sales|Sales Representative'',''Sales|Healthcare
        Representative'',''Sales|Manager'',''Research & Development|Research Scientist'',''Research
        & Development|Research Director'',''Research & Development|Laboratory Technician'',''Research
        & Development|Manufacturing Director'',''Research & Development|Manager'',''Human
        Resources|Human Resources'',''Human Resources|Manager''}. In Deequ: .satisfies("concat(Department,''|'',JobRole)
        IN (''Sales|Sales Executive'',''Sales|Sales Representative'',''Sales|Healthcare
        Representative'',''Sales|Manager'',''Research & Development|Research Scientist'',''Research
        & Development|Research Director'',''Research & Development|Laboratory Technician'',''Research
        & Development|Manufacturing Director'',''Research & Development|Manager'',''Human
        Resources|Human Resources'',''Human Resources|Manager'')", assertionName =
        ''allowed_department_jobrole_pairs'', minFraction = 1.0).'
