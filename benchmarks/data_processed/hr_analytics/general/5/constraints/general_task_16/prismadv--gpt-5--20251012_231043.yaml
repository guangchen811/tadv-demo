      uid: c78647ff-252e-4120-a92c-432749b4e6e0
    - text: 'MonthlyIncome values may be null or non-numeric in the raw CSV (they
        are coerced to NaN), but for every SalarySlab present in the data there must
        be at least one non-null numeric MonthlyIncome to allow the group median and
        percentile rank to be computed. A suitable rule is: for each distinct SalarySlab,
        count_nonnull(MonthlyIncome) >= 1. In Great Expectations, this can be enforced
        via a grouped check (e.g., custom expectation or grouped aggregation) ensuring
        each SalarySlab group has at least one non-null MonthlyIncome.'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 108
        end_line: 108
        file: ''
      uid: 6a9534b0-1d1b-4301-b9b5-1eb544484e07
    - text: 'MonthlyIncome should be non-negative and consistent with the declared
        SalarySlab ranges: Upto 5k => [0, 5000], 5k-10k => [5001, 10000], 10k-15k
        => [10001, 15000], 15k+ => [15001, +inf). A practical validation is that at
        least 95% of rows satisfy these conditional ranges. Example Deequ rule: .satisfies("CASE
        WHEN SalarySlab = ''Upto 5k'' THEN (MonthlyIncome >= 0 AND MonthlyIncome <=
        5000) WHEN SalarySlab = ''5k-10k'' THEN (MonthlyIncome >= 5001 AND MonthlyIncome
        <= 10000) WHEN SalarySlab = ''10k-15k'' THEN (MonthlyIncome >= 10001 AND MonthlyIncome
        <= 15000) WHEN SalarySlab = ''15k+'' THEN (MonthlyIncome >= 15001) ELSE TRUE
        END", "Income matches slab", lambda x: x >= 0.95)'
      sources:
      - start_line: 30
        end_line: 35
        file: ''
      - start_line: 65
        end_line: 67
        file: ''
      uid: 66a51c90-7164-410d-91a0-64564df9f28c
    - text: 'There should be a strong monotonic relationship between SalarySlab and
        MonthlyIncome: the median MonthlyIncome should be non-decreasing across slabs
        in ordinal order (Upto 5k <= 5k-10k <= 10k-15k <= 15k+). This can be validated
        by computing per-slab medians and asserting median(slab_k) <= median(slab_{k+1})
        for adjacent slabs, allowing a small tolerance for noise (e.g., 95% compliance).'
      sources:
      - start_line: 36
        end_line: 37
        file: ''
      - start_line: 65
        end_line: 67
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: 6ccb9474-1673-4db7-a7bb-8be8e5e17d01
    - text: 'The ''MonthlyIncome'' column is intended to be numeric. Values should
        be parseable as numbers for the vast majority of rows (e.g., >= 95% compliance),
        since non-numeric values will be coerced to null before downstream use. Example:
        Deequ .hasDataType("MonthlyIncome", ConstrainableDataTypes.Numeric, lambda
        x: x >= 0.95) or Great Expectations expect_column_values_to_be_in_type_list
        with [''int64'', ''float64''] and mostly=0.95.'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
