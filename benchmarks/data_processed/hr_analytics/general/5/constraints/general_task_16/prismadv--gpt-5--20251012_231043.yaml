        remain within [0,1] without clipping: YearsInCurrentRole <= YearsAtCompany,
        YearsSinceLastPromotion <= YearsAtCompany, YearsWithCurrManager <= YearsAtCompany,
        and YearsAtCompany <= TotalWorkingYears. Enforce with per-row inequalities
