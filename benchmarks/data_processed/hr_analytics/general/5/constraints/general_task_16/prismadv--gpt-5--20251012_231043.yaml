        null) YearsWithCurrManager <= YearsAtCompany. This keeps the raw ratios in
        [0,1] without relying on clip/fill. Deequ example: check.isLessThanOrEqualTo(''YearsInCurrentRole'',''YearsAtCompany'').isLessThanOrEqualTo(''YearsSinceLastPromotion'',''YearsAtCompany'').isLessThanOrEqualTo(''YearsWithCurrManager'',''YearsAtCompany'',
        where=''YearsWithCurrManager IS NOT NULL'')'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      uid: 50bcc951-6e31-4e2e-94f6-c954c290da93
    - text: 'If YearsAtCompany = 0, then YearsInCurrentRole, YearsSinceLastPromotion,
        and YearsWithCurrManager must each be 0 or null (to avoid undefined ratios
        that are silently zeroed). Deequ example: check.satisfies(''case when YearsAtCompany
        = 0 then coalesce(YearsInCurrentRole,0)=0 and coalesce(YearsSinceLastPromotion,0)=0
        and coalesce(YearsWithCurrManager,0)=0 else true end'', ''zero_yac_implies_zero_tenures'')'
      sources:
      - start_line: 81
        end_line: 85
        file: ''
      uid: bfd069ec-872e-4c7f-9f80-e88d9083f298
    - text: 'YearsAtCompany must not exceed TotalWorkingYears for any record (both
        represent non-negative durations). Deequ example: check.isLessThanOrEqualTo(''YearsAtCompany'',''TotalWorkingYears'')'
      sources:
      - start_line: 76
        end_line: 78
        file: ''
      uid: 81f1f6ee-8d72-4e7a-8c01-5598f31a57f2
    - text: "MonthlyIncome must be consistent with the declared SalarySlab whenever\
        \ both are present: 'Upto 5k' => 0\u20135000, '5k-10k' => 5001\u201310000,\
        \ '10k-15k' => 10001\u201315000, '15k+' => >=15001. Deequ example: check.satisfies('(MonthlyIncome\
        \ IS NULL) OR (case when SalarySlab = ''Upto 5k'' then MonthlyIncome between\
        \ 0 and 5000 when SalarySlab = ''5k-10k'' then MonthlyIncome between 5001\
        \ and 10000 when SalarySlab = ''10k-15k'' then MonthlyIncome between 10001\
        \ and 15000 when SalarySlab = ''15k+'' then MonthlyIncome >= 15001 else false\
        \ end)', 'monthly_income_matches_slab')"
      sources:
      - start_line: 30
        end_line: 37
        file: ''
      - start_line: 65
        end_line: 74
        file: ''
      uid: 7516f52f-1361-4453-80f3-90bff3f41746
    - text: "AgeGroup must be consistent with Age when both are present: 18\u2013\
        25 => '18-25', 26\u201335 => '26-35', 36\u201345 => '36-45', 46\u201355 =>\
        \ '46-55', >=55 => '55+'. Deequ example: check.satisfies('(Age IS NULL OR\
        \ AgeGroup IS NULL) OR (case when Age between 18 and 25 then AgeGroup = ''18-25''\
        \ when Age between 26 and 35 then AgeGroup = ''26-35'' when Age between 36\
        \ and 45 then AgeGroup = ''36-45'' when Age between 46 and 55 then AgeGroup\
        \ = ''46-55'' when Age >= 55 then AgeGroup = ''55+'' else false end)', 'age_matches_agegroup')"
      sources:
      - start_line: 38
        end_line: 56
        file: ''
      - start_line: 61
        end_line: 63
        file: ''
      uid: 5242f2b9-a84b-4d64-a90b-ef07c7e2d747
  '["YearsAtCompany","YearsInCurrentRole","YearsSinceLastPromotion","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'For tenure-derived ratios to be meaningful, the tenure numerators must
        be bounded by YearsAtCompany. Specifically, for any record with YearsAtCompany
        > 0: 0 <= YearsInCurrentRole <= YearsAtCompany, 0 <= YearsSinceLastPromotion
        <= YearsAtCompany, and 0 <= coalesce(YearsWithCurrManager, 0) <= YearsAtCompany.
        Deequ example: check.satisfies("YearsAtCompany <= 0 OR (YearsInCurrentRole
        >= 0 AND YearsInCurrentRole <= YearsAtCompany AND YearsSinceLastPromotion
        >= 0 AND YearsSinceLastPromotion <= YearsAtCompany AND coalesce(YearsWithCurrManager,
        0) >= 0 AND coalesce(YearsWithCurrManager, 0) <= YearsAtCompany)", ["YearsAtCompany",
        "YearsInCurrentRole", "YearsSinceLastPromotion", "YearsWithCurrManager"])'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      uid: 9ccae18a-2706-45af-95da-3fe8843d8871
    - text: 'If YearsAtCompany == 0, then the related tenures must be 0 (or null for
        manager tenure): YearsInCurrentRole == 0, YearsSinceLastPromotion == 0, and
        (YearsWithCurrManager is null OR YearsWithCurrManager == 0). This aligns with
        replacing zero denominators and filling manager tenure nulls with 0 before
        ratio computation. Deequ example: check.satisfies("YearsAtCompany != 0 OR
        (YearsInCurrentRole = 0 AND YearsSinceLastPromotion = 0 AND (YearsWithCurrManager
        IS NULL OR YearsWithCurrManager = 0))", ["YearsAtCompany", "YearsInCurrentRole",
        "YearsSinceLastPromotion", "YearsWithCurrManager"])'
      sources:
      - start_line: 80
        end_line: 85
        file: ''
      uid: 05e15bd3-34aa-4c4e-b591-92c6c6aec4e8
    - text: 'Tenure consistency across career: YearsAtCompany must not exceed TotalWorkingYears
        when TotalWorkingYears is present. Deequ example: check.satisfies("TotalWorkingYears
        IS NULL OR YearsAtCompany <= TotalWorkingYears", ["YearsAtCompany", "TotalWorkingYears"])'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      - start_line: 76
        end_line: 77
        file: ''
