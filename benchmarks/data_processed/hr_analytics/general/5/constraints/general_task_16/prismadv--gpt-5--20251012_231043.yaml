    assumptions:
    - text: 'The SalarySlab column must exist and be non-null for all rows; downstream
        mapping, grouping, and risk computation do not handle nulls and would otherwise
        produce NaNs and drop rows from scoring. We could represent this as a deequ
        constraint like: .hasCompleteness(''SalarySlab'', lambda c: c == 1.0).'
      sources:
      - start_line: 67
        end_line: 67
        file: ''
      - start_line: 69
        end_line: 73
        file: ''
      - start_line: 107
        end_line: 108
