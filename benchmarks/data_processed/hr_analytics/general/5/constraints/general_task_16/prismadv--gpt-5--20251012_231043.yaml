  '["Department","JobRole"]':
    code: []
    assumptions:
    - text: 'JobRole determines the valid Department: Sales roles must appear only
        under Sales, R&D roles only under Research & Development, HR role only under
        Human Resources, and Manager can appear in any department. This can be represented
        in Deequ as a conditional mapping constraint, for example: .satisfies("case
        when JobRole in (''Sales Executive'',''Sales Representative'',''Healthcare
        Representative'') then Department = ''Sales'' when JobRole in (''Research
        Scientist'',''Research Director'',''Laboratory Technician'',''Manufacturing
        Director'') then Department = ''Research & Development'' when JobRole = ''Human
        Resources'' then Department = ''Human Resources'' when JobRole = ''Manager''
        then Department in (''Sales'',''Research & Development'',''Human Resources'')
        else false end", assertionName = ''jobrole_to_department_mapping'', minFraction
        = 1.0).'
      sources:
      - start_line: 148
        end_line: 155
        file: ''
