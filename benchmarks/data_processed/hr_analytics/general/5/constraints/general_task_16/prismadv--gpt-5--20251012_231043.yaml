    - text: '''EnvironmentSatisfaction'' values should be on a 4-point Likert scale
        encoded as integers 1, 2, 3, or 4. Values outside this set would be clipped
        after scaling, which would silently saturate the score and distort risk. We
        could represent this assumption as a deequ constraint like satisfies(''CASE
        WHEN cast(EnvironmentSatisfaction AS DOUBLE) BETWEEN 1 AND 4 AND cast(EnvironmentSatisfaction
        AS DOUBLE) = floor(cast(EnvironmentSatisfaction AS DOUBLE)) THEN 1 ELSE 0
        END'', ''EnvSat discrete 1-4'', lambda x: x == 1.0) or isContainedIn(''EnvironmentSatisfaction'',
        [1,2,3,4]).'
