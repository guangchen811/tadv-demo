      - start_line: 136
        end_line: 140
        file: ''
      - start_line: 145
        end_line: 145
        file: ''
      - start_line: 149
        end_line: 155
        file: ''
      uid: eae2b68b-cda0-4f1e-8760-7191d52261ea
    - text: 'SalarySlab values must be exactly one of the four expected categories
        (case-sensitive, no extra whitespace): ''Upto 5k'', ''5k-10k'', ''10k-15k'',
        ''15k+''. Any other value will fail the ordinal mapping and downstream calculations.
        We could represent this as: .satisfies("CASE WHEN `SalarySlab` IN (''Upto
        5k'',''5k-10k'',''10k-15k'',''15k+'') THEN 1 ELSE 0 END", ''Valid SalarySlab'',
        lambda x: x == 1.0).'
      sources:
      - start_line: 29
        end_line: 36
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: 59f08e3e-8440-4843-a536-bba6f5f67748
    - text: 'For rows with a non-null MonthlyIncome, the value must match the numeric
        range implied by SalarySlab: ''Upto 5k'' => [0, 5000], ''5k-10k'' => [5001,
        10000], ''10k-15k'' => [10001, 15000], ''15k+'' => [15001, +inf). This alignment
        is assumed by the risk-shaping logic and imputation strategy. We could represent
        this as: .satisfies("CASE WHEN `MonthlyIncome` IS NULL THEN 1 WHEN `SalarySlab`=''Upto
        5k'' AND `MonthlyIncome` BETWEEN 0 AND 5000 THEN 1 WHEN `SalarySlab`=''5k-10k''
        AND `MonthlyIncome` BETWEEN 5001 AND 10000 THEN 1 WHEN `SalarySlab`=''10k-15k''
        AND `MonthlyIncome` BETWEEN 10001 AND 15000 THEN 1 WHEN `SalarySlab`=''15k+''
        AND `MonthlyIncome` >= 15001 THEN 1 ELSE 0 END", ''MonthlyIncome matches SalarySlab
        range'', lambda x: x == 1.0).'
      sources:
      - start_line: 29
        end_line: 35
        file: ''
      - start_line: 65
        end_line: 66
        file: ''
      - start_line: 69
        end_line: 73
        file: ''
      uid: b9ed7d9f-8c5b-47d3-92ac-dd20eca1d77e
    - text: For any row where MonthlyIncome is null, SalarySlab must still be a valid
        category and there must exist at least one non-null MonthlyIncome within that
        same SalarySlab group so that median imputation and within-slab ranking can
        be computed. This can be validated by ensuring, for every present SalarySlab,
        count_if(MonthlyIncome IS NOT NULL) >= 1. In Great Expectations, this can
        be implemented via a grouped check (per SalarySlab) on non-null counts.
      sources:
      - start_line: 65
        end_line: 70
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 1b8fc43b-0d7f-4130-9f0a-5d0b27c49711
    - text: 'SalarySlab categories are treated as ordinal from lowest to highest pay
        via a fixed mapping; therefore, any unexpected relabeling or reordering would
        break risk computation. The labels must retain their intended order: ''Upto
        5k'' < ''5k-10k'' < ''10k-15k'' < ''15k+''. We could represent a safeguard
        by asserting that mapping to ordinals yields values in {1,2,3,4} for all rows:
        .satisfies("CASE WHEN `SalarySlab` IN (''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'')
        THEN 1 ELSE 0 END", ''Ordinal mapping valid'', lambda x: x == 1.0).'
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      - start_line: 107
        end_line: 107
        file: ''
