constraints:
  Age:
    code:
    - - .hasDataType('Age', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Age'', lambda v: v <= 60.0)'
      - Valid
    - - '.hasMin(''Age'', lambda v: v >= 18.0)'
      - Valid
    - - .isComplete('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25','26-35','36-45','46-55','55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes','No'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['Non-Travel','Travel_Rarely','Travel_Frequently','TravelRarely'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales','Research & Development','Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .hasPattern('EmpID', r'^RM\d{3,4}$')
      - Valid
    - - '.hasUniqueness([''EmpID''], lambda v: v >= 0.95)'
      - Valid
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .hasDataType('EmployeeCount', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''EmployeeCount'', lambda v: v == 1.0)'
      - Valid
    - - '.hasMin(''EmployeeCount'', lambda v: v == 1.0)'
      - Valid
    - - .isComplete('EmployeeCount')
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - .hasDataType('EmployeeNumber', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .hasDataType('JobLevel', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', [1,2,3,4,5])
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    - - .isContainedIn('JobRole', ['Research Director','Sales Representative','Research
        Scientist','Manufacturing Director','Healthcare Representative','Sales Executive','Manager','Human
        Resources','Laboratory Technician'])
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .hasDataType('MonthlyIncome', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18')
      - Valid
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes','No'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .hasDataType('PercentSalaryHike', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''PercentSalaryHike'', lambda v: v <= 60.0)'
      - Valid
    - - .isComplete('PercentSalaryHike')
      - Valid
    - - .isNonNegative('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .hasDataType('PerformanceRating', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3,4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k','5k-10k','10k-15k','15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .hasDataType('StandardHours', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''StandardHours'', lambda v: v == 80.0)'
      - Valid
    - - '.hasMin(''StandardHours'', lambda v: v == 80.0)'
      - Valid
    - - .isComplete('StandardHours')
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .hasDataType('TotalWorkingYears', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('TotalWorkingYears')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .hasDataType('YearsAtCompany', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .hasDataType('YearsInCurrentRole', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .hasDataType('YearsSinceLastPromotion', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda v: v >= 0.95)'
      - Valid
    - - .hasDataType('YearsWithCurrManager', ConstrainableDataTypes.Numeric)
      - Valid
    assumptions: []
