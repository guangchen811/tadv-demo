constraints:
  Age:
    code:
    - - '.hasMax(''Age'', lambda v: v <= 70)'
      - Valid
    - - '.hasMin(''Age'', lambda v: v >= 18)'
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isContainedIn('BusinessTravel', ['Non-Travel', 'Travel_Rarely', 'Travel_Frequently'])
      - Invalid
    assumptions: []
  DailyRate:
    code:
    - - .isNonNegative('DailyRate')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  Department_JobRole:
    code:
    - - '.satisfies(''((JobRole IN (\''Sales Executive\'', \''Sales Representative\'')
        AND Department = \''Sales\'') OR (JobRole = \''Human Resources\'' AND Department
        = \''Human Resources\'') OR (JobRole IN (\''Research Director\'', \''Research
        Scientist\'', \''Laboratory Technician\'', \''Manufacturing Director\'', \''Healthcare
        Representative\'') AND Department = \''Research & Development\'') OR (JobRole
        = \''Manager\''))'', ''jobrole_department_consistency'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isComplete('DistanceFromHome')
      - Valid
    - - .isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  Education:
    code:
    - - .isContainedIn('Education', [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  EducationField:
    code:
    - - .isContainedIn('EducationField', ['Life Sciences', 'Medical', 'Marketing',
        'Technical Degree', 'Human Resources', 'Other'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isContainedIn('EmployeeCount', [1])
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  HourlyRate:
    code:
    - - .isNonNegative('HourlyRate')
      - Valid
    assumptions: []
  JobInvolvement:
    code:
    - - .isContainedIn('JobInvolvement', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  JobLevel:
    code:
    - - .isContainedIn('JobLevel', [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    - - .isContainedIn('JobRole', ['Research Director', 'Sales Representative', 'Research
        Scientist', 'Manufacturing Director', 'Healthcare Representative', 'Sales
        Executive', 'Manager', 'Human Resources', 'Laboratory Technician'])
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction')
      - Valid
    - - .isContainedIn('JobSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  MaritalStatus:
    code:
    - - .isContainedIn('MaritalStatus', ['Single', 'Married', 'Divorced'])
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyRate:
    code:
    - - .isNonNegative('MonthlyRate')
      - Valid
    assumptions: []
  NumCompaniesWorked:
    code:
    - - .isNonNegative('NumCompaniesWorked')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - '.hasMax(''PercentSalaryHike'', lambda v: v <= 50)'
      - Valid
    - - '.hasMin(''PercentSalaryHike'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  SalarySlab_MonthlyIncome:
    code:
    - - '.satisfies(''((SalarySlab = \''Upto 5k\'' AND MonthlyIncome <= 5000) OR (SalarySlab
        = \''5k-10k\'' AND MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab
        = \''10k-15k\'' AND MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab
        = \''15k+\'' AND MonthlyIncome > 15000))'', ''salary_slab_matches_income'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  StockOptionLevel:
    code:
    - - .isContainedIn('StockOptionLevel', [0, 1, 2, 3])
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  TrainingTimesLastYear:
    code:
    - - .isContainedIn('TrainingTimesLastYear', [0, 1, 2, 3, 4, 5, 6])
      - Invalid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isComplete('WorkLifeBalance')
      - Valid
    - - .isContainedIn('WorkLifeBalance', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda v: v >= 0.95)'
      - Valid
    assumptions: []
  _dataset_:
    code:
    - - '.hasSize(lambda v: v > 0)'
      - Valid
    assumptions: []
