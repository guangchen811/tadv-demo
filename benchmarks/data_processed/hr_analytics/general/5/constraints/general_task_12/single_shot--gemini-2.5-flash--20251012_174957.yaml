constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age').isGreaterThanOrEqualTo('Age', 18)
      - Invalid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['Travel_Rarely', 'Travel_Frequently', 'Non-Travel'])
      - Invalid
    assumptions: []
  DailyRate:
    code:
    - - .isComplete('DailyRate')
      - Valid
    - - .isPositive('DailyRate')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isComplete('DistanceFromHome')
      - Valid
    - - .isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  Education:
    code:
    - - .isComplete('Education')
      - Valid
    - - .isContainedIn('Education', [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  EducationField:
    code:
    - - .isComplete('EducationField')
      - Valid
    - - .isContainedIn('EducationField', ['Marketing', 'Medical', 'Life Sciences',
        'Other', 'Technical Degree', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isComplete('EmployeeCount')
      - Valid
    - - .isContainedIn('EmployeeCount', [1])
      - Invalid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    - - .isUnique('EmployeeNumber')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isComplete('EnvironmentSatisfaction')
      - Valid
    - - .isContainedIn('EnvironmentSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  HourlyRate:
    code:
    - - .isComplete('HourlyRate')
      - Valid
    - - .isPositive('HourlyRate')
      - Valid
    assumptions: []
  JobInvolvement:
    code:
    - - .isComplete('JobInvolvement')
      - Valid
    - - .isContainedIn('JobInvolvement', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    - - .isContainedIn('JobRole', ['Sales Executive', 'Research Scientist', 'Laboratory
        Technician', 'Manufacturing Director', 'Healthcare Representative', 'Manager',
        'Sales Representative', 'Human Resources', 'Research Director'])
      - Valid
    assumptions: []
  JobRole_Department_Consistency:
    code:
    - - .satisfies("(JobRole = 'Sales Executive' AND Department = 'Sales') OR (JobRole
        = 'Sales Representative' AND Department = 'Sales') OR (JobRole = 'Healthcare
        Representative' AND Department = 'Sales') OR (JobRole = 'Research Scientist'
        AND Department = 'Research & Development') OR (JobRole = 'Laboratory Technician'
        AND Department = 'Research & Development') OR (JobRole = 'Research Director'
        AND Department = 'Research & Development') OR (JobRole = 'Manufacturing Director'
        AND Department = 'Research & Development') OR (JobRole = 'Human Resources'
        AND Department = 'Human Resources')", "JobRole matches Department according
        to program logic")
      - Invalid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction')
      - Valid
    - - .isContainedIn('JobSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  MaritalStatus:
    code:
    - - .isComplete('MaritalStatus')
