  '["Age","TotalWorkingYears"]':
    code: []
    assumptions:
    - text: 'Total working experience must be feasible given age: for every row, TotalWorkingYears
        <= Age - 18 (assuming minimum working age is 18). This keeps experience_cap
        and experience_gap non-negative. Deequ example: .satisfies(''TotalWorkingYears
        <= Age - 18'', ''twy_le_age_minus_18'')'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: 2b04acd4-72bf-4df3-9bd4-bc4db41cd796
    - text: 'Company tenure cannot exceed total experience: YearsAtCompany <= TotalWorkingYears
        for all rows, ensuring tenure_ratio stays in [0, 1] without relying on clipping.
        Deequ example: .satisfies(''YearsAtCompany <= TotalWorkingYears'', ''yac_le_twy'')'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: 5fdcc9d1-0825-4ed9-aa54-d9f59ee3f437
    - text: 'No tenure if no experience: If TotalWorkingYears = 0, then YearsAtCompany
        must be 0. This avoids semantically invalid ratios masked by the replace-with-NaN-and-fill-0
        logic. Deequ example: .satisfies(''case when TotalWorkingYears = 0 then YearsAtCompany
        = 0 else true end'', ''zero_twy_implies_zero_yac'')'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: 8bf24c1f-2367-4454-928f-619faa6dc45f
    - text: 'Company tenure must also be feasible given age: YearsAtCompany <= Age
        - 18 (cannot have tenure exceeding maximum plausible working years). Deequ
        example: .satisfies(''YearsAtCompany <= Age - 18'', ''yac_le_age_minus_18'')'
      sources:
      - start_line: 50
        end_line: 54
        file: ''
      uid: c8802db5-71a8-4d2d-b9c9-a3ab6fbbabb1
  '["Age","YearsAtCompany"]':
    code: []
    assumptions:
    - text: 'Relational integrity between ''YearsAtCompany'' and ''TotalWorkingYears'':
        For every record, 0 <= YearsAtCompany <= TotalWorkingYears. In particular,
        if TotalWorkingYears = 0 then YearsAtCompany must be 0. This ensures the computed
        ''tenure_ratio'' is finite and within [0, 1]. Example Deequ constraint(s):
        .satisfies(''YearsAtCompany >= 0 and TotalWorkingYears >= 0'', ''yac_twy_nonneg'')
        and .satisfies(''YearsAtCompany <= TotalWorkingYears'', ''yac_le_twy'') and
        .satisfies(''(TotalWorkingYears = 0 and YearsAtCompany = 0) or (TotalWorkingYears
        > 0)'', ''zero_twy_implies_zero_yac'').'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: 1d4a8d9d-eb2f-4530-bff3-933b98675d98
    - text: "Age\u2013total experience feasibility: If Age >= 18, then TotalWorkingYears\
        \ must be <= Age - 18; if Age < 18, then TotalWorkingYears must be 0. This\
        \ aligns with the 'experience_cap' and 'experience_gap' features that assume\
        \ working starts at age 18. Example Deequ constraint: .satisfies('(Age >=\
        \ 18 and TotalWorkingYears <= Age - 18) or (Age < 18 and TotalWorkingYears\
        \ = 0)', 'twy_vs_age_feasible')."
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: 432e88a7-05c6-4d3b-aa8e-ef53a9306c66
    - text: 'Company tenure feasibility vs age: If Age >= 18, then YearsAtCompany
        must be <= Age - 18; if Age < 18, then YearsAtCompany must be 0. This follows
        from the working-start-age assumption and the requirement that company tenure
        cannot exceed total experience. Example Deequ constraint: .satisfies(''(Age
        >= 18 and YearsAtCompany <= Age - 18) or (Age < 18 and YearsAtCompany = 0)'',
        ''yac_vs_age_feasible'').'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      uid: 51e4b8ba-1ccf-4b80-bf75-6f1f6a294a9d
