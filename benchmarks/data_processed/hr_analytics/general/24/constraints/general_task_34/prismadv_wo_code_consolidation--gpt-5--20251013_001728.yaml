    assumptions:
    - text: 'Except for the generic ''Manager'' role, JobRole deterministically implies
        Department (i.e., for all rows with JobRole <> ''Manager'', each JobRole maps
        to exactly one Department). This can be enforced as a functional dependency:
        hasFunctionalDependency(dependentColumn=''Department'', determinantColumns=[''JobRole''],
        where=''JobRole <> "Manager"'', maxAllowedViolation=0.0).'
