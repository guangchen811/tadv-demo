    overwrite: false
constraints:
  YearsAtCompany:
    code:
    - suggestion: '.satisfies("CASE WHEN `YearsAtCompany` IS NULL THEN true WHEN CAST(`YearsAtCompany`
        AS DOUBLE) IS NOT NULL AND CAST(`YearsAtCompany` AS DOUBLE) >= 0 THEN true
        ELSE false END", "YearsAtCompany numeric and non-negative", lambda x: x ==
        1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: b03cd4c8-d93b-4f86-a21f-50f7914e4dad
      source_assumptions:
      - faa2cff7-8660-4c08-afa1-856fea896d1a
    - suggestion: '.satisfies("CASE WHEN `TotalWorkingYears` IS NULL THEN true WHEN
        CAST(`TotalWorkingYears` AS DOUBLE) IS NULL THEN false WHEN CAST(`TotalWorkingYears`
        AS DOUBLE) = 0 THEN COALESCE(CAST(`YearsAtCompany` AS DOUBLE), 0.0) = 0.0
        ELSE (CAST(`YearsAtCompany` AS DOUBLE) IS NOT NULL AND CAST(`YearsAtCompany`
        AS DOUBLE) <= CAST(`TotalWorkingYears` AS DOUBLE)) END", "YearsAtCompany not
        exceeding TotalWorkingYears", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: c67e1f17-d4d3-4852-86f5-273d6c115c26
      source_assumptions:
      - 1078bde1-f9e0-459d-93e0-46fc1f01df2f
    - suggestion: '.hasCompleteness(''YearsAtCompany'', lambda v: v >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 94003b17-00b1-4145-8499-86deab8d84c5
      source_assumptions:
      - e1e0a6d8-68ba-4154-8890-83eb3bbe8e32
    assumptions:
    - text: 'YearsAtCompany must be numeric and non-negative because it is used in
        arithmetic (division) to compute tenure_ratio and then propagated into the
        risk score via (1.0 - tenure_ratio). Suggested validation: ensure all non-null
        values are >= 0 and castable to numeric (e.g., Deequ .satisfies(''CASE WHEN
        `YearsAtCompany` IS NULL THEN 1 WHEN TRY_CAST(`YearsAtCompany` AS DOUBLE)
        >= 0 THEN 1 ELSE 0 END'', ''Non-negative YearsAtCompany'', lambda x: x ==
        1.0) or Great Expectations expect_column_values_to_be_between with min_value=0,
        mostly=1.0).'
      sources:
      - start_line: 53
        end_line: 53
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: faa2cff7-8660-4c08-afa1-856fea896d1a
    - text: 'YearsAtCompany should not exceed TotalWorkingYears. For rows where TotalWorkingYears
        > 0, enforce YearsAtCompany <= TotalWorkingYears; when TotalWorkingYears ==
        0, YearsAtCompany must be 0. This keeps tenure_ratio <= 1 before clipping
        and avoids inconsistencies hidden by replacing zero denominators with NaN.
        Suggested validation: Deequ .satisfies(''CASE WHEN `TotalWorkingYears` IS
        NULL THEN 1 WHEN `TotalWorkingYears` = 0 THEN COALESCE(`YearsAtCompany`, 0)
        = 0 ELSE COALESCE(`YearsAtCompany`, 0) <= `TotalWorkingYears` END'', ''Tenure
        not exceeding total experience'', lambda x: x == 1.0).'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: 1078bde1-f9e0-459d-93e0-46fc1f01df2f
    - text: 'YearsAtCompany may be null without breaking the pipeline: null values
        produce a NaN tenure_ratio that is filled as 0.0 and then used in (1.0 - tenure_ratio).
        If nulls are allowed in your data, monitor their rate because they systematically
        increase risk. Suggested validation: allow nulls but track completeness, e.g.,
        Great Expectations expect_column_values_to_not_be_null with a chosen mostly
        threshold (such as >= 0.95) that matches data quality policy.'
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: e1e0a6d8-68ba-4154-8890-83eb3bbe8e32
  Age:
