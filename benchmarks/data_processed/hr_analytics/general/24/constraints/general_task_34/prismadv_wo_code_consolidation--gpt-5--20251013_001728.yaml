        18). Possible validation rules: Deequ satisfies(''CASE WHEN Age IS NULL OR
        `TotalWorkingYears` IS NULL THEN true ELSE `TotalWorkingYears` <= Age - 18
        END'', ''TYW <= Age-18'', lambda x: x >= 0.99). In Great Expectations: expect_conditionally_expect_column_values_to_be_between
        with condition=''Age IS NOT NULL'', column=''TotalWorkingYears'', max_value=''Age
        - 18'', mostly=0.99.'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: b2146686-31a6-46e7-8bd9-23c02b50bd35
    - text: 'TotalWorkingYears should be at least YearsAtCompany in almost all cases
        (so that tenure_ratio <= 1 without clipping). Allow a small tolerance (e.g.,
        at least 99% of rows satisfy YearsAtCompany <= TotalWorkingYears). Possible
        validation rules: Deequ satisfies(''CASE WHEN `YearsAtCompany` IS NULL OR
        `TotalWorkingYears` IS NULL THEN true ELSE `YearsAtCompany` <= `TotalWorkingYears`
        END'', ''YAC <= TYW'', lambda x: x >= 0.99). In Great Expectations: expect_column_pair_values_A_to_be_greater_than_B
        with column_A=''TotalWorkingYears'', column_B=''YearsAtCompany'', or the conditional
        form with mostly=0.99.'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: d3f3a57c-63c2-4b68-aaee-175216d2af7d
    - text: 'If YearsAtCompany > 0, then TotalWorkingYears should also be > 0 (zeros
        are treated as missing in the denominator and collapse tenure_ratio to 0).
        Expect this to hold for at least 99% of rows. Possible validation rules: Deequ
        satisfies(''CASE WHEN `YearsAtCompany` > 0 THEN `TotalWorkingYears` > 0 ELSE
        true END'', ''Nonzero TYW when YAC > 0'', lambda x: x >= 0.99). In Great Expectations:
        expect_column_values_to_be_between for TotalWorkingYears with min_value=1
        and a row condition ''YearsAtCompany > 0'', mostly=0.99.'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: 9721a1e2-583c-4781-b239-d7a9b5dbfc71
  '["TotalWorkingYears","YearsAtCompany"]':
    code: []
    assumptions:
    - text: 'YearsAtCompany must be less than or equal to TotalWorkingYears for every
        record. Representable as a Deequ compliance constraint: Compliance(''yearsAtCompany_le_totalWorkingYears'',
        ''YearsAtCompany <= TotalWorkingYears'').'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: c8bd340e-87d1-455b-a9c4-b5e815ab874f
    - text: 'For rows with TotalWorkingYears > 0, the ratio YearsAtCompany / TotalWorkingYears
        must lie within [0, 1]. Representable as a Deequ compliance constraint: Compliance(''tenure_ratio_in_01'',
        ''CASE WHEN TotalWorkingYears > 0 THEN (YearsAtCompany / TotalWorkingYears)
        >= 0 AND (YearsAtCompany / TotalWorkingYears) <= 1 ELSE TRUE END'').'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: 4f115a92-069b-4b65-8fe9-62b58c0316eb
    - text: 'If TotalWorkingYears is 0, then YearsAtCompany must also be 0 (no company
        tenure without any total experience). Representable as a Deequ compliance
        constraint: Compliance(''zero_total_implies_zero_tenure'', ''CASE WHEN TotalWorkingYears
        = 0 THEN YearsAtCompany = 0 ELSE TRUE END'').'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: 12d91a82-05e6-4f25-a90a-29aceb711e6b
    - text: 'TotalWorkingYears cannot exceed the number of working-eligible years
        since age 18, i.e., TotalWorkingYears <= max(Age - 18, 0). Representable as
        a Deequ compliance constraint: Compliance(''total_le_experience_cap'', ''TotalWorkingYears
        <= CASE WHEN Age >= 18 THEN Age - 18 ELSE 0 END'').'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: c6dcba77-c518-4e90-b841-893929ba7162
    - text: 'YearsAtCompany cannot exceed the number of working-eligible years since
        age 18, i.e., YearsAtCompany <= max(Age - 18, 0). Representable as a Deequ
        compliance constraint: Compliance(''tenure_le_experience_cap'', ''YearsAtCompany
        <= CASE WHEN Age >= 18 THEN Age - 18 ELSE 0 END'').'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      uid: 99390ab5-4c60-4f67-b696-e735d3082f63
  '["YearsAtCompany","YearsSinceLastPromotion"]':
