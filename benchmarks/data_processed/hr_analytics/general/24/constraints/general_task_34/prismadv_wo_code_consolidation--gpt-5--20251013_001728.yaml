        end_line: 117
        file: ''
      uid: 9cecb909-428b-43b8-b4b0-d80d06a6566d
    - text: "Department\u2013JobRole pairs must belong to an allowed set reflecting\
        \ the org structure: Department='Sales' => JobRole in {'Sales Executive','Sales\
        \ Representative','Healthcare Representative'}; Department='Research & Development'\
        \ => JobRole in {'Research Scientist','Laboratory Technician','Manufacturing\
        \ Director','Research Director'}; Department='Human Resources' => JobRole\
        \ in {'Human Resources'}; 'Manager' may appear in any Department. This can\
        \ be expressed with a two-column predicate: satisfies(\"(Department = 'Sales'\
        \ AND JobRole IN ('Sales Executive','Sales Representative','Healthcare Representative'))\
        \ OR (Department = 'Research & Development' AND JobRole IN ('Research Scientist','Laboratory\
        \ Technician','Manufacturing Director','Research Director')) OR (Department\
        \ = 'Human Resources' AND JobRole IN ('Human Resources')) OR (JobRole = 'Manager')\"\
        , constraintName='dept_jobrole_allowed_pairs', assertion=_ >= 1.0)."
      sources:
      - start_line: 90
        end_line: 99
        file: ''
      - start_line: 104
        end_line: 108
        file: ''
      - start_line: 110
        end_line: 117
        file: ''
