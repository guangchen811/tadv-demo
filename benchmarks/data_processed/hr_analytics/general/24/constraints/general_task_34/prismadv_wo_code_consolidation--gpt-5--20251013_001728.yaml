        end_line: 41
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 10430199-180a-49f8-985f-e8ff5423a7f4
    - text: 'YearsAtCompany must not exceed TotalWorkingYears, and if TotalWorkingYears
        = 0 then YearsAtCompany must be 0 (to avoid masking invalid ratios by fillna
        after division-by-zero). Deequ examples: .satisfies("YearsAtCompany <= TotalWorkingYears",
        "yac_le_twy") and .satisfies("CASE WHEN TotalWorkingYears = 0 THEN YearsAtCompany
        = 0 ELSE TRUE END", "yac_zero_when_twy_zero")'
