  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'Manager tenure cannot exceed company tenure for the same employee, and
        must be non-negative. Deequ compliance example: .addConstraint(Compliance("mgr_le_company",
        "YearsWithCurrManager IS NULL OR (YearsWithCurrManager >= 0 AND YearsWithCurrManager
        <= YearsAtCompany)"))'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      - start_line: 60
        end_line: 76
        file: ''
      uid: 28301840-a685-40c1-9f5e-d270c6db33c9
    - text: 'If YearsAtCompany equals 0, then YearsWithCurrManager must be 0 or null
        (you cannot have tenure with current manager before joining). Deequ compliance
        example: .addConstraint(Compliance("zero_company_zero_mgr", "NOT (YearsAtCompany
        = 0 AND coalesce(YearsWithCurrManager, 0) > 0)"))'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      uid: b71a9bd3-68b7-491b-a5fd-ef79fa962fde
    - text: 'Company tenure cannot exceed total working years, and when TotalWorkingYears
        is 0, YearsAtCompany must be 0 (keeps tenure_ratio in [0,1] without relying
        on clipping). Deequ compliance example: .addConstraint(Compliance("company_le_total",
        "(TotalWorkingYears = 0 AND YearsAtCompany = 0) OR (TotalWorkingYears > 0
        AND YearsAtCompany <= TotalWorkingYears)"))'
      sources:
      - start_line: 50
        end_line: 52
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      uid: c7c521b0-1a02-4a7c-ac70-b69e7d2c7880
    - text: 'Manager tenure cannot exceed total working years (you cannot spend longer
        with a manager than your total career length). Deequ compliance example: .addConstraint(Compliance("mgr_le_total",
        "YearsWithCurrManager IS NULL OR (YearsWithCurrManager >= 0 AND TotalWorkingYears
        >= 0 AND YearsWithCurrManager <= TotalWorkingYears)"))'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      uid: fa0d0828-462b-4f1f-8a48-bbb7b330483c
    - text: 'Conditional completeness: For employees with YearsAtCompany > 0, YearsWithCurrManager
        should be present (non-null). Deequ compliance example: .addConstraint(Compliance("mgr_present_when_employed",
        "(YearsAtCompany = 0) OR (YearsWithCurrManager IS NOT NULL)"))'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      uid: c3305ed7-c53c-4eb0-b299-bb9072bc0613
