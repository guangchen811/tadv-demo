        end_line: 54
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 0aa5e7aa-cc51-445f-9bc1-8cd6e036304b
    - text: 'YearsSinceLastPromotion must not exceed TotalWorkingYears, and if YearsAtCompany
        = 0 then YearsSinceLastPromotion must be 0 (no promotion before joining).
        Deequ example: .satisfies("YearsSinceLastPromotion <= TotalWorkingYears AND
        (CASE WHEN YearsAtCompany = 0 THEN YearsSinceLastPromotion = 0 ELSE TRUE END)",
        "yslp_consistent_with_tenure")'
