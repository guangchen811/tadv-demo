    assumptions:
    - text: 'Attrition must be present in the input and be nearly complete (very few
        or no nulls) so the base-rate calculation is meaningful. For example, enforce
        completeness of at least 0.99. We could represent this with Deequ: .hasCompleteness(''Attrition'',
        lambda x: x >= 0.99).'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 80
        end_line: 80
        file: ''
      - start_line: 123
        end_line: 125
        file: ''
      uid: 80f618e4-aaf7-43f0-b802-9b841f8e6eea
    - text: 'Attrition should be a binary categorical string with exact values ''Yes''
        or ''No'' (correct casing). Unexpected values (e.g., ''Y'', ''N'', ''TRUE'',
        lowercase) should not exceed 1% of rows. We could represent this with Deequ:
        .isContainedIn(''Attrition'', [''Yes'',''No''], lambda x: x >= 0.99).'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 80
        end_line: 80
        file: ''
      uid: 3ae84112-96d9-43c5-a328-af22b16f8eca
    - text: 'The positive rate P(Attrition = ''Yes'') should be within a stability
        band of 0.05 to 0.20 to keep alert-share calibration (alert_share = 2 * base_yes)
        from being heavily clipped. We could represent this with two Deequ constraints:
        .satisfies("CASE WHEN Attrition = ''Yes'' THEN 1 ELSE 0 END", ''Yes rate lower
        bound'', lambda x: x >= 0.05) and .satisfies("CASE WHEN Attrition = ''Yes''
        THEN 1 ELSE 0 END", ''Yes rate upper bound'', lambda x: x <= 0.20).'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 80
        end_line: 82
        file: ''
      - start_line: 123
        end_line: 126
        file: ''
      uid: b003b9fb-6459-498f-b1e1-09d236c21fa0
    - text: 'Exactly two distinct values should appear in Attrition (both classes
        observed). We could represent this with Deequ: .hasNumberOfDistinctValues(''Attrition'',
        lambda x: x == 2) or with Great Expectations: expect_column_unique_value_count_to_be_between(min_value=2,
        max_value=2).'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 80
        end_line: 80
        file: ''
      uid: 5ba6d066-7883-48cb-a488-b90758a5f38f
  ? '["Age","Attrition","Department","DistanceFromHome","EmpID","EnvironmentSatisfaction","JobRole","JobSatisfaction","MonthlyIncome","OverTime","PerformanceRating","SalarySlab","StockOptionLevel","TotalWorkingYears","TrainingTimesLastYear","WorkLifeBalance","YearsAtCompany","YearsSinceLastPromotion","YearsWithCurrManager"]'
  : code: []
    assumptions:
    - text: 'MonthlyIncome must be consistent with SalarySlab bins: (SalarySlab =
        ''Upto 5k'' -> MonthlyIncome <= 5000), (SalarySlab = ''5k-10k'' -> 5000 <
        MonthlyIncome <= 10000), (SalarySlab = ''10k-15k'' -> 10000 < MonthlyIncome
        <= 15000), (SalarySlab = ''15k+'' -> MonthlyIncome > 15000). Deequ example:
        .addConstraint(Compliance(''salary_slab_matches_income'', "((SalarySlab =
        ''Upto 5k'' AND MonthlyIncome <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome
        > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome
        > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome
        > 15000))"))'
      sources:
      - start_line: 24
        end_line: 24
        file: ''
      - start_line: 32
        end_line: 32
        file: ''
      - start_line: 95
        end_line: 96
        file: ''
      uid: d1e5c490-a96f-4c86-86c4-2cde52dc9fe8
    - text: 'TotalWorkingYears cannot exceed the feasible working years implied by
        Age: TotalWorkingYears <= max(Age - 18, 0). Deequ example: .addConstraint(Compliance(''experience_within_age_cap'',
        ''TotalWorkingYears <= greatest(Age - 18, 0)''))'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: af7522c0-c7c5-45b8-bb1e-7dfc261e9bab
    - text: 'Company tenure cannot exceed total experience, and if TotalWorkingYears
        = 0 then YearsAtCompany must be 0. Deequ example: .addConstraint(Compliance(''tenure_vs_total_exp'',
        ''(TotalWorkingYears = 0 AND YearsAtCompany = 0) OR (TotalWorkingYears > 0
        AND YearsAtCompany <= TotalWorkingYears)''))'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: c9ec1097-c246-41c6-9456-42d974f25d99
    - text: 'YearsSinceLastPromotion cannot exceed YearsAtCompany (you cannot be at
        the company for less time than since your last promotion). Deequ example:
        .addConstraint(Compliance(''promotion_within_tenure'', ''YearsSinceLastPromotion
        <= YearsAtCompany''))'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      - start_line: 53
        end_line: 53
        file: ''
      uid: b6abfc90-7714-4f49-8b93-39aacc9dbf49
    - text: 'YearsWithCurrManager cannot exceed YearsAtCompany. Deequ example: .addConstraint(Compliance(''manager_years_within_company_years'',
        ''coalesce(YearsWithCurrManager, 0) <= YearsAtCompany''))'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      - start_line: 53
        end_line: 53
        file: ''
      uid: c7889036-b075-494a-af33-a0868286ad55
    - text: 'YearsAtCompany must also respect the age-based cap: YearsAtCompany <=
        max(Age - 18, 0). Deequ example: .addConstraint(Compliance(''tenure_within_age_cap'',
        ''YearsAtCompany <= greatest(Age - 18, 0)''))'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 53
        end_line: 53
        file: ''
      uid: 597e4128-b350-49ca-ba3f-57f15da2eb07
    - text: "risk_band must be consistent with risk_score and the run\u2019s threshold:\
        \ (risk_band = 'high' -> risk_score > threshold), (risk_band = 'medium' ->\
        \ threshold * 0.8 < risk_score <= threshold), (risk_band = 'low' -> risk_score\
        \ <= threshold * 0.8). This can be validated by recomputing with the same\
        \ threshold used to create risk_band. Deequ example: .addConstraint(Compliance('risk_band_matches_score',\
        \ \"((risk_band = 'high' AND risk_score > {thr}) OR (risk_band = 'medium'\
        \ AND risk_score > {thr} * 0.8 AND risk_score <= {thr}) OR (risk_band = 'low'\
        \ AND risk_score <= {thr} * 0.8))\").whereParameters({'thr': threshold}))"
      sources:
