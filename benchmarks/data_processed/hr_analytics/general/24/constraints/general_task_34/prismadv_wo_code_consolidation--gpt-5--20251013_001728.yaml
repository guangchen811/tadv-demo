    assumptions:
    - text: 'YearsSinceLastPromotion must be non-negative and must not exceed YearsAtCompany
        (an employee cannot have been promoted more recently than their total tenure
        at the company). Deequ example: .satisfies("YearsSinceLastPromotion >= 0 AND
        YearsSinceLastPromotion <= YearsAtCompany", "yslp_within_tenure")'
      sources:
