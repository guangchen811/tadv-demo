      source_assumptions:
      - 0280affe-3a00-4cd5-b765-794c27532387
    assumptions:
    - text: The 'Age' column must be numeric (parsable as numbers) for all non-null
        rows, since it is used in arithmetic and comparison operations. Non-numeric
        values would raise type errors when computing years to retirement, experience
        cap, or age flags.
      sources:
      - start_line: 29
        end_line: 29
        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 56
        end_line: 57
        file: ''
      uid: ab20e35f-2966-4e30-b430-a3b4d258485a
    - text: The 'Age' column should have no nulls (complete), because it is used repeatedly
        without imputation and is also written directly to the outputs. While nulls
        would not crash the age flag creation (they evaluate as not young/senior),
        they would degrade output completeness for reporting.
      sources:
      - start_line: 29
        end_line: 29
        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 56
        end_line: 57
        file: ''
      - start_line: 94
        end_line: 94
        file: ''
      uid: 9749d8b8-271c-42d2-9f4c-0e9f33d182a8
    - text: "The minimum 'Age' should be at least 18, consistent with the code\u2019\
        s use of 18 as the lower bound for work-related experience calculations."
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      uid: 4875ac7a-a97d-45a1-b673-d6f606f581e1
    - text: "The maximum 'Age' should not exceed 70 for active employees, aligning\
        \ with the code\u2019s chosen retirement_age of 70 for years-to-retirement\
