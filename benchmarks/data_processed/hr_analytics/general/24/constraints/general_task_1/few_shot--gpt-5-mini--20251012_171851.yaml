constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25','26-35','36-45','46-55','55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales','Research & Development','Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isComplete('EnvironmentSatisfaction')
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isComplete('PercentSalaryHike')
      - Valid
    - - .isNonNegative('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k','5k-10k','10k-15k','15k+'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isComplete('WorkLifeBalance')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95)'
      - Valid
    assumptions: []
  salary_band_consistency:
    code:
    - - .satisfies("((SalarySlab = 'Upto 5k' AND MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) OR (SalarySlab = '5k-10k' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab = '10k-15k' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab = '15k+' AND MonthlyIncome > 15000))", 'salary_band_consistency')
      - Valid
    assumptions: []
