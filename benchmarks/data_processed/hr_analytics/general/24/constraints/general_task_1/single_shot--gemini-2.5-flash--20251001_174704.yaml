constraints:
  Age:
    code:
    - - .hasDataType('Age', 'Integral', 0.99)
      - Invalid
    - - .hasMin('Age', 18.0)
      - Invalid
    - - .isComplete('Age')
      - Valid
    - - .isPositive('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .hasDataType('AgeGroup', 'String', 0.99)
      - Invalid
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  AgeGroup_Age_Consistency_18_25:
    code:
    - - .satisfies("CASE WHEN AgeGroup = '18-25' THEN Age >= 18 AND Age <= 25 ELSE
        TRUE END", "Age in 18-25 group", 0.99)
      - Invalid
    assumptions: []
  AgeGroup_Age_Consistency_26_35:
    code:
    - - .satisfies("CASE WHEN AgeGroup = '26-35' THEN Age >= 26 AND Age <= 35 ELSE
        TRUE END", "Age in 26-35 group", 0.99)
      - Invalid
    assumptions: []
  AgeGroup_Age_Consistency_36_45:
    code:
    - - .satisfies("CASE WHEN AgeGroup = '36-45' THEN Age >= 36 AND Age <= 45 ELSE
        TRUE END", "Age in 36-45 group", 0.99)
      - Invalid
    assumptions: []
  AgeGroup_Age_Consistency_46_55:
    code:
    - - .satisfies("CASE WHEN AgeGroup = '46-55' THEN Age >= 46 AND Age <= 55 ELSE
        TRUE END", "Age in 46-55 group", 0.99)
      - Invalid
    assumptions: []
  AgeGroup_Age_Consistency_55_plus:
    code:
    - - .satisfies("CASE WHEN AgeGroup = '55+' THEN Age >= 55 ELSE TRUE END", "Age
        in 55+ group", 0.99)
      - Invalid
    assumptions: []
  Age_TotalWorkingYears_Consistency:
    code:
    - - .satisfies("Age >= TotalWorkingYears", "Age should be >= TotalWorkingYears")
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .hasDataType('Attrition', 'String', 0.99)
