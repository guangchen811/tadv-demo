constraints:
  Age:
    code:
    - - .isBetween('Age', lowerBound=18, upperBound=100, includeLowerBound=True, includeUpperBound=True)
      - Invalid
    - - .isComplete('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25','26-35','36-45','46-55','55+'])
      - Valid
    - - .satisfies("CASE WHEN Age >= 18 AND Age <= 25 THEN AgeGroup = '18-25' WHEN
        Age > 25 AND Age <= 35 THEN AgeGroup = '26-35' WHEN Age > 35 AND Age <= 45
        THEN AgeGroup = '36-45' WHEN Age > 45 AND Age <= 55 THEN AgeGroup = '46-55'
        WHEN Age > 55 THEN AgeGroup = '55+' ELSE false END", 'agegroup_matches_age')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales','Research & Development','Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isBetween('JobLevel', lowerBound=1, upperBound=5, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    - - .isComplete('JobLevel')
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    - - .isContainedIn('JobRole', ['Research Director','Sales Representative','Research
        Scientist','Manufacturing Director','Healthcare Representative','Sales Executive','Manager','Human
        Resources','Laboratory Technician'])
      - Valid
    - - .satisfies("(JobRole <> 'Healthcare Representative') OR (Department = 'Sales')",
        'role_dept_healthcare_representative')
      - Invalid
    - - .satisfies("(JobRole <> 'Human Resources') OR (Department = 'Human Resources')",
        'role_dept_hr')
      - Valid
    - - .satisfies("(JobRole <> 'Laboratory Technician') OR (Department = 'Research
        & Development')", 'role_dept_lab_technician')
      - Valid
    - - .satisfies("(JobRole <> 'Manufacturing Director') OR (Department = 'Research
        & Development')", 'role_dept_manufacturing_director')
      - Valid
    - - .satisfies("(JobRole <> 'Research Director') OR (Department = 'Research &
        Development')", 'role_dept_research_director')
      - Valid
    - - .satisfies("(JobRole <> 'Research Scientist') OR (Department = 'Research &
        Development')", 'role_dept_research_scientist')
      - Valid
    - - .satisfies("(JobRole <> 'Sales Executive') OR (Department = 'Sales')", 'role_dept_sales_executive')
      - Valid
    - - .satisfies("(JobRole <> 'Sales Representative') OR (Department = 'Sales')",
        'role_dept_sales_representative')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .satisfies('PerformanceRating >= 3 AND PerformanceRating <= 4', 'performance_rating_range')
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k','5k-10k','10k-15k','15k+'])
      - Valid
    - - .satisfies("CASE WHEN MonthlyIncome > 0 AND MonthlyIncome <= 5000 THEN SalarySlab
        = 'Upto 5k' WHEN MonthlyIncome > 5000 AND MonthlyIncome <= 10000 THEN SalarySlab
        = '5k-10k' WHEN MonthlyIncome > 10000 AND MonthlyIncome <= 15000 THEN SalarySlab
        = '10k-15k' WHEN MonthlyIncome > 15000 THEN SalarySlab = '15k+' ELSE false
        END", 'salary_slab_matches_income')
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    - - .satisfies('YearsAtCompany <= TotalWorkingYears', 'company_years_le_total_working_years')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    - - .satisfies('YearsInCurrentRole <= YearsAtCompany', 'role_years_le_company_years')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda v: v >= 0.95)'
      - Valid
    assumptions: []
