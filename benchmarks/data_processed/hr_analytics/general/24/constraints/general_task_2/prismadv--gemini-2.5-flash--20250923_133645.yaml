    assumptions:
    - text: 'For the calculation of ''adj_income'' as `MonthlyIncome * (1.0 + PercentSalaryHike
        / 100.0)`, it is assumed that both ''MonthlyIncome'' and ''PercentSalaryHike''
        are numeric (Integral, based on data characteristics) and non-null. Additionally,
        ''PercentSalaryHike'' is assumed to be a non-negative value, representing
        a percentage increase, to ensure the adjusted income is not unexpectedly reduced
        or negative due to the hike component. The resulting ''adj_income'' is expected
        to be a numeric (Fractional) and non-null column.

        We could represent this assumption as deequ constraints like this:

        .hasCompleteness(''MonthlyIncome'', 1.0)

        .hasDataType(''MonthlyIncome'', ''Integral'')

        .hasCompleteness(''PercentSalaryHike'', 1.0)

        .hasDataType(''PercentSalaryHike'', ''Integral'')

        .isNonNegative(''PercentSalaryHike'')

        .isNonNegative(''MonthlyIncome'') // Assuming income is always positive

        .hasCompleteness(''adj_income'', 1.0)

        .hasDataType(''adj_income'', ''Fractional'')'
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      uid: 299e1a6f-5f13-47d4-8cfb-3fc9a6c09f1e
    - text: 'For the calculation of ''monthly_comp_w_overheads'', all constituent
        columns (''adj_income'', ''benefits_rate'', ''travel_premium'', ''overtime_premium'',
        ''slab_premium'', ''joblevel_adj'', ''manager_adj'', ''fte'') are assumed
        to be numeric (Fractional) and non-null. Furthermore, the additive adjustment
        factors (e.g., ''benefits_rate'', ''travel_premium'', ''overtime_premium'',
        ''slab_premium'', ''joblevel_adj'', ''manager_adj'', ''fte'') are assumed
        to be non-negative, ensuring they contribute positively or neutrally to the
        overall compensation. The resulting ''monthly_comp_w_overheads'' is expected
        to be a numeric (Fractional) and non-null column.

        We could represent this assumption as deequ constraints like this:

        .hasCompleteness(''adj_income'', 1.0) // and for all other listed columns

        .hasDataType(''adj_income'', ''Fractional'') // and for all other listed columns

        .isNonNegative(''benefits_rate'') // and for all other additive factors like
        travel_premium, overtime_premium, slab_premium, joblevel_adj, manager_adj,
        fte

        .hasCompleteness(''monthly_comp_w_overheads'', 1.0)

        .hasDataType(''monthly_comp_w_overheads'', ''Fractional'')'
      sources:
      - start_line: 52
        end_line: 62
        file: ''
      uid: f17a042a-e06b-4037-9024-6fc14a1257e4
    - text: 'For the conditional assignment of ''active_quarterly_comp'', it is assumed
        that the ''Attrition'' column contains string values, specifically ''No''
        to identify active employees, and that ''quarterly_comp'' is a numeric (Fractional)
        and non-null column. This implies ''Attrition'' should primarily contain ''Yes''
        or ''No''. The resulting ''active_quarterly_comp'' is expected to be a numeric
        (Fractional) and non-null column.

        We could represent this assumption as deequ constraints like this:

        .hasCompleteness(''Attrition'', 1.0)

        .hasCompleteness(''quarterly_comp'', 1.0)

        .hasDataType(''quarterly_comp'', ''Fractional'')

        .isContainedIn(''Attrition'', [''Yes'', ''No''])

        .hasCompleteness(''active_quarterly_comp'', 1.0)

        .hasDataType(''active_quarterly_comp'', ''Fractional'')'
      sources:
      - start_line: 67
        end_line: 67
        file: ''
      uid: 27bf83ec-641d-495d-9e14-9be6527d9206
    - text: 'For the `groupby` operation and subsequent aggregations, it is assumed
        that the combination of ''Department'' and ''JobRole'' uniquely defines a
        group, and these columns are non-null. It is also assumed that ''EmployeeCount''
        (Integral) and ''active_quarterly_comp'' (Fractional) are numeric and non-null
        for summation, and ''Attrition'' consistently contains ''Yes'' or ''No'' for
        accurate counting. Finally, ''headcount'' (derived from ''EmployeeCount'')
        is assumed to be non-zero within each group when calculating ''attrition_rate''
        to prevent division by zero. The resulting aggregated columns (''headcount'',
        ''attrition_count'', ''quarterly_budget'', ''attrition_rate'') are expected
        to be numeric and non-null.

        We could represent this assumption as deequ constraints like this:

        .hasCompleteness(''Department'', 1.0)

        .hasCompleteness(''JobRole'', 1.0)

        .isUnique([''Department'', ''JobRole'']) // If groups are expected to be unique
        based on this combination

        .hasDataType(''EmployeeCount'', ''Integral'')

        .hasCompleteness(''EmployeeCount'', 1.0)

        .isNonNegative(''EmployeeCount'')

        .hasDataType(''active_quarterly_comp'', ''Fractional'')

        .hasCompleteness(''active_quarterly_comp'', 1.0)

        .isContainedIn(''Attrition'', [''Yes'', ''No''])

        // A custom assertion would be needed for ''headcount > 0'' post-aggregation
        to ensure ''attrition_rate'' calculation is valid.'
      sources:
