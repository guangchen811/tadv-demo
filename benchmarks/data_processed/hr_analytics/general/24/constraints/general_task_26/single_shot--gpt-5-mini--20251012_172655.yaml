constraints:
  Age:
    code:
    - - .hasMin('Age', 18).hasMax('Age', 60)
      - Invalid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .hasMin('EmployeeCount', 1).hasMax('EmployeeCount', 1)
      - Invalid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber').isUnique('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel').isContainedIn('JobLevel', [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome').isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime').isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating').isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab').isContainedIn('SalarySlab', ['Upto 5k', '5k-10k',
        '10k-15k', '15k+'])
      - Valid
    assumptions: []
  SalarySlabMonthlyIncomeAlignment:
    code:
    - - .satisfies("(SalarySlab = 'Upto 5k' AND MonthlyIncome <= 5000) OR (SalarySlab
        = '5k-10k' AND MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab
        = '10k-15k' AND MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab
        = '15k+' AND MonthlyIncome > 15000)", 'salary_slab_alignment')
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .hasMin('StandardHours', 80).hasMax('StandardHours', 80)
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    assumptions: []
