constraints:
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25','26-35','36-45','46-55','55+'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['TravelRarely','Travel_Rarely','Travel_Frequently','Non-Travel'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales','Research & Development','Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', [1,2,3,4,5])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isComplete('PercentSalaryHike')
      - Valid
    - - .isNonNegative('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3,4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k','5k-10k','10k-15k','15k+'])
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
