      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(SalarySlab = ''Upto 5k'' AND MonthlyIncome <= 5000)
        OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome <=
