        RLIKE ''^[0-9]+(\\.[0-9]+)?$'' AND CAST(`YearsSinceLastPromotion` AS double)
        = 0 THEN 1 ELSE 0 END ELSE 1 END", "YSLP zero when YAC zero", lambda x: x
        >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["MonthlyIncome","PercentSalaryHike","PerformanceRating","SalarySlab"]':
