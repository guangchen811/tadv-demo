results:
  YearsAtCompany:
    code:
    - suggestion: .isNonNegative('YearsAtCompany')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN floor(`YearsAtCompany`) = `YearsAtCompany`
        THEN 1 ELSE 0 END'', ''YearsAtCompany integral'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isLessThanOrEqualTo('YearsAtCompany', 'TotalWorkingYears')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isGreaterThanOrEqualTo('YearsAtCompany', 'YearsInCurrentRole')
      status: true
      reason_if_failed: ''
      level: error
  AgeGroup:
    code:
    - suggestion: '.isContainedIn(''AgeGroup'', [''18-25'',''26-35'',''36-45'',''46-55'',''55+''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Age` >= 18'', ''Age >= 18'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''`Age` >= 18'', ''Age >= 18'', lambda
        x: x >= 0.99)'' failed on data sample: Value: 0.9846938775510204 does not
        meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''`Age` >= 0 AND `Age` <= 100'', ''Age between 0 and
        100'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''`Age` >= 0 AND `Age` <= 100'',
        ''Age between 0 and 100'', lambda x: x == 1)'' failed on data sample: Value:
        0.9863945578231292 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''floor(`Age`) = `Age`'', ''Age is integer-valued'',
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Attrition:
    code:
    - suggestion: '.satisfies("CASE WHEN TRIM(`Attrition`) IN (''Yes'',''No'') THEN
        1 ELSE 0 END", "Valid Attrition Values (trimmed)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  YearsInCurrentRole:
    code:
    - suggestion: '.satisfies(''CASE WHEN `YearsInCurrentRole` = floor(`YearsInCurrentRole`)
        THEN 1 ELSE 0 END'', ''Integer YearsInCurrentRole'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `YearsInCurrentRole` >= 0 THEN 1 ELSE 0
        END'', ''Non-negative YearsInCurrentRole'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `YearsInCurrentRole` <= `YearsAtCompany`
        THEN 1 ELSE 0 END'', ''Role tenure <= YearsAtCompany'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `YearsInCurrentRole` <= `TotalWorkingYears`
        THEN 1 ELSE 0 END'', ''Role tenure <= TotalWorkingYears'', lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
  EmpID:
    code:
    - suggestion: .isComplete('EmpID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('EmpID')
      status: true
      reason_if_failed: ''
      level: error
  Department:
    code:
    - suggestion: '.satisfies("CASE WHEN `Department` IN (''Sales'',''Research & Development'',''Human
        Resources'') THEN 1 ELSE 0 END", "Known departments", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `JobRole` IN (''Research Scientist'',''Laboratory
        Technician'',''Research Director'',''Manufacturing Director'') THEN CASE WHEN
        `Department` = ''Research & Development'' THEN 1 ELSE 0 END WHEN `JobRole`
        IN (''Sales Executive'',''Sales Representative'',''Healthcare Representative'')
        THEN CASE WHEN `Department` = ''Sales'' THEN 1 ELSE 0 END ELSE 1 END", "Department
        matches JobRole mapping", lambda x: x >= 0.9)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `JobRole` IN (''Research
        Scientist'',''Laboratory Technician'',''Research Director'',''Manufacturing
        Director'') THEN CASE WHEN `Department` = ''Research & Development'' THEN
        1 ELSE 0 END WHEN `JobRole` IN (''Sales Executive'',''Sales Representative'',''Healthcare
        Representative'') THEN CASE WHEN `Department` = ''Sales'' THEN 1 ELSE 0 END
        ELSE 1 END", "Department matches JobRole mapping", lambda x: x >= 0.9)'' failed
        on data sample: Value: 0.8962585034013606 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Department` = ''Sales'' THEN 1 ELSE 0 END",
        "Sales present", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Department` = ''Research & Development''
        THEN 1 ELSE 0 END", "Research & Development present", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Department` = ''Human Resources'' THEN 1
        ELSE 0 END", "Human Resources present", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  MonthlyIncome:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`MonthlyIncome` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "MonthlyIncome is numeric (parseable)", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `MonthlyIncome` > 0 THEN 1 ELSE 0 END", "MonthlyIncome
        positive", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  JobRole:
    code:
    - suggestion: '.isContainedIn(''JobRole'', [''Research Director'',''Sales Representative'',''Research
        Scientist'',''Manufacturing Director'',''Healthcare Representative'',''Sales
        Executive'',''Manager'',''Human Resources'',''Laboratory Technician''], assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `JobRole` IN (''Research Scientist'',''Laboratory
        Technician'',''Research Director'',''Manufacturing Director'',''Sales Executive'',''Sales
        Representative'',''Healthcare Representative'') AND `Department` = CASE WHEN
        `JobRole` IN (''Research Scientist'',''Laboratory Technician'',''Research
        Director'',''Manufacturing Director'') THEN ''Research & Development'' WHEN
        `JobRole` IN (''Sales Executive'',''Sales Representative'',''Healthcare Representative'')
        THEN ''Sales'' ELSE NULL END THEN 1 ELSE 0 END", "JobRole-Department consistency",
        lambda x: x >= 0.82)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `JobRole` IN (''Research
        Scientist'',''Laboratory Technician'',''Research Director'',''Manufacturing
        Director'',''Sales Executive'',''Sales Representative'',''Healthcare Representative'')
        AND `Department` = CASE WHEN `JobRole` IN (''Research Scientist'',''Laboratory
        Technician'',''Research Director'',''Manufacturing Director'') THEN ''Research
        & Development'' WHEN `JobRole` IN (''Sales Executive'',''Sales Representative'',''Healthcare
        Representative'') THEN ''Sales'' ELSE NULL END THEN 1 ELSE 0 END", "JobRole-Department
        consistency", lambda x: x >= 0.82)'' failed on data sample: Value: 0.7755102040816326
        does not meet the constraint requirement!'
      level: error
  OverTime:
    code:
    - suggestion: .isComplete('OverTime')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('OverTime', ['Yes', 'No'])
      status: true
      reason_if_failed: ''
      level: error
  SalarySlab:
    code:
    - suggestion: '.satisfies("CASE WHEN `SalarySlab` = CASE WHEN `MonthlyIncome`
        <= 5000 THEN ''Upto 5k'' WHEN `MonthlyIncome` <= 10000 THEN ''5k-10k'' WHEN
        `MonthlyIncome` <= 15000 THEN ''10k-15k'' ELSE ''15k+'' END THEN 1 ELSE 0
        END", "SalarySlab matches MonthlyIncome", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  TotalWorkingYears:
    code:
    - suggestion: '.satisfies(''CASE WHEN `TotalWorkingYears` >= `YearsAtCompany`
        AND `TotalWorkingYears` >= 0 THEN 1 ELSE 0 END'', ''TotalWorkingYears >= YearsAtCompany
        and non-negative'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN floor(`TotalWorkingYears`) = `TotalWorkingYears`
        THEN 1 ELSE 0 END'', ''Integer TotalWorkingYears'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["TotalWorkingYears","YearsAtCompany"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `TotalWorkingYears` IS NOT NULL AND `YearsAtCompany`
        IS NOT NULL AND `TotalWorkingYears` >= `YearsAtCompany` THEN 1 ELSE 0 END",
        "total_vs_company_non_negative", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["YearsAtCompany","YearsInCurrentRole"]':
    code:
    - suggestion: '.satisfies(''YearsAtCompany >= YearsInCurrentRole'', ''years_at_least_current_role'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''TotalWorkingYears IS NOT NULL AND YearsAtCompany IS
        NOT NULL AND TotalWorkingYears >= YearsAtCompany'', ''total_exp_at_least_company_tenure'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
