constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition').isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel').isContainedIn('BusinessTravel', ['TravelRarely',
        'Travel_Frequently', 'Travel_Rarely', 'Non-Travel'])
      - Valid
    assumptions: []
  DailyRate:
    code:
    - - .isComplete('DailyRate').isNonNegative('DailyRate')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department').isContainedIn('Department', ['Sales', 'Research
        & Development', 'Human Resources'])
      - Valid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isComplete('DistanceFromHome').isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  Education:
    code:
    - - .isComplete('Education').isContainedIn('Education', [1,2,3,4,5])
      - Invalid
    assumptions: []
  EducationField:
    code:
    - - .isComplete('EducationField').isContainedIn('EducationField', ['Life Sciences',
        'Medical', 'Marketing', 'Technical Degree', 'Human Resources', 'Other'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - '.isComplete(''EmployeeCount'').hasValue(''EmployeeCount'', lambda x: x ==
        1, ''EmployeeCount must always be 1'')'
      - Invalid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isComplete('EnvironmentSatisfaction').isContainedIn('EnvironmentSatisfaction',
        [1,2,3,4])
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender').isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  HourlyRate:
    code:
    - - .isComplete('HourlyRate').isNonNegative('HourlyRate')
      - Valid
    assumptions: []
  JobInvolvement:
    code:
    - - .isComplete('JobInvolvement').isContainedIn('JobInvolvement', [1,2,3,4])
      - Invalid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel').isContainedIn('JobLevel', [1,2,3,4,5])
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole').isContainedIn('JobRole', ['Research Director', 'Sales
        Representative', 'Research Scientist', 'Manufacturing Director', 'Healthcare
        Representative', 'Sales Executive', 'Manager', 'Human Resources', 'Laboratory
        Technician'])
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction').isContainedIn('JobSatisfaction', [1,2,3,4])
      - Invalid
    assumptions: []
  MaritalStatus:
    code:
    - - .isComplete('MaritalStatus').isContainedIn('MaritalStatus', ['Single', 'Married',
        'Divorced'])
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome').isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyRate:
    code:
    - - .isComplete('MonthlyRate').isNonNegative('MonthlyRate')
      - Valid
    assumptions: []
  NumCompaniesWorked:
    code:
    - - .isComplete('NumCompaniesWorked').isNonNegative('NumCompaniesWorked')
      - Valid
    assumptions: []
  Over18:
    code:
    - - '.isComplete(''Over18'').hasValue(''Over18'', lambda x: x == ''Y'', ''Over18
        must always be Y'')'
      - Invalid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime').isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isComplete('PercentSalaryHike').isNonNegative('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating').isContainedIn('PerformanceRating', [3,4])
      - Invalid
    assumptions: []
  RelationshipSatisfaction:
    code:
    - - .isComplete('RelationshipSatisfaction').isContainedIn('RelationshipSatisfaction',
        [1,2,3,4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab').isContainedIn('SalarySlab', ['Upto 5k', '5k-10k',
        '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - '.isComplete(''StandardHours'').hasValue(''StandardHours'', lambda x: x ==
        80, ''StandardHours must always be 80'')'
      - Invalid
    assumptions: []
  StockOptionLevel:
    code:
    - - .isComplete('StockOptionLevel').isContainedIn('StockOptionLevel', [0,1,2,3])
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears').isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  TrainingTimesLastYear:
    code:
    - - .isComplete('TrainingTimesLastYear').isContainedIn('TrainingTimesLastYear',
        [0,1,2,3,4,5,6])
      - Invalid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isComplete('WorkLifeBalance').isContainedIn('WorkLifeBalance', [1,2,3,4])
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany').isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole').isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion').isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - .hasCompleteness('YearsWithCurrManager', 0.95)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
