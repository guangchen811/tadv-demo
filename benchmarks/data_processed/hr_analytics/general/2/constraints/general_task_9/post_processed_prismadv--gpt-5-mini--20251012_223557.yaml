        input will become NaN) and later performs arithmetic (4 - JobSatisfaction)
        and numeric comparisons. Represent as a validation rule: .satisfies("CASE
        WHEN TRY_CAST(`JobSatisfaction` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END",
