constraints:
  YearsAtCompany:
    code:
    - suggestion: '.satisfies(''CASE WHEN `YearsAtCompany` >= 0 THEN 1 ELSE 0 END'',
        ''YearsAtCompany_non_negative'', lambda x: x >= 0.995)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: aac801ba-919f-48df-b159-0a6671417436
      source_assumptions:
      - 30a8a497-3dc2-41f7-86e0-1dd61f1b4e95
    - suggestion: '.satisfies(''CASE WHEN `YearsInCurrentRole` <= `YearsAtCompany`
        THEN 1 ELSE 0 END'', ''Role_vs_Company'', lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: ae96419a-3828-4052-9a87-97826a1a79ab
      source_assumptions:
      - 3ec264c9-cbd0-42ef-b09a-62e8b7202925
    - suggestion: '.satisfies(''CASE WHEN `YearsAtCompany` <= `TotalWorkingYears`
        THEN 1 ELSE 0 END'', ''Company_vs_TotalWorkingYears'', lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 07697133-8dd4-4b0e-bdbf-7a1965c73b41
      source_assumptions:
      - 3ec264c9-cbd0-42ef-b09a-62e8b7202925
    - suggestion: '.satisfies(''CASE WHEN `YearsAtCompany` = 0 THEN 1 ELSE 0 END'',
        ''YearsAtCompany_zero_share'', lambda x: x <= 0.20)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: ceb0d53e-d3db-4a71-a663-d8def25adddf
      source_assumptions:
      - 18da4429-6c6e-4aa9-9768-3d29a345c425
    assumptions:
    - text: 'The ''YearsAtCompany'' column must be parseable as numeric (integer/float).
        The pipeline calls pd.to_numeric(..., errors=''coerce''), so non-numeric values
        would become null and affect downstream ratios and metrics. Represent this
        as a validation rule, e.g. a Deequ/GRE check that at least 95% (or configurable
        threshold) of values are numeric: .satisfies("CASE WHEN try_cast(YearsAtCompany
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "YearsAtCompany_parseable", lambda
        x: x >= 0.95).'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      uid: d06fefb3-ff15-45e1-8ec7-2940f5e7544b
    - text: 'The input should not contain nulls for ''YearsAtCompany'' (or should
        contain very few). The script converts the column to numeric and then uses
        it as a denominator for ratios; many nulls will lead to many filled zeros
        in derived features and corrupt risk calculations. A validation rule: fraction
        of non-null YearsAtCompany should be ~1.0 (e.g. >= 0.99): .satisfies("CASE
        WHEN `YearsAtCompany` IS NOT NULL THEN 1 ELSE 0 END", "YearsAtCompany_not_null",
        lambda x: x >= 0.99).'
      sources:
      - start_line: 16
        end_line: 26
        file: ''
      uid: c70b0dce-d6d2-46fc-a506-9a7bbacf4fd6
    - text: 'YearsAtCompany should be non-negative. The code treats 0 specially (replace
        0 with NaN to avoid division by zero) and uses the column as a denominator;
        negative tenures are semantically invalid and will produce misleading ratios.
        Validate: all values >= 0 (or allow a tiny fraction of invalid negatives):
        .satisfies("CASE WHEN `YearsAtCompany` >= 0 THEN 1 ELSE 0 END", "YearsAtCompany_non_negative",
        lambda x: x >= 0.995).'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: 30a8a497-3dc2-41f7-86e0-1dd61f1b4e95
    - text: 'Logical consistency with related tenure columns: YearsInCurrentRole should
        generally be <= YearsAtCompany, and YearsAtCompany should be <= TotalWorkingYears.
        The role_ratio calculation assumes YearsInCurrentRole is a subset of YearsAtCompany;
        invalid relationships indicate bad input data. Example validations: .satisfies("CASE
        WHEN `YearsInCurrentRole` <= `YearsAtCompany` THEN 1 ELSE 0 END", "Role_vs_Company",
        lambda x: x >= 0.99) and .satisfies("CASE WHEN `YearsAtCompany` <= `TotalWorkingYears`
        THEN 1 ELSE 0 END", "Company_vs_TotalWorkingYears", lambda x: x >= 0.99).'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 141
        end_line: 143
        file: ''
      uid: 3ec264c9-cbd0-42ef-b09a-62e8b7202925
    - text: 'Zero years at company (YearsAtCompany == 0) are explicitly handled (replaced
        with NaN) but should not dominate the dataset. If a large fraction of records
        have YearsAtCompany == 0, many ratios will be defaulted to 0 and risk signals
        will be distorted. Recommend asserting that proportion of zeros is small (configurable),
        e.g. <= 20%: .satisfies("CASE WHEN `YearsAtCompany` = 0 THEN 1 ELSE 0 END",
        "YearsAtCompany_zero_share", lambda x: x <= 0.20).'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: 18da4429-6c6e-4aa9-9768-3d29a345c425
  AgeGroup:
    code:
    - suggestion: '.satisfies("CASE WHEN TRIM(`AgeGroup`) IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'')
        THEN 1 ELSE 0 END", "Trimmed Valid AgeGroup", lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 5d643527-90f4-4a66-bbd2-a4c146d4d73c
      source_assumptions:
      - 249c33fa-8708-4ae9-ba67-4fe504d7068b
      - 6dfaf0f8-1b1f-42bc-8cec-2f2522879b68
    - suggestion: '.hasNumberOfDistinctValues("AgeGroup", lambda x: x == 5)'
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues("AgeGroup",
        lambda x: x == 5)'': Check.hasNumberOfDistinctValues() missing 2 required
        positional arguments: ''binningUdf'' and ''maxBins'''
      level: warning
      uid: 8a36fa40-9800-4e07-b238-683b354240f7
      source_assumptions:
      - 279d1206-a56d-43b6-87d0-ed75226db035
    assumptions:
    - text: 'AgeGroup should be one of the expected categories: ''18-25'', ''26-35'',
        ''36-45'', ''46-55'', or ''55+''. The code maps AgeGroup to risk values using
        an explicit dictionary of these five keys; unexpected values will not match
        the map (producing a missing mapping) and will be treated as zero risk, which
        is likely unintended. Example validation (Deequ-like): .satisfies("CASE WHEN
        `AgeGroup` IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'') THEN 1 ELSE
        0 END", "Valid AgeGroup", lambda x: x >= 0.95)'
      sources:
      - start_line: 73
        end_line: 79
        file: ''
      - start_line: 80
        end_line: 80
        file: ''
      - start_line: 165
        end_line: 165
        file: ''
      uid: 249c33fa-8708-4ae9-ba67-4fe504d7068b
    - text: 'AgeGroup values should be non-null (or nearly so). The code relies on
        AgeGroup to compute risk_age_band and to include AgeGroup in final outputs
        and metrics; while map().fillna(0.0) will tolerate missing values, missing
        AgeGroup will change risk semantics and downstream reporting. Example validation:
        .satisfies("CASE WHEN `AgeGroup` IS NOT NULL THEN 1 ELSE 0 END", "AgeGroup
        non-null fraction", lambda x: x >= 0.99)'
      sources:
      - start_line: 80
        end_line: 80
        file: ''
      - start_line: 141
        end_line: 146
        file: ''
      uid: a67866a9-7d51-4679-9a00-96e802cef29f
    - text: 'AgeGroup values must match the expected string formatting exactly (no
        extra leading/trailing whitespace and exact punctuation/capitalization). The
        mapping uses exact string keys, so values like '' 26-35'', ''26 - 35'' or
        different casing will not map to the intended risk. Example validation (trim
        + membership): .satisfies("CASE WHEN TRIM(`AgeGroup`) IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'')
        THEN 1 ELSE 0 END", "Trimmed Valid AgeGroup", lambda x: x >= 0.99)'
      sources:
      - start_line: 73
        end_line: 80
        file: ''
      uid: 6dfaf0f8-1b1f-42bc-8cec-2f2522879b68
    - text: 'The AgeGroup column should contain exactly the expected set of 5 distinct
        categories (distinct count == 5). The risk mapping and metrics assume these
        five groups; extra distinct values indicate unexpected categories. Example
        validation: assert distinct_count(`AgeGroup`) == 5 (or Deequ-like wrapper
        that checks distinct count equals 5).'
      sources:
      - start_line: 73
        end_line: 79
        file: ''
      - start_line: 165
        end_line: 165
        file: ''
      uid: 279d1206-a56d-43b6-87d0-ed75226db035
  Age:
    code:
    - suggestion: 'assert ''Age'' in df.columns, ''Missing required column: Age'''
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''assert ''Age'' in df.columns,
        ''Missing required column: Age'''': invalid syntax (<string>, line 1)'
