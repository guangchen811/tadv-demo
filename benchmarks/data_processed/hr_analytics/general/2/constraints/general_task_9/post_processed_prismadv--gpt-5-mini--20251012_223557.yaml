    - text: 'JobSatisfaction must use an ordinal 1-to-4 scale (integers 1, 2, 3, 4)
        where 1 = lowest satisfaction and 4 = highest satisfaction. The risk calculation
        (risk_js = (4 - JobSatisfaction) / 3.0) and logic that tests JobSatisfaction
        <= 2 rely on this ordering and domain. Represent as a validation rule: .satisfies("CASE
        WHEN `JobSatisfaction` IN (1, 2, 3, 4) THEN 1 ELSE 0 END", "JobSatisfaction
        in {1,2,3,4}", lambda x: x == 1.0)'
