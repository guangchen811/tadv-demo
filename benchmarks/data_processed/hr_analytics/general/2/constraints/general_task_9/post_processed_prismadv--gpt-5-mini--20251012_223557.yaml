        end_line: 57
        file: ''
      - start_line: 127
        end_line: 127
        file: ''
      uid: 4590be4f-c5e4-4f4f-975b-50b4bccae384
    - text: 'JobSatisfaction should be complete (no nulls). The code does not fill
        missing JobSatisfaction values before using them to compute risk_js, to clip
        risk_score, and to form outputs; missing values would produce NaNs and can
        break downstream comparisons and tiering. Represent as a validation rule:
        .satisfies("CASE WHEN `JobSatisfaction` IS NOT NULL THEN 1 ELSE 0 END", "Non-null
        JobSatisfaction", lambda x: x == 1.0)'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 56
        end_line: 57
        file: ''
      - start_line: 140
        end_line: 145
        file: ''
      uid: c77435fb-9c6b-461b-b95c-7374cb34c223
    - text: 'JobSatisfaction values should not contain unexpected out-of-range integers
