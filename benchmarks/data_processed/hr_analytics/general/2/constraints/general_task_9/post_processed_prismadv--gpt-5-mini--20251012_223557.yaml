    - text: 'The ''YearsInCurrentRole'' column should not contain nulls (or only a
        negligible fraction). The pipeline assumes these values are present for reporting
        and for computing the role_ratio (even though role_ratio handles some NaNs,
        missing YearsInCurrentRole will affect risk calculation and output). Enforce
        that the completeness of this column is high (e.g., 100% or >= 0.99).

        Example constraint:

        .satisfies("CASE WHEN `YearsInCurrentRole` IS NOT NULL THEN 1 ELSE 0 END",
        "Non-null YearsInCurrentRole", lambda x: x >= 0.99)'
