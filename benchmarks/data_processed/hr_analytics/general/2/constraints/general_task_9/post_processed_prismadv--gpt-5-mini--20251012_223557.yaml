    - text: '''TotalWorkingYears'' and ''YearsAtCompany'' should be non-negative (>=
        0) and remain present (non-null) after numeric coercion. This supports downstream
        arithmetic and ratio computations. Actionable constraint examples: assert
        completeness of both columns (e.g. .hasCompleteness(''TotalWorkingYears'',
        1.0) and .hasCompleteness(''YearsAtCompany'', 1.0)) and assert they satisfy
        TotalWorkingYears >= 0 AND YearsAtCompany >= 0 (or separate non-negativity
        checks).'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 19
        end_line: 23
        file: ''
      - start_line: 61
        end_line: 63
        file: ''
      uid: 1eb20f32-29ff-43e4-927e-f7d7b746da64
  '["YearsAtCompany","YearsInCurrentRole","YearsSinceLastPromotion","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'For every record, YearsInCurrentRole should be less than or equal to
        YearsAtCompany. This is required because the code computes role_ratio = YearsInCurrentRole
        / YearsAtCompany and treats the ratio as a proportion of tenure. Actionable
        row-level constraint (Deequ-style): .satisfies(''YearsInCurrentRole <= YearsAtCompany'',
        ''role_within_tenure'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: 456bd0fd-f7e2-4c29-970f-1e37b76af0c2
    - text: 'For every record, YearsWithCurrManager should be less than or equal to
        YearsAtCompany and non-negative. The code computes mgr_ratio = YearsWithCurrManager
        / YearsAtCompany and later uses 1 - mgr_ratio, so YearsWithCurrManager must
        be in the range [0, YearsAtCompany]. Actionable row-level constraint: .satisfies(''YearsWithCurrManager
        >= 0 AND YearsWithCurrManager <= YearsAtCompany'', ''mgr_within_tenure'')'
      sources:
      - start_line: 61
        end_line: 70
        file: ''
      uid: 990993f4-00af-4d0e-8f22-59b24ed4ef1f
    - text: 'For every record, YearsSinceLastPromotion should be non-negative and
        should not exceed YearsAtCompany. The promotion-lag risk is computed as YearsSinceLastPromotion
        / 5 and is semantically meaningful only if YearsSinceLastPromotion <= total
        tenure. Actionable row-level constraint: .satisfies(''YearsSinceLastPromotion
        >= 0 AND YearsSinceLastPromotion <= YearsAtCompany'', ''promo_within_tenure'')'
      sources:
      - start_line: 61
        end_line: 66
        file: ''
      uid: 7cf31baf-e560-468b-aab9-595e1eab9ba8
    - text: 'If YearsAtCompany == 0 then YearsInCurrentRole, YearsWithCurrManager
        and YearsSinceLastPromotion should be either 0 or null. The code replaces
        YearsAtCompany==0 with NaN to avoid division-by-zero and then fills NaNs for
        ratios with 0. To preserve semantics, numerator tenure fields for zero-tenure
        employees should be zero or missing. Actionable row-level constraint (Deequ-style):
        .satisfies("NOT (YearsAtCompany = 0) OR (coalesce(YearsInCurrentRole,0) =
        0 AND coalesce(YearsWithCurrManager,0) = 0 AND coalesce(YearsSinceLastPromotion,0)
        = 0)", ''zero_tenure_consistency'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 66
        end_line: 70
        file: ''
      uid: cfa7e269-a1d5-40f2-b5ac-c09bdede5297
    - text: 'All tenure-related columns used together (YearsAtCompany, YearsInCurrentRole,
        YearsWithCurrManager, YearsSinceLastPromotion) should be finite numeric values
        (no infinite values). The code explicitly replaces infinite results for mgr_ratio
        and relies on numeric conversion earlier, so upstream data should not contain
        infinities or non-numeric tokens for these columns. Actionable dataset-level
        checks: .hasNoNulls on YearsAtCompany (or at least a clear null-policy), and
        .satisfies(''isFinite(YearsWithCurrManager) AND isFinite(YearsInCurrentRole)
        AND isFinite(YearsSinceLastPromotion)'', ''tenure_finite'')'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 925cdbfa-ec4a-47b4-9ec9-39f6c6f1ce96
