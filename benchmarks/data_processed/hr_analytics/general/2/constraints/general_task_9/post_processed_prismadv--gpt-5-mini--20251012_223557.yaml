    - text: 'Values in ''YearsInCurrentRole'' should be non-negative integers (>=
        0). Negative values are not meaningful in this context and would distort ratios
        and risk calculations.

        Example constraint:

        .satisfies("CASE WHEN `YearsInCurrentRole` >= 0 AND `YearsInCurrentRole` =
        CAST(`YearsInCurrentRole` AS INT) THEN 1 ELSE 0 END", "Non-negative integer
        YearsInCurrentRole", lambda x: x == 1.0)'
