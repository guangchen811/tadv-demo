    - text: 'WorkLifeBalance should have very few (ideally zero) missing values after
        coercion to numeric. Missing WorkLifeBalance values will make comparisons
        like (WorkLifeBalance <= 2) evaluate false and can change recommended actions
        and risk tiers. Example validation: .satisfies("CASE WHEN `WorkLifeBalance`
