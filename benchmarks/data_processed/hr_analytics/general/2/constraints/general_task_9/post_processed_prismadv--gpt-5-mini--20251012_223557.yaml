        2->0.5, 3->0.0, 4->-0.05). Inputs outside this set will be treated as unknown
        (risk mapped to 0.0) which may hide data issues. Represent this as a constraint:
        .satisfies("CASE WHEN `WorkLifeBalance` IN (1,2,3,4) THEN 1 ELSE 0 END", "Valid_WorkLifeBalance_Categories",
        lambda x: x >= 0.99)'
