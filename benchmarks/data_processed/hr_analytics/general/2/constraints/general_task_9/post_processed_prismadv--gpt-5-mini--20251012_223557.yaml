  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'SalarySlab values must be consistent with MonthlyIncome numeric ranges.
        Concretely the dataset should satisfy all of:

        - If SalarySlab == ''Upto 5k'' then MonthlyIncome <= 5000

        - If SalarySlab == ''5k-10k'' then MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000

        - If SalarySlab == ''10k-15k'' then MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000

        - If SalarySlab == ''15k+'' then MonthlyIncome > 15000

        This can be expressed as actionable Deequ-style constraints (examples):

        .satisfies("SalarySlab != ''Upto 5k'' OR MonthlyIncome <= 5000", "slab_upto_5k_consistency")

        .satisfies("SalarySlab != ''5k-10k'' OR (MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000)", "slab_5k_10k_consistency")

        .satisfies("SalarySlab != ''10k-15k'' OR (MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000)", "slab_10k_15k_consistency")

        .satisfies("SalarySlab != ''15k+'' OR MonthlyIncome > 15000", "slab_15k_plus_consistency")'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 35
        end_line: 41
        file: ''
      - start_line: 140
        end_line: 144
        file: ''
      uid: e9df8732-79a8-4e79-97f1-53f03d7d1d2a
    - text: 'MonthlyIncome should imply the correct SalarySlab (the inverse consistency).
        Concretely the dataset should satisfy:

        - If MonthlyIncome <= 5000 then SalarySlab == ''Upto 5k''

        - If MonthlyIncome > 5000 AND MonthlyIncome <= 10000 then SalarySlab == ''5k-10k''

        - If MonthlyIncome > 10000 AND MonthlyIncome <= 15000 then SalarySlab == ''10k-15k''

        - If MonthlyIncome > 15000 then SalarySlab == ''15k+''

        This prevents mismatches introduced during ingestion or manual edits. Example
        Deequ-style constraints:

        .satisfies("MonthlyIncome > 0 OR MonthlyIncome IS NOT NULL", "monthly_income_positive")

        .satisfies("MonthlyIncome <= 5000 OR SalarySlab != ''Upto 5k''", "monthly_to_slab_upto5k_inv")

        .satisfies("(MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR SalarySlab
        != ''5k-10k''", "monthly_to_slab_5k_10k_inv")

        .satisfies("(MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR SalarySlab
        != ''10k-15k''", "monthly_to_slab_10k_15k_inv")

        .satisfies("MonthlyIncome > 15000 OR SalarySlab != ''15k+''", "monthly_to_slab_15k_plus_inv")'
