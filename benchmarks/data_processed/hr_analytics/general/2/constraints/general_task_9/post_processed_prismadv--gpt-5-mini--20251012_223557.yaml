      validity: true
      reason_if_invalid: ''
      level: error
      uid: dd8f40ed-c938-4e03-aa6d-72c88da77843
      source_assumptions:
      - 3d6e7711-4809-498b-b17e-bcb8f5148b59
    - suggestion: '.satisfies(''CASE WHEN `Age` BETWEEN 18 AND 100 AND FLOOR(`Age`)
        = `Age` THEN 1 ELSE 0 END'', ''Age range & integer'', lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 03920c01-1ca7-4d8f-a540-a97e5114dcd8
      source_assumptions:
      - 3d282efe-a284-468d-8209-47a14ccdd26f
    assumptions:
    - text: 'The input must contain an ''Age'' column. The script reads a CSV and
        later selects ''Age'' into the output columns, so missing the ''Age'' column
        would cause a failure (KeyError). Example validation: require the column exists
        (e.g., Great Expectations expect_column_to_exist or Deequ HasColumn).'
      sources:
      - start_line: 16
        end_line: 16
        file: ''
      - start_line: 140
        end_line: 145
        file: ''
      uid: 40a268bd-0165-4435-9c92-580836168df0
    - text: 'All rows must have non-null ''Age'' values. The code casts numeric columns
        with pd.to_numeric(errors=''coerce'') but does not fill or otherwise handle
        missing values for ''Age'' before writing it out, so the input should not
        contain nulls. Deequ-style constraint: .satisfies("CASE WHEN `Age` IS NOT
        NULL THEN 1 ELSE 0 END", "Null Age Values", lambda x: x == 1).'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 140
        end_line: 145
        file: ''
      uid: 832885fc-965f-4958-b7ac-32a3408c1df4
    - text: 'All ''Age'' values must be numeric / convertible to a number. The code
        calls pd.to_numeric(..., errors=''coerce'') for ''Age'', so non-numeric strings
        would become NaN; because the code does not recover those, the input should
        contain only numeric (or numeric-string) values. Deequ-style constraint: .satisfies("CASE
        WHEN TRY_CAST(`Age` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Age is numeric",
        lambda x: x == 1).'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      uid: 3d6e7711-4809-498b-b17e-bcb8f5148b59
    - text: 'Age should be an integer-valued human working age (no fractional ages)
        and fall within a reasonable range. The business age groups start at 18 (e.g.,
        ''18-25''), so input ages < 18 are unexpected; also extremely large ages are
        unlikely. A reasonable validation: require 18 <= Age <= 100 and Age is whole.
        Deequ-style constraint: .satisfies("CASE WHEN `Age` BETWEEN 18 AND 100 AND
        FLOOR(`Age`) = `Age` THEN 1 ELSE 0 END", "Age range & integer", lambda x:
        x == 1).'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 140
        end_line: 145
        file: ''
      uid: 3d282efe-a284-468d-8209-47a14ccdd26f
  Attrition:
    code:
    - suggestion: .isComplete('Attrition')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: dca80ffa-5715-414d-b727-5d7d1bfd502a
      source_assumptions:
      - 4bade74f-7d32-42c8-8f8a-a97dea5d690d
    - suggestion: .isContainedIn('Attrition', ['Yes', 'No'])
      validity: true
      reason_if_invalid: ''
      level: error
      uid: f96f5e0e-fe27-42f1-8197-a6c606ce5354
      source_assumptions:
      - 271a2567-ad01-43e2-8ff2-86ac2eb45fcf
    - suggestion: '.satisfies("CASE WHEN `Attrition` = ''No'' THEN 1 ELSE 0 END",
        "Has at least one No", lambda x: x > 0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 9c9abbcd-513e-4b71-a778-94ec2f3b1dc6
      source_assumptions:
      - 7d730677-cfb0-4141-b528-b12b989ba02f
    - suggestion: '.satisfies("CASE WHEN `Attrition` = ''Yes'' THEN 1 ELSE 0 END",
        "Has at least one Yes", lambda x: x > 0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 4b664eff-2bbb-4a76-80e7-55387ef66d60
      source_assumptions:
      - 3c5ddd74-0312-4001-b9b7-8cdf2c63fd55
    assumptions:
    - text: 'The ''Attrition'' column must not contain null/missing values in the
        input data. The code computes rates like (df[''Attrition''] == ''Yes'').mean()
        and uses overall_attr_rate for threshold calibration, which assumes Attrition
        is present for all rows. You can express this as a Deequ/GE rule, e.g.: .satisfies("CASE
        WHEN `Attrition` IS NOT NULL THEN 1 ELSE 0 END", "Attrition not null", lambda
        x: x == 1).'
      sources:
      - start_line: 46
        end_line: 47
        file: ''
      - start_line: 113
        end_line: 113
        file: ''
      uid: 4bade74f-7d32-42c8-8f8a-a97dea5d690d
    - text: 'The ''Attrition'' column uses the exact string labels ''Yes'' and ''No''
        (case-sensitive), with ''Yes'' indicating the positive/attrition class. The
        code relies on equality checks (== ''Yes'') to compute rates. Represent as:
        .satisfies("CASE WHEN `Attrition` IN (''Yes'',''No'') THEN 1 ELSE 0 END",
        "Valid Attrition Labels", lambda x: x == 1).'
      sources:
      - start_line: 46
        end_line: 47
        file: ''
      - start_line: 113
        end_line: 113
        file: ''
      uid: 271a2567-ad01-43e2-8ff2-86ac2eb45fcf
    - text: 'There should be at least one ''No'' value (negative class) in the data
        (and ideally at least one ''No'' within the OverTime== ''No'' subgroup) so
        that rate_ot_no is not zero. If rate_ot_no == 0 the code sets uplift_ot to
        0.0 and the uplift calculation is not informative. A Deequ rule could be:
        .satisfies("CASE WHEN `Attrition` = ''No'' THEN 1 ELSE 0 END", "Has at least
        one No", lambda x: x > 0).'
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      uid: 7d730677-cfb0-4141-b528-b12b989ba02f
    - text: 'There should be at least one ''Yes'' (positive) example in the dataset
        so overall_attr_rate > 0 and the threshold calibration reflects observed prevalence
        (otherwise overall_attr_rate == 0 and thresholds fall back to the code''s
        fixed lower bound). Express as: .satisfies("CASE WHEN `Attrition` = ''Yes''
        THEN 1 ELSE 0 END", "Has at least one Yes", lambda x: x > 0).'
      sources:
      - start_line: 113
        end_line: 115
        file: ''
      uid: 3c5ddd74-0312-4001-b9b7-8cdf2c63fd55
  '["Age","AgeGroup"]':
    code: []
    assumptions:
    - text: 'The categorical AgeGroup labels correspond to concrete Age intervals
        and are used downstream to compute risk. Concretely: ''18-25'' => Age between
        18 and 25 inclusive; ''26-35'' => Age between 26 and 35; ''36-45'' => Age
        between 36 and 45; ''46-55'' => Age between 46 and 55; ''55+'' => Age >= 55.
        Enforceable as row-level predicates (one per group) or a single compound predicate.
        Example Deequ-style checks: .satisfies("Age >= 18 AND Age <= 25", "agegroup_18_25").where("AgeGroup
        = ''18-25''") and similarly for other groups, or a single .satisfies(...)
        expression that encodes all branches.'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 73
        end_line: 80
        file: ''
      - start_line: 97
        end_line: 106
        file: ''
      uid: 25c85651-2cae-4577-9aa6-8ab1bb42482c
    - text: 'There should be no records where Age and AgeGroup disagree: for every
        row the Age value must fall into the interval implied by the AgeGroup label.
        This is important because AgeGroup is directly mapped to risk_age_band and
        used in summary metrics (e.g., ''age_26_35_share''); violations indicate inconsistent
        data and will bias risk calculations. Implement as a multi-column constraint
        that fails when AgeGroup = ''18-25'' AND (Age < 18 OR Age > 25), etc., or
        as a single predicate combining all groups.'
      sources:
      - start_line: 73
        end_line: 80
        file: ''
      - start_line: 140
        end_line: 144
        file: ''
      - start_line: 165
        end_line: 165
        file: ''
      uid: ec16f6f7-00db-468a-8bca-92034db0e428
  '["Age","TotalWorkingYears"]':
    code:
    - suggestion: '.satisfies("TotalWorkingYears <= Age - 18", "totalworkingyears_le_age_minus_18",
        lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 659e0f4a-ba11-43c7-bec9-09ce974483d8
      source_assumptions:
      - 9a1c74ac-3bd0-4d5b-97a8-67bd8273cdaa
    - suggestion: '.satisfies("TotalWorkingYears >= YearsAtCompany", "totalworkingyears_ge_yearsatcompany",
        lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 789001a8-c0e2-4b3f-acd4-a2a2132e7b9b
      source_assumptions:
      - 1c5ddd78-1aae-4829-a324-cadc13328d3c
    assumptions:
    - text: 'Both ''Age'' and ''TotalWorkingYears'' must be present (non-null) for
        every record. The code converts these columns to numeric and then includes
        them in the final output without null-handling, so downstream logic expects
        completeness. Example Deequ constraint: .isComplete(["Age", "TotalWorkingYears"])
        or .satisfies("Age IS NOT NULL AND TotalWorkingYears IS NOT NULL", "age_and_totalworkingyears_complete").'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 140
        end_line: 144
        file: ''
      uid: c9864a19-e60b-468d-bda2-f8ba13fae106
    - text: 'For every row, ''TotalWorkingYears'' should be less than or equal to
        (Age - 18). The code uses AgeGroup values starting at 18 and treats TotalWorkingYears
        as a lifetime measure; therefore we assume employees started working at or
        after age 18. Example Deequ-style check: .satisfies("TotalWorkingYears <=
        Age - 18", "totalworkingyears_le_age_minus_18").'
      sources:
      - start_line: 72
        end_line: 80
        file: ''
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 140
        end_line: 144
        file: ''
      uid: 9a1c74ac-3bd0-4d5b-97a8-67bd8273cdaa
    - text: 'Per-record logical consistency: ''TotalWorkingYears'' should be greater
        than or equal to ''YearsAtCompany'' (an employee''s total career years must
        be at least their tenure at the current company). Example Deequ-style check:
        .satisfies("TotalWorkingYears >= YearsAtCompany", "totalworkingyears_ge_yearsatcompany").'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 60
        end_line: 63
        file: ''
      - start_line: 140
        end_line: 144
        file: ''
      uid: 1c5ddd78-1aae-4829-a324-cadc13328d3c
  '["Attrition","OverTime"]':
    code: []
    assumptions:
    - text: "Both 'OverTime' and 'Attrition' are categorical with only the values\
        \ 'Yes' and 'No' and no missing values. The code treats these columns as binary\
        \ flags (df['OverTime'] == 'Yes', df['Attrition'] == 'Yes') and computes group\
        \ rates and an overall attrition rate from them. Representable as actionable\
        \ constraints, for example:\n- Deequ: .isContainedIn(\"OverTime\", [\"Yes\"\
        ,\"No\"]) and .isContainedIn(\"Attrition\", [\"Yes\",\"No\"]) \n- Deequ completeness:\
        \ .hasCompleteness(\"OverTime\", 1.0) and .hasCompleteness(\"Attrition\",\
        \ 1.0)\n(These constraints ensure the boolean comparisons and rate computations\
        \ behave as expected.)"
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 113
        end_line: 115
        file: ''
      uid: b8b02e1c-3364-4ba7-9739-d842d06450d9
    - text: 'There must be at least one row for each OverTime category (''Yes'' and
        ''No'') and, for each category, there should be at least one row with a non-null
        Attrition value. The code computes rate_ot_yes and rate_ot_no by subsetting
        on OverTime and taking the mean of (Attrition == ''Yes''), so these group
        counts must be present to produce meaningful uplift estimates. Actionable
        checks:

        - Ensure count(OverTime == ''Yes'') > 0 and count(OverTime == ''No'') > 0

        - Ensure conditional completeness: completeness(Attrition | OverTime == ''Yes'')
        > 0 and completeness(Attrition | OverTime == ''No'') > 0

        (Deequ/SQL-style assertions can be used to implement these.)'
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      uid: dc76f917-cbe3-4e37-8534-c3b965b1578a
    - text: 'Tenure-related columns satisfy logical ordering relative to YearsAtCompany:
        YearsAtCompany is non-negative and (typically) > 0 for most rows, and the
        per-role/manager/promotion durations do not exceed total tenure. Concretely:
        YearsInCurrentRole <= YearsAtCompany, YearsWithCurrManager <= YearsAtCompany,
        YearsSinceLastPromotion <= YearsAtCompany, and YearsAtCompany >= 0. These
        relationships are relied on when computing ratios (YearsInCurrentRole / YearsAtCompany,
        YearsWithCurrManager / YearsAtCompany) and when replacing zero denominators.
        Actionable constraints:

        - For all rows: YearsAtCompany >= 0

        - For all rows: YearsInCurrentRole <= YearsAtCompany

        - For all rows: YearsWithCurrManager <= YearsAtCompany

        - For all rows: YearsSinceLastPromotion <= YearsAtCompany

        (Implementable via Deequ .satisfies expressions or row-level assertions.)'
      sources:
      - start_line: 61
        end_line: 70
        file: ''
      uid: f6fa03cb-7875-461f-9035-db6de1f5dad2
    - text: 'For conditional action logic, when OverTime == ''Yes'' the WorkLifeBalance
        value must be numeric, non-null and within the expected ordinal range (1..4).
        The recommend_action function uses (row[''OverTime''] == ''Yes'') and (row[''WorkLifeBalance'']
        <= 2) to return ''FlexibleSchedule'', so WorkLifeBalance must be comparable
        to integer thresholds for rows with OverTime == ''Yes''. Actionable checks:

        - isNumeric(WorkLifeBalance) and completeness(WorkLifeBalance | OverTime ==
        ''Yes'') == 1.0

        - values(WorkLifeBalance) subset of {1,2,3,4}

        (These can be enforced via Deequ .isContainedIn and conditional completeness
        constraints.)'
      sources:
      - start_line: 51
        end_line: 53
        file: ''
      - start_line: 122
        end_line: 130
        file: ''
