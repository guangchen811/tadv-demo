      uid: ba0cfa93-c7cf-4834-b603-700c73ad475c
      source_assumptions:
      - 40a268bd-0165-4435-9c92-580836168df0
    - suggestion: '.satisfies(''TRY_CAST(`Age` AS DOUBLE) IS NOT NULL'', ''Age is
