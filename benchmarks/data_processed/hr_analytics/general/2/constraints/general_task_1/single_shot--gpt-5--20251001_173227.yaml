constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - '.satisfies(''Age BETWEEN 18 AND 65'', ''age_range_18_65'', lambda v: v >=
        0.99)'
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Age_AgeGroup:
    code:
    - - '.satisfies("((AgeGroup = ''18-25'' AND Age BETWEEN 18 AND 25) OR (AgeGroup
        = ''26-35'' AND Age BETWEEN 26 AND 35) OR (AgeGroup = ''36-45'' AND Age BETWEEN
        36 AND 45) OR (AgeGroup = ''46-55'' AND Age BETWEEN 46 AND 55) OR (AgeGroup
        = ''55+'' AND Age >= 55))", ''age_agegroup_consistency'', lambda v: v >= 0.98)'
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['Non-Travel', 'Travel_Rarely', 'Travel_Frequently'])
      - Invalid
    assumptions: []
  DailyRate:
    code:
    - - '.satisfies(''DailyRate > 0'', ''dailyrate_positive'', lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  Education:
    code:
    - - .isComplete('Education')
      - Valid
    - - '.satisfies(''Education BETWEEN 1 AND 5'', ''education_range'', lambda v:
        v >= 0.99)'
      - Valid
    assumptions: []
  EducationField:
    code:
    - - .isComplete('EducationField')
      - Valid
    - - .isContainedIn('EducationField', ['Life Sciences', 'Medical', 'Marketing',
        'Technical Degree', 'Human Resources', 'Other'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isComplete('EmployeeCount')
      - Valid
    - - '.satisfies(''EmployeeCount = 1'', ''employee_count_one'', lambda v: v ==
        1.0)'
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isComplete('EnvironmentSatisfaction')
      - Valid
    - - '.satisfies(''EnvironmentSatisfaction BETWEEN 1 AND 4'', ''envsat_range'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  HourlyRate:
    code:
    - - '.satisfies(''HourlyRate > 0'', ''hourlyrate_positive'', lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  JobInvolvement:
    code:
    - - .isComplete('JobInvolvement')
      - Valid
    - - '.satisfies(''JobInvolvement BETWEEN 1 AND 4'', ''jobinvolvement_range'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - '.satisfies(''JobLevel BETWEEN 1 AND 5'', ''joblevel_range'', lambda v: v
        >= 0.99)'
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction')
      - Valid
    - - '.satisfies(''JobSatisfaction BETWEEN 1 AND 4'', ''jobsat_range'', lambda
        v: v >= 0.99)'
      - Valid
    assumptions: []
  MaritalStatus:
    code:
    - - .isComplete('MaritalStatus')
      - Valid
    - - .isContainedIn('MaritalStatus', ['Single', 'Married', 'Divorced'])
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - '.satisfies(''MonthlyIncome > 0'', ''monthlyincome_positive'', lambda v: v
        == 1.0)'
      - Valid
    assumptions: []
  MonthlyRate:
    code:
    - - '.satisfies(''MonthlyRate > 0'', ''monthlyrate_positive'', lambda v: v >=
        0.99)'
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18')
      - Valid
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isComplete('PercentSalaryHike')
      - Valid
    - - '.satisfies(''PercentSalaryHike >= 0 AND PercentSalaryHike <= 25'', ''perc_salary_hike_range'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  RelationshipSatisfaction:
    code:
    - - .isComplete('RelationshipSatisfaction')
      - Valid
    - - '.satisfies(''RelationshipSatisfaction BETWEEN 1 AND 4'', ''relsat_range'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  SalarySlab_vs_MonthlyIncome:
    code:
    - - '.satisfies("((SalarySlab = ''Upto 5k'' AND MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome > 15000))", ''salaryslab_income_consistency'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isComplete('StandardHours')
      - Valid
    - - '.satisfies(''StandardHours = 80'', ''standardhours_eq_80'', lambda v: v ==
        1.0)'
      - Valid
    assumptions: []
  StockOptionLevel:
    code:
    - - .isComplete('StockOptionLevel')
      - Valid
    - - '.satisfies(''StockOptionLevel BETWEEN 0 AND 3'', ''stockoptionlevel_range'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  Tenure_Consistency_CurrentRole:
    code:
    - - '.satisfies(''YearsInCurrentRole <= YearsAtCompany'', ''currentrole_le_company'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  Tenure_Consistency_ManagerYears:
    code:
    - - '.satisfies(''YearsWithCurrManager <= YearsAtCompany'', ''manager_years_le_company'',
        lambda v: v >= 0.99)'
      - Invalid
    assumptions: []
  Tenure_Consistency_PromoYears:
    code:
    - - '.satisfies(''YearsSinceLastPromotion <= YearsAtCompany'', ''years_since_promo_le_company'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  Tenure_Consistency_TWY_vs_YAC:
    code:
    - - '.satisfies(''TotalWorkingYears >= YearsAtCompany'', ''tw_years_ge_company'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isComplete('WorkLifeBalance')
      - Valid
    - - '.satisfies(''WorkLifeBalance BETWEEN 1 AND 4'', ''wlb_range'', lambda v:
        v >= 0.99)'
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda v: v >= 0.95)'
      - Valid
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
  _dataset:
    code:
    - - '.hasSize(lambda v: v > 0)'
      - Valid
    assumptions: []
