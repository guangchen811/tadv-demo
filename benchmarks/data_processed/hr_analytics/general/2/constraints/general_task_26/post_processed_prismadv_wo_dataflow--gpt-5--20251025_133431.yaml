    - text: 'Values in ''YearsSinceLastPromotion'' should be non-negative (>= 0).
        Negative years would imply invalid tenure sequencing and distort tenure-derived
        adjustments. We could represent this as a Deequ rule: isNonNegative(''YearsSinceLastPromotion''),
        or a Great Expectations rule: expect_column_values_to_be_between(min_value=0,
        allow_cross_type_comparisons=True).'
      sources:
