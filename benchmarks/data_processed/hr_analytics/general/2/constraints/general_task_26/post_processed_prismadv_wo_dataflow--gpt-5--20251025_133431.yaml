      source_assumptions:
      - 490abf76-b75d-4b38-a7cf-43ea317ecf33
    - suggestion: '.isContainedIn(''JobLevel'', [''1'', ''2'', ''3'', ''4'', ''5''],
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 16c2461c-ddd0-4d50-979f-74c9255781a3
      source_assumptions:
      - 32249f36-fca9-4a96-a8eb-990a3900bfec
      - 4fe35a52-58bb-4cff-8a57-652f732bc55f
    - suggestion: '.hasNumberOfDistinctValues(''JobLevel'', lambda x: (x >= 2) and
        (x <= 5))'
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''JobLevel'',
        lambda x: (x >= 2) and (x <= 5))'': Check.hasNumberOfDistinctValues() missing
        2 required positional arguments: ''binningUdf'' and ''maxBins'''
      level: warning
      uid: cf70d8b1-1a43-4ad1-bc03-7812153dfd55
      source_assumptions:
      - 1f72691c-988b-4973-8422-0b364f94795f
    assumptions:
    - text: 'JobLevel must be present for all rows and be parseable as numeric integers
        (no NaNs introduced by the numeric coercion). It is coerced to numeric and
        then used in grouping, comparisons, and arithmetic. We could represent this
        as Deequ constraints like: .isComplete(''JobLevel'') and .satisfies(''CASE
        WHEN cast(`JobLevel` AS double) IS NOT NULL AND (`JobLevel` % 1) = 0 THEN
        1 ELSE 0 END'', ''JobLevel is numeric integer'', lambda x: x == 1.0). In Great
        Expectations: expect_column_values_to_be_between(''JobLevel'', min_value=None,
        max_value=None) combined with expect_column_values_to_be_of_type(''JobLevel'',
        ''IntegerType'') or expect_column_values_to_match_regex(''^\d+$'').'
      sources:
      - start_line: 56
        end_line: 66
        file: ''
      - start_line: 87
        end_line: 88
        file: ''
      - start_line: 95
        end_line: 95
        file: ''
      - start_line: 114
        end_line: 115
        file: ''
      uid: 490abf76-b75d-4b38-a7cf-43ea317ecf33
    - text: 'JobLevel values should be within the known company ladder of 1 through
        5 inclusive (no values < 1 or > 5). This keeps max-level gating and +1 promotions
        meaningful and prevents spurious out-of-range levels. We could represent this
        as Deequ: .hasMin(''JobLevel'', lambda x: x >= 1) and .hasMax(''JobLevel'',
        lambda x: x <= 5) and .satisfies(''CASE WHEN `JobLevel` IN (1,2,3,4,5) THEN
        1 ELSE 0 END'', ''Valid JobLevel domain'', lambda x: x == 1.0). In Great Expectations:
        expect_column_values_to_be_between(''JobLevel'', 1, 5) and/or expect_column_values_to_be_in_set(''JobLevel'',
        [1,2,3,4,5]).'
      sources:
      - start_line: 95
        end_line: 95
        file: ''
      - start_line: 114
        end_line: 115
        file: ''
      uid: 32249f36-fca9-4a96-a8eb-990a3900bfec
    - text: 'JobLevel should form a contiguous integer ladder so that a promotion
        corresponds to moving from level L to L+1 within the valid domain. Practically,
        either the set of values equals the full integer range [min(JobLevel), max(JobLevel)]
        or, given the expected domain, {1,2,3,4,5}. We could represent this as Deequ:
        .satisfies(''CASE WHEN `JobLevel` < 5 THEN CASE WHEN `JobLevel` + 1 IN (1,2,3,4,5)
        THEN 1 ELSE 0 END ELSE 1 END'', ''Next level exists for non-max levels'',
        lambda x: x == 1.0) or by enforcing the in-set domain above. In Great Expectations:
        expect_column_values_to_be_in_set(''JobLevel'', [1,2,3,4,5]).'
      sources:
      - start_line: 95
        end_line: 95
        file: ''
      - start_line: 114
        end_line: 115
        file: ''
      uid: 4fe35a52-58bb-4cff-8a57-652f732bc55f
    - text: 'There should be at least two distinct JobLevel values in the input so
        that level-based percentile ranking and max-level gating are meaningful. We
        could represent this as Deequ: .hasNumberOfDistinctValuesBetween(''JobLevel'',
        lowerBound=2, upperBound=5). In Great Expectations: expect_column_unique_value_count_to_be_between(''JobLevel'',
        min_value=2, max_value=5).'
      sources:
      - start_line: 87
        end_line: 88
        file: ''
      - start_line: 95
        end_line: 95
        file: ''
      uid: 1f72691c-988b-4973-8422-0b364f94795f
  '["JobLevel","MonthlyIncome","PerformanceRating","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: "SalarySlab and MonthlyIncome must be aligned according to the slab definitions:\
        \ SalarySlab \u2208 {'Upto 5k','5k-10k','10k-15k','15k+'} and, per row: (SalarySlab='Upto\
        \ 5k' => 0 <= MonthlyIncome <= 5000), (SalarySlab='5k-10k' => 5000 < MonthlyIncome\
        \ <= 10000), (SalarySlab='10k-15k' => 10000 < MonthlyIncome <= 15000), (SalarySlab='15k+'\
        \ => MonthlyIncome > 15000). This ensures valid BandMidpoint/CompaRatio and\
        \ NextBandMin logic. A Deequ-style constraint could be expressed as a compliance\
        \ check over that piecewise condition."
      sources:
      - start_line: 8
        end_line: 19
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      - start_line: 101
        end_line: 102
        file: ''
      uid: 6697bdca-459f-4e6b-bcd9-8d849cdc9a04
    - text: 'Tenure hierarchy across year columns must hold: 0 <= YearsSinceLastPromotion
        <= YearsAtCompany <= TotalWorkingYears (all numeric). This avoids pathological
        TenureRatio values and is consistent with the comment about hierarchical year
        consistency. In Deequ, this can be a compliance constraint: (YearsSinceLastPromotion
        >= 0 and YearsAtCompany >= 0 and TotalWorkingYears >= 0 and YearsSinceLastPromotion
        <= YearsAtCompany and YearsAtCompany <= TotalWorkingYears).'
      sources:
      - start_line: 55
        end_line: 63
        file: ''
      - start_line: 80
        end_line: 85
        file: ''
      uid: 68ba1dfa-aedd-411c-bd53-f117714a095b
    - text: "Level\u2013salary relationship should be monotonic across levels: the\
        \ median MonthlyIncome by JobLevel should be non-decreasing as JobLevel increases.\
        \ This supports the use of within-level percentiles for promotion gating.\
        \ This can be validated by aggregating median MonthlyIncome per JobLevel and\
        \ asserting median(level k+1) >= median(level k) for all consecutive levels."
      sources:
      - start_line: 86
        end_line: 88
        file: ''
      uid: 6d1bb2e1-6c25-4820-85a6-e43bf106207d
    - text: 'Within each JobLevel group, MonthlyIncome must be present (non-null)
        for all rows so LevelPercentile is well-defined and the 85th-percentile promotion
        gate is meaningful. This can be enforced as per-level completeness: for each
        distinct JobLevel j, completeness(MonthlyIncome where JobLevel=j) = 1.0.'
      sources:
      - start_line: 86
        end_line: 95
        file: ''
      uid: 14cbdaae-eb87-4279-b369-b2bb47784bcc
