        file: ''
      uid: 6f86d3e2-a904-4aad-86ee-0a0ae67852c7
    - text: 'The ''YearsSinceLastPromotion'' column represents whole years and should
        be integer-like (no fractional part). This is implied by the promotion rule
        that compares it to the integer threshold 2 years. We could represent this
        as a Great Expectations rule: expect_column_values_to_match_regex(''^\d+$'')
        or expect_column_values_to_be_in_type_list([''int'', ''long'']) when feasible;
