      uid: 7c397245-e2db-46a4-b78d-e4799f1e1d5a
    - text: 'The ''YearsSinceLastPromotion'' column should be largely non-null (e.g.,
        at least 95% completeness). Nulls are not filled and will exclude rows from
        promotion consideration and produce NaNs in tenure-based adjustments. We could
        represent this as a Deequ rule: hasCompleteness(''YearsSinceLastPromotion'',
        lambda x: x >= 0.95), or a Great Expectations rule: expect_column_values_to_not_be_null
        with mostly=0.95.'
      sources:
      - start_line: 55
        end_line: 66
        file: ''
      - start_line: 81
        end_line: 85
