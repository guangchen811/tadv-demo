      - start_line: 116
        end_line: 135
        file: ''
      uid: 7be5a35f-270b-4847-8030-c3b17266f326
    - text: '''EmpID'' should be complete (no null or empty values) for all rows,
        as it serves as the identifier carried through to the exported results. This
        can be validated with Deequ isComplete(''EmpID'') and a non-empty check (e.g.,
        satisfies("length(trim(`EmpID`)) > 0", ...)).'
      sources:
      - start_line: 116
        end_line: 137
        file: ''
      uid: b65cfc27-b51d-4990-8638-7c62efbf5f62
    - text: '''EmpID'' values should be unique across the input so each employee receives
        at most one recommendation row. This can be validated with Deequ hasUniqueness([''EmpID''],
        lambda x: x == 1.0) or Great Expectations expect_column_values_to_be_unique(''EmpID'').'
      sources:
      - start_line: 116
        end_line: 135
        file: ''
      uid: c0902a57-acd6-4cfa-87ee-b78829fbe86d
    - text: '''EmpID'' should be read and treated as a textual identifier (not numeric)
        to avoid unintended type inference and loss of significant formatting (e.g.,
        leading zeros) since read_csv does not specify dtypes. This can be validated
        with Deequ hasDataType(''EmpID'', ConstrainableDataTypes.String) or Great
        Expectations expect_column_values_to_match_regex to ensure values are not
        purely numeric if leading zeros are significant.'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      - start_line: 116
        end_line: 135
        file: ''
      uid: 2ad93bb3-25c6-4803-9759-6e96b9755cb5
  MonthlyIncome:
    code:
    - suggestion: '.satisfies("MonthlyIncome IS NOT NULL AND NOT isnan(CAST(MonthlyIncome
