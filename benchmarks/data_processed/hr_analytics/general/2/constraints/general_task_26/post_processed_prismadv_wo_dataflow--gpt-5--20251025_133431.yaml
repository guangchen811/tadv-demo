    - text: 'Values in ''YearsSinceLastPromotion'' should be numeric/parseable as
        numbers. Non-numeric strings will be coerced to null and will cause downstream
        logic (division and comparisons) to behave unexpectedly. We could represent
        this as a Deequ rule: hasDataType(''YearsSinceLastPromotion'', ConstrainableDataTypes.Integral)
        or ConstrainableDataTypes.Fractional, or as a Great Expectations rule: expect_column_values_to_be_in_type_list([''int'',
        ''long'', ''float'', ''double'']).'
