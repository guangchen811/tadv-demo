    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  YearsAtCompany:
    code:
    - suggestion: '.satisfies("CAST(`YearsAtCompany` AS double) IS NOT NULL", "YearsAtCompany
        is numeric", lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 109f8149-9785-4c1b-a964-1b6112d8c429
      source_assumptions:
      - ffff72d9-4bb0-4443-bf08-b9ea27927363
    - suggestion: '.satisfies("CASE WHEN CAST(`YearsAtCompany` AS double) IS NULL
        THEN 1 WHEN CAST(`YearsAtCompany` AS double) >= 0 THEN 1 ELSE 0 END", "Non-negative
        YearsAtCompany", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 6e8b37b7-167e-4ad5-b902-1b7b6ff62935
      source_assumptions:
      - ab782ab8-8060-4033-b414-ee180aa4e994
    - suggestion: '.satisfies("CASE WHEN CAST(`YearsAtCompany` AS double) IS NULL
        THEN 1 WHEN CAST(`YearsAtCompany` AS double) = FLOOR(CAST(`YearsAtCompany`
        AS double)) THEN 1 ELSE 0 END", "YearsAtCompany integer-like", lambda x: x
        >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 1e95110c-7f56-4c46-9d1e-bc991e1081f2
      source_assumptions:
      - 41ad518e-a7f5-4b2d-a427-28e719978d8b
    - suggestion: '.satisfies("CASE WHEN CAST(`YearsAtCompany` AS double) IS NULL
        OR CAST(`TotalWorkingYears` AS double) IS NULL THEN 1 WHEN CAST(`YearsAtCompany`
        AS double) <= CAST(`TotalWorkingYears` AS double) THEN 1 ELSE 0 END", "Tenure
        <= TotalWorkingYears", lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: fa0bf0e9-c479-4832-a2d3-274763d96cc3
      source_assumptions:
      - a9f68c56-5037-4f86-9c82-1b0989690b41
    - suggestion: '.satisfies("(CAST(`YearsAtCompany` AS double) IS NULL OR CAST(`YearsSinceLastPromotion`
        AS double) IS NULL) OR (CAST(`YearsAtCompany` AS double) = 0 AND (CAST(`YearsSinceLastPromotion`
        AS double) IS NULL OR CAST(`YearsSinceLastPromotion` AS double) = 0)) OR (CAST(`YearsSinceLastPromotion`
        AS double) <= CAST(`YearsAtCompany` AS double))", "Promotion-years within
        tenure", lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 7c240614-3bbc-437d-a09f-ea063563ba3f
      source_assumptions:
      - 5300ef4e-79d4-4a11-93dc-2ca921dcf062
    assumptions:
    - text: 'YearsAtCompany should be parseable as numeric in almost all rows; non-numeric
        inputs will be coerced to null. Suggested rule: .satisfies("CASE WHEN try_cast(`YearsAtCompany`
        AS double) IS NOT NULL THEN 1 ELSE 0 END", "YearsAtCompany is numeric", lambda
        x: x >= 0.99)'
      sources:
      - start_line: 55
        end_line: 66
        file: ''
      uid: ffff72d9-4bb0-4443-bf08-b9ea27927363
    - text: 'YearsAtCompany should be present (non-null) for nearly all rows. Although
        the code tolerates nulls (treating them as zero-tenure for TenureRatio), the
        dataset indicates full completeness; target completeness >= 0.99. Suggested
        rule: .hasCompleteness("YearsAtCompany", lambda x: x >= 0.99)'
      sources:
      - start_line: 55
        end_line: 66
        file: ''
      - start_line: 80
        end_line: 85
        file: ''
      uid: c010b3b4-37ac-48d0-ac50-bc2f0ae76abb
    - text: 'YearsAtCompany should be non-negative (no negative tenure). Suggested
        rule: .satisfies("CASE WHEN `YearsAtCompany` IS NULL THEN 1 WHEN `YearsAtCompany`
        >= 0 THEN 1 ELSE 0 END", "Non-negative YearsAtCompany", lambda x: x == 1.0)'
      sources:
      - start_line: 80
        end_line: 85
        file: ''
      uid: ab782ab8-8060-4033-b414-ee180aa4e994
    - text: 'YearsAtCompany should be whole years (integer-like). Suggested rule:
        .satisfies("CASE WHEN `YearsAtCompany` IS NULL THEN 1 WHEN `YearsAtCompany`
        = FLOOR(`YearsAtCompany`) THEN 1 ELSE 0 END", "YearsAtCompany integer-like",
        lambda x: x >= 0.99)'
      sources:
      - start_line: 55
        end_line: 66
        file: ''
      uid: 41ad518e-a7f5-4b2d-a427-28e719978d8b
    - text: 'YearsAtCompany should not exceed TotalWorkingYears when both are present.
        Suggested rule: .satisfies("CASE WHEN `YearsAtCompany` IS NULL OR `TotalWorkingYears`
        IS NULL THEN 1 WHEN `YearsAtCompany` <= `TotalWorkingYears` THEN 1 ELSE 0
        END", "Tenure <= TotalWorkingYears", lambda x: x >= 0.99)'
      sources:
      - start_line: 55
        end_line: 66
        file: ''
      - start_line: 80
        end_line: 85
        file: ''
      uid: a9f68c56-5037-4f86-9c82-1b0989690b41
    - text: 'YearsSinceLastPromotion should not exceed YearsAtCompany; if YearsAtCompany
        is 0, YearsSinceLastPromotion should be 0 (or null). Suggested rule: .satisfies("CASE
        WHEN `YearsAtCompany` IS NULL OR `YearsSinceLastPromotion` IS NULL THEN 1
        WHEN `YearsAtCompany` = 0 THEN COALESCE(`YearsSinceLastPromotion`, 0) = 0
        WHEN `YearsSinceLastPromotion` <= `YearsAtCompany` THEN 1 ELSE 0 END", "Promotion-years
        within tenure", lambda x: x >= 0.99)'
      sources:
      - start_line: 55
        end_line: 66
        file: ''
      - start_line: 80
        end_line: 85
        file: ''
      uid: 5300ef4e-79d4-4a11-93dc-2ca921dcf062
  EmpID:
