        file: ''
      uid: 53b25c27-8073-43cc-86eb-0d255ac1cdde
    - text: 'Hierarchical year consistency: ''YearsSinceLastPromotion'' should not
        exceed ''YearsAtCompany'', and when ''YearsAtCompany'' == 0, ''YearsSinceLastPromotion''
        should be 0. We could represent this as Deequ rules: satisfies(''CASE WHEN
        `YearsAtCompany` IS NOT NULL AND `YearsSinceLastPromotion` IS NOT NULL THEN
        (CASE WHEN `YearsAtCompany` = 0 THEN (CASE WHEN `YearsSinceLastPromotion`
        = 0 THEN 1 ELSE 0 END) ELSE (CASE WHEN `YearsSinceLastPromotion` <= `YearsAtCompany`
        THEN 1 ELSE 0 END) END) ELSE 1 END'', ''YSLP within tenure'', lambda x: x
        == 1), or Great Expectations compound expectations comparing the two columns.'
