    assumptions:
    - text: The 'MonthlyIncome' column must exist in the input data, as it is used
        for compa ratio calculations, percentile ranking, raise computation, and is
        included in the output.
      sources:
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 87
        end_line: 87
        file: ''
      - start_line: 103
        end_line: 103
        file: ''
      - start_line: 121
        end_line: 121
        file: ''
      uid: 41613a0c-ca9b-4cdb-abc7-f90caf67436b
    - text: All values in 'MonthlyIncome' must be numeric and finite (no null/NaN,
        no non-numeric tokens, no +/-Infinity). The code coerces to numeric with errors='coerce'
        and later converts derived values to integers, which will fail if any 'MonthlyIncome'
        entries become null or infinite after coercion. This can be validated by requiring
        CAST(MonthlyIncome AS DOUBLE) to be non-null and finite for 100% of rows.
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 104
        end_line: 105
        file: ''
      - start_line: 112
        end_line: 112
        file: ''
      uid: 27dd0eb5-ed65-48c3-93eb-23fee953931a
    - text: 'The ''MonthlyIncome'' values must be consistent with the provided ''SalarySlab''
        categories. Specifically: when SalarySlab = ''Upto 5k'' then MonthlyIncome
        <= 5000; when ''5k-10k'' then 5001 <= MonthlyIncome <= 10000; when ''10k-15k''
        then 10001 <= MonthlyIncome <= 15000; when ''15k+'' then MonthlyIncome >=
        15001. This should hold for 100% of rows to ensure compa-ratio and band-based
        logic are meaningful.'
      sources:
      - start_line: 8
        end_line: 19
        file: ''
      - start_line: 69
        end_line: 71
        file: ''
      - start_line: 101
        end_line: 102
        file: ''
      uid: 8ddaf1a3-f23e-4e2c-9444-9a686862aa88
    - text: '''MonthlyIncome'' should be non-negative (>= 0). Negative values would
        be treated as ''Upto 5k'' by the slab logic and distort compa ratio and raise
        calculations. This can be validated by asserting the minimum of ''MonthlyIncome''
        is >= 0.'
      sources:
      - start_line: 12
        end_line: 19
        file: ''
      uid: 9131b369-ce22-4a8a-b3e9-b7ec474dedfa
  JobLevel:
    code:
    - suggestion: .isComplete('JobLevel')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: b4306c14-3db9-405b-95d1-e340f0a3aa83
      source_assumptions:
      - 490abf76-b75d-4b38-a7cf-43ea317ecf33
    - suggestion: '.hasDataType(''JobLevel'', ''Integral'', lambda x: x == 1.0)'
      validity: false
      reason_if_invalid: 'Skipping data type constraint: .hasDataType(''JobLevel'',
        ''Integral'', lambda x: x == 1.0)'
