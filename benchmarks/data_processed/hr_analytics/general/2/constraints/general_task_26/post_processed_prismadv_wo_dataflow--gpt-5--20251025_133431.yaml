    assumptions:
    - text: 'The input data is expected to contain an ''EmpID'' column so that recommendations
        can be keyed by employee in the output CSV. This can be validated by asserting
        the column exists before processing (e.g., Great Expectations: expect_table_columns_to_contain_set
