constraints:
  AgeGroup:
    code:
    - - '.hasNumberOfDistinctValues(''AgeGroup'', lambda x: x == 5)'
      - Invalid
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - '.hasNumberOfDistinctValues(''Department'', lambda x: x == 3)'
      - Invalid
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    - - .isPositive('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - '.hasMax(''JobLevel'', lambda v: v <= 5)'
      - Valid
    - - '.hasMin(''JobLevel'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('JobLevel')
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    - - '.satisfies("((SalarySlab = ''Upto 5k'' AND MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome > 15000))", ''monthlyincome_within_slab_bounds'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - '.hasNumberOfDistinctValues(''PerformanceRating'', lambda x: x == 2)'
      - Invalid
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - '.hasNumberOfDistinctValues(''SalarySlab'', lambda x: x == 4)'
      - Invalid
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isLessThanOrEqualTo('YearsInCurrentRole', 'YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isLessThanOrEqualTo('YearsSinceLastPromotion', 'YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
