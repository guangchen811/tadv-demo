    - text: 'For every record, the ''MonthlyIncome'' value must fall within the numerical
        range implied by its corresponding ''SalarySlab''. This ensures that employees
        are correctly categorized by their salary bracket, which is crucial for calculating
        ''SlabMedian'' and applying ''slab_caps''. For example, if ''SalarySlab''
        is ''Upto 5k'', ''MonthlyIncome'' should be between 0 and 5000 (inclusive
        of 5000).

        We could represent this assumption as a Deequ constraint like this:

        .satisfies("CASE WHEN SalarySlab = ''Upto 5k'' THEN MonthlyIncome <= 5000
        AND MonthlyIncome > 0 WHEN SalarySlab = ''5k-10k'' THEN MonthlyIncome > 5000
        AND MonthlyIncome <= 10000 WHEN SalarySlab = ''10k-15k'' THEN MonthlyIncome
        > 10000 AND MonthlyIncome <= 15000 WHEN SalarySlab = ''15k+'' THEN MonthlyIncome
