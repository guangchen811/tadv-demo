    - text: 'For all records, the ''YearsSinceLastPromotion'' must be less than or
        equal to the ''YearsAtCompany''. If ''YearsSinceLastPromotion'' is greater
        than ''YearsAtCompany'', it results in a negative ''stagnation_years'', which
        is then clipped to zero before calculating the square root. This clipping
        suggests an underlying assumption that stagnation years should not be negative.

        We could represent this assumption as a Deequ constraint like this:

        .isGreaterThanOrEqualTo("YearsAtCompany", "YearsSinceLastPromotion")'
