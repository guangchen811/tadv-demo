    - text: 'The number of years since an employee''s last promotion (`YearsSinceLastPromotion`)
        must be less than or equal to their total years at the company (`YearsAtCompany`).
        An employee cannot have been promoted before they joined the company, nor
        can the time since their last promotion exceed their total tenure. Although
        the code uses `.clip(lower=0)` to handle potential negative values, the underlying
        data assumption is that this relationship holds.

        We could represent this assumption as a deequ constraint like this:

        .isNonNegative("YearsAtCompany - YearsSinceLastPromotion")'
