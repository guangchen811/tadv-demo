        We could represent this assumption as a Deequ constraint like this:

        .isGreaterThanOrEqualTo("YearsAtCompany", "YearsInCurrentRole")

        .satisfies("CASE WHEN YearsInCurrentRole > 0 THEN YearsAtCompany > 0 ELSE
        TRUE END", "YearsAtCompany must be positive if YearsInCurrentRole is positive")'
