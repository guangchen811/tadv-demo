    assumptions:
    - text: 'For the calculation of `ratio_in_role`, it is assumed that the ''YearsAtCompany''
        column contains strictly positive values (greater than 0) and that ''YearsInCurrentRole''
        values are always less than or equal to ''YearsAtCompany'' values, reflecting
        logical tenure progression. We could represent this assumption as a deequ
        constraint like this: `.isGreaterThan("YearsAtCompany", 0)` and `.isGreaterThanOrEqualTo("YearsAtCompany",
        "YearsInCurrentRole")`'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      uid: d87ad199-5e44-493d-ab74-74b10771406d
    - text: 'For the calculation of `stagnation_years`, it is assumed that the ''YearsAtCompany''
        column values are consistently greater than or equal to the ''YearsSinceLastPromotion''
        column values, ensuring that the derived stagnation period is non-negative
        and logically sound. We could represent this assumption as a deequ constraint
        like this: `.isGreaterThanOrEqualTo("YearsAtCompany", "YearsSinceLastPromotion")`'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      uid: 44bee0fe-c20c-45ae-a375-e07676e2332d
    - text: 'When mapping ''Department'' to ''BudgetMultiplier'', it is assumed that
        all values in the ''Department'' column are among the predefined keys (''Sales'',
        ''Research & Development'', ''Human Resources'') in the `budget_multipliers`
        dictionary, ensuring that the `BudgetMultiplier` is derived from expected
        categories rather than relying on the fallback `fillna` value. We could represent
        this assumption as a deequ constraint like this: `.isContainedIn("Department",
        ["Sales", "Research & Development", "Human Resources"])`'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      uid: 10ad1ccd-3ef7-4460-8fce-09ca5d019e0c
    - text: 'For the accurate calculation of `SlabMedian` and `CompaRatio`, it is
        assumed that the ''MonthlyIncome'' column contains strictly positive numeric
        values within each distinct ''SalarySlab'' group. This ensures that the median
        income for any slab is positive, preventing division by zero when `CompaRatio`
        is computed. We could represent this assumption as a deequ constraint like
        this: `.isGreaterThan("MonthlyIncome", 0)`'
      sources:
      - start_line: 57
        end_line: 60
        file: ''
      uid: 169769b6-bfc6-4ebb-bf44-7a821f794037
    - text: 'When applying salary caps, it is assumed that all values in the ''SalarySlab''
        column correspond to valid keys (''Upto 5k'', ''5k-10k'', ''10k-15k'', ''15k+'')
        defined in the `slab_caps` dictionary, ensuring that the correct cap is applied
        to each record. We could represent this assumption as a deequ constraint like
        this: `.isContainedIn("SalarySlab", ["Upto 5k", "5k-10k", "10k-15k", "15k+"])`'
      sources:
      - start_line: 73
        end_line: 74
        file: ''
      uid: fd98f4aa-062f-41ef-8be6-d52a7301857d
    - text: 'For determining promotion eligibility, it is assumed that ''PerformanceRating''
        is an integral value (expected to be 3 or 4), ''YearsInCurrentRole'' is a
        non-negative integral value, and ''YearsSinceLastPromotion'' is a non-negative
        integral value. These columns must hold values that logically satisfy the
        combined eligibility criteria (`PerformanceRating` >= 4 AND `YearsInCurrentRole`
        >= `required_years` AND `YearsSinceLastPromotion` >= 1). We could represent
        parts of this assumption as deequ constraints like this: `.isContainedIn("PerformanceRating",
        [3, 4])`, `.isNonNegative("YearsInCurrentRole")`, `.isNonNegative("YearsSinceLastPromotion")`.'
