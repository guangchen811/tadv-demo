    - text: 'The ''Department'' column should only contain values that are explicitly
        defined as keys in the `budget_multipliers` dictionary (''Sales'', ''Research
        & Development'', ''Human Resources''). If any other department values are
        present, they will be assigned a default ''BudgetMultiplier'' of 1.00, which
        may not align with specific departmental policies.

        We could represent this assumption as a Deequ constraint like this:

        .isContainedIn("Department", ["Sales", "Research & Development", "Human Resources"],
        constraintStrength=1.0)'
