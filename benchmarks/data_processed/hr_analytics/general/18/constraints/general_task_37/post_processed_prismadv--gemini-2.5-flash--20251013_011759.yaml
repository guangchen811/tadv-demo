    - text: 'The number of years an employee has spent in their current role (`YearsInCurrentRole`)
        must be less than or equal to the number of years since their last promotion
        (`YearsSinceLastPromotion`). A promotion typically marks a new phase or role,
        and time in the *current* role would logically restart or be contained within
        the period since the last promotion. If an employee changed roles without
        promotion, `YearsInCurrentRole` would reset, but `YearsSinceLastPromotion`
        would continue to increase, maintaining this relationship.

        We could represent this assumption as a deequ constraint like this:

        .isNonNegative("YearsSinceLastPromotion - YearsInCurrentRole")'
