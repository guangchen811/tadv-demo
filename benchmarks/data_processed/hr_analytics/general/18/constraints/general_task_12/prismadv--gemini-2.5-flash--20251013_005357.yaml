    assumptions:
    - text: "The 'JobRole' and 'Department' columns are expected to exhibit a consistent\
        \ mapping, where each 'JobRole' belongs to a specific 'Department' as defined\
        \ by the `role_to_dept` dictionary. For instance, 'Sales Executive', 'Sales\
        \ Representative', and 'Healthcare Representative' roles should only be associated\
        \ with the 'Sales' Department. Any deviation from this mapping would indicate\
        \ an inconsistency in the organizational structure. \nWe could represent this\
        \ assumption as a Deequ constraint for each role-department pair, for example:\n\
        `.satisfies(\"Sales JobRoles in Sales Department\", \"CASE WHEN JobRole IN\
        \ ('Sales Executive', 'Sales Representative', 'Healthcare Representative')\
        \ THEN Department = 'Sales' ELSE TRUE END\")`\nAnd similarly for other defined\
        \ departments and roles."
      sources:
      - start_line: 66
        end_line: 82
        file: ''
      uid: 848e4abe-2113-4a94-8510-300f7bda4e55
    - text: "The tenure-related columns are assumed to follow a hierarchical order:\
        \ an employee's 'YearsInCurrentRole' should not exceed their 'YearsAtCompany',\
        \ and their 'YearsAtCompany' should not exceed their 'TotalWorkingYears'.\
        \ These relationships are critical for the correct calculation of `internal_tenure_ratio`\
        \ and `company_to_career_ratio`. Additionally, all three columns are expected\
        \ to contain non-negative numerical values. \nWe could represent these assumptions\
        \ as Deequ constraints like this:\n`.satisfies(\"YearsInCurrentRole <= YearsAtCompany\"\
        , \"YearsInCurrentRole <= YearsAtCompany\")`\n`.satisfies(\"YearsAtCompany\
        \ <= TotalWorkingYears\", \"YearsAtCompany <= TotalWorkingYears\")`\nAnd also\
        \ individual non-negativity checks:\n`.isNonNegative(\"YearsInCurrentRole\"\
        )`\n`.isNonNegative(\"YearsAtCompany\")`\n`.isNonNegative(\"TotalWorkingYears\"\
        )`"
      sources:
