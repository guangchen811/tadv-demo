      - start_line: 90
        end_line: 100
        file: ''
      uid: d67490bd-ff61-45f4-9a0b-934332ab08a9
    - text: 'The ''YearsInCurrentRole'', ''YearsAtCompany'', and ''TotalWorkingYears''
        columns are used to calculate tenure ratios. It is assumed these columns are
        numeric and non-negative. Additionally, for logical consistency, ''YearsInCurrentRole''
        should be less than or equal to ''YearsAtCompany'', and ''YearsAtCompany''
        should be less than or equal to ''TotalWorkingYears''. The code explicitly
        handles division by zero for ''YearsAtCompany'' and ''TotalWorkingYears''
        by returning `np.nan`.

        Deequ constraint examples:

        .isNonNegative("YearsInCurrentRole")

        .isNonNegative("YearsAtCompany")

        .isNonNegative("TotalWorkingYears")

        .isLessThanOrEqualTo("YearsInCurrentRole", "YearsAtCompany")

        .isLessThanOrEqualTo("YearsAtCompany", "TotalWorkingYears")'
      sources:
      - start_line: 103
        end_line: 112
        file: ''
      uid: 06e730cc-3351-44b7-b2f7-486bba39bff5
    - text: 'The ''Department'' and ''JobLevel'' columns are used as primary grouping
        keys and for sorting in the promotion pipeline aggregation. It is assumed
        these columns contain categorical or string values that are consistent (e.g.,
        no leading/trailing spaces, uniform casing) and have a finite set of distinct
        values suitable for grouping and ordering.

        Deequ constraint examples:

        .hasMinLength("Department", 1) // no empty strings

        .hasMinLength("JobLevel", 1)

        // Further constraints like .isContainedIn() could be added if specific categories
        are known.'
      sources:
      - start_line: 116
        end_line: 128
        file: ''
      uid: 99a33562-1feb-4751-8b60-16695f665bb6
    - text: 'The ''EmpID'' column is used to count records within each group defined
        by ''Department'' and ''JobLevel'' to determine ''headcount''. While ''EmpID''
        is complete (completeness: 1.0), the dataset description indicates it is not
        entirely unique (848 distinct values out of 882 records). The code implicitly
        assumes that counting all non-null ''EmpID''s (i.e., counting rows) within
        each group is the desired ''headcount'' metric, rather than counting distinct
        employees. If the intention was to count distinct employees, `aggfunc=(''EmpID'',
        ''nunique'')` would be more appropriate.

        Deequ constraint examples:

        .isComplete("EmpID") // Confirmed by data description

        .hasNumberOfDistinctValues("EmpID", 848) // Confirmed by data description'
      sources:
      - start_line: 118
        end_line: 118
        file: ''
      uid: d628d9b6-6021-40e7-ac9a-969468daaec9
    - text: 'The `pivot_table` operation uses ''Department'' as the index and ''JobRole''
        as columns. This implies that these columns are categorical and their combinations
        represent meaningful, expected categories for analysis. The `aggfunc=''size''`
        counts occurrences, assuming that each record contributes one unit to a Department-JobRole
        cell, and `fill_value=0` assumes that a lack of an entry for a Department-JobRole
