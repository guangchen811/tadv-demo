    assumptions:
    - text: 'The columns ''PerformanceRating'', ''YearsInCurrentRole'', and ''YearsSinceLastPromotion''
        are used in numerical comparisons and logical operations to determine ''ready_now''
        and ''ready_soon'' flags. It is assumed these columns are numeric and complete
        (non-null) to ensure accurate and consistent flag computation for all records,
        preventing implicit `False` assignments due to missing values. If nulls are
        present, the comparison `NaN >= X` evaluates to `False` in pandas, which would
        implicitly mark such records as not ''ready_now'' or ''ready_soon''.

        Deequ constraint examples:

        .isNonNegative("PerformanceRating") // assuming rating is non-negative

        .isNonNegative("YearsInCurrentRole")

        .isNonNegative("YearsSinceLastPromotion")

        .isComplete("PerformanceRating")

        .isComplete("YearsInCurrentRole")

        .isComplete("YearsSinceLastPromotion")'
