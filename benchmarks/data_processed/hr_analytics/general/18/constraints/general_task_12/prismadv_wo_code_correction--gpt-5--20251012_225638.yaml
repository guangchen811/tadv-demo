  '["PerformanceRating","YearsInCurrentRole","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: PerformanceRating, YearsInCurrentRole, and YearsSinceLastPromotion must
        be present (non-null) and numeric for all rows because they are used in row-wise
        threshold comparisons and in group means. This can be checked with multi-column
        completeness and type constraints, e.g., areComplete(["PerformanceRating","YearsInCurrentRole","YearsSinceLastPromotion"])
