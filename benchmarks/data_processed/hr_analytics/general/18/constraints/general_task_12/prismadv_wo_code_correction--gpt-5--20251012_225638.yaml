    - text: 'The ready_now indicator must be exactly the conjunction of the three
        threshold conditions: ready_now == (PerformanceRating >= 4 AND YearsInCurrentRole
        >= 2 AND YearsSinceLastPromotion >= 2). This can be enforced with a row-level
        predicate constraint such as satisfies("(PerformanceRating >= 4 AND YearsInCurrentRole
        >= 2 AND YearsSinceLastPromotion >= 2) = ready_now").'
      sources:
      - start_line: 90
        end_line: 94
        file: ''
      uid: 0a7ebab1-e08d-46a7-925a-c0220b8730d9
    - text: 'The ready_soon indicator must be exactly the weaker threshold set and
        mutually exclusive with ready_now: ready_soon == (NOT ready_now AND PerformanceRating
        >= 3 AND YearsInCurrentRole >= 1 AND YearsSinceLastPromotion >= 1). Enforceable
        with satisfies("(NOT ready_now AND PerformanceRating >= 3 AND YearsInCurrentRole
        >= 1 AND YearsSinceLastPromotion >= 1) = ready_soon").'
      sources:
      - start_line: 95
        end_line: 100
        file: ''
      uid: 973e8553-448c-49df-903c-a802e0c81b64
    - text: ready_now and ready_soon are mutually exclusive (no row can have both
        true). Enforceable with satisfies("NOT (ready_now AND ready_soon)").
      sources:
      - start_line: 90
        end_line: 100
        file: ''
      uid: 1bbee9fb-0ed8-42e6-b672-cc3833077af8
    - text: When YearsAtCompany > 0, internal_tenure_ratio must equal YearsInCurrentRole
        / YearsAtCompany and be within [0, 1]; additionally, YearsInCurrentRole must
        be <= YearsAtCompany for those rows. When YearsAtCompany = 0, internal_tenure_ratio
        must be null. This can be expressed as satisfies("(YearsAtCompany <= 0 AND
        internal_tenure_ratio IS NULL) OR (YearsAtCompany > 0 AND internal_tenure_ratio
        = YearsInCurrentRole/YearsAtCompany AND internal_tenure_ratio >= 0 AND internal_tenure_ratio
        <= 1 AND YearsInCurrentRole <= YearsAtCompany)").
      sources:
