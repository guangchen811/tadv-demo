        end_line: 107
        file: ''
      uid: 578bdc78-ae6f-486b-8505-c7d47bdc5c6d
    - text: When TotalWorkingYears > 0, company_to_career_ratio must equal YearsAtCompany
        / TotalWorkingYears and be within [0, 1]; additionally, YearsAtCompany must
        be <= TotalWorkingYears for those rows. When TotalWorkingYears = 0, company_to_career_ratio
        must be null. Enforceable with satisfies("(TotalWorkingYears <= 0 AND company_to_career_ratio
        IS NULL) OR (TotalWorkingYears > 0 AND company_to_career_ratio = YearsAtCompany/TotalWorkingYears
        AND company_to_career_ratio >= 0 AND company_to_career_ratio <= 1 AND YearsAtCompany
        <= TotalWorkingYears)").
      sources:
