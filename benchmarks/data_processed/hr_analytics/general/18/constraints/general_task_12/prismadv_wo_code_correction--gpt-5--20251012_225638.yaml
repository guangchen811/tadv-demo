        additionally, if YearsAtCompany = 0 then YearsSinceLastPromotion must be 0.
        We could represent this as a Deequ constraint: .satisfies(''(YearsAtCompany
        = 0 AND YearsSinceLastPromotion = 0) OR (YearsAtCompany > 0 AND YearsSinceLastPromotion
        <= YearsAtCompany)'', ''promotion_vs_company_tenure'')'
      sources:
      - start_line: 90
        end_line: 100
        file: ''
      - start_line: 103
        end_line: 107
        file: ''
      uid: b8a966e9-e51d-4ead-af17-5fe5267e5dbb
  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'Internal tenure consistency: For every record, YearsInCurrentRole must
        be between 0 and YearsAtCompany. Consequently, when YearsAtCompany > 0, internal_tenure_ratio
        = YearsInCurrentRole / YearsAtCompany must lie in [0, 1]. Example Deequ: .satisfies(''YearsAtCompany
        <= 0 OR (YearsInCurrentRole >= 0 AND YearsInCurrentRole <= YearsAtCompany)'',
        ''internal_tenure_ratio_bounds'', _ >= 1.0)'
      sources:
      - start_line: 104
        end_line: 106
        file: ''
      uid: 6e084d0b-b0ab-44b8-ab5d-e364d200aa80
    - text: 'Career vs company tenure consistency: For every record with TotalWorkingYears
        > 0, YearsAtCompany must be between 0 and TotalWorkingYears. Consequently,
        company_to_career_ratio = YearsAtCompany / TotalWorkingYears must lie in [0,
        1]. Example Deequ: .satisfies(''TotalWorkingYears <= 0 OR (YearsAtCompany
        >= 0 AND YearsAtCompany <= TotalWorkingYears)'', ''company_to_career_ratio_bounds'',
        _ >= 1.0)'
      sources:
      - start_line: 108
        end_line: 112
        file: ''
      uid: cf02b1b8-154c-4c5a-a810-2ccc544af58a
    - text: 'Manager tenure cannot exceed company tenure: For every record, YearsWithCurrManager
        must be between 0 and YearsAtCompany; if YearsWithCurrManager > 0 then YearsAtCompany
        > 0. Example Deequ: .satisfies(''(YearsWithCurrManager IS NULL) OR (YearsWithCurrManager
        >= 0 AND YearsWithCurrManager <= YearsAtCompany)'', ''manager_vs_company_tenure_consistency'',
        _ >= 1.0)'
      sources:
      - start_line: 114
        end_line: 129
        file: ''
      - start_line: 133
        end_line: 136
        file: ''
      uid: 5854bdf0-047f-45e1-aa49-6f6ffcf07ab7
    - text: 'Per-department coverage for manager tenure: Within each Department included
        in outputs, the completeness of YearsWithCurrManager should be high (e.g.,
        >= 0.9) so that department-level averages are reliable. Example Deequ (global
        conditional completeness as a proxy): .hasCompleteness(''YearsWithCurrManager'',
        _ >= 0.9, where=''Department IS NOT NULL'')'
      sources:
      - start_line: 114
        end_line: 129
        file: ''
      - start_line: 133
        end_line: 136
        file: ''
      uid: 39b970e9-9ad7-4e9d-9786-5d1641b0cb9e
