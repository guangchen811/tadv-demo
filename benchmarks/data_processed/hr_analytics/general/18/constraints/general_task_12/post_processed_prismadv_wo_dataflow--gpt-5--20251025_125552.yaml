    - text: 'In the Department-JobLevel aggregation used for promotion pipeline, the
        counts derived from readiness flags must not exceed the group headcount: ready_now_count
        <= headcount and ready_soon_count <= headcount, and (ready_now_count + ready_soon_count)
        <= headcount for every (Department, JobLevel) group. Row-level equivalent
        Deequ compliance: .satisfies("(CAST(ready_now AS INT) + CAST(ready_soon AS
        INT)) <= 1", "readiness_counts_consistent", lambda v: v == 1.0)'
