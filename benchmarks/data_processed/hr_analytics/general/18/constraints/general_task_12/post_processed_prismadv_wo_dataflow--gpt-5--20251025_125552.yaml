  '["TotalWorkingYears","YearsAtCompany"]':
    code: []
    assumptions:
    - text: 'YearsAtCompany must be in the range [0, TotalWorkingYears] for every
        record (i.e., both non-negative and YearsAtCompany <= TotalWorkingYears).
        This ensures the computed company_to_career_ratio stays within [0, 1] whenever
        TotalWorkingYears > 0. Example Deequ compliance: Compliance(''yac_le_tww'',
        ''YearsAtCompany >= 0 AND TotalWorkingYears >= 0 AND YearsAtCompany <= TotalWorkingYears'').'
      sources:
      - start_line: 108
        end_line: 112
        file: ''
      - start_line: 125
        end_line: 126
        file: ''
      uid: dabae7fb-ac88-4538-b8e8-ae03d182d173
    - text: 'If TotalWorkingYears equals 0, then YearsAtCompany must equal 0 (no company
        tenure without any working years). Example Deequ compliance: Compliance(''tww_zero_implies_yac_zero'',
        ''TotalWorkingYears != 0 OR YearsAtCompany = 0'').'
      sources:
      - start_line: 108
        end_line: 112
        file: ''
      uid: d8fc34e5-3ad4-4c10-ac2c-763c21074125
    - text: 'When YearsAtCompany > 0, YearsInCurrentRole must lie in [0, YearsAtCompany],
        so internal_tenure_ratio is bounded in [0, 1]. Example Deequ compliance: Compliance(''yicr_le_yac'',
        ''YearsAtCompany = 0 OR (YearsInCurrentRole >= 0 AND YearsInCurrentRole <=
        YearsAtCompany)'').'
      sources:
      - start_line: 103
        end_line: 107
        file: ''
      - start_line: 125
        end_line: 125
        file: ''
      uid: 4d811688-352f-49fd-ad93-f982768c237b
    - text: 'YearsSinceLastPromotion must be in [0, YearsAtCompany] (cannot exceed
        total company tenure). Example Deequ compliance: Compliance(''yslp_le_yac'',
        ''YearsSinceLastPromotion >= 0 AND YearsSinceLastPromotion <= YearsAtCompany'').'
      sources:
      - start_line: 91
        end_line: 99
        file: ''
      - start_line: 103
        end_line: 107
        file: ''
      uid: 5a8b6af2-f513-4f5a-b8d2-db9732ef804d
    - text: 'YearsWithCurrManager must be in [0, YearsAtCompany] because an employee
        cannot have been with the current manager longer than at the company. Example
        Deequ compliance: Compliance(''ywcm_le_yac'', ''YearsWithCurrManager >= 0
        AND YearsWithCurrManager <= YearsAtCompany'').'
      sources:
      - start_line: 124
        end_line: 124
        file: ''
      - start_line: 133
