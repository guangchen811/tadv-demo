  '["TotalWorkingYears","YearsAtCompany","YearsInCurrentRole","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'Time in current role cannot exceed time at the company. For all rows:
        if ''YearsAtCompany'' > 0 then 0 <= ''YearsInCurrentRole'' <= ''YearsAtCompany'';
        if ''YearsAtCompany'' == 0 then ''YearsInCurrentRole'' == 0. Deequ examples:
        .isLessThanOrEqualTo(''YearsInCurrentRole'',''YearsAtCompany''); .satisfies(''case
        when YearsAtCompany = 0 then YearsInCurrentRole = 0 else YearsInCurrentRole
        >= 0 end'',''yicr_vs_yac'').'
      sources:
      - start_line: 102
        end_line: 107
        file: ''
      uid: c6f356cb-56db-48ff-8f62-51fb8f85697d
    - text: 'Company tenure cannot exceed total working years. For all rows: if ''TotalWorkingYears''
        > 0 then 0 <= ''YearsAtCompany'' <= ''TotalWorkingYears''; if ''TotalWorkingYears''
        == 0 then ''YearsAtCompany'' == 0. Deequ examples: .isLessThanOrEqualTo(''YearsAtCompany'',''TotalWorkingYears'');
        .satisfies(''case when TotalWorkingYears = 0 then YearsAtCompany = 0 else
        YearsAtCompany >= 0 end'',''yac_vs_twy'').'
      sources:
      - start_line: 108
        end_line: 112
        file: ''
      uid: be17434a-220f-4d38-bb28-f60409bf573d
    - text: 'Time since last promotion is bounded by company tenure. For all rows:
        0 <= ''YearsSinceLastPromotion'' <= ''YearsAtCompany''; if ''YearsAtCompany''
        == 0 then ''YearsSinceLastPromotion'' == 0. Deequ examples: .isLessThanOrEqualTo(''YearsSinceLastPromotion'',''YearsAtCompany'');
        .satisfies(''case when YearsAtCompany = 0 then YearsSinceLastPromotion = 0
        else YearsSinceLastPromotion >= 0 end'',''yslp_vs_yac'').'
      sources:
      - start_line: 92
        end_line: 100
        file: ''
      - start_line: 114
        end_line: 127
        file: ''
      uid: a6fd566e-5955-4d3e-90e3-5b205ecd2b56
    - text: 'Tenure ratios are bounded when defined. For rows with ''YearsAtCompany''
        > 0, ''YearsInCurrentRole''/''YearsAtCompany'' must be in [0,1]. For rows
        with ''TotalWorkingYears'' > 0, ''YearsAtCompany''/''TotalWorkingYears'' must
        be in [0,1]. Deequ examples: .satisfies(''case when YearsAtCompany > 0 then
        YearsInCurrentRole/YearsAtCompany between 0 and 1 else true end'',''internal_tenure_ratio_bounds'');
        .satisfies(''case when TotalWorkingYears > 0 then YearsAtCompany/TotalWorkingYears
        between 0 and 1 else true end'',''company_to_career_ratio_bounds'').'
      sources:
      - start_line: 102
        end_line: 112
        file: ''
      uid: b9d93dce-a022-472c-b7b9-a1f40f360ca3
    - text: 'Joint completeness of tenure fields used by readiness and ratio logic:
        ''YearsInCurrentRole'', ''YearsAtCompany'', ''TotalWorkingYears'', and ''YearsSinceLastPromotion''
        are all non-null for every record. Deequ example: .satisfies(''YearsInCurrentRole
        is not null and YearsAtCompany is not null and TotalWorkingYears is not null
        and YearsSinceLastPromotion is not null'',''tenure_fields_complete'').'
      sources:
      - start_line: 92
        end_line: 112
        file: ''
      uid: 85d7217a-92cf-44cd-97dd-658cc0fed6e0
  '["YearsAtCompany","YearsInCurrentRole"]':
    code: []
    assumptions:
    - text: 'YearsInCurrentRole must be less than or equal to YearsAtCompany for every
