    - text: "Department and JobRole must both be present (non-null) for every record\
        \ used in the role\u2013department matrix. Representable in Deequ as: .isComplete(\"\
        Department\").isComplete(\"JobRole\") or a single compliance: .addConstraint(Compliance(\"\
        dept_jobrole_not_null\", \"Department IS NOT NULL AND JobRole IS NOT NULL\"\
