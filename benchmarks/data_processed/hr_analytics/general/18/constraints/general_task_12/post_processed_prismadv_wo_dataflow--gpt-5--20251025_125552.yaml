        file: ''
      uid: 5c474e39-3bf7-4aa6-a94a-4c33ba0e2038
    - text: 'YearsWithCurrManager must be logically bounded by tenure: for every record,
        0 <= YearsWithCurrManager <= YearsAtCompany. This prevents impossible values
        from skewing department-level averages used in pipeline and stability aggregates
        (e.g., Deequ compliance: "YearsWithCurrManager >= 0 AND YearsWithCurrManager
        <= YearsAtCompany").'
      sources:
