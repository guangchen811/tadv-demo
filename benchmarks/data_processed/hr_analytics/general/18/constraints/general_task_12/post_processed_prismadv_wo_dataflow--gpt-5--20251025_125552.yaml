    - text: "In the Role\u2013Department matrix, there should be no off-mapping counts:\
        \ for any Department\u2013JobRole cell where Department != role_to_dept[JobRole],\
        \ the count must be zero. This is equivalent to enforcing the JobRole -> Department\
        \ functional dependency at the cross-tab level."
