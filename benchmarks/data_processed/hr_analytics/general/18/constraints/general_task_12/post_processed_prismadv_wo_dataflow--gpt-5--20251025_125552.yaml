  '["Department","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'JobRole functionally determines Department exactly as defined by the
        role_to_dept mapping. No record should have a Department that differs from
        the mapping for its JobRole. This can be enforced as a functional dependency
        (e.g., in Deequ: hasFunctionalDependency("JobRole", Array("Department")))
        and optionally as a compliance rule that count(JobRole, Department where Department
        != mapping[JobRole]) == 0.'
      sources:
