  '["Department","JobRole"]':
    code: []
    assumptions:
    - text: 'Role-to-department consistency: For any row where JobRole is one of the
        mapped titles, the Department must equal the mapped department. Representable
        in Deequ as a compliance constraint, for example: .addConstraint(Compliance(
        name = "role_department_mapping", predicate = "CASE WHEN JobRole IN (''Sales
        Executive'',''Sales Representative'',''Healthcare Representative'') THEN Department
        = ''Sales'' WHEN JobRole IN (''Research Scientist'',''Laboratory Technician'',''Research
        Director'',''Manufacturing Director'') THEN Department = ''Research & Development''
        WHEN JobRole = ''Human Resources'' THEN Department = ''Human Resources'' ELSE
        true END"))'
