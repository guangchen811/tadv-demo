        CASE WHEN JobRole IN ('Sales Executive','Sales Representative','Healthcare\
        \ Representative','Research Scientist','Laboratory Technician','Research Director','Manufacturing\
        \ Director','Human Resources') THEN CASE JobRole WHEN 'Sales Executive' THEN\
        \ Department = 'Sales' WHEN 'Sales Representative' THEN Department = 'Sales'\
        \ WHEN 'Healthcare Representative' THEN Department = 'Sales' WHEN 'Research\
