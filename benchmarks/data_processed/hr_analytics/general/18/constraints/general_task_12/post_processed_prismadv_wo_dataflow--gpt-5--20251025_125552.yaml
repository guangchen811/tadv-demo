        file: ''
      - start_line: 78
        end_line: 82
        file: ''
      uid: 8f255a56-678a-4981-b172-1af27badfdeb
    - text: 'Within each Department, YearsWithCurrManager should have sufficient non-null
        coverage to produce reliable means in both the promotion_pipeline and manager_stability
        outputs. Concretely, the completeness of YearsWithCurrManager should be at
        least 0.9 for each Department (e.g., Deequ: hasCompleteness("YearsWithCurrManager",
        _ >= 0.9).where("Department = ''Sales''") and similarly for other departments).'
