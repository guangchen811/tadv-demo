        end_line: 52
        file: ''
      uid: 8143669f-4eb3-49b6-90d4-af8e27f3affe
    - text: 'Manager tenure cannot exceed company tenure: For non-null values, YearsWithCurrManager
        must be less than or equal to YearsAtCompany. Additionally, if YearsAtCompany
        equals 0 then YearsWithCurrManager must be 0 or null. Deequ examples: .satisfies("YearsWithCurrManager
        is null or YearsWithCurrManager <= YearsAtCompany", "mgr_tenure_le_company_tenure",
        1.0) and .satisfies("case when YearsAtCompany = 0 then (YearsWithCurrManager
        is null or YearsWithCurrManager = 0) else true end", "mgr_tenure_zero_when_no_tenure",
        1.0).'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      - start_line: 62
        end_line: 64
        file: ''
      uid: 4dfbdb82-7100-44e7-b16b-35ca1ed1b2e9
    - text: 'Department/JobRole consistency: Each JobRole should map to exactly one
        Department (functional dependency), ensuring consistent departmental budgets.
        Deequ example: .hasFunctionalDependency("JobRole", "Department").'
      sources:
      - start_line: 26
        end_line: 31
        file: ''
      uid: 872a9290-83e6-4357-bf68-ba00318fb2a4
    - text: 'Headcount accuracy: Each EmpID should belong to exactly one Department
        (no employee duplicated across departments) to avoid double-counting in department
        headcounts. Deequ example: .hasFunctionalDependency("EmpID", "Department").'
      sources:
      - start_line: 27
        end_line: 30
        file: ''
      uid: b2f23683-a658-41f0-8748-dfd087965794
    - text: 'Salary slab must match income: SalarySlab should be consistent with MonthlyIncome.
        Example rule: ''Upto 5k'' => MonthlyIncome <= 5000; ''5k-10k'' => 5000 < MonthlyIncome
        <= 10000; ''10k-15k'' => 10000 < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome
        > 15000. Deequ example: .satisfies("case when SalarySlab = ''Upto 5k'' then
        MonthlyIncome <= 5000 when SalarySlab = ''5k-10k'' then MonthlyIncome > 5000
        and MonthlyIncome <= 10000 when SalarySlab = ''10k-15k'' then MonthlyIncome
        > 10000 and MonthlyIncome <= 15000 when SalarySlab = ''15k+'' then MonthlyIncome
        > 15000 else false end", "salary_slab_matches_income", 1.0).'
      sources:
      - start_line: 21
        end_line: 24
        file: ''
      uid: 6793c1e2-3d74-40a5-b496-8d9ea1126674
    - text: 'Merit cap logic integrity across columns: approved_percent must equal
        the minimum of recommended_percent and cap_percent, where recommended_percent
        = PercentSalaryHike + rating_bonus and cap_percent is derived from SalarySlab.
        Deequ examples: .satisfies("recommended_percent = PercentSalaryHike + rating_bonus",
        "recommended_is_sum", 1.0) and .satisfies("approved_percent <= recommended_percent
        and approved_percent <= cap_percent", "approved_is_min_bound", 1.0) and .satisfies("case
        when recommended_percent <= cap_percent then approved_percent = recommended_percent
        else approved_percent = cap_percent end", "approved_is_exact_min", 1.0).'
      sources:
      - start_line: 18
        end_line: 24
        file: ''
      uid: 9bfff773-ea96-47ce-b8f3-f0e7cf7556a8
