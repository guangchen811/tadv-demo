  ? '["AgeGroup","Attrition","DistanceFromHome","JobSatisfaction","OverTime","WorkLifeBalance","YearsAtCompany","YearsSinceLastPromotion","YearsWithCurrManager"]'
  : code: []
    assumptions:
    - text: 'For tenure plausibility: YearsSinceLastPromotion must be less than or
        equal to YearsAtCompany, and if YearsAtCompany equals 0 then YearsSinceLastPromotion
        must be 0. Deequ examples: .satisfies("YearsSinceLastPromotion <= YearsAtCompany",
