  '["PercentSalaryHike","PerformanceRating","SalarySlab"]':
    code: []
    assumptions:
    - text: 'rating_bonus must be deterministically derived from PerformanceRating:
        PerformanceRating=3 -> rating_bonus=0.0; PerformanceRating=4 -> rating_bonus=2.0.
        No other PerformanceRating values are expected. Deequ: .satisfies(''(PerformanceRating
        = 3 AND rating_bonus = 0.0) OR (PerformanceRating = 4 AND rating_bonus = 2.0)'',
