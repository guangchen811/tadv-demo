  '["Department","EmpID"]':
    code: []
    assumptions:
    - text: 'Each EmpID must belong to exactly one Department across the dataset.
        In other words, for any given EmpID, the number of distinct Departments observed
        is 1, and the (EmpID, Department) combination should be unique per row. This
        can be enforced by checking that countDistinct(Department) over EmpID equals
        1 (e.g., verify on a per-employee aggregation that dept_cnt <= 1) or that
        the number of distinct EmpID equals the number of distinct (EmpID, Department)
        pairs. Example Deequ approach: on df.groupBy(''EmpID'').agg(countDistinct(''Department'').as(''dept_cnt'')),
        assert dept_cnt <= 1 for all rows; additionally verify .isUnique([''EmpID'',''Department'']).'
      sources:
      - start_line: 26
        end_line: 30
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: 3af880ff-d5f4-4067-bdf6-eb7096f580a4
    - text: Each JobRole maps to a single Department (no JobRole appears in multiple
        Departments). This functional dependency JobRole -> Department can be represented
        by asserting that the number of distinct JobRole equals the number of distinct
        (JobRole, Department) pairs or, equivalently, that countDistinct(Department)
        over each JobRole equals 1.
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: 40f38df4-d6fb-4da6-8977-63eda58579b7
    - text: 'SalarySlab must be consistent with MonthlyIncome bands used to cap merit
        adjustments: MonthlyIncome <= 5000 -> ''Upto 5k''; 5000 < MonthlyIncome <=
        10000 -> ''5k-10k''; 10000 < MonthlyIncome <= 15000 -> ''10k-15k''; MonthlyIncome
        > 15000 -> ''15k+''. This can be enforced with a row-wise rule, e.g., Deequ
        .satisfies("(MonthlyIncome <= 5000 AND SalarySlab = ''Upto 5k'') OR (MonthlyIncome
        > 5000 AND MonthlyIncome <= 10000 AND SalarySlab = ''5k-10k'') OR (MonthlyIncome
        > 10000 AND MonthlyIncome <= 15000 AND SalarySlab = ''10k-15k'') OR (MonthlyIncome
        > 15000 AND SalarySlab = ''15k+'' )", ''salary_slab_matches_income'', 1.0).'
      sources:
      - start_line: 21
        end_line: 24
        file: ''
      - start_line: 89
        end_line: 92
        file: ''
      uid: 4ce2ad08-a88c-4fab-a284-bb744b04b16e
    - text: 'The approved_percent and approved_amount columns should be internally
        consistent with the inputs PercentSalaryHike, PerformanceRating (via rating_bonus),
        SalarySlab (via cap_percent), and MonthlyIncome. Specifically: approved_percent
        = min(PercentSalaryHike + rating_bonus, cap_percent) and 0 <= approved_percent
        <= cap_percent; approved_amount = MonthlyIncome * (approved_percent / 100)
        within a small numeric tolerance. Example Deequ rules: .satisfies("approved_percent
        <= cap_percent AND approved_percent >= 0", ''approved_percent_bounds'', 1.0);
        .satisfies("abs(approved_percent - least(PercentSalaryHike + rating_bonus,
        cap_percent)) < 1e-6", ''approved_percent_definition'', 1.0); .satisfies("abs(approved_amount
        - (MonthlyIncome * approved_percent / 100.0)) < 1e-6", ''approved_amount_definition'',
        1.0).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 89
        end_line: 92
        file: ''
      uid: fd638536-913a-4298-bc1e-d91897e2c2e0
    - text: 'RiskTier must be consistent with AttritionRiskScore using the binning
        logic [0.0, 0.4) -> ''Low'', [0.4, 0.6) -> ''Medium'', [0.6, 1.0) -> ''High''.
        This can be asserted with a rule such as: .satisfies("(AttritionRiskScore
        >= 0.0 AND AttritionRiskScore < 0.4 AND RiskTier = ''Low'') OR (AttritionRiskScore
        >= 0.4 AND AttritionRiskScore < 0.6 AND RiskTier = ''Medium'') OR (AttritionRiskScore
        >= 0.6 AND AttritionRiskScore < 1.0 AND RiskTier = ''High'')", ''risk_tier_matches_score'',
        1.0).'
      sources:
      - start_line: 78
        end_line: 83
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: 17732341-d120-41b9-860c-ed1e4f6f1abf
  '["Department","JobRole"]':
    code: []
    assumptions:
    - text: 'Each JobRole maps to exactly one Department (functional dependency: JobRole
        -> Department). This consistency is required so that department-level budgets
        are accurate and not distorted by cross-department job titles. Deequ example:
        .hasFunctionalDependency(''JobRole'', [''Department''])'
      sources:
      - start_line: 26
        end_line: 33
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: 602267d4-116d-4b37-9c01-c7d5e2e251cc
    - text: 'An EmpID must determine a single (Department, JobRole) pair across the
        dataset (no employee appears in multiple departments or roles in the same
        extract). Deequ example: .hasFunctionalDependency(''EmpID'', [''Department'',''JobRole''])'
      sources:
      - start_line: 27
        end_line: 30
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: 746a1968-b5ee-4e10-952c-71c60ebcf43c
    - text: 'The set of valid (Department, JobRole) combinations is a small, stable
        subset of the 3x9 cross-product; expected number of distinct pairs should
        be bounded (e.g., <= 12). This prevents unexpected cross-department roles
        from slipping into budgeting and risk outputs. Deequ example (using ApproxCountDistinct
        on composite key): .hasApproxCountDistinct(Seq(''Department'',''JobRole''),
        _ <= 12)'
      sources:
      - start_line: 26
        end_line: 33
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: d3fcd7ef-727e-4d7a-93fc-810a12abaf23
    - text: 'Specific semantic consistency: when JobRole is ''Human Resources'', Department
        must be ''Human Resources'' (to avoid misallocation in department budgets
        and inconsistent risk outputs). Deequ example: .isCompliance(''hr_role_in_hr_dept'',
        "JobRole != ''Human Resources'' OR Department = ''Human Resources''", _ ==
        1.0)'
      sources:
      - start_line: 26
        end_line: 33
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: 2e25a701-da67-4d00-be96-f7c67d21c662
  '["EmpID","JobRole"]':
    code: []
    assumptions:
    - text: 'Each JobRole maps to exactly one Department across the dataset (functional
        dependency JobRole -> Department). This ensures Department/JobRole consistency
        used in budgeting and reporting. Example Deequ: .hasFunctionalDependency("JobRole",
        ["Department"]).'
      sources:
      - start_line: 26
        end_line: 30
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: af9b934d-9522-43f3-90ec-8acbe176dae4
    - text: 'Each EmpID has exactly one Department and one JobRole (functional dependency
        EmpID -> {Department, JobRole}), i.e., per-employee org attributes are stable
        and there is one row per employee for accurate headcounts and risk export.
        Example Deequ: .hasFunctionalDependency("EmpID", ["Department", "JobRole"]).'
      sources:
      - start_line: 27
        end_line: 30
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: be5c80c4-4a43-4da2-b5e7-32681dfafe8a
    - text: 'No duplicate rows for the same (EmpID, Department) combination to prevent
        inflated headcounts in department budgets. Example Deequ: .isUnique(["EmpID",
        "Department"]).'
      sources:
      - start_line: 27
        end_line: 30
        file: ''
      uid: 39190a30-8608-4497-b42e-e188df18ec64
    - text: 'Merit formula integrity must hold row-wise: recommended_percent = PercentSalaryHike
        + rating_bonus; approved_percent = least(recommended_percent, cap_percent);
        and approved_amount = MonthlyIncome * (approved_percent / 100). Also enforce
        0 <= approved_percent <= cap_percent. Example Deequ: .satisfies("(recommended_percent
        = PercentSalaryHike + rating_bonus) AND (approved_percent <= cap_percent)
        AND (approved_percent >= 0) AND (abs(approved_amount - MonthlyIncome * approved_percent/100)
        < 1e-6)", "merit_logic", 1.0).'
      sources:
      - start_line: 18
        end_line: 24
        file: ''
      uid: f70b1d44-cc5a-4a6c-81c0-2fdd9eca1c6b
    - text: 'SalarySlab-to-cap_percent mapping must be exact, and SalarySlab should
        be consistent with MonthlyIncome ranges: ''Upto 5k'' => cap_percent=20 and
        MonthlyIncome <= 5000; ''5k-10k'' => cap_percent=15 and 5000 < MonthlyIncome
        <= 10000; ''10k-15k'' => cap_percent=12 and 10000 < MonthlyIncome <= 15000;
        ''15k+'' => cap_percent=10 and MonthlyIncome > 15000. Example Deequ: .satisfies("(SalarySlab
        = ''Upto 5k'' AND cap_percent = 20 AND MonthlyIncome <= 5000) OR (SalarySlab
        = ''5k-10k'' AND cap_percent = 15 AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab = ''10k-15k'' AND cap_percent = 12 AND MonthlyIncome
        > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab = ''15k+'' AND cap_percent
        = 10 AND MonthlyIncome > 15000)", ''slab_cap_income_alignment'', 1.0).'
      sources:
      - start_line: 21
        end_line: 24
        file: ''
      - start_line: 89
        end_line: 92
        file: ''
      uid: ff7c6d87-8b8b-4506-8d59-33d5c263e802
    - text: 'AgeGroup-to-age_weight mapping must be exact (functional dependency AgeGroup
        -> age_weight) and AgeGroup must be one of {''18-25'',''26-35'',''36-45'',''46-55'',''55+''}.
        Example Deequ: .hasFunctionalDependency("AgeGroup", ["age_weight"]).'
      sources:
      - start_line: 35
        end_line: 44
        file: ''
      uid: fdd09306-8b39-46f6-9fde-de63de3d0eac
    - text: 'Manager penalty must be consistent with YearsWithCurrManager: mgr_penalty
        = 0.2 if YearsWithCurrManager < 1, else 0.0. Example Deequ: .satisfies("(YearsWithCurrManager
        < 1 AND mgr_penalty = 0.2) OR (YearsWithCurrManager >= 1 AND mgr_penalty =
        0.0)", "mgr_penalty_logic", 1.0).'
      sources:
      - start_line: 62
        end_line: 64
        file: ''
      uid: b0744527-9739-4c12-8773-647fdea5fa1a
    - text: 'RiskTier must be consistent with AttritionRiskScore bucketing with right-open
        intervals and lowest-inclusive: [0.0,0.4) => ''Low''; [0.4,0.6) => ''Medium'';
        [0.6,1.0] => ''High''. Also enforce 0 <= AttritionRiskScore <= 1. Example
        Deequ: .satisfies("(AttritionRiskScore >= 0 AND AttritionRiskScore < 0.4 AND
        RiskTier = ''Low'') OR (AttritionRiskScore >= 0.4 AND AttritionRiskScore <
        0.6 AND RiskTier = ''Medium'') OR (AttritionRiskScore >= 0.6 AND AttritionRiskScore
        <= 1.0 AND RiskTier = ''High'')", "risk_tier_logic", 1.0).'
      sources:
      - start_line: 78
        end_line: 82
        file: ''
      uid: 4edd1d05-1ec9-4903-a2d3-c013309a2e76
    - text: 'The combination (EmpID, JobRole) should be unique across the dataset
        to avoid multiple role records per employee in the risk export. Example Deequ:
        .isUnique(["EmpID", "JobRole"]).'
      sources:
      - start_line: 85
        end_line: 87
        file: ''
      uid: 1b6c4ad3-1b50-43a7-8b8d-6389daf914f3
