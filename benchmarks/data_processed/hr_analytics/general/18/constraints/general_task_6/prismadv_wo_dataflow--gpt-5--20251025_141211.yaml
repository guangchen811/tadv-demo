    - text: 'recommended_percent must equal PercentSalaryHike + rating_bonus for every
        row. Deequ: .satisfies(''recommended_percent = PercentSalaryHike + rating_bonus'',
        ''recommended_percent_formula'')'
      sources:
      - start_line: 19
        end_line: 20
        file: ''
      uid: f88a21ce-485d-4fab-922a-1f56805b49d0
    - text: 'cap_percent must be fully determined by SalarySlab using the fixed mapping:
        ''Upto 5k''->20.0, ''5k-10k''->15.0, ''10k-15k''->12.0, ''15k+''->10.0; rows
        must not contain SalarySlab values outside this set. Deequ: .satisfies("(SalarySlab
        = ''Upto 5k'' AND cap_percent = 20.0) OR (SalarySlab = ''5k-10k'' AND cap_percent
        = 15.0) OR (SalarySlab = ''10k-15k'' AND cap_percent = 12.0) OR (SalarySlab
        = ''15k+'' AND cap_percent = 10.0)", ''cap_percent_by_slab'')'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      uid: f523d293-8ccd-470f-8e05-d9e664f9c0ee
    - text: 'approved_percent must be the row-wise minimum of recommended_percent
        and cap_percent. Deequ: .satisfies(''approved_percent = least(recommended_percent,
        cap_percent)'', ''approved_is_min'')'
      sources:
      - start_line: 23
        end_line: 23
        file: ''
      uid: a825f6e7-0783-4774-b8c2-f7e7a17b9681
    - text: 'approved_amount must equal MonthlyIncome * (approved_percent / 100).
        Deequ: .satisfies(''approved_amount = MonthlyIncome * (approved_percent /
        100.0)'', ''approved_amount_formula'')'
      sources:
      - start_line: 24
        end_line: 24
        file: ''
      uid: b900c6c0-473f-4ece-9fb5-106ffcd890f7
    - text: 'SalarySlab must be consistent with MonthlyIncome brackets: ''Upto 5k''
        => MonthlyIncome <= 5000; ''5k-10k'' => 5000 < MonthlyIncome <= 10000; ''10k-15k''
        => 10000 < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome > 15000. Deequ:
        .satisfies("(SalarySlab = ''Upto 5k'' AND MonthlyIncome <= 5000) OR (SalarySlab
        = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab
        = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab
        = ''15k+'' AND MonthlyIncome > 15000)", ''slab_matches_income_bracket'')'
      sources:
      - start_line: 21
        end_line: 24
        file: ''
      uid: 8c91e58d-e4a0-4dca-850b-1b855ce13a56
