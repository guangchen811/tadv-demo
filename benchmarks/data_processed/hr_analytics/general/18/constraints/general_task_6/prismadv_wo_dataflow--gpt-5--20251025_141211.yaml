  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'SalarySlab must be consistent with MonthlyIncome ranges as follows: ''Upto
        5k'' -> MonthlyIncome <= 5000; ''5k-10k'' -> 5000 < MonthlyIncome <= 10000;
        ''10k-15k'' -> 10000 < MonthlyIncome <= 15000; ''15k+'' -> MonthlyIncome >
        15000. This can be enforced as a Deequ constraint, e.g., .satisfies("((SalarySlab
        = ''Upto 5k'' AND MonthlyIncome <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome
        > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome
        > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome
        > 15000))", "Salary slab matches income range", assertionLevel=1.0).'
      sources:
      - start_line: 21
        end_line: 24
        file: ''
      uid: 77e5e22f-1f1a-455f-b287-7f15c752f20d
    - text: 'approved_percent must equal the minimum of recommended_percent and cap_percent
        (i.e., approved_percent = LEAST(recommended_percent, cap_percent)). This reflects
        the intent that the cap derived from SalarySlab bounds the recommended increase.
        Deequ example: .satisfies("approved_percent = LEAST(recommended_percent, cap_percent)",
        "Approved percent is min(recommended, cap)", 1.0).'
      sources:
      - start_line: 18
        end_line: 23
        file: ''
      uid: 45f2f42b-ffbb-4004-afd4-4d5cc7eace14
    - text: 'approved_amount must equal MonthlyIncome * (approved_percent / 100) within
        a small numeric tolerance to account for floating-point rounding, e.g., ABS(approved_amount
        - MonthlyIncome * approved_percent / 100.0) <= 0.01 for all rows. Deequ example:
        .satisfies("ABS(approved_amount - MonthlyIncome * approved_percent / 100.0)
        <= 0.01", "Approved amount matches formula", 1.0).'
      sources:
      - start_line: 23
        end_line: 24
        file: ''
      uid: 80de9d17-c67c-4fd6-be7f-8402b884f06f
    - text: 'cap_percent must be fully determined by SalarySlab according to the mapping:
        ''Upto 5k'' -> 20.0, ''5k-10k'' -> 15.0, ''10k-15k'' -> 12.0, ''15k+'' ->
        10.0. Deequ example: .satisfies("cap_percent = CASE WHEN SalarySlab = ''Upto
        5k'' THEN 20.0 WHEN SalarySlab = ''5k-10k'' THEN 15.0 WHEN SalarySlab = ''10k-15k''
        THEN 12.0 WHEN SalarySlab = ''15k+'' THEN 10.0 END", "Cap percent matches
        slab", 1.0).'
