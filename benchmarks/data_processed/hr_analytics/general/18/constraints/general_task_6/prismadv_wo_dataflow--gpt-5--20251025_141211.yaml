    assumptions:
    - text: 'JobRole functionally determines Department: for any given JobRole there
        must be exactly one associated Department across the dataset. This can be
        checked as a functional dependency: isFunctionalDependency(''JobRole'', [''Department'']).'
      sources:
      - start_line: 26
        end_line: 30
        file: ''
      uid: 6320bd58-8eb6-4898-9ff9-d61536cd775e
    - text: 'Manager tenure cannot exceed company tenure: YearsWithCurrManager must
        be >= 0 and <= YearsAtCompany. Additionally, if YearsAtCompany == 0 then YearsWithCurrManager
        must be 0. Example compliance: (YearsAtCompany >= 0) AND (YearsWithCurrManager
        >= 0) AND (YearsWithCurrManager <= YearsAtCompany) AND (YearsAtCompany > 0
        OR YearsWithCurrManager == 0).'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      - start_line: 62
        end_line: 63
        file: ''
      uid: bc759c76-dbb5-49a8-a570-e6573e9e5008
    - text: 'Promotion timing cannot exceed tenure: YearsSinceLastPromotion must be
        >= 0 and <= YearsAtCompany (otherwise the tenure_ratio would be > 1 or undefined).
        Example compliance: (YearsAtCompany >= 0) AND (YearsSinceLastPromotion >=
        0) AND (YearsSinceLastPromotion <= YearsAtCompany).'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      uid: da4da4a0-319b-4246-96b7-a151e48f2ffb
    - text: "SalarySlab must be consistent with MonthlyIncome: if SalarySlab == 'Upto\
        \ 5k' then MonthlyIncome <= 5000; if '5k-10k' then 5000 < MonthlyIncome <=\
        \ 10000; if '10k-15k' then 10000 < MonthlyIncome <= 15000; if '15k+' then\
        \ MonthlyIncome > 15000. This ensures the raise cap derived from SalarySlab\
        \ matches the employee\u2019s income bracket."
      sources:
      - start_line: 21
        end_line: 24
        file: ''
      - start_line: 89
        end_line: 92
        file: ''
      uid: 910c59ad-9886-4164-b3cf-85bbc9307d30
    - text: 'approved_percent must be the minimum of recommended_percent and cap_percent.
        Enforce as: approved_percent <= recommended_percent AND approved_percent <=
        cap_percent, and optionally approved_percent == least(recommended_percent,
        cap_percent).'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      uid: 9930e7b6-3db5-4318-a0ff-a7c046caf809
    - text: 'recommended_percent must equal PercentSalaryHike + rating_bonus, and
        rating_bonus must be consistent with PerformanceRating mapping: PerformanceRating
        in {3, 4} implies rating_bonus in {0.0, 2.0} with the mapping {3 -> 0.0, 4
        -> 2.0}. Enforce both the arithmetic equality and the categorical mapping.'
      sources:
      - start_line: 18
        end_line: 20
        file: ''
      uid: 69d4e5d4-c72b-4888-95a9-f1e8123b515f
    - text: 'approved_amount must equal MonthlyIncome * (approved_percent / 100) within
        a small numeric tolerance. Example compliance: abs(approved_amount - MonthlyIncome
        * (approved_percent / 100.0)) <= 0.01.'
      sources:
      - start_line: 24
        end_line: 24
        file: ''
      uid: 98b5181f-3357-4130-a112-1c1716c681ef
    - text: 'RiskTier must be consistent with AttritionRiskScore binning: if 0.0 <=
        AttritionRiskScore < 0.4 then RiskTier == ''Low''; if 0.4 <= score < 0.6 then
        ''Medium''; if 0.6 <= score <= 1.0 then ''High''.'
      sources:
