    assumptions:
    - text: 'The ''YearsWithCurrManager'' column may contain missing values: the code
        calls fillna(...median()) to impute nulls. However the input must include
        at least one non-null numeric value so that a median can be computed (i.e.,
        not all rows may be null). Example validation (Deequ-like): .satisfies("CASE
        WHEN `YearsWithCurrManager` IS NOT NULL THEN 1 ELSE 0 END", "Has any non-null
        YearsWithCurrManager", lambda x: x > 0)'
