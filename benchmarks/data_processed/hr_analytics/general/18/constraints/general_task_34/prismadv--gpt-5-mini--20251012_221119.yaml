    - text: 'All non-null values of ''YearsWithCurrManager'' must be numeric and finite
        (integers or floats). The code computes a median and performs arithmetic (division,
        clip), so string values like ''unknown'' or infinite/NaN values will break
        or produce incorrect results. Example validation: .satisfies("CASE WHEN `YearsWithCurrManager`
        IS NULL THEN 1 ELSE CASE WHEN TRY_CAST(`YearsWithCurrManager` AS DOUBLE) IS
        NOT NULL AND NOT isnan(TRY_CAST(`YearsWithCurrManager` AS DOUBLE)) AND NOT
        isinf(TRY_CAST(`YearsWithCurrManager` AS DOUBLE)) THEN 1 ELSE 0 END END",
        "Numeric finite YearsWithCurrManager", lambda x: x == 1)'
