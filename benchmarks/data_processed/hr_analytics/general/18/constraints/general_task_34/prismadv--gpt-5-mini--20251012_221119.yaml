  '["Age","TotalWorkingYears"]':
    code: []
    assumptions:
    - text: "Both 'Age' and 'TotalWorkingYears' are present (no nulls) and represent\
        \ non-negative integers. This is required because the code directly computes\
        \ Age-derived and experience-derived features without filling missing values.\
        \ Example Deequ-style checks:\n.isComplete([\"Age\", \"TotalWorkingYears\"\
        ]) \n.assertThat(\"TotalWorkingYears >= 0 AND Age >= 0\", \"non_negative_age_and_experience\"\
        )"
      sources:
      - start_line: 50
        end_line: 54
        file: ''
      uid: 80060d17-8ffe-4719-a55b-6e9c1c67a2dc
    - text: 'TotalWorkingYears should be less than or equal to the maximum plausible
        work experience given Age: TotalWorkingYears <= (Age - 18). Equivalently Age
        >= TotalWorkingYears + 18. The code computes experience_cap = (Age - 18).clip(lower=0)
        and then experience_gap = (experience_cap - TotalWorkingYears).clip(lower=0),
        which implies this relationship is expected. Example constraint:

        .satisfies("Age >= TotalWorkingYears + 18", "age_vs_total_working_years")'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: 0a7505a1-20d5-47e9-8486-a3f51297a26a
    - text: 'YearsAtCompany should not exceed TotalWorkingYears (YearsAtCompany <=
        TotalWorkingYears). The tenure_ratio calculation divides YearsAtCompany by
        TotalWorkingYears and later clips to 1.0, indicating the expectation that
        YearsAtCompany is at most TotalWorkingYears. Example constraint:

        .satisfies("YearsAtCompany <= TotalWorkingYears", "tenure_le_experience")'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: 37db5430-3eb7-4344-99b8-151c498d63e1
    - text: 'If TotalWorkingYears == 0 then YearsAtCompany should also be 0 (no tenure
        when total experience is zero). The code replaces zeros in TotalWorkingYears
        to avoid division-by-zero and later fills NaNs with 0.0 for tenure_ratio;
        having YearsAtCompany > 0 when TotalWorkingYears == 0 is logically inconsistent.
        Example constraint:

        .satisfies("NOT (TotalWorkingYears = 0 AND YearsAtCompany > 0)", "zero_experience_implies_zero_tenure")'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: cdd9d292-a5da-4aab-ba32-a567f720d1fe
  '["Attrition","risk_score"]':
    code: []
    assumptions:
    - text: 'All rows labeled with risk_band == ''high'' must have risk_score strictly
        greater than the computed threshold. In other words, there should be no row
        where risk_band == ''high'' and risk_score <= threshold. (Deequ-style check
        idea: assert that not(risk_band == ''high'' AND risk_score <= threshold),
        e.g. .satisfies(''risk_band != "high" OR risk_score > {threshold}'')).'
      sources:
      - start_line: 79
        end_line: 88
        file: ''
      - start_line: 90
        end_line: 98
        file: ''
      uid: 13b0f530-d1f0-4626-b351-4af83e76d449
    - text: 'Rows assigned alert_priority == ''P1'' are expected to be high-risk cases:
        they must come from risk_band == ''high'' and their risk_score must be >=
        max(threshold, 90th percentile of risk_score among the high-risk rows). Practical
        checks: (1) alert_priority == ''P1'' implies risk_band == ''high''; (2) alert_priority
        == ''P1'' implies risk_score >= threshold; and (optionally) (3) alert_priority
        == ''P1'' implies risk_score >= alerts.risk_score.quantile(0.90).'
      sources:
      - start_line: 79
        end_line: 83
        file: ''
      - start_line: 110
        end_line: 113
        file: ''
      uid: 4c3dfa90-c67c-4216-9316-10b8f63a1a51
    - text: 'The SalarySlab values must map to a valid salary_tier for scoring to
        work. Concretely, SalarySlab should be contained in {''Upto 5k'', ''5k-10k'',
        ''10k-15k'', ''15k+''} so that salary_tier is not null before it''s used in
        the risk_score calculation (salary_tier / 3.0). A Deequ constraint: .isContainedIn(''SalarySlab'',
        [...]) or require salary_tier IS NOT NULL when SalarySlab IS NOT NULL.'
      sources:
      - start_line: 31
        end_line: 32
        file: ''
      - start_line: 68
        end_line: 68
        file: ''
      uid: 04ef7fe0-9690-449f-be3d-d2629626f2a0
    - text: 'TotalWorkingYears should be no greater than the plausible experience
        cap derived from Age (Age - 18). In practice the code assumes TotalWorkingYears
        <= (Age - 18) for consistency of experience-derived features. Enforceable
        as: .satisfies(''TotalWorkingYears <= Age - 18'').'
      sources:
      - start_line: 50
        end_line: 52
        file: ''
      uid: 2ba551c6-7050-4020-a7a8-66a416c5652c
    - text: 'YearsWithCurrManager should be less than or equal to YearsAtCompany for
        each employee (manager-tenure cannot exceed tenure at the company). This is
        relied on when combining manager_years and tenure-derived features. Enforceable
        as: .satisfies(''YearsWithCurrManager <= YearsAtCompany'').'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      - start_line: 53
        end_line: 53
        file: ''
      uid: a772d633-b3eb-4153-beed-e159fd0c4836
    - text: 'The satisfaction/balance inputs used in normalization (JobSatisfaction,
        EnvironmentSatisfaction, WorkLifeBalance) are expected to be in the 1..4 range
        because the code normalizes them with (value - 1) / 3.0. Enforceable as multi-column
        range checks: each of JobSatisfaction, EnvironmentSatisfaction, WorkLifeBalance
        should be between 1 and 4 (inclusive).'
      sources:
