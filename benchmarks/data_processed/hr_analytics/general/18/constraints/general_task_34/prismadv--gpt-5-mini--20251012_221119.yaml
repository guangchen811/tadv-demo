    - text: 'Values should be within a plausible human range (e.g., not absurdly large).
        The code divides by 10 and clips the ratio at 1.0, so values >= 10 are treated
        equivalently, but extremely large values likely indicate data errors. A pragmatic
        check is that most values (e.g., 99%) are <= 40 years. Example validation:
