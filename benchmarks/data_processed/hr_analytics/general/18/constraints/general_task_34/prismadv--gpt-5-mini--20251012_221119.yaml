        \ <= 15000\n- '15k+' => MonthlyIncome > 15000\n\nActionable checks (examples):\n\
        - A row-level conditional constraint (Deequ-style):\n  .satisfies(\"(SalarySlab\
        \ = 'Upto 5k' AND MonthlyIncome <= 5000) OR (SalarySlab = '5k-10k' AND MonthlyIncome\
        \ > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab = '10k-15k' AND MonthlyIncome\
        \ > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab = '15k+' AND MonthlyIncome\
        \ > 15000)\", \"salary_slab_matches_income_range\")\n\nThis prevents inconsistencies\
        \ between the categorical slab and the numeric MonthlyIncome which would otherwise\
        \ cause misleading outputs or incorrect tiering."
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 90
        end_line: 96
        file: ''
      uid: a5aee0dc-84ff-4903-939a-739f6245014a
    - text: 'MonthlyIncome should be monotonic with SalarySlab ordering: the central
        tendency (e.g., median) of MonthlyIncome must increase across slabs in the
        natural order [''Upto 5k'', ''5k-10k'', ''10k-15k'', ''15k+'']. In other words:

        median(MonthlyIncome | SalarySlab = ''Upto 5k'') <= median(MonthlyIncome |
        SalarySlab = ''5k-10k'') <= median(MonthlyIncome | SalarySlab = ''10k-15k'')
        <= median(MonthlyIncome | SalarySlab = ''15k+'')


        Actionable checks:

        - Compute per-slab median MonthlyIncome and assert the non-decreasing ordering.
        If any adjacent pair violates ordering, flag data quality issue.

        - Optionally also assert that min/max per slab do not heavily overlap (e.g.,
        max of lower slab < median of next slab) depending on tolerance.


        This ensures that the slab categorical variable is meaningful and aligned
        with the underlying numeric income.'
