        Additionally, if TotalWorkingYears == 0 then YearsAtCompany == 0 and YearsWithCurrManager
        == 0. Example Deequ-like constraints:

        .satisfies("YearsWithCurrManager <= YearsAtCompany", "mgr_vs_tenure")

        .satisfies("YearsAtCompany <= TotalWorkingYears", "tenure_vs_experience")

        .satisfies("(TotalWorkingYears = 0) => (YearsAtCompany = 0 AND YearsWithCurrManager
        = 0)", "zero_experience_consistency")'
      sources:
      - start_line: 43
        end_line: 55
        file: ''
      uid: 804f194e-2a05-4479-b0bd-34461433c36b
    - text: 'TotalWorkingYears must be consistent with Age: an employee cannot have
        more total working years than the years available since age 18. Enforce TotalWorkingYears
        <= (Age - 18) and TotalWorkingYears >= 0. Example constraint:

        .satisfies("TotalWorkingYears <= Age - 18", "experience_age_consistency")

        .satisfies("TotalWorkingYears >= 0", "non_negative_experience")'
      sources:
      - start_line: 50
        end_line: 52
        file: ''
      uid: 921430ae-f470-426f-83e5-896238225c3b
    - text: 'SalarySlab must map to a valid salary_tier (mapping keys {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''})
        and the derived salary_tier must be non-null and within the expected integer
        range [0,3]. Example Deequ checks:

        .isContainedIn("SalarySlab", ["Upto 5k","5k-10k","10k-15k","15k+"], "salary_slab_allowed_values")

        .satisfies("salary_tier >= 0 AND salary_tier <= 3", "salary_tier_range")

        .satisfies("salary_tier IS NOT NULL", "salary_tier_not_null")'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 68
        end_line: 68
        file: ''
      uid: 920163fa-d59e-49bd-a10e-6c01be751420
    - text: 'SalarySlab should be consistent with numeric MonthlyIncome. Enforce approximate
        ranges: ''Upto 5k'' => MonthlyIncome <= 5000; ''5k-10k'' => 5000 < MonthlyIncome
        <= 10000; ''10k-15k'' => 10000 < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome
        > 15000. Example Deequ-like constraints:

        .satisfies("(SalarySlab = ''Upto 5k'') => MonthlyIncome <= 5000", "slab_monthly_consistency_1")

        .satisfies("(SalarySlab = ''5k-10k'') => (MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000)", "slab_monthly_consistency_2")

        .satisfies("(SalarySlab = ''10k-15k'') => (MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000)", "slab_monthly_consistency_3")

        .satisfies("(SalarySlab = ''15k+'') => MonthlyIncome > 15000", "slab_monthly_consistency_4")'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 95
        end_line: 96
        file: ''
      uid: 8343bf6f-1af0-43e6-847e-34100282584e
    - text: 'Tenure ratio computation assumes YearsAtCompany and TotalWorkingYears
        yield a value in [0,1] after the code''s replacement/fill logic. Enforce that
        when TotalWorkingYears > 0, YearsAtCompany / TotalWorkingYears is between
        0 and 1; and when TotalWorkingYears == 0 then YearsAtCompany == 0 (so the
        filled tenure_ratio becomes 0). Example constraints:

        .satisfies("(TotalWorkingYears > 0) => (YearsAtCompany / TotalWorkingYears
        >= 0 AND YearsAtCompany / TotalWorkingYears <= 1)", "tenure_ratio_bounds")

        .satisfies("(TotalWorkingYears = 0) => YearsAtCompany = 0", "zero_experience_tenure")'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      uid: 02f04a0e-c30c-4af1-bff8-e132f7be6bb9
  ? '["Age","DistanceFromHome","EnvironmentSatisfaction","JobSatisfaction","OverTime","PerformanceRating","SalarySlab","StockOptionLevel","TrainingTimesLastYear","WorkLifeBalance","YearsAtCompany","YearsSinceLastPromotion","YearsWithCurrManager"]'
  : code: []
    assumptions:
    - text: 'TotalWorkingYears must not exceed the plausible working lifetime implied
        by Age. Concretely: TotalWorkingYears <= (Age - 18) for every record. Actionable
        check (Deequ-style): .satisfies("TotalWorkingYears <= Age - 18", "experience_vs_age_consistency")'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 53
        end_line: 55
        file: ''
      uid: 6bb6f815-defc-4a1f-9364-1dcada56244c
    - text: 'If TotalWorkingYears == 0 then YearsAtCompany should also be 0 (otherwise
        tenure_ratio logic produces an artificial 0 after fill). Actionable check:
        .satisfies("(TotalWorkingYears != 0) OR (YearsAtCompany == 0)", "zero_total_working_years_implies_zero_tenure")'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      uid: e925ce06-8452-4e8b-9458-d2e58af5612e
    - text: 'YearsAtCompany should be less than or equal to TotalWorkingYears (tenure
        cannot exceed total experience). Actionable check: .satisfies("YearsAtCompany
        <= TotalWorkingYears", "tenure_le_total_experience")'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      uid: f68709d0-cc57-4452-9f48-42f4704195c0
    - text: 'YearsWithCurrManager (when present) should not exceed an employee''s
        tenure/experience. Formally: isNull(YearsWithCurrManager) OR (YearsWithCurrManager
        <= YearsAtCompany AND YearsWithCurrManager <= TotalWorkingYears). Actionable
        check: .satisfies("isNull(YearsWithCurrManager) OR (YearsWithCurrManager <=
        YearsAtCompany AND YearsWithCurrManager <= TotalWorkingYears)", "manager_tenure_consistency")'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      - start_line: 50
        end_line: 55
        file: ''
      uid: 1bd832e5-8041-4891-a9cb-b857e2d6ee0c
    - text: 'SalarySlab must be one of the expected categories used by the mapping:
        {''Upto 5k'', ''5k-10k'', ''10k-15k'', ''15k+''}. Actionable check: .isContainedIn("SalarySlab",
        ["Upto 5k", "5k-10k", "10k-15k", "15k+"])'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      uid: 61dc4bed-9caf-430d-babf-3619bbccff46
    - text: 'MonthlyIncome should be consistent with SalarySlab ranges. Concretely
        enforce these ranges: (SalarySlab == ''Upto 5k''  => MonthlyIncome <= 5000),
        (SalarySlab == ''5k-10k'' => 5000 < MonthlyIncome <= 10000), (SalarySlab ==
        ''10k-15k'' => 10000 < MonthlyIncome <= 15000), (SalarySlab == ''15k+'' =>
        MonthlyIncome > 15000). Actionable check (Deequ-style satisfies expression):
        .satisfies("(SalarySlab = ''Upto 5k'' AND MonthlyIncome <= 5000) OR (SalarySlab
        = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab
        = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab
        = ''15k+'' AND MonthlyIncome > 15000)", "salaryslab_vs_monthlyincome_consistency")'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 95
        end_line: 96
        file: ''
      uid: 9d9e8773-c057-4a4a-9df0-6b5aa0108220
    - text: 'YearsSinceLastPromotion should not exceed the employee''s tenure or total
        experience. Formally: isNull(YearsSinceLastPromotion) OR (YearsSinceLastPromotion
        <= YearsAtCompany AND YearsSinceLastPromotion <= TotalWorkingYears). Actionable
        check: .satisfies("isNull(YearsSinceLastPromotion) OR (YearsSinceLastPromotion
        <= YearsAtCompany AND YearsSinceLastPromotion <= TotalWorkingYears)", "promotion_vs_tenure_consistency")'
