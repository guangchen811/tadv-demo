    - text: The 'joblevel_adj' column is calculated as 0.005 * (JobLevel - 1). Therefore,
        for any row, if 'JobLevel' is non-null, 'joblevel_adj' must be non-null and
        equal to 0.005 * (JobLevel - 1). This is a deterministic relationship between
