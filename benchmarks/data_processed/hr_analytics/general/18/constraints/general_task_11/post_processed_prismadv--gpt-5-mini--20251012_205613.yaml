  ? '["Department","EmpID","MonthlyIncome","base_pay","compression_amount","compression_pool","emerging_talent_amount","emerging_talent_pool","headcount","merit_pool","promotion_amount","promotion_pool","proposed_merit_amount","total_budget"]'
  : code: []
    assumptions:
    - text: 'proposed_merit_amount is computed as MonthlyIncome * proposed_merit_pct
        where proposed_merit_pct == min( min(perf_guideline_pct, PercentSalaryHike
        / 100.0) * age_weight * travel_multiplier, slab_cap_pct ). Therefore for each
        row the arithmetic relationship should hold (after rounding to 2 decimal places):
        proposed_merit_amount == round( MonthlyIncome * min( min(perf_guideline_pct,
        PercentSalaryHike/100.0) * age_weight * travel_multiplier, slab_cap_pct ),
        2 ). This can be checked as a row-level multi-column constraint (MonthlyIncome,
        perf_guideline_pct, PercentSalaryHike, age_weight, travel_multiplier, slab_cap_pct,
        proposed_merit_pct, proposed_merit_amount).'
      sources:
      - start_line: 27
        end_line: 32
        file: ''
      - start_line: 34
        end_line: 43
        file: ''
      uid: 2d33419a-1916-4bdc-88eb-651a600f6d1e
    - text: 'promotion_amount equals MonthlyIncome * promotion_raise_pct (rounded
        to 2 decimals), and promotion_raise_pct is forced to 0.0 whenever promotion_eligible
        is False. Thus for every row: promotion_amount == round(MonthlyIncome * promotion_raise_pct,
        2) and (promotion_eligible == False) => (promotion_raise_pct == 0.0). Validate
        the arithmetic relationship across columns (MonthlyIncome, promotion_raise_pct,
        promotion_eligible, promotion_amount).'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: 1b16455f-0d98-4e5e-a707-fc28c46c494f
    - text: 'compression_amount is derived from MonthlyIncome and SalarySlab: compression_pool_share
        == 0.003 when SalarySlab in [''Upto 5k'',''5k-10k''] else 0.0; compression_amount
        == round(MonthlyIncome * compression_pool_share, 2). Enforce this relationship
        across (MonthlyIncome, SalarySlab, compression_pool_share, compression_amount).'
      sources:
      - start_line: 59
        end_line: 61
        file: ''
      uid: 130543d5-8292-4f3c-ad08-8320a37ae56d
    - text: 'emerging_talent_amount is derived from MonthlyIncome and AgeGroup: emerging_talent_supp_pct
        == 0.005 when AgeGroup == ''26-35'' else 0.0; emerging_talent_amount == round(MonthlyIncome
        * emerging_talent_supp_pct, 2). Enforce this relationship across (MonthlyIncome,
        AgeGroup, emerging_talent_supp_pct, emerging_talent_amount).'
      sources:
      - start_line: 63
        end_line: 65
        file: ''
      uid: 986c9157-c757-48db-a9e6-aeaf0394a9e8
    - text: 'Department-level aggregates are exact sums/counts of the corresponding
        row-level columns within each Department: headcount == count(rows) (counting
        EmpID), base_pay == sum(MonthlyIncome), merit_pool == sum(proposed_merit_amount),
        promotion_pool == sum(promotion_amount), compression_pool == sum(compression_amount),
        emerging_talent_pool == sum(emerging_talent_amount). These cross-column, cross-row
        relationships should hold for each Department group.'
      sources:
      - start_line: 68
        end_line: 75
        file: ''
      uid: 4115cf77-0d3f-40bd-a24d-cd6a7305a453
    - text: 'total_budget equals the rounded sum of the four departmental pools for
        each Department: total_budget == round( merit_pool + promotion_pool + compression_pool
        + emerging_talent_pool, 2 ). Validate this aggregate arithmetic equality at
        the Department level.'
      sources:
      - start_line: 77
        end_line: 78
        file: ''
      uid: a92e73b0-9ffa-453e-876e-759e129ba851
    - text: 'EmpID should be present and effectively identify one row per employee
        for headcount calculation: EmpID is non-null and unique per employee row (i.e.,
        distinct_count(EmpID) == number_of_rows). Additionally EmployeeNumber is set
        as index (implying EmployeeNumber is non-null and unique). These uniqueness
        assumptions affect correctness of headcount and per-employee outputs.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 68
        end_line: 70
        file: ''
      - start_line: 84
        end_line: 87
        file: ''
      uid: d1dedf45-d7ed-4dc5-9f4f-8b0501578041
    - text: 'Categorical-to-numeric mappings must exist for the values encountered
        so arithmetic can be computed without producing NaNs: PerformanceRating values
        used must map to perf_guideline_pct (mapping provided for 3 and 4) or PercentSalaryHike
        must be present; SalarySlab values must map to slab_cap_pct; BusinessTravel
        and AgeGroup values must map to travel_multiplier and age_weight respectively.
        In practice this means rows should have PerformanceRating in {3,4} or a valid
        PercentSalaryHike, SalarySlab in the mapped keys, BusinessTravel in the normalized
        set, and AgeGroup present. These multi-column dependencies (PerformanceRating/PercentSalaryHike
        -> proposed_merit_pct and SalarySlab/AgeGroup/BusinessTravel -> multipliers/caps)
        should be validated to avoid nulls in downstream arithmetic.'
      sources:
