  '["JobLevel","promotion_raise_pct"]':
    code: []
    assumptions:
    - text: 'The ''promotion_eligible'' flag is computed exactly from multiple columns:
        promotion_eligible should be True iff (PerformanceRating == 4) AND (YearsInCurrentRole
        >= 2) AND (YearsSinceLastPromotion >= 1) AND (JobLevel < 5). This can be enforced
        as a row-level constraint, e.g. a Deequ-style check: .satisfies("(promotion_eligible
        = true) = ((PerformanceRating = 4) AND (YearsInCurrentRole >= 2) AND (YearsSinceLastPromotion
        >= 1) AND (JobLevel < 5))", "promotion_eligibility_consistency").'
      sources:
      - start_line: 46
        end_line: 52
        file: ''
      uid: bc3d4d0e-a98c-41ca-b0ec-7980be001ffd
    - text: 'The ''promotion_raise_pct'' value must be consistent with the JobLevel
        mapping and the promotion_eligible flag: before masking, JobLevel maps to
        {1:0.10, 2:0.08, 3:0.07, 4:0.06, 5:0.0}; after applying eligibility, any row
        with promotion_eligible == false must have promotion_raise_pct == 0.0, and
        any row with promotion_eligible == true must have promotion_raise_pct equal
        to the mapped value for that JobLevel. Enforceable examples: (1) .satisfies("(promotion_eligible
        = false) => (promotion_raise_pct = 0.0)", "ineligible_raise_zero"); (2) .satisfies("(promotion_eligible
        = true AND JobLevel = 1) => promotion_raise_pct = 0.10", "level1_raise_consistent")
        and similarly for levels 2,3,4.'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      uid: 365313eb-f409-4493-8a61-99009d29b22e
    - text: 'JobLevel values must be valid integers within the expected domain and
        imply specific promotion behavior: JobLevel should be in {1,2,3,4,5}. In particular,
        JobLevel == 5 implies promotion_eligible == false and promotion_raise_pct
        == 0.0. This multi-column check can be encoded as: .satisfies("JobLevel IN
        (1,2,3,4,5)", "joblevel_domain") and .satisfies("(JobLevel = 5) => (promotion_eligible
        = false AND promotion_raise_pct = 0.0)", "level5_no_promotion").'
      sources:
      - start_line: 46
        end_line: 55
        file: ''
      uid: 8c197f68-3b0c-4a9e-be47-a3f7bd769de9
    - text: 'The ''promotion_amount'' must equal the rounded product of MonthlyIncome
        and promotion_raise_pct: promotion_amount == round(MonthlyIncome * promotion_raise_pct,
        2). As a simpler enforceable check, rows where promotion_raise_pct == 0.0
        should have promotion_amount == 0.0, and in general promotion_amount should
        be close to MonthlyIncome * promotion_raise_pct within two-decimal rounding.
        Example checks: .satisfies("(promotion_raise_pct = 0.0) => (promotion_amount
        = 0.0)", "zero_raise_zero_amount") and/or a numeric tolerance check comparing
        promotion_amount and MonthlyIncome * promotion_raise_pct rounded to 2 decimals.'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: 25e40e60-60a2-4166-a08d-2f21dbfefb80
