prismadv_config:
  model:
    use_async: true
    use_dataflow: true
    correlation_detection: true
    downstream_task_description: No specific description provided. The script can
      be used for any task.
  llm:
    model_name: gpt-5-mini
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  AgeGroup:
    code:
    - suggestion: '.isContainedIn(''AgeGroup'', [''18-25'',''26-35'',''36-45'',''46-55'',''55+''],
        lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 18f2a438-48b0-47dc-975c-b4eea05e662f
      source_assumptions:
      - 6fe30daa-4949-4027-8623-d3d6e8f3c9db
    assumptions:
    - text: 'The ''AgeGroup'' column must be non-null for all rows (or at least for
        the rows used in downstream calculations). The code performs equality checks
        on AgeGroup and derives numeric columns (age_weight, emerging_talent_supp_pct,
        emerging_talent_amount) that are used in arithmetic and in output; if AgeGroup
        were null the comparisons and resulting numeric multipliers would be incorrect
        or produce unexpected nulls. Suggested validation rules: expect_column_values_to_not_be_null(''AgeGroup'')
        or a deequ-style check: .satisfies("CASE WHEN `AgeGroup` IS NOT NULL THEN
        1 ELSE 0 END", ''AgeGroup non-null'', lambda x: x == 1).'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 41
        end_line: 42
        file: ''
      - start_line: 63
        end_line: 65
        file: ''
      - start_line: 84
        end_line: 90
        file: ''
      uid: 5d1f808b-450d-4973-8288-3207101c5bf7
    - text: 'The ''AgeGroup'' values are expected to come from the known set of categories
        used by the business logic: ''18-25'', ''26-35'', ''36-45'', ''46-55'', ''55+''.
        The code relies on exact equality to identify the ''26-35'' cohort and to
        apply default weights to all other values; unexpected or misspelled categories
        will not be handled and will silently receive the default multiplier. Suggested
        validation rules: expect_column_values_to_be_in_set(''AgeGroup'', [''18-25'',''26-35'',''36-45'',''46-55'',''55+''])
        or deequ: .satisfies("CASE WHEN `AgeGroup` IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'')
        THEN 1 ELSE 0 END", ''Valid AgeGroup values'', lambda x: x == 1).'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 63
        end_line: 65
        file: ''
      - start_line: 74
        end_line: 78
        file: ''
      uid: 6fe30daa-4949-4027-8623-d3d6e8f3c9db
    - text: 'The ''AgeGroup'' strings must match exactly (case and whitespace sensitive).
        The code uses exact string equality (e.g., df[''AgeGroup''] == ''26-35'')
        and does not trim or normalize values beforehand, so values like '' 26-35'',
        ''26 - 35'', or different casing would not be recognized. Suggested validation
        rules: expect_column_values_to_match_regex(''AgeGroup'', ''^(18-25|26-35|36-45|46-55|55+)$'')
        or a rule that checks trimmed values are in the allowed set: .satisfies("CASE
        WHEN TRIM(`AgeGroup`) IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'')
        THEN 1 ELSE 0 END", ''Trimmed AgeGroup valid'', lambda x: x == 1).'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 63
        end_line: 64
        file: ''
      - start_line: 84
        end_line: 88
        file: ''
      uid: 32e30171-64ad-4703-b3df-c4599555cc39
  ? '["AgeGroup","BusinessTravel","PercentSalaryHike","PerformanceRating","SalarySlab","adjusted_merit_pct","base_merit_pct","proposed_merit_amount","proposed_merit_pct","slab_cap_pct"]'
  : code: []
    assumptions:
    - text: 'PerformanceRating must be limited to the values {3, 4} (so that perf_guideline_pct
        mapped from perf_guideline_pct = {3:0.12, 4:0.18} is defined for every row).
        If other PerformanceRating values exist, perf_guideline_pct will be null and
        the downstream merit calculations (base_merit_pct, adjusted_merit_pct, proposed_merit_pct)
        will produce nulls. Actionable check: assert PerformanceRating is contained
        in [3,4] or assert perf_guideline_pct is non-null for all rows. (Deequ-style:
        .isContainedIn("PerformanceRating", ["3","4"]) or .isComplete("perf_guideline_pct"))'
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 40
        end_line: 42
        file: ''
      uid: 5ea58955-751f-4669-87e3-6906cc946e32
    - text: 'SalarySlab must be one of the expected slab keys {''Upto 5k'', ''5k-10k'',
        ''10k-15k'', ''15k+''} so that slab_cap_pct is non-null and can be used to
        cap proposed_merit_pct. Actionable check: assert SalarySlab is contained in
        that set or assert slab_cap_pct is non-null for all rows. (Deequ-style: .isContainedIn("SalarySlab",
        [...]) or .isComplete("slab_cap_pct"))'
      sources:
      - start_line: 31
        end_line: 32
        file: ''
      - start_line: 42
        end_line: 42
        file: ''
      uid: 826b6beb-694b-4ef3-a52e-db388390659b
    - text: 'After normalization, BusinessTravel must be in the set {''Travel_Frequently'',
        ''Travel_Rarely'', ''Non-Travel''} so travel_multiplier (mapped from travel_multiplier_map)
        is defined for every row. If unexpected BusinessTravel values remain, travel_multiplier
        will be null and adjusted_merit_pct will be null. Actionable check: assert
        BusinessTravel (after mapping) is contained in the expected set or assert
        travel_multiplier is non-null for all rows.'
      sources:
      - start_line: 18
        end_line: 24
        file: ''
      - start_line: 36
        end_line: 37
        file: ''
      - start_line: 41
        end_line: 41
        file: ''
      uid: 3fdbce9d-2b66-4992-91e7-fc6a5f056a09
    - text: 'The proposed merit calculations must hold element-wise: base_merit_pct
        = min(perf_guideline_pct, PercentSalaryHike/100.0); adjusted_merit_pct = base_merit_pct
        * age_weight * travel_multiplier; proposed_merit_pct = min(adjusted_merit_pct,
        slab_cap_pct). In other words, for every row proposed_merit_pct should equal
        min(min(perf_guideline_pct, PercentSalaryHike/100.0) * age_weight * travel_multiplier,
        slab_cap_pct). Actionable check: assert row-level equality of proposed_merit_pct
        to that expression (or assert the residual is zero within floating tolerance).'
      sources:
      - start_line: 40
        end_line: 43
        file: ''
      - start_line: 35
        end_line: 37
        file: ''
      - start_line: 31
        end_line: 32
        file: ''
      uid: adc9162e-6fef-4558-b6fd-4fd0bbd4a969
    - text: 'proposed_merit_amount must equal MonthlyIncome * proposed_merit_pct (rounded
        to 2 decimals) for every row. Actionable check: assert the absolute difference
        between proposed_merit_amount and round(MonthlyIncome * proposed_merit_pct,
        2) is zero (or within a tiny epsilon to allow rounding differences). (This
        is a multi-column arithmetic equality across MonthlyIncome, proposed_merit_pct,
        proposed_merit_amount.)'
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      uid: df8e72ce-8f7e-4d15-99b5-038eca3c3421
    - text: 'PercentSalaryHike must be numeric and in a reasonable range (e.g., 0
        <= PercentSalaryHike <= 100) so that PercentSalaryHike/100.0 is meaningful
        for base_merit_pct computation. Actionable check: assert PercentSalaryHike
        is non-null, numeric, and within [0,100].'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      uid: 9e8748d0-4884-4ac2-a9b5-0c07e7b81c60
    - text: 'Compression and emerging-talent supplemental amounts are cohort-driven
        arithmetic relations: for rows with SalarySlab in {''Upto 5k'',''5k-10k''}
        compression_pool_share must be 0.003 and compression_amount must equal round(MonthlyIncome
        * compression_pool_share, 2); for rows with AgeGroup == ''26-35'' emerging_talent_supp_pct
        must be 0.005 and emerging_talent_amount must equal round(MonthlyIncome *
        emerging_talent_supp_pct, 2). Actionable checks: assert these conditional
        arithmetic equalities hold for every row.'
      sources:
      - start_line: 59
        end_line: 61
        file: ''
      - start_line: 63
        end_line: 65
        file: ''
      - start_line: 71
        end_line: 75
        file: ''
      uid: e71d132d-43ce-48dd-920f-9ed6317eab5e
  '["AgeGroup","age_weight"]':
    code: []
    assumptions:
    - text: 'age_weight is deterministically derived from AgeGroup: records with AgeGroup
        == ''26-35'' must have age_weight == 1.02, and all other AgeGroup values must
        have age_weight == 1.00. This can be enforced as a conditional multi-column
        constraint (e.g. two Deequ checks: where AgeGroup = ''26-35'' then age_weight
        = 1.02; where AgeGroup <> ''26-35'' then age_weight = 1.00).'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      uid: 7a4ca502-9fc2-49d3-9a7b-f0bd4b0ab83d
    - text: 'emerging_talent_supp_pct and emerging_talent_amount are driven by AgeGroup
        and MonthlyIncome: if AgeGroup == ''26-35'' then emerging_talent_supp_pct
        == 0.005 and emerging_talent_amount == round(MonthlyIncome * 0.005, 2); otherwise
        emerging_talent_supp_pct == 0.0 and emerging_talent_amount == 0.0. Enforce
        as conditional equality checks relating AgeGroup, MonthlyIncome, emerging_talent_supp_pct
        and emerging_talent_amount.'
      sources:
      - start_line: 63
        end_line: 65
        file: ''
      uid: d9b096dd-bde5-44d9-895f-19a84126520c
    - text: age_weight must only take the numeric values {1.02, 1.00} and be consistent
        with AgeGroup for every row (no nulls or other numeric values). A multi-column
        constraint can check that every (AgeGroup, age_weight) pair belongs to the
        allowed mapping set.
      sources:
      - start_line: 35
        end_line: 41
        file: ''
      uid: 13bfe647-8512-4aa2-b9db-57f6ac1872c1
    - text: 'proposed_merit_amount must equal MonthlyIncome * proposed_merit_pct (rounded
        to 2 decimals), and proposed_merit_pct is computed as min( adjusted_merit_pct,
        slab_cap_pct ) where adjusted_merit_pct = min(perf_guideline_pct, PercentSalaryHike/100.0)
        * age_weight * travel_multiplier. Enforce consistency across the columns:
        (PerfGuideline, PercentSalaryHike, age_weight, travel_multiplier, slab_cap_pct,
        MonthlyIncome) must produce the stored proposed_merit_pct and proposed_merit_amount.'
      sources:
      - start_line: 40
        end_line: 43
        file: ''
      - start_line: 35
        end_line: 36
        file: ''
      uid: df2dded5-2929-4996-bf37-54f790198795
  '["AgeGroup","emerging_talent_supp_pct"]':
    code: []
    assumptions:
    - text: "PerformanceRating values used to derive perf_guideline_pct are expected\
        \ to be in the set {3, 4}. The code maps PerformanceRating -> perf_guideline_pct\
        \ only for keys 3 and 4; if other values are present perf_guideline_pct will\
        \ be null which will cause proposed_merit_pct and proposed_merit_amount to\
        \ be null. Actionable checks: ensure PerformanceRating \u2208 {3,4} for rows\
        \ where proposed merit is required (Deequ-like: .isContainedIn(\"PerformanceRating\"\
        , [3,4]) and/or require non-null perf_guideline_pct via a derived check)."
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 39
        end_line: 43
        file: ''
      uid: fc45fa53-9f8b-45d6-8cde-874c4197fca6
    - text: 'SalarySlab must be one of {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}
        because slab_cap_pct is mapped from these keys and is used as an upper bound
        for proposed_merit_pct. In addition, MonthlyIncome must be numeric and non-null
        whenever slab_cap_pct is applied, since proposed_merit_amount and compression/emerging
        amounts multiply by MonthlyIncome. Actionable checks: .isContainedIn("SalarySlab",
        [...]) and .isComplete("MonthlyIncome") plus numeric/non-negative checks (e.g.
        .isNonNegative("MonthlyIncome")).'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 40
        end_line: 43
        file: ''
      - start_line: 59
        end_line: 65
        file: ''
      uid: 118b96c1-11bb-49d0-abfb-504012dd77cf
    - text: 'BusinessTravel values are normalized and then mapped to travel_multiplier;
        the code expects BusinessTravel to be in {''Travel_Frequently'',''Travel_Rarely'',''Non-Travel''}
        after normalization. If other values are present travel_multiplier will be
        null and will make adjusted merit calculations incorrect. Actionable checks:
        verify normalization produced only allowed values (e.g. .isContainedIn("BusinessTravel",
        ["Travel_Frequently","Travel_Rarely","Non-Travel"])) and that travel_multiplier
        is not null for rows where it is used.'
      sources:
      - start_line: 17
        end_line: 24
        file: ''
      - start_line: 36
        end_line: 37
        file: ''
      - start_line: 39
        end_line: 42
        file: ''
      uid: 115cec43-2139-411c-8913-3b8ecfa0a926
    - text: 'Rows with AgeGroup == ''26-35'' are assigned emerging_talent_supp_pct
        = 0.005 and emerging_talent_amount = MonthlyIncome * emerging_talent_supp_pct.
        Therefore AgeGroup must contain the exact category ''26-35'' for those employees,
        and MonthlyIncome must be present and numeric (non-null, non-negative) for
        those rows so emerging_talent_amount can be computed. Actionable checks: .isContainedIn("AgeGroup",
        [expected categories]) and conditional completeness/numeric checks like: for
        rows where AgeGroup == ''26-35'' enforce .isComplete("MonthlyIncome") and
        .isNonNegative("MonthlyIncome").'
      sources:
      - start_line: 63
        end_line: 65
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 74
        end_line: 75
        file: ''
      uid: 78f634f2-a0db-4654-b570-00290aa0f12b
    - text: 'Promotion eligibility logic depends on multiple numeric columns: PerformanceRating,
        YearsInCurrentRole, YearsSinceLastPromotion, and JobLevel. For rows that satisfy
        (PerformanceRating == 4 AND YearsInCurrentRole >= 2 AND YearsSinceLastPromotion
        >= 1 AND JobLevel < 5), the code maps JobLevel -> promotion_raise_pct using
        keys {1,2,3,4,5}. Therefore these columns must be non-null and numeric, and
        JobLevel should be within the expected range {1..5} for eligible employees.
        Actionable checks: conditional completeness and domain checks, e.g. ensure
        numeric/non-null for those columns and .isContainedIn("JobLevel", [1,2,3,4,5])
        for rows where promotion_eligible is True.'
      sources:
      - start_line: 46
        end_line: 55
        file: ''
      uid: 8b04bbe5-1122-4122-83aa-2c106d071c5e
    - text: 'Department-level aggregation assumes Department and EmpID are present
        and that the monetary fields being summed (MonthlyIncome, proposed_merit_amount,
        promotion_amount, compression_amount, emerging_talent_amount) are numeric
        and non-null where appropriate. If Department is null or these numeric fields
        contain nulls/NaNs, department budgets (headcount, base_pay, pools, total_budget)
        will be incorrect. Actionable checks: .isComplete("Department"), .isComplete("EmpID")
        and numeric/non-null checks for the summed columns prior to groupby (e.g.
        .hasCompleteness(["MonthlyIncome","proposed_merit_amount","promotion_amount","compression_amount","emerging_talent_amount"])
        or conditional non-null for rows counted).'
      sources:
      - start_line: 67
        end_line: 75
        file: ''
      - start_line: 77
        end_line: 78
        file: ''
      uid: 39efd184-9c32-4ed8-a221-ba17619c65dd
  BusinessTravel:
    code:
    - suggestion: '.satisfies("CASE WHEN `BusinessTravel` IN (''Travel_Frequently'',
        ''Travel_Rarely'', ''Non-Travel'', ''TravelRarely'') THEN 1 ELSE 0 END", "Normalized
        BusinessTravel in multiplier keys", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 364e5d40-a692-4c56-b0c7-b2eb0d2bfe6e
      source_assumptions:
      - a8613f3e-e34d-4787-835f-e253f4f90ab2
    assumptions:
    - text: "BusinessTravel should have no NULL / missing values in the input. The\
        \ downstream code assumes a value exists for every row (the column is read,\
        \ normalized and later used to compute a multiplier that participates in numeric\
        \ arithmetic).  \nWe can express this as a Deequ/GE check, for example: .satisfies('CASE\
        \ WHEN `BusinessTravel` IS NOT NULL THEN 1 ELSE 0 END', 'Non-null BusinessTravel',\
        \ lambda x: x == 1)"
      sources:
      - start_line: 15
        end_line: 15
        file: ''
      - start_line: 24
        end_line: 24
        file: ''
      uid: cc7bcd85-0145-446c-97d9-b7e5eac43978
    - text: "All input BusinessTravel values must be one of the expected raw categories\
        \ that the normalization step knows about: 'TravelRarely', 'Travel_Rarely',\
        \ 'Travel_Frequently', or 'Non-Travel'. The code only explicitly maps these\
        \ variants; any other raw value will pass through the normalization unchanged\
        \ and will later fail to map to a numeric multiplier.  \nRepresent as: .satisfies('CASE\
        \ WHEN `BusinessTravel` IN (\\'TravelRarely\\', \\'Travel_Rarely\\', \\'Travel_Frequently\\\
        ', \\'Non-Travel\\') THEN 1 ELSE 0 END', 'Allowed raw BusinessTravel', lambda\
        \ x: x == 1)"
      sources:
      - start_line: 17
        end_line: 24
        file: ''
      - start_line: 34
        end_line: 37
        file: ''
      uid: 4f716cbb-6976-43d1-89d5-c9bd6e841a6f
    - text: "After normalization the BusinessTravel values are expected to be exactly\
        \ the three categories used by the travel_multiplier_map: 'Travel_Frequently',\
        \ 'Travel_Rarely', and 'Non-Travel'. Every input row must map (possibly via\
        \ the TravelRarely -> Travel_Rarely normalization) to one of these three keys;\
        \ otherwise travel_multiplier will be NaN and numeric calculations (proposed_merit_pct,\
        \ amounts, aggregates) will break or produce NaNs.  \nRepresent as: .satisfies('CASE\
        \ WHEN `BusinessTravel` IN (\\'Travel_Frequently\\', \\'Travel_Rarely\\',\
        \ \\'Non-Travel\\') THEN 1 ELSE 0 END', 'Normalized BusinessTravel in multiplier\
        \ keys', lambda x: x == 1)"
      sources:
      - start_line: 34
        end_line: 37
        file: ''
      - start_line: 40
        end_line: 42
        file: ''
      uid: a8613f3e-e34d-4787-835f-e253f4f90ab2
  '["BusinessTravel","travel_multiplier"]':
    code: []
    assumptions:
    - text: 'After normalization, every value in BusinessTravel must be one of {''Travel_Frequently'',
        ''Travel_Rarely'', ''Non-Travel''} and the travel_multiplier column must be
        non-null for every row (i.e., the travel_multiplier_map covers all normalized
        BusinessTravel values). This can be enforced with a containment check on BusinessTravel
        and a multi-column predicate such as: (BusinessTravel IN (''Travel_Frequently'',''Travel_Rarely'',''Non-Travel''))
        AND (travel_multiplier IS NOT NULL).'
      sources:
      - start_line: 18
        end_line: 24
        file: ''
      - start_line: 36
        end_line: 37
        file: ''
      uid: 1d3f384e-a07a-498c-b1a6-11bee86d7e8d
    - text: 'travel_multiplier must match BusinessTravel according to the mapping:
        BusinessTravel == ''Travel_Frequently'' -> travel_multiplier == 1.01; BusinessTravel
        IN {''Travel_Rarely'',''Non-Travel''} -> travel_multiplier == 1.00. This is
        a row-level equality constraint expressible as a single predicate: ((BusinessTravel
        = ''Travel_Frequently'' AND travel_multiplier = 1.01) OR (BusinessTravel IN
        (''Travel_Rarely'',''Non-Travel'') AND travel_multiplier = 1.00)).'
      sources:
      - start_line: 36
        end_line: 37
        file: ''
      - start_line: 18
        end_line: 24
        file: ''
      uid: fe58f7f8-e141-4a37-bbb4-dada5f7324c5
    - text: base_merit_pct must equal the minimum of perf_guideline_pct and (PercentSalaryHike
        / 100). Equivalently, base_merit_pct <= perf_guideline_pct AND base_merit_pct
        <= (PercentSalaryHike / 100), and one of those two is equal to base_merit_pct.
        This enforces consistency between PerformanceRating, PercentSalaryHike, perf_guideline_pct
        and base_merit_pct.
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 40
        end_line: 41
        file: ''
      uid: b2b6d053-137b-4a53-9466-5a6a637f9466
    - text: 'proposed_merit_pct must equal min(adjusted_merit_pct, slab_cap_pct) where
        adjusted_merit_pct = base_merit_pct * age_weight * travel_multiplier. From
        this follows the row-level constraints: proposed_merit_pct <= slab_cap_pct
        AND proposed_merit_pct <= (base_merit_pct * age_weight * travel_multiplier),
        and if (base_merit_pct * age_weight * travel_multiplier) < slab_cap_pct then
        proposed_merit_pct == (base_merit_pct * age_weight * travel_multiplier). This
        enforces the numeric relationship across base_merit_pct, age_weight, travel_multiplier,
        slab_cap_pct and proposed_merit_pct.'
      sources:
      - start_line: 35
        end_line: 37
        file: ''
      - start_line: 40
        end_line: 43
        file: ''
      - start_line: 31
        end_line: 32
        file: ''
      uid: dc006198-41e3-4510-9d2f-657dcf9f45ed
    - text: 'proposed_merit_amount must equal MonthlyIncome * proposed_merit_pct rounded
        to 2 decimal places. Enforce as a row-level numeric equality/near-equality:
        proposed_merit_amount == round(MonthlyIncome * proposed_merit_pct, 2) (or
        absolute difference < 0.01 if rounding introduces floating error).'
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 71
        end_line: 72
        file: ''
      uid: 6d3412ca-218f-41d6-93f7-7905a3ae3113
    - text: 'promotion_eligible must be True exactly when all of these hold: PerformanceRating
        == 4, YearsInCurrentRole >= 2, YearsSinceLastPromotion >= 1, and JobLevel
        < 5. Conversely, if promotion_eligible is False/0 then at least one of those
        conditions must be false. This can be asserted with a predicate: (promotion_eligible
        = TRUE) <-> ((PerformanceRating = 4) AND (YearsInCurrentRole >= 2) AND (YearsSinceLastPromotion
        >= 1) AND (JobLevel < 5)).'
      sources:
      - start_line: 46
        end_line: 52
        file: ''
      uid: b5a7dd60-f85d-437e-9084-bef753421bc3
    - text: 'promotion_raise_pct must follow the JobLevel mapping for eligible employees
        and be 0.0 for non-eligible employees. Concretely: if promotion_eligible then
        promotion_raise_pct == mapping(JobLevel) (1->0.10,2->0.08,3->0.07,4->0.06,5->0.0);
        else promotion_raise_pct == 0.0. Expressible as a row-level conditional predicate
        over JobLevel, promotion_eligible and promotion_raise_pct. Also promotion_amount
        must equal round(MonthlyIncome * promotion_raise_pct, 2).'
      sources:
      - start_line: 53
        end_line: 56
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      uid: 03b6ccd8-8069-4dda-a35f-fef44cf885cf
  YearsInCurrentRole:
    code:
