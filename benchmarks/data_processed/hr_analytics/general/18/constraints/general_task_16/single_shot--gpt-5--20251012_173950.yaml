constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .satisfies("Age >= 18 AND Age <= 70", 'age_in_range')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Age_vs_AgeGroup:
    code:
    - - .satisfies("(Age >= 18 AND Age <= 25 AND AgeGroup = '18-25') OR (Age >= 26
        AND Age <= 35 AND AgeGroup = '26-35') OR (Age >= 36 AND Age <= 45 AND AgeGroup
        = '36-45') OR (Age >= 46 AND Age <= 55 AND AgeGroup = '46-55') OR (Age >=
        56 AND AgeGroup = '55+')", 'agegroup_consistent_with_age')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isComplete('EnvironmentSatisfaction')
      - Valid
    - - .satisfies("EnvironmentSatisfaction >= 1 AND EnvironmentSatisfaction <= 4",
        'envsat_between_1_4')
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction')
      - Valid
    - - .satisfies("JobSatisfaction >= 1 AND JobSatisfaction <= 4", 'jobsat_between_1_4')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyIncome_vs_SalarySlab:
    code:
    - - .satisfies("(SalarySlab = 'Upto 5k' AND MonthlyIncome >= 0 AND MonthlyIncome
        <= 5000) OR (SalarySlab = '5k-10k' AND MonthlyIncome >= 5001 AND MonthlyIncome
        <= 10000) OR (SalarySlab = '10k-15k' AND MonthlyIncome >= 10001 AND MonthlyIncome
        <= 15000) OR (SalarySlab = '15k+' AND MonthlyIncome >= 15001)", 'income_matches_slab_bounds')
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isComplete('WorkLifeBalance')
      - Valid
    - - .satisfies("WorkLifeBalance >= 1 AND WorkLifeBalance <= 4", 'wlb_between_1_4')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsAtCompany_vs_Total:
    code:
    - - .satisfies("YearsAtCompany <= TotalWorkingYears", 'yac_le_total')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsInCurrentRole_vs_YearsAtCompany:
    code:
    - - .satisfies("YearsInCurrentRole <= YearsAtCompany", 'role_le_yac')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsSinceLastPromotion_vs_YearsAtCompany:
    code:
    - - .satisfies("YearsSinceLastPromotion <= YearsAtCompany", 'promo_le_yac')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
  YearsWithCurrManager_vs_YearsAtCompany:
    code:
    - - .satisfies("coalesce(YearsWithCurrManager, 0) <= YearsAtCompany", 'mgr_le_yac')
      - Valid
    assumptions: []
