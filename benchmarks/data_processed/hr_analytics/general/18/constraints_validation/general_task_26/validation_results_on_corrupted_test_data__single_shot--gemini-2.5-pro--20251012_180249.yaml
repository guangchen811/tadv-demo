results:
  Department:
    code:
    - suggestion: .isContainedIn('Department', ['Research & Development', 'Sales',
        'Human Resources'])
      status: true
      reason_if_failed: ''
      level: error
  EmployeeNumber:
    code:
    - suggestion: .isUnique('EmployeeNumber')
      status: true
      reason_if_failed: ''
      level: error
  JobLevel:
    code:
    - suggestion: .isContainedIn('JobLevel', ['1', '2', '3', '4', '5'])
      status: true
      reason_if_failed: ''
      level: error
  MonthlyIncome:
    code:
    - suggestion: .isComplete('MonthlyIncome')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('MonthlyIncome')
      status: true
      reason_if_failed: ''
      level: error
  Over18:
    code:
    - suggestion: .hasValue('Over18', 'Y')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasValue(''Over18'',
        ''Y'')'': ''Check'' object has no attribute ''hasValue'''
      level: error
  PerformanceRating:
    code:
    - suggestion: .isComplete('PerformanceRating')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('PerformanceRating', ['3', '4'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''PerformanceRating'', [''3'',
        ''4''])'' failed on data sample: Value: 0.0 does not meet the constraint requirement!'
      level: error
  SalarySlab:
    code:
    - suggestion: .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      status: true
      reason_if_failed: ''
      level: error
  StandardHours:
    code:
    - suggestion: .hasValue('StandardHours', 80)
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasValue(''StandardHours'',
        80)'': ''Check'' object has no attribute ''hasValue'''
      level: error
  TotalWorkingYears, YearsAtCompany:
    code:
    - suggestion: .satisfies('TotalWorkingYears >= YearsAtCompany', 'TotalWorkingYears_GTE_YearsAtCompany')
      status: true
      reason_if_failed: ''
      level: error
  YearsAtCompany:
    code:
    - suggestion: .isNonNegative('YearsAtCompany')
      status: true
      reason_if_failed: ''
      level: error
  YearsAtCompany, YearsSinceLastPromotion:
    code:
    - suggestion: .satisfies('YearsAtCompany >= YearsSinceLastPromotion', 'YearsAtCompany_GTE_YearsSinceLastPromotion')
      status: true
      reason_if_failed: ''
      level: error
  YearsSinceLastPromotion:
    code:
    - suggestion: .isNonNegative('YearsSinceLastPromotion')
      status: true
      reason_if_failed: ''
      level: error
  YearsWithCurrManager:
    code:
    - suggestion: '.hasCompleteness(''YearsWithCurrManager'', lambda completeness:
        completeness >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
