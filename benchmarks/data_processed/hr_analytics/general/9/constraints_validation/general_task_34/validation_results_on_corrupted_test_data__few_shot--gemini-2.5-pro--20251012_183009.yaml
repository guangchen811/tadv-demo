results:
  Age:
    code:
    - suggestion: '.hasMin(''Age'', lambda x: x >= 18)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Age')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''Age'')'' failed on data sample:
        Value: 0.7006802721088435 does not meet the constraint requirement!'
      level: error
  Department:
    code:
    - suggestion: .isContainedIn('Department', ['Sales', 'Research & Development',
        'Human Resources'])
      status: true
      reason_if_failed: ''
      level: error
  EmpID:
    code:
    - suggestion: .isUnique('EmpID')
      status: true
      reason_if_failed: ''
      level: error
  JobSatisfaction:
    code:
    - suggestion: .isContainedIn('JobSatisfaction', ['1', '2', '3', '4'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''JobSatisfaction'', [''1'',
        ''2'', ''3'', ''4''])'' failed on data sample: Value: 0.29931972789115646
        does not meet the constraint requirement!'
      level: error
  Over18:
    code:
    - suggestion: .isContainedIn('Over18', ['Y'])
      status: true
      reason_if_failed: ''
      level: error
  OverTime:
    code:
    - suggestion: .isContainedIn('OverTime', ['Yes', 'No'])
      status: true
      reason_if_failed: ''
      level: error
  PerformanceRating:
    code:
    - suggestion: .isContainedIn('PerformanceRating', ['3', '4'])
      status: true
      reason_if_failed: ''
      level: error
  SalarySlab:
    code:
    - suggestion: .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      status: true
      reason_if_failed: ''
      level: error
  TotalWorkingYears:
    code:
    - suggestion: .isNonNegative('TotalWorkingYears')
      status: true
      reason_if_failed: ''
      level: error
  YearsAtCompany:
    code:
    - suggestion: '.satisfies(''YearsAtCompany <= TotalWorkingYears'', ''tenure_consistency_check'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  YearsWithCurrManager:
    code:
    - suggestion: '.hasCompleteness(''YearsWithCurrManager'', lambda x: x > 0.9)'
      status: true
      reason_if_failed: ''
      level: error
