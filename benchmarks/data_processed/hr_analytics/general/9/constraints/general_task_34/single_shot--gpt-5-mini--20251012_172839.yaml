constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isPositive('Age')
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isContainedIn('EmployeeCount', [1])
      - Invalid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    - - .isUnique('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isContainedIn('JobLevel', [1,2,3,4,5])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isComplete('StandardHours')
      - Valid
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  StockOptionLevel:
    code:
    - - .isContainedIn('StockOptionLevel', [0,1,2,3])
      - Invalid
    assumptions: []
  Tenure consistency:
    code:
    - - .satisfies('YearsAtCompany <= TotalWorkingYears', 'tenure_consistency')
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  TrainingTimesLastYear:
    code:
    - - .isContainedIn('TrainingTimesLastYear', [0,1,2,3,4,5,6])
      - Invalid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.90)'
      - Valid
    assumptions: []
