constraints:
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  CareerStage:
    code:
    - - .isContainedIn('CareerStage', ['early', 'mid', 'senior', 'late', 'unknown'])
      - Invalid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    - - .isUnique('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18')
      - Valid
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    - - .satisfies("(SalarySlab = 'Upto 5k' AND MonthlyIncome <= 5000) OR (SalarySlab
        = '5k-10k' AND MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab
        = '10k-15k' AND MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab
        = '15k+' AND MonthlyIncome > 15000)", 'salary slab consistency')
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .satisfies('StandardHours = 80', 'standard hours equals 80')
      - Valid
    assumptions: []
  StockOptionLevel:
    code:
    - - .isComplete('StockOptionLevel')
      - Valid
    - - .isContainedIn('StockOptionLevel', [0, 1, 2, 3])
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95)'
      - Valid
    assumptions: []
