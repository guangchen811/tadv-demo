  '["Attrition","Department","EmployeeCount","JobRole","active_quarterly_comp"]':
    code: []
    assumptions:
    - text: 'Row-level consistency between Attrition, quarterly_comp and active_quarterly_comp:
        for every record, if Attrition == ''No'' then active_quarterly_comp must equal
        quarterly_comp; if Attrition == ''Yes'' then active_quarterly_comp must equal
        0.0. Example Deequ-style checks: satisfy("(Attrition == ''No'' AND active_quarterly_comp
        == quarterly_comp) OR (Attrition == ''Yes'' AND active_quarterly_comp == 0.0)").'
      sources:
      - start_line: 64
        end_line: 67
        file: ''
      uid: 7558c91b-7196-48f2-96ba-c7bd1beae931
    - text: 'Quarterly consistency: quarterly_comp must equal monthly_comp_w_overheads
        * 3.0 for every record. Example Deequ-style check: satisfy("quarterly_comp
        == monthly_comp_w_overheads * 3.0").'
      sources:
      - start_line: 52
        end_line: 64
        file: ''
      uid: 2766e855-8cff-4010-a875-038c743daad2
    - text: 'Group-level invariants on (Department, JobRole): headcount is computed
        as sum(EmployeeCount) and must be strictly positive for each (Department,
        JobRole); attrition_count equals the number of rows with Attrition == ''Yes''
        in that group and must be <= headcount; attrition_rate = attrition_count /
        headcount and therefore must be between 0.0 and 1.0 inclusive. Example Deequ-style
        checks: for each group assert headcount > 0; satisfy("attrition_count <= headcount");
        satisfy("attrition_rate >= 0.0 AND attrition_rate <= 1.0").'
      sources:
      - start_line: 70
        end_line: 75
        file: ''
      - start_line: 20
        end_line: 27
        file: ''
      uid: e5de6cd6-3161-47e8-9cc5-7a20a3158391
    - text: 'EmployeeCount represents per-row headcount and should be exactly 1 for
        every record (so grouped headcount equals the number of rows per (Department,
        JobRole)). Example Deequ-style checks: min(EmployeeCount) == 1 AND max(EmployeeCount)
        == 1 or isContainedIn(EmployeeCount, {1}).'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 70
        end_line: 72
        file: ''
      uid: 28bcc266-c5b7-4e79-b23a-ee2751e0385b
    - text: 'Adj income computation requires MonthlyIncome and PercentSalaryHike to
        be numeric and present: adj_income must equal MonthlyIncome * (1.0 + PercentSalaryHike
        / 100.0) and should be > 0. Example Deequ-style checks: isComplete(''MonthlyIncome''),
        isComplete(''PercentSalaryHike''), satisfy("adj_income == MonthlyIncome *
        (1.0 + PercentSalaryHike / 100.0)"), satisfy("adj_income > 0").'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: cf4df6f9-d73e-4bbc-826a-cbf5b5963ab8
    - text: 'Mapping inputs must be restricted to known keys so mapped premiums are
        non-null: AgeGroup values must be one of {''18-25'',''26-35'',''36-45'',''46-55'',''55+''}
        so benefits_rate is defined; BusinessTravel values (after the replacement
        of ''TravelRarely'' -> ''Travel_Rarely'') must be one of {''Non-Travel'',''Travel_Rarely'',''Travel_Frequently''}
        so travel_premium is defined; OverTime must be in {''No'',''Yes''} so overtime_premium
        is defined; SalarySlab must be in {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}
        so slab_premium is defined. Example Deequ-style checks: isContainedIn(''AgeGroup'',
        {...}), isContainedIn(''BusinessTravel'', {...}), isContainedIn(''OverTime'',
        {...}), isContainedIn(''SalarySlab'', {...}), plus isComplete on the mapped
        premium columns.'
      sources:
      - start_line: 30
        end_line: 36
        file: ''
      - start_line: 38
        end_line: 42
        file: ''
      uid: 185229ca-79b9-4584-9260-4a85d0d266ec
    - text: 'Monthly compensation composition: monthly_comp_w_overheads must equal
        adj_income * (1.0 + benefits_rate + travel_premium + overtime_premium + slab_premium
        + joblevel_adj + manager_adj) * fte for every record. This ties together adj_income,
        the premium columns, joblevel_adj, manager_adj, and fte. Example Deequ-style
        check: satisfy("monthly_comp_w_overheads == adj_income * (1.0 + benefits_rate
        + travel_premium + overtime_premium + slab_premium + joblevel_adj + manager_adj)
        * fte").'
      sources:
      - start_line: 52
        end_line: 61
        file: ''
      - start_line: 48
        end_line: 49
        file: ''
      uid: f1d20208-a413-4e08-ac1b-ed5abd1cacbf
