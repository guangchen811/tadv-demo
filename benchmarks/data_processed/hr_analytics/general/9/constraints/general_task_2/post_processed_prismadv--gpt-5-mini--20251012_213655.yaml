        and are typically integer counts. Example check: .satisfies("CASE WHEN `YearsAtCompany`
        >= 0 AND `YearsAtCompany` = floor(`YearsAtCompany`) THEN 1 ELSE 0 END", "YearsAtCompany_nonnegative_integer",
        lambda x: x == 1)'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 25
        end_line: 27
        file: ''
      uid: cb0a9a41-720f-4246-ac53-c669a6c46229
  AgeGroup:
    code:
    - suggestion: '.satisfies("CASE WHEN `AgeGroup` IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'')
        THEN 1 ELSE 0 END", "Valid AgeGroup", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 45eb08e6-9e7a-4928-bf6e-8debe401c936
      source_assumptions:
      - 3311fc5a-c049-41e0-9c2b-42c407453937
    assumptions:
    - text: 'The ''AgeGroup'' column must contain only the five expected categories
        exactly as spelled: ''18-25'', ''26-35'', ''36-45'', ''46-55'', ''55+''. The
        code maps AgeGroup to a numeric benefits_rate using a fixed mapping (benefits_rate_map).
        If any input value is outside this set the mapping will produce a missing
        value (NaN) and downstream numeric calculations (monthly_comp_w_overheads,
        quarterly_comp, budgets) will be incorrect.


        Representations you can convert to validation rules:

        - Deequ-style: .satisfies("CASE WHEN `AgeGroup` IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'')
        THEN 1 ELSE 0 END", "Valid AgeGroup", lambda x: x == 1.0)

        - Great Expectations: expect_column_values_to_be_in_set(''AgeGroup'', [''18-25'',''26-35'',''36-45'',''46-55'',''55+''])'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 52
        end_line: 61
        file: ''
      uid: 3311fc5a-c049-41e0-9c2b-42c407453937
    - text: 'The ''AgeGroup'' column must be non-null (complete) for all input rows.
        The code assumes every row has an AgeGroup value to map to a numeric benefits_rate;
        null/missing AgeGroup would propagate as NaN into numeric computations and
        bias/invalidates budget outputs.


        Representations you can convert to validation rules:

        - Deequ-style: .satisfies("CASE WHEN `AgeGroup` IS NOT NULL THEN 1 ELSE 0
        END", "AgeGroup completeness", lambda x: x == 1.0)

        - Great Expectations: expect_column_values_to_not_be_null(''AgeGroup'')'
