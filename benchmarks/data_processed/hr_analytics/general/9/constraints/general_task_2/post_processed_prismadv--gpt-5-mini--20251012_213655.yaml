  '["MonthlyIncome","PercentSalaryHike","adj_income"]':
    code: []
    assumptions:
    - text: 'The derived column ''adj_income'' is computed as MonthlyIncome * (1 +
        PercentSalaryHike / 100). Therefore: (1) MonthlyIncome and PercentSalaryHike
        must be numeric (coercion was applied) and not null for rows where adj_income
        is expected, and (2) adj_income should exactly equal that expression. Actionable
        checks (Deequ-style):

        - Ensure numeric coercion succeeded: .satisfies("MonthlyIncome IS NOT NULL
        AND PercentSalaryHike IS NOT NULL", "monthly_and_hike_not_null")

        - Verify formula: .satisfies("adj_income = MonthlyIncome * (1.0 + PercentSalaryHike
        / 100.0)", "adj_income_formula")'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      uid: 47d167ba-f9c5-4ab1-9006-37c70e3725e5
    - text: 'active_quarterly_comp is defined conditionally from Attrition and quarterly_comp.
        For every row: if Attrition == ''No'' then active_quarterly_comp must equal
        quarterly_comp; otherwise active_quarterly_comp must be 0.0. Actionable check
        (Deequ-style):

        - .satisfies("(Attrition = ''No'' AND active_quarterly_comp = quarterly_comp)
        OR (Attrition <> ''No'' AND active_quarterly_comp = 0.0)", "active_quarterly_comp_consistency")'
      sources:
      - start_line: 64
        end_line: 67
        file: ''
      uid: b007ec6d-932a-4997-8591-762bbe784ac2
    - text: 'Group-level attrition_rate is computed as attrition_count / headcount.
        To avoid invalid results, for every (Department, JobRole) group the aggregated
        headcount (sum of EmployeeCount) must be > 0. Actionable check: after grouping
        by Department and JobRole assert headcount > 0 for all groups (e.g., run the
        same groupby and assert all headcount sums are positive). In Deequ this is
        expressed over the grouped result or via a check like: .satisfies_on_aggregate("sum(EmployeeCount)
        > 0", "headcount_positive_per_group")'
      sources:
      - start_line: 70
        end_line: 75
        file: ''
      uid: aaf8d511-9ed3-457f-82b1-ea9e0353062a
    - text: 'Mappings create numeric premiums from categorical columns (AgeGroup ->
        benefits_rate, BusinessTravel -> travel_premium, OverTime -> overtime_premium,
        SalarySlab -> slab_premium, JobLevel -> joblevel_adj). For each row where
        the source categorical is present, the corresponding mapped column must not
        be null. Actionable checks (Deequ-style, conditional):

        - .satisfies("(AgeGroup IS NOT NULL) => (benefits_rate IS NOT NULL)", "benefits_rate_coverage")

        - .satisfies("(BusinessTravel IS NOT NULL) => (travel_premium IS NOT NULL)",
        "travel_premium_coverage")

        - .satisfies("(OverTime IS NOT NULL) => (overtime_premium IS NOT NULL)", "overtime_premium_coverage")

        - .satisfies("(SalarySlab IS NOT NULL) => (slab_premium IS NOT NULL)", "slab_premium_coverage")

        - .satisfies("(JobLevel IS NOT NULL) => (joblevel_adj IS NOT NULL)", "joblevel_adj_coverage")'
      sources:
      - start_line: 32
        end_line: 42
        file: ''
      - start_line: 44
        end_line: 46
        file: ''
      uid: 5834eee3-2812-401a-b940-3f74f7b37f16
    - text: 'fte is computed as StandardHours / 80.0 and is used multiplicatively
        in monthly_comp_w_overheads. Therefore StandardHours should be numeric and
        non-negative and fte should be within a reasonable range (e.g., >= 0 and <=
        2). Actionable checks:

        - .satisfies("StandardHours IS NOT NULL AND StandardHours >= 0", "standard_hours_non_negative")

        - .satisfies("fte >= 0 AND fte <= 2", "fte_reasonable_range")'
      sources:
      - start_line: 48
        end_line: 48
        file: ''
      - start_line: 52
        end_line: 61
        file: ''
      uid: 924f0070-8739-491e-b810-4205e699f3b3
    - text: 'monthly_comp_w_overheads is computed from adj_income, the sum of premiums/adjustments,
        and fte: monthly_comp_w_overheads = adj_income * (1 + benefits_rate + travel_premium
        + overtime_premium + slab_premium + joblevel_adj + manager_adj) * fte. This
        should hold exactly for rows where none of the inputs are null; additionally
        monthly_comp_w_overheads and quarterly_comp should be non-negative when MonthlyIncome
        is non-negative. Actionable checks:

        - Exact formula: .satisfies("monthly_comp_w_overheads = adj_income * (1.0
        + benefits_rate + travel_premium + overtime_premium + slab_premium + joblevel_adj
        + manager_adj) * fte", "monthly_comp_formula")

        - Non-negativity: .satisfies("(MonthlyIncome >= 0) => (monthly_comp_w_overheads
        >= 0 AND quarterly_comp >= 0)", "comp_non_negative")'
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 52
        end_line: 61
        file: ''
      uid: 000fe534-cf7e-4952-bcb3-265de75e4594
