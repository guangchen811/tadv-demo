      uid: 2c9118ba-d414-4acd-a4ef-c495685ea2f6
    - text: 'The monthly compensation with overheads uses many component columns:
        ''adj_income'', ''benefits_rate'', ''travel_premium'', ''overtime_premium'',
        ''slab_premium'', ''joblevel_adj'', ''manager_adj'', and ''fte''. For the
        calculation to be valid: all these component columns must be numeric and non-null
        (or coercible), ''fte'' must be >= 0, ''adj_income'' must be >= 0, and the
        composite multiplier (1.0 + benefits_rate + travel_premium + overtime_premium
        + slab_premium + joblevel_adj + manager_adj) must be > 0 for every row. Actionable
        checks: require non-nullness for the listed columns and assert the multiplier
        > 0 and fte >= 0.'
      sources:
      - start_line: 52
        end_line: 62
        file: ''
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 48
        end_line: 50
