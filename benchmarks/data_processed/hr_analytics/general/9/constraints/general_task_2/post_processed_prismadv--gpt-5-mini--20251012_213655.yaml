    - text: 'All categorical columns that are mapped to numeric premiums must contain
        only values present in the provided maps, so the .map calls do not produce
        NaNs. Concretely: AgeGroup must be one of {''18-25'',''26-35'',''36-45'',''46-55'',''55+''};
        BusinessTravel must be one of {''Non-Travel'',''Travel_Rarely'',''Travel_Frequently''}
        (note replacement of ''TravelRarely'' to ''Travel_Rarely''); OverTime must
        be {''No'',''Yes''}; SalarySlab must be one of {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}.
        If values outside these sets exist, benefits_rate/travel_premium/overtime_premium/slab_premium
        will be null and propagate into compensation calculations.'
      sources:
      - start_line: 32
        end_line: 42
        file: ''
      uid: 931cfd8e-dafb-4bb3-bc7c-db28b9151e6d
    - text: For active employees (Attrition == 'No'), all inputs used to compute monthly_comp_w_overheads
        must be present and valid so the per-employee compensation is numeric. Specifically
        the combination of MonthlyIncome, PercentSalaryHike, AgeGroup, BusinessTravel,
        OverTime, SalarySlab, JobLevel, YearsWithCurrManager (or a valid fill value),
        and StandardHours must not produce NaNs when used together; otherwise quarterly_comp
        and active_quarterly_comp will be NaN and group sums will be incorrect.
      sources:
      - start_line: 44
        end_line: 67
        file: ''
      uid: 3ae8a205-9110-4ede-a9c4-5d4bdeda44a5
    - text: 'When computing group metrics by Department and JobRole: headcount is
        computed as sum(EmployeeCount) and attrition_count as count of rows with Attrition
        == ''Yes''. Therefore EmployeeCount should be non-negative and reflect per-row
        headcount contribution, and for every group attrition_count must be less than
        or equal to headcount. Additionally, headcount should be greater than zero
        for groups where attrition_rate is expected to be computed (to avoid division-by-zero
        or meaningless rates).'
      sources:
      - start_line: 69
        end_line: 75
        file: ''
      uid: c34ceb2f-b8a8-4d9c-bcc3-8eb2be6867cf
    - text: Attrition should contain only the expected tokens used by logic ('Yes'
        and 'No'). The code uses (Attrition == 'Yes') to count attrition and np.where(Attrition
        == 'No', ...) to select active compensation, so any other values will be treated
        as neither and lead to incorrect active_quarterly_comp or attrition_count.
      sources:
