    assumptions:
    - text: 'EmpID and EmployeeNumber have a one-to-one correspondence: each EmpID
        corresponds to exactly one EmployeeNumber and each EmployeeNumber corresponds
        to exactly one EmpID. The code sets EmpID as the stable index (drop=False)
        and also coerces EmployeeNumber to numeric, so downstream logic expects a
        consistent 1:1 mapping between these two identifiers (no duplicate EmpID ->
        multiple EmployeeNumber or duplicate EmployeeNumber -> multiple EmpID).'
