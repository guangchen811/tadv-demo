      uid: 232c06df-2381-4fad-a557-4661386b0a29
    - text: 'Computing adjusted and total compensation requires MonthlyIncome and
        PercentSalaryHike to be numeric and present (so adj_income, monthly_comp_w_overheads
        and quarterly_comp are defined). Therefore, for rows participating in the
        compensation calculation these columns (or their derived forms) must be finite
        and non-null: MonthlyIncome, PercentSalaryHike, adj_income, benefits_rate,
        travel_premium, overtime_premium, slab_premium, joblevel_adj, manager_adj,
        fte. Actionable checks: .isComplete([''MonthlyIncome'',''PercentSalaryHike'',''adj_income'',''monthly_comp_w_overheads'',''quarterly_comp''])
        and .isFinite([''adj_income'',''monthly_comp_w_overheads'']).'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 50
        end_line: 64
        file: ''
      uid: 4974b6fc-0067-4354-b996-c4c92cd18ff6
    - text: 'The aggregation uses EmployeeCount as headcount. To ensure headcount
        reflects the number of employees and that attrition_rate = attrition_count
        / headcount is meaningful, EmployeeCount should be positive and attrition_count
        must be <= headcount within each (Department, JobRole) group; additionally
        headcount should be > 0 for groups where attrition_rate is computed (to avoid
        division by zero). Actionable checks: group-wise constraints such as for every
        (Department,JobRole): sum(EmployeeCount) > 0 and sum((Attrition==''Yes''))
        <= sum(EmployeeCount).'
      sources:
      - start_line: 69
        end_line: 75
        file: ''
      uid: 3b8c852c-63b7-404f-8d4f-3ba9420dd91b
    - text: 'The code sets EmpID as an index and then aggregates EmployeeCount to
        compute headcount. This implies a 1:1 relationship between EmpID and rows
        and that EmployeeCount is effectively a per-employee count (typically 1).
        Assumption: each EmpID is unique (one row per employee) and EmployeeCount
        equals 1 for each EmpID, so summing EmployeeCount equals the number of distinct
        EmpID. Actionable checks: .isUnique([''EmpID'']) and .hasValueDistribution({''EmployeeCount'':
        lambda s: all(s==1)}) or assert per-row EmployeeCount == 1.'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 69
        end_line: 71
        file: ''
      uid: 6100e0a9-fd0d-487d-8d25-247af2b37182
    - text: 'active_quarterly_comp is derived by selecting quarterly_comp only for
        rows with Attrition == ''No'' and zero otherwise. This implies Attrition must
        be restricted to the expected categories (''Yes''/''No'') and quarterly_comp
        must be non-null for rows with Attrition == ''No''. Actionable checks: .isContainedIn(''Attrition'',[''Yes'',''No''])
        and .where(col(''Attrition'') == ''No'').isComplete([''quarterly_comp''])
        or .satisfies('' (Attrition = "No" AND active_quarterly_comp = quarterly_comp)
        OR (Attrition <> "No" AND active_quarterly_comp = 0.0) '').'
      sources:
      - start_line: 66
        end_line: 67
        file: ''
      uid: 19d2856f-5fe7-4d77-9888-eb4cda261395
