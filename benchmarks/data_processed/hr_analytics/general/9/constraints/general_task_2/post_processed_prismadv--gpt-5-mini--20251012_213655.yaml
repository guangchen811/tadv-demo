        THEN 1 ELSE 0 END", "YearsAtCompany_parseable_as_number", lambda x: x == 1)'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 1a62edfc-5e7f-4f97-b467-a34704e6c46b
    - text: 'The ''YearsAtCompany'' column should be complete (no nulls) in the input.
        The dataset metadata indicates completeness 1.0 and the script does not fill
        or handle missing YearsAtCompany after coercion, so missing or coerced-to-NaN
        values would violate expectations. Example check: .satisfies("CASE WHEN `YearsAtCompany`
        IS NOT NULL THEN 1 ELSE 0 END", "YearsAtCompany_not_null", lambda x: x ==
        1)'
      sources:
      - start_line: 17
        end_line: 27
        file: ''
      uid: 82f23748-6c81-499e-bd14-5af0dc839704
    - text: 'Values in ''YearsAtCompany'' should be non-negative whole numbers (>=
