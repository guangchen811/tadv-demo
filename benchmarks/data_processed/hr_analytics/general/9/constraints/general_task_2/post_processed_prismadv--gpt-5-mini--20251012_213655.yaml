  Attrition:
    code:
    - suggestion: '.isContainedIn(''Attrition'', [''Yes'', ''No''], lambda x: x ==
        1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 88a6330c-b297-4168-a449-23a9f5c7757c
      source_assumptions:
      - 64dc8393-880a-4e0c-a44b-23c2a344b336
      - 67ed7a41-12a5-4df9-a88e-47ff1617dcb9
    - suggestion: '.hasNumberOfDistinctValues(''Attrition'', lambda x: x == 2, None,
        100)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: dea8fe8a-c1bc-4457-bc94-e8374d15a9e2
      source_assumptions:
      - de99b030-48a1-454d-a1a5-fa46a14f323b
    assumptions:
    - text: 'The ''Attrition'' column must contain no missing values (completeness
        = 100%). The code performs direct comparisons (df[''Attrition''] == ''No''
        and counts of ''Yes'') without filling or handling nulls, so nulls would change
        behavior or cause incorrect budgeting/aggregation. Example check (Deequ):
        .hasCompleteness("Attrition", lambda x: x == 1)'
      sources:
      - start_line: 66
        end_line: 66
        file: ''
      - start_line: 70
        end_line: 72
        file: ''
      uid: 44248c94-b4b1-4666-9487-0cb9dc3e080c
    - text: 'The ''Attrition'' column must contain only the exact, case-sensitive
        categories ''Yes'' and ''No'' (no other values). The code treats ''Yes'' as
        attrited and ''No'' as active; any other token will be ignored by these comparisons
        and lead to misclassification. Example check (Deequ): .satisfies("CASE WHEN
        Attrition IN (''Yes'',''No'') THEN 1 ELSE 0 END", "Attrition in allowed set",
        lambda x: x == 1)'
      sources:
      - start_line: 66
        end_line: 66
        file: ''
      - start_line: 70
        end_line: 72
        file: ''
      uid: 64dc8393-880a-4e0c-a44b-23c2a344b336
    - text: 'Values in ''Attrition'' should not contain leading/trailing whitespace
        or alternate casing (e.g., '' Yes '', ''yes'', or ''YES'' are invalid). The
        code relies on exact string equality, so inputs should match ''^Yes$'' or
        ''^No$''. Example check (Great Expectations): expect_column_values_to_match_regex(column=''Attrition'',
        regex=''^(Yes|No)$'').'
      sources:
      - start_line: 66
        end_line: 66
        file: ''
      - start_line: 70
        end_line: 72
        file: ''
      uid: 67ed7a41-12a5-4df9-a88e-47ff1617dcb9
    - text: 'Semantics: ''No'' must represent an active (currently employed) person
        and ''Yes'' must represent an employee who has left (attrited). The code uses
        ''No'' to include quarterly compensation in the active budget and counts ''Yes''
        as attrition. Validation should ensure the business meaning aligns with these
        labels.'
      sources:
      - start_line: 66
        end_line: 66
        file: ''
      - start_line: 70
        end_line: 73
        file: ''
      uid: de99b030-48a1-454d-a1a5-fa46a14f323b
  '["Age","AgeGroup"]':
    code: []
    assumptions:
    - text: 'Age must be consistent with AgeGroup. For each row the numeric Age should
        fall into the interval implied by AgeGroup values: ''18-25'' -> 18 <= Age
        <= 25; ''26-35'' -> 26 <= Age <= 35; ''36-45'' -> 36 <= Age <= 45; ''46-55''
        -> 46 <= Age <= 55; ''55+'' -> Age >= 55. Actionable (Deequ-style) constraints:
        create one satisfies() check per bucket, e.g. .satisfies(''Age >= 18 AND Age
        <= 25'', ''AgeGroup == "18-25"''), etc.'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 32
        end_line: 33
        file: ''
      uid: 0c1d4d9e-e219-464b-ae1c-21fd715b35e3
    - text: 'AgeGroup must be one of the expected categories and must map to a numeric
        benefits_rate for every row. Concretely AgeGroup must be in {''18-25'',''26-35'',''36-45'',''46-55'',''55+''}
        so that df[''benefits_rate''] = df[''AgeGroup''].map(...) produces non-null,
        finite values. Actionable checks: .isContainedIn(''AgeGroup'', [...]) and/or
        .hasCompleteness(''benefits_rate'', 1.0).'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 52
        end_line: 61
        file: ''
      uid: eabeefed-63b8-423a-b1b0-781419d9a754
    - text: 'active_quarterly_comp must reflect the Attrition flag: if Attrition ==
        ''Yes'' then active_quarterly_comp == 0.0; if Attrition == ''No'' then active_quarterly_comp
        == quarterly_comp. Actionable constraint: .satisfies("(Attrition == ''Yes''
        AND active_quarterly_comp == 0.0) OR (Attrition == ''No'' AND active_quarterly_comp
        == quarterly_comp)").'
      sources:
      - start_line: 64
        end_line: 67
        file: ''
      uid: 659a599a-0b33-45e4-992e-ab0d585e7d8b
    - text: 'Group-level aggregated metrics must be internally consistent: for each
        (Department, JobRole) group attrition_count (count of Attrition == ''Yes'')
        must be <= headcount (sum of EmployeeCount), and headcount must be > 0 to
        avoid division by zero when computing attrition_rate. Actionable checks: after
        grouping, .satisfies(''attrition_count <= headcount'') and .satisfies(''headcount
        > 0'').'
      sources:
      - start_line: 70
        end_line: 75
        file: ''
      uid: 53626c2b-a9d1-4a50-8e7f-7d589d1e220c
    - text: 'fte is computed as StandardHours / 80.0, so StandardHours must be numeric
        and in a sensible range such that fte is finite and (typically) between 0
        and 1. Actionable constraints: ensure StandardHours is numeric (.isNumeric
        on StandardHours), no nulls, and .satisfies(''fte >= 0.0 AND fte <= 1.0'').'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: 4172302a-927b-4574-8e88-f0c3ef6b889e
  '["Age","TotalWorkingYears","YearsAtCompany","YearsInCurrentRole","YearsSinceLastPromotion","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'TotalWorkingYears should be greater than or equal to YearsAtCompany for
        every record (an employee''s total working years across all employers should
        not be less than the time spent at this company). Actionable check (Deequ-style):
        .satisfies("TotalWorkingYears >= YearsAtCompany", "total_ge_atcompany").'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      uid: f9bfb712-4688-482a-b27c-9c10a2dbbe60
    - text: 'YearsAtCompany should be greater than or equal to YearsInCurrentRole
        (time in current role cannot exceed total time at company). Actionable check:
        .satisfies("YearsAtCompany >= YearsInCurrentRole", "atcompany_ge_incurrentrole").'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      uid: de173805-b5c6-4f6f-8e2c-3df0083652c9
    - text: 'YearsAtCompany should be greater than or equal to YearsWithCurrManager
        (tenure with current manager cannot exceed tenure at the company). Actionable
        check: .satisfies("YearsAtCompany >= YearsWithCurrManager", "atcompany_ge_withmgr").'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: 3b09db0a-2594-48ae-b47f-99d591167029
    - text: 'YearsSinceLastPromotion should be less than or equal to both YearsAtCompany
        and TotalWorkingYears (time since last promotion cannot exceed total employment
        time at the company or in the workforce). Actionable check: .satisfies("YearsSinceLastPromotion
        <= YearsAtCompany AND YearsSinceLastPromotion <= TotalWorkingYears", "yrs_since_promo_le_tenures").'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      uid: 170aa95a-78d8-47de-98e4-8a16bbc88238
    - text: 'TotalWorkingYears should be plausibly bounded by age: TotalWorkingYears
        <= Age - 18 (assumes minimum working age of 18). Actionable check: .satisfies("TotalWorkingYears
        <= Age - 18", "total_vs_age_plausibility").'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      uid: 9be56a4c-5485-4e0c-beff-6e519cd602bc
  ? '["AgeGroup","BusinessTravel","JobLevel","MonthlyIncome","OverTime","PercentSalaryHike","SalarySlab","StandardHours","YearsWithCurrManager","active_quarterly_comp","adj_income","benefits_rate","fte","joblevel_adj","manager_adj","monthly_comp_w_overheads","overtime_premium","quarterly_comp","slab_premium","travel_premium"]'
  : code: []
    assumptions:
    - text: 'MonthlyIncome and PercentSalaryHike must be present and numeric (no nulls)
        and represent non-negative values so that adj_income = MonthlyIncome * (1
        + PercentSalaryHike/100) yields valid non-null, non-negative results. Example
        constraints: .isComplete(["MonthlyIncome","PercentSalaryHike"]) and .satisfies("MonthlyIncome
        >= 0", "monthly_income_non_negative") and .satisfies("PercentSalaryHike >=
        0", "percent_hike_non_negative").'
      sources:
      - start_line: 19
        end_line: 27
        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      uid: 2b719854-711c-4eef-b4c3-10b8420b073a
    - text: "All categorical columns used to derive premiums (AgeGroup, BusinessTravel,\
        \ OverTime, SalarySlab) must contain only the known mapping keys so that the\
        \ mapped premium columns (benefits_rate, travel_premium, overtime_premium,\
        \ slab_premium) are non-null. Concretely: AgeGroup \u2208 {\"18-25\",\"26-35\"\
        ,\"36-45\",\"46-55\",\"55+\"}, BusinessTravel \u2208 {\"Non-Travel\",\"Travel_Rarely\"\
        ,\"Travel_Frequently\"}, OverTime \u2208 {\"Yes\",\"No\"}, SalarySlab \u2208\
        \ {\"Upto 5k\",\"5k-10k\",\"10k-15k\",\"15k+\"}. Example constraints: .isContainedIn(\"\
        AgeGroup\", [...]) and similarly for the others, or .isComplete([\"benefits_rate\"\
        ,\"travel_premium\",\"overtime_premium\",\"slab_premium\"])."
      sources:
      - start_line: 30
        end_line: 36
        file: ''
      - start_line: 38
        end_line: 42
        file: ''
      - start_line: 32
        end_line: 36
        file: ''
      uid: 30e4c52e-ae08-4e05-b76e-33773c1b51db
    - text: 'For active employees (Attrition == ''No''), all components used to compute
        monthly_comp_w_overheads must be non-null: adj_income, benefits_rate, travel_premium,
        overtime_premium, slab_premium, joblevel_adj, manager_adj, and fte. This ensures
        monthly_comp_w_overheads = adj_income * (1 + sum(premiums) ) * fte is defined
        for active employees. Example conditional constraint: for rows where Attrition
        == ''No'', .isComplete([...list of columns...]).'
      sources:
      - start_line: 50
        end_line: 61
        file: ''
      - start_line: 66
        end_line: 67
        file: ''
      uid: e4771f41-be64-4b47-9e46-962a1d6a88ee
    - text: 'active_quarterly_comp must be consistent with Attrition and quarterly_comp:
        active_quarterly_comp == quarterly_comp when Attrition == ''No'', and active_quarterly_comp
        == 0.0 when Attrition != ''No''. Example constraint: .satisfies("(Attrition
        == ''No'' and active_quarterly_comp == quarterly_comp) or (Attrition != ''No''
        and active_quarterly_comp == 0.0)", "active_quarterly_comp_consistency").'
      sources:
      - start_line: 64
        end_line: 67
        file: ''
      uid: cff8cb42-c430-48a8-988a-95aa38232480
    - text: 'Per (Department, JobRole) group, attrition_count must be less than or
        equal to headcount and headcount must be > 0 to allow computing attrition_rate
        = attrition_count / headcount without division-by-zero or illogical rates.
        Example constraints on the grouped results: .satisfies("attrition_count <=
        headcount", "attrition_le_headcount") and .satisfies("headcount > 0", "headcount_positive").'
      sources:
      - start_line: 69
        end_line: 75
        file: ''
      uid: db47ee9f-afca-445f-ba3d-869f39d05105
    - text: 'StandardHours should equal 80 for all rows (so fte = StandardHours /
        80.0 yields fte == 1.0). If StandardHours can vary, then fte must be > 0.
        Example constraints: .satisfies("StandardHours == 80 and fte == 1.0", "standard_hours_80_implies_fte_1")
        or more generally .satisfies("fte > 0", "fte_positive").'
      sources:
      - start_line: 48
        end_line: 48
        file: ''
      uid: bb23841e-5ebd-411d-b555-65d4be3dd327
  '["AgeGroup","benefits_rate"]':
    code: []
    assumptions:
    - text: 'The ''benefits_rate'' column is a deterministic function of ''AgeGroup''
        using the mapping {''18-25'': 0.25, ''26-35'': 0.28, ''36-45'': 0.30, ''46-55'':
        0.33, ''55+'': 0.35}. In other words, for every row benefits_rate must equal
        the mapped value for that row''s AgeGroup. This can be enforced with a multi-column
        constraint such as a Deequ satisfies check: .satisfies("benefits_rate = CASE
        WHEN AgeGroup = ''18-25'' THEN 0.25 WHEN AgeGroup = ''26-35'' THEN 0.28 WHEN
        AgeGroup = ''36-45'' THEN 0.30 WHEN AgeGroup = ''46-55'' THEN 0.33 WHEN AgeGroup
        = ''55+'' THEN 0.35 ELSE NULL END", ''benefits_rate_matches_agegroup'').'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      uid: b84a7b2c-eda3-42fb-8f53-f58360cd3ed7
    - text: 'The ''AgeGroup'' values must be one of the five exact category strings
        used by the mapping: ''18-25'', ''26-35'', ''36-45'', ''46-55'', ''55+''.
        The code relies on exact string matches (no extra whitespace or case differences),
        so AgeGroup should be contained in this set and is expected to be complete.
        This can be encoded as Deequ constraints like: .isContainedIn(''AgeGroup'',
        [''18-25'',''26-35'',''36-45'',''46-55'',''55+'']) and .hasCompleteness(''AgeGroup'',
        1.0).'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      uid: c18b36bd-a23d-47b2-811c-6ff4cd6d284e
    - text: 'Whenever compensation calculations are performed (i.e., adj_income and
        monthly_comp_w_overheads are computed), the ''benefits_rate'' must be non-null
        and finite for rows that have a valid ''MonthlyIncome'' (and thus a computed
        ''adj_income''), otherwise the downstream arithmetic will produce NaN. A practical
        constraint: for all rows where MonthlyIncome IS NOT NULL (and PercentSalaryHike
        IS NOT NULL), benefits_rate IS NOT NULL and is between 0.0 and 1.0. Example
        Deequ-style checks: .satisfies("NOT (MonthlyIncome IS NOT NULL AND (benefits_rate
