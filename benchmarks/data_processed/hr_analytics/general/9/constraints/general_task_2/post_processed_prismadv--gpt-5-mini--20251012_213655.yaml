        end_line: 75
        file: ''
      uid: 282d4ac5-2c35-453c-a4ee-7f8124d80ec5
    - text: 'Because joblevel_adj is computed as 0.005 * (JobLevel - 1) and then used
        in the compensation multiplier, ''JobLevel'' must be numeric and within the
        expected ordinal range (e.g., the dataset indicates values 1..5). Actionable
        checks: require JobLevel to be non-null, integer-like, and in the allowed
