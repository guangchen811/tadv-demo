    - text: 'All component columns used to compute monthly_comp_w_overheads must be
        numeric and present (no nulls) for rows where a meaningful compensation is
        expected. Specifically: MonthlyIncome, PercentSalaryHike, benefits_rate, travel_premium,
        overtime_premium, slab_premium, joblevel_adj, manager_adj, and StandardHours
