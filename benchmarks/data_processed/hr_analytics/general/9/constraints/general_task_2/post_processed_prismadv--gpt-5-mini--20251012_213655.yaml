      uid: 66a2a373-f0a9-43d7-8bcc-d633673a4bc2
    - text: 'The categorical-to-premium mappings must succeed for rows used in compensation:
        ''AgeGroup'' -> benefits_rate, ''BusinessTravel'' -> travel_premium (after
        the replacement), ''OverTime'' -> overtime_premium, and ''SalarySlab'' ->
        slab_premium. Concretely, for rows that will be used to compute monthly_comp_w_overheads
        these original categorical columns must contain only expected keys so that
        the mapped premium columns are not null. Actionable checks: assert that benefits_rate,
        travel_premium, overtime_premium and slab_premium are non-null OR assert that
        AgeGroup, BusinessTravel, OverTime, SalarySlab belong to the allowed value
        sets used in the maps.'
      sources:
      - start_line: 32
        end_line: 42
        file: ''
      - start_line: 52
        end_line: 62
        file: ''
      - start_line: 30
        end_line: 31
        file: ''
      uid: 6eb4d2ed-fc8a-4895-8572-e2ec0d62d860
    - text: 'active_quarterly_comp is set to quarterly_comp for active employees and
        0.0 for attrited employees. Therefore ''Attrition'' must be one of the expected
        values (e.g., ''Yes'' or ''No'') and the relation must hold: when Attrition
        == ''Yes'' then active_quarterly_comp == 0.0; when Attrition == ''No'' then
        active_quarterly_comp == quarterly_comp. Actionable checks: assert Attrition
        in {''Yes'',''No''} and assert the conditional equality between Attrition,
        quarterly_comp and active_quarterly_comp.'
      sources:
      - start_line: 64
        end_line: 67
        file: ''
      uid: 36eb0e4c-2b85-4a0e-a34a-3ccb664a3a6b
    - text: 'Group-level aggregates are computed by grouping on [''Department'',''JobRole'']
        and then summing ''EmployeeCount'' and ''active_quarterly_comp'' and counting
        attritions. For these downstream calculations to be sensible: the grouping
        keys ''Department'' and ''JobRole'' should be non-null; per-group headcount
        (sum of EmployeeCount) must be > 0 to avoid division by zero when computing
        attrition_rate; and per-group attrition_count must be between 0 and headcount.
        Also quarterly_budget (sum of active_quarterly_comp) should be >= 0. Actionable
        checks: assert non-nullness of Department and JobRole, assert headcount >
        0 for every group, assert 0 <= attrition_count <= headcount, and assert quarterly_budget
        >= 0.'
