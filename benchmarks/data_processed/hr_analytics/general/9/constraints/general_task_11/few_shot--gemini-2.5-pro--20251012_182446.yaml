constraints:
  BusinessTravel:
    code:
    - - .isContainedIn('BusinessTravel', ['Travel_Rarely', 'Travel_Frequently', 'Non-Travel',
        'TravelRarely'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isUnique('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isContainedIn('JobLevel', ['1', '2', '3', '4', '5'])
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', ['3', '4'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    assumptions: []
