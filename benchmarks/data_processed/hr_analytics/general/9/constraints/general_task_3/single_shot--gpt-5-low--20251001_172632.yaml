constraints:
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['Non-Travel', 'Travel_Rarely', 'Travel_Frequently',
        'TravelRarely'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  Education:
    code:
    - - '.hasMax(''Education'', lambda v: v <= 5)'
      - Valid
    - - '.hasMin(''Education'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - '.hasMax(''EmployeeCount'', lambda v: v == 1)'
      - Valid
    - - '.hasMin(''EmployeeCount'', lambda v: v == 1)'
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - '.hasMax(''EnvironmentSatisfaction'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''EnvironmentSatisfaction'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  JobInvolvement:
    code:
    - - '.hasMax(''JobInvolvement'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''JobInvolvement'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - '.hasMax(''JobLevel'', lambda v: v <= 5)'
      - Valid
    - - '.hasMin(''JobLevel'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('JobLevel')
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - '.hasMax(''JobSatisfaction'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''JobSatisfaction'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - '.hasMax(''PercentSalaryHike'', lambda v: v <= 100)'
      - Valid
    - - .isComplete('PercentSalaryHike')
      - Valid
    - - .isNonNegative('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  RelationshipSatisfaction:
    code:
    - - '.hasMax(''RelationshipSatisfaction'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''RelationshipSatisfaction'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - '.hasMax(''StandardHours'', lambda v: v == 80)'
      - Valid
    - - '.hasMin(''StandardHours'', lambda v: v == 80)'
      - Valid
    assumptions: []
  StockOptionLevel:
    code:
    - - '.hasMax(''StockOptionLevel'', lambda v: v <= 3)'
      - Valid
    - - '.hasMin(''StockOptionLevel'', lambda v: v >= 0)'
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  TrainingTimesLastYear:
    code:
    - - '.hasMax(''TrainingTimesLastYear'', lambda v: v <= 6)'
      - Valid
    - - '.hasMin(''TrainingTimesLastYear'', lambda v: v >= 0)'
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - '.hasMax(''WorkLifeBalance'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''WorkLifeBalance'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsInCurrentRole_vs_YearsAtCompany:
    code:
    - - '.satisfies(''YearsInCurrentRole <= YearsAtCompany'', ''yicr_le_yac'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
