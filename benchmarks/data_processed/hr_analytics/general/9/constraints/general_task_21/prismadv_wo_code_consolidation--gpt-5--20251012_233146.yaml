        end_line: 32
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: 22829252-c8e6-4d74-a0e9-4cc3b513a14a
    - text: 'Boundary consistency: because the bins are right-closed, incomes exactly
        at thresholds must map to the upper bracket: MonthlyIncome = 5000 -> ''Upto
        5k'', 10000 -> ''5k-10k'', 15000 -> ''10k-15k''. Deequ compliance example:
        .hasCompliance("salary_slab_boundaries", "(MonthlyIncome != 5000 or SalarySlab
        = ''Upto 5k'') and (MonthlyIncome != 10000 or SalarySlab = ''5k-10k'') and
        (MonthlyIncome != 15000 or SalarySlab = ''10k-15k'')", _ >= 1.0)'
