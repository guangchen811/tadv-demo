    - suggestion: '.hasNumberOfDistinctValues(''OverTime'', lambda v: v == 2)'
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''OverTime'',
        lambda v: v == 2)'': Check.hasNumberOfDistinctValues() missing 2 required
