    assumptions:
    - text: 'YearsAtCompany must be present and numeric for every row (no nulls or
        non-parsable values). The script coerces non-numeric values to NaN and never
        imputes them; NaNs would propagate into the risk score and cause the later
        rank .astype(int) to fail. Possible rules: Deequ completeness(''YearsAtCompany'')
        == 1.0 and a satisfies/try_cast check to ensure all values are numeric; Great
        Expectations expect_column_values_to_not_be_null(''YearsAtCompany'') and expect_column_values_to_be_in_type_list([''int64'',''float64'']).'
