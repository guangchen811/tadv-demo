  '["Age","AgeGroup"]':
    code: []
    assumptions:
    - text: 'AgeGroup must be fully determined by Age using the defined bins: ''55+''
        if Age >= 55, ''46-55'' if 46 <= Age < 55, ''36-45'' if 36 <= Age < 46, ''26-35''
        if 26 <= Age < 36, else ''18-25''. Deequ-style compliance: Compliance(''age_agegroup_consistent'',
        "AgeGroup = CASE WHEN Age >= 55 THEN ''55+'' WHEN Age >= 46 THEN ''46-55''
        WHEN Age >= 36 THEN ''36-45'' WHEN Age >= 26 THEN ''26-35'' ELSE ''18-25''
        END")'
