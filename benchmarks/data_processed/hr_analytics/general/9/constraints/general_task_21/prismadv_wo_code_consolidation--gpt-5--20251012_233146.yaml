      source_assumptions:
      - 6500ef90-27df-493a-8f29-d951dc6a8767
    - suggestion: '.isLessThanOrEqualTo(columnA=''YearsInCurrentRole'', columnB=''YearsAtCompany'',
        assertion=lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 37b5b7ed-b558-4e42-9306-b0d630ec4b8b
      source_assumptions:
