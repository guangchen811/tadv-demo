    assumptions:
    - text: 'OverTime must be non-null for all rows. The code groups by OverTime and
        later compares values to ''Yes''; missing values would be dropped from the
        groupby and then fall into the ''else'' branch, distorting ot_effect and downstream
        metrics. This can be validated with Deequ: hasCompleteness(''OverTime'', lambda
        v: v == 1.0), or Great Expectations: expect_column_values_to_not_be_null(''OverTime'').'
      sources:
      - start_line: 84
        end_line: 86
        file: ''
      - start_line: 91
        end_line: 91
        file: ''
      uid: 41baf12d-c9e8-4c85-82cd-f4d8cc98b6e0
    - text: 'OverTime values must be restricted to the exact, case-sensitive set {''Yes'',''No''}
        (no alternative encodings like ''Y''/''N'', 1/0, True/False, or extra whitespace).
        The code only computes rates for ''Yes'' and ''No'' and branches on OverTime
        == ''Yes''; any other token is treated as ''No'' and may cause invalid rates.
        Validate with Deequ: isContainedIn(''OverTime'', [''Yes'',''No'']); Great
        Expectations: expect_column_values_to_be_in_set(''OverTime'', [''Yes'',''No'']).'
      sources:
      - start_line: 84
        end_line: 86
        file: ''
      - start_line: 91
        end_line: 91
        file: ''
      uid: e4f9d9f5-1ff6-4974-86d6-00f488ee0e50
    - text: 'Both categories ''Yes'' and ''No'' must be present (at least one row
        each) so that rate_yes and rate_no are numeric (not NaN), ensuring ot_effect
        and the exported metrics are valid. This can be validated with Deequ using
        two satisfies checks: proportion of rows where OverTime = ''Yes'' > 0 and
        proportion where OverTime = ''No'' > 0; or enforce exactly two distinct values
        with hasNumberOfDistinctValues(''OverTime'', lambda v: v == 2). In Great Expectations,
        use expect_column_unique_value_count_to_be_between(''OverTime'', min_value=2,
        max_value=2).'
