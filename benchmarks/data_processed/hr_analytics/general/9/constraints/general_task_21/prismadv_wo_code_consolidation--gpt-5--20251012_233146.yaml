        ''46-55'', or ''55+''. At least 95% of non-null values should be in this set;
        other values are unexpected. Example Deequ rule: .satisfies("CASE WHEN `AgeGroup`
        IS NULL OR `AgeGroup` IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'')
        THEN 1 ELSE 0 END", "Valid AgeGroup values", lambda x: x >= 0.95)'
      sources:
      - start_line: 13
        end_line: 26
        file: ''
      - start_line: 57
        end_line: 57
        file: ''
      - start_line: 87
        end_line: 87
        file: ''
      uid: bd7c521c-089e-476e-968a-c83ececcf606
    - text: 'The ''AgeGroup'' column may contain nulls; the pipeline explicitly handles
        null or unmapped age groups by falling back to the overall base attrition
        rate. However, to retain meaningful age-segment effects, ''AgeGroup'' should
        be present for the vast majority of records (e.g., completeness >= 0.95).
        Example Deequ rule: .hasCompleteness("AgeGroup", lambda x: x >= 0.95)'
      sources:
      - start_line: 57
        end_line: 57
        file: ''
      - start_line: 87
        end_line: 87
        file: ''
      uid: 9a6336c7-46f1-45dd-9b81-750bf66130db
    - text: 'For rows where ''Age'' is not null, ''AgeGroup'' should be consistent
        with ''Age'' according to the same binning logic used in the code. That is,
        AgeGroup must equal: ''55+'' if int(Age) >= 55; ''46-55'' if >= 46; ''36-45''
        if >= 36; ''26-35'' if >= 26; otherwise ''18-25''. Example Deequ rule: .satisfies("CASE
        WHEN `Age` IS NULL OR `AgeGroup` = CASE WHEN CAST(`Age` AS INT) >= 55 THEN
        ''55+'' WHEN CAST(`Age` AS INT) >= 46 THEN ''46-55'' WHEN CAST(`Age` AS INT)
        >= 36 THEN ''36-45'' WHEN CAST(`Age` AS INT) >= 26 THEN ''26-35'' ELSE ''18-25''
        END THEN 1 ELSE 0 END", "AgeGroup consistent with Age", lambda x: x >= 0.95)'
      sources:
