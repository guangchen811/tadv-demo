        end_line: 26
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      uid: d5e52165-3bb7-4fce-ac8c-3c835c0a31c2
    - text: 'The ''AgeGroup'' column should have low cardinality consistent with the
        defined bins; the number of distinct non-null categories should be at most
        5. Example Deequ rule: .hasNumberOfDistinctValues("AgeGroup", lambda x: x
        <= 5)'
