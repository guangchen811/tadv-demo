      source_assumptions:
      - d7ba8965-2332-474d-9e07-fd653068ee05
    - suggestion: '.satisfies("CASE WHEN SalarySlab IS NULL OR SalarySlab = TRIM(SalarySlab)
        THEN 1 ELSE 0 END", "Trimmed SalarySlab", lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: de8ffc32-f3f2-4fc3-ab4c-c20138c82aa2
      source_assumptions:
      - 1a7b9116-f3ec-4300-8f82-b3512bb6c04c
    - suggestion: '.satisfies("CASE WHEN MonthlyIncome IS NULL OR MonthlyIncome <=
        0 THEN 1 WHEN MonthlyIncome <= 5000 AND SalarySlab = ''Upto 5k'' THEN 1 WHEN
        MonthlyIncome <= 10000 AND SalarySlab = ''5k-10k'' THEN 1 WHEN MonthlyIncome
        <= 15000 AND SalarySlab = ''10k-15k'' THEN 1 WHEN MonthlyIncome > 15000 AND
        SalarySlab = ''15k+'' THEN 1 ELSE 0 END", "SalarySlab matches income bins",
        lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 2f906c15-3ffd-4823-a399-f5af022e3abd
      source_assumptions:
      - 4824eccc-f7c3-4e3d-859d-87182b75ba25
    assumptions:
    - text: 'The ''SalarySlab'' column must exist and be mostly non-null (e.g., completeness
        >= 0.95). The model aggregates attrition by this column and uses the mapped
        effect; null or unmapped values fall back to the base rate, so some nulls
        are tolerated but should be rare. Example (Deequ): .hasCompleteness(''SalarySlab'',
        _ >= 0.95)'
      sources:
      - start_line: 63
        end_line: 63
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      - start_line: 109
        end_line: 117
        file: ''
      - start_line: 141
        end_line: 141
        file: ''
      uid: 03d7d6c4-e790-4716-bb2d-dd774f82355a
    - text: 'The ''SalarySlab'' values should be from the canonical set: {''Upto 5k'',
        ''5k-10k'', ''10k-15k'', ''15k+''}, with exact spelling/case. This matches
        the slab labels used by the code. Example (Great Expectations): expect_column_values_to_be_in_set(''SalarySlab'',
        [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''], mostly=0.95)'
      sources:
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 63
        end_line: 63
        file: ''
      uid: 8d32e1b3-3bbe-40d2-9a66-7ad6d6178859
    - text: 'The number of distinct non-null ''SalarySlab'' categories should be at
        most 4 (the defined slabs). This guards against category explosion due to
        typos or unexpected values. Example (Deequ): .hasNumberOfDistinctValues(''SalarySlab'',
        _ <= 4, maxApproxError = 0)'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      uid: d7ba8965-2332-474d-9e07-fd653068ee05
    - text: 'Values in ''SalarySlab'' should not contain leading or trailing whitespace
        (exact tokens are required). Example (Deequ): .satisfies("CASE WHEN SalarySlab
        = TRIM(SalarySlab) THEN 1 ELSE 0 END", "Trimmed SalarySlab", _ >= 0.99)'
      sources:
      - start_line: 63
        end_line: 63
        file: ''
      - start_line: 31
        end_line: 31
        file: ''
      uid: 1a7b9116-f3ec-4300-8f82-b3512bb6c04c
    - text: 'Where ''MonthlyIncome'' is present and > 0, ''SalarySlab'' should match
        the binning logic defined in the code: (0, 5000] => ''Upto 5k''; (5000, 10000]
        => ''5k-10k''; (10000, 15000] => ''10k-15k''; (15000, inf) => ''15k+''. Allow
        a small tolerance for mismatches (e.g., >= 0.95 agreement). Example (Deequ):
        .satisfies("CASE WHEN MonthlyIncome IS NULL OR MonthlyIncome <= 0 THEN 1 WHEN
        MonthlyIncome <= 5000 AND SalarySlab = ''Upto 5k'' THEN 1 WHEN MonthlyIncome
        <= 10000 AND SalarySlab = ''5k-10k'' THEN 1 WHEN MonthlyIncome <= 15000 AND
        SalarySlab = ''10k-15k'' THEN 1 WHEN MonthlyIncome > 15000 AND SalarySlab
        = ''15k+'' THEN 1 ELSE 0 END", "SalarySlab matches income bins", _ >= 0.95)'
      sources:
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 59
        end_line: 62
        file: ''
      uid: 4824eccc-f7c3-4e3d-859d-87182b75ba25
  TotalWorkingYears:
    code:
    - suggestion: '.satisfies("CAST(`TotalWorkingYears` AS DOUBLE) IS NOT NULL", "TotalWorkingYears
        numeric and non-null", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: df9d012d-4318-4db8-bda9-01dc50907463
      source_assumptions:
      - ec531160-0674-4c10-875e-279f756bca25
    - suggestion: '.satisfies("CAST(`TotalWorkingYears` AS DOUBLE) IS NOT NULL AND
        ABS(CAST(`TotalWorkingYears` AS DOUBLE)) < 1e308", "TotalWorkingYears is finite",
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 6d0e4b3e-8b26-4cea-a94c-223fd71eff60
      source_assumptions:
      - 3238a956-55c1-4ba9-9c9e-cf2c3912a2e8
    - suggestion: '.satisfies("CAST(`TotalWorkingYears` AS DOUBLE) >= CAST(`YearsAtCompany`
        AS DOUBLE) OR CAST(`YearsAtCompany` AS DOUBLE) IS NULL", "Non-negative experience
        gap (TWW >= YearsAtCompany)", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: e31afeb1-753c-4662-b351-754c5b1bd458
      source_assumptions:
      - 6d9c6fcc-0da9-4f04-8b15-59f65fdbe846
    - suggestion: '.satisfies("CAST(`TotalWorkingYears` AS DOUBLE) >= 0", "TotalWorkingYears
        non-negative", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 58de14bd-6196-47f2-a498-3db9b17814fb
      source_assumptions:
      - 0939a229-dba6-43a3-acda-93b49642578a
    assumptions:
    - text: 'All values in ''TotalWorkingYears'' must be numeric and non-null after
        parsing. The code coerces non-numeric values to NaN (errors=''coerce'') and
        then uses the column in arithmetic without any null handling. This implies
        100% completeness and numeric parseability. Possible validations: Deequ hasCompleteness(''TotalWorkingYears'',
        lambda x: x == 1.0) and satisfies(''CAST(`TotalWorkingYears` AS DOUBLE) IS
        NOT NULL'', ''Numeric parseable'', lambda x: x == 1.0); Great Expectations
        expect_column_values_to_not_be_null and expect_column_values_to_be_of_type
        (e.g., ''int64'' or ''float64'').'
      sources:
      - start_line: 47
        end_line: 50
        file: ''
      - start_line: 65
        end_line: 67
        file: ''
      uid: ec531160-0674-4c10-875e-279f756bca25
    - text: '''TotalWorkingYears'' must be finite (no +/-Inf). Infinite values would
        propagate through subtraction, square root, and the final linear combination,
        leading to invalid or extreme risks. Possible validations: Deequ satisfies(''isfinite(`TotalWorkingYears`)'',
        ''Finite TWW'', lambda x: x == 1.0); Great Expectations expect_column_values_to_be_between
        with reasonable high/low bounds or a custom expectation ensuring finiteness.'
      sources:
      - start_line: 65
        end_line: 67
        file: ''
      - start_line: 116
        end_line: 116
        file: ''
      uid: 3238a956-55c1-4ba9-9c9e-cf2c3912a2e8
    - text: 'For every row where ''YearsAtCompany'' is present, ''TotalWorkingYears''
        must be greater than or equal to ''YearsAtCompany''. The script computes sqrt(TotalWorkingYears
        - YearsAtCompany) without guarding against negatives, so the gap must be non-negative.
        Possible validations: Deequ satisfies(''`TotalWorkingYears` >= `YearsAtCompany`
        OR `YearsAtCompany` IS NULL'', ''Non-negative experience gap'', lambda x:
        x == 1.0); Great Expectations expect_column_pair_values_A_to_be_greater_than_B
        with allow_equal=True (and ignoring rows where B is null).'
      sources:
      - start_line: 65
        end_line: 67
        file: ''
      uid: 6d9c6fcc-0da9-4f04-8b15-59f65fdbe846
    - text: '''TotalWorkingYears'' should be non-negative for all rows (years cannot
        be negative). While the code does not explicitly check this, negative values
        could still interact poorly with other tenure fields and indicate bad data.
        Possible validations: Deequ satisfies(''`TotalWorkingYears` >= 0'', ''Non-negative
        TotalWorkingYears'', lambda x: x == 1.0) or isNonNegative(''TotalWorkingYears'');
        Great Expectations expect_column_values_to_be_between(min_value=0, strict_min=False).'
      sources:
      - start_line: 65
        end_line: 67
        file: ''
      uid: 0939a229-dba6-43a3-acda-93b49642578a
  '["TotalWorkingYears","YearsAtCompany","YearsInCurrentRole"]':
    code:
    - suggestion: '.haveCompleteness(columns=[''TotalWorkingYears'', ''YearsAtCompany'',
        ''YearsInCurrentRole''], assertion=lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
