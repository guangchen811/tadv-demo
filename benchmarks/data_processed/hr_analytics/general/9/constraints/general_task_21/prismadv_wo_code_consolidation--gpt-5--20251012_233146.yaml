    assumptions:
    - text: 'Tenure fields must be hierarchically consistent for every record: YearsInCurrentRole
        <= YearsAtCompany AND YearsAtCompany <= TotalWorkingYears. This ensures the
        computed gaps (TotalWorkingYears - YearsAtCompany) and (YearsAtCompany - YearsInCurrentRole)
        are non-negative so that subsequent square roots are defined and do not produce
        NaNs. We could represent this as a Deequ constraint: .satisfies(''YearsInCurrentRole
        <= YearsAtCompany AND YearsAtCompany <= TotalWorkingYears'', ''tenure_chain_valid'')'
      sources:
      - start_line: 65
        end_line: 68
        file: ''
      - start_line: 99
        end_line: 101
        file: ''
      uid: aeacf27a-bb8a-4632-95cb-631239b5bf93
    - text: 'Age and AgeGroup must be consistent: for rows with non-null Age, AgeGroup
        should equal the bucketization defined by the code: CASE WHEN Age >= 55 THEN
        ''55+'' WHEN Age >= 46 THEN ''46-55'' WHEN Age >= 36 THEN ''36-45'' WHEN Age
        >= 26 THEN ''26-35'' ELSE ''18-25'' END. A Deequ row-level constraint example:
        .satisfies("(Age IS NULL AND AgeGroup IS NULL) OR (CASE WHEN Age >= 55 THEN
        ''55+'' WHEN Age >= 46 THEN ''46-55'' WHEN Age >= 36 THEN ''36-45'' WHEN Age
        >= 26 THEN ''26-35'' ELSE ''18-25'' END) = AgeGroup", ''agegroup_matches_age'')'
      sources:
      - start_line: 13
        end_line: 26
        file: ''
      - start_line: 56
        end_line: 57
        file: ''
      - start_line: 87
        end_line: 87
        file: ''
      uid: 6500ef90-27df-493a-8f29-d951dc6a8767
    - text: 'MonthlyIncome and SalarySlab must be consistent: SalarySlab must equal
        the slab derived from MonthlyIncome using the bins (0, 5000] -> ''Upto 5k'',
        (5000, 10000] -> ''5k-10k'', (10000, 15000] -> ''10k-15k'', (15000, +inf)
        -> ''15k+''. Example Deequ constraint: .satisfies("CASE WHEN MonthlyIncome
        > 0 AND MonthlyIncome <= 5000 THEN ''Upto 5k'' WHEN MonthlyIncome <= 10000
        THEN ''5k-10k'' WHEN MonthlyIncome <= 15000 THEN ''10k-15k'' WHEN MonthlyIncome
        > 15000 THEN ''15k+'' ELSE NULL END = SalarySlab", ''salary_slab_matches_income'')'
      sources:
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 91ce9cf5-e4b4-4958-9e2d-40621f2b5d68
    - text: 'JobRole and Department must be consistent for the mapped roles. For rows
        where JobRole is one of: [''Research Scientist'', ''Laboratory Technician'',
        ''Research Director'', ''Manufacturing Director''] then Department must be
        ''Research & Development''; for [''Sales Executive'', ''Sales Representative'',
        ''Healthcare Representative''] Department must be ''Sales''. Deequ example:
        .satisfies("(JobRole NOT IN (''Research Scientist'',''Laboratory Technician'',''Research
        Director'',''Manufacturing Director'',''Sales Executive'',''Sales Representative'',''Healthcare
        Representative'')) OR (CASE JobRole WHEN ''Research Scientist'' THEN ''Research
        & Development'' WHEN ''Laboratory Technician'' THEN ''Research & Development''
        WHEN ''Research Director'' THEN ''Research & Development'' WHEN ''Manufacturing
        Director'' THEN ''Research & Development'' WHEN ''Sales Executive'' THEN ''Sales''
        WHEN ''Sales Representative'' THEN ''Sales'' WHEN ''Healthcare Representative''
        THEN ''Sales'' END = Department)", ''dept_matches_role_for_mapped_roles'')'
      sources:
      - start_line: 70
        end_line: 78
        file: ''
      - start_line: 79
        end_line: 81
        file: ''
      - start_line: 88
        end_line: 88
