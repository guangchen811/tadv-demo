    - text: 'Given SalarySlab is populated, MonthlyIncome must be strictly positive
        (MonthlyIncome > 0) so that the slab mapping is defined and log(MonthlyIncome)
        is finite. A Deequ compliance could be: .hasCompliance("positive_income_when_slab_present",
        "(SalarySlab is null) or (MonthlyIncome > 0)", _ >= 1.0). With SalarySlab
        completeness = 1.0, this reduces to MonthlyIncome > 0 for all rows.'
      sources:
