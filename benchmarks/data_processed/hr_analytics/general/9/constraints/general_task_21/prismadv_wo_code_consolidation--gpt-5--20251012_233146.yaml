    - text: 'For rows where JobRole is in the specified mapping, Department must equal
        the mapped department: Research Scientist/Laboratory Technician/Research Director/Manufacturing
        Director -> ''Research & Development''; Sales Executive/Sales Representative/Healthcare
        Representative -> ''Sales''. Deequ-style compliance: Compliance(''jobrole_department_consistent'',
        "NOT(JobRole IN (''Research Scientist'',''Laboratory Technician'',''Research
        Director'',''Manufacturing Director'',''Sales Executive'',''Sales Representative'',''Healthcare
        Representative'')) OR (CASE JobRole WHEN ''Research Scientist'' THEN ''Research
        & Development'' WHEN ''Laboratory Technician'' THEN ''Research & Development''
        WHEN ''Research Director'' THEN ''Research & Development'' WHEN ''Manufacturing
        Director'' THEN ''Research & Development'' WHEN ''Sales Executive'' THEN ''Sales''
        WHEN ''Sales Representative'' THEN ''Sales'' WHEN ''Healthcare Representative''
