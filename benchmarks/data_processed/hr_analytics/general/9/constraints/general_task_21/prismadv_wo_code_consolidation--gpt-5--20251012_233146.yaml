      uid: e3955922-3337-4492-b0ca-bc11248037b1
    - text: 'SalarySlab must be consistent with MonthlyIncome using the same binning/labels
        as compute_salary_slab: (0, 5000] -> ''Upto 5k'', (5000, 10000] -> ''5k-10k'',
        (10000, 15000] -> ''10k-15k'', (15000, +inf] -> ''15k+''. Also, MonthlyIncome
        must be > 0 for all rows. Deequ-style compliance: Compliance(''salary_slab_consistent'',
        "MonthlyIncome > 0 AND SalarySlab = CASE WHEN MonthlyIncome <= 5000 THEN ''Upto
        5k'' WHEN MonthlyIncome <= 10000 THEN ''5k-10k'' WHEN MonthlyIncome <= 15000
        THEN ''10k-15k'' ELSE ''15k+'' END")'
