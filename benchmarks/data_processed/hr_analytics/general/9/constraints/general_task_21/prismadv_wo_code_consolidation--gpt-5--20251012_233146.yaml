    - text: 'TotalWorkingYears must be greater than or equal to YearsAtCompany, and
        YearsAtCompany must be greater than or equal to YearsInCurrentRole (to avoid
        sqrt of negative values). Deequ-style compliance: Compliance(''tenure_hierarchy'',
