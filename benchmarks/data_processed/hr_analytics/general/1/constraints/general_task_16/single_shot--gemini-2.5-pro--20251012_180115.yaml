constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Age_vs_AgeGroup_Consistency:
    code:
    - - .satisfies("CASE WHEN AgeGroup = '18-25' THEN Age >= 18 AND Age <= 25 WHEN
        AgeGroup = '26-35' THEN Age >= 26 AND Age <= 35 WHEN AgeGroup = '36-45' THEN
        Age >= 36 AND Age <= 45 WHEN AgeGroup = '46-55' THEN Age >= 46 AND Age <=
        55 WHEN AgeGroup = '55+' THEN Age >= 55 ELSE FALSE END", 'Age must fall within
        its AgeGroup range')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .hasValue('EmployeeCount', 1)
      - Invalid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isContainedIn('EnvironmentSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isContainedIn('JobSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyIncome_vs_SalarySlab_Consistency:
    code:
    - - .satisfies("CASE WHEN SalarySlab = 'Upto 5k' THEN MonthlyIncome <= 5000 WHEN
        SalarySlab = '5k-10k' THEN MonthlyIncome > 5000 AND MonthlyIncome <= 10000
        WHEN SalarySlab = '10k-15k' THEN MonthlyIncome > 10000 AND MonthlyIncome <=
        15000 WHEN SalarySlab = '15k+' THEN MonthlyIncome > 15000 ELSE FALSE END",
        'MonthlyIncome must fall within its SalarySlab range')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .hasValue('StandardHours', 80)
      - Invalid
    assumptions: []
  Tenure_Logic:
    code:
    - - .satisfies('TotalWorkingYears >= YearsAtCompany', 'TotalWorkingYears_GTE_YearsAtCompany')
      - Valid
    - - .satisfies('YearsAtCompany >= YearsInCurrentRole', 'YearsAtCompany_GTE_YearsInCurrentRole')
      - Valid
    - - .satisfies('YearsAtCompany >= YearsSinceLastPromotion', 'YearsAtCompany_GTE_YearsSinceLastPromotion')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isContainedIn('WorkLifeBalance', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
