constraints:
  Age:
    code:
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Age_vs_AgeGroup:
    code:
    - - '.satisfies("((Age >= 18 AND Age <= 25 AND AgeGroup = ''18-25'') OR (Age >=
        26 AND Age <= 35 AND AgeGroup = ''26-35'') OR (Age >= 36 AND Age <= 45 AND
        AgeGroup = ''36-45'') OR (Age >= 46 AND Age <= 55 AND AgeGroup = ''46-55'')
        OR (Age >= 55 AND AgeGroup = ''55+''))", ''age_matches_agegroup'', lambda
        x: x == 1.0)'
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  Department_JobRole_mapping:
    code:
    - - '.satisfies("((Department = ''Sales'' AND JobRole IN (''Sales Executive'',''Sales
        Representative'')) OR (Department = ''Research & Development'' AND JobRole
        IN (''Research Scientist'',''Laboratory Technician'',''Research Director'',''Manufacturing
        Director'')) OR (Department = ''Human Resources'' AND JobRole IN (''Human
        Resources'')))", ''dept_role_consistency'', lambda x: x == 1.0)'
      - Invalid
    assumptions: []
  EmpID:
    code:
    - - '.hasUniqueness([''EmpID''], lambda x: x == 1.0)'
      - Valid
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - '.hasMax(''EmployeeCount'', lambda x: x == 1.0)'
      - Valid
    - - '.hasMin(''EmployeeCount'', lambda x: x == 1.0)'
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - '.hasUniqueness([''EmployeeNumber''], lambda x: x == 1.0)'
      - Valid
    - - .isComplete('EmployeeNumber')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - '.satisfies(''(EnvironmentSatisfaction >= 1) AND (EnvironmentSatisfaction
        <= 4)'', ''env_satisfaction_1_4'', lambda x: x == 1.0)'
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - '.satisfies(''(JobSatisfaction >= 1) AND (JobSatisfaction <= 4)'', ''job_satisfaction_1_4'',
        lambda x: x == 1.0)'
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isComplete('PercentSalaryHike')
      - Valid
    - - '.satisfies(''(PercentSalaryHike >= 0) AND (PercentSalaryHike <= 100)'', ''percent_hike_0_100'',
        lambda x: x == 1.0)'
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  SalarySlab_vs_MonthlyIncome:
    code:
    - - '.satisfies("((SalarySlab = ''Upto 5k'' AND MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome > 15000))", ''income_within_slab_bounds'',
        lambda x: x == 1.0)'
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - '.hasMax(''StandardHours'', lambda x: x == 80.0)'
      - Valid
    - - '.hasMin(''StandardHours'', lambda x: x == 80.0)'
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - '.satisfies(''(WorkLifeBalance >= 1) AND (WorkLifeBalance <= 4)'', ''wlb_1_4'',
        lambda x: x == 1.0)'
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.90)'
      - Valid
    assumptions: []
