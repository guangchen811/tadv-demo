constraints:
  Age:
    code:
    - - .isPositive('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .hasValue('EmployeeCount', 1)
      - Invalid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isContainedIn('JobSatisfaction', ['1', '2', '3', '4'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .hasValue('StandardHours', 80)
      - Invalid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isContainedIn('WorkLifeBalance', ['1', '2', '3', '4'])
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .satisfies("'YearsInCurrentRole' <= 'YearsAtCompany'", 'YearsInCurrentRole
        cannot be greater than YearsAtCompany')
      - Invalid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95, ''YearsWithCurrManager
        completeness should be at least 95%'')'
      - Valid
    - - .satisfies("'YearsWithCurrManager' <= 'YearsAtCompany'", 'YearsWithCurrManager
        cannot be greater than YearsAtCompany')
      - Invalid
    assumptions: []
