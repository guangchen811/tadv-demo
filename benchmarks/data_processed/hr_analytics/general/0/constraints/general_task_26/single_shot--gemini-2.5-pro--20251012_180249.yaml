constraints:
  Department:
    code:
    - - .isContainedIn('Department', ['Research & Development', 'Sales', 'Human Resources'])
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isUnique('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isContainedIn('JobLevel', ['1', '2', '3', '4', '5'])
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .hasValue('Over18', 'Y')
      - Invalid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', ['3', '4'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .hasValue('StandardHours', 80)
      - Invalid
    assumptions: []
  TotalWorkingYears, YearsAtCompany:
    code:
    - - .satisfies('TotalWorkingYears >= YearsAtCompany', 'TotalWorkingYears_GTE_YearsAtCompany')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsAtCompany, YearsSinceLastPromotion:
    code:
    - - .satisfies('YearsAtCompany >= YearsSinceLastPromotion', 'YearsAtCompany_GTE_YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda completeness: completeness
        >= 0.95)'
      - Valid
    assumptions: []
