    - text: 'For low salary slabs (''Upto 5k'' or ''5k-10k''), compression_pool_share
        must be 0.003, and for other slabs it must be 0.0. Representable as: .satisfies("compression_pool_share
        = case when SalarySlab in (''Upto 5k'',''5k-10k'') then 0.003 else 0.0 end",
        ''compression_share_by_slab'')'
