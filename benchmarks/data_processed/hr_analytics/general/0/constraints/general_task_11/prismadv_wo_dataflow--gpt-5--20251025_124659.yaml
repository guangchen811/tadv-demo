  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'SalarySlab must be consistent with the numeric MonthlyIncome banding:
        ''Upto 5k'' => 0 < MonthlyIncome <= 5000; ''5k-10k'' => 5000 < MonthlyIncome
        <= 10000; ''10k-15k'' => 10000 < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome
        > 15000. This can be enforced as a Deequ compliance constraint like: .satisfies("case
        when SalarySlab = ''Upto 5k'' then MonthlyIncome > 0 and MonthlyIncome <=
        5000 when SalarySlab = ''5k-10k'' then MonthlyIncome > 5000 and MonthlyIncome
        <= 10000 when SalarySlab = ''10k-15k'' then MonthlyIncome > 10000 and MonthlyIncome
        <= 15000 when SalarySlab = ''15k+'' then MonthlyIncome > 15000 else false
        end", ''salary_slab_matches_income'')'
