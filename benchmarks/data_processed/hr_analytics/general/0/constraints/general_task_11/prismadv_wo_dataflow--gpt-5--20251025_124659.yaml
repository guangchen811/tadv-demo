    assumptions:
    - text: 'EmployeeNumber and EmpID must form a one-to-one mapping across the dataset
        (each EmployeeNumber maps to exactly one EmpID and vice versa). This ensures
        headcount and joins are correct. Possible constraints: .isUnique(["EmployeeNumber"])
        AND .isUnique(["EmpID"]) (preferred), or at minimum .isUnique(["EmployeeNumber","EmpID"])
        plus functional dependency checks such as groupBy("EmployeeNumber").agg(countDistinct("EmpID")
        == 1) and groupBy("EmpID").agg(countDistinct("EmployeeNumber") == 1).'
      sources:
      - start_line: 25
        end_line: 25
