        file: ''
      - start_line: 84
        end_line: 90
        file: ''
      uid: 14b19acb-c99a-4ec5-b484-d287d3522b0e
    - text: 'Each EmployeeNumber belongs to exactly one Department (Department functionally
        depends on EmployeeNumber). Equivalent constraint: the combination (Department,
        EmployeeNumber) is unique. Possible constraints: .isUnique(["Department","EmployeeNumber"])
        and groupBy("EmployeeNumber").agg(countDistinct("Department") == 1).'
      sources:
      - start_line: 68
        end_line: 75
        file: ''
      - start_line: 84
        end_line: 90
        file: ''
      uid: 61c1b959-0ebd-475e-8d49-afe86fea97ae
    - text: 'No duplicate employee rows within a Department when counting headcount.
        The pair (Department, EmpID) must be unique to avoid inflating department
        headcounts. Constraint: .isUnique(["Department","EmpID"]).'
      sources:
      - start_line: 68
        end_line: 70
        file: ''
      uid: bebfcbd3-2823-4126-824e-a1c75a7d9040
    - text: 'In the aggregated department output, total_budget must equal the sum
        of merit_pool + promotion_pool + compression_pool + emerging_talent_pool for
        every Department. Constraint on the aggregated dataset: satisfies("total_budget
        = merit_pool + promotion_pool + compression_pool + emerging_talent_pool").'
      sources:
      - start_line: 67
        end_line: 79
        file: ''
      uid: d5f1f821-da07-47c8-b200-3d13cfe3aca3
    - text: 'Per-employee monetary amounts must be arithmetically consistent: proposed_merit_amount
        = round(MonthlyIncome * proposed_merit_pct, 2); promotion_amount = round(MonthlyIncome
        * promotion_raise_pct, 2); compression_amount = round(MonthlyIncome * compression_pool_share,
        2); emerging_talent_amount = round(MonthlyIncome * emerging_talent_supp_pct,
        2). Constraints: four satisfies() rules for each formula.'
      sources:
      - start_line: 39
        end_line: 43
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      - start_line: 58
        end_line: 66
        file: ''
      uid: 000540ec-f1ed-40d5-8dd4-0337873317e3
    - text: 'The proposed_merit_pct must respect all caps: proposed_merit_pct <= slab_cap_pct
        for all rows; additionally, proposed_merit_pct <= PercentSalaryHike/100.0
        * age_weight * travel_multiplier for all rows; and for rows with PerformanceRating
        in {3,4}, proposed_merit_pct <= perf_guideline_pct * age_weight * travel_multiplier.
        Constraints: satisfies("proposed_merit_pct <= slab_cap_pct"), satisfies("proposed_merit_pct
        <= PercentSalaryHike/100.0 * age_weight * travel_multiplier"), and satisfies("PerformanceRating
        IN (3,4) => proposed_merit_pct <= perf_guideline_pct * age_weight * travel_multiplier").'
      sources:
      - start_line: 27
        end_line: 33
        file: ''
      - start_line: 34
        end_line: 43
        file: ''
      uid: 8f6e0dbb-2882-4010-93ee-fcbc83948f26
    - text: 'BusinessTravel normalization must produce only the expected categories
        and a consistent multiplier: if BusinessTravel == ''Travel_Frequently'' then
        travel_multiplier == 1.01; if BusinessTravel in {''Travel_Rarely'',''Non-Travel''}
        then travel_multiplier == 1.00. Constraints: satisfies("(BusinessTravel =
        ''Travel_Frequently'' AND travel_multiplier = 1.01) OR (BusinessTravel IN
        (''Travel_Rarely'',''Non-Travel'') AND travel_multiplier = 1.00)").'
      sources:
      - start_line: 17
        end_line: 24
        file: ''
      - start_line: 34
        end_line: 37
        file: ''
      uid: 2f280c78-2106-4c49-b55b-9bc87ead66a9
    - text: 'AgeGroup must align with age-derived weights and supplements: if AgeGroup
        == ''26-35'' then age_weight == 1.02 and emerging_talent_supp_pct == 0.005;
        otherwise age_weight == 1.00 and emerging_talent_supp_pct == 0.0. Constraints:
        two satisfies() rules encoding the bi-conditional for both columns.'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 63
        end_line: 65
        file: ''
      uid: 01166ea0-f2e6-474c-964e-6f0c0980fbf9
    - text: 'Promotion raise logic must be consistent across promotion_eligible, JobLevel,
        and promotion_raise_pct: if promotion_eligible == False then promotion_raise_pct
        == 0.0; if promotion_eligible == True then JobLevel in {1,2,3,4} and promotion_raise_pct
        equals the level mapping {1:0.10, 2:0.08, 3:0.07, 4:0.06}. Constraints: two
        satisfies() rules capturing the if/then cases.'
      sources:
      - start_line: 45
        end_line: 56
        file: ''
      uid: ceb8bbdb-2f32-403c-a001-56d06420e935
    - text: 'Compression share must depend only on SalarySlab: if SalarySlab in {''Upto
        5k'',''5k-10k''} then compression_pool_share == 0.003 else compression_pool_share
        == 0.0. Constraint: satisfies("(SalarySlab IN (''Upto 5k'',''5k-10k'') AND
        compression_pool_share = 0.003) OR (SalarySlab NOT IN (''Upto 5k'',''5k-10k'')
        AND compression_pool_share = 0.0)").'
      sources:
      - start_line: 58
        end_line: 61
        file: ''
      uid: bf09b7f7-5ddd-4f9d-90f7-22f16bd0d79d
