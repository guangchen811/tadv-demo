    code: []
    assumptions:
    - text: 'Promotion eligibility must exactly match a four-column rule: promotion_eligible
        is true if and only if (PerformanceRating = 4) AND (YearsInCurrentRole >=
        2) AND (YearsSinceLastPromotion >= 1) AND (JobLevel < 5). Example Deequ constraint:
        .satisfies(''(PerformanceRating = 4 AND YearsInCurrentRole >= 2 AND YearsSinceLastPromotion
        >= 1 AND JobLevel < 5) = promotion_eligible'', ''promotion_rule_equivalence'')'
      sources:
      - start_line: 46
        end_line: 52
        file: ''
      uid: 88ca24d7-ae48-4afc-a921-7072117e5719
    - text: 'Promotion raise must be consistent across JobLevel, eligibility, and
        MonthlyIncome: (a) If promotion_eligible then promotion_raise_pct must equal
        the JobLevel-based mapping {1->0.10, 2->0.08, 3->0.07, 4->0.06}; (b) If NOT
        promotion_eligible then promotion_raise_pct = 0.0; (c) For all rows, promotion_amount
        = round(MonthlyIncome * promotion_raise_pct, 2). Example Deequ constraints:
        .satisfies(''CASE WHEN promotion_eligible THEN ( (JobLevel = 1 AND promotion_raise_pct
        = 0.10) OR (JobLevel = 2 AND promotion_raise_pct = 0.08) OR (JobLevel = 3
        AND promotion_raise_pct = 0.07) OR (JobLevel = 4 AND promotion_raise_pct =
        0.06) ) ELSE promotion_raise_pct = 0.0 END'', ''promotion_raise_pct_by_level'');
        .satisfies(''promotion_amount = ROUND(MonthlyIncome * promotion_raise_pct,
        2)'', ''promotion_amount_consistency'')'
      sources:
      - start_line: 46
        end_line: 56
        file: ''
      uid: b45a6d01-e4fd-4a4c-9faf-460e9fb1e677
    - text: 'JobLevel domain is restricted and interacts with eligibility: JobLevel
        must be in {1,2,3,4,5}, and no record with JobLevel >= 5 may simultaneously
        satisfy (PerformanceRating = 4 AND YearsInCurrentRole >= 2 AND YearsSinceLastPromotion
        >= 1). Example Deequ constraints: .satisfies(''JobLevel IN (1,2,3,4,5)'',
        ''joblevel_domain''); .satisfies(''NOT (JobLevel >= 5 AND PerformanceRating
        = 4 AND YearsInCurrentRole >= 2 AND YearsSinceLastPromotion >= 1)'', ''no_level5_eligible'')'
      sources:
      - start_line: 46
        end_line: 51
        file: ''
      - start_line: 53
        end_line: 55
        file: ''
      uid: 5e299f3b-82a6-4216-921b-cfd179318201
    - text: 'Merit percent capping must respect multiple inputs: proposed_merit_pct
        must be less than or equal to each of perf_guideline_pct (which is driven
        by PerformanceRating and expected to be defined for ratings 3 or 4), PercentSalaryHike/100,
        and slab_cap_pct; proposed_merit_amount must equal round(MonthlyIncome * proposed_merit_pct,
        2). Example Deequ constraints: .satisfies(''proposed_merit_pct <= perf_guideline_pct
        AND proposed_merit_pct <= PercentSalaryHike/100 AND proposed_merit_pct <=
        slab_cap_pct'', ''merit_pct_caps''); .satisfies(''proposed_merit_amount =
        ROUND(MonthlyIncome * proposed_merit_pct, 2)'', ''merit_amount_consistency'');
        .satisfies(''PerformanceRating IN (3,4)'', ''rating_supported_by_guideline'')'
      sources:
      - start_line: 27
        end_line: 33
        file: ''
      - start_line: 40
        end_line: 43
        file: ''
      uid: eb948b83-69c1-46f3-8014-4feba3896d0e
    - text: 'Completeness across required predictors: PerformanceRating, YearsInCurrentRole,
        YearsSinceLastPromotion, JobLevel, and MonthlyIncome must all be non-null
        on every row since they are used together in boolean conditions and arithmetic
        without null handling. Example Deequ constraint: .satisfies(''PerformanceRating
        IS NOT NULL AND YearsInCurrentRole IS NOT NULL AND YearsSinceLastPromotion
        IS NOT NULL AND JobLevel IS NOT NULL AND MonthlyIncome IS NOT NULL'', ''required_fields_complete'')'
      sources:
      - start_line: 40
        end_line: 43
        file: ''
      - start_line: 46
        end_line: 56
        file: ''
      uid: cf6c2b54-33f2-4e18-b8c2-255f4e18e81a
    - text: 'Department-level aggregates must be internally consistent across multiple
        columns: For each Department, total_budget equals merit_pool + promotion_pool
        + compression_pool + emerging_talent_pool; headcount equals the count of EmpID
        in the department; base_pay equals the sum of MonthlyIncome. Example Deequ
        constraints on the aggregated dataframe: .satisfies(''total_budget = ROUND(merit_pool
        + promotion_pool + compression_pool + emerging_talent_pool, 2)'', ''dept_budget_additivity'');
        .satisfies(''headcount >= 0 AND base_pay >= 0'', ''dept_nonnegative''), and
        optionally recompute headcount/sums to compare with source data.'
      sources:
      - start_line: 67
        end_line: 79
        file: ''
      uid: 1a4de765-724a-40ad-99f5-94b9c1141209
  '["JobLevel","PerformanceRating","YearsInCurrentRole","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'Promotion eligibility is exactly the conjunction of four conditions across
        multiple columns: PerformanceRating = 4 AND YearsInCurrentRole >= 2 AND YearsSinceLastPromotion
        >= 1 AND JobLevel < 5. This should be reflected in the derived boolean column
        promotion_eligible. Deequ representation (two-directional equivalence): .satisfies(''NOT
        promotion_eligible OR (PerformanceRating = 4 AND YearsInCurrentRole >= 2 AND
        YearsSinceLastPromotion >= 1 AND JobLevel < 5)'') and .satisfies(''(PerformanceRating
        != 4 OR YearsInCurrentRole < 2 OR YearsSinceLastPromotion < 1 OR JobLevel
        >= 5) OR promotion_eligible'')'
      sources:
      - start_line: 46
        end_line: 52
        file: ''
      uid: cd4ed843-c457-4262-b78e-afebe8168bdb
    - text: 'Employees at JobLevel = 5 must never be promotion eligible and must have
        promotion_raise_pct = 0.0. Deequ representation: .satisfies(''JobLevel !=
        5 OR (promotion_eligible = false AND promotion_raise_pct = 0.0)'')'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 53
        end_line: 55
        file: ''
      uid: 5a31bfd9-715d-4edf-8973-0db4fa175628
    - text: 'For promotion-eligible employees, the promotion raise percent is fully
        determined by JobLevel (and is zero otherwise): if promotion_eligible then
        (JobLevel=1 -> 0.10, JobLevel=2 -> 0.08, JobLevel=3 -> 0.07, JobLevel=4 ->
        0.06); if NOT promotion_eligible then 0.0. Deequ representation: .satisfies(''(NOT
        promotion_eligible) OR (JobLevel = 1 AND promotion_raise_pct = 0.10) OR (JobLevel
        = 2 AND promotion_raise_pct = 0.08) OR (JobLevel = 3 AND promotion_raise_pct
        = 0.07) OR (JobLevel = 4 AND promotion_raise_pct = 0.06) OR (JobLevel = 5
        AND promotion_raise_pct = 0.0)'') AND .satisfies(''promotion_eligible OR promotion_raise_pct
        = 0.0'')'
      sources:
      - start_line: 46
        end_line: 55
        file: ''
      uid: 46d623e2-452f-4cec-93ef-e3b490ceed43
    - text: 'The merit guideline percent is determined by PerformanceRating and caps
        proposed_merit_pct: PerformanceRating=3 -> perf_guideline_pct=0.12, PerformanceRating=4
        -> perf_guideline_pct=0.18; and proposed_merit_pct must be <= perf_guideline_pct
        for every row. Deequ representation: .satisfies(''(PerformanceRating = 3 AND
        perf_guideline_pct = 0.12) OR (PerformanceRating = 4 AND perf_guideline_pct
        = 0.18)'') AND .satisfies(''proposed_merit_pct <= perf_guideline_pct'')'
      sources:
      - start_line: 27
        end_line: 29
        file: ''
      - start_line: 40
        end_line: 43
        file: ''
