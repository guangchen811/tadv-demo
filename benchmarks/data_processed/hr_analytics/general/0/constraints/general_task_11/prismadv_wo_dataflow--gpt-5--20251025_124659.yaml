    assumptions:
    - text: 'BusinessTravel values are normalized to the canonical set [''Travel_Frequently'',''Travel_Rarely'',''Non-Travel'']
        and must belong to this set for all records. travel_multiplier is fully determined
        by BusinessTravel and must be non-null: ''Travel_Frequently'' -> 1.01; ''Travel_Rarely''
        or ''Non-Travel'' -> 1.00. These are required for correct merit calculations
        using the multiplier. Example constraints: isContainedIn(''BusinessTravel'',
        [''Travel_Frequently'',''Travel_Rarely'',''Non-Travel'']); isComplete(''travel_multiplier'');
        satisfies(''case when BusinessTravel = "Travel_Frequently" then travel_multiplier
        = 1.01 when BusinessTravel in ("Travel_Rarely","Non-Travel") then travel_multiplier
        = 1.00 else false end'', ''travel_multiplier_by_business_travel'').'
      sources:
      - start_line: 17
        end_line: 24
        file: ''
      - start_line: 36
        end_line: 37
        file: ''
      - start_line: 41
        end_line: 43
        file: ''
      uid: 8694509a-0e26-4fdd-9524-63158469e905
    - text: 'AgeGroup deterministically sets age_weight and age_weight must be non-null
        and in {1.00, 1.02}: AgeGroup = ''26-35'' implies age_weight = 1.02; any other
        AgeGroup implies age_weight = 1.00. AgeGroup should be in the expected bins
        [''18-25'',''26-35'',''36-45'',''46-55'',''55+'']. Example constraints: isContainedIn(''AgeGroup'',
        [''18-25'',''26-35'',''36-45'',''46-55'',''55+'']); satisfies(''case when
        AgeGroup = "26-35" then age_weight = 1.02 else age_weight = 1.00 end'', ''age_weight_by_agegroup'');
        isComplete(''age_weight'').'
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      uid: 57468dce-073b-43aa-aadd-305edd39a9cf
    - text: 'proposed_merit_pct must be non-null and not exceed slab_cap_pct, and
        proposed_merit_amount must equal MonthlyIncome * proposed_merit_pct (rounded
        to 2 decimals). This ties proposed_merit_pct, perf_guideline_pct, PercentSalaryHike,
        age_weight, travel_multiplier, slab_cap_pct, and MonthlyIncome. Example constraints:
        satisfies(''proposed_merit_pct <= slab_cap_pct and proposed_merit_pct >= 0'',
        ''proposed_merit_pct_bounds''); satisfies(''abs(proposed_merit_amount - round(MonthlyIncome
        * proposed_merit_pct, 2)) < 0.005'', ''proposed_merit_amount_calc'').'
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 39
        end_line: 44
        file: ''
      uid: e451918f-e3bf-4b27-9a01-de4b08f64710
    - text: "PerformanceRating must be restricted to values that have a guideline\
        \ mapping so that perf_guideline_pct is complete (non-null) for all rows used\
        \ in merit computations with PercentSalaryHike, AgeGroup and BusinessTravel.\
        \ Specifically, PerformanceRating \u2208 {3, 4} or an extended mapping must\
        \ be provided for other values. Example constraints: isContainedIn('PerformanceRating',\
        \ [3, 4]); isComplete('perf_guideline_pct')."
      sources:
      - start_line: 26
        end_line: 28
        file: ''
      - start_line: 39
        end_line: 43
        file: ''
      uid: a6c25b54-b576-498f-aafe-431ac8647236
    - text: "Compression pool logic depends jointly on SalarySlab and MonthlyIncome:\
        \ if SalarySlab \u2208 {'Upto 5k','5k-10k'} then compression_pool_share =\
        \ 0.003, else 0.0; compression_amount must equal MonthlyIncome * compression_pool_share\
        \ (rounded to 2 decimals). Example constraints: isContainedIn('SalarySlab',\
        \ ['Upto 5k','5k-10k','10k-15k','15k+']); satisfies('(SalarySlab in (\"Upto\
        \ 5k\",\"5k-10k\") and compression_pool_share = 0.003) or (SalarySlab not\
        \ in (\"Upto 5k\",\"5k-10k\") and compression_pool_share = 0.0)', 'compression_share_by_slab');\
        \ satisfies('abs(compression_amount - round(MonthlyIncome * compression_pool_share,\
        \ 2)) < 0.005', 'compression_amount_calc')."
      sources:
      - start_line: 58
        end_line: 62
        file: ''
      uid: 9a187d8a-1418-4262-8892-be4345bb990b
    - text: 'Emerging talent supplement depends jointly on AgeGroup and MonthlyIncome:
        if AgeGroup = ''26-35'' then emerging_talent_supp_pct = 0.005, else 0.0; emerging_talent_amount
        must equal MonthlyIncome * emerging_talent_supp_pct (rounded to 2 decimals).
        Example constraints: satisfies(''case when AgeGroup = "26-35" then emerging_talent_supp_pct
        = 0.005 else emerging_talent_supp_pct = 0.0 end'', ''emerging_talent_pct_by_agegroup'');
        satisfies(''abs(emerging_talent_amount - round(MonthlyIncome * emerging_talent_supp_pct,
        2)) < 0.005'', ''emerging_talent_amount_calc'').'
      sources:
      - start_line: 63
        end_line: 66
        file: ''
      uid: 567c9e52-6be9-474e-aa20-8660af0ea9f8
    - text: 'Promotion fields have multi-column dependencies: promotion_eligible equals
        (PerformanceRating = 4 and YearsInCurrentRole >= 2 and YearsSinceLastPromotion
        >= 1 and JobLevel < 5). If promotion_eligible is false then promotion_raise_pct
        = 0.0; if true then promotion_raise_pct equals the mapping {1: 0.10, 2: 0.08,
        3: 0.07, 4: 0.06, 5: 0.0} based on JobLevel. promotion_amount must equal MonthlyIncome
        * promotion_raise_pct (rounded to 2 decimals). Example constraints: satisfies(''(promotion_eligible
        = (PerformanceRating = 4 and YearsInCurrentRole >= 2 and YearsSinceLastPromotion
        >= 1 and JobLevel < 5))'', ''promotion_elig_logic''); satisfies(''(not promotion_eligible
        and promotion_raise_pct = 0.0) or (promotion_eligible and ((JobLevel = 1 and
        promotion_raise_pct = 0.10) or (JobLevel = 2 and promotion_raise_pct = 0.08)
        or (JobLevel = 3 and promotion_raise_pct = 0.07) or (JobLevel = 4 and promotion_raise_pct
        = 0.06) or (JobLevel = 5 and promotion_raise_pct = 0.0)))'', ''promotion_raise_pct_logic'');
        satisfies(''abs(promotion_amount - round(MonthlyIncome * promotion_raise_pct,
        2)) < 0.005'', ''promotion_amount_calc'').'
