  '["AgeGroup","BusinessTravel","MonthlyIncome","PercentSalaryHike","PerformanceRating","SalarySlab"]':
    code: []
    assumptions:
    - text: 'After normalization, BusinessTravel must be one of {''Travel_Frequently'',''Travel_Rarely'',''Non-Travel''}
        and travel_multiplier must be consistent: 1.01 when BusinessTravel=''Travel_Frequently''
        and 1.00 when BusinessTravel IN (''Travel_Rarely'',''Non-Travel''). This can
        be represented by constraints like: isContainedIn(BusinessTravel, ...), and
        satisfies(''CASE WHEN BusinessTravel = \''Travel_Frequently\'' THEN travel_multiplier
        = 1.01 WHEN BusinessTravel IN (\''Travel_Rarely\'', \''Non-Travel\'') THEN
        travel_multiplier = 1.00 ELSE false END'').'
      sources:
      - start_line: 17
        end_line: 24
        file: ''
      - start_line: 36
        end_line: 37
        file: ''
      uid: 0cb56fe6-e3b6-4586-8bed-241b2baee72b
    - text: 'PerformanceRating must be limited to {3, 4}, and perf_guideline_pct must
        be non-null and equal to 0.12 when PerformanceRating=3 and 0.18 when PerformanceRating=4.
        This can be enforced with: isContainedIn(PerformanceRating, [3,4]) and satisfies(''CASE
        WHEN PerformanceRating=3 THEN perf_guideline_pct=0.12 WHEN PerformanceRating=4
        THEN perf_guideline_pct=0.18 ELSE false END'').'
      sources:
      - start_line: 27
        end_line: 29
        file: ''
      uid: 6b202439-6cea-4ca9-b707-d9ade83ae183
    - text: 'SalarySlab must be one of {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}
        and slab_cap_pct must match the mapping: 0.20, 0.18, 0.15, 0.12 respectively.
        Additionally, proposed_merit_pct must always be less than or equal to slab_cap_pct.
        Constraints: isContainedIn(SalarySlab, ...), satisfies(''CASE WHEN SalarySlab=\''Upto
        5k\'' THEN slab_cap_pct=0.20 WHEN SalarySlab=\''5k-10k\'' THEN slab_cap_pct=0.18
        WHEN SalarySlab=\''10k-15k\'' THEN slab_cap_pct=0.15 WHEN SalarySlab=\''15k+\''
        THEN slab_cap_pct=0.12 ELSE false END''), and satisfies(''proposed_merit_pct
        <= slab_cap_pct'').'
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 42
        end_line: 42
        file: ''
      uid: 3cf7300f-68e5-4f6d-9d74-83fe9e0b588c
    - text: 'proposed_merit_pct must not exceed the adjusted cap implied by the inputs:
        proposed_merit_pct <= LEAST(perf_guideline_pct, PercentSalaryHike/100.0) *
        age_weight * travel_multiplier. Constraint example: satisfies(''proposed_merit_pct
        <= LEAST(perf_guideline_pct, PercentSalaryHike/100.0) * age_weight * travel_multiplier'').'
      sources:
      - start_line: 35
        end_line: 37
        file: ''
      - start_line: 39
        end_line: 42
        file: ''
      uid: dcfd7131-7ac6-4c65-9e9f-db5677898552
    - text: 'proposed_merit_amount must equal MonthlyIncome * proposed_merit_pct,
        rounded to two decimals. Constraint: satisfies(''ABS(proposed_merit_amount
        - ROUND(MonthlyIncome * proposed_merit_pct, 2)) < 0.005'').'
      sources:
      - start_line: 43
        end_line: 43
        file: ''
      uid: 0ee84406-8c63-4d46-ab72-61b04e79fe9c
    - text: 'Compression pool logic by salary slab: If SalarySlab IN (''Upto 5k'',''5k-10k'')
        then compression_amount must equal ROUND(MonthlyIncome * 0.003, 2); otherwise
        compression_amount must be 0.00. Constraint: satisfies(''CASE WHEN SalarySlab
        IN (\''Upto 5k\'',\''5k-10k\'') THEN ABS(compression_amount - ROUND(MonthlyIncome*0.003,2))
        < 0.005 ELSE compression_amount = 0.0 END'').'
      sources:
      - start_line: 58
        end_line: 62
        file: ''
      uid: a241776d-f830-4e7c-b0dd-d9f36cacd2db
    - text: 'Emerging talent supplement by age cohort: If AgeGroup=''26-35'' then
        emerging_talent_amount must equal ROUND(MonthlyIncome * 0.005, 2); otherwise
        emerging_talent_amount must be 0.00. Constraint: satisfies(''CASE WHEN AgeGroup=\''26-35\''
        THEN ABS(emerging_talent_amount - ROUND(MonthlyIncome*0.005,2)) < 0.005 ELSE
        emerging_talent_amount = 0.0 END'').'
      sources:
      - start_line: 63
        end_line: 66
        file: ''
      uid: 22028964-5666-44f9-abef-027e1a09cd7f
    - text: 'Age weighting: age_weight must equal 1.02 when AgeGroup=''26-35'' and
        1.00 otherwise. Constraint: satisfies(''CASE WHEN AgeGroup=\''26-35\'' THEN
        age_weight=1.02 ELSE age_weight=1.00 END'').'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      uid: 87159f04-cf07-44e8-b06d-cec34e86a56f
    - text: 'Promotion raise rules must be consistent across multiple columns: If
        promotion_eligible is true, promotion_raise_pct must equal the JobLevel-based
        mapping (1->0.10, 2->0.08, 3->0.07, 4->0.06) and if promotion_eligible is
        false then promotion_raise_pct must be 0.0. Additionally, promotion_amount
        must equal ROUND(MonthlyIncome * promotion_raise_pct, 2). Constraints: satisfies(''CASE
        WHEN promotion_eligible THEN promotion_raise_pct = CASE JobLevel WHEN 1 THEN
        0.10 WHEN 2 THEN 0.08 WHEN 3 THEN 0.07 WHEN 4 THEN 0.06 ELSE 0.0 END ELSE
        promotion_raise_pct = 0.0 END'') and satisfies(''ABS(promotion_amount - ROUND(MonthlyIncome
        * promotion_raise_pct, 2)) < 0.005'').'
      sources:
      - start_line: 45
        end_line: 56
        file: ''
      uid: 7ee2df37-d1cc-414d-afac-e5e544d4daba
    - text: 'In the department-level aggregated output, total_budget must equal merit_pool
        + promotion_pool + compression_pool + emerging_talent_pool (with total rounded
        to two decimals). Constraint (applied to the aggregated dataset): satisfies(''ABS(total_budget
        - ROUND(merit_pool + promotion_pool + compression_pool + emerging_talent_pool,
        2)) < 0.005'').'
      sources:
      - start_line: 67
        end_line: 79
        file: ''
      uid: 3f70e869-74b0-4808-b369-4085a71329f3
  '["AgeGroup","BusinessTravel","PercentSalaryHike","PerformanceRating","SalarySlab"]':
    code: []
    assumptions:
    - text: 'BusinessTravel must be normalized to {''Travel_Frequently'',''Travel_Rarely'',''Non-Travel''},
        and the pair (BusinessTravel, travel_multiplier) must be one of: (''Travel_Frequently'',
        1.01), (''Travel_Rarely'', 1.00), (''Non-Travel'', 1.00). Example Deequ: .isContainedIn(''BusinessTravel'',
        [''Travel_Frequently'',''Travel_Rarely'',''Non-Travel'']).and( .satisfies("CASE
        WHEN BusinessTravel = ''Travel_Frequently'' THEN travel_multiplier = 1.01
        WHEN BusinessTravel IN (''Travel_Rarely'',''Non-Travel'') THEN travel_multiplier
        = 1.00 ELSE false END", ''travel_multiplier matches BusinessTravel'') )'
      sources:
      - start_line: 17
        end_line: 24
        file: ''
      - start_line: 36
        end_line: 37
        file: ''
      uid: c28b449b-c2ce-449b-b673-887bcf8010ef
    - text: 'The pair (PerformanceRating, perf_guideline_pct) must be in {(3, 0.12),
        (4, 0.18)}; any other rating should not occur. Example Deequ: .isContainedIn(''PerformanceRating'',
        [3,4]).and( .satisfies("CASE WHEN PerformanceRating = 3 THEN perf_guideline_pct
        = 0.12 WHEN PerformanceRating = 4 THEN perf_guideline_pct = 0.18 ELSE false
        END", ''perf guideline mapping'') )'
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      uid: 3d779ec1-bdeb-4550-a7ca-ba827267600d
    - text: 'The pair (SalarySlab, slab_cap_pct) must be in {(''Upto 5k'', 0.20),
        (''5k-10k'', 0.18), (''10k-15k'', 0.15), (''15k+'', 0.12)}. Example Deequ:
        .satisfies("(SalarySlab = ''Upto 5k'' AND slab_cap_pct = 0.20) OR (SalarySlab
        = ''5k-10k'' AND slab_cap_pct = 0.18) OR (SalarySlab = ''10k-15k'' AND slab_cap_pct
        = 0.15) OR (SalarySlab = ''15k+'' AND slab_cap_pct = 0.12)", ''slab cap mapping'')'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      uid: e4ff7d4a-d0db-455d-ab25-f9750935b154
    - text: 'AgeGroup and age_weight must be consistent: (AgeGroup = ''26-35'' ->
        age_weight = 1.02) and (AgeGroup <> ''26-35'' -> age_weight = 1.00). Example
        Deequ: .satisfies("CASE WHEN AgeGroup = ''26-35'' THEN age_weight = 1.02 ELSE
        age_weight = 1.00 END", ''age weight mapping'')'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      uid: 7dc310ac-e510-4c28-a2ae-a352884c7de8
    - text: 'proposed_merit_pct must be bounded by all inputs it depends on: proposed_merit_pct
        <= slab_cap_pct AND proposed_merit_pct <= age_weight*travel_multiplier*perf_guideline_pct
        AND proposed_merit_pct <= age_weight*travel_multiplier*(PercentSalaryHike/100)
        AND proposed_merit_pct >= 0. Example Deequ: .satisfies(''proposed_merit_pct
        <= slab_cap_pct AND proposed_merit_pct <= age_weight*travel_multiplier*perf_guideline_pct
        AND proposed_merit_pct <= age_weight*travel_multiplier*(PercentSalaryHike/100)
        AND proposed_merit_pct >= 0'', ''proposed merit bounds'')'
      sources:
      - start_line: 35
        end_line: 37
        file: ''
      - start_line: 40
        end_line: 42
        file: ''
      - start_line: 31
        end_line: 33
        file: ''
      uid: 928b5779-eef3-4f9e-9a8a-30e860b885c3
    - text: 'proposed_merit_amount must equal MonthlyIncome * proposed_merit_pct,
        rounded to 2 decimals. Example Deequ: .satisfies(''abs(proposed_merit_amount
        - round(MonthlyIncome * proposed_merit_pct, 2)) < 0.005'', ''proposed merit
        amount calculation'')'
      sources:
      - start_line: 43
        end_line: 43
        file: ''
      uid: daffee4b-4a6b-480b-9310-a05fb8bda8cb
    - text: 'promotion_eligible must exactly reflect the business rule: promotion_eligible
        = (PerformanceRating = 4 AND YearsInCurrentRole >= 2 AND YearsSinceLastPromotion
        >= 1 AND JobLevel < 5). Example Deequ: .satisfies("promotion_eligible = ((PerformanceRating
        = 4) AND (YearsInCurrentRole >= 2) AND (YearsSinceLastPromotion >= 1) AND
        (JobLevel < 5))", ''promotion eligibility rule'')'
      sources:
      - start_line: 46
        end_line: 52
        file: ''
      uid: f41202a3-7d8b-41f2-b6fc-98b8a68fc7c5
    - text: 'promotion_raise_pct must align with eligibility and JobLevel: if promotion_eligible
        = false then promotion_raise_pct = 0.0; if promotion_eligible = true then
        (JobLevel, promotion_raise_pct) in {(1,0.10),(2,0.08),(3,0.07),(4,0.06)}.
        Example Deequ: .satisfies("CASE WHEN promotion_eligible = false THEN promotion_raise_pct
        = 0.0 WHEN promotion_eligible = true THEN ( (JobLevel = 1 AND promotion_raise_pct
        = 0.10) OR (JobLevel = 2 AND promotion_raise_pct = 0.08) OR (JobLevel = 3
        AND promotion_raise_pct = 0.07) OR (JobLevel = 4 AND promotion_raise_pct =
        0.06) ) ELSE false END", ''promotion raise mapping'')'
      sources:
      - start_line: 53
        end_line: 56
        file: ''
      uid: e2411274-601f-4863-9562-48996c6f4529
    - text: 'SalarySlab determines compression_pool_share: if SalarySlab in (''Upto
        5k'',''5k-10k'') then compression_pool_share = 0.003 else 0.0. Example Deequ:
        .satisfies("CASE WHEN SalarySlab IN (''Upto 5k'',''5k-10k'') THEN compression_pool_share
        = 0.003 ELSE compression_pool_share = 0.0 END", ''compression pool share mapping'')'
      sources:
      - start_line: 59
        end_line: 61
        file: ''
      uid: 2b6f51ca-443d-4d73-bf1c-467d786db162
    - text: 'AgeGroup determines emerging_talent_supp_pct: if AgeGroup = ''26-35''
        then emerging_talent_supp_pct = 0.005 else 0.0. Example Deequ: .satisfies("CASE
        WHEN AgeGroup = ''26-35'' THEN emerging_talent_supp_pct = 0.005 ELSE emerging_talent_supp_pct
        = 0.0 END", ''emerging talent supplement mapping'')'
      sources:
      - start_line: 63
        end_line: 65
        file: ''
      uid: 966dcbbf-8483-4620-819a-8d0a2db89187
    - text: 'compression_amount must equal MonthlyIncome * compression_pool_share
        (rounded to 2 decimals), and emerging_talent_amount must equal MonthlyIncome
        * emerging_talent_supp_pct (rounded to 2 decimals). Example Deequ: .satisfies(''abs(compression_amount
        - round(MonthlyIncome * compression_pool_share, 2)) < 0.005'', ''compression
        amount calc'').and( .satisfies(''abs(emerging_talent_amount - round(MonthlyIncome
        * emerging_talent_supp_pct, 2)) < 0.005'', ''emerging talent amount calc'')
        )'
      sources:
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 65
        end_line: 65
        file: ''
      uid: 8193b612-d8b3-45b8-ad93-2a7aa0f232ac
    - text: 'At the department aggregate level, total_budget must equal merit_pool
