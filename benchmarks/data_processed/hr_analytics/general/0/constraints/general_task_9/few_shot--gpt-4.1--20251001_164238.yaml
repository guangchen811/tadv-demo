constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - '.hasNumberOfDistinctValues(''AgeGroup'', lambda x: x == 5)'
      - Invalid
    - - .isComplete('AgeGroup')
      - Valid
    assumptions: []
  Attrition:
    code:
    - - '.hasNumberOfDistinctValues(''Attrition'', lambda x: x == 2)'
      - Invalid
    - - .isComplete('Attrition')
      - Valid
    assumptions: []
