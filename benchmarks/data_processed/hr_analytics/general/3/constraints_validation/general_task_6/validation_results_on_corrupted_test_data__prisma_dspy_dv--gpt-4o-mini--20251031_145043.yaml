results:
  AgeGroup:
    code:
    - suggestion: .isComplete('AgeGroup')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('AgeGroup IN ("18-25", "26-35", "36-45", "46-55", "55+")',
        constraintName='valid_age_groups')
      status: true
      reason_if_failed: ''
      level: error
  Attrition:
    code:
    - suggestion: .isComplete('Attrition')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("Attrition IN ('Yes', 'No')", 'attrition_values_check')
      status: true
      reason_if_failed: ''
      level: error
  EmpID:
    code:
    - suggestion: .isUnique('EmpID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('EmpID')
      status: true
      reason_if_failed: ''
      level: error
  Department:
    code:
    - suggestion: .isComplete('Department')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Department', ['Sales', 'Research & Development',
        'Human Resources'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''Department''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  PercentSalaryHike:
    code:
    - suggestion: .isComplete('PercentSalaryHike')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('PercentSalaryHike >= 0', 'PercentSalaryHike must be
        non-negative')
      status: true
      reason_if_failed: ''
      level: error
  MonthlyIncome:
    code:
    - suggestion: .isComplete('MonthlyIncome')
      status: true
      reason_if_failed: ''
      level: error
  JobRole:
    code:
    - suggestion: .isComplete('JobRole')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('JobRole IN ("Research Director", "Sales Representative",
        "Research Scientist", "Manufacturing Director", "Healthcare Representative",
        "Sales Executive", "Manager", "Human Resources", "Laboratory Technician")',
        'Valid Job Roles')
      status: true
      reason_if_failed: ''
      level: error
  PerformanceRating:
    code:
    - suggestion: .isComplete('PerformanceRating')
      status: true
      reason_if_failed: ''
      level: error
  SalarySlab:
    code:
    - suggestion: .isComplete('SalarySlab')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''SalarySlab'', lambda x: x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasSize(lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
