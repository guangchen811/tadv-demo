constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['55+', '46-55', '36-45', '26-35', '18-25'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isContainedIn('EmployeeCount', ['1'])
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    assumptions: []
  JobRole, Department:
    code:
    - - '.hasConstraint(''Department should match JobRole mapping for known roles'',
        lambda df_spark: df_spark.filter(F.col(''JobRole'').isin([''Research Scientist'',
        ''Laboratory Technician'', ''Research Director'', ''Manufacturing Director'',
        ''Sales Executive'', ''Sales Representative'', ''Healthcare Representative'']))
        .filter(F.col(''Department'') != F.map_from_arrays(F.array(*[F.lit(k) for
        k in [''Research Scientist'', ''Laboratory Technician'', ''Research Director'',
        ''Manufacturing Director'', ''Sales Executive'', ''Sales Representative'',
        ''Healthcare Representative'']]), F.array(*[F.lit(v) for v in [''Research
        & Development'', ''Research & Development'', ''Research & Development'', ''Research
        & Development'', ''Sales'', ''Sales'', ''Sales'']]))[F.col(''JobRole'')])
        .count() == 0)'
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isContainedIn('StandardHours', ['80'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  TotalWorkingYears, YearsAtCompany:
    code:
    - - '.hasConstraint(''TotalWorkingYears should be >= YearsAtCompany'', lambda
        df_spark: df_spark.filter(F.col(''TotalWorkingYears'') < F.col(''YearsAtCompany'')).count()
        == 0)'
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsAtCompany, YearsInCurrentRole:
    code:
    - - '.hasConstraint(''YearsAtCompany should be >= YearsInCurrentRole'', lambda
        df_spark: df_spark.filter(F.col(''YearsAtCompany'') < F.col(''YearsInCurrentRole'')).count()
        == 0)'
      - Invalid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
