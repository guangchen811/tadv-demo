        WHEN `SalarySlab` IN (''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'') THEN 1
        ELSE 0 END", "SalarySlab in allowed set", lambda x: x == 1.0).'
      sources:
      - start_line: 25
        end_line: 33
        file: ''
      uid: 245c98c3-65a4-4f17-8d6c-6ba1790f7acf
    - text: 'Each allowed SalarySlab category must be present in the input with at
        least one row having MonthlyIncome > 0. The script groups by each category
        and computes medians and log ratios; missing categories or zero/non-positive
        incomes will produce NaNs or math errors when taking logs. Represent as per-slab
        checks, e.g. for each slab S: .satisfies("SUM(CASE WHEN `SalarySlab` = ''S''
        AND `MonthlyIncome` > 0 THEN 1 ELSE 0 END)", "count_positive_income_in_S",
        lambda x: x >= 1).'
      sources:
      - start_line: 37
        end_line: 41
        file: ''
      uid: 14d3b808-d179-4b1d-8047-eb8623877ceb
    - text: 'The ''SalarySlab'' column should not contain null/missing values. The
        code uses df[''SalarySlab''] for comparisons, categorical conversion and grouping;
        NULLs would be treated as missing categories and can affect row_ok and group
        medians. Represent as: .satisfies("CASE WHEN `SalarySlab` IS NOT NULL THEN
        1 ELSE 0 END", "SalarySlab non-null", lambda x: x == 1.0).'
      sources:
      - start_line: 28
        end_line: 37
        file: ''
      uid: 661f70df-6918-4015-987b-90096b185f39
    - text: 'SalarySlab string values must be normalized (exact spelling, punctuation,
        whitespace and case match the allowed categories). The code compares strings
        exactly (e.g. sl == ''Upto 5k''), so leading/trailing spaces or different
        casing will result in mismatches. Represent as a normalization check or strict
        membership on trimmed values, e.g. .satisfies("CASE WHEN TRIM(`SalarySlab`)
        IN (''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'') THEN 1 ELSE 0 END", "SalarySlab
        normalized", lambda x: x == 1.0).'
      sources:
      - start_line: 25
        end_line: 33
        file: ''
      uid: 55863bbd-1987-4982-8601-34102dd678cf
    - text: 'Median MonthlyIncome should be strictly increasing across the ordered
        SalarySlab bands (Upto 5k < 5k-10k < 10k-15k < 15k+). The code computes log(ordered_medians[1:]
        / ordered_medians[:-1]) and uses the mean as a progression index; non-monotonic
        or equal medians will produce zero/negative progression signals and may invalidate
        the intended meaning. Represent as checks on grouped medians: .satisfies("median_monthly_income(''Upto
        5k'') < median_monthly_income(''5k-10k'') AND median_monthly_income(''5k-10k'')
        < median_monthly_income(''10k-15k'') AND median_monthly_income(''10k-15k'')
        < median_monthly_income(''15k+'')", "Median monotonicity", lambda x: x ==
        True).'
      sources:
      - start_line: 37
        end_line: 42
        file: ''
      uid: aa0b3076-c67f-438b-a0e5-e932ba73c858
  TotalWorkingYears:
    code:
    - suggestion: .isComplete("TotalWorkingYears")
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 22fa63a7-1212-45f0-9765-44cef749511b
      source_assumptions:
      - cf0633f3-e4e8-42f8-9291-f4445e2d78df
    - suggestion: '.satisfies("CASE WHEN `TotalWorkingYears` >= 0 AND floor(`TotalWorkingYears`)
        = `TotalWorkingYears` THEN 1 ELSE 0 END", "TotalWorkingYears non-negative
        integer", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 945011ba-1748-43d2-9016-d19d02fe5cc9
      source_assumptions:
      - b7731d57-17de-465c-8501-c7d6b5ae15d5
    - suggestion: '.satisfies("CASE WHEN `TotalWorkingYears` >= `YearsAtCompany` THEN
        1 ELSE 0 END", "TotalWorkingYears >= YearsAtCompany", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 02bd63e0-0943-4293-8892-80599ffd4ff7
      source_assumptions:
      - dba7f400-c24a-4659-8046-a4421fd4eeaa
    - suggestion: '.satisfies("CASE WHEN `Age` - `TotalWorkingYears` >= 15 THEN 1
        ELSE 0 END", "Career start age >= 15", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 978c6c67-2476-4040-a1eb-81e256cf130f
      source_assumptions:
      - de38f78e-3bc7-4df0-aa42-db2ace83e2ab
    assumptions:
    - text: 'The ''TotalWorkingYears'' column must contain no NULLs. The code directly
        uses TotalWorkingYears in arithmetic (subtracting YearsAtCompany and Age)
        without any fillna, so inputs are expected to be present for every row. Example
        Deequ-style constraint: .satisfies("CASE WHEN `TotalWorkingYears` IS NOT NULL
        THEN 1 ELSE 0 END", "Non-null TotalWorkingYears", lambda x: x == 1)'
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      - start_line: 64
        end_line: 65
        file: ''
      uid: cf0633f3-e4e8-42f8-9291-f4445e2d78df
    - text: 'TotalWorkingYears should be a non-negative integer (>= 0). The code computes
        external_experience = TotalWorkingYears - YearsAtCompany and then takes sqrt(external_experience)
        (and clips lower bound to 0). Inputs with negative or non-integer values would
        be semantically invalid. Example constraint: .satisfies("CASE WHEN `TotalWorkingYears`
        >= 0 AND floor(`TotalWorkingYears`) = `TotalWorkingYears` THEN 1 ELSE 0 END",
        "TotalWorkingYears non-negative integer", lambda x: x == 1)'
      sources:
      - start_line: 58
        end_line: 64
        file: ''
      uid: b7731d57-17de-465c-8501-c7d6b5ae15d5
    - text: 'Per-row, TotalWorkingYears should be >= YearsAtCompany. Total working
        years should include time at the current company; otherwise external_experience
        becomes negative which is logically inconsistent even though the code clips
        negatives. Example constraint: .satisfies("CASE WHEN `TotalWorkingYears` >=
        `YearsAtCompany` THEN 1 ELSE 0 END", "TotalWorkingYears >= YearsAtCompany",
        lambda x: x == 1)'
      sources:
      - start_line: 58
        end_line: 58
        file: ''
      uid: dba7f400-c24a-4659-8046-a4421fd4eeaa
    - text: 'TotalWorkingYears should be small enough that the implied career start
        age is plausible: Age - TotalWorkingYears >= 15 (i.e., career start age at
        least 15). The code computes career_start_age = Age - TotalWorkingYears and
        later uses (career_start_age - 15).clip(lower=0), which implies the model
        expects realistic career-start ages. Example constraint: .satisfies("CASE
        WHEN `Age` - `TotalWorkingYears` >= 15 THEN 1 ELSE 0 END", "Career start age
        >= 15", lambda x: x == 1)'
      sources:
      - start_line: 59
        end_line: 65
        file: ''
      uid: de38f78e-3bc7-4df0-aa42-db2ace83e2ab
  '["TotalWorkingYears","YearsAtCompany"]':
    code: []
    assumptions:
    - text: 'TotalWorkingYears should be greater than or equal to YearsAtCompany for
        every record, so that external_experience = TotalWorkingYears - YearsAtCompany
        is non-negative (the code clips negative values but downstream logic expects
        external_experience >= 0 for sqrt). Example actionable constraint (Deequ-like):
        .satisfies("TotalWorkingYears - YearsAtCompany >= 0", "total_ge_years_at_company").'
      sources:
      - start_line: 58
        end_line: 64
        file: ''
      uid: 7ee4c21f-d275-4719-bc8e-500f863dca7b
    - text: 'Age should be sufficiently large relative to TotalWorkingYears so that
        career_start_age = Age - TotalWorkingYears yields a plausible starting age.
        For meaningful career_start_signal the code subtracts 15 and clips lower bound;
        therefore enforce Age >= TotalWorkingYears + 15 (or at minimum Age >= TotalWorkingYears).
        Example actionable constraint: .satisfies("Age >= TotalWorkingYears + 15",
        "career_start_at_least_15").'
      sources:
      - start_line: 59
        end_line: 65
        file: ''
      uid: 61697fea-f220-4244-b3ce-465fd12ee0a5
    - text: 'When YearsAtCompany > 0, YearsWithCurrManager should be between 0 and
        YearsAtCompany (inclusive). The code computes manager_ratio = YearsWithCurrManager
        / YearsAtCompany for YearsAtCompany > 0 and then clips to [0,1]; enforcing
        this prevents misleading ratios. Example actionable constraint: .satisfies("(YearsAtCompany
        <= 0 AND (YearsWithCurrManager IS NULL OR YearsWithCurrManager = 0)) OR (YearsAtCompany
        > 0 AND YearsWithCurrManager >= 0 AND YearsWithCurrManager <= YearsAtCompany)",
        "mgr_within_tenure").'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: b65ca4f9-19ed-41f1-a95d-555a1ec58579
    - text: 'When YearsAtCompany > 0, YearsSinceLastPromotion should be non-negative
        and less than or equal to YearsAtCompany (no. of years since last promotion
        cannot exceed tenure). The code divides YearsSinceLastPromotion by YearsAtCompany
        to compute no_promo_signal and then clips, so enforce this relation. Example
        actionable constraint: .satisfies("(YearsAtCompany <= 0 AND (YearsSinceLastPromotion
        IS NULL OR YearsSinceLastPromotion = 0)) OR (YearsAtCompany > 0 AND YearsSinceLastPromotion
        >= 0 AND YearsSinceLastPromotion <= YearsAtCompany)", "promo_within_tenure").'
      sources:
      - start_line: 93
        end_line: 96
        file: ''
      uid: 5accbb28-e03f-4be6-8767-64966712a174
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code:
    - suggestion: '.satisfies("YearsSinceLastPromotion >= 0 AND YearsSinceLastPromotion
        <= YearsAtCompany", "promo_within_tenure", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 12d218df-83a0-416b-98a3-55f6838c2a00
      source_assumptions:
      - 09b1a786-ac65-44bd-958f-473e8247d206
    - suggestion: '.satisfies("(YearsAtCompany = 0 AND YearsSinceLastPromotion = 0)
        OR (YearsAtCompany > 0)", "zero_tenure_zero_promo", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: b9b72bc6-4618-4576-a2f8-0bd31e40b104
      source_assumptions:
      - 4e9f2237-975d-4074-8ec2-e29053ecaf9b
    assumptions:
    - text: 'For every row, YearsSinceLastPromotion should be non-negative and should
        not exceed YearsAtCompany (i.e., 0 <= YearsSinceLastPromotion <= YearsAtCompany).
        This ensures the no_promo_signal ratio (YearsSinceLastPromotion / YearsAtCompany)
        is meaningful and within [0,1] before clipping. Actionable constraint example
        (Deequ-style): .satisfies("YearsSinceLastPromotion >= 0 AND YearsSinceLastPromotion
        <= YearsAtCompany", "promo_within_tenure")'
      sources:
      - start_line: 93
        end_line: 96
        file: ''
      uid: 09b1a786-ac65-44bd-958f-473e8247d206
    - text: 'If YearsAtCompany == 0, then YearsSinceLastPromotion must be 0 (there
        cannot be a positive time-since-last-promotion when tenure is zero). Actionable
        constraint example: .satisfies("(YearsAtCompany = 0 AND YearsSinceLastPromotion
        = 0) OR (YearsAtCompany > 0)", "zero_tenure_zero_promo")'
      sources:
      - start_line: 93
        end_line: 96
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: 4e9f2237-975d-4074-8ec2-e29053ecaf9b
  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'When present, YearsWithCurrManager must be non-negative and less than
        or equal to YearsAtCompany for the same record. The code computes manager_ratio
        = YearsWithCurrManager / YearsAtCompany and later uses 1 - manager_ratio,
        so manager tenure should not exceed employment tenure. Example Deequ-style
        check: .satisfies("YearsWithCurrManager IS NULL OR (YearsWithCurrManager >=
        0 AND YearsWithCurrManager <= YearsAtCompany)")'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: bbafa09b-5d43-4e1c-a9ca-68d2519bf74e
    - text: 'TotalWorkingYears should be greater than or equal to YearsAtCompany for
        each record so that external_experience = TotalWorkingYears - YearsAtCompany
        is non-negative before taking the square root. Example Deequ-style check:
        .satisfies("TotalWorkingYears >= YearsAtCompany")'
      sources:
      - start_line: 58
        end_line: 64
        file: ''
      uid: 9711abf5-baed-472c-b30a-f78aedf9b273
    - text: 'For records with YearsAtCompany > 0, YearsSinceLastPromotion must be
        between 0 and YearsAtCompany (inclusive). The code divides YearsSinceLastPromotion
        by YearsAtCompany to form no_promo_signal and then clips to [0,1]; logically
        YearsSinceLastPromotion should not exceed tenure. Example Deequ-style check:
        .satisfies("YearsAtCompany == 0 OR (YearsSinceLastPromotion >= 0 AND YearsSinceLastPromotion
        <= YearsAtCompany)")'
      sources:
      - start_line: 92
        end_line: 96
        file: ''
      uid: a9d30ea4-b85f-45c2-b3df-849a6f9e8f75
    - text: 'If YearsAtCompany == 0, then YearsWithCurrManager and YearsSinceLastPromotion
        should be null or zero. The code treats YearsAtCompany == 0 as a special-case
        (avoiding division) and assigns defaults; to preserve logical consistency
        new hires shouldn''t show positive manager-tenure or time-since-promotion.
        Example Deequ-style checks: .satisfies("YearsAtCompany != 0 OR (YearsWithCurrManager
        IS NULL OR YearsWithCurrManager == 0)") and .satisfies("YearsAtCompany !=
        0 OR (YearsSinceLastPromotion IS NULL OR YearsSinceLastPromotion == 0)")'
      sources:
      - start_line: 60
        end_line: 96
        file: ''
