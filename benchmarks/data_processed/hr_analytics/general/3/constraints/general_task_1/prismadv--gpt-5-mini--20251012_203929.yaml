    assumptions:
    - text: 'Row-level consistency between AgeGroup and Age: each record''s numeric
        Age must fall within the bounds implied by AgeGroup. Concretely: ''18-25''
        -> 18 <= Age <= 25; ''26-35'' -> 26 <= Age <= 35; ''36-45'' -> 36 <= Age <=
        45; ''46-55'' -> 46 <= Age <= 55; ''55+'' -> Age >= 55. This can be enforced
        as a Deequ row-level boolean constraint, for example:

        .satisfies("(AgeGroup = ''18-25'' AND Age >= 18 AND Age <= 25) OR (AgeGroup
        = ''26-35'' AND Age >= 26 AND Age <= 35) OR (AgeGroup = ''36-45'' AND Age
        >= 36 AND Age <= 45) OR (AgeGroup = ''46-55'' AND Age >= 46 AND Age <= 55)
        OR (AgeGroup = ''55+'' AND Age >= 55)")

        and validated with an expectation that the fraction of rows satisfying this
        expression == 1.0 (or a high threshold if some imperfect labeling is tolerated).'
      sources:
      - start_line: 52
        end_line: 55
        file: ''
      - start_line: 101
        end_line: 108
        file: ''
      uid: 09d97d0b-e56c-4d70-a115-6f38f1429cce
    - text: 'Group-level monotonicity of Age across AgeGroup bins: the central tendency
        of Age (median or mean) should increase with the AgeGroup ordering (i.e.,
        median(Age | ''26-35'') > median(Age | ''18-25''), median(Age | ''36-45'')
        > median(Age | ''26-35''), median(Age | ''46-55'') > median(Age | ''36-45''),
        and median(Age | ''55+'') >= median(Age | ''46-55'')). This can be encoded
        as a set of Deequ aggregate comparisons (one assertion per adjacent bin pair).
        Example pseudocode checks:

        assert median_age(''26-35'') > median_age(''18-25'')

        assert median_age(''36-45'') > median_age(''26-35'')

        assert median_age(''46-55'') > median_age(''36-45'')

        assert median_age(''55+'') >= median_age(''46-55'')

        Use median rather than mean if Age has outliers or rounding artifacts.'
      sources:
