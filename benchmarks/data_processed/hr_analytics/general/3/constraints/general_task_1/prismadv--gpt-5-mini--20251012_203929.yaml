    - text: 'For rows where YearsAtCompany > 0, ''YearsSinceLastPromotion'' should
        be <= YearsAtCompany (the code computes YearsSinceLastPromotion / YearsAtCompany;
        ratios > 1 indicate inconsistent data).

        We could represent this assumption as a deequ-style constraint like this:

        .satisfies("CASE WHEN `YearsAtCompany` > 0 AND `YearsSinceLastPromotion` <=
        `YearsAtCompany` THEN 1 ELSE 0 END", "YearsSinceLastPromotion_leq_YearsAtCompany_when_tenure_positive",
