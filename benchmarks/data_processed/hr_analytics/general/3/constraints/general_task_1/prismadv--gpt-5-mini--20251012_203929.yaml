      uid: 32553def-f0be-4817-acc0-9dfac0d19858
    - text: 'Age values should be within a realistic employment range (for example
        18 <= Age <= 100). The script segments ages using age groups starting at 18
        and later uses Age to compute career start; extremely low or absurdly high
        ages are likely data errors and will distort risk signals.

        Suggested check:

        .satisfies(''CASE WHEN `Age` >= 18 AND `Age` <= 100 THEN 1 ELSE 0 END'', ''Age
        in plausible range'', lambda x: x >= 0.99)'
      sources:
      - start_line: 51
        end_line: 65
        file: ''
      uid: b95a94ea-a6f1-4da2-873f-6c2b108fd1ad
    - text: "Age should be consistent with the declared 'AgeGroup' column. For example:\
        \ if 18 <= Age <= 25 then AgeGroup should be '18-25'; if 26 <= Age <= 35 then\
        \ '26-35'; if 36 <= Age <= 45 then '36-45'; if 46 <= Age <= 55 then '46-55';\
        \ if Age >= 56 then '55+'. Inconsistent pairs will cause weighting errors\
        \ because AgeGroup is used for age_weights.\nSuggested check (SQL-like):\n\
        .satisfies(\n  'CASE WHEN (`Age` >= 18 AND `Age` <= 25 AND `AgeGroup` = \"\
        18-25\") OR (`Age` >= 26 AND `Age` <= 35 AND `AgeGroup` = \"26-35\") OR (`Age`\
        \ >= 36 AND `Age` <= 45 AND `AgeGroup` = \"36-45\") OR (`Age` >= 46 AND `Age`\
        \ <= 55 AND `AgeGroup` = \"46-55\") OR (`Age` >= 56 AND `AgeGroup` = \"55+\"\
        ) THEN 1 ELSE 0 END',\n  'Age vs AgeGroup consistency',\n  lambda x: x >=\
        \ 0.95\n)\n(choose threshold depending on acceptable mismatch rate)"
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 108
        end_line: 110
        file: ''
      uid: 7e800808-681d-4235-afb7-a5da764d6134
    - text: 'The derived career-start age (Age - TotalWorkingYears) should be realistic:
        in most rows it should be >= 15 (i.e., people did not start working earlier
        than age 15). The code computes career_start_age = Age - TotalWorkingYears
        and then career_start_signal = (career_start_age - 15).clip(lower=0); although
        negative values are clipped, a large fraction of unrealistic (Age < TotalWorkingYears
        + 15) rows will zero out this signal and may harm scoring. Validate that the
        majority of rows meet this constraint.

        Suggested check:

        .satisfies(''CASE WHEN `Age` - `TotalWorkingYears` >= 15 THEN 1 ELSE 0 END'',
        ''Realistic career start age'', lambda x: x >= 0.95)'
