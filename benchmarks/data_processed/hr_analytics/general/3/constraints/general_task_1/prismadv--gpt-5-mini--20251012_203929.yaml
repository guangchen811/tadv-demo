  '["Age","TotalWorkingYears","YearsAtCompany"]':
    code: []
    assumptions:
    - text: TotalWorkingYears should be greater than or equal to YearsAtCompany for
        every record (TotalWorkingYears >= YearsAtCompany). This ensures external_experience
        = TotalWorkingYears - YearsAtCompany is non-negative without relying on clipping.
      sources:
      - start_line: 58
        end_line: 64
        file: ''
      uid: 923a5138-49f0-4bb1-b3fd-91abc9a7d4a4
    - text: YearsWithCurrManager should be between 0 and YearsAtCompany for records
        where YearsAtCompany > 0 (0 <= YearsWithCurrManager <= YearsAtCompany). The
        code fills missing YearsWithCurrManager with 0 and then divides by YearsAtCompany,
        so this relationship should hold to make the manager_ratio meaningful before
        clipping to [0,1].
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: d7755613-75a5-4247-86b1-c3fa4da9cf28
    - text: YearsSinceLastPromotion should be between 0 and YearsAtCompany for records
        where YearsAtCompany > 0 (0 <= YearsSinceLastPromotion <= YearsAtCompany).
        This makes the no_promo_signal = YearsSinceLastPromotion / YearsAtCompany
        a valid fraction (before clipping to [0,1]).
      sources:
      - start_line: 93
        end_line: 96
        file: ''
      uid: 536f3088-6550-4aa2-bad6-69804c66c121
    - text: Age should be at least TotalWorkingYears + 15 for every record (Age >=
        TotalWorkingYears + 15). This encodes a realistic minimum career start age
        (career_start_age = Age - TotalWorkingYears >= 15) so that career_start_signal
        is meaningful without being zeroed by clipping.
      sources:
      - start_line: 59
        end_line: 65
        file: ''
      uid: aa6bf56b-39f6-4e41-a349-a513cae68772
    - text: When YearsAtCompany == 0, YearsSinceLastPromotion and YearsWithCurrManager
        should be either 0 or null. The code treats YearsAtCompany == 0 as a special
        case (no_promo_signal set to 0 and manager_ratio set to 1.0), so consistency
        requires there be no positive tenure-with-manager or years-since-promotion
        at that employer.
      sources:
      - start_line: 60
        end_line: 96
        file: ''
      uid: 9f976c1e-16d4-4802-8905-52126762493d
  '["Attrition","OverTime"]':
    code:
    - suggestion: '.haveCompleteness([''Attrition'',''OverTime''], lambda x: x ==
        1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 6f1399bd-83a9-4506-afd1-b7a562f56ddd
      source_assumptions:
      - beb9053d-2f13-442e-9843-3e1a438d03fe
    - suggestion: '.satisfies("Attrition IN (''Yes'',''No'') AND OverTime IN (''Yes'',''No'')",
        "Attrition_OverTime_values_in_Yes_No", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: f34f1423-7035-49b3-9d99-742b817c62bb
      source_assumptions:
      - beb9053d-2f13-442e-9843-3e1a438d03fe
    - suggestion: '.satisfies("OverTime = ''Yes''", "Has_OverTime_Yes", lambda x:
        x > 0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 71498bd9-5921-4b41-833e-01f6dd2441ff
      source_assumptions:
      - 904efe06-7de9-4704-a2ca-de6145caae66
    - suggestion: '.satisfies("OverTime = ''No''", "Has_OverTime_No", lambda x: x
        > 0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 902c432d-8041-4ae8-aecc-dc74cb6f82fc
      source_assumptions:
      - 904efe06-7de9-4704-a2ca-de6145caae66
    assumptions:
    - text: 'Attrition and OverTime are complete, categorical columns encoded as the
        strings ''Yes'' and ''No''. Both columns should contain only these two values
        and have no nulls. This enables boolean masks like (df[''Attrition'']==''Yes'')
        and (df[''OverTime'']==''Yes'') and downstream rate calculations. (Deequ examples:
        .isContainedIn(''Attrition'', [''Yes'',''No'']) and .isContainedIn(''OverTime'',
        [''Yes'',''No'']) and .hasCompleteness(''Attrition'', 1.0) and .hasCompleteness(''OverTime'',
        1.0))'
      sources:
      - start_line: 74
        end_line: 76
        file: ''
      - start_line: 169
        end_line: 172
        file: ''
      uid: beb9053d-2f13-442e-9843-3e1a438d03fe
    - text: 'To compute and compare attrition rates by overtime status, the dataset
        must contain at least one row with OverTime == ''Yes'' and at least one row
        with OverTime == ''No''. (Actionable check: count(OverTime == ''Yes'') > 0
        AND count(OverTime == ''No'') > 0; or in Deequ a custom check on the counts
        of these two predicates.)'
      sources:
      - start_line: 77
        end_line: 82
        file: ''
      uid: 904efe06-7de9-4704-a2ca-de6145caae66
    - text: 'Every row''s SalarySlab must be consistent with MonthlyIncome according
        to the defined slab boundaries: ''Upto 5k'' => 0 < MonthlyIncome <= 5000;
        ''5k-10k'' => 5000 < MonthlyIncome <= 10000; ''10k-15k'' => 10000 < MonthlyIncome
        <= 15000; ''15k+'' => MonthlyIncome > 15000. This enables the boolean salary_ok
        mask and pay-band in-range aggregation. (Actionable: assert the combined predicate
        across SalarySlab and MonthlyIncome holds for a high proportion of rows, e.g.
        pct_in_range close to 1.0.)'
      sources:
      - start_line: 25
        end_line: 35
        file: ''
      uid: 66294ca2-b544-43c8-b28e-7c9475ddaece
    - text: 'All SalarySlab categories in allowed_slabs should have at least one non-null
        MonthlyIncome record so that median can be computed per slab and progression_index
        (mean log ratio of adjacent medians) is well-defined. Additionally, medians
        should be positive to avoid division-by-zero or invalid logs. (Actionable:
        for each slab in [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''] assert count(MonthlyIncome
        not null) > 0 and median(MonthlyIncome) > 0.)'
      sources:
      - start_line: 37
        end_line: 42
        file: ''
      uid: 64577469-b7e4-4a99-a45f-9774e7c9013a
    - text: 'JobRole values should be consistent with Department: roles in sales_roles
        must only appear with Department == ''Sales'', rd_roles only with Department
        == ''Research & Development'', and hr_roles only with Department == ''Human
        Resources''. This integrity is required for correct grouping and department-weighted
        metrics. (Actionable: assert no rows where Department == ''Sales'' and JobRole
        not in sales_roles, etc.)'
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      - start_line: 139
        end_line: 141
        file: ''
      uid: 22f2d6bf-a691-48bf-836a-b717c432838a
    - text: 'AgeGroup must belong to the allowed set {''18-25'',''26-35'',''36-45'',''46-55'',''55+''}
        and be consistent with Age numeric values (Age within the numeric bounds implied
        by AgeGroup). This ensures correct mapping to age_weights and segmentation.
        (Actionable: .isContainedIn(''AgeGroup'', allowed_age_groups) and a row-level
        check that Age falls into the interval implied by AgeGroup.)'
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 100
        end_line: 108
        file: ''
      uid: bb39515e-333a-404f-b728-cc5eb0121f27
    - text: 'career_start_age is computed as Age - TotalWorkingYears; the dataset
        should satisfy Age - TotalWorkingYears >= 15 for rows where we expect a non-zero
        career_start_signal (i.e., employees started working at age >= 15). If violated,
        career_start_signal will be zero after clipping. (Actionable: assert (Age
        - TotalWorkingYears) >= 15 for a targeted proportion of rows where a positive
        career_start_signal is expected.)'
      sources:
      - start_line: 58
        end_line: 66
        file: ''
      uid: dbcc6092-6006-4b52-a890-bb3a758b7af3
    - text: 'For sensible manager_ratio and no_promo_signal calculations: when YearsAtCompany
        > 0, YearsWithCurrManager and YearsSinceLastPromotion should be non-negative
        and generally less-than-or-equal-to YearsAtCompany. Otherwise ratios may be
        >1 and are only clipped later. (Actionable: row-level checks: YearsWithCurrManager
        >= 0, YearsSinceLastPromotion >= 0, and for rows with YearsAtCompany > 0 assert
        YearsWithCurrManager <= YearsAtCompany and YearsSinceLastPromotion <= YearsAtCompany.)'
      sources:
      - start_line: 58
        end_line: 61
        file: ''
      - start_line: 92
        end_line: 96
        file: ''
      uid: 451d6218-7944-4bf0-9877-c69517b28cc8
    - text: 'The satisfaction columns [''JobSatisfaction'',''EnvironmentSatisfaction'',''WorkLifeBalance'']
        must be numeric, non-null, and lie within the expected scale (1 through 4).
        The mean of these is used to compute dissat; invalid values will distort the
        dissatisfaction signal. (Actionable: per-column .hasCompleteness ~1.0 and
        .isContainedIn/withinRange checks, and an aggregate check for no NaNs in the
        combined mean.)'
      sources:
      - start_line: 86
        end_line: 90
        file: ''
      uid: ad332f52-2089-414b-ae64-711dfad6e95a
    - text: 'Department values should be drawn from the mapping used to compute dept_weight
        (i.e., at minimum include ''Research & Development'',''Sales'',''Human Resources'')
        so dept_weight is defined; otherwise dept_weight becomes NaN and will propagate
        into linear_score. (Actionable: assert Department subset of the mapping keys,
        or provide a default mapping.)'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      - start_line: 110
        end_line: 115
        file: ''
      uid: 9f2e8a6b-9e8c-41ff-aa18-af98c96d5afc
