        end_line: 96
        file: ''
      uid: b7ca74be-7b43-4dcb-8f80-c160c62f4278
    - text: 'For rows where YearsAtCompany == 0, ''YearsSinceLastPromotion'' should
        be 0 (it is expected that no time at company implies no promotions at that
        company). This keeps the intended semantics of the np.where branch that sets
        the promotion-ratio to 0 for YearsAtCompany==0.

