    - text: 'All values in ''Age'' must be numeric / integral (convertible to integer).
        The code treats Age as a numeric field (subtraction with TotalWorkingYears,
        arithmetic and clipping). Non-numeric strings or malformed values would raise
        errors or produce incorrect calculations.

        Suggested check:

        .satisfies(''CASE WHEN TRY_CAST(`Age` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0
        END'', ''Age numeric'', lambda x: x == 1.0)'
      sources:
      - start_line: 53
        end_line: 59
