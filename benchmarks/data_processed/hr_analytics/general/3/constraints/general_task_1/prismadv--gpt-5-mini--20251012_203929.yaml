    assumptions:
    - text: 'The ''YearsSinceLastPromotion'' column must not contain null values because
        the code uses it directly in numeric computations (no fillna).

        We could represent this assumption as a deequ-style constraint like this:

        .satisfies("CASE WHEN `YearsSinceLastPromotion` IS NOT NULL THEN 1 ELSE 0
        END", "Non-null YearsSinceLastPromotion", lambda x: x == 1)'
