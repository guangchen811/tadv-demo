    code:
    - suggestion: '.satisfies("(AgeGroup = ''18-25'' AND Age >= 18 AND Age <= 25)
        OR (AgeGroup = ''26-35'' AND Age >= 26 AND Age <= 35) OR (AgeGroup = ''36-45''
        AND Age >= 36 AND Age <= 45) OR (AgeGroup = ''46-55'' AND Age >= 46 AND Age
        <= 55) OR (AgeGroup = ''55+'' AND Age >= 55)", "Age vs AgeGroup consistency",
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: b258f0f6-dd73-4ac9-9471-6f4553fc26cf
      source_assumptions:
