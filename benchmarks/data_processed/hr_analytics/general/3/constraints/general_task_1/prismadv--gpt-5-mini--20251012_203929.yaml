    - text: 'The ''YearsSinceLastPromotion'' values should be numeric integers >=
        0 (no negative values). The code treats this as a count of years and divides
        it by YearsAtCompany, so negative or non-numeric values would be invalid.

        We could represent this assumption as a deequ-style constraint like this:

        .satisfies("CASE WHEN `YearsSinceLastPromotion` >= 0 THEN 1 ELSE 0 END", "YearsSinceLastPromotion_non_negative",
