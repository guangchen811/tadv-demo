        end_line: 26
        file: ''
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 175
        end_line: 175
        file: ''
      uid: ff58cf6b-8565-405d-b395-eb5d770252c4
    - text: 'MonthlyIncome must be expressed in the same units that the SalarySlab
        thresholds use (i.e., the slab boundaries 5000, 10000, 15000 are in the same
        currency/period as MonthlyIncome). This ensures row-level checks like (SalarySlab
        == ''Upto 5k'') & (MonthlyIncome > 0) & (MonthlyIncome <= 5000) are meaningful.
