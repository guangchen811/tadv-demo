  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'SalarySlab contains only the expected band labels and should not contain
        other values. In other words, every row''s SalarySlab must be one of: ["Upto
        5k", "5k-10k", "10k-15k", "15k+"]. This can be enforced as a multi-column/domain
        constraint (e.g. isContainedIn or a predicate checking SalarySlab in the allowed
        set).'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 37
        end_line: 37
        file: ''
      uid: 3c63d60f-d904-4d6f-93b8-cb4c14a3e03e
    - text: "Row-level consistency between SalarySlab and MonthlyIncome: each SalarySlab\
        \ implies a monthly income range. Concretely: \n- If SalarySlab == 'Upto 5k'\
        \ then 0 < MonthlyIncome <= 5000\n- If SalarySlab == '5k-10k' then 5000 <\
        \ MonthlyIncome <= 10000\n- If SalarySlab == '10k-15k' then 10000 < MonthlyIncome\
        \ <= 15000\n- If SalarySlab == '15k+' then MonthlyIncome > 15000\nThis should\
        \ be expressed as a single predicate over the two columns (e.g. a Deequ satisfies\
        \ constraint or SQL predicate that every row meets one of the four conditions)."
      sources:
      - start_line: 26
        end_line: 33
        file: ''
      uid: a0e51345-899d-4937-825e-41312fffb17f
    - text: Every declared SalarySlab category must be represented by at least one
        record in the dataset (i.e., non-empty groups for each of the allowed slabs).
        The code indexes medians by the allowed_slabs list and expects a value (or
        at least an entry) for each slab when building ordered_medians, so absence
        of an entire slab would break the intended logic or produce NaNs.
      sources:
      - start_line: 36
        end_line: 39
        file: ''
      uid: 6a3171e1-11d9-4907-9527-ef29cec72b5b
    - text: 'Median MonthlyIncome per SalarySlab must be finite and strictly positive,
        and (per the code comment ''Median monotonicity across slabs'') should be
        non-decreasing across the ordered slabs. Concretely: for the ordered list
        [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''], median(MonthlyIncome) for each
        later slab should be >= median for the prior slab, and all medians must be
        > 0. This ensures the computation of progression_logs = log(median_next /
        median_prev) yields finite values and a meaningful progression_index.'
      sources:
      - start_line: 36
        end_line: 42
        file: ''
      uid: b2b711ef-e38b-4b66-b9a4-96dca02d6c53
