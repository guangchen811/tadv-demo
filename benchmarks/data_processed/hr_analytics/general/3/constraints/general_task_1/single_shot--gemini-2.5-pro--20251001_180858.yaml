constraints:
  Age:
    code:
    - - .satisfies('Age - TotalWorkingYears >= 15', 'Career start age is realistic')
      - Valid
    - - .satisfies('Age >= 18', 'Age is 18 or greater')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .hasDataType('Department', 'String')
      - Invalid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isContainedIn('EmployeeCount', [1])
      - Invalid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isContainedIn('JobSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .hasDataType('MonthlyIncome', 'Integral')
      - Invalid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    - - .satisfies("CASE WHEN SalarySlab = 'Upto 5k' THEN (MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) WHEN SalarySlab = '5k-10k' THEN (MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) WHEN SalarySlab = '10k-15k' THEN (MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) WHEN SalarySlab = '15k+' THEN (MonthlyIncome > 15000) ELSE TRUE
        END", 'MonthlyIncome is consistent with SalarySlab')
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    - - .satisfies('TotalWorkingYears >= YearsAtCompany', 'TotalWorkingYears should
        be >= YearsAtCompany')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - '.satisfies(''YearsAtCompany >= YearsWithCurrManager'', ''YearsAtCompany should
        be >= YearsWithCurrManager'', lambda c: c.isNotNull())'
      - Invalid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda completeness: completeness
        >= 0.95)'
      - Valid
    - - .hasDataType('YearsWithCurrManager', 'Fractional')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
