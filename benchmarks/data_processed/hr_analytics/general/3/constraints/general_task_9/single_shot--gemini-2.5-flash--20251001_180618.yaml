constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isContainedIn('Age', list(range(18, 61)))
      - Invalid
    - - .isDataType('Age', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isPositive('Age')
      - Valid
    assumptions: []
