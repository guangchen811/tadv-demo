constraints:
  Age:
    code:
    - - .satisfies('Age >= 18', 'Age should be for an adult employee')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .satisfies("CASE WHEN AgeGroup = '18-25' THEN (Age >= 18 AND Age <= 25) WHEN
        AgeGroup = '26-35' THEN (Age > 25 AND Age <= 35) WHEN AgeGroup = '36-45' THEN
        (Age > 35 AND Age <= 45) WHEN AgeGroup = '46-55' THEN (Age > 45 AND Age <=
        55) WHEN AgeGroup = '55+' THEN (Age > 55) ELSE TRUE END", 'AgeGroup must be
        consistent with Age')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isContainedIn('EmployeeCount', ['1'])
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .satisfies("CASE WHEN JobRole IN ('Sales Executive', 'Sales Representative',
        'Healthcare Representative') THEN Department = 'Sales' WHEN JobRole IN ('Research
        Scientist', 'Laboratory Technician', 'Research Director', 'Manufacturing Director')
        THEN Department = 'Research & Development' WHEN JobRole = 'Human Resources'
        THEN Department = 'Human Resources' ELSE TRUE END", 'JobRole must map to the
        correct Department based on business rules')
      - Invalid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', ['1', '2', '3', '4'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .satisfies("CASE WHEN SalarySlab = 'Upto 5k' THEN (MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) WHEN SalarySlab = '5k-10k' THEN (MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) WHEN SalarySlab = '10k-15k' THEN (MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) WHEN SalarySlab = '15k+' THEN (MonthlyIncome > 15000) ELSE TRUE
        END", 'SalarySlab must be consistent with MonthlyIncome')
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isContainedIn('StandardHours', ['80'])
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .satisfies('YearsAtCompany <= TotalWorkingYears', 'YearsAtCompany cannot exceed
        TotalWorkingYears')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .satisfies('YearsInCurrentRole <= YearsAtCompany', 'YearsInCurrentRole cannot
        exceed YearsAtCompany')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95, ''Manager
        tenure coverage should be at least 95%'')'
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
