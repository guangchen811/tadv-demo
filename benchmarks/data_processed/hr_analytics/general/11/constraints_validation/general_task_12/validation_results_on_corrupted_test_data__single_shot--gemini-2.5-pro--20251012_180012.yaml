results:
  Age:
    code:
    - suggestion: .satisfies('Age >= 18', 'Age should be for an adult employee')
      status: true
      reason_if_failed: ''
      level: error
  AgeGroup:
    code:
    - suggestion: .satisfies("CASE WHEN AgeGroup = '18-25' THEN (Age >= 18 AND Age
        <= 25) WHEN AgeGroup = '26-35' THEN (Age > 25 AND Age <= 35) WHEN AgeGroup
        = '36-45' THEN (Age > 35 AND Age <= 45) WHEN AgeGroup = '46-55' THEN (Age
        > 45 AND Age <= 55) WHEN AgeGroup = '55+' THEN (Age > 55) ELSE TRUE END",
        'AgeGroup must be consistent with Age')
      status: true
      reason_if_failed: ''
      level: error
  Department:
    code:
    - suggestion: .isContainedIn('Department', ['Sales', 'Research & Development',
        'Human Resources'])
      status: true
      reason_if_failed: ''
      level: error
  EmployeeCount:
    code:
    - suggestion: .isContainedIn('EmployeeCount', ['1'])
      status: true
      reason_if_failed: ''
      level: error
  JobRole:
    code:
    - suggestion: .satisfies("CASE WHEN JobRole IN ('Sales Executive', 'Sales Representative',
        'Healthcare Representative') THEN Department = 'Sales' WHEN JobRole IN ('Research
        Scientist', 'Laboratory Technician', 'Research Director', 'Manufacturing Director')
        THEN Department = 'Research & Development' WHEN JobRole = 'Human Resources'
        THEN Department = 'Human Resources' ELSE TRUE END", 'JobRole must map to the
        correct Department based on business rules')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN JobRole IN (''Sales Executive'',
        ''Sales Representative'', ''Healthcare Representative'') THEN Department =
        ''Sales'' WHEN JobRole IN (''Research Scientist'', ''Laboratory Technician'',
        ''Research Director'', ''Manufacturing Director'') THEN Department = ''Research
        & Development'' WHEN JobRole = ''Human Resources'' THEN Department = ''Human
        Resources'' ELSE TRUE END", ''JobRole must map to the correct Department based
        on business rules'')'' failed on data sample: Value: 0.8962585034013606 does
        not meet the constraint requirement!'
      level: error
  Over18:
    code:
    - suggestion: .isContainedIn('Over18', ['Y'])
      status: true
      reason_if_failed: ''
      level: error
  PerformanceRating:
    code:
    - suggestion: .isContainedIn('PerformanceRating', ['1', '2', '3', '4'])
      status: true
      reason_if_failed: ''
      level: error
  SalarySlab:
    code:
    - suggestion: .satisfies("CASE WHEN SalarySlab = 'Upto 5k' THEN (MonthlyIncome
        > 0 AND MonthlyIncome <= 5000) WHEN SalarySlab = '5k-10k' THEN (MonthlyIncome
        > 5000 AND MonthlyIncome <= 10000) WHEN SalarySlab = '10k-15k' THEN (MonthlyIncome
        > 10000 AND MonthlyIncome <= 15000) WHEN SalarySlab = '15k+' THEN (MonthlyIncome
        > 15000) ELSE TRUE END", 'SalarySlab must be consistent with MonthlyIncome')
      status: true
      reason_if_failed: ''
      level: error
  StandardHours:
    code:
    - suggestion: .isContainedIn('StandardHours', ['80'])
      status: true
      reason_if_failed: ''
      level: error
  YearsAtCompany:
    code:
    - suggestion: .satisfies('YearsAtCompany <= TotalWorkingYears', 'YearsAtCompany
        cannot exceed TotalWorkingYears')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''YearsAtCompany <= TotalWorkingYears'',
        ''YearsAtCompany cannot exceed TotalWorkingYears'')'' failed on data sample:
        Value: 0.9506802721088435 does not meet the constraint requirement!'
      level: error
  YearsInCurrentRole:
    code:
    - suggestion: .satisfies('YearsInCurrentRole <= YearsAtCompany', 'YearsInCurrentRole
        cannot exceed YearsAtCompany')
      status: true
      reason_if_failed: ''
      level: error
  YearsWithCurrManager:
    code:
    - suggestion: '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95,
        ''Manager tenure coverage should be at least 95%'')'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
