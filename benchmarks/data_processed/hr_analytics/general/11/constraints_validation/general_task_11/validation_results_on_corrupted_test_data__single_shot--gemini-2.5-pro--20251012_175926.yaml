results:
  AgeGroup:
    code:
    - suggestion: .isComplete('AgeGroup')
      status: true
      reason_if_failed: ''
      level: error
  BusinessTravel:
    code:
    - suggestion: .isContainedIn('BusinessTravel', ['Travel_Rarely', 'TravelRarely',
        'Travel_Frequently', 'Non-Travel'])
      status: true
      reason_if_failed: ''
      level: error
  Department:
    code:
    - suggestion: .isContainedIn('Department', ['Research & Development', 'Sales',
        'Human Resources'])
      status: true
      reason_if_failed: ''
      level: error
  EmployeeCount:
    code:
    - suggestion: '.hasMean(''EmployeeCount'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  EmployeeNumber:
    code:
    - suggestion: .isComplete('EmployeeNumber')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('EmployeeNumber')
      status: true
      reason_if_failed: ''
      level: error
  JobLevel:
    code:
    - suggestion: .isContainedIn('JobLevel', ['1', '2', '3', '4', '5'])
      status: true
      reason_if_failed: ''
      level: error
  MonthlyIncome:
    code:
    - suggestion: .isComplete('MonthlyIncome')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('MonthlyIncome')
      status: true
      reason_if_failed: ''
      level: error
  Over18:
    code:
    - suggestion: .isContainedIn('Over18', ['Y'])
      status: true
      reason_if_failed: ''
      level: error
  PercentSalaryHike:
    code:
    - suggestion: .isNonNegative('PercentSalaryHike')
      status: true
      reason_if_failed: ''
      level: error
  PerformanceRating:
    code:
    - suggestion: .isContainedIn('PerformanceRating', ['3', '4'])
      status: true
      reason_if_failed: ''
      level: error
  SalarySlab:
    code:
    - suggestion: .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      status: true
      reason_if_failed: ''
      level: error
  StandardHours:
    code:
    - suggestion: '.hasStandardDeviation(''StandardHours'', lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
  YearsInCurrentRole:
    code:
    - suggestion: .isNonNegative('YearsInCurrentRole')
      status: true
      reason_if_failed: ''
      level: error
  YearsSinceLastPromotion:
    code:
    - suggestion: .isNonNegative('YearsSinceLastPromotion')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''YearsSinceLastPromotion'')''
        failed on data sample: Value: 0.9710884353741497 does not meet the constraint
        requirement!'
      level: error
  dataset:
    code:
    - suggestion: '.hasSize(lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
