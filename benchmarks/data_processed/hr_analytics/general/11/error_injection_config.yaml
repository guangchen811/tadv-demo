- CrossColumnInconsistency:
    Columns:
    - YearsAtCompany
    - TotalWorkingYears
    Params:
      severity: 0.05
      sampling: CAR
      column_pairs:
      - - YearsAtCompany
        - TotalWorkingYears
        - less_equal
      random_state: null
- RangeViolation:
    Columns:
    - YearsSinceLastPromotion
    Params:
      severity: 0.03
      sampling: CAR
      min_value: 0
      max_value: null
      strategy: below_min
      violation_factor: 1.5
      random_state: null
