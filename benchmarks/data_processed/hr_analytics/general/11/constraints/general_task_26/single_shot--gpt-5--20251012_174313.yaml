constraints:
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isContainedIn('BusinessTravel', ['Travel_Rarely', 'Travel_Frequently', 'Non-Travel',
        'TravelRarely'])
      - Valid
    assumptions: []
  DailyRate:
    code:
    - - .isPositive('DailyRate')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  Education:
    code:
    - - .isContainedIn('Education', [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  EducationField:
    code:
    - - .isContainedIn('EducationField', ['Life Sciences', 'Medical', 'Marketing',
        'Technical Degree', 'Human Resources', 'Other'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - '.hasUniqueness([''EmpID''], lambda v: v >= 0.95)'
      - Valid
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - '.hasMax(''EmployeeCount'', lambda v: v == 1)'
      - Valid
    - - '.hasMin(''EmployeeCount'', lambda v: v == 1)'
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - '.hasUniqueness([''EmployeeNumber''], lambda v: v >= 0.98)'
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isContainedIn('EnvironmentSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  HourlyRate:
    code:
    - - .isPositive('HourlyRate')
      - Valid
    assumptions: []
  JobInvolvement:
    code:
    - - .isContainedIn('JobInvolvement', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  JobLevel:
    code:
    - - .hasDataType('JobLevel', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', [1, 2, 3, 4, 5])
      - Invalid
    - - .isPositive('JobLevel')
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .isContainedIn('JobRole', ['Sales Executive', 'Sales Representative', 'Research
        Scientist', 'Laboratory Technician', 'Manufacturing Director', 'Healthcare
        Representative', 'Human Resources', 'Manager', 'Research Director'])
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isContainedIn('JobSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .hasDataType('MonthlyIncome', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyRate:
    code:
    - - .isPositive('MonthlyRate')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .hasDataType('PerformanceRating', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    - - .isPositive('PerformanceRating')
      - Valid
    assumptions: []
  RelationshipSatisfaction:
    code:
    - - .isContainedIn('RelationshipSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .hasDataType('SalarySlab', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    - - '.satisfies("(SalarySlab = ''Upto 5k'' AND MonthlyIncome <= 5000) OR (SalarySlab
        = ''5k-10k'' AND MonthlyIncome BETWEEN 5001 AND 10000) OR (SalarySlab = ''10k-15k''
        AND MonthlyIncome BETWEEN 10001 AND 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome
        > 15000)", ''slab_income_alignment'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - '.hasMax(''StandardHours'', lambda v: v == 80)'
      - Valid
    - - '.hasMin(''StandardHours'', lambda v: v == 80)'
      - Valid
    assumptions: []
  StockOptionLevel:
    code:
    - - .isContainedIn('StockOptionLevel', [0, 1, 2, 3])
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .hasDataType('TotalWorkingYears', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    - - '.satisfies(''TotalWorkingYears >= YearsAtCompany'', ''twy_ge_yac'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  TrainingTimesLastYear:
    code:
    - - .isContainedIn('TrainingTimesLastYear', [0, 1, 2, 3, 4, 5, 6])
      - Invalid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isContainedIn('WorkLifeBalance', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .hasDataType('YearsAtCompany', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .hasDataType('YearsSinceLastPromotion', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    - - '.satisfies(''YearsSinceLastPromotion <= YearsAtCompany'', ''yslp_le_yac'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda v: v >= 0.95)'
      - Valid
    assumptions: []
  id:
    code:
    - - '.hasUniqueness([''id''], lambda v: v >= 0.95)'
      - Valid
    assumptions: []
