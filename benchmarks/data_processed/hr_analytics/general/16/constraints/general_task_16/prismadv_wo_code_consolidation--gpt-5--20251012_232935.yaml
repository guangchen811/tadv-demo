        in the pipeline and the semantics of a years counter. Example Deequ checks:
        .isNonNegative(''TotalWorkingYears'') and .satisfies(''CASE WHEN `TotalWorkingYears`
        IS NULL THEN 1 ELSE CASE WHEN `TotalWorkingYears` = floor(`TotalWorkingYears`)
