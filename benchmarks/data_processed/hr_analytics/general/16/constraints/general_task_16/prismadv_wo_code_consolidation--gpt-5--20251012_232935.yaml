    - text: 'All ''WorkLifeBalance'' values should be numeric-parseable. The code
        coerces non-numeric values to NaN via to_numeric(errors=''coerce''), and no
        imputation is applied before scoring; non-numeric values would propagate as
        NaN into downstream scores. Example validation (Deequ): .satisfies(''CASE
        WHEN TRY_CAST(WorkLifeBalance AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END'',
        ''WLB numeric'', lambda x: x == 1.0).'
      sources:
      - start_line: 23
        end_line: 27
        file: ''
      - start_line: 90
        end_line: 92
        file: ''
      uid: eb902217-895d-46e8-b1b7-a407b610df7a
    - text: 'The ''WorkLifeBalance'' column should be complete (no nulls). Nulls would
        yield NaN for WLBScore and consequently NaN AttritionRiskScore/RiskTier. Example
        validation (Deequ): .hasCompleteness(''WorkLifeBalance'', lambda x: x == 1.0).'
      sources:
      - start_line: 92
        end_line: 92
        file: ''
      - start_line: 126
        end_line: 141
        file: ''
      uid: 0ee91b69-8d85-4608-bad5-74b42e92809e
    - text: 'The valid domain for ''WorkLifeBalance'' is the 4-point Likert scale
        {1, 2, 3, 4}. Values outside [1,4] get clipped in normalization and should
        be absent. Also, the distinct non-null value count should be at most 4. Example
        validations: (a) Deequ .satisfies(''CASE WHEN WorkLifeBalance IN (1,2,3,4)
        THEN 1 ELSE 0 END'', ''WLB domain'', lambda x: x == 1.0); (b) Great Expectations
        expect_column_unique_value_count_to_be_between(''WorkLifeBalance'', min_value=1,
        max_value=4).'
      sources:
      - start_line: 92
        end_line: 92
        file: ''
      uid: ada07cc4-0b86-452c-917b-55baf0ca17d9
    - text: "Higher 'WorkLifeBalance' values must indicate better balance (monotonic\
        \ higher-is-better orientation). The normalization maps 1\u21920 and 4\u2192\
        1 and the model weight for WLB is negative, so higher values reduce risk.\
        \ A practical proxy check is to enforce min(WorkLifeBalance)=1 and max(WorkLifeBalance)=4.\
        \ Example validations: (a) Great Expectations expect_column_min_to_be_between('WorkLifeBalance',\
        \ min_value=1, max_value=1); (b) expect_column_max_to_be_between('WorkLifeBalance',\
        \ min_value=4, max_value=4)."
