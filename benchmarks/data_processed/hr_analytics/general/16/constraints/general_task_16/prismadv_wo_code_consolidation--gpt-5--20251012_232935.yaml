    - text: 'MonthlyIncome must be consistent with SalarySlab boundaries for every
        row: if SalarySlab = ''Upto 5k'' then 0 <= MonthlyIncome <= 5000; if ''5k-10k''
        then 5001 <= MonthlyIncome <= 10000; if ''10k-15k'' then 10001 <= MonthlyIncome
        <= 15000; if ''15k+'' then MonthlyIncome >= 15001. We could represent this
