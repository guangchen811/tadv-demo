  '["YearsAtCompany","YearsInCurrentRole"]':
    code:
    - suggestion: '.isLessThanOrEqualTo("YearsInCurrentRole", "YearsAtCompany", lambda
        v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 09be5274-0413-431d-bc2a-eae75c053de4
      source_assumptions:
      - 6b081a89-2e63-425f-97b6-8cb0ea1e1564
    - suggestion: '.satisfies("(YearsAtCompany > 0) OR (coalesce(YearsInCurrentRole,
        0) = 0 AND coalesce(YearsWithCurrManager, 0) = 0 AND coalesce(YearsSinceLastPromotion,
        0) = 0)", "yac_zero_implies_others_zero", lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 30c61ba3-f6ce-455a-85f2-d8de635f92a8
      source_assumptions:
      - 22c8e148-1205-4534-b337-b5887065c12a
    - suggestion: '.satisfies("coalesce(YearsWithCurrManager, 0) <= YearsAtCompany
        AND coalesce(YearsSinceLastPromotion, 0) <= YearsAtCompany", "mgr_promo_leq_yac",
        lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 4e51336e-bd5f-4035-a1fa-2e08a2cda953
      source_assumptions:
      - a66ef272-2f48-4a61-be0d-2bd6c23c1c4e
    - suggestion: '.satisfies("TotalWorkingYears IS NULL OR YearsAtCompany <= TotalWorkingYears",
        "yac_leq_total", lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 321ae772-18ce-4745-82e7-acc76a20ec62
      source_assumptions:
      - 2b8880c5-38f6-4713-b939-294414dcc5b0
    assumptions:
    - text: 'YearsInCurrentRole must be less than or equal to YearsAtCompany for all
        rows (so the RoleTenureRatio = YearsInCurrentRole / YearsAtCompany naturally
        lies in [0,1] without relying on clipping). Deequ example: .hasCompliance("role_not_exceed_company",
        "YearsInCurrentRole <= YearsAtCompany")'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      uid: 6b081a89-2e63-425f-97b6-8cb0ea1e1564
    - text: 'If YearsAtCompany equals 0, then YearsInCurrentRole, YearsWithCurrManager,
        and YearsSinceLastPromotion should all be 0 (or nulls that are treated as
        0). This ensures tenure ratios are well-defined when avoiding divide-by-zero.
        Deequ example: .hasCompliance("yac_zero_implies_others_zero", "(YearsAtCompany
        > 0) OR (coalesce(YearsInCurrentRole, 0) = 0 AND coalesce(YearsWithCurrManager,
        0) = 0 AND coalesce(YearsSinceLastPromotion, 0) = 0)")'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      uid: 22c8e148-1205-4534-b337-b5887065c12a
    - text: 'YearsWithCurrManager and YearsSinceLastPromotion must not exceed YearsAtCompany.
        Deequ example: .hasCompliance("mgr_promo_leq_yac", "coalesce(YearsWithCurrManager,
        0) <= YearsAtCompany AND coalesce(YearsSinceLastPromotion, 0) <= YearsAtCompany")'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      uid: a66ef272-2f48-4a61-be0d-2bd6c23c1c4e
    - text: 'YearsAtCompany must be less than or equal to TotalWorkingYears when both
        are present. Deequ example: .hasCompliance("yac_leq_total", "TotalWorkingYears
        IS NULL OR YearsAtCompany <= TotalWorkingYears")'
      sources:
      - start_line: 76
        end_line: 77
        file: ''
      uid: 2b8880c5-38f6-4713-b939-294414dcc5b0
    - text: 'MonthlyIncome should be consistent with SalarySlab bounds for each row.
        For example: if SalarySlab=''Upto 5k'' then 0 <= MonthlyIncome <= 5000; ''5k-10k''
        then 5001 <= MonthlyIncome <= 10000; ''10k-15k'' then 10001 <= MonthlyIncome
        <= 15000; ''15k+'' then MonthlyIncome >= 15001. Deequ example: .hasCompliance("income_within_slab_bounds",
        "(SalarySlab = ''Upto 5k'' AND MonthlyIncome BETWEEN 0 AND 5000) OR (SalarySlab
        = ''5k-10k'' AND MonthlyIncome BETWEEN 5001 AND 10000) OR (SalarySlab = ''10k-15k''
        AND MonthlyIncome BETWEEN 10001 AND 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome
        >= 15001)")'
      sources:
      - start_line: 30
        end_line: 37
        file: ''
      - start_line: 65
        end_line: 74
        file: ''
      uid: 29ec08fb-ce8f-4b34-9dc5-3448259852c0
    - text: 'AgeGroup must match the bucket implied by Age using the configured bounds.
        For example: if 18 <= Age <= 25 then AgeGroup=''18-25''; 26 <= Age <= 35 =>
        ''26-35''; 36-45 => ''36-45''; 46-55 => ''46-55''; Age >= 55 => ''55+''. Deequ
        example: .hasCompliance("agegroup_matches_age", "(Age BETWEEN 18 AND 25 AND
        AgeGroup = ''18-25'') OR (Age BETWEEN 26 AND 35 AND AgeGroup = ''26-35'')
        OR (Age BETWEEN 36 AND 45 AND AgeGroup = ''36-45'') OR (Age BETWEEN 46 AND
        55 AND AgeGroup = ''46-55'') OR (Age >= 55 AND AgeGroup = ''55+'')")'
      sources:
      - start_line: 38
        end_line: 57
        file: ''
      - start_line: 61
        end_line: 63
        file: ''
      uid: 2359e6f9-517b-45a1-b670-1ea82f73d9c9
    - text: 'RiskTier must be consistent with AttritionRiskScore binning: Low for
        score in [0.0, 0.35], Medium for (0.35, 0.60], High for (0.60, 1.0]. Deequ
        example: .hasCompliance("tier_matches_score", "(AttritionRiskScore >= 0.0
        AND AttritionRiskScore <= 0.35 AND RiskTier = ''Low'') OR (AttritionRiskScore
        > 0.35 AND AttritionRiskScore <= 0.60 AND RiskTier = ''Medium'') OR (AttritionRiskScore
        > 0.60 AND AttritionRiskScore <= 1.0 AND RiskTier = ''High'')")'
      sources:
      - start_line: 143
        end_line: 145
        file: ''
      uid: 1c7d7393-349d-4db2-93c8-8facd1d21192
  '["YearsAtCompany","YearsInCurrentRole","YearsSinceLastPromotion","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'Tenure ratios assume bounded numerators: For rows with YearsAtCompany
        > 0, each of the following ratios must be in [0,1]: YearsInCurrentRole/YearsAtCompany,
        YearsSinceLastPromotion/YearsAtCompany, and coalesce(YearsWithCurrManager,0)/YearsAtCompany.
        This avoids relying on downstream clipping and ensures meaningful ratios.
        Deequ example: .satisfies("case when YearsAtCompany > 0 then YearsInCurrentRole/YearsAtCompany
        between 0 and 1 else true end", "RoleTenureRatio_bounded").satisfies("case
        when YearsAtCompany > 0 then YearsSinceLastPromotion/YearsAtCompany between
        0 and 1 else true end", "SincePromoRatio_bounded").satisfies("case when YearsAtCompany
        > 0 then coalesce(YearsWithCurrManager,0)/YearsAtCompany between 0 and 1 else
        true end", "MgrTenureRatio_bounded")'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      - start_line: 20
        end_line: 27
        file: ''
      uid: b4e3b1a0-063e-4743-a065-d3c6e204d3a8
    - text: 'Zero-tenure consistency: If YearsAtCompany = 0, then YearsInCurrentRole
        = 0 and YearsSinceLastPromotion = 0 and coalesce(YearsWithCurrManager,0) =
        0. This mirrors the downstream handling that avoids divide-by-zero and sets
        ratios to 0. Deequ example: .satisfies("case when YearsAtCompany = 0 then
        coalesce(YearsInCurrentRole,0)=0 and coalesce(YearsSinceLastPromotion,0)=0
        and coalesce(YearsWithCurrManager,0)=0 else true end", "ZeroTenure_consistency")'
      sources:
      - start_line: 81
        end_line: 85
        file: ''
      uid: 0d2c28a2-0e71-4b63-809e-1f0341dd390a
    - text: 'Company tenure cannot exceed total working years: YearsAtCompany <= TotalWorkingYears
        for all rows (both non-negative). This aligns tenure logic used for ratios
        and prevents impossible tenures. Deequ example: .satisfies("YearsAtCompany
        <= TotalWorkingYears and YearsAtCompany >= 0 and TotalWorkingYears >= 0",
        "YAC_le_Total")'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 76
        end_line: 78
        file: ''
      uid: ff0ded65-8286-429c-b65d-9a1e6b85ab17
    - text: 'Salary slab must be consistent with MonthlyIncome: MonthlyIncome should
        fall within the declared SalarySlab bounds. Deequ example: .satisfies("case
        when SalarySlab = ''Upto 5k'' then MonthlyIncome between 0 and 5000 when SalarySlab
        = ''5k-10k'' then MonthlyIncome between 5001 and 10000 when SalarySlab = ''10k-15k''
        then MonthlyIncome between 10001 and 15000 when SalarySlab = ''15k+'' then
        MonthlyIncome >= 15001 else false end", "MonthlyIncome_within_SalarySlab")'
      sources:
      - start_line: 30
        end_line: 37
        file: ''
      - start_line: 65
        end_line: 74
        file: ''
      uid: 32d81a3f-efae-4489-8014-572b04f2e330
    - text: 'AgeGroup must match the Age-derived bucket: For each row, AgeGroup must
        equal the bucket implied by Age using the configured bounds (18-25, 26-35,
        36-45, 46-55, 55+). Deequ example: .satisfies("case when Age between 18 and
        25 then AgeGroup = ''18-25'' when Age between 26 and 35 then AgeGroup = ''26-35''
        when Age between 36 and 45 then AgeGroup = ''36-45'' when Age between 46 and
        55 then AgeGroup = ''46-55'' when Age >= 55 then AgeGroup = ''55+'' else false
        end", "AgeGroup_consistent_with_Age")'
      sources:
      - start_line: 38
        end_line: 56
        file: ''
      - start_line: 61
        end_line: 63
        file: ''
      uid: ccef49be-a04b-443f-b6dc-533f005692b1
    - text: 'RiskTier must be consistent with AttritionRiskScore binning used downstream:
        If AttritionRiskScore in [0.0, 0.35] then RiskTier = ''Low''; if (0.35, 0.60]
        then ''Medium''; if (0.60, 1.0] then ''High''. Deequ example: .satisfies("case
        when AttritionRiskScore >= 0 and AttritionRiskScore <= 0.35 then RiskTier=''Low''
        when AttritionRiskScore > 0.35 and AttritionRiskScore <= 0.60 then RiskTier=''Medium''
        when AttritionRiskScore > 0.60 and AttritionRiskScore <= 1.0 then RiskTier=''High''
        else false end", "RiskTier_matches_score_bins")'
      sources:
      - start_line: 126
        end_line: 140
        file: ''
      - start_line: 142
        end_line: 145
        file: ''
      uid: fb7354ef-4d34-4d24-ac9e-a08a7939ea6e
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'Tenure subcomponents must be within total company tenure: 0 <= YearsInCurrentRole,
        YearsSinceLastPromotion, YearsWithCurrManager <= YearsAtCompany. Example Deequ:
        .satisfies(''YearsInCurrentRole >= 0 AND YearsSinceLastPromotion >= 0 AND
        YearsWithCurrManager >= 0 AND YearsInCurrentRole <= YearsAtCompany AND YearsSinceLastPromotion
        <= YearsAtCompany AND YearsWithCurrManager <= YearsAtCompany'', ''tenure_parts_within_yac'')'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      uid: 903e7659-ec07-456c-b69a-79093de7c8ed
    - text: 'If YearsAtCompany == 0 then YearsInCurrentRole, YearsSinceLastPromotion,
        and YearsWithCurrManager are 0 or null. Example Deequ: .satisfies(''(YearsAtCompany
        <> 0) OR (coalesce(YearsInCurrentRole,0)=0 AND coalesce(YearsSinceLastPromotion,0)=0
        AND coalesce(YearsWithCurrManager,0)=0)'', ''zero_yac_implies_zero_subtenures'')'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      uid: 13a755d9-2f1e-485f-8dfc-91ddc7c289dc
    - text: 'Company tenure cannot exceed total working experience: 0 <= YearsAtCompany
        <= TotalWorkingYears. Example Deequ: .satisfies(''YearsAtCompany >= 0 AND
        TotalWorkingYears >= 0 AND YearsAtCompany <= TotalWorkingYears'', ''yac_le_total'')'
      sources:
      - start_line: 76
        end_line: 77
        file: ''
      uid: 66e27c10-73fc-43c2-b1c1-7a4e0d44a646
    - text: 'MonthlyIncome must be consistent with SalarySlab bounds when MonthlyIncome
        is not null. Example Deequ: .satisfies(''(MonthlyIncome IS NULL) OR ((SalarySlab
        = ''''Upto 5k'''' AND MonthlyIncome BETWEEN 0 AND 5000) OR (SalarySlab = ''''5k-10k''''
        AND MonthlyIncome BETWEEN 5001 AND 10000) OR (SalarySlab = ''''10k-15k''''
        AND MonthlyIncome BETWEEN 10001 AND 15000) OR (SalarySlab = ''''15k+'''' AND
        MonthlyIncome >= 15001))'', ''income_within_slab_bounds'')'
      sources:
      - start_line: 30
        end_line: 37
        file: ''
      - start_line: 66
        end_line: 74
        file: ''
      uid: bfe7f2fe-780d-4a48-b5b7-8fef22bbea18
    - text: 'AgeGroup should match the Age-derived range when Age is present. Example
        Deequ: .satisfies(''(Age IS NULL) OR ((Age BETWEEN 18 AND 25 AND AgeGroup
        = ''''18-25'''') OR (Age BETWEEN 26 AND 35 AND AgeGroup = ''''26-35'''') OR
        (Age BETWEEN 36 AND 45 AND AgeGroup = ''''36-45'''') OR (Age BETWEEN 46 AND
        55 AND AgeGroup = ''''46-55'''') OR (Age >= 55 AND AgeGroup = ''''55+''''))'',
        ''agegroup_matches_age'')'
      sources:
      - start_line: 38
        end_line: 56
        file: ''
      - start_line: 61
        end_line: 63
        file: ''
      uid: 78a090d8-77c5-42eb-bf94-4976368f0ccd
    - text: 'RiskTier must correspond to AttritionRiskScore bins: [0,0.35] -> Low,
        (0.35,0.60] -> Medium, (0.60,1.0] -> High. Example Deequ: .satisfies(''((AttritionRiskScore
        >= 0 AND AttritionRiskScore <= 0.35 AND RiskTier = ''''Low'''') OR (AttritionRiskScore
        > 0.35 AND AttritionRiskScore <= 0.60 AND RiskTier = ''''Medium'''') OR (AttritionRiskScore
        > 0.60 AND AttritionRiskScore <= 1.0 AND RiskTier = ''''High''''))'', ''tier_matches_score'')'
      sources:
      - start_line: 140
        end_line: 145
        file: ''
      uid: 6b299e11-dd4f-4c44-b004-e1336ae3bb92
    - text: 'AgeGroupOrd must be the ordinal encoding of AgeGroup per the defined
        mapping. Example Deequ: .satisfies(''((AgeGroup = ''''18-25'''' AND AgeGroupOrd
        = 1) OR (AgeGroup = ''''26-35'''' AND AgeGroupOrd = 2) OR (AgeGroup = ''''36-45''''
        AND AgeGroupOrd = 3) OR (AgeGroup = ''''46-55'''' AND AgeGroupOrd = 4) OR
        (AgeGroup = ''''55+'''' AND AgeGroupOrd = 5) OR (AgeGroup IS NULL AND AgeGroupOrd
        IS NULL))'', ''agegroup_ord_consistency'')'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      - start_line: 61
        end_line: 63
        file: ''
      uid: 12e4a508-316d-4cef-bdef-35fa1bc8d015
  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'Manager tenure cannot exceed company tenure and cannot be negative. Additionally,
        if YearsAtCompany = 0, then YearsWithCurrManager must be 0 or NULL. Example
        Deequ constraint: .satisfies("CASE WHEN YearsAtCompany > 0 THEN (coalesce(YearsWithCurrManager,
        0) >= 0 AND coalesce(YearsWithCurrManager, 0) <= YearsAtCompany) ELSE (YearsWithCurrManager
        IS NULL OR YearsWithCurrManager = 0) END", "mgr_tenure_within_company")'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      - start_line: 126
        end_line: 140
        file: ''
      uid: a7e2fd8e-84b9-4ad7-bc2b-5840657628df
    - text: 'If YearsWithCurrManager > 0, then YearsAtCompany must be > 0 (no positive
        manager-tenure when company-tenure is zero). Example Deequ constraint: .satisfies("NOT
        (coalesce(YearsWithCurrManager, 0) > 0 AND YearsAtCompany = 0)", "no_mgr_tenure_without_company_tenure")'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      uid: 3d708da2-c4af-467d-b114-73c96eeb7b99
    - text: 'Company tenure should be at least as large as tenure with current manager,
        years in current role, and years since last promotion. Example Deequ constraint:
        .satisfies("YearsAtCompany >= coalesce(YearsWithCurrManager, 0) AND YearsAtCompany
        >= coalesce(YearsInCurrentRole, 0) AND YearsAtCompany >= coalesce(YearsSinceLastPromotion,
        0)", "tenure_not_less_than_components")'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      - start_line: 126
        end_line: 140
        file: ''
      uid: 76cccae9-4550-4f23-9e52-7506c1b2ed69
    - text: 'Conditional completeness: For rows with YearsAtCompany > 0, YearsWithCurrManager
        should be non-null. Example Deequ constraint: .satisfies("CASE WHEN YearsAtCompany
        > 0 THEN YearsWithCurrManager IS NOT NULL ELSE TRUE END", "mgr_tenure_present_when_company_tenure_positive")'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      uid: a05b81f5-0f20-49a3-8e9c-b59a714f125e
