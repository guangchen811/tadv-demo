fixing_results:
  AgeGroup:
    606550a9-3005-40f5-9c9c-0c09a4b8a5d1: '.hasApproxCountDistinct(''AgeGroup'', lambda
      v: v <= 5)'
  WorkLifeBalance:
    65ffc8fb-cadc-484a-a4d6-f918ff79f198: '.isContainedIn(''WorkLifeBalance'', [''1'',
      ''2'', ''3'', ''4''], lambda x: x == 1.0)'
  YearsWithCurrManager:
    9d83ed5d-351e-4c57-a34d-2685139cf03b: '.satisfies("`YearsWithCurrManager` IS NULL
      OR CAST(`YearsWithCurrManager` AS DOUBLE) IS NOT NULL", "Mgr years numeric or
      null", lambda x: x >= 0.99)'
    94f9f685-2d38-4cef-9487-0a18122a2c05: '.satisfies("CASE WHEN `YearsAtCompany`
      = 0 THEN COALESCE(`YearsWithCurrManager`, 0.0) = 0.0 ELSE TRUE END", "Zero YAC
      implies zero mgr years", lambda x: x == 1.0)'
  EnvironmentSatisfaction:
    0e8b30ad-0694-42c2-8297-67fb2709c37e: '.isContainedIn(''EnvironmentSatisfaction'',
      [''1'', ''2'', ''3'', ''4''], lambda x: x == 1.0)'
  JobSatisfaction:
    0b19ec3a-8c05-4f3f-9133-83405589323f: .isComplete('JobSatisfaction')
    cdc0a8ee-cdec-4c46-8b84-ef443c13c682: '.isContainedIn(''JobSatisfaction'', [''1'',
      ''2'', ''3'', ''4''], lambda x: x == 1.0)'
  '["MonthlyIncome","SalarySlab"]':
    27d1dbfc-dfa9-400c-803f-2f6e6ff617bd: '.satisfies("SalarySlab != ''Upto 5k'' OR
      MonthlyIncome > 0", "MonthlyIncome_gt_0_for_upto5k", lambda v: v == 1.0)'
    52243014-c1b1-4e80-bab0-071c55e1bb11: '.satisfies("SalarySlab != ''5k-10k'' OR
      MonthlyIncome IS NOT NULL", "MonthlyIncome_complete_in_5k_10k", lambda v: v
      == 1.0)'
    516b6560-d986-4ef5-b229-225070cac284: '.satisfies("SalarySlab = ''10k-15k'' AND
      MonthlyIncome IS NOT NULL", "MonthlyIncome non-null when SalarySlab is 10k-15k",
      lambda d: d > 0.0)'
  SalarySlab:
    cdfa5871-d0af-4042-895a-c498e1499174: '.hasCompleteness(''MonthlyIncome'', lambda
      v: v > 0.0).where("SalarySlab = ''15k+''")'
