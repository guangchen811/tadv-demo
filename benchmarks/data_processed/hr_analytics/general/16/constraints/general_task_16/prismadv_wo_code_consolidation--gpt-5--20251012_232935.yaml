  '["TotalWorkingYears","YearsAtCompany"]':
    code: []
    assumptions:
    - text: 'For every record, YearsAtCompany must be less than or equal to TotalWorkingYears.
        This reflects feasible employment history and prevents impossible tenure combinations.
        Deequ example: .satisfies(''YearsAtCompany <= TotalWorkingYears'', ''yac_le_total'',
        r => r == 1.0)'
      sources:
      - start_line: 76
        end_line: 77
        file: ''
      - start_line: 75
        end_line: 85
        file: ''
      uid: c2b858ef-6323-470b-904c-09e2ce0f05bc
    - text: 'Tenure sub-components must not exceed overall company tenure: YearsInCurrentRole
        <= YearsAtCompany, coalesce(YearsWithCurrManager, 0) <= YearsAtCompany, and
        YearsSinceLastPromotion <= YearsAtCompany. These bounds are assumed when computing
        ratios clipped to [0,1]. Deequ examples: .satisfies(''YearsInCurrentRole <=
        YearsAtCompany'', ''role_le_yac'', r => r == 1.0); .satisfies(''coalesce(YearsWithCurrManager,
        0) <= YearsAtCompany'', ''mgr_le_yac'', r => r == 1.0); .satisfies(''YearsSinceLastPromotion
        <= YearsAtCompany'', ''promo_le_yac'', r => r == 1.0)'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      uid: 3ec40a13-6a71-413a-8f4e-5f9a50780b11
    - text: 'If YearsAtCompany equals 0, then YearsInCurrentRole, YearsWithCurrManager,
        and YearsSinceLastPromotion should be 0 or null (no tenure components when
        there is no company tenure). Deequ example: .satisfies(''CASE WHEN YearsAtCompany
        = 0 THEN coalesce(YearsInCurrentRole, 0) = 0 AND coalesce(YearsWithCurrManager,
        0) = 0 AND coalesce(YearsSinceLastPromotion, 0) = 0 ELSE true END'', ''zero_yac_implies_zero_components'',
        r => r == 1.0)'
      sources:
      - start_line: 81
        end_line: 85
        file: ''
      uid: 04ecf7b6-5787-4e5c-96c3-57a94deb87c9
    - text: "MonthlyIncome must align with its SalarySlab range. For example: Upto\
        \ 5k => 0\u20135000, 5k-10k => 5001\u201310000, 10k-15k => 10001\u201315000,\
        \ 15k+ => >=15001. Deequ example: .satisfies(\"CASE WHEN SalarySlab = 'Upto\
        \ 5k' THEN MonthlyIncome BETWEEN 0 AND 5000 WHEN SalarySlab = '5k-10k' THEN\
        \ MonthlyIncome BETWEEN 5001 AND 10000 WHEN SalarySlab = '10k-15k' THEN MonthlyIncome\
        \ BETWEEN 10001 AND 15000 WHEN SalarySlab = '15k+' THEN MonthlyIncome >= 15001\
        \ ELSE false END\", 'income_within_slab', r => r == 1.0)"
      sources:
      - start_line: 30
        end_line: 37
        file: ''
      - start_line: 65
        end_line: 74
        file: ''
      uid: 255cc9e1-3203-448a-9ea6-dde30ed4832e
    - text: "Age must be consistent with AgeGroup. Specifically: 18\u201325 => '18-25',\
        \ 26\u201335 => '26-35', 36\u201345 => '36-45', 46\u201355 => '46-55', >=55\
        \ => '55+'. Deequ example: .satisfies(\"CASE WHEN Age BETWEEN 18 AND 25 THEN\
        \ AgeGroup = '18-25' WHEN Age BETWEEN 26 AND 35 THEN AgeGroup = '26-35' WHEN\
        \ Age BETWEEN 36 AND 45 THEN AgeGroup = '36-45' WHEN Age BETWEEN 46 AND 55\
        \ THEN AgeGroup = '46-55' WHEN Age >= 55 THEN AgeGroup = '55+' ELSE AgeGroup\
        \ IS NULL END\", 'age_matches_group', r => r == 1.0)"
      sources:
      - start_line: 38
        end_line: 56
        file: ''
      - start_line: 61
        end_line: 63
        file: ''
      uid: 44ae7653-a202-45df-b350-ce91335f25e3
  '["TotalWorkingYears","YearsAtCompany","YearsInCurrentRole","YearsSinceLastPromotion","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'YearsAtCompany must be at least as large as each of YearsInCurrentRole,
        YearsWithCurrManager (treat null as 0), and YearsSinceLastPromotion. This
        keeps the tenure-based ratios in [0,1] without relying on clipping. Deequ
        example: .satisfies("greatest(YearsInCurrentRole, coalesce(YearsWithCurrManager,
        0.0), YearsSinceLastPromotion) <= YearsAtCompany", "tenure_components_le_company",
        assertionLevel=1.0)'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      - start_line: 20
        end_line: 27
        file: ''
      uid: ba1f206f-5baa-4043-9212-3d31eb431374
    - text: 'YearsAtCompany must be less than or equal to TotalWorkingYears for all
        records (company tenure cannot exceed total experience). Deequ example: .satisfies("YearsAtCompany
        <= TotalWorkingYears", "yac_le_total", assertionLevel=1.0)'
      sources:
      - start_line: 76
        end_line: 78
        file: ''
      - start_line: 20
        end_line: 27
        file: ''
      uid: 70f20641-4002-4e3d-91d3-baa737481766
    - text: 'If YearsAtCompany equals 0, then YearsInCurrentRole and YearsSinceLastPromotion
        must be 0, and YearsWithCurrManager must be null or 0. This matches the safe-ratio
        handling that sets ratios to 0 when the denominator is 0. Deequ example: .satisfies("(YearsAtCompany
        <> 0) OR (YearsInCurrentRole = 0 AND YearsSinceLastPromotion = 0 AND coalesce(YearsWithCurrManager,
        0.0) = 0)", "zero_yac_implies_zero_tenures", assertionLevel=1.0)'
      sources:
      - start_line: 80
        end_line: 85
        file: ''
      uid: b9e080af-41f0-41ac-8db2-3d914c73944d
    - text: 'MonthlyIncome must be consistent with SalarySlab bounds. For non-null
        MonthlyIncome, enforce: Upto 5k -> [0,5000]; 5k-10k -> [5001,10000]; 10k-15k
        -> [10001,15000]; 15k+ -> >=15001. Deequ example: .satisfies("MonthlyIncome
        IS NULL OR (case when SalarySlab = ''Upto 5k'' then MonthlyIncome >= 0 AND
        MonthlyIncome <= 5000 when SalarySlab = ''5k-10k'' then MonthlyIncome >= 5001
        AND MonthlyIncome <= 10000 when SalarySlab = ''10k-15k'' then MonthlyIncome
        >= 10001 AND MonthlyIncome <= 15000 when SalarySlab = ''15k+'' then MonthlyIncome
        >= 15001 else false end)", "income_matches_slab", assertionLevel=1.0)'
      sources:
      - start_line: 30
        end_line: 36
        file: ''
      - start_line: 65
        end_line: 74
        file: ''
      uid: c5e1a4e8-8602-4bd6-8bf4-ca9e43aa616f
    - text: 'Age must be consistent with AgeGroup. For rows with both fields present:
        18-25 -> 18<=Age<=25; 26-35 -> 26<=Age<=35; 36-45 -> 36<=Age<=45; 46-55 ->
        46<=Age<=55; 55+ -> Age>=55. Deequ example: .satisfies("Age IS NULL OR AgeGroup
        IS NULL OR (case when AgeGroup=''18-25'' then Age between 18 and 25 when AgeGroup=''26-35''
        then Age between 26 and 35 when AgeGroup=''36-45'' then Age between 36 and
        45 when AgeGroup=''46-55'' then Age between 46 and 55 when AgeGroup=''55+''
        then Age >= 55 else false end)", "age_matches_group", assertionLevel=1.0)'
      sources:
      - start_line: 38
        end_line: 46
        file: ''
      - start_line: 47
        end_line: 56
        file: ''
      - start_line: 61
        end_line: 63
