    assumptions:
    - text: 'Age should be numeric/parsable and non-null for most rows (at least 95%).
        The code coerces Age to numeric and then uses it to compute DerivedAgeGroup,
        AgeNorm, and to include Age in the output; widespread non-numeric or null
        values would degrade these steps. This could be represented as: Deequ completeness("Age")
        >= 0.95, and/or satisfies("CASE WHEN CAST(Age AS DOUBLE) IS NOT NULL THEN
        1 ELSE 0 END", "Age numeric", lambda x: x >= 0.95).'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 148
        end_line: 156
        file: ''
      uid: ef2c9f51-c97f-4a95-9dbd-9042d78c514d
    - text: 'Age should be at least 18 for all rows (no minors). The age grouping
        logic only defines buckets starting at 18 and AgeNorm subtracts 18, implying
        values below 18 are unexpected. This can be expressed as: Deequ satisfies("CASE
        WHEN Age < 18 THEN 0 ELSE 1 END", "Minimum Age", lambda x: x == 1) or Great
        Expectations expect_column_min_to_be_greater_than_or_equal_to(18).'
      sources:
      - start_line: 38
        end_line: 46
        file: ''
      - start_line: 47
        end_line: 56
        file: ''
      - start_line: 63
        end_line: 63
        file: ''
      uid: a2a7bac7-9c69-44f2-b664-b5b87102a127
    - text: 'Most Age values should be within [18, 70] so the AgeNorm computation
        falls in [0,1]. Allow a small fraction of outliers (e.g., at least 95% of
        rows must have Age <= 70). This can be expressed as: Deequ satisfies("CASE
        WHEN Age <= 70 THEN 1 ELSE 0 END", "Age upper bound for normalization", lambda
        x: x >= 0.95) together with the minimum-age check.'
      sources:
      - start_line: 63
        end_line: 63
        file: ''
      - start_line: 38
        end_line: 46
        file: ''
      uid: a38ca56e-50fa-4b85-b994-faba76f23166
    - text: 'Age should be consistent with the provided AgeGroup: the DerivedAgeGroup
        computed from Age should match the input AgeGroup for at least 95% of rows.
        This ensures the two fields are aligned for downstream risk that uses AgeGroup.
        This can be represented as: Deequ satisfies("CASE WHEN Age IS NULL THEN 1
        WHEN (CASE WHEN Age >= 55 THEN ''55+'' WHEN Age BETWEEN 18 AND 25 THEN ''18-25''
        WHEN Age BETWEEN 26 AND 35 THEN ''26-35'' WHEN Age BETWEEN 36 AND 45 THEN
        ''36-45'' WHEN Age BETWEEN 46 AND 55 THEN ''46-55'' ELSE NULL END) = AgeGroup
        THEN 1 ELSE 0 END", "Age vs AgeGroup consistency", lambda x: x >= 0.95).'
      sources:
      - start_line: 38
        end_line: 46
        file: ''
      - start_line: 61
        end_line: 62
        file: ''
      uid: f1693e85-274e-4c6a-8b7e-9c5dbd54b019
  '["Age","AgeGroup"]':
    code: []
    assumptions:
    - text: 'AgeGroup must be consistent with Age according to the banding used in
        the code: 18-25 -> ''18-25''; 26-35 -> ''26-35''; 36-45 -> ''36-45''; 46-55
        -> ''46-55''; >=56 -> ''55+''. We could represent this as a Deequ compliance
        constraint such as: .satisfies("CASE WHEN Age BETWEEN 18 AND 25 THEN AgeGroup
        = ''18-25'' WHEN Age BETWEEN 26 AND 35 THEN AgeGroup = ''26-35'' WHEN Age
        BETWEEN 36 AND 45 THEN AgeGroup = ''36-45'' WHEN Age BETWEEN 46 AND 55 THEN
        AgeGroup = ''46-55'' WHEN Age >= 56 THEN AgeGroup = ''55+'' ELSE false END",
        "age_group_matches_age")'
      sources:
      - start_line: 38
        end_line: 57
        file: ''
      - start_line: 61
        end_line: 63
        file: ''
      uid: 15a6b705-471b-40e8-9055-e8320fa90964
    - text: "When MonthlyIncome is present, it must lie within the numeric bounds\
        \ implied by SalarySlab. Specifically: (Upto 5k -> 0\u20135000), (5k-10k ->\
        \ 5001\u201310000), (10k-15k -> 10001\u201315000), (15k+ -> >=15001). Allow\
        \ MonthlyIncome to be null because it is imputed later. A Deequ constraint\
        \ could be: .satisfies(\"MonthlyIncome IS NULL OR (SalarySlab = 'Upto 5k'\
        \ AND MonthlyIncome BETWEEN 0 AND 5000) OR (SalarySlab = '5k-10k' AND MonthlyIncome\
        \ BETWEEN 5001 AND 10000) OR (SalarySlab = '10k-15k' AND MonthlyIncome BETWEEN\
        \ 10001 AND 15000) OR (SalarySlab = '15k+' AND MonthlyIncome >= 15001)\",\
        \ \"income_within_slab_bounds\")"
      sources:
      - start_line: 30
        end_line: 37
        file: ''
      - start_line: 65
        end_line: 74
        file: ''
      uid: ed235676-775b-4497-9119-257e1550be1e
    - text: 'Tenure fields must be logically consistent: 0 <= YearsAtCompany <= TotalWorkingYears,
        and YearsInCurrentRole <= YearsAtCompany, YearsSinceLastPromotion <= YearsAtCompany,
        YearsWithCurrManager <= YearsAtCompany (treat nulls in numerators as 0 for
        these comparisons). A Deequ constraint could be: .satisfies("YearsAtCompany
        >= 0 AND TotalWorkingYears >= 0 AND YearsAtCompany <= TotalWorkingYears AND
        coalesce(YearsInCurrentRole, 0) <= YearsAtCompany AND coalesce(YearsSinceLastPromotion,
        0) <= YearsAtCompany AND coalesce(YearsWithCurrManager, 0) <= YearsAtCompany",
        "tenure_consistency")'
      sources:
      - start_line: 75
        end_line: 86
        file: ''
      uid: 7699eb37-ff9e-4567-a0d7-622f0fbd2fdf
