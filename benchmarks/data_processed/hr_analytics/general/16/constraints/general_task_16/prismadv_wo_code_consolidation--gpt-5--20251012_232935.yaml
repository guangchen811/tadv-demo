        ranking is defined. This can be enforced with Deequ per-slab completeness
        checks, e.g., .hasCompleteness('MonthlyIncome', _ > 0.0, where = "SalarySlab
        = 'Upto 5k'"), and similarly for '5k-10k', '10k-15k', and '15k+'.
