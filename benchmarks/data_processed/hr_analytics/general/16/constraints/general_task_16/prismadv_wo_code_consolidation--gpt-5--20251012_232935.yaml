    assumptions:
    - text: 'MonthlyIncome values in the input should be numeric/parseable. Non-numeric
        strings or invalid formats should be rare (e.g., at least 95% of rows should
        be successfully cast to numeric). This can be represented as a constraint
        like: expect_column_values_to_be_in_type_list(''MonthlyIncome'', [''INTEGER'',
        ''LONG'', ''FLOAT'', ''DOUBLE''], mostly=0.95) or Deequ hasDataType(''MonthlyIncome'',
        Integral, assertion= >= 0.95).'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 13631da4-d5ab-4a22-a11f-2e34a85d9bf9
    - text: 'MonthlyIncome should be non-negative for all non-null values, aligned
        with the defined slab lower bound of 0. For example: .satisfies(''CASE WHEN
        `MonthlyIncome` IS NULL OR `MonthlyIncome` >= 0 THEN 1 ELSE 0 END'', ''Non-negative
        MonthlyIncome'', lambda x: x == 1.0).'
      sources:
      - start_line: 30
        end_line: 35
        file: ''
      - start_line: 65
        end_line: 67
        file: ''
      uid: 1bccc87d-351b-44f5-9c76-2ca8fb3cfa32
    - text: 'MonthlyIncome should be consistent with the assigned SalarySlab. For
        rows where MonthlyIncome is not null: Upto 5k => 0 to 5000; 5k-10k => 5001
        to 10000; 10k-15k => 10001 to 15000; 15k+ => >= 15001. At least 95% of applicable
        rows should satisfy these ranges. Example Deequ expression: .satisfies("CASE
        WHEN `MonthlyIncome` IS NULL THEN 1 WHEN `SalarySlab`=''Upto 5k'' AND `MonthlyIncome`
        BETWEEN 0 AND 5000 THEN 1 WHEN `SalarySlab`=''5k-10k'' AND `MonthlyIncome`
        BETWEEN 5001 AND 10000 THEN 1 WHEN `SalarySlab`=''10k-15k'' AND `MonthlyIncome`
        BETWEEN 10001 AND 15000 THEN 1 WHEN `SalarySlab`=''15k+'' AND `MonthlyIncome`
        >= 15001 THEN 1 ELSE 0 END", ''Income within slab bounds'', lambda x: x >=
        0.95).'
      sources:
      - start_line: 30
        end_line: 35
        file: ''
      - start_line: 65
        end_line: 67
        file: ''
      - start_line: 69
        end_line: 73
        file: ''
      uid: 82852261-6cad-4c67-b283-61557f889117
    - text: 'For every SalarySlab category present in the data, there should be at
        least one non-null MonthlyIncome to allow computation of slab medians used
        for imputation and downstream ranking. This can be expressed as a per-slab
        completeness check: for each slab s in {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''},
        count_where(SalarySlab=s AND MonthlyIncome IS NOT NULL) >= 1 if any rows exist
        with SalarySlab=s.'
      sources:
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      uid: 8ddfc428-8855-40b0-b1bb-c0896033e91a
    - text: 'If MonthlyIncome is null (or non-numeric after parsing), the row should
        have a valid SalarySlab (one of {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''})
        so it can be imputed and ranked. Example constraint: .satisfies("CASE WHEN
        `MonthlyIncome` IS NULL THEN CASE WHEN `SalarySlab` IN (''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'')
        THEN 1 ELSE 0 END ELSE 1 END", ''Null income has valid slab'', lambda x: x
        == 1.0).'
      sources:
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 36
        end_line: 37
        file: ''
      uid: d26091ec-4563-41b5-8f6f-bc22017d3233
    - text: 'Median MonthlyIncome should increase monotonically with SalarySlab order:
        median(Upto 5k) <= median(5k-10k) <= median(10k-15k) <= median(15k+). This
        enforces the assumed strong monotonic relationship between slabs and income
        used for calibration/imputation. This can be checked by computing per-slab
        medians and asserting sorted order.'
      sources:
      - start_line: 30
        end_line: 37
        file: ''
      - start_line: 65
        end_line: 67
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
