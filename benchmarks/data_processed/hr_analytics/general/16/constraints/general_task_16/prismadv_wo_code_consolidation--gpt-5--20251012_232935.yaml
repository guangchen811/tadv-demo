        file: ''
      uid: 6481ea61-ba63-4312-89bd-23f6621f286d
    - text: 'The ''YearsAtCompany'' values should be numeric (parsable to numbers)
        and non-negative. A practical validation is: at least 95% of rows are successfully
        castable to numeric and the minimum is >= 0. Example constraints: Deequ: .satisfies("CAST(YearsAtCompany
        AS DOUBLE) IS NOT NULL", "YearsAtCompany castable", lambda x: x >= 0.95) and
        .hasMin("YearsAtCompany", lambda m: m >= 0); Great Expectations: expect_column_values_to_be_in_type_list(''YearsAtCompany'',
        [''int64'',''float64'']) with mostly>=0.95 and expect_column_min_to_be_between(''YearsAtCompany'',
        min_value=0).'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      - start_line: 82
        end_line: 85
        file: ''
      uid: a68218ce-d5cd-4f2b-8d81-ab06400bf6cf
    - text: 'Tenure consistency: For the vast majority of rows, YearsInCurrentRole,
        YearsSinceLastPromotion, and YearsWithCurrManager should not exceed YearsAtCompany.
        For example, enforce >= 95% compliance. Example constraints: Deequ: .satisfies("(YearsInCurrentRole
        <= YearsAtCompany) AND (YearsSinceLastPromotion <= YearsAtCompany) AND (YearsWithCurrManager
        <= YearsAtCompany)", "Tenure not exceeding YAC", lambda x: x >= 0.95); Great
        Expectations: expect_column_pair_values_A_to_be_less_than_B for each pair
        with mostly>=0.95.'
      sources:
      - start_line: 83
        end_line: 85
        file: ''
      uid: f7bc715e-18dc-49ea-9c7d-2a3e50dd1f28
    - text: 'Zero-tenure consistency: When YearsAtCompany == 0, the intra-company
        tenure components should be zero (or null for manager tenure). For example,
        enforce that if YearsAtCompany = 0 then YearsInCurrentRole = 0 AND YearsSinceLastPromotion
        = 0 AND (YearsWithCurrManager = 0 OR YearsWithCurrManager IS NULL) for >=
        95% of such rows. Example constraint: Deequ: .satisfies("CASE WHEN YearsAtCompany
        = 0 THEN CASE WHEN YearsInCurrentRole = 0 AND YearsSinceLastPromotion = 0
        AND (YearsWithCurrManager = 0 OR YearsWithCurrManager IS NULL) THEN 1 ELSE
        0 END ELSE 1 END", "Zero YAC consistency", lambda x: x >= 0.95); Great Expectations:
        expect_conditionally to satisfy the same predicate.'
      sources:
