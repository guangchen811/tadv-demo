    - text: "Certain JobRoles uniquely determine Department. Enforce that: (a) JobRole\
        \ \u2208 {'Sales Executive', 'Sales Representative'} implies Department =\
        \ 'Sales'; (b) JobRole = 'Human Resources' implies Department = 'Human Resources';\
        \ (c) JobRole \u2208 {'Research Scientist', 'Research Director', 'Laboratory\
        \ Technician', 'Manufacturing Director', 'Healthcare Representative'} implies\
        \ Department = 'Research & Development'. This can be encoded as a Deequ satisfies\
        \ constraint with an OR of implication clauses, or as a set of separate conditional\
