results:
  Age:
    code:
    - suggestion: .isNonNegative('Age')
      status: true
      reason_if_failed: ''
      level: error
  AgeGroup:
    code:
    - suggestion: .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55',
        '55+'])
      status: true
      reason_if_failed: ''
      level: error
  Attrition:
    code:
    - suggestion: .isContainedIn('Attrition', ['Yes', 'No'])
      status: true
      reason_if_failed: ''
      level: error
  Department:
    code:
    - suggestion: .isComplete('Department')
      status: true
      reason_if_failed: ''
      level: error
  EmpID:
    code:
    - suggestion: .isUnique('EmpID')
      status: true
      reason_if_failed: ''
      level: error
  MonthlyIncome:
    code:
    - suggestion: .isPositive('MonthlyIncome')
      status: true
      reason_if_failed: ''
      level: error
  OverTime:
    code:
    - suggestion: .isContainedIn('OverTime', ['Yes', 'No'])
      status: true
      reason_if_failed: ''
      level: error
  SalarySlab:
    code:
    - suggestion: .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      status: true
      reason_if_failed: ''
      level: error
  TotalWorkingYears:
    code:
    - suggestion: .satisfies('TotalWorkingYears >= YearsAtCompany', 'working_years_consistency_check')
      status: true
      reason_if_failed: ''
      level: error
  YearsAtCompany:
    code:
    - suggestion: .satisfies('YearsAtCompany >= YearsInCurrentRole', 'role_years_consistency_check')
      status: true
      reason_if_failed: ''
      level: error
