      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(YearsWithCurrManager IS NULL) OR (YearsWithCurrManager
        <= YearsAtCompany)", "YearsWithCurrManager_le_YearsAtCompany", lambda x: x
        == 1.0)'
