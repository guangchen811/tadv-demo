      reason_if_failed: 'Constraint ''.satisfies("(YearsWithCurrManager IS NULL) OR
        (YearsWithCurrManager <= YearsAtCompany)", "YearsWithCurrManager_le_YearsAtCompany",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.7006802721088435 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.hasCorrelation(''JobSatisfaction'', ''WorkLifeBalance'', lambda
        corr: abs(corr) < 0.9)'
