  ? '["AgeGroup","DistanceFromHome","JobSatisfaction","OverTime","WorkLifeBalance","YearsAtCompany","YearsSinceLastPromotion","YearsWithCurrManager"]'
  : code:
    - suggestion: '.isLessThanOrEqualTo(''YearsSinceLastPromotion'', ''YearsAtCompany'',
        lambda x: x == 1.0)'
