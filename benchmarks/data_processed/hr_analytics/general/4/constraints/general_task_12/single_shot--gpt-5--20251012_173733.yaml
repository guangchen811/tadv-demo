constraints:
  Age:
    code:
    - - .isGreaterThan('Age', 17)
      - Invalid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    - - .satisfies("CASE WHEN Age >= 18 AND Age <= 25 THEN AgeGroup = '18-25' WHEN
        Age > 25 AND Age <= 35 THEN AgeGroup = '26-35' WHEN Age > 35 AND Age <= 45
        THEN AgeGroup = '36-45' WHEN Age > 45 AND Age <= 55 THEN AgeGroup = '46-55'
        WHEN Age > 55 THEN AgeGroup = '55+' ELSE false END", 'age_group_matches_age')
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['TravelRarely', 'Travel_Frequently', 'Travel_Rarely',
        'Non-Travel'])
      - Valid
    assumptions: []
  DailyRate:
    code:
    - - .isComplete('DailyRate')
      - Valid
    - - .isPositive('DailyRate')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    - - .satisfies("CASE WHEN JobRole = 'Sales Executive' THEN Department = 'Sales'
        WHEN JobRole = 'Sales Representative' THEN Department = 'Sales' WHEN JobRole
        = 'Healthcare Representative' THEN Department = 'Sales' WHEN JobRole = 'Research
        Scientist' THEN Department = 'Research & Development' WHEN JobRole = 'Laboratory
        Technician' THEN Department = 'Research & Development' WHEN JobRole = 'Research
        Director' THEN Department = 'Research & Development' WHEN JobRole = 'Manufacturing
        Director' THEN Department = 'Research & Development' WHEN JobRole = 'Human
        Resources' THEN Department = 'Human Resources' ELSE true END", 'role_department_consistency')
      - Invalid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isComplete('DistanceFromHome')
      - Valid
    - - .isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  Education:
    code:
    - - .isComplete('Education')
      - Valid
    - - .isContainedIn('Education', [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  EducationField:
    code:
    - - .isComplete('EducationField')
      - Valid
    - - .isContainedIn('EducationField', ['Other', 'Medical', 'Technical Degree',
        'Marketing', 'Human Resources', 'Life Sciences'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isComplete('EmployeeCount')
      - Valid
    - - .isContainedIn('EmployeeCount', [1])
      - Invalid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isComplete('EnvironmentSatisfaction')
      - Valid
    - - .isContainedIn('EnvironmentSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  HourlyRate:
    code:
    - - .isComplete('HourlyRate')
      - Valid
    - - .isPositive('HourlyRate')
      - Valid
    assumptions: []
  JobInvolvement:
    code:
    - - .isComplete('JobInvolvement')
      - Valid
    - - .isContainedIn('JobInvolvement', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    - - .isContainedIn('JobRole', ['Research Director', 'Sales Representative', 'Research
        Scientist', 'Manufacturing Director', 'Healthcare Representative', 'Sales
        Executive', 'Manager', 'Human Resources', 'Laboratory Technician'])
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction')
      - Valid
    - - .isContainedIn('JobSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  MaritalStatus:
    code:
    - - .isComplete('MaritalStatus')
      - Valid
    - - .isContainedIn('MaritalStatus', ['Single', 'Married', 'Divorced'])
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyRate:
    code:
    - - .isComplete('MonthlyRate')
      - Valid
    - - .isPositive('MonthlyRate')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18')
      - Valid
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isComplete('PercentSalaryHike')
      - Valid
    - - .isPositive('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  RelationshipSatisfaction:
    code:
    - - .isComplete('RelationshipSatisfaction')
      - Valid
    - - .isContainedIn('RelationshipSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    - - .satisfies("CASE WHEN MonthlyIncome > 0 AND MonthlyIncome <= 5000 THEN SalarySlab
        = 'Upto 5k' WHEN MonthlyIncome > 5000 AND MonthlyIncome <= 10000 THEN SalarySlab
        = '5k-10k' WHEN MonthlyIncome > 10000 AND MonthlyIncome <= 15000 THEN SalarySlab
        = '10k-15k' WHEN MonthlyIncome > 15000 THEN SalarySlab = '15k+' ELSE SalarySlab
        IS NULL END", 'salary_slab_matches_income')
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isComplete('StandardHours')
      - Valid
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  StockOptionLevel:
    code:
    - - .isComplete('StockOptionLevel')
      - Valid
    - - .isContainedIn('StockOptionLevel', [0, 1, 2, 3])
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isComplete('WorkLifeBalance')
      - Valid
    - - .isContainedIn('WorkLifeBalance', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    - - .satisfies("CASE WHEN TotalWorkingYears > 0 THEN YearsAtCompany <= TotalWorkingYears
        ELSE true END", 'company_tenure_leq_career_tenure')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    - - .satisfies("CASE WHEN YearsAtCompany > 0 THEN YearsInCurrentRole <= YearsAtCompany
        ELSE true END", 'role_tenure_leq_company_tenure')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda v: v >= 0.95)'
      - Valid
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
