        end_line: 21
        file: ''
      - start_line: 29
        end_line: 64
        file: ''
      - start_line: 94
        end_line: 98
        file: ''
      uid: da7483dc-0871-44a7-bff0-c4b87fafad1d
    - text: 'MeritIncreaseAmt must equal MonthlyIncome * MeritIncreasePct within rounding
        to two decimals. Example Deequ compliance: .satisfies("abs(MeritIncreaseAmt
        - round(MonthlyIncome * MeritIncreasePct, 2)) < 0.005", "merit_amount_formula").'
      sources:
      - start_line: 69
        end_line: 69
        file: ''
      uid: 5565a699-20e2-4f54-8b13-948e6fd627cd
    - text: 'Capped increase consistency: Because MeritIncreasePct is clipped to [0.0,
        0.20], the resulting amount must satisfy 0 <= MeritIncreaseAmt <= 0.20 * MonthlyIncome.
        Example Deequ compliance: .satisfies("MeritIncreasePct >= 0.0 AND MeritIncreasePct
        <= 0.20 AND MeritIncreaseAmt >= 0 AND MeritIncreaseAmt <= 0.20 * MonthlyIncome",
        "merit_caps_consistency").'
