    - text: 'The rating gap calculation assumes that PercentSalaryHike is present
        for records with PerformanceRating in {3,4}, and that both ratings 3 and 4
        occur in the data used for planning. Suggested checks: .hasCompleteness("PercentSalaryHike",
        where = "PerformanceRating in (3,4)") and a cardinality check that count(distinct
        PerformanceRating where in (3,4)) = 2.'
