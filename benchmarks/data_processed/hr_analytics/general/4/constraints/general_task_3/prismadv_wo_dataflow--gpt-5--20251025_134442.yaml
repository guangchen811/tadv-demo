    - text: 'Tenure consistency: 0 <= YearsInCurrentRole <= YearsAtCompany, ensuring
        the ratio YearsInCurrentRole/YearsAtCompany stays within [0, 1]. Representable
        as a row-level constraint: satisfies(''YearsInCurrentRole >= 0 AND YearsAtCompany
        >= 0 AND YearsInCurrentRole <= YearsAtCompany'', ''tenure_valid'', _ == 1.0).'
