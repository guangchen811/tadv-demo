    assumptions:
    - text: The pair (Department, EmpID) must be unique across the dataset, and each
        EmpID maps to exactly one Department (functional dependency EmpID -> Department).
        This ensures department headcounts reflect unique employees and no employee
        is counted in multiple departments. This can be represented as .isUnique(["Department",
        "EmpID"]) and a functional dependency check per EmpID.
      sources:
      - start_line: 16
        end_line: 16
        file: ''
      - start_line: 82
        end_line: 90
        file: ''
      - start_line: 94
        end_line: 99
        file: ''
      uid: aacef443-d8e3-46b0-a7f7-306b34a180bb
    - text: 'For all rows, YearsInCurrentRole must be less than or equal to YearsAtCompany;
        additionally, if YearsAtCompany == 0 then YearsInCurrentRole must be 0. Equivalent
        constraint examples: satisfies("YearsInCurrentRole <= YearsAtCompany") and
        satisfies("(YearsAtCompany > 0) OR (YearsInCurrentRole = 0)").'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: 8a27676e-d61c-4a76-af30-4b293c9667ef
    - text: 'PromotionEligible must equal the logical rule: (PerformanceRating ==
        4) AND (JobLevel < 5) AND (YearsInCurrentRole >= 1) AND (YearsSinceLastPromotion
        >= 1) AND (TotalWorkingYears >= 2) for every row. This can be encoded as a
        row-level predicate equality using satisfies(...).'
      sources:
      - start_line: 71
        end_line: 79
        file: ''
      uid: 24abc4c3-878e-4b89-9e04-ffb7498b6f84
    - text: 'All inputs required to compute MeritIncreasePct must be present and valid
        together on every row: SalarySlab in {"Upto 5k", "5k-10k", "10k-15k", "15k+"},
        BusinessTravel in {"Non-Travel", "Travel_Rarely", "Travel_Frequently"}, AgeGroup
        in {"18-25", "26-35", "36-45", "46-55", "55+"}, PerformanceRating not null,
        and YearsAtCompany and YearsInCurrentRole non-negative. No row should produce
        null in slab_base_rate, travel_adj, or age_adj. This can be expressed as combined
        completeness/domain constraints across these columns.'
      sources:
      - start_line: 23
        end_line: 30
        file: ''
      - start_line: 31
        end_line: 37
        file: ''
      - start_line: 39
        end_line: 47
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 58
        end_line: 64
        file: ''
      uid: 14b36f02-6f1c-4263-a9c6-dbbcc97e3966
    - text: MeritIncreaseAmt must equal round(MonthlyIncome * MeritIncreasePct, 2)
        for every row, and MeritIncreasePct must be within [0.0, 0.20]. These can
        be checked with a predicate equality for the amount and a range constraint
        for the percentage.
      sources:
      - start_line: 66
        end_line: 70
        file: ''
      uid: d7d623f7-29d9-4c29-a74f-7bb6926244cc
    - text: Within each Department, EmpID values must be unique so that Headcount
        equals the number of distinct employees per department (no duplicate EmpID
        within a department). This can be expressed as .isUnique(["Department", "EmpID"]).
      sources:
      - start_line: 16
        end_line: 16
        file: ''
      - start_line: 82
        end_line: 90
        file: ''
      uid: cbfed532-dd8e-4435-b6f8-48c80f077a7d
    - text: There must be at least one non-null PercentSalaryHike value for each of
        PerformanceRating 3 and 4 so that rating_means[3] and rating_means[4] are
        defined (to avoid falling back to the default gap). This can be expressed
        as completeness/domain presence within groups.
      sources:
      - start_line: 19
        end_line: 21
        file: ''
      uid: fe1a6e7e-ad8b-4c37-9780-8399000e9fc3
