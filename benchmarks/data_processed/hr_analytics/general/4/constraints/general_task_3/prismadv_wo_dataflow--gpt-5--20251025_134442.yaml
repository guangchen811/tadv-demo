      - start_line: 23
        end_line: 29
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: 7dd7dc37-1749-4f0f-a899-e348988eff79
    - text: 'Tenure consistency: YearsInCurrentRole must be between 0 and YearsAtCompany
        (inclusive). Additionally, if YearsAtCompany == 0 then YearsInCurrentRole
        must be 0. This matches the ratio computation used later (clipped to [0,1]).
        Example Deequ constraints: .satisfies("YearsAtCompany >= 0 AND YearsInCurrentRole
        >= 0 AND YearsInCurrentRole <= YearsAtCompany", "tenure_within_company");
        .where("YearsAtCompany = 0").hasMax("YearsInCurrentRole", _ == 0).'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: a198249b-6092-4d46-8cde-0eaa1de8ab2f
    - text: 'Performance/comp signal integrity: The dataset should contain both PerformanceRating
        = 3 and PerformanceRating = 4 records, and the average PercentSalaryHike for
        rating 4 should be greater than or equal to the average for rating 3 (so the
        rating gap used downstream is non-negative). This reflects the intended differentiation
        of high performers. Example constraint approach: compute mean_hike_pr4 and
        mean_hike_pr3 via two filtered means and assert mean_hike_pr4 >= mean_hike_pr3
        (custom analyzer or two Checks with a final assertion).'
      sources:
      - start_line: 19
        end_line: 21
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
      uid: a8d3a408-0d00-4666-b3b0-30c485bf5ff0
    - text: 'Completeness across all columns used in merit calculation and planning:
        SalarySlab, BusinessTravel, AgeGroup, PerformanceRating, PercentSalaryHike,
        YearsAtCompany, YearsInCurrentRole, and MonthlyIncome must be non-null for
        all rows included in the employee plan. Example Deequ constraints: .isComplete("SalarySlab");
        .isComplete("BusinessTravel"); .isComplete("AgeGroup"); .isComplete("PerformanceRating");
        .isComplete("PercentSalaryHike"); .isComplete("YearsAtCompany"); .isComplete("YearsInCurrentRole");
        .isComplete("MonthlyIncome").'
