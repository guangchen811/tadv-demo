        end_line: 57
        file: ''
      uid: 262efca3-169c-44e8-a0cd-281542d3675a
    - text: 'SalarySlab must be consistent with MonthlyIncome: ''Upto 5k'' => MonthlyIncome
        <= 5000; ''5k-10k'' => 5000 < MonthlyIncome <= 10000; ''10k-15k'' => 10000
        < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome > 15000. Representable
        as a conditional compliance constraint over both columns.'
      sources:
      - start_line: 23
        end_line: 29
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: f70c11a3-9b19-424f-8769-4f60461b5716
    - text: 'Mappings for compensation components must be fully defined for each row:
        SalarySlab in {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}, BusinessTravel
        in {''Non-Travel'',''Travel_Rarely'',''Travel_Frequently''}, and AgeGroup
        in {''18-25'',''26-35'',''36-45'',''46-55'',''55+''}; consequently slab_base_rate,
        travel_adj, and age_adj should be non-null before summation. Representable
        as: satisfies("(SalarySlab IN (...)) AND (BusinessTravel IN (...)) AND (AgeGroup
        IN (...))", ''comp_component_keys_present'', _ == 1.0).'
      sources:
      - start_line: 23
        end_line: 29
        file: ''
      - start_line: 32
        end_line: 37
        file: ''
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 58
        end_line: 64
        file: ''
      uid: 83df45e7-4753-426b-aeb6-95535089c618
    - text: 'PromotionEligible must be exactly the result of the rule: PerformanceRating
        = 4 AND JobLevel < 5 AND YearsInCurrentRole >= 1 AND YearsSinceLastPromotion
        >= 1 AND TotalWorkingYears >= 2. Representable as a row-level constraint:
        satisfies("PromotionEligible = (PerformanceRating = 4 AND JobLevel < 5 AND
        YearsInCurrentRole >= 1 AND YearsSinceLastPromotion >= 1 AND TotalWorkingYears
        >= 2)", ''promo_rule_equivalence'', _ == 1.0).'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      uid: 7f520d08-6da5-4057-ae5e-7a7a52dd888c
    - text: 'Career timeline consistency: YearsAtCompany must be less than or equal
        to TotalWorkingYears (and both non-negative), ensuring no employee has been
        at the company longer than their total experience. Representable as: satisfies(''YearsAtCompany
        >= 0 AND TotalWorkingYears >= 0 AND YearsAtCompany <= TotalWorkingYears'',
        ''career_timeline_valid'', _ == 1.0).'
      sources:
      - start_line: 53
        end_line: 57
        file: ''
