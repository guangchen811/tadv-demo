  '["EmpID","SalarySlab"]':
    code: []
    assumptions:
    - text: 'Functional dependency: For each EmpID, SalarySlab must be constant across
        all rows (no employee appears with multiple salary slabs). We could represent
        this as a Deequ constraint like: .hasFunctionalDependency("EmpID", ["SalarySlab"]).'
