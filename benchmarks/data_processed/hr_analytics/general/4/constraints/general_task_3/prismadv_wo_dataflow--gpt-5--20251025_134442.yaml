    - text: 'Within each Department, EmpID must be unique (no duplicate employee rows
        per department), ensuring department headcount is not inflated. Deequ example:
        .isUnique(["Department", "EmpID"]).'
      sources:
      - start_line: 82
        end_line: 90
        file: ''
