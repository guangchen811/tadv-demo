    - text: The historical average PercentSalaryHike for PerformanceRating = 4 should
        be greater than or equal to that for PerformanceRating = 3 (used to set a
        positive rating_gap_pct). This can be asserted by computing group means and
        asserting mean(PercentSalaryHike | PR=4) >= mean(PercentSalaryHike | PR=3).
