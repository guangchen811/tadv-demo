    - text: 'SalarySlab must be consistent with MonthlyIncome bands: (SalarySlab=''Upto
        5k'' AND MonthlyIncome<=5000) OR (SalarySlab=''5k-10k'' AND MonthlyIncome>5000
        AND MonthlyIncome<=10000) OR (SalarySlab=''10k-15k'' AND MonthlyIncome>10000
        AND MonthlyIncome<=15000) OR (SalarySlab=''15k+'' AND MonthlyIncome>15000).
        Deequ example: .satisfies("(SalarySlab = ''Upto 5k'' AND MonthlyIncome <=
        5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome > 15000)", "salary_slab_matches_income").'
      sources:
      - start_line: 23
        end_line: 29
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: 4cc523b9-2e27-4834-a208-8e081efd9a24
    - text: 'YearsInCurrentRole must not exceed YearsAtCompany and both should be
        non-negative. This keeps the ratio computation meaningful. Deequ example:
        .satisfies("YearsAtCompany >= 0 AND YearsInCurrentRole >= 0 AND YearsAtCompany
        >= YearsInCurrentRole", "role_tenure_le_company_tenure").'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: 3fbfb38c-d6c7-49d1-8b89-a6a9ab11af2e
    - text: 'PromotionEligible must exactly reflect the rule: (PerformanceRating =
        4) AND (JobLevel < 5) AND (YearsInCurrentRole >= 1) AND (YearsSinceLastPromotion
        >= 1) AND (TotalWorkingYears >= 2). This can be verified with two compliances:
        (1) If PromotionEligible is true then the rule holds; (2) If the rule holds
        then PromotionEligible is true. Deequ examples: .satisfies("(NOT PromotionEligible)
        OR (PerformanceRating = 4 AND JobLevel < 5 AND YearsInCurrentRole >= 1 AND
        YearsSinceLastPromotion >= 1 AND TotalWorkingYears >= 2)", "promo_true_implies_conditions")
        and .satisfies("(PromotionEligible) OR NOT (PerformanceRating = 4 AND JobLevel
        < 5 AND YearsInCurrentRole >= 1 AND YearsSinceLastPromotion >= 1 AND TotalWorkingYears
        >= 2)", "conditions_imply_promo_true").'
      sources:
      - start_line: 71
        end_line: 79
        file: ''
      uid: f11910b6-9e74-4691-9d78-bfd2bf46913f
    - text: 'MeritIncreaseAmt must equal MonthlyIncome * MeritIncreasePct, rounded
        to 2 decimals. Allow a small tolerance for floating-point rounding. Deequ
        example: .satisfies("abs(MeritIncreaseAmt - round(MonthlyIncome * MeritIncreasePct,
        2)) < 0.005", "merit_amount_matches_pct").'
      sources:
      - start_line: 58
        end_line: 64
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: 4e6932c4-9ae1-460b-96a5-a258c3411906
    - text: 'For rows with PerformanceRating in {3, 4}, PercentSalaryHike must be
        non-null to support the rating gap computation; additionally, the dataset
        should contain at least one row with PerformanceRating = 3 and at least one
        with 4. Deequ examples: .where("PerformanceRating IN (3,4)").hasCompleteness("PercentSalaryHike",
        _ >= 1.0); .where("PerformanceRating = 3").hasSize(_ > 0); .where("PerformanceRating
        = 4").hasSize(_ > 0).'
