    assumptions:
    - text: 'SalarySlab must be consistent with MonthlyIncome brackets: ''Upto 5k''
        => 0 <= MonthlyIncome <= 5000; ''5k-10k'' => 5000 < MonthlyIncome <= 10000;
        ''10k-15k'' => 10000 < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome >
        15000. This keeps the slab-based rate application aligned with the actual
        pay. Example Deequ constraints: .where("SalarySlab = ''Upto 5k''").hasMax("MonthlyIncome",
        _ <= 5000); .where("SalarySlab = ''5k-10k''").hasMin("MonthlyIncome", _ >
        5000) and .hasMax("MonthlyIncome", _ <= 10000); .where("SalarySlab = ''10k-15k''").hasMin("MonthlyIncome",
        _ > 10000) and .hasMax("MonthlyIncome", _ <= 15000); .where("SalarySlab =
        ''15k+''").hasMin("MonthlyIncome", _ > 15000).'
