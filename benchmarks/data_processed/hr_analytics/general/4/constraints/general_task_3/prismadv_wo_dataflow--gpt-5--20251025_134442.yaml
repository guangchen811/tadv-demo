        end_line: 79
        file: ''
      uid: ec7b7ce2-cc62-4e61-8492-7642395a3991
    - text: 'No employee at the maximum JobLevel (5) should be marked as PromotionEligible.
        Equivalent Deequ constraint: .satisfies("(JobLevel < 5) or (not PromotionEligible)",
        "no_promotions_from_max_level").'
      sources:
      - start_line: 71
        end_line: 79
        file: ''
      uid: 39d99b7a-9b92-48fb-9cf4-489b8c04b027
    - text: 'Tenure consistency: YearsInCurrentRole must not exceed total tenure:
        YearsInCurrentRole <= TotalWorkingYears for all rows. Deequ: .satisfies("YearsInCurrentRole
        <= TotalWorkingYears", "yicr_le_total").'
      sources:
      - start_line: 71
        end_line: 78
        file: ''
      uid: c990b322-4f11-49ed-b0e9-1ac0af77edf9
    - text: 'Recency of promotion cannot exceed total tenure: YearsSinceLastPromotion
        <= TotalWorkingYears for all rows. Deequ: .satisfies("YearsSinceLastPromotion
        <= TotalWorkingYears", "yslp_le_total").'
      sources:
      - start_line: 71
        end_line: 78
        file: ''
      uid: 2e8446f1-74e8-440f-a0a9-e3ffc594d5ad
    - text: 'Role tenure must not exceed company tenure, and role tenure must be zero
        when company tenure is zero: (YearsAtCompany > 0 => YearsInCurrentRole <=
        YearsAtCompany) AND (YearsAtCompany = 0 => YearsInCurrentRole = 0). Deequ:
        .satisfies("(YearsAtCompany > 0 and YearsInCurrentRole <= YearsAtCompany)
        or (YearsAtCompany = 0 and YearsInCurrentRole = 0)", "role_tenure_within_company_tenure").'
