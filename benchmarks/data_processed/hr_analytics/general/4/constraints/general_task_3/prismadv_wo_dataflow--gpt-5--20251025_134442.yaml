  '["JobLevel","PerformanceRating","TotalWorkingYears","YearsInCurrentRole","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'Promotion eligibility must be a deterministic function of five columns:
        PromotionEligible is true if and only if (PerformanceRating = 4 AND JobLevel
        < 5 AND YearsInCurrentRole >= 1 AND YearsSinceLastPromotion >= 1 AND TotalWorkingYears
        >= 2). This can be enforced with two Deequ row-level constraints to capture
        both directions: .satisfies("case when PromotionEligible then (PerformanceRating
        = 4 and JobLevel < 5 and YearsInCurrentRole >= 1 and YearsSinceLastPromotion
        >= 1 and TotalWorkingYears >= 2) else true end", "eligible_implies_predicate")
        and .satisfies("case when (PerformanceRating = 4 and JobLevel < 5 and YearsInCurrentRole
        >= 1 and YearsSinceLastPromotion >= 1 and TotalWorkingYears >= 2) then PromotionEligible
        else true end", "predicate_implies_eligible").'
