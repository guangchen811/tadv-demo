    assumptions:
    - text: 'EmpID is a unique primary key and deterministically maps to a single
        Department and a single JobLevel for each record (functional dependency: EmpID
        -> {Department, JobLevel}). This ensures per-employee planning rows are unique
        and department headcounts reflect unique employees.'
      sources:
      - start_line: 16
        end_line: 16
        file: ''
      - start_line: 82
        end_line: 90
        file: ''
      - start_line: 94
        end_line: 99
        file: ''
      uid: dc25665c-db9f-48b6-92b2-75e20c29bd27
    - text: YearsInCurrentRole must be less than or equal to YearsAtCompany for all
        rows (and both non-negative). This avoids clipping in the ratio calculation
        and ensures the tenure-based smoothing behaves as intended.
      sources:
      - start_line: 53
        end_line: 57
        file: ''
      uid: 51002b36-00bc-4dd6-acbf-2916f6460262
    - text: 'SalarySlab must be consistent with MonthlyIncome buckets used for compensation
        planning: ''Upto 5k'' => MonthlyIncome <= 5000; ''5k-10k'' => 5000 < MonthlyIncome
        <= 10000; ''10k-15k'' => 10000 < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome
        > 15000. This ensures the slab_base_rate derived from SalarySlab aligns with
        the income used to compute MeritIncreaseAmt.'
      sources:
      - start_line: 23
        end_line: 29
        file: ''
      - start_line: 58
        end_line: 64
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: abcf09b1-1b3f-4a59-aca2-4b1f966b8fbb
    - text: The dataset should contain at least one record for each of PerformanceRating
        3 and 4 with non-null PercentSalaryHike, so the rating_gap_pct is derived
        from data instead of the fallback constant.
      sources:
      - start_line: 19
        end_line: 21
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
      uid: dafe22f7-6f32-41f8-bb83-721b4d22341c
    - text: "PromotionEligible must equal the conjunction of the rule\u2019s inputs:\
        \ PromotionEligible == (PerformanceRating == 4 AND JobLevel < 5 AND YearsInCurrentRole\
