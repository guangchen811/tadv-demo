        end_line: 79
        file: ''
      uid: 9518e038-7c37-4c2d-b288-8c1e48404b05
    - text: MeritIncreaseAmt must equal MonthlyIncome * MeritIncreasePct, rounded
        to 2 decimals (after MeritIncreasePct has been clipped to [0.0, 0.20]).
      sources:
      - start_line: 66
        end_line: 70
        file: ''
