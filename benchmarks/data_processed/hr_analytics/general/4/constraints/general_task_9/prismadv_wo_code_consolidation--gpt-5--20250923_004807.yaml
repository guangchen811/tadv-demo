  '["Department","JobRole"]':
    code:
    - suggestion: '.satisfies("((`Department` = ''Sales'' AND `JobRole` IN (''Sales
        Executive'',''Sales Representative'',''Manager'')) OR (`Department` = ''Human
        Resources'' AND `JobRole` IN (''Human Resources'',''Manager'')) OR (`Department`
        = ''Research & Development'' AND `JobRole` IN (''Research Scientist'',''Laboratory
        Technician'',''Manufacturing Director'',''Healthcare Representative'',''Research
        Director'',''Manager'')))", "Valid Department-JobRole combinations", lambda
        v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: be46823c-be06-4930-984b-b055382f7458
      source_assumptions:
      - dd8277e6-4744-4266-afc8-7ca3f0ce9242
    assumptions:
    - text: "Department\u2013JobRole combinations must be organizationally valid:\
        \ Sales => JobRole in ('Sales Executive','Sales Representative','Manager');\
        \ Human Resources => JobRole in ('Human Resources','Manager'); Research &\
        \ Development => JobRole in ('Research Scientist','Laboratory Technician','Manufacturing\
        \ Director','Healthcare Representative','Research Director','Manager'). This\
        \ can be enforced with a compliance constraint such as: (Department = 'Sales'\
        \ AND JobRole IN ('Sales Executive','Sales Representative','Manager')) OR\
        \ (Department = 'Human Resources' AND JobRole IN ('Human Resources','Manager'))\
        \ OR (Department = 'Research & Development' AND JobRole IN ('Research Scientist','Laboratory\
        \ Technician','Manufacturing Director','Healthcare Representative','Research\
        \ Director','Manager'))"
      sources:
      - start_line: 141
        end_line: 148
        file: ''
      uid: fe6f3e70-9e97-475a-b5cb-f92899cbcafc
    - text: 'AgeGroup must be consistent with Age: ''18-25'' => 18 <= Age <= 25; ''26-35''
        => 26 <= Age <= 35; ''36-45'' => 36 <= Age <= 45; ''46-55'' => 46 <= Age <=
        55; ''55+'' => Age >= 56. This can be represented as a compliance constraint
        checking Age against AgeGroup.'
      sources:
      - start_line: 72
        end_line: 81
        file: ''
      - start_line: 141
        end_line: 145
        file: ''
      uid: dd8277e6-4744-4266-afc8-7ca3f0ce9242
    - text: 'SalarySlab must match MonthlyIncome bucket: ''Upto 5k'' => MonthlyIncome
        <= 5000; ''5k-10k'' => 5000 < MonthlyIncome <= 10000; ''10k-15k'' => 10000
        < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome > 15000. Enforce via a
        compliance constraint mapping MonthlyIncome to the declared SalarySlab.'
      sources:
      - start_line: 35
        end_line: 41
        file: ''
      - start_line: 141
        end_line: 145
        file: ''
      uid: a018458f-7c61-47e2-ab22-68a87214785c
    - text: 'YearsInCurrentRole should not exceed YearsAtCompany (and both should
        be non-negative). Compliance example: (YearsInCurrentRole <= YearsAtCompany)
        OR YearsAtCompany IS NULL OR YearsInCurrentRole IS NULL.'
      sources:
      - start_line: 60
        end_line: 64
        file: ''
      uid: c4d0645f-cd06-442b-877a-27ee23d9ffa6
    - text: 'YearsWithCurrManager should not exceed YearsAtCompany. Compliance example:
        (YearsWithCurrManager <= YearsAtCompany) OR YearsAtCompany IS NULL OR YearsWithCurrManager
        IS NULL.'
      sources:
      - start_line: 68
        end_line: 70
        file: ''
      uid: 72ff36bb-360a-4031-b03f-263b135aee36
    - text: 'YearsSinceLastPromotion should not exceed YearsAtCompany. Compliance
        example: (YearsSinceLastPromotion <= YearsAtCompany) OR YearsAtCompany IS
        NULL OR YearsSinceLastPromotion IS NULL.'
      sources:
      - start_line: 65
        end_line: 67
        file: ''
      uid: d582b3bd-d1f7-4841-a4e6-4995c8ca0e08
    - text: 'TotalWorkingYears should be at least YearsAtCompany. Compliance example:
        (TotalWorkingYears >= YearsAtCompany) OR TotalWorkingYears IS NULL OR YearsAtCompany
        IS NULL.'
      sources:
      - start_line: 141
        end_line: 145
        file: ''
      uid: 9563a247-a14b-40c9-9e52-8f99bb97924d
    - text: 'If risk_tier is not ''High'', recommended_action must be ''Monitor''.
        Compliance: (risk_tier <> ''High'' -> recommended_action = ''Monitor'').'
      sources:
      - start_line: 122
        end_line: 126
        file: ''
      - start_line: 137
        end_line: 137
        file: ''
      uid: 688abb01-4042-4c44-a987-4c6ca7b00c82
    - text: 'If recommended_action = ''CompensationReview'', then the row must satisfy:
        risk_tier = ''High'' AND risk_income >= 0.8 AND JobSatisfaction <= 2. Compliance:
        (recommended_action = ''CompensationReview'' -> (risk_tier = ''High'' AND
        risk_income >= 0.8 AND JobSatisfaction <= 2)).'
      sources:
      - start_line: 126
        end_line: 129
        file: ''
      uid: 1610cbc5-34a2-4967-aafd-3107908b143d
    - text: 'If recommended_action = ''FlexibleSchedule'', then the row must satisfy:
        risk_tier = ''High'' AND OverTime = ''Yes'' AND WorkLifeBalance <= 2 AND NOT
        (risk_income >= 0.8 AND JobSatisfaction <= 2) due to prioritization. Compliance:
        (recommended_action = ''FlexibleSchedule'' -> (risk_tier = ''High'' AND OverTime
        = ''Yes'' AND WorkLifeBalance <= 2 AND NOT (risk_income >= 0.8 AND JobSatisfaction
        <= 2))).'
      sources:
      - start_line: 126
        end_line: 131
        file: ''
      uid: 55f76221-8d83-45bc-959c-0586684ed82a
    - text: 'If recommended_action = ''CareerProgressionPlan'', then the row must
        satisfy: risk_tier = ''High'' AND (risk_role_stagnation >= 0.7 OR risk_promo_lag
        >= 0.8) AND neither higher-priority condition holds. Compliance: (recommended_action
        = ''CareerProgressionPlan'' -> (risk_tier = ''High'' AND (risk_role_stagnation
        >= 0.7 OR risk_promo_lag >= 0.8) AND NOT (risk_income >= 0.8 AND JobSatisfaction
        <= 2) AND NOT (OverTime = ''Yes'' AND WorkLifeBalance <= 2))).'
      sources:
      - start_line: 131
        end_line: 133
        file: ''
      - start_line: 126
        end_line: 131
        file: ''
      uid: 13bc79ad-b8ee-4fb8-806a-fbd7b22858fe
    - text: 'If recommended_action = ''ManagerCheckIn'', then the row must satisfy:
        risk_tier = ''High'' AND risk_mgr_churn >= 0.7 and none of the higher-priority
        conditions apply. Compliance: (recommended_action = ''ManagerCheckIn'' ->
        (risk_tier = ''High'' AND risk_mgr_churn >= 0.7 AND NOT (risk_income >= 0.8
        AND JobSatisfaction <= 2) AND NOT (OverTime = ''Yes'' AND WorkLifeBalance
        <= 2) AND NOT (risk_role_stagnation >= 0.7 OR risk_promo_lag >= 0.8))).'
      sources:
      - start_line: 133
        end_line: 134
        file: ''
      - start_line: 126
        end_line: 133
        file: ''
      uid: 8bd43871-0283-44e4-8de9-8c977bbda7b1
