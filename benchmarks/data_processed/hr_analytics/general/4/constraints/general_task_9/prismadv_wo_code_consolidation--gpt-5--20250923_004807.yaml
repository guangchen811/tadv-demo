      - start_line: 142
        end_line: 142
        file: ''
      - start_line: 146
        end_line: 146
        file: ''
      uid: 4648baf1-6b9f-4940-a936-4d6d32790598
    - text: 'The ''OverTime'' column should be complete (no nulls). This ensures all
        rows participate correctly in the masks and downstream logic and the exported
        report contains valid values. Deequ example: .hasCompleteness(''OverTime'',
        lambda v: v == 1.0). Great Expectations: expect_column_values_to_not_be_null(''OverTime'').'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 142
        end_line: 142
        file: ''
      uid: f398861c-4fe6-4342-aae9-6c52d36c4f3a
    - text: 'The ''OverTime'' column values must be exactly the canonical strings
        ''Yes'' or ''No'' (case-sensitive, no extra whitespace). Any other token would
        be treated as not ''Yes'' and bias risk calculations and actions. Deequ example:
        .isContainedIn(''OverTime'', [''Yes'',''No''], lambda v: v == 1.0). Great
        Expectations: expect_column_values_to_match_regex(''^(Yes|No)$'').'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 129
        end_line: 129
        file: ''
      uid: 7636bdd8-9162-404a-8cc6-8a1626c85a29
    - text: 'Both ''Yes'' and ''No'' categories should be present in the ''OverTime''
        column so the uplift calculation is meaningful. Enforce that the number of
        distinct values is exactly 2. Deequ example: .hasNumberOfDistinctValues(''OverTime'',
        lambda v: v == 2). Alternatively, two satisfies checks: .satisfies("CASE WHEN
        `OverTime` = ''Yes'' THEN 1 ELSE 0 END", ''Has_OT_Yes'', lambda x: x > 0)
        and .satisfies("CASE WHEN `OverTime` = ''No'' THEN 1 ELSE 0 END", ''Has_OT_No'',
        lambda x: x > 0).'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: e6550eea-726d-45fe-9941-2c163edb908b
  '["OverTime","WorkLifeBalance"]':
    code: []
    assumptions:
    - text: 'Both ''OverTime'' and ''WorkLifeBalance'' must be present (non-null)
        for every row because they are used in boolean filters, mappings, and branching
        without null-handling. Example Deequ constraints: .isComplete(''OverTime'')
        and .isComplete(''WorkLifeBalance''), or .hasCompliance(''ot_wlb_not_null'',
        "OverTime IS NOT NULL AND WorkLifeBalance IS NOT NULL", _ >= 1.0).'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 51
        end_line: 53
        file: ''
      - start_line: 129
        end_line: 129
        file: ''
      uid: 2b6c4236-bc79-4b2a-818a-baa4abf511e9
    - text: '''OverTime'' values are restricted to the set {''Yes'',''No''} and ''WorkLifeBalance''
        values are restricted to {1,2,3,4}. This is required for correct filtering
        (OT) and mapping (WLB). Example Deequ constraint: .hasCompliance(''ot_wlb_domain'',
        "OverTime IN (''Yes'',''No'') AND WorkLifeBalance IN (1,2,3,4)", _ >= 1.0).'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 51
        end_line: 53
        file: ''
      - start_line: 129
        end_line: 129
        file: ''
      uid: 3278809b-1a25-41b0-b41c-bdf3e8836e65
    - text: 'Both ''OverTime'' classes (''Yes'' and ''No'') should be present (non-zero
        count) so that OT-based attrition rates and uplift are meaningful. Example
        Deequ constraints: Size().where("OverTime = ''Yes''") > 0 and Size().where("OverTime
        = ''No''") > 0.'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: 72db8a14-9099-4c8c-b974-735dc5793500
    - text: 'For rows with OverTime = ''No'', risk_ot must be exactly 0.0; for rows
        with OverTime = ''Yes'', risk_ot should be constant across all such rows (equal
        to the dataset-level uplift). Example Deequ constraints: .hasCompliance(''ot_no_zero_risk'',
        "(OverTime != ''No'') OR (risk_ot = 0.0)", _ >= 1.0) and .hasNumberOfDistinctValues(''risk_ot'',
        where = "OverTime = ''Yes''", equalTo = 1).'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: 78388741-9cc1-41d4-a01a-99fd6ab27f2e
    - text: 'risk_wlb must equal the defined mapping of WorkLifeBalance: 1 -> 1.0,
        2 -> 0.5, 3 -> 0.0, 4 -> -0.05. Example Deequ constraint: .hasCompliance(''wlb_mapping_correct'',
        "(WorkLifeBalance = 1 AND risk_wlb = 1.0) OR (WorkLifeBalance = 2 AND risk_wlb
        = 0.5) OR (WorkLifeBalance = 3 AND risk_wlb = 0.0) OR (WorkLifeBalance = 4
        AND risk_wlb = -0.05)", _ >= 1.0).'
      sources:
      - start_line: 51
        end_line: 53
        file: ''
      uid: 7fc197c5-eda8-4125-b1e7-5527490d8d54
    - text: 'If recommended_action = ''FlexibleSchedule'', then necessarily risk_tier
        = ''High'' AND OverTime = ''Yes'' AND WorkLifeBalance <= 2 (due to the ordered
        branching). Example Deequ constraint: .hasCompliance(''flex_sched_implies_conditions'',
        "recommended_action != ''FlexibleSchedule'' OR (risk_tier = ''High'' AND OverTime
        = ''Yes'' AND WorkLifeBalance <= 2)", _ >= 1.0).'
      sources:
      - start_line: 124
        end_line: 131
        file: ''
      - start_line: 137
        end_line: 137
        file: ''
      uid: b825335f-3084-488e-b70c-431b03f2f323
    - text: 'The data should contain at least some cases where OverTime = ''Yes''
        AND WorkLifeBalance <= 2 to enable the ''FlexibleSchedule'' action to ever
        be recommended on high-risk rows. Example Deequ constraint: Size().where("OverTime
        = ''Yes'' AND WorkLifeBalance <= 2") > 0.'
      sources:
      - start_line: 129
        end_line: 129
        file: ''
      uid: 92131821-d3fb-4d3c-bf4d-967f784106a1
