  '["JobSatisfaction","SalarySlab"]':
    code: []
    assumptions:
    - text: 'risk_income must be a deterministic mapping of SalarySlab. For every
        row: (SalarySlab = ''Upto 5k'' -> risk_income = 1.0), (SalarySlab = ''5k-10k''
        -> 0.6), (SalarySlab = ''10k-15k'' -> 0.3), (SalarySlab = ''15k+'' -> 0.0).
        Therefore, SalarySlab must be contained in {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}
        and risk_income should be non-null and match the mapping. This can be enforced
        with constraints like isContainedIn(''SalarySlab'', [...]) and a row-level
        predicate that checks the CASE mapping on (SalarySlab, risk_income).'
      sources:
      - start_line: 35
        end_line: 41
        file: ''
      uid: 48395d84-4e16-4db8-a080-b00cf085a6eb
    - text: risk_js must be derived from JobSatisfaction as risk_js = clip((4 - JobSatisfaction)/3.0,
        0, 1). Consequently, JobSatisfaction must be numeric and constrained to the
        valid survey scale {1,2,3,4}. This can be enforced by a row-level equality
        check between risk_js and the formula, plus an isContainedIn on JobSatisfaction.
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      - start_line: 56
        end_line: 57
        file: ''
      uid: b1604999-2013-44f0-bb8b-1a9780f615e5
    - text: 'risk_score must equal the clipped weighted sum of the component risks
        with fixed weights, including the contributions from risk_income (0.25) and
        risk_js (0.12). For every row: risk_raw = 0.25*risk_income + 0.15*risk_ot
        + 0.10*risk_wlb + 0.12*risk_js + 0.10*risk_role_stagnation + 0.10*risk_promo_lag
        + 0.08*risk_mgr_churn + 0.05*risk_age_band + 0.05*risk_commute; and risk_score
        = clip(risk_raw, 0, 1). Enforce with a row-level predicate comparing recomputed
        risk_score to the stored one (within a small tolerance).'
      sources:
      - start_line: 86
        end_line: 107
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: 16afa033-8383-4a6c-97a5-237f2dc3dfa2
    - text: 'Recommended action ''CompensationReview'' is valid only when the record
        is High risk AND low-paid AND low-satisfaction: if recommended_action = ''CompensationReview''
        then risk_tier = ''High'' AND SalarySlab = ''Upto 5k'' AND JobSatisfaction
        <= 2. Conversely, when risk_tier = ''High'' AND SalarySlab = ''Upto 5k'' AND
        JobSatisfaction <= 2, recommended_action must be ''CompensationReview''. This
        can be encoded as two implication constraints over the columns (risk_tier,
        SalarySlab, JobSatisfaction, recommended_action).'
      sources:
      - start_line: 35
        end_line: 41
        file: ''
      - start_line: 117
        end_line: 120
        file: ''
      - start_line: 124
        end_line: 129
        file: ''
      - start_line: 137
        end_line: 137
        file: ''
      uid: df359133-05f9-44ba-98cf-2b8f5862db6a
