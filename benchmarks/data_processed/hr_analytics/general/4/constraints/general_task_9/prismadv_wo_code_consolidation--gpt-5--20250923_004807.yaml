    assumptions:
    - text: 'YearsInCurrentRole should be numeric and represent whole years (integers).
        Non-numeric values will be coerced to null by the pipeline, so at least 95%
        of the values should be parseable as integers. Example Deequ rule: .hasDataType(''YearsInCurrentRole'',
