  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'SalarySlab is a deterministic bucketing of MonthlyIncome. For every row,
        the pair (MonthlyIncome, SalarySlab) must satisfy exactly one of the following:
        (SalarySlab = ''Upto 5k'' AND MonthlyIncome <= 5000) OR (SalarySlab = ''5k-10k''
        AND MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab = ''10k-15k''
        AND MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab = ''15k+''
        AND MonthlyIncome > 15000). We could represent this as a Deequ constraint:
        .hasCompliance(''income_slab_equivalence'', "(SalarySlab = ''Upto 5k'' AND
        MonthlyIncome <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000
        AND MonthlyIncome <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome
        > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome
        > 15000)")'
      sources:
      - start_line: 20
        end_line: 26
        file: ''
      - start_line: 35
        end_line: 41
        file: ''
      - start_line: 141
        end_line: 146
        file: ''
      uid: 9292d48c-70b2-4b03-a9f7-a87403f5176e
    - text: 'SalarySlab must be restricted to the exact set of categories used for
        risk mapping so that risk_income is always defined and the weighted sum risk_raw
        does not become NaN: {''Upto 5k'', ''5k-10k'', ''10k-15k'', ''15k+''}. In
        Deequ: .isContainedIn(''SalarySlab'', Array(''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''))
        and/or .hasCompliance(''risk_income_defined'', "SalarySlab IN (''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'')")'
