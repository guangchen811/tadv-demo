      uid: ca399a90-f878-40d2-b993-068ef1ba416f
  '["YearsAtCompany","YearsInCurrentRole"]':
    code: []
    assumptions:
    - text: 'Role tenure should never exceed total company tenure and neither should
        be negative. For every record: 0 <= YearsInCurrentRole <= YearsAtCompany.
        Example Deequ: .satisfies(''(YearsInCurrentRole >= 0) AND (YearsAtCompany
        >= 0) AND (YearsInCurrentRole <= YearsAtCompany)'', ''role_vs_company_tenure_ordering'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: 09573fc3-3fa8-49b9-b1cf-893176bac4af
    - text: 'If YearsAtCompany is zero, YearsInCurrentRole must also be zero (to avoid
        undefined or forced-zero ratios). Example Deequ: .satisfies(''(YearsAtCompany
        != 0) OR (YearsInCurrentRole == 0)'', ''zero_company_tenure_implies_zero_role_tenure'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: 156f0fe4-47fb-4979-886c-05fd86eb73cd
    - text: 'When YearsAtCompany > 0, the ratio YearsInCurrentRole/YearsAtCompany
        must be within [0, 1]. Example Deequ: .satisfies(''(YearsAtCompany <= 0) OR
        ((YearsInCurrentRole / YearsAtCompany) >= 0 AND (YearsInCurrentRole / YearsAtCompany)
        <= 1)'', ''role_ratio_bounded_0_1'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: 90accf7d-0d2a-4570-8273-dd2f2668c88e
    - text: 'Manager-tenure should not exceed company tenure: when YearsAtCompany
        > 0, YearsWithCurrManager/YearsAtCompany must be within [0,1]; if YearsAtCompany
        == 0 then YearsWithCurrManager must be 0. Example Deequ: .satisfies(''(YearsAtCompany
        <= 0) OR ((YearsWithCurrManager / YearsAtCompany) >= 0 AND (YearsWithCurrManager
        / YearsAtCompany) <= 1)'', ''mgr_ratio_bounded_0_1'') AND .satisfies(''(YearsAtCompany
        != 0) OR (YearsWithCurrManager == 0)'', ''zero_company_tenure_implies_zero_mgr_tenure'')'
      sources:
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 4290ef73-6ffa-4ec2-9eb1-5078cedf29ff
  '["YearsAtCompany","YearsInCurrentRole","YearsSinceLastPromotion","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'For records with YearsAtCompany > 0, the time in current role must not
        exceed total company tenure: YearsInCurrentRole <= YearsAtCompany. Equivalently,
        the ratio YearsInCurrentRole / YearsAtCompany should be in [0,1] when YearsAtCompany
        > 0. In Deequ: .satisfies("(YearsAtCompany <= 0) OR (YearsInCurrentRole <=
        YearsAtCompany)", "role_vs_company_tenure_le1").'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: a46d2952-2290-4b28-83ca-8b7612d06872
    - text: 'For records with YearsAtCompany > 0, the time with current manager must
        not exceed total company tenure: YearsWithCurrManager <= YearsAtCompany. Equivalently,
        the ratio YearsWithCurrManager / YearsAtCompany should be in [0,1] when YearsAtCompany
        > 0 (and never infinite). In Deequ: .satisfies("(YearsAtCompany <= 0) OR (YearsWithCurrManager
        <= YearsAtCompany)", "mgr_vs_company_tenure_le1").'
      sources:
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 36f58b10-c3d3-4565-8e79-b4852ba17cfb
    - text: 'If YearsAtCompany == 0, then no tenure-like sub-durations should be positive:
        YearsInCurrentRole == 0 AND (YearsWithCurrManager is null or 0) AND (YearsSinceLastPromotion
        is null or 0). This prevents undefined or infinite ratios and ensures internal
        consistency when total tenure is zero. In Deequ: .satisfies("CASE WHEN YearsAtCompany
        = 0 THEN coalesce(YearsInCurrentRole,0)=0 AND coalesce(YearsWithCurrManager,0)=0
        AND coalesce(YearsSinceLastPromotion,0)=0 ELSE true END", "zero_company_implies_zero_subtenures").'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 04c752d0-f3bc-402d-bbe8-0b4597176b30
    - text: 'Time since last promotion should not exceed total company tenure: YearsSinceLastPromotion
        <= YearsAtCompany. This keeps promotion lag bounded by tenure and maintains
        meaningful scaling when combining tenure-based risk features. In Deequ: .satisfies("YearsSinceLastPromotion
        <= YearsAtCompany", "promo_lag_le_company_tenure").'
      sources:
      - start_line: 59
        end_line: 66
        file: ''
      uid: d47b82dd-c89f-41b1-a008-4dc96b3948ff
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'YearsSinceLastPromotion must be less than or equal to YearsAtCompany
        for every record (an employee cannot have more years since the last promotion
        than total tenure at the company). Example Deequ: .satisfies(''YearsSinceLastPromotion
        <= YearsAtCompany'', ''yslp_le_yac'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 58beac78-b88d-46dc-a60d-db8d055d62fc
    - text: 'If YearsAtCompany == 0 (new hire), then YearsSinceLastPromotion must
        be 0 (no promotion before joining). Example Deequ: .satisfies(''YearsAtCompany
        <> 0 OR YearsSinceLastPromotion = 0'', ''no_promo_with_zero_tenure'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: c06b6c97-22ce-4a86-8296-47680e938352
    - text: 'recommended_action = ''CareerProgressionPlan'' should only occur when
        risk_tier = ''High'' AND (YearsSinceLastPromotion >= 4 OR YearsInCurrentRole/YearsAtCompany
        >= 0.7). This follows from risk_promo_lag = clip(YearsSinceLastPromotion/5,
        0, 1) and the rule that triggers CareerProgressionPlan when risk_promo_lag
        >= 0.8 or role_ratio >= 0.7. Example Deequ: .satisfies("recommended_action
        <> ''CareerProgressionPlan'' OR (risk_tier = ''High'' AND (YearsSinceLastPromotion
        >= 4 OR (YearsAtCompany > 0 AND YearsInCurrentRole/YearsAtCompany >= 0.7)))",
        ''career_plan_trigger'')'
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      - start_line: 117
        end_line: 120
        file: ''
      - start_line: 131
        end_line: 131
        file: ''
      - start_line: 137
        end_line: 137
        file: ''
      uid: f136effc-8daf-446e-b0ae-feaa8a9c98e4
  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'For employees with positive tenure, time with the current manager cannot
        exceed total time at the company. Formally: if YearsAtCompany > 0 then 0 <=
        YearsWithCurrManager <= YearsAtCompany. This keeps mgr_ratio in [0,1] and
        prevents counterintuitive risk values. Deequ example: .satisfies(''YearsAtCompany
        = 0 OR (YearsWithCurrManager >= 0 AND YearsWithCurrManager <= YearsAtCompany)'',
        ''mgr_ratio_bounds'', 1.0)'
      sources:
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: ded6c49c-7c7e-4569-93de-839975dab459
    - text: 'If YearsAtCompany == 0, then YearsWithCurrManager must be 0 (you cannot
        have manager tenure without company tenure). Deequ example: .satisfies(''YearsAtCompany
        > 0 OR COALESCE(YearsWithCurrManager, 0) = 0'', ''no_mgr_time_without_tenure'',
        1.0)'
      sources:
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: 5bbabc5a-8e98-41b0-97d4-b8f87fe27c20
    - text: 'When YearsAtCompany > 0, YearsWithCurrManager should be present (non-null)
        to avoid systematically inflating risk via defaulting mgr_ratio to 0. Set
        a minimum compliance of at least 95%. Deequ example: .satisfies(''YearsAtCompany
        <= 0 OR YearsWithCurrManager IS NOT NULL'', ''mgr_tenure_present_when_tenured'',
        0.95)'
      sources:
      - start_line: 69
        end_line: 70
        file: ''
      uid: f98bd0f3-45f2-4f79-8606-98120653fb2a
