  '["TotalWorkingYears","YearsAtCompany"]':
    code: []
    assumptions:
    - text: 'Time in current role must not exceed total tenure at the company: YearsInCurrentRole
        <= YearsAtCompany. This keeps role_ratio in [0,1] without relying on clipping.
        Deequ example: .satisfies(''YearsInCurrentRole <= YearsAtCompany'', ''role_le_company_tenure'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: d42007cf-6915-436a-aeb3-89b9ef8d4c6f
    - text: 'Time with current manager must not exceed total tenure at the company:
        YearsWithCurrManager <= YearsAtCompany. This keeps mgr_ratio in [0,1] without
        relying on clipping. Deequ example: .satisfies(''YearsWithCurrManager <= YearsAtCompany'',
        ''mgr_le_company_tenure'')'
      sources:
      - start_line: 69
        end_line: 70
        file: ''
      uid: 10a18f3c-4ddc-4000-81a5-664bbf03c1c6
    - text: 'Zero company tenure implies zero time in current role and zero time with
        current manager: if YearsAtCompany == 0 then YearsInCurrentRole == 0 AND YearsWithCurrManager
        == 0. This avoids undefined ratios being masked by fillna. Deequ example:
        .satisfies(''(YearsAtCompany > 0) OR (YearsInCurrentRole = 0 AND YearsWithCurrManager
        = 0)'', ''zero_tenure_implies_zero_role_and_mgr'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 166f7392-105f-47c6-a4f6-9f4504a8dcbb
    - text: 'Time since last promotion cannot exceed company tenure: YearsSinceLastPromotion
        <= YearsAtCompany. Deequ example: .satisfies(''YearsSinceLastPromotion <=
        YearsAtCompany'', ''promo_lag_le_company_tenure'')'
      sources:
      - start_line: 66
        end_line: 66
        file: ''
      - start_line: 61
        end_line: 63
        file: ''
      uid: 1731184a-6cc1-4c1f-b585-e6b5ac8b4ba2
    - text: 'Company tenure cannot exceed total working years: YearsAtCompany <= TotalWorkingYears.
        Deequ example: .satisfies(''YearsAtCompany <= TotalWorkingYears'', ''tenure_le_total_work'')'
      sources:
      - start_line: 20
        end_line: 21
        file: ''
      - start_line: 141
        end_line: 144
        file: ''
      uid: 5887b328-ec11-4891-ae08-604ab4735a8e
  '["TotalWorkingYears","YearsInCurrentRole"]':
    code: []
    assumptions:
    - text: 'Role tenure should not exceed company tenure: YearsInCurrentRole <= YearsAtCompany.
        This keeps the role_ratio logically within [0,1] before clipping. In Deequ:
        .satisfies(''YearsInCurrentRole <= YearsAtCompany'', ''yicr_le_yac'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: 2f4d8f75-d90f-405e-81e2-01ed9c86447b
    - text: 'No role tenure without company tenure: if YearsInCurrentRole > 0 then
        YearsAtCompany > 0. In Deequ: .satisfies(''(YearsInCurrentRole = 0) OR (YearsAtCompany
        > 0)'', ''no_role_without_company_tenure'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: bd04163c-e62f-465c-994e-d4cb300cc51e
    - text: 'Tenure hierarchy across career: YearsInCurrentRole <= YearsAtCompany
        AND YearsAtCompany <= TotalWorkingYears (thus also YearsInCurrentRole <= TotalWorkingYears).
        In Deequ: .satisfies(''YearsInCurrentRole <= YearsAtCompany AND YearsAtCompany
        <= TotalWorkingYears'', ''tenure_hierarchy'')'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 20
        end_line: 26
        file: ''
      - start_line: 141
        end_line: 144
        file: ''
      uid: 1f6d4f64-641c-4fae-b0a2-16e1af428ce1
  '["TotalWorkingYears","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'Manager time must be bounded by company tenure for employees with positive
        tenure: if YearsAtCompany > 0 then YearsWithCurrManager must be non-null and
        satisfy 0 <= YearsWithCurrManager <= YearsAtCompany. This keeps mgr_ratio
        meaningful and within [0,1]. Example Deequ: .satisfies("YearsAtCompany <=
        0 OR (YearsWithCurrManager IS NOT NULL AND YearsWithCurrManager >= 0 AND YearsWithCurrManager
        <= YearsAtCompany)", "ywcm_within_company_tenure")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: e7582ef1-8600-4694-8ecb-1a076f23720b
    - text: 'Zero tenure implies zero manager time, and positive manager time implies
        positive tenure (coherence and conditional completeness): (YearsAtCompany
        = 0) -> coalesce(YearsWithCurrManager, 0) = 0, and when YearsAtCompany > 0,
        YearsWithCurrManager must be present. Example Deequ: .satisfies("(YearsAtCompany
        = 0 AND coalesce(YearsWithCurrManager, 0) = 0) OR (YearsAtCompany > 0 AND
        YearsWithCurrManager IS NOT NULL)", "ywcm_tenure_coherence")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 48a24839-ab7a-4a8b-9243-0fd07d644789
    - text: 'Company tenure cannot exceed total working years: enforce 0 <= YearsAtCompany
        <= TotalWorkingYears. Example Deequ: .satisfies("YearsAtCompany >= 0 AND TotalWorkingYears
        >= 0 AND YearsAtCompany <= TotalWorkingYears", "tenure_le_total_work")'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 140
        end_line: 144
        file: ''
      uid: 219a53b3-1da3-48db-932e-85db8fc32896
    - text: 'Time with current manager cannot exceed total working years: enforce
        0 <= YearsWithCurrManager <= TotalWorkingYears. Example Deequ: .satisfies("YearsWithCurrManager
        >= 0 AND TotalWorkingYears >= 0 AND YearsWithCurrManager <= TotalWorkingYears",
        "mgr_time_le_total_work")'
      sources:
      - start_line: 20
