  '["Age","TotalWorkingYears","YearsAtCompany"]':
    code: []
    assumptions:
    - text: 'YearsInCurrentRole should be less than or equal to YearsAtCompany for
        all records (e.g., Deequ: .isLessThanOrEqual(''YearsInCurrentRole'',''YearsAtCompany'')).'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: f306f29d-bebc-4582-bd32-244e6b76dc77
    - text: 'YearsWithCurrManager should be less than or equal to YearsAtCompany for
        all records (e.g., Deequ: .isLessThanOrEqual(''YearsWithCurrManager'',''YearsAtCompany'')).'
      sources:
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      uid: d9f72005-505a-407e-beea-68b61739d7a6
    - text: 'If YearsAtCompany equals 0, then YearsInCurrentRole and YearsWithCurrManager
        must both be 0 (e.g., Deequ: .satisfies(''(YearsAtCompany > 0) OR (YearsInCurrentRole
        = 0 AND YearsWithCurrManager = 0)'', ''zero_tenure_implies_zero_role_mgr'')).'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 3d66bd0a-dadd-4580-923e-0fd043863613
    - text: 'YearsAtCompany should not exceed TotalWorkingYears (e.g., Deequ: .isLessThanOrEqual(''YearsAtCompany'',''TotalWorkingYears'')).'
      sources:
      - start_line: 20
        end_line: 26
        file: ''
      - start_line: 141
        end_line: 146
        file: ''
      uid: 4d356904-4a4f-4276-9fdb-67da5fcd645a
    - text: "AgeGroup must be consistent with Age: 18\u201325 -> '18-25'; 26\u2013\
        35 -> '26-35'; 36\u201345 -> '36-45'; 46\u201355 -> '46-55'; 55+ -> '55+'\
        \ (e.g., Deequ: .satisfies('CASE WHEN Age BETWEEN 18 AND 25 THEN AgeGroup\
        \ = \"18-25\" WHEN Age BETWEEN 26 AND 35 THEN AgeGroup = \"26-35\" WHEN Age\
        \ BETWEEN 36 AND 45 THEN AgeGroup = \"36-45\" WHEN Age BETWEEN 46 AND 55 THEN\
        \ AgeGroup = \"46-55\" WHEN Age >= 55 THEN AgeGroup = \"55+\" ELSE false END','age_agegroup_consistency'))."
      sources:
      - start_line: 73
        end_line: 80
        file: ''
      - start_line: 141
        end_line: 145
        file: ''
      uid: 8b8dff97-c1dc-4363-9779-234915b5182b
    - text: 'TotalWorkingYears should be plausible given Age and adult workforce assumption
        implied by the age bands; specifically, TotalWorkingYears <= Age - 18 (e.g.,
        Deequ: .satisfies(''TotalWorkingYears <= Age - 18'',''work_years_le_age_minus_18'')).'
      sources:
      - start_line: 73
        end_line: 80
        file: ''
      - start_line: 20
        end_line: 21
        file: ''
      uid: 2cc25018-7f21-4198-9b04-563db81cab39
    - text: 'YearsAtCompany should be plausible given Age; specifically, YearsAtCompany
        <= Age - 18 (e.g., Deequ: .satisfies(''YearsAtCompany <= Age - 18'',''company_years_le_age_minus_18'')).'
      sources:
      - start_line: 73
        end_line: 80
        file: ''
      - start_line: 20
        end_line: 23
        file: ''
      uid: 44767d87-99f1-4d86-8f5d-e063a443ebd8
  '["Attrition","OverTime"]':
    code: []
    assumptions:
    - text: 'Attrition and OverTime are binary categorical flags with no nulls; every
        row must have Attrition in {''Yes'',''No''} AND OverTime in {''Yes'',''No''}.
        This ensures valid boolean masks and groupwise rate calculations. Example
        Deequ: .satisfies("Attrition IN (''Yes'',''No'') AND OverTime IN (''Yes'',''No'')",
        ''Attrition_OverTime_Binary'', lambda v: v == 1.0)'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 113
        end_line: 120
        file: ''
      uid: 641f9370-47ed-472f-87d6-92477ad3d76e
    - text: 'Both OverTime groups must be present in the dataset (at least one row
        with OverTime=''Yes'' and at least one with OverTime=''No'') so that groupwise
        attrition rates and uplift are meaningful. Example Deequ: .satisfies("OverTime
        = ''Yes''", ''Has_OT_Yes'', lambda c: c > 0.0) and .satisfies("OverTime =
        ''No''", ''Has_OT_No'', lambda c: c > 0.0)'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      uid: 30ea5de0-ab91-4717-8f23-246fa946e846
    - text: 'Attrition must be complete and valid within each OverTime segment (no
        nulls or unexpected values when OverTime is ''Yes'' or ''No'') so that rate_ot_yes
        and rate_ot_no reflect true rates. Example Deequ: .hasCompleteness(''Attrition'',
        lambda x: x == 1.0, where="OverTime = ''Yes''") and .hasCompleteness(''Attrition'',
        lambda x: x == 1.0, where="OverTime = ''No''"); plus .satisfies("(OverTime
        <> ''Yes'') OR Attrition IN (''Yes'',''No'')", ''Attrition_Valid_When_OTYes'',
        lambda v: v == 1.0) and similarly for OverTime=''No'''
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      uid: e637bee3-e9c1-4899-84a3-c2aaa973bc6c
    - text: 'To avoid a degenerate uplift (division-by-zero path) and ensure a meaningful
        comparison, there should be at least one record with OverTime=''No'' and Attrition=''Yes''.
        Example Deequ: .satisfies("(OverTime = ''No'') AND (Attrition = ''Yes'')",
        ''Has_AttritionYes_in_OTNo'', lambda c: c > 0.0)'
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      uid: 2067d068-2e7d-4758-9359-93acbf09f55d
    - text: 'When OverTime=''Yes'', WorkLifeBalance must be present and within the
        valid scale (1,2,3,4) to make the conditional rule for ''FlexibleSchedule''
        actionable. Example Deequ: .satisfies("(OverTime <> ''Yes'') OR (WorkLifeBalance
        IN (1,2,3,4))", ''WLB_Valid_When_OTYes'', lambda v: v == 1.0)'
      sources:
      - start_line: 129
        end_line: 129
        file: ''
      uid: 1dd8fca6-fb7e-41a0-a6e3-4f737a0a74b5
