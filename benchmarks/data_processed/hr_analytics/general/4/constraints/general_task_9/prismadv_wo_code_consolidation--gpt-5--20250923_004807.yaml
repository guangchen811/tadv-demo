    - text: 'For rows where YearsAtCompany = 0 (new hires), YearsInCurrentRole should
        be 0 as well. Example Deequ rule: .satisfies(''CASE WHEN `YearsAtCompany`
        = 0 THEN CASE WHEN COALESCE(`YearsInCurrentRole`, 0) = 0 THEN 1 ELSE 0 END
        ELSE 1 END'', ''New hires have 0 years in current role'', lambda x: x == 1.0).'
