    - text: 'All non-null YearsInCurrentRole values should be non-negative (>= 0).
        Negative years would produce invalid ratios and are not meaningful. Example
        Deequ rule: .satisfies(''CASE WHEN `YearsInCurrentRole` IS NULL THEN 1 WHEN
        `YearsInCurrentRole` >= 0 THEN 1 ELSE 0 END'', ''Non-negative YearsInCurrentRole'',
