constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['No', 'Yes'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['Non-Travel', 'Travel_Rarely', 'Travel_Frequently'])
      - Invalid
    assumptions: []
  EmpID:
    code:
    - - '.hasNumberOfDistinctValues(''EmpID'', lambda x: x == df.count())'
      - Invalid
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .hasDistinctValue('EmployeeCount', 1)
      - Invalid
    - - .isComplete('EmployeeCount')
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - '.hasNumberOfDistinctValues(''EmployeeNumber'', lambda x: x == df.count())'
      - Invalid
    - - .isComplete('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isNonNegative('JobLevel')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .hasDistinctValue('Over18', 'Y')
      - Invalid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['No', 'Yes'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isComplete('PercentSalaryHike')
      - Valid
    - - .isNonNegative('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .hasDistinctValue('StandardHours', 80)
      - Invalid
    - - .isComplete('StandardHours')
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95)'
      - Valid
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
