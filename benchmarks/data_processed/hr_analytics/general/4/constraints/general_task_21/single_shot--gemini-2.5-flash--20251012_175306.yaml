constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isIntegral('Age')
      - Invalid
    - - .isLessThanOrEqualTo('Age', 65)
      - Invalid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    - - .isStringType('AgeGroup')
      - Invalid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    - - .isStringType('Attrition')
      - Invalid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['Travel_Rarely', 'Travel_Frequently', 'Non-Travel'])
      - Invalid
    - - .isStringType('BusinessTravel')
      - Invalid
    assumptions: []
  DailyRate:
    code:
    - - .isComplete('DailyRate')
      - Valid
    - - .isIntegral('DailyRate')
      - Invalid
    - - .isPositive('DailyRate')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    - - .isStringType('Department')
      - Invalid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isComplete('DistanceFromHome')
      - Valid
    - - .isIntegral('DistanceFromHome')
      - Invalid
    - - .isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  Education:
    code:
    - - .isComplete('Education')
      - Valid
    - - .isContainedIn('Education', ['1', '2', '3', '4', '5'])
      - Valid
    - - .isIntegral('Education')
      - Invalid
    assumptions: []
  EducationField:
    code:
    - - .isComplete('EducationField')
      - Valid
    - - .isContainedIn('EducationField', ['Other', 'Medical', 'Technical Degree',
        'Marketing', 'Human Resources', 'Life Sciences'])
      - Valid
    - - .isStringType('EducationField')
      - Invalid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isStringType('EmpID')
      - Invalid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isComplete('EmployeeCount')
      - Valid
    - - .isContainedIn('EmployeeCount', ['1'])
      - Valid
    - - .isIntegral('EmployeeCount')
      - Invalid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    - - .isIntegral('EmployeeNumber')
      - Invalid
    - - .isUnique('EmployeeNumber')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isComplete('EnvironmentSatisfaction')
      - Valid
    - - .isContainedIn('EnvironmentSatisfaction', ['1', '2', '3', '4'])
      - Valid
    - - .isIntegral('EnvironmentSatisfaction')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    - - .isStringType('Gender')
      - Invalid
    assumptions: []
  HourlyRate:
    code:
    - - .isComplete('HourlyRate')
      - Valid
    - - .isIntegral('HourlyRate')
      - Invalid
    - - .isPositive('HourlyRate')
      - Valid
    assumptions: []
  JobInvolvement:
    code:
    - - .isComplete('JobInvolvement')
      - Valid
    - - .isContainedIn('JobInvolvement', ['1', '2', '3', '4'])
      - Valid
    - - .isIntegral('JobInvolvement')
      - Invalid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', ['1', '2', '3', '4', '5'])
      - Valid
    - - .isIntegral('JobLevel')
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    - - .isContainedIn('JobRole', ['Research Director', 'Sales Representative', 'Research
        Scientist', 'Manufacturing Director', 'Healthcare Representative', 'Sales
        Executive', 'Manager', 'Human Resources', 'Laboratory Technician'])
      - Valid
    - - .isStringType('JobRole')
      - Invalid
    - - .satisfies('JobRole == "Healthcare Representative" => Department == "Sales"',
        'Healthcare Representative must be in Sales Department')
      - Invalid
    - - .satisfies('JobRole == "Laboratory Technician" => Department == "Research
        & Development"', 'Laboratory Technician must be in R&D Department')
      - Invalid
    - - .satisfies('JobRole == "Manufacturing Director" => Department == "Research
        & Development"', 'Manufacturing Director must be in R&D Department')
      - Invalid
    - - .satisfies('JobRole == "Research Director" => Department == "Research & Development"',
        'Research Director must be in R&D Department')
      - Invalid
    - - .satisfies('JobRole == "Research Scientist" => Department == "Research & Development"',
        'Research Scientist must be in R&D Department')
      - Invalid
    - - .satisfies('JobRole == "Sales Executive" => Department == "Sales"', 'Sales
        Executive must be in Sales Department')
      - Invalid
    - - .satisfies('JobRole == "Sales Representative" => Department == "Sales"', 'Sales
        Representative must be in Sales Department')
      - Invalid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction')
      - Valid
    - - .isContainedIn('JobSatisfaction', ['1', '2', '3', '4'])
      - Valid
    - - .isIntegral('JobSatisfaction')
      - Invalid
    assumptions: []
  MaritalStatus:
    code:
    - - .isComplete('MaritalStatus')
      - Valid
    - - .isContainedIn('MaritalStatus', ['Divorced', 'Single', 'Married'])
      - Valid
    - - .isStringType('MaritalStatus')
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isIntegral('MonthlyIncome')
      - Invalid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyRate:
    code:
    - - .isComplete('MonthlyRate')
      - Valid
    - - .isIntegral('MonthlyRate')
      - Invalid
    - - .isPositive('MonthlyRate')
      - Valid
    assumptions: []
  NumCompaniesWorked:
    code:
    - - .isComplete('NumCompaniesWorked')
      - Valid
    - - .isIntegral('NumCompaniesWorked')
      - Invalid
    - - .isNonNegative('NumCompaniesWorked')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18')
      - Valid
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    - - .isStringType('Over18')
      - Invalid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    - - .isStringType('OverTime')
      - Invalid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isComplete('PercentSalaryHike')
      - Valid
    - - .isIntegral('PercentSalaryHike')
      - Invalid
    - - .isPositive('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', ['3', '4'])
      - Valid
    - - .isIntegral('PerformanceRating')
      - Invalid
    assumptions: []
  RelationshipSatisfaction:
    code:
    - - .isComplete('RelationshipSatisfaction')
      - Valid
    - - .isContainedIn('RelationshipSatisfaction', ['1', '2', '3', '4'])
      - Valid
    - - .isIntegral('RelationshipSatisfaction')
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    - - .isStringType('SalarySlab')
      - Invalid
    assumptions: []
  StandardHours:
    code:
    - - .isComplete('StandardHours')
      - Valid
    - - .isContainedIn('StandardHours', ['80'])
      - Valid
    - - .isIntegral('StandardHours')
      - Invalid
    assumptions: []
  StockOptionLevel:
    code:
    - - .isComplete('StockOptionLevel')
      - Valid
    - - .isContainedIn('StockOptionLevel', ['0', '1', '2', '3'])
      - Valid
    - - .isIntegral('StockOptionLevel')
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isIntegral('TotalWorkingYears')
      - Invalid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    - - .satisfies('TotalWorkingYears >= YearsAtCompany', 'TotalWorkingYears greater
        than or equal to YearsAtCompany')
      - Valid
    assumptions: []
  TrainingTimesLastYear:
    code:
    - - .isComplete('TrainingTimesLastYear')
      - Valid
    - - .isIntegral('TrainingTimesLastYear')
      - Invalid
    - - .isNonNegative('TrainingTimesLastYear')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isComplete('WorkLifeBalance')
      - Valid
    - - .isContainedIn('WorkLifeBalance', ['1', '2', '3', '4'])
      - Valid
    - - .isIntegral('WorkLifeBalance')
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isIntegral('YearsAtCompany')
      - Invalid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    - - .satisfies('YearsAtCompany >= YearsInCurrentRole', 'YearsAtCompany greater
        than or equal to YearsInCurrentRole')
      - Valid
    - - .satisfies('YearsAtCompany >= YearsSinceLastPromotion', 'YearsAtCompany greater
        than or equal to YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isIntegral('YearsInCurrentRole')
      - Invalid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isIntegral('YearsSinceLastPromotion')
      - Invalid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - .hasCompleteness('YearsWithCurrManager', 0.95)
      - Invalid
    - - .isFractional('YearsWithCurrManager')
      - Invalid
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isIntegral('id')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
