constraints:
  Age:
    code:
    - - '.hasMax(''Age'', lambda v: v <= 70)'
      - Valid
    - - '.hasMin(''Age'', lambda v: v >= 18)'
      - Valid
    - - .isComplete('Age')
      - Valid
    - - '.satisfies("(Age BETWEEN 18 AND 25 AND AgeGroup = ''18-25'') OR (Age BETWEEN
        26 AND 35 AND AgeGroup = ''26-35'') OR (Age BETWEEN 36 AND 45 AND AgeGroup
        = ''36-45'') OR (Age BETWEEN 46 AND 55 AND AgeGroup = ''46-55'') OR (Age >=
        56 AND AgeGroup = ''55+'')", ''agegroup_matches_age'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isComplete('EnvironmentSatisfaction')
      - Valid
    - - .isContainedIn('EnvironmentSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction')
      - Valid
    - - .isContainedIn('JobSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - '.satisfies("(SalarySlab = ''Upto 5k'' AND (MonthlyIncome IS NULL OR (MonthlyIncome
        >= 0 AND MonthlyIncome <= 5000))) OR (SalarySlab = ''5k-10k'' AND (MonthlyIncome
        IS NULL OR (MonthlyIncome >= 5001 AND MonthlyIncome <= 10000))) OR (SalarySlab
        = ''10k-15k'' AND (MonthlyIncome IS NULL OR (MonthlyIncome >= 10001 AND MonthlyIncome
        <= 15000))) OR (SalarySlab = ''15k+'' AND (MonthlyIncome IS NULL OR (MonthlyIncome
        >= 15001)))", ''income_matches_slab'', lambda v: v == 1.0)'
      - Valid
    - - '.satisfies(''MonthlyIncome IS NULL OR MonthlyIncome >= 0'', ''MonthlyIncome_nonneg_or_null'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isComplete('WorkLifeBalance')
      - Valid
    - - .isContainedIn('WorkLifeBalance', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    - - '.satisfies(''YearsAtCompany <= TotalWorkingYears'', ''yac_le_total'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    - - '.satisfies(''YearsInCurrentRole <= YearsAtCompany'', ''role_le_yac'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    - - '.satisfies(''YearsSinceLastPromotion <= YearsAtCompany'', ''promo_le_yac'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.satisfies(''YearsWithCurrManager <= YearsAtCompany OR YearsWithCurrManager
        IS NULL'', ''mgr_le_yac_or_null'', lambda v: v == 1.0)'
      - Valid
    - - '.satisfies(''YearsWithCurrManager >= 0 OR YearsWithCurrManager IS NULL'',
        ''YearsWithCurrManager_nonneg_or_null'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
