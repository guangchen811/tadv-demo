constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isGreaterThanOrEqualTo('Age', 18)
      - Invalid
    - - .isLessThanOrEqualTo('Age', 70)
      - Invalid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
