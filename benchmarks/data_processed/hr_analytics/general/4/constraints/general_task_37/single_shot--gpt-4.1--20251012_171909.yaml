constraints:
  CareerStage:
    code:
    - - .isComplete('CareerStage')
      - Invalid
    assumptions: []
  CompaRatio:
    code:
    - - .isNonNegative('CompaRatio')
      - Invalid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', [1,2,3,4,5])
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  NewMonthlyIncome:
    code:
    - - .isNonNegative('NewMonthlyIncome')
      - Invalid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3,4])
      - Invalid
    assumptions: []
  RecommendedRaisePct:
    code:
    - - .isLessThanOrEqualTo('RecommendedRaisePct', 0.15)
      - Invalid
    - - .isNonNegative('RecommendedRaisePct')
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    assumptions: []
