    - text: 'PercentSalaryHike must be numeric and non-null so that recommended_percent
        = PercentSalaryHike + rating_bonus is defined and numeric for every row. Actionable
        checks: .isComplete(''PercentSalaryHike'') and .isNumeric(''PercentSalaryHike'');
        and a derived-row check that recommended_percent == PercentSalaryHike + rating_bonus
        (within a small float tolerance).'
      sources:
