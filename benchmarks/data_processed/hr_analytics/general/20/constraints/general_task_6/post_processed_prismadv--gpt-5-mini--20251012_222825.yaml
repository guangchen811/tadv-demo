      - start_line: 19
        end_line: 20
        file: ''
      uid: 37a2aec0-7d5f-440d-9a0e-a5d9e01cf965
    - text: 'The ''SalarySlab'' values must be contained in the keys of cap_map so
        that ''cap_percent'' is assigned (non-null) for every row. Concretely: SalarySlab
        should only take values from {''Upto 5k'', ''5k-10k'', ''10k-15k'', ''15k+''}
        (or else cap_percent will be null).'
