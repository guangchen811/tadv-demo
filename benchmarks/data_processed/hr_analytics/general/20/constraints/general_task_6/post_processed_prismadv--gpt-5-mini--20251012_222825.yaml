    - text: 'The ''SalarySlab'' column must not contain null / missing values for
        any input row. The code maps SalarySlab to cap_percent and then uses cap_percent
        in numeric operations; null SalarySlab would lead to null cap_percent and
        propagate to approved_amount and aggregated MeritBudget.

        Example enforcement: .satisfies("CASE WHEN `SalarySlab` IS NOT NULL THEN 1
        ELSE 0 END", "SalarySlab not null", lambda x: x == 1.0)

        (Or Great Expectations: expect_column_values_to_not_be_null(''SalarySlab'')).'
      sources:
      - start_line: 22
        end_line: 24
        file: ''
      - start_line: 92
        end_line: 92
        file: ''
      uid: 2c9ca86f-ef50-4c1e-b57f-ddaf5d756e18
    - text: 'Values in ''SalarySlab'' must match the mapping keys exactly (case-sensitive,
        no extra leading/trailing whitespace). The mapping uses exact string keys,
        so differences in casing or surrounding spaces will cause map misses and produce
        null cap_percent.

        Example enforcement: .satisfies("CASE WHEN TRIM(`SalarySlab`) IN (''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'')
        AND `SalarySlab` = TRIM(`SalarySlab`) THEN 1 ELSE 0 END", "SalarySlab exact-match
        & trimmed", lambda x: x == 1.0)

        (Or Great Expectations: expect_column_values_to_be_in_set with preprocessing
        or an additional expectation to check no leading/trailing whitespace).'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      uid: 854e5f30-8265-46d8-824b-9c269182c7fc
    - text: 'The number of distinct categories in ''SalarySlab'' should be small and
        limited to the expected set (i.e., distinct_count <= 4 and ideally equal to
        4 if all categories are expected). This ensures cap_map covers all observed
        categories.

        Example enforcement: .satisfies("CASE WHEN cardinality(collect_set(`SalarySlab`))
        <= 4 THEN 1 ELSE 0 END", "SalarySlab distinct count <= 4", lambda x: x ==
        1.0)

        (Or Great Expectations: expect_column_unique_value_count_to_be_between(column=''SalarySlab'',
        min_value=1, max_value=4)).'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      uid: 7073ce4d-1927-4275-938b-df0d09d137f0
  '["SalarySlab","cap_percent"]':
    code: []
    assumptions:
    - text: 'SalarySlab must only contain the categories the script maps to cap_percent:
        [''Upto 5k'', ''5k-10k'', ''10k-15k'', ''15k+'']. This ensures the mapping
        df[''cap_percent''] = df[''SalarySlab''].map(cap_map) produces non-null values.
        Example constraints: SalarySlab.isContainedIn({''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''})
        and cap_percent.isNotNull().'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      uid: ae05a923-1f2c-4d6c-9cca-2e1f58b5278e
    - text: 'cap_percent is completely determined by SalarySlab (functional dependency
        SalarySlab -> cap_percent) and must take only the numeric values defined in
        the cap_map (20.0, 15.0, 12.0, 10.0). Example constraints: hasFunctionalDependency([''SalarySlab''],
        ''cap_percent''); cap_percent.isContainedIn({10.0,12.0,15.0,20.0}).'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      uid: c39309dd-cda2-4ca9-b6ff-a7cf42b8cfb8
    - text: 'recommended_percent must be numeric and computable for every row: PercentSalaryHike
        must be numeric/non-null and PerformanceRating must be in the keys of rating_bonus_map
        (3 or 4) so that rating_bonus is defined. Example constraints: PercentSalaryHike.isNumeric().isNotNull();
        PerformanceRating.isContainedIn({3,4}); recommended_percent.isNotNull().'
      sources:
      - start_line: 18
        end_line: 20
        file: ''
      uid: de031ba4-99ac-4b40-b480-6bf937f2e664
    - text: 'approved_percent must equal the row-wise minimum of recommended_percent
        and cap_percent. Equivalently, for every row approved_percent == min(recommended_percent,
        cap_percent) (or at least approved_percent <= recommended_percent and approved_percent
        <= cap_percent). Example constraints: satisfies("approved_percent == least(recommended_percent,
        cap_percent)") or (approved_percent <= recommended_percent AND approved_percent
        <= cap_percent).'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      uid: 6f020f11-4a2c-48e7-a1b2-3280685ab55b
    - text: 'approved_amount must equal MonthlyIncome * (approved_percent / 100.0)
        and be non-negative. This requires MonthlyIncome to be numeric and non-null
        and approved_percent numeric/non-null. Example constraints: approved_amount.isNotNull();
        approved_amount.satisfies(''approved_amount == MonthlyIncome * (approved_percent/100)'');
        MonthlyIncome.isNumeric().isNotNull().'
      sources:
      - start_line: 23
        end_line: 24
        file: ''
      uid: 9f457a72-436e-4c87-a2b1-4ddf90d19418
    - text: 'When aggregating department budgets, EmpID should be consistently associated
        with a single Department (no EmpID appearing in multiple Departments) or EmpID
        must be unique per record. This prevents inflated Headcount when doing dept-level
        groupby counts. Example constraints: hasFunctionalDependency([''EmpID''],
        ''Department'') OR EmpID.isUnique().'
      sources:
      - start_line: 26
        end_line: 29
        file: ''
      uid: 45455748-ff51-4736-8b61-95a70ad482f1
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'For every record, YearsSinceLastPromotion must be less than or equal
        to YearsAtCompany (you cannot have more years since last promotion than total
        years at the company). A Deequ-style constraint example:

        .satisfies(''YearsSinceLastPromotion <= YearsAtCompany'', ''promo_not_exceed_tenure'')'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      uid: 031fbae5-6a8b-460b-aa1f-b97af66d8569
    - text: 'Both YearsAtCompany and YearsSinceLastPromotion should be non-negative
        numeric values (>= 0). A Deequ-style constraint example:

        .satisfies(''YearsAtCompany >= 0 AND YearsSinceLastPromotion >= 0'', ''non_negative_years'')

        (or separate numeric checks / type checks per column)'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      uid: 9cf6ee4f-b781-454b-b02c-58df47657735
    - text: 'If YearsAtCompany is zero, then YearsSinceLastPromotion must also be
        zero (no promotion years when total tenure is zero). A Deequ-style constraint
        example:

        .satisfies(''YearsAtCompany != 0 OR YearsSinceLastPromotion == 0'', ''zero_tenure_implies_zero_promo'')'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      uid: 2732bb07-70a9-445f-96d6-ca24e98a2be3
    - text: 'Both YearsAtCompany and YearsSinceLastPromotion should be present (no
        nulls) together for records used in tenure_ratio computation. A Deequ-style
        constraint example:

        .isComplete(["YearsAtCompany", "YearsSinceLastPromotion"])

        (or .satisfies(''YearsAtCompany IS NOT NULL AND YearsSinceLastPromotion IS
        NOT NULL'', ''both_years_present''))'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      uid: a24466e3-72b7-47cc-b36d-88d65587bfa1
  '["YearsAtCompany","YearsWithCurrManager"]':
    code:
    - suggestion: '.satisfies("CASE WHEN YearsSinceLastPromotion IS NULL OR YearsSinceLastPromotion
        >= 0 THEN 1 ELSE 0 END", "ysp_non_negative", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 7d44608c-6720-47bb-9c54-7e6394462fe1
      source_assumptions:
      - a3a1b00d-ae65-4b04-a277-6e9202cc5460
    - suggestion: '.satisfies("CASE WHEN YearsAtCompany = 0 OR YearsSinceLastPromotion
        IS NULL OR YearsSinceLastPromotion <= YearsAtCompany THEN 1 ELSE 0 END", "ysp_le_yac_or_zero_yac",
        lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: b40be6b6-6c66-46cd-9eae-5ab42cb2af70
      source_assumptions:
      - a3a1b00d-ae65-4b04-a277-6e9202cc5460
    - suggestion: '.satisfies("CASE WHEN YearsWithCurrManager IS NULL OR YearsWithCurrManager
        >= 0 THEN 1 ELSE 0 END", "mgr_non_negative", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: db13b496-3cca-4f45-9e95-1034fb1fe12f
      source_assumptions:
      - 42fef374-c79b-474b-8fcf-c7e49cedf8bf
    - suggestion: '.satisfies("CASE WHEN YearsAtCompany IS NULL OR coalesce(YearsWithCurrManager,
        0) <= YearsAtCompany THEN 1 ELSE 0 END", "mgr_le_yac", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: a09e304d-0b4a-45f8-81fa-25e3b0749d5c
      source_assumptions:
      - 42fef374-c79b-474b-8fcf-c7e49cedf8bf
    - suggestion: '.satisfies("CASE WHEN YearsAtCompany != 0 OR coalesce(YearsWithCurrManager,
        0) = 0 THEN 1 ELSE 0 END", "zero_yac_implies_zero_mgr_coalesced", lambda x:
        x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: c24b79dd-fa5a-42bf-9052-eb17d7db7081
      source_assumptions:
      - 11d6ccb6-254b-4689-a287-86fc9275b973
    assumptions:
    - text: 'For each record, YearsSinceLastPromotion should be numeric, non-negative,
        and less than or equal to YearsAtCompany. The code computes tenure_ratio =
        YearsSinceLastPromotion / YearsAtCompany, so it assumes YearsSinceLastPromotion
        <= YearsAtCompany when YearsAtCompany > 0. Actionable constraint (Deequ-style):

        .satisfies("YearsSinceLastPromotion >= 0", "ysp_non_negative")

        .satisfies("YearsAtCompany > 0 AND YearsSinceLastPromotion <= YearsAtCompany
        OR YearsAtCompany = 0", "ysp_le_yac_or_zero_yac")

        (Or equivalently) .satisfies("YearsSinceLastPromotion <= YearsAtCompany",
        "ysp_le_yac") for rows where YearsAtCompany IS NOT NULL and > 0.'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      uid: a3a1b00d-ae65-4b04-a277-6e9202cc5460
    - text: 'YearsWithCurrManager should be numeric, non-negative, and not exceed
        YearsAtCompany for the same employee (YearsWithCurrManager <= YearsAtCompany).
        The code fills missing YearsWithCurrManager with 0 before applying a threshold
        (< 1.0), so a safe, enforceable rule is coalesce(YearsWithCurrManager, 0)
        <= YearsAtCompany. Actionable constraint examples:

        .satisfies("coalesce(YearsWithCurrManager, 0) >= 0", "mgr_non_negative")

        .satisfies("coalesce(YearsWithCurrManager, 0) <= YearsAtCompany", "mgr_le_yac")'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      - start_line: 62
        end_line: 63
        file: ''
      uid: 42fef374-c79b-474b-8fcf-c7e49cedf8bf
    - text: 'If YearsAtCompany == 0 then YearsWithCurrManager must be null or 0 (i.e.,
        cannot be positive). The code treats missing YearsWithCurrManager as 0, so
        logically when YearsAtCompany is zero there should be no positive manager-tenure.
        Actionable constraint (Deequ-style):

        .satisfies("YearsAtCompany != 0 OR YearsWithCurrManager = 0 OR YearsWithCurrManager
        IS NULL", "zero_yac_implies_zero_mgr")

        (or using coalesce) .satisfies("YearsAtCompany != 0 OR coalesce(YearsWithCurrManager,
        0) = 0", "zero_yac_implies_zero_mgr_coalesced")'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      - start_line: 62
        end_line: 63
        file: ''
      uid: 11d6ccb6-254b-4689-a287-86fc9275b973
