        end_line: 22
        file: ''
      - start_line: 23
        end_line: 23
        file: ''
      uid: 9ab2a2ef-4052-4904-b191-67d92184f2e6
    - text: Both 'recommended_percent' (computed from PercentSalaryHike + rating_bonus)
        and 'cap_percent' must be numeric and non-null for a row to produce a valid
        'approved_percent' via np.minimum. In other words, for rows where an approved_percent
        is expected, neither recommended_percent nor cap_percent should be null and
        both should be finite numeric percentages on the same scale.
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      uid: 6ba15d88-dc7d-4f2b-8b05-12a12fa56391
    - text: 'The calculation of ''approved_amount'' requires both ''MonthlyIncome''
        and ''approved_percent'' to be numeric and non-null. Therefore, for every
        row where an approved_amount is expected: MonthlyIncome should be numeric
        (preferably >= 0) and approved_percent should be numeric and non-null so that
        approved_amount = MonthlyIncome * (approved_percent / 100.0) yields a finite
        non-negative value.'
      sources:
      - start_line: 23
        end_line: 24
        file: ''
      uid: 9760cb07-5339-4791-a5cd-94c70bbec364
    - text: Department-level aggregations assume that 'Department' is non-null and
        that 'EmpID' identifies distinct employees (i.e., no duplicated EmpID within
        the same Department). This ensures Headcount = count(EmpID) approximates distinct
        headcount per Department. Additionally, 'approved_amount' must be numeric/finite
        so MeritBudget = sum(approved_amount) is meaningful.
