    - text: 'approved_percent should be a valid percentage (non-negative and reasonably
        bounded). At minimum enforce 0 <= approved_percent <= 100, and (optionally)
        approved_percent <= max cap value (20.0) given the configured cap_map. Actionable
        checks: .satisfies(''approved_percent >= 0'') and .satisfies(''approved_percent
        <= 100'') and/or .satisfies(''approved_percent <= 20.0'').'
