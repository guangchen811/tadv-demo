        end_line: 19
        file: ''
      - start_line: 20
        end_line: 20
        file: ''
      uid: f5273084-7897-4e2a-9985-29fab813bd7c
    - text: 'The combination of ''PercentSalaryHike'' and ''rating_bonus'' must be
        numeric and non-null so that ''recommended_percent'' = PercentSalaryHike +
        rating_bonus yields a valid numeric (non-null) percent for every row. In practice:
