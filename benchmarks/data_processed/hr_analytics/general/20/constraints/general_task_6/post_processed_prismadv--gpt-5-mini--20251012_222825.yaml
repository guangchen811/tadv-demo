    - text: 'SalarySlab must be one of the expected slab categories used by the cap_map
        (''Upto 5k'', ''5k-10k'', ''10k-15k'', ''15k+'') so that cap_percent is defined
        for every row. Actionable checks: .isContainedIn(''SalarySlab'', [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''])
