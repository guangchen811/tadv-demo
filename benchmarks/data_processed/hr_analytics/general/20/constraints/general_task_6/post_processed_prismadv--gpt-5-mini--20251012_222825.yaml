    - text: 'approved_percent must equal the minimum of recommended_percent and cap_percent.
        Equivalently enforce (a) approved_percent <= recommended_percent, (b) approved_percent
        <= cap_percent, and (c) approved_percent equals either recommended_percent
        or cap_percent for every row (allowing for floating-point tolerance). Actionable
        checks: .satisfies(''approved_percent <= recommended_percent'') and .satisfies(''approved_percent
        <= cap_percent'') and a row-wise equality check approved_percent in {recommended_percent,
