prismadv_config:
  model:
    use_async: true
    use_dataflow: true
    correlation_detection: true
    downstream_task_description: No specific description provided. The script can
      be used for any task.
  llm:
    model_name: gpt-5-mini
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  YearsAtCompany:
    code:
    - suggestion: '.satisfies("CASE WHEN cast(`YearsAtCompany` as double) >= 0 THEN
        1 ELSE 0 END", "YearsAtCompany non-negative", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 9e00a0ae-4086-416b-845d-d323ff5a5e43
      source_assumptions:
      - 2a57eba4-ac7f-4a52-bd97-398208b4873c
    - suggestion: '.satisfies("CASE WHEN cast(`YearsAtCompany` as double) <> 0 THEN
        1 ELSE 0 END", "YearsAtCompany not mostly zeros (<=20% zeros allowed)", lambda
        x: x >= 0.8)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: ef476b68-9d17-4ad3-a2a9-9577f0096c97
      source_assumptions:
      - 0fa4e299-3e13-4e69-a406-0c7c1c02a5de
    - suggestion: '.satisfies("CASE WHEN floor(cast(`YearsAtCompany` as double)) =
        cast(`YearsAtCompany` as double) THEN 1 ELSE 0 END", "YearsAtCompany integer-valued
        (<=1% non-integers allowed)", lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: abd298c6-013d-46b4-b832-b2c21f11c3ed
      source_assumptions:
      - 983b1756-7fd3-4a39-8f76-8fe4d42bc162
    assumptions:
    - text: 'The ''YearsAtCompany'' column must be numeric (or string values that
        can be converted to numeric). The code calls pd.to_numeric(..., errors=''coerce''),
        so any non-convertible value will become NaN and alter downstream computations.
        Validation rule example: require that 100% (or a high percentage) of values
        are parseable as numbers (i.e. would not be coerced to NaN).'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      - start_line: 48
        end_line: 51
        file: ''
      uid: ff06b908-ac61-4d0f-b316-6a18f6a15553
    - text: 'The ''YearsAtCompany'' column should contain non-negative values (>=
        0). Negative tenure is not handled and would produce unexpected tenure_ratio
        / scores. Validation rule example: assert YearsAtCompany >= 0 for all rows.'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      - start_line: 67
        end_line: 76
        file: ''
      uid: 2a57eba4-ac7f-4a52-bd97-398208b4873c
    - text: 'Zero values in ''YearsAtCompany'' are allowed and are treated as "no
        tenure" by the code: zeros are replaced with NaN for the denominator so tenure_ratio
        becomes 0 after fillna. Validation rule example: allow YearsAtCompany == 0,
        and if present ensure this is a small/expected proportion of the population
        if business logic requires it.'
      sources:
      - start_line: 48
        end_line: 51
        file: ''
      uid: 0fa4e299-3e13-4e69-a406-0c7c1c02a5de
    - text: '''YearsAtCompany'' is expected to be integral (whole years). The dataset
        metadata indicates an integral type and downstream logic uses it as a count
        of years. Validation rule example: assert that YearsAtCompany values are integers
        (e.g., YearAtCompany % 1 == 0) or within 0 tolerance of an integer.'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      uid: 983b1756-7fd3-4a39-8f76-8fe4d42bc162
  AgeGroup:
    code:
    - suggestion: '.satisfies("CASE WHEN `AgeGroup` IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'')
        THEN 1 ELSE 0 END", "Valid AgeGroup", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: e9ef3d5a-1de9-4b0f-8bff-36bc0fe4a1d7
      source_assumptions:
      - 27f3c8d0-0a5e-4d2c-b8f3-5b785e1e4606
      - da6e1f1a-9f57-43b0-8dec-ea2da04bb720
    assumptions:
    - text: 'The ''AgeGroup'' column must contain only the five expected categories
        used by the scoring logic: ''18-25'', ''26-35'', ''36-45'', ''46-55'', and
        ''55+''. The code maps these exact string values to numeric weights (age_weight_map)
        and any value not in this set will map to NaN, which will propagate through
        raw_score and produce invalid/missing AttritionRiskScore values. Example validation
        rules you can derive:

        - Deequ: .satisfies("CASE WHEN `AgeGroup` IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'')
        THEN 1 ELSE 0 END", "Valid AgeGroup", lambda x: x == 1.0)

        - Great Expectations: expect_column_values_to_be_in_set(''AgeGroup'', [''18-25'',''26-35'',''36-45'',''46-55'',''55+''])'
      sources:
      - start_line: 36
        end_line: 43
        file: ''
      - start_line: 67
        end_line: 76
        file: ''
      uid: 27f3c8d0-0a5e-4d2c-b8f3-5b785e1e4606
    - text: 'The ''AgeGroup'' column should have no null / missing values in the input
        data. The code does not fill or handle missing AgeGroup values before mapping
        them to weights and writing outputs; missing values would produce NaN weights
        and downstream NaN risk scores or missing RiskTier. Example validation rules:

        - Deequ: .hasCompleteness(''AgeGroup'', lambda x: x == 1.0)

        - Great Expectations: expect_column_values_to_not_be_null(''AgeGroup'')'
      sources:
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: 58fdb86a-7321-4978-9d59-0c2c4b2fcabe
    - text: 'AgeGroup values must match the mapping keys exactly (including spelling,
        punctuation, and no extraneous whitespace or different casing). The mapping
        is exact-string based (map(age_weight_map)), so '' 26-35'' or ''26-35 '' or
        ''26 - 35'' or different case would be treated as invalid. Either ensure input
        is normalized to these exact tokens or validate that the trimmed/raw strings
        equal the allowed tokens. Example validations / normalization checks:

        - Deequ (strict): .satisfies("CASE WHEN `AgeGroup` IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'')
        THEN 1 ELSE 0 END", "Exact-form AgeGroup", lambda x: x == 1.0)

        - Great Expectations (normalize-then-check suggestion): apply a pre-check
        that df[''AgeGroup''].str.strip() is in the set, or expect_column_values_to_be_in_set([list])
        after trimming.'
      sources:
      - start_line: 36
        end_line: 43
        file: ''
      uid: da6e1f1a-9f57-43b0-8dec-ea2da04bb720
  Attrition:
    code:
    - suggestion: '.satisfies("CASE WHEN `Attrition` IS NOT NULL THEN 1 ELSE 0 END",
        "Attrition completeness", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 8a98954c-2657-45c9-9090-d37aa40e9ad7
      source_assumptions:
      - e8aa2351-8b00-43b6-8e5d-a604b978542d
    - suggestion: '.satisfies("CASE WHEN `Attrition` IN (''Yes'',''No'') THEN 1 ELSE
        0 END", "Attrition has expected categories", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: f32a5f35-e274-44e7-a55e-25b7a7b12e54
      source_assumptions:
      - 9aed9d95-2fec-4533-a89a-08b376e2abb8
    - suggestion: '.satisfies("CASE WHEN `Attrition` = ''Yes'' THEN 1 ELSE 0 END",
        "Has at least one Yes", lambda x: x > 0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 9709d3b1-4dc0-40ab-877d-3e9c54bf8f18
      source_assumptions:
      - 92a93cb0-2a3d-4c88-85ab-b8357cd516aa
    - suggestion: '.satisfies("CASE WHEN `Attrition` = ''No'' THEN 1 ELSE 0 END",
        "Has at least one No", lambda x: x > 0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 2e2b869d-4451-4e38-8ddd-9f19299f822a
      source_assumptions:
      - 92a93cb0-2a3d-4c88-85ab-b8357cd516aa
    - suggestion: '.hasDataType("Attrition", "String", lambda x: x == 1.0)'
      validity: false
      reason_if_invalid: 'Skipping data type constraint: .hasDataType("Attrition",
        "String", lambda x: x == 1.0)'
      level: warning
      uid: 3f291f34-643b-43ae-ad49-91447be2abf4
      source_assumptions:
      - 9fc1b40c-7014-4847-af33-312d0d4cbe45
    assumptions:
    - text: 'The ''Attrition'' column is expected to be complete (no null/missing
        values) in the input data because the code computes the overall positive rate
        directly from df[''Attrition''] and uses it to set the model intercept. Represent
        this as a validation like:

        .satisfies("CASE WHEN `Attrition` IS NOT NULL THEN 1 ELSE 0 END", "Attrition
        completeness", lambda x: x == 1.0)'
      sources:
      - start_line: 15
        end_line: 15
        file: ''
      - start_line: 64
        end_line: 66
        file: ''
      uid: e8aa2351-8b00-43b6-8e5d-a604b978542d
    - text: 'The ''Attrition'' column should use canonical, case-sensitive labels
        ''Yes'' and ''No'' (no alternative spellings like ''yes'', ''Y'', ''Nope'',
        or other categories). The code treats only the exact string ''Yes'' as the
        positive class in (df[''Attrition''] == ''Yes''). Represent this as:

        .satisfies("CASE WHEN `Attrition` IN (''Yes'',''No'') THEN 1 ELSE 0 END",
        "Attrition has expected categories", lambda x: x == 1.0)'
      sources:
      - start_line: 64
        end_line: 64
        file: ''
      uid: 9aed9d95-2fec-4533-a89a-08b376e2abb8
    - text: 'There should be at least one row with Attrition == ''Yes'' and at least
        one row with Attrition == ''No'' so that the computed prevalence (yes_rate)
        is meaningful for the intercept calculation. Represent as two checks, e.g.:

        .satisfies("CASE WHEN `Attrition` = ''Yes'' THEN 1 ELSE 0 END", "Has at least
        one Yes", lambda x: x > 0)

        and

        .satisfies("CASE WHEN `Attrition` = ''No'' THEN 1 ELSE 0 END", "Has at least
        one No", lambda x: x > 0)'
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      uid: 92a93cb0-2a3d-4c88-85ab-b8357cd516aa
    - text: 'The ''Attrition'' column is expected to be a string/categorical field
        (not numeric). If the input supplies numeric or boolean encodings, they should
        be converted to the canonical ''Yes''/''No'' strings before running this script.
        Example check (conceptual): ensure dtype is string-like or values are coercible
        to strings and map to ''Yes''/''No''.'
      sources:
      - start_line: 15
        end_line: 15
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      uid: 9fc1b40c-7014-4847-af33-312d0d4cbe45
  ? '["AgeGroup","Attrition","AttritionRiskScore","DistanceFromHome","JobSatisfaction","OverTime","WorkLifeBalance","YearsAtCompany","YearsSinceLastPromotion","YearsWithCurrManager"]'
  : code: []
    assumptions:
    - text: "PerformanceRating must be one of the keys used in rating_bonus_map (3\
        \ or 4) and PercentSalaryHike must be present and numeric so that recommended_percent\
        \ = PercentSalaryHike + rating_bonus is defined for every row. Actionable\
        \ constraints: require PerformanceRating \u2208 {3,4} (or that rating_bonus\
        \ is not null) and PercentSalaryHike is complete and numeric (e.g. Deequ:\
        \ .isContainedIn('PerformanceRating', [3,4]) and .isComplete('PercentSalaryHike')\
        \ and .hasDataType('PercentSalaryHike','Integral'/'Fractional') or .isComplete('recommended_percent'))."
      sources:
      - start_line: 18
        end_line: 20
        file: ''
      uid: 67e410e0-a33b-434a-b45a-685fd1339658
    - text: "SalarySlab must be one of the expected categories so cap_percent is defined,\
        \ recommended_percent (from PercentSalaryHike + rating_bonus) must be numeric/non-null,\
        \ and MonthlyIncome must be non-null numeric so approved_amount = MonthlyIncome\
        \ * (approved_percent/100) can be computed. Actionable constraints: SalarySlab\
        \ \u2208 {'Upto 5k','5k-10k','10k-15k','15k+'}, PercentSalaryHike and MonthlyIncome\
        \ complete and numeric, or equivalently require approved_percent and approved_amount\
        \ to be complete and numeric (e.g. Deequ: .isContainedIn('SalarySlab',[...])\
        \ and .isComplete('MonthlyIncome') and .isComplete('approved_amount'))."
      sources:
      - start_line: 21
        end_line: 24
        file: ''
      uid: fa46fcbe-ac91-4019-aff8-7d120658dff5
    - text: "Each EmpID should map to a single Department (no EmpID appears with different\
        \ Department values) so that Headcount per Department (counting EmpID) is\
        \ meaningful. Actionable constraints: EmpID should be unique across the dataset\
        \ or at minimum the pair (EmpID, Department) should have no duplicate EmpID\
        \ with differing Department values (e.g. Deequ: .hasUniqueValue('EmpID') or\
        \ assert uniqueness of EmpID\u2192Department mapping)."
      sources:
      - start_line: 26
        end_line: 29
        file: ''
      uid: 89e90b9d-9f14-4aeb-ae83-2cdef6c7ffda
    - text: 'YearsSinceLastPromotion must be numeric, non-negative, and less than
        or equal to YearsAtCompany for every row so tenure_ratio = YearsSinceLastPromotion
        / YearsAtCompany is meaningful (division-by-zero handled separately in code).
        Actionable constraints: .isNonNegative(''YearsSinceLastPromotion''), .isNonNegative(''YearsAtCompany''),
        and a row-level constraint YearsSinceLastPromotion <= YearsAtCompany (e.g.
        Deequ: .satisfies(''YearsSinceLastPromotion <= YearsAtCompany'',''promotion_le_tenure'')).'
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      uid: babd861f-0f6d-4ca3-8f8e-07dbc0f34dd2
    - text: 'YearsWithCurrManager must be numeric, non-negative and logically <= YearsAtCompany
        (an employee cannot have been with the current manager longer than their total
        YearsAtCompany) so mgr_penalty calculation and comparisons (< 1.0) are valid.
        Actionable constraints: .isNonNegative(''YearsWithCurrManager'') and row-level
        constraint YearsWithCurrManager <= YearsAtCompany (e.g. Deequ: .satisfies(''YearsWithCurrManager
        <= YearsAtCompany'',''mgr_tenure_le_total'')).'
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      uid: 9d30fa90-08a1-4be5-802e-8afc835969df
  '["AgeGroup","Department","EmpID","JobRole","MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: "PerformanceRating and PercentSalaryHike must together produce a numeric,\
        \ non-null recommended_percent for every row. Concretely, PerformanceRating\
        \ should be restricted to the mapping keys {3, 4} (so rating_bonus is not\
        \ null) and PercentSalaryHike must be present and numeric for all rows. This\
        \ ensures df['recommended_percent'] = PercentSalaryHike + rating_bonus is\
        \ defined for every record. Example checks: PerformanceRating \u2208 {3,4}\
        \ AND PercentSalaryHike is complete and numeric (so recommended_percent is\
        \ complete)."
      sources:
      - start_line: 18
        end_line: 20
        file: ''
      uid: f814b89f-2b1b-4291-a0a8-4199208309da
    - text: SalarySlab and MonthlyIncome must allow computing approved_amount for
        every row. Concretely, SalarySlab must be one of the cap map keys {'Upto 5k','5k-10k','10k-15k','15k+'}
        (so cap_percent is not null) and MonthlyIncome must be present and numeric.
        Combined with the recommended_percent requirement above, this guarantees df['approved_amount']
        = MonthlyIncome * (approved_percent/100.0) is numeric and non-null.
      sources:
      - start_line: 21
        end_line: 24
        file: ''
      uid: 56d46303-228f-4504-93f0-2207347871de
    - text: "EmpID must be consistently assigned to a single Department: the same\
        \ EmpID should not appear with different Department values. The department-level\
        \ headcount is computed via df.groupby('Department').count(EmpID), so inconsistent\
        \ EmpID\u2192Department mappings will corrupt headcounts. A precise constraint:\
        \ for each EmpID, the set of Department values associated with that EmpID\
        \ should have cardinality 1."
      sources:
      - start_line: 26
        end_line: 30
        file: ''
      uid: 37eb39fc-5c89-4282-8cd1-a6f774bf1af2
    - text: "YearsSinceLastPromotion and YearsAtCompany must be internally consistent:\
        \ YearsSinceLastPromotion should be \u2264 YearsAtCompany for every record\
        \ (and if YearsAtCompany == 0 then YearsSinceLastPromotion should be 0). This\
        \ ensures the computed tenure_ratio = YearsSinceLastPromotion / YearsAtCompany\
        \ (with zeros handled) is meaningful and not > 1 due to invalid data."
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      uid: 2002dd87-7db5-421a-be27-66be8d4c4097
    - text: "JobRole should map consistently to Department (JobRole \u2192 Department\
        \ is many-to-one). The code's department budget logic and the comment indicate\
        \ an assumption that JobRole values belong to a single Department; verify\
        \ that for each JobRole there is exactly one Department among rows with that\
        \ JobRole."
      sources:
      - start_line: 26
        end_line: 30
        file: ''
      uid: 7e33317b-a7fb-47ef-828e-f2d16b66e529
    - text: JobSatisfaction and WorkLifeBalance must contain only the expected ordinal
        values used by the penalty mappings (1, 2, 3, 4). Both columns must be present
        and limited to {1,2,3,4} so job_penalty and wlb_penalty map to numeric values
        for every row used in the risk score.
      sources:
      - start_line: 54
        end_line: 57
        file: ''
      uid: ea22bb79-e8a4-41e1-9544-b4e5384e1ded
  WorkLifeBalance:
    code:
    - suggestion: '.satisfies("CASE WHEN `WorkLifeBalance` IN (1, 2, 3, 4) THEN 1
        ELSE 0 END", "Valid WorkLifeBalance codes", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: a44546d8-36de-4aa8-8f39-1282d64b9266
      source_assumptions:
      - 16603200-a3bc-41b0-8dcf-294346161743
    - suggestion: '.hasDataType("WorkLifeBalance", "Integral", lambda x: x == 1.0)'
      validity: false
      reason_if_invalid: 'Skipping data type constraint: .hasDataType("WorkLifeBalance",
        "Integral", lambda x: x == 1.0)'
      level: error
      uid: 5f4796c7-5cae-40b5-a25a-382c225010b0
      source_assumptions:
      - 8ffc56a8-4065-4621-be2e-7e50d34e34e3
    assumptions:
    - text: 'The ''WorkLifeBalance'' column must contain only the categorical integer
        codes 1, 2, 3, or 4 because the code maps these exact keys (wlb_map) and uses
        the mapped penalty in the attrition risk calculation. We can express this
        as a Deequ/GtExpectations-style check, for example:

        .satisfies("CASE WHEN `WorkLifeBalance` IN (1, 2, 3, 4) THEN 1 ELSE 0 END",
        "Valid WorkLifeBalance codes", lambda x: x == 1.0)

        (or a tolerance like lambda x: x >= 0.99 if you want to allow rare unknowns).'
      sources:
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 67
        end_line: 76
        file: ''
      uid: 16603200-a3bc-41b0-8dcf-294346161743
    - text: 'The ''WorkLifeBalance'' column should not contain null/missing values
        because the code maps it and immediately converts the mapped result to float
        and incorporates it into the raw_score calculation; missing inputs would produce
        NaNs that propagate into AttritionRiskScore. Represent this as:

        .satisfies("CASE WHEN `WorkLifeBalance` IS NOT NULL THEN 1 ELSE 0 END", "Non-null
        WorkLifeBalance", lambda x: x == 1.0)

        (or equivalently use isComplete on the column).'
      sources:
      - start_line: 57
        end_line: 57
        file: ''
      - start_line: 67
        end_line: 76
        file: ''
      uid: f97f7a1e-6538-49cb-8a7d-8332f708e2df
    - text: 'Values in ''WorkLifeBalance'' must be numeric/integral (or convertible
        to numeric) because the code expects to map integer keys and then cast the
        mapped penalties to float (.astype(float)). You can check convertibility and/or
        integer-ness, for example:

        .satisfies("CASE WHEN TRY_CAST(`WorkLifeBalance` AS DOUBLE) IS NOT NULL THEN
        1 ELSE 0 END", "WorkLifeBalance numeric-convertible", lambda x: x == 1.0)

        and optionally enforce integer range:

        .satisfies("CASE WHEN `WorkLifeBalance` BETWEEN 1 AND 4 THEN 1 ELSE 0 END",
        "WorkLifeBalance in [1,4]", lambda x: x == 1.0).'
      sources:
      - start_line: 57
        end_line: 57
        file: ''
      - start_line: 67
        end_line: 76
        file: ''
      uid: 8ffc56a8-4065-4621-be2e-7e50d34e34e3
  YearsWithCurrManager:
    code:
    - suggestion: '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: a0a0bb01-921c-4ff6-a9d3-f3eddcd5da41
      source_assumptions:
      - 9f6bf712-0c90-4cdd-b2bc-5ecbb3bb284b
    - suggestion: '.satisfies("CASE WHEN `YearsWithCurrManager` IS NULL OR (cast(`YearsWithCurrManager`
        AS DOUBLE) >= 0 AND cast(`YearsWithCurrManager` AS DOUBLE) <= 40) THEN 1 ELSE
        0 END", "YearsWithCurrManager range [0,40]", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: d47b41ad-f0aa-4a6e-b6b1-9e65c72046c7
      source_assumptions:
      - 50b3b621-2744-4d22-bc36-f9a6275cfed1
    assumptions:
    - text: "The 'YearsWithCurrManager' column may contain missing values and the\
        \ pipeline handles them by filling missing values with 0. However, the input\
        \ should not be mostly missing \u2013 expect high completeness (e.g., >= 95%).\n\
        Suggested validation (Deequ/GE): .satisfies(\"CASE WHEN `YearsWithCurrManager`\
        \ IS NOT NULL THEN 1 ELSE 0 END\", \"Non-null YearsWithCurrManager fraction\"\
        , lambda x: x >= 0.95)"
      sources:
      - start_line: 15
        end_line: 15
        file: ''
      - start_line: 62
        end_line: 62
        file: ''
      uid: 9f6bf712-0c90-4cdd-b2bc-5ecbb3bb284b
    - text: 'All non-missing values in ''YearsWithCurrManager'' must be numeric (convertible
        to float). The code calls .astype(float) which will raise on non-numeric strings,
        so inputs should be numeric or NULL.

        Suggested validation: .satisfies("CASE WHEN `YearsWithCurrManager` IS NULL
        OR regexp_like(cast(`YearsWithCurrManager` AS STRING), ''^-?\\d+(\\.\\d+)?$'')
        THEN 1 ELSE 0 END", "Numeric YearsWithCurrManager", lambda x: x == 1.0)'
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      uid: 81556d99-c18a-4121-aa8e-db6fd6e2cc33
    - text: '''YearsWithCurrManager'' represents tenure in years and should be non-negative.
        The code compares values to 1.0 to apply a penalty for tenure < 1 year, so
        negative values are likely invalid and should be rejected. Optionally enforce
        a reasonable upper bound (e.g., <= 40) to catch data errors.

        Suggested validation: .satisfies("CASE WHEN `YearsWithCurrManager` IS NULL
        OR (`YearsWithCurrManager` >= 0 AND `YearsWithCurrManager` <= 40) THEN 1 ELSE
        0 END", "YearsWithCurrManager range", lambda x: x == 1.0)'
      sources:
      - start_line: 63
        end_line: 63
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      uid: 50b3b621-2744-4d22-bc36-f9a6275cfed1
