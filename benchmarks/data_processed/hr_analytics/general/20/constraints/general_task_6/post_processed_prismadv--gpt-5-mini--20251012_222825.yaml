        end_line: 29
        file: ''
      - start_line: 32
        end_line: 33
        file: ''
      uid: 3b9e771b-5887-4ae9-8a12-e3ef08954695
    - text: 'Because approved_percent is used both to compute approved_amount and
        to compare against cap_percent, the scale and units of PercentSalaryHike,
        rating_bonus, and cap_percent must be consistent (all are percentage points).
        Concretely: PercentSalaryHike and rating_bonus should be on the same percentage
        scale as cap_percent so comparisons and multiplication are valid.'
      sources:
      - start_line: 19
        end_line: 24
        file: ''
