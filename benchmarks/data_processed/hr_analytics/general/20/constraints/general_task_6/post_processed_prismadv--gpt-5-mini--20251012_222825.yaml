    assumptions:
    - text: 'The mapping from ''PerformanceRating'' to ''rating_bonus'' covers every
        value present in the dataset, so ''rating_bonus'' is non-null for all rows.
        Concretely: every row''s PerformanceRating should be one of the keys in rating_bonus_map
