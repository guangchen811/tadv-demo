        as approved_amount == MonthlyIncome * (approved_percent / 100). Also require
        MonthlyIncome to be numeric and non-null. Actionable checks: .isComplete(''MonthlyIncome'')
        and .isNumeric(''MonthlyIncome''); and a row-wise constraint that approved_amount
        equals MonthlyIncome * (approved_percent/100) within tolerance.'
