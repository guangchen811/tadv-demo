        file: ''
      - start_line: 42
        end_line: 42
        file: ''
      uid: 12f9acbb-6453-4053-b8a1-fca9d1354060
    - text: "AgeGroup should be a standardized string without leading/trailing whitespace\
        \ and with exact casing/hyphen/plus formatting (e.g., '26-35', not ' 26-35\
