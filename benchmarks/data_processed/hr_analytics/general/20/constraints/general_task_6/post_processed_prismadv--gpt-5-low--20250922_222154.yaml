        Representative'') AND Department = ''Sales'') OR (JobRole IN (''Research Scientist'',''Laboratory
        Technician'',''Research Director'',''Manufacturing Director'',''Healthcare
        Representative'') AND Department = ''Research & Development'') OR (JobRole
