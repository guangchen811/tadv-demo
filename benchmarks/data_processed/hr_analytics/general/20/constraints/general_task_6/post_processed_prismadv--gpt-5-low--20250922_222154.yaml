  '["MonthlyIncome","PercentSalaryHike","PerformanceRating","SalarySlab"]':
    code: []
    assumptions:
    - text: 'Salary slab labels must be consistent with monthly income ranges: ''Upto
        5k'' -> MonthlyIncome <= 5000; ''5k-10k'' -> 5000 < MonthlyIncome <= 10000;
        ''10k-15k'' -> 10000 < MonthlyIncome <= 15000; ''15k+'' -> MonthlyIncome >
        15000. Example Deequ constraints: .hasConditionalColumnConstraint("MonthlyIncome",
        "MonthlyIncome <= 5000", "SalarySlab = ''Upto 5k''") and similarly for other
        slabs.'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: 511a64b1-6a83-40d8-ae28-5efd43ae818a
    - text: "PerformanceRating must be limited to the set {3, 4}, and the recommended_percent\
        \ must equal PercentSalaryHike + (2 if PerformanceRating == 4 else 0). Example\
        \ Deequ checks: .isContainedIn(\"PerformanceRating\", Array(\"3\",\"4\"))\
        \ and a row-level rule: .addConstraint(\n  \"recommended_percent_rule\",\n\
        \  \"(CASE WHEN PerformanceRating = 4 THEN PercentSalaryHike + 2 ELSE PercentSalaryHike\
        \ END) = recommended_percent\"\n)."
      sources:
      - start_line: 17
        end_line: 19
        file: ''
      uid: e5940efc-5e8c-4a3d-9d50-0ad6ed63e87e
    - text: "Approved percent must equal the minimum of the recommended percent and\
        \ the slab cap: approved_percent = min(PercentSalaryHike + (2 if PerformanceRating\
        \ == 4 else 0), cap_percent(SalarySlab)), where cap_percent is {'Upto 5k':20,\
        \ '5k-10k':15, '10k-15k':12, '15k+':10}. Example Deequ SQL-level constraint:\
        \ .addConstraint(\n  \"approved_percent_min_rule\",\n  \"approved_percent\
        \ = LEAST((CASE WHEN PerformanceRating = 4 THEN PercentSalaryHike + 2 ELSE\
        \ PercentSalaryHike END), (CASE SalarySlab WHEN 'Upto 5k' THEN 20 WHEN '5k-10k'\
        \ THEN 15 WHEN '10k-15k' THEN 12 WHEN '15k+' THEN 10 END))\"\n)."
      sources:
      - start_line: 17
        end_line: 22
        file: ''
      uid: c605bc56-7042-462e-a3db-9e3d553f5516
    - text: 'Approved amount must be consistent with monthly income and approved percent:
        approved_amount = MonthlyIncome * (approved_percent / 100). Example Deequ
        SQL-level constraint: .addConstraint("approved_amount_formula", "approved_amount
        = MonthlyIncome * approved_percent / 100.0").'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 26
        end_line: 29
        file: ''
      uid: e15271bb-a93b-43f1-a74b-8775cb8a60d8
    - text: 'The columns PercentSalaryHike, SalarySlab, PerformanceRating, and MonthlyIncome
        must be non-null for all rows used in merit computations, since they are used
        without null handling. Example Deequ checks: .hasCompleteness("PercentSalaryHike",
        1.0), .hasCompleteness("SalarySlab", 1.0), .hasCompleteness("PerformanceRating",
        1.0), .hasCompleteness("MonthlyIncome", 1.0).'
      sources:
      - start_line: 18
        end_line: 23
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: e1c7867b-14e8-4c4c-a9b8-4c43b6df9ce4
  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'For each record, the merit cap applied to the employee is determined
        solely by the SalarySlab category; therefore, approved_percent must be less
        than or equal to the slab-specific cap and cap_percent must equal the mapped
        cap for that slab. This can be expressed as: cap_percent = CASE SalarySlab
        WHEN ''Upto 5k'' THEN 20.0 WHEN ''5k-10k'' THEN 15.0 WHEN ''10k-15k'' THEN
        12.0 WHEN ''15k+'' THEN 10.0 END AND approved_percent <= cap_percent.'
      sources:
      - start_line: 20
        end_line: 22
        file: ''
      uid: dfbf66de-3458-49a0-8db9-8db0a7a8450b
    - text: 'The approved raise amount must equal the MonthlyIncome multiplied by
        the approved_percent divided by 100 for every record: approved_amount = MonthlyIncome
        * (approved_percent / 100.0).'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      uid: 20ae935b-936a-42b4-ac7e-84462682733e
    - text: 'SalarySlab must be consistent with MonthlyIncome according to the slab
        definitions: CASE WHEN SalarySlab = ''Upto 5k'' THEN 0 <= MonthlyIncome AND
        MonthlyIncome <= 5000 WHEN SalarySlab = ''5k-10k'' THEN 5000 < MonthlyIncome
        AND MonthlyIncome <= 10000 WHEN SalarySlab = ''10k-15k'' THEN 10000 < MonthlyIncome
        AND MonthlyIncome <= 15000 WHEN SalarySlab = ''15k+'' THEN MonthlyIncome >
        15000 ELSE FALSE END.'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: f626806f-733c-416e-a87f-793f713ad6e2
    - text: 'Because cap_percent is derived from SalarySlab and propagates to approved_percent
        and approved_amount, all three columns must be non-null whenever a record
        is present: NOT isnull(cap_percent) AND NOT isnull(approved_percent) AND NOT
        isnull(approved_amount). This implies that every SalarySlab value must be
        in the cap mapping.'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      uid: 2536b190-fb3e-42ea-ad24-f6b56d510dc0
    - text: 'approved_percent must be bounded within [0, 20] and approved_amount must
        be non-negative, given non-negative MonthlyIncome and non-negative caps. This
        can be checked as: 0.0 <= approved_percent AND approved_percent <= 20.0 AND
        approved_amount >= 0.0.'
      sources:
      - start_line: 17
        end_line: 23
        file: ''
      uid: 14570719-a9b0-4884-879e-05600ef9d359
