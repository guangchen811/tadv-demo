    - suggestion: '.satisfies("CASE WHEN TRIM(`Attrition`) IN (''Yes'',''No'') AND
        `Attrition` = TRIM(`Attrition`) THEN 1 ELSE 0 END", "Attrition exact labels,
        no whitespace", lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: a8e2266b-ca8a-4b27-a0b7-6bffbe6d0d58
      source_assumptions:
      - 20394c01-8822-4e54-8977-b936589a44b6
      - 1397eb09-5b6d-4e54-a6e2-3205c957c6e9
    assumptions:
    - text: The 'Attrition' column must exist in the input data, because it is referenced
        to compute the baseline yes_rate used in the risk model.
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: d08f6656-77b7-47bc-8239-4428a4d7abdc
    - text: 'The ''Attrition'' column should be a binary categorical with values predominantly
        in {''Yes'',''No''} (exact strings). A suitable rule could require at least
        95% of values to be in this set to avoid misclassification in the yes_rate
        calculation. Example (Deequ-style): .satisfies("CASE WHEN `Attrition` IN (''Yes'',''No'')
        THEN 1 ELSE 0 END", "Valid Attrition labels", lambda x: x >= 0.95)'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: 20394c01-8822-4e54-8977-b936589a44b6
    - text: 'The ''Attrition'' values should match ''Yes''/''No'' exactly (case-sensitive,
        no leading/trailing whitespace), since the code compares equality to the exact
        string ''Yes''. A rule could ensure trimmed, case-sensitive membership. Example:
        .satisfies("CASE WHEN TRIM(`Attrition`) IN (''Yes'',''No'') AND `Attrition`
        = TRIM(`Attrition`) THEN 1 ELSE 0 END", "Trimmed exact Attrition labels",
        lambda x: x >= 0.95)'
      sources:
      - start_line: 60
        end_line: 60
        file: ''
      uid: 1397eb09-5b6d-4e54-a6e2-3205c957c6e9
    - text: 'The ''Attrition'' column should be of string/categorical type (or coercible
        to string) rather than boolean/numeric, because the equality check against
        the string ''Yes'' determines the rate; non-string encodings (e.g., True/False,
        1/0) would yield an incorrect yes_rate of approximately 0. Example rule: .satisfies("CASE
        WHEN CAST(`Attrition` AS STRING) IN (''Yes'',''No'') THEN 1 ELSE 0 END", "Attrition
        string coercion", lambda x: x >= 0.95)'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: 27817bf8-c703-402e-88a7-d3951aca0a63
  '["AgeGroup","Attrition","DistanceFromHome","JobSatisfaction","OverTime","WorkLifeBalance","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: "OverTime, JobSatisfaction, WorkLifeBalance, and AgeGroup must all be\
        \ within their expected domains on every row used for risk scoring to avoid\
        \ nulls in mapped penalties/weights and ensure a valid raw_score: OverTime\
        \ \u2208 {'Yes','No'} AND JobSatisfaction \u2208 {1,2,3,4} AND WorkLifeBalance\
        \ \u2208 {1,2,3,4} AND AgeGroup \u2208 {'18-25','26-35','36-45','46-55','55+'}.\
        \ Deequ example: .addConstraint(Compliance(\"valid_domains_for_risk_feats\"\
        , \"(OverTime IN ('Yes','No')) AND (JobSatisfaction IN (1,2,3,4)) AND (WorkLifeBalance\
        \ IN (1,2,3,4)) AND (AgeGroup IN ('18-25','26-35','36-45','46-55','55+'))\"\
        ))"
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 49
        end_line: 53
        file: ''
      - start_line: 63
        end_line: 72
        file: ''
      uid: fddf9940-3f50-4d30-a7d6-9a9e3440a48a
    - text: 'DistanceFromHome and YearsWithCurrManager must be numeric, finite, and
        non-negative so that distance normalization and manager tenure penalty are
        well-defined: DistanceFromHome >= 0 AND YearsWithCurrManager >= 0 (with null
        YearsWithCurrManager allowed but treated as 0). Deequ examples: .addConstraint(Compliance("non_negative_distance",
        "DistanceFromHome >= 0")) and .addConstraint(Compliance("non_negative_mgr_tenure_or_null",
        "(YearsWithCurrManager IS NULL) OR (YearsWithCurrManager >= 0)"))'
      sources:
      - start_line: 55
        end_line: 59
        file: ''
      uid: 5a21f68c-27d8-4b42-a6ee-c83ea27420f1
    - text: 'Given the risk model uses multiple features together, every row used
        to compute AttritionRiskScore must have valid feature inputs so that AttritionRiskScore
        is finite and lies in [0,1], and consequently RiskTier is not null. Concretely:
        when OverTime, JobSatisfaction, WorkLifeBalance, AgeGroup, DistanceFromHome,
        and YearsWithCurrManager satisfy their domain/range checks, then AttritionRiskScore
        BETWEEN 0.0 AND 1.0 AND RiskTier IS NOT NULL. Deequ example: .addConstraint(Compliance("risk_score_range_and_tier_not_null",
        "((OverTime IN (''Yes'',''No'')) AND (JobSatisfaction IN (1,2,3,4)) AND (WorkLifeBalance
        IN (1,2,3,4)) AND (AgeGroup IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+''))
        AND (DistanceFromHome >= 0) AND ((YearsWithCurrManager IS NULL) OR (YearsWithCurrManager
        >= 0))) => ((AttritionRiskScore >= 0.0) AND (AttritionRiskScore <= 1.0) AND
        (RiskTier IS NOT NULL))"))'
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 49
        end_line: 59
        file: ''
      - start_line: 63
        end_line: 79
        file: ''
      uid: 9fafe492-0501-4364-b57d-946e8f87d5d5
    - text: 'Attrition must be complete and restricted to {''Yes'',''No''} so that
        the intercept derived from yes_rate is valid for all records used in scoring.
        Deequ example: .addConstraint(Completeness("Attrition", 1.0)).addConstraint(Compliance("attrition_domain",
        "Attrition IN (''Yes'',''No'')"))'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: c50d702a-4eb0-4525-97fa-de135b52004d
    - text: "Department-level budgets assume approved_amount is well-defined per row;\
        \ thus MonthlyIncome must be non-negative and cap_percent/recommended_percent\
        \ finite. Concretely, when SalarySlab \u2208 {'Upto 5k','5k-10k','10k-15k','15k+'}\
        \ AND PerformanceRating \u2208 {3,4} AND PercentSalaryHike is finite AND MonthlyIncome\
        \ >= 0, then approved_amount IS NOT NULL. Deequ example: .addConstraint(Compliance(\"\
        valid_merit_inputs_imply_amount\", \"((SalarySlab IN ('Upto 5k','5k-10k','10k-15k','15k+'))\
        \ AND (PerformanceRating IN (3,4)) AND isFinite(PercentSalaryHike) AND (MonthlyIncome\
        \ >= 0)) => (approved_amount IS NOT NULL)\"))"
      sources:
      - start_line: 17
        end_line: 24
        file: ''
      - start_line: 26
        end_line: 29
        file: ''
      uid: 34a042dc-16c4-4564-80ef-e029529e543e
