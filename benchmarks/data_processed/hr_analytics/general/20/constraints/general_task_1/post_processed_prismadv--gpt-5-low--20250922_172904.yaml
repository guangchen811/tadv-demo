  '["Attrition","OverTime"]':
    code: []
    assumptions:
    - text: Both 'Attrition' and 'OverTime' are binary categorical columns with the
        exact value domain {'Yes','No'} and no nulls. This is required because the
        code casts these to boolean/indicator forms and calibrates rates assuming
        only these two categories.
      sources:
      - start_line: 70
        end_line: 73
        file: ''
      - start_line: 160
        end_line: 162
        file: ''
      - start_line: 130
        end_line: 131
        file: ''
      uid: eb7125d7-b9e6-488d-9d58-693d29dc5081
    - text: '''OverTime'' must contain at least one record in each category (''Yes''
        and ''No'') so that calibration using both groups is meaningful (i.e., both
        groups exist for computing conditional attrition rates and the OT multiplier).
        This can be represented as two constraints: count(OverTime=''Yes'') > 0 and
        count(OverTime=''No'') > 0.'
      sources:
      - start_line: 70
        end_line: 73
        file: ''
      - start_line: 160
        end_line: 162
        file: ''
      uid: bd7ed5af-f2e4-4295-bdac-9552294c3f88
    - text: 'Within each OverTime group (''Yes'' and ''No''), the ''Attrition'' column
        must also contain both categories (''Yes'' and ''No''), so that the conditional
        attrition rates rate_yes = P(Attrition=''Yes'' | OverTime=''Yes'') and rate_no
        = P(Attrition=''Yes'' | OverTime=''No'') are strictly between 0 and 1. In
        constraint terms: for OverTime=''Yes'', count(Attrition=''Yes'') > 0 and count(Attrition=''No'')
        > 0; for OverTime=''No'', count(Attrition=''Yes'') > 0 and count(Attrition=''No'')
        > 0.'
      sources:
      - start_line: 70
        end_line: 73
        file: ''
      - start_line: 160
        end_line: 162
        file: ''
      uid: 85eb52d6-1d58-40f0-90d4-2687e19b995b
    - text: The overall 'Attrition' column must contain at least one 'Yes' and at
        least one 'No' so that the overall attrition rate used in the intercept is
        strictly between 0 and 1 (avoiding degenerate log-odds).
      sources:
      - start_line: 111
        end_line: 124
        file: ''
      - start_line: 70
        end_line: 71
        file: ''
      uid: c7bd9b88-f2b8-4c5d-a15f-c6fca8791e22
