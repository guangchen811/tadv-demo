        end_line: 55
        file: ''
      - start_line: 60
        end_line: 61
        file: ''
      - start_line: 120
        end_line: 121
        file: ''
      uid: ecf490cd-5117-46f0-a897-66cd8bc5f76f
    - text: 'TotalWorkingYears should be numeric and integer-like (whole numbers).
        A suitable constraint: values are of an integral/whole-number type (e.g.,
        Deequ hasDataType(Integral) or satisfies(MOD(`TotalWorkingYears`, 1) = 0)).'
      sources:
      - start_line: 54
        end_line: 55
        file: ''
      uid: b8045684-1574-4a3d-a3a4-b4bc35e07e29
    - text: 'TotalWorkingYears should be non-negative. A suitable constraint: satisfies(`TotalWorkingYears`
        >= 0, ''Non-negative TotalWorkingYears'', x => x == 1).'
      sources:
      - start_line: 55
        end_line: 55
        file: ''
      uid: bf3239d3-ebf1-4bab-8692-34073851b99e
    - text: 'TotalWorkingYears should generally be greater than or equal to YearsAtCompany
        (allowing a small tolerance for data issues since the code clips negatives).
        A suitable constraint: satisfies(`TotalWorkingYears` >= `YearsAtCompany`,
        ''Total >= AtCompany'', prop => prop >= 0.95).'
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      uid: 6e95e3bc-ca06-4668-90dc-3fa295bd501a
    - text: 'TotalWorkingYears should not exceed Age by more than a typical career-start
        buffer; the code implies a 15-year baseline. A suitable constraint: satisfies(`TotalWorkingYears`
        <= `Age` - 15, ''Plausible career start'', prop => prop >= 0.95).'
      sources:
      - start_line: 55
        end_line: 61
        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      uid: cb3e1b03-1a2a-4ea5-96de-5e0f83a10d80
    - text: 'TotalWorkingYears values must be finite (no NaN/Inf), as they flow into
        downstream transformations and normalizations. A suitable constraint: satisfies(`TotalWorkingYears`
        IS NOT NULL AND isFinite(`TotalWorkingYears`), ''Finite values'', prop =>
        prop == 1).'
