  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'MonthlyIncome must be consistent with SalarySlab on every row: if SalarySlab
        = ''Upto 5k'' then 0 < MonthlyIncome <= 5000; if ''5k-10k'' then 5000 < MonthlyIncome
        <= 10000; if ''10k-15k'' then 10000 < MonthlyIncome <= 15000; if ''15k+''
        then MonthlyIncome > 15000. This can be represented as a Deequ compliance
        constraint: .hasCompliance("mi_within_slab", "((SalarySlab = ''Upto 5k'' AND
        MonthlyIncome > 0 AND MonthlyIncome <= 5000) OR (SalarySlab = ''5k-10k'' AND
        MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab = ''10k-15k''
        AND MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab = ''15k+''
        AND MonthlyIncome > 15000))", lambda v: v == 1.0)'
      sources:
      - start_line: 26
        end_line: 32
        file: ''
      uid: b5caf64e-2a5b-4372-8711-cfc5f89391c7
    - text: 'The median MonthlyIncome must be strictly positive for each SalarySlab
        so that the logarithm of adjacent slab median ratios is defined. In Deequ,
        this can be enforced by checking the 50th percentile per slab is > 0, e.g.,
        for each slab s in [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'']: .hasApproxQuantile("MonthlyIncome",
        0.5, where=f"SalarySlab = ''{s}''").isGreaterThan(0)'
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      uid: b1b7ed77-f7af-4915-90c0-74f510fc84a3
    - text: Median MonthlyIncome should be non-decreasing across the ordered SalarySlab
        categories ['Upto 5k','5k-10k','10k-15k','15k+'] so that the progression_index
        (mean log ratio of adjacent medians) is >= 0. This can be validated by computing
        the median per slab and asserting med(s_{i+1}) >= med(s_i) for i=0..2.
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      uid: c8c8be3b-839d-4efa-bad6-280955fd0787
    - text: "Within each Department and SalarySlab group, the group-level min and\
        \ max of MonthlyIncome should respect the slab\u2019s numeric boundaries:\
        \ for 'Upto 5k' max <= 5000, for '5k-10k' min > 5000 and max <= 10000, for\
        \ '10k-15k' min > 10000 and max <= 15000, and for '15k+' min > 15000. This\
        \ can be checked with grouped compliance rules per (Department, SalarySlab)."
      sources:
      - start_line: 139
        end_line: 149
        file: ''
      - start_line: 26
        end_line: 32
        file: ''
