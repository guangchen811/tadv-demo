  '["Age","AgeGroup"]':
    code: []
    assumptions:
    - text: 'Age and AgeGroup must be mutually consistent: AgeGroup must be one of
        {"18-25","26-35","36-45","46-55","55+"}, and for every row the integer Age
        must fall within the bucket implied by AgeGroup: if AgeGroup = ''18-25'' then
        18 <= Age <= 25; if ''26-35'' then 26 <= Age <= 35; if ''36-45'' then 36 <=
        Age <= 45; if ''46-55'' then 46 <= Age <= 55; if ''55+'' then Age >= 55. This
        can be represented in Deequ with a multi-column predicate such as .satisfies("(AgeGroup
        = ''18-25'' AND Age BETWEEN 18 AND 25) OR (AgeGroup = ''26-35'' AND Age BETWEEN
        26 AND 35) OR (AgeGroup = ''36-45'' AND Age BETWEEN 36 AND 45) OR (AgeGroup
        = ''46-55'' AND Age BETWEEN 46 AND 55) OR (AgeGroup = ''55+'' AND Age >= 55)",
        ''Age_AgeGroup_consistent'') and a domain check .isContainedIn(''AgeGroup'',
        ["18-25","26-35","36-45","46-55","55+"]).'
