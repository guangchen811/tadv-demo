  '["TotalWorkingYears","YearsAtCompany"]':
    code: []
    assumptions:
    - text: 'TotalWorkingYears should be greater than or equal to YearsAtCompany for
        all records. This ensures external_experience = TotalWorkingYears - YearsAtCompany
        is non-negative (consistent with later sqrt) and avoids relying on clipping
        to mask data issues. Deequ: .addConstraint(Compliance(''total_ge_company'',
        ''TotalWorkingYears >= YearsAtCompany'', 1.0))'
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: 9ac2beb3-eb3d-43f1-91d9-0aaca8daa334
    - text: 'Career start age (Age - TotalWorkingYears) should be at least 15 years
        for all records. This reflects the implicit minimum working start age used
        in the downstream signal (career_start_signal = max(0, career_start_age -
        15)). Deequ: .addConstraint(Compliance(''career_start_ge_15'', ''Age - TotalWorkingYears
        >= 15'', 1.0))'
      sources:
      - start_line: 55
        end_line: 55
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      uid: 8be7e6df-6653-41f2-a7ef-0aaa4fd4cdde
    - text: 'YearsWithCurrManager must be between 0 and YearsAtCompany for all records,
        i.e., 0 <= YearsWithCurrManager <= YearsAtCompany. This keeps the manager
        tenure ratio valid without requiring clipping. Deequ: .addConstraint(Compliance(''mgr_tenure_within_company'',
        ''YearsWithCurrManager >= 0 AND YearsWithCurrManager <= YearsAtCompany'',
        1.0))'
      sources:
      - start_line: 56
        end_line: 57
        file: ''
      uid: 51a1c697-435e-4758-9e79-94772ba0d03b
    - text: 'YearsSinceLastPromotion must be between 0 and YearsAtCompany for all
        records, i.e., 0 <= YearsSinceLastPromotion <= YearsAtCompany. This ensures
        the promotion wait ratio is meaningful without clipping to [0,1]. Deequ: .addConstraint(Compliance(''promo_wait_within_company'',
        ''YearsSinceLastPromotion >= 0 AND YearsSinceLastPromotion <= YearsAtCompany'',
        1.0))'
      sources:
      - start_line: 84
        end_line: 87
        file: ''
      uid: 916f2216-3b72-4938-b282-bc4e02b6a59b
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'YearsSinceLastPromotion should be between 0 and YearsAtCompany inclusive
        whenever YearsAtCompany > 0; values greater than YearsAtCompany indicate inconsistent
        tenure/promotion data. Representable as a Deequ constraint: .forAllRows("YearsAtCompany
        > 0 => (YearsSinceLastPromotion >= 0 AND YearsSinceLastPromotion <= YearsAtCompany)")'
      sources:
      - start_line: 84
        end_line: 87
        file: ''
      uid: 14568742-28fc-4e23-b35f-61635ad6fd2d
    - text: 'If YearsAtCompany == 0 then YearsSinceLastPromotion must be 0 (no time
        at company implies no promotions at this company). Representable as: .forAllRows("(YearsAtCompany
        = 0) => (YearsSinceLastPromotion = 0)")'
      sources:
      - start_line: 84
        end_line: 87
        file: ''
      uid: d78874c6-dcf2-4ebb-b34d-94bcf05d826d
    - text: 'YearsWithCurrManager must not exceed YearsAtCompany (time with current
        manager cannot be longer than tenure at company), and should be non-negative.
        Representable as: .forAllRows("(YearsWithCurrManager >= 0) AND (YearsWithCurrManager
        <= YearsAtCompany)")'
      sources:
      - start_line: 56
        end_line: 57
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: d2050fbb-7609-41d5-904f-7b74a129edfd
    - text: 'TotalWorkingYears should be at least YearsAtCompany so that external_experience
        = TotalWorkingYears - YearsAtCompany is non-negative (required for sqrt).
        Representable as: .forAllRows("TotalWorkingYears >= YearsAtCompany")'
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: 4d57a770-9093-4af1-9036-c55027d72177
  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'For any row with YearsAtCompany > 0, YearsWithCurrManager must be non-null
        and lie within [0, YearsAtCompany]. This ensures the manager_ratio = YearsWithCurrManager
        / YearsAtCompany is well-defined and naturally within [0,1] without relying
        on fillna or clipping. Deequ example: .satisfies("CASE WHEN YearsAtCompany
        > 0 THEN YearsWithCurrManager IS NOT NULL AND YearsWithCurrManager >= 0 AND
        YearsWithCurrManager <= YearsAtCompany ELSE true END", "mgr_within_tenure_and_present_when_tenure_positive")'
      sources:
      - start_line: 56
        end_line: 57
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: bc3c9210-98a5-4d8a-b959-85753d164acb
    - text: 'For rows with YearsAtCompany = 0, YearsWithCurrManager should be either
        NULL or 0 (i.e., no time with current manager before company tenure starts).
        Deequ example: .satisfies("CASE WHEN YearsAtCompany = 0 THEN (YearsWithCurrManager
        IS NULL OR YearsWithCurrManager = 0) ELSE true END", "mgr_time_zero_or_null_when_no_company_tenure")'
      sources:
      - start_line: 56
        end_line: 56
        file: ''
      - start_line: 57
        end_line: 57
        file: ''
      uid: e7fdd7da-25f8-4a4b-8d37-f471ebd29941
    - text: 'TotalWorkingYears should be greater than or equal to YearsAtCompany,
        and both should be non-negative, so that external_experience = TotalWorkingYears
        - YearsAtCompany is always >= 0 without relying on clipping. Deequ example:
        .satisfies("TotalWorkingYears >= 0 AND YearsAtCompany >= 0 AND TotalWorkingYears
        >= YearsAtCompany", "total_years_not_less_than_company_years")'
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: c95670de-f496-4ad5-a395-cb5770d8923c
    - text: 'For any row with YearsAtCompany > 0, YearsSinceLastPromotion must be
        within [0, YearsAtCompany]; when YearsAtCompany = 0, YearsSinceLastPromotion
        should be 0. This makes the no_promo_signal ratio naturally in [0,1] without
        needing clipping. Deequ example: .satisfies("CASE WHEN YearsAtCompany > 0
        THEN YearsSinceLastPromotion >= 0 AND YearsSinceLastPromotion <= YearsAtCompany
        ELSE YearsSinceLastPromotion = 0 END", "promotion_years_within_tenure")'
      sources:
      - start_line: 84
        end_line: 87
        file: ''
      uid: 2e2a300c-c971-4a07-96cd-cced1f55811a
