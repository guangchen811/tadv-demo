        file: ''
      uid: 88047bb3-bc1e-4b38-923c-adf3fbfb961e
    - text: "Clipping of the dissatisfaction score due to out-of-range WorkLifeBalance\
        \ should not occur under valid input; thus, WorkLifeBalance should already\
        \ be within the expected 1\u20134 bounds so that the resulting dissat is naturally\
