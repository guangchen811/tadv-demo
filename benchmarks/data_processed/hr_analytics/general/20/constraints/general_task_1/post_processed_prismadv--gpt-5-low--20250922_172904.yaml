        end_line: 79
        file: ''
      - start_line: 126
        end_line: 127
        file: ''
      uid: 3b01eaf2-8042-4476-ad8f-4e8bdc994c1b
    - text: "WorkLifeBalance values should be on a 1\u20134 Likert scale (integers\
        \ in {1,2,3,4}). The transformation 1.0 - (x - 1)/3.0 maps 1..4 to 1..0; values\
        \ outside 1..4 would distort the dissatisfaction score and trigger clipping.\
        \ Suitable rules: values to be in set {1,2,3,4} OR satisfy 1 <= WorkLifeBalance\
        \ <= 4."
      sources:
      - start_line: 77
        end_line: 79
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
      uid: 7604b342-3ea0-4d6a-984d-ac1c9d1107fd
    - text: 'WorkLifeBalance must be numeric (castable to float/integer) to participate
        in the row-wise mean. Non-numeric values would cause the mean computation
        to fail. Suitable rule: values are of type integral/float or castable to numeric.'
