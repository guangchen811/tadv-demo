    assumptions:
    - text: "WorkLifeBalance must be present (non-null) for all rows. The code directly\
        \ averages satisfaction columns without imputation; nulls would either (a)\
        \ drop WorkLifeBalance from the row\u2019s mean, silently reweighting the\
        \ composite, or (b) produce NaNs when all three are null, propagating to risk_score.\
        \ A suitable rule: completeness('WorkLifeBalance') == 1.0."
      sources:
