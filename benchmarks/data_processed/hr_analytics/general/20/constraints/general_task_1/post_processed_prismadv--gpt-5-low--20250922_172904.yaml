    - text: AgeGroup must be present (non-null) whenever a risk score is computed,
        because the score multiplies by an AgeGroup-derived weight. Practically, AgeGroup
        should be complete (no missing) whenever Age is present, and vice versa, to
        avoid propagating NaNs into risk_score. This can be enforced with a multi-column
        completeness rule like .satisfies("AgeGroup IS NOT NULL AND Age IS NOT NULL",
        'Age_AgeGroup_nonnull').
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      - start_line: 99
        end_line: 99
        file: ''
      - start_line: 126
        end_line: 127
        file: ''
      uid: b2d6bb5c-c391-4af8-98c3-9ea6f53faddc
    - text: 'Career start age should be plausible: Age - TotalWorkingYears >= 15 for
        all rows (i.e., people typically do not start full-time work before age 15).
        This guards the downstream feature (career_start_signal = (Age - TotalWorkingYears
        - 15).clip(lower=0)) from relying on implausible values. In Deequ: .satisfies("Age
        - TotalWorkingYears >= 15", ''CareerStartAge_min15'').'
      sources:
      - start_line: 55
        end_line: 55
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      uid: 73aae364-62b8-4db3-9e2a-952a2fac0f8c
