        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      uid: 36c4a029-94a7-48eb-9f98-d7bf1123372c
    - text: 'Career start age should be reasonable for most rows: ''Age'' - ''TotalWorkingYears''
