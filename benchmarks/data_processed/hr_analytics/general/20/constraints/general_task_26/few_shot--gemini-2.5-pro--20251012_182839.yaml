constraints:
  EmpID:
    code:
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', ['3', '4'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    - - .satisfies("(CASE WHEN MonthlyIncome <= 5000 THEN 'Upto 5k' WHEN MonthlyIncome
        > 5000 AND MonthlyIncome <= 10000 THEN '5k-10k' WHEN MonthlyIncome > 10000
        AND MonthlyIncome <= 15000 THEN '10k-15k' ELSE '15k+' END) = SalarySlab",
        'SalarySlab_consistency_check')
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .satisfies('TotalWorkingYears >= YearsAtCompany', 'TotalWorkingYears_GTE_YearsAtCompany')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
