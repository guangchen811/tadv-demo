    e722f2c1-8b79-43e6-ab99-7a8d32060f57: '.satisfies("CASE WHEN JobRole IN (''Sales
      Executive'', ''Sales Representative'', ''Healthcare Representative'') THEN Department
      = ''Sales'' WHEN JobRole IN (''Research Scientist'', ''Laboratory Technician'',
      ''Research Director'', ''Manufacturing Director'') THEN Department = ''Research
      & Development'' WHEN JobRole = ''Human Resources'' THEN Department = ''Human
      Resources'' ELSE TRUE END", "RoleDepartmentConsistency", lambda x: x > 0.9)'
  '["Department","JobRole"]':
    5ae627e0-8857-4220-a123-625d32882ab9: '.satisfies("CASE WHEN JobRole = ''Sales
      Executive'' THEN Department = ''Sales'' WHEN JobRole = ''Sales Representative''
      THEN Department = ''Sales'' WHEN JobRole = ''Healthcare Representative'' THEN
      Department = ''Research & Development'' WHEN JobRole = ''Research Scientist''
      THEN Department = ''Research & Development'' WHEN JobRole = ''Laboratory Technician''
      THEN Department = ''Research & Development'' WHEN JobRole = ''Research Director''
      THEN Department = ''Research & Development'' WHEN JobRole = ''Manufacturing
      Director'' THEN Department = ''Research & Development'' WHEN JobRole = ''Human
      Resources'' THEN Department = ''Human Resources'' ELSE TRUE END", "Adherence
      to defined Role-Department mapping", lambda x: x == 1)'
  JobRole:
    49291f19-30b7-476d-9463-ff7ce1f7b797: .isContainedIn("JobRole", ['Sales Executive',
      'Sales Representative', 'Healthcare Representative', 'Research Scientist', 'Laboratory
      Technician', 'Research Director', 'Manufacturing Director', 'Human Resources',
      'Manager'])
  PerformanceRating:
    04b7c108-5f5b-49d1-aea1-3bee1236c58e: .isContainedIn('PerformanceRating', ['3',
      '4'])
  '["PerformanceRating","YearsInCurrentRole","YearsSinceLastPromotion"]':
