  '["Department","JobRole"]':
    code: []
    assumptions:
    - text: "In the aggregated output, the pair (Department, JobRole) must be a unique\
        \ group key (i.e., at most one row per Department\u2013JobRole). This can\
        \ be enforced on the aggregated dataset as: isUnique(['Department','JobRole'])."
      sources:
      - start_line: 70
        end_line: 78
        file: ''
      uid: bcd8f1b8-dd13-4407-9a9f-533d2b23ce85
    - text: "Each JobRole belongs to exactly one Department across the dataset (functional\
        \ dependency JobRole -> Department). This prevents cross-department role leakage\
        \ and stabilizes the Department\u2013JobRole budgeting grain. Deequ example:\
        \ hasFunctionalDependency('JobRole', Array('Department'))."
