      uid: aa9bb953-1410-47c8-b9e4-b9eaa2a96852
    - text: 'SalarySlab values must be strictly from the allowed set {''Upto 5k'',
        ''5k-10k'', ''10k-15k'', ''15k+''} (exact spelling/case). Any value outside
        this set would map to null and break downstream compensation calculations.
        Representations: Deequ -> .satisfies("CASE WHEN `SalarySlab` IN (''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'')
        THEN 1 ELSE 0 END", ''Valid SalarySlab'', lambda x: x == 1.0); Great Expectations
        -> expect_column_values_to_be_in_set(''SalarySlab'', [...]).'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      - start_line: 52
        end_line: 62
        file: ''
      uid: 386ece4d-e426-40bf-8021-69a99a9208fa
    - text: "SalarySlab values should be cleanly formatted (no leading/trailing whitespace\
        \ or alternative punctuation/casing). Values should equal their trimmed versions\
        \ and match the allowed tokens exactly (e.g., not 'upto 5k', 'Up to 5k', '5k\
        \ \u2013 10k', or '5k-10k '). Representations: Deequ -> .satisfies(\"CASE\
        \ WHEN TRIM(`SalarySlab`) IN ('Upto 5k','5k-10k','10k-15k','15k+') AND `SalarySlab`\
        \ = TRIM(`SalarySlab`) THEN 1 ELSE 0 END\", 'SalarySlab normalized', lambda\
        \ x: x == 1.0); Great Expectations -> expect_column_values_to_be_in_set on\
        \ TRIM(SalarySlab) and expect_column_values_to_match_regex('^[^ ].*[^ ]$')."
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      uid: f8c4a65c-7418-45cb-8c18-bac5b671ba5d
    - text: 'The number of distinct SalarySlab categories should be at most 4 (since
        only four categories are recognized). Representations: Deequ -> .hasNumberOfDistinctValuesBetween(''SalarySlab'',
        1, 4); Great Expectations -> expect_column_unique_value_count_to_be_between(''SalarySlab'',
        min_value=1, max_value=4).'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      uid: 2076214c-5c95-4adc-b766-7f42ed12dace
    - text: 'SalarySlab should be a categorical/string field (not numeric codes),
        as it is used as keys in a string-to-float mapping. Representations: Deequ
        -> .hasDataType(''SalarySlab'', ConstrainableDataTypes.String); Great Expectations
        -> expect_column_values_to_be_in_type_list(''SalarySlab'', [''str'',''object'']).'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      uid: 50126f86-eedc-450a-a3aa-39c241458e09
