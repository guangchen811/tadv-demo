        end_line: 74
        file: ''
      uid: 561bb24e-ced8-4ab7-8dfa-4bcfc34b5df6
    - text: 'For every (Department, JobRole) group: headcount (sum of EmployeeCount)
        must be > 0; attrition_count must be between 0 and headcount; and attrition_rate
        = attrition_count / headcount must be within [0,1]. On the aggregated dataset:
        satisfies(''headcount > 0 AND attrition_count >= 0 AND attrition_count <=
        headcount AND attrition_rate >= 0 AND attrition_rate <= 1'', [''headcount'',''attrition_count'',''attrition_rate'']).'
      sources:
      - start_line: 70
        end_line: 76
        file: ''
      uid: 98e6ead2-c9f4-4bbe-a628-f4c571467302
    - text: 'If a (Department, JobRole) group has no active employees (i.e., attrition_count
        = headcount), then quarterly_budget must be 0. Conversely, quarterly_budget
        > 0 implies attrition_count < headcount. On the aggregated dataset: satisfies(''(headcount
        = attrition_count AND quarterly_budget = 0) OR (headcount > attrition_count
        AND quarterly_budget >= 0)'', [''headcount'',''attrition_count'',''quarterly_budget'']).'
      sources:
      - start_line: 66
        end_line: 68
        file: ''
      - start_line: 70
        end_line: 74
        file: ''
      uid: d048af85-fcee-4157-8c39-c5971bed1ad3
    - text: "All rows contributing to the Department\u2013JobRole aggregation must\
        \ have both Department and JobRole present (non-null) so that no records are\
        \ dropped into unintended null groups. This can be enforced on the input dataset:\
        \ satisfies('Department IS NOT NULL AND JobRole IS NOT NULL', ['Department','JobRole'])."
      sources:
      - start_line: 70
        end_line: 74
        file: ''
