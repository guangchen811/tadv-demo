  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'SalarySlab must be consistent with the row''s MonthlyIncome. Expected
        bins: ''Upto 5k'' => 0 <= MonthlyIncome <= 5000; ''5k-10k'' => 5000 < MonthlyIncome
        <= 10000; ''10k-15k'' => 10000 < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome
        > 15000. This can be enforced as a Deequ compliance constraint like: CASE
        WHEN SalarySlab = ''Upto 5k'' THEN MonthlyIncome >= 0 AND MonthlyIncome <=
        5000 WHEN SalarySlab = ''5k-10k'' THEN MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000 WHEN SalarySlab = ''10k-15k'' THEN MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000 WHEN SalarySlab = ''15k+'' THEN MonthlyIncome > 15000 ELSE false
        END.'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 52
        end_line: 62
        file: ''
      uid: d2c81131-000f-49bc-998e-ac55b9c8721f
    - text: 'slab_premium must be deterministically derived from SalarySlab and SalarySlab
        must be within the allowed domain. Enforce with a compliance constraint such
        as: (SalarySlab IN (''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'')) AND ((SalarySlab=''Upto
        5k'' AND slab_premium=0.00) OR (SalarySlab=''5k-10k'' AND slab_premium=0.02)
        OR (SalarySlab=''10k-15k'' AND slab_premium=0.04) OR (SalarySlab=''15k+''
        AND slab_premium=0.06)).'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      - start_line: 52
        end_line: 62
        file: ''
      uid: e56fa3c9-5342-4c19-9f9e-65ed12f49fca
    - text: 'adj_income must equal MonthlyIncome * (1 + PercentSalaryHike/100) and
        hikes are assumed non-negative, implying adj_income >= MonthlyIncome. Enforce
        with a compliance constraint such as: PercentSalaryHike >= 0 AND abs(adj_income
        - (MonthlyIncome * (1 + PercentSalaryHike/100.0))) < 1e-6.'
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      uid: edcf9784-d911-45e0-aeac-99c97be1af11
    - text: 'monthly_comp_w_overheads must equal adj_income * (1 + benefits_rate +
        travel_premium + overtime_premium + slab_premium + joblevel_adj + manager_adj)
        * fte (within a small numeric tolerance). Enforce with: abs(monthly_comp_w_overheads
        - adj_income * (1 + benefits_rate + travel_premium + overtime_premium + slab_premium
        + joblevel_adj + manager_adj) * fte) < 1e-6.'
      sources:
      - start_line: 48
        end_line: 48
        file: ''
      - start_line: 52
        end_line: 62
        file: ''
      uid: c2536b9c-2062-4ff8-abfe-67314ce3bea6
    - text: 'active_quarterly_comp must equal quarterly_comp when Attrition == ''No'';
        otherwise it must be 0. Represent as: (Attrition = ''No'' AND abs(active_quarterly_comp
        - quarterly_comp) < 1e-6) OR (Attrition <> ''No'' AND active_quarterly_comp
        = 0).'
      sources:
      - start_line: 64
        end_line: 64
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
