fixing_results:
  '["Age","AgeGroup"]':
    6d4dc416-f42d-4f88-9b97-12d021d8528c: '.satisfies("(Age >= 18 AND Age <= 25 AND
      AgeGroup = ''18-25'') OR (Age >= 26 AND Age <= 35 AND AgeGroup = ''26-35'')
      OR (Age >= 36 AND Age <= 45 AND AgeGroup = ''36-45'') OR (Age >= 46 AND Age
      <= 55 AND AgeGroup = ''46-55'') OR (Age >= 55 AND AgeGroup = ''55+'')", "Age
      and AgeGroup must be consistent", lambda v: v >= 0.99)'
    c3acdf7a-c59d-4d3c-9b31-ab59a18498f0: '.satisfies("SalarySlab IN (''Upto 5k'',
      ''5k-10k'', ''10k-15k'', ''15k+'')", "SalarySlab has allowed values", lambda
      v: v == 1.0)'
    789f0640-0efe-4cff-9738-1c5cfc432770: '.satisfies("StandardHours IS NOT NULL AND
      ABS((StandardHours / 80.0) - 1.0) <= 1e-6", "StandardHours equals 80 (implies
      derived fte = 1.0)", lambda v: v == 1.0)'
  '["Age","YearsAtCompany"]':
    f720a506-5dfb-4e75-b42b-b499c929e43c: '.satisfies("(YearsInCurrentRole >= 0 AND
      YearsInCurrentRole <= YearsAtCompany) AND (YearsWithCurrManager >= 0 AND YearsWithCurrManager
      <= YearsAtCompany) AND (YearsSinceLastPromotion >= 0 AND YearsSinceLastPromotion
      <= YearsAtCompany)", "Tenure components within YearsAtCompany (>= 95% compliance)",
      lambda v: v >= 0.95)'
  JobLevel:
    e76bf4ab-4549-476b-927d-84f93e9bee68: '.isContainedIn(''JobLevel'', [''1'', ''2'',
      ''3'', ''4'', ''5''], lambda x: x == 1.0)'
  JobRole:
    540c2ac3-9748-4af6-94ba-3ed55e38f57b: '.hasApproxCountDistinct("JobRole", lambda
      x: (x >= 5) and (x <= 15))'
  PerformanceRating:
    10460a04-078b-481e-9773-e1be7d8ea269: .isComplete('PerformanceRating')
    33be7ca8-b8b0-4d73-9f97-d8d0b3925304: '.isContainedIn(''PerformanceRating'', [''3'',
      ''4''], lambda x: x == 1.0)'
  SalarySlab:
    54871ad7-d285-4171-aa55-27715afad2b2: .isContainedIn('SalarySlab', ['Upto 5k',
      '5k-10k', '10k-15k', '15k+'])
