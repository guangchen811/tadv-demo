  '["TotalWorkingYears","YearsAtCompany"]':
    code:
    - suggestion: '.haveCompleteness([''YearsAtCompany'', ''TotalWorkingYears''],
        lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 1af6364f-11ad-49a3-a057-75235805a091
      source_assumptions:
      - b8f34656-1a71-4823-b211-2db00fc2e642
    - suggestion: '.isLessThanOrEqualTo(''YearsAtCompany'', ''TotalWorkingYears'',
        lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 97db6f1a-3fd9-4351-a558-c964fd7c33fb
      source_assumptions:
      - b8f34656-1a71-4823-b211-2db00fc2e642
    assumptions:
    - text: 'YearsAtCompany must be less than or equal to TotalWorkingYears for every
        row (both are complete integral fields). Example Deequ: .satisfies("YearsAtCompany
        <= TotalWorkingYears", "years_at_company_le_total")'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      uid: 1d7ffcd7-43fb-4d79-b36b-e4679f279215
    - text: 'adj_income is deterministically derived from MonthlyIncome and PercentSalaryHike:
        adj_income = MonthlyIncome * (1.0 + PercentSalaryHike/100.0). Example Deequ:
        .satisfies("adj_income = MonthlyIncome * (1.0 + PercentSalaryHike/100.0)",
        "adj_income_formula")'
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      uid: b8f34656-1a71-4823-b211-2db00fc2e642
    - text: 'monthly_comp_w_overheads is deterministically derived from multiple columns:
        monthly_comp_w_overheads = adj_income * (1.0 + benefits_rate + travel_premium
        + overtime_premium + slab_premium + joblevel_adj + manager_adj) * fte. Example
        Deequ: .satisfies("monthly_comp_w_overheads = adj_income * (1.0 + benefits_rate
        + travel_premium + overtime_premium + slab_premium + joblevel_adj + manager_adj)
        * fte", "monthly_comp_formula")'
      sources:
      - start_line: 48
        end_line: 61
        file: ''
      uid: 585bf79d-68ad-47c7-b6a3-9b70997e195a
    - text: 'fte is deterministically derived from StandardHours: fte = StandardHours
        / 80.0. Example Deequ: .satisfies("fte = StandardHours / 80.0", "fte_from_standard_hours")'
      sources:
      - start_line: 48
        end_line: 48
        file: ''
      uid: e90e537e-9ca1-4b12-ad91-165b13ed4151
    - text: 'quarterly_comp must equal monthly_comp_w_overheads multiplied by 3.0.
        Example Deequ: .satisfies("quarterly_comp = monthly_comp_w_overheads * 3.0",
        "quarterly_comp_from_monthly")'
      sources:
      - start_line: 64
        end_line: 64
        file: ''
      uid: 71051133-dd27-4145-b3ee-984ba9de742d
    - text: 'active_quarterly_comp is conditional on Attrition: if Attrition == ''No''
        then active_quarterly_comp = quarterly_comp else active_quarterly_comp = 0.0.
        Example Deequ: .satisfies("(Attrition = ''No'' AND active_quarterly_comp =
        quarterly_comp) OR (Attrition <> ''No'' AND active_quarterly_comp = 0.0)",
        "active_quarterly_comp_rule")'
      sources:
      - start_line: 66
        end_line: 68
        file: ''
      uid: ba52856c-4772-4219-8906-1d2d6bcf89cd
    - text: 'In the grouped output by (Department, JobRole), attrition_rate equals
        attrition_count divided by headcount, where headcount is the sum of EmployeeCount
        and attrition_count is the count of Attrition == ''Yes'' within the group.
        Example check (post-aggregation): .satisfies("attrition_rate = attrition_count
        / headcount", "group_attrition_rate_correct")'
      sources:
      - start_line: 70
        end_line: 76
        file: ''
      uid: 5b70ca59-3dd6-48e5-8093-a7a86fa2b432
    - text: 'BusinessTravel values are normalized (TravelRarely -> Travel_Rarely)
        and travel_premium must match the mapping: {''Non-Travel'': 0.00, ''Travel_Rarely'':
        0.02, ''Travel_Frequently'': 0.05}. Example Deequ: .satisfies("(BusinessTravel
        = ''Non-Travel'' AND travel_premium = 0.00) OR (BusinessTravel = ''Travel_Rarely''
        AND travel_premium = 0.02) OR (BusinessTravel = ''Travel_Frequently'' AND
        travel_premium = 0.05)", "travel_premium_mapping")'
      sources:
      - start_line: 30
        end_line: 30
        file: ''
      - start_line: 35
        end_line: 36
        file: ''
      uid: 4e92fb0f-0f55-4abe-ada7-a8bfbd8ed16c
    - text: 'overtime_premium must match OverTime mapping: {''No'': 0.0, ''Yes'':
        0.10}. Example Deequ: .satisfies("(OverTime = ''No'' AND overtime_premium
        = 0.0) OR (OverTime = ''Yes'' AND overtime_premium = 0.10)", "overtime_premium_mapping")'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: 8385da4b-bb8a-4c50-872e-5813f8891ca4
    - text: 'slab_premium must match SalarySlab mapping: {''Upto 5k'': 0.00, ''5k-10k'':
        0.02, ''10k-15k'': 0.04, ''15k+'': 0.06}. Example Deequ: .satisfies("(SalarySlab
        = ''Upto 5k'' AND slab_premium = 0.00) OR (SalarySlab = ''5k-10k'' AND slab_premium
        = 0.02) OR (SalarySlab = ''10k-15k'' AND slab_premium = 0.04) OR (SalarySlab
        = ''15k+'' AND slab_premium = 0.06)", "slab_premium_mapping")'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      uid: 8345be8c-81ac-401e-875b-ef95e7b10420
    - text: 'joblevel_adj is deterministically derived from JobLevel: joblevel_adj
        = 0.005 * (JobLevel - 1). Example Deequ: .satisfies("joblevel_adj = 0.005
        * (JobLevel - 1)", "joblevel_adj_formula")'
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      uid: 450f1806-f321-48e4-9065-4c1526b75a0c
    - text: 'manager_adj is deterministically derived from YearsWithCurrManager: manager_adj
        = 0.01 if YearsWithCurrManager < 1 else 0.0. Example Deequ: .satisfies("(YearsWithCurrManager
        < 1 AND manager_adj = 0.01) OR (YearsWithCurrManager >= 1 AND manager_adj
        = 0.0)", "manager_adj_rule")'
      sources:
      - start_line: 46
        end_line: 46
        file: ''
      uid: d3d6bb2f-7ff6-44f8-b7c2-68935f0d24ba
  '["YearsAtCompany","YearsInCurrentRole"]':
    code: []
    assumptions:
    - text: 'Employee tenure consistency: For every row, YearsInCurrentRole must be
        less than or equal to YearsAtCompany, and both must be non-negative. This
        can be represented as a Deequ constraint such as: .satisfies("YearsInCurrentRole
        >= 0 AND YearsAtCompany >= 0 AND YearsInCurrentRole <= YearsAtCompany", "tenure_consistency",
        assertion = _ == 1.0)'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 15334d4c-cd2d-4031-b7dc-0f162f6355ec
    - text: 'Career tenure bound: YearsAtCompany must be less than or equal to TotalWorkingYears
        for each record (and both non-negative), reflecting that total working experience
        cannot be lower than company tenure. Example Deequ: .satisfies("YearsAtCompany
        >= 0 AND TotalWorkingYears >= 0 AND YearsAtCompany <= TotalWorkingYears",
        "company_le_total", assertion = _ == 1.0)'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 505802e9-c170-4ce1-8d55-27dc238c33d1
    - text: 'Manager tenure bound: YearsWithCurrManager cannot exceed either YearsInCurrentRole
        or YearsAtCompany. Example Deequ: .satisfies("YearsWithCurrManager >= 0 AND
        YearsWithCurrManager <= YearsInCurrentRole AND YearsWithCurrManager <= YearsAtCompany",
        "manager_tenure_bounds", assertion = _ == 1.0)'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: d85fac9b-b145-4cb0-8451-bc08d65abd7d
    - text: 'Active compensation gating by attrition: If Attrition == ''No'' then
        active_quarterly_comp must equal quarterly_comp, otherwise it must be 0.0.
        Deequ example: .satisfies("(Attrition = ''No'' AND active_quarterly_comp =
        quarterly_comp) OR (Attrition <> ''No'' AND active_quarterly_comp = 0.0)",
        "active_comp_matches_attrition", assertion = _ == 1.0)'
      sources:
      - start_line: 66
        end_line: 68
        file: ''
      uid: bc78c915-d959-40f6-879b-668e268db803
    - text: 'Group headcount integrity: Within each (Department, JobRole) group, the
        sum of EmployeeCount should equal the number of employees (count of distinct
        EmpID). This supports the computation of headcount and attrition_rate. This
        can be enforced by verifying EmployeeCount == 1 per row and EmpID is unique,
        or via an aggregate check per group: SUM(EmployeeCount) = COUNT_DISTINCT(EmpID).'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 70
        end_line: 76
        file: ''
      uid: 8236be95-442d-4adf-8310-9eb6b7389b54
    - text: 'Benefits rate mapping completeness: For records where AgeGroup is one
        of {''18-25'',''26-35'',''36-45'',''46-55'',''55+''}, benefits_rate must be
        non-null and match the mapping; if AgeGroup is null, benefits_rate may be
        null. Deequ example: .satisfies("(AgeGroup IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'')
        AND benefits_rate IS NOT NULL) OR AgeGroup IS NULL", "benefits_rate_complete",
        assertion = _ == 1.0)'
      sources:
      - start_line: 32
        end_line: 34
        file: ''
      uid: bdba95a5-7513-483c-83c2-804afdbd7c50
    - text: 'Business travel premium mapping completeness: After normalizing BusinessTravel
        (''TravelRarely'' -> ''Travel_Rarely''), BusinessTravel must be in {''Non-Travel'',''Travel_Rarely'',''Travel_Frequently''}
        and travel_premium must be non-null whenever BusinessTravel is non-null. Deequ
        example: .satisfies("(BusinessTravel IN (''Non-Travel'',''Travel_Rarely'',''Travel_Frequently'')
        AND travel_premium IS NOT NULL) OR BusinessTravel IS NULL", "travel_premium_complete",
        assertion = _ == 1.0)'
      sources:
      - start_line: 30
        end_line: 30
        file: ''
      - start_line: 35
        end_line: 37
        file: ''
      uid: 76c494d3-b1d2-4fd3-8e64-4b1343b34b0c
    - text: 'Overtime premium mapping completeness: When OverTime is in {''Yes'',''No''},
        overtime_premium must be non-null and match the mapping. Deequ example: .satisfies("(OverTime
        IN (''Yes'',''No'') AND overtime_premium IS NOT NULL) OR OverTime IS NULL",
        "overtime_premium_complete", assertion = _ == 1.0)'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: 49373075-634b-45fc-b944-074c17e16cbf
    - text: 'Salary slab premium mapping completeness: When SalarySlab is in {''Upto
        5k'',''5k-10k'',''10k-15k'',''15k+''}, slab_premium must be non-null and match
        the mapping. Deequ example: .satisfies("(SalarySlab IN (''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'')
        AND slab_premium IS NOT NULL) OR SalarySlab IS NULL", "slab_premium_complete",
        assertion = _ == 1.0)'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      uid: 3c41eac4-d773-457e-a879-49708693fadf
    - text: 'Adjusted income formula correctness: adj_income must equal MonthlyIncome
        * (1 + PercentSalaryHike/100). Deequ example: .satisfies("adj_income = MonthlyIncome
        * (1 + PercentSalaryHike/100)", "adj_income_formula", assertion = _ == 1.0)'
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      uid: 372bcca6-d741-4782-837b-0e3c6ecb74f0
    - text: 'Monthly compensation with overheads formula correctness: monthly_comp_w_overheads
        must equal adj_income * (1 + benefits_rate + travel_premium + overtime_premium
        + slab_premium + joblevel_adj + manager_adj) * fte. Deequ example: .satisfies("monthly_comp_w_overheads
        = adj_income * (1 + benefits_rate + travel_premium + overtime_premium + slab_premium
        + joblevel_adj + manager_adj) * fte", "monthly_comp_formula", assertion =
        _ == 1.0)'
      sources:
      - start_line: 52
        end_line: 61
        file: ''
      uid: f26b4c7b-74c6-4296-b995-ee0e847284d0
    - text: 'Quarterly compensation formula correctness: quarterly_comp must equal
        monthly_comp_w_overheads * 3.0. Deequ example: .satisfies("quarterly_comp
        = monthly_comp_w_overheads * 3.0", "quarterly_comp_formula", assertion = _
        == 1.0)'
      sources:
      - start_line: 64
        end_line: 64
        file: ''
      uid: 82243531-ed2a-4372-95fc-8637d2e2e0f5
    - text: 'FTE calculation consistency: fte must equal StandardHours / 80.0 and
        should be non-negative. Deequ example: .satisfies("fte = StandardHours / 80.0
        AND fte >= 0", "fte_consistency", assertion = _ == 1.0)'
      sources:
      - start_line: 48
        end_line: 48
        file: ''
      uid: a8e83511-0aeb-4bdd-bf28-debc41a8d189
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'YearsSinceLastPromotion must be less than or equal to YearsAtCompany
        for every record (you cannot have been promoted longer ago than you''ve been
        at the company). Example Deequ: .satisfies("YearsSinceLastPromotion <= YearsAtCompany",
        "promo_leq_tenure")'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 298d3984-0f91-4e1a-a715-8e4815b24b6b
    - text: 'If YearsAtCompany equals 0, then YearsSinceLastPromotion must be 0 (no
        promotions before joining). Example Deequ: .satisfies("!(YearsAtCompany =
        0 AND YearsSinceLastPromotion > 0)", "no_promo_before_join")'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: ff7bd0fa-2abf-4774-8e44-602d97b032d7
    - text: 'YearsAtCompany must be less than or equal to TotalWorkingYears for all
        rows. Example Deequ: .satisfies("YearsAtCompany <= TotalWorkingYears", "tenure_leq_total")'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 51cc70ff-7503-4b34-b406-39d0ea7c747a
    - text: 'YearsSinceLastPromotion must be less than or equal to TotalWorkingYears
        for all rows. Example Deequ: .satisfies("YearsSinceLastPromotion <= TotalWorkingYears",
        "promo_leq_total")'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 38932913-372d-4260-90c2-cfbc02414bf2
    - text: 'YearsWithCurrManager and YearsInCurrentRole must each be less than or
        equal to YearsAtCompany (manager tenure and role tenure cannot exceed company
        tenure). Example Deequ: .satisfies("YearsWithCurrManager <= YearsAtCompany
        AND YearsInCurrentRole <= YearsAtCompany", "mgr_role_leq_tenure")'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: 1a01d457-b33d-4135-9d2c-ad82860e7570
  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'YearsWithCurrManager must be less than or equal to YearsAtCompany for
        every record (both measured in years). This prevents impossible tenure relationships
        that would mis-trigger the < 1 year manager adjustment. Deequ example: check.satisfies("YearsWithCurrManager
        <= YearsAtCompany", "ywcm_le_yac")'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: c711fcbd-740b-4ce1-bb80-acc39dc8137e
    - text: 'If YearsAtCompany equals 0 (new hire), YearsWithCurrManager must be 0
        as well. This avoids treating unknown/brand-new manager relationships as non-zero
        and ensures the manager_adj logic is applied consistently. Deequ example:
        check.satisfies("YearsAtCompany <> 0 OR coalesce(YearsWithCurrManager, 0)
        = 0", "yac0_implies_ywcm0")'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      - start_line: 52
        end_line: 62
        file: ''
      uid: 70a632d7-9a60-4690-abcb-456352c135e7
    - text: 'For rows where YearsAtCompany > 0, YearsWithCurrManager must be non-null
        (to avoid nulls being coerced to 0 and unintentionally triggering the manager_adj).
        Deequ example: check.hasCompleteness("YearsWithCurrManager", _ >= 1.0, where
        = "YearsAtCompany > 0")'
