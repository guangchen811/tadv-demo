    assumptions:
    - text: 'If the ''TotalWorkingYears'' column is present, 100% of its values should
        be parseable as numeric (pd.to_numeric with errors=''coerce'' should not introduce
        nulls). This can be enforced as a Deequ constraint such as: .satisfies("CASE
        WHEN TRY_CAST(`TotalWorkingYears` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END",
        "TotalWorkingYears numeric", lambda x: x == 1.0), or a Great Expectations
        rule like expect_column_values_to_be_in_type_list([''int64'',''int32'',''float64'']).'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 25
        end_line: 27
        file: ''
      uid: c9bcdfd2-d52f-442a-864e-df2edca37221
    - text: 'If the ''TotalWorkingYears'' column is present, it should be complete
        (no nulls) in the input data, since the code does not impute or otherwise
        handle nulls for this column. This can be captured as Deequ: .hasCompleteness(''TotalWorkingYears'',
        lambda x: x == 1.0), or Great Expectations: expect_column_values_to_not_be_null.'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      uid: 5d47b496-06e2-4aa5-b95d-46a2a5f0c507
    - text: 'Values in ''TotalWorkingYears'' should be non-negative integers, with
        a realistic upper bound (e.g., <= 60). These domain constraints can be expressed
        in Deequ as: .isNonNegative(''TotalWorkingYears''), .satisfies("CASE WHEN
        `TotalWorkingYears` = CAST(`TotalWorkingYears` AS BIGINT) THEN 1 ELSE 0 END",
        "Integer years", lambda x: x == 1.0), and .satisfies("CASE WHEN `TotalWorkingYears`
        <= 60 THEN 1 ELSE 0 END", "Upper bound", lambda x: x == 1.0).'
      sources:
