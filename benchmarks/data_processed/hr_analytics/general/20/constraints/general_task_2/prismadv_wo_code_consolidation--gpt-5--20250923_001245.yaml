    - text: YearsInCurrentRole, YearsWithCurrManager, and YearsSinceLastPromotion
        must each be between 0 and YearsAtCompany (i.e., 0 <= each <= YearsAtCompany).
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: 83a1dbac-106a-40b6-b731-59b169ab64f7
    - text: YearsAtCompany must be less than or equal to TotalWorkingYears, and Age
        must exceed YearsAtCompany by at least 14 years (Age - YearsAtCompany >= 14)
        to reflect plausible career timelines.
