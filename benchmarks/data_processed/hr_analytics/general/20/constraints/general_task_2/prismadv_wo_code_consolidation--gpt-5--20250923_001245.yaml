        end_line: 22
        file: ''
      - start_line: 25
        end_line: 27
        file: ''
      uid: 45063b8b-ba35-4cf4-a1b7-de945a80ef7d
    - text: 'Presence of the ''TotalWorkingYears'' column is optional for the script
        to run (it is checked conditionally). Validation should therefore be conditional:
        only enforce the above rules if the column exists. If your pipeline requires
        this column, add a strict schema check to ensure it is present.'
