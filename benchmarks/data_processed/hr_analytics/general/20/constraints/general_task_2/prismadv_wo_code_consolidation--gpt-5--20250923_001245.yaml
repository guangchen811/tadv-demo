  '["Age","TotalWorkingYears"]':
    code: []
    assumptions:
    - text: 'TotalWorkingYears must be feasible given Age: TotalWorkingYears >= 0
        and Age - TotalWorkingYears >= 14 (i.e., people cannot have worked more years
        than their age allows assuming a minimum start age around 14). Deequ example:
        .satisfies("TotalWorkingYears >= 0 AND Age - TotalWorkingYears >= 14", "age_twy_feasibility").'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      uid: 5431a924-924c-4016-a25b-27a6e889481d
    - text: 'YearsAtCompany cannot exceed TotalWorkingYears for any employee. Deequ
        example: .satisfies("YearsAtCompany <= TotalWorkingYears", "yac_le_twy").'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      uid: f48ebc80-3b56-40e0-9716-10ade52b021f
    - text: 'Tenure-like fields must be internally consistent and not exceed overall
        tenure: YearsInCurrentRole <= YearsAtCompany AND YearsWithCurrManager <= YearsAtCompany
        AND YearsSinceLastPromotion <= YearsAtCompany AND each of these <= TotalWorkingYears.
        Deequ examples: .satisfies("YearsInCurrentRole <= YearsAtCompany AND YearsInCurrentRole
        <= TotalWorkingYears", "yicr_bounds"), .satisfies("YearsWithCurrManager <=
        YearsAtCompany AND YearsWithCurrManager <= TotalWorkingYears", "ywm_bounds"),
        .satisfies("YearsSinceLastPromotion <= YearsAtCompany AND YearsSinceLastPromotion
        <= TotalWorkingYears", "yslp_bounds").'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: 2b41d580-2dc3-40b7-b89d-bb8c377914f1
    - text: 'Age must be consistent with AgeGroup bins used for benefits. For each
        row: if AgeGroup = ''18-25'' then 18 <= Age <= 25; ''26-35'' => 26 <= Age
        <= 35; ''36-45'' => 36 <= Age <= 45; ''46-55'' => 46 <= Age <= 55; ''55+''
        => Age >= 55. Deequ example: .satisfies("CASE WHEN AgeGroup = ''18-25'' THEN
        Age BETWEEN 18 AND 25 WHEN AgeGroup = ''26-35'' THEN Age BETWEEN 26 AND 35
        WHEN AgeGroup = ''36-45'' THEN Age BETWEEN 36 AND 45 WHEN AgeGroup = ''46-55''
        THEN Age BETWEEN 46 AND 55 WHEN AgeGroup = ''55+'' THEN Age >= 55 ELSE false
        END", "age_matches_agegroup").'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 32
        end_line: 33
        file: ''
      uid: 763506ae-b85b-432f-b1f7-51c3afb352f2
