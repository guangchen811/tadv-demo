results:
  AgeGroup:
    code:
    - suggestion: .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55',
        '55+'])
      status: true
      reason_if_failed: ''
      level: error
  Department:
    code:
    - suggestion: .isComplete('Department')
      status: true
      reason_if_failed: ''
      level: error
  EmpID:
    code:
    - suggestion: .isUnique('EmpID')
      status: true
      reason_if_failed: ''
      level: error
  JobSatisfaction:
    code:
    - suggestion: .isContainedIn('JobSatisfaction', ['1', '2', '3', '4'])
      status: true
      reason_if_failed: ''
      level: error
  MonthlyIncome:
    code:
    - suggestion: .isNonNegative('MonthlyIncome')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''MonthlyIncome'')'' failed on
        data sample: Value: 0.9710884353741497 does not meet the constraint requirement!'
      level: error
  OverTime:
    code:
    - suggestion: .isContainedIn('OverTime', ['Yes', 'No'])
      status: true
      reason_if_failed: ''
      level: error
  PerformanceRating:
    code:
    - suggestion: .isContainedIn('PerformanceRating', ['3', '4'])
      status: true
      reason_if_failed: ''
      level: error
  SalarySlab:
    code:
    - suggestion: .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      status: true
      reason_if_failed: ''
      level: error
  YearsAtCompany:
    code:
    - suggestion: .isNonNegative('YearsAtCompany')
      status: true
      reason_if_failed: ''
      level: error
  YearsWithCurrManager:
    code:
    - suggestion: '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
