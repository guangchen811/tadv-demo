    - text: 'The derived proportion YearsInCurrentRole / YearsAtCompany should be
        finite and within [0,1] in valid data (i.e., 0 <= YearsInCurrentRole <= YearsAtCompany).
        The code replaces infinities and clips the ratio at 1, indicating this is
        an expected invariant. Example constraint: satisfies("YearsInCurrentRole >=
        0 AND YearsInCurrentRole <= YearsAtCompany", "role_ratio_bounds").'
