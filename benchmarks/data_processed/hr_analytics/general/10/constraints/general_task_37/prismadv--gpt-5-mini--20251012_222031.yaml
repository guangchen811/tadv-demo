    - text: 'To avoid division-by-zero and spurious infinite ratios, whenever YearsInCurrentRole
        > 0 then YearsAtCompany must be > 0. Alternatively require YearsAtCompany
        > 0 for all rows. Example constraint: satisfies("NOT (YearsInCurrentRole >
        0 AND YearsAtCompany = 0)", "no_zero_tenure_when_in_role").'
