        column contains non-numeric strings the comparisons will fail or behave unexpectedly.
        A validation rule example: .satisfies("CASE WHEN try_cast(`PerformanceRating`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "PerformanceRating numeric-castable",
