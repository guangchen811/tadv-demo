    - text: 'If ''Department'' contains a value not in the explicit mapping keys {''Sales'',
        ''Research & Development'', ''Human Resources''}, then ''BudgetMultiplier''
        must be the fallback value 1.00 (the code uses .fillna(1.00) when mapping).
        This multi-column constraint can be expressed as: .satisfies("(NOT(Department
        IN (''Sales'',''Research & Development'',''Human Resources'')) AND BudgetMultiplier
        == 1.0) OR (Department IN (''Sales'',''Research & Development'',''Human Resources''))",
