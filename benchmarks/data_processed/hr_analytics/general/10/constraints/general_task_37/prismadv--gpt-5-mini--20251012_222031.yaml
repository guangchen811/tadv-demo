  '["RecommendedRaisePct","SalarySlab"]':
    code: []
    assumptions:
    - text: 'SalarySlab should only contain the expected discrete categories used
        by the compensation logic: [''Upto 5k'', ''5k-10k'', ''10k-15k'', ''15k+''].
        This is required because slab_caps, slab_bounds and slab_medians are keyed
        by these categories. Example Deequ constraint: .isContainedIn(''SalarySlab'',
        [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''])'
      sources:
      - start_line: 43
        end_line: 55
        file: ''
      uid: e418fb5e-6c0d-4820-8813-5f5dbe64d7d7
    - text: 'For every row, MonthlyIncome must fall within the numeric bounds defined
        for its SalarySlab (i.e., SalarySlab correctly reflects the income bracket).
        Concretely:

        - If SalarySlab == ''Upto 5k'' then 0 <= MonthlyIncome <= 5000

        - If SalarySlab == ''5k-10k'' then 5000 < MonthlyIncome <= 10000

        - If SalarySlab == ''10k-15k'' then 10000 < MonthlyIncome <= 15000

        - If SalarySlab == ''15k+'' then MonthlyIncome > 15000

        This can be expressed as row-level conditional checks in Deequ (e.g. .satisfies(...)
        with combined conditions) to ensure slab-label/income consistency.'
      sources:
      - start_line: 43
        end_line: 48
        file: ''
      uid: c48fb10f-5ab5-410a-b9e0-240c7b8966f6
    - text: 'The slab median (SlabMedian) computed from groupby(SalarySlab)[''MonthlyIncome''].median()
        must be non-null and > 0 for every SalarySlab value present in the dataset
        so that CompaRatio = MonthlyIncome / SlabMedian yields a meaningful finite
        ratio (avoids division-by-zero/default fill behavior). Deequ-style checks:
        verify no null SlabMedian after mapping and SlabMedian > 0 for rows (or verify
        grouped median completeness before mapping).'
      sources:
      - start_line: 57
        end_line: 60
        file: ''
      uid: a1ca6c49-902b-4a23-b88f-bc94dc55ebf6
    - text: 'RecommendedRaisePct must respect the slab cap mapping: for each row RecommendedRaisePct
        <= slab_caps[SalarySlab]. In other words the per-row recommended raise is
        capped by the SalarySlab-specific cap (e.g., <= 0.15 for ''Upto 5k'', 0.12
        for ''5k-10k'', etc). Example Deequ constraint: .isLessThanOrEqualTo(''RecommendedRaisePct'',
        ''cap_mapped_from_SalarySlab'') implemented as a row-level predicate comparing
        RecommendedRaisePct to the mapped cap value.'
      sources:
      - start_line: 50
        end_line: 55
        file: ''
      - start_line: 70
        end_line: 75
        file: ''
      uid: aa4e4fba-b17a-414e-b7f7-16045efeba12
    - text: 'NewMonthlyIncome must equal MonthlyIncome * (1 + RecommendedRaisePct),
        rounded to two decimal places, for every row. This ensures the reported NewMonthlyIncome
        is consistent with the recommended raise. A validation could be implemented
        as a row-level predicate: abs(NewMonthlyIncome - round(MonthlyIncome * (1
        + RecommendedRaisePct), 2)) < a_small_epsilon (or exact equality if types/rounding
        are deterministic).'
      sources:
      - start_line: 77
        end_line: 77
        file: ''
      - start_line: 97
        end_line: 99
        file: ''
      uid: f1814fe3-0bc4-4446-bfd4-a5a65184b14a
