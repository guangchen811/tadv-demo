    - text: PerformanceRating is an ordinal score where larger values indicate better
        performance and the code treats values >= 4 as 'high performers'. Input data
        should follow that convention (higher => better). A validation (informational)
        rule could be to ensure the set of values maps to an ordinal scale and that
        4 represents a top/strong rating on that scale.
