    - text: 'YearsAtCompany should be greater than or equal to YearsSinceLastPromotion
        for all records. The code computes stagnation_years = YearsAtCompany - YearsSinceLastPromotion
        and then takes a square root (clipping negatives to 0), so negative values
        indicate inconsistent data. Example constraint: satisfies("YearsAtCompany
        >= YearsSinceLastPromotion", "stagnation_nonnegative").'
