        for any record. The code divides YearsInCurrentRole by YearsAtCompany and
        later clips the ratio at 1, so the expected relationship is: 0 <= YearsInCurrentRole
        <= YearsAtCompany. This can be expressed as a multi-column check/satisfaction
        like: .satisfies(''YearsInCurrentRole >= 0 and YearsInCurrentRole <= YearsAtCompany'')
        or as two checks: non-negativity of YearsInCurrentRole and YearsInCurrentRole
        <= YearsAtCompany.'
