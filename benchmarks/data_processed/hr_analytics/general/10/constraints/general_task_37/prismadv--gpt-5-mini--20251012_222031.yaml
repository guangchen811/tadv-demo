        JobLevel, Attrition, and CareerStage must be present and sensibly typed. Concretely,
        for rows where PerformanceRating >= 4 and Attrition indicates ''No'', YearsInCurrentRole
        and YearsSinceLastPromotion must be non-null and YearsSinceLastPromotion should
        be >= 1 and YearsInCurrentRole should be >= required_years (derived from CareerStage),
        and JobLevel should be < 5. A conditional Deequ-style constraint: for rows
