        Human Resources -> 0.95. This is a multi-column rule joining Department and
        BudgetMultiplier and can be enforced in Deequ with a satisfies constraint,
        e.g. .satisfies("(Department = ''Sales'' AND BudgetMultiplier == 1.0) OR (Department
        = ''Research & Development'' AND BudgetMultiplier == 1.05) OR (Department
