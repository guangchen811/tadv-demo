        effects on recommended_raise. This can be enforced as a multi-column safety
        check (Department + BudgetMultiplier presence) with Deequ: .satisfies("BudgetMultiplier
        > 0 AND BudgetMultiplier >= 0.5 AND BudgetMultiplier <= 1.5", ''budget_multiplier_range_check'').'
