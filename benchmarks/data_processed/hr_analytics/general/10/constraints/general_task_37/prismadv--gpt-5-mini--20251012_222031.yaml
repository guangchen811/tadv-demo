        The code computes stagnation_years = YearsAtCompany - YearsSinceLastPromotion
        and later takes sqrt of the clipped non-negative result and requires YearsSinceLastPromotion
        >= 1 for promotion eligibility, so YearSinceLastPromotion must satisfy: 0
        <= YearsSinceLastPromotion <= YearsAtCompany (and is present when used for
