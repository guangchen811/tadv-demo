        for SalarySlab groups with members. In practice: if MonthlyIncome is present
        for rows having a given SalarySlab, then median(MonthlyIncome) for that SalarySlab
        should be > 0 so that MonthlyIncome / SlabMedian yields a finite meaningful
        CompaRatio. Deequ-style: ensure group-wise median(SalarySlab, MonthlyIncome)
        > 0 and SlabMedian is not null for rows (SalarySlab, MonthlyIncome).'
      sources:
