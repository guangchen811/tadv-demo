    assumptions:
    - text: 'MonthlyIncome must be present and numeric for all rows (no nulls or non-numeric
        strings), because it is used in comparisons, aggregations (median/min/max),
        and logarithmic calculations. Example constraints: Deequ.isComplete(''MonthlyIncome'')
        and Deequ.hasDataType(''MonthlyIncome'', ConstrainableDataTypes.Integral)
        or GreatExpectations.expect_column_values_to_not_be_null(''MonthlyIncome'')
        and expect_column_values_to_be_of_type(''MonthlyIncome'', ''int64'' or ''float'').'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 29
        end_line: 32
        file: ''
      - start_line: 35
        end_line: 39
        file: ''
      - start_line: 144
        end_line: 146
        file: ''
      uid: c0e4bf22-fd25-4759-a1ed-9f7732b9e077
    - text: 'MonthlyIncome should be strictly positive (> 0) for all rows. This is
        implied by slab checks and required to avoid zero/negative medians that would
        make the log of median ratios undefined. Example constraints: Deequ.satisfies(''`MonthlyIncome`
        > 0'', ''Positive MonthlyIncome'', lambda x: x == 1.0) or GreatExpectations.expect_column_values_to_be_between(''MonthlyIncome'',
        min_value=0, strictly=True).'
      sources:
      - start_line: 29
        end_line: 32
        file: ''
      - start_line: 35
        end_line: 39
        file: ''
      uid: 7633e3b0-9126-427d-a014-1757c93018d1
    - text: 'MonthlyIncome must be consistent with SalarySlab boundaries on each row:
        (Upto 5k => 0 < MonthlyIncome <= 5000), (5k-10k => 5000 < MonthlyIncome <=
        10000), (10k-15k => 10000 < MonthlyIncome <= 15000), (15k+ => MonthlyIncome
        > 15000). Example constraint (tolerating a small audit failure rate): Deequ.satisfies("CASE
        WHEN `SalarySlab` = ''Upto 5k'' THEN `MonthlyIncome` > 0 AND `MonthlyIncome`
        <= 5000 WHEN `SalarySlab` = ''5k-10k'' THEN `MonthlyIncome` > 5000 AND `MonthlyIncome`
        <= 10000 WHEN `SalarySlab` = ''10k-15k'' THEN `MonthlyIncome` > 10000 AND
        `MonthlyIncome` <= 15000 WHEN `SalarySlab` = ''15k+'' THEN `MonthlyIncome`
        > 15000 ELSE true END", ''MonthlyIncome within slab bounds'', lambda x: x
        >= 0.95).'
      sources:
      - start_line: 24
        end_line: 24
        file: ''
      - start_line: 29
        end_line: 32
        file: ''
      uid: fc522a91-5d86-445f-a556-7b8378fd078c
    - text: 'For every allowed SalarySlab category [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''],
        there should be at least one record with non-null, positive MonthlyIncome
        so that per-slab medians are defined and finite. Additionally, the median
        MonthlyIncome within each slab should be strictly positive (to ensure log(median
        ratios) can be computed). Example constraints: For each slab s, Deequ.where(''`SalarySlab`
        = s'').isComplete(''MonthlyIncome'') and Deequ.where(''`SalarySlab` = s'').satisfies(''`MonthlyIncome`
        > 0'', ''Positive income in slab '' + s, lambda x: x > 0) and Deequ.ApproxQuantile(''MonthlyIncome'',
        quantiles=[0.5], where=''`SalarySlab` = s'') > 0.'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: 75c4b12e-6a18-494c-b604-7b57941dea19
    - text: 'MonthlyIncome values must be parseable and aggregable across Department
        and SalarySlab for audit outputs (median/min/max). Nulls or non-numeric values
        within these groups should not dominate (i.e., each group should have at least
        one valid MonthlyIncome). Example constraints: For each Department x and SalarySlab
        s, Deequ.where("`Department` = x AND `SalarySlab` = s").isComplete(''MonthlyIncome'')
        with a minimum row count > 0.'
