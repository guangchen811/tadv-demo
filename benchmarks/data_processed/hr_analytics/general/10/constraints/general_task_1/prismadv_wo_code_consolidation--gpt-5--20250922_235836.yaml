    assumptions:
    - text: 'Age must align with AgeGroup buckets, and AgeGroup must be one of {''18-25'',''26-35'',''36-45'',''46-55'',''55+''}.
        For every row: (AgeGroup=''18-25'' => 18<=Age<=25) OR (AgeGroup=''26-35''
        => 26<=Age<=35) OR (AgeGroup=''36-45'' => 36<=Age<=45) OR (AgeGroup=''46-55''
        => 46<=Age<=55) OR (AgeGroup=''55+'' => Age>=55). This prevents NaNs in age_w
        and risk_score. Deequ example: .isContainedIn(''AgeGroup'', [''18-25'',''26-35'',''36-45'',''46-55'',''55+'']).and(.satisfies("((AgeGroup
        = ''18-25'' and Age between 18 and 25) or (AgeGroup = ''26-35'' and Age between
        26 and 35) or (AgeGroup = ''36-45'' and Age between 36 and 45) or (AgeGroup
        = ''46-55'' and Age between 46 and 55) or (AgeGroup = ''55+'' and Age >= 55))",
        ''age_matches_agegroup'', lambda v: v == 1.0))'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      - start_line: 91
        end_line: 100
        file: ''
      - start_line: 126
        end_line: 127
        file: ''
      uid: 7b4f1807-d10c-4dbd-ab9e-d639b69925d9
    - text: 'TotalWorkingYears must be greater than or equal to YearsAtCompany (and
        both non-negative) so that external_experience = TotalWorkingYears - YearsAtCompany
        is non-negative before sqrt. Deequ example: .satisfies(''TotalWorkingYears
        >= 0 and YearsAtCompany >= 0 and TotalWorkingYears >= YearsAtCompany'', ''tenure_consistent'',
        lambda v: v >= 0.99)'
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      - start_line: 56
        end_line: 57
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: b9073523-07a3-49b6-9104-ab713708d8eb
    - text: 'Career start age should be plausible: Age - TotalWorkingYears >= 15 (i.e.,
        Age >= TotalWorkingYears + 15). This aligns with the code that derives a non-negative
        career_start_signal after subtracting 15. Deequ example: .satisfies(''Age
        - TotalWorkingYears >= 15'', ''career_start_age_plausible'', lambda v: v >=
        0.99)'
      sources:
      - start_line: 55
        end_line: 55
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      uid: da44db78-26a9-4022-95f0-37d72aba058e
    - text: 'Manager tenure cannot exceed company tenure, and should be zero when
        YearsAtCompany == 0: (YearsAtCompany > 0 => 0 <= YearsWithCurrManager <= YearsAtCompany)
        AND (YearsAtCompany == 0 => YearsWithCurrManager == 0). This prevents manager_ratio
        from exceeding 1 before clipping. Deequ example: .satisfies(''((YearsAtCompany
        > 0 and YearsWithCurrManager >= 0 and YearsWithCurrManager <= YearsAtCompany)
        or (YearsAtCompany = 0 and coalesce(YearsWithCurrManager,0) = 0))'', ''manager_tenure_within_company_tenure'',
        lambda v: v >= 0.99)'
      sources:
      - start_line: 56
        end_line: 57
        file: ''
      uid: 2ef1d5ea-eaf8-435a-8006-15b6ceda93e3
    - text: 'MonthlyIncome must fall within the declared SalarySlab boundaries, and
        SalarySlab must be one of [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'']. Row-level
        rule: (SalarySlab=''Upto 5k'' and 0<MonthlyIncome<=5000) OR (SalarySlab=''5k-10k''
        and 5000<MonthlyIncome<=10000) OR (SalarySlab=''10k-15k'' and 10000<MonthlyIncome<=15000)
        OR (SalarySlab=''15k+'' and MonthlyIncome>15000). Deequ example: .isContainedIn(''SalarySlab'',
        [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'']).and(.satisfies("((SalarySlab=''Upto
        5k'' and MonthlyIncome > 0 and MonthlyIncome <= 5000) or (SalarySlab=''5k-10k''
        and MonthlyIncome > 5000 and MonthlyIncome <= 10000) or (SalarySlab=''10k-15k''
        and MonthlyIncome > 10000 and MonthlyIncome <= 15000) or (SalarySlab=''15k+''
        and MonthlyIncome > 15000))", ''income_matches_slab'', lambda v: v >= 0.99))'
      sources:
      - start_line: 24
        end_line: 33
        file: ''
      - start_line: 141
        end_line: 149
        file: ''
      uid: 4e763a19-8dcf-430f-8d55-cf0a456f5fdc
    - text: 'Department-JobRole combinations must be valid: JobRole must belong to
        the allowed set for its Department (Sales -> {''Sales Executive'',''Sales
        Representative''}; Research & Development -> {''Research Scientist'',''Laboratory
        Technician'',''Research Director'',''Manufacturing Director''}; Human Resources
        -> {''Human Resources''}). Deequ example: .satisfies("((Department=''Sales''
        and JobRole in (''Sales Executive'',''Sales Representative'')) or (Department=''Research
        & Development'' and JobRole in (''Research Scientist'',''Laboratory Technician'',''Research
        Director'',''Manufacturing Director'')) or (Department=''Human Resources''
        and JobRole=''Human Resources''))", ''dept_role_valid'', lambda v: v >= 0.99)'
      sources:
      - start_line: 41
        end_line: 45
        file: ''
      - start_line: 101
        end_line: 106
        file: ''
      - start_line: 129
        end_line: 133
        file: ''
      uid: 9a79366d-2840-4a84-a2b8-2ca9bea3f0ab
    - text: 'Median MonthlyIncome should be non-decreasing across ordered SalarySlab
        categories [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''] to reflect consistent
        band progression. This is a dataset-level multi-column constraint over (SalarySlab,
        MonthlyIncome). Implementation idea: compute medians per ordered slab and
        assert medians[i] <= medians[i+1] for all i.'
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      - start_line: 152
        end_line: 154
        file: ''
      uid: 85d080eb-801a-4934-bc82-3e210e8b18c6
  '["Attrition","OverTime"]':
    code: []
    assumptions:
    - text: 'Attrition and OverTime are binary flags with allowed values {''Yes'',''No''},
        both 100% complete, and both OverTime categories must be present. Additionally,
        for meaningful calibration, each OverTime group should contain at least one
        record for each Attrition outcome. Example constraints: isComplete(''Attrition''),
        isComplete(''OverTime''), isContainedIn(''Attrition'', [''Yes'',''No'']),
        isContainedIn(''OverTime'', [''Yes'',''No'']), hasNumberOfRows(where=''OverTime
        = "Yes"'') > 0, hasNumberOfRows(where=''OverTime = "No"'') > 0, hasNumberOfRows(where=''OverTime
        = "Yes" AND Attrition = "Yes"'') > 0, hasNumberOfRows(where=''OverTime = "Yes"
        AND Attrition = "No"'') > 0, hasNumberOfRows(where=''OverTime = "No" AND Attrition
        = "Yes"'') > 0, hasNumberOfRows(where=''OverTime = "No" AND Attrition = "No"'')
        > 0.'
      sources:
      - start_line: 70
        end_line: 73
        file: ''
      - start_line: 159
        end_line: 163
        file: ''
      uid: c988f185-243c-4445-9c0a-965dd17acd76
    - text: 'The pair (EmpID, EmployeeNumber) identifies employees consistently (one-to-one
        mapping). At minimum, the pair should be unique across rows; ideally each
        is individually unique. Example constraints: isUnique([''EmpID'',''EmployeeNumber'']);
        and preferably isUnique([''EmpID'']) and isUnique([''EmployeeNumber'']).'
      sources:
      - start_line: 130
        end_line: 133
        file: ''
      uid: 8ee8a149-12db-4567-aa73-8d30f9231ce4
    - text: 'SalarySlab must be consistent with MonthlyIncome: (Upto 5k -> 0 < MonthlyIncome
        <= 5000), (5k-10k -> 5000 < MonthlyIncome <= 10000), (10k-15k -> 10000 < MonthlyIncome
        <= 15000), (15k+ -> MonthlyIncome > 15000). SalarySlab values are limited
        to [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'']. Example compliance constraint:
        (SalarySlab=''Upto 5k'' AND 0 < MonthlyIncome AND MonthlyIncome <= 5000) OR
        (SalarySlab=''5k-10k'' AND 5000 < MonthlyIncome AND MonthlyIncome <= 10000)
        OR (SalarySlab=''10k-15k'' AND 10000 < MonthlyIncome AND MonthlyIncome <=
        15000) OR (SalarySlab=''15k+'' AND MonthlyIncome > 15000); plus isContainedIn(''SalarySlab'',
        allowed_slabs).'
      sources:
      - start_line: 24
        end_line: 32
        file: ''
      - start_line: 34
        end_line: 35
        file: ''
      uid: 655f74d6-f7a8-479d-8bdf-8b0f81b68eb5
    - text: "Department\u2013JobRole combinations must be valid: Sales -> {'Sales\
        \ Executive','Sales Representative'}; Research & Development -> {'Research\
        \ Scientist','Laboratory Technician','Research Director','Manufacturing Director'};\
        \ Human Resources -> {'Human Resources'}. Example constraint: compliance that\
        \ (Department='Sales' AND JobRole IN {...}) OR (Department='Research & Development'\
        \ AND JobRole IN {...}) OR (Department='Human Resources' AND JobRole='Human\
        \ Resources')."
      sources:
      - start_line: 41
        end_line: 45
        file: ''
      uid: 2aefd142-4193-4611-97a9-25e84a982b37
    - text: "AgeGroup must be in the allowed set {'18-25','26-35','36-45','46-55','55+'}\
        \ and be consistent with Age: 18\u201325 -> '18-25', 26\u201335 -> '26-35',\
        \ 36\u201345 -> '36-45', 46\u201355 -> '46-55', >=55 -> '55+'. Example compliance\
        \ constraint: CASE WHEN 18 <= Age AND Age <= 25 THEN AgeGroup='18-25' WHEN\
        \ 26 <= Age AND Age <= 35 THEN AgeGroup='26-35' WHEN 36 <= Age AND Age <=\
        \ 45 THEN AgeGroup='36-45' WHEN 46 <= Age AND Age <= 55 THEN AgeGroup='46-55'\
        \ WHEN Age >= 55 THEN AgeGroup='55+' ELSE false END; plus isContainedIn('AgeGroup',\
        \ allowed_age_groups)."
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      - start_line: 92
        end_line: 100
        file: ''
      uid: a6777fc1-f081-4436-84f4-d00774fec776
    - text: 'The computation of OT-based calibration and inclusion in the linear score
        assumes both OverTime groups contribute to the attrition calibration and that
        overall attrition is not degenerate. Concretely, OverTime in {''Yes'',''No''}
        with both present, and Attrition has both ''Yes'' and ''No'' overall so the
        overall log-odds and OT multiplier are meaningful. Example constraints: hasNumberOfRows(where=''Attrition
        = "Yes"'') > 0 AND hasNumberOfRows(where=''Attrition = "No"'') > 0; hasNumberOfRows(where=''OverTime
        = "Yes"'') > 0 AND hasNumberOfRows(where=''OverTime = "No"'') > 0.'
      sources:
      - start_line: 70
        end_line: 73
        file: ''
      - start_line: 112
        end_line: 119
        file: ''
      - start_line: 159
        end_line: 163
        file: ''
      uid: 38bb23a4-6a30-44fe-aca2-079a6127b30b
