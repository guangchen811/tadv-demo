  '["TotalWorkingYears","YearsAtCompany"]':
    code:
    - suggestion: '.satisfies("TotalWorkingYears >= YearsAtCompany", "twy_ge_yac",
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: a47ccfeb-ff56-4762-8e05-fb544bf14a14
      source_assumptions:
      - 3abed281-0fc6-4551-8fa2-c7d8c2d47794
    - suggestion: '.satisfies("(Age - TotalWorkingYears) >= 15", "min_career_start_age_15",
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: d0663c73-27f1-4622-9bdd-c0a99b816b0c
      source_assumptions:
      - 584eddb2-1601-4f74-9dc0-b3822f256ccb
    - suggestion: '.satisfies("(YearsWithCurrManager <= YearsAtCompany) AND (YearsAtCompany
        > 0 OR coalesce(YearsWithCurrManager, 0) = 0)", "mgr_time_bounded_by_tenure",
        lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: a98c71ca-d694-4754-bdc4-27db3276b29c
      source_assumptions:
      - 91ad0eec-3f32-4ac5-872e-4a5bc42374cb
    - suggestion: '.satisfies("(YearsSinceLastPromotion <= YearsAtCompany) AND (YearsAtCompany
        > 0 OR coalesce(YearsSinceLastPromotion, 0) = 0)", "promo_time_bounded_by_tenure",
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 1591632f-65f7-43b6-baf0-63a9ade6a4f6
      source_assumptions:
      - 212984c4-5905-4512-84c7-aeac2dd01453
    assumptions:
    - text: 'Total tenure cannot be less than tenure at the current company: for every
        row, TotalWorkingYears >= YearsAtCompany (ensuring external_experience >=
        0 and sqrt is valid). Example Deequ: .satisfies("TotalWorkingYears >= YearsAtCompany",
        "twy_ge_yac")'
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: b7e7ca57-9d47-4b6b-a418-934f54d27109
    - text: 'Career start age must be plausible: Age - TotalWorkingYears >= 15. Example
        Deequ: .satisfies("(Age - TotalWorkingYears) >= 15", "min_career_start_age_15")'
      sources:
      - start_line: 55
        end_line: 55
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      uid: 3abed281-0fc6-4551-8fa2-c7d8c2d47794
    - text: 'Time with current manager is bounded by tenure: YearsWithCurrManager
        <= YearsAtCompany, and when YearsAtCompany == 0 then YearsWithCurrManager
        must be 0 or null (to avoid undefined division and artificial clipping). Example
        Deequ: .satisfies("(YearsWithCurrManager <= YearsAtCompany) AND (YearsAtCompany
        > 0 OR coalesce(YearsWithCurrManager,0) = 0)", "mgr_time_bounded_by_tenure")'
      sources:
      - start_line: 56
        end_line: 57
        file: ''
      uid: 584eddb2-1601-4f74-9dc0-b3822f256ccb
    - text: 'Time since last promotion is bounded by tenure: YearsSinceLastPromotion
        <= YearsAtCompany, and when YearsAtCompany == 0 then YearsSinceLastPromotion
        must be 0 or null. Example Deequ: .satisfies("(YearsSinceLastPromotion <=
        YearsAtCompany) AND (YearsAtCompany > 0 OR coalesce(YearsSinceLastPromotion,0)
        = 0)", "promo_time_bounded_by_tenure")'
      sources:
      - start_line: 84
        end_line: 87
        file: ''
      uid: 91ad0eec-3f32-4ac5-872e-4a5bc42374cb
    - text: 'SalarySlab must be from the allowed set and consistent with MonthlyIncome
        ranges: ''Upto 5k'' -> (0, 5000], ''5k-10k'' -> (5000, 10000], ''10k-15k''
        -> (10000, 15000], ''15k+'' -> (15000, inf). Example Deequ: .satisfies("(SalarySlab
        = ''Upto 5k'' AND MonthlyIncome > 0 AND MonthlyIncome <= 5000) OR (SalarySlab
        = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab
        = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab
        = ''15k+'' AND MonthlyIncome > 15000)", "salaryslab_matches_income")'
      sources:
      - start_line: 24
        end_line: 33
        file: ''
      - start_line: 34
        end_line: 34
        file: ''
      uid: 212984c4-5905-4512-84c7-aeac2dd01453
    - text: 'AgeGroup must be consistent with Age and within the allowed categories:
        18-25, 26-35, 36-45, 46-55, 55+. Example Deequ: .satisfies("(Age >= 18 AND
        Age <= 25 AND AgeGroup = ''18-25'') OR (Age >= 26 AND Age <= 35 AND AgeGroup
        = ''26-35'') OR (Age >= 36 AND Age <= 45 AND AgeGroup = ''36-45'') OR (Age
        >= 46 AND Age <= 55 AND AgeGroup = ''46-55'') OR (Age >= 55 AND AgeGroup =
        ''55+'')", "agegroup_matches_age")'
      sources:
      - start_line: 49
        end_line: 52
        file: ''
      - start_line: 99
        end_line: 100
        file: ''
      uid: b45be652-c5dd-4f2e-b133-81e07e3d2b3e
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'YearsSinceLastPromotion must be between 0 and YearsAtCompany inclusive
        for all rows (i.e., 0 <= YearsSinceLastPromotion <= YearsAtCompany). This
        keeps the no_promo_signal ratio meaningful without depending on clipping.
        Possible Deequ: .satisfies(''YearsSinceLastPromotion >= 0 AND YearsAtCompany
        >= 0 AND YearsSinceLastPromotion <= YearsAtCompany'', ''yslp_within_tenure'')'
      sources:
      - start_line: 84
        end_line: 87
        file: ''
      uid: b29d7ffb-e8a9-44ea-b86a-03842087792a
    - text: 'If YearsAtCompany = 0, then YearsSinceLastPromotion must be 0 (no tenure
        implies no time since last promotion). Possible Deequ: .satisfies(''(YearsAtCompany
        != 0) OR (YearsSinceLastPromotion = 0)'', ''no_promo_when_new'')'
      sources:
      - start_line: 84
        end_line: 87
        file: ''
      uid: 299ae66a-eeb9-4531-b83a-2dc753b6e6b6
    - text: 'TotalWorkingYears must be greater than or equal to YearsAtCompany so
        that external_experience is non-negative without relying on clipping. Possible
        Deequ: .satisfies(''TotalWorkingYears >= YearsAtCompany'', ''total_ge_company'')'
      sources:
      - start_line: 54
        end_line: 60
        file: ''
      uid: 07a981aa-3a81-4bea-9db5-c6ccc341add8
    - text: 'YearsWithCurrManager must be between 0 and YearsAtCompany inclusive,
        ensuring manager_ratio naturally lies within [0, 1] before clipping. Possible
        Deequ: .satisfies(''YearsWithCurrManager >= 0 AND YearsWithCurrManager <=
        YearsAtCompany'', ''manager_tenure_le_company'')'
      sources:
      - start_line: 56
        end_line: 57
        file: ''
      uid: c0701532-4edd-484d-be2b-4b7c34333167
  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'Manager tenure cannot exceed company tenure and cannot be negative when
        tenure exists: For rows with YearsAtCompany > 0, YearsWithCurrManager must
        be between 0 and YearsAtCompany inclusive. This can be encoded as a Deequ
        constraint, e.g., .satisfies(''YearsAtCompany <= 0 OR (YearsWithCurrManager
        >= 0 AND YearsWithCurrManager <= YearsAtCompany)'', ''manager_tenure_within_company_tenure'',
        columns=[''YearsAtCompany'',''YearsWithCurrManager'']).'
      sources:
      - start_line: 56
        end_line: 57
        file: ''
      uid: 6377e7eb-f53b-4c0a-a53d-00ce57aa35a0
    - text: 'Conditional completeness between tenure and manager tenure: If YearsAtCompany
        > 0, then YearsWithCurrManager should be non-null; if YearsAtCompany == 0,
        then YearsWithCurrManager should be either null or 0. In Deequ, this could
        be captured via .satisfies(''(YearsAtCompany > 0 AND YearsWithCurrManager
        IS NOT NULL) OR (YearsAtCompany = 0 AND (YearsWithCurrManager IS NULL OR YearsWithCurrManager
        = 0))'', ''manager_tenure_nullability_consistent'', columns=[''YearsAtCompany'',''YearsWithCurrManager'']).'
      sources:
      - start_line: 56
        end_line: 57
        file: ''
      uid: 464de765-f557-40ce-b8fb-371546470b69
    - text: 'Total working years should be at least as large as years at company:
        TotalWorkingYears >= YearsAtCompany (otherwise external_experience would be
        clipped and its sqrt would lose information). For Deequ: .satisfies(''TotalWorkingYears
        >= YearsAtCompany'', ''total_ge_company'', columns=[''TotalWorkingYears'',''YearsAtCompany'']).'
      sources:
      - start_line: 54
        end_line: 60
        file: ''
      uid: 87020b34-21d5-47d1-874e-b0f6e72032ce
    - text: 'Time since last promotion should not exceed company tenure and should
        be non-negative when tenure exists: For rows with YearsAtCompany > 0, 0 <=
        YearsSinceLastPromotion <= YearsAtCompany. For Deequ: .satisfies(''YearsAtCompany
        <= 0 OR (YearsSinceLastPromotion >= 0 AND YearsSinceLastPromotion <= YearsAtCompany)'',
        ''promotion_interval_within_tenure'', columns=[''YearsSinceLastPromotion'',''YearsAtCompany'']).'
      sources:
      - start_line: 84
        end_line: 87
        file: ''
      uid: 57df7176-5c2e-4c3b-8cfe-aeffb0775bf1
