  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'MonthlyIncome must be consistent with SalarySlab boundaries for every
        row: ''Upto 5k'' => 0 < MonthlyIncome <= 5000; ''5k-10k'' => 5000 < MonthlyIncome
        <= 10000; ''10k-15k'' => 10000 < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome
        > 15000. Deequ example: .satisfies("(SalarySlab = ''Upto 5k'' AND MonthlyIncome
        > 0 AND MonthlyIncome <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome
        > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome
        > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome
        > 15000)", ''mi_slab_alignment'', lambda v: v == 1.0)'
      sources:
      - start_line: 24
        end_line: 32
        file: ''
      uid: faaa8642-f8f2-4c24-874e-52b64616be40
    - text: 'Each record must satisfy exactly one slab predicate (no overlaps or gaps
        across slabs); i.e., the above conditional alignment holds for 100% of rows,
        ensuring exclusive coverage. Deequ: enforce the same .satisfies(...) predicate
        with assertion lambda v: v == 1.0.'
      sources:
      - start_line: 29
        end_line: 32
        file: ''
      uid: 2d25cf62-4438-4ced-b17d-f87d551c37a1
    - text: 'For every allowed SalarySlab, there must be at least one row with non-null
        MonthlyIncome and the per-slab median must be strictly positive (> 0) so that
        log(median_{i+1} / median_i) is defined. Deequ examples: for each slab s in
        [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'']: .where("SalarySlab = ''s''").hasSize(lambda
        n: n > 0) and .where("SalarySlab = ''s''").hasCompleteness(''MonthlyIncome'',
        lambda c: c == 1.0) and .where("SalarySlab = ''s''").hasMin(''MonthlyIncome'',
        lambda m: m > 0).'
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      uid: ff79a143-3dab-4bd2-a9e6-4c03772ab064
    - text: 'Median MonthlyIncome must be non-decreasing across the ordered SalarySlab
        categories [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''] so the progression_index
        (mean of log consecutive ratios) is finite and not negative due to inversions.
        Constraint idea: compute per-slab median (or approxQuantile 0.5) and assert
        median(''5k-10k'') >= median(''Upto 5k''), median(''10k-15k'') >= median(''5k-10k''),
        median(''15k+'') >= median(''10k-15k'').'
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      uid: e141020c-e8fb-477a-931e-c7e5e8b79620
    - text: "Within each Department \xD7 SalarySlab group used in the pay-band audit,\
        \ the aggregated MonthlyIncome min/median/max must respect the slab\u2019\
        s numeric bounds: for 'Upto 5k': 0 < min_income and max_income <= 5000; '5k-10k':\
        \ min_income > 5000 and max_income <= 10000; '10k-15k': min_income > 10000\
        \ and max_income <= 15000; '15k+': min_income > 15000. Deequ approach: for\
        \ each slab value, add where(\"SalarySlab = '<slab>'\") hasMin/hasMax checks\
        \ (optionally iterating per Department if you need per-department guarantees)."
