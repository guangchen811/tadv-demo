constraints:
  Age:
    code:
    - - .hasDataType('Age', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Age')
      - Valid
    - - .isPositive('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .hasDataType('AgeGroup', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .hasDataType('Attrition', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['No', 'Yes'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .hasDataType('BusinessTravel', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['TravelRarely', 'Travel_Rarely', 'Travel_Frequently',
        'Non-Travel'])
