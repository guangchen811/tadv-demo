        end_line: 148
        file: ''
      uid: 591b261b-ae9d-4ecb-9303-e13212ab78e7
    - text: "In any record included in retention_actions.csv (risk_tier = 'High'),\
        \ the pair (Department, JobRole) must be present and satisfy the Department\u2013\
        JobRole consistency rule above, since these two fields are exported together\
        \ as the action context. This can be enforced as a conditional multi-column\
        \ compliance: .addConstraint(Compliance(\"high_risk_dept_role_valid\", \"\
        (risk_tier <> 'High') OR ((Department IS NOT NULL) AND (JobRole IS NOT NULL)\
        \ AND ((JobRole = 'Manager') OR (JobRole IN ('Sales Executive','Sales Representative')\
        \ AND Department = 'Sales') OR (JobRole = 'Human Resources' AND Department\
        \ = 'Human Resources') OR (JobRole IN ('Research Scientist','Laboratory Technician','Manufacturing\
        \ Director','Healthcare Representative','Research Director') AND Department\
        \ = 'Research & Development')))\"))"
