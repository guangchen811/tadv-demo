  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'SalarySlab must be consistent with MonthlyIncome based on deterministic
        income bands: Upto 5k => MonthlyIncome <= 5000; 5k-10k => 5000 < MonthlyIncome
        <= 10000; 10k-15k => 10000 < MonthlyIncome <= 15000; 15k+ => MonthlyIncome
        > 15000. Representable as a Deequ Compliance constraint, e.g., Compliance(''slab_matches_income'',
        "CASE WHEN SalarySlab = ''Upto 5k'' THEN MonthlyIncome <= 5000 WHEN SalarySlab
        = ''5k-10k'' THEN MonthlyIncome > 5000 AND MonthlyIncome <= 10000 WHEN SalarySlab
        = ''10k-15k'' THEN MonthlyIncome > 10000 AND MonthlyIncome <= 15000 WHEN SalarySlab
        = ''15k+'' THEN MonthlyIncome > 15000 ELSE false END", 1.0).'
      sources:
      - start_line: 20
        end_line: 26
        file: ''
      - start_line: 35
        end_line: 41
        file: ''
      - start_line: 141
        end_line: 146
        file: ''
      uid: 3efe9a2a-40ea-40b5-900c-e6c166b53068
    - text: 'MonthlyIncome functionally determines SalarySlab (i.e., for any given
        MonthlyIncome value there should be exactly one SalarySlab). This can be enforced
        by the same banding compliance above or via a grouped distinct-count check:
        for each MonthlyIncome, countDistinct(SalarySlab) == 1 (in Deequ, e.g., Constraint
        on Aggregation: max(countDistinct(SalarySlab) by MonthlyIncome) == 1).'
      sources:
      - start_line: 20
        end_line: 26
        file: ''
      - start_line: 141
        end_line: 146
        file: ''
