  '["Age","AgeGroup"]':
    code: []
    assumptions:
    - text: 'Age and AgeGroup must be mutually consistent: Age determines the correct
        AgeGroup bucket and vice versa. Specifically: if 18 <= Age <= 25 then AgeGroup
        == ''18-25''; if 26 <= Age <= 35 then AgeGroup == ''26-35''; if 36 <= Age
        <= 45 then AgeGroup == ''36-45''; if 46 <= Age <= 54 then AgeGroup == ''46-55'';
        if Age >= 55 then AgeGroup == ''55+''. This can be enforced as a Deequ conditional
        constraint, for example: .satisfies("(Age >= 18 AND Age <= 25 AND AgeGroup
        = ''18-25'') OR (Age >= 26 AND Age <= 35 AND AgeGroup = ''26-35'') OR (Age
        >= 36 AND Age <= 45 AND AgeGroup = ''36-45'') OR (Age >= 46 AND Age <= 54
        AND AgeGroup = ''46-55'') OR (Age >= 55 AND AgeGroup = ''55+'')", "Age_AgeGroup_bucket_consistency")'
      sources:
