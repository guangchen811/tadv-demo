        file: ''
      uid: cc47a7f0-405b-4acd-8b47-cf9c685970b3
    - text: 'Groupwise attrition rates used for uplift require that both OverTime
        groups produce a defined mean; i.e., Attrition is observed (both ''Yes'' and
        ''No'') within each OverTime group. In Deequ, represent as: .hasCompliance(''ot_yes_has_both_labels'',
        "OverTime = ''Yes'' AND Attrition IN (''Yes'',''No'')", _ > 0.0) and .hasCompliance(''ot_no_has_both_labels'',
        "OverTime = ''No'' AND Attrition IN (''Yes'',''No'')", _ > 0.0) and optionally
        ensure at least one ''Yes'' in each group: .hasCompliance(''ot_yes_has_positive_attrition'',
        "OverTime = ''Yes'' AND Attrition = ''Yes''", _ > 0.0).'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: 0e7163b8-30e8-48bb-85bc-81cf1ce88e10
    - text: 'The rule-based action that checks (OverTime = ''Yes'' AND WorkLifeBalance
        <= 2) assumes WorkLifeBalance is numeric, non-null, and within {1,2,3,4} whenever
        OverTime data is present. In Deequ, represent as: .hasCompleteness(''WorkLifeBalance'',
        _ == 1.0) and .isContainedIn(''WorkLifeBalance'', [1,2,3,4]) and a conditional
        completeness check .hasCompliance(''wlb_present_when_used'', "(OverTime =
        ''Yes'') ==> (WorkLifeBalance IS NOT NULL)", _ == 1.0).'
      sources:
      - start_line: 123
        end_line: 131
        file: ''
      uid: 0fed2c85-450d-48f0-903a-c31e43bf5fee
    - text: 'To calibrate thresholds using overall attrition prevalence and to meaningfully
        stratify risk_tier, the dataset must contain at least one ''Yes'' and one
        ''No'' in Attrition. In Deequ, represent as: .hasNumberOfDistinctValues(''Attrition'',
        _ >= 2) and .hasCompliance(''has_positive_attrition'', "Attrition = ''Yes''",
        _ > 0.0) and .hasCompliance(''has_negative_attrition'', "Attrition = ''No''",
        _ > 0.0).'
      sources:
      - start_line: 113
        end_line: 120
        file: ''
      uid: fd62cbda-4035-474a-b871-28a4861077a4
