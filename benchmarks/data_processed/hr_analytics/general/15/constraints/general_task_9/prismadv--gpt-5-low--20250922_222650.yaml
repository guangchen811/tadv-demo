    - text: 'Both OverTime groups must have non-zero support, and the group with OverTime
        = ''No'' must contain at least one positive attrition case to avoid a degenerate
        uplift denominator. In Deequ, represent as: .hasCompliance(''ot_yes_present'',
        "OverTime = ''Yes''", _ > 0.0) and .hasCompliance(''ot_no_present'', "OverTime
        = ''No''", _ > 0.0) and .hasCompliance(''ot_no_has_positive_attrition'', "OverTime
