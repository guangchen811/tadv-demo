    assumptions:
    - text: 'Manager tenure must not exceed company tenure: for every record, YearsWithCurrManager
        <= YearsAtCompany. This prevents inflated mgr_ratio and unrealistic risk_mgr_churn.
        Deequ example: .satisfies(''YearsWithCurrManager <= YearsAtCompany'', ''mgr_leq_company'',
        lambda v: v >= 0.99)'
      sources:
      - start_line: 61
        end_line: 70
        file: ''
      uid: 41fd2521-5427-4732-a7ed-b32f83f634cb
    - text: 'Company tenure must not exceed total career tenure: YearsAtCompany <=
        TotalWorkingYears. This enforces temporal consistency across employment timelines.
        Deequ example: .satisfies(''YearsAtCompany <= TotalWorkingYears'', ''company_leq_total'',
        lambda v: v >= 0.99)'
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 140
        end_line: 146
        file: ''
      uid: f2047cec-a52c-42f1-8059-1569cc238650
    - text: 'Non-negative tenure values: both YearsWithCurrManager and TotalWorkingYears
        should be >= 0. Negative values would break ratio logic and downstream risk
        scoring. Deequ example: .satisfies(''(YearsWithCurrManager >= 0) AND (TotalWorkingYears
        >= 0)'', ''nonneg_mgr_total'', lambda v: v == 1.0)'
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 140
        end_line: 146
        file: ''
      uid: 0f8b0c66-67de-4e00-a665-2f99d2855abb
    - text: 'If YearsAtCompany == 0, then YearsWithCurrManager must be 0 (cannot have
        time with a current manager without any company tenure). Deequ example: .satisfies(''(YearsAtCompany
        != 0) OR (YearsWithCurrManager = 0)'', ''zero_company_implies_zero_mgr'',
        lambda v: v >= 0.999)'
      sources:
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 98782ad6-2bb8-4404-834c-f7d05cba6f16
    - text: 'For employees with positive company tenure (YearsAtCompany > 0), YearsWithCurrManager
        should be present (non-null) to avoid defaulting mgr_ratio to 0 and inflating
        risk_mgr_churn. Deequ example: .satisfies(''(YearsAtCompany <= 0) OR (YearsWithCurrManager
        IS NOT NULL)'', ''mgr_not_null_when_tenure_positive'', lambda v: v >= 0.99)'
      sources:
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 73b90625-9fe5-45ae-9218-9bbab90f7cf5
    - text: 'Manager tenure cannot exceed total career tenure: YearsWithCurrManager
        <= TotalWorkingYears. Ensures logical consistency across manager-specific
        and overall experience. Deequ example: .satisfies(''YearsWithCurrManager <=
        TotalWorkingYears'', ''mgr_leq_total'', lambda v: v >= 0.99)'
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 140
        end_line: 146
        file: ''
      uid: 830742c3-4cf5-4b91-937c-ff0494b7e6ac
  '["YearsAtCompany","YearsInCurrentRole"]':
    code: []
    assumptions:
    - text: 'For every record with positive tenure, YearsInCurrentRole must not exceed
        YearsAtCompany and must be non-negative, i.e., 0 <= YearsInCurrentRole <=
        YearsAtCompany when YearsAtCompany > 0. Deequ example: .satisfies("(YearsAtCompany
        > 0 AND YearsInCurrentRole >= 0 AND YearsInCurrentRole <= YearsAtCompany)
        OR YearsAtCompany <= 0", "role_years_within_tenure")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: b10e6b43-1c17-4d7c-b693-baf4c3495a9e
    - text: 'Zero company tenure implies zero years in current role (and conversely,
        any positive YearsInCurrentRole implies YearsAtCompany > 0). Deequ example:
        .satisfies("(YearsAtCompany = 0 AND YearsInCurrentRole = 0) OR (YearsAtCompany
        > 0 AND YearsInCurrentRole >= 0)", "zero_tenure_zero_role")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: 5ac4b886-9b2e-489f-b494-1c93c8289e86
    - text: 'The ratio YearsInCurrentRole / YearsAtCompany must be in [0, 1] whenever
        YearsAtCompany > 0. Deequ example: .satisfies("CASE WHEN YearsAtCompany >
        0 THEN (YearsInCurrentRole / YearsAtCompany) BETWEEN 0 AND 1 ELSE true END",
        "role_ratio_bounds")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: 052ae1c4-b9af-4f3c-bd95-131dc776ef9b
    - text: 'Time with current manager cannot exceed overall company tenure: YearsWithCurrManager
        <= YearsAtCompany (and both non-negative). Deequ example: .satisfies("YearsAtCompany
        >= 0 AND YearsWithCurrManager >= 0 AND YearsWithCurrManager <= YearsAtCompany",
        "manager_time_within_tenure")'
      sources:
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 55883e8c-eb40-4f90-b653-c545966646a7
  '["YearsAtCompany","YearsInCurrentRole","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'YearsInCurrentRole must not exceed YearsAtCompany, and if YearsAtCompany
        == 0 then YearsInCurrentRole must be 0. This reflects that time in current
        role cannot be greater than total tenure and prevents undefined ratios. Deequ
        example: .satisfies("YearsInCurrentRole <= YearsAtCompany AND (YearsAtCompany
        != 0 OR YearsInCurrentRole == 0)", "role_vs_company_consistency")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      uid: 219a95f8-aa32-439b-af5f-ce8536be289f
    - text: 'YearsSinceLastPromotion should not exceed YearsAtCompany; for new joiners
        (YearsAtCompany == 0), YearsSinceLastPromotion should be 0. This keeps promotion
        lag consistent with tenure at the company. Deequ example: .satisfies("(YearsSinceLastPromotion
        <= YearsAtCompany) AND (YearsAtCompany != 0 OR YearsSinceLastPromotion ==
        0)", "promo_lag_within_tenure")'
      sources:
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: d72518c1-6635-44cf-9fce-f32fae82a130
    - text: 'All three tenure-related fields (YearsAtCompany, YearsInCurrentRole,
        YearsSinceLastPromotion) must be present and non-negative integers. This ensures
        numeric operations and derived ratios/scaled risks are well-defined. Deequ
        example: .satisfies("(YearsAtCompany >= 0) AND (YearsInCurrentRole >= 0) AND
        (YearsSinceLastPromotion >= 0)", "tenure_fields_nonnegative")'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 140
        end_line: 146
        file: ''
      uid: e076671c-3495-4abe-8d58-91903efae87e
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'Both ''YearsAtCompany'' and ''YearsSinceLastPromotion'' must be numeric,
        non-null, and non-negative integers across all rows. We could represent this
        as Deequ constraints like: .isComplete(''YearsAtCompany'').isNonNegative(''YearsAtCompany'').hasDataType(''YearsAtCompany'',
        ConstrainableDataTypes.Integral) and similarly for ''YearsSinceLastPromotion''.'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 142
        end_line: 144
        file: ''
      uid: e6ff98ab-3cea-4a48-93bd-0b346e584f04
    - text: 'For every row, ''YearsSinceLastPromotion'' must be less than or equal
        to ''YearsAtCompany'' (you cannot have a promotion at the company before or
        longer ago than total tenure at the company). This can be expressed as a Deequ
        row-level compliance constraint: .where("YearsSinceLastPromotion <= YearsAtCompany").'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 6f56755f-2114-44d4-94d3-458405a05c34
    - text: 'If ''YearsAtCompany'' equals 0, then ''YearsSinceLastPromotion'' must
        also equal 0 (no time with the company implies no company promotion history).
        This can be represented as a conditional compliance: .where("(YearsAtCompany
        > 0) OR (YearsSinceLastPromotion = 0)").'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 65748604-4d26-4e5b-a705-e3894475920a
    - text: '''YearsAtCompany'' should not exceed ''TotalWorkingYears'', and ''YearsSinceLastPromotion''
        should not exceed ''TotalWorkingYears'' (company tenure and company promotion
        lag cannot exceed total career years). This can be expressed with two compliance
        constraints: .where("YearsAtCompany <= TotalWorkingYears") and .where("YearsSinceLastPromotion
        <= TotalWorkingYears").'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 142
        end_line: 144
        file: ''
      uid: 472c5306-7bd2-47a7-9901-ebefe109466d
  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'Manager tenure should never exceed company tenure: YearsWithCurrManager
        <= YearsAtCompany and both should be >= 0. This keeps mgr_ratio within [0,1]
        as intended. Deequ example: .satisfies("YearsWithCurrManager >= 0 AND YearsAtCompany
        >= 0 AND YearsWithCurrManager <= YearsAtCompany", "mgr_leq_company")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 19
        end_line: 26
        file: ''
      uid: 4523f574-8e89-4e1b-a981-c374eb8e2ad2
    - text: 'If YearsAtCompany == 0, then YearsWithCurrManager must be 0 (no time
        with a manager without any company tenure). Deequ example: .satisfies("CASE
        WHEN YearsAtCompany = 0 THEN coalesce(YearsWithCurrManager, 0) = 0 ELSE true
        END", "zero_tenure_zero_mgr")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 452ee8bc-9ea8-4291-b9cd-45db06d8c29c
    - text: 'For records with positive company tenure, the manager tenure ratio should
        be within [0,1]: 0 <= YearsWithCurrManager / YearsAtCompany <= 1. Deequ example:
        .satisfies("(YearsAtCompany > 0) => (YearsWithCurrManager >= 0 AND YearsWithCurrManager
        <= YearsAtCompany)", "mgr_ratio_bounds")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 178d00ba-2ba6-4b8e-a6fc-7e65a96e94ae
    - text: 'Conditional completeness: Among rows where YearsAtCompany > 0, at least
        95% should have non-null YearsWithCurrManager (so mgr_ratio is informative).
        Deequ example: .compliance("YearsAtCompany <= 0 OR YearsWithCurrManager IS
        NOT NULL", 0.95, "mgr_present_when_tenure_positive")'
      sources:
      - start_line: 61
        end_line: 63
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 0a5b9a0b-e3ef-4e88-a5f7-29178fade4cf
