  '["JobSatisfaction","SalarySlab"]':
    code: []
    assumptions:
    - text: 'SalarySlab must be one of {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}
        and deterministically map to risk_income via the specified weights: ''Upto
        5k''->1.0, ''5k-10k''->0.6, ''10k-15k''->0.3, ''15k+''->0.0. This can be enforced
        with a multi-column constraint such as: .satisfies("(SalarySlab = ''Upto 5k''
        AND risk_income = 1.0) OR (SalarySlab = ''5k-10k'' AND risk_income = 0.6)
        OR (SalarySlab = ''10k-15k'' AND risk_income = 0.3) OR (SalarySlab = ''15k+''
        AND risk_income = 0.0)", ''salaryslab_to_risk_income_mapping'', _ >= 1.0).'
      sources:
      - start_line: 35
        end_line: 41
        file: ''
      uid: 0a501a95-baba-4747-8ba8-33c0930cf6c8
    - text: 'JobSatisfaction must be numeric and in {1,2,3,4}, and risk_js must equal
        the clipped linear transform of JobSatisfaction: risk_js = clip((4 - JobSatisfaction)/3.0,
        0.0, 1.0). This can be enforced with multi-column constraints such as: .satisfies("JobSatisfaction
        IN (1,2,3,4)", ''js_domain'', _ >= 1.0) and .satisfies("risk_js = least(greatest((4
        - JobSatisfaction)/3.0, 0.0), 1.0)", ''risk_js_formula'', _ >= 0.999).'
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      - start_line: 56
        end_line: 57
        file: ''
      uid: 23b785d5-3482-4b04-b0ca-3485311c340a
    - text: 'If a row is High risk and has low pay and low satisfaction, the recommended_action
        must be ''CompensationReview'': NOT (risk_tier = ''High'' AND risk_income
        >= 0.8 AND JobSatisfaction <= 2) OR recommended_action = ''CompensationReview''.
        Since risk_income is derived from SalarySlab, this effectively binds SalarySlab=''Upto
        5k'' with JobSatisfaction<=2 under High risk to the specified action.'
      sources:
      - start_line: 35
        end_line: 41
        file: ''
      - start_line: 117
        end_line: 137
        file: ''
      uid: 3e460f33-f9e2-474a-95ea-288970280d1b
    - text: 'The overall risk_score must equal the clipped weighted sum of component
        risks, tying SalarySlab and JobSatisfaction (via risk_income and risk_js)
        with other contributors: risk_score = clip(0.25*risk_income + 0.15*risk_ot
        + 0.10*risk_wlb + 0.12*risk_js + 0.10*risk_role_stagnation + 0.10*risk_promo_lag
        + 0.08*risk_mgr_churn + 0.05*risk_age_band + 0.05*risk_commute, 0.0, 1.0).
        This can be enforced with a multi-column constraint: .satisfies("risk_score
        = least(greatest(0.25*risk_income + 0.15*risk_ot + 0.10*risk_wlb + 0.12*risk_js
        + 0.10*risk_role_stagnation + 0.10*risk_promo_lag + 0.08*risk_mgr_churn +
        0.05*risk_age_band + 0.05*risk_commute, 0.0), 1.0)", ''risk_score_composition'',
        _ >= 0.999).'
      sources:
      - start_line: 86
        end_line: 107
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: ea3b3bfe-d6de-4e1f-90a2-145ca99360a1
    - text: 'Rows included in the output must have both SalarySlab and JobSatisfaction
        present (non-null) since they are selected into scores_df for persistence
        and downstream actions depend on them. Enforce joint non-nullness via a multi-column
        predicate: .satisfies("SalarySlab IS NOT NULL AND JobSatisfaction IS NOT NULL",
        ''salary_js_completeness'', _ >= 1.0).'
      sources:
      - start_line: 141
        end_line: 146
        file: ''
      - start_line: 153
        end_line: 154
        file: ''
      uid: 7f25327f-52a2-4ebb-9a0a-31bfeb4b25ec
