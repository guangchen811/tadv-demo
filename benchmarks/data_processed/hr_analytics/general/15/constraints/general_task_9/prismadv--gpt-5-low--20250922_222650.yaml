  '["Department","JobRole"]':
    code: []
    assumptions:
    - text: 'Department must be consistent with JobRole for all non-generic roles:
        if JobRole in {''Sales Executive'',''Sales Representative''} then Department
        must be ''Sales''; if JobRole == ''Human Resources'' then Department must
        be ''Human Resources''; if JobRole in {''Research Scientist'',''Laboratory
        Technician'',''Manufacturing Director'',''Healthcare Representative'',''Research
        Director''} then Department must be ''Research & Development''. Rows with
        JobRole == ''Manager'' are exempt (managerial roles may exist in multiple
        departments). This can be represented as a Deequ compliance constraint like:
        .addConstraint(Compliance("dept_role_alignment", "(JobRole = ''Manager'')
        OR (JobRole IN (''Sales Executive'',''Sales Representative'') AND Department
        = ''Sales'') OR (JobRole = ''Human Resources'' AND Department = ''Human Resources'')
        OR (JobRole IN (''Research Scientist'',''Laboratory Technician'',''Manufacturing
        Director'',''Healthcare Representative'',''Research Director'') AND Department
        = ''Research & Development'')"))'
      sources:
      - start_line: 141
        end_line: 148
        file: ''
      uid: ef115f05-dbb2-4cb2-a6dd-0ca2baa914b6
    - text: 'Only allowed (Department, JobRole) pairs should appear: {(''Sales'',''Sales
        Executive''), (''Sales'',''Sales Representative''), (''Human Resources'',''Human
        Resources''), (''Research & Development'',''Research Scientist''), (''Research
        & Development'',''Laboratory Technician''), (''Research & Development'',''Manufacturing
        Director''), (''Research & Development'',''Healthcare Representative''), (''Research
        & Development'',''Research Director'')} plus any pair where JobRole == ''Manager''.
        This can be checked in Deequ via a tuple IN-list compliance rule: .addConstraint(Compliance("dept_role_allowed_pairs",
        "(JobRole = ''Manager'') OR (Department, JobRole) IN ((''Sales'',''Sales Executive''),(''Sales'',''Sales
        Representative''),(''Human Resources'',''Human Resources''),(''Research &
        Development'',''Research Scientist''),(''Research & Development'',''Laboratory
        Technician''),(''Research & Development'',''Manufacturing Director''),(''Research
        & Development'',''Healthcare Representative''),(''Research & Development'',''Research
        Director''))"))'
      sources:
