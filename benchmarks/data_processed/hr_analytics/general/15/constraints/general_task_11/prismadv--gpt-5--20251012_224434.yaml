  '["AgeGroup","BusinessTravel","MonthlyIncome","PercentSalaryHike","PerformanceRating","SalarySlab"]':
    code: []
    assumptions:
    - text: 'PercentSalaryHike must respect the performance guideline implied by PerformanceRating:
        if PerformanceRating = 3 then PercentSalaryHike <= 12; if PerformanceRating
        = 4 then PercentSalaryHike <= 18. This prevents downstream NaNs (from unmapped
        ratings) and ensures the requested hike does not exceed the guideline that
        will be applied in the min(). Deequ example: .satisfies("CASE WHEN PerformanceRating
        = 3 THEN PercentSalaryHike <= 12 WHEN PerformanceRating = 4 THEN PercentSalaryHike
        <= 18 ELSE false END", "hike_within_rating_guideline")'
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      uid: 0d7a4bfb-e012-4361-9be2-88d0a742a851
    - text: 'SalarySlab must be one of {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}
        and the proposed_merit_pct must be less than or equal to the corresponding
        slab cap percent. Deequ example: .satisfies("proposed_merit_pct <= CASE WHEN
        SalarySlab = ''Upto 5k'' THEN 0.20 WHEN SalarySlab = ''5k-10k'' THEN 0.18
        WHEN SalarySlab = ''10k-15k'' THEN 0.15 WHEN SalarySlab = ''15k+'' THEN 0.12
        END", "proposed_merit_pct_not_exceed_slab_cap")'
      sources:
      - start_line: 31
        end_line: 32
        file: ''
      - start_line: 42
        end_line: 42
        file: ''
      uid: e012602d-8a25-4d59-8c87-145e3417c3dd
    - text: 'Proposed merit amount must be bounded by MonthlyIncome and the SalarySlab
        cap: 0 <= proposed_merit_amount <= MonthlyIncome * slab_cap(SalarySlab). Deequ
        example: .satisfies("proposed_merit_amount >= 0 AND proposed_merit_amount
        <= MonthlyIncome * (CASE WHEN SalarySlab = ''Upto 5k'' THEN 0.20 WHEN SalarySlab
        = ''5k-10k'' THEN 0.18 WHEN SalarySlab = ''10k-15k'' THEN 0.15 WHEN SalarySlab
        = ''15k+'' THEN 0.12 END)", "proposed_merit_amount_bounded_by_income_and_slab")'
      sources:
      - start_line: 31
        end_line: 32
        file: ''
      - start_line: 42
        end_line: 43
        file: ''
      uid: bb077be2-9bac-4f54-b4a0-2f7c12df5d1b
    - text: 'After normalization, BusinessTravel must be in {''Travel_Frequently'',''Travel_Rarely'',''Non-Travel''}
        and travel_multiplier must match the category: 1.01 for ''Travel_Frequently''
        and 1.00 for ''Travel_Rarely'' or ''Non-Travel''. Deequ example: .satisfies("CASE
        WHEN BusinessTravel = ''Travel_Frequently'' THEN travel_multiplier = 1.01
        WHEN BusinessTravel IN (''Travel_Rarely'',''Non-Travel'') THEN travel_multiplier
        = 1.00 ELSE false END", "business_travel_multiplier_consistency")'
      sources:
      - start_line: 18
        end_line: 24
        file: ''
      - start_line: 36
        end_line: 37
        file: ''
      uid: 80439f82-58df-4af6-8927-f9f332d8ecf3
    - text: 'AgeGroup must drive age_weight deterministically: if AgeGroup = ''26-35''
        then age_weight = 1.02, else age_weight = 1.00. Deequ example: .satisfies("CASE
        WHEN AgeGroup = ''26-35'' THEN age_weight = 1.02 ELSE age_weight = 1.00 END",
        "age_weight_consistency")'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      uid: 462715b5-83a0-4962-9d0a-041533caf638
    - text: 'Compression amount depends jointly on SalarySlab and MonthlyIncome: if
        SalarySlab in (''Upto 5k'',''5k-10k'') then compression_amount = round(MonthlyIncome
        * 0.003, 2) else compression_amount = 0.00. Deequ example: .satisfies("CASE
        WHEN SalarySlab IN (''Upto 5k'',''5k-10k'') THEN compression_amount = round(MonthlyIncome
        * 0.003, 2) ELSE compression_amount = 0.00 END", "compression_amount_rule")'
      sources:
      - start_line: 59
        end_line: 61
        file: ''
      uid: 6de1c809-3046-4f5a-9d34-9aed152251e1
    - text: 'Emerging talent supplement depends jointly on AgeGroup and MonthlyIncome:
        if AgeGroup = ''26-35'' then emerging_talent_amount = round(MonthlyIncome
        * 0.005, 2) else emerging_talent_amount = 0.00. Deequ example: .satisfies("CASE
        WHEN AgeGroup = ''26-35'' THEN emerging_talent_amount = round(MonthlyIncome
        * 0.005, 2) ELSE emerging_talent_amount = 0.00 END", "emerging_talent_amount_rule")'
      sources:
      - start_line: 63
        end_line: 65
        file: ''
      uid: 33b86d53-08e6-41b8-9092-70aceba7d3c3
    - text: 'Promotion raise percent must align with multi-column eligibility logic:
        if (PerformanceRating = 4 AND YearsInCurrentRole >= 2 AND YearsSinceLastPromotion
        >= 1 AND JobLevel < 5) then promotion_raise_pct = CASE JobLevel WHEN 1 THEN
        0.10 WHEN 2 THEN 0.08 WHEN 3 THEN 0.07 WHEN 4 THEN 0.06 WHEN 5 THEN 0.00 END
        else promotion_raise_pct = 0.0. Deequ example: .satisfies("CASE WHEN PerformanceRating
        = 4 AND YearsInCurrentRole >= 2 AND YearsSinceLastPromotion >= 1 AND JobLevel
        < 5 THEN (promotion_raise_pct IN (0.10,0.08,0.07,0.06)) ELSE promotion_raise_pct
        = 0.0 END", "promotion_raise_pct_consistent_with_eligibility")'
      sources:
      - start_line: 46
        end_line: 56
        file: ''
      uid: 0c556af6-1740-4670-b3e0-cec8115f01da
    - text: 'Department-level total_budget must equal the sum of the component pools:
        total_budget = merit_pool + promotion_pool + compression_pool + emerging_talent_pool.
        Deequ example: .satisfies("total_budget = merit_pool + promotion_pool + compression_pool
        + emerging_talent_pool", "department_total_budget_additivity")'
      sources:
      - start_line: 68
        end_line: 75
        file: ''
      - start_line: 77
        end_line: 78
        file: ''
      uid: 24f97f4c-98a8-4ac7-8825-238b42c8d71b
  '["AgeGroup","MonthlyIncome"]':
    code: []
    assumptions:
    - text: 'age_weight is fully determined by AgeGroup: age_weight = 1.02 when AgeGroup
        = ''26-35'', else age_weight = 1.00. Constraint example: .satisfies("(AgeGroup
        = ''26-35'' AND age_weight = 1.02) OR (AgeGroup <> ''26-35'' AND age_weight
        = 1.00)", ''age_weight_by_agegroup'').'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      uid: 55d385b0-c1fe-4aaf-8658-47ac5c57f359
    - text: 'emerging_talent_supp_pct is fully determined by AgeGroup: emerging_talent_supp_pct
        = 0.005 when AgeGroup = ''26-35'', else 0.0. Constraint example: .satisfies("(AgeGroup
        = ''26-35'' AND emerging_talent_supp_pct = 0.005) OR (AgeGroup <> ''26-35''
        AND emerging_talent_supp_pct = 0.0)", ''emerging_pct_by_agegroup'').'
      sources:
      - start_line: 63
        end_line: 64
        file: ''
      uid: afde8587-4a86-4c34-9a3f-ca48297d25e5
    - text: 'emerging_talent_amount must equal MonthlyIncome * emerging_talent_supp_pct
        (rounded to 2 decimals). Constraint example: .satisfies("abs(emerging_talent_amount
        - round(MonthlyIncome * emerging_talent_supp_pct, 2)) < 0.005", ''emerging_amount_matches'').'
      sources:
      - start_line: 65
        end_line: 65
        file: ''
      uid: a69136c8-4a57-433d-a446-a0bbc4a96af4
    - text: 'proposed_merit_amount must equal MonthlyIncome * proposed_merit_pct (rounded
        to 2 decimals). Constraint example: .satisfies("abs(proposed_merit_amount
        - round(MonthlyIncome * proposed_merit_pct, 2)) < 0.005", ''merit_amount_matches'').'
      sources:
      - start_line: 43
        end_line: 43
        file: ''
      uid: ce17fb3a-b6dd-4ed3-805c-383f7b9f46b1
    - text: 'promotion_amount must equal MonthlyIncome * promotion_raise_pct (rounded
        to 2 decimals). Since promotion_raise_pct is set to 0.0 for ineligible rows,
        ineligible employees must have promotion_amount = 0. Constraint example: .satisfies("abs(promotion_amount
        - round(MonthlyIncome * promotion_raise_pct, 2)) < 0.005", ''promotion_amount_matches'').'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: 223fd31c-2a8b-4dbb-86da-727ad42b654b
    - text: 'compression_pool_share is fully determined by SalarySlab: compression_pool_share
        = 0.003 when SalarySlab in (''Upto 5k'',''5k-10k''), else 0.0. Constraint
        example: .satisfies("((SalarySlab IN (''Upto 5k'',''5k-10k'')) AND compression_pool_share
        = 0.003) OR ((SalarySlab NOT IN (''Upto 5k'',''5k-10k'')) AND compression_pool_share
        = 0.0)", ''compression_share_by_slab'').'
      sources:
      - start_line: 58
        end_line: 60
        file: ''
      uid: 62c4e356-fffd-405a-8871-939097403ec7
    - text: 'compression_amount must equal MonthlyIncome * compression_pool_share
        (rounded to 2 decimals). Constraint example: .satisfies("abs(compression_amount
        - round(MonthlyIncome * compression_pool_share, 2)) < 0.005", ''compression_amount_matches'').'
      sources:
      - start_line: 61
        end_line: 61
        file: ''
      uid: 88a18c8f-472e-4835-9f07-df648ce12a65
    - text: 'proposed_merit_pct must be capped by slab_cap_pct, i.e., proposed_merit_pct
        <= slab_cap_pct and equals min(adjusted_merit_pct, slab_cap_pct) where adjusted_merit_pct
        = min(perf_guideline_pct, PercentSalaryHike/100.0) * age_weight * travel_multiplier.
        Constraint example: .satisfies("proposed_merit_pct <= slab_cap_pct", ''merit_pct_capped'').'
      sources:
      - start_line: 35
        end_line: 37
        file: ''
      - start_line: 40
        end_line: 42
        file: ''
      uid: 867278a1-ca0b-4d22-8cc3-288263fe27b8
    - text: 'For AgeGroup = ''26-35'', emerging_talent_amount must equal round(0.005
        * MonthlyIncome, 2); for other AgeGroup values, emerging_talent_amount must
        equal 0.00. Constraint example: .satisfies("(AgeGroup = ''26-35'' AND abs(emerging_talent_amount
        - round(0.005 * MonthlyIncome, 2)) < 0.005) OR (AgeGroup <> ''26-35'' AND
        emerging_talent_amount = 0.0)", ''emerging_amount_by_agegroup'').'
      sources:
      - start_line: 63
        end_line: 65
        file: ''
      uid: 1c7145ab-bc33-425a-b3b8-6279dd588b99
    - text: 'Department-level aggregates must match employee-level sums: for each
        Department, base_pay = sum(MonthlyIncome), merit_pool = sum(proposed_merit_amount),
        promotion_pool = sum(promotion_amount), compression_pool = sum(compression_amount),
        emerging_talent_pool = sum(emerging_talent_amount); headcount = count(EmpID).
        This can be checked by recomputing grouped sums from the detail and comparing
        to agg.'
      sources:
      - start_line: 68
        end_line: 75
        file: ''
      uid: 7f73fc11-3b6e-4294-bb6e-63e3665f130e
    - text: 'In the aggregated output, total_budget must equal the sum of component
        pools: total_budget = merit_pool + promotion_pool + compression_pool + emerging_talent_pool.
        Constraint example: .satisfies("abs(total_budget - (merit_pool + promotion_pool
        + compression_pool + emerging_talent_pool)) < 0.005", ''total_budget_sum_check'').'
      sources:
      - start_line: 77
        end_line: 78
        file: ''
      uid: d2ee4d4b-f4a2-400d-a422-716b410a1455
    - text: 'Given that all employee-level amounts are computed as percentages of
        MonthlyIncome and each percentage is non-negative, the department total_budget
        should not exceed base_pay: total_budget <= base_pay for every Department.
        Constraint example: .satisfies("total_budget <= base_pay", ''budget_within_base_pay'').'
      sources:
      - start_line: 40
        end_line: 42
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 58
        end_line: 65
        file: ''
      - start_line: 68
        end_line: 78
        file: ''
      uid: 63ccc09a-5d74-4ad0-a2cc-fde8382e3094
