      uid: 257e9dd0-982d-40e9-8986-ea51f7d37f2c
    - text: 'PercentSalaryHike must be numeric (parsable to a number) to allow division
        by 100.0. We could represent this as a Deequ constraint like: .satisfies("CASE
        WHEN CAST(PercentSalaryHike AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Numeric
