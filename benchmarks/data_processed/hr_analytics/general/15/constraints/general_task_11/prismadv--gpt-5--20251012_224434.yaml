    assumptions:
    - text: 'MonthlyIncome must be consistent with the SalarySlab banding: SalarySlab
        = ''Upto 5k'' => MonthlyIncome <= 5000; SalarySlab = ''5k-10k'' => 5000 <
        MonthlyIncome <= 10000; SalarySlab = ''10k-15k'' => 10000 < MonthlyIncome
        <= 15000; SalarySlab = ''15k+'' => MonthlyIncome > 15000. This can be enforced
        with a Deequ check like: .satisfies("CASE WHEN SalarySlab = ''Upto 5k'' THEN
        MonthlyIncome <= 5000 WHEN SalarySlab = ''5k-10k'' THEN MonthlyIncome > 5000
        AND MonthlyIncome <= 10000 WHEN SalarySlab = ''10k-15k'' THEN MonthlyIncome
        > 10000 AND MonthlyIncome <= 15000 WHEN SalarySlab = ''15k+'' THEN MonthlyIncome
        > 15000 ELSE false END", ''salary_slab_matches_income'', assertion=_.equals(1.0))'
