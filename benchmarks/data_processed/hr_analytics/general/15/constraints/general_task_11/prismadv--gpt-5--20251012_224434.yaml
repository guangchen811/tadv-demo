  '["Department","EmpID"]':
    code: []
    assumptions:
    - text: 'The (Department, EmpID) pair must be unique across the dataset (no duplicate
        EmpID entries within the same Department), and EmpID must be present whenever
        Department is present. This guarantees that department headcount computed
        via count(EmpID) reflects the true number of employee rows in each Department.
        Deequ-style representation: .isUnique(["Department", "EmpID"]) together with
        .where("Department IS NOT NULL").hasCompleteness("EmpID", 1.0).'
      sources:
      - start_line: 68
        end_line: 75
        file: ''
      uid: a01d457a-0500-42ee-ac10-5c6db944855f
    - text: 'Each EmpID belongs to exactly one Department (functional dependency EmpID
        -> Department). No EmpID should appear under multiple Department values; otherwise,
        department-level headcounts and budget sums would be double-counted. Deequ-style
        representation: a functional dependency check such as hasFunctionalDependency("EmpID",
        "Department") with zero allowed violations (or equivalently, groupBy("EmpID").agg(countDistinct("Department")
        == 1)).'
      sources:
