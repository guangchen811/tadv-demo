      uid: 30b57965-89a7-4fc3-b635-470db80e30ec
    - text: 'EmployeeNumber and EmpID should have a one-to-one mapping (each EmployeeNumber
        corresponds to exactly one EmpID and vice versa), ensuring consistent employee
        identity across outputs that include both identifiers. Deequ-style representation:
        .isUnique(["EmployeeNumber"]) and .isUnique(["EmpID"]) plus functional dependencies
        both ways (EmployeeNumber -> EmpID and EmpID -> EmployeeNumber).'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 85
