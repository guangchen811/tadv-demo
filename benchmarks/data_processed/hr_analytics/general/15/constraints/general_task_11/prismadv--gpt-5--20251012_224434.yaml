  '["Department","MonthlyIncome"]':
    code: []
    assumptions:
    - text: 'For each employee row, proposed_merit_amount must equal round(MonthlyIncome
        * proposed_merit_pct, 2). Deequ: .satisfies("proposed_merit_amount = round(MonthlyIncome
        * proposed_merit_pct, 2)", "merit_amount_formula")'
      sources:
      - start_line: 43
        end_line: 43
        file: ''
      uid: 474d17ff-99e1-45df-802e-f9a4090e2086
    - text: 'For each employee row, promotion_amount must equal round(MonthlyIncome
        * promotion_raise_pct, 2). Deequ: .satisfies("promotion_amount = round(MonthlyIncome
        * promotion_raise_pct, 2)", "promotion_amount_formula")'
      sources:
      - start_line: 56
        end_line: 56
        file: ''
      uid: b21d7261-3a9d-439b-905d-e6b00ba0e08b
    - text: 'For each employee row, compression_amount must equal round(MonthlyIncome
        * compression_pool_share, 2). Deequ: .satisfies("compression_amount = round(MonthlyIncome
        * compression_pool_share, 2)", "compression_amount_formula")'
      sources:
      - start_line: 58
        end_line: 61
        file: ''
      uid: b8c27230-a23d-4466-8d2e-50904c487e28
    - text: 'For each employee row, emerging_talent_amount must equal round(MonthlyIncome
        * emerging_talent_supp_pct, 2). Deequ: .satisfies("emerging_talent_amount
        = round(MonthlyIncome * emerging_talent_supp_pct, 2)", "emerging_talent_amount_formula")'
      sources:
      - start_line: 63
        end_line: 65
        file: ''
      uid: c36454ef-c503-4a21-8864-da98c352ae51
    - text: 'Each employee''s proposed_merit_pct must be less than or equal to slab_cap_pct
        (it is the min of adjusted_merit_pct and slab_cap_pct). Deequ: .satisfies("proposed_merit_pct
        <= slab_cap_pct", "merit_pct_capped_by_slab")'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 39
        end_line: 42
        file: ''
      uid: 81741478-0180-45ce-a54d-9895ee9def01
    - text: 'travel_multiplier must be consistent with normalized BusinessTravel values:
        ''Travel_Frequently'' -> 1.01, ''Travel_Rarely'' -> 1.00, ''Non-Travel'' ->
        1.00. Deequ: .satisfies("CASE WHEN BusinessTravel = ''Travel_Frequently''
        THEN travel_multiplier = 1.01 WHEN BusinessTravel = ''Travel_Rarely'' THEN
        travel_multiplier = 1.00 WHEN BusinessTravel = ''Non-Travel'' THEN travel_multiplier
        = 1.00 ELSE travel_multiplier IS NULL END", "travel_multiplier_mapping")'
      sources:
      - start_line: 17
        end_line: 24
        file: ''
      - start_line: 36
        end_line: 37
        file: ''
      uid: 003744c9-417a-42ca-8e99-4568d776a6c5
    - text: 'age_weight must be consistent with AgeGroup: if AgeGroup = ''26-35''
        then age_weight = 1.02, else 1.00. Deequ: .satisfies("(AgeGroup = ''26-35''
        AND age_weight = 1.02) OR (AgeGroup <> ''26-35'' AND age_weight = 1.00)",
        "age_weight_mapping")'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      uid: 8f898bf5-5eea-47b6-9a0c-e8209ca1e7b1
    - text: 'slab_cap_pct must be consistent with SalarySlab mapping: ''Upto 5k''
        -> 0.20, ''5k-10k'' -> 0.18, ''10k-15k'' -> 0.15, ''15k+'' -> 0.12. Deequ:
        .satisfies("CASE SalarySlab WHEN ''Upto 5k'' THEN slab_cap_pct = 0.20 WHEN
        ''5k-10k'' THEN slab_cap_pct = 0.18 WHEN ''10k-15k'' THEN slab_cap_pct = 0.15
        WHEN ''15k+'' THEN slab_cap_pct = 0.12 ELSE slab_cap_pct IS NULL END", "slab_cap_mapping")'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      uid: 0e4915bf-e4f5-49f2-9c86-d2e280e3d51c
    - text: 'compression_pool_share must be consistent with SalarySlab: if SalarySlab
        in (''Upto 5k'',''5k-10k'') then 0.003 else 0.0. Deequ: .satisfies("(SalarySlab
        IN (''Upto 5k'',''5k-10k'') AND compression_pool_share = 0.003) OR (SalarySlab
        NOT IN (''Upto 5k'',''5k-10k'') AND compression_pool_share = 0.0)", "compression_share_mapping")'
      sources:
      - start_line: 58
        end_line: 61
        file: ''
      uid: 3d76dfc1-c81a-4fca-96dc-994e366a9c6d
    - text: 'promotion_eligible must reflect the rule: PerformanceRating = 4 AND YearsInCurrentRole
        >= 2 AND YearsSinceLastPromotion >= 1 AND JobLevel < 5. Deequ: .satisfies("promotion_eligible
        = (PerformanceRating = 4 AND YearsInCurrentRole >= 2 AND YearsSinceLastPromotion
        >= 1 AND JobLevel < 5)", "promotion_eligibility_rule")'
      sources:
      - start_line: 46
        end_line: 52
        file: ''
      uid: 5776649f-d2a6-410b-b54f-44db840a31b8
    - text: 'promotion_raise_pct must be 0.0 when promotion_eligible is false; when
        true, it must match the JobLevel mapping (1->0.10, 2->0.08, 3->0.07, 4->0.06,
        5->0.0). Deequ: .satisfies("(NOT promotion_eligible AND promotion_raise_pct
        = 0.0) OR (promotion_eligible AND ((JobLevel = 1 AND promotion_raise_pct =
        0.10) OR (JobLevel = 2 AND promotion_raise_pct = 0.08) OR (JobLevel = 3 AND
        promotion_raise_pct = 0.07) OR (JobLevel = 4 AND promotion_raise_pct = 0.06)
        OR (JobLevel = 5 AND promotion_raise_pct = 0.0)))", "promotion_raise_rule")'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      uid: 44d4dd2c-9bb3-4ecd-9123-b3584731fa9a
    - text: 'In the department-level aggregation, for each Department the aggregates
        must equal the sums of the corresponding employee-level columns: base_pay
        = SUM(MonthlyIncome), merit_pool = SUM(proposed_merit_amount), promotion_pool
        = SUM(promotion_amount), compression_pool = SUM(compression_amount), emerging_talent_pool
        = SUM(emerging_talent_amount). This ties Department and MonthlyIncome (and
        other pools) across levels. Deequ on the aggregated dataset: .isComplete("Department")
        and cross-check sums by recomputing groupBy("Department").sum(...).'
      sources:
      - start_line: 68
        end_line: 75
        file: ''
      uid: 7350dfb5-a7c3-403b-af17-eb89635fe1b7
    - text: 'In the aggregated dataset, total_budget must equal round(merit_pool +
        promotion_pool + compression_pool + emerging_talent_pool, 2). Deequ (on agg):
        .satisfies("total_budget = round(merit_pool + promotion_pool + compression_pool
        + emerging_talent_pool, 2)", "department_total_budget_sum")'
      sources:
      - start_line: 77
        end_line: 78
        file: ''
      uid: 3f4b6520-a0c2-4cbe-8f4d-9786faf17c8c
