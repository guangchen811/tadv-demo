        end_line: 61
        file: ''
      uid: 1db075ca-cb9b-4280-b60b-b296d467b86b
    - text: 'Proposed merit is capped by SalarySlab and scaled by MonthlyIncome: proposed_merit_pct
        <= slab_cap_pct (where slab_cap_pct is determined by SalarySlab mapping),
        and proposed_merit_amount = round(MonthlyIncome * proposed_merit_pct, 2).
        Deequ examples: .satisfies("proposed_merit_pct <= slab_cap_pct", ''merit_within_slab_cap'',
        assertion=_.equals(1.0)) and .satisfies("ABS(proposed_merit_amount - ROUND(MonthlyIncome
        * proposed_merit_pct, 2)) < 0.005", ''merit_amount_matches_pct'', assertion=_.equals(1.0))'
