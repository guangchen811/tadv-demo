        fractional inputs (e.g., 0.12) which would produce unrealistically small merit
        rates after dividing by 100. We could represent this as Deequ constraints
        like: .hasMin("PercentSalaryHike", lambda m: m >= 0) and .hasMax("PercentSalaryHike",
