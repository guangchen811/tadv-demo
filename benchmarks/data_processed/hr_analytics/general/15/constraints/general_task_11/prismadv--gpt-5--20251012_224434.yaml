  '["JobLevel","PerformanceRating","YearsInCurrentRole","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'perf_guideline_pct is a deterministic mapping of PerformanceRating: 3
        -> 0.12 and 4 -> 0.18. Therefore, for every row perf_guideline_pct must equal
        that mapping and be non-null (implying PerformanceRating only takes values
        3 or 4). Possible Deequ: .isComplete(''perf_guideline_pct'') and .satisfies(''CASE
        WHEN PerformanceRating = 3 THEN 0.12 WHEN PerformanceRating = 4 THEN 0.18
        ELSE NULL END = perf_guideline_pct'', ''perf_guideline_pct_matches_rating'').'
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      uid: 08341963-318a-45ab-993d-0f5e76f5902d
    - text: 'proposed_merit_pct is capped by slab_cap_pct for every row. Possible
        Deequ: .satisfies(''proposed_merit_pct <= slab_cap_pct'', ''merit_cap_by_slab'').'
      sources:
      - start_line: 40
        end_line: 43
        file: ''
      uid: ba136d25-954f-4596-99c7-375e367205dc
    - text: 'Because adjusted_merit_pct = min(perf_guideline_pct, PercentSalaryHike/100.0)
        * age_weight * travel_multiplier and proposed_merit_pct = min(adjusted_merit_pct,
        slab_cap_pct), it must hold that: (1) proposed_merit_pct <= age_weight * travel_multiplier
        * perf_guideline_pct and (2) proposed_merit_pct <= age_weight * travel_multiplier
        * (PercentSalaryHike/100.0). Possible Deequ: .satisfies(''proposed_merit_pct
        <= perf_guideline_pct * age_weight * travel_multiplier'', ''merit_leq_guideline_after_weights'')
        and .satisfies(''proposed_merit_pct <= (PercentSalaryHike / 100.0) * age_weight
        * travel_multiplier'', ''merit_leq_hike_after_weights'').'
      sources:
      - start_line: 35
        end_line: 37
        file: ''
      - start_line: 40
        end_line: 42
        file: ''
      uid: b082d883-2870-4997-ba88-19661cc54f59
    - text: 'proposed_merit_amount must equal MonthlyIncome * proposed_merit_pct,
        rounded to 2 decimals. Possible Deequ: .satisfies(''proposed_merit_amount
        = round(MonthlyIncome * proposed_merit_pct, 2)'', ''proposed_merit_amount_formula'').'
      sources:
      - start_line: 43
        end_line: 43
        file: ''
      uid: 92464c7f-480b-471f-9b5c-052ab7805088
    - text: 'promotion_eligible must equal (PerformanceRating = 4) AND (YearsInCurrentRole
        >= 2) AND (YearsSinceLastPromotion >= 1) AND (JobLevel < 5). Possible Deequ
        (either as equivalence or two implications): .satisfies(''(PerformanceRating
        = 4 AND YearsInCurrentRole >= 2 AND YearsSinceLastPromotion >= 1 AND JobLevel
        < 5) = promotion_eligible'', ''promotion_eligibility_logic'') or .satisfies(''NOT
        promotion_eligible OR (PerformanceRating = 4 AND YearsInCurrentRole >= 2 AND
        YearsSinceLastPromotion >= 1 AND JobLevel < 5)'', ''eligibility_implies_criteria'')
        and .satisfies(''promotion_eligible OR NOT (PerformanceRating = 4 AND YearsInCurrentRole
        >= 2 AND YearsSinceLastPromotion >= 1 AND JobLevel < 5)'', ''criteria_implies_eligibility'').'
      sources:
      - start_line: 46
        end_line: 52
        file: ''
      uid: 978826ea-a02b-4db1-81cb-03fde1989540
    - text: 'promotion_raise_pct must equal 0.0 for all rows where promotion_eligible
        is false; otherwise it must follow the JobLevel mapping {1: 0.10, 2: 0.08,
        3: 0.07, 4: 0.06, 5: 0.0}. Possible Deequ: .satisfies("promotion_raise_pct
        = CASE WHEN promotion_eligible THEN CASE WHEN JobLevel = 1 THEN 0.10 WHEN
        JobLevel = 2 THEN 0.08 WHEN JobLevel = 3 THEN 0.07 WHEN JobLevel = 4 THEN
        0.06 WHEN JobLevel = 5 THEN 0.0 END ELSE 0.0 END", ''promotion_raise_logic'').'
      sources:
      - start_line: 53
        end_line: 56
        file: ''
      uid: 06d89773-32bb-440d-bb6f-4f60710c56c3
    - text: 'In the department-level aggregate, total_budget must equal merit_pool
        + promotion_pool + compression_pool + emerging_talent_pool. Possible Deequ
        (on the aggregated dataset): .satisfies(''total_budget = round(merit_pool
        + promotion_pool + compression_pool + emerging_talent_pool, 2)'', ''dept_total_budget_sum'').'
      sources:
      - start_line: 68
        end_line: 78
        file: ''
      uid: 92411c70-7b49-48f5-be31-b9eb025ae24c
