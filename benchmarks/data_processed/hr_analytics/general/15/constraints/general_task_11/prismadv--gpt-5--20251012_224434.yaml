        end_line: 32
        file: ''
      - start_line: 59
        end_line: 61
        file: ''
      uid: 2d6d83b7-70f2-4b86-8f55-17bc0b9e2795
    - text: "Compression amounts depend jointly on SalarySlab and MonthlyIncome: If\
        \ SalarySlab \u2208 {'Upto 5k','5k-10k'} then compression_pool_share = 0.003\
        \ and compression_amount = round(MonthlyIncome * 0.003, 2); otherwise compression_pool_share\
        \ = 0.0 and compression_amount = 0.00. Deequ example: .satisfies(\"CASE WHEN\
        \ SalarySlab IN ('Upto 5k','5k-10k') THEN compression_pool_share = 0.003 AND\
        \ ROUND(MonthlyIncome * 0.003, 2) = compression_amount ELSE compression_pool_share\
        \ = 0.0 AND compression_amount = 0.0 END\", 'low_slab_compression_rule', assertion=_.equals(1.0))"
      sources:
