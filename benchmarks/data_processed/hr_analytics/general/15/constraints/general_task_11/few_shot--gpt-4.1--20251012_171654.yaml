constraints:
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['Travel_Rarely', 'Travel_Frequently', 'Non-Travel'])
      - Invalid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel')
      - Valid
    - - .isContainedIn('JobLevel', [1,2,3,4,5])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isComplete('PercentSalaryHike')
      - Valid
    - - .isNonNegative('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3,4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    assumptions: []
