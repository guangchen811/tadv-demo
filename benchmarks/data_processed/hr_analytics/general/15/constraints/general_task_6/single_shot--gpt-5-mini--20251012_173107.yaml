constraints:
  Age:
    code:
    - - '.isComplete(''Age'').hasMin(''Age'', lambda v: v >= 18).hasMax(''Age'', lambda
        v: v <= 65)'
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup').isContainedIn('AgeGroup', ['18-25', '26-35', '36-45',
        '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition').isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department').isContainedIn('Department', ['Sales', 'Research
        & Development', 'Human Resources'])
      - Valid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isComplete('DistanceFromHome').isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID').isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - '.isComplete(''EmployeeCount'').hasMin(''EmployeeCount'', lambda v: v == 1).hasMax(''EmployeeCount'',
        lambda v: v == 1)'
      - Valid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isComplete('EmployeeNumber').isUnique('EmployeeNumber')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isComplete('JobLevel').hasDataType('JobLevel', ConstrainableDataTypes.Integral).isContainedIn('JobLevel',
        [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome').isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18').isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime').isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating').hasDataType('PerformanceRating', ConstrainableDataTypes.Integral).isContainedIn('PerformanceRating',
        [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab').isContainedIn('SalarySlab', ['Upto 5k', '5k-10k',
        '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - '.isComplete(''StandardHours'').hasMin(''StandardHours'', lambda v: v == 80).hasMax(''StandardHours'',
        lambda v: v == 80)'
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany').hasDataType('YearsAtCompany', ConstrainableDataTypes.Integral)
      - Valid
    assumptions: []
