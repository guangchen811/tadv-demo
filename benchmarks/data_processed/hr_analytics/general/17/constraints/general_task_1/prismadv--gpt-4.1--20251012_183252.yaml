    assumptions:
    - text: 'The ''TotalWorkingYears'' column must be complete, i.e., it should not
        contain any null values. This is assumed because the column is directly used
        in arithmetic operations (subtraction and assignment) and in further computations
        (such as np.sqrt and np.clip) without any null handling or .fillna(), which
        would result in errors if nulls were present. The dataset metadata also indicates
        completeness is 1.0, reinforcing this expectation.

        We could represent this assumption as a deequ constraint like this:

