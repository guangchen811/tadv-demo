      uid: 1737d641-df8e-4205-b716-31d853313538
    - text: 'All values in the ''TotalWorkingYears'' column must be integral (whole
        numbers) as the code expects to perform arithmetic operations (subtraction)
        and then uses np.sqrt on derived values, which would not make sense for non-numeric
        or non-integral values. The metadata also specifies the dataType as Integral.

        We could represent this assumption as a deequ constraint like this:

        .satisfies(''CAST(`TotalWorkingYears` AS BIGINT) = `TotalWorkingYears`'',
        ''TotalWorkingYears Integral'', lambda x: x == 1.0)'
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      uid: 66b4bba6-4dd7-4a5c-acab-7710a1f38f83
    - text: 'The ''TotalWorkingYears'' column should only contain non-negative values
        (>= 0), as the code computes external_experience = (TotalWorkingYears - YearsAtCompany)
        and then applies .clip(lower=0), and also computes sqrt(external_experience).
        Negative values in ''TotalWorkingYears'' could result in negative external_experience
        or career_start_age, which would break assumptions about experience years.
        Values less than 0 are not meaningful in this context.

        We could represent this assumption as a deequ constraint like this:

        .satisfies(''`TotalWorkingYears` >= 0'', ''Non-negative TotalWorkingYears'',
        lambda x: x == 1.0)'
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      uid: 7d93d91d-3cdf-4a0c-97f0-eb698def047f
    - text: 'The ''TotalWorkingYears'' column should not contain extreme outliers,
        as it is used to compute career_start_age = Age - TotalWorkingYears, and the
        results are later clipped to a minimum of 0 after subtracting 15 (career_start_signal
        = (career_start_age - 15).clip(lower=0)). This implies that ''TotalWorkingYears''
        should generally not exceed ''Age'', and should not be so large as to make
        career_start_age negative for valid Age values.

        We could represent this assumption as a deequ constraint like this:

        .satisfies(''`TotalWorkingYears` <= `Age`'', ''TotalWorkingYears not exceeding
        Age'', lambda x: x == 1.0)'
      sources:
      - start_line: 59
        end_line: 59
        file: ''
      - start_line: 65
