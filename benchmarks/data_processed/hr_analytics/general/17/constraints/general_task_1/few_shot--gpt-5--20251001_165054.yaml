constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - '.satisfies(''Age <= 100'', ''age_le_100'', lambda v: v == 1.0)'
      - Valid
    - - '.satisfies(''Age >= 18'', ''age_ge_18'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Age,AgeGroup:
    code:
    - - '.satisfies("((Age >= 18 AND Age <= 25 AND AgeGroup = ''18-25'') OR (Age >=
        26 AND Age <= 35 AND AgeGroup = ''26-35'') OR (Age >= 36 AND Age <= 45 AND
        AgeGroup = ''36-45'') OR (Age >= 46 AND Age <= 55 AND AgeGroup = ''46-55'')
        OR (Age > 55 AND AgeGroup = ''55+''))", ''agegroup_matches_age'', lambda v:
        v >= 0.99)'
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - '.hasNumberOfDistinctValues(''AgeGroup'', lambda x: x == 5)'
      - Invalid
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isContainedIn('BusinessTravel', ['Travel_Rarely', 'Travel_Frequently', 'Non-Travel',
        'TravelRarely'])
      - Valid
    assumptions: []
  Department:
    code:
    - - '.hasNumberOfDistinctValues(''Department'', lambda x: x == 3)'
      - Invalid
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  Education:
    code:
    - - '.satisfies(''Education >= 1 AND Education <= 5'', ''education_range'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - '.hasMax(''EmployeeCount'', lambda x: x == 1)'
      - Valid
    - - '.hasMin(''EmployeeCount'', lambda x: x == 1)'
      - Valid
    - - .isComplete('EmployeeCount')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isComplete('EnvironmentSatisfaction')
      - Valid
    - - '.satisfies(''EnvironmentSatisfaction >= 1 AND EnvironmentSatisfaction <=
        4'', ''env_sat_1_4'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - '.satisfies(''JobLevel >= 1 AND JobLevel <= 5'', ''joblevel_range'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction')
      - Valid
    - - '.satisfies(''JobSatisfaction >= 1 AND JobSatisfaction <= 4'', ''job_sat_1_4'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  MaritalStatus:
    code:
    - - .isComplete('MaritalStatus')
      - Valid
    - - .isContainedIn('MaritalStatus', ['Single', 'Married', 'Divorced'])
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyIncome,SalarySlab:
    code:
    - - '.satisfies("((SalarySlab = ''Upto 5k'' AND MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome > 15000))", ''salary_slab_bounds'',
        lambda v: v >= 0.95)'
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isComplete('Over18')
      - Valid
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - .isNonNegative('PercentSalaryHike')
      - Valid
    - - '.satisfies(''PercentSalaryHike <= 100'', ''percent_hike_le_100'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - '.satisfies(''PerformanceRating >= 1 AND PerformanceRating <= 4'', ''perf_rating_range'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - '.hasNumberOfDistinctValues(''SalarySlab'', lambda x: x == 4)'
      - Invalid
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - '.hasMax(''StandardHours'', lambda x: x == 80)'
      - Valid
    - - '.hasMin(''StandardHours'', lambda x: x == 80)'
      - Valid
    - - .isComplete('StandardHours')
      - Valid
    assumptions: []
  StockOptionLevel:
    code:
    - - '.satisfies(''StockOptionLevel >= 0 AND StockOptionLevel <= 3'', ''stock_opt_range'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isComplete('WorkLifeBalance')
      - Valid
    - - '.satisfies(''WorkLifeBalance >= 1 AND WorkLifeBalance <= 4'', ''wlb_1_4'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
