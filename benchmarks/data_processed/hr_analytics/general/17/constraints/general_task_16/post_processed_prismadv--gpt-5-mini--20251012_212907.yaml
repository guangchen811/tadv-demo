    - text: 'Each SalarySlab category must have at least one non-null MonthlyIncome
        value so that slab_median_income (used to fill MonthlyIncome) can be computed.
        Put differently: for every distinct SalarySlab present, count(MonthlyIncome
        IS NOT NULL AND SalarySlab = this_slab) >= 1. In Deequ this could be asserted
        via a group-by existence check or by verifying completeness per group before
        transform (e.g., compute counts per SalarySlab and assert min(count_non_null_MonthlyIncome)
        >= 1).'
      sources:
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 30
        end_line: 36
        file: ''
      uid: f939e9fa-ba56-4f99-9cad-7895e73f74fd
    - text: 'IncomeRankInSlab must be a percentile rank derived from MonthlyIncomeFilled
        within each SalarySlab: within each SalarySlab, IncomeRankInSlab should reflect
        the ordering of MonthlyIncomeFilled (higher MonthlyIncomeFilled => greater
        or equal IncomeRankInSlab). A strict formulation: for any two rows i,j with
        the same SalarySlab, if MonthlyIncomeFilled_i > MonthlyIncomeFilled_j then
        IncomeRankInSlab_i >= IncomeRankInSlab_j. As a practical Deequ check, you
        can assert a strong positive correlation between MonthlyIncomeFilled and IncomeRankInSlab
        per SalarySlab or re-compute the group-percentile and assert equality within
        tolerance.'
      sources:
