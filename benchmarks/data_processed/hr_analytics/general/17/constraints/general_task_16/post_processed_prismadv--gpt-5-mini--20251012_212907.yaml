  '["RoleTenureRatio","YearsAtCompany","YearsInCurrentRole"]':
    code: []
    assumptions:
    - text: 'For each record, YearsInCurrentRole should be less than or equal to YearsAtCompany.
        If this is violated the computed RoleTenureRatio may be clipped and hide data
        issues. Representable as a row-level constraint, e.g. in Deequ-style form:
        isLessThanOrEqual(''YearsInCurrentRole'', ''YearsAtCompany'') or as a predicate:
        YearsInCurrentRole <= YearsAtCompany.'
      sources:
      - start_line: 76
        end_line: 84
        file: ''
      uid: 97857e43-22bf-4662-b096-d041b0c4407d
    - text: 'For each record, YearsSinceLastPromotion should be less than or equal
        to YearsAtCompany. This ensures SincePromoRatio (promo / YearsAtCompany) is
        meaningful and not indicative of inconsistent timestamps. Representable as:
        isLessThanOrEqual(''YearsSinceLastPromotion'', ''YearsAtCompany'') or predicate:
        YearsSinceLastPromotion <= YearsAtCompany.'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      uid: 6fed5737-1f37-44b7-a58d-d85365a1d003
    - text: 'For each record, YearsWithCurrManager should be less than or equal to
        YearsAtCompany. This prevents manager-tenure values that exceed total company
        tenure and keeps MgrTenureRatio interpretable. Representable as: isLessThanOrEqual(''YearsWithCurrManager'',
        ''YearsAtCompany'') or predicate: YearsWithCurrManager <= YearsAtCompany.'
      sources:
      - start_line: 76
        end_line: 84
        file: ''
      uid: a3ed0eca-5228-450e-8727-6ff7a8ee6707
    - text: 'Whenever any of YearsInCurrentRole, YearsSinceLastPromotion, or YearsWithCurrManager
        is greater than 0, YearsAtCompany must also be greater than 0. In other words:
        if (YearsInCurrentRole > 0 OR YearsSinceLastPromotion > 0 OR YearsWithCurrManager
        > 0) then YearsAtCompany > 0. This prevents meaningless divisions by zero
        or the artificial filling/clip behavior from masking upstream data problems.'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      uid: 1ebf31ab-0a3c-49f0-9688-83e80749605c
    - text: 'RoleTenureRatio should reflect YearsInCurrentRole / YearsAtCompany for
        rows where YearsAtCompany > 0 and YearsInCurrentRole is between 0 and YearsAtCompany.
        Concretely: for rows with YearsAtCompany > 0 and 0 <= YearsInCurrentRole <=
        YearsAtCompany assert abs(RoleTenureRatio - (YearsInCurrentRole / YearsAtCompany))
        < tolerance (e.g. 1e-6). This checks that the computed ratio matches expected
        arithmetic rather than being altered by clipping/fill behavior.'
      sources:
      - start_line: 81
        end_line: 84
        file: ''
      uid: 88ef57d3-7483-4b58-bb61-ebacec043669
    - text: 'Analogously, MgrTenureRatio and SincePromoRatio should equal YearsWithCurrManager
        / YearsAtCompany and YearsSinceLastPromotion / YearsAtCompany respectively
        for rows where YearsAtCompany > 0 and the numerator is between 0 and YearsAtCompany.
        Express as row-level predicates with a small numeric tolerance: abs(MgrTenureRatio
        - (YearsWithCurrManager / YearsAtCompany)) < tol and abs(SincePromoRatio -
        (YearsSinceLastPromotion / YearsAtCompany)) < tol.'
      sources:
      - start_line: 80
        end_line: 85
        file: ''
      uid: a24d12e5-8602-4a8a-bac3-da9e278d24e1
