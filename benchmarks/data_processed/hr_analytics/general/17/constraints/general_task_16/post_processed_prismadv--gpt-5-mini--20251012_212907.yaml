fixing_results:
  YearsAtCompany:
    9e1d92d3-04a8-4f65-a12e-2cf6fba88589: '.satisfies(''CASE WHEN `YearsAtCompany`
      >= `YearsInCurrentRole` AND `YearsAtCompany` >= `YearsSinceLastPromotion` AND
      `YearsAtCompany` >= `YearsWithCurrManager` AND `YearsAtCompany` <= `TotalWorkingYears`
      THEN 1 ELSE 0 END'', ''Tenure consistency'', lambda x: x >= 0.95)'
  '["Age","AgeNorm"]':
    dd463eac-1f0b-42c0-933e-5b7d693f6fdf: '.satisfies("(Age IS NULL) OR ((Age >= 18
      AND Age <= 25 AND AgeGroup = ''18-25'') OR (Age >= 26 AND Age <= 35 AND AgeGroup
      = ''26-35'') OR (Age >= 36 AND Age <= 45 AND AgeGroup = ''36-45'') OR (Age >=
      46 AND Age <= 55 AND AgeGroup = ''46-55'') OR (Age >= 55 AND AgeGroup = ''55+'')
      OR (Age < 18))", "Age_vs_AgeGroup_consistency", lambda x: x == 1)'
    dcea87b1-a936-4b43-b237-e0393ee3a1db: '.satisfies("CASE WHEN `Age` IS NOT NULL
      THEN CASE WHEN `AgeGroup` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Derived_from_Age_presence_complete",
      lambda x: x == 1)'
  '["AgeGroupOrd","AgeGroupRisk"]':
    fcf9beed-33a0-4a7d-a686-01fbeaa39f89: '.satisfies("CASE WHEN `AgeGroup` IS NULL
      THEN 1 WHEN `AgeGroup` IN (''18-25'',''26-35'',''36-45'',''46-55'',''55+'')
      THEN 1 ELSE 0 END", "AgeGroup is one of expected buckets", lambda x: x == 1)'
  WorkLifeBalance:
    ca9491e1-8425-4744-b97e-06ee0458078b: '.isContainedIn(''WorkLifeBalance'', [''1'',
      ''2'', ''3'', ''4''], lambda x: x >= 0.95)'
  YearsWithCurrManager:
    c668b059-a4a7-4b45-94dd-260ccbbe7c3b: '.satisfies("CAST(`YearsWithCurrManager`
      AS DOUBLE) IS NOT NULL", "YearsWithCurrManager is numeric", lambda x: x >= 0.95)'
  '["Department","JobRole"]':
    9223c5ba-bf28-4cd9-a14e-84fefd63d56b: '.satisfies("(`JobRole` LIKE ''%Sales%''
      AND `Department` = ''Sales'') OR ((`JobRole` LIKE ''%Research%'' OR `JobRole`
      LIKE ''%Scientist%'' OR `JobRole` LIKE ''%Laboratory%'' OR `JobRole` LIKE ''%Manufacturing%'')
      AND `Department` = ''Research & Development'') OR (`JobRole` = ''Human Resources''
      AND `Department` = ''Human Resources'')", "JobRole-Department allowed mappings",
      lambda x: x >= 0.85)'
  EnvironmentSatisfaction:
    ed5a9b0f-4dec-4b47-bf95-5d7eeaeb055f: '.isContainedIn(''EnvironmentSatisfaction'',
      [''1'', ''2'', ''3'', ''4''], lambda x: x == 1)'
  '["EnvironmentSatisfaction","JobSatisfaction","WorkLifeBalance"]':
    d742cef2-8ea0-403c-943d-b0d530972a53: '.hasMin(''WorkLifeBalance'', lambda x:
      x == 1).hasMax(''WorkLifeBalance'', lambda x: x == 4)'
  MonthlyIncome:
    c36e19be-9e68-4d09-bf55-a5c2a085de24: '.satisfies("NOT (MonthlyIncome IS NULL
      AND SalarySlab IS NULL)", "Rows with null MonthlyIncome must have SalarySlab
      present (no rows where both are null)", lambda x: x >= 0.999)'
  JobRole:
    bff81774-1713-4057-aefe-47e4debff383: .isComplete('JobRole')
  '["MgrTenureRatio","YearsAtCompany","YearsWithCurrManager"]':
    2fb49681-e3c7-47db-9fa5-1d41bdde47c5: '.isLessThanOrEqualTo("YearsWithCurrManager",
      "YearsAtCompany", lambda x: x >= 0.95)'
    54805b5a-0ecf-4fea-8443-328f52b78955: '.satisfies("NOT (YearsAtCompany = 0) OR
      (YearsWithCurrManager = 0 OR YearsWithCurrManager IS NULL)", "YearsAtCompany==0
      => YearsWithCurrManager IN {0,NULL}", lambda x: x == 1)'
  '["MonthlyIncome","SalarySlab"]':
    4c4e9ce4-991d-4460-a476-c25e06926cf3: '.satisfies("CASE WHEN `SalarySlab` IS NOT
      NULL AND `MonthlyIncome` IS NOT NULL THEN 1 ELSE 0 END", "SalarySlab_and_MonthlyIncome_not_null",
      lambda x: x == 1)'
  SalarySlab:
    10797ff6-e105-4b97-846e-7b0d2a07fa6b: '.satisfies("`SalarySlab` = ''Upto 5k''",
      "count_Upto_5k_ge_10", lambda x: x * 882 >= 10)'
    cb0fceeb-8440-40b3-a702-6cc0457bd526: '.satisfies("`SalarySlab` = ''5k-10k''",
      "count_5k_10k_ge_10", lambda x: x >= 10.0/882)'
    0d43fe6c-06a1-4e1c-b78c-da0d0575e042: '.satisfies("`SalarySlab` = ''10k-15k''",
      "count_10k_15k_ge_10", lambda x: (x >= 10) if x >= 1 else (x >= 0.01))'
    67b23bfe-60bc-4df4-9e5e-870e75396dab: '.satisfies("`SalarySlab` = ''15k+''", "count_15k_plus_ge_1pct",
      lambda x: x >= 0.01)'
