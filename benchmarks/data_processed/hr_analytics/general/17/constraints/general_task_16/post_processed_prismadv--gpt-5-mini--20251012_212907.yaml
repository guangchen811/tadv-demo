  '["IncomeRankInSlab","MonthlyIncomeFilled","SalarySlab","WithinSlabUnderpay"]':
    code: []
    assumptions:
    - text: "MonthlyIncomeFilled should lie inside the numeric bounds implied by SalarySlab.\
        \ Concretely: if SalarySlab == 'Upto 5k' then MonthlyIncomeFilled \u2208 [0,5000];\
        \ if '5k-10k' then MonthlyIncomeFilled \u2208 [5001,10000]; if '10k-15k' then\
        \ MonthlyIncomeFilled \u2208 [10001,15000]; if '15k+' then MonthlyIncomeFilled\
        \ >= 15001. This ensures the imputed/filled income is consistent with the\
        \ slab used for calibration. In Deequ-like notation this can be expressed\
        \ as a row-level predicate, for example: .satisfies(\"(SalarySlab = 'Upto\
        \ 5k' AND MonthlyIncomeFilled >= 0 AND MonthlyIncomeFilled <= 5000) OR (SalarySlab\
        \ = '5k-10k' AND MonthlyIncomeFilled >= 5001 AND MonthlyIncomeFilled <= 10000)\
        \ OR (SalarySlab = '10k-15k' AND MonthlyIncomeFilled >= 10001 AND MonthlyIncomeFilled\
        \ <= 15000) OR (SalarySlab = '15k+' AND MonthlyIncomeFilled >= 15001)\")."
      sources:
      - start_line: 30
        end_line: 36
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 67
        end_line: 70
