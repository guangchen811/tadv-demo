        (`SalarySlab`=''Upto 5k'' AND `MonthlyIncome` BETWEEN 0 AND 5000) OR (`SalarySlab`=''5k-10k''
        AND `MonthlyIncome` BETWEEN 5001 AND 10000) OR (`SalarySlab`=''10k-15k'' AND
        `MonthlyIncome` BETWEEN 10001 AND 15000) OR (`SalarySlab`=''15k+'' AND `MonthlyIncome`
        >= 15001) THEN 1 ELSE 0 END >= 0.9; (b) monotonic medians: compute median(MonthlyIncome)
        per SalarySlab and assert median(''Upto 5k'') <= median(''5k-10k'') <= median(''10k-15k'')
        <= median(''15k+'').'
      sources:
      - start_line: 30
        end_line: 35
        file: ''
      - start_line: 65
        end_line: 71
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      uid: 153f0c33-1470-4e62-b333-3df84092f4f2
    - text: 'Each SalarySlab should have a sufficient number of rows so that group-level
        statistics (median and percentile rank) are stable. The code computes group
        medians and percentile ranks per slab; very small groups make IncomeRankInSlab
        and slab medians unreliable. Example validation: for each slab, COUNT(*) >=
        10 (or another domain-appropriate minimum).'
      sources:
      - start_line: 69
        end_line: 73
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      uid: 5605a038-797a-4c46-8fa2-a8056511263e
  '["SalarySlab","SlabOrd"]':
    code: []
    assumptions:
    - text: 'SalarySlab contains only the expected categorical values used by the
        mappings: ''Upto 5k'', ''5k-10k'', ''10k-15k'', ''15k+''. We rely on this
        to map SalarySlab -> SlabOrd and to look up slab bounds. A Deequ-style constraint:
        .isContainedIn(''SalarySlab'', [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'']).'
      sources:
      - start_line: 30
        end_line: 36
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: cfc8b811-7fb3-4c4c-bff7-d3e115225b0d
    - text: 'Every non-null SalarySlab must map to a non-null SlabOrd (i.e., salary_slab_ordinal
        covers all SalarySlab values present). Actionable check: for all rows SalarySlab
        IS NULL => SlabOrd IS NULL, otherwise SlabOrd IS NOT NULL. In Deequ: .satisfies("(SalarySlab
        IS NULL AND SlabOrd IS NULL) OR (SalarySlab IS NOT NULL AND SlabOrd IS NOT
        NULL)", ''slabord_mapped'').'
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: d8e3e5a4-0f1c-4d64-b99d-fa1bc9bee18f
    - text: 'For every row with a non-null MonthlyIncome, the MonthlyIncome must fall
        within the numeric bounds assigned to its SalarySlab (per salary_slab_bounds).
        Example conditional predicate to enforce: (SalarySlab=''Upto 5k'' AND 0 <=
        MonthlyIncome <= 5000) OR (SalarySlab=''5k-10k'' AND 5001 <= MonthlyIncome
        <= 10000) OR (SalarySlab=''10k-15k'' AND 10001 <= MonthlyIncome <= 15000)
        OR (SalarySlab=''15k+'' AND MonthlyIncome >= 15001). This guards the assumption
        that slab labels correspond to actual pay ranges.'
      sources:
      - start_line: 30
        end_line: 35
        file: ''
      - start_line: 69
        end_line: 73
        file: ''
      - start_line: 65
        end_line: 66
        file: ''
      uid: b609d115-57c7-4cc1-b6f2-8d06c4aaedbe
    - text: 'The per-slab median MonthlyIncome (used to impute missing MonthlyIncome)
        must be defined for every SalarySlab present and should be monotically increasing
        with slab ordinal. Concretely: median(MonthlyIncome | SalarySlab=''Upto 5k'')
        <= median(... | ''5k-10k'') <= median(... | ''10k-15k'') <= median(... | ''15k+'').
        This enforces the code''s expectation of a strong monotonic relationship between
        slab and income. A Deequ-like implementation: compute medians by SalarySlab
        and assert medians follow the increasing order.'
      sources:
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 65
        end_line: 66
        file: ''
      uid: db522249-6ede-4527-a8e3-c34c634d6118
    - text: 'For the fill/ ranking logic to produce meaningful values, each SalarySlab
        category present must have at least one non-null MonthlyIncome so slab_median_income
        is computable and MonthlyIncomeFilled is non-null after fillna. Actionable
        check: for each SalarySlab value, count(non-null MonthlyIncome) >= 1. If violated,
        MonthlyIncomeFilled will remain null for that slab.'
      sources:
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: cc861116-d433-48fb-9d89-7dd0b7285042
    - text: 'IncomeRankInSlab (computed from MonthlyIncomeFilled grouped by SalarySlab)
        should produce finite percentile ranks within [0,1] for all rows; equivalently,
        MonthlyIncomeFilled must be non-null for all rows and group ranks must be
        in [0,1]. This is required because WithinSlabUnderpay = 1 - IncomeRankInSlab
        is used in downstream scoring. A corresponding check: IncomeRankInSlab IS
        NOT NULL AND IncomeRankInSlab >= 0 AND IncomeRankInSlab <= 1.'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 107
        end_line: 108
        file: ''
      - start_line: 136
        end_line: 137
        file: ''
      uid: 31ba5e06-ed32-4646-8492-f4fc15cc553c
  '["SincePromoRatio","YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'For each record, ''YearsSinceLastPromotion'' should be less than or equal
        to ''YearsAtCompany''. This reflects the expectation that the time since an
        employee''s last promotion cannot exceed their tenure at the company. Actionable
        constraint: enforce YearsSinceLastPromotion <= YearsAtCompany for all rows
        (e.g. a Deequ row-level check or a predicate check).'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      - start_line: 20
        end_line: 27
        file: ''
      uid: 998f5ead-7c95-477a-8493-1c83e935b304
    - text: 'If ''YearsAtCompany'' == 0 then ''YearsSinceLastPromotion'' should be
        0. The code avoids divide-by-zero by treating YearsAtCompany==0 specially
        before computing ratios, so downstream logic expects no positive "years since
        last promotion" when tenure is zero (or at least that the ratio is treated
        as 0). Actionable constraint: for all rows where YearsAtCompany == 0, assert
        YearsSinceLastPromotion == 0 (or flag otherwise).'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      - start_line: 82
        end_line: 85
        file: ''
      uid: b1e8048a-96e9-4381-972d-1eb0ce91f3fd
    - text: 'The computed ''SincePromoRatio'' should equal the (YearsSinceLastPromotion
        / YearsAtCompany) value clipped to the interval [0, 1], with the special-case
        that when YearsAtCompany == 0 the ratio is 0. Actionable constraint: (a) For
        rows with YearsAtCompany > 0 assert SincePromoRatio is within [0,1] and |SincePromoRatio
        - (YearsSinceLastPromotion / YearsAtCompany)| <= tolerance (e.g. 1e-6). (b)
        For rows with YearsAtCompany == 0 assert SincePromoRatio == 0. This can be
        implemented with Deequ custom constraints or SQL-style predicates.'
      sources:
      - start_line: 82
        end_line: 85
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      - start_line: 20
        end_line: 27
        file: ''
      uid: 3f6742a2-cac1-4f98-ae1f-a2c856e351a4
  '["SlabOrd","SlabRiskComponent"]':
    code: []
    assumptions:
    - text: 'SlabRiskComponent is deterministically computed from SlabOrd for every
        record where SlabOrd is not null. Concretely: SlabRiskComponent == (5 - SlabOrd)
        / 4.0. This can be enforced as a row-level predicate (e.g. Deequ .satisfies("SlabRiskComponent
        = (5 - SlabOrd) / 4.0", "slab_risk_consistent")).'
      sources:
      - start_line: 67
        end_line: 67
        file: ''
      - start_line: 107
        end_line: 107
        file: ''
      uid: 14a922cf-f369-4726-abf8-7fc86970b3db
    - text: "SalarySlab values must belong to the expected set of slab categories\
        \ and SlabOrd must be the mapped ordinal in {1,2,3,4} whenever SalarySlab\
        \ is present. In other words: SalarySlab \u2208 {'Upto 5k','5k-10k','10k-15k','15k+'}\
        \ and SlabOrd \u2208 {1,2,3,4} and non-null for those rows. This can be enforced\
        \ with containment and non-null constraints (e.g. .isContainedIn('SalarySlab',\
        \ ...) and .isNonNull('SlabOrd'))."
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: af119715-c127-4f2f-8e62-88322a8b270e
    - text: Median MonthlyIncome per SalarySlab should be monotonic with SlabOrd (higher
        SlabOrd => median MonthlyIncome is greater or equal, ideally strictly greater).
        The code relies on a strong monotonic relationship between slabs and income
        for calibration/imputation. This can be checked by computing group medians
        and asserting they are non-decreasing with SlabOrd (or pairwise comparisons
        between adjacent ordinals).
      sources:
      - start_line: 65
        end_line: 66
        file: ''
      - start_line: 30
        end_line: 36
        file: ''
      - start_line: 69
        end_line: 73
        file: ''
      uid: 2a27224e-a709-4bd5-9d50-6496decc3435
    - text: 'For rows with a known SalarySlab, MonthlyIncomeFilled (the observed or
        slab-median-imputed income) should fall within the numeric bounds defined
        for that slab. Concretely: for each row, let (low, high) = salary_slab_bounds[SalarySlab];
        then MonthlyIncomeFilled should satisfy low <= MonthlyIncomeFilled <= high
        (treating high==infinity as no upper bound). This supports correct ranking
        within slabs and meaningful imputation.'
      sources:
      - start_line: 30
        end_line: 35
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 534fedf0-a8b3-40f2-a817-0fb6574f5f4a
    - text: IncomeRankInSlab is computed as the percentile rank of MonthlyIncomeFilled
        within each SalarySlab, so for all rows IncomeRankInSlab should be between
        0.0 and 1.0, and within a slab higher MonthlyIncomeFilled should correspond
        to greater IncomeRankInSlab (monotonicity within groups). Enforce numeric
        bounds and, where feasible, ordering consistency checks within each SalarySlab.
      sources:
      - start_line: 70
        end_line: 73
        file: ''
      - start_line: 108
        end_line: 108
        file: ''
      uid: 69c4235b-fa1f-470e-8914-e5e0db7a6721
  TotalWorkingYears:
    code:
    - suggestion: '.satisfies(''CASE WHEN `TotalWorkingYears` >= 0 AND `TotalWorkingYears`
        <= 80 THEN 1 ELSE 0 END'', ''TotalWorkingYears reasonable range'', lambda
        x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: b0e50b3b-3510-44b9-bd70-ea0f776c7bcc
      source_assumptions:
      - 0010508c-1d71-4cd8-a518-f78ba4b9837c
    - suggestion: '.satisfies(''CASE WHEN floor(`TotalWorkingYears`) = `TotalWorkingYears`
        THEN 1 ELSE 0 END'', ''TotalWorkingYears integer-valued'', lambda x: x ==
        1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: e40cf1ba-9812-4958-8632-b23137666a5a
      source_assumptions:
      - 68614dcf-0adc-4f8a-81bb-740fc7d3bf4f
    - suggestion: '.satisfies(''CASE WHEN (`YearsAtCompany` IS NULL OR `TotalWorkingYears`
        >= `YearsAtCompany`) AND (`YearsInCurrentRole` IS NULL OR `TotalWorkingYears`
        >= `YearsInCurrentRole`) AND (`YearsSinceLastPromotion` IS NULL OR `TotalWorkingYears`
        >= `YearsSinceLastPromotion`) AND (`YearsWithCurrManager` IS NULL OR `TotalWorkingYears`
        >= `YearsWithCurrManager`) THEN 1 ELSE 0 END'', ''TotalWorkingYears consistency
        with other tenures'', lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 621c85ef-6441-475e-ab80-2b51ab8f43b6
      source_assumptions:
      - 225cf267-9f07-4694-a21a-b32efaf12322
    assumptions:
    - text: 'The ''TotalWorkingYears'' column must be numeric (or convertible to numeric).
        The code explicitly coerces this column with pd.to_numeric(errors=''coerce''),
        so non-numeric strings will become NaN and could break assumptions downstream.
        Example validation (Deequ/Great Expectations style): .satisfies("CASE WHEN
        `TotalWorkingYears` IS NOT NULL AND TRY_CAST(`TotalWorkingYears` AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END", "TotalWorkingYears numeric-convertible", lambda
        x: x == 1)'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: b71fda57-0760-47a5-9b44-b8a7ed430781
    - text: 'The input should not contain missing values for ''TotalWorkingYears''
        (completeness = 1.0 in the dataset). The pipeline does not perform a dedicated
        imputation for this column before downstream use, so the column is expected
        to be present and populated. Example validation: .satisfies("CASE WHEN `TotalWorkingYears`
        IS NOT NULL THEN 1 ELSE 0 END", "TotalWorkingYears not null", lambda x: x
        == 1)'
      sources:
      - start_line: 17
        end_line: 27
        file: ''
      uid: 42d7650f-6b92-42e9-9a57-0d215c35740f
    - text: 'Values in ''TotalWorkingYears'' should be non-negative and within a reasonable
        human-work-history range (e.g., 0 <= TotalWorkingYears <= 80). Negative values
        or extremely large values are invalid for tenure and can distort downstream
        reasoning. Example validation: .satisfies("CASE WHEN `TotalWorkingYears` >=
        0 AND `TotalWorkingYears` <= 80 THEN 1 ELSE 0 END", "TotalWorkingYears reasonable
        range", lambda x: x == 1)'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 75
        end_line: 85
        file: ''
      uid: 0010508c-1d71-4cd8-a518-f78ba4b9837c
    - text: '''TotalWorkingYears'' should be integral (whole years, no fractional
        values). The dataset meta indicates an integral type and downstream logic
        treats tenure as year counts. Example validation: .satisfies("CASE WHEN floor(`TotalWorkingYears`)
        = `TotalWorkingYears` THEN 1 ELSE 0 END", "TotalWorkingYears integer-valued",
        lambda x: x == 1)'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 68614dcf-0adc-4f8a-81bb-740fc7d3bf4f
    - text: '''TotalWorkingYears'' should be at least as large as other tenure-related
        fields on the same row: YearsAtCompany, YearsInCurrentRole, YearsSinceLastPromotion,
        and YearsWithCurrManager. Total working experience must logically be >= each
        of these per-row values. Example validation: .satisfies("CASE WHEN `TotalWorkingYears`
        >= `YearsAtCompany` AND `TotalWorkingYears` >= `YearsInCurrentRole` AND `TotalWorkingYears`
        >= `YearsSinceLastPromotion` AND `TotalWorkingYears` >= `YearsWithCurrManager`
        THEN 1 ELSE 0 END", "TotalWorkingYears consistency with other tenures", lambda
        x: x == 1)'
      sources:
      - start_line: 75
        end_line: 81
        file: ''
      - start_line: 77
        end_line: 77
        file: ''
      uid: 225cf267-9f07-4694-a21a-b32efaf12322
  '["TotalWorkingYears","YearsAtCompany","YearsInCurrentRole","YearsSinceLastPromotion","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'TotalWorkingYears should be greater than or equal to YearsAtCompany for
        every record. This ensures the employee''s total career length is at least
        as large as their tenure at the company. Example actionable constraint (Deequ-style):

        .satisfies("TotalWorkingYears >= YearsAtCompany", "total_ge_years_at_company")'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 76
        end_line: 77
        file: ''
      uid: a7be96a1-3db5-49bf-a0d8-0d53f9b7907a
    - text: 'For records where YearsAtCompany > 0, each of YearsInCurrentRole, YearsWithCurrManager,
        and YearsSinceLastPromotion must be less than or equal to YearsAtCompany.
        (These are used as numerators in ratios against YearsAtCompany; violating
        this indicates inconsistent tenure data.) Example actionable constraints:

        .satisfies("YearsInCurrentRole <= YearsAtCompany", "role_le_yac")

        .satisfies("YearsWithCurrManager <= YearsAtCompany", "mgr_le_yac")

        .satisfies("YearsSinceLastPromotion <= YearsAtCompany", "promo_le_yac")'
      sources:
      - start_line: 76
        end_line: 85
        file: ''
      - start_line: 82
        end_line: 85
        file: ''
      - start_line: 20
        end_line: 23
        file: ''
      uid: 87ab83b6-7bf4-4abe-9510-9022a671bc2d
    - text: "If YearsAtCompany == 0 then YearsInCurrentRole, YearsWithCurrManager,\
        \ and YearsSinceLastPromotion should be 0 (or null) \u2014 i.e., no non-zero\
        \ sub-tenures when overall company tenure is zero. This prevents hiding inconsistent\
        \ data by later replacing 0 with NaN for ratio safety. Example actionable\
        \ constraint:\n.satisfies(\"(YearsAtCompany = 0) => (YearsInCurrentRole =\
        \ 0 AND YearsWithCurrManager = 0 AND YearsSinceLastPromotion = 0)\", \"zero_yac_consistency\"\
        )"
      sources:
      - start_line: 82
        end_line: 85
        file: ''
      - start_line: 76
        end_line: 80
        file: ''
      uid: 6dbfe2b3-676a-40cf-95cf-d0a03e783d6f
    - text: 'All tenure-related columns (TotalWorkingYears, YearsAtCompany, YearsInCurrentRole,
        YearsSinceLastPromotion, YearsWithCurrManager) must be numeric and non-negative.
        The code enforces numeric coercion and clips ratios to [0,1], so negative
        tenure values would be unexpected. Example actionable constraints:

        .satisfies("TotalWorkingYears >= 0 AND YearsAtCompany >= 0 AND YearsInCurrentRole
        >= 0 AND YearsSinceLastPromotion >= 0 AND YearsWithCurrManager >= 0", "tenure_nonnegative")

        (or individual min checks per column)'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      - start_line: 82
        end_line: 85
        file: ''
      uid: 4cd65dd1-d696-4e54-b1ef-cf063990a9c9
