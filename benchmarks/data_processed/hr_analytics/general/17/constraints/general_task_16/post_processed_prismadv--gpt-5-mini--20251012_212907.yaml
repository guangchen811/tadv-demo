      uid: 8abdc6a6-2d3a-49c6-9d3c-de5b890bc959
    - text: 'WithinSlabUnderpay must be numerically consistent with IncomeRankInSlab:
        WithinSlabUnderpay = 1.0 - IncomeRankInSlab (within a small tolerance for
        floating point arithmetic). In Deequ you can express this as .satisfies("abs(WithinSlabUnderpay
        + IncomeRankInSlab - 1.0) < 1e-6").'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 107
        end_line: 108
        file: ''
      uid: c2bcfd73-c619-4dde-8b42-80fb42c33886
    - text: 'SlabOrd must be the ordinal encoding of SalarySlab (allowed values {1,2,3,4}
        corresponding to the four slabs) and SlabRiskComponent must equal (5 - SlabOrd)
        / 4.0. Concretely: if SalarySlab maps to SlabOrd = k then SlabRiskComponent
