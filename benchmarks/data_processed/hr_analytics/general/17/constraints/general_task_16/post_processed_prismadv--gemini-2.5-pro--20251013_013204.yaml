    assumptions:
    - text: 'The values in the ''Age'' column must be consistent with the corresponding
        values in the ''AgeGroup'' column, following the bucketing logic defined in
        the code. The script uses both the original ''AgeGroup'' column (to create
        ''AgeGroupOrd'') and the ''Age'' column (to derive ''AgeNorm'' and a new ''DerivedAgeGroup'')
        to calculate the final risk score. Inconsistent data would lead to a logically
        flawed score. The expected relationship is:

        - If ''AgeGroup'' = ''18-25'', then ''Age'' must be between 18 and 25.

        - If ''AgeGroup'' = ''26-35'', then ''Age'' must be between 26 and 35.

        - If ''AgeGroup'' = ''36-45'', then ''Age'' must be between 36 and 45.

        - If ''AgeGroup'' = ''46-55'', then ''Age'' must be between 46 and 55.

        - If ''AgeGroup'' = ''55+'', then ''Age'' must be 55 or greater.

        This can be represented as a Deequ constraint using a series of conditional
        checks, for example:

        .satisfies("CASE WHEN AgeGroup = ''18-25'' THEN (Age >= 18 AND Age <= 25)
        WHEN AgeGroup = ''26-35'' THEN (Age >= 26 AND Age <= 35) WHEN AgeGroup = ''36-45''
        THEN (Age >= 36 AND Age <= 45) WHEN AgeGroup = ''46-55'' THEN (Age >= 46 AND
        Age <= 55) WHEN AgeGroup = ''55+'' THEN (Age >= 55) ELSE TRUE END", "Age and
        AgeGroup Consistency Check")'
      sources:
