constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  Age/AgeGroup consistency:
    code:
    - - .satisfies("((Age >= 18 AND Age <= 25 AND AgeGroup = '18-25') OR (Age >= 26
        AND Age <= 35 AND AgeGroup = '26-35') OR (Age >= 36 AND Age <= 45 AND AgeGroup
        = '36-45') OR (Age >= 46 AND Age <= 55 AND AgeGroup = '46-55') OR (Age >=
        55 AND AgeGroup = '55+'))", 'AgeGroupMatchesAge')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25','26-35','36-45','46-55','55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['Yes','No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales','Research & Development','Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isContainedIn('EmployeeCount', [1])
      - Invalid
    assumptions: []
  EmployeeNumber:
    code:
    - - .isUnique('EmployeeNumber')
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - .isContainedIn('EnvironmentSatisfaction', [1,2,3,4])
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - .isContainedIn('JobRole', ['Research Director','Sales Representative','Research
        Scientist','Manufacturing Director','Healthcare Representative','Sales Executive','Manager','Human
        Resources','Laboratory Technician'])
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isContainedIn('JobSatisfaction', [1,2,3,4])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isNonNegative('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes','No'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k','5k-10k','10k-15k','15k+'])
      - Valid
    assumptions: []
  SalarySlab vs MonthlyIncome:
    code:
    - - .satisfies("((SalarySlab = 'Upto 5k' AND MonthlyIncome <= 5000) OR (SalarySlab
        = '5k-10k' AND MonthlyIncome BETWEEN 5001 AND 10000) OR (SalarySlab = '10k-15k'
        AND MonthlyIncome BETWEEN 10001 AND 15000) OR (SalarySlab = '15k+' AND MonthlyIncome
        >= 15001))", 'SalarySlabMatchesIncome')
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isContainedIn('WorkLifeBalance', [1,2,3,4])
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
