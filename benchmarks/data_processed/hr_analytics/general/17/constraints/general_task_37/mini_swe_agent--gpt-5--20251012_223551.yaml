raw_constraints:
- column_name: EmpID
  code_for_constraint: .isComplete('EmpID')
- column_name: EmpID
  code_for_constraint: .hasPattern('EmpID', '^[A-Za-z]{2}[0-9]{3}$')
- column_name: EmpID
  code_for_constraint: .isUnique('EmpID')
- column_name: EmployeeNumber
  code_for_constraint: .isComplete('EmployeeNumber')
- column_name: EmployeeNumber
  code_for_constraint: .isNonNegative('EmployeeNumber')
- column_name: EmployeeNumber
  code_for_constraint: .isUnique('EmployeeNumber')
- column_name: Department
  code_for_constraint: .isComplete('Department')
- column_name: Department
  code_for_constraint: .isContainedIn('Department', ['Sales', 'Research & Development',
    'Human Resources'])
- column_name: JobRole
  code_for_constraint: .isComplete('JobRole')
- column_name: SalarySlab
  code_for_constraint: .isComplete('SalarySlab')
- column_name: SalarySlab
  code_for_constraint: .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k',
    '15k+'])
- column_name: MonthlyIncome
  code_for_constraint: .isComplete('MonthlyIncome')
- column_name: MonthlyIncome
  code_for_constraint: .isNonNegative('MonthlyIncome')
- column_name: AgeGroup
  code_for_constraint: .isComplete('AgeGroup')
- column_name: AgeGroup
  code_for_constraint: .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55',
    '55+'])
- column_name: Attrition
  code_for_constraint: .isComplete('Attrition')
- column_name: Attrition
  code_for_constraint: .isContainedIn('Attrition', ['Yes', 'No'])
- column_name: Over18
  code_for_constraint: .isComplete('Over18')
- column_name: Over18
  code_for_constraint: .isContainedIn('Over18', ['Y'])
- column_name: OverTime
  code_for_constraint: .isComplete('OverTime')
- column_name: OverTime
  code_for_constraint: .isContainedIn('OverTime', ['Yes', 'No'])
- column_name: StandardHours
  code_for_constraint: .isComplete('StandardHours')
- column_name: StandardHours
  code_for_constraint: .isContainedIn('StandardHours', [80])
- column_name: PerformanceRating
  code_for_constraint: .isComplete('PerformanceRating')
- column_name: PerformanceRating
  code_for_constraint: .isContainedIn('PerformanceRating', [1, 2, 3, 4])
- column_name: JobLevel
  code_for_constraint: .isComplete('JobLevel')
- column_name: JobLevel
  code_for_constraint: .isContainedIn('JobLevel', [1, 2, 3, 4, 5])
- column_name: YearsAtCompany
  code_for_constraint: .isComplete('YearsAtCompany')
- column_name: YearsAtCompany
  code_for_constraint: .isNonNegative('YearsAtCompany')
- column_name: YearsInCurrentRole
  code_for_constraint: .isComplete('YearsInCurrentRole')
- column_name: YearsInCurrentRole
  code_for_constraint: .isNonNegative('YearsInCurrentRole')
- column_name: YearsSinceLastPromotion
  code_for_constraint: .isComplete('YearsSinceLastPromotion')
- column_name: YearsSinceLastPromotion
  code_for_constraint: .isNonNegative('YearsSinceLastPromotion')
- column_name: YearsWithCurrManager
  code_for_constraint: .isComplete('YearsWithCurrManager')
- column_name: YearsWithCurrManager
  code_for_constraint: .isNonNegative('YearsWithCurrManager')
- column_name: RoleTenureLogic
  code_for_constraint: .satisfies('YearsInCurrentRole <= YearsAtCompany', 'role_time_leq_tenure')
- column_name: EmployeeCount
  code_for_constraint: .isComplete('EmployeeCount')
- column_name: EmployeeCount
  code_for_constraint: .isContainedIn('EmployeeCount', [1])
- column_name: Gender
  code_for_constraint: .isComplete('Gender')
- column_name: Gender
  code_for_constraint: .isContainedIn('Gender', ['Male', 'Female'])
- column_name: MaritalStatus
  code_for_constraint: .isComplete('MaritalStatus')
- column_name: MaritalStatus
  code_for_constraint: .isContainedIn('MaritalStatus', ['Single', 'Married', 'Divorced'])
- column_name: Education
  code_for_constraint: .isComplete('Education')
- column_name: Education
  code_for_constraint: .isContainedIn('Education', [1, 2, 3, 4, 5])
- column_name: EnvironmentSatisfaction
  code_for_constraint: .isContainedIn('EnvironmentSatisfaction', [1, 2, 3, 4])
- column_name: JobSatisfaction
  code_for_constraint: .isContainedIn('JobSatisfaction', [1, 2, 3, 4])
- column_name: RelationshipSatisfaction
  code_for_constraint: .isContainedIn('RelationshipSatisfaction', [1, 2, 3, 4])
- column_name: WorkLifeBalance
  code_for_constraint: .isContainedIn('WorkLifeBalance', [1, 2, 3, 4])
- column_name: JobInvolvement
  code_for_constraint: .isContainedIn('JobInvolvement', [1, 2, 3, 4])
- column_name: DailyRate
  code_for_constraint: .isNonNegative('DailyRate')
- column_name: HourlyRate
  code_for_constraint: .isNonNegative('HourlyRate')
- column_name: MonthlyRate
  code_for_constraint: .isNonNegative('MonthlyRate')
- column_name: DistanceFromHome
  code_for_constraint: .isNonNegative('DistanceFromHome')
- column_name: PercentSalaryHike
  code_for_constraint: .isNonNegative('PercentSalaryHike')
- column_name: NumCompaniesWorked
  code_for_constraint: .isNonNegative('NumCompaniesWorked')
- column_name: StockOptionLevel
  code_for_constraint: .isNonNegative('StockOptionLevel')
- column_name: TotalWorkingYears
  code_for_constraint: .isNonNegative('TotalWorkingYears')
- column_name: TrainingTimesLastYear
  code_for_constraint: .isNonNegative('TrainingTimesLastYear')
- column_name: Age
  code_for_constraint: .isNonNegative('Age')
- column_name: Age
  code_for_constraint: .satisfies('Age >= 16 AND Age <= 100', 'age_reasonable_range')
