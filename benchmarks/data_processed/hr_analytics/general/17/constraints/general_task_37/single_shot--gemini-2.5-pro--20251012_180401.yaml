constraints:
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  IncomeSlabConsistency:
    code:
    - - .satisfies("CASE WHEN SalarySlab = 'Upto 5k' THEN MonthlyIncome <= 5000 WHEN
        SalarySlab = '5k-10k' THEN (MonthlyIncome > 5000 AND MonthlyIncome <= 10000)
        WHEN SalarySlab = '10k-15k' THEN (MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) WHEN SalarySlab = '15k+' THEN MonthlyIncome > 15000 ELSE FALSE END",
        'MonthlyIncome must be within the bounds of its SalarySlab')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .isContainedIn('JobLevel', [1, 2, 3, 4, 5])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .hasValues('Over18', ['Y'])
      - Invalid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .hasValues('StandardHours', [80])
      - Invalid
    assumptions: []
  TenureConsistency:
    code:
    - - .satisfies('YearsInCurrentRole <= YearsAtCompany', 'YearsInCurrentRole should
        not exceed YearsAtCompany')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
