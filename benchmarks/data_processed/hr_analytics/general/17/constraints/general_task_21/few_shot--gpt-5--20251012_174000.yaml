constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  Age,AgeGroup:
    code:
    - - .satisfies("CASE WHEN Age >= 55 THEN '55+' WHEN Age >= 46 THEN '46-55' WHEN
        Age >= 36 THEN '36-45' WHEN Age >= 26 THEN '26-35' ELSE '18-25' END = AgeGroup",
        'agegroup_matches_age')
      - Invalid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    assumptions: []
  JobRole,Department:
    code:
    - - .satisfies("CASE WHEN JobRole IN ('Research Scientist','Laboratory Technician','Research
        Director','Manufacturing Director') THEN Department = 'Research & Development'
        WHEN JobRole IN ('Sales Executive','Sales Representative','Healthcare Representative')
        THEN Department = 'Sales' ELSE true END", 'role_department_alignment')
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyIncome,SalarySlab:
    code:
    - - .satisfies("CASE WHEN MonthlyIncome > 0 AND MonthlyIncome <= 5000 THEN 'Upto
        5k' WHEN MonthlyIncome > 5000 AND MonthlyIncome <= 10000 THEN '5k-10k' WHEN
        MonthlyIncome > 10000 AND MonthlyIncome <= 15000 THEN '10k-15k' ELSE '15k+'
        END = SalarySlab", 'salaryslab_matches_income')
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  TotalWorkingYears,YearsAtCompany:
    code:
    - - .satisfies('TotalWorkingYears >= YearsAtCompany', 'exp_gap_nonnegative')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsAtCompany,YearsInCurrentRole:
    code:
    - - .satisfies('YearsAtCompany >= YearsInCurrentRole', 'role_gap_nonnegative')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
