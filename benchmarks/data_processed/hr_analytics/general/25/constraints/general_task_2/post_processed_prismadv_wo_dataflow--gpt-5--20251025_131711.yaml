    assumptions:
    - text: 'EmpID and EmployeeNumber have a one-to-one relationship and are both
        complete: every EmpID maps to exactly one EmployeeNumber and vice versa. This
        can be enforced with multi-column uniqueness on the pair and functional-dependency
        style checks. Example Deequ basis: .isComplete(''EmpID''), .isComplete(''EmployeeNumber''),
        .isUnique([''EmpID'',''EmployeeNumber'']) plus compliance checks that for
        each EmpID there is exactly one distinct EmployeeNumber and for each EmployeeNumber
        exactly one distinct EmpID.'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 20
        end_line: 27
        file: ''
      uid: 800d289d-0d09-4796-a440-20d9c9fee814
    - text: 'Within each (Department, JobRole) group, the computed headcount should
        equal both the sum of EmployeeCount and the number of distinct EmpID in that
        group; consequently, attrition_count must be <= headcount and attrition_rate
        must be in [0,1]. Basis for constraints: group-by (Department, JobRole) and
        assert sum(EmployeeCount) = countDistinct(EmpID), attrition_count <= headcount,
        and attrition_rate between 0 and 1.'
      sources:
      - start_line: 69
        end_line: 76
        file: ''
      uid: 5ca85687-9fc7-467d-9226-797735e3d90f
    - text: 'active_quarterly_comp is deterministically derived from Attrition and
        quarterly_comp: if Attrition = ''No'' then active_quarterly_comp = quarterly_comp,
        else active_quarterly_comp = 0. Basis for a multi-column row-level compliance
        check using Attrition and quarterly_comp.'
      sources:
      - start_line: 66
        end_line: 68
        file: ''
      uid: b96c46d4-b24c-42a6-90f3-9bd9895a5582
    - text: quarterly_comp equals monthly_comp_w_overheads multiplied by 3. Basis
        for a multi-column row-level compliance check between quarterly_comp and monthly_comp_w_overheads.
      sources:
      - start_line: 64
        end_line: 65
        file: ''
      uid: 463e6511-cb2f-42a6-8b0f-08ced1090f55
    - text: 'monthly_comp_w_overheads is deterministically computed from adj_income,
        benefits_rate, travel_premium, overtime_premium, slab_premium, joblevel_adj,
        manager_adj, and fte: monthly_comp_w_overheads = adj_income * (1 + benefits_rate
        + travel_premium + overtime_premium + slab_premium + joblevel_adj + manager_adj)
        * fte. Basis for a multi-column row-level compliance check across these columns.'
      sources:
      - start_line: 52
        end_line: 62
        file: ''
      uid: af46ec45-aaca-4067-8f60-cb74f36ac6b6
    - text: 'adj_income is deterministically computed from MonthlyIncome and PercentSalaryHike:
        adj_income = MonthlyIncome * (1 + PercentSalaryHike/100). Basis for a multi-column
        row-level compliance check.'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: fc197182-22c3-4e67-ae6a-449c4505181e
    - text: 'fte is deterministically computed from StandardHours: fte = StandardHours
        / 80.0. Basis for a multi-column row-level compliance check.'
      sources:
      - start_line: 48
        end_line: 49
        file: ''
      uid: ae3b2609-52aa-4e2e-bb68-d278cd984d8e
    - text: 'After normalizing BusinessTravel values (replacing ''TravelRarely'' with
        ''Travel_Rarely''), travel_premium must equal the mapped value from BusinessTravel
        according to {''Non-Travel'': 0.00, ''Travel_Rarely'': 0.02, ''Travel_Frequently'':
        0.05}. Basis for multi-column compliance: BusinessTravel in the allowed set
        and travel_premium equals the mapping.'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 35
        end_line: 37
        file: ''
      uid: 02e11cd2-edbc-4213-8630-b51978085047
    - text: 'benefits_rate must equal the mapped value from AgeGroup according to
        {''18-25'': 0.25, ''26-35'': 0.28, ''36-45'': 0.30, ''46-55'': 0.33, ''55+'':
        0.35}. Basis for a multi-column compliance check between AgeGroup and benefits_rate.'
      sources:
      - start_line: 32
        end_line: 34
        file: ''
      uid: 92775555-5d5a-4eaf-8a91-e37492d48c1c
    - text: 'overtime_premium must equal the mapped value from OverTime according
        to {''No'': 0.0, ''Yes'': 0.10}. Basis for a multi-column compliance check
        between OverTime and overtime_premium.'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: 964d7224-f048-4c6b-b74e-8584d420ffa3
    - text: 'slab_premium must equal the mapped value from SalarySlab according to
        {''Upto 5k'': 0.00, ''5k-10k'': 0.02, ''10k-15k'': 0.04, ''15k+'': 0.06}.
        Basis for a multi-column compliance check between SalarySlab and slab_premium.'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      uid: 7c75da39-998e-4e28-9d8f-5af16f155627
    - text: joblevel_adj must equal 0.005 * (JobLevel - 1). Basis for a multi-column
        compliance check between JobLevel and joblevel_adj.
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      uid: 2be0ff23-c4dd-452d-afe8-c427a728f48f
    - text: manager_adj must equal 0.01 when YearsWithCurrManager is null or < 1,
        and 0.0 otherwise. Basis for a multi-column compliance check between YearsWithCurrManager
        and manager_adj.
      sources:
      - start_line: 46
        end_line: 47
        file: ''
      uid: 3f5a4412-4278-4ee7-b9fb-143821da3a68
