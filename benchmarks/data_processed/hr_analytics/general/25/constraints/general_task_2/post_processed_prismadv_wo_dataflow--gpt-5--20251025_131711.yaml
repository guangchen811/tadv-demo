    - text: 'If YearsAtCompany equals 0, then YearsSinceLastPromotion must be 0 (new
        hires cannot have time since last promotion at the company). This can be enforced
        with a Deequ ''satisfies'' constraint using the expression: (YearsAtCompany
        != 0) OR (YearsSinceLastPromotion = 0) over columns [YearsAtCompany, YearsSinceLastPromotion].'
