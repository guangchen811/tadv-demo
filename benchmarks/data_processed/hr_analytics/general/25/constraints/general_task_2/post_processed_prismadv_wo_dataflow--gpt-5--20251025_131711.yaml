  '["YearsAtCompany","YearsWithCurrManager"]':
    code: []
    assumptions:
    - text: 'YearsWithCurrManager should never exceed YearsAtCompany for any record.
        Nulls in YearsWithCurrManager are allowed but, when present, the value must
        be <= YearsAtCompany. Example Deequ: .satisfies("isnull(YearsWithCurrManager)
        OR YearsWithCurrManager <= YearsAtCompany", "mgr_le_company")'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 3c888b60-c67a-4e70-9253-504843358a2c
    - text: 'If YearsAtCompany equals 0, then YearsWithCurrManager must be either
        null or 0 (you cannot have time with current manager without company tenure).
        Example Deequ: .satisfies("(YearsAtCompany > 0) OR coalesce(YearsWithCurrManager,
        0) = 0", "zero_tenure_mgr_zero")'
      sources:
      - start_line: 20
        end_line: 27
        file: ''
      uid: 41e5c293-1406-4a13-b0ce-65c780fec9fc
    - text: 'manager_adj must be consistent with YearsWithCurrManager: if coalesce(YearsWithCurrManager,
        0) < 1 then manager_adj = 0.01, otherwise manager_adj = 0.0. Example Deequ:
        .satisfies("(coalesce(YearsWithCurrManager,0) < 1 AND manager_adj = 0.01)
        OR (coalesce(YearsWithCurrManager,0) >= 1 AND manager_adj = 0.0)", "manager_adj_logic")'
