constraints:
  Age:
    code:
    - - '.satisfies(''Age BETWEEN 18 AND 70'', ''age_reasonable_range'', lambda v:
        v == 1.0)'
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - '.hasCompliance(''age_26_35_share_band'', "AgeGroup = ''26-35''", lambda v:
        v >= 0.30 and v <= 0.50)'
      - Invalid
    - - '.hasCompliance(''agegroup_matches_age'', "(Age BETWEEN 18 AND 25 AND AgeGroup
        = ''18-25'') OR (Age BETWEEN 26 AND 35 AND AgeGroup = ''26-35'') OR (Age BETWEEN
        36 AND 45 AND AgeGroup = ''36-45'') OR (Age BETWEEN 46 AND 55 AND AgeGroup
        = ''46-55'') OR (Age >= 56 AND AgeGroup = ''55+'')", lambda v: v >= 0.98)'
      - Invalid
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25','26-35','36-45','46-55','55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - '.hasCompliance(''attrition_yes_rate_band'', "Attrition = ''Yes''", lambda
        v: v >= 0.10 and v <= 0.25)'
      - Invalid
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes','No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Research & Development','Sales','Human Resources'])
      - Valid
    assumptions: []
  DistanceFromHome:
    code:
    - - '.hasMax(''DistanceFromHome'', lambda v: v <= 30)'
      - Valid
    - - .isComplete('DistanceFromHome')
      - Valid
    - - .isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  Education:
    code:
    - - .isContainedIn('Education', [1,2,3,4,5])
      - Invalid
    assumptions: []
  EmpID:
    code:
    - - '.hasDistinctness(''EmpID'', lambda v: v >= 0.95)'
      - Invalid
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isContainedIn('EmployeeCount', [1])
      - Invalid
    assumptions: []
  JobLevel:
    code:
    - - .isContainedIn('JobLevel', [1,2,3,4,5])
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isComplete('JobSatisfaction')
      - Valid
    - - .isContainedIn('JobSatisfaction', [1,2,3,4])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes','No'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3,4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - '.hasCompliance(''upto5k_share_band'', "SalarySlab = ''Upto 5k''", lambda
        v: v >= 0.45 and v <= 0.60)'
      - Invalid
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k','5k-10k','10k-15k','15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  StockOptionLevel:
    code:
    - - .isContainedIn('StockOptionLevel', [0,1,2,3])
      - Invalid
    assumptions: []
  TrainingTimesLastYear:
    code:
    - - '.satisfies(''TrainingTimesLastYear BETWEEN 0 AND 6'', ''training_times_range'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - .isComplete('WorkLifeBalance')
      - Valid
    - - .isContainedIn('WorkLifeBalance', [1,2,3,4])
      - Invalid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda v: v >= 0.95)'
      - Valid
    - - '.hasCompliance(''mgr_tenure_le_company'', ''YearsWithCurrManager <= YearsAtCompany
        OR YearsAtCompany IS NULL OR YearsWithCurrManager IS NULL'', lambda v: v ==
        1.0)'
      - Invalid
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
  __dataset__:
    code:
    - - '.hasSize(lambda v: v >= 1)'
      - Valid
    assumptions: []
