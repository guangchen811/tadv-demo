    - text: 'It is assumed that ''recommended_percent'' and ''cap_percent'' are semantically
        consistent, both representing non-negative percentage values (e.g., typically
        within a 0 to 100 range). This consistency is critical for the `np.minimum`
        operation to yield a meaningful ''approved_percent'' and ensures that all
        three columns involved in the merit calculation (''recommended_percent'',
        ''cap_percent'', ''approved_percent'') maintain a coherent scale and interpretation.
        We could represent this assumption as deequ constraints like this:

        .isNonNegative("recommended_percent")

        .isNonNegative("cap_percent")

        .isNonNegative("approved_percent")

        // Optionally, for a stricter percentage range:

        .isContainedIn("recommended_percent", 0.0, 100.0)

        .isContainedIn("cap_percent", 0.0, 100.0)

        .isContainedIn("approved_percent", 0.0, 100.0)'
