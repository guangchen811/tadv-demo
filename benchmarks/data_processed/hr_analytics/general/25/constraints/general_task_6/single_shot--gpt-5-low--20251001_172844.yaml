constraints:
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isContainedIn('BusinessTravel', ['Travel_Rarely', 'Travel_Frequently', 'Non-Travel',
        'TravelRarely'])
      - Valid
    assumptions: []
  DailyRate:
    code:
    - - .isPositive('DailyRate')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isComplete('DistanceFromHome')
      - Valid
    - - .isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  Education:
    code:
    - - '.hasMax(''Education'', lambda v: v <= 5)'
      - Valid
    - - '.hasMin(''Education'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - '.hasMax(''EmployeeCount'', lambda v: v == 1)'
      - Valid
    - - '.hasMin(''EmployeeCount'', lambda v: v == 1)'
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - '.hasMax(''EnvironmentSatisfaction'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''EnvironmentSatisfaction'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  HourlyRate:
    code:
    - - .isPositive('HourlyRate')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - '.hasMax(''JobLevel'', lambda v: v <= 5)'
      - Valid
    - - '.hasMin(''JobLevel'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - '.hasMax(''JobSatisfaction'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''JobSatisfaction'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('JobSatisfaction')
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyRate:
    code:
    - - .isPositive('MonthlyRate')
      - Valid
    assumptions: []
  NumCompaniesWorked:
    code:
    - - '.hasMax(''NumCompaniesWorked'', lambda v: v <= 9)'
      - Valid
    - - '.hasMin(''NumCompaniesWorked'', lambda v: v >= 0)'
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PercentSalaryHike:
    code:
    - - '.hasMax(''PercentSalaryHike'', lambda v: v <= 100)'
      - Valid
    - - '.hasMin(''PercentSalaryHike'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('PercentSalaryHike')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isComplete('PerformanceRating')
      - Valid
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  RelationshipSatisfaction:
    code:
    - - '.hasMax(''RelationshipSatisfaction'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''RelationshipSatisfaction'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - '.hasMax(''StandardHours'', lambda v: v == 80)'
      - Valid
    - - '.hasMin(''StandardHours'', lambda v: v == 80)'
      - Valid
    assumptions: []
  StockOptionLevel:
    code:
    - - '.hasMax(''StockOptionLevel'', lambda v: v <= 3)'
      - Valid
    - - '.hasMin(''StockOptionLevel'', lambda v: v >= 0)'
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  TrainingTimesLastYear:
    code:
    - - '.hasMax(''TrainingTimesLastYear'', lambda v: v <= 6)'
      - Valid
    - - '.hasMin(''TrainingTimesLastYear'', lambda v: v >= 0)'
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - '.hasMax(''WorkLifeBalance'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''WorkLifeBalance'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('WorkLifeBalance')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isComplete('YearsSinceLastPromotion')
      - Valid
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda v: v >= 0.95)'
      - Valid
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
