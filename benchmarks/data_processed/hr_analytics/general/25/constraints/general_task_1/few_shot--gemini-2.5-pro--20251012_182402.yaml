constraints:
  Age:
    code:
    - - .isNonNegative('Age')
      - Valid
    - - .satisfies('Age - TotalWorkingYears >= 15', 'Career start age should be at
        least 15')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isNonNegative('MonthlyIncome')
      - Valid
    - - .satisfies("(SalarySlab = 'Upto 5k' AND MonthlyIncome <= 5000) OR (SalarySlab
        = '5k-10k' AND MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab
        = '10k-15k' AND MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab
        = '15k+' AND MonthlyIncome > 15000)", 'MonthlyIncome must fall within the
        range of its SalarySlab')
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', ['3', '4'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .satisfies('TotalWorkingYears >= YearsAtCompany', 'TotalWorkingYears must
        be greater than or equal to YearsAtCompany')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    assumptions: []
