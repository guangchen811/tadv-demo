        end_line: 40
        file: ''
      uid: 5e00a650-bf50-4c97-a103-d62309e5a4b2
    - text: 'The columns ''PerformanceRating'', ''PercentSalaryHike'', ''base_merit_pct'',
        and ''perf_guideline_pct'' must be consistently aligned for each employee
        record: ''perf_guideline_pct'' is derived from ''PerformanceRating'', and
        ''base_merit_pct'' is the minimum of ''perf_guideline_pct'' and ''PercentSalaryHike''
        / 100.0. Thus, for every record, the value of ''base_merit_pct'' should be
        less than or equal to both ''perf_guideline_pct'' and ''PercentSalaryHike''
        / 100.0. This can be enforced with a multi-column constraint: For all rows,
        base_merit_pct <= perf_guideline_pct AND base_merit_pct <= PercentSalaryHike
        / 100.'
