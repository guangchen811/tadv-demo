    assumptions:
    - text: 'For every record, the ''PerformanceRating'' and ''PercentSalaryHike''
        columns must both be non-null and valid, since ''base_merit_pct'' is computed
        as np.minimum(df[''perf_guideline_pct''], df[''PercentSalaryHike''] / 100.0),
        where ''perf_guideline_pct'' is mapped from ''PerformanceRating''. This requires
        that each ''PerformanceRating'' value is present in the ''perf_guideline_pct''
        mapping (i.e., only 3 or 4 are allowed) and that ''PercentSalaryHike'' is
        a valid numeric value. Both columns must be present and their data compatible
        for arithmetic operations. This supports a multi-column constraint such as:
        ''PerformanceRating'' in [3, 4] AND ''PercentSalaryHike'' IS NOT NULL.'
