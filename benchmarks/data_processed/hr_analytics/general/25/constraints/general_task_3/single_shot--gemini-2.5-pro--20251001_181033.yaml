constraints:
  '*':
    code:
    - - .satisfies('YearsInCurrentRole <= YearsAtCompany', 'YearsInCurrentRole should
        not exceed YearsAtCompany')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isContainedIn('BusinessTravel', ['Travel_Rarely', 'Travel_Frequently', 'Non-Travel',
        'TravelRarely'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - .hasMin('JobLevel', 1)
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', ['3', '4'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isContainedIn('StandardHours', ['80'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95, ''Completeness
        of YearsWithCurrManager should be at least 95%'')'
      - Valid
    assumptions: []
