    - text: 'YearsAtCompany, YearsInCurrentRole, and TotalWorkingYears must be present
        (non-null) together on every row before computing the ratio and promotion
        eligibility. Example Deequ constraint: .satisfies(''YearsAtCompany IS NOT
        NULL AND YearsInCurrentRole IS NOT NULL AND TotalWorkingYears IS NOT NULL'',
        ''tenure_fields_non_null'', 1.0)'
