    assumptions:
    - text: 'The input must contain the column ''SalarySlab'' (string/categorical),
        because it is mapped to numeric rates and later included in outputs. We could
        represent this with Deequ/GE as: hasColumn(''SalarySlab'') / expect_column_to_exist(''SalarySlab'').'
