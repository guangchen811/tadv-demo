  '["TotalWorkingYears","YearsAtCompany","YearsInCurrentRole"]':
    code: []
    assumptions:
    - text: 'YearsInCurrentRole must be less than or equal to YearsAtCompany, and
        both must be non-negative. Additionally, if YearsAtCompany = 0 then YearsInCurrentRole
        must be 0. This ensures the tenure ratio used in MeritIncreasePct stays within
        [0,1] and avoids undefined division. Example Deequ constraint: .satisfies(''YearsAtCompany
        >= 0 AND YearsInCurrentRole >= 0 AND YearsInCurrentRole <= YearsAtCompany
        AND (YearsAtCompany > 0 OR YearsInCurrentRole = 0)'', ''tenure_ratio_valid'',
        1.0)'
