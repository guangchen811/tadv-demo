      - start_line: 29
        end_line: 29
        file: ''
      uid: ab83c702-be2c-4f2c-a29f-edb3baf489af
    - text: 'SalarySlab must be non-null for all rows so that slab_base_rate is defined
        for 100% of records used in MeritIncreasePct and MeritIncreaseAmt. We could
