    - text: 'YearsAtCompany must be less than or equal to TotalWorkingYears (company
        tenure cannot exceed total career tenure). Basis for constraint: .addConstraint(ComplianceConstraint("yac_le_total",
        "YearsAtCompany <= TotalWorkingYears"))'
