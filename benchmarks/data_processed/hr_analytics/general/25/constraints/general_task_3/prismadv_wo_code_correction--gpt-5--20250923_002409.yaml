  '["PercentSalaryHike","PerformanceRating"]':
    code: []
    assumptions:
    - text: 'Both PerformanceRating categories 3 and 4 are present (non-zero count)
        and, for those rows, PercentSalaryHike is defined and numeric. This is required
        because the code computes per-rating means and accesses them via keys 3 and
        4. Possible constraints: (a) ensure count where PerformanceRating = 3 > 0
        and count where PerformanceRating = 4 > 0; (b) in Deequ: .where("PerformanceRating
        IN (3,4)").hasCompleteness("PercentSalaryHike", 1.0).'
      sources:
      - start_line: 19
        end_line: 20
        file: ''
      uid: 5feb99af-e9ec-4209-8d1b-6f9be777b7ef
    - text: 'Average PercentSalaryHike for employees with PerformanceRating = 4 should
        be greater than or equal to that for PerformanceRating = 3. This aligns with
        using rating_gap_pct to boost high performers. Constraint sketch: avg(PercentSalaryHike
        | PerformanceRating = 4) - avg(PercentSalaryHike | PerformanceRating = 3)
        >= 0. In Deequ, implement as a custom aggregation constraint evaluated over
        grouped aggregates.'
      sources:
      - start_line: 19
        end_line: 20
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
      uid: 31a8dd22-b0ab-4bf9-87e5-46336e8def95
    - text: 'YearsInCurrentRole must be less than or equal to YearsAtCompany for every
        employee, and both must be non-negative (implying YearsInCurrentRole = 0 whenever
        YearsAtCompany = 0). This ensures the yicr/yac ratio is well-defined in [0,1]
        without relying on clipping. Deequ example: .satisfies("YearsInCurrentRole
        <= YearsAtCompany AND YearsAtCompany >= 0 AND YearsInCurrentRole >= 0", 1.0).'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 58
        end_line: 64
        file: ''
      uid: 5ada2089-7f76-4922-a2e2-67ac5eeed128
    - text: 'MeritIncreaseAmt must equal MonthlyIncome * MeritIncreasePct, rounded
        to 2 decimals (after MeritIncreasePct is clipped to [0.0, 0.20]). Constraint:
        abs(MeritIncreaseAmt - round(MonthlyIncome * MeritIncreasePct, 2)) <= 0.005
        for all rows. Deequ example: .satisfies("abs(MeritIncreaseAmt - round(MonthlyIncome
        * MeritIncreasePct, 2)) <= 0.005", 1.0).'
      sources:
      - start_line: 67
        end_line: 67
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: 38057ee0-d59e-4659-937f-2174addc9be8
    - text: 'PromotionEligible must exactly equal the composite rule encoded in the
        script: (PerformanceRating = 4) AND (JobLevel < 5) AND (YearsInCurrentRole
        >= 1) AND (YearsSinceLastPromotion >= 1) AND (TotalWorkingYears >= 2). Deequ
        example: .satisfies("CASE WHEN PerformanceRating = 4 AND JobLevel < 5 AND
        YearsInCurrentRole >= 1 AND YearsSinceLastPromotion >= 1 AND TotalWorkingYears
        >= 2 THEN PromotionEligible = true ELSE PromotionEligible = false END", 1.0).'
