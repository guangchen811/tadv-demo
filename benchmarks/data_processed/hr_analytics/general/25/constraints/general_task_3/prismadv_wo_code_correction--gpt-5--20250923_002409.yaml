    code: []
    assumptions:
    - text: 'YearsInCurrentRole must be less than or equal to YearsAtCompany for every
        row (tenure in role cannot exceed tenure at company). Basis for constraint:
        .addConstraint(ComplianceConstraint("yicr_le_yac", "YearsInCurrentRole <=
