    - text: 'If YearsAtCompany = 0, then YearsInCurrentRole = 0 and YearsSinceLastPromotion
        = 0 (new hires cannot have tenure in role or a prior promotion at this company).
        Basis for constraint: .addConstraint(ComplianceConstraint("zero_yac_implies_zeroes",
        "CASE WHEN YearsAtCompany = 0 THEN (YearsInCurrentRole = 0 AND YearsSinceLastPromotion
        = 0) ELSE true END"))'
