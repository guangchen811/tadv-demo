    - text: For rows with YearsAtCompany > 0, YearsInCurrentRole should be less than
        or equal to YearsAtCompany for at least 99% of records. The code clips (YearsInCurrentRole
        / YearsAtCompany) at an upper bound of 1.0, implying values above YearsAtCompany
        are treated as anomalies.
