      uid: 7926a81e-5269-4e31-9563-8e1ba2f46e10
    - text: 'Every SalarySlab value must be one of the four allowed categories with
        exact spelling/casing: ''Upto 5k'', ''5k-10k'', ''10k-15k'', or ''15k+''.
        Otherwise the mapping will produce nulls and downstream merit calculations
        will be incorrect. We could represent this as a Deequ constraint like: .satisfies("CASE
        WHEN `SalarySlab` IN (''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'') THEN 1
        ELSE 0 END", "Valid SalarySlab categories", lambda x: x == 1.0).'
