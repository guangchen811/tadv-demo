    - text: 'MeritIncreaseAmt must be non-negative and bounded by 20% of MonthlyIncome
        due to clipping of MeritIncreasePct: for all rows with MonthlyIncome >= 0,
        0 <= MeritIncreaseAmt <= 0.20 * MonthlyIncome (and thus MeritIncreaseAmt ==
        0 when MonthlyIncome == 0). Deequ example: .addConstraint(Compliance(''merit_amt_bounded_by_income'',
        ''MonthlyIncome >= 0 AND MeritIncreaseAmt >= 0 AND MeritIncreaseAmt <= 0.20
        * MonthlyIncome''))'
