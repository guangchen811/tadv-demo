    - text: 'The mapping from SalarySlab to slab_base_rate is fixed and must hold
        for every row: (''Upto 5k'' -> 0.060), (''5k-10k'' -> 0.050), (''10k-15k''
        -> 0.040), (''15k+'' -> 0.030). This implies slab_base_rate is non-null for
        all rows and agrees with SalarySlab. Deequ example: .addConstraint(Compliance(''slab_to_rate_mapping_correct'',
        "(SalarySlab = ''Upto 5k'' AND slab_base_rate = 0.060) OR (SalarySlab = ''5k-10k''
        AND slab_base_rate = 0.050) OR (SalarySlab = ''10k-15k'' AND slab_base_rate
