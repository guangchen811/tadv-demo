        file: ''
      - start_line: 58
        end_line: 64
        file: ''
      uid: 8b8c5c49-2f98-4c5c-baa6-9d6cdd0ac612
    - text: 'TotalWorkingYears must be at least as large as both YearsAtCompany and
        YearsInCurrentRole for every record (overall experience cannot be less than
        company or role tenure). Example Deequ constraint: .satisfies(''TotalWorkingYears
        >= YearsAtCompany AND TotalWorkingYears >= YearsInCurrentRole'', ''total_ge_tenures'',
        1.0)'
      sources:
