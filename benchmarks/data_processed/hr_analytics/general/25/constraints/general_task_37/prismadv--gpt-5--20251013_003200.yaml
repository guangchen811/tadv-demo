    assumptions:
    - text: 'EmpID and EmployeeNumber have a stable 1:1 mapping and the pair (EmpID,
        EmployeeNumber) is unique across all records. This can be validated via Deequ
        as: .isUnique(["EmpID", "EmployeeNumber"]) together with functional dependencies:
        .hasFunctionalDependency("EmpID", Array("EmployeeNumber")) and .hasFunctionalDependency("EmployeeNumber",
        Array("EmpID"))'
      sources:
      - start_line: 97
        end_line: 104
        file: ''
      - start_line: 111
        end_line: 118
        file: ''
      uid: eb35ee4a-9630-43a2-8476-4eafb1ea3131
    - text: 'MonthlyIncome must be consistent with SalarySlab bounds, and SalarySlab
        must be one of {"Upto 5k", "5k-10k", "10k-15k", "15k+"}. For example, if SalarySlab
        = ''5k-10k'' then 5000 < MonthlyIncome <= 10000, etc. Deequ compliance example:
        .hasCompliance("income_within_slab", "case when SalarySlab = ''Upto 5k'' then
        MonthlyIncome > 0 and MonthlyIncome <= 5000 when SalarySlab = ''5k-10k'' then
        MonthlyIncome > 5000 and MonthlyIncome <= 10000 when SalarySlab = ''10k-15k''
        then MonthlyIncome > 10000 and MonthlyIncome <= 15000 when SalarySlab = ''15k+''
        then MonthlyIncome > 15000 else false end", 1.0)'
      sources:
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      - start_line: 72
        end_line: 77
        file: ''
      uid: dd3076f0-f86b-448c-b5d3-907564c05fe1
    - text: 'Tenure consistency: YearsInCurrentRole must not exceed YearsAtCompany,
        and YearsSinceLastPromotion must not exceed YearsAtCompany (so stagnation_years
        = YearsAtCompany - YearsSinceLastPromotion is non-negative). Deequ compliance
        examples: .hasCompliance("role_le_company", "YearsInCurrentRole <= YearsAtCompany",
        1.0) and .hasCompliance("promo_le_company", "YearsSinceLastPromotion <= YearsAtCompany",
        1.0)'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 88
        end_line: 91
        file: ''
      uid: 38fd955b-61a8-4cc4-890a-176365bba5a4
    - text: "JobRole should uniquely determine Department (i.e., each JobRole belongs\
        \ to exactly one Department), ensuring Department\u2013JobRole alignment.\
        \ Deequ functional dependency: .hasFunctionalDependency(\"JobRole\", Array(\"\
        Department\"))"
      sources:
      - start_line: 33
        end_line: 41
        file: ''
      - start_line: 97
        end_line: 104
        file: ''
      uid: 7500e1c6-99e3-441e-a7e6-079004594c70
    - text: 'RecommendedRaisePct must be non-negative and must not exceed the slab-specific
        cap for that row''s SalarySlab. Deequ compliance example: .hasCompliance("raise_within_cap",
        "RecommendedRaisePct >= 0 and (case when SalarySlab = ''Upto 5k'' then RecommendedRaisePct
        <= 0.15 when SalarySlab = ''5k-10k'' then RecommendedRaisePct <= 0.12 when
        SalarySlab = ''10k-15k'' then RecommendedRaisePct <= 0.10 when SalarySlab
        = ''15k+'' then RecommendedRaisePct <= 0.08 else false end)", 1.0)'
      sources:
      - start_line: 70
        end_line: 76
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      - start_line: 98
        end_line: 99
        file: ''
      - start_line: 115
        end_line: 116
        file: ''
      uid: 9b478b8a-fbbd-461a-bfcb-29fa9926a28d
    - text: 'NewMonthlyIncome should be consistent with MonthlyIncome and RecommendedRaisePct,
        and never decrease income: NewMonthlyIncome >= MonthlyIncome and approximately
        equals MonthlyIncome * (1 + RecommendedRaisePct) within rounding tolerance.
        Deequ compliance example: .hasCompliance("new_income_ge_old", "NewMonthlyIncome
        >= MonthlyIncome", 1.0) and .hasCompliance("new_income_formula", "abs(NewMonthlyIncome
        - round(MonthlyIncome * (1 + RecommendedRaisePct), 2)) <= 0.01", 1.0)'
      sources:
      - start_line: 77
        end_line: 77
        file: ''
      - start_line: 98
        end_line: 101
        file: ''
      - start_line: 115
        end_line: 116
        file: ''
      uid: a968ad24-de21-4fbb-a514-d258a8b18fa3
    - text: 'Promotion eligibility must be incompatible with attrition: if upper(Attrition)
        <> ''NO'' then EligibleForPromotion must be false. Deequ compliance example
        on promo_out: .hasCompliance("no_promo_if_attrited", "not (upper(Attrition)
        <> ''NO'' and EligibleForPromotion = true)", 1.0)'
      sources:
