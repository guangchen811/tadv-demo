        end_line: 28
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 94452566-a8c4-4de4-b805-50a2614a3acc
    - text: 'YearsSinceLastPromotion must not exceed total tenure: 0 <= YearsSinceLastPromotion
        <= YearsAtCompany. This prevents negative stagnation_years and avoids taking
        sqrt of a negative value. Example Deequ constraints: .isLessThanOrEqual(''YearsSinceLastPromotion'',''YearsAtCompany'')
        and Compliance(''nonneg_promo_company_tenure'',''YearsSinceLastPromotion >=
        0 AND YearsAtCompany >= 0'').'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 65
        end_line: 65
        file: ''
      uid: be7e981e-530c-4424-9606-271178471d9a
    - text: 'If YearsAtCompany = 0, then YearsInCurrentRole and YearsSinceLastPromotion
        must both be 0. This avoids divide-by-zero in the role tenure ratio and negative
        stagnation values. Example Deequ constraint: Compliance(''zero_company_implies_zero_tenures'',''(YearsAtCompany
        != 0) OR (YearsInCurrentRole = 0 AND YearsSinceLastPromotion = 0)'').'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 30
        end_line: 31
        file: ''
      uid: 012c1b76-4660-4123-8ad5-0813adb9a6dc
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'YearsSinceLastPromotion must never exceed YearsAtCompany (i.e., tenure
        since last promotion cannot be greater than total tenure). Also, both should
        be non-negative. Expressible as Deequ: .satisfies("YearsAtCompany >= 0 AND
        YearsSinceLastPromotion >= 0 AND YearsAtCompany >= YearsSinceLastPromotion",
        "tenure_ge_last_promo_nonneg")'
      sources:
