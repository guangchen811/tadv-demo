    assumptions:
    - text: 'The ''MonthlyIncome'' column must be present, numeric, and non-null for
        all input rows, since it is aggregated (median), used in division to compute
        CompaRatio, multiplied to compute NewMonthlyIncome, and exported to downstream
        outputs. A suitable validation could be: Deequ .isComplete("MonthlyIncome")
        and .hasDataType("MonthlyIncome", ConstrainableDataTypes.Numeric).'
      sources:
      - start_line: 57
        end_line: 60
        file: ''
      - start_line: 77
        end_line: 77
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      - start_line: 113
        end_line: 113
        file: ''
      uid: d6020443-eb1a-4c07-b93a-b9ba15e1b0c9
    - text: 'The ''MonthlyIncome'' values should be strictly positive (> 0). Negative
        or zero values would result in invalid medians and compa ratios and could
        yield nonsensical new incomes. This is implied by the slab bounds that start
        above 0. A suitable validation could be: Deequ .satisfies("`MonthlyIncome`
        > 0", "Positive MonthlyIncome", lambda x: x == 1).'
      sources:
      - start_line: 45
        end_line: 48
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      - start_line: 77
        end_line: 77
        file: ''
      uid: 170689a4-8b0b-4324-a952-e4aa8e19f2b5
    - text: 'The ''MonthlyIncome'' must align with the assigned ''SalarySlab'' category:
        Upto 5k -> (0, 5000]; 5k-10k -> (5000, 10000]; 10k-15k -> (10000, 15000];
        15k+ -> (15000, inf). Misalignment would distort slab medians, compa ratios,
        and cap application. This can be validated with a rule such as: Deequ .satisfies("CASE
        WHEN `SalarySlab` = ''Upto 5k'' THEN `MonthlyIncome` > 0 AND `MonthlyIncome`
        <= 5000 WHEN `SalarySlab` = ''5k-10k'' THEN `MonthlyIncome` > 5000 AND `MonthlyIncome`
        <= 10000 WHEN `SalarySlab` = ''10k-15k'' THEN `MonthlyIncome` > 10000 AND
        `MonthlyIncome` <= 15000 WHEN `SalarySlab` = ''15k+'' THEN `MonthlyIncome`
        > 15000 ELSE TRUE END", "Income within slab bounds", lambda x: x == 1).'
      sources:
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 57
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      uid: e8e5d04d-bf98-4fc1-8e7b-92b9715db4f2
    - text: 'For every ''SalarySlab'' present in the input, there should be enough
        non-null ''MonthlyIncome'' values so that the per-slab median is finite and
        strictly greater than 0; otherwise CompaRatio defaults to 1.0 and market adjustment
        logic becomes uninformative. This can be validated by checking per-slab non-null
        counts > 0 and median > 0 (e.g., Great Expectations: expect_column_median_to_be_between
        on MonthlyIncome with min_value > 0, groupby=SalarySlab, mostly=1.0; or Deequ:
        compute percentile_approx(MonthlyIncome, 0.5) by SalarySlab and assert > 0
        for all groups).'
      sources:
      - start_line: 57
        end_line: 60
        file: ''
      uid: ef5da4e4-224c-4685-8ea0-02b69355fcb2
