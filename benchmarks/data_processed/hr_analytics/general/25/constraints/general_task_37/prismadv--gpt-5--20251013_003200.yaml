  '["AgeGroup","Attrition","JobLevel","PerformanceRating","YearsInCurrentRole","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'Tenure consistency: YearsInCurrentRole must be between 0 and YearsAtCompany
        (inclusive), and YearsAtCompany should be > 0 so the in-role ratio is well-defined
        and not clipped. This can be enforced as a Deequ row-level rule such as satisfies(''YearsAtCompany
        > 0 and YearsInCurrentRole >= 0 and YearsInCurrentRole <= YearsAtCompany'',
        fraction = 1.0).'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 65
        end_line: 66
        file: ''
      uid: f5a9c769-5013-4843-bdc5-36cfe4cffc70
    - text: 'Promotion recency consistency: YearsSinceLastPromotion must be between
        0 and YearsAtCompany (inclusive) to avoid negative stagnation and meaningless
        sqrt, and to make eligibility condition (>= 1 year) meaningful. Example Deequ
        rule: satisfies(''YearsSinceLastPromotion >= 0 and YearsSinceLastPromotion
        <= YearsAtCompany'', fraction = 1.0).'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 88
        end_line: 94
        file: ''
      uid: b14b9212-eae4-4a83-9e3c-27f9308ed83c
    - text: 'Salary slab alignment: MonthlyIncome must lie within the bounds of its
        SalarySlab per slab_bounds: Upto 5k: (0, 5000], 5k-10k: (5000, 10000], 10k-15k:
        (10000, 15000], 15k+: (15000, inf). Deequ example: satisfies("(SalarySlab
        = ''Upto 5k'' and MonthlyIncome > 0 and MonthlyIncome <= 5000) or (SalarySlab
        = ''5k-10k'' and MonthlyIncome > 5000 and MonthlyIncome <= 10000) or (SalarySlab
        = ''10k-15k'' and MonthlyIncome > 10000 and MonthlyIncome <= 15000) or (SalarySlab
        = ''15k+'' and MonthlyIncome > 15000)", fraction = 1.0).'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: b0ca60e5-f09e-4163-b04b-43fb33ec2d2c
    - text: 'Within each SalarySlab, the computed SlabMedian must be positive and
        finite, and per-row CompaRatio = MonthlyIncome / SlabMedian must be finite
        and > 0. Deequ examples: hasMin(''SlabMedian'', _ > 0) by slab grouping, and
        satisfies(''SlabMedian > 0 and isFinite(CompaRatio) and CompaRatio > 0'',
        fraction = 1.0).'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      uid: 3d796189-e6f6-4d20-84b1-bf62b25c1ce4
    - text: 'Department-to-BudgetMultiplier mapping integrity: BudgetMultiplier must
        equal the policy mapping for the record''s Department (Sales -> 1.00, Research
        & Development -> 1.05, Human Resources -> 0.95), and default to 1.00 for any
        other Department. Deequ example: satisfies("(Department = ''Sales'' and BudgetMultiplier
        = 1.00) or (Department = ''Research & Development'' and BudgetMultiplier =
        1.05) or (Department = ''Human Resources'' and BudgetMultiplier = 0.95) or
        (Department not in (''Sales'',''Research & Development'',''Human Resources'')
        and BudgetMultiplier = 1.00)", fraction = 1.0).'
      sources:
      - start_line: 35
        end_line: 41
        file: ''
      uid: 3fd30f79-bb16-4f0e-a94c-c1cead09c9bb
    - text: 'JobRole-to-Department alignment: Each JobRole should belong to exactly
        one Department across the dataset (i.e., Department is functionally determined
        by JobRole). This can be checked as: for all JobRole, countDistinct(Department)
        = 1.'
      sources:
      - start_line: 33
        end_line: 41
        file: ''
      - start_line: 97
        end_line: 99
        file: ''
      - start_line: 102
        end_line: 104
        file: ''
      - start_line: 111
        end_line: 114
        file: ''
      uid: 93df46ee-292d-4c5c-94ea-5cdad7324438
    - text: 'AgeGroup-to-CareerStage mapping must hold: AgeGroup in {''18-25'',''26-35''}
        -> CareerStage = ''early''; ''36-45'' -> ''mid''; ''46-55'' -> ''senior'';
        ''55+'' -> ''late''; otherwise CareerStage = ''unknown''. Deequ example: satisfies("(AgeGroup
        in (''18-25'',''26-35'') and CareerStage = ''early'') or (AgeGroup = ''36-45''
        and CareerStage = ''mid'') or (AgeGroup = ''46-55'' and CareerStage = ''senior'')
        or (AgeGroup = ''55+'' and CareerStage = ''late'') or (CareerStage = ''unknown'')",
        fraction = 1.0).'
      sources:
      - start_line: 18
        end_line: 25
        file: ''
      uid: a03d2ec3-1187-4d37-b658-f06043c042cd
    - text: 'CareerStage-specific tenure threshold for promotion: The minimum YearsInCurrentRole
        required for eligibility is determined by CareerStage: early=2, mid=2, senior=1,
        late=1. For any record evaluated for promotion, YearsInCurrentRole must meet
        the threshold implied by CareerStage. Deequ example: satisfies("(CareerStage
        in (''early'',''mid'') and YearsInCurrentRole >= 2) or (CareerStage in (''senior'',''late'')
        and YearsInCurrentRole >= 1) or (CareerStage = ''unknown'')", fraction = 1.0).'
      sources:
      - start_line: 80
        end_line: 86
        file: ''
      - start_line: 88
        end_line: 91
        file: ''
      uid: 74cc4b5d-7c9f-4b1a-b1b8-bbf8301966e5
    - text: 'Attrition gating for promotion: No employee marked with Attrition = ''Yes''
        (case-insensitive) should be EligibleForPromotion = true. Deequ example on
        the promo output: satisfies("not(upper(Attrition) = ''YES'' and EligibleForPromotion)",
        fraction = 1.0).'
      sources:
      - start_line: 88
        end_line: 95
        file: ''
      uid: 52e7c1af-4208-440d-b136-2a9c4acdcc8b
    - text: 'Primary key uniqueness for outputs and downstream feeds: The pair (EmpID,
        EmployeeNumber) must be unique across all rows to avoid duplicate employee
        records in compensation and promotion outputs. Deequ example: isUnique([''EmpID'',''EmployeeNumber'']).'
      sources:
      - start_line: 97
        end_line: 101
        file: ''
      - start_line: 102
        end_line: 105
        file: ''
      - start_line: 111
        end_line: 116
        file: ''
      uid: 929285ba-0ef6-49f8-97f5-cd7093906b3f
    - text: 'Raise policy cap by slab: RecommendedRaisePct must be >= 0 and must not
        exceed the cap determined by SalarySlab (Upto 5k: 0.15, 5k-10k: 0.12, 10k-15k:
        0.10, 15k+: 0.08). Deequ example on comp_out: satisfies("RecommendedRaisePct
        >= 0 and ((SalarySlab = ''Upto 5k'' and RecommendedRaisePct <= 0.15) or (SalarySlab
        = ''5k-10k'' and RecommendedRaisePct <= 0.12) or (SalarySlab = ''10k-15k''
        and RecommendedRaisePct <= 0.10) or (SalarySlab = ''15k+'' and RecommendedRaisePct
        <= 0.08))", fraction = 1.0).'
      sources:
      - start_line: 50
        end_line: 55
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      - start_line: 98
        end_line: 99
        file: ''
      - start_line: 115
        end_line: 116
        file: ''
      uid: f7974692-fe20-4b56-ad56-61a71c2e574c
