  '["Department","JobRole"]':
    code: []
    assumptions:
    - text: 'Department and JobRole combinations must conform to the following crosswalk
        observed/required by downstream logic: Sales => {"Sales Executive", "Sales
        Representative", "Manager"}; Human Resources => {"Human Resources", "Manager"};
        Research & Development => {"Research Scientist", "Laboratory Technician",
        "Manufacturing Director", "Healthcare Representative", "Research Director",
        "Manager"}. This prevents mismatches such as a Sales role appearing in the
        Research & Development department. We could represent this assumption as Deequ
        constraints like: .satisfies("(Department = ''Sales'') ==> (JobRole IN (''Sales
        Executive'',''Sales Representative'',''Manager''))", "dept_role_sales_compat")
        .satisfies("(Department = ''Human Resources'') ==> (JobRole IN (''Human Resources'',''Manager''))",
        "dept_role_hr_compat") .satisfies("(Department = ''Research & Development'')
        ==> (JobRole IN (''Research Scientist'',''Laboratory Technician'',''Manufacturing
        Director'',''Healthcare Representative'',''Research Director'',''Manager''))",
        "dept_role_rd_compat")'
      sources:
      - start_line: 33
        end_line: 41
        file: ''
      - start_line: 97
        end_line: 104
        file: ''
      - start_line: 111
        end_line: 114
        file: ''
      uid: 2d25f3e5-5313-451b-8486-08f4e6a13228
    - text: 'For job roles with unambiguous department membership, JobRole functionally
        determines Department: ''Sales Executive'' -> ''Sales''; ''Sales Representative''
        -> ''Sales''; ''Human Resources'' -> ''Human Resources''; ''Research Scientist''
        -> ''Research & Development''; ''Laboratory Technician'' -> ''Research & Development'';
        ''Manufacturing Director'' -> ''Research & Development''; ''Healthcare Representative''
        -> ''Research & Development''; ''Research Director'' -> ''Research & Development''.
        (Note: ''Manager'' is multi-department and is excluded from this FD.) This
        can be captured in Deequ with per-role satisfiability checks, e.g., .satisfies("(JobRole
        = ''Sales Executive'') ==> (Department = ''Sales'')", "jr_to_dept_sales_exec")
        ... and analogous constraints for each listed role.'
