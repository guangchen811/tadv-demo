    - text: 'Zero-tenure consistency (promotion): If YearsAtCompany = 0, then YearsSinceLastPromotion
        must be 0 (cannot have time since last promotion without any company tenure).
        Expressible as Deequ: .satisfies("CASE WHEN YearsAtCompany = 0 THEN YearsSinceLastPromotion
        = 0 ELSE true END", "zero_tenure_requires_zero_since_last_promo")'
      sources:
      - start_line: 30
        end_line: 31
