  '["YearsAtCompany","YearsInCurrentRole"]':
    code: []
    assumptions:
    - text: 'Tenure in current role must not exceed total tenure at the company, and
        both should be non-negative. This keeps the derived ''ratio_in_role'' in [0,
        1]. We could represent this assumption as a deequ constraint like this: .satisfies(''YearsInCurrentRole
        <= YearsAtCompany AND YearsInCurrentRole >= 0 AND YearsAtCompany >= 0'', ''role_within_company_tenure'')'
      sources:
      - start_line: 28
        end_line: 28
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 46a8cca6-c329-419d-9be4-79a31728b831
    - text: 'If ''YearsAtCompany'' equals 0, then ''YearsInCurrentRole'' must also
        be 0 (no role tenure before joining). We could represent this assumption as
        a deequ constraint like this: .satisfies(''CASE WHEN YearsAtCompany = 0 THEN
        YearsInCurrentRole = 0 ELSE true END'', ''zero_company_implies_zero_role'')'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      uid: 21b4413c-e99c-4cb5-857e-886ca33b60b2
    - text: '''YearsSinceLastPromotion'' must be between 0 and ''YearsAtCompany''
        (inclusive). Negative values or values exceeding total company tenure indicate
        data issues. We could represent this assumption as a deequ constraint like
        this: .satisfies(''YearsSinceLastPromotion >= 0 AND YearsSinceLastPromotion
        <= YearsAtCompany'', ''promotion_years_within_company_tenure'')'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 65
        end_line: 65
        file: ''
      uid: 7dc526f9-36ab-4e0f-a2c8-16fd07fc9a58
    - text: '''MonthlyIncome'' must fall within the numeric bounds implied by its
        ''SalarySlab'' label: ''Upto 5k'' -> (0, 5000], ''5k-10k'' -> (5000, 10000],
        ''10k-15k'' -> (10000, 15000], ''15k+'' -> (15000, inf). We could represent
        this assumption as a deequ constraint like this: .satisfies("CASE WHEN SalarySlab
        = ''Upto 5k'' THEN MonthlyIncome > 0 AND MonthlyIncome <= 5000 WHEN SalarySlab
        = ''5k-10k'' THEN MonthlyIncome > 5000 AND MonthlyIncome <= 10000 WHEN SalarySlab
        = ''10k-15k'' THEN MonthlyIncome > 10000 AND MonthlyIncome <= 15000 WHEN SalarySlab
        = ''15k+'' THEN MonthlyIncome > 15000 ELSE false END", ''income_within_slab_bounds'')'
      sources:
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: a91f3d87-d316-4c78-949d-3962d30148cb
    - text: '''RecommendedRaisePct'' must be non-negative and must not exceed the
        cap for its ''SalarySlab'' (Upto 5k: 0.15, 5k-10k: 0.12, 10k-15k: 0.10, 15k+:
        0.08). We could represent this assumption as a deequ constraint like this:
        .satisfies("RecommendedRaisePct >= 0 AND CASE WHEN SalarySlab = ''Upto 5k''
        THEN RecommendedRaisePct <= 0.15 WHEN SalarySlab = ''5k-10k'' THEN RecommendedRaisePct
        <= 0.12 WHEN SalarySlab = ''10k-15k'' THEN RecommendedRaisePct <= 0.10 WHEN
        SalarySlab = ''15k+'' THEN RecommendedRaisePct <= 0.08 ELSE false END", ''raise_within_slab_cap'')'
      sources:
      - start_line: 50
        end_line: 55
        file: ''
      - start_line: 70
        end_line: 75
        file: ''
      uid: 102980eb-205b-4520-93a1-e8aafc9627cc
    - text: '''NewMonthlyIncome'' must equal ''MonthlyIncome'' * (1 + ''RecommendedRaisePct'')
        within rounding tolerance of 0.01. We could represent this assumption as a
        deequ constraint like this: .satisfies(''abs(NewMonthlyIncome - (MonthlyIncome
        * (1 + RecommendedRaisePct))) <= 0.01'', ''new_income_matches_raise'')'
      sources:
      - start_line: 77
        end_line: 77
        file: ''
      - start_line: 98
        end_line: 99
        file: ''
      uid: a8f45545-37f3-4bc2-b2d1-3a86ce447a3c
  '["YearsAtCompany","YearsInCurrentRole","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'YearsInCurrentRole must be bounded by total tenure: 0 <= YearsInCurrentRole
        <= YearsAtCompany. This ensures the role tenure ratio stays within [0, 1]
        without relying on clipping or inf/NaN handling. Example Deequ constraints:
        .isLessThanOrEqual(''YearsInCurrentRole'',''YearsAtCompany'') and Compliance(''nonneg_role_company_tenure'',''YearsInCurrentRole
        >= 0 AND YearsAtCompany >= 0'').'
      sources:
