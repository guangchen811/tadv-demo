        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 1010286a-54f1-48f4-8802-6002fd05c681
    - text: 'Zero-tenure consistency (role): If YearsAtCompany = 0, then YearsInCurrentRole
        must be 0 (to avoid undefined/hidden infinities in the role/tenure ratio).
        Expressible as Deequ: .satisfies("CASE WHEN YearsAtCompany = 0 THEN YearsInCurrentRole
        = 0 ELSE true END", "zero_tenure_requires_zero_role_years")'
      sources:
