    - text: 'For all employees with nonzero tenure, time in current role must not
        exceed total tenure: YearsInCurrentRole <= YearsAtCompany when YearsAtCompany
        > 0. Expressible as Deequ: .satisfies("(YearsAtCompany = 0) OR (YearsInCurrentRole
        <= YearsAtCompany)", "role_time_le_company_tenure")'
      sources:
