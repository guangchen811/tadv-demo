    assumptions:
    - text: 'SalarySlab and MonthlyIncome must be range-consistent on every row: Upto
        5k -> 0 < MonthlyIncome <= 5000; 5k-10k -> 5000 < MonthlyIncome <= 10000;
        10k-15k -> 10000 < MonthlyIncome <= 15000; 15k+ -> MonthlyIncome > 15000.
        This can be represented as a Deequ row-level satisfies constraint with a CASE
        expression that enforces the appropriate bounds for each slab (expected pass
        fraction = 1.0).'
