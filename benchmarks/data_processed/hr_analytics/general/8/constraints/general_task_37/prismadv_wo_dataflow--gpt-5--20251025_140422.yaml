    assumptions:
    - text: 'Tenure monotonicity: For every record, YearsInCurrentRole and YearsSinceLastPromotion
        must be non-negative and must not exceed YearsAtCompany. This avoids division-by-zero/infinite
        ratios and negative stagnation. Deequ example: .satisfies(''YearsInCurrentRole
        >= 0 AND YearsSinceLastPromotion >= 0 AND YearsInCurrentRole <= YearsAtCompany
        AND YearsSinceLastPromotion <= YearsAtCompany'', ''tenure_monotonicity'',
