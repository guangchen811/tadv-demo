    - text: For every SalarySlab present in the data, the median MonthlyIncome used
        to compute CompaRatio must be defined, finite, and strictly positive (no zero
        or null medians per slab). This can be represented with per-slab constraints
        such as Deequ hasApproxQuantile("MonthlyIncome", 0.5, q -> q > 0) with where
        filters for each SalarySlab.
