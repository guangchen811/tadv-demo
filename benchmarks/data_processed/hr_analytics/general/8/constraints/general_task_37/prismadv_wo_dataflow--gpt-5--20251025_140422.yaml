      - start_line: 42
        end_line: 49
        file: ''
      uid: 8c631b4c-4342-4088-b585-3f88a4fab040
    - text: 'Slab medians should be monotonically non-decreasing with the defined
        slab order [''Upto 5k'', ''5k-10k'', ''10k-15k'', ''15k+'']: median(MonthlyIncome
        | ''Upto 5k'') <= median(... | ''5k-10k'') <= median(... | ''10k-15k'') <=
        median(... | ''15k+''). This can be validated by computing per-slab medians
        (e.g., via Deequ approx quantiles by slab or a pre-check aggregation) and
        asserting pairwise inequalities in the defined order.'
