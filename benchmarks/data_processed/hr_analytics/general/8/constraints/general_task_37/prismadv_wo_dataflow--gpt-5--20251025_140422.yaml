    code:
    - suggestion: '.satisfies("(SalarySlab = ''Upto 5k'' AND MonthlyIncome > 0 AND
        MonthlyIncome <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000
        AND MonthlyIncome <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome
