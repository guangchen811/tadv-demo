      - start_line: 57
        end_line: 61
        file: ''
      uid: 132d456e-4918-44cc-8666-40bd59fc42d0
    - text: 'Slab bands must not overlap when looking at group extrema: for SalarySlab
        = ''Upto 5k'', max(MonthlyIncome) <= 5000; for ''5k-10k'', min(MonthlyIncome)
        > 5000 and max(MonthlyIncome) <= 10000; for ''10k-15k'', min(MonthlyIncome)
        > 10000 and max(MonthlyIncome) <= 15000; for ''15k+'', min(MonthlyIncome)
        > 15000. This can be encoded as Deequ grouped constraints using where filters
        with hasMin/hasMax per slab.'
