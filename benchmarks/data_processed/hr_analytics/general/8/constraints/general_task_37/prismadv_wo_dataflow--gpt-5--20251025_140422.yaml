    - text: 'Promotion eligibility rule coherence across columns: If EligibleForPromotion
        is true, then all gating conditions must hold simultaneously: PerformanceRating
        >= 4 AND YearsInCurrentRole >= requiredYearsByStage(CareerStage) AND YearsSinceLastPromotion
