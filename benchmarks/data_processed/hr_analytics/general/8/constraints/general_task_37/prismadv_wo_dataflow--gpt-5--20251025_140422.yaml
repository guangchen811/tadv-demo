        >= CASE CareerStage WHEN ''early'' THEN 2 WHEN ''mid'' THEN 2 WHEN ''senior''
        THEN 1 WHEN ''late'' THEN 1 ELSE 2 END)", ''promo_eligibility_consistency'',
