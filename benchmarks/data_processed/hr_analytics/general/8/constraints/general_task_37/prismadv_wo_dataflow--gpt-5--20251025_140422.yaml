  '["YearsAtCompany","YearsInCurrentRole"]':
    code: []
    assumptions:
    - text: 'YearsInCurrentRole must be less than or equal to YearsAtCompany (an employee
        cannot be in their current role longer than their total tenure). This also
        implies the ratio YearsInCurrentRole / YearsAtCompany should be in [0, 1]
        whenever YearsAtCompany > 0. Deequ example: .satisfies(''YearsInCurrentRole
        >= 0 and YearsAtCompany >= 0 and YearsInCurrentRole <= YearsAtCompany'', ''tenure_consistency'')
        and .satisfies(''YearsAtCompany == 0 or (YearsInCurrentRole / YearsAtCompany)
        <= 1'', ''role_ratio_bounded'')'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 6fbdc8df-c178-4269-a022-a173af3983c9
    - text: 'If YearsAtCompany equals 0, then YearsInCurrentRole must also equal 0
        (to avoid undefined division and to reflect that zero tenure implies zero
        time in role). Deequ example: .satisfies(''not(YearsAtCompany == 0 and YearsInCurrentRole
        > 0)'', ''no_role_with_zero_company_years'')'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      uid: a5232273-be6e-4cdc-aa11-21f93cbad1e9
    - text: 'YearsSinceLastPromotion must be less than or equal to YearsAtCompany
        (stagnation_years = YearsAtCompany - YearsSinceLastPromotion should be non-negative).
        Deequ example: .satisfies(''YearsSinceLastPromotion >= 0 and YearsAtCompany
        >= YearsSinceLastPromotion'', ''promotion_tenure_consistency'')'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 88
        end_line: 91
        file: ''
      uid: c78bf09c-5e27-4492-9d3f-1f9bc88487f5
    - text: 'MonthlyIncome should fall within the numeric bounds implied by SalarySlab
        (e.g., ''Upto 5k'' in (0, 5000], ''5k-10k'' in (5000, 10000], etc.). This
        ensures slab medians and caps are meaningful. Deequ example: .satisfies("(SalarySlab
        == ''Upto 5k'' and MonthlyIncome > 0 and MonthlyIncome <= 5000) or (SalarySlab
        == ''5k-10k'' and MonthlyIncome > 5000 and MonthlyIncome <= 10000) or (SalarySlab
        == ''10k-15k'' and MonthlyIncome > 10000 and MonthlyIncome <= 15000) or (SalarySlab
        == ''15k+'' and MonthlyIncome > 15000)", ''income_within_slab_bounds'')'
      sources:
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 37631d8e-b1d6-4888-b485-99b42ea609e7
  '["YearsAtCompany","YearsInCurrentRole","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'YearsInCurrentRole must be less than or equal to YearsAtCompany. Additionally,
        if YearsAtCompany = 0 (new hires), then YearsInCurrentRole must be 0. We could
        represent this as Deequ constraints: .satisfies("YearsInCurrentRole <= YearsAtCompany",
        "role_time_leq_company_tenure") and .satisfies("CASE WHEN YearsAtCompany =
        0 THEN YearsInCurrentRole = 0 ELSE true END", "zero_tenure_zero_role_time").'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: d7664553-b955-4498-a95b-8e0352e068f9
    - text: 'YearsSinceLastPromotion must be less than or equal to YearsAtCompany
        (i.e., stagnation_years = YearsAtCompany - YearsSinceLastPromotion is non-negative).
        Also, if YearsAtCompany = 0, then YearsSinceLastPromotion must be 0. We could
        represent this as Deequ constraints: .satisfies("YearsAtCompany - YearsSinceLastPromotion
        >= 0", "non_negative_stagnation_years") and .satisfies("CASE WHEN YearsAtCompany
        = 0 THEN YearsSinceLastPromotion = 0 ELSE true END", "zero_tenure_zero_years_since_promo").'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      uid: d81b94fd-1068-48ff-bf1a-66d197bc704a
    - text: 'For rows with YearsAtCompany > 0, the ratio YearsInCurrentRole / YearsAtCompany
        must be between 0 and 1 (inclusive). If YearsAtCompany = 0, enforce YearsInCurrentRole
        = 0 (so the ratio is well-defined as 0). We could represent this as a Deequ
        constraint: .satisfies("CASE WHEN YearsAtCompany > 0 THEN (YearsInCurrentRole
        / YearsAtCompany) >= 0 AND (YearsInCurrentRole / YearsAtCompany) <= 1 ELSE
        YearsInCurrentRole = 0 END", "bounded_role_time_ratio").'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 2ce8cd82-8dfd-4b1d-8c8d-11fa2248d1f4
    - text: 'Joint completeness: Rows must have non-null values simultaneously for
        YearsAtCompany, YearsInCurrentRole, and YearsSinceLastPromotion because they
        are used together in arithmetic and eligibility logic. Representable as Deequ:
        .satisfies("YearsAtCompany IS NOT NULL AND YearsInCurrentRole IS NOT NULL
        AND YearsSinceLastPromotion IS NOT NULL", "tenure_fields_complete").'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 88
        end_line: 91
        file: ''
      uid: 82168513-b7a1-42a7-8337-63edfb21e557
    - text: 'All tenure-related fields must be non-negative integers: YearsAtCompany
        >= 0, YearsInCurrentRole >= 0, YearsSinceLastPromotion >= 0. This avoids invalid
        ratios and square roots. Representable as Deequ: .satisfies("YearsAtCompany
        >= 0 AND YearsInCurrentRole >= 0 AND YearsSinceLastPromotion >= 0", "tenure_fields_non_negative").'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      uid: b23fe348-fbdb-41b5-abce-02b9ed2e40f4
  '["YearsAtCompany","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'Company tenure must not be less than time since last promotion: YearsAtCompany
        >= YearsSinceLastPromotion for every record. This prevents negative stagnation_years
        before taking sqrt. Example Deequ: .satisfies(''YearsAtCompany >= YearsSinceLastPromotion'',
        ''tenure_ge_last_promo'')'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      uid: d4eceeb2-43bb-4f8b-9618-2ecc176adcff
    - text: 'Time in current role must not exceed total company tenure: YearsInCurrentRole
        <= YearsAtCompany. This keeps the role tenure ratio naturally <= 1 before
        clipping. Example Deequ: .satisfies(''YearsInCurrentRole <= YearsAtCompany'',
        ''role_le_company_tenure'')'
      sources:
      - start_line: 28
        end_line: 28
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: b629f557-3e62-48d1-b280-d6f5d35238fb
    - text: 'Zero-tenure rows must have zero years in current role and zero years
        since last promotion to avoid division by zero and undefined ratios: (YearsAtCompany
        > 0) OR ((YearsInCurrentRole = 0) AND (YearsSinceLastPromotion = 0)). Example
        Deequ: .satisfies(''(YearsAtCompany > 0) OR ((YearsInCurrentRole = 0) AND
        (YearsSinceLastPromotion = 0))'', ''zero_tenure_implies_zero_role_and_promo'')'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      uid: e254885b-6c4d-4a31-84d7-852f4ecf61bc
    - text: 'MonthlyIncome must align with the declared SalarySlab bounds: (SalarySlab
        = ''Upto 5k'' AND MonthlyIncome > 0 AND MonthlyIncome <= 5000) OR (SalarySlab
        = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab
        = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab
        = ''15k+'' AND MonthlyIncome > 15000). Example Deequ: .satisfies("(SalarySlab
        = ''Upto 5k'' AND MonthlyIncome > 0 AND MonthlyIncome <= 5000) OR (SalarySlab
        = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab
        = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab
        = ''15k+'' AND MonthlyIncome > 15000)", ''income_within_slab_bounds'')'
      sources:
