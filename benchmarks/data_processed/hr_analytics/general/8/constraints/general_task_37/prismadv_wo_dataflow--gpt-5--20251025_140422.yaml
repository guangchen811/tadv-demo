    - text: 'AgeGroup-to-CareerStage mapping must be consistent: CareerStage must
        equal the deterministic mapping from AgeGroup: {''18-25'',''26-35'' -> ''early'';
        ''36-45'' -> ''mid''; ''46-55'' -> ''senior''; ''55+'' -> ''late''}. Deequ
        example (after deriving CareerStage): .satisfies("CASE WHEN AgeGroup IN (''18-25'',''26-35'')
        THEN ''early'' WHEN AgeGroup = ''36-45'' THEN ''mid'' WHEN AgeGroup = ''46-55''
        THEN ''senior'' WHEN AgeGroup = ''55+'' THEN ''late'' ELSE ''unknown'' END
        = CareerStage", ''agegroup_to_careerstage_consistency'', 1.0)'
