    assumptions:
    - text: 'The columns `PerformanceRating`, `YearsInCurrentRole`, `YearsSinceLastPromotion`,
        and `JobLevel` are used together to determine promotion eligibility. The code
        assumes that it''s possible for an employee to meet all the specified criteria
        simultaneously. Therefore, the dataset is expected to contain records where
        `PerformanceRating` is 4, `YearsInCurrentRole` is 2 or more, `YearsSinceLastPromotion`
        is 1 or more, and `JobLevel` is less than 5.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("PerformanceRating = 4 AND YearsInCurrentRole >= 2 AND YearsSinceLastPromotion
        >= 1 AND JobLevel < 5", "At least one employee should be eligible for promotion",
        lambda count: count > 0)'
