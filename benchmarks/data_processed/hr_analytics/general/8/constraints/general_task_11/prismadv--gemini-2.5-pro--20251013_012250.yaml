        end_line: 52
        file: ''
      uid: b114df93-788d-4d88-98e1-e3824b61f5ac
    - text: 'The calculation of `promotion_amount` depends on both `JobLevel` (to
        determine `promotion_raise_pct`) and `MonthlyIncome`. The business logic implicitly
        assumes a positive correlation between `JobLevel` and `MonthlyIncome`. As
        an employee''s `JobLevel` increases, their `MonthlyIncome` is also expected
        to be higher. This ensures that the promotion raises are applied to a logical
        salary base. A data validation check could verify that `JobLevel` and `MonthlyIncome`
        have a positive correlation.

        We could represent this assumption as a deequ constraint like this:

        .correlates("JobLevel", "MonthlyIncome", _ > 0.3)'
