    assumptions:
    - text: 'The ''SalarySlab'' for an employee must be consistent with their ''MonthlyIncome''.
        The script uses ''SalarySlab'' to determine rate caps and eligibility for
        certain pools, but uses ''MonthlyIncome'' for the final monetary calculations.
        An inconsistency, such as a ''MonthlyIncome'' of $16,000 for an employee in
        the ''Upto 5k'' salary slab, would lead to incorrect budget and compensation
        calculations. This relationship can be validated with a set of conditional
        checks, for example: IF ''SalarySlab'' = ''Upto 5k'' THEN ''MonthlyIncome''
        <= 5000; IF ''SalarySlab'' = ''5k-10k'' THEN ''MonthlyIncome'' > 5000 AND
        ''MonthlyIncome'' <= 10000, and so on. A Deequ constraint could be: .satisfy("CASE
        WHEN SalarySlab = ''Upto 5k'' THEN MonthlyIncome <= 5000 WHEN SalarySlab =
        ''5k-10k'' THEN (MonthlyIncome > 5000 AND MonthlyIncome <= 10000) WHEN SalarySlab
        = ''10k-15k'' THEN (MonthlyIncome > 10000 AND MonthlyIncome <= 15000) WHEN
        SalarySlab = ''15k+'' THEN MonthlyIncome > 15000 ELSE FALSE END", "Slab_Income_Consistency")'
      sources:
      - start_line: 31
        end_line: 32
        file: ''
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 59
        end_line: 61
        file: ''
      uid: 903f24e0-0344-4891-8bf5-0e6d1d4deefd
    - text: 'There is an assumed positive correlation between ''PerformanceRating''
        and ''PercentSalaryHike''. The code calculates a base merit percentage by
        taking the minimum of a guideline percentage (derived from ''PerformanceRating'')
        and the actual ''PercentSalaryHike''. This logic implies that an employee''s
        actual salary hike is expected to be at or above the guideline for their performance
        level (e.g., >=12% for rating 3, >=18% for rating 4). A significant deviation
        would indicate a data anomaly or a compensation practice that contradicts
        the model''s logic. A Deequ constraint could check this correlation: .correlate(''PerformanceRating'',
        ''PercentSalaryHike'', _ >= 0.3)'
      sources:
      - start_line: 28
        end_line: 28
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      uid: 9797f365-1718-4c27-8fad-01afaebb01b2
    - text: The code creates an 'emerging_talent_amount' based on 'MonthlyIncome'
        for the '26-35' 'AgeGroup'. This implies a business assumption that this age
        group does not contain a disproportionate number of the highest earners, which
        would cause the budget for this supplement to be unexpectedly large. Therefore,
        the income distribution for the '26-35' 'AgeGroup' is expected to be in line
        with or lower than that of more senior age groups. A Deequ constraint could
        verify this by comparing the average 'MonthlyIncome' of the '26-35' age group
        against the average income of the '36-45' age group.
      sources:
      - start_line: 63
        end_line: 65
        file: ''
      uid: 61e525db-2397-432a-bace-f7f78e64769e
