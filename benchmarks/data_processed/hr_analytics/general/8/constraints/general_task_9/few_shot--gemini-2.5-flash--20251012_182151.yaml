constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  BusinessTravel:
    code:
    - - .isComplete('BusinessTravel')
      - Valid
    - - .isContainedIn('BusinessTravel', ['TravelRarely', 'Travel_Frequently', 'Travel_Rarely',
        'Non-Travel'])
      - Valid
    assumptions: []
  DailyRate:
    code:
    - - .isComplete('DailyRate')
      - Valid
    - - .isNonNegative('DailyRate')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
