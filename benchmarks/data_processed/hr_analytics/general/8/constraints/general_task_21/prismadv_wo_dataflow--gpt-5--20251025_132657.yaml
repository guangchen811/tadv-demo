        end_line: 67
        file: ''
      uid: dd474bee-071a-4c6f-a386-e34ed07e42ff
    - text: YearsAtCompany should be non-negative because it represents a tenure in
        years and is used within square-root based indices; negative values would
        be semantically invalid and could distort gap-based features. This can be
        represented as isNonNegative('YearsAtCompany').
