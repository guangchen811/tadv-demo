    assumptions:
    - text: 'YearsAtCompany must be numeric (parsable as a number) for all or nearly
        all rows. The code coerces non-numeric values to NaN and performs arithmetic
        and sqrt operations without imputation, so non-numeric inputs would propagate
        NaNs into the risk score. This can be represented as a constraint such as:
        hasDataType(''YearsAtCompany'', Numeric) and/or satisfies(''CASE WHEN TRY_CAST(`YearsAtCompany`
