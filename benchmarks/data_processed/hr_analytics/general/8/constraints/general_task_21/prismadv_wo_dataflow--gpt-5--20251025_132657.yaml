    - text: 'Functional dependency: Age uniquely determines AgeGroup (Age -> AgeGroup).
        There should be no two rows with the same Age but different AgeGroup. This
        can be enforced with a constraint like: hasFunctionalDependency(''Age'', [''AgeGroup'']).'
