        end_line: 68
        file: ''
      uid: ded9d78b-2b01-48f9-8845-049171fc69ad
    - text: YearsAtCompany should not be null. It is used directly in difference and
        square-root computations and later in the risk score without any null handling;
        nulls would yield NaN intermediate values and NaN risk. This can be represented
        as completeness('YearsAtCompany') == 1.0 (or >= 0.999).
      sources:
      - start_line: 65
        end_line: 68
        file: ''
      - start_line: 119
        end_line: 124
        file: ''
      uid: 12c607bd-3fe1-4316-af11-358201b14f69
    - text: 'For rows where both YearsAtCompany and YearsInCurrentRole are present,
        YearsAtCompany must be greater than or equal to YearsInCurrentRole so that
        role_gap = YearsAtCompany - YearsInCurrentRole is non-negative and sqrt(role_gap)
        is defined. This can be represented as satisfies(''(`YearsAtCompany` - `YearsInCurrentRole`)
        >= 0 OR `YearsAtCompany` IS NULL OR `YearsInCurrentRole` IS NULL'', ''role_gap
        non-negative when present'', lambda x: x == 1).'
      sources:
      - start_line: 66
        end_line: 68
        file: ''
      uid: 15d4268d-bbd4-479a-8e84-ac8e9cb256ed
    - text: 'For rows where both YearsAtCompany and TotalWorkingYears are present,
        YearsAtCompany must be less than or equal to TotalWorkingYears so that exp_gap
        = TotalWorkingYears - YearsAtCompany is non-negative and sqrt(exp_gap) is
        defined. This can be represented as satisfies(''(`TotalWorkingYears` - `YearsAtCompany`)
        >= 0 OR `TotalWorkingYears` IS NULL OR `YearsAtCompany` IS NULL'', ''experience
        gap non-negative when present'', lambda x: x == 1).'
      sources:
