  '["Age","AgeGroup"]':
    code: []
    assumptions:
    - text: 'AgeGroup is a deterministic bucketization of Age using the exact rules:
        Age >= 55 -> ''55+'', 46 <= Age < 55 -> ''46-55'', 36 <= Age < 46 -> ''36-45'',
        26 <= Age < 36 -> ''26-35'', and Age < 26 -> ''18-25''. For every record,
