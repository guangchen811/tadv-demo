constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isComplete('AgeGroup')
      - Valid
    - - .isContainedIn('AgeGroup', ['18-25','26-35','36-45','46-55','55+'])
      - Valid
    - - '.satisfies(''(Age >= 55 AND AgeGroup = \''55+\'') OR (Age >= 46 AND Age <
        55 AND AgeGroup = \''46-55\'') OR (Age >= 36 AND Age < 46 AND AgeGroup = \''36-45\'')
        OR (Age >= 26 AND Age < 36 AND AgeGroup = \''26-35\'') OR (Age < 26 AND AgeGroup
        = \''18-25\'')'', ''age_matches_group'', lambda d: d == 1.0)'
      - Invalid
    assumptions: []
  Attrition:
    code:
    - - .isComplete('Attrition')
      - Valid
    - - .isContainedIn('Attrition', ['Yes','No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isComplete('Department')
      - Valid
    - - .isContainedIn('Department', ['Sales','Research & Development','Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  JobRole:
    code:
    - - .isComplete('JobRole')
      - Valid
    - - '.satisfies(''(NOT (JobRole IN (\''Research Scientist\'',\''Laboratory Technician\'',\''Research
        Director\'',\''Manufacturing Director\'',\''Sales Executive\'',\''Sales Representative\'',\''Healthcare
        Representative\''))) OR ((JobRole IN (\''Research Scientist\'',\''Laboratory
        Technician\'',\''Research Director\'',\''Manufacturing Director\'') AND Department
        = \''Research & Development\'') OR (JobRole IN (\''Sales Executive\'',\''Sales
        Representative\'',\''Healthcare Representative\'') AND Department = \''Sales\''))'',
        ''jobrole_department_consistency'', lambda d: d == 1.0)'
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isComplete('MonthlyIncome')
      - Valid
    - - .isPositive('MonthlyIncome')
      - Valid
    - - '.satisfies(''((MonthlyIncome > 0 AND MonthlyIncome <= 5000 AND SalarySlab
        = \''Upto 5k\'') OR (MonthlyIncome > 5000 AND MonthlyIncome <= 10000 AND SalarySlab
        = \''5k-10k\'') OR (MonthlyIncome > 10000 AND MonthlyIncome <= 15000 AND SalarySlab
        = \''10k-15k\'') OR (MonthlyIncome > 15000 AND SalarySlab = \''15k+\''))'',
        ''salary_slab_consistent_with_income'', lambda d: d == 1.0)'
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isComplete('OverTime')
      - Valid
    - - .isContainedIn('OverTime', ['Yes','No'])
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k','5k-10k','10k-15k','15k+'])
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isComplete('TotalWorkingYears')
      - Valid
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    - - '.satisfies(''TotalWorkingYears >= YearsAtCompany'', ''total_ge_company'',
        lambda d: d == 1.0)'
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isComplete('YearsAtCompany')
      - Valid
    - - .isNonNegative('YearsAtCompany')
      - Valid
    - - '.satisfies(''YearsAtCompany >= YearsInCurrentRole'', ''company_ge_role'',
        lambda d: d == 1.0)'
      - Valid
    assumptions: []
  YearsInCurrentRole:
    code:
    - - .isComplete('YearsInCurrentRole')
      - Valid
    - - .isNonNegative('YearsInCurrentRole')
      - Valid
    assumptions: []
