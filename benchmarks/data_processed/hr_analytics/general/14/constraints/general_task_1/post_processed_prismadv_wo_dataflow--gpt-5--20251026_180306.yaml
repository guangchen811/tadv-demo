    assumptions:
    - text: "Row-wise satisfaction composite uses three columns on the same 1\u2013\
        4 Likert scale: the average of JobSatisfaction, EnvironmentSatisfaction, and\
        \ WorkLifeBalance must lie in [1, 4] for every record (so the un-clipped dissatisfaction\
        \ 1 - (avg - 1)/3 stays within [0, 1]). Deequ-style: .satisfies('((JobSatisfaction\
        \ + EnvironmentSatisfaction + WorkLifeBalance)/3) >= 1 AND ((JobSatisfaction\
        \ + EnvironmentSatisfaction + WorkLifeBalance)/3) <= 4', 'sat_mean_in_1_4')."
      sources:
      - start_line: 86
        end_line: 91
        file: ''
      uid: f8874b91-faec-4424-bb59-70cb1977331a
    - text: 'All three satisfaction columns must be simultaneously present (non-null)
        on each row to ensure a comparable mean across the same number of inputs.
        Deequ-style: .satisfies(''JobSatisfaction IS NOT NULL AND EnvironmentSatisfaction
        IS NOT NULL AND WorkLifeBalance IS NOT NULL'', ''satisfaction_all_present'').'
      sources:
      - start_line: 86
        end_line: 88
        file: ''
      uid: f8f5320d-f3c3-4c90-b388-019d44edf11a
    - text: 'MonthlyIncome must be consistent with SalarySlab on every row: (SalarySlab
        = ''Upto 5k'' => 0 < MonthlyIncome <= 5000) OR (SalarySlab = ''5k-10k'' =>
        5000 < MonthlyIncome <= 10000) OR (SalarySlab = ''10k-15k'' => 10000 < MonthlyIncome
        <= 15000) OR (SalarySlab = ''15k+'' => MonthlyIncome > 15000). Deequ-style:
        .satisfies("(SalarySlab = ''Upto 5k'' AND MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) OR (SalarySlab = ''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab = ''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome > 15000)", ''salary_slab_row_consistency'').'
      sources:
      - start_line: 30
        end_line: 35
        file: ''
      uid: b4149568-0948-4dd5-99ee-4bc3ad637094
    - text: 'Median MonthlyIncome must increase monotonically with ordered SalarySlab
        categories and every slab must have at least one row (so medians are defined
        and progression logs are finite). Concretely: median(''Upto 5k'') < median(''5k-10k'')
        < median(''10k-15k'') < median(''15k+'').'
      sources:
      - start_line: 37
        end_line: 42
        file: ''
      uid: 13b49761-d419-4ce3-a641-7de9c010042b
    - text: "Department\u2013JobRole combinations must be valid: if Department = 'Sales'\
        \ then JobRole \u2208 {'Sales Executive','Sales Representative'}; if Department\
        \ = 'Research & Development' then JobRole \u2208 {'Research Scientist','Laboratory\
        \ Technician','Research Director','Manufacturing Director'}; if Department\
        \ = 'Human Resources' then JobRole \u2208 {'Human Resources'}. Deequ-style:\
        \ .satisfies(\"(Department = 'Sales' AND JobRole IN ('Sales Executive','Sales\
        \ Representative')) OR (Department = 'Research & Development' AND JobRole\
        \ IN ('Research Scientist','Laboratory Technician','Research Director','Manufacturing\
        \ Director')) OR (Department = 'Human Resources' AND JobRole IN ('Human Resources'))\"\
        , 'dept_role_mapping')."
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      uid: 7ae6c8d6-2392-44ff-bd2e-567bee2c1cb5
    - text: 'Age must be consistent with AgeGroup: (AgeGroup=''18-25'' => 18 <= Age
        AND Age <= 25), (AgeGroup=''26-35'' => 26 <= Age AND Age <= 35), (AgeGroup=''36-45''
        => 36 <= Age AND Age <= 45), (AgeGroup=''46-55'' => 46 <= Age AND Age <= 55),
        (AgeGroup=''55+'' => Age >= 55). Deequ-style: .satisfies("(AgeGroup=''18-25''
        AND Age BETWEEN 18 AND 25) OR (AgeGroup=''26-35'' AND Age BETWEEN 26 AND 35)
        OR (AgeGroup=''36-45'' AND Age BETWEEN 36 AND 45) OR (AgeGroup=''46-55'' AND
        Age BETWEEN 46 AND 55) OR (AgeGroup=''55+'' AND Age >= 55)", ''age_agegroup_alignment'').'
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 100
        end_line: 109
        file: ''
      uid: 0643a07c-d12e-4d62-990c-924644fc02a0
    - text: 'Tenure fields must be logically ordered per row: TotalWorkingYears >=
        YearsAtCompany >= 0 and YearsWithCurrManager <= YearsAtCompany (when YearsWithCurrManager
        is not null). Deequ-style: .satisfies(''TotalWorkingYears >= YearsAtCompany
        AND YearsAtCompany >= 0 AND (YearsWithCurrManager IS NULL OR YearsWithCurrManager
        <= YearsAtCompany)'', ''tenure_field_ordering'').'
      sources:
      - start_line: 58
        end_line: 61
        file: ''
      uid: 58a79d59-44b2-4cbf-826b-2f9ad89f28e3
    - text: 'Career start age must be plausible: Age - TotalWorkingYears >= 15 for
        each row (so the derived career_start_signal does not rely on clipping to
        remove negative values). Deequ-style: .satisfies(''(Age - TotalWorkingYears)
        >= 15'', ''career_start_age_plausible'').'
      sources:
      - start_line: 59
        end_line: 66
        file: ''
      uid: 1d5617ac-5aca-4d02-99f5-80cde0c9fcef
    - text: 'Promotion timing must be bounded by tenure: when YearsAtCompany > 0,
        YearsSinceLastPromotion <= YearsAtCompany (so the ratio used in no_promo_signal
        does not exceed 1 before clipping). Deequ-style: .satisfies(''(YearsAtCompany
        = 0) OR (YearsSinceLastPromotion <= YearsAtCompany)'', ''promotion_within_tenure'').'
      sources:
      - start_line: 92
        end_line: 97
        file: ''
      uid: 204b7b0b-f3e4-4a04-9c23-96bb79c731f3
    - text: "OverTime \xD7 Attrition calibration requires both OverTime groups to\
        \ exist: there must be at least one row with OverTime='Yes' and at least one\
        \ with OverTime='No' to compute both conditional attrition rates used in the\
        \ OT multiplier. Deequ-style: .hasSetSize('OverTime', _ >= 2) AND .satisfies(\"\
        SUM(CASE WHEN OverTime='Yes' THEN 1 ELSE 0 END) > 0 AND SUM(CASE WHEN OverTime='No'\
        \ THEN 1 ELSE 0 END) > 0\", 'overtime_groups_present')."
      sources:
      - start_line: 74
        end_line: 83
        file: ''
