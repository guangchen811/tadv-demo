  '["Department","JobRole"]':
    code: []
    assumptions:
    - text: "Department-JobRole pairs must follow a fixed mapping: if Department =\
        \ 'Sales' then JobRole \u2208 {'Sales Executive','Sales Representative'};\
        \ if Department = 'Research & Development' then JobRole \u2208 {'Research\
        \ Scientist','Laboratory Technician','Research Director','Manufacturing Director'};\
        \ if Department = 'Human Resources' then JobRole = 'Human Resources'. Department\
        \ values are restricted to {'Sales','Research & Development','Human Resources'}.\
        \ Deequ example: .satisfies(\"((Department = 'Sales' AND JobRole IN ('Sales\
        \ Executive','Sales Representative')) OR (Department = 'Research & Development'\
        \ AND JobRole IN ('Research Scientist','Laboratory Technician','Research Director','Manufacturing\
        \ Director')) OR (Department = 'Human Resources' AND JobRole = 'Human Resources'))\"\
        , \"dept_jobrole_mapping\", lambda v: v == 1.0)"
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      uid: 0405d47e-9452-465f-8ceb-df8a955edbd9
    - text: "SalarySlab and MonthlyIncome must be row-wise consistent with slab boundaries:\
        \ 'Upto 5k' => 0 < MonthlyIncome \u2264 5000; '5k-10k' => 5000 < MonthlyIncome\
        \ \u2264 10000; '10k-15k' => 10000 < MonthlyIncome \u2264 15000; '15k+' =>\
        \ MonthlyIncome > 15000. SalarySlab must be one of ['Upto 5k','5k-10k','10k-15k','15k+'].\
        \ Deequ example: .satisfies(\"((SalarySlab = 'Upto 5k' AND MonthlyIncome >\
        \ 0 AND MonthlyIncome <= 5000) OR (SalarySlab = '5k-10k' AND MonthlyIncome\
        \ > 5000 AND MonthlyIncome <= 10000) OR (SalarySlab = '10k-15k' AND MonthlyIncome\
        \ > 10000 AND MonthlyIncome <= 15000) OR (SalarySlab = '15k+' AND MonthlyIncome\
        \ > 15000))\", \"salaryslab_income_consistency\", lambda v: v == 1.0)"
      sources:
      - start_line: 25
        end_line: 35
        file: ''
      uid: 4f4829d6-931e-4948-85f8-260a5a84bc16
    - text: "Age and AgeGroup must be mutually consistent: 18\u201325 => '18-25';\
        \ 26\u201335 => '26-35'; 36\u201345 => '36-45'; 46\u201355 => '46-55'; 56+\
        \ => '55+'. AgeGroup must be in {'18-25','26-35','36-45','46-55','55+'}. Deequ\
        \ example: .satisfies(\"((Age >= 18 AND Age <= 25 AND AgeGroup = '18-25')\
        \ OR (Age >= 26 AND Age <= 35 AND AgeGroup = '26-35') OR (Age >= 36 AND Age\
        \ <= 45 AND AgeGroup = '36-45') OR (Age >= 46 AND Age <= 55 AND AgeGroup =\
        \ '46-55') OR (Age >= 56 AND AgeGroup = '55+'))\", \"age_agegroup_consistency\"\
        , lambda v: v == 1.0)"
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 101
        end_line: 109
        file: ''
      uid: a40c43d9-a413-494e-86fe-bc2310535d89
    - text: 'Tenure fields must satisfy logical ordering across columns: TotalWorkingYears
        >= YearsAtCompany and YearsWithCurrManager <= YearsAtCompany (when both are
        non-null). This prevents negative external experience and ensures manager_ratio
        naturally lies within [0,1]. Deequ example: .satisfies("(TotalWorkingYears
        >= YearsAtCompany) AND (YearsWithCurrManager <= YearsAtCompany)", "tenure_ordering_consistency",
        lambda v: v == 1.0)'
      sources:
      - start_line: 58
        end_line: 61
        file: ''
      uid: c3abcef9-f0f0-40fd-80cf-1ad3586c4ccd
  '["Department","SalarySlab"]':
    code: []
    assumptions:
    - text: 'Per-row pay band consistency: SalarySlab determines the valid MonthlyIncome
        interval. Required mapping: Upto 5k => 0 < MonthlyIncome <= 5000; 5k-10k =>
        5000 < MonthlyIncome <= 10000; 10k-15k => 10000 < MonthlyIncome <= 15000;
        15k+ => MonthlyIncome > 15000. This must hold for every record.'
      sources:
      - start_line: 25
        end_line: 35
        file: ''
      uid: fd391bf4-b075-4e9f-ae97-307dcee88001
    - text: Across the ordered SalarySlab categories [Upto 5k, 5k-10k, 10k-15k, 15k+],
        the median MonthlyIncome by slab must be strictly increasing and strictly
        positive, i.e., median(next) > median(prev) for each adjacent pair. This avoids
        nonpositive ratios in the log used for progression_index.
      sources:
      - start_line: 36
        end_line: 42
        file: ''
      uid: 57bca81d-827f-4589-8a7c-1ecd457a1ee8
    - text: "Department\u2013JobRole integrity: JobRole must be compatible with Department.\
        \ If Department = Sales then JobRole \u2208 {Sales Executive, Sales Representative};\
        \ if Department = Research & Development then JobRole \u2208 {Research Scientist,\
        \ Laboratory Technician, Research Director, Manufacturing Director}; if Department\
        \ = Human Resources then JobRole = Human Resources. All rows should satisfy\
        \ this mapping."
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      uid: f8347d26-8f2b-49c6-9d98-bd2d3f72c898
    - text: "Age\u2013AgeGroup consistency: AgeGroup must match the numeric Age. 18-25\
        \ => 18 <= Age <= 25; 26-35 => 26 <= Age <= 35; 36-45 => 36 <= Age <= 45;\
        \ 46-55 => 46 <= Age <= 55; 55+ => Age >= 55. All rows should satisfy the\
        \ appropriate implication so that age-based weights are valid."
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 100
        end_line: 109
        file: ''
      uid: b7b623f8-3cd1-4124-8e5c-6d41585e01da
    - text: 'Tenure and experience logical relations across columns must hold: TotalWorkingYears
        >= YearsAtCompany; YearsWithCurrManager between 0 and YearsAtCompany; YearsSinceLastPromotion
        between 0 and YearsAtCompany; and Age - TotalWorkingYears >= 15 (plausible
        career start age). These ensure valid square roots, ratios, and clamped signals
        downstream.'
      sources:
      - start_line: 58
        end_line: 66
        file: ''
      - start_line: 92
        end_line: 97
        file: ''
      uid: f53b38d6-ac06-45e5-99cc-a5459e2bc17e
    - text: "Within each Department\u2013SalarySlab group, the proportion of rows\
        \ whose MonthlyIncome lies within the slab\u2019s numeric interval (pct_in_range)\
        \ should be 1.0 (no violations). Equivalently, for every (Department, SalarySlab)\
        \ group, the group\u2019s min and max MonthlyIncome must fall within that\
        \ slab\u2019s bounds."
      sources:
      - start_line: 30
        end_line: 35
        file: ''
      - start_line: 147
        end_line: 158
        file: ''
      uid: 94d23a19-339e-4e6a-a8d4-dc2e2ce402b9
