        end_line: 64
        file: ''
      uid: 9d7dd676-34c3-4aec-ad0b-b76912cc8825
    - text: 'YearsWithCurrManager must not exceed YearsAtCompany, and when YearsAtCompany
        = 0 then YearsWithCurrManager must be 0 (or null). This ensures manager_ratio
        is well-defined and in [0,1]. Deequ example: .satisfies(''CASE WHEN YearsAtCompany
        > 0 THEN coalesce(YearsWithCurrManager, 0) <= YearsAtCompany ELSE coalesce(YearsWithCurrManager,
        0) = 0 END'', ''manager_years_le_tenure'', lambda v: v == 1.0)'
