        file: ''
      uid: c1a90f47-0d02-46af-8434-053bf4605d34
    - text: 'Company tenure must be feasible given age: YearsAtCompany <= Age - 15.
        This follows from the notion that one cannot be at a company longer than potential
        working years. Example Deequ: .forall("YearsAtCompany <= Age - 15")'
