        end_line: 61
        file: ''
      uid: e6eceefe-1d7d-4028-8f63-9ab0be1dbe45
    - text: 'MonthlyIncome must be consistent with SalarySlab boundaries, and SalarySlab
        must be one of [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'']. Specifically:
        (SalarySlab=''Upto 5k'' => 0 < MonthlyIncome <= 5000), (SalarySlab=''5k-10k''
        => 5000 < MonthlyIncome <= 10000), (SalarySlab=''10k-15k'' => 10000 < MonthlyIncome
        <= 15000), (SalarySlab=''15k+'' => MonthlyIncome > 15000). Deequ example:
        .isContainedIn(''SalarySlab'', [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''])
        and .satisfies("(SalarySlab=''Upto 5k'' AND MonthlyIncome > 0 AND MonthlyIncome
        <= 5000) OR (SalarySlab=''5k-10k'' AND MonthlyIncome > 5000 AND MonthlyIncome
        <= 10000) OR (SalarySlab=''10k-15k'' AND MonthlyIncome > 10000 AND MonthlyIncome
        <= 15000) OR (SalarySlab=''15k+'' AND MonthlyIncome > 15000)", ''income_matches_slab'',
        lambda v: v == 1.0)'
      sources:
      - start_line: 25
        end_line: 35
        file: ''
      - start_line: 37
        end_line: 38
        file: ''
      uid: a6ec1015-d715-40fa-ba5a-6b6f48511748
    - text: 'Age must be consistent with AgeGroup buckets: (AgeGroup=''18-25'' =>
        18 <= Age <= 25), (''26-35'' => 26 <= Age <= 35), (''36-45'' => 36 <= Age
        <= 45), (''46-55'' => 46 <= Age <= 55), (''55+'' => Age >= 55). Also, AgeGroup
        should be in the allowed set. Deequ example: .isContainedIn(''AgeGroup'',
        [''18-25'',''26-35'',''36-45'',''46-55'',''55+'']) and .satisfies("(AgeGroup=''18-25''
        AND Age BETWEEN 18 AND 25) OR (AgeGroup=''26-35'' AND Age BETWEEN 26 AND 35)
        OR (AgeGroup=''36-45'' AND Age BETWEEN 36 AND 45) OR (AgeGroup=''46-55'' AND
        Age BETWEEN 46 AND 55) OR (AgeGroup=''55+'' AND Age >= 55)", ''age_matches_group'',
        lambda v: v >= 0.99)'
      sources:
