        end_line: 66
        file: ''
      uid: 3578f95d-cd85-4d6f-9303-77200e24c369
    - text: 'Manager tenure must be bounded by company tenure when YearsAtCompany
        > 0: 0 <= YearsWithCurrManager <= YearsAtCompany. This keeps manager_ratio
        within 0..1 without relying on clipping. Example Deequ: .where("YearsAtCompany
        > 0").forall("YearsWithCurrManager >= 0 AND YearsWithCurrManager <= YearsAtCompany")'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      - start_line: 98
        end_line: 99
        file: ''
      uid: 84ce329d-e2cb-430f-957c-1b2738dd8acf
    - text: 'Completeness rule tied to tenure: YearsWithCurrManager should be non-null
        whenever YearsAtCompany > 0; it may be null (or 0) only when YearsAtCompany
        == 0. Example Deequ: .where("YearsAtCompany > 0").hasCompleteness("YearsWithCurrManager",
        _ >= 0.99) and .where("YearsAtCompany == 0").forall("coalesce(YearsWithCurrManager,
        0) = 0")'
