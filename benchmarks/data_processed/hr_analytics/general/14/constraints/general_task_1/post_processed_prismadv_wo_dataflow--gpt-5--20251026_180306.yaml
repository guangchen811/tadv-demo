  '["MonthlyIncome","SalarySlab"]':
    code: []
    assumptions:
    - text: 'Row-level consistency between MonthlyIncome and SalarySlab must hold.
        Each record must satisfy exactly one of these conditions: (SalarySlab = ''Upto
        5k'' AND 0 < MonthlyIncome <= 5000) OR (SalarySlab = ''5k-10k'' AND 5000 <
        MonthlyIncome <= 10000) OR (SalarySlab = ''10k-15k'' AND 10000 < MonthlyIncome
        <= 15000) OR (SalarySlab = ''15k+'' AND MonthlyIncome > 15000). Any other
        pairing (including a SalarySlab outside the allowed set) should be considered
        invalid. This can be enforced as a single multi-column constraint (e.g., a
        Deequ satisfies() check over both columns).'
      sources:
      - start_line: 25
        end_line: 35
        file: ''
      - start_line: 149
        end_line: 158
        file: ''
      uid: 252cc340-e938-4bc0-afbd-b8ead3ead351
    - text: 'For each allowed SalarySlab, the median MonthlyIncome must be defined
        (non-null), strictly positive, and medians must increase monotonically with
        the slab order: median(''Upto 5k'') < median(''5k-10k'') < median(''10k-15k'')
        < median(''15k+''). This ensures the progression_index = mean(log(median_i+1
        / median_i)) is finite and well-defined (no NaNs, no non-positive ratios)
        and keeps downstream risk scoring numeric. This can be checked by aggregating
        MonthlyIncome by SalarySlab and asserting positivity and monotonic increase
        of medians.'
      sources:
      - start_line: 37
        end_line: 43
        file: ''
      - start_line: 117
        end_line: 133
        file: ''
      uid: abd29ce8-8f85-4d3f-99d9-56b7b36b3b62
    - text: "MonthlyIncome and SalarySlab must be jointly complete (both non-null\
        \ on every row) because they are used together for row-level validations,\
        \ to compute per-slab medians, and to produce the Department\u2013SalarySlab\
        \ audit. This can be enforced as a multi-column completeness check (e.g.,\
        \ satisfies('MonthlyIncome IS NOT NULL AND SalarySlab IS NOT NULL'))."
      sources:
      - start_line: 27
        end_line: 33
        file: ''
      - start_line: 37
        end_line: 41
        file: ''
      - start_line: 149
        end_line: 158
        file: ''
      uid: b5df7e54-8190-44b3-9344-f8c37a8914c7
