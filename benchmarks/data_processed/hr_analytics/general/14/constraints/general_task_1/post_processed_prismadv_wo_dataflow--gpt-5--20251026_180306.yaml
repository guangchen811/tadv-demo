        This keeps the computed manager_ratio = YearsWithCurrManager / YearsAtCompany
        within [0, 1] for rows with YearsAtCompany > 0. This can be represented as
        a constraint like: satisfies(''YearsWithCurrManager >= 0 AND YearsWithCurrManager
        <= YearsAtCompany'').'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: 9231bf86-0982-4926-bb8d-c62d019dc8b7
    - text: 'When YearsAtCompany = 0, YearsWithCurrManager should be 0 or null (i.e.,
        no time with current manager before joining). This avoids artificial inflation
        of role_stagnation (which is derived from manager_ratio). This can be represented
        as: satisfies(''(YearsAtCompany = 0 AND (YearsWithCurrManager IS NULL OR YearsWithCurrManager
        = 0)) OR (YearsAtCompany > 0)'').'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      - start_line: 98
        end_line: 99
        file: ''
      uid: 0172dbe0-976a-4532-92c4-893b25c84003
    - text: 'For rows with YearsAtCompany > 0, YearsWithCurrManager should be non-null
        to avoid defaulting to zero in the manager_ratio and role_stagnation features.
        Constraint example: satisfies(''YearsAtCompany = 0 OR YearsWithCurrManager
        IS NOT NULL'').'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      - start_line: 98
        end_line: 99
        file: ''
      uid: 1cbe54ad-818c-48cb-b9e2-a07d5dce91a0
    - text: 'TotalWorkingYears must be greater than or equal to YearsAtCompany (no
        negative external_experience). Constraint example: satisfies(''TotalWorkingYears
        >= YearsAtCompany'').'
      sources:
      - start_line: 58
        end_line: 58
        file: ''
      - start_line: 63
        end_line: 64
        file: ''
      uid: e47711e7-e7f1-42ce-aa83-52241d6d92d0
    - text: 'YearsSinceLastPromotion cannot exceed YearsAtCompany and must be 0 when
        YearsAtCompany = 0 (both non-negative). Constraint examples: satisfies(''YearsSinceLastPromotion
        >= 0 AND YearsSinceLastPromotion <= YearsAtCompany'') and satisfies(''YearsAtCompany
        > 0 OR YearsSinceLastPromotion = 0'').'
      sources:
      - start_line: 92
        end_line: 97
        file: ''
      uid: 0d35fb50-b078-4ced-8d38-78160216c327
    - text: 'AgeGroup must be consistent with Age: 18 <= Age <= 25 -> ''18-25''; 26
        <= Age <= 35 -> ''26-35''; 36 <= Age <= 45 -> ''36-45''; 46 <= Age <= 55 ->
        ''46-55''; Age > 55 -> ''55+''. Constraint example: satisfies("(Age BETWEEN
        18 AND 25 AND AgeGroup = ''18-25'') OR (Age > 25 AND Age <= 35 AND AgeGroup
        = ''26-35'') OR (Age > 35 AND Age <= 45 AND AgeGroup = ''36-45'') OR (Age
        > 45 AND Age <= 55 AND AgeGroup = ''46-55'') OR (Age > 55 AND AgeGroup = ''55+'')").'
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 100
        end_line: 109
        file: ''
      uid: 60a548f7-345f-4946-87d0-4be10fe1c14f
    - text: 'MonthlyIncome must be consistent with SalarySlab on each row: if ''Upto
        5k'' then 0 < MonthlyIncome <= 5000; if ''5k-10k'' then 5000 < MonthlyIncome
        <= 10000; if ''10k-15k'' then 10000 < MonthlyIncome <= 15000; if ''15k+''
        then MonthlyIncome > 15000. Also SalarySlab should be in {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}.
        This can be represented as a single row-level constraint combining these implications.'
      sources:
      - start_line: 25
        end_line: 35
        file: ''
      uid: 4eed34ac-8ad8-4a77-a09a-4d0af286009c
    - text: Across ordered SalarySlab bands ['Upto 5k','5k-10k','10k-15k','15k+'],
        the median MonthlyIncome should be monotonically non-decreasing (median for
        a higher slab >= median for the previous slab).
      sources:
      - start_line: 36
        end_line: 43
        file: ''
      uid: 7139470b-3b52-4233-844a-6d5b18e97865
    - text: 'JobRole must align with Department: Department=''Sales'' -> JobRole in
        {''Sales Executive'',''Sales Representative''}; Department=''Research & Development''
        -> JobRole in {''Research Scientist'',''Laboratory Technician'',''Research
        Director'',''Manufacturing Director''}; Department=''Human Resources'' ->
        JobRole=''Human Resources''. This can be represented with a conditional satisfies
        constraint over Department and JobRole.'
      sources:
      - start_line: 45
        end_line: 48
        file: ''
      uid: 12c0c6d1-2517-4653-b351-2903c2cf1fb8
    - text: 'For pay-band auditing to be complete, Department and SalarySlab should
        be present (non-null) together on rows used for the group-by. Constraint example:
        satisfies(''Department IS NOT NULL AND SalarySlab IS NOT NULL'').'
      sources:
      - start_line: 149
        end_line: 159
        file: ''
      uid: 8f4a0567-8e51-4518-9427-becb09ec3519
