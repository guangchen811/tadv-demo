    assumptions:
    - text: 'Row-level consistency between ''SalarySlab'' and ''MonthlyIncome'': for
        each record, the pair (SalarySlab, MonthlyIncome) must satisfy exactly one
        of these intervals: (1) SalarySlab=''Upto 5k'' and 0 < MonthlyIncome <= 5000;
        (2) SalarySlab=''5k-10k'' and 5000 < MonthlyIncome <= 10000; (3) SalarySlab=''10k-15k''
        and 10000 < MonthlyIncome <= 15000; (4) SalarySlab=''15k+'' and MonthlyIncome
        > 15000. This corresponds to ''row_ok'' being true for all rows. Deequ-style:
        .hasCompliance("salary_slab_bounds", "(SalarySlab = ''Upto 5k'' and MonthlyIncome
        > 0 and MonthlyIncome <= 5000) or (SalarySlab = ''5k-10k'' and MonthlyIncome
        > 5000 and MonthlyIncome <= 10000) or (SalarySlab = ''10k-15k'' and MonthlyIncome
        > 10000 and MonthlyIncome <= 15000) or (SalarySlab = ''15k+'' and MonthlyIncome
        > 15000)", 1.0)'
      sources:
      - start_line: 25
        end_line: 35
        file: ''
      uid: 22c64cff-18dc-4a18-bc5d-a1af8053d0e1
    - text: 'Across the ordered salary slabs ["Upto 5k", "5k-10k", "10k-15k", "15k+"],
        the group median of ''MonthlyIncome'' must be strictly increasing and defined
        for each slab (i.e., each slab appears at least once). Formally: median(Upto
        5k) < median(5k-10k) < median(10k-15k) < median(15k+). This ensures the computed
        progression_index is meaningful.'
      sources:
      - start_line: 36
        end_line: 43
        file: ''
      uid: 1a5bb8d8-97f1-4748-8df0-995df0a21a68
    - text: "Department\u2013JobRole integrity: valid (Department, JobRole) pairs\
        \ are restricted to: (Sales, {'Sales Executive', 'Sales Representative'}),\
        \ (Research & Development, {'Research Scientist', 'Laboratory Technician',\
        \ 'Research Director', 'Manufacturing Director'}), (Human Resources, {'Human\
        \ Resources'}). Any other pairing should be treated as invalid. Deequ-style:\
        \ one compliance over the disjunction of these valid pairs."
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      uid: 32988325-986f-450b-ab7e-8df0e33f6938
    - text: "Age\u2013AgeGroup coherence: 'AgeGroup' must be in {'18-25','26-35','36-45','46-55','55+'}\
        \ and must match 'Age' as follows: 18 <= Age <= 25 => '18-25'; 26 <= Age <=\
        \ 35 => '26-35'; 36 <= Age <= 45 => '36-45'; 46 <= Age <= 55 => '46-55'; Age\
        \ >= 56 => '55+'. Deequ-style compliance can encode the appropriate conditional\
        \ ranges per label."
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 100
        end_line: 109
        file: ''
      uid: 0bfbb33b-0078-4d27-aa12-74266fb8988c
    - text: 'Tenure chain constraints across three columns: 0 <= YearsWithCurrManager
        <= YearsAtCompany <= TotalWorkingYears. This prevents negative or inconsistent
        tenure-derived features and avoids clipping distortions in ''manager_ratio''
        and ''external_experience''. Deequ: .hasCompliance("tenure_chain", "YearsWithCurrManager
        >= 0 and YearsAtCompany >= 0 and TotalWorkingYears >= 0 and YearsWithCurrManager
        <= YearsAtCompany and YearsAtCompany <= TotalWorkingYears", 1.0)'
      sources:
      - start_line: 58
        end_line: 61
        file: ''
      - start_line: 93
        end_line: 97
        file: ''
      uid: d82f4d32-9ef1-42c7-aaec-082baa36910a
    - text: 'Career start age feasibility: ''Age'' - ''TotalWorkingYears'' >= 15 for
        all rows (i.e., inferred career start age is not earlier than 15). Deequ:
        .hasCompliance("career_start_min_age", "Age - TotalWorkingYears >= 15", 1.0)'
      sources:
      - start_line: 59
        end_line: 66
        file: ''
      uid: 1bfc5ee3-c3be-49a2-8872-58d66c690a66
    - text: "OverTime\u2013Attrition calibration prerequisites: (a) 'OverTime' and\
        \ 'Attrition' are both binary with labels exactly {'Yes','No'}, (b) both columns\
        \ are complete (no nulls), and (c) both OverTime groups exist in the data\
        \ (count of OverTime='Yes' > 0 and count of OverTime='No' > 0), so that rate_yes\
        \ and rate_no are defined and 'ot_multiplier' remains finite/non-null. Suggested\
        \ constraints: .isContainedIn('OverTime', ['Yes','No']), .isContainedIn('Attrition',\
        \ ['Yes','No']), completeness=1.0 for both, and a grouped-count check ensuring\
        \ both OverTime categories have count > 0."
      sources:
      - start_line: 73
        end_line: 83
        file: ''
      uid: 0dec76c1-c2c8-433d-8093-941bceffb182
    - text: "Satisfaction composite assumes a shared rating scale across multiple\
        \ columns: 'JobSatisfaction', 'EnvironmentSatisfaction', and 'WorkLifeBalance'\
        \ must be on the same 1\u20134 Likert scale and non-null where used, so their\
        \ row-wise mean is meaningful and the normalization to [0,1] is valid. Constraints:\
        \ for each column, values in {1,2,3,4} and completeness=1.0; optionally, a\
        \ multi-column compliance that all three lie in 1..4 on every row."
      sources:
      - start_line: 86
        end_line: 90
        file: ''
      uid: 19a9db2c-67d1-41eb-9924-dda4815a47e1
    - text: 'Pay-band audit grouping expects valid (Department, SalarySlab) pairs
        only: ''Department'' must be in {''Sales'', ''Research & Development'', ''Human
        Resources''} and ''SalarySlab'' must be in ["Upto 5k", "5k-10k", "10k-15k",
        "15k+"], with both non-null, before grouping. This keeps audit aggregates
        well-defined across both dimensions.'
      sources:
