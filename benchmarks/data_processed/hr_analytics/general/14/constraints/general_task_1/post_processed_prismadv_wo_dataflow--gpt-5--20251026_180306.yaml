    - suggestion: '.satisfies("(Age >= 18 AND Age < 26 AND AgeGroup = ''18-25'') OR
        (Age >= 26 AND Age < 36 AND AgeGroup = ''26-35'') OR (Age >= 36 AND Age <
        46 AND AgeGroup = ''36-45'') OR (Age >= 46 AND Age < 55 AND AgeGroup = ''46-55'')
        OR (Age >= 55 AND AgeGroup = ''55+'')", "Age vs AgeGroup consistency", lambda
        x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: d66bb66d-17fe-4bbb-a2f5-b85559dbe034
      source_assumptions:
      - 0322ea1f-1eb0-4ea9-9547-d1e80cbaa027
    assumptions:
    - text: AgeGroup must be a categorical value from the allowed set {'18-25', '26-35',
        '36-45', '46-55', '55+'}. Any other value would map to null during age weighting
        and produce NaN attrition_risk_score. We could represent this as a validation
        rule such as Great Expectations expect_column_values_to_be_in_set('AgeGroup',
        ['18-25','26-35','36-45','46-55','55+']) or Deequ .isContainedIn('AgeGroup',
        ['18-25','26-35','36-45','46-55','55+']).
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 100
        end_line: 109
        file: ''
      - start_line: 135
        end_line: 136
        file: ''
      uid: 91285d52-8c3f-4df8-bec2-05e8a6c36362
    - text: 'AgeGroup should be complete (no nulls). Null AgeGroup values will map
        to null age_weights and propagate NaNs into attrition_risk_score and also
        depress the ''age_majority_share_26_45'' metric. We could represent this as
        Great Expectations expect_column_values_to_not_be_null(''AgeGroup'') or Deequ
        .hasCompleteness(''AgeGroup'', lambda x: x == 1.0).'
      sources:
      - start_line: 100
        end_line: 109
        file: ''
      - start_line: 135
        end_line: 136
        file: ''
      - start_line: 55
        end_line: 55
        file: ''
      - start_line: 169
        end_line: 176
        file: ''
      uid: 9fbe2a13-4836-4e2d-af7f-09d84d46c739
    - text: 'AgeGroup should be consistent with the numeric Age column using non-overlapping
        band boundaries. For example, enforce: 18 <= Age < 26 -> ''18-25''; 26 <=
        Age < 36 -> ''26-35''; 36 <= Age < 46 -> ''36-45''; 46 <= Age < 55 -> ''46-55'';
        Age >= 55 -> ''55+''. This can be expressed as a Deequ .satisfies("CASE WHEN
        Age >= 18 AND Age < 26 AND AgeGroup = ''18-25'' THEN 1 WHEN Age >= 26 AND
        Age < 36 AND AgeGroup = ''26-35'' THEN 1 WHEN Age >= 36 AND Age < 46 AND AgeGroup
        = ''36-45'' THEN 1 WHEN Age >= 46 AND Age < 55 AND AgeGroup = ''46-55'' THEN
        1 WHEN Age >= 55 AND AgeGroup = ''55+'' THEN 1 ELSE 0 END", ''Age-AgeGroup
        consistency'', lambda x: x == 1.0) or the equivalent in Great Expectations.'
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 100
        end_line: 109
        file: ''
      uid: 0322ea1f-1eb0-4ea9-9547-d1e80cbaa027
