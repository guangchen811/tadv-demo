    assumptions:
    - text: 'Total tenure must not be less than company tenure: for every record,
        TotalWorkingYears >= YearsAtCompany (both non-negative). This keeps external_experience
        non-negative and ensures sqrt() is well-defined. Example Deequ: .forall("TotalWorkingYears
        >= 0 AND YearsAtCompany >= 0 AND TotalWorkingYears >= YearsAtCompany")'
      sources:
      - start_line: 58
        end_line: 65
        file: ''
      uid: ec4f7cbd-95c9-44e4-b463-d5f85723fdc7
    - text: 'Realistic career start age: Age - TotalWorkingYears >= 15 (equivalently
        TotalWorkingYears <= Age - 15). This prevents implausible negative career_start_signal
        after clipping. Example Deequ: .forall("Age - TotalWorkingYears >= 15")'
      sources:
