    assumptions:
    - text: 'YearsAtCompany should be present (non-null) for all or nearly all rows;
        nulls would propagate through external_experience -> ext_exp_signal and then
        into risk_score. Example Deequ: .hasCompleteness(''YearsAtCompany'', lambda
        c: c >= 0.99) or stricter .isComplete(''YearsAtCompany'').'
      sources:
      - start_line: 58
        end_line: 58
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      - start_line: 129
        end_line: 136
        file: ''
      uid: ff51787d-174d-4a6b-b73c-a41f621496a3
    - text: 'YearsAtCompany must be numeric and non-negative (>= 0) because it is
        compared to 0, used in arithmetic, and used as a divisor when > 0. Example
        Great Expectations: expect_column_values_to_be_between(''YearsAtCompany'',
        min_value=0, strict_min=False). Example Deequ: .satisfies(''`YearsAtCompany`
        >= 0'', ''yac_non_negative'', lambda p: p == 1.0).'
      sources:
      - start_line: 58
        end_line: 58
        file: ''
      - start_line: 60
        end_line: 61
        file: ''
      - start_line: 93
        end_line: 97
        file: ''
      uid: 0c9ef44b-23ee-4074-a58c-a2f15e6186ff
    - text: 'YearsAtCompany should not exceed TotalWorkingYears for any row (tenure
        at the current company cannot be more than total career years). Example Deequ:
        .satisfies(''CASE WHEN `TotalWorkingYears` IS NULL OR `YearsAtCompany` IS
        NULL THEN TRUE ELSE `YearsAtCompany` <= `TotalWorkingYears` END'', ''yac_le_total'',
        lambda p: p == 1.0).'
      sources:
      - start_line: 58
        end_line: 58
        file: ''
      uid: 279b31c1-86ae-44dc-b5fc-4cfa002721f1
    - text: 'YearsAtCompany should be at least YearsWithCurrManager (cannot have more
        years with current manager than at the company). Example Deequ: .satisfies(''CASE
        WHEN `YearsWithCurrManager` IS NULL OR `YearsAtCompany` IS NULL THEN TRUE
        ELSE `YearsWithCurrManager` <= `YearsAtCompany` END'', ''manager_years_le_yac'',
        lambda p: p == 1.0).'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: 1f74ae33-6926-4ffb-b246-d4930186e2d1
    - text: 'YearsAtCompany should be at least YearsSinceLastPromotion (time since
        last promotion cannot exceed tenure at the company). Example Deequ: .satisfies(''CASE
        WHEN `YearsSinceLastPromotion` IS NULL OR `YearsAtCompany` IS NULL THEN TRUE
        ELSE `YearsSinceLastPromotion` <= `YearsAtCompany` END'', ''promo_years_le_yac'',
        lambda p: p == 1.0).'
      sources:
      - start_line: 93
        end_line: 97
        file: ''
