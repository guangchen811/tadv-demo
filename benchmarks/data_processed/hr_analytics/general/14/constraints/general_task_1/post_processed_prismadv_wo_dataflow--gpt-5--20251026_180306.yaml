    assumptions:
    - text: 'SalarySlab must contain only the exact, case-sensitive values: ''Upto
        5k'', ''5k-10k'', ''10k-15k'', ''15k+''. Any other value (including different
        casing or whitespace differences) should not appear. This can be validated
        with: Deequ .isContainedIn(''SalarySlab'', [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''])
        or Great Expectations expect_column_values_to_be_in_set with the same set.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 37
        end_line: 37
        file: ''
      uid: 20f94c23-10af-4aa6-b37f-802535eeb95f
    - text: 'SalarySlab should be non-null for all rows (completeness 100%). Nulls
        would be dropped from equality checks and group-bys, and would degrade the
        pay-band audit and progression calculations. This can be validated with: Deequ
        .hasCompleteness(''SalarySlab'', lambda x: x == 1.0) or Great Expectations
        expect_column_values_to_not_be_null.'
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 149
        end_line: 156
        file: ''
      uid: ebb4aab0-596c-4ac0-9bc9-3775ed992da4
    - text: 'Row-level consistency: MonthlyIncome must align with the SalarySlab band
        boundaries: (a) ''Upto 5k'' -> 0 < MonthlyIncome <= 5000; (b) ''5k-10k'' ->
        5000 < MonthlyIncome <= 10000; (c) ''10k-15k'' -> 10000 < MonthlyIncome <=
        15000; (d) ''15k+'' -> MonthlyIncome > 15000. At least 95% of rows should
        satisfy this rule. Deequ example: .satisfies("CASE WHEN SalarySlab = ''Upto
        5k'' THEN MonthlyIncome > 0 AND MonthlyIncome <= 5000 WHEN SalarySlab = ''5k-10k''
        THEN MonthlyIncome > 5000 AND MonthlyIncome <= 10000 WHEN SalarySlab = ''10k-15k''
        THEN MonthlyIncome > 10000 AND MonthlyIncome <= 15000 WHEN SalarySlab = ''15k+''
        THEN MonthlyIncome > 15000 ELSE FALSE END", ''SalarySlab vs MonthlyIncome'',
        lambda x: x >= 0.95).'
      sources:
      - start_line: 30
        end_line: 35
        file: ''
      - start_line: 149
        end_line: 156
        file: ''
      uid: feeb7de6-f7d7-4043-999e-3aac2b7ee388
    - text: 'Category coverage: Each allowed SalarySlab must be present in the input
        with at least one row where MonthlyIncome is non-null. Missing any slab will
        yield NaN medians and a NaN progression index, which propagates into risk
        scoring. Validation idea: for each s in {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''},
        count_if(SalarySlab = s AND MonthlyIncome IS NOT NULL) > 0.'
      sources:
      - start_line: 37
        end_line: 43
        file: ''
      uid: da3360ed-af4e-4b9f-a776-0570fe1c9fa6
    - text: 'Monotonicity and positivity of per-slab medians: The median MonthlyIncome
        per SalarySlab should be strictly increasing in the order [''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'']
        and each median > 0, so that the log ratios used for progression_index are
        finite and meaningful. This can be validated by computing medians grouped
        by SalarySlab (with the specified order) and asserting m(''Upto 5k'') < m(''5k-10k'')
        < m(''10k-15k'') < m(''15k+'') and all medians > 0.'
      sources:
      - start_line: 36
        end_line: 43
        file: ''
      uid: 9517d13a-ac68-4dec-8a4f-738742817dc9
