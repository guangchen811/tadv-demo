  Attrition:
    code:
    - suggestion: .isComplete('Attrition')
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 6a735db0-6597-4bb8-82c9-4815ef6078c8
      source_assumptions:
      - a33bb33c-7fd7-4e3d-918b-3f48ae7990bd
    - suggestion: .isContainedIn('Attrition', ['Yes','No'])
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 828114af-fd1c-4566-97a1-5295214c38ad
      source_assumptions:
      - ce1bbb09-bd36-4c76-9726-c47d8d9c3b10
    - suggestion: '.satisfies("CASE WHEN Attrition = ''Yes'' THEN 1 ELSE 0 END", "Any
        Attrition Yes present", lambda x: x > 0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 68dc2719-9fb4-4170-9bd3-b9348a91a614
      source_assumptions:
      - 2a4aff36-f05a-4435-a890-1b0df49c0bc5
    - suggestion: '.satisfies("CASE WHEN Attrition = ''No'' THEN 1 ELSE 0 END", "Any
        Attrition No present", lambda x: x > 0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 4e83212e-4064-4a36-b09a-fbb7ed63bc86
      source_assumptions:
      - 2a4aff36-f05a-4435-a890-1b0df49c0bc5
    assumptions:
    - text: 'Attrition must be complete (no nulls). Any nulls would be implicitly
        treated as non-attrition when converting to a boolean and averaging, biasing
        overall_attrition_rate and downstream calibration. Example rules: Deequ hasCompleteness(''Attrition'',
        lambda v: v == 1.0); Great Expectations expect_column_values_to_not_be_null(''Attrition'').'
      sources:
      - start_line: 74
        end_line: 78
        file: ''
      - start_line: 121
        end_line: 121
        file: ''
      uid: a33bb33c-7fd7-4e3d-918b-3f48ae7990bd
    - text: 'Attrition should be binary and case-exact in the set {''Yes'',''No''}.
        Any other label (e.g., ''yes'', ''Y'', ''Unknown'') would be treated as ''No''
        by the equality check, distorting rates. Example rules: Deequ isContainedIn(''Attrition'',
        [''Yes'',''No'']); Great Expectations expect_column_values_to_be_in_set(''Attrition'',
        [''Yes'',''No'']).'
      sources:
      - start_line: 74
        end_line: 74
        file: ''
      - start_line: 77
        end_line: 83
        file: ''
      uid: ce1bbb09-bd36-4c76-9726-c47d8d9c3b10
    - text: 'Both classes should be present: there should be at least one ''Yes''
        and at least one ''No'' so that overall_attrition_rate is strictly between
        0 and 1, avoiding a degenerate logit intercept. Example rules: Deequ satisfies("CASE
        WHEN Attrition = ''Yes'' THEN 1 ELSE 0 END", ''Any Yes'', lambda x: x > 0)
        and satisfies("CASE WHEN Attrition = ''No'' THEN 1 ELSE 0 END", ''Any No'',
        lambda x: x > 0); Great Expectations expect_column_proportion_of_unique_values_to_be_between(''Attrition'',
        min_value=None, max_value=None) can be approximated with two expect_column_values_to_match_regex
        for each label plus expect_table_row_count_to_be_greater_than to ensure presence.'
      sources:
      - start_line: 74
        end_line: 78
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 2a4aff36-f05a-4435-a890-1b0df49c0bc5
  '["Age","AgeGroup"]':
    code:
    - suggestion: '.satisfies("case when AgeGroup = ''18-25'' then Age >= 18 and Age
        <= 25 when AgeGroup = ''26-35'' then Age >= 26 and Age <= 35 when AgeGroup
        = ''36-45'' then Age >= 36 and Age <= 45 when AgeGroup = ''46-55'' then Age
        >= 46 and Age <= 55 when AgeGroup = ''55+'' then Age >= 55 else false end",
        "agegroup_matches_age", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: fc3e8a19-4cc5-4161-8ffd-2d530d0c9841
      source_assumptions:
      - c473b29e-aadb-4ef0-8910-0760f0b8368b
    assumptions:
    - text: 'MonthlyIncome must be consistent with SalarySlab boundaries row-wise:
        ''Upto 5k'' => 0 < MonthlyIncome <= 5000; ''5k-10k'' => 5000 < MonthlyIncome
        <= 10000; ''10k-15k'' => 10000 < MonthlyIncome <= 15000; ''15k+'' => MonthlyIncome
        > 15000. Deequ example: .satisfies("case when SalarySlab = ''Upto 5k'' then
        MonthlyIncome > 0 and MonthlyIncome <= 5000 when SalarySlab = ''5k-10k'' then
        MonthlyIncome > 5000 and MonthlyIncome <= 10000 when SalarySlab = ''10k-15k''
        then MonthlyIncome > 10000 and MonthlyIncome <= 15000 when SalarySlab = ''15k+''
        then MonthlyIncome > 15000 else false end", "salaryslab_vs_monthlyincome_consistency").'
      sources:
      - start_line: 25
        end_line: 35
        file: ''
      uid: e15b6c26-cffd-4b5a-8d43-8b5de425e0d2
    - text: The per-slab median MonthlyIncome should be monotonically non-decreasing
        across the ordered SalarySlab categories ['Upto 5k','5k-10k','10k-15k','15k+'],
        and each median should be > 0 (so that log ratios are defined). This can be
        validated by checking median('Upto 5k') <= median('5k-10k') <= median('10k-15k')
        <= median('15k+').
      sources:
      - start_line: 36
        end_line: 43
        file: ''
      uid: a64c3539-8c14-49f1-9fbf-5d28887d6378
    - text: "Department\u2013JobRole combinations must be valid: if Department = 'Sales'\
        \ then JobRole in {'Sales Executive','Sales Representative'}; if Department\
        \ = 'Research & Development' then JobRole in {'Research Scientist','Laboratory\
        \ Technician','Research Director','Manufacturing Director'}; if Department\
        \ = 'Human Resources' then JobRole = 'Human Resources'. Deequ example: .satisfies(\"\
        case when Department = 'Sales' then JobRole in ('Sales Executive','Sales Representative')\
        \ when Department = 'Research & Development' then JobRole in ('Research Scientist','Laboratory\
        \ Technician','Research Director','Manufacturing Director') when Department\
        \ = 'Human Resources' then JobRole = 'Human Resources' else false end\", \"\
        department_role_mapping\")."
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      uid: 806d5bfb-a8a1-4ebe-9796-520218320c1d
    - text: 'TotalWorkingYears must be >= YearsAtCompany so that external_experience
        = TotalWorkingYears - YearsAtCompany is non-negative. Deequ example: .satisfies(''TotalWorkingYears
        >= YearsAtCompany'', ''non_negative_external_experience'').'
      sources:
      - start_line: 58
        end_line: 58
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      uid: 6392f5f7-5ae1-4a1b-a37b-416f3d02cda1
    - text: 'YearsWithCurrManager must be between 0 and YearsAtCompany (inclusive),
        i.e., 0 <= YearsWithCurrManager <= YearsAtCompany. Deequ example: .satisfies(''YearsWithCurrManager
        >= 0 and YearsWithCurrManager <= YearsAtCompany'', ''manager_tenure_within_company_tenure'').'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: e90f9607-e0dc-43b4-985c-f4977cd827e9
    - text: 'When YearsAtCompany > 0, YearsSinceLastPromotion must be in [0, YearsAtCompany]
        so that the derived ratio stays in [0,1]. Deequ example: .satisfies(''case
        when YearsAtCompany > 0 then YearsSinceLastPromotion >= 0 and YearsSinceLastPromotion
        <= YearsAtCompany else true end'', ''promotion_since_join_bounds'').'
      sources:
      - start_line: 93
        end_line: 97
        file: ''
      uid: 944bd13d-e427-486f-b9e2-4d325809c8af
    - text: 'AgeGroup must be consistent with Age: ''18-25'' => 18 <= Age <= 25; ''26-35''
        => 26 <= Age <= 35; ''36-45'' => 36 <= Age <= 45; ''46-55'' => 46 <= Age <=
        55; ''55+'' => Age >= 55. Deequ example: .satisfies("case when AgeGroup =
        ''18-25'' then Age >= 18 and Age <= 25 when AgeGroup = ''26-35'' then Age
        >= 26 and Age <= 35 when AgeGroup = ''36-45'' then Age >= 36 and Age <= 45
        when AgeGroup = ''46-55'' then Age >= 46 and Age <= 55 when AgeGroup = ''55+''
        then Age >= 55 else false end", "agegroup_matches_age").'
      sources:
      - start_line: 52
        end_line: 55
        file: ''
      - start_line: 100
        end_line: 109
        file: ''
      uid: c473b29e-aadb-4ef0-8910-0760f0b8368b
    - text: 'Career start age must be at least 15 years: Age - TotalWorkingYears >=
        15. Deequ example: .satisfies(''Age - TotalWorkingYears >= 15'', ''career_start_age_min_15'').'
      sources:
      - start_line: 59
        end_line: 59
        file: ''
      - start_line: 65
        end_line: 65
        file: ''
      uid: aebe71cc-3297-4646-b87c-e751dc12d8b7
  '["Age","TotalWorkingYears"]':
    code: []
    assumptions:
    - text: 'MonthlyIncome must be consistent with SalarySlab on each row: (1) SalarySlab
        = ''Upto 5k'' => 0 < MonthlyIncome <= 5000; (2) ''5k-10k'' => 5000 < MonthlyIncome
        <= 10000; (3) ''10k-15k'' => 10000 < MonthlyIncome <= 15000; (4) ''15k+''
        => MonthlyIncome > 15000. SalarySlab values must be within {''Upto 5k'',''5k-10k'',''10k-15k'',''15k+''}.'
      sources:
      - start_line: 25
        end_line: 35
        file: ''
      uid: ba85b1b3-3a5e-439d-b939-7f726ac964a3
    - text: For each allowed SalarySlab, there must be at least one record and the
        per-slab median MonthlyIncome must be defined (> 0) and non-decreasing in
        the order ['Upto 5k','5k-10k','10k-15k','15k+'] so that log(median[i+1]/median[i])
        is finite and >= 0.
      sources:
      - start_line: 36
        end_line: 43
        file: ''
      uid: 8c726bd2-35f2-4dfc-b673-302cac83d300
    - text: 'Career start age must be realistic: Age - TotalWorkingYears >= 15 for
        every record (i.e., employees did not start full-time work before age 15).'
      sources:
      - start_line: 59
        end_line: 59
        file: ''
      - start_line: 65
        end_line: 65
        file: ''
      uid: 4612ebd7-182e-4cbd-a70e-66ee3cc45a4b
    - text: TotalWorkingYears must be greater than or equal to YearsAtCompany for
        every record (external experience cannot be negative prior to clipping).
      sources:
      - start_line: 58
        end_line: 58
        file: ''
      - start_line: 63
        end_line: 64
        file: ''
      uid: c1afb3b3-cf6a-49df-8548-6746f96d226c
    - text: YearsWithCurrManager must be between 0 and YearsAtCompany inclusive. When
        YearsAtCompany = 0, YearsWithCurrManager should be treated as 0 (or null),
        ensuring the manager_ratio computation is valid.
      sources:
      - start_line: 60
        end_line: 61
