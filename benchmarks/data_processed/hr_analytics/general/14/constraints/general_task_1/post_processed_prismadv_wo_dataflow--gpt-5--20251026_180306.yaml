    - text: 'YearsWithCurrManager should be numeric and non-negative for all non-null
        values (tenure cannot be negative). Example validations: Deequ satisfies(''CASE
        WHEN YearsWithCurrManager IS NULL THEN 1 ELSE CASE WHEN YearsWithCurrManager
        >= 0 THEN 1 ELSE 0 END END'', ''non_negative_manager_tenure'', lambda x: x
