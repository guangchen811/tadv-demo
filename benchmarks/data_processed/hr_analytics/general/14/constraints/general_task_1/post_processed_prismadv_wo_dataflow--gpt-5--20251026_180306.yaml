      sources:
      - start_line: 53
        end_line: 53
        file: ''
      - start_line: 59
        end_line: 66
        file: ''
      - start_line: 121
        end_line: 136
        file: ''
      uid: decf6e5b-2a8e-4a2b-89d4-1997d505ab51
    - text: Age must be numeric (parsable as integer/float) to support subtraction
        and clipping operations used to derive career_start_age and its downstream
        features.
      sources:
      - start_line: 59
        end_line: 66
        file: ''
      uid: 60f5cf60-19b8-41ce-8932-53bdebb12363
    - text: Age should be at least 18 for all rows to align with the adult workforce
        age bands used downstream (18-25, 26-35, 36-45, 46-55, 55+) for risk weighting
        and segmentation.
      sources:
      - start_line: 52
