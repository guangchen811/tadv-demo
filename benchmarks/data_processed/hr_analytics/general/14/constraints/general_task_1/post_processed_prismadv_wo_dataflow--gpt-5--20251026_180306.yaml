  '["Age","YearsAtCompany"]':
    code: []
    assumptions:
    - text: 'MonthlyIncome and SalarySlab must be consistent with the defined pay-band
        boundaries, and SalarySlab must be within the allowed set. Specifically: (a)
        SalarySlab = ''Upto 5k'' => 0 < MonthlyIncome <= 5000; (b) ''5k-10k'' => 5000
        < MonthlyIncome <= 10000; (c) ''10k-15k'' => 10000 < MonthlyIncome <= 15000;
        (d) ''15k+'' => MonthlyIncome > 15000. This can be enforced with a Deequ row-level
        compliance constraint such as: Check.satisfies("CASE WHEN SalarySlab = ''Upto
        5k'' THEN MonthlyIncome > 0 AND MonthlyIncome <= 5000 WHEN SalarySlab = ''5k-10k''
        THEN MonthlyIncome > 5000 AND MonthlyIncome <= 10000 WHEN SalarySlab = ''10k-15k''
        THEN MonthlyIncome > 10000 AND MonthlyIncome <= 15000 WHEN SalarySlab = ''15k+''
        THEN MonthlyIncome > 15000 ELSE false END", "salary_slab_income_consistency")
        and Check.isContainedIn("SalarySlab", ["Upto 5k","5k-10k","10k-15k","15k+"]).'
      sources:
      - start_line: 25
        end_line: 35
        file: ''
      uid: 19e0cdef-f1f4-4c88-9ad5-c3b7eec399aa
    - text: 'Age and AgeGroup must be consistent: AgeGroup must be one of {''18-25'',''26-35'',''36-45'',''46-55'',''55+''}
        and match the Age value with non-overlapping bins: (a) 18 <= Age <= 25 ->
        ''18-25''; (b) 26 <= Age <= 35 -> ''26-35''; (c) 36 <= Age <= 45 -> ''36-45'';
        (d) 46 <= Age <= 55 -> ''46-55''; (e) Age >= 56 -> ''55+''. This can be enforced
        via: Check.isContainedIn("AgeGroup", ["18-25","26-35","36-45","46-55","55+"])
        and Check.satisfies("CASE WHEN Age BETWEEN 18 AND 25 THEN AgeGroup = ''18-25''
        WHEN Age BETWEEN 26 AND 35 THEN AgeGroup = ''26-35'' WHEN Age BETWEEN 36 AND
        45 THEN AgeGroup = ''36-45'' WHEN Age BETWEEN 46 AND 55 THEN AgeGroup = ''46-55''
        WHEN Age >= 56 THEN AgeGroup = ''55+'' ELSE false END", "age_group_alignment").'
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 101
        end_line: 109
        file: ''
      uid: 26a6f22f-bf63-4ce0-a446-00ab5d9d049e
    - text: 'TotalWorkingYears must be greater than or equal to YearsAtCompany for
        all rows (i.e., external experience cannot be negative). Representation: Check.satisfies("TotalWorkingYears
        >= YearsAtCompany", "total_ge_company").'
      sources:
      - start_line: 58
        end_line: 65
        file: ''
      uid: 6bf88d33-4d4d-43d4-92a3-2d1cbbd2441f
    - text: 'YearsWithCurrManager cannot exceed YearsAtCompany (manager tenure cannot
        be longer than company tenure) and should be non-negative. Representation:
        Check.satisfies("YearsWithCurrManager >= 0 AND YearsWithCurrManager <= YearsAtCompany",
        "manager_tenure_le_company").'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: 27bbbf24-225b-4234-ad77-984526c61f99
    - text: 'YearsSinceLastPromotion cannot exceed YearsAtCompany (time since last
        promotion cannot be longer than total company tenure) and should be non-negative.
        Representation: Check.satisfies("YearsSinceLastPromotion >= 0 AND YearsSinceLastPromotion
        <= YearsAtCompany", "promo_le_company").'
      sources:
      - start_line: 93
        end_line: 97
        file: ''
      uid: 43ed126e-459a-44c6-a6ed-195b095ed679
    - text: 'Career start age must be realistic: Age - TotalWorkingYears >= 15 (i.e.,
        working years should not imply a start age younger than 15). Representation:
        Check.satisfies("Age - TotalWorkingYears >= 15", "career_start_age_min15").'
      sources:
      - start_line: 59
        end_line: 65
        file: ''
      uid: 9ff2656c-1d90-458d-acc1-5a23368887db
    - text: 'If YearsAtCompany = 0, then YearsWithCurrManager and YearsSinceLastPromotion
        should be 0 (no manager tenure or promotions before joining). Representation:
        Check.satisfies("CASE WHEN YearsAtCompany = 0 THEN coalesce(YearsWithCurrManager,
        0) = 0 AND coalesce(YearsSinceLastPromotion, 0) = 0 ELSE true END", "zero_tenure_implies_zero_manager_and_promo").'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      - start_line: 93
        end_line: 96
        file: ''
      uid: efbfdb93-1f79-48da-9574-57af3c489232
    - text: 'Department and JobRole must be coherent: JobRole should belong to the
        allowed set for its Department (e.g., Sales -> {''Sales Executive'',''Sales
        Representative''}; Research & Development -> {''Research Scientist'',''Laboratory
        Technician'',''Research Director'',''Manufacturing Director''}; Human Resources
        -> {''Human Resources''}). Representation (example): Check.satisfies("CASE
        WHEN Department = ''Sales'' THEN JobRole IN (''Sales Executive'',''Sales Representative'')
        WHEN Department = ''Research & Development'' THEN JobRole IN (''Research Scientist'',''Laboratory
        Technician'',''Research Director'',''Manufacturing Director'') WHEN Department
        = ''Human Resources'' THEN JobRole = ''Human Resources'' ELSE false END",
        "dept_role_consistency").'
      sources:
