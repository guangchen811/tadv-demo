      sources:
      - start_line: 55
        end_line: 65
        file: ''
      uid: 6d8658ca-6a59-4f1a-9653-89d769d97d76
    - text: 'JobLevel should be complete (no missing values) in the input. The downstream
        logic assumes JobLevel exists for rows (used in groupby, comparisons, and
        arithmetic). You can express this as: .satisfies("CASE WHEN `JobLevel` IS
        NOT NULL THEN 1 ELSE 0 END", "JobLevel not null", lambda x: x == 1).'
      sources:
      - start_line: 53
        end_line: 65
        file: ''
      uid: d0c4a043-a2b5-48d1-8cd5-6531af755a07
    - text: 'JobLevel is an ordinal level where larger numeric values indicate higher
        seniority. The code compares JobLevel (< df[''JobLevel''].max()) to detect
        top level and increments JobLevel by 1 for promoted rows. Validate that ordering
