        Suggested Deequ constraint (single predicate): .satisfies("(SalarySlab = ''Upto
        5k'' AND NextBandMin = 5001) OR (SalarySlab = ''5k-10k'' AND NextBandMin =
        10001) OR (SalarySlab = ''10k-15k'' AND NextBandMin = 15001) OR (SalarySlab
        = ''15k+'' AND NextBandMin IS NULL)", ''nextband_mapping_consistency'')'
