        NOT (YearsAtCompany == 0 AND YearsSinceLastPromotion > 0). Example Deequ constraint:
        .satisfies("NOT (YearsAtCompany == 0 AND YearsSinceLastPromotion > 0)", "zero_tenure_promo_inconsistency").'
      sources:
