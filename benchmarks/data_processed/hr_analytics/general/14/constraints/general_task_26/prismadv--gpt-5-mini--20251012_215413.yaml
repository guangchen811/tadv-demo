  '["TotalWorkingYears","YearsAtCompany"]':
    code: []
    assumptions:
    - text: 'For every record, YearsSinceLastPromotion must be less than or equal
        to YearsAtCompany. This guarantees the TenureRatio calculation (YearsSinceLastPromotion
        / YearsAtCompany) is logically consistent (you cannot have been promoted more
        recently than your tenure at the company). Actionable constraint examples:
        a row-level predicate YearsSinceLastPromotion <= YearsAtCompany, or a Deequ-style
        check such as .satisfies(''YearsSinceLastPromotion <= YearsAtCompany'', ''promotion_vs_tenure'').'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 55
        end_line: 66
        file: ''
      uid: f24bf048-72ab-440d-801b-24e2c3785a09
    - text: 'For every record, YearsAtCompany must be less than or equal to TotalWorkingYears.
        TotalWorkingYears represents total career duration and should be at least
        the years spent at the current company. Actionable constraint examples: row-level
        predicate YearsAtCompany <= TotalWorkingYears, or Deequ-style .isLessThanOrEqual(''YearsAtCompany'',
        ''TotalWorkingYears'') / .isGreaterThanOrEqual(''TotalWorkingYears'',''YearsAtCompany'').'
      sources:
      - start_line: 55
        end_line: 66
        file: ''
      - start_line: 116
        end_line: 124
        file: ''
      uid: 80185835-a7d9-4c09-a296-7b985e6f4596
    - text: 'If YearsSinceLastPromotion > 0 then YearsAtCompany must be > 0 (equivalently,
        YearsAtCompany == 0 implies YearsSinceLastPromotion == 0). This guards against
        division-by-zero logic and preserves temporal consistency. Actionable constraint
        examples: .satisfies(''YearsAtCompany > 0 OR YearsSinceLastPromotion == 0'',
        ''tenure_promotion_zero_guard'') or a row-level predicate (YearsSinceLastPromotion
        == 0) OR (YearsAtCompany > 0).'
      sources:
