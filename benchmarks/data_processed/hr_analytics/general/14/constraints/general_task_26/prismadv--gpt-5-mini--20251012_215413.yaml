        == ''Upto 5k''; if 5000 < MonthlyIncome <= 10000 then SalarySlab == ''5k-10k'';
        if 10000 < MonthlyIncome <= 15000 then SalarySlab == ''10k-15k''; otherwise
        SalarySlab == ''15k+''. This can be enforced as a single predicate: SalarySlab
        = CASE WHEN MonthlyIncome <= 5000 THEN ''Upto 5k'' WHEN MonthlyIncome <= 10000
        THEN ''5k-10k'' WHEN MonthlyIncome <= 15000 THEN ''10k-15k'' ELSE ''15k+''
        END.'
      sources:
      - start_line: 8
        end_line: 19
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      uid: 14eef552-acdd-47b2-9445-35d7801137a1
    - text: For rows labeled with SalarySlab == '15k+', MonthlyIncome should be greater
        than 15000 (i.e., MonthlyIncome > 15000). The code treats any income >15000
        as '15k+' and also uses the '15k+' rows' MonthlyIncome median as the band
        midpoint.
      sources:
      - start_line: 16
        end_line: 19
        file: ''
      - start_line: 22
        end_line: 31
        file: ''
      uid: 6b3abe78-f308-4d7b-ac48-08e6bd47bb59
    - text: The mapping from SalarySlab to BandMidpoint must yield a non-null, positive
        value for every row so that CompaRatio = MonthlyIncome / BandMidpoint is defined.
        In other words, for all rows df['SalarySlab'] must map to a BandMidpoint and
        BandMidpoint > 0.
