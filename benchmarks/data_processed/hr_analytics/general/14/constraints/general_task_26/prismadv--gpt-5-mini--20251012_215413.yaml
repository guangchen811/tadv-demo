    assumptions:
    - text: 'The ''MonthlyIncome'' column must not contain null/missing values in
        the input (or become null after coercion). The pipeline later computes new
        salaries and performs an astype(int) conversion (df[''NewMonthlyIncome'']
        = new_income.astype(int)), which will fail if MonthlyIncome is missing. Represent
        as a validation: no nulls in MonthlyIncome.'
      sources:
      - start_line: 53
        end_line: 66
        file: ''
      - start_line: 112
        end_line: 112
        file: ''
      uid: 8c3f3416-5103-42f3-a06c-c2b49d63ce71
    - text: 'The ''MonthlyIncome'' values must be numeric or coercible to numeric
        without producing NaNs (i.e., no non-numeric strings). The code uses pd.to_numeric(...,
        errors=''coerce'') and later float(income) in assign_salary_slab; non-numeric
