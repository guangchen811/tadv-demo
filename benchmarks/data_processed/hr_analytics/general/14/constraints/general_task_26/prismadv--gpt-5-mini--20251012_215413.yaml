  '["JobLevel","MonthlyIncome","PerformanceRating","YearsSinceLastPromotion"]':
    code: []
    assumptions:
    - text: 'When computing CompaRatio the code divides MonthlyIncome by BandMidpoint.
        Therefore for every row where MonthlyIncome is not null, BandMidpoint must
        be non-null and strictly greater than 0 (to avoid NaN/Inf or divide-by-zero).
        This can be enforced as multi-column checks such as: ensure (MonthlyIncome
        IS NOT NULL) => (BandMidpoint IS NOT NULL AND BandMidpoint > 0).'
      sources:
      - start_line: 22
        end_line: 31
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      uid: 962bb8d1-a8ff-4fa0-986a-0c6ec6b7eb07
    - text: 'Tenure-derived calculations assume hierarchical year consistency: whenever
        YearsAtCompany > 0, YearsSinceLastPromotion should be numeric and less than
        or equal to YearsAtCompany (YearsSinceLastPromotion <= YearsAtCompany). Enforce:
        for rows with YearsAtCompany > 0, YearsSinceLastPromotion IS NOT NULL AND
        YearsSinceLastPromotion <= YearsAtCompany.'
      sources:
      - start_line: 80
        end_line: 84
        file: ''
      uid: beaa2333-e700-4c60-bf38-334d1f37bd38
    - text: 'Level percentile calculation and subsequent percentile-based promotion
        gating require both JobLevel and MonthlyIncome to be present and valid. Concretely:
        JobLevel IS NOT NULL and MonthlyIncome IS NOT NULL for rows used to compute
        LevelPercentile, and within every JobLevel group there must be at least one
        non-null MonthlyIncome so that group percentiles are defined. Also LevelPercentile
        values should fall in the [0.0, 1.0] range.'
      sources:
      - start_line: 86
        end_line: 94
        file: ''
      uid: ddf08d1f-852b-4246-852e-0bd0b658043d
    - text: 'PromotionRecommended logic combines multiple columns and requires them
        to be numeric/comparable and non-null: PerformanceRating, YearsSinceLastPromotion,
        LevelPercentile, and JobLevel. Specifically, these columns must be numeric
        (or coerceable to numeric) and non-null for rows where promotion decisions
        are expected to resolve (so the expression (PerformanceRating >= 4) & (YearsSinceLastPromotion
        >= 2) & (LevelPercentile >= 0.85) & (JobLevel < max(JobLevel)) is well-defined).
        Additionally, JobLevel must be on an ordinal/incremental scale because later
        code computes NewJobLevel = JobLevel + 1.'
      sources:
      - start_line: 90
        end_line: 95
        file: ''
      - start_line: 114
        end_line: 114
        file: ''
      uid: f7d42a01-eeb9-4183-b8e1-4528ec1992b1
    - text: 'Next-band lower-bound logic expects next_band_lower_bound(SalarySlab)
        to provide a non-null integer for slabs that have a next band. Concretely:
        if SalarySlab is one of ''Upto 5k'', ''5k-10k'', or ''10k-15k'', then NextBandMin
        must be non-null and > 0. This is required because for promotable rows the
        code uses NextBandMin to raise new income to at least the next-band minimum.'
      sources:
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 101
        end_line: 111
