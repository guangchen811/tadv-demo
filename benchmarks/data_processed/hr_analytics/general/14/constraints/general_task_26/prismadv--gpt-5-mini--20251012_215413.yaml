      level: warning
      uid: 29c9ed5f-2e00-46d0-ac63-065f19712f2f
      source_assumptions:
      - 5de2c089-a1d6-434d-9589-dd9c38241bee
    - suggestion: .isNonNegative('YearsAtCompany')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 2b8c2e00-9f39-43eb-b556-da7a3e908221
      source_assumptions:
      - d2fbfa3d-0717-4ff7-8495-ee4878aa35eb
    - suggestion: '.isLessThanOrEqualTo(''YearsSinceLastPromotion'', ''YearsAtCompany'',
        lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 50965bb0-ef01-4063-a826-ae0d7d1030da
      source_assumptions:
      - a6459955-960e-436f-8235-685792451dae
    assumptions:
    - text: 'YearsAtCompany must be numeric (convertible to a numeric type) and present
        (non-null) in the input so that the pd.to_numeric coercion (errors=''coerce'')
        does not introduce missing values required later by calculations. Example
        Deequ/GEsque check: .satisfies("CASE WHEN `YearsAtCompany` IS NOT NULL THEN
        1 ELSE 0 END", "Non-null YearsAtCompany", lambda x: x == 1) and/or ensure
        conversion: .satisfies("CASE WHEN CAST(`YearsAtCompany` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "YearsAtCompany numeric-convertible", lambda x: x
        == 1).'
      sources:
      - start_line: 56
        end_line: 65
        file: ''
      uid: b9364dec-01d9-4428-960e-1ddf1271b311
    - text: 'YearsAtCompany should be an integral (whole number) value (no fractional
        years). This is expected because the column represents years and the dataset
        describes it as Integral; many downstream comparisons and ratio semantics
        assume whole-year counts. Example check: .satisfies("CASE WHEN floor(`YearsAtCompany`)
        = `YearsAtCompany` THEN 1 ELSE 0 END", "YearsAtCompany integer-valued", lambda
        x: x == 1).'
      sources:
      - start_line: 56
        end_line: 65
        file: ''
      - start_line: 122
        end_line: 124
        file: ''
      uid: 5de2c089-a1d6-434d-9589-dd9c38241bee
    - text: 'YearsAtCompany must be non-negative (>= 0). Tenure is used as a denominator
        and in ratio calculations; negative tenure would be semantically invalid.
        Example check: .satisfies("CASE WHEN `YearsAtCompany` >= 0 THEN 1 ELSE 0 END",
        "Non-negative YearsAtCompany", lambda x: x == 1).'
      sources:
      - start_line: 80
        end_line: 83
        file: ''
      - start_line: 56
        end_line: 65
        file: ''
      uid: d2fbfa3d-0717-4ff7-8495-ee4878aa35eb
    - text: 'Hierarchical consistency: YearsSinceLastPromotion should be less than
        or equal to YearsAtCompany for each record (YearsSinceLastPromotion <= YearsAtCompany).
        Tenure-derived calculations and promotion gating rely on this relationship.
        Example check: .satisfies("CASE WHEN `YearsSinceLastPromotion` <= `YearsAtCompany`
        THEN 1 ELSE 0 END", "Promotion-tenure consistency", lambda x: x == 1).'
      sources:
      - start_line: 80
        end_line: 84
        file: ''
      - start_line: 90
        end_line: 93
        file: ''
      uid: a6459955-960e-436f-8235-685792451dae
  '["BaseRaisePct","PerformanceRating"]':
    code: []
    assumptions:
    - text: 'BaseRaisePct is deterministically derived from PerformanceRating: rows
        with PerformanceRating == 3 must have BaseRaisePct == 0.03; rows with PerformanceRating
        == 4 must have BaseRaisePct == 0.08; all other PerformanceRating values (including
        null) must have BaseRaisePct == 0.0. (This can be expressed as row-level predicates
        such as: PerformanceRating = 3 => BaseRaisePct = 0.03, PerformanceRating =
        4 => BaseRaisePct = 0.08, else BaseRaisePct = 0.0.)'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      uid: 773f98a3-a3c0-4332-854e-44ef08e201f4
    - text: 'CompaRatio is computed as MonthlyIncome / BandMidpoint, therefore for
        any row where MonthlyIncome is not null, BandMidpoint must be non-null and
        non-zero. (Actionable constraint: for MonthlyIncome not null, BandMidpoint
        IS NOT NULL and BandMidpoint != 0.)'
      sources:
      - start_line: 68
        end_line: 70
        file: ''
      uid: 6629c1f0-e61b-4b55-9779-f4730547e6a6
    - text: 'PromotionRecommended is only set when a conjunction of conditions holds.
        Concretely, any row with PromotionRecommended == True must satisfy: PerformanceRating
        >= 4, YearsSinceLastPromotion >= 2, LevelPercentile >= 0.85, and JobLevel
        < max(JobLevel) (i.e. JobLevel is not already the highest level). (Actionable
        constraint: PromotionRecommended => all four conditions hold.)'
      sources:
      - start_line: 90
        end_line: 95
        file: ''
      uid: c9967f4a-d279-4c58-8136-a09999a01c63
    - text: 'If a row is eligible for promotion and a next-band lower bound exists,
        the final NewMonthlyIncome must be at least the NextBandMin. Formally: for
        rows where PromotionRecommended == True and NextBandMin is not null, NewMonthlyIncome
        >= NextBandMin. (The code enforces this by boosting new income to the next-band
        minimum.)'
      sources:
      - start_line: 103
        end_line: 111
        file: ''
      uid: c9e03e91-6932-48b5-badb-bf007201166c
    - text: Tenure-derived logic assumes hierarchical consistency between YearsAtCompany
        and YearsSinceLastPromotion. Practically, YearsAtCompany should be >= 0 and
        YearsSinceLastPromotion should be between 0 and YearsAtCompany (i.e. 0 <=
        YearsSinceLastPromotion <= YearsAtCompany) so that TenureRatio = YearsSinceLastPromotion
        / YearsAtCompany is sensible.
      sources:
      - start_line: 80
        end_line: 84
        file: ''
      uid: daab55fb-bcd6-4c27-92f7-a5c81d7bbd5f
    - text: 'LevelPercentile is computed by grouping on JobLevel and ranking MonthlyIncome
        within the group. Therefore JobLevel must be present and for each JobLevel
        group there should be at least one non-null MonthlyIncome. (Actionable constraint:
        for every JobLevel value, count(MonthlyIncome NOT NULL) >= 1.)'
      sources:
      - start_line: 86
        end_line: 87
        file: ''
      uid: b4a9eaad-51bf-44b5-9662-bfc8cf359d55
    - text: 'The SalarySlab-to-midpoint mapping expects SalarySlab to be one of the
        defined bands. Specifically, SalarySlab values ''Upto 5k'', ''5k-10k'', ''10k-15k''
        must map to the fixed midpoints 2500.0, 7500.0, 12500.0 respectively; ''15k+''
        maps to the median MonthlyIncome of rows with SalarySlab == ''15k+'' (or a
        fallback constant if that median is NaN). (Actionable constraints: SalarySlab
        subset check and for the three fixed slabs BandMidpoint equals the specified
        constants; for ''15k+'' BandMidpoint equals median(MonthlyIncome) for that
        slab or falls back to the known default.)'
      sources:
      - start_line: 22
        end_line: 31
        file: ''
      uid: 1c804a50-8ff3-4fb1-8485-579f6d947f6d
