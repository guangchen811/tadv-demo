    assumptions:
    - text: 'JobLevel must be numeric/integer-parsable in the input. The code coerces
        JobLevel with pd.to_numeric(errors=''coerce'') and subsequently performs numeric
        operations (grouping, comparisons, arithmetic). If coercion produces NaNs
        the numeric operations will be affected. A validation rule could be: .satisfies("CASE
        WHEN `JobLevel` IS NOT NULL AND regexp_like(cast(`JobLevel` as string), ''^\\d+$'')
        THEN 1 ELSE 0 END", "JobLevel is integer-like", lambda x: x == 1) or equivalently
