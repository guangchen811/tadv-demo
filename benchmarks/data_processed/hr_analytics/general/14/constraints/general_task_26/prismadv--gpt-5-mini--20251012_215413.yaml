        Represent as a validation: MonthlyIncome is numeric (can be validated with
        is_numeric or coercion check).'
      sources:
      - start_line: 56
        end_line: 66
        file: ''
      - start_line: 8
        end_line: 11
        file: ''
      uid: 506e6f26-a9fd-4dff-9fde-e848143526d0
    - text: 'The ''MonthlyIncome'' values should be non-negative (>= 0) and realistically
        positive. The slab assignment and business logic rely on comparisons to positive
        thresholds (<= 5000, <= 10000, etc.) and multiplying/rounding incomes; negative
        incomes are illogical and may produce incorrect business decisions. Represent
        as a validation: MonthlyIncome >= 0.'
      sources:
      - start_line: 8
        end_line: 19
        file: ''
      - start_line: 103
        end_line: 113
        file: ''
      uid: 6a0680ca-0382-4102-9e92-18865f488ff0
    - text: 'The ''MonthlyIncome'' values must be finite (no +inf or -inf) and within
        a reasonable numeric range to avoid division/overflow when computing CompaRatio
        (MonthlyIncome / BandMidpoint) and percentile ranks. Represent as a validation:
        is_finite(MonthlyIncome) and optionally bound by a high upper limit (e.g.,
        < 1e7) if appropriate for your data.'
      sources:
      - start_line: 68
        end_line: 70
        file: ''
      - start_line: 87
        end_line: 87
        file: ''
      uid: b35e6142-7c11-403a-a2f4-409446fe5799
    - text: 'MonthlyIncome is expected to be integral (whole currency units). The
        dataset metadata lists it as Integral and the pipeline rounds and casts incomes
        to integer types (new_income.round(0).astype(''Int64'') then astype(int)).
        Represent as a validation: values are integer-valued (or have zero fractional
        part).'
      sources:
      - start_line: 56
        end_line: 66
        file: ''
      - start_line: 103
        end_line: 104
        file: ''
      uid: a5cf1e84-b09e-4a73-81bc-2d366808351b
