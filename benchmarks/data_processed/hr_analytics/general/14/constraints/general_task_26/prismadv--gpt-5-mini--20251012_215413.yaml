      - start_line: 101
        end_line: 101
        file: ''
      uid: 84d17292-6341-4df5-8be1-8b92c87d60ed
    - text: 'SalarySlab must contain only the canonical category labels exactly as
        spelled/cased: "Upto 5k", "5k-10k", "10k-15k", or "15k+". The code uses these
        exact strings for midpoint lookup and next-band logic, so unexpected values
        (extra categories, different casing, or trailing whitespace) will cause BandMidpoint/NextBandMin
        to be missing and change downstream calculations. A validation rule could
        be: `SalarySlab` IN (''Upto 5k'',''5k-10k'',''10k-15k'',''15k+'').'
      sources:
      - start_line: 23
        end_line: 27
        file: ''
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 68
        end_line: 70
        file: ''
      - start_line: 101
        end_line: 101
        file: ''
      uid: 5d76afc3-08b1-4c76-b20b-69385abc061e
    - text: 'SalarySlab should be consistent with MonthlyIncome ranges implied by
        the code. For accurate band-based calculations the label should match the
        person''s monthly income: "Upto 5k" => MonthlyIncome <= 5000; "5k-10k" =>
        5001 <= MonthlyIncome <= 10000; "10k-15k" => 10001 <= MonthlyIncome <= 15000;
        "15k+" => MonthlyIncome > 15000. This can be expressed as conditional checks
        (e.g. CASE WHEN SalarySlab=''Upto 5k'' THEN MonthlyIncome <= 5000 ELSE ...).'
      sources:
      - start_line: 8
        end_line: 19
        file: ''
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 6e475635-023e-4fd8-b896-5f886983d838
    - text: For reliable BandMidpoint for the top band, there should ideally be at
        least one row with SalarySlab == '15k+' and a non-null numeric MonthlyIncome
        to compute a median. If none exist (or their MonthlyIncome is null/non-numeric),
        the code falls back to a default midpoint of 17500.0. A validation could assert
        either (count(SalarySlab='15k+' AND MonthlyIncome IS NOT NULL) > 0) or accept
        the fallback behavior explicitly.
      sources:
      - start_line: 23
        end_line: 31
        file: ''
      - start_line: 55
        end_line: 66
        file: ''
      uid: a226e188-5287-4cac-9ccd-8c07ae92e167
    - text: SalarySlab values must match exactly (no leading/trailing whitespace or
        unexpected characters). The code uses equality and dict/map lookups (e.g.
        df['SalarySlab'] == '15k+' and .map(band_mid)), which are sensitive to exact
        string matches. A validation rule could trim and compare or enforce a regex
        like ^(Upto 5k|5k-10k|10k-15k|15k\+)$.
