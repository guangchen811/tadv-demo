    - text: 'SalarySlab must be non-null for input rows. The code maps and groups
        by SalarySlab (e.g. get_band_midpoints, df[''SalarySlab''].map(...)) and expects
        that column to exist and be populated. A validation rule could be: all rows
        have `SalarySlab` IS NOT NULL.'
      sources:
      - start_line: 22
        end_line: 31
        file: ''
      - start_line: 68
