    assumptions:
    - text: 'For any row where PromotionRecommended is True and NextBandMin is not
        null, NewMonthlyIncome must be greater than or equal to NextBandMin. The code
        builds promo_mask = (PromotionRecommended & NextBandMin.notna()) and then
        sets new_income[promo_mask] = max(new_income[promo_mask], NextBandMin[promo_mask])
        before writing NewMonthlyIncome. Example Deequ-style predicate: satisfy the
        condition ''(NOT PromotionRecommended) OR (NextBandMin IS NULL) OR (NewMonthlyIncome
        >= NextBandMin)''.'
      sources:
      - start_line: 106
        end_line: 111
        file: ''
      - start_line: 112
        end_line: 112
        file: ''
      uid: e271a734-b220-42f1-aa8a-33361c2eb1b9
    - text: 'For rows with non-null MonthlyIncome and non-null NewMonthlyIncome, NewMonthlyIncome
        must be >= MonthlyIncome. TotalRaisePct is clipped to a lower bound of 0.0
        and new_income = MonthlyIncome * (1.0 + TotalRaisePct) (rounded), so the computed
        new income cannot be lower than the original monthly income. Example Deequ
        predicate: ''(MonthlyIncome IS NULL) OR (NewMonthlyIncome IS NULL) OR (NewMonthlyIncome
        >= MonthlyIncome)''.'
      sources:
      - start_line: 99
        end_line: 99
        file: ''
      - start_line: 103
        end_line: 104
        file: ''
      - start_line: 112
        end_line: 112
        file: ''
      uid: 646f0783-74b6-48f4-b084-562e37c28681
    - text: 'NextBandMin is non-null only for salary slabs that have a defined next-band
        lower bound. The next_band_lower_bound function returns numeric lower bounds
        for ''Upto 5k'', ''5k-10k'', and ''10k-15k'' and returns None for ''15k+''
        (and any other unspecified slab), so NextBandMin should be non-null exactly
        when SalarySlab is one of [''Upto 5k'', ''5k-10k'', ''10k-15k''] and null
        otherwise. Example Deequ predicate: ''(SalarySlab IN ("Upto 5k","5k-10k","10k-15k")
        AND NextBandMin IS NOT NULL) OR (SalarySlab NOT IN (...) AND NextBandMin IS
        NULL)''.'
      sources:
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 101
        end_line: 101
        file: ''
      uid: 0549f2a2-a717-415a-b306-dc97cd7c43a1
    - text: 'When PromotionRecommended is True, NewJobLevel must equal JobLevel +
        1; when PromotionRecommended is False, NewJobLevel must equal JobLevel. The
        code sets NewJobLevel = np.where(PromotionRecommended, JobLevel + 1, JobLevel).
