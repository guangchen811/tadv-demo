constraints:
  Age:
    code:
    - - '.hasMax(''Age'', lambda v: v <= 70)'
      - Valid
    - - '.hasMin(''Age'', lambda v: v >= 18)'
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    - - '.satisfies("Attrition = ''Yes''", ''base_rate_yes_between_10_and_40_percent'',
        lambda v: v >= 0.10 and v <= 0.40)'
      - Valid
    assumptions: []
  DailyRate:
    code:
    - - .isPositive('DailyRate')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  DistanceFromHome:
    code:
    - - .isNonNegative('DistanceFromHome')
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isComplete('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - '.satisfies(''EmployeeCount = 1'', ''employee_count_equals_1'', lambda v:
        v == 1.0)'
      - Valid
    assumptions: []
  EnvironmentSatisfaction:
    code:
    - - '.hasMax(''EnvironmentSatisfaction'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''EnvironmentSatisfaction'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  HourlyRate:
    code:
    - - .isPositive('HourlyRate')
      - Valid
    assumptions: []
  JobLevel:
    code:
    - - '.hasMax(''JobLevel'', lambda v: v <= 5)'
      - Valid
    - - '.hasMin(''JobLevel'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - '.hasMax(''JobSatisfaction'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''JobSatisfaction'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isPositive('MonthlyIncome')
      - Valid
    assumptions: []
  MonthlyRate:
    code:
    - - .isPositive('MonthlyRate')
      - Valid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - '.hasMax(''PerformanceRating'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''PerformanceRating'', lambda v: v >= 3)'
      - Valid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - '.satisfies(''StandardHours = 80'', ''standard_hours_equals_80'', lambda v:
        v == 1.0)'
      - Valid
    assumptions: []
  StockOptionLevel:
    code:
    - - '.hasMax(''StockOptionLevel'', lambda v: v <= 3)'
      - Valid
    - - '.hasMin(''StockOptionLevel'', lambda v: v >= 0)'
      - Valid
    assumptions: []
  TotalWorkingYears:
    code:
    - - .isNonNegative('TotalWorkingYears')
      - Valid
    assumptions: []
  TrainingTimesLastYear:
    code:
    - - '.hasMax(''TrainingTimesLastYear'', lambda v: v <= 6)'
      - Valid
    - - '.hasMin(''TrainingTimesLastYear'', lambda v: v >= 0)'
      - Valid
    assumptions: []
  WorkLifeBalance:
    code:
    - - '.hasMax(''WorkLifeBalance'', lambda v: v <= 4)'
      - Valid
    - - '.hasMin(''WorkLifeBalance'', lambda v: v >= 1)'
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - .isNonNegative('YearsAtCompany')
      - Valid
    - - '.satisfies(''YearsAtCompany <= TotalWorkingYears'', ''tenure_not_exceed_experience'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  YearsSinceLastPromotion:
    code:
    - - .isNonNegative('YearsSinceLastPromotion')
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda v: v >= 0.95)'
      - Valid
    - - .isNonNegative('YearsWithCurrManager')
      - Valid
    assumptions: []
