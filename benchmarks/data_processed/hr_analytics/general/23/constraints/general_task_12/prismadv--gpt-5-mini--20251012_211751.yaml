    - text: "If a numeric income column (e.g., MonthlyIncome/Income) is present and\
        \ used to derive SalarySlab elsewhere, SalarySlab values should be consistent\
        \ with the numeric ranges defined in the mapping: 'Upto 5k' => (0,5000], '5k-10k'\
        \ => (5000,10000], '10k-15k' => (10000,15000], '15k+' => >15000. Example validation\
        \ (row-level check): .satisfies(\"CASE WHEN (`SalarySlab` = 'Upto 5k' AND\
        \ `Income` > 0 AND `Income` <= 5000) OR (`SalarySlab` = '5k-10k' AND `Income`\
        \ > 5000 AND `Income` <= 10000) OR (`SalarySlab` = '10k-15k' AND `Income`\
        \ > 10000 AND `Income` <= 15000) OR (`SalarySlab` = '15k+' AND `Income` >\
        \ 15000) THEN 1 ELSE 0 END\", \"SalarySlab vs Income consistency\", lambda\
        \ x: x >= 0.95) \u2014 adjust threshold as required."
