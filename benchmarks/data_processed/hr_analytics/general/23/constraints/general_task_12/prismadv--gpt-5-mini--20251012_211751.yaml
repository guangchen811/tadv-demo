    - text: 'The ''SalarySlab'' column must be complete (no NULL / missing values).
        The downstream code computes shares by dividing by len(df) and groups with
        dropna=False but does not otherwise handle missing SalarySlab values; the
        input should therefore contain no nulls. Example validation (Deequ-style):
        .satisfies("CASE WHEN `SalarySlab` IS NOT NULL THEN 1 ELSE 0 END", "Non-null
