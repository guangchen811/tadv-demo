    - text: 'YearsAtCompany should not exceed TotalWorkingYears (an employee''s tenure
        at the company cannot be greater than their total working years). Enforceable
        as: .satisfies(''YearsAtCompany <= TotalWorkingYears'', ''company_le_total_working'')'
