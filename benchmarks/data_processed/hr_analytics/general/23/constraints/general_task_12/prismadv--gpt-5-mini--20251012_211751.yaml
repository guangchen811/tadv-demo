        end_line: 106
        file: ''
      uid: 39b2e062-de1f-4d88-8656-87e1caf537fd
    - text: 'For every record, YearsInCurrentRole should be less than or equal to
        YearsAtCompany (an employee''s time in current role cannot exceed their total
        time at the company). Actionable constraint: .satisfies(''YearsInCurrentRole
        <= YearsAtCompany'', ''role_le_company_tenure'')'
      sources:
      - start_line: 103
        end_line: 106
        file: ''
      uid: e83d93a1-ae4f-4509-a185-4f5d249c8f1e
    - text: 'For rows where YearsAtCompany > 0, internal_tenure_ratio must equal YearsInCurrentRole
        / YearsAtCompany and the resulting ratio should lie between 0 and 1 (inclusive).
        Actionable constraints: ensure internal_tenure_ratio is defined only when
        YearsAtCompany > 0, and that (0 <= internal_tenure_ratio <= 1). Example Deequ-style
        checks: .satisfies(''(YearsAtCompany > 0) -> (internal_tenure_ratio >= 0 AND
        internal_tenure_ratio <= 1)'', ''ratio_in_0_1'') and optionally verify arithmetic
        consistency: .satisfies(''(YearsAtCompany > 0) -> (abs(internal_tenure_ratio
        - (YearsInCurrentRole/YearsAtCompany)) < 1e-6)'', ''ratio_consistent_with_components'')'
      sources:
