constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmpID:
    code:
    - - .isUnique('EmpID')
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - '.hasMin(''EmployeeCount'', lambda x: x == 1).hasMax(''EmployeeCount'', lambda
        x: x == 1)'
      - Valid
    assumptions: []
  JobSatisfaction:
    code:
    - - .isContainedIn('JobSatisfaction', [1, 2, 3, 4])
      - Invalid
    assumptions: []
  Over18:
    code:
    - - '.hasSize(lambda x: x == 1).isContainedIn(''Over18'', [''Y''])'
      - Invalid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  TotalWorkingYears:
    code:
    - - '.satisfies(''TotalWorkingYears <= (Age - 18)'', ''WorkingYears_le_AgeMinus18'',
        lambda x: x == 1.0)'
      - Valid
    assumptions: []
  YearsAtCompany:
    code:
    - - '.satisfies(''YearsAtCompany <= TotalWorkingYears'', ''YearsAtCompany_le_TotalWorkingYears'',
        lambda x: x == 1.0)'
      - Valid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95, ''Must be
        at least 95% complete'')'
      - Valid
    assumptions: []
