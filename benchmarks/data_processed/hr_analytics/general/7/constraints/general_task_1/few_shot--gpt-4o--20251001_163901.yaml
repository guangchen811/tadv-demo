constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isContainedIn('EmployeeCount', [1])
      - Invalid
    assumptions: []
  MonthlyIncome:
    code:
    - - .isGreaterThan('MonthlyIncome', 0)
      - Invalid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - .isComplete('YearsWithCurrManager')
      - Invalid
    assumptions: []
