constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    assumptions: []
  AgeGroup:
    code:
    - - .isContainedIn('AgeGroup', ['18-25', '26-35', '36-45', '46-55', '55+'])
      - Valid
    assumptions: []
  Attrition:
    code:
    - - .isContainedIn('Attrition', ['Yes', 'No'])
      - Valid
    assumptions: []
  Department:
    code:
    - - .isContainedIn('Department', ['Sales', 'Research & Development', 'Human Resources'])
      - Valid
    assumptions: []
  EmployeeCount:
    code:
    - - .isContainedIn('EmployeeCount', [1])
      - Invalid
    assumptions: []
  JobRole:
    code:
    - - .satisfies("(JobRole = 'Sales Executive' AND Department = 'Sales') OR (JobRole
        = 'Sales Representative' AND Department = 'Sales') OR (JobRole = 'Healthcare
        Representative' AND Department = 'Sales') OR (JobRole = 'Research Scientist'
        AND Department = 'Research & Development') OR (JobRole = 'Laboratory Technician'
        AND Department = 'Research & Development') OR (JobRole = 'Research Director'
        AND Department = 'Research & Development') OR (JobRole = 'Manufacturing Director'
        AND Department = 'Research & Development') OR (JobRole = 'Human Resources'
        AND Department = 'Human Resources')", 'role_department_consistency')
      - Invalid
    assumptions: []
  Over18:
    code:
    - - .isContainedIn('Over18', ['Y'])
      - Valid
    assumptions: []
  OverTime:
    code:
    - - .isContainedIn('OverTime', ['Yes', 'No'])
      - Valid
    assumptions: []
  PerformanceRating:
    code:
    - - .isContainedIn('PerformanceRating', [3, 4])
      - Invalid
    assumptions: []
  SalarySlab:
    code:
    - - .isComplete('SalarySlab')
      - Valid
    - - .isContainedIn('SalarySlab', ['Upto 5k', '5k-10k', '10k-15k', '15k+'])
      - Valid
    assumptions: []
  StandardHours:
    code:
    - - .isContainedIn('StandardHours', [80])
      - Invalid
    assumptions: []
  YearsWithCurrManager:
    code:
    - - '.hasCompleteness(''YearsWithCurrManager'', lambda x: x >= 0.95)'
      - Valid
    assumptions: []
