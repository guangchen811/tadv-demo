prismadv_config:
  model:
    variant: default
    use_async: true
    use_dataflow: true
    downstream_task_description: The code is written to generate a static web page.
      The code is expected to calculate and collect necessary data and store it in
      a JSON file. Then, the code will generate html file using the JSON file as input.
  llm:
    model_name: gpt-4.1
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  cb_person_cred_hist_length:
    code:
    - suggestion: .isComplete('cb_person_cred_hist_length')
      validity: true
      level: error
    - suggestion: .hasDataType('cb_person_cred_hist_length', 'Integral')
      validity: false
      level: error
    - suggestion: '.hasNumberOfDistinctValues(''cb_person_cred_hist_length'', lambda
        x: x >= 20 and x <= 40)'
      validity: false
      level: warning
    assumptions:
    - text: 'The ''cb_person_cred_hist_length'' column must not contain any null values
        in the input data, because the code drops all rows with nulls in any of the
        selected features (including ''cb_person_cred_hist_length'') before proceeding
        with analysis. Any nulls would cause those rows to be excluded from downstream
        processing, potentially reducing the dataset size and affecting the analysis.
        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN `cb_person_cred_hist_length` IS NOT NULL THEN 1 ELSE
        0 END", "No Nulls in cb_person_cred_hist_length", lambda x: x == 1)'
      sources:
      - start_line: 21
        end_line: 24
        file: ''
    - text: 'The ''cb_person_cred_hist_length'' column should contain only integer
        (integral) values, as indicated by the data type in the dataset description
        and required for numerical operations such as standardization and PCA. Non-integer
        or non-numeric values would cause errors during these operations. We could
        represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN typeof(`cb_person_cred_hist_length`) = ''int'' THEN
        1 ELSE 0 END", "cb_person_cred_hist_length is Integer", lambda x: x == 1)'
      sources:
      - start_line: 21
        end_line: 29
        file: ''
    - text: 'The ''cb_person_cred_hist_length'' column should have a reasonable number
        of distinct values (approximately 29), as shown in the dataset description.
        Input data with far fewer or far more distinct values than expected may indicate
        data quality issues or distributional drift. We could represent this assumption
        as a deequ constraint like this:

        .hasNumberOfDistinctValuesBetween(''cb_person_cred_hist_length'', lowerBound=20,
        upperBound=40)'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
  loan_amnt:
    code:
    - suggestion: '.hasCompleteness(''loan_amnt'', lambda x: x == 1.0)'
      validity: true
      level: error
    - suggestion: '.satisfies(''loan_amnt % 1 = 0'', ''Loan Amount Integral'', lambda
        x: x == 1.0)'
      validity: true
      level: error
    - suggestion: '.hasMax(''loan_amnt'', lambda x: x <= <max_reasonable_loan_amount>)'
      validity: false
      level: warning
    - suggestion: '.hasMin(''loan_amnt'', lambda x: x >= <min_reasonable_loan_amount>)'
      validity: false
      level: warning
    assumptions:
    - text: 'The ''loan_amnt'' column must not contain any null values in the input
        data, because the code applies .dropna() to the selected features (including
        ''loan_amnt'') and expects to retain only complete rows for subsequent PCA
        and modeling steps. Therefore, for the input data to be fully utilized, ''loan_amnt''
        should be complete.

        We could represent this assumption as a deequ constraint like this:

        .hasCompleteness(''loan_amnt'', lambda x: x == 1.0)'
      sources:
      - start_line: 21
        end_line: 24
        file: ''
    - text: 'The ''loan_amnt'' column should only contain integral (whole number)
        values in the input data, as per the schema and because it is used as a numerical
        feature for PCA and standardization, which expect numeric input.

        We could represent this assumption as a deequ constraint like this:

        .satisfies(''loan_amnt % 1 = 0'', ''Loan Amount Integral'', lambda x: x ==
        1.0)'
      sources:
      - start_line: 21
        end_line: 29
        file: ''
    - text: 'The ''loan_amnt'' column should not have extreme or outlier values that
        could distort the PCA or model training, as it is used directly in standardization
        and dimensionality reduction. While no explicit range is enforced, unusually
        large or small values could affect results.

        We could represent this assumption as a deequ constraint like this (assuming
        you set reasonable business thresholds):

        .hasMax(''loan_amnt'', lambda x: x <= <max_reasonable_loan_amount>)

        .hasMin(''loan_amnt'', lambda x: x >= <min_reasonable_loan_amount>)'
      sources:
      - start_line: 26
        end_line: 32
        file: ''
  loan_int_rate:
    code:
    - suggestion: '.hasCompleteness(''loan_int_rate'', lambda x: x == 1.0)'
      validity: true
      level: error
    - suggestion: .hasDataType('loan_int_rate', 'Fractional')
      validity: false
      level: error
    assumptions:
    - text: 'The ''loan_int_rate'' column must not contain any null values in the
        input data, as the code drops all rows with nulls in any of the selected features
        (including ''loan_int_rate'') before further processing. This means that the
        input dataset is expected to have complete data for ''loan_int_rate''.

        We could represent this assumption as a deequ constraint like this:

        .hasCompleteness(''loan_int_rate'', lambda x: x == 1.0)'
      sources:
      - start_line: 21
        end_line: 24
        file: ''
    - text: 'The ''loan_int_rate'' column is expected to be numeric (fractional/float),
        as it is included among other numeric features for scaling and PCA transformation.
        Non-numeric values would cause the StandardScaler and PCA steps to fail.

        We could represent this assumption as a deequ constraint like this:

        .hasDataType(''loan_int_rate'', ''Fractional'')'
      sources:
      - start_line: 21
        end_line: 28
        file: ''
  loan_percent_income:
    code:
    - suggestion: .isComplete('loan_percent_income')
      validity: true
      level: error
    - suggestion: .hasDataType('loan_percent_income', ConstrainableDataTypes.Fractional)
      validity: false
      level: error
    assumptions:
    - text: 'The ''loan_percent_income'' column must not contain any null values in
        the input data, because the code drops all rows with nulls in any of the features
        (including ''loan_percent_income'') before downstream processing. If any nulls
        are present, those rows will be excluded from both the PCA and model training,
        potentially reducing data size and affecting results. We could represent this
        assumption as a deequ constraint like this: .isComplete(''loan_percent_income'')'
      sources:
      - start_line: 21
        end_line: 24
        file: ''
    - text: 'The ''loan_percent_income'' column must contain only numeric (fractional/float)
        values, as it is included in a StandardScaler and PCA, both of which require
        numerical input. Non-numeric values would cause errors or be implicitly dropped.
        We could represent this assumption as a deequ constraint like this: .hasDataType(''loan_percent_income'',
        ConstrainableDataTypes.Fractional)'
      sources:
      - start_line: 21
        end_line: 28
        file: ''
  loan_status:
    code:
    - suggestion: .isComplete('loan_status')
      validity: true
      level: error
    - suggestion: '.hasDataType(''loan_status'', ''Integral'', lambda x: x == 1.0)'
      validity: false
      level: error
    - suggestion: .isContainedIn('loan_status', [0, 1])
      validity: false
      level: error
    assumptions:
    - text: The 'loan_status' column must be complete (no missing values) in the input
        data, since the code drops any rows with missing values in 'loan_status' before
        further processing. If there are missing values, those rows will be excluded
        and not appear in the analysis or output.
      sources:
      - start_line: 24
        end_line: 24
        file: ''
    - text: The 'loan_status' column must only contain the integral values 0 and 1.
        The code expects this column to be binary, as shown by its use as a classification
        target in logistic regression and in the visualization where only 0 and 1
        are filtered for display.
      sources:
      - start_line: 23
        end_line: 39
        file: ''
      - start_line: 108
        end_line: 109
        file: ''
    - text: The 'loan_status' column should not contain any non-integer or unexpected
        categorical values. Since it is used as a binary classification target and
        visualized as two distinct groups, any value other than 0 or 1 would cause
        errors or incorrect visualizations.
      sources:
      - start_line: 23
        end_line: 39
        file: ''
      - start_line: 108
        end_line: 109
        file: ''
  person_emp_length:
    code:
    - suggestion: .isComplete('person_emp_length')
      validity: true
      level: error
    - suggestion: .hasDataType('person_emp_length', ConstrainableDataTypes.Numeric)
      validity: false
      level: error
    assumptions:
    - text: 'The ''person_emp_length'' column must be complete (i.e., contain no null
        values) in the input data, because the code drops all rows with missing values
        in any of the selected features, including ''person_emp_length'', before further
        processing. This means that any record with a null ''person_emp_length'' will
        be excluded from downstream analysis and visualization. We could represent
        this assumption as a deequ constraint like this: .isComplete(''person_emp_length'')'
      sources:
      - start_line: 21
        end_line: 24
        file: ''
    - text: 'The ''person_emp_length'' column should be numeric (fractional), as it
        is included in feature scaling (StandardScaler) and PCA, both of which require
        numeric input. Non-numeric values in this column in the input data would cause
        an error during processing. We could represent this assumption as a deequ
        constraint like this: .hasDataType(''person_emp_length'', ConstrainableDataTypes.Numeric)'
      sources:
      - start_line: 21
        end_line: 28
        file: ''
  person_income:
    code:
    - suggestion: '.hasCompleteness(''person_income'', lambda x: x == 1.0)'
      validity: true
      level: error
    - suggestion: .hasDataType('person_income', DataType.Integral)
      validity: false
      level: error
    - suggestion: .isNonNegative('person_income')
      validity: true
      level: error
    assumptions:
    - text: 'The ''person_income'' column must not contain any null values in the
        input data, because the code drops rows with nulls in any of the selected
        features, including ''person_income'', before further processing. This means
        that for a row to be included in the PCA and subsequent analysis, ''person_income''
        must be present (not null). We could represent this assumption as a deequ
        constraint like this: .hasCompleteness(''person_income'', lambda x: x == 1.0)'
      sources:
      - start_line: 21
        end_line: 24
        file: ''
    - text: 'The ''person_income'' column should be a numeric (integral) type, as
        it is used as a feature for StandardScaler and PCA, both of which require
        numeric input. Any non-numeric values would cause the pipeline to fail. We
        could represent this assumption as a deequ constraint like this: .isNonNegative(''person_income'')
        and .hasDataType(''person_income'', DataType.Integral)'
      sources:
      - start_line: 21
        end_line: 28
        file: ''
