      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('person_home_ownership')
      status: true
      reason_if_failed: ''
      level: error
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      status: false
