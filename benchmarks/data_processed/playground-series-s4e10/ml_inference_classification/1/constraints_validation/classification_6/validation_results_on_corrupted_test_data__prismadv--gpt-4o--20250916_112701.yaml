  person_age:
    code:
    - suggestion: .isComplete('person_age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('person_age >= 0 AND person_age <= 120', 'Valid Age Range')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''person_age >= 0 AND person_age
        <= 120'', ''Valid Age Range'')'' failed on data sample: Value: 0.9999431624417415
        does not meet the constraint requirement!'
      level: warning
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive('person_income')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["loan_amnt","loan_to_income_ratio","person_income"]':
    code:
    - suggestion: .satisfies('loan_amnt > 0 AND person_income > 0', 'Non-zero Loan
