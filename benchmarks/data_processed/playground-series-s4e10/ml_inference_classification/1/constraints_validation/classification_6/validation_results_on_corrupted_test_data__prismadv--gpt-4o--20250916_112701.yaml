      status: true
      reason_if_failed: ''
      level: error
  '["loan_grade","loan_int_rate"]':
    code:
    - suggestion: '.haveCompleteness([''loan_int_rate''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''loan_grade''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''loan_grade IN ("A", "B", "C", "D", "E", "F", "G")'',
        ''Valid Loan Grade'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''loan_grade IN ("A", "B", "C", "D",
        "E", "F", "G")'', ''Valid Loan Grade'', lambda x: x == 1.0)'' failed on data
        sample: Value: 0.9000227350233034 does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasMutualInformation(''loan_grade'', ''loan_int_rate'', lambda
        x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
