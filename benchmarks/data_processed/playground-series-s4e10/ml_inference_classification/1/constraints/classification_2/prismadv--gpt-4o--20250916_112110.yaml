    assumptions:
    - text: 'The columns ''income'', ''loan_amount'', and ''income_to_loan'' are numerically
        related, as ''income_to_loan'' is derived from the division of ''income''
        by ''loan_amount''. Therefore, any missing or zero values in ''loan_amount''
        can lead to division errors or skewed ''income_to_loan'' values, which may
        affect the model''s predictions. It is assumed that ''loan_amount'' should
        not be zero or null. We could represent this assumption as a deequ constraint
        like this: .isNonNegative(''loan_amount'') and .hasCompleteness(''loan_amount'',
        lambda x: x > 0)'
      sources:
      - start_line: 48
        end_line: 49
        file: ''
      uid: 676180c7-a6a7-4b52-9141-f8d68e4e4294
    - text: 'The columns ''income'' and ''loan_income_ratio'' are numerically related,
        as ''loan_income_ratio'' is another representation of the proportion of ''loan_amount''
        to ''income''. Therefore, any missing or zero values in ''income'' can lead
        to division errors or skewed ''loan_income_ratio'' values, affecting the model''s
        predictions. It is assumed that ''income'' should not be zero or null. We
        could represent this assumption as a deequ constraint like this: .isNonNegative(''income'')
        and .hasCompleteness(''income'', lambda x: x > 0)'
      sources:
      - start_line: 48
        end_line: 49
        file: ''
      uid: c602af3d-9dfd-4618-a9c2-c5e3106ba2fb
    - text: 'The numeric columns, including ''age'', ''income'', ''emp_length'', ''loan_amount'',
        ''interest_rate'', ''loan_income_ratio'', ''credit_hist_length'', and ''income_to_loan'',
        are expected to have a variance above a certain threshold to ensure they provide
        meaningful information to the model. Columns with variance below 1e-4 are
        considered low variance and are dropped. This assumes that these columns should
        not have identical or nearly identical values across all records. We could
        represent this assumption as a deequ constraint like this: .hasVarianceGreaterThan(''age'',
        1e-4) and similarly for other columns.'
