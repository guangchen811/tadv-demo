    - text: 'The preprocessing pipeline assumes that the numeric columns and categorical
        columns are correctly identified and transformed accordingly. The columns
        ''loan_status'' is excluded from feature columns, and it''s assumed that all
        other columns are either numeric or categorical. This ensures that the transformation
        process does not encounter unexpected data types. We could represent this
        assumption as a deequ constraint like this: .isNumeric(''age''), .isNumeric(''income''),
