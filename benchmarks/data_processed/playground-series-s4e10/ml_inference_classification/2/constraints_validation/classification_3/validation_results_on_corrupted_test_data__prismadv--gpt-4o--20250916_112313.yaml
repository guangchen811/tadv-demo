results:
  cb_person_default_on_file:
    code:
    - suggestion: '.hasCompleteness(''cb_person_default_on_file'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('cb_person_default_on_file', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: warning
  cb_person_cred_hist_length:
    code:
    - suggestion: .isComplete('cb_person_cred_hist_length')
      status: true
      reason_if_failed: ''
      level: error
  loan_int_rate:
    code:
    - suggestion: '.hasStandardDeviation(''loan_int_rate'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: undefined
  loan_percent_income:
    code:
    - suggestion: .isComplete('loan_percent_income')
      status: true
      reason_if_failed: ''
      level: error
  person_emp_length:
    code:
    - suggestion: .isComplete('person_emp_length')
      status: true
      reason_if_failed: ''
      level: undefined
  person_home_ownership:
    code:
    - suggestion: .isContainedIn('person_home_ownership', ['OTHER', 'OWN', 'MORTGAGE',
        'RENT'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('person_home_ownership')
      status: true
      reason_if_failed: ''
      level: error
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isContainedIn('loan_grade', ['A', 'B', 'C', 'D', 'E', 'F', 'G'])
      status: true
      reason_if_failed: ''
      level: undefined
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''loan_amnt'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  person_age:
    code:
    - suggestion: '.hasCompleteness(''person_age'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      status: true
      reason_if_failed: ''
      level: undefined
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
