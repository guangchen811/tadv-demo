results:
  cb_person_default_on_file:
    code:
    - suggestion: .isComplete('cb_person_default_on_file')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('cb_person_default_on_file', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  cb_person_cred_hist_length:
    code:
    - suggestion: .isComplete('cb_person_cred_hist_length')
      status: true
      reason_if_failed: ''
      level: error
  loan_int_rate:
    code:
    - suggestion: .isComplete('loan_int_rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('loan_int_rate')
      status: true
      reason_if_failed: ''
      level: warning
  loan_percent_income:
    code:
    - suggestion: .isComplete('loan_percent_income')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''loan_percent_income >= 0 AND loan_percent_income <=
        1'', ''loan_percent_income in [0, 1]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  person_emp_length:
    code:
    - suggestion: .isComplete('person_emp_length')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''person_emp_length'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
  person_home_ownership:
    code:
    - suggestion: '.hasCompleteness(''person_home_ownership'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`person_home_ownership` IN (''RENT'', ''MORTGAGE'',
        ''OWN'', ''OTHER'')", "Valid Home Ownership", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''loan_grade'')'' failed on data
        sample: Value: 0.9000227350233034 does not meet the constraint requirement!'
      level: error
    - suggestion: .isContainedIn('loan_grade', ['A', 'B', 'C', 'D', 'E', 'F', 'G'])
      status: true
      reason_if_failed: ''
      level: error
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN loan_amnt IS NULL OR loan_amnt = CAST(loan_amnt
        AS BIGINT) THEN 1 ELSE 0 END'', ''Loan Amount Integral'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isPositive(''loan_amnt'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  person_age:
    code:
    - suggestion: .isComplete('person_age')
      status: true
      reason_if_failed: ''
      level: error
  loan_intent:
    code:
    - suggestion: '.hasCompleteness(''loan_intent'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION', 'HOMEIMPROVEMENT', 'PERSONAL',
        'DEBTCONSOLIDATION', 'MEDICAL', 'VENTURE'])
      status: true
      reason_if_failed: ''
      level: error
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      status: true
      reason_if_failed: ''
      level: error
  '["cb_person_cred_hist_length","person_age"]':
    code:
    - suggestion: '.haveCompleteness([''cb_person_cred_hist_length'', ''person_age''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isLessThanOrEqualTo('cb_person_cred_hist_length', 'person_age')
      status: false
      reason_if_failed: 'Constraint ''.isLessThanOrEqualTo(''cb_person_cred_hist_length'',
        ''person_age'')'' failed on data sample: Value: 0.9999431624417415 does not
        meet the constraint requirement!'
