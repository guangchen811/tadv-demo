  '["cb_person_default_on_file","loan_int_rate"]':
    code:
    - suggestion: '.haveCompleteness([''loan_int_rate'', ''cb_person_default_on_file''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('loan_int_rate IS NOT NULL AND cb_person_default_on_file
        IN ("Y", "N")', 'Loan Int Rate and Default On File Validity')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: '.haveCompleteness([''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["loan_amnt","loan_intent"]':
    code:
    - suggestion: '.haveCompleteness([''loan_amnt'', ''loan_intent''], lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["loan_amnt","loan_percent_income","person_income"]':
    code:
    - suggestion: '.haveCompleteness([''loan_percent_income'', ''loan_amnt'', ''person_income''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('person_income > 0', 'Person income greater than zero
        for all records')
      status: true
      reason_if_failed: ''
      level: error
  '["loan_grade","loan_int_rate"]':
    code:
    - suggestion: '.haveCompleteness([''loan_int_rate'', ''loan_grade''], lambda x:
        x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.haveCompleteness([''loan_int_rate'', ''loan_grade''],
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9000227350233034 does
        not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies('loan_grade IN ("A", "B", "C", "D", "E", "F", "G")',
        'loan_grade category valid')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''loan_grade IN ("A", "B", "C", "D",
        "E", "F", "G")'', ''loan_grade category valid'')'' failed on data sample:
        Value: 0.9000227350233034 does not meet the constraint requirement!'
      level: error
  '["person_age","person_emp_length"]':
    code:
    - suggestion: '.haveCompleteness([''person_age'', ''person_emp_length''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('person_age >= 0 AND person_emp_length >= 0', 'Non-negative
        age and employment length')
      status: true
      reason_if_failed: ''
      level: error
  '["person_home_ownership","person_income"]':
    code:
    - suggestion: '.haveCompleteness([''person_income'', ''person_home_ownership''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('person_home_ownership IN ("RENT", "MORTGAGE", "OWN",
        "OTHER")', 'Known home ownership categories')
      status: true
      reason_if_failed: ''
      level: error
