results:
  cb_person_default_on_file:
    code:
    - suggestion: .isComplete('cb_person_default_on_file')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('cb_person_default_on_file', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  loan_int_rate:
    code:
    - suggestion: .isComplete('loan_int_rate')
      status: true
      reason_if_failed: ''
      level: error
  loan_percent_income:
    code:
    - suggestion: .isComplete('loan_percent_income')
      status: true
      reason_if_failed: ''
      level: error
  person_emp_length:
    code:
    - suggestion: .isComplete('person_emp_length')
      status: true
      reason_if_failed: ''
      level: undefined
  person_home_ownership:
    code:
    - suggestion: .isComplete('person_home_ownership')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('person_home_ownership', ['OWN', 'MORTGAGE', 'RENT',
        'OTHER'])
      status: true
      reason_if_failed: ''
      level: error
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("loan_grade IN ('A', 'B', 'C', 'D', 'E', 'F', 'G')",
        "Valid Loan Grades")
      status: true
      reason_if_failed: ''
      level: error
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      status: true
      reason_if_failed: ''
      level: error
  person_age:
    code:
    - suggestion: .isComplete('person_age')
      status: true
      reason_if_failed: ''
      level: error
  loan_intent:
    code:
    - suggestion: .isComplete('loan_intent')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION', 'HOMEIMPROVEMENT', 'PERSONAL',
        'DEBTCONSOLIDATION', 'MEDICAL', 'VENTURE'])
      status: true
      reason_if_failed: ''
      level: error
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      status: true
      reason_if_failed: ''
      level: error
  '["cb_person_default_on_file","loan_grade","loan_intent","person_home_ownership"]':
    code:
    - suggestion: '.haveCompleteness([''loan_grade'', ''loan_intent'', ''cb_person_default_on_file'',
        ''person_home_ownership''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('loan_grade IN ("A", "B", "C", "D", "E", "F", "G") AND
        loan_intent IN ("EDUCATION", "HOMEIMPROVEMENT", "PERSONAL", "DEBTCONSOLIDATION",
        "MEDICAL", "VENTURE") AND cb_person_default_on_file IN ("Y", "N") AND person_home_ownership
        IN ("RENT", "MORTGAGE", "OWN", "OTHER")', 'Valid Categorical Values')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: undefined
  '["loan_amnt","loan_int_rate"]':
    code:
    - suggestion: '.haveCompleteness([''loan_amnt'', ''loan_int_rate''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["loan_amnt","loan_percent_income","person_income"]':
    code:
    - suggestion: .satisfies('loan_amnt > 0 AND person_income > 0', 'Non-Zero Loan
        Amount and Person Income')
      status: true
      reason_if_failed: ''
      level: error
