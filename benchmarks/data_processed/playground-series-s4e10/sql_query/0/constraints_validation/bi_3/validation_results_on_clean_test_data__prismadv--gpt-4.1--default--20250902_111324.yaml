results:
  cb_person_default_on_file:
    code:
    - suggestion: .isComplete('cb_person_default_on_file')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('cb_person_default_on_file', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('loan_grade', ['A', 'B', 'C', 'D', 'E', 'F', 'G'])
      status: true
      reason_if_failed: ''
      level: error
  loan_int_rate:
    code:
    - suggestion: '.hasCompleteness(''loan_int_rate'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  person_home_ownership:
    code:
    - suggestion: .isComplete('person_home_ownership')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('person_home_ownership', ['RENT', 'MORTGAGE', 'OWN',
        'OTHER'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN person_home_ownership = ''OTHER'' THEN 1
        ELSE 0 END", "Low proportion of ''OTHER'' in person_home_ownership", lambda
        x: x <= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
