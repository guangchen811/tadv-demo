results:
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      status: true
      reason_if_failed: ''
      level: error
  loan_grade:
    code:
    - suggestion: .isContainedIn('loan_grade', ['A', 'B', 'C', 'D', 'E', 'F', 'G'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('loan_grade')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''loan_grade'')'' failed on data
        sample: Value: 0.900034103504135 does not meet the constraint requirement!'
      level: error
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('person_income >= 0', 'Non-negative Income')
      status: true
      reason_if_failed: ''
      level: warning
