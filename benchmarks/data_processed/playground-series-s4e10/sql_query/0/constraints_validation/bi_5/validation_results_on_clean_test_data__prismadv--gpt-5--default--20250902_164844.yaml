results:
  loan_amnt:
    code:
    - suggestion: '.hasCompleteness("loan_amnt", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isPositive("loan_amnt", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''loan_grade'', [''A'',''B'',''C'',''D'',''E'',''F'',''G''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''loan_grade'', ''^[A-G]$'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  person_income:
    code:
    - suggestion: .isComplete("person_income")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative("person_income", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
