results:
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('loan_amnt')
      status: true
      reason_if_failed: ''
      level: error
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''loan_grade'')'' failed on data
        sample: Value: 0.900034103504135 does not meet the constraint requirement!'
      level: error
    - suggestion: .isContainedIn('loan_grade', ['A', 'B', 'C', 'D', 'E', 'F', 'G'])
      status: true
      reason_if_failed: ''
      level: error
  loan_intent:
    code:
    - suggestion: .isComplete('loan_intent')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION', 'HOMEIMPROVEMENT', 'PERSONAL',
        'DEBTCONSOLIDATION', 'MEDICAL', 'VENTURE'])
      status: true
      reason_if_failed: ''
      level: error
  loan_percent_income:
    code:
    - suggestion: .isComplete('loan_percent_income')
      status: true
      reason_if_failed: ''
      level: error
  loan_status:
    code:
    - suggestion: .isComplete('loan_status')
      status: true
      reason_if_failed: ''
      level: error
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      status: true
      reason_if_failed: ''
      level: error
