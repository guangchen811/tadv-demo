results:
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('loan_amnt > 0', 'Positive Loan Amounts')
      status: true
      reason_if_failed: ''
      level: warning
  loan_grade:
    code:
    - suggestion: '.hasCompleteness(''loan_grade'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''loan_grade'', lambda x: x
        == 1.0)'' failed on data sample: Value: 0.900034103504135 does not meet the
        constraint requirement!'
      level: error
    - suggestion: .isContainedIn('loan_grade', ['A', 'B', 'C', 'D', 'E', 'F', 'G'])
      status: true
      reason_if_failed: ''
      level: error
  loan_intent:
    code:
    - suggestion: .isComplete('loan_intent')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION', 'HOMEIMPROVEMENT', 'PERSONAL',
        'DEBTCONSOLIDATION', 'MEDICAL', 'VENTURE'])
      status: true
      reason_if_failed: ''
      level: error
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(person_income AS BIGINT) = person_income'', ''Person
        Income Integral'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('person_income')
      status: true
      reason_if_failed: ''
      level: warning
