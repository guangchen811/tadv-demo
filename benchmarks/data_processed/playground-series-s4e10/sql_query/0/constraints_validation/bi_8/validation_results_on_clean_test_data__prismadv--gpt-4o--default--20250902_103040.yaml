results:
  loan_intent:
    code:
    - suggestion: .isComplete('loan_intent')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION', 'HOMEIMPROVEMENT', 'PERSONAL',
        'DEBTCONSOLIDATION', 'MEDICAL', 'VENTURE'])
      status: true
      reason_if_failed: ''
      level: error
  loan_status:
    code:
    - suggestion: .isContainedIn('loan_status', ['0', '1'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('loan_status')
      status: true
      reason_if_failed: ''
      level: error
  person_home_ownership:
    code:
    - suggestion: .isContainedIn('person_home_ownership', ['OTHER', 'OWN', 'MORTGAGE',
        'RENT'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('person_home_ownership')
      status: true
      reason_if_failed: ''
      level: error
