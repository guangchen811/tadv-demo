results:
  loan_intent:
    code:
    - suggestion: .isComplete('loan_intent')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION', 'HOMEIMPROVEMENT', 'PERSONAL',
        'DEBTCONSOLIDATION', 'MEDICAL', 'VENTURE'])
      status: true
      reason_if_failed: ''
      level: error
  loan_status:
    code:
    - suggestion: '.hasCompleteness(''loan_status'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  person_home_ownership:
    code:
    - suggestion: .isComplete('person_home_ownership')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('person_home_ownership', ['OWN', 'MORTGAGE', 'RENT',
        'OTHER'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''person_home_ownership'', lambda x: x >= 0.995)'
      status: true
      reason_if_failed: ''
      level: warning
