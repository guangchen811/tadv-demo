results:
  cb_person_default_on_file:
    code:
    - suggestion: '.hasPattern(''cb_person_default_on_file'', ''^(Y|N)$'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('cb_person_default_on_file')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("cb_person_default_on_file = ''N''", "Non-default presence",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  loan_intent:
    code:
    - suggestion: .isComplete('loan_intent')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION','HOMEIMPROVEMENT','PERSONAL','DEBTCONSOLIDATION','MEDICAL','VENTURE'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''loan_intent = UPPER(TRIM(loan_intent))'', ''loan_intent
        normalized'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
