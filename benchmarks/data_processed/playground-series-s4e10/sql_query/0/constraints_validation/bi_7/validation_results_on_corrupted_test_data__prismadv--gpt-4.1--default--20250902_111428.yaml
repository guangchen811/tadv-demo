results:
  loan_amnt:
    code:
    - suggestion: '.hasCompleteness(''loan_amnt'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''loan_amnt > 0'', ''Positive Loan Amounts'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''loan_grade'')'' failed on data
        sample: Value: 0.900034103504135 does not meet the constraint requirement!'
      level: error
    - suggestion: .isContainedIn('loan_grade', ['A', 'B', 'C', 'D', 'E', 'F', 'G'])
      status: true
      reason_if_failed: ''
      level: error
  loan_int_rate:
    code:
    - suggestion: .isComplete('loan_int_rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('loan_int_rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('loan_int_rate <= 100', 'Interest rate must be less than
        or equal to 100')
      status: true
      reason_if_failed: ''
      level: warning
  loan_intent:
    code:
    - suggestion: .isComplete('loan_intent')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION', 'HOMEIMPROVEMENT', 'PERSONAL',
        'DEBTCONSOLIDATION', 'MEDICAL', 'VENTURE'])
      status: true
      reason_if_failed: ''
      level: error
  loan_percent_income:
    code:
    - suggestion: '.hasCompleteness(''loan_percent_income'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  loan_status:
    code:
    - suggestion: .isComplete('loan_status')
      status: true
      reason_if_failed: ''
      level: error
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('person_income')
      status: true
      reason_if_failed: ''
      level: error
