results:
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      status: true
      reason_if_failed: ''
      level: error
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('loan_grade', ['E', 'F', 'A', 'G', 'B', 'C', 'D'])
      status: true
      reason_if_failed: ''
      level: error
  loan_int_rate:
    code:
    - suggestion: .isComplete('loan_int_rate')
      status: true
      reason_if_failed: ''
      level: error
  loan_intent:
    code:
    - suggestion: .isComplete('loan_intent')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION', 'HOMEIMPROVEMENT', 'PERSONAL',
        'DEBTCONSOLIDATION', 'MEDICAL', 'VENTURE'])
      status: true
      reason_if_failed: ''
      level: error
  loan_percent_income:
    code:
    - suggestion: .isComplete('loan_percent_income')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('loan_percent_income >= 0 AND loan_percent_income <=
        100', 'Valid Range for loan_percent_income')
      status: true
      reason_if_failed: ''
      level: warning
  loan_status:
    code:
    - suggestion: .isComplete('loan_status')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`loan_status` = 1'', ''At least one default entry'',
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      status: true
      reason_if_failed: ''
      level: error
