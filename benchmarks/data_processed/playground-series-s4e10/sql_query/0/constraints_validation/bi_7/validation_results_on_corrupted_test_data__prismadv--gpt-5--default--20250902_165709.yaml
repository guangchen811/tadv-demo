results:
  loan_amnt:
    code:
    - suggestion: '.hasCompleteness(''loan_amnt'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isPositive(''loan_amnt'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  loan_grade:
    code:
    - suggestion: '.satisfies("loan_grade IS NOT NULL", "loan_grade_not_null", lambda
        x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("loan_grade IS NOT NULL", "loan_grade_not_null",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.900034103504135 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN UPPER(TRIM(loan_grade)) IN (''A'',''B'',''C'',''D'',''E'',''F'',''G'')
        THEN 1 ELSE 0 END", "loan_grade_allowed_values", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN UPPER(TRIM(loan_grade))
        IN (''A'',''B'',''C'',''D'',''E'',''F'',''G'') THEN 1 ELSE 0 END", "loan_grade_allowed_values",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.900034103504135 does
        not meet the constraint requirement!'
      level: warning
  loan_int_rate:
    code:
    - suggestion: '.hasCompleteness("loan_int_rate", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("loan_int_rate BETWEEN 0 AND 100", "Interest rate within
        [0,100]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  loan_intent:
    code:
    - suggestion: .isComplete('loan_intent')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION', 'HOMEIMPROVEMENT', 'PERSONAL',
        'DEBTCONSOLIDATION', 'MEDICAL', 'VENTURE'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`loan_intent` = TRIM(`loan_intent`) AND LENGTH(`loan_intent`)
        > 0'', ''loan_intent trimmed and non-empty'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''loan_intent'', ''^[A-Z]+$'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  loan_percent_income:
    code:
    - suggestion: '.hasCompleteness(''loan_percent_income'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''loan_percent_income'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''loan_percent_income'', lambda m: m <= 200)'
      status: true
      reason_if_failed: ''
      level: warning
  loan_status:
    code:
    - suggestion: .isComplete("loan_status")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("loan_status = 1", "At least one default present", lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  person_income:
    code:
    - suggestion: '.hasCompleteness(''person_income'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''person_income IS NULL OR (person_income >= 0 AND person_income
        <= 10000000)'', ''person_income non-negative and <= 10M'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
