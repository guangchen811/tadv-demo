        the average loan amount using this column, which requires non-null values.
      sources:
      - start_line: 9
        end_line: 9
        file: ''
      - start_line: 25
        end_line: 25
        file: ''
    - text: The 'loan_amnt' column is expected to contain integral values as it is
        used in the calculation of the average loan amount, which suggests it should
