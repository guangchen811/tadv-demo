prismadv_config:
  model:
    variant: default
    use_async: true
    use_dataflow: true
    downstream_task_description: The code is written for SQL Query task. The code
      is expected to run on a database and return the results. you are asked to generate
      constraints on the upcoming *test* data to ensure that the code can run without
      any errors and the results are meaningful.
  llm:
    model_name: gpt-4.1
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  loan_amnt:
    code:
    - suggestion: '.hasCompleteness(''loan_amnt'', lambda x: x == 1.0)'
      validity: true
      level: error
    - suggestion: '.hasDataType(''loan_amnt'', ''Integral'', lambda x: x == 1.0)'
      validity: false
      level: error
    - suggestion: '.satisfies(''loan_amnt > 0'', ''Positive Loan Amounts'', lambda
        x: x == 1.0)'
      validity: true
      level: error
    assumptions:
    - text: 'The ''loan_amnt'' column must not contain any null values, as the code
        directly computes the average (AVG) of ''loan_amnt'' (aliased as ''amount_col'')
        without any null handling. Null values would cause the average to be computed
        incorrectly or potentially return null for a group. The column completeness
        is 1.0, supporting this assumption. We could represent this assumption as
        a deequ constraint like this: .hasCompleteness(''loan_amnt'', lambda x: x
        == 1.0)'
      sources:
      - start_line: 5
        end_line: 12
        file: ''
      - start_line: 25
        end_line: 25
        file: ''
    - text: 'The ''loan_amnt'' column should contain only integral (whole number)
        values, as the column data type is Integral and the code expects to aggregate
        and average these values. Non-integer or malformed data would cause errors
        or misleading results. We could represent this assumption as a deequ constraint
        like this: .isInteger(''loan_amnt'')'
      sources:
      - start_line: 5
        end_line: 12
        file: ''
      - start_line: 25
        end_line: 25
        file: ''
    - text: 'The ''loan_amnt'' column is expected to have a reasonable numeric range,
        i.e., all values should be non-negative and greater than zero, as it represents
        the amount of a loan issued. Negative or zero values would not make sense
        for a loan amount and would distort the computed averages. We could represent
        this assumption as a deequ constraint like this: .satisfies(''loan_amnt >
        0'', ''Positive Loan Amounts'', lambda x: x == 1.0)'
      sources:
      - start_line: 5
        end_line: 12
        file: ''
      - start_line: 25
        end_line: 25
        file: ''
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      validity: true
      level: error
    - suggestion: .isContainedIn('loan_grade', ['A', 'B', 'C', 'D', 'E', 'F', 'G'])
      validity: true
      level: error
    - suggestion: '.hasDataType(''loan_grade'', ''String'', lambda x: x >= 0.99)'
      validity: false
      level: error
    - suggestion: '.hasNumberOfDistinctValues(''loan_grade'', lambda n: n <= 7)'
      validity: false
      level: warning
    assumptions:
    - text: The 'loan_grade' column must be complete (i.e., contain no null values),
        since it is used as a grouping key in the SQL GROUP BY clause. Nulls in this
        column would result in unexpected groupings or loss of data in the aggregation.
      sources:
      - start_line: 5
        end_line: 5
        file: ''
      - start_line: 14
        end_line: 14
        file: ''
      - start_line: 30
        end_line: 30
        file: ''
    - text: 'The ''loan_grade'' column is expected to contain only a known, limited
        set of string values corresponding to valid loan grades. Based on the histogram,
        these are: A, B, C, D, E, F, G. No unexpected or invalid loan grade values
        should appear in the data.'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
      - start_line: 14
        end_line: 14
        file: ''
      - start_line: 30
        end_line: 30
        file: ''
    - text: The 'loan_grade' column should be of string (categorical) type, not numeric
        or boolean, as it represents credit risk categories and is used for categorical
        grouping and display.
      sources:
      - start_line: 5
        end_line: 5
        file: ''
      - start_line: 14
        end_line: 14
        file: ''
    - text: The 'loan_grade' column should have a cardinality (number of distinct
        values) that is not significantly higher than the known set (A, B, C, D, E,
        F, G), to avoid excessive fragmentation in aggregation and ensure meaningful
        group-level statistics.
      sources:
      - start_line: 5
        end_line: 5
        file: ''
      - start_line: 14
        end_line: 14
        file: ''
      - start_line: 30
        end_line: 30
        file: ''
  loan_int_rate:
    code:
    - suggestion: .isComplete('loan_int_rate')
      validity: true
      level: error
    - suggestion: '.hasDataType(''loan_int_rate'', ''Fractional'', lambda x: x ==
        1.0)'
      validity: false
      level: error
    - suggestion: .isNonNegative('loan_int_rate')
      validity: true
      level: error
    - suggestion: .satisfies('loan_int_rate <= 100', 'Interest rate must be less than
        or equal to 100')
      validity: true
      level: warning
    assumptions:
    - text: The 'loan_int_rate' column must be complete; that is, it should not contain
        any null values in the input data. This is because the code computes the average
        interest rate (AVG(int_rate_col)) per group and does not apply any null-handling
        or filtering, so nulls would cause the average to be computed only over non-null
        values, potentially impacting the results or leading to misleading segment
        averages. The dataset description also indicates completeness of 1.0, so this
        assumption must be upheld.
      sources:
      - start_line: 5
        end_line: 12
        file: ''
      - start_line: 24
        end_line: 24
        file: ''
    - text: The 'loan_int_rate' column should contain only fractional (numeric, non-string)
        values, as the code calculates the average interest rate (AVG function) and
        rounds it. Non-numeric or malformed values would cause the query to fail or
        produce incorrect results.
      sources:
      - start_line: 5
        end_line: 12
        file: ''
      - start_line: 24
        end_line: 24
        file: ''
    - text: The 'loan_int_rate' column should have a reasonable range of values representing
        plausible interest rates (e.g., non-negative, and typically within a range
        expected for loan interest rates such as 0 to 100). Extreme or negative values
        would make the average interest rate statistic misleading for downstream analysis.
      sources:
      - start_line: 24
        end_line: 24
        file: ''
      - start_line: 30
        end_line: 31
        file: ''
  loan_intent:
    code:
    - suggestion: .isComplete('loan_intent')
      validity: true
      level: error
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION', 'HOMEIMPROVEMENT', 'PERSONAL',
        'DEBTCONSOLIDATION', 'MEDICAL', 'VENTURE'])
      validity: true
      level: error
    - suggestion: '.hasNumberOfDistinctValues(''loan_intent'', lambda x: 1 <= x <=
        6)'
      validity: false
      level: warning
    assumptions:
    - text: 'The ''loan_intent'' column must not contain any null values, as it is
        used directly in GROUP BY and SELECT clauses without any null-handling. The
        code expects every row in the input data to have a valid value for ''loan_intent''.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN loan_intent IS NOT NULL THEN 1 ELSE 0 END", "No Null
        Loan Intent", lambda x: x == 1)'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 15
        end_line: 15
        file: ''
      - start_line: 30
        end_line: 30
        file: ''
    - text: 'The ''loan_intent'' column should only contain one of the expected 6
        categories: EDUCATION, HOMEIMPROVEMENT, PERSONAL, DEBTCONSOLIDATION, MEDICAL,
        or VENTURE. The code assumes these are the only valid values for ''loan_intent'',
        since it groups by this column and interprets the results by intent category.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN loan_intent IN (''EDUCATION'', ''HOMEIMPROVEMENT'',
        ''PERSONAL'', ''DEBTCONSOLIDATION'', ''MEDICAL'', ''VENTURE'') THEN 1 ELSE
        0 END", "Valid Loan Intents", lambda x: x == 1)'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 15
        end_line: 15
        file: ''
      - start_line: 30
        end_line: 31
        file: ''
    - text: 'The ''loan_intent'' column should have a manageable number of unique
        values (specifically, no more than 6 distinct values), to ensure meaningful
        grouping and reporting. The downstream analytics expect to produce a reasonable
        number of result rows per group.

        We could represent this assumption as a deequ constraint like this:

        .hasNumberOfDistinctValuesBetween(''loan_intent'', 1, 6)'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 30
        end_line: 31
        file: ''
  loan_percent_income:
    code:
    - suggestion: '.hasCompleteness(''loan_percent_income'', lambda x: x == 1.0)'
      validity: true
      level: error
    - suggestion: '.hasDataType(''loan_percent_income'', ''Fractional'', lambda x:
        x == 1.0)'
      validity: false
      level: error
    assumptions:
    - text: 'The ''loan_percent_income'' column must be complete (no null values)
        in the input data, because the code calculates the average of this column
        directly using AVG(percent_col) without any null handling. Null values would
        cause the aggregate to ignore those rows, potentially skewing the average
        and reducing the effective sample size. To ensure meaningful and accurate
        results, all values in ''loan_percent_income'' should be present (non-null).
        We could represent this assumption as a deequ constraint like this: .hasCompleteness(''loan_percent_income'',
        lambda x: x == 1.0)'
      sources:
      - start_line: 5
        end_line: 11
        file: ''
      - start_line: 27
        end_line: 27
        file: ''
    - text: 'The ''loan_percent_income'' column should contain only fractional (real
        number) values, as the code expects to compute the average and rounds the
        result to two decimal places. Non-numeric or string values would cause the
        query to fail or yield incorrect results. We could represent this assumption
        as a deequ constraint like this: .isFractional(''loan_percent_income'')'
      sources:
      - start_line: 5
        end_line: 11
        file: ''
      - start_line: 27
        end_line: 27
        file: ''
  loan_status:
    code:
    - suggestion: .isComplete('loan_status')
      validity: true
      level: error
    - suggestion: .isContainedIn('loan_status', [0, 1])
      validity: false
      level: error
    - suggestion: .hasDataType('loan_status', 'Integral')
      validity: false
      level: error
    - suggestion: '.hasNumberOfDistinctValues(''loan_status'', lambda x: x == 2)'
      validity: false
      level: warning
    assumptions:
    - text: The 'loan_status' column must have no null values. This is because it
        is used in COUNT and SUM aggregation expressions without any null handling
        (e.g., no COALESCE or ISNULL), and the dataset description indicates 100%
        completeness. Any nulls would cause incorrect aggregation results or could
        lead to errors in SQL environments with strict null handling.
      sources:
      - start_line: 7
        end_line: 7
        file: ''
      - start_line: 18
        end_line: 21
        file: ''
    - text: The 'loan_status' column should only contain the values 0 and 1. The code
        interprets 'loan_status = 1' as default, and any other value as non-default,
        and the dataset histogram shows only values '0' and '1'. Any other value would
        result in misclassification or errors in downstream logic.
      sources:
      - start_line: 7
        end_line: 7
        file: ''
      - start_line: 18
        end_line: 21
        file: ''
    - text: The 'loan_status' column must be of an integral data type (integer or
        boolean), as it is used in equality comparison and aggregation expressions.
        Non-integer types could lead to type errors or unexpected results in SQL.
      sources:
      - start_line: 7
        end_line: 7
        file: ''
      - start_line: 18
        end_line: 21
        file: ''
    - text: The distribution of 'loan_status' values should allow for meaningful calculation
        of default rates. This means that both values (0 and 1) should be present
        in the data, as the code calculates default rates per group (grade_col, intent_col).
        If only one value is present in a group, the default rate calculation may
        not be meaningful.
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 30
        end_line: 31
        file: ''
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      validity: true
      level: error
    - suggestion: .hasDataType('person_income', 'Integral')
      validity: false
      level: error
    - suggestion: .isNonNegative('person_income')
      validity: true
      level: error
    assumptions:
    - text: 'The ''person_income'' column must not contain any null values, as the
        code computes AVG(person_income) without any null-handling logic. This implies
        that all records must have a valid (non-null) integer value for ''person_income''.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN `person_income` IS NOT NULL THEN 1 ELSE 0 END", "Non-null
        person_income", lambda x: x == 1)'
      sources:
      - start_line: 10
        end_line: 10
        file: ''
      - start_line: 26
        end_line: 26
        file: ''
    - text: 'The ''person_income'' column should contain only integral (whole number)
        values, as indicated by its data type and by the use of AVG and ROUND functions
        expecting numeric input. Non-integer or malformed values could cause errors
        or misleading results.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CAST(`person_income` AS BIGINT) = `person_income`", "person_income
        is integral", lambda x: x == 1)'
      sources:
      - start_line: 10
        end_line: 10
        file: ''
      - start_line: 26
        end_line: 26
        file: ''
    - text: 'The ''person_income'' column should contain a reasonable numeric range
        (e.g., non-negative values), as negative income values would be illogical
        for borrower income and would distort the AVG calculation in the results.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("`person_income` >= 0", "Non-negative person_income", lambda x:
        x == 1)'
      sources:
      - start_line: 10
        end_line: 10
        file: ''
      - start_line: 26
        end_line: 26
        file: ''
