prismadv_config:
  model:
    variant: default
    use_async: true
    use_dataflow: true
    downstream_task_description: The code is written for SQL Query task. The code
      is expected to run on a database and return the results. you are asked to generate
      constraints on the upcoming *test* data to ensure that the code can run without
      any errors and the results are meaningful.
  llm:
    model_name: gpt-4.1
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  id:
    code:
    - suggestion: .isComplete('id')
      validity: true
      level: error
    - suggestion: .isUnique('id')
      validity: true
      level: warning
    - suggestion: '.hasDataType(''id'', ''Integral'', lambda x: x == 1.0)'
      validity: false
      level: error
    - suggestion: '.satisfies(''id = 43152'', ''Contains id 43152'', lambda x: x >=
        1)'
      validity: false
      level: error
    assumptions:
    - text: The 'id' column must not contain null values, as it is used in the WHERE
        clause and GROUP BY clause; null values would cause records to be excluded
        or result in errors during grouping. This is consistent with the reported
        completeness of 1.0.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
      - start_line: 11
        end_line: 11
        file: ''
    - text: The 'id' column is expected to contain unique values per person or entity
        in the dataset, as it is used as a grouping key in GROUP BY and as a filter
        in the WHERE clause. While GROUP BY on 'id' does not strictly require global
        uniqueness, the downstream code assumes that each id refers to a distinct
        entity for meaningful aggregation.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
      - start_line: 11
        end_line: 11
        file: ''
    - text: The 'id' column should contain only integer/integral values, as indicated
        by the column dataType and its use in equality comparison in the WHERE clause.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
    - text: The 'id' column must contain the value 43152 in the test data; otherwise,
        the query will return no results. This assumes that the incoming data includes
        at least one row with id = 43152.
      sources:
      - start_line: 10
        end_line: 10
        file: ''
  loan_amnt:
    code:
    - suggestion: '.hasCompleteness(''loan_amnt'', lambda x: x == 1.0)'
      validity: true
      level: error
    - suggestion: '.hasDataType(''loan_amnt'', ''Integral'', lambda x: x == 1.0)'
      validity: false
      level: error
    - suggestion: '.hasMin(''loan_amnt'', lambda x: x >= 0)'
      validity: true
      level: error
    assumptions:
    - text: 'The ''loan_amnt'' column must not contain any null values, as SUM(loan_amnt)
        is used in aggregation and comparison without null handling. If there are
        null values, the SUM aggregate may return NULL or inaccurate results, causing
        eligibility calculations to fail or misbehave. We could represent this assumption
        as a deequ constraint like this: .hasCompleteness(''loan_amnt'', lambda x:
        x == 1.0)'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
    - text: 'The ''loan_amnt'' column should only contain integral numeric values,
        as it is summed and compared numerically in the code. Non-numeric or non-integral
        values would cause errors or incorrect results in SUM or arithmetic operations.
        We could represent this assumption as a deequ constraint like this: .isNonNegative(''loan_amnt'')
        and .isIntegral(''loan_amnt'')'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
    - text: 'The ''loan_amnt'' values should be non-negative, since negative loan
        amounts would not make sense in the context of summing someone''s current
        loans for eligibility. Negative values could distort the sum and lead to incorrect
        eligibility decisions. We could represent this assumption as a deequ constraint
        like this: .hasMin(''loan_amnt'', lambda x: x >= 0)'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      validity: true
      level: error
    - suggestion: '.hasDataType(''person_income'', ''Integral'', lambda x: x == 1.0)'
      validity: false
      level: error
    - suggestion: .isNonNegative('person_income')
      validity: true
      level: error
    assumptions:
    - text: The 'person_income' column must not contain any NULL values, as the code
        selects and groups by 'person_income' without handling NULLs. The column is
        expected to be fully complete in the input data.
      sources:
      - start_line: 3
        end_line: 3
        file: ''
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 11
        end_line: 11
        file: ''
    - text: The 'person_income' column should contain only integral (whole number)
        values, as the column is of Integral data type and is used in numeric comparisons
        (e.g., 'person_income > SUM(loan_amnt) * 2').
      sources:
      - start_line: 3
        end_line: 3
        file: ''
      - start_line: 6
        end_line: 6
        file: ''
    - text: The 'person_income' column should have a reasonable numeric range and
        should not contain negative values, since negative income would not make sense
        in the context of loan eligibility. All values should be greater than or equal
        to zero.
      sources:
      - start_line: 3
        end_line: 3
        file: ''
      - start_line: 6
        end_line: 6
        file: ''
