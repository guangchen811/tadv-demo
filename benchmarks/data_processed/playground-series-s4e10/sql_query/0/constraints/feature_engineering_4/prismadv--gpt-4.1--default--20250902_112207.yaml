prismadv_config:
  model:
    variant: default
    use_async: true
    use_dataflow: true
    downstream_task_description: The code is written for SQL Query task. The code
      is expected to run on a database and return the results. you are asked to generate
      constraints on the upcoming *test* data to ensure that the code can run without
      any errors and the results are meaningful.
  llm:
    model_name: gpt-4.1
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  person_home_ownership:
    code:
    - suggestion: .isComplete('person_home_ownership')
      validity: true
      level: error
    - suggestion: .isContainedIn('person_home_ownership', ['RENT', 'MORTGAGE', 'OWN',
        'OTHER'])
      validity: true
      level: error
    - suggestion: '.satisfies("CASE WHEN person_home_ownership = ''OTHER'' THEN 1
        ELSE 0 END", "Rare Home Ownership Category", lambda x: x < 0.01)'
      validity: true
      level: warning
    assumptions:
    - text: 'The ''person_home_ownership'' column must not contain any NULL values
        because the code directly compares its value to specific strings (''RENT'',
        ''MORTGAGE'', ''OWN'') without handling NULLs. Any NULL value would cause
        the resulting one-hot encoded columns to default to 0, which may not be the
        intended logic. We could represent this assumption as a deequ constraint like
        this: .isComplete(''person_home_ownership'')'
      sources:
      - start_line: 3
        end_line: 5
        file: ''
    - text: 'The ''person_home_ownership'' column should only contain the values ''RENT'',
        ''MORTGAGE'', ''OWN'', or ''OTHER'', as these are the only values present
        in the training data histogram. Any unexpected value will result in all one-hot
        encoded columns being 0, which may be undesirable. We could represent this
        assumption as a deequ constraint like this: .isContainedIn(''person_home_ownership'',
        [''RENT'', ''MORTGAGE'', ''OWN'', ''OTHER''])'
      sources:
      - start_line: 3
        end_line: 5
        file: ''
    - text: 'The distribution of ''person_home_ownership'' values in the test data
        should be similar to the training data, where ''RENT'', ''MORTGAGE'', and
        ''OWN'' make up the vast majority. ''OTHER'' should remain a rare category
        (less than 1% of the data). We could represent this assumption as a deequ
        constraint like this: .satisfies("CASE WHEN person_home_ownership = ''OTHER''
        THEN 1 ELSE 0 END", "Rare Home Ownership Category", lambda x: x < 0.01)'
      sources:
      - start_line: 3
        end_line: 5
        file: ''
column_data_flow_locations:
  person_home_ownership:
  - start_line: 3
    end_line: 5
    file: ''
