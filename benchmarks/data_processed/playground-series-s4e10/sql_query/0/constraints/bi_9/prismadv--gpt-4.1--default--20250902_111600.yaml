        We could represent this assumption as a deequ constraint like this:

        .satisfies(''CAST(person_income AS BIGINT) = person_income'', ''Person Income
        Integral'', lambda x: x == 1.0)'
      sources:
      - start_line: 3
        end_line: 8
        file: ''
    - text: 'The ''person_income'' column is used for calculating average income per
