        end_line: 12
        file: ''
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      validity: true
      level: error
    - suggestion: '.satisfies(''CAST(person_income AS BIGINT) = person_income'', ''Person
        Income Integral'', lambda x: x == 1.0)'
      validity: true
      level: error
    - suggestion: .isNonNegative('person_income')
      validity: true
      level: warning
    assumptions:
    - text: 'The ''person_income'' column must not contain any null values, as the
        code uses it in AVG() aggregation without any null handling. Nulls in this
        column would cause the average to be calculated over fewer records or potentially
        cause errors, depending on database settings. Therefore, all records in the
        input data must have a non-null ''person_income'' value.

        We could represent this assumption as a deequ constraint like this:

        .hasCompleteness(''person_income'', lambda x: x == 1.0)'
      sources:
      - start_line: 3
        end_line: 8
        file: ''
    - text: 'The ''person_income'' column is expected to contain only integral (whole
        number) values, as it is used directly in arithmetic operations (AVG and ROUND)
