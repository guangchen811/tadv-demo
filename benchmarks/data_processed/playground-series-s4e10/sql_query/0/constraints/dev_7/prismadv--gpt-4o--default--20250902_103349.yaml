constraints:
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      validity: true
      level: error
    - suggestion: .hasDataType('loan_amnt', 'Integral')
      validity: false
      level: error
    assumptions:
    - text: The 'loan_amnt' column should not have null values because the code computes
        the average loan amount using AVG(loan_amnt), which assumes that the column
        does not contain null values.
      sources:
      - start_line: 7
        end_line: 7
        file: ''
    - text: The 'loan_amnt' column should contain numeric values as it is used to
        compute an average, which requires numeric data. The data type of the column
        is Integral, supporting this assumption.
      sources:
      - start_line: 7
        end_line: 7
        file: ''
  loan_int_rate:
    code:
    - suggestion: .isComplete('loan_int_rate')
      validity: true
      level: error
    - suggestion: .hasDataType('loan_int_rate', 'Fractional')
      validity: false
      level: error
    assumptions:
    - text: The 'loan_int_rate' column should not contain null values, as the code
        calculates the average interest rate using AVG(loan_int_rate), which assumes
        no null values in the column. This is supported by the data characteristic
        that indicates its completeness is 1.0.
      sources:
      - start_line: 10
        end_line: 10
        file: ''
    - text: The 'loan_int_rate' column should have a numerical data type, specifically
        fractional, to allow for meaningful calculation of the average interest rate.
        This is consistent with the column's data type being Fractional.
      sources:
      - start_line: 10
        end_line: 10
        file: ''
  loan_status:
    code:
    - suggestion: .isContainedIn('loan_status', [0, 1])
      validity: false
      level: error
    - suggestion: .isComplete('loan_status')
      validity: true
      level: error
    assumptions:
    - text: 'The ''loan_status'' column should only contain the distinct values ''0''
        and ''1'', as the code uses these values to determine the number of defaults.
        We could represent this assumption as a deequ constraint like this: .satisfies("CASE
        WHEN `loan_status` IN (0, 1) THEN 1 ELSE 0 END", "Valid Loan Status", lambda
        x: x == 1)'
      sources:
      - start_line: 13
        end_line: 13
        file: ''
    - text: 'The ''loan_status'' column should not contain null values, as the code
        performs an aggregation operation on it without any null handling. We could
        represent this assumption as a deequ constraint like this: .satisfies("CASE
        WHEN `loan_status` IS NOT NULL THEN 1 ELSE 0 END", "Non-null Loan Status",
        lambda x: x == 1)'
      sources:
      - start_line: 13
        end_line: 13
        file: ''
  person_home_ownership:
    code:
    - suggestion: .isComplete('person_home_ownership')
      validity: true
      level: error
    - suggestion: .isContainedIn('person_home_ownership', ['RENT', 'OWN', 'MORTGAGE',
        'OTHER'])
      validity: true
      level: error
    assumptions:
    - text: The 'person_home_ownership' column should not have null values because
        the column is directly used in the GROUP BY clause, which implies that the
        column is expected to be complete without missing values.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 18
        end_line: 18
        file: ''
    - text: 'The ''person_home_ownership'' column is expected to contain one of the
        predefined categories: RENT, OWN, MORTGAGE, or OTHER, as the analysis is based
