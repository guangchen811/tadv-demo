prismadv_config:
  model:
    variant: default
    use_async: true
    use_dataflow: true
    downstream_task_description: The code is written for SQL Query task. The code
      is expected to run on a database and return the results. you are asked to generate
      constraints on the upcoming *test* data to ensure that the code can run without
      any errors and the results are meaningful.
  llm:
    model_name: gpt-4.1
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      validity: true
      level: error
    - suggestion: .hasDataType('loan_amnt', ConstrainableDataTypes.Integral)
      validity: false
      level: error
    - suggestion: .isNonNegative('loan_amnt')
      validity: true
      level: error
    - suggestion: .satisfies('loan_amnt <= 1000000', 'Maximum Loan Amount')
      validity: true
      level: warning
    assumptions:
    - text: 'The ''loan_amnt'' column must not contain any null values, since it is
        used in aggregation functions AVG() and SUM() without any null-handling. Null
        values would cause these aggregations to return incorrect results or possibly
        errors in some SQL engines. We could represent this assumption as a deequ
        constraint like this: .isComplete(''loan_amnt'')'
      sources:
      - start_line: 8
        end_line: 8
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
    - text: 'The ''loan_amnt'' column should contain only integral (whole number)
        values, as the data type is Integral and the column is directly aggregated
        and averaged. We could represent this assumption as a deequ constraint like
        this: .hasDataType(''loan_amnt'', ConstrainableDataTypes.Integral)'
      sources:
      - start_line: 8
        end_line: 8
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
    - text: 'The ''loan_amnt'' column should contain only non-negative values (i.e.,
        loan amounts should not be negative), because negative loan amounts are not
        meaningful in the context of loan statistics and would distort the calculated
        averages and ratios. We could represent this assumption as a deequ constraint
        like this: .satisfies(''loan_amnt >= 0'', ''Non-negative Loan Amounts'')'
      sources:
      - start_line: 8
        end_line: 8
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
    - text: 'The ''loan_amnt'' column should have a reasonable range, e.g., should
        not contain extremely large values that could skew averages or ratios. This
        is implied by the use of AVG() and SUM() in business reporting. A typical
        check might ensure that ''loan_amnt'' values are within expected business
        limits, for example between 0 and 1,000,000. We could represent this assumption
        as a deequ constraint like this: .satisfies(''loan_amnt <= 1000000'', ''Maximum
        Loan Amount'')'
      sources:
      - start_line: 8
        end_line: 8
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
  loan_int_rate:
    code:
    - suggestion: .isComplete('loan_int_rate')
      validity: true
      level: error
    - suggestion: '.hasDataType(''loan_int_rate'', ''Fractional'', lambda x: x ==
        1.0)'
      validity: false
      level: error
    - suggestion: .satisfies('loan_int_rate > 0 AND loan_int_rate < 100', 'loan_int_rate
        realistic range')
      validity: true
      level: warning
    assumptions:
    - text: The 'loan_int_rate' column must not contain any null values, because the
        code applies the AVG() aggregate function to 'loan_int_rate' without handling
        nulls. SQL AVG(column) ignores nulls, but if all values in a group are null,
        the result will be null, which may not be meaningful for downstream analytics.
        Therefore, to ensure each income band group has a valid average interest rate,
        'loan_int_rate' should be complete (no nulls) in the input data.
      sources:
      - start_line: 9
        end_line: 9
        file: ''
    - text: The 'loan_int_rate' column should contain only fractional numeric values,
        as it is used with the AVG() aggregate and then rounded. Non-numeric or non-fractional
        values would cause errors or incorrect results.
      sources:
      - start_line: 9
        end_line: 9
        file: ''
    - text: The 'loan_int_rate' column should have values within a realistic and reasonable
        range for loan interest rates (e.g., greater than 0 and less than 100), to
        ensure that the computed average interest rates are meaningful and not skewed
        by outliers or erroneous data.
      sources:
      - start_line: 9
        end_line: 9
        file: ''
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      validity: true
      level: error
    - suggestion: .satisfies('person_income <> 0', 'person_income not zero')
      validity: true
      level: error
    - suggestion: '.hasDataType(''person_income'', ''Integral'', lambda x: x == 1)'
      validity: false
      level: error
    assumptions:
    - text: The 'person_income' column must not contain null values, as it is used
        in conditional logic (CASE WHEN) and in the denominator of a division operation.
        Nulls would cause incorrect banding and could cause division by null errors.
      sources:
      - start_line: 3
        end_line: 5
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
    - text: The 'person_income' column must not contain zero values, as it is used
        as a denominator in SUM(person_income) in a division operation, which could
        cause division by zero errors.
      sources:
      - start_line: 10
        end_line: 10
        file: ''
    - text: The 'person_income' column should only contain integral (whole number)
        values, as expected by its declared data type and usage in numerical operations.
      sources:
      - start_line: 3
        end_line: 4
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
