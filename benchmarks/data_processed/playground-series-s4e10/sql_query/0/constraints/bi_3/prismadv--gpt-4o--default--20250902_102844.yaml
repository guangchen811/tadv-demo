      - start_line: 10
        end_line: 10
        file: ''
    - text: The 'cb_person_default_on_file' column should only contain values 'Y'
        and 'N', as the code calculates the default rate based on whether the value
        is 'Y'. The histogram indicates these are the only two values present.
      sources:
      - start_line: 10
