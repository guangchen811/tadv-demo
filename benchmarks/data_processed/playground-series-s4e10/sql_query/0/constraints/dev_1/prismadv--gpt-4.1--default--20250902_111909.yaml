prismadv_config:
  model:
    variant: default
    use_async: true
    use_dataflow: true
    downstream_task_description: The code is written for SQL Query task. The code
      is expected to run on a database and return the results. you are asked to generate
      constraints on the upcoming *test* data to ensure that the code can run without
      any errors and the results are meaningful.
  llm:
    model_name: gpt-4.1
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      validity: true
      level: error
    - suggestion: .isContainedIn('loan_grade', ['A', 'B', 'C', 'D', 'E', 'F', 'G'])
      validity: true
      level: error
    - suggestion: .hasDataType('loan_grade', 'String')
      validity: false
      level: error
    assumptions:
    - text: 'The ''loan_grade'' column must be present in the input data and must
        not contain any null values, since the code groups and counts by ''loan_grade''
        without handling nulls. The column is expected to be 100% complete (no missing
        values). We could represent this assumption as a deequ constraint like this:
        .hasCompleteness(''loan_grade'', lambda x: x == 1.0)'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
    - text: 'All values in the ''loan_grade'' column must be within the expected set
        of grades: ''A'', ''B'', ''C'', ''D'', ''E'', ''F'', or ''G'', as the downstream
        analysis assumes only these categories are present for aggregation and reporting.
        We could represent this assumption as a deequ constraint like this: .satisfies("CASE
        WHEN loan_grade IN (''A'', ''B'', ''C'', ''D'', ''E'', ''F'', ''G'') THEN
        1 ELSE 0 END", ''Valid loan_grade values'', lambda x: x == 1.0)'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
    - text: 'The ''loan_grade'' column should be of string type, as grouping and reporting
        is performed on string categories such as ''A'', ''B'', etc. We could represent
        this assumption as a deequ constraint like this: .isType(''loan_grade'', ConstrainableDataTypes.String)'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
column_data_flow_locations:
  loan_grade:
  - start_line: 6
    end_line: 6
    file: ''
  - start_line: 10
    end_line: 10
    file: ''
