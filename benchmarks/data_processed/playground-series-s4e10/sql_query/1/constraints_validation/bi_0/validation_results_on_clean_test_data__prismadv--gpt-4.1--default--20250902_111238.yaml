results:
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('loan_grade', ['A', 'B', 'C', 'D', 'E', 'F', 'G'])
      status: true
      reason_if_failed: ''
      level: error
  loan_int_rate:
    code:
    - suggestion: .isComplete('loan_int_rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('loan_int_rate > 0 AND loan_int_rate < 100', 'loan_int_rate
        in (0, 100) exclusive')
      status: true
      reason_if_failed: ''
      level: warning
  loan_status:
    code:
    - suggestion: .isComplete('loan_status')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''loan_status IN (0, 1)'', ''Valid loan_status values'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  person_emp_length:
    code:
    - suggestion: .isComplete('person_emp_length')
      status: true
      reason_if_failed: ''
      level: error
