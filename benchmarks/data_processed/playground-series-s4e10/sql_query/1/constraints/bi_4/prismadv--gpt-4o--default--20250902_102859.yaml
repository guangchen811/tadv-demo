prismadv_config:
  model:
    variant: default
    use_async: true
    use_dataflow: true
    downstream_task_description: The code is written for SQL Query task. The code
      is expected to run on a database and return the results. you are asked to generate
      constraints on the upcoming *test* data to ensure that the code can run without
      any errors and the results are meaningful.
  llm:
    model_name: gpt-4o
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  cb_person_default_on_file:
    code:
    - suggestion: .isContainedIn('cb_person_default_on_file', ['Y', 'N'])
      validity: true
      level: error
    - suggestion: .isComplete('cb_person_default_on_file')
      validity: true
      level: error
    assumptions:
    - text: 'The ''cb_person_default_on_file'' column should only contain the values
        ''Y'' or ''N'', as the code filters rows based on whether the value is ''N''.
        This implies that any other values would be considered invalid in the context
        of this query. We could represent this assumption as a deequ constraint like
        this: .satisfies("CASE WHEN `cb_person_default_on_file` IN (''Y'', ''N'')
        THEN 1 ELSE 0 END", "Valid Default Values", lambda x: x == 1)'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
    - text: 'The ''cb_person_default_on_file'' column should be complete, meaning
        it should not contain null values, as the code does not handle nulls and filters
        directly on specific non-null values (''N''). We could represent this assumption
        as a deequ constraint like this: .satisfies("CASE WHEN `cb_person_default_on_file`
        IS NOT NULL THEN 1 ELSE 0 END", "Non-null Default Values", lambda x: x ==
        1)'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
  loan_intent:
    code:
    - suggestion: .isComplete('loan_intent')
      validity: true
      level: error
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION', 'HOMEIMPROVEMENT', 'PERSONAL',
        'DEBTCONSOLIDATION', 'MEDICAL', 'VENTURE'])
      validity: true
      level: error
    assumptions:
    - text: The 'loan_intent' column should not contain null values because the SQL
        query groups by this column, which implies that it is expected to have complete
        data.
      sources:
      - start_line: 8
        end_line: 8
        file: ''
    - text: 'The ''loan_intent'' column should contain only the known categories:
        EDUCATION, HOMEIMPROVEMENT, PERSONAL, DEBTCONSOLIDATION, MEDICAL, VENTURE.
        This is based on the histogram of values, which suggests these are the expected
        categories for loan intent.'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
