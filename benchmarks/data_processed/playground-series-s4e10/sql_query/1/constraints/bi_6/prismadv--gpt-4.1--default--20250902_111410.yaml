prismadv_config:
  model:
    variant: default
    use_async: true
    use_dataflow: true
    downstream_task_description: The code is written for SQL Query task. The code
      is expected to run on a database and return the results. you are asked to generate
      constraints on the upcoming *test* data to ensure that the code can run without
      any errors and the results are meaningful.
  llm:
    model_name: gpt-4.1
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      validity: true
      level: error
    - suggestion: '.hasDataType(''loan_amnt'', ''Integral'', lambda x: x == 1.0)'
      validity: false
      level: error
    - suggestion: .isNonNegative('loan_amnt')
      validity: true
      level: error
    - suggestion: '.hasNumberOfDistinctValues(''loan_amnt'', lambda x: x >= 400 and
        x <= 600)'
      validity: false
      level: warning
    assumptions:
    - text: The 'loan_amnt' column must not contain any null values, as the code calculates
        the average (AVG) loan amount per group without handling nulls. SQL aggregate
        functions like AVG ignore nulls, but since the dataset completeness for 'loan_amnt'
        is 1.0, it is assumed there are no missing values in the input data. This
        ensures that the average loan amount is meaningful and based on actual values
        for every record.
      sources:
      - start_line: 12
        end_line: 12
        file: ''
    - text: The 'loan_amnt' column should only contain integral (whole number) values,
        as indicated by the dataType being Integral. This is consistent with the expectation
        that loan amounts are represented as whole numbers (e.g., dollars, not cents
        or fractional amounts) and ensures that any downstream calculations, such
        as averages, are meaningful and not affected by unexpected data types.
      sources:
      - start_line: 12
        end_line: 12
        file: ''
    - text: The 'loan_amnt' column should have a reasonable range of values, consistent
        with the observed approximate number of distinct values (466). Extreme outliers
        or negative values could distort the average calculation and lead to misleading
        results in the analysis. While no explicit minimum or maximum is set in the
        code, the input data should be checked for negative or implausibly large loan
        amounts.
      sources:
      - start_line: 12
        end_line: 12
        file: ''
  loan_grade:
    code:
    - suggestion: .isComplete('loan_grade')
      validity: true
      level: error
    - suggestion: .isContainedIn('loan_grade', ['A', 'B', 'C', 'D', 'E', 'F', 'G'])
      validity: true
      level: error
    - suggestion: '.hasDataType(''loan_grade'', ''String'', lambda x: x == 1.0)'
      validity: false
      level: error
    assumptions:
    - text: 'The ''loan_grade'' column must not contain any null values because it
        is used as a grouping key (GROUP BY) and appears in SELECT and ORDER BY clauses.
        SQL GROUP BY and ORDER BY require non-null values for meaningful aggregation
        and ordering. Therefore, all records in the input data must have a non-null
        ''loan_grade'' value. This is also supported by the dataset characteristic
        ''completeness: 1.0'', indicating no missing values.'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 17
        end_line: 17
        file: ''
      - start_line: 21
        end_line: 21
        file: ''
    - text: 'The ''loan_grade'' column should only contain the known set of values:
        ''A'', ''B'', ''C'', ''D'', ''E'', ''F'', ''G''. The code assumes these are
        the valid credit grades for analysis and aggregation. Any new, unexpected,
        or misspelled values would disrupt the grouping and interpretation of results.
        This is supported by the dataset histogram showing only these seven distinct
        values.'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 17
        end_line: 17
        file: ''
      - start_line: 21
        end_line: 21
        file: ''
    - text: The 'loan_grade' column should be of string (categorical) data type, as
        it represents discrete credit grade categories and is used for grouping and
        ordering in SQL. Non-string types (such as numeric or boolean) would cause
        errors or misinterpretation in the downstream SQL query.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 17
        end_line: 17
        file: ''
      - start_line: 21
        end_line: 21
        file: ''
  loan_intent:
    code:
    - suggestion: .isComplete('loan_intent')
      validity: true
      level: error
    - suggestion: .isContainedIn('loan_intent', ['EDUCATION', 'HOMEIMPROVEMENT', 'PERSONAL',
        'DEBTCONSOLIDATION', 'MEDICAL', 'VENTURE'])
      validity: true
      level: error
    - suggestion: .hasDataType('loan_intent', 'String')
      validity: false
      level: error
    assumptions:
    - text: The 'loan_intent' column must be complete (no null or missing values),
        since it is used directly in GROUP BY and SELECT clauses. Any null values
        would cause groupings to fail or create ambiguous results in the output.
      sources:
      - start_line: 3
        end_line: 3
        file: ''
      - start_line: 17
        end_line: 18
        file: ''
      - start_line: 22
        end_line: 22
        file: ''
    - text: 'The ''loan_intent'' column should only contain one of the six known categories:
        EDUCATION, HOMEIMPROVEMENT, PERSONAL, DEBTCONSOLIDATION, MEDICAL, VENTURE.
        The analysis assumes that all values in ''loan_intent'' are valid and interpretable;
        unexpected or new categories may cause misleading groupings or incomplete
        results.'
      sources:
      - start_line: 3
        end_line: 3
        file: ''
      - start_line: 17
        end_line: 18
        file: ''
      - start_line: 22
        end_line: 22
        file: ''
    - text: The 'loan_intent' column should be of string type, as it is used as a
        categorical variable for grouping and reporting. If values are not strings,
        grouping and result interpretation could fail.
      sources:
      - start_line: 3
        end_line: 3
        file: ''
      - start_line: 17
        end_line: 18
        file: ''
      - start_line: 22
        end_line: 22
        file: ''
  loan_percent_income:
    code:
    - suggestion: .isComplete('loan_percent_income')
      validity: true
      level: error
    - suggestion: .hasDataType('loan_percent_income', ConstrainableDataTypes.Fractional)
      validity: false
      level: error
    - suggestion: '.hasDistinctness(''loan_percent_income'', lambda x: x > 1)'
      validity: false
      level: warning
    assumptions:
    - text: 'The ''loan_percent_income'' column must not contain any null values,
        as the code directly computes the average (AVG) of ''loan_percent_income''
        without any null handling. This means all input data for this column must
        be complete to avoid SQL errors or misleading results.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN `loan_percent_income` IS NOT NULL THEN 1 ELSE 0 END",
        "No Nulls in loan_percent_income", lambda x: x == 1)'
      sources:
      - start_line: 14
        end_line: 14
        file: ''
    - text: 'The ''loan_percent_income'' column should contain only numeric (fractional)
        values, as the code calculates its average and the column is expected to represent
        the percentage of income allocated to loan repayment. Non-numeric or malformed
        values would cause errors or inaccurate results.

        We could represent this assumption as a deequ constraint like this:

        .hasDataType("loan_percent_income", ConstrainableDataTypes.Fractional)'
      sources:
      - start_line: 14
        end_line: 14
        file: ''
    - text: 'The distribution of ''loan_percent_income'' should be meaningful for
        average calculation and group comparisons. Since the code reports averages
        grouped by ''loan_grade'' and ''loan_intent'', there should be sufficient
        variability (i.e., more than one distinct value) in ''loan_percent_income''
        for each group, or else the results may not provide useful insights.

        We could represent this assumption as a deequ constraint like this:

        .hasDistinctness("loan_percent_income", lambda x: x > threshold)  # where
        threshold > 1, per group'
      sources:
      - start_line: 14
        end_line: 14
        file: ''
      - start_line: 17
        end_line: 18
        file: ''
  loan_status:
    code:
    - suggestion: .isComplete('loan_status')
      validity: true
      level: error
    - suggestion: .isContainedIn('loan_status', [0, 1])
      validity: false
      level: error
    - suggestion: .hasDataType('loan_status', 'Integral')
      validity: false
      level: error
    assumptions:
    - text: The 'loan_status' column must be complete (no nulls) in the input data,
        as it is directly used in aggregation and conditional expressions (e.g., SUM(CASE
        WHEN loan_status = 1 THEN 1 ELSE 0 END)), and SQL aggregation functions on
        NULL values would lead to incorrect default counts and rates.
      sources:
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 9
        end_line: 10
        file: ''
    - text: The 'loan_status' column should only contain the values 0 and 1, representing
        non-default and default loans, respectively, as the code interprets 'loan_status
        = 1' as a default and all other values as non-default. Any other values would
        make the default rate calculation incorrect.
      sources:
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 9
        end_line: 10
        file: ''
    - text: The 'loan_status' column should be of integral (integer) data type, as
        it is used in equality comparisons (loan_status = 1) and aggregation logic
        that expects integer values.
      sources:
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 9
        end_line: 10
        file: ''
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      validity: true
      level: error
    - suggestion: .hasDataType('person_income', ConstrainableDataTypes.Integral)
      validity: false
      level: error
    - suggestion: '.hasApproxQuantile(''person_income'', 0.01, lambda q: q >= lower_bound)'
      validity: false
      level: warning
    - suggestion: '.hasApproxQuantile(''person_income'', 0.99, lambda q: q <= upper_bound)'
      validity: false
      level: warning
    assumptions:
    - text: 'The ''person_income'' column must not contain any null values. This is
        required because the code computes the average income using AVG(person_income)
        in SQL, which ignores NULLs, and the completeness of the column is 1.0, indicating
        full population. Therefore, the input data is assumed to always provide ''person_income''
        for every record. We could represent this assumption as a deequ constraint
        like this: .isComplete(''person_income'')'
      sources:
      - start_line: 13
        end_line: 13
        file: ''
    - text: 'The ''person_income'' column must contain only integral (integer) values.
        This is required because the data type is specified as Integral, and the code
        applies AVG and ROUND functions, which expect numeric input. We could represent
        this assumption as a deequ constraint like this: .hasDataType(''person_income'',
        ConstrainableDataTypes.Integral)'
      sources:
      - start_line: 13
        end_line: 13
        file: ''
    - text: 'The ''person_income'' column should have a reasonable range of values
        and not be constant or contain extreme outliers, as the code computes the
        average income per group. If all values are the same or if there are extreme
        outliers, the averages by group may not be meaningful. While the exact range
        is not specified, it is assumed that ''person_income'' reflects realistic
        borrower incomes. We could represent this assumption as a deequ constraint
        like this: .hasApproxQuantile(''person_income'', 0.01, lower_bound) and .hasApproxQuantile(''person_income'',
        0.99, upper_bound), where lower_bound and upper_bound are determined based
        on domain knowledge or training data.'
      sources:
      - start_line: 13
        end_line: 13
        file: ''
