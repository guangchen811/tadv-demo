prismadv_config:
  model:
    variant: default
    use_async: true
    use_dataflow: true
    downstream_task_description: The code is written for SQL Query task. The code
      is expected to run on a database and return the results. you are asked to generate
      constraints on the upcoming *test* data to ensure that the code can run without
      any errors and the results are meaningful.
  llm:
    model_name: gpt-5
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  cb_person_default_on_file:
    code:
    - suggestion: '.hasCompleteness("cb_person_default_on_file", lambda x: x >= 0.999)'
      validity: true
      level: warning
    - suggestion: '.isContainedIn("cb_person_default_on_file", ["Y", "N"], lambda
        x: x == 1.0)'
      validity: true
      level: error
    - suggestion: '.hasNumberOfDistinctValues("cb_person_default_on_file", lambda
        x: x <= 2)'
      validity: false
      level: warning
    assumptions:
    - text: 'The ''cb_person_default_on_file'' column should be complete (no NULLs)
        for virtually all rows, because the SQL CASE treats NULLs as non-defaults
        (0), which would bias the computed default_rate downward. We could represent
        this as a Deequ constraint like: .isComplete("cb_person_default_on_file")
        or .satisfies("CASE WHEN cb_person_default_on_file IS NOT NULL THEN 1 ELSE
        0 END", "cb_person_default_on_file not null", lambda x: x >= 0.999).'
      sources:
      - start_line: 10
        end_line: 10
        file: ''
    - text: 'The ''cb_person_default_on_file'' column values must be encoded exactly
        as ''Y'' or ''N'' (uppercase, no surrounding whitespace). Any other token
        (e.g., ''Yes'', ''No'', ''1'', ''0'', ''y'', ''n'', empty string) will be
        counted as non-default by the CASE and distort default_rate. We could represent
        this as a Deequ constraint: .satisfies("CASE WHEN TRIM(cb_person_default_on_file)
        IN (''Y'',''N'') THEN 1 ELSE 0 END", "cb_person_default_on_file domain", lambda
        x: x == 1.0) or a Great Expectations rule: expect_column_values_to_match_regex("^(Y|N)$").'
      sources:
      - start_line: 10
        end_line: 10
        file: ''
    - text: 'The ''cb_person_default_on_file'' column should have a domain cardinality
        of at most 2 (only ''Y'' and ''N''). We could represent this as a Deequ constraint:
        .hasNumberOfDistinctValues("cb_person_default_on_file", lambda x: x <= 2).'
      sources:
      - start_line: 10
        end_line: 10
        file: ''
  loan_grade:
    code:
    - suggestion: '.satisfies("CASE WHEN loan_int_rate > 15.0 THEN CASE WHEN loan_grade
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "loan_grade non-null for high-rate
        loans", lambda x: x == 1.0)'
      validity: true
      level: warning
    - suggestion: '.satisfies("CASE WHEN loan_grade IN (''A'',''B'',''C'',''D'',''E'',''F'',''G'')
        THEN 1 ELSE 0 END", "Valid loan_grade values", lambda x: x == 1.0)'
      validity: true
      level: warning
    assumptions:
    - text: 'For all rows that will be included by the query (rows where loan_int_rate
        > 15.0), loan_grade must be non-null so that GROUP BY produces valid segments
        and does not create a NULL bucket. We could represent this assumption as a
        deequ constraint like this: .satisfies("CASE WHEN loan_int_rate > 15.0 THEN
        CASE WHEN loan_grade IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "loan_grade
        non-null for high-rate loans", lambda x: x == 1.0)'
      sources:
      - start_line: 3
        end_line: 3
        file: ''
      - start_line: 13
        end_line: 13
        file: ''
      - start_line: 14
        end_line: 14
        file: ''
    - text: 'loan_grade values should be restricted to the standard credit grade set
        {A, B, C, D, E, F, G} (uppercase, no extra whitespace), ensuring meaningful
        credit-grade segments in the GROUP BY. We could represent this assumption
        as a deequ constraint like this: .satisfies("CASE WHEN loan_grade IN (''A'',''B'',''C'',''D'',''E'',''F'',''G'')
        THEN 1 ELSE 0 END", "Valid loan_grade values", lambda x: x == 1.0)'
      sources:
      - start_line: 3
        end_line: 3
        file: ''
      - start_line: 14
        end_line: 14
        file: ''
  loan_int_rate:
    code:
    - suggestion: .hasDataType("loan_int_rate", ConstrainableDataTypes.Fractional)
      validity: false
      level: error
    - suggestion: .isComplete("loan_int_rate")
      validity: true
      level: warning
    - suggestion: '.satisfies("loan_int_rate > 15", "High-rate presence", lambda x:
        x > 0)'
      validity: true
      level: warning
    - suggestion: '.isNonNegative("loan_int_rate", lambda x: x == 1.0)'
      validity: true
      level: warning
    - suggestion: '.hasMax("loan_int_rate", lambda m: m <= 100.0)'
      validity: true
      level: warning
    assumptions:
    - text: 'loan_int_rate must be numeric (fractional) so it can be compared with
        15.0 and averaged. We could represent this assumption as a deequ constraint
        like this: .hasDataType("loan_int_rate", ConstrainableDataTypes.Fractional)'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
      - start_line: 13
        end_line: 13
        file: ''
    - text: 'loan_int_rate should be non-null for incoming data to avoid losing rows
        in the WHERE filter and to ensure AVG operates on real values. We could represent
        this assumption as a deequ constraint like this: .isComplete("loan_int_rate")'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
      - start_line: 13
        end_line: 13
        file: ''
    - text: 'At least one record must have loan_int_rate > 15 so the filtered query
        produces results. We could represent this as a deequ constraint like this:
        .satisfies("CASE WHEN loan_int_rate > 15 THEN 1 ELSE 0 END", "High-rate presence",
        lambda x: x > 0.0)'
      sources:
      - start_line: 13
        end_line: 13
        file: ''
    - text: 'loan_int_rate should be non-negative (no negative interest rates). We
        could represent this as a deequ constraint like this: .satisfies("loan_int_rate
        >= 0", "Non-negative interest rate", lambda x: x == 1.0)'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
    - text: 'loan_int_rate should have a reasonable upper bound (e.g., <= 100) so
        the computed average is meaningful and not dominated by outliers or unit errors.
        We could represent this as a deequ constraint like this: .satisfies("loan_int_rate
        <= 100", "Reasonable upper bound", lambda x: x == 1.0)'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
  person_home_ownership:
    code:
    - suggestion: .isComplete("person_home_ownership")
      validity: true
      level: error
    - suggestion: '.satisfies("CASE WHEN loan_int_rate > 15.0 THEN person_home_ownership
        IS NOT NULL ELSE TRUE END", "person_home_ownership non-null when rate > 15",
        lambda x: x == 1.0)'
      validity: true
      level: warning
    - suggestion: '.satisfies("UPPER(TRIM(person_home_ownership)) IN (''RENT'',''OWN'',''MORTGAGE'',''OTHER'')",
        "Known home ownership categories", lambda x: x == 1.0)'
      validity: true
      level: error
    - suggestion: '.hasNumberOfDistinctValues("person_home_ownership", lambda x: x
        <= 4)'
      validity: false
      level: warning
    assumptions:
    - text: 'The ''person_home_ownership'' column must be non-null for all input rows
        (completeness = 1.0). At a minimum, it must be non-null for rows where loan_int_rate
        > 15.0 so those rows can be grouped without producing a NULL bucket. We could
        represent this as Deequ constraints like: .isComplete("person_home_ownership")
        and, if using a predicate, .isComplete("person_home_ownership").where("loan_int_rate
        > 15.0"); or as Great Expectations: expect_column_values_to_not_be_null with
        row_condition="loan_int_rate > 15.0".'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 14
        end_line: 14
        file: ''
    - text: 'The ''person_home_ownership'' values must be restricted to the known
        categories RENT, OWN, MORTGAGE, OTHER (case-insensitive after trimming) to
        avoid unexpected groups. We could represent this as a Deequ constraint: .satisfies("CASE
        WHEN person_home_ownership IS NOT NULL AND UPPER(TRIM(person_home_ownership))
        IN (''RENT'',''OWN'',''MORTGAGE'',''OTHER'') THEN 1 ELSE 0 END", "Valid home
        ownership", lambda x: x == 1.0); or as Great Expectations: expect_column_values_to_be_in_set
        with value_set=[''RENT'',''OWN'',''MORTGAGE'',''OTHER''] and a row-level transform
        that applies TRIM + UPPER.'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 14
        end_line: 14
        file: ''
    - text: 'The ''person_home_ownership'' column should have a small, finite cardinality
        consistent with the known categories (number of distinct values <= 4). This
        can be represented in Deequ as: .hasNumberOfDistinctValues("person_home_ownership",
        _ <= 4); or ApproxCountDistinct with an equivalent threshold.'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 14
        end_line: 14
        file: ''
