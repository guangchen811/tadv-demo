prismadv_config:
  model:
    variant: default
    use_async: true
    use_dataflow: true
    downstream_task_description: The code is written for SQL Query task. The code
      is expected to run on a database and return the results. you are asked to generate
      constraints on the upcoming *test* data to ensure that the code can run without
      any errors and the results are meaningful.
  llm:
    model_name: gpt-4o
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      validity: true
      level: error
    - suggestion: .hasDataType('loan_amnt', Integral)
      validity: false
      level: error
    assumptions:
    - text: The 'loan_amnt' column should not contain null values because the code
        calculates the average loan amount using this column. The completeness of
        the column is 1.0, which indicates no missing values are expected.
      sources:
      - start_line: 6
        end_line: 6
        file: ''
    - text: The 'loan_amnt' column should contain integral values as its data type
        is specified as Integral. This is critical for calculating the average loan
        amount meaningfully.
      sources:
      - start_line: 6
        end_line: 6
        file: ''
  loan_int_rate:
    code:
    - suggestion: .isComplete('loan_int_rate')
      validity: true
      level: error
    - suggestion: .hasDataType('loan_int_rate', 'Fractional')
      validity: false
      level: error
    - suggestion: .satisfies('loan_int_rate >= 0 AND loan_int_rate <= 50', 'Reasonable
        Loan Interest Rates')
      validity: true
      level: warning
    assumptions:
    - text: The 'loan_int_rate' column should not contain null values because the
        code computes the average interest rate without handling nulls. The completeness
        of the column is 1.0, which suggests that null values are not expected.
      sources:
      - start_line: 6
        end_line: 7
        file: ''
    - text: The 'loan_int_rate' column should contain fractional values, as indicated
        by its data type being 'Fractional'. This is consistent with the expectation
        that interest rates are typically expressed as fractional numbers.
      sources:
      - start_line: 6
        end_line: 7
        file: ''
    - text: The 'loan_int_rate' column should have a reasonable range of values consistent
        with typical loan interest rates, as it is used to compute an average interest
        rate. While the exact range is not specified, interest rates are generally
        expected to be within a typical financial range.
      sources:
      - start_line: 6
        end_line: 7
        file: ''
  loan_status:
    code:
    - suggestion: .isContainedIn('loan_status', [0, 1])
      validity: false
      level: error
    - suggestion: .isComplete('loan_status')
      validity: true
      level: error
    assumptions:
    - text: 'The ''loan_status'' column should only contain the values 0 and 1, as
        the code uses these values to calculate default statistics. The histogram
        indicates that these are the only values present, so this assumption aligns
        with the data characteristics. We could represent this assumption as a deequ
        constraint like this: .satisfies("CASE WHEN loan_status IN (0, 1) THEN 1 ELSE
        0 END", "Valid Loan Status Values", lambda x: x == 1)'
      sources:
      - start_line: 4
        end_line: 5
        file: ''
    - text: 'The ''loan_status'' column should not contain null values, as the code
        performs a SUM operation on this column without a null check, indicating that
        null values are not expected. We could represent this assumption as a deequ
        constraint like this: .satisfies("CASE WHEN loan_status IS NOT NULL THEN 1
        ELSE 0 END", "Non-null Loan Status", lambda x: x == 1)'
      sources:
      - start_line: 4
        end_line: 5
        file: ''
  person_emp_length:
    code:
    - suggestion: isComplete('person_emp_length')
      validity: false
      level: error
    - suggestion: 'hasNumberOfDistinctValues(''person_emp_length'', lambda x: x <=
        40)'
      validity: false
      level: warning
    assumptions:
    - text: The 'person_emp_length' column should not contain null values because
        the code groups by this column, and null values would result in a separate
        group, which might not be meaningful for analysis.
      sources:
      - start_line: 2
        end_line: 9
        file: ''
    - text: The 'person_emp_length' column should have a reasonable range of distinct
        values, as the approximate number of distinct values is 33. This implies that
        the employment length is expected to have a variety of values, but not an
        excessively large number, which might indicate data errors.
      sources:
      - start_line: 2
        end_line: 9
        file: ''
