prismadv_config:
  model:
    variant: default
    use_async: true
    use_dataflow: true
    downstream_task_description: The code is written for SQL Query task. The code
      is expected to run on a database and return the results. you are asked to generate
      constraints on the upcoming *test* data to ensure that the code can run without
      any errors and the results are meaningful.
  llm:
    model_name: gpt-4o
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      validity: true
      level: error
    - suggestion: .hasDataType('loan_amnt', Integral)
      validity: false
      level: error
    - suggestion: '.hasNumberOfDistinctValues(''loan_amnt'', lambda x: x > 1)'
      validity: false
      level: warning
    assumptions:
    - text: The 'loan_amnt' column should not contain any null values because the
        code calculates the average loan amount and the sum of loan amounts, which
        require non-null values.
      sources:
      - start_line: 8
        end_line: 10
        file: ''
    - text: The 'loan_amnt' column should have numeric values since it is used in
        arithmetic operations such as averaging and summing in the SQL query.
      sources:
      - start_line: 8
        end_line: 10
        file: ''
    - text: The 'loan_amnt' column is expected to have a reasonably wide range of
        values, as the average and sum of loan amounts are calculated, which implies
        variability in the data.
      sources:
      - start_line: 8
        end_line: 10
        file: ''
  loan_int_rate:
    code:
    - suggestion: .isComplete('loan_int_rate')
      validity: true
      level: error
    - suggestion: .hasDataType('loan_int_rate', 'Fractional')
      validity: false
      level: error
    assumptions:
    - text: The 'loan_int_rate' column should not contain null values because the
        code calculates the average interest rate using this column, and aggregation
        functions like AVG do not consider nulls.
      sources:
      - start_line: 9
        end_line: 9
        file: ''
    - text: The 'loan_int_rate' column should contain valid fractional numeric values
        that can be used to compute an average. This is implied as the AVG function
        is used, which requires numeric input.
      sources:
      - start_line: 9
        end_line: 9
        file: ''
  person_income:
    code:
    - suggestion: .isComplete('person_income')
      validity: true
      level: error
    - suggestion: .isPositive('person_income')
      validity: true
      level: error
    - suggestion: .satisfies('person_income >= 0 AND person_income <= 1000000', 'Reasonable
        Income Range')
      validity: false
      level: warning
    assumptions:
    - text: The 'person_income' column should not contain null values because the
        code uses it in a SQL query without checking for nulls. The completeness of
        this column in the dataset is 1.0, indicating no null values are present.
      sources:
      - start_line: 2
        end_line: 6
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
    - text: The 'person_income' column should contain positive values only, as it
        is used in a division operation for calculating 'avg_loan_to_income_ratio'.
        Dividing by zero or negative values would result in errors or incorrect calculations.
      sources:
      - start_line: 10
        end_line: 10
        file: ''
    - text: The 'person_income' column should have a reasonable range to meaningfully
        segment into 'Low Income', 'Medium Income', and 'High Income'. This implies
        that values should be within a realistic range for income data, typically
        starting from a positive integer to a practical upper limit for income.
      sources:
      - start_line: 2
        end_line: 6
        file: ''
