    - text: The 'loan_grade' column should only contain values from the set {'A',
        'B', 'C', 'D', 'E', 'F', 'G'}. Any values outside this set will result in
        a NULL value for 'grade_numeric'.
      sources:
      - start_line: 3
        end_line: 11
        file: ''
    - text: The 'loan_grade' column should be complete with no null values, as the
        code does not handle null values explicitly and expects to map all values
        to numeric grades.
      sources:
      - start_line: 3
        end_line: 11
        file: ''
