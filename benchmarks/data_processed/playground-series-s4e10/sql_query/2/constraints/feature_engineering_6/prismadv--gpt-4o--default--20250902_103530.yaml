prismadv_config:
  model:
    variant: default
    use_async: true
    use_dataflow: true
    downstream_task_description: The code is written for SQL Query task. The code
      is expected to run on a database and return the results. you are asked to generate
      constraints on the upcoming *test* data to ensure that the code can run without
      any errors and the results are meaningful.
  llm:
    model_name: gpt-4o
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  loan_amnt:
    code:
    - suggestion: .isComplete('loan_amnt')
      validity: true
      level: error
    - suggestion: .hasDataType('loan_amnt', Integral)
      validity: false
      level: error
    - suggestion: .satisfies('loan_amnt < person_income * 10', 'Reasonable Loan Amount')
      validity: true
      level: warning
    assumptions:
    - text: The 'loan_amnt' column should not contain null values as the code performs
        arithmetic operations on it without any null checks. The completeness of the
        column is expected to be 1.0 as indicated in the dataset description.
      sources:
      - start_line: 2
        end_line: 6
        file: ''
    - text: The 'loan_amnt' column should be of an integral data type, as the code
        performs arithmetic operations that assume numeric values.
      sources:
      - start_line: 2
        end_line: 6
        file: ''
    - text: The 'loan_amnt' column should have values that are reasonable compared
        to 'person_income' to ensure meaningful loan-to-income ratios. While the code
        handles different ranges, extremely high 'loan_amnt' values compared to 'person_income'
        could lead to skewed 'High Ratio' results.
      sources:
      - start_line: 2
        end_line: 6
        file: ''
  person_income:
    code:
    - suggestion: .isPositive('person_income')
      validity: true
      level: error
    - suggestion: .isComplete('person_income')
      validity: true
      level: error
    assumptions:
    - text: The 'person_income' column should not contain zero values to avoid division
        by zero errors in the calculation of the loan-to-income ratio. The code assumes
        that every value in 'person_income' is greater than zero.
      sources:
      - start_line: 2
        end_line: 6
        file: ''
    - text: The 'person_income' column should not contain null values because the
        code performs arithmetic operations that require non-null values in the calculation
        of the loan-to-income ratio.
      sources:
      - start_line: 2
        end_line: 6
        file: ''
column_data_flow_locations:
  loan_amnt:
  - start_line: 2
    end_line: 6
    file: ''
  person_income:
  - start_line: 2
    end_line: 6
    file: ''
