        \ enforce the unique value count to be between 5 and 50. We could represent\
        \ this as: Deequ: hasNumberOfDistinctValuesBetween('c8', 5, 50); Great Expectations:\
        \ expect_column_unique_value_count_to_be_between(min_value=5, max_value=50)."
      sources:
      - start_line: 78
        end_line: 94
        file: ''
      uid: c863b1c5-3d2e-476a-87a1-701f5b14d5b5
  '["c16","c17"]':
    code: []
    assumptions:
    - text: 'Columns c16 and c17 are required to be complete and binary integer indicators
        (values only 0 or 1). This is implied by converting them to numeric, casting
        to int, and using equality checks against 0/1 and means over those checks.
        Suitable Deequ constraints: .hasCompleteness("c16", 1.0), .hasCompleteness("c17",
        1.0), and .compliance("c16_c17_binary", "(c16 IN (0, 1)) AND (c17 IN (0, 1))").'
      sources:
      - start_line: 24
        end_line: 25
        file: ''
      - start_line: 29
        end_line: 32
        file: ''
      - start_line: 40
        end_line: 41
        file: ''
      - start_line: 54
        end_line: 55
        file: ''
      - start_line: 72
        end_line: 72
        file: ''
      uid: 926c4099-0d77-42a5-a069-d19df287e1d0
    - text: 'c16 (debtor) and c17 (tuition_up_to_date) should not both be 1 in the
        same record (being up-to-date contradicts being a debtor). This cross-field
        consistency can be enforced as a Deequ multi-column constraint: .compliance("no_conflict_c16_c17",
        "NOT (c16 = 1 AND c17 = 1)").'
      sources:
      - start_line: 24
        end_line: 25
        file: ''
      - start_line: 72
        end_line: 72
        file: ''
      - start_line: 78
        end_line: 94
        file: ''
      uid: 721402be-c4d7-4801-933f-b859c6fec759
    - text: 'In the produced output, the derived column tuition_hold must equal 1
        if and only if (c17 = 0) OR (c16 = 1). This deterministic mapping can be validated
        with a Deequ compliance rule over the output dataset: .compliance("tuition_hold_logic",
        "((tuition_hold = 1) AND ((c17 = 0) OR (c16 = 1))) OR ((tuition_hold = 0)
        AND NOT ((c17 = 0) OR (c16 = 1)))").'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 78
        end_line: 84
        file: ''
      uid: 8c7b002e-fcac-45b5-b2f7-0940692e1caf
  '["c16","c17","c21","c22","c23","c24","c25","c26","c27"]':
    code: []
    assumptions:
    - text: 'All input columns used together in computations [c23, c24, c27, c25,
        c22, c26, c16, c17, c21, c8] must be present, numeric, and non-null across
        all records so that numeric casting and arithmetic do not fail. This can be
        represented as a single multi-column constraint, for example (Deequ/Spark
        SQL syntax): .satisfies(''c23 IS NOT NULL AND c24 IS NOT NULL AND c27 IS NOT
        NULL AND c25 IS NOT NULL AND c22 IS NOT NULL AND c26 IS NOT NULL AND c16 IS
        NOT NULL AND c17 IS NOT NULL AND c21 IS NOT NULL AND c8 IS NOT NULL'', ''all_inputs_not_null'').'
      sources:
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 34
        end_line: 43
        file: ''
      uid: fa850713-ef7a-4900-93ee-3a3ea126f0bc
    - text: 'For any row with c23 > 0, c27 must satisfy 0 <= c27 <= c23, so that evaluation_rate
        = (c23 - c27)/c23 lies within [0,1]. Deequ example: .satisfies(''c23 <= 0
        OR (c27 >= 0 AND c27 <= c23)'', ''c27_within_c23'').'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      uid: 58515a7c-21fa-46d9-9f97-4d191f8787c3
    - text: 'For any row with c24 > 0, c25 must satisfy 0 <= c25 <= c24, so that pass_rate
        = c25/c24 lies within [0,1]. Deequ example: .satisfies(''c24 <= 0 OR (c25
        >= 0 AND c25 <= c24)'', ''c25_within_c24'').'
      sources:
      - start_line: 48
        end_line: 48
        file: ''
      uid: 0f0e6f70-51db-43b7-a51c-7d18c05617d2
    - text: 'For any row with c23 > 0, c22 must satisfy 0 <= c22 <= c23, so that credit_ratio
        = c22/c23 lies within [0,1]. Deequ example: .satisfies(''c23 <= 0 OR (c22
        >= 0 AND c22 <= c23)'', ''c22_within_c23'').'
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      uid: a960d89f-fb7c-49bb-864c-bb157d3929ba
    - text: 'When a denominator is zero, the associated numerators should also be
        zero, to ensure zero-valued rates reflect lack of activity rather than invalid
        ratios: (i) if c23 = 0 then c22 = 0 AND c27 = 0; (ii) if c24 = 0 then c25
        = 0. Deequ examples: .satisfies(''(c23 <> 0) OR (c22 = 0 AND c27 = 0)'', ''zero_c23_implies_zero_numerators'')
        and .satisfies(''(c24 <> 0) OR (c25 = 0)'', ''zero_c24_implies_zero_numerator'').'
      sources:
      - start_line: 46
        end_line: 50
        file: ''
      uid: ccead232-e7d6-47d6-af94-25333d607c06
    - text: 'Indicator columns c16 (debtor), c17 (tuition_up_to_date), and c21 (international)
        are binary and must be in {0,1} across all records, as they are compared to
        0/1 and used as boolean masks. Deequ example: .satisfies(''c16 IN (0,1) AND
        c17 IN (0,1) AND c21 IN (0,1)'', ''flags_binary'').'
      sources:
      - start_line: 40
        end_line: 43
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      - start_line: 72
        end_line: 75
        file: ''
      uid: 7622e407-ed89-42fe-946c-84a08bf1ae9a
    - text: "All components used in the weighted risk calculation should be normalized\
        \ to [0,1]. This requires the rate constraints above to hold and also enforces\
        \ 0 <= c26 <= 20 so that norm1 = c26/20 \u2208 [0,1]. Deequ example for c26:\
        \ .satisfies('c26 >= 0 AND c26 <= 20', 'c26_in_0_20')."
      sources:
      - start_line: 51
        end_line: 51
        file: ''
      - start_line: 57
        end_line: 63
        file: ''
      uid: 8f8ca094-3852-4f71-b6a8-3fefbefd38af
  '["c21","c8"]':
    code: []
    assumptions:
    - text: 'Columns c21 and c8 must be present on every row and contain only numeric
        values so that pd.to_numeric(..., errors=''coerce'') does not introduce nulls
        and subsequent astype(int) succeeds. In practice: joint completeness on {c21,
        c8} equals 1.0 and both have integral types. This can be validated with a
        multi-column compliance such as satisfies(''isnotnull(c21) AND isnotnull(c8)'',
        ''c21_c8_complete'') together with hasDataType(''c21'', Integral, false) and
        hasDataType(''c8'', Integral, false).'
      sources:
      - start_line: 29
        end_line: 32
        file: ''
      - start_line: 42
        end_line: 43
        file: ''
      uid: d9222cd3-683f-4a80-9d66-dc349fe56dbb
    - text: 'c21 is a binary indicator (allowed values {0,1}) and must always be paired
        with a present integer nationality code c8 on each row. This can be enforced
        as a multi-column compliance rule: satisfies(''(c21 IN (0,1)) AND isnotnull(c8)'',
        ''c21_binary_and_c8_present'').'
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 53
        end_line: 53
        file: ''
      - start_line: 64
        end_line: 65
        file: ''
      - start_line: 78
        end_line: 93
        file: ''
      uid: c8146633-c99b-4d14-88e0-3b9d7c558e24
    - text: 'Nationality code c8 should be consistent with the international flag
        c21: for any given c8 value, c21 should not conflict across rows (functional
        dependency c8 -> c21). This can be checked by ensuring per c8 the countDistinct(c21)
        <= 1 (e.g., via a compliance like satisfies(''count_distinct(c21) OVER (PARTITION
        BY c8) <= 1'', ''c8_determines_c21'')).'
      sources:
      - start_line: 78
        end_line: 93
        file: ''
      - start_line: 53
        end_line: 53
        file: ''
      - start_line: 105
        end_line: 105
        file: ''
      uid: 0256bcff-c818-4b75-a60c-b96b4759ee45
  '["c22","c23"]':
    code:
    - suggestion: '.satisfies("CASE WHEN CAST(c23 AS DOUBLE) > 0 THEN c22 IS NOT NULL
        AND CAST(c22 AS DOUBLE) IS NOT NULL AND CAST(c22 AS DOUBLE) >= 0 AND CAST(c22
        AS DOUBLE) <= CAST(c23 AS DOUBLE) ELSE TRUE END", "credit_ratio_valid", lambda
        x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 6cc5ebd1-1842-4b75-a0eb-509a0b3b948e
      source_assumptions:
      - 80d0d079-5ce7-40e0-a555-c64007ee610f
    - suggestion: '.satisfies("CAST(c23 AS DOUBLE) > 0", "c23_positive_majority",
        lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
