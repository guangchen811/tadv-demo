      uid: c65a8d50-75eb-4d05-b65b-43e7fdc21f6e
    - text: 'For rows where c23 > 0, c22 should not exceed c23 so that credit_ratio
        stays within [0, 1]. For example (Deequ): .satisfies("CASE WHEN c23 > 0 AND
        c22 IS NOT NULL THEN CASE WHEN c22 <= c23 AND c22 >= 0 THEN 1 ELSE 0 END ELSE
        1 END", "c22 within [0, c23] when c23 > 0", lambda x: x == 1).'
