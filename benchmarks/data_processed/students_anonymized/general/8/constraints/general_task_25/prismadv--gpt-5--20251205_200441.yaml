    assumptions:
    - text: 'c24 and c25 are non-negative counts, and for every record c25 must not
        exceed c24 (i.e., 0 <= c25 <= c24). This keeps the derived pass_rate = c25
        / c24 bounded in [0, 1] whenever c24 > 0. Deequ example: .satisfies(''c24
        >= 0 AND c25 >= 0 AND c25 <= c24'', [''c24'',''c25'']).'
      sources:
