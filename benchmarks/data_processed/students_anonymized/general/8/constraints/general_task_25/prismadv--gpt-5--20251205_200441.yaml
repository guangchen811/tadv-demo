      uid: 2a5fa98f-4cca-4f06-84d9-25ca63f99744
    - text: 'c22 should be non-negative, since it is used as the numerator of a credit_ratio
        metric. For example (Deequ): .satisfies("CASE WHEN c22 IS NULL THEN 1 ELSE
        CASE WHEN c22 >= 0 THEN 1 ELSE 0 END END", "c22 non-negative", lambda x: x
