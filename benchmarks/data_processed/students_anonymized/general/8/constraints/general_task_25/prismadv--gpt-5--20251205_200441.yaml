  '["c23","c27"]':
    code: []
    assumptions:
    - text: 'For every record, c27 must be between 0 and c23 inclusive, so that evaluation_rate
        = (c23 - c27) / c23 remains within [0, 1] when c23 > 0. This can be enforced
        as a Deequ constraint: .satisfies(''c27 >= 0 and c23 >= 0 and c27 <= c23'',
        ''c27_between_0_and_c23'')'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      uid: d66027bf-8892-428f-bee7-5476d31c6568
    - text: 'If c23 equals 0, then c27 must also be 0 (no components when the total
        is zero). This preserves the intended semantics behind evaluation_rate and
        avoids inconsistent rows. Deequ example: .satisfies(''c23 != 0 or c27 == 0'',
        ''zero_total_implies_zero_c27'')'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      uid: 3ae9feaa-95ee-4f8e-924c-29de46314c88
    - text: 'For credit_ratio = c22 / c23 to be meaningful and bounded in [0, 1] when
        c23 > 0, c22 must not exceed c23 and both should be non-negative. Deequ example:
        .satisfies(''c22 >= 0 and c23 >= 0 and c22 <= c23'', ''c22_between_0_and_c23'')'
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      uid: e632d7aa-58a9-4fbf-8fbf-bbaa2a333ad8
