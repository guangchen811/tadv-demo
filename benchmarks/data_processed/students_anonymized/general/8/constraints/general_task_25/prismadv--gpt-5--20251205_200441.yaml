    - text: 'If c24 equals 0 for a record, then c25 must be 0 as well (no passes when
        there are zero attempts), to be consistent with pass_rate being set to 0 when
        c24 <= 0. Deequ example: .satisfies(''c24 != 0 OR c25 = 0'', [''c24'',''c25'']).'
      sources:
