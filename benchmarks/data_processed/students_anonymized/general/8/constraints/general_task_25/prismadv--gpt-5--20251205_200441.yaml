    assumptions:
    - text: 'Column c22 should be numeric for the vast majority of rows. Non-numeric
        values should be rare because the code coerces invalid entries to null before
        numeric operations. For example (Deequ): .hasDataType("c22", ConstrainableDataTypes.Integral,
