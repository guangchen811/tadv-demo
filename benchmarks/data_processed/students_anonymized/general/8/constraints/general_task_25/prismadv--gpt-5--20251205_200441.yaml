        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: 80d0d079-5ce7-40e0-a555-c64007ee610f
    - text: 'c23 should be strictly positive for the vast majority of records to avoid
        defaulting ratios/rates to 0.0 (i.e., denominators should be > 0). Deequ example:
        .addConstraint(Compliance("c23_positive_majority", "c23 > 0", 0.95))'
      sources:
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 44
        end_line: 46
        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 86
        end_line: 86
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: 23591f7a-94cd-46ab-8add-85b236369f66
    - text: 'If c23 == 0, then c22 must be 0 (no earned/allocated units when the total
        is zero), ensuring the fallback of credit_ratio to 0.0 is semantically correct.
        Deequ example: .addConstraint(Compliance("c22_zero_when_c23_zero", "case when
        c23 = 0 then c22 = 0 else true end", 1.0))'
      sources:
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 22
        end_line: 22
