    - suggestion: '.satisfies("CASE WHEN CAST(c23 AS DOUBLE) = 0 THEN CAST(c22 AS
        DOUBLE) = 0 ELSE TRUE END", "c22_zero_when_c23_zero", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: aa27098d-77a7-465c-a2b5-9dbf61a66000
      source_assumptions:
      - 0b6643e9-45a2-41ed-8645-06be3d17dd4c
    assumptions:
    - text: 'For rows where c23 > 0, c22 must be non-null, numeric, and satisfy 0
        <= c22 <= c23 so that credit_ratio = c22 / c23 is defined and lies in [0,
        1]. Deequ example: .addConstraint(Compliance("credit_ratio_valid", "case when
        c23 > 0 then c22 is not null and c22 >= 0 and c22 <= c23 else true end", 1.0))'
      sources:
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 29
        end_line: 32
        file: ''
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 38
