    assumptions:
    - text: 'Denominator c23 is used as a total for several rate/ratio computations
        (rate1 = c25 / c23; ratio1 = c27 / c23; ratio2 = c22 / c23). For rows where
        c23 > 0, the part columns c25, c27 and c22 should be within the closed interval
        [0, c23] so that the computed fractions lie in [0,1]. Example actionable constraint
        (Deequ-style): .satisfies(''c25 >= 0 AND c25 <= c23'', ''c25_le_c23'') and
        similarly for c27 and c22.'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: 11c29614-a0a0-4942-9d2e-3ecf5980b76c
    - text: 'Denominator c29 is used as a total for several rate/ratio computations
        (rate3 = c31 / c29; ratio3 = c13 / c29; ratio4 = c28 / c29). For rows where
        c29 > 0, the part columns c31, c13 and c28 should be within the closed interval
        [0, c29] so that the computed fractions lie in [0,1]. Example actionable constraint:
        .satisfies(''c31 >= 0 AND c31 <= c29'', ''c31_le_c29'') and similarly for
        c13 and c28.'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      uid: 285ed064-1f2a-4b12-9d1c-12a36f765bd3
    - text: 'When a denominator is zero (c23 == 0 or c29 == 0), the related numerators
        are expected to be zero as well to avoid introducing misleading filled zeros
        after division-by-zero handling. Concretely: if c23 == 0 then c25 == 0 AND
        c27 == 0 AND c22 == 0; if c29 == 0 then c31 == 0 AND c13 == 0 AND c28 == 0.
        Example actionable constraint: .satisfies(''NOT(c23 == 0) OR (c25 == 0 AND
        c27 == 0 AND c22 == 0)'', ''parts_zero_when_total_zero'').'
      sources:
      - start_line: 52
        end_line: 61
        file: ''
      uid: bc77db6f-b21f-4195-8227-0476f58f5cba
    - text: 'Columns c26 and c32 are used to compute risk components via 1.0 - (value
        / 20.0). To keep these risk components in the expected [0,1] range without
        relying only on clipping, c26 and c32 should be within [0, 20]. Example actionable
        constraint: .satisfies(''c26 >= 0 AND c26 <= 20'', ''c26_range_0_20'') and
        .satisfies(''c32 >= 0 AND c32 <= 20'', ''c32_range_0_20'').'
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      uid: 06b2c6cc-2a56-4169-be87-10bc1f5556cf
    - text: 'Columns c17 and c16 are used together in a boolean expression ((c17 ==
        0) OR (c16 == 1)) to compute risk1. The code treats these as binary indicators;
        both columns should contain only values in {0,1}. Example actionable constraint:
        .satisfies(''c17 IN (0,1) AND c16 IN (0,1)'', ''c16_c17_binary'').'
      sources:
      - start_line: 49
        end_line: 49
        file: ''
      uid: 510dc5db-5ad9-414e-8dc1-9779f1a30769
    - text: 'The preparedness/difference computation uses the absolute difference
        and sum of c13 and c7 (diff1 = abs(c13 - c7); then diff1/50 and (c13 + c7)/400).
        For these formulas to be interpretable without heavy clipping, c13 and c7
        should be non-negative and lie in a realistic academic-score range (e.g.,
        0 <= c13 <= 400 and 0 <= c7 <= 400). Example actionable constraint: .satisfies(''c13
        >= 0 AND c13 <= 400 AND c7 >= 0 AND c7 <= 400'', ''c13_c7_reasonable_range'').'
      sources:
      - start_line: 66
        end_line: 68
        file: ''
      uid: 80e0730c-e777-420b-959e-82da533bbe32
  '["c13","c7"]':
    code: []
    assumptions:
    - text: 'Both columns ''c13'' and ''c7'' are required to be numeric and non-missing
        so that the expression (c13 - c7).abs() is well-defined for every record.
        Actionable constraint examples:

        - Deequ: hasCompleteness("c13") == 1.0 and hasCompleteness("c7") == 1.0

        - Deequ (satisfy): .satisfies("c13 IS NOT NULL AND c7 IS NOT NULL", "c13_c7_non_null")

        (These expectations follow from the coercion-to-numeric step and the direct
        arithmetic use of the two columns.)'
      sources:
      - start_line: 39
        end_line: 48
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 648f8fee-daee-40c8-85cc-209d3d58649b
    - text: 'The two columns represent comparable, non-negative measurements and their
        sum is expected to be within the scale used by the formula (the code divides
        (c13 + c7) by 400). A concrete, actionable constraint is that the per-row
        sum should not exceed 400 (or should be within an expected upper bound):

        - Deequ (satisfy): .satisfies("c13 + c7 <= 400", "c13_c7_sum_within_scale")

        This follows from the use 1.0 - ((c13 + c7) / 400.0) which assumes the sum
        is meaningful relative to 400.'
      sources:
      - start_line: 23
        end_line: 24
        file: ''
      - start_line: 66
        end_line: 68
        file: ''
      uid: 86b525e1-ad3d-452d-bcbf-75c3a7d0a054
    - text: 'The absolute difference between c13 and c7 is the primary driver of the
        ''diff1 / 50.0'' term in risk6; therefore we expect differences to be small
        in most records. An actionable probabilistic constraint: at least 95% of records
        should satisfy abs(c13 - c7) <= 50.0. Example Deequ constraint:

        - .satisfies("ABS(c13 - c7) <= 50", "c13_c7_difference_small") with minimum
        success ratio 0.95

        This encodes the expectation that the clipped ratio diff1/50 typically lies
        in [0,1] without clipping.'
      sources:
      - start_line: 23
        end_line: 24
        file: ''
      - start_line: 66
        end_line: 68
        file: ''
      uid: 04240001-0594-4a57-ac0e-137e62ed3217
  '["c16","c17","c5"]':
    code: []
    assumptions:
    - text: 'Columns ''c17'' and ''c16'' are used together in boolean logic (risk1
        = ((c17 == 0) | (c16 == 1))). Both columns are expected to be binary flags
        taking only values 0 or 1 and be present for all records. Actionable checks
        (Deequ-style):

        - .isComplete(["c17","c16"])  # no nulls after type coercion

        - .satisfies("c17 IN (0,1) AND c16 IN (0,1)") or equivalently .isContainedIn("c17",
        [0,1]) and .isContainedIn("c16", [0,1])'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 40
        end_line: 49
        file: ''
      uid: bd0e0231-e4d7-457b-a079-a0d366f52e89
    - text: "Column 'c5' is treated as a binary flag in combination with the other\
        \ flags (risk3 = np.where(c5 == 0, 0.05, 0.00) and later included in outputs\
        \ alongside c16 and c17). c5 should be numeric/integer with values only in\
        \ {0,1} and not null. Actionable checks:\n- .isComplete([\"c5\"]) \n- .satisfies(\"\
        c5 IN (0,1) AND c16 IN (0,1) AND c17 IN (0,1)\") or separate .isContainedIn\
        \ checks for each column\n- Ensure presence of these columns when writing\
        \ outputs: .hasSize > 0 and .isComplete([...]) for the output column set"
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      - start_line: 107
        end_line: 112
        file: ''
      uid: d5cb8ca2-cf4a-4a3c-b105-2b559f95cdef
    - text: 'The code coerces many columns to numeric with pd.to_numeric(errors=''coerce'')
        and then uses direct comparisons/ arithmetic on c17, c16, and c5 without filling
        NaNs. Therefore c17, c16 and c5 must successfully parse to numeric for all
        rows (no coercion-induced NaNs). Actionable checks:

        - .isComplete(["c17","c16","c5"])  # completeness after coercion

        - .satisfies("isNumber(c17) AND isNumber(c16) AND isNumber(c5)") or dataset-level:
        count of rows where any of these is null must be 0'
      sources:
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: 617c4e66-9965-4416-8a9b-87c35d3599d1
  '["c22","c23","c25","c27"]':
    code: []
    assumptions:
    - text: 'For rows where c23 is used as the denominator, each numerator used to
        compute proportions must be a non-negative value not exceeding the denominator.
        Concretely: 0 <= c25 <= c23, 0 <= c27 <= c23, and 0 <= c22 <= c23 for every
        row. This ensures rate1 = c25/c23, ratio1 = c27/c23 and ratio2 = c22/c23 all
        lie in [0,1]. Example Deequ-style constraint: .satisfies("c25 >= 0 AND c25
        <= c23 AND c27 >= 0 AND c27 <= c23 AND c22 >= 0 AND c22 <= c23", "numerator_vs_denominator_bounds").'
      sources:
      - start_line: 25
        end_line: 28
        file: ''
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: bdac516e-1213-4c6e-92d5-9a44943c0cf9
    - text: 'When c23 == 0 (the denominator), the related numerators should be zero
        as well (c25 == 0 AND c27 == 0 AND c22 == 0). This enforces consistency for
        rows where the code replaces zero denominators with NaN and then fills divisions
        with 0.0. Example Deequ constraint: .satisfies("NOT(c23 = 0) OR (c25 = 0 AND
        c27 = 0 AND c22 = 0)", "zero_denominator_consistency").'
      sources:
      - start_line: 25
        end_line: 28
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: 62e78a0d-9099-4883-a2ad-e84e568bb68b
  '["c26","c32"]':
    code: []
    assumptions:
    - text: 'Both columns ''c26'' and ''c32'' are expected to be present, numeric
        (convertible to float) and finite for every record because they are coerced
        to numeric and used directly in downstream arithmetic. Actionable checks (Deequ
        style):

        - .isComplete(''c26'') and .isComplete(''c32'')

        - .satisfies(''isFinite(c26) AND isFinite(c32)'', ''c26_c32_finite'')

        (These ensure the code''s numeric ops 1.0 - (c / 20.0) do not produce NaN/inf.)'
      sources:
      - start_line: 29
        end_line: 48
        file: ''
      uid: 615b131d-ef5e-4904-9fba-43cc524c932c
    - text: 'Values in ''c26'' and ''c32'' are interpreted as scores on a 0..20 scale
        (the code computes risk4 = 1 - c26/20 and risk5 = 1 - c32/20, then averages
        them). Therefore each value should lie within the inclusive range [0, 20]
        so that risk4 and risk5 fall in [0,1]. Actionable multi-column constraint
        examples:

        - .satisfies(''c26 >= 0 AND c26 <= 20 AND c32 >= 0 AND c32 <= 20'', ''c26_c32_range'')

        - or separately: hasMin/hasMax checks for both columns.'
      sources:
      - start_line: 29
        end_line: 63
        file: ''
      uid: 3a7d066c-fc30-40f2-be7c-e79da0790aae
    - text: 'The two columns ''c26'' and ''c32'' are combined symmetrically (averaged)
        to produce risk7 and then factored into downstream aggregated scores. They
        therefore must be on the same measurement scale and broadly comparable. A
        practical automated check is to assert their aggregate statistics are consistent
        (for example the ratio of their means is within a reasonable bound, e.g. 0.5..2.0)
        to catch unit/scale mismatches. Example constraint (conceptual):

        - .satisfies(''mean(c26) / mean(c32) >= 0.5 AND mean(c26) / mean(c32) <= 2.0'',
        ''c26_c32_scale_consistency'')

        (If your validation system cannot express aggregate-ratio constraints as a
        single predicate, compute means separately and assert the ratio condition.)'
      sources:
      - start_line: 62
        end_line: 89
        file: ''
      uid: a9292d51-5bdf-4521-b5eb-18f63b02731a
