    assumptions:
    - text: 'For any row with c29 > 0, c31 must be between 0 and c29 (inclusive).
        This guarantees rate3 = c31 / c29 will be in [0, 1] and that rate4 = 1 - rate3
        behaves as expected. Example Deequ-style constraint: .satisfies("c29 = 0 OR
        (c31 >= 0 AND c31 <= c29)", "c31_in_0_to_c29")'
      sources:
      - start_line: 30
        end_line: 61
        file: ''
      uid: aede0f55-2d9a-4015-827f-fb8d42666542
    - text: 'For any row with c29 > 0, c33 must be between 0 and c29 (inclusive).
        This ensures ratio3 = c33 / c29 will be in [0, 1]. Example Deequ-style constraint:
        .satisfies("c29 = 0 OR (c33 >= 0 AND c33 <= c29)", "c33_in_0_to_c29")'
      sources:
      - start_line: 30
        end_line: 61
        file: ''
      uid: db8cc6da-a1a9-4599-a012-2bca8281ed3a
    - text: 'For any row with c29 > 0, c28 must be between 0 and c29 (inclusive).
        This ensures ratio4 = c28 / c29 will be in [0, 1]. Example Deequ-style constraint:
        .satisfies("c29 = 0 OR (c28 >= 0 AND c28 <= c29)", "c28_in_0_to_c29")'
      sources:
      - start_line: 30
        end_line: 61
        file: ''
      uid: a1dbc4b4-f42e-4322-859a-9d363d70f476
    - text: 'When c29 == 0, the numerators that are later divided by c29 (c31, c33,
        c28) should all be zero as well. The code replaces numerator/0 with NaN then
        fills with 0, which masks inconsistent data where denominator is zero but
        numerators are non-zero. Example Deequ constraint: .satisfies("c29 != 0 OR
        (c31 = 0 AND c33 = 0 AND c28 = 0)", "zeros_consistent_with_denominator")'
      sources:
      - start_line: 30
        end_line: 61
        file: ''
      uid: f231ff8c-e3fb-453c-a68d-2180c9a92513
    - text: 'The columns c29, c31, c28, c33 are expected to be numeric/integral and
        complete (no missing values) so numeric operations and proportions are valid.
        After the coercion step the columns should contain valid numeric values for
        all rows. Example Deequ constraints: .hasCompleteness(''c29'', 1.0), .hasCompleteness(''c31'',
        1.0), .hasCompleteness(''c28'', 1.0), .hasCompleteness(''c33'', 1.0); optionally
        .satisfies(''floor(c29) = c29'', ''c29_is_integer''), etc.'
