        file: ''
      uid: 50634a47-ab97-4f82-905a-8bc65094c901
    - text: 'Because risk2 jointly depends on c5 and c20, any row with a present/binary
        c5 value must also have a numeric c20 within [16, 70] to avoid propagating
        NaNs into the final score. This can be stated as: hasCompliance(''age_range_when_c5_present'',
        "c5 NOT IN (0,1) OR (c20 >= 16 AND c20 <= 70)") and conditional completeness
        on c20 when c5 IN (0,1).'
      sources:
