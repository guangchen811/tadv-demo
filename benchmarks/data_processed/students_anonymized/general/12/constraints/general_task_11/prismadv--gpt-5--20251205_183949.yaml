        \ Deequ .satisfies(\"CASE WHEN `c7` IS NULL OR (`c7` >= 0 AND `c7` <= 200)\
        \ THEN 1 ELSE 0 END\", \"c7_in_expected_range\", lambda x: x >= 0.95); Great\
