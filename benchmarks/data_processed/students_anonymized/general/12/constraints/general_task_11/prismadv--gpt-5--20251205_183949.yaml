      uid: 45414448-5603-4ed0-ac07-5225f469af1d
    - text: 'For rows where c37 == ''Enrolled'' (the only rows emitted), c16, c17,
        and c19 must all be present (non-null after numeric coercion) and valid binary
        values. This can be enforced with a conditional Deequ predicate: .satisfies("(c37
