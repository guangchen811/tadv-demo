  '["c22","c23","c25","c27"]':
    code: []
    assumptions:
    - text: 'Per record, the counts in c25, c22, and c27 are bounded by the total
        in c23: 0 <= c25 <= c23, 0 <= c22 <= c23, and 0 <= c27 <= c23. This ensures
        all ratios c25/c23, c22/c23, c27/c23 and (c23 - c25)/c23 remain in [0,1] without
        relying on clipping/defaults. Example Deequ constraints: satisfies("c23 >=
        0 AND c25 >= 0 AND c25 <= c23", "c25_le_c23"), satisfies("c22 >= 0 AND c22
        <= c23", "c22_le_c23"), satisfies("c27 >= 0 AND c27 <= c23", "c27_le_c23").'
      sources:
      - start_line: 75
        end_line: 77
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: ee023e7f-a902-4863-8298-e5e4811ed2fa
    - text: 'No positive numerators when the denominator is zero: If c23 == 0, then
        c25 == 0 and c22 == 0 and c27 == 0. This avoids default-based fallbacks masking
        inconsistent data (e.g., rates defaulting to 1.0 or 0.0). Example Deequ constraint:
        satisfies("(c23 != 0) OR (c25 = 0 AND c22 = 0 AND c27 = 0)", "zero_denominator_implies_zero_numerators").'
      sources:
      - start_line: 75
        end_line: 77
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: d12a309e-e21a-45ae-9881-1fe1edf9101c
  '["c23","c25"]':
    code: []
    assumptions:
    - text: 'c23 is a total count and c25 is a component/subset count of c23. Therefore,
        for every row: c23 >= 0, c25 >= 0, and c25 <= c23. This guarantees that the
        derived proportions c25/c23 and (c23 - c25)/c23 are valid rates in [0, 1].
        Example Deequ constraint: .satisfies("c23 >= 0 AND c25 >= 0 AND c25 <= c23",
        "c25_subset_of_c23")'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: 55ec5d21-86e2-4f5a-a037-ccc58dcad1ad
    - text: 'If c23 equals 0, then c25 must be 0 (no component count when the total
        is zero). This prevents inconsistent states that would otherwise trigger defaulted
        ratios in robust_divide. Example Deequ constraint: .satisfies("CASE WHEN c23
        = 0 THEN c25 = 0 ELSE true END", "no_component_when_total_zero")'
      sources:
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: 868d2af6-6b85-4191-a937-ef1ced5f9ae9
    - text: 'Both c23 and c25 must be present and parseable as numeric counts for
        all rows (no nulls or non-numeric values), otherwise numeric coercion will
        produce NaNs that propagate into risk_score. Example Deequ constraint: .satisfies("c23
        IS NOT NULL AND c25 IS NOT NULL", "non_null_counts")'
      sources:
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 88
        end_line: 88
        file: ''
      uid: b98b91cc-e12e-434a-88dc-28f3de8a6bea
  '["c26","c32"]':
    code: []
    assumptions:
    - text: 'For rows that are scored (where c37 = ''Enrolled''), both ''c26'' and
        ''c32'' must be present (non-null) and numeric so that normalization and downstream
        arithmetic do not produce NaNs in risk_score and priority_tier. We could represent
        this with a single multi-column Deequ constraint like: .satisfies("(c37 !=
        ''Enrolled'') OR (c26 IS NOT NULL AND c32 IS NOT NULL)", ''c26_c32_not_null_when_enrolled'',
        assertion = 1.0).'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      - start_line: 115
        end_line: 118
        file: ''
      - start_line: 121
        end_line: 128
        file: ''
      - start_line: 131
        end_line: 139
        file: ''
      uid: 93bdec28-a7a3-4dab-b3bb-70deb2e841fb
    - text: "The columns 'c26' and 'c32' are on the same 0\u201320 scale (they are\
        \ both divided by 20 and clipped to [0,1]); thus, for scored rows (c37 = 'Enrolled'),\
        \ their raw values should lie within [0, 20]. This can be enforced with a\
        \ multi-column range check in Deequ: .satisfies(\"(c37 != 'Enrolled') OR (c26\
        \ >= 0 AND c26 <= 20 AND c32 >= 0 AND c32 <= 20)\", 'c26_c32_in_expected_range',\
        \ assertion = 1.0)."
      sources:
      - start_line: 73
        end_line: 73
