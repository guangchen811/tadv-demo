        lambda x: x >= 0.95); Great Expectations expect_column_values_to_be_in_type_list(''c7'',
        [''int64'',''float64'']) with mostly=True and mostly=0.95, or expect_column_values_to_match_regex
        for numeric literals with mostly=0.95.'
