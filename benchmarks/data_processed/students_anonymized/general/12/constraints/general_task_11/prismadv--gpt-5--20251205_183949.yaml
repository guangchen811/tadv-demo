  '["c13","c7"]':
    code: []
    assumptions:
    - text: 'Columns ''c13'' and ''c7'' must both be present (non-null) and numeric
        for all records because they are used in arithmetic normalization and a weighted
        combination. This can be enforced as a joint non-null/numeric constraint,
        e.g., Deequ: .satisfies(''c13 IS NOT NULL AND c7 IS NOT NULL'', ''c13_c7_not_null'')
        and .hasDataType(''c13'', ConstrainableDataTypes.Numeric) + .hasDataType(''c7'',
        ConstrainableDataTypes.Numeric).'
      sources:
      - start_line: 54
        end_line: 55
        file: ''
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 93
        end_line: 95
        file: ''
      uid: abb43177-c8a2-4ff8-8791-cb697a4fc89a
    - text: "Both 'c13' and 'c7' are expected to be measured on the same 0\u2013200\
        \ scale; therefore, for each row, 0 <= c13 <= 200 and 0 <= c7 <= 200 should\
        \ hold. This follows from dividing each by 200 and clipping to [0,1]. Deequ\
        \ example: .satisfies('c13 >= 0 AND c13 <= 200 AND c7 >= 0 AND c7 <= 200',\
        \ 'c13_c7_in_range_0_200')."
      sources:
      - start_line: 54
        end_line: 55
        file: ''
      - start_line: 93
        end_line: 94
        file: ''
      uid: 36061ae1-bd1d-4230-be23-72c4a9a5ff75
    - text: 'The weighted normalized preparedness score derived from ''c13'' and ''c7''
        should already lie in [0,1] without relying on clipping: 0 <= 0.6*(c13/200.0)
        + 0.4*(c7/200.0) <= 1 for every row. Deequ example: .satisfies(''(0.6 * (c13
        / 200.0) + 0.4 * (c7 / 200.0)) >= 0.0 AND (0.6 * (c13 / 200.0) + 0.4 * (c7
        / 200.0)) <= 1.0'', ''c13_c7_weighted_norm_in_0_1'').'
      sources:
      - start_line: 93
        end_line: 95
        file: ''
      uid: f9de9233-873d-4d4e-8188-c2391116769b
