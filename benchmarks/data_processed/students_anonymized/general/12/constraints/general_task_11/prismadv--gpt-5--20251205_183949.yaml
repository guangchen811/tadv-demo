  '["c28","c29","c31","c33"]':
    code: []
    assumptions:
    - text: 'Each of c31, c28, and c33 represents a component count that must be between
        0 and the corresponding total count c29 (i.e., 0 <= c31 <= c29, 0 <= c28 <=
        c29, 0 <= c33 <= c29). This keeps the derived rates (c31/c29, c28/c29, c33/c29)
        in [0, 1] without relying on clipping. We could represent this as Deequ constraints
        like: .satisfies(''c31 >= 0 AND c31 <= c29'', ''c31_within_c29'') .satisfies(''c28
        >= 0 AND c28 <= c29'', ''c28_within_c29'') .satisfies(''c33 >= 0 AND c33 <=
        c29'', ''c33_within_c29'')'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      - start_line: 71
        end_line: 71
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 20ef3695-e7a3-4fad-b52e-b17c0267d2af
    - text: 'If c29 (the denominator/total count) is zero, then all related component
        counts must also be zero: c31 = 0 AND c28 = 0 AND c33 = 0. This prevents default
        fallbacks in robust_divide from masking data issues and ensures ratios are
        only computed when a positive total exists. In Deequ: .satisfies(''CASE WHEN
        c29 = 0 THEN (c31 = 0 AND c28 = 0 AND c33 = 0) ELSE true END'', ''zero_denom_implies_zero_numerators'')'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 84672cae-58e1-4998-949d-6d71def007c3
    - text: 'The columns c29, c31, c28, and c33 must be jointly non-null and parseable
        as numeric for all rows used in scoring, so that division and subsequent aggregations
        do not propagate NaNs. We could represent this as a Deequ constraint like:
        .satisfies(''c29 IS NOT NULL AND c31 IS NOT NULL AND c28 IS NOT NULL AND c33
        IS NOT NULL'', ''joint_completeness'')'
      sources:
      - start_line: 71
        end_line: 71
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: ef8af7ec-c9bc-4f92-a475-beb1917c4958
  '["c29","c31"]':
    code: []
    assumptions:
    - text: 'c31 is a sub-count of c29 for each record: both are non-negative counts
        and must satisfy 0 <= c31 <= c29. This keeps the derived rates c31/c29 and
        (c29 - c31)/c29 within [0, 1] and logically consistent. We could represent
        this as a Deequ constraint: .satisfies("c29 >= 0 AND c31 >= 0 AND c31 <= c29",
        "all").'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      - start_line: 115
        end_line: 116
        file: ''
      uid: 761ce6e7-17d3-424a-80f9-36ddeb795af9
    - text: 'If c29 equals 0 for a row, then c31 must also be 0 (no sub-events when
        there are no total events). This avoids pathological divisions and aligns
        with the defaulting behavior in robust_divide. Deequ: .satisfies("c29 != 0
        OR c31 = 0", "all").'
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 15cbadaa-7a1f-4526-934d-39dd77124176
    - text: 'For rows with c29 > 0, the complementary rates computed from c29 and
        c31 should sum to 1: (c31/c29) + ((c29 - c31)/c29) = 1 (within numerical tolerance).
        This can be enforced as: .satisfies("c29 = 0 OR abs((c31/c29) + ((c29 - c31)/c29)
        - 1) <= 1e-6", "all").'
      sources:
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 84dca35a-eb2f-4627-9e16-b6ae9414adf9
  '["c34","c35","c36"]':
    code: []
    assumptions:
    - text: 'For any row that is scored (c37 == ''Enrolled''), the macro triplet c34,
        c35, and c36 must all be present and parseable as numeric (no nulls or NaNs).
        This ensures norm6, val2, norm7, risk4, and the final risk_score are computable
        without propagating NaNs. Deequ-style constraint: .satisfies("(c37 != ''Enrolled'')
        OR (c34 IS NOT NULL AND c35 IS NOT NULL AND c36 IS NOT NULL AND NOT isnan(c34)
        AND NOT isnan(c35) AND NOT isnan(c36))", "macro_triplet_defined_for_enrolled",
        fraction = 1.0)'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      - start_line: 109
        end_line: 112
        file: ''
      - start_line: 133
        end_line: 133
        file: ''
      uid: c09bb491-85e3-457c-ac7c-265e772260e5
    - text: 'The three macro indicators are expected to lie within the domains implied
        by the normalization so the weighted macro risk is meaningful without heavy
        clipping: 5 <= c34 <= 20, -5 <= c36 <= 5, and -2 <= c35 <= 5 for the large
        majority of rows (e.g., >= 0.99). Deequ-style constraint: .satisfies("(c34
        >= 5 AND c34 <= 20) AND (c36 >= -5 AND c36 <= 5) AND (c35 >= -2 AND c35 <=
        5)", "macro_triplet_in_expected_ranges", fraction = 0.99)'
      sources:
      - start_line: 109
        end_line: 111
        file: ''
      - start_line: 112
        end_line: 112
        file: ''
      uid: 486f7779-0e04-4588-8dbe-298ac0c9d0a0
    - text: 'Because c34, c35, and c36 are used jointly to compute a single component
        (risk4), they should be present together or missing together; i.e., no row
        should have only a subset of these three populated. Deequ-style constraint:
        .satisfies("((c34 IS NULL) AND (c35 IS NULL) AND (c36 IS NULL)) OR ((c34 IS
        NOT NULL) AND (c35 IS NOT NULL) AND (c36 IS NOT NULL))", "macro_triplet_present_together",
        fraction = 1.0)'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      - start_line: 109
        end_line: 112
