    - text: 'Given the financial-risk formula risk1 = 0.6*c16 + 0.3*(1 - c17) - 0.2*c19,
        the un-clipped linear combination must lie within the theoretical bounds [-0.2,
        0.9] implied by binary inputs. This guards against non-binary or out-of-range
        values across c16, c17, c19. Deequ example: .satisfies(''(-0.2 <= 0.6*c16
        + 0.3*(1 - c17) - 0.2*c19) AND (0.6*c16 + 0.3*(1 - c17) - 0.2*c19 <= 0.9)'',
