        file: ''
      uid: ca56cf5a-abbd-4439-8d85-d87566ec6ff3
    - text: 'The (c37, c5) combination is constrained: for any allowed c37 value (expected
        exact strings ''Enrolled'', ''Graduate'', or ''Dropout''), c5 must be binary
        (only 0 or 1) after numeric coercion. This can be enforced with a Deequ compliance
        like: hasCompliance(''status_and_binary_flag'', "c37 IN (''Enrolled'',''Graduate'',''Dropout'')
        AND c5 IN (0,1)").'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
