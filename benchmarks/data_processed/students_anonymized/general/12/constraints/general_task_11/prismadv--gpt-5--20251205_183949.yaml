    assumptions:
    - text: "Columns c16, c17, and c19 are binary numeric indicators taking only values\
        \ {0,1}. In particular, c17 is used inside (1 - c17), which requires c17 \u2208\
        \ {0,1}. This can be enforced with a Deequ multi-column predicate such as:\
        \ .satisfies('(c16 IN (0,1)) AND (c17 IN (0,1)) AND (c19 IN (0,1))', 'fin_flags_binary')."
      sources:
