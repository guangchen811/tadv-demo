  '["c20","c37","c5"]':
    code: []
    assumptions:
    - text: 'For all rows used for scoring (where c37 == ''Enrolled''), both c5 and
        c20 must be valid numeric inputs: c5 is binary in {0,1} and c20 is an age-like
        value in the closed interval [16, 70], with no nulls after numeric coercion.
        This can be enforced as a Deequ compliance constraint such as: hasCompliance(''enrolled_inputs_valid'',
        "c37 <> ''Enrolled'' OR (c5 IN (0,1) AND c20 >= 16 AND c20 <= 70)") and, optionally,
        completeness checks on c5 and c20 under the same condition.'
      sources:
