    - text: 'Numerator bounded by its base (first rate): if (c23 - c27) > 0 then 0
        <= c25 <= (c23 - c27); if (c23 - c27) == 0 then c25 must be 0. Example Deequ:
        .satisfies(''CASE WHEN c23 - c27 > 0 THEN c25 BETWEEN 0 AND (c23 - c27) ELSE
        c25 = 0 END'', ''c25_within_base1'', _ >= 1.0)'
      sources:
