  '["c23","c26","c29","c32"]':
    code: []
    assumptions:
    - text: c23 and c29 are non-negative counts used as weights for averaging c26
        and c32. For the vast majority of rows (e.g., >= 95% compliance), (c23 + c29)
        should be > 0 so the weighted average is meaningful.
