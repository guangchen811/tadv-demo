        end_line: 45
        file: ''
      uid: ae836a63-40bb-4383-9dd7-7a89ec298c91
    - text: 'Combined numerator does not exceed combined base: for every record 0
        <= (c25 + c31) <= ((c23 - c27) + (c29 - c33)); additionally, if ((c23 - c27)
        + (c29 - c33)) == 0 then (c25 + c31) must be 0. Example Deequ: .satisfies(''CASE
        WHEN (c23 - c27) + (c29 - c33) > 0 THEN (c25 + c31) BETWEEN 0 AND ( (c23 -
        c27) + (c29 - c33) ) ELSE (c25 + c31) = 0 END'', ''combined_counts_within_combined_base'',
        _ >= 1.0)'
      sources:
