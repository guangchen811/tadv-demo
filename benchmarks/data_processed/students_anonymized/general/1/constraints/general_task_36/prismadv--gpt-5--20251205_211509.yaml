  '["c23","c25","c27"]':
    code: []
    assumptions:
    - text: Columns c23, c25, and c27 must be numeric and non-null for all records
        (they are read and immediately used in arithmetic without null-handling).
        This can be enforced as a single multi-column completeness/type check, e.g.,
        satisfies("c23 IS NOT NULL AND c25 IS NOT NULL AND c27 IS NOT NULL") and data
        type checks for all three.
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      uid: 17c587d4-ab4e-47aa-be84-8af28fc332f5
    - text: c27 should not exceed c23 (0 <= c27 <= c23), since c23 - c27 is used as
        a denominator-like quantity. This guards the intended interpretation of c27
        as a subset/offset of c23.
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      uid: 0c76442e-b157-4512-b987-3971fd06ec46
    - text: 'When c23 - c27 > 0, c25 must be a valid numerator bounded by that denominator:
        0 <= c25 <= (c23 - c27). This ensures the ratio c25 / (c23 - c27) (and its
        contribution to the combined rate) remains in [0, 1].'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      - start_line: 46
        end_line: 48
        file: ''
      uid: c03eb74e-1e91-44f6-9c8b-9249f06d0fc4
    - text: When c23 - c27 <= 0 (i.e., no available base), c25 must be 0. This aligns
        with the code path that sets the rate to 0 when the denominator is non-positive
        and avoids inconsistent states where a positive numerator exists with a non-positive
        base.
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      uid: 09d05a41-e022-445a-9046-c97f8717ca79
  '["c23","c25","c27","c29","c31","c33"]':
    code: []
    assumptions:
    - text: 'Denominator for the first rate must be non-negative: for every record
        c23 >= c27 (so c23 - c27 is never negative). This supports using (c23 - c27)
        as a base count. Example Deequ: .satisfies(''c23 >= c27'', ''c23_gte_c27'',
        _ >= 1.0)'
