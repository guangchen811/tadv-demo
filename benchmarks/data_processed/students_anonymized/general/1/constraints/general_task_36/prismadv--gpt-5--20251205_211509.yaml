    - text: Define eligible_total = (c23 - c27) + (c29 - c33) and pass_total = c25
        + c31. For all rows, eligible_total must be >= 0 and pass_total must satisfy
        0 <= pass_total <= eligible_total. Equivalently, c23 >= c27 and c29 >= c33,
        and (c25 + c31) <= ((c23 - c27) + (c29 - c33)).
      sources:
      - start_line: 40
        end_line: 48
        file: ''
      uid: 2cb5d91a-b930-4850-99dc-79faa640ef6b
    - text: 'Per-cohort bounds: when (c23 - c27) > 0, 0 <= c25 <= (c23 - c27); and
        when (c29 - c33) > 0, 0 <= c31 <= (c29 - c33).'
      sources:
      - start_line: 40
        end_line: 44
        file: ''
      uid: 044be767-c92b-4d6d-b502-bebf8329eb89
    - text: Where eligible_total > 0 (i.e., (c23 - c27) + (c29 - c33) > 0), the combined
        pass_rate = (c25 + c31)/((c23 - c27) + (c29 - c33)) must be within [0, 1].
        Additionally, rows with eligible_total > 0 should represent the large majority
        of the dataset (e.g., >= 90% compliance) to avoid defaulting the rate to 0.
      sources:
      - start_line: 46
        end_line: 48
        file: ''
      uid: 859310bb-5a36-4c63-ae21-069e70bb4884
  '["c23","c27"]':
    code: []
    assumptions:
    - text: 'c27 is a subset (or component) of c23: for every row c23 >= 0, c27 >=
        0, and c27 <= c23. This avoids negative denominators in val1 = c23 - c27 and
        keeps derived rates meaningful. Deequ example: .satisfies(''c23 >= 0 AND c27
        >= 0 AND c27 <= c23'', [''c23'',''c27''], assertion=CompletenessAssertion(1.0))'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      uid: 4ad0a7ee-3620-4d21-9995-a871ea47af4e
    - text: 'Pass-rate boundedness across multiple groups: when the effective denominator
        (c23 - c27) + (c29 - c33) > 0, the numerator (c25 + c31) must be between 0
        and that denominator so that rate3 is in [0, 1]. Deequ example: .satisfies(''((c23
        - c27) + (c29 - c33) <= 0) OR (((c25 + c31) >= 0) AND ((c25 + c31) <= ((c23
        - c27) + (c29 - c33))))'', [''c23'',''c27'',''c29'',''c33'',''c25'',''c31''],
        assertion=CompletenessAssertion(1.0))'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 46
        end_line: 48
        file: ''
      uid: 5bb15ac5-11de-4841-b586-b2b1706c090d
    - text: 'Weighted average grade coherence: when c23 + c29 > 0, the weighted average
        (c26*c23 + c32*c29) / (c23 + c29) should be within the [0, 20] grading scale
        implied by later scaling. Also requires non-negative counts (c23, c29). Deequ
        example: .satisfies(''((c23 + c29) <= 0) OR (((c26 * c23 + c32 * c29) / (c23
        + c29) >= 0) AND ((c26 * c23 + c32 * c29) / (c23 + c29) <= 20))'', [''c23'',''c29'',''c26'',''c32''],
        assertion=CompletenessAssertion(1.0))'
      sources:
      - start_line: 49
        end_line: 53
        file: ''
      uid: 5eb8c1d2-1eda-4f11-a02c-8c0635e0c2f5
    - text: 'Non-negativity and subset-sum across related groups: the combined subset
        counts should not exceed combined totals, i.e., c27 + c33 <= c23 + c29 (implying
        val3 = (c23 - c27) + (c29 - c33) >= 0). Deequ example: .satisfies(''c27 >=
        0 AND c33 >= 0 AND c23 >= 0 AND c29 >= 0 AND (c27 + c33) <= (c23 + c29)'',
        [''c23'',''c27'',''c29'',''c33''], assertion=CompletenessAssertion(1.0))'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: c5df29e3-3676-4710-b62b-a66416849153
    - text: 'Binary financial flags used jointly: c16 and c17 are binary indicators
        with values in {0,1}, used together via (c17 == 0) OR (c16 == 1). Deequ example:
        .satisfies(''(c16 IN (0,1)) AND (c17 IN (0,1))'', [''c16'',''c17''], assertion=CompletenessAssertion(1.0))'
      sources:
      - start_line: 56
        end_line: 56
        file: ''
      - start_line: 95
        end_line: 96
        file: ''
      uid: bb7bda4d-6041-4ba1-9554-5ff9c97dea66
  '["c29","c31","c33"]':
    code: []
    assumptions:
    - text: 'Columns c29, c31, and c33 must be numeric and non-null in all rows, since
        they are coerced to numeric and immediately used in arithmetic (subtraction
        and division) without subsequent null handling. Deequ example: .satisfies(''c29
        IS NOT NULL AND c31 IS NOT NULL AND c33 IS NOT NULL'', ''complete_c29_c31_c33'')'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 43
        end_line: 45
        file: ''
      uid: d90fdf3b-e8eb-4176-a277-3f9d1b6cadb7
    - text: 'Feasible counts: the number of successful events plus excluded/removed
        events cannot exceed the total events. In terms of these columns: c31 + c33
        <= c29 for every record. Deequ example: .satisfies(''c31 + c33 <= c29'', ''feasible_counts_c29_c31_c33'')'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      uid: 89a19dc7-445e-4db2-8e3f-16b9523cc992
    - text: 'To ensure the rate c31 / (c29 - c33) is well-defined and bounded, when
        (c29 - c33) > 0, c31 must lie in [0, c29 - c33]. Deequ example: .satisfies(''(c29
        - c33) <= 0 OR (c31 >= 0 AND c31 <= (c29 - c33))'', ''bounded_rate2_when_positive_denominator'')'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      uid: fa7a3fde-9dc6-4bd6-a891-fb433642b634
    - text: 'If there are no available opportunities after exclusions, then there
        should be no successes: when (c29 - c33) = 0, c31 must be 0. Deequ example:
        .satisfies(''(c29 - c33) != 0 OR c31 = 0'', ''no_successes_when_no_opportunities'')'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      uid: f02e6695-0d6a-4064-bd02-39514f1e7ce6
    - text: 'Non-negativity across related count columns: c29, c31, and c33 represent
        counts and should be >= 0 to keep computed deltas and rates meaningful. Deequ
        example: .satisfies(''c29 >= 0 AND c31 >= 0 AND c33 >= 0'', ''non_negative_counts_c29_c31_c33'')'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      uid: aa409f62-a128-478b-89aa-a12160f38633
  '["c29","c33"]':
    code: []
    assumptions:
    - text: 'Both ''c29'' and ''c33'' must be present, non-null, and numeric (integral)
        in all rows before computing differences and ratios. We could represent this
        with Deequ constraints such as: .hasCompleteness("c29", 1.0) and .hasCompleteness("c33",
        1.0) and .hasDataType("c29", ConstrainableDataTypes.Integral) and .hasDataType("c33",
        ConstrainableDataTypes.Integral).'
      sources:
      - start_line: 23
        end_line: 23
        file: ''
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 34
        end_line: 38
        file: ''
      uid: 32da8424-05ea-42f6-ae1b-bff48d02d329
    - text: 'The value in ''c29'' should be greater than or equal to the value in
        ''c33'' for every row (interpreting them as counts), since the code uses (c29
        - c33) as a denominator/capacity component. This can be enforced with: .hasCompliance("c29_ge_c33",
        "c29 >= c33", 1.0).'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      uid: 0e62ee39-d2b0-4252-a00b-2fa7b1c04272
    - text: 'Both ''c29'' and ''c33'' represent non-negative counts, so they should
        be >= 0 jointly: .hasCompliance("c29_c33_non_negative", "c29 >= 0 AND c33
        >= 0", 1.0).'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      uid: bc027898-384d-48f7-af9e-1d77f612320c
    - text: 'When (c29 - c33) > 0, the related numerator ''c31'' should be a valid
        count in [0, c29 - c33] so that rate2 is a proper rate in [0, 1]. This can
        be expressed as: .hasCompliance("rate2_bounds", "(c29 - c33) <= 0 OR (c31
        >= 0 AND c31 <= (c29 - c33))", 1.0).'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      uid: 591884ea-980c-4ff3-a63d-7e66e8671457
    - text: 'When ((c23 - c27) + (c29 - c33)) > 0, the combined numerator (c25 + c31)
        should lie in [0, (c23 - c27) + (c29 - c33)] to keep rate3 in [0, 1]. This
        can be enforced by: .hasCompliance("rate3_bounds", "((c23 - c27) + (c29 -
        c33)) <= 0 OR ((c25 + c31) >= 0 AND (c25 + c31) <= ((c23 - c27) + (c29 - c33)))",
        1.0).'
      sources:
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 60
        end_line: 61
        file: ''
      uid: 65061bdf-306a-440c-85d8-a23baf0eb9a3
