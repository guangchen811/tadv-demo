    - text: "When (c23 + c29) > 0, the weighted average (c26*c23 + c32*c29)/(c23 +\
        \ c29) must lie between min(c26, c32) and max(c26, c32), and c26 and c32 should\
        \ be on the same 0\u201320 scale (both within [0, 20])."
