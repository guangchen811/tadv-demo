        end_line: 41
        file: ''
      uid: 787ee3df-9256-4dcd-b6f1-89bda85c6e23
    - text: 'Denominator for the second rate must be non-negative: for every record
        c29 >= c33 (so c29 - c33 is never negative). This supports using (c29 - c33)
        as a base count. Example Deequ: .satisfies(''c29 >= c33'', ''c29_gte_c33'',
        _ >= 1.0)'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      uid: d55dc5fd-b398-43dc-b4fc-6969590ad196
    - text: 'Numerator bounded by its base (second rate): if (c29 - c33) > 0 then
        0 <= c31 <= (c29 - c33); if (c29 - c33) == 0 then c31 must be 0. Example Deequ:
        .satisfies(''CASE WHEN c29 - c33 > 0 THEN c31 BETWEEN 0 AND (c29 - c33) ELSE
        c31 = 0 END'', ''c31_within_base2'', _ >= 1.0)'
      sources:
