    - suggestion: '.satisfies("CASE WHEN `c37` = ''Enrolled'' THEN CASE WHEN `c20`
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "c20_not_null_for_enrolled", lambda
