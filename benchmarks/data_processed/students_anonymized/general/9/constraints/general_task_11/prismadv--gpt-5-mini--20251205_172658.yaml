      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 9f597fd3-2bcf-483b-a33d-fdec260f53a7
      source_assumptions:
      - 2226a8e5-cf6e-4384-9beb-7c059fedf633
    assumptions:
    - text: 'The ''c20'' column must be numeric (parseable to a numeric type). The
        code converts c20 via pd.to_numeric(errors=''coerce'') and then performs arithmetic,
        so non-numeric values will become NaN and will propagate into the normalized
        score. We should enforce that the vast majority of input values are numeric
        (e.g., >= 95% parseable) so downstream calculations are stable. Example validation
        (Deequ-like): .satisfies("CASE WHEN CAST(`c20` AS DOUBLE) IS NOT NULL THEN
        1 ELSE 0 END", "c20_parseable_as_numeric", lambda x: x >= 0.95).'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      uid: e414deae-67df-413f-af0f-1847d5dea223
    - text: 'For rows used in the final output (rows where c37 == ''Enrolled''), ''c20''
        must be present (not null). The script does not fill missing c20 values before
        using it to compute norm5 and the final risk score; missing values for enrolled
        students would produce NaN risk scores. Example validation: .satisfies("CASE
        WHEN `c37` = ''Enrolled'' THEN CASE WHEN `c20` IS NOT NULL THEN 1 ELSE 0 END
        ELSE 1 END", "c20_not_null_for_enrolled", lambda x: x == 1).'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 131
        end_line: 133
        file: ''
      - start_line: 102
        end_line: 102
        file: ''
      uid: 9aeb830b-b655-43bf-9403-7c1dfd0eb64e
    - text: 'The values in ''c20'' are expected to lie in a plausible age-related
        range centered on the normalization bounds used: between 16 and 70. The code
        normalizes via (c20 - 16)/(70 - 16) and clips to [0,1]; for the scaling to
        be meaningful, most values (e.g., >= 95%) should be within [16, 70]. Example
        validation: .satisfies("CASE WHEN `c20` BETWEEN 16 AND 70 THEN 1 ELSE 0 END",
        "c20_between_16_and_70", lambda x: x >= 0.95).'
      sources:
      - start_line: 102
        end_line: 102
        file: ''
      uid: 42afa8e0-7498-45d3-ac13-390cfc901278
    - text: 'The input ''c20'' is expected to be an integral/whole-number field (the
        dataset metadata lists it as Integral). Enforce that values are integers (no
        significant fractional values) to match downstream assumptions. Example validation:
        .satisfies("CASE WHEN floor(`c20`) = `c20` OR `c20` IS NULL THEN 1 ELSE 0
        END", "c20_integer_values", lambda x: x >= 0.95).'
      sources:
      - start_line: 61
        end_line: 71
        file: ''
      - start_line: 102
        end_line: 102
        file: ''
      uid: 2226a8e5-cf6e-4384-9beb-7c059fedf633
