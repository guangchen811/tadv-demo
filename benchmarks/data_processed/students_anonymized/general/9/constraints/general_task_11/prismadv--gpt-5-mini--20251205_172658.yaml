    - suggestion: '.satisfies("CASE WHEN `c29` = 0 OR (`c31` / `c29` >= 0 AND `c31`
        / `c29` <= 1) THEN 1 ELSE 0 END", "c31_div_c29_between_0_and_1_when_denominator_nonzero",
        lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 4d06a881-c623-4bf8-935e-159b7ce30b2f
      source_assumptions:
      - 8038367c-6d4b-49da-82d5-ebdaac40b070
    assumptions:
    - text: 'For each record, c31 (v11) should be less than or equal to c29 (v10).
        The code computes ratios like c31 / c29 and (c29 - c31) / c29 and expects
        these to represent proportions in [0,1], so the numerator must not exceed
        the denominator. Actionable checks: enforce c31 <= c29 and c29 >= 0, c31 >=
        0 (e.g., Deequ: a predicate or .satisfies(''c31 <= c29'', [''c31'',''c29''])
        plus non-negativity checks).'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 74898b39-0aa1-45e5-b89e-dd299443770a
    - text: 'When c29 (v10) == 0, c31 (v11) should also be 0. The code uses robust_divide
        and supplies defaults when denominators are zero; logically, a zero-denominator
        case is only consistent if the corresponding numerator is also zero (so rates
        represent 0/0 -> 0 instead of being replaced by a default that may skew scores).
        Actionable check: enforce that rows with c29 == 0 must have c31 == 0 (e.g.,
        .satisfies(''NOT (c29 = 0 AND c31 != 0)'', [''c29'',''c31''])).'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 30f458a0-1d00-41e5-8996-eda7e11543d2
    - text: For rows where c29 (v10) != 0, the ratio c31 / c29 should fall between
        0 and 1 inclusive. The downstream calculations (rate4, rate8 and later aggregations)
        expect these values to be valid proportions; enforce 0.0 <= c31 / c29 <= 1.0
        for c29 != 0 (e.g., .satisfies('c29 = 0 OR (c31 / c29 >= 0 AND c31 / c29 <=
        1)', ['c29','c31'])).
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 81
        end_line: 89
