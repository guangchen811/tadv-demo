        non-numeric values would be coerced to NaN and break downstream numeric expectations.
        Example Deequ-like check: .satisfies("CASE WHEN regexp_like(c31, ''^-?\\d+$'')
        THEN 1 ELSE 0 END", "c31_is_integer", lambda x: x == 1)'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      - start_line: 62
        end_line: 71
        file: ''
      uid: 9f16ebe5-12ea-4463-b0e6-484101e2b058
    - text: 'The input column ''c31'' must not contain nulls (no missing values).
        The code uses df[''c31''] in ratios and arithmetic without any explicit imputation
        for missing numerator values, so missing c31 values would result in NaNs in
        rate calculations and risk score. Example Deequ constraint: .satisfies("CASE
        WHEN c31 IS NOT NULL THEN 1 ELSE 0 END", "c31_non_null", lambda x: x == 1)'
      sources:
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: a63e1fb1-45d4-4e93-9f0a-93f0386ad406
    - text: 'The values in ''c31'' represent counts (non-negative integers). The column
        is used as a numerator in rate computations and subtracted from another count
        (c29), so negative values are semantically invalid. Example Deequ constraint:
        .satisfies("CASE WHEN c31 >= 0 THEN 1 ELSE 0 END", "c31_non_negative", lambda
        x: x == 1)'
      sources:
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: f8e827a1-724e-4376-9eac-f2258ab89bbf
    - text: 'Per-row logical consistency: ''c31'' should not exceed ''c29'' (i.e.,
        c31 <= c29). The code computes rate4 = c31 / c29 and rate8 = (c29 - c31) /
        c29; these calculations assume c31 <= c29 so that rates lie within [0,1] and
        the subtraction does not produce negative counts. For rows where c29 == 0,
        c31 should be 0 to be consistent with count semantics (the code handles denom==0
        by defaulting rates, but input-level consistency is expected). Example Deequ
        constraint: .satisfies("CASE WHEN c29 > 0 THEN CASE WHEN c31 <= c29 THEN 1
        ELSE 0 END WHEN c29 = 0 THEN CASE WHEN c31 = 0 THEN 1 ELSE 0 END ELSE 0 END",
        "c31_le_c29_and_zero_case", lambda x: x == 1)'
      sources:
      - start_line: 81
        end_line: 81
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      - start_line: 115
        end_line: 115
        file: ''
      uid: 8bc75fe8-112d-43b1-9a8f-8d5863ccc68f
