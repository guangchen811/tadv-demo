        (0 <= c28 <= c29 and 0 <= c33 <= c29). The code uses c28/c29 (rate6) and c33/c29
        (rate5) as ratios, so these numerator columns are expected to be non-negative
        and not exceed the denominator. Deequ-style constraints: .satisfies("c29 ==
        0 OR (c28 >= 0 AND c28 <= c29)", "c28_between_0_and_c29") and .satisfies("c29
        == 0 OR (c33 >= 0 AND c33 <= c29)", "c33_between_0_and_c29").'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      - start_line: 62
        end_line: 71
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 338204d6-3055-422b-90e0-1639a108232f
    - text: 'For rows used for final scoring (enrolled rows where v1 == ''Enrolled''),
        c29 should either be positive or, if c29 == 0, then c31, c28 and c33 must
        be zero. This prevents silent substitution of defaults from changing the intended
        meaning of the ratios for enrolled students. Deequ-style constraint: .satisfies("v1
        != ''Enrolled'' OR c29 > 0 OR (c31 == 0 AND c28 == 0 AND c33 == 0)", "enrolled_c29_consistency").'
      sources:
      - start_line: 73
        end_line: 75
        file: ''
      - start_line: 81
        end_line: 89
        file: ''
      - start_line: 131
        end_line: 133
        file: ''
      uid: 24abd098-af87-40c9-9944-145393858532
  '["c29","c31"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `c29` >= 0 AND `c31` >= 0 AND `c31` <= `c29`
        THEN 1 ELSE 0 END", "c31_le_c29_and_nonnegative", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: f10ef03b-e29d-46bc-abe2-9475892864c7
      source_assumptions:
      - 74898b39-0aa1-45e5-b89e-dd299443770a
    - suggestion: '.satisfies("CASE WHEN NOT (`c29` = 0 AND `c31` != 0) THEN 1 ELSE
        0 END", "c29_zero_implies_c31_zero", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 8fd2df16-8cc7-4357-9792-15c5892da575
      source_assumptions:
