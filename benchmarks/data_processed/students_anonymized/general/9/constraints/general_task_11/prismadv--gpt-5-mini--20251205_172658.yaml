  '["c29","c33"]':
    code: []
    assumptions:
    - text: 'Both ''c29'' and ''c33'' are expected to be numeric and complete (no
        missing/null values) before the ratio computations. This is required because
        the code coerces these columns to numeric and then performs elementwise arithmetic
        and divisions involving both columns. A corresponding Deequ-style constraint
        could be: hasCompleteness(''c29'', 1.0) AND hasCompleteness(''c33'', 1.0).'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      - start_line: 61
        end_line: 72
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 11201ba6-6938-45da-ab26-0043e4675524
    - text: 'When ''c33'' is non-zero, ''c29'' must also be non-zero (c33 != 0 =>
        c29 != 0). The code computes rate5 = c33 / c29 with default=0.0 when denominator
        is zero; logically this assumes that non-zero numerators correspond to non-zero
        denominators so the division produces a meaningful finite value. A Deequ constraint
        could be expressed as a predicate: c33 == 0 OR c29 != 0 (or .satisfies(''c33
        = 0 OR c29 <> 0'')).'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 89
        end_line: 89
        file: ''
      uid: 5c4e4c37-b505-4adb-8f25-da8626859d7d
    - text: "Values in 'c33' should not exceed the corresponding values in 'c29' (c33\
        \ <= c29) \u2014 both are treated as counts/parts of the same base in ratio\
        \ computations (c33 is used as a numerator and c29 as the denominator). Enforceable\
        \ as a constraint like: .satisfies('c33 <= c29') (or equivalently assert that\
        \ the difference c29 - c33 is >= 0)."
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      - start_line: 81
        end_line: 89
        file: ''
      - start_line: 115
        end_line: 116
        file: ''
      uid: aa5d9fea-1a72-4ba9-9ba6-8ca5973274f2
    - text: 'If ''c29'' equals zero, then ''c33'' should be zero as well (c29 == 0
        => c33 == 0). The code supplies a default ratio of 0.0 for c33/c29 when the
        denominator is zero; that default encodes the expectation that a zero base
        implies zero numerator. This can be encoded as: .satisfies(''c29 <> 0 OR c33
        = 0'').'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 82
        end_line: 83
        file: ''
      uid: a729144d-a31e-40e2-ad54-dd422ec416de
  '["c34","c35","c36"]':
    code: []
    assumptions:
    - text: 'Columns c34, c35 and c36 must be present and parseable as numeric values
        (no rows should be coerced to NaN by pd.to_numeric). The code coercion (pd.to_numeric(errors=''coerce''))
        is performed and subsequent arithmetic expects numeric inputs. This can be
        enforced as: assert that after numeric conversion, completeness(count_non_null)
        for each of [''c34'',''c35'',''c36''] equals total row count (i.e., no coerced-to-NaN
        values).'
      sources:
      - start_line: 57
        end_line: 71
        file: ''
      - start_line: 109
        end_line: 112
        file: ''
      uid: 483e0e29-7f49-4262-a264-1bd9aec365e3
    - text: 'Values in c34, c35, c36 should fall in expected ranges so the normalization
        logic behaves as intended. Reasonable operational ranges (based on how norm6/val2/norm7
        are computed) are: c34 roughly in [5, 20] (so (c34-5)/15 maps to ~0..1), c36
        roughly in [-5, 5] (so (5-c36)/10 maps near 0..1), and c35 roughly in [-2,
        5] (so (c35+2)/7 maps near 0..1). Enforce that at least 95% of rows satisfy:
        5 <= c34 <= 20, -5 <= c36 <= 5, -2 <= c35 <= 5. (Actionable as Deequ-like
        range/fraction checks.)'
      sources:
      - start_line: 109
        end_line: 111
        file: ''
      - start_line: 121
        end_line: 128
        file: ''
      uid: 5d321391-e0bf-4ea3-baaf-fe16e50fc27b
    - text: 'The three macro-headwind columns jointly drive risk4 with monotonic effects:
        c34 should have a positive relationship with the computed risk4 (higher c34
        -> larger norm6 -> higher risk4), c35 should have a positive relationship
        with risk4 (higher c35 -> larger norm7 -> higher risk4), and c36 should have
        a negative relationship with risk4 (higher c36 -> smaller val2 -> lower contribution
        to risk4). Enforceable checks: Spearman (or rank) correlation(c34, risk4)
        > 0, correlation(c35, risk4) > 0, correlation(c36, risk4) < 0 (computed on
        the rows used to build the score).'
      sources:
      - start_line: 109
        end_line: 112
        file: ''
      - start_line: 121
        end_line: 128
        file: ''
      uid: 2a23102c-c651-4a78-bf0c-66440ec7bd86
