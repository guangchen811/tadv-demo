      uid: 09508140-f6ce-4bde-8a60-bdf06db5c5b2
    - text: 'The ''c25'' column should contain no null / missing values. The code
        does not explicitly handle NaNs for c25 when val2 > 0 (rate2 = val4 / val2),
        so any NaN in c25 will propagate into rate2 and into risk/score computations.

        Example Deequ-style check: .satisfies("CASE WHEN `c25` IS NOT NULL THEN 1
        ELSE 0 END", "c25_no_nulls", lambda x: x == 1)

        (Or Great Expectations: expect_column_values_to_not_be_null.)'
      sources:
