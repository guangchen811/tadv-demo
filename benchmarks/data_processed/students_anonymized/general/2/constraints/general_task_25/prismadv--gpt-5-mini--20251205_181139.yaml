        end_line: 48
        file: ''
      - start_line: 86
        end_line: 87
        file: ''
      uid: 95f4cadd-06e8-477d-a831-ef00690dc0d3
    - text: 'The ''c24'' values are expected to be integer-like counts (no meaningful
        fractional values). If fractional values are present they should be rare.
        Example deequ-style check: .satisfies(''CASE WHEN TRY_CAST(`c24` AS DOUBLE)
        IS NOT NULL AND FLOOR(TRY_CAST(`c24` AS DOUBLE)) = TRY_CAST(`c24` AS DOUBLE)
        THEN 1 ELSE 0 END'', ''c24_integer_like'', lambda x: x >= 0.99)'
      sources:
