  '["c16","c17"]':
    code: []
    assumptions:
    - text: 'Columns ''c16'' and ''c17'' are binary indicator columns (allowed values
        are exactly 0 or 1) and contain no missing values. Actionable checks: assert
        completeness for both columns equals 1.0 and that each value is contained
        in {0,1}. Example Deequ-style constraints:

        .isComplete([''c16''])

        .isComplete([''c17''])

        .satisfies(''c16 IN (0,1)'')

        .satisfies(''c17 IN (0,1)'')'
      sources:
      - start_line: 24
        end_line: 32
        file: ''
      - start_line: 40
        end_line: 41
        file: ''
      uid: cbd1db02-1eab-4721-83e8-337e8fd19e48
    - text: 'The derived output column ''tuition_hold'' is computed as the logical
        expression (c17 == 0) OR (c16 == 1). Enforce that for every row tuition_hold
        == 1 if and only if (c17 == 0 OR c16 == 1). Example constraint (Deequ/SQL
        style): .satisfies(''((c17 = 0) OR (c16 = 1)) = (tuition_hold = 1)'')'
      sources:
      - start_line: 72
        end_line: 75
        file: ''
      - start_line: 83
        end_line: 83
        file: ''
      uid: f7faf63a-8752-4a71-8708-c7ea8243615d
    - text: 'The output field ''debtor'' is directly the input column c16, and ''tuition_up_to_date''
        is directly the input column c17 (no transformation). Enforce equality between
        input and output columns. Example constraint: .satisfies(''debtor = c16'')
        and .satisfies(''tuition_up_to_date = c17'')'
      sources:
      - start_line: 78
        end_line: 83
        file: ''
      - start_line: 90
        end_line: 92
        file: ''
      uid: 3ec8ea7f-0ac3-47a8-b21f-cda034f5fcd6
    - text: 'The output field ''fees_flag'' equals (c17 == 0) (i.e., fees_flag ==
        1 when c17 == 0, else 0). Enforce per-row equivalence: fees_flag == CAST((c17
        = 0) AS int). Example constraint: .satisfies(''fees_flag = (CASE WHEN c17
        = 0 THEN 1 ELSE 0 END)'')'
      sources:
      - start_line: 53
        end_line: 56
        file: ''
      - start_line: 86
        end_line: 89
        file: ''
      uid: a65483db-4f09-4f9b-9125-7b9ae0596860
    - text: 'The categorical outputs ''hold_reason'' and ''hold_severity'' are determined
        by the combination of c16, c17 and the score-based mask (mask2/mask4):

        - If mask4 is true -> hold_reason == ''FEE+ACADEMIC'' and hold_severity ==
        ''STRICT''

        - Else if mask3 is true -> hold_reason == ''FEE'' and hold_severity == ''STANDARD''

        - Else -> hold_reason == ''NONE'' and hold_severity == ''NONE''

        Enforce these per-row mappings as multi-column constraints, e.g. .satisfies("(mask4
        AND hold_reason = ''FEE+ACADEMIC'' AND hold_severity = ''STRICT'') OR (mask3
        AND hold_reason = ''FEE'' AND hold_severity = ''STANDARD'') OR (NOT mask3
        AND hold_reason = ''NONE'' AND hold_severity = ''NONE'')") but replace mask3/mask4
        expressions with their definitions in terms of c16,c17 and score threshold.'
      sources:
      - start_line: 57
        end_line: 76
        file: ''
      - start_line: 78
        end_line: 85
        file: ''
      uid: a69345d0-5366-4cfd-9f1b-5ba380c9e86d
