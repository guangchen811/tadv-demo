        end_line: 37
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: 2a7fc11c-ba3d-4d27-b155-bf19bdb76824
    - text: 'The ''c25'' values represent a count used as a numerator for pass_rate
        and therefore should be non-negative integers (or integer-like) and realistically
        bounded by the corresponding ''c24'' value (i.e., 0 <= c25 <= c24). The risk
        calculation expects rate2 (c25 / c24 when c24 > 0) to be in [0, 1].

        Example Deequ-style conditional check: .satisfies("CASE WHEN `c24` > 0 THEN
        CASE WHEN `c25` >= 0 AND `c25` <= `c24` THEN 1 ELSE 0 END ELSE CASE WHEN `c25`
        >= 0 THEN 1 ELSE 0 END END", "c25_in_valid_range", lambda x: x == 1)

        (Or Great Expectations: use a row-wise expectation or a conditional expectation
        to assert 0 <= c25 <= c24 when c24 > 0.)'
