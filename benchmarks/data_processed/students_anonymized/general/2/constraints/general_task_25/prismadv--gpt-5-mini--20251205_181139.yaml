    assumptions:
    - text: 'c26 is used as a normalized value norm1 = c26 / 20.0 and then combined
        additively with other normalized rates to compute risk. Therefore c26 should
        be non-negative and (ideally) <= 20 for most records so that norm1 lies in
        [0,1] and (1 - norm1) behaves as an expected bounded component of the risk
        score. Actionable constraint examples: - enforce 0 <= c26 <= 20 (Deequ: .satisfies(''c26
        >= 0 AND c26 <= 20'', ''c26_in_0_20'') or .isNonNegative(''c26'') plus an
        upper-bound check).'
      sources:
      - start_line: 23
        end_line: 51
        file: ''
      - start_line: 57
        end_line: 62
        file: ''
      uid: f65992a2-0558-404f-9e28-88a285e95e8b
    - text: 'For the computed evaluation rate rate1 = (c23 - c27) / c23 to be interpretable
        as a proportion in [0,1], c27 should be <= c23 for each record (and c23 should
        be non-negative). Actionable constraint example: .satisfies(''c27 <= c23 AND
        c23 >= 0'', ''c27_le_c23_and_c23_nonnegative'').'
      sources:
      - start_line: 34
        end_line: 46
        file: ''
      uid: 18e3a5e6-f74b-4605-ac1b-3536f763ed6b
    - text: 'For credit_ratio = c22 / c23 to represent a meaningful ratio in [0,1],
        c22 should be <= c23 (and c23 should be > 0 for records where ratio is expected).
        Actionable constraint example: .satisfies(''c22 <= c23 AND c23 > 0'', ''c22_le_c23_and_c23_positive'').'
      sources:
      - start_line: 34
        end_line: 50
        file: ''
      uid: 7a600f2d-7f76-4c95-9d78-2aade1a39923
    - text: 'For pass_rate = c25 / c24 to be a valid proportion, c25 should be <=
        c24 (and c24 should be > 0 for records where a rate is expected). Actionable
        constraint example: .satisfies(''c25 <= c24 AND c24 > 0'', ''c25_le_c24_and_c24_positive'').'
      sources:
      - start_line: 35
        end_line: 48
        file: ''
      uid: 61d8f335-9ec3-4ec5-8456-1d57e245e860
    - text: 'The denominators used in rate computations (c23 and c24) are expected
        to be non-negative and typically positive when rates are meaningful. Enforce
        that these columns are >= 0, and if business logic requires, > 0 for the subset
        of records where rates are computed. Actionable constraint examples: .isNonNegative(''c23''),
        .isNonNegative(''c24'') or .satisfies(''c23 > 0'', ''c23_positive_for_rate_computation'').'
      sources:
      - start_line: 32
        end_line: 50
        file: ''
      uid: af4b802c-d3c1-4d2c-8e60-3b1472595e43
    - text: 'Columns used as flags in boolean masks (c16, c17, c21) are treated as
        binary indicators (checked against values 0 or 1 in multiple masks and used
        to compute proportions). Therefore these columns should contain only {0,1}
        (or at least the vast majority of records). Actionable constraint example:
        .satisfies(''c16 IN (0,1) AND c17 IN (0,1) AND c21 IN (0,1)'', ''flags_are_binary'').'
      sources:
      - start_line: 40
        end_line: 64
        file: ''
      - start_line: 72
