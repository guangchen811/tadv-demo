    assumptions:
    - text: 'c27 must be numeric (convertible to float) for every input row. The code
        calls pd.to_numeric(..., errors=''coerce'') and then astype(float), and c27
        is used in arithmetic (val1 - val3 and division). If c27 contains non-numeric
        values that are coerced to NaN, those NaNs will propagate into rate and risk
        calculations and produce unexpected NaNs in the outputs. We can express this
        as a validation rule, for example: .satisfies("CASE WHEN `c27` RLIKE ''^[0-9]+(\\.[0-9]+)?$''
        THEN 1 ELSE 0 END", "c27_is_numeric", lambda x: x == 1)'
      sources:
