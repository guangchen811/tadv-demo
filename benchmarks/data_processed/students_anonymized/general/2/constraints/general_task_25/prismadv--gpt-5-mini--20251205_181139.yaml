      uid: df881f16-dca8-4aa3-8bcb-c68bf8c6d1ed
    - text: 'The ''c24'' column should be non-negative (>= 0). The code uses c24 as
        a denominator for pass_rate and treats non-positive values as cases where
        the rate is set to 0, so negative values are likely invalid. Example deequ-style
        check: .satisfies(''CASE WHEN TRY_CAST(`c24` AS DOUBLE) >= 0 THEN 1 ELSE 0
        END'', ''c24_non_negative'', lambda x: x == 1)'
      sources:
      - start_line: 35
        end_line: 48
        file: ''
      uid: f54b3378-94fc-41da-b75b-185f2d8645f0
    - text: 'There should be at least some positive values in ''c24'' (i.e., not all
        rows have c24 <= 0), otherwise pass_rate will be 0 for all records. A practical
        validation is to require a small fraction of rows with c24 > 0 (for example
        >= 1%). Example deequ-style check: .satisfies(''CASE WHEN TRY_CAST(`c24` AS
        DOUBLE) > 0 THEN 1 ELSE 0 END'', ''c24_has_positive_values'', lambda x: x
        >= 0.01)'
      sources:
