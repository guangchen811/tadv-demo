        end_line: 48
        file: ''
      - start_line: 57
        end_line: 63
        file: ''
      uid: 8bb558c0-ee45-4ba6-9d5f-266abcf73ab1
    - text: 'Because the code casts c25 to float and later rounds pass_rate for output,
        it''s acceptable for c25 to be integer-valued but the pipeline expects values
        that do not cause extreme ratios (e.g., extremely large c25 relative to c24).
        In practice enforce an upper bound sanity check (e.g., c25 <= c24 and c25
        is within an expected maximum) to avoid implausible pass_rate values.

        Example Deequ-style check: .hasLessThan("CASE WHEN `c24` > 0 THEN `c25` /
        `c24` ELSE 0 END", 1.5) or enforce c25 <= c24 as above.'
      sources:
