      sources:
      - start_line: 29
        end_line: 32
        file: ''
      - start_line: 38
        end_line: 38
        file: ''
      uid: 444aa68b-660e-466b-a8b5-5e57a82e03d6
    - text: 'The values in ''c22'' are expected to be non-negative (>= 0). c22 is
        used as a ''credit'' / numerator when computing a ratio (c22 / c23). Negative
        values would produce negative ratios and affect the risk computation in unexpected
        ways.

        Suggested validation:

        - Deequ: .satisfies("CASE WHEN c22 IS NOT NULL AND cast(c22 AS double) >=
        0 THEN 1 ELSE 0 END", "c22_non_negative", lambda x: x == 1.0)

        - Great Expectations: expect_column_values_to_be_between(''c22'', min_value=0,
        max_value=None)

        '
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 57
        end_line: 63
        file: ''
      uid: 96eb350c-ab0c-42dd-b162-0cc916559b96
    - text: 'For meaningful ''credit_ratio'' values, c22 should generally be less
        than or equal to the corresponding c23 when c23 > 0 (i.e., the ratio c22 /
        c23 is expected to lie in [0, 1] for the vast majority of records). The code
        computes ratio1 = c22 / c23 when c23 > 0 and then uses (1 - ratio1) in the
        risk calculation, implying the ratio represents a proportion.

        Suggested validation (cross-column):

        - Deequ: .satisfies("CASE WHEN cast(c23 AS double) > 0 AND cast(c22 AS double)/cast(c23
        AS double) BETWEEN 0 AND 1 THEN 1 ELSE 0 END", "c22_le_c23_for_positive_c23",
        lambda x: x >= 0.95)

        - Great Expectations: expect_column_pair_values_A_to_be_less_than_or_equal_to_B(''c22'',''c23'')
        applied only when c23 > 0 (or a custom expectation checking 0 <= c22/c23 <=
        1)

        '
      sources:
      - start_line: 44
        end_line: 50
        file: ''
      - start_line: 57
        end_line: 63
        file: ''
      uid: 398a7ab7-d5fb-4699-8f35-078bba979375
    - text: 'The ''c22'' column is expected to be integral (whole numbers). The dataset
        metadata indicates an integral type and the code casts to float only for arithmetic;
        fractional values are likely not expected.

        Suggested validation:

        - Deequ: .satisfies("CASE WHEN cast(c22 AS double) = floor(cast(c22 AS double))
        THEN 1 ELSE 0 END", "c22_is_integer", lambda x: x == 1.0)

        - Great Expectations: expect_column_values_to_be_in_type_list(''c22'', [''Integer''])
        or a custom check that value == floor(value)

        '
      sources:
