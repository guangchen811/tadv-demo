      uid: e56a2787-ba50-4cfb-996e-405e66cdf873
    - text: 'c27 should contain non-negative integer values (e.g., counts). The code
        treats c27 as a numeric value and subtracts it from c23 (val1 - val3). Negative
        or fractional values would change the semantics of that subtraction and downstream
        rates. Representable check: .satisfies("CASE WHEN `c27` >= 0 AND FLOOR(`c27`)
        = `c27` THEN 1 ELSE 0 END", "c27_non_negative_integer", lambda x: x == 1)'
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 44
        end_line: 46
        file: ''
      uid: daf312e6-0def-4d68-bed6-9a2bd907791d
    - text: 'c27 should not exceed c23 for each row (c27 <= c23). The code computes
        val11 = val1 - val3 and then divides by val1 when val1 > 0; if c27 (val3)
        > c23 (val1) this yields negative rates and may violate expected semantics
        (e.g., ''completed'' cannot exceed ''assigned''). Represent as: .satisfies("CASE
        WHEN `c27` <= `c23` THEN 1 ELSE 0 END", "c27_le_c23", lambda x: x == 1)'
