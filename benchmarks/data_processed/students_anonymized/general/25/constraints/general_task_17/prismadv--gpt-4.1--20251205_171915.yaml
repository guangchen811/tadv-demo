    - text: The combined calculation risk1 = sigmoid(val5 - val4 + 0.3 * val6) assumes
        that the standardized values of c34, c35, and c36 (after z-score normalization)
        are on comparable scales, and that their means and standard deviations are
        meaningful (i.e., not constant or degenerate). This implies that c34, c35,
        and c36 must have sufficient variance (std > 0) within the dataset; otherwise,
        normalization and downstream risk scoring will be invalid or result in division
        by zero.
