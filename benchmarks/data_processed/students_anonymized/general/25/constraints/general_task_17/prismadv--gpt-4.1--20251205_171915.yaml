      uid: a2824c2f-88d9-47b7-9e90-12f457a34ec2
    - text: 'The risk score calculation (score1) and its downstream use in ranking
        and binning records (priority_tier) assume that for each row, the derived
        dropout risk score from c34, c35, and c36 (via the risk1 component) is meaningful
        and comparable across all records. Thus, for the purposes of fair ranking
        and binning, the joint distribution of c34, c35, and c36 should not contain
        outlier combinations that could distort the z-score normalization or the sigmoid
        transformation. A multi-column constraint could be: The z-score normalized
        values of c34, c35, and c36 should be within a reasonable range (e.g., abs(z)
