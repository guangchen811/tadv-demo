      - 766932e2-79ca-4bd2-b920-3e7f6cd60e66
    assumptions:
    - text: 'c30 should be numeric/parseable to numbers for the vast majority of rows
        (e.g., at least 95% non-null after numeric coercion), because it is coerced
        to numeric and then used as a divisor (pass_rate_2) and in arithmetic for
        the risk score. Example Deequ constraint: .satisfies(''CASE WHEN TRY_CAST(c30
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END'', ''c30 is numeric'', lambda x:
        x >= 0.95)'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      - start_line: 49
        end_line: 50
        file: ''
      - start_line: 63
        end_line: 71
        file: ''
      - start_line: 78
        end_line: 79
        file: ''
      uid: c12c5785-60ff-421c-b8fb-2d6d4121b767
    - text: Zero values in c30 are allowed and are treated as missing denominators
        for pass_rate_2 (they are replaced with null before division). Validation
        should not flag 0 as invalid for this column.
      sources:
      - start_line: 49
        end_line: 50
        file: ''
      uid: 98adc087-26b0-4fdd-8569-de3414a81210
    - text: 'c30 values should represent non-negative integers (counts). When converted
        to numeric, each value should be >= 0 and have no fractional part. Example
        Deequ constraints: .satisfies(''CASE WHEN TRY_CAST(c30 AS DOUBLE) >= 0 THEN
        1 ELSE 0 END'', ''c30 non-negative'', lambda x: x == 1.0) and .satisfies(''CASE
        WHEN TRY_CAST(c30 AS DOUBLE) = FLOOR(TRY_CAST(c30 AS DOUBLE)) THEN 1 ELSE
        0 END'', ''c30 integer-like'', lambda x: x >= 0.99)'
      sources:
      - start_line: 49
        end_line: 52
        file: ''
      - start_line: 78
        end_line: 81
        file: ''
      uid: b64f0a06-0750-44ed-a0ac-0ff2e969b99d
    - text: 'For rows where c29 > 0, c30 should not exceed c29, and c30 + c33 should
        be less than or equal to c29 for most rows (e.g., at least 95%), because the
        code interprets ratio2 as a coverage gap fraction that is expected to be non-negative.
        Example Deequ constraint: .satisfies(''CASE WHEN c29 > 0 THEN CASE WHEN c30
        <= c29 AND c30 + c33 <= c29 THEN 1 ELSE 0 END ELSE 1 END'', ''c30 within coverage
        bounds'', lambda x: x >= 0.95)'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      - start_line: 80
        end_line: 81
        file: ''
      uid: 766932e2-79ca-4bd2-b920-3e7f6cd60e66
