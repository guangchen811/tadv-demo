        file: ''
      uid: 7875ad8a-ae5c-4665-90ea-509d741e002d
    - text: 'The sum of c24 and c27 should not exceed c23 when c23 > 0, i.e., c24
        + c27 <= c23. This keeps coverage_gap_1 = (c23 - (c24 + c27)) / c23 non-negative
        and interpretable as a gap. Deequ compliance predicate: (c23 <= 0) OR (c24
