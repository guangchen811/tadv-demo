    - text: 'c30 and c33 are components of a total c29 on each row; all three should
        be non-negative and the parts must not exceed the total. Deequ example: .satisfies(''c29
        >= 0 AND c30 >= 0 AND c33 >= 0 AND c30 + c33 <= c29'', ''parts_do_not_exceed_total'')'
