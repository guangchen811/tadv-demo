  '["c24","c25"]':
    code: []
    assumptions:
    - text: 'For rows with c24 > 0, c25 must be between 0 and c24 (inclusive), so
        the derived pass rate rate1 = c25 / c24 stays within [0, 1]. This can be enforced
        as a Deequ compliance constraint: (c24 <= 0) OR (c25 >= 0 AND c25 <= c24).'
