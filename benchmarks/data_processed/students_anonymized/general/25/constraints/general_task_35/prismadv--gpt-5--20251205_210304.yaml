        end_line: 40
        file: ''
      - start_line: 41
        end_line: 42
        file: ''
      uid: 91472128-4297-4022-9537-6bab2e041dcd
    - text: 'c31 represents a count used as the numerator of pass_rate_2, so all non-null
        c31 values should be non-negative (>= 0). Deequ-style: compliance that c31
        >= 0 for non-null rows == 1.0.'
