      uid: 6013694a-3976-4236-a575-cc61554bf4e2
    - text: 'For rows with c23 > 0, the coverage ratio derived from these columns
        must be bounded: 0 <= (c24 + c27)/c23 <= 1 (equivalently, 0 <= (c23 - (c24
        + c27))/c23 <= 1). This can be expressed as a compliance constraint: ''(c23
