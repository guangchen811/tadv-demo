      - start_line: 49
        end_line: 50
        file: ''
      uid: 59b0ee29-25d1-47f0-8477-993998dbaaa9
    - text: 'For rows where c30 > 0, c31 should not exceed c30 (0 <= c31 <= c30) so
        that pass_rate_2 remains in [0, 1]. Deequ-style: compliance of (c30 > 0) =>
        (c31 >= 0 AND c31 <= c30) == 1.0.'
      sources:
      - start_line: 49
        end_line: 50
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: 9f92adf1-ea60-436e-9506-d19a0b274fc8
