        end_line: 50
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: de25ecfa-a7f3-41aa-9372-c56a66bc8fcc
    - text: 'c31 should be integer-valued (no fractional part) when present, since
        it behaves like a count in the pass_rate_2 calculation. Great Expectations-style:
        expect_column_values_to_be_of_type(c31, ''Integral'') or expect_column_values_to_match_regex
        for integers.'
      sources:
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: 59ea278d-0e6e-4e49-bcba-9c1c71273438
    - text: 'If c30 (the denominator of pass_rate_2) is 0 or null, then c31 should
        be 0 (no passes when there are zero/unknown attempts). Deequ-style: for rows
        where c30 is null or c30 = 0, enforce c31 = 0.'
