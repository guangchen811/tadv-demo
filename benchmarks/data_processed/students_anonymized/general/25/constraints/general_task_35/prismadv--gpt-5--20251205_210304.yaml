    - text: 'The trio (c23, c24, c27) must be present and numeric on every row (no
        coercion to NaN), since they are jointly used in arithmetic. This can be enforced
        with a multi-column not-null/numeric compliance like: ''c23 IS NOT NULL AND
        c24 IS NOT NULL AND c27 IS NOT NULL'', combined with non-negativity or integral-type
        checks for all three.'
      sources:
