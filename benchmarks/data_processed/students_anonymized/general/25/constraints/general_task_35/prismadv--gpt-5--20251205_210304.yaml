  '["c23","c24","c27"]':
    code: []
    assumptions:
    - text: 'c24 and c27 are non-negative count components of the total c23 for each
        row: c24 >= 0, c27 >= 0, and (c24 + c27) <= c23. Additionally, if c23 == 0
        then both c24 == 0 and c27 == 0. These can be enforced with Deequ-style compliance
        constraints such as: compliance(''(c24 + c27) <= c23''), compliance(''c23
        >= 0 AND c24 >= 0 AND c27 >= 0''), and compliance(''(c23 > 0) OR (c24 = 0
        AND c27 = 0)'').'
