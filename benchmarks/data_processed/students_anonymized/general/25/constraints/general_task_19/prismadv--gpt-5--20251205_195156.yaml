      uid: d117c541-b63c-4f71-a882-568c55d4fbd7
  '["c22","c23"]':
    code: []
    assumptions:
    - text: 'c22 is a subset/count that must not exceed its corresponding total/count
        c23. For every record: c22 and c23 are non-negative integers and c22 <= c23.
        This can be represented as a Deequ constraint: .satisfies("c22 >= 0 AND c23
        >= 0 AND c22 <= c23", "c22_le_c23_and_nonnegative")'
      sources:
      - start_line: 26
        end_line: 29
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: 4017b6dd-0dab-48c5-ba4a-2ac165a3fbc4
    - text: 'No record should have c22 > 0 when c23 <= 0 (i.e., if c22 > 0 then c23
        must be > 0; equivalently, if c23 = 0 then c22 = 0). This guards against masked
        positives due to the np.where fallback. Deequ example: .satisfies("(c22 =
        0) OR (c23 > 0)", "no_positive_c22_with_nonpositive_c23")'
      sources:
      - start_line: 26
        end_line: 29
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: 0ff5bb82-35b2-4e5b-b2ae-1f0556a0ed5d
    - text: 'For rows where c23 > 0, the ratio c22/c23 must lie within [0, 1]. This
        reflects a valid proportion derived from counts. Deequ example: .satisfies("CASE
        WHEN c23 > 0 THEN (c22 / c23) >= 0 AND (c22 / c23) <= 1 ELSE true END", "ratio_c22_over_c23_in_0_1_when_den_positive")'
      sources:
      - start_line: 26
        end_line: 29
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: b12e16ab-08ec-4715-9d86-f2a94acb7109
  '["c24","c25"]':
    code: []
    assumptions:
    - text: 'c25 is a numerator and c24 is its corresponding denominator for the same
        term; both are non-negative counts and c25 must be less than or equal to c24
        so that the pre-clipping ratio c25/c24 naturally lies within [0, 1]. This
        prevents the clip from masking data issues and aligns with later thresholds
        (e.g., rate1 >= 0.50). Example Deequ constraints: .satisfies(''c24 >= 0 AND
        c25 >= 0 AND c25 <= c24'', ''c25_le_c24'') and .satisfies(''c24 = 0 OR (c25
        / c24 >= 0 AND c25 / c24 <= 1)'', ''rate1_in_unit_interval'').'
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 71
        end_line: 74
        file: ''
      uid: a8dac3a4-a482-4685-a4ab-3470238cb74a
    - text: 'If c24 (denominator) is zero, then c25 (numerator) must also be zero.
        This ensures that treating zero denominators as NaN and then filling/setting
        the rate to 0.0 does not hide impossible events (numerator without opportunities).
        Example Deequ constraint: .satisfies(''NOT (c24 = 0 AND c25 > 0)'', ''no_positive_numerator_when_denominator_zero'').'
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 44
        end_line: 45
        file: ''
      uid: 64b17077-d8d5-42d9-841d-57287c7e5432
    - text: 'For records that are intended to meet the scholarship eligibility rule
        on the first-term rate (rate1 >= 0.50), the underlying counts should satisfy
        c25 >= 0.5 * c24 (and still c25 <= c24). This guarantees the threshold is
        met based on raw counts rather than by the clip-to-1.0 behavior. Example Deequ
        constraint (conditional on positive denominator): .satisfies(''c24 = 0 OR
        c25 >= 0.5 * c24'', ''rate1_threshold_supported_by_counts'').'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 71
        end_line: 74
        file: ''
      uid: a0377d85-e64b-45f5-a2c9-14b9287cdfea
  '["c24","c25","c26"]':
    code: []
    assumptions:
    - text: 'For all rows with c24 > 0, the computed rate1 = c25 / c24 should be in
        [0, 1] without relying on clipping; equivalently, when c24 > 0 we require
        0 <= c25 <= c24. This can be expressed as a compliance constraint: c24 <=
        0 OR (c25 >= 0 AND c25 <= c24).'
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 44
        end_line: 45
        file: ''
      uid: b6b74eeb-4e72-4975-92dc-13dbce07239c
    - text: 'For rows where c24 == 0, c25 must be 0 (no positive numerator with a
        zero denominator), so that the intended fallback rate of 0 aligns with the
        data. Compliance example: c24 != 0 OR c25 = 0.'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      uid: 2f9a44cb-4a87-4e9c-857e-6326e648cbb2
    - text: 'The weighted score derived from c26 and the c25/c24 ratio should lie
        within [0, 1] for every record: 0 <= 0.65 * (c26/20.0) + 0.35 * (CASE WHEN
        c24 = 0 THEN 0 ELSE c25/c24 END) <= 1.'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 43
        end_line: 45
        file: ''
      - start_line: 47
        end_line: 47
        file: ''
      uid: ba80414d-26a1-436c-b863-f94bf0d484fe
    - text: 'Columns c24, c25, and c26 should be jointly complete (non-null) for all
        rows, since they are used directly in arithmetic without null handling (aside
        from the zero-denominator case). Compliance example: c24 IS NOT NULL AND c25
        IS NOT NULL AND c26 IS NOT NULL.'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      - start_line: 47
        end_line: 47
        file: ''
      uid: c1700454-25cf-469b-b4e5-99853b56bf98
  '["c28","c29"]':
    code: []
    assumptions:
    - text: 'c29 represents a denominator/opportunity count and c28 the corresponding
        numerator/success count. Therefore, for all rows where c29 > 0, c28 must satisfy
        0 <= c28 <= c29 so that the computed ratio c28/c29 is finite and within [0,1].
        Example Deequ constraint: .where(''c29 > 0'').satisfies(''c28 >= 0 AND c28
        <= c29'', ''c28 bounded by c29 when c29 > 0'')'
      sources:
      - start_line: 33
        end_line: 36
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      uid: 9c11fc53-3b2e-45ac-93c4-4057f1744db8
    - text: 'If c29 == 0 (no denominator), c28 should be 0 as well; otherwise the
        code will coerce the ratio to 0 and mask inconsistent data. Example Deequ
        constraint: .satisfies(''c29 != 0 OR c28 == 0'', ''zero c29 implies zero c28'')'
      sources:
      - start_line: 33
        end_line: 36
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      uid: 7ddada5e-3668-4d91-921e-1dd7118aa76c
  '["c30","c31"]':
    code: []
    assumptions:
    - text: 'Columns ''c31'' (numerator) and ''c30'' (denominator) represent a bounded
        rate: for every record, either (c30 = 0 and c31 = 0) or (c30 > 0 and 0 <=
        c31 <= c30). This ensures the computed rate2 = c31/c30 is well-defined and
        naturally within [0,1] without relying on NaN fill or clipping. Example Deequ
        constraint: .satisfies(''(c30 = 0 AND c31 = 0) OR (c30 > 0 AND c31 >= 0 AND
        c31 <= c30)'', ''c31_c30_rate_well_formed'')'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: 5f092011-c56a-404e-8c22-0dff0e484af5
    - text: 'Both ''c31'' and ''c30'' must be present (non-null) for every record
        so that the rate computation is meaningful and not silently driven by NaNs.
