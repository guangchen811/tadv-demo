    - text: "The term-2 weighted score score2 = 0.65*(c32/20) + 0.35*(c31/c30) is\
        \ expected to be in [0,1], implying a joint normalization: c32 is on a 0\u2013\
        20 scale and the rate c31/c30 is in [0,1]. Example Deequ constraint: .compliance(\"\
        score2_in_0_1\", \"0 <= 0.65*(c32/20.0) + 0.35*(CASE WHEN c30 = 0 THEN 0.0\
        \ ELSE c31/c30 END) AND 0.65*(c32/20.0) + 0.35*(CASE WHEN c30 = 0 THEN 0.0\
