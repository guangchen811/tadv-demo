  '["c16","c17","c19","c24","c25","c26","c30","c31","c32"]':
    code: []
    assumptions:
    - text: 'Rates computed from (c25, c24) and (c31, c30) represent achieved/possible
        counts per term and must already be valid without relying on clipping. Enforce:
        c24 >= 0 and c25 >= 0 and ((c24 = 0 and c25 = 0) or (c24 > 0 and c25 <= c24));
        and c30 >= 0 and c31 >= 0 and ((c30 = 0 and c31 = 0) or (c30 > 0 and c31 <=
        c30)). This prevents impossible ratios and avoids masking data issues via
        fillna/clip. Example Deequ compliances: .hasCompliance("rate1_valid", "(c24
        >= 0 AND c25 >= 0) AND ( (c24 = 0 AND c25 = 0) OR (c24 > 0 AND c25 <= c24)
        )").hasCompliance("rate2_valid", "(c30 >= 0 AND c31 >= 0) AND ( (c30 = 0 AND
        c31 = 0) OR (c30 > 0 AND c31 <= c30) )").'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: 18f66ef4-1018-4e71-8e99-0ce0ebb8cab0
    - text: 'c26 and c32 are raw term scores intended to be normalized to [0,1] by
        dividing by 20; both must lie within [0,20] to keep the normalized inputs
        bounded and comparable across terms. Example Deequ compliance: .hasCompliance("norm_terms_in_range",
        "(c26 >= 0 AND c26 <= 20) AND (c32 >= 0 AND c32 <= 20)").'
      sources:
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      - start_line: 71
        end_line: 74
        file: ''
      uid: d7a6cd52-cce7-460a-9b19-7a9aebd68ef4
    - text: 'Financial-status flags c16 and c17 are binary and mutually exclusive
        (exactly one is 1 per record). Enforce c16 in {0,1}, c17 in {0,1}, and c16
        + c17 = 1. This aligns with the use of (c17 == 1) & (c16 == 0) to define financial_ok.
        Example Deequ compliances: .isContainedIn("c16", ["0","1"]).isContainedIn("c17",
        ["0","1"]).hasCompliance("fin_flags_exclusive", "(c16 + c17) = 1").'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      - start_line: 68
        end_line: 68
        file: ''
      uid: c28e5a10-c759-49ed-a023-d452563344ca
    - text: 'For scholarship holders (c19 = 1), all inputs that drive renewal eligibility
        must be valid: financial_ok must hold (c17 = 1 and c16 = 0), term scores must
        be in range (0 <= c26 <= 20 and 0 <= c32 <= 20), and both term rates must
        be valid as in the rate constraints above. Conditional Deequ compliance example:
        .hasCompliance("sch_holder_inputs_valid", "CASE WHEN c19 = 1 THEN (c16 = 0
        AND c17 = 1 AND c26 BETWEEN 0 AND 20 AND c32 BETWEEN 0 AND 20 AND ((c24 =
        0 AND c25 = 0) OR (c24 > 0 AND c25 <= c24)) AND ((c30 = 0 AND c31 = 0) OR
        (c30 > 0 AND c31 <= c30))) ELSE true END").'
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 76
        end_line: 76
        file: ''
      - start_line: 43
        end_line: 45
