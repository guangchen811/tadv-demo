        consistent: c30 >= 0, c31 >= 0; when c30 > 0 then 0 <= c31/c30 <= 1 (i.e.,
        c31 <= c30); when c30 == 0 then c31 == 0. This ensures the computed rate2
        = c31/c30 is a valid proportion without relying on clipping. Example Deequ
        constraint: .compliance("c31_c30_valid", "c30 >= 0 AND c31 >= 0 AND ((c30
        = 0 AND c31 = 0) OR (c30 > 0 AND c31 <= c30))")'
