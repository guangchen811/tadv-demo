  '["c16","c17"]':
    code: []
    assumptions:
    - text: 'Both c16 (debtor flag) and c17 (fees up-to-date flag) are complete binary
        indicators with values only in {0,1}. They are safe to cast to integers and
        used in arithmetic such as (1 - c17). This can be captured with Deequ constraints
        like: .hasCompleteness(''c16'', 1.0), .hasCompleteness(''c17'', 1.0), and
        .satisfies(''(c16 IN (0,1)) AND (c17 IN (0,1))'', ''forall'').'
      sources:
      - start_line: 36
        end_line: 37
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: a6c3faad-e32f-44fc-a3b3-3e0b1cb31f7d
    - text: 'Scholarship discount applies only when the student is compliant (up-to-date).
        Therefore, whenever c19 == 1 (has scholarship), c17 must be 1 (fees up-to-date).
        Representable as a Deequ multi-column rule: .satisfies(''(c19 != 1) OR (c17
        == 1)'', ''forall'').'
      sources:
      - start_line: 71
        end_line: 74
        file: ''
      uid: 170f8c54-d505-4034-96df-10c8a6589585
    - text: 'Urgent fee outreach depends on the joint state of c16 and c17: if c16
        == 1 (debtor) and c17 == 0 (not up-to-date), then urgent_fee_flag must be
        1 regardless of the risk score. This can be enforced on the output frame with:
        .satisfies(''NOT ((c16 == 1) AND (c17 == 0)) OR (urgent_fee_flag == 1)'',
        ''forall'').'
      sources:
      - start_line: 161
        end_line: 166
        file: ''
      uid: 35292d50-ca74-454f-afeb-f614a14cd9a2
  '["c16","c17","c19"]':
    code: []
    assumptions:
    - text: 'c16, c17, and c19 are complete, binary indicator columns that must be
        castable to integers and restricted to the domain {0,1} simultaneously. This
        is required because the code performs arithmetic like (1 - c17) and uses these
        fields in additive risk formulas. Suggested constraint: satisfies("(c16 IN
        (0,1)) AND (c17 IN (0,1)) AND (c19 IN (0,1))", assertion=1.0).'
      sources:
      - start_line: 36
        end_line: 38
        file: ''
      - start_line: 69
        end_line: 74
        file: ''
      uid: 15deaf70-e406-4613-8d94-fdd908cbb8b6
    - text: 'Debtor status (c16) and fee up-to-date status (c17) are intended to be
        near-complements for most records; i.e., in the vast majority of rows, c16
        + c17 = 1. This aligns with using (1 - c17) alongside c16 and with the urgent
        flag rule keyed to (c16=1 and c17=0). Suggested constraint: satisfies("c16
        + c17 = 1", name="debtor_vs_up_to_date_complement", assertedFraction >= 0.90).'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: c1c63ab2-dc7e-413c-9432-508a641b4c35
    - text: 'Scholarship (c19=1) should coincide with being up-to-date on fees (c17=1)
        in most cases, because the scholarship bonus is only applied under that condition.
        The share of scholarship holders who are up-to-date should be high. Suggested
        constraint: satisfies("c17 = 1", where="c19 = 1", name="scholarship_implies_up_to_date",
        assertedFraction >= 0.85).'
      sources:
      - start_line: 74
        end_line: 74
        file: ''
      - start_line: 132
        end_line: 132
        file: ''
      uid: fab864c8-db24-4876-b8e8-07fd4c7f5d09
    - text: 'Rows with (c16=1 and c17=0) represent delinquent fee cases and must be
        consistently identifiable, as they trigger immediate outreach regardless of
        the score. The conditional relationship should hold in most debtor rows. Suggested
        constraint: satisfies("c17 = 0", where="c16 = 1", name="debtor_implies_not_up_to_date",
        assertedFraction >= 0.90).'
      sources:
      - start_line: 161
        end_line: 161
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: f2080a1e-3c19-46f5-a3e8-6eb3c092cbd0
  '["c17","c19"]':
    code: []
    assumptions:
    - text: 'Columns c17 and c19 are complete, numeric, and binary indicators sharing
        the same domain {0,1}. This is required because the code performs arithmetic
        with (1 - c17) and logical checks on both columns. We could represent this
        as a Deequ constraint like: check.areComplete([''c17'',''c19'']).satisfies(''c17
        IN (0,1) AND c19 IN (0,1)'', ''c17_c19_binary'', lambda c: c == 1.0).'
