      uid: 98772a5b-ef73-4b3e-98eb-95d938cd04d6
    - text: 'When c29 (the denominator) equals 0, c31 should be 0 (no approvals without
        evaluations). We could represent this as a Deequ constraint like: .satisfies("CASE
        WHEN c29 = 0 THEN c31 = 0 ELSE 1 END", "c31_zero_when_e2_zero", lambda x:
        x == 1) or a Great Expectations rule using a row condition: expect_column_values_to_be_in_set(column="c31",
