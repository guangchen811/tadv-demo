    assumptions:
    - text: 'The ''c29'' column must be present and numeric-parsable. Non-null values
        must successfully cast to a floating-point number; nulls are tolerated and
        handled downstream. We could represent this assumption as a deequ constraint
        like this: .satisfies("c29 IS NULL OR CAST(c29 AS DOUBLE) IS NOT NULL", "c29
        numeric or null", lambda x: x == 1)'
      sources:
      - start_line: 30
        end_line: 30
        file: ''
      - start_line: 107
        end_line: 107
        file: ''
      uid: 25a87ed1-b809-4224-9e8d-c18eb192d616
    - text: 'The ''c29'' column represents a count of units for 2nd semester and should
        be non-negative and integer-like. Zero values are allowed and are treated
        as missing in denominators during rate calculations. We could represent this
        with deequ constraints like: .satisfies("c29 IS NULL OR c29 >= 0", "c29 non-negative",
        lambda x: x == 1) and .satisfies("c29 IS NULL OR c29 = CAST(c29 AS INT)",
        "c29 integer-like", lambda x: x == 1)'
      sources:
      - start_line: 107
        end_line: 107
        file: ''
      - start_line: 111
        end_line: 111
        file: ''
      uid: aec62f91-5d4a-4a28-aa90-9a08ce743590
    - text: 'Denominator consistency: when computing rates a2/e2 and ne2/e2, the ''c29''
        value should be at least as large as the corresponding numerators. For every
        row with non-null c29, enforce c31 <= c29 and c33 <= c29 to keep ratios within
        [0,1] without relying on clipping. Deequ example: .satisfies("c29 IS NULL
        OR (c31 <= c29 AND c33 <= c29)", "numerators do not exceed c29", lambda x:
        x == 1)'
      sources:
      - start_line: 108
        end_line: 113
        file: ''
      uid: a0f119ac-b327-45fa-bc79-329a836ec9ef
    - text: 'Zero-denominator coherence: if ''c29'' equals 0 (no enrolled/evaluable
        units), then both c31 (approvals) and c33 (no-evaluations) should be 0 as
        well. This avoids inconsistent records where outcomes exist without any enrolled
        units. Deequ example: .satisfies("CASE WHEN c29 = 0 THEN CASE WHEN c31 = 0
        AND c33 = 0 THEN 1 ELSE 0 END ELSE 1 END", "zero-denominator consistency",
        lambda x: x == 1)'
      sources:
