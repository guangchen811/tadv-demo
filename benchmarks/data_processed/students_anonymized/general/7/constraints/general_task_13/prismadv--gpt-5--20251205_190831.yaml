  '["c22","c23"]':
    code: []
    assumptions:
    - text: "Counts used to compute first\u2011semester rates must be internally consistent:\
        \ approved (c25) and not_evaluated (c27) are non\u2011negative and cannot\
        \ exceed evaluations (c23). This prevents clipped ratios (a1/e1, ne1/e1) from\
        \ masking invalid data. In Deequ: .satisfies(\"c25 >= 0 AND c27 >= 0 AND c25\
        \ <= c23 AND c27 <= c23\", \"counts_within_evaluations\")"
      sources:
      - start_line: 96
        end_line: 102
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: d76b9792-130b-4d37-9968-6317338846d2
    - text: "When evaluations (c23) are zero, all dependent first\u2011semester counts\
        \ must also be zero: approved (c25) = 0, not_evaluated (c27) = 0, and credited/related\
        \ count (c22) = 0. Otherwise, the code\u2019s NaN\u21920 fallback would hide\
        \ impossible positive numerators with a zero denominator. In Deequ: .satisfies(\"\
        (c23 = 0 AND c25 = 0 AND c27 = 0 AND c22 = 0) OR (c23 > 0)\", \"no_positive_counts_when_zero_evaluations\"\
        )"
      sources:
      - start_line: 96
        end_line: 102
        file: ''
      uid: a2a16c79-8c6e-4894-8d37-5793f1ae2885
    - text: "Credited/related first\u2011semester count (c22) should only be positive\
        \ when evaluations (c23) are positive: if c22 > 0 then c23 > 0. This enforces\
        \ basic consistency between related semester counts. In Deequ: .satisfies(\"\
        (c22 <= 0) OR (c23 > 0)\", \"credited_implies_evaluations\")"
      sources:
      - start_line: 96
        end_line: 98
        file: ''
      - start_line: 100
        end_line: 102
        file: ''
      uid: a3c1b6f6-5196-4112-8a88-faa52c68d2d2
  '["c22","c23","c25","c27"]':
    code: []
    assumptions:
    - text: 'First-semester counts are coherent: c23 (enrolled) is the denominator
        for both c25 (approved) and c27 (without evaluations). For every record: if
        c23 > 0 then 0 <= c25 <= c23 and 0 <= c27 <= c23; if c23 = 0 then c25 = 0
        and c27 = 0. This ensures the derived proportions (c25/c23 and c27/c23) are
        true rates in [0,1] without relying on clipping/fillna. Deequ-style constraint:
        Compliance(''enrolled_bounds_1st'', ''(c23 > 0 AND c25 >= 0 AND c25 <= c23
        AND c27 >= 0 AND c27 <= c23) OR (c23 = 0 AND c25 = 0 AND c27 = 0)'')'
      sources:
      - start_line: 24
        end_line: 27
        file: ''
      - start_line: 96
        end_line: 102
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: b8d8d016-950f-49fd-bcea-8c5aa7c25304
    - text: 'Mass conservation for first-semester outcome components: the sum of approved
        and without evaluations cannot exceed enrolled. For each record, c25 + c27
        <= c23; when c23 = 0, both c25 and c27 must be 0. Deequ-style constraint:
        Compliance(''components_le_enrolled_1st'', ''(c25 + c27) <= c23 AND NOT (c23
        = 0 AND (c25 <> 0 OR c27 <> 0))'')'
      sources:
      - start_line: 24
        end_line: 27
        file: ''
      - start_line: 96
        end_line: 102
        file: ''
      uid: 88b1871f-0cbf-44fc-b563-d4cc1c9e8022
    - text: 'Credits vs. enrollment consistency (1st semester): credited units c22
        must not exceed enrolled units c23, and cannot be negative. If c23 = 0 then
        c22 must be 0. Deequ-style constraint: Compliance(''credits_le_enrolled_1st'',
        ''(c23 > 0 AND c22 >= 0 AND c22 <= c23) OR (c23 = 0 AND c22 = 0)'')'
      sources:
      - start_line: 24
        end_line: 27
        file: ''
      - start_line: 96
        end_line: 99
        file: ''
      uid: 69a18320-7be7-43f3-acfa-ad7c83eec285
  '["c23","c25"]':
    code: []
    assumptions:
    - text: 'For each row with c23 > 0, the proportion c25/c23 must lie in [0, 1].
        Practically, c25 must satisfy 0 <= c25 <= c23. This can be enforced as a Deequ
        compliance constraint such as: Compliance(''c25_within_c23'', ''c23 > 0 =>
        (c25 >= 0 AND c25 <= c23)'').'
      sources:
      - start_line: 96
        end_line: 101
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 3e58735f-4493-452e-88a3-a625ea1f3023
    - text: 'If c23 == 0 (no evaluations/denominator), then c25 must be 0 (no approvals).
        This avoids undefined ratios being silently coerced to 0 by the fillna and
        preserves semantic consistency. Deequ example: Compliance(''no_approvals_when_no_evals'',
        ''CASE WHEN c23 = 0 THEN c25 = 0 ELSE true END'').'
      sources:
      - start_line: 100
        end_line: 101
        file: ''
      uid: 3918bb6c-28bb-417d-9187-3548dc4e6e10
    - text: 'The counts that share c23 as a common denominator should not jointly
        exceed it: c25 + c27 <= c23 and both c25, c27 are non-negative. This reflects
        that both rates (c25/c23 and c27/c23) are bounded by 1 and their sum cannot
        exceed 1. Deequ example: Compliance(''approved_plus_noeval_le_eval'', ''c25
        >= 0 AND c27 >= 0 AND c25 + c27 <= c23'').'
      sources:
      - start_line: 96
        end_line: 102
        file: ''
      - start_line: 121
        end_line: 122
        file: ''
      uid: 29e71501-5351-4cb8-895a-4ac5565b2856
  '["c23","c25","c27"]':
    code: []
    assumptions:
    - text: 'Counts consistency across c23 (e1), c25 (a1), and c27 (ne1): For each
        row, these three columns represent counts of the same unit and must be non-negative
        integers with c25 <= c23 and c27 <= c23. This ensures the derived rates a1/e1
        and ne1/e1 are naturally within [0,1] without relying on clipping. Suggested
        Deequ constraints: .satisfies(''c23 >= 0 AND c25 >= 0 AND c27 >= 0'', ''non_negative_counts''),
        .satisfies(''c25 <= c23 AND c27 <= c23'', ''numerators_not_exceeding_denominator'').'
      sources:
      - start_line: 24
        end_line: 27
        file: ''
      - start_line: 96
        end_line: 102
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 56fc1d57-3b78-4605-9063-4beb3a5d3121
    - text: 'Zero-denominator coherence: If c23 (e1) is zero, then both c25 (a1) and
        c27 (ne1) must be zero. This aligns with replacing e1==0 by NaN for division
        and later filling NaNs with 0.0, implying that when there are zero evaluations,
        the success and no-evaluation counts cannot be positive. Suggested Deequ constraint:
        .satisfies(''CASE WHEN c23 = 0 THEN (c25 = 0 AND c27 = 0) ELSE true END'',
        ''zero_denominator_implies_zero_numerators'').'
      sources:
      - start_line: 24
        end_line: 27
        file: ''
      - start_line: 100
        end_line: 102
        file: ''
      uid: eff21d0f-37bc-469e-bc3c-d8425a188f13
    - text: 'Mutual feasibility of partial counts: The combined counts of c25 (a1)
        and c27 (ne1) must not exceed c23 (e1), i.e., c25 + c27 <= c23. This ensures
        that the two partials correspond to disjoint subsets that are bounded by the
        same total, preventing inflated rates even after clipping. Suggested Deequ
        constraint: .satisfies(''c25 + c27 <= c23'', ''partials_do_not_exceed_total'').'
      sources:
      - start_line: 24
        end_line: 27
        file: ''
      - start_line: 96
        end_line: 102
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: e5758f57-96f4-4d45-a092-b2f95cef95e3
  '["c23","c25","c27","c29","c31","c33"]':
    code: []
    assumptions:
    - text: '1st-semester evaluation counts are coherent by row: c25 and c27 are component
        counts bounded by the total evaluations c23. Specifically: for rows with c23
        > 0, 0 <= c25 <= c23 and 0 <= c27 <= c23; for rows with c23 == 0, c25 == 0
        and c27 == 0. This ensures the computed rates (c25/c23 and c27/c23) stay within
        [0,1] without relying on clipping/fillna. Example Deequ compliance: hasCompliance("(c23
        > 0 AND c25 BETWEEN 0 AND c23 AND c27 BETWEEN 0 AND c23) OR (c23 = 0 AND c25
        = 0 AND c27 = 0)").'
      sources:
      - start_line: 96
        end_line: 102
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 3bdae3d1-2d4f-4cbf-9ce2-c72a28d6a84c
    - text: '2nd-semester evaluation counts are coherent by row: c31 and c33 are component
        counts bounded by the total evaluations c29. Specifically: for rows with c29
        > 0, 0 <= c31 <= c29 and 0 <= c33 <= c29; for rows with c29 == 0, c31 == 0
        and c33 == 0. This keeps the derived rates (c31/c29 and c33/c29) within [0,1]
        without relying on clipping/fillna. Example Deequ compliance: hasCompliance("(c29
        > 0 AND c31 BETWEEN 0 AND c29 AND c33 BETWEEN 0 AND c29) OR (c29 = 0 AND c31
        = 0 AND c33 = 0)").'
      sources:
      - start_line: 107
        end_line: 113
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: fcc60c5a-caca-45c3-bef0-2964e19a3eab
    - text: '1st-semester component-count sum does not exceed the total: c25 + c27
        <= c23 for every row. This guards against component counts exceeding the total
        when computing c25/c23 and c27/c23. Example Deequ compliance: hasCompliance("c25
        + c27 <= c23").'
      sources:
      - start_line: 96
        end_line: 102
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 54ae0a68-f6d2-4da4-a50a-3099027aefc8
    - text: '2nd-semester component-count sum does not exceed the total: c31 + c33
        <= c29 for every row. This guards against component counts exceeding the total
        when computing c31/c29 and c33/c29. Example Deequ compliance: hasCompliance("c31
        + c33 <= c29").'
      sources:
      - start_line: 107
        end_line: 113
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 033fd226-54fb-4614-b56a-729b7e42ad11
  '["c23","c27"]':
    code: []
    assumptions:
    - text: 'Counts consistency (semester 1): ''c23'' is used as the denominator for
        rates, while ''c27'' (no-evaluations) and ''c25'' (approvals) serve as numerators.
        Therefore, per record: c23, c27, and c25 are non-negative, and c27 <= c23
        and c25 <= c23. Example Deequ: .hasSatisfyingRows("c23 >= 0 AND c27 >= 0 AND
        c25 >= 0 AND c27 <= c23 AND c25 <= c23", 1.0)'
      sources:
      - start_line: 96
        end_line: 102
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 48a61ff0-01f8-4173-a5a8-f0c8422b9157
    - text: 'Zero-denominator rule: If c23 == 0 (no evaluations), then both c27 and
        c25 must be 0 (no no-evaluations or approvals can occur without evaluations).
        Example Deequ: .hasSatisfyingRows("CASE WHEN c23 = 0 THEN (c27 = 0 AND c25
        = 0) ELSE TRUE END", 1.0)'
      sources:
      - start_line: 100
        end_line: 102
        file: ''
      uid: cd81eeab-9b76-40de-8a8f-71733030e948
    - text: 'Disjoint outcomes bound: No-evaluations and approvals are mutually exclusive
        outcomes relative to the same denominator, so c25 + c27 must not exceed c23.
        Example Deequ: .hasSatisfyingRows("c25 + c27 <= c23", 1.0)'
      sources:
      - start_line: 96
        end_line: 102
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 11471225-819a-4a5c-a5f6-5c16fba3625d
  '["c26","c32"]':
    code: []
    assumptions:
    - text: "Columns 'c26' and 'c32' are numeric grades measured on the same 0\u2013\
        20 scale for every record. This is implied by converting both to float and\
        \ transforming them via (20 - grade) / 20 to produce components in [0,1].\
        \ We could validate this with a multi-column constraint such as: .satisfies(\"\
        c26 >= 0 AND c26 <= 20 AND c32 >= 0 AND c32 <= 20\", \"grades_in_0_20_range\"\
        )."
      sources:
      - start_line: 28
        end_line: 28
        file: ''
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 95
        end_line: 95
        file: ''
      - start_line: 103
        end_line: 103
        file: ''
      - start_line: 106
        end_line: 106
        file: ''
      - start_line: 114
        end_line: 114
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 0f42411c-8eab-4117-91cb-ba3cc6c92b73
    - text: 'Both ''c26'' and ''c32'' must be simultaneously present (non-null) and
        parsable as numeric for all rows, since they are cast to float and used in
        arithmetic without null handling. This can be enforced as a joint completeness
        check: .satisfies("c26 IS NOT NULL AND c32 IS NOT NULL", "both_grades_present").'
      sources:
      - start_line: 95
        end_line: 95
        file: ''
      - start_line: 106
        end_line: 106
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: a8fd93e9-18b4-48d2-9f9f-e2fb435f6079
  '["c28","c29"]':
    code: []
    assumptions:
    - text: 'Second-semester approved and not-evaluated counts must be bounded by
        the total second-semester enrolled/evaluated count: enforce 0 <= c31 <= c29
        and 0 <= c33 <= c29. This ensures the derived rates a2/e2 and ne2/e2 are naturally
        in [0,1] without relying on clipping.'
      sources:
      - start_line: 107
        end_line: 113
        file: ''
      uid: 8fc89241-f751-40ce-8eaf-f9bc59274c6e
    - text: 'Zero-enrollment rows must not show approvals or no-evaluations: if c29
        == 0 then c31 == 0 and c33 == 0. Conversely, any row with c31 > 0 or c33 >
        0 must have c29 > 0.'
      sources:
      - start_line: 107
        end_line: 113
        file: ''
      uid: 26858759-c842-4799-b059-3743c399c180
    - text: 'Second-semester credited/related count c28 should be a non-negative integer
        that does not exceed the total second-semester enrolled/evaluated count c29:
        enforce 0 <= c28 <= c29.'
      sources:
      - start_line: 107
        end_line: 109
        file: ''
      uid: 88cbe099-8280-447f-9679-90ed09e66a03
  '["c28","c29","c31","c33"]':
    code: []
    assumptions:
    - text: "For second\u2011semester metrics, when 'c29' (e2) > 0, both 'c31' (a2)\
        \ and 'c33' (ne2) are bounded by the denominator: 0 <= c31 <= c29 and 0 <=\
        \ c33 <= c29. Basis: the code forms rates a2/e2 and ne2/e2 and clips them\
        \ to [0,1], implying numerators should not exceed the denominator when the\
        \ denominator is positive. Deequ example: .where(\"c29 > 0\").satisfies(\"\
        c31 >= 0 AND c31 <= c29 AND c33 >= 0 AND c33 <= c29\", \"a2_ne2_bounded_by_e2_when_positive\"\
        )"
      sources:
      - start_line: 107
        end_line: 113
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 9d611951-e827-401c-adeb-555be0a3fea3
    - text: "Across all rows, the combined count of 'c31' (a2) and 'c33' (ne2) should\
        \ not exceed 'c29' (e2): c31 + c33 <= c29. This keeps the two components from\
        \ over\u2011counting beyond the total used as the denominator for both ratios.\
        \ Deequ example: .satisfies(\"c31 + c33 <= c29\", \"a2_plus_ne2_le_e2\")"
      sources:
      - start_line: 107
        end_line: 113
        file: ''
      uid: b24edbf4-eba3-44df-806a-cb0b6def9282
    - text: 'If ''c29'' (e2) == 0, then both numerators are structural zeros: c31
        == 0 AND c33 == 0. Rationale: the code replaces zero denominators with NaN
        and then fillna(0) on the derived ratios; consistency requires the underlying
        counts to be zero when no evaluations exist. Deequ example: .satisfies("(c29
        = 0) => (c31 = 0 AND c33 = 0)", "no_numerators_when_denominator_zero")'
      sources:
      - start_line: 111
        end_line: 113
        file: ''
      uid: b1dbb804-3e98-493a-85be-5adbfbe33b0e
    - text: 'If either numerator is positive, the denominator must be positive: (c31
        > 0 OR c33 > 0) => c29 > 0. This avoids undefined or masked ratios when numerators
        exist but the denominator is zero. Deequ example: .satisfies("(c31 > 0 OR
        c33 > 0) => (c29 > 0)", "positive_numerator_requires_positive_denominator")'
      sources:
      - start_line: 111
        end_line: 113
        file: ''
      uid: 69b0e242-973a-4807-8e0c-5250cea83516
    - text: "Within the second\u2011semester metric group, 'c28' (cr2) should not\
        \ exceed the total used as denominator 'c29' (e2): c28 <= c29; and when c29\
        \ == 0 then c28 == 0. This keeps the related count aligned with the total\
        \ volume that anchors a2 and ne2. Deequ examples: .satisfies(\"c28 <= c29\"\
        , \"cr2_le_e2\") and .satisfies(\"(c29 = 0) => (c28 = 0)\", \"cr2_zero_when_e2_zero\"\
        )"
      sources:
      - start_line: 105
        end_line: 110
        file: ''
      uid: 4c00fbb9-9c58-4e01-ac87-3d2f59d4b7cf
  '["c29","c31"]':
    code: []
    assumptions:
    - text: 'c31 (2nd-sem approved units) must be a subset of c29 (2nd-sem enrolled
        units): both are non-negative counts and for every row 0 <= c31 <= c29. Additionally,
        there cannot be approvals without enrollment (if c29 = 0 then c31 = 0). This
        ensures the derived rate2 = c31 / c29 is well-defined and in [0,1] without
        relying on clipping/fillna. Example Deequ constraints: .satisfies(''c31 >=
        0 AND c29 >= 0 AND c31 <= c29'', ''approved_not_exceed_enrolled'') and .satisfies(''CASE
        WHEN c29 = 0 THEN c31 = 0 ELSE TRUE END'', ''no_approvals_without_enrollment'').'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 107
        end_line: 113
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: e27a674a-b8cb-45f4-b42c-e5387ae8f2cf
    - text: 'If all enrolled units are approved in 2nd semester (c31 = c29 > 0), then
        the 2nd-sem ''not evaluated'' count (c33) must be zero; equivalently, if c33
        > 0 then c31 < c29. This keeps rate2 = c31/c29 and ratio2 = c33/c29 logically
        consistent. Example Deequ constraint: .satisfies(''CASE WHEN c29 = c31 AND
        c29 > 0 THEN c33 = 0 ELSE TRUE END'', ''no_not_evaluated_when_all_approved'').'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 110
        end_line: 113
        file: ''
      uid: d95f0b0c-7ff8-451f-a028-ad841adad3b7
  '["c29","c31","c33"]':
    code: []
    assumptions:
    - text: "Second\u2011semester approved counts (c31) and no\u2011evaluation counts\
        \ (c33) are bounded by the second\u2011semester total evaluations (c29) for\
        \ each record. In other words, c31 <= c29 and c33 <= c29. We could represent\
        \ this as a Deequ constraint like: .forAllRows(\"c31 <= c29 and c33 <= c29\"\
        )."
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 107
        end_line: 113
        file: ''
      uid: f0b6c7e2-3b87-42b3-9473-ea6f2a750a0a
    - text: "If the total evaluations for the second semester is zero (c29 == 0),\
        \ then both approved (c31) and no\u2011evaluation (c33) counts must be zero\
        \ for that record. This prevents logically inconsistent states (e.g., approvals\
        \ with zero evaluations) that are currently masked by replacing 0 denominators\
        \ with NaN and filling with 0. We could represent this as a Deequ constraint\
        \ like: .forAllRows(\"(c29 != 0) or (c31 == 0 and c33 == 0)\")."
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 111
        end_line: 113
        file: ''
      uid: 767c4f7e-2f70-4f04-a01c-5dee216832b8
    - text: "When the denominator is positive (c29 > 0), the derived second\u2011\
        semester rates must be valid proportions: c31 / c29 <= 1.0 and c33 / c29 <=\
        \ 1.0. This follows from the expectation that both are sub\u2011counts of\
        \ the same total. We could represent this as a Deequ constraint like: .forAllRows(\"\
        (c29 <= 0) or ((c31 / c29) <= 1.0 and (c33 / c29) <= 1.0)\")."
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 107
        end_line: 113
        file: ''
      uid: 3e21d808-d02a-41a4-98d7-51bf8ecfa04c
    - text: "The combined second\u2011semester sub\u2011counts do not exceed the total:\
        \ approved plus no\u2011evaluation is at most total evaluations, i.e., c31\
        \ + c33 <= c29. This enforces cross\u2011category consistency for counts derived\
        \ from the same term. We could represent this as a Deequ constraint like:\
        \ .forAllRows(\"c31 + c33 <= c29\")."
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 107
        end_line: 113
        file: ''
      uid: 29d7a9f7-6045-44b1-9559-09157c704069
  '["c29","c33"]':
    code: []
    assumptions:
    - text: 'Non-negativity and dominance: The 2nd-semester ''no evaluations'' count
        (c33) must be between 0 and the total evaluations count (c29) for every row
        (0 <= c33 <= c29). This ensures the computed ratio c33/c29 is naturally within
        [0,1] without relying on clipping. Example Deequ: Compliance(''c33_leq_c29_and_nonneg'',
        ''c29 >= 0 AND c33 >= 0 AND c33 <= c29'').'
      sources:
      - start_line: 107
        end_line: 113
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: a90cc010-df0a-4bd2-b3e0-5340d0080b6f
    - text: 'Zero-denominator consistency: If the 2nd-semester evaluations count (c29)
        is zero, then ''no evaluations'' (c33) must also be zero; equivalently, any
        row with c33 > 0 must have c29 > 0. This prevents undefined or misleading
        ratios when e2 is replaced with NaN for zeros. Example Deequ: Compliance(''zero_e2_implies_zero_ne2'',
        ''NOT (c29 = 0 AND c33 > 0)'').'
      sources:
      - start_line: 111
        end_line: 113
        file: ''
      uid: 1c9c44e4-16c1-42e0-881a-0dcb05d77b3f
    - text: 'Sparsity of no-evaluations relative to evaluations: Among rows with a
        positive evaluations count (c29 > 0), at least 90% should have c33 = 0. This
        aligns with the later sqrt-based scaling that assumes very sparse ''no evaluations''
        and avoids taking the square root of a negative number. Example Deequ: where(''c29
        > 0'').hasCompliance(''ne2_zero_given_e2_positive'', ''c33 = 0'', lowerBound=0.90).'
      sources:
      - start_line: 107
        end_line: 107
        file: ''
      - start_line: 117
        end_line: 118
        file: ''
      - start_line: 135
        end_line: 135
        file: ''
      uid: c21a71a0-5bfb-4417-9207-d6afcdaa9580
  '["c3","c5"]':
    code: []
    assumptions:
    - text: 'Both c5 (attendance) and c3 (application order) must be present (non-null)
        for every row because they are used directly in arithmetic, in dataset-level
        scaling that mixes both columns (risk5), and are exported together. This can
        be enforced as a multi-column completeness constraint such as: .satisfies(''c5
        IS NOT NULL AND c3 IS NOT NULL'', ''=='', 1.0).'
      sources:
      - start_line: 54
        end_line: 57
        file: ''
      - start_line: 60
        end_line: 66
        file: ''
      - start_line: 126
        end_line: 129
        file: ''
      - start_line: 163
        end_line: 166
        file: ''
      uid: 3ad6aa0a-36b4-4ad2-824d-bfcdeb9a82a9
    - text: 'Joint domain assumption: c5 is a binary indicator in {0,1} and c3 is
        an integer application-rank that should mostly fall within [1,6]. The code
        treats c3=1 specially and normalizes (c3-1)/5.0, which assumes c3 in 1..6
        for the vast majority of rows; values beyond 6 are tolerated only as rare
        outliers. Enforce a combined predicate with high compliance, for example:
        .satisfies(''(c5 IN (0,1)) AND (c3 >= 1 AND c3 <= 6)'', ''>='', 0.95).'
      sources:
      - start_line: 54
        end_line: 57
        file: ''
      - start_line: 60
        end_line: 66
        file: ''
      - start_line: 126
        end_line: 126
        file: ''
      - start_line: 129
        end_line: 129
        file: ''
      - start_line: 163
        end_line: 166
        file: ''
      uid: efb26aae-50e9-482d-a945-89db79fe5b64
    - text: 'Cross-column scaling assumption for risk5 and risk4: since risk5 multiplies
        (1 - c5) by a factor derived from the dataset-level share of c3==1, and risk4
        uses a factor derived from the share of c3 in [1..6], the following dataset-level
        conditions must hold to avoid invalid sqrt() inputs and NaNs: share(c3 ==
        1) >= 0.60 and share(c3 IN [1..6]) >= 0.95. These can be expressed as compliance
        constraints such as: .hasCompliance(''c3_eq_1_share'', ''c3 = 1'', greaterThanOrEqualTo
        = 0.60) and .hasCompliance(''c3_in_1_to_6_share'', ''c3 >= 1 AND c3 <= 6'',
        greaterThanOrEqualTo = 0.95).'
      sources:
      - start_line: 60
        end_line: 66
        file: ''
      - start_line: 126
