        end_line: 113
        file: ''
      uid: 11478311-117c-4794-964b-7328f0c79daa
    - text: 'For rows where c29 > 0, c31 should be at most c29 (the approval count
        cannot exceed the number of evaluations) and at least 0. We could represent
        this as a Deequ constraint like: .satisfies("CASE WHEN c29 > 0 THEN (c31 >=
        0 AND c31 <= c29) ELSE 1 END", "c31_within_denominator", lambda x: x >= 0.99)
