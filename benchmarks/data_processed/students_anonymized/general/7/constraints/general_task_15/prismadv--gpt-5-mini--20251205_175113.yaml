        end_line: 61
        file: ''
      uid: 22812549-af34-4ba0-b730-0d8b5f48af5b
    - text: 'First-semester rate calculations use c23 as the denominator and c25,
        c27, c24 as numerators (rate1, rate2, rate3). These columns must be non-negative
        integers and, for rows with c23 > 0, each numerator must be <= c23 (so computed
        rates fall in [0,1] or 1 - numerator/denom in [0,1]). Actionable constraints:
        rows satisfy c23 >= 0; c25 >= 0; c27 >= 0; c24 >= 0; and when c23 > 0 then
        c25 <= c23, c27 <= c23, c24 <= c23. Example checks: .isNonNegative(["c23","c25","c27","c24"])
        plus row-level comparisons c25 <= c23 etc.'
      sources:
      - start_line: 39
        end_line: 65
        file: ''
      uid: 2dcc1a8c-8d73-4694-b606-5c9eb0720e8d
    - text: 'Second-semester rate calculations use c29 as the denominator and c31,
        c33, c30 as numerators (rate4, rate5, rate6). These columns must be non-negative
        integers and, for rows with c29 > 0, each numerator must be <= c29 (so rates
        are in [0,1]). Actionable constraints: c29 >= 0; c31 >= 0; c33 >= 0; c30 >=
        0; and when c29 > 0 then c31 <= c29, c33 <= c29, c30 <= c29.'
      sources:
      - start_line: 46
        end_line: 69
        file: ''
      uid: 55b2e02a-d691-4ddc-a7bd-f7a638e2c295
    - text: 'The financial-risk computation combines c16, c17 and c19 (risk1). All
        three columns are used as binary indicators in arithmetic ((c16==1) + (c17==0)*0.5
        - (c19==1)*0.5). They must therefore be integer-coded {0,1} and non-null so
        the arithmetic yields expected values. Actionable constraints: each of c16,
        c17, c19 is contained in {0,1} and has no nulls, e.g. .isContainedIn("c16",
        [0,1]) etc and .hasNoNulls(["c16","c17","c19"]).'
      sources:
      - start_line: 32
        end_line: 76
        file: ''
      uid: f30674da-812f-4852-bed5-58d37e8ee97a
    - text: 'Mask for ''first_choice'' is computed as (c3 == 1). c3 is therefore expected
        to be an integer categorical/ordinal column where value 1 denotes first choice.
        At minimum, c3 must be integer-typed and non-null; where business logic requires
        it, ensure that value 1 is present to mark first choices. Actionable constraints:
        .hasNoNulls(["c3"]) and .isIntegral("c3"); optionally assert .isContainedIn("c3",
        allowed_set) depending on allowed categories.'
      sources:
      - start_line: 31
        end_line: 78
        file: ''
      uid: 408b0dd6-34ae-46a1-9854-63125b8ee197
    - text: 'The model DataFrame (df2) and the target mapping (v2 -> list2) are used
        together for training. Therefore every row used for modeling must have no
        nulls across all feature columns assembled into df2 AND a valid target in
        the set {"Graduate","Enrolled","Dropout"}. Actionable, multi-column constraints:
        .hasNoNulls([...list of feature columns...]) where features are c13,c7 (grade_scaled,
        prevq_scaled), the attendance column (v1, default c5), c20,c34,c35,c36,c21,c14,c18,c16,c17,c19
        plus any other df2 columns; plus .isContainedIn(v2, ["Graduate","Enrolled","Dropout"])
        and .hasNoNulls([v2]). This ensures X_train and y_train have matching, complete
        rows.'
      sources:
      - start_line: 86
        end_line: 115
        file: ''
      uid: dd8cc876-ed4c-4277-ae3c-f77e0847a090
    - text: 'The script computes a dropout-based threshold using the relative frequency
        of ''Dropout'' in the target column (val5 = val4.get(''Dropout'',0.0)). For
        a meaningful threshold and downstream selection of intervention_queue rows,
        the target column (v2) should contain the ''Dropout'' label (i.e., at least
        some rows with that class). Actionable constraint: the fraction of rows where
        v2 == ''Dropout'' should be > 0 (or alert/handle if zero). Implementable check:
        proportion(v2 == ''Dropout'') > 0.'
      sources:
