    assumptions:
    - text: 'c13 and c7 represent raw scores that are scaled by dividing by 200.0
        (val1,val2). Therefore both columns must be numeric, non-null, and lie in
        the range [0, 200] for rows intended for modeling. Actionable constraints
        (Deequ-style): ensure no nulls across both columns, ensure values are between
        0 and 200, and ensure type is numeric, e.g. .hasNoNulls(["c13","c7"]), .isNonNegative("c13"),
        .isNonNegative("c7"), and row-wise constraints like c13 <= 200 and c7 <= 200.'
