        written with both 'risk_score' and 'c37' (as v17) included as columns, along
        with other features. This assumes that the combination of these columns uniquely
        identifies the risk status for each student, and that there are no duplicate
        rows for the same combination of 'risk_score' and 'c37' in the output. In
        Deequ, this can be represented as a uniqueness constraint on the combination
        of 'student_row_id', 'risk_score', and 'c37'.
