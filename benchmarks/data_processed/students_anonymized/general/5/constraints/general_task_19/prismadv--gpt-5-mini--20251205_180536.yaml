  '["c24","c25","c26"]':
    code: []
    assumptions:
    - text: 'c25 (v3) is used as a numerator and c24 (v2) as its denominator to compute
        a rate (rate1 = c25 / c24). The code treats zero denominators by converting
        them to NaN then filling the resulting rate with 0.0. For correctness the
        data should satisfy:

        - c24 >= 0 and c25 >= 0 (non-negative counts/amounts).

        - c25 <= c24 for all rows (numerator should not exceed its denominator).

        - If c24 == 0 then c25 == 0 (avoid silently treating a positive numerator
        as rate 0 when denominator is zero).

        Possible Deequ-style constraints:

        - .satisfies("c24 >= 0 AND c25 >= 0", "non_negative_c24_c25")

        - .satisfies("c25 <= c24", "c25_leq_c24")

        - .satisfies("c24 != 0 OR c25 = 0", "zero_denom_implies_zero_num")'
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 44
        end_line: 45
        file: ''
      uid: b8cee172-e7fe-40b9-b352-ea90d9b66612
    - text: 'c26 (v6) is normalized by dividing by 20.0 (norm1 = c26 / 20.0) and later
        compared against thresholds such as 0.60. This implies c26 is expected to
        be within the range [0, 20] and non-null so that the normalized value lies
        in [0.0, 1.0].

        Possible Deequ-style constraints:

        - .isComplete(["c26"]) or .satisfies("c26 IS NOT NULL", "c26_not_null")

        - .satisfies("c26 >= 0 AND c26 <= 20", "c26_in_0_20")

        - .satisfies("c26/20.0 >= 0 AND c26/20.0 <= 1", "norm1_in_0_1")'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 43
        end_line: 47
        file: ''
      - start_line: 71
        end_line: 73
        file: ''
      uid: 40524743-aa2e-4353-a872-a76c3dc8fd53
    - text: 'The scholarship-eligibility mask (mask3) uses both norm1 (c26/20) and
        rate1 (c25/c24) and expects both to be interpretable on the same [0,1] scale
        before applying thresholds (norm1 >= 0.60 and rate1 >= 0.50). Therefore the
        pair-wise relationship should hold per row:

        - norm1 in [0,1] (i.e., 0 <= c26 <= 20)

        - rate1 in [0,1] (i.e., 0 <= c25/c24 <= 1, except rows with c24==0 handled
        explicitly)

        A compact constraint to check both at once (allowing c24==0 treated as rate
        0) could be:

        - .satisfies("(c26 >= 0 AND c26 <= 20) AND (c24 = 0 OR (c25 >= 0 AND c25 <=
        c24))", "rates_and_norm_consistent")'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      - start_line: 71
        end_line: 74
        file: ''
      uid: 5d310ee8-5f28-4aa7-a707-4d635192d764
