  '["c16","c17","c19","c24","c25","c26","c30","c31","c32"]':
    code: []
    assumptions:
    - text: 'For rows where c24 > 0, the numerator c25 should be non-negative and
        not exceed the denominator c24 (i.e., 0 <= c25 <= c24). This ensures rate1
        = c25 / c24 is in [0,1] before the subsequent fillna/clip. Actionable check:
        for rows filtered by c24 > 0 assert c25 >= 0 and c25 <= c24 (or that c25/c24
        <= 1).'
