    assumptions:
    - text: 'The input column c31 contains no nulls (complete). The code uses df[''c31'']
        directly as a numerator when computing a rate (df[''c31''] / df[''c30''])
        and later relies on that rate for scoring and thresholding. While the code
        replaces zero denominators and later fills NaNs on the derived rate, the downstream
        logic expects numeric values for c31. Example Deequ-style check:

        .satisfies("CASE WHEN `c31` IS NOT NULL THEN 1 ELSE 0 END", "c31_non_null",
        lambda x: x == 1)'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: fdad3f10-eb13-4bea-b4dd-4b554a01725a
    - text: 'Values in c31 are integral and non-negative. c31 is used as a count/numerator
        when computing a ratio (rate2 = c31 / c30) and later used in comparisons that
        assume proportions in [0,1]. Therefore c31 should be an integer >= 0. Example
        Deequ-style checks:

        .satisfies("CASE WHEN `c31` >= 0 THEN 1 ELSE 0 END", "c31_non_negative", lambda
        x: x == 1)

        .satisfies("CASE WHEN cast(`c31` AS BIGINT) = `c31` THEN 1 ELSE 0 END", "c31_integer",
        lambda x: x == 1)'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 50
        end_line: 55
        file: ''
      - start_line: 71
        end_line: 74
        file: ''
      uid: 1eddd832-bf63-4253-9a02-43f80fe21df1
    - text: 'c31 should be less than or equal to c30 when the denominator c30 is positive,
        so that the derived rate (c31/c30) is in the expected [0,1] range without
        relying solely on clipping. The downstream policy check (mask3) treats rate2
        >= 0.50 as meaningful, so preserving the natural proportion semantics is important.
        Example Deequ-style check:

        .satisfies("CASE WHEN `c30` > 0 AND `c31` <= `c30` THEN 1 ELSE 0 END", "c31_le_c30_when_c30_pos",
        lambda x: x >= 0.95)'
      sources:
