        end_line: 51
        file: ''
      uid: 87eb07d7-1a7c-47f2-bdcb-37129703d231
    - text: 'The score-normalization inputs c26 and c32 are expected to be in the
        range [0, 20] so that norm1 = c26/20 and norm2 = c32/20 produce values in
        [0,1]. Actionable checks: 0 <= c26 <= 20 and 0 <= c32 <= 20.'
      sources:
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      uid: a8dd9caa-0eab-49d1-a97c-d4bfb647a130
    - text: 'Columns c16 and c17 are used as binary flags in mask logic and therefore
        should contain only the values 0 or 1 (no other categories). Actionable check:
        c16 in {0,1} and c17 in {0,1}.'
      sources:
      - start_line: 68
        end_line: 68
        file: ''
      uid: a8b84312-d0f0-4a62-91f9-312863693348
    - text: 'The scholarship_renewal_eligible flag (mask4) is constructed only when
        c19 == 1. Therefore any record marked as scholarship_renewal_eligible should
        also have c19 == 1 (i.e., scholarship_renewal_eligible implies scholarship_holder).
        Actionable check: rows where scholarship_renewal_eligible == true must have
        c19 == 1.'
      sources:
      - start_line: 76
        end_line: 76
        file: ''
      - start_line: 87
        end_line: 89
        file: ''
      uid: 310f6c1c-cc7c-47ab-ac62-0e37033577bf
    - text: 'Be explicit about the numeric thresholds that define scholarship renewal
        eligibility: for a row to be eligible (mask3 used inside mask4), both normalized
        scores and both rates must meet thresholds. Concretely, eligible rows must
        satisfy c26 >= 0.6*20 (i.e., c26 >= 12), c32 >= 12, and when denominators
        are > 0 the rates must be >= 0.5 (i.e., c25/c24 >= 0.5 when c24 > 0; c31/c30
        >= 0.5 when c30 > 0). Actionable checks: for rows where scholarship_renewal_eligible
        == true assert these numeric inequalities.'
      sources:
