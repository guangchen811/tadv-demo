    assumptions:
    - text: 'When computing rate2 as c31 / c30 the code assumes c30 is the denominator
        (attempts) and c31 is the numerator (successes). Concretely: for any row where
        c30 > 0, c31 should be between 0 and c30 (inclusive). This can be enforced
        as a Deequ-style constraint, e.g. .satisfies("c30 = 0 OR (c31 >= 0 AND c31
        <= c30)", [''c31'',''c30'']).'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: 1cbd66a6-ff93-4be3-90a8-ab984b82a143
    - text: 'norm2 is computed as c32 / 20.0 and later compared to thresholds (e.g.
        >= 0.60). The code therefore assumes c32 is bounded so that norm2 lies in
        [0,1]. Actionable constraint: 0 <= c32 <= 20 (Deequ: .isContainedInRange(''c32'',
        0.0, 20.0)). Combined with the previous assumption about c31/c30 this ensures
        score2 = 0.65*norm2 + 0.35*rate2 will lie in [0,1].'
      sources:
      - start_line: 49
        end_line: 55
        file: ''
      uid: b1fb816a-e798-4a52-946f-d53510db4472
    - text: 'The code treats c33 as an attendance indicator via mask1 = (c33 > 0)
        and uses it to downgrade term2 standing. It therefore assumes c33 is a non-negative
        integer-ish count and that mask1 exactly equals (c33 > 0). Actionable constraints:
        c33 >= 0 and c33 is integral (or contained in a small set of non-negative
        integers). In Deequ: .isNonNegative(''c33'') and optionally .hasDataType(''c33'',''Integral'')
