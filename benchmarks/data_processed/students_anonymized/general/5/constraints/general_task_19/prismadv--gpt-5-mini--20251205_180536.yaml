        end_line: 45
        file: ''
      uid: 48d6a4eb-f198-4cea-b75a-8467e5a787a0
    - text: For rows where c30 > 0, the numerator c31 should be non-negative and not
        exceed the denominator c30 (i.e., 0 <= c31 <= c30). This ensures rate2 = c31
        / c30 is in [0,1] before the subsequent fillna/clip.
      sources:
