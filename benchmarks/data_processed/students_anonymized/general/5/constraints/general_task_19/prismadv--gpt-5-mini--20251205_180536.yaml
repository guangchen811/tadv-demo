    - text: 'The flags in ''c16'' and ''c17'' are mutually exclusive: there should
        be no row where both c16 == 1 AND c17 == 1. The code creates mask2 using (c17
        == 1) & (c16 == 0) and implicitly expects these flags not to be simultaneously
        positive. A Deequ-style constraint example:

        .satisfies("!(c16 = 1 AND c17 = 1)", "no_both_c16_c17")

        (or equivalently assert count of rows where c16 = 1 AND c17 = 1 equals 0).'
