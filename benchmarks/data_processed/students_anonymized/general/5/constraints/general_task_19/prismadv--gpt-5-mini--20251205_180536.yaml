  '["c24","c25"]':
    code: []
    assumptions:
    - text: 'When c24 (denominator) is greater than 0, c25 should be between 0 and
        c24 (inclusive). In other words, c25 should represent a count not exceeding
        the number of opportunities recorded in c24 and should not be negative. This
        can be expressed as a Deequ-style constraint (or SQL-like predicate) such
        as:

        .satisfies("c25 >= 0 AND c25 <= c24", "c25_between_0_and_c24_when_c24_positive")

