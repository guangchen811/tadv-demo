    assumptions:
    - text: 'The ''c30'' column must be present in the input CSV and contain no NULL/NaN
        values. The code reads the dataframe and then uses c30 as a denominator in
        rate calculations; the dataset metadata also indicates completeness=1.0. Example
        Deequ/GE-style constraint: .satisfies("CASE WHEN `c30` IS NOT NULL THEN 1
        ELSE 0 END", "c30_not_null", lambda x: x == 1)'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: 059a3512-65c2-48b7-ad6a-ae63f6902754
    - text: 'The ''c30'' column must be numeric/integer (or coercible to numeric).
        The code treats c30 as a numeric denominator (integral according to metadata)
        and performs division by it. Example constraint: .satisfies("CASE WHEN try_cast(`c30`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "c30_is_numeric", lambda x: x ==
        1)'
      sources:
      - start_line: 23
        end_line: 23
        file: ''
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: 67feb69c-8f8d-42c0-9523-84f7c5511031
    - text: 'Zero values are allowed in ''c30'' and are explicitly handled by the
        code (zeros are replaced with NaN before division to avoid divide-by-zero).
        However, having every value equal to zero would cause all computed rates to
        be 0, which is probably undesirable. Example constraint to ensure not all
        values are zero: .satisfies("CASE WHEN `c30` = 0 THEN 1 ELSE 0 END", "frac_c30_zero",
        lambda x: x < 1.0)'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: 2779cb77-161b-4e68-ab2b-ec9858ea2655
    - text: 'Values in ''c30'' should be non-negative (c30 >= 0). c30 is used as a
        count/denominator for a rate calculation, so negative values are semantically
        invalid. Example constraint: .satisfies("CASE WHEN `c30` >= 0 THEN 1 ELSE
        0 END", "c30_non_negative", lambda x: x == 1)'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 54
        end_line: 55
        file: ''
      uid: 8a2175d4-9f22-447c-b233-6cbe087f27ae
    - text: 'For logically consistent rates, the denominator ''c30'' should generally
        be >= the corresponding numerator ''c31'' (i.e., c30 >= c31). The code will
        clip rates to [0,1], but numerator > denominator indicates data quality issues.
        Example constraint: .satisfies("CASE WHEN `c30` >= `c31` THEN 1 ELSE 0 END",
        "c30_ge_c31", lambda x: x >= 0.95) (allowing a small fraction of exceptions)'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: 291fbb9b-7da6-4a87-ac97-8645d4be7e87
