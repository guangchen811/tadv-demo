  '["c30","c31","c32"]':
    code: []
    assumptions:
    - text: 'The weighted score computation for term2 combines c32, c31 and c30 and
        is expected to produce values in the range [0.0, 1.0]. Concretely: score2
        = 0.65 * (c32 / 20.0) + 0.35 * (c31 / c30) where c31/c30 is treated as 0 when
        c30 == 0 (per the code). A practical, actionable constraint (Deequ-style)
        is to assert the computed expression is in [0,1], for example: .satisfies("0.0
        <= 0.65 * (c32 / 20.0) + 0.35 * (CASE WHEN c30 = 0 THEN 0 ELSE c31 / c30 END)
        <= 1.0", ["c32","c31","c30"]).'
      sources:
      - start_line: 8
        end_line: 11
        file: ''
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 38
        end_line: 38
        file: ''
      - start_line: 49
        end_line: 55
        file: ''
      uid: 0cc36c29-1ab3-4993-b643-82000e1d9342
    - text: 'For rows with a positive denominator (c30 > 0), the completion rate used
        in calculations should be between 0 and 1, i.e. 0 <= c31 <= c30. Actionable
        constraint: .satisfies("c31 >= 0 AND c31 <= c30", ["c31","c30"]) (applies
        only to rows where c30 > 0). This ensures the raw rate prior to clipping is
        meaningful and avoids relying solely on post-hoc clipping.'
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: 142dec2e-e394-44ef-9e18-fdfe56b1b161
    - text: 'If the denominator c30 is zero the code treats the rate as 0. To avoid
        silently dropping information or producing unexpected results, rows with c30
        == 0 should also have c31 == 0 (i.e. no completed items when attempted is
        zero). Actionable constraint: .satisfies("NOT(c30 = 0 AND c31 > 0)", ["c30","c31"]).'
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: c7e75dd6-801f-47fe-9cb7-d45d87141cd0
    - text: 'The scholarship-renewal logic uses thresholds on norm2 (derived from
        c32) and rate2 (derived from c31/c30). For a student to satisfy the norm2
        >= 0.60 condition, c32 must be >= 0.60 * 20.0 = 12. For the rate2 >= 0.50
        condition, c31/c30 must be >= 0.50 (for c30 > 0). Actionable constraints you
        can apply to validate eligibility inputs: .satisfies("c32 >= 12 OR (NOT(scholarship_candidate_row))",
