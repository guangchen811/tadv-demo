    - text: 'If c24 == 0, then c25 should also be 0 (i.e., there should be no positive
        count in c25 when the corresponding denominator/opportunities in c24 is zero).
        This captures the semantic expectation that successes/qualified events cannot
        exist when there were no opportunities. A Deequ-style constraint for this
