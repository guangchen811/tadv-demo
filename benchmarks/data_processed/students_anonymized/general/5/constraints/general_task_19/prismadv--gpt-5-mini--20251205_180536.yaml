        end_line: 56
        file: ''
      uid: a39e02de-72ce-446f-8633-461013f461c2
    - text: 'Business-rule relationship: when c33 > 0 the final term2_standing is
        expected to be downgraded one level relative to the initial term2 standing
        (val2). Concretely: if c33 > 0 and val2 == ''Good'' then term2_standing should
        be ''Warning''; if c33 > 0 and val2 == ''Warning'' then term2_standing should
        be ''Probation''. This can be validated after transformation with a predicate
        such as .satisfies("NOT (c33 > 0 AND val2 = ''Good'' AND term2_standing !=
        ''Warning'') AND NOT (c33 > 0 AND val2 = ''Warning'' AND term2_standing !=
        ''Probation'')", [''c33'',''val2'',''term2_standing'']).'
