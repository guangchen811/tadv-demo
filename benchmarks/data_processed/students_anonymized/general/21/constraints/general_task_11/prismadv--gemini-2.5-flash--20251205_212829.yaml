        within the normalization range for norm5

        .addConstraint(Constraint.assertion(lambda df: df.filter(col("c5") == 1).select(col("risk2")).where(col("risk2").isGreaterThanOrEqualTo(0.0).and(col("risk2").isLessThanOrEqualTo(0.15))).count()
