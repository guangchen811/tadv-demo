    assumptions:
    - text: 'The columns ''c5'' and ''c20'' are jointly expected to be non-null and
        numeric (integral) for all records, enabling the consistent calculation of
        ''risk2''. Specifically, ''c5'' is assumed to be a binary indicator (0 or
        1), and ''c20'' is assumed to be an integral value whose normalized form contributes
        to ''risk2''. A key assumption about their combined effect is that ''risk2''
        will fall into distinct ranges based on the value of ''c5'': if ''c5'' is
        1, ''risk2'' is expected to be between 0.0 and 0.15; if ''c5'' is 0, ''risk2''
        is expected to be between 0.25 and 0.4. This ensures ''c5'' acts as a primary
