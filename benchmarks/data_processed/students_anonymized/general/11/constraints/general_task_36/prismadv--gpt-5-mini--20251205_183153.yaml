        - `c27`) + (`c29` - `c33`)) > 0 THEN CASE WHEN `c31` IS NOT NULL THEN 1 ELSE
        0 END ELSE 1 END == 1.'
      sources:
      - start_line: 43
        end_line: 48
        file: ''
      - start_line: 34
        end_line: 38
        file: ''
      uid: 05f2e7b7-160f-40c7-a846-6e2c78f9a710
    - text: 'The ''c31'' values should be non-negative integers (>= 0). c31 is used
        as a numerator component in pass-rate style calculations (added to c25), so
        negative values are likely semantically invalid and can produce misleading
        rates. Example validation: CASE WHEN `c31` IS NOT NULL THEN CASE WHEN `c31`
        >= 0 THEN 1 ELSE 0 END ELSE 0 END == 1.'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 46
        end_line: 48
        file: ''
      uid: 04723e14-2890-441e-b874-6a38c16633d8
    - text: 'To ensure the derived pass_rate (rate3) is sensible (within [0,1]) for
        rows where val3 > 0, the input should satisfy 0 <= (c25 + c31) <= (c23 - c27)
        + (c29 - c33). In other words, when denominator val3 is positive, the numerator
        val4 should be between 0 and val3. Example validation: CASE WHEN ((`c23` -
        `c27`) + (`c29` - `c33`)) > 0 THEN CASE WHEN (`c25` + `c31`) BETWEEN 0 AND
        ((`c23` - `c27`) + (`c29` - `c33`)) THEN 1 ELSE 0 END ELSE 1 END == 1.'
