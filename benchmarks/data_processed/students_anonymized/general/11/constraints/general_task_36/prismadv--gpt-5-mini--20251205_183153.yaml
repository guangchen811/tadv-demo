      uid: e96d8e8a-33b7-4704-b2c0-d31d3ce6824d
    - text: 'The weighted average denominator val5 = (c23 + c29) should be positive
        for rows where weighted_avg_grade is intended to be computed (so the expression
        (c26*c23 + c32*c29) / (c23 + c29) is defined). Constraint example: .satisfies(''c23
        + c29 > 0'', ''weighted_avg_denominator_positive'').'
      sources:
      - start_line: 17
        end_line: 26
        file: ''
      - start_line: 49
        end_line: 52
        file: ''
      uid: 5ec47166-2117-4caf-a1f2-a3e4535d4ce4
    - text: 'The numeric columns involved in these multi-column calculations (c23,
        c27, c29, c33, c25, c31) should be present, convertible to numeric without
        loss, and not null for the rows considered. In practice this is enforced by
        the conversion step and should be validated with a completeness/non-null check
        across the set: .satisfies(''c23 IS NOT NULL AND c27 IS NOT NULL AND c29 IS
        NOT NULL AND c33 IS NOT NULL AND c25 IS NOT NULL AND c31 IS NOT NULL'', ''no_nulls_in_calc_cols'')
        or equivalent completeness checks.'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      uid: 62d61412-ae0f-43ac-a4d8-54e758e9cbcf
  '["c23","c26","c29","c32"]':
    code: []
    assumptions:
    - text: 'c23 and c29 are used as numeric weights in a weighted average: when computing
        val6 the code uses (c26*c23 + c32*c29) / (c23 + c29). Therefore (a) c23 and
        c29 should be numeric and non-negative, and (b) they should not both be zero
        for rows where a meaningful weighted average is expected. This can be enforced
        as multi-column constraints such as: isNonNegative(c23), isNonNegative(c29),
        and a row-level constraint that (c23 + c29) > 0 (or at least true for the
        vast majority of rows).'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 49
        end_line: 52
        file: ''
      uid: 679559b6-eb3a-4034-b360-6d27a1320469
    - text: 'c26 and c32 are the quantities being averaged with weights c23 and c29.
        For the subsequent computation val7 = 1 - (val6 / 20.0) to be meaningful,
        c26 and c32 should be numeric and lie in the expected grade range (for example
        0.0 to 20.0). Enforce as conditional multi-column constraints: for rows where
        (c23 + c29) > 0, assert 0.0 <= c26 <= 20.0 and 0.0 <= c32 <= 20.0.'
      sources:
      - start_line: 49
        end_line: 53
        file: ''
      uid: 63ad9158-d0df-4c77-a1bf-c74f605dd70c
    - text: 'When the denominator (c23 + c29) is positive, the computed weighted_avg_grade
        = (c26*c23 + c32*c29)/(c23 + c29) should be finite and fall within expected
        bounds (e.g., 0.0 to 20.0). Enforce as a conditional constraint: (c23 + c29)
        > 0 implies weighted_avg_grade is not NaN/Infinite and 0.0 <= weighted_avg_grade
        <= 20.0.'
      sources:
      - start_line: 49
        end_line: 53
        file: ''
      uid: 4641db63-cbab-4a05-85ce-11f7fa51c17e
    - text: 'The script converts a set of columns (including c23, c26, c29, c32) to
        numeric before arithmetic. These four columns must therefore successfully
        parse to numeric values (no coerced-to-NaN rows expected). Enforce as a multi-column
        completeness/type constraint: c23, c26, c29, c32 should be numeric (or have
        completeness > 0.99 after numeric coercion).'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      uid: 5388bac3-5cad-436e-b936-44ffcd9e7e05
  '["c29","c31","c33"]':
    code: []
    assumptions:
    - text: 'The expression used as the denominator for rate2 is (c29 - c33). For
        the downstream calculations to behave as intended, that denominator should
        be non-negative for all records (i.e., c29 >= c33). Actionable constraint
        (Deequ-like): .satisfies("c29 >= c33", "c29_ge_c33").'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      - start_line: 46
        end_line: 48
        file: ''
      uid: 31087129-bd37-473e-a447-e43be5cf395b
    - text: 'When the denominator is zero (c29 == c33) the code sets rate2 to 0 regardless
        of c31. To avoid silently dropping numerator information, require that c31
        be zero whenever c29 equals c33. Actionable constraint: .satisfies("c29 !=
        c33 OR c31 = 0", "c31_zero_when_c29_eq_c33").'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      uid: bc37aaa6-daac-4c58-9cd2-5e584912b420
    - text: 'Interpretation of columns implies c31 (a numerator / count of successes)
        should not exceed the related total c29. Require c31 <= c29 for all records.
        Actionable constraint: .satisfies("c31 <= c29", "c31_le_c29").'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
