  '["c13","c16","c17","c21","c23","c25","c26","c27","c29","c31","c32"]':
    code: []
    assumptions:
    - text: 'For each subgroup, the number of successes/passes must not exceed the
        effective population size used as the denominator. Concretely: when (c23 -
        c27) > 0, then 0 <= c25 <= (c23 - c27); and when (c29 - c33) > 0, then 0 <=
        c31 <= (c29 - c33). This ensures the per-subgroup rates computed as c25/(c23-c27)
        and c31/(c29-c33) are well-defined and in a sensible range. Example constraint
        forms: .satisfies(''c25 <= c23 - c27'', ''c25_le_group_size'') and .satisfies(''c31
        <= c29 - c33'', ''c31_le_group_size'').'
      sources:
      - start_line: 40
        end_line: 44
        file: ''
      - start_line: 46
        end_line: 48
        file: ''
      uid: 451dabcb-7bbe-46ca-89b9-3d2104c185c7
    - text: 'The aggregate pass count across the two groups must not exceed the aggregate
        effective population. Concretely: for rows where (c23 - c27 + c29 - c33) >
        0, require 0 <= (c25 + c31) <= (c23 - c27 + c29 - c33). This enforces that
        the computed pass_rate = (c25 + c31) / (c23 - c27 + c29 - c33) will lie in
        [0,1]. Example constraint: .satisfies(''c25 + c31 <= (c23 - c27) + (c29 -
        c33)'', ''passes_le_total'') or expressed conditionally: .satisfies(''(c23
        - c27 + c29 - c33 = 0) OR (c25 + c31 <= c23 - c27 + c29 - c33)'', ''passes_le_total_conditional'').'
      sources:
      - start_line: 46
        end_line: 48
        file: ''
      uid: 0b2f78d9-979d-473b-86e6-efe55841b3dd
    - text: 'When computing the weighted average grade, the group sizes must be positive
        and the grades must be in the expected numeric range. Concretely: for rows
        where (c23 + c29) > 0, c26 and c32 should be numeric and within [0, 20], and
        the computed weighted_avg_grade = (c26*c23 + c32*c29)/(c23 + c29) should also
        be within [0,20]. Example constraint patterns: .satisfies(''(c23 + c29 = 0)
        OR ((c26 >= 0 AND c26 <= 20) AND (c32 >= 0 AND c32 <= 20))'', ''grades_in_range'')
        and .satisfies(''(c23 + c29 = 0) OR (((c26*c23 + c32*c29)/(c23 + c29)) >=
        0 AND ((c26*c23 + c32*c29)/(c23 + c29)) <= 20)'', ''weighted_avg_in_range'').'
      sources:
      - start_line: 49
        end_line: 53
        file: ''
      uid: f1062d0a-11eb-42ef-8044-ccb8c898646e
    - text: 'Admission grade c13 must be on the expected scale so that risk1 = 1.0
        - (c13 / 200.0) is meaningful and within [0,1]. Concretely, require 0 <= c13
        <= 200. Example constraint: .satisfies(''c13 >= 0 AND c13 <= 200'', ''c13_in_expected_range'').'
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      uid: 1bf2700b-4257-465a-8368-f18c89c5a2dd
    - text: 'The financial/domestic indicator flags used to build mask1 must be binary
        values. Concretely, c16 and c17 should each contain only {0,1} so that mask1
        = 1.0 for (c17 == 0) OR (c16 == 1) is well-defined. Example constraints: .isContainedIn(''c16'',
        [0,1]) and .isContainedIn(''c17'', [0,1]) or .satisfies(''(c16 IN (0,1)) AND
        (c17 IN (0,1))'',''flags_binary'').'
      sources:
      - start_line: 55
        end_line: 56
        file: ''
      uid: 19094cb8-38ba-4349-8fe3-41bab9db9ff2
    - text: 'All columns that are coerced to numeric before downstream arithmetic
        should successfully convert (no unexpected NaNs). Concretely, the set cols1
        = [c23, c24, c25, c27, c26, c29, c30, c31, c33, c32, c13, c16, c17, c21] should
        be numeric and (for correctness of arithmetic) should have high completeness
        (no nulls). Example constraint patterns: .hasCompleteness([''c23'',''c25'',''c27'',''c26'',''c29'',''c31'',''c32'',''c13'',''c16'',''c17'',''c21''],
        1.0) or row-level predicate .satisfies(''NOT (isNaN(c23) OR isNaN(c25) OR
        ...)'', ''no_coercion_nans'').'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      uid: f2433bb9-5382-418b-a46d-7bd037ffe02d
    - text: 'The intermediate components that feed the final score must produce values
        in expected ranges so score clipping behaves predictably. Given the earlier
        assumptions: mask1 in {0,1}, rate3 in [0,1], val7 in [0,1] (which requires
        weighted_avg_grade in [0,20]), risk1 in [0,1] (requires c13 in [0,200]) and
        val8 in [0,0.03] (requires c21 in {0,1}). Together these ensure score1 is
        within a bounded numeric range before np.clip. Example: combine previous predicates
        into a row-level check such as .satisfies(''mask1 IN (0,1) AND rate3 >= 0
        AND rate3 <= 1 AND weighted_avg_grade >= 0 AND weighted_avg_grade <= 20 AND
        c13 >= 0 AND c13 <= 200 AND c21 IN (0,1)'',''components_in_range'').'
      sources:
      - start_line: 58
        end_line: 66
        file: ''
      - start_line: 49
        end_line: 55
        file: ''
      uid: a78db154-e3ea-44e3-916e-c644e23720b0
  '["c16","c17"]':
    code: []
    assumptions:
    - text: 'Columns ''c16'' and ''c17'' are non-null integer binary flags taking
        only the values 0 or 1. The code coerces these columns to numeric and later
        uses exact comparisons (== 0 or == 1) and computes proportions (mean of (c17
        == 1), mean of (c16 == 1)), so the script assumes no other values or nulls
        appear. Example actionable constraints (Deequ-style):

        - .hasCompleteness(["c16", "c17"], 1.0)

        - .isContainedIn("c16", [0, 1])

        - .isContainedIn("c17", [0, 1])'
