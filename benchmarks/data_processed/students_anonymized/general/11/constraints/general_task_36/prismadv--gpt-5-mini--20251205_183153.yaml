        end_line: 41
        file: ''
      - start_line: 46
        end_line: 48
        file: ''
      uid: 686fb043-159a-4517-a6ac-b2c245d35277
    - text: 'The code uses arithmetic across c23, c27 and c25 without null checks
        (after coercion to numeric). It therefore assumes these three columns are
        numeric and complete (no nulls) after the pd.to_numeric step so that operations
        like c23 - c27 and c25 / (c23 - c27) do not produce unexpected NaNs. Actionable
        constraint examples:

        - Deequ: .isComplete(["c23","c25","c27"]) and/or .hasDataType("c23","Integral")
        etc.

        - SQL-style check: assert c23 IS NOT NULL AND c25 IS NOT NULL AND c27 IS NOT
        NULL.'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 40
        end_line: 41
        file: ''
      uid: 9a75a6a0-ec86-41c4-a3aa-b557748702e8
    - text: 'The script treats rates (including rate3 which aggregates rate1) as proportions
        used in bounded arithmetic (e.g., 1.0 - rate3). Implicitly it expects these
        rates to lie in [0,1]. Focusing on the contribution from the c23/c27/c25 terms,
        this implies that when denominators are positive the ratio c25 / (c23 - c27)
        should be within [0,1]. Actionable constraint examples:

        - Deequ: .where("c23 > c27").satisfies("c25 / (c23 - c27) >= 0 AND c25 / (c23
        - c27) <= 1", "rate1_in_[0,1]")

        - Equivalent bounded-check: when c23 > c27 assert 0 <= c25 <= c23 - c27.'
      sources:
