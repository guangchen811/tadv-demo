  '["c23","c25","c27"]':
    code: []
    assumptions:
    - text: 'When computing rate1 the code uses c23 - c27 as the denominator and then
        divides c25 by that denominator. Therefore for rows where (c23 - c27) > 0
        the code expects c25 to be defined and to represent a count/numerator that
        is non-negative and does not exceed the denominator. Actionable constraint
        examples:

        - Deequ: .where("c23 > c27").satisfies("c25 >= 0 AND c25 <= c23 - c27", "c25_within_denominator")

        - SQL-style check: for all rows with c23 > c27 assert 0 <= c25 <= (c23 - c27).'
      sources:
