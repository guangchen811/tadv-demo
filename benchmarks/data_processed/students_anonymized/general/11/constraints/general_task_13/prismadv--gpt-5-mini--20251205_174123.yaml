    - text: 'The dropout proportion should be bounded away from 0 and 1 (i.e., not
        at the extremes). The code comment states the transform relies on proportions
        being bounded away from {0,1} and uses a logit + tanh transform; extremely
        small or exactly 0/1 shares can produce numerical issues or produce extreme
        calibration shifts. A practical check is to require the dropout share to lie
        in (eps, 1 - eps), e.g. between 1e-6 and 0.999999.

