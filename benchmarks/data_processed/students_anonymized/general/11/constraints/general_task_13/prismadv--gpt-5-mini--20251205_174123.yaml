        end_line: 92
        file: ''
      uid: e43f5adb-be23-4eb6-96b8-056deb452159
    - text: 'Mapping of c34 relies on exact matches to numeric values in list2 (e.g.,
        7.6, 8.9, 9.4, 10.8, 11.1, 12.4, 12.7, 13.9, 15.5, 16.2). Because c34 is fractional,
        any representation/precision differences (strings, rounded values, or near-equal
        floats) will lead to unmapped rows. In combination with the macro columns
        (c36, c35) the code does not handle unmapped c34 values gracefully. Enforce
        that for every row, c34 equals one of the exact list2 floats (and simultaneously
        c36 and c35 satisfy their respective allowed sets). Actionable constraints:
        .isContainedIn("c34", [7.6,8.9,9.4,10.8,11.1,12.4,12.7,13.9,15.5,16.2]) and
        .isComplete(["c34","c36","c35"]).'
