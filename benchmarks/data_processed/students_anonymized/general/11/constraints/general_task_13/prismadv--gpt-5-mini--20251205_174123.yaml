    - text: 'There must exist rows where c16 == 1 AND c17 == 0 (debtor and not up-to-date).
        The immediate outreach flag mask uses ((c16 == 1) & (c17 == 0)) to mark urgent_fee_flag,
        so this combination should occur (non-zero share). An actionable constraint:
        fraction_rows(c16 == 1 AND c17 == 0) > 0 (or above a small expected threshold).'
      sources:
      - start_line: 160
        end_line: 162
        file: ''
      - start_line: 69
