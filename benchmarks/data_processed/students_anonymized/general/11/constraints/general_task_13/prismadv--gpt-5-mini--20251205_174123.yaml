        end_line: 139
        file: ''
      uid: 2265c74f-8584-4ab6-b873-ac64460408cb
    - text: 'The ''c20'' values should be non-negative and bounded to a reasonable
        human-age range (e.g. 0 <= c20 <= 120). The code treats c20 as an age-like
        feature (baseline 25, scaled by 20) and uses np.clip, so extremely negative
        or astronomically large values are unexpected. Represent as: .satisfies("CASE
        WHEN c20 >= 0 AND c20 <= 120 THEN 1 ELSE 0 END", "c20_reasonable_range", lambda
