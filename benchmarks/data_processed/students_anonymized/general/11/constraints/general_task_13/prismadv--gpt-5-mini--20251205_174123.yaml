  c33:
    code: []
    assumptions:
    - text: 'If enrollment for 2nd semester (column ''c29'') is zero for a row, then
        both evaluated count (''c31'') and non-evaluated count (''c33'') must also
        be zero for that row. This is required because e2 (c29) is used as a denominator
        (e2_safe) and the code expects rows with zero enrollment to have zero counts
        rather than non-zero counts. A possible Deequ-style constraint: .satisfies("c29
        <> 0 OR (c31 = 0 AND c33 = 0)", "zero_enrollment_consistency").'
      sources:
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 105
        end_line: 113
        file: ''
      uid: 7eee7184-be2c-44d7-a2e6-9b037ed04641
    - text: 'For every row, the non-evaluated count in 2nd semester (''c33'') and
        the evaluated count (''c31'') should be between 0 and the total enrollment
        (''c29''). Concretely: 0 <= c31 <= c29 and 0 <= c33 <= c29. This ensures rate2
        = a2 / e2_safe and ratio2 = ne2 / e2_safe are meaningful and that clipping
        to [0,1] reflects valid counts. A suitable Deequ constraint example: .satisfies("c31
        >= 0 AND c33 >= 0 AND c31 <= c29 AND c33 <= c29", "counts_within_enrollment_bounds").'
      sources:
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 105
        end_line: 113
        file: ''
      uid: 3b024278-3a0c-4212-b687-448c03974bf9
    - text: 'The proportion of rows with a non-zero non-evaluated count in 2nd semester
        (share of c33 != 0) is assumed to be at most 0.10 (i.e., non-evaluations are
        sparse). The code computes val21 = proportion(c33 != 0) and then val22 = sqrt(0.10
        - val21), which requires val21 <= 0.10 to avoid taking the square root of
        a negative number. A corresponding Deequ-style check: .satisfies("SUM(CASE
        WHEN c33 <> 0 THEN 1 ELSE 0 END) / COUNT(*) <= 0.10", "ne2_nonzero_share_le_0_10").'
      sources:
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 111
        end_line: 118
        file: ''
      uid: 290d3799-9bb4-42f9-9555-22cbd5d0c5e4
