  '["c16","c17","c19"]':
    code: []
    assumptions:
    - text: 'Columns ''c16'', ''c17'', and ''c19'' are binary indicator flags (only
        values 0 or 1) and contain no nulls. The code casts each to int and performs
        arithmetic like 1 - v21 and logical masks, so all three must be present and
        restricted to {0,1}. An actionable constraint (Deequ-style) would be: assert
        fraction of rows where c16 in {0,1} AND c17 in {0,1} AND c19 in {0,1} equals
        1 (i.e. no other values), and that completeness(c16,c17,c19) == 1.'
      sources:
