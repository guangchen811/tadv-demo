    - text: 'The ''c37'' column should contain only the categories ''Graduate'', ''Dropout'',
        and ''Enrolled'' (no other categories). The code extracts priors by name (val1.get(''Graduate''),
        val1.get(''Dropout''), val1.get(''Enrolled'')) and therefore expects these
