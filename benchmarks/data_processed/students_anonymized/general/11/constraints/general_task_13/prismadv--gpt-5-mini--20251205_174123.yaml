      sources:
      - start_line: 108
        end_line: 112
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: f1fdac4c-7ed3-4de2-95b0-e3082ffefc63
    - text: '''c31'' (a2) should generally be less than or equal to the corresponding
        denominator column ''c29'' (e2) when e2 > 0. The code computes rate2 = (a2
        / e2_safe) and interprets it as a fraction in [0,1], so a2 > e2 indicates
