    - text: 'The final output and urgent-flag logic depend jointly on application-order
        (c3) and fee/scholarship columns (c16, c17, c19). The script assumes these
        columns are present (non-null) and that the fee/scholarship indicator columns
        are binary (0/1), so that mask5 and risk components compute correctly. Example
        Deequ predicates:

        .satisfies("countIf(c16 IS NOT NULL AND c17 IS NOT NULL AND c19 IS NOT NULL
        AND c3 IS NOT NULL) / count(*) = 1.0", "required_cols_complete")

        .satisfies("countIf(c16 IN (0,1)) = count(*)", "c16_binary")

