    assumptions:
    - text: 'The application-order column ''c3'' must have the vast majority of values
        inside the expected ordinal range (1..6) and a strong majority equal to 1
        so that the cohort-level scalars val12 and val13 are real-valued and the per-row
        application-order factor is well-defined. Concretely the code assumes: (a)
        share(c3 == 1) > 0.60 and (b) share(c3 IN (1,2,3,4,5,6)) >= 0.95. You can
        express these as Deequ predicate constraints, for example:

        .satisfies("countIf(c3 = 1) / count(*) >= 0.60", "share_first_choice_at_least_0.60")

        .satisfies("countIf(c3 IN (1,2,3,4,5,6)) / count(*) >= 0.95", "c3_values_within_1_to_6_at_least_95pct")'
