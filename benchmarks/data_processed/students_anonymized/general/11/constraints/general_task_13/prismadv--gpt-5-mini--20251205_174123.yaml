    assumptions:
    - text: 'The macro-adjustment columns c36, c34, and c35 are used together to compute
        the macro risk (risk2). For every row, all three columns must be present (non-null)
        and must map successfully to the predefined ordinal lists. Concretely: c36
        must be one of [-4.06, -3.12, -1.7, -0.92, 0.32, 0.79, 1.74, 1.79, 2.02, 3.51],
        c34 must be one of [7.6, 8.9, 9.4, 10.8, 11.1, 12.4, 12.7, 13.9, 15.5, 16.2],
        and c35 must be one of [-0.8, -0.3, 0.3, 0.5, 0.6, 1.4, 2.6, 2.8, 3.7]. Failure
        to satisfy these membership conditions or any nulls will cause .map(...).astype(int)
        to produce incorrect or missing indices and will break the risk calculation.
        Suggested actionable checks (Deequ-style): .isComplete(["c36","c34","c35"])
        and .isContainedIn("c36", [...]) , .isContainedIn("c34", [...]) , .isContainedIn("c35",
        [...]).'
      sources:
      - start_line: 77
        end_line: 87
        file: ''
      - start_line: 89
        end_line: 92
        file: ''
      uid: 7c44c782-089e-477a-ae8e-3d01d1f35f88
    - text: 'The ordinal indices produced by mapping c36, c34, c35 (val16, val17,
        val18) are assumed to fall within the exact index ranges used in arithmetic.
        Specifically: mapped c36 indices must be in 0..9 (len(list1)-1), mapped c34
        indices must be in 0..9 (len(list2)-1), and mapped c35 indices must be in
        0..8 (len(list3)-1). These ranges must hold row-wise because risk2 divides
        by (len(dict)-1) and then combines the three components; out-of-range or missing
        indices will produce incorrect risk values. Actionable checks: for each row
        assert 0 <= map_index(c36) <= 9, 0 <= map_index(c34) <= 9, 0 <= map_index(c35)
        <= 8 (or equivalently verify the original values are in the allowed sets so
        mapping yields indices in these ranges).'
      sources:
