  '["c16","c17","c19","c20","c22","c23","c25","c26","c27","c28","c29","c3","c31","c32","c33","c34","c35","c36","c5"]':
    code: []
    assumptions:
    - text: 'Columns c16, c17 and c19 are binary indicators (only values 0 or 1) and
        complete (no nulls). The downstream math casts these to int and uses expressions
        like 0.6*c16 + 0.4*(1 - c17) and conditionals (c19 == 1) & (c17 == 1). Actionable
        constraints: each of c16, c17, c19 .isComplete() and .isContainedIn(column,
        [0,1]) (or equivalent per-column containment checks); optionally a multi-column
        check that values are only 0/1 across that set.'
      sources:
      - start_line: 69
        end_line: 75
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: 176482db-5293-486e-b91d-2079c813e797
    - text: 'Semester-1 counts must be internally consistent: c25 (attended/approved
        a1) and c27 (no-evaluation ne1) should not exceed c23 (enrolled/e1), and all
        three should be non-negative. Actionable constraints: enforce c25 <= c23 and
        c27 <= c23, and .isNonNegative()/.isComplete() on c23, c25, c27.'
      sources:
      - start_line: 95
        end_line: 103
        file: ''
      uid: 1b02ce9c-f68a-4527-a42a-84c71b8ce8ec
    - text: 'Semester-2 counts must be internally consistent: c31 (a2) and c33 (ne2)
        should not exceed c29 (e2), and all three should be non-negative. Actionable
        constraints: enforce c31 <= c29 and c33 <= c29, and .isNonNegative()/.isComplete()
        on c29, c31, c33.'
      sources:
      - start_line: 106
        end_line: 114
        file: ''
      uid: 9d26218d-078d-4155-96ec-7a21e77c60f2
    - text: 'Grade columns used to compute normalized deficits must lie in the expected
        0..20 range: c26 (g1) and c32 (g2) should be between 0 and 20. Actionable
        constraints: 0 <= c26 <= 20 and 0 <= c32 <= 20 (range checks / .isNonNegative()
        + upper-bound checks).'
      sources:
      - start_line: 95
        end_line: 103
        file: ''
      - start_line: 106
        end_line: 114
        file: ''
      uid: 2e2d494f-0100-44e8-8f23-fe4319233ba8
    - text: 'Macro indicator columns must contain only the enumerated values the code
        maps to ordinal indices: c36 must be contained in the set { -4.06, -3.12,
        -1.7, -0.92, 0.32, 0.79, 1.74, 1.79, 2.02, 3.51 }, c34 must be contained in
        {7.6, 8.9, 9.4, 10.8, 11.1, 12.4, 12.7, 13.9, 15.5, 16.2}, and c35 must be
        contained in {-0.8, -0.3, 0.3, 0.5, 0.6, 1.4, 2.6, 2.8, 3.7}. If values outside
        these sets appear, the .map(...) will produce NaN and astype(int) will fail.
        Actionable constraints: per-column contained-in checks (exact set membership)
        and completeness.'
      sources:
      - start_line: 77
        end_line: 87
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: 9f1f34ba-e5a9-4324-a6db-e0543d1c5c47
    - text: 'The second-semester no-evaluation sparsity assumption: the share of rows
        where c33 (ne2) != 0 must be <= 0.10. The code computes val21 = 1.0 - (ne2
        == 0).mean() and then val22 = sqrt(0.10 - val21). If the share of non-zero
        ne2 exceeds 0.10 the sqrt argument becomes negative producing NaN. Actionable
        constraint: (count_where(c33 != 0) / n_rows) <= 0.10.'
      sources:
      - start_line: 116
        end_line: 118
        file: ''
      uid: 7b4c4c5a-6c6c-4057-967e-2cb4bab39f25
    - text: 'Application-order composition expectations on c3: the share of records
        with c3 == 1 must be >= 0.60 (used in val12 = sqrt(val10 - 0.60)), and the
        share with c3 in [1,2,3,4,5,6] must be >= 0.95 (used in val13 = sqrt(val11
        - 0.95)). Actionable constraints: (count_where(c3 == 1)/n_rows) >= 0.60 and
        (count_where(c3 in {1..6})/n_rows) >= 0.95.'
      sources:
      - start_line: 60
        end_line: 66
        file: ''
      uid: 5c41d63f-4019-4b48-864d-e6a7e2ccd866
    - text: 'Columns written to the output (c3, c5, c16, c17, c19, c23, c29) must
        exist and be complete (no nulls), because df1 = df[[...]].copy() and downstream
        exports rely on these fields being present. Actionable constraints: .isComplete()
        for each of these columns and a schema presence check.'
      sources:
      - start_line: 163
        end_line: 166
        file: ''
      uid: 42656439-4c95-4e3b-948b-719eefb922fe
  '["c22","c23","c25","c26","c27"]':
    code: []
    assumptions:
    - text: 'For each row, the first-semester attended-evaluations count (c25) must
        be non-negative and cannot exceed the total first-semester evaluations (c23).
        This ensures the division a1 / e1 in the code is meaningful and the clipped
        rate is logically consistent. Example constraint (Deequ-style / SQL-ish):
        .satisfies("c25 >= 0 AND c25 <= c23", "attended_le_total") (or equivalently
        a row-level check: c25 BETWEEN 0 AND c23).'
      sources:
      - start_line: 94
        end_line: 103
        file: ''
      uid: 21fe82a9-687b-4f59-a985-c28130ee83fd
    - text: 'For each row, the first-semester no-evaluation count (c27) must be non-negative
        and cannot exceed the total first-semester evaluations (c23). This guarantees
        the ratio calculation ne1 / e1 is bounded and interpretable. Example constraint:
        .satisfies("c27 >= 0 AND c27 <= c23", "noeval_le_total").'
      sources:
      - start_line: 94
        end_line: 103
        file: ''
      uid: c155bd2d-1006-467e-9302-e93a840ea5d6
    - text: 'For each row, the sum of attended evaluations and no-evaluations should
        not exceed the total evaluations: c25 + c27 <= c23. This enforces that attended
        and "no-eval" counts are consistent parts of the total and prevents impossible
        counts. Example constraint: .satisfies("c25 + c27 <= c23", "attended_plus_noeval_le_total").'
      sources:
      - start_line: 94
        end_line: 103
        file: ''
      uid: e0602036-b479-4989-a8e2-ca404b51f495
    - text: 'If there are any evaluations recorded (c23 > 0) then the first-semester
        grade c26 (g1) must lie in the expected range 0..20. This reflects the use
        val19 = (20.0 - g1) / 20.0 and prevents out-of-range grades affecting the
        risk computation. Example constraint: .satisfies("(c23 = 0) OR (c26 >= 0 AND
        c26 <= 20)", "grade_range_when_evals").'
      sources:
      - start_line: 95
        end_line: 103
        file: ''
      uid: b70e1dfc-8b19-4e45-bdef-0be33fe197a7
    - text: 'If total evaluations is zero (c23 = 0) then attended (c25) and no-evaluation
        (c27) counts should both be zero. This conditional consistency avoids relying
        solely on fillna behavior and represents the intended semantics: no evaluations
        => no attendant/no-eval events. Example constraint: .satisfies("NOT (c23 =
        0) OR (c25 = 0 AND c27 = 0)", "zero_evals_implies_zero_counts").'
      sources:
      - start_line: 100
        end_line: 102
        file: ''
      uid: a08430bf-fbc5-439b-a0a1-5344c33f48b2
  '["c28","c29","c31","c32","c33"]':
    code: []
    assumptions:
    - text: 'For every row, the 2nd-semester attended count (c31) should be less than
        or equal to the 2nd-semester enrolled count (c29). This is required because
        rate2 is computed as a2 / e2 and later clipped to [0,1]. Actionable constraint
        (Deequ-style): .satisfies("c31 <= c29", "a2_le_e2") or as a row-level check:
        all rows satisfy c31 <= c29.'
      sources:
      - start_line: 106
        end_line: 113
        file: ''
      uid: ad8b637d-851b-4f6d-bc5a-84ebcb043eba
    - text: 'For every row, the 2nd-semester no-evaluation count (c33) should be less
        than or equal to the 2nd-semester enrolled count (c29). ratio2 is computed
        as ne2 / e2 and is interpreted as a share of enrolled; thus ne2 <= e2 must
        hold. Actionable constraint: .satisfies("c33 <= c29", "ne2_le_e2").'
      sources:
      - start_line: 106
        end_line: 113
        file: ''
      uid: 9e19a4e1-ed0f-4efb-92ae-d8835d633841
    - text: 'For every row, the sum of attended and no-evaluation counts in 2nd semester
        (c31 + c33) should not exceed enrolled (c29). The code computes both rate2
        = a2/e2 and ratio2 = ne2/e2 and then combines them, so a2 + ne2 <= e2 is required
        to keep these shares interpretable. Actionable constraint: .satisfies("c31
        + c33 <= c29", "a2_plus_ne2_le_e2").'
      sources:
      - start_line: 106
        end_line: 113
        file: ''
      uid: eb30ece8-272b-4945-b4d5-845b1998c3b5
    - text: 'The share of rows with non-zero 2nd-semester no-evaluation (c33 != 0)
        is assumed to be small (<= 0.10). The code computes val21 = 1.0 - (ne2 ==
        0).mean() and then val22 = sqrt(0.10 - val21), which requires 0.10 - val21
        >= 0. Actionable (monitoring) constraint: (count_rows_where(c33 != 0) / rowCount)
        <= 0.10 (or .satisfies("(cast(c33 != 0 as int) ).sum() / rowCount <= 0.10",
        "ne2_sparsity")).'
      sources:
      - start_line: 116
        end_line: 118
        file: ''
      uid: c7a06af8-41d1-481c-af29-c82e89534813
