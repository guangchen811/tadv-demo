        end_line: 139
        file: ''
      - start_line: 142
        end_line: 149
        file: ''
      uid: cfc1f8de-4caa-4f68-9dcd-fe21006f3b25
    - text: 'Most ''c20'' values are expected to fall in the student-age band where
        the risk transform is sensitive (for example between 15 and 45). This is a
        soft/global expectation to ensure the scaling (v23 - 25) / 20 produces meaningful
        variation for the bulk of rows. Represent as a coverage-style rule: .satisfies("CASE
        WHEN c20 >= 15 AND c20 <= 45 THEN 1 ELSE 0 END", "c20_most_in_sensitive_band",
        lambda x: x >= 0.95).'
      sources:
      - start_line: 138
        end_line: 139
        file: ''
      - start_line: 142
        end_line: 149
        file: ''
      uid: 77b97122-5472-4e8f-bd6a-1957f8c84add
    - text: 'The ''c20'' column is expected to be integral (no meaningful fractional
