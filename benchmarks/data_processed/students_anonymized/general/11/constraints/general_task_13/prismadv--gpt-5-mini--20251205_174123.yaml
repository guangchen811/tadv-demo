      uid: 49fb225d-4441-4849-a326-ffa44bcc816a
    - text: 'There must exist rows where c19 == 1 AND c17 == 1 (scholarship and compliant).
        The code applies a scholarship moderation val15 = -0.15 when (c19==1 & c17==1),
        so this combination is expected to occur (non-zero share). An actionable constraint:
        fraction_rows(c19 == 1 AND c17 == 1) > 0 (or above a small expected threshold).'
      sources:
