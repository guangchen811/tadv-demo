    - text: 'There must be at least one ''Dropout'' observation (dropout share > 0).
        The code computes a logit using the dropout proportion (math.log(val3 / ...))
        and will raise an error if the numerator is zero (math.log(0)). Ensure the
        data contains at least one row where c37 == ''Dropout''.

        Example validation:

