    - text: 'The ''c7'' column should contain non-negative values. In the calculation
        of `risk6`, the term `1.0 - ((df[v3] + df[v4]) / 400.0)` is clipped between
        0.0 and 1.0. If ''c7'' (and ''c13'') were significantly negative, their sum
        could be negative, causing `1.0 - (negative_sum / 400.0)` to be greater than
