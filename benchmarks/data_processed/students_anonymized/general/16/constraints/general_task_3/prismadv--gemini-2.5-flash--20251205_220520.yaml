    - text: 'The ''c7'' column values are expected to have an upper bound, likely
        not exceeding 400. In the `risk6` calculation, the term `(df[v3] + df[v4])
        / 400.0` is used. If the sum of ''c7'' and ''c13'' consistently exceeds 400.0,
        then `(df[v3] + df[v4]) / 400.0` will be greater than 1.0, causing `1.0 -
        (...)` to be negative and clipped to 0.0. This implies that for the term to
        be discriminative and responsive to variations in the input, the sum `c7 +
        c13` is expected to be within a range, suggesting ''c7'' itself should not
        consistently exceed a certain value (e.g., 400 if ''c13'' is 0).

        We could represent this assumption as a deequ constraint like this:

        .is_less_than_or_equal_to(400)'
