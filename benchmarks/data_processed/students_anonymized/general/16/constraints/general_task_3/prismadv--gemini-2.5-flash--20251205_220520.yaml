    - text: 'The ''c7'' column should not contain null values. Although `pd.to_numeric(errors=''coerce'')`
        can introduce NaNs, the code does not explicitly handle potential nulls in
        ''c7'' before it is used in critical arithmetic operations for `risk6`. The
        presence of nulls would propagate NaNs to `risk6`, and subsequently to `score1`
        and `risk_score`, making these derived values null for affected rows and potentially
        impacting the `quantile` calculation and `high_risk` assignments.

        We could represent this assumption as a deequ constraint like this:

