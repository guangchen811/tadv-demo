    - text: 'The ''c27'' column should not contain many nulls (ideally none). The
        code does not fill or impute NaNs for c27 after coercion; NaNs in c27 will
        make val2 and ratio1 NaN for affected rows and can propagate into the risk
        score. A validation example: .satisfies("CASE WHEN `c27` IS NOT NULL THEN
