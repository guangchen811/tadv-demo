    - text: 'For the first coverage gap calculation, whenever c23 > 0 the available
        coverage should be at least the sum of the parts: c23 >= c24 + c27. The code
        computes val2 = c23 - (c24 + c27) and ratio1 = val2 / c23 when c23>0; to keep
        ratio1 in a sensible [0,1] range val2 should be non-negative and <= c23. Represent
        as a row-level constraint, e.g.:

        .satisfies("(c23 <= 0) OR (c23 >= c24 + c27)", "c23_ge_c24_plus_c27_when_positive")

        (or stricter for ratio bounds: .satisfies("(c23 <= 0) OR ((c23 - (c24 + c27))/c23
        >= 0 AND (c23 - (c24 + c27))/c23 <= 1)") )'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      uid: 919fb3cd-404c-4d3e-8939-3016696ef88c
    - text: 'For the second coverage gap calculation, whenever c29 > 0 the available
        coverage should be at least the sum of the parts: c29 >= c30 + c33. The code
        computes val4 = c29 - (c30 + c33) and ratio2 = val4 / c29 when c29>0; to keep
        ratio2 meaningful val4 should be non-negative and <= c29. Represent as a row-level
        constraint, e.g.:

        .satisfies("(c29 <= 0) OR (c29 >= c30 + c33)", "c29_ge_c30_plus_c33_when_positive")

        (or stricter for ratio bounds similarly to above.)'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      uid: 126bc01d-9223-4604-bd24-b71337083754
    - text: 'All columns used together in numeric arithmetic (the cols1 list: c23,
        c24, c25, c22, c27, c26, c29, c30, c31, c28, c33, c16, c17) should be convertible
        to numeric types (no non-numeric strings) because the code coerces them with
        pd.to_numeric(errors=''coerce'') and then performs arithmetic across them.
        Represent as dataset-level constraints, e.g.:

        .forAllColumnsOn(schema=["c23","c24","c25","c22","c27","c26","c29","c30","c31","c28","c33","c16","c17"],
        .isComplete() / .hasDatatype("Double") / row-level .satisfies("isFinite(column)")
        )'
