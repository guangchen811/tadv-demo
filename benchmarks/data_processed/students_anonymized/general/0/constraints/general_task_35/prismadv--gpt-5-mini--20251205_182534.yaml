        end_line: 28
        file: ''
      - start_line: 41
        end_line: 42
        file: ''
      uid: f759ccd4-1fb7-40a5-b7a0-2c55affe3462
    - text: 'After numeric conversion, ''c30'' should not be null (or should have
        only a very small fraction of nulls). The code performs arithmetic with c30
        (used in subtraction and division) and unexpected NaNs produced by coercion
        would propagate and may produce NaNs in the final score. A corresponding check:
        fraction of non-null c30 rows should be 1.0 (or above a high threshold).'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      - start_line: 51
        end_line: 52
        file: ''
      - start_line: 63
        end_line: 71
        file: ''
      uid: 6d0e2ea3-51f0-4262-adef-4fcaf5cda6cd
    - text: 'The ''c30'' values should be non-negative (>= 0). c30 is used as a denominator
        for computing a pass/coverage rate and as a count in arithmetic, so negative
        values would be semantically invalid. A corresponding validation rule: CASE
        WHEN `c30` >= 0 THEN 1 ELSE 0 END should equal 1 (or >= some high threshold).'
      sources:
      - start_line: 49
        end_line: 52
        file: ''
      uid: 57b390ad-c57f-4cf3-95aa-2575b66b6f45
    - text: 'Zeros in ''c30'' are allowed and are treated specially: zeros are replaced
        with NaN for the division and resulting rates are filled with 0.0. Validation
        should allow zero values and interpret them as ''no attempts/coverage''. If
        desired, also monitor the fraction of zero values to ensure it is within expected
        bounds.'
      sources:
      - start_line: 49
        end_line: 50
        file: ''
      uid: e4adb418-2920-46ec-b87c-73f91672d464
    - text: 'The ''c30'' column is expected to be integral (integer-valued). The dataset
        and downstream logic treat c30 as a count/denominator; fractional values would
        be unexpected. A validation rule: CASE WHEN floor(c30) = c30 THEN 1 ELSE 0
