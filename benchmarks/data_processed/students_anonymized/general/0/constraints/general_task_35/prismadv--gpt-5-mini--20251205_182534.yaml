    - text: 'Values in ''c27'' should be non-negative (>= 0) integers, representing
        a count. c27 is used as a count that is added to c24 and subtracted from c23
        (val2 = c23 - (c24 + c27)), so negative values would be semantically incorrect.
        Validation example: .satisfies("CASE WHEN `c27` >= 0 AND floor(`c27`) = `c27`
