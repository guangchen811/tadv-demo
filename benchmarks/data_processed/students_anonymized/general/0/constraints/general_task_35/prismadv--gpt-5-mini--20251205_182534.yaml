    assumptions:
    - text: 'Per-record, the pass count in ''c31'' should not exceed the attempt/denominator
        in ''c30''. In other words, for each row: c31 <= c30. This is required for
        the rate calculation rate2 = c31 / c30 to be meaningful. Example Deequ-style
        constraint: .satisfies("c31 <= c30", "pass_le_attempt")'
      sources:
      - start_line: 49
        end_line: 50
        file: ''
      uid: b46e7444-4ba4-48f9-afb9-4aa882567c4c
    - text: 'The total coverage field ''c29'' should be at least the sum of its reported
        parts ''c30'' and ''c33'' for a record: c29 >= c30 + c33. The code computes
        val4 = c29 - (c30 + c33) and then divides by c29 to get a coverage gap, so
        negative values indicate inconsistent component sums. Example Deequ-style
        constraint: .satisfies("c29 >= c30 + c33", "coverage_consistency")'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      uid: 1716833e-5e9a-4e0e-aa85-c52fcf7313b3
    - text: 'If the total coverage ''c29'' is zero for a row, then its constituent
        counts ''c30'' and ''c33'' should also be zero (i.e., no parts when total
        is zero). This prevents logical inconsistencies when computing normalized
        gaps: for all rows, if c29 == 0 then c30 == 0 AND c33 == 0. Example Deequ-style
        constraint: .satisfies("c29 != 0 OR (c30 == 0 AND c33 == 0)", "zero_total_implies_zero_parts")'
      sources:
      - start_line: 51
        end_line: 56
        file: ''
      uid: 6341b66f-f7b7-4497-9245-760deebbc3a9
    - text: 'When the denominator ''c30'' is zero the code effectively sets the rate
        to 0; semantically, rows with c30 == 0 should therefore have c31 == 0 (no
        passes if there were no attempts). Enforce per-row: if c30 == 0 then c31 ==
        0. Example Deequ-style constraint: .satisfies("c30 != 0 OR c31 == 0", "zero_denominator_implies_zero_numerator").
        Additionally, monitor the fraction of rows with c30 == 0 and alert if it exceeds
        an acceptable threshold because it reduces meaningfulness of rate2.'
      sources:
      - start_line: 49
        end_line: 50
        file: ''
      uid: 31e0ad0a-e873-4fda-85ee-f23c15596246
  '["c29","c30","c33"]':
    code: []
    assumptions:
    - text: 'For every record, the column ''c29'' represents a total/coverage quantity
        and should be greater than or equal to the sum of its component columns ''c30''
        and ''c33''. This can be expressed as a Deequ/SQL-style constraint such as:
        .satisfies("c29 >= c30 + c33", "total_ge_components").'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      uid: 42f29f81-c0f8-4754-97d3-2c98a48ecc4d
    - text: 'If ''c29'' equals zero (no total coverage), then its component counts
        ''c30'' and ''c33'' should also be zero. This prevents logically inconsistent
        rows with zero total but positive parts. Equivalent Deequ constraints: .satisfies("c29
        != 0 OR c30 = 0", "zero_total_no_part_c30") and .satisfies("c29 != 0 OR c33
        = 0", "zero_total_no_part_c33").'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      uid: 1fa330ce-fea7-48b7-8cd8-831e017431df
    - text: 'Each component column should not individually exceed the reported total:
        ''c30'' <= ''c29'' and ''c33'' <= ''c29''. Representable as Deequ constraints:
        .satisfies("c30 <= c29", "part_le_total_c30") and .satisfies("c33 <= c29",
        "part_le_total_c33").'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      uid: 76cef13c-33d4-4f72-be40-8bf38c3bfa32
  '["c30","c31"]':
    code: []
    assumptions:
    - text: 'When computing pass rate2 as c31 / c30, the code assumes that for rows
        where c30 > 0 the numerator c31 is less than or equal to the denominator c30
        (i.e., the computed rate should be in [0, 1]). This can be enforced as a multi-column
        constraint such as: when(c30 > 0, assert c31 <= c30). In Deequ-like form you
        could express this as a predicate: "c30 = 0 OR c31 <= c30" (or a .satisfies
        check: .satisfies("c30 = 0 OR c31 <= c30", "c31_le_c30_when_c30_pos")).'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 49
        end_line: 50
        file: ''
      uid: fc5e566a-b50f-4358-be28-11ef0aa6df1e
    - text: 'The code expects c30 and c31 to be non-negative numeric counts after
        coercion to numeric (the script coerces many columns to numeric before dividing).
        Additionally, rows where c30 == 0 should not have c31 > 0 because such cases
        will be masked to a 0 rate by the replace/fillna logic and could hide data
        issues. Enforceable checks: c30 >= 0, c31 >= 0, and no rows with (c30 == 0
        AND c31 > 0). In Deequ-like form: .satisfies("c30 >= 0", "c30_non_negative"),
        .satisfies("c31 >= 0", "c31_non_negative"), .satisfies("NOT (c30 = 0 AND c31
        > 0)", "no_zero_denominator_with_positive_numerator").'
      sources:
      - start_line: 36
        end_line: 42
        file: ''
      - start_line: 49
        end_line: 50
        file: ''
      uid: 88cc83f3-dba1-4e9d-b1db-441337ead57e
    - text: 'The derived rate2 (c31 / c30) is expected to be a valid proportion in
        [0.0, 1.0] after computation (for rows where c30 > 0). This can be phrased
        directly as a multi-column assertion: when(c30 > 0, 0.0 <= c31/c30 <= 1.0).
        In Deequ-like predicate form you could use: .satisfies("c30 = 0 OR (c31 /
        c30) >= 0", "rate2_non_negative") and .satisfies("c30 = 0 OR (c31 / c30) <=
        1", "rate2_at_most_one").'
      sources:
      - start_line: 49
        end_line: 50
        file: ''
      - start_line: 63
        end_line: 66
        file: ''
      uid: 18a6c6b4-4bd1-4d0a-ba23-bd51e0534dd9
