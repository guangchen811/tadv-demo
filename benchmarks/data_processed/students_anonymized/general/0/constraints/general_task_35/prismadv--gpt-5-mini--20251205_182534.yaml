        file: ''
      uid: 8d84b6da-e26c-46e8-8480-549a2cf294fd
    - text: 'The value scale of c26 together with c16/c17-driven fee_risk should be
        compatible for linear aggregation into the final risk score. In practice this
        requires c26 to be within the 0..20 range so norm1 = c26/20 and risk1 = 1
        - norm1 fall in [0,1], making it comparable to risk2 (which is 0, 0.3, or
        1). Represent as a multi-column constraint (practical enforcement):

        .satisfies("(c26 >= 0 AND c26 <= 20)", "c26_in_0_20")

        (Optionally assert that aggregated risk_score is finite: .satisfies("isFinite(risk_score)")
        after score computation.)'
