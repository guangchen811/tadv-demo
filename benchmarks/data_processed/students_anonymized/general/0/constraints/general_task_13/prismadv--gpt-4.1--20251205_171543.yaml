        file: ''
      uid: 8213a86a-44ee-498d-b054-541c9aeb5e98
  '["c3","c37"]':
    code: []
    assumptions:
    - text: The 'c3' (application order) and 'c37' (target class) columns are both
        fully complete (no missing values), and their joint presence is required for
        downstream computations and reporting. Any row must have both 'c3' and 'c37'
        present. This is necessary as both columns are used together for risk scoring
        and diagnostics export.
