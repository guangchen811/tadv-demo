    assumptions:
    - text: 'For each record, when calculating the academic performance rate for the
        1st semester as (a1 / e1), the denominator ''e1'' (from column ''c23'') may
        be zero. The code replaces zeros in ''e1'' with NaN, so division by zero is
        avoided, and any such cases are filled with 0.0. Therefore, the assumption
        is that whenever ''a1'' (from column ''c25'') is nonzero, ''e1'' (from column
        ''c23'') should also be nonzero to ensure the rate is meaningful. This can
        be represented as a multi-column constraint: For all rows where c25 > 0, c23
        != 0.'
      sources:
      - start_line: 96
        end_line: 101
        file: ''
      uid: 12122971-6423-4d91-82a7-762674ca2359
    - text: 'The columns ''c27'', ''c26'', ''c23'', ''c22'', and ''c25'' are used
        together to compute multiple academic performance and risk score features
        for each record. It is assumed that all these columns are complete (no missing
        values) and are aligned row-wise so that each student''s values across these
        columns correspond to the same entity. This can be represented as a multi-column
        completeness constraint: completeness([''c27'', ''c26'', ''c23'', ''c22'',
        ''c25'']) == 1.0.'
      sources:
      - start_line: 95
        end_line: 101
        file: ''
      uid: cfe7e7a3-0f40-403a-b07f-3140bf847960
    - text: 'The columns ''c25'' (a1), ''c23'' (e1), and ''c27'' (ne1) are all divided
        by ''e1'' (c23) in the calculation of rate1 and ratio1. The assumption is
        that for each row, the values in ''c25'' (a1) and ''c27'' (ne1) should not
        exceed the value in ''c23'' (e1), i.e., 0 <= c25 <= c23 and 0 <= c27 <= c23,
        since a1 and ne1 are counts out of e1 attempts. This can be represented as
        two multi-column constraints: for all rows, c25 <= c23 and c27 <= c23.'
      sources:
      - start_line: 96
        end_line: 102
        file: ''
      uid: 5ba7f620-2c69-4e4a-be39-d17bd9d73e67
