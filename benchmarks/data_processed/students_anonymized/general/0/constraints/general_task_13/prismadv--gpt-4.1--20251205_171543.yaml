    - text: 'Columns ''c23'' and ''c25'' are both expected to be non-null and of numeric
        (integral/float) type, and for each record, c25 should never exceed c23 (i.e.,
        attempted values cannot be greater than enrolled values for a student). This
        can be represented as a Deequ constraint: .where(''c23 >= 0 and c25 >= 0'').satisfies(''c25
        <= c23'', ''c25_leq_c23'')'
