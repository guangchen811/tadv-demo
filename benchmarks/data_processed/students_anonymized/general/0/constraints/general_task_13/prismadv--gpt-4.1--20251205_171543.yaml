  '["c28","c29","c31","c32","c33"]':
    code: []
    assumptions:
    - text: 'For the calculation of academic performance metrics in the 2nd semester,
        the columns ''c29'', ''c28'', ''c31'', and ''c33'' are used jointly as denominators
        and numerators (e.g., ''a2 / e2'', ''cr2 / e2'', ''ne2 / e2''). This implies
        that for each record, when ''c29'' (e2) is zero, the downstream code replaces
        it with NaN to avoid division by zero and subsequently fills NaN with 0.0.
        The assumption is that the joint handling of these columns is valid only if
        their types are numeric (which is satisfied), and that their values are semantically
        aligned (i.e., ''c29'' represents a count of evaluations, and ''c28'', ''c31'',
        ''c33'' represent counts or numerators that should not exceed ''c29'' for
        any record). Thus, the following multi-column assumptions apply:

        - For each record, the values in ''c28'', ''c31'', and ''c33'' should not
        exceed ''c29''.

        - All four columns should be non-negative.

        - Whenever ''c29'' is zero, ''c28'', ''c31'', and ''c33'' should also be zero,
        or else they are ignored in the calculation.

        These can be represented as Deequ constraints such as:

        .hasMax(''c28'', ''c29'')

        .hasMax(''c31'', ''c29'')

        .hasMax(''c33'', ''c29'')

        .where(''c29 == 0'', ''c28 == 0 and c31 == 0 and c33 == 0'')'
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 106
        end_line: 114
        file: ''
      uid: ae39a561-1e7d-457b-a18d-e79701246729
    - text: 'The columns ''c29'', ''c28'', ''c31'', ''c33'', and ''c32'' are all assumed
        to have no missing values (completeness = 1.0) and are used in calculations
        together for the 2nd semester academic performance. Therefore, the assumption
        is that for every record, all five columns are present (not null) and valid.
        This can be enforced as a multi-column completeness constraint:

        .hasCompleteness([''c29'', ''c28'', ''c31'', ''c32'', ''c33''], 1.0)'
      sources:
