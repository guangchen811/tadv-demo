        file: ''
      uid: 8ac05108-de4e-4be6-9457-4ab7870bf7d5
    - text: The value distribution of 'c3' (application order) is assumed to be stable
        and bounded, with most values in [1, 6]. Calculations such as val11 = df['c3'].isin([1,
        2, 3, 4, 5, 6]).mean() and downstream risk components require that the majority
        of values for 'c3' are within this set. Furthermore, the risk scoring logic
        assumes that the share of 'c3' == 1 is sufficiently large to make sqrt(val10
        - 0.60) defined (i.e., val10 > 0.60), and the share of 'c3' in [1,6] is sufficiently
        large so that sqrt(val11 - 0.95) is defined (i.e., val11 > 0.95). This links
        the statistical properties of 'c3' with the downstream processing of 'c37'
        (target class), which is used for normalization and calibration.
      sources:
      - start_line: 60
        end_line: 66
        file: ''
      - start_line: 45
        end_line: 51
        file: ''
      - start_line: 121
        end_line: 126
        file: ''
      uid: 95a3c40f-c608-4d6b-8b91-4d64ffd6e3bf
    - text: 'There is an implicit group-wise relationship between ''c3'' (application
        order) and ''c37'' (target class): the prevalence of the ''Dropout'' class
        in ''c37'' (used as a prior) and the distribution of ''c3'' jointly calibrate
        the risk score. The code assumes that the distribution of ''c3'' is not degenerate
        within each class of ''c37'' (e.g., not all ''Dropout'' cases have the same
        ''c3'' value), supporting effective stratification and risk modeling. This
        supports constraints such as: for each value of ''c37'', the distribution
        of ''c3'' should have a minimum entropy or not be concentrated on a single
        value.'
      sources:
