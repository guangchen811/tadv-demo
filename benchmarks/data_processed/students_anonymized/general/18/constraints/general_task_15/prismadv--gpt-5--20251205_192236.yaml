    assumptions:
    - text: 'The c30 column must be fully non-null and numeric (parsable to numbers).
        Any nulls or non-numeric values would propagate into second_sem_eval_load
        and cause StandardScaler/LogisticRegression to fail since no imputation is
        performed. We could represent this as a Deequ constraint like: .satisfies("CASE
        WHEN c30 IS NOT NULL AND CAST(c30 AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END",
        "c30_not_null_numeric", lambda x: x == 1.0).'
      sources:
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 86
        end_line: 95
        file: ''
      - start_line: 120
        end_line: 126
        file: ''
      uid: 63b78d24-7788-47fa-9754-e04dc6603794
    - text: 'The c30 column should contain non-negative integers (counts). We could
        represent this as a Deequ constraint like: .satisfies("CASE WHEN c30 >= 0
        AND c30 = CAST(c30 AS BIGINT) THEN 1 ELSE 0 END", "c30_nonneg_integer", lambda
        x: x == 1.0).'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: 41fb715d-99d9-4a17-b602-55c9c0144397
    - text: 'Row-level consistency with the denominator c29: when c29 > 0, c30 must
        satisfy 0 <= c30 <= c29; when c29 <= 0, c30 must be 0. This keeps the derived
        ratio c30/c29 in [0,1] and avoids inconsistent counts. Deequ example: .satisfies("CASE
        WHEN c29 > 0 THEN CASE WHEN c30 >= 0 AND c30 <= c29 THEN 1 ELSE 0 END ELSE
        CASE WHEN c30 = 0 THEN 1 ELSE 0 END END", "c30_within_total", lambda x: x
        == 1.0).'
      sources:
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      uid: 7af62ff4-42e4-415f-89f2-a0e2725a9739
    - text: 'Operational expectation: c30 is mostly zero (sparse count). You may enforce
        this as a soft data-quality expectation, e.g., at least 70% of rows have c30
        = 0. Deequ example: .satisfies("CASE WHEN c30 = 0 THEN 1 ELSE 0 END", "c30_mostly_zero",
        lambda x: x >= 0.7). Adjust the threshold to your domain reality.'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      uid: a973add9-00b9-44fd-a318-83b7d73365b7
