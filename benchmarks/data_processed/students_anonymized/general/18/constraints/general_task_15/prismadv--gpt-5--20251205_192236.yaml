  '["c16","c17"]':
    code: []
    assumptions:
    - text: 'Columns c16 (debtor) and c17 (tuition_up_to_date) are complete and strictly
        binary numeric indicators taking only values {0, 1}. This is required because
        the code performs equality checks against 0/1, casts them to float, and uses
        them in arithmetic and model features. Example Deequ constraints: .satisfies("(c16
        IN (0,1)) AND (c17 IN (0,1))", "c16_c17_binary") and .satisfies("c16 IS NOT
        NULL AND c17 IS NOT NULL", "c16_c17_non_null").'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 86
        end_line: 109
        file: ''
      uid: ddd367c7-c75e-43b3-b696-202969428238
    - text: 'Tuition up to date implies not debtor: for all records with c17 = 1,
        c16 must equal 0. This enforces consistency between the two indicators used
        together in the financial risk feature. Example Deequ constraint: .satisfies("(c17
        != 1) OR (c16 = 0)", "up_to_date_implies_not_debtor").'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 76
        file: ''
      uid: 90d10e61-1297-4a20-8bb1-e17b1a2b4bb3
    - text: 'Debtor and tuition_up_to_date cannot both be true simultaneously: c16
        + c17 <= 1 for every row. This prevents contradictory states when both columns
        are used jointly in the financial_risk calculation and as separate model features.
        Example Deequ constraint: .satisfies("coalesce(c16, 0) + coalesce(c17, 0)
        <= 1", "debtor_up_to_date_mutually_exclusive").'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 86
        end_line: 109
        file: ''
      uid: fc1ed419-d433-4844-a350-3ccba7490053
  '["c16","c19"]':
    code: []
    assumptions:
    - text: 'The payment/scholarship flags c16 (debtor), c17 (tuition_up_to_date),
        and c19 (scholarship) are complete binary indicators encoded as 0/1. They
        are used in boolean equality checks and cast directly to float without null
        handling, so all three must be non-null and each value must be in {0,1}. This
        can be enforced with a single multi-column compliance rule such as: c16 IN
        (0,1) AND c17 IN (0,1) AND c19 IN (0,1).'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 86
        end_line: 109
        file: ''
      uid: 9ac7ac24-45a5-4c75-af74-dcc6ce71c4c6
    - text: Debtor status and tuition-up-to-date are logically incompatible in the
        same row. Enforce that c16 (debtor) and c17 (tuition_up_to_date) cannot both
        be 1 at the same time, i.e., NOT (c16 = 1 AND c17 = 1). This prevents contradictory
        payment states that would make the engineered risk inconsistent.
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 106
        end_line: 108
        file: ''
      uid: 73002fde-b648-4294-8870-c6fd3ad60d40
    - text: Given the risk computation risk1 = (c16 == 1) + 0.5 * (c17 == 0) - 0.5
        * (c19 == 1), the raw (unclipped) risk should take only the discrete set of
        values {-0.5, 0.0, 0.5, 1.0, 1.5}. This ensures that all three inputs behave
        as binary flags and that no unexpected encodings (e.g., values outside {0,1})
        propagate into the engineered feature. This can be checked with a compliance
        expression that evaluates the formula and asserts membership in that set.
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      uid: 6f2a4075-8114-4b9e-84dd-ebdc64beffdc
  '["c17","c19"]':
    code: []
    assumptions:
    - text: 'Columns c17 (tuition_up_to_date) and c19 (scholarship) are binary indicator
        fields encoded as integers 0 or 1 with no missing values. This is required
        because both columns are used in boolean equality checks and then cast to
        float as model features. Deequ example: .satisfies("c17 in (0,1) and c19 in
        (0,1)", "c17_c19_binary", v => v == 1.0).'
      sources:
      - start_line: 33
        end_line: 34
        file: ''
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 107
        end_line: 108
        file: ''
      uid: 4a416460-1ced-4263-a1ce-c9cbeeddf0fc
    - text: The joint state of (c17, c19) should not be constant across all records
        (i.e., there should be at least two distinct (c17, c19) pairs present) so
        that the engineered feature financial_risk and the direct features do not
        collapse to constants after scaling. This can be enforced by adding a derived
        column pair = concat(cast(c17 as string), '_', cast(c19 as string)) and asserting
        hasNumberOfDistinctValues("pair", _ >= 2) or an equivalent Deequ satisfies
        on expected variability.
      sources:
      - start_line: 96
        end_line: 96
        file: ''
      - start_line: 107
        end_line: 108
        file: ''
      - start_line: 120
        end_line: 126
        file: ''
      uid: 4c46f97d-8e75-424b-860b-152e8a1eff5d
    - text: 'Given their use in the financial_risk computation, the per-row risk component
        contributed by c17 and c19, computed as 0.5 * (c17 == 0) - 0.5 * (c19 == 1),
        must always lie within [-0.5, 0.5]. This implicitly requires both columns
        to be binary and non-null. Deequ example: .satisfies("(CASE WHEN c17 = 0 THEN
        0.5 ELSE 0 END) - (CASE WHEN c19 = 1 THEN 0.5 ELSE 0 END) BETWEEN -0.5 AND
        0.5", "c17_c19_risk_component_bound", v => v == 1.0).'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 96
        end_line: 96
        file: ''
      uid: ca70c275-30bc-434d-8c48-e3bab5104513
  '["c23","c24","c25"]':
    code: []
    assumptions:
    - text: 'Per row, the first-semester count hierarchy holds: c25 (approved) <=
        c24 (evaluated) <= c23 (enrolled), and all three are non-negative. This guarantees
        the derived ratios are valid proportions. Deequ example: .satisfies(''c25
        <= c24 AND c24 <= c23 AND c25 >= 0 AND c24 >= 0 AND c23 >= 0'', ''first_sem_count_hierarchy'')'
      sources:
      - start_line: 39
        end_line: 42
        file: ''
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 63
        end_line: 66
        file: ''
      - start_line: 86
        end_line: 95
        file: ''
      uid: a6b59746-d167-489f-9042-402664a0321d
    - text: 'If the denominator c23 is zero, then the numerators c24 and c25 must
        also be zero (no evaluated/approved units when no enrolled units). Deequ example:
        .satisfies(''CASE WHEN c23 = 0 THEN (c24 = 0 AND c25 = 0) ELSE true END'',
        ''no_counts_when_zero_enrolled'')'
      sources:
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 63
        end_line: 66
        file: ''
      uid: 76243dab-bd9a-4d91-88a5-9562e11a102a
    - text: 'When c23 > 0, the ratios c25/c23 (first_sem_pass_rate) and c24/c23 (first_sem_eval_load)
        must lie within [0, 1] and be finite. Deequ example: .satisfies(''CASE WHEN
        c23 > 0 THEN (c25 / c23 >= 0 AND c25 / c23 <= 1 AND c24 / c23 >= 0 AND c24
        / c23 <= 1) ELSE true END'', ''first_sem_rate_bounds'')'
      sources:
      - start_line: 63
        end_line: 66
        file: ''
      - start_line: 86
        end_line: 95
        file: ''
      uid: 56390e8a-304e-4609-8470-eeb870f4f4c6
  '["c23","c24","c25","c27"]':
    code: []
    assumptions:
    - text: 'Columns c23 (denominator), c24, c25, and c27 are all present and non-null
        for every row because they are used together to compute ratios and to build
        features without any null handling. This can be enforced with a single multi-column
        completeness check, e.g., Deequ: .satisfies(''c23 IS NOT NULL AND c24 IS NOT
        NULL AND c25 IS NOT NULL AND c27 IS NOT NULL'', ''first_semester_counts_complete'',
        lambda v: v == 1.0)'
      sources:
      - start_line: 39
        end_line: 42
        file: ''
      - start_line: 63
        end_line: 65
        file: ''
      - start_line: 86
        end_line: 95
        file: ''
      - start_line: 116
        end_line: 125
        file: ''
      uid: 557e02e9-3c45-4cbe-827d-d3321716bbf3
    - text: 'For rows where c23 > 0 (a nonzero total), the count columns c24, c25,
        and c27 must be bounded by the total: 0 <= c24 <= c23, 0 <= c25 <= c23, and
        0 <= c27 <= c23. Equivalently, the ratios c24/c23, c25/c23, and c27/c23 must
        each lie in [0, 1]. This reflects that the code computes first-semester rates
        as c25/c23, 1 - c27/c23, and c24/c23 and does not clip out-of-range values.
        Deequ example: .satisfies(''(c23 <= 0) OR (c24 >= 0 AND c24 <= c23 AND c25
        >= 0 AND c25 <= c23 AND c27 >= 0 AND c27 <= c23)'', ''first_semester_counts_within_total'',
        lambda v: v == 1.0)'
      sources:
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 63
        end_line: 65
        file: ''
      uid: 54f0b02b-6c73-4f7f-afe5-a35bc9a7625e
    - text: 'When c23 == 0 (no total), there should be no events recorded in the related
        count columns: c24 == 0 AND c25 == 0 AND c27 == 0. Equivalently, if any of
        c24, c25, or c27 is greater than 0, then c23 must be greater than 0. This
        keeps the derived rates well-defined and consistent with the safe_divide behavior.
        Deequ example: .satisfies(''(c23 > 0) OR (c24 = 0 AND c25 = 0 AND c27 = 0)'',
        ''no_counts_when_total_zero_first_sem'', lambda v: v == 1.0)'
      sources:
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 63
        end_line: 65
        file: ''
      uid: 79d25d92-90b9-4405-87b2-12fa79a248e4
  '["c23","c24","c27"]':
    code: []
    assumptions:
    - text: 'The columns c23 (total first-semester units), c24 (evaluated units),
        and c27 (units without evaluation) represent non-negative integer counts that
        are mutually consistent. Specifically: 0 <= c24 <= c23 and 0 <= c27 <= c23
        for every record. These bounds ensure the derived rates c24/c23 and 1 - c27/c23
        are well-defined and within [0, 1]. Deequ compliance examples: satisfies(''c24
        >= 0 AND c24 <= c23'', ''c24_within_total'') and satisfies(''c27 >= 0 AND
        c27 <= c23'', ''c27_within_total'').'
      sources:
      - start_line: 39
        end_line: 42
        file: ''
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 63
        end_line: 66
        file: ''
      - start_line: 90
        end_line: 92
        file: ''
      uid: a12958a1-bc0a-4374-accf-b00ac8ecb01b
    - text: 'The evaluated and non-evaluated unit counts should not exceed the total:
        c24 + c27 <= c23 for every record. This keeps the engineered features first_sem_engagement
        = 1 - c27/c23 and first_sem_eval_load = c24/c23 semantically consistent with
        a fixed total c23. Deequ compliance example: satisfies(''c24 + c27 <= c23'',
        ''first_sem_counts_do_not_exceed_total'').'
      sources:
      - start_line: 39
        end_line: 42
        file: ''
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 63
        end_line: 66
        file: ''
      - start_line: 90
        end_line: 92
        file: ''
      uid: d5bca74d-33d5-4b19-a851-8d64729b8835
    - text: 'To avoid fallback behavior in safe_divide that would distort engagement
        to 1.0 when c23 == 0, enforce that either c23 > 0 or (c23 == 0 AND c24 ==
        0 AND c27 == 0). This guarantees that zero totals only occur when no evaluated
        or non-evaluated units are recorded, making the derived ratios meaningful.
        Deequ compliance example: satisfies(''(c23 > 0) OR (c23 = 0 AND c24 = 0 AND
        c27 = 0)'', ''no_spurious_zero_denominators'').'
      sources:
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 63
        end_line: 66
        file: ''
      - start_line: 86
        end_line: 92
        file: ''
      uid: 168ac0ec-312a-40f5-acd1-9c7385519ebf
  '["c29","c30","c31"]':
    code: []
    assumptions:
    - text: 'c29 is the total (denominator) for second-semester rates derived from
        c31 and c30. Enforce that (a) c29 > 0 whenever c31 > 0 or c30 > 0; and (b)
        if c29 = 0 then c31 = 0 and c30 = 0, so computed ratios are meaningful and
        not artificially zeroed by the safe divide. Deequ example: .satisfies(''(c29
        > 0) OR (c29 = 0 AND c31 = 0 AND c30 = 0)'', ''valid_second_sem_denominator'').'
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      uid: 05e6714d-4d65-417e-b924-161f6c5c6fd1
    - text: 'The count in c31 must be within the total c29 for each row, i.e., 0 <=
        c31 <= c29, ensuring the rate c31/c29 lies within [0, 1]. Deequ example: .satisfies(''c31
        >= 0 AND c31 <= c29'', ''second_sem_pass_rate_bounds'').'
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: d63fcf08-1295-482c-ab9b-932fa4f65387
    - text: 'The count in c30 must be within the total c29 for each row, i.e., 0 <=
        c30 <= c29, ensuring the rate c30/c29 lies within [0, 1]. Deequ example: .satisfies(''c30
        >= 0 AND c30 <= c29'', ''second_sem_eval_load_bounds'').'
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: 52457658-98f3-437f-9560-3a8a4378f8db
    - text: 'Columns c29, c31, and c30 must be present and numeric (no nulls), since
        they are used in arithmetic to build model features without any imputation.
        Deequ example: .satisfies(''c29 IS NOT NULL AND c31 IS NOT NULL AND c30 IS
        NOT NULL'', ''no_nulls_c29_c31_c30'').'
      sources:
      - start_line: 23
        end_line: 23
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 86
        end_line: 95
        file: ''
      uid: 32f77ff4-c511-49c8-80ec-48aaf2b78886
  '["c29","c30","c31","c33"]':
    code: []
    assumptions:
    - text: 'Second-semester counts are bounded by the total: for every row, 0 <=
        c31 <= c29, 0 <= c33 <= c29, and 0 <= c30 <= c29. This keeps the derived rates
        (c31/c29, c33/c29, c30/c29) within [0, 1]. Example Deequ compliance constraints:
        c31 >= 0 and c33 >= 0 and c30 >= 0 and c29 >= 0 and c31 <= c29 and c33 <=
        c29 and c30 <= c29.'
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      uid: dd294570-baa6-4eb6-bee1-7729423ca417
    - text: 'Zero-denominator consistency: if c29 == 0 then c31 == 0 and c33 == 0
        and c30 == 0; equivalently, if any of c31, c33, or c30 is > 0 then c29 must
        be > 0. This ensures the rates are meaningful when a student has no second-semester
        units. Example Deequ compliance constraints: (c29 == 0 and c31 == 0 and c33
        == 0 and c30 == 0) or (c29 > 0), and (c31 > 0 or c33 > 0 or c30 > 0) implies
        c29 > 0.'
      sources:
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      uid: c871ce2d-7d1e-43d0-af02-1f227c6c669d
    - text: 'Disjoint categories within the total: ''passed'' and ''without evaluations''
        should not overlap, so c31 + c33 <= c29 for every row. This matches the use
        of pass_rate = c31/c29 and engagement = 1 - c33/c29 as complementary partitions
        of the same total. Example Deequ compliance constraint: c31 + c33 <= c29.'
      sources:
      - start_line: 51
        end_line: 54
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: 0a2771d6-41e3-459e-9b7a-27afc77481c9
  '["c29","c30","c33"]':
    code: []
    assumptions:
    - text: 'Second-semester count consistency: c29 is the per-row total and c33 and
        c30 are component counts derived as rates (second_sem_engagement = 1 - c33/c29,
        second_sem_eval_load = c30/c29). Therefore, for every row: c29 >= 0, 0 <=
        c33 <= c29, 0 <= c30 <= c29. Additionally, if c29 = 0 then c33 = 0 and c30
        = 0 (no component counts when the total is zero). This guarantees the derived
        rates are finite and lie in [0, 1]. Deequ examples: .satisfies("(c29 > 0 AND
        c33 >= 0 AND c30 >= 0 AND c33 <= c29 AND c30 <= c29) OR (c29 = 0 AND c33 =
        0 AND c30 = 0)", "sec_sem_counts_consistency") and .satisfies("CASE WHEN c29
        > 0 THEN c33/c29 BETWEEN 0 AND 1 AND c30/c29 BETWEEN 0 AND 1 ELSE c33 = 0
        AND c30 = 0 END", "sec_sem_rates_bounded").'
      sources:
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 86
        end_line: 95
        file: ''
      uid: 0957b9f8-37f2-4d3f-845a-101324c559fc
    - text: 'First-semester count consistency (analogous to second semester): c23
        is the per-row total and c25, c27, c24 are component counts used to compute
        rates (first_sem_pass_rate = c25/c23, first_sem_engagement = 1 - c27/c23,
        first_sem_eval_load = c24/c23). Therefore, for every row: c23 >= 0, 0 <= c25
        <= c23, 0 <= c27 <= c23, 0 <= c24 <= c23. Additionally, if c23 = 0 then c25
        = 0 AND c27 = 0 AND c24 = 0. Deequ examples: .satisfies("(c23 > 0 AND c25
        >= 0 AND c27 >= 0 AND c24 >= 0 AND c25 <= c23 AND c27 <= c23 AND c24 <= c23)
        OR (c23 = 0 AND c25 = 0 AND c27 = 0 AND c24 = 0)", "first_sem_counts_consistency")
        and .satisfies("CASE WHEN c23 > 0 THEN c25/c23 BETWEEN 0 AND 1 AND c27/c23
        BETWEEN 0 AND 1 AND c24/c23 BETWEEN 0 AND 1 ELSE c25 = 0 AND c27 = 0 AND c24
        = 0 END", "first_sem_rates_bounded").'
      sources:
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 63
        end_line: 66
        file: ''
      - start_line: 90
        end_line: 92
        file: ''
      uid: 77d7fd93-7a02-4506-bb7d-89b8a3e95476
    - text: 'Joint non-nullness and numeric validity for second-semester division
        inputs: The set {c29, c33, c30} must be complete (no nulls) and contain numeric
        (non-negative) values so that the numpy-based divisions and downstream scaling/modeling
        do not produce NaN/Inf. A practical multi-column constraint is: (c29 IS NOT
        NULL AND c33 IS NOT NULL AND c30 IS NOT NULL) AND (c29 >= 0 AND c33 >= 0 AND
        c30 >= 0). Deequ examples: .satisfies("c29 IS NOT NULL AND c33 IS NOT NULL
        AND c30 IS NOT NULL", "sec_sem_no_nulls") and .satisfies("c29 >= 0 AND c33
        >= 0 AND c30 >= 0", "sec_sem_nonnegativity").'
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 120
        end_line: 122
        file: ''
      uid: fb788bec-ab7a-490a-86f1-ce4f12ea9713
  '["c34","c35","c36"]':
    code:
    - suggestion: '.haveCompleteness(["c34", "c35", "c36"], lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
