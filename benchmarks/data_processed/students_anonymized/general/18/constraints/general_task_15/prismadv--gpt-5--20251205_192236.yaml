    - suggestion: '.satisfies("NOT (isnan(c34) OR isnan(c35) OR isnan(c36))", "macro_values_are_finite",
        lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: c449e5ea-b160-4dc2-b2f2-ced87651f261
      source_assumptions:
      - 55547a5b-aa38-40a1-95c6-920fa06cb212
    - suggestion: '.hasDistinctness(["c34", "c35", "c36"], lambda d: d <= 0.02)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 4773a0c9-f5fc-46f9-9d54-f584a2e1c940
      source_assumptions:
      - f8496c87-4511-4adf-956e-58d2168c91f9
    - suggestion: '.hasUniqueness(["c34", "c35", "c36"], lambda u: u <= 0.1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 0cda6347-8841-423e-bee5-6cf82845c010
      source_assumptions:
      - f8496c87-4511-4adf-956e-58d2168c91f9
    assumptions:
    - text: 'The macroeconomic indicators c34 (unemployment_rate), c35 (inflation_rate),
        and c36 (gdp) must be jointly complete and numeric (finite) for every record,
        since they are cast to float, concatenated into the feature matrix, and fed
        through StandardScaler and LogisticRegression. This can be enforced with Deequ
        by requiring all three to be non-null and numeric, for example: .satisfies("c34
        IS NOT NULL AND c35 IS NOT NULL AND c36 IS NOT NULL", 1.0) and .hasDataType("c34",
        ConstrainableDataTypes.Fractional).hasDataType("c35", ConstrainableDataTypes.Fractional).hasDataType("c36",
        ConstrainableDataTypes.Fractional).'
      sources:
      - start_line: 86
        end_line: 109
        file: ''
      - start_line: 100
        end_line: 102
        file: ''
      - start_line: 120
        end_line: 123
        file: ''
      uid: 31f55ffe-c4ee-46ca-9ae8-66073d694d4b
    - text: "The combination (c34, c35, c36) represents shared macro context and should\
        \ take only a small number of distinct tuples across the dataset (e.g., \u2264\
        \ 15 distinct combinations), rather than being nearly unique per row. This\
        \ can be checked by creating a derived column macro_combo = concat_ws('_',\
        \ c34, c35, c36) and asserting .hasApproxCountDistinct(\"macro_combo\", _\
        \ <= 15) or that the uniqueness ratio of (c34, c35, c36) is well below 1 (e.g.,\
        \ .isUnique([\"c34\",\"c35\",\"c36\"]) should be false)."
      sources:
      - start_line: 86
        end_line: 109
        file: ''
      - start_line: 100
        end_line: 102
        file: ''
      uid: 55547a5b-aa38-40a1-95c6-920fa06cb212
    - text: 'First-semester evaluation counts must be consistent: for each row, c23
        is the denominator (total/evaluable count) and c25 (passes), c27 (fails),
        c24 (without evaluations) are component counts, so they must be non-negative
        integers with c25 <= c23, c27 <= c23, c24 <= c23, and c25 + c27 + c24 <= c23.
        This ensures the derived rates (c25/c23, 1 - c27/c23, c24/c23) are in [0,1].
        In Deequ: .satisfies("c23 >= 0 AND c25 >= 0 AND c27 >= 0 AND c24 >= 0", 1.0),
        .satisfies("c25 <= c23 AND c27 <= c23 AND c24 <= c23", 1.0), .satisfies("c25
        + c27 + c24 <= c23", 1.0).'
      sources:
      - start_line: 39
        end_line: 45
        file: ''
      - start_line: 63
        end_line: 66
        file: ''
      uid: f8496c87-4511-4adf-956e-58d2168c91f9
    - text: 'Second-semester evaluation counts must be consistent: for each row, c29
        is the denominator and c31 (passes), c33 (fails), c30 (without evaluations)
        are component counts, so they must be non-negative integers with c31 <= c29,
        c33 <= c29, c30 <= c29, and c31 + c33 + c30 <= c29. This ensures the derived
        rates (c31/c29, 1 - c33/c29, c30/c29) are in [0,1]. In Deequ: .satisfies("c29
        >= 0 AND c31 >= 0 AND c33 >= 0 AND c30 >= 0", 1.0), .satisfies("c31 <= c29
        AND c33 <= c29 AND c30 <= c29", 1.0), .satisfies("c31 + c33 + c30 <= c29",
        1.0).'
      sources:
      - start_line: 46
        end_line: 50
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      uid: 69c6e33e-c1e3-4280-8aa2-f4a3c76e2554
    - text: 'The financial status columns used together (debtor=c16, tuition_up_to_date=c17,
        scholarship=c19) are binary and mutually consistent: each must be in {0,1},
        and a student cannot simultaneously be debtor=1 and tuition_up_to_date=1.
        In Deequ: .satisfies("debtor IN (0,1) AND tuition_up_to_date IN (0,1) AND
        scholarship IN (0,1)", 1.0) and .satisfies("NOT (debtor = 1 AND tuition_up_to_date
        = 1)", 1.0).'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 106
        end_line: 108
        file: ''
      uid: 90478160-890f-41e5-b586-9615f9a1888f
