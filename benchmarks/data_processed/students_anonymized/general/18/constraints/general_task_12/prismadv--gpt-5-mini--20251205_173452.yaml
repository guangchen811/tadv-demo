        and then performs arithmetic on it (e.g., additions, divisions). If values
        are not numeric-convertible they become NaN and will break downstream arithmetic
        and scoring. Example validation (Deequ-style): .satisfies("CASE WHEN try_cast(`c13`
        AS double) IS NOT NULL THEN 1 ELSE 0 END", "c13_is_numeric", lambda x: x ==
        1)'
      sources:
      - start_line: 27
        end_line: 36
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      uid: bf6cc4f7-8cdc-403e-b5a7-f32d28dee582
    - text: 'The ''c13'' column should not contain null / missing values after numeric
        conversion. The code uses c13 in elementwise arithmetic to compute preparedness
        features (val4, val5, val6) and those results feed into risk scores; missing
        c13 would produce NaNs that propagate into risk_score and downstream binning/filters.
        Example validation: .satisfies("CASE WHEN `c13` IS NOT NULL THEN 1 ELSE 0
        END", "c13_not_null", lambda x: x == 1)'
      sources:
      - start_line: 27
        end_line: 36
        file: ''
      - start_line: 56
        end_line: 61
        file: ''
      - start_line: 87
        end_line: 88
        file: ''
      uid: 434f89c8-075c-463a-ace7-9e7bbdefa8e4
    - text: 'Values in ''c13'' are expected to be within a plausible grade/score range.
        The code scales the average of c13 and c7 by 200 (val5 = val4 / 200.0) to
        produce a 0..1-like contribution, so c13 should plausibly be between 0 and
        200. Example validation: .satisfies("CASE WHEN `c13` >= 0 AND `c13` <= 200
        THEN 1 ELSE 0 END", "c13_in_range_0_200", lambda x: x == 1)'
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      - start_line: 56
        end_line: 61
        file: ''
      uid: e40bae40-0f85-4f34-926b-ca9942492f71
    - text: 'The scale of ''c13'' should be comparable to ''c7'' (they are averaged
        and their difference is used divided by 50 to compute val6). In practice this
        means the absolute difference |c13 - c7| is expected to be reasonably small
        for most rows (e.g., <= 50). Example validation (allowing some exceptions):
        .satisfies("CASE WHEN ABS(`c13` - `c7`) <= 50 THEN 1 ELSE 0 END", "c13_close_to_c7",
