        validations: Deequ -> .hasStandardDeviation("c36", lambda x: x > 0); Great
        Expectations -> expect_column_stdev_to_be_between("c36", min_value=0, strictly=True).'
      sources:
      - start_line: 49
        end_line: 49
        file: ''
      uid: 36d41800-38ea-457b-98ae-f3cd54a3b0ab
    - text: "Column c36 must not contain infinite values (\xB1inf) or NaN after parsing,\
        \ as these would break mean/std and downstream risk scoring. Example validations:\
        \ Deequ -> .satisfies(\"CASE WHEN isfinite(`c36`) THEN 1 ELSE 0 END\", \"\
        c36 finite\", lambda x: x == 1.0); Great Expectations -> expect_column_values_to_not_be_null(\"\
        c36\") and expect_column_values_to_not_be_in_set(\"c36\", [Infinity, -Infinity])."
      sources:
      - start_line: 45
        end_line: 49
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      uid: 02ab1fc8-eb39-48c8-a9ee-f9566d70f2c0
    - text: 'Based on observed data characteristics (values roughly between -4.06
        and 3.51), at least 95% of c36 values should lie within a reasonable range
        (e.g., -5 to 5) to keep the z-score and the sigmoid-based risk stable. Example
        validations: Deequ -> .satisfies("CASE WHEN `c36` BETWEEN -5 AND 5 THEN 1
        ELSE 0 END", "c36 in expected range", lambda x: x >= 0.95); Great Expectations
        -> expect_column_values_to_be_between("c36", min_value=-5, max_value=5, mostly=0.95).'
      sources:
      - start_line: 49
        end_line: 52
        file: ''
      uid: a09741c7-3e92-4642-bc58-6b0e32c53342
