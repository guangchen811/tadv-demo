        end_line: 95
        file: ''
      uid: 0efa2c69-7f9d-41ef-8c94-8565b4ee2a47
    - text: 'For rows where enrollment ''c29'' > 0, ''c31'' (approvals) should not
        exceed ''c29'' (enrollment): c31 <= c29. This keeps pass rates within [0,1].
