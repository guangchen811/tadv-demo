    - suggestion: '.haveCompleteness(["c16", "c17"], lambda f: f == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 7e6ad28f-1be6-4ba7-b4fa-71b7c2f0d3b2
      source_assumptions:
