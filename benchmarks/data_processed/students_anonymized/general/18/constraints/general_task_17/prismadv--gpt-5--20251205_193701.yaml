        file: ''
      - start_line: 114
        end_line: 114
        file: ''
      uid: 49abd3d6-6451-4476-b251-5f53c29a0b4f
    - text: 'Column c17 uses 0 to indicate the adverse condition that increases the
        risk score (since mask1 == 1 when c17 == 0, and comp1 adds positive weight
        to the score). To ensure the scoring remains meaningful, the dataset should
        contain at least some rows with c17 == 0. A suitable rule could be: Deequ
        .satisfies("CASE WHEN CAST(c17 AS INT) = 0 THEN 1 ELSE 0 END", "c17 has zeros",
        lambda x: x > 0) or Great Expectations expect_column_values_to_be_in_set(''c17'',
        [0, 1]) combined with expect_column_proportion_of_unique_values_to_be_between(''c17'',
        min_value=0.0, max_value=1.0) and an additional check ensuring presence of
        0.'
