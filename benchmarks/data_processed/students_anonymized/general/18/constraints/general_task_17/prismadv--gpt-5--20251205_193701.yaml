    - suggestion: '.satisfies("(c16 IN (0, 1) AND c17 IN (0, 1))", "Binary domain
        for c16 and c17", lambda f: f == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: f9920b15-f37a-4a90-8e7e-2c348e13f0a3
      source_assumptions:
      - 961b0cba-26e8-480a-8951-342d8ecc293a
    assumptions:
    - text: "The majority of rows should be in the \"non\u2011risk\" joint state where\
        \ c16 == 0 AND c17 == 1. This keeps the arrears/risk flag (mask1) from dominating\
        \ the overall score. A practical constraint is: fraction of rows satisfying\
        \ (c16 = 0 AND c17 = 1) >= 0.6. Deequ example: .satisfies(\"(c16 = 0 AND c17\
        \ = 1)\", lambda f: f >= 0.6)."
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 61
        end_line: 64
        file: ''
      - start_line: 114
        end_line: 114
        file: ''
      - start_line: 123
        end_line: 131
        file: ''
      uid: c57bfeb3-79ba-4084-9629-e2ad0c509833
    - text: "The risk predicate used by the model is mask1 = (c16 == 1 OR c17 == 0);\
        \ it should have non\u2011trivial but not overwhelming prevalence to keep\
        \ comp1 informative. Enforce that the fraction of rows satisfying (c16 = 1\
        \ OR c17 = 0) is at least 0.1 (not too rare). Deequ example: .satisfies(\"\
        (c16 = 1 OR c17 = 0)\", lambda f: f >= 0.1)."
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 62
        end_line: 64
        file: ''
      - start_line: 114
        end_line: 114
        file: ''
      uid: 44634681-939f-46fc-8647-02c3402c8ea0
    - text: 'c16 and c17 are intended to convey opposite signals (risk vs. good standing).
        Their joint behavior should be inversely related. Enforce a negative correlation
        between c16 and c17 (e.g., Pearson correlation <= -0.2). Deequ example: .hasCorrelation("c16",
        "c17", lambda r: r <= -0.2).'
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 61
        end_line: 64
        file: ''
      - start_line: 114
        end_line: 114
        file: ''
      uid: 23c8dd24-62b1-44d6-a9ff-ea2bb7c1723e
    - text: 'Joint domain integrity: for every row, both c16 and c17 must be present
        and in the binary set {0,1} so that mask1 = (c16 == 1 OR c17 == 0) is well-defined.
        This can be expressed as two joint constraints: completeness(c16) = 1.0 AND
        completeness(c17) = 1.0, and row-level compliance (c16 IN (0,1) AND c17 IN
        (0,1)) = 1.0. Deequ example: .completeness("c16", _ >= 1.0), .completeness("c17",
        _ >= 1.0), .satisfies("(c16 IN (0,1) AND c17 IN (0,1))", lambda f: f == 1.0).'
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 62
        end_line: 64
        file: ''
      - start_line: 142
        end_line: 144
        file: ''
      uid: 961b0cba-26e8-480a-8951-342d8ecc293a
  '["c23","c25"]':
    code:
    - suggestion: '.haveCompleteness([''c23'', ''c25''], lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 90bffe59-f20e-4848-a9de-6353b053e3cc
      source_assumptions:
      - 2ff146f0-a56e-42bf-8aaf-735b0accd4fe
    - suggestion: '.satisfies(''c25 <= c23 AND (c23 > 0 OR c25 = 0)'', ''ap_not_exceed_en'',
        lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 185aed24-c9ce-4f21-abbd-745bbff5225b
      source_assumptions:
      - 591d0c4d-96b0-4dae-aad4-8f5fca35d75a
    - suggestion: '.hasCorrelation(''c25'', ''c23'', lambda v: v >= 0.6)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 74027f9c-67f0-43a7-b05c-672078975ee8
      source_assumptions:
      - 7c52b831-9d4b-4eaa-8f18-30379868dfc3
    assumptions:
    - text: 'Per-record approvals (c25) must not exceed enrollments (c23); additionally,
        if c23 == 0 then c25 must be 0. This keeps the pass-rate c25/c23 within [0,
        1] and avoids divide-by-zero paths. Deequ example: .addConstraint(ComplianceConstraint(''ap_not_exceed_en'',
        ''c25 <= c23 AND (c23 > 0 OR c25 = 0)'', 1.0))'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      - start_line: 106
        end_line: 118
        file: ''
      uid: d8d1a4a8-67b5-4a9d-b7f6-1a148bef78f0
    - text: 'Approvals (c25) and enrollments (c23) must exhibit a strong positive
        relationship so that the linear expectation based on correlation is meaningful;
        enforce Pearson correlation(c25, c23) >= 0.6. Deequ example: .hasCorrelation(''c25'',''c23'',
        lowerBound=0.6, upperBound=1.0)'
      sources:
      - start_line: 81
        end_line: 87
        file: ''
      uid: 591d0c4d-96b0-4dae-aad4-8f5fca35d75a
    - text: 'Both columns must be present and parseable as integers on the same rows
        (pairwise completeness = 1.0), since they are cast to int without nullable
        dtypes. Deequ example: .addConstraint(ComplianceConstraint(''c23_c25_nonnull'',
        ''c23 IS NOT NULL AND c25 IS NOT NULL'', 1.0))'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      uid: 7c52b831-9d4b-4eaa-8f18-30379868dfc3
    - text: 'At the dataset level, total approvals should not exceed total enrollments:
        sum(c25) <= sum(c23). This keeps the aggregated pass-rate (val23/val22) within
        [0,1] used downstream. Deequ approach: compute Sum(''c25'') and Sum(''c23'')
        and assert sum_c25 <= sum_c23.'
      sources:
      - start_line: 106
        end_line: 108
        file: ''
      - start_line: 115
        end_line: 115
        file: ''
      uid: 2ff146f0-a56e-42bf-8aaf-735b0accd4fe
  '["c23","c25","c27"]':
    code: []
    assumptions:
    - text: 'Semester 1 enrollment (c23) is the denominator for both approvals (c25)
        and withdrawals (c27). Therefore, for every record: 0 <= c25 <= c23 and 0
        <= c27 <= c23. This keeps pass and withdrawal rates well-defined and bounded.
        Example Deequ constraint: .satisfies("c23 >= 0 AND c25 >= 0 AND c27 >= 0 AND
        c25 <= c23 AND c27 <= c23", "enroll_bounds_for_ap_wo", _ >= 1.0)'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      - start_line: 115
        end_line: 118
        file: ''
      uid: 169a96a2-c326-4594-82c2-a8824bcff358
    - text: 'If semester 1 enrollment (c23) is zero for a record, then approvals (c25)
        and withdrawals (c27) must also be zero for that record (to avoid undefined
        or arbitrary fallback ratios). Example Deequ constraint: .satisfies("CASE
        WHEN c23 = 0 THEN (c25 = 0 AND c27 = 0) ELSE TRUE END", "zero_enrollment_implies_zero_counts",
        _ >= 1.0)'
      sources:
      - start_line: 77
        end_line: 79
        file: ''
      uid: c93f7456-2b15-4c9d-924c-8ab78d7e355f
    - text: 'Approvals (c25) should be strongly and positively correlated with enrollment
        (c23) across the dataset, and both columns must have non-zero variance so
        the linear estimator (slope/intercept) is well-defined. Example Deequ constraints:
        .hasCorrelation("c23", "c25", _ >= 0.7), plus .hasStandardDeviation("c23",
        _ > 0) and .hasStandardDeviation("c25", _ > 0)'
      sources:
      - start_line: 81
        end_line: 87
        file: ''
      uid: d6386076-4ea9-498d-8274-194723049b23
    - text: 'Approvals and withdrawals should not jointly exceed enrollment in semester
        1: c25 + c27 <= c23 (events use the same denominator and are assumed non-overlapping
        at the record level). Example Deequ constraint: .satisfies("(c25 + c27) <=
        c23", "ap_plus_wo_not_exceed_enroll", _ >= 1.0)'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      uid: 40330071-b309-4cc3-8ae0-1ce3392f50e7
  '["c26","c32"]':
    code: []
    assumptions:
    - text: "c26 and c32 are semester grade measures on the same 0\u201320 scale.\
        \ Each row must satisfy 0 <= c26 <= 20 and 0 <= c32 <= 20. This can be enforced\
        \ as a single multi-column compliance constraint, e.g., in Deequ: .satisfies(\"\
        c26 >= 0 AND c26 <= 20 AND c32 >= 0 AND c32 <= 20\", \"grades_in_0_20\")."
      sources:
      - start_line: 76
        end_line: 78
        file: ''
      - start_line: 94
        end_line: 96
        file: ''
      uid: 576ca88e-565e-431d-98de-817d07c940dc
    - text: Both c26 and c32 must be present (non-null) on the same rows; missing
        either would propagate NaNs through norm3, comp3, and the final score and
        tiers. Enforce as a multi-column completeness/compliance constraint, e.g.,
        .satisfies("c26 IS NOT NULL AND c32 IS NOT NULL", "both_grades_present").
      sources:
      - start_line: 109
        end_line: 116
        file: ''
      - start_line: 123
        end_line: 133
        file: ''
      uid: 5684d966-523c-412c-bb12-4074803b5a7a
    - text: Because c26 and c32 are averaged equally to form a single readiness factor
        (norm3), they should measure the same construct and be positively related
        across records. Enforce with a multi-column correlation constraint, e.g.,
        .hasCorrelation("c26", "c32", _ >= 0.2).
      sources:
      - start_line: 109
        end_line: 109
        file: ''
      - start_line: 116
        end_line: 116
        file: ''
      uid: d19455d8-79e7-47e2-b6fa-278fabbae75c
  '["c29","c31"]':
    code: []
    assumptions:
    - text: 'Semester 2 approvals (c31) must be less than or equal to Semester 2 enrollments
        (c29) and both must be non-negative per row. This keeps the pass-rate ap2/en2
        within [0,1] when en2 > 0. Example Deequ: .satisfies(''c29 >= 0 AND c31 >=
        0 AND c31 <= c29'', ''ap2_le_en2'')'
      sources:
      - start_line: 90
        end_line: 97
        file: ''
      uid: 32800733-881f-4f18-a564-4735c34614f7
    - text: 'No approvals without enrollment: if c29 == 0 then c31 must be 0. Example
        Deequ: .satisfies(''CASE WHEN c29 = 0 THEN c31 = 0 ELSE true END'', ''no_approvals_without_enrollment'')'
      sources:
      - start_line: 90
        end_line: 95
        file: ''
      uid: a038eee2-0a3f-49dc-8a5d-689d4bb4032c
    - text: 'Across the dataset, c29 (Semester 2 enrollments) and c31 (Semester 2
        approvals) should have a defined, positive Pearson correlation (e.g., >= 0.6),
        implying both columns have non-zero variance. Example Deequ: .hasCorrelation(''c29'',
        ''c31'', _ >= 0.6)'
      sources:
      - start_line: 99
        end_line: 101
        file: ''
      uid: 4057f903-c6ee-4016-8041-9a8e267c00d4
    - text: 'Dataset-level consistency for Semester 2: the total number of approvals
        must not exceed the total number of enrollments, i.e., SUM(c31) <= SUM(c29).
        This aligns with row-level constraints and prevents inflated aggregate pass
        rates.'
      sources:
      - start_line: 90
        end_line: 97
        file: ''
      uid: 1a30a04a-9fc2-45f9-b613-0e19ef8e9e00
    - text: 'Cross-semester consistency: total approvals across semesters must not
        exceed total enrollments across semesters per row and in aggregate, i.e.,
        c25 + c31 <= c23 + c29. Example Deequ: .satisfies(''c25 + c31 <= c23 + c29'',
        ''total_approvals_le_total_enrollments'')'
      sources:
      - start_line: 72
        end_line: 79
        file: ''
      - start_line: 90
        end_line: 108
        file: ''
      uid: 68331300-6ecc-4aee-bfc3-07d30a7d47b0
  '["c29","c31","c33"]':
    code: []
    assumptions:
    - text: 'Columns c29 (Semester 2 enrollments), c31 (Semester 2 approvals), and
        c33 (Semester 2 withdrawals) must be fully present and parseable as integers
        for all rows (no nulls or non-numeric values), since the code coerces to numeric
        and then casts to int without null handling. This can be enforced with Deequ
        as: .isComplete("c29").isComplete("c31").isComplete("c33").hasDataType("c29",
        Integral, ConstrainableDataTypes.Strict).hasDataType("c31", Integral, ConstrainableDataTypes.Strict).hasDataType("c33",
        Integral, ConstrainableDataTypes.Strict).'
      sources:
      - start_line: 90
        end_line: 93
        file: ''
      uid: 18fef1d0-8810-4bbe-b8b6-b6d24f00378d
    - text: 'Row-level consistency between enrollments and outcomes in Semester 2:
        if c29 == 0 then c31 == 0 and c33 == 0; if c29 > 0 then 0 <= c31 <= c29 and
        0 <= c33 <= c29. This ensures approval and withdrawal counts are valid fractions
        of enrollments when computing rate2 and ratio3. Deequ example: .satisfies("(c29
        = 0 AND c31 = 0 AND c33 = 0) OR (c29 > 0 AND c31 >= 0 AND c31 <= c29 AND c33
        >= 0 AND c33 <= c29)", "s2_counts_within_enrollment")'
      sources:
      - start_line: 95
        end_line: 97
        file: ''
      uid: 0e88a8d8-183f-402c-8bf9-34516cb6af72
    - text: 'Semester 2 approvals should scale positively with enrollments: c29 and
        c31 must have non-zero variance and a strong positive Pearson correlation
        (e.g., r >= 0.6), otherwise the linear expectation (val18, val19, val20) is
        ill-defined or meaningless. Deequ examples: .hasStandardDeviation("c29", _
        > 0).hasStandardDeviation("c31", _ > 0).hasCorrelation("c29", "c31", _ >=
        0.6)'
      sources:
      - start_line: 99
        end_line: 101
        file: ''
      uid: fec6e16b-89dc-4c7d-b596-4974626d96fb
    - text: 'Aggregated pass-rate across semesters must be a valid fraction when the
        total enrollment is positive: if (c23 + c29) > 0 then 0 <= (c25 + c31) <=
        (c23 + c29). This aligns with val24 = (ap1 + ap2) / (en1 + en2) used downstream.
        Deequ example: .satisfies("(c23 + c29) <= 0 OR ((c25 + c31) >= 0 AND (c25
        + c31) <= (c23 + c29))", "agg_passrate_bounds")'
      sources:
      - start_line: 106
        end_line: 108
        file: ''
      uid: a4993829-098a-429d-9e2c-7037114e8bf0
    - text: 'For rows with c29 > 0, the per-row rates used downstream should be bounded
        fractions: 0 <= c31 / c29 <= 1 and 0 <= c33 / c29 <= 1 (i.e., approvals and
        withdrawals do not exceed enrollments). Deequ example: .satisfies("c29 = 0
        OR ((c31 >= 0 AND c31 <= c29) AND (c33 >= 0 AND c33 <= c29))", "s2_ratios_in_[0,1]")'
      sources:
      - start_line: 95
        end_line: 97
        file: ''
      uid: 3a87d008-5d87-4444-8382-3d27f6d7cb58
  '["c34","c35","c36"]':
    code:
    - suggestion: '.satisfies("CAST(`c34` AS DOUBLE) IS NOT NULL AND CAST(`c35` AS
        DOUBLE) IS NOT NULL AND CAST(`c36` AS DOUBLE) IS NOT NULL", "macro_inputs_numeric_and_complete",
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 35a0b70d-f353-4dd8-956f-824308f6f9d7
      source_assumptions:
      - da46ae7b-1be6-4aee-8ca1-141df5127197
    - suggestion: '.haveCompleteness(["c34", "c35", "c36"], lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 56c8f0c0-5272-4f4c-94d2-a956cedfe51d
      source_assumptions:
      - da46ae7b-1be6-4aee-8ca1-141df5127197
    assumptions:
    - text: 'Row-wise joint completeness and numeric parseability: The columns ''c34'',
        ''c35'', and ''c36'' must all be present (non-null) and numeric in the same
        rows, because they are jointly standardized and combined into the macro-risk
        term and then into ''dropout_risk_score''. If any of the three is missing/non-numeric
        in a row, the z-scores and ''risk1'' become NaN and propagate to the final
        score and tier. We could represent this as Deequ constraints like: Check.compliance(''macro_inputs_present'',
        ''c34 IS NOT NULL AND c35 IS NOT NULL AND c36 IS NOT NULL'', _ == 1.0) together
        with Check.hasDataType(''c34'', ConstrainableDataTypes.Numeric), Check.hasDataType(''c35'',
        ConstrainableDataTypes.Numeric), Check.hasDataType(''c36'', ConstrainableDataTypes.Numeric).'
      sources:
      - start_line: 23
        end_line: 25
        file: ''
      - start_line: 45
        end_line: 52
        file: ''
      - start_line: 120
        end_line: 124
        file: ''
      - start_line: 127
        end_line: 133
        file: ''
      uid: 53b0356d-4984-4758-ae2e-c501ee9ec6eb
    - text: 'Positive, finite variance for each input column: The population standard
        deviation of each of ''c34'', ''c35'', and ''c36'' must be strictly greater
        than 0 (and finite), since each is used as a denominator in z-score standardization.
        Otherwise, division by zero/NaN would occur when computing val4/val5/val6.
        In Deequ: Check.hasStandardDeviation(''c34'', _ > 0), Check.hasStandardDeviation(''c35'',
        _ > 0), and Check.hasStandardDeviation(''c36'', _ > 0).'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      uid: da46ae7b-1be6-4aee-8ca1-141df5127197
    - text: "Finite linear combination of standardized inputs: For every row, the\
        \ standardized linear macro factor used in 'risk1' \u2014 z(c34) - z(c36)\
        \ + 0.3*z(c35) \u2014 must be finite (no NaN or \xB1Inf), ensuring 'risk1'\
        \ and thus 'dropout_risk_score' remain defined. One way to enforce this is\
        \ to precompute column means/standard deviations (m34,s34,m35,s35,m36,s36)\
        \ and apply a compliance check such as: Check.compliance('macro_linear_finite',\
        \ 'isfinite(((c34 - m34)/s34) - ((c36 - m36)/s36) + 0.3*((c35 - m35)/s35))',\
        \ _ == 1.0). Alternatively, if 'risk1' is materialized as a column, assert\
        \ its completeness: Check.isComplete('risk1')."
      sources:
      - start_line: 49
        end_line: 52
        file: ''
      - start_line: 120
        end_line: 124
        file: ''
