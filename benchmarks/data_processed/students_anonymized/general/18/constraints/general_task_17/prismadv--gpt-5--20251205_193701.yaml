  '["c13","c7"]':
    code: []
    assumptions:
    - text: "Columns 'c13' and 'c7' represent grades on the same 0\u2013200 scale,\
        \ are numeric and non-null per record. Consequently, for every row: 0 <= c13\
        \ <= 200 and 0 <= c7 <= 200, and the weighted normalized average 0.6*(c13/200)\
        \ + 0.4*(c7/200) should already fall within [0, 1] without relying on clipping.\
        \ This can be represented as Deequ satisfies constraints such as: .satisfies('(c13\
        \ >= 0 and c13 <= 200) and (c7 >= 0 and c7 <= 200)', 'grade_bounds') and .satisfies('0.6*(c13/200.0)+0.4*(c7/200.0)\
        \ >= 0 and 0.6*(c13/200.0)+0.4*(c7/200.0) <= 1', 'weighted_avg_unit_interval')."
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 121
        end_line: 124
        file: ''
      uid: 21ac7aa9-82da-4e4d-9f16-d353a0001b7d
    - text: 'Both ''c13'' and ''c7'' must be jointly complete for all rows (no null
        in either column in any record). This joint completeness can be encoded as
        a Deequ multi-column rule: .satisfies(''c13 is not null and c7 is not null'',
        ''both_grades_present'', assertion = _ == 1.0).'
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      uid: b6f1a5a5-ec74-4136-813e-51c309d01203
    - text: 'The two grade columns ''c13'' and ''c7'' should be directionally consistent
        (positively related) since they are combined into a single preparedness measure;
        enforce a minimum positive correlation across the dataset, e.g., Pearson correlation
        >= 0.2. This can be represented as a Deequ correlation constraint: .hasCorrelation(''c13'',
        ''c7'', lowerBound = 0.2).'
      sources:
      - start_line: 66
        end_line: 69
        file: ''
      uid: f99022ba-1217-4268-9796-5e39abb30014
  '["c16","c17"]':
    code:
    - suggestion: '.satisfies("(c16 = 0 AND c17 = 1)", "Non-risk joint state prevalence
        >= 0.6", lambda f: f >= 0.6)'
      validity: true
