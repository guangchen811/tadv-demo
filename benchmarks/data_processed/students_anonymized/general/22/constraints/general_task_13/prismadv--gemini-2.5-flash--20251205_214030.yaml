      uid: 766ac8aa-8520-495d-9b74-e19a68eb23e1
    - text: 'For the calculation of academic rates and ratios, the ''actual'' or ''no-evaluation''
        columns (''c25'', ''c27'', ''c31'', ''c33'') are assumed to be non-negative
        and less than or equal to their corresponding ''enrolled'' columns (''c23'',
        ''c29''). This ensures that the calculated `rate1`, `ratio1`, `rate2`, and
        `ratio2` represent meaningful proportions between 0 and 1, after handling
        potential division by zero by replacing 0 with NaN and then filling NaN with
        0. We could represent this assumption as deequ constraints like this:

        .isNonNegative("c23")

        .isNonNegative("c25")

        .isLessThanOrEqualTo("c25", "c23")

        .isNonNegative("c27")

        .isLessThanOrEqualTo("c27", "c23")

        .isNonNegative("c29")

        .isNonNegative("c31")

        .isLessThanOrEqualTo("c31", "c29")

        .isNonNegative("c33")

        .isLessThanOrEqualTo("c33", "c29")'
      sources:
