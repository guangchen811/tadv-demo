    assumptions:
    - text: 'Columns ''c16'', ''c17'', and ''c19'' are expected to be binary (0 or
        1) integer flags. This is crucial for their use in arithmetic operations (`1
        - c17`), equality comparisons (`c19 == 1`, `c17 == 1`, `c16 == 1`), and logical
        combinations to compute fee-related risks (`risk1`, `val15`) and the `urgent_fee_flag`
        (`mask5`). If these columns contain values other than 0 or 1, the arithmetic
        and logical operations may produce unexpected or incorrect results. We could
        represent this assumption as deequ constraints like this:

        .isContainedIn("c16", Array(0, 1))

        .isContainedIn("c17", Array(0, 1))

        .isContainedIn("c19", Array(0, 1))'
