    - text: 'The values in columns ''c36'', ''c34'', and ''c35'' are expected to be
        present in their respective predefined lookup lists (`list1`, `list2`, `list3`).
        This is necessary for the `.map()` operations to successfully convert these
        values into integer ordinal indices (`val16`, `val17`, `val18`) without introducing
        NaN values before `astype(int)`. This ensures that the subsequent arithmetic
        operations to calculate `risk2` are performed on valid numerical data. We
        could represent this assumption as deequ constraints like this:

        .isContainedIn("c36", Array(-4.06, -3.12, -1.7, -0.92, 0.32, 0.79, 1.74, 1.79,
        2.02, 3.51))

        .isContainedIn("c34", Array(7.6, 8.9, 9.4, 10.8, 11.1, 12.4, 12.7, 13.9, 15.5,
        16.2))

        .isContainedIn("c35", Array(-0.8, -0.3, 0.3, 0.5, 0.6, 1.4, 2.6, 2.8, 3.7))'
