    assumptions:
    - text: 'The columns ''c16'' (debtor status), ''c17'' (up-to-date status), and
        ''c19'' (scholarship status) are expected to contain binary values (0 or 1)
        as they are used in arithmetic operations (`1 - c17`) and conditional logic
        (`c19 == 1`, `c17 == 1`, `c16 == 1`, `c17 == 0`). The code explicitly checks
        for specific combinations of these columns, such as a scholarship holder also
        being up-to-date (`c19 = 1` AND `c17 = 1`) to apply a bonus, and a student
        being a debtor and not up-to-date (`c16 = 1` AND `c17 = 0`) to raise an urgent
        flag. This implies that these binary states and their specific interactions
        are meaningful and expected in the dataset for fee management and risk assessment.

        We could represent this assumption as deequ constraints like these:

        .isContainedIn(''c16'', [0, 1])

        .isContainedIn(''c17'', [0, 1])

        .isContainedIn(''c19'', [0, 1])

        .hasCompleteness(''c16'')

        .hasCompleteness(''c17'')

        .hasCompleteness(''c19'')'
      sources:
      - start_line: 69
        end_line: 74
        file: ''
      - start_line: 132
        end_line: 132
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: e86fd7b8-2347-48e6-aa79-5221d2c6dc71
    - text: 'For academic performance metrics, the number of attended credits (''c25''
        for 1st sem, ''c31'' for 2nd sem) and no-evaluation credits (''c27'' for 1st
        sem, ''c33'' for 2nd sem) are expected to be less than or equal to the enrolled
        credits (''c23'' for 1st sem, ''c29'' for 2nd sem), respectively. This ensures
        that the calculated rates (`rate1`, `rate2`) and ratios (`ratio1`, `ratio2`),
        which represent proportions of enrolled credits, logically fall within the
        [0, 1] range before being explicitly clipped by the code. The columns ''c23'',
        ''c25'', ''c27'', ''c29'', ''c31'', ''c33'' are also assumed to be non-negative
        numerical values convertible to float.

        We could represent this assumption as deequ constraints like these:

        .isNonNegative(''c23'')

        .isNonNegative(''c25'')

        .isNonNegative(''c27'')

        .isNonNegative(''c29'')

        .isNonNegative(''c31'')

        .isNonNegative(''c33'')

        .satisfies(''c25 <= c23'', ''Attended credits must not exceed enrolled credits
        (1st sem)'')

        .satisfies(''c27 <= c23'', ''No-evaluation credits must not exceed enrolled
        credits (1st sem)'')

        .satisfies(''c31 <= c29'', ''Attended credits must not exceed enrolled credits
        (2nd sem)'')

        .satisfies(''c33 <= c29'', ''No-evaluation credits must not exceed enrolled
        credits (2nd sem)'')'
