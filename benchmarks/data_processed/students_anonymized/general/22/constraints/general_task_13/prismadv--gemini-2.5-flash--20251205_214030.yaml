    assumptions:
    - text: For academic performance calculations, the number of attended evaluations
        ('c25', 'c31') and non-evaluations ('c27', 'c33') for both semesters are assumed
        to be non-negative and less than or equal to their respective total number
        of evaluations ('c23', 'c29'). This ensures that the derived rates and ratios
        (e.g., 'rate1', 'ratio1', 'rate2', 'ratio2') accurately represent valid proportions
        between 0.0 and 1.0.
      sources:
      - start_line: 101
        end_line: 102
        file: ''
      - start_line: 112
        end_line: 113
        file: ''
      uid: 091cbb77-5143-4bf2-9074-f32afbaf4a1a
    - text: The academic grades for the first and second semesters ('c26' and 'c32')
        are assumed to be numeric values between 0.0 and 20.0, inclusive. This range
        is crucial for the normalization step `(20.0 - grade) / 20.0` to produce values
        between 0.0 and 1.0, which are subsequently combined into the 'risk3' score.
      sources:
      - start_line: 103
        end_line: 103
        file: ''
      - start_line: 114
        end_line: 114
        file: ''
      - start_line: 121
        end_line: 122
        file: ''
      uid: d57303ad-ff2b-43a7-a590-4bda963be947
    - text: The columns 'c5' (attendance), 'c16' (debtor status), 'c17' (up-to-date
        status), and 'c19' (scholarship status) are assumed to be binary indicators,
        containing only values 0 or 1. This is implied by their use in arithmetic
        operations (e.g., `1 - val6`) and boolean comparisons (e.g., `v20 == 1`, `v21
        == 0`) within risk calculations and flag generation.
      sources:
      - start_line: 57
        end_line: 57
        file: ''
      - start_line: 73
        end_line: 74
        file: ''
      - start_line: 161
        end_line: 161
        file: ''
      uid: 79d502e6-8623-4765-b976-edbc2880871f
    - text: The values in macro environment columns ('c36', 'c34', 'c35') are assumed
        to be present within their respective predefined lookup lists (`list1`, `list2`,
        `list3`). This ensures successful mapping to ordinal integer indices, which
        are then used in a linear combination to compute the 'risk2' component.
      sources:
      - start_line: 85
        end_line: 87
        file: ''
      - start_line: 90
        end_line: 91
        file: ''
      uid: 4d0dee70-9727-49a6-bde6-92c35995fb2f
