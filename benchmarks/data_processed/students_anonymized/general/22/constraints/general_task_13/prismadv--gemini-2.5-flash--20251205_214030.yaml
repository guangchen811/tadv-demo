        (e.g., negative ''c31'' or ''c31'' > ''c29''), such occurrences might indicate
        data quality issues.

        We could represent this assumption as a deequ constraint like this:

        .isNonNegative("c31")

        .satisfies("`c31` <= `c29`", "c31_le_c29_ratio_bound")'
