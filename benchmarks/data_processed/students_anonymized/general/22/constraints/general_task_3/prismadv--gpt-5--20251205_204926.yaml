    - text: 'Counts over the same base: c29 is a per-row denominator for c31, c33,
        and c28. Therefore: (a) when c29 == 0 then c31 == 0 and c33 == 0 and c28 ==
        0; (b) when c29 > 0 then each numerator is bounded by the denominator: 0 <=
        c31 <= c29, 0 <= c33 <= c29, 0 <= c28 <= c29. This guarantees rates (c31/c29,
        c33/c29, c28/c29) are in [0,1] and prevents division-by-zero. Example Deequ
        checks: .where("c29 > 0").satisfies("c31 >= 0 AND c31 <= c29 AND c33 >= 0
        AND c33 <= c29 AND c28 >= 0 AND c28 <= c29") and .where("c29 = 0").satisfies("c31
        = 0 AND c33 = 0 AND c28 = 0").'
      sources:
