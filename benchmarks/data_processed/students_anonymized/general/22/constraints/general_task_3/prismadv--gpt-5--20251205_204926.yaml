    assumptions:
    - text: 'Counts over the same base: c23 is a per-row denominator for c25, c27,
        and c22. Therefore: (a) when c23 == 0 then c25 == 0 and c27 == 0 and c22 ==
        0; (b) when c23 > 0 then each numerator is bounded by the denominator: 0 <=
        c25 <= c23, 0 <= c27 <= c23, 0 <= c22 <= c23. This ensures all derived rates
        (c25/c23, c27/c23, c22/c23) are in [0,1] and no division-by-zero occurs. Example
        Deequ compliance checks: .where("c23 > 0").satisfies("c25 >= 0 AND c25 <=
        c23 AND c27 >= 0 AND c27 <= c23 AND c22 >= 0 AND c22 <= c23") and .where("c23
        = 0").satisfies("c25 = 0 AND c27 = 0 AND c22 = 0").'
