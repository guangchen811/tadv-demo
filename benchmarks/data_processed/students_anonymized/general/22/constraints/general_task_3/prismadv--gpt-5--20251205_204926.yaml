      level: warning
      uid: 3791eb7a-fdfd-494d-b692-f2e433473e32
      source_assumptions:
      - ff94d863-6673-4e1b-a999-04d702f7f353
    - suggestion: '.satisfies("CASE WHEN `c29` = 0 OR `c29` IS NULL THEN CASE WHEN
        `c31` = 0 OR `c31` IS NULL THEN 1 ELSE 0 END ELSE 1 END", "c31 must be 0 when
        c29 is 0 or NULL", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 74854340-c64d-4090-9614-1d45ccb6b4e5
      source_assumptions:
      - 544fa070-36ae-4258-8cf6-7c0647102e94
    assumptions:
    - text: The 'c31' column must be present in the input data because it is referenced
        directly to compute rate3 and rate4; if missing, the script will fail with
        a KeyError.
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      uid: d69b1244-915e-43e9-a23f-686e9d10e8cd
    - text: 'Values in ''c31'' should be numeric (parseable to numbers). Non-numeric
        values are coerced to nulls and then treated as 0 in the downstream rate calculation,
        which can distort risk; therefore, the expected assumption is that all ''c31''
        values are numeric. We could represent this as a constraint like: fraction
        of rows where cast(c31 as double) is not null == 1.0.'
      sources:
      - start_line: 46
        end_line: 48
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: 9176302f-f966-410a-bf99-86afbd168f7b
    - text: 'When ''c29'' (the denominator) is greater than 0, ''c31'' should represent
        a count bounded by the denominator: 0 <= c31 <= c29. This keeps the computed
        rate3 = c31 / c29 within [0, 1], which is implied by constructing rate4 =
        1 - rate3 and using these as weighted probabilities. Example constraint: satisfies(''CASE
        WHEN c29 > 0 THEN CASE WHEN c31 >= 0 AND c31 <= c29 THEN 1 ELSE 0 END ELSE
        1 END'', ''c31 within [0, c29] when c29 > 0'', lambda x: x == 1.0).'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      - start_line: 76
        end_line: 81
        file: ''
      uid: ff94d863-6673-4e1b-a999-04d702f7f353
    - text: 'When ''c29'' is 0 (or missing), ''c31'' should be 0 as well (i.e., no
        successes when there are zero attempts). The code treats divisions by zero
        as NaN and then sets the resulting rate to 0. Example constraint: satisfies(''CASE
        WHEN c29 = 0 THEN CASE WHEN c31 = 0 OR c31 IS NULL THEN 1 ELSE 0 END ELSE
        1 END'', ''c31 must be 0 when c29 = 0'', lambda x: x == 1.0).'
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      uid: 544fa070-36ae-4258-8cf6-7c0647102e94
