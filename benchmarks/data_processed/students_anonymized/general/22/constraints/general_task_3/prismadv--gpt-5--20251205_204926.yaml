        end_line: 63
        file: ''
      uid: 8dfbc2f8-f62f-495b-a23c-d9939b9a586e
    - text: 'Joint scale/consistency between c13 and c7 used together: they are treated
        as comparable metrics whose difference and sum are scaled by 50 and 400 respectively.
        To avoid systematic clipping and to keep the preparedness risk well-formed,
        enforce 0 <= c13 <= 200, 0 <= c7 <= 200, and c13 + c7 <= 400. Example Deequ
        check: .satisfies("c13 >= 0 AND c13 <= 200 AND c7 >= 0 AND c7 <= 200 AND c13
        + c7 <= 400").'
      sources:
