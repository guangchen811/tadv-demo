        end_line: 61
        file: ''
      uid: 7d320efc-28c8-4357-b610-01c8c4e9d0a3
    - text: "Shared scale assumption: c26 and c32 are both on a 0\u201320 scale (the\
        \ code normalizes them by dividing by 20 to compute risks). Enforce 0 <= c26\
        \ <= 20 and 0 <= c32 <= 20 so that the derived risks 1 - c26/20 and 1 - c32/20\
        \ stay within [0,1] without clipping. Example Deequ check: .satisfies(\"c26\
        \ >= 0 AND c26 <= 20 AND c32 >= 0 AND c32 <= 20\")."
      sources:
