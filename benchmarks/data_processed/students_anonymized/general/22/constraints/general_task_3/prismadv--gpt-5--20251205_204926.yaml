        end_line: 51
        file: ''
      uid: c627e73b-9563-4cb5-afd7-b720344cd769
    - text: 'Calibration consistency between label c37 and the alerting output: the
        risk threshold is set at the quantile equal to the fraction of ''Graduate''
        records, so the share of high_risk should approximately equal the share of
        non-''Graduate'' records (up to small deviations due to ties/quantile behavior).
        Post-scoring expectation: |avg(high_risk) - avg(c37 <> ''Graduate'')| <= 0.02.
