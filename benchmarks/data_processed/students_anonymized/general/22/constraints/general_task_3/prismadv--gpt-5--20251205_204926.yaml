        end_line: 68
        file: ''
      uid: b6142222-8738-48e0-ab48-9b8411608b9b
    - text: 'Binary indicator consistency across multiple columns used jointly: c17,
        c16, and c5 are treated as binary flags in logical conditions. They should
        contain only {0,1} values across all records. Example Deequ check: .satisfies("(c17
        IN (0,1)) AND (c16 IN (0,1)) AND (c5 IN (0,1))").'
      sources:
