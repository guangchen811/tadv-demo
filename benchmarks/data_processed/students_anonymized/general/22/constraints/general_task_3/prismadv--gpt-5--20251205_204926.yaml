  '["c13","c7"]':
    code: []
    assumptions:
    - text: 'Columns c13 and c7 must both be present and parseable as numeric for
        every record (no nulls or NaNs after coercion), because they are combined
        arithmetically to compute risk6 and then risk_score. Representable in Deequ
        as: .isComplete("c13").isComplete("c7").hasCompliance("c13_c7_numeric", "c13
        IS NOT NULL AND c7 IS NOT NULL AND NOT isnan(c13) AND NOT isnan(c7)")'
      sources:
      - start_line: 23
        end_line: 24
        file: ''
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 66
        end_line: 68
        file: ''
      - start_line: 83
        end_line: 92
        file: ''
      uid: 96e2584f-8c8f-441d-85b4-edc7cd5e3a13
    - text: "c13 and c7 are on the same bounded scale and should be non\u2011negative\
        \ with an upper bound consistent with the code\u2019s normalization. Enforce\
        \ 0 <= c13 <= 200, 0 <= c7 <= 200, and c13 + c7 <= 400 for at least 99% of\
        \ rows so the normalization by 400 and clipping behave as intended. Deequ\
        \ example: .hasCompliance(\"c13_c7_scale\", \"c13 >= 0 AND c13 <= 200 AND\
        \ c7 >= 0 AND c7 <= 200 AND c13 + c7 <= 400\", lambda v: v >= 0.99)"
      sources:
      - start_line: 66
        end_line: 68
        file: ''
      uid: 837cf459-6741-4cbc-b5c1-0a7c81095186
    - text: 'The absolute difference between c13 and c7 should be small relative to
        their scale (the code normalizes by 50). Require that at least 95% of records
        satisfy abs(c13 - c7) <= 50 to avoid systematic saturation of the diff-based
        risk term. Deequ example: .hasCompliance("c13_c7_consistency", "abs(c13 -
        c7) <= 50", lambda v: v >= 0.95)'
      sources:
      - start_line: 66
        end_line: 68
        file: ''
      uid: 1bae140e-c393-4480-971b-25129944ff27
    - text: 'c13 and c7 measure similar constructs and should be positively correlated.
        Enforce Pearson correlation >= 0.3. Deequ example: .hasCorrelation("c13",
        "c7", lambda r: r >= 0.3)'
      sources:
