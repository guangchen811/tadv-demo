  '["c16","c17"]':
    code: []
    assumptions:
    - text: 'Columns ''c17'' and ''c16'' are binary indicator fields encoded as numeric
        integers taking only values {0, 1}, and are complete (no nulls) for every
        row. This is required because the code performs boolean logic (c17 == 0) OR
        (c16 == 1) per record and feeds the result into the final risk score. This
        can be represented in Deequ as: .areComplete(["c17", "c16"]), .hasDataType("c17",
        ConstrainableDataTypes.Integral)(assertion = _ == true), .hasDataType("c16",
        ConstrainableDataTypes.Integral)(assertion = _ == true), .isContainedIn("c17",
        Array(0,1)), .isContainedIn("c16", Array(0,1)).'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 40
        end_line: 49
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      - start_line: 83
        end_line: 89
        file: ''
      uid: 67fc4618-7e45-4fab-aff2-1f3decd80c01
    - text: 'Both logical states needed by the risk logic over (''c17'', ''c16'')
        should be present in the dataset so that risk1 is not degenerate: at least
        one row with (c17 == 1 AND c16 == 0) yielding risk1 = 0, and at least one
        row with (c17 == 0) OR (c16 == 1) yielding risk1 = 1. This can be encoded
        in Deequ as compliance checks: .hasCompliance("risk1_zero_exists", "(c17 =
        1) AND (c16 = 0)")(r => r > 0) and .hasCompliance("risk1_one_exists", "(c17
        = 0) OR (c16 = 1)")(r => r > 0).'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      - start_line: 83
        end_line: 89
        file: ''
      uid: b131abc8-89d8-48a1-a19b-06f9511269a1
  '["c22","c23"]':
    code: []
    assumptions:
    - text: 'c22 and c23 are numerator/denominator counts from the same base. For
        every row: if c23 > 0 then 0 <= c22 <= c23; if c23 == 0 then c22 == 0. This
        ensures the derived proportion c22/c23 is well-defined and consistent with
        a rate. Example Deequ constraint: .satisfies(''CASE WHEN c23 = 0 THEN c22
        = 0 ELSE c22 >= 0 AND c22 <= c23 END'', ''c22_within_c23'')'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: 2b8b9906-f1f8-44cb-9a61-a227a8122c2f
    - text: 'Whenever any numerator that uses c23 is positive (including c22 itself),
        c23 must be strictly positive. In other words: (c22 > 0 OR c25 > 0 OR c27
        > 0) implies c23 > 0. This prevents division-by-zero cases that are currently
        masked by fillna(0). Example Deequ constraint: .satisfies(''NOT ((c22 > 0
        OR c25 > 0 OR c27 > 0) AND c23 = 0)'', ''denominator_positive_when_any_numerator_positive'')'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: ed594092-ea63-4819-a506-03d34e73eb9d
    - text: 'The proportion c22/c23 (ratio2) should be a valid rate in [0, 1] for
        all rows where c23 > 0. Example Deequ constraint: .satisfies(''c23 = 0 OR
        ((c22 / c23) >= 0 AND (c22 / c23) <= 1)'', ''ratio2_in_unit_interval'')'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 74
        end_line: 81
        file: ''
      uid: b44b0c01-bcaa-4e6b-8ae8-d011b60ec55b
  '["c22","c23","c25","c27"]':
    code: []
    assumptions:
    - text: 'c23 is the denominator for c25, c27, and c22. Whenever any of c25, c27,
        or c22 is > 0, c23 must be > 0. Equivalently: if c23 == 0 then c25 == 0 and
        c27 == 0 and c22 == 0. Deequ example: .addConstraint(Compliance(''nonzero_den_when_has_numerators'',
        ''(c23 > 0) OR (c25 = 0 AND c27 = 0 AND c22 = 0)'')).'
      sources:
      - start_line: 25
        end_line: 28
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: 56f6fd6e-cf7f-43d7-b873-bf31778c81f2
    - text: 'For rows with c23 > 0, the numerators must be bounded counts so that
        the derived rates remain within [0, 1]: 0 <= c25 <= c23, 0 <= c27 <= c23,
        and 0 <= c22 <= c23. This prevents negative values in 1 - rate calculations
        downstream. Deequ example: .addConstraint(Compliance(''rates_within_unit_interval'',
        ''(c23 <= 0) OR (c25 >= 0 AND c25 <= c23 AND c27 >= 0 AND c27 <= c23 AND c22
        >= 0 AND c22 <= c23)'')).'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 71
        end_line: 74
        file: ''
      uid: 987b7de3-d761-458b-9eac-4fb2965ad0ce
    - text: 'All of c23, c25, c27, and c22 must be numeric and non-null after coercion
        (parsing should not introduce NaNs), since they are used together in divisions
        and downstream aggregations. Deequ examples: .isComplete(''c23''), .isComplete(''c25''),
        .isComplete(''c27''), .isComplete(''c22'') and/or .addConstraint(Compliance(''no_nan_counts'',
        ''c23 IS NOT NULL AND c25 IS NOT NULL AND c27 IS NOT NULL AND c22 IS NOT NULL'')).'
      sources:
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: 6d104398-cf98-4399-8886-22767d17ea93
  '["c23","c25"]':
    code: []
    assumptions:
    - text: 'c25 is a subset/count out of the total in c23. For any row with c23 >
        0, c25 must satisfy 0 <= c25 <= c23 so that the computed rate (c25/c23) lies
        in [0,1] and its complement (1 - rate) is well-defined. Example Deequ constraint:
        .satisfies("(c23 <= 0) OR (c25 >= 0 AND c25 <= c23)", "c25_within_c23_when_positive")'
      sources:
      - start_line: 25
        end_line: 26
        file: ''
      - start_line: 52
        end_line: 54
        file: ''
      uid: 2d3ce87c-c259-492d-ad3f-7f42d0f68eaa
    - text: 'Zero total implies zero subset: if c23 == 0, then c25 must be 0. This
        avoids silently masking division-by-zero cases (denominator set to NaN and
        then filled with 0.0) that would otherwise distort rates. Example Deequ constraint:
        .satisfies("(c23 != 0) OR (c25 = 0)", "no_c25_when_c23_zero")'
      sources:
      - start_line: 52
        end_line: 53
        file: ''
      - start_line: 25
        end_line: 26
        file: ''
      uid: 8db5a1ee-db29-466d-8340-fb51aa100cb8
    - text: 'c23 and c25 must be simultaneously present and numeric for all rows (co-completeness
        and numeric coercion). Both fields are used together in division, so neither
        should be null or non-numeric when the other is present. Example Deequ constraints:
        .satisfies("isNotNull(c23) AND isNotNull(c25)", "c23_c25_both_non_null") and
        .satisfies("(c23 >= 0) AND (c25 >= 0)", "c23_c25_non_negative")'
      sources:
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 25
        end_line: 26
        file: ''
      - start_line: 52
        end_line: 53
        file: ''
      uid: c408c33d-6294-47bc-8f74-eaa2846e1dfc
  '["c23","c27"]':
    code: []
    assumptions:
    - text: 'c27 is a per-row sub-count of c23. Therefore, when c23 > 0 the ratio
        c27/c23 must be in [0, 1] (i.e., 0 <= c27 <= c23). When c23 = 0, c27 must
        be 0 so that the derived ratio is well-defined. Example Deequ constraint:
        .addConstraint(Compliance("c27_within_c23", "CASE WHEN c23 > 0 THEN c27 >=
        0 AND c27 <= c23 ELSE c27 = 0 END"))'
      sources:
      - start_line: 52
        end_line: 55
        file: ''
      uid: 40394ea1-b221-47d1-9b59-4f6925b7ca88
    - text: 'All numerators divided by c23 (c25, c27, c22) are sub-counts of c23.
        For each row: if c23 > 0 then 0 <= c25 <= c23 AND 0 <= c27 <= c23 AND 0 <=
        c22 <= c23; if c23 = 0 then c25 = 0 AND c27 = 0 AND c22 = 0. Example Deequ
        constraint: .addConstraint(Compliance("numerators_within_c23", "CASE WHEN
        c23 > 0 THEN c25 BETWEEN 0 AND c23 AND c27 BETWEEN 0 AND c23 AND c22 BETWEEN
        0 AND c23 ELSE c25 = 0 AND c27 = 0 AND c22 = 0 END"))'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: 53ea369e-f5c7-4cf9-b711-d70fd867ae0a
    - text: 'To avoid silently treating positive numerators as zero due to zero denominators
        being coerced to NaN and then filled with 0, enforce that if c27 > 0 then
        c23 > 0. Example Deequ constraint: .addConstraint(Compliance("c27_positive_implies_c23_positive",
        "NOT (c27 > 0 AND c23 = 0)"))'
      sources:
      - start_line: 52
        end_line: 55
        file: ''
      uid: bf428a89-601a-4f62-b295-a05f982909e4
  '["c26","c32"]':
    code: []
    assumptions:
    - text: 'Columns ''c26'' and ''c32'' must both be present, non-null, and numeric
        for every record, because they are used in arithmetic and averaged together
        (risk7) which then feeds into risk8, risk_score, and thresholding. A suitable
        multi-column constraint is a Deequ compliance check: .addConstraint(Compliance("c26_c32_non_null_numeric",
        "c26 IS NOT NULL AND c32 IS NOT NULL"))'
      sources:
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 76
        end_line: 81
        file: ''
      - start_line: 83
        end_line: 91
        file: ''
      - start_line: 97
        end_line: 100
        file: ''
      uid: 09edff27-c1bc-49cf-b20e-6cd8771a1ff7
    - text: "Both 'c26' and 'c32' are assumed to be measured on the same 0\u201320\
        \ scale (since each is divided by 20 to form a risk component). Values must\
        \ lie within [0, 20] to keep the derived risks within [0, 1]. This can be\
        \ enforced with a multi-column Deequ compliance: .addConstraint(Compliance(\"\
        c26_c32_in_range_0_20\", \"c26 >= 0 AND c26 <= 20 AND c32 >= 0 AND c32 <=\
        \ 20\"))"
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      uid: 3ca77bf2-2472-4353-a614-46ffbb8f4198
    - text: 'The combined contribution of ''c26'' and ''c32'' should keep their averaged
        risk component within [0, 1], which implies the sum constraint 0 <= (c26 +
        c32) <= 40 (since risk7 = (1 - c26/20 + 1 - c32/20) / 2). A multi-column compliance
        constraint is: .addConstraint(Compliance("c26_c32_sum_within_0_40", "(c26
        + c32) >= 0 AND (c26 + c32) <= 40"))'
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 5579c8ec-3877-4e30-9c42-279ef4c427a7
  '["c28","c29"]':
    code: []
    assumptions:
    - text: 'c28 and c29 form a numerator/denominator pair; when c29 > 0, c28 must
        be a non-negative count not exceeding c29, and when c29 = 0, c28 must be 0.
        This keeps the derived ratio c28/c29 well-defined and within [0,1]. We could
        represent this as a Deequ compliance constraint: .addConstraint(Compliance("c28_le_c29_and_ratio_valid",
        "(c29 = 0 AND c28 = 0) OR (c29 > 0 AND c28 >= 0 AND c28 <= c29)"))'
      sources:
      - start_line: 30
        end_line: 32
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      uid: 074831bf-b76c-456e-9237-6f32326ea67f
    - text: 'There must be no rows with a positive numerator and a zero denominator,
        i.e., not(c29 = 0 AND c28 > 0). Otherwise, the division is coerced to 0.0,
        biasing downstream rates. Deequ compliance: .addConstraint(Compliance("no_pos_num_zero_den_c28_c29",
        "NOT (c29 = 0 AND c28 > 0)"))'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      uid: 4e172c01-8874-4c4a-b358-a46950977762
    - text: 'Both c28 and c29 must be present and numeric (non-null, coercible to
        numbers) on all records, because they are used in numeric division. Suggested
        constraints: .hasCompleteness("c28", 1.0), .hasCompleteness("c29", 1.0), and
        a compliance for numeric/non-negative values such as .addConstraint(Compliance("c28_c29_nonneg_numeric",
        "c28 IS NOT NULL AND c29 IS NOT NULL AND c28 >= 0 AND c29 >= 0"))'
      sources:
      - start_line: 30
        end_line: 32
        file: ''
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      uid: 473e058d-0d41-45c3-aa91-639d0d187909
  '["c28","c29","c31","c33"]':
    code: []
    assumptions:
    - text: 'c29 is the denominator (total) for component counts c31, c33, and c28.
        Therefore, for any row with c29 > 0, each component must be within [0, c29];
        and if c29 == 0 then c31 == 0 and c33 == 0 and c28 == 0. Example Deequ constraints:

        - .satisfies("c29 <= 0 OR (c31 >= 0 AND c31 <= c29 AND c33 >= 0 AND c33 <=
        c29 AND c28 >= 0 AND c28 <= c29)", "components_bounded_by_denominator_c29")

        - .satisfies("c29 != 0 OR (c31 = 0 AND c33 = 0 AND c28 = 0)", "zero_denominator_implies_zero_components")'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      - start_line: 71
        end_line: 74
        file: ''
      uid: 58b6b53f-bb9b-4b91-b09e-931b1c2c5865
    - text: 'The derived ratios c31/c29, c33/c29, and c28/c29 are intended to be valid
        probabilities (used in complements like 1 - c31/c29), so they must lie within
        [0.0, 1.0] whenever c29 > 0. Example Deequ constraint:

        - .satisfies("c29 <= 0 OR ((c31 / c29) >= 0 AND (c31 / c29) <= 1 AND (c33
        / c29) >= 0 AND (c33 / c29) <= 1 AND (c28 / c29) >= 0 AND (c28 / c29) <= 1)",
        "ratios_within_unit_interval")'
      sources:
      - start_line: 58
        end_line: 60
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: 03556953-1c7b-42b1-adc5-89d55a6a2683
    - text: 'All four columns c29, c31, c28, and c33 must be present, numeric, and
        non-negative to support valid arithmetic across rows. Example Deequ constraints:

        - .satisfies("c29 IS NOT NULL AND c31 IS NOT NULL AND c28 IS NOT NULL AND
        c33 IS NOT NULL", "no_nulls_in_den_and_components")

        - .satisfies("c29 >= 0 AND c31 >= 0 AND c28 >= 0 AND c33 >= 0", "non_negative_den_and_components")'
      sources:
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      uid: f35dace8-1b9c-49e2-a65c-cd63ec8462f8
  '["c29","c31"]':
    code: []
    assumptions:
    - text: 'c31 is a numerator count and c29 is its denominator; across all rows
        both must be non-negative and c31 must be less than or equal to c29 so that
        rate3 = c31/c29 is always in [0, 1]. We could represent this as a Deequ constraint
        like: .satisfies("c29 >= 0 AND c31 >= 0 AND c31 <= c29", "c31_le_c29_and_nonneg").'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 57
        end_line: 59
        file: ''
      uid: 3f818806-99d7-436d-9a0c-09731cbf076a
    - text: 'Columns c28 and c33 are also component counts that share the same denominator
        c29; therefore, they must be non-negative and must not exceed c29, and when
        c29 == 0 both c28 and c33 must be 0. This can be captured with Deequ constraints
        such as: .satisfies("c29 >= 0 AND c28 >= 0 AND c33 >= 0 AND c28 <= c29 AND
        c33 <= c29", "components_bounded_by_c29") and .satisfies("(c29 != 0) OR (c28
        = 0 AND c33 = 0)", "no_positive_component_with_zero_denominator").'
      sources:
      - start_line: 40
        end_line: 48
        file: ''
      - start_line: 57
        end_line: 61
        file: ''
      uid: dfb1de8e-b81c-4c07-afee-f33953ca82f3
  '["c29","c33"]':
    code: []
    assumptions:
    - text: 'For rows with c29 > 0, the event/count numerators c31, c33, and c28 must
        each be between 0 and c29 inclusive so that the derived rates (c31/c29, c33/c29,
        c28/c29) lie within [0, 1]. Example Deequ constraint: .addConstraint(satisfies(''c29
        <= 0 OR (c31 BETWEEN 0 AND c29 AND c33 BETWEEN 0 AND c29 AND c28 BETWEEN 0
        AND c29)'', ''numerators_within_denominator''))'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      - start_line: 71
        end_line: 81
        file: ''
      uid: 1b5c5496-23c5-4a95-9ba4-9a609ef625d4
    - text: 'If c29 == 0 (no exposure), then c31, c33, and c28 must all be 0 (no events
        when the denominator is zero). Example Deequ constraint: .addConstraint(satisfies(''c29
        != 0 OR (c31 = 0 AND c33 = 0 AND c28 = 0)'', ''zero_denominator_zero_numerators''))'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      uid: 08b1fcb5-f920-46fb-b044-3fbf2c916ae4
    - text: 'If any numerator is positive (c31 > 0 OR c33 > 0 OR c28 > 0), then c29
        must be > 0. Example Deequ constraint: .addConstraint(satisfies(''NOT (c31
        > 0 OR c33 > 0 OR c28 > 0) OR c29 > 0'', ''positive_numerator_requires_positive_denominator''))'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      uid: fbd5ecab-f17f-481d-bb8e-0a08e86fdaf8
