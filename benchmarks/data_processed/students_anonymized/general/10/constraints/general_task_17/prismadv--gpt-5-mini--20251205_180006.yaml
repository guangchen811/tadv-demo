    assumptions:
    - text: 'Columns ''c36'', ''c34'', and ''c35'' must be present and fully populated
        (no nulls) across all rows. The code calls pd.to_numeric on these three columns
        and then computes column-level means/stds and per-row z-scores; if any value
        is missing the downstream z-score / sigmoid computation will yield NaN. Actionable
        checks: .isComplete([''c36'',''c34'',''c35'']) (or assert completeness==1.0
        for each column) or row-level assert that none of these three are null.'
      sources:
      - start_line: 45
        end_line: 52
        file: ''
      uid: f26e799a-1730-485e-b819-e532e34649cd
    - text: 'None of the three columns ''c36'', ''c34'', ''c35'' should be constant
        (each must have non-zero standard deviation). The code divides by std(ddof=0)
        for each column when computing z-scores; a zero std would cause division-by-zero
