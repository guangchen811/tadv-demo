    - text: 'For semester 2, ''ap2'' (approvals, column c31) must be between 0 and
        ''en2'' (enrollments, column c29) for each record (approvals cannot exceed
        enrollments and cannot be negative). A Deequ-like assertion: .satisfies("c31
        >= 0 AND c31 <= c29", ["c31", "c29"])'
