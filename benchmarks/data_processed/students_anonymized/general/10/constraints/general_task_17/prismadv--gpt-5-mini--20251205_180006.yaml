        numeric/convertible without coercion to NaN, (b) no zero-std columns (see
        above), and (c) values are within a reasonable finite range so the expression
        and sigmoid return finite results. Actionable checks: ensure no infinities
        and no NaNs in the derived expression or enforce wide numeric bounds (e.g.
        isContainedInRange on each column and/or on the derived expression).'
