  '["c26","c32"]':
    code: []
    assumptions:
    - text: 'Both columns ''c26'' and ''c32'' are numeric and present for every row
        (no missing values), because the code converts them with pd.to_numeric and
        immediately uses them to compute normalized grades and their average. Actionable
        checks: .isComplete(''c26''), .isComplete(''c32'') and a numeric-type check
        (e.g., all values finite numbers). In Deequ-like form you can express this
        as: .isComplete(''c26''), .isComplete(''c32''), and .satisfies(''isFinite(c26)
        AND isFinite(c32)'', ''numeric_and_finite_grades'').'
      sources:
      - start_line: 36
        end_line: 42
        file: ''
      - start_line: 76
        end_line: 78
        file: ''
      - start_line: 94
        end_line: 96
        file: ''
      - start_line: 109
        end_line: 109
        file: ''
      uid: bb5d7b6f-5160-481b-a485-206e9e86e393
    - text: 'Both ''c26'' and ''c32'' are on a 0..20 grading scale so that dividing
        by 20 yields a normalized value in [0,1]. Enforceable constraint: each value
        is between 0 and 20 inclusive. Example Deequ-style predicate: .satisfies(''c26
        >= 0 AND c26 <= 20 AND c32 >= 0 AND c32 <= 20'', ''grades_between_0_and_20'').'
      sources:
      - start_line: 76
        end_line: 78
        file: ''
      - start_line: 94
        end_line: 96
        file: ''
      - start_line: 109
        end_line: 115
        file: ''
      uid: c8100a87-cda9-43bc-a297-041ca1072fb9
    - text: The combined normalized grade used downstream, norm3 = (c26/20 + c32/20)/2,
        should itself fall within [0,1] for each row. This is a multi-column logical
        constraint that can be implemented directly, e.g. .satisfies(' (c26 + c32)
        / 40 >= 0 AND (c26 + c32) / 40 <= 1', 'norm3_range'). (This also catches inconsistent
        combinations even if individual bounds are not violated.)
      sources:
      - start_line: 76
        end_line: 78
        file: ''
      - start_line: 94
        end_line: 96
        file: ''
      - start_line: 109
        end_line: 115
        file: ''
      uid: 6fc40db1-6f22-4e69-b5fc-ea810511eeb1
  '["c29","c31"]':
    code: []
    assumptions:
    - text: 'For each record, c31 (ap2, approvals in semester 2) must be less than
        or equal to c29 (en2, enrollment in semester 2). This enforces that approvals
        cannot exceed enrollments. Example Deequ-like constraint: .satisfies(''c31
        <= c29'', ''approvals_not_exceed_enrollment'') (i.e., count of rows where
        c31 > c29 should be zero).'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 90
        end_line: 97
        file: ''
      uid: 9e1ebaed-0737-4340-8f9e-44688185c005
    - text: 'If c29 (en2) equals 0 then c31 (ap2) must also equal 0. This prevents
        impossible cases where approvals exist with zero enrollment. Example Deequ-like
        constraint: .satisfies(''NOT (c29 = 0) OR (c31 = 0)'', ''no_approvals_when_no_enrollment'')
        (i.e., for all rows, either en2>0 or ap2==0).'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 90
        end_line: 97
        file: ''
      uid: 818ac7e4-3ede-4b18-8d33-b4916df47c14
    - text: 'c29 (en2) should have non-zero variance and c31 (ap2) should be positively
        correlated with c29 (i.e., higher enrollment should generally imply higher
        approvals). A practical numeric check: stddev(c29) > 0 and corr(c29, c31)
        > 0.5. Example Deequ-like constraints: .satisfies(''stddev(c29) > 0'', ''enrollment_has_variation'')
        and .satisfies(''corr(c29, c31) > 0.5'', ''positive_enrollment_approval_correlation'').'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 99
        end_line: 103
        file: ''
      uid: 30ae0a70-617f-4b55-b229-436eec62aec7
  '["c29","c31","c33"]':
    code: []
    assumptions:
    - text: 'For semester 2 rows, enrollment (c29), approvals (c31) and withdrawals
        (c33) are non-negative integers and approvals and withdrawals do not exceed
        enrollment. Concretely, for every row: 0 <= c31 <= c29 and 0 <= c33 <= c29.
        (A stricter check that is also reasonable: c31 + c33 <= c29.)

        Possible constraint encodings: per-column non-negativity and integrality,
        plus row-level comparisons such as isLessOrEqual(c31, c29) and isLessOrEqual(c33,
        c29) or a row-condition (c31 + c33 <= c29).'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 90
        end_line: 97
        file: ''
      uid: 10d904c9-2bbf-44c0-ae66-c1849ee2b67f
    - text: 'c29 (enrollment) and c31 (approvals) must have enough variability to
        compute a meaningful linear relation: both columns should have non-zero standard
        deviation (not be constant) and their correlation should be finite. This is
        required for the val18 computation: val18 = ap2.std(ddof=0) / en2.std(ddof=0)
        * ap2.corr(en2).'
      sources:
      - start_line: 90
        end_line: 91
        file: ''
      - start_line: 99
        end_line: 103
        file: ''
      uid: 06009acc-71e1-4cee-947e-02292a70cb99
    - text: 'There should be at least some rows with positive semester-2 enrollment
        (c29 > 0). The code uses en2 > 0 branches to compute rates (rate2) and ratios
        (ratio3, ratio4), so a dataset where all c29 == 0 would make these rate computations
        degenerate.

        Suggested check: proportion of rows with c29 > 0 should be > 0 (and ideally
        above a practical threshold).'
      sources:
      - start_line: 95
        end_line: 97
        file: ''
      - start_line: 106
        end_line: 108
        file: ''
      uid: ec2d6a15-b717-4582-8447-1e9d506ff9ef
  '["c3","c36"]':
    code: []
    assumptions:
    - text: 'Every row must have a valid application-order value in column ''c3''
        that can be used to index the weight lookup (list1). Concretely: ''c3'' must
        be an integer and lie in the inclusive range 1..9, and it must not be null.
        At the same time, the macro feature column ''c36'' must be present and numeric
        (not NaN/Infinite) because it is standardized and used in the risk calculation.
        Example actionable checks (Deequ-style):

        - .isComplete([''c3'',''c36''])

        - .satisfies("c3 >= 1 AND c3 <= 9", "c3_in_range")

        - .satisfies("isNotNull(c36) AND isnan(c36) = false", "c36_numeric_and_not_null")'
      sources:
