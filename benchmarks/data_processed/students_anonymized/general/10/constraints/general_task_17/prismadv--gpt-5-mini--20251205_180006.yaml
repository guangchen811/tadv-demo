    - text: 'Across both semesters, total approvals should not exceed total enrollments:
        (ap1 + ap2) <= (en1 + en2). This enables valid aggregated pass-rate computation.
        A Deequ-like assertion: .satisfies("c25 + c31 <= c23 + c29", ["c25", "c31",
        "c23", "c29"])'
      sources:
      - start_line: 106
        end_line: 108
        file: ''
      uid: 5994f095-2f5f-4658-b815-8fb270aaf4be
    - text: 'The code estimates expected approvals from enrollments using a linear
        relation; this requires that ap1 (c25) and en1 (c23) have non-zero variance
        and a positive correlation (i.e., ap1 should be positively correlated with
        en1). A Deequ-like check: .hasCorrelation("c25","c23").isGreaterThan(0) and
        .satisfies("stddev(c25) > 0 AND stddev(c23) > 0", ["c25","c23"])'
      sources:
