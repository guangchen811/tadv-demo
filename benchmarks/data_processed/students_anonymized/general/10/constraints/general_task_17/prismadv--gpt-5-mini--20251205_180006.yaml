        end_line: 86
        file: ''
      uid: 55ed2011-3dfb-4d73-998d-8bbda6ae5bc8
    - text: 'Similarly for semester 2, the linear estimation expects ap2 (c31) and
        en2 (c29) to have non-zero variance and a positive correlation (ap2 positively
        correlated with en2). A Deequ-like check: .hasCorrelation("c31","c29").isGreaterThan(0)
        and .satisfies("stddev(c31) > 0 AND stddev(c29) > 0", ["c31","c29"])'
      sources:
      - start_line: 99
        end_line: 103
        file: ''
      uid: ffafdd1b-c874-4807-8ac7-2660e9c00944
    - text: 'All four columns used for enrollments/approvals (c23, c25, c29, c31)
        are expected to be present, complete (no nulls) and integral numeric types
        so integer arithmetic and comparisons are valid. Deequ-like assertions: .isComplete(["c23","c25","c29","c31"])
        and .satisfies("isWholeNumber(c23) AND isWholeNumber(c25) AND isWholeNumber(c29)
        AND isWholeNumber(c31)", ["c23","c25","c29","c31"])'
