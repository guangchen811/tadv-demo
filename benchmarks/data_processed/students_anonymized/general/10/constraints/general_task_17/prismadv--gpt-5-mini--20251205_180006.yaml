        end_line: 45
        file: ''
      - start_line: 55
        end_line: 59
        file: ''
      uid: a0460385-0193-4c41-8849-41aa6014ca38
    - text: 'The three macro inputs used to compute macro stress (v1=''c36'', v2=''c34'',
        v3=''c35'') must be numeric and have positive (non-zero) population standard
        deviation so standardization ( (x - mean) / std ) is valid (avoids divide-by-zero).
        In other words: stddev_pop(c36) > 0 AND stddev_pop(c34) > 0 AND stddev_pop(c35)
        > 0, and they should not be entirely null. Example actionable check (Deequ-style):

        - .satisfies("stddev_pop(c36) > 0 AND stddev_pop(c34) > 0 AND stddev_pop(c35)
        > 0", "macro_std_positive")

        - .isComplete([''c36'',''c34'',''c35''])'
      sources:
      - start_line: 45
        end_line: 52
        file: ''
      uid: e332d270-e3c8-4a9b-94db-e30211cad21b
    - text: 'Rows that contribute to the final score must have both the commitment-weight
        component (derived from ''c3'') and the macro-risk component (derived from
        ''c36'',''c34'',''c35'') defined. Practically: for any row used in scoring,
        c3 must be in the valid index range and c36/c34/c35 must be numeric and non-missing.
        This can be enforced as a multi-column completeness/satisfaction constraint
        so final composition (comp6 and comp7) does not produce NaNs. Example actionable
        checks:

        - .isComplete([''c3'',''c36'',''c34'',''c35''])

        - .satisfies("c3 >= 1 AND c3 <= 9 AND stddev_pop(c36) > 0", "scoring_components_present")'
      sources:
