    - text: 'c23 and c24 are jointly complete, parseable as numeric, and non-negative
        integer counts for all rows. This is required because they are used as numerator/denominator
        in ratios and compared to > 0. Example Deequ constraints: .satisfies(''c23
        IS NOT NULL AND c24 IS NOT NULL AND c23 >= 0 AND c24 >= 0'', ''c23_c24_nonnull_nonneg'')
        together with .hasDataType(''c23'', Integral) and .hasDataType(''c24'', Integral).'
