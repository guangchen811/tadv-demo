        end_line: 45
        file: ''
      uid: 3f09ef11-99b2-4669-b228-86376a85733f
    - text: 'Ratios derived from these columns should be valid probabilities: when
        c23 > 0, c24/c23 must be between 0 and 1; when c24 > 0, c25/c24 must be between
        0 and 1. Suggested Deequ constraints: satisfies("CASE WHEN c23 > 0 THEN (c24
