  '["c16","c17","c19"]':
    code: []
    assumptions:
    - text: 'Columns ''c16'', ''c17'', and ''c19'' are binary integral flags with
        allowed values exactly {0,1} and no nulls. This is required because they are
        cast to integer, combined arithmetically (0.6*c16 + 0.4*(1 - c17)), and used
        in a boolean condition ((c19 == 1) & (c17 == 0)). In Deequ, this can be captured
        with: hasDataType(''c16'',''Integral''), hasDataType(''c17'',''Integral''),
        hasDataType(''c19'',''Integral''), isComplete(''c16''), isComplete(''c17''),
        isComplete(''c19''), and isContainedIn(''c16'',[0,1]), isContainedIn(''c17'',[0,1]),
        isContainedIn(''c19'',[0,1]).'
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 5dc725eb-43a6-4ac4-9c02-c669d75d9093
    - text: 'Given the financial-risk formula risk4_preclip = 0.6*c16 + 0.4*(1 - c17)
        + (0.2 if (c19 == 1 and c17 == 0) else 0), the value determined solely by
        the tuple (c16,c17,c19) should belong to the discrete set {0.0, 0.4, 0.6,
        1.0, 1.2}. Any value outside this set indicates that at least one of the inputs
        is not correctly binary-coded. In Deequ, this can be enforced via a satisfies
        constraint such as: satisfies("(abs((0.6*c16 + 0.4*(1 - c17) + case when (c19
        = 1 and c17 = 0) then 0.2 else 0.0 end) - 0.0) < 1e-9) OR (abs(... - 0.4)
        < 1e-9) OR (abs(... - 0.6) < 1e-9) OR (abs(... - 1.0) < 1e-9) OR (abs(...
        - 1.2) < 1e-9)") with assertion on 100% compliance.'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      uid: f8870ec0-0c35-43d4-a9ee-d9ac03ace1a6
    - text: 'The pair (''c17'',''c19'') must be jointly well-defined for every row
        because the logic adds a penalty only when (c19 == 1 and c17 == 0). Thus,
        there should be no records where one of these fields is missing or outside
        {0,1} while the other is evaluated. This can be captured by a joint completeness/validity
        check such as: satisfies("(c17 IN (0,1)) AND (c19 IN (0,1))").'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      uid: 14e1ff5d-03fe-4e99-8dcb-78a5c917525b
