    code: []
    assumptions:
    - text: 'Columns c23, c24, and c25 must be simultaneously non-null and numeric
        (integers) in every row so that downstream ratio computations do not produce
        NaN/inf. Suggested Deequ constraints: satisfies("c23 IS NOT NULL AND c24 IS
        NOT NULL AND c25 IS NOT NULL", "triplet_non_null", ["c23","c24","c25"]) and
        hasDataType("c23", Integral) + hasDataType("c24", Integral) + hasDataType("c25",
