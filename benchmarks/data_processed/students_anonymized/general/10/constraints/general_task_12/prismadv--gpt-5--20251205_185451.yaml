        (<=50 difference)'', lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: e3e81f32-0a09-49a8-85eb-e412ad3ed8b3
      source_assumptions:
      - c24c2f4e-cde1-4043-a687-f980a9e4c0a4
    assumptions:
    - text: 'The input must contain the column c13 (it is accessed directly without
        existence checks). This can be represented as a constraint like: hasColumn(''c13'').'
      sources:
      - start_line: 56
        end_line: 56
        file: ''
      uid: cf4db16e-bc14-4ea7-b906-cc9d01dec762
    - text: 'All values in c13 must be numeric and remain non-null after parsing.
        The code coerces non-numeric values to NaN and then uses c13 in arithmetic
        without any fillna, so rows with non-numeric or missing values would propagate
        NaNs into downstream scores. Example constraints: completeness(''c13'') ==
        1 and satisfies(''NOT(isnan(c13))'', ''c13 numeric non-NaN'', lambda x: x
        == 1).'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 56
        end_line: 61
        file: ''
      - start_line: 78
        end_line: 79
        file: ''
      uid: 764e396a-576b-4343-a430-bbe71a1008a8
    - text: "c13 values should be on a 0\u2013200 scale so that (c13 + c7)/2 divided\
        \ by 200 yields a value in [0,1]. Example constraint: satisfies('c13 >= 0\
        \ AND c13 <= 200', 'c13 value range', lambda x: x >= 0.99)."
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      uid: 12aee96c-c2a6-4ac6-954d-8d3e0f5e03fd
    - text: 'c13 should be finite (no +/-Inf or NaN). Infinite values would distort
        computations even though later clipping may hide issues. Example constraint:
        satisfies(''NOT(isnan(c13))'', ''c13 not NaN'', lambda x: x == 1) and satisfies(''c13
        < 1e308 AND c13 > -1e308'', ''c13 finite'', lambda x: x == 1).'
      sources:
      - start_line: 58
        end_line: 61
        file: ''
      - start_line: 78
        end_line: 79
        file: ''
      uid: cfa0a0d6-29fa-4963-b90b-ddb4dd0b524c
    - text: 'c13 should be on the same grade scale as c7 such that their absolute
        difference is typically not more than 50 (the code scales their difference
        by 50 before clipping). A practical rule: satisfies(''CASE WHEN c7 IS NULL
        OR c13 IS NULL THEN 1 ELSE CASE WHEN ABS(c13 - c7) <= 50 THEN 1 ELSE 0 END
        END'', ''c13 vs c7 consistency'', lambda x: x >= 0.95).'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: c24c2f4e-cde1-4043-a687-f980a9e4c0a4
