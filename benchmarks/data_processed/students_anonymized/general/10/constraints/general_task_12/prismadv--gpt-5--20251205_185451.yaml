    - text: 'Zero-denominator consistency: if c23 == 0 then c24 must be 0; if c24
        == 0 then c25 must be 0. This aligns with how ratios are computed when denominators
        are zero and avoids silently replacing meaningful non-zero numerators with
        0. Suggested Deequ constraint: satisfies("(c23 <> 0 OR c24 = 0) AND (c24 <>
        0 OR c25 = 0)", "zero_denominator_consistency", ["c23","c24","c25"]).'
      sources:
