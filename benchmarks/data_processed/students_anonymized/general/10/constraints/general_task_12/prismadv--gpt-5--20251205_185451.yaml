        end_line: 64
        file: ''
      - start_line: 81
        end_line: 88
        file: ''
      - start_line: 110
        end_line: 116
        file: ''
      uid: d2349b37-236a-499f-bddf-d3ac08120f70
    - text: 'The ''c16'' values must be a binary indicator in the set {0, 1}. The
        financial risk calculation treats it as a weight contributing up to 0.6 toward
        a probability-like score; values outside {0,1} would distort the logic (even
        though later clipped). A suitable rule: isContainedIn(''c16'', [0, 1]) or
        expect_column_values_to_be_in_set([0, 1]).'
      sources:
      - start_line: 64
        end_line: 64
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 2d7c2b60-642d-4cb2-b5e1-f67de9488f5f
    - text: 'The ''c16'' column must be numeric and integer-castable (no non-numeric
        strings and no fractional numbers). The pipeline coerces to numeric and then
        casts to pandas ''Int64''; non-numeric or fractional values would become null
        or raise during casting. Suggested checks: satisfies("CASE WHEN c16 IS NULL
        OR c16 = CAST(c16 AS BIGINT) THEN 1 ELSE 0 END", "c16 integer-like", lambda
        x: x == 1) and/or expect_column_values_to_be_of_type(''INTEGER'').'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      uid: e0fa8ae0-dcaf-43a2-8ec7-2f3a197d8e5c
    - text: 'The ''c16'' column should have low cardinality consistent with a binary
        field (distinct values <= 2). This aligns with its use as a binary risk factor.
        Possible rule: hasNumberOfDistinctValuesBetween(''c16'', lower=1, upper=2)
        or expect_column_unique_value_count_to_be_between(min_value=1, max_value=2).'
      sources:
      - start_line: 64
        end_line: 64
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: c0e50a81-f9a1-446f-bdc9-9a4303535239
