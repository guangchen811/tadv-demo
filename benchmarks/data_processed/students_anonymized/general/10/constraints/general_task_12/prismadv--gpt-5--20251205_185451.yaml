    - text: 'Counts are nested and non-negative: c23 >= c24 >= c25 >= 0. This ensures
        the derived ratios represent valid proportions and prevents ratios > 1 or
        < 0. Suggested Deequ constraint: satisfies("c23 >= 0 AND c24 >= 0 AND c25
        >= 0 AND c23 >= c24 AND c24 >= c25", "nested_nonneg_counts", ["c23","c24","c25"]).'
