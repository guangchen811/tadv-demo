      uid: 45a13a5c-dc6b-4060-bf3d-69e2c68a174b
    - text: 'The ''c16'' column should be complete (no nulls) for all or nearly all
        rows, because nulls created by numeric coercion would propagate to NaNs in
        risk_financial and risk_score, affecting downstream decisions and sorting.
        This can be enforced as: completeness(''c16'') >= 0.99 (preferably 1.0).'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
