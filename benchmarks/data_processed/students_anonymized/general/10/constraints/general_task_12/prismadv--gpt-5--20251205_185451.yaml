    code: []
    assumptions:
    - text: 'Columns c23, c24, c25, and c27 are jointly present and represent non-negative
        numeric counts on every row. Example Deequ compliance: compliance(''engagement_non_negative_and_present'',
        ''c23 is not null and c24 is not null and c25 is not null and c27 is not null
        and c23 >= 0 and c24 >= 0 and c25 >= 0 and c27 >= 0'') >= 1.0'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 39
        end_line: 42
        file: ''
      uid: 992ca986-b45c-420c-b709-a3772baf9bcb
    - text: 'Counts are nested: c25 <= c24 <= c23 for all records so that ratios c24/c23
        and c25/c24 stay within [0, 1]. Example Deequ compliance: compliance(''counts_monotonic'',
        ''c25 <= c24 and c24 <= c23'') >= 1.0'
      sources:
      - start_line: 39
        end_line: 45
        file: ''
      uid: eb08d3c0-de78-4199-957d-a9dc61c82992
    - text: 'Zero-denominator consistency: if c23 == 0 then c24 == 0 and c25 == 0;
        and if c24 == 0 then c25 == 0. This prevents undefined ratios used in ratio1
        and ratio2. Example Deequ compliance: compliance(''zero_consistency'', ''(c23
        != 0 or c24 == 0) and (c24 != 0 or c25 == 0)'') >= 1.0'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      uid: b10b9579-b866-49aa-be8e-5042a02ea1f6
    - text: 'No engagement-events without any course activity: if c23 == 0 and c24
        == 0 and c25 == 0 then c27 must be 0. Example Deequ compliance: compliance(''no_events_without_courses'',
        ''not((c23 == 0 and c24 == 0 and c25 == 0) and c27 > 0)'') >= 1.0'
      sources:
      - start_line: 39
        end_line: 45
        file: ''
      - start_line: 70
        end_line: 71
        file: ''
      uid: 37750659-c21e-49ff-a9db-a3913d61e09a
    - text: 'Positive c27 implies some enrollment exists: if c27 > 0 then c23 > 0.
        Example Deequ compliance: compliance(''events_imply_courses'', ''c27 <= 0
        or c23 > 0'') >= 1.0'
      sources:
      - start_line: 39
        end_line: 42
        file: ''
      - start_line: 70
        end_line: 71
        file: ''
      uid: 0e7d465e-5f53-446e-a5ed-883dd5db8b18
  '["c24","c25"]':
    code: []
    assumptions:
    - text: 'Hierarchical count consistency: per row, c25 (approved) must not exceed
        c24 (evaluated), and c24 must not exceed c23 (attempted/assigned). Also, these
        are non-negative counts. Suggested Deequ constraint: .satisfies(''c24 >= 0
        AND c25 >= 0 AND c24 <= c23 AND c25 <= c24'', ''c25_le_c24_le_c23'').'
      sources:
      - start_line: 40
        end_line: 45
        file: ''
      uid: 2457dc28-103a-496c-87ef-e71a959bc7b2
    - text: 'Zero-denominator consistency: if the denominator used in a ratio is zero,
        the corresponding numerator must also be zero. Specifically: (a) if c23 =
        0 then c24 = 0; (b) if c24 = 0 then c25 = 0. Suggested Deequ constraints:
        .satisfies(''(c23 != 0) OR (c24 = 0)'', ''zero_c23_implies_c24_zero'') and
        .satisfies(''(c24 != 0) OR (c25 = 0)'', ''zero_c24_implies_c25_zero'').'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      uid: 427123fc-39ac-4bd4-a7fa-aef71e5b0df1
    - text: 'Bounded ratios when denominators are positive: for rows where c23 > 0,
        the fraction c24/c23 must be in [0, 1]; for rows where c24 > 0, the fraction
        c25/c24 must be in [0, 1]. Suggested Deequ constraints: .satisfies(''c23 <=
        0 OR (c24 / c23 >= 0 AND c24 / c23 <= 1)'', ''ratio1_bounded'') and .satisfies(''c24
        <= 0 OR (c25 / c24 >= 0 AND c25 / c24 <= 1)'', ''ratio2_bounded'').'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      uid: bc76dd34-7a3a-4402-b13a-d35feb466aa0
    - text: 'Joint completeness for the ratio triplet: rows used to compute ratios
        must have non-null values for c23, c24, and c25 simultaneously. Suggested
        Deequ constraint: .satisfies(''c23 IS NOT NULL AND c24 IS NOT NULL AND c25
        IS NOT NULL'', ''no_nulls_c23_c24_c25'').'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 40
        end_line: 45
        file: ''
      uid: 91953832-2a7e-476e-90ea-7d9561fd9cbb
  '["c26","c32"]':
    code: []
    assumptions:
    - text: 'Columns ''c26'' and ''c32'' must both be present, numeric (coercible
        to numbers), and non-null for all rows, because they are averaged and differenced
        to compute grade-based features and risk. This can be enforced as a multi-column
        completeness check such as Deequ: .satisfies(''c26 IS NOT NULL AND c32 IS
        NOT NULL'', ''c26_c32_complete'').'
      sources:
      - start_line: 20
        end_line: 36
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 48
        end_line: 50
        file: ''
      - start_line: 91
        end_line: 106
        file: ''
      uid: 6d70aec3-2ff9-4478-8206-1473bacf5885
    - text: "Grades in 'c26' and 'c32' are on the same 0\u201320 scale. Hence both\
        \ should lie in [0, 20], and their average should be <= 20 (equivalently,\
        \ c26 + c32 <= 40). Example Deequ constraint: .satisfies('c26 >= 0 AND c26\
        \ <= 20 AND c32 >= 0 AND c32 <= 20', 'c26_c32_in_range') and/or .satisfies('c26\
        \ + c32 <= 40', 'c26_c32_avg_le_20')."
      sources:
      - start_line: 48
        end_line: 50
        file: ''
      - start_line: 74
        end_line: 76
        file: ''
      uid: 70b6ed86-523c-4227-9db5-84d9c076dd06
    - text: 'The two grade columns ''c26'' and ''c32'' should be mutually consistent
        across semesters: the absolute difference |c26 - c32| should be <= 6, matching
        the stability normalization (1 - |c26 - c32|/6). Deequ example: .satisfies(''abs(c26
        - c32) <= 6'', ''c26_c32_semester_stability'').'
      sources:
      - start_line: 51
        end_line: 53
        file: ''
      uid: 0b11b6f2-81f9-4fd9-8622-c7f36a5ee195
    - text: 'Evaluation/approval counts are internally consistent: ''c24'' (approved)
        should not exceed ''c23'' (evaluated), and ''c25'' (passed) should not exceed
        ''c24'' (approved). This keeps ratio1 = c24/c23 and ratio2 = c25/c24 within
        [0, 1]. Deequ example: .satisfies(''c24 <= c23 AND c25 <= c24'', ''count_monotonicity'').'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 71
        end_line: 72
        file: ''
      uid: 39354c8b-df79-474d-b8a4-f1f8ab9ff1be
    - text: 'Financial indicators are normalized and categorical as used: ''c16''
        and ''c17'' are rates/probabilities in [0, 1], and ''c19'' is a binary indicator
        in {0, 1}. This ensures risk4 remains meaningful when applying 0.6 * c16 +
        0.4 * (1 - c17) and the conditional +0.2 when (c19 == 1) & (c17 == 0). Deequ
        example: .satisfies(''c16 >= 0 AND c16 <= 1 AND c17 >= 0 AND c17 <= 1 AND
        c19 IN (0, 1)'', ''financial_fields_in_range'').'
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 8522c65b-8524-453a-8666-44a6e8087aea
