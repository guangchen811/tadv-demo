results:
  team1:
    code:
    - suggestion: '.hasCompleteness(''team1'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN toss_winner IN (team1, team2) THEN 1 ELSE
        0 END", "toss_winner_matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN 1 WHEN winner
        IN (team1, team2) THEN 1 ELSE 0 END", "winner_valid_when_played", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN team1 <> team2 THEN 1 ELSE 0 END", "teams_different",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(team1) = team1 THEN 1 ELSE 0 END", "team1_no_leading_trailing_whitespace",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRIM(`team2`) = `team2` THEN 1 ELSE 0 END",
        "team2_no_surrounding_whitespace", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `team2` NOT LIKE ''%  %'' THEN 1 ELSE 0 END",
        "team2_no_double_spaces", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `team2` != `team1` THEN 1 ELSE 0 END", "teams_different",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        THEN ( `winner` = `team1` OR `winner` = `team2` ) ELSE true END", "winner_in_team_columns",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN (target_overs IS
        NOT NULL AND target_overs >= 0 AND target_overs <= 20) ELSE true END", "DL
        target_overs present and in [0,20]", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN CASE WHEN `result_margin`
        IS NOT NULL AND `result_margin` >= 1 AND FLOOR(`result_margin`) = `result_margin`
        THEN 1 ELSE 0 END ELSE 1 END", "run_margin_positive_integer", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN CASE WHEN `result_margin`
        IS NOT NULL AND `result_margin` BETWEEN 1 AND 10 AND FLOOR(`result_margin`)
        = `result_margin` THEN 1 ELSE 0 END ELSE 1 END", "wicket_margin_range", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` NOT IN (''runs'',''wickets'') THEN
        1 ELSE CASE WHEN `result_margin` IS NOT NULL THEN 1 ELSE 0 END END", "margin_allowed_null_for_non_win_types",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: '.isContainedIn(''toss_decision'', [''bat'',''field''], lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.satisfies("CASE WHEN `super_over` IN (''Y'',''N'') THEN 1 ELSE
        0 END", "super_over_in_YN", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' AND `super_over` = ''Y''
        THEN CASE WHEN `winner` IS NOT NULL AND `winner` IN (`team1`, `team2`) THEN
        1 ELSE 0 END ELSE 1 END", "super_over_tie_winner_present", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `toss_winner` IS NOT NULL AND `toss_winner`
        NOT IN ('''', ''NullValue'', ''null'', ''NULL'', ''None'') THEN 1 ELSE 0 END",
        "toss_winner present and not placeholder", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRIM(`toss_winner`) = `toss_winner` THEN
        1 ELSE 0 END", "toss_winner has no leading/trailing whitespace", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` IN (`team1`, `team2`) THEN
        1 ELSE 0 END", "toss_winner is one of the two teams in the match", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("CASE WHEN to_date(`date`, ''yyyy-MM-dd'') IS NOT NULL
        THEN 1 ELSE 0 END", "Valid dates", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: '.satisfies("CASE WHEN regexp_like(cast(`season` AS STRING), ''^[0-9]+$'')
        THEN 1 ELSE 0 END", "season_is_integer_like", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: '.satisfies("CASE WHEN `city` NOT IN (''NullValue'',''null'',''NULL'',''None'','''')
        THEN 1 ELSE 0 END", "City has no sentinel null tokens", lambda x: x >= 0.987)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `city` NOT IN (''NullValue'',''null'',''NULL'',''None'','''')
        THEN 1 ELSE 0 END", "City has no sentinel null tokens", lambda x: x >= 0.987)''
        failed on data sample: Value: 0.9836512261580381 does not meet the constraint
        requirement!'
      level: error
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` IN (''NullValue'',''null'',''NULL'',''None'','''')
        THEN 0 ELSE 1 END", "Method Null-like Tokens Normalized", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN `target_overs`
        IS NOT NULL AND TRY_CAST(`target_overs` AS double) IS NOT NULL THEN 1 ELSE
        0 END ELSE 1 END", "D/L rows have numeric target_overs", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL OR `method` IN (''D/L'')
        THEN 1 ELSE 0 END", "Method limited values or null", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`id` AS BIGINT) IS NOT NULL THEN
        1 ELSE 0 END", "id_is_integer", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `venue` NOT IN (''NullValue'',''null'',''NULL'',''None'','''')
        THEN 1 ELSE 0 END", "No placeholder nulls in venue", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL OR `winner` IN (''NullValue'',''null'',''NULL'',''None'','''')
        THEN 1 ELSE 0 END", "winner_null_like_tokens_allowed", lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN CASE WHEN `winner`
        IS NULL OR `winner` IN (''NullValue'',''null'',''NULL'',''None'','''') THEN
        1 ELSE 0 END ELSE 1 END", "no_result_rows_have_null_winner", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE
        WHEN `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN
        1 ELSE 0 END ELSE 1 END", "completed_matches_winner_matches_participant",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' AND `super_over` = ''Y''
        THEN CASE WHEN `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` =
        `team2`) THEN 1 ELSE 0 END WHEN `result` = ''tie'' AND (`super_over` IS NULL
        OR `super_over` <> ''Y'') THEN CASE WHEN `winner` IS NULL OR `winner` IN (''NullValue'',''null'',''NULL'',''None'','''')
        THEN 1 ELSE 0 END ELSE 1 END", "tie_super_over_winner_consistency", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL THEN CASE WHEN `winner`
        = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END ELSE 1 END", "non_null_winner_in_participating_teams",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.hasCompleteness(''result'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no result''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN CASE WHEN `winner`
        IS NULL THEN 1 ELSE 0 END ELSE 1 END", "no_result_winner_null", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT(`result` IN (''runs'',''wickets'')) OR (`winner`
        IS NOT NULL AND `result_margin` RLIKE ''.*[1-9][0-9]*.*'')", "runs_wickets_require_winner_and_positive_margin",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' AND `super_over` = ''Y''
        THEN CASE WHEN `winner` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "tie_super_over_winner_present",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' AND ( `super_over` <>
        ''Y'' OR `super_over` IS NULL ) THEN CASE WHEN `winner` IS NULL THEN 1 ELSE
        0 END ELSE 1 END", "tie_without_super_over_winner_absent", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result NOT IN (''runs'',''wickets'') OR (result_margin
        IS NOT NULL AND result_margin > 0) THEN 1 ELSE 0 END", "runs_wickets_margin_positive",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result != ''no result'' OR winner IS NULL
        THEN 1 ELSE 0 END", "nr_winner_null", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN NOT (result = ''tie'' AND super_over = ''Y'')
        OR (winner IS NOT NULL AND winner IN (team1, team2)) THEN 1 ELSE 0 END", "tie_super_over_winner_valid",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN NOT (result = ''tie'' AND (super_over IS
        NULL OR super_over != ''Y'')) OR winner IS NULL THEN 1 ELSE 0 END", "tie_no_super_over_winner_null",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("method != ''D/L'' OR (target_overs IS NOT NULL AND
        CAST(target_overs AS DOUBLE) > 0)", "dl_target_overs_present_positive", lambda
        x: x >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("method != ''D/L'' OR (target_overs
        IS NOT NULL AND CAST(target_overs AS DOUBLE) > 0)", "dl_target_overs_present_positive",
        lambda x: x >= 0.995)'' failed on data sample: Value: 0.9945504087193461 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN toss_winner IS NULL OR toss_winner IN (team1,
        team2) THEN 1 ELSE 0 END", "toss_winner_in_teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NULL OR winner IN (team1, team2)
        THEN 1 ELSE 0 END", "winner_in_teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN CASE WHEN `winner`
        IS NULL THEN 1 ELSE 0 END ELSE 1 END", "No Result rows have null winner",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' AND `super_over` = ''Y''
        THEN CASE WHEN `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` =
        `team2`) THEN 1 ELSE 0 END ELSE 1 END", "Tie + Super Over rows have a valid
        winner from participating teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN `result`
        = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "Super Over flag only present for
        tied results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
