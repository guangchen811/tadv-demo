constraints:
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("CASE WHEN result IN ('runs', 'wickets') THEN result_margin IS
        NOT NULL ELSE TRUE END", 'Result margin must be populated for wins by runs
        or wickets')
      - Valid
    assumptions: []
  season:
    code:
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies('toss_winner = team1 OR toss_winner = team2', 'Toss winner must
        be one of the two playing teams')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda x: x > 0.99, ''Winner column must be
        more than 99% complete'')'
      - Valid
    - - .satisfies("CASE WHEN result != 'no result' THEN winner IS NOT NULL ELSE TRUE
        END", 'Winner must be populated if there is a match result')
      - Valid
    assumptions: []
