    assumptions:
    - text: 'For every match record, the two competing teams must be different: team1
        != team2. This prevents self-matches and ensures team/opponent logic (t1/team,
        t2/opponent) is correct. Example Deequ-style predicate: .satisfies("team1
        != team2", ["team1","team2"], 1.0)'
      sources:
      - start_line: 24
        end_line: 33
        file: ''
      uid: fd0511d8-f8d8-4e16-83fb-725288df9a07
    - text: 'Each match should appear only once: the combination of season, date,
        team1 and team2 must be unique (no duplicate match rows). This ensures total_games
        and per-match aggregations are correct. Example Deequ constraint: .isUnique(["season","date","team1","team2"])'
      sources:
      - start_line: 17
        end_line: 18
        file: ''
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 91
        end_line: 93
        file: ''
      uid: 7e34cec1-b008-4460-aeec-77f39927cd59
    - text: 'When a match result is decisive (not ''no result'' and not ''tie''),
        the ''winner'' column must equal either team1 or team2. In logical form: (result
        IN {''no result'',''tie''}) OR (winner == team1 OR winner == team2). Example
        Deequ predicate: .satisfies("(result = ''no result'' OR result = ''tie'')
        OR (winner = team1 OR winner = team2)", ["result","winner","team1","team2"],
        1.0)'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 41
        end_line: 46
        file: ''
      uid: c9cf95c1-a0ee-47c0-a63f-bc4cc1bea06e
    - text: 'When toss_winner is present (non-null), its value must be one of the
        two teams (team1 or team2). Logical form: toss_winner IS NULL OR toss_winner
        == team1 OR toss_winner == team2. Example Deequ predicate: .satisfies("toss_winner
        IS NULL OR toss_winner = team1 OR toss_winner = team2", ["toss_winner","team1","team2"],
        1.0)'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      - start_line: 57
        end_line: 58
        file: ''
      uid: fbb4e2df-98d6-4736-9f9f-cf42b2045848
    - text: 'When result indicates a margin-based win (''runs'' or ''wickets''), result_margin
        must be a positive numeric value (> 0) and not null. Logical form: (result
        NOT IN {''runs'',''wickets''}) OR (result_margin > 0). Example Deequ predicate:
        .satisfies("(result <> ''runs'' AND result <> ''wickets'') OR (result_margin
        > 0)", ["result","result_margin"], 1.0)'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 44
        end_line: 48
        file: ''
      uid: 323a0005-7911-468b-8e51-a89c1e3ad9c1
    - text: 'At the aggregated level (per season and team), the reported matches count
        must equal the sum of outcomes: matches == wins + losses + ties + no_result.
        This ensures the per-team aggregation is consistent. Example check (post-aggregation):
        assert all(agg[''matches''] == agg[''wins''] + agg[''losses''] + agg[''ties'']
        + agg[''no_result'']).'
      sources:
      - start_line: 60
        end_line: 69
        file: ''
      - start_line: 75
