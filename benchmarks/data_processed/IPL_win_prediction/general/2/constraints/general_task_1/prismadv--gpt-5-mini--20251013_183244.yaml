        file: ''
      uid: 2aea034b-cbb2-430a-b4ef-a55e7da89c6e
  '["team1","team2","toss_winner"]':
    code: []
    assumptions:
    - text: 'For every match row, the two team identifier columns must be different:
        team1 != team2. The code assumes each match is between two distinct teams
        when it creates ''team'' and ''opponent'' pairs and later stacks them (t1/t2).
        This can be enforced as: forAll(row => row.team1 != row.team2).'
      sources:
      - start_line: 24
        end_line: 33
        file: ''
      uid: 8b00e181-53c0-4cad-8e93-dc1b5455c1ef
    - text: 'The toss_winner value must correspond to one of the teams in the match
        (either team1 or team2) for each row. The script computes toss_won by comparing
        toss_winner to team, so toss_winner should be contained in {team1, team2}
        (or be null only if explicitly allowed). Expressible as: forAll(row => row.toss_winner
        == row.team1 || row.toss_winner == row.team2).'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: b1170c2e-2f3c-470f-9a24-90623e7cf6f8
    - text: For decisive match outcomes (result == 'runs' OR result == 'wickets'),
        the winner must be exactly one of the two teams (either team1 or team2). In
        other words, when result in {'runs','wickets'} then (winner == team1 XOR winner
        == team2). This ensures the is_winner flags and points assignment behave correctly.
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 41
        end_line: 48
        file: ''
      uid: cd25b609-384d-4717-8337-3be7fd4fdd00
    - text: 'When result == ''runs'', result_margin must be a positive numeric representing
        the run margin; when result == ''wickets'', result_margin must be a positive
        numeric representing the wicket margin. The code uses result_margin as the
        margin only when the team is the winner for that result type, so require result_margin
        > 0 (and numeric) for those cases. Expressible as: forAll(row => row.result
        == ''runs'' => row.result_margin > 0) and similarly for ''wickets''.'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 44
        end_line: 48
        file: ''
      uid: ac5f96fc-5f7c-42ca-acb8-b947b1e2f04b
    - text: 'For non-decisive outcomes (''tie'' or ''no result''), the winner field
        should not match either team1 or team2 (or should be null). The code treats
        ''tie'' and ''no result'' specially (assigning tie/no_result flags and awarding
        1 point for ''no result''), so winner should not be one of the teams in those
        cases to avoid inconsistent point assignment. Expressible as: forAll(row =>
        row.result in {''tie'',''no result''} => (row.winner != row.team1 && row.winner
        != row.team2)).'
