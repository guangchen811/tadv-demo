constraints:
  date:
    code:
    - - .hasColumn('date')
      - Invalid
    - - .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .hasColumn('id')
      - Invalid
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .hasColumn('match_type')
      - Invalid
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Eliminator', 'Qualifier 1', 'Qualifier
        2', 'Final', 'Elimination Final', 'Semi Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - .hasColumn('method')
      - Invalid
    - - .isContainedIn('method', ['D/L'])
      - Valid
    assumptions: []
  result:
    code:
    - - .hasColumn('result')
      - Invalid
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasColumn('result_margin')
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("(result IN ('runs','wickets')) OR (result_margin IS NULL)", 'margin_null_when_not_decided')
      - Valid
    - - .satisfies("(result NOT IN ('runs','wickets')) OR (result_margin IS NOT NULL)",
        'margin_present_when_decided')
      - Valid
    assumptions: []
  season:
    code:
    - - .hasColumn('season')
      - Invalid
    - - .isComplete('season')
      - Valid
    - - .satisfies('(season >= 2008) AND (season <= 2024)', 'season_in_range')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .hasColumn('super_over')
      - Invalid
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasColumn('target_overs')
      - Invalid
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasColumn('target_runs')
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .hasColumn('team1')
      - Invalid
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .hasColumn('team2')
      - Invalid
    - - .isComplete('team2')
      - Valid
    assumptions: []
  teams:
    code:
    - - .satisfies('team1 <> team2', 'teams_are_distinct')
      - Valid
    assumptions: []
  tie_super_over:
    code:
    - - .satisfies("(result <> 'tie') OR (super_over = 'Y')", 'tie_games_have_super_over')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .hasColumn('toss_decision')
      - Invalid
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .hasColumn('toss_winner')
      - Invalid
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss_winner_is_a_team')
      - Valid
    assumptions: []
  venue:
    code:
    - - .hasColumn('venue')
      - Invalid
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .hasColumn('winner')
      - Invalid
    - - .satisfies("(result <> 'no result') OR (winner IS NULL)", 'no_winner_for_no_result')
      - Valid
    - - .satisfies("(result NOT IN ('runs','wickets')) OR (winner IS NOT NULL AND
        (winner = team1 OR winner = team2))", 'winner_present_for_decided_results')
      - Valid
    assumptions: []
