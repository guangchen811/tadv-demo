    - text: 'result_margin should represent whole-number margins in the contexts used:
        when result == ''wickets'', it should be an integer between 1 and 10 (inclusive).
        When result == ''runs'', it should be a non-negative integer (>= 1). The code
        casts to int(float(...)) and formats the integer into textual summaries, so
        fractional values are not meaningful and would be truncated.

        We could enforce this as two conditional checks, for example:

        .satisfies("CASE WHEN `result` = ''wickets'' THEN CASE WHEN `result_margin`
        RLIKE ''^[0-9]+$'' AND CAST(`result_margin` AS INT) BETWEEN 1 AND 10 THEN
        1 ELSE 0 END ELSE 1 END", "wickets_margin_integer_1_10", lambda x: x == 1)

        .satisfies("CASE WHEN `result` = ''runs'' THEN CASE WHEN `result_margin` RLIKE
        ''^[0-9]+$'' AND CAST(`result_margin` AS INT) >= 1 THEN 1 ELSE 0 END ELSE
        1 END", "runs_margin_integer_ge_1", lambda x: x == 1)'
      sources:
