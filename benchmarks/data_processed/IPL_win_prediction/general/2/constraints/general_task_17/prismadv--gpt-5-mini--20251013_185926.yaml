        .satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE WHEN `result_margin`
        RLIKE ''^-?\\d+(\\.\\d+)?$'' THEN 1 ELSE 0 END ELSE 1 END", "result_margin_is_numeric_for_decisive_results",
