constraints:
  city:
    code:
    - - .isStringType('city')
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isIntegral('id')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Valid
    assumptions: []
  method:
    code:
    - - .isStringType('method')
      - Invalid
    - - .satisfies("CASE WHEN method IS NOT NULL THEN method = 'D/L' ELSE TRUE END",
        "method is 'D/L' or null")
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - .isStringType('player_of_match')
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isFractional('result_margin')
      - Invalid
    - - .satisfies("CASE WHEN result IN ('runs', 'wickets') THEN FLOOR(result_margin)
        = result_margin ELSE TRUE END", "result_margin is an integer for decisive
        results")
      - Valid
    - - .satisfies("CASE WHEN result IN ('runs', 'wickets') THEN result_margin >=
        0 ELSE TRUE END", "result_margin is non-negative for decisive results")
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isIntegral('season')
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isFractional('target_overs')
      - Invalid
    - - .satisfies("CASE WHEN target_runs IS NOT NULL THEN target_overs > 0 ELSE TRUE
        END", "target_overs is positive when target_runs is present for rate calculation")
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isFractional('target_runs')
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isStringType('team1')
      - Invalid
    - - .satisfies("team1 <> team2", "team1 and team2 are distinct")
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    - - .isStringType('team2')
      - Invalid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .isStringType('toss_winner')
      - Invalid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", "toss winner is one
        of the teams")
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    - - .isStringType('umpire1')
      - Invalid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    - - .isStringType('umpire2')
      - Invalid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    - - .isStringType('venue')
      - Invalid
    assumptions: []
  winner:
    code:
    - - .isStringType('winner')
      - Invalid
    - - .satisfies("CASE WHEN result IN ('runs', 'wickets', 'tie') THEN winner IS
        NOT NULL ELSE TRUE END", "winner is present for decisive results")
      - Valid
    - - .satisfies("CASE WHEN winner IS NOT NULL THEN winner = team1 OR winner = team2
        ELSE TRUE END", "winner is one of the teams")
      - Valid
    assumptions: []
