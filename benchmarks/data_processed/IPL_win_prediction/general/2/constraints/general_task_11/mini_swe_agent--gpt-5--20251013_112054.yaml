raw_constraints:
- column_name: id
  code_for_constraint: .isUnique('id')
- column_name: date
  code_for_constraint: .isComplete('date')
- column_name: date
  code_for_constraint: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
- column_name: season
  code_for_constraint: .isComplete('season')
- column_name: season
  code_for_constraint: .hasDataType('season', ConstrainableDataTypes.Integral)
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: toss_winner
  code_for_constraint: .isComplete('toss_winner')
- column_name: toss_winner
  code_for_constraint: .satisfies("toss_winner IN (team1, team2)", 'toss_winner_in_teams')
- column_name: toss_decision
  code_for_constraint: .isComplete('toss_decision')
- column_name: toss_decision
  code_for_constraint: .isContainedIn('toss_decision', ['field', 'bat'])
- column_name: result
  code_for_constraint: .isComplete('result')
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
- column_name: winner
  code_for_constraint: .satisfies("(result = 'no result' AND (winner IS NULL OR winner
    = '')) OR (result IN ('runs','wickets','tie') AND winner IS NOT NULL)", 'winner_required_when_resulted')
- column_name: winner
  code_for_constraint: .satisfies("winner IN (team1, team2) OR winner IS NULL", 'winner_in_teams_or_null')
- column_name: result_margin
  code_for_constraint: .isNonNegative('result_margin')
- column_name: target_runs
  code_for_constraint: .isNonNegative('target_runs')
- column_name: target_overs
  code_for_constraint: .isPositive('target_overs')
- column_name: super_over
  code_for_constraint: .isContainedIn('super_over', ['Y', 'N'])
