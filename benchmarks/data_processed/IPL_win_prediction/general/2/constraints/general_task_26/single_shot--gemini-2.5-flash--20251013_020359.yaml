constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda x: x >= 0.98)'
      - Valid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .isConvertibleTo('date', ConstrainableDataTypes.Date)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isNonNegative('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.hasCompleteness(''result_margin'', lambda x: x >= 0.98)'
      - Valid
    - - .isDataType('result_margin', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isDataType('season', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isGreaterThanOrEqualTo('season', 2008)
      - Invalid
    - - .isLessThanOrEqualTo('season', 2023)
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - '.hasCompleteness(''target_overs'', lambda x: x >= 0.99)'
      - Valid
    - - .isDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isGreaterThan('target_overs', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('target_overs', 20.0)
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      - Valid
    - - .isDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isNotEqualTo('team1', 'team2')
      - Invalid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      - Valid
    assumptions: []
