fixing_results:
  '["method","target_overs"]':
    95018fe5-a126-48df-afb4-4faeff906a07: .satisfies("COALESCE(method, '') <> 'D/L'
      OR target_overs IS NOT NULL", "target_overs must be non-null for D/L method")
  '["result","result_margin","winner"]':
    e9635d34-66d5-4ac1-8466-03e78b3a864f: '.satisfies("CASE WHEN result IN (''runs'',
      ''wickets'') THEN (result_margin IS NOT NULL AND winner IS NOT NULL) WHEN result
      = ''no result'' THEN winner IS NULL WHEN result = ''tie'' AND super_over = ''Y''
      THEN winner IS NOT NULL WHEN result = ''tie'' AND (super_over != ''Y'' OR super_over
      IS NULL) THEN winner IS NULL ELSE true END", "ResultWinnerMarginConsistency",
      lambda x: x == 1)'
  '["team1","team2"]':
    bd388551-4afb-4137-8e74-a9a8e6bf8625: '.satisfies("result IN (''no result'', ''tie'')
      OR winner = team1 OR winner = team2", "winner_is_a_participant", lambda x: x
      == 1.0)'
