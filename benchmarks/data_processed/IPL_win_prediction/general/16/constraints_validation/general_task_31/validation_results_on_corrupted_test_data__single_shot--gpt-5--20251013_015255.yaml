results:
  date:
    code:
    - suggestion: .hasPattern('date', '\\d{4}-\\d{2}-\\d{2}')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("match_type IN ('League','Eliminator','Qualifier 1','Qualifier
        2','Final','Elimination Final','Semi Final')", 'match_type_domain')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .isContainedIn('method', ['D/L'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("lower(result) IN ('runs','wickets','tie','no result')",
        'result_domain')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isConvertibleTo('result_margin', 'Double')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isConvertibleTo(''result_margin'',
        ''Double'')'': ''Check'' object has no attribute ''isConvertibleTo'''
      level: error
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  result_margin,result,super_over:
    code:
    - suggestion: .satisfies("CASE WHEN lower(result) IN ('runs','wickets') THEN result_margin
        IS NOT NULL AND result_margin > 0 ELSE TRUE END", 'positive_margin_when_applicable')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('season >= 2008 AND season <= 2023', 'season_in_valid_range')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''season >= 2008 AND season <= 2023'',
        ''season_in_valid_range'')'' failed on data sample: Value: 0.885558583106267
        does not meet the constraint requirement!'
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("upper(super_over) IN ('Y','N')", 'super_over_domain')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isConvertibleTo('target_overs', 'Double')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isConvertibleTo(''target_overs'',
        ''Double'')'': ''Check'' object has no attribute ''isConvertibleTo'''
      level: error
    - suggestion: .satisfies('target_overs > 0 AND target_overs <= 20', 'overs_in_t20_range')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''target_overs > 0 AND target_overs
        <= 20'', ''overs_in_t20_range'')'' failed on data sample: Value: 0.9945504087193461
        does not meet the constraint requirement!'
      level: error
  target_runs:
    code:
    - suggestion: .isConvertibleTo('target_runs', 'Double')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isConvertibleTo(''target_runs'',
        ''Double'')'': ''Check'' object has no attribute ''isConvertibleTo'''
      level: error
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1,team2:
    code:
    - suggestion: .satisfies('team1 <> team2', 'teams_not_same')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("lower(toss_decision) IN ('bat','field')", 'toss_decision_domain')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner,team1,team2:
    code:
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner_is_a_participating_team')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner,result,super_over,team1,team2:
    code:
    - suggestion: .satisfies("CASE WHEN lower(result) = 'no result' OR (lower(result)
        = 'tie' AND upper(super_over) <> 'Y') THEN winner IS NULL ELSE (winner = team1
        OR winner = team2) END", 'winner_valid_by_result')
      status: true
      reason_if_failed: ''
      level: error
