      status: false
      reason_if_failed: 'Constraint ''satisfies("lower(`result`) = ''no result'' OR
        `season` RLIKE ''^[0-9]+$''", "season_numeric_for_kpis_rows", lambda x: x
        == 1)'' failed on data sample: Value: 0.010899182561307902 does not meet the
        constraint requirement!'
      level: error
    - suggestion: '.satisfies("(`toss_winner` = `team1`) OR (`toss_winner` = `team2`)",
        "toss_winner_matches_a_team", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["date","season"]':
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`season` AS INT) IS NOT NULL", "season is integer-like",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("to_date(`date`) IS NOT NULL", "date is parseable",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.hasPattern(''date'', ''^[0-9]{4}-[0-9]{2}-[0-9]{2}$'', lambda
        f: f >= 0.95, name=''date_iso_format_95pct'')'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("to_date(`date`) IS NULL OR `season` IS NULL OR year(to_date(`date`))
        = CAST(`season` AS INT)", "date_season_alignment", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.isPositive(''season'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("`method` IS NULL OR `method` IN (''D/L'', '''', ''NA'',
        ''NaN'', ''nan'', ''NULL'', ''Null'', ''null'', ''None'', ''NullValue'')",
        "method domain or placeholders", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn("method", ["D/L"])
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("(`winner` IS NULL) OR (`team1` IS NOT NULL AND `team2`
        IS NOT NULL)", "winner implies teams present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`result` NOT IN (''runs'',''wickets'',''tie'')) OR
        (`winner` IS NOT NULL)", "winner present for decided matches", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` != ''no result'') OR (`winner` IS NULL)",
        "no result should not have winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`winner` IS NULL) OR (`winner` = `team1`) OR (`winner`
        = `team2`)", "winner must be one of the teams", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL AND CAST(result_margin AS INT) IS NOT NULL ELSE TRUE END", "margin_present_and_int_when_result_runs_or_wickets",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","toss_winner","winner"]':
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(`result_margin` IS NULL) OR (CAST(`result_margin` AS
        DOUBLE) = CAST(`result_margin` AS BIGINT))", "result_margin integral when
        present")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `result` IN ('runs','wickets') THEN `result_margin`
