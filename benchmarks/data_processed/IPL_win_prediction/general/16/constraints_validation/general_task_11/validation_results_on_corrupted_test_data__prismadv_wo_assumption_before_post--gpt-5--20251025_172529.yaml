      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("result IS NULL OR lower(result) != ''tie'' OR upper(trim(super_over))
        = ''Y''", "tie_matches_have_super_over", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.satisfies(''(`result` = \''no result\'') OR ((`toss_winner` IS
        NOT NULL) AND ((`toss_winner` = `team1`) OR (`toss_winner` = `team2`)))'',
