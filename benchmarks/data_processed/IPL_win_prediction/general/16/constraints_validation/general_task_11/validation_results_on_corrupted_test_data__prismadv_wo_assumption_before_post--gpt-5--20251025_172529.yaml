      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` NOT IN (''tie'',''no result'')) OR (`result_margin`
        IS NULL)", "no_margin_for_tie_or_no_result", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("NOT (`result` IN (''runs'',''wickets'')) OR `result_margin`
        IS NOT NULL", "result_margin_present_for_decided_matches", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda f: f >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''super_over'', [''Y'', ''N''], lambda f: f >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`result` != ''tie'' OR `super_over` = ''Y''", "tie_requires_super_over",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`super_over` != ''Y'' OR `result` = ''tie''", "super_over_only_on_ties",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (`result` IN (''runs'',''wickets'')) OR `result_margin`
        > 0", "positive_margin_for_decided_matches", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: warning
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies(''CASE WHEN `result` IN (\''runs\'', \''wickets\'')
