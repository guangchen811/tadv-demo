      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("CASE WHEN `result` IN ('runs','wickets','tie') THEN
        (`winner` = `team1` OR `winner` = `team2`) ELSE TRUE END", "winner must be
        one of the two teams")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
