      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`team1` IS NULL OR `team2` IS NULL OR `team1` <> `team2`)",
        "teams are different when both present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`winner` IS NULL) OR (`winner` = `team1`) OR (`winner`
        = `team2`)", "winner must be one of the two teams when present", lambda x:
