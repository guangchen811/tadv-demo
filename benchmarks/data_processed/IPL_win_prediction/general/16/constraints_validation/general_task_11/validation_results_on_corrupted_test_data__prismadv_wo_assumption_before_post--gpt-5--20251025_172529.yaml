results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''TRIM(`team1`) = `team1`'', ''team1_no_outer_whitespace'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`team1` IS NOT NULL AND `team2` IS NOT NULL AND `team1`
        <> `team2`)'', ''teams_must_differ'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`winner` IS NULL) OR (`winner` = `team1`) OR (`winner`
        = `team2`)'', ''winner_in_team_pair'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(winner IS NULL) OR (winner = team1) OR (winner =
        team2)'', ''winner_matches_one_of_teams'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(team1 IS NULL OR team2 IS NULL) OR (team1 <> team2)'',
        ''teams_not_identical'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(winner <> team1) OR (team2 IS NOT NULL)'', ''team2_present_when_winner_is_team1'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` <> ''no result'' AND `target_runs`
        IS NOT NULL THEN `target_overs` > 0 ELSE TRUE END", "req_run_rate_safe_divisor",
        lambda x: x >= 0.999)'
      status: true
      reason_if_failed: ''
      level: error
  '["method","target_overs"]':
    code:
    - suggestion: '.hasCompleteness("target_overs", lambda c: c >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`target_runs` IS NULL)
        OR (`target_overs` > 0)", "target_overs_positive_when_used", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`method` IS NULL) OR (`method` = ''D/L'')", "method_domain_D_L_or_null",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("`result_margin` IS NULL OR `result_margin` = CAST(`result_margin`
        AS BIGINT)", "result_margin integer-like or NULL", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN `result_margin` IS NOT NULL ELSE TRUE END", "margin present when result
        is runs/wickets", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN `result_margin` >= 1 ELSE TRUE END", "positive margin for wins", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`target_runs` IS NOT
        NULL AND `target_overs` IS NOT NULL AND `target_overs` > 0)", "req_run_rate_defined_for_kpi",
        lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative("target_runs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["target_overs","target_runs"]':
    code:
    - suggestion: '.hasCompleteness("target_runs", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`target_overs` IS NULL OR `target_overs` > 0", "target_overs_positive_when_present",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`target_runs` IS NULL OR `target_runs` >= 0", "target_runs_non_negative_when_present",
