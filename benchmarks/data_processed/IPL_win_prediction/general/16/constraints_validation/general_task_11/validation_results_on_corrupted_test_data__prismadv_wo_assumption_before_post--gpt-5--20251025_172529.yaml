        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: '.satisfies("`toss_decision` IN (''field'', ''bat'')", "toss_decision_domain",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete("toss_decision")
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.hasCompleteness(''super_over'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("super_over IS NULL OR upper(trim(super_over)) IN (''Y'',''N'')",
