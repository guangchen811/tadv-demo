      status: true
      reason_if_failed: ''
      level: warning
  '["season","toss_decision","toss_winner"]':
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("lower(`toss_decision`) IN (''field'', ''bat'')", "toss_decision_in_expected_domain",
