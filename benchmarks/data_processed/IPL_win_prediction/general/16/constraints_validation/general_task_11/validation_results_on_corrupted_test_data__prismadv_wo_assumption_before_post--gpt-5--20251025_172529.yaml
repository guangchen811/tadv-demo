      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(`result`) <> ''no result'' AND lower(`toss_decision`)
        = ''bat''", "require_bat_decision_present_for_kpis", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(`result`) = ''no result'' OR `season` RLIKE ''^[0-9]+$''",
