      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("target_overs", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`target_runs` IS NULL AND `target_overs` IS NULL)
