results:
  date:
    code:
    - suggestion: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("NOT (result IN ('runs','wickets') AND result_margin
        IS NULL)", 'result_margin_present_when_decided')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("NOT (result IN ('tie','no result') AND result_margin
        IS NOT NULL)", 'result_margin_null_when_not_decided')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result NOT IN ('runs','wickets') OR result_margin >=
        0", 'non_negative_margin_for_decided')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .hasPattern('season', r'^\d{4}$')
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''season'', r''^\d{4}$'')'' failed
        on data sample: Expected type of column season to be StringType, but found
        DoubleType instead!'
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .satisfies('target_overs IS NULL OR target_overs >= 0', 'target_overs_non_negative_if_present')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .satisfies('target_runs IS NULL OR target_runs >= 0', 'target_runs_non_negative_if_present')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1,team2:
    code:
    - suggestion: .satisfies('team1 <> team2', 'team1_neq_team2')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner_is_team')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .isComplete('winner')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''winner'')'' failed on data sample:
        Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies("NOT (result IN ('runs','wickets') AND NOT (winner =
        team1 OR winner = team2))", 'winner_is_from_teams_when_decided')
      status: true
      reason_if_failed: ''
      level: error
