results:
  team1:
    code:
    - suggestion: '.hasNumberOfDistinctValues("team1", lambda x: x <= 50, None, 1000)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN (`winner` = `team1` OR `winner` = `team2`) THEN 1 ELSE 0 END
        ELSE 1 END", "winner_is_team1_or_team2_for_decisive_results", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `team1` IS NOT NULL AND `team2` IS NOT NULL
        AND `team1` <> `team2` THEN 1 ELSE 0 END", "team1_not_equal_team2", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `team1` = TRIM(`team1`) THEN 1 ELSE 0 END",
        "team1_no_surrounding_whitespace", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.satisfies("CASE WHEN `team2` IS NOT NULL AND TRIM(`team2`) <>
        '''' THEN 1 ELSE 0 END", "team2_not_null_not_empty", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `team2` <> `team1` THEN 1 ELSE 0 END", "team2_diff_team1",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`team2` AS DOUBLE) IS NULL AND TRIM(`team2`)
        = `team2` THEN 1 ELSE 0 END", "team2_string_canonical", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: '.isContainedIn(''match_type'', [''League'', ''Qualifier 1'', ''Qualifier
        2'', ''Final'', ''Eliminator'', ''Elimination Final'', ''Semi Final''], lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRIM(`match_type`) = `match_type` THEN 1
        ELSE 0 END", ''match_type_trimmed'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`match_type` = ''Final''", ''has_any_final'', lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies(''CASE WHEN `result` IN (\''runs\'', \''wickets\'',
        \''tie\'') THEN CASE WHEN TRY_CAST(`target_overs` AS DOUBLE) > 0 THEN 1 ELSE
        0 END ELSE 1 END'', ''target_overs_positive'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN TRY_CAST(`target_overs` AS DOUBLE) BETWEEN
        0 AND 20 THEN 1 ELSE 0 END'', ''target_overs_in_expected_range'', lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result_margin` IS NULL THEN 0 ELSE 1 END",
        "result_margin_parseable", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') AND `result_margin`
        IS NOT NULL THEN 1 ELSE 0 END", "decisive_result_margin_present", lambda x:
        x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN CASE WHEN `result_margin`
        IS NULL THEN 0 WHEN (`result_margin` % 1 = 0) AND `result_margin` BETWEEN
        1 AND 10 THEN 1 ELSE 0 END ELSE 1 END", "wicket_margin_valid", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN CASE WHEN `result_margin`
        IS NULL THEN 0 WHEN `result_margin` >= 1 AND `result_margin` <= 500 THEN 1
        ELSE 0 END ELSE 1 END", "run_margin_reasonable", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies(''CASE WHEN `result` IN (\''runs\'', \''wickets\'',
        \''tie\'') AND `target_runs` IS NOT NULL THEN 1 ELSE 0 END'', ''target_runs_non_null_in_train'',
        lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN `result` IN (\''runs\'',
        \''wickets\'', \''tie\'') AND `target_runs` IS NOT NULL THEN 1 ELSE 0 END'',
        ''target_runs_non_null_in_train'', lambda x: x >= 0.998)'' failed on data
        sample: Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''CASE WHEN (CAST(`target_runs` AS DOUBLE) - FLOOR(CAST(`target_runs`
        AS DOUBLE))) = 0 THEN 1 ELSE 0 END'', ''target_runs_integer_fraction'', lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `target_runs` IS NOT NULL THEN 1 ELSE 0
        END'', ''target_runs_overall_non_null_rate'', lambda x: x >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN `target_runs` IS NOT NULL
        THEN 1 ELSE 0 END'', ''target_runs_overall_non_null_rate'', lambda x: x >=
        0.995)'' failed on data sample: Value: 0.9945504087193461 does not meet the
        constraint requirement!'
      level: warning
  toss_decision:
    code:
    - suggestion: '.isContainedIn(''toss_decision'', [''bat'',''field''], lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_decision` = LOWER(TRIM(`toss_decision`))
        THEN 1 ELSE 0 END", "toss_decision_normalized", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.satisfies("CASE WHEN `super_over` IN (''Y'',''N'') THEN 1 ELSE
        0 END", "Valid super_over values (case-sensitive ''Y'' or ''N'')", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `toss_winner` = `team1` OR `toss_winner`
        = `team2` THEN 1 ELSE 0 END", "toss_winner_matches_team_exact", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''date'', ''^\\d{4}-\\d{2}-\\d{2}$'', lambda x: x >=
        0.95, name=''YYYY-MM-DD format'')'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.satisfies("CASE WHEN `season` > 0 AND `season` = CAST(`season`
        AS INT) THEN 1 ELSE 0 END", ''season_integer_format'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `season` > 0 AND `season`
        = CAST(`season` AS INT) THEN 1 ELSE 0 END", ''season_integer_format'', lambda
        x: x == 1.0)'' failed on data sample: Value: 0.9700272479564033 does not meet
        the constraint requirement!'
      level: error
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE
        WHEN `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN
        1 ELSE 0 END ELSE 1 END", "Winner matches one of the teams for decisive results",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' THEN CASE WHEN `winner`
        IS NULL OR lower(trim(`winner`)) = ''tie'' THEN 1 ELSE 0 END ELSE 1 END",
        "Tie rows: winner is NULL or the ''tie'' sentinel (case/whitespace normalized)",
        lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `result` = ''tie'' THEN
        CASE WHEN `winner` IS NULL OR lower(trim(`winner`)) = ''tie'' THEN 1 ELSE
        0 END ELSE 1 END", "Tie rows: winner is NULL or the ''tie'' sentinel (case/whitespace
        normalized)", lambda x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''winner'', lambda x: x >= 0.995)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IS NOT NULL THEN 1 ELSE 0 END",
        "result_not_null", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "result_allowed_values", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        THEN 1 ELSE 0 END", "fraction_trainable_results", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') AND cast(`result_margin`
        as double) IS NULL THEN 0 ELSE 1 END", "result_margin_numeric_for_decisive_results",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'',''tie'')) OR (winner
        IS NOT NULL AND (winner = team1 OR winner = team2))", "Winner matches a participating
        team for training rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (result_margin
        IS NOT NULL AND result_margin > 0)", "Positive result_margin for ''runs''
        or ''wickets'' results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'',''tie'')) OR (target_overs
        IS NOT NULL AND target_overs > 0)", "target_overs present and > 0 for training
        rows (avoid division by zero)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(toss_winner IS NULL) OR (toss_winner = team1 OR toss_winner
        = team2)", "toss_winner, if present, must be one of the participating teams",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
