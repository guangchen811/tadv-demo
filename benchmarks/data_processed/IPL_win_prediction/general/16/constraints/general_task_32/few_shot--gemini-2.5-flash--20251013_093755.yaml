constraints:
  city:
    code:
    - - .isDataType('city', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .isDataType('date', ConstrainableDataTypes.String)
      - Invalid
    - - .matchesPattern('date', '^[0-9]{4}-[0-9]{2}-[0-9]{2}$')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Final', 'Qualifier 1', 'Qualifier
        2', 'Eliminator', 'Elimination Final', 'Semi Final'])
      - Valid
    - - .isDataType('match_type', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  method:
    code:
    - - .isDataType('method', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .isDataType('player_of_match', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'], caseSensitive=False)
      - Invalid
    - - .isDataType('result', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  result_margin:
    code:
    - - .isDataType('result_margin', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("NOT (result IN ('runs', 'wickets')) OR (result_margin = CAST(result_margin
        AS INT))", "result_margin_integral_for_decided_matches")
      - Valid
    assumptions: []
  season:
    code:
    - - '.hasNumberOfDistinctValues(''season'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('season')
      - Valid
    - - .isDataType('season', ConstrainableDataTypes.Integral)
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'], caseSensitive=False)
      - Invalid
    - - .isDataType('super_over', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - .isDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - '.hasNumberOfDistinctValues(''team1'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('team1')
      - Valid
    - - .isDataType('team1', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  team2:
    code:
    - - '.hasNumberOfDistinctValues(''team2'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('team2')
      - Valid
    - - .isDataType('team2', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    - - .isDataType('toss_decision', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .isDataType('toss_winner', ConstrainableDataTypes.String)
      - Invalid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_is_team1_or_team2")
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    - - .isDataType('umpire1', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    - - .isDataType('umpire2', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    - - .isDataType('venue', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  winner:
    code:
    - - .isDataType('winner', ConstrainableDataTypes.String)
      - Invalid
    - - .satisfies("winner IS NULL OR winner = team1 OR winner = team2", "winner_is_team1_or_team2_or_null")
      - Valid
    assumptions: []
