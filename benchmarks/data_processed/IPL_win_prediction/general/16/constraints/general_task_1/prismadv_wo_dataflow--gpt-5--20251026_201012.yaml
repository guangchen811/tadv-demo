        end_line: 33
        file: ''
      - start_line: 41
        end_line: 48
        file: ''
      uid: 10ea676e-0a04-4983-903a-c9a977c09009
    - text: 'For rows with a decisive result (result not in [''tie'', ''no result'']),
        the winner must be either team1 or team2. Otherwise, both sides would be marked
        as non-winners and points would be incorrect. Example validation: Deequ satisfies("CASE
        WHEN result NOT IN (''tie'',''no result'') THEN CASE WHEN winner IN (team1,
        team2) THEN 1 ELSE 0 END ELSE 1 END", "Winner is a participating team", lambda
        x: x == 1.0).'
