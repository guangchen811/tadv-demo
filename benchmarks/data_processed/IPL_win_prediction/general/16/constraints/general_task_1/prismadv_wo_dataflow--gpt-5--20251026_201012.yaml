  '["date","id","result","result_margin","season","super_over","team1","team2","toss_winner","winner"]':
    code: []
    assumptions:
    - text: 'For every match, ''toss_winner'' must be one of the two participating
        teams: either equal to ''team1'' or to ''team2'' (and not both). This can
        be represented as a Deequ constraint like: .satisfies("(toss_winner = team1)
        OR (toss_winner = team2)", "toss_winner_in_teams")'
      sources:
      - start_line: 28
        end_line: 33
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: 24c1eb9f-3ba9-410f-81ff-d4892cfe1ae3
    - text: "Match outcome consistency between 'result' and 'winner': (a) If result\
        \ \u2208 {'runs','wickets'}, then 'winner' must be non-null and equal to exactly\
        \ one of {'team1','team2'}; (b) If result \u2208 {'tie','no result'}, then\
        \ 'winner' must be null (or at least not equal to either 'team1' or 'team2').\
        \ This ensures downstream 'is_winner', 'win/loss', and 'points' computations\
        \ behave as intended (no team gets a win on ties; both get 1 point on 'no\
        \ result'). Deequ-style constraints: .satisfies(\"((result IN ('runs','wickets'))\
        \ => (winner = team1 OR winner = team2))\", \"winner_present_when_decided\"\
        ) and .satisfies(\"((result IN ('tie','no result')) => (winner IS NULL))\"\
        , \"no_winner_when_tie_or_no_result\")"
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 41
        end_line: 48
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: 7491f3e9-b244-4acc-a1c6-56fc3668f7f6
    - text: "Use of 'result' with 'result_margin' must be internally consistent: (a)\
        \ If result = 'runs', then 'result_margin' must be >= 1; (b) If result = 'wickets',\
        \ then 'result_margin' must be an integer between 1 and 10; (c) If result\
        \ \u2208 {'tie','no result'}, then 'result_margin' must be null or 0. This\
        \ aligns with how margins are used to compute run/wicket wins and averages.\
        \ Example Deequ constraints: .satisfies(\"(result = 'runs') => (result_margin\
        \ >= 1)\", \"run_margin_positive\") ; .satisfies(\"(result = 'wickets') =>\
        \ (result_margin >= 1 AND result_margin <= 10)\", \"wicket_margin_range\"\
        ) ; .satisfies(\"(result IN ('tie','no result')) => (result_margin IS NULL\
        \ OR result_margin = 0)\", \"no_margin_when_tie_or_no_result\")"
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      uid: 9d22e260-dbea-46f1-ad61-79b45470a5b4
    - text: 'Within a match, ''team1'' and ''team2'' must be distinct teams. Otherwise,
        the long-format expansion would double-count the same team (played, win/loss,
        points) twice for a single match. Deequ constraint: .satisfies("team1 <> team2",
        "teams_are_distinct")'
      sources:
      - start_line: 28
        end_line: 34
        file: ''
      - start_line: 50
        end_line: 53
        file: ''
      uid: b6fdfaae-ed3f-476d-9274-0fe3bf03a716
  '["date","season"]':
    code: []
    assumptions:
    - text: 'For rows included in per-season computations, the ''date'' column must
        be present and parseable whenever ''season'' is present (i.e., completeness
        of ''date'' conditional on non-null ''season'' is 1.0). This enables sorting
        within each season by ''date''. Example Deequ: completeness(''date'', where=''season
        IS NOT NULL'') == 1.0 and hasDataType(''date'', TimestampType, where=''season
        IS NOT NULL'').'
      sources:
      - start_line: 20
        end_line: 20
        file: ''
      - start_line: 91
        end_line: 93
        file: ''
      uid: 757f4d5d-b42f-4da4-beb5-9594a72927cf
    - text: "Season\u2013date consistency: For each record, the calendar year derived\
        \ from 'date' must align with the 'season' label. If 'season' is a 4-digit\
        \ year Y, then year(date) = Y. If 'season' is of the form 'YYYY/YY', then\
        \ year(date) must be either YYYY or 20YY. This can be expressed as a Deequ\
        \ 'satisfies' constraint over both columns."
      sources:
      - start_line: 20
        end_line: 20
        file: ''
      - start_line: 84
        end_line: 89
        file: ''
      - start_line: 91
        end_line: 93
        file: ''
      uid: b800b5b8-0526-4de3-b66a-9ab518500a34
    - text: 'Each match identifier belongs to exactly one season: the combination
        (''season'', ''id'') must be unique across the dataset. Example Deequ: isUnique([''season'',''id'']).'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 91
        end_line: 94
        file: ''
      uid: caabe896-18ac-41d4-a43b-12c6d9fdd246
    - text: 'Within each season, dates should not span more distinct years than implied
        by the season label: distinct year(date) count per season <= 1 when ''season''
        is a single year, and <= 2 when ''season'' is a split year like ''YYYY/YY''.
        This can be checked via a grouped ''satisfies'' constraint or by ensuring
        max(year(date)) - min(year(date)) in each season is 0 for single-year seasons
        and in {0,1} for split-year seasons.'
      sources:
      - start_line: 84
        end_line: 89
        file: ''
      - start_line: 91
        end_line: 93
        file: ''
      uid: 8fd5498c-4fe5-4a25-b148-33cebe753355
