    - text: 'For matches with a decisive result (result in [''runs'', ''wickets'']),
        ''winner'' must be non-null and equal to either ''team1'' or ''team2'' for
        that row. This ensures correct points and margin calculations. Deequ-style
        example: .satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN winner IS NOT NULL AND (winner = team1 OR winner = team2) THEN 1 ELSE
        0 END ELSE 1 END", "Winner present and valid for decisive results", lambda
