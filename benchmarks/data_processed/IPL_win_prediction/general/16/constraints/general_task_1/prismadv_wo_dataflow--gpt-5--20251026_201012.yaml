      - start_line: 28
        end_line: 33
        file: ''
      - start_line: 35
        end_line: 39
        file: ''
      uid: 931ec7fe-e470-436b-b7d4-5613174b5806
    - text: 'team1 should be a clean, canonical string (trimmed; consistent casing
