constraints:
  bat_first_team:
    code:
    - - .isComplete('bat_first_team')
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  final_result:
    code:
    - - .isComplete('final_result')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .satisfies("(result NOT IN ('runs','wickets')) OR result_margin IS NOT NULL",
        'result_margin_present_for_decided')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .satisfies("method != 'D/L' OR target_overs IS NOT NULL", 'dls_target_overs_when_method')
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .satisfies("method != 'D/L' OR target_runs IS NOT NULL", 'dls_target_runs_when_method')
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("winner = team1 OR winner = team2", 'winner_is_one_of_teams')
      - Invalid
    assumptions: []
