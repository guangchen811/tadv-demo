constraints:
  match_type:
    code:
    - - '.contains(''match_type'', ''League'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Eliminator', 'Qualifier 1', 'Qualifier
        2', 'Final', 'Semi Final', 'Elimination Final'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (result_margin
        IS NOT NULL AND result_margin >= 0) ELSE true END", lambda x: x == 1.0)'
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  target_overs:
    code:
    - - '.satisfies("CASE WHEN result = ''runs'' THEN (target_overs IS NOT NULL AND
        target_overs > 0) ELSE true END", lambda x: x == 1.0)'
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'') THEN (winner
        = team1 OR winner = team2) ELSE true END", lambda x: x == 1.0)'
      - Invalid
    assumptions: []
