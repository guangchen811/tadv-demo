constraints:
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.hasCompleteness(''result_margin'', lambda x: x == 1.0, "result IN (''runs'',
        ''wickets'')")'
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - .isPositive('target_overs')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda x: x == 1.0, "result != ''no result''")'
      - Invalid
    - - .satisfies('winner IS NULL OR winner = team1 OR winner = team2', 'winner_is_one_of_the_playing_teams')
      - Valid
    assumptions: []
