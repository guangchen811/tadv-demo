constraints:
  date:
    code:
    - - .hasPattern('date', '^\d{4}-\d{2}-\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.hasCompleteness(''result_margin'', lambda x: x >= 0.98)'
      - Valid
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("(lower(trim(result)) IN ('runs','wickets') AND result_margin >=
        0) OR (lower(trim(result)) IN ('tie','no result') AND (result_margin IS NULL
        OR result_margin >= 0))", 'margin_consistent')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - '.hasCompleteness(''target_overs'', lambda x: x >= 0.98)'
      - Valid
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - '.hasCompleteness(''target_runs'', lambda x: x >= 0.98)'
      - Valid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .satisfies('team1 <> team2', 'teams_are_distinct')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner_in_teams')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      - Valid
    - - .satisfies("(lower(trim(result)) = 'no result') OR (winner = team1 OR winner
        = team2)", 'winner_defined_when_played')
      - Valid
    - - .satisfies("NOT(lower(trim(match_type)) = 'final') OR winner IS NOT NULL",
        'final_has_winner')
      - Valid
    assumptions: []
