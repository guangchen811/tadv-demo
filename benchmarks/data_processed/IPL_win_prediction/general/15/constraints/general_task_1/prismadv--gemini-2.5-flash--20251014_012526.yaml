        indicates a decisive outcome (''runs'' or ''wickets''), then ''winner'' must
        not be null. Conversely, if ''result'' indicates a non-decisive outcome (''tie''
        or ''no result''), then ''winner'' must be null.

        We could represent this assumption as deequ constraints like these:

        .withColumn("winner_not_null_if_decisive", ~(col("result").isin("runs", "wickets")
        & col("winner").isNull())).isAlwaysTrue("winner_not_null_if_decisive")

        .withColumn("winner_null_if_non_decisive", ~(col("result").isin("tie", "no
        result") & col("winner").isNotNull())).isAlwaysTrue("winner_null_if_non_decisive")'
