results:
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("result NOT IN ('runs', 'wickets') OR result_margin IS
        NOT NULL", 'result_margin must be present for results by runs or wickets')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .satisfies("super_over <> 'Y' OR result = 'tie'", 'A super over
        can only happen if the result is a tie')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("super_over <> ''Y'' OR result =
        ''tie''", ''A super over can only happen if the result is a tie'')'' failed
        on data sample: Value: 0.997275204359673 does not meet the constraint requirement!'
      level: error
  team1:
    code:
    - suggestion: .satisfies('team1 <> team2', 'team1 and team2 must be different')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("result = 'no result' OR winner IS NOT NULL", 'winner
        must be present if a result exists')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'winner must be one of the competing teams')
      status: true
      reason_if_failed: ''
      level: error
