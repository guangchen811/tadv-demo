results:
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies('CASE WHEN method = \'D/L\' THEN target_runs IS NOT NULL
        AND target_overs IS NOT NULL AND target_overs > 0 ELSE true END', 'dls_requires_targets_and_positive_overs')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no
        result''])'' failed on data sample: Value: 0.9700272479564033 does not meet
        the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN result IN (\'runs\', \'wickets\') THEN result_margin
        IS NOT NULL AND result_margin > 0 ELSE true END', 'margin_present_and_positive_for_decisive_results')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('season BETWEEN 2000 AND 2100', 'season_in_range')
      status: true
      reason_if_failed: ''
      level: error
  season,date:
    code:
    - suggestion: .satisfies('date IS NULL OR year(date) = season', 'season_matches_year_when_date_present')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN super_over = \'Y\' THEN result = \'tie\' AND
        winner IS NOT NULL ELSE true END', 'super_over_only_after_tie_and_winner_present')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN super_over = \''Y\''
        THEN result = \''tie\'' AND winner IS NOT NULL ELSE true END'', ''super_over_only_after_tie_and_winner_present'')''
        failed on data sample: Value: 0.997275204359673 does not meet the constraint
        requirement!'
      level: error
  target_overs:
    code:
    - suggestion: .isNonNegative('target_overs')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1,team2:
    code:
    - suggestion: .satisfies('team1 <> team2', 'opposing_teams_different')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .satisfies('toss_winner IS NULL OR (toss_winner = team1 OR toss_winner
        = team2)', 'toss_winner_is_participating_team')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies('CASE WHEN match_type = \'League\' AND result <> \'no
        result\' THEN winner IS NOT NULL ELSE true END', 'winner_present_when_result_exists_in_league')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('winner IS NULL OR (winner = team1 OR winner = team2)',
        'winner_is_one_of_the_teams')
      status: true
      reason_if_failed: ''
      level: error
