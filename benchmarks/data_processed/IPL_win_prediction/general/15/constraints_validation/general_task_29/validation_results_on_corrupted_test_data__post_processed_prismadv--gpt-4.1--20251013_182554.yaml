results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''player_of_match'', lambda
        x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: .satisfies('CASE WHEN super_over = "Y" THEN player_of_match IS NOT
        NULL ELSE TRUE END', 'Super Over Player of Match Non-null')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies('((`result` IN ("runs", "wickets") AND `result_margin`
        IS NOT NULL) OR (`result` NOT IN ("runs", "wickets") AND `result_margin` IS
        NULL))', 'result_margin nullness matches result semantics')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''((`result` IN ("runs", "wickets")
        AND `result_margin` IS NOT NULL) OR (`result` NOT IN ("runs", "wickets") AND
        `result_margin` IS NULL))'', ''result_margin nullness matches result semantics'')''
        failed on data sample: Value: 0.9727520435967303 does not meet the constraint
        requirement!'
      level: error
  super_over:
    code:
    - suggestion: '.hasCompleteness(''super_over'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`toss_winner` = `team1` OR `toss_winner` = `team2`
        OR `toss_winner` = `winner`)', 'Toss winner must be a valid team')
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies(''date IS NOT NULL'', ''All dates are parseable to datetime'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies(''super_over != "Y" OR (season IS NOT NULL AND date
        IS NOT NULL)'', ''Super Over Season and Date Non-Null'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN CASE WHEN
        `winner` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner Present For Played
        Matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN CASE WHEN
        `winner` = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END ELSE 1 END", "Winner
        Is One Of The Teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`result` IN (''tie'', ''no result'')", "Few ties or
        no results", lambda x: x <= 0.02)'
      status: true
      reason_if_failed: ''
      level: warning
  '["player_of_match","winner"]':
    code:
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'Winner must be one of team1 or team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('super_over != "Y" OR (winner IS NOT NULL AND player_of_match
        IS NOT NULL)', 'Winner and Player-of-Match completeness for Super Over matches')
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: .satisfies("((`result` = 'tie' AND `super_over` = 'Y') OR (`result`
        != 'tie' AND `super_over` = 'N'))", "Tie and Super Over Mutual Dependency")
      status: false
      reason_if_failed: 'Constraint ''satisfies("((`result` = ''tie'' AND `super_over`
        = ''Y'') OR (`result` != ''tie'' AND `super_over` = ''N''))", "Tie and Super
        Over Mutual Dependency")'' failed on data sample: Value: 0.997275204359673
        does not meet the constraint requirement!'
      level: error
  '["result","winner"]':
    code:
    - suggestion: .satisfies("CASE WHEN `result` != 'no result' THEN (`winner` = `team1`
        OR `winner` = `team2`) ELSE true END", "Winner must be one of the teams when
        result is not 'no result'")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `result` IN ('tie', 'no result') THEN (`team1`
        IS NOT NULL AND `team2` IS NOT NULL) ELSE true END", "Both teams must be present
        for tie or no result")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: .satisfies('(`winner` = `team1` OR `winner` = `team2` OR `winner`
        IS NULL)', 'Winner is one of the two teams or null')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`team1` != `team2`', 'A team cannot play against itself')
      status: true
      reason_if_failed: ''
      level: error
