results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isPositive('target_overs')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .isPositive('target_runs')
      status: true
      reason_if_failed: ''
      level: error
