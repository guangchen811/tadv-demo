results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 = trim(team1)", "team1_trimmed", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(toss_winner = team1) OR (toss_winner = team2)", "toss_winner_in_match",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(result)) = ''no result'' OR winner = team1
        OR winner = team2", "winner_in_match_when_played", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "distinct_match_teams", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("trim(team2) <> ''''", "team2_not_blank", lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team2 <> team1'', ''team1_vs_team2_distinct'', lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(toss_winner = team1) OR (toss_winner = team2)'',
        ''toss_winner_in_teams'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team2 = trim(team2)'', ''team2_no_leading_trailing_whitespace'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League','Final','Qualifier 1','Qualifier
        2','Eliminator','Elimination Final','Semi Final'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN match_type IS NULL THEN 1 ELSE CASE WHEN
        match_type = TRIM(match_type) THEN 1 ELSE 0 END END", "match_type trimmed",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(TRIM(match_type)) = ''league'' THEN
        CASE WHEN TRIM(match_type) = ''League'' THEN 1 ELSE 0 END ELSE 1 END", "canonical
        League casing", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(TRIM(match_type)) = ''final'' THEN
        CASE WHEN TRIM(match_type) = ''Final'' THEN 1 ELSE 0 END ELSE 1 END", "canonical
        Final casing", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(match_type) = ''League'' THEN 1 ELSE
        0 END", "at least one League row", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(match_type) = ''Final'' THEN 1 ELSE
        0 END", "at least one Final row", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN CAST(result_margin AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END", "result_margin mostly numeric-parseable", lambda x: x
        >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN CAST(result_margin AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END", "result_margin mostly numeric-parseable",
        lambda x: x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'')
        THEN CASE WHEN CAST(result_margin AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END
        ELSE 1 END", "result_margin present and numeric when result is runs/wickets",
        lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'')
        THEN CASE WHEN CAST(result_margin AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE 1
        END", "positive margins for runs/wickets", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'')
        THEN CASE WHEN CAST(result_margin AS DOUBLE) IS NOT NULL AND (CAST(result_margin
        AS DOUBLE) % 1) = 0 THEN 1 ELSE 0 END ELSE 1 END", "integer margins for runs/wickets",
        lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'')
        THEN 1 ELSE CASE WHEN result_margin IS NULL THEN 1 ELSE 0 END END", "margin
        null when not runs/wickets", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN lower(trim(result)) IN
        (''runs'',''wickets'') THEN 1 ELSE CASE WHEN result_margin IS NULL THEN 1
        ELSE 0 END END", "margin null when not runs/wickets", lambda x: x == 1)''
        failed on data sample: Value: 0.9727520435967303 does not meet the constraint
        requirement!'
      level: warning
  toss_decision:
    code:
    - suggestion: '.satisfies("lower(trim(`toss_decision`)) IN (''bat'',''field'')",
        "toss_decision_domain", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("toss_decision")
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.satisfies("CASE WHEN super_over IS NULL THEN 1 WHEN UPPER(TRIM(CAST(super_over
        AS STRING))) IN (''Y'',''N'') THEN 1 ELSE 0 END", "super_over_YN_only", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''super_over'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''length(trim(`toss_winner`)) > 0'', ''toss_winner_nonempty'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`toss_winner` = `team1` OR `toss_winner` = `team2`'',
        ''toss_winner_in_teams'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`toss_winner` = trim(`toss_winner`)'', ''toss_winner_trimmed'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("to_timestamp(`date`) IS NOT NULL", "date_parseable",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("date", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(to_timestamp(`date`) IS NULL OR cast(`season` as int)
        IS NULL) OR (year(to_timestamp(`date`)) = cast(`season` as int))", "date_year_matches_season",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) <> ''no result'' THEN
        CASE WHEN winner IS NOT NULL AND (winner = team1 OR winner = team2) THEN 1
        ELSE 0 END ELSE 1 END", "Winner present and valid on played matches", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("winner", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("winner", lambda x: x >= 0.99)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.satisfies("winner IS NULL OR winner = trim(winner)", "Winner values
        are trimmed", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN winner IS NULL THEN 1 ELSE CASE WHEN winner
        = team1 OR winner = team2 THEN 1 ELSE 0 END END", "Winner must be one of the
        two teams", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(result)) IN (''runs'',''wickets'',''tie'',''no
        result'')", "Valid result categories", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("lower(trim(result)) IN (''runs'',''wickets'',''tie'',''no
        result'')", "Valid result categories", lambda x: x == 1.0)'' failed on data
        sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'')
        THEN result_margin IS NOT NULL ELSE TRUE END", "Margin present for win results",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'')
        THEN result_margin > 0 ELSE TRUE END", "Positive margin for win results",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''tie'',''no result'')
        THEN result_margin IS NULL ELSE TRUE END", "No margin for tie/no result",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: ".satisfies(\"( (lower(trim(`result`)) IN ('runs','wickets') AND\
        \ `result_margin` IS NOT NULL AND CAST(`result_margin` AS DOUBLE) > 0) OR\
        \ (lower(trim(`result`)) IN ('tie','no result') AND `result_margin` IS NULL)\
        \ )\", \"Result\u2013margin coupling valid\", lambda v: v == 1.0)"
      status: false
      reason_if_failed: "Constraint 'satisfies(\"( (lower(trim(`result`)) IN ('runs','wickets')\
        \ AND `result_margin` IS NOT NULL AND CAST(`result_margin` AS DOUBLE) > 0)\
        \ OR (lower(trim(`result`)) IN ('tie','no result') AND `result_margin` IS\
        \ NULL) )\", \"Result\u2013margin coupling valid\", lambda v: v == 1.0)' failed\
        \ on data sample: Value: 0.9700272479564033 does not meet the constraint requirement!"
      level: warning
    - suggestion: '.satisfies("(`toss_winner` = `team1` OR `toss_winner` = `team2`)",
        "Toss winner must be one of the two teams", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("( (lower(trim(`result`)) <> ''no result'' AND `winner`
        IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`)) OR (lower(trim(`result`))
        = ''no result'' AND `winner` IS NULL) )", "Winner validity by match result",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("(lower(result) <> ''runs'') OR (result_margin IS NOT
        NULL AND result_margin > 0)", "runs_margin_rule", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(lower(result) <> ''wickets'') OR (result_margin IS
        NOT NULL AND CAST(result_margin AS INT) = result_margin AND result_margin
        BETWEEN 1 AND 10)", "wickets_margin_rule", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(lower(result) <> ''no result'') OR (upper(super_over)
        = ''N'')", "no_result_no_superover", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(lower(result) <> ''no result'') OR (result_margin
        IS NULL)", "no_result_no_margin", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(lower(result) <> ''tie'') OR (upper(super_over) =
        ''Y'')", "tie_requires_superover", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(lower(result) = ''no result'') OR (winner = team1
        OR winner = team2)", "winner_is_a_team_when_played", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(toss_winner = team1 OR toss_winner = team2)", "toss_winner_is_a_team",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) <> ''no result'' THEN
        `winner` IS NOT NULL ELSE `winner` IS NULL END", "winner_null_by_result",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) <> ''no result'' THEN
        (`winner` = `team1` OR `winner` = `team2`) ELSE TRUE END", "winner_in_teams_when_played",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) = ''runs'' THEN `result_margin`
        > 0 WHEN lower(trim(`result`)) = ''wickets'' THEN `result_margin` >= 1 AND
        `result_margin` <= 10 AND `result_margin` = FLOOR(`result_margin`) ELSE `result_margin`
        IS NULL END", "result_margin_by_type", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN lower(trim(`result`)) =
        ''runs'' THEN `result_margin` > 0 WHEN lower(trim(`result`)) = ''wickets''
        THEN `result_margin` >= 1 AND `result_margin` <= 10 AND `result_margin` =
        FLOOR(`result_margin`) ELSE `result_margin` IS NULL END", "result_margin_by_type",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9727520435967303 does
        not meet the constraint requirement!'
      level: warning
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "tossWinnerAmongTeams", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`team1` <> `team2`", "teamsAreDifferent", lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("team1 <> team2", "team1_team2_distinct", lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_in_teams",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(lower(trim(result)) = ''no result'' AND winner IS
        NULL) OR (lower(trim(result)) <> ''no result'' AND (winner = team1 OR winner
        = team2))", "winner_consistent_with_result_and_teams", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "winner_in_teams_when_present", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
