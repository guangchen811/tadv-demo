results:
  team1:
    code:
    - suggestion: '.satisfies("team1 IS NOT NULL AND TRIM(team1) <> ''''", "team1_present_and_not_blank",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("match_type <> ''League'' OR TRIM(team1) <> TRIM(team2)",
        "league_matches_teams_distinct", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("match_type <> ''League'' OR (winner IS NULL OR winner
        = ''no result'' OR winner = team1 OR winner = team2)", "winner_matches_team_or_nr",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(team1) = team1 AND TRIM(team2) = team2", "teams_no_surrounding_whitespace",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.satisfies(''CASE WHEN `team1` IS NOT NULL AND `team2` IS NOT NULL
        AND `team1` <> `team2` THEN 1 ELSE 0 END'', ''distinct_teams_per_match'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN TRIM(`team2`) = `team2` THEN 1 ELSE 0 END'',
        ''team2_no_surrounding_whitespace'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' THEN 1 ELSE 0 END",
        "Has League matches", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''match_type'', [''League'', ''Qualifier 1'', ''Qualifier
        2'', ''Eliminator'', ''Elimination Final'', ''Semi Final'', ''Final''], lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' THEN CASE WHEN
        `super_over` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "league_super_over_not_null",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `super_over` IN (''Y'',''N'') THEN 1 ELSE
        0 END", "super_over_is_Y_or_N", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'',''tie after 20 overs'')
        THEN CASE WHEN `super_over` = ''Y'' THEN 1 ELSE 0 END ELSE 1 END", "tie_implies_super_over",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN `result`
        IN (''tie'',''tie after 20 overs'') THEN 1 ELSE 0 END ELSE 1 END", "super_over_implies_tie",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `super_over` = ''Y'' THEN
        CASE WHEN `result` IN (''tie'',''tie after 20 overs'') THEN 1 ELSE 0 END ELSE
        1 END", "super_over_implies_tie", lambda x: x == 1.0)'' failed on data sample:
        Value: 0.997275204359673 does not meet the constraint requirement!'
      level: error
  date:
    code:
    - suggestion: '.satisfies(''CASE WHEN to_timestamp(`date`) IS NOT NULL THEN 1
        ELSE 0 END'', ''Parseable dates'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: '.satisfies("CASE WHEN `match_type` != ''League'' THEN 1 WHEN `season`
        RLIKE ''^[0-9]{4}$'' THEN 1 ELSE 0 END", "League season is 4-digit year",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` IS NOT NULL AND `team2` IS NOT NULL AND `team1`
        <> `team2`", "two_distinct_teams_per_id", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("`date` IS NOT NULL AND `season` IS NOT NULL AND year(to_date(`date`))
        = CAST(`season` AS INT)", "Date year equals season", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` IS NOT NULL AND `team2` IS NOT NULL AND `team1`
        <> `team2`", "Teams must be distinct per match id", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("((`result` = ''tie'' AND `super_over` = ''Y'') OR (`result`
        <> ''tie'' AND (`super_over` IS NULL OR `super_over` <> ''Y'')))", "Tie <->
        super_over consistency", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("((`result` = ''tie'' AND `super_over`
        = ''Y'') OR (`result` <> ''tie'' AND (`super_over` IS NULL OR `super_over`
        <> ''Y'')))", "Tie <-> super_over consistency", lambda x: x == 1)'' failed
        on data sample: Value: 0.997275204359673 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("((`result` = ''no result'' AND (`winner` IS NULL OR
        `winner` = '''')) OR (`result` <> ''no result'' AND `winner` IN (`team1`,
        `team2`)))", "Winner vs no-result consistency per match", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result != ''no
        result'' THEN CASE WHEN winner IS NOT NULL AND winner IN (team1, team2) THEN
        1 ELSE 0 END ELSE 1 END", "valid_winner_for_decisive_league_match", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''no
        result'' THEN CASE WHEN winner IS NULL OR winner IN ('''', ''no result'')
        THEN 1 ELSE 0 END ELSE 1 END", "winner_null_for_no_result_league", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''winner'', lambda x: x >= 0.99)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "valid_result_categories", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "valid_result_categories", lambda x: x == 1.0)''
        failed on data sample: Value: 0.9700272479564033 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` NOT IN (''No Result'',''NR'',''no_result'',''NoResult'')
        THEN 1 ELSE 0 END", "no_result_variants_absent", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' THEN CASE WHEN `super_over`
        = ''Y'' THEN 1 ELSE 0 END ELSE 1 END", "tie_implies_super_over", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN `result`
        = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "super_over_implies_tie", lambda
        x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `super_over` = ''Y'' THEN
        CASE WHEN `result` = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "super_over_implies_tie",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.997275204359673 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN CASE WHEN
        `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN 1
        ELSE 0 END ELSE 1 END", "winner_present_for_decided_matches", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["losses","matches","no_results","wins"]':
    code:
    - suggestion: .satisfies("(result = 'no result' AND winner IS NULL) OR (result
        != 'no result' AND winner IS NOT NULL)", 'result_winner_consistency')
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `team1` <> `team2` THEN 1 ELSE 0 END", "teams_distinct",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' OR `winner` = `team1`
        OR `winner` = `team2` THEN 1 ELSE 0 END", "winner_is_participant", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (`result` = ''tie'' AND `super_over` = ''Y'')
        OR (`result` <> ''tie'' AND (`super_over` IS NULL OR `super_over` <> ''Y''))
        THEN 1 ELSE 0 END", "super_over_tie_consistent", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN (`result` = ''tie'' AND
        `super_over` = ''Y'') OR (`result` <> ''tie'' AND (`super_over` IS NULL OR
        `super_over` <> ''Y'')) THEN 1 ELSE 0 END", "super_over_tie_consistent", lambda
        x: x == 1)'' failed on data sample: Value: 0.997275204359673 does not meet
        the constraint requirement!'
      level: error
