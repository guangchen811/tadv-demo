results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  loser:
    code:
    - suggestion: '.hasCompleteness(''loser'', lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''loser'', lambda x: x >= 0.98)''
        failed on data sample: Input data does not include column loser!'
      level: error
  match_type:
    code:
    - suggestion: .isContainedIn('match_type', ['League', 'Elimination Final', 'Eliminator',
        'Qualifier 1', 'Qualifier 2', 'Final', 'Semi Final'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''result_margin'', lambda x:
        x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: error
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  umpire1:
    code:
    - suggestion: .isComplete('umpire1')
      status: true
      reason_if_failed: ''
      level: error
  umpire2:
    code:
