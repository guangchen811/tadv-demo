results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isDate('date', 'yyyy-MM-dd')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isDate(''date'', ''yyyy-MM-dd'')'':
        ''Check'' object has no attribute ''isDate'''
      level: error
  loser:
    code:
    - suggestion: .isComplete('loser')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''loser'')'' failed on data sample:
        Input data does not include column loser!'
      level: error
  result:
    code:
    - suggestion: .hasPattern('result', '^(runs|wickets|tie|no result)$')
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''result'', ''^(runs|wickets|tie|no
        result)$'')'' failed on data sample: Value: 0.9700272479564033 does not meet
        the constraint requirement!'
      level: error
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isComplete('result_margin')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''result_margin'')'' failed on data
        sample: Value: 0.9782016348773842 does not meet the constraint requirement!'
      level: error
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .hasPattern('super_over', '^(Y|N)$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .hasPattern('toss_decision', '^(field|bat)$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .isComplete('winner')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''winner'')'' failed on data sample:
        Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
