results:
  city:
    code:
    - suggestion: .isComplete('city')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''city'')'' failed on data sample:
        Value: 0.9836512261580381 does not meet the constraint requirement!'
      level: error
  date:
    code:
    - suggestion: .hasPattern('date', '^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
  row_level:
    code:
    - suggestion: .satisfies("((result = 'runs' OR result = 'wickets') AND result_margin
        IS NOT NULL AND result_margin >= 0) OR (result <> 'runs' AND result <> 'wickets')",
        'result_margin_valid')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(method <> 'D/L') OR (target_runs IS NOT NULL AND target_overs
        IS NOT NULL)", 'dl_targets_present')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(method <> ''D/L'') OR (target_runs
        IS NOT NULL AND target_overs IS NOT NULL)", ''dl_targets_present'')'' failed
        on data sample: Value: 0.9945504087193461 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies("(result = 'no result' AND winner IS NULL) OR (result
        <> 'no result' AND (winner = team1 OR winner = team2))", 'winner_valid')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(target_overs IS NULL) OR (target_overs >= 0)', 'target_overs_non_negative')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(target_runs IS NULL) OR (target_runs >= 0)', 'target_runs_non_negative')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss_winner_in_teams')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('team1 <> team2', 'teams_are_different')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
