results:
  team1:
    code:
    - suggestion: '.satisfies("CASE WHEN team1 NOT IN (''NullValue'',''null'',''NULL'',''None'','''')
        THEN 1 ELSE 0 END", "No null-like placeholders in team1", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN team1 = TRIM(team1) AND team1 <> '''' THEN
        1 ELSE 0 END", "team1 trimmed and non-empty", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN team1 <> team2 THEN 1 ELSE 0 END", "team1
        and team2 are distinct", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN toss_winner = team1 OR toss_winner = team2
        THEN 1 ELSE 0 END", "Toss winner among participating teams", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (result IN (''runs'',''wickets'') OR (result
        = ''tie'' AND super_over = ''Y'')) THEN CASE WHEN (winner = team1 OR winner
        = team2) THEN 1 ELSE 0 END ELSE 1 END", "Winner is among team1/team2 when
        applicable", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(`toss_winner` = `team1` OR `toss_winner` = `team2`)'',
        ''Toss winner must be team1 or team2'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(`winner` IS NULL) OR (`winner` = `team1`) OR (`winner`
        = `team2`)'', ''Winner must be team1 or team2 when present'', lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`team2` <> `team1`'', ''Two distinct teams per match'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT(`team2` IN (''NullValue'',''null'',''NULL'',''None'',''''))",
        ''No null-like placeholders in team2'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasNumberOfDistinctValues(''team2'', lambda n: n <= 25, None,
        None)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`team2` = trim(`team2`)'', ''team2 values should be
        trimmed'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN (CAST(`result_margin`
        AS DOUBLE) = CAST(CAST(`result_margin` AS BIGINT) AS DOUBLE)) ELSE true END",
        "Margin integer for wins", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN (CAST(`result_margin`
        AS DOUBLE) BETWEEN 1 AND 10) WHEN `result` = ''runs'' THEN (CAST(`result_margin`
        AS DOUBLE) >= 1) ELSE true END", "Valid margin ranges for wins", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: '.hasCompleteness(''toss_decision'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.hasCompleteness(''super_over'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(super_over <> ''Y'') OR (result = ''tie'')", ''Super
        Over only for ties'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(super_over <> ''Y'') OR (result
        = ''tie'')", ''Super Over only for ties'', lambda x: x == 1.0)'' failed on
        data sample: Value: 0.997275204359673 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("super_over = ''Y''", ''Share of Y'', lambda x: x <=
        0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.satisfies("length(trim(`toss_winner`)) > 0", "Non-empty toss_winner",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`toss_winner` = `team1` OR `toss_winner` = `team2`)",
        "toss_winner in {team1, team2}", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`toss_winner`)) NOT IN (''nullvalue'',''null'',''none'')",
        "No null-like tokens in toss_winner", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("trim(`toss_winner`) = `toss_winner`", "No leading/trailing
        whitespace in toss_winner", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.satisfies("to_date(trim(`date`), ''yyyy-MM-dd'') IS NOT NULL",
        "Date parseable as YYYY-MM-DD", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("city IS NULL OR NOT (lower(trim(city)) IN (''nullvalue'',''null'',''none'')
        OR trim(city) = '''')", "No placeholder nulls in city", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''city'', lambda x: x <= 100)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.hasCompleteness(''method'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN method IS NULL OR method IN (''D/L'',''NullValue'',''null'',''NULL'',''None'','''')
        THEN 1 ELSE 0 END", "Method domain and missing token handling", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN CASE WHEN target_overs
        IS NOT NULL AND cast(target_overs as double) > 0 AND cast(target_overs as
        double) <= 20 THEN 1 ELSE 0 END ELSE 1 END", "Target overs valid when D/L",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: warning
  venue:
    code:
    - suggestion: '.satisfies(''LOWER(TRIM(venue)) NOT IN (\''\'', \''null\'', \''none\'',
        \''nullvalue\'')'', ''No null-like venue tokens'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(TRIM(venue) AS DOUBLE) IS NULL'', ''Venue is
        non-numeric text'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''venue'', lambda n: n <= 200)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL OR `winner` = `team1` OR
        `winner` = `team2` OR `winner` IN (''NullValue'',''null'',''NULL'',''None'','''')
        THEN 1 ELSE 0 END", "Winner encoding", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (`result` IN (''runs'',''wickets'')) OR (`result`
        = ''tie'' AND `super_over` = ''Y'') THEN CASE WHEN `winner` IS NOT NULL THEN
        1 ELSE 0 END ELSE 1 END", "Winner required when result indicates a winner",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (`result` = ''no result'') OR (`result` =
        ''tie'' AND `super_over` <> ''Y'') THEN CASE WHEN `winner` IS NULL OR `winner`
        IN (''NullValue'',''null'',''NULL'',''None'','''') THEN 1 ELSE 0 END ELSE
        1 END", "Winner must be null when no winner is expected", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL THEN 1 ELSE CASE WHEN `winner`
        = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END END", "Winner must be one
        of the two teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no result''],
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no
        result''], lambda x: x == 1.0)'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(NOT (result IN (''runs'',''wickets''))) OR (result_margin
        IS NOT NULL AND CAST(result_margin AS DOUBLE) IS NOT NULL AND result_margin
        >= 1 AND result_margin = CAST(result_margin AS INT))", "Result margin valid
        for wins", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(NOT ((result IN (''runs'',''wickets'')) OR (result
        = ''tie'' AND super_over = ''Y''))) OR (winner IS NOT NULL AND (winner = team1
        OR winner = team2))", "Winner required and valid when applicable", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result <> ''no result'') OR winner IS NULL", "No winner
        on no-result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(NOT (result = ''tie'' AND COALESCE(super_over, ''N'')
        <> ''Y'')) OR winner IS NULL", "No winner on tie without super over", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["method","target_overs"]':
    code:
    - suggestion: '.satisfies("(method <> ''D/L'' OR method IS NULL) OR (target_overs
        > 0 AND target_overs <= 20)", "dl_target_overs_range", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result <> ''no result'') OR winner IS NULL", "nr_no_winner",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (winner IN
        (team1, team2))", "winner_is_valid_for_decided", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (result_margin
        IS NOT NULL AND result_margin > 0)", "positive_margin_for_decided", lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result <> ''tie'' OR super_over <> ''Y'' OR winner
        IN (team1, team2))", "winner_required_for_super_over_tie", lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result <> ''tie'' OR super_over = ''Y'' OR winner
        IS NULL)", "no_winner_for_regular_tie", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("toss_winner IN (team1, team2)", "toss_winner_in_teams",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2"]':
    code:
    - suggestion: .satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "valid_match_teams")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(CASE WHEN toss_decision = 'bat' THEN toss_winner WHEN
        toss_winner = team1 THEN team2 WHEN toss_winner = team2 THEN team1 ELSE NULL
        END) IN (team1, team2) AND (CASE WHEN toss_decision = 'bat' THEN (CASE WHEN
        toss_winner = team1 THEN team2 WHEN toss_winner = team2 THEN team1 ELSE NULL
        END) ELSE toss_winner END) IN (team1, team2) AND (CASE WHEN toss_decision
        = 'bat' THEN toss_winner WHEN toss_winner = team1 THEN team2 WHEN toss_winner
        = team2 THEN team1 ELSE NULL END) <> (CASE WHEN toss_decision = 'bat' THEN
        (CASE WHEN toss_winner = team1 THEN team2 WHEN toss_winner = team2 THEN team1
        ELSE NULL END) ELSE toss_winner END)", "valid_innings_roles")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("CASE WHEN result IN ('runs','wickets') THEN (winner
        = team1 OR winner = team2) ELSE true END", "winner_is_participant_for_decided_matches")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN result IN ('runs','wickets') THEN CAST(result_margin
        AS double) > 0 ELSE true END", "positive_margin_for_decided_matches")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN result = 'tie' AND coalesce(super_over,'N')
        = 'Y' THEN (winner = team1 OR winner = team2) WHEN result = 'tie' AND coalesce(super_over,'N')
        <> 'Y' THEN winner IS NULL ELSE true END", "tie_super_over_winner_rules")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN result = 'no result' THEN winner IS NULL ELSE
        true END", "no_result_has_no_winner")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("toss_decision IN ('bat','field')", "valid_toss_decision")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("CASE WHEN method = 'D/L' THEN target_overs IS NOT NULL
        AND CAST(target_overs AS double) IS NOT NULL ELSE true END", "target_overs_required_for_dl")
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies(''(toss_winner = team1) OR (toss_winner = team2)'',
        ''toss_winner_in_match'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''team1 <> team2'', ''teams_distinct'', lambda v: v
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
