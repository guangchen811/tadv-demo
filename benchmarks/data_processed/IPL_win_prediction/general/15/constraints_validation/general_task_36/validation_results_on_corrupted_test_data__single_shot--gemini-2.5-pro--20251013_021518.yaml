results:
  conditional_result_margin_completeness:
    code:
    - suggestion: .satisfies("result NOT IN ('runs', 'wickets') OR result_margin IS
        NOT NULL", 'result_margin must be present for decided matches')
      status: true
      reason_if_failed: ''
      level: error
  conditional_winner_completeness:
    code:
    - suggestion: .satisfies("result NOT IN ('runs', 'wickets') OR winner IS NOT NULL",
        'winner must be present for decided matches')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: '.hasUniqueness(''id'', lambda u: u == 1.0)'
      status: false
      reason_if_failed: "Unable to instantiate constraint '.hasUniqueness('id', lambda\
        \ u: u == 1.0)': An error occurred while calling z:scala.collection.JavaConversions.iterableAsScalaIterable.\
        \ Trace:\npy4j.Py4JException: Method iterableAsScalaIterable([class java.lang.String])\
        \ does not exist\n\tat py4j.reflection.ReflectionEngine.getMethod(ReflectionEngine.java:321)\n\
        \tat py4j.reflection.ReflectionEngine.getMethod(ReflectionEngine.java:342)\n\
        \tat py4j.Gateway.invoke(Gateway.java:276)\n\tat py4j.commands.AbstractCommand.invokeMethod(AbstractCommand.java:132)\n\
        \tat py4j.commands.CallCommand.execute(CallCommand.java:79)\n\tat py4j.ClientServerConnection.waitForCommands(ClientServerConnection.java:182)\n\
        \tat py4j.ClientServerConnection.run(ClientServerConnection.java:106)\n\t\
        at java.base/java.lang.Thread.run(Thread.java:829)\n\n"
      level: error
  relational_toss_winner_check:
    code:
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner
        must be one of the playing teams')
      status: true
      reason_if_failed: ''
      level: error
  relational_winner_check:
    code:
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'winner must be one of the playing teams or null')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
