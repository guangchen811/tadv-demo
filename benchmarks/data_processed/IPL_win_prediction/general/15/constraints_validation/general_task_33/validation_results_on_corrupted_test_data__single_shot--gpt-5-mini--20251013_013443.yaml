results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League','Final','Qualifier 1','Qualifier
        2','Eliminator','Elimination Final','Semi Final'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no
        result''])'' failed on data sample: Value: 0.9700272479564033 does not meet
        the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .hasDataType('result_margin', 'DoubleType')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasDataType(''result_margin'',
        ''DoubleType'')'': ''str'' object has no attribute ''_get_java_object'''
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', 'IntegerType')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasDataType(''season'',
        ''IntegerType'')'': ''str'' object has no attribute ''_get_java_object'''
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .hasDataType('target_overs', 'DoubleType')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasDataType(''target_overs'',
        ''DoubleType'')'': ''str'' object has no attribute ''_get_java_object'''
      level: error
  target_runs:
    code:
    - suggestion: .hasDataType('target_runs', 'DoubleType')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasDataType(''target_runs'',
        ''DoubleType'')'': ''str'' object has no attribute ''_get_java_object'''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  umpire1:
    code:
    - suggestion: .isComplete('umpire1')
      status: true
      reason_if_failed: ''
      level: error
  umpire2:
    code:
    - suggestion: .isComplete('umpire2')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .isComplete('winner')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''winner'')'' failed on data sample:
        Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
