results:
  team1:
    code:
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' THEN CASE WHEN team1
        IS NOT NULL AND TRIM(team1) <> '''' THEN 1 ELSE 0 END ELSE 1 END", "team1
        non-empty for League", lambda v: v == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 = TRIM(team1)", "No leading/trailing whitespace
        in team1", lambda v: v == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' THEN CASE WHEN team1
        <> team2 THEN 1 ELSE 0 END ELSE 1 END", "No self-matches in League", lambda
        v: v == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result <> ''no
        result'' THEN CASE WHEN winner IN (team1, team2) THEN 1 ELSE 0 END ELSE 1
        END", "Winner must be one of team1 or team2 for decided League matches", lambda
        v: v == 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' THEN LENGTH(TRIM(team2))
        > 0 ELSE TRUE END", ''team2_non_empty_in_league'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' THEN team2 <> team1
        ELSE TRUE END", ''no_self_matches'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result IN (''runs'',''wickets'',''tie'')
        THEN (winner = team1 OR winner = team2) ELSE TRUE END", ''winner_is_participant'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier
        2', 'Eliminator', 'Final', 'Semi Final', 'Elimination Final'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("match_type = TRIM(match_type)", "match_type trimmed
        and standardized (no leading/trailing whitespace)", lambda d: d == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("match_type = ''League''", "At least one League match
        present", lambda d: d > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' AND `result` =
        ''runs'' THEN (`target_overs` IS NOT NULL AND CAST(`target_overs` AS DOUBLE)
        IS NOT NULL) ELSE TRUE END", "target_overs present and numeric for runs-decided
        league matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' AND `result` =
        ''runs'' THEN (CAST(`target_overs` AS DOUBLE) > 0) ELSE TRUE END", "target_overs
        > 0 for runs-decided league matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("(NOT(`match_type` = ''League'' AND `result` IN (''runs'',''wickets''))
        OR CAST(`result_margin` AS DOUBLE) IS NOT NULL)", "result_margin required
        for League runs/wickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(NOT(`match_type` = ''League'' AND `result` = ''wickets'')
        OR (`result_margin` BETWEEN 1 AND 10 AND `result_margin` = CAST(`result_margin`
        AS INT)))", "valid wickets margin (1-10, integer) for League", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(NOT(`match_type` = ''League'' AND `result` = ''runs'')
        OR (`result_margin` >= 1 AND `result_margin` = CAST(`result_margin` AS INT)))",
        "valid runs margin (>=1, integer) for League", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result_margin` IS NULL OR `result_margin` >= 0)",
        "non-negative result_margin when present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.hasCompleteness("target_runs", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.satisfies("season IS NULL OR season IS NOT NULL", "season column
        exists", lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("match_type <> ''League'' OR season IS NOT NULL", "Season
        present for League matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN winner IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "winner non-null
        for decided/tie league matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN (winner = team1 OR winner = team2) THEN 1 ELSE 0 END ELSE 1
        END", "winner must be team1 or team2 for decided/tie league matches", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''tie''
        THEN CASE WHEN winner IS NOT NULL AND (winner = team1 OR winner = team2) THEN
        1 ELSE 0 END ELSE 1 END", "winner present and valid for tie", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''no
        result'' THEN CASE WHEN winner IS NULL THEN 1 ELSE 0 END ELSE 1 END", "no-result
        should have no winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''runs''
        THEN (result_margin IS NOT NULL AND result_margin > 0 AND target_overs IS
        NOT NULL AND target_overs > 0) ELSE TRUE END", "runs_result_requirements",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''wickets''
        THEN (result_margin IS NOT NULL AND result_margin >= 1 AND result_margin <=
        10) ELSE TRUE END", "wickets_result_requirements", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''tie''
        THEN (winner IS NOT NULL AND (winner = team1 OR winner = team2)) ELSE TRUE
        END", "tie_requires_winner", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''no
        result'' THEN winner IS NULL ELSE TRUE END", "no_result_has_no_winner", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''runs''
        THEN result_margin IS NOT NULL AND result_margin > 0 AND target_overs IS NOT
        NULL AND target_overs > 0 ELSE TRUE END", "runs_margin_and_overs", lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''wickets''
        THEN result_margin IS NOT NULL AND result_margin BETWEEN 1 AND 10 AND result_margin
        = CAST(result_margin AS INT) ELSE TRUE END", "wickets_margin_range", lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''tie''
        THEN (result_margin IS NULL OR result_margin = 0) ELSE TRUE END", "tie_zero_margin",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''no
        result'' THEN result_margin IS NULL ELSE TRUE END", "nr_no_margin", lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result IN (''runs'',''wickets'',''tie'')
        THEN winner IS NOT NULL AND (winner = team1 OR winner = team2) WHEN match_type
        = ''League'' AND result = ''no result'' THEN winner IS NULL ELSE TRUE END",
        "winner_within_teams_by_result", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''runs''
        THEN target_overs IS NOT NULL AND target_overs > 0 ELSE TRUE END", "runs_need_positive_target_overs",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","target_overs"]':
    code:
    - suggestion: '.satisfies("(result != ''runs'') OR (result_margin IS NOT NULL
        AND target_overs IS NOT NULL AND result_margin > 0 AND target_overs > 0)",
        "runs_has_valid_margin_and_overs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result != ''wickets'') OR (result_margin IS NOT NULL
        AND result_margin >= 1 AND result_margin <= 10 AND result_margin = CAST(result_margin
        AS INT))", "wickets_margin_integer_1_to_10", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("result NOT IN (''tie'',''no result'') OR result_margin
        IS NULL", "no_margin_when_tie_or_nr", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result = ''no result'' AND winner IS NULL) OR (result
        IN (''runs'',''wickets'',''tie'') AND winner IS NOT NULL AND (winner = team1
        OR winner = team2))", "winner_consistent_with_result", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(result = ''no result'' AND winner
        IS NULL) OR (result IN (''runs'',''wickets'',''tie'') AND winner IS NOT NULL
        AND (winner = team1 OR winner = team2))", "winner_consistent_with_result",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("(match_type != ''League'') OR (team1 != team2)", "League
        matches must have distinct teams (no self-match)", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(match_type != ''League'' OR result NOT IN (''runs'',''wickets'',''tie''))
        OR ((winner = team1 AND winner != team2) OR (winner = team2 AND winner !=
        team1))", "For decided League results, winner must be exactly one of team1
        or team2", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(match_type != ''League'' OR result != ''no result'')
        OR (winner IS NULL OR (winner != team1 AND winner != team2))", "For no-result
        League matches, winner should be null or not equal to either team1 or team2",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
