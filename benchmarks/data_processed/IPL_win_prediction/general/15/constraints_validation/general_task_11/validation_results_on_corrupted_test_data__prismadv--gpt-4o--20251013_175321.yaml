results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''team2''], lambda x: x == 19 / 550)'
      status: false
      reason_if_failed: 'Constraint ''hasDistinctness([''team2''], lambda x: x ==
        19 / 550)'' failed on data sample: Value: 0.04904632152588556 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: .satisfies('team2 != team1', 'Mutually Exclusive Teams')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x >= 0.989)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''result_margin'', lambda x:
        x >= 0.989)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies(''target_overs IS NULL OR target_runs IS NOT NULL'',
        ''Target Runs Completeness'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.haveCompleteness([''method''], lambda x: x <= 0.0255)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`winner` IS NULL OR `winner` IN (`team1`, `team2`)',
        'Winner must match team1 or team2 when result is not no result')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: .satisfies('result IN ("runs", "wickets", "tie", "no result")',
        "Valid Result Values")
      status: false
      reason_if_failed: 'Constraint ''satisfies(''result IN ("runs", "wickets", "tie",
        "no result")'', "Valid Result Values")'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies(''winner IS NULL OR winner = team1 OR winner = team2'',
        ''Winner Matches Participating Teams'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["toss_winner","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN `winner` IS
        NOT NULL ELSE TRUE END", "Winner is not null when result is determined", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL THEN (`team1` IS NOT
        NULL OR `team2` IS NOT NULL) ELSE TRUE END", "Teams are not null when winner
        is determined", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.haveCompleteness([''toss_winner''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN `winner` IS
        NOT NULL ELSE TRUE END", "Winner is not null for matches with results", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
