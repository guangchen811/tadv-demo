constraints:
  date:
    code:
    - - .hasPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isContainedIn('match_type', ['League','Qualifier 1','Qualifier 2','Final','Semi
        Final','Eliminator','Elimination Final'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie','runs','wickets','no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("(result NOT IN ('runs','wickets')) OR result_margin IS NOT NULL",
        'margin_present_for_decisive_results')
      - Valid
    assumptions: []
  result_margin_int:
    code:
    - - .hasDataType('result_margin_int', 'Integral')
      - Invalid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', 'Integral')
      - Invalid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y','N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat','field'])
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      - Valid
    assumptions: []
