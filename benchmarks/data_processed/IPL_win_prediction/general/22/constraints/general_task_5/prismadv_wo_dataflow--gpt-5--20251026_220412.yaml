  '["date","id","match_type","result","season","super_over","team1","team2","winner"]':
    code: []
    assumptions:
    - text: 'For every match row, team1 and team2 must be non-null and different (no
        team plays itself). We could represent this as a constraint such as: .satisfies("team1
        IS NOT NULL AND team2 IS NOT NULL AND team1 <> team2", "distinct_opponents").'
      sources:
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 21
        end_line: 23
        file: ''
      uid: 7871d591-a514-4a95-b682-f60c4720d792
    - text: 'In League matches with a decisive result (result in {''runs'',''wickets''}),
        winner must be exactly one of {team1, team2}. Example constraint: .satisfies("(match_type
        <> ''League'') OR (result IN (''runs'',''wickets'') AND (winner = team1 OR
        winner = team2))", "winner_within_teams").'
      sources:
      - start_line: 11
        end_line: 13
        file: ''
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 29
        end_line: 29
        file: ''
      uid: 51dac979-4070-4d2e-92be-3ae7770bdf51
    - text: 'If result = ''no result'', then winner must be null (or not equal to
        either team1 or team2) and super_over must be ''N''. Example constraint: .satisfies("CASE
        WHEN result = ''no result'' THEN (super_over = ''N'' AND (winner IS NULL OR
        (winner <> team1 AND winner <> team2))) ELSE true END", "no_result_consistency").'
      sources:
      - start_line: 27
        end_line: 29
        file: ''
      uid: 2e43ce10-478c-4ae3-bcf2-2d3a18cea181
    - text: 'In League matches, a tie after 20 overs implies a super over was played
        and vice versa; operationally, result = ''tie'' if and only if super_over
        = ''Y''. Example constraint: .satisfies("(match_type <> ''League'') OR ((result
        = ''tie'') = (super_over = ''Y''))", "tie_superover_equivalence").'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 27
        end_line: 28
        file: ''
      - start_line: 11
        end_line: 13
        file: ''
      uid: a0802dd5-e182-41a4-8ee3-4c28d6a40d1c
    - text: 'For each match (id) with result <> ''no result'', exactly one team is
        the winner: (winner = team1) XOR (winner = team2). Example row-level constraint:
        .satisfies("CASE WHEN result <> ''no result'' THEN ((winner = team1) XOR (winner
        = team2)) ELSE true END", "exactly_one_winner").'
      sources:
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 29
        end_line: 31
        file: ''
      uid: 08b08c54-bcf6-40f3-aeea-b6d1403b4428
    - text: 'Season must align with the calendar year of date: year(to_datetime(date))
        = season. Example constraint: .satisfies("year(to_timestamp(date)) = cast(season
        as int)", "season_matches_date_year").'
      sources:
      - start_line: 15
        end_line: 17
        file: ''
      uid: 9e3c382e-e377-4e73-96c9-3a8d4d7ac4f8
    - text: 'Match id functionally determines season (no id appears under multiple
        seasons): id -> season. Example constraint: .hasFunctionalDependency("id",
        ["season"]).'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 35
        end_line: 36
        file: ''
      uid: acf57fb1-b14d-45d0-8cf3-acbcee9b5735
  '["date","season"]':
    code: []
    assumptions:
    - text: 'Season must align with the calendar year of the match date: for all rows
        with a parseable date, CAST(season AS INT) should equal year(to_timestamp(date)).
        Example Deequ constraint: .satisfies("year(to_timestamp(date)) = CAST(season
        AS INT)", ["date", "season"], "season_matches_date")'
      sources:
      - start_line: 15
        end_line: 17
        file: ''
      uid: 450e0f12-633d-436c-989c-459890de783e
    - text: 'Each match must be contested by two distinct, non-null teams: team1 and
        team2 should both be present and team1 <> team2. Example Deequ constraint:
        .satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <> team2", ["team1",
        "team2"], "distinct_opponents")'
      sources:
      - start_line: 18
        end_line: 23
        file: ''
      uid: 26c623f8-8215-4583-a676-07e50f7b34ac
    - text: 'Winner/result consistency across teams: (a) If result = ''no result'',
        winner must be NULL or empty; (b) If result <> ''no result'', winner must
        be exactly one of {team1, team2}. Example Deequ constraint: .satisfies("((result
        = ''no result'') AND (winner IS NULL OR winner = '''')) OR ((result <> ''no
        result'') AND (winner = team1 OR winner = team2))", ["result", "winner", "team1",
        "team2"], "winner_validity")'
