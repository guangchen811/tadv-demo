        end_line: 19
        file: ''
      - start_line: 28
        end_line: 28
        file: ''
      uid: 28c4c3b6-6d2a-4e9a-a586-42af79639180
    - text: 'Post-aggregation identity at (season, team) level: matches must equal
        wins + losses + no_results. This follows from how is_winner, is_loser, and
        is_nr are defined and aggregated. Example Deequ constraint (on the aggregated
        table): .satisfies("matches = wins + losses + no_results", ["matches", "wins",
        "losses", "no_results"], "match_outcome_partition_identity")'
      sources:
      - start_line: 27
        end_line: 33
        file: ''
      - start_line: 35
        end_line: 41
        file: ''
      uid: f0e92754-8e91-44d5-a168-146008720fdd
