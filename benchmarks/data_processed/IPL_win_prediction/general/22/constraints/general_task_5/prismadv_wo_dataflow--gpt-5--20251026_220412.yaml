    - text: 'For League matches with ''no result'', the ''winner'' field should be
        null or empty. The downstream logic ignores winners on no-result matches,
        and having a non-null ''winner'' in this case would be inconsistent. Deequ
        example: .satisfies("CASE WHEN match_type = ''League'' AND result = ''no result''
        THEN CASE WHEN winner IS NULL OR TRIM(winner) = '''' THEN 1 ELSE 0 END ELSE
        1 END", "Winner should be null/blank for no-result league matches", lambda
