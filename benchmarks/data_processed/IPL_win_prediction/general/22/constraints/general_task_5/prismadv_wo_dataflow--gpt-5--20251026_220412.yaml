    assumptions:
    - text: 'The ''result'' column must be non-null for all input rows that will be
        used (i.e., where match_type = ''League''), because downstream logic compares
        it to the exact string ''no result'' without any null handling. This can be
        validated as: Great Expectations expect_column_values_to_not_be_null(''result'')
        with a row_condition match_type == ''League''; or Deequ .hasCompleteness(''result'',
        lambda c: c == 1.0) applied after filtering to League matches.'
      sources:
      - start_line: 27
        end_line: 27
        file: ''
      uid: c19790f2-59de-4819-bbef-f629690698f8
    - text: 'The ''result'' column values must be drawn from the exact, lowercase,
        trimmed set {''wickets'', ''runs'', ''tie'', ''no result''}. Any other spelling,
        casing, or whitespace (e.g., ''No Result'', ''NR'', '' tie '') will break
        the ''no result'' detection and the tie/super-over consistency. This can be
        validated as: Deequ .satisfies("lower(trim(result)) IN (''wickets'',''runs'',''tie'',''no
        result'')", ''Valid result categories'', lambda x: x == 1.0) or Great Expectations
        expect_column_values_to_be_in_set with the same set after normalizing to lower/trim.'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 27
        end_line: 27
        file: ''
      uid: 9b470c7f-3595-4f6d-b46a-4b99184b9cb1
    - text: 'If ''result'' == ''no result'', then there must be no winner recorded
        for that match (winner is null or empty), to keep NR logic consistent with
        points computation. This can be validated as: Deequ .satisfies("CASE WHEN
        result = ''no result'' THEN winner IS NULL OR winner = '''' ELSE TRUE END",
        ''NR implies no winner'', lambda x: x == 1.0) or Great Expectations expect_column_values_to_be_null
        on ''winner'' with a row_condition result == ''no result''.'
      sources:
      - start_line: 25
        end_line: 31
        file: ''
      uid: e039dc2d-2c45-4706-90f2-7984a5f18061
    - text: 'Tie/super-over consistency: (a) If ''result'' == ''tie'', then ''super_over''
        must be ''Y''; and (b) If ''super_over'' == ''Y'', then ''result'' must be
        ''tie''. This reflects the comment that a tie after 20 overs implies a super
        over was played, and vice versa. These can be validated as two rules: Deequ
        .satisfies("CASE WHEN result = ''tie'' THEN super_over = ''Y'' ELSE TRUE END",
        ''Tie implies super over'', lambda x: x == 1.0) and .satisfies("CASE WHEN
        super_over = ''Y'' THEN result = ''tie'' ELSE TRUE END", ''Super over implies
        tie'', lambda x: x == 1.0).'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 28
        end_line: 28
        file: ''
      uid: 19a0d0d6-161a-4a80-af12-3964e5218ddf
    - text: 'If ''result'' <> ''no result'', there must be exactly one winner recorded
