        ''team1'' or ''team2''. This ensures wins and points are attributed correctly.
        Deequ example: .satisfies("CASE WHEN match_type = ''League'' AND result <>
        ''no result'' THEN CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE
        0 END ELSE 1 END", "Winner must be one of the two teams for decided league
