        end_line: 33
        file: ''
      uid: f6cf6cf8-93ba-40d1-9772-b938e67a2882
    - text: "Super over \u2194 tie equivalence: a tied match after regular overs must\
        \ imply a super over was played, and vice versa. Operationalized as: (result\
        \ = 'tie') is equivalent to (super_over = 'Y'). Example Deequ constraint:\
        \ .satisfies(\"((result = 'tie') AND super_over = 'Y') OR ((result <> 'tie')\
        \ AND (super_over IS NULL OR super_over <> 'Y'))\", [\"result\", \"super_over\"\
        ], \"super_over_tie_equivalence\")"
      sources:
