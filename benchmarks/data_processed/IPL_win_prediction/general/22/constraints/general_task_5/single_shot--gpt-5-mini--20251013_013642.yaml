constraints:
  date:
    code:
    - - .hasPattern('date', r'^\\d{4}-\\d{2}-\\d{2}$')
      - Invalid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  league_matches_team_distinctness:
    code:
    - - .satisfies("(match_type != 'League') OR (team1 != team2)", 'league_match_teams_must_differ')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final','Eliminator','Qualifier
        2','Final','Semi Final','Qualifier 1','League'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie','runs','wickets','no result'])
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y','N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  tie_super_over_consistency:
    code:
    - - .satisfies("((result = 'tie' AND super_over = 'Y') OR (result != 'tie' AND
        super_over != 'Y'))", 'tie_super_over_consistency')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat','field'])
      - Valid
    assumptions: []
  winner_consistency:
    code:
    - - .satisfies("(result = 'no result') OR (winner = team1) OR (winner = team2)",
        'winner_should_be_one_of_teams_or_nr')
      - Valid
    assumptions: []
