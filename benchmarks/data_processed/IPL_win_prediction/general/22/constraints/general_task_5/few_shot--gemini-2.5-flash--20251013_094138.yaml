constraints:
  date:
    code:
    - - .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .hasAValue('match_type', 'League')
      - Invalid
    - - .isComplete('match_type')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['wickets', 'runs', 'tie', 'no result'])
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isDataType('season', ConstrainableDataTypes.Integral)
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isNonEmpty('team1')
      - Invalid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    - - .isNonEmpty('team2')
      - Invalid
    assumptions: []
  winner:
    code:
    - - .satisfies('winner_exists_or_no_result', 'winner IS NOT NULL OR result IN
        ("no result", "tie")')
      - Invalid
    assumptions: []
