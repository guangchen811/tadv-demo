constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .satisfies("date rlike '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'", 'date_format_yyyy_mm_dd')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("case when result in ('runs','wickets') then result_margin is not
        null and result_margin > 0 else true end", 'margin_present_and_positive_when_decided')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isNonNegative('target_overs')
      - Valid
    - - .satisfies("case when method = 'D/L' then target_overs is not null and target_overs
        > 0 else true end", 'target_overs_present_positive_if_dls')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isNonNegative('target_runs')
      - Valid
    - - .satisfies("case when method = 'D/L' then target_runs is not null else true
        end", 'target_runs_present_if_dls')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .satisfies("team1 <> team2", 'teams_not_equal')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", 'toss_winner_in_teams')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("case when result in ('runs','wickets') or (result = 'tie' and
        super_over = 'Y') then winner is not null and (winner = team1 or winner =
        team2) else true end", 'winner_valid_when_required')
      - Valid
    assumptions: []
