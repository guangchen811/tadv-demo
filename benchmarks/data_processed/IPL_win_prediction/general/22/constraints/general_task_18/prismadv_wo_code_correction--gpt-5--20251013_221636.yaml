        end_line: 33
        file: ''
      - start_line: 35
        end_line: 39
        file: ''
      - start_line: 86
        end_line: 86
        file: ''
      uid: 02b7759d-59c7-4461-aaf8-519b9461b67f
    - text: 'The ''team1'' values should be trimmed (no leading/trailing whitespace)
