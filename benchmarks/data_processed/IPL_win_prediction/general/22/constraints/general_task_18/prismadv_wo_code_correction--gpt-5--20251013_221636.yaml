      sources:
      - start_line: 22
        end_line: 33
        file: ''
      - start_line: 35
        end_line: 39
        file: ''
      uid: 663183e9-f7e3-4e07-9b51-a505ed5fe45f
    - text: 'Within each row, ''team1'' should be different from ''team2'' (they represent
