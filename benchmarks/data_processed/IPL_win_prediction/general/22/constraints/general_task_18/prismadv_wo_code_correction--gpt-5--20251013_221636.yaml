        \ toss_winner \u2208 {team1, team2} AND toss_decision \u2208 {'bat','field'}.\
        \ Deequ: .satisfies('(toss_winner = team1 OR toss_winner = team2) AND (toss_decision\
        \ IN (\\'bat\\', \\'field\\'))', 'valid_toss_pair')"
      sources:
