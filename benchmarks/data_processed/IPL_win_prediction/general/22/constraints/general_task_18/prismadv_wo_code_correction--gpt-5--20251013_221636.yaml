    - text: 'For any row where result is not ''no result'', the ''winner'' value must
        exactly match either ''team1'' or ''team2'' (same spelling/case) to ensure
        the ''loser'' derivation is correct. A suitable Deequ rule is: .satisfies("CASE
        WHEN result <> ''no result'' THEN CASE WHEN winner = team1 OR winner = team2
