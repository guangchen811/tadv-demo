    - text: 'The ''result'' values must be within the exact, lowercase, trimmed set
        {''runs'',''wickets'',''tie'',''no result''}. Any other token (e.g., ''abandoned'',
        different casing, or extra spaces) will fall to the generic branch and can
        lead to inconsistent loser/winner handling. Deequ example: .satisfies(''CASE
        WHEN TRIM(`result`) IN (\''runs\'', \''wickets\'', \''tie\'', \''no result\'')
        THEN 1 ELSE 0 END'', ''Result domain'', lambda x: x == 1.0). Great Expectations:
        expect_column_values_to_be_in_set(''result'', [''runs'',''wickets'',''tie'',''no
        result'']) with mostly=True only if you wish to allow rare exceptions.'
