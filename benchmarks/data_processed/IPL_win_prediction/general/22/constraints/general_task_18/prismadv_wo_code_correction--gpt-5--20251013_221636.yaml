        = ''bat'' AND batting_first = team2) OR (toss_winner = team1 AND toss_decision
        = ''field'' AND batting_first = team2) OR (toss_winner = team2 AND toss_decision
        = ''field'' AND batting_first = team1)", "batting_first_consistent_with_toss")'
      sources:
      - start_line: 23
        end_line: 32
        file: ''
      uid: 0f44a2a2-c090-4902-bb2d-0939fe573a2e
    - text: 'batting_second must be the other team relative to batting_first, so that
        {batting_first, batting_second} = {team1, team2} and batting_first != batting_second.
        Example Deequ constraint: .satisfies("(batting_first = team1 AND batting_second
        = team2) OR (batting_first = team2 AND batting_second = team1)", "batting_second_complements_first")'
      sources:
      - start_line: 33
        end_line: 33
        file: ''
      uid: 281ea2d0-1533-402e-b78f-a27b292e090c
    - text: 'When result != ''no result'', winner and loser must be the two teams
        in the match and must be opposites: winner in {team1, team2}, loser in {team1,
        team2}, winner != loser, and (winner=team1 iff loser=team2). This can be expressed
        with Deequ constraints such as: .satisfies("result = ''no result'' OR winner
        = team1 OR winner = team2", "winner_in_teams_when_result").satisfies("result
        = ''no result'' OR loser = team1 OR loser = team2", "loser_in_teams_when_result").satisfies("result
        = ''no result'' OR winner <> loser", "winner_loser_distinct_when_result").satisfies("result
        = ''no result'' OR ((winner = team1 AND loser = team2) OR (winner = team2
        AND loser = team1))", "winner_loser_are_opposites")'
      sources:
