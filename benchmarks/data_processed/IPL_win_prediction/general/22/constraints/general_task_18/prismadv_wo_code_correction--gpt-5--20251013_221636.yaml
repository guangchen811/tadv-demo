    - text: 'All non-null ''winner'' values should have no leading or trailing whitespace
        to avoid equality comparison failures with ''team1''/''team2''. A suitable
        Deequ rule is: .satisfies("CASE WHEN winner IS NULL THEN 1 ELSE CASE WHEN
