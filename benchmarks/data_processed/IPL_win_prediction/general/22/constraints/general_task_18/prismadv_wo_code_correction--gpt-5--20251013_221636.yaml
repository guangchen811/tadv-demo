    assumptions:
    - text: 'toss_winner must always be one of the two participating teams in the
        row (team1 or team2). This ensures toss_winner_side and the batting_first/second
        derivations are valid. We could represent this as a Deequ constraint: .satisfies(''toss_winner
        = team1 OR toss_winner = team2'', ''toss_winner_is_participating_team'')'
