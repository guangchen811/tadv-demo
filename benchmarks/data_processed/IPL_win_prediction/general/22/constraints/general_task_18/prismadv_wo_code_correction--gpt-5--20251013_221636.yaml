    - text: 'If ''result'' is ''runs'' or ''wickets'', then ''result_margin'' must
        be present and parseable as a number (the code does int(float(result_margin))
        without a try/except here). Deequ example: .satisfies(''CASE WHEN TRIM(`result`)
        IN (\''runs\'',\''wickets\'') THEN `result_margin` IS NOT NULL AND `result_margin`
