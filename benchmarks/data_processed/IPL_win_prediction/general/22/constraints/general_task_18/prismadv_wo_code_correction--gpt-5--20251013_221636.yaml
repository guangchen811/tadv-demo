    - text: 'If ''result'' is in {''runs'',''wickets'',''tie''}, then ''winner'' must
        be non-null because the summary string references it. Deequ example: .satisfies(''CASE
        WHEN TRIM(`result`) IN (\''runs\'',\''wickets\'',\''tie\'') THEN `winner`
        IS NOT NULL ELSE TRUE END'', ''Winner present when result decided'', lambda
        x: x == 1.0). Great Expectations: expect_column_values_to_not_be_null(''winner'')
        with condition parser enforcing result in that set.'
      sources:
      - start_line: 68
        end_line: 75
        file: ''
