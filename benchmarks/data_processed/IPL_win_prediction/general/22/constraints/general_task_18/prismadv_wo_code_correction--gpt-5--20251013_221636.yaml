    assumptions:
    - text: 'When method equals ''D/L'', the ''target_overs'' column must be present
        (not null), otherwise the script cannot produce a proper D/L target phrase
        and will fall back to a less-informative ''(D/L)''. A suitable Deequ rule
        is: .satisfies("CASE WHEN method = ''D/L'' THEN target_overs IS NOT NULL ELSE
        TRUE END", "D/L target_overs present", lambda x: x == 1.0)'
      sources:
      - start_line: 52
        end_line: 66
        file: ''
      - start_line: 54
        end_line: 63
        file: ''
      uid: 4d93c28e-183e-490c-a992-3584a830846f
    - text: 'When method equals ''D/L'', the ''target_overs'' values should be numeric
        (parseable as a float) so that int(float(target_overs)) does not raise and
        the summary does not end up with a non-numeric ''overs'' value. A suitable
        Deequ rule is: .satisfies("CASE WHEN method = ''D/L'' THEN CAST(target_overs
        AS DOUBLE) IS NOT NULL ELSE TRUE END", "D/L target_overs numeric", lambda
        x: x == 1.0)'
      sources:
      - start_line: 54
        end_line: 63
        file: ''
      - start_line: 59
        end_line: 62
        file: ''
      uid: bfa3a575-00c1-4f8c-9d0a-ed045b2d0ac9
    - text: 'When method equals ''D/L'', the ''target_overs'' should represent a whole
        number of overs (no fractional part), because the code truncates to an integer
        via int(float(target_overs)). To avoid silent truncation, enforce that the
        fractional part equals zero. A suitable Deequ rule is: .satisfies("CASE WHEN
        method = ''D/L'' THEN (CAST(target_overs AS DOUBLE) IS NOT NULL AND CAST(CAST(target_overs
        AS DOUBLE) AS BIGINT) = CAST(target_overs AS DOUBLE)) ELSE TRUE END", "D/L
        target_overs integral", lambda x: x == 1.0)'
      sources:
      - start_line: 59
        end_line: 63
        file: ''
      uid: 9a5d014c-3b43-4635-b006-52897145119e
