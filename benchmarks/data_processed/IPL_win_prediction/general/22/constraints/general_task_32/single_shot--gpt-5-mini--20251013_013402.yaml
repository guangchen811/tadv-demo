constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda x: x >= 0.98)'
      - Valid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs','wickets','tie','no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.hasCompleteness(''result_margin'', lambda x: x >= 0.98)'
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y','N'])
      - Valid
    assumptions: []
  target_runs:
    code:
    - - '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['bat','field'])
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      - Valid
    assumptions: []
