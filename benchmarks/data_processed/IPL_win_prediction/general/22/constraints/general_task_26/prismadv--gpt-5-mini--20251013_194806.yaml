        in these training rows will produce NaNs/infinite values. Suggested constraint:
        .satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'') THEN CASE
        WHEN `target_overs` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "target_overs_non_null_for_training",
        lambda x: x >= 0.99).'
