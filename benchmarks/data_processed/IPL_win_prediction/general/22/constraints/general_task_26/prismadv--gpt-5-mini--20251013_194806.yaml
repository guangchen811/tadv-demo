    - text: 'When result == ''wickets'', result_margin must be present (non-null),
        numeric, and represent a positive integer wicket margin (reasonable domain:
        1..10). This is required because margin_wickets is derived from result_margin
        for ''wickets'' rows and cast to int. (Deequ examples: .where("result = ''wickets''").isComplete(["result_margin"])
        and check 1 <= result_margin <= 10.)'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 28
        end_line: 28
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      uid: a9889683-212f-4380-87d3-73265839f6af
    - text: 'For rows where result is neither ''runs'' nor ''wickets'' (e.g., ''tie''
        or ''no result''), result_margin should be null or effectively zero/unset.
        The code assigns zero margins only for runs/wickets cases, so non-decisive
        results should not carry a meaningful result_margin. (Deequ example: .where("result
        NOT IN (''runs'',''wickets'')").isNull(["result_margin"]) or allow only null/0.)'
      sources:
      - start_line: 28
        end_line: 28
        file: ''
      - start_line: 48
        end_line: 49
        file: ''
      uid: 6323f390-ea17-48e4-a1d6-5b6be9f5c747
    - text: 'For rows included in df_train (result in [''runs'',''wickets'',''tie'']),
        target_runs and target_overs must be numeric and non-null, and target_overs
        must be > 0 because target_run_rate = target_runs / target_overs is computed.
        (Deequ example: .isComplete(["target_runs","target_overs"]) and .where("target_overs
        > 0").hasSize(...) or custom predicate target_overs > 0.)'
