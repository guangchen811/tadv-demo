        file: ''
      uid: 47eec1ee-5ef4-4a0c-bf92-d6730e01877d
    - text: "toss_winner should equal either team1 or team2 for each match row (so\
        \ the boolean toss_winner_is_team1 is meaningful). In other words, toss_winner\
        \ \u2208 {team1, team2} per row. (Deequ example: .satisfies(\"toss_winner\
        \ = team1 OR toss_winner = team2\", \"toss_winner_in_teams\").)"
