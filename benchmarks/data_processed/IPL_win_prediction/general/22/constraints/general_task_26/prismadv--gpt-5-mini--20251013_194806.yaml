        file: ''
      - start_line: 28
        end_line: 28
        file: ''
      - start_line: 45
        end_line: 45
        file: ''
      uid: dc383913-952e-4b2e-a08c-aa1c2c3b69dd
    - text: 'target_overs should lie in a reasonable domain for the match format implied
        by the code (the script computes revised_overs_shortfall = 20.0 - target_overs),
        so target_overs is expected to be between 0 and 20 (inclusive). (Deequ example:
        .where("target_overs IS NOT NULL").satisfies("target_overs >= 0 AND target_overs
