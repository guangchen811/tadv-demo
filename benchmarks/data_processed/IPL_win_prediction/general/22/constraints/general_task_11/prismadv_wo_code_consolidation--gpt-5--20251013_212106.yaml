    - text: 'toss_decision values are restricted to the normalized domain {''field'',''bat''},
        and no other categories appear in the data used for KPI calculation. This
        follows from the pivot-and-rename expecting exactly these two columns. Possible
        constraint: isContainedIn(''toss_decision'', [''field'',''bat'']) after lower/trim
        normalization.'
      sources:
      - start_line: 19
        end_line: 21
        file: ''
      - start_line: 85
        end_line: 92
        file: ''
      uid: c49a96ec-26c6-45f2-9a56-6bd54bef2464
    - text: 'For every season_int that has any resulted matches (result != ''no result''),
        there is at least one match where the toss_decision is ''field'' and at least
        one where it is ''bat''. This ensures the pivot produces both field_toss_winner_win_rate
        and bat_toss_winner_win_rate per season and that toss_decision_advantage is
        defined (non-null). Possible constraint: for each season_int, count_if(toss_decision=''field''
        AND result!=''no result'') >= 1 AND count_if(toss_decision=''bat'' AND result!=''no
        result'') >= 1.'
