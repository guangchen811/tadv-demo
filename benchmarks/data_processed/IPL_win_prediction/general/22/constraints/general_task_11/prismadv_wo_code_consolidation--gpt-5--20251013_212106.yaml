      source_assumptions:
      - 7f1e869a-4940-48c2-bba0-0a001b5c4176
    assumptions:
    - text: 'On all resulted matches (rows where result != ''no result''), the winner
        and toss_winner values are valid team labels for that row and use the same
        canonical form as team1/team2. Concretely: (a) winner is non-null when result
        != ''no result''; (b) lower(trim(winner)) is in {lower(trim(team1)), lower(trim(team2))};
        (c) lower(trim(toss_winner)) is in {lower(trim(team1)), lower(trim(team2))}.
        This ensures other_team and the toss_winner_won indicator are computed correctly.
        Possible constraints: Compliance("(result = ''no result'') OR (winner IS NOT
        NULL)"); Compliance("(result = ''no result'') OR (lower(trim(winner)) IN (lower(trim(team1)),
        lower(trim(team2))))"); Compliance("lower(trim(toss_winner)) IN (lower(trim(team1)),
        lower(trim(team2)))").'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 52
        end_line: 60
        file: ''
      uid: 513b3adf-056b-4c3b-9c20-ae5939f9d211
    - text: 'The equality check used to derive toss_winner_won assumes winner and
        toss_winner share the same canonicalization (identical case/whitespace). Therefore,
        their string representations must already be aligned so that (toss_winner
        == winner) is semantically correct. Possible constraint: enforce canonicalization
        equivalence via Compliance("lower(trim(winner)) = lower(trim(toss_winner))",
        asserted only when the toss winner actually won in source-of-truth data, or
        proactively normalize both columns before comparison).'
      sources:
