    - suggestion: '.satisfies("(result = ''no result'') OR (lower(trim(toss_winner))
        IN (lower(trim(team1)), lower(trim(team2))))", "Toss winner belongs to one
        of the two teams for resulted matches", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
