      uid: 16eb24e0-d472-4c76-9b71-80f6e90b73e5
    - text: 'The ''team2'' column should be complete (no nulls). In particular, for
        any row where ''winner'' is not null and equals ''team1'', ''team2'' must
        be non-null to correctly derive the ''loser'' and produce readable settlement
        text. This can be enforced as: overall completeness(team2) == 1.0, and conditionally
        completeness(team2) under condition winner == team1.'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 51
        end_line: 60
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: 36257bd0-42c1-4178-ba90-932d5ddc7bb1
    - text: 'Per match, ''team2'' should be different from ''team1'' (team2 != team1).
        Otherwise the derived ''loser'' and settlement strings could be incorrect
        or nonsensical (e.g., a team beating itself). This can be represented as a
        row-level constraint: CASE WHEN team1 = team2 THEN 0 ELSE 1 END == 1.'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 51
        end_line: 60
        file: ''
      uid: 8d47938a-c3bd-4d01-ba16-8a09297c189d
    - text: 'For any row with a non-null ''winner'', the ''winner'' must be either
        ''team1'' or ''team2''. This ensures the logic that picks the other team works
        correctly and prevents assigning the wrong loser. Constraint example: CASE
        WHEN winner IS NULL THEN 1 WHEN winner = team1 OR winner = team2 THEN 1 ELSE
        0 END == 1.'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      uid: 7cc1dee4-0b09-4e3a-ad9b-181e871b94d9
    - text: 'Values in ''team2'' should be valid team names, not empty strings or
        placeholder tokens. Disallow ['''', ''NA'', ''NaN'', ''nan'', ''NULL'', ''Null'',
        ''null'', ''None'', ''NullValue'']. Constraint example: CASE WHEN team2 IN
        ('''', ''NA'', ''NaN'', ''nan'', ''NULL'', ''Null'', ''null'', ''None'', ''NullValue'')
        THEN 0 ELSE 1 END == 1.'
      sources:
      - start_line: 51
        end_line: 60
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: b95d9692-18c3-4776-908b-7e591c51d143
    - text: Values in 'team2' should not have leading or trailing whitespace to ensure
        clean settlement text and consistent team identity. This can be validated
        with a regex like ^\S(.*\S)?$ or by asserting team2 = TRIM(team2).
      sources:
      - start_line: 51
        end_line: 60
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: d0cfafce-84a7-4678-acc7-85b9ea63e612
    - text: The domain of 'team2' should be stable and limited (e.g., number of distinct
        values <= 30). The dataset indicates a small, fixed set of teams; large growth
        would suggest data quality issues (e.g., casing/whitespace variations). This
