    assumptions:
    - text: 'Winner must be one of the two competing teams when present. Constraint
        example (Deequ): .satisfies("(winner IS NULL) OR (winner = team1) OR (winner
        = team2)", "winner_within_teams")'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 6a8d562b-fb8f-424c-8ab3-f58d20882e65
    - text: 'The two teams in a match must be distinct (no team plays itself). Constraint
        example (Deequ): .satisfies("team1 <> team2", "teams_are_distinct_per_match")'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: b7cbce14-2d15-4305-a4ab-c9c32253f948
    - text: 'For resulted matches decided by runs or wickets, the winner must be present
        and be one of the two teams, and the margin must be a positive number. Constraint
        example (Deequ): .satisfies("((result = ''runs'' OR result = ''wickets'')
        AND (winner IS NOT NULL) AND (winner = team1 OR winner = team2) AND (result_margin
        IS NOT NULL) AND (result_margin > 0)) OR (result NOT IN (''runs'',''wickets''))",
        "result_margin_and_winner_consistency")'
      sources:
      - start_line: 37
        end_line: 41
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 9909266a-910c-4fd3-8c01-90757c27a796
    - text: 'Both team1 and team2 must be non-null for every record (the pipeline
        relies on both being present). Constraint example (Deequ): .satisfies("team1
        IS NOT NULL AND team2 IS NOT NULL", "teams_not_null")'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: a9a3ef72-5c3a-44c5-a9da-f4712a48f3c7
  '["team1","team2","toss_winner"]':
    code: []
    assumptions:
    - text: 'For every row where winner is not null, the winner must be one of the
        two participating teams and the loser must be the other team. Formally: (winner
        = team1 XOR winner = team2) AND team1 != team2; additionally, loser = team2
        when winner = team1, else loser = team1. Example Deequ constraints: satisfies(''winner
        IS NULL OR ((winner = team1 AND team2 <> team1) OR (winner = team2 AND team1
        <> team2))'', ''winner_in_participants'') and satisfies(''winner IS NULL OR
        ((loser = team1 AND winner = team2) OR (loser = team2 AND winner = team1))'',
        ''loser_is_other_team'').'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: fb54c77a-3a18-4e30-ad04-d59e5d8ac76f
    - text: "The toss_winner must be one of the two participating teams (toss_winner\
        \ \u2208 {team1, team2}). This ensures the KPI toss_winner_won = (toss_winner\
        \ == winner) is meaningful. Example Deequ constraint: satisfies('(toss_winner\
        \ = team1) OR (toss_winner = team2)', 'toss_winner_in_participants')."
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 4a89c83b-02b5-4b7b-9b9e-ddd0a0296f7c
    - text: "For matches decided by runs or wickets, a numeric (integer-castable)\
        \ margin must be present. If result \u2208 {'runs','wickets'} then result_margin\
        \ must be non-null and castable to integer (used via margin_int and in settlement\
        \ text). Example Deequ constraint: satisfies(\"(result NOT IN ('runs','wickets'))\
        \ OR (result_margin IS NOT NULL AND CAST(result_margin AS INT) IS NOT NULL)\"\
        , 'margin_required_for_decided_matches')."
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: cd246f42-2c82-467e-a98c-0f8a1d9fddcd
    - text: 'For matches recorded as ''tie'', a winner must still be populated and
        must be one of the two teams (used in settlement text producing ''<winner>
        won after Super Over''). Example Deequ constraint: satisfies("(result <> ''tie'')
        OR (winner IS NOT NULL AND (winner = team1 OR winner = team2))", ''winner_required_on_tie'').'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: 5d7c13af-0bac-45c9-98c7-32f70c2904ca
    - text: 'For any match that is not ''no result'', winner must be populated (both
        settlement_text and toss_winner_won rely on it). Example Deequ constraint:
        satisfies("(result = ''no result'') OR winner IS NOT NULL", ''winner_required_when_resulted'').'
      sources:
      - start_line: 52
        end_line: 60
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      uid: f5d099c3-669d-4af3-91f3-465f907a2ee8
    - text: 'Each match must have two distinct participants: team1 != team2. Example
        Deequ constraint: satisfies(''team1 <> team2'', ''teams_are_distinct'').'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: 26e66236-96cc-4151-ba99-c15c7513502c
  '["team1","team2","winner"]':
    code: []
    assumptions:
    - text: "The 'winner' value, when present, must equal either the 'team1' or 'team2'\
        \ value for that row (winner \u2208 {team1, team2}). This can be enforced\
        \ with a row-level constraint such as: .satisfies(\"winner IS NULL OR winner\
        \ = team1 OR winner = team2\", [\"winner\",\"team1\",\"team2\"])."
      sources:
      - start_line: 45
        end_line: 47
        file: ''
      - start_line: 49
        end_line: 49
        file: ''
      uid: 832eadea-84cc-4f57-a708-fbc09d9d91a2
    - text: 'The two teams in a match must be distinct (team1 != team2). Otherwise,
        computing the ''loser'' as the non-winner team and producing settlement text
        like "winner beat loser" would be inconsistent. Constraint example: .satisfies("team1
        <> team2", ["team1","team2"]).'
      sources:
      - start_line: 47
        end_line: 49
        file: ''
      - start_line: 58
        end_line: 60
        file: ''
      uid: bad7d459-d85f-40c9-b3fa-c86e2efc6c86
    - text: 'For rows where result is ''runs'' or ''wickets'': (a) winner must be
        non-null and equal to either team1 or team2; and (b) result_margin must be
        present and a strictly positive integer (since it is cast to Int and used
        in settlement text). This can be expressed as two constraints: .satisfies("(result
        IN (''runs'',''wickets'')) => (winner IS NOT NULL AND (winner = team1 OR winner
        = team2))", ["result","winner","team1","team2"]) and .satisfies("(result IN
        (''runs'',''wickets'')) => (result_margin IS NOT NULL AND CAST(result_margin
        AS double) > 0 AND CAST(result_margin AS int) = CAST(result_margin AS double))",
        ["result","result_margin"]).'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 58
        end_line: 60
        file: ''
      uid: 8df0f75a-8538-4275-9df8-877dc12fd427
    - text: 'For rows where result is ''tie'', the ''winner'' must be present and
        must equal either team1 or team2 (the settlement text uses winner directly).
        Constraint example: .satisfies("(result = ''tie'') => (winner IS NOT NULL
        AND (winner = team1 OR winner = team2))", ["result","winner","team1","team2"]).'
      sources:
      - start_line: 53
        end_line: 56
        file: ''
      uid: a8851301-0e2f-4ff3-8bd4-3bf5fdf55102
    - text: 'For rows where result is ''no result'', the ''winner'' should be null
        (no winning team should be recorded). Constraint example: .satisfies("(result
        = ''no result'') => winner IS NULL", ["result","winner"]).'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      - start_line: 45
        end_line: 46
        file: ''
      uid: 374c04f0-127d-41f3-8be0-09d75544c287
    - text: 'In matches considered for KPIs (result != ''no result''), the ''toss_winner''
        must be one of the two teams playing (team1 or team2). Constraint example:
        .satisfies("(result <> ''no result'') => (toss_winner = team1 OR toss_winner
        = team2)", ["result","toss_winner","team1","team2"]).'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      uid: 3328cfb9-d1d2-4514-9ea1-e28ae2a33b83
    - text: Team name strings across 'winner', 'team1', and 'team2' must be identically
        formatted (consistent casing and trimming), because the code compares them
        using exact equality to derive the loser. Practically, either pre-normalize
        these three columns identically or enforce a check that lower(trim(winner))
        equals lower(trim(team1)) or lower(trim(team2)) whenever winner is present.
      sources:
      - start_line: 45
        end_line: 47
        file: ''
      uid: ad7a5cb8-5e9e-4478-a541-88fd32392cd4
  '["toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("(result = ''no result'') OR (winner IS NOT NULL)",
        "Winner present for resulted matches", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
