      uid: 06ad76dd-6be2-427a-8d09-84a7061b7557
    - text: 'For matches included in KPI calculations (result != ''no result''), ''toss_winner''
        must be non-null and equal to either ''team1'' or ''team2'', and ''toss_decision''
        must be in {''bat'',''field''}. Example Deequ: hasCompliance(''toss_fields_valid_for_resulted'',
        "CASE WHEN result <> ''no result'' THEN toss_winner IN (team1, team2) AND
        toss_decision IN (''bat'',''field'') ELSE true END", _ == 1.0).'
      sources:
      - start_line: 72
        end_line: 74
        file: ''
      - start_line: 85
        end_line: 92
        file: ''
      uid: 2cdfc369-c1f0-4966-b02e-bcab8ce41b4d
    - text: 'If ''method'' is present (e.g., ''D/L''), then ''target_runs'' and ''target_overs''
        must be non-null and ''target_overs'' > 0 (to ensure the adjusted target allows
        computing ''req_run_rate''). Example Deequ: hasCompliance(''dl_requires_targets'',
        "method IS NULL OR (target_runs IS NOT NULL AND target_overs IS NOT NULL AND
        target_overs > 0)", _ == 1.0).'
      sources:
      - start_line: 24
        end_line: 25
        file: ''
      - start_line: 28
        end_line: 30
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      uid: 6db837eb-895b-4c68-bf3e-f76bc8463985
    - text: 'For all rows used in season-level KPIs (result != ''no result''), ''season_int''
        must be non-null to enable grouping and merging by season. Example Deequ:
        hasCompleteness(''season_int'', where=''result <> \''no result\'''').'
      sources:
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 72
        end_line: 72
        file: ''
      - start_line: 76
        end_line: 82
        file: ''
      - start_line: 94
        end_line: 98
        file: ''
      uid: 2b7768fa-afc9-49e5-ba2c-5a37cf7921eb
  '["result","result_margin"]':
    code: []
    assumptions:
    - text: 'Result-margin consistency: If result is ''runs'' or ''wickets'', result_margin
        must be present, an integer (no fractional part), and >= 1. If result is ''tie''
        or ''no result'', result_margin must be null. Example Deequ: .satisfies("CASE
        WHEN result IN (''runs'',''wickets'') THEN result_margin IS NOT NULL AND result_margin
        >= 1 AND result_margin = CAST(result_margin AS BIGINT) ELSE result_margin
        IS NULL END", "result_margin_consistent_with_result")'
      sources:
      - start_line: 28
        end_line: 30
        file: ''
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 53
        end_line: 60
        file: ''
      uid: b66f81e6-a105-4146-a31b-4b2bd4ebb6f1
    - text: 'Wickets-margin bound: If result is ''wickets'', result_margin must be
        between 1 and 10 inclusive (number of wickets). Example Deequ: .satisfies("CASE
        WHEN result = ''wickets'' THEN result_margin BETWEEN 1 AND 10 END", "wickets_margin_bounds")'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 58
        end_line: 60
        file: ''
      uid: ddb35747-7521-4b86-895b-1cb1c2682ded
    - text: 'Winner validity when a result exists: For rows where result != ''no result''
        (i.e., ''runs'', ''wickets'', or ''tie''), winner must be non-null and equal
        to either team1 or team2. Example Deequ: .satisfies("CASE WHEN result <> ''no
        result'' THEN winner IS NOT NULL AND (winner = team1 OR winner = team2) END",
        "winner_must_be_a_participating_team_when_resulted")'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 53
        end_line: 60
        file: ''
      - start_line: 72
        end_line: 74
        file: ''
      uid: 8b6a2c83-7c83-4a24-a845-acad8ddcd45c
    - text: 'Loser consistency when a result exists: For rows where result != ''no
        result'', loser must be non-null, must be the other team (i.e., loser != winner
        and {winner, loser} equals {team1, team2}). Example Deequ: .satisfies("CASE
        WHEN result <> ''no result'' THEN loser IS NOT NULL AND loser <> winner AND
        ((winner = team1 AND loser = team2) OR (winner = team2 AND loser = team1))
        END", "loser_is_opposite_team_when_resulted")'
      sources:
      - start_line: 44
        end_line: 50
        file: ''
      - start_line: 53
        end_line: 60
        file: ''
      uid: 8c349d8d-7c29-4233-a48d-baf96898652d
    - text: 'Toss winner membership when a result exists: For rows where result !=
        ''no result'', toss_winner should be non-null and equal to either team1 or
        team2 (so that toss_winner_won is well-defined). Example Deequ: .satisfies("CASE
        WHEN result <> ''no result'' THEN toss_winner IS NOT NULL AND (toss_winner
        = team1 OR toss_winner = team2) END", "toss_winner_must_be_a_participating_team_when_resulted")'
      sources:
      - start_line: 72
        end_line: 74
        file: ''
      uid: c7d1cf74-6060-4c68-8447-6bd0094f3519
  '["result","super_over"]':
    code: []
    assumptions:
    - text: 'For rows where result is either ''runs'' or ''wickets'', result_margin
        must be present and a positive integer (>= 1). This is required because margin_int
        is cast to Int64 and then converted to int() for settlement text. Representable
        as a Deequ constraint: .satisfies("CASE WHEN result IN (''runs'',''wickets'')
        THEN result_margin IS NOT NULL AND result_margin >= 1 ELSE TRUE END", ''margin-required-for-result'')'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 639489c4-4463-44c1-81b5-a3b99d524ef5
    - text: 'For rows where result is ''tie'' or ''no result'', result_margin should
        be null (or absent). The code never uses a numeric margin for these outcomes
        and explicitly sets margin_int to NA for non ''runs''/''wickets'' rows. Representable
        as: .satisfies("CASE WHEN result IN (''tie'',''no result'') THEN result_margin
        IS NULL ELSE TRUE END", ''no-margin-when-not-runs-wickets'')'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: cc0a5f82-133a-4c76-8db4-c5955b126d9d
    - text: 'The presence of a ''tie'' result should imply that a Super Over occurred,
        and conversely a recorded Super Over (''Y'') should imply the result is ''tie''.
        Representable as: .satisfies("((result = ''tie'' AND super_over = ''Y'') OR
        (result <> ''tie'' AND super_over = ''N''))", ''superover-iff-tie'')'
      sources:
      - start_line: 55
        end_line: 56
        file: ''
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: 573d99ab-df6f-4ecd-9782-c34343819fbb
    - text: 'For all rows where result is not ''no result'', winner must be present
        and equal to either team1 or team2, and loser must equal the non-winner team.
        Representable as: .satisfies("CASE WHEN result <> ''no result'' THEN winner
        IS NOT NULL AND (winner = team1 OR winner = team2) AND (loser = CASE WHEN
        winner = team1 THEN team2 WHEN winner = team2 THEN team1 END) ELSE TRUE END",
        ''winner-loser-consistency'')'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 53
        end_line: 60
        file: ''
      uid: 8f511d17-cd94-4f7e-8532-7e9018f60e07
    - text: 'For rows where result is ''no result'', winner should be null and super_over
        should be ''N''. Representable as: .satisfies("CASE WHEN result = ''no result''
        THEN winner IS NULL AND super_over = ''N'' ELSE TRUE END", ''no-result-has-no-winner-and-no-superover'')'
      sources:
      - start_line: 53
        end_line: 54
        file: ''
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: 967627e0-d469-4f27-a75a-8cd035146513
    - text: 'For rows where result is not ''no result'', toss_winner must be present
        and belong to {team1, team2}, and toss_decision must be present in the normalized
        domain {''bat'',''field''} to compute KPIs reliably. Representable as: .satisfies("CASE
        WHEN result <> ''no result'' THEN toss_winner IS NOT NULL AND (toss_winner
        = team1 OR toss_winner = team2) AND toss_decision IN (''bat'',''field'') ELSE
        TRUE END", ''toss-fields-required-for-resulted-matches'')'
      sources:
      - start_line: 72
        end_line: 74
        file: ''
      - start_line: 86
        end_line: 92
        file: ''
      - start_line: 19
        end_line: 21
        file: ''
      uid: b628d4b0-e94a-489e-a1e5-f1a7c607f996
  '["result","target_overs","target_runs"]':
    code: []
    assumptions:
    - text: 'Among matches where result <> ''no result'', both ''target_runs'' and
        ''target_overs'' must be present (non-null) and numeric, and ''target_overs''
        must be > 0 so that ''req_run_rate = target_runs / target_overs'' is defined
        and finite. We could represent this as a Deequ constraint like: .satisfies("CASE
        WHEN result <> ''no result'' THEN target_runs IS NOT NULL AND target_overs
        IS NOT NULL AND target_overs > 0 ELSE TRUE END", "req_run_rate_defined").'
      sources:
      - start_line: 28
        end_line: 30
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 72
        end_line: 72
        file: ''
      - start_line: 76
        end_line: 81
        file: ''
      uid: 312a01fd-d18c-4fe8-a9bf-3399ca506fc2
    - text: '''target_runs'' and ''target_overs'' are used as a pair and should be
        simultaneously null or simultaneously non-null. This can be enforced with:
        .satisfies("(target_runs IS NULL AND target_overs IS NULL) OR (target_runs
        IS NOT NULL AND target_overs IS NOT NULL)", "targets_pair_completeness").'
      sources:
      - start_line: 28
        end_line: 30
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      uid: c649a948-d810-4d6c-8ce4-ea66370f61c6
    - text: 'When result IN (''runs'', ''wickets''), ''result_margin'' must be a non-null
        positive whole number; when result IN (''tie'', ''no result''), ''result_margin''
        must be null. This reflects how ''margin_int'' is built and used. A Deequ
        example: .satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL AND result_margin >= 1 AND result_margin = CAST(result_margin
        AS BIGINT) ELSE result_margin IS NULL END", "result_margin_consistency_by_result").'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: 5e504b78-b109-4506-887e-557aee54f496
    - text: 'For rows where result IN (''runs'', ''wickets'', ''tie''), ''winner''
        must be non-null and equal to either ''team1'' or ''team2''; ''loser'' must
        equal the other team. For rows where result = ''no result'', ''winner'' should
        be null. This can be captured as: .satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'')
        THEN winner IS NOT NULL AND (winner = team1 OR winner = team2) ELSE winner
        IS NULL END", "winner_consistency_with_result_and_teams").'
      sources:
      - start_line: 44
        end_line: 50
        file: ''
      - start_line: 53
        end_line: 60
        file: ''
      uid: c0cc14c7-3929-4fad-8a77-a80ee48b42ee
    - text: 'If result = ''tie'', a Super Over occurred and a winner is recorded.
        After uppercasing, ''super_over'' should indicate truthy values (e.g., IN
        (''Y'',''YES'',''TRUE'',''T'',''1'')), and ''winner'' must be non-null. Deequ
        example: .satisfies("CASE WHEN result = ''tie'' THEN super_over IN (''Y'',''YES'',''TRUE'',''T'',''1'')
        AND winner IS NOT NULL ELSE TRUE END", "tie_requires_super_over_and_winner").'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: 26af39f8-2e4f-4d59-ae93-fa2cb8ad1438
  '["result","toss_winner","winner"]':
    code: []
    assumptions:
    - text: 'If result is ''runs'' or ''wickets'', then result_margin must be present
        and an integer. Additionally, if result=''runs'' then result_margin >= 1;
        if result=''wickets'' then result_margin is between 1 and 10. This can be
        expressed as a Deequ compliance constraint such as: (result NOT IN (''runs'',''wickets''))
        OR (result_margin IS NOT NULL AND result_margin = CAST(result_margin AS INT)
        AND ((result=''runs'' AND result_margin >= 1) OR (result=''wickets'' AND result_margin
        BETWEEN 1 AND 10))).'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 6f75b9b0-2b27-42b4-be35-7f1193f2daa9
    - text: 'If result is ''tie'' or ''no result'', then no margin applies and result_margin
        should be null. This can be enforced with a Deequ compliance such as: (result
        IN (''runs'',''wickets'')) OR result_margin IS NULL.'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: 2a1a521f-ed77-469a-8fe3-cf1ab2b417ab
    - text: 'For all rows where result != ''no result'', winner must be non-null and
        equal to either team1 or team2. Example Deequ: (result = ''no result'') OR
        (winner IS NOT NULL AND (winner = team1 OR winner = team2)).'
      sources:
      - start_line: 45
        end_line: 49
        file: ''
      - start_line: 53
        end_line: 60
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      uid: 4b75f1bc-51b3-46d4-92ad-aa91f528875c
    - text: 'If result = ''tie'', then a winner must still be present and a Super
        Over must be recorded (super_over not null/affirmative), since settlement
        text states a team ''won after Super Over''. Example compliance: (result !=
        ''tie'') OR (winner IS NOT NULL AND super_over IS NOT NULL).'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: 220a88e1-c3ad-4a05-a06b-089c5a3793fd
    - text: "toss_winner must be one of the two teams playing: toss_winner \u2208\
        \ {team1, team2} for every match. Example Deequ: toss_winner = team1 OR toss_winner\
        \ = team2."
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 45
        end_line: 49
        file: ''
      uid: 1b3aab0b-a0c3-40c6-9899-3593de23a297
    - text: 'For all resulted matches (result != ''no result''), toss_decision values
        must be restricted to {''field'',''bat''} (case-normalized earlier). Example
        Deequ compliance with filter: (result = ''no result'') OR (toss_decision IN
        (''field'',''bat'')).'
      sources:
      - start_line: 19
        end_line: 21
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 85
        end_line: 92
        file: ''
      uid: 5e571e04-be74-4bcc-83c8-5f77c1f0fea1
    - text: For every season_int that appears among resulted matches, both toss decisions
        ('field' and 'bat') should occur at least once so that 'toss_decision_advantage'
        can be computed. This can be validated by grouping by season_int over rows
        with result != 'no result' and asserting countDistinct(toss_decision) = 2
        for each group.
      sources:
      - start_line: 85
        end_line: 92
        file: ''
      - start_line: 94
        end_line: 96
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      uid: 7c1dea39-a35f-474d-8dfb-e61040bc7fff
    - text: 'For rows used in KPI calculations (result != ''no result''), season must
        be numeric/parseable (season_int not null). Example Deequ: (result = ''no
        result'') OR season RLIKE ''^[0-9]+$''.'
      sources:
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 76
        end_line: 82
        file: ''
      uid: 65c36e4e-2e82-4424-b4ea-2fae6a3eed99
    - text: 'team1 and team2 must both be present and must be different for every
        match (team1 != team2). This is required for loser derivation and settlement
        strings to be correct. Example Deequ: team1 IS NOT NULL AND team2 IS NOT NULL
        AND team1 != team2.'
      sources:
      - start_line: 45
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: f6e25b5a-73a9-4f9a-8f5e-773e896c6fea
  '["result","winner"]':
    code: []
    assumptions:
    - text: "Result\u2013margin consistency: If result is 'runs' or 'wickets', result_margin\
        \ must be present and an integer > 0; if result is 'tie' or 'no result', result_margin\
        \ should be null. This is required because margin_int is cast to integer and\
        \ then formatted into the settlement text for runs/wickets outcomes. Example\
        \ Deequ compliance: .add(Compliance('margin_consistent_with_result', \"((result\
        \ IN ('runs','wickets')) AND result_margin IS NOT NULL AND result_margin >=\
        \ 1 AND CAST(result_margin AS INT) = result_margin) OR ((result IN ('tie','no\
        \ result')) AND result_margin IS NULL)\"))"
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 53
        end_line: 60
        file: ''
      uid: 3958740e-b88f-4f7b-b0f7-68ac4877acd0
    - text: 'Winner must be one of the two teams and loser must be the other team
        whenever a winner exists. Also, team1 and team2 should be non-null and distinct
        when winner is non-null. Example Deequ compliance: .add(Compliance(''winner_in_teams'',
        "winner IS NULL OR winner IN (team1, team2)")) and .add(Compliance(''loser_matches_winner'',
        "winner IS NULL OR (team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <> team2
        AND ((winner = team1 AND loser = team2) OR (winner = team2 AND loser = team1)))"))'
      sources:
      - start_line: 45
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: c2baeb7b-caee-483f-9f2c-c29a1b26d9bd
    - text: 'Winner completeness depends on result: For rows where result != ''no
        result'', winner should be non-null; for rows where result = ''no result'',
        winner should be null. This is implied by downstream use of winner in settlement
        strings and in toss_winner_won KPIs after filtering out ''no result''. Example
        Deequ constraints: .isComplete(''winner'', where="result <> ''no result''")
        and .add(Compliance(''no_result_has_no_winner'', "result = ''no result'' =>
        winner IS NULL"))'
      sources:
      - start_line: 53
        end_line: 60
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      uid: cf94e85b-4218-426b-ba0d-4430a4c20c95
    - text: 'Toss KPIs assume comparable team naming: For rows where result != ''no
        result'', toss_winner should be non-null and equal to either team1 or team2,
        and toss_decision should be in {''bat'',''field''} to make the pivoted rates
        meaningful. Example Deequ constraints: .isComplete(''toss_winner'', where="result
        <> ''no result''") and .add(Compliance(''toss_winner_in_teams'', "result <>
        ''no result'' => toss_winner IN (team1, team2)")) and .isContainedIn(''toss_decision'',
        [''bat'',''field''], where="result <> ''no result''")'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 85
        end_line: 91
        file: ''
      uid: 2fea10d2-4f86-4da4-a672-8776c266424d
    - text: 'Tie handling: If result = ''tie'', a winner should still be present (super
        over winner), and super_over should be non-null to reflect that a super over
        occurred. Example Deequ constraints: .isComplete(''winner'', where="result
        = ''tie''") and .add(Compliance(''tie_has_super_over'', "result = ''tie''
        => super_over IS NOT NULL")) and .add(Compliance(''tie_winner_in_teams'',
        "result = ''tie'' => winner IN (team1, team2)"))'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: d3284105-ddf9-422a-ba67-370a46a08caf
  '["target_overs","target_runs"]':
    code: []
    assumptions:
    - text: 'The ''target_runs'' and ''target_overs'' fields are co-present: for any
        record, either both are null (no target set) or both are non-null. This prevents
        NaN propagation when computing required run rate. Deequ example: .addConstraint(Compliance(''target_fields_copresence'',
        ''(target_runs IS NULL AND target_overs IS NULL) OR (target_runs IS NOT NULL
        AND target_overs IS NOT NULL)'')).'
      sources:
      - start_line: 28
        end_line: 30
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      uid: 661c179c-f023-4f17-8a79-bea4175514e7
    - text: 'When ''target_runs'' is non-null, ''target_overs'' must be strictly greater
        than 0 to avoid division-by-zero and infinite values in ''req_run_rate''.
        Deequ example: .addConstraint(Compliance(''positive_overs_when_runs_present'',
        ''(target_runs IS NULL) OR (target_overs > 0)'')).'
      sources:
      - start_line: 28
        end_line: 30
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      uid: 71504ad8-fd35-4ad2-800b-906a5fb7fb7d
    - text: 'For rows included in season KPIs (result <> ''no result''), the required
        run rate must be computable and finite; therefore, ''target_runs'' and ''target_overs''
        must both be non-null and ''target_overs'' > 0. Deequ example: .addConstraint(Compliance(''kpi_rows_have_valid_target'',
        "(lower(result) = ''no result'') OR (target_runs IS NOT NULL AND target_overs
        IS NOT NULL AND target_overs > 0)")).'
      sources:
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 72
        end_line: 72
        file: ''
      - start_line: 76
        end_line: 82
        file: ''
      uid: a2cbcb3b-76cc-48fa-90f6-8fb89fd493ec
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("(winner IS NULL) OR (winner = team1) OR (winner = team2)",
        "winner_within_teams", lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: d025530c-1a7b-486d-9121-9adaa1070cf9
      source_assumptions:
      - 6a8d562b-fb8f-424c-8ab3-f58d20882e65
    - suggestion: '.satisfies("team1 <> team2", "teams_are_distinct_per_match", lambda
        v: v == 1.0)'
      validity: true
