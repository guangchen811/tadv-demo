    - suggestion: '.satisfies("(result = ''no result'') OR (lower(trim(winner)) <>
        lower(trim(toss_winner)) OR winner = toss_winner)", "Raw equality of winner
        and toss_winner matches canonical (lower/trim) equality on resulted matches",
        lambda x: x == 1.0)'
