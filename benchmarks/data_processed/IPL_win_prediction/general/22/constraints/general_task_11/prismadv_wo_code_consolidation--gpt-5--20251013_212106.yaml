    assumptions:
    - text: 'The ''team1'' column must exist in the input data and be complete (no
        nulls), because it is used to compute the ''loser'' team and is written to
        output. A suitable rule would be: Deequ .isComplete(''team1'') or Great Expectations
        expect_column_values_to_not_be_null(''team1'').'
      sources:
      - start_line: 47
        end_line: 49
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: e3bd6fb7-7f90-42fb-8ad4-b7df0d930dd6
    - text: 'Per row, ''team1'' must be different from ''team2'' (a team cannot play
        itself). This ensures the ''other_team'' logic truly returns the opponent.
        This can be expressed as a row-level compliance rule such as Deequ .satisfies("team1
        != team2", "team1_team2_distinct", lambda x: x == 1.0) or Great Expectations
        expect_column_pair_values_A_to_be_not_equal_to_B(''team1'',''team2'').'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: d9e51daf-1b96-424f-b64c-e5f69a7191c5
    - text: 'When a winner is present and the match is resulted (i.e., result not
        ''no result''), the ''winner'' value must equal either ''team1'' or ''team2''.
        This preserves the correctness of the ''loser'' derivation and settlement
        text. This can be checked with a conditional compliance rule: Deequ .satisfies("CASE
        WHEN winner IS NULL OR result = ''no result'' THEN true ELSE (winner = team1
        OR winner = team2) END", "winner_in_teams", lambda x: x == 1.0).'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 53
        end_line: 60
        file: ''
      - start_line: 72
        end_line: 72
        file: ''
      uid: 00eddc68-0117-4ec0-85c3-62a3e9be9fd2
    - text: 'Values in ''team1'' should be clean, non-empty strings without leading
        or trailing whitespace to ensure exact string comparisons and readable outputs.
        This can be enforced with a regex such as Deequ .matchesPattern(''team1'',
        ''^\S(.*\S)?$'', name=''team1_trimmed'') and a non-empty check Deequ .satisfies("team1
        <> ''''", "team1_non_empty", lambda x: x == 1.0) or Great Expectations expect_column_values_to_not_match_regex_list([''^\s*$'',
        ''^\s|\s$'']).'
      sources:
      - start_line: 47
        end_line: 47
        file: ''
      - start_line: 58
        end_line: 60
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: 5ccb6da5-705e-4b22-bc33-6e86e7d8d1e6
    - text: 'The same team names should use consistent casing across ''team1'', ''team2'',
        and ''winner'' (no case-only differences), because equality checks are case-sensitive
        and no normalization is applied to these columns. A practical validation is
        to assert that when lower(team1) = lower(winner), then team1 = winner (and
        similarly for team2 vs winner), e.g., Deequ .satisfies("(lower(team1) = lower(winner)
        AND winner IS NOT NULL) => team1 = winner", "team_case_consistency", lambda
        x: x == 1.0).'
      sources:
      - start_line: 19
        end_line: 23
        file: ''
      - start_line: 47
        end_line: 47
        file: ''
      uid: 52ad5e01-6519-4bd8-954c-7ad52a12ef90
    - text: 'The ''team1'' column should not contain placeholder null-like strings
        such as '''', ''NA'', ''NaN'', ''NULL'', ''None'', etc., because no cleanup
        is performed on team columns and such tokens would be treated as real team
        names and propagate into outputs. This can be enforced with Deequ .satisfies("NOT
        (team1 IN ('''', ''NA'', ''NaN'', ''nan'', ''NULL'', ''Null'', ''null'', ''None'',
        ''NullValue''))", "team1_no_placeholder_nulls", lambda x: x == 1.0) or Great
        Expectations expect_column_values_to_not_be_in_set for that token list.'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: 55c31b70-640d-46b3-acab-927e90c5c47f
