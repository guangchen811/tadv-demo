    - text: 'No-result rows must have no winner: If result == ''no result'' then winner
        must be null (after normalizing ''NullValue'', ''null'', etc.).

        Possible Deequ constraint:

        - .satisfies("CASE WHEN result = ''no result'' THEN winner IS NULL ELSE true
