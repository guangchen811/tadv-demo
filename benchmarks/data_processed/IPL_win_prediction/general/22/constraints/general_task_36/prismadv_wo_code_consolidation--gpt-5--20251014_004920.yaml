        OR method IN (''D/L'',''NullValue'',''null'',''NULL'',''None'','''') THEN
        1 ELSE 0 END", "Method domain", lambda x: x == 1.0). In Great Expectations:
        expect_column_values_to_be_in_set(''method'', [''D/L'',''NullValue'',''null'',''NULL'',''None'',''''])
