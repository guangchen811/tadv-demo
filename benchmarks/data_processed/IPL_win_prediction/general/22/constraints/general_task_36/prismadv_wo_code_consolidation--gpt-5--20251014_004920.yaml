        file: ''
      - start_line: 114
        end_line: 120
        file: ''
      uid: 18c3902c-2a3c-4436-9618-690d8cdc9dfd
    - text: 'For decided matches (result in {''runs'',''wickets''}), winner must be
        present and must be either team1 or team2.

        Possible Deequ constraint:

        - .satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN winner IN (team1,
        team2) ELSE true END", "winner_is_valid_for_decided")'
      sources:
