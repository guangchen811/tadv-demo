      - start_line: 114
        end_line: 120
        file: ''
      - start_line: 139
        end_line: 151
        file: ''
      uid: d2907ea1-5b3e-44e3-b6ad-f542fbc1f3f0
    - text: 'The derived win_by column must be consistent with result and result_margin:
        (a) if result == ''runs'', win_by == concat(int(result_margin), '' runs'');
        (b) if result == ''wickets'', win_by == concat(int(result_margin), '' wickets'');
        (c) if result == ''tie'' and super_over == ''Y'', win_by == ''Super Over'';
        (d) if result == ''tie'' and super_over != ''Y'', win_by == ''Tie''; (e) if
        result == ''no result'', win_by == ''No Result''.'
      sources:
