      uid: 8e89cd6d-73ce-45cc-a5fb-5a1db2ae455b
    - text: 'Consistency between toss_decision, batting_first, and chasing_team: If
        toss_decision == ''bat'', batting_first must equal toss_winner and chasing_team
        must equal the other team; otherwise batting_first must equal the opponent
        of toss_winner and chasing_team must equal toss_winner.

        Possible Deequ constraint:

