  '["date","season"]':
    code: []
    assumptions:
    - text: 'Toss winner and derived innings must be consistent across columns: (a)
        toss_winner must be either team1 or team2; (b) if toss_decision = ''bat''
        then batting_first = toss_winner else batting_first is the opponent; (c) chasing_team
        must be the other team (batting_first <> chasing_team), and both batting_first
        and chasing_team must be in {team1, team2}. We could represent these as Deequ
        constraints like: .satisfies("toss_winner IN (team1, team2)", "toss_winner_in_pair").satisfies("CASE
        WHEN toss_decision = ''bat'' THEN batting_first = toss_winner ELSE batting_first
        <> toss_winner END", "batting_first_matches_toss").satisfies("batting_first
        IN (team1, team2) AND chasing_team IN (team1, team2) AND batting_first <>
        chasing_team", "batting_chasing_valid").'
      sources:
      - start_line: 37
        end_line: 42
        file: ''
      - start_line: 169
        end_line: 171
        file: ''
      uid: bb37374d-2040-4874-99cf-a96689e80694
    - text: 'Winner, result, margin, and super_over must be mutually consistent: (a)
        if result IN (''runs'',''wickets'') then winner must be non-null, in {team1,
        team2}, and result_margin must be present, integer-castable, and > 0; (b)
        if result = ''tie'' AND super_over = ''Y'' then winner must be non-null and
        in {team1, team2}; (c) if result = ''tie'' AND super_over <> ''Y'' (or null),
        or if result = ''no result'', then winner must be null. Deequ examples: .satisfies("CASE
        WHEN result IN (''runs'',''wickets'') THEN winner IN (team1, team2) ELSE TRUE
        END", "winner_valid_for_completed").satisfies("CASE WHEN result IN (''runs'',''wickets'')
        THEN result_margin IS NOT NULL AND CAST(result_margin AS INT) > 0 ELSE TRUE
        END", "margin_present_and_positive").satisfies("CASE WHEN result = ''tie''
        AND super_over = ''Y'' THEN winner IN (team1, team2) ELSE TRUE END", "winner_required_for_super_over").satisfies("CASE
        WHEN result = ''no result'' OR (result = ''tie'' AND (super_over IS NULL OR
        super_over <> ''Y'')) THEN winner IS NULL ELSE TRUE END", "winner_null_when_nr_or_tie_without_so").'
      sources:
      - start_line: 47
        end_line: 55
        file: ''
      - start_line: 114
        end_line: 152
        file: ''
      uid: 23430554-2e76-4443-89de-f8c641410146
    - text: 'The winner must align with innings/result: if result = ''runs'' then
        winner = batting_first; if result = ''wickets'' then winner = chasing_team.
        Deequ example: .satisfies("CASE WHEN result = ''runs'' THEN winner = batting_first
        WHEN result = ''wickets'' THEN winner = chasing_team ELSE TRUE END", "winner_consistent_with_result").'
      sources:
      - start_line: 37
        end_line: 42
        file: ''
      - start_line: 121
        end_line: 138
        file: ''
      uid: 21f34fa8-c665-48e0-8276-04ac0e8bce3a
    - text: 'Effective overs must be consistent with method and target_overs: if method
        = ''D/L'' then target_overs must be non-null/numeric and effective_overs =
        target_overs; otherwise effective_overs = 20.0. Deequ examples: .satisfies("CASE
        WHEN method = ''D/L'' THEN target_overs IS NOT NULL ELSE TRUE END", "target_overs_required_for_DL").satisfies("CASE
        WHEN method = ''D/L'' THEN effective_overs = target_overs ELSE effective_overs
        = 20.0 END", "effective_overs_consistency").'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 45
        end_line: 45
        file: ''
      - start_line: 169
        end_line: 171
        file: ''
      uid: db8d3618-08d6-4e53-a641-11bfb3d70035
    - text: 'Each match should appear only once to avoid double-counting in the points
        computation; the combination (season, date, team1, team2) should be unique
        across rows (in addition to id being unique if present). Deequ example: .isUnique(["season","date","team1","team2"]).'
      sources:
      - start_line: 102
        end_line: 113
        file: ''
      - start_line: 169
        end_line: 171
        file: ''
      uid: 7dd264ff-8e28-49af-b531-a0738d7f5503
    - text: 'The two teams involved in a match must be different (team1 <> team2),
        otherwise match and outcome tallies will be incorrect. Deequ example: .satisfies("team1
        <> team2", "teams_are_distinct").'
      sources:
      - start_line: 102
        end_line: 113
        file: ''
      - start_line: 169
        end_line: 171
        file: ''
      uid: 0d0bd1d2-a496-4728-8141-c9299bd41bab
    - text: 'Date and season should be coherent for downstream dashboards: date must
        be parseable and its year should equal season. Deequ examples: .hasPattern("date",
        "\\d{4}-\\d{2}-\\d{2}", "iso_date_format").satisfies("year(to_timestamp(date,
        ''yyyy-MM-dd'')) = season", "season_matches_date_year").'
      sources:
      - start_line: 169
        end_line: 171
        file: ''
      uid: a8368fdd-cb92-4fbd-97d7-bb083c0e0489
