        file: ''
      uid: cff264e2-5743-47ef-aae8-6d10e9fb0ba9
    - text: 'For decided matches (result in {''runs'',''wickets''}), result_margin
        must be present, numeric, and strictly positive (the code casts to int for
        usage).

        Possible Deequ constraint:

        - .satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL AND result_margin > 0 ELSE true END", "positive_margin_for_decided")'
