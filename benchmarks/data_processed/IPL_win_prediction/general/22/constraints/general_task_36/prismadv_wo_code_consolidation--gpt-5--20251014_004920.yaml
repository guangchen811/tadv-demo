        end_line: 146
        file: ''
      - start_line: 104
        end_line: 106
        file: ''
      uid: 0410ef4c-bc0f-43bf-a6bd-7d7b369c21a0
    - text: 'If result = ''tie'' and super_over = ''N'', there must be no winner recorded.
        Predicate example: NOT(result = ''tie'' AND super_over = ''N'') OR winner
        IS NULL.'
      sources:
      - start_line: 147
        end_line: 151
        file: ''
      - start_line: 56
        end_line: 60
        file: ''
      uid: f2bdebdf-73c5-4147-8cb6-9ccc98ed329a
    - text: 'If result = ''runs'' or result = ''wickets'', then result_margin must
        be a non-null positive integer and winner must be present and equal to either
        team1 or team2. Predicate examples: NOT(result = ''runs'') OR (result_margin
        IS NOT NULL AND result_margin >= 1 AND winner IS NOT NULL AND (winner = team1
        OR winner = team2)); NOT(result = ''wickets'') OR (result_margin IS NOT NULL
        AND result_margin >= 1 AND winner IS NOT NULL AND (winner = team1 OR winner
        = team2)).'
