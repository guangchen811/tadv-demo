        end_line: 120
        file: ''
      uid: c43c5fa8-e84f-455b-bc0e-c1111519023c
    - text: 'When method = ''D/L'', target_overs must be present and valid (numeric,
        > 0, <= 20). Predicate example: (method != ''D/L'') OR (target_overs IS NOT
        NULL AND target_overs > 0 AND target_overs <= 20).'
      sources:
