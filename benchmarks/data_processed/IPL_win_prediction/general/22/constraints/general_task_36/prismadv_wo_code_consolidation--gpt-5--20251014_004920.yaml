        must be exactly 20.0 and target_overs may be null. Additionally, when method
        == ''D/L'', target_overs should be > 0 and <= 20.

        Possible Deequ constraints:

        - .satisfies("CASE WHEN method = ''D/L'' THEN target_overs IS NOT NULL ELSE
        true END", "dl_target_overs_not_null")

        - .satisfies("CASE WHEN method = ''D/L'' THEN effective_overs = target_overs
        ELSE effective_overs = 20.0 END", "effective_overs_logic")

