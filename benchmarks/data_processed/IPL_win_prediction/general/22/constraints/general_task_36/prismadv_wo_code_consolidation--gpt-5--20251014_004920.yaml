    - text: 'Domain and formatting of ''method'': All non-missing values must be exactly
        ''D/L'' (case-sensitive, no leading/trailing whitespace). Missingness in the
        raw CSV may be represented by actual nulls or the tokens ''NullValue'', ''null'',
