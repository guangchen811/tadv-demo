      source_assumptions:
      - ff42feac-93d8-4a06-8809-cb90a3eedd36
    assumptions:
    - text: 'The input must include a ''result_margin'' column. The script selects
        this column when building the match_outcomes DataFrame and writes it to disk;
        if it is missing, a KeyError will occur. We could represent this assumption
        as a deequ constraint like this: .hasColumn(''result_margin'')'
      sources:
      - start_line: 169
        end_line: 171
        file: ''
      - start_line: 177
        end_line: 177
        file: ''
      uid: 7848ac04-65d0-4ce7-81c7-04f603f1d1a1
    - text: 'For rows where result is ''runs'' or ''wickets'', ''result_margin'' must
        be present (non-null) and parseable as numeric. The code coerces non-numeric
        values to null and then casts to int for these rows, so any null after coercion
        will cause a failure. We could represent this assumption as a deequ constraint
        like this: .satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE
        WHEN `result_margin` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Margin present
        for wins", lambda x: x == 1)'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 124
        end_line: 138
        file: ''
      uid: 5811ec37-920d-4d39-9a05-4d2c8e056a7b
    - text: 'For rows where result is ''runs'' or ''wickets'', ''result_margin'' must
        be an integer-valued number (no fractional part), because the code casts it
        to int when composing win-by text and computing points. We could represent
        this assumption as a deequ constraint like this: .satisfies("CASE WHEN `result`
        IN (''runs'',''wickets'') THEN (`result_margin` = CAST(`result_margin` AS
        BIGINT)) ELSE 1 END", "Margin integer for wins", lambda x: x == 1)'
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 124
        end_line: 138
        file: ''
      uid: 7a1a2ed5-6024-4cd5-8595-b682487ce33a
    - text: 'Valid ranges for ''result_margin'' on winning rows: if result = ''runs'',
        ''result_margin'' should be >= 1; if result = ''wickets'', ''result_margin''
        should be between 1 and 10 inclusive. Negative or zero margins would be nonsensical
        for wins and would distort points tallies. We could represent this assumption
        as a deequ constraint like this: .satisfies("CASE WHEN `result` = ''wickets''
        THEN (`result_margin` BETWEEN 1 AND 10) WHEN `result` = ''runs'' THEN (`result_margin`
        >= 1) ELSE 1 END", "Valid margin ranges for wins", lambda x: x == 1)'
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 80
        end_line: 81
        file: ''
      - start_line: 124
        end_line: 138
        file: ''
      uid: ff42feac-93d8-4a06-8809-cb90a3eedd36
