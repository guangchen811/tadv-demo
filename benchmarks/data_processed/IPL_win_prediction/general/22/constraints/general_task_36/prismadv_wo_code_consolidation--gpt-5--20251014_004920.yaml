    assumptions:
    - text: The input must contain a 'team2' column. It is required to compute opponent-of-toss,
        to build the unique team list for the points table, and is emitted in the
        match outcomes output.
      sources:
      - start_line: 37
        end_line: 39
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 169
        end_line: 171
        file: ''
      uid: b8be05fa-9168-439c-9f39-babeaa898d0a
    - text: The 'team2' column should be complete (no nulls) for all rows. Null or
        missing values would propagate into opponent-of-toss and be used as dictionary
        keys in the points aggregation, leading to incorrect results. This can be
        validated as completeness('team2') == 1.0.
      sources:
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 105
        end_line: 112
        file: ''
      uid: 3756dec1-8299-4133-93a7-27455f7e8b81
    - text: Values in 'team2' should be strings (text identifiers). They are used
        as categorical team names and as dictionary keys in the points table. Validate
        that all non-null values in 'team2' are of type string.
      sources:
      - start_line: 69
        end_line: 82
        file: ''
      - start_line: 123
        end_line: 138
        file: ''
      uid: 06a04a32-f349-469d-b08f-2dedfa477d7d
    - text: 'Row-level domain consistency: For each row, toss_winner must be either
        team1 or team2, and similarly winner (when present) must be either team1 or
        team2. This implies ''team2'' values must be in the same canonical domain
        and formatting as team1/toss_winner/winner. A suitable rule is: CASE WHEN
        toss_winner IN (team1, team2) THEN 1 ELSE 0 END == 1, and when winner IS NOT
        NULL, CASE WHEN winner IN (team1, team2) THEN 1 ELSE 0 END == 1.'
      sources:
      - start_line: 37
        end_line: 39
        file: ''
      - start_line: 123
        end_line: 133
        file: ''
      - start_line: 142
        end_line: 146
        file: ''
      uid: fb47e333-8d87-436d-b20b-b820637cddec
    - text: 'Within a match record, ''team2'' should not equal ''team1'' (two distinct
        teams play each match). You can validate with a row-level check: team2 !=
        team1 for all rows.'
      sources:
      - start_line: 111
        end_line: 112
        file: ''
      - start_line: 149
        end_line: 151
        file: ''
      uid: 5ca5f065-ee02-4b8d-8dc5-875c4b75c262
    - text: The 'team2' column should not contain null-like placeholder strings such
        as 'NullValue', 'null', 'NULL', 'None', or empty ''. These are not normalized
        for 'team2' and would be treated as actual team names in the aggregation.
        Validate that team2 NOT IN ('NullValue','null','NULL','None','').
      sources:
      - start_line: 22
        end_line: 26
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: 9702d24b-56e6-4165-8193-edf50dbfc7b8
    - text: The number of distinct values in 'team2' should be bounded to a realistic
        league/team roster size. Based on the dataset (about 19 distinct), set a guardrail
        such as approx_count_distinct(team2) <= 25.
      sources:
      - start_line: 69
        end_line: 82
        file: ''
      uid: e4581941-9c40-47e9-88f4-f78b4a51b73e
    - text: 'Formatting consistency: ''team2'' values should be trimmed and consistently
        cased so exact string equality across columns works. Leading/trailing whitespace
        or case drift can cause equality checks with winner/toss_winner/team1 to fail.
        A practical check is team2 == trim(team2) for all rows.'
      sources:
      - start_line: 37
        end_line: 39
        file: ''
      - start_line: 123
        end_line: 133
        file: ''
      - start_line: 142
        end_line: 146
        file: ''
      uid: e4bca253-8d5a-4a88-8c5f-f17198d133c5
