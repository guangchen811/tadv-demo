    - text: "toss_winner must be one of the two teams playing: toss_winner \u2208\
        \ {team1, team2}. This is required for correctly deriving batting_first and\
        \ chasing_team.\nPossible Deequ constraint:\n- .satisfies(\"toss_winner IN\
        \ (team1, team2)\", \"toss_winner_in_teams\")"
