  '["result","result_margin"]':
    code: []
    assumptions:
    - text: If result is either 'runs' or 'wickets', then result_margin must be present
        (non-null after type coercion), numeric, an integer value, and >= 1. This
        can be encoded as a conditional compliance constraint, e.g., where result
        in ('runs','wickets'), result_margin is not null and result_margin >= 1 and
