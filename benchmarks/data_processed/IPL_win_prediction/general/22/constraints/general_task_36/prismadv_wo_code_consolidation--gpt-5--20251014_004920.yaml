        end_line: 151
        file: ''
      uid: 751eba7e-0c7a-409c-a7dc-754b02129c77
    - text: For rows where result is in ('tie', 'no result'), result_margin must be
        null. (The script never uses margin for these outcomes and would fail/produce
        incorrect semantics if a non-null numeric were present.)
      sources:
