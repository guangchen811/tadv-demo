    - text: 'Tie handling with Super Over: If result == ''tie'' and super_over ==
        ''Y'', then winner must be present and must be either team1 or team2. If result
        == ''tie'' and super_over != ''Y'', then winner should be null.

        Possible Deequ constraints:

        - .satisfies("CASE WHEN result = ''tie'' AND super_over = ''Y'' THEN winner
        IN (team1, team2) ELSE true END", "winner_required_for_super_over_tie")

        - .satisfies("CASE WHEN result = ''tie'' AND (super_over IS NULL OR super_over
        <> ''Y'') THEN winner IS NULL ELSE true END", "no_winner_for_regular_tie")'
      sources:
