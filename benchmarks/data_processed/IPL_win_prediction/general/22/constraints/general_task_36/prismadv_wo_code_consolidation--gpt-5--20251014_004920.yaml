  '["result","super_over"]':
    code: []
    assumptions:
    - text: 'The super_over flag must only be ''Y'' for tied matches. In other words:
        (super_over = ''Y'') implies (result = ''tie''), and for non-tie results super_over
        must be ''N''. Predicate example: (super_over != ''Y'') OR (result = ''tie'').'
      sources:
