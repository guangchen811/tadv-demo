    assumptions:
    - text: 'The input data must include the ''target_overs'' column, because it is
        referenced unconditionally to compute ''effective_overs''. We could represent
        this as a Deequ constraint: .hasColumn(''target_overs'').'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      - start_line: 30
        end_line: 31
        file: ''
      uid: ffff800c-c372-408a-b6f8-8b26d502f8ac
    - text: 'For rows where method = ''D/L'', ''target_overs'' must be present (non-null).
        This ensures ''effective_overs'' is not null for D/L matches. Deequ example:
        .satisfies("CASE WHEN method = ''D/L'' AND target_overs IS NULL THEN 0 ELSE
        1 END", "Non-null target_overs for D/L", lambda x: x == 1).'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      - start_line: 30
        end_line: 31
        file: ''
      uid: 1a640f0f-1c3d-47a3-b0be-2ed16cbf1564
    - text: 'For rows where method = ''D/L'', ''target_overs'' must be a valid numeric
        value in the range (0, 20]. This reflects T20 context where maximum scheduled
        overs is 20 and D/L revises it downward. Deequ example: .satisfies("CASE WHEN
        method = ''D/L'' THEN CASE WHEN target_overs > 0 AND target_overs <= 20 THEN
        1 ELSE 0 END ELSE 1 END", "Valid D/L target_overs range", lambda x: x == 1).'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      - start_line: 30
        end_line: 31
        file: ''
      uid: 84550310-9921-41b6-b004-086fe2b1c014
    - text: 'For rows where method <> ''D/L'', if ''target_overs'' is provided, it
        should be either null or equal to 20.0 to remain consistent with the fixed
        20-over assumption used elsewhere. Deequ example: .satisfies("CASE WHEN method
        <> ''D/L'' AND target_overs IS NOT NULL THEN CASE WHEN target_overs = 20.0
        THEN 1 ELSE 0 END ELSE 1 END", "target_overs equals 20 when not D/L", lambda
        x: x == 1).'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      uid: fb11392c-e03f-450c-9c60-fe804a4a4d2f
  result_margin:
    code:
    - suggestion: .hasColumn('result_margin')
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''.hasColumn(''result_margin'')'':
