      - start_line: 22
        end_line: 26
        file: ''
      - start_line: 61
        end_line: 62
        file: ''
      - start_line: 114
        end_line: 120
        file: ''
      uid: 06c81f3f-0e7e-4e85-8f2d-7da49b68747a
    - text: 'If result is ''tie'': (a) when super_over == ''Y'', winner must be non-null
        and equal to team1 or team2; (b) when super_over != ''Y'', winner must be
        null. In both cases, result_margin should be null (not used).'
