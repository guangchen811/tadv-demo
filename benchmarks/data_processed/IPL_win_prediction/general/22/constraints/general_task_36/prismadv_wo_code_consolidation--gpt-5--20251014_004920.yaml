        end_line: 60
        file: ''
      - start_line: 139
        end_line: 147
        file: ''
      uid: 67ecba03-78b3-4523-8e29-dfe95d85f08e
    - text: 'If result = ''tie'' and super_over = ''Y'', there must be exactly one
        winner and it must be one of the two teams. Predicate example: NOT(result
        = ''tie'' AND super_over = ''Y'') OR (winner IS NOT NULL AND (winner = team1
        OR winner = team2)).'
      sources:
