    - text: 'For any non-tie result, super_over must be ''N'': if result <> ''tie''
        then super_over = ''N''. Deequ example: .satisfies("(result <> ''tie'') =>
        (super_over = ''N'')", "non_tie_has_no_super_over", lambda d: d == 1.0)'
