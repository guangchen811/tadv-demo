        end_line: 138
        file: ''
      - start_line: 104
        end_line: 106
        file: ''
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 50
        end_line: 55
        file: ''
      uid: fc300994-1563-403b-bc31-0b0a86dd25db
    - text: 'If result = ''no result'', then there must be no winner and no result_margin
        recorded, and super_over must be ''N''. Predicate example: NOT(result = ''no
        result'') OR (winner IS NULL AND result_margin IS NULL AND super_over = ''N'').'
      sources:
