        winner IS NOT NULL AND winner IN (team1, team2). Deequ example: .satisfies("CASE
        WHEN result IN (''runs'',''wickets'') THEN winner IS NOT NULL AND (winner
        = team1 OR winner = team2) ELSE true END", "winner_present_and_valid_on_decided_results",
        lambda d: d == 1.0)'
