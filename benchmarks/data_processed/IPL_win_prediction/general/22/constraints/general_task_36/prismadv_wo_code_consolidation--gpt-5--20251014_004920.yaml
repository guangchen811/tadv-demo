        ((chasing_team = team1 AND batting_first = team2) OR (chasing_team = team2
        AND batting_first = team1))) OR (toss_decision <> ''bat'' AND batting_first
        <> toss_winner AND ((batting_first = team1 AND chasing_team = team2) OR (batting_first
        = team2 AND chasing_team = team1)))", "batting_chasing_consistency")'
