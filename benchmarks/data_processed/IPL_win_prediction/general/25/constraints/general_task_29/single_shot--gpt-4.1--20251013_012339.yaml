constraints:
  city:
    code:
    - - .hasCompleteness('city', 0.987)
      - Invalid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    assumptions: []
  method:
    code:
    - - .hasCompleteness('method', 0.025)
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .hasCompleteness('player_of_match', 0.998)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasCompleteness('result_margin', 0.989)
      - Invalid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasCompleteness('target_overs', 0.998)
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .hasCompleteness('target_runs', 0.998)
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .hasCompleteness('winner', 0.998)
      - Invalid
    assumptions: []
