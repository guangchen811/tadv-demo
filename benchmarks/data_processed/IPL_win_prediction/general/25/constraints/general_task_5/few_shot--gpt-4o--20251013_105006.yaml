constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  match_type:
    code:
    - - '.hasNumberOfDistinctValues(''match_type'', lambda x: x >= 1)'
      - Invalid
    - - .isComplete('match_type')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner')
      - Invalid
    assumptions: []
