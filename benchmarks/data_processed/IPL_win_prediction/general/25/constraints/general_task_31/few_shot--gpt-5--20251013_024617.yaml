constraints:
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  row_level:
    code:
    - - '.satisfies(''(toss_winner = team1 OR toss_winner = team2)'', ''toss_winner_is_valid'',
        lambda x: x == 1.0)'
      - Valid
    - - '.satisfies(''(winner IS NULL) OR (winner = team1 OR winner = team2)'', ''winner_is_valid'',
        lambda x: x == 1.0)'
      - Valid
    - - '.satisfies(''team1 != team2'', ''teams_not_same'', lambda x: x == 1.0)'
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
