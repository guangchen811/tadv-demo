constraints:
  avg_runs_margin:
    code:
    - - .isNonNegative('avg_runs_margin', allow_nulls=True)
      - Invalid
    assumptions: []
  avg_wickets_margin:
    code:
    - - .isNonNegative('avg_wickets_margin', allow_nulls=True)
      - Invalid
    assumptions: []
  city:
    code:
    - - '.hasCompleteness(''city'', lambda x: x >= 0.98)'
      - Valid
    - - .isDataType('city', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .isDataType('date', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Valid
    assumptions: []
  matches:
    code:
    - - .isPositive('matches')
      - Invalid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L'], allow_nulls=True)
      - Invalid
    - - .isDataType('method', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - '.hasCompleteness(''player_of_match'', lambda x: x >= 0.99)'
      - Valid
    - - .isDataType('player_of_match', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.hasCompleteness(''result_margin'', lambda x: x >= 0.98)'
      - Valid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  result_margin_int:
    code:
    - - .isDataType('result_margin_int', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isNonNegative('result_margin_int')
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isDataType('season', ConstrainableDataTypes.Integral)
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  super_over_deciders:
    code:
    - - .isNonNegative('super_over_deciders')
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - '.hasCompleteness(''target_overs'', lambda x: x >= 0.99)'
      - Valid
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      - Valid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isDataType('team1', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    - - .isDataType('team2', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  ties_wo_super_over:
    code:
    - - .isNonNegative('ties_wo_super_over')
      - Invalid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .isDataType('toss_winner', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    - - .isDataType('venue', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  win_points:
    code:
    - - .isNonNegative('win_points')
      - Invalid
    assumptions: []
  win_rate:
    code:
    - - .isLessThanOrEqualTo('win_rate', 1.0)
      - Invalid
    - - .isNonNegative('win_rate')
      - Invalid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      - Valid
    - - .isDataType('winner', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
