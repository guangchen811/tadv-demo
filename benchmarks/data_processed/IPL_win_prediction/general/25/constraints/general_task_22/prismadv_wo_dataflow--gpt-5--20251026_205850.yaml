        end_line: 63
        file: ''
      - start_line: 68
        end_line: 69
        file: ''
      - start_line: 16
        end_line: 17
        file: ''
      uid: 2333b8e9-bafa-496b-88d9-397d4aa135a4
    - text: 'Victory margins are counts and should be whole numbers when applicable:
        for rows with result_lc in (''runs'',''wickets''), result_margin should be
        integer-valued. Example (Great Expectations): expect_column_values_to_match_regex_list
        on str(result_margin) with condition "result_lc in [''runs'',''wickets'']"
        using a numeric-integer pattern, or a custom expectation checking result_margin
        == floor(result_margin).'
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 68
        end_line: 69
        file: ''
      - start_line: 16
        end_line: 17
        file: ''
      uid: 690f2227-ef65-40ed-8279-08d8a5dbbfba
    - text: 'For rows where result_lc is not ''runs'' or ''wickets'' (e.g., ''tie'',
