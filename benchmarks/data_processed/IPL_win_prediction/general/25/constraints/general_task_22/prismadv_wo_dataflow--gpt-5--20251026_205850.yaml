        file: ''
      - start_line: 95
        end_line: 95
        file: ''
      - start_line: 112
        end_line: 112
        file: ''
      uid: a9aba679-98e5-4232-9ca1-808a4797af38
    - text: 'match_type values should be trimmed (no leading/trailing spaces), otherwise
        exact matches (e.g., == ''League'') in alerts will fail. We could represent
        this as: Deequ: .satisfies("CASE WHEN match_type IS NULL THEN 1 ELSE CASE
        WHEN match_type = TRIM(match_type) THEN 1 ELSE 0 END END", ''match_type trimmed'',
        lambda x: x == 1.0) or Great Expectations: expect_column_values_to_not_match_regex(''match_type'',
        ''^\\s|\\s$'').'
      sources:
      - start_line: 95
        end_line: 95
        file: ''
      - start_line: 71
        end_line: 72
        file: ''
      uid: b7d9f81a-2b47-4574-b36d-8b9f0515fb09
    - text: 'Canonical casing is required for key categories used in alerts: ''League''
        and ''Final'' should appear exactly with this casing after trimming. Otherwise,
        equality checks on kpi_sm (e.g., match_type == ''League'' and stripped match_type
        == ''Final'') will not match. We could represent this as: Deequ: .satisfies("CASE
        WHEN LOWER(match_type) = ''league'' THEN CASE WHEN match_type = ''League''
        THEN 1 ELSE 0 END ELSE 1 END", ''canonical League casing'', lambda x: x ==
        1.0) and .satisfies("CASE WHEN LOWER(match_type) = ''final'' THEN CASE WHEN
        TRIM(match_type) = ''Final'' THEN 1 ELSE 0 END ELSE 1 END", ''canonical Final
        casing'', lambda x: x == 1.0).'
      sources:
