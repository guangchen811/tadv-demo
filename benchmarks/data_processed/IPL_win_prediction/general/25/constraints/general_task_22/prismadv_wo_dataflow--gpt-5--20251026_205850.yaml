    - text: 'match_type should be a categorical field constrained to the known set
        of values: {''League'', ''Final'', ''Qualifier 1'', ''Qualifier 2'', ''Eliminator'',
        ''Elimination Final'', ''Semi Final''}. This ensures downstream equality checks
