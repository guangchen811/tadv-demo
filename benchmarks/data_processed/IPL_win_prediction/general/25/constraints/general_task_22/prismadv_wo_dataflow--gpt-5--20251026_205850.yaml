      uid: c65beb1a-fbfb-4aa8-8a3b-b71081d50ccf
    - text: 'For rows where result_lc is ''runs'' or ''wickets'', result_margin should
        be strictly positive (> 0). Negative or zero victory margins would make the
        average margins meaningless. Example (Deequ): .satisfies("CASE WHEN lower(trim(result))
        IN (''runs'',''wickets'') THEN CASE WHEN CAST(result_margin AS DOUBLE) > 0
        THEN 1 ELSE 0 END ELSE 1 END", "positive margins", lambda x: x == 1)'
      sources:
