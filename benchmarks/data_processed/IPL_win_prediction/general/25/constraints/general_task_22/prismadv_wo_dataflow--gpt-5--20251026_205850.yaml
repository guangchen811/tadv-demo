    - text: 'Within each (season, match_type) group, if there exist any matches with
        result_lc = ''runs'', at least one row must have a non-null numeric result_margin
        (similarly for ''wickets''), so that avg_margin_runs/avg_margin_wickets can
        be computed. Example (Great Expectations): conditional expectation per group
        ensuring count of non-null result_margin where result_lc = ''runs'' (or ''wickets'')
        is >= 1.'
