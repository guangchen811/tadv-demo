        end_line: 95
        file: ''
      - start_line: 112
        end_line: 114
        file: ''
      uid: f1368f69-24f1-4eab-b66f-cef23db099a1
    - text: 'The dataset should contain at least one ''League'' match_type value (overall),
        since alerts query kpi_sm where match_type == ''League''. We could represent
