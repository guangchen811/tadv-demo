constraints:
  date:
    code:
    - - '.hasPattern(''date'', r''^\d{4}-\d{2}-\d{2}$'', lambda v: v == 1.0)'
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isPositive('id')
      - Invalid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Eliminator', 'Qualifier 1', 'Qualifier
        2', 'Final', 'Semi Final', 'Elimination Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("method is null or method = 'D/L'", 'method_null_or_dl')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("((lower(result) in ('runs','wickets')) and result_margin is not
        null and result_margin > 0) or (lower(result) not in ('runs','wickets'))",
        'margin_present_for_decided')
      - Valid
    - - .satisfies("(lower(result) != 'wickets') or (result_margin between 1 and 10)",
        'wkts_margin_1_to_10')
      - Valid
    assumptions: []
  season:
    code:
    - - '.hasMax(''season'', lambda v: v <= 2025)'
      - Valid
    - - '.hasMin(''season'', lambda v: v >= 2008)'
      - Valid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  super_over,result:
    code:
    - - .satisfies("(lower(result) != 'tie' and upper(super_over) = 'N') or (lower(result)
        = 'tie' and upper(super_over) = 'Y')", 'super_over_consistent_with_tie')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1,team2:
    code:
    - - .satisfies('team1 != team2', 'teams_not_same')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  toss_winner,team1,team2:
    code:
    - - .satisfies('toss_winner = team1 or toss_winner = team2', 'toss_winner_in_teams')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("(lower(result) in ('runs','wickets') and winner is not null and
        (winner = team1 or winner = team2)) or (lower(result) not in ('runs','wickets')
        and winner is null)", 'winner_validity')
      - Invalid
    assumptions: []
