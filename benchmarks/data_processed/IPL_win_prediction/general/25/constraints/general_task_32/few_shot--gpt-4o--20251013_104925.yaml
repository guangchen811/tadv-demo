constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .isDate('date', 'yyyy-MM-dd')
      - Invalid
    assumptions: []
  loser:
    code:
    - - .isComplete('loser')
      - Invalid
    assumptions: []
  result:
    code:
    - - .hasPattern('result', '^(runs|wickets|tie|no result)$')
      - Valid
    - - .isComplete('result')
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isComplete('result_margin')
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .hasPattern('super_over', '^(Y|N)$')
      - Valid
    - - .isComplete('super_over')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .hasPattern('toss_decision', '^(field|bat)$')
      - Valid
    - - .isComplete('toss_decision')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner')
      - Invalid
    assumptions: []
