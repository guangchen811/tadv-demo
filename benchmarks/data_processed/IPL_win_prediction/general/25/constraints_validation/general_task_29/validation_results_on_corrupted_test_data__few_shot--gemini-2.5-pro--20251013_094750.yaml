results:
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isComplete('result_margin', "result IN ('runs', 'wickets')")
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''result_margin'', "result IN (''runs'',
        ''wickets'')")'' failed on data sample: Value: 0.9782016348773842 does not
        meet the constraint requirement! result IN (''runs'', ''wickets'')'
      level: error
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner_must_be_a_participant')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .isComplete('winner', "result != 'no result'")
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''winner'', "result != ''no result''")''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement! result != ''no result'''
      level: error
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'winner_must_be_a_participant')
      status: true
      reason_if_failed: ''
      level: error
