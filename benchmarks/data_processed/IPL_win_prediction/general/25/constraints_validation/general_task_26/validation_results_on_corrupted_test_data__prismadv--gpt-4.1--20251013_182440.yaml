results:
  team1:
    code:
    - suggestion: '.hasCompleteness(''team1'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('LENGTH(TRIM(team1)) > 0', 'Non-empty team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.hasCompleteness(''team2'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier
        2', 'Final', 'Eliminator', 'Elimination Final', 'Semi Final'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`match_type` = ''Final''", "Has Final Match Type",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies(''(`result` NOT IN ("runs", "wickets", "tie")) OR (`target_overs`
        IS NOT NULL AND cast(`target_overs` as double) IS NOT NULL)'', ''No null or
        non-numeric target_overs for training rows'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(`result` NOT IN ("runs", "wickets", "tie")) OR (cast(`target_overs`
        as double) <> 0)'', ''No zero target_overs for training rows'', lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(`result` NOT IN ("runs", "wickets", "tie")) OR (cast(`target_overs`
        as double) <= 20)'', ''target_overs <= 20 for training rows'', lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: .satisfies('CASE WHEN (`result` IN ("runs", "wickets")) THEN (`result_margin`
        IS NULL OR CAST(`result_margin` AS DOUBLE) IS NOT NULL) ELSE TRUE END', 'result_margin
        present or safely fillable for runs/wickets')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN result IN ("runs", "wickets", "tie") THEN
        CASE WHEN target_runs IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END'', ''target_runs
        non-null for train rows'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('target_runs')
      status: false
      reason_if_failed: 'Constraint ''isNonNegative(''target_runs'')'' failed on data
        sample: Value: 0.9782016348773842 does not meet the constraint requirement!'
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.hasCompleteness(''super_over'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("super_over IN (''Y'', ''N'')", ''Valid super_over values'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`toss_winner` = `team1` OR `toss_winner` = `team2`)',
        'Toss winner is one of the two teams')
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''date is not NULL AND to_date(date) is not NULL'',
        ''date parseable'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","id","season","team1","team2"]':
    code:
    - suggestion: '.hasUniqueness([''team1'', ''team2'', ''date'', ''season''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team1 IS NOT NULL AND team2 IS NOT NULL AND team1
        <> team2'', ''Valid distinct teams for training rows'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''season'', ''date'', ''team1'', ''team2'', ''id''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["date","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CAST(`season` AS INT) IS NOT NULL AND CAST(`date` AS
        TIMESTAMP) IS NOT NULL', 'Season and Date parseable')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies('result NOT IN ("runs", "wickets", "tie") OR winner IS
        NOT NULL', 'winner must be present for decisive results')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('result NOT IN ("runs", "wickets", "tie") OR (winner
        = team1 OR winner = team2)', 'winner must be team1 or team2 for decisive results')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN 1
        ELSE 0 END", ''Majority decisive results'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["toss_decision","toss_winner"]':
    code:
    - suggestion: .satisfies('(`toss_winner` = `team1` OR `toss_winner` = `team2`)',
        'Toss winner must be one of the teams')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`toss_decision` = "bat" OR `toss_decision` = "field")',
        'Toss decision must be bat or field')
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: .satisfies('`team1` <> `team2`', 'team1 and team2 must be different')
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: .satisfies("(`team1` <> `team2`)", "team1 and team2 must be different")
      status: true
      reason_if_failed: ''
      level: error
