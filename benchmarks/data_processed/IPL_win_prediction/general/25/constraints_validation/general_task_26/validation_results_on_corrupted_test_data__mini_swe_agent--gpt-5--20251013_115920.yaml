results:
  date:
    code:
    - suggestion: .hasPattern('date', '^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result','draw','abandoned'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .hasPattern('season', '^[0-9]{4}$')
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''season'', ''^[0-9]{4}$'')'' failed
        on data sample: Expected type of column season to be StringType, but found
        LongType instead!'
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isComplete('target_overs')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''target_overs'')'' failed on data
        sample: Value: 0.9945504087193461 does not meet the constraint requirement!'
      level: error
    - suggestion: .isPositive('target_overs')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .isComplete('target_runs')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''target_runs'')'' failed on data
        sample: Value: 0.9945504087193461 does not meet the constraint requirement!'
      level: error
    - suggestion: .isNonNegative('target_runs')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''target_runs'')'' failed on
        data sample: Value: 0.9782016348773842 does not meet the constraint requirement!'
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasNumberOfDistinctValues(''winner'', lambda x: x > 0)'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''winner'',
        lambda x: x > 0)'': Check.hasNumberOfDistinctValues() missing 2 required positional
        arguments: ''binningUdf'' and ''maxBins'''
      level: error
