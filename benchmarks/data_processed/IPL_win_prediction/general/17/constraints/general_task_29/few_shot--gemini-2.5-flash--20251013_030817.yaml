constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda x: x >= 0.98)'
      - Valid
    - - .isDataType('city', "String")
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .isDataType('date', "String")
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', "Integral")
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - '.hasCompleteness(''player_of_match'', lambda x: x >= 0.99)'
      - Valid
    - - .isDataType('player_of_match', "String")
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    - - .isDataType('result', "String")
      - Invalid
    assumptions: []
  result_margin:
    code:
    - - '.hasCompleteness("result_margin", lambda x: x == 0.0, "result = ''tie'' OR
        result = ''no result''")'
      - Invalid
    - - '.hasCompleteness("result_margin", lambda x: x == 1.0, "result = ''runs''
        OR result = ''wickets''")'
      - Invalid
    - - '.hasCompleteness(''result_margin'', lambda x: x >= 0.98)'
      - Valid
    - - .isDataType('result_margin', "Fractional")
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isDataType('season', "Integral")
      - Invalid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    - - .isDataType('super_over', "String")
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isDataType('team1', "String")
      - Invalid
    - - .satisfies("team1 != team2", "Teams in a match must be different")
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    - - .isDataType('team2', "String")
      - Invalid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    - - .isDataType('toss_decision', "String")
      - Invalid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .isDataType('toss_winner', "String")
      - Invalid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", "Toss winner must
        be one of the playing teams")
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    - - .isDataType('venue', "String")
      - Invalid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      - Valid
    - - .isDataType('winner', "String")
      - Invalid
    - - .satisfies("winner = team1 OR winner = team2", "Winner must be one of the
        playing teams")
      - Invalid
    assumptions: []
