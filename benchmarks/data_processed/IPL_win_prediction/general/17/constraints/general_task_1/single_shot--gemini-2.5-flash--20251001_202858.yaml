constraints:
  city:
    code:
    - - .hasCompleteness('city', 0.98)
      - Invalid
    assumptions: []
  date:
    code:
    - - .hasDataType('String', 'date')
      - Invalid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Valid
    assumptions: []
  method:
    code:
    - - .hasCompleteness('method', 0.02)
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .hasCompleteness('player_of_match', 0.99)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasCompleteness('result_margin', 0.98)
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  result_margin_positive_for_win:
    code:
    - - .satisfies("NOT (result IN ('runs', 'wickets')) OR result_margin > 0", "Result
        margin must be positive if result is 'runs' or 'wickets'")
      - Valid
    assumptions: []
  season:
    code:
    - - .hasDataType('Integral', 'season')
      - Invalid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasCompleteness('target_overs', 0.99)
      - Invalid
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasCompleteness('target_runs', 0.99)
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  toss_winner_is_valid_team:
    code:
    - - .satisfies("team1 = toss_winner OR team2 = toss_winner", "Toss winner must
        be one of the competing teams")
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .hasCompleteness('winner', 0.99)
      - Invalid
    assumptions: []
  winner_is_valid_team_or_null:
    code:
    - - .satisfies("team1 = winner OR team2 = winner OR winner IS NULL", "Winner must
        be one of the competing teams or NULL")
      - Valid
    assumptions: []
