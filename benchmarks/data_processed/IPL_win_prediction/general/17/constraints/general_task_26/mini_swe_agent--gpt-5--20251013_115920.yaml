raw_constraints:
- column_name: id
  code_for_constraint: .isComplete('id')
- column_name: id
  code_for_constraint: .isNonNegative('id')
- column_name: id
  code_for_constraint: .isUnique('id')
- column_name: season
  code_for_constraint: .isComplete('season')
- column_name: season
  code_for_constraint: .isNonNegative('season')
- column_name: season
  code_for_constraint: .hasPattern('season', '^[0-9]{4}$')
- column_name: date
  code_for_constraint: .isComplete('date')
- column_name: date
  code_for_constraint: .hasPattern('date', '^\d{4}-\d{2}-\d{2}$')
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: toss_winner
  code_for_constraint: .isComplete('toss_winner')
- column_name: toss_decision
  code_for_constraint: .isComplete('toss_decision')
- column_name: toss_decision
  code_for_constraint: .isContainedIn('toss_decision', ['bat','field'])
- column_name: result
  code_for_constraint: .isComplete('result')
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs','wickets','tie','no result','draw','abandoned'])
- column_name: winner
  code_for_constraint: '.hasNumberOfDistinctValues(''winner'', lambda x: x > 0)'
- column_name: super_over
  code_for_constraint: .isContainedIn('super_over', ['Y','N'])
- column_name: result_margin
  code_for_constraint: .isNonNegative('result_margin')
- column_name: target_runs
  code_for_constraint: .isComplete('target_runs')
- column_name: target_runs
  code_for_constraint: .isNonNegative('target_runs')
- column_name: target_overs
  code_for_constraint: .isComplete('target_overs')
- column_name: target_overs
  code_for_constraint: .isPositive('target_overs')
