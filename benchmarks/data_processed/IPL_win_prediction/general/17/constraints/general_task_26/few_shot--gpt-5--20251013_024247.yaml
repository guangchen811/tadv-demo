constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - '.satisfies("date RLIKE ''^\\d{4}-\\d{2}-\\d{2}$''", "date_iso_yyyy_mm_dd",
        lambda v: v == 1.0)'
      - Invalid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    - - .isPositive('id')
      - Invalid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final','Eliminator','Qualifier
        2','Final','Semi Final','Qualifier 1','League'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie','runs','wickets','no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y','N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isNonNegative('target_overs')
      - Valid
    - - '.satisfies("(result = ''no result'') OR target_overs IS NOT NULL", "target_overs_present_unless_no_result",
        lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("target_overs <= 20.0", "target_overs_at_most_20", lambda v: v
        == 1.0)'
      - Invalid
    - - '.satisfies("target_overs > 0", "target_overs_positive", lambda v: v == 1.0)'
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isNonNegative('target_runs')
      - Valid
    - - '.satisfies("(result = ''no result'') OR target_runs IS NOT NULL", "target_runs_present_unless_no_result",
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1,team2:
    code:
    - - '.satisfies("team1 <> team2", "teams_are_distinct", lambda v: v == 1.0)'
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat','field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - '.satisfies("(toss_winner = team1 OR toss_winner = team2)", "toss_winner_is_competing_team",
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  winner:
    code:
    - - '.satisfies("(winner IS NULL) OR (winner = team1 OR winner = team2)", "winner_is_competing_team_or_null",
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
