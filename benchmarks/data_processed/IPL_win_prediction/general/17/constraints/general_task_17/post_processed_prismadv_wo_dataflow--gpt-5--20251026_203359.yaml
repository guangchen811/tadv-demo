    assumptions:
    - text: 'The ''team1'' column must be present for every record and be a non-empty
        string (no NULLs or only-whitespace). The code uses team1 as a dictionary
        key and for equality/logic without null handling. We could represent this
        with Deequ as: .satisfies("CASE WHEN team1 IS NOT NULL AND length(trim(team1))
        > 0 THEN 1 ELSE 0 END", "team1 not null/empty", lambda x: x == 1.0).'
      sources:
      - start_line: 26
        end_line: 38
        file: ''
      - start_line: 49
        end_line: 55
        file: ''
      uid: d6d6013b-cf20-4d60-93f1-e468c62f3add
    - text: "Team names in 'team1' must be canonicalized (trimmed, case-consistent)\
        \ and exactly match the naming used in 'winner'/'team2' whenever a winner\
        \ exists. Specifically, for rows where result \u2208 {'runs','wickets','tie'}\
        \ and winner is not null, winner must equal team1 or team2. Suggested checks:\
        \ (a) Deequ: .satisfies(\"team1 = trim(team1)\", \"team1 trimmed\", lambda\
        \ x: x == 1.0); (b) Deequ cross-column rule: .satisfies(\"CASE WHEN lower(result)\
        \ IN ('runs','wickets','tie') AND winner IS NOT NULL THEN CASE WHEN winner\
        \ = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END\", \"winner is one\
        \ of the two teams\", lambda x: x == 1.0)."
      sources:
      - start_line: 71
        end_line: 88
        file: ''
      - start_line: 95
        end_line: 104
        file: ''
      uid: 9dd1c297-74a2-4da1-b7e1-4735cb92c750
    - text: '''team1'' and ''team2'' should be different teams for each match (no
        self-play). Otherwise, winner/loser logic and standings updates become inconsistent.
        Deequ: .satisfies("CASE WHEN team1 IS NOT NULL AND team2 IS NOT NULL THEN
        CASE WHEN team1 <> team2 THEN 1 ELSE 0 END ELSE 1 END", "Distinct opponents",
        lambda x: x == 1.0).'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      - start_line: 74
        end_line: 88
        file: ''
      uid: d95f97a9-bd01-4070-a5ec-3770993d0dba
    - text: "The 'team1' column should contain a small, fixed set of team names (league\
        \ teams). A practical bound consistent with the data is <= 30 distinct values\
        \ (observed \u224819). This keeps standings meaningful and bounded. Deequ:\
        \ .hasNumberOfDistinctValues(\"team1\", lambda x: x <= 30)."
      sources:
      - start_line: 24
        end_line: 38
        file: ''
      - start_line: 142
        end_line: 148
        file: ''
      uid: 2f457d84-8087-477f-884b-0990d5b77c00
