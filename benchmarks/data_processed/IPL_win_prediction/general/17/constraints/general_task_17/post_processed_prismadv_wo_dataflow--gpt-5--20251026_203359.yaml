      - start_line: 84
        end_line: 88
        file: ''
      uid: dd8f4ff2-d0cb-48b8-abce-92edb761f6da
    - text: 'When result is ''runs'' or ''wickets'', result_margin should be integer-like
        (no fractional component) to avoid silent truncation by int(float(...)). Example
        Deequ constraint: .satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN CASE WHEN CAST(`result_margin` AS DOUBLE) = CAST(CAST(`result_margin`
        AS BIGINT) AS DOUBLE) THEN 1 ELSE 0 END ELSE 1 END", "result_margin is whole
        number when required", lambda x: x == 1)'
      sources:
      - start_line: 73
        end_line: 75
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      uid: 6ef85c2d-3424-4076-9e8e-96cb3429e001
    - text: 'When result is ''runs'' or ''wickets'', result_margin should be >= 1
        (a positive winning margin). Example Deequ constraint: .satisfies("CASE WHEN
        lower(`result`) IN (''runs'',''wickets'') THEN CASE WHEN CAST(`result_margin`
        AS DOUBLE) >= 1 THEN 1 ELSE 0 END ELSE 1 END", "result_margin positive when
        required", lambda x: x == 1)'
      sources:
      - start_line: 71
        end_line: 75
        file: ''
      - start_line: 84
        end_line: 88
        file: ''
      uid: 16140f94-9e8e-40f9-8729-d4fe73b126ec
    - text: 'When result is ''wickets'', result_margin should be between 1 and 10
        inclusive (a team can win by at most 10 wickets). Example Deequ constraint:
        .satisfies("CASE WHEN lower(`result`) = ''wickets'' THEN CASE WHEN CAST(`result_margin`
        AS DOUBLE) BETWEEN 1 AND 10 THEN 1 ELSE 0 END ELSE 1 END", "wickets margin
        within [1,10]", lambda x: x == 1)'
      sources:
      - start_line: 71
        end_line: 71
        file: ''
      - start_line: 84
        end_line: 88
        file: ''
      uid: 629e0bcc-489d-4748-942d-0e2f1e8c9aa4
    - text: 'When result is not ''runs'' or ''wickets'' (e.g., ''tie'', ''no result'',
        or other), result_margin may be null and is not required by the downstream
        logic. Example Deequ constraint: .satisfies("CASE WHEN lower(`result`) NOT
        IN (''runs'',''wickets'') THEN 1 ELSE CASE WHEN `result_margin` IS NOT NULL
