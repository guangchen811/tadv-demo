        Deequ: .satisfies("method != ''D/L'' OR (target_overs IS NOT NULL AND CAST(target_overs
        AS double) > 0)", "dl_requires_target_overs"), .satisfies("method != ''D/L''
        OR target_runs IS NULL OR CAST(target_runs AS double) > 0", "dl_target_runs_positive"),
        and .satisfies("method != ''D/L'' OR target_runs IS NULL OR target_overs IS
