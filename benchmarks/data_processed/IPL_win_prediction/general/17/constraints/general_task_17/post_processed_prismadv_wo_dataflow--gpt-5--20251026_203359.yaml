        end_line: 111
        file: ''
      uid: ddbfb8ac-b855-46a5-aafc-d9f1ec37e43e
    - text: 'For ''no result'' matches, ''winner'' should be null/empty and ''result_margin''
        should be null. Example Deequ: NOT(lower(result)=''no result'') OR ((winner
        IS NULL OR winner='''') AND result_margin IS NULL).'
      sources:
      - start_line: 113
        end_line: 121
        file: ''
      - start_line: 133
