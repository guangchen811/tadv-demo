        == ''Y'', and super_over == ''Y'' implies result == ''tie''. Suggested Deequ:
        .satisfies("result != ''tie'' OR super_over = ''Y''", "tie_requires_super_over")
        and .satisfies("super_over != ''Y'' OR result = ''tie''", "super_over_only_for_ties").'
