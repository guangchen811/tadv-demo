      - start_line: 71
        end_line: 93
        file: ''
      uid: 6f0faa9a-dbbc-4b1c-9e4d-431ea97c3075
    - text: 'When result is ''runs'' or ''wickets'', ''result_margin'' must be present
        and numeric. Additionally, for ''wickets'' it must be an integer between 1
        and 10 inclusive; for ''runs'' it must be a positive integer. Example Deequ:
        (a) NOT(lower(result) IN (''runs'',''wickets'')) OR (result_margin IS NOT
        NULL AND cast(result_margin as double) > 0); (b) NOT(lower(result)=''wickets'')
        OR (cast(result_margin as int) BETWEEN 1 AND 10).'
      sources:
      - start_line: 71
        end_line: 75
        file: ''
      - start_line: 84
        end_line: 86
        file: ''
      uid: 398afdee-9b8e-47b3-a51d-f50793296499
    - text: 'For tied matches: if a ''winner'' is recorded, it must be one of {team1,
        team2} (i.e., decided via Super Over); otherwise there should be no winner
        recorded. Example Deequ: NOT(lower(result)=''tie'' AND coalesce(winner,'''')
        <> '''') OR (winner = team1 OR winner = team2).'
      sources:
