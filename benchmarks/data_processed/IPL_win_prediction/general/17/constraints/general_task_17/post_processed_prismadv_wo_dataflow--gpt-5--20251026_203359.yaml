        end_line: 55
        file: ''
      - start_line: 71
        end_line: 121
        file: ''
      uid: ed1bb8a9-83b4-44ac-a459-d9ca252edb53
    - text: 'If ''result'' is ''runs'' or ''wickets'', then ''winner'' must be present
        and must equal either ''team1'' or ''team2'' to avoid standings update errors
        and produce a coherent summary. Deequ example: .satisfies("CASE WHEN lower(trim(`result`))
        IN (''runs'',''wickets'') THEN CASE WHEN `winner` IS NOT NULL AND (`winner`
        = `team1` OR `winner` = `team2`) THEN 1 ELSE 0 END ELSE 1 END", "Winner present
        when decided", lambda x: x == 1.0)'
      sources:
      - start_line: 71
        end_line: 94
        file: ''
      uid: fd28831f-0439-41f7-ba24-5db20b67dff4
    - text: 'If ''result'' is ''runs'' or ''wickets'', then ''result_margin'' must
        be numeric and strictly positive (parsable to a float and > 0), since the
        code casts it to float/int for the summary. Deequ example: .satisfies("CASE
        WHEN lower(trim(`result`)) IN (''runs'',''wickets'') THEN CASE WHEN `result_margin`
        IS NOT NULL AND `result_margin` RLIKE ''^[0-9]+(\\.[0-9]+)?$'' AND CAST(`result_margin`
        AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE 1 END", "Valid margin for decided results",
        lambda x: x == 1.0)'
      sources:
      - start_line: 71
        end_line: 88
        file: ''
      uid: 91b26c87-2ae7-4369-b50e-46b54773f2b9
    - text: 'At least 95% of ''result'' values should indicate a decided match (''runs''
        or ''wickets''), aligning with how summaries and standings primarily handle
        decided outcomes. Deequ example: .satisfies("CASE WHEN lower(trim(`result`))
        IN (''runs'',''wickets'') THEN 1 ELSE 0 END", "Decided results ratio", lambda
        x: x >= 0.95)'
