    - text: 'After trimming whitespace and lowercasing, all ''result'' values should
        be within the expected domain: {''runs'', ''wickets'', ''tie'', ''no result''}.
        This keeps the summary logic in recognized branches and avoids ''unrecognized''
        outcomes. Deequ example: .satisfies("CASE WHEN lower(trim(`result`)) IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "Result domain", lambda x: x == 1.0)'
      sources:
