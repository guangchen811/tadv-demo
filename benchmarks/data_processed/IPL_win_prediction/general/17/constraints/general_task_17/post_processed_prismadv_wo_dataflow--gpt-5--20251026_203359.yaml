    code: []
    assumptions:
    - text: 'The ''winner'' must be one of the two participating teams when the ''result''
        indicates a decisive outcome (''runs'' or ''wickets''); the ''winner'' cannot
        be null in these cases. Example Deequ compliance: NOT(lower(result) IN (''runs'',''wickets''))
        OR (winner IS NOT NULL AND (winner = team1 OR winner = team2)).'
