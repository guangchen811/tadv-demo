        end_line: 111
        file: ''
      - start_line: 16
        end_line: 19
        file: ''
      - start_line: 138
        end_line: 138
        file: ''
      uid: 4bf1a3c6-5f88-4c0c-8ffe-d1c2eb43177b
    - text: 'For rows where result is ''tie'' or ''no result'', result_margin should
