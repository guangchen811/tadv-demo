    assumptions:
    - text: 'When result is ''runs'' or ''wickets'', result_margin must be present
        (non-null) and parsable as a numeric value (float). This prevents failures
        in int(float(result_margin)). Example Deequ constraint: .satisfies("CASE WHEN
        lower(`result`) IN (''runs'',''wickets'') THEN CASE WHEN `result_margin` IS
