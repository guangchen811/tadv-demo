constraints:
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("NOT (result IN ('runs', 'wickets')) OR (result_margin IS NOT NULL)",
        'result_margin_must_exist_for_decided_matches')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .satisfies('team1 <> team2', 'teams_must_be_different')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("NOT (result IN ('runs', 'wickets')) OR (winner = team1 OR winner
        = team2)", 'winner_must_be_a_participant')
      - Valid
    - - .satisfies("NOT (result IN ('runs', 'wickets')) OR (winner IS NOT NULL)",
        'winner_must_exist_for_decided_matches')
      - Valid
    assumptions: []
