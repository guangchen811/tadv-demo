results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 IS NOT NULL AND length(trim(team1)) > 0", "team1
        non-empty after trim", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 = trim(team1)", "team1 is trimmed (no leading/trailing
        spaces)", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "Different teams per match (no self-matches)",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result NOT IN (''tie'',''no result'') THEN
        (winner IN (team1, team2)) ELSE true END", "Winner is one of the participating
        teams for decisive results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("toss_winner IN (team1, team2)", "Toss winner is one
        of the participating teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`team2` <> `team1`'', ''Team2 different from Team1'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `result` NOT IN (\''no result\'', \''tie\'')
        THEN CASE WHEN `winner` IN (`team1`, `team2`) THEN 1 ELSE 0 END ELSE 1 END'',
        ''Winner is one of the two teams for decided matches'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `toss_winner` IS NULL THEN 1 ELSE CASE WHEN
        `toss_winner` IN (`team1`, `team2`) THEN 1 ELSE 0 END END'', ''Toss winner
        is from participating teams when present'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`team2` = trim(`team2`)'', ''Team2 has no leading/trailing
        whitespace'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("`target_overs` IS NULL OR `target_overs` IS NOT NULL",
        "target_overs column exists", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`target_overs` IS NULL) OR (CAST(`target_overs` AS
        DOUBLE) IS NOT NULL)", "target_overs numeric-like", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("(`result` != ''runs'') OR (`result_margin` IS NOT NULL
        AND `result_margin` > 0)", ''result_margin positive when result=runs'', lambda
        x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result` != ''runs'') OR (`result_margin`
        IS NOT NULL AND `result_margin` > 0)", ''result_margin positive when result=runs'',
        lambda x: x == 1)'' failed on data sample: Value: 0.9863760217983651 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(`result` != ''wickets'') OR (`result_margin` IS NOT
        NULL AND `result_margin` > 0)", ''result_margin positive when result=wickets'',
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result` != ''wickets'') OR (`result_margin`
        IS NOT NULL AND `result_margin` > 0)", ''result_margin positive when result=wickets'',
        lambda x: x == 1)'' failed on data sample: Value: 0.9836512261580381 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(`result_margin` IS NULL) OR (`result_margin` >= 0)",
        ''non-null result_margin is non-negative'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result_margin` IS NULL) OR (`result_margin`
        >= 0)", ''non-null result_margin is non-negative'', lambda x: x == 1)'' failed
        on data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(`result` IN (''runs'',''wickets'')) OR (`result_margin`
        IS NULL OR `result_margin` <= 0)", ''non-run/wicket rows have null or non-positive
        margin'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`target_runs` AS DOUBLE) IS NOT NULL'', ''target_runs
        parseable as numeric >= 99%'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`target_runs` IS NULL) OR ((CAST(`target_runs` AS
        DOUBLE) >= 0) AND (CAST(`target_runs` AS DOUBLE) = CAST(CAST(`target_runs`
        AS BIGINT) AS DOUBLE)))'', ''target_runs non-negative and integer-like for
        >=95% rows'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(toss_winner = team1 OR toss_winner = team2)'', ''Toss
        winner must be one of the two teams'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''toss_winner = trim(toss_winner)'', ''No leading/trailing
        whitespace in toss_winner'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''length(trim(toss_winner)) > 0'', ''Non-empty toss_winner'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''to_timestamp(`date`) IS NOT NULL'', ''Parsable dates'',
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`season` AS STRING) RLIKE ''^[0-9]{4}(/[0-9]{2})?$''",
        "Season format is ''YYYY'' or ''YYYY/YY''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (CAST(`season` AS STRING) RLIKE ''.*[\\:*?\"<>|].*'')",
        "Season has no filesystem-unsafe characters", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("(NOT (result IN (''runs'',''wickets'')) OR (winner
        IS NOT NULL AND (winner = team1 OR winner = team2)))", "Winner present and
        valid for decisive results", lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(winner IS NULL) OR (winner = TRIM(winner))", "No leading/trailing
        spaces in winner", lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(winner IS NULL) OR (winner = team1 OR winner = team2)",
        "Winner value must match one of the two teams when present", lambda c: c ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("winner", lambda c: c >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("winner", lambda c: c >= 0.99)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
  result:
    code:
    - suggestion: '.hasCompleteness(''result'', lambda p: p == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''lower(trim(result)) = result'', ''Result normalization'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["target_overs","target_runs"]':
    code:
    - suggestion: .satisfies("(target_runs IS NULL AND target_overs IS NULL) OR (target_runs
        IS NOT NULL AND target_overs IS NOT NULL)", "target_pair_null_coherence")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("(target_runs IS NULL AND target_overs IS NULL) OR (target_runs
        <= 0 AND target_overs <= 0) OR (target_runs >= 0 AND target_overs > 0)", "target_pair_sign_consistency")
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "teams_are_present_and_distinct", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("toss_winner IN (team1, team2)", "toss_winner_in_teams",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
