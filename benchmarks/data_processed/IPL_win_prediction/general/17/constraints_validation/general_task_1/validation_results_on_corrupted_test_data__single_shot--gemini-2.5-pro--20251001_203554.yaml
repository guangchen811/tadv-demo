results:
  date:
    code:
    - suggestion: .compliesWith('date', '[0-9]{4}-[0-9]{2}-[0-9]{2}', 'date should
        be in YYYY-MM-DD format')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.compliesWith(''date'',
        ''[0-9]{4}-[0-9]{2}-[0-9]{2}'', ''date should be in YYYY-MM-DD format'')'':
        ''Check'' object has no attribute ''compliesWith'''
      level: error
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  multi-column:
    code:
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner
        must be one of the playing teams')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['wickets', 'runs', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''result_margin'')'' failed on
        data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x > 0.99, ''winner column
        should be at least 99% complete'')'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x > 0.99,
        ''winner column should be at least 99% complete'')'' failed on data sample:
        Value: 0.989100817438692 does not meet the constraint requirement! winner
        column should be at least 99% complete'
      level: error
