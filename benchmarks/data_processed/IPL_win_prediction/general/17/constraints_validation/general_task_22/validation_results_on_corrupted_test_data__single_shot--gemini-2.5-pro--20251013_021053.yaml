results:
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''result_margin'')'' failed on
        data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies("CASE WHEN result IN ('runs', 'wickets') THEN result_margin
        IS NOT NULL ELSE TRUE END", 'Result margin must be populated for wins by runs
        or wickets')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'Toss winner
        must be one of the two playing teams')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x > 0.99, ''Winner column
        must be more than 99% complete'')'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x > 0.99,
        ''Winner column must be more than 99% complete'')'' failed on data sample:
        Value: 0.989100817438692 does not meet the constraint requirement! Winner
        column must be more than 99% complete'
      level: error
    - suggestion: .satisfies("CASE WHEN result != 'no result' THEN winner IS NOT NULL
        ELSE TRUE END", 'Winner must be populated if there is a match result')
      status: true
      reason_if_failed: ''
      level: error
