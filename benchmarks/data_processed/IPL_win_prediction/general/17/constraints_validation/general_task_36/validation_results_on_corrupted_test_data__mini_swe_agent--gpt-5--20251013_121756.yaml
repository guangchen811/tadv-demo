results:
  id:
    code:
    - suggestion: '.hasUniqueness([''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.satisfies("method = ''D/L'' OR method IS NULL", ''method_value_valid'',
        lambda r: r == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        >= 0 ELSE true END", ''margin_nonneg_when_decided'', lambda r: r == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN result IN (''runs'',''wickets'')
        THEN result_margin >= 0 ELSE true END", ''margin_nonneg_when_decided'', lambda
        r: r == 1.0)'' failed on data sample: Value: 0.9700272479564033 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL ELSE true END", ''margin_present_when_decided'', lambda r: r ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN target_overs IS NOT
        NULL AND target_overs >= 0 ELSE true END", ''target_overs_present_if_DL'',
        lambda r: r == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", ''distinct_teams_per_match'', lambda
        r: r == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(toss_winner = team1) OR (toss_winner = team2)", ''toss_winner_in_teams'',
        lambda r: r == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN winner IS NULL
        ELSE true END", ''winner_null_when_no_result'', lambda r: r == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''tie'' AND super_over = ''Y'' THEN
        (winner IS NOT NULL AND (winner = team1 OR winner = team2)) ELSE true END",
        ''winner_valid_when_super_over'', lambda r: r == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (winner
        IS NOT NULL AND (winner = team1 OR winner = team2)) ELSE true END", ''winner_valid_when_decided'',
        lambda r: r == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
