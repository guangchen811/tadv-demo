results:
  date:
    code:
    - suggestion: '.hasPattern(''date'', ''^\\d{4}-\\d{2}-\\d{2}$'', lambda v: v >=
        0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''year(to_date(date)) = CAST(season AS INT)'', ''date_year_matches_season'',
        lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: '.hasUniqueness([''id''], lambda u: u >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier
        2', 'Eliminator', 'Final', 'Elimination Final', 'Semi Final'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''season >= 2008 AND season <= 2025'', ''season_in_expected_range'',
        lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team1 IS NOT NULL AND team2 IS NOT NULL AND team1
        <> team2'', ''teams_are_distinct'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  tie_super_over_consistency:
    code:
    - suggestion: '.satisfies("(super_over = ''Y'' AND result = ''tie'') OR (super_over
        = ''N'' AND result <> ''tie'')", ''tie_super_over_consistency'', lambda v:
        v >= 0.995)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda c: c >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda c: c >=
        0.995)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: error
    - suggestion: '.satisfies("(result = ''no result'' AND winner IS NULL) OR (winner
        IN (team1, team2))", ''winner_validity'', lambda v: v >= 0.995)'
      status: true
      reason_if_failed: ''
      level: error
