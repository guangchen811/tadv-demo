results:
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''result_margin'')'' failed on
        data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies("result != 'wickets' OR (result_margin >= 0 AND result_margin
        <= 10)", "wicket_margin_bounds")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("result != ''wickets'' OR (result_margin
        >= 0 AND result_margin <= 10)", "wicket_margin_bounds")'' failed on data sample:
        Value: 0.9836512261580381 does not meet the constraint requirement!'
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isNonNegative('target_overs')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result != 'runs' OR target_overs > 0", "target_overs_positive_when_runs")
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  teams:
    code:
    - suggestion: .satisfies('team1 != team2', 'teams_are_distinct')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("(result = 'no result' AND winner IS NULL) OR (winner
        = team1 OR winner = team2)", "winner_is_team_or_null_for_no_result")
      status: true
      reason_if_failed: ''
      level: error
