results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.hasNumberOfDistinctValues(''result'', lambda x: x > 1)'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''result'',
        lambda x: x > 1)'': Check.hasNumberOfDistinctValues() missing 2 required positional
        arguments: ''binningUdf'' and ''maxBins'''
      level: error
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''result_margin'')'' failed on
        data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  summary:
    code:
    - suggestion: .isComplete('summary')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''summary'')'' failed on data sample:
        Input data does not include column summary!'
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
