results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id').isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type').isContainedIn('match_type', ['Elimination
        Final', 'Eliminator', 'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1',
        'League'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result').isContainedIn('result', ['runs', 'wickets',
        'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''result_margin'')'' failed on
        data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over').isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isComplete('target_overs').isNonNegative('target_overs')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''target_overs'').isNonNegative(''target_overs'')''
        failed on data sample: Value: 0.9945504087193461 does not meet the constraint
        requirement!'
      level: error
  target_runs:
    code:
    - suggestion: .isComplete('target_runs').isNonNegative('target_runs')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''target_runs'').isNonNegative(''target_runs'')''
        failed on data sample: Value: 0.9945504087193461 does not meet the constraint
        requirement!'
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision').isContainedIn('toss_decision', ['bat',
        'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .isComplete('winner')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''winner'')'' failed on data sample:
        Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
