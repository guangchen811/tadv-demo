results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("date RLIKE ''^\\d{4}-\\d{2}-\\d{2}$''", "date_iso_yyyy_mm_dd",
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("date RLIKE ''^\\d{4}-\\d{2}-\\d{2}$''",
        "date_iso_yyyy_mm_dd", lambda v: v == 1.0)'' failed on data sample: Value:
        0.0 does not meet the constraint requirement!'
      level: error
  id:
    code:
    - suggestion: .hasDataType('id', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['Elimination Final','Eliminator','Qualifier
        2','Final','Semi Final','Qualifier 1','League'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['tie','runs','wickets','no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''result_margin'')'' failed on
        data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('target_overs')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result = ''no result'') OR target_overs IS NOT NULL",
        "target_overs_present_unless_no_result", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("target_overs <= 20.0", "target_overs_at_most_20", lambda
        v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("target_overs <= 20.0", "target_overs_at_most_20",
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9945504087193461 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("target_overs > 0", "target_overs_positive", lambda
        v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("target_overs > 0", "target_overs_positive",
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9945504087193461 does
        not meet the constraint requirement!'
      level: error
  target_runs:
    code:
    - suggestion: .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result = ''no result'') OR target_runs IS NOT NULL",
        "target_runs_present_unless_no_result", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1,team2:
    code:
    - suggestion: '.satisfies("team1 <> team2", "teams_are_distinct", lambda v: v
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(toss_winner = team1 OR toss_winner = team2)", "toss_winner_is_competing_team",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("(winner IS NULL) OR (winner = team1 OR winner = team2)",
        "winner_is_competing_team_or_null", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
