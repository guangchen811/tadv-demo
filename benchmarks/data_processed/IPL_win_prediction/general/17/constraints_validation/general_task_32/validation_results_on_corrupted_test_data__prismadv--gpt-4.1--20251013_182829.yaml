results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN result_margin
        IS NOT NULL ELSE TRUE END", "Result Margin Required for Decided Matches",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN result_margin >= 0
        AND result_margin <= 200 ELSE TRUE END", "Valid Result Margin for Runs", lambda
        x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN result = ''runs'' THEN
        result_margin >= 0 AND result_margin <= 200 ELSE TRUE END", "Valid Result
        Margin for Runs", lambda x: x == 1)'' failed on data sample: Value: 0.9863760217983651
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''wickets'' THEN result_margin >=
        1 AND result_margin <= 10 ELSE TRUE END", "Valid Result Margin for Wickets",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN result = ''wickets'' THEN
        result_margin >= 1 AND result_margin <= 10 ELSE TRUE END", "Valid Result Margin
        for Wickets", lambda x: x == 1)'' failed on data sample: Value: 0.9836512261580381
        does not meet the constraint requirement!'
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''to_date(`date`) IS NOT NULL'', ''Valid Dates'', lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.hasCompleteness(''season'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","id","season"]':
    code:
    - suggestion: '.hasUniqueness([''id'', ''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''id'', ''season'', ''date''], lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''id'', ''season'', ''date''], lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.hasUniqueness([''season'', ''date'', ''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","match_type","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''date'', ''match_type''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("CASE WHEN (`result` IN ('runs', 'wickets')) THEN (`winner`
        = `team1` OR `winner` = `team2`) ELSE (`winner` IS NULL OR `winner` = `team1`
        OR `winner` = `team2`) END", "Winner matches team for decided matches")
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`result` IN (''runs'', ''wickets'')", "Majority results
        are runs or wickets", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: .satisfies('CASE WHEN result = "runs" THEN result_margin IS NOT
        NULL AND result_margin >= 1 AND result_margin <= 200 AND result_margin = CAST(result_margin
        AS INT) ELSE TRUE END', 'Runs result_margin constraints')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN result = "runs" THEN result_margin
        IS NOT NULL AND result_margin >= 1 AND result_margin <= 200 AND result_margin
        = CAST(result_margin AS INT) ELSE TRUE END'', ''Runs result_margin constraints'')''
        failed on data sample: Value: 0.9863760217983651 does not meet the constraint
        requirement!'
      level: error
    - suggestion: .satisfies('CASE WHEN result = "wickets" THEN result_margin IS NOT
        NULL AND result_margin >= 1 AND result_margin <= 10 AND result_margin = CAST(result_margin
        AS INT) ELSE TRUE END', 'Wickets result_margin constraints')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN result = "wickets" THEN
        result_margin IS NOT NULL AND result_margin >= 1 AND result_margin <= 10 AND
        result_margin = CAST(result_margin AS INT) ELSE TRUE END'', ''Wickets result_margin
        constraints'')'' failed on data sample: Value: 0.9836512261580381 does not
        meet the constraint requirement!'
      level: error
  '["team1","team2"]':
    code:
    - suggestion: .satisfies('team1 != team2', 'Team1 and Team2 must be different')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''id'', ''season'', ''date'', ''team1'', ''team2''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''team1'', ''team2''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies(''((`result` IN (\''runs\'', \''wickets\'')) AND (`winner`
        IN (`team1`, `team2`)) AND (`winner` != `team1` OR `winner` != `team2`)) OR
        (`result` NOT IN (\''runs\'', \''wickets\''))'', ''Winner is one of the teams
        for decided matches'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`team1` != `team2`'', ''Teams are not identical in
        a match'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''team1'', ''team2'', ''date''], lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
