constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda v: v >= 0.98)'
      - Valid
    assumptions: []
  date:
    code:
    - - .hasPattern('date', '^\d{4}-\d{2}-\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  dls_target_overs:
    code:
    - - .satisfies("(method != 'D/L') OR (target_overs IS NOT NULL AND target_overs
        > 0 AND target_overs <= 20)", 'D/L target_overs present and within T20 range')
      - Invalid
    assumptions: []
  dls_target_runs:
    code:
    - - .satisfies("(method != 'D/L') OR (target_runs IS NOT NULL AND target_runs
        > 0)", 'D/L target_runs present and positive')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isContainedIn('match_type', ['League','Eliminator','Qualifier 1','Qualifier
        2','Final','Semi Final','Elimination Final'])
      - Valid
    assumptions: []
  method_allowed:
    code:
    - - .satisfies("method IS NULL OR method = 'D/L'", 'method null or D/L only')
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - '.hasCompleteness(''player_of_match'', lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs','wickets','tie','no result'])
      - Valid
    assumptions: []
  result_margin_logic:
    code:
    - - .satisfies("((result IN ('runs','wickets')) AND result_margin > 0) OR ((result
        IN ('tie','no result')) AND result_margin IS NULL)", 'result margin consistent
        with result')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  season_date_alignment:
    code:
    - - .satisfies('season = year(to_date(date))', 'season aligns with date year')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y','N'])
      - Valid
    assumptions: []
  super_over_tie_logic:
    code:
    - - .satisfies("(super_over != 'Y') OR (result = 'tie')", 'super over implies
        tie')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  teams_different:
    code:
    - - .satisfies('team1 != team2', 'opposing teams differ')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat','field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  toss_winner_valid:
    code:
    - - .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss winner
        is a participating team')
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner_among_teams:
    code:
    - - .satisfies('(winner IS NULL) OR (winner = team1) OR (winner = team2)', 'winner
        must be among teams')
      - Valid
    assumptions: []
  winner_presence:
    code:
    - - .satisfies("(result = 'no result') OR (winner IS NOT NULL)", 'winner present
        when result is not NR')
      - Valid
    assumptions: []
