        file: ''
      - start_line: 43
        end_line: 46
        file: ''
      uid: aeb1e599-c225-4ffd-9520-163fd2f3b1fd
    - text: 'No division-by-zero in run-rate: whenever target_runs is present, target_overs
        must be strictly greater than 0 so that target_run_rate is finite. Example
        compliance: CASE WHEN target_runs IS NOT NULL THEN target_overs > 0 ELSE true
        END.'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 3356698b-d2d4-4425-9a1f-43c19497d702
    - text: 'Functional relationship between the engineered columns: target_run_rate
        must equal target_runs / target_overs whenever both inputs are present. Example
        compliance: CASE WHEN target_runs IS NOT NULL AND target_overs IS NOT NULL
        THEN abs(target_run_rate - (target_runs / target_overs)) < 1e-9 ELSE true
        END.'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 81765f6e-87dd-430d-afdc-588e3bc6fb6e
    - text: 'T20 overs cap assumption implied by revised_overs_shortfall: target_overs
        should not exceed 20 and revised_overs_shortfall must equal (20.0 - target_overs).
        Example compliance: target_overs <= 20 AND abs(revised_overs_shortfall - (20.0
        - target_overs)) < 1e-9.'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      uid: 5842bbb9-f3a7-47a6-8043-fab92c1e575f
    - text: 'Consistency between result type and margin features: if result = ''runs''
        then margin_runs = result_margin (and margin_wickets = 0); if result = ''wickets''
        then margin_wickets = result_margin (and margin_runs = 0); otherwise both
        margins should be 0. Example compliance: (result = ''runs'' AND margin_runs
        > 0 AND margin_wickets = 0) OR (result = ''wickets'' AND margin_wickets >
        0 AND margin_runs = 0) OR (result = ''tie'' AND margin_runs = 0 AND margin_wickets
        = 0).'
      sources:
      - start_line: 47
        end_line: 49
        file: ''
      uid: 099d8088-94ab-465e-85d1-612a648a2577
    - text: 'Toss winner is one of the playing teams and encoded consistently: toss_winner
        must be either team1 or team2, and toss_winner_is_team1 = 1 iff toss_winner
        = team1; otherwise toss_winner_is_team1 = 0 (which also implies toss_winner
        = team2). Example compliance: (toss_winner = team1 AND toss_winner_is_team1
        = 1) OR (toss_winner = team2 AND toss_winner_is_team1 = 0).'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      uid: dc237e8e-6328-4445-934d-bbd2ea84b6db
    - text: 'Label consistency: label_team1_win must equal 1 iff winner = team1, else
        0. Example compliance: (winner = team1 AND label_team1_win = 1) OR (winner
        <> team1 AND label_team1_win = 0).'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      uid: 2a88d532-beae-4033-9ce3-2ff39503e6b4
  '["team1","team2"]':
    code: []
    assumptions:
    - text: 'In each record, ''team1'' and ''team2'' must be different teams (no self-matches).
        This can be enforced as a Deequ compliance constraint: .satisfies("team1 <>
        team2", "teams_are_distinct").'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: 7763798f-63e3-4ac2-b5a5-9f5eda4a2150
    - text: 'For rows used in training (where result is in [''runs'',''wickets'',''tie'']),
        the winner must be one of the two teams when the outcome is decisive: (result
        in (''runs'',''wickets'')) => (winner = team1 OR winner = team2). For ties,
        winner should be null or not equal to either team: (result = ''tie'') => (winner
        IS NULL OR (winner <> team1 AND winner <> team2)). This can be represented
        in Deequ as a single compliance constraint: .satisfies("((result IN (''runs'',''wickets''))
        AND (winner = team1 OR winner = team2)) OR ((result = ''tie'') AND (winner
        IS NULL OR (winner <> team1 AND winner <> team2)))", "winner_consistency_by_result").'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      uid: ac7349d7-8c13-4706-87fe-aabb352d7ea4
    - text: "The toss winner must be one of the two teams playing the match: toss_winner\
        \ \u2208 {team1, team2}. This can be enforced with a Deequ compliance constraint:\
        \ .satisfies(\"toss_winner = team1 OR toss_winner = team2\", \"toss_winner_in_teams\"\
        )."
      sources:
      - start_line: 38
        end_line: 40
        file: ''
      uid: e44f9e66-1001-42a9-be9e-44ee7e826d79
  '["team1","team2","toss_winner"]':
    code: []
    assumptions:
    - text: 'In every record, the toss_winner must be one of the two participating
        teams (team1 or team2). Deequ example: .satisfies("toss_winner = team1 OR
        toss_winner = team2", "toss_winner_in_teams").'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      uid: d2f8bfb6-4954-45f7-8e04-9762d446cc37
    - text: 'team1 and team2 must be different (no self-matches). Deequ example: .satisfies("team1
        != team2", "distinct_opponents").'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: 1eb8e9ca-14c2-4fee-97d6-4fa456aaa4ca
    - text: 'For rows included in training (result in [''runs'',''wickets'',''tie'']),
        the winner must be one of {team1, team2} whenever result is ''runs'' or ''wickets''.
        Deequ example: .satisfies("(result NOT IN (''runs'',''wickets'')) OR (winner
        = team1 OR winner = team2)", "winner_within_teams_when_decisive").'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      uid: 9414afd5-640d-4961-8cb0-12332a476fb2
    - text: 'Result margin must be consistent with the result type: if result = ''runs''
        then result_margin > 0; if result = ''wickets'' then result_margin is an integer
        in [1, 10]. Deequ examples: .satisfies("result != ''runs'' OR result_margin
        > 0", "positive_margin_for_runs"); .satisfies("result != ''wickets'' OR (result_margin
        >= 1 AND result_margin <= 10 AND result_margin = CAST(result_margin AS INT))",
        "valid_wicket_margin").'
      sources:
      - start_line: 47
        end_line: 49
        file: ''
      uid: 2ce68b5b-4f13-4855-ac4a-588815d10a76
    - text: 'To ensure target_run_rate is well-defined, whenever target_runs > 0,
        target_overs must be > 0. Deequ example: .satisfies("(target_runs <= 0) OR
        (target_overs > 0)", "no_zero_overs_when_runs_positive").'
      sources:
      - start_line: 43
        end_line: 46
        file: ''
      uid: c0dd220f-d24f-487e-bafe-0066d3cda171
  '["toss_decision","toss_winner"]':
    code: []
    assumptions:
    - text: 'The toss_winner must be one of the two competing teams in each match
        (toss_winner equals team1 or team2). This underlies the derived feature toss_winner_is_team1.
        Example Deequ: .hasCompliance(''toss_winner_in_competing_teams'', ''toss_winner
        = team1 OR toss_winner = team2'')'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      uid: 9bed97b1-e5fa-43ed-a79d-d703d49cc5f9
    - text: 'The (toss_winner, toss_decision) pair should be valid for every row:
        toss_winner is in {team1, team2} and toss_decision is in {''bat'',''field''}
        (as per observed domain). Example Deequ: .hasCompliance(''valid_toss_pair'',
        ''(toss_winner = team1 OR toss_winner = team2) AND (toss_decision IN ("bat","field"))'')'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      uid: b6e91132-df46-4856-949e-6f911867806a
    - text: 'On rows included in df_train, the winner must be one of the competing
        teams (winner equals team1 or team2) to make the binary label well-defined.
        Example Deequ: .hasCompliance(''winner_in_competing_teams'', ''winner = team1
        OR winner = team2'')'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      uid: cfdd1da8-7002-4d05-9904-7b2f33f100b1
    - text: 'To safely compute target_run_rate, whenever target_runs is not null,
        target_overs must be non-null and > 0 (to avoid division by zero/NaN). Example
        Deequ: .hasCompliance(''valid_runrate_inputs'', ''target_runs IS NULL OR (target_overs
        IS NOT NULL AND target_overs > 0)'')'
      sources:
      - start_line: 43
        end_line: 46
        file: ''
      uid: 152e88b4-96c7-4911-8043-441214276b35
    - text: 'result and result_margin must be consistent: (a) if result = ''runs''
        then result_margin > 0; (b) if result = ''wickets'' then result_margin is
        an integer between 1 and 10; (c) if result = ''tie'' then result_margin is
        null or 0. Example Deequ: .hasCompliance(''result_margin_consistency'', ''(result
        = "runs" AND result_margin > 0) OR (result = "wickets" AND result_margin >=
        1 AND result_margin <= 10) OR (result = "tie" AND (result_margin IS NULL OR
        result_margin = 0))'')'
      sources:
      - start_line: 28
        end_line: 28
        file: ''
      - start_line: 47
        end_line: 49
        file: ''
      uid: 19f54c11-aa78-4f40-a8c5-a4370737d54c
