        file: ''
      - start_line: 43
        end_line: 45
        file: ''
      uid: 3e675b19-593e-4332-8f85-d89c7d65767d
    - text: "To safely compute target_run_rate = target_runs / target_overs, target_overs\
        \ must be strictly greater than 0 for all training rows (result \u2208 {'runs','wickets','tie'}).\
        \ Example Deequ constraint: compliance('positive_overs_for_rr', \"result IN\
        \ ('runs','wickets','tie') AND target_overs > 0\")."
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 44
        end_line: 45
        file: ''
      uid: 38697b5b-51e2-4288-b463-e0d4018f6314
    - text: 'Given the use of 20.0 - target_overs to derive revised_overs_shortfall,
        target_overs should lie within the T20 range for training rows: 0 < target_overs
        <= 20, ensuring revised_overs_shortfall >= 0. Example Deequ constraint: compliance(''overs_within_t20_window'',
        "result IN (''runs'',''wickets'',''tie'') AND target_overs > 0 AND target_overs
        <= 20").'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 44
        end_line: 46
        file: ''
      uid: 629a448b-1046-42bd-bf1d-e811a27fccdc
    - text: 'For training rows, target_runs must be non-negative and the computed
        target_run_rate should be finite and non-negative: target_runs >= 0 AND NOT
        isnan(target_runs / target_overs) AND (target_runs / target_overs) >= 0. Example
        Deequ constraint: compliance(''valid_target_run_rate'', "result IN (''runs'',''wickets'',''tie'')
        AND target_runs >= 0 AND target_overs > 0 AND NOT isnan(target_runs / target_overs)
        AND (target_runs / target_overs) >= 0").'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 43
        end_line: 45
        file: ''
      uid: dbb4274c-2ad9-471f-bd45-a8f033527db0
    - text: 'target_runs and target_overs should have matched presence (no partial
        targets): (target_runs IS NULL) <=> (target_overs IS NULL). This prevents
        cases where one is provided without the other, which would break downstream
        rate/shortfall derivations. Example Deequ constraint: compliance(''paired_target_fields'',
        "(target_runs IS NULL AND target_overs IS NULL) OR (target_runs IS NOT NULL
        AND target_overs IS NOT NULL)").'
      sources:
      - start_line: 23
        end_line: 24
        file: ''
      - start_line: 43
        end_line: 46
        file: ''
      uid: d125d416-de91-453c-8e0f-d25fd3c3272e
