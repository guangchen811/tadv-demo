        target_run_rate. We could represent this assumption as a deequ constraint
        like this: .satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'')
        AND CAST(target_overs AS DOUBLE) IS NOT NULL THEN CASE WHEN CAST(target_overs
