  '["result","result_margin"]':
    code: []
    assumptions:
    - text: 'For rows with a decisive outcome (result in [''runs'', ''wickets'']),
        result_margin must be a valid numeric and strictly positive (non-null and
        > 0). This underpins the use of result_margin to build margin-based features
        and avoids NaNs or non-sense margins in training. Deequ example: .satisfies("CASE
        WHEN result IN (''runs'',''wickets'') THEN result_margin IS NOT NULL AND result_margin
        > 0 ELSE true END", "decisive_results_have_positive_margin")'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 47
        end_line: 49
        file: ''
      uid: 8a46e0fd-295a-4133-b129-4b1e7ad9b104
    - text: 'When result == ''wickets'', result_margin should be an integer count
        of wickets (no fractional part). The code casts the engineered margin_wickets
        to int, implying the upstream result_margin must be integral to avoid truncation/incorrect
        features. Deequ example: .satisfies("CASE WHEN result = ''wickets'' THEN result_margin
        = CAST(result_margin AS BIGINT) ELSE true END", "wickets_margin_is_integer")'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 47
        end_line: 49
        file: ''
      uid: 6c5bcd28-0b61-45e4-9b0a-ac0917d2c18c
    - text: 'When result == ''runs'', result_margin should represent a whole-number
        count of runs (no fractional part). Although the feature is stored as float,
        a fractional run margin would be invalid and distort the engineered feature.
        Deequ example: .satisfies("CASE WHEN result = ''runs'' THEN result_margin
        = CAST(result_margin AS BIGINT) ELSE true END", "runs_margin_is_integer")'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: f49904ed-007a-4074-a94f-e540c6fa8915
    - text: 'When result == ''tie'', result_margin must be null or 0 (there is no
        winning margin in a tie). This ensures margin-based features do not accidentally
        pick up non-zero values for ties. Deequ example: .satisfies("CASE WHEN result
        = ''tie'' THEN (result_margin IS NULL OR result_margin = 0) ELSE true END",
        "tie_has_zero_or_null_margin")'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 47
        end_line: 49
        file: ''
      uid: 7ee9e80a-00b2-484c-a1eb-ad27bb8861c2
    - text: 'When result is not in [''runs'', ''wickets'', ''tie''] (e.g., ''no result''),
        result_margin should be null. Such rows are excluded from training and should
        not carry a numeric margin. Deequ example: .satisfies("CASE WHEN result NOT
        IN (''runs'',''wickets'',''tie'') THEN result_margin IS NULL ELSE true END",
        "no_result_has_null_margin")'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      uid: e6be8e49-7255-46dd-a164-df206ea7bd96
  '["result","super_over"]':
    code: []
    assumptions:
    - text: 'Result and super_over must be consistent: super_over = ''Y'' if and only
        if result = ''tie''. This can be enforced as two constraints: forAllRows(super_over
        != ''Y'' or result = ''tie'') and forAllRows(result != ''tie'' or super_over
        = ''Y'').'
