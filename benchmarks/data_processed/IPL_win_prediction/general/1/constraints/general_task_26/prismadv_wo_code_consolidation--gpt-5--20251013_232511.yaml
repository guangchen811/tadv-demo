      uid: cba11cc6-5ca8-4306-b7c0-e940f863917c
  '["result","target_overs","target_runs"]':
    code: []
    assumptions:
    - text: 'For all records used in training (rows where result is one of {''runs'',''wickets'',''tie''}),
        both target_runs and target_overs must be present (non-null and numeric) because
        they are cast and then used to compute features without null handling. This
        can be enforced as a Deequ compliance constraint such as: compliance(''target_fields_present'',
        "result IN (''runs'',''wickets'',''tie'') AND target_runs IS NOT NULL AND
        target_overs IS NOT NULL").'
