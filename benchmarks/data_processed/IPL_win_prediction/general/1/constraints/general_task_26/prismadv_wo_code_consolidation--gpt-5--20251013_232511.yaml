    - text: 'For all training rows (result in {''runs'',''wickets'',''tie''}), the
        ''winner'' must be one of the two teams: winner in {team1, team2}. Representable
        as: ifThen(result in (''runs'',''wickets'',''tie''), winner in (team1, team2)).'
