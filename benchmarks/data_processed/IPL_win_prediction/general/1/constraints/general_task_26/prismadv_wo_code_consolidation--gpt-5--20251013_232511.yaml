    - text: 'To safely compute target_run_rate = target_runs / target_overs, any row
        used for feature generation must satisfy: if target_runs is not null then
        target_overs is not null and > 0; conversely, if target_overs > 0 then target_runs
        is not null. These can be expressed as two if-then constraints.'
