    assumptions:
    - text: 'The ''team1'' column must be present and non-null for all input rows
        because it is directly compared to other columns (e.g., ''winner'', ''toss_winner'')
        and is written out as a feature. We could represent this assumption as a deequ
        or GE rule like: deequ.hasCompleteness(''team1'', lambda x: x == 1.0) or GE
        expect_column_values_to_not_be_null(''team1'').'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 38
        end_line: 38
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      uid: d93eecc6-d47a-429e-8123-22b8cad6b668
    - text: 'The ''team1'' values should be clean strings: non-empty and without leading/trailing
        whitespace so that exact-equality comparisons across columns behave as intended.
        We could represent this assumption as a deequ constraint like: .satisfies("CASE
        WHEN team1 = TRIM(team1) AND team1 <> '''' THEN 1 ELSE 0 END", "team1 trimmed
        and non-empty", lambda x: x == 1.0).'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      uid: 35a4774e-7232-4fd3-b798-c52bd0a119f7
    - text: 'The ''team1'' column should come from a small, stable set of team names
        (around the historical ~19 categories); unexpected category growth likely
        indicates data issues. We could represent this assumption as a deequ rule
        like: .hasNumberOfDistinctValuesBetween(''team1'', 10, 40).'
      sources:
      - start_line: 38
        end_line: 38
        file: ''
      - start_line: 31
        end_line: 31
        file: ''
      uid: 353a2457-6a4f-4dcc-9b92-7ba296697e76
    - text: 'Each match should have two different teams; thus ''team1'' should never
        equal ''team2''. We could represent this assumption as a deequ constraint
        like: .satisfies("CASE WHEN team1 = team2 THEN 1 ELSE 0 END", "team1 != team2",
        lambda x: x == 0).'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: f6120f62-ca3c-4169-be86-b236e2f5b7d3
    - text: 'For decisive results (result in ''runs'' or ''wickets''), the ''winner''
        must be either ''team1'' or ''team2''; otherwise the label computed via (winner
        == team1) is unreliable. We could represent this as: .satisfies("CASE WHEN
        result IN (''runs'',''wickets'') THEN CASE WHEN winner IN (team1, team2) THEN
        1 ELSE 0 END ELSE 1 END", "Winner is one of the two teams for decisive results",
        lambda x: x == 1.0).'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: cc644858-9cd0-4b98-90f7-ce9ba67a8f0d
    - text: 'The toss winner should be one of the teams in the match; i.e., ''toss_winner''
        should be either ''team1'' or ''team2'' (or null if unknown). This ensures
        the indicator (toss_winner == team1) is meaningful and that ''team1'' shares
        the same naming convention as ''toss_winner''. We could represent this as:
        .satisfies("CASE WHEN toss_winner IS NULL OR toss_winner IN (team1, team2)
        THEN 1 ELSE 0 END", "Toss winner within teams", lambda x: x == 1.0).'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: ac912396-f9bf-4831-b688-cd5efc869d06
