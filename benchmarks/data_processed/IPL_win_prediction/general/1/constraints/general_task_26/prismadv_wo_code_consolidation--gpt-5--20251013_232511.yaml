        end_line: 22
        file: ''
      - start_line: 47
        end_line: 49
        file: ''
      uid: ee92db2b-5ee4-42a4-8e07-9f9a6fa91e7d
    - text: 'When result = ''wickets'', result_margin must be an integer between 1
        and 10 inclusive (a team cannot win by more than 10 wickets). This can be
        checked with a condition like: forAllRows(result != ''wickets'' or (cast(result_margin
        as int) = result_margin and result_margin between 1 and 10)).'
