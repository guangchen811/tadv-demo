constraints:
  date:
    code:
    - - '.hasPattern(''date'', r''^\d{4}-\d{2}-\d{2}$'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isContainedIn('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Valid
    assumptions: []
  method:
    code:
    - - '.satisfies("method IS NULL OR method = ''D/L''", ''method_dl_or_null'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.satisfies("(NOT (result IN (''runs'',''wickets''))) OR (result_margin IS
        NOT NULL AND result_margin > 0)", ''result_margin_positive_when_used'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  season:
    code:
    - - '.satisfies(''season >= 2008 AND season <= 2019'', ''season_in_expected_range'',
        lambda v: v == 1.0)'
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - '.satisfies("(method <> ''D/L'') OR (target_overs IS NOT NULL AND target_overs
        > 0 AND target_overs <= 20)", ''target_overs_required_when_dl'', lambda v:
        v == 1.0)'
      - Invalid
    - - '.satisfies(''target_overs <= 20'', ''target_overs_le_20'', lambda v: v ==
        1.0)'
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - '.satisfies("(toss_winner = team1) OR (toss_winner = team2)", ''toss_winner_is_in_teams'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  winner:
    code:
    - - '.satisfies("(NOT (result IN (''runs'',''wickets'') OR (result = ''tie'' AND
        super_over = ''Y''))) OR (winner IS NOT NULL AND (winner = team1 OR winner
        = team2))", ''winner_present_and_valid_when_decided'', lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("(result <> ''no result'') OR (winner IS NULL)", ''winner_null_for_no_result'',
        lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("NOT (result = ''tie'' AND super_over = ''N'') OR (winner IS NULL)",
        ''winner_null_for_plain_tie'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
