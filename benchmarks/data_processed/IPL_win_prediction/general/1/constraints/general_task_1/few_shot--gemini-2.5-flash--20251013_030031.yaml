constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isComplete('result_margin')
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    - - .isReal('result_margin')
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isIntegral('season')
      - Invalid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isComplete('target_overs')
      - Invalid
    - - .isNonNegative('target_overs')
      - Valid
    - - .isReal('target_overs')
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .isComplete('target_runs')
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    - - .isReal('target_runs')
      - Invalid
    assumptions: []
  team1:
    code:
    - - '.hasNumberOfDistinctValues(''team1'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - '.hasNumberOfDistinctValues(''team2'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - '.hasNumberOfDistinctValues(''toss_winner'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasNumberOfDistinctValues(''winner'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('winner')
      - Invalid
    assumptions: []
