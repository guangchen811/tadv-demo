fixing_results:
  match_type:
    08c493a4-2e96-4f63-b00c-a89781f92aab: '.hasUniqueness([''season''], lambda x:
      x == 1.0).where("lower(trim(match_type)) = ''final''")'
  result_margin:
    82dfdb61-bebe-4296-beec-d0b68f261035: '.satisfies("CAST(`result_margin` AS DOUBLE)
      IS NOT NULL AND NOT isnan(CAST(`result_margin` AS DOUBLE))", "result_margin
      numeric-like in >=98% rows", lambda x: x >= 0.98)'
    adfa42a6-1879-49b9-8b87-c3b712a32d62: '.satisfies("(lower(trim(`result`)) != ''runs'')
      OR (`result_margin` IS NOT NULL AND CAST(`result_margin` AS DOUBLE) >= 1)",
      "Runs margin validity", lambda x: x >= 0.5)'
    b61d811d-4833-4005-8634-0a38b16cdac3: '.satisfies("(NOT (lower(trim(`result`))
      RLIKE ''(run|wicket)'')) OR (`result_margin` IS NOT NULL)", "Margin present
      for decisive results (>=95%)", lambda x: x >= 0.95)'
  super_over:
    8b61b83d-cb48-418a-9510-ce7bf5f89521: '.hasCompleteness(''super_over'', lambda
      v: v >= 0.0)'
  toss_winner:
    85ef9091-4dcf-4bea-a395-5163220ee99e: '.hasNumberOfDistinctValues(''toss_winner'',
      lambda x: x >= 2 and x <= 40, None, None)'
  '["result","result_margin"]':
    d524b26b-306b-484c-929c-a7db5c764abb: '.satisfies("CASE WHEN lower(trim(result))
      IN (''runs'',''wickets'') THEN ((winner = (CASE WHEN lower(trim(toss_decision))=''field''
      THEN toss_winner ELSE CASE WHEN toss_winner = team1 THEN team2 ELSE team1 END
      END)) = (lower(trim(result))=''wickets'')) ELSE true END", "chasing_consistency",
      lambda x: x >= 0.99)'
  '["result","super_over"]':
    4cd69779-07d5-488b-b638-981cb3d40903: '.satisfies("(lower(`result`) <> ''wickets'')
      OR (CAST(`result_margin` AS double) BETWEEN 1 AND 10)", "Wickets result requires
      numeric margin between 1 and 10", lambda v: v >= 0.99)'
