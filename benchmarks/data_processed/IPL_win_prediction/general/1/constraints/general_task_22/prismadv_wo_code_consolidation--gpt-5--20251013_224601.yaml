    assumptions:
    - text: "For every match, toss_winner must be one of the two participating teams:\
        \ toss_winner \u2208 {team1, team2}. This supports correct derivation of chasing_team\
        \ and toss_won_match. Example Deequ compliance constraint: Compliance('toss_winner_in_teams',\
        \ 'toss_winner = team1 OR toss_winner = team2')."
      sources:
      - start_line: 50
        end_line: 54
        file: ''
      - start_line: 59
        end_line: 59
        file: ''
      uid: 1700bc01-3afe-4af4-9c34-2e7854805c4a
    - text: 'The two participating teams in a match must be distinct: team1 != team2.
        This is required for the chasing_team derivation (choosing the "other" team).
        Example Deequ compliance: Compliance(''teams_distinct'', ''team1 <> team2'').'
      sources:
      - start_line: 50
        end_line: 54
        file: ''
      uid: 799375a3-1bdf-4e85-9bef-37854dd0d0d7
    - text: "For all played matches (result_lc != 'no result'), winner must be non-null\
        \ and must be one of the two teams: winner \u2208 {team1, team2}. Also, whenever\
        \ winner is present in any row, it should be either team1 or team2. Example\
        \ Deequ compliance: Compliance('winner_valid_when_played', 'NOT played OR\
        \ (winner IS NOT NULL AND (winner = team1 OR winner = team2))')."
      sources:
      - start_line: 57
        end_line: 57
        file: ''
      - start_line: 59
        end_line: 59
        file: ''
      - start_line: 65
        end_line: 65
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      uid: 4120cdc6-b159-45cb-b714-2c9ca77fea94
    - text: "Chasing team derivation must be consistent with toss decision and teams:\
        \ if toss_decision_lc = 'field' then chasing_team = toss_winner; otherwise\
        \ chasing_team \u2260 toss_winner and chasing_team \u2208 {team1, team2}.\
        \ Example Deequ compliance: Compliance('chasing_team_logic', '(toss_decision_lc\
        \ = \"field\" AND chasing_team = toss_winner) OR (toss_decision_lc <> \"field\"\
        \ AND chasing_team <> toss_winner AND (chasing_team = team1 OR chasing_team\
        \ = team2))')."
      sources:
      - start_line: 50
        end_line: 54
        file: ''
      - start_line: 65
        end_line: 65
        file: ''
      uid: e80e4416-611c-45a1-bc8d-8a3c914647bb
    - text: "For played matches, the result type must be a decisive outcome ('runs'\
        \ or 'wickets'), ensuring margin fields are meaningful: NOT played OR result_lc\
        \ \u2208 {'runs','wickets'}. Example Deequ compliance: Compliance('decisive_result_when_played',\
        \ 'NOT played OR (result_lc = \"runs\" OR result_lc = \"wickets\")')."
      sources:
      - start_line: 57
        end_line: 57
        file: ''
      - start_line: 62
        end_line: 69
        file: ''
      uid: 35da6144-e580-4fe7-8c03-62531ce96a52
    - text: "For Final matches, within each season there must be exactly one unique\
        \ winner (champion), and that winner must be one of the two teams of the final.\
        \ Example Deequ: groupBy('season') + hasNumberOfDistinctValues('winner', _\
        \ == 1).withFilter('lower(trim(match_type)) = \"final\"') and a compliance\
        \ that winner \u2208 {team1, team2} for final rows."
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 112
        end_line: 118
        file: ''
      uid: 9a4ea96e-f5a3-4a12-973b-206299cc1436
  '["toss_winner","winner"]':
    code: []
    assumptions:
    - text: 'For all records with played = True (i.e., result_lc != ''no result''),
        ''winner'' must be non-null and belong to {team1, team2}. This supports downstream
        checks comparing ''winner'' to ''chasing_team'' and to ''toss_winner''. Example
        Deequ constraints: .satisfies(''(result_lc != \''no result\'') => (winner
        IS NOT NULL)'', assertion=1.0) and .satisfies(''(result_lc != \''no result\'')
        => (winner = team1 OR winner = team2)'', assertion=1.0).'
      sources:
      - start_line: 57
        end_line: 57
        file: ''
      - start_line: 65
        end_line: 65
        file: ''
      - start_line: 50
        end_line: 54
        file: ''
      uid: 8ce11c85-f58a-46c0-971f-0a6ef928c8d3
    - text: "'toss_winner' must be one of the two competing teams: toss_winner \u2208\
        \ {team1, team2}. Example Deequ constraint: .satisfies('(toss_winner = team1)\
        \ OR (toss_winner = team2)', assertion=1.0)."
      sources:
      - start_line: 50
        end_line: 54
        file: ''
      uid: 6be39598-ec07-405a-8d0a-adc8b392e1ae
    - text: 'Chasing team derivation must be consistent across columns: if toss_decision_lc
        = ''field'' then chasing_team = toss_winner; otherwise chasing_team is the
        opponent of toss_winner (i.e., (toss_winner = team1 AND chasing_team = team2)
        OR (toss_winner = team2 AND chasing_team = team1)). Example Deequ constraints:
        .satisfies(''(toss_decision_lc = \''field\'') => (chasing_team = toss_winner)'',
        1.0) and .satisfies(''(toss_decision_lc <> \''field\'') => (((toss_winner
        = team1 AND chasing_team = team2) OR (toss_winner = team2 AND chasing_team
        = team1)))'', 1.0).'
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 50
        end_line: 54
        file: ''
      uid: 94d47247-aff8-40c4-9d9b-606d972c08ea
    - text: 'Toss-win impact flag must align with winner and played: for played =
        True, toss_won_match is True iff (toss_winner = winner); for played = False,
        toss_won_match must be False. Example Deequ constraint: .satisfies(''((played
        AND toss_winner = winner AND toss_won_match) OR (played AND toss_winner <>
        winner AND NOT toss_won_match) OR (NOT played AND NOT toss_won_match))'',
        1.0).'
      sources:
      - start_line: 57
        end_line: 57
        file: ''
      - start_line: 59
        end_line: 59
        file: ''
      uid: a173e90f-2e8c-4e32-95ce-ac016d699807
    - text: 'Chasing outcome flag must align with winner and played: for played =
        True, chasing_win is True iff (winner = chasing_team); for played = False,
        chasing_win must be False. Example Deequ constraint: .satisfies(''((played
        AND winner = chasing_team AND chasing_win) OR (played AND winner <> chasing_team
        AND NOT chasing_win) OR (NOT played AND NOT chasing_win))'', 1.0).'
      sources:
      - start_line: 57
        end_line: 57
        file: ''
      - start_line: 65
        end_line: 65
        file: ''
      uid: c0022907-4ff9-4a11-8350-85641e9bca16
    - text: 'Margin columns must align with result type: if result_lc = ''runs'' then
        margin_runs = result_margin and margin_wkts is null; if result_lc = ''wickets''
        then margin_wkts = result_margin and margin_runs is null. Example Deequ constraints:
        .satisfies(''(result_lc = \''runs\'') => (margin_runs = result_margin AND
        margin_wkts IS NULL)'', 1.0) and .satisfies(''(result_lc = \''wickets\'')
        => (margin_wkts = result_margin AND margin_runs IS NULL)'', 1.0).'
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 68
        end_line: 69
        file: ''
      uid: c0d12878-090f-4161-bc0f-7144a008f6db
    - text: 'Finals uniqueness per season: among rows where lower(trim(match_type))
        = ''final'', there should be exactly one record per season and the winner
        must be non-null (i.e., unique champion per season). Example Deequ constraints:
        .isUnique([''season''], where=''lower(trim(match_type)) = \''final\'''') and
        .satisfies(''(lower(trim(match_type)) = \''final\'') => (winner IS NOT NULL)'',
        1.0).'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 112
        end_line: 121
        file: ''
      uid: f9c72cf4-a3fc-4bb1-8a89-2a23dc26679e
