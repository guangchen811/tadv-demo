  '["date","season"]':
    code: []
    assumptions:
    - text: 'For rows where match_type equals ''final'' (case-insensitive), there
        must be at most one such row per season, and the ''winner'' must be non-null.
        This guarantees a single, well-defined champion per season. Deequ-style: df.where(lower(col(''match_type''))
        == ''final'').isUnique([''season'']).where(lower(col(''match_type'')) == ''final'').where(col(''winner'').isNotNull()).'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 79
        end_line: 80
        file: ''
      - start_line: 112
        end_line: 116
        file: ''
      uid: 8e1d2846-d484-4175-a4ef-4a4ddd799cec
    - text: 'The ''match_type'' values are standardized so that the grouped output
        contains exact tokens ''League'' and ''Final'' (trimmed, correct casing).
        This is required for downstream filters to find those groups. Example constraint:
        with a trimmed column, enforce allowed canonical values for at least those
        used downstream: isContainedIn([''match_type_trim''], [''League'', ''Final'',
        ...]) and ensure that for any season present, if a final exists it appears
        as ''Final'' in the grouped data.'
      sources:
      - start_line: 72
        end_line: 72
        file: ''
      - start_line: 95
        end_line: 95
        file: ''
      - start_line: 112
        end_line: 113
        file: ''
      uid: 3d039833-8af8-4df1-830b-f24b6ae21fc5
    - text: 'Result-type and margin columns are mutually consistent: (a) if ''result_lc''
        == ''runs'' then ''is_runs'' is True, ''is_wickets'' is False, ''margin_runs''
        is non-null, and ''margin_wkts'' is null; (b) if ''result_lc'' == ''wickets''
        then ''is_wickets'' is True, ''is_runs'' is False, ''margin_wkts'' is non-null,
        and ''margin_runs'' is null; (c) ''is_runs'' and ''is_wickets'' are never
        both True. Deequ-style per-row implication checks on these pairs.'
      sources:
      - start_line: 62
        end_line: 69
        file: ''
      uid: 67804761-8628-4929-bbd0-558be9c146c8
    - text: 'Outcome flags are consistent with their defining columns: (a) ''toss_won_match''
        equals (''played'' AND toss_winner == winner); therefore, if ''toss_won_match''
        is True, then ''played'' must be True and toss_winner == winner; (b) ''chasing_win''
        equals (''played'' AND winner == chasing_team); therefore, if ''chasing_win''
        is True, then ''played'' must be True and winner == chasing_team. Deequ-style
        per-row equality/implication constraints.'
      sources:
      - start_line: 57
        end_line: 60
        file: ''
      - start_line: 65
        end_line: 65
        file: ''
      uid: 654e055c-c4e7-4891-bc42-7279a323706a
    - text: 'The ''chasing_team'' column is a deterministic function of ''toss_decision_lc'',
        ''toss_winner'', ''team1'', and ''team2'': if toss_decision_lc == ''field''
        then chasing_team == toss_winner; otherwise chasing_team equals the team that
        did not win the toss (team1 or team2 accordingly). Deequ-style per-row rule
        to assert this mapping.'
      sources:
      - start_line: 50
        end_line: 54
        file: ''
      uid: 12540765-3fe7-40ff-8769-0f6779e733d1
