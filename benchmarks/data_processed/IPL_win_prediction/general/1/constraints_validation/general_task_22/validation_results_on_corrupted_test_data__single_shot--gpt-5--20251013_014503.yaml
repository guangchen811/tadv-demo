results:
  date:
    code:
    - suggestion: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$', match=1.0)
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasPattern(''date'',
        r''^\d{4}-\d{2}-\d{2}$'', match=1.0)'': Check.hasPattern() got an unexpected
        keyword argument ''match'''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(substring(date, 1, 4) as int) = season", ''date_year_matches_season'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .hasDataType('id', ConstrainableDataTypes.Integral)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''id'', ConstrainableDataTypes.Integral)'
      level: error
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier
        2', 'Eliminator', 'Final', 'Elimination Final', 'Semi Final'])
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.satisfies("method is null or upper(method) = ''D/L''", ''method_allowed_values'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.satisfies("case when lower(result) != ''no result'' then player_of_match
        is not null else true end", ''pom_present_when_played'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("case when lower(result) = ''tie'' then upper(super_over)
        = ''Y'' else true end", ''tie_implies_super_over'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''result_margin'',
        ConstrainableDataTypes.Fractional)'
      level: error
    - suggestion: '.satisfies("case when lower(result) in (''runs'',''wickets'') then
        result_margin > 0 else result_margin is null end", ''margin_consistent_with_result'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', ConstrainableDataTypes.Integral)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''season'', ConstrainableDataTypes.Integral)'
      level: error
    - suggestion: '.hasMax(''season'', lambda v: v <= 2024)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''season'', lambda v: v >= 2008)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("case when upper(super_over) = ''Y'' then lower(result)
        = ''tie'' else true end", ''super_over_implies_tie'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''target_overs'',
        ConstrainableDataTypes.Fractional)'
      level: error
    - suggestion: '.hasMax(''target_overs'', lambda v: v <= 20.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('target_overs')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''target_runs'',
        ConstrainableDataTypes.Fractional)'
      level: error
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: '.satisfies(''team1 <> team2'', ''teams_different_per_match'', lambda
        v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''team1 <> team2'', ''teams_different_per_match'',
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9918256130790191 does
        not meet the constraint requirement!'
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: '.satisfies(''toss_winner = team1 or toss_winner = team2'', ''toss_winner_in_teams'',
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''toss_winner = team1 or toss_winner
        = team2'', ''toss_winner_in_teams'', lambda v: v == 1.0)'' failed on data
        sample: Value: 0.9618528610354223 does not meet the constraint requirement!'
      level: error
  winner:
    code:
    - suggestion: '.satisfies("case when lower(result) != ''no result'' then (winner
        = team1 or winner = team2) else true end", ''winner_in_teams_when_played'',
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("case when lower(result) != ''no
        result'' then (winner = team1 or winner = team2) else true end", ''winner_in_teams_when_played'',
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9455040871934605 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("case when lower(result) = ''no result'' then winner
        is null else winner is not null end", ''winner_present_when_played'', lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
