results:
  date:
    code:
    - suggestion: .hasColumn('date')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasColumn(''date'')'':
        ''Check'' object has no attribute ''hasColumn'''
      level: error
    - suggestion: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
