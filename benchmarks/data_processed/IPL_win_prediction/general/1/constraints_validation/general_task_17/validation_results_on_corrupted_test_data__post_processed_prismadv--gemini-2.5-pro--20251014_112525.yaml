results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`team1` = TRIM(`team1`)", "team1 should not have leading
        or trailing whitespace")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct("team1", lambda n: n < 30)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team1 <> team2'', ''team_cannot_play_against_itself'',
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''team1 <> team2'', ''team_cannot_play_against_itself'',
        lambda x: x == 1)'' failed on data sample: Value: 0.9918256130790191 does
        not meet the constraint requirement!'
      level: error
  target_overs:
    code:
    - suggestion: '.isPositive(''target_overs'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR result_margin
        IS NOT NULL", "result_margin should not be null when result is ''runs'' or
        ''wickets''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: '.satisfies("lower(trim(`toss_decision`)) IN (''field'', ''bat'')",
        "toss_decision must be ''field'' or ''bat''", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: .isComplete("toss_winner")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_must_be_a_playing_team", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "toss_winner_must_be_a_playing_team", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.9618528610354223 does not meet the constraint requirement!'
      level: warning
  date:
    code:
    - suggestion: '.satisfies("to_date(CAST(date AS STRING)) IS NOT NULL", "is_valid_date_format",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: '.hasCompleteness("city", lambda c: c > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("`method` IS NULL OR `method` = ''D/L''", "''method''
        contains only ''D/L'' or NULL", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: warning
  '["date","season"]':
    code:
    - suggestion: '.hasUniqueness([''date'', ''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = '''' OR winner = team1 OR
        winner = team2", "WinnerMustBeOneOfTheTeams", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("winner IS NULL OR winner = ''''
        OR winner = team1 OR winner = team2", "WinnerMustBeOneOfTheTeams", lambda
        x: x == 1)'' failed on data sample: Value: 0.9455040871934605 does not meet
        the constraint requirement!'
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("`winner` IS NULL OR (`winner` = `team1` OR `winner`
        = `team2`)", "WinnerMustBeOneOfTheTeams", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`winner` IS NULL OR (`winner` =
        `team1` OR `winner` = `team2`)", "WinnerMustBeOneOfTheTeams", lambda x: x
        == 1)'' failed on data sample: Value: 0.9455040871934605 does not meet the
        constraint requirement!'
      level: error
  result:
    code:
    - suggestion: '.satisfies("`result` IS NOT NULL AND lower(trim(`result`)) IN (''runs'',
        ''wickets'', ''tie'', ''no result'')", "result must be a valid, non-null outcome",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["method","target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("(method IS NULL OR method != ''D/L'') OR target_overs
        IS NOT NULL", "method_target_codependency", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","super_over","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN (winner
        IS NOT NULL AND result_margin IS NOT NULL) ELSE TRUE END", "Winner and Margin
        must exist for conclusive results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result = ''tie'' AND super_over = ''Y'') OR (result
        <> ''tie'' AND super_over <> ''Y'')", "Tie result corresponds to Super Over",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN winner IS NULL
        ELSE TRUE END", "No winner for ''no result'' matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "WinnerMustBeOneOfTheTeams", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("winner IS NULL OR winner = team1
        OR winner = team2", "WinnerMustBeOneOfTheTeams", lambda x: x == 1)'' failed
        on data sample: Value: 0.9455040871934605 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("result <> ''no result'' OR winner IS NULL", "NoWinnerForNoResult",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "TeamsMustBeDifferent", lambda x:
        x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("team1 <> team2", "TeamsMustBeDifferent",
        lambda x: x == 1)'' failed on data sample: Value: 0.9918256130790191 does
        not meet the constraint requirement!'
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "team1_is_not_team2", lambda x:
        x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`team1` <> `team2`", "team1_is_not_team2",
        lambda x: x == 1)'' failed on data sample: Value: 0.9918256130790191 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_participant", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "toss_winner_is_participant", lambda x: x == 1)'' failed on data
        sample: Value: 0.9618528610354223 does not meet the constraint requirement!'
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("winner IS NULL OR winner IN (team1, team2)", "winner_is_a_participant",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("winner IS NULL OR winner IN (team1,
        team2)", "winner_is_a_participant", lambda x: x == 1.0)'' failed on data sample:
        Value: 0.9455040871934605 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("team1 <> team2", "teams_are_distinct", lambda x: x
        == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("team1 <> team2", "teams_are_distinct",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9918256130790191 does
        not meet the constraint requirement!'
      level: error
