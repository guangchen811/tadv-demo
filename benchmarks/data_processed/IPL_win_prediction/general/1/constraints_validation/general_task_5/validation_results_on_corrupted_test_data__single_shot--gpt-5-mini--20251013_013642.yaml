results:
  date:
    code:
    - suggestion: .hasPattern('date', r'^\\d{4}-\\d{2}-\\d{2}$')
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''date'', r''^\\d{4}-\\d{2}-\\d{2}$'')''
        failed on data sample: Value: 0.0 does not meet the constraint requirement!'
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  league_matches_team_distinctness:
    code:
    - suggestion: .satisfies("(match_type != 'League') OR (team1 != team2)", 'league_match_teams_must_differ')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(match_type != ''League'') OR (team1
        != team2)", ''league_match_teams_must_differ'')'' failed on data sample: Value:
        0.9918256130790191 does not meet the constraint requirement!'
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['Elimination Final','Eliminator','Qualifier
        2','Final','Semi Final','Qualifier 1','League'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['tie','runs','wickets','no result'])
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  tie_super_over_consistency:
    code:
    - suggestion: .satisfies("((result = 'tie' AND super_over = 'Y') OR (result !=
        'tie' AND super_over != 'Y'))", 'tie_super_over_consistency')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  winner_consistency:
    code:
    - suggestion: .satisfies("(result = 'no result') OR (winner = team1) OR (winner
        = team2)", 'winner_should_be_one_of_teams_or_nr')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(result = ''no result'') OR (winner
        = team1) OR (winner = team2)", ''winner_should_be_one_of_teams_or_nr'')''
        failed on data sample: Value: 0.9455040871934605 does not meet the constraint
        requirement!'
      level: error
