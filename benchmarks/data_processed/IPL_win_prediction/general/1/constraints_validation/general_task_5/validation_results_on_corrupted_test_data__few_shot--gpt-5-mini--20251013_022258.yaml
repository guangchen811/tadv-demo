results:
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result != 'tie' OR super_over = 'Y'", 'tie_implies_super_over')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("super_over != 'Y' OR result = 'tie'", 'super_over_implies_tie')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("team1 != team2", 'teams_must_be_distinct')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("team1 != team2", ''teams_must_be_distinct'')''
        failed on data sample: Value: 0.9918256130790191 does not meet the constraint
        requirement!'
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("result = 'no result' OR winner = team1 OR winner = team2",
        'winner_is_participant_or_null')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("result = ''no result'' OR winner
        = team1 OR winner = team2", ''winner_is_participant_or_null'')'' failed on
        data sample: Value: 0.9455040871934605 does not meet the constraint requirement!'
      level: error
