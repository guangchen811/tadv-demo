results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result = ''no result'' OR winner IS NULL OR winner
        = team1 OR winner = team2", "WinnerMustBeParticipant", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("result = ''no result'' OR winner
        IS NULL OR winner = team1 OR winner = team2", "WinnerMustBeParticipant", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.9455040871934605 does not meet
        the constraint requirement!'
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`team1` <> `team2`", "team1_neq_team2")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`team1` <> `team2`", "team1_neq_team2")''
        failed on data sample: Value: 0.9918256130790191 does not meet the constraint
        requirement!'
      level: error
  match_type:
    code:
    - suggestion: '.satisfies("`match_type` = ''League''", "Must contain league matches",
        lambda num_rows: num_rows > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("match_type")
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isContainedIn("super_over", ["Y", "N"])
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.satisfies("to_date(`date`, ''yyyy-MM-dd'') IS NOT NULL", "date_format_is_yyyy-MM-dd",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("year(to_date(`date`)) = `season`", "Year in date must
        match season", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("`result` = ''no result'' OR `winner` IS NOT NULL",
        "winner_not_null_if_match_has_result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`winner` = `team1` OR `winner` = `team2` OR `winner`
        IS NULL", "winner_is_a_participating_team", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`winner` = `team1` OR `winner` =
        `team2` OR `winner` IS NULL", "winner_is_a_participating_team", lambda x:
        x == 1.0)'' failed on data sample: Value: 0.9455040871934605 does not meet
        the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: .satisfies("(result = 'tie') = (super_over = 'Y')", "tie_and_super_over_co-occurrence")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result <> 'no result' OR super_over = 'N'", "no_result_implies_no_super_over")
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`result` NOT IN (''runs'', ''wickets'') OR (`winner`
        = `team1` OR `winner` = `team2`)", "winner_is_participant_for_decisive_matches",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`result` NOT IN (''runs'', ''wickets'')
        OR (`winner` = `team1` OR `winner` = `team2`)", "winner_is_participant_for_decisive_matches",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9455040871934605 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`result` <> ''no result'' OR `winner` IS NULL", "no_winner_for_no_result_matches",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_must_be_distinct", lambda
        x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`team1` <> `team2`", "teams_must_be_distinct",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9918256130790191 does
        not meet the constraint requirement!'
      level: error
  '["result","winner"]':
    code:
    - suggestion: '.satisfies("(result = ''no result'' AND winner IS NULL) OR (result
        <> ''no result'' AND winner IS NOT NULL)", "winner_and_result_consistency",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result = ''tie'' AND super_over = ''Y'') OR (result
        <> ''tie'' AND super_over <> ''Y'')", "tie_and_super_over_consistency", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "team1_is_not_team2", lambda x:
        x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`team1` <> `team2`", "team1_is_not_team2",
        lambda x: x == 1)'' failed on data sample: Value: 0.9918256130790191 does
        not meet the constraint requirement!'
      level: error
