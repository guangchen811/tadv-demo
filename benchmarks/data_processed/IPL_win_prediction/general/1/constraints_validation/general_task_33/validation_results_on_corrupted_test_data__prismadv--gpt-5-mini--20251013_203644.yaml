results:
  team1:
    code:
    - suggestion: '.hasCompleteness(''team1'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `winner` IS NULL OR `winner` IN (`team1`,
        `team2`) THEN 1 ELSE 0 END'', ''winner_in_row_teams'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN `winner` IS NULL OR `winner`
        IN (`team1`, `team2`) THEN 1 ELSE 0 END'', ''winner_in_row_teams'', lambda
        x: x == 1)'' failed on data sample: Value: 0.9455040871934605 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''trim(`team1`) = `team1`'', ''team1_no_leading_trailing_whitespace'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(`team2`) = `team2`", "team2_no_surrounding_whitespace",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''match_type'', [''League'',''Qualifier 1'',''Qualifier
        2'',''Final'',''Eliminator'',''Elimination Final'',''Semi Final''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRIM(`match_type`) = `match_type` THEN 1
        ELSE 0 END", "match_type_no_whitespace", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' THEN 1 ELSE 0 END",
        "prop_league_at_least_0_05", lambda x: x >= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("CAST(`target_overs` AS DOUBLE) IS NOT NULL", "target_overs_castable_to_double",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("target_overs", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.hasCompleteness("result_margin", lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness("result_margin", lambda x:
        x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN (`result_margin`
        IS NOT NULL AND `result_margin` >= 0) ELSE true END", "result_margin_non_negative_for_runs",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN (`result_margin`
        IS NOT NULL AND `result_margin` BETWEEN 1 AND 10 AND CAST(`result_margin`
        AS INT) = `result_margin`) ELSE true END", "result_margin_wickets_range",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`result_margin` IS NULL OR `result_margin` >= 0", "result_margin_non_negative_overall",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''target_runs'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `target_runs` IS NULL OR `target_runs` =
        floor(cast(`target_runs` AS double)) THEN 1 ELSE 0 END'', ''target_runs_integer_like'',
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' AND `result` IN
        (''runs'',''wickets'',''tie'') THEN CASE WHEN `winner` IS NOT NULL AND (`winner`
        = `team1` OR `winner` = `team2`) THEN 1 ELSE 0 END ELSE 1 END", "decisive_league_rows_have_valid_winner",
        lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `match_type` = ''League''
        AND `result` IN (''runs'',''wickets'',''tie'') THEN CASE WHEN `winner` IS
        NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN 1 ELSE 0 END
        ELSE 1 END", "decisive_league_rows_have_valid_winner", lambda x: x >= 0.99)''
        failed on data sample: Value: 0.9482288828337875 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL THEN 1 WHEN `winner` = `team1`
        OR `winner` = `team2` THEN 1 ELSE 0 END", "winner_matches_team1_or_team2_when_present",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `winner` IS NULL THEN
        1 WHEN `winner` = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END", "winner_matches_team1_or_team2_when_present",
        lambda x: x == 1)'' failed on data sample: Value: 0.9455040871934605 does
        not meet the constraint requirement!'
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", ''result_allowed_values'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["match_type","result","season","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN `winner` = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END
        ELSE 1 END", "Winner is one of competing teams for decisive results", lambda
        x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN `winner` = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END
        ELSE 1 END", "Winner is one of competing teams for decisive results", lambda
        x: x == 1)'' failed on data sample: Value: 0.9455040871934605 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN CASE WHEN `winner`
        IS NULL OR (NOT (`winner` = `team1` OR `winner` = `team2`)) THEN 1 ELSE 0
        END ELSE 1 END", "No-result matches should not assign a competing-team as
        winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN CASE WHEN `result_margin`
        IS NOT NULL AND `target_overs` IS NOT NULL AND `target_overs` > 0 THEN 1 ELSE
        0 END ELSE 1 END", "For ''runs'' results: result_margin and positive target_overs
        must be present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN CASE WHEN `result_margin`
        IS NOT NULL AND `result_margin` BETWEEN 1 AND 10 THEN 1 ELSE 0 END ELSE 1
        END", "For ''wickets'' results: result_margin should be present and within
        a reasonable range (1-10)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' THEN CASE WHEN
        `team1` IS NOT NULL AND `team2` IS NOT NULL AND `team1` <> `team2` THEN 1
        ELSE 0 END ELSE 1 END", "League matches must have both team1 and team2 present
        and they must differ", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `match_type` = ''League''
        THEN CASE WHEN `team1` IS NOT NULL AND `team2` IS NOT NULL AND `team1` <>
        `team2` THEN 1 ELSE 0 END ELSE 1 END", "League matches must have both team1
        and team2 present and they must differ", lambda x: x == 1)'' failed on data
        sample: Value: 0.9918256130790191 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' THEN CASE WHEN `winner`
        IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN 1 ELSE 0 END
        ELSE 1 END", "Tie results must record a super-over winner who is one of the
        competing teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
