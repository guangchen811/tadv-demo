results:
  team1:
    code:
    - suggestion: '.hasCompleteness(''team1'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasApproxCountDistinct(''team1'', lambda x: x == 19)'
      status: false
      reason_if_failed: 'Constraint ''.hasApproxCountDistinct(''team1'', lambda x:
        x == 19)'' failed on data sample: Value: 11.0 does not meet the constraint
        requirement!'
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("length(trim(team2)) > 0 AND team2 = trim(team2)", "team2
        has no extraneous whitespace", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier
        2', 'Final', 'Eliminator', 'Semi Final', 'Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies('NOT ((team1 = winner OR team2 = winner) AND (result
        = "runs" OR result = "wickets") AND result_margin IS NULL)', 'Non-null result_margin
        for winner/runs or winner/wickets')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''result_margin'', lambda x: x <= 500)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .satisfies('(`toss_winner` = `team1` OR `toss_winner` = `team2`)',
        'Toss winner must be one of the participating teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(`toss_winner` = `team1` OR `toss_winner`
        = `team2`)'', ''Toss winner must be one of the participating teams'')'' failed
        on data sample: Value: 0.9618528610354223 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies('length(trim(`toss_winner`)) > 0', 'Toss winner is not
        empty or whitespace')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["id","team1","team2"]':
    code:
    - suggestion: '.hasUniqueness([''id'', ''team1'', ''team2''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('team1 <> team2', 'Team1 not equal to Team2')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''team1 <> team2'', ''Team1 not equal
        to Team2'')'' failed on data sample: Value: 0.9918256130790191 does not meet
        the constraint requirement!'
      level: error
  '["id","match_type","team1","team2"]':
    code:
    - suggestion: .satisfies('team1 <> team2', 'No team plays itself')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''team1 <> team2'', ''No team plays
        itself'')'' failed on data sample: Value: 0.9918256130790191 does not meet
        the constraint requirement!'
      level: error
  '["result","super_over"]':
    code:
    - suggestion: .satisfies("( (result IN ('runs', 'wickets') AND super_over IN ('N',
        'Y')) OR (result = 'tie' AND super_over IN ('N', 'Y')) OR (result = 'no result'
        AND super_over = 'N') )", "Valid result-super_over pairs")
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over","winner"]':
    code:
    - suggestion: .satisfies("(CASE WHEN (`result` = 'runs' OR `result` = 'wickets')
        THEN `result_margin` IS NOT NULL ELSE TRUE END)", "Margin present for wins
        by runs/wickets")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.haveCompleteness([''result'', ''super_over'', ''winner''], lambda
        x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.haveCompleteness([''result'', ''super_over'',
        ''winner''], lambda x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692
        does not meet the constraint requirement!'
      level: warning
    - suggestion: .satisfies("(CASE WHEN `result` = 'no result' THEN (`winner` IS
        NULL OR `winner` = '' OR lower(`winner`) = 'nan') AND `super_over` = 'N' ELSE
        TRUE END)", "No winner or super over for no result")
      status: true
      reason_if_failed: ''
      level: warning
  '["result","winner"]':
    code:
    - suggestion: .satisfies('winner = team1 OR winner = team2 OR winner IS NULL',
        'Winner is one of participating teams or NULL')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''winner = team1 OR winner = team2
        OR winner IS NULL'', ''Winner is one of participating teams or NULL'')'' failed
        on data sample: Value: 0.9455040871934605 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies("(result NOT IN ('runs', 'wickets')) OR winner IS NOT
        NULL", "Winner required if result is runs or wickets")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("NOT (result = 'tie' AND super_over <> 'Y' AND winner
        IS NOT NULL)", "No winner for tie without super over")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("winner IS NULL OR (result IN ('runs', 'wickets') OR
        (result = 'tie' AND super_over = 'Y'))", "Winner only when match outcome allows")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: .satisfies('team1 != team2', 'Team1 not equal to Team2')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''team1 != team2'', ''Team1 not equal
        to Team2'')'' failed on data sample: Value: 0.9918256130790191 does not meet
        the constraint requirement!'
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: .satisfies('team1 <> team2', 'Team cannot play against itself')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''team1 <> team2'', ''Team cannot
        play against itself'')'' failed on data sample: Value: 0.9918256130790191
        does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'Toss winner
        must be one of the participating teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''toss_winner = team1 OR toss_winner
        = team2'', ''Toss winner must be one of the participating teams'')'' failed
        on data sample: Value: 0.9618528610354223 does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasUniqueness([''team1'', ''team2'', ''id''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["toss_decision","toss_winner","winner"]':
    code:
    - suggestion: '.haveCompleteness([''toss_decision'', ''toss_winner''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
