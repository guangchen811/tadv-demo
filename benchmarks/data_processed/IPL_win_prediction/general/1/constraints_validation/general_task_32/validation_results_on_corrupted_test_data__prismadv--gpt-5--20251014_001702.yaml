results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''length(trim(team1)) > 0'', ''team1 not empty after
        trim'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team1 <> team2'', ''Distinct opponents'', lambda x:
        x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''team1 <> team2'', ''Distinct opponents'',
        lambda x: x == 1)'' failed on data sample: Value: 0.9918256130790191 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''(NOT (result IN (\''runs\'', \''wickets\''))) OR (winner
        = team1 OR winner = team2)'', ''Winner must be one of the two teams for decided
        matches'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(NOT (result IN (\''runs\'', \''wickets\'')))
        OR (winner = team1 OR winner = team2)'', ''Winner must be one of the two teams
        for decided matches'', lambda x: x == 1)'' failed on data sample: Value: 0.9455040871934605
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''team1 = trim(team1)'', ''team1 has no leading/trailing
        whitespace'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(team2 = TRIM(team2)) AND (TRIM(team2) <> '''')", "team2
        trimmed and non-empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("UPPER(TRIM(team2)) NOT IN (''NA'',''N/A'',''NONE'',''NULL'',''NAN'')",
        "no placeholder-missing team2", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN LOWER(result) IN (''runs'',''wickets'') THEN
        CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END",
        "winner is one of team1/team2 when decided", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN LOWER(result) IN (''runs'',''wickets'')
        THEN CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END",
        "winner is one of team1/team2 when decided", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.9455040871934605 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN team2 = team1 THEN 0 ELSE 1 END", "team1
        and team2 must differ", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN team2 = team1 THEN 0 ELSE
        1 END", "team1 and team2 must differ", lambda x: x == 1.0)'' failed on data
        sample: Value: 0.9918256130790191 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN LOWER(result) IN (''tie'',''no result'')
        THEN CASE WHEN team2 IS NOT NULL AND TRIM(team2) <> '''' THEN 1 ELSE 0 END
        ELSE 1 END", "team2 present for tie/NR", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''match_type'', [''League'',''Final'',''Qualifier
        1'',''Qualifier 2'',''Eliminator'',''Semi Final'',''Elimination Final''],
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("match_type = TRIM(match_type)", "match_type trimmed",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("result_margin IS NULL OR result_margin IS NOT NULL",
        "result_margin column exists", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(result) IN (''runs'',''wickets'') THEN
        CASE WHEN result_margin IS NOT NULL AND CAST(result_margin AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END ELSE 1 END", "result_margin present and numeric for
        decided matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(result) = ''runs'' THEN CASE WHEN result_margin
        BETWEEN 1 AND 200 THEN 1 ELSE 0 END ELSE 1 END", "runs margin typically within
        1..200", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isComplete("super_over")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("upper(trim(`super_over`)) IN (''Y'',''N'')", "Valid
        super_over domain", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`super_over` IS NOT NULL AND length(trim(`super_over`))
        > 0", "Non-null, non-empty super_over", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(lower(trim(`result`)) <> ''tie'') OR (upper(trim(`super_over`))
        = ''Y'')", "Tie implies super_over Y", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.satisfies("try_to_timestamp(`date`) IS NOT NULL", "Parseable date
        >= 95%", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'',''tie'',''no
        result'') THEN try_to_timestamp(`date`) IS NOT NULL ELSE true END", "Date
        present/parseable when outcome is set", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(result) IN (''runs'',''wickets'') THEN
        CASE WHEN winner IS NOT NULL AND TRIM(winner) <> '''' THEN 1 ELSE 0 END ELSE
        1 END", "Winner present for decided matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(result) IN (''runs'',''wickets'') THEN
        CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END",
        "Winner equals one of the two teams for decided matches", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(result) IN (''runs'',''wickets'')
        THEN CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END",
        "Winner equals one of the two teams for decided matches", lambda x: x == 1.0)''
        failed on data sample: Value: 0.9455040871934605 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NULL THEN 1 ELSE CASE WHEN winner
        = TRIM(winner) THEN 1 ELSE 0 END END", "Winner has no leading/trailing whitespace",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("lower(trim(result)) IN (''runs'',''wickets'',''tie'',''no
        result'')", "Valid match result values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN result_margin IS NOT
        NULL AND result_margin >= 1 AND result_margin = CAST(result_margin AS INT)
        ELSE true END", "Runs require integer result_margin >= 1", lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''wickets'' THEN result_margin IS
        NOT NULL AND result_margin BETWEEN 1 AND 10 AND result_margin = CAST(result_margin
        AS INT) ELSE true END", "Wickets require integer result_margin between 1 and
        10", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''tie'',''no result'') THEN result_margin
        IS NULL ELSE true END", "Ties/No result must not have a result_margin", lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: .satisfies("((result = 'tie' AND super_over = 'Y') OR (result <>
        'tie' AND super_over = 'N'))", "result_super_over_consistency")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("CASE WHEN result = 'runs' THEN result_margin BETWEEN
        1 AND 200 ELSE true END", "runs_margin_range")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("CASE WHEN result = 'wickets' THEN result_margin BETWEEN
        1 AND 10 ELSE true END", "wkts_margin_range")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("CASE WHEN result IN ('runs','wickets') THEN result_margin
        IS NOT NULL ELSE true END", "decided_requires_margin")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN result IN ('tie','no result') THEN result_margin
        IS NULL ELSE true END", "no_margin_when_not_decided")
      status: true
      reason_if_failed: ''
      level: warning
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("case when result in (''runs'',''wickets'') then winner
        is not null and (winner = team1 or winner = team2) else true end", "winner_matches_participants_when_decided",
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("case when result in (''runs'',''wickets'')
        then winner is not null and (winner = team1 or winner = team2) else true end",
        "winner_matches_participants_when_decided", lambda v: v == 1.0)'' failed on
        data sample: Value: 0.9455040871934605 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("case when result = ''wickets'' then result_margin is
        not null and result_margin >= 1 and result_margin <= 10 else true end", "wkts_margin_range",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("case when result = ''runs'' then result_margin is not
        null and result_margin >= 1 else true end", "runs_margin_positive", lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("case when result in (''tie'',''no result'') then result_margin
        is null else true end", "no_margin_when_tie_or_nr", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "teams_are_distinct", lambda v: v
        == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("team1 <> team2", "teams_are_distinct",
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9918256130790191 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("case when result = ''tie'' then upper(super_over) in
        (''Y'',''YES'',''TRUE'') else true end", "super_over_present_on_tie", lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (winner
        = team1 OR winner = team2) ELSE TRUE END", "Winner must be team1 or team2
        for decided matches", lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN result IN (''runs'',''wickets'')
        THEN (winner = team1 OR winner = team2) ELSE TRUE END", "Winner must be team1
        or team2 for decided matches", lambda v: v == 1.0)'' failed on data sample:
        Value: 0.9455040871934605 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN CAST(result_margin
        AS INT) IS NOT NULL AND CAST(result_margin AS INT) BETWEEN 1 AND 200 ELSE
        TRUE END", "Runs: result_margin must be integer and in [1,200] when result=''runs''",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''wickets'' THEN CAST(result_margin
        AS INT) IS NOT NULL AND CAST(result_margin AS INT) BETWEEN 1 AND 10 ELSE TRUE
        END", "Wickets: result_margin must be integer and in [1,10] when result=''wickets''",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN winner IS NULL
        AND result_margin IS NULL ELSE TRUE END", "No result rows: no winner and no
        margin", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
