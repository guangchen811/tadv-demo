results:
  team1:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END", "winner_matches_team",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN result IN (''runs'',''wickets'')
        THEN CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END",
        "winner_matches_team", lambda x: x == 1)'' failed on data sample: Value: 0.9455040871934605
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(team1) = team1 THEN 1 ELSE 0 END", "team1_no_surrounding_whitespace",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.satisfies("CASE WHEN `team2` IS NOT NULL AND trim(`team2`) <>
        '''' THEN 1 ELSE 0 END", "team2_non_null_non_empty", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL THEN 1 WHEN `winner` = `team1`
        OR `winner` = `team2` THEN 1 ELSE 0 END", "winner_matches_team_columns", lambda
        x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `winner` IS NULL THEN
        1 WHEN `winner` = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END", "winner_matches_team_columns",
        lambda x: x == 1)'' failed on data sample: Value: 0.9455040871934605 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN typeof(`team2`) = ''string'' AND trim(`team2`)
        = `team2` THEN 1 ELSE 0 END", "team2_string_and_clean", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: '.isContainedIn(''match_type'', [''League'',''Qualifier 1'',''Qualifier
        2'',''Final'',''Eliminator'',''Elimination Final'',''Semi Final''], lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN trim(`match_type`) = `match_type` THEN 1
        ELSE 0 END'', ''match_type_trimmed'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN CASE WHEN CAST(`result_margin`
        AS DOUBLE) BETWEEN 1 AND 10 AND floor(CAST(`result_margin` AS DOUBLE)) = CAST(`result_margin`
        AS DOUBLE) THEN 1 ELSE 0 END ELSE 1 END", "wickets_margin_integer_1_to_10",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN CASE WHEN CAST(`result_margin`
        AS DOUBLE) >= 1 AND floor(CAST(`result_margin` AS DOUBLE)) = CAST(`result_margin`
        AS DOUBLE) THEN 1 ELSE 0 END ELSE 1 END", "runs_margin_positive_integer",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN CASE WHEN CAST(`result_margin`
        AS DOUBLE) <= 200 THEN 1 ELSE 0 END ELSE 1 END", "runs_margin_reasonable_upper_bound",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.satisfies("CASE WHEN upper(trim(`super_over`)) IN (''Y'',''N'')
        THEN 1 ELSE 0 END", "super_over_values_allowed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) = ''tie'' THEN CASE
        WHEN upper(trim(`super_over`)) = ''Y'' THEN 1 ELSE 0 END ELSE 1 END", "super_over_present_for_ties",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies(''cast(`date` as timestamp) IS NOT NULL'', ''date_parseable'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`date` RLIKE ''.*([zZ]|[+-][0-9]{2}(:[0-9]{2})?)$''",
        "consistent_timezone_presence", lambda x: (x == 0.0) or (x == 1.0))'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE
        WHEN `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN
        1 ELSE 0 END ELSE 1 END", "Winner valid for decided matches", lambda x: x
        == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `result` IN (''runs'',''wickets'')
        THEN CASE WHEN `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` =
        `team2`) THEN 1 ELSE 0 END ELSE 1 END", "Winner valid for decided matches",
        lambda x: x == 1)'' failed on data sample: Value: 0.9455040871934605 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL THEN 1 WHEN trim(`winner`)
        = `winner` THEN 1 ELSE 0 END", "Winner has no leading/trailing whitespace",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'',''no result'') THEN
        CASE WHEN `winner` IS NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner null for
        tie/NR", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `result` IN (''tie'',''no
        result'') THEN CASE WHEN `winner` IS NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner
        null for tie/NR", lambda x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692
        does not meet the constraint requirement!'
      level: warning
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "Valid result categories", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) = ''tie'' THEN CASE WHEN
        super_over IS NOT NULL AND trim(super_over) <> '''' THEN 1 ELSE 0 END ELSE
        1 END", "Super over present for ties", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` NOT IN (''runs'',''wickets'') OR
        (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`)) THEN
        1 ELSE 0 END", "winner_present_and_matches_team_for_decided", lambda x: x
        == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `result` NOT IN (''runs'',''wickets'')
        OR (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`)) THEN
        1 ELSE 0 END", "winner_present_and_matches_team_for_decided", lambda x: x
        == 1)'' failed on data sample: Value: 0.9455040871934605 does not meet the
        constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` != ''tie'' OR (`super_over` IS NOT
        NULL AND trim(`super_over`) <> '''') THEN 1 ELSE 0 END", "tie_has_super_over_info",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` NOT IN (''runs'',''wickets'') OR
        ((`result` = ''runs'' AND `result_margin` IS NOT NULL AND floor(`result_margin`)
        = `result_margin` AND `result_margin` >= 1 AND `result_margin` <= 200) OR
        (`result` = ''wickets'' AND `result_margin` IS NOT NULL AND floor(`result_margin`)
        = `result_margin` AND `result_margin` >= 1 AND `result_margin` <= 10)) THEN
        1 ELSE 0 END", "pos_impact_safe_via_result_margin", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
