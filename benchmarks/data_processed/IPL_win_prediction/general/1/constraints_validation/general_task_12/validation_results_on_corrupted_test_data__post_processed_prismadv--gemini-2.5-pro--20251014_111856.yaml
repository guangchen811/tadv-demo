results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss winner must be one of the two playing teams")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "Toss winner must be one of the two playing teams")'' failed on
        data sample: Value: 0.9618528610354223 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies("(`winner` IS NULL) OR (`winner` = `team1`) OR (`winner`
        = `team2`)", "Winner must be one of the two playing teams or NULL")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(`winner` IS NULL) OR (`winner`
        = `team1`) OR (`winner` = `team2`)", "Winner must be one of the two playing
        teams or NULL")'' failed on data sample: Value: 0.9455040871934605 does not
        meet the constraint requirement!'
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda x: x > 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR (result_margin
        IS NOT NULL AND result_margin = FLOOR(result_margin))", "result_margin must
        be a whole number for ''runs'' or ''wickets'' results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.satisfies("`target_runs` IS NULL OR `target_runs` % 1 == 0", "target_runs
        must be an integer or null", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("target_runs", lambda c: c > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isContainedIn("toss_decision", ["bat", "field"])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("toss_decision")
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn("super_over", ["Y", "N"])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_a_playing_team", lambda check: check == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "toss_winner_is_a_playing_team", lambda check: check == 1.0)''
        failed on data sample: Value: 0.9618528610354223 does not meet the constraint
        requirement!'
      level: error
  date:
    code:
    - suggestion: '.satisfies("to_date(`date`, ''yyyy-MM-dd'') IS NOT NULL", "is_parsable_date",
        lambda x: x > 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .isContainedIn("method", ["D/L"])
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "team1_is_not_team2", lambda x:
        x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`team1` <> `team2`", "team1_is_not_team2",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9918256130790191 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`result` = ''no result'' OR `winner` = `team1` OR `winner`
        = `team2`", "winner_is_a_participant", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`result` = ''no result'' OR `winner`
        = `team1` OR `winner` = `team2`", "winner_is_a_participant", lambda x: x ==
        1.0)'' failed on data sample: Value: 0.9455040871934605 does not meet the
        constraint requirement!'
      level: error
  '["date","id","team1","team2"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_participant", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "toss_winner_is_participant", lambda x: x == 1.0)'' failed on
        data sample: Value: 0.9618528610354223 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'', ''tie'')
        THEN `winner` = `team1` OR `winner` = `team2` ELSE TRUE END", "winner_is_participant_in_decisive_match",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `result` IN (''runs'',
        ''wickets'', ''tie'') THEN `winner` = `team1` OR `winner` = `team2` ELSE TRUE
        END", "winner_is_participant_in_decisive_match", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.9455040871934605 does not meet the constraint requirement!'
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("YEAR(date) = season", "YearFromDateMatchesSeason",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''season'', ''date'', ''team1'', ''team2''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'', ''tie'') OR winner
        IS NOT NULL", ''Winner must be present for decided matches'', assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        ''Winner must be one of the playing teams'', assertion=lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("winner IS NULL OR winner = team1
        OR winner = team2", ''Winner must be one of the playing teams'', assertion=lambda
        x: x == 1.0)'' failed on data sample: Value: 0.9455040871934605 does not meet
        the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isContainedIn("result", ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["method","target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("`method` IS NULL OR `method` != ''D/L'' OR (`target_runs`
        IS NOT NULL AND `target_overs` IS NOT NULL)", "D/L method requires target
        runs and overs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["player_of_match","result","result_margin","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN result_margin
        IS NOT NULL AND winner IS NOT NULL ELSE TRUE END", "result_margin and winner
        must be non-null for decided games", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner must be one of the two competing teams", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("winner IS NULL OR winner = team1
        OR winner = team2", "Winner must be one of the two competing teams", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.9455040871934605 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''tie'' AND super_over = ''Y'' THEN
        winner IS NOT NULL ELSE TRUE END", "A tie with a super over must have a winner",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN winner IS NULL
        AND result_margin IS NULL AND player_of_match IS NULL ELSE TRUE END", "winner,
        result_margin, and player_of_match should be null for no-result games", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over","winner"]':
    code:
    - suggestion: '.satisfies("(result IN (''runs'', ''wickets'', ''tie'') AND winner
        IS NOT NULL) OR (result = ''no result'' AND winner IS NULL)", "WinnerPresenceBasedOnResult",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result = ''tie'' AND super_over = ''Y'') OR (result
        <> ''tie'' AND super_over = ''N'')", "SuperOverLogic", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "WinnerIsOneOfCompetingTeams", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("winner IS NULL OR winner = team1
        OR winner = team2", "WinnerIsOneOfCompetingTeams", lambda x: x == 1)'' failed
        on data sample: Value: 0.9455040871934605 does not meet the constraint requirement!'
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_a_competing_team", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "toss_winner_is_a_competing_team", lambda x: x == 1)'' failed
        on data sample: Value: 0.9618528610354223 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_are_different", lambda
        x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`team1` <> `team2`", "teams_are_different",
        lambda x: x == 1)'' failed on data sample: Value: 0.9918256130790191 does
        not meet the constraint requirement!'
      level: error
