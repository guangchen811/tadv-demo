        same file (i.e., ''team2'' values belong to the known team vocabulary). Possible
        validations: Great Expectations expect_column_values_to_be_in_set(''team2'',
        value_set=distinct_values(''team1'')); Deequ satisfies("CASE WHEN team2 IN
