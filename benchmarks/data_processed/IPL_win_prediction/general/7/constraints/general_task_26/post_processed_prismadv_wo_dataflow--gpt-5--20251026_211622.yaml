        file: ''
      - start_line: 44
        end_line: 46
        file: ''
      uid: ed936e7c-61b9-4793-9ec0-4df8f9a994f1
    - text: 'For rows used in training (result in ''runs'', ''wickets'', ''tie''),
        target_overs must be strictly greater than 0 to avoid division-by-zero when
        computing target_run_rate. Example Deequ constraint: satisfies("CASE WHEN
        result IN (''runs'',''wickets'',''tie'') THEN CASE WHEN cast(target_overs
