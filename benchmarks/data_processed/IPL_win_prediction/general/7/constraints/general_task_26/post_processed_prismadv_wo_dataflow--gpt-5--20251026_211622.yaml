      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 37
        end_line: 37
        file: ''
      uid: 1d77337b-f6a3-4e3f-9454-c965dc65b4b9
    - text: 'The ''match_type'' column should remain low-cardinality (categorical);
        the number of distinct values should be <= 10. Deequ example: .hasNumberOfDistinctValues("match_type",
        lambda x: x <= 10)'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 37
        end_line: 37
        file: ''
      uid: c6b696a6-9a72-46fe-bcf5-fe82dcb7ab6a
    - text: 'To avoid silent mismatches due to whitespace, ''match_type'' values should
