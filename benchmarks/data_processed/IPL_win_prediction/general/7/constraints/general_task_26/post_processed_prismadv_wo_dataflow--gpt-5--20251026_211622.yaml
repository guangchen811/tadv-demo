      source_assumptions:
      - 3c19546b-27e5-4e10-8894-d8ea17a40f94
    assumptions:
    - text: 'The team1 column must be complete (no nulls) in the input data, since
        it is used directly in equality comparisons and passed through to output without
        any null handling. This can be validated as: Deequ hasCompleteness(''team1'',
        lambda v: v == 1.0) or Great Expectations expect_column_values_to_not_be_null(''team1'').'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 38
        end_line: 38
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      uid: c660d398-53cc-497c-aafc-ab8c692a2a1f
    - text: 'Team names in team1 must be canonically formatted so exact string equality
        works across columns (no leading/trailing whitespace and consistent casing).
        For example, validate that team1 = trim(team1) for all rows; and that when
        lower(toss_winner) = lower(team1), then toss_winner = team1 (case-sensitive)
        also holds. In Deequ: satisfies("team1 = trim(team1)", ..., lambda x: x ==
        1.0) and satisfies("CASE WHEN lower(toss_winner) = lower(team1) THEN toss_winner
        = team1 ELSE TRUE END", ..., lambda x: x == 1.0).'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      uid: 1b725169-4a07-4a4d-81be-cf082c81d88c
    - text: 'In each row, team1 and team2 should be different teams. This guards against
        degenerate matches and ensures derived features and labels are meaningful.
        In Deequ/GE: satisfies("team1 <> team2", "Distinct opponents", lambda x: x
        == 1.0) or expect_column_pair_values_A_to_not_equal_B(''team1'',''team2'').'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: 1dfeffab-c0e5-4659-8cd1-e14b3c8cfe64
    - text: 'For rows used in training (result in {''runs'',''wickets''}), the winner
        must be either team1 or team2. This ensures the label (winner == team1) is
        valid. In Deequ: satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN
        (winner = team1 OR winner = team2) ELSE TRUE END", "Winner among participants",
        lambda x: x == 1.0).'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: a4fe6212-48d3-434c-8ded-ce895cdeec0d
    - text: 'The domain of team1 should be bounded and consistent with historical
        data (~19 distinct teams). To detect unexpected new or noisy categories, cap
        distinct count, e.g., approximate distinct values for team1 <= 32. In Deequ:
        hasApproximateNumDistinctValues(''team1'', lambda d: d <= 32).'
      sources:
      - start_line: 38
        end_line: 38
        file: ''
      uid: 3c19546b-27e5-4e10-8894-d8ea17a40f94
  team2:
