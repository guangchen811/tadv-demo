        and expect_column_values_to_not_match_regex(''team2'', ''^\s*$'').'
      sources:
      - start_line: 34
        end_line: 45
        file: ''
      - start_line: 39
        end_line: 39
        file: ''
      uid: ceff988d-5fd9-454c-8559-8024bb7568ca
    - text: 'The ''team2'' column should have a bounded, stable number of distinct
        categories since it is used as a categorical feature. Based on current data
        (about 19 distinct values), the unique count should be between 10 and 40.
        Possible validations: Deequ hasNumberOfDistinctValuesBetween(''team2'', 10,
        40); Great Expectations expect_column_unique_value_count_to_be_between(''team2'',
