      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 45
        end_line: 45
        file: ''
      uid: e4099021-9ba3-449a-a494-39cfdc770bf8
    - text: 'For rows used in training (result in ''runs'', ''wickets'', ''tie''),
        target_overs should be at most 20, so that revised_overs_shortfall = 20.0
        - target_overs is not negative. Example constraint: satisfies("CASE WHEN result
        IN (''runs'',''wickets'',''tie'') THEN CASE WHEN cast(target_overs AS DOUBLE)
        <= 20 THEN 1 ELSE 0 END ELSE 1 END", ''target_overs <= 20 for training rows'',
        lambda x: x == 1).'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: fdf36106-3a04-455c-aa30-23d0a77b8934
    - text: 'In the overall input, only a small fraction of target_overs values may
        be missing or non-numeric; at least 99% should be parseable as numbers (post-coercion
