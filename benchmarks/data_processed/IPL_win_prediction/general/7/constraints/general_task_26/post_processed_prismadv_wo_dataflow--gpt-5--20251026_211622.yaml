        \ then winner is null (no team is the winner). This can be represented as\
        \ Deequ-style constraints: .where(\"result IN ('runs','wickets')\").satisfies(\"\
        winner IS NOT NULL AND (winner = team1 OR winner = team2)\", \"winner_in_teams_for_decisive_results\"\
        ) and .where(\"result = 'tie'\").satisfies(\"winner IS NULL\", \"no_winner_on_tie\"\
        )."
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: ca4cdd92-de5d-4d82-b631-dca5dcfd8cf1
    - text: "Result\u2013margin coherence: The semantics of result_margin depend on\
        \ result. If result == 'runs', result_margin must be a positive number (>\
        \ 0). If result == 'wickets', result_margin must be an integer in [1, 10].\
        \ If result == 'tie', result_margin must be null or 0. Deequ-style: .where(\"\
        result = 'runs'\").satisfies(\"result_margin IS NOT NULL AND result_margin\
        \ > 0\", \"runs_margin_positive\") and .where(\"result = 'wickets'\").satisfies(\"\
        result_margin IS NOT NULL AND result_margin >= 1 AND result_margin <= 10\"\
        , \"wickets_margin_range\") and .where(\"result = 'tie'\").satisfies(\"result_margin\
        \ IS NULL OR result_margin = 0\", \"tie_zero_margin\")."
      sources:
      - start_line: 47
        end_line: 49
        file: ''
      uid: 3da5a01c-f609-44f1-b99f-302b3e305ac7
    - text: 'Division safety for target_run_rate: Whenever target_runs is not null,
        target_overs must be not null and strictly greater than 0 (to avoid division
        by zero/NaN in target_runs / target_overs). Optionally, enforce co-nullness:
        target_runs is null iff target_overs is null. Deequ-style: .implies("target_runs
        IS NOT NULL", "target_overs IS NOT NULL AND target_overs > 0") and .satisfies("(target_runs
        IS NULL) = (target_overs IS NULL)", "dl_targets_co_null").'
      sources:
      - start_line: 43
        end_line: 46
        file: ''
      uid: 44e69c59-e5e8-4b1a-be52-db542efa0b33
    - text: "Toss winner must be one of the two competing teams: toss_winner \u2208\
        \ {team1, team2}. Deequ-style: .satisfies(\"toss_winner = team1 OR toss_winner\
        \ = team2\", \"toss_winner_in_competing_teams\")."
      sources:
      - start_line: 38
        end_line: 40
        file: ''
      uid: 291658ed-8b4a-4eec-a451-13f2aa71ef57
    - text: 'Competing teams are distinct: team1 != team2 for all rows. Deequ-style:
        .satisfies("team1 <> team2", "teams_are_distinct").'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: e0de8745-7c78-4461-b8fc-534bd193d578
    - text: "Season\u2013date coherence: The parsed match date's calendar year must\
        \ equal the numeric season used downstream (season_int = year(date_dt)). Deequ-style:\
        \ .satisfies(\"year(date_dt) = season_int\", \"season_matches_date_year\"\
        )."
      sources:
      - start_line: 20
        end_line: 21
        file: ''
      - start_line: 25
        end_line: 27
        file: ''
      uid: 41e6111c-ac79-4dbe-8e1b-d73bc24f35cc
  '["target_overs","target_runs"]':
    code: []
    assumptions:
    - text: "In the training subset (rows where result \u2208 {'runs','wickets','tie'}),\
        \ both target_runs and target_overs must be non-null with target_overs > 0\
        \ and target_runs \u2265 0, so that target_run_rate = target_runs / target_overs\
        \ is well-defined (finite and non-NaN). Basis for Deequ: hasCompleteness('target_runs',\
        \ 1.0, predicate=\"result IN ('runs','wickets','tie')\"), hasCompleteness('target_overs',\
        \ 1.0, predicate=...), satisfies('target_overs > 0', assertion=1.0, predicate=...),\
        \ satisfies('target_runs >= 0', assertion=1.0, predicate=...)."
      sources:
      - start_line: 27
        end_line: 29
        file: ''
      - start_line: 43
        end_line: 46
        file: ''
      uid: 8d936c4e-0449-4a99-b6b1-15028ccdea71
    - text: "Within the training subset, revised_overs_shortfall must equal 20.0 -\
        \ target_overs and be \u2265 0 (implying target_overs \u2264 20). Basis for\
        \ Deequ: satisfies('abs((20.0 - target_overs) - revised_overs_shortfall) <\
        \ 1e-9', assertion=1.0, predicate=\"result IN ('runs','wickets','tie')\"),\
        \ satisfies('revised_overs_shortfall >= 0', assertion=1.0, predicate=...)."
      sources:
      - start_line: 27
        end_line: 29
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: f2c1e267-b623-4be2-b106-fce18bb76bbc
    - text: 'winner must always be either team1 or team2; otherwise the binary label
        (winner == team1) is invalid. Basis for Deequ: satisfies(''(winner = team1)
        OR (winner = team2)'', assertion=1.0, predicate="result IN (''runs'',''wickets'',''tie'')").'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: 044cbdb7-8016-4609-b09e-7782aa577511
    - text: 'toss_winner must be either team1 or team2 (so toss_winner_is_team1 is
        meaningful and not silently 0 for invalid values). Basis for Deequ: satisfies(''(toss_winner
        = team1) OR (toss_winner = team2)'', assertion=1.0).'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: e1c6488c-0121-4735-8f4a-347864922a14
    - text: 'Result-specific margin rules: If result=''runs'' then result_margin must
        be a positive number; if result=''wickets'' then result_margin must be an
        integer in [1,10]; if result=''tie'' then result_margin must be 0 or null.
        Basis for Deequ: satisfies("(result = ''runs'') => result_margin > 0"), satisfies("(result
        = ''wickets'') => (result_margin IS NOT NULL AND result_margin = CAST(result_margin
        AS INT) AND result_margin BETWEEN 1 AND 10)"), satisfies("(result = ''tie'')
        => (result_margin IS NULL OR result_margin = 0)").'
      sources:
      - start_line: 27
        end_line: 29
        file: ''
      - start_line: 47
        end_line: 49
        file: ''
      uid: f000776e-07de-4426-ace0-31c7da212bfe
  '["team1","team2"]':
    code: []
    assumptions:
    - text: 'Each match row must have two distinct teams: team1 != team2. This can
        be enforced with a Deequ constraint like: .satisfies("team1 != team2", "team1_ne_team2").'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: c0236a5d-ba8c-47f8-ad7b-7989f91885a6
    - text: "The toss winner must be one of the two teams playing the match: toss_winner\
        \ \u2208 {team1, team2}. This can be enforced with a Deequ constraint like:\
        \ .satisfies(\"(toss_winner = team1) OR (toss_winner = team2)\", \"toss_winner_in_competing_teams\"\
        )."
      sources:
      - start_line: 38
        end_line: 40
        file: ''
      uid: d268e99e-cc5f-4660-9309-a6e62b284121
    - text: 'For decisive results (result in [''runs'',''wickets'']), the winner must
        be exactly one of the two teams (i.e., winner equals team1 XOR team2). This
        can be enforced with a Deequ constraint like: .satisfies("( (result IN (''runs'',''wickets''))
        AND ( (winner = team1 AND winner != team2) OR (winner = team2 AND winner !=
        team1) ) ) OR (result NOT IN (''runs'',''wickets''))", "winner_matches_exactly_one_team_for_decisive_results").'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: 14787312-7b48-4286-8dd3-1c39495858cc
  '["team1","team2","toss_winner"]':
    code: []
    assumptions:
    - text: 'For every record, toss_winner must be one of the two competing teams:
        either equal to team1 or equal to team2. This can be enforced with a Deequ
        row-level constraint such as: satisfies("toss_winner = team1 OR toss_winner
        = team2", "toss_winner_in_competing_teams", 1.0).'
      sources:
      - start_line: 38
        end_line: 40
        file: ''
      uid: e06da945-fee8-48b8-ad44-684e50a16357
    - text: 'For every record, the two competing teams must be different: team1 !=
        team2. This can be enforced with a Deequ row-level constraint: satisfies("team1
        != team2", "distinct_competing_teams", 1.0).'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: 906344ff-f134-4128-b259-c59fa74b03cb
    - text: 'For rows included in the training set (result in [''runs'',''wickets'',''tie'']),
        the winner must be one of the competing teams: winner equals team1 or team2.
        This can be enforced with a conditional Deequ constraint: satisfies("NOT(result
        IN (''runs'',''wickets'',''tie'')) OR (winner = team1 OR winner = team2)",
        "winner_is_one_of_competing_teams_when_decisive", 1.0).'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      uid: 9cf4f154-5fa0-4b1c-9f56-266640b89674
  '["team1","team2","winner"]':
    code: []
    assumptions:
    - text: 'For matches with decisive results (result in [''runs'',''wickets'']),
        the ''winner'' must be non-null and must equal either ''team1'' or ''team2''.
        This can be enforced with Deequ as: .where("result IN (''runs'',''wickets'')").isComplete(''winner'')
        and .where("result IN (''runs'',''wickets'')").satisfies("winner = team1 OR
        winner = team2", "winner_is_one_of_teams", lambda v: v == 1.0).'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      uid: ff42e63f-09cf-457e-849b-f0cd0318ed55
    - text: 'For matches recorded as a tie (result == ''tie''), ''winner'' should
        not be one of the teams on the field (and may be null). A Deequ check could
        be: .where("result = ''tie''").satisfies("winner IS NULL OR (winner != team1
        AND winner != team2)", "tie_has_no_winner", lambda v: v == 1.0).'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      uid: 5f60e508-2085-44ce-b5a1-06dda21f8ab0
    - text: 'Each record should have two distinct opponents: ''team1'' must not equal
        ''team2''. This can be enforced with Deequ: .satisfies("team1 != team2", "distinct_opponents",
        lambda v: v == 1.0).'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: 92162aed-66eb-4b92-9f12-14df5818eca9
    - text: 'String values for ''winner'', ''team1'', and ''team2'' must be consistently
        formatted so that direct equality comparisons are valid (no case differences
        or extra whitespace). To enforce this, either normalize inputs or validate
        with: .satisfies("lower(trim(winner)) = lower(trim(team1)) OR lower(trim(winner))
        = lower(trim(team2))", "winner_string_consistency", lambda v: v == 1.0) for
        decisive results (add same ''where'' clause as above).'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      uid: 5d3002f5-de4e-45c8-84d0-ef8877abd827
  '["team1","toss_winner"]':
    code: []
    assumptions:
    - text: "For every row, toss_winner must be one of the two teams playing that\
        \ match: toss_winner \u2208 {team1, team2}. This ensures the derived feature\
        \ toss_winner_is_team1 is meaningful. Deequ: .satisfies(\"toss_winner = team1\
        \ OR toss_winner = team2\", \"toss_winner_within_match_teams\")"
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      uid: c7611512-0a9c-4dd2-9181-39c0f6672edb
    - text: 'For decisive outcomes used for training (result in {''runs'',''wickets''}),
        winner must be either team1 or team2 for that row. For ties, winner should
        be null or not equal to either team. Deequ: .satisfies("CASE WHEN result IN
        (''runs'',''wickets'') THEN (winner = team1 OR winner = team2) ELSE true END",
        "winner_valid_given_result")'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      uid: a0d1d1a9-83f1-4c07-b22b-150338014211
    - text: 'The two teams in a match must be different: team1 != team2. Deequ: .satisfies("team1
        <> team2", "teams_are_distinct")'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: da8922fb-b3a7-4168-8ae6-c6ca03ad8238
    - text: 'To avoid invalid target_run_rate, whenever target_runs is present, target_overs
        must be present and strictly greater than 0 (no division by zero). Deequ:
        .satisfies("target_runs IS NULL OR target_overs > 0", "valid_denominator_for_run_rate")'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      uid: 40de8071-9ca9-4891-8652-94bc7fb52351
    - text: 'result and result_margin must be consistent: if result = ''runs'' then
        result_margin > 0; if result = ''wickets'' then result_margin > 0; if result
        = ''tie'' then result_margin is null or 0. Deequ: .satisfies("CASE WHEN result
        = ''runs'' THEN result_margin > 0 WHEN result = ''wickets'' THEN result_margin
        > 0 WHEN result = ''tie'' THEN (result_margin IS NULL OR result_margin = 0)
        ELSE true END", "result_margin_consistency")'
      sources:
      - start_line: 28
        end_line: 28
        file: ''
      - start_line: 47
        end_line: 49
        file: ''
      uid: 37e02efe-8fcd-467c-929b-1fb710b6511a
  '["team1","winner"]':
    code: []
    assumptions:
    - text: 'For all rows used in training (result in {''runs'',''wickets'',''tie''}),
        the ''winner'' must be one of the two competing teams in that row: winner
        == team1 OR winner == team2, with exact string match. Deequ example: .satisfies("NOT(result
        IN (''runs'',''wickets'',''tie'')) OR (winner = team1 OR winner = team2)",
        "winner_is_competing_team", lambda v: v == 1.0)'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: 0fc284ec-6577-4924-9a7e-6d4e63cc55cf
    - text: 'Among rows used in training (result in {''runs'',''wickets'',''tie''}),
        ''winner'' must be non-null to make the label (winner == team1) meaningful.
        Deequ example: .satisfies("NOT(result IN (''runs'',''wickets'',''tie'')) OR
        winner IS NOT NULL", "winner_not_null_for_train", lambda v: v == 1.0)'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      uid: c199c1b8-8bb3-416b-b190-bd9d2b1def2a
    - text: 'Team identifiers must be standardized so that an actual team1 win is
        captured by exact equality (case/spacing) to ''winner''. Practically: lower(winner)
        equals lower(team1) or lower(team2) when that team wins. Deequ example: .satisfies("(winner
        IS NULL) OR (lower(winner) = lower(team1) OR lower(winner) = lower(team2))",
        "winner_name_standardization", lambda v: v == 1.0)'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: 61f69d7e-cf54-4957-aeb4-247065092281
    - text: 'The toss winner must be one of the two competing teams in that row. Deequ
        example: .satisfies("toss_winner IS NULL OR toss_winner = team1 OR toss_winner
        = team2", "toss_winner_within_competing_teams", lambda v: v == 1.0)'
      sources:
      - start_line: 38
        end_line: 40
        file: ''
      uid: a4f826d0-b6f8-41ba-aa2f-e36af642d8a6
    - text: 'To avoid invalid divisions in target_run_rate, whenever target_runs is
        present, target_overs must be > 0 and <= 20 (T20 constraint). Deequ example:
        .satisfies("(target_runs IS NULL) OR (target_overs > 0 AND target_overs <=
        20)", "valid_target_overs_when_runs_present", lambda v: v == 1.0)'
      sources:
      - start_line: 43
        end_line: 46
        file: ''
      uid: 3f373363-9136-4a75-bd03-ffe4b1b1b61f
    - text: 'Result and margin must be consistent: if result = ''runs'' then result_margin
        > 0; if result = ''wickets'' then result_margin is an integer between 1 and
        10. Deequ examples: .satisfies("NOT(result = ''runs'') OR (result_margin >
        0)", "runs_result_has_positive_margin", lambda v: v == 1.0) and .satisfies("NOT(result
        = ''wickets'') OR (result_margin >= 1 AND result_margin <= 10)", "wickets_result_margin_range",
        lambda v: v == 1.0)'
      sources:
      - start_line: 47
        end_line: 49
        file: ''
      uid: e01d673d-b29b-4c1d-b24c-3e5bc25c5faf
    - text: 'If a row is kept in training with result = ''tie'', it must have a decisive
        winner recorded (e.g., super over), so winner is one of {team1, team2}. Deequ
        example: .satisfies("NOT(result = ''tie'') OR (winner = team1 OR winner =
        team2)", "tie_rows_have_decisive_winner", lambda v: v == 1.0)'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 38
        end_line: 42
        file: ''
      uid: 0ce695bd-44a0-44d3-93b7-a8907ff55a6f
    - text: 'The two competing teams must be different within a row (no team plays
        itself). Deequ example: .satisfies("team1 <> team2", "teams_are_distinct",
        lambda v: v == 1.0)'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: 7f0d3ccf-3780-4af1-9a20-8e4e76512bc7
  '["toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_match_team", lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 03872c54-6b4f-490a-9135-6ff89c4e0d6f
      source_assumptions:
      - 4f39ade5-8e5b-452c-96fc-43db912d00f2
    assumptions:
    - text: 'For every row, the toss_winner must be one of the two participating teams
        in that row (team1 or team2). This can be enforced with a row-level constraint
        such as Deequ Satisfies: Satisfies("toss_winner = team1 OR toss_winner = team2",
        "toss_winner_is_match_team").'
      sources:
      - start_line: 38
        end_line: 40
        file: ''
      uid: 4f39ade5-8e5b-452c-96fc-43db912d00f2
    - text: 'Within a given match (id), toss_winner and toss_decision are functionally
        determined and must be consistent across all rows with the same id (no conflicting
        values). This can be expressed as a functional dependency: hasFunctionalDependency("id",
        ["toss_winner", "toss_decision"]).'
      sources:
      - start_line: 35
        end_line: 41
        file: ''
      uid: 26148629-1c64-4484-93d9-d8e3a7ee33e1
    - text: 'For rows used in training where the result indicates a decisive outcome
        (result in {"runs", "wickets"}), the winner must be equal to either team1
        or team2 and not null. This can be encoded as: Satisfies("(result IN (''runs'',''wickets''))
        AND (winner IS NOT NULL) AND (winner = team1 OR winner = team2)", "winner_is_one_of_match_teams_on_decisive_results").'
      sources:
      - start_line: 27
        end_line: 31
        file: ''
      uid: f36c5455-c511-4d8e-8de3-7f9c5b9b862e
