fixing_results:
  result_margin:
    75853dad-9d37-4b04-b191-088336a9a6b1: '.hasUniqueness([''id''], lambda x: x ==
      1.0)'
  '["method","result"]':
    2703c384-6a13-4706-8f45-3880cb2fa209: '.satisfies("toss_winner = team1 OR toss_winner
      = team2", "Toss winner must be a participating team", lambda x: x == 1.0)'
  '["result","result_margin"]':
    de92695b-904b-410f-9bcb-05df0ff3435a: '.satisfies("CASE WHEN result IN (''runs'',
      ''wickets'') THEN result_margin IS NOT NULL AND result_margin > 0 WHEN result
      IN (''tie'', ''no result'') THEN result_margin IS NULL OR result_margin = 0
      ELSE TRUE END", "Result Margin Validity", lambda x: x == 1.0)'
    fc1f1897-939c-4a23-b3ac-5ee8c2f1d627: .satisfies("CASE WHEN result = 'tie' THEN
      super_over RLIKE '^Y$|^NAN$|^N$|^$' ELSE TRUE END", "super_over_pattern_when_result_is_tie")
  '["result","result_margin","super_over","winner"]':
    fc8f0bfb-6495-409f-b420-1f8134e18682: '.satisfies("CASE WHEN (result = ''no result''
      OR result = ''tie'') THEN (CASE WHEN winner IS NULL OR winner = '''' THEN 1
      ELSE 0 END) WHEN (result = ''runs'' OR result = ''wickets'') THEN (CASE WHEN
      winner IS NOT NULL AND winner != '''' THEN 1 ELSE 0 END) ELSE 1 END", "Winner
      Column Validity based on Result", lambda x: x >= 0.99)'
    11dab812-faa0-44fe-85ab-25316338ae99: '.satisfies("CASE WHEN (result = ''tie''
      OR result = ''no result'') THEN (CASE WHEN result_margin IS NULL THEN 1 ELSE
      0 END) WHEN (result = ''runs'' OR result = ''wickets'') THEN (CASE WHEN result_margin
      IS NOT NULL AND result_margin > 0 THEN 1 ELSE 0 END) ELSE 1 END", "Result Margin
      Validity based on Result", lambda x: x == 1.0)'
  '["result","super_over"]':
    05f20b6a-8684-4b1b-ada7-3ab2ff50375f: '.satisfies("CASE WHEN result_margin IS
      NULL OR result IN (''runs'', ''wickets'') THEN 1 ELSE 0 END", "Result Margin
      Implies Win Type", lambda x: x == 1)'
