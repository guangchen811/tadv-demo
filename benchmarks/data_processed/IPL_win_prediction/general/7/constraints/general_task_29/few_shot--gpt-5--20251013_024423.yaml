constraints:
  city:
    code:
    - - '.satisfies("CASE WHEN super_over = ''Y'' THEN city IS NOT NULL ELSE TRUE
        END", ''city_present_for_super_over'', lambda d: d == 1.0)'
      - Valid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - '.hasCompleteness(''player_of_match'', lambda x: x >= 0.99)'
      - Valid
    - - '.satisfies("CASE WHEN super_over = ''Y'' THEN player_of_match IS NOT NULL
        ELSE TRUE END", ''pom_present_for_super_over'', lambda d: d == 1.0)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL ELSE TRUE END", ''margin_present_for_runs_or_wickets'', lambda
        d: d == 1.0)'
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  venue:
    code:
    - - '.satisfies("CASE WHEN super_over = ''Y'' THEN venue IS NOT NULL ELSE TRUE
        END", ''venue_present_for_super_over'', lambda d: d == 1.0)'
      - Valid
    assumptions: []
  winner:
    code:
    - - '.satisfies("CASE WHEN result <> ''no result'' THEN winner IS NOT NULL ELSE
        TRUE END", ''winner_not_null_when_played'', lambda d: d == 1.0)'
      - Valid
    - - '.satisfies("winner = team1 OR winner = team2", ''winner_is_one_of_teams'',
        lambda d: d == 1.0)'
      - Invalid
    assumptions: []
