results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("LENGTH(TRIM(`team1`)) > 0", "team1_not_empty_or_blank")
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`team2` = TRIM(`team2`) ", "team2 should not have leading
        or trailing whitespace")
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete("match_type")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("match_type", ["League", "Qualifier 1", "Final",
        "Qualifier 2", "Eliminator", "Semi Final", "Elimination Final"])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies(''`target_overs` IS NULL OR (`target_overs` > 0 AND
        `target_overs` <= 20)'', ''target_overs should be positive and not exceed
        20'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete("toss_decision")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("toss_decision", ["bat", "field"])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete("super_over")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("super_over", ["Y", "N"])
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: .isComplete("toss_winner")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_a_competing_team", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("to_date(`date`) IS NOT NULL", "is_parseable_date",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("date")
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: error
  '["date","id","team1","team2"]':
    code:
    - suggestion: '.satisfies(''team1 <> team2'', ''teams_are_distinct'', lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''team1'', ''team2'', ''date''], lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("year(to_date(`date`)) = `season`", "DateYearShouldMatchSeason",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("NOT (result IN (''runs'', ''wickets'', ''tie'')) OR
        winner IS NOT NULL", "Winner must be present for decisive results", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner must be one of the participating teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn("result", ["runs", "wickets", "tie"], assertion=lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR result_margin
        IS NOT NULL", "result_margin should be complete for decisive results", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("(`super_over` = ''Y'' AND `result` = ''tie'') OR (`super_over`
        = ''N'' AND `result` != ''tie'')", "super_over_iff_tie", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(`super_over` = ''Y'' AND `result`
        = ''tie'') OR (`super_over` = ''N'' AND `result` != ''tie'')", "super_over_iff_tie",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.4822888283378747 does
        not meet the constraint requirement!'
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("NOT (result IN (''runs'', ''wickets'', ''tie'')) OR
        (winner = team1 OR winner = team2)", "winner_must_be_participant_in_decisive_match",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "teams_must_be_different", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("`target_overs` IS NULL OR `target_overs` <> 0", "target_overs_not_zero",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`target_runs` IS NULL AND `target_overs` IS NULL)
        OR (`target_runs` IS NOT NULL AND `target_overs` IS NOT NULL)", "mutual_completeness_target_runs_overs",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss winner must be one of the competing teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "A team cannot play against itself",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
