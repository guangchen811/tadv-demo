results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.satisfies("CASE WHEN `super_over` IN (''Y'', ''N'') THEN 1 ELSE
        0 END", "Valid Super Over Values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: undefined
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('toss_winner IN (team1, team2)', 'Toss Winner Validity')
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies(''CASE WHEN `method` IS NULL THEN 1 ELSE 0 END'', ''Acceptable
        Null Method Values'', lambda x: x >= 0.974)'
      status: true
      reason_if_failed: ''
      level: undefined
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''id''], lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["denom","points","result"]':
    code:
    - suggestion: .satisfies('result IN ("tie", "runs", "wickets", "no result")',
        'Valid Result Values')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies(''CASE WHEN `winner` IS NOT NULL THEN 1 ELSE 0 END'',
        ''Non-null Winner'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN `winner` IS NOT NULL
        THEN 1 ELSE 0 END'', ''Non-null Winner'', lambda x: x >= 0.998)'' failed on
        data sample: Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["id","team1","team2"]':
    code:
    - suggestion: '.hasUniqueness([''team1'', ''team2'', ''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["match_type","matches","team","toss_decision","win_points","win_rate"]':
    code:
    - suggestion: .satisfies('team1 IS NOT NULL AND team2 IS NOT NULL AND toss_winner
        IS NOT NULL', 'Non-null team1, team2, and toss_winner')
      status: true
      reason_if_failed: ''
      level: warning
  '["opponent","team","toss_made_by_team","toss_winner"]':
    code:
    - suggestion: .satisfies('(team1 = toss_winner OR team2 = toss_winner)', 'Toss
        Made By Team Consistency')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.haveAnyCompleteness([''result'', ''super_over''], lambda x: x
        > 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: '.haveCompleteness([''result'', ''result_margin''], lambda x: x
        >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.haveCompleteness([''result'', ''result_margin''],
        lambda x: x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''CASE WHEN result IN ("tie", "runs", "wickets", "no
        result") THEN 1 ELSE 0 END'', ''Valid Result Values'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies(''CASE WHEN result = "tie" THEN super_over = "Y" ELSE
        super_over = "N" END'', ''Consistent Result and Super Over'', lambda x: x
        == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN result = "tie" THEN super_over
        = "Y" ELSE super_over = "N" END'', ''Consistent Result and Super Over'', lambda
        x: x == 1)'' failed on data sample: Value: 0.4822888283378747 does not meet
        the constraint requirement!'
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.haveCompleteness([''team1'', ''team2''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''winner''], lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.haveCompleteness([''winner''], lambda x: x
        >= 0.998)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: .satisfies('CASE WHEN result IN ("runs", "wickets") THEN result_margin
        IS NOT NULL ELSE TRUE END', 'Result Margin Completeness')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('super_over IN ("Y", "N")', 'Super Over Format')
      status: true
      reason_if_failed: ''
      level: warning
