results:
  team1:
    code:
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' THEN CASE WHEN winner
        = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END", ''WinnerIsOneOfTeams'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 = trim(team1) AND length(trim(team1)) > 0", ''Team1TrimmedNonEmpty'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: '.satisfies(''length(trim(`team2`)) > 0'', ''Non-empty team2'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`team2` <> `team1`'', ''Distinct teams per match'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasNumberOfDistinctValues(''team2'', lambda n: n <= 25, binningUdf=None,
        maxBins=None)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: '.hasCompleteness(''match_type'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Final', 'Eliminator', 'Qualifier
        1', 'Qualifier 2', 'Semi Final', 'Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("trim(match_type) = match_type", "No leading/trailing
        whitespace in match_type", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(lower(match_type) != ''league'') OR (match_type =
        ''League'')", "Exact casing for League", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("match_type = ''League''", "At least one League row
        exists", lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN (target_overs IS NOT
        NULL AND target_runs IS NOT NULL) ELSE TRUE END", "DLS target fields present",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' AND target_overs IS NOT
        NULL THEN target_overs > 0 ELSE TRUE END", "DLS target_overs positive", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' AND target_overs IS NOT
        NULL THEN CAST(target_overs AS DOUBLE) = FLOOR(CAST(target_overs AS DOUBLE))
        ELSE TRUE END", "DLS overs mostly whole", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("(NOT (result IN (''runs'',''wickets''))) OR (CAST(result_margin
        AS DOUBLE) IS NOT NULL AND CAST(result_margin AS DOUBLE) = CAST(CAST(result_margin
        AS DOUBLE) AS BIGINT))", "result_margin integer-like for decided results",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(NOT (result IN (''runs'',''wickets''))) OR (CAST(result_margin
        AS DOUBLE) > 0)", "result_margin positive for decided results", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(NOT (result IN (''tie'',''no result''))) OR (result_margin
        IS NULL)", "result_margin null when not decided by runs/wickets", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN target_runs IS NOT
        NULL ELSE TRUE END", "target_runs present for D/L", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' AND target_runs IS NOT NULL
        THEN target_runs = CAST(target_runs AS BIGINT) ELSE TRUE END", "target_runs
        integer-like for D/L", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' AND target_runs IS NOT NULL
        THEN target_runs >= 1 ELSE TRUE END", "target_runs positive for D/L", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN target_runs IS NOT NULL THEN CAST(target_runs
        AS DOUBLE) IS NOT NULL ELSE TRUE END", "target_runs parseable as numeric when
        present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.satisfies("CASE WHEN `super_over` IN (''Y'',''N'') THEN 1 ELSE
        0 END", "Valid super_over values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN `result`
        = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "Super over implies tie", lambda
        x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `super_over` = ''Y'' THEN
        CASE WHEN `result` = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "Super over implies
        tie", lambda x: x == 1)'' failed on data sample: Value: 0.48501362397820164
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN `winner`
        IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN 1 ELSE 0 END
        ELSE 1 END", "Winner present and valid for super over", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `super_over` = ''Y'' THEN
        CASE WHEN `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`)
        THEN 1 ELSE 0 END ELSE 1 END", "Winner present and valid for super over",
        lambda x: x == 1)'' failed on data sample: Value: 0.997275204359673 does not
        meet the constraint requirement!'
      level: warning
  date:
    code:
    - suggestion: '.hasCompleteness(''date'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''to_timestamp(`date`) IS NOT NULL'', ''date_parseable_95pct'',
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''to_timestamp(`date`) IS NULL OR (hour(to_timestamp(`date`))
        = 0 AND minute(to_timestamp(`date`)) = 0 AND second(to_timestamp(`date`))
        = 0)'', ''date_is_day_level'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.satisfies(''cast(season as double) = cast(cast(season as double)
        as int)'', ''Season whole number'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''season'', lambda d: d > 0 and d <= 100)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("(`method` IS NULL) OR (`method` IS NOT NULL)", "method
        column exists", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`method` IS NULL) OR (`method` = ''D/L'')", "Method
        must be ''D/L'' when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN (`target_runs` IS
        NOT NULL AND `target_overs` IS NOT NULL AND CAST(`target_runs` AS DOUBLE)
        >= 0 AND CAST(`target_overs` AS DOUBLE) > 0) ELSE true END", "D/L rows have
        valid targets", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: '.hasCompleteness(''id'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: warning
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''length(trim(venue)) BETWEEN 1 AND 100'', ''Venue trimmed
        length 1-100'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''venue'', lambda x: x >= 1 and x <= 100)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' THEN CASE WHEN winner
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner present when result exists",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NOT NULL THEN CASE WHEN winner
        = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END", "Winner must be one
        of the fixture teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN CASE WHEN winner
        IS NULL THEN 1 ELSE 0 END ELSE 1 END", "No winner for no result matches",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''tie'' AND super_over = ''Y'' THEN
        CASE WHEN winner IS NOT NULL AND (winner = team1 OR winner = team2) THEN 1
        ELSE 0 END ELSE 1 END", "Winner required for Super Over ties", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result <> ''no
        result'' THEN CASE WHEN winner IS NOT NULL AND (winner = team1 OR winner =
        team2) THEN 1 ELSE 0 END ELSE 1 END", "Winner valid for decisive League matches",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN result_margin IS NOT NULL AND CAST(result_margin AS INT) >= 1 THEN 1
        ELSE 0 END ELSE 1 END", "Margin present and positive for decisive results",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN super_over = ''Y'' THEN CASE WHEN result
        = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "Super Over only when match tied",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN super_over = ''Y'' THEN
        CASE WHEN result = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "Super Over only
        when match tied", lambda x: x == 1.0)'' failed on data sample: Value: 0.48501362397820164
        does not meet the constraint requirement!'
      level: warning
  '["result","winner"]':
    code:
    - suggestion: .satisfies("(result NOT IN ('runs','wickets')) OR (winner IS NOT
        NULL AND (winner = team1 OR winner = team2) AND result_margin IS NOT NULL
        AND CAST(result_margin AS DOUBLE) > 0)", 'decisive_result_requires_winner_and_positive_margin')
      status: true
      reason_if_failed: ''
      level: error
