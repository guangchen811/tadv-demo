results:
  date:
    code:
    - suggestion: .hasPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .hasDataType('id', ConstrainableDataTypes.Integral)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''id'', ConstrainableDataTypes.Integral)'
      level: error
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result != ''tie'' OR super_over = ''Y''", ''tie_requires_super_over'',
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("result != ''tie'' OR super_over
        = ''Y''", ''tie_requires_super_over'', lambda v: v == 1.0)'' failed on data
        sample: Value: 0.997275204359673 does not meet the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .hasDataType('result_margin', ConstrainableDataTypes.Numeric)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''result_margin'',
        ConstrainableDataTypes.Numeric)'
      level: error
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result != ''runs'' OR result_margin >= 1", ''run_margin_positive_if_runs'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result != ''wickets'' OR (result_margin >= 1 AND result_margin
        <= 10)", ''wicket_margin_between_1_and_10'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result IN (''runs'',''wickets'') OR result_margin IS
        NULL", ''margin_null_if_not_decided'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', ConstrainableDataTypes.Integral)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''season'', ConstrainableDataTypes.Integral)'
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'',''wickets'') OR (winner = team1
        OR winner = team2)", ''winner_matches_one_team_if_decided'', lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result NOT IN (''runs'',''wickets'') OR winner IS NOT
        NULL", ''winner_present_if_decided'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
