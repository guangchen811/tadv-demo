results:
  city:
    code:
    - suggestion: '.satisfies("CASE WHEN super_over = ''Y'' THEN city IS NOT NULL
        ELSE TRUE END", ''city_present_for_super_over'', lambda d: d == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN super_over = ''Y'' THEN
        city IS NOT NULL ELSE TRUE END", ''city_present_for_super_over'', lambda d:
        d == 1.0)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''player_of_match'', lambda
        x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN super_over = ''Y'' THEN player_of_match IS
        NOT NULL ELSE TRUE END", ''pom_present_for_super_over'', lambda d: d == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN super_over = ''Y'' THEN
        player_of_match IS NOT NULL ELSE TRUE END", ''pom_present_for_super_over'',
        lambda d: d == 1.0)'' failed on data sample: Value: 0.997275204359673 does
        not meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL ELSE TRUE END", ''margin_present_for_runs_or_wickets'', lambda
        d: d == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: '.satisfies("CASE WHEN super_over = ''Y'' THEN venue IS NOT NULL
        ELSE TRUE END", ''venue_present_for_super_over'', lambda d: d == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' THEN winner IS NOT
        NULL ELSE TRUE END", ''winner_not_null_when_played'', lambda d: d == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner = team1 OR winner = team2", ''winner_is_one_of_teams'',
        lambda d: d == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("winner = team1 OR winner = team2",
        ''winner_is_one_of_teams'', lambda d: d == 1.0)'' failed on data sample: Value:
        0.989100817438692 does not meet the constraint requirement!'
      level: error
