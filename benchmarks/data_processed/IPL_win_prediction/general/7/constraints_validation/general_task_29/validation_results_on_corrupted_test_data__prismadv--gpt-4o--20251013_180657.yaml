results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies('CASE WHEN result IN ("runs", "wickets") THEN result_margin
        IS NOT NULL AND CAST(result_margin AS INT) IS NOT NULL ELSE result_margin
        IS NULL END', 'Valid result_margin based on result type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x >= 0.9890909090909091)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''result_margin'', lambda x:
        x >= 0.9890909090909091)'' failed on data sample: Value: 0.9782016348773842
        does not meet the constraint requirement!'
      level: warning
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''toss_winner == winner'', ''Toss winner matches actual
        winner'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies('date IS NOT NULL AND CAST(date AS DATE) IS NOT NULL',
        'Date Format Check')
      status: true
      reason_if_failed: ''
      level: undefined
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: .satisfies("`super_over` != 'Y' OR `city` IS NOT NULL", "City Completeness
        for Super Over")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`super_over` != ''Y'' OR `city`
        IS NOT NULL", "City Completeness for Super Over")'' failed on data sample:
        Value: 0.989100817438692 does not meet the constraint requirement!'
      level: undefined
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''id''], lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["date","date_dt"]':
    code:
    - suggestion: '.satisfies(''`date` IS NOT NULL AND TRY_CAST(`date` AS DATE) IS
        NOT NULL'', ''Valid Date Format'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: undefined
  winner:
    code:
    - suggestion: .satisfies('`result` = "no result" OR `winner` IS NOT NULL', 'Winner
        column completeness for played matches')
      status: true
      reason_if_failed: ''
      level: undefined
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      status: true
      reason_if_failed: ''
      level: undefined
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies(''CASE WHEN `result_margin` IS NOT NULL THEN `result`
        != "no result" ELSE TRUE END'', ''Result Margin Validity'', lambda x: x >=
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `result` IN ("runs", "wickets") THEN `result_margin`
        IS NOT NULL ELSE TRUE END'', ''Result Type with Margin'', lambda x: x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `result` IN ("tie", "no result") THEN `result_margin`
        IS NULL ELSE TRUE END'', ''Tie or No Result Margin'', lambda x: x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: error
