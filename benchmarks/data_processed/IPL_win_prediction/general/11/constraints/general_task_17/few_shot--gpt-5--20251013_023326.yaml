constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    - - .isPositive('id')
      - Invalid
    assumptions: []
  method:
    code:
    - - .satisfies("method IS NULL OR method = 'D/L'", "method_null_or_DL")
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .satisfies("CASE WHEN lower(result) IN ('runs','wickets') THEN result_margin
        IS NOT NULL AND result_margin > 0 ELSE TRUE END", "positive_margin_when_decided_results")
      - Valid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Valid
    - - .satisfies("CASE WHEN method = 'D/L' THEN target_overs IS NOT NULL AND target_overs
        > 0 ELSE TRUE END", "target_overs_present_and_positive_when_DL")
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Valid
    - - .satisfies("CASE WHEN method = 'D/L' AND target_runs IS NOT NULL THEN target_runs
        > 0 ELSE TRUE END", "target_runs_positive_if_present_when_DL")
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_belongs_to_teams")
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("CASE WHEN lower(result) IN ('runs','wickets') THEN winner IS NOT
        NULL AND (winner = team1 OR winner = team2) ELSE TRUE END", "winner_present_and_valid_for_decided_results")
      - Valid
    assumptions: []
