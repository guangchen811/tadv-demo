raw_constraints:
- column_name: id
  code_for_constraint: .isComplete('id')
- column_name: id
  code_for_constraint: .isPositive('id')
- column_name: season
  code_for_constraint: .isComplete('season')
- column_name: season
  code_for_constraint: .isPositive('season')
- column_name: date
  code_for_constraint: .isComplete('date')
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: team1
  code_for_constraint: .satisfies('team1 != team2', 'teams_distinct')
- column_name: result
  code_for_constraint: .isComplete('result')
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs','wickets','tie','no result'])
- column_name: winner
  code_for_constraint: .satisfies("(result NOT IN ('runs','wickets')) OR (winner =
    team1 OR winner = team2)", 'winner_is_participating')
- column_name: winner
  code_for_constraint: .satisfies("(result NOT IN ('runs','wickets')) OR isnotnull(winner)",
    'winner_present_when_decided')
- column_name: result_margin
  code_for_constraint: .satisfies("(result NOT IN ('runs','wickets')) OR (result_margin
    > 0)", 'positive_margin_when_decided')
- column_name: super_over
  code_for_constraint: .isContainedIn('super_over', ['Y','N'])
- column_name: super_over
  code_for_constraint: .satisfies("(result != 'tie') OR (super_over = 'Y')", 'super_over_for_tie')
- column_name: toss_decision
  code_for_constraint: .isContainedIn('toss_decision', ['bat','field'])
