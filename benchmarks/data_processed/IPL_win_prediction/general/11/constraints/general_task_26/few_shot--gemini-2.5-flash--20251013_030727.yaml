constraints:
  city:
    code:
    - - .isComplete('city')
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .satisfies('date', 'date RLIKE "^\\d{4}-\\d{2}-\\d{2}$"', "Has valid YYYY-MM-DD
        date format")
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isComplete('result_margin')
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isComplete('target_overs')
      - Invalid
    - - .isLessThanOrEqualTo('target_overs', 20.0)
      - Invalid
    - - .isPositive('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isComplete('target_runs')
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - '.hasNumberOfDistinctValues(''team1'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - '.hasNumberOfDistinctValues(''team2'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies('toss_winner', 'toss_winner = team1 OR toss_winner = team2', 'Toss
        winner must be one of the teams')
      - Invalid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner')
      - Invalid
    - - .satisfies('winner', 'winner = team1 OR winner = team2', 'Winner must be one
        of the playing teams')
      - Invalid
    assumptions: []
