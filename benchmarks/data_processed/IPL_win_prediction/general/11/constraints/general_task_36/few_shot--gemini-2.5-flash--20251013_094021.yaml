constraints:
  city:
    code:
    - - .hasDataType('city', 'String')
      - Invalid
    - - '.isComplete(''city'', lambda x: x >= 0.98)'
      - Invalid
    assumptions: []
  date:
    code:
    - - .hasDataType('date', 'String')
      - Invalid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', 'Integral')
      - Invalid
    - - .hasUniqueness('id')
      - Invalid
    - - .isComplete('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .hasDataType('match_type', 'String')
      - Invalid
    - - .hasValues('match_type', ['Elimination Final', 'Eliminator', 'Qualifier 2',
        'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Invalid
    - - .isComplete('match_type')
      - Valid
    assumptions: []
  method:
    code:
    - - .hasDataType('method', 'String')
      - Invalid
    - - .hasValues('method', ['D/L'])
      - Invalid
    - - '.isComplete(''method'', lambda x: x < 0.05)'
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .hasDataType('player_of_match', 'String')
      - Invalid
    - - '.isComplete(''player_of_match'', lambda x: x >= 0.99)'
      - Invalid
    assumptions: []
  result:
    code:
    - - .hasDataType('result', 'String')
      - Invalid
    - - .hasValues('result', ['tie', 'runs', 'wickets', 'no result'])
      - Invalid
    - - .isComplete('result')
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasDataType('result_margin', 'Fractional')
      - Invalid
    - - '.isComplete(''result_margin'', lambda x: x >= 0.98)'
      - Invalid
    - - .isIntegral('result_margin', or_null=True)
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', 'Integral')
      - Invalid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .hasDataType('super_over', 'String')
      - Invalid
    - - .hasValues('super_over', ['Y', 'N'])
      - Invalid
    - - .isComplete('super_over')
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasDataType('target_overs', 'Fractional')
      - Invalid
    - - '.isComplete(''target_overs'', lambda x: x >= 0.99)'
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .hasDataType('target_runs', 'Fractional')
      - Invalid
    - - '.isComplete(''target_runs'', lambda x: x >= 0.99)'
      - Invalid
    assumptions: []
  team1:
    code:
    - - .hasDataType('team1', 'String')
      - Invalid
    - - '.hasNumberOfDistinctValues(''team1'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .hasDataType('team2', 'String')
      - Invalid
    - - '.hasNumberOfDistinctValues(''team2'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .hasDataType('toss_decision', 'String')
      - Invalid
    - - .hasValues('toss_decision', ['field', 'bat'])
      - Invalid
    - - .isComplete('toss_decision')
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .hasDataType('toss_winner', 'String')
      - Invalid
    - - '.hasNumberOfDistinctValues(''toss_winner'', lambda x: x <= 19)'
      - Invalid
    - - '.hasNumberOfDistinctValues(''toss_winner'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .hasDataType('umpire1', 'String')
      - Invalid
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .hasDataType('umpire2', 'String')
      - Invalid
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .hasDataType('venue', 'String')
      - Invalid
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .hasDataType('winner', 'String')
      - Invalid
    - - '.hasNumberOfDistinctValues(''winner'', lambda x: x <= 19)'
      - Invalid
    - - '.hasNumberOfDistinctValues(''winner'', lambda x: x > 0)'
      - Invalid
    - - '.isComplete(''winner'', lambda x: x >= 0.99)'
      - Invalid
    assumptions: []
