constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .isStandardDateFormat('date', 'yyyy-MM-dd')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isIntegral('id')
      - Invalid
    - - .isNonNegative('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isInColumnValues('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Invalid
    assumptions: []
  method:
    code:
    - - '.hasNumberOfDistinctValues(''method'', lambda x: x == 1, predicate=''method
        IS NOT NULL'')'
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .isComplete('player_of_match')
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isInColumnValues('result', ['runs', 'wickets', 'tie', 'no result'])
      - Invalid
    assumptions: []
  result_margin:
    code:
    - - .isComplete('result_margin')
      - Invalid
    - - .isConvertibleTo('Integral', 'result_margin')
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isIntegral('season')
      - Invalid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isInColumnValues('super_over', ['Y', 'N'])
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - .isComplete('target_overs')
      - Invalid
    - - .isConvertibleTo('Fractional', 'target_overs')
      - Invalid
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isComplete('target_runs')
      - Invalid
    - - .isConvertibleTo('Integral', 'target_runs')
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isInColumnValues('toss_decision', ['field', 'bat'])
      - Invalid
    assumptions: []
  toss_winner:
    code:
    - - '.hasNumberOfDistinctValues(''toss_winner'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner')
      - Invalid
    assumptions: []
