constraints:
  date:
    code:
    - - .hasPattern('date', '^[0-9]{4}-[0-9]{2}-[0-9]{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League','Final','Qualifier 1','Qualifier 2','Eliminator','Elimination
        Final','Semi Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - .hasCompleteness('method', 0.02)
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .hasCompleteness('player_of_match', 0.99)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs','wickets','tie','no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .satisfies('result = "no result" OR result_margin IS NOT NULL', 'result_margin_present_when_played')
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y','N','y','n'])
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasCompleteness('target_runs', 0.99)
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat','field'])
      - Valid
    assumptions: []
  winner:
    code:
    - - .hasCompleteness('winner', 0.99)
      - Invalid
    assumptions: []
