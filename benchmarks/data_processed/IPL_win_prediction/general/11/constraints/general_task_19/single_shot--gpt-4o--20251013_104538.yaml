constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .where('result in ["runs", "wickets"]').isNonNegative('result_margin')
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .where('super_over == "Y"').isContainedIn('result', ['tie'])
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - .where('method == "D/L"').isNonNegative('target_overs')
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .where('method == "D/L"').isNonNegative('target_runs')
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isDistinct('team1', 'team2')
      - Invalid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  winner:
    code:
    - - .where('result != "no result"').isComplete('winner')
      - Invalid
    - - .where('result != "no result"').isContainedIn('winner', ['team1', 'team2'])
      - Invalid
    assumptions: []
