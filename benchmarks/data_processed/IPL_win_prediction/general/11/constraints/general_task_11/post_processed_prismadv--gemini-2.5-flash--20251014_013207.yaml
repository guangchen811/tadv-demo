        would lead to infinite, undefined, or meaningless values for ''req_run_rate'',
        which would subsequently impact the calculation of ''avg_req_run_rate''.

        We could represent this assumption as a Deequ constraint like this:

        .satisfies("`target_overs` > 0", "target_overs must be positive")'
      sources:
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 72
        end_line: 72
        file: ''
      - start_line: 80
        end_line: 80
        file: ''
      uid: c76d1bc1-37a2-4dc9-80a8-e5e62c946786
    - text: 'The ''target_overs'' column should maintain a high level of completeness
        (i.e., very few null values) in the input data, especially for rows where
        ''result'' is not ''no result''. Although the code handles nulls by propagating
        them as `NaN` (from `pd.to_numeric` or initial nulls) which are then ignored
