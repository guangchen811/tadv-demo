results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result IN ('runs','wickets') AND result_margin > 0)
        OR (result NOT IN ('runs','wickets'))", 'margin_positive_when_needed')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isNonNegative('target_overs')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1,team2:
    code:
    - suggestion: .satisfies('team1 != team2', 'teams_are_different')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("toss_winner = team1 OR toss_winner = team2", 'toss_winner_is_team')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("(result IN ('tie','no result') AND winner IS NULL) OR
        (result IN ('runs','wickets') AND (winner = team1 OR winner = team2))", 'winner_valid')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(result IN (''tie'',''no result'')
        AND winner IS NULL) OR (result IN (''runs'',''wickets'') AND (winner = team1
        OR winner = team2))", ''winner_valid'')'' failed on data sample: Value: 0.989100817438692
        does not meet the constraint requirement!'
      level: error
