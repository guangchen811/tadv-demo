results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: '.hasCompleteness(''match_type'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("match_type IN ('Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League')", "Valid Match Types")
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive('result_margin')
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .satisfies("`toss_decision` IN ('field', 'bat')", "Valid Toss Decisions")
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .satisfies('super_over IN ("Y", "N")', 'Valid super_over Values')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  '["chasing_team","team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: .satisfies('toss_winner IN (team1, team2)', 'Valid Toss Winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''toss_decision'', ''toss_winner'', ''team1'',
        ''team2''], lambda x: x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: undefined
  '["chasing_team","chasing_win","winner"]':
    code:
    - suggestion: '.satisfies(''`toss_decision` IS NOT NULL AND `toss_winner` IS NOT
        NULL AND `team1` IS NOT NULL AND `team2` IS NOT NULL'', ''Derive Chasing Team'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["date","season"]':
    code:
    - suggestion: .satisfies("YEAR(date) = CAST(season AS INT)", "Date within Season
        Year")
      status: false
      reason_if_failed: 'Constraint ''satisfies("YEAR(date) = CAST(season AS INT)",
        "Date within Season Year")'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: warning
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''winner'', lambda x: x >= 0.99)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: error
  result:
    code:
    - suggestion: '.hasCompleteness(''result'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'', ''runs'', ''wickets'',
        ''no result'') THEN 1 ELSE 0 END", ''Valid Result Values'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["match_type","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''match_type''], lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('LOWER(match_type) = LOWER(match_type)', 'Case Insensitive
        Match Type')
      status: true
      reason_if_failed: ''
      level: warning
  '["played","result"]':
    code:
    - suggestion: '.haveCompleteness([''result''], lambda x: x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''result IN ("tie", "runs", "wickets", "no result")'',
        ''Valid Result Values'', lambda x: x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["toss_winner","toss_won_match","winner"]':
    code:
    - suggestion: '.satisfies(''`toss_winner` IN (`team1`, `team2`)'', ''Toss winner
        valid team names'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''season'', ''match_type''], lambda x: x >= 0.05)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`season` AS INT) IS NOT NULL'', ''Season column
        numeric coercion'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
