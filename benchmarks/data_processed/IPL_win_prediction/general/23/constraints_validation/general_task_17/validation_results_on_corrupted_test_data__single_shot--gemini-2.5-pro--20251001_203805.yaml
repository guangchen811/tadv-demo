results:
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda x: x > 0.98, ''city should be
        mostly present'')'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .isContainedIn('method', ['D/L'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR result_margin
        IS NOT NULL", ''result_margin_completeness'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        ''winner_must_be_a_participant'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("winner IS NULL OR winner = team1
        OR winner = team2", ''winner_must_be_a_participant'', lambda x: x == 1.0)''
        failed on data sample: Value: 0.9700272479564033 does not meet the constraint
        requirement!'
      level: error
