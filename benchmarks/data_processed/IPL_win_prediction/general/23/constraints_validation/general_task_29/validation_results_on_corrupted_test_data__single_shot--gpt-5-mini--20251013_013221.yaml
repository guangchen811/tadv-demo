results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("(result IN ('runs','wickets') AND result_margin IS NOT
        NULL) OR (result NOT IN ('runs','wickets') AND result_margin IS NULL)", 'result_margin_nullity_matches_result_type')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("CASE WHEN result <> 'no result' THEN (winner = team1
        OR winner = team2) ELSE TRUE END", 'winner_is_one_of_teams_when_played')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN result <> ''no result''
        THEN (winner = team1 OR winner = team2) ELSE TRUE END", ''winner_is_one_of_teams_when_played'')''
        failed on data sample: Value: 0.9700272479564033 does not meet the constraint
        requirement!'
      level: error
