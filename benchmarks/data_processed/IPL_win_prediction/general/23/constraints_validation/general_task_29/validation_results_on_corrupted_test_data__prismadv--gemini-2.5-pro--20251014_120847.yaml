results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result = 'no result' OR (winner = team1 OR winner =
        team2)", "WinnerIsParticipant")
      status: false
      reason_if_failed: 'Constraint ''satisfies("result = ''no result'' OR (winner
        = team1 OR winner = team2)", "WinnerIsParticipant")'' failed on data sample:
        Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMinLength("team2", lambda l: l > 0)'
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda c: c > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("`result_margin` IS NULL OR `result_margin` = FLOOR(`result_margin`)",
        "result_margin_is_integer", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isPositive(''result_margin'', assertion=lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete("super_over")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("super_over", ["Y", "N"])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete("toss_winner")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_a_playing_team", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete("`date`")
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: .satisfies("`super_over` <> 'Y' OR `city` IS NOT NULL", "City is
        not null for super over matches")
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies(''year(to_date(date)) = season'', ''YearInDateMatchesSeason'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete("venue")
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: .satisfies("result = 'no result' OR winner IS NOT NULL", "Winner
        must be present if there is a result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner must be one of the competing teams")
      status: false
      reason_if_failed: 'Constraint ''satisfies("winner IS NULL OR winner = team1
        OR winner = team2", "Winner must be one of the competing teams")'' failed
        on data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("result", ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["player_of_match","result","winner"]':
    code:
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`winner` IS NOT NULL
        AND (`winner` = `team1` OR `winner` = `team2`))", "winner_check_for_played_matches",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result` = ''no result'') OR (`winner`
        IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`))", "winner_check_for_played_matches",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("(`result` <> ''no result'') OR (`winner` IS NULL AND
        `player_of_match` IS NULL)", "no_result_implies_null_winner_and_pom", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`result` NOT IN (''runs'', ''wickets'') OR `result_margin`
        IS NOT NULL) AND (`result` NOT IN (''tie'', ''no result'') OR `result_margin`
        IS NULL)", "margin_consistency_with_result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("`result` = ''no result'' OR `winner` = `team1` OR `winner`
        = `team2`", "winner_is_a_participating_team", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`result` = ''no result'' OR `winner`
        = `team1` OR `winner` = `team2`", "winner_is_a_participating_team", lambda
        x: x == 1)'' failed on data sample: Value: 0.9700272479564033 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies("(`result` IN (''runs'', ''wickets'') AND `result_margin`
        IS NOT NULL) OR (`result` IN (''tie'', ''no result'') AND `result_margin`
        IS NULL)", "result_margin_nullity_check", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`result` = ''no result'' OR (`winner` IS NOT NULL AND
        `toss_winner` IS NOT NULL)", "winner_and_toss_winner_completeness_for_played_matches",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("super_over = ''N'' OR result = ''tie''", "super_over_implies_tie",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("result = ''no result'' OR winner = team1 OR winner
        = team2", "WinnerIsParticipant", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("result = ''no result'' OR winner
        = team1 OR winner = team2", "WinnerIsParticipant", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("result = ''no result'' OR winner IS NOT NULL", "WinnerIsNotNullForCompletedMatch",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "TeamsAreDistinct", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("result = ''no result'' OR winner IS NULL OR winner
        = team1 OR winner = team2", "winner_is_participant", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("result = ''no result'' OR winner
        IS NULL OR winner = team1 OR winner = team2", "winner_is_participant", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.9700272479564033 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies("team1 <> team2", "team1_is_not_team2", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_is_participant",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("result = ''no result'' OR (winner IS NOT NULL AND (winner
        = team1 OR winner = team2))", "winner_must_be_a_participant", lambda x: x
        == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("result = ''no result'' OR (winner
        IS NOT NULL AND (winner = team1 OR winner = team2))", "winner_must_be_a_participant",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("team1 <> team2", "teams_must_be_different", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["toss_winner","winner"]':
    code:
    - suggestion: '.satisfies("(toss_winner = team1 OR toss_winner = team2) AND (result
        = ''no result'' OR (winner IS NOT NULL AND (winner = team1 OR winner = team2)))",
        "team_identity_check", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(toss_winner = team1 OR toss_winner
        = team2) AND (result = ''no result'' OR (winner IS NOT NULL AND (winner =
        team1 OR winner = team2)))", "team_identity_check", lambda x: x == 1.0)''
        failed on data sample: Value: 0.9700272479564033 does not meet the constraint
        requirement!'
      level: error
