results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (result IN (''runs'',''wickets'')) OR (winner =
        team1 OR winner = team2)", "Winner must be team1 or team2 for decided results",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("NOT (result IN (''runs'',''wickets''))
        OR (winner = team1 OR winner = team2)", "Winner must be team1 or team2 for
        decided results", lambda x: x == 1.0)'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("team1 IS NULL OR team1 = TRIM(team1)", "No leading/trailing
        whitespace in team1", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''no result'',''tie'',''runs'',''wickets'')
        THEN team2 IS NOT NULL ELSE TRUE END", "team2 present on processed rows",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team1 <> team2'', ''No self-match'', lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (winner
        = team1 OR winner = team2) ELSE TRUE END", ''Winner must be one of the teams
        for decided matches'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN result IN (''runs'',''wickets'')
        THEN (winner = team1 OR winner = team2) ELSE TRUE END", ''Winner must be one
        of the teams for decided matches'', lambda x: x == 1)'' failed on data sample:
        Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''team2 = trim(team2)'', ''team2 has no leading/trailing
        spaces'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: '.hasCompleteness(''match_type'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`match_type` = ''League''", "At least one League row",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''match_type'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`match_type`)) = ''league'' THEN
        (`match_type` = ''League'') ELSE TRUE END", "Canonical League label", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''match_type'', [''League'', ''Qualifier 1'', ''Qualifier
        2'', ''Eliminator'', ''Elimination Final'', ''Semi Final'', ''Final''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("(`target_overs` IS NULL) OR (CAST(`target_overs` AS
        DOUBLE) IS NOT NULL)", "target_overs parseable or null", lambda x: x >= 0.999)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        THEN (`target_overs` > 0 AND `target_overs` <= 20.0) ELSE TRUE END", "overs
        range for contributing rows", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''target_overs'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN (result_margin IS
        NOT NULL AND CAST(result_margin AS DOUBLE) IS NOT NULL) ELSE TRUE END", "result_margin
        present and numeric for ''runs''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN (CAST(result_margin
        AS DOUBLE) >= 1 AND CAST(result_margin AS DOUBLE) = FLOOR(CAST(result_margin
        AS DOUBLE))) ELSE TRUE END", "result_margin integer and >= 1 for ''runs''",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' AND CAST(target_runs AS
        DOUBLE) IS NOT NULL THEN CAST(result_margin AS DOUBLE) <= (CAST(target_runs
        AS DOUBLE) - 1) ELSE TRUE END", "result_margin <= target_runs - 1 for ''runs''",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''wickets'',''tie'',''no result'')
        THEN (result_margin IS NULL OR (CAST(result_margin AS DOUBLE) IS NOT NULL
        AND CAST(result_margin AS DOUBLE) >= 0)) ELSE TRUE END", "result_margin optional
        and, if present, numeric and non-negative for non-''runs'' results", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''result_margin'', lambda v: v >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''result_margin'', lambda v:
        v >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(result_margin IS NULL OR CAST(result_margin AS DOUBLE)
        IS NOT NULL)", "result_margin parseable when present (>=98%)", lambda x: x
        >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("`target_runs` IS NOT NULL OR `target_runs` IS NULL",
        "target_runs column exists", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''target_runs'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN `target_runs` >= 1 THEN 1 ELSE 0 END ELSE 1 END", "target_runs
        minimum for decided/tied matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN CASE WHEN `target_runs`
        >= `result_margin` + 1 THEN 1 ELSE 0 END ELSE 1 END", "target_runs vs result_margin
        for runs result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`season` AS STRING) RLIKE ''^[0-9]+$''", "Season
        values are integer-formatted", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN winner IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner non-null for
        decided matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') AND winner
        IS NOT NULL THEN CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0
        END ELSE 1 END", "Winner must equal team1 or team2 on decided matches", lambda
        x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN result IN (''runs'',''wickets'')
        AND winner IS NOT NULL THEN CASE WHEN winner = team1 OR winner = team2 THEN
        1 ELSE 0 END ELSE 1 END", "Winner must equal team1 or team2 on decided matches",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') AND winner
        IS NOT NULL THEN CASE WHEN TRIM(winner) = winner THEN 1 ELSE 0 END ELSE 1
        END", "Winner has no extraneous whitespace on decided matches", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN result_margin IS NOT
        NULL AND CAST(result_margin AS DOUBLE) >= 1 ELSE TRUE END", ''Runs result
        requires positive numeric margin'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN winner
        IS NOT NULL AND (winner = team1 OR winner = team2) ELSE TRUE END", ''Winner
        must be one of the two teams for win/loss results'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN result IN (''runs'',''wickets'')
        THEN winner IS NOT NULL AND (winner = team1 OR winner = team2) ELSE TRUE END",
        ''Winner must be one of the two teams for win/loss results'', lambda x: x
        == 1.0)'' failed on data sample: Value: 0.9700272479564033 does not meet the
        constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'')
        THEN target_runs IS NOT NULL AND CAST(target_runs AS DOUBLE) IS NOT NULL ELSE
        TRUE END", ''Target runs must be present and numeric when a result exists'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("NOT (result IN (''runs'',''wickets'',''tie'')) OR (target_runs
        IS NOT NULL AND target_runs >= 1 AND FLOOR(target_runs) = target_runs)", "TargetRunsValidWhenResultPlayed",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (result = ''runs'') OR (result_margin IS NOT NULL
        AND FLOOR(result_margin) = result_margin AND result_margin >= 1 AND target_runs
        IS NOT NULL AND result_margin <= target_runs - 1)", "RunsMarginWithinTarget",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (result = ''wickets'') OR (result_margin IS NULL
        OR (FLOOR(result_margin) = result_margin AND result_margin >= 1 AND result_margin
        <= 10))", "WicketsMarginOptionalAndBounded", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (result = ''tie'') OR (COALESCE(result_margin,
        0) = 0)", "TieZeroMargin", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (result IN (''runs'',''wickets'',''tie'')) OR (target_overs
        IS NOT NULL AND target_overs > 0 AND target_overs <= 20)", "TargetOversBoundWhenResultPlayed",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","target_overs"]':
    code:
    - suggestion: '.satisfies("(`result` <> ''runs'') OR (`result` = ''runs'' AND
        `result_margin` IS NOT NULL AND `result_margin` > 0 AND `target_runs` IS NOT
        NULL AND `result_margin` <= `target_runs` - 1)", "runs_result_margin_valid",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` NOT IN (''runs'',''wickets'')) OR (`winner`
        IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`))", "winner_belongs_to_teams_for_decided_matches",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result` NOT IN (''runs'',''wickets''))
        OR (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`))",
        "winner_belongs_to_teams_for_decided_matches", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`target_overs` IS NOT
        NULL AND `target_overs` > 0 AND `target_overs` <= 20)", "target_overs_in_range_when_decided",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` NOT IN (''runs'',''wickets'',''tie'')) OR
        (`target_runs` IS NOT NULL AND `target_runs` >= 1)", "target_runs_present_for_played_matches",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "distinct_opponents", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result NOT IN (''runs'', ''wickets'')) OR (((winner
        = team1) AND (winner <> team2)) OR ((winner = team2) AND (winner <> team1)))",
        "valid_winner_for_decided_matches", lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(result NOT IN (''runs'', ''wickets''))
        OR (((winner = team1) AND (winner <> team2)) OR ((winner = team2) AND (winner
        <> team1)))", "valid_winner_for_decided_matches", lambda v: v == 1.0)'' failed
        on data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
