results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies(''`target_overs` is not NULL'', ''target_overs completeness'',
        lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`target_overs` is not NULL'', ''target_overs
        completeness'', lambda x: x >= 0.998)'' failed on data sample: Value: 0.9945504087193461
        does not meet the constraint requirement!'
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies(''CASE WHEN `result_margin` IS NOT NULL THEN 1 ELSE
        0 END'', ''Non-Null Result Margin'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN CAST(`target_runs` AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END", "Valid Numeric target_runs", lambda x: x > 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NOT NULL THEN 1 ELSE 0 END",
        "Non-null target_runs", lambda x: x >= 0.9981818181818182)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `target_runs` IS NOT NULL
        THEN 1 ELSE 0 END", "Non-null target_runs", lambda x: x >= 0.9981818181818182)''
        failed on data sample: Value: 0.9945504087193461 does not meet the constraint
        requirement!'
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","target_runs"]':
    code:
    - suggestion: .satisfies('result IN ("runs", "wickets", "tie", "no result")',
        'Valid Result Values')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN result = "runs" THEN result_margin IS NOT
        NULL AND target_runs IS NOT NULL ELSE TRUE END', 'Complete Result Margin and
        Target Runs for Runs')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN result = "wickets" THEN target_runs IS NOT
        NULL ELSE TRUE END', 'Complete Target Runs for Wickets')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN result = "tie" THEN target_runs IS NOT NULL
        ELSE TRUE END', 'Complete Target Runs for Tie')
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`winner` IN (`team1`, `team2`) OR `result` NOT IN (''runs'',
        ''wickets'')", "Winner must be one of the participating teams", lambda x:
        x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`winner` IN (`team1`, `team2`) OR
        `result` NOT IN (''runs'', ''wickets'')", "Winner must be one of the participating
        teams", lambda x: x == 1)'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
