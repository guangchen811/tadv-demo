results:
  team1:
    code:
    - suggestion: '.satisfies(''TRIM(team1) = team1'', ''team1_no_leading_trailing_whitespace'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(team2) = team2", "team2 has no leading/trailing
        whitespace", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isContainedIn("match_type", ["Elimination Final", "Eliminator",
        "Qualifier 2", "Final", "Semi Final", "Qualifier 1", "League"])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasUniqueness([''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: '.satisfies("LOWER(TRIM(toss_decision)) IN (''field'', ''bat'')",
        "Valid Toss Decision Values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.isContainedIn(''super_over'', [''Y'', ''N''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: '.satisfies("TRIM(`toss_winner`) = `toss_winner`", "toss_winner_no_leading_trailing_whitespace",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_valid_team_and_casing_matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness("winner", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("winner", lambda x: x >= 0.99)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner is a participating team", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("winner IS NULL OR winner = team1
        OR winner = team2", "Winner is a participating team", lambda x: x == 1.0)''
        failed on data sample: Value: 0.9700272479564033 does not meet the constraint
        requirement!'
      level: error
  result:
    code:
    - suggestion: '.satisfies("LOWER(TRIM(result)) IN (''tie'', ''runs'', ''wickets'',
        ''no result'')", "Normalized result values are valid", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["method","result"]':
    code:
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "Toss
        winner must be a participating team", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN result_margin
        IS NOT NULL AND result_margin > 0 WHEN result IN (''tie'', ''no result'')
        THEN result_margin IS NULL OR result_margin = 0 ELSE TRUE END", "Result Margin
        Validity", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","super_over","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''tie'' THEN (CASE WHEN super_over
        = ''Y'' OR super_over = ''N'' THEN 1 ELSE 0 END) ELSE 1 END", "Super Over
        for Tied Matches Validity", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (result = ''no result'' OR result = ''tie'')
        THEN (CASE WHEN winner IS NULL OR winner = '''' THEN 1 ELSE 0 END) WHEN (result
        = ''runs'' OR result = ''wickets'') THEN (CASE WHEN winner IS NOT NULL AND
        winner != '''' THEN 1 ELSE 0 END) ELSE 1 END", "Winner Column Validity based
        on Result", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN (result = ''no result''
        OR result = ''tie'') THEN (CASE WHEN winner IS NULL OR winner = '''' THEN
        1 ELSE 0 END) WHEN (result = ''runs'' OR result = ''wickets'') THEN (CASE
        WHEN winner IS NOT NULL AND winner != '''' THEN 1 ELSE 0 END) ELSE 1 END",
        "Winner Column Validity based on Result", lambda x: x >= 0.99)'' failed on
        data sample: Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN (result = ''runs'' OR result = ''wickets'')
        THEN (CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END) ELSE 1
        END", "Winner Must Be One of the Participating Teams", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN (result = ''runs'' OR result
        = ''wickets'') THEN (CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE
        0 END) ELSE 1 END", "Winner Must Be One of the Participating Teams", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.9700272479564033 does not meet
        the constraint requirement!'
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("CASE WHEN super_over != ''Y'' OR result = ''tie'' THEN
        1 ELSE 0 END", "Super Over Implies Tie", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result_margin IS NULL OR result IN (''runs'',
        ''wickets'') THEN 1 ELSE 0 END", "Result Margin Implies Win Type", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("`team1` != `team2`", "Team does not play itself", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss winner is one of the playing teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' OR `result` = ''no result''
        THEN TRUE ELSE (`winner` = `team1` OR `winner` = `team2`) END", "Winner is
        one of the playing teams when a winner is declared", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `result` = ''tie'' OR `result`
        = ''no result'' THEN TRUE ELSE (`winner` = `team1` OR `winner` = `team2`)
        END", "Winner is one of the playing teams when a winner is declared", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.9700272479564033 does not meet
        the constraint requirement!'
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.hasUniqueness([''id'', ''team1'', ''team2''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "winner_is_one_of_teams", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("winner IS NULL OR winner = team1
        OR winner = team2", "winner_is_one_of_teams", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("team1 <> team2", "teams_are_distinct_in_a_match", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner
        must be one of the participating teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 != team2", "Participating teams must be distinct",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
