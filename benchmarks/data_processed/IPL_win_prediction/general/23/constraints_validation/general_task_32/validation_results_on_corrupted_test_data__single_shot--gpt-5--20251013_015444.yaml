results:
  date:
    code:
    - suggestion: '.hasPattern(''date'', r''^\d{4}-\d{2}-\d{2}$'', lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Eliminator', 'Qualifier
        1', 'Qualifier 2', 'Final', 'Semi Final', 'Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("method is null or method = 'D/L'", 'method_null_or_dl')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("((lower(result) in ('runs','wickets')) and result_margin
        is not null and result_margin > 0) or (lower(result) not in ('runs','wickets'))",
        'margin_present_for_decided')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(lower(result) != 'wickets') or (result_margin between
        1 and 10)", 'wkts_margin_1_to_10')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: '.hasMax(''season'', lambda v: v <= 2025)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''season'', lambda v: v >= 2008)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  super_over,result:
    code:
    - suggestion: .satisfies("(lower(result) != 'tie' and upper(super_over) = 'N')
        or (lower(result) = 'tie' and upper(super_over) = 'Y')", 'super_over_consistent_with_tie')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1,team2:
    code:
    - suggestion: .satisfies('team1 != team2', 'teams_not_same')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner,team1,team2:
    code:
    - suggestion: .satisfies('toss_winner = team1 or toss_winner = team2', 'toss_winner_in_teams')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("(lower(result) in ('runs','wickets') and winner is not
        null and (winner = team1 or winner = team2)) or (lower(result) not in ('runs','wickets')
        and winner is null)", 'winner_validity')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(lower(result) in (''runs'',''wickets'')
        and winner is not null and (winner = team1 or winner = team2)) or (lower(result)
        not in (''runs'',''wickets'') and winner is null)", ''winner_validity'')''
        failed on data sample: Value: 0.9591280653950953 does not meet the constraint
        requirement!'
      level: error
