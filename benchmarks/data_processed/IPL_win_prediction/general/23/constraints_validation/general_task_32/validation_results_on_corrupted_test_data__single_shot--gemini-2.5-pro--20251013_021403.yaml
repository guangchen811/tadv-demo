results:
  _row:
    code:
    - suggestion: .satisfies('team1 <> team2', 'teams_must_be_different')
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isPositive('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result not in ('runs', 'wickets') or result_margin is
        not null", 'result_margin_must_exist_for_decided_match')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("result not in ('runs', 'wickets') or winner is not null",
        'winner_must_exist_for_decided_match')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('winner is null or winner = team1 or winner = team2',
        'winner_must_be_one_of_the_teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''winner is null or winner = team1
        or winner = team2'', ''winner_must_be_one_of_the_teams'')'' failed on data
        sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
