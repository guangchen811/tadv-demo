results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''id'', ''team2''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`match_type` = "League"'', ''Majority League Matches'',
        lambda x: x > 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .satisfies('date IS NOT NULL', 'Date Completeness')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies('date IS NOT NULL AND TRY_CAST(date AS DATE) IS NOT NULL',
        'Date Validity')
      status: true
      reason_if_failed: ''
      level: undefined
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''date''], lambda x: x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies('(`winner` = `team1` OR `winner` = `team2` OR `result`
        = "no result")', 'Winner Matches Teams')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''(`winner` = `team1` OR `winner`
        = `team2` OR `result` = "no result")'', ''Winner Matches Teams'')'' failed
        on data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["id","match_type"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "Distinct Teams Per Match", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("(result = ''tie'' AND super_over = ''Y'') OR (result
        != ''tie'' AND super_over != ''Y'')", "Logical dependency between result and
        super_over", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies(''(`result` = "no result") OR (`winner` = `team1`) OR
        (`winner` = `team2`)'', ''Winner Correspondence'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''(`result` = "no result") OR (`winner`
        = `team1`) OR (`winner` = `team2`)'', ''Winner Correspondence'', lambda x:
        x == 1.0)'' failed on data sample: Value: 0.9700272479564033 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''(`result` != "tie") OR (`super_over` = "Y")'', ''Super
        Over for Tie'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
