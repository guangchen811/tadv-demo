constraints:
  city:
    code:
    - - .isComplete('city')
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("method IS NULL OR method = 'D/L'", "Method can only be 'D/L' or
        NULL")
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isComplete('result_margin')
      - Invalid
    - - .isDataType('result_margin', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isDataType('season', ConstrainableDataTypes.Integral)
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - '.hasNumberOfDistinctValues(''team1'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - '.hasNumberOfDistinctValues(''team2'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner')
      - Invalid
    assumptions: []
