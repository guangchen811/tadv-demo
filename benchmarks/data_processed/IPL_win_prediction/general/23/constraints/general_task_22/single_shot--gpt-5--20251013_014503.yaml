constraints:
  date:
    code:
    - - .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$', match=1.0)
      - Invalid
    - - .isComplete('date')
      - Valid
    - - '.satisfies("cast(substring(date, 1, 4) as int) = season", ''date_year_matches_season'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    - - .isPositive('id')
      - Invalid
    assumptions: []
  match_type:
    code:
    - - .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier 2', 'Eliminator',
        'Final', 'Elimination Final', 'Semi Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - '.satisfies("method is null or upper(method) = ''D/L''", ''method_allowed_values'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - '.satisfies("case when lower(result) != ''no result'' then player_of_match
        is not null else true end", ''pom_present_when_played'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    - - '.satisfies("case when lower(result) = ''tie'' then upper(super_over) = ''Y''
        else true end", ''tie_implies_super_over'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      - Valid
    - - '.satisfies("case when lower(result) in (''runs'',''wickets'') then result_margin
        > 0 else result_margin is null end", ''margin_consistent_with_result'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''season'', lambda v: v <= 2024)'
      - Valid
    - - '.hasMin(''season'', lambda v: v >= 2008)'
      - Valid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    - - '.satisfies("case when upper(super_over) = ''Y'' then lower(result) = ''tie''
        else true end", ''super_over_implies_tie'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Valid
    - - '.hasMax(''target_overs'', lambda v: v <= 20.0)'
      - Valid
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - '.satisfies(''team1 <> team2'', ''teams_different_per_match'', lambda v: v
        == 1.0)'
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - '.satisfies(''toss_winner = team1 or toss_winner = team2'', ''toss_winner_in_teams'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  winner:
    code:
    - - '.satisfies("case when lower(result) != ''no result'' then (winner = team1
        or winner = team2) else true end", ''winner_in_teams_when_played'', lambda
        v: v == 1.0)'
      - Valid
    - - '.satisfies("case when lower(result) = ''no result'' then winner is null else
        winner is not null end", ''winner_present_when_played'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
