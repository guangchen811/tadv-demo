constraints:
  city:
    code:
    - - .isComplete('city').withFailureTolerance(0.02)
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Final', 'Qualifier 1', 'Qualifier
        2', 'Eliminator', 'Elimination Final', 'Semi Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - .isType('method', 'String')
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .isComplete('player_of_match').withFailureTolerance(0.005)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isComplete('result_margin').withFailureTolerance(0.02)
      - Invalid
    - - .isType('result_margin', 'Fractional')
      - Invalid
    - - .satisfies("(result = 'runs' AND result_margin IS NOT NULL AND result_margin
        >= 0) OR (result = 'wickets' AND result_margin IS NOT NULL AND result_margin
        >= 0) OR (result = 'no result' AND result_margin IS NULL) OR (result = 'tie'
        AND result_margin IS NULL)", "ResultMarginConsistencyAndNonNegative")
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isIntegral('season')
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isComplete('target_overs').withFailureTolerance(0.005)
      - Invalid
    - - .isType('target_overs', 'Fractional')
      - Invalid
    - - .satisfies("target_overs IS NULL OR target_overs > 0", "TargetOversPositiveOrNull")
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isComplete('target_runs').withFailureTolerance(0.005)
      - Invalid
    - - .isType('target_runs', 'Fractional')
      - Invalid
    - - .satisfies("target_runs IS NULL OR target_runs >= 0", "TargetRunsNonNegativeOrNull")
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", "TossWinnerMustBeTeam1OrTeam2")
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner').withFailureTolerance(0.005)
      - Invalid
    - - .satisfies("winner = team1 OR winner = team2 OR result = 'no result' OR result
        = 'tie'", "WinnerMustBeTeam1OrTeam2OrNoResultOrTie")
      - Valid
    assumptions: []
