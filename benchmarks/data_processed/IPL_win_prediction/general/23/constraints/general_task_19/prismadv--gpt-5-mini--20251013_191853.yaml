        the loser is determined by comparing ''winner'' to ''team1''/''team2''. (Deequ-style:
        conditional completeness/numeric checks on ''result_margin'' and completeness
        on ''winner'' for rows with result in (''runs'',''wickets''), plus row-level
        predicate relating winner to team1/team2 as above.)'
      sources:
      - start_line: 36
        end_line: 51
        file: ''
      uid: d88551ef-dfff-46ce-8a3d-588516b01712
    - text: 'When ''result'' == ''tie'', any ''super_over'' == ''Y'' indicates the
        tie was resolved via a Super Over and therefore a ''winner'' should be present
        indicating the Super Over adjudication. Also, ''super_over'' == ''Y'' should
        only occur for rows where result == ''tie''. (Deequ-style: conditional completeness
        of ''winner'' when result == ''tie'' AND super_over == ''Y''; conditional
        predicate that super_over == ''Y'' implies result == ''tie''.)'
      sources:
      - start_line: 31
        end_line: 56
        file: ''
      uid: d30a3e9c-d0f5-4916-9d7d-959094a394db
    - text: 'For rows where ''method'' == ''D/L'', both ''target_runs'' and ''target_overs''
        must be present and numeric, and ''target_overs'' must be > 0, because the
        code divides target_runs by target_overs to compute a required run rate. (Deequ-style:
        for method == ''D/L'' assert completeness and isNumeric on ''target_runs''
        and ''target_overs'' and a predicate target_overs > 0.)'
      sources:
      - start_line: 33
        end_line: 47
        file: ''
      uid: c7b22b08-abe6-4dd0-b112-385b4d230570
    - text: 'For rows where ''result'' == ''no result'' (and in particular for League
        matches with ''no result''), the code assumes there is no meaningful ''winner''
        value (i.e. ''winner'' should be null/absent). This is used when allocating
        ''nr'' (no-result) entries into standings without referencing ''winner''.
        (Deequ-style: for result == ''no result'' assert completeness(''winner'')
        == 0 or conditional predicate winner IS NULL.)'
      sources:
      - start_line: 28
        end_line: 33
        file: ''
      - start_line: 92
        end_line: 100
        file: ''
      uid: 645789a7-1d78-4cbd-804d-a5aaad3f5b06
  '["method","target_overs","target_runs"]':
    code: []
    assumptions:
    - text: 'For any row where method == ''D/L'', both ''target_runs'' and ''target_overs''
        must be present (non-null). This is required because the summarization code
        checks for pd.notna on both columns before using them. Actionable constraint
        examples:

        - Deequ (using a conditional satisfy): .satisfies("method != ''D/L'' OR target_runs
        IS NOT NULL", "dls_target_runs_present") and .satisfies("method != ''D/L''
        OR target_overs IS NOT NULL", "dls_target_overs_present").

        - Or using a where filter plus completeness: .where("method = ''D/L''").isComplete([''target_runs'',''target_overs'']).'
      sources:
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 44
        end_line: 46
        file: ''
      uid: d50fd0b7-bf33-40de-9274-fb20353bbd17
    - text: 'For rows where method == ''D/L'', ''target_overs'' must be numeric and
        strictly greater than 0 (target_overs > 0) to avoid division-by-zero and invalid
        rate computations; also ''target_runs'' must be numeric so the division produces
        a valid numeric request run rate. Actionable constraints:

        - .satisfies("method != ''D/L'' OR target_overs > 0", "dls_target_overs_positive")

        - .satisfies("method != ''D/L'' OR (target_runs IS NOT NULL AND isfinite(target_runs))",
        "dls_target_runs_numeric")

        (If Deequ dialect/SQL backend lacks isfinite, validate numeric-ness via casts
        or regex depending on environment.)'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      uid: 3e98ff2d-66c9-489c-909c-1f6bfe3b63c5
    - text: 'For rows where method == ''D/L'', ''target_runs'' and ''target_overs''
        are expected to be integral-valued (no fractional part) because the code casts
        them to int() when formatting the summary. Also target_runs should be non-negative
        (typically > 0). Actionable constraints (SQL-like expressions):

        - .satisfies("method != ''D/L'' OR (target_runs IS NOT NULL AND target_runs
        % 1 = 0)", "dls_target_runs_integral")

        - .satisfies("method != ''D/L'' OR (target_overs IS NOT NULL AND target_overs
        % 1 = 0)", "dls_target_overs_integral")

        - .satisfies("method != ''D/L'' OR target_runs >= 0", "dls_target_runs_non_negative").'
      sources:
      - start_line: 46
        end_line: 47
        file: ''
      uid: 7d541588-abc5-42ad-ad0a-0bd084959ea8
  '["result","result_margin","winner"]':
    code: []
    assumptions:
    - text: 'For any match record where result != ''no result'', the ''winner'' field
        must be present (non-null) and must equal one of the two competing teams (either
        ''team1'' or ''team2'').

        This can be represented as a row-level predicate such as:

        (result != ''no result'') -> (winner IS NOT NULL AND (winner = team1 OR winner
        = team2))

        (Deequ/SQL-style: .satisfies("(result != ''no result'') -> (winner IS NOT
        NULL AND (winner = team1 OR winner = team2))"))'
      sources:
      - start_line: 26
        end_line: 31
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      - start_line: 36
        end_line: 41
        file: ''
      uid: 1f135685-f19e-4570-ab67-7cdb0b8dc492
    - text: 'When result is ''runs'' or ''wickets'', the ''result_margin'' must be
        present and numeric (convertible to an integer) and represent a positive margin.
        Also, in those cases ''winner'' must be present (so the textual summary can
        report who beat whom by the margin).

        Predicate example:

        (result IN (''runs'',''wickets'')) -> (result_margin IS NOT NULL AND TRY_CAST(result_margin
        AS INTEGER) IS NOT NULL AND CAST(result_margin AS INTEGER) > 0 AND winner
        IS NOT NULL)

        (Deequ/SQL-style: .satisfies("(result IN (''runs'',''wickets'')) -> (result_margin
        IS NOT NULL AND cast(result_margin as int) IS NOT NULL AND cast(result_margin
        as int) > 0 AND winner IS NOT NULL)") )'
      sources:
      - start_line: 48
        end_line: 51
        file: ''
      - start_line: 44
        end_line: 47
        file: ''
      uid: aff48d32-3099-4657-9465-bfe8b38f0fb9
    - text: 'If ''super_over'' == ''Y'' then the match must have been a tie prior
        to the Super Over and a winner must be recorded (i.e., super_over = ''Y''
        implies result == ''tie'' and winner is non-null). Conversely, super_over
        should only be set for tied matches.

        Predicate example:

        (super_over = ''Y'') -> (result = ''tie'' AND winner IS NOT NULL)

        (Deequ/SQL-style: .satisfies("(super_over = ''Y'') -> (result = ''tie'' AND
        winner IS NOT NULL)"))'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 52
        end_line: 55
        file: ''
      uid: aa913088-bf50-4dd9-8e43-11dd74c4741b
    - text: 'If result == ''no result'' then there should be no winner recorded (winner
        must be null). Additionally, both teams in a ''no result'' match are counted
        as ''nr'' when computing standings (the code treats both team1 and team2 as
        ''nr'' records).

        Predicate example:

        (result = ''no result'') -> (winner IS NULL)

        (Deequ/SQL-style: .satisfies("(result = ''no result'') -> (winner IS NULL)"))'
