    - text: 'For League matches with an actual result (i.e. ''match_type'' == ''League''
        and ''result'' != ''no result''), the value in ''winner'' must be one of the
        two teams in the fixture: either equal to ''team1'' or equal to ''team2''.
        (Deequ-style constraint: for rows where match_type == ''League'' AND result
        != ''no result'', assert isIn(''winner'', [team1, team2]) or a row-level predicate
        winner == team1 OR winner == team2.)'
