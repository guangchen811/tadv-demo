constraints:
  date:
    code:
    - - .hasPattern('date', '\\d{4}-\\d{2}-\\d{2}')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .satisfies("match_type IN ('League','Eliminator','Qualifier 1','Qualifier
        2','Final','Elimination Final','Semi Final')", 'match_type_domain')
      - Valid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .satisfies("lower(result) IN ('runs','wickets','tie','no result')", 'result_domain')
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isConvertibleTo('result_margin', 'Double')
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  result_margin,result,super_over:
    code:
    - - .satisfies("CASE WHEN lower(result) IN ('runs','wickets') THEN result_margin
        IS NOT NULL AND result_margin > 0 ELSE TRUE END", 'positive_margin_when_applicable')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .satisfies('season >= 2008 AND season <= 2023', 'season_in_valid_range')
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .satisfies("upper(super_over) IN ('Y','N')", 'super_over_domain')
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isConvertibleTo('target_overs', 'Double')
      - Invalid
    - - .satisfies('target_overs > 0 AND target_overs <= 20', 'overs_in_t20_range')
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .isConvertibleTo('target_runs', 'Double')
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1,team2:
    code:
    - - .satisfies('team1 <> team2', 'teams_not_same')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .satisfies("lower(toss_decision) IN ('bat','field')", 'toss_decision_domain')
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  toss_winner,team1,team2:
    code:
    - - .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner_is_a_participating_team')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner,result,super_over,team1,team2:
    code:
    - - .satisfies("CASE WHEN lower(result) = 'no result' OR (lower(result) = 'tie'
        AND upper(super_over) <> 'Y') THEN winner IS NULL ELSE (winner = team1 OR
        winner = team2) END", 'winner_valid_by_result')
      - Valid
    assumptions: []
