raw_constraints:
- column_name: id
  code_for_constraint: .isComplete('id')
- column_name: id
  code_for_constraint: .isUnique('id')
- column_name: season
  code_for_constraint: .isComplete('season')
- column_name: season
  code_for_constraint: .hasPattern('season', r'^\d{4}$')
- column_name: date
  code_for_constraint: .isComplete('date')
- column_name: date
  code_for_constraint: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: team1,team2
  code_for_constraint: .satisfies('team1 <> team2', 'team1_neq_team2')
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs','wickets','tie','no result'])
- column_name: winner
  code_for_constraint: .satisfies("NOT (result IN ('runs','wickets') AND NOT (winner
    = team1 OR winner = team2))", 'winner_is_from_teams_when_decided')
- column_name: result_margin
  code_for_constraint: .satisfies("NOT (result IN ('runs','wickets') AND result_margin
    IS NULL)", 'result_margin_present_when_decided')
- column_name: result_margin
  code_for_constraint: .satisfies("NOT (result IN ('tie','no result') AND result_margin
    IS NOT NULL)", 'result_margin_null_when_not_decided')
- column_name: result_margin
  code_for_constraint: .satisfies("result NOT IN ('runs','wickets') OR result_margin
    >= 0", 'non_negative_margin_for_decided')
- column_name: toss_decision
  code_for_constraint: .isContainedIn('toss_decision', ['bat','field'])
- column_name: toss_winner
  code_for_constraint: .isComplete('toss_winner')
- column_name: toss_winner
  code_for_constraint: .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner_is_team')
- column_name: winner
  code_for_constraint: .isComplete('winner')
- column_name: super_over
  code_for_constraint: .isContainedIn('super_over', ['Y','N'])
- column_name: target_runs
  code_for_constraint: .satisfies('target_runs IS NULL OR target_runs >= 0', 'target_runs_non_negative_if_present')
- column_name: target_overs
  code_for_constraint: .satisfies('target_overs IS NULL OR target_overs >= 0', 'target_overs_non_negative_if_present')
