raw_constraints:
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: season
  code_for_constraint: .isComplete('season')
- column_name: result
  code_for_constraint: .isComplete('result')
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
- column_name: result_margin
  code_for_constraint: .isNonNegative('result_margin')
- column_name: target_runs
  code_for_constraint: .isNonNegative('target_runs')
- column_name: target_overs
  code_for_constraint: .isNonNegative('target_overs')
- column_name: target_overs
  code_for_constraint: .satisfies("result != 'runs' OR target_overs > 0", "target_overs_positive_when_runs")
- column_name: result_margin
  code_for_constraint: .satisfies("result != 'wickets' OR (result_margin >= 0 AND
    result_margin <= 10)", "wicket_margin_bounds")
- column_name: winner
  code_for_constraint: .satisfies("(result = 'no result' AND winner IS NULL) OR (winner
    = team1 OR winner = team2)", "winner_is_team_or_null_for_no_result")
- column_name: teams
  code_for_constraint: .satisfies('team1 != team2', 'teams_are_distinct')
