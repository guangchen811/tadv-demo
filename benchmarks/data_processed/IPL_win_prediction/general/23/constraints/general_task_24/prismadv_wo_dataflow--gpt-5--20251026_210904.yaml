        "match_type_trimmed", lambda x: x == 1.0) and satisfies("CASE WHEN match_type
        IN (''League'',''Final'',''Qualifier 1'',''Qualifier 2'',''Eliminator'',''Semi
        Final'',''Elimination Final'') THEN 1 ELSE 0 END", "match_type_case_exact",
        lambda x: x == 1.0); or Great Expectations expect_column_values_to_match_regex(''match_type'',
        ''^(League|Final|Qualifier 1|Qualifier 2|Eliminator|Semi Final|Elimination
        Final)$'').'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      uid: e3b4acf2-4d49-40e5-9f7a-fe911892ff8a
    - text: 'There should be at least one row where match_type == ''League'' so that
