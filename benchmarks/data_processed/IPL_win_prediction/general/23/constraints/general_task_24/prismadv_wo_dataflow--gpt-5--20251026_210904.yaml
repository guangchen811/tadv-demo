      sources:
      - start_line: 13
        end_line: 16
        file: ''
      - start_line: 21
        end_line: 23
        file: ''
      uid: 1f9096f4-cb53-401f-9f54-074d40cf3522
    - text: 'The ''match_type'' values should come from a controlled set with exact
        spellings: {''League'', ''Final'', ''Qualifier 1'', ''Qualifier 2'', ''Eliminator'',
        ''Semi Final'', ''Elimination Final''}. This ensures ''League'' matches are
        not missed due to typos. Validation examples: Deequ isContainedIn(''match_type'',
