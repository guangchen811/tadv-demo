constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda v: v >= 0.95)'
      - Valid
    assumptions: []
  date:
    code:
    - - .satisfies("date RLIKE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'", 'date_iso_yyyy_mm_dd')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1'])
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("(method IS NULL) OR (method = 'D/L')", 'method_dl_or_null')
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - '.hasCompleteness(''player_of_match'', lambda v: v >= 0.98)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .satisfies('(result_margin IS NULL) OR (result_margin >= 0)', 'result_margin_nonnegative_or_null')
      - Valid
    assumptions: []
  season:
    code:
    - - '.hasMin(''season'', lambda v: v >= 2008)'
      - Valid
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .satisfies('(target_overs IS NULL) OR ((target_overs >= 1.0) AND (target_overs
        <= 20.0))', 'target_overs_in_range_or_null')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - '.hasCompleteness(''target_runs'', lambda v: v >= 0.98)'
      - Valid
    - - '.hasMin(''target_runs'', lambda v: v >= 1.0)'
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1_team2:
    code:
    - - .satisfies('team1 <> team2', 'teams_are_distinct')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss_winner_in_teams')
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda v: v >= 0.98)'
      - Valid
    - - .satisfies('((result IN (\'runs\', \'wickets\')) AND (winner IS NOT NULL)
        AND ((winner = team1) OR (winner = team2))) OR (result NOT IN (\'runs\', \'wickets\'))',
        'winner_valid_if_decided')
      - Valid
    assumptions: []
