constraints:
  date:
    code:
    - - .hasPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("method IS NULL OR method = 'D/L'", 'method_null_or_dl')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("(result IN ('runs','wickets')) => result_margin IS NOT NULL AND
        result_margin > 0", 'margin_present_for_decided_matches')
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isContainedInRange('target_overs', 1.0, 20.0)
      - Invalid
    - - .satisfies("method = 'D/L' => target_overs IS NOT NULL", 'target_overs_present_when_dl')
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .isNonNegative('target_runs')
      - Valid
    - - .satisfies("method = 'D/L' => target_runs IS NOT NULL", 'target_runs_present_when_dl')
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1_vs_team2:
    code:
    - - .satisfies('team1 <> team2', 'teams_are_distinct')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss_winner_is_a_participating_team')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("(result IN ('runs','wickets')) OR (result = 'tie' AND super_over
        = 'Y') => winner IS NOT NULL", 'winner_present_for_decided_or_superover_tie')
      - Invalid
    assumptions: []
