constraints:
  date:
    code:
    - - .hasPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      - Valid
    - - .satisfies("to_date(date, 'yyyy-MM-dd') IS NOT NULL", 'date_parseable')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isContainedIn('match_type', ['League', 'Eliminator', 'Qualifier 1', 'Qualifier
        2', 'Final', 'Elimination Final', 'Semi Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("CASE WHEN method IS NULL THEN TRUE ELSE method = 'D/L' END", 'method_if_present_is_dl')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.hasMax(''result_margin'', lambda v: v <= 10, where="result = ''wickets''")'
      - Invalid
    - - '.hasMin(''result_margin'', lambda v: v >= 1, where="result = ''runs''")'
      - Invalid
    - - '.hasMin(''result_margin'', lambda v: v >= 1, where="result = ''wickets''")'
      - Invalid
    - - .isComplete('result_margin', where="result IN ('runs','wickets')")
      - Invalid
    assumptions: []
  result_super_over:
    code:
    - - .satisfies("CASE WHEN result = 'tie' THEN super_over = 'Y' ELSE TRUE END",
        'tie_requires_super_over')
      - Valid
    - - .satisfies("CASE WHEN super_over = 'Y' THEN result = 'tie' ELSE TRUE END",
        'super_over_implies_tie')
      - Valid
    assumptions: []
  season:
    code:
    - - '.hasMax(''season'', lambda v: v <= 2100)'
      - Valid
    - - '.hasMin(''season'', lambda v: v >= 2008)'
      - Valid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - '.hasCompleteness(''target_overs'', lambda v: v >= 0.995)'
      - Valid
    - - '.hasMax(''target_overs'', lambda v: v <= 20)'
      - Valid
    - - '.hasMin(''target_overs'', lambda v: v > 0)'
      - Valid
    assumptions: []
  target_runs:
    code:
    - - '.hasCompleteness(''target_runs'', lambda v: v >= 0.995)'
      - Valid
    - - '.hasMin(''target_runs'', lambda v: v > 0)'
      - Valid
    assumptions: []
  teams:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isComplete('team2')
      - Valid
    - - .satisfies('team1 <> team2', 'teams_must_be_distinct')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", 'toss_winner_is_one_of_the_teams')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("CASE WHEN result <> 'no result' THEN (winner = team1 OR winner
        = team2) ELSE TRUE END", 'winner_must_be_one_of_the_teams')
      - Valid
    - - .satisfies("CASE WHEN result <> 'no result' THEN winner IS NOT NULL ELSE TRUE
        END", 'winner_present_when_resulted')
      - Valid
    - - .satisfies("CASE WHEN result = 'no result' THEN winner IS NULL ELSE TRUE END",
        'no_result_has_no_winner')
      - Valid
    assumptions: []
