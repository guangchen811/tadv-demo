        is ''Y'', then ''result'' must be ''tie''. This implies that a tied match
        in regular overs always leads to a super over, and a super over only occurs
        after a tie.

        We could represent this assumption as a deequ constraint like this:

        .assert_that(df.where(col("result") === "tie").hasColumn("super_over", (col("super_over")
        === "Y").isTrue))

        .assert_that(df.where(col("super_over") === "Y").hasColumn("result", (col("result")
        === "tie").isTrue))'
