    - text: "The 'winner' column's presence and value must be consistent with the\
        \ 'result' column:\n  - If a match 'result' is 'runs', 'wickets', or 'tie',\
        \ then the 'winner' column must not be null and its value must be either 'team1'\
        \ or 'team2'.\n  - If the 'result' is 'no result', then the 'winner' column\
        \ should be null or empty.\nThis ensures that a winner is recorded only when\
        \ appropriate and is one of the participating teams.\nWe could represent this\
        \ assumption as a deequ constraint like this:\n.assert_that(df.where(col(\"\
        result\").isin(\"runs\", \"wickets\", \"tie\")).isNotNull(\"winner\"))\n.assert_that(df.where(col(\"\
        result\").isin(\"runs\", \"wickets\", \"tie\")).hasColumn(\"winner\", (col(\"\
        winner\") === col(\"team1\")).or(col(\"winner\") === col(\"team2\"))))\n.assert_that(df.where(col(\"\
        result\") === \"no result\").isNull(\"winner\"))"
