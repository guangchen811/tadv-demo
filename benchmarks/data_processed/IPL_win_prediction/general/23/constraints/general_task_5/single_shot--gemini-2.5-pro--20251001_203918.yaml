constraints:
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isContainedIn('match_type', ['League', 'Final', 'Qualifier 1', 'Qualifier
        2', 'Eliminator', 'Elimination Final', 'Semi Final'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['wickets', 'runs', 'tie', 'no result'])
      - Valid
    assumptions: []
  season:
    code:
    - - '.isGreaterThan(''season'', 2000, lambda x: x >= 1.0)'
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .addConstraint(Constraint.fromSql('team1 <> team2', 'teams_must_be_distinct'))
      - Invalid
    assumptions: []
  winner:
    code:
    - - .addConstraint(Constraint.fromSql("winner IS NOT NULL OR result = 'no result'",
        'winner_must_be_present_unless_no_result'))
      - Invalid
    - - .addConstraint(Constraint.fromSql('winner IS NULL OR winner IN (team1, team2)',
        'winner_must_be_a_participant'))
      - Invalid
    assumptions: []
