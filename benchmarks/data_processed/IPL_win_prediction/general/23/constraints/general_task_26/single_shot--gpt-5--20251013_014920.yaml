constraints:
  date:
    code:
    - - .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League','Qualifier 1','Qualifier 2','Eliminator','Final','Semi
        Final','Elimination Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("(method <> 'D/L') OR (target_overs < 20)", 'D/L implies reduced
        overs')
      - Invalid
    - - .satisfies("method IS NULL OR method = 'D/L'", 'method null or D/L')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs','wickets','tie','no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      - Valid
    - - .satisfies("NOT (result IN ('runs','wickets')) OR (result_margin >= 0)", 'non-negative
        margin for decided matches')
      - Valid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y','N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Valid
    - - .satisfies("NOT (result IN ('runs','wickets','tie')) OR (target_overs <= 20)",
        'max 20 overs')
      - Valid
    - - .satisfies("NOT (result IN ('runs','wickets','tie')) OR (target_overs > 0)",
        'positive overs for training rows')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Valid
    - - .satisfies("NOT (result IN ('runs','wickets','tie')) OR (target_runs > 0)",
        'positive target runs for training rows')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .satisfies("team1 <> team2", 'teams are distinct')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat','field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("(toss_winner = team1) OR (toss_winner = team2)", 'toss winner
        must be one of the teams')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("NOT (result IN ('runs','wickets')) OR ((winner = team1) OR (winner
        = team2))", 'winner must be one of the teams for decided matches')
      - Valid
    - - .satisfies("NOT (result IN ('runs','wickets')) OR (winner IS NOT NULL)", 'winner
        present for decided matches')
      - Valid
    assumptions: []
