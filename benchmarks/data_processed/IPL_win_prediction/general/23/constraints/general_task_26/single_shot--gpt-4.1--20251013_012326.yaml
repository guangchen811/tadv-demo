constraints:
  city:
    code:
    - - .hasCompleteness('city', _ >= 0.98)
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    assumptions: []
  method:
    code:
    - - .hasCompleteness('method', _ >= 0.02)
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .hasCompleteness('player_of_match', _ >= 0.99)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasCompleteness('result_margin', _ >= 0.98)
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasCompleteness('target_overs', _ >= 0.98)
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .hasCompleteness('target_runs', _ >= 0.98)
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .hasCompleteness('winner', _ >= 0.99)
      - Invalid
    assumptions: []
