results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete("match_type")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn("match_type", [''Elimination Final'', ''Eliminator'',
        ''Qualifier 2'', ''Final'', ''Semi Final'', ''Qualifier 1'', ''League''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("match_type = ''League''", "Predominantly League matches",
        lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.hasCompleteness("target_overs", lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("target_overs", lambda x: x
        >= 0.998)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' AND target_overs = 0 THEN
        0 ELSE 1 END", "target_overs not zero when result is runs", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', assertion=lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''result_margin'', assertion=lambda
        x: x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not
        meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("NOT (result IN (''runs'', ''wickets'') AND result_margin
        IS NULL)", "result_margin_completeness_for_critical_results", lambda x: x
        >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (result IN (''runs'', ''wickets'') AND result_margin
        < 0)", "result_margin_non_negative_for_runs_wickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', assertion=lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete("season")
      status: false
      reason_if_failed: 'Constraint ''isComplete("season")'' failed on data sample:
        Value: 0.9918256130790191 does not meet the constraint requirement!'
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'', ''tie'')
        THEN winner IS NOT NULL ELSE TRUE END", "winner_not_null_for_definitive_results",
        assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn("result", ["no result", "runs", "wickets", "tie"],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["match_type","result","result_margin","season","target_overs","target_runs","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'', ''tie'')
        THEN (CASE WHEN `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` =
        `team2`) THEN 1 ELSE 0 END) ELSE 1 END", "WinnerValidity", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN (CASE WHEN `result_margin`
        IS NOT NULL AND `target_overs` IS NOT NULL AND `target_overs` > 0 THEN 1 ELSE
        0 END) WHEN `result` = ''wickets'' THEN (CASE WHEN `result_margin` IS NOT
        NULL THEN 1 ELSE 0 END) ELSE 1 END", "NRRCalculationPrerequisites", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "TeamsAreDistinct", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","season","target_overs","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        `winner` IS NOT NULL ELSE TRUE END", "Winner not null for runs/wickets results",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL THEN `winner` = `team1`
        OR `winner` = `team2` ELSE TRUE END", "Winner must be one of the participating
        teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN `result_margin`
        IS NOT NULL AND `target_overs` IS NOT NULL AND `target_overs` > 0 ELSE TRUE
        END", "NRR proxy prerequisites for ''runs'' result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN `result_margin`
        IS NOT NULL ELSE TRUE END", "Result margin not null for ''wickets'' result",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","target_overs"]':
    code:
    - suggestion: '.satisfies("NOT (result != ''no result'' AND winner IS NULL)",
        "WinnerNotNullForDefinitiveResult", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (result = ''runs'' AND result_margin IS NULL)",
        "ResultMarginNotNullForRuns", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (result = ''runs'' AND target_overs IS NULL)",
        "TargetOversNotNullForRuns", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (result = ''runs'' AND target_overs <= 0)", "TargetOversGreaterThanZeroForRuns",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (result = ''wickets'' AND result_margin IS NULL)",
        "ResultMarginNotNullForWickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","target_overs","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN (`team1` != `team2` AND (`winner` IS NULL
        OR `winner` = `team1` OR `winner` = `team2`)) THEN 1 ELSE 0 END", "Team and
        Winner Validity", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (`result` = ''runs'' AND `result_margin`
        IS NOT NULL AND `target_overs` IS NOT NULL AND `target_overs` > 0) OR (`result`
        = ''wickets'' AND `result_margin` IS NOT NULL) OR (`result` NOT IN (''runs'',
        ''wickets'')) THEN 1 ELSE 0 END", "NRR Calculation Dependencies", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (`result` IN (''runs'', ''wickets'') AND
        `winner` IS NOT NULL) OR (`result` = ''no result'' AND `winner` IS NULL) OR
        (`result` NOT IN (''runs'', ''wickets'', ''no result'')) THEN 1 ELSE 0 END",
        "Winner Result Consistency", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","target_overs","winner"]':
    code:
    - suggestion: '.satisfies("(result != ''no result'') OR (winner IS NULL OR winner
        = '''')", "WinnerNullForNoResult", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(NOT (result = ''runs'' OR result = ''wickets'' OR
        result = ''tie'')) OR (winner IS NOT NULL AND winner != '''' AND (winner =
        team1 OR winner = team2))", "ValidWinnerForDecisiveOutcome", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result != ''runs'') OR (target_overs IS NOT NULL AND
        target_overs > 0)", "TargetOversValidForRunsResult", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result != ''runs'' AND result != ''wickets'') OR (result_margin
        IS NOT NULL)", "ResultMarginNotNullForDecisiveResult", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("team1 <> team2", "Teams Must Be Distinct", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result IN (''runs'', ''wickets'') AND (winner IS NULL
        OR (winner <> team1 AND winner <> team2))", "Invalid Winner for Decisive Result",
        lambda x: x == 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result = ''no result'' AND winner IS NOT NULL", "No
        Winner for No Result Matches", lambda x: x == 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["season","team1","team2"]':
    code:
    - suggestion: '.satisfies("team1 != team2", "Teams are distinct", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
