results:
  match_type:
    code:
    - suggestion: '.contains(''match_type'', ''League'', lambda x: x > 0)'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.contains(''match_type'',
        ''League'', lambda x: x > 0)'': ''Check'' object has no attribute ''contains'''
      level: error
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Eliminator', 'Qualifier
        1', 'Qualifier 2', 'Final', 'Semi Final', 'Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (result_margin
        IS NOT NULL AND result_margin >= 0) ELSE true END", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.satisfies("CASE WHEN
        result IN (''runs'',''wickets'') THEN (result_margin IS NOT NULL AND result_margin
        >= 0) ELSE true END", lambda x: x == 1.0)'': ''function'' object has no attribute
        ''_get_object_id'''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''season'')'' failed on data sample:
        Value: 0.9918256130790191 does not meet the constraint requirement!'
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN (target_overs IS NOT
        NULL AND target_overs > 0) ELSE true END", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.satisfies("CASE WHEN
        result = ''runs'' THEN (target_overs IS NOT NULL AND target_overs > 0) ELSE
        true END", lambda x: x == 1.0)'': ''function'' object has no attribute ''_get_object_id'''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'')
        THEN (winner = team1 OR winner = team2) ELSE true END", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.satisfies("CASE WHEN
        result IN (''runs'',''wickets'',''tie'') THEN (winner = team1 OR winner =
        team2) ELSE true END", lambda x: x == 1.0)'': ''function'' object has no attribute
        ''_get_object_id'''
      level: error
