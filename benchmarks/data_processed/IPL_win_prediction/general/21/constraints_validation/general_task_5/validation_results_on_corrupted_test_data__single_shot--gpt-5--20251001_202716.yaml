results:
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  date,season:
    code:
    - suggestion: .satisfies('year(to_date(date)) = season', 'season_matches_date_year')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''year(to_date(date)) = season'',
        ''season_matches_date_year'')'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Eliminator', 'Qualifier
        1', 'Qualifier 2', 'Final', 'Elimination Final', 'Semi Final'])
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("(method IS NULL) OR (method = 'D/L')", 'method_is_dl_or_null')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result,super_over:
    code:
    - suggestion: .satisfies("(result != 'tie') OR (super_over = 'Y')", 'tie_requires_super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(super_over != 'Y') OR (result = 'tie')", 'super_over_implies_tie')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
  result_margin,result:
    code:
    - suggestion: .satisfies("(result = 'no result') OR (result_margin >= 0)", 'non_negative_margin_or_nr')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(result = ''no result'') OR (result_margin
        >= 0)", ''non_negative_margin_or_nr'')'' failed on data sample: Value: 0.989100817438692
        does not meet the constraint requirement!'
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', ConstrainableDataTypes.Integral)
      status: false
      reason_if_failed: 'Constraint ''.hasDataType(''season'', ConstrainableDataTypes.Integral)''
        failed on data sample: Value: 0.978021978021978 does not meet the constraint
        requirement!'
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(target_overs IS NULL) OR (target_overs > 0 AND target_overs
        <= 20)', 'target_overs_in_0_20')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(target_runs IS NULL) OR (target_runs > 0)', 'target_runs_positive_if_present')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1,team2:
    code:
    - suggestion: .satisfies('team1 != team2', 'teams_are_distinct')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner,team1,team2:
    code:
    - suggestion: .satisfies('(toss_winner = team1 OR toss_winner = team2)', 'toss_winner_is_a_team')
      status: true
      reason_if_failed: ''
      level: error
  umpire1:
    code:
    - suggestion: .isComplete('umpire1')
      status: true
      reason_if_failed: ''
      level: error
  umpire2:
    code:
    - suggestion: .isComplete('umpire2')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda v: v >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda v: v >=
        0.99)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: error
  winner,result:
    code:
    - suggestion: .satisfies("(result != 'no result') OR (winner IS NULL)", 'no_result_has_no_winner')
      status: true
      reason_if_failed: ''
      level: error
  winner,team1,team2,result:
    code:
    - suggestion: .satisfies("(result = 'no result') OR (winner = team1 OR winner
        = team2)", 'winner_is_a_participating_team_when_result')
      status: true
      reason_if_failed: ''
      level: error
