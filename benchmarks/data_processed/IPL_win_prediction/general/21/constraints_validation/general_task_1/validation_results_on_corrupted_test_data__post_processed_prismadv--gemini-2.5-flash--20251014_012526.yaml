results:
  team1:
    code:
    - suggestion: '.hasMinLength("team1", lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness("result_margin", lambda x: x > 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' OR `result` = ''wickets''
        THEN `result_margin` > 0 ELSE TRUE END", "PositiveMarginForDefinitiveResults",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "Toss
        winner must be one of the playing teams", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("to_timestamp(`date`) IS NOT NULL", "Date Parsability",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete("season")
      status: false
      reason_if_failed: 'Constraint ''isComplete("season")'' failed on data sample:
        Value: 0.9918256130790191 does not meet the constraint requirement!'
      level: error
  '["date","season"]':
    code:
    - suggestion: .satisfies("YEAR(date) = season", "Date year matches season")
      status: false
      reason_if_failed: 'Constraint ''satisfies("YEAR(date) = season", "Date year
        matches season")'' failed on data sample: Value: 0.9700272479564033 does not
        meet the constraint requirement!'
      level: error
    - suggestion: .satisfies("(result = 'no result' OR result = 'tie') OR (winner
        = team1 OR winner = team2)", "Winner is one of the teams or no definitive
        winner")
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''winner'', lambda x: x >= 0.998)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner is a valid team", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isContainedIn("result", ["tie", "runs", "wickets", "no result"])
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","winner"]':
    code:
    - suggestion: .satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner must be one of the teams or null")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result NOT IN ('runs', 'wickets') OR winner IS NOT NULL",
        "Winner must be present for runs/wickets results")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "Teams must be distinct", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`winner` = `team1` OR `winner` = `team2`", "Winner
        must be one of the playing teams", lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`winner` = `team1` OR `winner` =
        `team2`", "Winner must be one of the playing teams", lambda x: x >= 0.998)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss winner must be one of the playing teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_is_playing_team",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 != team2", "teams_are_distinct_in_match", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner is one of the teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("toss_winner IS NULL OR toss_winner = team1 OR toss_winner
        = team2", "Toss winner is one of the teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (result IN (''runs'', ''wickets'') AND winner IS
        NULL)", "Winner not null for decisive results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (result IN (''tie'', ''no result'') AND winner
        IS NOT NULL)", "Winner null for non-decisive results", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("NOT (result IN (''tie'', ''no result'')
        AND winner IS NOT NULL)", "Winner null for non-decisive results", lambda x:
        x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: error
