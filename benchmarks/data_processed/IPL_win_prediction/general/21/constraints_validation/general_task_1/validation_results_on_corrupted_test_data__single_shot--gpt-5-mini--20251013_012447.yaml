results:
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda x: x >= 0.99)'
