        AS DOUBLE) > 0)", "positive margin expected for runs/wickets", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` NOT IN (''runs'',''wickets'')) OR (CAST(`result_margin`
