      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` NOT IN (''tie'',''no result'')) OR (`result_margin`
        IS NULL)", "no margin expected for tie/no result", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("(`method` <> ''D/L'') OR (`target_runs` IS NOT NULL)",
