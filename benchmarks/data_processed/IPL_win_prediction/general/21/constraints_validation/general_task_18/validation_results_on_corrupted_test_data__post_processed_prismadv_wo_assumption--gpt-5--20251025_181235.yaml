      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`toss_winner` IS NULL OR `toss_winner` = `team1` OR
        `toss_winner` = `team2`", "toss_winner_is_one_of_teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`winner` IS NULL OR `result` = ''no result'' OR `winner`
        = `team1` OR `winner` = `team2`", "winner_is_one_of_teams_when_applicable",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''team1 IS NOT NULL AND team2 IS NOT NULL AND team1
