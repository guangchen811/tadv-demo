    code:
    - suggestion: .satisfies("team1 <> team2")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.satisfies("team1 <> team2")'':
        Check.satisfies() missing 1 required positional argument: ''constraintName'''
      level: error
  winner:
    code:
    - suggestion: .isComplete('winner').when("result <> 'no result'")
