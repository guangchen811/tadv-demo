results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isComplete('result_margin').when("result IN ('runs', 'wickets')")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isComplete(''result_margin'').when("result
        IN (''runs'', ''wickets'')")'': ''Check'' object has no attribute ''when'''
      level: error
    - suggestion: .isPositive('result_margin').when("result IN ('runs', 'wickets')")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isPositive(''result_margin'').when("result
