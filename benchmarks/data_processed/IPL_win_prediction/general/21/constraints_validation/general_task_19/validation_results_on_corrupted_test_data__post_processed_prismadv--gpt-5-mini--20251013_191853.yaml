results:
  team1:
    code:
    - suggestion: '.satisfies("CASE WHEN `team1` IS NOT NULL AND length(trim(`team1`))
        > 0 THEN 1 ELSE 0 END", "team1 non-empty and not whitespace", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.satisfies("CASE WHEN `team2` IS NOT NULL AND trim(`team2`) !=
        '''' THEN 1 ELSE 0 END", "team2 not null/empty", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `team1` IS NOT NULL AND `team2` IS NOT NULL
        AND `team1` != `team2` THEN 1 ELSE 0 END", "teams distinct (team1 != team2)",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(`team2`) = `team2` THEN 1 ELSE 0 END",
        "team2 no surrounding whitespace", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN trim(`team2`) = `team2` AND (lower(trim(`team2`))
        = trim(`team2`) OR upper(trim(`team2`)) = trim(`team2`) OR initcap(trim(`team2`))
        = trim(`team2`)) THEN 1 ELSE 0 END", "team2 consistent casing/trim (lower,
        upper or Title case)", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier
        2', 'Final', 'Elimination Final', 'Eliminator', 'Semi Final'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`match_type` = \''League\'' AND `result` IS NOT NULL
        AND `result` != \''no result\'' AND `winner` IS NOT NULL AND (`winner` = `team1`
        OR `winner` = `team2`)'', ''league winner consistency'', lambda x: x >= 0.94)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`match_type` = \''League\'' AND
        `result` IS NOT NULL AND `result` != \''no result\'' AND `winner` IS NOT NULL
        AND (`winner` = `team1` OR `winner` = `team2`)'', ''league winner consistency'',
        lambda x: x >= 0.94)'' failed on data sample: Value: 0.9237057220708447 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''CASE WHEN trim(`match_type`) = `match_type` THEN 1
        ELSE 0 END'', ''match_type no surrounding whitespace'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN CASE WHEN target_overs
        IS NOT NULL AND target_runs IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "D/L
        targets present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' AND target_overs IS NOT
        NULL THEN CASE WHEN TRY_CAST(target_overs AS DOUBLE) > 0 THEN 1 ELSE 0 END
        ELSE 1 END", "Valid positive numeric target_overs for D/L", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') AND `winner`
        IS NOT NULL THEN CASE WHEN CAST(`result_margin` AS DOUBLE) >= 1 THEN 1 ELSE
        0 END ELSE 1 END", "margin_positive_for_decisive_results", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("result_margin", lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("result_margin", lambda x: x
        >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN `target_runs`
        IS NOT NULL AND cast(`target_runs` AS double) = cast(`target_runs` AS double)
        THEN 1 ELSE 0 END ELSE 1 END", "D/L target_runs numeric", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NOT NULL THEN 1 ELSE 0 END",
        "Non-null target_runs fraction", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.satisfies(''CASE WHEN `super_over` IN (\''Y\'',\''N\'') THEN 1
        ELSE 0 END'', ''Valid super_over values'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `super_over` = \''Y\'' THEN CASE WHEN `result`
        = \''tie\'' THEN 1 ELSE 0 END ELSE 1 END'', ''super_over implies tie'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `super_over` = \''Y\'' THEN CASE WHEN `winner`
        IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN 1 ELSE 0 END
        ELSE 1 END'', ''Winner present and valid when super_over = \''Y\'''', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("CASE WHEN year(cast(`date` AS timestamp)) IS NOT NULL
        AND year(cast(`date` AS timestamp)) BETWEEN 1800 AND 2100 THEN 1 ELSE 0 END",
        "Valid year fraction", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: false
      reason_if_failed: 'Constraint ''isComplete(''season'')'' failed on data sample:
        Value: 0.9918256130790191 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''CASE WHEN `season` >= 0 THEN 1 ELSE 0 END'', ''Season
        non-negative'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN `season` >= 0 THEN 1 ELSE
        0 END'', ''Season non-negative'', lambda x: x == 1)'' failed on data sample:
        Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: warning
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL THEN 1 ELSE 0 END", "Allows
        null method values", lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN `target_runs`
        IS NOT NULL AND `target_overs` IS NOT NULL AND `target_overs` > 0 THEN 1 ELSE
        0 END ELSE 1 END", "Valid D/L targets", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL OR `method` IN (''D/L'')
        THEN 1 ELSE 0 END", "Allowed method values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: '.satisfies("CASE WHEN `venue` NOT LIKE ''%\\n%'' AND `venue` NOT
        LIKE ''%\\r%'' THEN 1 ELSE 0 END", "Venue no newlines", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result <> ''no
        result'' THEN CASE WHEN winner IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END",
        "League non-no-result have winner", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NULL THEN 1 ELSE CASE WHEN winner
        = team1 OR winner = team2 THEN 1 ELSE 0 END END", "Winner matches a team in
        the fixture", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN winner IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner present
        for concrete results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "valid_result_category", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' AND `result` IN
        (''runs'',''wickets'',''tie'') THEN CASE WHEN `winner` IS NOT NULL THEN 1
        ELSE 0 END ELSE 1 END", "league_winner_present_for_non_nr", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL OR `winner` = `team1` OR
        `winner` = `team2` THEN 1 ELSE 0 END", "winner_is_one_of_teams_or_null", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE
        WHEN `result_margin` IS NOT NULL AND `result_margin` >= 0 THEN 1 ELSE 0 END
        ELSE 1 END", "result_margin_present_and_nonnegative_for_runs_or_wickets",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN CASE WHEN `winner`
        IS NULL AND `team1` IS NOT NULL AND `team2` IS NOT NULL THEN 1 ELSE 0 END
        ELSE 1 END", "no_result_has_no_winner_and_teams_present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN `result`
        = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "super_over_implies_tie", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' AND `winner` IS
        NULL THEN 1 ELSE 0 END", "winner_present_for_decided_matches", lambda x: x
        == 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL AND NOT (`winner` =
        `team1` OR `winner` = `team2`) THEN 1 ELSE 0 END", "winner_is_team1_or_team2",
        lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' AND `result` != ''tie''
        THEN 1 ELSE 0 END", "super_over_requires_tie", lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
