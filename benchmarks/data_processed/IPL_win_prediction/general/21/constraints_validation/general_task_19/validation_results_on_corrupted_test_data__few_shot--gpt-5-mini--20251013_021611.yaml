results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("NOT(method = 'D/L') OR (target_runs IS NOT NULL AND
        target_overs IS NOT NULL AND target_overs > 0)", "dls_requires_target")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("NOT(method = ''D/L'') OR (target_runs
        IS NOT NULL AND target_overs IS NOT NULL AND target_overs > 0)", "dls_requires_target")''
        failed on data sample: Value: 0.9945504087193461 does not meet the constraint
        requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("NOT(result IN ('runs','wickets')) OR (result_margin
        IS NOT NULL AND result_margin >= 0)", "result_margin_consistent")
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''season'')'' failed on data sample:
        Value: 0.9918256130790191 does not meet the constraint requirement!'
      level: error
  super_over:
    code:
    - suggestion: .satisfies("NOT(super_over = 'Y') OR result = 'tie'", "super_over_implies_tie")
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1,team2:
    code:
    - suggestion: .satisfies("team1 != team2", "teams_different")
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("(result != 'no result' AND winner IS NOT NULL) OR (result
        = 'no result')", "winner_present_for_results")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(winner = team1) OR (winner = team2) OR (winner IS NULL)",
        "winner_is_one_of_teams")
      status: true
      reason_if_failed: ''
      level: error
