results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result = ''no result'' OR winner IS NULL OR winner
        = team1 OR winner = team2", "winner_check", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`team1` <> `team2`'', ''team1_and_team2_are_different'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''winner IS NULL OR winner = `team1` OR winner = `team2`'',
        ''winner_is_a_participant'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete("match_type")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`match_type` = ''League''", "must_contain_league_matches",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("match_type", ['League', 'Qualifier 1', 'Qualifier
        2', 'Final', 'Eliminator', 'Semi Final', 'Elimination Final'])
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.isPositive(''target_overs'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR result_margin
        IS NOT NULL", "result_margin must be present for ''runs''/''wickets'' results",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .satisfies("`target_runs` IS NULL OR `target_runs` = FLOOR(`target_runs`)",
        "target_runs_are_whole_numbers")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative("target_runs")
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn("super_over", ["Y", "N"])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("super_over")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `super_over` = 'Y' THEN `result` = 'tie' ELSE
        true END", "super_over_Y_implies_result_tie")
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.satisfies("`method` IS NULL OR `method` = ''D/L''", "method must
        be ''D/L'' or NULL", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("year(to_date(`date`)) = `season`", "YearFromDateMatchesSeason",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("year(to_date(`date`)) = `season`",
        "YearFromDateMatchesSeason", lambda x: x == 1.0)'' failed on data sample:
        Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("`result` = ''no result'' OR `winner` IS NOT NULL",
        "Winner must be present if there is a result", lambda check: check == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`winner` IS NULL OR `winner` = `team1` OR `winner`
        = `team2`", "Winner must be one of the participating teams", lambda check:
        check == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("result", ["runs", "wickets", "tie", "no result"])
      status: true
      reason_if_failed: ''
      level: error
  '["match_type","result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "winner_is_participant", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR winner IS
        NOT NULL", "winner_for_decisive_result", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result != ''no result'' OR winner IS NULL", "no_winner_for_no_result",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` != `team2`", "teams_are_distinct", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","winner"]':
    code:
    - suggestion: .satisfies("CASE WHEN result = 'no result' THEN winner IS NULL ELSE
        winner IS NOT NULL END", "Winner presence must align with match result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner must be a participant")
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("super_over <> ''Y'' OR result = ''tie''", "super_over_implies_tie",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`winner` IS NULL OR `winner` = `team1` OR `winner`
        = `team2`", "Winner must be one of the participating teams", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "A team cannot play against itself",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
