results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .where('result in ["runs", "wickets"]').isNonNegative('result_margin')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.where(''result in ["runs",
        "wickets"]'').isNonNegative(''result_margin'')'': Method doesn''t exist in
        class com.amazon.deequ.checks.Check, class has to be filterable'
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''season'')'' failed on data sample:
        Value: 0.9918256130790191 does not meet the constraint requirement!'
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .where('super_over == "Y"').isContainedIn('result', ['tie'])
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.where(''super_over ==
        "Y"'').isContainedIn(''result'', [''tie''])'': Method doesn''t exist in class
        com.amazon.deequ.checks.Check, class has to be filterable'
      level: error
  target_overs:
    code:
    - suggestion: .where('method == "D/L"').isNonNegative('target_overs')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.where(''method == "D/L"'').isNonNegative(''target_overs'')'':
        Method doesn''t exist in class com.amazon.deequ.checks.Check, class has to
        be filterable'
      level: error
  target_runs:
    code:
    - suggestion: .where('method == "D/L"').isNonNegative('target_runs')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.where(''method == "D/L"'').isNonNegative(''target_runs'')'':
        Method doesn''t exist in class com.amazon.deequ.checks.Check, class has to
        be filterable'
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isDistinct('team1', 'team2')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isDistinct(''team1'',
        ''team2'')'': ''Check'' object has no attribute ''isDistinct'''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .where('result != "no result"').isComplete('winner')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.where(''result != "no
        result"'').isComplete(''winner'')'': Method doesn''t exist in class com.amazon.deequ.checks.Check,
        class has to be filterable'
      level: error
    - suggestion: .where('result != "no result"').isContainedIn('winner', ['team1',
        'team2'])
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.where(''result != "no
        result"'').isContainedIn(''winner'', [''team1'', ''team2''])'': Method doesn''t
        exist in class com.amazon.deequ.checks.Check, class has to be filterable'
      level: error
