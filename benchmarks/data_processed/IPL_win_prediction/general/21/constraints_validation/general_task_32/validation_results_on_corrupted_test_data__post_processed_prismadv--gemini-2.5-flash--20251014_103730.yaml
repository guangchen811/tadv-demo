results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete(column='team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: '.isContainedIn(column=''match_type'', allowed_values=[''League'',
        ''Qualifier 1'', ''Qualifier 2'', ''Eliminator'', ''Elimination Final'', ''Semi
        Final'', ''Final''], assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        (CASE WHEN `result_margin` = FLOOR(`result_margin`) THEN 1 ELSE 0 END) ELSE
        1 END", "Result Margin Is Integer For Runs/Wickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN (CASE WHEN `result_margin`
        >= 1 AND `result_margin` <= 200 THEN 1 ELSE 0 END) ELSE 1 END", "Result Margin
        Range for Runs (1-200)", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN (CASE WHEN `result_margin`
        >= 1 AND `result_margin` <= 10 THEN 1 ELSE 0 END) ELSE 1 END", "Result Margin
        Range for Wickets (1-10)", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.satisfies("UPPER(TRIM(CAST(super_over AS STRING))) IN (''Y'',
        ''N'')", "Super Over values are Y or N", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (LOWER(TRIM(CAST(result AS STRING))) = ''tie'')
        OR (UPPER(TRIM(CAST(super_over AS STRING))) = ''Y'')", "Tie implies Super
        Over Y", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: false
      reason_if_failed: 'Constraint ''isComplete(''season'')'' failed on data sample:
        Value: 0.9918256130790191 does not meet the constraint requirement!'
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","id","season"]':
    code:
    - suggestion: '.hasUniqueness([''id'', ''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result <> ''runs'' AND result <> ''wickets'') OR (winner
        = team1 OR winner = team2)", "Winner must be one of the participating teams
        if a winner is declared", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "team1 and team2 must be distinct
        for each match", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("(result IN (''runs'', ''wickets'') AND (winner = team1
        OR winner = team2)) OR (result NOT IN (''runs'', ''wickets''))", "Winner must
        be Team1 or Team2 for decided matches", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.isContainedIn("result", ["runs", "wickets", "tie", "no result"],
        assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN CAST(result_margin
        AS INT) = result_margin ELSE TRUE END", "ResultMarginIsIntegerForDecided",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN result_margin > 0
        ELSE TRUE END", "ResultMarginPositiveForRuns", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN result_margin <= 200
        ELSE TRUE END", "ResultMarginCappedForRuns", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''wickets'' THEN result_margin >
        0 ELSE TRUE END", "ResultMarginPositiveForWickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''wickets'' THEN result_margin <=
        10 ELSE TRUE END", "ResultMarginCappedForWickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("result = ''tie'' = (super_over = ''Y'')", "ResultSuperOverEquivalence",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("(`result` = ''runs'' OR `result` = ''wickets'') AND
        (`winner` IS NULL OR (`winner` != `team1` AND `winner` != `team2`))", "Winner
        must be team1 or team2 for decided matches", lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` = `team2`", "Team1 and Team2 must be distinct",
        lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`result` = ''tie'' OR `result` = ''no result'') AND
        `winner` IS NOT NULL", "Winner must be null for tied or no-result matches",
        lambda x: x <= 0.01)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result` = ''tie'' OR `result` =
        ''no result'') AND `winner` IS NOT NULL", "Winner must be null for tied or
        no-result matches", lambda x: x <= 0.01)'' failed on data sample: Value: 0.010899182561307902
        does not meet the constraint requirement!'
      level: error
  '["result","winner"]':
    code:
    - suggestion: '.satisfies("NOT (`result` = ''runs'' OR `result` = ''wickets'')
        OR (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`))",
        "Winner validity for decided matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`result` = ''runs'' OR `result` = ''wickets'')
        OR (`result_margin` IS NOT NULL AND `result_margin` >= 0 AND CAST(`result_margin`
        AS INT) = `result_margin`)", "Result margin validity for decided matches",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''team1'', ''team2''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "Teams must be distinct", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`result` = ''runs'' OR `result` = ''wickets'')
        OR (`winner` = `team1` OR `winner` = `team2`)", "Winner must be one of the
        teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
