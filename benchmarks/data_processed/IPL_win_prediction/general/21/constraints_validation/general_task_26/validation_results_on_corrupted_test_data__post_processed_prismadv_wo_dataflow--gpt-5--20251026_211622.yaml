results:
  team1:
    code:
    - suggestion: '.satisfies("team1 = trim(team1)", "team1 trimmed", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(toss_winner) = lower(team1) THEN toss_winner
        = team1 ELSE TRUE END", "Case-consistent team1 vs toss_winner", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "Distinct opponents", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (winner
        = team1 OR winner = team2) ELSE TRUE END", "Winner among participants for
        decisive results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''team1'', lambda d: d <= 32)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team2 IS NOT NULL AND length(trim(team2)) > 0'', ''team2
        not empty or whitespace'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team1 <> team2'', ''team1 != team2'', lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: '.hasCompleteness("match_type", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn("match_type", ["League", "Qualifier 1", "Qualifier
        2", "Eliminator", "Elimination Final", "Semi Final", "Final"])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `match_type` = TRIM(`match_type`) THEN 1
        ELSE 0 END", "no_whitespace_in_match_type", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' THEN 1 ELSE 0 END",
        "league_majority", lambda x: x >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN CAST(`target_overs` AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE 1
        END", "target_overs > 0 for training rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN CAST(`target_overs` AS DOUBLE) <= 20 THEN 1 ELSE 0 END ELSE
        1 END", "target_overs <= 20 for training rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`target_overs` AS DOUBLE) IS NOT NULL", "target_overs
        mostly numeric", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN (result_margin IS
        NOT NULL AND result_margin > 0) ELSE TRUE END", ''runs_margin_positive'',
        lambda p: p == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''wickets'' THEN (result_margin
        IS NOT NULL AND result_margin BETWEEN 1 AND 10 AND result_margin = CAST(result_margin
        AS INT)) ELSE TRUE END", ''wickets_margin_integer_range'', lambda p: p ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''tie'' THEN COALESCE(result_margin,
        0) = 0 ELSE TRUE END", ''tie_zero_margin'', lambda p: p == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN target_runs IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "target_runs
        present for training rows", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN target_runs IS NULL THEN 1 WHEN CAST(target_runs
        AS DOUBLE) >= 0 AND CAST(target_runs AS DOUBLE) = floor(CAST(target_runs AS
        DOUBLE)) THEN 1 ELSE 0 END", "target_runs non-negative integer", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN target_runs IS NULL THEN 1 WHEN CAST(target_runs
        AS DOUBLE) BETWEEN 0 AND 300 THEN 1 ELSE 0 END", "plausible T20 target_runs
        range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN target_runs IS NULL THEN 1 WHEN target_overs
        IS NOT NULL AND CAST(target_overs AS DOUBLE) > 0 THEN 1 ELSE 0 END", "target_runs
        requires positive target_overs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: '.isContainedIn("toss_decision", [''bat'', ''field''], lambda f:
        f == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(NOT (`result` IN (''runs'',''wickets'',''tie'')))
        OR (`toss_decision` IS NOT NULL)", "toss_decision non-null for training rows",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_decision` IS NULL OR (lower(trim(`toss_decision`))
        = `toss_decision`)", "toss_decision normalized to lowercase and trimmed",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y','N']).where("result IN ('runs','wickets','tie')")
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.satisfies(''(toss_winner IS NOT NULL) AND (toss_winner = team1
        OR toss_winner = team2)'', ''toss_winner_in_teams'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''toss_winner IS NOT NULL AND length(trim(toss_winner))
        > 0 AND toss_winner = trim(toss_winner)'', ''toss_winner_trimmed_non_empty'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.satisfies(''to_timestamp(`date`) IS NOT NULL'', ''Date parseable
        >= 99%'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.satisfies("CAST(season AS STRING) RLIKE ''^-?[0-9]+$''", "season
        integer-like", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CAST(season AS STRING) RLIKE ''^-?[0-9]+$''",
        "season integer-like", lambda x: x == 1.0)'' failed on data sample: Value:
        0.9700272479564033 does not meet the constraint requirement!'
      level: error
  id:
    code:
    - suggestion: '.hasCompleteness(''id'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN id IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Non-null id
        for training rows", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN id IS NULL THEN 1 WHEN CAST(id AS STRING)
        RLIKE ''^[0-9]+$'' THEN 1 ELSE 0 END", "id is integer-like when present",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["date","match_type","season"]':
    code:
    - suggestion: '.satisfies("NOT(result IN (''runs'',''wickets'')) OR (winner =
        team1 OR winner = team2)", "winner_is_a_team_for_decisive_outcomes", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_in_teams",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("year(to_timestamp(date)) = CAST(season AS INT)", "season_matches_date_year",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("year(to_timestamp(date)) = CAST(season
        AS INT)", "season_matches_date_year", lambda x: x == 1.0)'' failed on data
        sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("(target_runs IS NULL) OR (target_overs IS NOT NULL
        AND target_overs > 0)", "safe_target_run_rate_division", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("((result != ''runs'') OR (result_margin > 0)) AND ((result
        != ''wickets'') OR (result_margin > 0)) AND ((result != ''tie'') OR (result_margin
        IS NULL OR result_margin = 0))", "result_margin_consistency", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "teams_are_distinct", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("(NOT (result IN (''runs'',''wickets''))) OR (winner
        IS NOT NULL AND (winner = team1 OR winner = team2))", "Winner present and
        among teams for decisive results", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(winner IS NULL) OR (winner = team1 OR winner = team2)",
        "Winner must be one of the two teams when present", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''winner'', lambda v: v >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''winner'', lambda v: v >= 0.99)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.satisfies("(winner IS NULL) OR (winner = TRIM(winner))", "Winner
        has no surrounding whitespace", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "Result domain", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        THEN 1 ELSE 0 END", "Decisive outcomes present", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN 1 ELSE 0 END",
        "No result rare", lambda x: x <= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  '["toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_match_team", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
