fixing_results:
  target_overs:
    58fbe5a0-5ba7-495b-91d5-b0b86737088e: '.satisfies(''(target_runs IS NULL) OR (target_overs
      IS NOT NULL AND target_overs > 0)'', ''No null or zero target_overs when target_runs
      is present'', lambda x: x == 1)'
  super_over:
    0d280706-d087-4488-866f-2cdf0ccc861a: '.hasCompleteness(''super_over'', lambda
      x: x == 1.0)'
  winner:
    9d2bc33b-bd2e-40fc-a512-2de38bcada52: .satisfies('CASE WHEN result IN ("runs",
      "wickets", "tie") THEN winner IS NOT NULL ELSE TRUE END', 'Winner must be set
      for resulted matches')
  result:
    09240c08-db82-4a2e-b7d8-6c56a25c8d04: .satisfies("CASE WHEN result IN ('runs',
      'wickets') THEN result_margin IS NOT NULL AND CAST(result_margin AS DOUBLE)
      = CAST(CAST(result_margin AS INT) AS DOUBLE) ELSE TRUE END", "Result margin
      must be present and integer-valued for 'runs' or 'wickets'")
  '["toss_winner","winner"]':
    ec569248-7dd9-49d6-9557-b0435d49f892: .satisfies('(`toss_winner` = `team1` OR
      `toss_winner` = `team2`) AND (`winner` IS NULL OR `winner` = `team1` OR `winner`
      = `team2`)', 'Toss winner and winner must be either team1 or team2 (winner may
      be NULL)')
