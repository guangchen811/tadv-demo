        end_line: 70
        file: ''
      uid: 1611e354-1fed-4343-a810-eebbae3f814e
    - text: 'The completeness of ''target_overs'' in the data is approximately 99.8%,
        meaning a very small fraction of values may be missing. However, since downstream
        code calculates aggregates and averages on required run rate, and does not
        explicitly handle missing or zero values for ''target_overs'', it is implicitly
        assumed that missing or zero values are rare and should not materially affect
        the results. Therefore, the proportion of null or zero values in ''target_overs''
        should be very low (e.g., less than 1%). This could be represented as: .completeness(''target_overs'',
        lambda x: x >= 0.99) and .satisfies(''target_overs > 0'', ''No zero target_overs'',
