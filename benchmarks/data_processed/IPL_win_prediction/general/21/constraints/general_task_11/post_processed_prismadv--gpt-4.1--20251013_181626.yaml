        of ''target_overs'' must not be null or zero to avoid division by zero or
        undefined results. This implies that in input data, ''target_overs'' should
        be non-null and greater than zero for all rows where ''target_runs'' is not
        null and where required run rate is relevant. A possible Deequ constraint:
        .satisfies(''target_overs IS NOT NULL AND target_overs > 0'', ''No null or
        zero target_overs'', lambda x: x == 1)'
      sources:
