    - text: 'For decided matches (result in {''runs'',''wickets''}), the loser must
        be the opposing team of the winner (i.e., if winner = team1 then loser = team2,
        and vice versa). For non-decided matches (result in {''tie'',''no result''}),
        loser should be null. Deequ: compliance(''loser_consistent_with_winner'',
        "CASE WHEN result IN (''runs'',''wickets'') THEN ((winner = team1 AND loser
        = team2) OR (winner = team2 AND loser = team1)) ELSE loser IS NULL END").'
