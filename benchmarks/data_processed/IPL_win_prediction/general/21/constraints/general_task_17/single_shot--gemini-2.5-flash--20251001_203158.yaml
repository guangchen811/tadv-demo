constraints:
  city:
    code:
    - - .hasCompleteness('city', 0.98)
      - Invalid
    - - .hasDataType('city', 'String')
      - Invalid
    assumptions: []
  date:
    code:
    - - .hasDataType('date', 'String')
      - Invalid
    - - .hasPattern('date', '^[0-9]{4}-[0-9]{2}-[0-9]{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', 'Integral')
      - Invalid
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .hasDataType('match_type', 'String')
      - Invalid
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Valid
    assumptions: []
  method:
    code:
    - - .hasCompleteness('method', 0.02)
      - Invalid
    - - .hasDataType('method', 'String')
      - Invalid
    - - .isContainedIn('method', ['D/L', 'nan'])
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - .hasCompleteness('player_of_match', 0.99)
      - Invalid
    - - .hasDataType('player_of_match', 'String')
      - Invalid
    assumptions: []
  result:
    code:
    - - .hasDataType('result', 'String')
      - Invalid
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasCompleteness('result_margin', 0.98)
      - Invalid
    - - .hasDataType('result_margin', 'Fractional')
      - Invalid
    - - .isPositiveOrZero('result_margin')
      - Invalid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', 'Integral')
      - Invalid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .hasDataType('super_over', 'String')
      - Invalid
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasCompleteness('target_overs', 0.99)
      - Invalid
    - - .hasDataType('target_overs', 'Fractional')
      - Invalid
    - - .isPositive('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasCompleteness('target_runs', 0.99)
      - Invalid
    - - .hasDataType('target_runs', 'Fractional')
      - Invalid
    - - .isPositiveOrZero('target_runs')
      - Invalid
    assumptions: []
  team1:
    code:
    - - .hasDataType('team1', 'String')
      - Invalid
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .hasDataType('team2', 'String')
      - Invalid
    - - .isComplete('team2')
      - Valid
    - - .isDifferentFrom('team2', 'team1')
      - Invalid
    assumptions: []
  toss_decision:
    code:
    - - .hasDataType('toss_decision', 'String')
      - Invalid
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .hasDataType('toss_winner', 'String')
      - Invalid
    - - .hasNumberOfDistinctValues('toss_winner', 19)
      - Invalid
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .hasDataType('umpire1', 'String')
      - Invalid
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .hasDataType('umpire2', 'String')
      - Invalid
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .hasDataType('venue', 'String')
      - Invalid
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .hasCompleteness('winner', 0.99)
      - Invalid
    - - .hasDataType('winner', 'String')
      - Invalid
    - - .hasNumberOfDistinctValues('winner', 19)
      - Invalid
    assumptions: []
