raw_constraints:
- column_name: id
  code_for_constraint: .isComplete('id')
- column_name: id
  code_for_constraint: .isUnique('id')
- column_name: id
  code_for_constraint: .isNonNegative('id')
- column_name: season
  code_for_constraint: .isComplete('season')
- column_name: season
  code_for_constraint: .isNonNegative('season')
- column_name: date
  code_for_constraint: .isComplete('date')
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: team1,team2
  code_for_constraint: .satisfies('team1 != team2', 'teams_are_different')
- column_name: toss_winner
  code_for_constraint: .isComplete('toss_winner')
- column_name: toss_winner
  code_for_constraint: .satisfies("toss_winner = team1 OR toss_winner = team2", 'toss_winner_is_team')
- column_name: result
  code_for_constraint: .isComplete('result')
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs','wickets','tie','no result'])
- column_name: super_over
  code_for_constraint: .isComplete('super_over')
- column_name: super_over
  code_for_constraint: .isContainedIn('super_over', ['Y','N'])
- column_name: winner
  code_for_constraint: .satisfies("(result IN ('tie','no result') AND winner IS NULL)
    OR (result IN ('runs','wickets') AND (winner = team1 OR winner = team2))", 'winner_valid')
- column_name: result_margin
  code_for_constraint: .isNonNegative('result_margin')
- column_name: result_margin
  code_for_constraint: .satisfies("(result IN ('runs','wickets') AND result_margin
    > 0) OR (result NOT IN ('runs','wickets'))", 'margin_positive_when_needed')
- column_name: target_runs
  code_for_constraint: .isNonNegative('target_runs')
- column_name: target_overs
  code_for_constraint: .isNonNegative('target_overs')
