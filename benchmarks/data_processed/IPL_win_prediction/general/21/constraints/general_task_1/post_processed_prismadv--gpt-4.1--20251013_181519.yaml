fixing_results:
  '["result","result_margin"]':
    982a4112-488c-4198-8ed0-e10d903eb2ef: .satisfies("CASE WHEN `result` = 'runs'
      THEN (`result_margin` IS NOT NULL AND `result_margin` > 0) ELSE TRUE END", "If
      'result' is 'runs', 'result_margin' must be positive and non-null")
    4ce9110c-9fd6-485c-8e87-d0b0941ec851: .satisfies("CASE WHEN `result` = 'wickets'
      THEN (`result_margin` IS NOT NULL AND `result_margin` > 0) ELSE TRUE END", "If
      'result' is 'wickets', 'result_margin' must be positive and non-null")
    96c90b0c-2035-477a-bcc8-22203ee07c02: .satisfies("CASE WHEN `result` = 'no result'
      THEN (`result_margin` IS NULL OR `result_margin` = 0.0) ELSE TRUE END", "If
      'result' is 'no result', 'result_margin' should be null or zero")
  '["result","super_over"]':
    49650a95-cacf-4565-9925-e1e470817e32: '.hasUniqueness([''season'', ''team1'',
      ''team2''], lambda x: x >= 0.83)'
  '["result","winner"]':
    03342902-c92d-413b-8f24-586e7bc15dfa: '.satisfies("CASE WHEN (`result` = ''runs''
      OR `result` = ''wickets'') THEN (`winner` IS NOT NULL AND (`winner` = `team1`
      OR `winner` = `team2`)) ELSE TRUE END", "Winner must be non-null and a playing
      team if there is a result", lambda x: x == 1)'
    2bfe11b2-b1ce-4f23-94be-f1de80e351ca: .satisfies("CASE WHEN (`result` = 'runs'
      OR `result` = 'wickets') THEN (result_margin IS NOT NULL AND TRY_CAST(result_margin
      AS DOUBLE) > 0) WHEN (`result` = 'tie' OR `result` = 'no result') THEN (result_margin
      IS NULL OR TRY_CAST(result_margin AS DOUBLE) = 0) ELSE FALSE END", "Result margin
      must be positive if result is runs/wickets, null or zero otherwise")
  '["team1","team2","toss_winner"]':
    28f04011-e2a0-4c30-bdff-0356a91ca6c5: '.hasUniqueness([''season'', ''team1'',
      ''team2''], lambda x: x >= 0.83)'
