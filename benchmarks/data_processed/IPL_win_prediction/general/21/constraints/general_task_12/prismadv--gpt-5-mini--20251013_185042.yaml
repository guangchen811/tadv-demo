    - text: 'For all ''decided'' matches (defined by result IN (''runs'',''wickets'')
        OR (result = ''tie'' AND super_over = ''Y'')), exactly one of the two teams
        should be the winner (i.e., winner equals team1 XOR winner equals team2).
