        ''target_overs'' should be numeric (fraction allowed). Actionable constraints:

        - For rows where method = ''D/L'': when target_runs is not null it must be
        numeric (and ideally >= 0).

        - For rows where method = ''D/L'': when target_overs is not null it must be
        numeric (and > 0).

        (Implement by filtering method = ''D/L'' and asserting numericness/completeness
        constraints on the two columns.)'
