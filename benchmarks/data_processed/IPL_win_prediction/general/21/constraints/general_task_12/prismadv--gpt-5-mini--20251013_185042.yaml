    - text: 'When result == ''no result'' the script does not use the ''winner'' value;
        therefore rows with result = ''no result'' should not claim a valid winner.
        Actionable constraint:

        - For rows where result = ''no result'': winner should be null (or at least
        not equal to team1 or team2). This prevents inconsistent winner values on
        no-result matches.

        (Enforce via a filtered completeness/containment check or a row-level predicate
        that winner IS NULL for those rows.)'
