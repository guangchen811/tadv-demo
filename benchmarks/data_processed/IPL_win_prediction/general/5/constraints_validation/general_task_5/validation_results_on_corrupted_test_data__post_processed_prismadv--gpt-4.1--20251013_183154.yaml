results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''team1''], lambda d: d <= 19/550)'
      status: false
      reason_if_failed: 'Constraint ''.hasDistinctness([''team1''], lambda d: d <=
        19/550)'' failed on data sample: Value: 0.051771117166212535 does not meet
        the constraint requirement!'
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`team2` != `team1`', 'team2 distinct from team1')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`match_type` = "League" OR `match_type` = "Final" OR
        `match_type` = "Qualifier 1" OR `match_type` = "Qualifier 2" OR `match_type`
        = "Eliminator" OR `match_type` = "Elimination Final" OR `match_type` = "Semi
        Final"', 'Known match_type categories')
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(to_timestamp(`date`) AS STRING) IS NOT NULL",
        "Parsable dates in ''date'' column", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies(''(`match_type` != "League") OR (`winner` IS NOT NULL)'',
        ''Winner should not be NULL for league matches'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(`match_type` != "League") OR (`winner`
        IS NOT NULL)'', ''Winner should not be NULL for league matches'', lambda x:
        x >= 0.998)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: error
    - suggestion: .satisfies('(`winner` IS NULL) OR (`winner` = `team1`) OR (`winner`
        = `team2`)', 'Winner must be one of the teams or NULL')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["id","team1","team2"]':
    code:
    - suggestion: .satisfies('match_type != "League" OR team1 != team2', 'League matches
        must be between different teams')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''id'', ''team1'', ''team2''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: .satisfies("((`result` = 'tie' AND `super_over` = 'Y') OR (`result`
        != 'tie' AND `super_over` = 'N'))", "Tie and Super Over Consistency")
      status: true
      reason_if_failed: ''
      level: error
  '["result","winner"]':
    code:
    - suggestion: .satisfies("team1 <> team2", "Distinct Teams per Match")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result = 'no result' AND winner IS NULL) OR (winner
        IS NOT NULL AND result <> 'no result')", "Result/No Result Winner Consistency")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("((result = 'tie' AND super_over = 'Y') OR (result <>
        'tie' AND (super_over IS NULL OR super_over <> 'Y'))) AND ((super_over = 'Y'
        AND result = 'tie') OR (super_over <> 'Y' AND result <> 'tie'))", "Tie/Super
        Over Consistency")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: .satisfies("`team1` IS NOT NULL AND `team2` IS NOT NULL AND `team1`
        != `team2`", "Each match is between two distinct teams")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: .satisfies('team1 != team2', 'Team1 and Team2 must be distinct')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('winner = team1 OR winner = team2 OR winner IS NULL',
        'Winner must be one of the participating teams or NULL')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''id'', ''team1''], lambda x: x == 1).hasUniqueness([''id'',
        ''team2''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
