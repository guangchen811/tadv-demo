results:
  date:
    code:
    - suggestion: '.hasPattern(''date'', r''^\\d{4}-\\d{2}-\\d{2}$'', lambda v: v
        == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''date'', r''^\\d{4}-\\d{2}-\\d{2}$'',
        lambda v: v == 1.0)'' failed on data sample: Value: 0.0 does not meet the
        constraint requirement!'
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: '.hasDataType(''id'', ConstrainableDataTypes.Integral, lambda v:
        v == 1.0)'
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''id'', ConstrainableDataTypes.Integral,
        lambda v: v == 1.0)'
      level: error
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasDataType(''result_margin'', ConstrainableDataTypes.Fractional,
        lambda v: v >= 0.95)'
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''result_margin'',
        ConstrainableDataTypes.Fractional, lambda v: v >= 0.95)'
      level: error
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  row_level:
    code:
    - suggestion: '.satisfies("(toss_winner = team1) OR (toss_winner = team2)", ''toss_winner_is_participating_team'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' THEN (winner = team1
        OR winner = team2) ELSE winner IS NULL END", ''winner_is_participating_or_null_when_no_result'',
        lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        > 0 ELSE (result_margin IS NULL OR result_margin = 0) END", ''result_margin_consistent_with_result'',
        lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", ''distinct_teams_each_match'', lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: '.hasDataType(''season'', ConstrainableDataTypes.Integral, lambda
        v: v == 1.0)'
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''season'', ConstrainableDataTypes.Integral,
        lambda v: v == 1.0)'
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.hasDataType(''target_overs'', ConstrainableDataTypes.Fractional,
        lambda v: v >= 0.95)'
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''target_overs'',
        ConstrainableDataTypes.Fractional, lambda v: v >= 0.95)'
      level: error
    - suggestion: '.satisfies(''target_overs IS NULL OR (target_overs >= 1 AND target_overs
        <= 50)'', ''target_overs_range'', lambda v: v >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''target_overs IS NULL OR (target_overs
        >= 1 AND target_overs <= 50)'', ''target_overs_range'', lambda v: v >= 0.98)''
        failed on data sample: Value: 0.9019073569482289 does not meet the constraint
        requirement!'
      level: error
  target_runs:
    code:
    - suggestion: '.hasDataType(''target_runs'', ConstrainableDataTypes.Fractional,
        lambda v: v >= 0.95)'
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''target_runs'',
        ConstrainableDataTypes.Fractional, lambda v: v >= 0.95)'
      level: error
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda v: v >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda v: v >=
        0.995)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: error
