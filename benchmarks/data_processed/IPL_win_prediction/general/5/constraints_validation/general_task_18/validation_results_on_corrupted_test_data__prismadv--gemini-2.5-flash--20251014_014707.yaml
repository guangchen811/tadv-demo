results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(team1) != ''''", "team1_not_empty", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN `target_overs`
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "target_overs not null when method
        is D/L", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' AND `target_overs` IS
        NOT NULL THEN CASE WHEN TRY_CAST(`target_overs` AS DOUBLE) IS NOT NULL THEN
        1 ELSE 0 END ELSE 1 END", "target_overs is numerical when method is D/L and
        not null", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("CASE WHEN `result_margin` IS NOT NULL THEN try_cast(`result_margin`
        AS DOUBLE) IS NOT NULL ELSE TRUE END", "Result Margin Convertable to Float")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `result` IN ('runs', 'wickets') THEN `result_margin`
        IS NOT NULL ELSE TRUE END", "Result Margin Not Null When Result Is Runs Or
        Wickets")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `result` IN ('runs', 'wickets') AND `result_margin`
        IS NOT NULL THEN `result_margin` > 0 ELSE TRUE END", "Result Margin Is Positive
        When Result Is Runs Or Wickets")
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("(`method` IS NULL OR `method` != ''D/L'') OR (`target_runs`
        IS NOT NULL)", "target_runs_non_null_for_DL_method", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete("toss_decision")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("toss_decision", ["bat", "field"])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete("super_over")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("super_over", ["Y", "N"])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''tie'' THEN super_over = ''Y''
        ELSE super_over = ''N'' END", "super_over_result_consistency", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete("toss_winner")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`toss_winner` = `team1`) OR (`toss_winner` = `team2`)",
        "Toss winner must be one of the playing teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete("date")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(date AS DATE) IS NOT NULL", "Date values are parsable",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: '.hasCompleteness("city", lambda x: x <= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL OR TRIM(`method`) = ''''
        OR TRIM(UPPER(`method`)) = ''NAN'' THEN 1 WHEN TRIM(`method`) = ''D/L'' THEN
        1 WHEN LENGTH(TRIM(`method`)) > 0 THEN 1 ELSE 0 END", "method_value_is_expected_format",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: warning
  ? '["date","id","method","result","result_margin","season","target_overs","target_runs","toss_decision","toss_winner","venue","winner"]'
  : code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss Winner is a Participating Team", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` != `team2`", "Teams Are Distinct", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN (`winner`
        = `team1` OR `winner` = `team2`) ELSE TRUE END", "Winner is a Participating
        Team (if result exists)", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN (`target_runs` IS
        NOT NULL AND `target_overs` IS NOT NULL) ELSE TRUE END", "D/L Method Details
        Present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        `result_margin` IS NOT NULL ELSE TRUE END", "Result Margin Present For Runs/Wickets",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["id","season"]':
    code:
    - suggestion: '.hasUniqueness([''season'', ''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result = ''no result'' OR (winner = team1 OR winner
        = team2)", "Winner must be team1 or team2", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 != team2", "Team1 and Team2 must be distinct",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "Toss
        winner must be team1 or team2", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("YEAR(to_date(`date`, ''yyyy-MM-dd'')) = `season`",
        "date_year_matches_season_consistency", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: '.satisfies("LENGTH(TRIM(venue)) > 0", "venue is not empty", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("CASE WHEN result IN ('runs', 'wickets', 'tie') THEN
        winner IS NOT NULL ELSE TRUE END", "WinnerNotNullWhenResultExists")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN result IN ('runs', 'wickets', 'tie') AND winner
        IS NOT NULL THEN winner = team1 OR winner = team2 ELSE TRUE END", "WinnerIsOneOfTeams")
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: error
  '["method","target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("CASE WHEN (TRIM(UPPER(method)) = ''D/L'') THEN (CASE
        WHEN target_runs IS NOT NULL AND target_overs IS NOT NULL THEN 1 ELSE 0 END)
        ELSE 1 END", "method_DL_implies_target_runs_and_overs_not_null", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN (CASE WHEN result_margin
        IS NOT NULL AND TRY_CAST(result_margin AS DOUBLE) IS NOT NULL THEN 1 ELSE
        0 END) ELSE 1 END", "Result Margin Must Be Numeric and Non-Null When Result
        is Runs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''wickets'' THEN (CASE WHEN result_margin
        IS NOT NULL AND TRY_CAST(result_margin AS DOUBLE) IS NOT NULL THEN 1 ELSE
        0 END) ELSE 1 END", "Result Margin Must Be Numeric and Non-Null When Result
        is Wickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("(`result` = ''tie'' AND `super_over` = ''Y'') OR (`result`
        != ''tie'' AND `super_over` != ''Y'')", "Result and Super Over Consistency",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`result` = ''no result'' OR (`winner` IS NOT NULL AND
        (`winner` = `team1` OR `winner` = `team2`))", "Winner validity check", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("`team1` != `team2`", "Teams must be distinct", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss winner must be one of the teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","winner"]':
    code:
    - suggestion: '.satisfies("(`result` = ''runs'' OR `result` = ''wickets'' OR `result`
        = ''tie'') AND (`winner` IS NULL OR (`winner` != `team1` AND `winner` != `team2`))",
        "Winner Validity Check", lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN toss_winner = team1 OR toss_winner = team2
        THEN 1 ELSE 0 END", "Toss winner is one of the teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN team1 != team2 THEN 1 ELSE 0 END", "Teams
        are distinct", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' OR (winner = team1
        OR winner = team2) THEN 1 ELSE 0 END", "Winner is one of the teams when result
        exists", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
