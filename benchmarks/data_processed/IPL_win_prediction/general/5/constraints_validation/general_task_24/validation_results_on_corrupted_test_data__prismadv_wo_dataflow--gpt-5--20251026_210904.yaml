results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "team1 and team2 must differ", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (winner
        = team1 OR winner = team2) ELSE TRUE END", "Winner must be team1 or team2
        for decided matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN team1 IS NULL THEN TRUE ELSE TRIM(team1)
        = team1 AND LENGTH(TRIM(team1)) > 0 END", "team1 canonical: trimmed and non-empty
        after trim", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: '.satisfies("CASE WHEN (`result` IN (''runs'',''wickets'',''tie'',''no
        result'') AND `match_type` = ''League'') THEN `team2` IS NOT NULL ELSE TRUE
        END", "team2 present on processed rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (`result` IN (''runs'',''wickets'') AND `match_type`
        = ''League'') THEN (`winner` = `team1` OR `winner` = `team2`) ELSE TRUE END",
        "winner must be either team1 or team2 for decided matches", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (`result` IN (''runs'',''wickets'',''tie'',''no
        result'') AND `match_type` = ''League'') THEN (`team1` <> `team2`) ELSE TRUE
        END", "team1 and team2 must differ on processed rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (`result` IN (''runs'',''wickets'',''tie'',''no
        result'') AND `match_type` = ''League'') THEN (TRIM(`team2`) = `team2`) ELSE
        TRUE END", "team2 has no leading/trailing whitespace on processed rows", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''match_type'', [''League'', ''Final'', ''Qualifier
        1'', ''Qualifier 2'', ''Eliminator'', ''Semi Final'', ''Elimination Final''],
        lambda p: p == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(match_type) = match_type", "match_type_trimmed",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("match_type = ''League''", "has_league_rows", lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`target_overs` IS NULL OR CAST(`target_overs` AS DOUBLE)
        IS NOT NULL OR UPPER(TRIM(CAST(`target_overs` AS STRING))) IN ('''', ''NA'',
        ''NAN'', ''NULL'', ''NULLVALUE'')", ''target_overs numeric-or-missing-token'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`target_overs` AS DOUBLE) IS NULL OR (CAST(`target_overs`
        AS DOUBLE) > 0 AND CAST(`target_overs` AS DOUBLE) <= 20.0)", ''target_overs
        within (0, 20]'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CAST(`target_overs` AS DOUBLE) IS
        NULL OR (CAST(`target_overs` AS DOUBLE) > 0 AND CAST(`target_overs` AS DOUBLE)
        <= 20.0)", ''target_overs within (0, 20]'', lambda x: x == 1)'' failed on
        data sample: Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("(`result` <> ''runs'') OR (`result_margin` IS NOT NULL)",
        "result_margin present when result is runs", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result_margin` IS NULL) OR (CAST(`result_margin`
        AS DOUBLE) IS NOT NULL)", "result_margin numeric if present", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` <> ''runs'') OR (`target_runs` IS NULL) OR
        ((`result_margin` >= 1) AND (`result_margin` <= (`target_runs` - 1)))", "result_margin
        within [1, target_runs - 1] for runs results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN (result IN (''runs'',''wickets'',''tie'')
        AND (match_type IS NULL OR match_type = ''League'')) THEN (target_runs IS
        NOT NULL AND CAST(target_runs AS DOUBLE) IS NOT NULL) ELSE TRUE END", "target_runs
        present and numeric for applicable rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (result IN (''runs'',''wickets'',''tie'')
        AND (match_type IS NULL OR match_type = ''League'')) THEN (CAST(target_runs
        AS DOUBLE) >= 1) ELSE TRUE END", "target_runs >= 1 for decided matches", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN (CAST(target_runs
        AS DOUBLE) >= CAST(result_margin AS DOUBLE) + 1) ELSE TRUE END", "target_runs
        consistent with run-margin logic", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (result IN (''runs'',''wickets'',''tie'')
        AND (match_type IS NULL OR match_type = ''League'')) THEN (CAST(target_runs
        AS DOUBLE) = CAST(CAST(target_runs AS BIGINT) AS DOUBLE)) ELSE TRUE END",
        "target_runs integer-valued for applicable rows", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("winner IS NULL OR winner IS NOT NULL", "Winner column
        exists", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN winner
        IS NOT NULL AND (winner = team1 OR winner = team2) ELSE true END", "Winner
        present and matches one team for decisive results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NULL THEN result IN (''tie'',''no
        result'') ELSE true END", "Null winners only on tie/no result", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(`result`) = `result`", "Result has no leading/trailing
        whitespace", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''result'', ''^(runs|wickets|tie|no result)$'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN ('''', ''NA'', ''NaN'', ''null'',
        ''NULL'', ''NullValue'') THEN 0 ELSE 1 END", "No placeholder nulls in result",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("team1 <> team2", "teams_are_distinct", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (winner
        = team1 OR winner = team2) ELSE TRUE END", "winner_is_one_of_teams_for_decided_matches",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
