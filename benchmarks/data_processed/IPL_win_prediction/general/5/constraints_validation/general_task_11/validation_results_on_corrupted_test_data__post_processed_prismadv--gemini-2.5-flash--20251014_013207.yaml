results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("`result` = ''no result'' OR `target_overs` IS NULL
        OR `target_overs` > 0", "target_overs must be positive for valid results",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("target_overs", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.hasCompleteness("result_margin", lambda x: x >= 0.989)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness("result_margin", lambda x:
        x >= 0.989)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') AND result_margin
        IS NOT NULL AND result_margin != FLOOR(result_margin) THEN 0 ELSE 1 END",
        "Result Margin is Integer or Truncation is Acceptable", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN CASE
        WHEN result_margin IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Result Margin
        Not Null for Runs/Wickets", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness("target_runs", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative("target_runs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: '.satisfies("LOWER(TRIM(toss_decision)) IN (''field'', ''bat'')",
        "Normalized toss_decision values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''super_over'', [''Y'', ''N''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.hasCompleteness("toss_winner", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("CASE WHEN try_to_timestamp(`date`) IS NOT NULL THEN
        1 ELSE 0 END", "Date Parsability", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete(column='season')
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("`method` IS NULL OR `method` IN (''D/L'', '''', ''NA'',
        ''NaN'', ''nan'', ''NULL'', ''Null'', ''null'', ''None'', ''NullValue'')",
        "Expected Method Values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: '.hasCompleteness("id", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness(["id"], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("LOWER(TRIM(toss_decision)) IN (''field'', ''bat'')",
        "ValidTossDecisionValues", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("YEAR(TO_DATE(date, ''yyyy-MM-dd'')) = CAST(season AS
        INT)", "DateSeasonConsistency", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result != ''no result'' THEN winner IS NOT
        NULL ELSE TRUE END", "Winner not null when result is not ''no result''", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NOT NULL THEN winner = team1 OR
        winner = team2 ELSE TRUE END", "Winner is a valid team or null", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.satisfies("LOWER(TRIM(result)) IN (''runs'', ''wickets'', ''tie'',
        ''no result'')", "Allowed Result Values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["loser","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN winner IS NOT NULL THEN (winner = team1 OR
        winner = team2) ELSE TRUE END", "Winner must be one of the playing teams",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 != team2", "Team1 and Team2 must be distinct",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''tie'', ''runs'', ''wickets'')
        THEN winner IS NOT NULL ELSE TRUE END", "Winner must not be null for decisive
        results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["method","target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `target_overs` IS NULL OR `target_overs`
        > 0 THEN 1 ELSE 0 END", "Target Overs Positive or Null", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (`method` IS NULL OR `method` != ''D/L'')
        OR (`target_runs` IS NOT NULL AND `target_overs` IS NOT NULL) THEN 1 ELSE
        0 END", "Target Runs/Overs Not Null for D/L Method", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' OR result = ''wickets''
        THEN result_margin IS NOT NULL ELSE TRUE END", "Result Margin Not Null For
        Runs/Wickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''tie'' OR result = ''no result''
        THEN result_margin IS NULL ELSE TRUE END", "Result Margin Null For Tie/No
        Result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("`result` = ''tie'' AND `super_over` = ''Y'' OR `result`
        != ''tie'' AND `super_over` = ''N''", "Tie implies Super Over", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        `result_margin` IS NOT NULL AND `result_margin` >= 0 ELSE TRUE END", "Result
        Margin Valid for Runs/Wickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        `winner` IS NOT NULL ELSE TRUE END", "Winner Not Null for Runs/Wickets", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `target_overs` = 0 AND `target_runs` != 0
        THEN 0 ELSE 1 END", "Target Overs/Runs Zero Implication", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner","winner"]':
    code:
    - suggestion: .satisfies("winner IS NULL OR (winner = team1 OR winner = team2)",
        "Winner must be one of the teams if not null")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("toss_winner = team1 OR toss_winner = team2", "Toss winner
        must be one of the teams")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("team1 <> team2", "team1 and team2 must be distinct")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner must be one of the playing teams or null", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 != team2", "Teams in a match must be distinct",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT ((result = ''tie'' OR result = ''runs'' OR result
        = ''wickets'') AND winner IS NULL)", "Winner must be present for definitive
        results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
