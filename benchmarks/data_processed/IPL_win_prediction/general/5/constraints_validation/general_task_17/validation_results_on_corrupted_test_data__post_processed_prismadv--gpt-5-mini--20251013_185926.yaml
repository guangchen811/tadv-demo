results:
  team1:
    code:
    - suggestion: '.satisfies("CASE WHEN TRIM(`team1`) <> '''' THEN 1 ELSE 0 END",
        "team1_non_empty_trimmed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `team1` <> `team2` THEN 1 ELSE 0 END", "team1_diff_team2",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        AND `winner` IS NOT NULL THEN CASE WHEN `winner` = `team1` OR `winner` = `team2`
        THEN 1 ELSE 0 END ELSE 1 END", "winner_matches_team", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.satisfies("CASE WHEN `team2` IS NOT NULL AND trim(`team2`) !=
        '''' THEN 1 ELSE 0 END", "team2_not_null_nonempty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `team1` IS NOT NULL AND `team2` IS NOT NULL
        AND `team1` != `team2` THEN 1 ELSE 0 END", "teams_different", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(`team2`) = `team2` THEN 1 ELSE 0 END",
        "team2_no_extra_whitespace", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN `target_overs` IS NOT NULL THEN 1 ELSE 0
        END", "Non-null target_overs fraction", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN `target_overs`
        IS NOT NULL AND TRY_CAST(`target_overs` AS DOUBLE) IS NOT NULL THEN 1 ELSE
        0 END ELSE 1 END", "D/L rows have numeric target_overs", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_overs` IS NOT NULL THEN CASE WHEN
        TRY_CAST(`target_overs` AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE 1 END", "Positive
        target_overs when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE
        WHEN `result_margin` RLIKE ''^[0-9]+(\\.[0-9]+)?$'' THEN 1 ELSE 0 END ELSE
        1 END", "result_margin_is_numeric_for_decisive_results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN CASE WHEN `result_margin`
        IS NOT NULL AND CAST(`result_margin` AS DOUBLE) BETWEEN 1 AND 10 AND floor(CAST(`result_margin`
        AS DOUBLE)) = CAST(`result_margin` AS DOUBLE) THEN 1 ELSE 0 END ELSE 1 END",
        "wickets_margin_integer_1_10", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NOT NULL THEN 1 ELSE 0 END",
        "Non-null fraction of target_runs", lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `target_runs` IS NOT NULL
        THEN 1 ELSE 0 END", "Non-null fraction of target_runs", lambda x: x >= 0.998)''
        failed on data sample: Value: 0.9945504087193461 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL THEN 1 WHEN CAST(`target_runs`
        AS DOUBLE) >= 0 AND ABS(ROUND(CAST(`target_runs` AS DOUBLE)) - CAST(`target_runs`
        AS DOUBLE)) < 1e-9 THEN 1 ELSE 0 END", "target_runs non-negative integer-like",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' AND `target_runs` IS NOT
        NULL THEN (CASE WHEN `target_overs` IS NOT NULL AND TRY_CAST(`target_overs`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END) ELSE 1 END", "D/L rows have numeric
        target_overs when target_runs present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(`toss_decision`)) IN (''field'',''bat'')
        THEN 1 ELSE 0 END", "toss_decision_expected_categories", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.isContainedIn(''super_over'', [''Y'',''N''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `toss_winner` IS NOT NULL AND trim(`toss_winner`)
        <> '''' THEN 1 ELSE 0 END", "toss_winner non-null and non-blank", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` = trim(`toss_winner`) THEN
        1 ELSE 0 END", "toss_winner trimmed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `toss_winner` IN (`team1`, `team2`) THEN
        1 ELSE 0 END", "toss_winner is team1 or team2", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: .isComplete("date")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN to_timestamp(`date`) IS NOT NULL THEN 1 ELSE
        0 END", "Parseable dates", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern("date", r"^\d{4}-\d{2}-\d{2}$", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN regexp_like(cast(`season` AS STRING), ''^[0-9]+$'')
        THEN 1 ELSE 0 END", "season_integer_like", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasNumberOfDistinctValues(''city'', lambda x: x <= 100, None,
        100)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN `target_overs`
        IS NOT NULL AND `target_overs` rlike ''^[0-9]+(\\.[0-9]+)?$'' THEN 1 ELSE
        0 END ELSE 1 END", "D/L requires numeric target_overs", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN `target_runs`
        IS NULL OR `target_runs` rlike ''^[0-9]+(\\.[0-9]+)?$'' THEN 1 ELSE 0 END
        ELSE 1 END", "When method=''D/L'' target_runs must be numeric or null", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL OR `method` = ''D/L'' THEN
        1 ELSE 0 END", "Non-null method values should be exactly ''D/L'' (or null)",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: warning
  venue:
    code:
    - suggestion: '.satisfies("CASE WHEN trim(`venue`) <> '''' THEN 1 ELSE 0 END",
        "Venue non-empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL THEN 1 ELSE 0 END", "Detect
        null winners", lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') OR (`result`
        = ''tie'' AND `winner` IS NOT NULL) THEN CASE WHEN `winner` IS NOT NULL AND
        `winner` IN (`team1`,`team2`) THEN 1 ELSE 0 END ELSE 1 END", "Winner present
        and valid for decisive results and Super Over ties", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL THEN CASE WHEN `winner`
        IN (`team1`,`team2`) THEN 1 ELSE 0 END ELSE 1 END", "Winner matches one of
        the competing teams in the same row", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "result_allowed_categories", lambda x: x >=
        0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'')
        THEN (result_margin IS NOT NULL AND cast(result_margin AS double) IS NOT NULL)
        ELSE true END", "result_margin_numeric_for_decisive_results", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) = ''tie'' AND winner
        IS NOT NULL THEN CASE WHEN winner IN (team1, team2) THEN 1 ELSE 0 END ELSE
        1 END", "tie_winner_in_team1_or_team2", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["method","target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("(method IS NULL OR method != ''D/L'' OR (target_overs
        IS NOT NULL AND try_cast(target_overs AS double) IS NOT NULL AND try_cast(target_overs
        AS double) > 0))", "DL_target_overs_present_and_positive", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("method != ''D/L'' OR target_runs IS NULL OR floor(try_cast(target_runs
        AS double)) = try_cast(target_runs AS double)", "DL_target_runs_integer_when_present",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("team1 <> team2", "teams_different", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_is_participant",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (lower(result) IN (''runs'',''wickets'')) OR (winner
        IS NOT NULL AND winner <> '''' AND (winner = team1 OR winner = team2))", "winner_valid_for_runs_wickets",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (lower(result) = ''tie'' AND winner IS NOT NULL
        AND winner <> '''') OR (winner = team1 OR winner = team2)", "tie_winner_valid_if_present",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
