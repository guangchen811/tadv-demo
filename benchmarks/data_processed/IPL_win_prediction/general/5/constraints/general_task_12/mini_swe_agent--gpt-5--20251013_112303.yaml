raw_constraints:
- column_name: id
  code_for_constraint: .isComplete('id')
- column_name: id
  code_for_constraint: .isUnique('id')
- column_name: season
  code_for_constraint: .isComplete('season')
- column_name: season
  code_for_constraint: .isNonNegative('season')
- column_name: date
  code_for_constraint: .isComplete('date')
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: toss_decision
  code_for_constraint: .isContainedIn('toss_decision', ['bat', 'field'])
- column_name: toss_winner
  code_for_constraint: .isComplete('toss_winner')
- column_name: toss_winner
  code_for_constraint: .satisfies("(toss_winner = team1) OR (toss_winner = team2)",
    'toss_winner_in_teams')
- column_name: result
  code_for_constraint: .isComplete('result')
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
- column_name: super_over
  code_for_constraint: .isContainedIn('super_over', ['Y', 'N'])
- column_name: result_margin
  code_for_constraint: .isNonNegative('result_margin')
- column_name: result_margin
  code_for_constraint: .satisfies("(result IN ('runs', 'wickets') AND result_margin
    IS NOT NULL) OR (result NOT IN ('runs', 'wickets'))", 'margin_present_for_decided')
- column_name: winner
  code_for_constraint: .satisfies("(result IN ('runs', 'wickets') AND winner IS NOT
    NULL) OR (result NOT IN ('runs', 'wickets'))", 'winner_present_for_decided')
- column_name: winner
  code_for_constraint: .satisfies("(result != 'no result') OR winner IS NULL", 'no_winner_for_no_result')
- column_name: winner
  code_for_constraint: .satisfies("(result != 'tie' OR super_over = 'Y') OR winner
    IS NULL", 'no_winner_when_tie_without_superover')
- column_name: winner
  code_for_constraint: .satisfies("(result != 'tie' OR super_over != 'Y') OR winner
    IS NOT NULL", 'winner_present_when_tie_with_superover')
- column_name: method
  code_for_constraint: .satisfies("(method != 'D/L') OR (target_runs IS NOT NULL AND
    target_overs IS NOT NULL)", 'dls_has_targets')
- column_name: target_runs
  code_for_constraint: .isNonNegative('target_runs')
- column_name: target_overs
  code_for_constraint: .isNonNegative('target_overs')
