constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda v: v >= 0.98)'
      - Valid
    assumptions: []
  date:
    code:
    - - .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  date,season:
    code:
    - - .satisfies('year(to_date(date)) = season', 'season_matches_date_year')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Eliminator', 'Qualifier 1', 'Qualifier
        2', 'Final', 'Elimination Final', 'Semi Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("(method IS NULL) OR (method = 'D/L')", 'method_is_dl_or_null')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result,super_over:
    code:
    - - .satisfies("(result != 'tie') OR (super_over = 'Y')", 'tie_requires_super_over')
      - Valid
    - - .satisfies("(super_over != 'Y') OR (result = 'tie')", 'super_over_implies_tie')
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      - Valid
    assumptions: []
  result_margin,result:
    code:
    - - .satisfies("(result = 'no result') OR (result_margin >= 0)", 'non_negative_margin_or_nr')
      - Invalid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', ConstrainableDataTypes.Integral)
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Valid
    - - .satisfies('(target_overs IS NULL) OR (target_overs > 0 AND target_overs <=
        20)', 'target_overs_in_0_20')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Valid
    - - .satisfies('(target_runs IS NULL) OR (target_runs > 0)', 'target_runs_positive_if_present')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1,team2:
    code:
    - - .satisfies('team1 != team2', 'teams_are_distinct')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  toss_winner,team1,team2:
    code:
    - - .satisfies('(toss_winner = team1 OR toss_winner = team2)', 'toss_winner_is_a_team')
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  winner,result:
    code:
    - - .satisfies("(result != 'no result') OR (winner IS NULL)", 'no_result_has_no_winner')
      - Valid
    assumptions: []
  winner,team1,team2,result:
    code:
    - - .satisfies("(result = 'no result') OR (winner = team1 OR winner = team2)",
        'winner_is_a_participating_team_when_result')
      - Valid
    assumptions: []
