raw_constraints:
- column_name: id
  code_for_constraint: .isComplete('id')
- column_name: id
  code_for_constraint: .isUnique('id')
- column_name: match_type
  code_for_constraint: .isComplete('match_type')
- column_name: match_type
  code_for_constraint: .isContainedIn('match_type', ['League', 'Playoff', 'Qualifier',
    'Eliminator', 'Final'])
- column_name: date
  code_for_constraint: .isComplete('date')
- column_name: date
  code_for_constraint: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
- column_name: season
  code_for_constraint: .isComplete('season')
- column_name: season
  code_for_constraint: .isNonNegative('season')
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: team1,team2
  code_for_constraint: '.satisfies("team1 != team2", ''Team1NotEqualTeam2'', lambda
    v: v == 1.0)'
- column_name: result
  code_for_constraint: .isComplete('result')
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs', 'wickets', 'no result', 'tie'])
- column_name: super_over
  code_for_constraint: .isComplete('super_over')
- column_name: super_over
  code_for_constraint: .isContainedIn('super_over', ['Y', 'N'])
- column_name: winner,result,team1,team2
  code_for_constraint: '.satisfies("(result = ''no result'') OR ((winner = team1 OR
    winner = team2))", ''WinnerMustBeATeamWhenDecided'', lambda v: v == 1.0)'
- column_name: winner,result
  code_for_constraint: '.satisfies("(result = ''no result'') OR (winner IS NOT NULL)",
    ''WinnerPresentWhenNotNoResult'', lambda v: v == 1.0)'
- column_name: result,super_over
  code_for_constraint: '.satisfies("(result != ''tie'') OR (super_over = ''Y'')",
    ''TieImpliesSuperOver'', lambda v: v == 1.0)'
- column_name: result,super_over
  code_for_constraint: '.satisfies("(super_over != ''Y'') OR (result = ''tie'')",
    ''SuperOverImpliesTie'', lambda v: v == 1.0)'
