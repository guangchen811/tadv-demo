    assumptions:
    - text: 'The ''super_over'' column must be present and non-null for the input
        rows that the script processes (the code filters to match_type == ''League''
        and never fills or handles missing super_over values before using them). You
        can express this as a Great Expectations rule like: expect_column_values_to_not_be_null(''super_over'')
        (or conditional: for rows where match_type == ''League'', expect_column_values_to_not_be_null(''super_over'')).
        In Deequ you could enforce completeness for League rows by checking completeness
        on a filtered dataset or a custom satisfies predicate.'
      sources:
      - start_line: 9
        end_line: 12
        file: ''
      - start_line: 28
        end_line: 28
        file: ''
      uid: 3bbcccc8-42d3-41e0-9b5a-75c8e646c77a
    - text: 'The ''super_over'' column is expected to be a binary categorical string
        with exactly two allowed, case-sensitive values: ''Y'' (super over played)
        or ''N'' (no super over). The code compares to the literal ''Y'' so other
        values or case variants may be treated as False/incorrect. Great Expectations:
        expect_column_values_to_be_in_set(''super_over'', [''Y'',''N'']). Deequ example:
        .satisfies("CASE WHEN `super_over` IN (''Y'',''N'') THEN 1 ELSE 0 END", ''super_over_is_Y_or_N'',
        lambda x: x == 1.0).'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 28
        end_line: 28
        file: ''
      uid: 4cb491d2-b9fb-4dcb-83a2-c7bd850aea4f
    - text: 'There must be logical consistency between ''result'' and ''super_over'':
        when a match is a tie after regulation overs (i.e., result indicates a tie),
        ''super_over'' should be ''Y''; conversely, if ''super_over'' == ''Y'' then
        the match result should reflect a tie (not ''no result'' or a normal winner).
        You can express this as two conditional validations. Example Deequ predicates:
        1) tie implies super over: .satisfies("CASE WHEN `result` IN (''tie'',''tie
        after 20 overs'') THEN CASE WHEN `super_over` = ''Y'' THEN 1 ELSE 0 END ELSE
        1 END", ''tie_implies_super_over'', lambda x: x == 1.0) 2) super over implies
        tie: .satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN `result` IN
        (''tie'',''tie after 20 overs'') THEN 1 ELSE 0 END ELSE 1 END", ''super_over_implies_tie'',
        lambda x: x == 1.0). (Adjust the exact strings used for ''result'' to match
        your dataset''s tie labels.)'
      sources:
      - start_line: 18
        end_line: 19
        file: ''
      - start_line: 27
        end_line: 30
        file: ''
      uid: 353d0ef4-e509-4a06-a18f-64a12d5e940c
