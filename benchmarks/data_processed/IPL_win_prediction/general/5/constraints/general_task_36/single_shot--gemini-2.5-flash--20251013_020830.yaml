constraints:
  batting_first:
    code:
    - - .satisfies("batting_first != chasing_team", "batting_first and chasing_team
        must be distinct")
      - Invalid
    - - .satisfies("batting_first IN (team1, team2)", "batting_first must be one of
        the playing teams")
      - Invalid
    - - .satisfies("batting_first IS NOT NULL", "batting_first should be derived")
      - Invalid
    assumptions: []
  chasing_team:
    code:
    - - .satisfies("chasing_team IN (team1, team2)", "chasing_team must be one of
        the playing teams")
      - Invalid
    - - .satisfies("chasing_team IS NOT NULL", "chasing_team should be derived")
      - Invalid
    assumptions: []
  effective_overs:
    code:
    - - .isPositive('effective_overs')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L'], allow_null=True)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("NOT (result IN ('runs', 'wickets') AND result_margin != floor(result_margin))",
        "result_margin must be integral for runs/wickets results")
      - Valid
    - - .satisfies("NOT (result IN ('runs', 'wickets') AND result_margin IS NULL)",
        "result_margin must not be null for runs/wickets results")
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner must
        be one of the playing teams")
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("NOT (result = 'no result' AND winner IS NOT NULL)", "winner must
        be null for 'no result' matches")
      - Valid
    - - .satisfies("NOT (result = 'tie' AND super_over = 'N' AND winner IS NOT NULL)",
        "winner must be null for non-super-over ties")
      - Valid
    - - .satisfies("NOT (result = 'tie' AND super_over = 'Y' AND winner IS NULL)",
        "winner must not be null for super over ties")
      - Valid
    - - .satisfies("NOT (result = 'tie' AND super_over = 'Y' AND winner NOT IN (team1,
        team2))", "winner must be one of the playing teams for super over ties")
      - Valid
    - - .satisfies("NOT (result IN ('runs', 'wickets') AND winner IS NULL)", "winner
        must not be null for runs/wickets results")
      - Valid
    - - .satisfies("NOT (result IN ('runs', 'wickets') AND winner NOT IN (team1, team2))",
        "winner must be one of the playing teams for runs/wickets results")
      - Valid
    assumptions: []
