results:
  team1:
    code:
    - suggestion: '.hasCompleteness(''team1'', lambda c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(match_type <> ''League'') OR (team1 IS NOT NULL AND
        LENGTH(TRIM(team1)) > 0 AND team1 = TRIM(team1))", "team1 trimmed and non-empty
        for League rows", lambda d: d == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: '.satisfies("(match_type <> ''League'') OR (result = ''no result'')
        OR (winner = team1) OR (winner = team2)", "winner_matches_one_team_in_row",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(match_type <> ''League'') OR (length(trim(team2))
        > 0 AND team2 = trim(team2))", "team2_trimmed_nonempty_for_league", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(match_type <> ''League'') OR (team1 <> team2)", "distinct_teams_per_match",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''team2'', lambda x: x >= 10 and x <= 30)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: '.hasCompleteness(''match_type'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''match_type'', [''League'',''Qualifier 1'',''Qualifier
        2'',''Eliminator'',''Semi Final'',''Final'',''Elimination Final''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''match_type = TRIM(match_type)'', ''No surrounding
        whitespace in match_type'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN match_type = \''League\'' THEN 1 ELSE 0
        END'', ''Has League rows'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN match_type = \''League\'' THEN 1 ELSE 0
        END'', ''League share >= 0.85'', lambda x: x >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''runs''
        THEN target_overs > 0 ELSE true END", ''positive target_overs where used'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("NOT (`match_type` = ''League'' AND `result` IN (''runs'',
        ''wickets'')) OR CAST(`result_margin` AS DOUBLE) IS NOT NULL", "result_margin
        present and numeric for League runs/wickets", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`match_type` = ''League'' AND `result` = ''runs'')
        OR CAST(`result_margin` AS DOUBLE) > 0", "positive result_margin for League
        runs results", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`match_type` = ''League'' AND `result` = ''wickets'')
        OR (CAST(`result_margin` AS DOUBLE) BETWEEN 1 AND 10 AND CAST(`result_margin`
        AS DOUBLE) = CAST(CAST(`result_margin` AS DOUBLE) AS INT))", "integer 1-10
        result_margin for League wickets results", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`result_margin` IS NULL OR CAST(`result_margin` AS
        DOUBLE) >= 0", "non-negative result_margin when present", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL THEN 0 WHEN CAST(`target_runs`
        AS STRING) RLIKE ''^-?[0-9]+(\\.[0-9]+)?$'' THEN 1 ELSE 0 END", "target_runs
        numeric-like >= 99%", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL THEN 1 WHEN CAST(`target_runs`
        AS DOUBLE) IS NULL THEN 1 WHEN CAST(`target_runs` AS DOUBLE) >= 0 THEN 1 ELSE
        0 END", "target_runs non-negative when numeric", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR (`season` IS NOT NULL)",
        "Season non-null for League matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' AND `result` IN
        (''runs'',''wickets'',''tie'') THEN CASE WHEN (`winner` = `team1` OR `winner`
        = `team2`) THEN 1 ELSE 0 END ELSE 1 END", "Winner must be one of the two teams",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' AND `result` =
        ''no result'' THEN CASE WHEN `winner` IS NULL THEN 1 ELSE 0 END ELSE 1 END",
        "No-result rows should have null winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''winner'', lambda v: v >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda v: v >=
        0.99)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no result''],
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no
        result''], lambda x: x == 1.0)'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("result = TRIM(result)", "Result trimmed (no leading/trailing
        whitespace)", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN (result_margin IS
        NOT NULL AND target_overs IS NOT NULL AND target_overs > 0) ELSE TRUE END",
        "Runs rows have margin and positive overs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''wickets'' THEN (result_margin
        IS NOT NULL) ELSE TRUE END", "Wickets rows have margin", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("team1 <> team2", "no_self_matches", lambda v: v ==
        1.0).where("match_type = ''League''")'
      status: true
      reason_if_failed: ''
      level: warning
