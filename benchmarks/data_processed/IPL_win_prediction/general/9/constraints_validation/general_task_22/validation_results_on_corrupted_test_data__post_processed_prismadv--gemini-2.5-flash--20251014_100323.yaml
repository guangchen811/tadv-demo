results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("team1", "^[A-Za-z0-9 ]+$", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.satisfies("LENGTH(TRIM(team2)) > 0", "team2 contains valid team
        names", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isContainedIn("match_type", ["League", "Final", "Elimination Final",
        "Eliminator", "Qualifier 2", "Semi Final", "Qualifier 1"])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(`match_type`) = `match_type`", "No leading/trailing
        whitespace", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT ((LOWER(TRIM(`match_type`)) = ''league'' AND TRIM(`match_type`)
        != ''League'') OR (LOWER(TRIM(`match_type`)) = ''final'' AND TRIM(`match_type`)
        != ''Final''))", "Canonical Casing for League and Final", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness("result_margin", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative("result_margin", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: '.satisfies("LOWER(TRIM(toss_decision)) IN (''field'', ''bat'')",
        "Normalized Toss Decision Values are ''field'' or ''bat''", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.satisfies("TRIM(UPPER(super_over)) IN (''Y'', ''N'')", "Normalized
        Super Over Values are Y or N", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss winner must be one of the playing teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete("date")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`date` AS TIMESTAMP) IS NOT NULL
        THEN 1 ELSE 0 END", "Valid Date Strings", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.satisfies("TRIM(season) != ''''", "No empty season after strip",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isPositive(''season'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.hasUniqueness([''season'', ''match_type''], lambda x: x >= 0.056)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("YEAR(date) = CAST(season AS INT)", "Date Year Matches
        Season", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x >=
        0.99)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(result IS NULL OR result IN (''no result'', ''abandoned''))
        OR (winner IS NOT NULL)", "winner_not_null_if_played", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.satisfies("LOWER(TRIM(result)) IN (''runs'', ''wickets'', ''no
        result'', ''tie'')", "result_normalized_values_check", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("LOWER(TRIM(result)) IN (''runs'',
        ''wickets'', ''no result'', ''tie'')", "result_normalized_values_check", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.9509536784741145 does not meet
        the constraint requirement!'
      level: error
  '["match_type","season","winner"]':
    code:
    - suggestion: '.satisfies("NOT (LOWER(TRIM(match_type)) = ''final'' AND winner
        IS NULL)", "WinnerNotNullForFinalMatch", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (date IS NOT NULL AND TRY_CAST(TRIM(season) AS
        INT) IS NOT NULL AND YEAR(date) != CAST(TRIM(season) AS INT))", "DateSeasonTemporalConsistency",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("NOT (lower(trim(result)) = ''runs'') OR (`result_margin`
        IS NOT NULL AND `result_margin` >= 0)", "Valid result_margin for ''runs''
        results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("(result NOT IN (''runs'', ''wickets'')) OR (result_margin
        IS NOT NULL)", "Result Margin Completeness for Runs/Wickets", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","toss_decision","toss_winner","winner"]':
    code:
    - suggestion: '.satisfies("(toss_winner = team1) OR (toss_winner = team2)", "Toss
        winner must be one of the playing teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (result != ''no result'') OR (winner IS NOT NULL
        AND (winner = team1 OR winner = team2))", "If match played, winner must be
        one of team1 or team2", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","toss_winner","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        CASE WHEN `winner` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner not
        null for definitive results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` = `team1` OR `toss_winner`
        = `team2` THEN 1 ELSE 0 END", "Toss winner must be a playing team", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "Toss
        winner must be one of the playing teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "Team1 and Team2 must be distinct",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR (winner = team1 OR winner = team2)",
        "Winner must be one of the playing teams when a match is played", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("team1 <> team2", "Participating teams must be distinct",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: .satisfies("toss_winner = team1 OR toss_winner = team2", "Toss winner
        must be one of the playing teams")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("team1 != team2", "Teams playing must be distinct")
      status: true
      reason_if_failed: ''
      level: error
