results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("winner IS NULL OR team1 = winner OR team2 = winner",
        "WinnerConsistencyCheck")
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete("match_type")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`match_type` = ''League''", "match_type contains ''League''",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: .isPositive("target_overs")
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("result <> ''runs'' OR result_margin > 0", "result_margin_positive_for_runs_result",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.satisfies(''target_runs IS NULL OR target_runs >= 1'', ''target_runs
        must be at least 1'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("(result NOT IN (''runs'', ''wickets'')) OR winner IS
        NOT NULL", "Winner must be specified for decisive results", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner must be one of the playing teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("result <> ''runs'' OR result_margin IS NOT NULL", "result_margin
        must be non-null when result is ''runs''", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","target_runs"]':
    code:
    - suggestion: '.satisfies("result <> ''runs'' OR result_margin IS NOT NULL", "result_margin_completeness_for_runs_result",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'', ''tie'') OR target_runs
        IS NOT NULL", "target_runs_completeness_for_decisive_results", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN winner
        IS NOT NULL AND (winner = team1 OR winner = team2) WHEN result IN (''tie'',
        ''no result'') THEN winner IS NULL ELSE true END", "winner_dependency_on_result",
        lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN result IN (''runs'', ''wickets'')
        THEN winner IS NOT NULL AND (winner = team1 OR winner = team2) WHEN result
        IN (''tie'', ''no result'') THEN winner IS NULL ELSE true END", "winner_dependency_on_result",
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("team1 <> team2", "teams_must_be_distinct", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("`result` <> ''runs'' OR `target_runs` - 1 >= `result_margin`",
        "run_margin_consistency", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`result` NOT IN (''runs'', ''wickets'') OR `winner`
        = `team1` OR `winner` = `team2`", "winner_consistency", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "team1_is_not_team2", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN (winner
        = team1 OR winner = team2) ELSE TRUE END", "winner_must_be_one_of_the_teams",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR (winner IS
        NOT NULL AND (winner = team1 OR winner = team2))", "WinnerMustBeParticipantAndNotNull",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "TeamsMustBeDifferent", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
