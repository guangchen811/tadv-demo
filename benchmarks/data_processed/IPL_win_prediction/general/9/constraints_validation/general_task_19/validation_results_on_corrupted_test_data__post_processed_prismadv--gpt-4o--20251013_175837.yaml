results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: undefined
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isContainedIn('match_type', ['Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      status: true
      reason_if_failed: ''
      level: undefined
  target_overs:
    code:
    - suggestion: '.satisfies(''CASE WHEN method = \''D/L\'' AND target_runs IS NOT
        NULL THEN target_overs IS NOT NULL ELSE TRUE END'', ''Non-null target_overs
        for D/L method'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: undefined
  target_runs:
    code:
    - suggestion: .satisfies("CASE WHEN `method` = 'D/L' THEN `target_runs` IS NOT
        NULL ELSE TRUE END", "Non-null target_runs for D/L method")
      status: true
      reason_if_failed: ''
      level: undefined
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies(''`date` IS NOT NULL'', ''Valid Date Conversion'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: undefined
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .isContainedIn('method', ['D/L'])
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: warning
  '["date","season"]':
    code:
    - suggestion: '.satisfies(''season = year(date)'', ''Season and Date Consistency'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies('result = "no result" OR winner is not NULL', 'Winner
        present where a result exists')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies('winner IS NULL OR winner IN (team1, team2)', 'Winner
        is one of the two teams in the fixture')
      status: true
      reason_if_failed: ''
      level: undefined
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: undefined
  '["result","winner"]':
    code:
    - suggestion: '.satisfies(''CASE WHEN result != "no result" THEN winner IS NOT
        NULL ELSE TRUE END'', ''Winner presence for valid results'', lambda x: x >=
        0.998)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN result IN ("runs", "wickets") THEN winner
        IS NOT NULL AND result_margin IS NOT NULL ELSE TRUE END'', ''Winner and result_margin
        presence for runs or wickets results'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN result == "tie" AND super_over == "Y" THEN
        winner IS NOT NULL ELSE TRUE END'', ''Winner presence for tie with super over'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN result == "no result" THEN winner IS NULL
        ELSE TRUE END'', ''Winner absence for no result'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN `winner` IN
        (`team1`, `team2`) ELSE TRUE END", "Winner should be one of the teams", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' AND `winner` IS NOT NULL
        THEN `winner` IN (`team1`, `team2`) ELSE TRUE END", "Winner should be one
        of the teams in case of a tie", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
