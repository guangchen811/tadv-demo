results:
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("method <> 'D/L' OR (target_runs IS NOT NULL AND target_overs
        IS NOT NULL)", "D/L matches must have target runs and overs specified")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("method <> ''D/L'' OR (target_runs
        IS NOT NULL AND target_overs IS NOT NULL)", "D/L matches must have target
        runs and overs specified")'' failed on data sample: Value: 0.9945504087193461
        does not meet the constraint requirement!'
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''player_of_match'', lambda
        x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .isPositive('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  row-level:
    code:
    - suggestion: .satisfies("super_over <> 'Y' OR result = 'tie'", "A super over
        implies the original result was a tie")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("team1 <> team2", "Opposing teams must be different")
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("season = year(to_date(date))", "Season must match the
        year of the match date")
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("result = 'no result' OR winner IS NOT NULL", "Winner
        must be present if there is a result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner must be one of the competing teams")
      status: true
      reason_if_failed: ''
      level: error
