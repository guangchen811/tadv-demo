constraints:
  date:
    code:
    - - '.hasPattern(''date'', r''^\\d{4}-\\d{2}-\\d{2}$'', lambda v: v == 1.0)'
      - Invalid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - '.hasDataType(''id'', ConstrainableDataTypes.Integral, lambda v: v == 1.0)'
      - Valid
    - - .isComplete('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.hasDataType(''result_margin'', ConstrainableDataTypes.Fractional, lambda
        v: v >= 0.95)'
      - Valid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  row_level:
    code:
    - - '.satisfies("(toss_winner = team1) OR (toss_winner = team2)", ''toss_winner_is_participating_team'',
        lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("CASE WHEN result <> ''no result'' THEN (winner = team1 OR winner
        = team2) ELSE winner IS NULL END", ''winner_is_participating_or_null_when_no_result'',
        lambda v: v >= 0.99)'
      - Valid
    - - '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        > 0 ELSE (result_margin IS NULL OR result_margin = 0) END", ''result_margin_consistent_with_result'',
        lambda v: v >= 0.98)'
      - Valid
    - - '.satisfies("team1 <> team2", ''distinct_teams_each_match'', lambda v: v ==
        1.0)'
      - Valid
    assumptions: []
  season:
    code:
    - - '.hasDataType(''season'', ConstrainableDataTypes.Integral, lambda v: v ==
        1.0)'
      - Valid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - '.hasDataType(''target_overs'', ConstrainableDataTypes.Fractional, lambda
        v: v >= 0.95)'
      - Valid
    - - '.satisfies(''target_overs IS NULL OR (target_overs >= 1 AND target_overs
        <= 50)'', ''target_overs_range'', lambda v: v >= 0.98)'
      - Valid
    assumptions: []
  target_runs:
    code:
    - - '.hasDataType(''target_runs'', ConstrainableDataTypes.Fractional, lambda v:
        v >= 0.95)'
      - Valid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda v: v >= 0.995)'
      - Valid
    assumptions: []
