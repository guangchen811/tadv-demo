constraints:
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .satisfies("result != 'runs' OR (target_overs IS NOT NULL AND target_overs
        > 0)", "'target_overs' must be positive when result is 'runs'")
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
