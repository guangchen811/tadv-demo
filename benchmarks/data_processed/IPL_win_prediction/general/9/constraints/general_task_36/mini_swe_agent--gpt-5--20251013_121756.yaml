raw_constraints:
- column_name: id
  code_for_constraint: .isComplete('id')
- column_name: id
  code_for_constraint: '.hasUniqueness([''id''], lambda x: x == 1.0)'
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: team1
  code_for_constraint: '.satisfies("team1 <> team2", ''distinct_teams_per_match'',
    lambda r: r == 1.0)'
- column_name: toss_winner
  code_for_constraint: .isComplete('toss_winner')
- column_name: toss_winner
  code_for_constraint: '.satisfies("(toss_winner = team1) OR (toss_winner = team2)",
    ''toss_winner_in_teams'', lambda r: r == 1.0)'
- column_name: toss_decision
  code_for_constraint: .isComplete('toss_decision')
- column_name: toss_decision
  code_for_constraint: .isContainedIn('toss_decision', ['bat','field'])
- column_name: result
  code_for_constraint: .isComplete('result')
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs','wickets','tie','no result'])
- column_name: result_margin
  code_for_constraint: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN
    result_margin IS NOT NULL ELSE true END", ''margin_present_when_decided'', lambda
    r: r == 1.0)'
- column_name: result_margin
  code_for_constraint: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN
    result_margin >= 0 ELSE true END", ''margin_nonneg_when_decided'', lambda r: r
    == 1.0)'
- column_name: super_over
  code_for_constraint: .isComplete('super_over')
- column_name: super_over
  code_for_constraint: .isContainedIn('super_over', ['Y','N'])
- column_name: winner
  code_for_constraint: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN
    (winner IS NOT NULL AND (winner = team1 OR winner = team2)) ELSE true END", ''winner_valid_when_decided'',
    lambda r: r == 1.0)'
- column_name: winner
  code_for_constraint: '.satisfies("CASE WHEN result = ''tie'' AND super_over = ''Y''
    THEN (winner IS NOT NULL AND (winner = team1 OR winner = team2)) ELSE true END",
    ''winner_valid_when_super_over'', lambda r: r == 1.0)'
- column_name: winner
  code_for_constraint: '.satisfies("CASE WHEN result = ''no result'' THEN winner IS
    NULL ELSE true END", ''winner_null_when_no_result'', lambda r: r == 1.0)'
- column_name: method
  code_for_constraint: '.satisfies("method = ''D/L'' OR method IS NULL", ''method_value_valid'',
    lambda r: r == 1.0)'
- column_name: target_overs
  code_for_constraint: '.satisfies("CASE WHEN method = ''D/L'' THEN target_overs IS
    NOT NULL AND target_overs >= 0 ELSE true END", ''target_overs_present_if_DL'',
    lambda r: r == 1.0)'
