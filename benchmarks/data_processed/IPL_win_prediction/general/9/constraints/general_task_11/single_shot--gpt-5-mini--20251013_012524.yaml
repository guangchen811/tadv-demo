constraints:
  date:
    code:
    - - .isComplete('date').satisfies('to_date(date) IS NOT NULL', 'date_parseable')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id').isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result').isContainedIn('result', ['runs','wickets','tie','no
        result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .satisfies('result_margin IS NULL OR cast(result_margin as double) IS NOT
        NULL', 'result_margin_numeric_when_present')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season').isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over').isContainedIn('super_over', ['Y','N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .satisfies('target_overs IS NULL OR cast(target_overs as double) IS NOT NULL',
        'target_overs_numeric_when_present')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .satisfies('target_runs IS NULL OR cast(target_runs as double) IS NOT NULL',
        'target_runs_numeric_when_present')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision').isContainedIn('toss_decision', ['field','bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner_in_teams')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies('winner IS NULL OR winner = team1 OR winner = team2', 'winner_in_teams_or_null')
      - Valid
    assumptions: []
