constraints:
  city:
    code:
    - - .hasCompleteness('city', 0.98)
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id').isUnique('id').hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    assumptions: []
  match_type:
    code:
    - - '.isComplete(''match_type'').hasNumberOfDistinctValues(''match_type'', lambda
        x: x <= 7)'
      - Invalid
    assumptions: []
  method:
    code:
    - - .hasCompleteness('method', 0.025)
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .hasCompleteness('player_of_match', 0.99)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result').isContainedIn('result', ['runs', 'wickets', 'tie', 'no
        result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasCompleteness('result_margin', 0.98).hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season').hasDataType('season', ConstrainableDataTypes.Integral)
      - Valid
    assumptions: []
  super_over:
    code:
    - - '.isComplete(''super_over'').isContainedIn(''super_over'', [''Y'', ''N'']).hasNumberOfDistinctValues(''super_over'',
        lambda x: x == 2)'
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - .hasCompleteness('target_overs', 0.99).hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .hasCompleteness('target_runs', 0.99).hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Invalid
    assumptions: []
  team1:
    code:
    - - '.isComplete(''team1'').hasNumberOfDistinctValues(''team1'', lambda x: x <=
        20)'
      - Invalid
    assumptions: []
  team2:
    code:
    - - '.isComplete(''team2'').hasNumberOfDistinctValues(''team2'', lambda x: x <=
        20)'
      - Invalid
    assumptions: []
  toss_decision:
    code:
    - - '.isComplete(''toss_decision'').hasNumberOfDistinctValues(''toss_decision'',
        lambda x: x == 2).isContainedIn(''toss_decision'', [''field'', ''bat''])'
      - Invalid
    assumptions: []
  toss_winner:
    code:
    - - '.isComplete(''toss_winner'').hasNumberOfDistinctValues(''toss_winner'', lambda
        x: x <= 20)'
      - Invalid
    assumptions: []
  umpire1:
    code:
    - - '.isComplete(''umpire1'').hasNumberOfDistinctValues(''umpire1'', lambda x:
        x <= 60)'
      - Invalid
    assumptions: []
  umpire2:
    code:
    - - '.isComplete(''umpire2'').hasNumberOfDistinctValues(''umpire2'', lambda x:
        x <= 60)'
      - Invalid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .hasCompleteness('winner', 0.99)
      - Invalid
    assumptions: []
