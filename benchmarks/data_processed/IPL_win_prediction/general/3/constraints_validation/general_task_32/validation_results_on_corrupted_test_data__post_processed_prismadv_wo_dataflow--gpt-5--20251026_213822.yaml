results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(result) IN (''runs'',''wickets'') THEN
        (winner = team1 OR winner = team2) ELSE TRUE END", ''Winner must be one of
        the two teams for decided matches'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''team1 <> team2'', ''Distinct opponents'', lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''length(trim(team1)) > 0 AND team1 = trim(team1)'',
        ''Clean team1 strings'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: '.satisfies(''length(trim(team2)) > 0'', ''team2_nonempty'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team2 = trim(team2)'', ''team2_trimmed'', lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''team2 <> team1'', ''distinct_opponents'', lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') AND winner
        <> team1 THEN winner = team2 ELSE TRUE END", ''winner_in_pair'', lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''tie'',''no result'') THEN team2
        IS NOT NULL ELSE TRUE END", ''team2_present_on_tie_nr'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''match_type'', [''League'',''Qualifier 1'',''Qualifier
        2'',''Eliminator'',''Semi Final'',''Final'',''Elimination Final''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''TRIM(`match_type`) = `match_type`'', ''No leading/trailing
        whitespace in match_type'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) = ''runs'' THEN CAST(result_margin
        AS DOUBLE) IS NOT NULL AND pmod(CAST(result_margin AS DOUBLE), 1) = 0 AND
        CAST(result_margin AS DOUBLE) BETWEEN 1 AND 200 ELSE TRUE END", "runs: result_margin
        integer in [1,200]", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) = ''wickets'' THEN CAST(result_margin
        AS DOUBLE) IS NOT NULL AND pmod(CAST(result_margin AS DOUBLE), 1) = 0 AND
        CAST(result_margin AS DOUBLE) BETWEEN 1 AND 10 ELSE TRUE END", "wickets: result_margin
        integer in [1,10]", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''tie'',''no result'')
        THEN (result_margin IS NULL OR CAST(result_margin AS DOUBLE) IS NOT NULL)
        ELSE TRUE END", "tie/NR: result_margin unused; if present should be parseable",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("upper(trim(`super_over`)) IN (''Y'',''N'')", "Valid
        super_over flags", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) = ''tie'' THEN CASE
        WHEN upper(trim(`super_over`)) = ''Y'' THEN 1 ELSE 0 END ELSE 1 END", "Tie
        implies super over", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) = ''no result'' THEN
        CASE WHEN upper(trim(`super_over`)) = ''N'' THEN 1 ELSE 0 END ELSE 1 END",
        "No result implies no super over", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''length(trim(`date`)) > 0'', ''Non-empty date'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''to_timestamp(`date`) IS NOT NULL'', ''Parseable date'',
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''date'', ''^\d{4}-\d{2}-\d{2}$'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: '.hasCompleteness(''id'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies(''CASE WHEN lower(trim(result)) IN (\''runs\'',\''wickets\'')
        THEN CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END'',
        ''Winner is one of the two teams for decided matches'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''tie'',''no result'')
        THEN winner IS NULL ELSE true END", "No winner on ties or no result", lambda
        v: v >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(trim(result)) IN
        (''tie'',''no result'') THEN winner IS NULL ELSE true END", "No winner on
        ties or no result", lambda v: v >= 0.99)'' failed on data sample: Value: 0.989100817438692
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''CASE WHEN winner IS NULL THEN 1 ELSE CASE WHEN winner
        = TRIM(winner) THEN 1 ELSE 0 END END'', ''Winner has no leading/trailing whitespace'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.satisfies("lower(trim(`result`)) IN (''runs'',''wickets'',''tie'',''no
        result'')", "Result must be one of the expected categories {runs, wickets,
        tie, no result}", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("lower(trim(`result`)) IN (''runs'',''wickets'',''tie'',''no
        result'')", "Result must be one of the expected categories {runs, wickets,
        tie, no result}", lambda x: x == 1.0)'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`result` IS NOT NULL AND length(trim(`result`)) > 0",
        "Result not empty after trimming", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) IN (''runs'',''wickets'')
        THEN `winner` IS NOT NULL AND `team1` IS NOT NULL AND `team2` IS NOT NULL
        AND (trim(`winner`) = trim(`team1`) OR trim(`winner`) = trim(`team2`)) ELSE
        TRUE END", "For decided matches, winner must be team1 or team2", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) = ''tie'' THEN upper(trim(`super_over`))
        = ''Y'' ELSE TRUE END", "Tied matches should have Super Over = ''Y''", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: .satisfies("(result != 'runs') OR (result_margin IS NOT NULL AND
        result_margin >= 1 AND result_margin <= 200 AND result_margin = floor(result_margin))",
        "runs_margin_range_and_integral")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result != 'wickets') OR (result_margin IS NOT NULL
        AND result_margin >= 1 AND result_margin <= 10 AND result_margin = floor(result_margin))",
        "wickets_margin_range_and_integral")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("((result IN ('runs','wickets')) AND result_margin IS
        NOT NULL) OR ((result IN ('tie','no result')) AND result_margin IS NULL)",
        "margin_presence_matches_result")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("((result IN (''runs'',''wickets''))
        AND result_margin IS NOT NULL) OR ((result IN (''tie'',''no result'')) AND
        result_margin IS NULL)", "margin_presence_matches_result")'' failed on data
        sample: Value: 0.9509536784741145 does not meet the constraint requirement!'
      level: warning
    - suggestion: .satisfies("((result = 'tie') AND super_over = 'Y') OR ((result
        != 'tie') AND (super_over IS NULL OR super_over = 'N'))", "super_over_required_on_tie")
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("((result = ''tie'' AND super_over = ''Y'') OR (result
        <> ''tie'' AND super_over = ''N''))", "tie_super_over_exclusive", lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result <> ''runs'') OR (CAST(result_margin AS DOUBLE)
        IS NOT NULL AND CAST(result_margin AS INT) >= 1 AND CAST(result_margin AS
        DOUBLE) = CAST(CAST(result_margin AS INT) AS DOUBLE))", "runs_margin_present_positive_integer",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result <> ''wickets'') OR (CAST(result_margin AS DOUBLE)
        IS NOT NULL AND CAST(result_margin AS INT) BETWEEN 1 AND 10 AND CAST(result_margin
        AS DOUBLE) = CAST(CAST(result_margin AS INT) AS DOUBLE))", "wickets_margin_integer_1_to_10",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (winner =
        team1 OR winner = team2)", "winner_in_teams_when_decided", lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
