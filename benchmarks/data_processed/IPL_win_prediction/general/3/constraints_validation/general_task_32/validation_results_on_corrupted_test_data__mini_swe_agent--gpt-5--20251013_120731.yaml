results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no
        result''])'' failed on data sample: Value: 0.9509536784741145 does not meet
        the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("(result NOT IN ('runs','wickets')) OR (result_margin
        > 0)", 'positive_margin_when_decided')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result != 'tie') OR (super_over = 'Y')", 'super_over_for_tie')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('team1 != team2', 'teams_distinct')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("(result NOT IN ('runs','wickets')) OR (winner = team1
        OR winner = team2)", 'winner_is_participating')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result NOT IN ('runs','wickets')) OR isnotnull(winner)",
        'winner_present_when_decided')
      status: true
      reason_if_failed: ''
      level: error
