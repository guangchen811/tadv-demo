results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `team1` = trim(`team1`) THEN 1 ELSE 0 END'',
        ''team1_trimmed'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `team1` <> `team2` THEN 1 ELSE 0 END'',
        ''team1_diff_team2'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.hasCompleteness(''team2'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(`team2`) = `team2` THEN 1 ELSE 0 END",
        "No surrounding whitespace", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: '.satisfies("CASE WHEN `match_type` IS NOT NULL THEN 1 ELSE 0 END",
        "match_type_non_null", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `match_type` IN (''League'',''Qualifier 1'',''Qualifier
        2'',''Final'',''Eliminator'',''Elimination Final'',''Semi Final'') THEN 1
        ELSE 0 END", "match_type_in_expected_set", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN trim(`match_type`) = `match_type` THEN 1
        ELSE 0 END", "match_type_no_surrounding_whitespace", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`result_margin` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "result_margin numeric or convertible", lambda x:
        x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN TRY_CAST(`result_margin`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "result_margin numeric or convertible",
        lambda x: x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' AND `winner` IS NOT NULL
        THEN CASE WHEN TRY_CAST(`result_margin` AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE
        1 END", "runs margin positive for winning team", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' AND `winner` IS NOT
        NULL THEN CASE WHEN TRY_CAST(`result_margin` AS BIGINT) BETWEEN 1 AND 10 THEN
        1 ELSE 0 END ELSE 1 END", "wickets margin within 1..10 for winning team",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'',''no result'') THEN
        CASE WHEN TRY_CAST(`result_margin` AS DOUBLE) IS NULL OR TRY_CAST(`result_margin`
        AS DOUBLE) = 0 THEN 1 ELSE 0 END ELSE 1 END", "margin null or zero for tie/no
        result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(`toss_decision`)) IN (''field'',''bat'')
        THEN 1 ELSE 0 END", "toss_decision_in_expected", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(`toss_decision`) <> '''' THEN 1 ELSE
        0 END", "toss_decision_not_empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.satisfies("CASE WHEN upper(trim(super_over)) IN (''Y'',''N'')
        THEN 1 ELSE 0 END", "super_over_in_{Y,N}", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN super_over IS NOT NULL AND trim(super_over)
        <> '''' THEN 1 ELSE 0 END", "super_over_not_null_or_empty", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete("toss_winner")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` = `team1` OR `toss_winner`
        = `team2` THEN 1 ELSE 0 END", "toss_winner_matches_side", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(`toss_winner`)) = lower(trim(`team1`))
        OR lower(trim(`toss_winner`)) = lower(trim(`team2`)) THEN 1 ELSE 0 END", "toss_winner_matches_normalized_side",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` IS NOT NULL OR `method` IS NULL
        THEN 1 ELSE 0 END", "Method Column Exists", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''method'', lambda x: x >= 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` IN (''D/L'') OR `method` IS NULL
        THEN 1 ELSE 0 END", "Method Allowed Values", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN (`result` IN (''runs'',''wickets'') OR (`result`
        = ''tie'' AND `super_over` = ''Y'')) THEN CASE WHEN `winner` IS NOT NULL AND
        `winner` IN (`team1`, `team2`) THEN 1 ELSE 0 END ELSE 1 END", "winner_present_for_decisive_matches",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL THEN CASE WHEN `winner`
        IN (`team1`, `team2`) THEN 1 ELSE 0 END ELSE 1 END", "winner_in_participants_if_present",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRIM(`winner`) IS NOT NULL THEN CASE WHEN
        TRIM(`winner`) IN (TRIM(`team1`), TRIM(`team2`)) THEN 1 ELSE 0 END ELSE 1
        END", "trimmed_winner_matches_trimmed_participants", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL AND NOT (`result` = ''no
        result'' OR (`result` = ''tie'' AND `super_over` != ''Y'')) THEN 0 ELSE 1
        END", "null_winner_only_for_no_result_or_tie_without_super_over", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "Valid result categories", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(trim(result)) IN
        (''runs'',''wickets'',''tie'',''no result'') THEN 1 ELSE 0 END", "Valid result
        categories", lambda x: x == 1.0)'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasCompleteness("result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN `result`
        = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "super_over_implies_tie", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` IS NOT NULL THEN CASE WHEN
        `toss_decision` IS NOT NULL AND trim(`toss_decision`) <> '''' THEN 1 ELSE
        0 END ELSE 1 END", "toss_decision_present_when_toss_made", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
