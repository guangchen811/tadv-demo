results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN LENGTH(TRIM(team1)) > 0 THEN 1 ELSE 0 END'',
        ''team1 trimmed and non-empty'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN team1 IS NOT NULL AND team2 IS NOT NULL
        AND team1 <> team2 THEN 1 ELSE 0 END'', ''fixture teams are distinct'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''no
        result'' THEN CASE WHEN team1 IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", ''team1
        present for NR league rows'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN winner IS NULL THEN 1 WHEN winner = team1
        OR winner = team2 THEN 1 ELSE 0 END'', ''winner is one of fixture teams'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team2 = trim(team2)", "team2_trimmed", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("team2", "^[A-Za-z0-9 .&()''-]+$", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(winner IS NULL) OR (winner = team1 OR winner = team2)",
        "winner_in_teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "distinct_teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasNumberOfDistinctValues("team2", lambda x: (x >= 2) and (x <=
        40), None, 1000)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete("match_type")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn("match_type", ["League", "Final", "Qualifier 1",
        "Qualifier 2", "Eliminator", "Elimination Final", "Semi Final"], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' THEN 1 ELSE 0 END",
        "Has League matches", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `match_type` = TRIM(`match_type`) THEN 1
        ELSE 0 END", "No leading/trailing whitespace", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN CAST(target_overs AS
        DOUBLE) > 0 ELSE TRUE END", "D/L target_overs positive", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN result_margin IS NOT NULL AND CAST(result_margin AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END ELSE 1 END", "result_margin present and numeric for decisive
        results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') AND result_margin
        IS NOT NULL THEN CASE WHEN CAST(result_margin AS DOUBLE) IS NOT NULL AND (CAST(result_margin
        AS DOUBLE) - CAST(result_margin AS INT)) = 0 THEN 1 ELSE 0 END ELSE 1 END",
        "result_margin integral when used", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') AND result_margin
        IS NOT NULL THEN CASE WHEN CAST(result_margin AS DOUBLE) IS NOT NULL AND CAST(result_margin
        AS DOUBLE) >= 1 THEN 1 ELSE 0 END ELSE 1 END", "result_margin positive for
        wins", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''wickets'' AND result_margin IS
        NOT NULL THEN CASE WHEN CAST(result_margin AS DOUBLE) BETWEEN 1 AND 10 THEN
        1 ELSE 0 END ELSE 1 END", "wickets margin within cricket rules", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''tie'',''no result'') THEN CASE
        WHEN result_margin IS NULL THEN 1 ELSE 0 END ELSE 1 END", "no margin for ties/NR",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN (CAST(`target_runs`
        AS DOUBLE) IS NOT NULL AND CAST(`target_runs` AS DOUBLE) = CAST(CAST(`target_runs`
        AS DOUBLE) AS BIGINT)) ELSE true END", "DLS target_runs integer-valued when
        method is D/L", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN (CAST(`target_runs`
        AS DOUBLE) IS NOT NULL AND CAST(`target_runs` AS DOUBLE) >= 0) ELSE true END",
        "DLS target_runs non-negative when method is D/L", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result <> ''tie'' THEN CASE WHEN super_over
        = ''N'' THEN 1 ELSE 0 END ELSE 1 END", "No SO for non-ties", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN super_over = ''Y'' THEN CASE WHEN winner
        IS NOT NULL AND (winner = team1 OR winner = team2) THEN 1 ELSE 0 END ELSE
        1 END", "SO has valid winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("CASE WHEN to_timestamp(`date`) IS NOT NULL THEN 1 ELSE
        0 END", "Date parseable", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN to_timestamp(`date`) IS NULL OR CAST(`season`
        AS INT) IS NULL THEN 1 WHEN year(to_timestamp(`date`)) = CAST(`season` AS
        INT) THEN 1 ELSE 0 END", "Year matches season", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(CAST(`season` AS DOUBLE) = CAST(CAST(`season` AS DOUBLE)
        AS BIGINT))", "Season is whole number", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.isContainedIn(''method'', [''D/L''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN `target_runs`
        IS NOT NULL AND `target_overs` IS NOT NULL AND CAST(`target_runs` AS DOUBLE)
        IS NOT NULL AND CAST(`target_overs` AS DOUBLE) IS NOT NULL AND CAST(`target_overs`
        AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE 1 END", "D/L requires valid target fields",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("typeof(`method`) = ''string''", "Method is textual",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: warning
  venue:
    code:
    - suggestion: '.satisfies("TRIM(`venue`) <> ''''", "Non-empty venue", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasNumberOfDistinctValues(''venue'', lambda v: v <= 60, None,
        1000)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' THEN CASE WHEN winner
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner present when result exists",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN result <> ''no result''
        THEN CASE WHEN winner IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner present
        when result exists", lambda x: x == 1)'' failed on data sample: Value: 0.9945504087193461
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NULL THEN 1 ELSE CASE WHEN winner
        = team1 OR winner = team2 THEN 1 ELSE 0 END END", "Winner equals one of the
        fixture teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN CASE WHEN winner
        IS NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner null for no-result matches",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.hasCompleteness(''result'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no result''],
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no
        result''], lambda x: x == 1.0)'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result <> ''no
        result'' THEN CASE WHEN winner IN (team1, team2) THEN 1 ELSE 0 END ELSE 1
        END", "League non-NR rows must have valid winner", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN match_type = ''League''
        AND result <> ''no result'' THEN CASE WHEN winner IN (team1, team2) THEN 1
        ELSE 0 END ELSE 1 END", "League non-NR rows must have valid winner", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN winner IN (team1, team2) AND result_margin IS NOT NULL AND CAST(result_margin
        AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE 1 END", "Runs/Wickets rows must have
        winner and positive margin", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["method","target_overs","target_runs"]':
    code:
    - suggestion: .satisfies("CASE WHEN method = 'D/L' THEN (target_runs IS NOT NULL
        AND target_overs IS NOT NULL AND target_overs > 0) ELSE TRUE END", "dls_fields_present_and_valid")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("match_type <> 'League' OR result = 'no result' OR (winner
        IS NOT NULL AND (winner = team1 OR winner = team2))", "winner_is_one_of_fixture_teams")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("match_type <> ''League'' OR result
        = ''no result'' OR (winner IS NOT NULL AND (winner = team1 OR winner = team2))",
        "winner_is_one_of_fixture_teams")'' failed on data sample: Value: 0.9945504087193461
        does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies("NOT(result IN ('runs','wickets')) OR (winner IS NOT
        NULL AND result_margin IS NOT NULL AND CAST(result_margin AS DOUBLE) > 0)",
        "margin_and_winner_required_for_decisive_results")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("super_over <> 'Y' OR (result = 'tie' AND winner IS NOT
        NULL)", "super_over_implies_tie_and_winner")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("team1 <> team2", "teams_must_be_distinct")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("date IS NULL OR season = year(date)", "season_matches_date_year")
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("(match_type <> ''League'' OR result = ''no result''
        OR (winner IS NOT NULL AND (winner = team1 OR winner = team2)))", "League
        result rows must have winner present and be one of the teams", lambda v: v
        == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(match_type <> ''League'' OR result
        = ''no result'' OR (winner IS NOT NULL AND (winner = team1 OR winner = team2)))",
        "League result rows must have winner present and be one of the teams", lambda
        v: v == 1.0)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies("(winner IS NULL OR winner = team1 OR winner = team2)",
        "Any present winner must equal team1 or team2", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'') OR (winner IS
        NOT NULL AND (winner = team1 OR winner = team2) AND result_margin IS NOT NULL
        AND CAST(result_margin AS DOUBLE) > 0))", "Runs/wickets results must have
        winner in teams and positive numeric margin", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(super_over <> ''Y'' OR (result = ''tie'' AND winner
        IS NOT NULL AND (winner = team1 OR winner = team2)))", "Super Over implies
        tie result and a valid winner", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "Teams must be different in a match",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
