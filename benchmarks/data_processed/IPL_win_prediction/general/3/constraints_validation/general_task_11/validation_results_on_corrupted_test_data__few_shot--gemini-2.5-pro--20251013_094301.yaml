results:
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x == 1.0, "result
        IN (''runs'', ''wickets'')")'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''result_margin'', lambda x:
        x == 1.0, "result IN (''runs'', ''wickets'')")'' failed on data sample: Value:
        0.9782016348773842 does not meet the constraint requirement! result IN (''runs'',
        ''wickets'')'
      level: error
  target_overs:
    code:
    - suggestion: .isPositive('target_overs')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x == 1.0, "result != ''no
        result''")'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x ==
        1.0, "result != ''no result''")'' failed on data sample: Value: 0.989100817438692
        does not meet the constraint requirement! result != ''no result'''
      level: error
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'winner_is_one_of_the_playing_teams')
      status: true
      reason_if_failed: ''
      level: error
