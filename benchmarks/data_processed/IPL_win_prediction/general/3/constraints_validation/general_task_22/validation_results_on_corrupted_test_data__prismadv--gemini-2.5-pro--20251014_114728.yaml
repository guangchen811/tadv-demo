results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` = TRIM(`team1`) OR `team1` IS NULL", "team1
        contains no leading or trailing whitespace", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team2` <> `team1`", "team2 is different from team1",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Final', 'Elimination Final',
        'Eliminator', 'Qualifier 2', 'Semi Final', 'Qualifier 1'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('TRIM(`match_type`) = `match_type`', 'match_type should
        not have leading or trailing whitespace')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: '.satisfies("toss_decision IS NOT NULL AND lower(trim(toss_decision))
        IN (''field'', ''bat'')", "toss_decision must be either ''field'' or ''bat''
        and not null", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete("super_over")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("trim(upper(super_over)) IN (''Y'', ''N'')", "SuperOverIsValid",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: .isComplete("toss_winner")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_a_participant", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .satisfies("to_date(date) IS NOT NULL", "date_is_parsable")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("CAST(season AS INT) = year(to_date(date))", "season_matches_date_year",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("result = 'no result' OR winner IS NOT NULL", "Winner
        should exist for completed matches")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("result = ''no result'' OR winner
        IS NOT NULL", "Winner should exist for completed matches")'' failed on data
        sample: Value: 0.9945504087193461 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner must be a participant")
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`result`)) IN (''runs'', ''wickets'', ''no
        result'', ''tie'')", "Result values are valid", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("lower(trim(`result`)) IN (''runs'',
        ''wickets'', ''no result'', ''tie'')", "Result values are valid", lambda x:
        x == 1.0)'' failed on data sample: Value: 0.9509536784741145 does not meet
        the constraint requirement!'
      level: error
  '["match_type","season","winner"]':
    code:
    - suggestion: '.satisfies("`match_type` <> ''Final'' OR `winner` IS NOT NULL",
        "WinnerMustBePresentForFinals", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("(LOWER(result) NOT IN (''runs'', ''wickets'') AND result_margin
        IS NULL) OR (LOWER(result) IN (''runs'', ''wickets'') AND result_margin IS
        NOT NULL)", "result_margin should be non-null if and only if result is ''runs''
        or ''wickets''", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(LOWER(result) NOT IN (''runs'',
        ''wickets'') AND result_margin IS NULL) OR (LOWER(result) IN (''runs'', ''wickets'')
        AND result_margin IS NOT NULL)", "result_margin should be non-null if and
        only if result is ''runs'' or ''wickets''", lambda x: x == 1.0)'' failed on
        data sample: Value: 0.9564032697547684 does not meet the constraint requirement!'
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("(result = ''tie'' AND super_over = ''Y'') OR (result
        <> ''tie'' AND super_over = ''N'')", "super_over_result_consistency", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_must_be_a_competing_team", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN LOWER(TRIM(`result`)) IN (''runs'', ''wickets'')
        THEN `winner` IS NOT NULL ELSE TRUE END", "winner_must_exist_for_decisive_results",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN LOWER(TRIM(`result`)) IN (''runs'', ''wickets'')
        THEN `result_margin` RLIKE ''^-?[0-9]*\\.?[0-9]+$'' ELSE TRUE END", "result_margin_must_be_numeric_for_decisive_results",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_must_be_different", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_a_competing_team", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_are_distinct", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_a_playing_team", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_are_distinct", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
