results:
  team1:
    code:
    - suggestion: '.hasCompleteness(''team1'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team1 = trim(team1) AND length(team1) > 0'', ''team1_trimmed_nonempty'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''team1 <> team2'', ''teams_distinct'', lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(toss_winner = team1) OR (toss_winner = team2)'',
        ''toss_winner_in_match_teams'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.hasCompleteness(''team2'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''length(trim(team2)) > 0'', ''team2_non_blank'', lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''team2 = trim(team2)'', ''team2_trimmed'', lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''team2 <> team1'', ''opponents_differ'', lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(toss_decision)) <> ''field'' AND
        toss_winner = team1 THEN team2 IS NOT NULL AND length(trim(team2)) > 0 ELSE
        TRUE END", ''team2_required_when_batting_first'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Final', 'Qualifier 1',
        'Qualifier 2', 'Eliminator', 'Elimination Final', 'Semi Final'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(NOT (lower(trim(match_type)) = ''league'')) OR (match_type
        = ''League'')", ''League value standardized'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) NOT IN (''runs'',''wickets'')
        THEN CASE WHEN `result_margin` IS NULL THEN 1 ELSE 0 END ELSE 1 END", "Margin
        only for runs/wickets", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(trim(`result`))
        NOT IN (''runs'',''wickets'') THEN CASE WHEN `result_margin` IS NULL THEN
        1 ELSE 0 END ELSE 1 END", "Margin only for runs/wickets", lambda x: x == 1)''
        failed on data sample: Value: 0.9564032697547684 does not meet the constraint
        requirement!'
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`toss_decision`)) IN (''field'',''bat'')",
        "valid_toss_decision_values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`toss_decision`)) = ''field''", "has_field_category",
        lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("lower(trim(`toss_decision`)) = ''bat''", "has_bat_category",
        lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.satisfies("upper(trim(`super_over`)) IN (''Y'',''N'')", "super_over
        allowed values Y/N", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("trim(coalesce(`super_over`, '''')) <> ''''", "super_over
        non-null and non-blank", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("upper(trim(`super_over`)) != ''Y''", "super_over Y-rate
        <= 5%", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.hasCompleteness(''toss_winner'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(toss_winner = team1 OR toss_winner = team2)", "Toss
        winner is one of the playing teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("toss_winner = TRIM(toss_winner) AND TRIM(toss_winner)
        <> ''''", "Toss winner trimmed and non-empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.hasCompleteness(''date'', lambda c: c >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN to_timestamp(`date`) IS NOT NULL THEN 1 ELSE
        0 END", "Date parseable", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `date` RLIKE ''^[0-9]{4}-[0-9]{2}-[0-9]{2}$''
        THEN 1 ELSE 0 END", "ISO date format", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRIM(CAST(season AS STRING)) <> '''' THEN
        1 ELSE 0 END", "Season non-empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("season RLIKE ''^[1-9][0-9]*$''", "Season is canonical
        numeric", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("season RLIKE ''^[0-9]+$''", "At least one numeric season",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) <> ''no result'' THEN
        (winner IS NOT NULL AND trim(winner) <> '''') ELSE TRUE END", "Winner present
        for played matches", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(trim(result)) <>
        ''no result'' THEN (winner IS NOT NULL AND trim(winner) <> '''') ELSE TRUE
        END", "Winner present for played matches", lambda x: x == 1)'' failed on data
        sample: Value: 0.9945504087193461 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) <> ''no result'' THEN
        (winner = team1 OR winner = team2) ELSE TRUE END", "Winner must be one of
        the teams for played matches", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(trim(result)) <>
        ''no result'' THEN (winner = team1 OR winner = team2) ELSE TRUE END", "Winner
        must be one of the teams for played matches", lambda x: x == 1)'' failed on
        data sample: Value: 0.9945504087193461 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) <> ''no result'' THEN
        winner = trim(winner) ELSE TRUE END", "Winner trimmed (no leading/trailing
        spaces) on played matches", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(trim(result)) <>
        ''no result'' THEN winner = trim(winner) ELSE TRUE END", "Winner trimmed (no
        leading/trailing spaces) on played matches", lambda x: x == 1)'' failed on
        data sample: Value: 0.9945504087193461 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) = ''no result'' THEN
        (winner IS NULL OR trim(winner) = '''') ELSE TRUE END", "Winner blank or null
        for no-result matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(match_type)) = ''final'' THEN
        (winner IS NOT NULL AND trim(winner) <> '''') ELSE TRUE END", "Finals must
        have a champion (winner present)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "valid_result_domain", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(trim(`result`))
        IN (''runs'',''wickets'',''tie'',''no result'') THEN 1 ELSE 0 END", "valid_result_domain",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9509536784741145 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) = ''no result'' THEN
        1 ELSE 0 END", "no_result_rate", lambda x: x <= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) IN (''runs'',''wickets'')
        THEN 1 ELSE 0 END", "decided_by_runs_or_wickets_rate", lambda x: x >= 0.95)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(trim(`result`))
        IN (''runs'',''wickets'') THEN 1 ELSE 0 END", "decided_by_runs_or_wickets_rate",
        lambda x: x >= 0.95)'' failed on data sample: Value: 0.9346049046321526 does
        not meet the constraint requirement!'
      level: warning
  '["match_type","season"]':
    code:
    - suggestion: '.satisfies("`season` IS NOT NULL AND length(trim(cast(`season`
        as string))) > 0 AND `match_type` IS NOT NULL AND length(trim(cast(`match_type`
        as string))) > 0", "Non-empty season and match_type", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("lower(trim(cast(`match_type` as string))) != ''final''
        OR `winner` IS NOT NULL", "Final rows must have a winner", lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'')
        THEN result_margin IS NOT NULL AND result_margin > 0 WHEN lower(trim(result))
        IN (''tie'',''no result'') THEN result_margin IS NULL ELSE true END", "margin_presence_by_result",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("lower(trim(result)) != ''wickets'' OR (result_margin
        BETWEEN 1 AND 10 AND result_margin = CAST(result_margin AS INT))", "wickets_margin_bounds",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("lower(trim(result)) != ''runs'' OR (result_margin >=
        1 AND result_margin = CAST(result_margin AS INT))", "runs_margin_positive_integer",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) != ''no result'' THEN
        winner IN (team1, team2) ELSE (winner IS NULL OR trim(winner) = '''') END",
        "winner_is_competing_team_when_played", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(trim(result)) !=
        ''no result'' THEN winner IN (team1, team2) ELSE (winner IS NULL OR trim(winner)
        = '''') END", "winner_is_competing_team_when_played", lambda x: x == 1.0)''
        failed on data sample: Value: 0.9945504087193461 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.satisfies("toss_winner IN (team1, team2)", "toss_winner_in_teams",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("(NOT (lower(`result`) = ''tie'')) OR (upper(`super_over`)
        = ''Y'')", "Tie implies super_over Y", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(NOT (upper(`super_over`) = ''Y'')) OR (lower(`result`)
        = ''tie'')", "Super_over Y only when result is tie", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(NOT (lower(`result`) = ''no result'')) OR (`winner`
        IS NULL)", "No result implies no winner", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(NOT (`winner` IS NULL)) OR (lower(`result`) = ''no
        result'')", "Null winner only allowed when no result", lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(NOT (`winner` IS NULL)) OR (lower(`result`)
        = ''no result'')", "Null winner only allowed when no result", lambda v: v
        == 1.0)'' failed on data sample: Value: 0.9945504087193461 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(NOT ((lower(`result`) IN (''runs'',''wickets'')) OR
        (upper(`super_over`) = ''Y''))) OR (`winner` IS NOT NULL AND (`winner` = `team1`
        OR `winner` = `team2`))", "Played matches must have a valid winner from teams",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(NOT (lower(`result`) = ''runs'')) OR (CAST(`result_margin`
        AS double) > 0)", "Runs result requires positive numeric margin", lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(NOT (lower(`result`) IN (''tie'',''no result'')))
        OR (`result_margin` IS NULL)", "No margin for ties or no result", lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2"]':
    code:
    - suggestion: '.haveCompleteness(columns=[''team1'', ''team2''], assertion=lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("trim(`team1`) <> trim(`team2`)", "teams_are_distinct",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(trim(`toss_winner`) = trim(`team1`)) OR (trim(`toss_winner`)
        = trim(`team2`))", "toss_winner_in_pair", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(lower(trim(`result`)) = ''no result'') OR (trim(`winner`)
        = trim(`team1`)) OR (trim(`winner`) = trim(`team2`))", "winner_within_pair_when_played",
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(lower(trim(`result`)) = ''no result'')
        OR (trim(`winner`) = trim(`team1`)) OR (trim(`winner`) = trim(`team2`))",
        "winner_within_pair_when_played", lambda v: v == 1.0)'' failed on data sample:
        Value: 0.9945504087193461 does not meet the constraint requirement!'
      level: warning
