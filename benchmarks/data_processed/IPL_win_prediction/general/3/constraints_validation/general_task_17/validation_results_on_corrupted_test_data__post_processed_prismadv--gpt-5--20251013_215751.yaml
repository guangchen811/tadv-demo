results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team1 = trim(team1)'', ''team1 trimmed (no leading/trailing
        whitespace)'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''length(trim(team1)) > 0'', ''team1 not empty after
        trim'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''team1 IS NOT NULL AND team2 IS NOT NULL AND team1
        <> team2'', ''team1 and team2 must be different'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(result) IN (''runs'',''wickets'') THEN
        (winner = team1 OR winner = team2) ELSE true END", ''winner must be one of
        team1 or team2 for decided results'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasApproxCountDistinct(''team1'', lambda v: v <= 30)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: '.satisfies("team2 IS NOT NULL AND length(trim(team2)) > 0", "team2
        non-empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team2 = trim(team2)", "team2 trimmed", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(result) IN (''runs'',''wickets'') OR
        (lower(result) = ''tie'' AND winner IS NOT NULL) THEN CASE WHEN winner = team1
        OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END", "Winner is one of the two
        teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team2 <> team1", "Distinct opposing teams", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN CAST(`result_margin` AS double) IS NOT NULL AND CAST(`result_margin`
        AS double) = CAST(CAST(`result_margin` AS double) AS int) ELSE TRUE END",
        "Result margin is numeric whole number when result is runs/wickets", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.satisfies(''CASE WHEN `target_runs` IS NULL THEN 1 ELSE CASE WHEN
        CAST(`target_runs` AS DOUBLE) IS NOT NULL AND CAST(`target_runs` AS DOUBLE)
        >= 0 THEN 1 ELSE 0 END END'', ''target_runs numeric and non-negative'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `target_runs` IS NULL THEN 1 ELSE CASE WHEN
        CAST(`target_runs` AS DOUBLE) IS NOT NULL AND CAST(`target_runs` AS DOUBLE)
        = FLOOR(CAST(`target_runs` AS DOUBLE)) THEN 1 ELSE 0 END END'', ''target_runs
        integer-like'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(method != ''D/L'') OR (target_runs IS NOT NULL AND
        CAST(target_runs AS DOUBLE) IS NOT NULL)", "D/L rows have target_runs", lambda
        x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: '.satisfies("(`toss_decision` IS NULL) OR (lower(trim(`toss_decision`))
        IN (''field'',''bat''))", "Valid toss_decision domain", lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''toss_decision'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.hasCompleteness(''super_over'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''super_over'', [''Y'',''N''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''N'' THEN 1 ELSE 0 END",
        ''super_over_rare'', lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) = ''tie'' THEN CASE WHEN
        `super_over` = ''Y'' THEN 1 ELSE 0 END ELSE 1 END", ''tie_requires_super_over'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN lower(`result`)
        = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", ''super_over_implies_tie'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.hasCompleteness("toss_winner", lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`toss_winner` IS NULL) OR (`toss_winner` = `team1`
        OR `toss_winner` = `team2`)", "Toss winner must be one of the two teams",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.hasCompleteness(''date'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("to_timestamp(`date`) IS NOT NULL", "Parsable date values",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.satisfies("CASE WHEN LENGTH(TRIM(CAST(season AS STRING))) > 0
        THEN 1 ELSE 0 END", "Non-empty season", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda c: c >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("city IS NULL OR LENGTH(TRIM(city)) > 0", "Non-empty
        city strings", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("city IS NULL OR city = TRIM(city)", "Trimmed city strings",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.hasCompleteness(''method'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN method IS NULL OR method = '''' OR method
        = ''D/L'' THEN 1 ELSE 0 END", "Method domain", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN CASE WHEN target_overs
        IS NOT NULL AND CAST(target_overs AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END
        ELSE 1 END", "D/L requires target_overs", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' AND target_runs IS NOT NULL
        THEN CASE WHEN CAST(target_runs AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END ELSE
        1 END", "D/L target_runs numeric if provided", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: '.hasCompleteness(''id'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(id AS STRING) RLIKE ''^-?[0-9]+$''", "id is integer-like",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: '.hasCompleteness(''venue'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''length(trim(`venue`)) > 0'', ''venue_non_empty_trimmed'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN (`winner` = `team1` OR `winner` = `team2`) ELSE TRUE END", "Winner is
        one of the competing teams for decisive results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(`result`) = ''tie'' AND `winner` IS
        NOT NULL AND TRIM(`winner`) <> '''' THEN (`winner` = `team1` OR `winner` =
        `team2`) ELSE TRUE END", "Tie rows: when present, winner must be one of the
        teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`winner` IS NULL OR `winner` = TRIM(`winner`)", "Winner
        has no leading/trailing whitespace", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("winner", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.hasCompleteness(''result'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`result`)) IN (''runs'',''wickets'',''tie'',''no
        result'')", "Valid result categories", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("lower(trim(`result`)) IN (''runs'',''wickets'',''tie'',''no
        result'')", "Valid result categories", lambda x: x == 1.0)'' failed on data
        sample: Value: 0.9509536784741145 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(lower(trim(`result`)) NOT IN (''runs'',''wickets''))
        OR (`result_margin` IS NOT NULL AND CAST(`result_margin` AS DOUBLE) IS NOT
        NULL AND `winner` IS NOT NULL AND ((`winner` = `team1`) OR (`winner` = `team2`)))",
        "Margin and winner valid for decisive results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
