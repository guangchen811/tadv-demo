results:
  date:
    code:
    - suggestion: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Eliminator', 'Qualifier
        1', 'Qualifier 2', 'Final', 'Semi Final', 'Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("method IS NULL OR method = 'D/L'", 'method_null_or_DL')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("(result IN ('runs','wickets') AND result_margin IS NOT
        NULL AND result_margin > 0) OR (result NOT IN ('runs','wickets'))", 'positive_margin_when_applicable')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .satisfies("(method <> 'D/L') OR (target_overs IS NOT NULL AND target_overs
        > 0 AND target_overs <= 20)", 'dl_requires_target_overs_valid')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(method <> ''D/L'') OR (target_overs
        IS NOT NULL AND target_overs > 0 AND target_overs <= 20)", ''dl_requires_target_overs_valid'')''
        failed on data sample: Value: 0.9945504087193461 does not meet the constraint
        requirement!'
      level: error
    - suggestion: .satisfies("target_overs IS NULL OR (target_overs > 0 AND target_overs
        <= 20)", 'target_overs_range')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .satisfies('target_runs IS NULL OR target_runs > 0', 'target_runs_positive_if_present')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('team1 <> team2', 'team1_not_equal_team2')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss_winner_is_team1_or_team2')
      status: true
      reason_if_failed: ''
      level: error
  umpire1:
    code:
    - suggestion: .isComplete('umpire1')
      status: true
      reason_if_failed: ''
      level: error
  umpire2:
    code:
    - suggestion: .isComplete('umpire2')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("(result NOT IN ('runs','wickets')) OR (winner IS NOT
        NULL AND (winner = team1 OR winner = team2))", 'winner_present_and_valid_for_decided_matches')
      status: true
      reason_if_failed: ''
      level: error
