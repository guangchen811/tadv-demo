results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN team1 = TRIM(team1) AND team1 <> '''' THEN
        1 ELSE 0 END", "team1 trimmed and non-empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN team1 <> team2 THEN 1 ELSE 0 END", "team1
        and team2 must differ", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN winner IN (team1, team2) THEN 1 ELSE 0 END ELSE 1 END", "Winner within
        teams for decisive results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN toss_winner IS NULL OR toss_winner IN (team1,
        team2) THEN 1 ELSE 0 END", "Toss winner within the two teams or NULL", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: '.satisfies("CASE WHEN `team2` <> `team1` THEN 1 ELSE 0 END", "Different
        opponents", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `team2` IS NOT NULL AND LENGTH(TRIM(`team2`))
        > 0 THEN 1 ELSE 0 END", "Non-empty team2", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: '.isContainedIn(''match_type'', [''League'', ''Final'', ''Qualifier
        1'', ''Qualifier 2'', ''Eliminator'', ''Elimination Final'', ''Semi Final''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN CAST(target_overs AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END
        ELSE 1 END", "target_overs non-null & numeric for training rows", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'')
        AND CAST(target_overs AS DOUBLE) IS NOT NULL THEN CASE WHEN CAST(target_overs
        AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE 1 END", "target_overs > 0 for training
        rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(target_overs AS DOUBLE) IS NULL THEN
        1 ELSE CASE WHEN CAST(target_overs AS DOUBLE) <= 20.0 THEN 1 ELSE 0 END END",
        "target_overs upper bound", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN CAST(target_overs AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END", "target_overs numeric parse rate", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("(NOT (`result` IN (''runs'',''wickets''))) OR CAST(`result_margin`
        AS DOUBLE) IS NOT NULL", "Numeric margin for decisive results", lambda x:
        x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` <> ''wickets'') OR (CAST(`result_margin`
        AS DOUBLE) IS NOT NULL AND CAST(`result_margin` AS DOUBLE) >= 1 AND CAST(`result_margin`
        AS DOUBLE) <= 10 AND CAST(`result_margin` AS DOUBLE) = CAST(CAST(`result_margin`
        AS DOUBLE) AS INT))", "Valid wicket margins", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` <> ''runs'') OR (CAST(`result_margin` AS
        DOUBLE) IS NOT NULL AND CAST(`result_margin` AS DOUBLE) >= 1 AND CAST(`result_margin`
        AS DOUBLE) = CAST(CAST(`result_margin` AS DOUBLE) AS INT))", "Valid run margins",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("result_margin", lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness("result_margin", lambda x:
        x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(target_runs AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END", "target_runs numeric parseable", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN target_runs IN (CAST(''Infinity'' AS DOUBLE),
        CAST(''-Infinity'' AS DOUBLE)) THEN 0 ELSE 1 END", "target_runs finite", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN target_runs IS NULL THEN 1 WHEN target_runs
        >= 0 THEN 1 ELSE 0 END", "target_runs non-negative", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN target_runs IS NULL THEN 1 WHEN target_runs
        = FLOOR(target_runs) THEN 1 ELSE 0 END", "target_runs integer-like", lambda
        x: x >= 0.995)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: '.isContainedIn(''toss_decision'', [''bat'', ''field''], lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("( `result` IN (''runs'',''wickets'',''tie'') AND `toss_decision`
        IS NOT NULL ) OR ( `result` NOT IN (''runs'',''wickets'',''tie'') )", "toss_decision
        non-null for training rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.isContainedIn("super_over", [''Y'',''N''], lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN (toss_winner = team1 OR toss_winner = team2) THEN 1 ELSE 0
        END ELSE 1 END", "toss_winner_in_{team1,team2}", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN toss_winner = TRIM(toss_winner) THEN 1 ELSE 0 END ELSE 1 END",
        "toss_winner_trimmed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.hasCompleteness(''date'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN to_timestamp(`date`) IS NOT NULL THEN 1 ELSE
        0 END", "Parsable dates", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `date` RLIKE ''^\\s*$'' THEN 0 ELSE 1 END",
        "Non-empty date strings", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.satisfies("CAST(season AS STRING) RLIKE ''^[0-9]+$''", "Season
        is integer-like (digits only)", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: '.hasCompleteness(''id'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'',''tie'')) OR (id
        IS NOT NULL)", ''id not null for training rows'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("(`result` NOT IN (''runs'',''wickets'')) OR ((`winner`
        = `team1`) OR (`winner` = `team2`))", "Winner must be team1 or team2 for decisive
        results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x >=
        0.99)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: warning
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no
        result''])'' failed on data sample: Value: 0.9509536784741145 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`result` <> ''no result''", "Decisive result share
        >= 95%", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("(NOT (`result` IN (''runs'',''wickets'',''tie'')))
        OR ((`target_runs` IS NOT NULL) AND (`target_overs` IS NOT NULL))", "Training
        rows must have non-null target_runs and target_overs", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(NOT (`result` IN (''runs'',''wickets'',''tie'') AND
        `target_runs` IS NOT NULL)) OR (`target_overs` > 0)", "No division-by-zero
        on target_overs when target_runs present (training rows)", lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(NOT (`result` IN (''runs'',''wickets'',''tie'') AND
        `target_overs` IS NOT NULL)) OR (`target_overs` <= 20)", "T20 overs cap on
        target_overs for training rows", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
