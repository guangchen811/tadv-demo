results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isPositive('target_overs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.99, ''Winner column
        must be at least 99% complete'')'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x >=
        0.99, ''Winner column must be at least 99% complete'')'' failed on data sample:
        Value: 0.989100817438692 does not meet the constraint requirement! Winner
        column must be at least 99% complete'
      level: error
