results:
  date:
    code:
    - suggestion: .hasPattern('date', r'\d{4}-\d{2}-\d{2}')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("method IS NULL OR method = 'D/L'", "'method' must be
        NULL or 'D/L'")
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''runs'', ''wickets'',
        ''tie'', ''no result''])'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .isPositive('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result NOT IN ('runs', 'wickets') OR result_margin IS
        NOT NULL", "'result_margin' must be present if result is 'runs' or 'wickets'")
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("result = 'no result' OR winner IS NOT NULL", "'winner'
        must be present unless result is 'no result'")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("result = ''no result'' OR winner
        IS NOT NULL", "''winner'' must be present unless result is ''no result''")''
        failed on data sample: Value: 0.9945504087193461 does not meet the constraint
        requirement!'
      level: error
