results:
  date:
    code:
    - suggestion: .containsPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.containsPattern(''date'',
        ''^\\d{4}-\\d{2}-\\d{2}$'')'': ''Check'' object has no attribute ''containsPattern'''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''tie'', ''runs'',
        ''wickets'', ''no result''])'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result NOT IN ('runs','wickets')) OR (result_margin
        IS NOT NULL AND result_margin > 0)", 'result_margin_present_and_positive_for_decisions')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .satisfies('target_overs >= 0 AND target_overs <= 20', 'target_overs_in_range')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''target_overs >= 0 AND target_overs
        <= 20'', ''target_overs_in_range'')'' failed on data sample: Value: 0.9945504087193461
        does not meet the constraint requirement!'
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('team1 != team2', 'teams_are_distinct')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss_winner_is_one_of_teams')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("(result NOT IN ('runs','wickets')) OR (winner = team1
        OR winner = team2)", 'winner_is_one_of_teams_when_decided')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result NOT IN ('runs','wickets')) OR (winner IS NOT
        NULL)", 'winner_present_when_decided')
      status: true
      reason_if_failed: ''
      level: error
