results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: undefined
  match_type:
    code:
    - suggestion: .isContainedIn('match_type', ['Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''match_type = "League"'', ''High Proportion of League
        Matches'', lambda x: x >= 0.943)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''match_type = "League"'', ''High
        Proportion of League Matches'', lambda x: x >= 0.943)'' failed on data sample:
        Value: 0.9346049046321526 does not meet the constraint requirement!'
      level: warning
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''target_overs'', lambda x:
        x >= 0.998)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: warning
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x >=
        0.998)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: undefined
  result:
    code:
    - suggestion: .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''result'', [''tie'', ''runs'',
        ''wickets'', ''no result''])'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
  '["result","result_margin","target_overs"]':
    code:
    - suggestion: .satisfies("CASE WHEN `result` = 'runs' THEN `result_margin` IS
        NOT NULL AND `target_overs` IS NOT NULL ELSE TRUE END", "Result Margin and
        Target Overs Non-Null when Result is Runs")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `result` = 'wickets' THEN `result_margin`
        IS NOT NULL ELSE TRUE END", "Result Margin Non-Null when Result is Wickets")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `result` IN ('runs', 'wickets', 'tie') THEN
        `team1` IS NOT NULL AND `team2` IS NOT NULL AND `winner` IS NOT NULL ELSE
        TRUE END", "Team1, Team2, and Winner Non-Null when Result is Runs, Wickets,
        or Tie")
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","winner"]':
    code:
    - suggestion: '.haveCompleteness([''winner''], lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.haveCompleteness([''winner''], lambda x: x
        >= 0.998)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: error
    - suggestion: .satisfies('CASE WHEN result IN (\'runs\', \'wickets\') THEN result_margin
        IS NOT NULL ELSE TRUE END', 'Result Margin Completeness')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN result = \'runs\' THEN target_overs IS NOT
        NULL ELSE TRUE END', 'Target Overs Completeness')
      status: true
      reason_if_failed: ''
      level: error
  '["result","target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("`result` IN (''runs'', ''wickets'', ''tie'', ''no result'')",
        "Valid Result Values", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`result` IN (''runs'', ''wickets'',
        ''tie'', ''no result'')", "Valid Result Values", lambda x: x == 1)'' failed
        on data sample: Value: 0.9509536784741145 does not meet the constraint requirement!'
      level: error
    - suggestion: '.haveCompleteness([''target_overs'', ''target_runs''], lambda x:
        x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.haveCompleteness([''target_overs'', ''target_runs''],
        lambda x: x >= 0.998)'' failed on data sample: Value: 0.9945504087193461 does
        not meet the constraint requirement!'
      level: warning
  '["result","team1","team2"]':
    code:
    - suggestion: '.satisfies(''team1 != team2'', ''Distinct Teams'', lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''result IN ("no result", "runs", "wickets", "tie")'',
        ''Valid Results'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''result IN ("no result", "runs",
        "wickets", "tie")'', ''Valid Results'', lambda x: x == 1.0)'' failed on data
        sample: Value: 0.9509536784741145 does not meet the constraint requirement!'
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.haveCompleteness([''team1'', ''team2''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'Winner must be one of the teams or null')
      status: true
      reason_if_failed: ''
      level: warning
