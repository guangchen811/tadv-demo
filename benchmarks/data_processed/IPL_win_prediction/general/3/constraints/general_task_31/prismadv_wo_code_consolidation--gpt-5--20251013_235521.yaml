    - suggestion: '.satisfies("CASE WHEN `result_margin` IS NULL THEN 1 ELSE CASE
        WHEN TRY_CAST(`result_margin` AS DOUBLE) >= 0 THEN 1 ELSE 0 END END", "Non-negative
        result_margin", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 9d8894c1-4b41-4092-99e4-6649b0b7459e
      source_assumptions:
      - 4c8eeb7c-233e-4e58-9261-63c70bc93401
    assumptions:
    - text: 'The ''result_margin'' column should be mostly numeric/parseable. At least
        95% of rows should successfully cast to a numeric value; non-parsable values
        will be coerced to null by the pipeline. We could represent this as a Deequ
        constraint like: .satisfies("CASE WHEN TRY_CAST(`result_margin` AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END", "result_margin is numeric", lambda x: x >=
        0.95)'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 27
        end_line: 27
        file: ''
      uid: c63e0858-eb17-46a3-8acf-4d251f4d7e19
    - text: 'For matches where the input ''result'' is ''runs'' or ''wickets'', ''result_margin''
        should be non-null and strictly positive (greater than 0) in the vast majority
        of cases (>= 95%). This ensures meaningful averages for winning margins downstream.
        We could represent this as: .satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN CASE WHEN TRY_CAST(`result_margin` AS DOUBLE) IS NOT NULL AND TRY_CAST(`result_margin`
        AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE 1 END", "Positive margin for decisive
        results", lambda x: x >= 0.95)'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      - start_line: 70
        end_line: 71
        file: ''
      uid: 97cfd294-396b-4431-b13d-5c4bde64774a
    - text: 'For matches where the input ''result'' is ''runs'' or ''wickets'', ''result_margin''
        values are expected to be integer-like (cricket margins are whole numbers).
        At least 99% of non-null values should have no fractional part (within a tiny
        tolerance). We could represent this as: .satisfies("CASE WHEN lower(`result`)
        IN (''runs'',''wickets'') AND TRY_CAST(`result_margin` AS DOUBLE) IS NOT NULL
        THEN CASE WHEN ABS(TRY_CAST(`result_margin` AS DOUBLE) - ROUND(TRY_CAST(`result_margin`
        AS DOUBLE))) <= 1e-9 THEN 1 ELSE 0 END ELSE 1 END", "Integer-like margins
        for decisive results", lambda x: x >= 0.99)'
      sources:
      - start_line: 27
        end_line: 27
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      uid: caf5e074-511e-4ee9-bf98-819bba184d03
    - text: 'For matches where the input ''result'' is ''tie'' or ''no result'', ''result_margin''
        is not expected to carry information and should typically be null or zero
        in at least 95% of such rows. We could represent this as: .satisfies("CASE
        WHEN lower(`result`) IN (''tie'',''no result'') THEN CASE WHEN `result_margin`
        IS NULL OR TRY_CAST(`result_margin` AS DOUBLE) = 0 THEN 1 ELSE 0 END ELSE
        1 END", "Margin absent for tie/no result", lambda x: x >= 0.95)'
      sources:
      - start_line: 54
        end_line: 57
        file: ''
      uid: 3cb375d4-765c-4e3b-b229-920cdfda8e70
    - text: 'Wherever ''result_margin'' is present (non-null), it should never be
        negative. Negative margins would be nonsensical for winning margins and would
        distort averages. We could represent this as: .satisfies("CASE WHEN `result_margin`
        IS NULL THEN 1 ELSE CASE WHEN TRY_CAST(`result_margin` AS DOUBLE) >= 0 THEN
        1 ELSE 0 END END", "Non-negative result_margin", lambda x: x == 1)'
      sources:
      - start_line: 27
        end_line: 27
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      - start_line: 70
        end_line: 71
        file: ''
      uid: 4c8eeb7c-233e-4e58-9261-63c70bc93401
