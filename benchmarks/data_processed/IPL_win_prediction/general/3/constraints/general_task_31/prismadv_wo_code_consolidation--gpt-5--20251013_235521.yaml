  '["team1","team2","toss_winner"]':
    code: []
    assumptions:
    - text: "For every match row, the value in 'toss_winner' must equal one of the\
        \ two participating teams: toss_winner \u2208 {team1, team2}. This enables\
        \ the computation of 'toss_made_by_team' (team == toss_winner) and ensures\
        \ the 'decided' subset is meaningful. This can be enforced with a row-level\
        \ compliance constraint such as: (toss_winner = team1) OR (toss_winner = team2)."
      sources:
