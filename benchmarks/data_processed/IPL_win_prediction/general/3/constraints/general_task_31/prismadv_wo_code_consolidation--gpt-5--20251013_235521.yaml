        = ''Y'')) implies (winner = team1 OR winner = team2). This is required for
        correct points assignment via won_mask. Deequ example: .satisfies("CASE WHEN
        (result IN (''runs'',''wickets'') OR (result = ''tie'' AND super_over = ''Y''))
        THEN (winner = team1 OR winner = team2) ELSE TRUE END", "winner_must_be_one_of_teams_when_decided",
        1.0)'
      sources:
      - start_line: 32
        end_line: 38
        file: ''
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 47
        end_line: 48
        file: ''
      uid: 5c34937a-225e-4e92-9668-3cfe66e570d9
    - text: 'For ties without a super over (result = ''tie'' AND super_over <> ''Y''),
        no winner should be recorded. This avoids conflicting signals with the 0.5
        points logic for both teams. Deequ example: .satisfies("NOT(result = ''tie''
        AND super_over <> ''Y'') OR winner IS NULL", "no_winner_for_plain_ties", 1.0)'
      sources:
      - start_line: 43
        end_line: 48
        file: ''
      uid: e93fc568-091b-46ff-825f-a7f423ab99f9
    - text: 'Matches with result = ''no result'' should have no super over and no
        winner recorded. This is consistent with denom = 0 handling and prevents miscounting
        ties_wo_super_over. Deequ example: .satisfies("NOT(result = ''no result'')
        OR (super_over = ''N'' AND winner IS NULL)", "no_result_has_no_so_and_no_winner",
        1.0)'
      sources:
      - start_line: 46
        end_line: 51
        file: ''
      - start_line: 68
        end_line: 69
        file: ''
      uid: 4540038e-0665-4a64-a1e4-bb7183947412
    - text: 'toss_winner must be either team1 or team2 for each match row (toss_winner
        IN {team1, team2}). This ensures toss_made_by_team and the decided filter
        select correct rows. Deequ example: .satisfies("toss_winner = team1 OR toss_winner
        = team2", "toss_winner_in_teams", 1.0)'
      sources:
      - start_line: 32
        end_line: 41
        file: ''
      uid: feaa0edc-d646-43c4-8611-06485908f64c
    - text: 'Winning margins must be positive when a win type is specified: (result
        = ''runs'' => result_margin_int > 0) and (result = ''wickets'' => result_margin_int
        > 0). This keeps avg_runs_margin and avg_wickets_margin meaningful. Deequ
        example: .satisfies("(result <> ''runs'' OR result_margin_int > 0) AND (result
        <> ''wickets'' OR result_margin_int > 0)", "positive_margins_for_decided_matches",
        1.0)'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 55
        end_line: 57
        file: ''
      uid: c8ef0b00-a47d-43b0-901e-8ee78aea99f0
    - text: 'Within each aggregation group (team, match_type, toss_decision), the
        number of super-over deciders must not exceed the number of ties: count(super_over
        = ''Y'') <= count(result = ''tie''). This aligns with ties_wo_super_over =
        ties - super_over_deciders. This can be enforced with a grouped check (e.g.,
        custom Deequ/Spark SQL analyzer over the grouping).'
      sources:
      - start_line: 63
        end_line: 72
        file: ''
      - start_line: 68
        end_line: 69
        file: ''
      uid: a80b317a-f057-471f-b597-861e9a7dec07
