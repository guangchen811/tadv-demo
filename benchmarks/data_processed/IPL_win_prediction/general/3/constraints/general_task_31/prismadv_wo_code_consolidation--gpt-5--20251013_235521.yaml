  '["team1","team2"]':
    code: []
    assumptions:
    - text: 'Each record represents a match between two distinct teams; team1 and
        team2 must both be non-null and not equal. This can be enforced as a Deequ
        row-level constraint: .satisfies(''team1 IS NOT NULL AND team2 IS NOT NULL
