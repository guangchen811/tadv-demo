        end_line: 38
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: bbba7b51-22d6-41fd-b997-16490bc4a1f5
    - text: 'Exactly one of ''team1'' or ''team2'' must match ''toss_winner'' for
        each match row (exclusive membership). This guarantees that, after expanding
        to two rows per match, exactly one row enters the ''decided'' set, preventing
        double counting. A row-level compliance constraint can assert: ((toss_winner
        = team1) cast_to_int + (toss_winner = team2) cast_to_int) = 1.'
      sources:
      - start_line: 32
        end_line: 38
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: aec25fb2-af70-42ae-97cf-53ca3bccc47c
    - text: '''team1'' and ''team2'' must be present and distinct non-empty strings
        in every record (team1 != team2). If they are equal, both long-format rows
        would satisfy (team == toss_winner) when the toss winner is that same team,
        inflating counts in ''decided''. Enforce with completeness constraints on
        both columns and a row-level compliance check: team1 IS NOT NULL AND team2
        IS NOT NULL AND team1 != team2.'
      sources:
      - start_line: 32
        end_line: 38
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
