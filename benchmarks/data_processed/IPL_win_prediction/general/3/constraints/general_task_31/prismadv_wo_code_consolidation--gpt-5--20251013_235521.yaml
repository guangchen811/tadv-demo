        file: ''
      uid: 3239c7c5-695f-426d-a75c-00c1a29a4d68
    - text: "For ties decided by a super over (result = 'tie' and super_over = 'Y'),\
        \ the winner must be one of the two teams in the match (winner \u2208 {team1,\
        \ team2}). Compliance rule: (result = 'tie' AND upper(super_over) = 'Y') =>\
        \ (winner = team1 OR winner = team2)."
      sources:
      - start_line: 43
        end_line: 48
        file: ''
      uid: 461ac214-2253-4ed1-84ca-ba4086cdfd74
    - text: "The toss_winner must always be one of the two teams playing the match\
        \ (toss_winner \u2208 {team1, team2}). Compliance rule: (toss_winner = team1\
        \ OR toss_winner = team2)."
      sources:
      - start_line: 30
        end_line: 36
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: da49c009-1e67-4388-95b9-61ae70700ef6
    - text: 'team1 and team2 must be different teams for a given match (no team plays
        itself). Compliance rule: team1 != team2.'
      sources:
      - start_line: 32
        end_line: 38
        file: ''
      uid: 292b70ab-0d48-40ed-a817-7147ec68a249
    - text: 'Result margin semantics must align with the result type: if result =
        ''runs'', then result_margin must be a positive number; if result = ''wickets'',
        result_margin must be a positive number; otherwise (tie or no result), result_margin
        should be null. Two compliance rules: (result = ''runs'') => (result_margin
        > 0); (result = ''wickets'') => (result_margin > 0); ((result = ''tie'' OR
        result = ''no result'')) => isNull(result_margin).'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      uid: 9ab10e45-5f7e-48d2-9036-f2a0019684b1
    - text: 'Super-over usage is only meaningful for tied matches: if super_over =
        ''Y'' then result must be ''tie''. Compliance rule: (upper(super_over) = ''Y'')
        => (result = ''tie'').'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: e5536748-87a1-46ca-9e2c-2500984d60ae
    - text: 'For matches with no result (result = ''no result''), no winner should
        be recorded and no margin should be present. Compliance rules: (result = ''no
        result'') => isNull(winner) OR winner = ''''; and (result = ''no result'')
        => isNull(result_margin).'
      sources:
      - start_line: 46
        end_line: 51
        file: ''
      - start_line: 25
        end_line: 27
        file: ''
      uid: 7140b0a0-a444-4edf-ae85-680e63e2598f
  '["toss_decision","toss_winner"]':
    code: []
    assumptions:
    - text: 'The toss_winner must be one of the two teams listed for the match (team1
        or team2), so that exactly one of the two per-match team rows has toss_made_by_team
        = True. This can be enforced as a Deequ compliance constraint such as: Compliance(''toss_winner_is_participant'',
        ''(toss_winner = team1 OR toss_winner = team2)'') and, optionally for exclusivity
        when team1 != team2, Compliance(''toss_winner_matches_exactly_one_team'',
        ''((toss_winner = team1) AND (toss_winner <> team2)) OR ((toss_winner = team2)
        AND (toss_winner <> team1))'').'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 32
        end_line: 38
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: afdf0760-b7b8-4b85-89ef-e71ae222c43b
    - text: 'When the team is the toss_winner (i.e., the toss was made by that team),
        toss_decision must be present and must be one of {''bat'', ''field''} after
        normalization. This can be represented as a conditional Deequ compliance constraint:
        Compliance(''valid_toss_decision_for_winner'', ''CASE WHEN team = toss_winner
        THEN toss_decision IN (\''bat\'', \''field\'') ELSE true END'').'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      - start_line: 63
        end_line: 63
        file: ''
      uid: bb8e875d-3cab-4ba3-9223-e3a33d08b36e
    - text: 'Toss attributes are match-level and must be consistent within each match:
        for every id, there is exactly one toss_winner and exactly one toss_decision
        value. This can be enforced by asserting uniqueness at the match level, e.g.,
        isUnique([''id'']) when data is one row per match; or by asserting per-id
        consistency via aggregate checks such as ''countDistinct(toss_winner) by id
        == 1'' and ''countDistinct(toss_decision) by id == 1''.'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 32
        end_line: 38
        file: ''
      uid: 7da0afa3-9e3d-49fd-aede-350e4ca3f9fa
