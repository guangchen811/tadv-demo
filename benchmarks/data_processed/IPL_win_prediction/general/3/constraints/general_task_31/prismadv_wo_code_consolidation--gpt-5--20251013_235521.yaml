    - text: 'For a given match id, the unordered pair of teams must be unique (no
        duplicate rows that only swap team1 and team2). This can be enforced by introducing
        a canonical pair (e.g., CASE WHEN team1 <= team2 THEN concat(team1,''|'',team2)
        ELSE concat(team2,''|'',team1) END) and requiring uniqueness on (id, canonical_pair).
