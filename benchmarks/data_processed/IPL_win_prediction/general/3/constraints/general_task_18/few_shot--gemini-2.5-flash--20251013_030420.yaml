constraints:
  city:
    code:
    - - .isComplete('city')
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', 'Integral')
      - Invalid
    - - .isComplete('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Valid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L']).when("method IS NOT NULL")
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasDataType('result_margin', 'Fractional')
      - Invalid
    - - .isComplete('result_margin').when("result = 'runs' OR result = 'wickets'")
      - Invalid
    - - .isNonNegative('result_margin').when("result = 'runs' OR result = 'wickets'")
      - Invalid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', 'Integral')
      - Invalid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasDataType('target_overs', 'Fractional')
      - Invalid
    - - .isComplete('target_overs').when("method = 'D/L'")
      - Invalid
    - - .isNonNegative('target_overs').when("method = 'D/L'")
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .hasDataType('target_runs', 'Fractional')
      - Invalid
    - - .isComplete('target_runs').when("method = 'D/L'")
      - Invalid
    - - .isNonNegative('target_runs').when("method = 'D/L'")
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner must
        be team1 or team2")
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner').when("result != 'no result'")
      - Invalid
    - - .satisfies("CASE WHEN result != 'no result' THEN winner = team1 OR winner
        = team2 ELSE TRUE END", "winner must be team1 or team2 when result is not
        'no result'")
      - Valid
    assumptions: []
