        toss_winner_is_valid_team\", \"select count(*) from _ where not (toss_winner\
        \ = team1 or toss_winner = team2)\", _ == 0))"
      sources:
      - start_line: 22
        end_line: 32
        file: ''
      uid: e0d842a2-619c-444c-9257-35059ebb42e9
    - text: "For each record, the value in the 'team1' column must be different from\
        \ the value in the 'team2' column. This ensures that there are two distinct\
        \ teams playing in a match, which is fundamental for match-related logic.\n\
        \            We could represent this assumption as a deequ constraint like\
        \ this:\n            .addConstraint(Constraint.assertion(\"teams_are_distinct\"\
        , \"select count(*) from _ where team1 = team2\", _ == 0))"
      sources:
