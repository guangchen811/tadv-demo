constraints:
  _row:
    code:
    - - .satisfies('team1 <> team2', 'teams_must_be_different')
      - Valid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isPositive('id')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isPositive('result_margin')
      - Valid
    - - .satisfies("result not in ('runs', 'wickets') or result_margin is not null",
        'result_margin_must_exist_for_decided_match')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isPositive('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("result not in ('runs', 'wickets') or winner is not null", 'winner_must_exist_for_decided_match')
      - Valid
    - - .satisfies('winner is null or winner = team1 or winner = team2', 'winner_must_be_one_of_the_teams')
      - Valid
    assumptions: []
