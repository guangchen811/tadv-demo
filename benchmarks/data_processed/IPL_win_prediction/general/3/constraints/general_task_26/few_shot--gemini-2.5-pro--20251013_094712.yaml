constraints:
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  season:
    code:
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isPositive('target_overs')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner')
      - Invalid
    assumptions: []
