constraints:
  date:
    code:
    - - .hasPattern('date', r'^\\d{4}-\\d{2}-\\d{2}$')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .satisfies("result NOT IN ('runs', 'wickets') OR (result_margin IS NOT NULL
        AND result_margin > 0)", 'result_margin_check')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("result = 'no result' OR winner IS NOT NULL", 'winner_check')
      - Valid
    assumptions: []
