      uid: 558f450e-2f09-4f5f-badc-e74a4fcc54e1
    - text: 'There is a strong conditional dependency between the ''result'' and ''super_over''
        columns. A match result is a ''tie'' if and only if a super over was played
        (''super_over'' is ''Y''). The aggregated ''super_over_played'' metric relies
