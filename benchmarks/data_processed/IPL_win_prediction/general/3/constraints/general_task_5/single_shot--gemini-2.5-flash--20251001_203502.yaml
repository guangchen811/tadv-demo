constraints:
  city:
    code:
    - - '.isComplete(''city'', assertion=lambda x: x >= 0.98)'
      - Invalid
    assumptions: []
  date:
    code:
    - - .hasPattern('date', '^\d{4}-\d{2}-\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .hasMin('match_type', 'League', 0.9)
      - Invalid
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - '.isComplete(''player_of_match'', assertion=lambda x: x >= 0.99)'
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.isComplete(''result_margin'', assertion=lambda x: x >= 0.98)'
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isContainedIn('season', list(range(2008, 2025)))
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    - - .satisfies("(result = 'tie' AND super_over = 'Y') OR (result != 'tie' AND
        super_over = 'N')", "Tie implies Super Over, and vice versa")
      - Valid
    assumptions: []
  target_overs:
    code:
    - - '.isComplete(''target_overs'', assertion=lambda x: x >= 0.99)'
      - Invalid
    - - .isPositive('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - '.isComplete(''target_runs'', assertion=lambda x: x >= 0.99)'
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isNotMatching('team1', 'team2')
      - Invalid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.isComplete(''winner'', assertion=lambda x: x >= 0.99)'
      - Invalid
    - - .isComplete('winner', where='result = "runs" OR result = "wickets"')
      - Invalid
    - - .satisfies("winner IS NULL OR winner = team1 OR winner = team2", "Winner must
        be team1 or team2 or null")
      - Valid
    assumptions: []
