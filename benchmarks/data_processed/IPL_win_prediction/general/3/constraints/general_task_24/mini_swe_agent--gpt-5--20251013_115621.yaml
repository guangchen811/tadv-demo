raw_constraints:
- column_name: season
  code_for_constraint: .isComplete('season')
- column_name: season
  code_for_constraint: .hasDataType('season', ConstrainableDataTypes.Integral)
- column_name: season
  code_for_constraint: .isNonNegative('season')
- column_name: target_runs
  code_for_constraint: .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
- column_name: target_runs
  code_for_constraint: .isPositive('target_runs')
- column_name: result_margin
  code_for_constraint: .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
- column_name: result_margin
  code_for_constraint: .isNonNegative('result_margin')
- column_name: target_overs
  code_for_constraint: .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
- column_name: target_overs
  code_for_constraint: .isPositive('target_overs')
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: winner
  code_for_constraint: .isComplete('winner').where("result IN ('runs','wickets')")
- column_name: winner
  code_for_constraint: .satisfies("winner = team1 OR winner = team2", 'winner_in_teams').where("result
    IN ('runs','wickets')")
