    - suggestion: .satisfies('`result` != "no result" OR `winner` IS NULL', 'no_result_has_no_winner')
      status: true
      reason_if_failed: ''
      level: warning
  '["match_type","result","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result <> ''no
