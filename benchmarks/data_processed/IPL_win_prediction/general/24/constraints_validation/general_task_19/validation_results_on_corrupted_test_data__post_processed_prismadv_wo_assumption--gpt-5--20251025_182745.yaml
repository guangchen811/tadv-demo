      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN winner IS NULL
        ELSE TRUE END", "no_result_should_have_no_winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","winner"]':
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
