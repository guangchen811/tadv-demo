results:
  team1:
    code:
    - suggestion: '.satisfies("team1 = trim(team1) AND length(trim(team1)) > 0", "team1_non_blank_trimmed",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "distinct_teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(toss_winner IS NULL) OR (toss_winner = team1) OR (toss_winner
        = team2)", "toss_winner_in_teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result IN (''no result'',''tie'')) OR (winner = team1)
        OR (winner = team2)", "winner_in_teams_for_decided_matches", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team2 = TRIM(team2)", "team2_trimmed", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("LENGTH(TRIM(team2)) > 0", "team2_not_empty", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("toss_winner IN (team1, team2)", "toss_winner_within_teams",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(LOWER(result) IN (''no result'', ''tie'')) OR (winner
        IN (team1, team2))", "winner_within_teams_when_applicable", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "distinct_opponents", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''match_type'', [''League'',''Qualifier 1'',''Qualifier
        2'',''Eliminator'',''Elimination Final'',''Semi Final'',''Final''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`match_type` = TRIM(`match_type`)'', ''match_type
        trimmed'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''match_type'', lambda x: x <= 10)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`result_margin` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "result_margin is numeric", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN CASE WHEN TRY_CAST(`result_margin` AS DOUBLE) IS NOT NULL AND TRY_CAST(`result_margin`
        AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE 1 END", "Positive margin for decisive
        results", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        AND TRY_CAST(`result_margin` AS DOUBLE) IS NOT NULL THEN CASE WHEN ABS(TRY_CAST(`result_margin`
        AS DOUBLE) - ROUND(TRY_CAST(`result_margin` AS DOUBLE))) <= 1e-9 THEN 1 ELSE
        0 END ELSE 1 END", "Integer-like margins for decisive results", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''tie'',''no result'')
        THEN CASE WHEN `result_margin` IS NULL OR TRY_CAST(`result_margin` AS DOUBLE)
        = 0 THEN 1 ELSE 0 END ELSE 1 END", "Margin absent for tie/no result", lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result_margin` IS NULL THEN 1 ELSE CASE
        WHEN TRY_CAST(`result_margin` AS DOUBLE) >= 0 THEN 1 ELSE 0 END END", "Non-negative
        result_margin", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("length(trim(`toss_decision`)) > 0", "toss_decision
        not blank", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`toss_decision`)) IN (''bat'',''field'')",
        "Valid toss_decision values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.satisfies("length(trim(`super_over`)) > 0", "Non-empty super_over",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("upper(trim(`super_over`)) IN (''Y'',''N'')", "super_over
        Y/N only", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN upper(trim(`super_over`)) = ''Y'' THEN lower(trim(`result`))
        = ''tie'' ELSE TRUE END", "Super over only on ties", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.satisfies("toss_winner IS NOT NULL AND length(trim(toss_winner))
        > 0 AND lower(trim(toss_winner)) NOT IN (''na'',''n/a'',''unknown'',''none'')",
        "toss_winner completeness and non-placeholder", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner
        is team1 or team2", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("toss_winner = trim(toss_winner)", "toss_winner trimmed",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN method IS NULL OR method IS NOT NULL THEN
        1 ELSE 0 END", "method column exists", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''method'', [''D/L''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN (`result` IN (''runs'',''wickets'')) OR (`result`
        = ''tie'' AND `super_over` = ''Y'') THEN CASE WHEN (`winner` = `team1`) OR
        (`winner` = `team2`) THEN 1 ELSE 0 END ELSE 1 END", "Winner must be team1
        or team2 for decided outcomes", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL THEN 1 ELSE CASE WHEN (`winner`
        = `team1`) OR (`winner` = `team2`) THEN 1 ELSE 0 END END", "Winner values
        restricted to known team names when present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "Valid result values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IS NOT NULL AND length(trim(`result`))
        > 0 THEN 1 ELSE 0 END", "Result not empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) IN (''runs'',''wickets'')
        THEN 1 ELSE 0 END", "Decisive results share", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) = ''tie'' THEN 1 ELSE
        0 END", "Tie rate", lambda x: x <= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  '["method","result_margin"]':
    code:
    - suggestion: '.satisfies("(lower(result) NOT IN (''runs'',''wickets'')) OR (result_margin
        > 0)", "margin_positive_for_decisive_results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(lower(result) != ''wickets'') OR (ROUND(result_margin)
        >= 1 AND ROUND(result_margin) <= 10)", "wicket_margin_bounds", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(lower(result) != ''runs'') OR (ROUND(result_margin)
        >= 1)", "run_margin_positive", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(lower(result) NOT IN (''tie'',''no result'')) OR (result_margin
        IS NULL OR result_margin = 0)", "no_margin_for_tie_or_no_result", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(method IS NULL) OR (upper(method) = ''D/L'')", "method_domain",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(method IS NULL) OR (upper(method) <> ''D/L'') OR (upper(method)
        = ''D/L'' AND lower(result) IN (''runs'',''wickets'') AND result_margin IS
        NOT NULL)", "dl_requires_applicable_result_and_margin", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("super_over <> ''Y'' OR result = ''tie''", "so_y_implies_tie",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN (result IN (''runs'',''wickets'') OR (result
        = ''tie'' AND super_over = ''Y'')) THEN (winner = team1 OR winner = team2)
        ELSE TRUE END", "winner_in_teams_for_decided", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT(result = ''tie'' AND super_over <> ''Y'') OR winner
        IS NULL", "no_winner_for_plain_ties", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT(result = ''no result'') OR (super_over = ''N''
        AND winner IS NULL)", "no_result_has_no_so_and_no_winner", lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_in_teams",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result <> ''runs'' OR CAST(result_margin AS DOUBLE)
        > 0) AND (result <> ''wickets'' OR CAST(result_margin AS DOUBLE) > 0)", "positive_margins_for_decided_matches",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN lower(result) IN (''runs'',''wickets'') THEN
        winner IS NOT NULL AND winner IN (team1, team2) ELSE TRUE END", "winner_present_and_valid_for_decisive_results",
        lambda v: v >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(result)=''tie'' AND COALESCE(upper(super_over),''N'')
        <> ''Y'' THEN winner IS NULL ELSE TRUE END", "no_winner_on_tie_without_super_over",
        lambda v: v >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(result)=''tie'' AND upper(super_over)=''Y''
        THEN winner IS NOT NULL AND winner IN (team1, team2) ELSE TRUE END", "winner_on_super_over_tie",
        lambda v: v >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(result)=''no result'' THEN winner IS
        NULL AND result_margin IS NULL ELSE TRUE END", "no_result_implies_no_winner_no_margin",
        lambda v: v >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(result)=''runs'' THEN CAST(result_margin
        AS INT) > 0 WHEN lower(result)=''wickets'' THEN CAST(result_margin AS INT)
        BETWEEN 1 AND 10 WHEN lower(result) IN (''tie'',''no result'') THEN result_margin
        IS NULL ELSE TRUE END", "result_margin_consistency", lambda v: v >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("toss_winner IN (team1, team2)", "toss_winner_in_teams",
        lambda v: v >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN toss_winner IN (team1, team2) THEN lower(toss_decision)
        IN (''bat'',''field'') ELSE TRUE END", "valid_toss_decision_for_toss_winner",
        lambda v: v >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN upper(super_over)=''Y'' THEN lower(result)=''tie''
        ELSE TRUE END", "super_over_only_on_ties", lambda v: v >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
