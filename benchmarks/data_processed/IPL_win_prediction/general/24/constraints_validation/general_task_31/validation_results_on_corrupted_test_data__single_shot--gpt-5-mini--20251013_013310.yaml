results:
  date:
    code:
    - suggestion: .hasPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isContainedIn('match_type', ['League','Qualifier 1','Qualifier
        2','Final','Semi Final','Eliminator','Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['tie','runs','wickets','no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result NOT IN ('runs','wickets')) OR result_margin
        IS NOT NULL", 'margin_present_for_decisive_results')
      status: true
      reason_if_failed: ''
      level: error
  result_margin_int:
    code:
    - suggestion: .hasDataType('result_margin_int', 'Integral')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasDataType(''result_margin_int'',
        ''Integral'')'': ''str'' object has no attribute ''_get_java_object'''
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', 'Integral')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasDataType(''season'',
        ''Integral'')'': ''str'' object has no attribute ''_get_java_object'''
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x >=
        0.99)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: error
