results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 = trim(team1)", ''team1_trimmed'', lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("length(trim(team1)) > 0", ''team1_nonempty'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", ''distinct_teams'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result = ''no result'') OR (winner = team1 OR winner
        = team2)", ''winner_is_one_of_teams'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 IS NULL OR (season IS NOT NULL AND season RLIKE
        ''^[0-9]+$'')", ''season_numeric_when_team1_present'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("length(trim(`team2`)) > 0", "team2_non_empty", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` <> ''no result'' THEN (`winner`
        = `team1` OR `winner` = `team2`) ELSE true END", "winner_in_teams", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "distinct_opponents", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.satisfies("`player_of_match` IS NOT NULL", "At least one non-null
        player_of_match exists", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`player_of_match` IS NULL OR TRIM(`player_of_match`)
        NOT IN ('''', ''NA'', ''N/A'', ''UNKNOWN'', ''-'')", "No placeholder tokens
        in player_of_match", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`player_of_match` IS NULL OR `player_of_match` = TRIM(`player_of_match`)",
        "No leading or trailing whitespace in player_of_match", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result NOT IN (''runs'',''wickets'') THEN
        result_margin IS NULL ELSE TRUE END", "Null margin for non-run/wicket results",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') AND result_margin
        IS NOT NULL THEN result_margin = CAST(result_margin AS BIGINT) ELSE TRUE END",
        "Integer margins for run/wicket results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') AND result_margin
        IS NOT NULL THEN result_margin > 0 ELSE TRUE END", "Positive margins for run/wicket
        results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.isContainedIn(''super_over'', [''Y'', ''N''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.satisfies("(`toss_winner` = `team1`) OR (`toss_winner` = `team2`)",
        "toss_winner_in_participating_teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`toss_winner` IS NOT
        NULL)", "toss_winner_nonnull_on_played", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`toss_winner` IS NOT NULL) AND (LENGTH(TRIM(`toss_winner`))
        > 0) AND (`toss_winner` = TRIM(`toss_winner`))", "toss_winner_trimmed_and_nonempty",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''length(trim(`date`)) > 0'', ''Date non-empty when
        trimmed'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''date'', ''^[0-9]{4}-[0-9]{2}-[0-9]{2}$'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("to_date(`date`, ''yyyy-MM-dd'') IS NOT NULL", ''Date
        parseable to yyyy-MM-dd'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''trim(`date`) = `date`'', ''No leading/trailing whitespace
        in date'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: warning
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''city'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(super_over != ''Y'') OR (city IS NOT NULL)", "City
        present when super_over=Y", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(city IS NULL) OR (LENGTH(TRIM(city)) > 0)", "City
        non-empty when present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["city","venue"]':
    code:
    - suggestion: '.satisfies("super_over <> ''Y'' OR (city IS NOT NULL AND trim(city)
        <> '''' AND venue IS NOT NULL AND trim(venue) <> '''')", "City and venue must
        be present for super-over rows", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN super_over = ''Y'' THEN CASE WHEN id IS NOT
        NULL THEN 1 ELSE 0 END ELSE 1 END", "id not null for super overs", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: '.satisfies("CASE WHEN super_over = ''Y'' THEN CASE WHEN venue IS
        NOT NULL AND LENGTH(TRIM(venue)) > 0 THEN 1 ELSE 0 END ELSE 1 END", ''venue_present_for_super_over'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN winner IS NOT NULL AND (winner = team1 OR winner = team2) THEN 1 ELSE
        0 END ELSE 1 END", "Winner valid for decided outcomes", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NOT NULL THEN CASE WHEN (winner
        = team1 OR winner = team2) THEN 1 ELSE 0 END ELSE 1 END", "Winner must be
        one of the two teams when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(winner IS NULL) OR (TRIM(winner) <> '''' AND lower(TRIM(winner))
        NOT IN (''tie'',''no result'',''n/a'',''na'',''none''))", "Winner should be
        a team name or null, not special tokens", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN super_over = ''Y'' THEN CASE WHEN winner
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner present for super over
        matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no result''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result = lower(trim(result))", "result_lower_trimmed",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''result'', lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' THEN (winner IS NOT
        NULL AND (winner = team1 OR winner = team2)) ELSE TRUE END", "winner_in_teams_when_played",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["player_of_match","result"]':
    code:
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (winner IS
        NOT NULL AND (winner = team1 OR winner = team2))", "winner_within_teams_when_decided",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (result_margin
        IS NOT NULL AND CAST(result_margin AS INT) > 0)", "margin_present_for_decided",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result NOT IN (''tie'',''no result'')) OR (result_margin
        IS NULL)", "no_margin_when_tie_or_noresult", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result <> ''no result'') OR (winner IS NULL)", "no_winner_when_no_result",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result = ''no result'') OR (toss_winner = team1 OR
        toss_winner = team2)", "toss_winner_within_teams_when_played", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(super_over <> ''Y'') OR (result = ''tie'')", "super_over_implies_tie",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "teams_distinct_per_match", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("((result IN (''runs'',''wickets'') AND result_margin
        IS NOT NULL AND result_margin = CAST(result_margin AS BIGINT)) OR (result
        IN (''tie'',''no result'') AND result_margin IS NULL))", "Result-margin nullability
        and integer-like semantics by result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("((result = ''runs'' AND result_margin IS NOT NULL AND
        result_margin = CAST(result_margin AS BIGINT) AND result_margin >= 1) OR (result
        = ''wickets'' AND result_margin IS NOT NULL AND result_margin = CAST(result_margin
        AS BIGINT) AND result_margin BETWEEN 1 AND 10) OR (result IN (''tie'',''no
        result'') AND result_margin IS NULL))", "Result-margin conditional value bounds
        by result type", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "Team columns complete and distinct per match", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result = ''no result'') OR (toss_winner = team1 OR
        toss_winner = team2)", "Toss winner must be one of the teams for played matches",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
