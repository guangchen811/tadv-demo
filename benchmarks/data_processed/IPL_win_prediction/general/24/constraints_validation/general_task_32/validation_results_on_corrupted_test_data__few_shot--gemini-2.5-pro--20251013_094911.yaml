results:
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("NOT (result IN ('runs', 'wickets')) OR (result_margin
        IS NOT NULL)", 'result_margin_must_exist_for_decided_matches')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('team1 <> team2', 'teams_must_be_different')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("NOT (result IN ('runs', 'wickets')) OR (winner = team1
        OR winner = team2)", 'winner_must_be_a_participant')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("NOT (result IN ('runs', 'wickets')) OR (winner IS NOT
        NULL)", 'winner_must_exist_for_decided_matches')
      status: true
      reason_if_failed: ''
      level: error
