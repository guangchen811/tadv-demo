    - text: 'When a match result indicates a wickets victory (result_lc == ''wickets'',
        which sets is_wickets == True), result_margin must be present (numeric) and
        margin_wkts must contain that value (i.e. margin_wkts == result_margin and
        not null). At the same time margin_runs must be null for those rows. Actionable
        constraints (Deequ-style):


        - .where("is_wickets == true").isComplete("result_margin")

        - .where("is_wickets == true").isComplete("margin_wkts")

        - .where("is_wickets == true").isNull("margin_runs")

        - (optional) .satisfies("NOT (is_wickets AND margin_runs IS NOT NULL)", "wickets_margin_exclusivity")'
      sources:
      - start_line: 43
        end_line: 69
        file: ''
      - start_line: 17
        end_line: 17
        file: ''
      uid: 44a0c73b-b472-4b89-ba8c-1c86b45ef100
    - text: 'The result-type flags are derived from result_lc and must be consistent
        and mutually exclusive: is_runs and is_wickets should not both be true for
        the same row. Additionally, when result_lc is neither ''runs'' nor ''wickets''
        (e.g. ''tie'' or ''no result''), both is_runs and is_wickets should be false.
        Actionable constraints:


        - .satisfies("NOT (is_runs AND is_wickets)", "result_flags_mutually_exclusive")

        - .satisfies("(result_lc = ''runs'') = (is_runs = true)", "is_runs_consistent_with_result")

        - .satisfies("(result_lc = ''wickets'') = (is_wickets = true)", "is_wickets_consistent_with_result")'
      sources:
      - start_line: 43
        end_line: 64
        file: ''
      uid: 13528884-3fc5-4c07-958a-8a6e8644f4b4
    - text: 'Rows marked as not played (played == False), which are produced when
        result_lc == ''no result'', should not have margins or result-driven flags:
        is_runs and is_wickets must be false and result_margin, margin_runs and margin_wkts
        should be null for those rows. Actionable constraints:


        - .where("played == false").isNull("result_margin")

        - .where("played == false").isNull("margin_runs")

        - .where("played == false").isNull("margin_wkts")

        - .where("played == false").satisfies("NOT is_runs AND NOT is_wickets", "no_result_flags_and_margins_absent")'
      sources:
      - start_line: 57
        end_line: 69
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      uid: ecd2c9f1-8ea3-418d-9445-b3d830251467
    - text: 'Because the aggregation computes means over margin_runs and margin_wkts
        when is_runs/is_wickets are present, rows with is_runs == True must have at
        least some non-null margin_runs values within groups (and similarly for is_wickets
        with margin_wkts). At the row level this implies result_margin/margin_runs
        (for runs) or result_margin/margin_wkts (for wickets) should be complete so
        that group-level averages are meaningful. Actionable constraints:


        - .where("is_runs == true").isComplete("margin_runs")

        - .where("is_wickets == true").isComplete("margin_wkts")

        - .where("is_runs == true OR is_wickets == true").isComplete("result_margin")'
      sources:
      - start_line: 9
        end_line: 17
        file: ''
      - start_line: 48
        end_line: 69
        file: ''
      uid: b4b9ac0a-9df0-47d5-abc6-3f5c1c700df0
    - text: 'For tie results (result_lc == ''tie'') the dataset should not contain
        any victory margins: both margin_runs and margin_wkts should be null and both
        is_runs and is_wickets should be false. Actionable constraints:


        - .where("result_lc = ''tie''").isNull("margin_runs")

        - .where("result_lc = ''tie''").isNull("margin_wkts")

        - .where("result_lc = ''tie''").satisfies("NOT is_runs AND NOT is_wickets",
        "tie_has_no_margin_flags")'
      sources:
      - start_line: 43
        end_line: 69
        file: ''
      uid: e2ba1448-2b81-47e1-9ab6-47994a108af4
  '["match_type","season","winner"]':
    code: []
    assumptions:
    - text: 'For rows where match_type (after trimming/casefold) equals ''final'',
        there is exactly one final per season (i.e., season uniquely identifies the
        final row). In other words, among rows with normalized match_type == ''final'',
        the ''season'' column should be unique (no two final rows with the same season).
        This is used to derive the season champion with drop_duplicates(''season'').
        Example Deequ-style check (applied to the dataframe filtered to finals): .isUnique(["season"])
        and also ensure winner is present for those rows: .hasCompleteness("winner",
        1.0) on the filtered set.'
      sources:
      - start_line: 74
        end_line: 76
        file: ''
      - start_line: 112
        end_line: 116
        file: ''
      uid: b614d5bd-4d38-4baa-9712-1c7083108486
    - text: 'When deriving chasing_team: if toss_decision_lc == ''field'' then chasing_team
        must equal toss_winner; otherwise, toss_winner must equal one of team1 or
        team2 (so the ''else'' branch that picks the other team is valid). Concretely,
        for rows with toss_decision_lc != ''field'', toss_winner should be either
        team1 or team2. Example constraint: .satisfies("(toss_decision_lc = ''field''
        and chasing_team = toss_winner) or (toss_decision_lc != ''field'' and (toss_winner
        = team1 or toss_winner = team2))", "toss_winner_consistent_with_teams")'
      sources:
      - start_line: 49
        end_line: 54
        file: ''
      uid: f64bfd65-df54-497b-a7cb-47911a0b59a8
    - text: 'For matches marked as played (played == True), the ''winner'' must be
        one of the competing teams (team1 or team2), and toss_winner should be present
        (non-null) when used in toss_won_match computation. This ensures comparisons
        like (toss_winner == winner) and (winner == chasing_team) are meaningful.
        Example checks: on rows where played = true, .satisfies("winner = team1 or
        winner = team2", "winner_is_participating_team") and .hasCompleteness("toss_winner",
        1.0) for those rows.'
      sources:
      - start_line: 56
        end_line: 66
        file: ''
      uid: 19a00f86-2d5e-40dc-8fcc-87e4aed257b6
    - text: 'When result_lc indicates ''runs'' or ''wickets'', result_margin must
        be numeric/non-null so margin_runs or margin_wkts reflect an actual numeric
        margin. Concretely: for rows with result_lc == ''runs'', result_margin should
        be non-null numeric (used to populate margin_runs); similarly for result_lc
        == ''wickets'' used for margin_wkts. Example Deequ-style checks (on filtered
        subsets): for runs rows .hasCompleteness("result_margin", 1.0) and for wickets
        rows .hasCompleteness("result_margin", 1.0); or .satisfies("(result_lc = ''runs''
        implies isNumeric(result_margin)) and (result_lc = ''wickets'' implies isNumeric(result_margin))",
        "margin_numeric_for_result_type")'
      sources:
      - start_line: 47
        end_line: 49
        file: ''
      - start_line: 61
        end_line: 69
        file: ''
      - start_line: 16
        end_line: 17
        file: ''
      uid: 5c94d75b-b401-4e6a-9e72-a1eb57d70741
    - text: 'Grouping and KPI calculations assume the grouping keys (''season'', ''match_type'')
        are present (non-null) so groupby([''season'',''match_type'']) yields meaningful
        groups. Enforce completeness for both columns prior to grouping. Example checks:
        .hasCompleteness("season", 1.0) and .hasCompleteness("match_type", 1.0) (or
        a combined check ensuring no row has both nulls).'
      sources:
      - start_line: 71
        end_line: 72
        file: ''
      - start_line: 78
        end_line: 80
        file: ''
      uid: 9b0213a0-3575-40aa-971e-0ea96146d8ad
    - text: 'Alerts logic expects that for the latest season there may be a ''League''
        group in the season+match_type KPIs. In particular, when computing alerts
        the code selects kpi_sm rows where season == latest_season and match_type
        == ''League''. Therefore, for reliable alert generation ensure that for the
        (numeric) latest season there exists at least one row with match_type == ''League''
        in the grouped KPI table. Example validation: after grouping, assert that
        kpi_sm contains at least one row matching season = <latest_season> and match_type
        = ''League'' (or flag if missing).'
      sources:
      - start_line: 94
        end_line: 96
        file: ''
      - start_line: 71
        end_line: 72
        file: ''
      uid: a8bf57ad-cd5a-47f5-952f-48f411135503
  '["played","result","winner"]':
    code: []
    assumptions:
    - text: 'When a match is marked as played (played == True, derived from result
        != ''no result''), the ''winner'' field must be present (non-null) and must
        refer to one of the participating teams (either ''team1'' or ''team2''). Actionable
        checks (Deequ-like):

        - .where(col(''played'') == true).isComplete(''winner'')

        - .where(col(''played'') == true).satisfies(''winner == team1 OR winner ==
        team2'', ''winner_is_participant_when_played'')'
      sources:
      - start_line: 50
        end_line: 66
        file: ''
      uid: bd612080-02b7-4776-bb8c-c082a5df7cfd
    - text: 'The result type (result/result_lc) must be consistent with the numeric
        margin (result_margin):

        - If result_lc == ''runs'' then result_margin must be numeric/finite and margin_runs
        (derived) must be non-null while margin_wkts should be null.

        - If result_lc == ''wickets'' then result_margin must be numeric/finite and
        margin_wkts (derived) must be non-null while margin_runs should be null.

        Actionable checks (Deequ-like):

        - .where(col(''result_lc'') == ''runs'').isComplete(''result_margin'') and
        .where(col(''result_lc'') == ''runs'').satisfies(''result_margin > 0'', ''positive_run_margin'')

        - .where(col(''result_lc'') == ''runs'').isComplete(''margin_runs'') and .where(col(''result_lc'')
        == ''runs'').isNull(''margin_wkts'')

        - .where(col(''result_lc'') == ''wickets'').isComplete(''result_margin'')
        and .where(col(''result_lc'') == ''wickets'').satisfies(''result_margin >
        0'', ''positive_wicket_margin'')

        - .where(col(''result_lc'') == ''wickets'').isComplete(''margin_wkts'') and
        .where(col(''result_lc'') == ''wickets'').isNull(''margin_runs'')'
      sources:
      - start_line: 43
        end_line: 69
        file: ''
      uid: bf4bba57-b0da-4be3-8b1f-e07ab05dc4df
    - text: 'The logic that derives the chasing team assumes ''toss_winner'' is one
        of the two competing teams and that ''toss_decision_lc'' is normalized to
        meaningful values (e.g. ''field'' or other). Concretely: toss_winner should
        belong to {team1, team2} for matches where team identities are known. Actionable
        checks:

        - .satisfies(''toss_winner == team1 OR toss_winner == team2'', ''toss_winner_in_participants'')

        - .isContainedIn(''toss_decision_lc'', [''field'',''bat'']) or ensure normalized
        domain for toss_decision_lc'
      sources:
      - start_line: 44
        end_line: 54
        file: ''
      uid: 71a5c737-c643-43a8-8878-ead8f4fd01f3
    - text: "For computing champions the code expects at most one Final winner per\
        \ season (i.e., per season there should be a single Final row or at least\
        \ a single consistent winner). Actionable checks:\n- Ensure uniqueness or\
        \ single non-null winner per season among rows where match_type (normalized/trimmed/casefolded)\
        \ == 'final'. Example Deequ-like checks:\n  .where(col('match_type').trim().casefold()\
        \ == 'final').isUnique(['season'])  OR\n  .where(col('match_type').trim().casefold()\
        \ == 'final').satisfies('countDistinct(winner) == 1', 'one_champion_per_season')"
      sources:
      - start_line: 74
        end_line: 77
        file: ''
      - start_line: 116
        end_line: 121
        file: ''
      uid: 9739f3fd-be7d-4951-b287-fe2c9ca430d6
    - text: 'Rows with result == ''no result'' (played == False) should not carry
        numeric margins and should generally have no declared winner. Concretely:

        - If played == False then result_margin, margin_runs and margin_wkts should
        be null and winner should be null/blank.

        Actionable checks:

        - .where(col(''played'') == false).isNull(''result_margin'')

        - .where(col(''played'') == false).isNull(''margin_runs'') and .where(col(''played'')
        == false).isNull(''margin_wkts'')

        - .where(col(''played'') == false).isNullOrEmpty(''winner'')'
      sources:
      - start_line: 43
        end_line: 69
        file: ''
      uid: 01c2e3ba-4601-4efd-9a59-ba4e3e0f99a1
