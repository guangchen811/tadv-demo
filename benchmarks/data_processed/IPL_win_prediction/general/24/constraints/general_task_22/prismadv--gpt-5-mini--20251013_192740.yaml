    assumptions:
    - text: 'toss_winner must be one of the two competing teams (team1 or team2) in
        every match row. The chasing_team logic assumes toss_winner belongs to {team1,
        team2}; if this is violated the derived chasing_team will be incorrect. Example
        Deequ-style constraint: .satisfies("toss_winner == team1 OR toss_winner ==
        team2", Array("toss_winner","team1","team2"))'
