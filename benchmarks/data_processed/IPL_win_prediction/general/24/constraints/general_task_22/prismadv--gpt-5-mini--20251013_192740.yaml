  '["chasing_team","team1","team2","toss_decision","toss_winner"]':
    code: []
    assumptions:
    - text: 'Row-level derivation rule: after lowercasing toss_decision into toss_decision_lc
        the chasing_team is computed deterministically from toss_decision_lc, toss_winner,
        team1 and team2. Concretely:

        - If toss_decision_lc == ''field'' then chasing_team must equal toss_winner.

        - If toss_decision_lc != ''field'' (i.e. ''bat'') then chasing_team must equal
        the team that did NOT win the toss (if toss_winner == team1 then chasing_team
        == team2, else chasing_team == team1).

        Actionable constraints (examples):

        - No rows should violate: (toss_decision_lc = ''field'' AND chasing_team !=
