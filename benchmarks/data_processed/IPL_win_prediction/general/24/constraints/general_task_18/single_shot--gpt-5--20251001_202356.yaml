constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda v: v >= 0.98)'
      - Valid
    assumptions: []
  date:
    code:
    - - .hasPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L'])
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - '.hasCompleteness(''player_of_match'', lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs','wickets','tie','no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isComplete('result_margin', where="result IN ('runs','wickets')")
      - Invalid
    - - '.satisfies(''result_margin >= 1'', ''margin_positive_when_win'', lambda v:
        v == 1.0, where="result IN (''runs'',''wickets'')")'
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y','N'])
      - Valid
    assumptions: []
  super_over,result:
    code:
    - - '.satisfies("(super_over = ''Y'' AND result = ''tie'') OR (super_over = ''N''
        AND result <> ''tie'')", ''super_over_consistent_with_tie'', lambda v: v ==
        1.0)'
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isComplete('target_overs', where="method = 'D/L'")
      - Invalid
    - - '.satisfies(''target_overs >= 1 AND target_overs <= 20'', ''dl_target_overs_in_range'',
        lambda v: v == 1.0, where="method = ''D/L''")'
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .isComplete('target_runs', where="method = 'D/L'")
      - Invalid
    - - '.satisfies(''target_runs >= 1'', ''dl_target_runs_positive'', lambda v: v
        == 1.0, where="method = ''D/L''")'
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1,team2:
    code:
    - - '.satisfies(''team1 <> team2'', ''teams_distinct'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat','field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - '.satisfies(''toss_winner = team1 OR toss_winner = team2'', ''toss_winner_in_teams'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner', where="result <> 'no result'")
      - Invalid
    - - '.satisfies("result <> ''no result'' OR winner IS NULL", ''winner_null_when_no_result'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
