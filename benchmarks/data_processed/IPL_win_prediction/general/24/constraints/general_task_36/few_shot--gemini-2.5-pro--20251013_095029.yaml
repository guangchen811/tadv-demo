constraints:
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("result NOT IN ('runs', 'wickets') OR result_margin IS NOT NULL",
        'result_margin must be present for decided matches')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", 'toss_winner must
        be one of the competing teams')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("result != 'no result' OR winner IS NULL", 'winner must be null
        for no_result matches')
      - Valid
    - - .satisfies("winner IS NULL OR winner = team1 OR winner = team2", 'winner must
        be one of the competing teams')
      - Valid
    assumptions: []
