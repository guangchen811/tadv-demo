constraints:
  method:
    code:
    - - .isComplete('method')
      - Invalid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isComplete('result_margin')
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isComplete('target_overs')
      - Invalid
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner')
      - Invalid
    assumptions: []
