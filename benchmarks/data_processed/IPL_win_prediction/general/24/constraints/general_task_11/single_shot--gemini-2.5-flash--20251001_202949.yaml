constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda c: c >= 0.98)'
      - Valid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .isMatchingRegex('date', r'^\d{4}-\d{2}-\d{2}$')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier 2', 'Eliminator',
        'Final', 'Semi Final', 'Elimination Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - '.hasCompleteness(''method'', lambda c: c < 0.05)'
      - Valid
    - - '.isContainedIn(''method'', [''D/L''], lambda x: x is not None)'
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - '.hasCompleteness(''player_of_match'', lambda c: c >= 0.99)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.hasCompleteness(''result_margin'', lambda c: c >= 0.98)'
      - Valid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  result_margin_conditional_positive:
    code:
    - - .satisfies("CASE WHEN result IN ('runs', 'wickets') THEN result_margin IS
        NOT NULL AND result_margin > 0 ELSE TRUE END", "Result margin must be positive
        and non-null for runs/wickets results")
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isGreaterThanOrEqualTo('season', 2008)
      - Invalid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  super_over_tie_consistency:
    code:
    - - .satisfies("CASE WHEN result = 'tie' THEN super_over = 'Y' ELSE TRUE END",
        "If result is tie, super_over must be Y")
      - Valid
    assumptions: []
  target_overs:
    code:
    - - '.hasCompleteness(''target_overs'', lambda c: c >= 0.99)'
      - Valid
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_overs_non_zero:
    code:
    - - '.isGreaterThan(''target_overs'', 0, predicate=lambda x: x is not None)'
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - '.hasCompleteness(''target_runs'', lambda c: c >= 0.99)'
      - Valid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  team_distinctness:
    code:
    - - .areNotEqual('team1', 'team2')
      - Invalid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", "Toss winner must
        be one of the playing teams")
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda c: c >= 0.99)'
      - Valid
    - - .satisfies("winner IS NULL OR winner = team1 OR winner = team2", "Winner must
        be one of the playing teams or null")
      - Valid
    assumptions: []
