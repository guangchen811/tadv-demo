constraints:
  date:
    code:
    - - .compliesWith('date', '[0-9]{4}-[0-9]{2}-[0-9]{2}', 'date should be in YYYY-MM-DD
        format')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  multi-column:
    code:
    - - .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner must
        be one of the playing teams')
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['wickets', 'runs', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda x: x > 0.99, ''winner column should be
        at least 99% complete'')'
      - Valid
    assumptions: []
