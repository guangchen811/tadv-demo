constraints:
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs','wickets','tie','no result'])
      - Valid
    - - .satisfies("result != 'tie' OR super_over = 'Y'", 'tie_implies_super_over')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y','N'])
      - Valid
    - - .satisfies("super_over != 'Y' OR result = 'tie'", 'super_over_implies_tie')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .satisfies("team1 != team2", 'teams_must_be_distinct')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("result = 'no result' OR winner = team1 OR winner = team2", 'winner_is_participant_or_null')
      - Valid
    assumptions: []
