constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id').isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type').isContainedIn('match_type', ['Elimination Final',
        'Eliminator', 'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result').isContainedIn('result', ['runs', 'wickets', 'tie', 'no
        result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over').isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isComplete('target_overs').isNonNegative('target_overs')
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .isComplete('target_runs').isNonNegative('target_runs')
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision').isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner')
      - Invalid
    assumptions: []
