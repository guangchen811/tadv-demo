  '["margin_runs","margin_wickets","result","result_margin"]':
    code: []
    assumptions:
    - text: 'When ''result'' is ''runs'', ''result_margin'' must be present (not null)
        and represent the number of runs; when ''result'' is ''wickets'', ''result_margin''
        must be present (not null) and represent the number of wickets. For other
        values of ''result'', ''result_margin'' may be null or ignored. This is needed
        for constructing ''margin_runs'' and ''margin_wickets'' features. This can
        be represented in Deequ as an ''if-then'' constraint: if ''result'' == ''runs'',
        then ''result_margin'' is not null and >= 0; if ''result'' == ''wickets'',
        then ''result_margin'' is not null and >= 0.'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 48
        end_line: 49
        file: ''
      uid: 736a6e93-1480-43f9-b52f-b8f174e2a17c
    - text: '''target_runs'' and ''target_overs'' must both be present (not null)
        and ''target_overs'' must not be zero for all rows in the training set, because
        ''target_run_rate'' is calculated as ''target_runs'' divided by ''target_overs''.
        This can be represented in Deequ as: (''target_runs'' is not null AND ''target_overs''
        is not null AND ''target_overs'' != 0) for all records in the training set.'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      uid: 9c5e9bad-640c-41a0-bd8a-22a26d3369a4
    - text: '''target_overs'' must not exceed 20.0 for all records, since ''revised_overs_shortfall''
        is calculated as (20.0 - target_overs); negative values would not make sense
        in this context.'
      sources:
      - start_line: 46
        end_line: 46
        file: ''
      uid: 3f4229d7-b326-4792-ac61-13a1aba0ce64
  '["result","result_margin"]':
    code: []
    assumptions:
    - text: 'For all rows where ''result'' is either ''runs'' or ''wickets'', the
        ''result_margin'' column must not be null. This is because ''margin_runs''
        and ''margin_wickets'' features are computed based on these conditions, and
        missing values are filled with zero, which may not be semantically correct.
        To ensure data quality, enforce that if ''result'' is ''runs'' or ''wickets'',
        then ''result_margin'' must be present (non-null). This can be represented
        as a multi-column constraint (e.g., in Deequ): .where(''result in ("runs",
        "wickets")'').hasCompleteness(''result_margin'', _ >= 1.0)'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 47
        end_line: 49
        file: ''
      uid: 66b58dde-6de8-4108-a6e7-6de697f07c50
    - text: When 'result' is 'runs', the 'margin_runs' feature is set based on 'result_margin',
        and when 'result' is 'wickets', 'margin_wickets' is set based on 'result_margin'.
        Therefore, the values of 'margin_runs' and 'margin_wickets' should never both
        be non-zero for the same row. This implies that for each row, at most one
        of ('result' == 'runs', 'margin_runs' > 0) or ('result' == 'wickets', 'margin_wickets'
        > 0) can be true. This can be represented as a constraint that for every row,
        not both 'margin_runs' and 'margin_wickets' are positive simultaneously.
      sources:
      - start_line: 47
        end_line: 49
        file: ''
      uid: 449f1ca3-e389-47a0-9c60-402995da5f48
    - text: 'The values of ''result'' are restricted to ''runs'', ''wickets'', and
        ''tie'' in the training set (df_train), as enforced by the train_mask. Therefore,
        any downstream logic or model training based on df_train assumes that ''result''
        contains only these three categories. This can be represented as a categorical
        constraint: .isContainedIn(''result'', ["runs", "wickets", "tie"])'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      uid: 1d169774-5115-4437-8286-60676447f118
  '["result","super_over"]':
    code: []
    assumptions:
    - text: 'For all records in the training set (where ''result'' is in [''runs'',
        ''wickets'', ''tie'']), the combination of ''target_runs'' and ''target_overs''
        must be non-null and ''target_overs'' must be non-zero to safely compute ''target_run_rate''
        as ''target_runs'' divided by ''target_overs''. This ensures there are no
        division-by-zero or missing value errors during feature calculation. This
        can be represented as a Deequ constraint: .where(''result in ("runs", "wickets",
        "tie")'').forall(lambda row: row[''target_overs''] != 0 and row[''target_runs'']
        is not None and row[''target_overs''] is not None)'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 45
        end_line: 45
        file: ''
      uid: 39c26446-ccbd-4141-9702-7f2061d0ad4e
    - text: 'For all records in the training set, if ''result'' is ''runs'', then
        ''margin_runs'' should reflect ''result_margin'' (with nulls filled as zero),
        and if ''result'' is ''wickets'', then ''margin_wickets'' should reflect ''result_margin''
        (with nulls filled as zero); in all other cases, both should be zero. This
        implies a mutually exclusive relationship between ''result'', ''margin_runs'',
        and ''margin_wickets'' columns. This can be expressed as a multi-column conditional
        constraint: If ''result'' == ''runs'', then ''margin_runs'' == ''result_margin''
        (or 0 if null) and ''margin_wickets'' == 0; if ''result'' == ''wickets'',
        then ''margin_wickets'' == ''result_margin'' (or 0 if null) and ''margin_runs''
        == 0.'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 48
        end_line: 49
        file: ''
      uid: 1aeb9f71-2b58-4f2c-8424-6e6f978e947b
    - text: 'The ''super_over'' column should only take the values ''Y'' or ''N''
        for all records and must be non-null. This is enforced when constructing the
        ''super_over_flag'' feature, which assumes only these two values are present.
        This can be represented as a categorical value constraint: .hasValueInSet(''super_over'',
        {''Y'', ''N''})'
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      uid: 4efccbce-0106-4c53-9ab2-57ec9de56f77
    - text: 'For all records in the training set, ''result'' must be one of the allowed
        set: [''runs'', ''wickets'', ''tie'']. This is enforced by train_mask and
        impacts all downstream features calculated on df_train. This can be expressed
        as a categorical value constraint: .hasValueInSet(''result'', {''runs'', ''wickets'',
        ''tie''}) applied to the training set.'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      uid: 019ac729-d182-405e-a7df-83f9cfad97b3
  '["revised_overs_shortfall","target_overs"]':
    code: []
    assumptions:
    - text: 'Both ''target_runs'' and ''target_overs'' must be non-null and positive
        for all rows in the training set (df_train), since they are used as divisors
        and numerators in feature calculations. In particular, ''target_overs'' must
        not be zero to avoid division by zero in ''target_run_rate'' and must be less
        than or equal to 20.0 for ''revised_overs_shortfall'' to make sense. This
        can be represented in Deequ as: .where(''target_overs > 0 AND target_overs
        <= 20.0 AND target_runs > 0'').hasCompleteness(''target_overs'', 1.0).hasCompleteness(''target_runs'',
        1.0)'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      uid: c7513e62-0ae5-44c1-a308-28b2bec2e5c1
    - text: 'The value of ''revised_overs_shortfall'' is computed as (20.0 - target_overs),
        so for all rows, ''target_overs'' must be less than or equal to 20.0 and greater
        than or equal to 0. This can be enforced with a Deequ constraint: .where(''target_overs
        >= 0 AND target_overs <= 20.0'')'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      uid: 73ce36b3-c4e3-4121-924e-f59b802c69f4
  '["target_overs","target_run_rate","target_runs"]':
    code: []
    assumptions:
    - text: 'Both ''target_runs'' and ''target_overs'' must be non-null and numeric
        for all rows where they are used together, especially since ''target_run_rate''
        is computed as their ratio. Additionally, ''target_overs'' must not be zero
        wherever ''target_run_rate'' is computed to avoid division by zero errors.
        This could be represented in Deequ as: .hasCompleteness([''target_runs'',
        ''target_overs''], 1.0) and .hasNonZeroValue(''target_overs'').'
      sources:
      - start_line: 23
        end_line: 24
        file: ''
      - start_line: 43
        end_line: 45
        file: ''
      uid: dc0321f0-c8c3-4840-aada-d390d15f85c0
    - text: 'The values of ''target_runs'' and ''target_overs'' should be positive
        (greater than zero) whenever used to compute ''target_run_rate'', as negative
        or zero values would not make sense in the context of cricket match targets.
        This could be represented as: .hasMin(''target_runs'', 1) and .hasMin(''target_overs'',
        1).'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      uid: c580e42b-78ae-439b-a7b0-59a292cc8f36
    - text: 'For each record, the combination of ''target_runs'', ''target_overs'',
        and the derived ''target_run_rate'' should satisfy the mathematical relationship:
        target_run_rate = target_runs / target_overs, wherever both target_runs and
        target_overs are non-null and target_overs is non-zero. This can be validated
