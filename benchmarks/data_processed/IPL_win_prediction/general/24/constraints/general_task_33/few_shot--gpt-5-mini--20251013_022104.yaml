constraints:
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier 2', 'Final',
        'Semi Final', 'Eliminator', 'Elimination Final'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['no result', 'runs', 'wickets', 'tie'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.hasCompleteness(''result_margin'', lambda x: x >= 0.98)'
      - Valid
    - - .hasDataType('result_margin', 'Fractional')
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasDataType('target_overs', 'Fractional')
      - Invalid
    - - .isComplete('target_overs')
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .hasDataType('target_runs', 'Fractional')
      - Invalid
    - - .isComplete('target_runs')
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      - Valid
    assumptions: []
