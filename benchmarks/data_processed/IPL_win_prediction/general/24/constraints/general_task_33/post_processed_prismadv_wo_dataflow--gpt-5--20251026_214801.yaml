        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      uid: 6d9e22ac-5a27-4272-a365-bf70bb136f9b
    - text: 'For rows used in league computations that are decided by runs, ''target_overs''
        must be present (not null) and parseable as numeric (i.e., not coerced to
        null by to_numeric). We could represent this as a conditional Deequ constraint:
        .satisfies("CASE WHEN match_type = ''League'' AND result = ''runs'' THEN CASE
        WHEN target_overs IS NOT NULL AND CAST(target_overs AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END ELSE 1 END", ''target_overs present and numeric for runs-decided
        league matches'', lambda x: x == 1)'
      sources:
