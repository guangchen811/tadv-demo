      source_assumptions:
      - 3f420fa4-1e44-4b53-8174-bbe35df7f882
    assumptions:
    - text: 'For rows where match_type = ''League'', ''team1'' must be present and
        non-empty (no nulls or blanks). Missing values would drop or mis-attribute
        matches when the script expands to team-centric rows and aggregates standings.
        Deequ-style examples: .isComplete(''team1'').where("match_type = ''League''")
        and .satisfies("CASE WHEN match_type = ''League'' AND TRIM(team1) = '''' THEN
        0 ELSE 1 END", ''team1 non-empty for League'', lambda r: r == 1)'
      sources:
      - start_line: 28
        end_line: 35
        file: ''
      - start_line: 61
        end_line: 70
        file: ''
      uid: 1d04faa6-bd57-4c3f-a1c6-8cba068b1c9f
    - text: '''team1'' values should be normalized strings without leading/trailing
        whitespace to ensure correct equality comparisons and grouping (e.g., ''Team
        A'' and '' Team A '' must not be treated as different teams). Deequ-style
        example: .satisfies("team1 = TRIM(team1)", ''No leading/trailing whitespace
        in team1'', lambda r: r == 1)'
      sources:
      - start_line: 41
        end_line: 46
        file: ''
      - start_line: 61
        end_line: 75
        file: ''
      uid: 9e5fa0c8-37ab-4bb7-987d-685840d3cc6c
    - text: 'For rows where match_type = ''League'', ''team1'' must not equal ''team2''
        (no self-matches). Self-matches would distort wins/losses, points, and aggregation
        by team. Deequ-style example: .satisfies("CASE WHEN match_type = ''League''
        THEN CASE WHEN team1 <> team2 THEN 1 ELSE 0 END ELSE 1 END", ''No self-matches'',
        lambda r: r == 1)'
      sources:
      - start_line: 28
        end_line: 35
        file: ''
      - start_line: 61
        end_line: 70
        file: ''
      uid: d4429030-4b1e-4d91-9b95-87e6966c987d
    - text: 'For League rows with a decided result (result <> ''no result''), the
        ''winner'' value should be either ''team1'' or ''team2''. This ensures the
        downstream comparisons of the derived ''team'' (from ''team1''/''team2'')
        to ''winner'' behave as intended for points, wins/losses, super-over flags,
        and nrr proxies. Deequ-style example: .satisfies("CASE WHEN match_type = ''League''
        AND result <> ''no result'' THEN CASE WHEN winner IN (team1, team2) THEN 1
        ELSE 0 END ELSE 1 END", ''Winner must be one of the two teams'', lambda r:
        r == 1)'
      sources:
      - start_line: 28
        end_line: 35
        file: ''
      - start_line: 39
        end_line: 46
        file: ''
      - start_line: 51
        end_line: 58
        file: ''
      uid: 022cf67d-1cad-4fd3-afd9-48c48afd573c
    - text: 'The ''team1'' column should have a bounded number of distinct values
        to guard against typos and unexpected new categories that would fragment standings.
        Based on current data (about 19 distinct teams), set a reasonable upper bound,
        e.g., approx distinct count <= 32. Deequ-style example: .hasApproxCountDistinct(''team1'',
        lambda v: v <= 32)'
      sources:
      - start_line: 61
        end_line: 75
        file: ''
      uid: 3f420fa4-1e44-4b53-8174-bbe35df7f882
