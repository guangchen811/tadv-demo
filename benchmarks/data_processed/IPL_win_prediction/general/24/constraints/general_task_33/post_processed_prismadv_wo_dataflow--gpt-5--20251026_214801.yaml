        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      uid: ba89ad62-1478-49bd-8dbf-bd01942477a0
    - text: 'For league matches decided by runs, ''target_overs'' must be strictly
        greater than 0 to avoid division by zero or non-finite results in the net
        performance proxy. We could represent this as a conditional Deequ constraint:
        .satisfies("CASE WHEN match_type = ''League'' AND result = ''runs'' THEN CASE
        WHEN CAST(target_overs AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE 1 END", ''target_overs
        > 0 for runs-decided league matches'', lambda x: x == 1)'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      uid: 09a59571-ed81-46ec-8af5-aea8d9144cdb
