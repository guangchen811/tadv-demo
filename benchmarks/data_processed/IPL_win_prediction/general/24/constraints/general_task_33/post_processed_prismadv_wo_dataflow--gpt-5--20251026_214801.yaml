        This can be represented as: Great Expectations: expect_column_unique_value_count_to_be_between(''team2'',
        min_value=2, max_value=40, row_condition="match_type == ''League''", condition_parser="pandas");
        Deequ: .where("match_type = ''League''").hasApproxCountDistinct(''team2'',
