      sources:
      - start_line: 25
        end_line: 35
        file: ''
      - start_line: 61
        end_line: 68
        file: ''
      uid: 4acb781b-a188-4f0b-a0a9-68362da8591c
    - text: 'For League rows, team2 must not equal team1 (no self-matches). Self-matches
        would duplicate the same team in the long format and distort points and aggregates.
        This can be represented as: Deequ: .satisfies("CASE WHEN match_type = ''League''
        THEN team2 <> team1 ELSE TRUE END", ''no_self_matches'', lambda x: x == 1.0);
        Great Expectations: expect_column_pair_values_A_to_not_equal_B(''team2'',
        ''team1'', row_condition="match_type == ''League''", condition_parser="pandas").'
      sources:
      - start_line: 28
        end_line: 33
        file: ''
      uid: e75631c8-2ff7-4806-97c7-004b0f16001d
    - text: 'For League rows, team2 values should come from the same canonical team-name
        vocabulary used in team1 (exact string matching, including case/whitespace),
        ensuring cross-column equality checks (e.g., with winner) behave correctly.
        A practical rule is: all TRIM(team2) are contained in the set of TRIM(team1)
        observed in the input. This can be implemented as: Great Expectations: allowed_teams
        = df.loc[df.match_type==''League'', ''team1''].dropna().str.strip().unique();
        expect_column_values_to_be_in_set(''team2'', allowed_teams, row_condition="match_type
        == ''League''", condition_parser="pandas"); Deequ: compute allowed set from
        team1 and enforce .isContainedIn(''team2'', allowed_set) under the League
