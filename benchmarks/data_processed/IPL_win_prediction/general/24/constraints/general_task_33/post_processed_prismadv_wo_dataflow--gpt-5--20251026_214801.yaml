        grouping and ranking because team2 is promoted to the participant column ''team''.
        This can be represented as a conditional completeness check, for example:
        Deequ: .where("match_type = ''League''").hasCompleteness(''team2'', lambda
        x: x == 1.0) and .satisfies("CASE WHEN match_type = ''League'' THEN LENGTH(TRIM(team2))
        > 0 ELSE 1 END", ''team2_non_empty_in_league'', lambda x: x == 1.0); Great
        Expectations: expect_column_values_to_not_be_null(''team2'', row_condition="match_type
        == ''League''", condition_parser="pandas") and expect_column_values_to_not_match_regex(''team2'',
