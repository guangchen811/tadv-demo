      sources:
      - start_line: 28
        end_line: 33
        file: ''
      - start_line: 41
        end_line: 46
        file: ''
      uid: 45a495e5-8644-4ee5-a9cf-8c7f360aefb7
    - text: 'For League rows where a winner is required (result in [''runs'',''wickets'',''tie'']),
        winner must equal either team1 or team2. This guards against spelling/casing
        mismatches and ensures that points and win/loss attribution derived from team2
        are correct. This can be represented as: Deequ: .satisfies("CASE WHEN match_type
        = ''League'' AND result IN (''runs'',''wickets'',''tie'') THEN (winner = team1
        OR winner = team2) ELSE TRUE END", ''winner_is_participant'', lambda x: x
        == 1.0); Great Expectations: expect_condition_to_be_true("(winner == team1)
        | (winner == team2)", row_condition="(match_type == ''League'') & (result.isin([''runs'',''wickets'',''tie'']))",
        condition_parser="pandas").'
      sources:
      - start_line: 37
        end_line: 46
        file: ''
      uid: 2d0d6488-6752-4ff9-b08d-22737f314cd6
    - text: 'For League rows, the number of distinct team2 values should be within
        a plausible league range (e.g., between 2 and 40). This helps catch data entry
