      sources:
      - start_line: 25
        end_line: 25
        file: ''
      uid: 569eda18-b3ef-4f8a-bb36-0f5bc8b0db08
    - text: 'Values in ''match_type'' must be standardized and case-sensitive, with
        ''League'' appearing exactly as ''League'' (no leading/trailing whitespace
        or case variants), since the code filters using exact equality. This can be
        represented as a compliance check like: proportion of rows where match_type
        = TRIM(match_type) is 1.0; and at least one row where match_type = ''League''.'
      sources:
      - start_line: 24
        end_line: 25
        file: ''
      uid: 44ae0647-0934-4401-8367-4e89021d68aa
    - text: 'The ''match_type'' column should have no nulls (completeness = 1.0),
        so that intended league matches are not inadvertently excluded by the equality
        filter. This can be represented as Deequ hasCompleteness(''match_type'', lambda
        x: x == 1.0) or Great Expectations expect_column_values_to_not_be_null.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      uid: 8f767153-ff17-42a2-a434-05bef8e6735f
    - text: 'The ''match_type'' values should be restricted to the known set observed
        in the data profile: {''League'', ''Qualifier 1'', ''Qualifier 2'', ''Eliminator'',
        ''Final'', ''Semi Final'', ''Elimination Final''}. This can be represented
        as Deequ isContainedIn(''match_type'', allowedSet) or Great Expectations expect_column_values_to_be_in_set.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      uid: e6322b39-f9bc-4292-b725-a1b59b83212b
    - text: There must be at least one row with match_type = 'League' so that the
        league table and seeding can be produced. This can be represented as a compliance
        ratio on CASE WHEN match_type = 'League' THEN 1 ELSE 0 END being greater than
        0.
      sources:
      - start_line: 24
        end_line: 25
        file: ''
      uid: 232260df-938a-4a07-b4b9-645c67574dad
