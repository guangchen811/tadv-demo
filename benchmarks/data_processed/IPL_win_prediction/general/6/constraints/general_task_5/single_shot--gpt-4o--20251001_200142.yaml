constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda x: x >= 0.987)'
      - Valid
    assumptions: []
  date:
    code:
    - - '.hasCompleteness(''date'', lambda x: x == 1.0)'
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - '.hasCompleteness(''match_type'', lambda x: x == 1.0)'
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - '.hasCompleteness(''player_of_match'', lambda x: x >= 0.998)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isGreaterThanOrEqualTo('target_overs', 0)
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda x: x >= 0.998)'
      - Valid
    assumptions: []
