constraints:
  date:
    code:
    - - '.hasPattern(''date'', ''^\\d{4}-\\d{2}-\\d{2}$'', lambda v: v >= 0.99)'
      - Valid
    - - .isComplete('date')
      - Valid
    - - '.satisfies(''year(to_date(date)) = CAST(season AS INT)'', ''date_year_matches_season'',
        lambda v: v >= 0.98)'
      - Valid
    assumptions: []
  id:
    code:
    - - '.hasUniqueness([''id''], lambda u: u >= 0.95)'
      - Valid
    - - .isComplete('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier 2', 'Eliminator',
        'Final', 'Elimination Final', 'Semi Final'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - '.satisfies(''season >= 2008 AND season <= 2025'', ''season_in_expected_range'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - '.satisfies(''team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <> team2'',
        ''teams_are_distinct'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  tie_super_over_consistency:
    code:
    - - '.satisfies("(super_over = ''Y'' AND result = ''tie'') OR (super_over = ''N''
        AND result <> ''tie'')", ''tie_super_over_consistency'', lambda v: v >= 0.995)'
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda c: c >= 0.995)'
      - Valid
    - - '.satisfies("(result = ''no result'' AND winner IS NULL) OR (winner IN (team1,
        team2))", ''winner_validity'', lambda v: v >= 0.995)'
      - Valid
    assumptions: []
