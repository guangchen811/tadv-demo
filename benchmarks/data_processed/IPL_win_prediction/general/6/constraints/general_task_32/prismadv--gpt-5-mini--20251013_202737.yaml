  '["points_team1","points_team2","result","team1","team2","winner"]':
    code: []
    assumptions:
    - text: 'For decided matches (rows where result is ''runs'' or ''wickets''), the
        ''winner'' value must be one of the two competing teams in the same row: either
        equal to ''team1'' or equal to ''team2''. This can be expressed as a conditional
