      source_assumptions:
      - ed7f6bc8-a2b9-4f89-8257-0a161e67e6c6
    assumptions:
    - text: 'The ''result_margin'' column should be parseable as numeric. The code
        calls pd.to_numeric(..., errors=''coerce'') so non-numeric input will become
        NaN, but subsequent operations cast to int for decided matches and will fail
        if those values are not numeric. Represent as a validation: WHEN result IN
        (''runs'',''wickets'') THEN result_margin IS NOT NULL AND is_numeric(result_margin).'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 33
        end_line: 37
        file: ''
      - start_line: 52
        end_line: 60
        file: ''
      uid: 54f155f0-b152-4d4b-95e7-77330e13cd59
    - text: 'For matches with result == ''wickets'', ''result_margin'' must be an
        integer in the range 1..10 (inclusive). The code converts to int and divides
        by 10.0 expecting wicket counts 1..10; values outside this range or missing
        for wicket matches will cause incorrect factors or errors. Validation example:
        WHEN result = ''wickets'' THEN result_margin BETWEEN 1 AND 10 AND result_margin
        IS INTEGER.'
      sources:
      - start_line: 27
        end_line: 27
        file: ''
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      - start_line: 22
        end_line: 22
        file: ''
      uid: abb5de61-649c-4192-a435-248ff9adbfb2
    - text: 'For matches with result == ''runs'', ''result_margin'' should be a positive
        integer (>=1). The code casts to int, clips values above 200 to 200 and scales
        by 200. While values >200 will be truncated to 200 by the code, the input
        is expected to be a sensible run margin (preferably <=200). Validation example:
        WHEN result = ''runs'' THEN result_margin >= 1 AND result_margin IS INTEGER
        (optionally result_margin <= 200).'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 33
        end_line: 34
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      - start_line: 22
        end_line: 22
        file: ''
      uid: ed7f6bc8-a2b9-4f89-8257-0a161e67e6c6
    - text: 'Nulls in ''result_margin'' are acceptable for non-decided matches (e.g.,
        ''tie'' or ''no result''), but for decided matches (result == ''runs'' or
        result == ''wickets'') the value must be present. Validation example: proportion
        of rows where result IN (''runs'',''wickets'') AND result_margin IS NOT NULL
        should equal 1.0.'
      sources:
      - start_line: 28
        end_line: 30
        file: ''
      - start_line: 33
        end_line: 37
        file: ''
      - start_line: 22
        end_line: 22
        file: ''
      uid: 71d00ad1-e5a0-4b20-af6b-716f55ecf614
    - text: 'Although dataset metadata marks ''result_margin'' as Fractional, the
        downstream code treats margins as integers (explicit astype(int) before string
        formatting and arithmetic). Therefore, for decided matches, ''result_margin''
        values should be integer-valued (no fractional parts). Validation example:
        WHEN result IN (''runs'',''wickets'') THEN result_margin = FLOOR(result_margin).'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 33
