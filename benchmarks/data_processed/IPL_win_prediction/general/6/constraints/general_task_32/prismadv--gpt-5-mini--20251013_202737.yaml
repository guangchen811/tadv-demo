    - text: 'When result indicates a tie (''tie'') or no result (''no result''), both
        ''team1'' and ''team2'' must be present (non-null) because downstream logic
        awards points to both competing teams and builds per-team events from team1/team2.
        Example predicate: .satisfies("NOT(result IN (''tie'',''no result'')) OR (team1
        IS NOT NULL AND team2 IS NOT NULL)")'
