        WHEN result_margin IS NOT NULL AND regexp_like(cast(result_margin as varchar),
        ''^[0-9]+$'') AND cast(result_margin as int) BETWEEN 1 AND 10 THEN 1 ELSE
        0 END ELSE 1 END", "Valid result_margin for wickets", lambda x: x == 1.0)

