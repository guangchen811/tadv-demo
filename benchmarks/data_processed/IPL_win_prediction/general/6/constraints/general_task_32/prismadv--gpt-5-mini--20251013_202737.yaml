    - text: 'When result == ''runs'', ''result_margin'' must be present and convertible
        to an integer (non-null, numeric) and lie within the expected range used by
        the code (>= 0). The code clips values above 200 and divides by 200, so values
        should be numeric and reasonably bounded. Example predicate: .satisfies("result
        != ''runs'' OR (result_margin IS NOT NULL AND result_margin >= 0)") or more
        strictly .satisfies("result != ''runs'' OR (result_margin IS NOT NULL AND
        result_margin BETWEEN 0 AND 200)")'
