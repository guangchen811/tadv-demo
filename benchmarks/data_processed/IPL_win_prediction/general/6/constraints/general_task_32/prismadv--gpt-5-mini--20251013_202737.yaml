    - text: 'For non-decided matches (result == ''tie'' or result == ''no result''),
        ''result_margin'' should be null/NA because margin is only meaningful for
        decided matches. Example predicate: .satisfies("result IN (''runs'',''wickets'')
        OR result_margin IS NULL")'
