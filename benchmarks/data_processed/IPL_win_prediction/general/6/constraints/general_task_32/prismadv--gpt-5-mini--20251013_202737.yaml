    - text: 'When result == ''wickets'', ''result_margin'' must be present and convertible
        to an integer and fall in the expected 1..10 range used to compute wk_factor
        (the code divides the integer by 10 to map 1..10 -> 0.1..1.0). Example predicate:
        .satisfies("result != ''wickets'' OR (result_margin IS NOT NULL AND result_margin
        BETWEEN 1 AND 10)")'
