        matches either (winner = team1 AND loser = team2) or (winner = team2 AND loser
        = team1). This is required because downstream logic selects winners/losers
        and builds per-team events and points. Example predicate constraint (Deequ-style):
        .satisfies("NOT(result IN (''runs'',''wickets'')) OR ((winner = team1 AND
