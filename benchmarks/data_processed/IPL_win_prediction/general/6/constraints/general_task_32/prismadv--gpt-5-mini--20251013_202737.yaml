  '["net_impact","pos_impact","result","result_margin","run_factor","wk_factor"]':
    code: []
    assumptions:
    - text: 'If result == ''runs'' then result_margin must be present and numeric,
        represent an integer number of runs (no fractional runs), and be positive.
        The code also clips large values at 200, so a useful constraint is that result_margin
        is between 1 and 200 for rows with result=''runs''. Example conditional check
        (SQL/Deequ-style): (result <> ''runs'') OR (result_margin IS NOT NULL AND
        result_margin >= 1 AND result_margin <= 200 AND result_margin = CAST(result_margin
        AS INT)).'
      sources:
      - start_line: 20
        end_line: 34
        file: ''
      uid: 78aaf0d6-e461-44e3-84bc-90a7ea0829b3
    - text: 'If result == ''wickets'' then result_margin must be present and numeric
        and represent an integer count of wickets (expected range 1..10). The code
        casts to int and divides by 10 to compute wk_factor, so result_margin should
        be integer-like and between 1 and 10. Example conditional check: (result <>
        ''wickets'') OR (result_margin IS NOT NULL AND result_margin BETWEEN 1 AND
        10 AND result_margin = CAST(result_margin AS INT)).'
      sources:
      - start_line: 26
        end_line: 37
        file: ''
      uid: 507af17e-73ad-4f72-bba5-c71b3d301448
    - text: 'pos_impact must reflect the appropriate scaled factor depending on result:
        when result == ''runs'' pos_impact == run_factor; when result == ''wickets''
        pos_impact == wk_factor; for non-decided matches (tie, no result) pos_impact
        should be 0.0. Example conditional check: (result = ''runs'' AND pos_impact
        = run_factor) OR (result = ''wickets'' AND pos_impact = wk_factor) OR (result
        IN (''tie'',''no result'') AND pos_impact = 0.0).'
      sources:
      - start_line: 32
        end_line: 81
        file: ''
      uid: ce3dc79a-40cb-49a3-bfc6-d1f63aa910f1
    - text: 'Per-event net_impact must be consistent with outcome/pos_impact: events
        with outcome == ''W'' must have net_impact == pos_impact; outcome == ''L''
        must have net_impact == -pos_impact; outcomes ''T'' and ''NR'' must have net_impact
        == 0.0. Example conditional check (for the events table): (outcome=''W'' AND
        net_impact = pos_impact) OR (outcome=''L'' AND net_impact = -pos_impact) OR
        (outcome IN (''T'',''NR'') AND net_impact = 0.0).'
      sources:
      - start_line: 86
        end_line: 133
        file: ''
      uid: 1c02ef66-c666-4b1f-82bf-9054c92ce1da
    - text: 'For decided matches (result is ''runs'' or ''wickets'') the winner must
        be one of the match teams and the loser must be the other team; for non-decided
        matches loser should be null/NA. Concretely: if result IN (''runs'',''wickets'')
        then winner IN (team1, team2) AND loser IN (team1, team2) AND loser <> winner;
        if result NOT IN (''runs'',''wickets'') then loser IS NULL. Example: (result
        NOT IN (''runs'',''wickets'') AND loser IS NULL) OR (result IN (''runs'',''wickets'')
        AND winner IN (team1,team2) AND loser IN (team1,team2) AND loser <> winner).'
      sources:
      - start_line: 30
        end_line: 44
        file: ''
      uid: ea954842-e04b-4f53-9cb1-3d2fc14b8aab
    - text: 'Points assigned to team1 and team2 per match should sum to 2 and be consistent
        with the winner/tie/NR logic: for decided matches exactly one team gets 2
        points (the winner) and the other 0; for tie or no-result both teams get 1.
        Example conditional check: points_team1 + points_team2 = 2 AND ((result IN
        (''runs'',''wickets'') AND ((winner = team1 AND points_team1=2 AND points_team2=0)
        OR (winner = team2 AND points_team2=2 AND points_team1=0))) OR ((result IN
        (''tie'',''no result'')) AND points_team1=1 AND points_team2=1)).'
      sources:
      - start_line: 87
        end_line: 177
        file: ''
      uid: 4402052f-e75b-4903-8fe6-c27663eae769
  '["outcome_summary","result","result_margin","team1","team2","winner"]':
    code: []
    assumptions:
    - text: 'For decided matches (rows where result is ''runs'' or ''wickets''), the
        ''winner'' value must be one of the two competing teams (team1 or team2) and
