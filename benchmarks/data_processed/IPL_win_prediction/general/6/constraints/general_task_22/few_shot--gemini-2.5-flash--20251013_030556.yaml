constraints:
  city:
    code:
    - - .isComplete('city')
      - Invalid
    - - .isDataType('city', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .isConvertibleTo('date', ConstrainableDataTypes.Date)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'], caseSensitive=False)
      - Invalid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L'])
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - .isComplete('player_of_match')
      - Invalid
    - - .isDataType('player_of_match', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'], caseSensitive=False)
      - Invalid
    assumptions: []
  result_margin:
    code:
    - - .isComplete('result_margin')
      - Invalid
    - - .isDataType('result_margin', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isDataType('season', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'], caseSensitive=False)
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - .isComplete('target_overs')
      - Invalid
    - - .isDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isPositive('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isComplete('target_runs')
      - Invalid
    - - .isDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isDataType('team1', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  team1_is_not_team2:
    code:
    - - '.hasRelationship(lambda x: x.team1 != x.team2, ''team1_is_not_team2'')'
      - Invalid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    - - .isDataType('team2', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'], caseSensitive=False)
      - Invalid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .isDataType('toss_winner', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  toss_winner_is_team1_or_team2:
    code:
    - - '.hasRelationship(lambda x: x.toss_winner == x.team1 or x.toss_winner == x.team2,
        ''toss_winner_is_team1_or_team2'')'
      - Invalid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    - - .isDataType('umpire1', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    - - .isDataType('umpire2', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    - - .isDataType('venue', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner')
      - Invalid
    - - .isDataType('winner', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  winner_is_team1_or_team2:
    code:
    - - '.hasRelationship(lambda x: x.winner == x.team1 or x.winner == x.team2, ''winner_is_team1_or_team2'')'
      - Invalid
    assumptions: []
