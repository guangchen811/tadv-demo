    - text: "For every played match (rows where result != 'no result'), the winner\
        \ must be one of the two participating teams: winner \u2208 {team1, team2}\
        \ and not null. This enables correct computation of the loser and correct\
        \ wins/losses tallies. Representable in Deequ as a compliance constraint,\
        \ e.g., .satisfies(\"result = 'no result' OR (winner = team1 OR winner = team2)\"\
        , \"winner_is_one_of_teams\")."
