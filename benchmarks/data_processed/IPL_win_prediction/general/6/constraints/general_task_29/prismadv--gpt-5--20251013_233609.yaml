  '["result","result_margin"]':
    code: []
    assumptions:
    - text: 'Result determines margin presence and type: if result is ''runs'' or
        ''wickets'' then result_margin must be present (non-null) and castable to
        an integer; if result is ''tie'' or ''no result'' then result_margin must
        be null. We could represent this as a Deequ conditional constraint, e.g.,
        satisfies("(((result IN (''runs'',''wickets'')) AND result_margin IS NOT NULL)
        OR ((result IN (''tie'',''no result'')) AND result_margin IS NULL))", "result/result_margin
        nullability").'
      sources:
      - start_line: 93
        end_line: 97
        file: ''
      - start_line: 117
        end_line: 122
        file: ''
      uid: 696936f2-8a8e-4686-b6f1-169995f82967
    - text: 'Value ranges by result type: if result is ''wickets'' then result_margin
        must be an integer between 1 and 10 inclusive; if result is ''runs'' then
        result_margin must be an integer greater than or equal to 1. This supports
        the downstream casting to Int64 and average computations over margins. In
        Deequ: satisfies("(result = ''wickets'' AND result_margin BETWEEN 1 AND 10)
        OR (result = ''runs'' AND result_margin >= 1) OR (result IN (''tie'',''no
        result'') AND result_margin IS NULL)", "result/result_margin magnitude by
        type").'
      sources:
      - start_line: 93
        end_line: 97
        file: ''
      - start_line: 117
        end_line: 122
        file: ''
      uid: d844ae19-d9d1-4c9c-908b-132fbecb8242
    - text: 'Winner-team consistency gated by result: for played matches (result !=
        ''no result''), winner must be non-null and equal to either team1 or team2;
        for ''no result'' matches, winner must be null. This is required for computing
        loser, wins and losses. Deequ example: satisfies("(result != ''no result''
        AND (winner = team1 OR winner = team2)) OR (result = ''no result'' AND winner
        IS NULL)", "winner in {team1,team2} when played").'
      sources:
      - start_line: 9
        end_line: 12
        file: ''
      - start_line: 91
        end_line: 91
        file: ''
      uid: 2495a853-75e9-471f-b005-5aadfde54dd7
    - text: 'Ties must not contribute to wins/losses: for rows where result is ''tie'',
        winner must be null so that these rows are excluded from the wins (grouped
        by winner) and do not produce a loser. Ties are counted separately per season.
        Deequ example: satisfies("(result = ''tie'' AND winner IS NULL) OR (result
        != ''tie'')", "winner null on ties").'
      sources:
      - start_line: 14
        end_line: 19
        file: ''
      - start_line: 41
        end_line: 49
        file: ''
      uid: dc948013-9cf6-4beb-b8bf-bb986b731d9e
    - text: 'Tie and super over consistency: if result is ''tie'' then super_over
        must be ''Y'' (ties occur before the super over and should correspond to matches
        flagged as super overs). Deequ example: satisfies("(result = ''tie'' AND super_over
        = ''Y'') OR (result != ''tie'')", "tie implies super over").'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
