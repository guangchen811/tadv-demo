    - text: 'Standings identity per season-team: matches equals the sum of wins, losses,
        ties, and no_result. This follows from how each component is constructed.
        Representable as a constraint on the derived standings dataset: .satisfies("matches
        = wins + losses + ties + no_result", ''matches_decomposes_into_outcomes'')'
