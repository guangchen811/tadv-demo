      - start_line: 117
        end_line: 121
        file: ''
      uid: 351ecafc-912c-421d-aec4-b4ba0d0f3dce
    - text: 'For played matches (result != ''no result''), the toss_winner must be
        one of the two teams (team1 or team2). Representable as: .satisfies("(result
        = ''no result'') OR (toss_winner = team1 OR toss_winner = team2)", ''toss_winner_in_teams_when_played'')'
