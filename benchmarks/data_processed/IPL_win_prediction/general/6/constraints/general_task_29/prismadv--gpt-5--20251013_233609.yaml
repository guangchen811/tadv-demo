        end_line: 126
        file: ''
      uid: 74672891-79bf-437e-83f2-fb0cbb422566
  '["result","super_over"]':
    code: []
    assumptions:
    - text: 'For decisive results, the winner must be one of the two teams on the
        row. Specifically: when result IN (''runs'',''wickets''), winner must be non-null
        and equal to team1 or team2. Representable in Deequ as: .satisfies("CASE WHEN
        result IN (''runs'',''wickets'') THEN winner IS NOT NULL AND (winner = team1
        OR winner = team2) ELSE true END", "winner_in_teams_for_decisive_results")'
      sources:
