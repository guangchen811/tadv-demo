    - text: 'For non-decisive outcomes, there should be no winner recorded. Specifically:
        when result IN (''tie'',''no result''), winner must be null. Representable
        in Deequ as: .satisfies("CASE WHEN result IN (''tie'',''no result'') THEN
        winner IS NULL ELSE true END", "no_winner_for_tie_or_no_result")'
