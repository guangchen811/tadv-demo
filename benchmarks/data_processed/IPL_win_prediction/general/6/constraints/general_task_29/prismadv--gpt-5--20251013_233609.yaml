        file: ''
      uid: dcff9bdd-a805-4366-8306-5dd45ed7cf73
    - text: 'Result-margin semantics: if result IN (''runs'', ''wickets'') then result_margin
        must be a positive integer (non-null and > 0); if result IN (''tie'', ''no
        result'') then result_margin must be null. Representable as: .satisfies("CASE
        WHEN result IN (''runs'',''wickets'') THEN result_margin IS NOT NULL AND CAST(result_margin
        AS INT) > 0 ELSE result_margin IS NULL END", ''result_margin_consistency'')'
