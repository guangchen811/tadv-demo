    - text: team1 and team2 share the same finite domain of valid team identifiers
        (the participants domain), and both columns should only contain values from
        this shared set (approx. 19 distinct values overall). This is implied by treating
        both columns interchangeably when concatenating and grouping by (season_int,
        team). Enforceable by validating both columns against a unified reference
        set of teams (e.g., with Deequ isContainedIn on both columns using the same
        allowed set).
      sources:
      - start_line: 22
        end_line: 27
        file: ''
      uid: f84219a8-42c1-4dcf-880c-e7571fd57681
