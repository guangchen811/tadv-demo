    - text: 'Each match must involve two distinct teams: team1 != team2 for all rows.
        This avoids double-counting the same team in the matches aggregation that
        flattens team1 and team2 into a single ''team'' column. Deequ example: .satisfies("team1
        <> team2", "teams_are_distinct").'
      sources:
      - start_line: 22
        end_line: 27
        file: ''
      - start_line: 30
        end_line: 36
        file: ''
