      uid: 54542a04-515b-43de-a784-32bc99596dc7
    - text: 'The season must align with the calendar year of the date: year(to_date(date))
        = season. Example Deequ constraint (assuming ISO date strings): .satisfies("year(to_date(date,
        ''yyyy-MM-dd'')) = CAST(season AS INT)", ''season_matches_date_year'')'
      sources:
