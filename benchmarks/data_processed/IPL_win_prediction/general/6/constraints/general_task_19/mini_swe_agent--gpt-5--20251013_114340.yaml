raw_constraints:
- column_name: id
  code_for_constraint: .isComplete('id')
- column_name: id
  code_for_constraint: .isUnique('id')
- column_name: season
  code_for_constraint: .isComplete('season')
- column_name: season
  code_for_constraint: .isNonNegative('season')
- column_name: season
  code_for_constraint: .satisfies('season BETWEEN 2000 AND 2100', 'season_in_range')
- column_name: season,date
  code_for_constraint: .satisfies('date IS NULL OR year(date) = season', 'season_matches_year_when_date_present')
- column_name: match_type
  code_for_constraint: .isComplete('match_type')
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: team1,team2
  code_for_constraint: .satisfies('team1 <> team2', 'opposing_teams_different')
- column_name: toss_decision
  code_for_constraint: .isContainedIn('toss_decision', ['bat','field'])
- column_name: toss_winner
  code_for_constraint: .satisfies('toss_winner IS NULL OR (toss_winner = team1 OR
    toss_winner = team2)', 'toss_winner_is_participating_team')
- column_name: result
  code_for_constraint: .isComplete('result')
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs','wickets','tie','no result'])
- column_name: winner
  code_for_constraint: .satisfies('CASE WHEN match_type = \'League\' AND result <>
    \'no result\' THEN winner IS NOT NULL ELSE true END', 'winner_present_when_result_exists_in_league')
- column_name: winner
  code_for_constraint: .satisfies('winner IS NULL OR (winner = team1 OR winner = team2)',
    'winner_is_one_of_the_teams')
- column_name: result_margin
  code_for_constraint: .isNonNegative('result_margin')
- column_name: result_margin
  code_for_constraint: .satisfies('CASE WHEN result IN (\'runs\', \'wickets\') THEN
    result_margin IS NOT NULL AND result_margin > 0 ELSE true END', 'margin_present_and_positive_for_decisive_results')
- column_name: super_over
  code_for_constraint: .isContainedIn('super_over', ['Y','N'])
- column_name: super_over
  code_for_constraint: .satisfies('CASE WHEN super_over = \'Y\' THEN result = \'tie\'
    AND winner IS NOT NULL ELSE true END', 'super_over_only_after_tie_and_winner_present')
- column_name: method
  code_for_constraint: .satisfies('CASE WHEN method = \'D/L\' THEN target_runs IS
    NOT NULL AND target_overs IS NOT NULL AND target_overs > 0 ELSE true END', 'dls_requires_targets_and_positive_overs')
- column_name: target_runs
  code_for_constraint: .isNonNegative('target_runs')
- column_name: target_overs
  code_for_constraint: .isNonNegative('target_overs')
