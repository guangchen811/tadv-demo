constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("NOT(method = 'D/L') OR (target_runs IS NOT NULL AND target_overs
        IS NOT NULL AND target_overs > 0)", "dls_requires_target")
      - Invalid
    assumptions: []
  result_margin:
    code:
    - - .satisfies("NOT(result IN ('runs','wickets')) OR (result_margin IS NOT NULL
        AND result_margin >= 0)", "result_margin_consistent")
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .satisfies("NOT(super_over = 'Y') OR result = 'tie'", "super_over_implies_tie")
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1,team2:
    code:
    - - .satisfies("team1 != team2", "teams_different")
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("(result != 'no result' AND winner IS NOT NULL) OR (result = 'no
        result')", "winner_present_for_results")
      - Valid
    - - .satisfies("(winner = team1) OR (winner = team2) OR (winner IS NULL)", "winner_is_one_of_teams")
      - Valid
    assumptions: []
