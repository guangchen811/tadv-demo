constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L', None])
      - Invalid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - '.hasNumberOfDistinctValues(''toss_decision'', lambda x: x == 2)'
      - Invalid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner')
      - Invalid
    assumptions: []
