    assumptions:
    - text: 'The ''result'' column must be present and complete (no nulls) for all
        input rows because it is repeatedly compared to specific strings to compute
        points, wins/losses, ties, and season dashboards. Example rules: Deequ hasCompleteness(''result'',
        lambda x: x == 1.0) or Great Expectations expect_column_values_to_not_be_null(''result'').'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 41
        end_line: 48
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      - start_line: 94
        end_line: 95
        file: ''
      uid: 4ac8c60c-a5f9-49ea-a8f3-eced00f6124b
    - text: 'The ''result'' column values must be restricted to the exact, lowercased
        and trimmed set: {''runs'', ''wickets'', ''tie'', ''no result''}. Any other
        spelling, casing, or synonyms (e.g., ''NR'', ''No Result'') will not be recognized
        and will miscompute points and summary counts. Example rules: Deequ satisfies("CASE
        WHEN result IN (''runs'',''wickets'',''tie'',''no result'') THEN 1 ELSE 0
        END", ''valid result domain'', lambda x: x == 1.0) or Great Expectations expect_column_values_to_be_in_set([''runs'',''wickets'',''tie'',''no
        result'']).'
      sources:
      - start_line: 41
        end_line: 48
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      - start_line: 94
        end_line: 95
        file: ''
      uid: e3cba91e-2f1a-45b9-8dda-5505a83cbf48
    - text: 'When ''result'' == ''runs'' or ''wickets'', ''result_margin'' must be
        a positive numeric value (> 0), since win margins are counted and averaged
        only when strictly positive. Example rule: Deequ satisfies("CASE WHEN result
        = ''runs'' THEN result_margin > 0 WHEN result = ''wickets'' THEN result_margin
        > 0 ELSE TRUE END", ''positive margin for decisive results'', lambda x: x
        == 1.0).'
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      - start_line: 69
        end_line: 72
        file: ''
      uid: 5625f27a-e6d9-46a1-97be-7b49e733791c
    - text: "When 'result' \u2208 {'runs','wickets'}, there must be a declared winner\
        \ and it must match either 'team1' or 'team2' (so that exactly one team per\
        \ match is flagged as the winner and points/margins are computed correctly).\
        \ Example rule: Deequ satisfies(\"CASE WHEN result IN ('runs','wickets') THEN\
        \ (winner IS NOT NULL AND (winner = team1 OR winner = team2)) ELSE TRUE END\"\
        , 'winner present for decisive results', lambda x: x == 1.0)."
      sources:
      - start_line: 35
        end_line: 37
        file: ''
      - start_line: 41
        end_line: 42
        file: ''
      - start_line: 44
        end_line: 48
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      uid: 2fe5ce6d-1d10-4aa7-ae59-d107a12c2135
  '["result","result_margin"]':
    code: []
    assumptions:
    - text: 'Result-margin consistency: If result is ''runs'' or ''wickets'', result_margin
        must be non-null and strictly greater than 0. If result is ''tie'' or ''no
        result'', result_margin must be null or exactly 0. This can be enforced with
        a Deequ compliance constraint such as: .addConstraint(Compliance(''margin_consistent_with_result'',
        "(result IN (''runs'',''wickets'') AND result_margin > 0) OR (result IN (''tie'',''no
        result'') AND (result_margin IS NULL OR result_margin = 0))"))'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 41
        end_line: 48
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: 17759887-b7c6-416c-b16b-8884062d785c
    - text: 'Victory-type-specific bounds on result_margin: When result = ''wickets'',
        result_margin must be an integer between 1 and 10 inclusive (number of wickets).
        When result = ''runs'', result_margin must be a positive integer (>= 1). Example
        Deequ constraints: .addConstraint(Compliance(''wicket_margin_range'', "CASE
        WHEN result = ''wickets'' THEN result_margin BETWEEN 1 AND 10 ELSE TRUE END"))
        and .addConstraint(Compliance(''margin_integral_when_applicable'', "CASE WHEN
        result IN (''runs'',''wickets'') THEN result_margin = CAST(result_margin AS
        INT) ELSE TRUE END"))'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 47
        end_line: 48
        file: ''
      - start_line: 71
        end_line: 72
        file: ''
      uid: 402330a4-4689-46f7-9bb3-13807117277a
    - text: 'Winner consistency with result: If result is ''runs'' or ''wickets'',
        there must be exactly one winner and it must equal either team1 or team2 (non-null
        and in {team1, team2}). If result is ''tie'' or ''no result'', winner should
        be null or not equal to either team1 or team2. Deequ compliance example: .addConstraint(Compliance(''winner_consistent_with_result'',
        "(result IN (''runs'',''wickets'') AND winner IS NOT NULL AND (winner = team1
        OR winner = team2)) OR (result IN (''tie'',''no result'') AND (winner IS NULL
        OR (winner <> team1 AND winner <> team2)))"))'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 28
        end_line: 33
        file: ''
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 41
        end_line: 48
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: b767fb3f-3b06-4660-bf02-98e78658b87f
  '["result","super_over"]':
    code: []
    assumptions:
    - text: 'Super-over/result consistency: A super over occurs if and only if the
        regulation result is a tie. Practically, enforce both implications: (1) If
        super_over = ''Y'' then result = ''tie''; (2) If result = ''tie'' then super_over
        = ''Y'' (and for non-ties, super_over = ''N''). Example Deequ constraints:
        .satisfies("CASE WHEN super_over = ''Y'' THEN result = ''tie'' ELSE TRUE END",
        "super_over_Y_implies_tie"); .satisfies("CASE WHEN result = ''tie'' THEN super_over
        = ''Y'' ELSE super_over = ''N'' END", "tie_iff_super_over")'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      - start_line: 94
        end_line: 95
        file: ''
      uid: d7ad7a8e-1fb3-4a11-8a78-772d24f568b0
    - text: 'Result-margin semantics must match result type: (a) If result = ''runs''
        then result_margin must be > 0 and not null. (b) If result = ''wickets'' then
        result_margin must be an integer between 1 and 10 inclusive. (c) If result
        in (''tie'',''no result'') then result_margin must be null or 0. Example Deequ
        constraint: .satisfies("CASE WHEN result = ''runs'' THEN result_margin IS
        NOT NULL AND result_margin > 0 WHEN result = ''wickets'' THEN result_margin
        >= 1 AND result_margin <= 10 WHEN result IN (''tie'',''no result'') THEN (result_margin
        IS NULL OR result_margin = 0) ELSE TRUE END", "result_margin_consistent_with_result")'
      sources:
      - start_line: 41
        end_line: 48
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: b711bd89-0810-4fd4-9cee-302fab3da21e
    - text: 'Winner presence must align with result: (a) For decisive results (result
        in (''runs'',''wickets'')), winner must be non-null/non-empty and equal to
        either team1 or team2. (b) For ties or no results (result in (''tie'',''no
        result'')), winner should be null or empty. Example Deequ constraint: .satisfies("CASE
        WHEN result IN (''runs'',''wickets'') THEN winner IS NOT NULL AND winner <>
        '''' AND (winner = team1 OR winner = team2) WHEN result IN (''tie'',''no result'')
        THEN (winner IS NULL OR winner = '''') ELSE TRUE END", "winner_consistent_with_result_and_participants")'
      sources:
      - start_line: 28
        end_line: 33
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: b0a505ab-54d0-4650-a6c3-de2bcc913d23
  '["result","target_overs","target_runs"]':
    code: []
    assumptions:
    - text: 'If result = ''runs'', then result_margin must be strictly positive and
        winner must equal either team1 or team2. Deequ example: .satisfies("(result
        <> ''runs'') OR (result_margin > 0 AND (winner = team1 OR winner = team2))",
        "runs_have_positive_margin_and_valid_winner")'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 28
        end_line: 36
        file: ''
      - start_line: 44
        end_line: 45
        file: ''
      uid: 18ee0835-ee1d-4b09-8e12-7bfc6cc7e89c
    - text: 'If result = ''wickets'', then result_margin must be strictly positive
        and winner must equal either team1 or team2. Deequ example: .satisfies("(result
        <> ''wickets'') OR (result_margin > 0 AND (winner = team1 OR winner = team2))",
        "wickets_have_positive_margin_and_valid_winner")'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 28
        end_line: 36
        file: ''
      - start_line: 47
        end_line: 48
        file: ''
      uid: 93473774-3f89-4aea-af92-50efa3fc8f25
    - text: 'If result is ''tie'' or ''no result'', then winner should be null and
        result_margin should be null or 0. Deequ example: .satisfies("(result NOT
        IN (''tie'',''no result'')) OR (winner IS NULL AND (result_margin IS NULL
        OR result_margin = 0))", "no_winner_and_no_margin_for_tie_or_no_result")'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: dcc507f2-85b7-4c1d-9c79-fd7f2f0f57f3
    - text: 'winner must be either team1 or team2 (when not a tie or no result). Deequ
        example: .satisfies("(result IN (''tie'',''no result'')) OR (winner = team1
        OR winner = team2)", "winner_in_teams_when_applicable")'
      sources:
      - start_line: 28
        end_line: 36
        file: ''
      uid: cf6a98d0-6dd4-415a-bd35-1a5845a0a19b
    - text: 'toss_winner must be either team1 or team2. Deequ example: .satisfies("toss_winner
        IS NULL OR toss_winner = team1 OR toss_winner = team2", "toss_winner_in_teams")'
      sources:
      - start_line: 28
        end_line: 33
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: cb95775b-8a21-40d0-836d-a22d0dd05f0a
    - text: 'team1 and team2 must be non-null and different for every match. Deequ
        example: .satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "distinct_teams_per_match")'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 28
        end_line: 33
        file: ''
      uid: 35d7b830-03b9-4ef9-b45e-6e6730e05d93
    - text: 'target_runs and target_overs should be co-null: either both null or both
        non-null. Deequ example: .satisfies("(target_runs IS NULL AND target_overs
        IS NULL) OR (target_runs IS NOT NULL AND target_overs IS NOT NULL)", "target_fields_co_nullness")'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      uid: 09ad26ed-3a5d-4407-97ff-b92adbae9ebc
    - text: 'If result = ''no result'', then target_runs and target_overs should be
        null. Deequ example: .satisfies("(result <> ''no result'') OR (target_runs
        IS NULL AND target_overs IS NULL)", "no_result_has_no_targets")'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: 4aca3b0b-7cf6-4f62-830a-214e51f0f013
  '["result","team1","team2","winner"]':
    code: []
    assumptions:
    - text: 'Winner-team consistency by result: If result is ''runs'' or ''wickets'',
        winner must be non-null and equal to either team1 or team2. If result is ''tie''
        or ''no result'', winner should be null (or at least not equal to team1 or
        team2).'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 41
        end_line: 48
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: d5b47993-f8a6-4135-9fd1-73abf4f22298
    - text: 'Toss winner must be one of the two teams in the match: toss_winner equals
        exactly one of {team1, team2} for every row (exclusive OR).'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      - start_line: 57
        end_line: 58
        file: ''
      uid: bc3078e0-a3dc-4c41-a46c-32c82eae3767
    - text: team1 and team2 must be distinct (no team plays itself in a match).
      sources:
      - start_line: 28
        end_line: 33
        file: ''
      - start_line: 24
        end_line: 26
        file: ''
      uid: c7c3aecb-6a44-4b36-9a98-27a0788e331f
    - text: 'Result-margin consistency: For matches with result = ''runs'', result_margin
        must be a positive number for the winning team; for result = ''wickets'',
        result_margin must be a positive number for the winning team. For ''tie''
        and ''no result'', result_margin should be zero or null. (Equivalently, result_margin
        > 0 iff (result in {''runs'',''wickets''} and winner in {team1, team2}); otherwise
        result_margin is 0 or null.)'
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      - start_line: 71
        end_line: 72
        file: ''
      uid: 10a1cd36-28df-4440-95bc-fb009b79d786
    - text: 'Winner values must come from the same team-name domain as team1/team2:
        across the dataset, the set of winner values is a subset of the union of team1
        and team2 values.'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 35
        end_line: 36
        file: ''
      uid: 7d802cf9-e3f1-4084-9acd-91f8efb3f7ba
  '["season","target_overs"]':
    code: []
    assumptions:
    - text: 'For any match with a decided result (i.e., result not in {''no result'',
        ''tie''}), the ''winner'' must be either ''team1'' or ''team2''. This can
        be expressed as a conditional multi-column constraint: (result in {''no result'',''tie''})
        OR (winner in {team1, team2}). Example (Deequ): .satisfies("(result == ''no
        result'') OR (result == ''tie'') OR (winner == team1 OR winner == team2)",
        ''winner_within_playing_teams_if_decided'')'
      sources:
      - start_line: 35
        end_line: 37
        file: ''
      - start_line: 41
        end_line: 48
        file: ''
      uid: 891c6e1f-0548-474a-82da-891dcac8f9cc
    - text: 'The ''toss_winner'' must be one of the two teams that played (''team1''
        or ''team2''), ensuring exactly one side wins the toss per match. Example
        (Deequ): .satisfies("toss_winner == team1 OR toss_winner == team2", ''toss_winner_in_playing_pair'')'
      sources:
      - start_line: 38
        end_line: 40
        file: ''
      uid: b2902f9d-6d44-472f-96ac-4f7145cec657
    - text: '''team1'' and ''team2'' must both be non-null and different for each
        match record (no team plays against itself). Example (Deequ): .satisfies("team1
        IS NOT NULL AND team2 IS NOT NULL AND team1 <> team2", ''teams_present_and_distinct'')'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 28
        end_line: 33
        file: ''
      uid: a7f12458-95f9-4a70-99c0-a18968983596
    - text: 'The pair (''season'',''id'') should be unique across the dataset so that
        each match is uniquely identified within a season. Example (Deequ): .isUnique(["season","id"])'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      uid: 33d0978f-146c-4198-847c-56f17663b75e
    - text: 'At the team-season aggregate level, ''points'' must equal 2 * ''wins''
        + 1 * ''no_result''. This follows from how per-row points are defined and
        then summed by [''season'',''team'']. Example (post-aggregation constraint):
        .satisfies("points == 2*wins + no_result", ''points_consistency_team_season'')'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      - start_line: 60
        end_line: 67
        file: ''
      uid: 0da3ff45-9fc1-48c1-bf55-55c1c8dcc83c
    - text: 'At the team-season aggregate level, ''points_per_match'' must equal ''points''
        / ''matches'' and lie within [0, 2]. Example: .satisfies("points_per_match
        == points / matches AND points_per_match >= 0 AND points_per_match <= 2",
        ''ppm_definition_and_bounds'')'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      uid: 9294944d-d4ca-47d5-a4fc-5c8adf4eb9d3
    - text: '''target_runs'' and ''target_overs'' should co-occur: they must be both
        null or both non-null, and when present they should be non-negative. This
        reflects that D/L targets are defined as a pair. Example (Deequ): .satisfies("((target_runs
        IS NULL) AND (target_overs IS NULL)) OR ((target_runs IS NOT NULL) AND (target_overs
        IS NOT NULL) AND target_runs >= 0 AND target_overs >= 0)", ''dl_target_co_presence_and_non_negative'')'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 23
        end_line: 23
        file: ''
      uid: 36f00caf-8f07-4a15-8a6c-1cf3d740c873
  '["target_overs","target_runs"]':
    code: []
    assumptions:
    - text: 'Winner must be one of the two teams that played: when result is not ''tie''
        or ''no result'', the ''winner'' value should equal either ''team1'' or ''team2''.
        This can be enforced as a compliance constraint, e.g., (result IN (''tie'',''no
        result'')) OR (winner = team1) OR (winner = team2).'
      sources:
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 35
        end_line: 37
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: b3b8839e-8328-4e10-b8e6-7f4f15ee2c9b
    - text: 'Toss winner must be one of the two teams that played: ''toss_winner''
        should equal either ''team1'' or ''team2''. This can be enforced as a compliance
        constraint, e.g., (toss_winner = team1) OR (toss_winner = team2).'
      sources:
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: 67bc1a3a-f75c-431f-8046-832229acea6d
    - text: 'Teams within a match must be distinct: ''team1'' and ''team2'' should
        not be the same value. This can be enforced as a compliance constraint, e.g.,
        team1 <> team2.'
      sources:
      - start_line: 29
        end_line: 33
        file: ''
      uid: ee6aca25-9fdb-4a1b-b661-37c30546bce9
    - text: 'Result type and margin must be consistent: if result = ''runs'' then
        result_margin > 0; if result = ''wickets'' then result_margin > 0 (and typically
        <= 10); if result IN (''tie'',''no result'') then result_margin should be
        null or 0. This can be enforced using a compliance rule combining ''result''
        and ''result_margin''.'
      sources:
      - start_line: 41
        end_line: 48
        file: ''
      uid: 2c22999c-aa28-494a-b3c4-5493760021f2
    - text: 'Exactly one team should be marked as winner for decided matches: for
        any match where result is not ''tie'' or ''no result'', exactly one of (winner
        = team1) or (winner = team2) must hold. This can be expressed as a compliance
        rule using winner, team1, team2, and result.'
      sources:
      - start_line: 35
        end_line: 37
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: d7be5034-a49b-49c2-a761-388de7791dbb
    - text: 'Target values should co-occur: ''target_runs'' and ''target_overs'' should
        either both be null or both be non-null. This can be enforced as a compliance
        rule: (target_runs IS NULL AND target_overs IS NULL) OR (target_runs IS NOT
        NULL AND target_overs IS NOT NULL).'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      uid: 2ed7545d-9106-4b07-97b7-bda3cee3215a
    - text: 'When target values are present, they should be non-negative together:
        (target_runs >= 0 AND target_overs >= 0) for all rows where both are non-null.
        This can be enforced as a compliance rule combining both columns.'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      uid: 9175ca11-809e-485c-90c0-44ba3fdc10f9
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "teams_non_null_and_distinct", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 20f99505-8498-4636-bbb6-26dd5438e6cb
      source_assumptions:
      - a506164a-77db-490c-960f-e15f77d256a7
    - suggestion: '.satisfies("CASE WHEN lower(coalesce(result, '''')) IN (''runs'',''wickets'')
        THEN (lower(trim(winner)) = lower(trim(team1)) OR lower(trim(winner)) = lower(trim(team2)))
        ELSE (winner IS NULL OR (lower(trim(winner)) <> lower(trim(team1)) AND lower(trim(winner))
        <> lower(trim(team2)))) END", "winner_membership_by_result", lambda x: x >=
        0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: f81b9994-1935-4b35-a808-0b29d9eec04a
      source_assumptions:
      - f08cccde-0ba1-44e4-baf2-ab89afe72dab
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN result_margin > 0
        WHEN result = ''wickets'' THEN result_margin > 0 WHEN result IN (''tie'',''no
        result'') THEN (result_margin IS NULL OR result_margin = 0) ELSE TRUE END",
        "result_margin_consistency", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: c3d12da5-c714-423f-9e6f-e278b846accb
      source_assumptions:
      - ef5098d4-d738-4e76-ad6c-220dccc640f6
    - suggestion: '.satisfies("(toss_winner = team1 OR toss_winner = team2)", "toss_winner_in_teams",
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 5efffcfb-139f-45cd-be91-c6b99f5707a0
      source_assumptions:
      - 7046936d-76ae-4c2a-a13b-c75cf0658e9a
    assumptions:
    - text: 'Each match must have two distinct, non-null teams: team1 and team2 must
        both be present and team1 <> team2. This can be enforced with a compliance
        constraint such as: .satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND
        team1 <> team2", "teams_non_null_and_distinct").'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 28
        end_line: 33
        file: ''
      uid: a9d3ee29-14c8-457d-94eb-cb66b34d3aff
    - text: 'Winner must align with the two teams based on match result: For decided
        matches (result in [''runs'',''wickets'']), winner must be exactly one of
        {team1, team2}. For ties or no result, winner should be null or not equal
        to either team. This can be expressed as: .satisfies("CASE WHEN result IN
        (''runs'',''wickets'') THEN (winner = team1 OR winner = team2) ELSE (winner
        IS NULL OR (winner <> team1 AND winner <> team2)) END", "winner_membership_by_result").'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 41
        end_line: 48
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: a506164a-77db-490c-960f-e15f77d256a7
    - text: 'Result margin must be consistent with the result type: If result = ''runs'',
        result_margin must be > 0 for the winning team and effectively zero/NULL otherwise;
        if result = ''wickets'', result_margin must be > 0 for the winning team and
        zero/NULL otherwise. For ''tie'' or ''no result'', result_margin should be
        0 or NULL. This can be checked with: .satisfies("CASE WHEN result = ''runs''
        THEN result_margin > 0 WHEN result = ''wickets'' THEN result_margin > 0 ELSE
        (result_margin IS NULL OR result_margin = 0) END", "result_margin_consistency").'
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      - start_line: 69
        end_line: 72
        file: ''
      uid: f08cccde-0ba1-44e4-baf2-ab89afe72dab
    - text: "The toss winner must be one of the two teams in the match: toss_winner\
        \ \u2208 {team1, team2}. This can be enforced with: .satisfies(\"toss_winner\
        \ = team1 OR toss_winner = team2\", \"toss_winner_in_teams\")."
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      - start_line: 57
        end_line: 58
        file: ''
      uid: ef5098d4-d738-4e76-ad6c-220dccc640f6
    - text: 'Team domain alignment across columns: team1 and team2 should come from
        the same set of team names (no team appears exclusively in only one of the
        columns). This can be operationalized as two dataset-level constraints: all
        distinct values of team1 are contained in the distinct values of team2 and
        vice versa (e.g., via analyzers + custom assertions or two ''isContainedIn''
        style checks built from the observed domain).'
      sources:
      - start_line: 28
        end_line: 33
        file: ''
      - start_line: 50
        end_line: 52
        file: ''
      uid: 7046936d-76ae-4c2a-a13b-c75cf0658e9a
  '["team1","team2","toss_winner"]':
    code: []
    assumptions:
    - text: 'For every match row, the toss_winner must be one of the two participating
        teams (team1 or team2). This can be represented as a Deequ compliance constraint:
        compliance(''toss_winner_in_teams'', ''toss_winner = team1 OR toss_winner
        = team2'').'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 28
        end_line: 33
        file: ''
      - start_line: 38
        end_line: 39
        file: ''
      uid: aed1e4d9-a9f7-4a85-9334-65ba44f65e48
    - text: 'Each match must involve two distinct teams: team1 must not equal team2.
        This avoids duplicated team rows in the long format and ensures toss winner
        logic is well-defined. Deequ: compliance(''teams_distinct'', ''team1 <> team2'').'
      sources:
      - start_line: 28
        end_line: 33
        file: ''
      - start_line: 50
        end_line: 52
        file: ''
      uid: 1495aef6-c5bf-44ae-a622-2cd207cbd247
    - text: 'When the match result is decisive (result = ''runs'' or ''wickets''),
        the winner must be one of the two teams (team1 or team2) and the result_margin
        must be strictly positive. Deequ: compliance(''decisive_result_winner_and_margin'',
        "(result = ''runs'' OR result = ''wickets'') => ((winner = team1 OR winner
        = team2) AND result_margin > 0)").'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 41
        end_line: 48
        file: ''
      uid: 9a506e5a-b284-4b54-ac65-9212bf2e0804
    - text: 'For tie or no result outcomes, no winner should be recorded (winner should
        be null or empty). Deequ: compliance(''no_winner_when_tie_or_no_result'',
        "(result = ''tie'' OR result = ''no result'') => (winner IS NULL OR winner
        = '''')").'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: 61f08763-0937-4d99-8b4d-446e677dc733
    - text: 'Exactly one team should be the toss winner per match; combined with team1
        != team2, this implies an exclusive match to either team1 or team2. Deequ:
        compliance(''exactly_one_toss_winner'', "(toss_winner = team1 AND team1 <>
        team2) OR (toss_winner = team2 AND team1 <> team2)").'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      - start_line: 57
        end_line: 68
