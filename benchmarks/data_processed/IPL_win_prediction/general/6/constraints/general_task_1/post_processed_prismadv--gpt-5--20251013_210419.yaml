    - text: 'For matches with result = ''no result'', the ''winner'' should be null,
        since the script ignores winners for such games. We could represent this as
        a Deequ constraint like: .satisfies("CASE WHEN result = ''no result'' THEN
        CASE WHEN winner IS NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner null when
        no result", lambda x: x == 1)'
      sources:
      - start_line: 41
        end_line: 42
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      uid: 94f34756-eb79-4da7-9394-417cdab1807d
    - text: 'The ''winner'' values should not contain leading or trailing whitespace
        (and should match team names exactly), because equality checks are done as
        exact string comparisons. We could represent this as a Deequ constraint like:
        .satisfies("winner IS NULL OR winner = trim(winner)", "Winner has no leading/trailing
        whitespace", lambda x: x == 1)'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      uid: 671a8039-5696-42cb-ac86-72edd844056d
    - text: 'The ''winner'' column should be of string type, as it is compared directly
        to the string team columns. We could represent this as a Deequ constraint
        like: .hasDataType("winner", ConstrainableDataTypes.String)'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      uid: c2fd496d-78d1-4a33-94bd-82d44d6c4100
