        file: ''
      uid: fbea7929-5152-426f-b2db-57d403e51c18
    - text: 'The ''team2'' column should be complete (no nulls) and non-empty (after
        trimming). It is copied into the derived ''team'' column and later used in
        equality checks and as a groupby key; null or empty values would cause incorrect
        win/points attribution and dropped groups. This can be enforced with constraints
        such as: isComplete(''team2'') and satisfies(''length(trim(team2)) > 0'',
        ''Non-empty team2'', lambda x: x == 1).'
      sources:
      - start_line: 32
        end_line: 32
        file: ''
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      - start_line: 60
        end_line: 73
        file: ''
      uid: ee03d94f-fa2b-47bb-b50e-1372253b0394
    - text: 'The categorical values in ''team2'' must use a consistent canonical form
        (e.g., consistent casing and no leading/trailing whitespace), otherwise the
        same team would be split across different groups when aggregating standings.
        This can be validated with rules like satisfies(''team2 = trim(team2)'', ''Trim
        team2'', lambda x: x == 1) and (optionally) enforcing a known case convention.'
      sources:
      - start_line: 32
        end_line: 32
        file: ''
      - start_line: 60
        end_line: 73
        file: ''
      uid: 2bdac05f-f566-4e8a-a283-b2d05a8c6316
    - text: 'Within each row, ''team2'' should be different from ''team1'' (a match
        should have two distinct teams). This can be validated with a row-level constraint:
        satisfies(''CASE WHEN team1 IS NOT NULL AND team2 IS NOT NULL THEN CASE WHEN
        team1 <> team2 THEN 1 ELSE 0 END ELSE 0 END'', ''Distinct teams per match'',
        lambda x: x == 1).'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 30
        end_line: 30
        file: ''
      - start_line: 32
        end_line: 33
        file: ''
      uid: 941f9ab0-9441-4d59-8331-75eb7a2a3add
    - text: 'For every played match (result != ''no result'') with a non-null winner,
        the ''winner'' value must be either ''team1'' or ''team2''. Otherwise, win/points
        attribution derived from ''team'' (which can be ''team2'') will be incorrect.
        This can be enforced with: satisfies(''CASE WHEN result <> "no result" AND
        winner IS NOT NULL THEN CASE WHEN winner IN (team1, team2) THEN 1 ELSE 0 END
        ELSE 1 END'', ''Winner must be team1 or team2'', lambda x: x == 1).'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 41
        end_line: 48
        file: ''
      uid: 23ae4c79-f6b1-45e4-86c4-6ba94ff0dd0d
    - text: 'The ''toss_winner'' must be either ''team1'' or ''team2'' when present,
        because toss_won and subsequent aggregations rely on comparing toss_winner
        to the derived ''team'' (which can come from ''team2''). This can be validated
        with: satisfies(''CASE WHEN toss_winner IS NOT NULL THEN CASE WHEN toss_winner
        IN (team1, team2) THEN 1 ELSE 0 END ELSE 1 END'', ''Toss winner must be team1
        or team2'', lambda x: x == 1).'
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      - start_line: 68
        end_line: 68
        file: ''
      uid: 17205d62-d8d1-45a0-8304-44397063ccc1
    - text: The 'team2' column should have low, league-like cardinality (e.g., distinct
        team count well below 50). Extremely high cardinality likely indicates inconsistent
        labeling or corrupted team names that would fragment groupby results. This
        can be checked with a distinct count bound (e.g., expect_column_unique_value_count_to_be_between('team2',
        min_value=2, max_value=50)).
      sources:
      - start_line: 60
        end_line: 73
        file: ''
      - start_line: 78
        end_line: 80
        file: ''
      uid: e367f8bd-9ffa-4f9e-ba00-4317e8c4556f
