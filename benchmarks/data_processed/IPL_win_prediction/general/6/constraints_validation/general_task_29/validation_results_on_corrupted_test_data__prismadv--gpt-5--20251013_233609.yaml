results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` IS NOT NULL AND `team1` = TRIM(`team1`) AND
        LENGTH(TRIM(`team1`)) > 0", "team1 trimmed and non-empty", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`winner` = `team1` OR
        `winner` = `team2`)", "Winner is one of the teams for played matches", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` IS NOT NULL AND `team2` IS NOT NULL AND `team1`
        <> `team2`", "Two distinct teams per match", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result = ''no result'' OR winner = team1 OR winner
        = team2", ''winner_in_teams'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team1 <> team2'', ''no_self_match'', lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .hasPattern('team2', '^(?!\\s*$).+')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .hasPattern('team2', '^(?!\\s).*(?<!\\s)$')
      status: true
      reason_if_failed: ''
      level: warning
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `player_of_match` IS NULL THEN 1 WHEN LENGTH(TRIM(`player_of_match`))
        > 0 THEN 1 ELSE 0 END", "Non-empty player_of_match", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `player_of_match` IS NULL THEN 1 WHEN `player_of_match`
        RLIKE ''^(?i)(na|n/a|unknown|none|-)$'' THEN 0 ELSE 1 END", "No placeholder
        POM", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `player_of_match` IS NULL THEN 1 WHEN `player_of_match`
        RLIKE ''[,;/&]'' OR `player_of_match` RLIKE ''(?i)\\band\\b'' THEN 0 ELSE
        1 END", "Single POM per row", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') OR `result_margin`
        IS NULL THEN true ELSE false END", "Margin only present for runs/wickets",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN `result_margin`
        IS NOT NULL ELSE true END", "Margin present when applicable", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN (`result_margin`
        IS NOT NULL AND CAST(`result_margin` AS BIGINT) IS NOT NULL AND CAST(`result_margin`
        AS DOUBLE) = CAST(CAST(`result_margin` AS BIGINT) AS DOUBLE)) ELSE true END",
        "Margin is a whole number for runs/wickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.isContainedIn(''super_over'', [''Y'',''N''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('super_over')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''super_over'')'' failed on data
        sample: Value: 0.9509536784741145 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(super_over <> ''Y'') OR (winner IS NOT NULL AND (winner
        = team1 OR winner = team2))", ''winner present and valid when super over'',
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(super_over <> ''Y'') OR (winner
        IS NOT NULL AND (winner = team1 OR winner = team2))", ''winner present and
        valid when super over'', lambda x: x == 1.0)'' failed on data sample: Value:
        0.997275204359673 does not meet the constraint requirement!'
      level: warning
  toss_winner:
    code:
    - suggestion: '.satisfies("((`team1` IS NULL OR `team2` IS NULL) OR (`toss_winner`
        = `team1` OR `toss_winner` = `team2`))", "Toss winner is one of the two teams
        (when teams present)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`toss_winner` IS NOT
        NULL AND TRIM(`toss_winner`) <> '''')", "toss_winner present for played matches",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`toss_winner` IS NULL OR `toss_winner` = TRIM(`toss_winner`)",
        "toss_winner has no leading/trailing whitespace", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` = ''no result'') OR (LOWER(`toss_winner`)
        = LOWER(`team1`) OR LOWER(`toss_winner`) = LOWER(`team2`))", "Case-insensitive
        match of toss_winner to team labels on played matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''date'', ''^\d{4}-\d{2}-\d{2}$'', lambda r: r == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("to_date(date, ''yyyy-MM-dd'') IS NOT NULL", ''Date
        parseable'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("season IS NOT NULL AND TRIM(season) <> ''''", "Season
        non-empty after trim", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("season RLIKE ''^[0-9]+$''", "Season numeric digits
        only", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["city","venue"]':
    code:
    - suggestion: '.satisfies("(`super_over` <> ''Y'') OR (`city` IS NOT NULL AND
        `venue` IS NOT NULL)", "city_venue_complete_when_super_over_Y", lambda x:
        x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(`super_over` <> ''Y'') OR (`city`
        IS NOT NULL AND `venue` IS NOT NULL)", "city_venue_complete_when_super_over_Y",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.997275204359673 does
        not meet the constraint requirement!'
      level: warning
  id:
    code:
    - suggestion: '.satisfies("(super_over <> ''Y'') OR (id IS NOT NULL)", "id non-null
        for super-over", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: '.satisfies("CASE WHEN super_over = ''Y'' THEN (venue IS NOT NULL
        AND LENGTH(TRIM(venue)) > 0) ELSE true END", "Venue present for super-over
        rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' THEN (winner IS NOT
        NULL AND TRIM(winner) <> '''') ELSE TRUE END", "winner present for played",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' THEN (winner = team1
        OR winner = team2) ELSE TRUE END", "winner equals one of the teams for played
        matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "winner in canonical team domain on row", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''winner'', lambda v: v >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda v: v >=
        0.99)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: '.satisfies("winner IS NULL OR winner = TRIM(winner)", "winner is
        trimmed", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("((result IN (''runs'',''wickets'') AND CAST(result_margin
        AS BIGINT) IS NOT NULL) OR (result IN (''tie'',''no result'') AND result_margin
        IS NULL))", ''Result-margin consistency'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("(result = ''no result'') OR (winner IS NOT NULL AND
        (winner = team1 OR winner = team2))", "winner_is_one_of_teams_when_played",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "no_self_match", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result <> ''no result'') OR winner IS NULL", "no_winner_when_no_result",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "winner_in_teams_domain", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["super_over","winner"]':
    code:
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`winner` IS NOT NULL
        AND (`winner` = `team1` OR `winner` = `team2`))", "Winner valid when match
        played", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`result` = ''no result'') OR ((`toss_winner` = `team1`
        OR `toss_winner` = `team2`) AND `winner` IS NOT NULL)", "Toss winner among
        teams and winner present for played matches", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
