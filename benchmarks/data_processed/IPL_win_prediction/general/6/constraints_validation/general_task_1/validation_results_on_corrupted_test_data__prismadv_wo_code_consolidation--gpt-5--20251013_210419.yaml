results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 = TRIM(team1)", "team1_trimmed", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("length(TRIM(team1)) > 0", "team1_non_empty", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "distinct_teams_per_match", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("length(trim(team2)) > 0", "Non-empty team2", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team2 = trim(team2)", "Trimmed team2", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "Distinct teams per match", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result = ''no result'') OR (winner IS NULL) OR (winner
        IN (team1, team2))", "Winner must be team1 or team2", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("`target_overs` IS NULL OR `target_overs` IS NOT NULL",
        "target_overs column exists", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_overs` RLIKE ''^[0-9]+(\\.[0-9]+)?$''
        OR `target_overs` IS NULL THEN 1 ELSE 0 END", "target_overs numeric-like",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN (`result_margin`
        IS NOT NULL AND CAST(`result_margin` AS DOUBLE) IS NOT NULL) ELSE TRUE END",
        "Result margin present and numeric for runs/wickets", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CAST(`result_margin`
        AS DOUBLE) > 0 ELSE TRUE END", "Positive margin when result is runs/wickets",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN (CAST(`result_margin`
        AS DOUBLE) % 1 = 0 AND CAST(`result_margin` AS DOUBLE) BETWEEN 1 AND 10) ELSE
        TRUE END", "Wickets margin is integer between 1 and 10", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result_margin` IS NULL) OR (CAST(`result_margin`
        AS DOUBLE) % 1 = 0)", "Result margin is whole number when present", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("`target_runs` IS NULL OR `target_runs` IS NOT NULL",
        "Column target_runs exists", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL THEN true WHEN CAST(`target_runs`
        AS DOUBLE) IS NOT NULL OR `target_runs` RLIKE ''^[+-]?\\d+(\\.\\d+)?$'' THEN
        true ELSE false END", "Numeric-like target_runs", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.satisfies("super_over IS NULL OR super_over IS NOT NULL", "super_over_exists",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''super_over'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''super_over'', lambda x: x
        >= 0.99)'' failed on data sample: Value: 0.9509536784741145 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.isContainedIn(''super_over'', [''Y'',''N''], lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`super_over` = ''Y''", "Share of Y <= 5%", lambda x:
        x <= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.hasCompleteness(''toss_winner'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`toss_winner` = `team1` OR `toss_winner` = `team2`)'',
        ''Toss winner must be one of the two teams'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''length(`toss_winner`) = length(trim(`toss_winner`))'',
        ''No leading/trailing whitespace in toss_winner'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.hasCompleteness(''date'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: '.satisfies(''to_timestamp(`date`) IS NOT NULL'', ''date_parseable'',
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: undefined
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: '.hasCompleteness(''id'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("year(to_timestamp(date)) = CAST(season AS INT)", "season_matches_date_year",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "distinct_teams_per_match", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result IN (''tie'',''no result'') AND winner IS NULL)
        OR (result NOT IN (''tie'',''no result'') AND (TRIM(LOWER(winner)) = TRIM(LOWER(team1))
        OR TRIM(LOWER(winner)) = TRIM(LOWER(team2))))", "winner_valid_given_result",
        lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(result IN (''tie'',''no result'')
        AND winner IS NULL) OR (result NOT IN (''tie'',''no result'') AND (TRIM(LOWER(winner))
        = TRIM(LOWER(team1)) OR TRIM(LOWER(winner)) = TRIM(LOWER(team2))))", "winner_valid_given_result",
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.hasUniqueness(["season", "date", "team1", "team2"], lambda u:
        u == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result <> ''runs'') OR ((winner = team1 OR winner
        = team2) AND CAST(result_margin AS DOUBLE) > 0)", "positive_margin_when_runs",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result <> ''wickets'') OR ((winner = team1 OR winner
        = team2) AND CAST(result_margin AS DOUBLE) >= 1 AND CAST(result_margin AS
        DOUBLE) <= 10)", "valid_margin_when_wickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result NOT IN (''tie'',''no result'')) OR (result_margin
        IS NULL OR CAST(result_margin AS DOUBLE) = 0)", "zero_or_null_margin_when_tie_or_no_result",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("(toss_winner = team1 OR toss_winner = team2)", "toss_winner_in_teams",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "teams_non_null_and_distinct", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(coalesce(result, '''')) IN (''runs'',''wickets'')
        THEN (lower(trim(winner)) = lower(trim(team1)) OR lower(trim(winner)) = lower(trim(team2)))
        ELSE (winner IS NULL OR (lower(trim(winner)) <> lower(trim(team1)) AND lower(trim(winner))
        <> lower(trim(team2)))) END", "winner_membership_by_result", lambda x: x >=
        0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(coalesce(result,
        '''')) IN (''runs'',''wickets'') THEN (lower(trim(winner)) = lower(trim(team1))
        OR lower(trim(winner)) = lower(trim(team2))) ELSE (winner IS NULL OR (lower(trim(winner))
        <> lower(trim(team1)) AND lower(trim(winner)) <> lower(trim(team2)))) END",
        "winner_membership_by_result", lambda x: x >= 0.99)'' failed on data sample:
        Value: 0.989100817438692 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN result_margin > 0
        WHEN result = ''wickets'' THEN result_margin > 0 WHEN result IN (''tie'',''no
        result'') THEN (result_margin IS NULL OR result_margin = 0) ELSE TRUE END",
        "result_margin_consistency", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("result IN (''no result'', ''tie'') OR (winner IS NOT
        NULL AND (winner = team1 OR winner = team2))", "Winner valid for decisive
        matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result <> ''no result'') OR winner IS NULL", "Winner
        null when no result", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("winner IS NULL OR winner = trim(winner)", "Winner has
        no leading/trailing whitespace", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (result_margin
        IS NOT NULL AND result_margin > 0) ELSE true END", ''positive margin for decisive
        results'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (winner
        IS NOT NULL AND (winner = team1 OR winner = team2)) ELSE true END", ''winner
        present for decisive results'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
