results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''player_of_match'', lambda
        x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: warning
  result_margin:
    code:
    - suggestion: .satisfies('CASE WHEN result IN ("runs", "wickets") THEN result_margin
        IS NOT NULL ELSE TRUE END', 'Non-null result_margin for decided matches')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN result IN ("runs", "wickets") THEN result_margin
        = CAST(result_margin AS INT) ELSE TRUE END', 'Integer result_margin for decided
        matches')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''super_over'')'' failed on data
        sample: Value: 0.9509536784741145 does not meet the constraint requirement!'
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''toss_winner = team1 OR toss_winner = team2'', ''Valid
        Toss Winner'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies('`method` IS NULL OR `method` = "D/L"', 'method is null
        or D/L only')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x >=
        0.998)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'Winner must be team1 or team2 or null')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over","winner"]':
    code:
    - suggestion: .satisfies("CASE WHEN `result` = 'tie' AND `super_over` = 'Y' THEN
        `winner` IS NOT NULL WHEN `result` = 'tie' AND `super_over` != 'Y' THEN `winner`
        IS NULL OR `winner` = '' ELSE TRUE END", "Tie result super over winner logic")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `result` = 'no result' THEN (`winner` IS NULL
        OR `winner` = '') AND `super_over` = 'N' ELSE TRUE END", "No result winner
        and super_over logic")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `result` = ''no result''
        THEN (`winner` IS NULL OR `winner` = '''') AND `super_over` = ''N'' ELSE TRUE
        END", "No result winner and super_over logic")'' failed on data sample: Value:
        0.997275204359673 does not meet the constraint requirement!'
      level: warning
    - suggestion: .satisfies("CASE WHEN `result` IN ('runs', 'wickets') THEN (`winner`
        = `team1` OR `winner` = `team2`) ELSE TRUE END", "Winner must be team1 or
        team2 for runs/wickets")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: .satisfies('`team1` != `team2`', 'Team1 not equal to Team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`toss_winner` = `team1` OR `toss_winner` = `team2`',
        'Toss winner must be one of the teams')
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: .satisfies('team1 <> team2', 'Team1 and Team2 must be different')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(winner IS NULL) OR (winner = team1) OR (winner = team2)',
        'Winner must be one of the participating teams or null')
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'Toss winner
        must be one of the two teams')
      status: true
      reason_if_failed: ''
      level: error
