results:
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  row_level:
    code:
    - suggestion: '.satisfies(''(toss_winner = team1 OR toss_winner = team2)'', ''toss_winner_is_valid'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(winner IS NULL) OR (winner = team1 OR winner = team2)'',
        ''winner_is_valid'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team1 != team2'', ''teams_not_same'', lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''super_over'')'' failed on data
        sample: Value: 0.9509536784741145 does not meet the constraint requirement!'
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
