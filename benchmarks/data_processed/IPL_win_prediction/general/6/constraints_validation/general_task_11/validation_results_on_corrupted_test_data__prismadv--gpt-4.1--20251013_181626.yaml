results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''target_overs > 0'', ''No zero target_overs'', lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: .satisfies('CASE WHEN lower(`result`) IN ("runs", "wickets") THEN
        `result_margin` IS NOT NULL AND cast(`result_margin` AS INT) = `result_margin`
        ELSE true END', 'result_margin integer if result is runs/wickets')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN lower(`result`) IN ("runs", "wickets") THEN
        `result_margin` >= 0 ELSE true END', 'result_margin non-negative for runs/wickets')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.satisfies(''NOT (target_overs IS NOT NULL AND target_overs > 0
        AND target_runs IS NULL)'', ''target_runs present when target_overs > 0'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''target_runs'', lambda x:
        x >= 0.998)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`toss_decision` = LOWER(TRIM(`toss_decision`))'',
        ''Normalized toss_decision'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.hasCompleteness(''super_over'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''super_over'', lambda x: x
        == 1.0)'' failed on data sample: Value: 0.9509536784741145 does not meet the
        constraint requirement!'
      level: error
    - suggestion: .satisfies("upper(`super_over`) IN ('Y', 'N')", "Valid super_over
        values")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("upper(`super_over`) IN (''Y'', ''N'')",
        "Valid super_over values")'' failed on data sample: Value: 0.9509536784741145
        does not meet the constraint requirement!'
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`toss_winner` = `team1` OR `toss_winner` = `team2`)',
        'toss_winner matches team columns')
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('to_date(`date`, "yyyy-MM-dd") IS NOT NULL', 'Valid Date
        Format')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("`method` IS NULL OR `method` = 'D/L'", "method is null
        or D/L")
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x >=
        0.998)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: .satisfies('CASE WHEN winner IS NULL THEN 1 WHEN winner = team1
        OR winner = team2 THEN 1 ELSE 0 END', 'Winner must be a team in the match')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN winner IS NULL THEN 1 WHEN winner IN (team1,
        team2) THEN 1 ELSE 0 END', 'Winner must be a known team')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: .satisfies('result IN ("runs", "wickets", "tie", "no result")',
        'Result values in allowed set')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('((result IN ("runs", "wickets")) AND result_margin IS
        NOT NULL AND CAST(result_margin AS INT) = result_margin) OR (result NOT IN
        ("runs", "wickets"))', 'Result margin required for runs/wickets and must be
        integer')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('((result = "tie") AND result_margin IS NULL) OR ((result
        = "no result") AND (result_margin IS NULL OR result_margin IS NOT NULL)) OR
        ((result IN ("runs", "wickets")) AND result_margin IS NOT NULL)', 'Result
        margin presence by result value')
      status: true
      reason_if_failed: ''
      level: warning
  '["result","team1","team2","winner"]':
    code:
    - suggestion: .satisfies("(winner IS NULL OR winner = team1 OR winner = team2)",
        "Winner must be one of the two teams or null")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("team1 != team2", "Teams must not be the same in a match")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("((result = 'no result' AND winner IS NULL) OR (result
        != 'no result' AND winner IS NOT NULL))", "Winner null iff no result")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'Winner is one of the teams or null')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('team1 != team2', 'Teams are not the same')
      status: true
      reason_if_failed: ''
      level: error
  '["toss_decision","toss_winner"]':
    code:
    - suggestion: .satisfies('(`result` = "no result") OR ((`toss_winner` IS NOT NULL
        AND (`toss_winner` = `team1` OR `toss_winner` = `team2`)) AND (`toss_decision`
        IN ("field", "bat")))', 'Valid Toss Winner and Decision for Resulted Matches')
      status: true
      reason_if_failed: ''
      level: error
  '["toss_winner","winner"]':
    code:
    - suggestion: .satisfies('((`result` = "no result") OR (`toss_winner` IS NOT NULL
        AND `winner` IS NOT NULL))', 'Toss winner and winner must be present if result
        is not no result')
      status: true
      reason_if_failed: ''
      level: error
