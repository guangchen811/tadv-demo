results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(winner IS NULL) OR (`winner` = `team1`) OR (`winner`
        = `team2`)", "Winner must be one of team1 or team2", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("LENGTH(team2) > 0", "team2 should not be empty", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete(column='match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(column=''match_type'', allowed_values=[''League'',
        ''Elimination Final'', ''Eliminator'', ''Qualifier 2'', ''Final'', ''Semi
        Final'', ''Qualifier 1''], assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(columnCondition="`match_type` = ''League''", constraintName="at
        least one League match", assertion=lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN CASE WHEN target_overs
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Target Overs Not Null for D/L
        Method", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN target_overs IS NOT NULL THEN CASE WHEN target_overs
        > 0 THEN 1 ELSE 0 END ELSE 1 END", "Target Overs Positive When Not Null",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("(`result` != ''runs'' AND `result` != ''wickets'')
        OR `result_margin` IS NOT NULL", "result_margin_present_for_runs_wickets",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("((`result` != ''runs'' AND `result` != ''wickets'')
        OR `result_margin` IS NULL) OR (`result_margin` % 1 = 0)", "result_margin_is_integer_when_applicable",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' AND target_overs IS NOT
        NULL THEN target_runs IS NOT NULL ELSE TRUE END", "target_runs completeness
        for D/L method", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN target_runs IS NOT NULL THEN target_runs
        = FLOOR(target_runs) ELSE TRUE END", "target_runs are whole numbers when present",
        assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isComplete("super_over")
      status: false
      reason_if_failed: 'Constraint ''.isComplete("super_over")'' failed on data sample:
        Value: 0.9509536784741145 does not meet the constraint requirement!'
      level: error
    - suggestion: .isContainedIn("super_over", ["Y", "N"])
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("CAST(`date` AS DATE) IS NOT NULL", "date_parsability_check",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.isContainedIn(''method'', [''D/L''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.hasUniqueness([''season'', ''date'', ''team1'', ''team2''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(YEAR(date) = season) OR (date IS NULL)", "Temporal
        Consistency Date Season", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'', ''tie'')
        THEN (CASE WHEN `winner` IS NOT NULL THEN 1 ELSE 0 END) WHEN `result` = ''no
        result'' THEN (CASE WHEN `winner` IS NULL THEN 1 ELSE 0 END) ELSE 1 END",
        "WinnerCompletenessBasedOnResult", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        (CASE WHEN `winner` IS NOT NULL AND `result_margin` IS NOT NULL AND `result_margin`
        = FLOOR(`result_margin`) THEN 1 ELSE 0 END) ELSE 1 END", "WinnerAndMarginCompletenessAndIntegerForRunsWickets",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL THEN (CASE WHEN `winner`
        = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END) ELSE 1 END", "WinnerMustBeOneOfTeams",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN `result` = ''tie''
        ELSE TRUE END", "Super Over Implies Tie", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN (`winner`
        IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`)) ELSE TRUE END",
        "Valid Winner for Decided Matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("(result != ''no result'' AND winner IS NOT NULL) OR
        (result = ''no result'' AND winner IS NULL)", "Winner presence based on result",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR (winner = team1 OR winner = team2)",
        "Winner is one of the teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 != team2", "Teams are distinct", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN TRUE ELSE (winner
        IS NOT NULL AND (winner = team1 OR winner = team2)) END", "Winner is one of
        team1 or team2 when result exists", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 != team2", "Teams must be distinct for a match",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
