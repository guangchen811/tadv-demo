results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("TRIM(team1) != ''", "team1_not_empty")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("team1 <> team2 AND (toss_winner = team1 OR toss_winner
        = team2) AND (winner IS NULL OR result = 'no result' OR winner = team1 OR
        winner = team2)", "team_values_are_consistent_across_related_columns")
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team2` <> `team1`", "team1_and_team2_are_different",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN target_overs IS NOT
        NULL ELSE TRUE END", "target_overs must be present for D/L method", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR result_margin
        IS NOT NULL", "result_margin must be non-null for ''runs'' or ''wickets''
        results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN target_runs IS NOT
        NULL ELSE TRUE END", "target_runs must be populated for D/L method", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete("toss_decision")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("toss_decision", ["bat", "field"])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''super_over'')'' failed on data
        sample: Value: 0.9509536784741145 does not meet the constraint requirement!'
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete("toss_winner")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_one_of_the_teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete("date")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("to_date(`date`) IS NOT NULL", "Date is parsable", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: '.hasCompleteness("city", lambda c: c >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: .isContainedIn("method", ["D/L"])
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("year(to_date(`date`)) == `season`", "SeasonYearMatchesDateYear",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  venue:
    code:
    - suggestion: .isComplete("venue")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("trim(venue) <> ''", "venue_is_not_empty")
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("result = ''no result'' OR winner IS NOT NULL", "WinnerMustExistForConclusiveResult",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "WinnerIsOneOfCompetingTeams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("result", ["runs", "wickets", "tie", "no result"])
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("`result` NOT IN (''runs'', ''wickets'') OR `result_margin`
        IS NOT NULL", "result_margin must be non-null for run/wicket results", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("(result = ''tie'' AND super_over = ''Y'') OR (result
        <> ''tie'' AND super_over = ''N'')", "SuperOverResultConsistency", lambda
        x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(result = ''tie'' AND super_over
        = ''Y'') OR (result <> ''tie'' AND super_over = ''N'')", "SuperOverResultConsistency",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9509536784741145 does
        not meet the constraint requirement!'
      level: error
  '["result","winner"]':
    code:
    - suggestion: '.satisfies("(result = ''no result'' AND winner IS NULL) OR (result
        IN (''runs'', ''wickets'', ''tie'') AND winner IS NOT NULL)", "winner_completeness_by_result",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "team1_and_team2_must_be_different",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner must be one of the participating teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "team1 and team2 should be different",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_competing_team", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_are_different", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "team1_and_team2_are_different",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`winner` IS NULL) OR (`winner` = `team1`) OR (`winner`
        = `team2`)", "winner_is_one_of_the_teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
