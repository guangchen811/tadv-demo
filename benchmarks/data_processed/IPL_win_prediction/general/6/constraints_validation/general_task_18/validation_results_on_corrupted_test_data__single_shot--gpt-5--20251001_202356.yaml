results:
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .hasPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .isContainedIn('method', ['D/L'])
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda v: v >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''player_of_match'', lambda
        v: v >= 0.99)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isComplete('result_margin', where="result IN ('runs','wickets')")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isComplete(''result_margin'',
        where="result IN (''runs'',''wickets'')")'': Check.isComplete() got an unexpected
        keyword argument ''where'''
      level: error
    - suggestion: '.satisfies(''result_margin >= 1'', ''margin_positive_when_win'',
        lambda v: v == 1.0, where="result IN (''runs'',''wickets'')")'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.satisfies(''result_margin
        >= 1'', ''margin_positive_when_win'', lambda v: v == 1.0, where="result IN
        (''runs'',''wickets'')")'': Check.satisfies() got an unexpected keyword argument
        ''where'''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''super_over'')'' failed on data
        sample: Value: 0.9509536784741145 does not meet the constraint requirement!'
      level: error
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  super_over,result:
    code:
    - suggestion: '.satisfies("(super_over = ''Y'' AND result = ''tie'') OR (super_over
        = ''N'' AND result <> ''tie'')", ''super_over_consistent_with_tie'', lambda
        v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(super_over = ''Y'' AND result =
        ''tie'') OR (super_over = ''N'' AND result <> ''tie'')", ''super_over_consistent_with_tie'',
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9509536784741145 does
        not meet the constraint requirement!'
      level: error
  target_overs:
    code:
    - suggestion: .isComplete('target_overs', where="method = 'D/L'")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isComplete(''target_overs'',
        where="method = ''D/L''")'': Check.isComplete() got an unexpected keyword
        argument ''where'''
      level: error
    - suggestion: '.satisfies(''target_overs >= 1 AND target_overs <= 20'', ''dl_target_overs_in_range'',
        lambda v: v == 1.0, where="method = ''D/L''")'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.satisfies(''target_overs
        >= 1 AND target_overs <= 20'', ''dl_target_overs_in_range'', lambda v: v ==
        1.0, where="method = ''D/L''")'': Check.satisfies() got an unexpected keyword
        argument ''where'''
      level: error
  target_runs:
    code:
    - suggestion: .isComplete('target_runs', where="method = 'D/L'")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isComplete(''target_runs'',
        where="method = ''D/L''")'': Check.isComplete() got an unexpected keyword
        argument ''where'''
      level: error
    - suggestion: '.satisfies(''target_runs >= 1'', ''dl_target_runs_positive'', lambda
        v: v == 1.0, where="method = ''D/L''")'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.satisfies(''target_runs
        >= 1'', ''dl_target_runs_positive'', lambda v: v == 1.0, where="method = ''D/L''")'':
        Check.satisfies() got an unexpected keyword argument ''where'''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1,team2:
    code:
    - suggestion: '.satisfies(''team1 <> team2'', ''teams_distinct'', lambda v: v
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''toss_winner = team1 OR toss_winner = team2'', ''toss_winner_in_teams'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .isComplete('winner', where="result <> 'no result'")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isComplete(''winner'',
        where="result <> ''no result''")'': Check.isComplete() got an unexpected keyword
        argument ''where'''
      level: error
    - suggestion: '.satisfies("result <> ''no result'' OR winner IS NULL", ''winner_null_when_no_result'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
