results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(coalesce(`team1`, '''')) <> '''' THEN
        1 ELSE 0 END", "team1_non_empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `team1` <> `team2` THEN 1 ELSE 0 END", "teams_are_distinct",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` IS NULL OR `toss_winner` =
        `team1` OR `toss_winner` = `team2` THEN 1 ELSE 0 END", "toss_winner_matches_team1_or_team2",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL OR `winner` = `team1` OR
        `winner` = `team2` THEN 1 ELSE 0 END", "winner_matches_team1_or_team2", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.satisfies("CASE WHEN `team2` IS NOT NULL AND trim(`team2`) !=
        '''' THEN 1 ELSE 0 END", "team2_not_null_or_empty", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `team1` IS NOT NULL AND `team2` IS NOT NULL
        AND trim(`team1`) != '''' AND trim(`team2`) != '''' AND `team2` != `team1`
        THEN 1 ELSE 0 END", "team2_differs_from_team1", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` IS NULL THEN 1 WHEN `toss_winner`
        IN (`team1`, `team2`) THEN 1 ELSE 0 END", "toss_winner_matches_team_columns",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN 1 WHEN `winner`
        IN (`team1`, `team2`) THEN 1 ELSE 0 END", "winner_matches_team_columns_or_null_when_no_result",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' AND `target_runs` IS NOT
        NULL THEN CASE WHEN TRY_CAST(`target_overs` AS DOUBLE) IS NOT NULL THEN 1
        ELSE 0 END ELSE 1 END", "D/L target_overs numeric and present", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("`result` NOT IN (''runs'',''wickets'') OR `result_margin`
        IS NOT NULL", "result_margin_present_for_runs_or_wickets", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`result` != ''runs'' OR (CAST(`result_margin` AS DOUBLE)
        >= 1 AND floor(CAST(`result_margin` AS DOUBLE)) = CAST(`result_margin` AS
        DOUBLE))", "result_margin_runs_integer_positive", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`result` != ''wickets'' OR (CAST(`result_margin` AS
        DOUBLE) BETWEEN 1 AND 10 AND floor(CAST(`result_margin` AS DOUBLE)) = CAST(`result_margin`
        AS DOUBLE))", "result_margin_wickets_integer_1_to_10", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN `target_runs`
        IS NOT NULL AND TRY_CAST(`target_runs` AS DOUBLE) IS NOT NULL THEN 1 ELSE
        0 END ELSE 1 END", "DL_target_runs_numeric", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' AND `target_runs` IS NOT
        NULL THEN CASE WHEN TRY_CAST(`target_runs` AS DOUBLE) > 0 THEN 1 ELSE 0 END
        ELSE 1 END", "DL_target_runs_positive", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(`toss_decision`)) IN (''bat'',''field'')
        THEN 1 ELSE 0 END", "toss_decision_allowed_values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete("super_over")
      status: false
      reason_if_failed: 'Constraint ''.isComplete("super_over")'' failed on data sample:
        Value: 0.9509536784741145 does not meet the constraint requirement!'
      level: error
    - suggestion: .isContainedIn("super_over", ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `toss_winner` = `team1` OR `toss_winner`
        = `team2` THEN 1 ELSE 0 END'', ''toss_winner_matches_team1_or_team2'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN TRIM(`toss_winner`) = `toss_winner` THEN
        1 ELSE 0 END'', ''toss_winner_no_extra_whitespace'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(coalesce(cast(`season` as string), ''''))
        = '''' THEN 0 ELSE 1 END", "Season non-empty", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  city:
    code:
    - suggestion: '.satisfies("CASE WHEN `city` IS NULL OR typeof(`city`) = ''string''
        THEN 1 ELSE 0 END", "City types", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''city'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMaxLength(''city'', lambda x: x <= 100)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `city` IS NULL OR (city NOT LIKE ''%\\n%''
        AND city NOT LIKE ''%\\r%'') THEN 1 ELSE 0 END", "City no newlines", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL THEN 1 ELSE 0 END", "MethodNullFraction",
        lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL THEN 1 ELSE CASE WHEN typeof(`method`)
        = ''string'' THEN 1 ELSE 0 END END", "MethodIsStringOrNull", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `id` IS NULL THEN 0 WHEN floor(CAST(`id`
        AS DOUBLE)) = CAST(`id` AS DOUBLE) THEN 1 WHEN REGEXP_LIKE(CAST(`id` AS STRING),
        ''^-?[0-9]+$'') THEN 1 ELSE 0 END", "Id integer-valued", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: '.satisfies("CASE WHEN `venue` IS NOT NULL THEN 1 ELSE 0 END", "Non-null
        venue", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRIM(UPPER(COALESCE(`venue`, ''''))) NOT
        IN ('''',''NAN'',''NONE'',''NULL'') AND LENGTH(TRIM(COALESCE(`venue`, '''')))
        > 0 THEN 1 ELSE 0 END", "Non-empty, non-placeholder venue", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN CASE WHEN
        `winner` IS NOT NULL AND TRIM(`winner`) <> '''' THEN 1 ELSE 0 END ELSE 1 END",
        "winner_present_for_completed_matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN CASE WHEN
        `winner` = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END ELSE 1 END", "winner_is_team1_or_team2",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL THEN CASE WHEN LENGTH(TRIM(`winner`))
        > 0 AND UPPER(TRIM(`winner`)) <> ''NAN'' THEN 1 ELSE 0 END ELSE 1 END", "winner_non_blank_and_not_literal_NAN",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "Valid result values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) = `result` THEN 1 ELSE
        0 END", "Result normalized (lowercase, no surrounding spaces)", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE
        WHEN `result_margin` IS NOT NULL AND trim(`result_margin`) rlike ''^[+-]?[0-9]+(\\.[0-9]+)?$''
        THEN 1 ELSE 0 END ELSE 1 END", "Margin present and numeric for runs/wickets",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN CASE WHEN
        `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN 1
        ELSE 0 END ELSE 1 END", "Winner present and valid for decided matches", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["method","target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN `target_runs`
        IS NOT NULL AND `target_overs` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END",
        "DL targets present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN cast(`target_runs`
        as double) IS NOT NULL AND floor(cast(`target_runs` as double)) = cast(cast(`target_runs`
        as double) as int) AND cast(`target_overs` as double) IS NOT NULL AND floor(cast(`target_overs`
        as double)) = cast(cast(`target_overs` as double) as int) THEN 1 ELSE 0 END
        ELSE 1 END", "DL targets integer-valued", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
