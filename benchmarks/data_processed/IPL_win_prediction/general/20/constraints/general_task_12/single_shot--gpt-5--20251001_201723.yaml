constraints:
  date:
    code:
    - - .hasPattern('date', '[0-9]{4}-[0-9]{2}-[0-9]{2}')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Eliminator', 'Qualifier 1', 'Qualifier
        2', 'Final', 'Semi Final', 'Elimination Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L'], True)
      - Invalid
    - - '.satisfies("(method <> ''D/L'') OR (target_runs IS NOT NULL AND target_overs
        IS NOT NULL)", ''dls_targets_present'', lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - '.hasCompleteness(''player_of_match'', lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    - - '.satisfies("(super_over <> ''Y'') OR (result = ''tie'')", ''super_over_only_for_ties'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isNonNegative('result_margin')
      - Valid
    - - '.satisfies("(result NOT IN (''runs'',''wickets'')) OR result_margin IS NOT
        NULL", ''margin_present_when_decided'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('season')
      - Valid
    - - '.satisfies("substring(date, 1, 4) = CAST(season AS STRING)", ''season_matches_date_year'',
        lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    - - '.satisfies("(result <> ''tie'') OR (super_over = ''Y'')", ''tie_requires_super_over'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Valid
    - - '.satisfies(''(target_overs IS NULL) OR (target_overs >= 1 AND target_overs
        <= 20)'', ''target_overs_in_range'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - '.satisfies(''team1 <> team2'', ''teams_are_distinct'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - '.satisfies(''toss_winner = team1 OR toss_winner = team2'', ''toss_winner_is_one_of_teams'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda v: v >= 0.995)'
      - Valid
    - - '.satisfies("(result <> ''no result'') OR (winner IS NULL)", ''no_result_has_no_winner'',
        lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("(result NOT IN (''runs'',''wickets'',''tie'')) OR (winner IS
        NOT NULL AND (winner = team1 OR winner = team2))", ''winner_present_and_valid_when_applicable'',
        lambda v: v >= 0.995)'
      - Valid
    assumptions: []
