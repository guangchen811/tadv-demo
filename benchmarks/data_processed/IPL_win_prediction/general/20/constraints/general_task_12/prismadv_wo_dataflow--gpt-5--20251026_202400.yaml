    assumptions:
    - text: 'The ''player_of_match'' column is optional (can be null). The raw CSV
        may use the sentinel ''NullValue'' to indicate missing, which must be parsed
        as null. Nevertheless, at least 95% of rows should have a non-null ''player_of_match''
        to preserve result readability. Example validations: Deequ completeness(''player_of_match'')
        >= 0.95; Great Expectations expect_column_values_to_not_be_null with mostly=0.95.'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 50
        end_line: 52
        file: ''
      - start_line: 90
        end_line: 94
        file: ''
      uid: f300d033-09a2-4260-a4b5-9db652020507
    - text: 'When present, ''player_of_match'' values should be non-empty after trimming
        (no blank or whitespace-only strings) to avoid generating messages like ''Player
        of Match: '' with no name. Example validations: Deequ .satisfies("CASE WHEN
        player_of_match IS NULL THEN 1 WHEN length(trim(player_of_match)) > 0 THEN
        1 ELSE 0 END", "Non-empty player_of_match", lambda x: x == 1); Great Expectations
        expect_column_values_to_not_match_regex ''^\\s*$'' (conditioned on non-null).'
      sources:
      - start_line: 50
        end_line: 52
        file: ''
      uid: 2b93d1e4-014d-4004-ace6-3adf4cd520e5
    - text: 'Non-null ''player_of_match'' values should be text-like (contain alphabetic
        characters; not purely numeric). This ensures readable names in the concatenated
        result string. Example validations: Deequ .satisfies("CASE WHEN player_of_match
        IS NULL THEN 1 WHEN player_of_match RLIKE ''.*[A-Za-z].*'' THEN 1 ELSE 0 END",
        "Text-like player_of_match", lambda x: x == 1); Great Expectations expect_column_values_to_match_regex
        ''(?i).*[a-z].*'' for non-null values.'
      sources:
      - start_line: 50
        end_line: 52
        file: ''
      uid: 9da2e52f-0841-49c7-96bf-d531fce01f67
    - text: 'The distinct count of ''player_of_match'' should be within a reasonable
        range (e.g., between 100 and 400 across the dataset) to detect unexpected
        explosions or collapses in cardinality. Example validations: Deequ approximateNumDistinctValues(''player_of_match'')
        between 100 and 400; Great Expectations expect_column_unique_value_count_to_be_between
        min_value=100, max_value=400.'
      sources:
      - start_line: 90
        end_line: 94
        file: ''
      uid: 87672aeb-0d88-41eb-8828-032616bcb8d8
