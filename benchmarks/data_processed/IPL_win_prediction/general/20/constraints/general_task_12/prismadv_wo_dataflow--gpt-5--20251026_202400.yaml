    - text: 'For matches with result = ''no result'', the ''winner'' should be null
        (i.e., not set to either ''team1'' or ''team2''). Otherwise the code would
        incorrectly assign a win via the ''is_winner'' flag. This can be represented
        as: CASE WHEN result = ''no result'' THEN CASE WHEN winner IS NULL THEN 1
        ELSE 0 END ELSE 1 END must hold for all rows.'
      sources:
