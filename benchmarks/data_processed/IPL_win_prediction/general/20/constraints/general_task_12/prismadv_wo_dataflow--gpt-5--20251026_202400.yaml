    - text: '''bat_first_team'' must be consistent with ''toss_decision'' and ''toss_winner'':
        (toss_decision = ''bat'' AND bat_first_team = toss_winner) OR (toss_decision
        <> ''bat'' AND bat_first_team IN (team1, team2) AND bat_first_team <> toss_winner).
        Example Deequ: addConstraint(Compliance(''bat_first_logic'', "(toss_decision
        = ''bat'' AND bat_first_team = toss_winner) OR (toss_decision <> ''bat'' AND
        bat_first_team IN (team1, team2) AND bat_first_team <> toss_winner)"))'
      sources:
