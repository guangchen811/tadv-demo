        end_line: 29
        file: ''
      - start_line: 90
        end_line: 93
        file: ''
      uid: fdda164c-c881-4a90-9d40-7bd9acd285db
    - text: 'For decided matches (result IN (''runs'',''wickets'')), ''winner'' must
        be one of the two teams and ''result_margin'' must be present and strictly
        positive. Example Deequ: addConstraint(Compliance(''decided_has_winner_and_margin'',
        "CASE WHEN result IN (''runs'',''wickets'') THEN winner IN (team1, team2)
        AND result_margin IS NOT NULL AND result_margin > 0 ELSE true END"))'
      sources:
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 66
        end_line: 69
        file: ''
      uid: 25858f1f-02aa-4b25-ae14-b1ea34dce415
    - text: 'Tie and Super Over consistency: (a) If result = ''tie'' AND super_over
        = ''Y'', then winner must be one of the two teams. (b) If result = ''tie''
        AND (super_over IS NULL OR super_over <> ''Y''), then winner must be NULL.
        Example Deequ: addConstraint(Compliance(''tie_so_requires_winner'', "CASE
        WHEN result = ''tie'' AND super_over = ''Y'' THEN winner IN (team1, team2)
        ELSE true END")); addConstraint(Compliance(''tie_no_so_no_winner'', "CASE
        WHEN result = ''tie'' AND (super_over IS NULL OR super_over <> ''Y'') THEN
        winner IS NULL ELSE true END"))'
      sources:
      - start_line: 42
        end_line: 44
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: cc394f03-f713-47dd-bb6c-5ff96d30b628
    - text: 'No-result matches must have no winner and no result margin. Example Deequ:
        addConstraint(Compliance(''no_result_nulls'', "CASE WHEN result = ''no result''
        THEN winner IS NULL AND result_margin IS NULL ELSE true END"))'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 3334a8a7-c0f6-40c9-b5d9-8b76377e5c2c
    - text: 'Teams in a match must be distinct and non-null: team1 <> team2 AND both
        present. Example Deequ: addConstraint(Compliance(''teams_distinct'', ''team1
        IS NOT NULL AND team2 IS NOT NULL AND team1 <> team2''))'
      sources:
      - start_line: 59
        end_line: 64
        file: ''
      uid: 6b54d589-d3f0-4208-9579-d495eb5cfac0
    - text: '''winner'' must either be NULL or one of the two teams in the match.
        Example Deequ: addConstraint(Compliance(''winner_domain'', ''winner IS NULL
        OR winner IN (team1, team2)''))'
      sources:
      - start_line: 35
