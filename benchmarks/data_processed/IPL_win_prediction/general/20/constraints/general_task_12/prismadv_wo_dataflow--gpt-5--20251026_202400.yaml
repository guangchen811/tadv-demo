      source_assumptions:
      - 1c48fc61-98bb-406b-b52f-d9bf731f1528
    assumptions:
    - text: 'The ''team1'' column must be complete (no nulls), since it is used in
        equality comparisons, string formatting, and as part of grouping logic. We
        could represent this as a deequ constraint like: .isComplete(''team1'') or
        .satisfies(''team1 IS NOT NULL'', ''team1 not null'', lambda x: x == 1).'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 56
        end_line: 66
        file: ''
      - start_line: 84
        end_line: 88
        file: ''
      uid: 949ea769-835e-41c1-b67b-f56d714af31d
    - text: 'The ''team1'' values should be clean, human-readable team names without
        leading/trailing whitespace and not empty, to ensure string equality checks
        behave as intended. A possible constraint: .satisfies("team1 = TRIM(team1)
        AND LENGTH(TRIM(team1)) > 0", ''team1 trimmed and non-empty'', lambda x: x
        == 1).'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
      uid: d95fcf5b-acda-4fd4-9950-631c55644578
    - text: 'Each match should have different teams: ''team1'' must not equal ''team2''
        (case-insensitive). This avoids malformed result strings and incorrect opponent
        logic. Constraint example: .satisfies("LOWER(team1) <> LOWER(team2)", ''distinct
        teams per match'', lambda x: x == 1).'
      sources:
      - start_line: 33
        end_line: 41
        file: ''
      - start_line: 56
        end_line: 64
        file: ''
      uid: 012d47cb-c4eb-4fdc-8e1b-969ad02222a2
    - text: 'For every row, ''toss_winner'' must be either ''team1'' or ''team2''
        (case-insensitive), otherwise the computed ''bat_first_team'' can be wrong.
        Constraint example: .satisfies("LOWER(toss_winner) IN (LOWER(team1), LOWER(team2))",
        ''toss winner must be one of the two teams'', lambda x: x == 1).'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: 83a88285-dced-4649-a49d-280798435980
    - text: 'For decided matches (result in [''runs'',''wickets'']), ''winner'' must
        be either ''team1'' or ''team2'' (case-insensitive), otherwise the opponent
        determination and result string will be incorrect. Constraint example: .satisfies("CASE
        WHEN result IN (''runs'',''wickets'') THEN LOWER(winner) IN (LOWER(team1),
        LOWER(team2)) ELSE TRUE END", ''winner must be one of the teams for decided
        results'', lambda x: x == 1).'
      sources:
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 35
        end_line: 35
        file: ''
      uid: 04f3af1a-8ca8-455f-874c-3191affa0309
    - text: 'The number of distinct values in ''team1'' should be bounded to a reasonable
        set of team names (e.g., between 2 and 40) to reflect a fixed league/team
        roster and produce meaningful standings. Constraint example: .hasNumberOfDistinctValuesBetween(''team1'',
        2, 40).'
      sources:
      - start_line: 84
        end_line: 88
        file: ''
      uid: 1c48fc61-98bb-406b-b52f-d9bf731f1528
  team2:
