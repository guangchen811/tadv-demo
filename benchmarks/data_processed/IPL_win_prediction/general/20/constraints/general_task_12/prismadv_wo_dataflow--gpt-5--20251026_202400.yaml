      uid: 1b394aee-3726-40ac-ba00-49815ce516f0
      source_assumptions:
      - 2defbd5b-89a6-4746-9af6-427b600979d3
    assumptions:
    - text: 'The ''team2'' column must be complete (no nulls). Missing values would
        cause rows to be dropped from season standings when ''team2'' becomes the
        ''team'' key in the second half of the concatenation and during the groupby.
        We could represent this assumption as a deequ constraint like this: .isComplete("team2")'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      - start_line: 60
        end_line: 64
        file: ''
      - start_line: 85
        end_line: 88
        file: ''
      uid: 552bb852-181f-47a8-926f-329719b401df
    - text: 'The two teams in a match should be different: ''team2'' should not equal
        ''team1''. This prevents degenerate matches and ensures the home/away duplication
        logic produces two distinct team entries. We could represent this assumption
        as a deequ constraint like this: .satisfies("`team2` <> `team1`", "Distinct
        teams per match", lambda x: x == 1)'
      sources:
      - start_line: 30
        end_line: 36
        file: ''
      - start_line: 60
        end_line: 64
        file: ''
      uid: e645df52-f677-4b84-9694-5d5490c68bdf
    - text: 'For every row, the ''toss_winner'' must be one of the two teams (''team1''
        or ''team2''). The computation of ''bat_first_team'' assumes this. We could
        represent this assumption as a deequ constraint like this: .satisfies("`toss_winner`
        IN (`team1`, `team2`)", "Toss winner must be one of the competing teams",
        lambda x: x == 1)'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: d13abff1-d16c-490a-8181-a57e03b6dd58
    - text: 'For decided matches (result in [''runs'',''wickets''] or result == ''tie''
        and super_over == ''Y''), the ''winner'' must equal either ''team1'' or ''team2''
        and be non-null. This is required to build the result string and to compute
        wins/losses correctly. We could represent this assumption as a deequ constraint
        like this: .satisfies("CASE WHEN `result` IN (''runs'',''wickets'') OR (`result`
        = ''tie'' AND `super_over` = ''Y'') THEN CASE WHEN `winner` IN (`team1`, `team2`)
        THEN 1 ELSE 0 END ELSE 1 END", "Winner must be one of the teams for decided
        matches", lambda x: x == 1)'
      sources:
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 66
        end_line: 69
        file: ''
      uid: 88da5968-b717-4bf2-b528-014485593f44
    - text: 'The ''team2'' values should be clean, non-empty strings with no leading
        or trailing whitespace to ensure string equality comparisons (e.g., with ''winner'')
        behave as intended. We could represent this assumption as a deequ constraint
        like this: .satisfies("LENGTH(TRIM(`team2`)) > 0 AND `team2` = TRIM(`team2`)",
        "team2 non-empty and trimmed", lambda x: x == 1)'
      sources:
      - start_line: 60
        end_line: 64
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      - start_line: 30
        end_line: 36
        file: ''
      uid: 1efed510-5996-44f6-83ad-f852e899705a
    - text: "The 'team2' column should contain a limited set of team names (roughly\
        \ league/team identifiers), not free-form values. Based on the data profile\
        \ (\u224819 distinct), we assume the number of distinct 'team2' values is\
        \ not excessively large; for example, no more than 30. We could represent\
        \ this assumption as a deequ constraint like this: .hasNumberOfDistinctValues(\"\
        team2\", lambda x: x <= 30)"
      sources:
      - start_line: 85
        end_line: 88
        file: ''
      uid: 2defbd5b-89a6-4746-9af6-427b600979d3
