      uid: 9be1833b-2081-41c5-9e95-64f88eabe5f1
    - text: If 'result' is 'no result', then 'winner' must be null (to avoid incorrectly
        awarding points). This can be validated with a conditional rule, e.g., CASE
        WHEN result = 'no result' THEN winner IS NULL ELSE true END.
      sources:
      - start_line: 70
        end_line: 71
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 87869891-dbea-4795-96f9-8a653782df6e
  '["method","result","target_overs","target_runs"]':
    code: []
    assumptions:
    - text: When method == 'D/L', both target_runs and target_overs must be present
        and numeric (target_runs should be an integer-like value and target_overs
        a positive number), since the output renders them as int and float in the
        final_result string.
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      uid: 5abe7159-9591-4e97-82f0-655026e149b2
    - text: For rows where result is 'runs' or 'wickets', result_margin must be non-null
        and an integer > 0 (it is cast to int to build the result text). For rows
        where result is 'tie' or 'no result', result_margin should be null.
      sources:
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 42
        end_line: 43
        file: ''
      uid: b0b67417-e7c5-4bcc-a399-940e8ef4e12d
    - text: For decided outcomes (result in {'runs','wickets'} OR result == 'tie'
        AND super_over == 'Y'), winner must be non-null and equal to either team1
        or team2.
      sources:
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 66
        end_line: 69
        file: ''
      uid: 8f9300c8-39e6-44a9-933e-4602bde9d730
    - text: For undetermined outcomes (result == 'no result' OR result == 'tie' AND
        super_over != 'Y'), winner must be null to avoid incorrectly awarding 2 points.
      sources:
      - start_line: 67
        end_line: 71
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 09ca5989-9da4-4d9d-8310-43bff5e1ced9
    - text: If a winner is present on a 'tie' result, then super_over must be 'Y';
        conversely, if super_over != 'Y' on a 'tie', winner must be null. This ensures
        tie handling and points allocation are consistent.
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 67
        end_line: 71
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: ec0ef9b3-36b3-45b1-88db-27acd38bffe0
  '["method","target_overs"]':
    code: []
    assumptions:
    - text: 'If method == ''D/L'', then DLS targets must be present and valid: target_runs
        must be non-null, a positive integer; target_overs must be non-null and >
        0. Deequ compliance example: .addConstraint(Compliance(''dls_targets_present'',
        "method != ''D/L'' OR (target_runs IS NOT NULL AND target_runs > 0 AND target_runs
        = CAST(target_runs AS INT) AND target_overs IS NOT NULL AND target_overs >
        0)"))'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 46
        end_line: 49
        file: ''
      uid: b190df13-fb93-470c-929a-e76e4ccff122
    - text: 'For results decided by runs or wickets, result_margin must be present
        and a positive integer. Deequ compliance example: .addConstraint(Compliance(''margin_for_decided_results'',
        "result NOT IN (''runs'',''wickets'') OR (result_margin IS NOT NULL AND result_margin
        > 0 AND result_margin = CAST(result_margin AS INT))"))'
      sources:
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 21
        end_line: 21
        file: ''
      uid: 4ab66702-ce1b-4146-add4-72d512d3f777
    - text: 'For any tie in this dataset, a Super Over is assumed to occur and the
        winner must be one of the two teams (team1 or team2). Deequ compliance example:
        .addConstraint(Compliance(''tie_requires_super_over_and_winner'', "result
        != ''tie'' OR (super_over = ''Y'' AND winner IS NOT NULL AND (winner = team1
        OR winner = team2))"))'
      sources:
      - start_line: 42
        end_line: 44
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 81
        file: ''
      uid: f9c2bb7a-dc37-4c5e-9310-4aa0d941eeab
    - text: 'For results decided by runs or wickets, winner must be present and equal
        to either team1 or team2 (used to derive opponent and result string). Deequ
        compliance example: .addConstraint(Compliance(''winner_must_be_a_team_for_decided'',
        "result NOT IN (''runs'',''wickets'') OR (winner IS NOT NULL AND (winner =
        team1 OR winner = team2))"))'
      sources:
      - start_line: 34
        end_line: 41
        file: ''
      uid: dbd545b9-51d8-45df-b85d-2404a25bdf04
    - text: 'bat_first_team must be consistent with toss_winner and toss_decision,
        and toss_winner must be one of the two teams. Specifically: (a) toss_winner
        IN {team1, team2}; (b) if toss_decision == ''bat'' then bat_first_team ==
        toss_winner; else bat_first_team is the other team. Deequ compliance example:
        .addConstraint(Compliance(''bat_first_consistency'', "(toss_winner = team1
        OR toss_winner = team2) AND ((toss_decision = ''bat'' AND bat_first_team =
        toss_winner) OR (toss_decision <> ''bat'' AND ((toss_winner = team1 AND bat_first_team
        = team2) OR (toss_winner = team2 AND bat_first_team = team1))))"))'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: 66322f06-5a5e-4c9c-ace0-82af015ba2de
    - text: 'If super_over == ''Y'', the match result must be ''tie'' (super overs
        are only applicable to ties in this pipeline). Deequ compliance example: .addConstraint(Compliance(''super_over_only_for_ties'',
        "super_over != ''Y'' OR result = ''tie''"))'
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 81
        file: ''
      uid: 3af66fec-c9c0-48b6-aacf-2ee77fec45cb
  '["player_of_match","result"]':
    code: []
    assumptions:
    - text: 'For rows where ''result'' is in {''runs'', ''wickets''}: (a) ''winner''
        must be non-null and equal to either ''team1'' or ''team2''; and (b) ''result_margin''
        must be present and numeric (an integer >= 1). This ensures the victory description
        and standings logic are valid.'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 8d867223-57c2-4e98-b1c8-a2aa516a2737
    - text: 'For rows where ''result'' == ''tie'': (a) ''super_over'' must be ''Y'';
        and (b) ''winner'' must be non-null and equal to either ''team1'' or ''team2''.
        This aligns the tie handling in both the result string and the points/standings
        logic.'
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 4ddf19d0-7570-481c-aba6-507b498e6e50
    - text: 'For rows where ''result'' == ''no result'': (a) ''winner'' must be null
        so that no wins/losses are accidentally credited; and (b) ''player_of_match''
        may be null (optional).'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 70
        end_line: 75
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: 3cb1e9e7-9545-448d-9110-2a11a00ff2d4
    - text: If 'method' == 'D/L', then 'target_runs' and 'target_overs' must be present
        and numeric (non-null after coercion) so the DLS target can be rendered.
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 46
        end_line: 49
        file: ''
      uid: d690e6d9-13fc-4562-85b9-d2f2a722d882
    - text: '''toss_winner'' must be either ''team1'' or ''team2'', and ''bat_first_team''
        must be consistent with the toss decision: if ''toss_decision'' == ''bat''
        then ''bat_first_team'' == ''toss_winner''; otherwise ''bat_first_team'' must
        be the opponent of ''toss_winner''.'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: 040a7f2a-f09f-44be-9f69-e6ce57116511
    - text: For decided matches (where 'result' in {'runs','wickets'} OR 'result'
        == 'tie' AND 'super_over' == 'Y'), 'player_of_match' should be non-null.
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: e6a8c596-2d71-46d7-b747-4f8a77361b63
  '["result","result_margin"]':
    code: []
    assumptions:
    - text: 'Consistency between ''result'' and ''result_margin'': If result is ''runs''
        or ''wickets'', then result_margin must be non-null, numeric with no fractional
        part (an integer), and >= 1. If result is ''tie'' or ''no result'', result_margin
        must be null. Example Deequ: .satisfies("CASE WHEN result IN (''runs'',''wickets'')
        THEN result_margin IS NOT NULL AND result_margin = FLOOR(result_margin) AND
        result_margin >= 1 ELSE result_margin IS NULL END", ''result_margin_consistency'')'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 42
        end_line: 45
        file: ''
      uid: 3c60b3d5-38ed-4684-9619-f01753203812
    - text: 'Winner must align with teams and match decidedness: For decided matches
        (result in {''runs'',''wickets''} or result=''tie'' and super_over=''Y''),
        ''winner'' must be non-null and equal to either ''team1'' or ''team2''. For
        non-decided matches (result=''no result'' or result=''tie'' with super_over!=''Y''),
        ''winner'' must be null. Example Deequ: .satisfies("CASE WHEN (result IN (''runs'',''wickets'')
        OR (result=''tie'' AND super_over=''Y'')) THEN (winner = team1 OR winner =
        team2) ELSE winner IS NULL END", ''winner_validity_vs_result'')'
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 66
        end_line: 71
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 54cf6b99-e1cf-4c97-9383-11c5ee750618
    - text: 'Toss/batting order coherence across columns: ''toss_winner'' must equal
        either ''team1'' or ''team2''; ''bat_first_team'' must equal ''toss_winner''
        when toss_decision=''bat'', otherwise it must equal the other team. Example
        Deequ: .satisfies("(toss_winner = team1 OR toss_winner = team2)", ''toss_winner_in_pair'').satisfies("CASE
        WHEN toss_decision=''bat'' THEN bat_first_team=toss_winner ELSE bat_first_team
        = CASE WHEN toss_winner=team1 THEN team2 ELSE team1 END END", ''bat_first_mapping'')'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: 5010f9f5-641d-4cea-94f9-1c22b7bbcff2
    - text: 'D/L method fields must be present when used: If method=''D/L'', then
        ''target_runs'' and ''target_overs'' must be non-null numeric. (Optionally,
        when method!=''D/L'' these fields should be null.) Example Deequ: .satisfies("CASE
        WHEN method=''D/L'' THEN target_runs IS NOT NULL AND target_overs IS NOT NULL
        ELSE TRUE END", ''dls_targets_present'')'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 46
        end_line: 49
        file: ''
      uid: 7bfef583-5b13-425d-8370-a0add854fa41
    - text: 'Range constraint specific to wicket victories: When result=''wickets'',
        ''result_margin'' must be an integer in the inclusive range [1, 10]. Example
        Deequ: .satisfies("CASE WHEN result=''wickets'' THEN result_margin = FLOOR(result_margin)
        AND result_margin BETWEEN 1 AND 10 ELSE TRUE END", ''wickets_margin_range'')'
      sources:
      - start_line: 39
        end_line: 41
        file: ''
      uid: 4b8bff93-a9c5-4685-b1b2-0cb8e5d22868
  '["result","super_over"]':
    code: []
    assumptions:
    - text: 'Only tied matches can have a super over: if ''super_over'' = ''Y'' then
        ''result'' must be ''tie''. Deequ compliance example: .addConstraint(Compliance(''super
        over only on ties'', "super_over <> ''Y'' OR result = ''tie''"))'
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 66dc2e60-961b-41eb-b213-b584b2d15e73
    - text: "All ties in this dataset are resolved via a super over and must have\
        \ a declared winner: if 'result' = 'tie' then 'super_over' = 'Y' AND 'winner'\
        \ \u2208 {'team1','team2'} and not null. Deequ compliance examples: (1) .addConstraint(Compliance('ties\
        \ use super over', \"result <> 'tie' OR super_over = 'Y'\")); (2) .addConstraint(Compliance('tie\
        \ has valid winner', \"result <> 'tie' OR winner IN (team1, team2)\"))"
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      uid: 55ede4f9-c433-4103-9c0a-775f96a2996b
    - text: "For matches decided by runs or wickets, a valid winner and a positive\
        \ integer result margin are required: if 'result' \u2208 {'runs','wickets'}\
        \ then 'winner' \u2208 {'team1','team2'} AND 'result_margin' is not null and\
        \ >= 1 and integer. Deequ compliance examples: (1) .addConstraint(Compliance('decided\
        \ match has valid winner', \"(result NOT IN ('runs','wickets')) OR (winner\
        \ IN (team1, team2))\")); (2) .addConstraint(Compliance('margin present and\
        \ positive', \"(result NOT IN ('runs','wickets')) OR (result_margin IS NOT\
        \ NULL AND result_margin >= 1 AND result_margin = CAST(result_margin AS INT))\"\
        ))"
      sources:
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 21
        end_line: 21
        file: ''
      uid: d4695aaa-343c-44f4-876b-1ecbd436be46
    - text: 'No-result matches should not have a winner and should not have a super
        over: if ''result'' = ''no result'' then ''winner'' is null and ''super_over''
        = ''N''. Deequ compliance example: .addConstraint(Compliance(''no-result has
        no winner and no super over'', "result <> ''no result'' OR (winner IS NULL
        AND super_over = ''N'')"))'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 3b77b5a5-9ed5-4181-ad91-5f40f0a45f85
    - text: "Non-tie outcomes should not have a super over: if 'result' \u2208 {'runs','wickets','no\
        \ result'} then 'super_over' = 'N'. Deequ compliance example: .addConstraint(Compliance('no\
        \ super over on non-ties', \"(result = 'tie' AND super_over = 'Y') OR (result\
        \ <> 'tie' AND super_over = 'N')\"))"
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 08a611bf-a7ea-474f-83e1-a140d7b095b2
    - text: 'When the D/L method is recorded, DLS targets must be present and positive:
        if ''method'' = ''D/L'' then ''target_runs'' and ''target_overs'' are not
        null, numeric, and > 0. Deequ compliance example: .addConstraint(Compliance(''DLS
        targets present'', "method <> ''D/L'' OR (target_runs IS NOT NULL AND target_runs
        > 0 AND target_overs IS NOT NULL AND target_overs > 0)"))'
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      - start_line: 22
        end_line: 23
        file: ''
      uid: a55e6fd9-3db2-4952-83fc-d80e78d310da
  '["result","super_over","team1","team2","winner"]':
    code: []
    assumptions:
    - text: 'Winner must be consistent with teams and result status: If result is
        in {''runs'',''wickets''} or (result == ''tie'' and super_over == ''Y''),
        then winner must equal either team1 or team2. If result == ''no result'' or
        (result == ''tie'' and super_over != ''Y''), then winner must be null (no
        winner). We could represent this as a Deequ constraint: .satisfies("CASE WHEN
        result IN (''runs'',''wickets'') OR (result = ''tie'' AND super_over = ''Y'')
        THEN winner IN (team1, team2) ELSE winner IS NULL END", "winner_consistent_with_result_and_teams")'
      sources:
      - start_line: 31
        end_line: 35
        file: ''
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 66
        end_line: 71
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 39d9fba0-59a5-41de-8f1e-db676570bb9d
    - text: 'For matches decided by runs or wickets, a numeric result_margin must
        be present: If result is in {''runs'',''wickets''}, result_margin must be
        non-null and integer-convertible. We could represent this as a Deequ constraint:
        .satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL AND CAST(result_margin AS DOUBLE) IS NOT NULL ELSE TRUE END",
        "margin_required_for_runs_or_wickets")'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 36
        end_line: 41
        file: ''
      uid: 7dac321d-14bc-4363-b62a-a9b1fecf8c62
    - text: 'Tie results are decided only via Super Over and must have a winner: If
        result == ''tie'', then super_over must be ''Y'' and winner must equal team1
        or team2 (non-null). We could represent this as a Deequ constraint: .satisfies("CASE
        WHEN result = ''tie'' THEN super_over = ''Y'' AND winner IN (team1, team2)
        ELSE TRUE END", "tie_requires_super_over_and_winner")'
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      uid: 2a70f444-0b52-43d1-ba94-72bb22fa31dc
    - text: 'Super Over should occur only for ties: If super_over == ''Y'', then result
        must be ''tie''. We could represent this as a Deequ constraint: .satisfies("CASE
        WHEN super_over = ''Y'' THEN result = ''tie'' ELSE TRUE END", "super_over_only_on_ties")'
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 51002b29-5c19-4440-aa92-02a0d966348c
    - text: 'team1 and team2 must refer to two distinct teams in a match. We could
        represent this as a Deequ constraint: .satisfies("team1 IS NOT NULL AND team2
        IS NOT NULL AND team1 <> team2", "teams_are_distinct")'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 56
        end_line: 64
        file: ''
      uid: 40bc9953-75c0-4129-9a82-de7975e65181
  '["team1","team2"]':
    code: []
    assumptions:
    - text: 'Within each match, the two team columns must be distinct and non-null:
        team1 != team2. This underpins opponent selection and the symmetric per-team
        expansion. Example Deequ: .satisfies("team1 IS NOT NULL AND team2 IS NOT NULL
        AND team1 <> team2", "Teams in a match must be two distinct values")'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 59
        end_line: 64
        file: ''
      uid: e29cd7dc-dfd2-4359-b2a4-df7dc6846233
    - text: 'The toss_winner must be one of the two teams in the match, and bat_first_team
        must follow: if toss_decision = ''bat'' then bat_first_team = toss_winner;
        otherwise bat_first_team must equal the other team (and thus differ from toss_winner).
        Example Deequ: .satisfies("(toss_winner = team1 OR toss_winner = team2) AND
        CASE WHEN toss_decision = ''bat'' THEN bat_first_team = toss_winner ELSE (bat_first_team
        <> toss_winner AND (bat_first_team = team1 OR bat_first_team = team2)) END",
        "Bat-first derivation consistent with toss")'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: 723c91d7-739d-45e5-9f6c-6d58aaf5bf5d
    - text: "For decided outcomes, the winner must be one of the two teams: if result\
        \ in ('runs','wickets') or (result = 'tie' and super_over = 'Y'), then winner\
        \ \u2208 {team1, team2} and is not null. Example Deequ: .satisfies(\"CASE\
        \ WHEN (result IN ('runs','wickets') OR (result = 'tie' AND super_over = 'Y'))\
        \ THEN (winner IS NOT NULL AND (winner = team1 OR winner = team2)) ELSE TRUE\
        \ END\", \"Winner must be one of the two teams for decided matches\")"
      sources:
      - start_line: 35
        end_line: 43
        file: ''
      - start_line: 66
        end_line: 69
        file: ''
      uid: a3ed2815-aab5-4741-837e-691f23435996
    - text: 'In any decided match, exactly one of the two teams is the winner: (winner
        = team1) XOR (winner = team2) when result in (''runs'',''wickets'') or (result
        = ''tie'' and super_over = ''Y''). Example Deequ: .satisfies("CASE WHEN (result
        IN (''runs'',''wickets'') OR (result = ''tie'' AND super_over = ''Y'')) THEN
        ((winner = team1) <> (winner = team2)) ELSE TRUE END", "Exactly one team wins
        a decided match")'
      sources:
      - start_line: 35
        end_line: 41
        file: ''
      - start_line: 66
        end_line: 69
        file: ''
      uid: 779b918d-ca75-46e7-81b3-182f419d36fc
    - text: 'For margin-based results, a numeric, positive result_margin is required:
        if result in (''runs'',''wickets''), then result_margin is not null, numeric,
        and >= 1. Example Deequ: .satisfies("CASE WHEN result IN (''runs'',''wickets'')
        THEN result_margin IS NOT NULL AND result_margin >= 1 ELSE TRUE END", "Margin
        must be present and positive for runs/wickets results")'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 36
        end_line: 41
        file: ''
      uid: 0e75c83b-8147-474b-b622-7c97ed6c32bd
  '["team1","team2","toss_decision","toss_winner"]':
    code: []
    assumptions:
    - text: 'Exactly two distinct team names must appear across the three fields ''team1'',
