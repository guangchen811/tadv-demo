  ? '["date","id","method","player_of_match","result","result_margin","season","super_over","target_overs","target_runs","team1","team2","toss_decision","toss_winner","winner"]'
  : code: []
    assumptions:
    - text: "For every match, toss_winner must be one of the two participating teams:\
        \ toss_winner \u2208 {team1, team2}. This can be validated with a multi-column\
        \ predicate like Deequ satisfies(\"toss_winner = team1 OR toss_winner = team2\"\
        , [\"toss_winner\",\"team1\",\"team2\"])."
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: adc078e8-27eb-4796-b606-29c7e5fda49d
    - text: "Bat-first logic must be consistent with toss_decision and toss_winner:\
        \ if toss_decision = 'bat' then bat_first_team = toss_winner; otherwise bat_first_team\
        \ is the other team (bat_first_team != toss_winner and bat_first_team \u2208\
        \ {team1, team2} \\ {toss_winner}). This can be enforced post-transformation\
        \ with Deequ satisfies on (toss_decision, toss_winner, team1, team2, bat_first_team)."
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: 1df384f1-dd5a-4b8e-acf6-6f9a40abc861
    - text: 'For decided matches by runs or wickets, winner must be present and equal
        to one of the two teams: (result IN (''runs'',''wickets'')) => (winner IS
        NOT NULL AND (winner = team1 OR winner = team2)).'
      sources:
      - start_line: 35
        end_line: 41
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 7f92b9d8-0453-48d8-81e1-4d7637dcc4ac
    - text: 'For results decided by runs or wickets, result_margin must be present
        and a positive integer: (result IN (''runs'',''wickets'')) => (result_margin
        IS NOT NULL AND result_margin > 0). This follows from casting to int in the
        message builder.'
      sources:
      - start_line: 36
        end_line: 41
        file: ''
      uid: 60bcdf1c-fbb2-4031-9867-48e4dd8fbcb6
    - text: 'If the match result is a tie resolved by a Super Over, winner must be
        present and one of the two teams: (result = ''tie'' AND super_over = ''Y'')
        => (winner IS NOT NULL AND (winner = team1 OR winner = team2)).'
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 9fe05326-6a39-4563-b584-66f1b97dca2f
    - text: 'If the match result is a tie without a Super Over, winner should be null:
        (result = ''tie'' AND super_over != ''Y'') => (winner IS NULL).'
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 6e1e4067-7102-4e99-a390-f58a1a9e7e1e
    - text: 'If the match result is ''no result'', winner should be null, result_margin
        should be null, and super_over should be ''N'': (result = ''no result'') =>
        (winner IS NULL AND result_margin IS NULL AND super_over = ''N'').'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 44be3968-8757-44ac-88c6-53cbeab24258
    - text: 'Super Over should only occur for ties: (super_over = ''Y'') => (result
        = ''tie'').'
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 0756be54-e679-49d5-88fb-c926ae6d33ab
    - text: 'For D/L method matches, both target_runs and target_overs must be present
        and positive: (method = ''D/L'') => (target_runs IS NOT NULL AND target_overs
        IS NOT NULL AND target_runs > 0 AND target_overs > 0).'
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      uid: 6b3648f2-82fc-49e7-b919-ef5f32255a41
    - text: 'target_runs and target_overs should be provided together (co-nullability):
        (target_runs IS NULL) <=> (target_overs IS NULL).'
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      uid: 55409bf1-bc9f-4d28-9ce9-d49ae6162551
    - text: 'team1 and team2 must be distinct (no team plays itself): team1 != team2.'
      sources:
      - start_line: 59
        end_line: 64
        file: ''
      uid: 6409200d-e9e8-4d07-a493-fab21433cb47
  '["date","season"]':
    code: []
    assumptions:
    - text: 'The calendar year extracted from ''date'' must equal the numeric ''season''
        value for every record. Example Deequ: addConstraint(Compliance(''date_season_alignment'',
        "year(to_timestamp(date, ''yyyy-MM-dd'')) = cast(season as int)"))'
