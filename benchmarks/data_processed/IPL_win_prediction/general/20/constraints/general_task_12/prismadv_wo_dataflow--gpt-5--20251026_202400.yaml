    assumptions:
    - text: 'For decided matches (result in {''runs'', ''wickets''} or result = ''tie''
        and super_over = ''Y''), the ''winner'' must be non-null and exactly equal
        to either ''team1'' or ''team2''. This prevents incorrect opponent resolution
        and ensures wins are credited correctly. This can be represented as: CASE
        WHEN result IN (''runs'',''wickets'') OR (result = ''tie'' AND super_over
        = ''Y'') THEN CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END
        ELSE 1 END must hold for all rows.'
