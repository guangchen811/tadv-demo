      uid: 2b01c182-ba9b-4a55-b781-3f1eb9cb5d25
    - text: 'For matches with result = ''tie'' and super_over != ''Y'', the ''winner''
        should be null (no winner should be recorded). Otherwise the code would credit
        a win even though the match is not decided. This can be represented as: CASE
        WHEN result = ''tie'' AND COALESCE(super_over, '''') <> ''Y'' THEN CASE WHEN
        winner IS NULL THEN 1 ELSE 0 END ELSE 1 END must hold for all rows.'
