fixing_results:
  target_overs:
    8bcf664f-ac5d-419a-9c1b-7edcacfac912: '.satisfies("CASE WHEN `method` = ''D/L''
      AND `target_overs` IS NOT NULL THEN CASE WHEN TRY_CAST(`target_overs` AS DOUBLE)
      IS NOT NULL AND TRY_CAST(`target_overs` AS DOUBLE) >= 0 AND (TRY_CAST(`target_overs`
      AS DOUBLE) % 1 = 0) THEN 1 ELSE 0 END ELSE 1 END", "Integer non-negative D/L
      target_overs", lambda x: x >= 0.99)'
  result_margin:
    9e5a6aab-2f17-46f4-9d5f-1fa35fb7edf4: '.satisfies("`result_margin` IS NULL OR
      cast(`result_margin` AS double) IS NOT NULL", "result_margin_numeric_when_present",
      lambda x: x == 1)'
  toss_decision:
    17f1c5cc-036b-4bf0-8c5e-3940e7b383d6: '.satisfies("lower(trim(`toss_decision`))
      = ''bat''", "toss_decision_has_bat", lambda x: x > 0)

      .satisfies("lower(trim(`toss_decision`)) = ''field''", "toss_decision_has_field",
      lambda x: x > 0)'
  super_over:
    1248296b-0572-417d-917a-d16aa1780807: '.hasNumberOfDistinctValues("super_over",
      lambda x: x <= 2, None, 100)'
  date:
    ca1721a0-2eb6-484f-b33b-11728c01eed6: '.satisfies("CASE WHEN to_timestamp(`date`)
      IS NOT NULL THEN 1 ELSE 0 END", "ValidDates", lambda x: x == 1)'
  method:
    58f29bfb-5ab0-4aa5-a490-6e78d0048061: '.satisfies("CASE WHEN `method` IS NOT NULL
      THEN CASE WHEN trim(cast(`method` AS STRING)) <> '''' AND upper(trim(cast(`method`
      AS STRING))) <> ''NAN'' THEN 1 ELSE 0 END ELSE 1 END", "MethodNonEmptyWhenPresent",
      lambda x: x == 1)'
    b450613b-f27a-4574-a884-99053f541187: '.satisfies("CASE WHEN trim(`method`) =
      ''D/L'' THEN (`target_runs` IS NOT NULL AND `target_overs` IS NOT NULL) ELSE
      true END", "DL_targets_present", lambda x: x == 1)'
    82aff13a-8eb0-4a2d-baaf-d753aba9d018: '.satisfies("CASE WHEN trim(CAST(`method`
      AS STRING)) = ''D/L'' THEN CASE WHEN cast(`target_runs` AS double) IS NOT NULL
      AND cast(`target_overs` AS double) IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END",
      "DL_targets_numeric", lambda x: x == 1)'
    b6a588b7-40c8-482b-83a5-0cbd53532c9e: '.satisfies("`method` IS NULL OR trim(`method`)
      IN (''D/L'')", "MethodInAllowedSet", lambda x: x == 1)'
