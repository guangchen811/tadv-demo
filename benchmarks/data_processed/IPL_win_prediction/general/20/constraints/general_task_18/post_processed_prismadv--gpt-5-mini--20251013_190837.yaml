      uid: f441c201-392d-40e4-ae4f-c7ab5abd09fc
    - text: 'The pairing of (''toss_winner'', ''toss_decision'') must be consistent
        with batting order logic: if toss_decision == ''bat'' then batting_first must
        equal toss_winner; if toss_decision == ''field'' then batting_first must equal
        the other team. In other words, for rows where toss_decision in {''bat'',''field''}
        and toss_winner matches a team, batting_first should be deterministically
        derived from (toss_winner, toss_decision). This can be asserted as a row predicate
        such as: satisfies("(toss_decision = ''bat'' AND batting_first = toss_winner)
        OR (toss_decision = ''field'' AND ((toss_winner = team1 AND batting_first
        = team2) OR (toss_winner = team2 AND batting_first = team1)))", "batting_first_consistent_with_toss").'
