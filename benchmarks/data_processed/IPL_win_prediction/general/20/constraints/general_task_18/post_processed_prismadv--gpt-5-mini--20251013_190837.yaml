      sources:
      - start_line: 23
        end_line: 33
        file: ''
      - start_line: 35
        end_line: 37
        file: ''
      uid: f0b5e4ee-a76b-4ef7-b77d-edaa92933bed
    - text: "The 'team1' values must match exactly (including case and whitespace)\
