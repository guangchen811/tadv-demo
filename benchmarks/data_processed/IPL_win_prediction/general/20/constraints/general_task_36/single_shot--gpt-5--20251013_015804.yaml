constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda v: v >= 0.98)'
      - Valid
    assumptions: []
  date:
    code:
    - - '.satisfies("date RLIKE ''^[0-9]{4}-[0-9]{2}-[0-9]{2}$''", "date_format_yyyy_mm_dd",
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier 2', 'Eliminator',
        'Final', 'Semi Final', 'Elimination Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - '.satisfies("(method IS NULL OR method = ''NullValue'' OR method = ''D/L'')",
        "method_values_valid", lambda v: v == 1.0)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (result_margin IS NOT
        NULL AND result_margin > 0)", "margin_present_positive_for_decided", lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - '.satisfies("(method <> ''D/L'') OR (target_overs IS NOT NULL AND target_overs
        > 0 AND target_overs <= 20)", "target_overs_required_when_dl", lambda v: v
        == 1.0)'
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - '.satisfies("team1 <> team2", "teams_are_distinct", lambda v: v == 1.0)'
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - '.satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_in_teams",
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.satisfies("(NOT(result = ''tie'' AND super_over = ''N'')) OR (winner IS
        NULL OR winner = ''NullValue'')", "tie_without_super_over_has_no_winner",
        lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("(NOT(result = ''tie'' AND super_over = ''Y'')) OR (winner = team1
        OR winner = team2)", "tie_super_over_requires_winner", lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("(result <> ''no result'') OR (winner IS NULL OR winner = ''NullValue'')",
        "no_result_has_no_winner", lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (winner = team1 OR
        winner = team2)", "winner_is_one_of_teams_for_decided", lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (winner IS NOT NULL
        AND winner <> ''NullValue'')", "winner_present_for_decided_matches", lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
