constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L', None])
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isContainedIn('winner', df['team1'].union(df['team2']))
      - Invalid
    assumptions: []
