constraints:
  match_type:
    code:
    - - .hasColumn('match_type')
      - Invalid
    - - '.hasNumberOfDistinctValues(''match_type'', lambda x: x > 0, value=''League'')'
      - Invalid
    - - .isComplete('match_type')
      - Valid
    - - .isDataType('match_type', 'String')
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    - - .isDataType('result', 'String')
      - Invalid
    assumptions: []
  result_margin:
    code:
    - - .isDataType('result_margin', 'Fractional')
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isDataType('season', 'Integral')
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - .isDataType('target_overs', 'Fractional')
      - Invalid
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isDataType('target_runs', 'Fractional')
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isDataType('team1', 'String')
      - Invalid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    - - .isDataType('team2', 'String')
      - Invalid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner')
      - Invalid
    - - .isDataType('winner', 'String')
      - Invalid
    assumptions: []
