results:
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("date >= ''2008-01-01'' AND date <= ''2025-12-31''",
        ''date_range'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .hasDataType('id', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .isContainedIn('method', ['D/L'])
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda v: v >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''player_of_match'', lambda
        v: v >= 0.995)'' failed on data sample: Value: 0.989100817438692 does not
        meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda v: v >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''result_margin'', lambda v:
        v >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: error
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        > 0 ELSE true END", ''margin_positive_when_applicable'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''season >= 2008 AND season <= 2024'', ''season_range'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("((result = ''tie'') AND (super_over = ''Y'')) OR ((result
        <> ''tie'') AND (super_over = ''N''))", ''tie_super_over_consistency'', lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda v: v >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''target_overs'', lambda v:
        v >= 0.99)'' failed on data sample: Value: 0.9836512261580381 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.hasMax(''target_overs'', lambda v: v <= 20.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasMax(''target_overs'', lambda v: v <= 20.0)''
        failed on data sample: Expected type of column target_overs to be one of (LongType,org.apache.spark.sql.types.DecimalType$@7c1ab9ad,IntegerType,DoubleType,ByteType,FloatType,ShortType),
        but found StringType instead!'
      level: error
    - suggestion: '.hasMin(''target_overs'', lambda v: v > 0.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasMin(''target_overs'', lambda v: v > 0.0)''
        failed on data sample: Expected type of column target_overs to be one of (LongType,org.apache.spark.sql.types.DecimalType$@7c1ab9ad,IntegerType,DoubleType,ByteType,FloatType,ShortType),
        but found StringType instead!'
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''target_runs'', lambda v: v <= 300.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team1 <> team2'', ''no_self_match'', lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(toss_winner = team1) OR (toss_winner = team2)'',
        ''toss_winner_is_participant'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda v: v >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda v: v >=
        0.995)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: error
    - suggestion: '.satisfies("(result IN (''no result'',''tie'')) OR (winner = team1
        OR winner = team2)", ''winner_is_participant'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
