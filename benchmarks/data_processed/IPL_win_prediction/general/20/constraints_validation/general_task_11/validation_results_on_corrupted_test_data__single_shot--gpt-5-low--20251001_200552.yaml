results:
  date:
    code:
    - suggestion: .hasPattern('date', r'^\\d{4}-\\d{2}-\\d{2}$')
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''date'', r''^\\d{4}-\\d{2}-\\d{2}$'')''
        failed on data sample: Value: 0.0 does not meet the constraint requirement!'
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("method IS NULL OR method = 'D/L'", 'method_null_or_dl')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("lower(result) IN ('runs','wickets','tie','no result')",
        'result_domain')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(lower(result) IN ('runs','wickets') AND result_margin
        IS NOT NULL AND result_margin > 0) OR (lower(result) NOT IN ('runs','wickets'))",
        'result_margin_required_when_resulted')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("upper(super_over) IN ('Y','N')", 'super_over_domain')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Constraint ''.hasDataType(''target_overs'', ConstrainableDataTypes.Fractional)''
        failed on data sample: Value: 0.9806094182825484 does not meet the constraint
        requirement!'
      level: error
    - suggestion: .isPositive('target_overs', where="lower(result) <> 'no result'")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isPositive(''target_overs'',
        where="lower(result) <> ''no result''")'': Check.isPositive() got an unexpected
        keyword argument ''where'''
      level: error
  target_runs:
    code:
    - suggestion: .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('target_runs', where="lower(result) <> 'no result'")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isNonNegative(''target_runs'',
        where="lower(result) <> ''no result''")'': Check.isNonNegative() got an unexpected
        keyword argument ''where'''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  tie_super_over:
    code:
    - suggestion: .satisfies("(lower(result) <> 'tie') OR (upper(super_over) = 'Y'
        AND winner IS NOT NULL)", 'tie_requires_super_over_and_winner')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("lower(toss_decision) IN ('bat','field')", 'toss_decision_domain')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("toss_winner = team1 OR toss_winner = team2", 'toss_winner_membership')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .isComplete('winner', where="lower(result) <> 'no result'")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isComplete(''winner'',
        where="lower(result) <> ''no result''")'': Check.isComplete() got an unexpected
        keyword argument ''where'''
      level: error
    - suggestion: .satisfies("(lower(result) <> 'no result') OR (winner IS NULL)",
        'no_result_has_no_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        'winner_membership')
      status: true
      reason_if_failed: ''
      level: error
