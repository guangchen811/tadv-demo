results:
  date:
    code:
    - suggestion: .hasPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("to_date(date, 'yyyy-MM-dd') IS NOT NULL", 'date_parseable')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isContainedIn('match_type', ['League', 'Eliminator', 'Qualifier
        1', 'Qualifier 2', 'Final', 'Elimination Final', 'Semi Final'])
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("CASE WHEN method IS NULL THEN TRUE ELSE method = 'D/L'
        END", 'method_if_present_is_dl')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasMax(''result_margin'', lambda v: v <= 10, where="result = ''wickets''")'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasMax(''result_margin'',
        lambda v: v <= 10, where="result = ''wickets''")'': Check.hasMax() got an
        unexpected keyword argument ''where'''
      level: error
    - suggestion: '.hasMin(''result_margin'', lambda v: v >= 1, where="result = ''runs''")'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasMin(''result_margin'',
        lambda v: v >= 1, where="result = ''runs''")'': Check.hasMin() got an unexpected
        keyword argument ''where'''
      level: error
    - suggestion: '.hasMin(''result_margin'', lambda v: v >= 1, where="result = ''wickets''")'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasMin(''result_margin'',
        lambda v: v >= 1, where="result = ''wickets''")'': Check.hasMin() got an unexpected
        keyword argument ''where'''
      level: error
    - suggestion: .isComplete('result_margin', where="result IN ('runs','wickets')")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isComplete(''result_margin'',
        where="result IN (''runs'',''wickets'')")'': Check.isComplete() got an unexpected
        keyword argument ''where'''
      level: error
  result_super_over:
    code:
    - suggestion: .satisfies("CASE WHEN result = 'tie' THEN super_over = 'Y' ELSE
        TRUE END", 'tie_requires_super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN super_over = 'Y' THEN result = 'tie' ELSE
        TRUE END", 'super_over_implies_tie')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: '.hasMax(''season'', lambda v: v <= 2100)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''season'', lambda v: v >= 2008)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda v: v >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''target_overs'', lambda v:
        v >= 0.995)'' failed on data sample: Value: 0.9836512261580381 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.hasMax(''target_overs'', lambda v: v <= 20)'
      status: false
      reason_if_failed: 'Constraint ''.hasMax(''target_overs'', lambda v: v <= 20)''
        failed on data sample: Expected type of column target_overs to be one of (LongType,org.apache.spark.sql.types.DecimalType$@7c1ab9ad,IntegerType,DoubleType,ByteType,FloatType,ShortType),
        but found StringType instead!'
      level: error
    - suggestion: '.hasMin(''target_overs'', lambda v: v > 0)'
      status: false
      reason_if_failed: 'Constraint ''.hasMin(''target_overs'', lambda v: v > 0)''
        failed on data sample: Expected type of column target_overs to be one of (LongType,org.apache.spark.sql.types.DecimalType$@7c1ab9ad,IntegerType,DoubleType,ByteType,FloatType,ShortType),
        but found StringType instead!'
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda v: v >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''target_runs'', lambda v:
        v >= 0.995)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.hasMin(''target_runs'', lambda v: v > 0)'
      status: true
      reason_if_failed: ''
      level: error
  teams:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('team1 <> team2', 'teams_must_be_distinct')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("toss_winner = team1 OR toss_winner = team2", 'toss_winner_is_one_of_the_teams')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("CASE WHEN result <> 'no result' THEN (winner = team1
        OR winner = team2) ELSE TRUE END", 'winner_must_be_one_of_the_teams')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN result <> 'no result' THEN winner IS NOT NULL
        ELSE TRUE END", 'winner_present_when_resulted')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN result = 'no result' THEN winner IS NULL ELSE
        TRUE END", 'no_result_has_no_winner')
      status: true
      reason_if_failed: ''
      level: error
