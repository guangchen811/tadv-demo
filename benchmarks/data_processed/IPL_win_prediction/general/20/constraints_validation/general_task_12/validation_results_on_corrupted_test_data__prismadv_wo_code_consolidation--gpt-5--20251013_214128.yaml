results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`team1` = trim(`team1`)", "team1 is trimmed (no leading/trailing
        whitespace)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`toss_decision` = ''bat'') OR (`toss_winner` = `team1`
        OR `toss_winner` = `team2`)", "Toss winner must be team1 or team2 when toss_decision
        != ''bat''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` NOT IN (''runs'',''wickets'')) OR (`winner`
        = `team1` OR `winner` = `team2`)", "Winner is one of the two teams for decided
        matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("((`team1` IS NULL) OR (`team2` IS NULL)) OR (lower(trim(`team1`))
        <> lower(trim(`team2`)))", "team1 and team2 must be different (case-insensitive)",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(team2) <> ''''", "team2 non-empty after trim",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team2 <> team1'', ''team1 and team2 are different'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(NOT ( (result IN (''runs'',''wickets'')) OR (result
        = ''tie'' AND super_over = ''Y'') )) OR (winner IN (team1, team2))", "Winner
        among teams for decided matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasApproxCountDistinct(''team2'', lambda x: x <= 25)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team2 = TRIM(team2)", "team2 trimmed", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  player_of_match:
    code:
    - suggestion: '.satisfies(''(`player_of_match` IS NULL) OR (`player_of_match`
        IS NOT NULL)'', ''player_of_match column exists'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''player_of_match'', lambda c: c >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`player_of_match` IS NULL OR `player_of_match` <> ''NullValue''",
        ''No raw NullValue strings in player_of_match'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`player_of_match` IS NULL OR `player_of_match` RLIKE
        ''[A-Za-z]''", ''Player of Match looks like a name'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN `target_overs` IS NULL THEN 1 WHEN CAST(`target_overs`
        AS DOUBLE) IS NOT NULL THEN 1 WHEN `target_overs` = ''NullValue'' THEN 1 ELSE
        0 END", "target_overs numeric-or-null (allow ''NullValue'')", lambda x: x
        == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `target_overs` IS NULL
        THEN 1 WHEN CAST(`target_overs` AS DOUBLE) IS NOT NULL THEN 1 WHEN `target_overs`
        = ''NullValue'' THEN 1 ELSE 0 END", "target_overs numeric-or-null (allow ''NullValue'')",
        lambda x: x == 1)'' failed on data sample: Value: 0.9809264305177112 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN CAST(`target_overs`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "D/L rows must have
        numeric target_overs", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (result_margin
        IS NOT NULL AND CAST(result_margin AS DOUBLE) IS NOT NULL) ELSE TRUE END",
        "result_margin present and numeric for decided matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (CAST(result_margin
        AS DOUBLE) >= 1 AND CAST(result_margin AS BIGINT) = CAST(result_margin AS
        DOUBLE)) ELSE TRUE END", "result_margin integer and positive for decided matches",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result_margin IS NULL) OR (CAST(result_margin AS DOUBLE)
        IS NOT NULL)", "result_margin values numeric when present", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL OR CAST(`target_runs`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "target_runs numeric-convertible",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN `target_runs` IS
        NOT NULL ELSE TRUE END", "D/L rows have target_runs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' AND `target_runs` IS NOT
        NULL THEN (`target_runs` >= 0 AND `target_runs` = CAST(`target_runs` AS INT))
        ELSE TRUE END", "D/L target_runs integer and non-negative", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`toss_decision` = lower(trim(`toss_decision`))'',
        ''normalized toss_decision'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' THEN CASE WHEN `super_over`
        IS NOT NULL AND TRIM(UPPER(`super_over`)) IN (''Y'',''N'') THEN 1 ELSE 0 END
        ELSE 1 END", "super_over required on ties", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN `result`
        = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "Y only valid for ties", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` = `team1` OR `toss_winner`
        = `team2` THEN 1 ELSE 0 END", "toss_winner in teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` IS NULL THEN 1 WHEN `toss_winner`
        = TRIM(`toss_winner`) THEN 1 ELSE 0 END", "toss_winner trimmed", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `toss_winner` = ''NullValue'' THEN 0 ELSE
        1 END", "no ''NullValue'' literals in toss_winner", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.hasCompleteness(''date'', lambda c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("((`date` IS NULL) OR (to_date(`date`, ''yyyy-MM-dd'')
        IS NOT NULL))", "Valid ''date'' format when present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''date'', lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`season` IS NOT NULL AND CAST(`season` AS STRING)
        <> \''NullValue\'''', ''Season has no literal NullValue'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN method IS NULL OR method = ''NullValue''
        THEN 1 ELSE 0 END", "Method null share >= 90%", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method IS NULL OR method = ''NullValue''
        OR method = ''D/L'' THEN 1 ELSE 0 END", "Method allowed values (NULL or ''D/L'')",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN (target_runs IS NOT
        NULL AND target_overs IS NOT NULL AND CAST(target_runs AS DOUBLE) IS NOT NULL
        AND CAST(target_overs AS DOUBLE) IS NOT NULL) ELSE TRUE END", "D/L rows have
        numeric targets", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("(NOT (result IN (''runs'',''wickets'',''tie'')) OR
        (winner IS NOT NULL AND (winner = team1 OR winner = team2)))", "Winner present
        and valid for decided or tied matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result = ''no result'' OR winner IS NOT NULL)", "Winner
        nulls only allowed when no result", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(winner IS NULL OR winner = team1 OR winner = team2)",
        "Winner must be one of the two teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN winner = ''NullValue'' THEN false ELSE true
        END", "No literal NullValue in winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''result'', lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL ELSE TRUE END", ''Margin present for decided results'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CAST(TRIM(CAST(result_margin
        AS STRING)) AS DOUBLE) IS NOT NULL AND CAST(TRIM(CAST(result_margin AS STRING))
        AS DOUBLE) = CAST(TRIM(CAST(result_margin AS STRING)) AS INT) ELSE TRUE END",
        ''Margin numeric and integer-castable for decided results'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' THEN winner IS NOT
        NULL AND (winner = team1 OR winner = team2) ELSE TRUE END", ''Winner present
        and valid when result is decided/tie'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("(toss_winner = team1) OR (toss_winner = team2)", "toss_winner_is_participant",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "teams_are_distinct", lambda v: v
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("toss_decision IN (''bat'',''field'')", "toss_decision_domain",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.haveCompleteness([''toss_winner'', ''toss_decision'', ''team1'',
        ''team2''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
