results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: '.hasCompleteness(''match_type'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier
        2', 'Eliminator', 'Final', 'Semi Final', 'Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''target_overs'', lambda x:
        x >= 0.99)'' failed on data sample: Value: 0.9836512261580381 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: .satisfies('NOT (`result` = "runs" AND (`target_overs` IS NULL OR
        `target_overs` = 0))', 'target_overs required and nonzero for runs')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''NOT (`result` = "runs" AND (`target_overs`
        IS NULL OR `target_overs` = 0))'', ''target_overs required and nonzero for
        runs'')'' failed on data sample: Value: 0.9918256130790191 does not meet the
        constraint requirement!'
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("(result != 'runs' AND result != 'wickets') OR result_margin
        IS NOT NULL", "result_margin required for runs/wickets")
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies(''(`winner` is not NULL) OR (`match_type` != "League")'',
        ''Winner should be present for League matches'', lambda x: x >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''(`winner` is not NULL) OR (`match_type`
        != "League")'', ''Winner should be present for League matches'', lambda x:
        x >= 0.995)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''(`winner` = `team1`) OR (`winner` = `team2`) OR (`winner`
        is NULL)'', ''Winner must be one of the participating teams (or NULL for non-league/non-result)'',
        lambda x: x >= 0.995)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: .satisfies('NOT (`result` = "runs" AND (`result_margin` IS NULL
        OR `target_overs` IS NULL OR `target_overs` = 0))', 'Result runs requires
        non-null result_margin and target_overs != 0')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''NOT (`result` = "runs" AND (`result_margin`
        IS NULL OR `target_overs` IS NULL OR `target_overs` = 0))'', ''Result runs
        requires non-null result_margin and target_overs != 0'')'' failed on data
        sample: Value: 0.9918256130790191 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies('NOT (`result` = "wickets" AND `result_margin` IS NULL)',
        'Result wickets requires non-null result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`result` IN ("runs", "wickets", "tie", "no result")',
        'Result must be in allowed set')
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","target_overs","team1","team2","winner"]':
    code:
    - suggestion: .satisfies('(`winner` = `team1` OR `winner` = `team2` OR `winner`
        IS NULL)', 'Winner must be team1, team2, or null')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('((`result` IN ("runs", "wickets")) AND `result_margin`
        IS NOT NULL AND `target_overs` IS NOT NULL) OR (`result` NOT IN ("runs", "wickets"))',
        'Result margin and target overs required for runs/wickets results')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''((`result` IN ("runs", "wickets"))
        AND `result_margin` IS NOT NULL AND `target_overs` IS NOT NULL) OR (`result`
        NOT IN ("runs", "wickets"))'', ''Result margin and target overs required for
        runs/wickets results'')'' failed on data sample: Value: 0.989100817438692
        does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies('`team1` <> `team2`', 'Team1 and Team2 must be different')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`result` <> "tie") OR (`winner` = `team1` OR `winner`
        = `team2`)', 'Winner must be team1 or team2 for tie results')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''team1'', ''team2'', ''result''], lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["target_overs","target_runs"]':
    code:
    - suggestion: .satisfies('NOT ((`result` = "runs") AND (`result_margin` IS NULL
        OR `target_overs` IS NULL OR `target_overs` = 0))', 'No division by zero or
        null in nrr_proxy_delta for runs results')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''NOT ((`result` = "runs") AND (`result_margin`
        IS NULL OR `target_overs` IS NULL OR `target_overs` = 0))'', ''No division
        by zero or null in nrr_proxy_delta for runs results'')'' failed on data sample:
        Value: 0.9918256130790191 does not meet the constraint requirement!'
      level: error
    - suggestion: '.haveCompleteness([''target_runs'', ''target_overs''], lambda x:
        x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''haveCompleteness([''target_runs'', ''target_overs''],
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.9836512261580381 does
        not meet the constraint requirement!'
      level: warning
  '["team1","team2","winner"]':
    code:
    - suggestion: .satisfies('team1 <> team2', 'No Self Matches')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'Winner Must Be One of the Teams')
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.haveCompleteness([''team1'', ''team2''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
