results:
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .hasPattern('date', '^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  dls_target_overs:
    code:
    - suggestion: .satisfies("(method != 'D/L') OR (target_overs IS NOT NULL AND target_overs
        > 0 AND target_overs <= 20)", 'D/L target_overs present and within T20 range')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(method != ''D/L'') OR (target_overs
        IS NOT NULL AND target_overs > 0 AND target_overs <= 20)", ''D/L target_overs
        present and within T20 range'')'' failed on data sample: Value: 0.9645776566757494
        does not meet the constraint requirement!'
      level: error
  dls_target_runs:
    code:
    - suggestion: .satisfies("(method != 'D/L') OR (target_runs IS NOT NULL AND target_runs
        > 0)", 'D/L target_runs present and positive')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(method != ''D/L'') OR (target_runs
        IS NOT NULL AND target_runs > 0)", ''D/L target_runs present and positive'')''
        failed on data sample: Value: 0.9945504087193461 does not meet the constraint
        requirement!'
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isContainedIn('match_type', ['League','Eliminator','Qualifier 1','Qualifier
        2','Final','Semi Final','Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
  method_allowed:
    code:
    - suggestion: .satisfies("method IS NULL OR method = 'D/L'", 'method null or D/L
        only')
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda v: v >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''player_of_match'', lambda
        v: v >= 0.99)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin_logic:
    code:
    - suggestion: .satisfies("((result IN ('runs','wickets')) AND result_margin >
        0) OR ((result IN ('tie','no result')) AND result_margin IS NULL)", 'result
        margin consistent with result')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  season_date_alignment:
    code:
    - suggestion: .satisfies('season = year(to_date(date))', 'season aligns with date
        year')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  super_over_tie_logic:
    code:
    - suggestion: .satisfies("(super_over != 'Y') OR (result = 'tie')", 'super over
        implies tie')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  teams_different:
    code:
    - suggestion: .satisfies('team1 != team2', 'opposing teams differ')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner_valid:
    code:
    - suggestion: .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss
        winner is a participating team')
      status: true
      reason_if_failed: ''
      level: error
  umpire1:
    code:
    - suggestion: .isComplete('umpire1')
      status: true
      reason_if_failed: ''
      level: error
  umpire2:
    code:
    - suggestion: .isComplete('umpire2')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner_among_teams:
    code:
    - suggestion: .satisfies('(winner IS NULL) OR (winner = team1) OR (winner = team2)',
        'winner must be among teams')
      status: true
      reason_if_failed: ''
      level: error
  winner_presence:
    code:
    - suggestion: .satisfies("(result = 'no result') OR (winner IS NOT NULL)", 'winner
        present when result is not NR')
      status: true
      reason_if_failed: ''
      level: error
