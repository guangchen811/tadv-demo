results:
  match_type:
    code:
    - suggestion: .isContainedIn('match_type', ['Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result != 'runs' OR result_margin IS NOT NULL", 'result_margin_present_for_runs')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isNonNegative('target_overs')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result NOT IN ('runs','wickets','tie') OR target_overs
        > 0", 'target_overs_positive_when_used')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("result NOT IN (''runs'',''wickets'',''tie'')
        OR target_overs > 0", ''target_overs_positive_when_used'')'' failed on data
        sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result = 'no result' OR target_runs IS NOT NULL", 'target_runs_present_when_needed')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .isComplete('winner', where="result IN ('runs','wickets')")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isComplete(''winner'',
        where="result IN (''runs'',''wickets'')")'': Check.isComplete() got an unexpected
        keyword argument ''where'''
      level: error
    - suggestion: .satisfies("result IN ('tie','no result') OR winner = team1 OR winner
        = team2", 'winner_is_valid')
      status: true
      reason_if_failed: ''
      level: error
