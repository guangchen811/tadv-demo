results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE
        WHEN `winner` IN (`team1`,`team2`) THEN 1 ELSE 0 END ELSE 1 END", "winner_matches_team_columns",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `result` IN (\''runs\'', \''wickets\'')
        THEN CASE WHEN `winner` = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END
        ELSE 1 END'', ''winner_is_team1_or_team2'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN TRIM(`team2`) = `team2` THEN 1 ELSE 0 END'',
        ''team2_no_leading_trailing_whitespace'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `match_type` IN (\''League\'', \''Final\'',
        \''Qualifier 1\'', \''Qualifier 2\'', \''Eliminator\'', \''Elimination Final\'',
        \''Semi Final\'') THEN 1 ELSE 0 END'', ''match_type in allowed set'', lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''target_overs'', lambda x:
        x >= 0.99)'' failed on data sample: Value: 0.9836512261580381 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `target_overs` IS NULL OR (`target_overs`
        >= 0 AND `target_overs` <= 50) THEN 1 ELSE 0 END", "Reasonable target_overs
        range", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `target_overs` IS NULL
        OR (`target_overs` >= 0 AND `target_overs` <= 50) THEN 1 ELSE 0 END", "Reasonable
        target_overs range", lambda x: x == 1)'' failed on data sample: Value: 0.9809264305177112
        does not meet the constraint requirement!'
      level: error
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' AND `result` IN
        (''runs'',''wickets'',''tie'') THEN CASE WHEN `target_runs` IS NOT NULL THEN
        1 ELSE 0 END ELSE 1 END", "target_runs_present_for_decisive_matches", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL THEN 1 WHEN `target_runs`
        >= 1 THEN 1 ELSE 0 END", "target_runs_positive", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL THEN 1 WHEN `target_runs`
        = FLOOR(`target_runs`) THEN 1 ELSE 0 END", "target_runs_integer", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL OR TRY_CAST(`target_runs`
        AS DOUBLE) IS NULL THEN 1 ELSE 0 END", "target_runs_missing_flag", lambda
        x: x <= 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `season` IS NOT NULL AND CAST(`season` AS
        STRING) rlike ''^[0-9]+$'' THEN 1 ELSE 0 END", "Season integer format", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN winner IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner present for
        decisive results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END", "Winner
        matches one of the teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN TRIM(LOWER(winner)) = TRIM(LOWER(team1)) OR TRIM(LOWER(winner)) = TRIM(LOWER(team2))
        THEN 1 ELSE 0 END ELSE 1 END", "Winner normalized matches team columns (trim/lower)",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "Valid result categories", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN CASE WHEN `result_margin`
        IS NOT NULL AND CAST(`result_margin` AS DOUBLE) = CAST(`result_margin` AS
        DOUBLE) AND CAST(`result_margin` AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE 1 END",
        "Valid result_margin for ''runs''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        THEN CASE WHEN `target_runs` IS NOT NULL AND CAST(`target_runs` AS DOUBLE)
        >= 1 THEN 1 ELSE 0 END ELSE 1 END", "Valid target_runs for completed matches",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE
        WHEN `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN
        1 ELSE 0 END ELSE 1 END", "Winner is valid for finished matches", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["match_type","result","result_margin","season","target_overs","target_runs","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (winner IS
        NOT NULL AND (winner = team1 OR winner = team2))", "winner_matches_participants",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result != ''runs'') OR (target_runs IS NOT NULL AND
        result_margin IS NOT NULL AND result_margin >= 0 AND result_margin <= (target_runs
        - 1))", "runs_margin_valid", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result != ''wickets'') OR (target_runs IS NOT NULL)",
        "wickets_target_runs_present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result != ''tie'') OR (target_runs IS NOT NULL AND
        target_overs IS NOT NULL)", "tie_requires_target_and_overs", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 !=
        team2", "teams_distinct", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("season IS NOT NULL AND season RLIKE ''^[0-9]+$''",
        "season_int_castable", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("team1 != team2", "No Self Matches", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result NOT IN (''runs'',''wickets'') OR (winner = team1
        OR winner = team2)", "Winner must be one of the competing teams for runs/wickets
        results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
