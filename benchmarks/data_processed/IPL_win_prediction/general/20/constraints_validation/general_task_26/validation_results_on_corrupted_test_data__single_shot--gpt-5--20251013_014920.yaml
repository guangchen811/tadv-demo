results:
  date:
    code:
    - suggestion: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League','Qualifier 1','Qualifier
        2','Eliminator','Final','Semi Final','Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("(method <> 'D/L') OR (target_overs < 20)", 'D/L implies
        reduced overs')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(method <> ''D/L'') OR (target_overs
        < 20)", ''D/L implies reduced overs'')'' failed on data sample: Value: 0.02452316076294278
        does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies("method IS NULL OR method = 'D/L'", 'method null or D/L')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("NOT (result IN ('runs','wickets')) OR (result_margin
        >= 0)", 'non-negative margin for decided matches')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Constraint ''.hasDataType(''target_overs'', ConstrainableDataTypes.Fractional)''
        failed on data sample: Value: 0.9806094182825484 does not meet the constraint
        requirement!'
      level: error
    - suggestion: .satisfies("NOT (result IN ('runs','wickets','tie')) OR (target_overs
        <= 20)", 'max 20 overs')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("NOT (result IN (''runs'',''wickets'',''tie''))
        OR (target_overs <= 20)", ''max 20 overs'')'' failed on data sample: Value:
        0.9700272479564033 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies("NOT (result IN ('runs','wickets','tie')) OR (target_overs
        > 0)", 'positive overs for training rows')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("NOT (result IN (''runs'',''wickets'',''tie''))
        OR (target_overs > 0)", ''positive overs for training rows'')'' failed on
        data sample: Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
  target_runs:
    code:
    - suggestion: .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("NOT (result IN ('runs','wickets','tie')) OR (target_runs
        > 0)", 'positive target runs for training rows')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("team1 <> team2", 'teams are distinct')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat','field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(toss_winner = team1) OR (toss_winner = team2)", 'toss
        winner must be one of the teams')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("NOT (result IN ('runs','wickets')) OR ((winner = team1)
        OR (winner = team2))", 'winner must be one of the teams for decided matches')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("NOT (result IN ('runs','wickets')) OR (winner IS NOT
        NULL)", 'winner present for decided matches')
      status: true
      reason_if_failed: ''
      level: error
