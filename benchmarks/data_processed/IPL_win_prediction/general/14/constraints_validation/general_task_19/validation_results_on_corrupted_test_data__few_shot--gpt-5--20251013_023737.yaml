results:
  date:
    code:
    - suggestion: .hasPattern('date', '^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier
        2', 'Eliminator', 'Final', 'Elimination Final', 'Semi Final'])
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("(method <> 'D/L') OR (target_runs IS NOT NULL AND target_runs
        > 0 AND target_overs IS NOT NULL AND target_overs > 0 AND target_overs <=
        20)", 'dls_targets_present_positive_and_within_20_overs')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(method <> ''D/L'') OR (target_runs
        IS NOT NULL AND target_runs > 0 AND target_overs IS NOT NULL AND target_overs
        > 0 AND target_overs <= 20)", ''dls_targets_present_positive_and_within_20_overs'')''
        failed on data sample: Value: 0.9455040871934605 does not meet the constraint
        requirement!'
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("(result IN ('runs','wickets') AND result_margin IS NOT
        NULL AND result_margin > 0) OR (result IN ('tie','no result') AND result_margin
        IS NULL)", 'result_margin_consistent_with_result')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("substring(date, 1, 4) = cast(season as string)", 'season_matches_date_year')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(super_over <> 'Y') OR (result = 'tie')", 'super_over_only_when_tie')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isNonNegative('target_overs')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('team1 <> team2', 'opposing_teams_different')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(toss_winner = team1 OR toss_winner = team2)', 'toss_winner_is_playing_team')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("(result = 'no result' AND winner IS NULL) OR (winner
        = team1 OR winner = team2)", 'winner_is_playing_team')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result = 'no result') OR (winner IS NOT NULL)", 'winner_present_when_result_exists')
      status: true
      reason_if_failed: ''
      level: error
