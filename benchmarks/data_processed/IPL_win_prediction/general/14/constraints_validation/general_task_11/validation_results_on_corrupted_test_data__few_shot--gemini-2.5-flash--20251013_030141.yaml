results:
  city:
    code:
    - suggestion: .isStringType('city')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isStringType(''city'')'':
        ''Check'' object has no attribute ''isStringType'''
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isIntegral('id')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isIntegral(''id'')'':
        ''Check'' object has no attribute ''isIntegral'''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .isStringType('method')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isStringType(''method'')'':
        ''Check'' object has no attribute ''isStringType'''
      level: error
    - suggestion: .satisfies("CASE WHEN method IS NOT NULL THEN method = 'D/L' ELSE
        TRUE END", "method is 'D/L' or null")
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: .isStringType('player_of_match')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isStringType(''player_of_match'')'':
        ''Check'' object has no attribute ''isStringType'''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isFractional('result_margin')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isFractional(''result_margin'')'':
        ''Check'' object has no attribute ''isFractional'''
      level: error
    - suggestion: .satisfies("CASE WHEN result IN ('runs', 'wickets') THEN FLOOR(result_margin)
        = result_margin ELSE TRUE END", "result_margin is an integer for decisive
        results")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN result IN ('runs', 'wickets') THEN result_margin
        >= 0 ELSE TRUE END", "result_margin is non-negative for decisive results")
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isIntegral('season')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isIntegral(''season'')'':
        ''Check'' object has no attribute ''isIntegral'''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isFractional('target_overs')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isFractional(''target_overs'')'':
        ''Check'' object has no attribute ''isFractional'''
      level: error
    - suggestion: .satisfies("CASE WHEN target_runs IS NOT NULL THEN target_overs
        > 0 ELSE TRUE END", "target_overs is positive when target_runs is present
        for rate calculation")
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .isFractional('target_runs')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isFractional(''target_runs'')'':
        ''Check'' object has no attribute ''isFractional'''
      level: error
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isStringType('team1')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isStringType(''team1'')'':
        ''Check'' object has no attribute ''isStringType'''
      level: error
    - suggestion: .satisfies("team1 <> team2", "team1 and team2 are distinct")
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isStringType('team2')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isStringType(''team2'')'':
        ''Check'' object has no attribute ''isStringType'''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isStringType('toss_winner')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isStringType(''toss_winner'')'':
        ''Check'' object has no attribute ''isStringType'''
      level: error
    - suggestion: .satisfies("toss_winner = team1 OR toss_winner = team2", "toss winner
        is one of the teams")
      status: true
      reason_if_failed: ''
      level: error
  umpire1:
    code:
    - suggestion: .isComplete('umpire1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isStringType('umpire1')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isStringType(''umpire1'')'':
        ''Check'' object has no attribute ''isStringType'''
      level: error
  umpire2:
    code:
    - suggestion: .isComplete('umpire2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isStringType('umpire2')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isStringType(''umpire2'')'':
        ''Check'' object has no attribute ''isStringType'''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isStringType('venue')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isStringType(''venue'')'':
        ''Check'' object has no attribute ''isStringType'''
      level: error
  winner:
    code:
    - suggestion: .isStringType('winner')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isStringType(''winner'')'':
        ''Check'' object has no attribute ''isStringType'''
      level: error
    - suggestion: .satisfies("CASE WHEN result IN ('runs', 'wickets', 'tie') THEN
        winner IS NOT NULL ELSE TRUE END", "winner is present for decisive results")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN winner IS NOT NULL THEN winner = team1 OR
        winner = team2 ELSE TRUE END", "winner is one of the teams")
      status: true
      reason_if_failed: ''
      level: error
