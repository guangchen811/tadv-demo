results:
  date:
    code:
    - suggestion: '.hasPattern(''date'', r''^\d{4}-\d{2}-\d{2}$'', lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isContainedIn('match_type', ['Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.satisfies("method IS NULL OR method = ''D/L''", ''method_dl_or_null'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("(NOT (result IN (''runs'',''wickets''))) OR (result_margin
        IS NOT NULL AND result_margin > 0)", ''result_margin_positive_when_used'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: '.satisfies(''season >= 2008 AND season <= 2019'', ''season_in_expected_range'',
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''season >= 2008 AND season <= 2019'',
        ''season_in_expected_range'', lambda v: v == 1.0)'' failed on data sample:
        Value: 0.6948228882833788 does not meet the constraint requirement!'
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("(method <> ''D/L'') OR (target_overs IS NOT NULL AND
        target_overs > 0 AND target_overs <= 20)", ''target_overs_required_when_dl'',
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(method <> ''D/L'') OR (target_overs
        IS NOT NULL AND target_overs > 0 AND target_overs <= 20)", ''target_overs_required_when_dl'',
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9455040871934605 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''target_overs <= 20'', ''target_overs_le_20'', lambda
        v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''target_overs <= 20'', ''target_overs_le_20'',
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9455040871934605 does
        not meet the constraint requirement!'
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(toss_winner = team1) OR (toss_winner = team2)", ''toss_winner_is_in_teams'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("(NOT (result IN (''runs'',''wickets'') OR (result =
        ''tie'' AND super_over = ''Y''))) OR (winner IS NOT NULL AND (winner = team1
        OR winner = team2))", ''winner_present_and_valid_when_decided'', lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result <> ''no result'') OR (winner IS NULL)", ''winner_null_for_no_result'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (result = ''tie'' AND super_over = ''N'') OR (winner
        IS NULL)", ''winner_null_for_plain_tie'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
