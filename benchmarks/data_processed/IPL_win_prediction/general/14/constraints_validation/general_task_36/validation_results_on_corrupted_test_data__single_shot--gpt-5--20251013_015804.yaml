results:
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("date RLIKE ''^[0-9]{4}-[0-9]{2}-[0-9]{2}$''", "date_format_yyyy_mm_dd",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier
        2', 'Eliminator', 'Final', 'Semi Final', 'Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.satisfies("(method IS NULL OR method = ''NullValue'' OR method
        = ''D/L'')", "method_values_valid", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (result_margin
        IS NOT NULL AND result_margin > 0)", "margin_present_positive_for_decided",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("(method <> ''D/L'') OR (target_overs IS NOT NULL AND
        target_overs > 0 AND target_overs <= 20)", "target_overs_required_when_dl",
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(method <> ''D/L'') OR (target_overs
        IS NOT NULL AND target_overs > 0 AND target_overs <= 20)", "target_overs_required_when_dl",
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9455040871934605 does
        not meet the constraint requirement!'
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "teams_are_distinct", lambda v: v
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_in_teams",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  umpire1:
    code:
    - suggestion: .isComplete('umpire1')
      status: true
      reason_if_failed: ''
      level: error
  umpire2:
    code:
    - suggestion: .isComplete('umpire2')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("(NOT(result = ''tie'' AND super_over = ''N'')) OR (winner
        IS NULL OR winner = ''NullValue'')", "tie_without_super_over_has_no_winner",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(NOT(result = ''tie'' AND super_over = ''Y'')) OR (winner
        = team1 OR winner = team2)", "tie_super_over_requires_winner", lambda v: v
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result <> ''no result'') OR (winner IS NULL OR winner
        = ''NullValue'')", "no_result_has_no_winner", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (winner =
        team1 OR winner = team2)", "winner_is_one_of_teams_for_decided", lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result NOT IN (''runs'',''wickets'')) OR (winner IS
        NOT NULL AND winner <> ''NullValue'')", "winner_present_for_decided_matches",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
