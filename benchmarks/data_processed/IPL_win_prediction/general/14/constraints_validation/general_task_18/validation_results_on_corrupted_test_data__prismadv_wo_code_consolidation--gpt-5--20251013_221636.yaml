results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("length(trim(team1)) > 0", "team1 non-empty", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 = trim(team1)", "team1 trimmed", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "Distinct opponents per match", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(toss_winner = team1) OR (toss_winner = team2)", "Toss
        winner among listed teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result = ''no result'') OR (winner = team1 OR winner
        = team2)", "Winner among listed teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''team1'', lambda v: v <= 30)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: '.hasCompleteness(''team2'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(team2) <> '''' AND lower(TRIM(team2)) NOT IN (''nan'',''null'',''none'',''n/a'')",
        "team2 non-empty/non-placeholder", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("toss_winner IS NOT NULL AND (toss_winner = team1 OR
        toss_winner = team2)", "toss_winner is one of the two teams", lambda v: v
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "distinct teams per match", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result = ''no result'') OR (winner IS NOT NULL AND
        (winner = team1 OR winner = team2))", "winner is one of the two teams when
        decided", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN target_overs IS NOT
        NULL ELSE TRUE END", "D/L target_overs present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN CAST(target_overs AS
        DOUBLE) IS NOT NULL ELSE TRUE END", "D/L target_overs numeric", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN (CAST(target_overs
        AS DOUBLE) IS NOT NULL AND CAST(CAST(target_overs AS DOUBLE) AS BIGINT) =
        CAST(target_overs AS DOUBLE)) ELSE TRUE END", "D/L target_overs integral",
        lambda x: x >= 0.995)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL ELSE TRUE END", "Margin present for runs/wickets", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result NOT IN (''runs'',''wickets'') THEN
        result_margin IS NULL ELSE TRUE END", "No margin when not runs/wickets", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result_margin IS NULL THEN TRUE ELSE CAST(result_margin
        AS DOUBLE) IS NOT NULL END", "Margin values numeric when present", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result_margin IS NULL THEN TRUE ELSE CAST(result_margin
        AS DOUBLE) = CAST(CAST(result_margin AS DOUBLE) AS INT) END", "Margin is integer-like
        when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CAST(result_margin
        AS DOUBLE) > 0 ELSE TRUE END", "Positive margin for decided matches", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN CASE WHEN target_runs
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "target_runs present for D/L",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN CASE WHEN CAST(target_runs
        AS DOUBLE) IS NOT NULL AND NOT isnan(CAST(target_runs AS DOUBLE)) THEN 1 ELSE
        0 END ELSE 1 END", "target_runs numeric for D/L", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN CASE WHEN CAST(target_runs
        AS DOUBLE) >= 1 THEN 1 ELSE 0 END ELSE 1 END", "target_runs positive for D/L",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`toss_decision` = lower(trim(`toss_decision`))'',
        ''toss_decision lowercase and trimmed'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`super_over` = TRIM(`super_over`) AND `super_over`
        IN (''Y'',''N'')", "super_over Y/N uppercase no spaces", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`result` <> ''tie'') OR (`super_over` = ''Y'')", "tie_requires_super_over",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`super_over` <> ''Y'') OR (`result` = ''tie'')", "super_over_only_for_ties",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN toss_winner = team1 OR toss_winner = team2
        THEN 1 ELSE 0 END'', ''toss_winner_matches_a_team'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("toss_winner IS NOT NULL AND LENGTH(TRIM(toss_winner))
        > 0 AND UPPER(TRIM(toss_winner)) NOT IN (''NA'',''N/A'',''NONE'',''NAN'')",
        ''toss_winner_not_placeholder'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''length(trim(date)) > 0'', ''No blank date strings'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .hasPattern('date', '^[0-9]{4}-[0-9]{2}-[0-9]{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("to_date(date, ''yyyy-MM-dd'') IS NOT NULL", ''Dates
        parse to yyyy-MM-dd'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`season` AS STRING) RLIKE ''^[0-9]+$''", "season_is_integer_like",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasNumberOfDistinctValues(''season'', lambda x: x >= 1 and x <=
        100, None, None)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("TRIM(CAST(`season` AS STRING)) <> '''' AND LOWER(CAST(`season`
        AS STRING)) NOT IN (''nan'',''<na>'')", "season_no_placeholder_tokens", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  city:
    code:
    - suggestion: '.satisfies("city IS NULL OR city IS NOT NULL", "City column exists",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("city", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN city IS NULL THEN true ELSE LENGTH(TRIM(city))
        > 0 END", "Non-blank city when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct("city", lambda x: x >= 1 and x <= 100)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN city IS NULL THEN true ELSE UPPER(TRIM(city))
        NOT IN (''NA'',''N/A'',''UNKNOWN'',''NULL'',''NAN'') END", "No placeholder
        city values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL THEN 1 WHEN TRIM(`method`)
        = '''' OR UPPER(TRIM(`method`)) = ''NAN'' THEN 0 ELSE 1 END", "valid_method_token",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL THEN 1 WHEN UPPER(TRIM(`method`))
        = ''D/L'' THEN CASE WHEN TRIM(`method`) = ''D/L'' THEN 1 ELSE 0 END ELSE 1
        END", "canonical_dl_token", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(`method`) = ''D/L'' THEN (`target_runs`
        IS NOT NULL AND `target_overs` IS NOT NULL) ELSE TRUE END", "dl_requires_targets",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(`method`) = ''D/L'' AND `target_runs`
        IS NOT NULL THEN CAST(`target_runs` AS DOUBLE) IS NOT NULL ELSE TRUE END",
        "dl_target_runs_numeric", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(`method`) = ''D/L'' AND `target_overs`
        IS NOT NULL THEN CAST(`target_overs` AS DOUBLE) IS NOT NULL ELSE TRUE END",
        "dl_target_overs_numeric", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL THEN 1 WHEN `method` = TRIM(`method`)
        THEN 1 ELSE 0 END", "method_no_outer_whitespace", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`id` AS BIGINT) IS NOT NULL'', ''id integer-castable'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: warning
  '["date","season"]':
    code:
    - suggestion: '.satisfies("date IS NOT NULL AND to_timestamp(date) IS NOT NULL
        AND year(to_timestamp(date)) = season", "date_season_alignment", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''season'', ''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(toss_winner = team1 OR toss_winner = team2) AND lower(toss_decision)
        IN (''bat'',''field'')", "toss_fields_valid", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN winner IS NULL
        ELSE TRUE END", "no_result_has_no_winner", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''tie'' THEN (winner = team1 OR
        winner = team2) ELSE TRUE END", "tie_has_valid_winner", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN upper(method) = ''D/L'' THEN (CAST(target_runs
        AS DOUBLE) IS NOT NULL AND CAST(target_overs AS DOUBLE) IS NOT NULL) ELSE
        TRUE END", "dl_requires_targets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "teams_must_differ", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("LENGTH(TRIM(`venue`)) > 0 AND LOWER(TRIM(`venue`))
        NOT IN (''na'',''n/a'',''none'',''null'',''nan'')", "Venue not blank or placeholder",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`venue` = TRIM(`venue`)", "Venue values are trimmed",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`venue` NOT RLIKE ''[\\r\\n\\t]''", "Venue has no control
        characters", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' THEN CASE WHEN winner
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner present when result is
        decided", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' THEN CASE WHEN winner
        = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END", "Winner must be one
        of the two teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NULL THEN 1 ELSE CASE WHEN winner
        = TRIM(winner) THEN 1 ELSE 0 END END", "Winner has no leading/trailing whitespace",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN winner IS NULL THEN CASE WHEN result = ''no
        result'' THEN 1 ELSE 0 END ELSE 1 END", "Null winner only allowed for no result",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("TRIM(`result`) IN (''runs'', ''wickets'', ''tie'',
        ''no result'')", "Result domain", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(`result`) IN (''runs'',''wickets'')
        THEN CAST(`result_margin` AS DOUBLE) IS NOT NULL ELSE TRUE END", "Margin present
        and numeric for decided matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRIM(`result`) IN (''runs'',''wickets'',''tie'')
        THEN `winner` IS NOT NULL ELSE TRUE END", "Winner present when result decided",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(`result`) = ''no result'' THEN `winner`
        IS NULL ELSE TRUE END", "No winner when no result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["method","target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("(method IS NULL OR method <> ''D/L'') OR (target_runs
        IS NOT NULL AND target_overs IS NOT NULL)", "dl_targets_present", lambda v:
        v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("(toss_winner = team1 OR toss_winner = team2)", "toss_winner_in_teams")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("toss_decision IN ('bat','field')", "toss_decision_allowed")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("(result NOT IN ('runs','wickets','tie')) OR (winner
        = team1 OR winner = team2)", "winner_in_teams_when_decided")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("(result NOT IN ('runs','wickets')) OR (cast(result_margin
        as double) > 0)", "margin_positive_for_decisions")
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "Toss
        winner must be one of the two teams", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("((result <> ''no result'' AND winner IS NOT NULL AND
        (winner = team1 OR winner = team2)) OR (result = ''no result'' AND winner
        IS NULL))", "Winner presence and membership depend on result", lambda v: v
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "team1 and team2 must be different",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL AND CAST(result_margin AS DOUBLE) > 0 ELSE TRUE END", "Positive
        numeric result_margin required when result is runs/wickets", lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("(toss_winner = team1 OR toss_winner = team2) AND (toss_decision
        IN (''bat'',''field''))", "valid_toss_pair", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "two_distinct_teams_per_match", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
