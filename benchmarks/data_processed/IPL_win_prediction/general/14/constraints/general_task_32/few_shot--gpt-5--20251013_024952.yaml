constraints:
  date:
    code:
    - - .hasPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    - - '.satisfies("result != ''tie'' OR super_over = ''Y''", ''tie_requires_super_over'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasDataType('result_margin', ConstrainableDataTypes.Numeric)
      - Valid
    - - .isNonNegative('result_margin')
      - Valid
    - - '.satisfies("result != ''runs'' OR result_margin >= 1", ''run_margin_positive_if_runs'',
        lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("result != ''wickets'' OR (result_margin >= 1 AND result_margin
        <= 10)", ''wicket_margin_between_1_and_10'', lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("result IN (''runs'',''wickets'') OR result_margin IS NULL", ''margin_null_if_not_decided'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  winner:
    code:
    - - '.satisfies("result NOT IN (''runs'',''wickets'') OR (winner = team1 OR winner
        = team2)", ''winner_matches_one_team_if_decided'', lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("result NOT IN (''runs'',''wickets'') OR winner IS NOT NULL",
        ''winner_present_if_decided'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
