    assumptions:
    - text: 'For League matches with a decisive outcome (match_type = ''League'' and
        result != ''no result''), winner must be present and must equal either team1
        or team2. Example Deequ: .addConstraint(satisfies("CASE WHEN match_type =
        ''League'' AND result <> ''no result'' THEN winner IS NOT NULL AND (winner
        = team1 OR winner = team2) ELSE TRUE END", ''winner_present_and_in_fixture_for_league_non_nr''))'
      sources:
      - start_line: 26
        end_line: 28
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      uid: 7f0f1922-c03b-484f-ac0a-ddf71cb08bd3
    - text: 'If result is ''runs'' or ''wickets'', then winner must be present and
        be one of team1 or team2, and result_margin must be present and strictly positive.
        Example Deequ: .addConstraint(satisfies("CASE WHEN result IN (''runs'',''wickets'')
        THEN winner IS NOT NULL AND (winner = team1 OR winner = team2) AND result_margin
        IS NOT NULL AND CAST(result_margin AS DOUBLE) > 0 ELSE TRUE END", ''decisive_result_requires_winner_and_positive_margin''))'
      sources:
      - start_line: 48
        end_line: 51
        file: ''
      uid: 6074f852-2f46-4279-867f-f71d604e7c87
    - text: 'If result is ''no result'', winner should be null and result_margin should
        be null; both teams get shared points downstream. Example Deequ: .addConstraint(satisfies("CASE
        WHEN result = ''no result'' THEN winner IS NULL AND result_margin IS NULL
        ELSE TRUE END", ''no_result_implies_no_winner_no_margin''))'
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      - start_line: 92
        end_line: 106
        file: ''
      uid: 6d03713f-8320-4464-8581-b50e338b44e7
    - text: 'If super_over = ''Y'', the row must represent a tied match (result =
        ''tie'') and a winner must be present and be one of the two teams. Example
        Deequ: .addConstraint(satisfies("CASE WHEN super_over = ''Y'' THEN result
        = ''tie'' AND winner IS NOT NULL AND (winner = team1 OR winner = team2) ELSE
        TRUE END", ''super_over_implies_tie_with_fixture_winner''))'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 52
        end_line: 55
        file: ''
      uid: 462354ff-bbf4-4f0e-9303-692f48badfa1
    - text: 'Across all rows, if winner is present it must equal either team1 or team2
        (winner cannot be an external value). Example Deequ: .addConstraint(satisfies("winner
        IS NULL OR winner = team1 OR winner = team2", ''winner_belongs_to_fixture_teams''))'
      sources:
      - start_line: 49
        end_line: 49
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: 8ded196c-2e1a-41ca-b345-76bb44b86571
    - text: 'For rows using the D/L method (method = ''D/L''), target_runs and target_overs
        must be present, and target_overs must be greater than 0 to allow rate calculation.
        Example Deequ: .addConstraint(satisfies("CASE WHEN method = ''D/L'' THEN target_runs
        IS NOT NULL AND target_overs IS NOT NULL AND CAST(target_overs AS DOUBLE)
        > 0 ELSE TRUE END", ''dl_requires_valid_target''))'
      sources:
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 44
        end_line: 47
        file: ''
      uid: 2046b6e0-8881-415d-8cd0-9719d806dfe1
    - text: 'When date is present, the season should equal the calendar year extracted
        from date. Example Deequ: .addConstraint(satisfies("CASE WHEN date IS NOT
        NULL THEN season = YEAR(date) ELSE TRUE END", ''season_matches_date_year''))'
