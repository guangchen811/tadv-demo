    - text: 'For matches decided by ''runs'' or ''wickets'': winner must be present
        and must be either team1 or team2; result_margin must be present and a positive
        integer; super_over must be ''N''. Deequ example: .addConstraint(Compliance("win_loss_has_margin_winner",
