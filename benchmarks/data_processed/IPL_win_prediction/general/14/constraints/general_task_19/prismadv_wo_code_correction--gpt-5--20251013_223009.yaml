        end_line: 55
        file: ''
      uid: ba5456a3-320a-4c19-8339-5d4419eec315
    - text: 'In League matches with result = ''tie'', a winner must be recorded (via
        Super Over or adjudication) and must equal team1 or team2. (Deequ-style: where("match_type
