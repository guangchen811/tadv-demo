        end_line: 31
        file: ''
      - start_line: 39
        end_line: 39
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: bc974d16-a5b4-4734-b1d5-2c102769a792
    - text: 'For League matches, if ''result'' != ''no result'' (i.e., ''runs'', ''wickets'',
        or ''tie''), then ''winner'' must be present and equal to either ''team1''
        or ''team2''. This is required to compute ''loser'' and points correctly.
        We could represent this as a multicolumn rule: Great Expectations: expect_multicolumn_values_to_satisfy("(match_type
        == ''League'') and (result != ''no result'') -> (winner.notnull() and (winner
        == team1 or winner == team2))").'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 73
        end_line: 79
        file: ''
      uid: dfe7889f-5497-4678-a0a9-e4b610deccec
    - text: 'If ''result'' is ''runs'' or ''wickets'', then ''result_margin'' should
        be present and parseable as a positive integer (>= 1) to support the summary
        generation. We could represent this as: Great Expectations expect_multicolumn_values_to_satisfy("(result
        in [''runs'',''wickets'']) -> (result_margin.notnull() and to_integer(result_margin)
        >= 1)") or Deequ .satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN
        CASE WHEN result_margin RLIKE ''^[0-9]+$'' AND CAST(result_margin AS INT)
        >= 1 THEN 1 ELSE 0 END ELSE 1 END", "Margin present for decisive results",
