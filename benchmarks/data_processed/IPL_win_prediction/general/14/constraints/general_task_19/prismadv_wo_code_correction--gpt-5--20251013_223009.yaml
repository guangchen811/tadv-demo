      uid: 8c519a18-7c20-4eb9-bd21-22ad6c32c134
    - text: 'For any match with a decided result (result != ''no result''), the winner
        must be present and must be either team1 or team2. Deequ example: .addConstraint(Compliance("winner_must_be_team1_or_team2_when_result",
        "(result = ''no result'') OR (winner IS NOT NULL AND (winner = team1 OR winner
