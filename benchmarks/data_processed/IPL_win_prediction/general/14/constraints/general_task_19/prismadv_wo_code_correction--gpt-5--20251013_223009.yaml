      - start_line: 48
        end_line: 51
        file: ''
      uid: 88de7aae-0b7b-4625-9abf-7f7d25a261db
    - text: 'For tie results where a ''winner'' is recorded (e.g., after a Super Over),
        the ''winner'' must be either ''team1'' or ''team2''. Deequ example: .satisfies("(result
        <> ''tie'') OR (winner IS NULL) OR (winner = team1 OR winner = team2)", "tie_winner_must_be_participant")'
      sources:
      - start_line: 52
        end_line: 57
        file: ''
      uid: 0bd36d61-4a24-4b8e-8736-b7b3d929caf7
    - text: 'The two teams in a fixture must be distinct: ''team1'' <> ''team2''.
        Deequ example: .satisfies("team1 <> team2", "teams_are_distinct")'
      sources:
      - start_line: 49
