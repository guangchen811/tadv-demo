        end_line: 51
        file: ''
      uid: 161ec9a2-c653-42c6-83fd-14c874ebe630
    - text: 'If super_over = ''Y'', then the original result must be a tie and a winner
        must be recorded (i.e., winner is not null and equals team1 or team2). (Deequ-style:
        satisfies("CASE WHEN super_over = ''Y'' THEN result = ''tie'' AND winner IS
