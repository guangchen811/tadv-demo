  '["team1","team2"]':
    code: []
    assumptions:
    - text: 'Within each record, ''team1'' and ''team2'' must refer to two different
        teams (no self-fixtures). This is required because the code derives the loser
        as the other team in the fixture. Example Deequ constraint: .satisfies("team1
        <> team2", "no_self_fixture").'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      - start_line: 73
        end_line: 74
        file: ''
      uid: 7b3122dc-fd4a-44a5-9333-254004b4dc2a
    - text: 'For League matches that have a result (result <> ''no result''), ''winner''
        must be present and must equal exactly one of the two participants (''team1''
        or ''team2''). Example Deequ constraint: .satisfies("(winner = team1 OR winner
        = team2)", "winner_is_participant", where="match_type = ''League'' AND result
        <> ''no result'' AND winner IS NOT NULL").'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 49
        end_line: 55
        file: ''
      - start_line: 73
        end_line: 74
        file: ''
      uid: 369942b2-2c58-4f6a-a6c2-1cfbd705ca7e
    - text: 'For League matches with ''no result'', there should be no winner recorded,
        and both ''team1'' and ''team2'' receive identical NR credit (one NR and one
        point each). Example constraints: (a) on the matches table: .satisfies("winner
        IS NULL", "no_winner_on_no_result", where="match_type = ''League'' AND result
        = ''no result''"); (b) on the derived transactions, each ''no result'' row
        must produce two records: one for team1 and one for team2 with nr = 1 and
        points = 1.'
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      - start_line: 92
        end_line: 106
        file: ''
      uid: ac0811cf-028a-4a4c-8d8f-2389a0e1f4ba
    - text: 'In matches decided by runs or wickets, the loser must be the other team
        in the fixture (i.e., if winner = team1 then loser = team2, else loser = team1).
        Example Deequ constraint (on League, non-NR rows): .satisfies("(winner = team1
        AND loser = team2) OR (winner = team2 AND loser = team1)", "loser_is_other_team",
        where="match_type = ''League'' AND result <> ''no result''").'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      - start_line: 73
        end_line: 74
        file: ''
      uid: 29c597e2-cdcd-43b2-9b19-a14da3c59b01
    - text: "The set of valid team identifiers is the same across 'team1' and 'team2'\
        \ (symmetric domain); any team that can appear as 'team1' can also appear\
        \ as 'team2' and vice versa. This is implied by symmetric handling of both\
        \ columns (e.g., NR credit, loser derivation, and summaries) and supported\
        \ by equal approximate distinct counts. Possible checks: verify approxDistinctCount(team1)\
        \ \u2248 approxDistinctCount(team2) and (if supported) set-equality of distinct\
        \ values across the two columns."
      sources:
      - start_line: 49
        end_line: 59
        file: ''
      - start_line: 92
        end_line: 106
        file: ''
      uid: cedbf5ba-5589-4d93-94aa-4bbd33a33c97
    - text: 'When method = ''D/L'', both ''target_runs'' and ''target_overs'' must
        be present, and ''target_overs'' must be > 0 to avoid invalid rate calculation.
        Example Deequ constraint: .satisfies("target_runs IS NOT NULL AND target_overs
        IS NOT NULL AND target_overs > 0", "dl_inputs_valid", where="method = ''D/L''").'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 44
        end_line: 47
        file: ''
      uid: f7e7fe68-2491-479b-86d9-dcaf901f4d8f
  '["team1","team2","winner"]':
    code: []
    assumptions:
    - text: 'In League matches with a recorded result (result <> ''no result''), the
        ''winner'' must be present and must equal either ''team1'' or ''team2''. Deequ
