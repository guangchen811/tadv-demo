        end_line: 75
        file: ''
      - start_line: 30
        end_line: 30
        file: ''
      uid: a85ac4a3-3f17-4eb9-8cdd-03dba590f7ed
    - text: 'For any match whose result is ''runs'' or ''wickets'', the ''winner''
        must be non-null and equal to either ''team1'' or ''team2''. Deequ example:
        .satisfies("winner IS NOT NULL AND (winner = team1 OR winner = team2)", "winner_in_teams_for_decided_matches").where("result
        IN (''runs'',''wickets'')")'
