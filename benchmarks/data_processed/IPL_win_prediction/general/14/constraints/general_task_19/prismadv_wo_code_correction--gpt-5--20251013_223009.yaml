        end_line: 26
        file: ''
      uid: dc942372-fe53-44bc-853f-79e47277ae3a
    - text: 'In League matches with result = ''no result'', winner should be null/absent
        and super_over should be ''N''. (Deequ-style: where("match_type = ''League''").satisfies("CASE
        WHEN result = ''no result'' THEN winner IS NULL AND super_over = ''N'' ELSE
