  '["result","super_over","winner"]':
    code: []
    assumptions:
    - text: 'In League matches where result is not ''no result'', the winner must
        be present and must equal either team1 or team2. (Deequ-style: where("match_type
        = ''League'' and result <> ''no result''").satisfies("winner IS NOT NULL AND
