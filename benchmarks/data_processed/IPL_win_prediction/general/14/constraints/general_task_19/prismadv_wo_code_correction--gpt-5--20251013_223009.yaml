    assumptions:
    - text: 'The ''result'' column must be categorical with exact values in the set
        {''runs'', ''wickets'', ''tie'', ''no result''} (case-sensitive, with the
        space in ''no result''). We could represent this as: Deequ: .satisfies("CASE
        WHEN result IN (''runs'',''wickets'',''tie'',''no result'') THEN 1 ELSE 0
        END", "Valid result values", lambda x: x == 1.0) or Great Expectations: expect_column_values_to_be_in_set(''result'',
        [''runs'',''wickets'',''tie'',''no result'']).'
