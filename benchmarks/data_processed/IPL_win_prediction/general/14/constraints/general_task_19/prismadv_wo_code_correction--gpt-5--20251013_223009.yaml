        file: ''
      uid: 2dbe484f-5db2-4a2b-8f60-996019a2f2c3
    - text: 'The ''result'' column should be non-null for all rows. Nulls would cause
        unintended behavior in filters and branching logic. We could represent this
        as: Deequ: .hasCompleteness(''result'', lambda c: c == 1.0) or Great Expectations:
        expect_column_values_to_not_be_null(''result'').'
      sources:
      - start_line: 28
        end_line: 28
