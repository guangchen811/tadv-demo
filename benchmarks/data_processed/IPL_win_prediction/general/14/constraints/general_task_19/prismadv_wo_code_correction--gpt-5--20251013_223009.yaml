  '["match_type","result","winner"]':
    code: []
    assumptions:
    - text: 'For League matches (match_type = ''League'') that have a result (result
        <> ''no result''), the winner must be present and must be either team1 or
        team2. We could represent this with a Deequ constraint like: .satisfies("CASE
        WHEN match_type = ''League'' AND result <> ''no result'' THEN winner IS NOT
        NULL AND (winner = team1 OR winner = team2) ELSE true END", "league_winner_is_one_of_teams")'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 73
        end_line: 78
        file: ''
      uid: fde3f831-df49-403d-a0d6-52161d515ed5
    - text: 'For League matches with ''no result'', no winner should be recorded (winner
        IS NULL). We could represent this with: .satisfies("CASE WHEN match_type =
        ''League'' AND result = ''no result'' THEN winner IS NULL ELSE true END",
        "nr_has_no_winner")'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 58
        end_line: 59
        file: ''
      - start_line: 92
        end_line: 106
        file: ''
      uid: 2b8fb20b-6491-4b64-b002-f99aecd5ff9f
    - text: 'For matches decided by ''runs'' or ''wickets'', a winner must be recorded
        and be one of the two teams, and result_margin must be non-null. We could
        represent this with: .satisfies("CASE WHEN result IN (''runs'',''wickets'')
        THEN winner IS NOT NULL AND (winner = team1 OR winner = team2) AND result_margin
        IS NOT NULL ELSE true END", "margin_and_winner_present_for_decisions")'
      sources:
      - start_line: 39
        end_line: 51
        file: ''
      uid: de0bc113-a38a-4922-a521-0ff3cf227021
    - text: 'If a Super Over occurred (super_over = ''Y''), the match result prior
        to resolution must have been a tie (result = ''tie''). We could represent
        this with: .satisfies("NOT (super_over = ''Y'') OR result = ''tie''", "super_over_implies_tie")'
      sources:
      - start_line: 32
        end_line: 32
        file: ''
      - start_line: 52
        end_line: 55
        file: ''
      uid: 3ed12c2b-abf3-4030-98e0-016eaaa276fa
    - text: 'For ties resolved via Super Over (result = ''tie'' AND super_over = ''Y''),
        a winner must be recorded and must be one of the two teams. We could represent
        this with: .satisfies("CASE WHEN result = ''tie'' AND super_over = ''Y'' THEN
        winner IS NOT NULL AND (winner = team1 OR winner = team2) ELSE true END",
        "tie_with_super_over_has_winner")'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: b11dfafa-0d5c-4707-b7e5-c81012a39f2a
    - text: 'For matches decided under the D/L method (method = ''D/L''), target_runs
        and target_overs must be present and target_overs > 0 to safely compute required
        run rate. We could represent this with: .satisfies("CASE WHEN method = ''D/L''
        THEN target_runs IS NOT NULL AND target_overs IS NOT NULL AND target_overs
        > 0 ELSE true END", "dl_inputs_present_and_valid")'
      sources:
      - start_line: 33
        end_line: 34
        file: ''
      - start_line: 44
        end_line: 47
        file: ''
      uid: 046ceeb3-0f8c-49a2-9220-32dd9b4861b7
  '["method","target_overs"]':
    code: []
    assumptions:
    - text: 'If method = ''D/L'', both target_runs and target_overs must be present
        and numeric, and target_overs must be > 0 to avoid division-by-zero when computing
        required run rate. We could represent this with Deequ constraints like: .where("method
        = ''D/L''").hasCompleteness("target_runs", 1.0); .where("method = ''D/L''").hasCompleteness("target_overs",
        1.0); .where("method = ''D/L''").satisfies("cast(target_runs as double) >=
        0 AND cast(target_overs as double) > 0", "dls_targets_valid", 1.0)'
      sources:
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 44
        end_line: 47
        file: ''
      uid: 29500049-fa00-4080-bcf8-71b9ce0bbddf
    - text: 'Result-dependent winner and margin rules: (a) If result IN (''runs'',''wickets''),
        winner must be non-null and equal to team1 or team2, and result_margin must
        be non-null and > 0. (b) If result = ''no result'', winner should be null.
        Deequ-style constraints: .where("result in (''runs'',''wickets'')").hasCompleteness("winner",
        1.0); .where("result in (''runs'',''wickets'')").satisfies("winner = team1
        OR winner = team2", "winner_is_participant", 1.0); .where("result in (''runs'',''wickets'')").hasCompleteness("result_margin",
        1.0); .where("result in (''runs'',''wickets'')").satisfies("cast(result_margin
        as double) > 0", "positive_margin", 1.0); .where("result = ''no result''").satisfies("winner
        IS NULL", "nr_no_winner", 1.0)'
      sources:
      - start_line: 27
        end_line: 33
        file: ''
      - start_line: 48
        end_line: 51
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      uid: dd14d06f-1e6b-48b5-a8f7-78bcb70c721f
    - text: 'For League matches with a decided result (result <> ''no result''), winner
        must be one of the two teams in the fixture (team1 or team2). Deequ example:
        .where("match_type = ''League'' AND result <> ''no result''").satisfies("winner
        = team1 OR winner = team2", "league_winner_is_participant", 1.0)'
      sources:
      - start_line: 25
        end_line: 26
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      uid: 80e72bcd-2f7c-4c4c-bf1c-43cf580fbe53
    - text: 'Super-over semantics: If super_over = ''Y'', then the regular result
        must be ''tie'' and a winner must be present and equal to team1 or team2.
        Deequ examples: .where("super_over = ''Y''").satisfies("result = ''tie''",
        "so_requires_tie", 1.0); .where("super_over = ''Y''").hasCompleteness("winner",
        1.0); .where("super_over = ''Y''").satisfies("winner = team1 OR winner = team2",
        "so_winner_participant", 1.0)'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 52
        end_line: 57
        file: ''
      uid: 3c8847e6-fa4b-49c1-b267-08f356b74e7f
    - text: 'Season-date consistency: For rows with a valid date, season should equal
        the calendar year extracted from date. Possible Deequ constraint (assuming
        date parseable): .where("date IS NOT NULL").satisfies("season = year(to_timestamp(date))",
        "season_matches_date_year", 1.0)'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      uid: 4bcbdff4-ae44-4938-ac74-5066032657ed
    - text: 'For rows with result = ''no result'', a super over should not be flagged.
        Deequ example: .where("result = ''no result''").satisfies("coalesce(super_over,
        ''N'') <> ''Y''", "nr_no_super_over", 1.0)'
      sources:
      - start_line: 25
        end_line: 33
        file: ''
      - start_line: 58
        end_line: 59
        file: ''
      uid: 403728f7-1f46-4d4f-988f-853f312f7755
  '["method","target_overs","target_runs"]':
    code: []
    assumptions:
    - text: 'For any row where method = ''D/L'', both target_runs and target_overs
        must be present (non-null) and numeric, and target_overs must be strictly
        greater than 0 so that the required run rate target_runs / target_overs can
        be computed. Deequ examples: .hasCompleteness(''target_runs'', _ == 1.0, where
        = "method = ''D/L''"); .hasCompleteness(''target_overs'', _ == 1.0, where
        = "method = ''D/L''"); .satisfies(''target_overs > 0'', ''DLS positive overs'',
        where = "method = ''D/L''")'
      sources:
      - start_line: 33
        end_line: 47
        file: ''
      uid: ffd61ca5-80cf-41ac-9a09-b1dddc806320
    - text: 'When method = ''D/L'', target_overs should represent a whole number of
        overs (integer), because the value is cast to int for reporting and truncation
        would otherwise misrepresent fractional overs. Deequ example: .satisfies(''target_overs
        = cast(target_overs as int)'', ''DLS overs are integers'', where = "method
        = ''D/L''")'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      uid: d1cceb23-2b50-4d50-bfe7-c289e749199b
    - text: 'For matches with a decisive result (result in (''runs'', ''wickets'')),
        winner must be present (non-null). Deequ example: .hasCompleteness(''winner'',
        _ == 1.0, where = "result in (''runs'',''wickets'')")'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 48
        end_line: 51
        file: ''
      uid: ff39fd65-1bc5-45f4-adac-9ec92db88440
    - text: 'Whenever a winner is recorded (particularly for non-''no result'' games),
        the winner must be one of the two teams in the fixture (team1 or team2). Deequ
        example: .satisfies("case when result <> ''no result'' then (winner = team1
        or winner = team2) else true end", ''Winner must be one of the two teams'')'
      sources:
      - start_line: 29
        end_line: 31
        file: ''
      - start_line: 36
        end_line: 51
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      uid: 8e45ab4c-005b-44ee-9122-d48700e9d6a0
    - text: 'If super_over = ''Y'', then the pre-super-over outcome must have been
        a tie, and a valid winner (one of team1 or team2) must be present. Deequ example:
        .satisfies("case when super_over = ''Y'' then (result = ''tie'' and (winner
        = team1 or winner = team2)) else true end", ''Super Over implies prior tie
        and valid winner'')'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 52
        end_line: 55
        file: ''
      uid: f8ffddae-357f-49ff-a01a-5ecf717c82ab
  '["result","result_margin"]':
    code: []
    assumptions:
    - text: 'If result is ''runs'' or ''wickets'', then result_margin must be present,
        numeric with no fractional part, and strictly positive; additionally, winner
        must be present and equal to either team1 or team2. This can be enforced,
        for example, with conditional constraints like: where(result in (''runs'',''wickets''))
        -> isComplete(''result_margin'') and isComplete(''winner'') and satisfies(''winner
        in (team1, team2)'') and satisfies(''result_margin > 0 and result_margin =
        floor(result_margin)'').'
      sources:
      - start_line: 48
        end_line: 51
        file: ''
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 73
        end_line: 74
        file: ''
      uid: d697988a-36e0-4c04-bc1d-78d0c2b6dc02
    - text: 'If result equals ''no result'', then winner and result_margin must be
        null (i.e., not recorded). Example constraints: where(result = ''no result'')
        -> hasCompleteness(''winner'', 0.0) and hasCompleteness(''result_margin'',
        0.0).'
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      - start_line: 28
        end_line: 28
        file: ''
      - start_line: 92
        end_line: 106
        file: ''
      uid: efebcee5-23a9-4f70-b483-77f08652c720
    - text: 'If super_over = ''Y'', the underlying result must be ''tie'' and the
        winner must be one of the two teams; result_margin should be null in these
        cases. Example: where(super_over = ''Y'') -> satisfies("result = ''tie'' and
        winner in (team1, team2)") and hasCompleteness(''result_margin'', 0.0).'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 31
        end_line: 32
        file: ''
      uid: 7ad4da56-1571-45b8-a403-f15b7fdb9e26
    - text: 'For League matches that are not ''no result'', winner must be present
        and equal to either team1 or team2 (required for computing wins/losses). Example:
        where(match_type = ''League'' and result <> ''no result'') -> isComplete(''winner'')
        and satisfies(''winner in (team1, team2)'').'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 73
        end_line: 74
        file: ''
      uid: d39793ba-cfab-470e-939d-1987b3a8ba36
    - text: 'When method = ''D/L'', target_runs and target_overs must be present and
        target_overs > 0 so the required run rate can be computed safely. Example:
        where(method = ''D/L'') -> isComplete(''target_runs'') and isComplete(''target_overs'')
        and satisfies(''target_overs > 0'').'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 44
        end_line: 47
        file: ''
      uid: e9ed3c56-9386-4470-a86c-04f0fcc4e742
    - text: 'For results in (''tie'', ''no result''), result_margin should be null;
        for results in (''runs'', ''wickets''), result_margin should be non-null.
        Example: satisfies("(result in (''tie'',''no result'') and result_margin is
        null) or (result in (''runs'',''wickets'') and result_margin is not null)").'
      sources:
      - start_line: 48
        end_line: 58
        file: ''
      uid: 6e2b3652-e106-425b-b722-5d393ff81efa
  '["result","super_over"]':
    code: []
    assumptions:
    - text: 'If super_over is ''Y'', the match result must be ''tie'' (i.e., Super
        Over only occurs after a tie). Deequ example: .addConstraint(Compliance("super_over_only_with_tie",
        "super_over != ''Y'' OR result = ''tie''"))'
