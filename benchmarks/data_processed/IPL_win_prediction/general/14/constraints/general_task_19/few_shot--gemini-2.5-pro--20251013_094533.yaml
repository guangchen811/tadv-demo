constraints:
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .satisfies("result NOT IN ('runs', 'wickets') OR result_margin IS NOT NULL",
        'result_margin must be present for results by runs or wickets')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .satisfies("super_over <> 'Y' OR result = 'tie'", 'A super over can only happen
        if the result is a tie')
      - Valid
    assumptions: []
  team1:
    code:
    - - .satisfies('team1 <> team2', 'team1 and team2 must be different')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("result = 'no result' OR winner IS NOT NULL", 'winner must be present
        if a result exists')
      - Valid
    - - .satisfies('winner IS NULL OR winner = team1 OR winner = team2', 'winner must
        be one of the competing teams')
      - Valid
    assumptions: []
