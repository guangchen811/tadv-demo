constraints:
  date:
    code:
    - - .containsPattern('date', '^\d{4}-\d{2}-\d{2}$')
      - Invalid
    - - .isComplete('date')
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("method IS NULL OR method = 'D/L'", 'method_null_or_dl')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.hasMax(''result_margin'', lambda v: v <= 10, where="result = ''wickets''")'
      - Invalid
    - - '.hasMin(''result_margin'', lambda v: v >= 1, where="result IN (''runs'',''wickets'')")'
      - Invalid
    - - .isComplete('result_margin', where="result IN ('runs','wickets')")
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    - - .satisfies("result <> 'tie' OR super_over = 'Y'", 'tie_requires_super_over')
      - Valid
    - - .satisfies("super_over <> 'Y' OR result = 'tie'", 'super_over_only_for_tie')
      - Valid
    assumptions: []
  target_overs:
    code:
    - - '.hasMax(''target_overs'', lambda v: v <= 20, where="result <> ''no result''")'
      - Invalid
    - - '.hasMin(''target_overs'', lambda v: v > 0, where="result <> ''no result''")'
      - Invalid
    - - .isComplete('target_overs', where="result <> 'no result'")
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .isComplete('target_runs', where="result <> 'no result'")
      - Invalid
    - - .isNonNegative('target_runs', where="result <> 'no result'")
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .satisfies('team1 <> team2', 'teams_are_distinct')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", 'toss_winner_is_a_participating_team')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner', where="result IN ('runs','wickets','tie')")
      - Invalid
    - - .satisfies("winner = team1 OR winner = team2", 'winner_is_a_participating_team',
        where="result IN ('runs','wickets','tie')")
      - Invalid
    assumptions: []
