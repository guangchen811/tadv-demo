      reason_if_invalid: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''team2'',
        lambda x: (x >= 10) and (x <= 30))'': Check.hasNumberOfDistinctValues() missing
        2 required positional arguments: ''binningUdf'' and ''maxBins'''
      level: warning
      uid: 9c22eb9a-577f-455d-9e76-13b1ba33d6f6
      source_assumptions:
      - cbc31865-ee5c-4938-841e-e922a1038eb6
    assumptions:
    - text: 'The input must contain the ''team2'' column, as it is referenced directly
        to compute the loser and is written to the output. This can be represented
        as a validation like Deequ: .hasColumn(''team2'') or Great Expectations: expect_column_to_exist(''team2'').'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: a22dc252-364d-4c21-a1f9-6f64da3b8b44
    - text: 'The ''team2'' column should be complete (no nulls) and not blank/whitespace-only,
        because missing or empty values would lead to malformed settlement text and
        poor-quality outputs. This can be expressed as: Deequ .isComplete(''team2'')
        and .satisfies("CASE WHEN TRIM(`team2`) <> '''' THEN 1 ELSE 0 END", "Non-empty
        team2", lambda x: x == 1), or Great Expectations expect_column_values_to_not_be_null(''team2'')
        and expect_column_values_to_match_regex(''team2'', r''^\s*\S.*$'').'
      sources:
      - start_line: 44
        end_line: 50
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: 0e9504b3-bb03-480d-bc26-46539d2d2c1f
    - text: 'Teams in a match should be different: ''team2'' should not equal ''team1''
        for any row. Otherwise, the loser/winner logic and settlement text would be
        nonsensical (e.g., a team beating itself). This can be represented as: Deequ
        .satisfies("CASE WHEN `team2` <> `team1` THEN 1 ELSE 0 END", "Distinct opponents",
        lambda x: x == 1) or Great Expectations expect_multicolumn_values_to_be_unique
        for (''id'',''team1'',''team2'') setup, or more directly a custom expectation
        ensuring team2 != team1.'
      sources:
      - start_line: 44
        end_line: 50
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: 523d0844-7147-4bce-8fb0-395695214a2a
    - text: 'The ''team2'' column should have a stable, limited domain of team names
        (about 19 distinct values historically); a reasonable guardrail is to keep
        the unique count between 10 and 30 to catch unexpected values or formatting
        drift. This can be represented as: Deequ .hasNumberOfDistinctValuesBetween(''team2'',
        lowerBound=10, upperBound=30) or Great Expectations expect_column_unique_value_count_to_be_between(''team2'',
        min_value=10, max_value=30).'
      sources:
      - start_line: 67
        end_line: 67
        file: ''
      uid: cbc31865-ee5c-4938-841e-e922a1038eb6
  target_overs:
