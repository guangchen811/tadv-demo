    assumptions:
    - text: 'Season and date must be consistent: both ''date'' and ''season'' are
        parseable (no coercion to NaT/NaN), and for rows where parsing succeeds, season
        equals the calendar year of date. Example Deequ: .satisfies("year(to_timestamp(date,
        ''yyyy-MM-dd'')) = CAST(season AS INT)", ''season_matches_date_year'')'
      sources:
      - start_line: 32
        end_line: 34
        file: ''
      uid: cbb7a558-4db4-4091-9139-49f553750cfc
    - text: 'For matches with a decisive result (''runs'' or ''wickets''), a valid
        integer margin must be present and used. Specifically: if result in {''runs'',''wickets''}
        then result_margin is not null, numeric, and margin_int is not null. Example
        Deequ: .satisfies("(result NOT IN (''runs'',''wickets'')) OR (result_margin
        IS NOT NULL AND CAST(result_margin AS INT) >= 1)", ''margin_present_when_required'')'
      sources:
      - start_line: 37
        end_line: 42
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 4bd985ff-e96c-46cf-8555-5b967c557b95
    - text: 'Winner/loser must be consistent with the two teams: if winner is not
        null, it must equal either team1 or team2, and loser must equal the other
        team. Example Deequ: .satisfies("winner IS NULL OR ((winner = team1 AND loser
        = team2) OR (winner = team2 AND loser = team1))", ''winner_loser_consistency'')'
      sources:
      - start_line: 44
        end_line: 50
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 0cc6bbef-f0c2-402f-9895-4c661c52b85e
    - text: 'For ties, a super over winner is expected: if result == ''tie'', then
        winner must be non-null and a super over indicator must be present. Example
        Deequ: .satisfies("(result != ''tie'') OR (winner IS NOT NULL AND super_over
        IS NOT NULL)", ''tie_requires_super_over_and_winner'')'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: b4450640-12b0-4108-be60-94c3f6015517
    - text: 'Required run rate division should be well-defined: when target_runs is
        present, target_overs must be present and strictly greater than 0 to avoid
        NaN/Inf in req_run_rate. Example Deequ: .satisfies("(target_runs IS NULL)
        OR (target_overs IS NOT NULL AND target_overs > 0)", ''valid_required_run_rate_divisor'')'
      sources:
      - start_line: 69
        end_line: 70
        file: ''
      uid: 32547055-524d-40b4-8338-c687b1c7308f
    - text: 'Toss outcome KPIs assume presence and validity of toss fields when the
        match has a result: if result != ''no result'', then toss_winner must be non-null
        and equal to either team1 or team2, and toss_decision must be in {''bat'',''field''}
        (post-normalization). Example Deequ: .satisfies("(result = ''no result'')
        OR (toss_winner IS NOT NULL AND toss_winner IN (team1, team2))", ''toss_winner_is_a_team'')
        and .satisfies("(result = ''no result'') OR (toss_decision IN (''bat'',''field''))",
        ''toss_decision_domain_when_valid'')'
      sources:
      - start_line: 18
        end_line: 21
        file: ''
      - start_line: 72
        end_line: 74
        file: ''
      uid: fe1ae449-b22c-453a-a4ce-afda2c6319fc
    - text: 'Per-season decision split required for toss advantage calculation: for
        each season with at least one completed match (result != ''no result''), there
        should be at least one match where toss_decision = ''bat'' and at least one
        where toss_decision = ''field'', so the pivoted columns exist and toss_decision_advantage
        can be computed. This can be checked by aggregating by season and ensuring
        counts for both decisions are > 0. Example approach: after grouping by season
        and toss_decision, assert .satisfies("decision_matches_bat > 0 AND decision_matches_field
        > 0", ''per_season_decision_coverage'') on the pivoted result.'
      sources:
