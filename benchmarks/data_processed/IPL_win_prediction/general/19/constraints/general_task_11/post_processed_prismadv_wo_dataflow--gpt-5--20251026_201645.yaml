      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 999c1c30-a51d-4e29-bb87-b8e7f31d075c
      source_assumptions:
      - d1ad4872-6c6e-4beb-b679-b278523c2889
    - suggestion: '.satisfies("NOT (team1 IN ('''', ''NA'', ''NaN'', ''nan'', ''NULL'',
        ''Null'', ''null'', ''None'', ''NullValue''))", "team1 no placeholder values",
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 25fca56e-3123-4fe8-9cad-ed396368cbbe
      source_assumptions:
      - d1ad4872-6c6e-4beb-b679-b278523c2889
    - suggestion: '.hasNumberOfDistinctValues(''team1'', lambda x: x >= 8 and x <=
        30)'
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''team1'',
        lambda x: x >= 8 and x <= 30)'': Check.hasNumberOfDistinctValues() missing
        2 required positional arguments: ''binningUdf'' and ''maxBins'''
      level: warning
      uid: e1ce072d-de7d-4a5c-b2d9-ca5098aee390
      source_assumptions:
      - 5b17711c-ba93-4859-93d3-cf83d37dbd32
    - suggestion: '.satisfies("team1 <> team2", "team1 != team2", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 2da58d95-cdd0-40d7-b7e6-c20e5a72f8ff
      source_assumptions:
      - fd40eb1b-d86f-42af-9eb5-4c00947e60e9
    assumptions:
    - text: 'team1 must be non-null for every row so that loser determination and
        downstream exports work correctly. We could represent this as a Deequ constraint:
        .satisfies("CASE WHEN team1 IS NOT NULL THEN 1 ELSE 0 END", "team1 not null",
        lambda x: x == 1.0)'
      sources:
      - start_line: 44
        end_line: 50
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: 08c58012-59f1-45e7-8a71-fc64ffb33c9d
    - text: 'When winner is not null, it must equal either team1 or team2; otherwise
        loser will be computed incorrectly. We could represent this as a Deequ constraint:
        .satisfies("CASE WHEN winner IS NULL THEN 1 WHEN winner = team1 OR winner
        = team2 THEN 1 ELSE 0 END", "winner must be one of the two teams", lambda
        x: x == 1.0)'
      sources:
      - start_line: 44
        end_line: 50
        file: ''
      - start_line: 53
        end_line: 61
        file: ''
      uid: a3c88fb0-7757-4eaf-ba94-510d595569b0
    - text: 'team1 values should already be clean/canonicalized because no normalization
        is applied to team names, yet equality comparisons are used against winner.
        Specifically: (a) no leading/trailing whitespace, and (b) no placeholder null-like
        strings such as '''', ''NA'', ''NaN'', ''nan'', ''NULL'', ''Null'', ''null'',
        ''None'', ''NullValue''. We could represent these as Deequ constraints: .satisfies("team1
        = TRIM(team1)", "team1 trimmed", lambda x: x == 1.0) and .satisfies("CASE
        WHEN team1 IN ('''', ''NA'', ''NaN'', ''nan'', ''NULL'', ''Null'', ''null'',
        ''None'', ''NullValue'') THEN 0 ELSE 1 END", "team1 no placeholder values",
        lambda x: x == 1.0)'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 47
        end_line: 47
        file: ''
      uid: d1ad4872-6c6e-4beb-b679-b278523c2889
    - text: 'team1 should come from a small, stable set of team names (approximately
        19 distinct values observed), indicating a bounded domain. We could represent
        this as a Deequ constraint: .hasNumberOfDistinctValuesBetween("team1", 8,
        30)'
      sources:
      - start_line: 16
        end_line: 16
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: 5b17711c-ba93-4859-93d3-cf83d37dbd32
    - text: 'team1 and team2 should be different for each match (a team should not
        play itself), to ensure loser is meaningful. We could represent this as a
        Deequ constraint: .satisfies("CASE WHEN team1 <> team2 THEN 1 ELSE 0 END",
        "team1 != team2", lambda x: x == 1.0)'
      sources:
      - start_line: 44
        end_line: 50
        file: ''
      uid: fd40eb1b-d86f-42af-9eb5-4c00947e60e9
  team2:
    code:
    - suggestion: .isComplete('team2')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 2d4b7537-c1c8-4e15-aaae-f8b6adb95844
      source_assumptions:
      - a22dc252-364d-4c21-a1f9-6f64da3b8b44
    - suggestion: '.satisfies("trim(`team2`) <> ''''", "Non-empty team2", lambda x:
