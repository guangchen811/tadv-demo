        AND result_margin IS NULL).'
      sources:
      - start_line: 52
        end_line: 54
        file: ''
      - start_line: 41
        end_line: 41
        file: ''
      uid: bfd506c9-2202-4d1b-8075-2b87dcde5694
    - text: 'Whenever ''winner'' is present, ''loser'' must be the other team: (winner
        = team1 AND loser = team2) OR (winner = team2 AND loser = team1). This ensures
        the loser derivation logic is consistent. Example compliance: winner IS NULL
        OR ((winner = team1 AND loser = team2) OR (winner = team2 AND loser = team1)).'
      sources:
      - start_line: 44
        end_line: 50
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 5f51815a-82da-44ba-908d-239436addb9c
    - text: 'For KPI calculations (performed only where result <> ''no result''),
        ''toss_winner'' must be non-null and be one of ''team1'' or ''team2'', and
        ''toss_decision'' must be normalized to either ''bat'' or ''field''. Example
        compliance: (result <> ''no result'') -> (toss_winner IS NOT NULL AND (toss_winner
        = team1 OR toss_winner = team2) AND toss_decision IN (''bat'',''field'')).'
      sources:
      - start_line: 19
        end_line: 21
        file: ''
      - start_line: 71
        end_line: 74
        file: ''
      - start_line: 85
        end_line: 92
        file: ''
      uid: 1e154f30-4297-4e97-80f6-dd5f93d60553
  '["target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("(`result` <> ''no result'') OR (`target_runs` IS NOT
        NULL AND `target_overs` IS NOT NULL AND `target_overs` > 0)", "req_rate_inputs_present",
        lambda v: v >= 0.998)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: c42695b1-eb86-45ed-b92e-46dd0d5396d7
      source_assumptions:
      - c79fc4bc-94b5-4770-8e79-7f518f9015c5
    - suggestion: '.satisfies("(`target_runs` IS NULL AND `target_overs` IS NULL)
        OR (`target_runs` IS NOT NULL AND `target_overs` IS NOT NULL)", "runs_overs_joint_completeness",
        lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 2a2ff092-831d-41bc-8adc-6048de59535d
      source_assumptions:
      - 3a142ea9-ab85-44a7-956d-3798bccca4cf
    assumptions:
    - text: 'For rows included in KPI calculations (result <> ''no result''), the
        pair (target_runs, target_overs) must both be present (non-null) and target_overs
        must be > 0 so that req_run_rate = target_runs / target_overs is defined and
        finite. We could represent this as a Deequ constraint: .satisfies("target_runs
        IS NOT NULL AND target_overs IS NOT NULL AND target_overs > 0", "req_rate_inputs_present",
        lambda v: v == 1.0, where="result <> ''no result''")'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 72
        end_line: 81
        file: ''
      uid: 1530eea8-09b6-455f-a89c-0bcd15a51a7d
    - text: 'target_runs and target_overs should be jointly null or jointly non-null
        (no one-sided nulls). This prevents undefined or misleading req_run_rate values.
        We could represent this as a Deequ constraint: .satisfies("(target_runs IS
        NULL AND target_overs IS NULL) OR (target_runs IS NOT NULL AND target_overs
        IS NOT NULL)", "runs_overs_joint_completeness", lambda v: v == 1.0)'
      sources:
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 76
        end_line: 81
        file: ''
      uid: c79fc4bc-94b5-4770-8e79-7f518f9015c5
    - text: 'When result is ''runs'' or ''wickets'', result_margin must be present
        (non-null), an integer, and strictly positive; when result is not in {''runs'',''wickets''},
        result_margin may be null. This ensures margin_int exists before conversion
        and is safe to format. We could represent this as Deequ constraints: .satisfies("result
        IN (''runs'',''wickets'')", "_scope", lambda v: True) together with .satisfies("result_margin
        IS NOT NULL AND result_margin >= 1 AND CAST(result_margin AS BIGINT) = result_margin",
        "margin_valid_for_result", lambda v: v == 1.0, where="result IN (''runs'',''wickets'')")'
      sources:
      - start_line: 35
        end_line: 42
        file: ''
      - start_line: 52
        end_line: 61
        file: ''
      uid: 3a142ea9-ab85-44a7-956d-3798bccca4cf
    - text: 'For any resulted match (result in {''runs'',''wickets'',''tie''}), winner
        must equal either team1 or team2, and team1 must not equal team2, so that
        loser = the other team is well-defined. We could represent this as Deequ constraints:
        .satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <> team2", "teams_distinct",
        lambda v: v == 1.0) and .satisfies("winner IN (team1, team2)", "winner_is_one_of_teams",
        lambda v: v == 1.0, where="result IN (''runs'',''wickets'',''tie'')")'
      sources:
      - start_line: 44
        end_line: 50
        file: ''
      - start_line: 52
        end_line: 61
        file: ''
      uid: 0dbfd366-3924-4104-89c2-e8e7ca5e567a
    - text: 'If result is ''tie'', there must be a non-null winner belonging to {team1,
        team2}, and super_over must be present (non-null) to be consistent with the
        ''won after Super Over'' settlement text. We could represent this as a Deequ
        constraint: .satisfies("winner IN (team1, team2) AND super_over IS NOT NULL",
        "tie_requires_winner_and_super_over", lambda v: v == 1.0, where="result =
        ''tie''")'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: 8ce4cc8c-f52d-4a71-99ee-e3697cb49fa8
    - text: 'On matches included in KPI calculations (result <> ''no result''), toss_winner
        must be present and must equal either team1 or team2, so that toss_winner_won
        is meaningfully computed. We could represent this as a Deequ constraint: .satisfies("toss_winner
        IS NOT NULL AND toss_winner IN (team1, team2)", "toss_winner_is_valid_team",
        lambda v: v == 1.0, where="result <> ''no result''")'
      sources:
      - start_line: 72
        end_line: 74
        file: ''
      uid: 0de380ca-694c-4085-a105-209c431511d9
  '["team1","team2"]':
    code: []
    assumptions:
    - text: 'Each record''s team1 and team2 must be different (no team plays itself).
        This can be enforced as a row-level rule like: Deequ: .satisfies(''team1 !=
        team2'', ''teams_are_distinct'', 1.0).'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: ccbf2153-f435-4ee6-bc2b-2a5acd3c2b9d
    - text: 'If a winner is recorded (winner not null), it must be either team1 or
        team2, and loser must equal the other team. Deequ: .satisfies(''isnull(winner)
        OR ((winner = team1 AND loser = team2) OR (winner = team2 AND loser = team1))'',
        ''winner_loser_consistency'', 1.0).'
      sources:
      - start_line: 44
        end_line: 50
        file: ''
      - start_line: 52
        end_line: 60
        file: ''
      uid: 8c2f3452-9a1e-4d96-b0fe-9c3b4fb425a0
    - text: 'For rows where result is ''runs'' or ''wickets'', result_margin must
        be present, a whole number, and strictly positive; the derived margin_int
        must therefore be non-null. Deequ: .satisfies("(result IN (''runs'',''wickets''))
        => (result_margin IS NOT NULL AND result_margin >= 1 AND result_margin = CAST(result_margin
        AS INT))", ''margin_required_for_result'', 1.0).'
      sources:
      - start_line: 36
        end_line: 42
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 7a937854-2dae-4094-a635-30add6d37831
    - text: 'If result is ''tie'', there must be a non-null winner that is either
        team1 or team2, and super_over should indicate a Super Over occurred (e.g.,
        ''Y'' or ''YES'' after normalization). Deequ: .satisfies("(result = ''tie'')
        => (winner IS NOT NULL AND (winner = team1 OR winner = team2) AND upper(super_over)
        IN (''Y'',''YES''))", ''tie_requires_super_over_and_winner'', 1.0).'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: 8984844e-0779-43fe-bdb0-ad6647d0cd75
    - text: 'If result is ''no result'', winner must be null. Deequ: .satisfies("(result
        = ''no result'') => isnull(winner)", ''no_result_has_no_winner'', 1.0).'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      uid: aaa9bebd-d7bc-4551-bb65-21bf88e1263e
    - text: 'On matches with a result (result != ''no result''), toss_winner must
        be non-null and equal to either team1 or team2, and toss_decision must be
        present and in {''bat'',''field''} (after normalization). Deequ: .satisfies("(result
        <> ''no result'') => (toss_winner IS NOT NULL AND (toss_winner = team1 OR
        toss_winner = team2) AND toss_decision IN (''bat'',''field''))", ''toss_fields_consistency'',
        1.0).'
      sources:
      - start_line: 19
        end_line: 21
        file: ''
      - start_line: 72
        end_line: 74
        file: ''
      - start_line: 85
        end_line: 92
        file: ''
      uid: 51d3101e-902f-47b6-b7ec-cd40a2d61778
    - text: 'For matches with a result (result != ''no result''), target_runs and
        target_overs must both be present and target_overs > 0 so that req_run_rate
        = target_runs/target_overs is finite. Deequ: .satisfies("(result <> ''no result'')
        => (target_runs IS NOT NULL AND target_overs IS NOT NULL AND target_overs
        > 0)", ''req_run_rate_defined'', 1.0).'
      sources:
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 72
        end_line: 82
        file: ''
      uid: b4e39541-6268-46b4-9fc9-814d37999788
  '["team1","team2","toss_winner"]':
    code: []
    assumptions:
    - text: 'Each record must involve two distinct teams: team1 and team2 must not
        be equal. This supports downstream logic that derives the ''loser'' as the
        non-winner team and produces settlement text like ''winner beat loser''. Deequ
        example: .satisfies("team1 <> team2", "team1 and team2 must be different for
        a match")'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 686f1799-ba3f-42c2-bd5b-a16760236aee
    - text: 'For matches with a decided result (result in {''runs'',''wickets'',''tie''}),
        the ''winner'' must be one of the two competing teams (team1 or team2). This
        is required for computing ''loser'' and for building settlement strings. Deequ
        example: .satisfies("CASE WHEN result IN (''runs'',''wickets'',''tie'') THEN
        (winner = team1 OR winner = team2) ELSE true END", "Winner must be one of
        team1/team2 for decided matches")'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 52
        end_line: 60
        file: ''
      - start_line: 72
        end_line: 72
        file: ''
      uid: a21e561b-0b1a-405e-b5c9-883fdeb8a234
    - text: 'The ''toss_winner'' must be one of the two teams playing the match (team1
        or team2). This ensures the KPI ''toss_winner_won'' (toss_winner == winner)
        is meaningful and comparable to the match participants. Deequ example: .satisfies("(toss_winner
        = team1) OR (toss_winner = team2)", "Toss winner must be one of the competing
        teams")'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 44
        end_line: 49
        file: ''
      uid: 58a8a542-f45e-4793-af4c-b0340534db26
  '["team1","team2","winner"]':
    code: []
    assumptions:
    - text: "For any row where 'winner' is not null, the winner must be one of the\
        \ two teams in that row: winner \u2208 {team1, team2}. This guarantees the\
        \ derived 'loser' is the other team. Deequ example: .satisfies(\"winner IS\
        \ NULL OR (winner = team1 OR winner = team2)\", \"winner_in_pair\")"
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: a0d8c0f7-3507-4d18-ab0e-0fcfcffcefe2
    - text: 'For rows where ''result'' is ''runs'' or ''wickets'', ''result_margin''
        must be present and a valid positive integer (>= 1). This is required because
        the code casts the margin to an integer for settlement text. Deequ example:
        .satisfies("(result NOT IN (''runs'',''wickets'')) OR (result_margin IS NOT
        NULL AND result_margin >= 1 AND result_margin = floor(result_margin))", "margin_required_for_runs_wickets")'
      sources:
      - start_line: 37
        end_line: 41
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 82af25c8-edf8-48b8-8b9e-952d173fb1d4
    - text: 'For rows with a decided outcome (result in {''runs'',''wickets'',''tie''}),
        ''winner'' must be non-null and must be either ''team1'' or ''team2''. Conversely,
        if result is ''no result'', ''winner'' should be null. Deequ example: .satisfies("(result
        = ''no result'' AND winner IS NULL) OR (result IN (''runs'',''wickets'',''tie'')
        AND winner IS NOT NULL AND (winner = team1 OR winner = team2))", "winner_presence_by_result")'
      sources:
      - start_line: 52
        end_line: 60
        file: ''
      - start_line: 72
        end_line: 74
        file: ''
      - start_line: 44
        end_line: 49
        file: ''
      uid: 6ab2604a-b118-47c9-b602-cb21b5e7deb2
    - text: '''team1'' and ''team2'' must be distinct within a row (no team plays
        itself). This prevents producing settlements like ''Team A beat Team A ...''
        and ensures ''loser'' is well-defined as the other team. Deequ example: .satisfies("team1
        IS NOT NULL AND team2 IS NOT NULL AND team1 <> team2", "teams_distinct_per_match")'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 6d32ce6c-394a-4666-9de9-6e80f843eac8
    - text: 'If ''result'' is ''tie'', it implies a decided winner after a Super Over;
        thus ''winner'' must be non-null and ''super_over'' must be populated (e.g.,
        ''Y''/''YES''). Deequ example: .satisfies("(result <> ''tie'') OR (winner
        IS NOT NULL AND super_over IS NOT NULL AND super_over <> '''')", "tie_requires_super_over_and_winner")'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: e5a6e8d9-b874-4b45-be38-06181992c47b
    - text: "'toss_winner' (when present) must be one of the two teams in the match:\
        \ toss_winner \u2208 {team1, team2}. Deequ example: .satisfies(\"toss_winner\
        \ IS NULL OR (toss_winner = team1 OR toss_winner = team2)\", \"toss_winner_in_pair\"\
        )"
      sources:
      - start_line: 72
        end_line: 74
        file: ''
      uid: 40297a2c-7caf-45e8-b8fc-2dd6697d44e2
  '["toss_decision","toss_winner"]':
    code: []
    assumptions:
    - text: 'The ''toss_decision'' column must be restricted to the canonical set
        {''field'', ''bat''} (lowercase, trimmed), and for every season (season_int)
        present there should be at least one match where the toss decision was ''field''
        and at least one where it was ''bat'', so that the pivot produces both columns
        and ''toss_decision_advantage'' is defined. This can be represented as constraints
        such as: .isContainedIn(''toss_decision'', [''field'',''bat'']) and a per-season
        aggregate check ensuring count_if(toss_decision=''field'') > 0 and count_if(toss_decision=''bat'')
        > 0 for each season_int.'
      sources:
      - start_line: 19
        end_line: 21
        file: ''
      - start_line: 85
        end_line: 92
        file: ''
      - start_line: 95
        end_line: 95
        file: ''
      uid: d323528c-2f0c-4ca8-96c8-a09b1c1aa596
    - text: "For every match, 'toss_winner' must be exactly one of the two participating\
        \ teams, i.e., toss_winner \u2208 {team1, team2}. A suitable constraint is:\
        \ .satisfies(\"toss_winner = team1 OR toss_winner = team2\", \"toss_winner_in_match_teams\"\
        )."
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 454e6858-1f4c-44e0-afee-650dd94a1eb1
    - text: 'For rows used in KPI calculations (result != ''no result''), both ''winner''
        and ''toss_winner'' must be non-null team names from the set {team1, team2}.
        This ensures the equality-based indicator ''toss_winner_won'' is meaningful.
        Example constraint: .satisfies("(result <> ''no result'') -> ((winner IS NOT
        NULL) AND (winner = team1 OR winner = team2) AND (toss_winner = team1 OR toss_winner
        = team2))", "valid_winner_and_toss_winner_when_resulted").'
      sources:
      - start_line: 72
        end_line: 74
        file: ''
      - start_line: 44
        end_line: 47
        file: ''
      uid: 9556ebb6-0d48-474a-93ce-002b9b6a06ba
    - text: 'Team name formatting must be consistent between ''toss_winner'' and ''winner''
        (same case and no leading/trailing whitespace), because ''toss_winner_won''
        relies on a direct string equality without any normalization of those columns.
        Possible constraints: .satisfies("toss_winner = trim(toss_winner) AND winner
        = trim(winner)", "no_outer_spaces_in_team_names") and, optionally, a check
        that team values follow a canonical casing policy.'
      sources:
      - start_line: 18
        end_line: 21
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 54edfba3-d4cd-4904-971c-f4477731fc30
    - text: 'For all rows that contribute to the season- and toss-decision KPIs, ''season''
        must be parseable (season_int is not null). In particular, for rows with result
        != ''no result'', season_int should be present so they are not dropped from
        the group-bys. Example constraint: .satisfies("(result <> ''no result'') ->
        (season_int IS NOT NULL)", "season_int_present_for_kpi_rows").'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 76
        end_line: 82
        file: ''
      - start_line: 85
        end_line: 88
        file: ''
      uid: 9ff51763-4c08-44fa-9380-2a9274eca626
