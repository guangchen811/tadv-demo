      source_assumptions:
      - 557b3163-f254-4416-97d2-41b7c98b42a5
    assumptions:
    - text: The 'target_overs' column should be numeric (fractional) for virtually
        all rows. Non-numeric values (that would be coerced to null by to_numeric)
        should be rare (e.g., at least 99.5% of records are numeric/parseable). This
        can be validated by enforcing a numeric data type (e.g., Deequ hasDataType
        Fractional) or a high compliance for a parseable-to-number check.
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      uid: 3af4eb02-5046-4c21-b149-83c98b2bd09e
    - text: 'For rows that contribute to KPIs (i.e., where result != ''no result''),
        ''target_overs'' must be present (not null) and strictly greater than 0 to
        avoid divide-by-zero or undefined required run rate. This can be represented
        as a conditional check with 100% compliance: CASE WHEN result <> ''no result''
        THEN (target_overs IS NOT NULL AND target_overs > 0) ELSE TRUE END.'
      sources:
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 72
        end_line: 82
        file: ''
      uid: 0ec51f64-8082-4ada-8347-4184baa6efa7
    - text: Overall completeness of 'target_overs' should be very high (e.g., at least
        99.5% non-null), since it is used to compute required run rate and season
        averages without any imputation. This can be enforced with a completeness
        constraint (non-null ratio >= 0.995).
      sources:
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 76
        end_line: 82
        file: ''
      uid: 8e8b2511-82af-43dd-a218-91a54b1db8f8
    - text: '''target_overs'' should never be negative. When present, values must
        be >= 0 to ensure the required run rate is meaningful. This can be enforced
        as a non-negativity constraint with high (ideally 100%) compliance.'
      sources:
      - start_line: 70
        end_line: 70
        file: ''
      uid: 557b3163-f254-4416-97d2-41b7c98b42a5
