      source_assumptions:
      - 1cba0285-13df-4037-847f-95141c14aeaf
    assumptions:
    - text: 'For any row where result is ''runs'' or ''wickets'', the result_margin
        must be present (non-null) and numeric-parsable; otherwise int(...) on the
        margin used to build settlement text will fail. Deequ-style example: .satisfies("CASE
        WHEN lower(`result`) IN (''runs'',''wickets'') THEN CASE WHEN `result_margin`
        IS NOT NULL AND CAST(`result_margin` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0
        END ELSE 1 END", "Margin present and numeric for wins", lambda x: x == 1)'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 58
        end_line: 60
        file: ''
      uid: 68ff7127-413d-456c-b4db-51abd363311e
    - text: 'For any row where result is ''runs'' or ''wickets'', the result_margin
        must be an integer (no fractional component), because it is cast to pandas
        Int64 and then to a Python int for settlement text. Deequ-style example: .satisfies("CASE
        WHEN lower(`result`) IN (''runs'',''wickets'') THEN CASE WHEN CAST(`result_margin`
        AS DOUBLE) = FLOOR(CAST(`result_margin` AS DOUBLE)) THEN 1 ELSE 0 END ELSE
        1 END", "Integer margin for wins", lambda x: x == 1)'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 41
        end_line: 41
        file: ''
      - start_line: 58
        end_line: 60
        file: ''
      uid: 4751d0fa-4112-4a61-8c7b-ec146f0ee201
    - text: 'For any row where result is ''runs'' or ''wickets'', the result_margin
        should be strictly positive (>= 1), since a win by zero or negative runs/wickets
        is invalid domain-wise and would produce nonsensical settlement text. Deequ-style
        example: .satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'') THEN
        CASE WHEN CAST(`result_margin` AS DOUBLE) >= 1 THEN 1 ELSE 0 END ELSE 1 END",
        "Positive margin for wins", lambda x: x == 1)'
      sources:
      - start_line: 58
        end_line: 60
        file: ''
      uid: bd58d0db-61f7-4b82-8587-a642fca75f6c
    - text: 'Overall, result_margin should be mostly populated (high completeness)
        to match expected data profile and because the column is parsed and exported.
        Aim for at least 98% non-null values. Deequ-style example: .hasCompleteness("result_margin",
        lambda v: v >= 0.98)'
      sources:
