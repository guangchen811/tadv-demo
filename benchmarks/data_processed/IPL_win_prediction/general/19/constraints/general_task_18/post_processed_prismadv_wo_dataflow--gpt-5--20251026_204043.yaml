    assumptions:
    - text: The team1 column must be complete (no nulls) and contain non-empty, non-whitespace
        strings. The code compares team1 to other columns and uses it to derive batting
        order and loser without any null handling, so blanks or nulls would lead to
        incorrect outputs. This can be validated with checks like completeness(team1)
        = 1.0 and length(trim(team1)) > 0 for all rows.
      sources:
      - start_line: 22
        end_line: 33
        file: ''
      - start_line: 35
        end_line: 39
        file: ''
      - start_line: 86
        end_line: 86
        file: ''
      uid: 49c88e8a-352c-48ae-b946-abe6f13a3e29
    - text: team1 and team2 must be different for every row (two distinct teams per
        match). The code toggles between team1 and team2 to derive batting_second
        and loser; if they are equal, these derivations become invalid. This can be
        validated with a row-level constraint team1 <> team2.
      sources:
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 35
        end_line: 39
        file: ''
      - start_line: 86
        end_line: 87
        file: ''
