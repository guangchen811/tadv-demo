      - start_line: 109
        end_line: 114
        file: ''
      uid: ab9385cb-62a2-4179-bc25-f7889c9c516d
    - text: 'For rows with result == ''runs'', result_margin should be a positive
        whole number (>= 1). Deequ example: .satisfies("CASE WHEN result = ''runs''
