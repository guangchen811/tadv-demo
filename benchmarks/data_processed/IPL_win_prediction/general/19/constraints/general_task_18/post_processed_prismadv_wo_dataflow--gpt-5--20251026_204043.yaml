    - text: 'When result is not ''no result'', loser must be non-null and equal to
        the other team (i.e., (winner = team1 AND loser = team2) OR (winner = team2
        AND loser = team1)); when result is ''no result'', loser must be null. Constraint
        example: CASE WHEN result = ''no result'' THEN loser IS NULL ELSE ((winner
        = team1 AND loser = team2) OR (winner = team2 AND loser = team1)) END.'
      sources:
