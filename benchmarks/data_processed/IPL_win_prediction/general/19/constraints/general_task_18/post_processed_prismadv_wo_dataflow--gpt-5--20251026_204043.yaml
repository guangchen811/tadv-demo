    - text: "Consistency between 'toss_winner', 'toss_decision', and the derived innings:\
        \ if toss_decision = 'bat', the toss_winner must bat first; if toss_decision\
        \ = 'field', the non\u2013toss-winner must bat first. After deriving 'batting_first'\
