        end_line: 75
        file: ''
      uid: 0562554d-d431-4f57-9970-830bad05eb3a
    - text: 'Toss-driven innings consistency: toss_winner must be either team1 or
        team2; toss_decision must be ''bat'' or ''field''. If toss_decision=''bat'',
        batting_first must equal toss_winner; if toss_decision=''field'', batting_first
        must equal the other team. batting_first and batting_second must both be in
        {team1, team2} and be different (batting_second is always the other team).
        Example Deequ constraints: .satisfies("toss_winner IN (team1, team2)", ''toss_winner_in_teams'');
        .satisfies("toss_decision IN (''bat'',''field'')", ''valid_toss_decision'');
        .satisfies("(toss_decision=''bat'') => batting_first = toss_winner", ''batting_first_when_bat'');
        .satisfies("(toss_decision=''field'') => ((toss_winner=team1 AND batting_first=team2)
        OR (toss_winner=team2 AND batting_first=team1))", ''batting_first_when_field'');
        .satisfies("batting_first <> batting_second AND batting_first IN (team1,team2)
        AND batting_second IN (team1,team2)", ''valid_innings_pair'').'
      sources:
      - start_line: 22
        end_line: 33
        file: ''
      uid: 5eb549f8-eaea-46f4-a281-9343147593b3
    - text: "Duckworth\u2013Lewis method requirements: If method == 'D/L', both target_runs\
