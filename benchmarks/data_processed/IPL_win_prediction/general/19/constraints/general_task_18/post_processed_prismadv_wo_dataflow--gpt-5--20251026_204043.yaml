    - text: 'Wickets-specific margin range: If result == ''wickets'', result_margin
        must be an integer in the range [1, 10] (a team can win by at most 10 wickets).
        Example Deequ constraint: .satisfies("(result = ''wickets'') => cast(result_margin
        as int) BETWEEN 1 AND 10", ''wicket_margin_range'').'
      sources:
      - start_line: 71
        end_line: 73
        file: ''
      uid: 7239cfff-6a81-49aa-8103-d9e0936da436
    - text: 'Winner/loser consistency with teams: For rows where result != ''no result'',
        winner and loser must both be non-null, distinct, and each must be one of
        {team1, team2}; moreover, loser must be the other team (i.e., (winner = team1
        AND loser = team2) OR (winner = team2 AND loser = team1)). For rows where
        result == ''no result'', loser must be null. Example Deequ constraints: .satisfies("(result
        <> ''no result'') => winner IS NOT NULL AND loser IS NOT NULL AND winner <>
        loser", ''winner_loser_not_null_and_distinct''); .satisfies("(result <> ''no
        result'') => (winner IN (team1, team2) AND loser IN (team1, team2))", ''winner_loser_in_teams'');
        .satisfies("(result <> ''no result'') => ((winner = team1 AND loser = team2)
        OR (winner = team2 AND loser = team1))", ''winner_loser_pairing''); .satisfies("(result
        = ''no result'') => loser IS NULL", ''loser_null_when_no_result'').'
      sources:
      - start_line: 35
        end_line: 39
        file: ''
      - start_line: 68
        end_line: 73
        file: ''
      uid: 52dfeaf3-3153-4a73-af13-a451e561c51a
    - text: 'Tie requires a winner: If result == ''tie'', there must be a non-null
        winner (Super Over outcome). Example Deequ constraint: .satisfies("(result
