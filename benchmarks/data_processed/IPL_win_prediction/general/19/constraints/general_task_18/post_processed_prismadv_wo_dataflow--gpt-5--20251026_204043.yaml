    - text: 'When result != ''no result'', the winner must equal either team1 or team2
        (exact string match). The loser derivation assumes the winner is one of the
        two teams; otherwise the computed loser will be wrong and the summary text
        will be incorrect. Validate with a conditional rule: if result <> ''no result''
        then (winner in {team1, team2}).'
      sources:
      - start_line: 35
        end_line: 39
        file: ''
      - start_line: 68
        end_line: 73
        file: ''
      uid: 248d2b40-9d66-414e-8afd-9e904f0ce67f
    - text: The toss_winner must equal either team1 or team2 (exact string match).
        Toss side and batting order are derived from a direct equality check with
        team1/team2; values outside these two will misclassify the toss side and innings
        order. Validate with toss_winner in {team1, team2}.
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 24
        end_line: 31
        file: ''
      uid: 6b0d0557-eda0-457f-81e2-733eb5c9ce9c
    - text: team1 values should be consistently formatted to enable exact matches
        across columns (trimmed, correct casing, and not placeholders like '', 'NaN',
