    assumptions:
    - text: 'Result/result_margin consistency: When result is ''runs'' or ''wickets'',
        result_margin must be present, castable to a number, and represent a whole
        number >= 1. When result is ''tie'' or ''no result'', result_margin must be
        null. Example Deequ constraints: .satisfies("(result IN (''runs'',''wickets''))
