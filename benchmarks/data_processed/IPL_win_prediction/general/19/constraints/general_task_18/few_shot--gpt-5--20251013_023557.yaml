constraints:
  date:
    code:
    - - .hasPattern('date', '^\d{4}-\d{2}-\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL ELSE true END", ''margin_present_when_needed'', lambda v: v ==
        1.0)'
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - '.satisfies("CASE WHEN method = ''D/L'' THEN target_overs IS NOT NULL AND
        target_overs > 0 AND target_overs <= 50 ELSE true END", ''dl_has_target_overs'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  target_runs:
    code:
    - - '.satisfies("CASE WHEN method = ''D/L'' THEN target_runs IS NOT NULL AND target_runs
        > 0 ELSE true END", ''dl_has_target_runs'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - '.satisfies("toss_winner = team1 OR toss_winner = team2", ''toss_winner_in_teams'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.satisfies("CASE WHEN result <> ''no result'' THEN winner IS NOT NULL ELSE
        true END", ''winner_present_unless_no_result'', lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("winner IS NULL OR winner = team1 OR winner = team2", ''winner_is_one_of_teams'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
