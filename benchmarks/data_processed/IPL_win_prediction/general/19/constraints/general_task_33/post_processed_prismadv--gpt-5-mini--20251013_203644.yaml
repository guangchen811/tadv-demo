fixing_results:
  match_type:
    70d4eb88-1d38-402b-87bf-ddd5438ae29f: '.satisfies("`match_type` = ''League''",
      "has_at_least_one_league", lambda x: x > 0.0)'
  target_overs:
    817fdabc-eef6-4ed5-8f5c-696657529871: '.satisfies("CASE WHEN `match_type` = ''League''
      AND `result` = ''runs'' THEN CASE WHEN `target_overs` IS NOT NULL AND NOT isnan(`target_overs`)
      AND `target_overs` > 0 THEN 1 ELSE 0 END ELSE 1 END", "league_runs_target_overs_present_positive",
      lambda x: x == 1)'
  target_runs:
    f847e567-2c29-4eb0-b272-da256d4240c7: '.satisfies(''CASE WHEN `target_runs` IS
      NULL OR (cast(`target_runs` AS double) IS NOT NULL AND NOT isnan(cast(`target_runs`
      AS double))) THEN 1 ELSE 0 END'', ''target_runs_numeric_or_null'', lambda x:
      x == 1.0)'
  season:
    342b26e5-761b-4d6b-9390-60c2f89b32fe: '.isNonNegative(''season'', lambda x: x
      == 1)'
  result:
    9da9f9d7-0f56-4e8d-a7f0-b5cea4ca0c7a: '.satisfies("CASE WHEN `result` = ''runs''
      THEN (result_margin IS NOT NULL AND target_overs IS NOT NULL AND target_overs
      > 0) ELSE true END", ''runs_result_margin_and_target_valid'', lambda x: x ==
      1)'
    423079eb-7390-4f42-b2d0-44c8e9ceca31: '.satisfies("CASE WHEN `result` = ''wickets''
      THEN result_margin IS NOT NULL ELSE true END", ''wickets_result_margin_present'',
      lambda x: x == 1)'
    912be14e-c74b-436d-b9b0-21756d6b45ed: '.satisfies("CASE WHEN `result` = ''tie''
      THEN (winner IS NOT NULL AND (winner = team1 OR winner = team2)) ELSE TRUE END",
      ''tie_winner_refers_to_team'', lambda x: x == 1)'
