      - start_line: 51
        end_line: 55
        file: ''
      uid: 9d556d8f-4d7c-417a-9bfa-121ca6b2953d
    - text: 'When ''result'' == ''wickets'', ''result_margin'' must be present and
        numeric and should be in the plausible range for wickets (1 through 10). The
        code uses result_margin / 10.0 (nrr_wkts), so missing or out-of-range values
        will break the intended metric. Example Deequ predicate: .satisfies("result
        != ''wickets'' OR (result_margin IS NOT NULL AND result_margin >= 1 AND result_margin
        <= 10)").'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 45
        end_line: 46
        file: ''
      uid: 70b596e8-06b4-4e31-bcbe-72b0a3bd16ad
    - text: 'For all non-''no result'' matches (i.e., result in [''runs'', ''wickets'',
        ''tie'']), the ''winner'' field must be present and identify one of the participating
        teams (team1 or team2). The code compares ''team'' to ''winner'' and uses
        that to assign points, wins/losses, and NRR contributions. Example Deequ predicate:
        .satisfies("result = ''no result'' OR (winner IS NOT NULL AND (winner = team1
        OR winner = team2))").'
      sources:
      - start_line: 37
        end_line: 47
        file: ''
      - start_line: 51
        end_line: 56
        file: ''
      - start_line: 26
        end_line: 35
        file: ''
      uid: 060810a2-d977-4f2e-bf1f-544c4713eac1
    - text: 'For ''result'' == ''tie'', there must be a deterministic super-over winner
        recorded in ''winner'' (non-null and equal to one of team1/team2). The code
        treats ties specially (small fixed nrr_delta for winner/loser and tracks so_win
        where (result == ''tie'') & (team == winner)). Example Deequ predicate: .satisfies("result
        != ''tie'' OR (winner IS NOT NULL AND (winner = team1 OR winner = team2))").'
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 57
        end_line: 58
        file: ''
      - start_line: 31
        end_line: 34
        file: ''
      uid: c87da9e2-226d-4588-b3cc-71558c0da85d
  '["result","team1","team2","winner"]':
    code: []
    assumptions:
    - text: 'For league matches (match_type == ''League''), whenever result != ''no
        result'', the ''winner'' field must equal either ''team1'' or ''team2'' (i.e.,
        the winner must be one of the two teams in the match). Actionable constraint
        example (Deequ-style): .satisfies(''!(match_type == "League" && result !=
        "no result") || winner == team1 || winner == team2'').'
      sources:
      - start_line: 25
        end_line: 46
        file: ''
      uid: 78752a06-f88a-416c-b60e-4d709aac35b0
    - text: 'When result == ''no result'', there should be no winner recorded (winner
        is null/empty). This prevents treating a ''no result'' as a won match when
        computing points. Actionable constraint example: .satisfies(''result == "no
        result" ==> isNull(winner)'').'
      sources:
      - start_line: 37
        end_line: 43
        file: ''
      uid: b8c67c21-910e-4a70-96a4-f374a2930ea0
    - text: 'For league matches, both team1 and team2 must be present (non-null) and
        must not be the same team (team1 != team2). This is required because rows
        are expanded to team-centric rows and later aggregated by team. Actionable
        constraint example: .satisfies(''match_type == "League" ==> team1 IS NOT NULL
        AND team2 IS NOT NULL AND team1 != team2'').'
      sources:
      - start_line: 25
        end_line: 35
        file: ''
      - start_line: 61
        end_line: 69
        file: ''
      uid: e261cbb6-c298-4217-b10f-45a2ecef3bb4
    - text: 'When result == ''runs'', result_margin and target_overs must be present
        and target_overs must be > 0; when result == ''wickets'', result_margin must
        be present. These are required for the nrr_proxy_delta calculation. Actionable
        constraint example: .satisfies(''!(result == "runs") || (result_margin IS
        NOT NULL AND target_overs IS NOT NULL AND target_overs > 0)'') and .satisfies(''!(result
        == "wickets") || (result_margin IS NOT NULL)'').'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 51
        end_line: 53
        file: ''
      uid: ff747be0-da1a-4668-8f01-6020fbe7b9f4
    - text: 'For result == ''tie'' there must be a recorded winner (the super-over
        winner) and that winner must equal team1 or team2. This is required for so_win
        and tie handling. Actionable constraint example: .satisfies(''result == "tie"
        ==> (winner IS NOT NULL AND (winner == team1 OR winner == team2))'').'
      sources:
      - start_line: 54
        end_line: 58
        file: ''
      - start_line: 39
        end_line: 46
        file: ''
      uid: c361ea80-90d6-4ec0-b6d5-cf1d8ff8177e
  '["team1","team2"]':
    code: []
    assumptions:
    - text: 'Each match row must have both ''team1'' and ''team2'' populated and they
        must refer to two different teams (a team should not play itself). Actionable
        constraints examples: ensure completeness of both columns and assert per-row
        inequality, e.g. Deequ-style: .isComplete(["team1","team2"]) and .satisfies("team1
        != team2", "teams_different").'
      sources:
      - start_line: 27
        end_line: 34
        file: ''
      uid: 225ad351-79c0-4995-96ef-0f592821aaf0
    - text: 'The ''winner'' column, when present (and for matches that are not ''no
        result''), must match one of the two teams in that match (either ''team1''
        or ''team2''). This is required because downstream logic compares the per-team
        row (''team'' derived from team1/team2) to ''winner'' to compute points/wins.
        Actionable constraint example: .satisfies("result = ''no result'' OR winner
        = team1 OR winner = team2", "winner_is_one_of_teams").'
      sources:
      - start_line: 27
        end_line: 35
        file: ''
      - start_line: 38
        end_line: 46
        file: ''
      uid: b8d92dcd-b575-4d55-9b84-64dac7e8ea88
    - text: 'For matches where result == ''runs'', both ''result_margin'' and ''target_overs''
        must be numeric and ''target_overs'' must be greater than zero (to avoid division
        by zero and produce valid nrr_proxy_delta). Actionable constraint example:
        .satisfies("NOT(result = ''runs'') OR (target_overs IS NOT NULL AND target_overs
        > 0 AND result_margin IS NOT NULL)", "runs_margin_target_valid").'
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      uid: 40401692-c378-4709-8ea6-53f5721a35f9
    - text: 'For matches where result == ''tie'', the ''winner'' field is expected
        to represent the super-over winner and therefore must be non-null and equal
        to either ''team1'' or ''team2''. Actionable constraint example: .satisfies("NOT(result
        = ''tie'') OR (winner = team1 OR winner = team2)", "tie_winner_valid").'
      sources:
      - start_line: 54
        end_line: 59
        file: ''
      uid: 25339e76-9e6b-4f9f-8371-7facfafe9a7b
