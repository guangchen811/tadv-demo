constraints:
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("result NOT IN ('runs', 'wickets') OR result_margin IS NOT NULL",
        'margin_not_null_for_decisive_results')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner_is_a_playing_team')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("result = 'no result' OR winner IS NOT NULL", 'winner_is_not_null_for_played_matches')
      - Valid
    - - .satisfies("winner IS NULL OR winner = team1 OR winner = team2", 'winner_must_be_a_participating_team')
      - Valid
    assumptions: []
