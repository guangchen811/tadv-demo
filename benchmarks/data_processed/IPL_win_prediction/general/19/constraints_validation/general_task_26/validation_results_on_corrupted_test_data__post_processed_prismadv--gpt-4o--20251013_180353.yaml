results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: undefined
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''team2''], lambda x: x <= 19 / 550)'
      status: false
      reason_if_failed: 'Constraint ''hasDistinctness([''team2''], lambda x: x <=
        19 / 550)'' failed on data sample: Value: 0.04904632152588556 does not meet
        the constraint requirement!'
      level: warning
  match_type:
    code:
    - suggestion: .isContainedIn('match_type', ['Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      status: true
      reason_if_failed: ''
      level: undefined
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''target_overs'', lambda x:
        x >= 0.998)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: undefined
    - suggestion: .isPositive('target_overs')
      status: true
      reason_if_failed: ''
      level: undefined
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies('CASE WHEN result IN ("runs", "wickets") THEN result_margin
        >= 0 ELSE TRUE END', 'Non-negative result_margin for runs or wickets')
      status: true
      reason_if_failed: ''
      level: undefined
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''target_runs'', lambda x: x
        >= 0.998)'' failed on data sample: Value: 0.9918256130790191 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: .satisfies('(`target_runs` IS NOT NULL) OR (`target_overs` = 0)
        OR (`target_runs` IS NULL AND `target_overs` IS NULL)', 'Non-null target_runs
        when target_overs is non-zero')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''(`target_runs` IS NOT NULL) OR (`target_overs`
        = 0) OR (`target_runs` IS NULL AND `target_overs` IS NULL)'', ''Non-null target_runs
        when target_overs is non-zero'')'' failed on data sample: Value: 0.997275204359673
        does not meet the constraint requirement!'
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies(''`date` is not NULL'', ''Complete date column'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: .satisfies('CAST(`season` AS INT) IS NOT NULL', 'Valid Season Int
        Conversion')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CAST(`date` AS DATE) IS NOT NULL', 'Valid Date Conversion')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.9981818181818182)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''winner'', lambda x: x >= 0.9981818181818182)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'', ''tie'',
        ''no result'') THEN 1 ELSE 0 END", "Valid Result Values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["is_final","match_type"]':
    code:
    - suggestion: '.satisfies(''CASE WHEN `match_type` = "Final" THEN TRUE ELSE TRUE
        END'', ''Match Type Final Consistency'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  '["margin_runs","margin_wickets","result","result_margin"]':
    code:
    - suggestion: .satisfies("(result = 'runs' AND result_margin IS NOT NULL) OR (result
        = 'wickets' AND result_margin IS NOT NULL) OR (result != 'runs' AND result
        != 'wickets')", "Non-null Result Margin for Runs or Wickets")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","toss_winner","toss_winner_is_team1"]':
    code:
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'Toss winner
        should be one of the participating teams')
      status: true
      reason_if_failed: ''
      level: error
