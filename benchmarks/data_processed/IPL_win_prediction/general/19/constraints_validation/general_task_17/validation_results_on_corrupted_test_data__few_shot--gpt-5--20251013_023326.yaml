results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .hasDataType('id', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive('id')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("method IS NULL OR method = 'D/L'", "method_null_or_DL")
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("CASE WHEN lower(result) IN ('runs','wickets') THEN result_margin
        IS NOT NULL AND result_margin > 0 ELSE TRUE END", "positive_margin_when_decided_results")
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN method = 'D/L' THEN target_overs IS NOT NULL
        AND target_overs > 0 ELSE TRUE END", "target_overs_present_and_positive_when_DL")
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Constraint ''.hasDataType(''target_runs'', ConstrainableDataTypes.Fractional)''
        failed on data sample: Value: 0.9725274725274725 does not meet the constraint
        requirement!'
      level: error
    - suggestion: .satisfies("CASE WHEN method = 'D/L' AND target_runs IS NOT NULL
        THEN target_runs > 0 ELSE TRUE END", "target_runs_positive_if_present_when_DL")
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_belongs_to_teams")
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("CASE WHEN lower(result) IN ('runs','wickets') THEN winner
        IS NOT NULL AND (winner = team1 OR winner = team2) ELSE TRUE END", "winner_present_and_valid_for_decided_results")
      status: true
      reason_if_failed: ''
      level: error
