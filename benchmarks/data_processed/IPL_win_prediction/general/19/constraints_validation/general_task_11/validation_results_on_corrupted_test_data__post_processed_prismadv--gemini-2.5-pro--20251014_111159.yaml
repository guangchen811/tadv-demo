results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "winner_check", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_are_distinct", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team2` = trim(`team2`)", "team2_is_trimmed", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("`target_overs` IS NULL OR `target_overs` != 0", "''target_overs''
        should not be 0 to avoid division by zero", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("`result_margin` IS NULL OR `result_margin` % 1 = 0",
        "`result_margin` should be a whole number or null")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("NOT (`result` IN ('runs', 'wickets') AND `result_margin`
        IS NULL)", "`result_margin` must be present when result is 'runs' or 'wickets'")
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''target_runs'', assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn("toss_decision", ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.satisfies("trim(upper(super_over)) IN (''Y'', ''N'')", "''super_over''
        can be normalized to Y or N", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_a_participating_team", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("to_date(`date`) IS NOT NULL", "date_is_parsable", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.satisfies("`method` IS NULL OR `method` IN (''D/L'', '''', ''NA'',
        ''NaN'', ''nan'', ''NULL'', ''Null'', ''null'', ''None'', ''NullValue'')",
        "Method column contains expected values or null representations", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("year(to_date(`date`)) == `season`", "Year derived from
        ''date'' should match ''season''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("result = ''no result'' OR winner IS NOT NULL", "Winner
        must exist if there is a result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "Winner must be a participant", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.satisfies("LOWER(TRIM(result)) IN (''runs'', ''wickets'', ''tie'',
        ''no result'')", "result_in_allowed_set", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("LOWER(TRIM(result)) = ''no result''", "low_proportion_of_no_result",
        lambda x: x < 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["method","result"]':
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR result_margin
        IS NOT NULL", "result_margin must be populated for ''runs'' or ''wickets''
        results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result = ''no result'' OR (winner IS NOT NULL AND toss_winner
        IS NOT NULL)", "winner and toss_winner must be populated for resulted matches",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN result_margin
        IS NOT NULL ELSE result_margin IS NULL END", "result_margin completeness is
        conditional on result", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR result_margin
        IS NOT NULL", "ResultMarginCompleteness", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "WinnerIsOneOfTheTeams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result = ''no result'' OR winner IS NOT NULL", "WinnerCompletenessForResultedMatches",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("(result = ''tie'' AND super_over = ''Y'') OR (result
        <> ''tie'' AND super_over = ''N'')", "ResultAndSuperOverConsistency", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","winner"]':
    code:
    - suggestion: '.satisfies("(result = ''no result'' AND winner IS NULL) OR (result
        IN (''runs'', ''wickets'', ''tie'') AND winner IS NOT NULL)", "winner_result_consistency",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "winner_must_be_a_participant", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["season","toss_decision","toss_winner","winner"]':
    code:
    - suggestion: '.satisfies("`result` = ''no result'' OR `winner` IS NOT NULL",
        "WinnerRequiredForResultedMatches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`winner` IS NULL OR `winner` = `team1` OR `winner`
        = `team2`) AND (`toss_winner` = `team1` OR `toss_winner` = `team2`)", "WinnersAreValidTeams",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_decision` IN (''field'', ''bat'')", "TossDecisionDomain",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("(`target_runs` IS NULL AND `target_overs` IS NULL)
        OR (`target_runs` IS NOT NULL AND `target_overs` > 0)", "target_runs_and_overs_must_be_valid_for_division",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`target_runs` IS NULL AND `target_overs`
        IS NULL) OR (`target_runs` IS NOT NULL AND `target_overs` > 0)", "target_runs_and_overs_must_be_valid_for_division",
        lambda x: x == 1)'' failed on data sample: Value: 0.997275204359673 does not
        meet the constraint requirement!'
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_participant", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_are_different", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "WinnerMustBeParticipant", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "TeamsMustBeDifferent", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["toss_winner","winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_participant", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`winner` IS NULL OR `winner` = `team1` OR `winner`
        = `team2`", "winner_is_participant", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`result` = ''no result'' OR `winner` IS NOT NULL",
        "winner_not_null_for_results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
