results:
  team1:
    code:
    - suggestion: '.satisfies("CASE WHEN `team1` IS NOT NULL THEN 1 ELSE 0 END", "team1_not_null",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `team1` != `team2` THEN 1 ELSE 0 END", "team1_ne_team2",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(`team1`) = `team1` THEN 1 ELSE 0 END",
        "team1_trimmed", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRIM(COALESCE(team2, '''')) <> '''' THEN
        1 ELSE 0 END", "team2_not_blank", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN team1 IS NOT NULL AND team2 IS NOT NULL AND
        team1 <> team2 THEN 1 ELSE 0 END", "team1_team2_distinct", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NOT NULL THEN CASE WHEN winner
        = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END", "winner_matches_team1_or_team2",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CAST(target_overs AS DOUBLE) IS NOT NULL", "target_overs_is_numeric",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result != ''no result'' AND target_overs
        > 0 THEN 1 ELSE 0 END", "positive_target_overs_for_resulted_matches", lambda
        x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN result != ''no result''
        AND target_overs > 0 THEN 1 ELSE 0 END", "positive_target_overs_for_resulted_matches",
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.hasCompleteness("target_overs", lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("target_overs", lambda x: x
        >= 0.998)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result_margin IS NULL THEN 1 WHEN try_cast(result_margin
        AS double) IS NOT NULL THEN 1 ELSE 0 END", "result_margin_is_numeric_or_null",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN result_margin IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "margin_present_for_resulted_matches",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN result_margin IS NOT NULL AND floor(result_margin) = result_margin THEN
        1 ELSE 0 END ELSE 1 END", "margin_is_integer_for_resulted_matches", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CASE
        WHEN result_margin >= 1 THEN 1 ELSE 0 END ELSE 1 END", "margin_positive_for_resulted_matches",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''no result'',''tie'') THEN CASE
        WHEN result_margin IS NULL THEN 1 ELSE 0 END ELSE 1 END", "no_margin_for_void_or_tie",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_runs` >= 0 OR `target_runs` IS NULL
        THEN 1 ELSE 0 END", "Non-negative target_runs", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `target_runs` >= 0 OR `target_runs`
        IS NULL THEN 1 ELSE 0 END", "Non-negative target_runs", lambda x: x == 1)''
        failed on data sample: Value: 0.9727520435967303 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL OR floor(`target_runs`)
        = `target_runs` THEN 1 ELSE 0 END", "Integer-valued target_runs (>=99%)",
        lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `target_runs` IS NULL OR
        floor(`target_runs`) = `target_runs` THEN 1 ELSE 0 END", "Integer-valued target_runs
        (>=99%)", lambda x: x >= 0.99)'' failed on data sample: Value: 0.9727520435967303
        does not meet the constraint requirement!'
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(cast(`toss_decision` AS STRING)))
        IN (''field'',''bat'') THEN 1 ELSE 0 END", "Toss decision is one of [''field'',''bat'']
        after normalization", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.satisfies("CASE WHEN `super_over` IS NOT NULL THEN 1 ELSE 0 END",
        "super_over_not_null", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN upper(trim(`super_over`)) IN (''Y'',''N'')
        THEN 1 ELSE 0 END", "super_over_domain", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN upper(trim(`super_over`)) = ''Y'' THEN 1
        ELSE 0 END", "super_over_Y_rate", lambda x: x <= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN CASE WHEN
        `toss_winner` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "toss_winner_present_for_resulted_matches",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` = `team1` OR `toss_winner`
        = `team2` THEN 1 ELSE 0 END", "toss_winner_is_one_of_participating_teams",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` IS NOT NULL THEN CASE WHEN
        trim(`toss_winner`) = `toss_winner` THEN 1 ELSE 0 END ELSE 1 END", "toss_winner_no_leading_trailing_whitespace",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL AND lower(trim(`toss_winner`))
        = lower(trim(`winner`)) THEN CASE WHEN `toss_winner` = `winner` THEN 1 ELSE
        0 END ELSE 1 END", "toss_winner_format_consistent_with_winner_when_equal_ignoring_case",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: .areComplete(['date'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN to_timestamp(`date`) IS NOT NULL THEN 1
        ELSE 0 END'', ''Parseable date'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN CASE WHEN
        `season` RLIKE ''^[0-9]+$'' THEN 1 ELSE 0 END ELSE 1 END", "Season numeric
        for resulted matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `season` RLIKE ''^[0-9]+$'' THEN 1 ELSE 0
        END", "Season integral", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL OR `method` IN ('''', ''NA'',
        ''NaN'', ''nan'', ''NULL'', ''Null'', ''null'', ''None'', ''NullValue'', ''D/L'')
        THEN 1 ELSE 0 END", "Method allowed values and missing tokens only", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `method` IS NOT NULL THEN 1 ELSE 0 END",
        "Method non-null rate <= 5%", lambda x: x <= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: '.satisfies("CASE WHEN `id` IS NOT NULL THEN 1 ELSE 0 END", "Id
        column exists", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies(''CASE WHEN `winner` IS NOT NULL THEN 1 ELSE 0 END'',
        ''Non-null winner fraction'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN `winner` IS NOT NULL THEN
        1 ELSE 0 END'', ''Non-null winner fraction'', lambda x: x >= 0.99)'' failed
        on data sample: Value: 0.989100817438692 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `result` IN (\''runs\'', \''wickets\'',
        \''tie\'') THEN CASE WHEN `winner` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END'',
        ''Winner present for decided matches'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `result` IN (\''runs\'', \''wickets\'',
        \''tie\'') THEN CASE WHEN (`winner` = `team1`) OR (`winner` = `team2`) THEN
        1 ELSE 0 END ELSE 1 END'', ''Winner equals team1 or team2 for decided matches'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `result` IN (\''runs\'', \''wickets\'',
        \''tie\'') THEN CASE WHEN trim(lower(`winner`)) = lower(`team1`) OR trim(lower(`winner`))
        = lower(`team2`) THEN 1 ELSE 0 END ELSE 1 END'', ''Winner matches team1/team2
        after trimming and lowercasing (formatting consistency)'', lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IS NOT NULL THEN 1 ELSE 0 END",
        "Result completeness", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "Result in allowed set", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
