results:
  team1:
    code:
    - suggestion: '.satisfies("(`team2` IS NULL) OR (`team1` <> `team2`)", "no self
        matches between team1 and team2", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("LENGTH(TRIM(COALESCE(`team1`, ''''))) > 0", "team1
        non-empty after trimming", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN (`winner`
        = `team1` OR `winner` = `team2`) ELSE TRUE END", "winner must be one of the
        two teams for decided results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`team2` IS NOT NULL AND `team2` NOT IN ('''', ''NA'',
        ''NaN'', ''null'', ''NULL'', ''NullValue'')", "team2 present and not a sentinel
        null", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`team1` IS NULL OR `team2` IS NULL) OR (`team2` <>
        `team1`)", "team1 and team2 are different when both present", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(NOT (`result` IN (''runs'',''wickets'')) OR (`winner`
        = `team1` OR `winner` = `team2`))", "winner must be one of the two teams for
        decided matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''match_type'', [''League'', ''Final'', ''Qualifier
        1'', ''Qualifier 2'', ''Eliminator'', ''Semi Final'', ''Elimination Final''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`match_type` = ''League''", ''has_at_least_one_league_match'',
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda c: c >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''target_overs'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`target_overs` IS NULL OR `target_overs` <= 20.0",
        "target_overs_at_most_20_nonnull", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("(result != ''runs'') OR (result_margin IS NOT NULL
        AND result_margin > 0)", "result_margin present and positive for runs", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result_margin` IS NULL) OR (`result_margin` >= 0)",
        "result_margin non-negative when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("result_margin", lambda c: c >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("result_margin", lambda c: c
        >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isPositive(''target_runs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'')
        THEN `target_runs` IS NOT NULL ELSE TRUE END", "target_runs present for decided/tied
        matches", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`target_runs` IS NULL) OR (`target_runs` = CAST(`target_runs`
        AS BIGINT))", "target_runs are integral values", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' AND `result_margin` IS
        NOT NULL THEN `target_runs` >= `result_margin` + 1 ELSE TRUE END", "target_runs
        consistent with result_margin for runs", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `result` = ''runs'' AND
        `result_margin` IS NOT NULL THEN `target_runs` >= `result_margin` + 1 ELSE
        TRUE END", "target_runs consistent with result_margin for runs", lambda x:
        x >= 0.99)'' failed on data sample: Value: 0.9863760217983651 does not meet
        the constraint requirement!'
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative(''season'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("(`result` NOT IN (''runs'',''wickets'')) OR ((`winner`
        = `team1`) OR (`winner` = `team2`))", "winner_is_one_of_teams_when_result_decided",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` NOT IN (''tie'',''no result'')) OR (`winner`
        IS NULL)", "no_winner_on_tie_or_no_result", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result` NOT IN (''tie'',''no result''))
        OR (`winner` IS NULL)", "no_winner_on_tie_or_no_result", lambda x: x >= 0.99)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.hasCompleteness("winner", lambda c: c >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("winner", lambda c: c >= 0.995)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
  '["result","winner"]':
    code:
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) ELSE TRUE
        END", "winner_valid_given_result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'', ''no result'') THEN
        `winner` IS NULL ELSE TRUE END", "no_winner_when_tie_or_no_result", lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN (`winner`
        = `team1` OR `winner` = `team2`) ELSE true END", "winner_present_when_match_decided",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN `result_margin`
        IS NOT NULL AND `result_margin` >= 1 ELSE true END", "runs_requires_positive_margin",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["match_type","target_overs"]':
    code:
    - suggestion: '.satisfies(''`target_overs` >= 0.0 AND `target_overs` <= 20.0'',
        ''target_overs_range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''match_type'', [''Elimination Final'', ''Eliminator'',
        ''Qualifier 2'', ''Final'', ''Semi Final'', ''Qualifier 1'', ''League''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''match_type'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("(`result` != ''runs'') OR (`result_margin` IS NOT NULL
        AND `result_margin` >= 1)", "result_margin_present_for_runs", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` != ''wickets'') OR (`result_margin` IS NOT
        NULL AND `result_margin` >= 1 AND `result_margin` <= 10)", "valid_wicket_margin_range",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` NOT IN (''tie'',''no result'')) OR (`result_margin`
        IS NULL OR `result_margin` = 0)", "no_margin_for_tie_or_no_result", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin","target_runs"]':
    code:
    - suggestion: '.satisfies("`result` IN (''runs'', ''wickets'', ''tie'', ''no result'')",
        "valid_result_values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`target_runs` IS NOT
        NULL AND `target_runs` >= 1)", "target_runs_present_positive_for_completed",
        lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result` = ''no result'') OR (`target_runs`
        IS NOT NULL AND `target_runs` >= 1)", "target_runs_present_positive_for_completed",
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(`result` <> ''runs'') OR (`result_margin` IS NOT NULL
        AND `result_margin` >= 1)", "margin_present_and_positive_for_runs", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` <> ''runs'') OR (`result_margin` <= `target_runs`
        - 1)", "runs_margin_not_exceed_target_minus_one", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result` <> ''runs'') OR (`result_margin`
        <= `target_runs` - 1)", "runs_margin_not_exceed_target_minus_one", lambda
        x: x == 1)'' failed on data sample: Value: 0.9863760217983651 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: .isNonNegative("result_margin")
      status: true
      reason_if_failed: ''
      level: warning
  '["result","target_overs"]':
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("`target_overs` IS NULL OR `target_overs` IS NOT NULL",
        "target_overs_column_exists")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`result` IS NULL OR `result` IS NOT NULL", "result_column_exists")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("target_overs", lambda c: c >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("((`result` IN (''runs'',''wickets'',''tie'') AND `target_overs`
        > 0 AND `target_overs` <= 20.0) OR `result` = ''no result'')", "overs_in_valid_range_when_result_decisive",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative("target_overs")
      status: true
      reason_if_failed: ''
      level: warning
  '["result","team1","team2","winner"]':
    code:
    - suggestion: .areComplete(['team1', 'team2', 'result'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (winner
        IS NOT NULL AND (winner = team1 OR winner = team2)) ELSE TRUE END", ''winner_valid_when_decided'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (result IN (''tie'',''no result'') AND winner IS
        NOT NULL)", ''no_winner_for_tie_or_no_result'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("NOT (result IN (''tie'',''no result'')
        AND winner IS NOT NULL)", ''no_winner_for_tie_or_no_result'', lambda x: x
        >= 0.99)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''team1 IS NOT NULL AND team2 IS NOT NULL AND team1
        <> team2'', ''teams_must_be_distinct'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''winner'', lambda c: c >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''winner'', lambda c: c >= 0.99)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("team1 <> team2", "teams_are_distinct", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(result NOT IN (''runs'', ''wickets'')) OR (winner
        IN (team1, team2))", "winner_in_teams_when_result_decided", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
