results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team1 = TRIM(team1) AND LENGTH(TRIM(team1)) > 0'',
        ''team1 trimmed and non-empty'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''LOWER(team1) <> LOWER(team2)'', ''distinct teams per
        match'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(LOWER(toss_winner) = LOWER(team1)) OR (LOWER(toss_winner)
        = LOWER(team2))'', ''toss winner must be one of the two teams'', lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN (LOWER(winner)
        = LOWER(team1) OR LOWER(winner) = LOWER(team2)) ELSE TRUE END", ''winner must
        be one of the teams for decided results'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team2` <> `team1`", "Distinct teams per match", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`toss_winner` = `team1` OR `toss_winner` = `team2`)",
        "Toss winner must be one of the competing teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(NOT ((`result` IN (''runs'',''wickets'')) OR (`result`
        = ''tie'' AND `super_over` = ''Y''))) OR (`winner` IS NOT NULL AND (`winner`
        = `team1` OR `winner` = `team2`))", "Winner must be one of the teams for decided
        matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("LENGTH(TRIM(`team2`)) > 0 AND `team2` = TRIM(`team2`)",
        "team2 non-empty and trimmed", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("player_of_match IS NULL OR length(trim(player_of_match))
        > 0", "Non-empty player_of_match when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("player_of_match IS NULL OR player_of_match RLIKE ''.*[A-Za-z].*''",
        "Text-like player_of_match", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("(`target_overs` IS NULL) OR (CAST(`target_overs` AS
        DOUBLE) IS NOT NULL)", "target_overs numeric when present", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(COALESCE(`method`, '''') <> ''D/L'') OR (`target_overs`
        IS NOT NULL AND CAST(`target_overs` AS DOUBLE) IS NOT NULL)", "DLS rows have
        target_overs present and numeric", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`target_overs` IS NULL) OR (CAST(`target_overs` AS
        DOUBLE) >= 0)", "target_overs non-negative when provided", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN `result_margin`
        IS NOT NULL ELSE TRUE END", "result_margin present when result requires it",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN (`result_margin`
        % 1 = 0) ELSE TRUE END", "result_margin integer when result is runs/wickets",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN `result_margin`
        > 0 ELSE TRUE END", "result_margin positive when result is runs/wickets",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'',''no result'') THEN
        `result_margin` IS NULL ELSE TRUE END", "result_margin null for tie/no result",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL OR CAST(`target_runs`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "target_runs numeric or null",
        lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `target_runs` IS NULL OR
        CAST(`target_runs` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "target_runs
        numeric or null", lambda x: x >= 0.99)'' failed on data sample: Value: 0.9727520435967303
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN `target_runs`
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "target_runs present for D/L",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL THEN 1 WHEN CAST(`target_runs`
        AS DOUBLE) = FLOOR(CAST(`target_runs` AS DOUBLE)) THEN 1 ELSE 0 END", "target_runs
        integer-like when present", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `target_runs` IS NULL THEN
        1 WHEN CAST(`target_runs` AS DOUBLE) = FLOOR(CAST(`target_runs` AS DOUBLE))
        THEN 1 ELSE 0 END", "target_runs integer-like when present", lambda x: x ==
        1)'' failed on data sample: Value: 0.9727520435967303 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.hasCompleteness("target_runs", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''toss_decision'', [''bat'', ''field''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.satisfies("`super_over` IS NULL OR `super_over` IS NOT NULL",
        "column exists: super_over", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''super_over'', [''Y'',''N''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` <> ''tie'') OR (`super_over` IS NOT NULL
        AND `super_over` IN (''Y'',''N''))", "tie requires super_over present and
        valid", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN `result` = ''tie''
        ELSE TRUE END", "super_over Y only when result is tie", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''toss_winner = team1 OR toss_winner = team2'', ''Toss
        winner must be one of the two teams'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''length(trim(toss_winner)) > 0 AND toss_winner = trim(toss_winner)'',
        ''toss_winner trimmed and non-empty'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.hasCompleteness(''date'', lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(`date`) = `date` AND `date` RLIKE ''^(19|20)[0-9]{2}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])$''
        AND to_date(`date`, ''yyyy-MM-dd'') IS NOT NULL", "date_valid_format", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("UPPER(TRIM(`date`)) NOT IN (''NULLVALUE'',''NA'',''N/A'',''NAN'',''NULL'',''NONE'')",
        "date_no_placeholder_na_tokens", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isPositive(''season'', lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("(`method` IS NULL OR `method` IN (''D/L'', ''NullValue''))",
        "method_allowed_values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN (CAST(`target_runs`
        AS INT) IS NOT NULL AND CAST(`target_runs` AS DOUBLE) = CAST(`target_runs`
        AS INT) AND CAST(`target_runs` AS INT) >= 0) ELSE true END", "dls_target_runs_present_and_integer",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN (CAST(`target_overs`
        AS DOUBLE) IS NOT NULL AND CAST(`target_overs` AS DOUBLE) > 0) ELSE true END",
        "dls_target_overs_present_and_positive", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(id AS BIGINT) IS NOT NULL", "id_integral", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN (`result` IN (''runs'',''wickets'') OR (`result`
        = ''tie'' AND COALESCE(`super_over`, '''') = ''Y'')) THEN CASE WHEN `winner`
        IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN 1 ELSE 0 END
        ELSE 1 END", "Decided matches have valid non-null winner", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN CASE WHEN `winner`
        IS NULL THEN 1 ELSE 0 END ELSE 1 END", "No-result matches must have NULL winner",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' AND COALESCE(`super_over`,
        '''') <> ''Y'' THEN CASE WHEN `winner` IS NULL THEN 1 ELSE 0 END ELSE 1 END",
        "Tied without Super Over must have NULL winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL THEN CASE WHEN `winner`
        = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END ELSE 1 END", "Winner, when
        present, must match team1 or team2 exactly", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn("result", ["runs", "wickets", "tie", "no result"])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN `result_margin`
        IS NOT NULL AND CAST(`result_margin` AS DOUBLE) > 0 ELSE true END", "Positive
        margin for runs/wickets", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN (`winner`
        IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`)) ELSE true END",
        "Winner must be team1 or team2 for decided results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' AND `super_over` = ''Y''
        THEN (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`))
        ELSE true END", "Tie with Super Over must have a valid winner", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' AND COALESCE(`super_over`,
        ''N'') <> ''Y'' THEN `winner` IS NULL ELSE true END", "Tie without Super Over
        must have no winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN `winner` IS
        NULL ELSE true END", "No result must have no winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
