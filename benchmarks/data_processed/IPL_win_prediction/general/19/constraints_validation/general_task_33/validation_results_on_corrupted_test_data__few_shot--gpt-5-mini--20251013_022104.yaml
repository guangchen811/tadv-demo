results:
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier
        2', 'Final', 'Semi Final', 'Eliminator', 'Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['no result', 'runs', 'wickets', 'tie'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''result_margin'', lambda x:
        x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: error
    - suggestion: .hasDataType('result_margin', 'Fractional')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasDataType(''result_margin'',
        ''Fractional'')'': ''str'' object has no attribute ''_get_java_object'''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .hasDataType('target_overs', 'Fractional')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasDataType(''target_overs'',
        ''Fractional'')'': ''str'' object has no attribute ''_get_java_object'''
      level: error
    - suggestion: .isComplete('target_overs')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''target_overs'')'' failed on data
        sample: Value: 0.9945504087193461 does not meet the constraint requirement!'
      level: error
  target_runs:
    code:
    - suggestion: .hasDataType('target_runs', 'Fractional')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasDataType(''target_runs'',
        ''Fractional'')'': ''str'' object has no attribute ''_get_java_object'''
      level: error
    - suggestion: .isComplete('target_runs')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''target_runs'')'' failed on data
        sample: Value: 0.9918256130790191 does not meet the constraint requirement!'
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  winner:
