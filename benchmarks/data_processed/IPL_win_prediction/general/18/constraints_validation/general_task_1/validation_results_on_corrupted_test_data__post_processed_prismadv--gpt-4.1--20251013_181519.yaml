results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('CASE WHEN (`result` IN (\'runs\', \'wickets\') AND `winner`
        IS NOT NULL AND ((`team1` = `winner`) OR (`team2` = `winner`))) THEN (`result_margin`
        IS NOT NULL AND `result_margin` > 0) ELSE TRUE END', 'result_margin positive
        and non-null when win by runs/wickets')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''toss_winner = team1 OR toss_winner = team2'', ''Valid
        Toss Winner'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies(''to_date(`date`) IS NOT NULL'', ''Valid Date Values'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''winner'', lambda x: x >= 0.998)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.satisfies(''CASE WHEN winner IS NULL THEN 1 WHEN winner = team1
        OR winner = team2 THEN 1 ELSE 0 END'', ''Winner is team1 or team2 or null'',
        lambda x: x >= 0.998)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["id","season"]':
    code:
    - suggestion: '.hasUniqueness([''season'', ''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: .satisfies("CASE WHEN `result` = 'runs' THEN (`result_margin` IS
        NOT NULL AND `result_margin` > 0) ELSE TRUE END", "If 'result' is 'runs',
        'result_margin' must be positive and non-null")
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: .satisfies("((`result` = 'tie' AND `super_over` = 'Y') OR (`result`
        != 'tie' AND `super_over` = 'N')) AND ((`super_over` = 'Y' AND `result` =
        'tie') OR (`super_over` = 'N'))", "Super over only for ties and vice versa")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(`result` != 'no result') OR (`result_margin` IS NULL
        OR `result_margin` = 0)", "No result means no result margin")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("((`result` = 'runs' AND `result_margin` > 0) OR (`result`
        = 'wickets' AND `result_margin` > 0) OR ((`result` NOT IN ('runs', 'wickets'))
        AND (`result_margin` IS NULL OR `result_margin` = 0)))", "Result margin logic
        for result type")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.hasUniqueness([''season'', ''team1'', ''team2''], lambda x: x
        >= 0.83)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`team1` IS NOT NULL AND `team2` IS NOT NULL AND `team1`
        <> `team2`'', ''Team columns complete and distinct'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`toss_winner` = `team1` OR `toss_winner` = `team2`'',
        ''Toss winner is a participating team'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN (`result` = ''runs'' OR `result` = ''wickets'')
        THEN (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`))
        ELSE TRUE END", "Winner must be non-null and a playing team if there is a
        result", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''id'', ''team1'', ''team2''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "Teams must be different in a
        match", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.hasUniqueness([''id'', ''season'', ''date'', ''team1'', ''team2''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('team1 != team2', 'Team1 and Team2 must be different')
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: .satisfies('`team1` != `team2`', 'Team1 not equal to Team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`winner` IS NULL OR `winner` = `team1` OR `winner` =
        `team2`', 'Winner must be one of the teams')
      status: true
      reason_if_failed: ''
      level: error
