results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''trim(`team1`) = `team1`'', ''team1_no_whitespace'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`team1` <> `team2`'', ''team1_not_equal_team2'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN trim(`team2`) = `team2` THEN 1 ELSE 0 END'',
        ''no_leading_trailing_whitespace'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(`team2`) <> '''' AND lower(trim(`team2`))
        NOT IN (''unknown'',''n/a'') THEN 1 ELSE 0 END", "no_placeholder_values",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN `target_overs` IS NOT NULL THEN 1 ELSE 0
        END", "Non-null after numeric coercion", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_overs` IS NULL OR (`target_overs`
        >= 0 AND `target_overs` = `target_overs`) THEN 1 ELSE 0 END", "Non-negative
        and finite target_overs (or null)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness("result_margin", lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("result_margin", lambda x: x
        >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.isNonNegative("result_margin", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN CASE WHEN `result_margin`
        > 0 THEN 1 ELSE 0 END ELSE 1 END", "runs_positive_margin", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN CASE WHEN `result_margin`
        > 0 AND `result_margin` <= 10 AND floor(`result_margin`) = `result_margin`
        THEN 1 ELSE 0 END ELSE 1 END", "wickets_margin_plausible_integer", lambda
        x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `result` = ''wickets''
        THEN CASE WHEN `result_margin` > 0 AND `result_margin` <= 10 AND floor(`result_margin`)
        = `result_margin` THEN 1 ELSE 0 END ELSE 1 END", "wickets_margin_plausible_integer",
        lambda x: x == 1)'' failed on data sample: Value: 0.9809264305177112 does
        not meet the constraint requirement!'
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness("target_runs", lambda x: x >= 0.99818)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("target_runs", lambda x: x >=
        0.99818)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.isNonNegative("target_runs", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL OR floor(`target_runs`)
        = `target_runs` THEN 1 ELSE 0 END", "Integral target_runs", lambda x: x >=
        0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''super_over'', [''Y'',''N''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: '.hasCompleteness(''toss_winner'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `toss_winner` IN (`team1`, `team2`) THEN
        1 ELSE 0 END", "toss_winner_is_participant", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`toss_winner`)) IN (lower(trim(`team1`)),
        lower(trim(`team2`))) THEN 1 ELSE 0 END", "toss_winner_matches_team_case_insensitive",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.satisfies("CASE WHEN `date` IS NOT NULL AND `date` <> '''' THEN
        1 ELSE 0 END", "date completeness", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN to_timestamp(`date`) IS NOT NULL THEN 1 ELSE
        0 END", "parsable_date_fraction", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN YEAR(to_timestamp(`date`)) BETWEEN 2000 AND
        2030 THEN 1 ELSE 0 END", "date_year_range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("trim(CAST(`season` AS string)) = CAST(`season` AS string)",
        "season_trimmed", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` NOT IN (''no result'',''tie'') THEN
        (`winner` = `team1` OR `winner` = `team2`) ELSE true END", "decided_matches_winner_is_participant",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''winner'', lambda x: x >= 0.99)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN (`result_margin`
        IS NOT NULL AND `result_margin` > 0) ELSE TRUE END", ''result_margin_present_and_positive_for_decisive_results'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN CASE WHEN `result_margin`
        IS NOT NULL AND `result_margin` > 0 THEN 1 ELSE 0 END ELSE 1 END", "Rows with
        result=''runs'' must have positive result_margin", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN CASE WHEN `result_margin`
        IS NOT NULL AND `result_margin` > 0 THEN 1 ELSE 0 END ELSE 1 END", "Rows with
        result=''wickets'' must have positive result_margin", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'',''no result'') THEN
        CASE WHEN `result_margin` IS NULL OR `result_margin` = 0 THEN 1 ELSE 0 END
        ELSE 1 END", "For tie/no result rows result_margin must be NULL or 0", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` NOT IN (''tie'',''no result'') THEN
        CASE WHEN (`winner` = `team1` OR `winner` = `team2`) THEN 1 ELSE 0 END ELSE
        1 END", "For decisive results winner must equal team1 or team2", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` IS NOT NULL THEN CASE WHEN
        (`toss_winner` = `team1` OR `toss_winner` = `team2`) THEN 1 ELSE 0 END ELSE
        1 END", "When toss_winner is present it must be one of the competing teams",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` NOT IN (''tie'',''no result'') THEN
        CASE WHEN ((`winner` = `team1` OR `winner` = `team2`) AND NOT (`winner` =
        `team1` AND `winner` = `team2`)) THEN 1 ELSE 0 END ELSE 1 END", "For decisive
        results exactly one of the competing teams must be the winner", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("CASE WHEN team1 <> team2 THEN 1 ELSE 0 END", "teams_not_equal",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''season'',''date'',''team1'',''team2''], lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (result IN (''no result'',''tie'')) OR (winner
        = team1 OR winner = team2) THEN 1 ELSE 0 END", "winner_is_one_of_teams_when_decisive",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN toss_winner IS NULL OR toss_winner = team1
        OR toss_winner = team2 THEN 1 ELSE 0 END", "toss_winner_valid", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN (result NOT IN (''runs'',''wickets'')) OR
        (result_margin > 0) THEN 1 ELSE 0 END", "result_margin_positive_for_margin_wins",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
