        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN (`result_margin`
        IS NOT NULL AND `result_margin` > 0 AND `result_margin` <= 10) ELSE TRUE END",
