        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN (`target_overs`
        IS NOT NULL AND `target_overs` > 0 AND `result_margin` IS NOT NULL AND `result_margin`
