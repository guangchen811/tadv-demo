      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`result` <> ''wickets'') OR (`result_margin` BETWEEN
        0 AND 10)", "wickets_margin_bounds", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result` <> ''wickets'') OR (`result_margin`
        BETWEEN 0 AND 10)", "wickets_margin_bounds", lambda x: x == 1.0)'' failed
