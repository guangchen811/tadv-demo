results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("(`match_type` <> 'League') OR (`team1` IS NOT NULL)",
        "team1 present for League rows")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("(`match_type` <> 'League') OR (`team1` <> `team2`)",
        "team1 and team2 differ in League matches")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("(`result` NOT IN ('runs','wickets','tie')) OR (`winner`
        = `team1` OR `winner` = `team2`)", "winner is one of the teams for decided
        matches")
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR (`team2` IS NOT NULL
        AND length(trim(`team2`)) > 0)", "team2 present and non-empty for League rows",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR (`team2` <> `team1`)",
        "team1 and team2 are different in League rows", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`winner` IS NULL) OR (`winner` = `team1` OR `winner`
        = `team2`)", "winner must be one of the two teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' THEN 1 ELSE 0 END",
        "league_rows_fraction", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''match_type'', [''League'', ''Qualifier 1'', ''Qualifier
        2'', ''Eliminator'', ''Semi Final'', ''Final'', ''Elimination Final''], lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`match_type` = TRIM(`match_type`)", "match_type_trimmed",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["match_type","season"]':
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn('match_type', ['Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' THEN 1 ELSE 0 END",
        "has League matches", lambda v: v > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("NOT((`match_type` = ''League'') AND (`result` = ''runs''))
        OR (`target_overs` IS NOT NULL AND `target_overs` > 0)", "target_overs required
        and > 0 for League runs results", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('target_overs')
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("NOT (`result` IN (''runs'',''wickets'')) OR (`result_margin`
        IS NOT NULL AND `result_margin` > 0)", "result_margin present and positive
        when applicable", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (`result` = ''wickets'') OR (`result_margin` BETWEEN
        1 AND 10)", "wicket margins within expected bounds", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("NOT (`result` = ''wickets'') OR (`result_margin`
        BETWEEN 1 AND 10)", "wicket margins within expected bounds", lambda x: x ==
        1)'' failed on data sample: Value: 0.9809264305177112 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.hasCompleteness(''result_margin'', lambda c: c >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''result_margin'', lambda c:
        c >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("(`target_runs` IS NULL) OR CAST(`target_runs` AS DOUBLE)
        IS NOT NULL", "target_runs numeric-or-null", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative("target_runs")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("target_runs", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.satisfies("(match_type <> ''League'') OR (season IS NOT NULL)",
        ''season_present_for_league'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("(NOT(`match_type` = ''League'' AND `result` IN (''runs'',''wickets'',''tie''))
        OR (`winner` IS NOT NULL AND length(trim(`winner`)) > 0 AND (`winner` = `team1`
        OR `winner` = `team2`)))", "winner_valid_for_decisive_league_rows", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("winner", lambda x: x >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("winner", lambda x: x >= 0.995)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
  '["result","winner"]':
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("((`result` IN ('runs','wickets','tie')) AND `winner`
        IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`)) OR (`result` =
        'no result')", "winner_present_and_valid_for_decisions")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(`result` != 'no result') OR (`winner` IS NULL)", "no_result_has_no_winner")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("(`winner` IS NULL) OR (`winner` = `team1` OR `winner`
        = `team2`)", "winner_must_be_one_of_competing_teams_when_present")
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .satisfies("(`result` <> 'runs') OR ((`target_overs` > 0) AND (`result_margin`
        > 0))", "runs_requires_positive_margin_and_overs")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(`result` <> 'wickets') OR (`result_margin` BETWEEN
        1 AND 10)", "wickets_valid_margin_range")
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result` <> ''wickets'') OR (`result_margin`
        BETWEEN 1 AND 10)", "wickets_valid_margin_range")'' failed on data sample:
        Value: 0.9809264305177112 does not meet the constraint requirement!'
      level: warning
    - suggestion: .satisfies("(`result` = 'no result') OR (`winner` IS NOT NULL)",
        "winner_present_when_decided")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("(`result` <> 'no result') OR (`winner` IS NULL)", "no_result_has_no_winner")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("(`result` <> 'tie') OR ((`winner` = `team1`) OR (`winner`
        = `team2`))", "tie_winner_must_be_competing_team")
      status: true
      reason_if_failed: ''
      level: warning
  '["match_type","result","result_margin","target_overs","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`result` IN (''runs'',''wickets'',''tie'',''no result'')",
