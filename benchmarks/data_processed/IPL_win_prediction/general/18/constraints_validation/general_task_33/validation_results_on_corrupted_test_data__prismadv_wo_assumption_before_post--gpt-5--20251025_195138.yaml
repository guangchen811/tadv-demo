      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_must_differ", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''result_margin'', lambda x:
        x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(`result` NOT IN (''runs'',''wickets'')) OR (`result_margin`
        IS NOT NULL AND `result_margin` > 0)", "margin_present_and_positive_for_decisions",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` != ''wickets'') OR (`result_margin` >= 1
        AND `result_margin` <= 10)", "wickets_margin_within_1_10", lambda x: x ==
        1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result` != ''wickets'') OR (`result_margin`
        >= 1 AND `result_margin` <= 10)", "wickets_margin_within_1_10", lambda x:
        x == 1.0)'' failed on data sample: Value: 0.9809264305177112 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(`result` != ''runs'') OR (`target_overs` IS NOT NULL
        AND `target_overs` > 0)", "target_overs_positive_when_runs_decision", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin","target_runs"]':
    code:
    - suggestion: '.satisfies("`result` IN (''runs'', ''wickets'', ''tie'', ''no result'')",
        "result_allowed_values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` NOT IN (''runs'', ''wickets'')) OR (`result_margin`
        IS NOT NULL AND `result_margin` >= 0)", "result_margin_present_when_needed",
