      level: warning
    - suggestion: '.satisfies("(`target_runs` IS NULL) OR (`target_runs` >= 0)", "target_runs_non_negative_when_present",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","target_overs"]':
    code:
    - suggestion: '.satisfies("(`result` <> ''runs'') OR (`target_overs` IS NOT NULL
        AND `target_overs` > 0)", "target_overs_present_and_positive_when_result_runs",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`result` IN (''runs'', ''wickets'', ''tie'', ''no result'')",
