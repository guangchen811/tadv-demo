constraints:
  city:
    code:
    - - .hasCompleteness('city', 0.98)
      - Invalid
    - - .isDataType('city', DataType.String)
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .isDataType('date', DataType.String)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', DataType.Integral)
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1'])
      - Valid
    - - .isDataType('match_type', DataType.String)
      - Invalid
    assumptions: []
  method:
    code:
    - - .hasCompleteness('method', 0.02)
      - Invalid
    - - .isDataType('method', DataType.String)
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .hasCompleteness('player_of_match', 0.99)
      - Invalid
    - - .isDataType('player_of_match', DataType.String)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    - - .isDataType('result', DataType.String)
      - Invalid
    assumptions: []
  result_margin:
    code:
    - - .hasCompleteness('result_margin', 0.98)
      - Invalid
    - - .isDataType('result_margin', DataType.Fractional)
      - Invalid
    - - .isPositive('result_margin', predicate="result = 'runs' OR result = 'wickets'")
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isDataType('season', DataType.Integral)
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    - - .isDataType('super_over', DataType.String)
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - .hasCompleteness('target_overs', 0.99)
      - Invalid
    - - .isDataType('target_overs', DataType.Fractional)
      - Invalid
    - - .isPositive('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasCompleteness('target_runs', 0.99)
      - Invalid
    - - .isDataType('target_runs', DataType.Fractional)
      - Invalid
    - - .isPositive('target_runs', predicate="result = 'runs' OR result = 'wickets'")
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isDataType('team1', DataType.String)
      - Invalid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    - - .isDataType('team2', DataType.String)
      - Invalid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    - - .isDataType('toss_decision', DataType.String)
      - Invalid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .isDataType('toss_winner', DataType.String)
      - Invalid
    - - .satisfies('toss_winner_is_valid_team', 'toss_winner = team1 OR toss_winner
        = team2')
      - Invalid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    - - .isDataType('umpire1', DataType.String)
      - Invalid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    - - .isDataType('umpire2', DataType.String)
      - Invalid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    - - .isDataType('venue', DataType.String)
      - Invalid
    assumptions: []
  winner:
    code:
    - - .hasCompleteness('winner', 0.99)
      - Invalid
    - - .isDataType('winner', DataType.String)
      - Invalid
    - - .satisfies('winner_is_valid_team', 'winner = team1 OR winner = team2')
      - Invalid
    assumptions: []
