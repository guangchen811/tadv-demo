        \ team2)'); Compliance('bat_first_if_bat', \"(toss_decision = 'bat') => (bat_first_team\
        \ = toss_winner)\"); Compliance('bat_first_if_field', \"(toss_decision <>\
        \ 'bat') => (bat_first_team = CASE WHEN toss_winner = team1 THEN team2 ELSE\
        \ team1 END)\")."
