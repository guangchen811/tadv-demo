        \ team2}; (b) if result = 'tie' AND super_over = 'Y' then winner \u2208 {team1,\
        \ team2}. Deequ compliance example: Compliance('winner_present_when_decided',\
        \ \"((result IN ('runs','wickets')) OR (result = 'tie' AND super_over = 'Y'))\
        \ => (winner IN (team1, team2))\")."
