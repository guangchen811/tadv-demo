    assumptions:
    - text: 'The toss_winner must be one of the two participating teams in the same
        row (team1 or team2). This prevents assigning bat_first_team incorrectly when
        branching on toss_winner. We could represent this as a Deequ constraint like
        this: .compliance(''toss_winner_is_participant'', ''toss_winner = team1 OR
        toss_winner = team2'')'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      - start_line: 35
        end_line: 35
        file: ''
      uid: e4aad883-d8bb-405f-bc64-d2db4eae7ac1
    - text: 'team1 and team2 must be different teams for every match row (no self-matches).
        This is implied by code paths that treat them as distinct opponents and by
        the opponent selection logic. Deequ example: .compliance(''teams_are_distinct'',
        ''team1 <> team2'')'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
      uid: 6cc10a69-aa99-4752-a6bf-876d5678f9c6
    - text: "bat_first_team derivation rule: If toss_decision = 'bat', bat_first_team\
        \ must equal toss_winner. If toss_decision = 'field', bat_first_team must\
        \ equal the non\u2013toss-winning team (team2 when toss_winner = team1, else\
        \ team1). This also implies toss_decision is constrained to {'bat','field'}\
        \ for correctness. Deequ example: .compliance('bat_first_team_rule', \"(toss_decision\
        \ = 'bat' AND bat_first_team = toss_winner) OR (toss_decision = 'field' AND\
        \ ((toss_winner = team1 AND bat_first_team = team2) OR (toss_winner = team2\
        \ AND bat_first_team = team1)))\")"
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: c0d1d919-27bc-499b-a6b2-b74eb1a5d9f6
    - text: 'The fields toss_winner, toss_decision, team1, and team2 must be jointly
        complete (non-null together) for every record, since the bat_first_team computation
        and downstream logic depend on all of them. Deequ example: .compliance(''critical_fields_not_null'',
        ''toss_winner IS NOT NULL AND toss_decision IS NOT NULL AND team1 IS NOT NULL
        AND team2 IS NOT NULL'')'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: 7d8119aa-0f5c-4209-836f-7106065d3185
    - text: 'Winner consistency with participating teams and result state: (a) For
        decided outcomes (result IN (''runs'',''wickets'') OR (result = ''tie'' AND
        super_over = ''Y'')), winner must be either team1 or team2; (b) For undecided
        outcomes (result = ''no result'' OR (result = ''tie'' AND super_over <> ''Y'')),
        winner should be NULL. Deequ examples: .compliance(''winner_when_decided'',
        "NOT (((result IN (''runs'',''wickets'')) OR (result = ''tie'' AND super_over
        = ''Y''))) OR (winner = team1 OR winner = team2)") and .compliance(''no_winner_when_undecided'',
        "NOT ((result = ''no result'') OR (result = ''tie'' AND super_over <> ''Y''))
        OR winner IS NULL")'
      sources:
      - start_line: 35
        end_line: 44
        file: ''
      - start_line: 66
        end_line: 71
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 4c547d75-0757-44d9-a6fb-2ed372bd002b
  '["team1","team2","toss_winner"]':
    code: []
    assumptions:
    - text: 'For every match, toss_winner must be either team1 or team2. This can
        be enforced with a Deequ row-level constraint such as: .satisfies("toss_winner
        = team1 OR toss_winner = team2", "toss_winner_in_match_teams").'
      sources:
      - start_line: 27
        end_line: 28
        file: ''
      uid: 29b7b578-cb5b-4ca5-9992-6cea973015f8
    - text: 'team1 and team2 must be distinct (no self-matches). This can be enforced
        with: .satisfies("team1 <> team2", "no_self_matches").'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 60
        end_line: 63
        file: ''
      uid: 0f8c366d-20a6-4736-9b72-543ed747b86c
    - text: 'bat_first_team must be consistent with toss_winner and toss_decision:
        (a) if toss_decision = ''bat'' then bat_first_team = toss_winner; (b) otherwise
        bat_first_team is the opponent of toss_winner: ((toss_winner = team1 AND bat_first_team
        = team2) OR (toss_winner = team2 AND bat_first_team = team1)). Deequ example:
        .satisfies("(toss_decision = ''bat'' AND bat_first_team = toss_winner) OR
        (toss_decision <> ''bat'' AND ((toss_winner = team1 AND bat_first_team = team2)
        OR (toss_winner = team2 AND bat_first_team = team1)))", "bat_first_team_logic").'
      sources:
      - start_line: 25
        end_line: 28
        file: ''
      uid: d9b520a4-35f5-47c4-9f58-2961784a62ff
    - text: 'When a match has a decided outcome (result in {''runs'',''wickets''}
        or result = ''tie'' and super_over = ''Y''), winner must be one of the two
        teams (team1 or team2). Deequ example: .satisfies("((result IN (''runs'',''wickets''))
        OR (result = ''tie'' AND super_over = ''Y'')) -> (winner = team1 OR winner
        = team2)", "winner_is_one_of_match_teams_when_decided").'
      sources:
      - start_line: 35
        end_line: 43
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: b0999ad6-bbbd-4bab-b4ae-b1069c37e081
  '["team1","team2","winner"]':
    code: []
    assumptions:
    - text: 'Winner must be one of the two teams in the fixture. Specifically: (a)
        whenever winner is present it must equal team1 or team2; (b) for decided matches
        (result in [''runs'', ''wickets''] or result=''tie'' and super_over=''Y''),
        winner must be non-null and equal to team1 or team2. Example Deequ: .where(''winner
        IS NOT NULL'').satisfies(''winner = team1 OR winner = team2'') and .where(''(result
        IN (\''runs\'', \''wickets\'')) OR (result = \''tie\'' AND super_over = \''Y\'')'').satisfies(''winner
        IN (team1, team2)'')'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 66
        end_line: 69
        file: ''
      uid: 08b424a0-823b-4186-9adf-9e820e6c6d42
    - text: 'For ties without a Super Over (result=''tie'' and super_over != ''Y''),
        winner should be null (no team is recorded as winner). Example Deequ: .where("result
        = ''tie'' AND (super_over IS NULL OR super_over <> ''Y'')").satisfies(''winner
        IS NULL'')'
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: bf019952-8da2-4296-8e16-623e2a2df1dd
    - text: 'For results decided by runs or wickets (result in [''runs'',''wickets'']),
        result_margin must be present and a positive integer, and winner must equal
        team1 or team2. Example Deequ: .where("result IN (''runs'',''wickets'')").satisfies("winner
        IN (team1, team2) AND result_margin IS NOT NULL AND result_margin > 0 AND
        result_margin = CAST(result_margin AS INT)")'
      sources:
      - start_line: 31
        end_line: 41
        file: ''
      uid: 22ce51bf-ad41-41cc-8b20-5dc69d7276cf
    - text: 'team1 and team2 must be different for each match (a team cannot play
        itself). Example Deequ: .satisfies(''team1 <> team2'')'
      sources:
      - start_line: 33
        end_line: 36
        file: ''
      - start_line: 59
        end_line: 64
        file: ''
      uid: ab8f56b4-1531-4b9c-8c31-1831e4de1625
    - text: 'toss_winner must be either team1 or team2. Example Deequ: .satisfies(''toss_winner
        IN (team1, team2)'')'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: d02aa8ca-dd80-4b28-88ef-1655009cff93
    - text: 'bat_first_team must be consistent with toss_winner and toss_decision:
        if toss_decision = ''bat'' then bat_first_team = toss_winner; otherwise bat_first_team
        must equal the opponent of toss_winner (and still be one of team1 or team2).
        Example Deequ: .satisfies("CASE WHEN toss_decision = ''bat'' THEN bat_first_team
        = toss_winner ELSE bat_first_team IN (team1, team2) AND bat_first_team <>
        toss_winner END")'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: ef563b88-4319-4b4e-a3b7-9164e8e6d2a4
