        file: ''
      - start_line: 60
        end_line: 63
        file: ''
      - start_line: 84
        end_line: 88
        file: ''
      uid: ec33acd2-c1ea-4445-8f73-c19c1a67df13
    - text: 'Within each row, ''team2'' should be different from ''team1'' (they represent
