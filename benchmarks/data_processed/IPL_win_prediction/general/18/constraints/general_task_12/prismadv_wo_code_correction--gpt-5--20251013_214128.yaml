        \ > 0 AND result \u2208 {'runs','wickets'}. Deequ compliance example: Compliance('dls_fields_required',\
        \ \"(method = 'D/L') => (target_runs IS NOT NULL AND target_runs > 0 AND target_overs\
        \ IS NOT NULL AND target_overs > 0 AND result IN ('runs','wickets'))\")."
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 36
        end_line: 41
        file: ''
      uid: 563608c6-9959-4df6-b5df-00bd921eaced
    - text: 'For ''no result'' matches, there should be no winner and no winning margin:
        result = ''no result'' => winner IS NULL AND result_margin IS NULL. Deequ
        compliance example: Compliance(''noresult_no_winner_or_margin'', "(result
        = ''no result'') => (winner IS NULL AND result_margin IS NULL)").'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 36
        end_line: 41
        file: ''
      uid: a75968b8-84f0-4e24-991b-d683e1f0bed2
    - text: 'The two participating teams in a match must be distinct and non-null:
        team1 IS NOT NULL, team2 IS NOT NULL, and team1 <> team2. Deequ compliance
        example: Compliance(''teams_are_distinct'', ''(team1 IS NOT NULL) AND (team2
        IS NOT NULL) AND (team1 <> team2)'').'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 60
        end_line: 63
        file: ''
      uid: a4bcd996-2274-4509-b9a2-f13e2ba9dc7e
  '["method","target_overs"]':
    code: []
    assumptions:
    - text: 'If method == ''D/L'', then both target_runs and target_overs must be
        present and numeric, with target_runs >= 1 and target_overs > 0. This can
        be represented in Deequ as: .where("method = ''D/L''").hasCompleteness(''target_runs'',
        _ == 1.0).where("method = ''D/L''").hasCompleteness(''target_overs'', _ ==
        1.0).where("method = ''D/L''").satisfies("target_runs >= 1 AND target_overs
        > 0", ''dls_target_values_valid'', _ == 1.0)'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 46
        end_line: 49
        file: ''
      uid: c1147416-9fc5-4956-a180-5433a2953440
    - text: 'If result is ''runs'' or ''wickets'', result_margin must be non-null
        and integer-convertible; additionally, when result = ''wickets'' it must be
        between 1 and 10, and when result = ''runs'' it must be >= 1. Example Deequ:
        .where("result IN (''runs'',''wickets'')").hasCompleteness(''result_margin'',
        _ == 1.0).satisfies("CASE WHEN result = ''wickets'' THEN result_margin BETWEEN
        1 AND 10 WHEN result = ''runs'' THEN result_margin >= 1 ELSE true END", ''result_margin_by_result'',
        _ == 1.0)'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 36
        end_line: 41
        file: ''
      uid: 7f3d8ba7-fa00-415e-9995-13be5d9a75f3
    - text: 'For decided matches (result IN (''runs'',''wickets'') OR (result = ''tie''
        AND super_over = ''Y'')), winner must be non-null and equal to either team1
        or team2; for ''no result'' and for ties without a Super Over (result = ''tie''
        AND super_over <> ''Y''), winner should be null. Example Deequ: .satisfies("CASE
        WHEN result IN (''runs'',''wickets'') OR (result = ''tie'' AND super_over
        = ''Y'') THEN winner IS NOT NULL AND (winner = team1 OR winner = team2) WHEN
        result = ''no result'' OR (result = ''tie'' AND super_over <> ''Y'') THEN
        winner IS NULL ELSE true END", ''winner_consistency'', _ == 1.0)'
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 42
        end_line: 44
        file: ''
      - start_line: 66
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: cee280fc-674c-450e-89af-52a0e9aacbbe
    - text: 'toss_winner must be one of the two teams playing (team1 or team2). Example
        Deequ: .satisfies("toss_winner = team1 OR toss_winner = team2", ''toss_winner_is_a_team'',
        _ == 1.0)'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: b949792d-586f-48bb-ad41-b4793b08fef1
    - text: 'bat_first_team must be consistent with toss_decision and toss_winner:
        if toss_decision = ''bat'' then bat_first_team = toss_winner; otherwise bat_first_team
        must be the opponent (the team that is not toss_winner) and still be either
        team1 or team2. Example Deequ: .satisfies("CASE WHEN toss_decision = ''bat''
        THEN bat_first_team = toss_winner ELSE bat_first_team <> toss_winner AND (bat_first_team
        = team1 OR bat_first_team = team2) END", ''bat_first_consistency'', _ == 1.0)'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: a7edbdce-d263-4283-811c-049786c13030
    - text: 'When method = ''D/L'', the match outcome should be compatible with a
        decided result (i.e., result IN (''runs'',''wickets'')); D/L should not co-occur
        with ''no result''. Example Deequ: .where("method = ''D/L''").satisfies("result
        IN (''runs'',''wickets'')", ''dls_requires_decided_result'', _ == 1.0)'
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      uid: 43b700d3-7a2c-48b9-8633-625495b60c75
  '["method","target_overs","target_runs"]':
    code: []
    assumptions:
    - text: 'If method = ''D/L'', then both target_runs and target_overs must be present
        (non-null) and numeric; additionally, target_runs must be integer-valued and
        >= 1, and target_overs must be > 0. This can be enforced with conditional
        constraints such as: where(method = ''D/L'') => isComplete(''target_runs'')
        AND isComplete(''target_overs'') AND satisfies(''target_runs = floor(target_runs)
        AND target_runs >= 1'') AND satisfies(''target_overs > 0'').'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 46
        end_line: 49
        file: ''
      uid: 9025abbc-5c5b-4960-b1d7-05410f56eeab
    - text: 'If result is in {''runs'', ''wickets''}, result_margin must be present
        (non-null) and an integer > 0 to safely support int(result_margin) in the
        result string. Implement as: where(result IN (''runs'',''wickets'')) => isComplete(''result_margin'')
        AND satisfies(''result_margin = floor(result_margin) AND result_margin > 0'').'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 36
        end_line: 41
        file: ''
      uid: 14331e16-8da4-4444-aee5-4fae3aebe4d4
    - text: 'For any decided outcome (result in {''runs'',''wickets''} or result =
        ''tie'' with super_over = ''Y''), winner must equal either team1 or team2.
        This ensures the opponent computation and winner-based messaging are valid.
        Constraint example: where((result IN (''runs'',''wickets'')) OR (result =
        ''tie'' AND super_over = ''Y'')) => satisfies(''winner = team1 OR winner =
        team2'').'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      uid: 491b2cf1-1977-43ca-89c7-2862476d4c63
    - text: "Toss logic integrity: toss_winner must be either team1 or team2; and\
        \ bat_first_team must equal toss_winner when toss_decision = 'bat', otherwise\
        \ bat_first_team must equal the non\u2013toss-winner team. Constraint example:\
        \ satisfies(\"(toss_winner = team1 OR toss_winner = team2) AND ((toss_decision\
        \ = 'bat' AND bat_first_team = toss_winner) OR (toss_decision <> 'bat' AND\
        \ ((toss_winner = team1 AND bat_first_team = team2) OR (toss_winner = team2\
        \ AND bat_first_team = team1))))\")."
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: 9b8c4221-a2ab-475f-a829-5756f53d0e42
    - text: 'Tie handling consistency: if result = ''tie'' and super_over = ''Y'',
        winner must be one of {team1, team2} and non-null; if result = ''tie'' and
        super_over <> ''Y'', winner should be null. Constraints: where(result = ''tie''
        AND super_over = ''Y'') => satisfies(''winner = team1 OR winner = team2'');
        where(result = ''tie'' AND (super_over <> ''Y'' OR super_over IS NULL)) =>
        isComplete(''winner'') = false.'
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: a41fbff8-d08a-49e9-bd82-7f41c5377bb7
  '["method","target_runs"]':
    code: []
    assumptions:
    - text: 'If method == ''D/L'', then both target_runs and target_overs must be
        present (non-null) and numeric; additionally, target_runs must be a non-negative
        integer and target_overs must be positive. This can be represented with Deequ-like
        constraints such as: .where("method = ''D/L''").hasCompleteness("target_runs",
        1.0); .where("method = ''D/L''").hasCompleteness("target_overs", 1.0); .satisfies("method
        <> ''D/L'' OR (target_runs >= 0 AND target_runs = floor(target_runs))", "dls_target_runs_integer_nonneg");
        .satisfies("method <> ''D/L'' OR (target_overs > 0)", "dls_target_overs_positive").'
      sources:
      - start_line: 19
        end_line: 23
        file: ''
      - start_line: 46
        end_line: 49
        file: ''
      uid: 1b441f92-2634-4104-aec4-85c7f54452d2
    - text: 'Rows with method == ''D/L'' should correspond to decided match results;
        i.e., if method == ''D/L'' then result must be either ''runs'' or ''wickets''
        and winner must be non-null. For example: .satisfies("method <> ''D/L'' OR
        (result IN (''runs'',''wickets'') AND winner IS NOT NULL)", "dls_only_for_decided").'
      sources:
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 46
        end_line: 49
        file: ''
      uid: 2ca79bbb-a59e-4eb1-b894-b2980e89bf46
    - text: 'If result is ''runs'' or ''wickets'', then result_margin must be present
        and an integer, and winner must be one of {team1, team2}. Representable as:
        .satisfies("(result NOT IN (''runs'',''wickets'')) OR (result_margin IS NOT
        NULL AND result_margin = floor(result_margin))", "margin_required_when_decided");
        .satisfies("(result NOT IN (''runs'',''wickets'')) OR (winner IN (team1, team2))",
        "winner_must_be_participant").'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 35
        end_line: 41
        file: ''
      uid: ae097ce1-5c32-4fb1-ac87-4b26328f7489
    - text: 'If result == ''tie'', winner must be present (non-null) because it is
        used in the result string ("Tied - Super Over: {winner}"). Example constraint:
        .satisfies("(result <> ''tie'') OR (winner IS NOT NULL)", "tie_requires_winner").'
      sources:
      - start_line: 42
        end_line: 44
        file: ''
      uid: 95e4661c-3039-49cc-a92c-64eca8d8fb9a
    - text: 'toss_winner must be either team1 or team2, and bat_first_team must be
        derived consistently: if toss_decision == ''bat'' then bat_first_team == toss_winner;
        otherwise bat_first_team must be the other team. Example constraints: .satisfies("toss_winner
        IN (team1, team2)", "toss_winner_valid"); .satisfies("(toss_decision = ''bat''
        AND bat_first_team = toss_winner) OR (toss_decision <> ''bat'' AND ((toss_winner
        = team1 AND bat_first_team = team2) OR (toss_winner = team2 AND bat_first_team
        = team1)))", "bat_first_team_logic").'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: 3547d74e-34c8-4fae-ae7c-9cf2b0cd63ca
  '["player_of_match","team1","team2","winner"]':
    code: []
    assumptions:
    - text: "The 'toss_winner' must be one of the two teams playing in the match:\
        \ toss_winner \u2208 {team1, team2}. Example Deequ constraint: Compliance('toss_winner_is_one_of_teams',\
        \ 'toss_winner = team1 OR toss_winner = team2')."
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: eb8b8ed0-f4c6-49b4-bfd6-0a5b447c0276
    - text: 'The ''bat_first_team'' is deterministically derived from ''toss_decision''
        and ''toss_winner'': if toss_decision = ''bat'' then bat_first_team = toss_winner,
        else bat_first_team = (team2 if toss_winner = team1 else team1). Example Deequ
        constraint: Compliance(''bat_first_team_rule'', "(toss_decision = ''bat''
        AND bat_first_team = toss_winner) OR (toss_decision <> ''bat'' AND ((toss_winner
        = team1 AND bat_first_team = team2) OR (toss_winner = team2 AND bat_first_team
        = team1)))").'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: 2872105f-62c7-4bb8-8f52-949052fc11f5
    - text: 'For decided matches (result in {''runs'',''wickets''}), the ''winner''
        must be one of {team1, team2} and ''result_margin'' must be present and castable
        to an integer. Example Deequ constraint: Compliance(''decided_match_has_valid_winner_and_margin'',
        "(result IN (''runs'',''wickets'') AND ( (winner = team1 OR winner = team2)
        AND result_margin IS NOT NULL)) OR (result NOT IN (''runs'',''wickets''))").'
      sources:
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 21
        end_line: 21
        file: ''
      uid: 966d7822-39af-45db-8122-aa90d051e4d4
    - text: 'For matches with result = ''tie'' decided by a Super Over (super_over
        = ''Y''), ''winner'' must be one of {team1, team2} and non-null. Example Deequ
        constraint: Compliance(''tie_with_super_over_has_winner'', "(result = ''tie''
        AND super_over = ''Y'' AND (winner = team1 OR winner = team2)) OR NOT (result
        = ''tie'' AND super_over = ''Y'')").'
      sources:
      - start_line: 42
        end_line: 44
        file: ''
      - start_line: 66
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 74ed4269-4602-43bf-882b-07513d9ffda4
    - text: 'For matches with result = ''tie'' without a Super Over (super_over <>
        ''Y''), ''winner'' must be null so that points are split correctly. Example
        Deequ constraint: Compliance(''tie_without_super_over_has_no_winner'', "(result
        = ''tie'' AND super_over <> ''Y'' AND winner IS NULL) OR NOT (result = ''tie''
        AND super_over <> ''Y'')").'
      sources:
      - start_line: 66
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: cb150690-8d98-47dc-a78e-ec3438cc14f7
    - text: 'For matches with result = ''no result'', ''winner'' must be null to avoid
        incorrectly allocating wins/points. Example Deequ constraint: Compliance(''no_result_has_no_winner'',
        "(result = ''no result'' AND winner IS NULL) OR result <> ''no result''").'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 8db2fd62-5708-4b64-9acc-5285ac92c32b
    - text: 'The two competing teams must be different: team1 <> team2. Example Deequ
        constraint: Compliance(''teams_are_distinct'', ''team1 <> team2'').'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 59
        end_line: 64
        file: ''
      uid: a8cc11c8-a94f-4975-bd09-30765203595b
    - text: 'Player of the Match should be absent when result = ''no result'' and
        present otherwise. Example Deequ constraint: Compliance(''pom_presence_by_result'',
        "((result = ''no result'' AND player_of_match IS NULL) OR (result <> ''no
        result'' AND player_of_match IS NOT NULL))").'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: 9b213d49-5c08-4cd7-9cc7-0e977587c28a
  '["result","result_margin"]':
    code: []
    assumptions:
    - text: 'When result is either ''runs'' or ''wickets'', result_margin must be
        present, numeric, strictly positive, and an integer (no fractional part).
        This can be represented as a Deequ constraint such as: .satisfies("CASE WHEN
        result IN (''runs'',''wickets'') THEN result_margin IS NOT NULL AND result_margin
        > 0 AND result_margin = CAST(result_margin AS BIGINT) ELSE TRUE END", ''valid_margin_for_decided_matches'').'
      sources:
      - start_line: 30
        end_line: 41
        file: ''
      uid: e7810cd5-f8a5-4f1f-b6bd-5d65d3af5b47
    - text: 'For decided matches (result in {''runs'',''wickets''} or result=''tie''
        with super_over=''Y''), winner must be non-null and equal to either team1
        or team2. This can be expressed in Deequ as: .satisfies("CASE WHEN (result
        IN (''runs'',''wickets'')) OR (result=''tie'' AND super_over=''Y'') THEN winner
        IN (team1, team2) ELSE TRUE END", ''winner_must_be_a_participating_team_when_decided'').'
      sources:
      - start_line: 34
        end_line: 41
        file: ''
      - start_line: 42
        end_line: 44
        file: ''
      - start_line: 66
        end_line: 68
        file: ''
      uid: 33cfd558-8b1b-419a-bcfb-19eb733e7183
    - text: 'For ties without a Super Over (result=''tie'' and super_over!=''Y'' or
        super_over is null), there should be no winner assigned (winner is null).
        Example Deequ constraint: .satisfies("CASE WHEN result=''tie'' AND (super_over
        IS NULL OR super_over<>''Y'') THEN winner IS NULL ELSE TRUE END", ''no_winner_for_tie_without_super_over'').'
      sources:
      - start_line: 67
        end_line: 68
        file: ''
      - start_line: 77
        end_line: 81
        file: ''
      uid: ef0ab663-b1af-4e7c-91d1-cd4e82a1256b
    - text: 'If method is ''D/L'', the match outcome should be decided (result in
        {''runs'',''wickets''}) and target_runs and target_overs must be present and
        positive numbers. One way to encode this: .satisfies("CASE WHEN method=''D/L''
        THEN result IN (''runs'',''wickets'') AND target_runs IS NOT NULL AND target_runs
        > 0 AND target_overs IS NOT NULL AND target_overs > 0 ELSE TRUE END", ''valid_dls_fields_when_applied'').'
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      - start_line: 36
        end_line: 41
        file: ''
      uid: a1adacb2-41cb-4f5e-bfce-f9bb920343a8
    - text: 'If super_over is ''Y'', the result must be ''tie''. This can be expressed
        as: .satisfies("CASE WHEN super_over=''Y'' THEN result=''tie'' ELSE TRUE END",
        ''super_over_only_for_ties'').'
      sources:
      - start_line: 67
        end_line: 68
        file: ''
      - start_line: 77
        end_line: 81
        file: ''
      uid: dc6071e2-725c-45d6-84fc-77ecd39c30d9
    - text: 'bat_first_team is a deterministic function of toss_decision, toss_winner,
        team1, and team2: if toss_decision=''bat'' then bat_first_team=toss_winner,
        otherwise bat_first_team is the non-toss_winner team among team1/team2. Example
        constraint: .satisfies("(toss_decision=''bat'' AND bat_first_team=toss_winner)
        OR (toss_decision<>''bat'' AND ((toss_winner=team1 AND bat_first_team=team2)
        OR (toss_winner=team2 AND bat_first_team=team1)))", ''bat_first_team_consistent_with_toss'').'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: 51c1fe30-b1c4-4ca0-9442-08df00029a5d
  '["result","super_over"]':
    code: []
    assumptions:
    - text: 'For all rows where result is either ''runs'' or ''wickets'': (a) winner
        must be non-null and equal to either team1 or team2; (b) result_margin must
        be non-null and a positive integer; (c) super_over must be ''N''. This can
        be represented as a Deequ compliance constraint: Compliance(''runs_wickets_require_margin_winner_and_no_superover'',
        "CASE WHEN result IN (''runs'',''wickets'') THEN winner IS NOT NULL AND (winner
        = team1 OR winner = team2) AND result_margin IS NOT NULL AND result_margin
        > 0 AND super_over = ''N'' ELSE true END").'
      sources:
      - start_line: 31
        end_line: 41
        file: ''
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: 2468058e-b95d-47db-badd-796f54766e18
    - text: 'If result = ''tie'' and super_over = ''Y'', there must be a valid winner
        equal to team1 or team2 (non-null). This can be represented as: Compliance(''tie_superover_requires_winner'',
        "CASE WHEN result = ''tie'' AND super_over = ''Y'' THEN winner IS NOT NULL
        AND (winner = team1 OR winner = team2) ELSE true END").'
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: 76fbf321-571e-4fe6-a94e-190e28f20da6
    - text: 'If result = ''tie'' and super_over != ''Y'' (i.e., ''N''), there must
        be no winner (winner IS NULL), and result_margin should be NULL. This avoids
        awarding 2 points to any team in tied matches without a super over. Representable
        as: Compliance(''tie_without_superover_has_no_winner_or_margin'', "CASE WHEN
        result = ''tie'' AND super_over <> ''Y'' THEN winner IS NULL AND result_margin
        IS NULL ELSE true END").'
      sources:
      - start_line: 67
        end_line: 68
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 94410604-a8a5-4341-904b-b6324c0a2261
    - text: 'If result = ''no result'', there must be no winner (winner IS NULL),
        super_over must be ''N'', and result_margin should be NULL. This ensures such
        matches award exactly 1 point and do not get misclassified as wins. Representable
        as: Compliance(''no_result_no_winner_no_margin_no_superover'', "CASE WHEN
        result = ''no result'' THEN winner IS NULL AND result_margin IS NULL AND super_over
        = ''N'' ELSE true END").'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: f2bf03ac-52c0-417a-bdda-708de9432d42
    - text: 'super_over = ''Y'' should occur only when result = ''tie'' (i.e., no
        runs/wickets/no result rows should have super_over = ''Y''). Representable
        as: Compliance(''superover_only_for_ties'', "super_over <> ''Y'' OR result
        = ''tie''").'
      sources:
      - start_line: 67
        end_line: 68
        file: ''
      uid: c35010a9-b571-4232-b3f4-0de69dba3cf0
  '["result","super_over","winner"]':
    code: []
    assumptions:
    - text: 'For rows where result is ''runs'' or ''wickets'', there must be a valid
        winning team and a positive margin: winner must equal either team1 or team2,
        and result_margin must be non-null and > 0. We could represent this as a Deequ
        constraint: .satisfies("(result NOT IN (''runs'',''wickets'')) OR ((winner
        = team1 OR winner = team2) AND result_margin IS NOT NULL AND result_margin
        > 0)", "decided_matches_have_winner_and_margin")'
      sources:
      - start_line: 31
        end_line: 41
        file: ''
      uid: 4ad16baa-9618-44c8-bc7f-6be459ba8d72
    - text: 'For rows where result == ''tie'' and super_over == ''Y'', there must
        be a single winning team: winner must be non-null and equal to either team1
        or team2. Deequ: .satisfies("NOT (result = ''tie'' AND super_over = ''Y'')
        OR (winner IS NOT NULL AND (winner = team1 OR winner = team2))", "superover_ties_have_winner")'
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: f3a31b5f-a31e-4105-b055-7b0570f227ca
    - text: 'super_over should only be ''Y'' for ties. If super_over == ''Y'' then
        result must be ''tie''; and for non-tie results (''runs'',''wickets'',''no
        result''), super_over must be ''N''. Deequ (two constraints): .satisfies("super_over
        != ''Y'' OR result = ''tie''", "y_only_for_ties") and .satisfies("result NOT
        IN (''runs'',''wickets'',''no result'') OR super_over = ''N''", "non_ties_have_N")'
      sources:
      - start_line: 67
        end_line: 68
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 064472e3-a5ee-443c-98ea-032e529f2edc
    - text: 'For rows where result == ''tie'' and super_over != ''Y'', no winner should
        be recorded (winner is NULL). Deequ: .satisfies("NOT (result = ''tie'' AND
        super_over != ''Y'') OR winner IS NULL", "no_superover_ties_have_no_winner")'
      sources:
      - start_line: 77
        end_line: 82
        file: ''
      uid: b78a2f73-f140-4ecc-9462-f1b5b64abcea
    - text: 'For rows where result == ''no result'', there must be no winner and no
        margin, and super_over must be ''N''. Deequ: .satisfies("result != ''no result''
        OR (winner IS NULL AND result_margin IS NULL AND super_over = ''N'')", "noresult_has_no_winner_margin")'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: aff1a168-3a76-4abf-8546-a7a218dafe2d
    - text: 'Whenever winner is present (non-null), it must be one of the two teams
        in that match (team1 or team2). Deequ: .satisfies("winner IS NULL OR winner
        = team1 OR winner = team2", "winner_in_teams")'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: b1e83e25-0270-44df-b7c0-d54941efd68b
    - text: "If method == 'D/L' (Duckworth\u2013Lewis), both target_runs and target_overs\
        \ must be present and positive. Deequ: .satisfies(\"method != 'D/L' OR (target_runs\
        \ IS NOT NULL AND target_runs > 0 AND target_overs IS NOT NULL AND target_overs\
        \ > 0)\", \"dls_requires_targets\")"
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      uid: 32045d8c-852e-41c4-b80d-815144f7b06d
  '["result_margin","super_over"]':
    code: []
    assumptions:
    - text: 'If result is either ''runs'' or ''wickets'', then result_margin must
        be present, strictly positive, and an integer (no fractional part). We could
        represent this as a Deequ compliance constraint such as: .hasCompliance(''decided_match_margin_int_positive'',
        "(result IN (''runs'',''wickets'')) => (result_margin IS NOT NULL AND result_margin
        > 0 AND result_margin = CAST(result_margin AS BIGINT))")'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 37
        end_line: 41
        file: ''
      uid: 402aaea9-664c-4ae1-8bf7-a9ecf3db6a1f
    - text: 'If result is not ''runs'' or ''wickets'' (i.e., tie or no result), then
        result_margin should be null. Example Deequ: .hasCompliance(''non_decided_matches_no_margin'',
        "(result NOT IN (''runs'',''wickets'')) => (result_margin IS NULL)")'
      sources:
      - start_line: 37
        end_line: 41
        file: ''
      uid: ded9c56b-9d29-4790-b5c8-f61d53b0898f
    - text: 'Super overs only occur for ties: if result is not ''tie'', super_over
        must be ''N''. Example Deequ: .hasCompliance(''super_over_only_on_ties'',
        "(result != ''tie'') => (super_over = ''N'')")'
      sources:
      - start_line: 68
        end_line: 68
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: bb4c98ea-b4e9-4e6d-bdac-cc7fed0f1aea
    - text: 'Conversely, if super_over is ''Y'', the result must be ''tie''. Example
        Deequ: .hasCompliance(''super_over_implies_tie'', "(super_over = ''Y'') =>
        (result = ''tie'')")'
      sources:
      - start_line: 68
        end_line: 68
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 10df3132-94b8-4539-b5b6-ea5a38c5b4b5
    - text: 'For ties decided by a super over (result = ''tie'' and super_over = ''Y''),
        winner must be present and equal to either team1 or team2 (exactly one winner).
        Example Deequ: .hasCompliance(''tie_super_over_requires_winner'', "(result
        = ''tie'' AND super_over = ''Y'') => (winner IS NOT NULL AND (winner = team1
        OR winner = team2))")'
      sources:
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 66
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 52adbf96-ae94-49bd-ae86-bc72c9feaa17
    - text: 'For ties without a super over (result = ''tie'' and super_over != ''Y''),
        winner must be null to avoid incorrect points allocation (both teams should
        get 1 point). Example Deequ: .hasCompliance(''tie_without_super_over_no_winner'',
        "(result = ''tie'' AND super_over != ''Y'') => (winner IS NULL)")'
      sources:
      - start_line: 68
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: ffde4b08-90b2-40b9-9316-54501c637c11
  '["team1","team2"]':
    code: []
    assumptions:
    - text: 'In every match row, team1 and team2 must be different teams (no self-matches).
        This can be enforced with a constraint such as: .isWhere("team1 <> team2").'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 59
        end_line: 63
        file: ''
      uid: 795c82cf-4a30-41b2-8223-5cb23b050646
    - text: 'The toss_winner must be one of the two teams playing the match (either
        team1 or team2). This can be enforced with a constraint such as: .isWhere("toss_winner
        = team1 OR toss_winner = team2").'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      uid: 82b244d7-b058-4248-87fa-07c7e35d867c
    - text: 'For rows where result is in (''runs'',''wickets'',''tie''), the winner
        must be exactly one of the two teams in the row. Enforceable as: .isWhere("CASE
        WHEN result IN (''runs'',''wickets'',''tie'') THEN ((winner = team1 AND winner
        <> team2) OR (winner = team2 AND winner <> team1)) ELSE TRUE END").'
      sources:
      - start_line: 34
        end_line: 43
        file: ''
      - start_line: 66
        end_line: 69
        file: ''
      uid: 4da473be-57e4-445b-90ec-dba600acd942
    - text: team1 and team2 draw from the same domain of valid team names (i.e., any
        team that appears as team1 should also appear as team2 somewhere, and vice
        versa). This can be checked as a dataset-level constraint by asserting zero
        set-difference both ways (e.g., anti-joins team1 \ team2 and team2 \ team1
        have zero rows) or by verifying equal distinct-value sets across the two columns.
      sources:
      - start_line: 59
        end_line: 63
        file: ''
      uid: 631ba354-bd56-4bae-80d2-6b18ccc031a4
    - text: 'Both team1 and team2 must be non-null for all rows. This can be enforced
        with constraints such as: .isComplete(''team1'') and .isComplete(''team2'').'
      sources:
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 59
        end_line: 63
        file: ''
      uid: 85e6bcea-7d14-4d6b-a423-e93c53647405
  '["team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("(toss_winner = team1) OR (toss_winner = team2)", "toss_winner_is_participant",
        lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
