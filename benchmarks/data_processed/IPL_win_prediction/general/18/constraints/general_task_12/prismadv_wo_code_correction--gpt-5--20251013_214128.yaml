    - text: "When result \u2208 {'runs','wickets'}, result_margin must be non-null\
        \ and a positive integer (margin of victory is required in runs/wickets outcomes).\
        \ Deequ compliance example: Compliance('margin_required_for_decided', \"(result\
        \ IN ('runs','wickets')) => (result_margin IS NOT NULL AND result_margin >=\
