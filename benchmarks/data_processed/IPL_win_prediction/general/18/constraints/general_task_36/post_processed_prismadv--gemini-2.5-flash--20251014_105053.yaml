    - text: 'For every match that has a declared ''winner'' (i.e., ''winner'' is not
        null), the winning team must be one of the two participating teams (''team1''
        or ''team2''). This is essential for correctly assigning wins, losses, and
        points. We could represent this assumption as a Deequ constraint like this:

