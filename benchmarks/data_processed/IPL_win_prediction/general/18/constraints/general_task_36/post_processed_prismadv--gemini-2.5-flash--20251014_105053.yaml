fixing_results:
  target_overs:
    33db14be-d881-49f4-be4c-803ca036480a: '.satisfies("method != ''D/L'' OR (target_overs
      IS NOT NULL AND target_overs >= 0)", "Target Overs Valid for D/L Method", lambda
      x: x >= 0.9981818181818182)'
  '["batting_first","chasing_team","team1","team2","toss_decision","toss_winner"]':
    5f5a4ad2-189c-494c-9683-d15aae5d5166: '.satisfies("(( (CASE WHEN `toss_decision`
      = ''bat'' THEN `toss_winner` ELSE (CASE WHEN `toss_winner` = `team1` THEN `team2`
      ELSE `team1` END) END) = `team1` AND (CASE WHEN `toss_decision` = ''field''
      THEN `toss_winner` ELSE (CASE WHEN `toss_winner` = `team1` THEN `team2` ELSE
      `team1` END) END) = `team2` ) OR ( (CASE WHEN `toss_decision` = ''bat'' THEN
      `toss_winner` ELSE (CASE WHEN `toss_winner` = `team1` THEN `team2` ELSE `team1`
      END) END) = `team2` AND (CASE WHEN `toss_decision` = ''field'' THEN `toss_winner`
      ELSE (CASE WHEN `toss_winner` = `team1` THEN `team2` ELSE `team1` END) END)
      = `team1` )) AND ( (CASE WHEN `toss_decision` = ''bat'' THEN `toss_winner` ELSE
      (CASE WHEN `toss_winner` = `team1` THEN `team2` ELSE `team1` END) END) != (CASE
      WHEN `toss_decision` = ''field'' THEN `toss_winner` ELSE (CASE WHEN `toss_winner`
      = `team1` THEN `team2` ELSE `team1` END) END) )", "Batting First and Chasing
      Team Consistency", lambda x: x == 1.0)'
  city:
    a0074904-08af-43d5-92a7-de3fe6e71c89: '.satisfies("NOT (`city` IN (''NullValue'',
      ''null'', ''NULL'', ''None'', ''''))", "No null-like string values in city",
      lambda x: x >= 0.9872727272727273)'
  '["date","season"]':
    f6951786-2e26-4910-9832-aee424add550: '.hasDistinctness([''date'', ''season''],
      lambda x: x == (464 / 550.0))'
  '["effective_overs","method","target_overs"]':
    39101389-ea7c-4421-a097-f2675b0405e6: '.satisfies("NOT (`method` = ''D/L'' AND
      `target_overs` IS NULL)", "Target Overs Not Null for D/L Method", lambda x:
      x >= 0.995)'
