constraints:
  date:
    code:
    - - .containsPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      - Invalid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("(result NOT IN ('runs','wickets')) OR (result_margin IS NOT NULL
        AND result_margin > 0)", 'result_margin_present_and_positive_for_decisions')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .satisfies('target_overs >= 0 AND target_overs <= 20', 'target_overs_in_range')
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .satisfies('team1 != team2', 'teams_are_distinct')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss_winner_is_one_of_teams')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("(result NOT IN ('runs','wickets')) OR (winner = team1 OR winner
        = team2)", 'winner_is_one_of_teams_when_decided')
      - Valid
    - - .satisfies("(result NOT IN ('runs','wickets')) OR (winner IS NOT NULL)", 'winner_present_when_decided')
      - Valid
    assumptions: []
