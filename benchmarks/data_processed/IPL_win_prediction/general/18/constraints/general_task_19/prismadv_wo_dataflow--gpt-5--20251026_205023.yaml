    - text: 'The ''season'' values should be integer-like (no fractional part). Decimal
        values would be silently truncated by astype(int), which could change grouping/sorting
        semantics, so inputs are assumed to be whole numbers. This can be represented
        as: satisfies("CASE WHEN TRY_CAST(`season` AS DOUBLE) IS NOT NULL THEN (TRY_CAST(`season`
