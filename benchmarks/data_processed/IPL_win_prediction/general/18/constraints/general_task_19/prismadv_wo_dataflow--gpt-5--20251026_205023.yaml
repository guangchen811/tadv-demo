    assumptions:
    - text: 'The ''team1'' column must be complete (no NULL/NaN values) for all records,
        as it is used directly in string summaries, equality comparisons, and in points
        allocation for league matches without any null-handling. We could represent
        this as a Deequ constraint like: .isComplete(''team1'') or .satisfies("CASE
        WHEN team1 IS NOT NULL THEN 1 ELSE 0 END", "team1 not null", lambda x: x ==
        1).'
      sources:
      - start_line: 36
        end_line: 62
        file: ''
      - start_line: 66
        end_line: 69
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      - start_line: 92
        end_line: 99
        file: ''
      uid: ea3a3c3f-e4b9-405d-98f1-e296ac9112ac
    - text: 'The ''team1'' values should be normalized strings (type string, trimmed,
        and non-empty) so equality checks against ''winner'' and ''team2'' behave
        as intended. Example checks: Great Expectations expect_column_values_to_be_of_type(''team1'',
        ''str'') and expect_column_values_to_not_match_regex(''team1'', ''^\s|\s$'');
        Deequ: .satisfies("CASE WHEN LENGTH(TRIM(team1)) > 0 THEN 1 ELSE 0 END", "team1
        trimmed and non-empty", lambda x: x == 1).'
      sources:
      - start_line: 48
        end_line: 55
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: 9e5af48a-4b09-4f1b-9ac5-7fbeb68a5c77
    - text: 'Within each row, ''team1'' and ''team2'' should be different team identifiers
        (a team cannot play itself). We could represent this as a Deequ constraint:
        .satisfies("CASE WHEN team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2 THEN 1 ELSE 0 END", "fixture teams are distinct", lambda x: x == 1).'
      sources:
      - start_line: 36
        end_line: 62
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: 02d7716c-9e82-4c81-b998-7bc784de936e
    - text: 'For League matches with result = ''no result'', ''team1'' must be present
        to award points correctly. We could encode this as: .satisfies("CASE WHEN
        match_type = ''League'' AND result = ''no result'' THEN CASE WHEN team1 IS
        NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "team1 present for NR league rows",
        lambda x: x == 1).'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 92
        end_line: 99
        file: ''
      uid: b99e2cc7-fa11-4834-951c-4c5fd5886175
    - text: "When a winner is recorded, the winner must be either 'team1' or 'team2'\
        \ (i.e., 'winner' \u2208 {team1, team2}), ensuring the loser mapping works.\
        \ Representable as Deequ: .satisfies(\"winner IS NULL OR winner = team1 OR\
        \ winner = team2\", \"winner is one of fixture teams\", lambda x: x == 1)."
      sources:
      - start_line: 29
        end_line: 31
        file: ''
      - start_line: 48
        end_line: 55
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: 845221df-52ae-4185-891a-eff21c5dc60c
