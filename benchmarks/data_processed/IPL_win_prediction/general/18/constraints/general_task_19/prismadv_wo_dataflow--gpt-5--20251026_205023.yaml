        IS NOT NULL THEN 1 ELSE 0 END", "Date parseable", lambda x: x >= 0.95) or
        Great Expectations: expect_column_values_to_be_dateutil_parseable with mostly=0.95.'
      sources:
      - start_line: 20
        end_line: 20
