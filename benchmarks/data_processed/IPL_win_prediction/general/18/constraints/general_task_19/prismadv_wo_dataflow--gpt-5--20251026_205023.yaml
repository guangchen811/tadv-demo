  '["date","season"]':
    code: []
    assumptions:
    - text: 'For every record with a non-null date, the calendar year extracted from
        ''date'' must equal the integer value in ''season''. Example Deequ: .satisfies("year(to_timestamp(date))
        = season", "season_matches_date_year")'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      uid: 8ea02b47-4322-4408-8278-2a5ac773e00c
    - text: 'In League matches with a recorded outcome (match_type = ''League'' and
        result <> ''no result''), ''winner'' must be non-null and must equal either
        ''team1'' or ''team2''. Example Deequ: .satisfies("NOT (match_type = ''League''
        AND result <> ''no result'') OR (winner IS NOT NULL AND (winner = team1 OR
        winner = team2))", "winner_valid_for_resolved_league_results")'
      sources:
      - start_line: 26
        end_line: 31
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      uid: 0ff6b6ee-bc91-410c-9954-8ac42d085834
    - text: 'If ''super_over'' = ''Y'', then the row must reflect a tied match: result
        = ''tie'', and ''winner'' must be non-null and be one of {''team1'',''team2''}.
        Example Deequ: .satisfies("super_over <> ''Y'' OR (result = ''tie'' AND winner
        IS NOT NULL AND (winner = team1 OR winner = team2))", "super_over_implies_tie_and_winner")'
      sources:
      - start_line: 31
        end_line: 32
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: fd6ee642-6bc0-4f42-ab9c-9045007912ec
    - text: 'If result = ''tie'', a ''winner'' must still be present (e.g., via Super
        Over or adjudication) and must be either ''team1'' or ''team2''. Example Deequ:
        .satisfies("result <> ''tie'' OR (winner IS NOT NULL AND (winner = team1 OR
        winner = team2))", "tie_requires_winner_in_teams")'
      sources:
      - start_line: 52
        end_line: 57
        file: ''
      uid: f14d0011-361e-4b38-b0b3-178babc2682b
    - text: 'If method = ''D/L'', then ''target_runs'' and ''target_overs'' must be
        present and valid: both non-null, target_overs > 0, and target_runs >= 0 (numeric).
        Example Deequ: .satisfies("NOT (method = ''D/L'') OR (target_runs IS NOT NULL
        AND target_overs IS NOT NULL AND CAST(target_overs AS double) > 0 AND CAST(target_runs
        AS double) >= 0)", "valid_dls_targets")'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 44
        end_line: 47
        file: ''
      uid: a2dc6335-2710-47fc-ad6f-6effc499d490
    - text: 'If result is in (''runs'',''wickets''), then ''winner'' must be non-null
        and one of {''team1'',''team2''}, and ''result_margin'' must be a positive
        integer (> 0). Example Deequ: .satisfies("result NOT IN (''runs'',''wickets'')
        OR (winner IS NOT NULL AND (winner = team1 OR winner = team2) AND CAST(result_margin
        AS int) > 0)", "winner_and_margin_required_for_decided_matches")'
      sources:
      - start_line: 27
        end_line: 31
        file: ''
      - start_line: 48
        end_line: 51
        file: ''
      uid: 8b5d4925-dc4a-443c-be84-6efef031517d
    - text: 'If result = ''no result'', ''winner'' must be null (no winner should
        be recorded). Example Deequ: .satisfies("result <> ''no result'' OR winner
        IS NULL", "no_result_requires_null_winner")'
      sources:
      - start_line: 27
        end_line: 31
        file: ''
      - start_line: 92
        end_line: 106
        file: ''
