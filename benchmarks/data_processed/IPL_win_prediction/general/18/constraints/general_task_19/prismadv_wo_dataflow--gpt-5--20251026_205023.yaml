        year derived from ''date'' should match the numeric ''season'' for the vast
        majority of rows (allowing a small tolerance for data issues). For example,
        require at least 95% of rows to satisfy year(date) = season. This can be represented
        as: Deequ: .satisfies("CASE WHEN to_timestamp(`date`) IS NULL OR `season`
        IS NULL THEN 1 WHEN year(to_timestamp(`date`)) = CAST(`season` AS INT) THEN
        1 ELSE 0 END", "Year matches season", lambda x: x >= 0.95).'
