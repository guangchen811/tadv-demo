constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League','Final','Qualifier 1','Qualifier 2','Eliminator','Semi
        Final','Elimination Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("method IS NULL OR method != 'D/L' OR (target_runs IS NOT NULL
        AND target_overs IS NOT NULL AND target_overs > 0)", 'dls_target_valid')
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs','wickets','tie','no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .satisfies("result NOT IN ('runs','wickets') OR result_margin >= 0", 'result_margin_non_negative')
      - Valid
    - - .satisfies("result NOT IN ('runs','wickets') OR result_margin IS NOT NULL",
        'result_margin_consistency')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .satisfies("date IS NULL OR season = year(date)", 'season_date_alignment')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .satisfies("super_over != 'Y' OR result = 'tie'", 'super_over_implies_tie')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1_team2:
    code:
    - - .satisfies('team1 IS NOT NULL AND team2 IS NOT NULL AND team1 != team2', 'teams_different')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field','bat'])
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("result = 'no result' OR (winner IS NOT NULL AND (winner = team1
        OR winner = team2))", 'winner_present_and_valid')
      - Valid
    assumptions: []
