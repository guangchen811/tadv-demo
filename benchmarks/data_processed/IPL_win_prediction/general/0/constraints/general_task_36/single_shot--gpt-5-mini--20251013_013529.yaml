constraints:
  batting_first:
    code:
    - - .satisfies("(batting_first = team1 OR batting_first = team2)", 'batting_first_in_teams')
      - Invalid
    assumptions: []
  chasing_team:
    code:
    - - .satisfies("(chasing_team = team1 OR chasing_team = team2)", 'chasing_in_teams')
      - Invalid
    assumptions: []
  effective_overs:
    code:
    - - .satisfies("(method = 'D/L' AND effective_overs = target_overs) OR (method
        != 'D/L' AND effective_overs = 20.0)", 'effective_overs_consistency')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id').isUnique('id')
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("method IS NULL OR method = 'D/L'", 'method_allowed_values')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result').isContainedIn('result', ['runs','wickets','tie','no
        result'])
      - Valid
    assumptions: []
  season_date:
    code:
    - - .isComplete('season').isComplete('date')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over').isContainedIn('super_over', ['Y','N'])
      - Valid
    assumptions: []
  team1_team2:
    code:
    - - .isComplete('team1').isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision').isContainedIn('toss_decision', ['bat','field'])
      - Valid
    assumptions: []
  win_by:
    code:
    - - .satisfies("(result = 'runs' AND win_by LIKE '%runs') OR (result = 'wickets'
        AND win_by LIKE '%wickets') OR (result = 'tie' AND (win_by = 'Super Over'
        OR win_by = 'Tie')) OR (result = 'no result' AND win_by = 'No Result')", 'win_by_matches_result')
      - Invalid
    assumptions: []
  winner:
    code:
    - - .satisfies("(result = 'no result' AND winner IS NULL) OR (result != 'no result'
        AND (winner = team1 OR winner = team2))", 'winner_consistency')
      - Valid
    assumptions: []
