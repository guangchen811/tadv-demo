fixing_results:
  '["date","season"]':
    bfe52d50-f93e-407a-8e27-f82c3de3c62f: '.hasUniqueness([''season'', ''match_type''],
      lambda x: x >= 0.056)'
  winner:
    97c90016-4512-464d-8ed6-68485d3ec592: '.satisfies("(result IS NULL OR result IN
      (''no result'', ''abandoned'')) OR (winner IS NOT NULL)", "winner_not_null_if_played",
      lambda x: x == 1.0)'
    61a7f1be-2d18-4310-b3ab-0032d9a72cc6: '.satisfies("(winner IS NULL) OR (winner
      = team1 OR winner = team2)", "winner_is_valid_team_if_played", lambda x: x ==
      1.0)'
  result:
    fd036e2d-9915-4d72-90da-3b53b3a079d0: '.satisfies("LOWER(TRIM(result)) IN (''runs'',
      ''wickets'', ''no result'', ''tie'')", "result_normalized_values_check", lambda
      x: x == 1.0)'
  '["result","result_margin"]':
    caa43187-8d27-4db3-bded-58d4535a8b84: '.satisfies("NOT (lower(trim(result)) =
      ''runs'') OR (`result_margin` IS NOT NULL AND `result_margin` >= 0)", "Valid
      result_margin for ''runs'' results", lambda x: x == 1.0)'
    b6859c70-f586-4383-863d-0a66838226ee: '.satisfies("NOT (LOWER(result) = ''wickets'')
      OR (`result_margin` IS NOT NULL AND `result_margin` >= 0)", "Valid result_margin
      for ''wickets'' results", lambda x: x == 1.0)'
  '["result","super_over"]':
    db224081-4dcd-4445-935c-f19b549b8877: '.satisfies("(result NOT IN (''runs'', ''wickets''))
      OR (result_margin IS NOT NULL)", "Result Margin Completeness for Runs/Wickets",
      lambda x: x == 1.0)'
    d3a6a835-24c0-4cea-bd2e-d3985f1a518b: '.satisfies("((result = ''tie'' AND super_over
      = ''Y'') OR (result != ''tie'' AND super_over != ''Y''))", "Super Over Tie Consistency",
      lambda x: x == 1.0)'
  '["result","team1","team2","toss_decision","toss_winner","winner"]':
    40795098-b7ea-4287-96f6-975716a6bc47: '.satisfies("NOT (result != ''no result'')
      OR (winner IS NOT NULL AND (winner = team1 OR winner = team2))", "If match played,
      winner must be one of team1 or team2", lambda x: x == 1.0)'
    fa0e0911-c4ce-4932-bf60-65f21887f772: '.satisfies("NOT (result = ''runs'') OR
      (result_margin >= 0)", "Result margin non-negative for runs", lambda x: x ==
      1.0)'
    e3d6b312-671e-42ba-9f91-82c4db3c8f0a: '.satisfies("NOT (result = ''wickets'')
      OR (result_margin >= 0)", "Result margin non-negative for wickets", lambda x:
      x == 1.0)'
  '["result","toss_winner","winner"]':
    4f18875f-aaa0-4942-8996-ba83a5bf7a2f: '.satisfies("CASE WHEN `result` IN (''runs'',
      ''wickets'') THEN CASE WHEN `winner` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END",
      "Winner not null for definitive results", lambda x: x == 1.0)'
    25a3dc92-a65e-464f-bb79-15f19f6e2a3a: '.satisfies("CASE WHEN `result` IN (''runs'',
      ''wickets'') THEN CASE WHEN `result_margin` IS NOT NULL THEN 1 ELSE 0 END ELSE
      1 END", "Result margin not null for runs/wickets results", lambda x: x == 1.0)'
  '["team1","team2","winner"]':
    5d41b4d3-9778-41b7-83ec-29c43ea1e2b6: '.satisfies("winner IS NULL OR (winner =
      team1 OR winner = team2)", "Winner must be one of the playing teams when a match
      is played", lambda x: x == 1.0)'
