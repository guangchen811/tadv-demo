constraints:
  date:
    code:
    - - .hasPattern('date', r'^\\d{4}-\\d{2}-\\d{2}$')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isPositive('season')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda x: x > 0.99)'
      - Valid
    assumptions: []
