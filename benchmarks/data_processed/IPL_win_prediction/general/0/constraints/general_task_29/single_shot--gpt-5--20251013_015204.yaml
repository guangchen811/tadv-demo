constraints:
  date:
    code:
    - - .isParsableToDate('date', 'yyyy-MM-dd')
      - Invalid
    assumptions: []
  match_type:
    code:
    - - .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier 2', 'Eliminator',
        'Final', 'Semi Final', 'Elimination Final'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      - Valid
    assumptions: []
  result_margin_semantics:
    code:
    - - .satisfies("(result IN ('runs','wickets') AND result_margin IS NOT NULL) OR
        (result IN ('tie','no result') AND result_margin IS NULL)", 'result margin
        present only for runs/wickets')
      - Valid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', ConstrainableDataTypes.Integral)
      - Valid
    - - .satisfies('season BETWEEN 2008 AND 2025', 'season in expected range')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Valid
    assumptions: []
  target_overs_bounds:
    code:
    - - .satisfies('(target_overs IS NULL) OR (target_overs > 0 AND target_overs <=
        20)', 'target overs within (0,20] when present')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Valid
    assumptions: []
  target_runs_positive:
    code:
    - - .satisfies('(target_runs IS NULL) OR (target_runs > 0)', 'target runs positive
        when present')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1_team2:
    code:
    - - .satisfies('team1 <> team2', 'teams must be different')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss winner
        must be one of the two teams')
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("(result = 'no result') OR (winner = team1 OR winner = team2)",
        'winner must be one of the two teams when played')
      - Valid
    - - .satisfies("(result = 'no result') OR (winner IS NOT NULL)", 'winner present
        when match played')
      - Valid
    assumptions: []
