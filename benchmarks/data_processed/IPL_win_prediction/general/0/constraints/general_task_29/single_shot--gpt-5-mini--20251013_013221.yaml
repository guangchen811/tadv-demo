constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs','wickets','tie','no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .satisfies("(result IN ('runs','wickets') AND result_margin IS NOT NULL) OR
        (result NOT IN ('runs','wickets') AND result_margin IS NULL)", 'result_margin_nullity_matches_result_type')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y','N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['bat','field'])
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("CASE WHEN result <> 'no result' THEN (winner = team1 OR winner
        = team2) ELSE TRUE END", 'winner_is_one_of_teams_when_played')
      - Valid
    assumptions: []
