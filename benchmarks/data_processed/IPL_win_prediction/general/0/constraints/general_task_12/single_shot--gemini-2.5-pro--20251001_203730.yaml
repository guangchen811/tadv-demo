constraints:
  date:
    code:
    - - .hasPattern('date', r'\d{4}-\d{2}-\d{2}')
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("method IS NULL OR method = 'D/L'", "'method' must be NULL or 'D/L'")
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isPositive('result_margin')
      - Valid
    - - .satisfies("result NOT IN ('runs', 'wickets') OR result_margin IS NOT NULL",
        "'result_margin' must be present if result is 'runs' or 'wickets'")
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("result = 'no result' OR winner IS NOT NULL", "'winner' must be
        present unless result is 'no result'")
      - Valid
    assumptions: []
