        end_line: 33
        file: ''
      uid: 9cf88671-d66e-420f-93eb-e9097dda9e09
    - text: 'When the ''result'' column indicates a decisive outcome (''runs'' or
        ''wickets''), the ''winner'' column must not be null and its value must correspond
        to one of the teams participating in that specific match (i.e., either ''team1''
        or ''team2''). The downstream calculations for points, win/loss flags, and
        NRR proxy rely on the ''winner'' being a valid participating team when a match
        has a decisive result. We could represent this assumption as a Deequ constraint
        like this: .assertConstraint { Check.hasSize(0, Some(col("result").isin("runs",
        "wickets") && (col("winner").isNull || (col("winner") =!= col("team1") &&
        col("winner") =!= col("team2"))))) }'
