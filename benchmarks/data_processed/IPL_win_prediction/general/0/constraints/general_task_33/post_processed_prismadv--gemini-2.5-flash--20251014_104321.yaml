    assumptions:
    - text: 'For any given match, the ''team1'' and ''team2'' columns must contain
        distinct values, meaning a team cannot play against itself. The code expands
        each match into two team-centric rows, one for ''team1'' as ''team'' and ''team2''
        as ''opponent'', and vice-versa. This transformation implicitly assumes that
        ''team1'' and ''team2'' are always different for a single match. We could
        represent this assumption as a Deequ constraint like this: .assertConstraint
        { Check.hasSize(0, Some(col("team1") === col("team2"))) }'
      sources:
