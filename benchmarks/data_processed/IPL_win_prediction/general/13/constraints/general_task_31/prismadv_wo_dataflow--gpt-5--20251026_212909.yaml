    assumptions:
    - text: 'Winner must be a participating team when the match outcome is decided.
        Specifically: (a) If result is in (''runs'',''wickets'') OR (result = ''tie''
        AND super_over = ''Y''), then winner must equal either team1 or team2; (b)
        If result = ''no result'' OR (result = ''tie'' AND super_over <> ''Y''), then
        winner should be null or not equal to team1/team2. Example Deequ constraint:
        .satisfies("CASE WHEN result IN (''runs'',''wickets'') OR (result = ''tie''
        AND super_over = ''Y'') THEN winner IN (team1, team2) ELSE winner IS NULL
        END", ''winner_consistent_with_outcome'')'
      sources:
      - start_line: 32
        end_line: 38
        file: ''
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 67
        end_line: 70
        file: ''
      uid: c3e2b8b8-8e96-4b46-bbad-b6471c5f59e1
    - text: "Toss winner validity and toss-decision presence: For each match, toss_winner\
        \ must be exactly one of {team1, team2} (so exactly one team row has toss_made_by_team\
        \ = true). Additionally, when toss_winner \u2208 {team1, team2}, toss_decision\
        \ must be non-null and in {'bat','field'} after normalization. Example Deequ\
        \ constraints: .satisfies(\"toss_winner IN (team1, team2)\", 'toss_winner_is_participant')\
        \ and .satisfies(\"CASE WHEN toss_winner IN (team1, team2) THEN lower(trim(toss_decision))\
        \ IN ('bat','field') ELSE true END\", 'toss_decision_present_for_winner')"
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 32
        end_line: 41
        file: ''
      - start_line: 59
        end_line: 66
        file: ''
      uid: 3912cc89-c3f4-4a2b-a779-82b4962531b7
    - text: "Result\u2013margin coherence: (a) If result = 'runs', result_margin must\
        \ be present and > 0 (integer); (b) If result = 'wickets', result_margin must\
        \ be present and an integer between 1 and 10; (c) If result = 'no result'\
        \ OR (result = 'tie' AND super_over <> 'Y'), result_margin should be null.\
        \ Example Deequ constraint: .satisfies(\"CASE WHEN result = 'runs' THEN result_margin\
        \ IS NOT NULL AND result_margin > 0 WHEN result = 'wickets' THEN result_margin\
        \ IS NOT NULL AND result_margin BETWEEN 1 AND 10 WHEN result = 'no result'\
        \ OR (result = 'tie' AND super_over <> 'Y') THEN result_margin IS NULL ELSE\
        \ true END\", 'result_margin_consistent')"
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      - start_line: 43
        end_line: 45
        file: ''
      uid: 4e47033b-9aeb-47f3-9cec-295f16d71151
    - text: "Method\u2013result coherence (D/L usage): If method = 'D/L', then the\
        \ match must have a decided outcome with result in {'runs','wickets'} and\
        \ a non-null result_margin; conversely, if result = 'no result' OR (result\
        \ = 'tie' AND super_over <> 'Y'), method should be null. Example Deequ constraints:\
        \ .satisfies(\"CASE WHEN method = 'D/L' THEN result IN ('runs','wickets')\
        \ ELSE true END\", 'dl_requires_decided_result') and .satisfies(\"CASE WHEN\
        \ method = 'D/L' THEN result_margin IS NOT NULL ELSE true END\", 'dl_requires_margin');\
        \ .satisfies(\"CASE WHEN result = 'no result' OR (result = 'tie' AND super_over\
        \ <> 'Y') THEN method IS NULL ELSE true END\", 'noresult_or_plain_tie_has_no_method')"
      sources:
      - start_line: 19
        end_line: 23
        file: ''
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 43
        end_line: 49
        file: ''
      uid: 9af860b1-7d3f-4166-a41e-7baca05e064e
    - text: 'Tie and super-over semantics: Ties that have super_over = ''Y'' represent
        matches decided via super over and therefore must have a winner in {team1,
        team2}; ties without super_over (''Y'') are true ties and must not have a
        winner (each team gets 0.5 points). Example Deequ constraint: .satisfies("CASE
        WHEN result = ''tie'' AND super_over = ''Y'' THEN winner IN (team1, team2)
        WHEN result = ''tie'' AND (super_over <> ''Y'' OR super_over IS NULL) THEN
        winner IS NULL ELSE true END", ''tie_super_over_consistency'')'
      sources:
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 67
        end_line: 70
        file: ''
      - start_line: 32
        end_line: 38
        file: ''
      uid: 0275e73c-e151-471d-b736-6f467159cfa9
  '["method","super_over"]':
    code: []
    assumptions:
    - text: "For every match (by id), toss_winner must be exactly one of the two teams\
        \ that played: toss_winner \u2208 {team1, team2}, and exactly one of (team1\
        \ = toss_winner, team2 = toss_winner) is true. This ensures teams_long[toss_made_by_team]\
        \ yields exactly one row per match for downstream aggregation. Example constraint:\
        \ satisfies(\"toss_winner = team1 OR toss_winner = team2\", \"toss_winner_in_pair\"\
        ) and satisfies(\"(toss_winner = team1) != (toss_winner = team2)\", \"toss_winner_exactly_once\"\
        )."
      sources:
      - start_line: 32
        end_line: 40
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: c90f22b8-18d8-49d1-baf2-6a2321e2f86e
    - text: "When a match is decided (result <> 'no result' AND NOT(result = 'tie'\
        \ AND super_over <> 'Y')), the winner must be present and be one of the two\
        \ teams that played (winner \u2208 {team1, team2}). For each match id, exactly\
        \ one of the two teams is the winner. Example constraint: satisfies(\"CASE\
        \ WHEN result <> 'no result' AND NOT (result = 'tie' AND super_over <> 'Y')\
        \ THEN (winner IS NOT NULL AND (winner = team1 OR winner = team2)) ELSE true\
        \ END\", \"winner_valid_when_decided\") and satisfies(\"CASE WHEN result <>\
        \ 'no result' AND NOT (result = 'tie' AND super_over <> 'Y') THEN ((winner\
        \ = team1) != (winner = team2)) ELSE true END\", \"one_winner_per_match\"\
        )."
      sources:
      - start_line: 32
        end_line: 39
        file: ''
      - start_line: 43
        end_line: 49
        file: ''
      uid: d3af6c27-b3a6-4f36-add8-78680149e229
    - text: 'For ties without a super over (result = ''tie'' AND super_over <> ''Y''),
        there should be no winner recorded and no margin recorded; method should be
        null in such cases. This aligns with awarding 0.5 points to each team without
        deciding a winner. Example constraint: satisfies("CASE WHEN result = ''tie''
        AND super_over <> ''Y'' THEN (winner IS NULL AND result_margin IS NULL AND
        method IS NULL) ELSE true END", "no_winner_or_margin_on_tie_wo_SO").'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      uid: 27b21758-89e1-4850-b705-b88d788cd6b0
    - text: "If super_over = 'Y', the match must not be a 'no result' and should have\
        \ a decisive winner among the two teams (winner \u2208 {team1, team2} and\
        \ not null). Additionally, super_over = 'Y' should occur only in matches that\
        \ were tied (result = 'tie') before the decider, consistent with how ties_wo_super_over\
        \ is computed. Example constraints: satisfies(\"CASE WHEN super_over = 'Y'\
        \ THEN (result <> 'no result' AND winner IS NOT NULL AND (winner = team1 OR\
        \ winner = team2)) ELSE true END\", \"SO_requires_decisive_winner\") and satisfies(\"\
        CASE WHEN super_over = 'Y' THEN result = 'tie' ELSE true END\", \"SO_only_after_tie\"\
        )."
      sources:
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      - start_line: 67
        end_line: 70
        file: ''
      uid: 8c350ce4-0898-4bce-adbf-04be8ca258b8
    - text: 'For ''no result'' matches (result = ''no result''), there should be no
        super over (super_over = ''N'') and no winner recorded; these rows contribute
        zero denominator and zero points. Example constraint: satisfies("CASE WHEN
        result = ''no result'' THEN (super_over = ''N'' AND winner IS NULL) ELSE true
        END", "no_result_has_no_SO_or_winner").'
      sources:
      - start_line: 46
        end_line: 51
        file: ''
      uid: 523367e8-80d3-4ea0-a234-6e4358979006
    - text: "Winning margin semantics: If result = 'runs' and the match is decided\
        \ (winner \u2208 {team1, team2}), then result_margin_int must be non-null\
        \ and strictly positive, and for the winner\u2019s row in teams_long, winning_runs_margin\
        \ equals result_margin_int. If result = 'wickets' and the match is decided,\
        \ result_margin_int must be between 1 and 10 inclusive, and for the winner\u2019\
        s row, winning_wickets_margin equals result_margin_int. Example constraints:\
        \ satisfies(\"CASE WHEN result = 'runs' AND (winner = team1 OR winner = team2)\
        \ THEN result_margin_int IS NOT NULL AND result_margin_int > 0 ELSE true END\"\
        , \"runs_margin_positive\") and satisfies(\"CASE WHEN result = 'wickets' AND\
        \ (winner = team1 OR winner = team2) THEN result_margin_int IS NOT NULL AND\
        \ result_margin_int BETWEEN 1 AND 10 ELSE true END\", \"wickets_margin_bounds\"\
        )."
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      uid: 4557ba5d-d5e9-464e-92ce-a9f8a04b1430
    - text: "Method 'D/L' indicates a completed match decided by runs or wickets without\
        \ a super over: If method = 'D/L', then result \u2208 {'runs','wickets'},\
        \ result_margin_int is non-null and > 0, a winner is present, and super_over\
        \ = 'N'. Example constraint: satisfies(\"CASE WHEN method = 'D/L' THEN (result\
        \ IN ('runs','wickets') AND result_margin_int IS NOT NULL AND result_margin_int\
        \ > 0 AND winner IS NOT NULL AND super_over = 'N') ELSE true END\", \"dl_requires_completed_match\"\
        )."
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      - start_line: 43
        end_line: 49
        file: ''
      uid: ba3251a7-a57c-4218-9cd5-361ed60d56bf
  '["result","result_margin"]':
    code: []
    assumptions:
    - text: 'When result is ''runs'' or ''wickets'', result_margin must be present,
        numeric, and represent a positive integer. Specifically: (a) result = ''runs''
        implies result_margin >= 1; (b) result = ''wickets'' implies 1 <= result_margin
        <= 10. This can be validated with compliance checks like: CASE WHEN result
        IN (''runs'',''wickets'') THEN result_margin IS NOT NULL AND result_margin
        >= 1 ELSE TRUE END and CASE WHEN result = ''wickets'' THEN result_margin BETWEEN
        1 AND 10 ELSE TRUE END.'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 53
        end_line: 57
        file: ''
      uid: adb3d0ca-107e-4b9b-9f3f-569fe149fdf2
    - text: 'When result is ''tie'' or ''no result'', result_margin should be null
        (no numeric margin recorded). For example: CASE WHEN result IN (''tie'',''no
        result'') THEN result_margin IS NULL ELSE TRUE END.'
      sources:
      - start_line: 43
        end_line: 48
        file: ''
      - start_line: 53
        end_line: 57
        file: ''
      uid: 37962386-2358-49e4-8645-68f279ba7144
    - text: 'If super_over = ''Y'' then result must be ''tie'' (i.e., super overs
        only occur for tied matches). Compliance form: NOT (super_over = ''Y'' AND
        result <> ''tie'').'
      sources:
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 67
        end_line: 69
        file: ''
      uid: 294f8db9-3ffd-44a6-ad03-cc67a1c6165c
    - text: 'For decisive matches (result in {''runs'',''wickets''}), winner must
        be one of {team1, team2}. For non-decisive outcomes (result in {''tie'',''no
        result''}), winner must be null. Compliance example: CASE WHEN result IN (''runs'',''wickets'')
        THEN winner IN (team1, team2) ELSE winner IS NULL END.'
      sources:
      - start_line: 32
        end_line: 38
        file: ''
      - start_line: 45
        end_line: 48
        file: ''
      uid: 81fa8593-98e9-4611-84a3-0b19d1e5174d
    - text: For decisive matches (result in {'runs','wickets'}), exactly one of the
        two per-match rows (team1, team2) should satisfy team = winner; the other
        should not. At the match level this implies winner equals exactly one of {team1,
        team2}. This can be validated by grouping on id and checking SUM(CASE WHEN
        winner IN (team1, team2) THEN 1 ELSE 0 END) = 1 when result IN ('runs','wickets').
      sources:
      - start_line: 29
        end_line: 39
        file: ''
      - start_line: 45
        end_line: 48
        file: ''
      uid: f12ad454-369f-4f3b-a1a2-45ee68ccf55a
    - text: 'The toss_winner must be either team1 or team2 (since toss_made_by_team
        is computed via equality with team). Compliance example: toss_winner IN (team1,
        team2).'
      sources:
      - start_line: 30
        end_line: 36
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      uid: 7ebdec51-55b6-4ff0-bd7f-d3e6d5b9303c
  '["result","result_margin","winner"]':
    code: []
    assumptions:
    - text: 'Winner must be one of the two teams that played whenever the match is
        decided. Specifically: if result IN (''runs'',''wickets'') OR super_over =
        ''Y'', then winner must be NOT NULL and equal to team1 or team2; otherwise
        (tie without super over or no result) winner should be NULL. Deequ (Compliance)
        example: .satisfies("CASE WHEN result IN (''runs'',''wickets'') OR super_over
        = ''Y'' THEN winner IS NOT NULL AND (winner = team1 OR winner = team2) ELSE
        winner IS NULL END", "winner_validity_by_result")'
      sources:
      - start_line: 32
        end_line: 37
        file: ''
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 43
        end_line: 49
        file: ''
      uid: 5733997b-412d-449b-8462-cbb29669e838
    - text: 'No-result matches should have no winner and no margin recorded: if result
        = ''no result'' then winner IS NULL and result_margin IS NULL. Deequ example:
        .satisfies("CASE WHEN result = ''no result'' THEN winner IS NULL AND result_margin
        IS NULL ELSE TRUE END", "no_result_has_no_winner_or_margin")'
      sources:
      - start_line: 46
        end_line: 48
        file: ''
      uid: cf954e94-3958-4c69-9c82-fa54b2ce6935
    - text: 'Ties without a super over should have no winner and no margin: if result
        = ''tie'' AND super_over <> ''Y'' THEN winner IS NULL AND result_margin IS
        NULL. Deequ example: .satisfies("CASE WHEN result = ''tie'' AND super_over
        <> ''Y'' THEN winner IS NULL AND result_margin IS NULL ELSE TRUE END", "tie_no_SO_has_no_winner_or_margin")'
      sources:
      - start_line: 43
        end_line: 48
        file: ''
      - start_line: 68
        end_line: 69
        file: ''
      uid: 884f5981-5b92-47dd-8cb1-574acf1ec370
    - text: 'No rows should indicate both a tie and a super over. Constraint: NOT
        (result = ''tie'' AND super_over = ''Y''). Deequ example: .satisfies("NOT
        (result = ''tie'' AND super_over = ''Y'')", "no_tie_with_super_over")'
      sources:
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 68
        end_line: 69
        file: ''
      uid: b37f069f-f6fc-4c26-893c-3a6d44eb64c9
    - text: 'Result margins must align with the result type: - If result = ''runs''
        THEN result_margin IS NOT NULL AND result_margin >= 1 AND result_margin =
        CAST(result_margin AS INT). - If result = ''wickets'' THEN result_margin IS
        NOT NULL AND result_margin BETWEEN 1 AND 10 AND result_margin = CAST(result_margin
        AS INT). - If result IN (''tie'',''no result'') THEN result_margin IS NULL.
        Deequ example: .satisfies("CASE WHEN result = ''runs'' THEN result_margin
        IS NOT NULL AND result_margin >= 1 AND result_margin = CAST(result_margin
        AS INT) WHEN result = ''wickets'' THEN result_margin IS NOT NULL AND result_margin
        BETWEEN 1 AND 10 AND result_margin = CAST(result_margin AS INT) WHEN result
        IN (''tie'',''no result'') THEN result_margin IS NULL ELSE FALSE END", "margin_consistent_with_result_type")'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      - start_line: 43
        end_line: 46
        file: ''
      uid: 41a08244-028b-4062-92d7-858a5cfe1550
    - text: 'Super-over deciders must produce a winner and a decided result type:
        if super_over = ''Y'' THEN winner IS NOT NULL AND result IN (''runs'',''wickets'').
        Deequ example: .satisfies("CASE WHEN super_over = ''Y'' THEN winner IS NOT
        NULL AND result IN (''runs'',''wickets'') ELSE TRUE END", "super_over_implies_decided_match")'
      sources:
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: 0c84f93c-df59-4999-a2c8-0bafca7500e6
  '["result","super_over"]':
    code: []
    assumptions:
