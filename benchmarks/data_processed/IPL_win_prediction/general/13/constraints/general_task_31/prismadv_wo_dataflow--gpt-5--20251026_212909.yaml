        (e.g., missing values would not be recognized as ''no result'' or ''tie''
        and would default to a counted match with 0/1 points). Example Deequ rule:
        .hasCompleteness("result", lambda v: v == 1.0).'
      sources:
      - start_line: 46
        end_line: 48
        file: ''
      uid: 52874482-cddd-42d0-994f-79b656ec3dd2
    - text: 'If ''result'' is ''runs'' or ''wickets'' (after trim/lower), the match
        should have a numeric result margin present, since downstream analytics compute
        winning margins conditioned on these values. Example Deequ rule: .satisfies("CASE
        WHEN lower(trim(`result`)) IN (''runs'',''wickets'') THEN `result_margin`
        IS NOT NULL ELSE 1 END", "Margin present when result implies margin", lambda
        x: x == 1.0).'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      uid: 49741283-a516-4dfb-a28d-d17538689297
    - text: 'If ''result'' is ''tie'' (after trim/lower), the corresponding ''super_over''
        flag should be explicitly ''Y'' or ''N'' (after trim/upper) to ensure correct
        points attribution. Example Deequ rule: .satisfies("CASE WHEN lower(trim(`result`))
        = ''tie'' THEN upper(trim(`super_over`)) IN (''Y'',''N'') ELSE 1 END", "Super
        over flag defined for ties", lambda x: x == 1.0).'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 47
        end_line: 48
        file: ''
      uid: 1650cc3a-5dde-4009-8ed7-d353a1360851
