    assumptions:
    - text: 'For all rows where result == ''runs'', the ''result_margin'' column must
        be present (non-null) and numeric (parseable to a number). Otherwise the second-innings
        runs computation will produce nulls and distort downstream aggregates. We
        could represent this as a Deequ constraint like: .satisfies("CASE WHEN result
        = ''runs'' THEN CASE WHEN result_margin IS NOT NULL AND CAST(result_margin
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "result_margin present
        and numeric for ''runs''", lambda x: x == 1).'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      - start_line: 59
        end_line: 59
        file: ''
      uid: 05802a0a-9fa7-4c0f-ba40-5e187db2edc6
    - text: 'For rows with result == ''runs'', ''result_margin'' should be a whole
        number of runs and at least 1 (no fractional or zero/negative margins). Example
        Deequ constraint: .satisfies("CASE WHEN result = ''runs'' THEN (result_margin
        >= 1 AND result_margin = FLOOR(result_margin)) ELSE 1 END", "result_margin
        integer and >= 1 for ''runs''", lambda x: x == 1).'
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      uid: adc23e0c-0d91-4825-a770-289da2214a57
    - text: 'For rows with result == ''runs'', ''result_margin'' must be less than
        or equal to target_runs - 1 to ensure the computed second-innings runs is
        non-negative (since second_runs = (target_runs - 1) - result_margin). Example
        Deequ constraint: .satisfies("CASE WHEN result = ''runs'' AND target_runs
        IS NOT NULL THEN result_margin <= (target_runs - 1) ELSE 1 END", "result_margin
        <= target_runs - 1 for ''runs''", lambda x: x == 1).'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 8ef98731-60ef-4686-98f7-1ab0162e0282
    - text: 'When result is in (''wickets'', ''tie'', ''no result''), ''result_margin''
        is not used by the computation and may be null without affecting outputs.
        If present for these outcomes, it should still be numeric and non-negative
        to be consistent. One possible validation: .satisfies("CASE WHEN result IN
        (''wickets'',''tie'',''no result'') THEN (result_margin IS NULL OR (CAST(result_margin
