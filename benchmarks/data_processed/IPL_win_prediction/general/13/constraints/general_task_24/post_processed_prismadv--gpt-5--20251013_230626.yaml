        file: ''
      uid: 3e4013f3-ce8d-4776-86f2-0f3524e0486e
    - text: 'The ''match_type'' values are expected to be within the known set: {''League'',
        ''Qualifier 1'', ''Qualifier 2'', ''Eliminator'', ''Elimination Final'', ''Semi
        Final'', ''Final''}. This prevents unseen categories from being missed by
        the ''League'' filter. This can be enforced with a set-membership check where
        the in-set fraction == 1.0.'
