constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda x: x >= 0.98)'
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("method <> 'D/L' OR (target_runs IS NOT NULL AND target_overs IS
        NOT NULL)", "D/L matches must have target runs and overs specified")
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - '.hasCompleteness(''player_of_match'', lambda x: x >= 0.99)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isPositive('result_margin')
      - Valid
    assumptions: []
  row-level:
    code:
    - - .satisfies("super_over <> 'Y' OR result = 'tie'", "A super over implies the
        original result was a tie")
      - Valid
    - - .satisfies("team1 <> team2", "Opposing teams must be different")
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .satisfies("season = year(to_date(date))", "Season must match the year of
        the match date")
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("result = 'no result' OR winner IS NOT NULL", "Winner must be present
        if there is a result")
      - Valid
    - - .satisfies("winner IS NULL OR winner = team1 OR winner = team2", "Winner must
        be one of the competing teams")
      - Valid
    assumptions: []
