constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda x: x > 0.98, ''city should be mostly present'')'
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - '.satisfies("result NOT IN (''runs'', ''wickets'') OR result_margin IS NOT
        NULL", ''result_margin_completeness'', lambda x: x == 1.0)'
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  winner:
    code:
    - - '.satisfies("winner IS NULL OR winner = team1 OR winner = team2", ''winner_must_be_a_participant'',
        lambda x: x == 1.0)'
      - Valid
    assumptions: []
