constraints:
  date:
    code:
    - - .hasPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      - Valid
    assumptions: []
  id:
    code:
    - - .isPositive('id')
      - Invalid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League','Qualifier 1','Qualifier 2','Eliminator','Final','Semi
        Final','Elimination Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L'], where='method IS NOT NULL')
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs','wickets','tie','no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasMin('result_margin', 0.0, where="result IN ('runs','wickets')")
      - Invalid
    - - .isComplete('result_margin', where="result IN ('runs','wickets')")
      - Invalid
    assumptions: []
  season:
    code:
    - - .hasMax('season', 2100)
      - Invalid
    - - .hasMin('season', 2008)
      - Invalid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y','N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasMax('target_overs', 20.0)
      - Invalid
    - - .hasMin('target_overs', 1.0, where="result = 'runs'")
      - Invalid
    - - .isComplete('target_overs', where="result = 'runs'")
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .hasMin('target_runs', 1.0, where="result IN ('runs','wickets','tie')")
      - Invalid
    - - .isComplete('target_runs', where="result IN ('runs','wickets','tie')")
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1_team2_not_equal:
    code:
    - - .satisfies('team1 <> team2', 'team1_team2_not_equal')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  tie_implies_super_over:
    code:
    - - .satisfies("(result <> 'tie') OR (super_over = 'Y')", 'tie_implies_super_over')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat','field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner_in_teams')
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner', where="result <> 'no result'")
      - Invalid
    assumptions: []
  winner_valid:
    code:
    - - .satisfies("(result = 'no result' AND winner IS NULL) OR (result IN ('runs','wickets','tie')
        AND (winner = team1 OR winner = team2))", 'winner_valid')
      - Valid
    assumptions: []
