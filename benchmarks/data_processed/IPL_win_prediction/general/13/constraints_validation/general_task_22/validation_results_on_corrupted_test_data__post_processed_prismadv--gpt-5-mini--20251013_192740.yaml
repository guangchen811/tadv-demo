results:
  team1:
    code:
    - suggestion: '.satisfies("CASE WHEN team1 IS NOT NULL AND trim(team1) <> ''''
        THEN 1 ELSE 0 END", "team1_not_null_or_empty", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(team1) = team1 THEN 1 ELSE 0 END", "team1_trimmed",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN team1 <> team2 THEN 1 ELSE 0 END", "team1_differs_from_team2",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN team1 <> team2 THEN 1 ELSE
        0 END", "team1_differs_from_team2", lambda x: x == 1)'' failed on data sample:
        Value: 0.9700272479564033 does not meet the constraint requirement!'
      level: error
  team2:
    code:
    - suggestion: '.satisfies("`team2` IS NOT NULL", "team2_not_null", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("trim(`team2`) = `team2`", "team2_no_leading_trailing_whitespace",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasNumberOfDistinctValues("team2", lambda x: x <= 100, None, 1000)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''match_type'', [''League'',''Qualifier 1'',''Qualifier
        2'',''Final'',''Eliminator'',''Elimination Final'',''Semi Final''], lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''trim(match_type) = match_type'', ''match_type_trimmed'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies(''CASE WHEN TRY_CAST(`result_margin` AS double) IS NOT
        NULL THEN 1 ELSE 0 END'', ''Numeric-convertible result_margin'', lambda x:
        x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(result) = ''runs'' THEN CASE WHEN `result_margin`
        IS NOT NULL AND `result_margin` > 0 THEN 1 ELSE 0 END ELSE 1 END", "Margin
        present and >0 for run victories", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(result) = ''wickets'' THEN CASE WHEN
        `result_margin` IS NOT NULL AND `result_margin` BETWEEN 1 AND 10 AND floor(`result_margin`)
        = `result_margin` THEN 1 ELSE 0 END ELSE 1 END", "Valid wicket margins (1-10,
        integer) for wicket victories", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(result) = ''no result'' THEN CASE WHEN
        `result_margin` IS NULL THEN 1 ELSE 0 END ELSE 1 END", "No-result rows have
        null margin", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(`toss_decision`)) IN (''field'',''bat'')
        AND (`toss_winner` = `team1` OR `toss_winner` = `team2`) THEN 1 ELSE 0 END",
        "toss_winner must be one of team1/team2 when toss_decision is present", lambda
        x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN lower(trim(`toss_decision`))
        IN (''field'',''bat'') AND (`toss_winner` = `team1` OR `toss_winner` = `team2`)
        THEN 1 ELSE 0 END", "toss_winner must be one of team1/team2 when toss_decision
        is present", lambda x: x == 1)'' failed on data sample: Value: 0.9836512261580381
        does not meet the constraint requirement!'
      level: error
  super_over:
    code:
    - suggestion: '.satisfies(''CASE WHEN UPPER(TRIM(CAST(`super_over` AS STRING)))
        IN (\''Y\'',\''N\'') THEN 1 ELSE 0 END'', ''super_over_allowed_values'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `toss_winner` IS NOT NULL AND trim(`toss_winner`)
        <> '''' THEN 1 ELSE 0 END", "toss_winner_not_null_nonblank", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` = `team1` OR `toss_winner`
        = `team2` THEN 1 ELSE 0 END", "toss_winner_is_competing_team", lambda x: x
        == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `toss_winner` = `team1`
        OR `toss_winner` = `team2` THEN 1 ELSE 0 END", "toss_winner_is_competing_team",
        lambda x: x == 1)'' failed on data sample: Value: 0.9836512261580381 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` = trim(`toss_winner`) THEN
        1 ELSE 0 END", "toss_winner_no_extra_whitespace", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("CASE WHEN `date` IS NOT NULL AND trim(`date`) <> ''''
        THEN 1 ELSE 0 END", "Date completeness", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("date", "^\\d{4}-\\d{2}-\\d{2}$", lambda x: x >= 0.95,
        name="ISO_YYYY_MM_DD_pattern")'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.satisfies("CASE WHEN trim(coalesce(cast(`season` AS STRING), ''''))
        <> '''' THEN 1 ELSE 0 END", "Non-empty season fraction", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(cast(`season` AS STRING)) RLIKE ''^[0-9]+$''
        THEN 1 ELSE 0 END", "Numeric-season-exists (>=1% rows numeric)", lambda x:
        x >= 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN trim(cast(`season` AS STRING)) = cast(`season`
        AS STRING) THEN 1 ELSE 0 END", "Season-trimmed-consistency (no leading/trailing
        whitespace)", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["date","season"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `season` RLIKE ''^[0-9]+$'' THEN 1 ELSE 0
        END", "Season_Numeric_String", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness(columns=[''match_type''], assertion=lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`match_type`)) RLIKE ''^[a-z ]+$''
        THEN 1 ELSE 0 END", "MatchType_Format_AlphaSpaces", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`toss_decision`)) <> ''field''
        THEN CASE WHEN `toss_winner` = `team1` OR `toss_winner` = `team2` THEN 1 ELSE
        0 END ELSE 1 END", "TossWinner_In_Teams_When_Not_Field", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN lower(trim(`toss_decision`))
        <> ''field'' THEN CASE WHEN `toss_winner` = `team1` OR `toss_winner` = `team2`
        THEN 1 ELSE 0 END ELSE 1 END", "TossWinner_In_Teams_When_Not_Field", lambda
        x: x == 1)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("lower(result) = ''no result'' OR winner IS NOT NULL",
        "winner_present_when_played", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NOT NULL THEN CASE WHEN TRIM(winner)
        = winner THEN 1 ELSE 0 END ELSE 1 END", "winner_trimmed", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN LOWER(TRIM(match_type)) = ''final'' THEN
        CASE WHEN winner IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "winner_present_in_finals",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", "Valid result categories", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'')
        THEN CASE WHEN result_margin IS NOT NULL AND result_margin >= 0 THEN 1 ELSE
        0 END ELSE 1 END", "Margin present for wins by runs/wickets", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) = ''tie'' THEN CASE WHEN
        result_margin IS NULL THEN 1 ELSE 0 END ELSE 1 END", "No margin for ties",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2","toss_winner","winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss winner must be one of the competing teams", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "Toss winner must be one of the competing teams", lambda x: x
        == 1)'' failed on data sample: Value: 0.9836512261580381 does not meet the
        constraint requirement!'
      level: error
    - suggestion: '.satisfies("`winner` IS NULL OR `winner` = `team1` OR `winner`
        = `team2`", "For played matches the winner must be one of the competing teams",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`winner` IS NULL OR `winner` = `team1`
        OR `winner` = `team2`", "For played matches the winner must be one of the
        competing teams", lambda x: x == 1)'' failed on data sample: Value: 0.989100817438692
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`team1` != `team2`", "team1 and team2 must be different",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`team1` != `team2`", "team1 and team2
        must be different", lambda x: x == 1)'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
