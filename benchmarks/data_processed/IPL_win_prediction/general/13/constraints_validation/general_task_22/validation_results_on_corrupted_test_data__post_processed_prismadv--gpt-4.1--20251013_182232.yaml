results:
  team1:
    code:
    - suggestion: '.hasDistinctness([''team1''], lambda x: x <= 19)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('TRIM(`team1`) <> ""', 'No Blank team1 Values')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`match_type` = TRIM(`match_type`)", "match_type has
        no leading or trailing whitespace")
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: .satisfies('CASE WHEN lower(`result`) IN ("runs", "wickets") THEN
        `result_margin` IS NOT NULL ELSE TRUE END', 'result_margin present for runs/wickets
        results')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: '.satisfies(''LOWER(TRIM(`toss_decision`)) IN ("field", "bat")'',
        ''toss_decision valid values'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`toss_winner` = `team1`) OR (`toss_winner` = `team2`)',
        'Valid Toss Winner Team')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''(`toss_winner` = `team1`) OR (`toss_winner`
        = `team2`)'', ''Valid Toss Winner Team'')'' failed on data sample: Value:
        0.9836512261580381 does not meet the constraint requirement!'
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CAST(`date` AS STRING) = `date`", "date is of string
        type")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("to_date(`date`) is not NULL", "date values must be parseable
        as dates")
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: '.hasCompleteness(''season'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(season AS INT) IS NOT NULL'', ''Season convertible
        to integer'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''season = TRIM(season)'', ''Season trimmed'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["chasing_team","team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("`team1` IS NOT NULL AND `team2` IS NOT NULL AND `team1`
        <> `team2`", "Both teams are non-null and distinct", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`team1` IS NOT NULL AND `team2` IS
        NOT NULL AND `team1` <> `team2`", "Both teams are non-null and distinct",
        lambda x: x == 1)'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss winner must be one of the two teams", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "Toss winner must be one of the two teams", lambda x: x == 1)''
        failed on data sample: Value: 0.9836512261580381 does not meet the constraint
        requirement!'
      level: error
  '["date","match_type","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''match_type''], lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''season'', ''date''], lambda x: x >= 0.68)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies(''CASE WHEN result != "no result" THEN winner IS NOT
        NULL ELSE TRUE END'', ''Winner Non-Null for Played Matches'', lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN winner IS NULL THEN 1 WHEN winner IN (team1,
        team2, "tie", "draw") THEN 1 ELSE 0 END'', ''Winner Validity'', lambda x:
        x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN winner IS NULL THEN 1
        WHEN winner IN (team1, team2, "tie", "draw") THEN 1 ELSE 0 END'', ''Winner
        Validity'', lambda x: x == 1)'' failed on data sample: Value: 0.989100817438692
        does not meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: '.hasCompleteness(''result'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) IN (''tie'', ''runs'',
        ''wickets'', ''no result'') THEN 1 ELSE 0 END", ''Valid Result Values'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["match_type","season","winner"]':
    code:
    - suggestion: '.hasUniqueness([''season'', ''match_type''], lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''season'', ''match_type''], lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: .satisfies("((`result` = 'runs' OR `result` = 'wickets') AND `result_margin`
        IS NOT NULL) OR (`result` <> 'runs' AND `result` <> 'wickets')", "Result margin
        required for runs/wickets")
      status: true
      reason_if_failed: ''
      level: error
  '["result","toss_winner","winner"]':
    code:
    - suggestion: .satisfies('(`toss_winner` IS NOT NULL AND `winner` IS NOT NULL
        AND `toss_winner` IN (`team1`, `team2`) AND `winner` IN (`team1`, `team2`))
        OR (`result` = "no result")', 'Toss winner and winner must be valid teams
        for played matches')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''(`toss_winner` IS NOT NULL AND `winner`
        IS NOT NULL AND `toss_winner` IN (`team1`, `team2`) AND `winner` IN (`team1`,
        `team2`)) OR (`result` = "no result")'', ''Toss winner and winner must be
        valid teams for played matches'')'' failed on data sample: Value: 0.9809264305177112
        does not meet the constraint requirement!'
      level: error
