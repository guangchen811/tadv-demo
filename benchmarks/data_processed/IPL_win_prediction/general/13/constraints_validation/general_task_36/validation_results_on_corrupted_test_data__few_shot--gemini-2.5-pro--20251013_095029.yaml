results:
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result NOT IN ('runs', 'wickets') OR result_margin IS
        NOT NULL", 'result_margin must be present for decided matches')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("toss_winner = team1 OR toss_winner = team2", 'toss_winner
        must be one of the competing teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("toss_winner = team1 OR toss_winner
        = team2", ''toss_winner must be one of the competing teams'')'' failed on
        data sample: Value: 0.9836512261580381 does not meet the constraint requirement!'
      level: error
  winner:
    code:
    - suggestion: .satisfies("result != 'no result' OR winner IS NULL", 'winner must
        be null for no_result matches')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        'winner must be one of the competing teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("winner IS NULL OR winner = team1
        OR winner = team2", ''winner must be one of the competing teams'')'' failed
        on data sample: Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
