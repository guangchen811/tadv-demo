results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x >= 0.989)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''result_margin'', lambda x:
        x >= 0.989)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: .satisfies('CASE WHEN result IN (\'runs\', \'wickets\') THEN result_margin
        = CAST(result_margin AS INT) ELSE TRUE END', 'Integer Values for Specific
        Results')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('CASE WHEN result = \'runs\' THEN result_margin BETWEEN
        1 AND 200 ELSE TRUE END', 'Result Margin for Runs')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN result = \'wickets\' THEN result_margin BETWEEN
        1 AND 10 ELSE TRUE END', 'Result Margin for Wickets')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.hasCompleteness(''date'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`date` IS NOT NULL AND `date` != "NaT"', 'Valid Date
        Strings')
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: undefined
  '["date","id","loser","pos_impact","season"]':
    code:
    - suggestion: .satisfies("CASE WHEN `result` IN ('runs', 'wickets') THEN (`winner`
        IS NOT NULL AND (`team1` = `winner` OR `team2` = `winner`)) ELSE TRUE END",
        "Decided Match Winner Non-Null")
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `result` IN (''runs'',
        ''wickets'') THEN (`winner` IS NOT NULL AND (`team1` = `winner` OR `team2`
        = `winner`)) ELSE TRUE END", "Decided Match Winner Non-Null")'' failed on
        data sample: Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasUniqueness([''id'', ''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","id","pos_impact","season","winner"]':
    code:
    - suggestion: '.satisfies(''CASE WHEN (result = "runs" OR result = "wickets")
        THEN winner IS NOT NULL ELSE TRUE END'', ''Winner for Decided Matches'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''id'', ''season'', ''date'', ''winner''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN (result = "runs" OR result = "wickets")
        THEN result_margin IS NOT NULL AND result_margin > 0 ELSE TRUE END'', ''Valid
        Result Margin for Decided Matches'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","id","season","team1","team2"]':
    code:
    - suggestion: .satisfies('team1 != team2', 'Distinct Teams')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''team1 != team2'', ''Distinct Teams'')''
        failed on data sample: Value: 0.9700272479564033 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.hasUniqueness([''id'', ''season'', ''date'', ''team1'', ''team2''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: undefined
  '["match_type","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''match_type''], lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("(result = ''runs'' OR result = ''wickets'') AND result_margin
        IS NOT NULL AND result_margin > 0", "Result Margin Check", lambda x: x >=
        0.98)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(result = ''runs'' OR result = ''wickets'')
        AND result_margin IS NOT NULL AND result_margin > 0", "Result Margin Check",
        lambda x: x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.hasCompleteness(''team1'', lambda x: x >= 0.98).hasCompleteness(''team2'',
        lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result IN (''runs'', ''wickets'', ''tie'', ''no result'')",
        "Result Value Check", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: .satisfies('result IN ("runs", "wickets", "tie", "no result") AND
        super_over IN ("Y", "N")', 'Valid Result and Super Over Values')
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: .satisfies('(winner == team1 OR winner == team2) OR (winner IS NULL)',
        'Winner is one of the participating teams or missing')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''(winner == team1 OR winner == team2)
        OR (winner IS NULL)'', ''Winner is one of the participating teams or missing'')''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: error
