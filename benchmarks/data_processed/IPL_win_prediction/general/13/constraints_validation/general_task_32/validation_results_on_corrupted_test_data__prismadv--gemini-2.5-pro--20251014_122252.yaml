      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("`result_margin` IS NULL OR TRY_CAST(`result_margin`
        AS DOUBLE) IS NOT NULL", "result_margin_is_numeric_or_null", lambda x: x >
        0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        `result_margin` IS NOT NULL ELSE TRUE END", "result_margin_not_null_for_decided_matches",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') AND `result_margin`
        IS NOT NULL THEN `result_margin` = FLOOR(`result_margin`) ELSE TRUE END",
        "result_margin_is_integer_for_decided_matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isComplete("super_over")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("trim(upper(cast(`super_over` as string))) IN (''Y'',
        ''N'')", "super_over can be normalized to Y/N", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("to_date(`date`) IS NOT NULL", "Date is parsable", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("date")
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: error
  '["date","id","match_type","result","result_margin","season","super_over","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR winner = team1
        OR winner = team2", "winner must be one of the participating teams for decided
        matches", lambda x: x == 1.0)'
