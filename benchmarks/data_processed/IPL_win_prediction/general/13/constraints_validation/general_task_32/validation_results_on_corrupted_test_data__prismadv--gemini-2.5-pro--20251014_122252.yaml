results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "WinnerMustBeOneOfTheTeams", lambda check: check == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("winner IS NULL OR winner = team1
        OR winner = team2", "WinnerMustBeOneOfTheTeams", lambda check: check == 1.0)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("TRIM(team2) != ''", "team2 is not an empty string")
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete("match_type")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("match_type", ["League", "Qualifier 1", "Qualifier
        2", "Final", "Eliminator", "Semi Final", "Elimination Final"])
