results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.hasDistinctness([''team2''], lambda x: x == 19 / 550)'
      status: false
      reason_if_failed: 'Constraint ''hasDistinctness([''team2''], lambda x: x ==
        19 / 550)'' failed on data sample: Value: 0.04904632152588556 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: .satisfies('team2 != team1', 'Mutually Exclusive Teams')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''team2 != team1'', ''Mutually Exclusive
        Teams'')'' failed on data sample: Value: 0.9700272479564033 does not meet
        the constraint requirement!'
      level: error
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies(''(`result` = "runs" OR `result` = "wickets") AND `result_margin`
        IS NOT NULL AND CAST(`result_margin` AS INT) = `result_margin`'', ''Result
        margin consistency'', lambda x: x >= 0.9890909090909091)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''(`result` = "runs" OR `result` =
        "wickets") AND `result_margin` IS NOT NULL AND CAST(`result_margin` AS INT)
        = `result_margin`'', ''Result margin consistency'', lambda x: x >= 0.9890909090909091)''
        failed on data sample: Value: 0.9782016348773842 does not meet the constraint
        requirement!'
      level: error
  target_runs:
    code:
    - suggestion: '.satisfies(''target_overs IS NULL OR target_runs IS NOT NULL'',
        ''Target Runs Completeness'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: '.satisfies(''toss_winner = winner'', ''Toss Winner Equals Winner'',
        lambda x: x >= 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.satisfies(''`date` is not NULL'', ''Parsable Dates'', lambda x:
        x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.haveCompleteness([''method''], lambda x: x <= 0.0255)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`winner` IS NULL OR `winner` IN (`team1`, `team2`)',
        'Winner must match team1 or team2 when result is not no result')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`winner` IS NULL OR `winner` IN
        (`team1`, `team2`)'', ''Winner must match team1 or team2 when result is not
        no result'')'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: .satisfies('result IN ("runs", "wickets", "tie", "no result")',
        "Valid Result Values")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('result IN ("runs", "wickets", "tie", "no result")',
        "Allow 'no result' temporarily for KPI Calculations")
      status: true
      reason_if_failed: ''
      level: warning
  '["season","toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies(''result != "no result" AND toss_winner IS NOT NULL
        AND winner IS NOT NULL'', ''Toss and Match Winner Completeness'', lambda x:
        x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''result != "no result" AND toss_winner
        IS NOT NULL AND winner IS NOT NULL'', ''Toss and Match Winner Completeness'',
        lambda x: x >= 0.998)'' failed on data sample: Value: 0.989100817438692 does
        not meet the constraint requirement!'
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies(''winner IS NULL OR winner = team1 OR winner = team2'',
        ''Winner Matches Participating Teams'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''winner IS NULL OR winner = team1
        OR winner = team2'', ''Winner Matches Participating Teams'', lambda x: x ==
        1)'' failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: error
  '["toss_winner","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN `winner` IS
        NOT NULL ELSE TRUE END", "Winner is not null when result is determined", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL THEN (`team1` IS NOT
        NULL OR `team2` IS NOT NULL) ELSE TRUE END", "Teams are not null when winner
        is determined", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
