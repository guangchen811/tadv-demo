results:
  date:
    code:
    - suggestion: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isPositive('target_overs')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("toss_winner IN (team1, team2)", 'toss_winner_in_teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("toss_winner IN (team1, team2)",
        ''toss_winner_in_teams'')'' failed on data sample: Value: 0.9836512261580381
        does not meet the constraint requirement!'
      level: error
  winner:
    code:
    - suggestion: .satisfies("(result = 'no result' AND (winner IS NULL OR winner
        = '')) OR (result IN ('runs','wickets','tie') AND winner IS NOT NULL)", 'winner_required_when_resulted')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("winner IN (team1, team2) OR winner IS NULL", 'winner_in_teams_or_null')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("winner IN (team1, team2) OR winner
        IS NULL", ''winner_in_teams_or_null'')'' failed on data sample: Value: 0.989100817438692
        does not meet the constraint requirement!'
      level: error
