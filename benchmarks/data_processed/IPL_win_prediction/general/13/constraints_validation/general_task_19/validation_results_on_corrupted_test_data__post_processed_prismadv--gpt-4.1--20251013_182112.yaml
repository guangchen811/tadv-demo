results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier
        2', 'Eliminator', 'Final', 'Elimination Final', 'Semi Final'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies(''NOT (`method` = "D/L" AND (`target_overs` IS NULL
        OR `target_overs` <= 0))'', ''D/L target_overs positive'', lambda x: x >=
        0.998)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''NOT (`method` = "D/L" AND (`target_overs`
        IS NULL OR `target_overs` <= 0))'', ''D/L target_overs positive'', lambda
        x: x >= 0.998)'' failed on data sample: Value: 0.9945504087193461 does not
        meet the constraint requirement!'
      level: error
    - suggestion: '.hasDistinctness([''target_overs''], lambda x: x <= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN result_margin
        IS NOT NULL ELSE TRUE END", "Result Margin Required for Wins", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .satisfies('CASE WHEN `method` = "D/L" THEN `target_runs` IS NOT
        NULL ELSE TRUE END', 'target_runs must be present for D/L method')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN `method` = "D/L" THEN `target_runs` >= 0 ELSE
        TRUE END', 'target_runs non-negative for D/L method')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(`super_over` = 'Y' AND `result` = 'tie' AND `winner`
        IS NOT NULL) OR (`super_over` = 'N')", "super_over Y only for tie with winner")
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .satisfies('to_date(`date`) IS NOT NULL', 'Parsable Dates')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL OR `method` = ''D/L'' THEN
        1 ELSE 0 END", "Valid Method Values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN (target_runs IS NOT
        NULL AND target_overs IS NOT NULL) ELSE TRUE END", "D/L rows have targets",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: '.hasCompleteness(''id'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","id"]':
    code:
    - suggestion: '.haveCompleteness([''id'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''id'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("(`match_type` != ''League'') OR (`result` = ''no result'')
        OR (`winner` IS NOT NULL)", "League matches with result must have winner",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`winner` IS NULL) OR (`winner` = `team1`) OR (`winner`
        = `team2`)", "Winner must be one of the two teams if present", lambda x: x
        == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`winner` IS NULL) OR (`winner` =
        `team1`) OR (`winner` = `team2`)", "Winner must be one of the two teams if
        present", lambda x: x == 1)'' failed on data sample: Value: 0.989100817438692
        does not meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `match_type` = 'League' THEN `result` IN ('runs',
        'wickets', 'tie', 'no result') ELSE true END", "League result value valid")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `result` IN ('runs', 'wickets') THEN `result_margin`
        IS NOT NULL AND `winner` IS NOT NULL ELSE true END", "Result margin and winner
        present for runs/wickets")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `result` = 'tie' THEN `winner` IS NOT NULL
        ELSE true END", "Winner present for tie")
      status: true
      reason_if_failed: ''
      level: error
  '["match_type","result","winner"]':
    code:
    - suggestion: .satisfies('(`match_type` != "League") OR (`result` = "no result")
        OR (`winner` IS NOT NULL)', 'League winner present when result is not no result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`match_type` != "League") OR (`winner` IS NULL) OR
        (`winner` = `team1`) OR (`winner` = `team2`)', 'League winner must be one
        of the teams')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''(`match_type` != "League") OR (`winner`
        IS NULL) OR (`winner` = `team1`) OR (`winner` = `team2`)'', ''League winner
        must be one of the teams'')'' failed on data sample: Value: 0.9918256130790191
        does not meet the constraint requirement!'
      level: error
  '["method","target_overs","target_runs"]':
    code:
    - suggestion: .satisfies('(`method` IS NULL) OR (`method` != "D/L") OR (`target_runs`
        IS NOT NULL AND `target_overs` IS NOT NULL)', 'D/L rows must have target_runs
        and target_overs present')
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","team1","team2","winner"]':
    code:
    - suggestion: .satisfies("(winner IS NULL OR result = 'no result') OR (winner
        = team1 OR winner = team2)", "Winner is one of the two teams")
      status: false
      reason_if_failed: 'Constraint ''satisfies("(winner IS NULL OR result = ''no
        result'') OR (winner = team1 OR winner = team2)", "Winner is one of the two
        teams")'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: error
    - suggestion: .satisfies("(result = 'no result' OR winner IS NOT NULL)", "Winner
        present when result is not 'no result'")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result NOT IN ('runs', 'wickets')) OR (result_margin
        IS NOT NULL AND result_margin > 0)", "Result margin present and positive for
        runs/wickets")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("team1 != team2", "Team1 and Team2 are not the same")
      status: false
      reason_if_failed: 'Constraint ''satisfies("team1 != team2", "Team1 and Team2
        are not the same")'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.hasUniqueness([''season'', ''team1'', ''team2'', ''date''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2"]':
    code:
    - suggestion: .satisfies('team1 != team2', 'Team1 and Team2 must be different')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''team1 != team2'', ''Team1 and Team2
        must be different'')'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.haveCompleteness([''team1'', ''team2''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''team1'', ''team2'', ''date''], lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'Winner must be one of the two teams')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''winner IS NULL OR winner = team1
        OR winner = team2'', ''Winner must be one of the two teams'')'' failed on
        data sample: Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies('team1 != team2', 'Teams must not play against themselves')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''team1 != team2'', ''Teams must not
        play against themselves'')'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
