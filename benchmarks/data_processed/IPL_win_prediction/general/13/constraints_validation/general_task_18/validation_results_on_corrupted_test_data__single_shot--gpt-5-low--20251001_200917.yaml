results:
  date:
    code:
    - suggestion: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
  dl_targets_positive_and_within_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN target_runs > 0 AND
        target_overs > 0 AND target_overs <= 20 ELSE TRUE END", ''dl_targets_valid'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  dl_targets_present:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN target_runs IS NOT
        NULL AND target_overs IS NOT NULL ELSE TRUE END", ''dl_requires_targets'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive('id')
      status: true
      reason_if_failed: ''
      level: error
  method_values:
    code:
    - suggestion: '.satisfies("method IS NULL OR method = ''D/L''", ''method_is_null_or_dl'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
  result_margin_for_runs_wickets:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL AND result_margin >= 0 ELSE TRUE END", ''margin_present_and_nonnegative_when_required'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_values:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("season BETWEEN 2008 AND 2024", ''season_in_expected_range'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
  super_over_logic:
    code:
    - suggestion: '.satisfies("(result = ''tie'' AND super_over = ''Y'') OR (result
        <> ''tie'' AND super_over = ''N'')", ''super_over_matches_tie_logic'', lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over_values:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1_vs_team2:
    code:
    - suggestion: '.satisfies(''team1 <> team2'', ''teams_are_different'', lambda
        v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''team1 <> team2'', ''teams_are_different'',
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision_values:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner_in_teams:
    code:
    - suggestion: '.satisfies("(toss_winner = team1) OR (toss_winner = team2)", ''toss_winner_is_one_of_the_teams'',
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(toss_winner = team1) OR (toss_winner
        = team2)", ''toss_winner_is_one_of_the_teams'', lambda v: v == 1.0)'' failed
        on data sample: Value: 0.9836512261580381 does not meet the constraint requirement!'
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner_absent_for_no_result:
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN winner IS NULL
        ELSE TRUE END", ''winner_absent_for_no_result'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner_presence_when_needed:
    code:
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' THEN winner IS NOT
        NULL ELSE TRUE END", ''winner_present_for_decided_matches'', lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
