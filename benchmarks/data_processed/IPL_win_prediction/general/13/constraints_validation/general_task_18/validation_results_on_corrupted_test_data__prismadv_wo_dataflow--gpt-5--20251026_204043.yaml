      status: true
      reason_if_failed: ''
      level: warning
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("city IS NULL OR (TRIM(city) <> '''' AND UPPER(TRIM(city))
