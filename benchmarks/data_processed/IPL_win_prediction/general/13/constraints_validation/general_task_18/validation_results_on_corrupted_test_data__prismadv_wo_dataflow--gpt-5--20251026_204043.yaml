      status: false
      reason_if_failed: 'Constraint ''satisfies(''toss_winner = team1 OR toss_winner
        = team2'', ''Toss winner in {team1, team2}'', lambda x: x == 1.0)'' failed
        on data sample: Value: 0.9836512261580381 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(result = ''no result'') OR (winner = team1 OR winner
