      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(`toss_decision`) <> ''''", "toss_decision not
