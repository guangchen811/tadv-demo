      reason_if_failed: 'Constraint ''satisfies(''`team1` <> `team2`'', ''Two distinct
        teams per match'', lambda x: x == 1)'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''(`result` = \''no result\'') OR (`winner` = `team1`)
        OR (`winner` = `team2`)'', ''Winner must be one of the teams when result is
        decided'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''(`result` = \''no result\'') OR
