      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(method IS NULL OR method <> ''D/L'' OR CAST(target_overs
        AS DOUBLE) > 0)", "target_overs positive on D/L", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(method IS NULL OR method <> ''D/L'' OR NOT (UPPER(TRIM(CAST(target_overs
        AS STRING))) IN (''NAN'', '''')))", "no NaN/empty in target_overs on D/L",
