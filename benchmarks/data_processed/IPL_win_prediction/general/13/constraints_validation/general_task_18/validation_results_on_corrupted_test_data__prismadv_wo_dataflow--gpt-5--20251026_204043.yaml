      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (trim(`date`) = '''' OR lower(`date`) IN (''nan'',''none'',''null''))",
