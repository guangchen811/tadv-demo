      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("to_date(regexp_replace(`date`, ''/'', ''-'')) IS NOT
        NULL", "date parseable to date", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''date'', r''^\d{4}[-/]\d{1,2}[-/]\d{1,2}$'', lambda
        x: x == 1.0, name=''date has explicit Y-M-D'')'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(season AS INT) = YEAR(to_date(`date`))", "Season
