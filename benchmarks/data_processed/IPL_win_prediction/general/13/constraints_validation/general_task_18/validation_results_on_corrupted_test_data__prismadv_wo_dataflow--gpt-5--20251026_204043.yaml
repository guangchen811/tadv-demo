        the constraint requirement!'
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("(method IS NULL OR method <> ''D/L'' OR target_overs
        IS NOT NULL)", "D/L rows have target_overs", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(method IS NULL OR method <> ''D/L'' OR CAST(target_overs
