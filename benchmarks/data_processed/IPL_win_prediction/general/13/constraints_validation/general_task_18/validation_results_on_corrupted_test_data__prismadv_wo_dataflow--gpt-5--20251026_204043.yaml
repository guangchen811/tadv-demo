        teams when result is decided'', lambda x: x == 1)'' failed on data sample:
        Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''(`toss_winner` = `team1`) OR (`toss_winner` = `team2`)'',
        ''Toss winner must be one of the two teams'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''(`toss_winner` = `team1`) OR (`toss_winner`
        = `team2`)'', ''Toss winner must be one of the two teams'', lambda x: x ==
        1)'' failed on data sample: Value: 0.9836512261580381 does not meet the constraint
        requirement!'
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''team2 = TRIM(team2) AND LENGTH(TRIM(team2)) > 0'',
