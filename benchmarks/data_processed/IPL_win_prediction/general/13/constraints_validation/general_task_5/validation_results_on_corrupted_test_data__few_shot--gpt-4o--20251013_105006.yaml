results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: '.hasNumberOfDistinctValues(''match_type'', lambda x: x >= 1)'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''match_type'',
        lambda x: x >= 1)'': Check.hasNumberOfDistinctValues() missing 2 required
        positional arguments: ''binningUdf'' and ''maxBins'''
      level: error
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .isComplete('winner')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''winner'')'' failed on data sample:
        Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
