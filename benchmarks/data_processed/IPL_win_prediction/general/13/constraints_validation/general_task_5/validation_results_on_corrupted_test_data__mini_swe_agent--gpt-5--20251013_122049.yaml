results:
  date:
    code:
    - suggestion: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Playoff', 'Qualifier',
        'Eliminator', 'Final'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''match_type'', [''League'',
        ''Playoff'', ''Qualifier'', ''Eliminator'', ''Final''])'' failed on data sample:
        Value: 0.9645776566757494 does not meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'no result', 'tie'])
      status: true
      reason_if_failed: ''
      level: error
  result,super_over:
    code:
    - suggestion: '.satisfies("(result != ''tie'') OR (super_over = ''Y'')", ''TieImpliesSuperOver'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(super_over != ''Y'') OR (result = ''tie'')", ''SuperOverImpliesTie'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1,team2:
    code:
    - suggestion: '.satisfies("team1 != team2", ''Team1NotEqualTeam2'', lambda v:
        v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("team1 != team2", ''Team1NotEqualTeam2'',
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  winner,result:
    code:
    - suggestion: '.satisfies("(result = ''no result'') OR (winner IS NOT NULL)",
        ''WinnerPresentWhenNotNoResult'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner,result,team1,team2:
    code:
    - suggestion: '.satisfies("(result = ''no result'') OR ((winner = team1 OR winner
        = team2))", ''WinnerMustBeATeamWhenDecided'', lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(result = ''no result'') OR ((winner
        = team1 OR winner = team2))", ''WinnerMustBeATeamWhenDecided'', lambda v:
        v == 1.0)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: error
