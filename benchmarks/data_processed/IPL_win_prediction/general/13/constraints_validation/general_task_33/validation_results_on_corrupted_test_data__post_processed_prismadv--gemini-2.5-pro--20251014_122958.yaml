results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("TRIM(`team1`) = `team1`", "team1 values should be free
        of leading/trailing whitespace")
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("TRIM(`team2`) = `team2`", "team2 should not have leading/trailing
        spaces")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`winner` IS NULL OR `winner` = `team1` OR `winner` =
        `team2`", "Winner must be one of the participating teams")
      status: false
      reason_if_failed: 'Constraint ''satisfies("`winner` IS NULL OR `winner` = `team1`
        OR `winner` = `team2`", "Winner must be one of the participating teams")''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: error
  match_type:
    code:
    - suggestion: .isComplete("match_type")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`match_type` = ''League''", "contains_league", lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("match_type", ["Elimination Final", "Eliminator",
        "Qualifier 2", "Final", "Semi Final", "Qualifier 1", "League"])
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies(''target_overs IS NULL OR target_overs != 0'', ''target_overs_not_zero'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness("result_margin", lambda x: x > 0.98)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("result_margin", lambda x: x
        > 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: .isNonNegative("result_margin")
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'', ''tie'')
        THEN `winner` IS NOT NULL ELSE TRUE END", "Winner should not be null for completed
        matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`winner` IS NULL OR `winner` = `team1` OR `winner`
        = `team2`", "Winner must be a participating team", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`winner` IS NULL OR `winner` = `team1`
        OR `winner` = `team2`", "Winner must be a participating team", lambda x: x
        == 1)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("result", ["runs", "wickets", "tie", "no result"])
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR result_margin
        IS NOT NULL", "result_margin should not be null when result is ''runs'' or
        ''wickets''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","target_overs"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN result_margin IS NOT
        NULL AND target_overs > 0 AND winner IS NOT NULL WHEN result = ''wickets''
        THEN result_margin IS NOT NULL AND winner IS NOT NULL WHEN result = ''tie''
        THEN winner IS NOT NULL ELSE TRUE END", "validate_match_result_dependencies",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("(result IN (''runs'', ''wickets'', ''tie'') AND winner
        IS NOT NULL AND (winner = team1 OR winner = team2)) OR (result = ''no result''
        AND winner IS NULL)", "winner_consistency", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(result IN (''runs'', ''wickets'',
        ''tie'') AND winner IS NOT NULL AND (winner = team1 OR winner = team2)) OR
        (result = ''no result'' AND winner IS NULL)", "winner_consistency", lambda
        x: x == 1)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies("team1 <> team2", "teams_must_be_distinct", lambda x:
        x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("team1 <> team2", "teams_must_be_distinct",
        lambda x: x == 1)'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: error
  '["result","winner"]':
    code:
    - suggestion: '.satisfies("result != ''no result'' OR winner IS NULL", "''no result''
        implies no winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'', ''tie'') OR winner
        IS NOT NULL", "Conclusive results must have a winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("`team1` = `team2`", "team1_is_not_team2", lambda x:
        x == 0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`team1` = `team2`", "team1_is_not_team2",
        lambda x: x == 0)'' failed on data sample: Value: 0.02997275204359673 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("winner IS NOT NULL AND winner <> `team1` AND winner
        <> `team2`", "winner_is_a_participant", lambda x: x == 0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("winner IS NOT NULL AND winner <>
        `team1` AND winner <> `team2`", "winner_is_a_participant", lambda x: x ==
        0)'' failed on data sample: Value: 0.010899182561307902 does not meet the
        constraint requirement!'
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`winner` IS NULL OR `winner` = `team1` OR `winner`
        = `team2`", "winner_is_participant", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`winner` IS NULL OR `winner` = `team1`
        OR `winner` = `team2`", "winner_is_participant", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_are_different", lambda
        x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`team1` <> `team2`", "teams_are_different",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: error
