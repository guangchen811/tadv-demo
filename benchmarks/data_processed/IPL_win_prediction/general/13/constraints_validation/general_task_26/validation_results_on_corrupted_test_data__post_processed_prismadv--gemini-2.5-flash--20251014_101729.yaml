results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.satisfies("TRIM(team2) != ''''", "team2_not_empty_string", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: '.isContainedIn("match_type", [''Elimination Final'', ''Eliminator'',
        ''Qualifier 2'', ''Final'', ''Semi Final'', ''Qualifier 1'', ''League''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.hasCompleteness("target_overs", lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("target_overs", lambda x: x
        >= 0.998)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.isPositive("target_overs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`target_overs` <= 20.0", "target_overs_max_20", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.hasCompleteness("result_margin", lambda x: x < 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("result_margin", lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.hasCompleteness("target_runs", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative("target_runs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete("toss_decision")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("toss_decision", ["bat", "field"])
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.isContainedIn(''super_over'', [''Y'', ''N''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_valid_team", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "toss_winner_is_valid_team", lambda x: x == 1.0)'' failed on data
        sample: Value: 0.9836512261580381 does not meet the constraint requirement!'
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("to_timestamp(`date`) IS NOT NULL", "Date Parsability",
        assertion=lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("CAST(date AS DATE) IS NOT NULL AND CAST(season AS INT)
        IS NOT NULL AND YEAR(CAST(date AS DATE)) = CAST(season AS INT)", "DateYearMatchesSeason",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("winner = team1 OR winner = team2", "Winner is one of
        the playing teams", lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("winner = team1 OR winner = team2",
        "Winner is one of the playing teams", lambda x: x >= 0.998)'' failed on data
        sample: Value: 0.9782016348773842 does not meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isContainedIn("result", ["runs", "wickets", "tie", "no result"])
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("result IN (''runs'', ''wickets'') AND result_margin
        < 0", "No Negative Result Margin for Wins", lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("(`super_over` = ''Y'') = (`result` = ''tie'')", "super_over_Y_iff_result_tie",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`result` = ''runs'') OR (`result_margin` IS NOT
        NULL AND `result_margin` > 0)", "positive_margin_for_runs_result", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`result` = ''wickets'') OR (`result_margin` IS
        NOT NULL AND `result_margin` > 0)", "positive_margin_for_wickets_result",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`result` = ''tie'' OR `result` = ''no result'')
        OR (`result_margin` IS NULL OR `result_margin` = 0)", "margin_zero_for_tie_no_result",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("(`result` = ''runs'' OR `result` = ''wickets'') AND
        (`winner` IS NULL OR (`winner` != `team1` AND `winner` != `team2`))", "Winner_Decisive_Outcome_Violation_Check",
        lambda x: x == 0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`result` = ''runs'' OR `result`
        = ''wickets'') AND (`winner` IS NULL OR (`winner` != `team1` AND `winner`
        != `team2`))", "Winner_Decisive_Outcome_Violation_Check", lambda x: x == 0)''
        failed on data sample: Value: 0.010899182561307902 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.satisfies("(`result` = ''runs'') AND (`result_margin` IS NOT NULL)
        AND (`result_margin` < 0)", "Result_Margin_Runs_NonNegative_Violation_Check",
        lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` = ''wickets'') AND (`result_margin` IS NOT
        NULL) AND (`result_margin` < 0)", "Result_Margin_Wickets_NonNegative_Violation_Check",
        lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` = ''wickets'') AND (`result_margin` IS NOT
        NULL) AND (CAST(`result_margin` AS INT) != `result_margin`)", "Result_Margin_Wickets_Integral_Violation_Check",
        lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("NOT (target_overs = 0 AND target_runs IS NOT NULL AND
        target_runs != 0)", "target_overs_cannot_be_zero_if_target_runs_is_non_zero",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("winner = team1 OR winner = team2", "Winner must be
        one of the playing teams", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("winner = team1 OR winner = team2",
        "Winner must be one of the playing teams", lambda x: x >= 0.99)'' failed on
        data sample: Value: 0.9782016348773842 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "Toss
        winner must be one of the playing teams", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("toss_winner = team1 OR toss_winner
        = team2", "Toss winner must be one of the playing teams", lambda x: x == 1)''
        failed on data sample: Value: 0.9836512261580381 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.satisfies("team1 != team2", "Teams in a match must be distinct",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("team1 != team2", "Teams in a match
        must be distinct", lambda x: x == 1)'' failed on data sample: Value: 0.9700272479564033
        does not meet the constraint requirement!'
      level: error
