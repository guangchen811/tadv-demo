results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: undefined
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''player_of_match'', lambda
        x: x >= 0.998)'' failed on data sample: Value: 0.989100817438692 does not
        meet the constraint requirement!'
      level: warning
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.haveCompleteness([''target_runs''], lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''haveCompleteness([''target_runs''], lambda x:
        x >= 0.998)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: warning
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'Valid
        Toss Winner')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''toss_winner = team1 OR toss_winner
        = team2'', ''Valid Toss Winner'')'' failed on data sample: Value: 0.9836512261580381
        does not meet the constraint requirement!'
      level: undefined
  date:
    code:
    - suggestion: .satisfies("date IS NOT NULL", "Non-null Dates")
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies("CAST(date AS DATE) IS NOT NULL", "Valid Date Format")
      status: true
      reason_if_failed: ''
      level: undefined
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: undefined
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL OR `method` = ''D/L'' THEN
        1 ELSE 0 END", "Valid Method Values", lambda x: x >= 0.975)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') OR (`result`
        = ''tie'' AND `super_over` = ''Y'') THEN `winner` IS NOT NULL ELSE TRUE END",
        "Winner Not Null When Result Decided", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: undefined
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN (`result` = ''runs'' OR `result` = ''wickets''
        OR `result` = ''tie'') THEN `team1` IS NOT NULL AND `team2` IS NOT NULL ELSE
        TRUE END", "Team Columns Completeness", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN `target_runs` IS
        NOT NULL AND `target_overs` IS NOT NULL ELSE TRUE END", "D/L Method Target
        Values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (`result` = ''runs'' OR `result` = ''wickets''
        OR `result` = ''tie'') THEN `team1` IS NOT NULL AND `team2` IS NOT NULL AND
        `winner` IS NOT NULL AND `result` IS NOT NULL ELSE TRUE END", "Match Outcome
        Columns Completeness", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies(''CASE WHEN `super_over` = "Y" THEN `result` = "tie"
        ELSE TRUE END'', ''Super Over Result Tie'', lambda x: x == True)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `super_over` = "Y" THEN `result` != "no
        result" ELSE TRUE END'', ''Super Over No Result'', lambda x: x == True)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("(`winner` = `team1` OR `winner` = `team2` OR (`winner`
        IS NULL AND `result` = ''no result''))", "Winner Validity", lambda x: x ==
        1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`winner` = `team1` OR `winner` =
        `team2` OR (`winner` IS NULL AND `result` = ''no result''))", "Winner Validity",
        lambda x: x == 1)'' failed on data sample: Value: 0.989100817438692 does not
        meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "Distinct Teams", lambda x: x
        == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`team1` <> `team2`", "Distinct Teams",
        lambda x: x == 1)'' failed on data sample: Value: 0.9700272479564033 does
        not meet the constraint requirement!'
      level: error
