        \ failed on data sample: org.apache.spark.sql.catalyst.parser.ParseException:\
        \ \n[PARSE_SYNTAX_ERROR] Syntax error at or near '=>'.(line 1, pos 72)\n\n\
        == SQL ==\n(result IN ('runs','wickets')) OR (result = 'tie' AND super_over\
        \ = 'Y') => winner IS NOT NULL\n------------------------------------------------------------------------^^^\n"
      level: error
