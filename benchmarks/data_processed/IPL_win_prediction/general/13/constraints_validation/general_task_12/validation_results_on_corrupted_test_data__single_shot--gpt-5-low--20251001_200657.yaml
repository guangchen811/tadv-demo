results:
  date:
    code:
    - suggestion: .hasPattern('date', '^\\d{4}-\\d{2}-\\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("method IS NULL OR method = 'D/L'", 'method_null_or_dl')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result IN ('runs','wickets')) => result_margin IS NOT
        NULL AND result_margin > 0", 'margin_present_for_decided_matches')
      status: false
      reason_if_failed: "Constraint '.satisfies(\"(result IN ('runs','wickets')) =>\
        \ result_margin IS NOT NULL AND result_margin > 0\", 'margin_present_for_decided_matches')'\
        \ failed on data sample: org.apache.spark.sql.catalyst.parser.ParseException:\
        \ \n[PARSE_SYNTAX_ERROR] Syntax error at or near '=>'.(line 1, pos 31)\n\n\
        == SQL ==\n(result IN ('runs','wickets')) => result_margin IS NOT NULL AND\
        \ result_margin > 0\n-------------------------------^^^\n"
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isContainedInRange('target_overs', 1.0, 20.0)
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isContainedInRange(''target_overs'',
        1.0, 20.0)'': ''Check'' object has no attribute ''isContainedInRange'''
      level: error
    - suggestion: .satisfies("method = 'D/L' => target_overs IS NOT NULL", 'target_overs_present_when_dl')
      status: false
      reason_if_failed: "Constraint '.satisfies(\"method = 'D/L' => target_overs IS\
        \ NOT NULL\", 'target_overs_present_when_dl')' failed on data sample: org.apache.spark.sql.catalyst.parser.ParseException:\
        \ \n[PARSE_SYNTAX_ERROR] Syntax error at or near '=>'.(line 1, pos 15)\n\n\
        == SQL ==\nmethod = 'D/L' => target_overs IS NOT NULL\n---------------^^^\n"
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("method = 'D/L' => target_runs IS NOT NULL", 'target_runs_present_when_dl')
      status: false
      reason_if_failed: "Constraint '.satisfies(\"method = 'D/L' => target_runs IS\
        \ NOT NULL\", 'target_runs_present_when_dl')' failed on data sample: org.apache.spark.sql.catalyst.parser.ParseException:\
        \ \n[PARSE_SYNTAX_ERROR] Syntax error at or near '=>'.(line 1, pos 15)\n\n\
        == SQL ==\nmethod = 'D/L' => target_runs IS NOT NULL\n---------------^^^\n"
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1_vs_team2:
    code:
    - suggestion: .satisfies('team1 <> team2', 'teams_are_distinct')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''team1 <> team2'', ''teams_are_distinct'')''
        failed on data sample: Value: 0.9700272479564033 does not meet the constraint
        requirement!'
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss_winner_is_a_participating_team')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(toss_winner = team1) OR (toss_winner
        = team2)'', ''toss_winner_is_a_participating_team'')'' failed on data sample:
        Value: 0.9836512261580381 does not meet the constraint requirement!'
      level: error
  winner:
    code:
    - suggestion: .satisfies("(result IN ('runs','wickets')) OR (result = 'tie' AND
        super_over = 'Y') => winner IS NOT NULL", 'winner_present_for_decided_or_superover_tie')
      status: false
      reason_if_failed: "Constraint '.satisfies(\"(result IN ('runs','wickets')) OR\
