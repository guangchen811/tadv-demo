results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("(method != 'D/L') OR (target_runs IS NOT NULL AND target_overs
        IS NOT NULL)", 'dls_has_targets')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(method != ''D/L'') OR (target_runs
        IS NOT NULL AND target_overs IS NOT NULL)", ''dls_has_targets'')'' failed
        on data sample: Value: 0.9945504087193461 does not meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result IN ('runs', 'wickets') AND result_margin IS
        NOT NULL) OR (result NOT IN ('runs', 'wickets'))", 'margin_present_for_decided')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isNonNegative('target_overs')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(toss_winner = team1) OR (toss_winner = team2)", 'toss_winner_in_teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(toss_winner = team1) OR (toss_winner
        = team2)", ''toss_winner_in_teams'')'' failed on data sample: Value: 0.9836512261580381
        does not meet the constraint requirement!'
      level: error
  winner:
    code:
    - suggestion: .satisfies("(result != 'no result') OR winner IS NULL", 'no_winner_for_no_result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result != 'tie' OR super_over != 'Y') OR winner IS
        NOT NULL", 'winner_present_when_tie_with_superover')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result != 'tie' OR super_over = 'Y') OR winner IS NULL",
        'no_winner_when_tie_without_superover')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result IN ('runs', 'wickets') AND winner IS NOT NULL)
        OR (result NOT IN ('runs', 'wickets'))", 'winner_present_for_decided')
      status: true
      reason_if_failed: ''
      level: error
