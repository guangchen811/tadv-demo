results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("date rlike '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'", 'date_format_yyyy_mm_dd')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .isContainedIn('method', ['D/L'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("case when result in ('runs','wickets') then result_margin
        is not null and result_margin > 0 else true end", 'margin_present_and_positive_when_decided')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isNonNegative('target_overs')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("case when method = 'D/L' then target_overs is not null
        and target_overs > 0 else true end", 'target_overs_present_positive_if_dls')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("case when method = 'D/L' then target_runs is not null
        else true end", 'target_runs_present_if_dls')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("team1 <> team2", 'teams_not_equal')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("team1 <> team2", ''teams_not_equal'')''
        failed on data sample: Value: 0.9700272479564033 does not meet the constraint
        requirement!'
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("toss_winner = team1 OR toss_winner = team2", 'toss_winner_in_teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("toss_winner = team1 OR toss_winner
        = team2", ''toss_winner_in_teams'')'' failed on data sample: Value: 0.9836512261580381
        does not meet the constraint requirement!'
      level: error
  winner:
    code:
    - suggestion: .satisfies("case when result in ('runs','wickets') or (result =
        'tie' and super_over = 'Y') then winner is not null and (winner = team1 or
        winner = team2) else true end", 'winner_valid_when_required')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("case when result in (''runs'',''wickets'')
        or (result = ''tie'' and super_over = ''Y'') then winner is not null and (winner
        = team1 or winner = team2) else true end", ''winner_valid_when_required'')''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: error
