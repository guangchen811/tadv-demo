        margin: result_margin_int == round(result_margin) when result_margin is present.
        Actionable constraint: .satisfies("(result_margin IS NULL AND result_margin_int
        IS NULL) OR (round(result_margin) = result_margin_int)", "result_margin_rounding_consistency").'
      sources:
      - start_line: 24
        end_line: 27
        file: ''
      uid: dc2838dc-225f-49f0-a5c9-be6a11316607
  '["team1","team2","toss_decision","toss_winner"]':
    code: []
    assumptions:
    - text: 'For every match row, the ''toss_winner'' value must be one of the two
        participants: either ''team1'' or ''team2''. This ensures the later boolean
        column toss_made_by_team (team == toss_winner) is meaningful. Actionable constraint
        examples:

        - Deequ-like: .satisfies("toss_winner == team1 OR toss_winner == team2", "toss_winner_is_participant")

        - SQL-like check per row: ASSERT(toss_winner IN (team1, team2))'
      sources:
      - start_line: 30
        end_line: 40
        file: ''
      uid: 0f48a60a-42c7-4ccf-af60-ef3f8f4838f0
    - text: 'For every match, ''team1'' and ''team2'' must be different (team1 !=
        team2). The code builds per-team rows by renaming team1/team2 to team/opponent
        and assumes two distinct sides. Actionable constraint:

        - Deequ-like: .satisfies("team1 <> team2", "teams_different_per_match")

        - SQL-like per-row: ASSERT(team1 <> team2)'
      sources:
      - start_line: 32
        end_line: 36
        file: ''
      uid: 5d784432-8bd2-46f3-9b25-873842f1aa7f
    - text: "The 'toss_decision' value must be one of the expected choices (normalized\
        \ to lowercase by the script) and must be consistent for both team-rows derived\
        \ from the same match id. Concretely:\n- Value domain: toss_decision \u2208\
        \ {\"field\", \"bat\"} (after normalization).\n- Per-match consistency: for\
        \ each id, countDistinct(toss_decision) == 1.\nActionable constraints:\n-\
        \ Deequ-like domain check: .isContainedIn(\"toss_decision\", [\"field\",\"\
        bat\"]) \n- Per-id consistency: groupBy id and assert countDistinct(toss_decision)\
        \ == 1 (or .satisfies on grouped data)."
      sources:
      - start_line: 19
        end_line: 22
        file: ''
      - start_line: 32
        end_line: 38
        file: ''
      uid: f8e57e73-23df-423f-acbc-af17b8df7c4f
    - text: "The 'winner' column must either be one of the match participants (team1\
        \ or team2) when a result exists, or be empty/null when the result is 'tie'\
        \ or 'no result'. In other words:\n- If result NOT IN ('tie','no result')\
        \ then winner \u2208 {team1, team2}.\n- If result IN ('tie','no result') then\
        \ winner is allowed to be null/empty.\nActionable constraint example:\n- Deequ-like:\
        \ .satisfies(\"(result IN ('tie','no result') AND (winner IS NULL OR winner\
        \ == '')) OR (winner == team1 OR winner == team2)\", \"winner_consistent_with_participants_and_result\"\
        )"
      sources:
      - start_line: 43
        end_line: 48
        file: ''
      uid: 77c03751-a19c-4825-8a9e-621375d10e35
    - text: 'Exactly one of the two per-match team-rows should have made the toss:
        for each match id, the derived boolean toss_made_by_team (team == toss_winner)
        must sum to 1 across the two rows (i.e., exactly one team equals toss_winner).
        This prevents cases where toss_winner matches neither or both participants.
        Actionable constraint:

        - Group by id and assert sum(toss_made_by_team) == 1 for each id (or .satisfies
        on grouped data).'
      sources:
      - start_line: 40
        end_line: 60
        file: ''
      uid: 9433ee56-e5fa-4d66-b881-18cfd5cdfe70
  '["team1","team2","toss_winner"]':
    code: []
    assumptions:
    - text: 'For every match row, the ''toss_winner'' value must refer to one of the
        two teams playing that match: either ''team1'' or ''team2''. This is required
        because the code computes toss_made_by_team by testing equality between the
        per-row team value (derived from team1/team2) and toss_winner. A Deequ/spark-style
        constraint example: .satisfies("toss_winner = team1 OR toss_winner = team2",
        "toss_winner_in_{team1,team2}")'
      sources:
      - start_line: 32
        end_line: 41
        file: ''
      uid: b3391880-325d-49c4-a690-88818a7886da
    - text: 'Neither ''team1'' nor ''team2'' should be null and each match must list
        two distinct teams (team1 != team2). The code relies on creating two perspective
        rows (left/right) and then concatenating them; self-matches would invalidate
        the per-team view. Deequ examples: .isComplete(["team1","team2"]) and .satisfies("team1
        != team2", "no_self_matches")'
      sources:
      - start_line: 32
        end_line: 36
        file: ''
      uid: 3340f643-d1a4-4b24-9372-f2baf812c0f4
    - text: 'String values for ''team1'', ''team2'', and ''toss_winner'' must be consistently
        formatted (no stray leading/trailing whitespace or case differences) because
        the code performs direct equality comparisons without normalizing these columns.
        Enforceable checks: .satisfies("trim(team1) = team1 AND trim(team2) = team2
        AND trim(toss_winner) = toss_winner", "no_extra_whitespace") and optionally
        .satisfies("lower(team1) = team1_lower_canonical AND lower(team2) = team2_lower_canonical
        AND lower(toss_winner) = toss_winner_lower_canonical", "consistent_case")
        or normalize before use.'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 32
        end_line: 41
        file: ''
      uid: 38df458a-805b-4f2e-9bd8-aa754bdca74a
    - text: 'The ''winner'' column must identify one of the two competing teams for
        the match (i.e., winner == team1 OR winner == team2). The code computes won_mask
        by comparing the per-team ''team'' field (coming from team1/team2) to ''winner''
        to determine whether that team won; if ''winner'' contains other values the
        logic breaks. Deequ example: .satisfies("winner = team1 OR winner = team2",
        "winner_in_{team1,team2}")'
      sources:
      - start_line: 32
        end_line: 45
        file: ''
      uid: c9b4d658-ea61-4e6c-9b1b-1e9244f3a859
    - text: 'All three columns ''team1'', ''team2'', and ''toss_winner'' should have
        no missing values (complete) because subsequent logic assumes presence of
        these values when creating the per-team view and computing toss_made_by_team.
        Deequ example: .isComplete(["team1","team2","toss_winner"]).'
      sources:
      - start_line: 32
        end_line: 38
        file: ''
      uid: 9e908b6e-5276-4d1b-851d-54cb1974594f
