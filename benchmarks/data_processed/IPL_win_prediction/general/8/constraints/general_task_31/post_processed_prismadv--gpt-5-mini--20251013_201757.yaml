  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`result_margin` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "result_margin numeric or convertible", lambda x:
        x >= 0.98)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 497fd8ce-1027-414b-a9e7-f4f06f57e78a
      source_assumptions:
      - d9ee39b8-a3c5-4ca5-a964-e3b946b77d36
