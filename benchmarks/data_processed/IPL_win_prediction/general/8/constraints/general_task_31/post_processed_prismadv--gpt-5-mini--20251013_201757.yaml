  team1:
    95535f36-a0dc-450f-a8be-593b0d98d8a2: '.satisfies(''CASE WHEN trim(`team1`) =
      lower(trim(`team1`)) OR trim(`team1`) = upper(trim(`team1`)) OR trim(`team1`)
      = initcap(trim(`team1`)) THEN 1 ELSE 0 END'', ''team1_consistent_case'', lambda
      x: x >= 0.9)'
  '["result","super_over"]':
    37bd44a8-e203-4896-9513-87b09a6dbdf7: '.satisfies("CASE WHEN `result` = ''no result''
      AND (`super_over` = ''Y'' OR (`winner` IS NOT NULL AND (`winner` = `team1` OR
      `winner` = `team2`)) OR `result_margin` IS NOT NULL) THEN 1 ELSE 0 END", "no_result_consistency",
      lambda x: x == 0)'
    a70bac7c-dc6e-48b7-90ea-c6bc8e043e61: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'')
      THEN CASE WHEN CAST(`result_margin` AS INT) IS NOT NULL AND CAST(`result_margin`
      AS INT) > 0 THEN 1 ELSE 0 END ELSE 1 END", "margin_present_for_decisive_results",
      lambda x: x == 1)'
