    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' AND `winner` IS NOT NULL
        THEN CASE WHEN TRY_CAST(`result_margin` AS DOUBLE) > 0 THEN 1 ELSE 0 END ELSE
        1 END", "runs margin positive for winning team", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 17719e2d-228c-44de-952a-f266eff45384
      source_assumptions:
      - 83157df9-eb73-4137-96bd-eb75a08b7e98
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' AND `winner` IS NOT
        NULL THEN CASE WHEN TRY_CAST(`result_margin` AS BIGINT) BETWEEN 1 AND 10 THEN
        1 ELSE 0 END ELSE 1 END", "wickets margin within 1..10 for winning team",
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 009c5146-46a6-4826-a3c6-b609d597a639
      source_assumptions:
      - 2ff3ac31-2c74-490d-a842-934f48998376
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'',''no result'') THEN
        CASE WHEN TRY_CAST(`result_margin` AS DOUBLE) IS NULL OR TRY_CAST(`result_margin`
        AS DOUBLE) = 0 THEN 1 ELSE 0 END ELSE 1 END", "margin null or zero for tie/no
        result", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: c2d2d347-3cef-499f-a07f-e74e70a58d14
      source_assumptions:
      - e8ee2e31-dcad-40a3-8de9-c5ed607f6e2c
    assumptions:
    - text: 'The ''result_margin'' column should be numeric or convertible to numeric.
        The code coerces non-numeric values to null via pd.to_numeric(errors=''coerce'')
        and then rounds/casts to an integer type, so input values that are non-numeric
        will be lost and become null. This can be expressed as a validation that a
        high fraction of rows are numeric: e.g. fraction of rows where TRY_CAST(result_margin
        AS DOUBLE) IS NOT NULL should be high (dataset shows ~98.9% completeness).
        A Deequ-style constraint: .satisfies("CASE WHEN TRY_CAST(`result_margin` AS
        DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "result_margin numeric", lambda x:
        x >= 0.98).'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      uid: d9ee39b8-a3c5-4ca5-a964-e3b946b77d36
    - text: 'Most input rows should have a non-null result_margin (after numeric coercion).
        The script computes averages of winning margins and does not handle the case
        where too many margins are missing, so to ensure meaningful averages the proportion
        of non-null numeric margins should be high (use the dataset completeness as
        guidance, e.g. >= 0.98). A Deequ-style constraint: .satisfies("CASE WHEN TRY_CAST(`result_margin`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "result_margin completeness", lambda
        x: x >= 0.98).'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      uid: 988d663a-873a-447f-b9ec-a4c166a49d32
    - text: 'For matches whose result is ''runs'' and the team is the winner, ''result_margin''
        should represent a positive integer number of runs (i.e. > 0). The code uses
        result_margin_int to populate winning_runs_margin and later computes its mean,
        so for correctness those input rows should have margin > 0. A possible validation:
        .satisfies("CASE WHEN `result` = ''runs'' AND `winner` IS NOT NULL THEN CASE
        WHEN TRY_CAST(`result_margin` AS BIGINT) > 0 THEN 1 ELSE 0 END ELSE 1 END",
        "runs margin positive", lambda x: x == 1.0).'
      sources:
      - start_line: 46
        end_line: 55
        file: ''
      uid: 83157df9-eb73-4137-96bd-eb75a08b7e98
    - text: 'For matches whose result is ''wickets'' and the team is the winner, ''result_margin''
        should be a small positive integer within the plausible wicket range (1 through
        10 inclusive). The code assigns these values to winning_wickets_margin and
        averages them, so input values outside 1..10 are likely invalid. A Deequ-style
        constraint: .satisfies("CASE WHEN `result` = ''wickets'' AND `winner` IS NOT
        NULL THEN CASE WHEN TRY_CAST(`result_margin` AS BIGINT) BETWEEN 1 AND 10 THEN
        1 ELSE 0 END ELSE 1 END", "wickets margin in range", lambda x: x == 1.0).'
      sources:
      - start_line: 46
        end_line: 57
        file: ''
      uid: 2ff3ac31-2c74-490d-a842-934f48998376
    - text: 'When the match outcome is ''tie'' or ''no result'' (or other non-winning
        outcomes), ''result_margin'' is expected to be absent or zero. The code treats
        ties and no-results separately (ties without super-over, no result sets denom
        to 0) and does not rely on margin for those, so input margins for these result
        types should be null or zero. Example constraint: .satisfies("CASE WHEN `result`
        IN (''tie'',''no result'') THEN CASE WHEN TRY_CAST(`result_margin` AS DOUBLE)
        IS NULL OR TRY_CAST(`result_margin` AS DOUBLE) = 0 THEN 1 ELSE 0 END ELSE
        1 END", "margin empty for tie/no result", lambda x: x == 1.0).'
      sources:
      - start_line: 43
        end_line: 46
        file: ''
      - start_line: 54
        end_line: 57
        file: ''
      uid: e8ee2e31-dcad-40a3-8de9-c5ed607f6e2c
