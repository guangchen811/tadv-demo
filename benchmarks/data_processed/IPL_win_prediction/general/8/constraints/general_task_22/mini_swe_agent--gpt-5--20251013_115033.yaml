      - - '.satisfies(''team1 != team2'', ''teams_distinct'', lambda v: v == 1.0)'
        - Valid
      assumptions: []
    toss_decision:
      code:
      - - .isComplete('toss_decision')
        - Valid
      - - .isContainedIn('toss_decision', ['field', 'bat'])
        - Valid
      assumptions: []
    toss_winner:
      code:
      - - .isComplete('toss_winner')
        - Valid
      - - '.satisfies(''toss_winner = team1 OR toss_winner = team2'', ''toss_winner_in_teams'',
          lambda v: v == 1.0)'
        - Valid
      assumptions: []
    winner:
      code:
      - - '.satisfies("lower(result) = ''no result'' OR winner = team1 OR winner =
          team2", ''winner_valid_when_played'', lambda v: v == 1.0)'
        - Valid
      assumptions: []
