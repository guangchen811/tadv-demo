raw_constraints:
- column_name: id
  code_for_constraint: .isComplete('id')
- column_name: id
  code_for_constraint: .isUnique(['id'])
- column_name: season
  code_for_constraint: .isComplete('season')
- column_name: season
  code_for_constraint: .hasPattern('season', '^[0-9]{4}$')
- column_name: date
  code_for_constraint: .isComplete('date')
- column_name: date
  code_for_constraint: .hasPattern('date', '^[0-9]{4}-[0-9]{2}-[0-9]{2}$')
- column_name: match_type
  code_for_constraint: .isComplete('match_type')
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: teams
  code_for_constraint: '.satisfies(''team1 != team2'', ''teams_distinct'', lambda
    v: v == 1.0)'
- column_name: toss_winner
  code_for_constraint: .isComplete('toss_winner')
- column_name: toss_winner
  code_for_constraint: '.satisfies(''toss_winner = team1 OR toss_winner = team2'',
    ''toss_winner_in_teams'', lambda v: v == 1.0)'
- column_name: winner
  code_for_constraint: '.satisfies("lower(result) = ''no result'' OR winner = team1
    OR winner = team2", ''winner_valid_when_played'', lambda v: v == 1.0)'
- column_name: toss_decision
  code_for_constraint: .isComplete('toss_decision')
- column_name: toss_decision
  code_for_constraint: .isContainedIn('toss_decision', ['field', 'bat'])
- column_name: super_over
  code_for_constraint: '.satisfies("super_over IS NULL OR upper(super_over) IN (''Y'',''N'')",
    ''super_over_valid'', lambda v: v == 1.0)'
- column_name: result
  code_for_constraint: .isComplete('result')
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs', 'wickets', 'no result'])
- column_name: result_margin
  code_for_constraint: .isNonNegative('result_margin')
- column_name: target_runs
  code_for_constraint: .isNonNegative('target_runs')
- column_name: target_overs
  code_for_constraint: '.satisfies(''target_overs IS NULL OR (target_overs >= 0 AND
    target_overs <= 50)'', ''target_overs_range'', lambda v: v == 1.0)'
