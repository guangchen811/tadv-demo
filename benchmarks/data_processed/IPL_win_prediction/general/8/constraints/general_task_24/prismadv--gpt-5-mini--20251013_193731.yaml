      uid: 22dc4a1e-f43c-45d1-ba8d-1ebd1bbdcfbb
    - text: 'Each match row must have distinct participating teams: ''team1'' and
        ''team2'' must be non-null and not equal. This is needed because winner and
        per-team records assume two distinct teams. Enforce via: .satisfies("team1
