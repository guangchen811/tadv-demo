        file: ''
      uid: 8b8a28c7-fc7c-46da-8931-f05d978133fc
    - text: 'For rows where result == ''tie'': ''target_runs'' and ''target_overs''
        must be numeric and non-null so that first_runs and overs are defined; additionally
        the derived first and second innings runs should be equal. A Deequ-style check:
        .satisfies("(result != ''tie'') OR (target_runs IS NOT NULL AND target_overs
        IS NOT NULL)", "tie_requires_target") and/or .satisfies("(result != ''tie'')
        OR ((target_runs - 1) = second_runs)", "tie_runs_equal").'
