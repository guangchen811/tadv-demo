        file: ''
      uid: c447e35e-d228-4594-ab40-1c9aea1f8550
    - text: 'The ''season'' column must be convertible to integer for all rows (the
        code does pd.to_numeric(..., errors=''raise'') and then astype(int)) because
        season is used as a grouping key. Enforce with: .satisfies("season IS NOT
