  '["date","id","match_type","result","result_margin","season","super_over","team1","team2","winner"]':
    code: []
    assumptions:
    - text: 'For matches decided by runs, the result_margin must be present and strictly
        positive, capped at 200: whenever result == ''runs'', result_margin is non-null,
        integer-valued, and 1 <= result_margin <= 200. This can be enforced with a
        Deequ compliance constraint like: satisfies("result <> ''runs'' OR (result_margin
        IS NOT NULL AND CAST(result_margin AS DOUBLE) >= 1 AND CAST(result_margin
        AS DOUBLE) <= 200)", ''runs_margin_bounds'', 1.0).'
      sources:
      - start_line: 26
        end_line: 34
        file: ''
      - start_line: 49
        end_line: 53
        file: ''
      uid: 974188fe-75fb-4805-b09e-5e095498803d
    - text: 'For matches decided by wickets, the result_margin must be present and
        in cricket-valid bounds for wickets: whenever result == ''wickets'', result_margin
        is non-null, integer-valued, and 1 <= result_margin <= 10. Deequ example:
        satisfies("result <> ''wickets'' OR (result_margin IS NOT NULL AND CAST(result_margin
        AS DOUBLE) BETWEEN 1 AND 10)", ''wickets_margin_bounds'', 1.0).'
      sources:
      - start_line: 27
        end_line: 27
        file: ''
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 56
        end_line: 61
        file: ''
      uid: d19964da-4a94-4636-aa7e-a229ef33b1b8
    - text: 'In all decided matches (result in {''runs'',''wickets''}), the winner
        must be one of the two participating teams and be non-null: (winner == team1
        OR winner == team2). Deequ example: satisfies("NOT (result IN (''runs'',''wickets''))
        OR (winner IS NOT NULL AND (winner = team1 OR winner = team2))", ''winner_membership_when_decided'',
        1.0).'
      sources:
      - start_line: 26
        end_line: 30
        file: ''
      - start_line: 39
        end_line: 44
        file: ''
      - start_line: 87
        end_line: 101
        file: ''
      - start_line: 172
        end_line: 176
        file: ''
      uid: 1151a528-3c11-4411-9af8-4554ae3439d3
    - text: 'For undecided matches (result in {''tie'',''no result''}), there should
        be no winner recorded; winner should be null/empty. Deequ example: satisfies("(result
        IN (''tie'',''no result'')) => winner IS NULL", ''no_winner_when_undecided'',
        1.0).'
      sources:
      - start_line: 64
        end_line: 73
        file: ''
      uid: 189cc7f0-37c1-4d8b-b7cd-523db2e830a6
    - text: 'Opponents must be distinct: team1 != team2 for every match row. Deequ
        example: satisfies("team1 <> team2", ''teams_are_distinct'', 1.0).'
      sources:
      - start_line: 39
        end_line: 44
        file: ''
      - start_line: 64
        end_line: 70
        file: ''
      uid: d7dc4fc1-4573-4425-8211-ef7ad629accd
    - text: 'Ties imply and are implied by a Super Over flag: (result == ''tie'')
        => (super_over == ''Y'') and (super_over == ''Y'') => (result == ''tie'').
        This can be captured with two Deequ constraints: satisfies("result <> ''tie''
        OR super_over = ''Y''", ''tie_requires_super_over'', 1.0) and satisfies("super_over
        <> ''Y'' OR result = ''tie''", ''super_over_means_tie'', 1.0).'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 64
        end_line: 70
        file: ''
      uid: 3bb428e6-e78a-4598-84e9-c67199c3753e
    - text: 'No-result matches must not have a Super Over: (result == ''no result'')
        => (super_over == ''N''). Deequ example: satisfies("result <> ''no result''
        OR super_over = ''N''", ''no_result_no_super_over'', 1.0).'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      uid: d048f03e-ec4e-4fe1-a0b3-805bfdafea50
    - text: 'Each match is uniquely identified by the tuple (season, date, id). Deequ
        example: isUnique([''season'', ''date'', ''id'']).'
      sources:
      - start_line: 166
        end_line: 169
        file: ''
      - start_line: 179
        end_line: 180
        file: ''
      uid: fc7d71ce-b0c8-4ed3-b926-56e4954a71bc
  '["date","season"]':
    code: []
    assumptions:
    - text: 'For every record, the calendar year extracted from ''date'' must match
        ''season'' (i.e., season is the year of the match date). This keeps season-level
        sorting/aggregation consistent. We could represent this as a Deequ constraint
