    assumptions:
    - text: 'For decided matches (result in {''runs'',''wickets''}), the winner must
        be one of the two participating teams: winner equals team1 or team2. Representable
        in Deequ as a Compliance predicate: CASE WHEN result IN (''runs'',''wickets'')
        THEN (winner = team1 OR winner = team2) ELSE TRUE END.'
      sources:
      - start_line: 26
        end_line: 30
        file: ''
      - start_line: 39
        end_line: 44
        file: ''
      - start_line: 174
        end_line: 175
        file: ''
      uid: f6154b13-c35f-4b4b-ab46-7d319daa9bfe
    - text: 'If result = ''runs'', result_margin must be non-null, integer-convertible,
        and in the range [1, 200]. Representable in Deequ as: CASE WHEN result = ''runs''
        THEN result_margin IS NOT NULL AND result_margin >= 1 AND result_margin <=
        200 ELSE TRUE END.'
      sources:
      - start_line: 33
        end_line: 34
        file: ''
      - start_line: 49
        end_line: 54
        file: ''
      uid: 0c5a9d57-f65f-45ea-be0c-b8af3fcda376
    - text: 'If result = ''wickets'', result_margin must be non-null, integer-convertible,
        and in the range [1, 10]. Representable in Deequ as: CASE WHEN result = ''wickets''
        THEN result_margin IS NOT NULL AND result_margin >= 1 AND result_margin <=
        10 ELSE TRUE END.'
      sources:
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 56
        end_line: 62
        file: ''
      uid: 9a5f974f-635f-45e4-ac9a-8155e5918723
    - text: 'Loser consistency: In decided matches (result in {''runs'',''wickets''}),
        loser must be the non-winner team (winner = team1 implies loser = team2; winner
        = team2 implies loser = team1) and not null. In non-decided matches (result
        in {''tie'',''no result''}), loser must be null. Representable in Deequ as
        two Compliance predicates: (1) CASE WHEN result IN (''runs'',''wickets'')
        THEN loser IS NOT NULL AND ((winner = team1 AND loser = team2) OR (winner
        = team2 AND loser = team1)) ELSE TRUE END and (2) CASE WHEN result IN (''tie'',''no
        result'') THEN loser IS NULL ELSE TRUE END.'
      sources:
      - start_line: 39
        end_line: 44
        file: ''
      uid: 50460453-272b-4dc1-9c07-37a476ec31c8
    - text: 'Tie matches must have no winner and no numeric margin, and should be
        marked as Super Over. Specifically: if result = ''tie'' then winner IS NULL
        and result_margin IS NULL, and super_over = ''Y'' (after normalization to
        uppercase). Representable in Deequ as: CASE WHEN result = ''tie'' THEN winner
        IS NULL AND result_margin IS NULL AND super_over = ''Y'' ELSE TRUE END.'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 64
        end_line: 70
        file: ''
      - start_line: 103
        end_line: 119
        file: ''
      uid: ef9142aa-bf57-44a2-9b8b-f0a53a6bd249
    - text: 'No-result matches must have no winner and no numeric margin. Specifically:
        if result = ''no result'' then winner IS NULL and result_margin IS NULL. Representable
        in Deequ as: CASE WHEN result = ''no result'' THEN winner IS NULL AND result_margin
        IS NULL ELSE TRUE END.'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 121
        end_line: 138
        file: ''
      uid: 05a51701-b99e-4e1a-9a6b-9e4fa05c5c4f
    - text: 'pos_impact must align with result and result_margin: if result = ''runs''
        then pos_impact = LEAST(result_margin, 200) / 200.0 and > 0; if result = ''wickets''
        then pos_impact = result_margin / 10.0 and > 0; otherwise pos_impact = 0.0.
        Representable in Deequ as a Compliance predicate using a tolerance for floating
        comparison, e.g., CASE WHEN result = ''runs'' THEN ABS(pos_impact - LEAST(result_margin,200)/200.0)
        < 1e-6 WHEN result = ''wickets'' THEN ABS(pos_impact - result_margin/10.0)
        < 1e-6 ELSE pos_impact = 0.0 END.'
      sources:
      - start_line: 26
        end_line: 30
        file: ''
      - start_line: 33
        end_line: 34
        file: ''
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 80
        end_line: 81
        file: ''
      uid: 05d08f83-495b-4310-99dd-af1dbfcbcb72
  '["team1","team2"]':
    code: []
    assumptions:
    - text: 'Each row represents a match between two distinct teams: team1 and team2
        must both be non-null strings and must not be equal. Deequ example: .satisfies(''team1
        IS NOT NULL AND team2 IS NOT NULL AND team1 <> team2'', ''teams_present_and_distinct'')'
      sources:
      - start_line: 40
        end_line: 44
        file: ''
      - start_line: 104
        end_line: 111
        file: ''
      - start_line: 123
        end_line: 130
        file: ''
      uid: bc1be73a-0e72-4ebe-8a66-516d894b97bb
    - text: 'For decided matches (result in {''runs'',''wickets''}), winner must be
        exactly one of {team1, team2} and loser must be the other; for non-decided
        matches, loser must be null. Deequ example: .satisfies(''CASE WHEN result
        IN (\''runs\'',\''wickets\'') THEN ((winner = team1 AND loser = team2) OR
        (winner = team2 AND loser = team1)) ELSE loser IS NULL END'', ''winner_loser_consistency'')'
      sources:
      - start_line: 30
        end_line: 30
        file: ''
      - start_line: 40
        end_line: 44
        file: ''
      - start_line: 94
        end_line: 100
        file: ''
      - start_line: 174
        end_line: 175
        file: ''
      uid: c64a7523-32d8-466f-a1a1-4c313b84ebc3
    - text: 'When result == ''tie'', both team1 and team2 must each receive exactly
        1 point in the per-match output (points_team1 = 1 AND points_team2 = 1). Deequ
        example: .satisfies(''CASE WHEN result = \''tie\'' THEN points_team1 = 1 AND
        points_team2 = 1 ELSE true END'', ''tie_points_each'')'
      sources:
      - start_line: 66
        end_line: 70
        file: ''
      - start_line: 102
        end_line: 119
        file: ''
      - start_line: 176
        end_line: 177
        file: ''
      uid: b37d233a-9b44-4c05-af3e-0e517164cfa8
    - text: 'When result == ''no result'', both team1 and team2 must each receive
        exactly 1 point in the per-match output (points_team1 = 1 AND points_team2
        = 1). Deequ example: .satisfies(''CASE WHEN result = \''no result\'' THEN
        points_team1 = 1 AND points_team2 = 1 ELSE true END'', ''nr_points_each'')'
      sources:
      - start_line: 121
        end_line: 138
        file: ''
      - start_line: 176
        end_line: 177
        file: ''
      uid: a9a8247f-3708-4aca-bfc1-834ccf80c35d
    - text: 'Total points allocated per match across the two teams must always sum
        to 2: points_team1 + points_team2 = 2 (decided: 2+0 or 0+2; tie/NR: 1+1).
        Deequ example: .satisfies(''(points_team1 + points_team2) = 2'', ''two_total_points_per_match'')'
      sources:
      - start_line: 172
        end_line: 177
        file: ''
      uid: 1a21e388-da0d-45d9-a797-0a905b5558c0
