        result''), the ''winner'' must be one of the two participating teams. Therefore,
        for such rows, the value in the ''winner'' column must be equal to the value
        in either the ''team1'' or ''team2'' column. The code relies on this to generate
        result strings (line 35) and to correctly assign wins, losses, and points
        (lines 66, 77).

        This could be expressed as a Deequ constraint:

        .satisfy("result = ''no result'' OR winner = team1 OR winner = team2", "winner_is_a_participant")'
