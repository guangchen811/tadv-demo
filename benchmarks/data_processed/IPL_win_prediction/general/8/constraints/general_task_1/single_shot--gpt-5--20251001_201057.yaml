constraints:
  city:
    code:
    - - '.hasCompleteness(''city'', lambda v: v >= 0.98)'
      - Valid
    assumptions: []
  date:
    code:
    - - .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    - - '.satisfies("date >= ''2008-01-01'' AND date <= ''2025-12-31''", ''date_range'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  method:
    code:
    - - .isContainedIn('method', ['D/L'])
      - Valid
    assumptions: []
  player_of_match:
    code:
    - - '.hasCompleteness(''player_of_match'', lambda v: v >= 0.995)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs','wickets','tie','no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - '.hasCompleteness(''result_margin'', lambda v: v >= 0.98)'
      - Valid
    - - .isNonNegative('result_margin')
      - Valid
    - - '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        > 0 ELSE true END", ''margin_positive_when_applicable'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('season')
      - Valid
    - - '.satisfies(''season >= 2008 AND season <= 2024'', ''season_range'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y','N'])
      - Valid
    - - '.satisfies("((result = ''tie'') AND (super_over = ''Y'')) OR ((result <>
        ''tie'') AND (super_over = ''N''))", ''tie_super_over_consistency'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  target_overs:
    code:
    - - '.hasCompleteness(''target_overs'', lambda v: v >= 0.99)'
      - Valid
    - - '.hasMax(''target_overs'', lambda v: v <= 20.0)'
      - Valid
    - - '.hasMin(''target_overs'', lambda v: v > 0.0)'
      - Valid
    assumptions: []
  target_runs:
    code:
    - - '.hasCompleteness(''target_runs'', lambda v: v >= 0.99)'
      - Valid
    - - '.hasMax(''target_runs'', lambda v: v <= 300.0)'
      - Valid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - '.satisfies(''team1 <> team2'', ''no_self_match'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat','field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - '.satisfies(''(toss_winner = team1) OR (toss_winner = team2)'', ''toss_winner_is_participant'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  winner:
    code:
    - - '.hasCompleteness(''winner'', lambda v: v >= 0.995)'
      - Valid
    - - '.satisfies("(result IN (''no result'',''tie'')) OR (winner = team1 OR winner
        = team2)", ''winner_is_participant'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
