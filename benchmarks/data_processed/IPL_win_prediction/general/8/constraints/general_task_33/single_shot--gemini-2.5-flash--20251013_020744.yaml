constraints:
  city:
    code:
    - - .hasCompleteness('city', 0.98)
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .matchesPattern('date', '^[0-9]{4}-[0-9]{2}-[0-9]{2}$')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1'])
      - Valid
    assumptions: []
  method:
    code:
    - - .hasCompleteness('method', 0.02, ComparisonOperator.LessThanOrEqual)
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .hasCompleteness('player_of_match', 0.99)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasCompleteness('result_margin', 0.98)
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    - - .satisfies("CASE WHEN super_over = 'Y' THEN result = 'tie' ELSE true END",
        "If super_over is 'Y', result must be 'tie'")
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasCompleteness('target_overs', 0.99)
      - Invalid
    - - .isNonNegative('target_overs')
      - Valid
    - - .satisfies("CASE WHEN result = 'runs' THEN target_overs > 0 ELSE true END",
        "Target overs must be positive when result is 'runs' to avoid division by
        zero")
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasCompleteness('target_runs', 0.99)
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isDifferentFrom('team1', 'team2')
      - Invalid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", "Toss winner must
        be one of the teams")
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    - - .isDifferentFrom('umpire1', 'umpire2')
      - Invalid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .hasCompleteness('winner', 0.99)
      - Invalid
    - - .satisfies("CASE WHEN result = 'no result' THEN true WHEN result = 'tie' AND
        winner IS NULL THEN true ELSE winner = team1 OR winner = team2 END", "Winner
        must be one of the teams or null/empty if no result/tie")
      - Valid
    assumptions: []
