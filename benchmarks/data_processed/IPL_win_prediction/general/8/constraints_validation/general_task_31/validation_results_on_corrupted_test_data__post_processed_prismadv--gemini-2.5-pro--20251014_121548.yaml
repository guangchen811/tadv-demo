results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` = TRIM(`team1`) AND `team1` <> ''''", "''team1''
        should be clean and consistently formatted", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isContainedIn("match_type", ["League", "Qualifier 1", "Qualifier
        2", "Eliminator", "Final", "Semi Final", "Elimination Final"])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness("result_margin", lambda completeness: completeness
        > 0.9, "result_margin should be at least 90% complete")'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: '.satisfies("trim(lower(toss_decision)) IN (''field'', ''bat'')",
        "Is valid toss decision", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.satisfies("TRIM(UPPER(super_over)) IN (''Y'', ''N'')", "super_over
        must be a form of Y or N", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete("toss_winner")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_a_participant", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "toss_winner_is_a_participant", lambda x: x == 1)'' failed on
        data sample: Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
  id:
    code:
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness("winner", lambda completeness: completeness >=
        0.99, "Winner column should be mostly complete")'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness("winner", lambda completeness:
        completeness >= 0.99, "Winner column should be mostly complete")'' failed
        on data sample: Value: 0.989100817438692 does not meet the constraint requirement!
        Winner column should be mostly complete'
      level: warning
    - suggestion: '.satisfies("`winner` IS NULL OR `winner` = `team1` OR `winner`
        = `team2`", "Winner must be one of the participating teams or NULL", lambda
        check: check == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.satisfies("lower(trim(result)) IN (''runs'', ''wickets'', ''tie'',
        ''no result'')", "Result must be one of the allowed values after normalization",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["id","match_type","result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "team1_should_not_be_equal_to_team2",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`winner` IS NULL OR `winner` = `team1` OR `winner`
        = `team2`", "winner_must_be_one_of_the_participating_teams", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`result` IN (''runs'', ''wickets'')) OR `winner`
        IS NOT NULL", "winner_must_be_specified_for_results_by_runs_or_wickets", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`result` = ''no result'') OR `winner` IS NULL",
        "winner_must_be_null_for_no_result_matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN result_margin
        IS NOT NULL ELSE result_margin IS NULL END", "result_margin_dependency_on_result",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","winner"]':
    code:
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR (winner IS
        NOT NULL AND result_margin IS NOT NULL)", "winner_and_margin_exist_for_decisive_results",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result NOT IN (''no result'', ''tie'') OR winner IS
        NULL", "no_winner_for_inconclusive_results", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("result NOT IN (''no result'', ''tie'')
        OR winner IS NULL", "no_winner_for_inconclusive_results", lambda x: x >= 0.99)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("(`super_over` <> ''Y'' AND `super_over` <> ''y'') OR
        (`result` = ''tie'')", "SuperOverRequiresTie", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') OR (result
        = ''tie'' AND super_over = ''Y'') THEN winner IS NOT NULL ELSE winner IS NULL
        END", "WinnerPresenceConsistentWithResult", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR result_margin
        IS NOT NULL", "MarginMustBePresentForDecisiveResults", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "team1_neq_team2", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_competitor", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "toss_winner_is_competitor", lambda x: x == 1.0)'' failed on data
        sample: Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`result` IN (''no result'', ''tie'') OR `winner` =
        `team1` OR `winner` = `team2`", "winner_is_competitor", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_must_be_a_playing_team", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "toss_winner_must_be_a_playing_team", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_cannot_play_against_themselves",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`winner` = `team1` OR `winner` = `team2` OR `winner`
        IS NULL", "WinnerIsParticipant", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "TeamNotPlayingItself", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
