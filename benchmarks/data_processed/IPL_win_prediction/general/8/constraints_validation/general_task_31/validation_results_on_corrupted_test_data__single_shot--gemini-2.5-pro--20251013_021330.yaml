results:
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', 'Integral')
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''season'', ''Integral'')'
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner_must_be_a_participant')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''toss_winner = team1 OR toss_winner
        = team2'', ''toss_winner_must_be_a_participant'')'' failed on data sample:
        Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x > 0.99, ''Winner column
        should be more than 99% complete'')'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x > 0.99,
        ''Winner column should be more than 99% complete'')'' failed on data sample:
        Value: 0.989100817438692 does not meet the constraint requirement! Winner
        column should be more than 99% complete'
      level: error
