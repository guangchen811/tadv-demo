results:
  team1:
    code:
    - suggestion: '.satisfies("(`team1` IS NOT NULL) AND length(trim(`team1`)) > 0",
        "team1 present and non-empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` = trim(`team1`)", "team1 canonicalized (trimmed)",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (lower(`result`) IN (''runs'',''wickets'',''tie'')
        AND `winner` IS NOT NULL) OR (`winner` = `team1` OR `winner` = `team2`)",
        "winner must be one of the two teams when applicable", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`team1` IS NULL OR `team2` IS NULL) OR (`team1` <>
        `team2`)", "Distinct opponents (no self-play)", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN team2 IS NOT NULL AND TRIM(team2) = team2
        AND TRIM(team2) <> '''' AND UPPER(TRIM(team2)) NOT IN (''NAN'',''NONE'',''NULL'')
        THEN 1 ELSE 0 END", "team2_clean_trimmed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN winner IS NULL OR winner = '''' THEN 1 ELSE
        CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END END", "winner_in_teams",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team2 <> team1", "distinct_teams_per_match", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("`method` IS NULL OR `method` != ''D/L'' OR `target_overs`
        IS NOT NULL", "target_overs present for D/L", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN CASE WHEN CAST(`result_margin` AS DOUBLE) = CAST(CAST(`result_margin`
        AS BIGINT) AS DOUBLE) THEN 1 ELSE 0 END ELSE 1 END", "result_margin is whole
        number when required", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN CASE WHEN CAST(`result_margin` AS DOUBLE) >= 1 THEN 1 ELSE 0 END ELSE
        1 END", "result_margin positive when required", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) = ''wickets'' THEN CASE WHEN
        CAST(`result_margin` AS DOUBLE) BETWEEN 1 AND 10 THEN 1 ELSE 0 END ELSE 1
        END", "wickets margin within [1,10]", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("NOT(`method` = ''D/L'' AND `target_runs` IS NOT NULL)
        OR (CAST(`target_runs` AS DOUBLE) IS NOT NULL AND NOT isnan(CAST(`target_runs`
        AS DOUBLE)) AND abs(CAST(`target_runs` AS DOUBLE)) < 1.0e308)", "target_runs
        numeric and finite when D/L", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''target_runs'', lambda c: c >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`toss_decision`)) IN (''field'',''bat'')",
        "Valid toss_decision domain", lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("lower(trim(`toss_decision`)) = ''field''", "Field decision
        share", lambda v: v >= 0.6 and v <= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.satisfies("(`super_over` IS NULL) OR (`super_over` IS NOT NULL)",
        "super_over column exists", lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''super_over'', [''Y'',''N''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''super_over'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN lower(`result`)
        = ''tie'' ELSE TRUE END", "Super Over only on ties", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.hasCompleteness(''toss_winner'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("toss_winner IS NULL OR toss_winner = team1 OR toss_winner
        = team2", "Toss winner must be one of the two teams (or NULL)", lambda x:
        x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("toss_winner IS NULL OR toss_winner
        = team1 OR toss_winner = team2", "Toss winner must be one of the two teams
        (or NULL)", lambda x: x == 1)'' failed on data sample: Value: 0.9019073569482289
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("toss_winner IS NULL OR toss_winner = TRIM(toss_winner)",
        "No leading/trailing spaces in toss_winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''toss_winner'', lambda v: v <= 25)'
      status: false
      reason_if_failed: 'Constraint ''.hasApproxCountDistinct(''toss_winner'', lambda
        v: v <= 25)'' failed on data sample: Value: 55.0 does not meet the constraint
        requirement!'
      level: warning
  date:
    code:
    - suggestion: '.hasCompleteness(''date'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''to_timestamp(`date`) IS NOT NULL'', ''Date parseable
        (>= 95%)'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(season AS STRING) = TRIM(CAST(season AS STRING))'',
        ''No whitespace around season'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("city IS NULL OR LENGTH(TRIM(city)) > 0", "No empty
        or whitespace-only city values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.hasCompleteness(''method'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('method', ['D/L'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN target_overs IS NOT
        NULL AND CAST(target_overs AS DOUBLE) IS NOT NULL ELSE true END", "D/L requires
        numeric target_overs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' AND target_runs IS NOT NULL
        THEN CAST(target_runs AS DOUBLE) IS NOT NULL ELSE true END", "D/L target_runs
        numeric when present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: '.satisfies("id IS NOT NULL", "id_exists_and_not_null", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: warning
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasApproxCountDistinct(''venue'', lambda v: v <= 60)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("(lower(trim(`result`)) NOT IN (''runs'',''wickets''))
        OR (`winner` IS NOT NULL AND trim(`winner`) <> '''' AND (`winner` = `team1`
        OR `winner` = `team2`))", ''Winner present and among teams for runs/wickets'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(`winner` IS NULL OR lower(trim(`winner`)) NOT IN
        (\''na\'', \''none\'', \''null\'', \''nan\''))'', ''Winner should not use
        placeholder strings for missingness'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`result`)) IN (''runs'',''wickets'',''tie'',''no
        result'')", "Result domain valid", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(lower(trim(`result`)) NOT IN (''runs'',''wickets''))
        OR (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`))",
        "Winner present and valid for decided matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(lower(trim(`result`)) NOT IN (''runs'',''wickets''))
        OR (`result_margin` IS NOT NULL AND `result_margin` RLIKE ''^[0-9]+(\\.[0-9]+)?$''
        AND CAST(`result_margin` AS DOUBLE) > 0)", "Positive numeric margin for decided
        results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`result`)) IN (''runs'',''wickets'')", "Decided
        results ratio", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
