results:
  team1:
    code:
    - suggestion: .satisfies("trim(`team1`) <> ''", "team1 not blank")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("lower(trim(`team1`)) <> lower(trim(`team2`))", "teams
        are distinct per match")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("NOT(lower(trim(`result`)) IN ('runs','wickets')) OR
        lower(trim(`winner`)) IN (lower(trim(`team1`)), lower(trim(`team2`)))", "winner
        must be one of the teams when match decided")
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN (`winner` = `team1` OR `winner` = `team2`) ELSE TRUE END", "winner_in_teams_when_decided",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team2` IS NOT NULL AND `team1` IS NOT NULL AND `team2`
        <> `team1`", "two_distinct_teams_per_match", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`team2` IS NOT NULL AND LENGTH(TRIM(`team2`)) > 0 AND
        TRIM(`team2`) = `team2`", "team2_trimmed_nonempty", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: '.isContainedIn("match_type", ["League", "Final", "Qualifier 1",
        "Qualifier 2", "Eliminator", "Elimination Final", "Semi Final"], lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`match_type` IS NOT NULL AND LENGTH(TRIM(`match_type`))
        > 0", "match_type_non_empty", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("NOT (lower(result) IN (''runs'',''wickets'')) OR result_margin
        IS NOT NULL", "result_margin_present_for_decided", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (lower(result) = ''wickets'') OR (result_margin
        BETWEEN 1 AND 10)", "wickets_margin_between_1_10", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (lower(result) = ''runs'') OR (result_margin >=
        1)", "runs_margin_positive", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("result_margin", lambda c: c >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness("result_margin", lambda c:
        c >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("NOT (lower(result) IN (''tie'',''no result'')) OR result_margin
        IS NULL", "no_margin_for_tie_or_no_result", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(upper(super_over) = ''Y'' AND lower(result) = ''tie'')
        OR (upper(super_over) = ''N'' AND lower(result) <> ''tie'')", "super_over
        consistent with result", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.satisfies("to_timestamp(`date`) <= current_timestamp()", "date_not_in_future",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('season BETWEEN 2000 AND 2100', 'season_plausible_range')
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: warning
  '["date","id","match_type","result","result_margin","season","super_over","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN `result_margin` IS NOT NULL ELSE TRUE END", "result_margin present for
        decided matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(`result`) = ''wickets'' THEN (`result_margin`
        >= 1 AND `result_margin` <= 10) ELSE TRUE END", "wicket margin between 1 and
        10", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) = ''runs'' THEN (`result_margin`
        >= 1) ELSE TRUE END", "run margin >= 1", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''super_over'', [''Y'', ''N''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) = ''tie'' THEN upper(`super_over`)
        = ''Y'' ELSE TRUE END", "tie implies super_over = ''Y''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`))
        ELSE TRUE END", "winner must be one of the teams for decided matches", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("to_timestamp(`date`) IS NOT NULL", "date must be parseable
        to timestamp", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin","winner"]':
    code:
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN (`result_margin` IS NOT NULL AND NOT isnan(`result_margin`)) ELSE TRUE
        END", "decided_matches_have_margin", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(`result`) = ''runs'' THEN (`result_margin`
        >= 1 AND `result_margin` <= 200) ELSE TRUE END", "runs_margin_in_reasonable_range",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) = ''wickets'' THEN (`result_margin`
        BETWEEN 1 AND 10) ELSE TRUE END", "wickets_margin_between_1_and_10", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`))
        ELSE TRUE END", "winner_must_be_one_of_the_sides_for_decided_matches", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''tie'',''no result'')
        THEN (`winner` IS NULL) ELSE TRUE END", "no_winner_expected_for_tie_or_no_result",
        lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(`result`) IN (''tie'',''no
        result'') THEN (`winner` IS NULL) ELSE TRUE END", "no_winner_expected_for_tie_or_no_result",
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: warning
  '["date","season"]':
    code:
    - suggestion: .areComplete(["season", "date"])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("to_date(`date`, ''yyyy-MM-dd'') IS NOT NULL", "date_parseable_iso",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("year(to_date(`date`, ''yyyy-MM-dd'')) = `season`",
        "season_matches_date_year", lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("year(to_date(`date`, ''yyyy-MM-dd''))
        = `season`", "season_matches_date_year", lambda x: x >= 0.98)'' failed on
        data sample: Value: 0.9536784741144414 does not meet the constraint requirement!'
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN (`winner`
        IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`)) ELSE TRUE END",
        "winner_in_teams_if_decided", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'',''no result'') THEN
        `winner` IS NULL ELSE TRUE END", "winner_null_when_tie_or_no_result", lambda
        x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `result` IN (''tie'',''no
        result'') THEN `winner` IS NULL ELSE TRUE END", "winner_null_when_tie_or_no_result",
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(`winner` IS NULL) OR (`winner` = `team1` OR `winner`
        = `team2`)", "winner_value_belongs_to_teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) IN (''runs'',''wickets'')
        THEN CAST(`result_margin` AS INT) > 0 ELSE TRUE END", "result_margin_required_for_decided_results",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`result`)) IN (''runs'',''wickets'',''tie'',''no
        result'')", "result_allowed_values_normalized", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) = ''wickets'' THEN
        CAST(`result_margin` AS INT) BETWEEN 1 AND 10 ELSE TRUE END", "wkts_margin_in_valid_range",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("(`result` NOT IN (''runs'',''wickets'')) OR (`result_margin`
        IS NOT NULL)", "margin_present_for_decided", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn("result", ["runs", "wickets", "tie", "no result"],
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` != ''wickets'') OR (`result_margin` BETWEEN
        1 AND 10 AND `result_margin` = CAST(`result_margin` AS INT))", "wkts_margin_1_to_10_integer",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` != ''runs'') OR (`result_margin` >= 1 AND
        `result_margin` = CAST(`result_margin` AS INT))", "runs_margin_positive_integer",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`result` NOT IN (''tie'',''no result'')) OR (`result_margin`
        IS NULL)", "no_margin_for_tie_or_nr", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("`result` IN (''runs'',''wickets'',''tie'',''no result'')",
        "result in expected categories", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("((`result` = ''tie'' AND `super_over` = ''Y'') OR (`result`
        <> ''tie'' AND `super_over` = ''N''))", "tie-super_over consistency", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN CAST(result_margin
        AS INT) IS NOT NULL ELSE TRUE END", "decided_have_int_margin", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN winner
        IS NOT NULL AND (winner = team1 OR winner = team2) ELSE TRUE END", "winner_is_one_of_teams_when_decided",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda f: f >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <>
        team2", "teams_are_distinct", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''wickets'' THEN CAST(result_margin
        AS INT) BETWEEN 1 AND 10 ELSE TRUE END", "wickets_margin_between_1_and_10",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","winner"]':
    code:
    - suggestion: '.satisfies(''(`result` IN (\''runs\'', \''wickets\'') AND `winner`
        IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`)) OR (`result` IN
        (\''tie\'', \''no result\''))'', ''winner_present_and_valid_when_decided'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `result` = \''wickets\'' THEN (`result_margin`
        IS NOT NULL AND CAST(`result_margin` AS INT) BETWEEN 1 AND 10) ELSE TRUE END'',
        ''wickets_margin_between_1_and_10_when_wickets'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `result` = \''runs\'' THEN (`result_margin`
        IS NOT NULL AND CAST(`result_margin` AS INT) >= 1) ELSE TRUE END'', ''runs_margin_positive_when_runs'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''lower(`result`) IN (\''runs\'', \''wickets\'', \''tie\'',
        \''no result\'')'', ''valid_result_values'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "distinct_opponents", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` IS NOT NULL AND TRIM(`team1`) <> '''' AND `team2`
        IS NOT NULL AND TRIM(`team2`) <> ''''", "teams_present_and_non_empty", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`team1` = TRIM(`team1`) AND `team2` = TRIM(`team2`)",
        "no_outer_whitespace_in_team_names", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2","winner"]':
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''runs'',''wickets'')
        THEN (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`))
        ELSE TRUE END", "winner_valid_when_decided", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(`result`) IN (''tie'',''no result'')
        THEN (`winner` IS NULL) ELSE TRUE END", "winner_null_for_tie_or_nr", lambda
        x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN lower(`result`) IN (''tie'',''no
        result'') THEN (`winner` IS NULL) ELSE TRUE END", "winner_null_for_tie_or_nr",
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL THEN TRUE ELSE (`winner`
        = `team1` OR `winner` = `team2`) END", "winner_belongs_to_teams_if_present",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_are_distinct", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
