results:
  team1:
    code:
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' THEN CASE WHEN team1
        IS NOT NULL AND LENGTH(TRIM(team1)) > 0 THEN 1 ELSE 0 END ELSE 1 END", "team1
        completeness for League", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' THEN CASE WHEN team1
        <> team2 THEN 1 ELSE 0 END ELSE 1 END", "Distinct teams per match", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result <> ''no
        result'' THEN CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END
        ELSE 1 END", "Winner must be one of the two teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND winner = team1
        THEN CASE WHEN result <> ''no result'' THEN 1 ELSE 0 END ELSE 1 END", "No
        winner when NR", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN team1 = TRIM(team1) THEN 1 ELSE 0 END", "Trimmed
        team1", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' THEN team2 IS NOT
        NULL AND LENGTH(TRIM(team2)) > 0 ELSE TRUE END", "team2 present and non-blank
        for League rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' THEN team1 IS NOT
        NULL AND team2 IS NOT NULL AND team1 <> team2 ELSE TRUE END", "No self-matches
        in League rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result <> ''no
        result'' THEN (winner = team1 OR winner = team2) ELSE TRUE END", "Winner must
        be one of the teams for decisive League matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' THEN team2 = TRIM(team2)
        ELSE TRUE END", "team2 has no leading/trailing whitespace (League)", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''team2'', lambda x: x <= 30)'
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn('match_type', ['League','Final','Qualifier 1','Qualifier
        2','Eliminator','Elimination Final','Semi Final'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("length(match_type) = length(trim(match_type))", ''match_type_trimmed'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' THEN 1 ELSE 0 END",
        ''has_league_rows'', lambda v: v > 0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR (`super_over` IN (''Y'',''N''))",
        "league_super_over_domain_YN", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR (`result` <> ''tie'')
        OR (`super_over` = ''Y'')", "tie_implies_super_over", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR (`super_over` <> ''Y'')
        OR (`result` = ''tie'')", "super_over_implies_tie", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR (`result` <> ''no result'')
        OR (`super_over` = ''N'')", "nr_has_no_super_over", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR (`super_over` <> ''Y'')
        OR ((`winner` = `team1`) OR (`winner` = `team2`))", "super_over_requires_valid_winner",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' THEN CASE WHEN
        to_timestamp(`date`) IS NOT NULL AND year(to_timestamp(`date`)) = CAST(`season`
        AS INT) THEN 1 ELSE 0 END ELSE 1 END", "Date year matches season", lambda
        x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `match_type` = ''League''
        THEN CASE WHEN to_timestamp(`date`) IS NOT NULL AND year(to_timestamp(`date`))
        = CAST(`season` AS INT) THEN 1 ELSE 0 END ELSE 1 END", "Date year matches
        season", lambda x: x >= 0.98)'' failed on data sample: Value: 0.9536784741144414
        does not meet the constraint requirement!'
      level: warning
  season:
    code:
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' THEN CASE WHEN
        CAST(`season` AS STRING) RLIKE ''^[0-9]{4}$'' THEN 1 ELSE 0 END ELSE 1 END",
        "Season is 4-digit year for League rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `match_type` = ''League'' AND `date` IS NOT
        NULL THEN CASE WHEN CAST(`season` AS INT) = YEAR(TO_TIMESTAMP(`date`)) THEN
        1 ELSE 0 END ELSE 1 END", "Season equals date year for League rows", lambda
        x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `match_type` = ''League''
        AND `date` IS NOT NULL THEN CASE WHEN CAST(`season` AS INT) = YEAR(TO_TIMESTAMP(`date`))
        THEN 1 ELSE 0 END ELSE 1 END", "Season equals date year for League rows",
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.9536784741144414 does
        not meet the constraint requirement!'
      level: warning
  id:
    code:
    - suggestion: '.satisfies("(match_type <> ''League'') OR (id IS NOT NULL)", "League
        rows must have non-null id", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result <> ''no
        result'' THEN CASE WHEN winner IS NOT NULL AND TRIM(winner) <> '''' AND (winner
        = team1 OR winner = team2) THEN 1 ELSE 0 END ELSE 1 END", "Winner valid for
        decided league matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result = ''no
        result'' THEN CASE WHEN winner IS NULL OR TRIM(winner) = '''' THEN 1 ELSE
        0 END ELSE 1 END", "No-result league matches have no winner", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND result <> ''no
        result'' AND winner IS NOT NULL THEN CASE WHEN TRIM(winner) = winner THEN
        1 ELSE 0 END ELSE 1 END", "Winner trimmed on decided league matches", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN match_type = ''League'' AND super_over =
        ''Y'' THEN CASE WHEN result <> ''no result'' AND winner IS NOT NULL AND TRIM(winner)
        <> '''' AND (winner = team1 OR winner = team2) THEN 1 ELSE 0 END ELSE 1 END",
        "Super over league matches must have a valid winner and not be NR", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.satisfies("(match_type <> ''League'') OR (lower(trim(result))
        IN (''wickets'',''runs'',''tie'',''no result''))", "Valid result categories
        for League matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(match_type <> ''League'') OR (CASE WHEN lower(trim(result))
        = ''no result'' THEN (winner IS NULL OR trim(winner) = '''') ELSE TRUE END)",
        "NR implies no winner", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(match_type <> ''League'') OR (CASE WHEN lower(trim(result))
        = ''tie'' THEN super_over = ''Y'' ELSE TRUE END)", "Tie implies super over",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(match_type <> ''League'') OR (CASE WHEN super_over
        = ''Y'' THEN lower(trim(result)) = ''tie'' ELSE TRUE END)", "Super over implies
        tie", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(match_type <> ''League'') OR (CASE WHEN lower(trim(result))
        <> ''no result'' THEN winner IN (team1, team2) ELSE TRUE END)", "Winner present
        and must be one of the teams for decisive results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("case when result = ''tie'' then super_over = ''Y''
        else true end", "Tie implies super over", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("case when super_over = ''Y'' then result = ''tie''
        else true end", "Super over implies tie", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("case when result = ''no result'' then (coalesce(winner,
        '''') = '''' and super_over = ''N'') else true end", "No-result has no winner
        and no super over", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("case when result in (''runs'',''wickets'') then ((winner
        = team1 or winner = team2) and super_over = ''N'') else true end", "Decided
        matches have in-teams winner and no super over", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("case when super_over = ''Y'' then (winner = team1 or
        winner = team2) else true end", "Super over has in-teams winner", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "Teams must be distinct", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("case when date is not null then year(to_timestamp(date))
        = cast(season as int) else true end", "Date year equals season", lambda x:
        x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("case when date is not null then
        year(to_timestamp(date)) = cast(season as int) else true end", "Date year
        equals season", lambda x: x == 1.0)'' failed on data sample: Value: 0.9536784741144414
        does not meet the constraint requirement!'
      level: warning
