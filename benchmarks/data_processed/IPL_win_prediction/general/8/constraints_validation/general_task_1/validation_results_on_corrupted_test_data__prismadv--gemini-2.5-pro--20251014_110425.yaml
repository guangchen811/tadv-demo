results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("TRIM(`team1`) != ''", "team1 should not be empty or
        contain only whitespace")
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team2` <> `team1`", "team2 must be different from
        team1", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x > 0.99)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .isPositive("result_margin")
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isComplete("super_over")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn("super_over", ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: .isComplete("toss_winner")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_must_be_a_participating_team", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "toss_winner_must_be_a_participating_team", lambda x: x == 1.0)''
        failed on data sample: Value: 0.9019073569482289 does not meet the constraint
        requirement!'
      level: error
  date:
    code:
    - suggestion: '.satisfies("try_cast(date as date) IS NOT NULL", "is_date_format",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("date")
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: true
      reason_if_failed: ''
      level: error
  '["date","id","team1","team2"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "team1_and_team2_are_different",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`result` IN (''no result'', ''tie'')) OR (`winner`
        IS NULL) OR (`winner` = `team1`) OR (`winner` = `team2`)", "winner_is_a_participant_or_no_result",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_is_a_participant", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "toss_winner_is_a_participant", lambda x: x == 1)'' failed on
        data sample: Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "team1_is_not_team2", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("year(to_date(`date`)) = season", "YearInDateMatchesSeason",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("year(to_date(`date`)) = season",
        "YearInDateMatchesSeason", lambda x: x == 1)'' failed on data sample: Value:
        0.9536784741144414 does not meet the constraint requirement!'
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness("winner", lambda c: c >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness("winner", lambda c: c >= 0.99)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN winner IS NOT NULL THEN winner = team1 OR
        winner = team2 ELSE true END", "Winner must be one of the two teams playing",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("result", ["runs", "wickets", "tie", "no result"])
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","winner"]':
    code:
    - suggestion: '.satisfies("winner IS NULL OR winner = team1 OR winner = team2",
        "winner_must_be_a_participant", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("(`result` = ''tie'' AND `super_over` = ''Y'') OR (`result`
        <> ''tie'' AND `super_over` = ''N'')", "ResultIsTie_iff_SuperOverIsY", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","toss_winner","winner"]':
    code:
    - suggestion: '.satisfies("`winner` IS NULL OR `winner` = `team1` OR `winner`
        = `team2`", "winner_check", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "toss_winner_check", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "toss_winner_check", lambda x: x == 1)'' failed on data sample:
        Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "team1_and_team2_must_be_different",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("(`winner` IS NULL) OR (`winner` = `team1`) OR (`winner`
        = `team2`)", "winner_must_be_a_participant", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "teams_must_be_different", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
