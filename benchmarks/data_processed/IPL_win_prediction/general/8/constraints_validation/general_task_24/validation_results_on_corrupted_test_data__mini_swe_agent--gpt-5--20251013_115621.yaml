results:
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''result_margin'',
        ConstrainableDataTypes.Fractional)'
      level: error
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', ConstrainableDataTypes.Integral)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''season'', ConstrainableDataTypes.Integral)'
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''target_overs'',
        ConstrainableDataTypes.Fractional)'
      level: error
    - suggestion: .isPositive('target_overs')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''target_runs'',
        ConstrainableDataTypes.Fractional)'
      level: error
    - suggestion: .isPositive('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .isComplete('winner').where("result IN ('runs','wickets')")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("winner = team1 OR winner = team2", 'winner_in_teams').where("result
        IN ('runs','wickets')")
      status: true
      reason_if_failed: ''
      level: error
