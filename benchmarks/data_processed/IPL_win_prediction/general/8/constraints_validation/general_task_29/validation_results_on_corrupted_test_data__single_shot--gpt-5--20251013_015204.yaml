results:
  date:
    code:
    - suggestion: .isParsableToDate('date', 'yyyy-MM-dd')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isParsableToDate(''date'',
        ''yyyy-MM-dd'')'': ''Check'' object has no attribute ''isParsableToDate'''
      level: error
  match_type:
    code:
    - suggestion: .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier
        2', 'Eliminator', 'Final', 'Semi Final', 'Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''result_margin'',
        ConstrainableDataTypes.Fractional)'
      level: error
  result_margin_semantics:
    code:
    - suggestion: .satisfies("(result IN ('runs','wickets') AND result_margin IS NOT
        NULL) OR (result IN ('tie','no result') AND result_margin IS NULL)", 'result
        margin present only for runs/wickets')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .hasDataType('season', ConstrainableDataTypes.Integral)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''season'', ConstrainableDataTypes.Integral)'
      level: error
    - suggestion: .satisfies('season BETWEEN 2008 AND 2025', 'season in expected range')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''season BETWEEN 2008 AND 2025'',
        ''season in expected range'')'' failed on data sample: Value: 0.9945504087193461
        does not meet the constraint requirement!'
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''target_overs'',
        ConstrainableDataTypes.Fractional)'
      level: error
  target_overs_bounds:
    code:
    - suggestion: .satisfies('(target_overs IS NULL) OR (target_overs > 0 AND target_overs
        <= 20)', 'target overs within (0,20] when present')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''target_runs'',
        ConstrainableDataTypes.Fractional)'
      level: error
  target_runs_positive:
    code:
    - suggestion: .satisfies('(target_runs IS NULL) OR (target_runs > 0)', 'target
        runs positive when present')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1_team2:
    code:
    - suggestion: .satisfies('team1 <> team2', 'teams must be different')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss
        winner must be one of the two teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(toss_winner = team1) OR (toss_winner
        = team2)'', ''toss winner must be one of the two teams'')'' failed on data
        sample: Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
  umpire1:
    code:
    - suggestion: .isComplete('umpire1')
      status: true
      reason_if_failed: ''
      level: error
  umpire2:
    code:
    - suggestion: .isComplete('umpire2')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("(result = 'no result') OR (winner = team1 OR winner
        = team2)", 'winner must be one of the two teams when played')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result = 'no result') OR (winner IS NOT NULL)", 'winner
        present when match played')
      status: true
      reason_if_failed: ''
      level: error
