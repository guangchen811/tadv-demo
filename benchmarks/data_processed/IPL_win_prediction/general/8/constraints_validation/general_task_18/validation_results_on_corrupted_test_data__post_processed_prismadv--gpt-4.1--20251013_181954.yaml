results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''team1''], lambda d: d <= (19/550))'
      status: false
      reason_if_failed: 'Constraint ''.hasDistinctness([''team1''], lambda d: d <=
        (19/550))'' failed on data sample: Value: 0.051771117166212535 does not meet
        the constraint requirement!'
      level: error
  team2:
    code:
    - suggestion: '.satisfies(''`team2` <> `team1`'', ''Distinct Teams'', lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .satisfies("CASE WHEN method = 'D/L' THEN CAST(target_overs AS DOUBLE)
        IS NOT NULL ELSE TRUE END", "target_overs castable to float when D/L method")
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies('CASE WHEN `result` IN ("runs", "wickets") THEN `result_margin`
        IS NOT NULL ELSE TRUE END', 'Non-null result_margin when required')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN `result` IN ("runs", "wickets") THEN CAST(`result_margin`
        AS DOUBLE) IS NOT NULL ELSE TRUE END', 'result_margin numeric when required')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.satisfies("(method != ''D/L'') OR (target_runs IS NOT NULL)",
        "target_runs must be present when method is D/L", assertion=lambda r: r >=
        0.998)

        '
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(method != ''D/L'') OR (target_runs
        IS NOT NULL)", "target_runs must be present when method is D/L", assertion=lambda
        r: r >= 0.998)

        '' failed on data sample: Value: 0.9945504087193461 does not meet the constraint
        requirement!'
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`toss_winner` = `team1` OR `toss_winner` = `team2`)',
        'Toss winner must be team1 or team2')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(`toss_winner` = `team1` OR `toss_winner`
        = `team2`)'', ''Toss winner must be team1 or team2'')'' failed on data sample:
        Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
  date:
    code:
    - suggestion: .satisfies("date is not NULL AND to_date(date, 'yyyy-MM-dd') is
        not NULL", "Date column must be valid and parseable as date")
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.satisfies("`method` IS NULL OR TRIM(UPPER(`method`)) = ''D/L''",
        "method is null or canonical ''D/L''", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("CASE WHEN TRIM(UPPER(`method`)) = 'D/L' THEN `target_runs`
        IS NOT NULL AND `target_overs` IS NOT NULL AND CAST(`target_runs` AS DOUBLE)
        IS NOT NULL AND CAST(`target_overs` AS DOUBLE) IS NOT NULL ELSE TRUE END",
        "target_runs and target_overs must be present and numeric when method is D/L")
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: .satisfies('season IS NOT NULL AND date IS NOT NULL AND date >=
        "1000-01-01" AND date <= "9999-12-31"', 'Season and date both non-null and
        date parseable')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("CASE WHEN result != 'no result' THEN CASE WHEN winner
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner should be present unless
        no result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN winner IS NULL THEN 1 WHEN winner = team1
        OR winner = team2 THEN 1 ELSE 0 END", "Winner must be one of the two teams
        or null")
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''result''], lambda x: x <= 0.01 + (4.0/550.0))'
      status: true
      reason_if_failed: ''
      level: warning
  '["loser","team1","team2","winner"]':
    code:
    - suggestion: .satisfies('team1 != team2', 'Teams must be different')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'Winner must be one of the teams')
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: .satisfies('((`result` = "tie" AND `super_over` = "Y") OR (`result`
        <> "tie" AND `super_over` <> "Y"))', 'Tie result requires and only occurs
        with super over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`result` <> "no result" OR `super_over` = "N")', 'No-result
        matches must not have super over')
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: .satisfies('team1 IS NOT NULL AND team2 IS NOT NULL AND toss_winner
        IS NOT NULL', 'Non-null Teams and Toss Winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'Toss Winner
        Must Be One of the Teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''toss_winner = team1 OR toss_winner
        = team2'', ''Toss Winner Must Be One of the Teams'')'' failed on data sample:
        Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies('team1 != team2', 'Teams Must Be Different')
      status: true
      reason_if_failed: ''
      level: error
