constraints:
  date:
    code:
    - - .hasPattern('date', r'^\\d{4}-\\d{2}-\\d{2}$')
      - Invalid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("method IS NULL OR method = 'D/L'", 'method_null_or_dl')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .satisfies("lower(result) IN ('runs','wickets','tie','no result')", 'result_domain')
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasDataType('result_margin', ConstrainableDataTypes.Fractional)
      - Valid
    - - .satisfies("(lower(result) IN ('runs','wickets') AND result_margin IS NOT
        NULL AND result_margin > 0) OR (lower(result) NOT IN ('runs','wickets'))",
        'result_margin_required_when_resulted')
      - Valid
    assumptions: []
  season:
    code:
    - - .hasDataType('season', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .satisfies("upper(super_over) IN ('Y','N')", 'super_over_domain')
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isPositive('target_overs', where="lower(result) <> 'no result'")
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .hasDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isNonNegative('target_runs', where="lower(result) <> 'no result'")
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  tie_super_over:
    code:
    - - .satisfies("(lower(result) <> 'tie') OR (upper(super_over) = 'Y' AND winner
        IS NOT NULL)", 'tie_requires_super_over_and_winner')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .satisfies("lower(toss_decision) IN ('bat','field')", 'toss_decision_domain')
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", 'toss_winner_membership')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner', where="lower(result) <> 'no result'")
      - Invalid
    - - .satisfies("(lower(result) <> 'no result') OR (winner IS NULL)", 'no_result_has_no_winner')
      - Valid
    - - .satisfies("winner IS NULL OR winner = team1 OR winner = team2", 'winner_membership')
      - Valid
    assumptions: []
