constraints:
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("result NOT IN ('runs', 'wickets') OR result_margin IS NOT NULL",
        "margin_exists_for_run_or_wicket_wins")
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    - - .satisfies("result <> 'tie' OR super_over = 'Y'", "super_over_must_occur_in_a_tie")
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isPositive('target_overs')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_must_be_a_competing_team")
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("result = 'no result' OR winner IS NOT NULL", "winner_exists_for_decisive_results")
      - Valid
    - - .satisfies("winner IS NULL OR winner = team1 OR winner = team2", "winner_must_be_a_competing_team")
      - Valid
    assumptions: []
