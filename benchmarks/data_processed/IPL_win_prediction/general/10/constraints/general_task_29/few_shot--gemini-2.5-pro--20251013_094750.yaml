constraints:
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isComplete('result_margin', "result IN ('runs', 'wickets')")
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner_must_be_a_participant')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner', "result != 'no result'")
      - Invalid
    - - .satisfies('winner IS NULL OR winner = team1 OR winner = team2', 'winner_must_be_a_participant')
      - Valid
    assumptions: []
