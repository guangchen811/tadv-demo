constraints:
  date:
    code:
    - - .hasPattern('date', '^\d{4}-\d{2}-\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Qualifier 1', 'Qualifier 2', 'Eliminator',
        'Final', 'Elimination Final', 'Semi Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("(method <> 'D/L') OR (target_runs IS NOT NULL AND target_runs
        > 0 AND target_overs IS NOT NULL AND target_overs > 0 AND target_overs <=
        20)", 'dls_targets_present_positive_and_within_20_overs')
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .satisfies("(result IN ('runs','wickets') AND result_margin IS NOT NULL AND
        result_margin > 0) OR (result IN ('tie','no result') AND result_margin IS
        NULL)", 'result_margin_consistent_with_result')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    - - .satisfies("substring(date, 1, 4) = cast(season as string)", 'season_matches_date_year')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    - - .satisfies("(super_over <> 'Y') OR (result = 'tie')", 'super_over_only_when_tie')
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .satisfies('team1 <> team2', 'opposing_teams_different')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies('(toss_winner = team1 OR toss_winner = team2)', 'toss_winner_is_playing_team')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("(result = 'no result' AND winner IS NULL) OR (winner = team1 OR
        winner = team2)", 'winner_is_playing_team')
      - Valid
    - - .satisfies("(result = 'no result') OR (winner IS NOT NULL)", 'winner_present_when_result_exists')
      - Valid
    assumptions: []
