constraints:
  city:
    code:
    - - .hasMinCompleteness('city', 0.98)
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .satisfies("CAST(date AS DATE) IS NOT NULL", "date is a valid date format")
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isIntegral('id')
      - Invalid
    - - .isNonNegative('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  method:
    code:
    - - .hasMinCompleteness('method', 0.02)
      - Invalid
    - - .isContainedIn('method', ['D/L'], orNull=True)
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .hasMinCompleteness('player_of_match', 0.99)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasMinCompleteness('result_margin', 0.98)
      - Invalid
    - - .isFractional('result_margin')
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    - - .satisfies("result IN ('runs', 'wickets') OR result_margin IS NULL", "result_margin
        should be null if result is 'tie' or 'no result'")
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isIntegral('season')
      - Invalid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .hasMinCompleteness('target_overs', 0.99)
      - Invalid
    - - .isFractional('target_overs')
      - Invalid
    - - .isPositive('target_overs')
      - Valid
    - - .satisfies("method <> 'D/L' OR target_overs IS NOT NULL", "target_overs must
        be present if method is D/L")
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .hasMinCompleteness('target_runs', 0.99)
      - Invalid
    - - .isFractional('target_runs')
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    - - .satisfies("method <> 'D/L' OR target_runs IS NOT NULL", "target_runs must
        be present if method is D/L")
      - Invalid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .satisfies("team1 <> team2", "teams playing are distinct")
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies("toss_winner = team1 OR toss_winner = team2", "toss winner is one
        of the playing teams")
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpaire2')
      - Invalid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .hasMinCompleteness('winner', 0.99)
      - Invalid
    - - .satisfies("result = 'no result' OR (winner = team1 OR winner = team2)", "winner
        must be one of the playing teams if result is not 'no result'")
      - Valid
    - - .satisfies("result = 'no result' OR winner IS NOT NULL", "winner must be present
        if result is not 'no result'")
      - Valid
    assumptions: []
