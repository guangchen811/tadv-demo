constraints:
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .isPositive('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner', "result IN ('runs', 'wickets')")
      - Invalid
    assumptions: []
