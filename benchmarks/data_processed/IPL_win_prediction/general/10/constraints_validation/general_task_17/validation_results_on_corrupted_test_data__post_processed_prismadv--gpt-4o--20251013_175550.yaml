results:
  team1:
    code:
    - suggestion: '.hasCompleteness(''team1'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x >= 0.989)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''result_margin'', lambda x:
        x >= 0.989)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies('toss_decision IN ("field", "bat")', 'Valid Toss Decisions')
      status: true
      reason_if_failed: ''
      level: undefined
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: undefined
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.hasCompleteness(''method'', lambda x: x == 0.025454545454545455)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''method'', lambda x: x ==
        0.025454545454545455)'' failed on data sample: Value: 0.013623978201634877
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''method IS NULL OR method = "D/L"'', ''Method Value
        Check'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: .satisfies('date IS NOT NULL AND TRY_CAST(date AS DATE) IS NOT NULL',
        'Valid Date Strings')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies('winner IS NULL OR winner IN (team1, team2)', 'Winner
        Validity')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''winner IS NULL OR winner IN (team1,
        team2)'', ''Winner Validity'')'' failed on data sample: Value: 0.547683923705722
        does not meet the constraint requirement!'
      level: undefined
    - suggestion: .satisfies('result != "tie" OR winner IS NULL OR winner IN (team1,
        team2)', 'Tie Result Winner Constraint')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''result != "tie" OR winner IS NULL
        OR winner IN (team1, team2)'', ''Tie Result Winner Constraint'')'' failed
        on data sample: Value: 0.9945504087193461 does not meet the constraint requirement!'
      level: undefined
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: undefined
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN result_margin
        IS NOT NULL ELSE TRUE END", "Result Margin Completeness", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' THEN `super_over` = ''Y''
        ELSE TRUE END", "Tie Result Requires Super Over", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        `winner` IN (`team1`, `team2`) ELSE TRUE END", "Winner Must Be One of the
        Teams", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `result` IN (''runs'',
        ''wickets'') THEN `winner` IN (`team1`, `team2`) ELSE TRUE END", "Winner Must
        Be One of the Teams", lambda x: x == 1)'' failed on data sample: Value: 0.553133514986376
        does not meet the constraint requirement!'
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: .satisfies('team1 = toss_winner OR team2 = toss_winner', 'Toss Winner
        Validation')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''team1 = toss_winner OR team2 =
        toss_winner'', ''Toss Winner Validation'')'' failed on data sample: Value:
        0.547683923705722 does not meet the constraint requirement!'
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: .satisfies('team1 != team2', 'Teams are not the same')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''team1 != team2'', ''Teams are not
        the same'')'' failed on data sample: Value: 0.9073569482288828 does not meet
        the constraint requirement!'
      level: error
