results:
  date:
    code:
    - suggestion: .isComplete('date').satisfies('to_date(date) IS NOT NULL', 'date_parseable')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id').isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result').isContainedIn('result', ['runs','wickets','tie','no
        result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies('result_margin IS NULL OR cast(result_margin as double)
        IS NOT NULL', 'result_margin_numeric_when_present')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season').isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over').isContainedIn('super_over', ['Y','N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .satisfies('target_overs IS NULL OR cast(target_overs as double)
        IS NOT NULL', 'target_overs_numeric_when_present')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .satisfies('target_runs IS NULL OR cast(target_runs as double) IS
        NOT NULL', 'target_runs_numeric_when_present')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision').isContainedIn('toss_decision', ['field','bat'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner_in_teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''toss_winner = team1 OR toss_winner
        = team2'', ''toss_winner_in_teams'')'' failed on data sample: Value: 0.547683923705722
        does not meet the constraint requirement!'
      level: error
  winner:
    code:
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'winner_in_teams_or_null')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''winner IS NULL OR winner = team1
        OR winner = team2'', ''winner_in_teams_or_null'')'' failed on data sample:
        Value: 0.547683923705722 does not meet the constraint requirement!'
      level: error
