    - suggestion: .isComplete('result_margin', where="result IN ('runs','wickets')")
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isComplete(''result_margin'',
        where="result IN (''runs'',''wickets'')")'': Check.isComplete() got an unexpected
        keyword argument ''where'''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result <> 'tie' OR super_over = 'Y'", 'tie_requires_super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("super_over <> 'Y' OR result = 'tie'", 'super_over_only_for_tie')
