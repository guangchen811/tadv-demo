results:
  date:
    code:
    - suggestion: .containsPattern('date', '^\d{4}-\d{2}-\d{2}$')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.containsPattern(''date'',
        ''^\d{4}-\d{2}-\d{2}$'')'': ''Check'' object has no attribute ''containsPattern'''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("method IS NULL OR method = 'D/L'", 'method_null_or_dl')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasMax(''result_margin'', lambda v: v <= 10, where="result = ''wickets''")'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasMax(''result_margin'',
