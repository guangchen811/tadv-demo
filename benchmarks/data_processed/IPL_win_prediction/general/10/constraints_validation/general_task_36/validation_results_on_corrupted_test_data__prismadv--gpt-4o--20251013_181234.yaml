results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: undefined
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: .satisfies('CASE WHEN result IN ("runs", "wickets") THEN result_margin
        IS NOT NULL ELSE TRUE END', 'Result Margin Non-Null for Runs or Wickets')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: undefined
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: undefined
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('toss_winner IN (team1, team2)', 'Valid Toss Winner')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''toss_winner IN (team1, team2)'',
        ''Valid Toss Winner'')'' failed on data sample: Value: 0.547683923705722 does
        not meet the constraint requirement!'
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  '["batting_first","chasing_team","team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: .satisfies('CASE WHEN result IN ("runs", "wickets") THEN (winner
        = team1 OR winner = team2) AND result_margin IS NOT NULL ELSE TRUE END', 'Winner
        and Margin Validity')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN result IN ("runs", "wickets")
        THEN (winner = team1 OR winner = team2) AND result_margin IS NOT NULL ELSE
        TRUE END'', ''Winner and Margin Validity'')'' failed on data sample: Value:
        0.553133514986376 does not meet the constraint requirement!'
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","id","season"]':
    code:
    - suggestion: '.hasUniqueness([''id'', ''season'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN result IN ("runs", "wickets") THEN winner
        IS NOT NULL ELSE TRUE END', 'Winner Completeness Check')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('CASE WHEN result IN ("runs", "wickets") THEN result_margin
        IS NOT NULL ELSE TRUE END', 'Result Margin Completeness Check')
      status: true
      reason_if_failed: ''
      level: warning
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        `result_margin` IS NOT NULL ELSE TRUE END", "Non-null result_margin for runs/wickets",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        `winner` IS NOT NULL ELSE TRUE END", "Non-null winner for runs/wickets", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over","winner"]':
    code:
    - suggestion: .satisfies("CASE WHEN `result` = 'tie' AND `super_over` = 'N' THEN
        `winner` IS NULL ELSE TRUE END", "Tie without Super Over should have no winner")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("CASE WHEN `result` = 'no result' THEN `winner` IS NULL
        ELSE TRUE END", "No Result should have no winner")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("CASE WHEN `result` IN ('runs', 'wickets') THEN `winner`
        IS NOT NULL AND CAST(`result_margin` AS INT) IS NOT NULL ELSE TRUE END", "Runs/Wickets
        result must have a winner and valid result margin")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `result` = 'tie' AND `super_over` = 'Y' THEN
        `winner` IS NOT NULL ELSE TRUE END", "Tie with Super Over should have a winner")
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2","winner"]':
    code:
    - suggestion: '.haveCompleteness([''team1'', ''team2''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN result != "no result" THEN winner IN (team1,
        team2) ELSE TRUE END', 'Winner Validation')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN result != "no result"
        THEN winner IN (team1, team2) ELSE TRUE END'', ''Winner Validation'')'' failed
        on data sample: Value: 0.547683923705722 does not meet the constraint requirement!'
      level: error
