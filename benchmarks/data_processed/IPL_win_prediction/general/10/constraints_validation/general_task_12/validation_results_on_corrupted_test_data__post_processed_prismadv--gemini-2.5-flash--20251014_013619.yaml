results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness("player_of_match", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness("player_of_match", lambda x:
        x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: warning
  target_overs:
    code:
    - suggestion: '.hasCompleteness("target_overs", lambda x: x < 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN target_overs IS NOT
        NULL ELSE TRUE END", "Target overs should not be null when method is D/L",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN `result_margin`
        IS NOT NULL ELSE TRUE END", "Result Margin Not Null When Result Is Runs or
        Wickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') AND `result_margin`
        IS NOT NULL THEN `result_margin` >= 0 ELSE TRUE END", "Result Margin Must
        Be Non-Negative When Result Is Runs or Wickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') AND `result_margin`
        IS NOT NULL THEN `result_margin` = FLOOR(`result_margin`) ELSE TRUE END",
        "Result Margin Must Be Integer When Result Is Runs or Wickets", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''target_runs'', lambda x:
        x >= 0.995)'' failed on data sample: Value: 0.9945504087193461 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.isNonNegative(''target_runs'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`target_runs` IS NULL OR CAST(`target_runs` AS INT)
        = `target_runs`)", "target_runs_is_integral_or_null", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete("toss_decision")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("toss_decision", ["bat", "field"])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''super_over'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: '.satisfies("(`toss_winner` = `team1`) OR (`toss_winner` = `team2`)",
        "Toss winner must be one of the playing teams", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(`toss_winner` = `team1`) OR (`toss_winner`
        = `team2`)", "Toss winner must be one of the playing teams", lambda x: x ==
        1)'' failed on data sample: Value: 0.547683923705722 does not meet the constraint
        requirement!'
      level: error
  date:
    code:
    - suggestion: '.satisfies("regexp_extract(`date`, ''^[0-9]{4}-[0-9]{2}-[0-9]{2}$'',
        0) IS NOT NULL", "Date Format YYYY-MM-DD", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: '.isPositive(''season'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: '.hasCompleteness("method", lambda x: x < 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn("method", ["D/L"])
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("NOT (( (`result` = ''runs'' OR `result` = ''wickets'')
        OR (`result` = ''tie'' AND `super_over` = ''Y'') ) AND `winner` IS NULL)",
        "Winner must be present for decisive results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`winner` IS NULL OR (`winner` = `team1` OR `winner`
        = `team2`)", "Winner must be one of the participating teams", lambda x: x
        == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`winner` IS NULL OR (`winner` =
        `team1` OR `winner` = `team2`)", "Winner must be one of the participating
        teams", lambda x: x == 1.0)'' failed on data sample: Value: 0.547683923705722
        does not meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["method","player_of_match","result","result_margin","super_over","target_overs","target_runs","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN (result IN (''runs'', ''wickets'') OR (result
        = ''tie'' AND super_over = ''Y'')) THEN (winner IS NOT NULL AND (winner =
        team1 OR winner = team2)) ELSE TRUE END", "Winner validity when declared",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN (result IN (''runs'',
        ''wickets'') OR (result = ''tie'' AND super_over = ''Y'')) THEN (winner IS
        NOT NULL AND (winner = team1 OR winner = team2)) ELSE TRUE END", "Winner validity
        when declared", lambda x: x == 1.0)'' failed on data sample: Value: 0.547683923705722
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN (result_margin
        IS NOT NULL AND result_margin = floor(result_margin)) ELSE TRUE END", "Result
        Margin is Integer and Not Null", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN (target_runs IS NOT
        NULL AND target_overs IS NOT NULL) ELSE TRUE END", "Target Runs/Overs Not
        Null for D/L", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 != team2", "Teams are Distinct", lambda x: x
        == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("team1 != team2", "Teams are Distinct",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9073569482288828 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''tie'' AND super_over = ''N'' THEN
        winner IS NULL ELSE TRUE END", "Winner Null for Tie No Super Over", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["method","target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("method = ''D/L'' AND target_runs IS NULL", "DLS_target_runs_not_null",
        lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("method = ''D/L'' AND target_overs IS NULL", "DLS_target_overs_not_null",
        lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("result IN (''runs'', ''wickets'') AND result_margin
        IS NULL", "Result Margin Must Be Non-Null For Runs/Wickets", lambda x: x ==
        0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result = ''tie'' AND super_over NOT IN (''Y'', ''N'')",
        "Super Over Must Be Y or N For Ties", lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin","winner"]':
    code:
    - suggestion: '.satisfies("IF(result IN (''runs'', ''wickets''), winner = team1
        OR winner = team2, True)", "Winner for decided matches", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("IF(result IN (''runs'', ''wickets''),
        winner = team1 OR winner = team2, True)", "Winner for decided matches", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.553133514986376 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies("IF(result = ''no result'', winner IS NULL, True)",
        "Winner for no result matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("IF(result = ''tie'', winner IS NOT NULL, True)", "Winner
        for tie matches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("IF(result IN (''runs'', ''wickets''), result_margin
        IS NOT NULL AND result_margin >= 0 AND result_margin = CAST(result_margin
        AS INT), True)", "Result margin valid for decided matches", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 != team2", "Teams are distinct", lambda x: x
        == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("team1 != team2", "Teams are distinct",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9073569482288828 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "Toss
        winner is a participating team", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("toss_winner = team1 OR toss_winner
        = team2", "Toss winner is a participating team", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.547683923705722 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("IF(super_over = ''Y'', result = ''tie'', True)", "Super
        over implies tie", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("IF(result = ''tie'', super_over IS NOT NULL, True)",
        "Tie implies super over presence", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","season","super_over","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` IS NOT NULL AND (`toss_winner` = `team1`
        OR `toss_winner` = `team2`)", "Toss Winner is Team1 or Team2", lambda x: x
        == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` IS NOT NULL AND (`toss_winner`
        = `team1` OR `toss_winner` = `team2`)", "Toss Winner is Team1 or Team2", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.547683923705722 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`result` NOT IN (''runs'', ''wickets'') OR `result_margin`
        IS NOT NULL", "Result Margin Not Null for Runs/Wickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`result` IN (''runs'', ''wickets'', ''tie'', ''no result'')",
        "Result Column Valid Values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`result` != ''tie'' OR (`super_over` = ''Y'' OR `super_over`
        = ''N'')", "Super Over Valid for Ties", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("`team1` != `team2`", "Teams Must Be Distinct", lambda
        x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`team1` != `team2`", "Teams Must
        Be Distinct", lambda x: x == 1.0)'' failed on data sample: Value: 0.9073569482288828
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss Winner is a Participating Team", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "Toss Winner is a Participating Team", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.547683923705722 does not meet the constraint requirement!'
      level: error
  '["result","super_over","winner"]':
    code:
    - suggestion: '.satisfies("(`super_over` = ''N'') OR (`result` = ''tie'')", "SuperOverResultConsistency",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT ((`result` = ''runs'' OR `result` = ''wickets'')
        OR (`result` = ''tie'' AND `super_over` = ''Y'')) OR (`winner` IS NOT NULL)",
        "WinnerNotNullForDecidedMatches", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT ((`result` = ''no result'') OR (`result` = ''tie''
        AND `super_over` = ''N'')) OR (`winner` IS NULL)", "WinnerNullForUndecidedMatches",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner","winner"]':
    code:
    - suggestion: '.satisfies("(`toss_winner` = `team1` OR `toss_winner` = `team2`)",
        "Toss winner is one of the teams", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(`toss_winner` = `team1` OR `toss_winner`
        = `team2`)", "Toss winner is one of the teams", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.547683923705722 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("(`winner` IS NULL OR (`winner` = `team1` OR `winner`
        = `team2`))", "Winner is a participating team or null", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(`winner` IS NULL OR (`winner` =
        `team1` OR `winner` = `team2`))", "Winner is a participating team or null",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.547683923705722 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("(`team1` <> `team2`)", "Teams are distinct", lambda
        x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(`team1` <> `team2`)", "Teams are
        distinct", lambda x: x == 1.0)'' failed on data sample: Value: 0.9073569482288828
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("(( (`result` = ''runs'' OR `result` = ''wickets'' OR
        (`result` = ''tie'' AND `super_over` = ''Y'')) AND `winner` IS NOT NULL )
        OR ( (`result` = ''no result'' OR (`result` = ''tie'' AND `super_over` <>
        ''Y'')) AND `winner` IS NULL ))", "Winner consistency with result and super_over",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
