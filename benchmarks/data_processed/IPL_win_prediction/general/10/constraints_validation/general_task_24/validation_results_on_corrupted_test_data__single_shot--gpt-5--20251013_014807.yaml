results:
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .satisfies("date RLIKE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'", 'date_iso_yyyy_mm_dd')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League', 'Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1'])
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("(method IS NULL) OR (method = 'D/L')", 'method_dl_or_null')
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness(''player_of_match'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies('(result_margin IS NULL) OR (result_margin >= 0)', 'result_margin_nonnegative_or_null')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: '.hasMin(''season'', lambda v: v >= 2008)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .satisfies('(target_overs IS NULL) OR ((target_overs >= 1.0) AND
        (target_overs <= 20.0))', 'target_overs_in_range_or_null')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''target_runs'', lambda v: v >= 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1_team2:
    code:
    - suggestion: .satisfies('team1 <> team2', 'teams_are_distinct')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''team1 <> team2'', ''teams_are_distinct'')''
        failed on data sample: Value: 0.9073569482288828 does not meet the constraint
        requirement!'
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss_winner_in_teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(toss_winner = team1) OR (toss_winner
        = team2)'', ''toss_winner_in_teams'')'' failed on data sample: Value: 0.547683923705722
        does not meet the constraint requirement!'
      level: error
  umpire1:
    code:
    - suggestion: .isComplete('umpire1')
      status: true
      reason_if_failed: ''
      level: error
  umpire2:
    code:
    - suggestion: .isComplete('umpire2')
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('((result IN (\'runs\', \'wickets\')) AND (winner IS
        NOT NULL) AND ((winner = team1) OR (winner = team2))) OR (result NOT IN (\'runs\',
        \'wickets\'))', 'winner_valid_if_decided')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''((result IN (\''runs\'', \''wickets\''))
        AND (winner IS NOT NULL) AND ((winner = team1) OR (winner = team2))) OR (result
        NOT IN (\''runs\'', \''wickets\''))'', ''winner_valid_if_decided'')'' failed
        on data sample: Value: 0.553133514986376 does not meet the constraint requirement!'
      level: error
