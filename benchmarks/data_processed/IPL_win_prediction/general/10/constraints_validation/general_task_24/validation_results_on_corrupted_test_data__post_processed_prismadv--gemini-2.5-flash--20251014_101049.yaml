results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type', "Column 'match_type' should not contain
        null values")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''match_type'', [''League'', ''Elimination Final'',
        ''Eliminator'', ''Qualifier 2'', ''Final'', ''Semi Final'', ''Qualifier 1''],
        lambda x: x == 1.0, "Column ''match_type'' values must be from the expected
        categories")'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`match_type` = ''League''", "At least one League match
        is required", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.hasCompleteness("target_overs", lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMin("target_overs", lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', assertion=lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''result_margin'', assertion=lambda
        x: x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not
        meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN result_margin IS NOT
        NULL ELSE TRUE END", "result_margin_not_null_for_runs_result", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete("season")
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x >=
        0.99)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: '.satisfies("result NOT IN (''runs'', ''wickets'') OR (winner IS
        NOT NULL AND (winner = team1 OR winner = team2))", "Winner must be valid for
        runs/wickets results", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("result NOT IN (''runs'', ''wickets'')
        OR (winner IS NOT NULL AND (winner = team1 OR winner = team2))", "Winner must
        be valid for runs/wickets results", lambda x: x == 1.0)'' failed on data sample:
        Value: 0.553133514986376 does not meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isContainedIn("result", ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["match_type","result","result_margin","season","target_overs","target_runs","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN (result = ''runs'' OR result = ''wickets'')
        THEN (winner IS NOT NULL AND (winner = team1 OR winner = team2)) ELSE TRUE
        END", "Winner must be one of the teams for definitive results", lambda x:
        x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN (result = ''runs'' OR
        result = ''wickets'') THEN (winner IS NOT NULL AND (winner = team1 OR winner
        = team2)) ELSE TRUE END", "Winner must be one of the teams for definitive
        results", lambda x: x == 1.0)'' failed on data sample: Value: 0.553133514986376
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("team1 <> team2", "Teams playing a match must be distinct",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("team1 <> team2", "Teams playing
        a match must be distinct", lambda x: x == 1.0)'' failed on data sample: Value:
        0.9073569482288828 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN (result_margin IS
        NOT NULL AND result_margin > 0) ELSE TRUE END", "Result margin must be positive
        and non-null for ''runs'' results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''tie'' THEN (result_margin IS NULL
        OR result_margin = 0) ELSE TRUE END", "Result margin must be null or zero
        for ''tie'' results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN (result = ''runs'' OR result = ''wickets'')
        THEN target_runs IS NOT NULL ELSE TRUE END", "Target runs must be non-null
        for definitive results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","target_runs","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`target_runs` IS NOT
        NULL)", "Target Runs Not Null for Valid Results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`result` != ''runs'') OR (`result_margin` IS NOT NULL)",
        "Result Margin Not Null for ''runs'' result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("((`result` != ''runs'') AND (`result` != ''wickets''))
        OR (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`))",
        "Winner Valid for Definitive Results", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("((`result` != ''runs'') AND (`result`
        != ''wickets'')) OR (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner`
        = `team2`))", "Winner Valid for Definitive Results", lambda x: x == 1.0)''
        failed on data sample: Value: 0.553133514986376 does not meet the constraint
        requirement!'
      level: error
  '["result_margin","season","target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN CASE WHEN result_margin
        IS NOT NULL AND result_margin > 0 AND result_margin <= (target_runs - 1) THEN
        1 ELSE 0 END ELSE 1 END", "result_margin_valid_for_runs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN CASE
        WHEN winner IS NOT NULL AND (winner = team1 OR winner = team2) THEN 1 ELSE
        0 END ELSE 1 END", "winner_consistent_with_teams_and_result", lambda x: x
        == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN result IN (''runs'', ''wickets'')
        THEN CASE WHEN winner IS NOT NULL AND (winner = team1 OR winner = team2) THEN
        1 ELSE 0 END ELSE 1 END", "winner_consistent_with_teams_and_result", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.553133514986376 does not meet
        the constraint requirement!'
      level: error
