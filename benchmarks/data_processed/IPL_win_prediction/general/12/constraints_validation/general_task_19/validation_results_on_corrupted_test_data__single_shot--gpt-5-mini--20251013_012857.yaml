results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isUnique('id')
      status: false
      reason_if_failed: 'Constraint ''.isUnique(''id'')'' failed on data sample: Value:
        0.9182561307901907 does not meet the constraint requirement!'
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('match_type', ['League','Final','Qualifier 1','Qualifier
        2','Eliminator','Semi Final','Elimination Final'])
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies("method IS NULL OR method != 'D/L' OR (target_runs IS
        NOT NULL AND target_overs IS NOT NULL AND target_overs > 0)", 'dls_target_valid')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs','wickets','tie','no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("result NOT IN ('runs','wickets') OR result_margin >=
        0", 'result_margin_non_negative')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("result NOT IN ('runs','wickets') OR result_margin IS
        NOT NULL", 'result_margin_consistency')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("date IS NULL OR season = year(date)", 'season_date_alignment')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .satisfies("super_over != 'Y' OR result = 'tie'", 'super_over_implies_tie')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team1_team2:
    code:
    - suggestion: .satisfies('team1 IS NOT NULL AND team2 IS NOT NULL AND team1 !=
        team2', 'teams_different')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['field','bat'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("result = 'no result' OR (winner IS NOT NULL AND (winner
        = team1 OR winner = team2))", 'winner_present_and_valid')
      status: true
      reason_if_failed: ''
      level: error
