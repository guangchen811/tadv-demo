results:
  team1:
    code:
    - suggestion: '.satisfies("(`match_type` != ''League'') OR (`team1` <> `team2`)",
        "League matches must be between two distinct teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`match_type` != ''League'') OR (`result` = ''no result'')
        OR ((`winner` = `team1`) OR (`winner` = `team2`))", "Winner must be one of
        the teams when result is decided", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`match_type` != ''League'') OR (length(trim(`team1`))
        > 0)", "team1 non-empty for League matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`match_type` != ''League'') OR (trim(`team1`) = `team1`)",
        "team1 has no leading/trailing whitespace", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .areComplete(["team1", "team2"])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("length(trim(`team2`)) > 0", "team2 not blank")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("`team1` <> `team2`", "teams must be distinct per match")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("(`result` = 'no result') OR (`winner` IN (`team1`, `team2`))",
        "winner must be one of the two teams when result is decisive")
      status: true
      reason_if_failed: ''
      level: warning
  match_type:
    code:
    - suggestion: '.satisfies("`match_type` = ''League''", "has_league_rows", lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn('match_type', ['Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: '.isContainedIn(''super_over'', [''Y'', ''N''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("((`result` = ''tie'' AND `super_over` = ''Y'') OR (`result`
        <> ''tie'' AND `super_over` = ''N''))", "tie_vs_super_over_consistency", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.satisfies("((`match_type` <> ''League'') OR ((`result` = ''tie''
        AND `super_over` = ''Y'') OR (`result` <> ''tie'' AND `super_over` = ''N'')))",
        "super_over_tie_consistency_in_league_matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR (to_timestamp(`date`)
        IS NOT NULL)", "date parseable for League rows", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["date","season"]':
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''season BETWEEN 2000 AND 2100'', ''season_is_calendar_year'',
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''to_timestamp(date) IS NOT NULL'', ''date_parseable_to_timestamp'',
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: '.satisfies(''`season` BETWEEN 1800 AND 2200'', ''season_is_plausible_calendar_year'',
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: '.satisfies(''NOT(match_type = \''League\'') OR id IS NOT NULL'',
        ''id_not_null_for_league'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isPositive(''id'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["date","id","match_type","result","season","super_over","team1","team2","winner"]':
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''id''], lambda u: u == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''hasUniqueness([''id''], lambda u: u == 1.0)''
        failed on data sample: Value: 0.9182561307901907 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.isContainedIn(''super_over'', [''Y'', ''N''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("((result <> ''no result'' AND winner IS NOT NULL AND
        (winner = team1 OR winner = team2)) OR (result = ''no result'' AND winner
        IS NULL))", "winner_consistent_with_result_and_teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result = ''tie'' AND super_over = ''Y'') OR (result
        <> ''tie'' AND super_over = ''N'')", "tie_super_over_consistency", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "teams_must_be_distinct", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .areComplete(['team1', 'team2', 'match_type', 'season'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''match_type'', [''League'', ''Qualifier 1'', ''Qualifier
        2'', ''Eliminator'', ''Elimination Final'', ''Semi Final'', ''Final''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''date'', ''^\\d{4}-\\d{2}-\\d{2}$'', lambda x: x >=
        0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","winner"]':
    code:
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("((`result` = ''no result'' AND `winner` IS NULL) OR
        (`result` <> ''no result'' AND `winner` IS NOT NULL AND (`winner` = `team1`
        OR `winner` = `team2`)))", "winner-consistent-with-result-and-teams", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("((`result` = ''tie'' AND `super_over` = ''Y'') OR (`result`
        <> ''tie'' AND (`super_over` IS NULL OR `super_over` <> ''Y'')))", "tie-superover-consistency",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR (`result` = ''no result'')
        OR ((`winner` = `team1`) OR (`winner` = `team2`))", "winner_in_participating_teams_when_decided",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR (`result` <> ''no result'')
        OR (`winner` IS NULL)", "winner_null_for_no_result_league_matches", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("winner", lambda c: c >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("result", ["runs", "wickets", "tie", "no result"])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`result` = ''tie'' AND `super_over` = ''Y'') OR (`result`
        <> ''tie'' AND (`super_over` IS NULL OR `super_over` <> ''Y''))", "tie_super_over_consistency",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN `winner` IS
        NULL ELSE TRUE END", "nr_has_no_winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN (`winner`
        = `team1` OR `winner` = `team2`) ELSE TRUE END", "result_implies_valid_winner",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .areComplete(['team1', 'team2', 'result'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 <> team2", "teams must be distinct per match",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result = ''no result'' AND (winner IS NULL OR winner
        = '''')) OR (result <> ''no result'' AND (winner = team1 OR winner = team2))",
        "winner consistent with result and teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(result <> ''tie'') OR (super_over = ''Y'')", "tie
        implies super over", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(super_over <> ''Y'') OR (result = ''tie'')", "super
        over implies tie", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["match_type","result","season","super_over","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("((`result` = ''no result'' AND `winner` IS NULL) OR
        (`result` <> ''no result'' AND (`winner` = `team1` OR `winner` = `team2`)))",
        ''winner_valid_when_decided'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("((`result` = ''tie'' AND `super_over` = ''Y'') OR (`result`
        <> ''tie'' AND `super_over` = ''N''))", ''tie_super_over_consistency'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`team1` IS NOT NULL AND `team2` IS NOT NULL AND `team1`
        <> `team2`'', ''distinct_opponents'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`match_type` = ''League''", ''has_league_rows'', lambda
        r: r > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''match_type'', [''League'', ''Qualifier 1'', ''Qualifier
        2'', ''Final'', ''Eliminator'', ''Semi Final'', ''Elimination Final''], lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over","winner"]':
    code:
    - suggestion: '.satisfies("( (result = ''tie'' AND super_over = ''Y'') OR (result
        IN (''runs'',''wickets'',''no result'') AND super_over = ''N'') )", "tie_super_over_consistency",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("( (result = ''no result'' AND winner IS NULL) OR (result
        <> ''no result'' AND winner IS NOT NULL AND (winner = team1 OR winner = team2))
        )", "winner_presence_and_membership", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("NOT (`match_type` = ''League'') OR (`team1` <> `team2`)",
        "League rows have distinct teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`match_type` = ''League'') OR (`result` = ''no
        result'' OR `winner` = `team1` OR `winner` = `team2`)", "Winner must be one
        of the two teams unless no result", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`match_type` = ''League'') OR (length(trim(`team1`))
        > 0 AND length(trim(`team2`)) > 0)", "Team names are non-empty when trimmed",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
