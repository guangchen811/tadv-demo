results:
  team1:
    code:
    - suggestion: '.satisfies(''LENGTH(TRIM(`team1`)) = LENGTH(`team1`) AND LENGTH(TRIM(`team1`))
        > 0'', ''team1_trim_non_empty'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `result` != \''no result\'' THEN CASE WHEN
        `winner` = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END ELSE 1 END'', ''winner_in_teams'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.satisfies(''CASE WHEN length(trim(team2)) > 0 THEN 1 ELSE 0 END'',
        ''team2_non_empty'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN trim(team2) = team2 THEN 1 ELSE 0 END'',
        ''team2_trimmed'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result <> ''no result'' AND team1 = team2
        THEN 0 ELSE 1 END", ''teams_distinct_for_played'', lambda x: x >= 0.995)'
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.satisfies("CASE WHEN `player_of_match` IS NOT NULL THEN 1 ELSE
        0 END", "player_of_match_not_null_fraction", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN `player_of_match`
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "super_over_rows_have_pom", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN CASE WHEN `player_of_match`
        IS NULL THEN 1 ELSE 0 END ELSE 1 END", "no_result_rows_have_no_pom", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `player_of_match` IS NULL OR TRIM(`player_of_match`)
        = `player_of_match` THEN 1 ELSE 0 END", "player_of_match_trimmed_no_extra_whitespace",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasDistinctness([''player_of_match''], lambda x: x <= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE
        WHEN `result_margin` IS NOT NULL AND floor(`result_margin`) = `result_margin`
        THEN 1 ELSE 0 END ELSE 1 END", "integer_margin_for_runs_or_wickets", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN CASE WHEN `result_margin`
        > 0 THEN 1 ELSE 0 END WHEN `result` = ''wickets'' THEN CASE WHEN `result_margin`
        BETWEEN 1 AND 10 THEN 1 ELSE 0 END ELSE 1 END", "valid_margin_ranges", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'',''no result'') THEN
        CASE WHEN `result_margin` IS NULL THEN 1 ELSE 0 END ELSE 1 END", "null_margin_for_tie_or_no_result",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.hasPattern("super_over", "^(Y|N)$", lambda x: x == 1.0, name="super_over_pattern")'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`result` = ''no result'' OR `toss_winner` = `team1`
        OR `toss_winner` = `team2`", "toss_winner is participating team for played
        matches", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN to_timestamp(`date`) IS NOT NULL THEN 1
        ELSE 0 END'', ''date_parseable'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''date'', r''^\d{4}-\d{2}-\d{2}$'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN `city`
        IS NOT NULL AND trim(`city`) <> '''' THEN 1 ELSE 0 END ELSE 1 END", "super_over_city_present",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `city` IS NULL OR trim(`city`) = '''' THEN
        0 WHEN trim(`city`) RLIKE ''^[0-9]+$'' THEN 0 ELSE 1 END", "city_is_text_and_not_pure_numeric",
        lambda x: x >= 0.9872727272727273)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `city` IS NULL OR trim(`city`)
        = '''' THEN 0 WHEN trim(`city`) RLIKE ''^[0-9]+$'' THEN 0 ELSE 1 END", "city_is_text_and_not_pure_numeric",
        lambda x: x >= 0.9872727272727273)'' failed on data sample: Value: 0.9836512261580381
        does not meet the constraint requirement!'
      level: warning
  id:
    code:
    - suggestion: .isUnique('id')
      status: false
      reason_if_failed: 'Constraint ''isUnique(''id'')'' failed on data sample: Value:
        0.9182561307901907 does not meet the constraint requirement!'
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN CASE WHEN
        `winner` = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END ELSE 1 END", "winner_is_one_of_teams_for_played_matches",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL THEN 1 ELSE CASE WHEN `winner`
        = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END END", "winner_matches_team_columns_fraction",
        lambda x: x >= 0.995)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("winner", lambda x: x >= 0.995)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("winner", lambda x: x >= 0.995)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `winner` IS NULL THEN 1 ELSE CASE WHEN `winner`
        NOT IN (''no result'',''tie'') THEN 1 ELSE 0 END END", "winner_not_result_token",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''result'', [''runs'',''wickets'',''tie'',''no result''],
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE
        WHEN `result_margin` IS NOT NULL AND TRY_CAST(`result_margin` AS INT) IS NOT
        NULL THEN 1 ELSE 0 END ELSE 1 END", "margin_present_and_integer_for_run_or_wicket_results",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'',''no result'') THEN
        CASE WHEN `result_margin` IS NULL THEN 1 ELSE 0 END ELSE 1 END", "margin_null_for_tie_or_no_result",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN CASE WHEN
        `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN 1
        ELSE 0 END ELSE 1 END", "winner_is_one_of_teams_for_played_matches", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN 1 WHEN winner
        IS NOT NULL AND (winner = team1 OR winner = team2) THEN 1 ELSE 0 END", "Winner
        must be non-null and equal to team1 or team2 for played matches", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'',''wickets'') AND cast(result_margin
        AS int) IS NOT NULL THEN 1 WHEN result IN (''tie'',''no result'') AND result_margin
        IS NULL THEN 1 WHEN result NOT IN (''runs'',''wickets'',''tie'',''no result'')
        THEN 1 ELSE 0 END", "result_margin must be numeric for ''runs''/''wickets''
        and null for ''tie''/''no result''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result != ''no result'' AND toss_winner IS
        NOT NULL AND (toss_winner = team1 OR toss_winner = team2) THEN 1 WHEN NOT
        (result != ''no result'' AND toss_winner IS NOT NULL) THEN 1 ELSE 0 END",
        "When present for played matches, toss_winner must equal team1 or team2",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN team1 IS NOT NULL AND team2 IS NOT NULL AND
        team1 != team2 THEN 1 ELSE 0 END", "team1 and team2 must be non-null and distinct
        for every row", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN 1 WHEN season
        IS NOT NULL THEN 1 ELSE 0 END", "Played matches (result != ''no result'')
        must have a non-null season", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
