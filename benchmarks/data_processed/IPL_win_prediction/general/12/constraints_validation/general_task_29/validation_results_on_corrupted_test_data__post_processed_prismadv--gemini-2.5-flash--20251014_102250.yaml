results:
  team1:
    code:
    - suggestion: '.hasMinLength("team1", lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: '.hasCompleteness("team2", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN 1 WHEN winner
        = team1 OR winner = team2 THEN 1 ELSE 0 END", "Winner must be one of the playing
        teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' THEN 1 WHEN team1
        != team2 THEN 1 ELSE 0 END", "Teams in a match must be distinct", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.hasCompleteness("player_of_match", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("player_of_match", lambda x:
        x >= 0.99)'' failed on data sample: Value: 0.989100817438692 does not meet
        the constraint requirement!'
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN CAST(result_margin
        AS INT) = result_margin ELSE TRUE END", "Result margin must be a whole number
        when result is runs or wickets", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''tie'', ''no result'') THEN result_margin
        IS NULL ELSE TRUE END", "Result margin must be null when result is tie or
        no result", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isContainedIn("super_over", ["Y", "N"])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .satisfies(columnCondition="`toss_winner` = `team1` OR `toss_winner`
        = `team2`", constraintName="Toss winner is one of the playing teams")
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.satisfies("TRY_CAST(date AS DATE) IS NOT NULL", "Date values are
        parsable", lambda x: x > 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete("date")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern("date", "^\\d{4}-\\d{2}-\\d{2}$", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  '["city","date","id","player_of_match","season","super_over","team1","team2","venue","winner"]':
    code:
    - suggestion: .satisfies("winner IS NULL OR result = 'no result' OR winner = team1
        OR winner = team2", "Winner must be one of the participating teams")
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete("id")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("id")
      status: false
      reason_if_failed: 'Constraint ''isUnique("id")'' failed on data sample: Value:
        0.9182561307901907 does not meet the constraint requirement!'
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies("winner = team1 OR winner = team2", "Winner must be
        one of the playing teams", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("winner = team1 OR winner = team2",
        "Winner must be one of the playing teams", lambda x: x >= 0.99)'' failed on
        data sample: Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "Toss
        winner must be one of the playing teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  venue:
    code:
    - suggestion: .isComplete(column='venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN result != ''no result'' THEN CASE WHEN winner
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner not null for played matches",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result != ''no result'' AND winner IS NOT
        NULL THEN CASE WHEN winner = team1 OR winner = team2 THEN 1 ELSE 0 END ELSE
        1 END", "Winner is one of the participating teams", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: '.isContainedIn(''result'', [''tie'', ''runs'', ''wickets'', ''no
        result''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["player_of_match","season"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN (`winner`
        = `team1` OR `winner` = `team2`) ELSE TRUE END", "Winner must be team1 or
        team2", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: '.satisfies("CASE WHEN (result = ''runs'' OR result = ''wickets'')
        AND NOT (winner = team1 OR winner = team2) THEN 0 ELSE 1 END", "Winner must
        be one of team1 or team2 for matches with a definite winner (runs or wickets).",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (result != ''no result'') AND NOT (toss_winner
        = team1 OR toss_winner = team2) THEN 0 ELSE 1 END", "Toss winner must be one
        of team1 or team2 for played matches.", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (result = ''runs'' OR result = ''wickets'')
        AND (CAST(result_margin AS BIGINT) IS NULL) THEN 0 ELSE 1 END", "Result margin
        must be convertible to integer for ''runs'' or ''wickets'' results", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (result = ''tie'' OR result = ''no result'')
        AND (result_margin IS NOT NULL) THEN 0 ELSE 1 END", "Result margin must be
        null for ''tie'' or ''no result'' results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","season","team1","team2","winner"]':
    code:
    - suggestion: .satisfies("(result = 'no result') OR (winner IS NOT NULL AND (winner
        = team1 OR winner = team2))", "Winner must be one of the playing teams")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("team1 != team2", "Team1 and Team2 must be distinct")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN result IN ('runs', 'wickets') THEN result_margin
        IS NOT NULL AND CAST(result_margin AS INT) IS NOT NULL ELSE TRUE END", "Result
        margin must be present for 'runs' or 'wickets' results")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN result IN ('tie', 'no result') THEN result_margin
        IS NULL ELSE TRUE END", "Result margin must be null for 'tie' or 'no result'
        results")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result = 'no result') OR toss_winner IS NOT NULL",
        "Toss winner must be recorded for played matches")
      status: true
      reason_if_failed: ''
      level: error
  '["season","super_over"]':
    code:
    - suggestion: '.satisfies("result != ''no result'' AND NOT (winner = team1 OR
        winner = team2)", "Winner must be one of the playing teams in played matches",
        lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 = team2", "Participating teams must be distinct",
        lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (toss_winner = team1 OR toss_winner = team2)",
        "Toss winner must be one of the playing teams", lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
  '["season","toss_winner","winner"]':
    code:
    - suggestion: '.satisfies("`winner` = `team1` OR `winner` = `team2`", "Winner
        is one of participating teams", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`winner` = `team1` OR `winner` =
        `team2`", "Winner is one of participating teams", lambda x: x >= 0.99)'' failed
        on data sample: Value: 0.989100817438692 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` != ''no result'' THEN `winner` IS
        NOT NULL ELSE TRUE END", "Winner not null for played matches", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss winner is one of participating teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`winner` = `team1` OR
        `winner` = `team2`)", "Winner must be participating team", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`toss_winner` = `team1`
        OR `toss_winner` = `team2`)", "Toss winner must be participating team", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("result = ''no result'' OR (winner = team1 OR winner
        = team2)", "Winner must be one of the teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 != team2", "Teams in a match must be distinct",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("result = ''no result'' OR (toss_winner = team1 OR toss_winner
        = team2)", "Toss winner must be one of the teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
