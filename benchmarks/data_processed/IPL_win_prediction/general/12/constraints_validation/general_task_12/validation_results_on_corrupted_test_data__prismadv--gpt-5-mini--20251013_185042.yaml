results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `team1` <> `team2` THEN 1 ELSE 0 END", "team1_diff_from_team2",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRIM(`team1`) = `team1` THEN 1 ELSE 0 END",
        "team1_trimmed", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `team2` != `team1` THEN 1 ELSE 0 END", "team1
        != team2", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(`team2`) = `team2` THEN 1 ELSE 0 END",
        "team2 trimmed (no leading/trailing whitespace)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN length(`team2`) > 0 THEN 1 ELSE 0 END", "team2
        non-empty", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  player_of_match:
    code:
    - suggestion: '.satisfies("CASE WHEN `player_of_match` IS NOT NULL THEN 1 ELSE
        0 END", "player_of_match_not_null_frac", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `player_of_match` IS NOT
        NULL THEN 1 ELSE 0 END", "player_of_match_not_null_frac", lambda x: x >= 0.99)''
        failed on data sample: Value: 0.989100817438692 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `player_of_match` IS NULL THEN 1 WHEN TRIM(COALESCE(`player_of_match`,
        '''')) != '''' THEN 1 ELSE 0 END", "player_of_match_non_empty_when_present",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `player_of_match` = ''NullValue'' THEN 0
        ELSE 1 END", "no_literal_NullValue", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `player_of_match` IS NULL THEN 1 WHEN typeof(`player_of_match`)
        = ''string'' THEN 1 ELSE 0 END", "player_of_match_is_string_or_null", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`target_overs` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "target_overs_parseable_as_double", lambda x: x >=
        0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("target_overs", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_overs` IS NULL OR (`target_overs`
        >= 0 AND `target_overs` = `target_overs`) THEN 1 ELSE 0 END", "target_overs_non_negative_and_finite",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `target_overs` IS NULL OR `target_overs`
        <= 100 THEN 1 ELSE 0 END", "target_overs_reasonable_upper_bound", lambda x:
        x >= 0.999)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result_margin` IS NULL OR TRY_CAST(`result_margin`
        AS double) IS NOT NULL THEN 1 ELSE 0 END", "result_margin_numeric_or_null",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN (CASE
        WHEN `result_margin` IS NOT NULL AND TRY_CAST(`result_margin` AS double) IS
        NOT NULL THEN 1 ELSE 0 END) ELSE 1 END", "decided_matches_require_margin",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''runs'' THEN (CASE WHEN `result_margin`
        IS NOT NULL AND TRY_CAST(`result_margin` AS double) IS NOT NULL AND floor(TRY_CAST(`result_margin`
        AS double)) = TRY_CAST(`result_margin` AS double) AND TRY_CAST(`result_margin`
        AS double) >= 1 THEN 1 ELSE 0 END) ELSE 1 END", "runs_margin_integer_at_least_1",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN (CASE WHEN `result_margin`
        IS NOT NULL AND TRY_CAST(`result_margin` AS double) IS NOT NULL AND floor(TRY_CAST(`result_margin`
        AS double)) = TRY_CAST(`result_margin` AS double) AND TRY_CAST(`result_margin`
        AS double) BETWEEN 1 AND 10 THEN 1 ELSE 0 END) ELSE 1 END", "wickets_margin_integer_1_to_10",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result_margin` = ''NullValue'' THEN 0 ELSE
        1 END", "no_raw_NullValue_sentinel_in_result_margin", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NULL THEN 1 WHEN `target_runs`
        >= 0 AND `target_runs` = floor(`target_runs`) THEN 1 ELSE 0 END", "target_runs
        non-negative integer when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''target_runs'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: '.satisfies("`toss_decision` is not NULL", "toss_decision_non_null",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_decision` IN (''bat'',''field'') THEN
        1 ELSE 0 END", "valid_toss_decision", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(lower(`toss_decision`)) = `toss_decision`
        THEN 1 ELSE 0 END", "toss_decision_normalized", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.satisfies("CASE WHEN `super_over` IS NOT NULL THEN 1 ELSE 0 END",
        "super_over not null", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `super_over` IN (''Y'',''N'') THEN 1 ELSE
        0 END", "Valid super_over values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN CASE WHEN `result`
        = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "super_over implies tie", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `super_over` = ''Y'' THEN 1 ELSE 0 END",
        "super_over Y proportion", lambda x: x <= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: .isComplete("toss_winner")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `toss_winner` = `team1` OR `toss_winner`
        = `team2` THEN 1 ELSE 0 END", "toss_winner_is_team1_or_team2", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(`toss_winner`) = trim(`team1`) OR trim(`toss_winner`)
        = trim(`team2`) THEN 1 ELSE 0 END", "toss_winner_trimmed_matches_team", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN REGEXP_LIKE(`date`, ''^[0-9]{4}-[0-9]{2}-[0-9]{2}$'')
        THEN 1 ELSE 0 END", "ISO YYYY-MM-DD format", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN to_date(`date`, ''yyyy-MM-dd'') IS NOT NULL
        THEN 1 ELSE 0 END", "Parsable dates (yyyy-MM-dd)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  '["bat_first_team","team1","team2","toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("toss_winner = team1 OR toss_winner = team2", "toss_winner_is_team",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("team1 <> team2", "teams_distinct", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.satisfies("CASE WHEN `method` IS NULL OR `method` = ''D/L'' THEN
        1 ELSE 0 END", "method is NULL or ''D/L''", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''D/L'' THEN CASE WHEN `target_runs`
        IS NOT NULL AND `target_overs` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END",
        "D/L rows have target_runs and target_overs", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''method'', [''D/L''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `method` = ''NullValue'' THEN 0 ELSE 1 END",
        "no literal ''NullValue'' strings remain (should be read as NULL)", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: false
      reason_if_failed: 'Constraint ''isUnique(''id'')'' failed on data sample: Value:
        0.9182561307901907 does not meet the constraint requirement!'
      level: warning
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'',''wickets'') THEN CASE
        WHEN `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`) THEN
        1 ELSE 0 END ELSE 1 END", "decided_matches_have_valid_winner", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' AND `super_over` = ''Y''
        THEN CASE WHEN `winner` IS NOT NULL AND (`winner` = `team1` OR `winner` =
        `team2`) THEN 1 ELSE 0 END ELSE 1 END", "tie_with_super_over_have_valid_winner",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN CASE WHEN `winner`
        IS NULL OR (`winner` <> `team1` AND `winner` <> `team2`) THEN 1 ELSE 0 END
        ELSE 1 END", "no_result_should_not_have_valid_winner", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' AND (`super_over` IS NULL
        OR `super_over` <> ''Y'') THEN CASE WHEN `winner` IS NULL OR (`winner` <>
        `team1` AND `winner` <> `team2`) THEN 1 ELSE 0 END ELSE 1 END", "tie_without_super_over_winner_should_be_null_or_not_team",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL THEN CASE WHEN `winner`
        = `team1` OR `winner` = `team2` THEN 1 ELSE 0 END ELSE 1 END", "winner_when_present_must_match_team1_or_team2",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''result'', [''runs'', ''wickets'', ''tie'', ''no
        result''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' THEN `super_over` IN (''Y'',''N'')
        ELSE true END", "super_over_for_ties", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
