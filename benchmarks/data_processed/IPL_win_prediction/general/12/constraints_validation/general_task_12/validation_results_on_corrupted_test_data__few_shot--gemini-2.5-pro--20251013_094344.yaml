results:
  date:
    code:
    - suggestion: .hasPattern('date', r'^\\d{4}-\\d{2}-\\d{2}$')
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''date'', r''^\\d{4}-\\d{2}-\\d{2}$'')''
        failed on data sample: Value: 0.0 does not meet the constraint requirement!'
      level: error
  id:
    code:
    - suggestion: .isUnique('id')
      status: false
      reason_if_failed: 'Constraint ''.isUnique(''id'')'' failed on data sample: Value:
        0.9182561307901907 does not meet the constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("result NOT IN ('runs', 'wickets') OR (result_margin
        IS NOT NULL AND result_margin > 0)", 'result_margin_check')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("result = 'no result' OR winner IS NOT NULL", 'winner_check')
      status: true
      reason_if_failed: ''
      level: error
