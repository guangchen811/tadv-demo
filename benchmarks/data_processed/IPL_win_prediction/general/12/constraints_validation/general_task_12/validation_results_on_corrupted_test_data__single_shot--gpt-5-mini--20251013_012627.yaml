      level: error
  target_runs:
    code:
    - suggestion: .satisfies("method != 'D/L' OR target_runs IS NOT NULL", 'dls_target_runs_when_method')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("method != ''D/L'' OR target_runs
        IS NOT NULL", ''dls_target_runs_when_method'')'' failed on data sample: Value:
        0.9945504087193461 does not meet the constraint requirement!'
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("winner = team1 OR winner = team2", 'winner_is_one_of_teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("winner = team1 OR winner = team2",
