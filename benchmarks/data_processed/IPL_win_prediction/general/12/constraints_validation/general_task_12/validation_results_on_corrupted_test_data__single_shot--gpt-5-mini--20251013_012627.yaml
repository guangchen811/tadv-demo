      reason_if_failed: 'Constraint ''.isComplete(''bat_first_team'')'' failed on
        data sample: Input data does not include column bat_first_team!'
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  final_result:
    code:
    - suggestion: .isComplete('final_result')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''final_result'')'' failed on data
        sample: Input data does not include column final_result!'
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: false
      reason_if_failed: 'Constraint ''.isUnique(''id'')'' failed on data sample: Value:
