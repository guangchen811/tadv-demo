      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .satisfies("method != 'D/L' OR target_overs IS NOT NULL", 'dls_target_overs_when_method')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("method != ''D/L'' OR target_overs
