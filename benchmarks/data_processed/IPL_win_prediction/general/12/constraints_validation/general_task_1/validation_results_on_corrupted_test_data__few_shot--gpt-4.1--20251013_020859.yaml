results:
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: false
      reason_if_failed: 'Constraint ''.isUnique(''id'')'' failed on data sample: Value:
        0.9182561307901907 does not meet the constraint requirement!'
      level: error
  match_type:
    code:
    - suggestion: .isContainedIn('match_type', ['League', 'Eliminator', 'Elimination
        Final', 'Qualifier 1', 'Qualifier 2', 'Final', 'Semi Final'])
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''result_margin'', lambda x:
        x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: error
    - suggestion: .isNonNegative('result_margin')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .isNonNegative('target_overs')
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: .isNonNegative('target_runs')
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: '.hasNumberOfDistinctValues(''team1'', lambda x: x >= 8)'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''team1'',
        lambda x: x >= 8)'': Check.hasNumberOfDistinctValues() missing 2 required
        positional arguments: ''binningUdf'' and ''maxBins'''
      level: error
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: '.hasNumberOfDistinctValues(''team2'', lambda x: x >= 8)'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''team2'',
        lambda x: x >= 8)'': Check.hasNumberOfDistinctValues() missing 2 required
        positional arguments: ''binningUdf'' and ''maxBins'''
      level: error
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x >=
        0.99)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: error
