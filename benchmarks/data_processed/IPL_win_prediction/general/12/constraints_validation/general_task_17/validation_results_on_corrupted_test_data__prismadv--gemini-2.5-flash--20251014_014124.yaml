results:
  team1:
    code:
    - suggestion: .isComplete("team1")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(team1) = team1", "team1 has no leading/trailing
        whitespace", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("NOT (result IN (''runs'', ''wickets'') AND result_margin
        IS NULL)", "result_margin not null when result is runs/wickets", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN TRY_CAST(result_margin
        AS DOUBLE) IS NOT NULL ELSE TRUE END", "result_margin is numeric when result
        is runs/wickets", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result IN (''runs'', ''wickets'') THEN result_margin
        > 0 ELSE TRUE END", "result_margin is positive when result is runs/wickets",
        assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  target_runs:
    code:
    - suggestion: '.satisfies("(`target_runs` IS NULL) OR (CAST(`target_runs` AS DOUBLE)
        IS NOT NULL)", "target_runs_is_numeric_when_present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete("toss_decision")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("LOWER(TRIM(toss_decision)) IN (''field'', ''bat'')",
        "Valid Toss Decision Categories", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete("super_over")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn("super_over", ["Y", "N"], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss winner must be one of the playing teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: '.hasCompleteness("date", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRY_CAST(date AS DATE) IS NOT NULL", "DateParseability",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: '.hasCompleteness("city", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  method:
    code:
    - suggestion: '.hasCompleteness("method", lambda completeness: completeness <
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: false
      reason_if_failed: 'Constraint ''isUnique(''id'')'' failed on data sample: Value:
        0.9182561307901907 does not meet the constraint requirement!'
      level: error
  '["date","season"]':
    code:
    - suggestion: '.hasUniqueness([''date'', ''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete(column='venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness("winner", lambda x: x < 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `winner` IS NOT NULL AND (`result` = ''runs''
        OR `result` = ''wickets'' OR `result` = ''tie'') THEN (`winner` = `team1`
        OR `winner` = `team2`) ELSE TRUE END", "Winner must be one of the playing
        teams when declared", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete("result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(LOWER(result)) IN (''runs'', ''wickets'', ''tie'',
        ''no result'')", "Valid Result Categories", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["method","result","result_margin","season","super_over","target_overs","target_runs","team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("`team1` <> `team2`", "Teams must be distinct", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`result` = ''runs'' OR `result` = ''wickets'')
        OR (`winner` IS NOT NULL AND (`winner` = `team1` OR `winner` = `team2`))",
        "Decisive result winner check", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`result` = ''tie'') OR ( (`winner` = `team1` OR
        `winner` = `team2`) AND `super_over` = ''Y'' ) OR ( (`winner` IS NULL OR (`winner`
        <> `team1` AND `winner` <> `team2`)) AND `super_over` = ''N'' )", "Tie result
        super_over check", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["method","target_overs","target_runs"]':
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN target_overs IS NOT
        NULL ELSE TRUE END", "TargetOversNotNullForDL", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin","winner"]':
    code:
    - suggestion: .satisfies("`winner` IS NULL OR `winner` = `team1` OR `winner` =
        `team2`", "Winner must be one of the participating teams (team1 or team2)
        or null")
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over","winner"]':
    code:
    - suggestion: .satisfies("CASE WHEN result = 'tie' THEN super_over = 'Y' ELSE
        super_over = 'N' END", "result_super_over_consistency")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN result IN ('runs', 'wickets') THEN winner
        IS NOT NULL AND (winner = team1 OR winner = team2) WHEN result = 'tie' THEN
        (winner IS NULL OR winner = team1 OR winner = team2) WHEN result = 'no result'
        THEN winner IS NULL ELSE TRUE END", "winner_validity_based_on_result_and_teams")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("winner IS NOT NULL AND NOT (winner = team1 OR winner
        = team2)", "Invalid Winner Not Playing Teams", lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("team1 = team2", "Teams Cannot Be Same", lambda x: x
        == 0)'
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","winner"]':
    code:
    - suggestion: '.satisfies("(`winner` IS NULL) OR (`winner` = `team1` OR `winner`
        = `team2`)", "Winner is one of the playing teams", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team1` <> `team2`", "Teams are distinct", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["toss_decision","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss Winner is a Participant", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
