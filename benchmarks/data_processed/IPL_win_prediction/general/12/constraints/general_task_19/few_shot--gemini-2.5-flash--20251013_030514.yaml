constraints:
  date:
    code:
    - - .isComplete('date')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isComplete('result_margin').when("result IN ('runs', 'wickets')")
      - Invalid
    - - .isPositive('result_margin').when("result IN ('runs', 'wickets')")
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .satisfies("NOT (super_over = 'Y' AND result <> 'tie')")
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - .isComplete('target_overs').when("method = 'D/L'")
      - Invalid
    - - .isPositive('target_overs').when("method = 'D/L'")
      - Invalid
    - - .satisfies("target_overs > 0").when("method = 'D/L'")
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .isComplete('target_runs').when("method = 'D/L'")
      - Invalid
    - - .isPositive('target_runs').when("method = 'D/L'")
      - Invalid
    assumptions: []
  team1:
    code:
    - - .satisfies("team1 <> team2")
      - Invalid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner').when("result <> 'no result'")
      - Invalid
    - - .satisfies("winner = team1 OR winner = team2").when("winner IS NOT NULL")
      - Invalid
    assumptions: []
