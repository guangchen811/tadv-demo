constraints:
  city:
    code:
    - - .isComplete('city', 0.98)
      - Invalid
    - - .isDataType('city', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  date:
    code:
    - - .isComplete('date')
      - Valid
    - - .isDataType('date', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - '.hasNumberOfDistinctValues(''match_type'', lambda x: x >= 1)'
      - Invalid
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1'])
      - Valid
    - - .isDataType('match_type', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  method:
    code:
    - - .isComplete('method', 0.02)
      - Invalid
    - - .isContainedIn('method', ['D/L'])
      - Valid
    - - .isDataType('method', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .isComplete('player_of_match', 0.99)
      - Invalid
    - - .isDataType('player_of_match', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    - - .isDataType('result', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  result_margin:
    code:
    - - .isComplete('result_margin', 0.98)
      - Invalid
    - - .isDataType('result_margin', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isDataType('season', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    - - .isDataType('super_over', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - .isComplete('target_overs', 0.99)
      - Invalid
    - - .isDataType('target_overs', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isGreaterThan('target_overs', 0.0)
      - Invalid
    assumptions: []
  target_runs:
    code:
    - - .isComplete('target_runs', 0.99)
      - Invalid
    - - .isDataType('target_runs', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isDataType('team1', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    - - .isDataType('team2', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    - - .isDataType('toss_decision', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .isDataType('toss_winner', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    - - .isDataType('umpire1', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    - - .isDataType('umpire2', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    - - .isDataType('venue', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  winner:
    code:
    - - .isComplete('winner', 0.99)
      - Invalid
    - - .isDataType('winner', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
