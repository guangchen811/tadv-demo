constraints:
  city:
    code:
    - - .hasCompleteness('city', 0.98, 'GreaterThanOrEqual')
      - Invalid
    - - .isDataType('city', 'String')
      - Invalid
    assumptions: []
  date:
    code:
    - - .hasPattern('date', '^[0-9]{4}-[0-9]{2}-[0-9]{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    - - .isDataType('date', 'String')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', 'Integral')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final', 'Eliminator', 'Qualifier
        2', 'Final', 'Semi Final', 'Qualifier 1', 'League'])
      - Valid
    - - .isDataType('match_type', 'String')
      - Invalid
    assumptions: []
  method:
    code:
    - - .hasCompleteness('method', 0.02, 'GreaterThanOrEqual')
      - Invalid
    - - .isContainedIn('method', ['D/L'], orNull=True)
      - Invalid
    - - .isDataType('method', 'String')
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .hasCompleteness('player_of_match', 0.99, 'GreaterThanOrEqual')
      - Invalid
    - - .isDataType('player_of_match', 'String')
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    - - .isDataType('result', 'String')
      - Invalid
    assumptions: []
  result_margin:
    code:
    - - .hasCompleteness('result_margin', 0.98, 'GreaterThanOrEqual')
      - Invalid
    - - .isDataType('result_margin', 'Fractional')
      - Invalid
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isDataType('season', 'Integral')
      - Invalid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    - - .isDataType('super_over', 'String')
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - .hasCompleteness('target_overs', 0.99, 'GreaterThanOrEqual')
      - Invalid
    - - .isDataType('target_overs', 'Fractional')
      - Invalid
    - - .isNonNegative('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasCompleteness('target_runs', 0.99, 'GreaterThanOrEqual')
      - Invalid
    - - .isDataType('target_runs', 'Fractional')
      - Invalid
    - - .isNonNegative('target_runs')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .isDataType('team1', 'String')
      - Invalid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    - - .isDataType('team2', 'String')
      - Invalid
    assumptions: []
  team_distinctness:
    code:
    - - .satisfies('team1 <> team2', 'Teams in a match should be distinct')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    - - .isDataType('toss_decision', 'String')
      - Invalid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .isDataType('toss_winner', 'String')
      - Invalid
    assumptions: []
  toss_winner_validity:
    code:
    - - .satisfies('toss_winner = team1 OR toss_winner = team2', 'Toss winner must
        be one of the playing teams')
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    - - .isDataType('umpire1', 'String')
      - Invalid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    - - .isDataType('umpire2', 'String')
      - Invalid
    assumptions: []
  umpires_distinctness:
    code:
    - - .satisfies('umpire1 <> umpire2', 'Umpires for a match should be distinct')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    - - .isDataType('venue', 'String')
      - Invalid
    assumptions: []
  winner:
    code:
    - - .hasCompleteness('winner', 0.99, 'GreaterThanOrEqual')
      - Invalid
    - - .isDataType('winner', 'String')
      - Invalid
    assumptions: []
  winner_validity:
    code:
    - - .satisfies("(result = 'no result') OR (winner = team1 OR winner = team2)",
        'Winner must be one of the playing teams, unless result is no result')
      - Valid
    assumptions: []
