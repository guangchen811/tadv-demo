  '["batting_first","chasing_team","team1","team2","toss_decision","toss_winner"]':
    code: []
    assumptions:
    - text: 'Per-row, the toss_winner must be one of the two competing teams (team1
        or team2). This is required because opp_of_toss and downstream logic pick
        the opponent by comparing toss_winner to team1 and otherwise using team1/team2.
        Example constraint (Deequ-style): .satisfies("toss_winner = team1 OR toss_winner
        = team2", "toss_winner_is_one_of_teams")'
      sources:
      - start_line: 37
        end_line: 39
        file: ''
      - start_line: 103
        end_line: 106
        file: ''
      uid: c50ae2ee-1339-4904-b0fd-6dd8c992021b
    - text: 'batting_first must equal toss_winner when toss_decision == ''bat'', otherwise
        batting_first must equal the other team. Actionable constraint example: .satisfies("(toss_decision
        = ''bat'' AND batting_first = toss_winner) OR (toss_decision <> ''bat'' AND
        batting_first = CASE WHEN toss_winner = team1 THEN team2 ELSE team1 END)",
        "batting_first_consistent_with_toss")'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      uid: 008174dc-3b99-4260-bfb5-d2e9854bdd0d
    - text: 'chasing_team must be the team that is not batting_first (i.e., the opponent
        of batting_first among team1/team2). Equivalently: chasing_team = CASE WHEN
        batting_first = team1 THEN team2 ELSE team1 END. Example constraint: .satisfies("chasing_team
        = CASE WHEN batting_first = team1 THEN team2 ELSE team1 END", "chasing_team_is_opponent")'
      sources:
      - start_line: 39
        end_line: 42
        file: ''
      uid: f78ca72a-d4ea-4933-a4a6-3d7cc6334379
    - text: 'When result is ''runs'' or ''wickets'', result_margin must be present
        and a positive numeric value, and winner must be one of the two teams (team1/team2).
        Example constraint: .satisfies("(result IN (''runs'',''wickets'') => result_margin
        IS NOT NULL AND CAST(result_margin AS DOUBLE) > 0 AND (winner = team1 OR winner
        = team2))", "margin_and_winner_for_completed_win")'
      sources:
      - start_line: 49
        end_line: 55
        file: ''
      - start_line: 121
        end_line: 129
        file: ''
      - start_line: 130
        end_line: 138
        file: ''
      uid: 66fdf2f7-e81d-4083-994e-a51af27f88c1
    - text: 'For matches with result == ''no result'', winner must be null (or NaN)
        because the code treats these as no-results and expects no winner when distributing
        no_results/points. Example: .satisfies("result = ''no result'' => winner IS
        NULL", "no_result_has_no_winner")'
      sources:
      - start_line: 114
        end_line: 120
        file: ''
      uid: 59c44979-52ff-4c62-bc24-a0276ce77617
    - text: 'For result == ''tie'': if super_over == ''Y'' then a winner must be present
        and must equal team1 or team2; if super_over != ''Y'' then there should be
        no winner (null). Example: .satisfies("(result = ''tie'' AND super_over =
        ''Y'') => (winner = team1 OR winner = team2) AND (result = ''tie'' AND super_over
        <> ''Y'') => winner IS NULL", "tie_super_over_winner_consistency")'
      sources:
      - start_line: 56
        end_line: 61
        file: ''
      - start_line: 139
        end_line: 147
        file: ''
      uid: 4bd27c8a-3611-4a3e-8bd3-ea7d45b1e9ae
    - text: 'When method == ''D/L'', target_overs must be a present numeric value
        (used to compute effective_overs); otherwise effective_overs defaults to 20.0.
        Example constraint: .satisfies("method = ''D/L'' => target_overs IS NOT NULL
        AND CAST(target_overs AS DOUBLE) > 0", "dl_has_target_overs")'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 45
        end_line: 45
        file: ''
      uid: e1e8360d-092a-4ca7-91fb-60489c0bb37d
    - text: 'In the assembled points table, the ''matches'' count must equal the sum
        of outcome columns (wins + losses + ties + no_results). This is an internal
        consistency requirement for the points aggregation. Example constraint: .satisfies("matches
        = wins + losses + ties + no_results", "matches_sum_of_outcomes")'
      sources:
      - start_line: 161
        end_line: 163
        file: ''
      uid: 487dd1cd-e643-4ced-b992-d4ed681052f1
