constraints:
  conditional_result_margin_completeness:
    code:
    - - .satisfies("result NOT IN ('runs', 'wickets') OR result_margin IS NOT NULL",
        'result_margin must be present for decided matches')
      - Valid
    assumptions: []
  conditional_winner_completeness:
    code:
    - - .satisfies("result NOT IN ('runs', 'wickets') OR winner IS NOT NULL", 'winner
        must be present for decided matches')
      - Valid
    assumptions: []
  id:
    code:
    - - '.hasUniqueness(''id'', lambda u: u == 1.0)'
      - Invalid
    assumptions: []
  relational_toss_winner_check:
    code:
    - - .satisfies('toss_winner = team1 OR toss_winner = team2', 'toss_winner must
        be one of the playing teams')
      - Valid
    assumptions: []
  relational_winner_check:
    code:
    - - .satisfies('winner IS NULL OR winner = team1 OR winner = team2', 'winner must
        be one of the playing teams or null')
      - Valid
    assumptions: []
  result:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .isNonNegative('result_margin')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
