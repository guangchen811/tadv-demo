constraints:
  date:
    code:
    - - .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      - Valid
    assumptions: []
  dl_targets_positive_and_within_overs:
    code:
    - - '.satisfies("CASE WHEN method = ''D/L'' THEN target_runs > 0 AND target_overs
        > 0 AND target_overs <= 20 ELSE TRUE END", ''dl_targets_valid'', lambda v:
        v == 1.0)'
      - Valid
    assumptions: []
  dl_targets_present:
    code:
    - - '.satisfies("CASE WHEN method = ''D/L'' THEN target_runs IS NOT NULL AND target_overs
        IS NOT NULL ELSE TRUE END", ''dl_requires_targets'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isPositive('id')
      - Invalid
    assumptions: []
  method_values:
    code:
    - - '.satisfies("method IS NULL OR method = ''D/L''", ''method_is_null_or_dl'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    assumptions: []
  result_margin_for_runs_wickets:
    code:
    - - '.satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        IS NOT NULL AND result_margin >= 0 ELSE TRUE END", ''margin_present_and_nonnegative_when_required'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  result_values:
    code:
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - '.satisfies("season BETWEEN 2008 AND 2024", ''season_in_expected_range'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    assumptions: []
  super_over_logic:
    code:
    - - '.satisfies("(result = ''tie'' AND super_over = ''Y'') OR (result <> ''tie''
        AND super_over = ''N'')", ''super_over_matches_tie_logic'', lambda v: v ==
        1.0)'
      - Valid
    assumptions: []
  super_over_values:
    code:
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1_vs_team2:
    code:
    - - '.satisfies(''team1 <> team2'', ''teams_are_different'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    assumptions: []
  toss_decision_values:
    code:
    - - .isContainedIn('toss_decision', ['bat', 'field'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    assumptions: []
  toss_winner_in_teams:
    code:
    - - '.satisfies("(toss_winner = team1) OR (toss_winner = team2)", ''toss_winner_is_one_of_the_teams'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner_absent_for_no_result:
    code:
    - - '.satisfies("CASE WHEN result = ''no result'' THEN winner IS NULL ELSE TRUE
        END", ''winner_absent_for_no_result'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  winner_presence_when_needed:
    code:
    - - '.satisfies("CASE WHEN result <> ''no result'' THEN winner IS NOT NULL ELSE
        TRUE END", ''winner_present_for_decided_matches'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
