raw_constraints:
- column_name: id
  code_for_constraint: .isComplete('id')
- column_name: id
  code_for_constraint: .isUnique('id')
- column_name: season
  code_for_constraint: .isComplete('season')
- column_name: date
  code_for_constraint: .isComplete('date')
- column_name: date
  code_for_constraint: .hasPattern('date', '^\d{4}-\d{2}-\d{2}$')
- column_name: city
  code_for_constraint: .isComplete('city')
- column_name: venue
  code_for_constraint: .isComplete('venue')
- column_name: team1
  code_for_constraint: .isComplete('team1')
- column_name: team2
  code_for_constraint: .isComplete('team2')
- column_name: row_level
  code_for_constraint: .satisfies('team1 <> team2', 'teams_are_different')
- column_name: toss_winner
  code_for_constraint: .isComplete('toss_winner')
- column_name: row_level
  code_for_constraint: .satisfies('(toss_winner = team1) OR (toss_winner = team2)',
    'toss_winner_in_teams')
- column_name: toss_decision
  code_for_constraint: .isContainedIn('toss_decision', ['bat', 'field'])
- column_name: result
  code_for_constraint: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
- column_name: row_level
  code_for_constraint: .satisfies("((result = 'runs' OR result = 'wickets') AND result_margin
    IS NOT NULL AND result_margin >= 0) OR (result <> 'runs' AND result <> 'wickets')",
    'result_margin_valid')
- column_name: row_level
  code_for_constraint: .satisfies("(result = 'no result' AND winner IS NULL) OR (result
    <> 'no result' AND (winner = team1 OR winner = team2))", 'winner_valid')
- column_name: super_over
  code_for_constraint: .isContainedIn('super_over', ['Y', 'N'])
- column_name: row_level
  code_for_constraint: .satisfies("(method <> 'D/L') OR (target_runs IS NOT NULL AND
    target_overs IS NOT NULL)", 'dl_targets_present')
- column_name: row_level
  code_for_constraint: .satisfies('(target_runs IS NULL) OR (target_runs >= 0)', 'target_runs_non_negative')
- column_name: row_level
  code_for_constraint: .satisfies('(target_overs IS NULL) OR (target_overs >= 0)',
    'target_overs_non_negative')
