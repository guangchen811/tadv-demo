    - text: 'The ''winner'' column should correspond to either ''team1'' or ''team2''
        for each match, except when the result is ''no result''. This ensures that
        the winner is always one of the participating teams unless the match has no
        result. We could represent this assumption as a conditional constraint in
        deequ like this: .where(''result'' != ''no result'').isContainedIn([''winner''],
        [''team1'', ''team2''])'
      sources:
      - start_line: 25
        end_line: 30
        file: ''
      uid: 9e3844bd-f4d3-4daf-a5eb-3141233b5b79
    - text: 'If a match result is ''tie'', then ''super_over'' must be ''Y''. This
        ensures that a tie in the main overs implies a super over was played. We could
        represent this assumption as a deequ constraint like this: .where(''result''
        == ''tie'').has(''super_over'', _ == ''Y'')'
      sources:
      - start_line: 27
        end_line: 33
        file: ''
      uid: c79bfa72-e569-48d9-8967-6bceff736f34
