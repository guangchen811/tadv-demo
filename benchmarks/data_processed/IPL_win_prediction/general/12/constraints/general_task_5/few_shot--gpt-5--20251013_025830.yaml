constraints:
  date:
    code:
    - - .containsPattern('date', '^[0-9]{4}-[0-9]{2}-[0-9]{2}$')
      - Invalid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['Elimination Final','Eliminator','Qualifier
        2','Final','Semi Final','Qualifier 1','League'])
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs','wickets','tie','no result'])
      - Valid
    assumptions: []
  result,super_over:
    code:
    - - .satisfies("((result = 'tie' AND super_over = 'Y') OR (result <> 'tie' AND
        super_over <> 'Y'))", 'tie_superover_consistency', ['result','super_over'])
      - Invalid
    assumptions: []
  season:
    code:
    - - '.hasMax(''season'', lambda x: x <= 2025)'
      - Valid
    - - '.hasMin(''season'', lambda x: x >= 2008)'
      - Valid
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y','N'])
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    assumptions: []
  team1,team2:
    code:
    - - .satisfies("team1 <> team2", 'teams_are_distinct', ['team1','team2'])
      - Invalid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  winner,result,team1,team2:
    code:
    - - .satisfies("((result = 'no result' AND winner IS NULL) OR (result <> 'no result'
        AND (winner = team1 OR winner = team2)))", 'winner_validity', ['result','winner','team1','team2'])
      - Invalid
    assumptions: []
