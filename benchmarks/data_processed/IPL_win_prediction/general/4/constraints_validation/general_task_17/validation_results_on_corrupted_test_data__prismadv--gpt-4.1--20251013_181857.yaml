results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN CASE WHEN target_overs
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "DL rows must have target_overs",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies("(`result` NOT IN ('runs', 'wickets')) OR (`result_margin`
        IS NOT NULL)", "Result margin must be non-null for runs/wickets results")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(`result` NOT IN ('runs', 'wickets')) OR (CAST(`result_margin`
        AS DOUBLE) IS NOT NULL)", "Result margin must be convertible to float for
        runs/wickets results")
      status: true
      reason_if_failed: ''
      level: error
  target_runs:
    code:
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN target_runs IS NOT
        NULL ELSE TRUE END", "target_runs required for D/L method", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' AND target_runs IS NOT NULL
        THEN CAST(target_runs AS DOUBLE) IS NOT NULL ELSE TRUE END", "target_runs
        numeric for D/L method", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("target_runs", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['field', 'bat'])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''toss_winner = team1 OR toss_winner = team2'', ''Toss
        Winner Must Be a Participating Team'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''toss_winner = team1 OR toss_winner
        = team2'', ''Toss Winner Must Be a Participating Team'', lambda x: x == 1.0)''
        failed on data sample: Value: 0.9019073569482289 does not meet the constraint
        requirement!'
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(to_date(`date`) AS STRING) IS NOT NULL'', ''Date
        column parseable'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  city:
    code:
    - suggestion: '.satisfies(''CASE WHEN `city` IS NULL THEN 1 ELSE 0 END'', ''Null
        city values'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN typeof(`city`) = "string" OR `city` IS NULL
        THEN 1 ELSE 0 END'', ''city type check'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies('`method` IS NULL OR `method` = "D/L"', 'Only D/L or
        NULL in method')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","id"]':
    code:
    - suggestion: '.hasUniqueness([''date'', ''id''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''id'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.satisfies(''`date` IS NOT NULL AND `season` IS NOT NULL'', ''Season
        and Date Non-null'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("winner is NULL OR winner = '' OR winner = team1 OR winner
        = team2", "Winner should be one of the teams or empty/null")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result = 'tie' AND (winner is NULL OR winner = '' OR
        winner = team1 OR winner = team2)) OR (result != 'tie')", "If result is 'tie'
        and winner present, winner must be team1 or team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("lower(trim(`result`)) IN ('runs', 'wickets', 'tie',
        'no result')", "Result values allowed")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`result`)) IN (''runs'', ''wickets'')",
        "Majority are runs/wickets", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["result","result_margin"]':
    code:
    - suggestion: .satisfies("(LOWER(TRIM(`result`)) IN ('runs', 'wickets') AND `result_margin`
        IS NOT NULL AND CAST(`result_margin` AS DOUBLE) >= 0) OR (LOWER(TRIM(`result`))
        NOT IN ('runs', 'wickets'))", "Result margin required for runs/wickets and
        must be non-negative")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(LOWER(TRIM(`result`)) NOT IN ('runs', 'wickets') AND
        `result_margin` IS NULL) OR (LOWER(TRIM(`result`)) IN ('runs', 'wickets'))",
        "Result margin should be null when result is not runs/wickets")
      status: true
      reason_if_failed: ''
      level: warning
  '["result","super_over"]':
    code:
    - suggestion: .satisfies("CASE WHEN `super_over` = 'Y' THEN `result` = 'tie' ELSE
        TRUE END", "Super Over Only For Ties")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN `result` = 'tie' THEN (`super_over` = 'Y'
        OR `super_over` = 'N') ELSE `super_over` = 'N' END", "Super Over Flag Valid
        For Result Tie")
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2"]':
    code:
    - suggestion: .satisfies('team1 IS NOT NULL AND team2 IS NOT NULL AND TRIM(team1)
        <> "" AND TRIM(team2) <> ""', 'Both teams present and non-empty')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('team1 <> team2', 'No team plays against itself')
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: .satisfies('team1 != team2', 'Team1 and Team2 are different')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'Toss winner
        is one of the teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''toss_winner = team1 OR toss_winner
        = team2'', ''Toss winner is one of the teams'')'' failed on data sample: Value:
        0.9019073569482289 does not meet the constraint requirement!'
      level: error
