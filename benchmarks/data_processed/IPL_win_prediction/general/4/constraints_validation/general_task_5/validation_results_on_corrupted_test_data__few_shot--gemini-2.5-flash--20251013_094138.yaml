results:
  date:
    code:
    - suggestion: .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isDataType('id', ConstrainableDataTypes.Integral)
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isDataType(''id'', ConstrainableDataTypes.Integral)'':
        ''Check'' object has no attribute ''isDataType'''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .hasAValue('match_type', 'League')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasAValue(''match_type'',
        ''League'')'': ''Check'' object has no attribute ''hasAValue'''
      level: error
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['wickets', 'runs', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isDataType('season', ConstrainableDataTypes.Integral)
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isDataType(''season'',
        ConstrainableDataTypes.Integral)'': ''Check'' object has no attribute ''isDataType'''
      level: error
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonEmpty('team1')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isNonEmpty(''team1'')'':
        ''Check'' object has no attribute ''isNonEmpty'''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonEmpty('team2')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isNonEmpty(''team2'')'':
        ''Check'' object has no attribute ''isNonEmpty'''
      level: error
  winner:
    code:
    - suggestion: .satisfies('winner_exists_or_no_result', 'winner IS NOT NULL OR
        result IN ("no result", "tie")')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''winner_exists_or_no_result'', ''winner
        IS NOT NULL OR result IN ("no result", "tie")'')'' failed on data sample:
        org.apache.spark.sql.AnalysisException: [UNRESOLVED_COLUMN.WITH_SUGGESTION]
        A column or function parameter with name `winner_exists_or_no_result` cannot
        be resolved. Did you mean one of the following? [`target_overs`, `target_runs`,
        `result`, `result_margin`, `super_over`].; line 1 pos 0;

