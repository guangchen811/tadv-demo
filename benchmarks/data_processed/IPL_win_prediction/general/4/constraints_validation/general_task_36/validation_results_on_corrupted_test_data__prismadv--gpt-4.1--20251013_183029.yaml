results:
  team1:
    code:
    - suggestion: '.hasCompleteness(''team1'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`team2` != `team1`', 'No self-match for team2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''team2''], lambda x: x <= 1)'
      status: true
      reason_if_failed: ''
      level: warning
  batting_first:
    code:
    - suggestion: .areComplete(['toss_winner', 'team1', 'team2', 'toss_decision'])
      status: true
      reason_if_failed: ''
      level: error
  chasing_team:
    code:
    - suggestion: .satisfies('(`toss_winner` = `team1` OR `toss_winner` = `team2`)',
        'Toss winner is one of the teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(`toss_winner` = `team1` OR `toss_winner`
        = `team2`)'', ''Toss winner is one of the teams'')'' failed on data sample:
        Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
  toss_decision:
    code:
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .satisfies('CASE WHEN method = "D/L" THEN target_overs IS NOT NULL
        ELSE TRUE END', 'target_overs required if method is D/L')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: .satisfies('CASE WHEN result IN ("runs", "wickets") THEN result_margin
        IS NOT NULL ELSE TRUE END', 'result_margin not null when required')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN result IN ("runs", "wickets") THEN CAST(result_margin
        AS DOUBLE) IS NOT NULL ELSE TRUE END', 'result_margin can be cast to numeric
        when required')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN result IN ("runs", "wickets") THEN CAST(result_margin
        AS DOUBLE) >= 0 ELSE TRUE END', 'result_margin non-negative when required')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''result_margin'', lambda x:
        x >= 0.98)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'', ''no result'') THEN
        1 ELSE 0 END", "Proportion of ''tie'' or ''no result'' should be low", lambda
        x: x <= 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
  win_by:
    code:
    - suggestion: .satisfies("(result != 'runs' AND result != 'wickets') OR (result_margin
        IS NOT NULL AND cast(result_margin as int) IS NOT NULL)", "result_margin present
        for runs/wickets")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(result != 'tie') OR (super_over IS NOT NULL)", "super_over
        present for tie")
      status: true
      reason_if_failed: ''
      level: error
  effective_overs:
    code:
    - suggestion: .isNonNegative('target_overs')
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: .isComplete('super_over')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('super_over', ['Y', 'N'])
      status: true
      reason_if_failed: ''
      level: error
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`toss_winner` = `team1` OR `toss_winner` = `team2`)',
        'Toss winner must match team1 or team2')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(`toss_winner` = `team1` OR `toss_winner`
        = `team2`)'', ''Toss winner must match team1 or team2'')'' failed on data
        sample: Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  method:
    code:
    - suggestion: .satisfies('`method` = "D/L" OR `method` IS NULL', 'method is D/L
        or null')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  '["date","id","season"]':
    code:
    - suggestion: '.hasUniqueness([''season'', ''id'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''season'', ''id'', ''date''], lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","season"]':
    code:
    - suggestion: '.haveCompleteness([''season'', ''date''], lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: .satisfies("CASE WHEN result = 'no result' THEN winner IS NULL ELSE
        TRUE END", "Winner Null For No Result")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN (result IN ('runs', 'wickets') OR (result
        = 'tie' AND super_over = 'Y')) THEN winner IS NOT NULL ELSE TRUE END", "Winner
        Present When Applicable")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CASE WHEN winner IS NOT NULL THEN (winner = team1 OR
        winner = team2) ELSE TRUE END", "Winner Is Valid Team")
      status: true
      reason_if_failed: ''
      level: error
  '["result","super_over"]':
    code:
    - suggestion: .satisfies("( (result = 'tie' AND (super_over = 'Y' OR super_over
        = 'N')) OR (result <> 'tie' AND super_over = 'N') )", "Super Over matches
        tie logic")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: .satisfies('(`toss_winner` = `team1` OR `toss_winner` = `team2`)',
        'Toss winner must be one of the teams')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(`toss_winner` = `team1` OR `toss_winner`
        = `team2`)'', ''Toss winner must be one of the teams'')'' failed on data sample:
        Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies('`team1` <> `team2`', 'Teams must be different in each
        match')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveAnyCompleteness([''team1'', ''team2'', ''toss_winner''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2","winner"]':
    code:
    - suggestion: .satisfies('team1 != team2', 'Teams must play against other teams')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('winner IS NULL OR winner = team1 OR winner = team2',
        'Winner, if present, must be one of the two teams')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('winner IS NULL OR winner IN (team1, team2)', 'Winner
        must be a team that appears as team1 or team2 in the dataset')
      status: true
      reason_if_failed: ''
      level: warning
