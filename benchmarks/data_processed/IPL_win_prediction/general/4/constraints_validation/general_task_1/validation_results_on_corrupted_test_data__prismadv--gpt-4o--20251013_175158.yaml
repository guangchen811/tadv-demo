results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.hasCompleteness(''result_margin'', lambda x: x >= 0.989)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''result_margin'', lambda x:
        x >= 0.989)'' failed on data sample: Value: 0.9782016348773842 does not meet
        the constraint requirement!'
      level: warning
  super_over:
    code:
    - suggestion: .areComplete(['super_over'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("super_over IN ('Y', 'N')", "Valid super_over values")
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('toss_winner IN (team1, team2)', 'Toss Winner Validity')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''toss_winner IN (team1, team2)'',
        ''Toss Winner Validity'')'' failed on data sample: Value: 0.9019073569482289
        does not meet the constraint requirement!'
      level: error
  '`id':
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
  date:
    code:
    - suggestion: .isComplete('date')
      status: true
      reason_if_failed: ''
      level: error
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda c: c >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda c: c >=
        0.998)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: error
  result:
    code:
    - suggestion: .isComplete('result')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IN (''tie'', ''runs'', ''wickets'',
        ''no result'') THEN 1 ELSE 0 END", "Valid Result Values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: .satisfies('result != "runs" OR result_margin > 0', 'Positive Result
        Margin for Runs')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('result != "wickets" OR result_margin > 0', 'Positive
        Result Margin for Wickets')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('result != "no result" OR result_margin IS NULL OR result_margin
        = 0', 'No Result Margin for No Result')
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies(''team1 != team2'', ''Distinct Teams'', lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''toss_winner == team1 OR toss_winner == team2'', ''Toss
        Winner Validity'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''toss_winner == team1 OR toss_winner
        == team2'', ''Toss Winner Validity'', lambda x: x == 1.0)'' failed on data
        sample: Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
