results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''length(trim(`team1`)) > 0'', ''team1 not blank'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`team1` = trim(`team1`)'', ''No leading/trailing spaces'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`team1` <> `team2`'', ''Distinct opponents'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  team2:
    code:
    - suggestion: .isComplete("team2")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("length(trim(`team2`)) > 0", "team2 non-empty after
        trim", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`toss_winner` IS NOT NULL AND (`toss_winner` = `team1`
        OR `toss_winner` = `team2`)", "toss_winner must be one of team1 or team2",
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` IS NOT NULL AND (`toss_winner`
        = `team1` OR `toss_winner` = `team2`)", "toss_winner must be one of team1
        or team2", lambda x: x == 1.0)'' failed on data sample: Value: 0.9019073569482289
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("(lower(trim(`result`)) IN (''no result'',''tie''))
        OR (`winner` = `team1` OR `winner` = `team2`)", "winner must be among teams
        for decisive results", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("trim(`team2`) = `team2`", "team2 has no leading/trailing
        spaces", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`team2` <> `team1`", "team2 must differ from team1",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  match_type:
    code:
    - suggestion: .isComplete('match_type')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''match_type'', [''League'', ''Qualifier 1'', ''Qualifier
        2'', ''Eliminator'', ''Semi Final'', ''Final'', ''Elimination Final''], lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("match_type = TRIM(match_type) AND LENGTH(TRIM(match_type))
        > 0", "Trimmed non-empty match_type", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN result_margin IS NULL OR (NOT isnan(result_margin)
        AND result_margin > -1e308 AND result_margin < 1e308) THEN 1 ELSE 0 END",
        "result_margin non-null values must be finite", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN result_margin IS NOT NULL AND NOT isnan(result_margin)
        AND result_margin > -1e308 AND result_margin < 1e308 THEN 1 ELSE 0 END", ">=95%
        result_margin parseable as finite numbers", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result_margin IS NULL THEN 1 WHEN (NOT isnan(result_margin)
        AND result_margin > -1e308 AND result_margin < 1e308) THEN CASE WHEN result_margin
        >= 0 THEN 1 ELSE 0 END ELSE 1 END", "Numeric result_margin values should be
        non-negative", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) = ''runs'' AND winner
        IS NOT NULL AND trim(winner) <> '''' THEN CASE WHEN result_margin IS NOT NULL
        AND NOT isnan(result_margin) AND result_margin > -1e308 AND result_margin
        < 1e308 AND result_margin > 0 THEN 1 ELSE 0 END ELSE 1 END", "Runs-decided
        matches with a winner must have positive margin", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) = ''wickets'' AND winner
        IS NOT NULL AND trim(winner) <> '''' THEN CASE WHEN result_margin IS NOT NULL
        AND NOT isnan(result_margin) AND result_margin > -1e308 AND result_margin
        < 1e308 AND result_margin > 0 THEN 1 ELSE 0 END ELSE 1 END", "Wickets-decided
        matches with a winner must have positive margin", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result_margin IS NOT NULL AND NOT isnan(result_margin)
        AND result_margin > -1e308 AND result_margin < 1e308 THEN CASE WHEN abs(result_margin
        - round(result_margin)) < 0.5 THEN 1 ELSE 0 END ELSE 1 END", ">=99% of numeric
        result_margin values are integer-like", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`toss_decision`)) IN (''bat'',''field'')",
        "Valid toss decisions", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("length(trim(`toss_decision`)) > 0 AND lower(trim(`toss_decision`))
        <> ''nan''", "Non-empty toss decisions", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  super_over:
    code:
    - suggestion: '.satisfies("CASE WHEN upper(trim(CAST(super_over AS STRING))) IN
        (''Y'',''N'') THEN 1 ELSE 0 END", "super_over in {Y,N}", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete("super_over")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN upper(trim(CAST(super_over AS STRING))) =
        ''Y'' THEN lower(trim(CAST(result AS STRING))) = ''tie'' ELSE TRUE END", "Y
        only when tie", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`toss_winner` = `team1`) OR (`toss_winner` = `team2`)'',
        ''Toss winner must be one of the two teams'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(`toss_winner` = `team1`) OR (`toss_winner`
        = `team2`)'', ''Toss winner must be one of the two teams'', lambda x: x ==
        1.0)'' failed on data sample: Value: 0.9019073569482289 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''`toss_winner` = TRIM(`toss_winner`)'', ''toss_winner
        trimmed (no leading/trailing whitespace)'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''((`toss_winner` = `team1`) AND (`toss_winner` <> `team2`))
        OR ((`toss_winner` = `team2`) AND (`toss_winner` <> `team1`))'', ''Unique
        toss winner among participants (XOR)'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''((`toss_winner` = `team1`) AND
        (`toss_winner` <> `team2`)) OR ((`toss_winner` = `team2`) AND (`toss_winner`
        <> `team1`))'', ''Unique toss winner among participants (XOR)'', lambda x:
        x == 1.0)'' failed on data sample: Value: 0.9019073569482289 does not meet
        the constraint requirement!'
      level: warning
  method:
    code:
    - suggestion: '.hasCompleteness(''method'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method IS NULL OR method IN (''D/L'') THEN
        1 ELSE 0 END", "Method values in expected set or null", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: '.hasCompleteness(''id'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  winner:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(result)) IN (''runs'',''wickets'')
        OR (lower(trim(result)) = ''tie'' AND upper(trim(super_over)) = ''Y'') THEN
        CASE WHEN winner IS NOT NULL AND (winner = team1 OR winner = team2) THEN 1
        ELSE 0 END ELSE 1 END", "Winner present and valid for decisive outcomes",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NULL THEN 1 ELSE CASE WHEN (winner
        = team1 OR winner = team2) THEN 1 ELSE 0 END END", "Winner must be one of
        the two teams when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN winner IS NULL THEN 1 ELSE CASE WHEN winner
        = trim(winner) THEN 1 ELSE 0 END END", "Winner has no leading/trailing whitespace",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  result:
    code:
    - suggestion: '.satisfies("lower(trim(`result`)) IN (''runs'',''wickets'',''tie'',''no
        result'')", "Valid result categories", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("result", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) IN (''runs'',''wickets'')
        THEN CAST(`result_margin` AS DOUBLE) IS NOT NULL ELSE TRUE END", "Margin present
        when result implies margin", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`result`)) = ''tie'' THEN upper(trim(`super_over`))
        IN (''Y'',''N'') ELSE TRUE END", "Super over flag defined for ties", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["method","result"]':
    code:
    - suggestion: '.satisfies("CASE WHEN (result IN (''runs'',''wickets'')) OR (result
        = ''tie'' AND super_over = ''Y'') THEN (winner = team1 OR winner = team2)
        WHEN (result = ''no result'') OR (result = ''tie'' AND (super_over <> ''Y''
        OR super_over IS NULL)) THEN (winner IS NULL OR (winner <> team1 AND winner
        <> team2)) ELSE true END", ''winner_consistent_with_outcome'', lambda d: d
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(toss_winner = team1 OR toss_winner = team2)", ''toss_winner_is_participant'',
        lambda d: d == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(toss_winner = team1 OR toss_winner
        = team2)", ''toss_winner_is_participant'', lambda d: d == 1.0)'' failed on
        data sample: Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN (toss_winner = team1 OR toss_winner = team2)
        THEN (toss_decision IS NOT NULL AND lower(trim(toss_decision)) IN (''bat'',''field''))
        ELSE true END", ''toss_decision_present_for_winner'', lambda d: d == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''runs'' THEN result_margin IS NOT
        NULL AND CAST(result_margin AS DOUBLE) > 0 WHEN result = ''wickets'' THEN
        result_margin IS NOT NULL AND CAST(result_margin AS INT) BETWEEN 1 AND 10
        WHEN result = ''no result'' OR (result = ''tie'' AND (super_over <> ''Y''
        OR super_over IS NULL)) THEN result_margin IS NULL ELSE true END", ''result_margin_consistent'',
        lambda d: d == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN result IN (''runs'',''wickets'')
        ELSE true END", ''dl_requires_decided_result'', lambda d: d == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN method = ''D/L'' THEN result_margin IS NOT
        NULL ELSE true END", ''dl_requires_margin'', lambda d: d == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''no result'' OR (result = ''tie''
        AND (super_over <> ''Y'' OR super_over IS NULL)) THEN method IS NULL ELSE
        true END", ''noresult_or_plain_tie_has_no_method'', lambda d: d == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN result = ''tie'' AND super_over = ''Y'' THEN
        (winner = team1 OR winner = team2) WHEN result = ''tie'' AND (super_over <>
        ''Y'' OR super_over IS NULL) THEN winner IS NULL ELSE true END", ''tie_super_over_consistency'',
        lambda d: d == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("`team1` != `team2`", "Team1 and Team2 must be different
        in each row", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`toss_winner` = `team1`) OR (`toss_winner` = `team2`)",
        "Toss winner must be either team1 or team2", lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(`toss_winner` = `team1`) OR (`toss_winner`
        = `team2`)", "Toss winner must be either team1 or team2", lambda v: v == 1.0)''
        failed on data sample: Value: 0.9019073569482289 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.satisfies("NOT ((lower(`result`) <> ''no result'') AND NOT (lower(`result`)
        = ''tie'' AND upper(`super_over`) <> ''Y'')) OR ((`winner` = `team1`) OR (`winner`
        = `team2`))", "Decisive result must have a winner among the two teams", lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (lower(`result`) = ''tie'' AND upper(`super_over`)
        <> ''Y'') OR (`winner` IS NULL OR trim(`winner`) = '''' OR ((`winner` <> `team1`)
        AND (`winner` <> `team2`)))", "Tie without Super Over should not have a winner
        from the two teams", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
