results:
  team1:
    code:
    - suggestion: .isComplete('team1')
      status: true
      reason_if_failed: ''
      level: error
  team2:
    code:
    - suggestion: .isComplete('team2')
      status: true
      reason_if_failed: ''
      level: error
  target_overs:
    code:
    - suggestion: .satisfies("CASE WHEN `method` = 'D/L' THEN `target_overs` IS NOT
        NULL ELSE TRUE END", "Non-null target_overs for D/L method")
      status: true
      reason_if_failed: ''
      level: error
  result_margin:
    code:
    - suggestion: '.satisfies("CASE WHEN `result` IN (''runs'', ''wickets'') THEN
        `result_margin` IS NOT NULL ELSE TRUE END", "Non-null Result Margin for Runs/Wickets",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  toss_decision:
    code:
    - suggestion: .isComplete('toss_decision')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('toss_decision', ['bat', 'field'])
      status: true
      reason_if_failed: ''
      level: error
  super_over:
    code:
    - suggestion: .satisfies('super_over IN ("Y", "N")', 'Valid Super Over Values')
      status: true
      reason_if_failed: ''
      level: warning
  toss_winner:
    code:
    - suggestion: .isComplete('toss_winner')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('toss_winner IN (team1, team2)', 'Valid Toss Winner')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''toss_winner IN (team1, team2)'',
        ''Valid Toss Winner'')'' failed on data sample: Value: 0.9019073569482289
        does not meet the constraint requirement!'
      level: error
  date:
    code:
    - suggestion: .satisfies('date is not NULL', 'Valid Date Format')
      status: true
      reason_if_failed: ''
      level: warning
  season:
    code:
    - suggestion: .isComplete('season')
      status: true
      reason_if_failed: ''
      level: error
  '["batting_first","batting_second","toss_decision","toss_winner"]':
    code:
    - suggestion: .satisfies('toss_winner = team1 OR toss_winner = team2', 'Toss Winner
        Validity')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''toss_winner = team1 OR toss_winner
        = team2'', ''Toss Winner Validity'')'' failed on data sample: Value: 0.9019073569482289
        does not meet the constraint requirement!'
      level: error
  city:
    code:
    - suggestion: '.hasCompleteness(''city'', lambda x: x >= 0.987)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''city'', lambda x: x >= 0.987)''
        failed on data sample: Value: 0.9836512261580381 does not meet the constraint
        requirement!'
      level: warning
  method:
    code:
    - suggestion: .satisfies('method IS NULL OR method = "D/L"', 'Valid Method Values')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('method = "D/L" AND target_runs IS NOT NULL AND target_overs
        IS NOT NULL OR method IS NULL', 'D/L Method with Non-Null Targets')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''method''], lambda x: x <= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''id'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["date","date_dt"]':
    code:
    - suggestion: '.haveCompleteness([''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''id'', ''date''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  venue:
    code:
    - suggestion: .isComplete('venue')
      status: true
      reason_if_failed: ''
      level: undefined
  winner:
    code:
    - suggestion: '.hasCompleteness(''winner'', lambda x: x >= 0.998)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''winner'', lambda x: x >=
        0.998)'' failed on data sample: Value: 0.989100817438692 does not meet the
        constraint requirement!'
      level: undefined
    - suggestion: .satisfies("(`result` IN ('runs', 'wickets', 'tie') AND `winner`
        IS NOT NULL) OR `result` = 'no result'", 'Winner Validity')
      status: true
      reason_if_failed: ''
      level: undefined
  result:
    code:
    - suggestion: .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      status: true
      reason_if_failed: ''
      level: error
  '["loser","result","winner"]':
    code:
    - suggestion: .satisfies("CASE WHEN `result` != 'no result' THEN (`winner` = `team1`
        AND `winner` != `team2`) OR (`winner` = `team2` AND `winner` != `team1`) ELSE
        TRUE END", "Winner and Loser Consistency")
      status: true
      reason_if_failed: ''
      level: error
  '["result","result_margin"]':
    code:
    - suggestion: .satisfies("CASE WHEN `result` IN ('runs', 'wickets') THEN `result_margin`
        IS NOT NULL AND `result_margin` > 0.0 ELSE true END", "Result Margin Non-null
        for Runs or Wickets")
      status: true
      reason_if_failed: ''
      level: error
  '["team1","team2","toss_winner"]':
    code:
    - suggestion: '.satisfies("`toss_winner` = `team1` OR `toss_winner` = `team2`",
        "Toss winner must be one of the teams", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`toss_winner` = `team1` OR `toss_winner`
        = `team2`", "Toss winner must be one of the teams", lambda x: x == 1)'' failed
        on data sample: Value: 0.9019073569482289 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("(`result` = ''no result'' AND `winner` IS NULL) OR
        (`winner` = `team1` OR `winner` = `team2`)", "Winner must be one of the teams
        unless result is ''no result''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
