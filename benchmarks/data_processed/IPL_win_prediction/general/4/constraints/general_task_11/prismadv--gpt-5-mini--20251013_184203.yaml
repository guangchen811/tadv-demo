      sources:
      - start_line: 35
        end_line: 41
        file: ''
      uid: e667710d-7a19-4942-b3be-8f5be3d2fb81
    - text: 'If a match has a result other than ''no result'' (i.e., a resulted match),
        winner must be non-null and must be one of the participating teams (team1
        or team2). Example Deequ constraint:

        - .satisfies("(result != ''no result'') => (winner IS NOT NULL AND (winner
        == team1 OR winner == team2))")'
      sources:
      - start_line: 43
        end_line: 61
        file: ''
      uid: ff17a973-4efe-4772-83c2-e0965f0c8432
    - text: 'For matches with result in {''runs'',''wickets''}, loser must be non-null
        and must equal the other team (if winner == team1 then loser == team2, and
        vice versa). Example Deequ constraint:

        - .satisfies("(result IN (''runs'',''wickets'')) => (loser IS NOT NULL AND
        ((winner == team1 AND loser == team2) OR (winner == team2 AND loser == team1)))")'
      sources:
      - start_line: 43
        end_line: 60
        file: ''
      uid: 8b274915-8504-429a-8cf7-6003008835a1
    - text: 'When computing req_run_rate (target_runs / target_overs), target_overs
        must be numeric and strictly greater than zero whenever target_runs is present
        (to avoid division-by-zero and invalid rates). Example checks:

        - .satisfies("(NOT isNull(target_runs)) => (NOT isNull(target_overs) AND target_overs
        > 0)")

        - .satisfies("(NOT isNull(req_run_rate)) => (isFinite(req_run_rate))")'
