  '["result","super_over"]':
    code: []
    assumptions:
    - text: 'Rows with result == ''tie'' should have super_over == ''Y'', and conversely
        rows with super_over == ''Y'' should have result == ''tie'' (i.e., super_over
        ''Y'' iff result ''tie'').

        Representative Deequ-style checks:

        - .satisfies("NOT(result = ''tie'') OR super_over = ''Y''", "tie_implies_super_over")

        - .satisfies("NOT(super_over = ''Y'') OR result = ''tie''", "super_over_implies_tie")'
      sources:
      - start_line: 18
        end_line: 23
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: 5e8779e5-619f-4c1d-8d71-c37e043c2230
    - text: 'When result is ''runs'' or ''wickets'', result_margin must be present
        and represent an integer margin (i.e., non-null and numeric). The code casts
        result_margin to integer for margin_int and then uses it in settlement text,
        so margin must be available for those result values.

        Representative Deequ-style checks:

        - .satisfies("NOT(result IN (''runs'',''wickets'')) OR result_margin IS NOT
        NULL", "margin_presence_for_result_types")

        - .satisfies("NOT(result IN (''runs'',''wickets'')) OR try_cast(result_margin
        AS BIGINT) IS NOT NULL", "margin_is_integer_when_required")'
      sources:
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: ff251f98-3fbd-4518-9458-29bcdbd6c007
    - text: 'When result is in {''runs'',''wickets'',''tie''}, a winner must be present
        and the winner value must match one of the competing teams (team1 or team2).
        Settlement text uses winner and other_team logic relies on winner being one
        of team1/team2.

        Representative Deequ-style check:

        - .satisfies("NOT(result IN (''runs'',''wickets'',''tie'')) OR (winner IS
        NOT NULL AND (winner = team1 OR winner = team2))", "winner_consistency_with_teams")'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 52
        end_line: 60
        file: ''
      uid: 9e8df3ae-8594-419e-ae8b-5f335fcede16
    - text: 'For result values other than ''runs'' or ''wickets'' (e.g., ''tie'' or
        ''no result''), margin_int should be null. Conversely, margin_int should be
        non-null only when result is ''runs'' or ''wickets''. This is required because
        margin_int is used (cast to int) only for runs/wickets.

        Representative Deequ-style checks:

        - .satisfies("NOT(result IN (''runs'',''wickets'')) OR margin_int IS NOT NULL",
        "margin_int_present_for_runs_wickets")

        - .satisfies("NOT(result IN (''runs'',''wickets'')) OR margin_int IS NOT NULL",
        "margin_int_nonnull_when_required")

        - .satisfies("NOT(result IN (''runs'',''wickets'')) OR margin_int IS NOT NULL",
        "redundant_but_actionable")'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: ba0a99e8-ef6d-454d-a472-bec5185f0c53
  '["result","winner"]':
    code: []
    assumptions:
    - text: 'When result is ''runs'' or ''wickets'', result_margin must be present
        and a positive integer (so margin_int can be safely constructed and used).
        Actionable constraint: for rows where result in {''runs'',''wickets''}, result_margin
        is non-null, numeric, and > 0 (and margin_int equals result_margin after coercion).
        In Deequ-style form this can be expressed as a filtered completeness and range
        check on result_margin and a consistency check between result_margin and margin_int.'
      sources:
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 5ad44cd2-2728-4f64-837f-3aed29544399
    - text: For any match that produced a result (i.e., result != 'no result'), winner
        must be non-null and must equal one of the participating teams (team1 or team2).
        This is required so that loser can be determined by comparing winner to team1/team2
        and settlement strings referencing winner are valid.
      sources:
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 51
        end_line: 56
        file: ''
      uid: bc8b0834-514f-4d2c-8b50-87080f391cb1
    - text: 'For matches with result ''runs'' or ''wickets'', loser must be determinable
        and non-null: loser should equal team2 when winner == team1, otherwise team1.
        In other words, for these result types, the tuple (team1, team2, winner, loser)
        must satisfy loser == (team2 if winner == team1 else team1).'
      sources:
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 57c22b2a-91bd-4b49-a763-cbbf0ee12a8e
    - text: margin_int is only meaningful when result is 'runs' or 'wickets' and must
        be an integer type (no NA) in those cases because settlement_text calls int(margin_int).
        Enforce that for rows with result in {'runs','wickets'} margin_int is non-null
        and represents the integer value of result_margin.
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: bb1489c0-4a1d-4a0e-90eb-a4e8d3aa4c01
    - text: 'When computing req_run_rate, target_runs and target_overs must be numeric
        and target_overs must be non-null and non-zero for rows where a required run
        rate is expected. In practice enforce: if target_runs is non-null then target_overs
        is non-null and > 0 so division does not produce inf/NaN.'
      sources:
      - start_line: 27
        end_line: 31
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: 2960564c-a5e3-48be-9248-5bcf38499730
    - text: Toss-decision conditional KPIs assume toss_decision takes a limited set
        of normalized values (e.g., 'field' and 'bat'). The pivot and subsequent renaming
        expect columns named 'field' and 'bat' to appear; enforce that toss_decision
        values include those labels (or that pivot produces those columns).
      sources:
      - start_line: 84
        end_line: 91
        file: ''
      uid: 72735fe6-7d94-4faa-953c-f4dd6234bd39
  '["season","season_int"]':
    code: []
    assumptions:
    - text: 'All rows must have ''season'' values that are numeric/integer so that
        pd.to_numeric(df[''season''], errors=''coerce'') produces a non-null ''season_int''
        for every row. Practically: ''season'' should be convertible to an integer
        and ''season_int'' must be complete (no nulls) because subsequent grouping/merge
        operations use ''season_int'' as the join/group key. Example constraint form:
        .isComplete(''season_int'') (or a predicate: season is numeric -> season_int
        not null).'
      sources:
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 76
        end_line: 82
        file: ''
      - start_line: 97
        end_line: 98
        file: ''
      uid: 9a0e885d-5889-44ff-95c1-6daf318ee216
    - text: 'The ''toss_decision'' column (after normalization to lowercase/stripped)
        is expected to be drawn from the domain {''field'', ''bat''} for the rows
        used to compute decision-level KPIs. In addition, for the pivot that creates
        season-level columns, there should be at least one row per (''season_int'',''toss_decision'')
        for both ''field'' and ''bat'' if a meaningful difference is to be computed.
        Example checks: .isContainedIn(''toss_decision'',[''field'',''bat'']) and
        a grouped completeness check that for each season_int both decisions appear
        at least once.'
      sources:
      - start_line: 19
        end_line: 21
        file: ''
      - start_line: 85
        end_line: 92
        file: ''
      uid: 8e5e6a25-5de1-427c-9f0d-0d98cff993c7
    - text: 'When computing required run rate (''req_run_rate'' = target_runs / target_overs),
        rows where ''target_runs'' is not null must have ''target_overs'' non-null
        and > 0 to avoid division-by-zero or NaN results. Constraint form: for all
        rows: target_runs IS NULL OR (target_overs IS NOT NULL AND target_overs >
        0).'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      uid: 47747178-7bed-4de9-813e-7b84c3a3d5b3
    - text: 'For rows with result == ''runs'' or result == ''wickets'', ''result_margin''
        must be numeric/non-null so that ''margin_int'' is valid, and the match must
        have a non-null ''winner'' and both team columns present so settlement text
        can be built (they are used to compute ''loser'' and then the settlement message).
        Practical predicate: NOT(result IN {''runs'',''wickets''}) OR (result_margin
        IS NOT NULL AND winner IS NOT NULL AND team1 IS NOT NULL AND team2 IS NOT
        NULL).'
      sources:
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 52
        end_line: 61
        file: ''
      uid: da68c5bd-afca-4fc6-a55c-ae0ecbe322d7
    - text: 'For rows with result == ''tie'', the ''winner'' must be present (non-null)
        because settlement_text builds "<winner> won after Super Over". Constraint
        form: NOT(result == ''tie'') OR (winner IS NOT NULL).'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: 8006afa1-9165-4017-9b6c-94a9590121a2
    - text: 'The logic that builds ''loser'' assumes that when ''winner'' is present
        it equals either ''team1'' or ''team2'' and that at least one of ''team1''/''team2''
        is non-null. Formally: NOT(winner IS NOT NULL) OR ( (team1 IS NOT NULL OR
        team2 IS NOT NULL) AND winner IN (team1, team2) ). This ensures ''loser''
        can be resolved deterministically.'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 13415661-ad2e-4d5b-8d7f-b7ce774a5acb
    - text: 'When computing season-level KPIs the code counts ''id'' per season: for
        rows considered in KPIs (result != ''no result''), ''id'' must be present
        (non-null) and ''season_int'' must also be present. Constraint form: NOT(result
        != ''no result'') OR (id IS NOT NULL AND season_int IS NOT NULL).'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 76
        end_line: 81
        file: ''
      uid: a56566a7-11cb-4755-aa0e-f47c26e83870
  '["season_int","toss_decision"]':
    code: []
    assumptions:
    - text: For every season (season_int) represented in the KPI calculations (i.e.,
        rows where result != 'no result'), there must be at least one record with
        toss_decision = 'field' and at least one record with toss_decision = 'bat'.
        This ensures the groupby/pivot produces both columns ('field' and 'bat') so
        the per-season toss_decision advantage (field_toss_winner_win_rate - bat_toss_winner_win_rate)
        can be computed without producing NaNs.
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 85
        end_line: 92
        file: ''
      - start_line: 94
        end_line: 96
        file: ''
      uid: b62518d9-4797-4624-85d6-cf53c20eec43
    - text: season_int must be a valid numeric (non-null) for rows that contribute
        to season-level aggregations. The script converts season -> season_int and
        then groups by season_int; if season_int is null for many rows, those matches
        will be excluded from season_rates and decision_rates and will lead to missing/incorrect
        season KPIs.
      sources:
      - start_line: 33
        end_line: 34
        file: ''
      - start_line: 76
        end_line: 82
        file: ''
      - start_line: 85
        end_line: 90
        file: ''
      uid: 214cc95f-9ad5-4aa9-a5cf-e70b1462e90f
    - text: toss_decision values are expected to be normalized to exactly the two
        lowercase strings 'field' and 'bat' (no other categories or spelling/casing
        variants). The code lowercases and strips toss_decision and later pivots/renames
        pivot columns assuming only 'field' and 'bat' appear.
      sources:
      - start_line: 18
        end_line: 21
        file: ''
      - start_line: 86
        end_line: 92
        file: ''
      uid: 4f078bb5-3441-403b-aa0f-7e46f886d7b0
    - text: For correct computation of the decision-level toss win rate, the columns
        toss_winner and winner must be present and non-null for rows included in kpi_df
        (rows where result != 'no result'). toss_winner_won is computed as (toss_winner
        == winner) and aggregated as a mean by season and toss_decision, so missing
        values in either column will bias or invalidate the rates.
      sources:
      - start_line: 72
        end_line: 74
        file: ''
      - start_line: 76
        end_line: 80
        file: ''
      uid: f5fce2f5-1b01-45fb-a71b-c8a5ba8f56ec
    - text: req_run_rate is computed as target_runs / target_overs and then averaged
        per season (avg_req_run_rate). Therefore target_runs and target_overs must
        be numeric and target_overs must be non-zero for rows that should contribute
        to the season average. The code coerces these columns to numeric earlier,
        so successful numeric conversion and absence of zero target_overs are required
        to avoid infinite/NaN avg_req_run_rate values.
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 69
        end_line: 71
        file: ''
      - start_line: 76
        end_line: 80
        file: ''
      uid: ac2a0080-30e0-4a02-a323-ec9386188346
  '["target_overs","target_runs"]':
    code: []
    assumptions:
    - text: 'When computing required run rate, target_runs and target_overs are used
        together: for any record where target_runs is present, target_overs must also
        be present and strictly greater than 0 (to avoid division-by-zero or infinite/NaN
        req_run_rate). Actionable constraint (Deequ-style): enforce that for every
        row (target_runs IS NOT NULL) => (target_overs IS NOT NULL AND target_overs
        > 0).'
      sources:
      - start_line: 27
        end_line: 31
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      uid: d6567fac-63e6-43ac-91f2-14f01db496c0
    - text: 'For matches with a running result (''runs'' or ''wickets''), result_margin
        must be present and interpretable as an integer, and both winner and loser
        must be present (these are used together to build settlement strings that
        include the margin and the two teams). Actionable constraint: for every row
        where result IN (''runs'',''wickets'') => (result_margin IS NOT NULL AND winner
        IS NOT NULL AND ((team1 IS NOT NULL AND team2 IS NOT NULL) OR loser IS NOT
        NULL)).'
      sources:
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 43
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 646f5ff4-8226-495e-80dc-4e142388994c
    - text: 'When result == ''tie'', the winner column must be present (settlement
        text uses winner for tie cases). Actionable constraint: for every row where
        result = ''tie'' => winner IS NOT NULL.'
      sources:
      - start_line: 18
        end_line: 21
        file: ''
      - start_line: 51
        end_line: 56
        file: ''
      uid: 092d897c-3eb1-4b5c-af27-146e337cfa58
    - text: 'When result == ''no result'', settlement and KPI logic expects there
        to be no winner and no meaningful result_margin; thus for rows with result
        = ''no result'' expect winner IS NULL and result_margin IS NULL (and loser
        IS NULL). Actionable constraint: for every row where result = ''no result''
        => (winner IS NULL AND result_margin IS NULL AND loser IS NULL).'
      sources:
      - start_line: 35
        end_line: 41
        file: ''
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 72
        end_line: 72
        file: ''
      uid: 9a40c5b8-42d1-4421-84d6-09daa5a0f6aa
    - text: 'Toss-related KPIs compare toss_winner to winner; for matches included
        in KPI calculations (result != ''no result''), both toss_winner and winner
        should be present to make the comparison meaningful. Actionable constraint:
        for every row where result != ''no result'' => (toss_winner IS NOT NULL AND
        winner IS NOT NULL).'
      sources:
      - start_line: 72
        end_line: 74
        file: ''
      uid: 9131b49a-e78f-4e57-a9ec-8a9c6cd9d31a
    - text: 'Decision-conditional KPIs pivot on toss_decision and expect canonical
        values (the code later renames ''field'' and ''bat'' columns); for matches
        used in decision grouping (result != ''no result''), toss_decision should
        be non-null and drawn from the expected domain (e.g., {''field'',''bat''}
        after normalization). Actionable constraint: for every row where result !=
        ''no result'' => (toss_decision IS NOT NULL AND lower(toss_decision) IN (''field'',''bat'')).'
      sources:
      - start_line: 18
        end_line: 21
        file: ''
      - start_line: 85
        end_line: 91
        file: ''
      uid: 2147e720-2da8-4b06-90c9-f02039ae7fea
  '["team1","team2","toss_winner"]':
    code: []
    assumptions:
    - text: 'If ''winner'' is present (not null), it must be one of the two competing
        teams in that row: either ''team1'' or ''team2''. Actionable check (Deequ-style):
        enforce that for every row either winner IS NULL or winner IN (team1, team2).
        A SQL-like predicate: (winner IS NULL) OR (winner = team1) OR (winner = team2).'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: 59c833d9-30d6-44ff-8d2b-9b3b10f8ee96
    - text: 'For matches whose ''result'' is ''runs'' or ''wickets'', the match must
        have a valid margin: ''result_margin'' should be present and convertible to
        a positive integer and ''margin_int'' should therefore be non-null. Actionable
        check: for rows where result IN (''runs'',''wickets'') assert result_margin
        IS NOT NULL AND try_cast(result_margin AS integer) > 0 (or use a Deequ satisfies
        that checks integer-cast and > 0).'
      sources:
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 52
        end_line: 60
        file: ''
      uid: 731b8c2d-ce52-4945-bf52-d81f1e0e7df6
    - text: 'When ''result'' == ''no result'', there must be no winner and no margin:
        ''winner'' should be null and ''margin_int'' (and ''result_margin'') should
        be null. This is important because later KPI calculations filter out ''no
        result'' rows. Actionable check: for rows with result = ''no result'' assert
        winner IS NULL AND result_margin IS NULL.'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      uid: 98ad6223-a731-43f0-8679-35aa840b7e06
    - text: 'When ''result'' == ''tie'', there must still be a declared ''winner''
        (the code formats a settlement using winner for ties). Actionable check: for
        rows with result = ''tie'' assert winner IS NOT NULL.'
      sources:
      - start_line: 55
        end_line: 56
        file: ''
      uid: aee5bdc1-d608-48fc-9ca2-9290defc00dd
    - text: 'Required run rate calculation uses target_runs / target_overs. For rows
        that will be aggregated into KPIs (i.e., result != ''no result''), both ''target_runs''
        and ''target_overs'' must be numeric and ''target_overs'' must be non-zero
        and positive to avoid division-by-zero. Actionable check: ensure target_runs
        and target_overs are numeric and for rows with result != ''no result'' assert
        target_overs > 0.'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 70
        end_line: 73
        file: ''
      uid: 2da2d6c7-7e91-420f-9570-9d8c7f44746c
    - text: 'The ''toss_winner'' value should refer to one of the competing teams
        (team1 or team2) for matches that are used to compute toss-winner KPIs (result
        != ''no result''). This ensures the boolean comparison (toss_winner == winner)
        is meaningful. Actionable check: for rows with result != ''no result'' assert
        (toss_winner = team1) OR (toss_winner = team2).'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 44
        end_line: 49
        file: ''
      uid: 81f1f7a1-e86a-407e-a034-705eb8588cea
    - text: 'The ''toss_decision'' column is normalized to lowercase and later pivot
        assumes limited decision categories (e.g., ''field'' and ''bat''). Actionable
        check: after normalization, toss_decision values should belong to an expected
        domain such as {''field'',''bat''} (or at least contain these two) so that
        pivot and subsequent renaming succeed without producing entirely empty columns.'
      sources:
      - start_line: 18
        end_line: 21
        file: ''
      - start_line: 85
