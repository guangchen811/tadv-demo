  '["team1","team2","winner"]':
    code: []
    assumptions:
    - text: "For any match with a definitive outcome (result in {'runs', 'wickets',\
        \ 'tie'}), the 'winner' field must be present (non-null) and must equal either\
        \ 'team1' or 'team2'. In other words, whenever result \u2208 {'runs','wickets','tie'}\
        \ then (winner = team1 OR winner = team2). This can be expressed as a row-level\
        \ predicate (Deequ-style) such as: .satisfies(\"NOT(result IN ('no result'))\
        \ => (winner = team1 OR winner = team2)\", \"winner_is_one_of_teams_for_resulted_matches\"\
        )."
      sources:
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      uid: 72150221-c8b2-4997-9e22-6025a1513cdc
    - text: 'For matches where result == ''runs'' or result == ''wickets'', the numeric
        margin must be available and usable: ''result_margin'' must coerce to an integer
        (i.e., margin_int is non-null) and should be positive. Additionally, when
        constructing the loser, the loser must be the other team (if winner == team1
        then loser == team2, and if winner == team2 then loser == team1). This can
        be enforced as predicates like: .satisfies("result IN (''runs'',''wickets'')
        => result_margin IS NOT NULL AND result_margin > 0", "margin_present_positive")
        and .satisfies("winner = team1 => loser = team2" , "loser_matches_other_team")
        and .satisfies("winner = team2 => loser = team1", "loser_matches_other_team_rev").'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      uid: 680bddbd-00ad-459c-a3ae-b1c8f0bc3805
    - text: team1 and team2 must be different for each match (team1 != team2). The
        loser calculation and settlement strings assume two distinct teams on a match
        row.
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: b2740565-437f-43ac-9cca-c81324f9a193
    - text: 'Rows with result == ''no result'' are treated as VOID and may legitimately
        have a null ''winner''. Conversely, for any result other than ''no result'',
        ''winner'' is expected to be non-null. This can be asserted as: .satisfies("result
        = ''no result'' => winner IS NULL OR TRUE", "no_result_allows_null_winner")
        and .satisfies("result != ''no result'' => winner IS NOT NULL", "result_requires_winner").'
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 52
        end_line: 55
        file: ''
      uid: 2a544072-07a3-4916-bc8f-99eb582b81ce
  '["toss_winner","winner"]':
    code: []
    assumptions:
    - text: 'For all matches that produced a result (i.e. result != ''no result''),
        the ''winner'' value must be present and must be one of the two competing
        teams (team1 or team2). This is required because the code builds ''loser''
        from winner (other_team) and uses ''winner'' in settlement text. Example deequ-style
        row-level constraint: .satisfies("result = ''no result'' OR (winner IS NOT
        NULL AND (winner = team1 OR winner = team2))", "winner_matches_team1_or_team2_for_resulted_matches")'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 52
        end_line: 64
        file: ''
      - start_line: 72
        end_line: 74
        file: ''
      uid: 748dd1ad-f852-4531-a0b2-3e48cfef3005
    - text: 'For every row, ''toss_winner'' must equal one of the two competing teams
        (team1 or team2). This is needed because the KPI calculation compares toss_winner
        to winner to compute ''toss_winner_won''. Example deequ constraint: .satisfies("toss_winner
        = team1 OR toss_winner = team2", "toss_winner_in_team1_or_team2")'
      sources:
      - start_line: 72
        end_line: 74
        file: ''
      uid: c103239e-4467-483f-b427-b38b040ccf75
    - text: 'For matches that produced a result (result != ''no result''), both ''winner''
        and ''toss_winner'' are expected to be non-null and comparable (i.e., use
        the same canonical naming so direct equality is meaningful). This ensures
        the computation (toss_winner == winner). Example deequ constraint to check
        nullness: .satisfies("result = ''no result'' OR (winner IS NOT NULL AND toss_winner
        IS NOT NULL)", "winner_and_toss_winner_non_null_for_resulted_matches"). To
        enforce canonicalization you can additionally require trimmed/lowercased parity
        when appropriate, e.g. using derived expressions lower(trim(winner)) and lower(trim(toss_winner))
        in a .satisfies expression.'
      sources:
