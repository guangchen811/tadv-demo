      - start_line: 69
        end_line: 70
        file: ''
      uid: 7d21073d-0fdb-4413-84f8-977d4d305e87
    - text: 'Rows used for toss KPIs (result != ''no result'') must have toss_winner
        present and toss_winner should be one of the participating teams (team1 or
        team2) so that toss_winner_won = (toss_winner == winner) is meaningful. Example
        Deequ constraint:

        - .satisfies("(result != ''no result'') => (toss_winner IS NOT NULL AND (toss_winner
        == team1 OR toss_winner == team2))")'
      sources:
      - start_line: 72
        end_line: 74
        file: ''
      - start_line: 43
        end_line: 49
        file: ''
      uid: 14ae6ac6-ae7a-4a34-8f79-f15fddf37555
    - text: 'toss_decision is normalized to lowercase and later grouped/pivoted; when
        present it should be one of the expected categories (e.g., ''bat'' or ''field'').
        Example Deequ constraint:

        - .satisfies("(NOT isNull(toss_decision)) => (toss_decision IN (''bat'',''field''))")'
      sources:
