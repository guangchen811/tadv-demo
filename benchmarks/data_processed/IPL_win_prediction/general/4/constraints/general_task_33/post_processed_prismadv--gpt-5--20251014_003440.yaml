  '["match_type","season"]':
    code: []
    assumptions:
    - text: 'For every season present in the dataset, there must be at least one row
        with match_type = ''League'' so that a points table and playoff seeding can
        be produced per season. This can be enforced as a grouped constraint: for
        each season s, count_if(match_type = ''League'') > 0.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 61
        end_line: 69
        file: ''
      - start_line: 78
        end_line: 79
        file: ''
      uid: e7be8416-904c-40a2-ad79-19360d962add
    - text: In league matches, team1 and team2 must both be non-null strings and must
        be different (team1 <> team2), because the script expands each match into
        two team-centric rows (team/opponent) and downstream logic assumes two distinct
        teams per match.
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 27
        end_line: 33
        file: ''
      - start_line: 35
        end_line: 35
        file: ''
      uid: 6c6c2ee2-c5bd-4dd6-9eb9-870ad8901b60
    - text: 'Winner consistency with teams and result: For rows where result IN (''runs'',''wickets'',''tie''),
        winner must be non-null and equal to either team1 or team2; for rows where
        result = ''no result'', winner should be null. This ensures points/win/loss
        logic and super-over handling operate correctly. Example Deequ-style predicate:
        satisfies("(result IN (''runs'',''wickets'',''tie'') AND winner IN (team1,
        team2)) OR (result = ''no result'' AND winner IS NULL)", ''winner_consistent_with_result_and_teams'').'
      sources:
      - start_line: 27
        end_line: 33
        file: ''
      - start_line: 38
        end_line: 47
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: 69e9e258-3de1-412e-af57-7f44f3b924f7
    - text: 'Numeric inputs required for rate proxy: When result = ''runs'', target_overs
        must be non-null and strictly > 0, and result_margin must be non-null and
        > 0 (to avoid division by zero/invalid NRR proxy); when result = ''wickets'',
        result_margin must be an integer between 1 and 10 inclusive. Example constraints:
        satisfies("result <> ''runs'' OR (target_overs > 0 AND result_margin > 0)",
        ''runs_requires_positive_target_overs_and_margin'') and satisfies("result
        <> ''wickets'' OR (result_margin >= 1 AND result_margin <= 10)", ''wickets_margin_in_1_to_10'').'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 51
        end_line: 53
        file: ''
      uid: d9151b1a-d041-4fbf-9968-91101ed5b683
    - text: 'Each season must have at least four unique teams participating in league
        matches so that top-4 playoff seeding can be computed. In practice, on the
        team-expanded (long) view this is: for each season s, count_distinct(team
        where match_type=''League'') >= 4.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 61
        end_line: 69
        file: ''
      - start_line: 78
        end_line: 79
        file: ''
      uid: 987ebcc0-5bbf-4737-b9e2-86163ffa26ad
    - text: 'Tie handling assumes a unique super-over winner: For rows where result
        = ''tie'', exactly one of the two teams must equal winner and the other must
        not; i.e., in the team-expanded view per match, sum(so_win) = 1 and exactly
        one team gets win=1 and the other gets loss=1. Predicate basis: result=''tie''
        implies winner IN (team1, team2) and winner is non-null.'
      sources:
      - start_line: 38
        end_line: 47
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: f737d5cb-7988-4b0b-9111-0a624e0a8d98
  '["match_type","target_overs"]':
    code: []
    assumptions:
    - text: 'For League matches decided by runs, the denominator must be valid: target_overs
        must be present and strictly greater than 0, and result_margin must be present
        and strictly positive. Representable in Deequ as, for example: .satisfies("NOT
        (match_type = ''League'' AND result = ''runs'') OR (target_overs > 0 AND result_margin
        > 0)", ''valid_runs_denominator'', assertion = _ >= 1.0) together with .hasCompleteness(''target_overs'',
        assertion = _ == 1.0, where = "match_type = ''League'' AND result = ''runs''")
        and .hasCompleteness(''result_margin'', assertion = _ == 1.0, where = "match_type
        = ''League'' AND result = ''runs''").'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 51
        end_line: 55
        file: ''
      uid: 35094583-f92c-4c8d-bf3d-c9d8546e925b
    - text: 'For League matches, winner consistency: when result is in (''runs'',''wickets'',''tie''),
        winner must equal either team1 or team2; when result is ''no result'', winner
        must be null. This can be expressed as a single row-level predicate: .satisfies("(match_type
        != ''League'') OR ((result IN (''runs'',''wickets'',''tie'') AND (winner =
        team1 OR winner = team2)) OR (result = ''no result'' AND winner IS NULL))",
        ''winner_valid_for_league'', assertion = _ >= 1.0).'
      sources:
      - start_line: 27
        end_line: 35
        file: ''
      - start_line: 38
        end_line: 47
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
      - start_line: 57
        end_line: 59
        file: ''
      uid: cf431613-8618-42a9-98d6-7edc6fc5e1c4
    - text: 'For League matches, the two participants must be distinct: team1 != team2.
        Deequ: .satisfies("match_type != ''League'' OR team1 <> team2", ''no_self_matches_league'',
        assertion = _ >= 1.0).'
      sources:
