        end_line: 58
        file: ''
      uid: 800b5d96-d64b-43d9-af14-14d6adaeaa17
    - text: 'The ''result'' column must use a closed, exact set of category values:
        ''runs'', ''wickets'', ''tie'', or ''no result'' (lowercase, exact spelling).
        Any other token would be treated as neither win, loss, nor no-result and would
        not contribute correctly to points/played/NRR. Example validations: Deequ:
