        end_line: 25
        file: ''
      uid: 6e2d35c1-be66-4e6a-844c-8d3bbb5c0b8e
    - text: 'There must be at least one record with match_type = ''League'' in the
        input; otherwise the downstream league table and seeding will be empty. Example
