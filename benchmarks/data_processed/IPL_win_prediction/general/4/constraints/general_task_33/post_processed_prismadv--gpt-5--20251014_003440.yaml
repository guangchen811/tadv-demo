    assumptions:
    - text: 'The ''result'' column must be complete (no nulls) for all input rows
        that will be processed. Downstream logic performs case-sensitive equality
        and set-membership checks on ''result'' without null handling, so nulls would
        silently drop matches from win/loss/NR/NRR computations. Example validations:
