        end_line: 25
        file: ''
      - start_line: 27
        end_line: 35
        file: ''
      uid: 7dd6c4d1-5a5d-4f71-823e-af58a4a6665f
    - text: 'All League rows must carry the season and both participating teams: season,
        team1, and team2 must be non-null when match_type = ''League''. Deequ: .hasCompleteness(''season'',
        assertion = _ == 1.0, where = "match_type = ''League''") and similarly for
        team1 and team2.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 61
        end_line: 68
        file: ''
      uid: d14e3b80-9000-46ce-9bce-467b9aeb5eb0
    - text: 'For League matches decided by wickets, the wickets margin must be within
        cricket-valid bounds: result_margin must be an integer between 1 and 10 inclusive.
        Deequ: .satisfies("NOT (match_type = ''League'' AND result = ''wickets'')
        OR (result_margin >= 1 AND result_margin <= 10 AND result_margin = floor(result_margin))",
        ''valid_wickets_margin'', assertion = _ >= 1.0).'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 53
        end_line: 53
        file: ''
      uid: a8489066-1958-4c81-9b03-fa95ab5866d0
  '["result","result_margin"]':
    code: []
    assumptions:
    - text: 'Result-margin/overs must be consistent with the match result for League
        games: (a) If result = ''runs'', then result_margin and target_overs are non-null,
