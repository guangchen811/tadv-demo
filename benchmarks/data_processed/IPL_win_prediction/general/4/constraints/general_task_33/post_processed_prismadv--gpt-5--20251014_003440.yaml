        = ''League'' AND result = ''wickets'' -> (result_margin IS NOT NULL AND result_margin
        >= 1 AND result_margin <= 10)") and .hasCompliance("no_margin_when_tie_or_nr",
        "match_type = ''League'' AND result IN (''tie'',''no result'') -> (result_margin
        IS NULL)").'
