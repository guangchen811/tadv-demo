constraints:
  city:
    code:
    - - .hasCompleteness('city', 0.98)
      - Invalid
    - - .isDataType('city', 'String')
      - Invalid
    assumptions: []
  date:
    code:
    - - .hasPattern('date', '^\\d{4}-\\d{2}-\\d{2}$', hint='Date format should be
        YYYY-MM-DD')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', 'Integral')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Elimination Final', 'Eliminator',
        'Qualifier 2', 'Final', 'Semi Final', 'Qualifier 1'])
      - Valid
    assumptions: []
  method:
    code:
    - - .hasCompleteness('method', 0.02)
      - Invalid
    - - .isDataType('method', 'String')
      - Invalid
    assumptions: []
  method, target_runs, target_overs:
    code:
    - - .hasCustomConstraint("CASE WHEN method = 'D/L' THEN target_runs IS NOT NULL
        AND target_overs IS NOT NULL AND target_overs > 0 ELSE TRUE END", 'D/L method
        requires valid and positive target runs and overs')
      - Invalid
    assumptions: []
  player_of_match:
    code:
    - - .hasCompleteness('player_of_match', 0.99)
      - Invalid
    - - .isDataType('player_of_match', 'String')
      - Invalid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['tie', 'runs', 'wickets', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .hasCompleteness('result_margin', 0.98)
      - Invalid
    - - .isDataType('result_margin', 'Fractional')
      - Invalid
    assumptions: []
  result_margin, result:
    code:
    - - .hasCustomConstraint("CASE WHEN result IN ('runs', 'wickets') THEN result_margin
        IS NOT NULL AND result_margin > 0 ELSE TRUE END", 'Result margin must be positive
        for \'runs\' or \'wickets\' results')
      - Invalid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isDataType('season', 'Integral')
      - Invalid
    assumptions: []
  season, date:
    code:
    - - .hasCustomConstraint("season = YEAR(TO_DATE(date, \'yyyy-MM-dd\'))", 'Season
        year must match year from date')
      - Invalid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  super_over, result:
    code:
    - - .hasCustomConstraint("CASE WHEN super_over = 'Y' THEN result = 'tie' ELSE
        TRUE END", 'Super Over can only occur if the match was a tie')
      - Invalid
    assumptions: []
  target_overs:
    code:
    - - .hasCompleteness('target_overs', 0.99)
      - Invalid
    - - .isDataType('target_overs', 'Fractional')
      - Invalid
    - - .isPositive('target_overs')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .hasCompleteness('target_runs', 0.99)
      - Invalid
    - - .isDataType('target_runs', 'Fractional')
      - Invalid
    assumptions: []
  team1:
    code:
    - - .hasMinLength('team1', 2)
      - Invalid
    - - .isComplete('team1')
      - Valid
    - - .isDataType('team1', 'String')
      - Invalid
    assumptions: []
  team1, team2:
    code:
    - - .hasCustomConstraint('team1 != team2', 'Opposing teams must be different')
      - Invalid
    assumptions: []
  team2:
    code:
    - - .hasMinLength('team2', 2)
      - Invalid
    - - .isComplete('team2')
      - Valid
    - - .isDataType('team2', 'String')
      - Invalid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .isDataType('toss_winner', 'String')
      - Invalid
    assumptions: []
  toss_winner, team1, team2:
    code:
    - - .hasCustomConstraint('toss_winner = team1 OR toss_winner = team2', 'Toss winner
        must be one of the competing teams')
      - Invalid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    - - .isDataType('umpire1', 'String')
      - Invalid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    - - .isDataType('umpire2', 'String')
      - Invalid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    - - .isDataType('venue', 'String')
      - Invalid
    assumptions: []
  winner:
    code:
    - - .hasCompleteness('winner', 0.99)
      - Invalid
    - - .isDataType('winner', 'String')
      - Invalid
    assumptions: []
  winner, result:
    code:
    - - .hasCustomConstraint("CASE WHEN result != 'no result' THEN winner IS NOT NULL
        ELSE TRUE END", 'Winner must be present if there is a result (not \'no result\')')
      - Invalid
    assumptions: []
  winner, team1, team2:
    code:
    - - .hasCustomConstraint("CASE WHEN winner IS NOT NULL THEN (winner = team1 OR
        winner = team2) ELSE TRUE END", 'Winner must be one of the two competing teams')
      - Invalid
    assumptions: []
