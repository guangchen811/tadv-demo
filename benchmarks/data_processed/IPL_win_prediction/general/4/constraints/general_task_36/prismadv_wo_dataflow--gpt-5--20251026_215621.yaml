  '["date","id"]':
    code: []
    assumptions:
    - text: 'The pair (id, date) uniquely identifies a match record; there must be
        no duplicate (id, date) rows. We could represent this as a Deequ constraint:
        .isUnique(["id", "date"]).'
      sources:
      - start_line: 102
        end_line: 113
        file: ''
      - start_line: 169
        end_line: 171
        file: ''
      uid: 952f8b0d-b7db-4dce-bf60-3148090f6219
    - text: 'Functional dependency: id determines date (for a given id there is exactly
        one date). In Deequ: .hasFunctionalDependency("id", "date", maxViolationFraction
        = 0.0).'
      sources:
      - start_line: 102
        end_line: 113
        file: ''
      - start_line: 169
        end_line: 171
        file: ''
      uid: 7bdc84cf-04b7-452b-bea3-a9575f63d763
    - text: 'toss_winner must be one of the two competing teams. In Deequ: .satisfies("toss_winner
        = team1 OR toss_winner = team2", "toss_winner_in_match_teams").'
      sources:
      - start_line: 37
        end_line: 39
        file: ''
      uid: 27e41543-002e-42e3-b744-aade5e50237b
    - text: 'toss_decision and toss_winner jointly determine batting_first and chasing_team:
        if toss_decision = ''bat'' then batting_first = toss_winner and chasing_team
        is the other team; otherwise chasing_team = toss_winner and batting_first
        is the other team. In Deequ: .satisfies("CASE WHEN toss_decision = ''bat''
        THEN batting_first = toss_winner AND chasing_team <> toss_winner ELSE batting_first
        <> toss_winner AND chasing_team = toss_winner END", "batting_chasing_consistency").'
      sources:
      - start_line: 38
        end_line: 42
        file: ''
      uid: 2a12265d-2cfc-43a0-8959-17bf3a5c6d56
    - text: 'batting_first and chasing_team must be distinct and each must be one
        of {team1, team2}. In Deequ: .satisfies("batting_first <> chasing_team AND
        (batting_first = team1 OR batting_first = team2) AND (chasing_team = team1
        OR chasing_team = team2)", "batting_chasing_membership").'
      sources:
      - start_line: 37
        end_line: 42
        file: ''
      uid: f740033d-e218-4591-8bd4-501b5dc0b8b6
    - text: 'If result IN (''runs'',''wickets''), then winner must be one of {team1,
        team2} and result_margin must be a non-null integer >= 1. In Deequ: .satisfies("CASE
        WHEN result IN (''runs'',''wickets'') THEN winner IN (team1, team2) AND result_margin
        IS NOT NULL AND CAST(result_margin AS DOUBLE) >= 1 ELSE TRUE END", "winner_margin_valid_for_decided_matches").'
      sources:
      - start_line: 50
        end_line: 55
        file: ''
      - start_line: 121
        end_line: 138
        file: ''
      uid: 5a32933e-d7a1-445f-8868-4e2b820ac789
    - text: 'If result = ''no result'', winner must be null (no winner recorded).
        In Deequ: .satisfies("CASE WHEN result = ''no result'' THEN winner IS NULL
        ELSE TRUE END", "no_result_has_no_winner").'
      sources:
      - start_line: 114
        end_line: 120
        file: ''
      uid: 4ffeb2be-3404-4b26-af76-5ef839bc5d2e
    - text: 'Tie handling: If result = ''tie'' AND super_over = ''Y'', winner must
        be one of {team1, team2}; if result = ''tie'' AND super_over <> ''Y'' (or
        null), winner must be null. In Deequ: .satisfies("CASE WHEN result = ''tie''
        AND super_over = ''Y'' THEN winner IN (team1, team2) WHEN result = ''tie''
        AND (super_over IS NULL OR super_over <> ''Y'') THEN winner IS NULL ELSE TRUE
        END", "tie_super_over_winner_rules").'
      sources:
      - start_line: 56
        end_line: 60
        file: ''
      - start_line: 139
        end_line: 151
        file: ''
      uid: de82c4df-f64e-458f-ba0e-b6cbadd8693f
    - text: 'super_over = ''Y'' implies the match result is ''tie''. In Deequ: .satisfies("CASE
        WHEN super_over = ''Y'' THEN result = ''tie'' ELSE TRUE END", "super_over_only_on_tie").'
      sources:
      - start_line: 56
        end_line: 60
        file: ''
      - start_line: 139
        end_line: 146
        file: ''
      uid: 083d4e9c-9050-44e1-9881-2313ab2d113a
    - text: 'Effective overs logic with method and target_overs: if method = ''D/L''
        then effective_overs must equal target_overs and target_overs must be not
        null and in (0, 20]; otherwise effective_overs must be 20.0. In Deequ: .satisfies("CASE
        WHEN method = ''D/L'' THEN effective_overs = target_overs AND target_overs
        IS NOT NULL AND target_overs > 0 AND target_overs <= 20 ELSE effective_overs
        = 20.0 END", "effective_overs_consistency").'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 43
        end_line: 46
        file: ''
      uid: 6eb32766-b724-4d6f-9e6e-6daa3b77a9dc
  '["date","season"]':
    code:
    - suggestion: '.satisfies("date IS NOT NULL AND season IS NOT NULL AND CAST(SUBSTR(date,
        1, 4) AS INT) = season", "Season-Date Coherence", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 2b7ae02d-d4ee-40ee-9d1f-87c36cb0a215
      source_assumptions:
      - b2946f6c-98e8-4fd7-a944-8c0165cb5940
    - suggestion: '.hasUniqueness([''season'', ''date'', ''team1'', ''team2''], lambda
        u: u == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 35ad8058-87a9-4903-a129-1b7c7c821fd6
      source_assumptions:
      - 2519a26a-b84d-4a16-8e20-23f23cd60da0
    assumptions:
    - text: 'Toss-derived innings consistency: toss_winner must be either team1 or
        team2; if toss_decision = ''bat'' then batting_first = toss_winner and chasing_team
        is the other team; if toss_decision != ''bat'' (i.e., ''field''), then batting_first
        is the other team and chasing_team = toss_winner. This can be validated with
        Deequ satisfies constraints such as: .satisfies("(toss_winner = team1 or toss_winner
        = team2) and (case when toss_decision = ''bat'' then batting_first = toss_winner
        and chasing_team in (team1, team2) and chasing_team <> batting_first else
        batting_first <> toss_winner and chasing_team = toss_winner end)", 1.0)'
      sources:
      - start_line: 36
        end_line: 42
        file: ''
      uid: 28d2a5fc-b1ae-4e2a-92ee-9537611e636b
    - text: 'D/L method and effective overs coherence: if method = ''D/L'' then target_overs
        must be present and numeric in (0, 20], and effective_overs must equal target_overs;
        if method != ''D/L'', effective_overs must be exactly 20.0. Example Deequ:
        .satisfies("case when method = ''D/L'' then target_overs is not null and target_overs
        > 0 and target_overs <= 20 and effective_overs = target_overs else effective_overs
        = 20.0 end", 1.0)'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 45
        end_line: 45
        file: ''
      uid: a9adcb4a-6188-41c8-9bd4-404854c61a82
    - text: 'Completed-match validity: when result in (''runs'',''wickets''), winner
        must be one of {team1, team2} and result_margin must be a positive integer.
        Example Deequ: .satisfies("case when result in (''runs'',''wickets'') then
        winner in (team1, team2) and result_margin is not null and result_margin >
        0 end", 1.0)'
      sources:
      - start_line: 49
        end_line: 55
        file: ''
      - start_line: 121
        end_line: 138
        file: ''
      uid: 52b2eb9c-e7e0-43da-8c8e-933de5bbae69
    - text: 'Tie semantics with/without Super Over: if result = ''tie'' and super_over
        = ''Y'', winner must be one of {team1, team2}; if result = ''tie'' and super_over
        <> ''Y'' (or null), winner must be null and result_margin must be null. Example
        Deequ: .satisfies("case when result = ''tie'' and super_over = ''Y'' then
        winner in (team1, team2) when result = ''tie'' and (super_over <> ''Y'' or
        super_over is null) then winner is null and result_margin is null end", 1.0)'
      sources:
      - start_line: 56
        end_line: 60
        file: ''
      - start_line: 139
        end_line: 151
        file: ''
      uid: 25a1a3b3-084b-46a4-ae8e-fb8ba405d6f0
    - text: 'No-result semantics: if result = ''no result'', winner and result_margin
        must both be null. Example Deequ: .satisfies("case when result = ''no result''
        then winner is null and result_margin is null end", 1.0)'
      sources:
      - start_line: 61
        end_line: 66
        file: ''
      - start_line: 114
        end_line: 120
        file: ''
      uid: 970a775d-d277-4d97-bac8-52c7afb98764
    - text: 'Team pairing validity per match: team1 and team2 must be non-null and
        must be different teams. Example Deequ: .satisfies("team1 is not null and
        team2 is not null and team1 <> team2", 1.0)'
      sources:
      - start_line: 69
        end_line: 82
        file: ''
      - start_line: 103
        end_line: 113
        file: ''
      uid: 39487eb6-2f3a-4753-a950-51fd3b7f8d8c
    - text: 'Season-date coherence: the calendar year extracted from date must equal
        season (e.g., year(to_date(date)) = season). Example Deequ: .satisfies("cast(substr(date,
        1, 4) as int) = season", 1.0)'
      sources:
      - start_line: 169
        end_line: 171
        file: ''
      uid: 1f5bd0c2-d563-44e1-87dc-7028689c5845
    - text: 'Match identity uniqueness to avoid double counting in points: the combination
        (season, date, team1, team2) should be unique across the dataset. Example
        Deequ: .isUnique(["season", "date", "team1", "team2"])'
      sources:
      - start_line: 102
        end_line: 158
        file: ''
      - start_line: 169
        end_line: 171
        file: ''
      uid: b2946f6c-98e8-4fd7-a944-8c0165cb5940
    - text: 'Winner must align with innings role: if result = ''runs'' then winner
        must equal batting_first; if result = ''wickets'' then winner must equal chasing_team.
        Example Deequ: .satisfies("case when result = ''runs'' then winner = batting_first
        when result = ''wickets'' then winner = chasing_team end", 1.0)'
      sources:
      - start_line: 36
        end_line: 42
        file: ''
      - start_line: 121
        end_line: 138
        file: ''
      uid: 2519a26a-b84d-4a16-8e20-23f23cd60da0
