      uid: f9e529e9-26ba-445e-b729-9f9c044b37d0
    - text: 'For rows with result = ''no result'', the ''winner'' must be null (no
        winner should be recorded). This can be represented as a Deequ constraint:
        .satisfies("CASE WHEN result = ''no result'' THEN CASE WHEN winner IS NULL
        THEN 1 ELSE 0 END ELSE 1 END", "Winner null for no result", lambda x: x ==
        1).'
      sources:
      - start_line: 114
        end_line: 120
        file: ''
      uid: 02bff261-df65-4e1f-8055-7359661a2ad3
    - text: 'When a winner is required (result IN (''runs'',''wickets'') OR (result
        = ''tie'' AND super_over = ''Y'')), the ''winner'' value must exactly match
        one of the two teams in that row (team1 or team2). This can be represented
        as a Deequ constraint: .satisfies("CASE WHEN result IN (''runs'',''wickets'')
        OR (result = ''tie'' AND super_over = ''Y'') THEN CASE WHEN winner = team1
        OR winner = team2 THEN 1 ELSE 0 END ELSE 1 END", "Winner is one of the two
        teams", lambda x: x == 1).'
      sources:
      - start_line: 123
        end_line: 124
        file: ''
      - start_line: 132
        end_line: 133
        file: ''
      - start_line: 141
        end_line: 142
        file: ''
      uid: d1670574-4d82-496a-b89d-298263428aa1
    - text: 'For rows with result = ''tie'' and super_over != ''Y'' (a tied match
        without Super Over), the ''winner'' should be null for consistency (no team
        wins). This can be represented as a Deequ constraint: .satisfies("CASE WHEN
        result = ''tie'' AND super_over <> ''Y'' THEN CASE WHEN winner IS NULL THEN
        1 ELSE 0 END ELSE 1 END", "Winner null for non-SO ties", lambda x: x == 1).'
      sources:
      - start_line: 147
        end_line: 151
        file: ''
      uid: 5e0ff45f-15fa-4d8d-be8e-88cc80a1bfad
    - text: 'The input may use common null-like placeholders (''NullValue'', ''null'',
        ''NULL'', ''None'', or empty string) in the ''winner'' column; these should
        be interpreted as missing values. A validation could ensure these placeholders
        only appear where ''winner'' is allowed to be missing (no result or tie without
        Super Over): Deequ .satisfies("CASE WHEN winner IN (''NullValue'',''null'',''NULL'',''None'','''')
        THEN CASE WHEN result = ''no result'' OR (result = ''tie'' AND super_over
        <> ''Y'') THEN 1 ELSE 0 END ELSE 1 END", "Null-like winner only when optional",
        lambda x: x == 1).'
      sources:
      - start_line: 22
        end_line: 26
        file: ''
      - start_line: 114
        end_line: 120
        file: ''
      - start_line: 147
        end_line: 151
        file: ''
      uid: 7be8a79d-a356-477b-a432-a6ac90c57830
