        AS double) AS int) THEN 1 ELSE 0 END ELSE 1 END", "Margin present and integer
        for decisive results", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 676d13f3-ca6d-4dbd-b1b0-a6e1f28a934e
      source_assumptions:
      - 6d3ce8af-9e6b-4c12-997e-972fb4d88522
    - suggestion: '.satisfies("CASE WHEN `result` = ''tie'' AND `super_over` = ''Y''
        THEN CASE WHEN `winner` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Winner
