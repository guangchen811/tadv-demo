      uid: 14fa3867-8ab0-45c7-975d-580fceac388a
      source_assumptions:
      - bf1266b2-e3b7-4254-b648-dbae92e61308
    - suggestion: '.satisfies("CASE WHEN `result` = ''no result'' THEN CASE WHEN `winner`
        IS NULL THEN 1 ELSE 0 END ELSE 1 END", "No winner on no result", lambda x:
        x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 62753886-7596-48c2-b4eb-b10e56a00522
      source_assumptions:
      - bf1266b2-e3b7-4254-b648-dbae92e61308
    assumptions:
    - text: 'The ''result'' column should be complete (no nulls), since the code directly
        branches on exact string comparisons of ''result'' and uses it in outputs
        without null-handling. A suitable rule: Deequ .isComplete(''result'') == 1.0
        or Great Expectations expect_column_values_to_not_be_null.'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 47
        end_line: 66
        file: ''
      - start_line: 102
        end_line: 154
        file: ''
      - start_line: 169
        end_line: 172
        file: ''
      uid: b40eb73f-7623-4794-8ab1-5444f61a043a
    - text: 'All values in ''result'' must be one of the four exact, lowercase tokens:
        ''runs'', ''wickets'', ''tie'', or ''no result'' (including the space). Any
        other value is treated as ''Unknown'' and will misclassify points. A suitable
        rule: Deequ .satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'',''no
        result'') THEN 1 ELSE 0 END", ''Valid result values'', lambda x: x == 1.0)
        or Great Expectations expect_column_values_to_be_in_set([...]).'
      sources:
      - start_line: 49
        end_line: 64
        file: ''
      - start_line: 121
        end_line: 152
        file: ''
      uid: e6bad610-d86e-4b26-80f6-c03873639a61
    - text: 'The ''result'' values must be canonically formatted (lowercase and trimmed)
        to match exact comparisons (e.g., ''runs'' not ''Runs'', no leading/trailing
        spaces). This is implicitly required by the equality checks. A suitable rule:
        Deequ .satisfies("CASE WHEN `result` = lower(trim(`result`)) THEN 1 ELSE 0
        END", ''Result casing/whitespace'', lambda x: x == 1.0).'
      sources:
      - start_line: 49
        end_line: 62
        file: ''
      - start_line: 121
        end_line: 140
        file: ''
      uid: ce48e4b5-657d-47c8-ba5c-2a2956169bbf
    - text: 'For rows where ''result'' is ''runs'' or ''wickets'', ''result_margin''
        must be present and parseable as an integer (no NaN/non-numeric), otherwise
        int() will fail. A suitable rule: Deequ .satisfies("CASE WHEN `result` IN
        (''runs'',''wickets'') THEN CASE WHEN cast(`result_margin` AS double) IS NOT
        NULL THEN 1 ELSE 0 END ELSE 1 END", ''Margin present for decisive results'',
        lambda x: x == 1.0) or Great Expectations expect_column_values_to_not_be_null
        with a row_condition on result in that set and expect_column_values_to_be_of_type/castable.'
      sources:
      - start_line: 50
        end_line: 55
        file: ''
      - start_line: 121
        end_line: 138
        file: ''
      uid: 6d3ce8af-9e6b-4c12-997e-972fb4d88522
    - text: 'For rows where ''result'' is ''tie'' and ''super_over'' == ''Y'', ''winner''
        must be non-null (the code awards a win to the super over winner). For ''result''
        == ''no result'', ''winner'' should be null (as hinted by the guard comment).
        Suitable rules: (a) Deequ .satisfies("CASE WHEN `result` = ''tie'' AND `super_over`
        = ''Y'' THEN CASE WHEN `winner` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END",
        ''Winner present for super-over ties'', lambda x: x == 1.0); (b) Deequ .satisfies("CASE
        WHEN `result` = ''no result'' THEN CASE WHEN `winner` IS NULL THEN 1 ELSE
        0 END ELSE 1 END", ''No winner on no result'', lambda x: x == 1.0).'
      sources:
      - start_line: 56
        end_line: 60
        file: ''
      - start_line: 139
        end_line: 147
        file: ''
      - start_line: 114
        end_line: 120
        file: ''
      uid: bf1266b2-e3b7-4254-b648-dbae92e61308
  '["id","team1","team2"]':
    code: []
    assumptions:
    - text: 'Each match must be between two distinct teams: team1 != team2. Deequ
        example: .addConstraint(Constraint.satisfies("team1 <> team2", "team1_team2_are_distinct",
        Array("team1","team2")))'
      sources:
      - start_line: 37
        end_line: 39
        file: ''
      - start_line: 103
        end_line: 106
        file: ''
      uid: b5c3d6d0-c0fa-4c6e-8a48-e042dc7d0a3b
    - text: 'The toss_winner must be one of the two participating teams (team1 or
        team2). Deequ example: .addConstraint(Constraint.satisfies("toss_winner =
        team1 OR toss_winner = team2", "toss_winner_in_match_teams", Array("toss_winner","team1","team2")))'
      sources:
      - start_line: 37
        end_line: 39
        file: ''
      uid: 7c8b1c6f-b4cd-490c-9640-f167d364cf17
    - text: 'Derived participants must be consistent: batting_first and chasing_team
        must each be either team1 or team2, and they must be different. Deequ example:
        .addConstraint(Constraint.satisfies("(batting_first IN (team1, team2)) AND
        (chasing_team IN (team1, team2)) AND (batting_first <> chasing_team)", "batting_first_chasing_team_valid",
        Array("batting_first","chasing_team","team1","team2")))'
      sources:
      - start_line: 37
        end_line: 43
        file: ''
      uid: 71130aa2-73b8-4325-b0ed-54882a011347
    - text: 'For matches with a decisive result (result IN (''runs'',''wickets''))
        or ties decided by super over (result = ''tie'' AND super_over = ''Y''), winner
        must be either team1 or team2. Deequ example: .addConstraint(Constraint.satisfies("CASE
        WHEN (result IN (''runs'',''wickets'')) OR (result = ''tie'' AND super_over
        = ''Y'') THEN (winner = team1 OR winner = team2) ELSE true END", "winner_is_one_of_teams_when_required",
        Array("result","super_over","winner","team1","team2")))'
      sources:
      - start_line: 121
        end_line: 138
        file: ''
      - start_line: 139
        end_line: 146
        file: ''
      uid: 7f3b2a1b-ec60-4957-bd97-ece72e4cd6ce
    - text: 'For matches with a decisive result (result IN (''runs'',''wickets'')),
        result_margin must be present, numeric, and strictly positive (integer). Deequ
        example: .addConstraint(Constraint.satisfies("CASE WHEN result IN (''runs'',''wickets'')
        THEN result_margin IS NOT NULL AND result_margin > 0 AND CAST(result_margin
        AS INT) = result_margin ELSE true END", "margin_present_positive_for_decisions",
        Array("result","result_margin")))'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 50
        end_line: 55
        file: ''
      - start_line: 121
        end_line: 138
        file: ''
      uid: c44a8a99-a985-46b0-80de-48123c1a8053
    - text: 'For matches with result = ''no result'', winner must be null/empty. Deequ
        example: .addConstraint(Constraint.satisfies("CASE WHEN result = ''no result''
        THEN winner IS NULL ELSE true END", "winner_null_on_no_result", Array("result","winner")))'
      sources:
      - start_line: 22
        end_line: 26
        file: ''
      - start_line: 114
        end_line: 120
        file: ''
      uid: fe5cdbc0-6c0f-441f-9f46-911c39f822c6
    - text: 'For matches with result = ''tie'' and super_over = ''Y'', winner must
        be present and one of team1 or team2; for ties without super over (super_over
        <> ''Y''), winner must be null. Deequ example: .addConstraint(Constraint.satisfies("CASE
        WHEN result = ''tie'' AND super_over = ''Y'' THEN winner IS NOT NULL AND (winner
        = team1 OR winner = team2) WHEN result = ''tie'' AND super_over <> ''Y'' THEN
        winner IS NULL ELSE true END", "winner_rules_for_tie", Array("result","super_over","winner","team1","team2")))'
      sources:
      - start_line: 56
        end_line: 60
        file: ''
      - start_line: 139
        end_line: 151
        file: ''
      - start_line: 22
        end_line: 26
        file: ''
      uid: 0c8df8e9-9531-4566-a6e9-16398ab593ba
    - text: 'If method = ''D/L'', then target_overs must be present and > 0 (numeric)
        to compute effective_overs correctly. Deequ example: .addConstraint(Constraint.satisfies("CASE
        WHEN method = ''D/L'' THEN target_overs IS NOT NULL AND target_overs > 0 ELSE
        true END", "target_overs_required_for_DL", Array("method","target_overs")))'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 45
        end_line: 45
        file: ''
      uid: 3f3f9a45-becd-4c61-88ae-e212ccc71129
  '["method","target_overs"]':
    code: []
    assumptions:
    - text: 'If method = ''D/L'', then target_overs must be present (non-null), numeric,
        and in the range (0, 20]. Deequ example: .satisfies("CASE WHEN method = ''D/L''
        THEN target_overs IS NOT NULL AND target_overs > 0 AND target_overs <= 20
        ELSE true END", "dl_target_overs_valid")'
      sources:
      - start_line: 27
        end_line: 31
        file: ''
      - start_line: 45
        end_line: 45
        file: ''
      uid: 64a012ab-46cc-49e2-9768-b3349a4d2b1c
    - text: 'If method is null or not ''D/L'', the match should be a full 20-over
        game; thus target_overs should be exactly 20. Deequ example: .satisfies("method
        <> ''D/L'' OR target_overs = 20", "non_dl_target_overs_equals_20")'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      uid: 6b6ebe21-7768-456e-96cb-05326f90ea34
    - text: "When result \u2208 {'runs','wickets'}, result_margin must be present\
        \ (non-null), numeric, and an integer >= 1 (since it is cast to int for display/points).\
        \ Deequ example: .satisfies(\"CASE WHEN result IN ('runs','wickets') THEN\
        \ result_margin IS NOT NULL AND result_margin >= 1 AND result_margin = CAST(result_margin\
        \ AS INT) ELSE true END\", \"margin_valid_when_needed\")"
      sources:
      - start_line: 27
        end_line: 31
        file: ''
      - start_line: 49
        end_line: 56
        file: ''
      - start_line: 121
        end_line: 136
        file: ''
      uid: a5df728b-4b05-4e5e-aa5c-d24d86af96cf
    - text: "For completed results (result \u2208 {'runs','wickets'}), winner must\
        \ be non-null and equal to either team1 or team2. Deequ example: .satisfies(\"\
        CASE WHEN result IN ('runs','wickets') THEN winner IN (team1, team2) ELSE\
        \ true END\", \"winner_is_participant_when_completed\")"
      sources:
      - start_line: 121
        end_line: 136
        file: ''
      uid: 0e4020b0-f8ee-4f16-a4c7-b7366fe2eb84
    - text: "For ties: if result = 'tie' and super_over = 'Y', winner must be non-null\
        \ and equal to team1 or team2; if result = 'tie' and super_over \u2260 'Y'\
        \ (or null), winner must be null. Deequ example: .satisfies(\"CASE WHEN result\
        \ = 'tie' AND super_over = 'Y' THEN winner IN (team1, team2) WHEN result =\
        \ 'tie' AND (super_over IS NULL OR super_over <> 'Y') THEN winner IS NULL\
        \ ELSE true END\", \"tie_winner_rules\")"
      sources:
      - start_line: 139
        end_line: 147
        file: ''
      uid: cdc52fe5-fce2-4c36-8db4-87446df37216
    - text: 'For ''no result'' matches, winner must be null. Deequ example: .satisfies("CASE
        WHEN result = ''no result'' THEN winner IS NULL ELSE true END", "no_result_has_no_winner")'
      sources:
      - start_line: 114
        end_line: 120
        file: ''
      - start_line: 22
        end_line: 26
        file: ''
      uid: c74cdab8-81c2-45b6-b1f2-e604d21d69f2
    - text: 'toss_winner must be one of the participating teams (team1 or team2).
        Deequ example: .satisfies("toss_winner IN (team1, team2)", "toss_winner_is_participant")'
      sources:
      - start_line: 37
        end_line: 43
        file: ''
      uid: 5b291abc-c1fc-459a-9560-2c4b6521030a
    - text: 'batting_first and chasing_team must be consistent with toss_decision
        and teams: both must be in {team1, team2}, must be different from each other,
        and when toss_decision = ''bat'' then batting_first = toss_winner. Deequ example:
        .satisfies("batting_first IN (team1, team2) AND chasing_team IN (team1, team2)
        AND batting_first <> chasing_team AND (toss_decision <> ''bat'' OR batting_first
        = toss_winner)", "innings_order_consistency")'
      sources:
      - start_line: 37
        end_line: 43
        file: ''
      - start_line: 41
        end_line: 42
        file: ''
      uid: b8f593cb-52f1-4675-bd4e-5f47ee81dc74
  '["result","result_margin"]':
    code: []
    assumptions:
    - text: 'When result = ''runs'', result_margin must be present and a positive
        integer (>= 1). We could represent this in Deequ as: .satisfies("case when
        result = ''runs'' then result_margin is not null and result_margin >= 1 and
        result_margin = cast(result_margin as int) else true end", "runs_margin_positive_int").'
      sources:
      - start_line: 49
        end_line: 55
        file: ''
      - start_line: 121
        end_line: 129
        file: ''
      uid: d42cb320-c1cc-4e90-99d2-8ba8a405605f
    - text: 'When result = ''wickets'', result_margin must be present and an integer
        between 1 and 10 inclusive. We could represent this in Deequ as: .satisfies("case
        when result = ''wickets'' then result_margin between 1 and 10 and result_margin
        = cast(result_margin as int) else true end", "wickets_margin_1_to_10_int").'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      - start_line: 130
        end_line: 138
        file: ''
      uid: 5b50146f-dea5-4447-842d-d7bdbd91c5f0
    - text: 'For decided matches (result in (''runs'',''wickets'')) or for ties resolved
        by Super Over (result = ''tie'' and super_over = ''Y''), winner must be non-null
        and equal to either team1 or team2. Deequ: .satisfies("case when result in
        (''runs'',''wickets'') or (result = ''tie'' and super_over = ''Y'') then winner
        in (team1, team2) else true end", "winner_is_one_of_teams").'
      sources:
      - start_line: 121
        end_line: 138
        file: ''
      - start_line: 139
        end_line: 147
        file: ''
      uid: 05ed9749-975c-4ee8-8182-41bff5172486
    - text: 'When result = ''no result'', winner must be null. Deequ: .satisfies("case
        when result = ''no result'' then winner is null else true end", "no_result_has_no_winner").'
      sources:
      - start_line: 114
        end_line: 120
        file: ''
      uid: fd9f0972-4c64-46a9-b937-784ee49d6788
    - text: 'When result in (''tie'',''no result''), result_margin should be null
        (margin only applies to ''runs'' or ''wickets''). Deequ: .satisfies("case
        when result in (''tie'',''no result'') then result_margin is null else true
        end", "no_margin_when_tie_or_nr").'
      sources:
      - start_line: 49
        end_line: 55
        file: ''
      - start_line: 56
        end_line: 63
        file: ''
      - start_line: 114
        end_line: 120
        file: ''
      uid: 61405fa4-440a-4c06-864c-b995556997dd
    - text: 'If super_over = ''Y'', then result must be ''tie''. Deequ: .satisfies("case
        when super_over = ''Y'' then result = ''tie'' else true end", "super_over_only_when_tie").'
      sources:
      - start_line: 56
        end_line: 60
        file: ''
      - start_line: 139
        end_line: 147
        file: ''
      uid: 5de48b0a-5597-4d96-9dc7-8ad43d789cfa
    - text: 'For a tie without Super Over (result = ''tie'' and super_over <> ''Y''
        or null), winner should be null. Deequ: .satisfies("case when result = ''tie''
        and (super_over is null or super_over <> ''Y'') then winner is null else true
        end", "no_winner_when_tie_without_super_over").'
      sources:
      - start_line: 139
        end_line: 151
        file: ''
      uid: ed175fb2-e3b2-45c3-914a-4a0f6c595523
    - text: 'If method = ''D/L'', then target_overs must be non-null and within (0,
        20]. Deequ: .satisfies("case when method = ''D/L'' then target_overs is not
        null and target_overs > 0 and target_overs <= 20 else true end", "dl_target_overs_valid").'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 45
        end_line: 45
        file: ''
      uid: 1527f486-b34e-4839-8475-7913e88deae5
    - text: 'toss_winner must be one of the participating teams (team1 or team2).
        Deequ: .satisfies("toss_winner in (team1, team2)", "toss_winner_is_participating_team").'
      sources:
      - start_line: 37
        end_line: 39
        file: ''
      uid: 05bbf88c-7fd1-4510-a7b8-d93338b4c84c
  '["result","super_over"]':
    code: []
    assumptions:
    - text: 'Super overs occur only for tied matches. In particular: (a) If super_over
        = ''Y'' then result must be ''tie''; and (b) If result <> ''tie'' then super_over
        must be ''N''. This can be represented in Deequ as two compliances: .hasCompliance(''super_over_only_on_tie'',
        "super_over <> ''Y'' OR result = ''tie''", 1.0) and .hasCompliance(''non_tie_has_no_super_over'',
        "result <> ''tie'' OR super_over = ''N''", 1.0).'
      sources:
      - start_line: 56
        end_line: 60
        file: ''
      - start_line: 139
        end_line: 151
        file: ''
      uid: 00e74e74-0f89-4bf5-b4c4-a5c83386ba6c
    - text: 'In tied matches: (a) If super_over = ''Y'' then winner must be non-null
        and equal to either team1 or team2; (b) If super_over <> ''Y'' then winner
        must be null. Deequ examples: .hasCompliance(''tie_super_over_has_winner'',
        "NOT (result = ''tie'' AND super_over = ''Y'') OR (winner IS NOT NULL AND
        (winner = team1 OR winner = team2))", 1.0) and .hasCompliance(''tie_no_super_over_has_no_winner'',
        "NOT (result = ''tie'' AND super_over <> ''Y'') OR winner IS NULL", 1.0).'
      sources:
      - start_line: 49
        end_line: 61
