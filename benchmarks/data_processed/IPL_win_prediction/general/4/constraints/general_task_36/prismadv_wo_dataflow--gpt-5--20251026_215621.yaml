    - text: 'If ''method'' == ''D/L'', then ''target_overs'' must be present and a
        valid numeric overs value within a T20 range (0 < target_overs <= 20). This
        can be represented as a conditional validation: Deequ: .satisfies("CASE WHEN
        method = ''D/L'' THEN CASE WHEN target_overs > 0 AND target_overs <= 20 THEN
        1 ELSE 0 END ELSE 1 END", ''D/L requires valid target_overs'', lambda x: x
        == 1.0). Great Expectations: expect_conditionally_consistent with a conditional
        expectation expect_column_values_to_be_between on target_overs conditioned
        on method == ''D/L''.'
      sources:
      - start_line: 31
        end_line: 32
        file: ''
      - start_line: 45
        end_line: 45
        file: ''
      uid: c88e0af3-4091-4823-90a8-b1aebb61dc00
    - text: The comparison to detect the method is case- and format-sensitive and
        expects exactly 'D/L'. Therefore, any alternate spellings (e.g., 'DLS', 'd/l',
        'D/L method') should not appear in the input. This can be captured by constraining
        non-null values to the exact token 'D/L' (e.g., Great Expectations expect_column_values_to_be_in_set(['D/L'])
        with mostly=1.0 and ignoring nulls; or Deequ .where("method IS NOT NULL").isContainedIn('method',
        ['D/L']).
