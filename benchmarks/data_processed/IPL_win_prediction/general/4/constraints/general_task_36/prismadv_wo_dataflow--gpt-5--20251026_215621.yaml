    assumptions:
    - text: 'The input must contain the ''team1'' column, because it is accessed without
        any existence checks throughout the script (e.g., computing opponent, collecting
        unique teams, iterating rows, and writing outputs). A suitable validation
        is: Great Expectations expect_column_to_exist(''team1'') or Deequ hasColumn(''team1'').'
      sources:
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 103
        end_line: 109
        file: ''
      - start_line: 169
        end_line: 171
        file: ''
      uid: 19a0a4bc-af36-4013-8a9d-19aaf80efdb9
    - text: The 'team1' column should be complete (no nulls). Null or NaN values would
        become bogus teams in the points dictionary and skew match counts. Enforce
        with Deequ .isComplete('team1') or Great Expectations expect_column_values_to_not_be_null('team1').
      sources:
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 103
        end_line: 113
        file: ''
      uid: e17298d9-fa57-4063-9d61-489ca97ccfcb
    - text: 'The ''team1'' column should not contain placeholder null-like tokens
        or empty/whitespace-only strings (e.g., '''', ''NULL'', ''NullValue'', ''None'',
        ''null''), since they would be treated as real team names downstream. Enforce
        with Deequ .satisfies("CASE WHEN team1 IS NULL THEN 0 WHEN trim(team1) = ''''
        THEN 0 WHEN upper(team1) IN (''NULL'',''NONE'') THEN 0 WHEN team1 = ''NullValue''
        THEN 0 ELSE 1 END", ''team1 non-placeholder'', lambda x: x == 1) or GE expect_column_values_to_not_be_in_set(''team1'',
        ['''', ''NULL'', ''NullValue'', ''None'', ''null'']) plus expect_column_values_to_match_regex(''team1'',
        ''^\\S(.*\\S)?$'').'
      sources:
      - start_line: 22
        end_line: 26
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      uid: 15d725a0-bd6b-4031-800a-13c53d67944f
    - text: 'Team names in ''team1'' must use the exact same canonical string representation
        (case and whitespace) as in ''toss_winner'' and ''winner'' so that equality
        checks succeed. Specifically: (a) toss_winner must equal either team1 or team2
        for every row; (b) for decided matches (result in (''runs'',''wickets'') or
        result=''tie'' and super_over=''Y''), winner must equal either team1 or team2.
        Enforce with Deequ: .satisfies(''(toss_winner = team1 OR toss_winner = team2)'',
        ''toss_winner is one of the teams'', lambda x: x == 1) and .satisfies("CASE
        WHEN result IN (''runs'',''wickets'') OR (result = ''tie'' AND super_over
        = ''Y'') THEN CASE WHEN winner IN (team1, team2) THEN 1 ELSE 0 END ELSE 1
        END", ''winner is one of team1/team2 when required'', lambda x: x == 1).'
      sources:
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 121
        end_line: 138
        file: ''
      - start_line: 140
        end_line: 147
        file: ''
      uid: fa2128a4-a9b6-4f26-9bd5-2a1e96cb9a94
    - text: 'For each match, ''team1'' should be different from ''team2'' (no self-matches),
        as the opponent is derived by switching between these two columns. Enforce
        with Deequ .satisfies(''team1 <> team2'', ''No self-matches'', lambda x: x
        == 1).'
      sources:
      - start_line: 37
        end_line: 39
        file: ''
      uid: e51866b8-fc67-4d54-9111-da3fa9f40f94
