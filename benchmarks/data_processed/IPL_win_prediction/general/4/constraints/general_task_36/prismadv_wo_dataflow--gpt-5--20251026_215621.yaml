    assumptions:
    - text: 'For rows where result is ''runs'' or ''wickets'', ''result_margin'' must
        be present (non-null) and numeric, because the code converts it to numeric
        and then casts it to int in multiple places. A suitable constraint is: conditionally
        require non-null and parseable numbers when result IN (''runs'',''wickets'').
        For example (Deequ): .where("result IN (''runs'',''wickets'')").isComplete(''result_margin'')
        and .where("result IN (''runs'',''wickets'')").isNonNegative(''result_margin'')
        and .where("result IN (''runs'',''wickets'')").isFractional(''result_margin'').'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 47
        end_line: 55
        file: ''
      - start_line: 121
        end_line: 138
        file: ''
      uid: 0d9c6f7a-8634-4244-9a46-3cfd4e792b71
    - text: 'For rows where result is ''runs'' or ''wickets'', ''result_margin'' should
        be an integer-like value (no fractional part), since the code uses int(result_margin)
        for display and points computations. This can be enforced by checking that
        result_margin equals its floor under that condition. For example (Deequ):
        .satisfies("CASE WHEN result IN (''runs'',''wickets'') THEN result_margin
        = floor(result_margin) ELSE true END", ''Integer-like margin'', lambda x:
        x == 1).'
      sources:
      - start_line: 47
        end_line: 55
        file: ''
      - start_line: 121
        end_line: 138
        file: ''
      uid: 82904b26-f092-4e39-b1e8-2ba9cb9b7c56
    - text: 'For rows where result is ''runs'' or ''wickets'', ''result_margin'' should
        be strictly positive (> 0). Zero or negative margins would break the semantics
        of winner/loser net margins. For example (Deequ): .satisfies("CASE WHEN result
        IN (''runs'',''wickets'') THEN result_margin > 0 ELSE true END", ''Positive
        margin for decisive results'', lambda x: x == 1).'
      sources:
      - start_line: 47
        end_line: 55
        file: ''
      - start_line: 121
        end_line: 138
        file: ''
      uid: 356f9696-fc41-43dc-9e18-43ef7152c217
    - text: '''result_margin'' may be null or non-numeric (which will be coerced to
        null) for rows where result is not ''runs'' or ''wickets'' (e.g., ''tie''
        or ''no result''), because the code does not use ''result_margin'' in those
        cases and even short-circuits processing for ''no result''. A permissive rule
        is acceptable there. For example (Deequ): do not require completeness when
        result NOT IN (''runs'',''wickets''); or equivalently enforce the non-null
        constraint only when result IN (''runs'',''wickets'').'
      sources:
