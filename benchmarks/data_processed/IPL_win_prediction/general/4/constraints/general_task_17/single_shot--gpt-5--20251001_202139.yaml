constraints:
  date:
    code:
    - - .hasPattern('date', r'^\d{4}-\d{2}-\d{2}$')
      - Valid
    - - .isComplete('date')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
  match_type:
    code:
    - - .isComplete('match_type')
      - Valid
    - - .isContainedIn('match_type', ['League', 'Eliminator', 'Qualifier 1', 'Qualifier
        2', 'Final', 'Semi Final', 'Elimination Final'])
      - Valid
    assumptions: []
  method:
    code:
    - - .satisfies("method IS NULL OR method = 'D/L'", 'method_null_or_DL')
      - Valid
    assumptions: []
  result:
    code:
    - - .isComplete('result')
      - Valid
    - - .isContainedIn('result', ['runs', 'wickets', 'tie', 'no result'])
      - Valid
    assumptions: []
  result_margin:
    code:
    - - .satisfies("(result IN ('runs','wickets') AND result_margin IS NOT NULL AND
        result_margin > 0) OR (result NOT IN ('runs','wickets'))", 'positive_margin_when_applicable')
      - Valid
    assumptions: []
  season:
    code:
    - - .isComplete('season')
      - Valid
    - - .isNonNegative('season')
      - Valid
    assumptions: []
  super_over:
    code:
    - - .isComplete('super_over')
      - Valid
    - - .isContainedIn('super_over', ['Y', 'N'])
      - Valid
    assumptions: []
  target_overs:
    code:
    - - .satisfies("(method <> 'D/L') OR (target_overs IS NOT NULL AND target_overs
        > 0 AND target_overs <= 20)", 'dl_requires_target_overs_valid')
      - Invalid
    - - .satisfies("target_overs IS NULL OR (target_overs > 0 AND target_overs <=
        20)", 'target_overs_range')
      - Valid
    assumptions: []
  target_runs:
    code:
    - - .satisfies('target_runs IS NULL OR target_runs > 0', 'target_runs_positive_if_present')
      - Valid
    assumptions: []
  team1:
    code:
    - - .isComplete('team1')
      - Valid
    - - .satisfies('team1 <> team2', 'team1_not_equal_team2')
      - Valid
    assumptions: []
  team2:
    code:
    - - .isComplete('team2')
      - Valid
    assumptions: []
  toss_decision:
    code:
    - - .isComplete('toss_decision')
      - Valid
    - - .isContainedIn('toss_decision', ['field', 'bat'])
      - Valid
    assumptions: []
  toss_winner:
    code:
    - - .isComplete('toss_winner')
      - Valid
    - - .satisfies('(toss_winner = team1) OR (toss_winner = team2)', 'toss_winner_is_team1_or_team2')
      - Valid
    assumptions: []
  umpire1:
    code:
    - - .isComplete('umpire1')
      - Valid
    assumptions: []
  umpire2:
    code:
    - - .isComplete('umpire2')
      - Valid
    assumptions: []
  venue:
    code:
    - - .isComplete('venue')
      - Valid
    assumptions: []
  winner:
    code:
    - - .satisfies("(result NOT IN ('runs','wickets')) OR (winner IS NOT NULL AND
        (winner = team1 OR winner = team2))", 'winner_present_and_valid_for_decided_matches')
      - Valid
    assumptions: []
