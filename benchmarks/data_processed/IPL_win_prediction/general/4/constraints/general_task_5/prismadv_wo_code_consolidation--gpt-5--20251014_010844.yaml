        end_line: 19
        file: ''
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 27
        end_line: 29
        file: ''
      uid: adbb6762-e7c3-4ba5-be57-3e883cb5ae7c
    - text: 'In the output standings, the combination of ''season'' and ''team'' must
        be unique (exactly one row per team per season). Example Deequ constraint
        (on the output DataFrame): .isUnique([''season'',''team''])'
      sources:
      - start_line: 35
        end_line: 42
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      uid: 8bb1c9e5-b14d-47ab-817d-fbc8bb16c1e9
    - text: 'In the output standings, aggregate columns must be internally consistent:
        matches = wins + losses + no_results and points = 2*wins + no_results for
        each (season, team). Example Deequ constraints (on the output DataFrame):
        .hasCompliance(''matches_balance'', ''matches = wins + losses + no_results'',
        lambda c: c == 1.0) and .hasCompliance(''points_formula'', ''points = 2*wins
        + no_results'', lambda c: c == 1.0)'
      sources:
