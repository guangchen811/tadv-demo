        \ ('no result','N'). We could represent this as a Deequ multi-column rule\
        \ like: .satisfies(\"((result = 'tie' AND super_over = 'Y') OR (result IN\
        \ ('runs','wickets','no result') AND super_over = 'N'))\", 'result_super_over_consistency')."
      sources:
      - start_line: 19
        end_line: 23
        file: ''
      - start_line: 27
        end_line: 33
        file: ''
      uid: 01ea6946-2977-4834-8557-2ad2f100cb32
    - text: 'Winner validity depends on outcome: if result <> ''no result'', winner
        must be non-null and equal to either team1 or team2; if result = ''no result'',
        winner must be null. This can be enforced with: .satisfies("((result <> ''no
        result'' AND winner IS NOT NULL AND (winner = team1 OR winner = team2)) OR
        (result = ''no result'' AND winner IS NULL))", ''winner_matches_participating_team'').'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 27
        end_line: 30
        file: ''
      - start_line: 33
        end_line: 33
        file: ''
      uid: 68d99fb3-724f-4fc7-9288-2099fdb89bbd
    - text: 'For each match id where result <> ''no result'', exactly one team must
        be the winner (and the other the loser). On the participants view (two rows
        per match), enforce: groupBy(''id'').hasSum(''is_winner'', _ == 1, where =
        "result <> ''no result''").'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 27
        end_line: 30
        file: ''
      uid: 4b3f24af-0b4d-4fd9-878e-7c07595ea05b
    - text: 'Each match must involve two distinct teams: team1 and team2 are non-null
        and team1 <> team2. This can be encoded as: .satisfies("team1 IS NOT NULL
        AND team2 IS NOT NULL AND team1 <> team2", ''distinct_teams_per_match'').'
      sources:
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 21
        end_line: 22
        file: ''
      uid: 85f144a5-9771-433a-bef9-743b1fff9e91
    - text: 'Super over implies a decided match: if super_over = ''Y'' then result
        must be ''tie'' (tie after regular overs) and winner must be non-null and
        one of {team1, team2}. Deequ example: .satisfies("(super_over <> ''Y'') OR
        (result = ''tie'' AND winner IS NOT NULL AND (winner = team1 OR winner = team2))",
        ''super_over_implies_tie_and_winner'').'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 27
        end_line: 29
        file: ''
      uid: 5d0945c7-cf98-4830-8094-0b9597b6d5b2
  '["result","super_over","winner"]':
    code: []
    assumptions:
    - text: 'Winner validity is tied to result: For every match where result != ''no
        result'', winner must be present and equal to either team1 or team2. For matches
        where result = ''no result'', there must be no effective winner (winner should
        be null or not equal to team1 nor team2). Example constraints: Deequ Compliance
        - CASE WHEN result <> ''no result'' THEN winner IS NOT NULL AND (winner =
        team1 OR winner = team2) ELSE TRUE END; Deequ Compliance - CASE WHEN result
        = ''no result'' THEN winner IS NULL OR (winner <> team1 AND winner <> team2)
        ELSE TRUE END.'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 27
        end_line: 33
        file: ''
      uid: 4be65f42-ae34-45ed-8f5b-10d0cdc85c60
    - text: "Tie \u2194 Super Over equivalence: A super over is played if and only\
        \ if the match was tied at the end of regular overs. Formally, (super_over\
        \ = 'Y') \u21D4 (result = 'tie'); additionally, if result = 'no result' then\
        \ super_over must be 'N'. Example constraints: Deequ Compliance - CASE WHEN\
        \ super_over = 'Y' THEN result = 'tie' ELSE TRUE END; Deequ Compliance - CASE\
        \ WHEN result = 'tie' THEN super_over = 'Y' ELSE TRUE END; Deequ Compliance\
        \ - CASE WHEN result = 'no result' THEN super_over = 'N' ELSE TRUE END."
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 27
        end_line: 28
        file: ''
      uid: d3e5cab7-e648-48eb-a66e-8abc72f5e77b
    - text: 'Match-level consistency: winner, result, and super_over are match-level
        attributes and must be single-valued within a match id (i.e., they do not
        vary between team1 and team2 rows). Example constraints: SQL/Deequ aggregate
        check per id ensuring max(result)=min(result), max(super_over)=min(super_over),
        and max(winner)=min(winner); or enforce uniqueness patterns such as isUnique([''id''])
        and Compliance that there is exactly one non-null winner per id when result
        <> ''no result''.'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      uid: 91144e6d-d2c0-444f-9b8f-b1283233c5c7
    - text: 'Exactly-one-winner per decided match: For matches where result <> ''no
        result'', exactly one of {team1, team2} must equal winner; for matches where
        result = ''no result'', neither team equals winner. This ensures points and
        W/L tallies are correct. Example constraints: SQL/Deequ group check per id
        - CASE WHEN MAX(result <> ''no result'') THEN SUM(CASE WHEN winner = team1
        OR winner = team2 THEN 1 ELSE 0 END) = 1 ELSE SUM(CASE WHEN winner = team1
        OR winner = team2 THEN 1 ELSE 0 END) = 0 END.'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 27
        end_line: 33
        file: ''
      uid: a5837bf1-076e-4b74-b5d8-7e06c9c749d2
  '["result","winner"]':
    code: []
    assumptions:
    - text: 'Winner consistency with teams and no-result: For league matches, if result
        = ''no result'', winner must be null; otherwise, winner must equal team1 or
        team2. Deequ example: check.satisfies("CASE WHEN result = ''no result'' THEN
        winner IS NULL ELSE (winner = team1 OR winner = team2) END", "winner_consistent_with_teams_and_nr")'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 27
        end_line: 30
        file: ''
      uid: 5b9f99e9-ed1f-44b0-9e62-10f35c7221bb
    - text: 'Distinct opponents in league matches: For rows where match_type = ''League'',
        team1 and team2 must both be non-null and different. Deequ example: check.satisfies("match_type
        <> ''League'' OR (team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <> team2)",
        "distinct_teams_in_league")'
      sources:
      - start_line: 12
        end_line: 12
        file: ''
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 21
        end_line: 22
        file: ''
      uid: 7e7d589a-b406-4f44-bd64-d47bf7f8908f
    - text: 'Tie and super-over equivalence: A tied match must have a super over,
        and a super over must only occur when the result is ''tie''. Deequ examples:
        (1) check.satisfies("(result = ''tie'') = (super_over = ''Y'')", "tie_superover_equivalence")
        or (2) two checks: check.satisfies("result <> ''tie'' OR super_over = ''Y''",
        "tie_implies_super_over") and check.satisfies("super_over <> ''Y'' OR result
        = ''tie''", "super_over_implies_tie")'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 27
        end_line: 28
        file: ''
      uid: 84bc5167-a7a2-4e84-9499-674b06198c7e
    - text: 'Season should align with match date for league matches: When date and
        season are present, the season_int must equal the calendar year of date (used
        for grouping/ranking). Deequ example: check.satisfies("match_type <> ''League''
        OR (date IS NOT NULL AND season_int IS NOT NULL AND year(date) = season_int)",
        "season_matches_date_year")'
      sources:
      - start_line: 12
        end_line: 12
        file: ''
      - start_line: 15
        end_line: 17
        file: ''
      uid: 5913b039-dd08-451d-a8ec-5343444317c4
  '["team1","team2"]':
    code:
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR (`team1` IS NOT NULL
        AND `team2` IS NOT NULL AND `team1` <> `team2`)", "League rows must have two
        distinct, non-null teams", lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: cf779c04-ba0d-4fff-b2d5-c1be168db420
      source_assumptions:
      - 4c1b139c-91d2-4aa7-bb33-77c542dc8b8a
    - suggestion: '.satisfies("(`result` = ''no result'') OR (`winner` = `team1` OR
        `winner` = `team2`)", "Winner must be one of the two teams when result is
        not NR", lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 1bd2dad3-c2ca-4702-98f5-a4c6a7ca7bb7
      source_assumptions:
      - 5c33d343-7937-49d6-af90-d0964df9b450
    - suggestion: '.satisfies("(`result` <> ''no result'') OR (`winner` IS NULL OR
        TRIM(`winner`) = '''')", "Winner should be null/blank when result is NR",
        lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 0ee69a11-11b5-4a05-b3fd-442ab1316d60
      source_assumptions:
      - 5c33d343-7937-49d6-af90-d0964df9b450
    - suggestion: '.satisfies("(`match_type` <> ''League'') OR ((`result` = ''tie''
        AND `super_over` = ''Y'') OR (`result` <> ''tie'' AND (`super_over` IS NULL
        OR `super_over` <> ''Y'')))", "Tie/super-over consistency for League matches",
        lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: fa6a46bc-ac71-47ca-bb42-b3cf3974ad36
      source_assumptions:
      - e81a7ffd-452c-49ca-860b-7f7ccf8a59c0
    - suggestion: '.hasUniqueness(["id", "team1", "team2"], lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: ff33ae79-0806-4937-aa2a-7a35fd887100
      source_assumptions:
      - f30b52c8-358d-4364-b4a5-3bbed72caa28
    assumptions:
    - text: 'For every League match row, team1 and team2 must both be present and
        refer to two different teams (team1 <> team2). We could represent this as
        a Deequ satisfies compliance: (match_type <> ''League'') OR (team1 IS NOT
        NULL AND team2 IS NOT NULL AND team1 <> team2).'
      sources:
      - start_line: 11
        end_line: 12
        file: ''
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 21
        end_line: 23
        file: ''
      uid: 4fccfe37-7cf1-47e8-af79-6b3ae1711e41
    - text: 'Winner membership and NR consistency: (a) For rows where result <> ''no
        result'', winner must equal either team1 or team2 (but not both); (b) For
        rows where result = ''no result'', winner should be null or blank. In Deequ,
        two satisfies constraints can express this: (result = ''no result'') OR (winner
        = team1 OR winner = team2), and (result <> ''no result'') OR (winner IS NULL
        OR trim(winner) = '''').'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 25
        end_line: 33
        file: ''
      uid: 4c1b139c-91d2-4aa7-bb33-77c542dc8b8a
    - text: 'Tie/super-over consistency: For League matches, a tie must imply a super
        over was played, and a super over implies the match result is ''tie''. This
        can be enforced as: (match_type <> ''League'') OR ((result = ''tie'' AND super_over
        = ''Y'') OR (result <> ''tie'' AND (super_over IS NULL OR super_over <> ''Y''))).'
      sources:
      - start_line: 19
        end_line: 20
        file: ''
      - start_line: 27
        end_line: 33
        file: ''
      uid: 5c33d343-7937-49d6-af90-d0964df9b450
    - text: 'No duplicate match rows: The tuple (id, team1, team2) should be unique
        across the dataset to avoid double-counting matches when exploding participants.
        This can be represented as a Deequ uniqueness constraint: isUnique([''id'',
        ''team1'', ''team2'']).'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 35
        end_line: 42
        file: ''
      uid: e81a7ffd-452c-49ca-860b-7f7ccf8a59c0
    - text: 'Shared team domain across team1 and team2: The set of team identifiers
        appearing in team1 should equal the set appearing in team2 (domain parity),
        since both are unified into a single ''team'' field downstream. This can be
        validated by checking mutual containment between the two columns'' distinct
        values.'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      uid: f30b52c8-358d-4364-b4a5-3bbed72caa28
  '["team1","team2","winner"]':
    code: []
    assumptions:
    - text: 'Each match row must involve two distinct opponents: team1 and team2 must
        both be present and different (no team plays itself). This can be enforced
        with a constraint such as: .satisfies("team1 IS NOT NULL AND team2 IS NOT
        NULL AND team1 <> team2", "distinct_opponents").'
      sources:
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 21
        end_line: 22
        file: ''
      uid: 42408483-c40a-4365-995e-a81ea5ab8980
    - text: 'Winner/NR consistency and membership: For any match where result <> ''no
        result'', winner must be non-null and equal to exactly one of {team1, team2}.
        For matches where result = ''no result'', winner must be null (or absent).
        This can be represented with constraints such as: .satisfies("CASE WHEN result
        <> ''no result'' THEN winner IS NOT NULL ELSE winner IS NULL END", "winner_nullability_consistent")
        and .satisfies("CASE WHEN result <> ''no result'' THEN (IF(winner = team1,1,0)
        + IF(winner = team2,1,0)) = 1 ELSE TRUE END", "winner_is_one_of_two_teams").'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 25
        end_line: 33
        file: ''
      uid: bac6b964-ab6c-4c92-b1ad-4005593cdcce
    - text: 'Across the dataset, winner values must come from the same domain as team
        names. In other words, no winner should exist that is not equal to some team1
        or team2 value. A row-level enforcement compatible with this is: .satisfies("winner
        IS NULL OR winner IN (team1, team2)", "winner_in_teams_per_row").'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 29
        end_line: 29
        file: ''
      uid: 57ad1b38-ceef-45c1-9fd5-b2f9c9927bca
    - text: 'String canonicalization across team1, team2, and winner is required because
        equality is used to identify the winning side. Values must be consistently
        cased and trimmed so that comparisons succeed. One way to enforce this at
        validation time is: .satisfies("CASE WHEN result <> ''no result'' THEN LOWER(TRIM(winner))
        IN (LOWER(TRIM(team1)), LOWER(TRIM(team2))) ELSE TRUE END", "case_trim_normalized_teams").'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 29
        end_line: 29
        file: ''
      uid: b5468725-19a2-42f0-be5b-26067429697c
    - text: 'Super-over consistency with outcome: If super_over = ''Y'', the match
        cannot be ''no result'' and there must be a valid winner in {team1, team2}.
        Additionally, ties after regular overs should imply super_over = ''Y'' (and
        vice versa, as per the domain rule noted). These can be expressed as: .satisfies("CASE
        WHEN super_over = ''Y'' THEN result <> ''no result'' AND (IF(winner = team1,1,0)
        + IF(winner = team2,1,0)) = 1 ELSE TRUE END", "super_over_requires_winner")
        and .satisfies("CASE WHEN result = ''tie'' THEN super_over = ''Y'' ELSE TRUE
        END", "ties_trigger_super_over").'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 27
        end_line: 29
        file: ''
      uid: 2a68b1eb-2df1-4fc8-94bb-8245a1ddd406
