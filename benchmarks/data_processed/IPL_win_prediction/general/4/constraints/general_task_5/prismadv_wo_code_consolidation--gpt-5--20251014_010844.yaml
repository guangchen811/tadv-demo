    - text: 'Super-over and result consistency for League matches: a tie after regulation
        must imply a super over was played, and vice versa. Practically, enforce that
        super_over = ''Y'' iff result indicates a tie (e.g., ''tie'', ''tied''); also,
        when result = ''no result'', super_over should not be ''Y''. Example Deequ
        constraint: .hasCompliance(''super_over_tie_consistency'', "case when match_type
        = ''League'' then ((lower(result) in (''tie'',''tied'')) <=> (super_over =
        ''Y'')) and (lower(result) <> ''no result'' or super_over <> ''Y'') else true
        end", lambda c: c == 1.0)'
      sources:
