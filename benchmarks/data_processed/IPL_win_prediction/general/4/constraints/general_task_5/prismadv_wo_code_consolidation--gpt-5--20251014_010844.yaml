  '["date","id","match_type","result","season","super_over","team1","team2","winner"]':
    code: []
    assumptions:
    - text: 'For League matches, the two participating teams must be present and distinct:
        team1 and team2 are non-null and team1 != team2. Example Deequ constraint:
        .hasCompliance(''teams_distinct_league'', "CASE WHEN match_type = ''League''
        THEN (team1 IS NOT NULL AND team2 IS NOT NULL AND team1 <> team2) ELSE true
        END", _ >= 1.0)'
      sources:
      - start_line: 12
        end_line: 12
        file: ''
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 21
        end_line: 23
        file: ''
      uid: 99394f79-b2ae-4afc-b751-978152db38b8
    - text: "In all League matches that are not 'no result', the winner must be one\
        \ of the two teams: winner \u2208 {team1, team2} when result != 'no result'.\
        \ Example Deequ constraint: .hasCompliance('winner_in_teams', \"CASE WHEN\
        \ match_type = 'League' AND result <> 'no result' THEN (winner = team1 OR\
        \ winner = team2) ELSE true END\", _ >= 1.0)"
      sources:
      - start_line: 12
        end_line: 12
        file: ''
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 27
        end_line: 30
        file: ''
      uid: 44b7ba18-a743-4509-97c8-282d2fe08855
    - text: 'For League matches with result = ''no result'', winner must be null/empty
        and super_over must be ''N''. Example Deequ constraint: .hasCompliance(''nr_winner_super_over_consistency'',
        "CASE WHEN match_type = ''League'' AND result = ''no result'' THEN (winner
        IS NULL AND super_over = ''N'') ELSE true END", _ >= 1.0)'
      sources:
      - start_line: 12
        end_line: 12
        file: ''
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 27
        end_line: 29
        file: ''
      uid: 542f63b0-f0c3-49e2-8862-828fc628e637
    - text: 'Tie after regular overs and super over usage are equivalent in League
        matches: result = ''tie'' if and only if super_over = ''Y''. Example Deequ
        constraint: .hasCompliance(''tie_super_over_equivalence'', "CASE WHEN match_type
        = ''League'' THEN ((result = ''tie'') <=> (super_over = ''Y'')) ELSE true
        END", _ >= 1.0)'
      sources:
      - start_line: 12
        end_line: 12
        file: ''
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 27
        end_line: 28
        file: ''
      uid: c6c9f0c9-c204-45e0-9b8f-7a9ca4a205c1
    - text: 'Season must align with the calendar year derived from date: year(to_datetime(date))
        = season. Example Deequ constraint: .hasCompliance(''season_matches_date_year'',
        "year(to_timestamp(date)) = cast(season as int)", _ >= 1.0)'
      sources:
      - start_line: 15
        end_line: 16
        file: ''
      - start_line: 17
        end_line: 17
        file: ''
      uid: 9b6a3846-d505-4f00-9928-c9f0c8450500
    - text: 'Within each match (id), exactly one winner exists for non-''no result''
        League matches, and no winner exists for ''no result'' League matches. Basis
        for downstream correctness: in the exploded participants table, for each id
        where result <> ''no result'', sum(is_winner) over the two teams equals 1;
        where result = ''no result'', sum(is_nr) over the two teams equals 2. Example
        Deequ-style compliance on the base table: .hasCompliance(''per_match_winner_presence'',
        "CASE WHEN match_type = ''League'' AND result <> ''no result'' THEN winner
        IS NOT NULL ELSE winner IS NULL END", _ >= 1.0)'
      sources:
      - start_line: 12
        end_line: 12
        file: ''
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 27
        end_line: 33
        file: ''
      uid: 757c8fa6-43fd-4004-9762-029475c23324
  '["date","season"]':
    code: []
    assumptions:
    - text: 'For League matches, the calendar year extracted from ''date'' must equal
        ''season'' (season treated as a calendar year). This avoids dropping rows
        (from NaT/NaN casting) and prevents grouping a match into the wrong season.
        Example Deequ constraint: .hasCompliance(''date_season_year_match'', "case
        when match_type = ''League'' then year(to_timestamp(date)) = cast(season as
