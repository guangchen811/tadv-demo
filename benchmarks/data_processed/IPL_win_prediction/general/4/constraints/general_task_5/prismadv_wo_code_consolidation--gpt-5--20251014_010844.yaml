        end", lambda c: c == 1.0) and .hasCompliance(''winner_in_teams_when_decided'',
        "case when match_type = ''League'' and lower(result) <> ''no result'' then
        (winner = team1 or winner = team2) else true end", lambda c: c == 1.0) and
        .hasCompliance(''no_result_no_winner'', "case when match_type = ''League''
        and lower(result) = ''no result'' then (winner is null or winner = '''') else
        true end", lambda c: c == 1.0)'
