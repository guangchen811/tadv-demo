constraints:
  Certificate:
    code:
    - - .hasCompleteness('Certificate', 0.89)
      - Invalid
    - - .isContainedIn('Certificate', ['U', 'UA', 'A', 'PG', 'PG-13', 'R', 'NC-17',
        'G'], allow_nulls=True)
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    - - .isNonEmpty('Director')
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    - - .isNonEmpty('Genre')
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .hasCompleteness('Gross', 0.82)
      - Invalid
    - - .hasPattern('Gross', '^\d{1,3}(,\d{3})*$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - .hasCompleteness('Meta_score', 0.85)
      - Invalid
    - - .isLessThanOrEqualTo('Meta_score', 100.0)
      - Invalid
    - - .isNonNegative('Meta_score')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .isComplete('Overview')
      - Valid
    - - .isNonEmpty('Overview')
      - Invalid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', '^https?://.*\.(jpg|jpeg|png)$')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isGreaterThanOrEqualTo('Released_Year', 1900)
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', 2024)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', '^\d+ min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    - - .isNonEmpty('Series_Title')
      - Invalid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    - - .isNonEmpty('Star1')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isPositive('id')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
