constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['U', 'G', 'PG', 'TV-PG', 'UA', 'PG-13', 'TV-14',
        'R', 'TV-MA', 'NC-17', 'A', 'Not Rated', 'Unrated', 'Approved', 'Passed',
        'U/A', 'GP'])
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .compliesWithPattern('Gross', r'^\\d{1,3}(,\\d{3})*$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isBetween('IMDB_Rating', 0.0, 10.0)
      - Invalid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isBetween('Released_Year', 1900, 2025)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .compliesWithPattern('Runtime', r'\\d+ min')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
