    assumptions:
    - text: 'There must be at least two records where both ''IMDB_Rating'' and ''Meta_score''
        are non-null and numeric so that correlation and the linear regression fit
        are computable. We could represent this as a Deequ constraint like: Check.satisfies(''sum(CASE
