      - start_line: 85
        end_line: 85
        file: ''
      - start_line: 88
        end_line: 92
        file: ''
      uid: 4b984982-ae0c-47a0-bdd5-46551d94cfff
    - text: 'IMDB_Rating should be complete (no nulls). Missing ratings would propagate
        NaNs through normalization and the blended score, and imputation of Meta_score
        for missing rows uses IMDB_Rating directly. We could represent this as: Deequ:
        .hasCompleteness(''IMDB_Rating'', lambda x: x == 1.0) or Great Expectations:
        expect_column_values_to_not_be_null(''IMDB_Rating'').'
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 82
        end_line: 83
        file: ''
      uid: 9f0777a5-e448-434f-8801-07488dec5675
    - text: "There must be at least two rows where both IMDB_Rating and Meta_score\
        \ are non-null to allow np.polyfit to run (linear fit requires \u22652 points).\
        \ We could represent this as: Deequ: check that the fraction of rows satisfying\
        \ (`Meta_score` IS NOT NULL AND `IMDB_Rating` IS NOT NULL) is >= 2/numRows,\
        \ or implement a custom Check on filtered row count \u2265 2; Great Expectations:\
        \ use an Expectation on a filtered dataframe to assert row_count >= 2."
      sources:
      - start_line: 67
        end_line: 77
        file: ''
      uid: 87588e6d-9dc8-432a-ada7-6dec879f657e
    - text: 'IMDB_Rating must have variability (at least two distinct values) among
        rows where Meta_score is non-null; otherwise the linear regression is ill-conditioned.
        We could represent this as: Deequ: .where(''`Meta_score` IS NOT NULL'').hasApproxCountDistinct(''IMDB_Rating'',
