        to avoid a singular linear regression. This can be captured as a Deequ constraint
        such as: Check.hasStandardDeviation(''IMDB_Rating'', assertion=lambda sd:
        sd > 0, where=''Meta_score IS NOT NULL AND IMDB_Rating IS NOT NULL'') (or
        equivalently, Check.hasApproxCountDistinct(''IMDB_Rating'', assertion=lambda
        n: n >= 2, where=''Meta_score IS NOT NULL'')).'
      sources:
      - start_line: 73
        end_line: 77
        file: ''
