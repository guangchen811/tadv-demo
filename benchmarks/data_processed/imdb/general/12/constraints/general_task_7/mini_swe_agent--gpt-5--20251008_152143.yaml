raw_constraints:
- column_name: Series_Title
  code_for_constraint: .isComplete('Series_Title')
- column_name: Released_Year
  code_for_constraint: .isComplete('Released_Year')
- column_name: '[''Series_Title'', ''Released_Year'']'
  code_for_constraint: .hasUniqueness(['Series_Title', 'Released_Year'])
- column_name: Runtime
  code_for_constraint: .isComplete('Runtime')
- column_name: Runtime
  code_for_constraint: .hasPattern('Runtime', '^[0-9]+\s*min$')
- column_name: No_of_Votes
  code_for_constraint: .isNonNegative('No_of_Votes')
- column_name: IMDB_Rating
  code_for_constraint: '.hasMin(''IMDB_Rating'', lambda x: x >= 0.0)'
- column_name: IMDB_Rating
  code_for_constraint: '.hasMax(''IMDB_Rating'', lambda x: x <= 10.0)'
- column_name: Meta_score
  code_for_constraint: '.hasMin(''Meta_score'', lambda x: x >= 0.0)'
- column_name: Meta_score
  code_for_constraint: '.hasMax(''Meta_score'', lambda x: x <= 100.0)'
