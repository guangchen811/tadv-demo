constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda v: v >= 0.85)'
      - Valid
    - - .satisfies("Certificate IS NULL OR Certificate IN ('U','UA','A','G','PG','PG-13','R','NC-17','Not
        Rated','Unrated','Passed','Approved')", 'certificate_domain')
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    assumptions: []
  Genre:
    code:
    - - '.hasPattern(''Genre'', r''^[A-Za-z\-]+(,\s[A-Za-z\-]+)*$'', lambda v: v ==
        1.0)'
      - Valid
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda v: v >= 0.80)'
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .satisfies("cast(IMDB_Rating as double) BETWEEN 0 AND 10", 'imdb_rating_range')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - .satisfies("Meta_score IS NULL OR (cast(Meta_score as double) BETWEEN 0 AND
        100)", 'meta_score_range')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .satisfies("cast(No_of_Votes as long) >= 0", 'votes_non_negative')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .isComplete('Poster_Link')
      - Valid
    - - .satisfies("Poster_Link RLIKE '^https?://.+$'", 'poster_link_is_url')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .satisfies("cast(Released_Year as int) BETWEEN 1900 AND 2025", 'released_year_range')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - '.hasPattern(''Runtime'', r''^\d+\s*min$'', lambda v: v == 1.0)'
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title,Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda u: u == 1.0)'
      - Valid
    assumptions: []
  row_count:
    code:
    - - '.hasSize(lambda s: s > 0)'
      - Valid
    assumptions: []
