results:
  Certificate:
    code:
    - suggestion: .isContainedIn('Certificate', ['U', 'UA', 'U/A', 'A', 'G', 'PG',
        'PG-13', 'R', 'NC-17', 'Not Rated', 'TV-14', 'TV-MA'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''Certificate'', [''U'', ''UA'',
        ''U/A'', ''A'', ''G'', ''PG'', ''PG-13'', ''R'', ''NC-17'', ''Not Rated'',
        ''TV-14'', ''TV-MA''])'' failed on data sample: Value: 0.9425 does not meet
        the constraint requirement!'
      level: error
  Genre:
    code:
    - suggestion: '.hasCompleteness(''Genre'', lambda r: r > 0.9)'
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating:
    code:
    - suggestion: '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .isNonNegative('No_of_Votes')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''No_of_Votes'')'' failed on
        data sample: Value: 0.975 does not meet the constraint requirement!'
      level: error
  Poster_Link:
    code:
    - suggestion: .hasPattern('Poster_Link', '^https?://')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: '.hasMax(''Released_Year'', lambda v: v <= 2100)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .hasPattern('Runtime', '^\s*\d+\s*min\s*$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.hasCompleteness(''Series_Title'', lambda r: r > 0.9)'
      status: true
      reason_if_failed: ''
      level: error
