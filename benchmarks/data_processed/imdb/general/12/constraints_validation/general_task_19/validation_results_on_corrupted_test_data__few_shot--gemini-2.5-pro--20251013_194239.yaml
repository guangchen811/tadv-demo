results:
  Certificate:
    code:
    - suggestion: .isContainedIn('Certificate', ['U', 'UA', 'A', 'G', 'PG', 'PG-13',
        'R', 'NC-17', 'Not Rated', 'Unrated', 'Passed', 'Approved'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''Certificate'', [''U'', ''UA'',
        ''A'', ''G'', ''PG'', ''PG-13'', ''R'', ''NC-17'', ''Not Rated'', ''Unrated'',
        ''Passed'', ''Approved''])'' failed on data sample: Value: 0.99 does not meet
        the constraint requirement!'
      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating:
    code:
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('IMDB_Rating', lowerBound=0.0, upperBound=10.0)
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isContainedIn(''IMDB_Rating'',
        lowerBound=0.0, upperBound=10.0)'': Check.isContainedIn() got an unexpected
        keyword argument ''lowerBound'''
      level: error
  No_of_Votes:
    code:
    - suggestion: .isComplete('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('No_of_Votes')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''No_of_Votes'')'' failed on
        data sample: Value: 0.975 does not meet the constraint requirement!'
      level: error
  Released_Year:
    code:
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .compliesWithPattern('Runtime', r'^\\d+ min$')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.compliesWithPattern(''Runtime'',
        r''^\\d+ min$'')'': ''Check'' object has no attribute ''compliesWithPattern'''
      level: error
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title, Released_Year:
    code:
    - suggestion: '.addConstraint(Constraint.uniqueness([''Series_Title'', ''Released_Year''],
        lambda x: x == 1.0))'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.addConstraint(Constraint.uniqueness([''Series_Title'',
        ''Released_Year''], lambda x: x == 1.0))'': name ''Constraint'' is not defined'
      level: error
