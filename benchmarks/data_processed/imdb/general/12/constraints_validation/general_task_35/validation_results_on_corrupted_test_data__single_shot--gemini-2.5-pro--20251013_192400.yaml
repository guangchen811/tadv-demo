results:
  Gross:
    code:
    - suggestion: '.hasCompleteness(''Gross'', lambda x: x >= 0.8, ''Completeness
        should be at least 80%'')'
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating:
    code:
    - suggestion: .isBetween('IMDB_Rating', 0.0, 10.0)
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isBetween(''IMDB_Rating'',
        0.0, 10.0)'': ''Check'' object has no attribute ''isBetween'''
      level: error
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .isNonNegative('No_of_Votes')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''No_of_Votes'')'' failed on
        data sample: Value: 0.975 does not meet the constraint requirement!'
      level: error
  Released_Year:
    code:
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Released_Year` >= 1900', 'Released_Year should be 1900
        or later')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .matches('Runtime', '^[1-9][0-9]{1,2} min$')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.matches(''Runtime'',
        ''^[1-9][0-9]{1,2} min$'')'': ''Check'' object has no attribute ''matches'''
      level: error
  Series_Title, Released_Year:
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
