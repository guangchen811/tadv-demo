results:
  IMDB_Rating:
    code:
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('IMDB_Rating >= 0 AND IMDB_Rating <= 10', 'IMDB_Rating
        range')
      status: true
      reason_if_failed: ''
      level: error
  Certificate:
    code:
    - suggestion: '.isContainedIn(''Certificate'', [''G'', ''PG'', ''PG-13'', ''R'',
        ''NC-17'', ''U'', ''UA'', ''A'', ''12'', ''12A'', ''15'', ''18''], lambda
        x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''Certificate IS NOT NULL'', ''Null Certificate Values'',
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Decade","Year"]':
    code:
    - suggestion: '.satisfies(''Released_Year >= 1000 AND Released_Year <= 9999'',
        ''Valid Year Format'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.satisfies(''`Gross` is not NULL'', ''Non-null Gross values'',
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('Gross IS NULL OR CAST(REPLACE(`Gross`, ",", "") AS DOUBLE)
        IS NOT NULL', 'Parseable Gross values')
      status: true
      reason_if_failed: ''
      level: warning
  '["Gross","Gross_Num"]':
    code:
    - suggestion: '.satisfies("Gross rlike ''^[0-9,]+$''", "Gross Numeric Format",
        lambda x: x >= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.haveCompleteness([''Gross''], lambda x: x >= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","Meta_score","No_of_Votes","Score"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''Meta_score'', ''No_of_Votes''],
        lambda x: x >= 0.8564273789649416)'
      status: false
      reason_if_failed: 'Constraint ''haveCompleteness([''IMDB_Rating'', ''Meta_score'',
        ''No_of_Votes''], lambda x: x >= 0.8564273789649416)'' failed on data sample:
        Value: 0.8225 does not meet the constraint requirement!'
      level: error
  Poster_Link:
    code:
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .containsURL('Poster_Link')
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.hasCompleteness(''Meta_score'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .isPositive('No_of_Votes')
      status: false
      reason_if_failed: 'Constraint ''isPositive(''No_of_Votes'')'' failed on data
        sample: Value: 0.975 does not meet the constraint requirement!'
      level: error
    - suggestion: .isComplete('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: .satisfies('`Released_Year` >= 1000 AND `Released_Year` <= 9999',
        'Valid 4-digit Year Format')
      status: true
      reason_if_failed: ''
      level: undefined
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CAST(SUBSTRING(Runtime, 1, LENGTH(Runtime)-4) AS INT)
        BETWEEN 10 AND 999', 'Runtime Range')
      status: true
      reason_if_failed: ''
      level: error
  '["Runtime","Runtime_Min"]':
    code:
    - suggestion: '.satisfies(''Runtime LIKE "__ min" OR Runtime LIKE "___ min"'',
        ''Runtime Pattern Match'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: error
