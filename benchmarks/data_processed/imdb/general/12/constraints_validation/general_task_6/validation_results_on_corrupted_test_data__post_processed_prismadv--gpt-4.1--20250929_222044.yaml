results:
  IMDB_Rating:
    code:
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`IMDB_Rating` >= 0 AND `IMDB_Rating` <= 10', 'IMDB_Rating
        in [0, 10]')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''IMDB_Rating''], lambda x: x > 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.satisfies("upper(trim(`Certificate`)) IN (''U'', ''G'', ''PG'',
        ''PG-13'', ''UA'')", "Family-friendly eligible certificates", lambda x: x
        >= 0.49)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Certificate","Genre"]':
    code:
    - suggestion: '.satisfies("(TRIM(UPPER(`Certificate`)) NOT IN (''U'',''G'',''PG'',''PG-13'',''UA''))
        OR (TRIM(`Genre`) IS NOT NULL AND TRIM(`Genre`) <> '''')", "Family-Friendly
        Eligibility: If Certificate is family-friendly, Genre must be present", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''Certificate'', ''Genre''], lambda x: x >=
        0.8981636060100167)'
      status: true
      reason_if_failed: ''
      level: error
  '["CompositeScore","Gross"]':
    code:
    - suggestion: '.satisfies(''CAST(REGEXP_REPLACE(`Gross`, ",", "") AS DOUBLE) >
        0'', ''At least one row has positive Gross'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["CompositeScore","Gross","IMDB_Rating","No_of_Votes","Released_Year","Runtime"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''No_of_Votes''], lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.haveCompleteness([''Released_Year'', ''IMDB_Rating''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''Released_Year'', ''IMDB_Rating'', ''No_of_Votes'',
        ''Gross''], lambda x: x >= 0.82)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''No_of_Votes'', ''Released_Year'',
        ''Gross'', ''Runtime''], lambda x: x >= 0.82)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: '.hasUniqueness([''Poster_Link''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["CompositeScore","IMDB_Rating"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''No_of_Votes''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["CompositeScore","Poster_Link"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''No_of_Votes'', ''Released_Year'',
        ''Gross'', ''Runtime''], lambda x: x >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
  '["CompositeScore","Runtime"]':
    code:
    - suggestion: '.haveAnyCompleteness([''IMDB_Rating'', ''No_of_Votes'', ''Released_Year'',
        ''Gross'', ''Runtime''], lambda c: c >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.hasCompleteness(''Genre'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: .satisfies("CASE WHEN `Gross` IS NULL OR TRIM(`Gross`) = '' OR TRY_CAST(REPLACE(`Gross`,
        ',', '') AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Gross values must be
        null, empty, or parseable as number")
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","No_of_Votes"]':
    code:
    - suggestion: .satisfies('CAST(`IMDB_Rating` AS DOUBLE) IS NOT NULL AND CAST(`No_of_Votes`
        AS BIGINT) IS NOT NULL', 'IMDB_Rating and No_of_Votes must be numeric')
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.satisfies(''`No_of_Votes` >= 0'', ''Non-negative Votes'', lambda
        x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`No_of_Votes` >= 0'', ''Non-negative
        Votes'', lambda x: x == 1)'' failed on data sample: Value: 0.975 does not
        meet the constraint requirement!'
      level: error
    - suggestion: '.hasDistinctness([''No_of_Votes''], lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`No_of_Votes` = CAST(`No_of_Votes` AS BIGINT)'', ''Votes
        Are Integers'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`No_of_Votes` = CAST(`No_of_Votes`
        AS BIGINT)'', ''Votes Are Integers'', lambda x: x == 1)'' failed on data sample:
        Value: 0.95 does not meet the constraint requirement!'
      level: error
  '["Poster_Link","Series_Title"]':
    code:
    - suggestion: '.hasUniqueness([''Poster_Link'', ''Series_Title''], lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''Series_Title'', ''Poster_Link''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Released_Year","Year"]':
    code:
    - suggestion: '.hasCompleteness(''Released_Year'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: '.satisfies(''cast(`Released_Year` AS INT) <= 2024'', ''Released_Year
        not in the future'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("Runtime RLIKE ''^[0-9]+''", "Runtime Numeric Prefix",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(regexp_extract(Runtime, ''^[0-9]+'', 0) AS INT)
        BETWEEN 30 AND 300", "Runtime Reasonable Range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Series_Title:
    code:
    - suggestion: '.hasCompleteness(''Series_Title'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
