results:
  Gross:
    code:
    - suggestion: .hasPattern('Gross', r'^[0-9,]+$')
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Gross'', r''^[0-9,]+$'')'' failed
        on data sample: Value: 0.835 does not meet the constraint requirement!'
      level: error
  IMDB_Rating:
    code:
    - suggestion: '.hasMax(''IMDB_Rating'', lambda x: x <= 10.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''IMDB_Rating'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: '.hasMax(''Released_Year'', lambda x: x <= 2025)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Released_Year'', lambda x: x >= 1900)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .hasPattern('Runtime', r'^[1-9][0-9]{1,2} min$')
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Runtime'', r''^[1-9][0-9]{1,2}
        min$'')'' failed on data sample: Value: 0.9 does not meet the constraint requirement!'
      level: error
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isNonNegative('id')
      status: true
      reason_if_failed: ''
      level: error
