results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("IMDB_Rating IS NULL OR (CAST(IMDB_Rating AS DOUBLE)
        >= 0.0 AND CAST(IMDB_Rating AS DOUBLE) <= 10.0)", "IMDB_Rating within [0,10]
        when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("IMDB_Rating", lambda v: v >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (Released_Year RLIKE ''^[0-9]{4}$'') OR CAST(IMDB_Rating
        AS DOUBLE) IS NOT NULL", "IMDB_Rating numeric for ranked-eligible rows", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Certificate:
    code:
    - suggestion: '.satisfies("(`Certificate` IS NULL) OR (TRIM(`Certificate`) IN
        (''G'',''PG'',''PG-13'',''R'',''NC-17'',''U'',''UA'',''A'',''12'',''12A'',''15'',''18''))",
        "Certificate in allowed set or null", lambda x: x >= 0.94)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(`Certificate` IS NULL) OR (TRIM(`Certificate`)
        IN (''G'',''PG'',''PG-13'',''R'',''NC-17'',''U'',''UA'',''A'',''12'',''12A'',''15'',''18''))",
        "Certificate in allowed set or null", lambda x: x >= 0.94)'' failed on data
        sample: Value: 0.9375 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(`Certificate`) = ''nan'' THEN 0 ELSE
        1 END", "No literal ''nan'' strings in Certificate", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Certificate","GenreTokens"]':
    code:
    - suggestion: '.satisfies("(`Certificate` IS NULL) OR (UPPER(TRIM(`Certificate`))
        IN (''G'',''PG'',''PG-13'',''R'',''NC-17'',''U'',''UA'',''A'',''12'',''12A'',''15'',''18''))",
        "Certificate must be from allowed domain when present", lambda v: v >= 0.94)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(`Certificate` IS NULL) OR (UPPER(TRIM(`Certificate`))
        IN (''G'',''PG'',''PG-13'',''R'',''NC-17'',''U'',''UA'',''A'',''12'',''12A'',''15'',''18''))",
        "Certificate must be from allowed domain when present", lambda v: v >= 0.94)''
        failed on data sample: Value: 0.9375 does not meet the constraint requirement!'
      level: warning
  Genre:
    code:
    - suggestion: '.satisfies("CASE WHEN Genre IS NOT NULL AND TRIM(Genre) <> ''''
        AND LOWER(TRIM(Genre)) <> ''nan'' THEN 1 ELSE 0 END", "Genre non-null/non-empty",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN Genre RLIKE ''^(\\s*[^,]+\\s*)(,\\s*[^,]+\\s*)*$''
        THEN 1 ELSE 0 END", "Genre comma-separated list", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN SIZE(FILTER(TRANSFORM(SPLIT(Genre, '',''),
        x -> TRIM(x)), x -> x <> '''')) >= 1 THEN 1 ELSE 0 END", "At least one genre
        token", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN SIZE(FILTER(TRANSFORM(SPLIT(Genre, '',''),
        x -> TRIM(x)), x -> x <> '''' AND x NOT IN (''Action'',''Adventure'',''Animation'',''Biography'',''Comedy'',''Crime'',''Drama'',''Family'',''Fantasy'',''Film-Noir'',''History'',''Horror'',''Music'',''Musical'',''Mystery'',''Romance'',''Sci-Fi'',''Sport'',''Thriller'',''War'',''Western'')))
        = 0 THEN 1 ELSE 0 END", "Genre tokens in allowed set (canonical labels)",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.hasCompleteness(''Gross'', lambda x: x >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("regexp_replace(`Gross`, '','', '''') RLIKE ''^[0-9]+$''",
        "At least one parsable Gross value exists", lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Gross'', r''^(\d+|\d{1,3}(,\d{3})*)$'', lambda f:
        f >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN regexp_replace(`Gross`, '','', '''') RLIKE
        ''^[0-9]+$'' THEN CAST(regexp_replace(`Gross`, '','', '''') AS DOUBLE) >=
        0 ELSE TRUE END", "Non-negative Gross when parsable", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Gross` IS NULL THEN TRUE ELSE regexp_replace(`Gross`,
        '','', '''') RLIKE ''^[0-9]+$'' END", "Gross parsable after removing commas
        (no currency symbols/text)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("length(trim(`Poster_Link`)) > 0", "Poster_Link not
        empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`Poster_Link`)) <> ''nan''", "Poster_Link
        not literal ''nan''", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Poster_Link'', r''^\s*https?://\S+\s*$'', lambda
        x: x == 1.0, name=''Poster_Link absolute http(s) URL (allow surrounding whitespace)'')'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Poster_Link'', r''^[^"\''<>]+$'', lambda x: x ==
        1.0, name=''Poster_Link safe for HTML attributes'')'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Poster_Link` = trim(`Poster_Link`)", "Poster_Link
        trimmed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.satisfies("`Meta_score` IS NULL OR (`Meta_score` BETWEEN 0 AND
        100)", "Meta_score present => numeric and within [0,100]", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.satisfies("CASE WHEN `No_of_Votes` IS NULL OR `No_of_Votes` RLIKE
        ''^[0-9]+$'' THEN 1 ELSE 0 END", "No_of_Votes numeric digits only", lambda
        x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `No_of_Votes` IS NULL
        OR `No_of_Votes` RLIKE ''^[0-9]+$'' THEN 1 ELSE 0 END", "No_of_Votes numeric
        digits only", lambda x: x == 1.0)'' failed on data sample: Value: 0.05 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.hasCompleteness("No_of_Votes", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `No_of_Votes` IS NULL THEN 1 WHEN CAST(`No_of_Votes`
        AS DOUBLE) >= 1 THEN 1 ELSE 0 END", "No_of_Votes >= 1", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `No_of_Votes` IS NULL THEN 1 WHEN CAST(`No_of_Votes`
        AS DOUBLE) <= 1000000 THEN 1 ELSE 0 END", "No_of_Votes scale <= 1,000,000",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.hasCompleteness(''Released_Year'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("Released_Year BETWEEN 1000 AND 9999", "Released_Year_4_digits",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Released_Year'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(NOT regexp_like(trim(Released_Year), ''^\\d{4}$''))
        OR CAST(trim(Released_Year) AS INT) IS NOT NULL", "Released_Year_parseable_if_4_digits",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: '.satisfies("NOT(Released_Year RLIKE ''^[0-9]{4}$'') OR (Runtime
        RLIKE ''^[0-9]{2,3} min$'')", "Runtime exact pattern (DD or DDD + space +
        ''min'') for valid Released_Year rows", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("NOT(Released_Year RLIKE ''^[0-9]{4}$'')
        OR (Runtime RLIKE ''^[0-9]{2,3} min$'')", "Runtime exact pattern (DD or DDD
        + space + ''min'') for valid Released_Year rows", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.9 does not meet the constraint requirement!'
      level: error
  Series_Title:
    code:
    - suggestion: '.hasCompleteness(''Series_Title'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(`Series_Title`) <> ''''", "Non-empty Series_Title
        after trim", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Released_Year'', ''Series_Title''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("LOWER(TRIM(`Series_Title`)) <> ''nan''", "No literal
        nan titles", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
