results:
  IMDB_Rating:
    code:
    - suggestion: '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .isComplete('No_of_Votes')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''No_of_Votes'')'' failed on data
        sample: Value: 0.95 does not meet the constraint requirement!'
      level: error
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
  Poster_Link:
    code:
    - suggestion: '.hasPattern(''Poster_Link'', r''^https?://'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: '.hasPattern(''Runtime'', r''^\s*\d+\s*min\s*$'', lambda v: v ==
        1.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Runtime'', r''^\s*\d+\s*min\s*$'',
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9 does not meet the
        constraint requirement!'
      level: error
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: error
