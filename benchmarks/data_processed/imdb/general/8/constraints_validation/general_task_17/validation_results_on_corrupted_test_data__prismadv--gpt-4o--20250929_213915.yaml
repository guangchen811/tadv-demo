results:
  Star1:
    code:
    - suggestion: .satisfies("TRIM(LOWER(`Star1`)) != '' AND TRIM(LOWER(`Star1`))
        != 'nan'", "Valid Star1 Values")
      status: true
      reason_if_failed: ''
      level: error
  Star2:
    code:
    - suggestion: '.satisfies("CASE WHEN `Star2` IS NOT NULL AND TRIM(LOWER(`Star2`))
        != ''nan'' AND TRIM(`Star2`) != '''' THEN 1 ELSE 0 END", "Valid Star2 Entries",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Star3:
    code:
    - suggestion: .satisfies("`Star3` IS NOT NULL AND `Star3` != '' AND LOWER(`Star3`)
        != 'nan'", "Valid Star3 Values")
      status: true
      reason_if_failed: ''
      level: error
  Star4:
    code:
    - suggestion: .satisfies("`Star4` IS NOT NULL AND `Star4` != '' AND LOWER(`Star4`)
        != 'nan'", "Valid Star4 Values")
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating:
    code:
    - suggestion: .satisfies('IMDB_Rating >= 5', 'IMDB Rating for Scoring')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('IMDB_Rating >= 7', 'IMDB Rating for Eligibility')
      status: true
      reason_if_failed: ''
      level: error
  '["Certificate","IMDB_Rating"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`Genre` RLIKE '[^,\s]'", "At Least One Genre Listed")
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.hasCompleteness(''Gross'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Gross","licensing_score"]':
    code:
    - suggestion: '.haveCompleteness([''Gross''], lambda x: x >= 0.828)'
      status: true
      reason_if_failed: ''
      level: error
  '["IMDB_Rating","licensing_score"]':
    code:
    - suggestion: '.satisfies(''`imdb_rating` >= 5.0'', ''IMDB Rating Valid Range'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: .isComplete('No_of_Votes')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''No_of_Votes'')'' failed on data
        sample: Value: 0.95 does not meet the constraint requirement!'
      level: error
  Released_Year:
    code:
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('TRIM(Series_Title) = Series_Title', 'No leading or trailing
        whitespace in Series_Title')
      status: true
      reason_if_failed: ''
      level: warning
  '["Runtime","licensing_score"]':
    code:
    - suggestion: '.haveCompleteness([''Runtime''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Star1","Star2","Star3","Star4"]':
    code:
    - suggestion: '.satisfies("Star1 IS NOT NULL AND Star2 IS NOT NULL AND Star3 IS
        NOT NULL AND Star4 IS NOT NULL AND Star1 != '''' AND Star2 != '''' AND Star3
        != '''' AND Star4 != '''' AND LOWER(Star1) != ''nan'' AND LOWER(Star2) !=
        ''nan'' AND LOWER(Star3) != ''nan'' AND LOWER(Star4) != ''nan''", "Check for
        non-empty and non-''nan'' values in Star columns", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
