  '["Gross","IMDB_Rating","Meta_score","No_of_Votes"]':
    code: []
    assumptions:
    - text: 'Each row must have at least one of Meta_score or IMDB_Rating present
        because quality_component uses Meta_score/10 when available and otherwise
        falls back to IMDB_Rating. Additionally, these two fields must be on compatible
        scales: IMDB_Rating in [0, 10], and when Meta_score is present it must be
        in [0, 100] so that Meta_score/10 aligns with IMDB_Rating. Deequ examples:
        .addConstraint(Compliance(''meta_or_imdb_present'', ''Meta_score IS NOT NULL
        OR IMDB_Rating IS NOT NULL'')); .addConstraint(Compliance(''rating_scales'',
        ''(IMDB_Rating >= 0 AND IMDB_Rating <= 10) AND (Meta_score IS NULL OR (Meta_score
        >= 0 AND Meta_score <= 100))'')).'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      uid: c17071ef-cb5d-4ebf-af1e-9df3d116b105
    - text: 'IMDB_Rating and No_of_Votes are used jointly to compute a Bayesian average
        and a log-based popularity, so for all rows they must be present and numeric,
        and No_of_Votes must be >= 0. Also, the 60th percentile (approx quantile 0.60)
        of No_of_Votes must be > 0 so that M > 0 and (v + M) > 0 in the weighting.
        Deequ examples: .addConstraint(Compliance(''votes_nonneg_with_rating'', ''IMDB_Rating
        IS NOT NULL AND No_of_Votes IS NOT NULL AND No_of_Votes >= 0'')); .addConstraint(HasApproxQuantile(''No_of_Votes'',
        0.60, _ > 0)).'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 48
        end_line: 52
        file: ''
      - start_line: 63
        end_line: 63
        file: ''
      uid: 8b0b6930-405d-40e3-a2ce-a96f2c71e728
    - text: 'If Gross is present, it must be a numeric amount (optionally with thousands
        separators) that can be parsed into Gross_int; equivalently, Gross IS NULL
        OR Gross_int IS NOT NULL after removing commas and casting to integer. Deequ
        example: .addConstraint(Compliance(''gross_parsable'', ''Gross IS NULL OR
        CAST(regexp_replace(Gross, ",", "") AS BIGINT) IS NOT NULL'')).'
      sources:
      - start_line: 90
        end_line: 94
        file: ''
      - start_line: 125
        end_line: 129
        file: ''
      uid: d61fa6b8-cda5-4f19-9476-c6ea6570f186
    - text: 'Rows that participate in box-office scoring (Gross_int NOT NULL) must
        also have the prerequisites to compute qa_pop_score, i.e., IMDB_Rating present
        and No_of_Votes present and >= 0 (Meta_score optional due to fallback). Deequ
        example: .addConstraint(Compliance(''box_office_has_prereqs'', ''Gross_int
        IS NULL OR (IMDB_Rating IS NOT NULL AND No_of_Votes IS NOT NULL AND No_of_Votes
        >= 0)'')).'
      sources:
      - start_line: 66
        end_line: 67
        file: ''
      - start_line: 125
        end_line: 129
        file: ''
      uid: 7aa31000-5795-4254-824b-759dd0f0f002
  '["IMDB_Rating","Meta_score"]':
    code: []
    assumptions:
    - text: 'At least one of ''Meta_score'' or ''IMDB_Rating'' must be present (non-null)
        for every row, because the pipeline falls back to ''IMDB_Rating'' when ''Meta_score''
        is missing to compute the blended quality signal. We could represent this
        as a Deequ constraint: .satisfies(''IMDB_Rating IS NOT NULL OR Meta_score
        IS NOT NULL'', ''at_least_one_rating_present'')'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: efdcf0f0-78c9-433c-85a3-0cf020c34982
    - text: "The two rating sources are intended to be on the same 0\u201310 scale\
        \ (Meta_score is divided by 10 and blended with IMDB_Rating, and IMDB_Rating\
        \ is bucketed into tenths). Therefore, when 'Meta_score' is present, both\
        \ 'IMDB_Rating' and 'Meta_score/10' must lie within [0, 10]. Deequ example:\
        \ .satisfies('(Meta_score IS NULL) OR ((Meta_score/10) >= 0 AND (Meta_score/10)\
        \ <= 10 AND IMDB_Rating >= 0 AND IMDB_Rating <= 10)', 'ratings_on_same_scale')"
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      uid: fd1cd5e1-1ca0-431f-98d7-7bcde41cf3f5
    - text: 'If ''Meta_score'' is null, the blend substitutes ''IMDB_Rating''. Hence,
        whenever ''Meta_score'' is null, ''IMDB_Rating'' must be non-null and within
        [0, 10]. Deequ example: .satisfies(''CASE WHEN Meta_score IS NULL THEN (IMDB_Rating
        >= 0 AND IMDB_Rating <= 10) ELSE true END'', ''meta_fallback_requires_valid_imdb'')'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: 93cd5e82-74ba-4da6-bf46-289bd3574442
    - text: 'The Bayesian rating combines ''IMDB_Rating'' with ''No_of_Votes'' using
        weights v/(v+M). To avoid invalid weights and NaNs in the blend with Meta/IMDB,
        ''No_of_Votes'' must be non-negative wherever ''IMDB_Rating'' is used. Deequ
        example: .satisfies(''(IMDB_Rating IS NULL) OR (No_of_Votes >= 0)'', ''nonnegative_votes_when_rating_present'')'
      sources:
      - start_line: 48
        end_line: 52
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      uid: c95f733d-68b0-4f80-ab89-8dc6f0b070fb
