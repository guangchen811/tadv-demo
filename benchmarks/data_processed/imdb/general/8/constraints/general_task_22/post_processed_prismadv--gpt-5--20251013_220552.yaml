    assumptions:
    - text: 'IMDB_Rating and No_of_Votes must both be present (non-null and numeric)
        on every row used for scoring/ranking, since they are jointly used to compute
        bayes_rating, pop_component, and qa_pop_score. We could represent this as
        a deequ compliance constraint like: .addConstraint(Compliance(''rating_votes_present'',
        ''IMDB_Rating IS NOT NULL AND No_of_Votes IS NOT NULL'')).'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 48
        end_line: 56
        file: ''
      - start_line: 63
        end_line: 67
        file: ''
      uid: 650486ac-ca8c-464e-8f9d-38bee7ec7516
    - text: 'Value ranges and scale compatibility: IMDB_Rating must be in [0, 10];
        No_of_Votes must be an integer and >= 0; Meta_score must be either null or
        in [0, 100]. This ensures log1p(No_of_Votes) is valid and that Meta_score/10
        is on the same scale as IMDB_Rating when blended. A deequ compliance example:
        .addConstraint(Compliance(''rating_meta_votes_ranges'', ''IMDB_Rating >= 0
        AND IMDB_Rating <= 10 AND No_of_Votes >= 0 AND (Meta_score IS NULL OR (Meta_score
        >= 0 AND Meta_score <= 100))'')).'
      sources:
      - start_line: 48
        end_line: 56
        file: ''
      - start_line: 63
        end_line: 66
        file: ''
      uid: 14bd9140-bc2c-48e8-933f-afcd5397f616
    - text: 'Meta_score fallback assumption: If Meta_score is null, IMDB_Rating must
        be non-null, because meta10_filled falls back to IMDB_Rating and quality_component
        also depends on bayes_rating (which requires IMDB_Rating). Deequ compliance
        example: .addConstraint(Compliance(''meta_fallback_available'', ''Meta_score
        IS NOT NULL OR IMDB_Rating IS NOT NULL'')).'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: a5f1354e-4f2b-46b7-b47a-6109ec23b11b
    - text: 'Cross-source agreement: IMDB_Rating and Meta_score (critic score) should
        agree in direction; require a positive correlation between IMDB_Rating and
        Meta_score across rows where Meta_score is present. In deequ: .addConstraint(HasCorrelation(''IMDB_Rating'',
        ''Meta_score'', _ >= 0.3)).'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: c90f3ccc-8762-4304-88cd-6818560018b2
    - text: "Runtime must be parseable for rows that are scored: for any row with\
        \ a computed qa_pop_score, Runtime should contain a 2\u20133 digit minute\
        \ substring so that Runtime_minutes extraction and int cast succeed. Deequ\
        \ compliance example: .addConstraint(Compliance('runtime_parseable_for_scoring',\
        \ 'qa_pop_score IS NULL OR Runtime RLIKE \"[0-9]{2,3}\"'))."
      sources:
      - start_line: 57
        end_line: 60
        file: ''
      - start_line: 66
        end_line: 67
        file: ''
      uid: 9eaf71b3-7462-4a83-af85-8bc2c123a36d
    - text: 'Popularity coupling: qa_pop_score should be positively associated with
        No_of_Votes because it includes a log1p(No_of_Votes) component. Enforce a
        positive correlation between qa_pop_score and No_of_Votes. In deequ: .addConstraint(HasCorrelation(''qa_pop_score'',
        ''No_of_Votes'', _ >= 0.3)).'
      sources:
