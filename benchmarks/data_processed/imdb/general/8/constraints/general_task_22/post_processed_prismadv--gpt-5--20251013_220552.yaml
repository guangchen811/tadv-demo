prismadv_config:
  model:
    use_async: true
    use_dataflow: true
    correlation_detection: true
    downstream_task_description: No specific description provided. The script can
      be used for any task.
  llm:
    model_name: gpt-5
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("CAST(IMDB_Rating AS DOUBLE) IS NOT NULL AND NOT isnan(CAST(IMDB_Rating
        AS DOUBLE))", "IMDB_Rating parsed and not NaN", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: ff8aa08d-bad6-4702-80f4-0b4a7fc95ee1
      source_assumptions:
      - cbb42cdd-6c88-4905-af4f-d56f61ff75d5
    - suggestion: '.satisfies("CAST(IMDB_Rating AS DOUBLE) NOT IN (CAST(''Infinity''
        AS DOUBLE), CAST(''-Infinity'' AS DOUBLE))", "IMDB_Rating finite", lambda
        x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 0128c390-5e29-47d8-be87-d62cb50fc565
      source_assumptions:
      - cbb42cdd-6c88-4905-af4f-d56f61ff75d5
    - suggestion: '.satisfies("CAST(IMDB_Rating AS DOUBLE) >= 0 AND CAST(IMDB_Rating
        AS DOUBLE) <= 10", "IMDB_Rating in [0,10]", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 73216c98-1417-4cbf-889e-4054c6120168
      source_assumptions:
      - ae1b4bc2-ffdf-4dc2-8cab-d9c39840b24c
    - suggestion: '.satisfies("abs(CAST(IMDB_Rating AS DOUBLE) * 10 - round(CAST(IMDB_Rating
        AS DOUBLE) * 10)) < 1e-6", "IMDB_Rating one-decimal granularity", lambda x:
        x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 8c777cd0-9541-4420-9d8e-2c0717979bfd
      source_assumptions:
      - b757244c-b48a-448d-a4e3-8e04d8644d60
    assumptions:
    - text: 'IMDB_Rating must be present for every row and successfully parse to a
        finite numeric value (no nulls, ''inf'', or ''-inf''). This is required because
        the code multiplies it and casts to int, computes means, and blends it into
        other numeric formulas. Example validations: Deequ -> hasCompleteness(''IMDB_Rating'',
        lambda x: x == 1.0) and satisfies(''NOT isnan(IMDB_Rating)'', ''IMDB_Rating
        not NaN'', lambda x: x == 1.0) and satisfies(''IMDB_Rating NOT IN (CAST("Infinity"
        AS DOUBLE), CAST("-Infinity" AS DOUBLE))'', ''IMDB_Rating finite'', lambda
        x: x == 1.0); Great Expectations -> expect_column_values_to_not_be_null(''IMDB_Rating'')
        and expect_column_values_to_not_be_in_set(''IMDB_Rating'', [inf, -inf]).'
      sources:
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 48
        end_line: 52
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: cbb42cdd-6c88-4905-af4f-d56f61ff75d5
    - text: "IMDB_Rating values should lie within the 0\u201310 scale inclusive, aligning\
        \ with IMDB conventions and the Meta_score/10 blend used downstream. Example\
        \ validations: Deequ -> satisfies('IMDB_Rating >= 0 AND IMDB_Rating <= 10',\
        \ 'IMDB_Rating in [0,10]', lambda x: x == 1.0); Great Expectations -> expect_column_values_to_be_between('IMDB_Rating',\
        \ min_value=0, max_value=10)."
      sources:
      - start_line: 55
        end_line: 56
        file: ''
      - start_line: 42
        end_line: 45
        file: ''
      uid: ae1b4bc2-ffdf-4dc2-8cab-d9c39840b24c
    - text: 'IMDB_Rating should be quantized to tenths (one decimal place), i.e.,
        IMDB_Rating*10 is effectively an integer. This prevents misbucketing when
        casting to int for rating_tenth. Example validations: Deequ -> satisfies(''abs(IMDB_Rating*10
        - round(IMDB_Rating*10)) < 1e-6'', ''IMDB_Rating one-decimal granularity'',
        lambda x: x == 1.0); Great Expectations -> a custom expectation ensuring values
        have at most one decimal place.'
      sources:
      - start_line: 42
        end_line: 45
        file: ''
      uid: b757244c-b48a-448d-a4e3-8e04d8644d60
  Certificate:
