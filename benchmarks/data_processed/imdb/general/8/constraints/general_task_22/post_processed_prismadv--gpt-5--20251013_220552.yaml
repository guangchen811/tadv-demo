      source_assumptions:
      - 2411f089-224f-402e-aa86-bf7b3d09779e
    - suggestion: '.hasApproxCountDistinct(''Certificate'', lambda v: v <= 20)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 31688705-e13a-4d6a-b2ca-215229945d27
      source_assumptions:
      - b245edc3-e5fc-4d2d-9e4e-dcf5fd4fac62
    assumptions:
    - text: 'The input must contain a ''Certificate'' column, and its non-null values
        should be string-like (castable to string). This is required because the code
        casts the column to object, maps it against a string-keyed maturity dictionary,
        and serializes it to text in multiple outputs. We could represent this as:
        Great Expectations: expect_column_to_exist(''Certificate'') and expect_column_values_to_be_in_type_list(''Certificate'',
        [''str'', ''object'']) (or expect_column_values_to_not_be_null with mostly
        applied to type-check after coercion). Deequ: hasDataType(''Certificate'',
        ConstrainableDataTypes.String) and satisfies(''CASE WHEN Certificate IS NULL
        THEN 1 ELSE CASE WHEN CAST(Certificate AS STRING) IS NOT NULL THEN 1 ELSE
        0 END END'', ''Certificate string-castable'', lambda x: x == 1).'
      sources:
      - start_line: 39
        end_line: 39
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      - start_line: 100
        end_line: 100
        file: ''
      - start_line: 108
        end_line: 109
        file: ''
      - start_line: 114
        end_line: 114
        file: ''
      - start_line: 136
        end_line: 136
        file: ''
      - start_line: 155
        end_line: 156
        file: ''
      uid: 73477db4-a060-458b-9aa3-40268f12d8e9
    - text: 'At least 85% of rows should have a non-null ''Certificate'' value. Missing
        or null certificates are treated as the highest maturity (level 3), which
        will shrink the kids-safe pool and also produce nulls in outputs. Based on
        the current data profile (about 89.8% completeness), a threshold of 0.85 is
        reasonable. Great Expectations: expect_column_values_to_not_be_null(''Certificate'',
        mostly=0.85). Deequ: completeness(''Certificate'') >= 0.85.'
      sources:
      - start_line: 82
        end_line: 85
        file: ''
      - start_line: 108
        end_line: 114
        file: ''
      - start_line: 136
        end_line: 136
        file: ''
      - start_line: 155
        end_line: 156
        file: ''
      uid: e666a1de-37ec-4a56-8ead-80d9c25629e8
    - text: 'Non-null ''Certificate'' values should predominantly be one of the known
        maturity categories: [''U'', ''G'', ''PG'', ''TV-PG'', ''UA'', ''PG-13'',
        ''TV-14'', ''R'', ''TV-MA'', ''NC-17'', ''A'', ''Not Rated'', ''Unrated'',
        ''Approved'', ''Passed'', ''U/A'', ''GP'']. At least 95% of non-null values
        should be in this set so the maturity mapping works as intended. Great Expectations:
        expect_column_values_to_be_in_set(''Certificate'', allowed_set, mostly=0.95).
        Deequ: satisfies(''CASE WHEN Certificate IS NULL THEN 1 WHEN Certificate IN
        ("U","G","PG","TV-PG","UA","PG-13","TV-14","R","TV-MA","NC-17","A","Not Rated","Unrated","Approved","Passed","U/A","GP")
        THEN 1 ELSE 0 END'', ''Valid Certificate categories'', lambda x: x >= 0.95).'
      sources:
      - start_line: 77
        end_line: 81
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      uid: 50f41dcc-b896-49eb-9ee0-0ae9ee207665
    - text: 'Certificate values should be cleanly formatted (no leading/trailing whitespace)
        and not multi-valued (no commas). The mapping uses exact string keys without
        trimming or splitting, so stray spaces or comma-separated values will be treated
        as unknown. Great Expectations: expect_column_values_to_match_regex(''Certificate'',
        ''^\s*[^,\s](?:.*[^\s])?$'', mostly=1.0) allowing nulls; or expect_column_values_to_not_match_regex(''Certificate'',
        '','', mostly=1.0) combined with expect_column_values_to_be_in_set for exact
        keys. Deequ: satisfies(''CASE WHEN Certificate IS NULL THEN 1 WHEN Certificate
        = TRIM(Certificate) AND Certificate NOT LIKE "%,%" THEN 1 ELSE 0 END'', ''Certificate
        trimmed and single-valued'', lambda x: x == 1).'
      sources:
      - start_line: 77
        end_line: 82
        file: ''
      uid: d9847de0-7baa-4e8a-8242-216e21d920fb
    - text: 'There should be at least one title whose ''Certificate'' is in a kids-safe
        category (maturity level <= 1), e.g., one of [''U'', ''G'', ''PG'', ''TV-PG'',
        ''Approved'', ''Passed''], to avoid an empty family carousel. Great Expectations:
        expect_table_row_count_to_be_between with a row_condition like ''Certificate
        in (..kids-safe set..)'' and min_value=1. Deequ: satisfies(''CASE WHEN Certificate
        IN ("U","G","PG","TV-PG","Approved","Passed") THEN 1 ELSE 0 END'', ''At least
        one kids-safe certificate present'', lambda x: x > 0).'
      sources:
      - start_line: 77
        end_line: 82
        file: ''
      - start_line: 123
        end_line: 123
        file: ''
      uid: 2411f089-224f-402e-aa86-bf7b3d09779e
    - text: 'The number of distinct non-null ''Certificate'' categories should be
        low (<= 20), reflecting a controlled set of maturity ratings and preventing
        unexpected new labels that will not map. Great Expectations: expect_column_unique_value_count_to_be_between(''Certificate'',
        min_value=1, max_value=20). Deequ: approximateCountDistinct(''Certificate'')
        <= 20.'
      sources:
      - start_line: 77
        end_line: 82
        file: ''
      uid: b245edc3-e5fc-4d2d-9e4e-dcf5fd4fac62
  '["Certificate","Genre"]':
    code:
    - suggestion: '.satisfies(''NOT((`Certificate` IN ("U","G","PG","TV-PG","Approved","Passed"))
        AND (`Genre` RLIKE "(^|, )Horror(, |$)" OR `Genre` RLIKE "(^|, )Thriller(,
        |$)"))'', ''no_kid_cert_with_banned_genres'', lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 37c07188-2e59-440d-9437-d1b8c71d61e4
      source_assumptions:
      - 0691e749-12c2-4fe2-8073-feaf1edc4d31
    assumptions:
    - text: 'Kids-safe status is determined jointly by Certificate and Genre. For
        any row where is_kids_safe is true, the Certificate must map to a maturity_level
        <= 1 (i.e., Certificate in {''U'',''G'',''PG'',''TV-PG'',''Approved'',''Passed''})
        AND Genre must NOT contain the standalone tokens ''Horror'' or ''Thriller''
        (genres are split on '', ''). Example Deequ constraint: .satisfies(''(is_kids_safe
        = true) OR (is_kids_safe = false)'', ''placeholder'') is too weak; use: .satisfies(''(is_kids_safe
        = false) OR (maturity_level <= 1 AND NOT(Genre RLIKE "(^|, )Horror(, |$)"
        OR Genre RLIKE "(^|, )Thriller(, |$)"))'', ''kids_safe_implies_policy'')'
      sources:
      - start_line: 71
        end_line: 73
        file: ''
      - start_line: 77
        end_line: 85
        file: ''
      uid: 8a81647b-7152-408a-beb8-e03c3e0a2ad2
    - text: 'Rows with null or unmapped Certificate (i.e., maturity_level is null
        after mapping) must not be marked kids-safe. In other words, is_kids_safe
        implies maturity_level is not null and <= 1. Example Deequ constraint: .satisfies(''(maturity_level
        IS NOT NULL) OR (is_kids_safe = false)'', ''no_kids_safe_without_cert'')'
      sources:
      - start_line: 77
        end_line: 85
        file: ''
      uid: 51fc040a-8d99-491d-a92c-e963ecc1745c
    - text: 'Child-appropriate certificates (maturity_level <= 1; {''U'',''G'',''PG'',''TV-PG'',''Approved'',''Passed''})
        must not co-occur with Horror/Thriller genres. Example Deequ constraint: .satisfies(''NOT((maturity_level
        <= 1) AND (Genre RLIKE "(^|, )Horror(, |$)" OR Genre RLIKE "(^|, )Thriller(,
        |$)"))'', ''no_kid_cert_with_banned_genres'')'
      sources:
      - start_line: 71
        end_line: 73
        file: ''
      - start_line: 77
        end_line: 85
        file: ''
      uid: d9796ff2-7899-4b07-ba0c-fc7d1ddb7a29
    - text: 'The computed is_kids_safe flag must be consistent in both directions
        with the joint policy on Certificate and Genre: (maturity_level <= 1 AND NOT(Genre
        has ''Horror'' or ''Thriller'' as standalone tokens)) if and only if is_kids_safe
        is true. Example Deequ constraint: .satisfies(''((maturity_level <= 1 AND
        NOT(Genre RLIKE "(^|, )Horror(, |$)" OR Genre RLIKE "(^|, )Thriller(, |$)"))
        = is_kids_safe)'', ''kids_safe_equivalence'')'
      sources:
      - start_line: 71
        end_line: 73
        file: ''
      - start_line: 77
        end_line: 85
        file: ''
      uid: 0691e749-12c2-4fe2-8073-feaf1edc4d31
    - text: 'For any row included in the ''family'' carousel (df[df[''is_kids_safe'']]),
        the pair (Certificate, Genre) must satisfy the kids policy: Certificate maps
        to maturity_level <= 1 and Genre lacks ''Horror''/''Thriller'' tokens. This
        can be validated pre-export with a Deequ check on the full dataset as: .satisfies(''(is_kids_safe
        = false) OR (Certificate IN ("U","G","PG","TV-PG","Approved","Passed") AND
        NOT(Genre RLIKE "(^|, )Horror(, |$)" OR Genre RLIKE "(^|, )Thriller(, |$)"))'',
        ''family_carousel_policy'')'
      sources:
      - start_line: 71
        end_line: 73
        file: ''
      - start_line: 77
        end_line: 85
        file: ''
      - start_line: 122
        end_line: 124
        file: ''
      uid: 220b8026-7a71-4c39-bf42-eabaa22cba76
  '["Certificate","Released_Year"]':
    code: []
    assumptions:
    - text: "Kids-safe gating is fully determined by Certificate and Genre: For every\
        \ record, is_kids_safe must equal ((coalesce(map_from_values(Certificate)\
        \ to maturity_level with default 3) <= 1) AND Genre does not contain 'Horror'\
        \ or 'Thriller'). Concretely, rows are kids-safe only if Certificate \u2208\
        \ {U, G, PG, TV-PG, Approved, Passed} and Genre lacks Horror/Thriller; otherwise\
        \ is_kids_safe must be False."
      sources:
      - start_line: 71
        end_line: 75
        file: ''
      - start_line: 82
        end_line: 85
        file: ''
      - start_line: 123
        end_line: 123
        file: ''
      uid: 69182f22-d061-45c3-95e3-9fbe3199ead1
    - text: 'Conservative default when Certificate is missing or unrecognized: If
        Certificate is null or not in the maturity_map domain, then is_kids_safe must
        be False regardless of Genre (because maturity_level is set to 3 by fillna
        and only levels <= 1 are allowed for kids-safe).'
      sources:
      - start_line: 82
        end_line: 85
        file: ''
      - start_line: 123
        end_line: 123
        file: ''
      uid: 93007d41-a261-4a74-b307-865e4030f6d9
    - text: "Legacy certificates must align temporally with the release year: If Certificate\
        \ \u2208 {Approved, Passed}, then Released_Year should be <= 1969. This guards\
        \ the temporal consistency implied by the policy comment before using these\
        \ fields together downstream."
      sources:
      - start_line: 68
        end_line: 69
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      - start_line: 100
        end_line: 100
        file: ''
      uid: f32f7de2-f97f-4224-a9a2-668aaa90949f
    - text: 'Modern certificates must align temporally with the release year: (a)
        If Certificate starts with ''TV-'' (TV-PG, TV-14, TV-MA), then Released_Year
        should be >= 1997; (b) If Certificate == ''PG-13'', then Released_Year should
        be >= 1984; (c) If Certificate == ''NC-17'', then Released_Year should be
        >= 1990.'
      sources:
      - start_line: 68
        end_line: 69
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      - start_line: 100
        end_line: 100
        file: ''
      uid: 443412fe-5a34-4cac-82dd-c41256e08f78
