      source_assumptions:
      - d9847de0-7baa-4e8a-8242-216e21d920fb
    - suggestion: '.satisfies("CASE WHEN Certificate IN (''U'',''G'',''PG'',''TV-PG'',''Approved'',''Passed'')
        THEN 1 ELSE 0 END", "At least one kids-safe certificate present", lambda x:
        x > 0)'
      validity: true
      reason_if_invalid: ''
      level: warning
