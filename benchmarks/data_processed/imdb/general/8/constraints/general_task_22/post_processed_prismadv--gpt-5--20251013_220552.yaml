        no empty tokens (e.g., ''Action, Adventure, Sci-Fi''). This ensures splitting
        and token membership checks behave as intended. Possible validation rule:
        Deequ: .satisfies("CASE WHEN Genre RLIKE ''^([A-Za-z][A-Za-z /&+\-]*)(, [A-Za-z][A-Za-z
        /&+\-]*)*$'' THEN 1 ELSE 0 END", "Genre tokenization format", lambda x: x
        == 1). Great Expectations: expect_column_values_to_match_regex with the same
        pattern.'
      sources:
      - start_line: 71
        end_line: 73
        file: ''
      - start_line: 83
        end_line: 85
        file: ''
      uid: 011ca9f7-97f8-432c-8fc5-3fcd97c14693
    - text: 'If the words ''Animation'', ''Family'', ''Horror'', or ''Thriller'' appear
        in the ''Genre'' string, they must appear as exact, standalone tokens separated
        by the expected delimiter and with exact case (e.g., ''..., Horror, ...'',
        not ''Horror/Thriller'' or ''horror''). This is required for kids-safety flags
        that rely on exact token membership. Possible validation rules (each must
        hold): Deequ: .satisfies("CASE WHEN Genre LIKE ''%Animation%'' THEN CASE WHEN
        Genre RLIKE ''(^|, )Animation(, |$)'' THEN 1 ELSE 0 END ELSE 1 END", "Animation
        as standalone token", lambda x: x == 1); .satisfies("CASE WHEN Genre LIKE
        ''%Family%'' THEN CASE WHEN Genre RLIKE ''(^|, )Family(, |$)'' THEN 1 ELSE
        0 END ELSE 1 END", "Family as standalone token", lambda x: x == 1); .satisfies("CASE
        WHEN Genre LIKE ''%Horror%'' THEN CASE WHEN Genre RLIKE ''(^|, )Horror(, |$)''
        THEN 1 ELSE 0 END ELSE 1 END", "Horror as standalone token", lambda x: x ==
        1); .satisfies("CASE WHEN Genre LIKE ''%Thriller%'' THEN CASE WHEN Genre RLIKE
        ''(^|, )Thriller(, |$)'' THEN 1 ELSE 0 END ELSE 1 END", "Thriller as standalone
        token", lambda x: x == 1).'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 83
        end_line: 85
        file: ''
      uid: d361b6eb-4979-47aa-82a7-01f3715eeda0
    - text: 'Genre tokens should use canonical capitalization (initial uppercase letters)
        so that exact, case-sensitive membership checks (''Animation'', ''Family'',
        ''Horror'', ''Thriller'') work. Possible validation rule: Deequ: .satisfies("CASE
        WHEN Genre RLIKE ''^([A-Z][A-Za-z /&+\-]*)(, [A-Z][A-Za-z /&+\-]*)*$'' THEN
        1 ELSE 0 END", "Capitalized genre tokens", lambda x: x == 1). Great Expectations:
        expect_column_values_to_match_regex with the same pattern.'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 83
        end_line: 85
        file: ''
      uid: 5bee7e0a-c724-47fb-8d8e-aada7ea439e1
