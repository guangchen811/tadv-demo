constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['U', 'UA', 'U/A', 'A', 'G', 'PG', 'PG-13',
        'R', 'NC-17', 'Not Rated', 'TV-14', 'TV-MA'])
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isBetween('IMDB_Rating', 0.0, 10.0)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .compliesWith('Runtime', "`Runtime` RLIKE '\\d+'")
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
