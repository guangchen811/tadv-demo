constraints:
  Certificate:
    code:
    - - .satisfies("Certificate IS NULL OR upper(Certificate) IN ('U','G','PG','PG-13','UA','A','R','NC-17','NOT
        RATED','UNRATED')", 'certificate_allowed_values')
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - .satisfies("Gross IS NULL OR Gross RLIKE '^[0-9]{1,3}(,[0-9]{3})*$'", 'gross_thousands_separated')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isBetween('IMDB_Rating', 0.0, 10.0, includeLowerBound=True, includeUpperBound=True)
      - Invalid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - '.hasMin(''No_of_Votes'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .isComplete('Overview')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', r'^https?://')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    - - .isUnique('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMax(''Released_Year'', lambda v: v <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^\d+\s*min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    - - .satisfies("CAST(regexp_extract(Runtime, '^(\\d+)', 1) AS INT) BETWEEN 40
        AND 300", 'runtime_minutes_range')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
