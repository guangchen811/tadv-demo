constraints:
  Certificate:
    code:
    - - .hasMinLength('Certificate', 1, ignore_null=True)
      - Invalid
    - - .isStringType('Certificate')
      - Invalid
    assumptions: []
  Director:
    code:
    - - .hasMinLength('Director', 1)
      - Invalid
    - - .isComplete('Director')
      - Valid
    assumptions: []
  Genre:
    code:
    - - .hasMinLength('Genre', 1)
      - Invalid
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - .isStringType('Gross')
      - Invalid
    - - .satisfies('Gross', "CAST(regexp_replace(Gross, ',', '') AS DOUBLE) >= 0",
        ignore_null=True)
      - Invalid
    - - .satisfies('Gross', "Gross IS NULL OR Gross IN ('', 'nan', 'None', 'NaN')
        OR regexp_replace(Gross, ',', '') RLIKE '^[0-9]+$'")
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isFractional('IMDB_Rating')
      - Invalid
    - - .isGreaterThanOrEqualTo('IMDB_Rating', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - .isFractional('Meta_score')
      - Invalid
    - - .isGreaterThanOrEqualTo('Meta_score', 0.0, ignore_null=True)
      - Invalid
    - - .isLessThanOrEqualTo('Meta_score', 100.0, ignore_null=True)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isIntegral('No_of_Votes')
      - Invalid
    - - .isPositive('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .hasMinLength('Overview', 1)
      - Invalid
    - - .isComplete('Overview')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .containsURL('Poster_Link')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isGreaterThanOrEqualTo('Released_Year', 1900)
      - Invalid
    - - .isIntegral('Released_Year')
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', 2024)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .isComplete('Runtime')
      - Valid
    - - .satisfies('Runtime', "CAST(regexp_extract(Runtime, '^([1-9][0-9]{1,2}) min$',
        1) AS INT) <= 240")
      - Invalid
    - - .satisfies('Runtime', "CAST(regexp_extract(Runtime, '^([1-9][0-9]{1,2}) min$',
        1) AS INT) >= 60")
      - Invalid
    - - .satisfies('Runtime', "Runtime RLIKE '^[1-9][0-9]{1,2} min$'")
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .hasMinLength('Series_Title', 1)
      - Invalid
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Star1:
    code:
    - - .hasMinLength('Star1', 1)
      - Invalid
    - - .isComplete('Star1')
      - Valid
    assumptions: []
  Star2:
    code:
    - - .hasMinLength('Star2', 1)
      - Invalid
    - - .isComplete('Star2')
      - Valid
    assumptions: []
  Star3:
    code:
    - - .hasMinLength('Star3', 1)
      - Invalid
    - - .isComplete('Star3')
      - Valid
    assumptions: []
  Star4:
    code:
    - - .hasMinLength('Star4', 1)
      - Invalid
    - - .isComplete('Star4')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isPositive('id')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
