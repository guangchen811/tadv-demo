      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `IMDB_Rating` >= 7.0 AND regexp_extract(`Runtime`,
        ''^([1-9][0-9]{1,2}) min$'', 1) <> '''' AND CAST(regexp_extract(`Runtime`,
