      status: true
      reason_if_failed: ''
      level: error
  '["IMDB_Rating","Runtime"]':
    code:
    - suggestion: '.satisfies("IMDB_Rating IS NULL OR Runtime RLIKE ''^[1-9][0-9]{1,2}
