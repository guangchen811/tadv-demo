      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.isNonNegative("No_of_Votes", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`No_of_Votes` AS STRING) RLIKE ''^[0-9]+$''",
