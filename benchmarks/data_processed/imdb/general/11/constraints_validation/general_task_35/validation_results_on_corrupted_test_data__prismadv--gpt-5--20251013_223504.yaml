      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("Runtime", "^([1-9][0-9]{1,2}) min$", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(regexp_extract(`Runtime`, ''^([1-9][0-9]{1,2})
        min$'', 1) AS INT) BETWEEN 80 AND 140", "Runtime within target window", lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Released_Year","Runtime","Series_Title"]':
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda v:
