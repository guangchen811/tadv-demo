    - suggestion: '.satisfies(''IMDB_Rating >= 7.0'', ''High-quality titles present'',
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Director:
    code:
    - suggestion: .isComplete('Director')
      status: true
      reason_if_failed: ''
      level: warning
  '["Director","Released_Year","Series_Title"]':
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda u:
        u == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: '.satisfies("(NOT (IMDB_Rating >= 7.0 AND CAST(regexp_extract(Runtime,
        ''^([1-9][0-9]{1,2}) min$'', 1) AS INT) BETWEEN 80 AND 140)) OR (Genre IS
        NOT NULL AND length(trim(Genre)) > 0)", "Genre present for shortlisted rows",
