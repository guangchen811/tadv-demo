results:
  Star1:
    code:
    - suggestion: '.hasCompleteness("Star1", lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(`Star1`) <> '''' AND LOWER(TRIM(`Star1`)) <> ''nan''",
        "Star1 trimmed non-empty and not ''nan''", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Star2:
    code:
    - suggestion: '.satisfies("CASE WHEN `Star2` IS NULL OR TRIM(`Star2`) = '''' OR
        LOWER(TRIM(`Star2`)) = ''nan'' THEN 0 ELSE 1 END", "Star2 present and non-empty",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Star3:
    code:
    - suggestion: '.satisfies("CASE WHEN `Star3` IS NULL OR LOWER(TRIM(CAST(`Star3`
        AS STRING))) = ''nan'' OR TRIM(CAST(`Star3` AS STRING)) = '''' THEN 0 ELSE
        1 END", "Star3 present and non-empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Star4:
    code:
    - suggestion: '.satisfies("(`Star4` IS NOT NULL) AND (TRIM(CAST(`Star4` AS STRING))
        NOT IN ('''', ''nan'', ''NaN'', ''NAN''))", "Star4 present and non-empty",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("((TRIM(CAST(`Star4` AS STRING)) <> TRIM(CAST(`Star1`
        AS STRING))) OR `Star1` IS NULL) AND ((TRIM(CAST(`Star4` AS STRING)) <> TRIM(CAST(`Star2`
        AS STRING))) OR `Star2` IS NULL) AND ((TRIM(CAST(`Star4` AS STRING)) <> TRIM(CAST(`Star3`
        AS STRING))) OR `Star3` IS NULL)", "Star4 distinct from Star1-3", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("`IMDB_Rating` IS NULL OR CAST(`IMDB_Rating` AS DOUBLE)
        IS NOT NULL", "IMDB_Rating parseable when present", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`IMDB_Rating` IS NULL OR (CAST(`IMDB_Rating` AS DOUBLE)
        >= 0.0 AND CAST(`IMDB_Rating` AS DOUBLE) <= 10.0)", "IMDB_Rating within 0-10
        when present", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`IMDB_Rating` IS NULL OR (CAST(`IMDB_Rating`
        AS DOUBLE) >= 0.0 AND CAST(`IMDB_Rating` AS DOUBLE) <= 10.0)", "IMDB_Rating
        within 0-10 when present", lambda x: x == 1)'' failed on data sample: Value:
        0.95 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("NOT (COALESCE(CAST(regexp_extract(`Runtime`, ''(\\d+)'',
        1) AS INT), -1) BETWEEN 60 AND 210) OR lower(`Genre`) LIKE ''%short%'' OR
        (CAST(`IMDB_Rating` AS DOUBLE) >= 7.0)", "Eligible rows (by runtime/genre)
        must have IMDB_Rating >= 7.0", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', lambda c: c >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Certificate` IS NULL) OR (`Certificate` = TRIM(`Certificate`))",
        "Certificate trimmed when present", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Certificate` IS NULL) OR (LENGTH(TRIM(`Certificate`))
        >= 1 AND LENGTH(TRIM(`Certificate`)) <= 10)", "Certificate reasonable length
        1-10 when present", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Certificate` IS NULL) OR (UPPER(TRIM(`Certificate`))
        RLIKE ''^[A-Z0-9 +\\-]{1,10}$'')", "Certificate allowed characters when present",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Certificate` IS NULL) OR (UPPER(TRIM(`Certificate`))
        IN (''G'',''PG'',''PG-13'',''R'',''NC-17'',''U'',''UA'',''A'',''12'',''12A'',''15'',''18'',''TV-Y'',''TV-Y7'',''TV-G'',''TV-PG'',''TV-14'',''TV-MA'',''NOT
        RATED'',''NR'',''UNRATED'',''PASSED'',''18+''))", "Certificate known-domain
        coverage (nulls allowed)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Certificate","Gross","IMDB_Rating","Runtime","Star1","Star2","Star3","Star4"]':
    code:
    - suggestion: '.hasUniqueness(columns=[''Series_Title'', ''Released_Year''], assertion=lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT(lower(trim(`Genre`)) IN ('''', ''nan'', ''none'',
        ''n/a'', ''na''))", "No placeholder/empty Genre", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Genre'', ''^\\s*[A-Za-z][A-Za-z0-9\\- ]*(\\s*,\\s*[A-Za-z][A-Za-z0-9\\-
        ]*)*\\s*$'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Genre'', ''^\\s*(Action|Adventure|Animation|Biography|Comedy|Crime|Documentary|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Short|Sport|Thriller|War|Western)(\\s*,|$)'',
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT(`Genre` RLIKE ''(^|,)(\\s*)Short(\\s*)(,|$)'')
        OR (`Genre` RLIKE ''^\\s*Short(\\s*)(,|$)'')", "Short must be first token
        when present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.satisfies("TRIM(Gross) RLIKE ''^[0-9,]+$''", "At least one parseable
        Gross", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("Gross IS NULL OR TRIM(Gross) = '''' OR TRIM(Gross)
        RLIKE ''^[0-9,]+$''", "Gross numeric-like format when present", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.hasCompleteness(''No_of_Votes'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`No_of_Votes` AS STRING) RLIKE ''^[0-9]+$''",
        "No_of_Votes digits only", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`No_of_Votes` IS NULL OR CAST(`No_of_Votes` AS DOUBLE)
        >= 0", "Non-negative votes", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.hasCompleteness(''Released_Year'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Released_Year RLIKE ''^[0-9]+$''", ''Numeric Released_Year'',
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(Released_Year AS DOUBLE) = CAST(CAST(Released_Year
        AS BIGINT) AS DOUBLE)'', ''Integer-like Released_Year'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(Released_Year AS INT) BETWEEN 1900 AND 2100'',
        ''Plausible year range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: '.hasPattern("Runtime", "^\\s*\\d+\\s*(min|minutes)?\\s*$", lambda
        x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  Series_Title:
    code:
    - suggestion: .isComplete("Series_Title")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("trim(`Series_Title`) <> '''' AND lower(trim(`Series_Title`))
        NOT IN (''nan'',''none'',''null'')", "Series_Title non-empty and not placeholder",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
