constraints:
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isBetween('IMDB_Rating', 0.0, 10.0)
      - Invalid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda x: x >= 0.80, ''Meta_score completeness
        should be at least 80%'')'
      - Valid
    - - .isBetween('Meta_score', 0.0, 100.0, include_nulls=True)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', r'^https?://.*')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isPositive('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^\\s*\\d+\\s*min\\s*$')
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
