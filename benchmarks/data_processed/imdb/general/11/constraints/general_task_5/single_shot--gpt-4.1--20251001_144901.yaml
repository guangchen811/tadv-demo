constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda x: x >= 0.89).isContainedIn(''Certificate'',
        [''G'', ''PG'', ''PG-13'', ''R'', ''NC-17'', ''U'', ''UA'', ''A'', ''12'',
        ''12A'', ''15'', ''18'', None, ''nan''])'
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director').hasDataType('Director', ConstrainableDataTypes.String)
      - Valid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre').hasDataType('Genre', ConstrainableDataTypes.String)
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda x: x >= 0.82)'
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating').hasDataType('IMDB_Rating', ConstrainableDataTypes.Float)
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda x: x >= 0.85)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes').hasDataType('No_of_Votes', ConstrainableDataTypes.Integral).isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .isComplete('Overview').hasDataType('Overview', ConstrainableDataTypes.String)
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .isComplete('Poster_Link').hasDataType('Poster_Link', ConstrainableDataTypes.String)
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year').hasDataType('Released_Year', ConstrainableDataTypes.Integral).isContainedIn('Released_Year',
        [str(y) for y in range(1900, datetime.now().year + 1)])
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .isComplete('Runtime').hasDataType('Runtime', ConstrainableDataTypes.String).containsPattern('Runtime',
        r'^\d{2,3} min$')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title').hasDataType('Series_Title', ConstrainableDataTypes.String)
      - Valid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1').hasDataType('Star1', ConstrainableDataTypes.String)
      - Valid
    assumptions: []
  Star2:
    code:
    - - .isComplete('Star2').hasDataType('Star2', ConstrainableDataTypes.String)
      - Valid
    assumptions: []
  Star3:
    code:
    - - .isComplete('Star3').hasDataType('Star3', ConstrainableDataTypes.String)
      - Valid
    assumptions: []
  Star4:
    code:
    - - .isComplete('Star4').hasDataType('Star4', ConstrainableDataTypes.String)
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id').hasDataType('id', ConstrainableDataTypes.Integral).isUnique('id')
      - Valid
    assumptions: []
