constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['U','G','PG','TV-PG','UA','PG-13','TV-14','R','TV-MA','NC-17','A','Not
        Rated','Unrated','Approved','Passed','U/A','GP'])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .containsPattern('Genre', '^[^,]+(, [^,]+)*$')
      - Invalid
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - .containsPattern('Gross', '^\\d{1,3}(,\\d{3})*$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda m: m <= 10)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasMax(''Meta_score'', lambda v: v <= 100)'
      - Valid
    - - '.hasMin(''Meta_score'', lambda v: v >= 0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .containsPattern('Poster_Link', '^https?://')
      - Invalid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMax(''Released_Year'', lambda v: v <= 2035)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .containsPattern('Runtime', '\\b\\d{2,3}\\b')
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
