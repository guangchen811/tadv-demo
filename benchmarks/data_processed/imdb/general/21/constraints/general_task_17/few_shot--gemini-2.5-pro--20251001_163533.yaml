constraints:
  Gross:
    code:
    - - .satisfies("Gross IS NULL OR Gross RLIKE '^[\\d,]+$'", 'Gross format check')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isContainedIn('IMDB_Rating', 0, 10)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .compliesWithPattern('Runtime', r'^\\d+ min$')
      - Invalid
    assumptions: []
  Series_Title,Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda c: c == 1.0)'
      - Valid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    assumptions: []
