constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['U', 'UA', 'A', 'G', 'PG', 'PG-13', 'R', 'NC-17',
        'Not Rated', 'Unrated', 'Passed', 'Approved'])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  IMDB_Rating_range:
    code:
    - - .isBetween('IMDB_Rating', 0.0, 10.0)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    assumptions: []
  No_of_Votes_nonnegative:
    code:
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Released_Year_min:
    code:
    - - .isGreaterOrEqual('Released_Year', 1888)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^\\d+')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title,Released_Year:
    code:
    - - .isUnique('Series_Title', 'Released_Year')
      - Valid
    assumptions: []
