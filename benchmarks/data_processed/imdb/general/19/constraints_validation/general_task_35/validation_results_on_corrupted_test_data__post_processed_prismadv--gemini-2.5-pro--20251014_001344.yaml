results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies(''`IMDB_Rating` >= 0 AND `IMDB_Rating` <= 10'', ''IMDB_Rating_is_within_0_to_10_scale'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Director:
    code:
    - suggestion: .isComplete("Director")
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: .isComplete("Genre")
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.satisfies("Gross IS NULL OR TRY_CAST(REPLACE(Gross, '','', '''')
        AS DOUBLE) IS NOT NULL", "Gross values should be numeric-like or null", lambda
        x: x > 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("TRY_CAST(REPLACE(Gross, '','', '''') AS DOUBLE) IS
        NOT NULL", "At least one valid Gross value must exist for median imputation",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRY_CAST(REPLACE(Gross, '','', '''') AS DOUBLE) IS
        NULL OR CAST(REPLACE(Gross, '','', '''') AS DOUBLE) >= 0", "Gross values,
        when numeric, must be non-negative", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''hasUniqueness([''Series_Title'', ''Released_Year''],
        lambda x: x == 1.0)'' failed on data sample: Value: 0.941747572815534 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.hasCompleteness(''Series_Title'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Gross","IMDB_Rating","No_of_Votes","Released_Year","Runtime"]':
    code:
    - suggestion: '.hasCorrelation(''IMDB_Rating'', ''No_of_Votes'', lambda corr:
        corr > 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''Released_Year'', ''Runtime''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Gross","IMDB_Rating","Released_Year","Runtime"]':
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda u:
        u == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''hasUniqueness([''Series_Title'', ''Released_Year''],
        lambda u: u == 1.0)'' failed on data sample: Value: 0.941747572815534 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.hasCorrelation(''IMDB_Rating'', ''No_of_Votes'', lambda c: c >
        0.1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","Runtime"]':
    code:
    - suggestion: '.satisfies("`IMDB_Rating` >= 7.0 AND CAST(regexp_extract(`Runtime`,
        ''^[1-9][0-9]{1,2}'', 0) AS INT) BETWEEN 80 AND 140", "Meaningful subset of
        data exists for filtering", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`IMDB_Rating` IS NOT NULL AND `Runtime` RLIKE ''^[1-9][0-9]{1,2}
        min$''", "Rating and Runtime are valid for scoring", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .isComplete('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: '.hasMin(''Released_Year'', lambda min_val: min_val >= 1900)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: .isComplete("Runtime")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("Runtime", "^[\\s]*[1-9][0-9]{1,2} min[\\s]*$", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
