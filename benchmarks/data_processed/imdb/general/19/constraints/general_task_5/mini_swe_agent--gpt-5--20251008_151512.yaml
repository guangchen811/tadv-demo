raw_constraints:
- column_name: Series_Title
  code_for_constraint: .isComplete('Series_Title')
- column_name: Released_Year
  code_for_constraint: .isComplete('Released_Year')
- column_name: Released_Year
  code_for_constraint: .hasPattern('Released_Year', '^\d{4}$')
- column_name: Runtime
  code_for_constraint: .isComplete('Runtime')
- column_name: Runtime
  code_for_constraint: .hasPattern('Runtime', '^\d{2,3} min$')
- column_name: Genre
  code_for_constraint: .isComplete('Genre')
- column_name: Genre
  code_for_constraint: .hasPattern('Genre', '^[A-Za-z-]+(,\s*[A-Za-z-]+)*$')
- column_name: Certificate
  code_for_constraint: .isContainedIn('Certificate', ['G','PG','PG-13','R','NC-17','U','UA','A','12','12A','15','18'])
- column_name: Poster_Link
  code_for_constraint: .isComplete('Poster_Link')
- column_name: Poster_Link
  code_for_constraint: .hasPattern('Poster_Link', '^https?://')
- column_name: IMDB_Rating
  code_for_constraint: .isComplete('IMDB_Rating')
- column_name: IMDB_Rating
  code_for_constraint: .isNonNegative('IMDB_Rating')
- column_name: IMDB_Rating
  code_for_constraint: '.hasMax(''IMDB_Rating'', lambda m: m <= 10.0)'
- column_name: Meta_score
  code_for_constraint: .isNonNegative('Meta_score')
- column_name: Meta_score
  code_for_constraint: '.hasMax(''Meta_score'', lambda m: m <= 100.0)'
- column_name: No_of_Votes
  code_for_constraint: .isComplete('No_of_Votes')
- column_name: No_of_Votes
  code_for_constraint: .isNonNegative('No_of_Votes')
- column_name: No_of_Votes
  code_for_constraint: '.hasMin(''No_of_Votes'', lambda m: m >= 1)'
