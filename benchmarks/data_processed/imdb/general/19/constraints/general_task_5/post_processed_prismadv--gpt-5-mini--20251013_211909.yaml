    - suggestion: '.hasPattern("Gross", "^[0-9\\.,\\s]+$", lambda x: x >= 0.90, name
        = "Gross allowed chars (digits, commas, periods, whitespace)")'
      validity: false
      reason_if_invalid: 'Constraint ''.hasPattern("Gross", "^[0-9\\.,\\s]+$", lambda
        x: x >= 0.90, name = "Gross allowed chars (digits, commas, periods, whitespace)")''
        failed on data sample: Value: 0.8280467445742905 does not meet the constraint
