      uid: 7c3f003b-f656-4172-8eea-5007ee26ba06
    - text: 'Series_Title should contain at least one non-whitespace character after
        trimming. The code uses str(...).strip() and inserts the title into HTML attributes
        and visible text; empty or all-whitespace titles will lead to missing/awkward
        display. Representable as: trimmed length of Series_Title > 0 for all rows
        used downstream.'
      sources:
      - start_line: 93
        end_line: 95
        file: ''
      - start_line: 17
        end_line: 19
        file: ''
      - start_line: 33
        end_line: 36
        file: ''
      - start_line: 186
        end_line: 187
        file: ''
      uid: 3c5acf73-564e-4516-b708-1ad493d22127
    - text: 'Series_Title should not contain unescaped HTML or script tags (e.g.,
        ''<'' or ''>'') because the value is interpolated directly into generated
        HTML without escaping. If such characters may appear, the pipeline should
        escape/clean them before rendering. A practical check: Series_Title should
        not match the regex ''[<>]'' for rows that will be rendered.'
      sources:
      - start_line: 33
        end_line: 36
        file: ''
      - start_line: 32
        end_line: 37
        file: ''
      - start_line: 186
        end_line: 187
        file: ''
      uid: 75abc9a6-580c-467f-8962-d7d312cce0f9
    - text: 'Series_Title must be representable as a reasonable-length UTF-8 string
        (e.g., <= 500 characters). The code converts to str, lowercases, and passes
        the title into safe_slug (which operates on characters a-z0-9) and into HTML
        attributes; extremely long titles may cause very long slugs or malformed output.
        Enforceable as: len(Series_Title) <= 500.'
      sources:
