      uid: 6f0086ad-65d4-4a34-800b-eb29778245bd
    - text: 'No_of_Votes should be integer-valued (no fractional values). The code
        converts votes to int when formatting and when writing the JSON index, so
        fractional vote counts are not expected. Represent as a check that numeric-cast
        values equal their integer cast: CASE WHEN CAST(CAST(`No_of_Votes` AS DOUBLE)
        AS BIGINT) = CAST(`No_of_Votes` AS DOUBLE) THEN 1 ELSE 0 END (require =1),
        or with Great Expectations: expect_column_values_to_be_in_type_list(''No_of_Votes'',[''Integer'']).'
      sources:
      - start_line: 30
        end_line: 30
        file: ''
      - start_line: 192
        end_line: 192
        file: ''
      uid: 30ae65cd-567b-4000-a35e-c04c4a733b46
    - text: 'No_of_Votes should be non-negative (>= 0). The scoring code uses a log10
        transform with clip(lower=1) which treats zero or negative input specially;
        negative votes are not meaningful and should be excluded in input. Represent
        as: CASE WHEN CAST(`No_of_Votes` AS DOUBLE) >= 0 THEN 1 ELSE 0 END with lambda
        x: x == 1 (or Great Expectations: expect_column_values_to_be_between(''No_of_Votes'',
        min_value=0, max_value=None)).'
      sources:
      - start_line: 142
        end_line: 147
        file: ''
      - start_line: 115
        end_line: 115
        file: ''
      uid: 8016aea2-03f4-407e-8c4e-4b971f06a9ba
  Released_Year:
    code:
    - suggestion: '.satisfies("CASE WHEN `Released_Year` RLIKE ''^[0-9]{4}$'' THEN
        1 ELSE 0 END", "Released_Year_4digit", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 58109e37-c6df-4eb7-94c8-cb00a26658dd
      source_assumptions:
      - 238f50e4-f958-401d-8705-34cb3ef83e0c
    - suggestion: '.satisfies("CASE WHEN CAST(`Released_Year` AS INT) BETWEEN 1888
        AND 2025 THEN 1 ELSE 0 END", "Released_Year_in_range", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 2bf00503-38c2-420d-81c8-b46803a83142
      source_assumptions:
      - 367b7316-3a33-4b81-abe7-ba91d7186b6f
    assumptions:
    - text: 'The ''Released_Year'' input column must be a plain 4-digit year (no prefixes/suffixes
        or ranges). In other words each value, after trimming, should match the regex
        ^\d{4}$ so it can be reliably parsed to an integer and used to derive ''Year''
        and ''Decade''. Example validation rules you can convert to Deequ/Great Expectations:

        - Great Expectations: expect_column_values_to_match_regex(''Released_Year'',
        r''^[0-9]{4}$'')

        - Deequ-like: .satisfies("CASE WHEN `Released_Year` RLIKE ''^[0-9]{4}$'' THEN
        1 ELSE 0 END", "Released_Year_4digit", lambda x: x == 1)

        '
      sources:
      - start_line: 93
        end_line: 95
        file: ''
      - start_line: 97
        end_line: 103
        file: ''
      uid: 238f50e4-f958-401d-8705-34cb3ef83e0c
    - text: 'The ''Released_Year'' values, when parsed to integer, should lie in a
        sensible calendar range (e.g. between the beginning of film history and the
        current year). The code intends to validate format and range (comment) and
        captures current_year; enforce e.g. 1888 <= int(Released_Year) <= current_year.
        Example validations:

        - Great Expectations: expect_column_values_to_be_between(''Released_Year'',
        min_value=''1888'', max_value=<current_year>, parse_strings_as_datetimes=False)
        (or convert to numeric before checking)

        - Deequ-like: .satisfies("CASE WHEN CAST(`Released_Year` AS INT) BETWEEN 1888
        AND {CURRENT_YEAR} THEN 1 ELSE 0 END", "Released_Year_in_range", lambda x:
        x == 1)

        (Replace {CURRENT_YEAR} with the runtime year from the environment.)'
      sources:
      - start_line: 92
        end_line: 99
        file: ''
      - start_line: 102
        end_line: 105
        file: ''
      uid: 367b7316-3a33-4b81-abe7-ba91d7186b6f
    - text: 'A sufficient fraction of rows should contain valid 4-digit Released_Year
        values because rows that don''t match the 4-digit pattern are dropped and
        downstream outputs (HTML/JSON and ranking by Decade) rely on the resulting
        ''Year'' column. For example require at least 90% of input rows to match the
        4-digit pattern so the pipeline doesn''t discard most data. Example rule:

        - Deequ-like: .satisfies("CASE WHEN `Released_Year` RLIKE ''^[0-9]{4}$'' THEN
        1 ELSE 0 END", "Valid_Released_Year_Coverage", lambda x: x >= 0.90)

        '
      sources:
      - start_line: 101
        end_line: 105
        file: ''
      - start_line: 31
        end_line: 36
        file: ''
      uid: 9d2b232e-e230-4c46-9029-102fa2ad52b6
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: d84cb3cd-aa16-4d5c-b697-53834efe8f66
      source_assumptions:
      - 48007c55-89d6-4db6-9df6-0d50639b3b14
    - suggestion: '.hasPattern(''Runtime'', r''^\d{1,3}(?:\.\d+)?(?:\smin)?$'', lambda
        x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 42ea82df-3960-429f-b42b-366fd8bd9045
      source_assumptions:
      - 48007c55-89d6-4db6-9df6-0d50639b3b14
      - 10907a69-f3ea-454f-9c87-52750ffef63d
    - suggestion: '.satisfies(''CASE WHEN `Released_Year` RLIKE ''^\\d{4}$'' THEN
        CASE WHEN `Runtime` RLIKE ''^\\d{2,3} min$'' THEN 1 ELSE 0 END ELSE 1 END'',
        ''Runtime parseable for year-filtered rows'', lambda x: x == 1)'
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''.satisfies(''CASE WHEN
        `Released_Year` RLIKE ''^\\d{4}$'' THEN CASE WHEN `Runtime` RLIKE ''^\\d{2,3}
        min$'' THEN 1 ELSE 0 END ELSE 1 END'', ''Runtime parseable for year-filtered
        rows'', lambda x: x == 1)'': unexpected character after line continuation
        character (<string>, line 1)'
      level: error
      uid: fae289ba-817a-4a28-943f-49e590fb1e97
      source_assumptions:
      - 64905649-62b3-4886-a25f-05fcd60ced3d
    assumptions:
    - text: 'The ''Runtime'' column must be present and non-null for input rows that
        reach the downstream steps. Values must be strings that exactly match the
        pattern ''^\d{2,3} min$'' (two or three ASCII digits, a single space, then
        the lowercase letters ''min''), e.g. ''95 min'' or ''120 min''. The code uses
        a fullmatch and then extracts the digits to compute Runtime_Min and pacing;
        if values do not match this format the pipeline will either produce NaN or
        raise errors when converting to int. Example validation rules:

        - Deequ-style: .satisfies("CASE WHEN `Runtime` RLIKE ''^\\d{2,3} min$'' THEN
        1 ELSE 0 END", "Runtime format", lambda x: x == 1)

        - Great Expectations: expect_column_values_to_match_regex(''Runtime'', r''^\d{2,3}
        min$'')'
      sources:
      - start_line: 93
        end_line: 95
        file: ''
      - start_line: 108
        end_line: 110
        file: ''
      uid: 48007c55-89d6-4db6-9df6-0d50639b3b14
    - text: 'Every input row that passes the Released_Year filtering must yield an
        integer minute value when the digits are extracted from ''Runtime''. The code
        calls pd.to_numeric(..., errors=''coerce'').astype(int) on the extracted digits
        (no subsequent NaN handling), so any unparsable or missing extracted digits
        will cause errors. Representable checks:

        - Deequ-style: .satisfies("CASE WHEN `Released_Year` RLIKE ''^\\d{4}$'' AND
        `Runtime` RLIKE ''^\\d{2,3} min$'' THEN 1 ELSE 0 END", "Runtime present and
        parseable for year-filtered rows", lambda x: x == 1)

        - Great Expectations: combine expect_column_values_to_match_regex(''Runtime'',
        r''^\d{2,3} min$'') with expect_column_values_to_not_be_null(''Runtime'')'
      sources:
      - start_line: 100
        end_line: 104
        file: ''
      - start_line: 108
        end_line: 110
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: 64905649-62b3-4886-a25f-05fcd60ced3d
    - text: 'The ''min'' unit in the Runtime string must be lowercase and exactly
        ''min'' (not ''mins'', ''Min'', ''MIN'', or ''min.''). The regular expression
        used in code is case-sensitive and expects the literal lowercase ''min'',
        so alternative unit spellings/capitalizations will fail the fullmatch and
        the subsequent integer conversion. Validation examples:

        - Deequ-style: .satisfies("CASE WHEN `Runtime` RLIKE ''^\\d{2,3} min$'' THEN
        1 ELSE 0 END", "Runtime unit and format", lambda x: x == 1)

        - Great Expectations: expect_column_values_to_match_regex(''Runtime'', r''^\d{2,3}
        min$'')'
      sources:
      - start_line: 108
        end_line: 109
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: 10907a69-f3ea-454f-9c87-52750ffef63d
  '["Released_Year","Year"]':
    code: []
    assumptions:
    - text: 'Released_Year must be a four-digit year string and the derived Year column
        must equal that integer value. In other words, for every row where Released_Year
        is present and matches r"\d{4}", Year == toInt(Released_Year). A Deequ-style
        constraint: .satisfies("toInt(Released_Year) == Year", "released_year_matches_year").'
      sources:
      - start_line: 96
        end_line: 105
        file: ''
      - start_line: 99
        end_line: 103
        file: ''
      uid: 9933be1e-87db-4a74-9647-0c26185962d7
    - text: 'Year and Decade_Label must be internally consistent: Decade_Label must
        be the decade of Year followed by ''s'' (i.e. Decade_Label == concat(((Year
        // 10) * 10).cast(string), ''s'')). Deequ-style: .satisfies("Decade_Label
        == concat(cast((floor(Year/10)*10) as string), ''s'')", "decade_label_matches_year").'
      sources:
      - start_line: 100
        end_line: 105
        file: ''
      uid: 57b0ad8c-8de4-400d-93e6-6a8638ddf60e
    - text: 'Series_Title and Year are both required to produce slugs and display
        strings: Series_Title should be non-empty and Year must be a valid integer
        for rows that are rendered as cards (i.e. both Series_Title is not null/empty
        AND Year is not null). Deequ-style: .isComplete(["Series_Title","Year"]) or
        .satisfies("(Series_Title IS NOT NULL AND Series_Title != '''') AND Year IS
        NOT NULL", "title_and_year_present").'
      sources:
      - start_line: 17
        end_line: 35
        file: ''
      - start_line: 31
        end_line: 31
        file: ''
      uid: 8da405e3-bfce-4b90-9d0f-ab7f5d9be841
    - text: 'If GenreTokens for a row contains ''Family'' or ''Animation'', the Certificate
        must not be an adult-only rating (specifically must not be ''R'' or ''NC-17'').
        This is a conditional multi-column rule: for rows where GenreToken IN (''Family'',''Animation''),
        Certificate NOT IN (''R'',''NC-17''). Deequ-style: .satisfies("(array_contains(GenreTokens,
        ''Family'') OR array_contains(GenreTokens, ''Animation'')) == false OR (Certificate
        NOT IN (''R'',''NC-17''))", "family_animation_cert_restriction").'
      sources:
      - start_line: 123
        end_line: 134
        file: ''
      uid: 821be796-543f-4b13-9cc8-a38a228f463d
    - text: 'Gross (string) and Gross_Num must be consistent: whenever Gross is non-empty/non-null,
        Gross_Num must be parseable to a numeric value after removing commas. Deequ-style:
        .satisfies("(Gross IS NULL OR trim(Gross) == '''') OR isNumeric(replace(Gross,
        '','', ''''))", "gross_parseable_when_present").'
      sources:
      - start_line: 118
        end_line: 122
        file: ''
      uid: e21a71ca-49b7-4fc5-b5a4-bb369f06a3cb
    - text: 'Runtime and Runtime_Min must be consistent: Runtime should match the
        pattern ''\\d{2,3} min'' and Runtime_Min should equal the integer parsed from
        Runtime. Deequ-style: .satisfies("Runtime rlike ''\\d{2,3} min'' AND Runtime_Min
        == cast(regexp_extract(Runtime, ''(\\\d{2,3})'', 1) as int)", "runtime_and_runtime_min_consistent").'
      sources:
      - start_line: 107
        end_line: 111
        file: ''
      uid: 142c974a-ddc4-4a93-85bd-cd3ffe3f7804
    - text: 'Fields used to compute Score should be numeric and within expected bounds
        when present: IMDB_Rating (if present) should be in [0,10], Meta_score (if
        present) should be in [0,100], and No_of_Votes (if present) should be >= 0.
        This ensures scoring arithmetic behaves as intended. Deequ-style examples:
        .satisfies("IMDB_Rating IS NULL OR (IMDB_Rating >= 0 AND IMDB_Rating <= 10)",
        "imdb_rating_range") and .satisfies("Meta_score IS NULL OR (Meta_score >=
        0 AND Meta_score <= 100)", "meta_score_range") and .satisfies("No_of_Votes
        IS NULL OR No_of_Votes >= 0", "votes_non_negative").'
      sources:
      - start_line: 112
        end_line: 148
        file: ''
      uid: dc217efe-5970-4622-aa03-06c573642a34
    - text: 'After splitting Genre into GenreTokens and exploding, each resulting
        GenreToken should be non-empty and belong to the allowed genre set. Deequ-style:
        .satisfies("GenreToken IS NOT NULL AND GenreToken IN (''Action'',''Adventure'',''Animation'',''Biography'',''Comedy'',''Crime'',''Drama'',''Family'',''Fantasy'',''Film-Noir'',''History'',''Horror'',''Music'',''Musical'',''Mystery'',''Romance'',''Sci-Fi'',''Sport'',''Thriller'',''War'',''Western'')",
        "genre_token_allowed").'
      sources:
      - start_line: 123
        end_line: 130
        file: ''
      - start_line: 124
        end_line: 126
        file: ''
      uid: 48a5355f-bd73-4fe3-85df-92050dd5ab87
  '["Runtime","Runtime_Min"]':
    code: []
    assumptions:
    - text: 'The numeric minutes column Runtime_Min must exactly equal the integer
        parsed from the Runtime string. Concretely, Runtime is expected to follow
        the pattern ''NN min'' or ''NNN min'' (two or three digits, space, ''min'')
        for rows used downstream, and Runtime_Min is the integer captured from that
        string. This can be enforced as Deequ-like constraints such as:

        - .satisfies("regexp_like(Runtime, ''^[0-9]{2,3} min$'')", "Runtime_format_is_digits_space_min")

        - .satisfies("Runtime_Min = CAST(regexp_extract(Runtime, ''([0-9]{2,3})'',
        1) AS INT)", "RuntimeMin_matches_Runtime")

        (These assert the format of Runtime and the exact correspondence between Runtime
        and Runtime_Min.)'
      sources:
      - start_line: 93
        end_line: 95
        file: ''
      - start_line: 108
        end_line: 111
        file: ''
      - start_line: 144
        end_line: 148
        file: ''
      - start_line: 172
        end_line: 175
        file: ''
      uid: 5a6ce148-2d9f-478d-9528-52a5cb6a4e9f
    - text: 'All rows that are scored/ranked (i.e., rows present when pacing/Score
        are computed) must have a parseable Runtime and a non-null Runtime_Min so
        that pacing and Score are numeric. In other words, for any row with a non-null
        Score (or any row that survives year filtering and proceeds to the scoring
        step), Runtime must match the expected pattern and Runtime_Min must be present
        (not null). This can be enforced as Deequ-like constraints such as:

        - .isComplete(["Runtime_Min"])  # no nulls in Runtime_Min for rows in the
        scoring pipeline

        - .satisfies("(Score IS NOT NULL) -> (regexp_like(Runtime, ''^[0-9]{2,3} min$'')
        AND Runtime_Min = CAST(regexp_extract(Runtime, ''([0-9]{2,3})'', 1) AS INT))",
        "scored_rows_have_valid_runtime")'
      sources:
      - start_line: 102
        end_line: 105
        file: ''
      - start_line: 108
        end_line: 111
        file: ''
      - start_line: 139
        end_line: 148
        file: ''
