  '["Decade_Label","GenreToken","Rank","Score"]':
    code: []
    assumptions:
    - text: The combination of Decade_Label, GenreToken and Rank is unique in the
        leaderboard output. In other words, there must not be two rows with the same
        (Decade_Label, GenreToken, Rank). This can be expressed as a multi-column
        uniqueness constraint, e.g. .isUnique(["Decade_Label","GenreToken","Rank"]).
      sources:
      - start_line: 161
        end_line: 167
        file: ''
      - start_line: 172
        end_line: 176
        file: ''
      - start_line: 183
        end_line: 200
        file: ''
      uid: 5730c4a9-02c2-4072-bea0-4ffa7dfd10bc
    - text: 'Within each (Decade_Label, GenreToken) group, Rank must reflect Score
        ordering: if row A and row B share Decade_Label and GenreToken and rank(A)
        < rank(B) then score(A) >= score(B). This enforces that lower (better) ranks
        correspond to equal-or-higher scores. This can be validated by checking pairwise
        ordering per group or by asserting that the score of rank=1 equals the group''s
        max score, rank=2 equals the group''s second-highest score, etc.'
      sources:
      - start_line: 161
        end_line: 165
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 188
        end_line: 199
        file: ''
      uid: 2067d0d1-53fc-4981-a220-51d0c5bb3438
    - text: 'All rows emitted as top-K (Rank <= TOP_K) must have non-null Decade_Label
        and non-null, non-NaN numeric Score and non-null GenreToken. Actionable checks:
        completeness for Decade_Label and GenreToken, and isNumeric / completeness
        for Score restricted to rows where Rank <= TOP_K.'
      sources:
      - start_line: 166
        end_line: 167
        file: ''
      - start_line: 161
        end_line: 164
        file: ''
      - start_line: 172
        end_line: 176
        file: ''
      uid: e5d2fb48-ddfd-40bb-b04b-3f45feb1b747
    - text: 'Tie-breaking behavior: when multiple rows within the same (Decade_Label,
        GenreToken) have identical Score, Gross_Tie must be present and used to break
        ties so that the row with higher Gross_Tie receives the better (lower) Rank.
        Validate by asserting that for equal scores in a group, higher Gross_Tie implies
        better rank. (Gross_Tie is computed and defaulted to 0.0 if Gross is missing.)'
      sources:
      - start_line: 150
        end_line: 156
        file: ''
      - start_line: 161
        end_line: 164
        file: ''
      uid: dd39e336-a233-47b5-b89b-08d2645032d6
    - text: 'For each (Decade_Label, GenreToken) group in the final output, there
        must be at most TOP_K rows and all Rank values in that group must be integers
        within 1..TOP_K. Actionable checks: group cardinality <= 10 and bounds check
        on Rank (1 <= Rank <= 10).'
      sources:
      - start_line: 166
        end_line: 167
        file: ''
      - start_line: 161
        end_line: 166
        file: ''
      - start_line: 172
        end_line: 176
        file: ''
      uid: 27e337b4-d844-45f8-b4ea-d0e4b36fd634
  Genre:
    code:
    - suggestion: '.satisfies("regexp_like(Genre, ''^ *(Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western)(
        *, *(Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western))*
        *$'')", "Genre tokens belong to allowed canonical genres", lambda x: x ==
        1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 2fb462fe-afee-45bf-9dee-a90a486f1e03
      source_assumptions:
      - 13539382-bb7e-42cc-98a6-22c20b949e06
    assumptions:
    - text: 'The ''Genre'' column must be present and contain non-null, non-empty
        string values for each input row. The code trims Genre and then splits it,
        and treating null/empty values will produce the literal string ''nan'' or
        empty tokens which will break downstream exploding and grouping.

        Possible check (Great Expectations / Deequ style):

        .satisfies("CASE WHEN `Genre` IS NOT NULL AND trim(`Genre`) <> '''' THEN 1
        ELSE 0 END", "Genre not null or empty", lambda x: x == 1)'
      sources:
      - start_line: 93
        end_line: 95
        file: ''
      - start_line: 128
        end_line: 129
        file: ''
      - start_line: 159
        end_line: 159
        file: ''
      uid: a7a08735-bdea-4e03-9917-5f69813d96c7
    - text: 'Each ''Genre'' value is expected to be a comma-separated list of one
        or more genre tokens. After splitting on '','' and trimming whitespace, there
        should be no empty tokens (no repeated commas or trailing commas producing
        empty entries).

        Possible check:

        .satisfies("CASE WHEN size(split(`Genre`, '','')) >= 1 AND NOT regexp_like(`Genre`,
        '',\s*,'') AND trim(`Genre`) NOT LIKE '','' THEN 1 ELSE 0 END", "Genre token
        structure", lambda x: x == 1)'
      sources:
      - start_line: 128
        end_line: 129
        file: ''
      - start_line: 159
        end_line: 159
        file: ''
      uid: a59b4d7d-ec4b-4e73-a4a1-5f1bd0c968f9
    - text: 'Each genre token (the elements obtained by splitting ''Genre'' on commas
        and trimming) should be one of the expected canonical genres the code enumerates:
        [Action, Adventure, Animation, Biography, Comedy, Crime, Drama, Family, Fantasy,
        Film-Noir, History, Horror, Music, Musical, Mystery, Romance, Sci-Fi, Sport,
        Thriller, War, Western]. The script defines these allowed genres and later
        groups by genre token, so tokens outside this set are unexpected.

        Possible check (regexp-based or membership):

        .satisfies("CASE WHEN regexp_like(trim(x), ''^(Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western)$'')
        THEN 1 ELSE 0 END", "Genre token in allowed set", lambda x: x == 1)'
      sources:
      - start_line: 123
        end_line: 127
        file: ''
      - start_line: 128
        end_line: 129
        file: ''
      - start_line: 159
        end_line: 159
        file: ''
      uid: 13539382-bb7e-42cc-98a6-22c20b949e06
    - text: 'The number of distinct genre tokens in the input should not exceed the
        number of allowed canonical genres (21). Since the code later groups by GenreToken
        and generates one section per genre, an unexpectedly large set of distinct
        tokens indicates malformed or non-canonical genres.

        Possible check:

        .satisfies("CASE WHEN cardinality(array_distinct(transform(split(`Genre`,
        '',''), x -> trim(x)))) <= 21 THEN 1 ELSE 0 END", "Genre token cardinality
        <= 21", lambda x: x == 1)'
      sources:
      - start_line: 123
        end_line: 127
        file: ''
      - start_line: 70
        end_line: 71
        file: ''
      - start_line: 162
        end_line: 163
        file: ''
      uid: 0a28b605-0578-4189-8a25-df13e1ccaa2e
