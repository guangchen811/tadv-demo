        "Family") OR array_contains(GenreTokens, "Animation") THEN CASE WHEN `Certificate`
        NOT IN ("R","NC-17") OR `Certificate` IS NULL OR `Certificate` = "" THEN 1
        ELSE 0 END ELSE 1 END'', ''Family/Animation not R/NC-17'', lambda x: x ==
        1).'
      sources:
      - start_line: 124
        end_line: 129
        file: ''
      - start_line: 134
        end_line: 134
        file: ''
      uid: 01077e3c-750f-44dd-951a-a37b6f5654ae
    - text: 'Certificate values should be short, printable tokens (no HTML or script
        content) because they are embedded directly into HTML and CSV outputs. Prefer
        alphanumeric, spaces, hyphens and plus signs (e.g., pattern ^[A-Za-z0-9\-\s\+]+$).
        Validation rule example: .satisfies(''CASE WHEN `Certificate` RLIKE "^[A-Za-z0-9\-\s\+]+$"
        OR `Certificate` IS NULL OR `Certificate` = "" THEN 1 ELSE 0 END'', ''Certificate
        safe characters'', lambda x: x >= 0.99).'
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 172
        end_line: 175
        file: ''
      - start_line: 131
        end_line: 131
