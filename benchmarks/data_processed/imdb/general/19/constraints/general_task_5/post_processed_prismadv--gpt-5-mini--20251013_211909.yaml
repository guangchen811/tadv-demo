      level: warning
      uid: 598ab9b9-d2a9-438c-a6e5-5f55e0c77145
      source_assumptions:
      - 6eafc58b-8859-4a63-9b6b-e0adbea51884
    assumptions:
    - text: 'The ''Gross'' column may contain missing values, and the code tolerates
        them, but at least some rows must contain parseable numeric values (after
        removing commas). Concretely: there should be >= 1 row where replacing ","
        and converting to numeric yields a non-null value. This can be expressed as
        a Deequ/Greatexpectations style check that the fraction of rows with CAST(REPLACE(Gross,
        '','', '''') AS DOUBLE) NOT NULL is > 0.'
      sources:
      - start_line: 111
        end_line: 121
        file: ''
      - start_line: 151
        end_line: 154
        file: ''
      uid: 6e917ff5-b158-4706-b43f-420ef46e410e
    - text: "Most non-null values in 'Gross' are expected to be numeric-like strings\
        \ using digits, optional thousands separators (commas), and optional decimal\
        \ points \u2014 e.g. '123,456' or '123456.78' \u2014 with no currency symbols\
        \ or text. A useful validation: after removing commas, at least 80% of all\
        \ rows should convert to a numeric value (pd.to_numeric not null). Example\
        \ Deequ-style predicate: proportion of rows where `regexp_replace(Gross, ',',\
        \ '')` is numeric >= 0.80."
      sources:
      - start_line: 119
        end_line: 121
        file: ''
      uid: 28c8c104-5b13-4b3a-b320-519bbb7026ff
    - text: 'After parsing, Gross numeric values should be non-negative (>= 0). The
        code applies np.log1p to the parsed gross values (and uses that for normalization),
        so negative amounts are not expected. Express as: all parsed Gross values
        that are not null should be >= 0.'
      sources:
      - start_line: 151
        end_line: 154
        file: ''
      - start_line: 119
        end_line: 121
        file: ''
      uid: 3eb7f709-80f6-443c-b843-7998e3be0caa
    - text: 'If many Gross values are unparseable, the tie-breaking behavior will
        degrade (the script falls back to Gross_Tie = 0.0 when no parsed values exist).
        Therefore the proportion of parseable Gross values should be sufficiently
        large for tie-breaking to be meaningful (suggestion: >= 20% of rows). This
        can be encoded as: fraction of rows where to_numeric(replace(Gross, '','',
        '''')) IS NOT NULL >= 0.20.'
      sources:
      - start_line: 151
        end_line: 156
        file: ''
      - start_line: 119
        end_line: 121
        file: ''
      uid: 424c5693-4886-4151-ba36-ea91b25a2f20
    - text: 'Input values in ''Gross'' should not contain currency symbols, parentheses,
        or words (e.g. ''$'', ''USD'', ''approx'', ''(estimated)'') because the code
        only strips commas before numeric conversion. A validation rule: the fraction
        of rows matching the regex ^[0-9\.,\s]+$ (digits, commas, periods, whitespace)
        should be high (e.g. >= 0.90).'
      sources:
      - start_line: 119
        end_line: 121
        file: ''
      uid: 6eafc58b-8859-4a63-9b6b-e0adbea51884
  '["Genre","GenreToken","GenreTokens"]':
    code: []
    assumptions:
    - text: "Every GenreToken (the exploded token derived from the Genre column) must\
        \ be one of the allowed genre values and must correspond to a token produced\
        \ by splitting the original Genre string. Actionable checks: (1) All values\
        \ in GenreToken should be in the allowed_genres set. Example Deequ-style constraint:\
        \ .isContainedIn(\"GenreToken\", [\"Action\",\"Adventure\",\"Animation\",\"\
        Biography\",\"Comedy\",\"Crime\",\"Drama\",\"Family\",\"Fantasy\",\"Film-Noir\"\
        ,\"History\",\"Horror\",\"Music\",\"Musical\",\"Mystery\",\"Romance\",\"Sci-Fi\"\
        ,\"Sport\",\"Thriller\",\"War\",\"Western\"]). (2) Every GenreToken should\
        \ equal one of the comma-trimmed tokens obtained from the same row's Genre\
        \ (i.e., GenreToken \u2208 split(Genre, ',')), so exploding did not invent\
        \ tokens."
      sources:
      - start_line: 123
        end_line: 130
        file: ''
      - start_line: 158
        end_line: 160
        file: ''
      uid: fe409fa0-851e-4dc9-b05b-93151ccfffd4
    - text: 'If a row''s genres include ''Family'' or ''Animation'' (i.e., GenreTokens
        contains ''Family'' or ''Animation''), then the Certificate column must not
        be ''R'' or ''NC-17''. Actionable check: for rows where GenreToken IN (''Family'',''Animation''),
        assert Certificate NOT IN (''R'',''NC-17''). Example Deequ conditional: .where("GenreToken
        IN (''Family'',''Animation'')").isContainedIn(''Certificate'', [''G'',''PG'',''PG-13'',''U'',''UA'',''A'',''12'',''12A'',''15'',''18''])
        or more directly assert absence: no rows with GenreToken in (''Family'',''Animation'')
        and Certificate in (''R'',''NC-17'').'
      sources:
      - start_line: 131
        end_line: 136
        file: ''
      uid: 48ec6e15-4db3-4caa-91bd-ef9d6be1b2d5
    - text: 'Decade_Label must correctly reflect Year: Decade_Label == str((Year //
        10) * 10) + ''s''. Actionable check: for each row assert Decade_Label equals
        the decade computed from Year (and Year must be a valid 4-digit integer).
        Example Deequ-style expression: .satisfies("Decade_Label = concat(cast((Year
        / 10) * 10 as int), ''s'')", ''Decade_Label_matches_Year'').'
      sources:
      - start_line: 96
        end_line: 105
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      uid: f50f5984-ee4c-4927-9422-c591901e2a55
    - text: 'Within each (Decade_Label, GenreToken) group, Rank must be a positive
        integer and unique per item in that group (i.e., there should not be duplicate
        Rank values for the same Decade_Label and GenreToken). Actionable checks:
        (1) Rank is integer and >= 1. (2) The tuple (Decade_Label, GenreToken, Rank)
        is unique. Example Deequ constraint: .isUnique(["Decade_Label","GenreToken","Rank"])
        and .satisfies("Rank >= 1", ''Rank_positive'').'
      sources:
      - start_line: 161
        end_line: 167
        file: ''
      - start_line: 162
        end_line: 164
        file: ''
      uid: 065b4f7f-2726-4c5e-894b-45336df3df32
    - text: 'For rows that are selected into the final top-K (i.e., Rank <= 10), the
        fields required for rendering and indexing must be present: Series_Title,
        Poster_Link, and Score must be non-null/non-empty. Actionable check: assert
        that for rows where Rank <= 10 and grouped by GenreToken, Series_Title and
        Poster_Link are non-empty strings and Score is not null. Example Deequ conditions:
        .where("Rank <= 10").isComplete(''Series_Title''), .where("Rank <= 10").isComplete(''Poster_Link''),
        .where("Rank <= 10").isComplete(''Score'').'
      sources:
      - start_line: 166
        end_line: 176
        file: ''
      - start_line: 18
        end_line: 35
        file: ''
      uid: 2e8b91ee-ddeb-4934-bb73-bda8f4a7ab1f
  '["Gross","Gross_Num","Gross_Tie"]':
    code: []
    assumptions:
    - text: 'When the ''Gross'' string is present (non-null / non-empty), it contains
        only digits and optional comma thousands separators so that ''Gross_Num''
        equals the numeric value of ''Gross'' after removing commas. In other words:
        for every row where Gross is not null, Gross.str.replace('','', '''') should
        match r"^[0-9]+$" and Gross_Num == to_numeric(Gross.replace('','', ''''),
        errors=''coerce''). This can be enforced with constraints like: .isMatch(''Gross'',
        ''^[0-9,]+$'') (for non-null Gross) and a row-level equality check Gross_Num
        == cast(removeCommas(Gross)).'
      sources:
      - start_line: 118
        end_line: 121
        file: ''
      uid: 655203bc-31a6-44bf-80de-37cc401c586a
    - text: 'Gross_Num must be a non-negative numeric measure of gross revenue, and
        Gross_Tie is computed as a monotonic normalization of Gross_Num via log1p
        and division by the maximum log1p(Gross_Num). Therefore: (a) Gross_Num >=
        0 for all rows where it is not null; (b) for any two rows i and j where Gross_Num_i
        > Gross_Num_j, Gross_Tie_i > Gross_Tie_j (provided the denominator > 0). This
        supports using Gross_Tie as a reliable tie-breaker that preserves Gross ordering.'
      sources:
      - start_line: 121
        end_line: 121
        file: ''
      - start_line: 150
        end_line: 155
        file: ''
      uid: 1b93c3de-1ee9-4387-9d80-dfdfd4b69d7d
    - text: 'Within each (Decade_Label, GenreToken) group, Score is the primary ranking
        key and Gross_Tie is used to break ties (the code sorts by [''Decade_Label'',
        ''GenreToken'', ''Score'', ''Gross_Tie''] so that method=''first'' on Score
        yields deterministic tie-breaks). Therefore for any group where multiple rows
        share the same Score value, at least one of those tied rows should have non-null
        Gross_Num (and hence a meaningful Gross_Tie) so that sorting produces a deterministic
        order. A practical constraint: for any (Decade_Label, GenreToken, Score) tuple
        with count > 1, count of rows with Gross_Num not null should be >= 1 (preferably
        all tied rows should have Gross_Num to fully disambiguate).'
      sources:
      - start_line: 147
        end_line: 148
        file: ''
      - start_line: 162
        end_line: 164
        file: ''
      - start_line: 150
        end_line: 156
        file: ''
      uid: 3b3d3951-74e4-4d85-b931-41900eed4d2f
  '["IMDB_Rating","Meta_score","No_of_Votes","Runtime_Min","Score"]':
    code: []
    assumptions:
    - text: 'IMDB_Rating and Meta_score are both numeric and lie on their expected
        scales: IMDB_Rating should be between 0 and 10 (inclusive) and Meta_score
        between 0 and 100 (inclusive). This is required because rating_norm = IMDB_Rating/10
        and meta_norm = Meta_score/100 are used directly in Score. Example Deequ constraints:
        .isContainedInRange("IMDB_Rating", 0.0, 10.0) and .isContainedInRange("Meta_score",
        0.0, 100.0).'
      sources:
      - start_line: 139
        end_line: 141
        file: ''
      - start_line: 116
        end_line: 117
        file: ''
      uid: 9163d3ec-afa1-4227-9a64-a36fff31c2d1
    - text: 'Whenever IMDB_Rating is present (non-null) we expect No_of_Votes to be
        numeric and positive (>= 1). Vote normalization uses log10(No_of_Votes.clip(lower=1)),
        and negative or non-numeric vote counts would invalidate the voting contribution
        to Score. Example Deequ constraints: .hasNoNulls(["IMDB_Rating","No_of_Votes"])
        combined with .isGreaterThanOrEqualTo("No_of_Votes", 1).'
      sources:
      - start_line: 113
        end_line: 114
        file: ''
      - start_line: 142
        end_line: 142
        file: ''
      uid: ec40ed09-d53b-43fc-a151-cc00b88b4b2a
    - text: 'Runtime_Min must be parseable to an integer and lie in a reasonable positive
        range (e.g., 20..500 minutes) for rows that will be scored/ranked. The pacing
        factor uses Runtime_Min directly and the code uses astype(int) on the parsed
        value, so unparseable or out-of-range runtimes will break or distort Score.
        Example Deequ constraints: .hasNoNulls(["Runtime_Min","Runtime"]) and .isContainedInRange("Runtime_Min",
        20, 500) (or at least .isNonNegative("Runtime_Min")).'
      sources:
      - start_line: 107
        end_line: 111
        file: ''
      - start_line: 143
        end_line: 148
        file: ''
      - start_line: 161
        end_line: 165
        file: ''
      uid: 12cec038-2612-451d-8817-e4bc7dda9893
    - text: For rows where GenreTokens includes 'Family' or 'Animation', Certificate
        must not be 'R' or 'NC-17'. This cross-column policy is referenced in the
        code comments and will be enforced before content-policy filtering; implementable
        as a conditional multi-column constraint (e.g., no rows where GenreTokens
        contains one of {'Family','Animation'} and Certificate in {'R','NC-17'}).
      sources:
      - start_line: 123
        end_line: 129
        file: ''
      - start_line: 131
        end_line: 135
        file: ''
      uid: 5eb6b20c-560e-45ee-8399-a04e47321f27
    - text: 'Within each (Decade_Label, GenreToken) group, Rank should be unique and
        correspond to descending Score; additionally Rank values emitted to output
        should be in the expected TOP_K range (1..TOP_K). Actionable checks: .isUnique(["Decade_Label","GenreToken","Rank"])
        and group-level checks that max(Rank) <= TOP_K and that for each group higher
        Score implies a better (lower numeric) Rank (or at least that Score is non-null/finite
        for ranked rows).'
      sources:
      - start_line: 161
        end_line: 167
        file: ''
      - start_line: 166
        end_line: 176
        file: ''
      uid: a055562a-868c-40c4-82f6-d732b4c6fb46
