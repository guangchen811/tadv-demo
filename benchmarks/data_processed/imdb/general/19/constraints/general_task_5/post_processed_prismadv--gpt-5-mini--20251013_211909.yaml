      sources:
      - start_line: 93
        end_line: 95
        file: ''
      - start_line: 133
        end_line: 133
        file: ''
      uid: ece7cfae-084c-4e93-abeb-7989aeeca0c6
    - text: 'Certificate values are expected to come from a small controlled domain
        of ratings. Allowed categories in the code: {G, PG, PG-13, R, NC-17, U, UA,
        A, 12, 12A, 15, 18}. Most non-missing input values should be one of these
        tokens. Validation rule example: .satisfies(''CASE WHEN `Certificate` IN ("G","PG","PG-13","R","NC-17","U","UA","A","12","12A","15","18")
        OR `Certificate` IS NULL OR `Certificate` = "" THEN 1 ELSE 0 END'', ''Valid
        Certificate domain'', lambda x: x >= 0.95).'
      sources:
      - start_line: 131
        end_line: 133
        file: ''
      uid: 8d514a96-5202-47d3-9fa7-984a5ffd39be
    - text: 'Conditional policy: if a row''s GenreTokens includes ''Family'' or ''Animation'',
