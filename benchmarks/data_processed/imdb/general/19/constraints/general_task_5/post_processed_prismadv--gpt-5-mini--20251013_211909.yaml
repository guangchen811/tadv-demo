        Actionable constraint (Deequ-style): enforce that there are zero rows violating
        this predicate, e.g.

        .satisfies("NOT (GenreToken IN (''Family'',''Animation'') AND (Certificate
        IS NULL OR Certificate IN (''R'',''NC-17'')))", "familyAnimationCertificatePolicy")'
