fixing_results:
  Certificate:
    c6ed956a-ec5c-4a22-895c-1b4e1dc6e41a: '.satisfies(''`Certificate` IN ("G","PG","PG-13","R","NC-17","U","UA","A","12","12A","15","18")
      OR `Certificate` IS NULL OR `Certificate` = ""'', "Valid Certificate domain",
      lambda x: x >= 0.94)'
    83dbf141-4789-4d31-a701-924e436159c1: '.satisfies(''CASE WHEN `Certificate` RLIKE
      "^[A-Za-z0-9 +-]+$" OR `Certificate` IS NULL OR `Certificate` = "" THEN 1 ELSE
      0 END'', ''Certificate safe characters'', lambda x: x >= 0.89)'
  '["Decade","Decade_Label","Released_Year","Year"]':
    c8714fc8-c559-4dfc-b6e6-77b8d4f583d9: '.satisfies("Released_Year >= floor(Released_Year/10)*10
      AND Released_Year <= floor(Released_Year/10)*10 + 9", "Released_Year within
      its decade", lambda x: x == 1)'
  Gross:
    651ee2a2-1ae4-4a71-8e1c-504b9b1d301d: '.satisfies("CASE WHEN cast(regexp_replace(Gross,
      '','', '''') as double) IS NOT NULL THEN 1 ELSE 0 END", "At least one parseable
      Gross value", lambda x: x > 0.0)'
    598ab9b9-d2a9-438c-a6e5-5f55e0c77145: '.hasPattern("Gross", "^[0-9\\.,\\s]+$",
      lambda x: x >= 0.82, name = "Gross allowed chars (digits, commas, periods, whitespace)")'
  Poster_Link:
    b47b3336-c9d3-4df8-900c-24bcf7593f89: '.satisfies(''CASE WHEN Poster_Link IS NOT
      NULL AND Poster_Link NOT LIKE \''%\"%\'' AND Poster_Link NOT LIKE \''%\\n%\''
      THEN 1 ELSE 0 END'', ''Poster_Link safe for HTML attributes (no double-quotes
      or newlines)'', lambda x: x == 1)'
  Meta_score:
    e23fb1d8-3e34-4281-b389-32e370499210: '.satisfies("CASE WHEN `Meta_score` IS NULL
      OR TRY_CAST(`Meta_score` AS DOUBLE) BETWEEN 0 AND 100 THEN 1 ELSE 0 END", "Meta_score
      in 0..100 (allow nulls)", lambda x: x == 1)'
  Runtime:
    42ea82df-3960-429f-b42b-366fd8bd9045: '.hasPattern(''Runtime'', r''^\d{1,3}(?:\.\d+)?(?:\smin)?$'',
      lambda x: x >= 0.95)'
    fae289ba-817a-4a28-943f-49e590fb1e97: '.satisfies(r"CASE WHEN `Released_Year`
      RLIKE ''^\\d{4}$'' AND `Runtime` RLIKE ''^\\d{2,3} min$'' THEN 1 ELSE 0 END",
      "Runtime present and parseable for year-filtered rows", lambda x: x == 1)'
