constraints:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies(''CASE WHEN CAST(`IMDB_Rating` AS DOUBLE) BETWEEN 0.0
        AND 10.0 THEN 1 ELSE 0 END'', ''IMDB_Rating in 0..10'', lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 8c3f76d7-318d-408d-99ea-5994b3446169
      source_assumptions:
      - d2c14533-362c-41df-a460-83058ba4273d
    assumptions:
    - text: 'IMDB_Rating must be parseable as a numeric (floating-point) value in
        the input data. The code repeatedly calls pd.to_numeric(..., errors=''coerce'')
        and formats the value with numeric formatting (e.g. f"{rating:.1f}"), so non-numeric
        strings will be coerced to NaN and cause rows to have NaN scores and be excluded
        from ranking. A deequ-style check could be: .satisfies("CASE WHEN CAST(`IMDB_Rating`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "IMDB_Rating is numeric", lambda
        x: x >= 0.95).'
      sources:
      - start_line: 22
        end_line: 28
        file: ''
      - start_line: 1113
        end_line: 1113
        file: ''
      - start_line: 139
        end_line: 139
        file: ''
      uid: eee7141b-abf8-4f24-a8c7-444df491f915
    - text: "IMDB_Rating values are expected to lie on the usual 0\u201310 IMDb scale\
        \ (inclusive). The code normalizes ratings by dividing by 10 (rating_norm\
        \ = ... / 10.0), so values outside this range would distort scoring. A deequ-style\
        \ check could be: .satisfies(\"CASE WHEN `IMDB_Rating` BETWEEN 0.0 AND 10.0\
        \ THEN 1 ELSE 0 END\", \"IMDB_Rating in 0..10\", lambda x: x == 1)."
      sources:
      - start_line: 139
        end_line: 139
        file: ''
      - start_line: 147
        end_line: 148
        file: ''
      - start_line: 28
        end_line: 28
        file: ''
      uid: d2c14533-362c-41df-a460-83058ba4273d
    - text: 'IMDB_Rating should be present (non-null) for the large majority of input
        rows (so that Score and ranking are meaningful). The script does not fill
        missing IMDB_Rating before computing the Score (rating_norm is not imputed),
        so many missing ratings will produce NaN scores and remove rows from leaderboards.
        A practical validation: require >= 95% non-null/numeric IMDB_Rating. Deequ-style:
        .satisfies("CASE WHEN `IMDB_Rating` IS NOT NULL AND CAST(`IMDB_Rating` AS
        DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Non-null numeric IMDB_Rating", lambda
        x: x >= 0.95).'
      sources:
      - start_line: 139
        end_line: 139
        file: ''
      - start_line: 147
        end_line: 148
        file: ''
      - start_line: 166
        end_line: 167
        file: ''
      uid: d57bbc79-abe5-4034-92be-9a465baed592
