      uid: 04228258-69d9-426a-ae49-269f00c8eb81
    - text: 'The literal string ''nan'' may appear in the input and is intended to
        be treated as missing; the pipeline replaces the string ''nan'' with real
        NaN. Validation rule example: .satisfies(''CASE WHEN `Certificate` = "nan"
