    assumptions:
    - text: 'Series_Title must be present (non-null) for every input row. The code
        casts Series_Title to str, trims it, and uses it for rendering and output
        (CSV/JSON); missing values would produce the literal ''nan'' string or empty
        display. Expressible as a data check: all rows should satisfy Series_Title
        IS NOT NULL (or trimmed length > 0).'
      sources:
