results:
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', lambda v: v >= 0.85)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("Certificate IS NULL OR Certificate IN ('U','UA','A','G','PG','PG-13','R','NC-17','Not
        Rated','Unrated','Passed','Approved')", 'certificate_domain')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("Certificate IS NULL OR Certificate
        IN (''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not Rated'',''Unrated'',''Passed'',''Approved'')",
        ''certificate_domain'')'' failed on data sample: Value: 0.99 does not meet
        the constraint requirement!'
      level: error
  Director:
    code:
    - suggestion: .isComplete('Director')
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: '.hasPattern(''Genre'', r''^[A-Za-z\-]+(,\s[A-Za-z\-]+)*$'', lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.hasCompleteness(''Gross'', lambda v: v >= 0.80)'
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating:
    code:
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("cast(IMDB_Rating as double) BETWEEN 0 AND 10", 'imdb_rating_range')
      status: true
      reason_if_failed: ''
      level: error
  Meta_score:
    code:
    - suggestion: .satisfies("Meta_score IS NULL OR (cast(Meta_score as double) BETWEEN
        0 AND 100)", 'meta_score_range')
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .isComplete('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("cast(No_of_Votes as long) >= 0", 'votes_non_negative')
      status: true
      reason_if_failed: ''
      level: error
  Poster_Link:
    code:
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("Poster_Link RLIKE '^https?://.+$'", 'poster_link_is_url')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("cast(Released_Year as int) BETWEEN 1900 AND 2025", 'released_year_range')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("cast(Released_Year as int) BETWEEN
        1900 AND 2025", ''released_year_range'')'' failed on data sample: Value: 0.98
        does not meet the constraint requirement!'
      level: error
  Runtime:
    code:
    - suggestion: '.hasPattern(''Runtime'', r''^\d+\s*min$'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title,Released_Year:
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda u:
        u == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  row_count:
    code:
    - suggestion: '.hasSize(lambda s: s > 0)'
      status: true
      reason_if_failed: ''
      level: error
