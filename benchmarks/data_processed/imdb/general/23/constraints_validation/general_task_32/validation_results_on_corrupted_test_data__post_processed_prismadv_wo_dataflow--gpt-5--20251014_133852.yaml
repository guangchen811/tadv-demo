results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("(`IMDB_Rating` IS NOT NULL AND `IMDB_Rating` = `IMDB_Rating`
        AND `IMDB_Rating` >= -1e308 AND `IMDB_Rating` <= 1e308)", "At least one finite
        numeric IMDB_Rating", lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`IMDB_Rating` IS NOT NULL AND `IMDB_Rating` = `IMDB_Rating`
        AND `IMDB_Rating` >= 0 AND `IMDB_Rating` <= 10)", "All rows have valid IMDB_Rating
        in [0,10]", lambda r: r >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NOT NULL AND TRIM(`Certificate`)
        <> '''' THEN 1 ELSE 0 END", "Certificate non-blank fraction >= 0.85", lambda
        x: x >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL OR TRIM(`Certificate`)
        = '''' THEN 1 ELSE CASE WHEN LENGTH(TRIM(`Certificate`)) BETWEEN 1 AND 20
        THEN 1 ELSE 0 END END", "Certificate length 1-20 when present", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL OR TRIM(`Certificate`)
        = '''' THEN 1 ELSE CASE WHEN NOT(TRIM(`Certificate`) RLIKE ''.*[<>].*'') THEN
        1 ELSE 0 END END", "Certificate must not contain < or >", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.satisfies("Genre IS NOT NULL AND TRIM(Genre) <> '''' AND UPPER(TRIM(Genre))
        NOT IN (''NAN'',''NULL'',''NONE'')", "Genre non-null/non-placeholder", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Genre = TRIM(Genre)", "Genre trimmed", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("LENGTH(TRIM(Genre)) BETWEEN 1 AND 60", "Genre length
        1-60", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("TRIM(Genre) RLIKE ''^[A-Za-z ,/&-]+$''", "Genre allowed
        characters", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","No_of_Votes"]':
    code:
    - suggestion: '.satisfies("IMDB_Rating IS NOT NULL AND No_of_Votes IS NOT NULL
        AND NOT isnan(IMDB_Rating) AND IMDB_Rating >= 0 AND IMDB_Rating <= 10 AND
        No_of_Votes >= 0", "ratings_votes_valid", assertion=lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["IMDB_Rating","No_of_Votes","Runtime"]':
    code:
    - suggestion: '.satisfies(''No_of_Votes >= 0'', ''Votes non-negative'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: '.satisfies("Poster_Link RLIKE ''^https?://''", "Poster link http(s)
        scheme", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasSize(lambda n: n >= 12)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.satisfies(''No_of_Votes IS NOT NULL AND cast(No_of_Votes as double)
        IS NOT NULL'', ''Votes are numeric and present'', lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative(''No_of_Votes'', lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxQuantile(''No_of_Votes'', 0.60, lambda q: q > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.satisfies("Released_Year IS NULL OR Released_Year RLIKE ''^[0-9]+$''",
        "Released_Year numeric when present", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("Released_Year IS NULL OR Released_Year
        RLIKE ''^[0-9]+$''", "Released_Year numeric when present", lambda x: x ==
        1.0)'' failed on data sample: Value: 0.0 does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasCompleteness(''Released_Year'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: '.satisfies(''length(trim(Runtime)) > 0'', ''Runtime non-empty'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(regexp_extract(Runtime, ''(\\\\d+)'', 1) as int)
        BETWEEN 1 AND 500", ''Runtime minutes range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.satisfies("Series_Title RLIKE ''[A-Za-z0-9]''", "Series_Title
        has ASCII alnum", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness(["Series_Title", "Released_Year"], lambda u: u ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
