results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies(''CAST(`IMDB_Rating` AS DOUBLE) IS NOT NULL'', ''Non-null
        numeric rating present'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(CAST(`IMDB_Rating` AS DOUBLE) >= 0.0 AND CAST(`IMDB_Rating`
        AS DOUBLE) <= 10.0) OR `IMDB_Rating` IS NULL'', ''IMDB_Rating within [0,10]
        when present'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`IMDB_Rating` AS DOUBLE) >= 7.0'', ''Has high-rated
        titles'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Certificate'', lambda x: x >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.hasCompleteness(''Genre'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Genre'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Genre` IS NOT NULL AND length(trim(`Genre`)) > 0'',
        ''Non-empty Genre'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''Genre'', lambda v: v <= 300)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("length(trim(`Released_Year`)) > 0 AND lower(trim(`Released_Year`))
        NOT IN (''nan'',''na'',''none'',''null'',''unknown'')", "Released_Year not
        blank or null-like", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''Released_Year >= 1000 AND Released_Year <= 9999'',
        ''Released_Year_is_4_digit_numeric'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`Released_Year` AS INT) BETWEEN 1900 AND 2100'',
        ''Released_Year plausible range'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CAST(`Released_Year` AS INT) BETWEEN
        1900 AND 2100'', ''Released_Year plausible range'', lambda x: x == 1.0)''
        failed on data sample: Value: 0.99 does not meet the constraint requirement!'
      level: warning
  '["IMDB_Rating","Meta_score","No_of_Votes","Released_Year","Series_Title"]':
    code:
    - suggestion: '.satisfies(''length(trim(Series_Title)) > 0 AND length(trim(Released_Year))
        > 0 AND NOT Series_Title LIKE "%|%" AND NOT Released_Year LIKE "%|%"'', ''valid_title_year_fields'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''Series_Title'', ''Released_Year''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","No_of_Votes"]':
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Poster_Link''], lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''IMDB_Rating >= 7.0'', ''TopPicksMustHaveRatingGE7'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Poster_Link'', ''^https?://\\S+$'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("length(trim(`Poster_Link`)) = length(`Poster_Link`)",
        "No leading or trailing whitespace in Poster_Link", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("UPPER(TRIM(`Poster_Link`)) NOT IN ('''', ''N/A'', ''NA'',
        ''NONE'', ''NULL'')", "No placeholder tokens in Poster_Link", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.hasCompleteness(''Meta_score'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Meta_score` IS NULL OR (CAST(`Meta_score` AS DOUBLE)
        >= 0 AND CAST(`Meta_score` AS DOUBLE) <= 100)", "Meta_score in 0-100 range",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Meta_score` IS NULL OR (NOT isnan(CAST(`Meta_score`
        AS DOUBLE)) AND abs(CAST(`Meta_score` AS DOUBLE)) <= 1.7976931348623157E308)",
        "Meta_score finite", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.satisfies("CASE WHEN `No_of_Votes` >= 0 AND `No_of_Votes` = CAST(`No_of_Votes`
        AS BIGINT) THEN 1 ELSE 0 END", "No_of_Votes non-negative integers", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasApproxQuantile("No_of_Votes", 0.60, lambda q: q > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(`No_of_Votes` AS STRING) RLIKE ''^[0-9]+$''
        THEN 1 ELSE 0 END", "Votes numeric tokens", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Runtime'', ''^\s*(\d+)\s*min\s*$'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Runtime","Runtime_Minutes"]':
    code:
    - suggestion: '.hasUniqueness(["Series_Title", "Released_Year"], lambda u: u ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness(["Poster_Link"], lambda u: u == 1.0)

        .hasUniqueness(["poster_asset_id"], lambda u: u == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness(["Poster_Link"], lambda u: u == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("IMDB_Rating >= 7.0", "top_picks_rating_threshold",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("LENGTH(TRIM(`Series_Title`)) > 0", "Non-empty Series_Title",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("LOWER(TRIM(`Series_Title`)) NOT IN (''nan'',''null'',''none'')",
        "No sentinel Series_Title", lambda x: x >= 0.999)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Series_Title'',''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
