results:
  Star1:
    code:
    - suggestion: .isComplete('Star1')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("TRIM(LOWER(`Star1`)) != '' AND TRIM(LOWER(`Star1`))
        != 'nan'", "Star1 not empty or 'nan'")
      status: true
      reason_if_failed: ''
      level: error
  Star2:
    code:
    - suggestion: .satisfies("`Star2` IS NOT NULL AND TRIM(`Star2`) != '' AND LOWER(TRIM(`Star2`))
        != 'nan'", "Non-null, non-empty, non-'nan' Star2 values")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Star2` IS NOT NULL AND `Star2` != `Star1` AND `Star2`
        != `Star3` AND `Star2` != `Star4`", "''Star2'' distinct from other star columns",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Star3:
    code:
    - suggestion: '.satisfies("TRIM(LOWER(`Star3`)) IS NOT NULL AND TRIM(`Star3`)
        != '''' AND LOWER(TRIM(`Star3`)) != ''nan''", "Star3 must not be missing,
        blank, or ''nan''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Star4:
    code:
    - suggestion: .satisfies("(Star4 IS NOT NULL AND TRIM(CAST(Star4 AS STRING)) !=
        '' AND LOWER(TRIM(CAST(Star4 AS STRING))) != 'nan')", "Star4 non-null, non-empty,
        not 'nan' (str)")
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating:
    code:
    - suggestion: '.hasCompleteness(''IMDB_Rating'', lambda x: x == 1.0)'
