      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("size(split(trim(`Genre`), '','')) >= 1 AND array_min(transform(split(trim(`Genre`),
