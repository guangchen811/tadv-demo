        no empty items")'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("length(trim(split(trim(`Genre`), '','')[0])) > 0",
        "Genre: primary genre is non-empty string")'
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.hasCompleteness(''Gross'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(`Gross` IS NULL) OR (`Gross` = '') OR (lower(`Gross`)
        = 'nan') OR regexp_extract(`Gross`, '^[0-9]{1,3}(,[0-9]{3})*$', 0) = `Gross`",
        "Gross valid pattern")
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`Gross` IS NULL) OR (`Gross` = '''')
        OR (lower(`Gross`) = ''nan'') OR regexp_extract(`Gross`, ''^[0-9]{1,3}(,[0-9]{3})*$'',
        0) = `Gross`", "Gross valid pattern")'' failed on data sample: Value: 0.9625
        does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasCompleteness(''Gross'', lambda x: x >= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","eligible"]':
