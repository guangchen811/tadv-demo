      reason_if_failed: 'Unable to instantiate constraint ''.compliesWith("Gross IS
        NULL OR Gross RLIKE ''^[0-9,]+$''")'': ''Check'' object has no attribute ''compliesWith'''
      level: error
  IMDB_Rating:
    code:
    - suggestion: .isBetween('IMDB_Rating', 0.0, 10.0)
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.isBetween(''IMDB_Rating'',
