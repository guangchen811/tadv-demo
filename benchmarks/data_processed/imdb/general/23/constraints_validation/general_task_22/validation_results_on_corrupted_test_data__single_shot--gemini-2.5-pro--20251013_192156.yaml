results:
  Certificate:
    code:
    - suggestion: .isContainedIn('Certificate', ['U', 'G', 'PG', 'TV-PG', 'UA', 'PG-13',
        'TV-14', 'R', 'TV-MA', 'NC-17', 'A', 'Not Rated', 'Unrated', 'Approved', 'Passed',
        'U/A', 'GP'])
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: .containsPattern('Genre', r'^[A-Za-z\\-]+(,\\s[A-Za-z\\-]+)*$')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.containsPattern(''Genre'',
        r''^[A-Za-z\\-]+(,\\s[A-Za-z\\-]+)*$'')'': ''Check'' object has no attribute
        ''containsPattern'''
      level: error
  Gross:
    code:
