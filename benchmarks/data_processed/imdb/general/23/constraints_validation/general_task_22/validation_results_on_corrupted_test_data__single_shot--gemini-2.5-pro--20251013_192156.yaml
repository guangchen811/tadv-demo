      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.containsPattern(''Runtime'',
        r''^\\d{2,3} min$'')'': ''Check'' object has no attribute ''containsPattern'''
      level: error
  _SUCCESS:
    code:
    - suggestion: '.hasSize(lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
