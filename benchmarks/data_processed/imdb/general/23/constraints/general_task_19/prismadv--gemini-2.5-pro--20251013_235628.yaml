        A potential Deequ constraint could verify this relationship:

        .satisfies("IMDB_Rating < 6.5 OR Certificate != ''NC-17''", "HighRatedMoviesAreSuitable",
        lambda c: c > 0.95)

        This constraint would check that the proportion of movies that are either
        not highly rated or have a suitable certificate is high (e.g., > 95%), flagging
