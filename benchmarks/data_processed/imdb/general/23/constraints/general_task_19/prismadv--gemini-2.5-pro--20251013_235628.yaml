      uid: 32e3d8d2-452b-4b58-a1a6-ada7b9399707
    - text: 'The ''No_of_Votes'' column should contain non-negative values, as it
        represents a count. The code is robust to values less than 1 by clipping them
        to 1 before a logarithmic transformation, but negative values are logically
        inconsistent with the feature''s meaning and are treated the same as a single
        vote.

        We could represent this assumption as a deequ constraint like this:

        .isNonNegative("No_of_Votes")'
