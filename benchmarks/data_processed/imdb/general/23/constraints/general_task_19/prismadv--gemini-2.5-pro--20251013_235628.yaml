      source_assumptions:
      - e5fc95d2-3e39-4b84-a77a-7751f1f74ccb
    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' columns must
        be unique across all records. This is explicitly enforced by `verify_integrity=True`
        when setting the DataFrame index, which will raise an error if duplicates
        are found.

        We could represent this assumption as a deequ constraint like this:

        .isUnique(["Series_Title", "Released_Year"])'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      uid: a59576be-32b1-4227-8d28-e7036f26d368
    - text: 'The scoring model assumes a positive relationship between a movie''s
        quality (''IMDB_Rating'') and its popularity (''No_of_Votes''). The `combined_score`
        multiplies a rating-based score with a popularity-based score. For this model
        to be effective, it is implicitly assumed that these two metrics are not contradictory;
        for example, a positive correlation is expected.

        We could represent this assumption as a deequ constraint like this:

        .hasCorrelation("IMDB_Rating", "No_of_Votes", _ >= 0.2)'
      sources:
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 40
        end_line: 41
        file: ''
      - start_line: 79
        end_line: 80
        file: ''
      uid: 70196ab4-2778-4a1a-bd3e-dc43859074c7
    - text: 'The final filtering step requires records to have both a high rating
        (`IMDB_Rating >= 6.5`) and an eligible certificate (suitability > 0). The
        code assumes that these two conditions are not mutually exclusive and that
        a meaningful number of records will satisfy both criteria to produce a non-empty
        output.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("COUNT(*) > 100", "IMDB_Rating >= 6.5 AND Certificate <> ''NC-17''")'
      sources:
      - start_line: 71
        end_line: 75
        file: ''
      - start_line: 97
        end_line: 98
        file: ''
      uid: e5fc95d2-3e39-4b84-a77a-7751f1f74ccb
