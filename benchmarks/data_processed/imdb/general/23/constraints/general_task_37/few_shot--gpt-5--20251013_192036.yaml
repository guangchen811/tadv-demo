constraints:
  IMDB_Rating:
    code:
    - - '.hasCompliance(''imdb_at_least_7'', ''IMDB_Rating >= 7.0'', lambda v: v >
        0.0)'
      - Invalid
    - - '.hasMax(''IMDB_Rating'', lambda x: x <= 10)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMin(''Released_Year'', lambda x: x >= 1900, where=''IMDB_Rating >= 7.0'')'
      - Invalid
    - - .isComplete('Released_Year', where='IMDB_Rating >= 7.0')
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - '.hasPattern(''Runtime'', ''^\s*\d+\s*min\b'', lambda v: v == 1.0)'
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title', where='IMDB_Rating >= 7.0')
      - Invalid
    assumptions: []
