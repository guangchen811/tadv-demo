  '["HybridRating","No_of_Votes","WeightedRank"]':
    code: []
    assumptions:
    - text: "WeightedRank must equal a weighted average of HybridRating and the dataset-wide\
        \ mean HybridRating, with weights determined by No_of_Votes and the 70th-percentile\
        \ vote count: WeightedRank \u2248 (No_of_Votes / (No_of_Votes + m)) * HybridRating\
        \ + (m / (No_of_Votes + m)) * avg(HybridRating), where m = quantile_0.70(No_of_Votes).\
        \ This can be validated with an approximate equality tolerance (e.g., absolute\
        \ error <= 1e-6)."
      sources:
      - start_line: 64
        end_line: 68
        file: ''
      uid: c0ae90cb-0474-407f-83ea-e40799331d57
    - text: "Because WeightedRank is a convex combination of HybridRating and the\
        \ dataset mean of HybridRating, every row\u2019s WeightedRank should lie within\
        \ the global range of HybridRating: min(HybridRating) <= WeightedRank <= max(HybridRating)."
      sources:
      - start_line: 64
        end_line: 68
        file: ''
      uid: 9dba8425-b496-4438-bf62-ad3b63905b11
    - text: "For rows with No_of_Votes = 0 (and m > 0), WeightedRank should equal\
        \ the dataset mean of HybridRating: WeightedRank \u2248 avg(HybridRating)\
        \ within a small tolerance (e.g., 1e-6)."
      sources:
      - start_line: 64
        end_line: 68
        file: ''
      uid: cec5b5e9-17a0-48f6-868d-eb08cf89e58e
    - text: 'For rows with very high engagement (e.g., No_of_Votes >= 10 * quantile_0.70(No_of_Votes)),
        WeightedRank should be very close to HybridRating: |WeightedRank - HybridRating|
        <= 0.05 (tunable threshold).'
      sources:
      - start_line: 64
        end_line: 68
        file: ''
      uid: 6bc25cf4-c13c-4d06-84c2-f6e23d967d7a
    - text: 'HybridRating must be consistent with the Meta_score/IMDB_Rating blending
        logic: if Meta_score is null then HybridRating = IMDB_Rating; otherwise HybridRating
        must lie between IMDB_Rating and (Meta_score / 10).'
      sources:
      - start_line: 60
        end_line: 62
        file: ''
      uid: b80ed8ce-bef5-4ceb-b62f-cd35aa6489f7
    - text: The combination of Series_Title and Released_Year should uniquely identify
        a catalog entry (to avoid catalog_id collisions), i.e., isUnique([Series_Title,
        Released_Year]).
      sources:
      - start_line: 76
        end_line: 77
        file: ''
      uid: 5d407c40-39b4-4861-96f7-8a27bf712a23
  '["IMDB_Rating","MetaNormFilled","Meta_score"]':
    code: []
    assumptions:
    - text: 'MetaNormFilled is a per-row coalesce of Meta_score and IMDB_Rating: if
        Meta_score is present then MetaNormFilled must equal Meta_score/10.0; otherwise
        it must equal IMDB_Rating. This can be validated as a Deequ compliance: .hasCompliance("metanormfilled_is_coalesce",
        "(Meta_score IS NOT NULL AND abs(MetaNormFilled - Meta_score/10.0) < 1e-6)
        OR (Meta_score IS NULL AND abs(MetaNormFilled - IMDB_Rating) < 1e-6)", p =>
        p == 1.0)'
      sources:
      - start_line: 60
        end_line: 61
        file: ''
      uid: 07ba0991-4f59-41a4-8527-3d3c99f9117d
    - text: "IMDB_Rating and MetaNormFilled must be on the same 0\u201310 scale to\
        \ allow a convex combination in HybridRating and a filter at 7.0. Enforce\
        \ that both IMDB_Rating and MetaNormFilled are within [0, 10] for all rows.\
        \ Example Deequ compliance: .hasCompliance(\"ratings_in_0_10\", \"IMDB_Rating\
        \ >= 0 AND IMDB_Rating <= 10 AND MetaNormFilled >= 0 AND MetaNormFilled <=\
        \ 10\", p => p == 1.0)"
      sources:
      - start_line: 60
        end_line: 62
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      uid: 7d1403ea-71b9-442e-bdf9-fa2d80ad5a0a
    - text: 'There should be sufficient overlap between IMDB_Rating and Meta_score
        to compute a meaningful correlation; at least 80% of records should have both
        present and at least 2 such rows must exist. Example Deequ checks: .hasCompliance("both_ratings_present",
        "IMDB_Rating IS NOT NULL AND Meta_score IS NOT NULL", p => p >= 0.8) and .hasCompliance("min_pairs_for_corr",
        "IMDB_Rating IS NOT NULL AND Meta_score IS NOT NULL", p => p > 0) combined
        with a minimum row count on the filtered DataFrame if available.'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      uid: 8a999870-6679-4c32-98d6-9e1aabb3e533
    - text: 'IMDB_Rating and Meta_score should be positively associated. Enforce a
        non-negative correlation on rows where both are present. Example Deequ: .hasCorrelation("IMDB_Rating",
        "Meta_score", lowerBound = 0.0, upperBound = 1.0)'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      uid: 973d1d9d-5dc2-42a9-8408-b5e4221e9371
  '["IMDB_Rating","Meta_score"]':
    code: []
    assumptions:
    - text: IMDB_Rating and Meta_score (when both present) are expected to be moderately
        positively correlated across the dataset (Pearson correlation >= 0.4). This
        expectation underpins the conditional up-weighting of Meta_score in the hybrid
        rating.
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      uid: dcb78629-206e-40b1-b89b-68169e62739d
    - text: If Meta_score is null for a record, IMDB_Rating must be non-null because
        the pipeline fills the missing normalized Meta_score with IMDB_Rating. There
        must be zero rows where both IMDB_Rating and Meta_score are simultaneously
        null.
      sources:
      - start_line: 60
        end_line: 62
        file: ''
      uid: f379c99d-c2ba-456d-a544-8d8383d5d490
    - text: There must be at least 2 records where both IMDB_Rating and Meta_score
        are non-null so that a meaningful correlation can be computed for weighting
        logic.
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      uid: 55417f1f-dfbe-4bfd-8777-8de9ab946de6
    - text: "Meta_score is on a 0\u2013100 scale and IMDB_Rating on a 0\u201310 scale;\
        \ the code divides Meta_score by 10 and combines it with IMDB_Rating. Therefore,\
        \ for rows where both ratings are present, Meta_score/10 and IMDB_Rating must\
        \ each lie within [0,10] to ensure scale compatibility."
      sources:
      - start_line: 60
        end_line: 62
        file: ''
      uid: 0e66ee5f-9f7d-4ce1-9c64-8367bce59edd
  '["IMDB_Rating","Released_Year","Series_Title"]':
    code: []
    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' must be unique
        for all records that pass the IMDB_Rating >= 7.0 filter, since this pair is
        used to construct a unique ''catalog_id''. We could represent this as a deequ
        constraint on the filtered dataset: .isUnique(["Series_Title", "Released_Year"]).'
      sources:
      - start_line: 70
        end_line: 78
        file: ''
      uid: fcc051bc-71e1-477c-85b6-428f53477931
    - text: 'For every record included in the feed (i.e., IMDB_Rating >= 7.0), ''Released_Year''
        must be non-null and castable to an integer, and ''Series_Title'' must be
        non-null/non-empty; otherwise catalog_id construction will fail. This can
        be represented as a conditional Deequ constraint: .satisfies("IMDB_Rating
        < 7.0 OR (NOT isNull(Released_Year) AND length(trim(Series_Title)) > 0)",
        "released_year_and_title_required_for_high_rated").'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      - start_line: 70
        end_line: 78
        file: ''
      uid: 514c71bd-9bfc-4522-833d-b29ddc9ef606
    - text: 'IMDB_Rating and Meta_score are intended to measure the same underlying
        quality on comparable scales (with Meta_score divided by 10), and when both
        are present they should be positively correlated. This expectation can be
        validated with a correlation constraint: .hasCorrelation("IMDB_Rating", "Meta_score",
        lowerBound=0.0) or, if stricter, lowerBound=0.4.'
      sources:
      - start_line: 57
        end_line: 62
        file: ''
      uid: e7369b6b-2f70-4c99-a744-9fe3dd8f67ee
    - text: 'The filled meta rating must be consistent with the source columns: if
        ''Meta_score'' is not null then MetaNormFilled == Meta_score/10; if ''Meta_score''
        is null then MetaNormFilled == IMDB_Rating. This can be encoded as a row-level
        conditional constraint: .satisfies("(Meta_score IS NOT NULL AND abs(MetaNormFilled
        - Meta_score/10) < 1e-6) OR (Meta_score IS NULL AND abs(MetaNormFilled - IMDB_Rating)
        < 1e-6)", "metanormfilled_consistency").'
      sources:
      - start_line: 60
        end_line: 62
        file: ''
      uid: ec0f7653-9fe9-48d6-91d7-bb6aa250b3d4
