  '["Certificate","CertificateNorm"]':
    code: []
    assumptions:
    - text: 'CertificateNorm is a deterministic canonicalization of Certificate: if
        Certificate == ''U/A'' then CertificateNorm == ''UA''; else if Certificate
        is in {''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not Rated'',''TV-14'',''TV-MA''}
        then CertificateNorm == Certificate; else (including null/unknown values)
        CertificateNorm == ''Not Rated''. This can be enforced with a compliance constraint
        like: CASE WHEN Certificate = ''U/A'' THEN CertificateNorm = ''UA'' WHEN Certificate
        IN (''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not Rated'',''TV-14'',''TV-MA'')
        THEN CertificateNorm = Certificate ELSE CertificateNorm = ''Not Rated'' END.'
      sources:
      - start_line: 46
        end_line: 55
        file: ''
      uid: b6b3dea2-1581-4365-a9dc-a3e5bccf637b
    - text: 'If Certificate is null or not in the allowed set (after canonicalizing
        ''U/A'' to ''UA''), CertificateNorm must be exactly ''Not Rated''. This can
        be represented as: CASE WHEN Certificate IS NULL OR (Certificate NOT IN (''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not
        Rated'',''TV-14'',''TV-MA'') AND Certificate <> ''U/A'') THEN CertificateNorm
        = ''Not Rated'' ELSE true END.'
      sources:
      - start_line: 49
        end_line: 55
        file: ''
      uid: ebd1dfec-149f-4fb0-a38c-bdcdbe0e29da
    - text: 'For any row where Certificate is in the allowed set excluding ''U/A'',
        CertificateNorm must equal Certificate; and when Certificate == ''U/A'', CertificateNorm
        must be ''UA'' (never ''U/A''). Representable as: CASE WHEN Certificate IN
        (''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not Rated'',''TV-14'',''TV-MA'')
        THEN CertificateNorm = Certificate WHEN Certificate = ''U/A'' THEN CertificateNorm
        = ''UA'' ELSE true END.'
      sources:
      - start_line: 49
        end_line: 55
        file: ''
      uid: cb24ebb9-65fb-49b2-960c-b34873827bfc
    - text: 'Within the filtered set (IMDB_Rating >= 7.0) used to construct catalog_id,
        Released_Year must be non-null and castable to integer, and the combination
        of Series_Title and Released_Year should produce a unique catalog_id. This
        can be validated by: completeness of Released_Year conditioned on IMDB_Rating
        >= 7.0, and uniqueness of [''Series_Title'',''Released_Year''] (or of ''catalog_id'')
        within the filtered data.'
      sources:
      - start_line: 70
        end_line: 78
        file: ''
      uid: e4503be2-e788-44e5-a515-78528eaedfe2
    - text: "MetaNormFilled must equal Meta_score/10 when Meta_score is present, otherwise\
        \ it must equal IMDB_Rating. This ensures HybridRating blends two ratings\
        \ on the same 0\u201310 scale. Compliance: CASE WHEN Meta_score IS NOT NULL\
        \ THEN MetaNormFilled = Meta_score/10 ELSE MetaNormFilled = IMDB_Rating END."
      sources:
      - start_line: 60
        end_line: 62
        file: ''
      uid: a92c6b49-fa38-4bf4-b45f-75cb9d1e4dc4
