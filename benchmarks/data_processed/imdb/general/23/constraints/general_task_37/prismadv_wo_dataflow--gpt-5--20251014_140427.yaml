  '["MetaNorm","Meta_score"]':
    code: []
    assumptions:
    - text: 'MetaNorm is a deterministic rescaling of Meta_score: for every row where
        Meta_score is not null, MetaNorm must equal Meta_score / 10.0; conversely,
        MetaNorm must be null if and only if Meta_score is null. This can be validated
        with a row-level constraint like: Meta_score IS NULL OR ABS(MetaNorm - Meta_score/10.0)
        <= 1e-6, plus (Meta_score IS NULL) = (MetaNorm IS NULL).'
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: 0868ebc5-8f8d-4417-a539-222f0bceadb1
    - text: 'MetaNormFilled is the row-wise coalesce between MetaNorm and IMDB_Rating:
        if MetaNorm is non-null then MetaNormFilled equals MetaNorm; else if IMDB_Rating
        is non-null then MetaNormFilled equals IMDB_Rating; else MetaNormFilled is
        null. A row-level constraint could be: CASE WHEN MetaNorm IS NOT NULL THEN
        ABS(MetaNormFilled - MetaNorm) <= 1e-6 WHEN MetaNorm IS NULL AND IMDB_Rating
        IS NOT NULL THEN ABS(MetaNormFilled - IMDB_Rating) <= 1e-6 ELSE MetaNormFilled
        IS NULL END.'
      sources:
      - start_line: 61
        end_line: 61
        file: ''
      uid: 1865f1a4-78ec-49cf-b73e-5346054234b0
    - text: 'HybridRating must be a convex combination of MetaNormFilled and IMDB_Rating
        with a dataset-wide weight w determined by the correlation between IMDB_Rating
        and Meta_score computed over rows where both are non-null: let w = 0.3 if
        corr(IMDB_Rating, Meta_score) > 0.4, otherwise w = 0.1; then for all rows
        where IMDB_Rating and MetaNormFilled are non-null, ABS(HybridRating - (w*MetaNormFilled
        + (1-w)*IMDB_Rating)) <= 1e-6.'
      sources:
      - start_line: 57
        end_line: 62
        file: ''
      uid: efae86a4-5828-49af-8d0c-abe6d396c43e
    - text: 'There should be at least two records where both IMDB_Rating and Meta_score
        are non-null so that the correlation used to pick the meta_weight (w) is computable.
        Constraint: COUNT_ROWS(IMDB_Rating IS NOT NULL AND Meta_score IS NOT NULL)
        >= 2.'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      uid: 038022b2-fe6e-41a5-b0a8-8d78f3324b3b
    - text: 'WeightedRank must be recomputable from No_of_Votes and HybridRating using
        dataset-level constants m and C: letting m = quantile_0.70(No_of_Votes) and
        C = mean(HybridRating), for rows with No_of_Votes and HybridRating non-null,
        ABS(WeightedRank - ((No_of_Votes/(No_of_Votes+m))*HybridRating + (m/(No_of_Votes+m))*C))
        <= 1e-6.'
      sources:
      - start_line: 64
        end_line: 68
        file: ''
      uid: 140ea65d-9ddd-4775-b31e-ef190439a597
    - text: 'For all rows that pass the IMDB_Rating >= 7.0 filter, Released_Year must
        be non-null and castable to an integer and Series_Title must be non-null to
        construct a valid catalog_id. Constraint on filtered rows: Released_Year IS
        NOT NULL AND Series_Title IS NOT NULL.'
      sources:
      - start_line: 70
        end_line: 77
        file: ''
      uid: b6543d99-a914-4c07-b7ca-80b139318a01
