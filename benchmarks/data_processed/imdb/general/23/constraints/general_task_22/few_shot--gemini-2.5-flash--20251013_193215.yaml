constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['U', 'G', 'PG', 'TV-PG', 'UA', 'PG-13', 'TV-14',
        'R', 'TV-MA', 'NC-17', 'A', 'Not Rated', 'Unrated', 'Approved', 'Passed',
        'U/A', 'GP'])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - .matchesPattern('Gross', r'^[0-9,]+$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isConvertibleTo('IMDB_Rating', DeequDataType.Fractional)
      - Invalid
    - - .isGreaterThanOrEqualTo('IMDB_Rating', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - .isConvertibleTo('Meta_score', DeequDataType.Fractional)
      - Invalid
    - - .isLessThanOrEqualTo('Meta_score', 100.0)
      - Invalid
    - - .isNonNegative('Meta_score')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isConvertibleTo('No_of_Votes', DeequDataType.Integral)
      - Invalid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .isComplete('Poster_Link')
      - Valid
    - - .matchesPattern('Poster_Link', r'^https?://.*')
      - Invalid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isConvertibleTo('Released_Year', DeequDataType.Integral)
      - Invalid
    - - .isGreaterThanOrEqualTo('Released_Year', 1900)
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', 2100)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .isComplete('Runtime')
      - Valid
    - - .matchesPattern('Runtime', r'^[0-9]{2,3} min$')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
