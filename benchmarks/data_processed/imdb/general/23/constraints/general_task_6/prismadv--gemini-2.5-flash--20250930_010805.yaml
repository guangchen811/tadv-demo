    - text: 'The ''Poster_Link'' column is expected to contain values that serve as
        unique and valid identifiers for movie posters, likely in a URL format. The
        code explicitly uses this column to deduplicate records (`drop_duplicates`),
        implying that if multiple rows share the same ''Poster_Link'' value, they
        refer to the same logical movie poster. Therefore, the values should be consistently
        formatted and meaningful (e.g., valid URLs) to enable effective deduplication
        and provide useful output.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("Poster_Link LIKE ''http://%'' OR Poster_Link LIKE ''https://%''",
        "Is a valid URL format", 0.99)'
