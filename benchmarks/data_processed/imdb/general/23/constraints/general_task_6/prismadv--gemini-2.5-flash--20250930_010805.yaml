    assumptions:
    - text: 'The `vote_weight` (line 71) is derived from the pairwise correlation
        between ''IMDB_Rating'' and ''No_of_Votes''. For this correlation to be a
        valid, finite number, a sufficient number of records must contain valid numeric
        values in both ''IMDB_Rating'' and ''No_of_Votes'' columns. Rows with non-numeric
        or null values in either column are excluded from the correlation calculation
        (line 33). If the remaining valid pairs are too few, or if the values in the
        remaining data are constant, the correlation may be undefined or NaN, which
        will cause `vote_weight` to be invalid and propagate to the `composite_score`.
        We could represent this assumption as a Deequ constraint like this:

        `.addConstraint(Constraint.assert_that(AnalysisRunner.onData(df).addAnalyzer(Correlation("IMDB_Rating",
        "No_of_Votes")).run().metric(Correlation("IMDB_Rating", "No_of_Votes")).get().value().get()).isNotNull())`'
      sources:
