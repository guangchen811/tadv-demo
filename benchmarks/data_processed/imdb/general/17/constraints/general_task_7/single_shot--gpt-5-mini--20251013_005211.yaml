constraints:
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda x: x >= 0.8)'
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isBetween('IMDB_Rating', 0.0, 10.0)
      - Invalid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda x: x >= 0.8)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', '^https?://')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .hasPattern('Released_Year', '^\\s*\\d{4}\\s*$')
      - Invalid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', '^\\s*\\d+\\s*min\\s*$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Runtime_Minutes:
    code:
    - - .isComplete('Runtime_Minutes')
      - Invalid
    - - .isPositive('Runtime_Minutes')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  catalog_id:
    code:
    - - .isComplete('catalog_id')
      - Invalid
    - - .isPositive('catalog_id')
      - Invalid
    assumptions: []
  poster_asset_id:
    code:
    - - .isComplete('poster_asset_id')
      - Invalid
    - - .isPositive('poster_asset_id')
      - Invalid
    assumptions: []
  title_year_key:
    code:
    - - .isComplete('title_year_key')
      - Invalid
    - - .isUnique('title_year_key')
      - Invalid
    assumptions: []
