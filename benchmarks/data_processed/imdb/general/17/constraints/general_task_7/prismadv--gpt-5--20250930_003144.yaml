    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' constitutes
        a unique business key across all records. This guarantees stable catalog_id
        assignment and consistent deduplication. Constraint example: isUnique(["Series_Title",
        "Released_Year"]).'
