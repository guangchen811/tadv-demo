      - start_line: 53
        end_line: 55
        file: ''
      uid: abe4701e-ff3f-4d74-9ddc-71f89184dfbf
    - text: 'The input data should contain at least one title with IMDB_Rating >=
        7.0 so that the Top Picks output is non-empty. We could represent this with
        Deequ as: .satisfies("CASE WHEN `IMDB_Rating` >= 7.0 THEN 1 ELSE 0 END", "Has
