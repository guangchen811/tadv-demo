    assumptions:
    - text: 'In the input data, at least 95% of IMDB_Rating values should be parseable
        as numeric (i.e., not become null after numeric coercion). This is required
        because the code converts IMDB_Rating to numeric and then performs numeric
        comparisons and aggregations. We could represent this with Deequ as: .hasDataType("IMDB_Rating",
