      uid: 205ff602-e1d8-4ae6-8ff7-437321f2c67b
    - text: 'For every row, ''quality_score'' must equal the Bayesian-weighted formula
        using both ''IMDB_Rating'' and ''No_of_Votes'': quality_score = 0.8 * [ (No_of_Votes
        / (No_of_Votes + m)) * IMDB_Rating + (m / (No_of_Votes + m)) * C ] + 0.2 *
        coalesce(Meta_score / 10.0, C), where m = quantile_0.60(No_of_Votes) and C
        = mean(IMDB_Rating), and the denominator must be positive (No_of_Votes + m
        > 0). This ties ''IMDB_Rating'' and ''No_of_Votes'' together in the final
        score. Deequ compliance can be implemented by computing m and C first and
        then asserting abs(quality_score - expected) <= epsilon.'
      sources:
      - start_line: 39
        end_line: 47
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: 4bf1903a-d459-46d8-b949-022badc4ef33
    - text: 'Monotonicity induced by the scoring: holding ''IMDB_Rating'' and ''Meta_score''
        constant, ''quality_score'' must be non-decreasing with higher ''No_of_Votes'';
        holding ''No_of_Votes'' and ''Meta_score'' constant, ''quality_score'' must
        be non-decreasing with higher ''IMDB_Rating''. These relationships follow
        from the weighted-rating formula and ensure consistent ranking behavior when
        one of the two target columns changes.'
      sources:
      - start_line: 43
        end_line: 47
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: be4623a5-b677-4b57-b571-1e57a2f2c2f6
    - text: 'The ''top_picks'' dataset must contain only rows where ''IMDB_Rating''
        >= 7.0 and must have no duplicate (Series_Title, Released_Year) pairs (i.e.,
        one title-year per row). Deequ examples (on top_picks.csv): .satisfies(''IMDB_Rating
        >= 7.0'') and .isUnique([''Series_Title'',''Released_Year'']).'
      sources:
      - start_line: 53
        end_line: 57
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: 20c9b929-7cb5-4a44-8904-fb79ba486337
    - text: 'Ranking consistency in ''top_picks'': when ordered by ''display_rank''
        ascending, ''quality_score'' must be non-increasing; if two consecutive rows
        have equal ''quality_score'', then ''No_of_Votes'' must be non-increasing.
        This enforces that display_rank reflects the sort by [''quality_score'',''No_of_Votes'']
        descending. Additionally, ''display_rank'' should start at 1 and be consecutive.
        These checks link ''quality_score'', ''No_of_Votes'', and ''display_rank''.'
      sources:
      - start_line: 55
        end_line: 58
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: 630364cd-7946-4722-aa60-5d84819485b9
