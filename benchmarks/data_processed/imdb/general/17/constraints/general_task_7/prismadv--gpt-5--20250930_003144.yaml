        file: ''
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 65
        end_line: 69
        file: ''
      uid: d9052e4f-0b7d-48c8-aa99-56534483b7d4
    - text: 'Within a single run, ''quality_score'' is deterministically derived from
        (''IMDB_Rating'', ''No_of_Votes'', ''Meta_score'') given dataset-level constants
        m and C; therefore any two rows with identical (''IMDB_Rating'', ''No_of_Votes'',
        ''Meta_score'') must have identical ''quality_score''. Constraint example:
        hasFunctionalDependency(["IMDB_Rating", "No_of_Votes", "Meta_score"], "quality_score").'
      sources:
      - start_line: 43
        end_line: 47
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: a7211a1e-c778-41d1-9981-ab7ec0a33dd6
    - text: 'In the curated Top Picks output, each (''Series_Title'', ''Released_Year'')
        pair appears at most once and maps to a unique ''catalog_id''. Constraint
        examples on the filtered dataset (IMDB_Rating >= 7): isUnique(["Series_Title",
        "Released_Year"]) and isUnique(["catalog_id"]).'
      sources:
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 65
        end_line: 69
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: 805cb2e3-b2dd-43c4-987b-df6f54741c6a
