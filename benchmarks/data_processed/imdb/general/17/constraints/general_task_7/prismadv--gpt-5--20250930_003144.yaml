        end_line: 39
        file: ''
      - start_line: 53
        end_line: 55
        file: ''
      - start_line: 46
        end_line: 46
        file: ''
      uid: 04841f2e-6cf7-4af3-b6ef-52d3a70a8e8d
    - text: 'In the input data, IMDB_Rating must have at least one non-null numeric
        value so that the column mean used in downstream scoring is defined (i.e.,
        not NaN). We could represent this with Deequ as: .satisfies("CASE WHEN `IMDB_Rating`
        IS NOT NULL THEN 1 ELSE 0 END", "Non-null rating present", lambda x: x > 0)'
      sources:
      - start_line: 39
        end_line: 39
        file: ''
      - start_line: 43
        end_line: 47
        file: ''
      uid: 94054b03-58c2-467e-a35f-769e2ecd38ae
    - text: 'IMDB_Rating values in the input data should lie within the typical IMDb
        scale of 0 to 10. This ensures the >= 7.0 filtering and the weighted rating
        behave as intended. We could represent this with Deequ as: .isContainedInRange("IMDB_Rating",
