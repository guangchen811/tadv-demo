      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 55
        end_line: 57
        file: ''
      - start_line: 87
        end_line: 87
        file: ''
      uid: b3ea2c06-f2f3-4862-8fa8-c79671f86982
    - text: 'Both ''Series_Title'' and ''Released_Year'' must be non-empty after trimming
        and must not contain the pipe character ''|'', because they are concatenated
        with ''|'' to form ''title_year_key''. Constraint example: satisfies("length(trim(Series_Title))
        > 0 AND length(trim(Released_Year)) > 0 AND NOT Series_Title LIKE ''%|%''
        AND NOT Released_Year LIKE ''%|%''", ''valid_title_year_fields'').'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      uid: c381f127-9179-4d0b-b125-8001442ee28b
    - text: 'The pair (''Series_Title'', ''Released_Year'') functionally determines
        ''catalog_id'' and, conversely, ''catalog_id'' functionally determines (''Series_Title'',
        ''Released_Year'') (a 1-to-1 mapping). Constraint examples: hasFunctionalDependency(["Series_Title",
        "Released_Year"], "catalog_id") and hasFunctionalDependency("catalog_id",
