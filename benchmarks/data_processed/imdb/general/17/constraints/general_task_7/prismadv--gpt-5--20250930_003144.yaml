  '["IMDB_Rating","Meta_score","No_of_Votes"]':
    code: []
    assumptions:
    - text: 'IMDB_Rating and Meta_score capture the same underlying quality signal
        and should be positively correlated. This can be enforced with a Deequ constraint
        like: .hasCorrelation(''IMDB_Rating'', ''Meta_score'', lowerBound=0.3).'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      uid: 137cb1c4-8af9-465d-b843-99e7618a25bb
    - text: "Where Meta_score is not null, the scaled Meta_score (Meta_score/10.0)\
        \ should be close to IMDB_Rating because they are combined on the same 0\u2013\
        10 scale for quality_score. At least 80% of such rows should satisfy abs(IMDB_Rating\
        \ - (Meta_score/10.0)) <= 3.0. Example Deequ check: .satisfies('ABS(IMDB_Rating\
        \ - (Meta_score / 10.0)) <= 3.0', 'imdb_meta_consistency').where('Meta_score\
        \ IS NOT NULL') with an assertion that compliance >= 0.8."
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      uid: 52243d6b-4917-416d-8d14-3534d7349a46
    - text: 'A movie cannot have an IMDB_Rating without votes; i.e., IMDB_Rating being
        present implies No_of_Votes > 0. This can be captured as: .satisfies(''(IMDB_Rating
        IS NULL) OR (No_of_Votes > 0)'', ''rating_requires_votes'') with expected
        compliance = 1.0.'
      sources:
      - start_line: 39
        end_line: 47
        file: ''
      uid: ebc17ea8-434f-42d6-b5d1-86c3f195cc82
    - text: 'When Meta_score is missing, IMDB_Rating must be present because meta_scaled
        falls back to the global mean C computed from IMDB_Rating. Representable as:
        .satisfies(''Meta_score IS NOT NULL OR IMDB_Rating IS NOT NULL'', ''meta_missing_requires_imdb'')
        with expected compliance = 1.0.'
      sources:
      - start_line: 46
        end_line: 46
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: a54593e0-e3a3-4a0c-83f4-b137fca87da1
