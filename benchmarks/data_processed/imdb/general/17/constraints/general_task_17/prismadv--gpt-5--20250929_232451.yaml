    assumptions:
    - text: 'Series_Title must be complete (no nulls). Nulls would be coerced to the
        literal string ''nan'' during astype(str), leading to meaningless titles and
        potentially colliding title_ids. We could represent this as a Deequ constraint
        like: .hasCompleteness(''Series_Title'', lambda x: x == 1.0) or a Great Expectations
        rule: expect_column_values_to_not_be_null(''Series_Title'').'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      - start_line: 125
        end_line: 133
        file: ''
      uid: 81f471df-fb83-47aa-9d65-5e1045ce3e09
    - text: 'After trimming, Series_Title should be non-empty and not equal to the
        literal ''nan'' (case-insensitive). This prevents generating empty or ''nan''
        titles and IDs. We could represent this with Deequ: .satisfies("CASE WHEN
        TRIM(`Series_Title`) <> '''' AND LOWER(TRIM(`Series_Title`)) <> ''nan'' THEN
        1 ELSE 0 END", ''Non-empty Series_Title'', lambda x: x == 1.0) or Great Expectations:
        expect_column_values_to_not_match_regex(''Series_Title'', ''^\s*$'') and expect_column_values_to_not_match_regex(''Series_Title'',
        ''^\s*(?i)nan\s*$'').'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      - start_line: 125
        end_line: 127
        file: ''
      uid: a6d24038-90e7-4907-a253-afb83250b1c0
    - text: 'Series_Title should contain at least one ASCII alphanumeric character
        so that its slug (lowercased, non-alphanumerics collapsed, edge dashes trimmed)
        is non-empty and meaningful for title_id generation. We could represent this
        with Deequ: .satisfies("REGEXP_REPLACE(LOWER(TRIM(`Series_Title`)), ''[^a-z0-9]'',
        '''') <> ''''", ''Series_Title has alphanumerics'', lambda x: x == 1.0) or
        Great Expectations: expect_column_values_to_match_regex(''Series_Title'',
        ''.*[A-Za-z0-9].*'').'
      sources:
      - start_line: 28
        end_line: 32
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: 03ae7a7b-bac5-40a8-b98a-64fb189fd564
    - text: 'The normalized title (same normalization as slugify: lowercased and non-alphanumerics
        collapsed) combined with Released_Year should be unique for rows where Released_Year
        is not null; when Released_Year is null, the normalized title alone should
        be unique. This aligns with the deterministic title_id logic. We could implement
        this by first deriving a normalized_title column = lower(regexp_replace(trim(`Series_Title`),
        ''[^a-z0-9]+'', ''-'')). Then: (a) Deequ: Uniqueness([''normalized_title'',
        ''Released_Year'']) on rows where Released_Year IS NOT NULL, and Uniqueness([''normalized_title''])
        on rows where Released_Year IS NULL; or (b) Great Expectations: expect_compound_columns_to_be_unique([''normalized_title'',''Released_Year''])
        filtered to non-null year, and expect_column_values_to_be_unique(''normalized_title'')
        filtered to null year.'
      sources:
      - start_line: 57
        end_line: 57
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
