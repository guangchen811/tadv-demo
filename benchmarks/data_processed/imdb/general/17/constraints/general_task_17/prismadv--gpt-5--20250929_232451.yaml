        end_line: 64
        file: ''
      uid: 75ff94e3-7346-4ca5-b13a-1f776945b4ca
    - text: Within each record, the cast names in Star1, Star2, Star3, and Star4 must
        be pairwise distinct after trimming and case normalization (i.e., lower(trim(Star1))
        <> lower(trim(Star2)) <> lower(trim(Star3)) <> lower(trim(Star4)) across all
        pairs). This ensures the per-row cast diversity equals 1.0 and prevents score
        distortion. This can be represented as a Deequ compliance constraint expecting
        1.0 compliance, e.g., .satisfies("lower(trim(Star1)) <> lower(trim(Star2))
        AND lower(trim(Star1)) <> lower(trim(Star3)) AND lower(trim(Star1)) <> lower(trim(Star4))
        AND lower(trim(Star2)) <> lower(trim(Star3)) AND lower(trim(Star2)) <> lower(trim(Star4))
        AND lower(trim(Star3)) <> lower(trim(Star4))", "distinct_cast").
