  '["Released_Year","Series_Title"]':
    code: []
    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' uniquely identifies
        each record (no duplicates on the pair). This can be enforced as a Deequ constraint:
        .isUnique([''Series_Title'',''Released_Year'']).'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      - start_line: 66
        end_line: 68
        file: ''
      uid: 77f490b9-bf67-41a2-bcfd-ee60216fe4cc
    - text: 'title_id is a deterministic encoding of Series_Title and Released_Year.
        For rows where Released_Year is not null, title_id must equal slugify(Series_Title)
        + ''-'' + cast(Released_Year as int); where Released_Year is null, title_id
        must equal slugify(Series_Title). This can be captured with a compliance-style
        constraint (and optionally uniqueness on title_id): .compliance("(Released_Year
        IS NOT NULL AND title_id = concat(slugify(Series_Title), ''-'', cast(Released_Year
        as int))) OR (Released_Year IS NULL AND title_id = slugify(Series_Title))")
        and .isUnique([''title_id'']).'
      sources:
      - start_line: 28
        end_line: 32
        file: ''
      - start_line: 45
        end_line: 46
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      - start_line: 125
        end_line: 128
        file: ''
      - start_line: 133
        end_line: 133
        file: ''
      uid: 105f06e9-0472-4c01-b157-ebe4d3631420
    - text: 'To avoid title_id collisions when the year is missing or non-numeric,
        ''Series_Title'' must be unique among rows where ''Released_Year'' is null.
        This can be expressed as: isUnique([''Series_Title''], where=''Released_Year
        IS NULL'').'
      sources:
      - start_line: 67
        end_line: 68
        file: ''
      uid: 5321ddf8-a807-42a3-9280-42fa6696cbdd
