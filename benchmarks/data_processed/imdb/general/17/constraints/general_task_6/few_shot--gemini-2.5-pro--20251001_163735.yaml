constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['U', 'UA', 'A', 'G', 'PG', 'PG-13', 'R', 'NC-17',
        'NOT RATED', 'UNRATED'])
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .satisfies("Gross IS NULL OR Gross RLIKE '^[0-9,]+$'")
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isBetween('IMDB_Rating', 0.0, 10.0)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isPositive('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .isUnique('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isBetween('Released_Year', 1880, 2025)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .containsPattern('Runtime', '^\\d+\\smin$')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
