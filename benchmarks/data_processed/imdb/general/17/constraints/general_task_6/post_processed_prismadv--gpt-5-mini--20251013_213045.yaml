fixing_results:
  Certificate:
    bbe95807-c1ae-44bd-8f1c-2d6058003f25: '.satisfies("CASE WHEN Certificate IS NULL
      OR trim(Certificate) = '''' OR upper(trim(Certificate)) IN (''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''NOT
      RATED'',''UNRATED'') THEN 1 ELSE 0 END", "Certificate in allowed categories",
      lambda x: x >= 0.94)'
    3be5f39f-6767-478b-94ab-699801303237: '.satisfies("CASE WHEN Certificate IS NULL
      OR trim(Certificate) = '''' OR Certificate RLIKE ''^[^\\p{Cntrl}]*$'' THEN 1
      ELSE 0 END", "Certificate has no control characters", lambda x: x >= 0.90)'
  '["Certificate","Genre","Gross","IMDB_Rating","No_of_Votes","Poster_Link","Released_Year","Series_Title"]':
    06570444-a97d-4215-b968-250431b5e4cc: '.satisfies("CASE WHEN Certificate IS NULL
      OR UPPER(TRIM(COALESCE(Certificate,''''))) NOT IN (''U'', ''G'', ''PG'', ''PG-13'',
      ''UA'') THEN CASE WHEN UPPER(COALESCE(Genre,'''')) RLIKE ''FAMILY|ANIMATION|KIDS|CHILDREN''
      THEN 1 ELSE 0 END ELSE 1 END", "genre_infers_family_when_certificate_missing_or_ambiguous",
      lambda x: x >= 0.5)'
  Gross:
    11db0692-c986-4976-87e2-e10db8e23fa6: '.satisfies("CASE WHEN CAST(REPLACE(Gross,
      '','', '''') AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Gross parseable after
      comma removal", lambda x: x >= 0.80)'
    9dafc933-7424-4eef-8cb5-840c5a676d13: '.satisfies("REGEXP_LIKE(REPLACE(Gross,
      '','', ''''), ''^[0-9]+(\\.[0-9]+)?$'')", "Gross numeric format after comma
      removal", lambda x: x >= 0.8)'
  '["IMDB_Rating","No_of_Votes"]':
    112bb57c-4ff1-44a1-a159-befcb6a822f5: '.satisfies("`IMDB_Rating` IS NOT NULL AND
      `No_of_Votes` IS NOT NULL", "At least one row with both IMDB_Rating and No_of_Votes",
      lambda x: x >= 1)'
  No_of_Votes:
    59b09e8d-205e-49a1-af26-8c9e1157e74d: '.satisfies("CAST(`No_of_Votes` AS DOUBLE)
      IS NOT NULL", "Votes are numeric", lambda x: x >= 0.95)'
    16ef6e0b-7a45-42a0-9d87-4ffab2ef8e3e: '.satisfies("CASE WHEN TRY_CAST(`No_of_Votes`
      AS BIGINT) IS NOT NULL AND TRY_CAST(`No_of_Votes` AS BIGINT) >= 0 THEN 1 ELSE
      0 END", "Votes non-negative integers", lambda x: x == 1.0)'
  Runtime:
