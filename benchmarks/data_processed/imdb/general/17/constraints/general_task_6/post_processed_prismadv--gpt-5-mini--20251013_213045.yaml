      source_assumptions:
      - 950f8645-a207-4d10-a67a-af136eddb123
    assumptions:
    - text: 'There must be at least two records where both ''IMDB_Rating'' and ''No_of_Votes''
        are parseable as numeric (non-null) so that the Pearson correlation between
        ratings and votes can be computed. This can be encoded as a multi-column completeness/presence
        constraint: e.g. require >= 2 rows satisfying (IMDB_Rating IS NOT NULL AND
        No_of_Votes IS NOT NULL) or, in Deequ-style pseudocode, verify that the count
        of rows where both columns are non-null >= 2.'
      sources:
      - start_line: 25
        end_line: 33
        file: ''
      uid: 4f6bc29a-1bb6-4c52-97f6-2c5c5fccc744
    - text: 'For rows considered family-friendly (Certificate in the family_allowed
        set), the ''Runtime'' string must begin with an integer number of minutes
        (e.g. ''123 min'' or ''123'') so that runtime parsing yields a numeric minute
        value used in the runtime bonus. In constraint form: for rows where Certificate
        indicates family-allowed, Runtime should match regex ''^\d+'' and be parseable
        to a finite numeric value (runtime_min not null).'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 84
        end_line: 97
        file: ''
      uid: c2600305-218e-4d1b-aba3-101b576860f2
    - text: 'For each Poster_Link group there should be at least one row with a finite
        (non-null) CompositeScore so that sorting by EligibleFamilyFriendly then CompositeScore
        and subsequent drop_duplicates(subset=[''Poster_Link'']) reliably selects
        the intended representative. Actionable constraint: for every Poster_Link
        value, require count(rows where CompositeScore IS NOT NULL) >= 1.'
      sources:
      - start_line: 88
        end_line: 95
        file: ''
      - start_line: 75
        end_line: 81
        file: ''
      uid: 1a361602-6a80-4b45-8097-9642142e07e4
    - text: 'Rows that will be exported for the homepage ranking (rows where EligibleFamilyFriendly
        is True) must have the key output columns present and parsable: ''Released_Year'',
        ''IMDB_Rating'', ''No_of_Votes'', and ''Gross'' should be parseable to numeric
        (or at least not all-null for those rows). Actionable constraint: for rows
        satisfying EligibleFamilyFriendly==True require Released_Year, IMDB_Rating,
        No_of_Votes, Gross to be non-null/parseable (or require a minimum fraction
        of such rows, e.g. >= 0.9 completeness among eligible rows).'
      sources:
      - start_line: 97
        end_line: 105
        file: ''
      - start_line: 54
        end_line: 61
        file: ''
