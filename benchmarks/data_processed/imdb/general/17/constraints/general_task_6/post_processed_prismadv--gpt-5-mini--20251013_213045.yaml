    assumptions:
    - text: 'The ''No_of_Votes'' column exists in the input and the majority of its
        values are numeric / convertible to numbers. The code calls pd.to_numeric(...,
        errors=''coerce'') and proceeds to take logs and normalize, so many values
        coerced to NaN will reduce usable rows for scoring and correlation. Suggested
        validation (Deequ/GE style): ensure fraction of rows where to_numeric(No_of_Votes)
        is not null is high (e.g. >= 0.95). Example Deequ-like predicate: .satisfies("CASE
        WHEN TO_DOUBLE(`No_of_Votes`) IS NOT NULL THEN 1 ELSE 0 END", "Votes are numeric",
        lambda x: x >= 0.95).'
      sources:
      - start_line: 29
        end_line: 29
        file: ''
      - start_line: 30
        end_line: 30
        file: ''
      - start_line: 66
        end_line: 68
        file: ''
      uid: 839e14bd-311c-4e8a-a696-6b851eb12087
    - text: 'Values in ''No_of_Votes'' should represent non-negative integer counts
        (>= 0). The code treats votes as counts (takes log10 after clipping lower
        bound to 1), so negative or unexpected non-count values will be clipped/truncated
        and distort scoring. Suggested validation: require values are integral and
        >= 0. Example predicate: .satisfies("CASE WHEN TRY_CAST(`No_of_Votes` AS BIGINT)
        IS NOT NULL AND TO_DOUBLE(`No_of_Votes`) >= 0 THEN 1 ELSE 0 END", "Votes non-negative
        integers", lambda x: x == 1.0).'
      sources:
      - start_line: 29
        end_line: 30
        file: ''
      uid: 60f8c27d-01d2-42ad-b335-fc4802cba489
    - text: 'There should be at least a small number of rows (>= 2) where both IMDB_Rating
        and No_of_Votes are numeric/non-null so that a Pearson correlation can be
        computed meaningfully. The code concatenates ratings and votes, drops NA and
        computes .corr(). If there are fewer than two paired numeric rows, the correlation
        is not meaningful and weighting based on it will be invalid. Suggested validation:
        assert count of rows where both TO_DOUBLE(IMDB_Rating) and TO_DOUBLE(No_of_Votes)
        are not null is >= 2 (or a higher threshold, e.g. >= 0.01 * row_count). Example
        predicate: .satisfies("CASE WHEN TO_DOUBLE(`IMDB_Rating`) IS NOT NULL AND
        TO_DOUBLE(`No_of_Votes`) IS NOT NULL THEN 1 ELSE 0 END", "Pairs for correlation",
        lambda x: x >= 2).'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 71
        file: ''
      uid: 9db8c47c-e314-4c84-ae98-6ddb7bcd918a
    - text: 'The ''No_of_Votes'' values should exhibit some variation (not be identical
        for all rows). The normalization step computes min and max of log(votes) and
        divides by the range; if all values are identical the range is zero and normalization
        becomes degenerate (the code has a fallback but the feature will carry no
        signal). Suggested validation: require that max(log10(votes)) - min(log10(votes))
        > 0 or require number of distinct numeric vote values > 1. Example predicate:
        .satisfies("CASE WHEN (SELECT COUNT(DISTINCT TO_DOUBLE(`No_of_Votes`)) FROM
        dataset) > 1 THEN 1 ELSE 0 END", "Votes have variance", lambda x: x == 1).'
      sources:
      - start_line: 66
        end_line: 68
        file: ''
      uid: 78607729-9614-4f05-9c97-93d778aba4b6
  Released_Year:
    code: []
    assumptions:
    - text: 'The ''Released_Year'' values must be parseable to an integer year (year_int)
        and lie in a sensible range relative to the current year: not null, <= current_year,
        and >= a reasonable lower bound (e.g. 1880). The code computes age = current_year
        - year_int and recency_score from it, so invalid or future years will break
        or distort recency. Actionable constraints: require completeness/isNumeric
        for the parsed year, max(Released_Year) <= current_year, and min(Released_Year)
        >= 1880 (or another domain-appropriate lower bound).'
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 54
        end_line: 55
        file: ''
      - start_line: 91
