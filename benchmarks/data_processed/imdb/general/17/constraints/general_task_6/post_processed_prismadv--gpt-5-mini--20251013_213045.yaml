    assumptions:
    - text: "The 'Certificate' column may contain missing values and the code explicitly\
        \ fills missing values with an empty string before normalizing (fillna('').astype(str).str.strip().str.upper()).\
        \ Based on the observed dataset completeness (~0.898), expect roughly up to\
        \ 11% missing; a reasonable validation rule is that the non-empty (after trimming)\
        \ fraction should be at least 0.85\u20130.90. Example Deequ-style check: .satisfies(\"\
        CASE WHEN trim(Certificate) IS NOT NULL AND trim(Certificate) <> '' THEN 1\
        \ ELSE 0 END\", \"Certificate present fraction\", lambda x: x >= 0.85)"
      sources:
      - start_line: 46
        end_line: 47
        file: ''
      uid: cd98438b-a343-4340-9c3f-5572707d44e5
    - text: 'The code treats Certificate values case-insensitively and trims surrounding
        whitespace (calls .str.strip().str.upper()). Therefore input values must be
        representable as strings and any leading/trailing whitespace or case differences
        are expected to be normalized; validation should ensure values are coercible
        to text and trimming/case normalization will not fail. Example check: .satisfies("CASE
        WHEN Certificate IS NULL THEN 1 ELSE 1 END", "Coercible to string", lambda
        x: x == 1) or a Great Expectations expect_column_values_to_be_of_type with
        ''string'' after conversion.'
      sources:
      - start_line: 46
        end_line: 47
        file: ''
      uid: 96f90957-8b29-472a-9be1-3bd145179b49
    - text: 'Certificate values are expected to belong to a known set of categories
        (the code defines an allowed set: U, UA, A, G, PG, PG-13, R, NC-17, NOT RATED,
        UNRATED). For correctness the majority of non-empty entries should be one
        of these canonical uppercase forms (after trimming). Example Deequ-style check:
        .satisfies("CASE WHEN upper(trim(Certificate)) IN (''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''NOT
        RATED'',''UNRATED'') OR trim(Certificate) IS NULL OR trim(Certificate) = ''''
        THEN 1 ELSE 0 END", "Certificate in allowed categories", lambda x: x >= 0.95)'
      sources:
      - start_line: 48
        end_line: 50
        file: ''
      - start_line: 46
        end_line: 47
        file: ''
      uid: 418f91e4-01ea-4244-9284-8bfd4c957462
    - text: 'Family-friendly eligibility is determined by membership in the family_allowed
        set {''U'',''G'',''PG'',''PG-13'',''UA''}. Any input value intended to be
        considered family-friendly must match one of these canonical tokens (after
        trimming and uppercasing). Validation: fraction of rows where upper(trim(Certificate))
        is in the family set should meet business expectations for family content.
        Example Deequ-style check: .satisfies("CASE WHEN upper(trim(Certificate))
        IN (''U'',''G'',''PG'',''PG-13'',''UA'') THEN 1 ELSE 0 END", "Family-friendly
        fraction", lambda x: x >= <expected_fraction>)'
      sources:
      - start_line: 84
        end_line: 85
        file: ''
      uid: 787e4cfb-16f1-4c3e-950f-2ed9efbc65bc
    - text: 'Unusual formats (e.g., multi-valued certificates like ''PG, TV-14'',
        additional notes, embedded punctuation, or numeric codes) will not match the
        canonical sets and will be treated as ineligible by the isin check. The input
        should either use the canonical tokens or be cleaned/mapped before running
        this pipeline. Example validation: detect and report values containing commas
        or parentheses: .satisfies("CASE WHEN Certificate IS NULL OR Certificate NOT
        LIKE ''%,%'' AND Certificate NOT LIKE ''%(%'' THEN 1 ELSE 0 END", "Certificate
        simple format", lambda x: x >= 0.99)'
      sources:
      - start_line: 47
        end_line: 47
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: 9a4f95e5-66a8-4eda-a414-3d5393cf9122
    - text: 'The original Certificate column is preserved in output CSVs (it''s included
        in ranked_cols). Therefore values should be reasonably well-formed strings
        for reporting/export (no binary blobs or extremely long text). A practical
        validation is to enforce a maximum length (e.g., <= 50 chars) and absence
        of control characters. Example: .satisfies("CASE WHEN length(trim(Certificate))
        <= 50 OR trim(Certificate) = '''' THEN 1 ELSE 0 END", "Certificate max length",
        lambda x: x == 1)'
      sources:
      - start_line: 101
        end_line: 104
        file: ''
      uid: 0010d8f3-d4d6-49d0-a8b6-c50d4ec9813a
  '["Certificate","Genre"]':
    code: []
    assumptions:
    - text: 'If a record''s Genre indicates a family-oriented film (e.g., Genre contains
        keywords like ''family'', ''animation'', ''children'', ''kids''), then the
        Certificate for that record should be one of the family-friendly certificates
        (U, G, PG, PG-13, UA). This can be enforced as a conditional multi-column
        constraint (Deequ-style): for all rows where Genre rlike ''(?i)family|animation|children|kids'',
        Certificate should be contained in {''U'',''G'',''PG'',''PG-13'',''UA''}.'
