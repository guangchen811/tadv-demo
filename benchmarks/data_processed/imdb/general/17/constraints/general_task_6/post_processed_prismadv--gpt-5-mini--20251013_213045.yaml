    - text: 'For rows considered in the final family-friendly ranking (EligibleFamilyFriendly
        == True), all columns that feed CompositeScore must be parseable and present
        so the score is comparable: IMDB_Rating (numeric), No_of_Votes (numeric),
        Gross (parseable to numeric or treated consistent as zero), Released_Year
