        IS NOT NULL AND TO_DOUBLE(`No_of_Votes`) IS NOT NULL THEN 1 ELSE 0 END", "Pairs
        for correlation", lambda x: x >= 2)'' failed on data sample: org.apache.spark.sql.AnalysisException:
