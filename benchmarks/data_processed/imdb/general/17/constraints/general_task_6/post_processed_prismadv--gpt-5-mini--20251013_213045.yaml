        end_line: 52
        file: ''
      - start_line: 84
        end_line: 86
        file: ''
      uid: ed9f5620-3880-4568-b2ac-ac4bdea1711c
    - text: 'For rows whose Genre indicates family-oriented content (Genre rlike ''(?i)family|animation|children|kids''),
        the Certificate field should be present (not null/empty). Practical constraint:
        fraction of rows with (Genre matches family_keywords) AND (Certificate is
        null/empty/blank) should be close to 0 (or below a small threshold). In Deequ
        this is a completeness check on Certificate scoped to the Genre predicate.'
