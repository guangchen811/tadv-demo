        '''' THEN 1 ELSE 0 END", "Poster_Link non-empty", lambda x: x == 1.0)

        (or as a Great Expectations rule: expect_column_values_to_not_be_null(''Poster_Link'')
        and expect_column_values_to_not_match_regex(''Poster_Link'', ''^\s*$''))'
      sources:
      - start_line: 17
        end_line: 19
        file: ''
      - start_line: 93
        end_line: 96
        file: ''
      - start_line: 101
        end_line: 105
        file: ''
      uid: 2bd68d3c-7dd8-424f-aa11-c9981dffd74a
    - text: 'Poster_Link is treated as the deduplication key: the code drops duplicate
        rows using Poster_Link and keeps the highest-scoring item. This implies that
        identical Poster_Link values in the input should refer to the same logical
        item (i.e., metadata such as Series_Title and Released_Year should be consistent
        across rows sharing a Poster_Link). If multiple different movies share the
        exact same Poster_Link in the input, deduplication will drop some of them
        unexpectedly. A concrete validation rule: there should be no Poster_Link value
        that maps to more than one distinct Series_Title or more than one distinct
        Released_Year.

        One way to express this check (SQL-like) is:

        SELECT COUNT(*) FROM (SELECT Poster_Link FROM data GROUP BY Poster_Link HAVING
        COUNT(DISTINCT Series_Title) > 1 OR COUNT(DISTINCT Released_Year) > 1) AS
        t;

        and assert this COUNT == 0. In Deequ / Great Expectations you can implement
        an equivalent group-by uniqueness-consistency check.'
      sources:
      - start_line: 93
        end_line: 96
        file: ''
      - start_line: 88
        end_line: 95
        file: ''
      uid: c0762082-775c-4f7e-a268-fb7fb3918a15
    - text: 'Poster_Link is intended for URL passthrough to display; therefore a large
        majority of values should be valid HTTP(S) URLs (or otherwise valid paths
        expected by the consumer). At minimum, validate that Poster_Link values look
        like URLs (e.g. start with http:// or https://). A practical validation rule:
        at least 95% of Poster_Link values should match ''^https?://''.

        Deequ/GRE example:

        .satisfies("CASE WHEN REGEXP_LIKE(Poster_Link, ''^https?://'') THEN 1 ELSE
        0 END", "Poster_Link looks like an http(s) URL", lambda x: x >= 0.95)

        (or as Great Expectations: expect_column_values_to_match_regex(''Poster_Link'',
        ''^https?://'', mostly=0.95))'
      sources:
      - start_line: 18
        end_line: 19
        file: ''
      - start_line: 101
        end_line: 105
        file: ''
      uid: d68ddbc4-a7f7-4088-acda-4070744bc834
