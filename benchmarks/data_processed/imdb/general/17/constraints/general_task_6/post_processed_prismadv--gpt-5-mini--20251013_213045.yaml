    - suggestion: '.hasNumberOfDistinctValues("No_of_Votes", lambda x: x > 1)'
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues("No_of_Votes",
        lambda x: x > 1)'': Check.hasNumberOfDistinctValues() missing 2 required positional
        arguments: ''binningUdf'' and ''maxBins'''
      level: warning
