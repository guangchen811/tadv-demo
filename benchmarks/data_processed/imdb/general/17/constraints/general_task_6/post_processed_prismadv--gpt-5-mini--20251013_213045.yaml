      level: error
      uid: c20dccf9-c024-445e-881c-9158db16d36e
      source_assumptions:
      - c2c8917c-fdcd-49b0-ab8c-b4523541b00c
    assumptions:
    - text: 'IMDB_Rating values must be numeric or parseable to numeric for the vast
        majority of input rows (e.g., >= 95%). The code converts IMDB_Rating with
        pd.to_numeric(errors=''coerce''), so non-numeric text will become null and
        reduce the effective data used for normalization, correlation and scoring.
        Example validation: check that at least 95% of rows satisfy that IMDB_Rating
        can be parsed as a numeric value.'
      sources:
      - start_line: 25
        end_line: 26
        file: ''
      uid: 4bb06bcd-a749-44bd-8a02-8e87d034e972
    - text: "IMDB_Rating numeric values are expected to lie in the conventional 0\u2013\
        10 range (inclusive). The code normalizes ratings by dividing by 10 (rating_norm\
        \ = ratings / 10.0) and uses that normalized value in the composite score,\
        \ so input ratings outside 0\u201310 indicate malformed data or require special\
        \ handling."
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      uid: fff985e5-2a69-4dfb-902e-7be795914fca
    - text: 'There must be a sufficient number of rows where both IMDB_Rating and
        No_of_Votes are numeric (non-missing) so that a Pearson correlation can be
        computed and is finite. The code computes corr = pd.concat([ratings, votes],
        axis=1).dropna().corr().iloc[0, 1] and then uses float(corr) to set vote_weight;
        if there are fewer than two valid pairs or the correlation is NaN/infinite,
        the weighting logic will fail or behave unexpectedly. Example validation:
        require at least two rows with numeric IMDB_Rating and numeric No_of_Votes
        and that the computed correlation is finite.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 71
        file: ''
      uid: fd2fa7c7-e200-40ce-ba1f-1fc0f8317946
    - text: 'IMDB_Rating should have more than one distinct numeric value (non-constant)
        across the dataset. If all ratings are identical (zero variance), the correlation
        with votes may be undefined or meaningless and dynamic weighting based on
        correlation will be unreliable. Example validation: require COUNT(DISTINCT
        IMDB_Rating) >= 2 among numeric-parsable ratings.'
      sources:
      - start_line: 25
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 76
        file: ''
      uid: c2c8917c-fdcd-49b0-ab8c-b4523541b00c
