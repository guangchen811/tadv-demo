      - start_line: 84
        end_line: 86
        file: ''
      uid: 59bff622-24c3-44c8-be6b-06213c2f60ef
    - text: 'If a record''s Certificate is in an adult/restrictive set (for example
        ''R'', ''NC-17'', ''A''), then Genre should not indicate family-oriented categories.
        In other words, there should be no rows where Certificate is in {''R'',''NC-17'',''A''}
        AND Genre matches ''(?i)family|animation|children|kids''. This can be implemented
        as a conditional uniqueness/zero-count check: count(rows where Certificate
        in adult_set AND Genre matches family_keywords) == 0.'
      sources:
