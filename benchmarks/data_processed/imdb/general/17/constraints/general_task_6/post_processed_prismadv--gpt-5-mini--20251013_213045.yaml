      uid: 107a837a-34c3-4ce0-8983-2c54bfeb3de1
    - text: 'Rows that will be ranked/exported must have all components needed to
        compute CompositeScore: a parseable numeric Released_Year (for recency_score),
        a numeric IMDB_Rating (for rating_norm), numeric No_of_Votes (for votes_norm),
        and numeric/parsable Runtime and Gross (Gross may be missing but is treated
        as 0). In practice enforce that [''Released_Year'',''IMDB_Rating'',''No_of_Votes'',''Runtime'']
        are parseable numeric and non-null for ranked rows (or explicitly allow Gross
        to be null but treat missing as 0). Example constraints: completeness and
        isNumeric checks for that set of columns for rows where EligibleFamilyFriendly
        == true.'
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      - start_line: 28
        end_line: 36
        file: ''
      - start_line: 40
        end_line: 43
        file: ''
      - start_line: 54
        end_line: 55
        file: ''
      - start_line: 75
        end_line: 81
        file: ''
      - start_line: 88
        end_line: 99
        file: ''
      uid: c0adb5f4-86b4-4b26-9e39-20ce57e42703
    - text: 'The Pearson correlation between IMDB_Rating and No_of_Votes used to compute
        vote_weight must be computable and finite (not NaN). That requires at least
        a minimal number of rows where both IMDB_Rating and No_of_Votes are numeric/non-null.
        Additionally, because correlation influences CompositeScore, those rows should
        preferably also have Released_Year present so recency contributes to final
        scoring. Example constraint: count(rows where IMDB_Rating is numeric AND No_of_Votes
        is numeric) >= N (N>1, choose N like 10 or domain-appropriate) and computed
        correlation is finite.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 70
        end_line: 73
        file: ''
      - start_line: 75
        end_line: 81
        file: ''
      - start_line: 54
        end_line: 55
        file: ''
      uid: 3f577571-26f4-44ec-ba7e-337331349077
    - text: 'Deduplication groups are defined by identical Poster_Link and the code
        keeps the row with the highest (EligibleFamilyFriendly, CompositeScore). Because
        CompositeScore depends on Released_Year (recency) and other numeric fields,
        CompositeScore must be numeric and comparable within Poster_Link groups (no
        NaNs). Also, it is desirable that Released_Year is consistent within a Poster_Link
        group (or at least present on the chosen row). Actionable constraints: for
        each Poster_Link group require that CompositeScore is finite (not null/NaN)
        and that the number of distinct non-null Released_Year values is <= 1 (or
        flag groups with conflicting Released_Year).'
      sources:
      - start_line: 88
        end_line: 96
