constraints:
  Certificate:
    code:
    - - .hasCompleteness('Certificate', 0.8)
      - Invalid
    - - .hasDataType('Certificate', ConstrainableDataTypes.String)
      - Invalid
    - - .isContainedIn('Certificate', ["G", "PG", "PG-13", "R", "NC-17", "U", "UA",
        "A", "12", "12A", "15", "18"])
      - Invalid
    assumptions: []
  Director:
    code:
    - - .hasDataType('Director', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Director')
      - Valid
    - - .isNonEmpty('Director')
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .hasDataType('Genre', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Genre')
      - Valid
    - - .isNonEmpty('Genre')
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .hasCompleteness('Gross', 0.7)
      - Invalid
    - - .hasDataType('Gross', ConstrainableDataTypes.String)
      - Valid
    - - .isMatchingRegex('Gross', r"^(\\d{1,3}(,\\d{3})*)?$")
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .hasDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isGreaterThanOrEqualTo('IMDB_Rating', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - .hasCompleteness('Meta_score', 0.8)
      - Invalid
    - - .hasDataType('Meta_score', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isGreaterThanOrEqualTo('Meta_score', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('Meta_score', 100.0)
      - Invalid
    - - .isNonNegative('Meta_score')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .hasDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .hasDataType('Overview', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Overview')
      - Valid
    - - .isNonEmpty('Overview')
      - Invalid
    assumptions: []
  Poster_Link:
    code:
    - - .hasDataType('Poster_Link', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    - - .isMatchingRegex('Poster_Link', r"^https?://[^\\s/$.?#].[^\\s]*$")
      - Invalid
    - - .isNonEmpty('Poster_Link')
      - Invalid
    assumptions: []
  Released_Year:
    code:
    - - .hasDataType('Released_Year', ConstrainableDataTypes.String)
      - Invalid
    - - .isComplete('Released_Year')
      - Valid
    - - .isGreaterThanOrEqualTo('Released_Year', "1888")
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', "2025")
      - Invalid
    - - .isMatchingRegex('Released_Year', r"^\\d{4}$")
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasDataType('Runtime', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Runtime')
      - Valid
    - - .isMatchingRegex('Runtime', r"^\\d{2,3} min$")
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .hasDataType('Series_Title', ConstrainableDataTypes.String)
      - Invalid
    - - .isComplete('Series_Title')
      - Valid
    - - .isNonEmpty('Series_Title')
      - Invalid
    assumptions: []
  Star1:
    code:
    - - .hasDataType('Star1', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Star1')
      - Valid
    - - .isNonEmpty('Star1')
      - Invalid
    assumptions: []
  Star2:
    code:
    - - .hasDataType('Star2', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Star2')
      - Valid
    - - .isNonEmpty('Star2')
      - Invalid
    assumptions: []
  Star3:
    code:
    - - .hasDataType('Star3', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Star3')
      - Valid
    - - .isNonEmpty('Star3')
      - Invalid
    assumptions: []
  Star4:
    code:
    - - .hasDataType('Star4', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Star4')
      - Valid
    - - .isNonEmpty('Star4')
      - Invalid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
