constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ["G", "PG", "PG-13", "R", "NC-17", "U", "UA",
        "A", "12", "12A", "15", "18"])
      - Invalid
    - - .satisfies('Certificate', '(NOT (Genre LIKE "%Family%" OR Genre LIKE "%Animation%"))
        OR (Certificate IS NULL OR (Certificate != "R" AND Certificate != "NC-17"))',
        "Family/Animation genre must not have R/NC-17 certificate")
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    - - .satisfies('Genre', 'NOT EXISTS(token IN SPLIT(Genre, ","), TRIM(token) !=
        "" AND NOT TRIM(token) IN ("Action", "Adventure", "Animation", "Biography",
        "Comedy", "Crime", "Drama", "Family", "Fantasy", "Film-Noir", "History", "Horror",
        "Music", "Musical", "Mystery", "Romance", "Sci-Fi", "Sport", "Thriller", "War",
        "Western"))', "all genre tokens are valid and non-empty")
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .satisfies('Gross', 'Gross IS NULL OR CAST(REPLACE(Gross, ",", "") AS BIGINT)
        >= 0', "is non-negative after cleaning")
      - Invalid
    - - .satisfies('Gross', 'Gross IS NULL OR Gross RLIKE "^\\d{1,3}(,\\d{3})*$"',
        "is valid gross format")
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isBetween('IMDB_Rating', 0.0, 10.0)
      - Invalid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isFractional('IMDB_Rating')
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - .isBetween('Meta_score', 0.0, 100.0)
      - Invalid
    - - .isFractional('Meta_score')
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isIntegral('No_of_Votes')
      - Invalid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', r"^https?://[^\\s/$.?#].[^\\s]*$")
      - Invalid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .hasPattern('Released_Year', r"^\\d{4}$")
      - Invalid
    - - .isComplete('Released_Year')
      - Valid
    - - .isIntegral('Released_Year')
      - Invalid
    - - .satisfies('Released_Year', f'Released_Year <= {datetime.now().year + 5}',
        "year is not too far in the future")
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r"^\\d{2,3} min$")
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    - - .is_a_string('Series_Title')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isIntegral('id')
      - Invalid
    - - .isPositive('id')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
