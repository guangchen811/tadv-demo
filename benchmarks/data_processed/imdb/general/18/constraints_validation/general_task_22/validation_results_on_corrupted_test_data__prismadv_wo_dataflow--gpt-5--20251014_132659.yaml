results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies(''IMDB_Rating IS NOT NULL AND CAST(IMDB_Rating AS DOUBLE)
        IS NOT NULL'', ''IMDB_Rating present and numeric'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''IMDB_Rating >= 0 AND IMDB_Rating <= 10'', ''IMDB_Rating
        0-10 range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''IMDB_Rating = round(IMDB_Rating, 1)'', ''IMDB_Rating
        has 0.1 granularity'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''Meta_score IS NOT NULL OR IMDB_Rating IS NOT NULL'',
        ''IMDB_Rating present when Meta_score missing'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL OR `Certificate` IN
        (''U'',''G'',''PG'',''TV-PG'',''UA'',''PG-13'',''TV-14'',''R'',''TV-MA'',''NC-17'',''A'',''Not
        Rated'',''Unrated'',''Approved'',''Passed'',''U/A'',''GP'') THEN 1 ELSE 0
        END", "Certificate in allowed set", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Certificate", lambda x: x >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL OR `Certificate` =
        TRIM(`Certificate`) THEN 1 ELSE 0 END", "Certificate trimmed", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL OR NOT (`Certificate`
        RLIKE ''[,;/|]'') THEN 1 ELSE 0 END", "No delimited certificates", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.hasCompleteness(''Genre'', lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("length(trim(`Genre`)) > 0", "Non-empty Genre", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Genre'', ''^[^,]+(, [^,]+)*$'', assertion=lambda
        f: f == 1.0, name=''Genre comma-space separated'')'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Genre'', ''^(Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|History|Horror|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western|Music|Musical|Film-Noir)(,
        (Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|History|Horror|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western|Music|Musical|Film-Noir))*$'',
        assertion=lambda f: f >= 0.95, name=''Genre tokens within allowed vocabulary'')'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(trim(`Genre`)) LIKE ''%horror%'' OR
        lower(trim(`Genre`)) LIKE ''%thriller%'' THEN (CASE WHEN `Genre` rlike ''(^|,
        )Horror(, |$)'' OR `Genre` rlike ''(^|, )Thriller(, |$)'' THEN 1 ELSE 0 END)
        ELSE 1 END", "Exact Horror/Thriller tokens", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("lower(trim(`Genre`)) NOT IN (''nan'',''null'',''none'')",
        "No placeholder genre strings", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.satisfies("Gross IS NULL OR Gross IS NOT NULL", "Gross column
        exists", lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN Gross IS NULL THEN 0 ELSE CASE WHEN CAST(REGEXP_REPLACE(Gross,
        '','', '''') AS BIGINT) IS NOT NULL THEN 1 ELSE 0 END END", "At least one
        parseable Gross", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN Gross IS NULL THEN 1 ELSE CASE WHEN REGEXP_REPLACE(Gross,
        '','', '''') RLIKE ''^[0-9]+$'' THEN 1 ELSE 0 END END", "Gross is integer-like
        after removing commas", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Gross","IMDB_Rating","Meta_score","No_of_Votes"]':
    code:
    - suggestion: '.satisfies("IMDB_Rating IS NOT NULL AND No_of_Votes IS NOT NULL
        AND IMDB_Rating >= 0 AND IMDB_Rating <= 10 AND No_of_Votes >= 0", ''bayes_and_pop_inputs'',
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("IMDB_Rating IS NOT NULL AND No_of_Votes
        IS NOT NULL AND IMDB_Rating >= 0 AND IMDB_Rating <= 10 AND No_of_Votes >=
        0", ''bayes_and_pop_inputs'', lambda v: v == 1.0)'' failed on data sample:
        Value: 0.97 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("(Meta_score IS NOT NULL OR IMDB_Rating IS NOT NULL)
        AND (Meta_score IS NULL OR (Meta_score >= 0 AND Meta_score <= 100))", ''quality_inputs'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Gross IS NULL OR Gross RLIKE ''^[0-9]{1,3}(,[0-9]{3})*$''",
        ''gross_format'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Gross IS NULL OR (IMDB_Rating IS NOT NULL AND No_of_Votes
        IS NOT NULL AND No_of_Votes >= 0)", ''box_office_ready'', lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("Gross IS NULL OR (IMDB_Rating IS
        NOT NULL AND No_of_Votes IS NOT NULL AND No_of_Votes >= 0)", ''box_office_ready'',
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9775 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: '.satisfies("Meta_score IS NULL OR ABS(IMDB_Rating - (Meta_score/10))
        <= 3", ''meta_vs_imdb_consistency'', lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","No_of_Votes"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''No_of_Votes''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(IMDB_Rating AS DOUBLE) IS NOT NULL AND CAST(No_of_Votes
        AS DOUBLE) IS NOT NULL'', ''ratings_votes_numeric'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''IMDB_Rating >= 0 AND IMDB_Rating <= 10 AND No_of_Votes
        >= 0'', ''rating_votes_domain'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''IMDB_Rating >= 0 AND IMDB_Rating
        <= 10 AND No_of_Votes >= 0'', ''rating_votes_domain'', lambda x: x == 1.0)''
        failed on data sample: Value: 0.97 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''No_of_Votes > 0'', ''sixtieth_percentile_votes_positive'',
        lambda x: x >= 0.60)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: '.hasCompleteness(''Poster_Link'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(`Poster_Link`) <> ''''", ''Non-empty poster'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.satisfies("((`Meta_score` IS NULL) OR (CAST(`Meta_score` AS DOUBLE)
        >= 0 AND CAST(`Meta_score` AS DOUBLE) <= 100))", "Meta_score in [0,100]",
        lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("((`Meta_score` IS NULL) OR (CAST(`Meta_score` AS DOUBLE)
        IS NOT NULL))", "Meta_score parseable", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("((`Meta_score` IS NOT NULL) OR (`IMDB_Rating` IS NOT
        NULL))", "Meta_score nulls backed by IMDB_Rating", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.satisfies("CAST(`No_of_Votes` AS DOUBLE) IS NOT NULL", "Votes
        parsable as numeric", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`No_of_Votes` >= 0 AND `No_of_Votes` = CAST(`No_of_Votes`
        AS BIGINT)", "Non-negative integer votes", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`No_of_Votes` >= 0 AND `No_of_Votes`
        = CAST(`No_of_Votes` AS BIGINT)", "Non-negative integer votes", lambda x:
        x >= 0.99)'' failed on data sample: Value: 0.97 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.hasApproxQuantile("No_of_Votes", 0.60, lambda q: q > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`No_of_Votes` < 1e308 AND `No_of_Votes` > -1e308",
        "Finite votes", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("No_of_Votes", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.satisfies("CASE WHEN CAST(`Released_Year` AS STRING) RLIKE ''^[0-9]+$''
        THEN 1 ELSE 0 END", "Released_Year numeric-like (>=95%)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Released_Year` IS NULL THEN 1 WHEN CAST(`Released_Year`
        AS DOUBLE) IS NULL THEN 1 WHEN CAST(`Released_Year` AS DOUBLE) NOT IN (CAST(''Infinity''
        AS DOUBLE), -CAST(''Infinity'' AS DOUBLE)) THEN 1 ELSE 0 END", "Released_Year
        finite (no +/-Infinity)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Released_Year` IS NULL THEN 1 WHEN CAST(`Released_Year`
        AS DOUBLE) IS NULL THEN 1 WHEN CAST(`Released_Year` AS DOUBLE) = FLOOR(CAST(`Released_Year`
        AS DOUBLE)) THEN 1 ELSE 0 END", "Released_Year integral when present", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Released_Year` IS NULL THEN 1 WHEN CAST(`Released_Year`
        AS DOUBLE) IS NULL THEN 1 WHEN CAST(`Released_Year` AS DOUBLE) >= 1880 AND
        CAST(`Released_Year` AS DOUBLE) <= 2100 THEN 1 ELSE 0 END", "Released_Year
        within [1880, 2100] when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: '.hasCompleteness("Runtime", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(regexp_extract(`Runtime`, ''([0-9]{2,3})'', 1)
        as int) is not null", "Parsable Runtime minutes", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.hasCompleteness(''Series_Title'', lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("length(trim(`Series_Title`)) > 0", "Non-blank Series_Title",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
