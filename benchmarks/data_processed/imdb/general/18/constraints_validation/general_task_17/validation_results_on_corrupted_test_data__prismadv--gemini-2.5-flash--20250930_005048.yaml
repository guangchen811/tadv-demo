results:
  Star2:
    code:
    - suggestion: '.satisfies("TRIM(Star2) != '''' AND LOWER(TRIM(Star2)) != ''nan''",
        "Star2 is meaningful string", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Star3:
    code:
    - suggestion: .satisfies("LOWER(TRIM(Star3)) != 'nan'", "Star3 is not 'nan' string")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("TRIM(Star3) = Star3", "No leading/trailing whitespace
        in Star3")
      status: true
      reason_if_failed: ''
      level: warning
  Star4:
    code:
    - suggestion: .isComplete("Star4")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("TRIM(LOWER(`Star4`)) <> '' AND TRIM(LOWER(`Star4`))
        <> 'nan'", "Valid Star4 Name")
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating:
    code:
    - suggestion: .isComplete("IMDB_Rating")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("IMDB_Rating >= 1.0 AND IMDB_Rating <= 10.0", "IMDB Rating
        within expected range")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("IMDB_Rating >= 7.0", "High IMDB Rating percentage",
        lambda x: x >= 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', assertion=lambda x: x >= 0.85
        and x < 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Released_Year","Series_Title"]':
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("LENGTH(REGEXP_REPLACE(Genre, ''[\\s,]'', '''')) > 0",
        "has_meaningful_genre_content", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.hasCompleteness("Gross", lambda x: x < 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Gross` IS NULL OR `Gross` = '''' OR LOWER(`Gross`)
        = ''nan'' THEN 1 ELSE 0 END", "GrossNullOrEmptyOrNanString", lambda x: x >
        0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Gross", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .isComplete("No_of_Votes")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative("No_of_Votes")
      status: false
      reason_if_failed: 'Constraint ''isNonNegative("No_of_Votes")'' failed on data
        sample: Value: 0.97 does not meet the constraint requirement!'
      level: warning
  Runtime:
    code:
    - suggestion: '.satisfies("CASE WHEN `Runtime` IS NOT NULL AND regexp_extract(`Runtime`,
        ''(\\d+)'', 1) IS NOT NULL THEN 1 ELSE 0 END", "Runtime is non-null and parsable
        into an integer", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: .isComplete("Series_Title")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(LOWER(CAST(Series_Title AS STRING))) RLIKE ''.*[a-z0-9].*''
        AND TRIM(LOWER(CAST(Series_Title AS STRING))) != ''''", "Series_Title_Meaningful_Content_For_Slug",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
