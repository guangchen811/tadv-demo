results:
  Star1:
    code:
    - suggestion: .isComplete('Star1')
      status: true
      reason_if_failed: ''
      level: error
  Star2:
    code:
    - suggestion: .satisfies('(`IMDB_Rating` < 7.0) OR (`Star2` IS NOT NULL)', 'Star2
        not null when IMDB_Rating >= 7.0')
      status: true
      reason_if_failed: ''
      level: error
  Star3:
    code:
    - suggestion: .isComplete('Star3')
      status: true
      reason_if_failed: ''
      level: error
  Star4:
    code:
    - suggestion: .isComplete('Star4')
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating:
    code:
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('IMDB_Rating >= 0.0 AND IMDB_Rating <= 10.0', 'IMDB Rating
        in expected scale (0-10)')
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL OR `Certificate` IN
        (''U'', ''UA'', ''U/A'', ''A'', ''G'', ''PG'', ''PG-13'', ''R'', ''NC-17'',
        ''Not Rated'', ''TV-14'', ''TV-MA'') THEN 1 ELSE 0 END", "Valid Certificate
        Values", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Certificate'', lambda x: x >= 0.89)'
      status: true
      reason_if_failed: ''
      level: warning
  Director:
    code:
    - suggestion: .isComplete('Director')
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  '["HybridRating","IMDB_Rating","Meta_score"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''Meta_score''], lambda x:
        x > 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('IMDB_Rating IS NOT NULL OR Meta_score IS NOT NULL',
        'At least one of IMDB_Rating or Meta_score must be present')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.haveCompleteness([''IMDB_Rating''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["IMDB_Rating","MetaNormFilled"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''Meta_score''], lambda x:
        x >= 0.6)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","Meta_score"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''Meta_score''], lambda x:
        x >= 0.85)'
      status: false
      reason_if_failed: 'Constraint ''haveCompleteness([''IMDB_Rating'', ''Meta_score''],
        lambda x: x >= 0.85)'' failed on data sample: Value: 0.8225 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.haveAnyCompleteness([''IMDB_Rating'', ''Meta_score''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","Meta_score","No_of_Votes"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''Meta_score''], lambda x:
        x >= 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('Meta_score IS NOT NULL OR IMDB_Rating IS NOT NULL',
        'At least one of Meta_score or IMDB_Rating is present')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''No_of_Votes'', ''IMDB_Rating''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["IMDB_Rating","No_of_Votes","WeightedRank"]':
    code:
    - suggestion: .satisfies('`IMDB_Rating` >= 7.0', 'IMDB_Rating >= 7.0 for all output
        rows')
      status: true
      reason_if_failed: ''
      level: error
  Poster_Link:
    code:
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.containsURL(''Poster_Link'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Meta_score:
    code:
    - suggestion: '.hasCompleteness(''Meta_score'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Meta_score'', lambda x: x >= 0.85)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''Meta_score'', lambda x: x
        >= 0.85)'' failed on data sample: Value: 0.8225 does not meet the constraint
        requirement!'
      level: warning
  '["MetaNorm","MetaNormFilled","Meta_score"]':
    code:
    - suggestion: '.haveCompleteness([''Meta_score'', ''IMDB_Rating''], lambda x:
        x >= 0.85)'
      status: false
      reason_if_failed: 'Constraint ''haveCompleteness([''Meta_score'', ''IMDB_Rating''],
        lambda x: x >= 0.85)'' failed on data sample: Value: 0.8225 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: .satisfies('Meta_score IS NOT NULL OR IMDB_Rating IS NOT NULL',
        'At least one of Meta_score or IMDB_Rating must be present for MetaNormFilled')
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.satisfies(''`No_of_Votes` IS NULL OR CAST(`No_of_Votes` AS DOUBLE)
        IS NOT NULL'', ''No_of_Votes Non-numeric Handling'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''No_of_Votes'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`No_of_Votes` AS DOUBLE) IS NOT NULL'', ''No_of_Votes
        Numeric Presence'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`No_of_Votes` AS DOUBLE) >= 0 OR `No_of_Votes`
        IS NULL'', ''No_of_Votes Non-negative'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CAST(`No_of_Votes` AS DOUBLE) >=
        0 OR `No_of_Votes` IS NULL'', ''No_of_Votes Non-negative'', lambda x: x ==
        1)'' failed on data sample: Value: 0.97 does not meet the constraint requirement!'
      level: error
  Overview:
    code:
    - suggestion: .isComplete('Overview')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('Released_Year >= 1900 AND Released_Year <= year(current_date())',
        'Released_Year is a plausible year')
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  '["Released_Year","Series_Title","catalog_id"]':
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.hasCompleteness(''Series_Title'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("LENGTH(regexp_replace(lower(trim(`Series_Title`)),
        ''[^a-z0-9]+'', ''-'')) > 0", ''Non-empty slugified Series_Title'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x > 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
