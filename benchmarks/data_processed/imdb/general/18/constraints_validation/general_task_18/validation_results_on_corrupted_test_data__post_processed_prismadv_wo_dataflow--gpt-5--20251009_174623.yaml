results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies(''IMDB_Rating >= 0 AND IMDB_Rating <= 10'', ''IMDB_Rating
        within [0,10]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.satisfies("`Gross` IS NULL OR CAST(REPLACE(`Gross`, '','', '''')
        AS DOUBLE) >= 0", "Gross non-negative when present", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(REPLACE(`Gross`, '','', '''') AS DOUBLE) IS NOT
        NULL", "Enough parsable Gross", lambda x: x >= 0.50)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: ".satisfies(\"`Gross` IS NULL OR NOT(REGEXP_LIKE(`Gross`, '[$\u20AC\
        \xA3]|USD|EUR|GBP|million|mn|bn|\\\\bM\\\\b|\\\\bB\\\\b'))\", \"No currency\
        \ or unit markers in Gross\", lambda x: x >= 0.99)"
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.hasStandardDeviation(''Meta_score'', lambda s: s > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Meta_score` IS NULL OR (CAST(`Meta_score` AS DOUBLE)
        >= 0 AND CAST(`Meta_score` AS DOUBLE) <= 100)", "Meta_score within [0, 100]",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Meta_score'', lambda v: v >= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.isNonNegative(''No_of_Votes'', lambda f: f == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''isNonNegative(''No_of_Votes'', lambda f: f ==
        1.0)'' failed on data sample: Value: 0.97 does not meet the constraint requirement!'
      level: warning
    - suggestion: .isComplete('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''No_of_Votes'', lambda s: s > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Released_Year` AS INT) BETWEEN 1900 AND 2100'',
        ''Released_Year plausible year'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Runtime'', ''^\s*\d{2,3}\s*(?:min|mins|minutes)?\s*$'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(regexp_extract(`Runtime`, ''([0-9]{2,3})'', 1)
        AS INT) BETWEEN 45 AND 240", "Runtime in 45-240 min", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Series_Title:
    code:
    - suggestion: '.hasUniqueness(["Series_Title", "Released_Year"], lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("length(trim(`Series_Title`)) > 0", "Non-empty Series_Title",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
