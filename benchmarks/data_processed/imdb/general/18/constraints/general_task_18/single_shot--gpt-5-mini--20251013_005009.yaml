constraints:
  Gross:
    code:
    - - .hasCompleteness('Gross', 0.8)
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isGreaterThanOrEqualTo('IMDB_Rating', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - .hasCompleteness('Meta_score', 0.8)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', '^https?://')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isGreaterThanOrEqualTo('Released_Year', 1895)
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', 2025)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', '^[0-9]{2,3}')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title,Released_Year:
    code:
    - - .isUnique(['Series_Title','Released_Year'])
      - Invalid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
