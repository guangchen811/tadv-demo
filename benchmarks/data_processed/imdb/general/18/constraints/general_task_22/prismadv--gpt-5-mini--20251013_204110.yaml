    - text: 'The input should have high completeness for ''No_of_Votes'' (preferably
        present for all rows). The column is included in final outputs and ranking,
        so many missing values will harm downstream outputs. Validation example: .satisfies("CASE
        WHEN `No_of_Votes` IS NOT NULL THEN 1 ELSE 0 END", "No_of_Votes non-null fraction",
        lambda x: x >= 0.99) or require x == 1.0 if completeness must be 100%.'
      sources:
      - start_line: 100
        end_line: 103
