        end_line: 56
        file: ''
      - start_line: 44
        end_line: 44
        file: ''
      uid: 3a5aaf94-3803-4ea1-bcd5-acdec1c1e4fa
    - text: 'IMDB_Rating should have at least one non-null value (i.e., the column
        cannot be entirely null) so that the mean C = df[''IMDB_Rating''].mean() is
        computable. If the entire column is null, C becomes NaN and the Bayesian rating
        calculation will propagate NaNs. Validation hint: require completeness > 0
        (preferably high). Example deequ-like check: .satisfies("CASE WHEN (SELECT
        COUNT(1) FROM data WHERE `IMDB_Rating` IS NOT NULL) > 0 THEN 1 ELSE 0 END",
        "IMDB_Rating not all null", lambda x: x == 1)'
      sources:
