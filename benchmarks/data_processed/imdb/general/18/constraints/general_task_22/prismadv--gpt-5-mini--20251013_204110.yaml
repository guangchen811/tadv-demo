        the pipeline will fail. Example validation (Deequ/SQL style): .satisfies("CASE
        WHEN REGEXP_LIKE(`Runtime`, ''([0-9]{2,3})'') THEN 1 ELSE 0 END", "Runtime_contains_2_3_digits",
