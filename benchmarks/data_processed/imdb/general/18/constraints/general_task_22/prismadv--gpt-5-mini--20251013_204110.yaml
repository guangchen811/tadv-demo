      - start_line: 133
        end_line: 139
        file: ''
      uid: 73909d88-3f35-43ed-af11-0b6798fe15f8
    - text: 'Released_Year should fall within a reasonable calendar range (e.g. 1870
        through 2026) to avoid nonsensical values being emitted into outputs and indices.
        The column is used as a ''year'' in exported CSV/JSON and ranking/search artifacts,
        so extremely out-of-range values are likely invalid. Represent as a validation
        like: .satisfies("CASE WHEN `Released_Year` BETWEEN 1870 AND 2026 THEN 1 ELSE
        0 END", "Released_Year in plausible range", lambda x: x >= 0.99)'
      sources:
