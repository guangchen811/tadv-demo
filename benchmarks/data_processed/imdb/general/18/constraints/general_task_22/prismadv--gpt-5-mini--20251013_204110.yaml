  '["No_of_Votes","pop_component","qa_pop_score"]':
    code: []
    assumptions:
    - text: "The derived column 'pop_component' is mathematically log1p of 'No_of_Votes'\
        \ (pop_component == np.log1p(No_of_Votes)). Enforce that 'No_of_Votes' is\
        \ numeric, finite and >= 0 so that np.log1p is well-defined. Example constraints:\
        \ .isNonNegative('No_of_Votes'), and a functional/approximate-equality constraint\
        \ checking pop_component \u2248 log1p(No_of_Votes) (within a small tolerance)."
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 63
        end_line: 64
        file: ''
      uid: 83af0b13-1c4e-4aa3-9c0f-e701d3ba4d02
    - text: 'The Bayesian weighted rating calculation assumes that the denominator
        (v + M) is > 0 for rows used in the computation. Practically, this requires
        that not all ''No_of_Votes'' are zero (so M = 60th-quantile > 0) or at least
        for every row v + M > 0. Enforce: at least one row with No_of_Votes > 0, and/or
        no row has (No_of_Votes + M) == 0. Example constraints: assert count(where
        No_of_Votes > 0) > 0, and a dataset-level check that M (60%-quantile) > 0.'
      sources:
      - start_line: 49
        end_line: 52
        file: ''
      uid: 9c5e5830-956e-4680-be5e-3c784a1026c4
    - text: 'The final ''qa_pop_score'' must be non-null for all rows because it is
        ranked and the rank is cast to int (casting will fail on NaN). This requires
        that the inputs to qa_pop_score (quality_component, pop_component, and runtime_factor)
        produce finite normalized values. Enforce: qa_pop_score is not null/NaN for
        every record. Example constraint: .isComplete(''qa_pop_score'') or .hasNoNulls(''qa_pop_score'').'
      sources:
      - start_line: 65
        end_line: 67
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      uid: 8f8ea150-06bd-4c5b-8570-e356fe184b53
    - text: 'The runtime adjustment and final score bounds: ''runtime_factor'' is
        clipped to the range [0.80, 1.05], and minmax_norm returns values in [0, 1],
        so the pre-multiplied weighted blend (0.65*norm(quality_component) + 0.35*norm(pop_component))
        is in [0,1], and after multiplying by runtime_factor the ''qa_pop_score''
        should be in [0.0, 1.05]. Enforce numeric bounds: 0.80 <= runtime_factor <=
        1.05 and 0.0 <= qa_pop_score <= 1.05.'
      sources:
      - start_line: 59
        end_line: 60
        file: ''
      - start_line: 66
        end_line: 67
        file: ''
      uid: f761e8f2-3d74-442d-b59f-498f0c378d97
    - text: 'To ensure minmax normalization behaves as expected, both ''quality_component''
        and ''pop_component'' should contain at least one finite/non-NaN value (so
        minmax_norm does not fall back to the all-NaN or constant-series behaviors
        that produce degenerate outputs). Enforce: each of ''quality_component'' and
        ''pop_component'' has at least one finite value. Example constraint: count(where
        isFinite(quality_component)) > 0 and count(where isFinite(pop_component))
        > 0.'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 63
        end_line: 64
        file: ''
      uid: 28daf9ce-fe2b-4825-87b1-d1c9ad006822
