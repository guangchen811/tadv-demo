        (or a very high fraction). Example deequ-like check: .satisfies("CASE WHEN
        TRY_CAST(`IMDB_Rating` AS double) IS NOT NULL THEN 1 ELSE 0 END", "IMDB_Rating
        parseable as numeric", lambda x: x >= 0.99)'
      sources:
