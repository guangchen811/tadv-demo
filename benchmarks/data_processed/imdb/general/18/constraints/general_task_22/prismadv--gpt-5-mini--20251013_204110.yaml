    - text: 'The extracted runtime minutes (the 2-3 digit number from ''Runtime'')
        must be parseable as integers for every row and fall in a plausible range
        implied by the extraction (10 through 999). The code performs .astype(int)
        on the extracted group, so parsed values must exist and be within an expected
        minute range. Example validation: .satisfies("CASE WHEN CAST(REGEXP_EXTRACT(`Runtime`,
        ''([0-9]{2,3})'') AS INT) BETWEEN 10 AND 999 THEN 1 ELSE 0 END", "Runtime_minutes_in_range",
