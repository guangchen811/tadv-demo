  '["Certificate","maturity_level"]':
    code: []
    assumptions:
    - text: 'All non-null values in the ''Certificate'' column should belong to the
        finite set of keys used by maturity_map: {U, G, PG, TV-PG, UA, PG-13, TV-14,
        R, TV-MA, NC-17, A, Not Rated, Unrated, Approved, Passed, U/A, GP}. This allows
        a deterministic mapping from Certificate to maturity_level (i.e., no unexpected
        certificate labels).'
      sources:
      - start_line: 77
        end_line: 82
        file: ''
      uid: 463e337e-d76d-43f8-a803-e232152b4754
    - text: For any row where 'Certificate' is one of the maturity_map keys, 'maturity_level'
        must equal the integer value defined by that mapping. If 'Certificate' is
        null or not in the map, 'maturity_level' should be null (as produced by .map).
      sources:
      - start_line: 77
        end_line: 82
        file: ''
      uid: b3bad29f-66c2-4ea2-bd57-bfd94538ba9b
    - text: 'The ''is_kids_safe'' flag is determined jointly by ''maturity_level''
        and ''Genre'': a row should have is_kids_safe == True exactly when (maturity_level.fillna(3)
        <= 1) AND the genre token list does NOT contain either ''Horror'' or ''Thriller''.
        Conversely, if maturity_level.fillna(3) > 1 OR Genre contains ''Horror'' or
        ''Thriller'', is_kids_safe must be False. (This ties Certificate -> maturity_level
        and Genre -> genre_tokens to is_kids_safe.)'
      sources:
      - start_line: 71
        end_line: 85
        file: ''
      uid: c34e2335-169d-4f0f-8502-d323ec4abd11
    - text: 'The ''Genre'' string should split by '', '' into a list of genre tokens,
        and the boolean columns ''has_animation'' and ''has_family'' must exactly
        reflect membership: has_animation == True iff ''Animation'' is in the token
        list; has_family == True iff ''Family'' is in the token list. This assumes
        Genre is a string that consistently uses '', '' as the separator.'
      sources:
      - start_line: 71
        end_line: 73
        file: ''
      uid: 78ca18e1-42d1-46f6-9ee4-f6ff2a8d8be1
    - text: Rows with null 'Certificate' are treated as mature for the kids-safety
        check (maturity_level.fillna(3) is used), so null Certificate should result
        in maturity_level treated as 3 in the is_kids_safe computation and therefore
        generally not kids-safe unless overridden by genre logic.
      sources:
      - start_line: 82
        end_line: 85
        file: ''
      uid: 8435c620-e804-44ec-980f-5b41550760e1
