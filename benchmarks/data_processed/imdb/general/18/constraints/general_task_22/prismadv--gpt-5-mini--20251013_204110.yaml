    - text: 'If Certificate has a value that is NOT one of the maturity_map keys (i.e.,
        an unknown certificate string), the code maps it to NaN (treated as maturity_level
        3) and therefore such rows must have is_kids_safe == False. Actionable constraint:
        .where("Certificate IS NOT NULL AND NOT (Certificate IN (<list_of_mapped_keys>))").satisfies("is_kids_safe
        = false"). Also assert that Certificate values ideally should be a subset
        of the known maturity_map keys or NULL.'
      sources:
