        file: ''
      uid: f267178b-f8a3-4c49-97aa-8746b571fa4f
    - text: 'IMDB_Rating must not contain nulls (or must have a completeness near
        100%). The code multiplies IMDB_Rating by 10 and immediately casts to int
        to produce rating_tenth: (df[''IMDB_Rating''] * 10).astype(int). If any value
        is NaN, astype(int) will raise an error. Therefore the input column must be
        filled / present for all rows (or you must ensure very high completeness).
        Validation hint: expect_column_values_to_not_be_null or completeness == 1.0.
        Example deequ-like check: .satisfies("CASE WHEN `IMDB_Rating` IS NOT NULL
        THEN 1 ELSE 0 END", "IMDB_Rating not null", lambda x: x == 1)'
      sources:
      - start_line: 34
        end_line: 44
        file: ''
      uid: e0ebc952-bd5a-4927-9875-f74f738086de
    - text: 'IMDB_Rating values should be finite (no +/-Inf, NaN) and within a reasonable
        expected range (typically 0.0 through 10.0). The rating is used as a numeric
        score (mean C, bayesian blend, and mixed with Meta_score/10), so out-of-range
        or infinite values will distort computations. Validation hint: enforce finite
        numeric values and range bounds. Example deequ-like check: .satisfies("CASE
        WHEN `IMDB_Rating` IS NOT NULL AND `IMDB_Rating` >= 0 AND `IMDB_Rating` <=
        10 THEN 1 ELSE 0 END", "IMDB_Rating in [0,10] and finite", lambda x: x >=
        0.99)'
      sources:
