    - text: 'Released_Year should represent whole years (integers). Downstream code
        converts the year to int when serializing JSON/CSV (int(r.Released_Year))
        so fractional years or non-integer numeric values are not expected. Represent
        as a validation that parsed numeric values have no fractional part, e.g. .satisfies("CASE
        WHEN `Released_Year` IS NULL THEN 1 WHEN FLOOR(CAST(`Released_Year` AS DOUBLE))
        = CAST(`Released_Year` AS DOUBLE) THEN 1 ELSE 0 END", "Released_Year is integer-valued",
        lambda x: x >= 0.99)'
      sources:
