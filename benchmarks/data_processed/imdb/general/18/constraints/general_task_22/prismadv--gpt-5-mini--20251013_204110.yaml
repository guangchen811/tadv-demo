  '["Genre","genre_tokens","has_animation","has_family","is_kids_safe"]':
    code: []
    assumptions:
    - text: 'The ''Genre'' column is a comma-and-space-separated string of genre labels
        and ''genre_tokens'' is derived by splitting Genre on the delimiter '', ''.
        Concretely: for every row genre_tokens == Genre.split('', ''). This can be
        enforced e.g. with a row-level check like: satisfies("genre_tokens == split(Genre,
        '', '')", ''genre_split_consistency'').'
      sources:
      - start_line: 40
        end_line: 72
        file: ''
      uid: c3cd0565-1ec1-48f8-9739-8967157100be
    - text: 'The boolean flag ''has_animation'' must exactly reflect membership of
        the token ''Animation'' in the derived genre_tokens for each row. Concretely:
        has_animation == ( ''Animation'' in genre_tokens ). Deequ-style: satisfies("has_animation
        == array_contains(split(Genre, '', ''), ''Animation'')", ''has_animation_matches_genre'').'
      sources:
      - start_line: 71
        end_line: 73
        file: ''
      uid: 10ca5f30-3275-4c52-a789-e2604d8288c8
    - text: 'The boolean flag ''has_family'' must exactly reflect membership of the
        token ''Family'' in the derived genre_tokens for each row. Concretely: has_family
        == ( ''Family'' in genre_tokens ). Deequ-style: satisfies("has_family == array_contains(split(Genre,
        '', ''), ''Family'')", ''has_family_matches_genre'').'
      sources:
      - start_line: 71
        end_line: 73
        file: ''
      uid: f423c3cf-068c-4eff-b09d-41ac8748e8d2
    - text: 'The maturity mapping from ''Certificate'' to ''maturity_level'' must
        produce values in the expected set {0,1,2,3} or null for unmapped certificates.
        Concretely: maturity_level in {0,1,2,3} OR isNull(maturity_level). This follows
        from applying the maturity_map to Certificate and should be enforced so downstream
        comparisons are valid.'
      sources:
      - start_line: 77
        end_line: 82
        file: ''
      uid: bb936d08-2cc8-494b-a7b9-27a2620cac64
    - text: 'The computed ''is_kids_safe'' should be true exactly when (maturity_level.fillna(3)
        <= 1) AND none of the tokens in genre_tokens are ''Horror'' or ''Thriller''.
        Concretely: is_kids_safe == ((coalesce(maturity_level, 3) <= 1) AND NOT array_contains(split(Genre,
        '', ''), ''Horror'') AND NOT array_contains(split(Genre, '', ''), ''Thriller'')).
        Deequ-style: satisfies("is_kids_safe == ((coalesce(maturity_level,3) <= 1)
        AND NOT array_contains(split(Genre, '', ''),''Horror'') AND NOT array_contains(split(Genre,
        '', ''),''Thriller''))", ''kids_safety_semantics'').'
      sources:
      - start_line: 77
        end_line: 85
        file: ''
      - start_line: 71
        end_line: 73
        file: ''
      uid: a3f20f8c-46a1-40f5-b119-00176b70a809
  '["Gross","Gross_int"]':
    code: []
    assumptions:
    - text: 'Rows where ''Gross'' is null should have ''Gross_int'' null as well.
        In other words, Gross_int is only populated when Gross contains a parsable
        value. Actionable constraint example: for all rows, (Gross IS NULL) => (Gross_int
        IS NULL); equivalently, assert that no row exists with Gross IS NULL and Gross_int
        NOT NULL.'
      sources:
      - start_line: 89
        end_line: 94
        file: ''
      - start_line: 125
        end_line: 136
        file: ''
      uid: fa461adc-7696-48c8-931c-d2b0d8f550f4
    - text: 'For every row where ''Gross'' is not null, the string obtained by removing
        commas from Gross must consist only of digits (no currency symbols, letters,
        or decimal separators) and represent an integer value. Consequently, Gross_int
        must be non-null and equal to the integer value of Gross with commas removed.
        Actionable constraint examples: when(Gross IS NOT NULL) -> Gross_int IS NOT
        NULL; and when(Gross IS NOT NULL) -> Gross_int == cast(regexp_replace(Gross,
        '','', '''') AS LONG). A concrete regex check is: regexp_replace(Gross, '','',
        '''') matches ''^[0-9]+$''.'
      sources:
      - start_line: 91
        end_line: 94
        file: ''
      - start_line: 125
        end_line: 134
        file: ''
      uid: 6a91f079-667f-4a76-b866-37713aefcf82
    - text: 'Commas in the ''Gross'' column should be used only as thousand-separators
        (e.g., ''1,234,567'') and not as decimal separators or embedded in other text
        (like ''$'' or ''USD''). This ensures that replacing commas with empty string
        (str.replace('','', '''')) followed by numeric coercion yields the intended
        whole-number box-office amount stored in Gross_int. Actionable constraint
        example: Gross matches ''^[0-9]{1,3}(?:,[0-9]{3})*$'' for non-null Gross values.'
      sources:
      - start_line: 91
        end_line: 93
        file: ''
      - start_line: 89
        end_line: 94
        file: ''
      uid: 5b337f02-fbd5-450f-aa9f-e29afb104111
  '["Gross_int","box_office_score","qa_pop_score"]':
    code: []
    assumptions:
    - text: 'For any row where Gross_int is present (not null), Gross_int must be
        parseable as an integer and non-negative, and qa_pop_score must be a finite
        numeric value (convertible to float). The code uses Gross_int to compute gross_norm
        and then computes box_office_score as 0.5 * gross_norm + 0.5 * normalized(qa_pop_score),
        and later emits ''gross'' as int and ''score'' as float for box-office carousel.
        Enforce this as multi-column constraints such as: Gross_int is integer and
        >= 0 for rows where Gross_int is not null; qa_pop_score is numeric and finite
        for those same rows.'
      sources:
      - start_line: 89
        end_line: 94
        file: ''
      - start_line: 125
        end_line: 136
        file: ''
      uid: 85f2dbce-29cf-485f-9297-4a85a63f5902
    - text: 'The subset of rows with non-null Gross_int used to build the box_office
        carousel should contain meaningful variation so normalization is informative:
        at least one numeric Gross_int and at least one non-null qa_pop_score, and
        preferably more than one distinct numeric value among Gross_int or qa_pop_score.
        This prevents degenerate normalization (all-equal or all-NaN) which would
        make gross_norm or normalized qa_pop_score constant across the subset.'
      sources:
      - start_line: 125
        end_line: 129
        file: ''
      uid: 4075af26-b00c-4025-8032-e60a2f4969f6
    - text: 'qa_pop_score must be numeric and finite for all rows that are used in
        ranking outputs (rank, ranked_titles.csv, search_index.csv). Because ranking,
        sorting and casts to float/int rely on qa_pop_score and rank_score being valid
        numbers, the pair (qa_pop_score, Gross_int) should be consistent: qa_pop_score
        numeric for all rows; Gross_int either null or a valid integer when present.'
      sources:
      - start_line: 97
        end_line: 104
        file: ''
      - start_line: 99
        end_line: 101
        file: ''
      uid: fdd0c0c9-dac3-47d2-b76d-299c7348cd87
  '["IMDB_Rating","Meta_score"]':
    code: []
    assumptions:
    - text: 'For every row, at least one of ''Meta_score'' or ''IMDB_Rating'' must
        be present (non-null). The code fills meta10 from Meta_score/10 and falls
        back to IMDB_Rating (meta10_filled = meta10.where(meta10.notna(), IMDB_Rating)),
        and later uses that value in quality_component and normalization. If both
        are null the downstream quality/normalization will produce NaNs. Suggested
        actionable constraint (Deequ-style): .satisfies("NOT (isNull(Meta_score) AND
        isNull(IMDB_Rating))", "meta_or_imdb_present")'
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 09b1eacd-aa48-441f-b043-0a89075fffbb
    - text: 'The two scores must be on comparable numeric scales: ''IMDB_Rating''
        should lie in [0, 10] and ''Meta_score'' should lie in [0, 100] when present
        (so Meta_score/10 yields a 0-10 value comparable to IMDB_Rating). This is
        required because the code divides Meta_score by 10 and blends it with IMDB-based
        bayes_rating. Suggested actionable constraints: .isBetween("IMDB_Rating",
        0.0, 10.0) and .isBetween("Meta_score", 0.0, 100.0) (or equivalently validate
        that Meta_score/10 is between 0 and 10).'
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 54
        end_line: 54
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      uid: 84e85332-3dc0-4ca1-8082-9db756ad3c4c
    - text: 'IMDB_Rating must be finite and quantizable: IMDB_Rating * 10 must produce
        a finite numeric value suitable for casting to int (the code computes rating_tenth
        = (IMDB_Rating * 10).astype(int)). Additionally, since Meta_score is filled
        by IMDB_Rating when missing, IMDB_Rating being non-finite will propagate into
        quality_component and ranking. Suggested actionable constraints: .isFinite("IMDB_Rating")
        and .satisfies("IMDB_Rating >= 0 AND IMDB_Rating <= 10", "imdb_in_valid_range")
        (this ensures rating_tenth will fall in 0-100 and be safe to cast to int).'
      sources:
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      uid: 3c4220b4-9aff-40b9-86f8-187a4e307666
  '["IMDB_Rating","No_of_Votes"]':
    code: []
    assumptions:
    - text: 'For any row used in downstream ranking, IMDB_Rating must be present (non-null)
        and within the canonical bounds [0.0, 10.0], and when IMDB_Rating is present
        the corresponding No_of_Votes must be numeric and non-negative. This is required
        because rating_tenth casts (IMDB_Rating * 10) to int and bayes_rating uses
        both R (IMDB_Rating) and v (No_of_Votes). Actionable constraint examples (Deequ-like):

        - Ensure IMDB_Rating completeness: .hasCompleteness("IMDB_Rating", 1.0)

        - Ensure rating bounds for rows: .satisfies("IMDB_Rating >= 0.0 AND IMDB_Rating
        <= 10.0", "rating_in_range")

        - Ensure votes present and non-negative when rating exists: .satisfies("(IMDB_Rating
        IS NULL) OR (No_of_Votes IS NOT NULL AND No_of_Votes >= 0)", "votes_nonneg_when_rating")'
      sources:
      - start_line: 34
        end_line: 66
        file: ''
      uid: dc06eb7f-200d-4d27-bb99-836aa61e5c05
    - text: 'The Bayesian weighting denominator (v + M) must be positive to avoid
        division-by-zero or infinite values when computing bayes_rating. Concretely,
        the 60th percentile M = quantile(0.60, No_of_Votes) should be > 0, or equivalently
        ensure that for every row used in the formula No_of_Votes + M > 0. Actionable
        constraint examples:

        - Assert M > 0 (dataset-level): compute M and assert numeric(M) > 0

        - Or Deequ-style row-level check after computing M: .satisfies("No_of_Votes
        + <M> > 0", "bayes_denom_positive")'
      sources:
      - start_line: 48
        end_line: 52
        file: ''
      uid: 91c2b9c1-ea0c-4cb9-aad5-30794fde668a
    - text: 'No_of_Votes must be a non-negative numeric count across rows that contribute
        to popularity and quality blending because pop_component = log1p(No_of_Votes)
        and bayes_rating uses No_of_Votes as a vote count. Also ensure that rows where
        No_of_Votes is missing do not coincide with missing IMDB_Rating for records
        expected in outputs (i.e., if IMDB_Rating is present, prefer No_of_Votes to
        be present). Actionable constraint examples:

        - .satisfies("No_of_Votes >= 0", "votes_non_negative")

        - .satisfies("(IMDB_Rating IS NULL) OR (No_of_Votes IS NOT NULL)", "votes_present_when_rating_present")'
      sources:
      - start_line: 36
        end_line: 66
        file: ''
      uid: f6a77da0-81bc-4560-aa94-2ae4c2827534
  '["IMDB_Rating","rating_tenth"]':
    code: []
    assumptions:
    - text: 'IMDB_Rating must be coercible to a finite numeric value and effectively
        complete (no NaN after pd.to_numeric) for every record so that the expression
        (IMDB_Rating * 10).astype(int) can execute without errors and produce valid
        integer buckets in rating_tenth. Actionable checks: .isComplete([''IMDB_Rating''])
        and .isFinite([''IMDB_Rating'']).'
      sources:
      - start_line: 33
        end_line: 44
        file: ''
      uid: 2bd254ca-0d3e-4a32-8673-87cd0e8fbd93
    - text: 'The derived column rating_tenth (computed as int(IMDB_Rating * 10)) is
        expected to lie in the discrete range 0 through 100 (inclusive), i.e. IMDB_Rating
        is expected to be within 0.0 and 10.0. Actionable checks: .isContainedIn([''rating_tenth''],
        {list of ints 0..100}) or .hasMin(''rating_tenth'', 0) and .hasMax(''rating_tenth'',
        100).'
      sources:
      - start_line: 34
        end_line: 44
        file: ''
      uid: 89a0ca1c-b8f0-4dd1-b1d8-1fb33ccee25e
    - text: 'Bayesian rating computation assumes No_of_Votes and IMDB_Rating are numeric
        and non-negative, and that for typical rows v + M != 0 (i.e. the 60th-quantile
        M of No_of_Votes should not be zero for all rows), to avoid degenerate division-by-zero
        or meaningless weighting. Actionable checks: .isNonNegative([''No_of_Votes''])
        and .isFinite([''IMDB_Rating'']) and assert quantile(0.6, ''No_of_Votes'')
        > 0.'
      sources:
      - start_line: 48
        end_line: 52
        file: ''
      uid: 40908caa-0861-4521-b496-d0c0ccd1e3db
    - text: 'Meta_score (0-100 scale) is combined with IMDB_Rating (0-10 scale) via
        meta10 = Meta_score / 10 and meta10_filled = meta10.where(..., IMDB_Rating).
        Therefore Meta_score should be numeric in 0..100 when present, and IMDB_Rating
        must be on the same 0..10 scale to act as a sensible fallback. Actionable
        checks: .isContainedInRange([''Meta_score''], 0, 100) for non-null Meta_score
        and .isContainedInRange([''IMDB_Rating''], 0.0, 10.0).'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: 86feef1d-cf14-41eb-bf4b-f47740a844cc
    - text: 'qa_pop_score is a weighted blend of normalized quality_component and
        pop_component (the latter derived from No_of_Votes via log1p). Both quality_component
        and pop_component must be numeric and have at least one non-null/finite value
        (per column) so minmax_norm produces meaningful normalization (instead of
        all-NaN or constant-series degenerate cases). Actionable checks: .hasCompleteness([''quality_component''],
        >0) and .hasCompleteness([''pop_component''], >0) and .isFinite([''quality_component'',''pop_component'']).'
      sources:
      - start_line: 9
        end_line: 19
        file: ''
      - start_line: 62
        end_line: 66
        file: ''
      uid: 988dd53d-8ec8-4acc-a907-30dd66887a81
    - text: 'Runtime is parsed into Runtime_minutes and then used to compute runtime_factor
        which multiplicatively adjusts qa_pop_score. This requires Runtime strings
        to contain a 2-3 digit minute value for rows that will be used in ranking
        (i.e. Runtime must be parseable to an integer minute for rows where qa_pop_score
        is expected to be valid). Actionable checks: .hasPattern([''Runtime''], ''.*[0-9]{2,3}.*'')
        for relevant rows and .isFinite([''Runtime_minutes'']).'
      sources:
      - start_line: 57
        end_line: 60
        file: ''
      - start_line: 65
        end_line: 67
        file: ''
      uid: d4992eca-54f8-42a2-87fe-03efb30efedf
