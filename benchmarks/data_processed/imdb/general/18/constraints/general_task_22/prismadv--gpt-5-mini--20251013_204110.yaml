        rows, e.g. a Deequ-like check: .satisfies("CASE WHEN TRY_CAST(`Released_Year`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Released_Year is numeric", lambda
        x: x >= 0.99)'
      sources:
