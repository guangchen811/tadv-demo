      uid: 22dbc6ef-8bd0-47ff-bd4b-1d65d103f56f
    - text: 'Values in ''Genre'' must be strings or safely coercible to strings. The
        script does df[''Genre''] = df[''Genre''].astype(str) and then uses string
        operations (.str.split, membership tests) so input values should be text (not
        nested lists/dicts) or convertible without producing unexpected tokens like
        ''nan'' literals. Validation: .satisfies("CASE WHEN typeof(Genre) IN (''string'')
        OR Genre IS NOT NULL THEN 1 ELSE 0 END", "Genre is string-convertible") or
        a GE rule checking type/coercion.'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      - start_line: 71
        end_line: 71
        file: ''
      uid: 7b9c80ee-1be6-4500-b4d9-9fc00f8eb9fc
    - text: 'Each Genre value should be a comma+space (", ") separated list of one
        or more genre tokens (e.g., ''Action, Comedy'' or ''Animation''). The code
        uses .str.split('', '') and membership checks that expect this delimiter;
        other separators (commas without space, slashes, pipes) will not be recognized
        correctly. A validation rule: .satisfies("CASE WHEN REGEXP_LIKE(Genre, ''^[^,]+(,
        [^,]+)*$'') THEN 1 ELSE 0 END", "Genre format: comma-space separated tokens")
        or a Great Expectations regex expectation.'
      sources:
      - start_line: 71
        end_line: 71
        file: ''
      - start_line: 108
        end_line: 108
        file: ''
      uid: dc58e175-e9bc-400e-b2bd-61aab3512bfb
    - text: 'Genre tokens are expected to match canonical, case-sensitive names for
        downstream membership checks. In particular, the code checks for exact tokens
        ''Animation'', ''Family'', ''Horror'', and ''Thriller'' to compute flags and
        kids-safety. Inputs should use these exact spellings and casing (or a fixed
        normalization step should be added before running the script). A possible
        validation: .satisfies("CASE WHEN ARRAY_INTERSECT(split(Genre, '', ''), array(''Animation'',''Family'',''Horror'',''Thriller''))
        IS NOT NULL THEN 1 ELSE 0 END", "Genre uses canonical tokens") or check that
        the fraction of rows where tokens are in a maintained canonical set is >=
        threshold.'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 83
        end_line: 85
        file: ''
      uid: aaac0aee-adc8-403e-8b11-f12dc92d53ff
    - text: 'Each Genre value should not contain empty tokens (no trailing/leading
        commas or repeated delimiters). After splitting on '', '' every token should
        be non-empty. Validation example: .satisfies("CASE WHEN NOT REGEXP_LIKE(Genre,
        '',\s*$'') AND NOT REGEXP_LIKE(Genre, ''^\s*,'') AND NOT REGEXP_LIKE(Genre,
        '',\s*,'') THEN 1 ELSE 0 END", "No empty genre tokens").'
      sources:
      - start_line: 71
        end_line: 71
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      uid: 0203c0aa-82ce-4313-97c9-4f81aff74bab
    - text: 'Because Genre is included unchanged in user-facing outputs (CSV and JSON
        search/carousel fields), Genre should be a human-readable short string (not
        extremely long or binary blobs). A practical validation is to enforce a maximum
        length (e.g., length(Genre) <= 200) and reasonable cardinality. Example: expect_column_value_lengths_to_be_between(''Genre'',
        max_value=200) and expect_column_unique_value_count_to_be_between(''Genre'',
