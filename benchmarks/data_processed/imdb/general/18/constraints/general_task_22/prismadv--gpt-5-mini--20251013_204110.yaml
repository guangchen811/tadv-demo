    assumptions:
    - text: 'The ''Gross'' column may contain nulls. The code initializes Gross_int
        as NA and only populates it from non-null Gross entries; downstream box-office
        logic only runs when there is at least one parsed Gross value. As an input-data
        check you should allow missing Gross values, but if you expect a populated
        box_office carousel require at least one parseable Gross. Example Deequ-style
        rule to assert at least one non-null Gross value: .satisfies("CASE WHEN `Gross`
        IS NOT NULL THEN 1 ELSE 0 END", "Has any Gross", lambda x: x > 0).'
      sources:
      - start_line: 89
        end_line: 94
        file: ''
      - start_line: 125
        end_line: 131
        file: ''
      uid: 69c58b9b-fe03-4d3e-b0ce-f753643f4c16
    - text: 'Gross values are expected to be whole-number amounts optionally using
        comma as a thousands separator (e.g. ''1,234,567''). The code only strips
        commas (str.replace('','', '''')) and then calls pd.to_numeric(errors=''coerce'');
        it does not strip currency symbols, parentheses, or decimal points. If those
        characters are present the value will coerce to NaN and the row will be ignored
        for box-office calculations. Example validation (require digits and commas
        only): .satisfies("CASE WHEN REGEXP_LIKE(TRIM(`Gross`), ''^[0-9,]+$'') THEN
        1 ELSE 0 END", "Gross format (digits and commas only)", lambda x: x >= 0.9).'
      sources:
      - start_line: 91
        end_line: 94
        file: ''
      - start_line: 127
        end_line: 129
        file: ''
      uid: 2668f54b-7e5f-49d2-887d-8b38d825bc95
    - text: 'After removing commas, Gross should represent non-negative integer values
        (no fractional cents). The code converts parsed numbers to the nullable integer
        type Int64; fractional or negative values will either fail conversion or produce
        values that are likely invalid for box-office ranking. Example Deequ rule
        to require non-negative integers for all parsed Gross rows: .satisfies("CASE
        WHEN REGEXP_REPLACE(`Gross`, '','', '''') REGEXP ''^[0-9]+$'' THEN 1 ELSE
        0 END", "Gross is non-negative integer", lambda x: x == 1).'
      sources:
      - start_line: 93
        end_line: 94
        file: ''
      - start_line: 131
        end_line: 136
        file: ''
      uid: 357500cb-5645-4179-b620-8d01d056b630
    - text: 'A substantial fraction of non-null Gross values should successfully parse
        to numeric after comma removal; otherwise many rows will be dropped from box-office
        computations (coerced to NaN by pd.to_numeric(errors=''coerce'')). Example
        Deequ rule to assert most non-null Gross entries are parseable (adjust threshold
        to taste): .satisfies("CASE WHEN TRY_CAST(REGEXP_REPLACE(`Gross`, '','', '''')
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Parsable Gross after comma removal",
