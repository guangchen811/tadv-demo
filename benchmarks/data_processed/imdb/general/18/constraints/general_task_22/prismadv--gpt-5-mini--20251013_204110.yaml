        file: ''
      uid: 49fef742-fd85-49cf-97eb-800a53e29a0a
    - text: 'IMDB_Rating is expected to be quantized to 0.1 granularity (one decimal
        place) or otherwise meaningful when multiplied by 10 and converted to integer
        for rating_tenth. The code comment explicitly quantizes to 0.1 buckets, so
        inputs should be on that scale (or rounding should be applied upstream). Validation
        hint: check that (IMDB_Rating * 10) has integer-equivalent values for the
        vast majority of rows. Example check: .satisfies("CASE WHEN ABS(round(`IMDB_Rating`
