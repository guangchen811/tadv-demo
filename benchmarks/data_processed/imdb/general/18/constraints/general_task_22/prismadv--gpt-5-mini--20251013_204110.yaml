      uid: 58a153eb-9f69-46b4-a428-cfb81337f0f7
    - text: "Released_Year should be present for most input rows (no or very few nulls).\
        \ While the code tolerates missing Released_Year (it writes None if pd.isna),\
        \ downstream outputs and consumer expectations (search index, carousels) assume\
        \ years are available for display and filtering. Represent as a validation\
        \ that non-null fraction is high, e.g. .satisfies(\"CASE WHEN `Released_Year`\
        \ IS NOT NULL THEN 1 ELSE 0 END\", \"Non-null Released_Year\", lambda x: x\
        \ >= 0.99) \u2014 or stricter, == 1.0 if the data contract requires no missing\
        \ years."
