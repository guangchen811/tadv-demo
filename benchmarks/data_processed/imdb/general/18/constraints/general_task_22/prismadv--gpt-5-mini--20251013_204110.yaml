  '["Runtime","Runtime_minutes","qa_pop_score","runtime_factor"]':
    code: []
    assumptions:
    - text: 'Every record''s ''Runtime'' string contains a 2- or 3-digit minute value
        that is extracted into ''Runtime_minutes'' as a non-null integer. Concretely
        the code uses df[''Runtime''].astype(str) and df[''Runtime''].str.extract(r''([0-9]{2,3})'').astype(int),
        so Runtime must include a matching numeric substring for all rows. Actionable
        checks: assert ''Runtime_minutes'' is complete (no nulls) and equals the integer
        parsed from ''Runtime'' (or at minimum that regexp_extract(Runtime, ''([0-9]{2,3})'')
        is not null for all rows). Example Deequ-style constraints: .isComplete(''Runtime_minutes'')
        and .satisfies("regexp_extract(Runtime, ''([0-9]{2,3})'', 1) IS NOT NULL",
        ''runtime_has_minutes'').'
      sources:
      - start_line: 38
        end_line: 38
        file: ''
      - start_line: 57
        end_line: 57
        file: ''
      uid: 62d29030-3324-41c8-8552-ac5b1678976c
    - text: 'The derived ''Runtime_minutes'' should be a sensible integer minute value
        within an expected range (the extractor expects typical runtimes): e.g. between
        10 and 999 minutes and integral. This pairs ''Runtime'' and ''Runtime_minutes''
        semantics (extraction + numeric bounds). Actionable checks: enforce min/max
        bounds and integrality. Example Deequ-style constraints: .hasMin(''Runtime_minutes'',
        10), .hasMax(''Runtime_minutes'', 999), and .satisfies(''Runtime_minutes =
        FLOOR(Runtime_minutes)'', ''runtime_minutes_integral'').'
      sources:
      - start_line: 57
        end_line: 60
        file: ''
      uid: ab0f8586-bd16-4a7c-ae0f-ff0cf5bdda3b
    - text: '''runtime_factor'' is deterministically derived from ''Runtime_minutes''
        via the formula: runtime_factor = clip(1.0 - (abs(Runtime_minutes - 120) /
        120.0) * 0.20, lower=0.80, upper=1.05). Therefore for every row runtime_factor
        must be within [0.80, 1.05] and should equal the clipped value computed from
        Runtime_minutes. Actionable checks: assert runtime_factor between 0.8 and
        1.05 for all rows and/or assert per-row equality to the clipped formula. Example
        Deequ-style constraints: .hasMin(''runtime_factor'', 0.8), .hasMax(''runtime_factor'',
        1.05), and .satisfies("runtime_factor = LEAST(GREATEST(1 - (ABS(Runtime_minutes
        - 120) / 120.0) * 0.20, 0.8), 1.05)", ''runtime_factor_matches_minutes'').'
      sources:
      - start_line: 58
        end_line: 60
        file: ''
      - start_line: 57
        end_line: 59
        file: ''
      uid: c0845253-7213-4f9a-a36c-8abf44e0f555
    - text: '''qa_pop_score'' is computed as a weighted combination of normalized
        quality and popularity components and then scaled by ''runtime_factor'': qa_pop_score
        = (0.65 * minmax_norm(quality_component) + 0.35 * minmax_norm(pop_component))
        * runtime_factor. Therefore qa_pop_score must be numeric/finite for every
        row and lie within the expected numeric bounds (minimum >= 0.0 and maximum
        <= 1.05 because minmax_norm outputs are in [0,1] and runtime_factor is clipped
        to <=1.05). Actionable checks: assert qa_pop_score is complete/finite and
        between 0.0 and 1.05; optionally assert per-row equality to the expression
        combining minmax-normalized components and runtime_factor. Example Deequ-style
        constraints: .isComplete(''qa_pop_score''), .hasMin(''qa_pop_score'', 0.0),
        .hasMax(''qa_pop_score'', 1.05), and .satisfies("qa_pop_score BETWEEN 0.0
        AND 1.05", ''qa_pop_score_range'').'
      sources:
      - start_line: 63
        end_line: 67
        file: ''
      uid: cfd4891d-a2c1-446e-8af3-753b54cef4c6
