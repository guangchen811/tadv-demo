constraints:
  Genre:
    code:
    - - .satisfies("Genre NOT LIKE '%Horror%'", 'Genre should not be Horror')
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .compliesWith("CASE WHEN Gross IS NOT NULL THEN regexp_replace(Gross, ',',
        '') RLIKE '^[0-9]+$' ELSE TRUE END")
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isBetween('IMDB_Rating', 0.0, 10.0)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .compliesWith("Runtime RLIKE '^\\\\d+ min$'")
      - Invalid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x: x == 1.0)'
      - Valid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    assumptions: []
  Star1, Star2, Star3, Star4:
    code:
    - - .satisfies('size(array_distinct(array(Star1, Star2, Star3, Star4))) = 4',
        'all star names in a row must be unique')
      - Invalid
    assumptions: []
  Star2:
    code:
    - - .isComplete('Star2')
      - Valid
    assumptions: []
  Star3:
    code:
    - - .isComplete('Star3')
      - Valid
    assumptions: []
  Star4:
    code:
    - - .isComplete('Star4')
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
