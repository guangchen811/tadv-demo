results:
  Star1:
    code:
    - suggestion: '.satisfies("Star1 IS NOT NULL AND TRIM(Star1) <> '''' AND lower(TRIM(Star1))
        <> ''nan''", "Star1 present and not empty/''nan''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(Star2 IS NULL OR TRIM(Star1) <> TRIM(Star2)) AND (Star3
        IS NULL OR TRIM(Star1) <> TRIM(Star3)) AND (Star4 IS NULL OR TRIM(Star1) <>
        TRIM(Star4))", "Star1 distinct from Star2-4 within row (trimmed)", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Star1 IS NOT NULL AND Star2 IS NOT NULL AND Star3 IS
        NOT NULL AND Star4 IS NOT NULL AND TRIM(Star1) <> '''' AND TRIM(Star2) <>
        '''' AND TRIM(Star3) <> '''' AND TRIM(Star4) <> '''' AND lower(TRIM(Star1))
        <> ''nan'' AND lower(TRIM(Star2)) <> ''nan'' AND lower(TRIM(Star3)) <> ''nan''
        AND lower(TRIM(Star4)) <> ''nan'' AND TRIM(Star1) <> TRIM(Star2) AND TRIM(Star1)
        <> TRIM(Star3) AND TRIM(Star1) <> TRIM(Star4) AND TRIM(Star2) <> TRIM(Star3)
        AND TRIM(Star2) <> TRIM(Star4) AND TRIM(Star3) <> TRIM(Star4)", "All four
        cast fields present, non-empty/non-''nan'', and mutually unique", lambda x:
        x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Star2:
    code:
    - suggestion: '.satisfies("CASE WHEN TRIM(COALESCE(`Star2`, '''')) NOT IN ('''',
        ''nan'', ''NaN'', ''NAN'') THEN 1 ELSE 0 END", "Star2 present", lambda x:
        x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(COALESCE(`Star2`, '''')) NOT IN ('''',
        ''nan'', ''NaN'', ''NAN'') AND TRIM(`Star2`) NOT IN (TRIM(COALESCE(`Star1`,
        '''')), TRIM(COALESCE(`Star3`, '''')), TRIM(COALESCE(`Star4`, ''''))) THEN
        1 ELSE 0 END", "Star2 distinct within cast", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(COALESCE(`Star1`, '''')) NOT IN ('''',
        ''nan'', ''NaN'', ''NAN'') AND TRIM(COALESCE(`Star2`, '''')) NOT IN ('''',
        ''nan'', ''NaN'', ''NAN'') AND TRIM(COALESCE(`Star3`, '''')) NOT IN ('''',
        ''nan'', ''NaN'', ''NAN'') AND TRIM(COALESCE(`Star4`, '''')) NOT IN ('''',
        ''nan'', ''NaN'', ''NAN'') AND SIZE(ARRAY_DISTINCT(ARRAY(TRIM(`Star1`), TRIM(`Star2`),
        TRIM(`Star3`), TRIM(`Star4`)))) = 4 THEN 1 ELSE 0 END", "Valid distinct cast
        of 4", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Star3:
    code:
    - suggestion: .isComplete('Star3')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN Star3 IS NULL THEN 0 WHEN lower(trim(Star3))
        = ''nan'' OR trim(Star3) = '''' THEN 0 ELSE 1 END", "Star3 non-empty after
        trim and not literal ''nan''", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN Star3 IS NULL OR trim(Star3) = '''' OR lower(trim(Star3))
        = ''nan'' THEN 0 WHEN trim(Star3) NOT IN (trim(Star1), trim(Star2), trim(Star4))
        THEN 1 ELSE 0 END", "Star3 distinct from Star1/Star2/Star4", lambda x: x >=
        0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("lower(trim(Star3)) <> ''nan''", "No literal ''nan''
        in Star3", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN trim(Star1) <> '''' AND trim(Star2) <> ''''
        AND trim(Star3) <> '''' AND trim(Star4) <> '''' AND lower(trim(Star1)) <>
        ''nan'' AND lower(trim(Star2)) <> ''nan'' AND lower(trim(Star3)) <> ''nan''
        AND lower(trim(Star4)) <> ''nan'' AND trim(Star1) NOT IN (trim(Star2), trim(Star3),
        trim(Star4)) AND trim(Star2) NOT IN (trim(Star1), trim(Star3), trim(Star4))
        AND trim(Star3) NOT IN (trim(Star1), trim(Star2), trim(Star4)) AND trim(Star4)
        NOT IN (trim(Star1), trim(Star2), trim(Star3)) THEN 1 ELSE 0 END", "All four
        cast present and mutually distinct", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Star4:
    code:
    - suggestion: '.satisfies("CASE WHEN `Star4` IS NOT NULL AND TRIM(CAST(`Star4`
        AS STRING)) <> '''' AND LOWER(TRIM(CAST(`Star4` AS STRING))) <> ''nan'' THEN
        1 ELSE 0 END", "Valid Star4", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Star1` IS NOT NULL AND `Star2` IS NOT NULL
        AND `Star3` IS NOT NULL AND `Star4` IS NOT NULL AND TRIM(CAST(`Star1` AS STRING))
        <> '''' AND TRIM(CAST(`Star2` AS STRING)) <> '''' AND TRIM(CAST(`Star3` AS
        STRING)) <> '''' AND TRIM(CAST(`Star4` AS STRING)) <> '''' AND LOWER(TRIM(CAST(`Star1`
        AS STRING))) <> ''nan'' AND LOWER(TRIM(CAST(`Star2` AS STRING))) <> ''nan''
        AND LOWER(TRIM(CAST(`Star3` AS STRING))) <> ''nan'' AND LOWER(TRIM(CAST(`Star4`
        AS STRING))) <> ''nan'' AND size(array_distinct(array(TRIM(CAST(`Star1` AS
        STRING)), TRIM(CAST(`Star2` AS STRING)), TRIM(CAST(`Star3` AS STRING)), TRIM(CAST(`Star4`
        AS STRING))))) = 4 THEN 1 ELSE 0 END", "Distinct non-empty cast", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  IMDB_Rating:
    code:
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''IMDB_Rating'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''IMDB_Rating'', lambda x: x <= 10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`IMDB_Rating` >= 7.0", "At least one eligible title
        (IMDB_Rating >= 7.0)", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Certificate'', lambda x: x >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL THEN 1 WHEN upper(trim(`Certificate`))
        IN (''R'',''NC-17'',''A'',''18+'',''TV-MA'',''G'',''PG'',''PG-13'',''TV-G'',''TV-PG'',''TV-14'',''U'',''UA'')
        THEN 1 ELSE 0 END", "Certificate in known set", lambda x: x >= 0.95)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `Certificate` IS NULL THEN
        1 WHEN upper(trim(`Certificate`)) IN (''R'',''NC-17'',''A'',''18+'',''TV-MA'',''G'',''PG'',''PG-13'',''TV-G'',''TV-PG'',''TV-14'',''U'',''UA'')
        THEN 1 ELSE 0 END", "Certificate in known set", lambda x: x >= 0.95)'' failed
        on data sample: Value: 0.9425 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL THEN 1 WHEN upper(`Certificate`)
        = upper(trim(`Certificate`)) THEN 1 ELSE 0 END", "Certificate trimmed equals
        untrimmed (case-insensitive)", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.hasPattern("Genre", "^\\s*[^,]+(\\s*,\\s*[^,]+)*\\s*$", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("TRIM(SPLIT(CAST(Genre AS STRING), '','')[0]) IS NOT
        NULL AND LOWER(TRIM(SPLIT(CAST(Genre AS STRING), '','')[0])) NOT IN ('''',
        ''nan'', ''none'')", "Primary genre is meaningful", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(LOWER(TRIM(SPLIT(CAST(Genre AS STRING), '','')[0]))
        <> ''short'') OR (TRIM(SPLIT(CAST(Genre AS STRING), '','')[0]) = ''Short'')",
        "Canonical case for ''Short'' primary genre", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.satisfies("CASE WHEN Gross IS NULL THEN True WHEN lower(trim(Gross))
        IN ('''', ''nan'') THEN True WHEN Gross RLIKE ''^\\s*[0-9,]+\\s*$'' THEN True
        ELSE False END", "Gross format (digits/commas only or null)", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Gross RLIKE ''^\\s*[0-9,]+\\s*$''", "At least one parsable
        Gross", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.satisfies("`No_of_Votes` RLIKE ''^[[:space:]]*[0-9]+[[:space:]]*$''",
        "No_of_Votes are plain digits", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative("No_of_Votes", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.satisfies("CAST(`Released_Year` AS STRING) RLIKE ''^[0-9]+$''",
        "Released_Year numeric-like", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Released_Year` IS NULL THEN 1 WHEN CAST(`Released_Year`
        AS INT) BETWEEN 1900 AND year(current_date()) + 1 THEN 1 ELSE 0 END", "Released_Year
        plausible range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda u:
        u == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: '.hasCompleteness("Runtime", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern("Runtime", "^\\s*\\d+\\s*(min|mins|minutes)?\\s*$",
        lambda x: x >= 0.90)'
      status: false
      reason_if_failed: 'Constraint ''hasPattern("Runtime", "^\\s*\\d+\\s*(min|mins|minutes)?\\s*$",
        lambda x: x >= 0.90)'' failed on data sample: Value: 0.7 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: '.satisfies("length(regexp_extract(Runtime, ''(\\\\d+)'', 1)) >
        0", "Runtime parseable to minutes", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("length(regexp_extract(Runtime, ''(\\\\d+)'', 1)) >
        0 AND CAST(regexp_extract(Runtime, ''(\\\\d+)'', 1) AS INT) BETWEEN 60 AND
        210", "Runtime in eligibility range", lambda x: x >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("length(regexp_extract(Runtime, ''(\\\\d+)'', 1)) >
        0 AND CAST(regexp_extract(Runtime, ''(\\\\d+)'', 1) AS INT) > 0", "Runtime
        positive minutes", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Series_Title:
    code:
    - suggestion: '.satisfies("trim(`Series_Title`) <> '''' AND lower(trim(`Series_Title`))
        <> ''nan''", "Series_Title not empty or ''nan''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Series_Title'', ''.*[A-Za-z0-9].*'', lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
