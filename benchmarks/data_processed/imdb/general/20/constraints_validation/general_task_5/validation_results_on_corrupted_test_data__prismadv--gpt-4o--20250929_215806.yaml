results:
  IMDB_Rating:
    code:
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('IMDB_Rating >= 0 AND IMDB_Rating <= 10', 'IMDB_Rating
        range')
      status: true
      reason_if_failed: ''
      level: error
  Certificate:
    code:
    - suggestion: '.satisfies(''Certificate IS NOT NULL'', ''Null Certificate Values'',
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.satisfies(''`Gross` is not NULL'', ''Non-null Gross values'',
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Gross","Gross_Num"]':
    code:
    - suggestion: '.haveCompleteness([''Gross''], lambda x: x >= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Gross rlike ''^[0-9,]+$''", "Gross Numeric Format",
        lambda x: x >= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .containsURL('Poster_Link')
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.hasCompleteness(''Meta_score'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .isPositive('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: undefined
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CAST(SUBSTRING(Runtime, 1, LENGTH(Runtime)-4) AS INT)
        BETWEEN 10 AND 999', 'Runtime Range')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CAST(SUBSTRING(Runtime, 1, LENGTH(Runtime)-4)
        AS INT) BETWEEN 10 AND 999'', ''Runtime Range'')'' failed on data sample:
        Value: 0.7 does not meet the constraint requirement!'
      level: error
  '["Runtime","Runtime_Min"]':
    code:
    - suggestion: '.satisfies(''Runtime LIKE "__ min" OR Runtime LIKE "___ min"'',
        ''Runtime Pattern Match'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''Runtime LIKE "__ min" OR Runtime
        LIKE "___ min"'', ''Runtime Pattern Match'', lambda x: x == 1)'' failed on
        data sample: Value: 0.705 does not meet the constraint requirement!'
      level: error
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: error
