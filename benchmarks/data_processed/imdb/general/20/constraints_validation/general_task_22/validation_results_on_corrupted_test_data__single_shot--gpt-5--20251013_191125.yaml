      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .hasPattern('Runtime', r'^[0-9]{2,3}\s*min$')
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Runtime'', r''^[0-9]{2,3}\s*min$'')''
