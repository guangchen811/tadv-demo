results:
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', lambda v: v >= 0.85)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Certificate', ['U', 'G', 'PG', 'TV-PG', 'UA', 'PG-13',
        'TV-14', 'R', 'TV-MA', 'NC-17', 'A', 'Not Rated', 'Unrated', 'Approved', 'Passed',
        'U/A', 'GP'])
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.hasCompleteness(''Gross'', lambda v: v >= 0.75)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .hasPattern('Gross', r'^\d{1,3}(,\d{3})*$')
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Gross'', r''^\d{1,3}(,\d{3})*$'')''
        failed on data sample: Value: 0.835 does not meet the constraint requirement!'
      level: error
  IMDB_Rating:
    code:
    - suggestion: .hasDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
  Meta_score:
    code:
    - suggestion: '.hasCompleteness(''Meta_score'', lambda v: v >= 0.80)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .hasDataType('Meta_score', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Meta_score'', lambda v: v <= 100.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Meta_score'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .hasDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
  Poster_Link:
    code:
    - suggestion: .hasPattern('Poster_Link', r'^https?://')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
