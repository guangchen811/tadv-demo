    - text: 'The normalized ''IMDB_Rating'' (`rating_norm`) and normalized ''Meta_score''
        (`meta_norm`) are assumed to be on a comparable scale (e.g., [0, 1]) and represent
        similar aspects of "content quality," allowing for their weighted linear combination
        into `content_quality`.

        We could represent this assumption as Deequ constraints like this:

        .isContainedIn("rating_norm", Option(0.0), Option(1.0))

        .isContainedIn("meta_norm", Option(0.0), Option(1.0))

        .isContainedIn("content_quality", Option(0.0), Option(1.0))'
