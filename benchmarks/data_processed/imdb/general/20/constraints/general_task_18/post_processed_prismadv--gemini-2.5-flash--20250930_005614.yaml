        file: ''
      uid: 7ee7e0f0-5f2b-421d-ae5e-c01c28089f02
    - text: 'The derived features `content_quality` (from ''IMDB_Rating'' and ''Meta_score''),
        `votes_norm` (from ''No_of_Votes''), `gross_norm` (from ''Gross_USD''), and
        `runtime_adj` (from ''Runtime'') are all assumed to be on a comparable normalized
        scale (e.g., [0, 1]) and represent distinct factors contributing to a movie''s
        "popularity," allowing for their weighted summation and multiplication to
        form the `PopularityIndex`.

        We could represent this assumption as Deequ constraints like this:

        .isContainedIn("content_quality", Option(0.0), Option(1.0))

        .isContainedIn("votes_norm", Option(0.0), Option(1.0))

        .isContainedIn("gross_norm", Option(0.0), Option(1.0))

