constraints:
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasPattern(''Gross'', r''^\s*\d{1,3}(,\d{3})*\s*$'', lambda v: v >= 0.9)'
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - '.hasDataType(''No_of_Votes'', ConstrainableDataTypes.Integral, lambda v:
        v == 1.0)'
      - Valid
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasDataType(''Released_Year'', ConstrainableDataTypes.Integral, lambda v:
        v == 1.0)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - '.hasPattern(''Runtime'', r''^\s*\d+\s*min\s*$'', lambda v: v == 1.0)'
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title,Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Star1,Star2,Star3,Star4:
    code:
    - - '.satisfies(''Star1 <> Star2 AND Star1 <> Star3 AND Star1 <> Star4 AND Star2
        <> Star3 AND Star2 <> Star4 AND Star3 <> Star4'', ''cast_all_distinct'', lambda
        v: v == 1.0)'
      - Invalid
    - - '.satisfies(''Star1 IS NOT NULL AND Star2 IS NOT NULL AND Star3 IS NOT NULL
        AND Star4 IS NOT NULL'', ''cast_not_null'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
