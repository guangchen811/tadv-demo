  Gross:
    code:
    - suggestion: '.satisfies("CASE WHEN `Gross` IS NULL OR trim(`Gross`) IN ('''',
        ''nan'', ''None'', ''NaN'') OR `Gross` RLIKE ''^[0-9]{1,3}(,[0-9]{3})*$''
        THEN 1 ELSE 0 END", "GrossFormatOrMissing", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 319ea5f7-f4d1-449c-9c56-8a4096a11450
      source_assumptions:
      - fbee06f7-bc7b-4515-ab70-95932e295d50
      - 41753287-b6b6-43c8-9405-d47c0815b742
      - 953be537-5900-4e6d-a657-ad91298bdc4d
      - e391253b-4566-432b-b74e-5e9e92da6428
    - suggestion: '.satisfies("CAST(regexp_replace(`Gross`, '','', '''') AS DOUBLE)
        > 0", "SomePositiveGross", lambda x: x > 0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 9f199ee4-0ea1-4b3d-99b5-6f7a7d67d920
      source_assumptions:
      - 5ebbe33f-4f1a-4730-8ab9-87d2e8277c17
    - suggestion: '.satisfies("CASE WHEN CAST(regexp_replace(`Gross`, '','', '''')
        AS DOUBLE) IS NULL THEN 1 WHEN CAST(regexp_replace(`Gross`, '','', '''') AS
        DOUBLE) >= 0 THEN 1 ELSE 0 END", "NonNegativeGross", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: aac3fefc-181f-4cf6-998a-dda4bfd857ce
      source_assumptions:
      - d7e1b656-116c-4f9f-b2be-19f2df0dac00
    - suggestion: '.satisfies("CASE WHEN CAST(regexp_replace(`Gross`, '','', '''')
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "SomeNumericGrossFraction", lambda
        x: x >= 0.01)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: e016bc8b-169d-4636-a3df-bae6f376c61a
      source_assumptions:
      - 487bf11c-e306-448e-96e8-59b4cc11ca3c
    - suggestion: '.satisfies("CASE WHEN lower(trim(`Gross`)) IN (''nan'',''none'')
        THEN 0 ELSE 1 END", "NoLiteralMissingTokens", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: f1ad4619-ae7a-4900-80a1-755689e4f7b8
      source_assumptions:
      - 953be537-5900-4e6d-a657-ad91298bdc4d
      - fbee06f7-bc7b-4515-ab70-95932e295d50
    - suggestion: '.hasCompleteness(''Gross'', lambda x: x >= 0.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 24e41755-adb5-4ba7-ac10-9d15aa938898
      source_assumptions:
      - 52d1fd84-0203-499d-9a74-7412a56f8e0c
    assumptions:
    - text: 'The ''Gross'' column may contain explicit missing markers and blank strings
        that should be treated as null. The code normalizes '''', ''nan'', ''None'',
        and ''NaN'' to NaN before further processing. Example Deequ-like check: .satisfies("CASE
        WHEN `Gross` IN ('''', ''nan'', ''None'', ''NaN'') THEN 1 ELSE 0 END", "MappedMissingGross",
        lambda x: x >= 0). Enforce that these tokens should be considered missing
        in the input.'
      sources:
      - start_line: 25
        end_line: 33
        file: ''
      uid: fbee06f7-bc7b-4515-ab70-95932e295d50
    - text: 'Numeric Gross values are expected to be represented as strings of digits
        possibly containing thousands separators (commas). The pipeline removes commas
        ('','') then attempts numeric conversion with errors=''coerce''. Inputs containing
        currency symbols or other non-numeric characters (aside from commas and whitespace)
        will become NaN. A validation rule: ensure Gross matches regex ''^[0-9]{1,3}(,[0-9]{3})*$''
        or is one of the accepted missing markers. (Great Expectations example: expect_column_values_to_match_regex).'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      uid: 41753287-b6b6-43c8-9405-d47c0815b742
    - text: 'At least one input row must have a parseable, positive numeric Gross
        value (> 0). The code computes a median and uses it to impute missing values,
        and then computes a normalized revenue_score only if the maximum filled gross
        is finite and > 0; otherwise revenue_score falls back to 0 for all rows. Practical
        Deequ check: .hasSize(lambda n: n > 0) combined with .satisfies("CASE WHEN
        to_numeric(replace(`Gross`, '','', '''')) > 0 THEN 1 ELSE 0 END", "SomePositiveGross",
        lambda x: x >= 1).'
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      uid: 5ebbe33f-4f1a-4730-8ab9-87d2e8277c17
    - text: 'Gross numeric values should be non-negative (>= 0). Negative revenue
        entries are not meaningful for the log1p transformation and the intended revenue
        scoring; inputs with negative numbers will lead to unexpected behavior. Deequ-style
        constraint: .satisfies("CASE WHEN to_numeric(replace(`Gross`, '','', ''''))
        >= 0 THEN 1 ELSE 0 END", "NonNegativeGross", lambda x: x == 1.0).'
      sources:
      - start_line: 56
        end_line: 60
        file: ''
      uid: d7e1b656-116c-4f9f-b2be-19f2df0dac00
    - text: 'The ''Gross'' column may be absent in the CSV; the code will create it
        filled with NaN in that case. If the intent is to produce meaningful revenue_score
        values, the input should include the ''Gross'' column. Validation: fail if
        ''Gross'' column is missing when revenue-based scoring is required by downstream
        consumers.'
      sources:
      - start_line: 25
        end_line: 35
        file: ''
      uid: 52d1fd84-0203-499d-9a74-7412a56f8e0c
    - text: 'The input should contain a sufficient fraction of rows with parseable
        Gross numbers (not just one) so that median imputation is stable. While the
        code will compute a median from whatever numeric values exist, if numeric
        Gross values are extremely rare the imputation and revenue normalization will
        be unreliable. Example rule: at least 1% (or a business-specified threshold)
        of rows should have to_numeric(replace(Gross, '','', '''')) IS NOT NULL. Deequ-like:
        .satisfies("CASE WHEN to_numeric(replace(`Gross`, '','', '''')) IS NOT NULL
        THEN 1 ELSE 0 END", "SomeNumericGrossFraction", lambda x: x >= 0.01).'
      sources:
      - start_line: 56
        end_line: 58
        file: ''
      uid: 487bf11c-e306-448e-96e8-59b4cc11ca3c
    - text: 'Blank or missing Gross values should remain missing (NaN) after normalization
        rather than being encoded as strings like ''nan'' or ''None''. This ensures
        downstream numeric conversions and median calculations operate correctly.
        Validation: expect no literal strings ''nan'' or ''None'' remain in the column
        after normalization; equivalently, require that all rows where Gross is one
        of those tokens are treated as null by preprocessing.'
      sources:
      - start_line: 25
        end_line: 33
        file: ''
      - start_line: 56
        end_line: 56
        file: ''
      uid: 953be537-5900-4e6d-a657-ad91298bdc4d
    - text: 'Because the raw ''Gross'' values are carried through to outputs (the
        shortlist CSV includes the Gross column), ensure the original string format
        is preserved only for display while a separate numeric form is derivable.
        In practice: input Gross should be convertible to a numeric representation
        (after comma-stripping) so that both the displayed Gross and the computed
        revenue_score are consistent. Source validation: presence of ''Gross'' in
        output column list implies the column is expected to be present in input when
        revenue information matters.'
      sources:
      - start_line: 97
        end_line: 100
        file: ''
      - start_line: 105
        end_line: 111
        file: ''
      uid: e391253b-4566-432b-b74e-5e9e92da6428
  '["Gross","IMDB_Rating","Released_Year","Runtime","composite_score"]':
    code: []
    assumptions:
    - text: 'Rows that are shortlisted (IMDB_Rating >= 7.0 and runtime_min between
        80 and 140) require Runtime to be parseable by the regex ''^([1-9][0-9]{1,2})
        min$'' so that runtime_min = int(extracted minutes) is non-null. Concretely:
        for any row where IMDB_Rating >= 7.0, Runtime must match that pattern and
        runtime_min must be present. (This enables runtime_min.between(...) and downstream
        numeric calculations.)'
      sources:
      - start_line: 48
        end_line: 54
        file: ''
      - start_line: 78
        end_line: 83
        file: ''
      uid: b175feb0-b60f-45e9-b968-7d20e83c72c2
    - text: Released_Year must be numeric and lie in the expected range [min_year
        (1900), current_year]. This ensures recency_score = (Released_Year - min_year)
        / (current_year - min_year) is meaningful and lies in [0,1] for typical data
        used in scoring and ranking.
      sources:
      - start_line: 38
        end_line: 47
        file: ''
      uid: b492f89b-e661-4f08-be45-53fafb5cbfef
    - text: IMDB_Rating must be numeric, non-null, and on the 0-10 scale for rows
        used in scoring and filtering. The code computes rating_score = IMDB_Rating
        / 10.0 and applies quality_filter = IMDB_Rating >= 7.0, so IMDB_Rating must
        be parseable and within [0,10] (or at least non-negative and <= 10) for filtered
        rows.
      sources:
      - start_line: 21
        end_line: 23
        file: ''
      - start_line: 45
        end_line: 79
        file: ''
      uid: 2d9255d3-efe1-44e5-a653-e00ebd597cfd
    - text: The pair (Series_Title, Released_Year) must be unique in the filtered
        shortlist. The downstream score_map is built as dict(zip(key_tuples, filtered['composite_score'])),
        and downstream contracts expect one score per (title, year). Enforce uniqueness
        of that composite key in the filtered result.
      sources:
      - start_line: 92
        end_line: 95
        file: ''
      uid: 2fb06ecc-bcda-4d8b-9dcc-b78634286a5b
    - text: No_of_Votes must be present and numeric for rows in the filtered shortlist
        because sort_values(['composite_score', 'No_of_Votes'], ascending=[False,
        False]) uses No_of_Votes as a tie-breaker. For accurate deterministic ordering,
        No_of_Votes should be non-null and integer-like for shortlisted rows.
      sources:
      - start_line: 89
        end_line: 91
        file: ''
      uid: a62798ef-6893-4166-b8e9-fdb175b397a2
    - text: When Gross is present (non-null / not blank), its string should be parseable
        to a non-negative numeric value after removing commas (e.g., '1,234,567').
        The revenue_score calculation uses pd.to_numeric(..., errors='coerce'), fills
        missing with median, then applies log1p and normalization by max; thus at
        least the present Gross values should match a numeric-with-commas pattern
        so revenue_score is meaningful. Additionally, to get a non-zero revenue_score
        normalization, gross_filled.max() should be > 0 for the dataset (or code will
        fallback to zeros).
      sources:
      - start_line: 55
        end_line: 62
        file: ''
      - start_line: 59
        end_line: 61
        file: ''
      uid: a7cae928-8e90-47bb-b568-684beac7c5fa
