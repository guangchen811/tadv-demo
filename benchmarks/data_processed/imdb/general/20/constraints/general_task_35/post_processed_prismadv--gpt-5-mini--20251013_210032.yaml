        file: ''
      - start_line: 105
        end_line: 111
        file: ''
      uid: 952143ab-3fda-4fb5-b3ac-14f8ff86ffac
    - text: 'The ''Director'' column should contain textual (string) values, not nested
        structures or raw numeric-only identifiers. The code does not perform any
        casting or parsing on Director and simply outputs it, so values should be
        representable as human-readable strings. A practical check: ensure the majority
        (e.g. >= 99%) of values contain at least one alphabetic character (regex [A-Za-z]).
        Example Deequ-style constraint: .satisfies(''CASE WHEN `Director` RLIKE "[A-Za-z]"
