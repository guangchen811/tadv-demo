constraints:
  Certificate:
    code:
    - - .isComplete('Certificate')
      - Invalid
    - - .isContainedIn('Certificate', ['U', 'UA', 'A', 'G', 'PG', 'PG-13', 'R', 'NC-17',
        'Not Rated', 'Unrated', 'Passed', 'Approved'])
      - Invalid
    - - .isDataType('Certificate', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    - - .isDataType('Director', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    - - .isDataType('Genre', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .isComplete('Gross')
      - Invalid
    - - .isDataType('Gross', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - .isComplete('Meta_score')
      - Invalid
    - - .isDataType('Meta_score', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('Meta_score')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .isComplete('Overview')
      - Valid
    - - .isDataType('Overview', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Poster_Link:
    code:
    - - .isComplete('Poster_Link')
      - Valid
    - - .isDataType('Poster_Link', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isDataType('Released_Year', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', 2023)
      - Invalid
    - - .isNonNegative('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^\d+\s*min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    - - .isDataType('Runtime', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    - - .isDataType('Series_Title', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    - - .isDataType('Star1', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Star2:
    code:
    - - .isComplete('Star2')
      - Valid
    - - .isDataType('Star2', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Star3:
    code:
    - - .isComplete('Star3')
      - Valid
    - - .isDataType('Star3', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Star4:
    code:
    - - .isComplete('Star4')
      - Valid
    - - .isDataType('Star4', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
