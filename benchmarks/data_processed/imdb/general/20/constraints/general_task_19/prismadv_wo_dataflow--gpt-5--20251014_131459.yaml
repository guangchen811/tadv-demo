    - text: 'For rows that pass the eligibility gate (Certificate <> ''NC-17''), IMDB_Rating
        should be bounded in [0, 10] to maintain the intended rating_score scaling.
        This can be represented as a conditional range check: forAllRowsWhere("Certificate
        <> ''NC-17''", hasRange("IMDB_Rating", 0.0, 10.0, includeLowerBound=true,
        includeUpperBound=true)).'
