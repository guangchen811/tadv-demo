    - text: 'Certificate functionally determines suitability after normalizing nulls
        to ''Not Rated'' (i.e., for any two rows with the same normalized Certificate
        value, suitability must be identical per the cert_weights mapping). This can
        be validated as: groupBy(''Certificate_normalized'').agg(countDistinct(''suitability''))
        == 1.'
