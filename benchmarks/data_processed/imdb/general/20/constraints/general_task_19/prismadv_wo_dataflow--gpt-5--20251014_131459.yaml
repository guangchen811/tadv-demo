    assumptions:
    - text: 'The ''No_of_Votes'' column must exist in the input data so it can be
        transformed and included in the output. Validation example: Great Expectations
        expect_column_to_exist(''No_of_Votes'').'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 40
        end_line: 41
        file: ''
      - start_line: 102
        end_line: 107
        file: ''
      uid: b9226053-4862-43ce-8de2-33022f403287
    - text: 'The ''No_of_Votes'' values should be numeric and integer-like (digits
        only; no thousand separators or decimals). At least 95% of rows should match
        the pattern ^[0-9]+$. Example Deequ: .hasPattern(''No_of_Votes'', ''^[0-9]+$'',
        lambda p: p >= 0.95).'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      uid: 728e01aa-8ddc-4340-9ae7-1018ab237f15
    - text: '''No_of_Votes'' should be a non-negative count (minimum >= 0). Example
        Deequ: .hasMin(''No_of_Votes'', lambda m: m >= 0).'
      sources:
      - start_line: 40
        end_line: 40
        file: ''
      uid: b8a647f4-3f37-4e4a-b582-971e9fa0f55e
    - text: 'To keep the popularity score meaningful (calibrated with 1k votes ->
        0 and 1M votes -> 1), at least 10% of records should have ''No_of_Votes''
        >= 1000. Example Deequ: .satisfies(''CASE WHEN No_of_Votes >= 1000 THEN 1
        ELSE 0 END'', ''votes_ge_1k'', lambda x: x >= 0.10).'
      sources:
      - start_line: 39
        end_line: 42
        file: ''
      uid: aa165776-4002-46c3-883c-6ab7ead20365
    - text: 'Extremely large vote counts should be rare to stay within the intended
        calibration; at least 99% of rows should have ''No_of_Votes'' <= 10000000.
        Example Deequ: .satisfies(''CASE WHEN No_of_Votes <= 10000000 THEN 1 ELSE
        0 END'', ''votes_le_10m'', lambda x: x >= 0.99).'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      uid: 6453cf64-60ab-4f2b-a272-b9fb1ba4877f
    - text: 'Null or non-numeric ''No_of_Votes'' (which would be coerced to 0) should
        be rare because they depress popularity; require at least 95% completeness
        and at most 10% zeros. Example Deequ: .hasCompleteness(''No_of_Votes'', lambda
        c: c >= 0.95) and .satisfies(''CASE WHEN No_of_Votes = 0 THEN 1 ELSE 0 END'',
        ''zeros_share'', lambda x: x <= 0.10).'
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 40
        end_line: 41
        file: ''
      uid: 5e340893-7c4f-4e7b-9527-4d1eb649dcdf
