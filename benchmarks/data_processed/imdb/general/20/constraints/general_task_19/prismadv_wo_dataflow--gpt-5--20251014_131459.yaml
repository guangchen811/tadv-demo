  ? '["Certificate","Director","Genre","Gross","IMDB_Rating","Meta_score","No_of_Votes","Poster_Link","Released_Year","Runtime","Series_Title","Star1","Star2","Star3","Star4"]'
  : code: []
    assumptions:
    - text: 'The pair of columns [''Series_Title'',''Released_Year''] is a composite
        primary key that must be unique and non-null across all records. This can
        be enforced as Deequ constraints such as: .isComplete(''Series_Title''), .isComplete(''Released_Year''),
        and .isUnique([''Series_Title'',''Released_Year'']).'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      uid: fb64bdf9-8ad1-4e39-be75-1f06d2bcd237
    - text: 'All descriptive attributes for a movie are functionally determined by
        the composite key [''Series_Title'',''Released_Year'']. In other words, for
        a given (Series_Title, Released_Year) there must be exactly one value of each
        of: Poster_Link, Certificate, Runtime, Genre, IMDB_Rating, No_of_Votes, Meta_score,
        Director, Star1, Star2, Star3, Star4, Gross. This can be represented as a
        set of Deequ functional dependency constraints: .hasFunctionalDependency([''Series_Title'',''Released_Year''],
        ''Poster_Link'') and similarly for each dependent column listed.'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 101
        end_line: 105
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: d3b71f2a-940a-4d16-9310-1d595f5e128c
    - text: 'Within each record, the four star columns must refer to distinct people
        (no duplicates across Star1, Star2, Star3, Star4). This can be enforced with
        a Deequ row-level predicate, for example: .satisfies("Star1 <> Star2 AND Star1
        <> Star3 AND Star1 <> Star4 AND Star2 <> Star3 AND Star2 <> Star4 AND Star3
        <> Star4", ''stars_are_distinct'').'
      sources:
      - start_line: 101
        end_line: 105
        file: ''
      uid: e440873b-331a-42b3-961b-9af954344609
    - text: 'Records included in the licensing output must jointly satisfy the eligibility
        and quality gates derived from two columns: Certificate and IMDB_Rating. Specifically,
        only rows with Certificate <> ''NC-17'' (i.e., suitability > 0) and IMDB_Rating
        >= 6.5 are allowed in the final dataset. This can be expressed on the final
        dataset as a Deequ constraint: .satisfies("(Certificate <> ''NC-17'') AND
        (IMDB_Rating >= 6.5)", ''eligibility_and_quality_gate'').'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 96
        end_line: 99
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: 33999d37-23e1-4b80-a259-7bba90c94b2f
  '["Certificate","Genre","IMDB_Rating","No_of_Votes","Released_Year","Runtime"]':
    code: []
    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' must be unique
        and non-null across all records (used as a composite key). We could represent
        this as Deequ constraints like: .isUnique(["Series_Title", "Released_Year"])
        together with .hasCompleteness("Series_Title", 1.0) and .hasCompleteness("Released_Year",
        1.0).'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: b36ec8c2-36af-49fa-b844-df2893edc199
    - text: 'Only records that satisfy both conditions simultaneously should appear
        in the final output: (IMDB_Rating >= 6.5) AND (Certificate is null or Certificate
        <> ''NC-17''). This can be enforced as a compliance constraint on the final
        dataset, e.g., .satisfies("((Certificate IS NULL) OR Certificate <> ''NC-17'')
        AND IMDB_Rating >= 6.5", fraction = 1.0).'
      sources:
      - start_line: 74
        end_line: 76
        file: ''
      - start_line: 97
        end_line: 99
        file: ''
      uid: 193fbf2e-4ff5-4f78-8633-d74141e49a77
    - text: 'Calibration expectation linking rating and votes: High-rated titles should
        have substantial vote counts. For example, enforce that IMDB_Rating >= 8.5
        implies No_of_Votes >= 1000 (1k). This can be encoded as a conditional multi-column
        compliance: .satisfies("IMDB_Rating < 8.5 OR No_of_Votes >= 1000", fraction
        >= 0.95).'
      sources:
      - start_line: 39
        end_line: 41
        file: ''
      uid: c00c50b4-186e-428c-a39e-91041d03e19e
    - text: 'Joint domain validity: Each token in ''Genre'' (comma-separated) must
        belong to the allowed genre set, and ''Certificate'' (if present) must be
        one of the allowed certificates (otherwise null is acceptable and treated
        as ''Not Rated''). This ensures genre_pref and suitability are well-defined.
        This can be captured with combined checks like: forall genre tokens in allowed_genres
        AND (Certificate IS NULL OR Certificate IN allowed_certificates).'
      sources:
      - start_line: 26
        end_line: 33
        file: ''
      - start_line: 58
        end_line: 66
        file: ''
      - start_line: 67
        end_line: 73
        file: ''
      uid: be3fc993-7e2b-4e0b-acae-3b64037904fe
    - text: 'Co-presence for scoring-critical fields per key: For every (Series_Title,
        Released_Year), both IMDB_Rating and No_of_Votes must be present and numeric
        so that rating_score and pop_score can be computed deterministically. This
        can be enforced via: .hasCompleteness("IMDB_Rating", 1.0), .hasCompleteness("No_of_Votes",
        1.0), and type checks (isContainedInRange / isNonNegative) applied jointly
        to these columns.'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 37
        end_line: 41
        file: ''
      uid: fc3931cb-fc2e-430c-9f8e-744827595b53
    - text: 'Conditional parseability for rows expected to be output: Among records
        that are eligible for final recommendations (IMDB_Rating >= 6.5 and Certificate
        <> ''NC-17'' or null), ''Runtime'' must contain a parseable integer number
        of minutes and ''Genre'' must be non-empty to ensure engagement and genre_pref
        are computable. Example conditional checks: .where("IMDB_Rating >= 6.5 AND
        (Certificate IS NULL OR Certificate <> ''NC-17'')").satisfies("regexp_extract(Runtime,
        ''\\d+'', 0) <> ''''", fraction = 1.0) and .where(same_condition).hasCompleteness("Genre",
        1.0).'
      sources:
      - start_line: 45
        end_line: 49
        file: ''
      - start_line: 65
        end_line: 66
        file: ''
      - start_line: 74
        end_line: 99
        file: ''
      uid: aed308da-3a8a-4450-be2d-637ccc90cd79
  '["Certificate","IMDB_Rating"]':
    code: []
    assumptions:
    - text: 'The pair (Series_Title, Released_Year) must uniquely identify each record
        (no duplicate title-year combinations). We could represent this as a deequ
        constraint: .isUnique(["Series_Title", "Released_Year"]).'
      sources:
