      - start_line: 102
        end_line: 102
        file: ''
      uid: 4d402e9b-3def-463a-b2b6-70c66eb92fd7
    - text: 'Every ''Runtime'' value should contain a numeric minute component (at
        least one digit) so that regex extraction and int casting succeed. Example
        validations: Deequ -> .satisfies("regexp_like(Runtime, ''.*[0-9]+.*'')", "Runtime
