        end_line: 46
        file: ''
      uid: 7ded0e3f-fce8-4d94-aa02-7db3cbc49840
    - text: 'The ''Runtime'' values should represent total minutes for a single title,
        preferably formatted as either ''NNN min'' or just ''NNN'' (optional whitespace),
        and not complex multi-part time strings (e.g., ''1 h 40 min'', ''10 episodes
        x 45 min''). Suggested validation: at least 95% of values match the pattern
        ''^\s*\d+\s*(min|mins|minutes)?\s*$''. Example validations: Deequ -> .satisfies("regexp_like(Runtime,
        ''^\\s*\\d+\\s*(min|mins|minutes)?\\s*$'')", "Runtime simple minutes format",
        lambda x: x >= 0.95); Great Expectations -> expect_column_values_to_match_regex("^\\s*\\d+\\s*(min|mins|minutes)?\\s*$",
        mostly=0.95).'
