        end_line: 71
        file: ''
      uid: ef334852-bd31-4cfd-b4d3-1be7bc83197b
    - text: 'At least 90% of non-null, trimmed ''Certificate'' values should be in
        the expected set {''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not
