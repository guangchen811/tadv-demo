    - text: 'Only records with Certificate values that map to a positive suitability
        (> 0) and with IMDB_Rating >= 6.5 should appear in the output. Concretely,
        after normalizing null Certificate to ''Not Rated'', rows with Certificate
        = ''NC-17'' must be excluded from the final output, and all rows in the final
        output must satisfy IMDB_Rating >= 6.5. This can be captured as a multi-column
        check on the final dataset: forAllRows("(Certificate <> ''NC-17'') AND (IMDB_Rating
