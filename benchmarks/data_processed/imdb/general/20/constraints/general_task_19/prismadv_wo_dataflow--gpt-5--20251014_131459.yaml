      - start_line: 46
        end_line: 49
        file: ''
      uid: 3b094e7d-ce47-4916-bce2-60be6d76a488
    - text: "Extracted runtime minutes should be within a plausible feature range\
        \ for films (e.g., between 45 and 240 minutes) for at least 95% of rows to\
        \ keep the downstream engagement model calibrated around 110\xB150. Example\
        \ validations: Deequ -> .satisfies(\"cast(regexp_extract(Runtime, '([0-9]+)',\
        \ 1) as int) BETWEEN 45 AND 240\", \"Runtime minutes plausible\", lambda x:\
        \ x >= 0.95); Great Expectations -> expect_column_values_to_be_between on\
        \ the extracted integer minutes (min_value=45, max_value=240, mostly=0.95)."
