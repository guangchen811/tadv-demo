constraints:
  Certificate:
    code:
    - - .satisfies("Certificate IS NULL OR Certificate IN ('G','PG','PG-13','R','NC-17','U','UA','A','12','12A','15','18')",
        "CertificateAllowedDomain")
      - Invalid
    - - .satisfies("Certificate IS NULL OR NOT ((array_contains(split(Genre, ',\\s*'),
        'Family') OR array_contains(split(Genre, ',\\s*'), 'Animation')) AND Certificate
        IN ('R','NC-17'))", "NoAdultCertForFamilyAnimation")
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .satisfies("size(array_except(transform(split(Genre, ',\\s*'), x -> trim(x)),
        array('Action','Adventure','Animation','Biography','Comedy','Crime','Drama','Family','Fantasy','Film-Noir','History','Horror','Music','Musical','Mystery','Romance','Sci-Fi','Sport','Thriller','War','Western')))
        = 0", "GenreTokensAllowed")
      - Valid
    - - .satisfies("size(split(trim(Genre), ',\\s*')) >= 1", "GenreNonEmpty")
      - Valid
    assumptions: []
  Gross:
    code:
    - - .satisfies("Gross IS NULL OR Gross rlike '^[0-9]{1,3}(,[0-9]{3})*$'", "GrossUSNumberFormat")
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isContainedInRange('IMDB_Rating', 0.0, 10.0)
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda v: v >= 0.80)'
      - Valid
    - - .satisfies("Meta_score IS NULL OR (Meta_score >= 0 AND Meta_score <= 100)",
        "MetaScoreBounds")
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .satisfies("No_of_Votes >= 1", "VotesAtLeastOne")
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', r'^https?://.+$', 'PosterLinkURL')
      - Invalid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .hasPattern('Released_Year', r'^\d{4}$', 'ReleasedYearFourDigits')
      - Invalid
    - - .isComplete('Released_Year')
      - Valid
    - - .satisfies("cast(Released_Year as int) >= 1888 AND cast(Released_Year as int)
        <= 2025", "ReleasedYearRange")
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^\d{2,3} min$', 'RuntimePattern')
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    - - .satisfies("cast(regexp_extract(Runtime, '\\d+', 0) as int) >= 40 AND cast(regexp_extract(Runtime,
        '\\d+', 0) as int) <= 240", "RuntimeBounds")
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    - - .satisfies("length(trim(Series_Title)) > 0", "SeriesTitleNotBlank")
      - Valid
    assumptions: []
