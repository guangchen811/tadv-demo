        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 41329d50-19f7-496b-9a82-81d0c4a663e0
    - text: 'The ''IMDB_Rating'' values are assumed to have a granularity that, when
        multiplied by 10, results in an integer. This is implied by the creation of
        ''rating_tenth'' (line 44) by multiplying by 10 and then casting to an integer,
        suggesting a design for bucketing ratings at a 0.1 precision. We could represent
        this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN `IMDB_Rating` IS NOT NULL AND (`IMDB_Rating` * 10) %
        1 != 0 THEN 1 ELSE 0 END", "IMDB_Rating 0.1 Granularity", lambda x: x == 0)'
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      uid: c9875fa1-654d-43a2-aec1-53a30acc5f06
    - text: 'The ''IMDB_Rating'' column is expected to contain values within a typical
        rating range, such as 1.0 to 10.0. While not strictly enforced by `minmax_norm`,
        the calculation of `rating_tenth` (line 44) by multiplying by 10 and casting
        to an integer suggests that values outside this range would produce ''rating_tenth''
        values that might be unexpectedly large or small for a rating bucket. We could
        represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN `IMDB_Rating` < 1.0 OR `IMDB_Rating` > 10.0 THEN 1 ELSE
        0 END", "IMDB_Rating Range 1.0-10.0", lambda x: x == 0)'
