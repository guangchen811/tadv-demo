constraints:
  Certificate:
    code:
    - - .isComplete('Certificate')
      - Invalid
    - - .isContainedIn('Certificate', ['A', 'Approved', 'U', 'PG', 'PG-13', 'R', 'NC-17',
        'G', 'TV-MA', 'TV-PG', 'TV-14', 'TV-G', 'Not Rated', 'Unrated'])
      - Invalid
    - - .isNonEmptyString('Certificate')
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    - - .isNonEmptyString('Director')
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    - - .isNonEmptyString('Genre')
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .satisfies('Gross', "Gross IS NULL OR Gross = '' OR CAST(REPLACE(Gross, ',',
        '') AS DOUBLE) >= 0", "Gross values are non-negative and convertible to numeric,
        or null/empty")
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - .isLessThanOrEqualTo('Meta_score', 100.0)
      - Invalid
    - - .isNonNegative('Meta_score')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isIntegral('No_of_Votes')
      - Invalid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .isComplete('Overview')
      - Valid
    - - .isNonEmptyString('Overview')
      - Invalid
    assumptions: []
  Poster_Link:
    code:
    - - .isComplete('Poster_Link')
      - Valid
    - - .isNonEmptyString('Poster_Link')
      - Invalid
    - - .satisfies('Poster_Link', "Poster_Link LIKE 'https://%'", "Poster Link starts
        with https://")
      - Invalid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isGreaterThanOrEqualTo('Released_Year', 1900)
      - Invalid
    - - .isIntegral('Released_Year')
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', 2024)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .isComplete('Runtime')
      - Valid
    - - .isNonEmptyString('Runtime')
      - Invalid
    - - .satisfies('Runtime', "CAST(SUBSTRING(Runtime, 1, LENGTH(Runtime) - 4) AS
        INT) <= 240", "Extracted Runtime maximum (240 min)")
      - Invalid
    - - .satisfies('Runtime', "CAST(SUBSTRING(Runtime, 1, LENGTH(Runtime) - 4) AS
        INT) >= 60", "Extracted Runtime minimum (60 min)")
      - Invalid
    - - .satisfies('Runtime', "Runtime RLIKE '^[1-9][0-9]{1,2} min$'", "Runtime format
        check (e.g., '120 min')")
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    - - .isNonEmptyString('Series_Title')
      - Invalid
    assumptions: []
  Series_Title,Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x: x == 1.0)'
      - Valid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    - - .isNonEmptyString('Star1')
      - Invalid
    assumptions: []
  Star2:
    code:
    - - .isComplete('Star2')
      - Valid
    - - .isNonEmptyString('Star2')
      - Invalid
    assumptions: []
  Star3:
    code:
    - - .isComplete('Star3')
      - Valid
    - - .isNonEmptyString('Star3')
      - Invalid
    assumptions: []
  Star4:
    code:
    - - .isComplete('Star4')
      - Valid
    - - .isNonEmptyString('Star4')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
