    - text: "The 'Certificate' column is expected to contain categorical values representing\
        \ content certifications. Specifically, values matching 'R', 'NC-17', 'A',\
        \ '18+', or 'TV-MA' (case-insensitive) are recognized as 'restrictive' and\
        \ will result in a licensing score factor of 0.9. All other valid certificate\
        \ values are treated as 'non-restrictive' with a factor of 1.0. This implies\
        \ that the column should primarily contain known certification types, and\
        \ any unexpected or invalid values will default to the non-restrictive category,\
        \ potentially masking data quality issues if they are not actual certificates.\
        \ \nWe could represent this assumption as a deequ constraint like this:\n\
        `.hasNumberOfDistinctValues(\"Certificate\", lambda x: x <= 15)` (to ensure\
        \ it remains categorical, given 13 distinct values observed).\nOr a Great\
        \ Expectations expectation like this:\n`expect_column_values_to_be_in_set(column=\"\
        Certificate\", value_set=[\"R\", \"NC-17\", \"A\", \"18+\", \"TV-MA\", \"\
        PG\", \"PG-13\", \"G\", \"TV-G\", \"TV-14\", \"Unrated\", \"Not Rated\", \"\
        nan\", \"none\"], mostly=0.95, case_sensitive=False)` (This example includes\
        \ common certificate types and string representations of nulls, assuming they\
        \ constitute the majority of expected values)."
