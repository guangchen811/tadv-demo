    - text: "The 'Certificate' column can contain null values. The data completeness\
        \ is approximately 90% (0.898), indicating a significant presence of nulls.\
        \ The code implicitly handles nulls (which become 'NAN' or 'NONE' after string\
        \ conversion and uppercasing) by treating them as non-restrictive certificates,\
        \ assigning them a `cert_factor` of 1.0. Therefore, the presence of nulls\
        \ will not cause the script to fail or alter the score in an unexpected way\
        \ for these entries. \nWe could represent this assumption as a deequ constraint\
        \ like this:\n`.isComplete(\"Certificate\", ComplianceRule.Completeness, lambda\
        \ x: x < 1.0)` (to explicitly allow nulls) and `.isComplete(\"Certificate\"\
        , ComplianceRule.Completeness, lambda x: x > 0.0)` (to ensure not all values\
        \ are null).\nOr a Great Expectations expectation like this:\n`expect_column_values_to_not_be_null(column=\"\
        Certificate\", mostly=0.9)`"
