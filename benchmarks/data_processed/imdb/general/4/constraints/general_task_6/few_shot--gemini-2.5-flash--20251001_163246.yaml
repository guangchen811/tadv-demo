constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda x: x >= 0.89)'
      - Valid
    - - .isContainedIn('Certificate', ['U', 'UA', 'A', 'G', 'PG', 'PG-13', 'R', 'NC-17',
        'NOT RATED', 'UNRATED'])
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda x: x >= 0.82)'
      - Valid
    - - .hasPattern('Gross', r'^\d{1,3}(,\d{3})*(\.\d+)?$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isFractional('IMDB_Rating')
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda x: x >= 0.85)'
      - Valid
    - - .isFractional('Meta_score')
      - Invalid
    - - .isLessThanOrEqualTo('Meta_score', 100.0)
      - Invalid
    - - .isNonNegative('Meta_score')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isIntegral('No_of_Votes')
      - Invalid
    - - .isPositive('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .isComplete('Overview')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .containsURL('Poster_Link')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    - - .isUnique('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isIntegral('Released_Year')
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', 2024)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^\d+ min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    assumptions: []
  Star2:
    code:
    - - .isComplete('Star2')
      - Valid
    assumptions: []
  Star3:
    code:
    - - .isComplete('Star3')
      - Valid
    assumptions: []
  Star4:
    code:
    - - .isComplete('Star4')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isIntegral('id')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
