raw_constraints:
- column_name: Poster_Link
  code_for_constraint: .isComplete('Poster_Link')
- column_name: Poster_Link
  code_for_constraint: .hasPattern('Poster_Link', '^https?://.*')
- column_name: Series_Title
  code_for_constraint: .isComplete('Series_Title')
- column_name: Released_Year
  code_for_constraint: .isComplete('Released_Year')
- column_name: Released_Year
  code_for_constraint: '.hasMin(''Released_Year'', lambda x: x >= 1888)'
- column_name: Released_Year
  code_for_constraint: .satisfies('Released_Year <= year(current_date())', 'released_year_not_future')
- column_name: IMDB_Rating
  code_for_constraint: .isComplete('IMDB_Rating')
- column_name: IMDB_Rating
  code_for_constraint: '.hasMin(''IMDB_Rating'', lambda x: x >= 0)'
- column_name: IMDB_Rating
  code_for_constraint: '.hasMax(''IMDB_Rating'', lambda x: x <= 10)'
- column_name: IMDB_Rating
  code_for_constraint: '.hasNumberOfDistinctValues(''IMDB_Rating'', lambda x: x >=
    2)'
- column_name: No_of_Votes
  code_for_constraint: .isComplete('No_of_Votes')
- column_name: No_of_Votes
  code_for_constraint: .isNonNegative('No_of_Votes')
- column_name: No_of_Votes
  code_for_constraint: '.hasNumberOfDistinctValues(''No_of_Votes'', lambda x: x >=
    2)'
- column_name: Runtime
  code_for_constraint: .isComplete('Runtime')
- column_name: Runtime
  code_for_constraint: .satisfies('Runtime rlike ^[0-9]+', 'runtime_has_minutes_prefix')
- column_name: Certificate
  code_for_constraint: .isContainedIn('Certificate', ['U','UA','A','G','PG','PG-13','R','NC-17','NOT
    RATED','UNRATED'])
- column_name: Gross
  code_for_constraint: .satisfies('(Gross IS NULL) OR (Gross rlike ^[0-9,]+$)', 'gross_numeric_or_null')
- column_name: Genre
  code_for_constraint: .isComplete('Genre')
