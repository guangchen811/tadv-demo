results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("CASE WHEN cast(IMDB_Rating as double) IS NULL OR (cast(IMDB_Rating
        as double) >= 0.0 AND cast(IMDB_Rating as double) <= 10.0) THEN 1 ELSE 0 END",
        "IMDB_Rating in [0,10] or null", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN cast(IMDB_Rating as double) IS NOT NULL THEN
        1 ELSE 0 END", "IMDB_Rating parseable as numeric (>=95%)", lambda x: x >=
        0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', lambda x: x >= 0.89816)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Certificate'', ''^[^\\s](?:.*[^\\s])?$'', lambda
        x: x >= 0.89)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasNumberOfDistinctValues(''Genre'', lambda x: (x >= 1) and (x
        <= 1000), None, 1000)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","Meta_score","No_of_Votes","quality_score"]':
    code:
    - suggestion: '.satisfies("`IMDB_Rating` IS NOT NULL AND `IMDB_Rating` >= 0 AND
        `IMDB_Rating` <= 10 AND `No_of_Votes` IS NOT NULL AND `No_of_Votes` >= 0 AND
        floor(`No_of_Votes`) = `No_of_Votes`", "IMDB and Votes validity", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`No_of_Votes` > 0", "Votes 60th-percentile > 0 (at
        least 60% rows have votes>0)", lambda x: x >= 0.60)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Meta_score` IS NULL OR (`Meta_score` >= 0 AND `Meta_score`
        <= 100)", "Meta_score in 0-100 when present", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`Meta_score` IS NULL OR (`Meta_score`
        >= 0 AND `Meta_score` <= 100)", "Meta_score in 0-100 when present", lambda
        x: x == 1)'' failed on data sample: Value: 0.9575 does not meet the constraint
        requirement!'
      level: warning
  Poster_Link:
    code:
    - suggestion: .isComplete("Poster_Link")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Poster_Link` = trim(`Poster_Link`) THEN
        1 ELSE 0 END", "No_surrounding_whitespace_in_Poster_Link", lambda x: x >=
        0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.satisfies(''CASE WHEN TRY_CAST(`Meta_score` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END'', ''Convertible Meta_score fraction'', lambda x: x
        >= 0.85)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN TRY_CAST(`Meta_score`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END'', ''Convertible Meta_score fraction'',
        lambda x: x >= 0.85)'' failed on data sample: Value: 0.8225 does not meet
        the constraint requirement!'
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.satisfies("CAST(`No_of_Votes` AS double) IS NOT NULL", "Numeric
        No_of_Votes", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.satisfies("CAST(trim(`Released_Year`) AS INT) BETWEEN 1800 AND
        2100", "Released_Year_in_range", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''Series_Title'',''Released_Year''], lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  '["Released_Year","Series_Title","catalog_id","title_year_key"]':
    code:
    - suggestion: '.hasUniqueness(columns=[''Series_Title'', ''Released_Year''], assertion=lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Series_Title` NOT LIKE ''%|%'' AND `Released_Year`
        NOT LIKE ''%|%'' THEN 1 ELSE 0 END", "no_pipe", assertion=lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.satisfies("CASE WHEN trim(`Series_Title`) != '''' THEN 1 ELSE
        0 END", "Non-empty Series_Title after trim", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''Series_Title'',''Released_Year''], lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN INSTR(`Series_Title`, ''|'') = 0 THEN 1 ELSE
        0 END", "No pipe character in Series_Title", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
