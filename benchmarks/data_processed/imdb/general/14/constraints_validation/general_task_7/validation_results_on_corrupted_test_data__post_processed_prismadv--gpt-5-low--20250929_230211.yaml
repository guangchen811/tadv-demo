results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies(''`IMDB_Rating` >= 0.0 AND `IMDB_Rating` <= 10.0'',
        ''IMDB_Rating in [0,10]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`IMDB_Rating` >= 7.0'', ''At least one Top Pick (rating
        >= 7.0)'', lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.hasCompleteness("Certificate", lambda x: x >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Certificate` IS NULL OR CAST(`Certificate` AS STRING)
        IS NOT NULL", "Certificate string-like", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.satisfies(''(IMDB_Rating < 7.0) OR (Genre IS NOT NULL AND TRIM(Genre)
        <> \''\'')'', ''Top Picks Genre completeness'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''Genre'', lambda x: x <= 300)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","No_of_Votes"]':
    code:
    - suggestion: '.satisfies("IMDB_Rating >= 0 AND IMDB_Rating <= 10", "IMDB_Rating
        in [0,10]", lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("No_of_Votes >= 0", "Nonnegative vote counts", lambda
        f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("No_of_Votes > 0", "At least 60% rows have positive
        votes (ensures m>0)", lambda f: f >= 0.60)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("No_of_Votes = CAST(No_of_Votes AS INT)", "Votes are
        integers", lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: '.satisfies("CASE WHEN Poster_Link IS NOT NULL AND length(trim(Poster_Link))
        > 0 AND Poster_Link = trim(Poster_Link) THEN 1 ELSE 0 END", "Poster_Link non-empty
        and trimmed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN Poster_Link RLIKE ''(?i)^https?://.+$'' THEN
        1 ELSE 0 END", "Poster_Link HTTP(S) URL format", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''Poster_Link'', lambda d: d > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.satisfies("`Meta_score` IS NULL OR (CAST(`Meta_score` AS DOUBLE)
        IS NOT NULL AND NOT isnan(CAST(`Meta_score` AS DOUBLE)) AND CAST(`Meta_score`
        AS DOUBLE) > -1.7976931348623157E308 AND CAST(`Meta_score` AS DOUBLE) < 1.7976931348623157E308)",
        "Meta_score present values are numeric and finite (non-numeric allowed as
        NULL)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.satisfies(''No_of_Votes >= 0'', ''No_of_Votes_non_negative'',
        lambda r: r >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`No_of_Votes` > 0'', ''Sufficient positive votes'',
        lambda x: x >= 0.60)'
      status: true
      reason_if_failed: ''
      level: error
  '["Poster_Link","Released_Year","Series_Title"]':
    code:
    - suggestion: '.hasUniqueness(columns=[''Series_Title'', ''Released_Year''], assertion=lambda
        u: u == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(columnCondition="Series_Title IS NOT NULL AND TRIM(Series_Title)
        <> '''' AND Released_Year IS NOT NULL", constraintName="non_empty_title_year",
        assertion=lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: '.satisfies("trim(`Released_Year`) RLIKE ''^[0-9]{4}$'' AND CAST(trim(`Released_Year`)
        AS INT) BETWEEN 1900 AND 2100", "Released_Year is 4-digit year in range",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .isComplete("Runtime")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("Runtime", "^\\s*(\\d+)\\s*min\\s*$", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.hasCompleteness(''Series_Title'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("trim(`Series_Title`) <> ''''", "Non-empty Series_Title
        after trim", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("locate(''|'', `Series_Title`) = 0", "No pipe in Series_Title",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
