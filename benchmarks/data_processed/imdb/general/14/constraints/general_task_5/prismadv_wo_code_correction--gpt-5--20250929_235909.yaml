        file: ''
      uid: 21e77bd5-6814-4607-a97a-b1769016544a
    - text: 'In the emitted top_k dataset, rows must have non-null Decade_Label, GenreToken,
        Score, and Rank (i.e., Rank implies Score and grouping keys are present).
        As a Deequ compliance: .satisfies(''Decade_Label IS NOT NULL AND GenreToken
        IS NOT NULL AND Score IS NOT NULL AND Rank IS NOT NULL'', 1.0).'
      sources:
      - start_line: 167
        end_line: 167
        file: ''
      - start_line: 172
        end_line: 176
        file: ''
      - start_line: 184
        end_line: 196
        file: ''
      uid: 884240b2-593c-42a2-b4f1-34ed09503ee5
    - text: "For each (Decade_Label, GenreToken) group in the top_k output, there\
        \ are at most TOP_K (=10) rows (i.e., count where Rank <= 10 per group \u2264\
        \ 10). This can be checked by grouping on [Decade_Label, GenreToken] and asserting\
        \ max(Rank) \u2264 10 and countDistinct(Rank) \u2264 10 in each group."
      sources:
      - start_line: 164
        end_line: 167
        file: ''
      - start_line: 68
        end_line: 75
        file: ''
      - start_line: 184
        end_line: 198
        file: ''
      uid: 294d8c9d-e66d-42f6-9dc4-1c647c408e06
    - text: 'Decade_Label is functionally determined by Year: Decade_Label must equal
        concat(string(floor(Year/10)*10), ''s''). This can be expressed as a compliance:
        .satisfies("Decade_Label = concat(cast((Year/10) as int)*10, ''s'')", 1.0).'
      sources:
      - start_line: 103
        end_line: 105
        file: ''
      uid: a08adb47-27da-49bb-8d58-d65e62cf34f8
    - text: "If two rows in the same (Decade_Label, GenreToken) group have equal Score,\
