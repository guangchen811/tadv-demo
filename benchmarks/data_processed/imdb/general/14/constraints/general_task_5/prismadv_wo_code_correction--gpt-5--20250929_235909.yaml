    - text: 'Within each (Decade_Label, GenreToken) group, Rank encodes the ordering
        by Score (descending) and then by Gross_Tie (descending). Equivalently: for
        any two rows in the same group, if Score_a > Score_b then Rank_a < Rank_b;
        if Score_a = Score_b and Gross_Tie_a > Gross_Tie_b then Rank_a < Rank_b. This
        can be validated as a windowed ordering constraint over partitions [Decade_Label,
        GenreToken] that Score is non-increasing with Rank, and where adjacent Scores
        are equal, Gross_Tie is non-increasing with Rank.'
      sources:
      - start_line: 162
        end_line: 164
        file: ''
      - start_line: 151
        end_line: 156
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 198
