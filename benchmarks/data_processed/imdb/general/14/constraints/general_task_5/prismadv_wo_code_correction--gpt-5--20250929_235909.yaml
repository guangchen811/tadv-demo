    - text: 'Series_Title should not contain characters that would break unescaped
        HTML when inserted into attribute values or text, especially the double quote
        (") and angle brackets (<, >). Example validations: Deequ: .satisfies(''NOT(regexp_like(`Series_Title`,
        ".*[\\\"<>].*"))'', ''No HTML-breaking characters'', lambda v: v == 1.0).
        Great Expectations: expect_column_values_to_not_match_regex(''Series_Title'',
        ''[\"<>]'').'
      sources:
      - start_line: 33
        end_line: 36
        file: ''
      uid: b4ef9499-ecd6-4819-a438-b70db25585c1
    - text: 'The combination of Released_Year and the normalized title slug should
        be unique to avoid duplicate <a id="..."> values in the HTML. Concretely,
        slug = lower(regexp_replace(trim(Series_Title), ''[^A-Za-z0-9]+'', ''-''))
        and the pair (Released_Year, slug) should be unique. Example validations:
        create a computed column ''slug'' as above, then Deequ: .isUnique([''Released_Year'',''slug'']);
        Great Expectations: expect_compound_columns_to_be_unique([''Released_Year'',''slug'']).'
      sources:
