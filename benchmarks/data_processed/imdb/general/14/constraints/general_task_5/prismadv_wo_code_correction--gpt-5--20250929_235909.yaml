  '["Series_Title","Year"]':
    code: []
    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Year'' must be globally unique
        across the records used for HTML/CSV/JSON outputs so that the generated slug
        id safe_slug(f"{title}-{year}") is unique in the DOM and consistently identifies
        one film. Deequ example: .isUnique(["Series_Title", "Year"]).'
      sources:
      - start_line: 18
        end_line: 19
        file: ''
      - start_line: 31
        end_line: 34
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: 38b57851-ed4b-4e46-a986-dad38e72c5d5
    - text: 'For all kept rows, ''Released_Year'' must be a 4-digit string and ''Year''
        must equal int(Released_Year). This enforces consistency between the source
        year field and the derived ''Year''. Deequ examples: .hasPattern("Released_Year",
        "\\d{4}") and .compliance("year_consistency", "toInt(Released_Year) = Year").'
      sources:
      - start_line: 97
        end_line: 97
        file: ''
      - start_line: 99
        end_line: 99
        file: ''
      - start_line: 102
        end_line: 103
        file: ''
      uid: c9f1a4e3-9a49-474c-878b-892e267e6d77
    - text: '''Decade_Label'' must be derivable from ''Year'': Decade_Label == concat(string((Year/10)*10),
        ''s''). This guarantees decade labels agree with the numeric year used elsewhere
        (grouping, ranking, and output). Deequ example: .compliance("decade_label_from_year",
        "concat(cast((Year/10)*10 as string), ''s'') = Decade_Label").'
      sources:
      - start_line: 104
        end_line: 105
        file: ''
      - start_line: 68
        end_line: 71
        file: ''
      - start_line: 162
        end_line: 165
        file: ''
      uid: 7365d311-e276-4d08-9b5f-69f408493273
    - text: 'Within each (Decade_Label, GenreToken) group, ''Rank'' must be unique
        and within [1, 10] (TOP_K). This ensures unambiguous ordering in leaderboards.
        Deequ examples: .isUnique(["Decade_Label", "GenreToken", "Rank"]) and .compliance("rank_range",
        "Rank >= 1 and Rank <= 10").'
      sources:
      - start_line: 162
        end_line: 168
        file: ''
      - start_line: 68
        end_line: 74
        file: ''
      uid: ef71fd39-437e-45e3-b013-3330f6bba033
    - text: 'For any given (Series_Title, Year) pair, ''Poster_Link'' must be present
        (non-empty) and consistent across all occurrences (e.g., when a title appears
        in multiple genres). This is a functional dependency: (Series_Title, Year)
        -> Poster_Link. Deequ approximation: verify completeness of Poster_Link on
        rows used in outputs and that the maximum distinct Poster_Link per (Series_Title,
        Year) equals 1 (via an aggregated check).'
      sources:
      - start_line: 18
        end_line: 19
        file: ''
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 33
        end_line: 36
        file: ''
      - start_line: 158
        end_line: 160
        file: ''
      - start_line: 172
        end_line: 176
        file: ''
      uid: 36eef3c2-8d57-458a-bb83-21b4cb5ce87b
    - text: 'If a film is tagged with ''Family'' or ''Animation'' in any GenreToken,
        then its ''Certificate'' must not be ''R'' or ''NC-17''. This enforces a cross-column
        content policy: (GenreToken in {Family, Animation}) => Certificate not in
        {R, NC-17}. Deequ example (after explode): .compliance("family_animation_cert_policy",
        "NOT ((GenreToken IN (''Family'',''Animation'')) AND (Certificate IN (''R'',''NC-17'')))
        ").'
      sources:
