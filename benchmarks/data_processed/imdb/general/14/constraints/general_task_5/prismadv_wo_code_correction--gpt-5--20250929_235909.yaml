    - text: 'Runtime_Min must be consistent with Runtime: when Runtime matches the
        pattern ''^[0-9]{2,3} min$'', Runtime_Min equals the extracted integer minutes.
        This guards the pacing factor used in scoring. Deequ example: .satisfies("Runtime
        rlike ''^[0-9]{2,3} min$'' and Runtime_Min = cast(regexp_extract(Runtime,
        ''([0-9]{2,3})'', 1) as int)", ''runtime_consistent'').'
      sources:
      - start_line: 108
        end_line: 110
        file: ''
      uid: efab2f5c-da06-4670-bed7-130a76b9fcab
    - text: 'Score is a deterministic function of IMDB_Rating, Meta_score, No_of_Votes,
        and Runtime_Min: Score = (0.6*(IMDB_Rating/10.0) + 0.25*(Meta_score/100.0
        with median imputation when null) + 0.15*(log10(max(No_of_Votes,1))/6.0))
        * clip(1 - abs(Runtime_Min - 120)/300.0, 0.8, 1.05). Therefore, Score should
        be non-null whenever IMDB_Rating, No_of_Votes, and Runtime_Min are non-null
        and parseable. Deequ example: .satisfies("abs(Score - ((0.6*(IMDB_Rating/10.0)
        + 0.25*(coalesce(Meta_score, median_meta)/100.0) + 0.15*(log10(greatest(No_of_Votes,1))/6.0))
        * least(greatest(1 - abs(Runtime_Min - 120)/300.0, 0.8), 1.05))) <= 1e-6",
        ''score_formula'').'
      sources:
      - start_line: 108
        end_line: 110
        file: ''
      - start_line: 113
        end_line: 117
        file: ''
      - start_line: 139
        end_line: 148
        file: ''
      uid: c3837036-bd76-45ac-9a86-ec5232289198
    - text: 'Given the normalization and clipping in the scoring logic (IMDB_Rating
        in [0,10] -> [0,1], Meta_score in [0,100] -> [0,1] with median imputation
        when null, No_of_Votes clipped to >= 1 before log10, and pacing clipped to
        [0.8, 1.05]), Score must lie within [0.0, 1.05]. Deequ example: .satisfies(''Score
        >= 0.0 and Score <= 1.05'', ''score_within_expected_bounds'').'
      sources:
      - start_line: 139
        end_line: 147
        file: ''
      uid: 7a9968eb-b518-4ed5-8c6a-d90e5f415be5
    - text: 'Within each (Decade_Label, GenreToken) group, Rank values are unique
        and are assigned by sorting by Score descending with Gross_Tie as a tie-breaker
        (higher Gross_Tie receives a better (smaller) Rank when Scores are equal).
        Deequ examples: .isUnique([''Decade_Label'',''GenreToken'',''Rank'']); and
        a compliance check expressing the tie-break rule, e.g., for pairs within a
        group where Score is equal, Gross_Tie1 > Gross_Tie2 implies Rank1 < Rank2.'
