    - text: "Series_Title should contain at least one alphanumeric character (A\u2013\
        Z or 0\u20139) after trimming so that the derived slug safe_slug(f\"{title}-{year}\"\
        ) is non-empty. Example validations: Deequ: .satisfies('regexp_like(trim(`Series_Title`),\
        \ \".*[A-Za-z0-9].*\")', 'Title has alphanumeric', lambda v: v == 1.0). Great\
        \ Expectations: expect_column_values_to_match_regex('Series_Title', '.*[A-Za-z0-9].*')."
