raw_constraints:
- column_name: Series_Title
  code_for_constraint: .isComplete('Series_Title')
- column_name: Released_Year
  code_for_constraint: .isComplete('Released_Year')
- column_name: '[''Series_Title'',''Released_Year'']'
  code_for_constraint: .isUnique(['Series_Title','Released_Year'])
- column_name: Released_Year
  code_for_constraint: '.hasMin(''Released_Year'', lambda m: m >= 1900)'
- column_name: Released_Year
  code_for_constraint: '.hasMax(''Released_Year'', lambda m: m <= 2025)'
- column_name: IMDB_Rating
  code_for_constraint: .isComplete('IMDB_Rating')
- column_name: IMDB_Rating
  code_for_constraint: '.hasMin(''IMDB_Rating'', lambda m: m >= 0.0)'
- column_name: IMDB_Rating
  code_for_constraint: '.hasMax(''IMDB_Rating'', lambda m: m <= 10.0)'
- column_name: No_of_Votes
  code_for_constraint: .isNonNegative('No_of_Votes')
- column_name: Runtime
  code_for_constraint: .isComplete('Runtime')
- column_name: Runtime
  code_for_constraint: .hasPattern('Runtime', r'^\d+\s*min$')
- column_name: Certificate
  code_for_constraint: .satisfies("Certificate IS NULL OR Certificate IN ('U','G','PG','PG-13','UA','Passed','Approved','Not
    Rated','Unrated','R','A','NC-17')", 'certificate_allowed_values')
- column_name: Poster_Link
  code_for_constraint: .hasPattern('Poster_Link', r'^https?://')
