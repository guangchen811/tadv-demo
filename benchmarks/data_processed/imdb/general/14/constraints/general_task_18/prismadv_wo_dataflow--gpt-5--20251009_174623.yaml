      sources:
      - start_line: 55
        end_line: 55
        file: ''
      uid: d96743ad-12c1-4a21-9ad3-ace4d5ef1553
    - text: 'Parsed ''Gross'' (Gross_USD) should be non-negative. Negative values
        would be nonsensical for revenue and would also be problematic for the subsequent
        log1p transform. Example validations: Deequ: .satisfies("CAST(REPLACE(`Gross`,
        '','', '''') AS DOUBLE) >= 0", "Gross non-negative when present", lambda x:
        x >= 0.99); Great Expectations: expect_column_values_to_be_between(min_value=0,
        max_value=None, parse_strings_as_datetimes=False) applied to REPLACE(Gross,
        '','', '''') cast to float for non-null rows.'
      sources:
      - start_line: 55
        end_line: 55
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      uid: 1963d9a2-a667-4dfa-a4cf-7d34d9e67169
    - text: 'There should be a sufficient fraction of rows with a parsable numeric
        ''Gross'' to allow a meaningful median-based fill (rather than defaulting
        to zeros). Target at least 50% of rows parsable after comma removal. Example
        validations: Deequ: .satisfies("CAST(REPLACE(`Gross`, '','', '''') AS DOUBLE)
        IS NOT NULL", "Enough parsable Gross", lambda x: x >= 0.50); Great Expectations:
        expect_column_values_to_not_be_null on the parsed numeric expression with
        mostly=0.50.'
      sources:
      - start_line: 58
        end_line: 63
        file: ''
      - start_line: 55
        end_line: 55
        file: ''
      uid: 7ba55054-7808-4152-9d47-34a196e39e39
    - text: "Sufficient variability in 'Gross' values is expected so robust quantile\
        \ scaling (0.05\u20130.95) on log(gross+1) is meaningful. Require at least\
        \ 10 distinct parsed numeric 'Gross' values. Example validations: Deequ: .hasNumberOfDistinctValues(\"\
        Gross\", lambda x: x >= 10) applied after parsing (i.e., on CAST(REPLACE(`Gross`,\
        \ ',', '') AS DOUBLE)); Great Expectations: expect_column_unique_value_count_to_be_between(min_value=10)\
        \ on the parsed numeric representation."
      sources:
      - start_line: 8
        end_line: 15
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      - start_line: 55
        end_line: 55
        file: ''
      uid: 82eb1239-3e73-4a5f-b27f-91c82f7430b3
    - text: "Currency/units must be consistent: 'Gross' values are expected to already\
