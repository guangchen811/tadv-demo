      source_assumptions:
      - 036d8b61-adaa-45a3-84de-2062c3235c00
    assumptions:
    - text: 'The ''IMDB_Rating'' column must be numeric (parseable as float) for all
        rows used, since the code casts it to float multiple times (for normalization,
        correlation, regression, and imputation). Non-numeric values would cause failures
        during astype(float). Possible validations: Deequ: .hasDataType(''IMDB_Rating'',
        ConstrainableDataTypes.Fractional); Great Expectations: expect_column_values_to_be_in_type_list(''IMDB_Rating'',
        [''float'', ''double'', ''int'', ''long'', ''decimal'']).'
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 69
        end_line: 70
        file: ''
      - start_line: 73
        end_line: 77
        file: ''
      - start_line: 82
        end_line: 83
        file: ''
      uid: b7807cb9-37de-4faa-be9d-3e06e3852478
    - text: "The 'IMDB_Rating' values are expected to be on the 0\u201310 IMDb scale.\
        \ The code normalizes by dividing by 10.0 without clipping, implying values\
        \ should lie within [0, 10]. Possible validations: Deequ: .isContainedInRange('IMDB_Rating',\
        \ 0.0, 10.0); Great Expectations: expect_column_values_to_be_between('IMDB_Rating',\
        \ min_value=0, max_value=10, inclusive=True)."
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      uid: 9f4f9b56-6f53-489f-9a72-9763766156de
    - text: 'The ''IMDB_Rating'' column should not contain nulls for rows intended
        to yield a valid PopularityIndex. Because the blend weight w_rating is always
        > 0, any null IMDB_Rating propagates to content_quality and then to PopularityIndex
        as NaN. Possible validations: Deequ: .hasCompleteness(''IMDB_Rating'', lambda
        v: v == 1.0); Great Expectations: expect_column_values_to_not_be_null(''IMDB_Rating'').'
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 88
        end_line: 93
        file: ''
      - start_line: 95
        end_line: 99
        file: ''
      uid: 35941ec9-89d7-47f7-8615-4a1e21fbdd7b
    - text: 'There must be at least two rows where both ''IMDB_Rating'' and ''Meta_score''
        are non-null to fit the linear regression used for Meta_score imputation.
        Possible validations: Deequ (one way): .satisfies(''CASE WHEN IMDB_Rating
        IS NOT NULL AND Meta_score IS NOT NULL THEN 1 ELSE 0 END'', ''>= 2 rows'',
        lambda ratio: ratio >= 2.0 / dataset_row_count); Great Expectations: apply
        a row_condition=''IMDB_Rating IS NOT NULL AND Meta_score IS NOT NULL'' and
        then expect_table_row_count_to_be_at_least(2).'
      sources:
      - start_line: 67
        end_line: 77
        file: ''
      uid: 036d8b61-adaa-45a3-84de-2062c3235c00
