      sources:
      - start_line: 55
        end_line: 55
        file: ''
      uid: b6b53e68-ad18-4083-b2be-bbe7b35e2988
  '["Gross","IMDB_Rating","Meta_score","No_of_Votes","Runtime"]':
    code: []
    assumptions:
    - text: 'At least two records must have both ''IMDB_Rating'' and ''Meta_score''
        present and numeric so that correlation and the linear regression Meta_score
        ~ IMDB_Rating can be computed (otherwise r and weights become NaN and polyfit
        may fail). Deequ-style: enforce count of rows satisfying (IMDB_Rating IS NOT
        NULL AND Meta_score IS NOT NULL AND try_cast(IMDB_Rating AS DOUBLE) IS NOT
        NULL AND try_cast(Meta_score AS DOUBLE) IS NOT NULL) >= 2.'
      sources:
      - start_line: 66
        end_line: 71
        file: ''
      - start_line: 73
        end_line: 77
        file: ''
      - start_line: 88
        end_line: 92
        file: ''
