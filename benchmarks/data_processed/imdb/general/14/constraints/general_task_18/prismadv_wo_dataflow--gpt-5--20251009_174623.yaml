    - text: 'The combination of ''Series_Title'' and ''Released_Year'' must uniquely
        identify each published row (used as ranking/publishing keys). Deequ: .areComplete(["Series_Title","Released_Year"])
        and .isUnique(["Series_Title","Released_Year"]).'
      sources:
      - start_line: 94
        end_line: 102
        file: ''
      uid: 46e9ac37-d2a5-492b-94dd-598e1f27e149
    - text: "For rows that will be published (Series_Title and Released_Year not null),\
        \ all core inputs to PopularityIndex must be present and parseable together:\
        \ IMDB_Rating numeric, No_of_Votes numeric and >= 0, Runtime contains a 2\u2013\
        3 digit minute value, and if Gross is present it must be parseable to numeric\
        \ after removing commas. Deequ: .hasCompliance(\"publishable_rows_ready\"\
        , \"(Series_Title IS NOT NULL AND Released_Year IS NOT NULL) -> (try_cast(IMDB_Rating\
        \ AS DOUBLE) IS NOT NULL AND try_cast(No_of_Votes AS DOUBLE) IS NOT NULL AND\
        \ No_of_Votes >= 0 AND Runtime RLIKE '[0-9]{2,3}' AND (Gross IS NULL OR Gross\
        \ RLIKE '^[0-9,]+$'))\")."
      sources:
      - start_line: 50
        end_line: 53
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      - start_line: 106
        end_line: 109
        file: ''
      uid: 334307ea-c4af-43e2-901d-c539dbc423df
  '["IMDB_Rating","Meta_score"]':
    code: []
    assumptions:
    - text: 'There must be at least two rows where both ''IMDB_Rating'' and ''Meta_score''
        are non-null, and within those rows both columns must exhibit non-zero variance
        so that correlation and a linear regression (Meta_score ~ a * IMDB_Rating
        + b) can be fit. Example Deequ constraints: .where("IMDB_Rating is not null
        and Meta_score is not null").hasSize(lambda n: n >= 2) AND .hasVariance("IMDB_Rating",
        lambda v: v > 0, where="IMDB_Rating is not null and Meta_score is not null")
        AND .hasVariance("Meta_score", lambda v: v > 0, where="IMDB_Rating is not
        null and Meta_score is not null").'
      sources:
      - start_line: 66
        end_line: 77
        file: ''
      - start_line: 88
        end_line: 92
        file: ''
      uid: c6db86e3-cdaa-42bc-86d1-8305e5b6ba25
    - text: 'For any row where ''Meta_score'' is null, ''IMDB_Rating'' must be present
        (non-null and castable to float) so that regression-based imputation can be
        performed. Example Deequ constraint: .where("Meta_score is null").hasCompleteness("IMDB_Rating",
        1.0).'
      sources:
      - start_line: 79
        end_line: 84
        file: ''
      uid: 17f44a45-19be-4fc8-89dd-8d8160b1a55f
    - text: '''IMDB_Rating'' and ''Meta_score'' must be on consistent scales used
        for blending: ''IMDB_Rating'' in [0, 10] and ''Meta_score'' (observed or imputed)
        in [0, 100], which yields normalized features in [0, 1] before blending. Example
        Deequ constraints: .where("IMDB_Rating is not null").hasMin("IMDB_Rating",
        lambda v: v >= 0) AND .where("IMDB_Rating is not null").hasMax("IMDB_Rating",
        lambda v: v <= 10) AND .where("Meta_score is not null").hasMin("Meta_score",
        lambda v: v >= 0) AND .where("Meta_score is not null").hasMax("Meta_score",
        lambda v: v <= 100).'
      sources:
