    - text: 'If ''Meta_score'' is missing for a row, ''IMDB_Rating'' must be present
        and numeric so the model-based imputation can run. Deequ: .hasCompliance("meta_imputable",
        "(Meta_score IS NULL) -> (IMDB_Rating IS NOT NULL AND try_cast(IMDB_Rating
        AS DOUBLE) IS NOT NULL)").'
      sources:
      - start_line: 79
        end_line: 85
        file: ''
      uid: c9d3c260-afdc-4353-a113-f7dc1a42bfa0
    - text: "When both 'IMDB_Rating' and 'Meta_score' are present, they must be numeric\
        \ and within their native scales (0\u201310 and 0\u2013100 respectively),\
        \ consistent with the normalization logic and linear fit. Deequ: .hasCompliance(\"\
        rating_meta_ranges\", \"(IMDB_Rating IS NULL OR Meta_score IS NULL) OR (try_cast(IMDB_Rating\
        \ AS DOUBLE) BETWEEN 0 AND 10 AND try_cast(Meta_score AS DOUBLE) BETWEEN 0\
        \ AND 100)\")."
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      - start_line: 73
        end_line: 77
