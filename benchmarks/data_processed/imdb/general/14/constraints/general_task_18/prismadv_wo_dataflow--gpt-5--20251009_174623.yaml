        NOT(REGEXP_LIKE(`Gross`, '[$\u20AC\xA3]|USD|EUR|GBP|million|mn|bn|\\\\bM\\\
        \\b|\\\\bB\\\\b'))\", \"No currency/unit markers in Gross\", lambda x: x >=\
        \ 0.99); Great Expectations: expect_column_values_to_not_match_regex with\
