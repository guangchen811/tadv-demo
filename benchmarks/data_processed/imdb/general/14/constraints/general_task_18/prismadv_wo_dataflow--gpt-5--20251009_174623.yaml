    assumptions:
    - text: 'Non-null ''Gross'' values should be numeric dollar amounts encoded as
        strings with optional thousands separators only. After removing commas, they
        must be castable to a finite number (no stray text or symbols). Example validations:
        Deequ: .satisfies("CAST(REPLACE(`Gross`, '','', '''') AS DOUBLE) IS NOT NULL",
        "Gross parsable when present", lambda x: x >= 0.95) evaluated on non-null
        rows; Great Expectations: expect_column_values_to_match_regex with regex "^\s*\d{1,3}(,\d{3})*(\.\d+)?\s*$"
