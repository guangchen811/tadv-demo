constraints:
  Certificate:
    code:
    - - .hasMinCompleteness('Certificate', 0.8)
      - Invalid
    - - .isContainedIn('Certificate', ['G', 'PG', 'PG-13', 'R', 'NC-17', 'A', 'TV-G',
        'TV-PG', 'TV-14', 'TV-MA', 'Unrated', 'Not Rated', '18+'], caseSensitive=False).when('Certificate
        IS NOT NULL')
      - Invalid
    - - .isStringType('Certificate')
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    - - .isStringType('Director')
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    - - .isNonEmpty('Genre')
      - Invalid
    - - .isStringType('Genre')
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .hasMinCompleteness('Gross', 0.8)
      - Invalid
    - - .isStringType('Gross')
      - Invalid
    - - .matchesPattern('Gross', '^[0-9,]+$').when('Gross IS NOT NULL')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isIntegral('No_of_Votes')
      - Invalid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .isComplete('Overview')
      - Valid
    - - .isStringType('Overview')
      - Invalid
    assumptions: []
  Poster_Link:
    code:
    - - .isComplete('Poster_Link')
      - Valid
    - - .isStringType('Poster_Link')
      - Invalid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isGreaterThanOrEqualTo('Released_Year', 1900)
      - Invalid
    - - .isIntegral('Released_Year')
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', 2024)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .isComplete('Runtime')
      - Valid
    - - .isStringType('Runtime')
      - Invalid
    - - .matchesPattern('Runtime', '^[0-9]+ min$')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    - - .isNonEmpty('Series_Title')
      - Invalid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - .isUnique('Series_Title', 'Released_Year')
      - Valid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    - - .isNonEmpty('Star1')
      - Invalid
    assumptions: []
  Star2:
    code:
    - - .isComplete('Star2')
      - Valid
    - - .isNonEmpty('Star2')
      - Invalid
    assumptions: []
  Star3:
    code:
    - - .isComplete('Star3')
      - Valid
    - - .isNonEmpty('Star3')
      - Invalid
    assumptions: []
  Star4:
    code:
    - - .isComplete('Star4')
      - Valid
    - - .isNonEmpty('Star4')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isIntegral('id')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
