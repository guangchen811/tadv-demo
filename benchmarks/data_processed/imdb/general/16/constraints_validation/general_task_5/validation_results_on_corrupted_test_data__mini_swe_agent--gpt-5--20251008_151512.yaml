        failed on data sample: Value: 0.9375 does not meet the constraint requirement!'
      level: error
  Genre:
    code:
    - suggestion: .hasPattern('Genre', '^[A-Za-z-]+(,\s*[A-Za-z-]+)*$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating:
