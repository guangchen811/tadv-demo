results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("`IMDB_Rating` >= 0 AND `IMDB_Rating` <= 10", "IMDB_Rating
        in [0,10]", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("IMDB_Rating", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', lambda c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN lower(`Genre`) LIKE "%family%" OR lower(`Genre`)
        LIKE "%animation%" THEN (`Certificate` IS NULL OR `Certificate` NOT IN ("R","NC-17"))
        ELSE true END'', ''Family/Animation not R or NC-17'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Certificate` IS NULL OR `Certificate` = trim(`Certificate`)',
        'Certificate trimmed')
      status: true
      reason_if_failed: ''
      level: warning
  '["Certificate","Genre"]':
    code:
    - suggestion: '.hasCompleteness("Certificate", lambda c: c >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Certificate` IS NULL) OR (`Certificate` <> ''nan'')",
        "No literal ''nan'' in Certificate", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern("Genre", "^(Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western)(\\s*,\\s*(Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western))*$",
        lambda x: x >= 0.98, name="Valid Genre tokens pattern")'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT regexp_like(`Genre`, ''(^|,)\\s*nan\\s*(,|$)'')",
        "No literal ''nan'' token in Genre", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.satisfies("size(filter(transform(split(Genre, '',''), x -> trim(x)),
        x -> x <> '''')) > 0", "Genre has at least one token", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("size(array_except(transform(split(Genre, '',''), x
        -> trim(x)), array(''Action'',''Adventure'',''Animation'',''Biography'',''Comedy'',''Crime'',''Drama'',''Family'',''Fantasy'',''Film-Noir'',''History'',''Horror'',''Music'',''Musical'',''Mystery'',''Romance'',''Sci-Fi'',''Sport'',''Thriller'',''War'',''Western'')))
        = 0", "Genre tokens in allowed set", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.satisfies("Gross IS NULL OR CAST(regexp_replace(trim(Gross), '','',
        '''') AS DOUBLE) IS NOT NULL", "Gross parseable as numeric when present",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Gross IS NULL OR CAST(regexp_replace(trim(Gross), '','',
        '''') AS DOUBLE) >= 0", "Gross non-negative when present", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Gross", lambda x: x >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Gross","Gross_Num","Gross_Tie"]':
    code:
    - suggestion: '.hasCompleteness(''Gross'', lambda c: c >= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Gross'', ''^[0-9,]+$'', lambda v: v >= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Gross` IS NULL OR CAST(regexp_replace(`Gross`, ",",
        "") AS DOUBLE) >= 0'', ''Gross non-negative when parseable'', lambda v: v
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(regexp_replace(`Gross`, ",", "") AS DOUBLE) IS
        NOT NULL'', ''At least one parseable Gross value exists'', lambda v: v > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","Meta_score","No_of_Votes","Runtime_Min","Score"]':
    code:
    - suggestion: .satisfies('`IMDB_Rating` >= 0 AND `IMDB_Rating` <= 10', 'IMDb_Rating
        within [0, 10]')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Meta_score'', lambda c: c >= 0.85)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''Meta_score'', lambda c: c
        >= 0.85)'' failed on data sample: Value: 0.8225 does not meet the constraint
        requirement!'
      level: warning
  Poster_Link:
    code:
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Poster_Link` IS NOT NULL AND TRIM(`Poster_Link`) <>
        '''' AND lower(TRIM(`Poster_Link`)) NOT IN (''nan'',''none'',''null'')", "poster_link_nonempty",
        lambda f: f >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.containsURL(''Poster_Link'', assertion=lambda f: f >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Poster_Link'', ''^(?i)https?://\\S+\\.(?:jpg|jpeg|png|gif|webp)$'',
        assertion=lambda f: f >= 0.95, name=''poster_image_url_format'')'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.hasCompleteness(''Meta_score'', lambda c: c > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Meta_score` IS NULL OR (`Meta_score` >= 0 AND `Meta_score`
        <= 100)'', ''Meta_score within [0,100] when present'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Meta_score'', lambda c: c >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.satisfies("`No_of_Votes` IS NULL OR CAST(`No_of_Votes` AS DOUBLE)
        >= 0", "No_of_Votes non-negative when present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("No_of_Votes", lambda c: c >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness("No_of_Votes", lambda c: c >=
        0.99)'' failed on data sample: Value: 0.95 does not meet the constraint requirement!'
      level: warning
  '["Poster_Link","Series_Title","Year"]':
    code:
    - suggestion: '.satisfies("`Series_Title` IS NOT NULL AND TRIM(`Series_Title`)
        <> '''' AND LOWER(TRIM(`Series_Title`)) <> ''nan''", "series_title_present",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMinLength("Series_Title", lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Poster_Link` IS NOT NULL AND TRIM(`Poster_Link`) <>
        '''' AND LOWER(TRIM(`Poster_Link`)) <> ''nan''", "poster_link_present", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern("Poster_Link", ''^https?://'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.containsURL("Poster_Link", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.satisfies(''Released_Year >= 1000 AND Released_Year <= 9999'',
        ''released_year_is_four_digits'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''Released_Year BETWEEN 1900 AND year(current_date())'',
        ''released_year_reasonable_range'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Runtime'', ''^\\d{2,3}\\smin$'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Released_Year","Series_Title"]':
    code:
    - suggestion: '.satisfies("`Released_Year` BETWEEN 1900 AND 2025", "Released_Year
        plausible range", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete("Released_Year")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete("Series_Title")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("LENGTH(TRIM(`Series_Title`)) > 0", "Series_Title non-empty
        after trim", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness(["Series_Title", "Released_Year"], lambda u: u >=
        0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Released_Year","Year"]':
    code:
    - suggestion: '.satisfies("`Released_Year` RLIKE ''^[0-9]{4}$''", "released_year_four_digits",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Released_Year` AS INT) BETWEEN 1870 AND year(current_date())",
        "released_year_plausible_range", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Runtime","Runtime_Min"]':
    code:
    - suggestion: '.hasPattern("Runtime", "^\\d{2,3} min$", lambda x: x == 1.0, "Runtime
        must be in ''NN[ N] min'' format")'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("regexp_extract(`Runtime`, ''(\\\\d{2,3})'', 1) <> ''''",
        "Runtime_Min parsable from Runtime", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMinLength(''Series_Title'', lambda m: m >= 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Series_Title'', ''^(?i)(?!nan$|none$|null$).+'',
        lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Series_Title'', ''^[^<>]*$'', lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Series_Title'', ''^[^\"]*$'', lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasDistinctness([''Series_Title''], lambda d: d >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
