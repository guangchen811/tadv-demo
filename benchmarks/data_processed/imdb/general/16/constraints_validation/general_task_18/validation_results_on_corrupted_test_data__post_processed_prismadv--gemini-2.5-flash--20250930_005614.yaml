        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("regexp_extract(Runtime, ''([0-9]{2,3})'', 1) IS NOT
        NULL AND CAST(regexp_extract(Runtime, ''([0-9]{2,3})'', 1) AS INT) BETWEEN
        45 AND 240", "Runtime parsed and within bounds", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("regexp_extract(Runtime, ''([0-9]{2,3})'',
