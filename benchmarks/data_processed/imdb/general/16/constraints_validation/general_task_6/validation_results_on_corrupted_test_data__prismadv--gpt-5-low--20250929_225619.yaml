results:
  IMDB_Rating:
    code:
    - suggestion: '.hasCompleteness(''IMDB_Rating'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`IMDB_Rating` IS NULL) OR ((`IMDB_Rating` >= 0) AND
        (`IMDB_Rating` <= 10))'', ''IMDB_Rating within 0-10 when present'', lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''IMDB_Rating'', lambda x: x >= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', lambda x: x >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Certificate","Genre"]':
    code:
    - suggestion: '.satisfies("NOT (upper(Genre) rlike ''(ADULT|EROTIC)'') OR upper(trim(Certificate))
        NOT IN (''U'',''G'',''PG'',''PG-13'',''UA'')", "Adult/explicit genres must
        not have family-allowed certificate", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.satisfies("`Genre` IS NULL OR `Genre` IS NOT NULL", "Genre column
        present", lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Genre'', lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.satisfies("CASE WHEN regexp_replace(`Gross`, '','', '''') RLIKE
        ''^[0-9]*\.?[0-9]+'' THEN CAST(regexp_replace(`Gross`, '','', '''') AS DOUBLE)
        ELSE NULL END > 0", "At least one positive Gross", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Gross` IS NULL THEN 1 WHEN regexp_replace(`Gross`,
        '','', '''') RLIKE ''^[0-9]*\.?[0-9]+'' THEN 1 ELSE 0 END", "Gross parseable
        or null", lambda x: x >= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Gross", lambda x: x >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: '.hasCompleteness(''Poster_Link'', lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Poster_Link'', r''^https?://\S+$'', lambda p: p >=
        0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasDistinctness([''Poster_Link''], lambda d: d >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN lower(`Poster_Link`) IN (''nan'',''none'',''null'')
        OR trim(`Poster_Link`) = '''' THEN 0 ELSE 1 END", ''Poster_Link_no_placeholders'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.satisfies("CAST(`No_of_Votes` AS DOUBLE) IS NOT NULL", "At least
        one numeric No_of_Votes present", lambda x: x >= 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CAST(`No_of_Votes` AS DOUBLE) IS
        NOT NULL", "At least one numeric No_of_Votes present", lambda x: x >= 1)''
        failed on data sample: Value: 0.95 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("(`No_of_Votes` IS NOT NULL) AND (CAST(`No_of_Votes`
        AS DOUBLE) IS NULL OR CAST(`No_of_Votes` AS DOUBLE) < 0 OR CAST(`No_of_Votes`
        AS DOUBLE) != FLOOR(CAST(`No_of_Votes` AS DOUBLE)))", "No_of_Votes must be
        non-negative integers when present", lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`No_of_Votes` AS DOUBLE) IS NULL", "No_of_Votes
        values should be numeric when present", lambda x: x == 0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CAST(`No_of_Votes` AS DOUBLE) IS
        NULL", "No_of_Votes values should be numeric when present", lambda x: x ==
        0)'' failed on data sample: Value: 0.05 does not meet the constraint requirement!'
      level: warning
  '["Poster_Link","Released_Year"]':
    code:
    - suggestion: '.hasUniqueness(columns=[''Poster_Link'', ''Released_Year''], assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(columnCondition=''Released_Year IS NOT NULL AND Released_Year
        >= 1900 AND Released_Year <= year(current_date())'', constraintName=''Released_Year
        within valid historical range'', assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: '.hasCompleteness(''Released_Year'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Released_Year` IS NULL) OR (CAST(`Released_Year`
        AS INT) <= year(current_date()))'', ''No future release years'', lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Released_Year` IS NULL) OR (CAST(`Released_Year`
        AS INT) >= 1900)'', ''Reasonable lower bound for year'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Released_Year` IS NULL) OR (`Released_Year` = TRIM(`Released_Year`))'',
        ''No leading/trailing whitespace in Released_Year'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Runtime'', ''^\\s*\\d+'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(regexp_extract(Runtime, ''^(\\\\d+)'', 1) AS INT)
        > 0", ''Positive runtime'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (Runtime RLIKE ''^[^0-9]*h'')", ''No hours-format
        prefix'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(regexp_extract(Runtime, ''^(\\\\d+)'', 1) AS INT)
        BETWEEN 40 AND 240", ''Runtime in [40,240] minutes'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''LENGTH(TRIM(`Series_Title`)) > 0'', ''Series_Title
        not blank'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
