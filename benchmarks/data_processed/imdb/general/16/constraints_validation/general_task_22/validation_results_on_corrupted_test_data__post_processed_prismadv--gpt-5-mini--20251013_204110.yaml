results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("CASE WHEN `IMDB_Rating` IS NOT NULL THEN 1 ELSE 0 END",
        "IMDB_Rating not null", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `IMDB_Rating` IS NOT NULL AND `IMDB_Rating`
        >= 0 AND `IMDB_Rating` <= 10 THEN 1 ELSE 0 END", "IMDB_Rating in [0,10] and
        finite", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN ABS(ROUND(`IMDB_Rating` * 10) - (`IMDB_Rating`
        * 10)) < 1e-8 THEN 1 ELSE 0 END", "IMDB_Rating quantized to 0.1", lambda x:
        x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NOT NULL THEN 1 ELSE 0 END",
        "Non-null Certificate fraction", lambda x: x >= 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL THEN 1 WHEN (NOT TRIM(`Certificate`)
        LIKE ''[%'' AND NOT TRIM(`Certificate`) LIKE ''{%'' AND LENGTH(TRIM(`Certificate`))
        <= 100) THEN 1 ELSE 0 END", "Certificate basic shape (no JSON/list-like starts,
        reasonable length)", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Certificate","Genre","is_kids_safe"]':
    code:
    - suggestion: '.satisfies("CASE WHEN Certificate IS NOT NULL THEN CASE WHEN Certificate
        IN (\"U\", \"G\", \"PG\", \"TV-PG\", \"UA\", \"PG-13\", \"TV-14\", \"R\",
        \"TV-MA\", \"NC-17\", \"A\", \"Not Rated\", \"Unrated\", \"Approved\", \"Passed\",
        \"U/A\", \"GP\") THEN 1 ELSE 0 END ELSE 1 END", "Certificate values should
        be within known maturity_map keys (allow 99.5% coverage)", lambda x: x >=
        0.995)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.satisfies(''Genre IS NOT NULL'', ''Genre not null'', lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN REGEXP_LIKE(Genre, "^[^,]+(, [^,]+)*$")
        THEN 1 ELSE 0 END'', ''Genre format: comma-space separated tokens'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN NOT REGEXP_LIKE(Genre, "(Animation|Family|Horror|Thriller)")
        THEN 1 WHEN REGEXP_LIKE(Genre, "(^|, )(Animation|Family|Horror|Thriller)(,|$)")
        THEN 1 ELSE 0 END'', ''Canonical tokens for key genres (exact case for Animation/Family/Horror/Thriller)'',
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN NOT REGEXP_LIKE(Genre, ",\\s*$") AND NOT
        REGEXP_LIKE(Genre, "^\\s*,") AND NOT REGEXP_LIKE(Genre, ",\\s*,") THEN 1 ELSE
        0 END'', ''No empty genre tokens (no leading/trailing or repeated delimiters)'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMaxLength(''Genre'', lambda x: x <= 200)'
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.satisfies("CASE WHEN `Gross` IS NOT NULL THEN 1 ELSE 0 END", "Has
        any Gross", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Gross` IS NULL THEN 1 WHEN REGEXP_REPLACE(`Gross`,
        '','', '''') REGEXP ''^[0-9]+$'' THEN 1 ELSE 0 END", "Gross is non-negative
        integer", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: '.hasPattern("Poster_Link", "^https?://.+$", lambda x: x >= 0.95,
        name=''Poster_Link_http_pattern'')'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.satisfies("CASE WHEN `Meta_score` IS NULL OR (`Meta_score` >=
        0 AND `Meta_score` <= 100) THEN 1 ELSE 0 END", "Meta_score_range_0_100", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Meta_score` IS NULL THEN CASE WHEN `IMDB_Rating`
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Meta_missing_imdb_present", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Meta_score", lambda x: x >= 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Meta_score` IS NULL OR NOT (`Meta_score`
        IN (''Infinity'',''-Infinity'',''inf'',''-inf'')) THEN 1 ELSE 0 END", "Meta_score_no_infs",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.satisfies(''CASE WHEN try_cast(`No_of_Votes` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END'', ''No_of_Votes is numeric'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN try_cast(`No_of_Votes`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END'', ''No_of_Votes is numeric'', lambda
        x: x >= 0.99)'' failed on data sample: Value: 0.95 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.satisfies(''CASE WHEN `No_of_Votes` >= 0 OR `No_of_Votes` IS NULL
        THEN 1 ELSE 0 END'', ''No_of_Votes non-negative'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasApproxQuantile(''No_of_Votes'', 0.6, lambda q: q > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''No_of_Votes'', lambda c: c >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''No_of_Votes'', lambda c: c
        >= 0.99)'' failed on data sample: Value: 0.95 does not meet the constraint
        requirement!'
      level: warning
  Released_Year:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Released_Year` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "Released_Year is numeric/parseable", lambda x: x
        >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Released_Year` IS NULL THEN 1 WHEN FLOOR(CAST(`Released_Year`
        AS DOUBLE)) = CAST(`Released_Year` AS DOUBLE) THEN 1 ELSE 0 END", "Released_Year
        is integer-valued (no fractional years)", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Released_Year` IS NULL THEN 1 WHEN CAST(`Released_Year`
        AS DOUBLE) BETWEEN 1870 AND 2026 THEN 1 ELSE 0 END", "Released_Year in plausible
        range [1870, 2026]", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Released_Year", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: '.satisfies("CASE WHEN CAST(REGEXP_EXTRACT(`Runtime`, ''([0-9]{2,3})'')
        AS INT) BETWEEN 10 AND 999 THEN 1 ELSE 0 END", "Runtime_minutes_in_range",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.satisfies("CASE WHEN trim(coalesce(`Series_Title`, '''')) <> ''''
        THEN 1 ELSE 0 END", "Series_Title non-empty fraction", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
