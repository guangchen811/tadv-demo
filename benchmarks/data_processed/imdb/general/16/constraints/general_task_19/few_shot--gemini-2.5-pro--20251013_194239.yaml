constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['U', 'UA', 'A', 'G', 'PG', 'PG-13', 'R', 'NC-17',
        'Not Rated', 'Unrated', 'Passed', 'Approved'])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isContainedIn('IMDB_Rating', lowerBound=0.0, upperBound=10.0)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .compliesWithPattern('Runtime', r'^\\d+ min$')
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - '.addConstraint(Constraint.uniqueness([''Series_Title'', ''Released_Year''],
        lambda x: x == 1.0))'
      - Invalid
    assumptions: []
