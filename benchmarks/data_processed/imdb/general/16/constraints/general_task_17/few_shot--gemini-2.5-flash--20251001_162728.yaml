constraints:
  Certificate:
    code:
    - - .isDataType('Certificate', ConstrainableDataTypes.String, 0.9)
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    - - .isDataType('Genre', ConstrainableDataTypes.String)
      - Invalid
    - - .isNonEmpty('Genre')
      - Invalid
    - - .satisfies("CASE WHEN array_size(filter(split(Genre, ','), x -> trim(x) !=
        '')) > 0 THEN trim(element_at(filter(split(Genre, ','), x -> trim(x) != ''),
        0)) != 'Short' ELSE TRUE END", "Primary genre is not 'Short' when genres are
        present")
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .isDataType('Gross', ConstrainableDataTypes.String, 0.8)
      - Invalid
    - - .satisfies("Gross IS NULL OR CAST(regexp_replace(Gross, ',', '') AS BIGINT)
        >= 0", "Gross values are non-negative for non-null entries")
      - Valid
    - - .satisfies("Gross IS NULL OR regexp_replace(Gross, ',', '') RLIKE '^[0-9]+$'",
        "Gross values are purely digits after comma removal for non-null entries")
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isContainedIn('IMDB_Rating', 0.0, 10.0)
      - Invalid
    - - .isDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isDataType('Released_Year', ConstrainableDataTypes.Integral)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .isComplete('Runtime')
      - Valid
    - - .isDataType('Runtime', ConstrainableDataTypes.String)
      - Invalid
    - - .matchesPattern('Runtime', r'.*\\d+.*')
      - Invalid
    - - .satisfies("CAST(regexp_extract(Runtime, '(\\d+)', 1) AS INT) BETWEEN 60 AND
        210", "Parsed runtime is between 60 and 210 minutes")
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    - - .isDataType('Series_Title', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - .hasUniqueness(['Series_Title', 'Released_Year'])
      - Invalid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    - - .isDataType('Star1', ConstrainableDataTypes.String)
      - Invalid
    - - .satisfies("trim(Star1) != '' AND trim(Star1) != 'nan'", "Star1 is non-empty
        and not 'nan'")
      - Valid
    assumptions: []
  Star1, Star2, Star3, Star4:
    code:
    - - .satisfies("trim(Star1) != trim(Star2) AND trim(Star1) != trim(Star3) AND
        trim(Star1) != trim(Star4) AND trim(Star2) != trim(Star3) AND trim(Star2)
        != trim(Star4) AND trim(Star3) != trim(Star4)", "All star names are distinct
        within a row")
      - Invalid
    assumptions: []
  Star2:
    code:
    - - .isComplete('Star2')
      - Valid
    - - .isDataType('Star2', ConstrainableDataTypes.String)
      - Invalid
    - - .satisfies("trim(Star2) != '' AND trim(Star2) != 'nan'", "Star2 is non-empty
        and not 'nan'")
      - Valid
    assumptions: []
  Star3:
    code:
    - - .isComplete('Star3')
      - Valid
    - - .isDataType('Star3', ConstrainableDataTypes.String)
      - Invalid
    - - .satisfies("trim(Star3) != '' AND trim(Star3) != 'nan'", "Star3 is non-empty
        and not 'nan'")
      - Valid
    assumptions: []
  Star4:
    code:
    - - .isComplete('Star4')
      - Valid
    - - .isDataType('Star4', ConstrainableDataTypes.String)
      - Invalid
    - - .satisfies("trim(Star4) != '' AND trim(Star4) != 'nan'", "Star4 is non-empty
        and not 'nan'")
      - Valid
    assumptions: []
