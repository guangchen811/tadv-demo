    - text: 'GenreTokens must be a normalized decomposition of Genre: splitting Genre
        by commas and trimming whitespace must exactly produce GenreTokens (order
        preserved, no additions or omissions). Equivalently, joining GenreTokens with
        '', '' after trimming should reproduce a normalized Genre string.'
