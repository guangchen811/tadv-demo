      uid: ae6aaee8-acac-44f0-b2c8-5f260b517f86
    - text: 'Within each (Decade_Label, GenreToken) group in the ranked output, Rank
        must be unique and within [1, 10]. Represent as: .isUnique(["Decade_Label",
        "GenreToken", "Rank"]) and .satisfies("Rank >= 1 AND Rank <= 10", ''Rank bounds
        for top-K'').'
      sources:
      - start_line: 161
        end_line: 168
        file: ''
      - start_line: 184
        end_line: 199
        file: ''
      uid: 997d26fb-bf59-4f85-9473-94f71bdc948c
  '["Runtime","Runtime_Min"]':
    code: []
    assumptions:
    - text: "Runtime must be a 2\u20133 digit number followed by a space and 'min'\
        \ (e.g., '123 min'), and Runtime_Min must equal the integer extracted from\
        \ Runtime. Both columns should be non-null and consistent. Representable constraints:\
        \ .hasPattern('Runtime', '^\\\\d{2,3} min$'), .isNonNull('Runtime_Min'), and\
        \ a compliance check such as Runtime_Min = CAST(regexp_extract(Runtime, '(\\\
        \\d{2,3})', 1) AS INT)."
      sources:
      - start_line: 93
        end_line: 95
        file: ''
      - start_line: 108
        end_line: 110
        file: ''
      uid: 54a7225f-d583-4311-9581-e220546a79c2
    - text: 'Runtime and Runtime_Min should have matching nullability: if Runtime
        is present then Runtime_Min is present, and vice versa. Representable as a
        compliance constraint: (Runtime IS NULL) = (Runtime_Min IS NULL) and, given
        expected parsing success, both should be non-null.'
      sources:
      - start_line: 108
        end_line: 110
        file: ''
      - start_line: 144
        end_line: 148
        file: ''
      uid: 7ec1b1eb-cf00-439c-ae85-c31026e12bde
    - text: "When Runtime matches the expected pattern, the extracted Runtime_Min\
        \ must be between 10 and 999 inclusive (consistent with the 2\u20133 digit\
        \ runtime domain). Representable as a compliance constraint that couples the\
        \ two columns: (Runtime rlike '^\\\\d{2,3} min$') => (Runtime_Min >= 10 AND\
        \ Runtime_Min <= 999)."
      sources:
      - start_line: 108
        end_line: 110
        file: ''
      uid: 413bf499-f5a0-4e57-add5-f598788e5787
    - text: 'In the published top_k output, any row included (Rank <= TOP_K) must
        have a non-null Score, because rows are sorted and rendered using Rank and
        Score. Representable as a conditional completeness: (Rank IS NOT NULL) AND
        (Rank <= 10) => (Score IS NOT NULL).'
      sources:
      - start_line: 162
        end_line: 168
        file: ''
      - start_line: 172
        end_line: 176
        file: ''
      - start_line: 73
        end_line: 74
        file: ''
      uid: b11c5163-b8bd-4b7b-9244-98427826f017
    - text: 'Within each (Decade_Label, GenreToken) group, Rank values must be unique
        and correspond to a strict ordering by descending Score (i.e., higher Score
        cannot have a larger Rank than a lower Score). Representable constraints:
        .isUnique(["Decade_Label", "GenreToken", "Rank"]) and a compliance check that
        for any two rows in the same group, Score1 > Score2 implies Rank1 < Rank2.'
      sources:
      - start_line: 162
        end_line: 164
        file: ''
      - start_line: 166
        end_line: 168
        file: ''
      - start_line: 73
        end_line: 74
        file: ''
      uid: 1012a78e-12ab-4320-811e-dcdef8eab0ad
    - text: 'For rows emitted to outputs, the textual Runtime and the numeric Runtime_Min
        should be consistent: converting Runtime_Min back to text as ''<Runtime_Min>
        min'' should equal Runtime. This ensures cross-column consistency between
        human-readable and numeric forms.'
      sources:
      - start_line: 108
        end_line: 110
        file: ''
      - start_line: 172
        end_line: 176
        file: ''
      - start_line: 193
        end_line: 193
        file: ''
