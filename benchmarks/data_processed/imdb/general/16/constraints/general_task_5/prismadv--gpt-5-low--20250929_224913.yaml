        Gross RLIKE ''^[0-9]{1,3}(,[0-9]{3})*$'' THEN Gross_Num IS NOT NULL AND Gross_Num
        = CAST(REPLACE(Gross, '','', '''') AS DOUBLE) ELSE TRUE END", ''gross_to_num_consistency'').'
