  Runtime:
    code:
    - suggestion: '.satisfies("NOT(Released_Year RLIKE ''^[0-9]{4}$'') OR (Runtime
        IS NOT NULL AND TRIM(Runtime) <> '''')", "Runtime present for rows with valid
        Released_Year", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
