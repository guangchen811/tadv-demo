    - text: Within each (Decade_Label, GenreToken) group, the combination of Series_Title
        and Year should be unique (no duplicate title-year entries per genre and decade)
        to ensure stable ranking. This can be represented as an isUnique constraint
        on ["Decade_Label", "GenreToken", "Series_Title", "Year"] on the exploded
        DataFrame.
      sources:
