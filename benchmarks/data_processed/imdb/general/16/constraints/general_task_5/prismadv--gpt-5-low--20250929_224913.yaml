  '["Released_Year","Year"]':
    code: []
    assumptions:
    - text: 'Released_Year must be a 4-digit numeric string and Year must equal the
        integer value of Released_Year for all retained rows. This can be represented
        as a constraint like: .satisfies("Released_Year RLIKE ''^\\d{4}$'' AND Year
        = CAST(Released_Year AS INT)", ''Year matches Released_Year'').'
      sources:
