  '["Genre","GenreTokens"]':
    code: []
    assumptions:
    - text: Genre is a comma-separated list of non-empty tokens, and after trimming
        whitespace each token must belong to a fixed allowed set {Action, Adventure,
        Animation, Biography, Comedy, Crime, Drama, Family, Fantasy, Film-Noir, History,
        Horror, Music, Musical, Mystery, Romance, Sci-Fi, Sport, Thriller, War, Western}.
