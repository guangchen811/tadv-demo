      uid: 128b8dd9-bf32-421a-94d6-e0b421795761
    - text: 'Decade_Label must be consistent with Year: Decade_Label should equal
        CONCAT(CAST(FLOOR(Year/10)*10 AS STRING), ''s''). This can be represented
        as: .satisfies("Decade_Label = CONCAT(CAST(FLOOR(Year/10)*10 AS STRING), ''s'')",
        ''Decade_Label matches Year'').'
      sources:
      - start_line: 103
        end_line: 105
        file: ''
      - start_line: 68
        end_line: 70
        file: ''
      uid: fc595363-6154-4d19-937d-06cdb46c01cb
    - text: 'The combination of Series_Title and Year should be unique across all
        records to avoid duplicate HTML ids/slugs. Represent as: .isUnique(["Series_Title",
        "Year"]).'
      sources:
      - start_line: 17
        end_line: 19
        file: ''
