    assumptions:
    - text: The Released_Year column must exist in the input data. Downstream code
        unconditionally references df['Released_Year'] and derives Year/Decade from
        it.
      sources:
      - start_line: 97
        end_line: 103
        file: ''
      uid: 5f6fff71-d38b-4213-9f76-4320d0aff40a
    - text: 'At least 95% of Released_Year values should be exactly 4 numeric digits
        after trimming (regex ^\d{4}$). Rows that do not match are dropped before
        further processing, so a high match rate is required to retain sufficient
        data. Example constraint: Deequ satisfies("CASE WHEN regexp_like(Released_Year,
        ''^\\d{4}$'') THEN 1 ELSE 0 END", "Released_Year_4_digits", lambda x: x >=
        0.95) or Great Expectations expect_column_values_to_match_regex with mostly
        >= 0.95.'
      sources:
      - start_line: 97
        end_line: 103
        file: ''
      uid: 433847ff-ea36-4e5c-9e43-e7f0f457c5e3
    - text: 'At least 95% of Released_Year should be non-null (prior to string casting),
        because nulls become the string ''nan'' and will be filtered out by the 4-digit
        check, causing row loss. Example constraint: Deequ satisfies("CASE WHEN Released_Year
        IS NOT NULL THEN 1 ELSE 0 END", "Released_Year_not_null", lambda x: x >= 0.95)
        or Great Expectations expect_column_values_to_not_be_null with mostly >= 0.95.'
      sources:
      - start_line: 97
        end_line: 103
        file: ''
      uid: 39d166c8-440f-4d49-979d-e2f89bba330a
    - text: 'Released_Year values that pass the 4-digit check must be parseable to
        integer (used to create Year). Example constraint: Deequ satisfies("CASE WHEN
        regexp_like(Released_Year, ''^\\d{4}$'') AND cast(Released_Year as int) IS
        NOT NULL THEN 1 ELSE 0 END", "Released_Year_parseable_int", lambda x: x ==
        1.0) or Great Expectations expect_column_values_to_match_regex ''^\d{4}$''
        followed by parsing in a custom check.'
      sources:
