  '["Gross_Num","Gross_Tie"]':
    code: []
    assumptions:
    - text: 'Gross_Tie must be fully defined and bounded in [0, 1] whenever any Gross_Num
        value exists. Specifically: if any row has Gross_Num not null, then for all
        rows Gross_Tie is not null and 0.0 <= Gross_Tie <= 1.0. This follows from
        Gross_Tie = log1p(Gross_Num_filled) / max(log1p(Gross_Num_filled)), where
        null Gross_Num are median-imputed before transformation.'
      sources:
      - start_line: 151
        end_line: 154
        file: ''
      - start_line: 121
        end_line: 121
        file: ''
      uid: 5e4e68aa-d3e1-40b1-8248-a19a3127c564
    - text: If all Gross_Num values are null in the dataset, then Gross_Tie must equal
        0.0 for every row.
      sources:
      - start_line: 151
        end_line: 156
        file: ''
      uid: 41a2ce16-1db0-4aa2-b911-ac2f5b5382c1
    - text: 'Monotonic consistency between Gross_Num and Gross_Tie: for any two rows
        where both Gross_Num are non-null, if Gross_Num_a > Gross_Num_b then Gross_Tie_a
        >= Gross_Tie_b (log1p and max-normalization are monotonic).'
      sources:
      - start_line: 151
        end_line: 154
        file: ''
      - start_line: 121
        end_line: 121
        file: ''
      uid: cc1b513f-917e-41c3-892b-806dbb666aea
    - text: 'Within each (Decade_Label, GenreToken) group, Rank must be consistent
        with Score and then Gross_Tie ordering: if Score_i > Score_j then Rank_i <
        Rank_j; if Score_i == Score_j and Gross_Tie_i > Gross_Tie_j then Rank_i <
        Rank_j. Ranks are unique within each group.'
      sources:
      - start_line: 162
        end_line: 164
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 198
        end_line: 199
        file: ''
      uid: 467ffed4-81cf-48d6-ba14-562e550df4c5
    - text: 'Gross_Num is the numeric parse of Gross: if Gross matches the pattern
        ^[0-9,]+$ (digits and commas only), then Gross_Num must be non-null and equal
        to Gross with commas removed parsed as number; if Gross is non-parseable (e.g.,
        violates the pattern), Gross_Num should be null.'
      sources:
      - start_line: 119
        end_line: 121
        file: ''
      uid: ba341bb5-2f4e-401e-a54b-419c98bc0db6
  '["IMDB_Rating","Meta_score","No_of_Votes","Runtime_Min","Score"]':
    code: []
    assumptions:
    - text: "Score is a deterministic function of IMDB_Rating, Meta_score, No_of_Votes,\
        \ and Runtime_Min. Specifically: Score \u2248 (0.6*(IMDB_Rating/10) + 0.25*(Meta_score/100)\
        \ + 0.15*(log10(max(No_of_Votes,1))/6)) * clip(1 - abs(Runtime_Min - 120)/300,\
        \ 0.8, 1.05). This can be enforced with a multi-column rule (with a small\
        \ epsilon tolerance) such as a Deequ satisfies constraint over these columns."
      sources:
      - start_line: 139
        end_line: 148
        file: ''
      - start_line: 144
        end_line: 145
        file: ''
      - start_line: 142
        end_line: 142
        file: ''
      uid: c1b13d58-6fe4-435e-b786-f182b7798259
    - text: 'Within each (Decade_Label, GenreToken) group, Rank reflects ordering
        by Score with Gross_Tie as the tie-breaker: if two rows have equal Score,
        the one with higher Gross_Tie must have a smaller (better) Rank. This can
        be checked by asserting that, per (Decade_Label, GenreToken), sorting by (Score
        desc, Gross_Tie desc) yields strictly increasing Rank starting from 1.'
      sources:
      - start_line: 162
        end_line: 164
        file: ''
      - start_line: 151
        end_line: 156
        file: ''
      uid: eec1719d-83fc-4dcf-871d-c98242478b63
    - text: 'Within each (Decade_Label, GenreToken) group, Rank values are unique
        and form a contiguous sequence starting at 1 up to TOP_K for the emitted top_k
        subset. Enforce via: isUnique([Decade_Label, GenreToken, Rank]) on top_k and
        a conditional check that max(Rank) == count(distinct Rank) and min(Rank) ==
        1 per group.'
      sources:
      - start_line: 164
        end_line: 167
        file: ''
      uid: 11ef9ba0-04e6-4f89-9fd9-150d1a01f0bf
    - text: 'For rows included in top_k (Rank <= TOP_K), Score must be non-null, which
        implicitly requires IMDB_Rating, No_of_Votes, and Runtime_Min to be non-null
        numeric (since missing values in these inputs would yield NaN Score and thus
        NaN Rank, excluding the row from top_k). Enforce with a conditional completeness
        constraint: if Rank is not null then IMDB_Rating, No_of_Votes, Runtime_Min,
        and Score are all non-null.'
      sources:
      - start_line: 147
        end_line: 148
        file: ''
      - start_line: 167
        end_line: 167
        file: ''
      - start_line: 113
        end_line: 115
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: 464eba8f-0e40-47fb-8238-5b994bc460ac
    - text: 'Decade_Label must be consistent with Year: Decade_Label == str(((Year
        // 10) * 10)) + ''s''. Enforce via a satisfies constraint comparing Decade_Label
        to the derived label from Year.'
      sources:
      - start_line: 103
        end_line: 105
        file: ''
      uid: 8d848951-dd01-4608-bdeb-41c4bb72fbc2
    - text: Runtime_Min must equal the integer minutes extracted from Runtime, with
        Runtime matching the pattern '\d{2,3} min'. Enforce by asserting Runtime matches
        the pattern and Runtime_Min == int(extract(Runtime)).
      sources:
      - start_line: 108
        end_line: 110
        file: ''
      uid: 219c5891-272c-4681-9666-09840c243aba
    - text: 'For every (Decade_Label, GenreToken) group, the ordering used for output
        rendering is consistent: sorting by (Rank asc, Score desc) should reproduce
        the same order implied by Rank (i.e., lower Rank precedes higher Rank; when
        Rank ties are impossible, secondary Score should not contradict Rank). Enforce
        via a check that within each group, Rank is strictly increasing in the sequence
        used for rendering.'
      sources:
