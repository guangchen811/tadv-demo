    - text: "After exploding GenreTokens into GenreToken, every record used downstream\
        \ must have a non-null GenreToken and it must be within the allowed genre\
        \ domain. This supports grouping and ranking by (Decade_Label, GenreToken).\
        \ In Deequ terms: completeness('GenreToken') == 1.0 on the exploded DataFrame\
        \ and compliance that GenreToken \u2208 allowed set."
