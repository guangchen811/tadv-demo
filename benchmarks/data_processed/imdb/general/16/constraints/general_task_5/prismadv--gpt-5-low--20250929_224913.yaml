      uid: 0e58d21c-17e3-49cf-8c41-2fed41387b96
      source_assumptions:
      - e5673dfa-2beb-465b-a5c3-dc97c5bb1745
    - suggestion: '.satisfies("NOT(Released_Year RLIKE ''^[0-9]{4}$'') OR (Runtime
        RLIKE ''^[0-9]{2,3} min$'')", "Runtime exact pattern (DD or DDD + space +
        ''min'') for valid Released_Year rows", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: c517aaa6-cc64-46ed-b29c-d55de5f624f9
      source_assumptions:
      - e150181a-8ac2-4909-b1c8-4f0b361ad771
      - a03d129d-e665-41f7-a397-e79248b6b84e
    - suggestion: '.satisfies("NOT(Released_Year RLIKE ''^[0-9]{4}$'') OR (CAST(regexp_extract(Runtime,
        ''([0-9]{2,3})'', 1) AS INT) IS NOT NULL)", "Runtime minutes parseable to
        INT for valid Released_Year rows", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: af036ea8-e450-416d-8977-6532ea41fc4d
      source_assumptions:
      - a63a2f12-83c2-4b01-bc26-9194f66c52c9
    assumptions:
    - text: 'Runtime must be present (non-null and non-empty after trimming) for all
        rows retained for processing (i.e., rows with a valid 4-digit Released_Year),
        because the code converts it to string, strips it, and then immediately parses
        it to integer minutes without handling missing values. This implies 100% completeness
        is required on Runtime for the processed input. Example rule: completeness(''Runtime'')
        == 1.0 (applied after filtering to 4-digit Released_Year).'
      sources:
      - start_line: 101
        end_line: 105
        file: ''
      - start_line: 93
        end_line: 95
        file: ''
      - start_line: 108
        end_line: 111
        file: ''
      uid: e5673dfa-2beb-465b-a5c3-dc97c5bb1745
    - text: 'Runtime must match the exact pattern: two or three digits followed by
        a single space and the lowercase unit ''min'' (e.g., ''95 min'', ''123 min'').
        No other formats (e.g., ''mins'', ''MIN'', ''h'', or missing space) are accepted.
        Example rule: fraction of values matching regex ^\d{2,3} min$ == 1.0.'
      sources:
      - start_line: 108
        end_line: 110
        file: ''
      uid: e150181a-8ac2-4909-b1c8-4f0b361ad771
    - text: 'Runtime must be fully parseable to an integer minute count for every
        processed row, because the code extracts the digits and casts them to int
        without null handling. Example rule: apply regex extraction of (\d{2,3}) and
        require that the resulting numeric is non-null for 100% of rows.'
      sources:
      - start_line: 110
        end_line: 110
        file: ''
      uid: a63a2f12-83c2-4b01-bc26-9194f66c52c9
    - text: 'Runtime is expected to be in minutes (not hours or other units) and preserved
        as the original trimmed string in outputs (CSV and JSON). Therefore, unit
        normalization to minutes with the exact '' min'' suffix is required in the
        input. Example rule: regex ^\d{2,3} min$ must hold for all values.'
      sources:
      - start_line: 108
        end_line: 111
        file: ''
      - start_line: 172
        end_line: 176
        file: ''
      - start_line: 193
        end_line: 193
        file: ''
