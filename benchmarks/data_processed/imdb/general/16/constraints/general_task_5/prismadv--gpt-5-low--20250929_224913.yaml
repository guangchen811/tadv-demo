        end_line: 74
        file: ''
      - start_line: 185
        end_line: 199
        file: ''
      - start_line: 164
        end_line: 164
        file: ''
      uid: 50419c89-e74c-44bf-b12c-fa9ad05391b0
    - text: In the emitted CSV, the tuple (Decade_Label, GenreToken, Rank, Series_Title,
