constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda c: c >= 0.85)'
      - Valid
    - - .isContainedIn('Certificate', ['G','PG','PG-13','R','NC-17','U','UA','A','12','12A','15','18'])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .hasPattern('Genre', r'^(Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western)(,\s*(Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western))*$',
        matchRate=1.0)
      - Invalid
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda c: c >= 0.82)'
      - Valid
    - - .hasPattern('Gross', r'^\d{1,3}(,\d{3})*$', matchRate=0.80)
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda c: c >= 0.85)'
      - Valid
    - - '.hasMax(''Meta_score'', lambda v: v <= 100.0)'
      - Valid
    - - '.hasMin(''Meta_score'', lambda v: v >= 0.0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .hasPattern('No_of_Votes', r'^\d+$', matchRate=1.0)
      - Invalid
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - '.hasCompleteness(''Overview'', lambda c: c >= 0.99)'
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', r'^https?://', matchRate=1.0)
      - Invalid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMax(''Released_Year'', lambda v: v <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      - Valid
    - - .hasPattern('Released_Year', r'^\d{4}$', matchRate=1.0)
      - Invalid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^\d{2,3} min$', matchRate=1.0)
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - '.hasCompleteness(''id'', lambda c: c >= 0.99)'
      - Valid
    - - '.hasUniqueness([''id''], lambda u: u >= 0.95)'
      - Valid
    assumptions: []
