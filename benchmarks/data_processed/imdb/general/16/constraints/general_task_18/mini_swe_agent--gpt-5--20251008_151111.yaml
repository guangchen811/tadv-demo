raw_constraints:
- column_name: IMDB_Rating
  code_for_constraint: .isComplete('IMDB_Rating')
- column_name: IMDB_Rating
  code_for_constraint: .isNonNegative('IMDB_Rating')
- column_name: IMDB_Rating
  code_for_constraint: '.hasMax(''IMDB_Rating'', lambda x: x <= 10.0)'
- column_name: No_of_Votes
  code_for_constraint: .isComplete('No_of_Votes')
- column_name: No_of_Votes
  code_for_constraint: .isNonNegative('No_of_Votes')
- column_name: Runtime
  code_for_constraint: .isComplete('Runtime')
- column_name: Runtime
  code_for_constraint: .hasPattern('Runtime', r'^\s*\d{2,3}\s*.*$')
- column_name: Runtime
  code_for_constraint: '.satisfies("cast(regexp_extract(Runtime, ''(\\d{2,3})'', 1)
    as int) >= 45 AND cast(regexp_extract(Runtime, ''(\\d{2,3})'', 1) as int) <= 240",
    ''runtime_minutes_in_range'', lambda d: d == 1.0)'
- column_name: Gross
  code_for_constraint: '.satisfies("Gross IS NULL OR Gross RLIKE ''^[0-9,]+$''", ''gross_format'',
    lambda d: d == 1.0)'
- column_name: Meta_score
  code_for_constraint: '.hasMin(''Meta_score'', lambda x: x >= 0.0)'
- column_name: Meta_score
  code_for_constraint: '.hasMax(''Meta_score'', lambda x: x <= 100.0)'
- column_name: Series_Title
  code_for_constraint: .isComplete('Series_Title')
- column_name: Released_Year
  code_for_constraint: .isComplete('Released_Year')
- column_name: Released_Year
  code_for_constraint: .hasDataType('Released_Year', ConstrainableDataTypes.Integral)
- column_name: Series_Title,Released_Year
  code_for_constraint: .isUnique(['Series_Title', 'Released_Year'])
