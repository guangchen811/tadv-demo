        end_line: 44
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      - start_line: 92
        end_line: 92
        file: ''
      - start_line: 103
        end_line: 103
        file: ''
      uid: 53db525d-566e-494c-a0ad-2786e996eef1
    - text: 'The ''IMDB_Rating'' column values are expected to be on a scale of 0.0
        to 10.0. This is strongly implied by the normalization step where the column
        is divided by 10.0 to scale it for use in the ''PopularityIndex'' calculation.
        Values outside this range would result in a skewed index and incorrect rankings.

        We could represent this assumption as a deequ constraint like this:

        .isContainedIn("IMDB_Rating", 0.0, 10.0)'
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      uid: d75d65c2-779b-4744-a92d-1200eac70cf1
    - text: 'The ''IMDB_Rating'' column is expected to have some variance (more than
        one distinct value). This is required for the correlation and linear regression
        calculations (lines 67-77) to be meaningful. If all values are the same, the
        resulting model for imputing ''Meta_score'' would be trivial and potentially
        misleading.

        We could represent this assumption as a deequ constraint like this:

        .hasStandardDeviation("IMDB_Rating", lambda sd: sd > 0.0)'
      sources:
      - start_line: 67
        end_line: 77
        file: ''
      uid: 90ba54f9-739c-4370-aa02-83861c9c1062
