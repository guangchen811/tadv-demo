      - start_line: 67
        end_line: 71
        file: ''
      - start_line: 88
        end_line: 92
        file: ''
      uid: 286a41e0-440c-4af6-84e4-a0863c98ca64
    - text: 'The metrics ''IMDB_Rating'', ''No_of_Votes'', and ''Gross'' are assumed
