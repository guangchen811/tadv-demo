    - text: 'The numerical values extracted from the ''Runtime'' column are expected
        to be within the range of 45 to 240. The `runtime_factor` function is specifically
        designed to handle values within this range, applying a scoring penalty to
        movies outside the optimal 90-150 minute window. While values outside the
        [45, 240] range will not crash the script, they are treated as outliers and
        receive a minimum scoring factor, suggesting they are not expected to be common.

        We could represent this assumption as a deequ constraint like this:

