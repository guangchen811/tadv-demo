constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['G', 'PG', 'PG-13', 'R', 'NC-17', 'U', 'UA',
        'A', '12', '12A', '15', '18', None])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .hasPattern('Genre', r'^[A-Za-z-](?:, [A-Za-z-]+)*$')
      - Invalid
    assumptions: []
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda x: x > 0.8)'
      - Valid
    - - .satisfies("Gross IS NULL OR Gross RLIKE '^\\\\d{1,3}(?:,\\\\d{3})*$'", 'Gross
        column should be a comma-separated number')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .satisfies('IMDB_Rating >= 0.0 AND IMDB_Rating <= 10.0', 'IMDB_Rating is within
        range [0, 10]')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda x: x > 0.8)'
      - Valid
    - - .satisfies('Meta_score IS NULL OR (Meta_score >= 0 AND Meta_score <= 100)',
        'Meta_score is within range [0, 100]')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', r'^https://.*')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .hasPattern('Released_Year', r'^\\d{4}$')
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^\\d+ min$')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - '.hasUniqueness(''id'', lambda x: x > 0.98)'
      - Invalid
    - - .isComplete('id')
      - Valid
    assumptions: []
