constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['U', 'UA', 'A', 'G', 'PG', 'PG-13', 'R', 'NC-17',
        'Not Rated', 'Unrated', 'Passed', 'Approved'])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', '^https?://')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMax(''Released_Year'', lambda v: v <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', '^[0-9]+\\s*min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda u: u == 1.0)'
      - Valid
    assumptions: []
