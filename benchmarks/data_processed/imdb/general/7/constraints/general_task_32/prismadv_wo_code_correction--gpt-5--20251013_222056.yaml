        end_line: 55
        file: ''
      - start_line: 24
        end_line: 24
        file: ''
      uid: 4b294cc8-c7f1-4e0a-80c2-3e7a7ed8aaf6
    - text: 'IMDB_Rating values should be finite numbers (no NaN/Infinity) for rows
        that may be featured; otherwise, ranking_score becomes NaN or Infinity and
        the HTML rendering may show ''nan''/''inf'' or invalid widths. This can be
        checked with a validity predicate such as: CASE WHEN IMDB_Rating IS NULL OR
        NOT(isfinite(IMDB_Rating)) THEN 0 ELSE 1 END >= threshold (preferably 1.0
        for featured candidates).'
