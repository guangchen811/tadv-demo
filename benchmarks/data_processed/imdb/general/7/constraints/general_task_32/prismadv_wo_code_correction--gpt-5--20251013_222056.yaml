        file: ''
      uid: 1c241852-33c0-47cf-8641-e2a7779214f0
    - text: 'To reliably produce TOP_N=12 featured cards without NaN/invalid rating
        displays, the input should have at least 12 rows where IMDB_Rating is numeric
        and finite (i.e., not null, not NaN/Inf). This ensures ranking_score is valid
        and star_fill_pct can be computed. This can be represented as: count_valid(IMDB_Rating)
        >= 12 (e.g., via a completeness/validity check ensuring the number or fraction
        of finite, non-null values is at least 12 or 12/row_count).'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 33
        end_line: 34
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
      - start_line: 55
        end_line: 55
        file: ''
      uid: 2e6f4497-6b4c-4c1b-a2c1-a3b3f7779587
    - text: "IMDB_Rating values should be within the standard 0 to 10 scale. Values\
        \ outside this range would distort the mean C and the weighted ranking, and\
        \ lead to inconsistent UI (star_fill_pct assumes 0\u201310 by multiplying\
        \ by 10 and clamping to 0\u2013100). A suitable rule: IMDB_Rating between\
        \ 0 and 10 inclusive (e.g., Great Expectations expect_column_values_to_be_between\
        \ with min_value=0, max_value=10)."
