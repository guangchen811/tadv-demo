    assumptions:
    - text: 'The ''Gross'' column can contain nulls or non-numeric strings, and these
        will be treated as 0 during processing. However, at least one row must contain
        a positive, parseable numeric ''Gross'' value (after removing commas) so that
        the gross-based feature contributes meaningfully. We could represent this
        as a deequ constraint like: .satisfies("CASE WHEN regexp_replace(`Gross`,
        '','', '''') RLIKE ''^[0-9]*\.?[0-9]+'' THEN CAST(regexp_replace(`Gross`,
        '','', '''') AS DOUBLE) ELSE NULL END > 0", "At least one positive Gross",
        lambda x: x > 0)'
      sources:
      - start_line: 41
        end_line: 43
        file: ''
      - start_line: 58
        end_line: 63
        file: ''
      uid: c7941fed-d5cc-466c-a407-753d4d80e345
    - text: 'Gross values are expected to be numeric amounts possibly formatted with
        thousands separators (commas) and no currency symbols; values should be parseable
        to numbers after removing commas. A practical validation is that a strong
        majority of non-null values are parseable. For example (adjust threshold as
        needed to your tolerance): .satisfies("CASE WHEN `Gross` IS NULL THEN 1 WHEN
        regexp_replace(`Gross`, '','', '''') RLIKE ''^[0-9]*\.?[0-9]+'' THEN 1 ELSE
        0 END", "Gross parseable or null", lambda x: x >= 0.8)'
      sources:
      - start_line: 41
        end_line: 43
        file: ''
      - start_line: 58
        end_line: 63
        file: ''
      uid: 39674ced-33cf-4b91-9666-531d1ec1b9f2
    - text: 'Negative ''Gross'' values should not appear; if present they are ignored
        in scoring. Enforce that all parseable numeric Gross values are >= 0. Deequ-style:
        .satisfies("CASE WHEN regexp_replace(`Gross`, '','', '''') RLIKE ''^[0-9]*\.?[0-9]+''
        THEN CAST(regexp_replace(`Gross`, '','', '''') AS DOUBLE) ELSE NULL END >=
        0", "Non-negative Gross", lambda x: x == 1.0)'
      sources:
      - start_line: 59
        end_line: 61
        file: ''
      uid: cbb5d1e3-c25e-48ce-a88e-b01e6d5c876d
    - text: "To avoid degenerate scaling (all zeros after normalization), there should\
        \ be at least two distinct positive numeric 'Gross' values (after removing\
        \ commas). This ensures the min\u2013max computation has non-zero range. One\
        \ way to express this: check distinct count over positive parsed values >=\
        \ 2. For example: .satisfies(\"CASE WHEN regexp_replace(`Gross`, ',', '')\
        \ RLIKE '^[0-9]*\\.?[0-9]+' AND CAST(regexp_replace(`Gross`, ',', '') AS DOUBLE)\
        \ > 0 THEN 1 ELSE 0 END\", \"At least two positive Gross values\", lambda\
        \ x: x >= (2.0 / df_count))"
      sources:
      - start_line: 58
        end_line: 61
        file: ''
      uid: 070e046e-1983-4adf-b414-5a09143442a8
    - text: 'The ''Gross'' column is optional for row inclusion in outputs, but since
        it is propagated to the final CSVs, it should have reasonable completeness.
        Based on current data characteristics (completeness ~0.828), enforce a minimum
        completeness like >= 0.80. Deequ-style: .hasCompleteness("Gross", lambda x:
        x >= 0.80)'
      sources:
