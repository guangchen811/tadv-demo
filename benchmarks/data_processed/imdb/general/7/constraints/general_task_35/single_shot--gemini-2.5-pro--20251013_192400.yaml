constraints:
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda x: x >= 0.8, ''Completeness should be
        at least 80%'')'
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isBetween('IMDB_Rating', 0.0, 10.0)
      - Invalid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .satisfies('`Released_Year` >= 1900', 'Released_Year should be 1900 or later')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .isComplete('Runtime')
      - Valid
    - - .matches('Runtime', '^[1-9][0-9]{1,2} min$')
      - Invalid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x: x == 1.0)'
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
