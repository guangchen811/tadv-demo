constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda v: v >= 0.85)'
      - Valid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda v: v >= 0.80)'
      - Valid
    - - '.satisfies("Gross IS NULL OR cast(regexp_replace(Gross, '','', '''') as double)
        IS NOT NULL", ''gross_numeric_or_null'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda v: v >= 0.85)'
      - Valid
    - - '.satisfies(''(Meta_score IS NULL) OR (Meta_score >= 0 AND Meta_score <= 100)'',
        ''meta_score_range'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .isComplete('Overview')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - '.hasPattern(''Poster_Link'', ''^https?://'', lambda v: v == 1.0)'
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMax(''Released_Year'', lambda v: v <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - '.hasPattern(''Runtime'', ''^([1-9][0-9]{1,2}) min$'', lambda v: v == 1.0)'
      - Valid
    - - .isComplete('Runtime')
      - Valid
    - - '.satisfies("cast(regexp_extract(Runtime, ''([0-9]+)'', 1) as int) BETWEEN
        60 AND 240", ''runtime_between_60_240'', lambda v: v == 1.0)'
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    - - '.satisfies("Series_Title = trim(Series_Title)", ''title_trimmed'', lambda
        v: v == 1.0)'
      - Valid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - .isUnique(['Series_Title', 'Released_Year'])
      - Invalid
    assumptions: []
