constraints:
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda v: v >= 0.8)'
      - Valid
    - - '.satisfies("Gross IS NULL OR Gross RLIKE ''^[0-9]{1,3}(,[0-9]{3})*$''", ''gross_format'',
        lambda v: v >= 0.95)'
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.satisfies(''Meta_score IS NULL OR (Meta_score >= 0 AND Meta_score <= 100)'',
        ''meta_score_range'', lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMax(''Released_Year'', lambda v: v <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .containsPattern('Runtime', '^\s*\d{2,3}\s*min\s*$')
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    - - '.satisfies("cast(regexp_extract(Runtime, ''(\\d{2,3})'', 1) as int) BETWEEN
        45 AND 240", ''runtime_bounds'', lambda v: v >= 0.99)'
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title,Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda v: v == 1.0)'
      - Valid
    assumptions: []
