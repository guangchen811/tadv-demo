constraints:
  Gross:
    code:
    - - .satisfies("(Gross is null) OR Gross rlike '^[0-9]{1,3}(,[0-9]{3})*$'", 'Gross_numeric_commas_when_present')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda x: x <= 10)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasMax(''Meta_score'', lambda x: x <= 100)'
      - Valid
    - - '.hasMin(''Meta_score'', lambda x: x >= 0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMax(''Released_Year'', lambda x: x <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda x: x >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .satisfies("Runtime rlike '^[ ]*\\d{2,3}[ ]*min[ ]*$'", 'Runtime_format_2to3_digits_min')
      - Invalid
    - - .satisfies("cast(regexp_extract(Runtime, '(\\\d{2,3})', 1) as int) between
        45 and 240", 'Runtime_minutes_between_45_240')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title,Released_Year:
    code:
    - - .isUnique(['Series_Title', 'Released_Year'])
      - Invalid
    assumptions: []
