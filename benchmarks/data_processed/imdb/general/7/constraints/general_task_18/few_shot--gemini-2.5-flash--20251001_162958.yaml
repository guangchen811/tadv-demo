constraints:
  Gross:
    code:
    - - .hasDataType('Gross', 'String')
      - Invalid
    - - .matchesPattern('Gross', r'^\d{1,3}(?:,\d{3})*$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .hasDataType('IMDB_Rating', 'Fractional')
      - Invalid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isGreaterThanOrEqualTo('IMDB_Rating', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - .hasDataType('Meta_score', 'Fractional')
      - Invalid
    - - .isGreaterThanOrEqualTo('Meta_score', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('Meta_score', 100.0)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .hasDataType('No_of_Votes', 'Integral')
      - Invalid
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .hasDataType('Released_Year', 'Integral')
      - Invalid
    - - .isComplete('Released_Year')
      - Valid
    - - .isNonNegative('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasDataType('Runtime', 'String')
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    - - .matchesPattern('Runtime', r'^\d{2,3}\s*min$')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .hasDataType('Series_Title', 'String')
      - Invalid
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - .isUnique(['Series_Title', 'Released_Year'])
      - Invalid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', 'Integral')
      - Invalid
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
