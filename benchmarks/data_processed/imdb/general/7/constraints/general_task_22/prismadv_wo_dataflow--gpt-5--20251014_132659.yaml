  '["IMDB_Rating","Meta_score"]':
    code: []
    assumptions:
    - text: 'At least one of Meta_score or IMDB_Rating must be non-null per record
        because the blend uses Meta_score/10 when available and falls back to IMDB_Rating
        otherwise. This can be enforced with a composite completeness constraint,
        e.g., Deequ Compliance: IMDB_Rating IS NOT NULL OR Meta_score IS NOT NULL.'
      sources:
