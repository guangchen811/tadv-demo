      source_assumptions:
      - c75f2e74-6915-4e69-af91-f3eb34438dfa
    - suggestion: '.satisfies(''Meta_score IS NOT NULL OR IMDB_Rating IS NOT NULL'',
        ''IMDB_Rating present when Meta_score missing'', lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: b39c0242-c120-41cd-8062-79dfe4f4e748
      source_assumptions:
      - 0897499b-be0f-4f57-8609-1703471ebfac
    assumptions:
    - text: 'IMDB_Rating must be present and numeric for every row (no nulls or non-numeric
        strings). This is required because the code coerces IMDB_Rating to numeric
        and immediately casts (IMDB_Rating * 10) to int, which will fail if any value
        becomes null after coercion. Possible validations: Deequ isComplete("IMDB_Rating")
        == 1.0 and satisfies("CAST(IMDB_Rating AS DOUBLE) IS NOT NULL", "IMDB_Rating
        numeric", lambda x: x == 1.0); or Great Expectations expect_column_values_to_not_be_null
        and expect_column_values_to_be_in_type_list(["int", "float", "double", "decimal"]).'
      sources:
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 44
        end_line: 45
        file: ''
      uid: e0b57734-728a-431f-9a4b-573829a494a0
    - text: 'All IMDB_Rating values must be finite real numbers (no Infinity/-Infinity).
        Finite values are required for the integer cast and for mean-based computations
        used in downstream scoring. Possible validations: Deequ satisfies("IMDB_Rating
        != Infinity AND IMDB_Rating != -Infinity", "No infinities in IMDB_Rating",
        lambda x: x == 1.0); or Great Expectations expect_column_values_to_be_between
        with very wide bounds and allow_cross_type_comparisons=True, combined with
        a check that values are not null.'
      sources:
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 48
        end_line: 52
        file: ''
      uid: 7e74433d-c012-477a-9b53-5addc302ec24
    - text: "IMDB_Rating should lie within the 0 to 10 range. The pipeline treats\
        \ ratings as 0\u201310 and buckets by tenths; values outside this range would\
        \ create invalid buckets and distort downstream scoring. Possible validations:\
        \ Deequ satisfies(\"IMDB_Rating >= 0 AND IMDB_Rating <= 10\", \"IMDB_Rating\
        \ range\", lambda x: x == 1.0); or Great Expectations expect_column_values_to_be_between(min_value=0,\
        \ max_value=10)."
      sources:
      - start_line: 42
        end_line: 45
        file: ''
      uid: fa9585f6-c2fe-4994-9dde-8f1f12bb46ca
    - text: 'IMDB_Rating should be quantized to one-decimal-place increments (multiples
        of 0.1). The tenth-point bucket calculation relies on 0.1 granularity rather
        than arbitrary precision. Possible validations: Deequ satisfies("(IMDB_Rating
        * 10) % 1 = 0", "IMDB_Rating has 0.1 granularity", lambda x: x == 1.0); or
        Great Expectations expect_column_values_to_match_regex_list after formatting,
        or a custom expectation checking (value * 10).is_integer().'
      sources:
      - start_line: 43
        end_line: 45
        file: ''
      uid: c75f2e74-6915-4e69-af91-f3eb34438dfa
    - text: 'Where Meta_score is missing, IMDB_Rating must be present because IMDB_Rating
        is used as the fallback to compute the quality component. Possible validations:
        Deequ satisfies("NOT (Meta_score IS NULL AND IMDB_Rating IS NULL)", "IMDB_Rating
        present when Meta_score missing", lambda x: x == 1.0); or Great Expectations
        expect_conditionally_replaceable to enforce IMDB_Rating not null when Meta_score
        is null.'
      sources:
      - start_line: 55
        end_line: 56
        file: ''
      uid: 0897499b-be0f-4f57-8609-1703471ebfac
