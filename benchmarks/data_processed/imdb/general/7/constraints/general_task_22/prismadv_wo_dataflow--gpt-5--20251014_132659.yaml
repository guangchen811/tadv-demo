      uid: d5631730-9d8c-4cc2-954e-f5881f2de8f1
    - text: 'The ''Genre'' field should be formatted as either a single token or a
        comma-and-space separated list of tokens (", ") exactly; other separators
        (e.g., '','', '';'', ''|'') or missing spaces after commas should not be used.
        We could represent this as a Deequ/GE pattern constraint: .matchesPattern(''Genre'',
        ''^[^,]+(, [^,]+)*$'') or expect_column_values_to_match_regex with the same
        regex.'
      sources:
      - start_line: 71
        end_line: 71
        file: ''
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 83
        end_line: 86
        file: ''
      uid: d3d82c38-f0d4-43e8-a22e-91e96b5a167d
    - text: 'Genre tokens should use a canonical vocabulary with exact spelling/casing
        (at least for those used in policy checks): ''Animation'', ''Family'', ''Horror'',
        ''Thriller''. Preferably, tokens are drawn from a known IMDB-like set (e.g.,
        Action, Adventure, Animation, Biography, Comedy, Crime, Drama, Family, Fantasy,
        History, Horror, Mystery, Romance, Sci-Fi, Sport, Thriller, War, Western,
        Music, Musical, Film-Noir). At least 95% of rows should have all tokens within
        this set. This can be represented as: after splitting by '', '', the set difference
        between tokens and the allowed set is empty for at least 0.95 of rows (e.g.,
        Great Expectations custom expectation on split tokens; or Deequ .satisfies
        with a SQL expression ensuring no token outside the allowed set).'
      sources:
      - start_line: 71
        end_line: 73
        file: ''
      - start_line: 83
        end_line: 86
        file: ''
      uid: f5361dc9-fc01-4c19-8860-03a2a66f6bf7
    - text: 'If a title belongs to Horror or Thriller, those genres must appear as
        exact, case-sensitive tokens ''Horror'' or ''Thriller'' (so the kids-safety
        gate works correctly). We could express this as a Deequ satisfies constraint:
        .satisfies("CASE WHEN lower(`Genre`) LIKE ''%horror%'' OR lower(`Genre`) LIKE
        ''%thriller%'' THEN (CASE WHEN `Genre` LIKE ''%Horror%'' OR `Genre` LIKE ''%Thriller%''
        THEN 1 ELSE 0 END) ELSE 1 END", "Exact Horror/Thriller tokens", lambda x:
        x == 1.0).'
      sources:
      - start_line: 83
        end_line: 86
        file: ''
      uid: 97b4e914-1efa-4c9f-91ef-ace9bcea01bf
    - text: 'The ''Genre'' values should not be placeholder literals like ''nan'',
        ''null'', or ''none'' after casting, to avoid misleading safety classification
        and user-visible artifacts. We could represent this as: .satisfies("lower(trim(`Genre`))
        NOT IN (''nan'',''null'',''none'')", "No placeholder genre strings", lambda
        x: x == 1.0).'
      sources:
