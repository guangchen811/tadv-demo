    assumptions:
    - text: 'Both IMDB_Rating and No_of_Votes must be present (non-null) and numeric
        for every record, because they are jointly used to compute bayes_rating and
        the final qa_pop_score without null-guarding. We could represent this as Deequ
        constraints like: .isComplete("IMDB_Rating"), .isComplete("No_of_Votes"),
        .hasDataType("IMDB_Rating", ConstrainableDataTypes.Fractional), .hasDataType("No_of_Votes",
        ConstrainableDataTypes.Integral).'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 48
        end_line: 53
        file: ''
      - start_line: 66
        end_line: 67
        file: ''
      uid: fc552002-a6b4-4a6c-8bf0-be2d832061d5
    - text: 'Domain and denominator safety for the Bayesian blend and popularity log-scaling:
        IMDB_Rating must be within [0, 10] and No_of_Votes must be >= 0, and the 60th-percentile
        (M) of No_of_Votes must be > 0. This ensures v + M > 0 (no division by zero),
        the weights v/(v+M) and M/(v+M) are in [0,1], and log1p(No_of_Votes) is finite.
        Deequ representation: .satisfies("IMDB_Rating >= 0 AND IMDB_Rating <= 10 AND
        No_of_Votes >= 0", "rating_votes_domain"), and .hasApproxQuantile("No_of_Votes",
        0.60, _ > 0).'
      sources:
