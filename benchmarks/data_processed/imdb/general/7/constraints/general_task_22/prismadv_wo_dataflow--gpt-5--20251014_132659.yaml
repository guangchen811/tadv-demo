    - text: "Bayesian blend boundedness: For every row the computed bayes_rating must\
        \ lie between the row\u2019s IMDB_Rating and the dataset mean C = avg(IMDB_Rating),\
        \ i.e., (IMDB_Rating - bayes_rating) * (C - bayes_rating) <= 0. This follows\
        \ from using non-negative weights that sum to 1. In Deequ, compute C as a\
        \ pre-step metric and then use a row-level satisfies check like: satisfies(\"\
        ((IMDB_Rating >= C and bayes_rating <= IMDB_Rating and bayes_rating >= C)\
        \ or (IMDB_Rating < C and bayes_rating >= IMDB_Rating and bayes_rating <=\
        \ C))\", \"bayes_between_R_and_C\"). Optionally add .hasCorrelation(\"IMDB_Rating\"\
        , \"bayes_rating\", _ >= 0.9) to guard the expected positive relationship."
