  '["Certificate","Genre"]':
    code: []
    assumptions:
    - text: 'Kids-safe flag is fully determined by Certificate and Genre. Specifically:
        is_kids_safe must be true if and only if Certificate is in the low-maturity
        set {''U'',''G'',''PG'',''TV-PG'',''Approved'',''Passed''} AND Genre does
        not contain ''Horror'' or ''Thriller''. This can be captured as a Deequ conditional
        compliance: .addConstraint(Compliance("kids_safe_equivalence", "(is_kids_safe
        = true) <=> (Certificate IN (''U'',''G'',''PG'',''TV-PG'',''Approved'',''Passed'')
        AND NOT (Genre LIKE ''%Horror%'' OR Genre LIKE ''%Thriller%''))"))'
      sources:
      - start_line: 77
        end_line: 85
        file: ''
      - start_line: 122
        end_line: 124
        file: ''
      uid: 51f7813b-c5ee-42b4-a475-5287cae841b1
    - text: 'Animation/Family titles must carry an explicitly kids-appropriate Certificate.
        If Genre contains ''Animation'' or ''Family'', then Certificate must be present
        (non-null) and in {''U'',''G'',''PG'',''TV-PG'',''Approved'',''Passed''}.
        Example Deequ compliance: .addConstraint(Compliance("family_titles_have_safe_cert",
        "(Genre LIKE ''%Animation%'' OR Genre LIKE ''%Family%'') => (Certificate IS
        NOT NULL AND Certificate IN (''U'',''G'',''PG'',''TV-PG'',''Approved'',''Passed''))"))'
      sources:
      - start_line: 71
        end_line: 74
        file: ''
      - start_line: 77
        end_line: 85
        file: ''
      - start_line: 122
        end_line: 124
        file: ''
      uid: 3f37d172-0d79-4683-b157-9c461605e404
    - text: 'Horror/Thriller-labeled titles must not have a kids certificate. If Genre
        contains ''Horror'' or ''Thriller'', Certificate should not be one of {''U'',''G'',''PG'',''TV-PG'',''Approved'',''Passed''}.
        Example Deequ compliance: .addConstraint(Compliance("mature_genres_not_kids_cert",
        "(Genre LIKE ''%Horror%'' OR Genre LIKE ''%Thriller%'') => (Certificate NOT
        IN (''U'',''G'',''PG'',''TV-PG'',''Approved'',''Passed''))"))'
      sources:
      - start_line: 71
        end_line: 74
        file: ''
      - start_line: 77
        end_line: 85
        file: ''
      uid: af79449a-45b4-45da-9bd1-8244c2719b84
    - text: 'Missing Certificate implies not kids-safe. When Certificate is null (or
        unmapped), is_kids_safe must be false (since null certificates are treated
        as maturity_level 3). Example Deequ compliance: .addConstraint(Compliance("null_cert_implies_not_kids_safe",
        "(Certificate IS NOT NULL) OR (is_kids_safe = false)"))'
      sources:
      - start_line: 82
        end_line: 85
        file: ''
      - start_line: 122
        end_line: 124
        file: ''
      uid: ab267257-e3ea-4c3b-95fe-f350ef6f3c2b
  '["Certificate","Released_Year"]':
    code:
    - suggestion: '.satisfies("CASE WHEN Certificate = ''PG-13'' THEN Released_Year
        >= 1984 WHEN Certificate = ''NC-17'' THEN Released_Year >= 1990 WHEN Certificate
        IN (''TV-PG'',''TV-14'',''TV-MA'') THEN Released_Year >= 1997 WHEN Certificate
        = ''GP'' THEN Released_Year BETWEEN 1970 AND 1972 WHEN Certificate = ''Approved''
        THEN Released_Year <= 1968 WHEN Certificate = ''Passed'' THEN Released_Year
        <= 1970 WHEN Certificate IN (''G'',''PG'',''R'') THEN Released_Year >= 1968
        ELSE true END", "Certificate-Released_Year historical validity", lambda v:
        v == 1.0)'
      validity: false
      reason_if_invalid: 'Constraint ''.satisfies("CASE WHEN Certificate = ''PG-13''
        THEN Released_Year >= 1984 WHEN Certificate = ''NC-17'' THEN Released_Year
        >= 1990 WHEN Certificate IN (''TV-PG'',''TV-14'',''TV-MA'') THEN Released_Year
        >= 1997 WHEN Certificate = ''GP'' THEN Released_Year BETWEEN 1970 AND 1972
        WHEN Certificate = ''Approved'' THEN Released_Year <= 1968 WHEN Certificate
        = ''Passed'' THEN Released_Year <= 1970 WHEN Certificate IN (''G'',''PG'',''R'')
        THEN Released_Year >= 1968 ELSE true END", "Certificate-Released_Year historical
        validity", lambda v: v == 1.0)'' failed on data sample: Value: 0.9833055091819699
        does not meet the constraint requirement!'
      level: warning
      uid: b58aa637-8873-4b45-8846-24597d68dd14
      source_assumptions:
      - e169e72d-a650-4951-a856-0323c2912d93
    assumptions:
    - text: "Certificate\u2013Released_Year combinations must be historically valid.\
        \ Examples of enforceable rules: (a) 'PG-13' requires Released_Year >= 1984;\
        \ (b) 'NC-17' requires Released_Year >= 1990; (c) TV ratings ('TV-PG','TV-14','TV-MA')\
        \ require Released_Year >= 1997; (d) 'GP' is only valid for 1970 <= Released_Year\
        \ <= 1972; (e) 'Approved' implies Released_Year <= 1968; (f) 'Passed' implies\
        \ Released_Year <= 1970; (g) MPAA-era ratings ('G','PG','R') imply Released_Year\
        \ >= 1968. This can be encoded as a Deequ satisfies constraint, e.g., CASE\
        \ WHEN Certificate = 'PG-13' THEN Released_Year >= 1984 WHEN Certificate =\
        \ 'NC-17' THEN Released_Year >= 1990 WHEN Certificate IN ('TV-PG','TV-14','TV-MA')\
        \ THEN Released_Year >= 1997 WHEN Certificate = 'GP' THEN Released_Year BETWEEN\
        \ 1970 AND 1972 WHEN Certificate = 'Approved' THEN Released_Year <= 1968 WHEN\
        \ Certificate = 'Passed' THEN Released_Year <= 1970 WHEN Certificate IN ('G','PG','R')\
        \ THEN Released_Year >= 1968 ELSE true END."
      sources:
      - start_line: 68
        end_line: 69
        file: ''
      - start_line: 77
        end_line: 81
        file: ''
      - start_line: 108
        end_line: 116
        file: ''
      - start_line: 132
        end_line: 138
        file: ''
      - start_line: 155
        end_line: 159
        file: ''
      uid: f74ec917-f266-4cb6-b86b-eb76c9c78d7a
    - text: 'Kids-safe gating must align across Certificate and Genre: For rows where
        Genre does not contain ''Horror'' or ''Thriller'', is_kids_safe should be
        true if and only if the Certificate maps to a maturity level <= 1 using the
        defined mapping {U,G -> 0; PG,TV-PG,Approved,Passed -> 1}. In Deequ, encode
        with a single row-level predicate that derives maturity from Certificate and
        checks both columns, e.g., CASE WHEN (Certificate IN (''U'',''G'',''PG'',''TV-PG'',''Approved'',''Passed'')
        AND Genre NOT LIKE ''%Horror%'' AND Genre NOT LIKE ''%Thriller%'') THEN is_kids_safe
        = true WHEN (Certificate IN (''R'',''TV-MA'',''NC-17'',''A'') OR Genre LIKE
        ''%Horror%'' OR Genre LIKE ''%Thriller%'') THEN is_kids_safe = false ELSE
        true END.'
      sources:
      - start_line: 71
        end_line: 74
        file: ''
      - start_line: 77
        end_line: 85
        file: ''
      uid: e169e72d-a650-4951-a856-0323c2912d93
    - text: 'Unknown or missing Certificate values must be treated as mature for gating:
        If Certificate is NULL or not in the known maturity_map keys, then is_kids_safe
        must be false. This matches the code path that fills missing maturity_level
        with 3 before computing is_kids_safe. A Deequ predicate example: (Certificate
        IS NULL OR Certificate NOT IN (''U'',''G'',''PG'',''TV-PG'',''UA'',''PG-13'',''TV-14'',''R'',''TV-MA'',''NC-17'',''A'',''Not
        Rated'',''Unrated'',''Approved'',''Passed'',''U/A'',''GP'')) => (is_kids_safe
        = false).'
      sources:
      - start_line: 77
        end_line: 85
        file: ''
      uid: b3815646-515e-4534-8204-abea669c2bff
    - text: 'Family/Animation genres should not co-occur with adult certificates:
        If Genre contains ''Animation'' or ''Family'', then Certificate should not
        be in the adult set {''R'',''TV-MA'',''NC-17'',''A''}. This guards inconsistent
        labeling across content and maturity metadata. Deequ predicate: (Genre LIKE
        ''%Animation%'' OR Genre LIKE ''%Family%'') => Certificate NOT IN (''R'',''TV-MA'',''NC-17'',''A'').'
      sources:
      - start_line: 71
        end_line: 74
        file: ''
      - start_line: 77
        end_line: 81
        file: ''
