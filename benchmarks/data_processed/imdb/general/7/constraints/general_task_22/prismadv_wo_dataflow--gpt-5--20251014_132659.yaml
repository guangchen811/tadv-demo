        file: ''
      uid: 2ceecf1e-33cd-4641-a278-bb6d43567ec6
    - text: 'Scale compatibility of the two ratings: where Meta_score is present,
        the pair (IMDB_Rating, Meta_score) must lie on compatible scales used by the
        blend: IMDB_Rating in [0,10] and Meta_score in [0,100]. This can be enforced
        as a cross-field predicate: (Meta_score IS NULL) OR (IMDB_Rating >= 0 AND
        IMDB_Rating <= 10 AND Meta_score >= 0 AND Meta_score <= 100).'
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      uid: 12894335-fe74-4f3d-921a-64339953ef54
    - text: 'Positive association between the two rating signals: where both are present,
        IMDB_Rating and Meta_score (or Meta_score/10) should be positively correlated
        since they measure the same concept and are blended. This can be captured
        with a correlation constraint, e.g., Deequ hasCorrelation(''IMDB_Rating'',''Meta_score'',
        lowerBound=0.0).'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: 8164b44c-6d79-4c03-8725-cc6360f7b288
    - text: 'Kids-safety policy across Certificate and Genre: titles whose Genre contains
        ''Horror'' or ''Thriller'' must not carry a kids-safe certificate (mapped
        maturity_level <= 1; e.g., U, G, PG, TV-PG, Approved, Passed). Enforce as:
        NOT(Genre contains ''Horror'' OR ''Thriller'') OR maturity_level >= 2 (i.e.,
        Certificate NOT IN {U, G, PG, TV-PG, Approved, Passed}).'
      sources:
      - start_line: 71
        end_line: 74
        file: ''
      - start_line: 77
        end_line: 85
        file: ''
      uid: cffcd2d9-3ca4-4839-83a6-949c57207cb5
    - text: 'When Meta_score is null, IMDB_Rating must be present and within [0,10]
        because it is explicitly used as the fallback in the quality blend. This can
        be encoded as a conditional completeness and range check: (Meta_score IS NOT
        NULL) OR (IMDB_Rating IS NOT NULL AND IMDB_Rating >= 0 AND IMDB_Rating <=
        10).'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: ea797448-33b8-48fb-a961-525bfda3c8bc
  '["IMDB_Rating","Meta_score","No_of_Votes"]':
    code: []
    assumptions:
    - text: 'For Bayesian weighting and popularity computations to be valid, No_of_Votes
        must be a non-negative count with a strictly positive 60th percentile (M >
        0), and IMDB_Rating must be finite for all rows. This ensures v/(v+M) is defined
        for every row and log1p(v) is valid. This can be represented with constraints
        such as: hasCompleteness(''IMDB_Rating'', 1.0), hasCompleteness(''No_of_Votes'',
        1.0), isNonNegative(''No_of_Votes''), hasApproxQuantile(''No_of_Votes'', 0.60,
        _ > 0), and a compliance check that both IMDB_Rating and No_of_Votes are finite.'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 48
        end_line: 52
        file: ''
      - start_line: 63
        end_line: 63
        file: ''
      uid: 0299a4c6-9cb2-4ea1-bb69-19eacf5eaadd
    - text: "Meta_score and IMDB_Rating are intended to be on the same 0\u201310 scale\
        \ (Meta_score is divided by 10 and blended with IMDB_Rating). Therefore: when\
        \ Meta_score is present it should lie in [0, 100], IMDB_Rating should lie\
        \ in [0, 10], and if Meta_score is null then IMDB_Rating must be non-null\
        \ (used as fallback). These can be enforced with constraints like: compliance('meta_in_range',\
        \ 'Meta_score is null or (Meta_score >= 0 and Meta_score <= 100)'), compliance('imdb_in_range',\
        \ 'IMDB_Rating >= 0 and IMDB_Rating <= 10'), and compliance('if_meta_null_then_imdb_present',\
        \ 'Meta_score is null => IMDB_Rating is not null')."
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      uid: f32aa212-142e-4930-a98e-99ccda49be5b
    - text: 'Every row included in ranking must have valid inputs for both the quality
        and popularity components: IMDB_Rating must be finite (used in bayes_rating
        and as fallback for Meta_score) and No_of_Votes must be non-negative (used
        by both the Bayesian weight and log1p). This ensures qa_pop_score is defined
        and finite. This can be captured with a compliance constraint such as: ''isFinite(IMDB_Rating)
        and isFinite(No_of_Votes) and No_of_Votes >= 0''.'
      sources:
      - start_line: 48
        end_line: 56
        file: ''
      - start_line: 62
        end_line: 67
        file: ''
