    assumptions:
    - text: 'The ''Certificate'' values should be drawn from a known set of maturity
        ratings used by the code: [''U'', ''G'', ''PG'', ''TV-PG'', ''UA'', ''PG-13'',
        ''TV-14'', ''R'', ''TV-MA'', ''NC-17'', ''A'', ''Not Rated'', ''Unrated'',
        ''Approved'', ''Passed'', ''U/A'', ''GP'']. Among non-null values, at least
        95% should be in this set; otherwise they will map to unknown (NaN) and be
        treated as mature (level 3), reducing kids-safe coverage. Deequ-style example:
        .satisfies("CASE WHEN `Certificate` IS NULL OR `Certificate` IN (''U'',''G'',''PG'',''TV-PG'',''UA'',''PG-13'',''TV-14'',''R'',''TV-MA'',''NC-17'',''A'',''Not
        Rated'',''Unrated'',''Approved'',''Passed'',''U/A'',''GP'') THEN 1 ELSE 0
        END", "Certificate in allowed set", lambda x: x >= 0.95)'
      sources:
      - start_line: 77
        end_line: 81
        file: ''
      - start_line: 82
        end_line: 86
        file: ''
      - start_line: 122
        end_line: 124
        file: ''
      uid: 8de4ecfe-e541-4671-adae-12774a4f5504
    - text: 'The ''Certificate'' column may contain nulls (the code handles nulls
        by defaulting the maturity level to 3 and emitting null in outputs), but nulls
        should be bounded so the family carousel and kids-safe gating remain effective.
        Require completeness of at least 0.85 (consistent with the observed ~0.898).
        Deequ-style example: .hasCompleteness("Certificate", lambda x: x >= 0.85)'
      sources:
      - start_line: 82
        end_line: 86
        file: ''
      - start_line: 108
        end_line: 120
        file: ''
      - start_line: 122
        end_line: 124
        file: ''
      uid: b7e406c7-c3f0-495d-ae29-4fa1908a9154
    - text: 'Non-null ''Certificate'' values must be clean, canonical tokens that
        exactly match the mapping keys (correct case, hyphenation, and spacing). No
        leading/trailing whitespace is allowed, otherwise mapping will fail. Deequ-style
        example: .satisfies("CASE WHEN `Certificate` IS NULL OR `Certificate` = TRIM(`Certificate`)
        THEN 1 ELSE 0 END", "Certificate trimmed", lambda x: x == 1)'
      sources:
      - start_line: 77
        end_line: 83
        file: ''
      uid: 7c3ce4fb-ba36-4e72-87db-5c4900acd1b1
    - text: 'Each ''Certificate'' cell should contain a single rating token (no composite
        or delimited values). Values must not contain delimiters such as '','', '';'',
        ''/'', or ''|'', which would prevent exact mapping. Deequ-style example: .satisfies("CASE
        WHEN `Certificate` IS NULL OR NOT (`Certificate` RLIKE ''[,;/|]'') THEN 1
        ELSE 0 END", "No delimited certificates", lambda x: x >= 0.99)'
      sources:
      - start_line: 77
        end_line: 83
        file: ''
      uid: 3610968e-4133-4154-85d7-52fc708028e5
    - text: 'Non-null ''Certificate'' values should be strings (scalar text). Non-string
        types (e.g., numbers, lists) will not match the mapping keys and will be treated
        as unknown. Require that at least 99% of non-null values are strings. Great
        Expectations example: expect_column_values_to_be_of_type("Certificate", "str",
        mostly=0.99)'
      sources:
      - start_line: 39
        end_line: 39
        file: ''
      - start_line: 77
        end_line: 83
        file: ''
      uid: fd72767d-4022-4d49-be15-0bdfae7530fb
    - text: 'The ''Certificate'' column should have low cardinality consistent with
        rating categories; the number of distinct non-null values should be small
        (e.g., <= 25). Deequ-style example: .hasNumberOfDistinctValues("Certificate",
        lambda x: x <= 25)'
      sources:
      - start_line: 77
        end_line: 83
        file: ''
