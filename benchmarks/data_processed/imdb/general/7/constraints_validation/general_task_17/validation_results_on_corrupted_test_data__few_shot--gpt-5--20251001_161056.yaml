results:
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.hasPattern(''Gross'', r''^\s*\d{1,3}(,\d{3})*\s*$'', lambda v:
        v >= 0.9)'
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Gross'', r''^\s*\d{1,3}(,\d{3})*\s*$'',
        lambda v: v >= 0.9)'' failed on data sample: Input data does not include column
        Gross!'
      level: error
  IMDB_Rating:
    code:
    - suggestion: '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.hasDataType(''No_of_Votes'', ConstrainableDataTypes.Integral,
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''No_of_Votes'',
        ConstrainableDataTypes.Integral, lambda v: v == 1.0)'
      level: error
    - suggestion: .isComplete('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: '.hasDataType(''Released_Year'', ConstrainableDataTypes.Integral,
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''Released_Year'',
        ConstrainableDataTypes.Integral, lambda v: v == 1.0)'
      level: error
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: '.hasPattern(''Runtime'', r''^\s*\d+\s*min\s*$'', lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title,Released_Year:
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Star1,Star2,Star3,Star4:
    code:
    - suggestion: '.satisfies(''Star1 <> Star2 AND Star1 <> Star3 AND Star1 <> Star4
        AND Star2 <> Star3 AND Star2 <> Star4 AND Star3 <> Star4'', ''cast_all_distinct'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''Star1 IS NOT NULL AND Star2 IS NOT NULL AND Star3
        IS NOT NULL AND Star4 IS NOT NULL'', ''cast_not_null'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
