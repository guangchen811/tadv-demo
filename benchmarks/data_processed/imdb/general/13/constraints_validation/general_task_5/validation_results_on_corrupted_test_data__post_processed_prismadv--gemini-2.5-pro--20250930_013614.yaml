results:
  IMDB_Rating:
    code:
    - suggestion: .satisfies("`IMDB_Rating` >= 0 AND `IMDB_Rating` <= 10", "IMDB_Rating
        within range [0, 10]")
      status: true
      reason_if_failed: ''
      level: error
  Certificate:
    code:
    - suggestion: '.hasCompleteness("Certificate", lambda completeness: completeness
        > 0.0, "Certificate column should not be entirely null")'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn("Certificate", ["G", "PG", "PG-13", "R", "NC-17",
        "U", "UA", "A", "12", "12A", "15", "18"], assertion=lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Certificate` IS NULL OR (TRIM(`Certificate`) = `Certificate`
        AND LENGTH(`Certificate`) > 0)", "Certificate is a non-empty, trimmed string
        or NULL", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Certificate","Genre"]':
    code:
    - suggestion: '.satisfies("NOT ((Genre LIKE ''%Family%'' OR Genre LIKE ''%Animation%'')
        AND Certificate IN (''R'', ''NC-17''))", "Family_Animation_Certificate_Constraint",
        lambda x: x > 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.hasPattern("Genre", r"^([A-Za-z-]+)(, ?[A-Za-z-]+)*$", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.satisfies("Gross IS NULL OR TRY_CAST(regexp_replace(Gross, '','',
        '''') AS DOUBLE) IS NULL OR CAST(regexp_replace(Gross, '','', '''') AS DOUBLE)
        >= 0", "Gross values, if numeric, must be non-negative", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Gross","IMDB_Rating","Meta_score","No_of_Votes","Runtime"]':
    code:
    - suggestion: '.hasCorrelation("IMDB_Rating", "Meta_score", lambda x: x >= 0.29)'
      status: false
      reason_if_failed: 'Constraint ''hasCorrelation("IMDB_Rating", "Meta_score",
        lambda x: x >= 0.29)'' failed on data sample: Value: 0.21854192141273016 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.hasCorrelation("IMDB_Rating", "No_of_Votes", lambda x: x >= 0.3)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`IMDB_Rating` IS NULL OR `No_of_Votes` IS NOT NULL",
        "VotesPresentForRating", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","Meta_score"]':
    code:
    - suggestion: '.satisfies("(`IMDB_Rating` IS NULL OR (`IMDB_Rating` >= 0 AND `IMDB_Rating`
        <= 10)) AND (`Meta_score` IS NULL OR (`Meta_score` >= 0 AND `Meta_score` <=
        100))", "Valid score ranges", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation("IMDB_Rating", "Meta_score", lambda x: x > 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: '.containsURL("Poster_Link", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Poster_Link` = trim(`Poster_Link`) ", "Poster_Link
        has no leading/trailing whitespace", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.hasCompleteness("Meta_score", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Meta_score` IS NULL OR (`Meta_score` >= 0 AND `Meta_score`
        <= 100)", "Meta_score in range [0, 100]", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.satisfies("CAST(`No_of_Votes` AS INT) IS NOT NULL", "must be parsable
        as integer", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMin("No_of_Votes", lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Released_Year","Series_Title"]':
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: '.satisfies("`Released_Year` >= 1000 AND `Released_Year` < 10000
        AND `Released_Year` = FLOOR(`Released_Year`)", "Released_Year must be a 4-digit
        integer", assertion=lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`Released_Year` >= 1000 AND `Released_Year`
        < 10000 AND `Released_Year` = FLOOR(`Released_Year`)", "Released_Year must
        be a 4-digit integer", assertion=lambda x: x == 1.0)'' failed on data sample:
        Value: 0.97 does not meet the constraint requirement!'
      level: error
  Runtime:
    code:
    - suggestion: .hasPattern("Runtime", "^\\d{2,3} min$")
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.satisfies("TRIM(`Series_Title`) != ''''", "Series_Title is not
        empty or whitespace", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
