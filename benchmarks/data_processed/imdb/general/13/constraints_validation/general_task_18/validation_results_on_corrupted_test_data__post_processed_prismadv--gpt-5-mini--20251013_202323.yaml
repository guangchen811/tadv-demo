results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`IMDB_Rating` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "IMDB_Rating is numeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `IMDB_Rating` BETWEEN 0 AND 10 THEN 1 ELSE
        0 END", "IMDB_Rating in [0,10]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: '.hasUniqueness([''Series_Title'',''Released_Year''], lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("IMDB_Rating IS NOT NULL AND Meta_score IS NOT NULL",
        "At least two records with both IMDB_Rating and Meta_score", lambda x: x >=
        2 or x * 599 >= 2)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (IMDB_Rating IS NULL OR (IMDB_Rating >= 0
        AND IMDB_Rating <= 10)) AND (Meta_score IS NULL OR (Meta_score >= 0 AND Meta_score
        <= 100)) THEN 1 ELSE 0 END", "IMDB_Rating and Meta_score within expected ranges
        (or NULL)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN Runtime RLIKE ''[0-9]{2,3}'' THEN 1 ELSE
        0 END", "Runtime contains a 2- or 3-digit minute value", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.satisfies("`Gross` IS NULL OR `Gross` RLIKE ''^[0-9,]+(\\.[0-9]+)?$''",
        "Gross parseable when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Runtime` RLIKE ''.*[0-9]{2,3}.*''", "Runtime 2-3 digit
        extractable", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`No_of_Votes` IS NULL OR `No_of_Votes` RLIKE ''^[0-9]+(\\.[0-9]+)?$''",
        "No_of_Votes numeric or null (non-negative)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Meta_score:
    code:
    - suggestion: '.satisfies("CASE WHEN `Meta_score` IS NULL THEN 1 ELSE CASE WHEN
        CAST(`Meta_score` AS DOUBLE) BETWEEN 0 AND 100 THEN 1 ELSE 0 END END", "Meta_score_in_0_100",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN NOT (`Meta_score` IS NULL AND `IMDB_Rating`
        IS NULL) THEN 1 ELSE 0 END", "imputable_missing_meta", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: '.satisfies("CASE WHEN `Released_Year` BETWEEN 1800 AND 2100 THEN
        1 ELSE 0 END", ''Released Year in reasonable range'', assertion=lambda x:
        x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `Released_Year` BETWEEN
        1800 AND 2100 THEN 1 ELSE 0 END", ''Released Year in reasonable range'', assertion=lambda
        x: x == 1.0)'' failed on data sample: Value: 0.97 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Series_Title'', ''.*\S.*'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
