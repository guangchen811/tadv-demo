constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda c: c >= 0.85)'
      - Valid
    - - '.isContainedIn(''Certificate'', [''U'', ''UA'', ''A'', ''G'', ''PG'', ''PG-13'',
        ''R'', ''NC-17'', ''NOT RATED'', ''UNRATED''], lambda r: r >= 0.99)'
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda c: c >= 0.80)'
      - Valid
    - - '.hasPattern(''Gross'', r''^\d{1,3}(,\d{3})*$'', lambda p: p >= 0.95)'
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda m: m <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda m: m >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - '.hasUniqueness([''Poster_Link''], lambda u: u >= 0.95)'
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMax(''Released_Year'', lambda m: m <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda m: m >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    - - .isNonNegative('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - '.hasPattern(''Runtime'', r''^\s*\d+\s*min\s*$'', lambda p: p >= 0.95)'
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - '.hasUniqueness([''id''], lambda u: u >= 0.98)'
      - Valid
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
