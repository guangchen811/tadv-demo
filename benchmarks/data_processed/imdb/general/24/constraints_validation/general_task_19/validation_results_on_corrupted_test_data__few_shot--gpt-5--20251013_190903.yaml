results:
  Certificate:
    code:
    - suggestion: .isContainedIn('Certificate', ['U', 'UA', 'A', 'G', 'PG', 'PG-13',
        'R', 'NC-17', 'Not Rated', 'Unrated', 'Passed', 'Approved'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''Certificate'', [''U'', ''UA'',
        ''A'', ''G'', ''PG'', ''PG-13'', ''R'', ''NC-17'', ''Not Rated'', ''Unrated'',
        ''Passed'', ''Approved''])'' failed on data sample: Value: 0.9125 does not
        meet the constraint requirement!'
      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating:
    code:
    - suggestion: '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)''
        failed on data sample: Value: 830.0000000000001 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
  Poster_Link:
    code:
    - suggestion: .hasPattern('Poster_Link', '^https?://')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: '.hasMax(''Released_Year'', lambda v: v <= 2025)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .hasPattern('Runtime', '^[0-9]+\\s*min$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title, Released_Year:
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda u:
        u == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
