    - text: '''catalog_id'' must have a one-to-one mapping with ''title_year_key'',
        implying that both columns are unique and correspond directly to each other.
        No two rows should have the same ''catalog_id'' or the same ''title_year_key''.
        This can be represented in Deequ as .isUnique(["catalog_id"]) and .isUnique(["title_year_key"]),
        and the mapping can be checked with .hasApproxQuantile("catalog_id", [0,1],
        [0.0,1.0]) == .hasApproxQuantile("title_year_key", [0,1], [0.0,1.0])'
