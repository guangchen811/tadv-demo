    - text: "Meta_score is expected to be on a 0\u2013100 scale (Metascore style).\
        \ Because the code divides Meta_score by 10 to place it on the 0\u201310 scale\
        \ alongside IMDB_Rating, any non-null Meta_score values should fall within\
