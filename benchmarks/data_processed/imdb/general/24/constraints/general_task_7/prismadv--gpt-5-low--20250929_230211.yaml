      - start_line: 63
        end_line: 76
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: 01f4d891-14c2-4979-889a-df5ac9c6af8e
    - text: 'For rows that qualify for Top Picks (IMDB_Rating >= 7.0), ''Genre'' should
