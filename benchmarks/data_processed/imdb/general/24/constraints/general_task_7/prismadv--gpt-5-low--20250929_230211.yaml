        CASE WHEN `Genre` IS NOT NULL AND TRIM(`Genre`) <> '''' THEN 1 ELSE 0 END
        ELSE 1 END", "Top Picks Genre completeness", lambda x: x == 1).'
      sources:
      - start_line: 55
        end_line: 62
        file: ''
      - start_line: 63
        end_line: 76
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: 839b75e2-e069-4abc-b27b-a8a5519adbc8
    - text: 'The ''Genre'' values should be strings (textual) for all input rows,
        since they are passed through to output without type conversion. We could
        represent this as a data type/format expectation, e.g., all values castable
        to string and not boolean/numeric-only: .satisfies("CASE WHEN `Genre` IS NULL
        THEN 1 WHEN CAST(`Genre` AS STRING) IS NOT NULL THEN 1 ELSE 0 END", "Genre
        is string-like", lambda x: x == 1).'
      sources:
      - start_line: 63
        end_line: 76
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: de0de4b1-aaaf-4b04-8c4e-6e1c625b5021
    - text: 'The number of distinct ''Genre'' values should not drastically exceed
        historical expectations (observed ~168). To guard against drift (e.g., free-text
        noise), enforce an upper bound such as distinct(''Genre'') <= 300. In Deequ:
        .hasApproxCountDistinct("Genre", lambda x: x <= 300).'
      sources:
      - start_line: 63
        end_line: 76
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: f0ccc27b-526c-48fe-8dac-5e7082ea34eb
  '["IMDB_Rating","Meta_score","No_of_Votes"]':
    code: []
    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' must be unique
        across the dataset, because catalog_id generation and stable ordering rely
        on a unique title-year key. Representable as: .isUnique(["Series_Title", "Released_Year"]).'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: 3525db5e-de97-4373-9d2e-906b757f54ae
    - text: 'Functional dependency: ''Poster_Link'' determines ''poster_asset_id''
        (i.e., equal Poster_Link values must map to the same poster_asset_id). Representable
        as: .hasFunctionalDependency("Poster_Link", Array("poster_asset_id"), assertion
        = _ == 1.0).'
      sources:
      - start_line: 30
        end_line: 34
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 2240901f-c85a-45d1-b023-dfbc1285aff5
    - text: 'To avoid division-by-zero and ensure a well-defined Bayesian weighted
        rating, the denominator (No_of_Votes + quantile_60(No_of_Votes)) must be strictly
        positive for every row. This implies No_of_Votes >= 0 for all rows and the
        60th percentile of No_of_Votes > 0. This can be captured as: .hasMin("No_of_Votes",
        _ >= 0) AND .satisfies("No_of_Votes + m_votes_threshold > 0", "denom_positive",
        _ >= 1.0) where m_votes_threshold is the 60th percentile computed on No_of_Votes.'
      sources:
      - start_line: 39
        end_line: 47
        file: ''
      uid: 29948989-87d1-4300-8a2a-226dddf6aea1
    - text: 'For rows included in Top Picks (IMDB_Rating >= 7.0), both ''quality_score''
        and ''No_of_Votes'' must be non-null, and the exported ''top_picks'' must
        be ordered by ''quality_score'' descending then ''No_of_Votes'' descending
        (as display_rank is assigned after that sort). Representable as: .satisfies("IMDB_Rating
        < 7.0 OR (quality_score IS NOT NULL AND No_of_Votes IS NOT NULL)", "top_base_not_null",
        _ == 1.0) on the base/top_picks dataset, and an ordering check that no adjacent
        pair violates the (quality_score DESC, No_of_Votes DESC) ordering.'
      sources:
      - start_line: 53
        end_line: 58
        file: ''
      - start_line: 63
        end_line: 79
        file: ''
      uid: ca18ee6e-8238-4be3-b1eb-458a594fdc0f
    - text: 'Scale-consistency for the composite quality score: When ''Meta_score''
        is present it should be in [0, 100], and with IMDB_Rating in [0, 10], the
        resulting ''quality_score'' should lie within [0, 10]. Representable as: .satisfies("Meta_score
        IS NULL OR (Meta_score >= 0 AND Meta_score <= 100)", "meta_in_range", _ ==
        1.0) AND .satisfies("quality_score >= 0 AND quality_score <= 10", "quality_in_range",
        _ == 1.0).'
      sources:
      - start_line: 39
        end_line: 51
        file: ''
      uid: c9fa3d5b-dbea-4be9-813d-f4aa03bf5445
  '["IMDB_Rating","No_of_Votes"]':
    code:
    - suggestion: '.haveCompleteness(columns=[''IMDB_Rating'', ''No_of_Votes''], assertion=lambda
