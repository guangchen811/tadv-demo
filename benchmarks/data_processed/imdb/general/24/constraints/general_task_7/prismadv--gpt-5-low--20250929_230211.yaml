      - 9e55662f-f55f-431d-8e0f-6343db477c8b
      - 36dd7930-c52c-4101-8fef-ffa7616cf999
    - suggestion: '.satisfies("No_of_Votes > 0", "At least 60% rows have positive
        votes (ensures m>0)", lambda f: f >= 0.60)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 755f724c-f696-4a69-a57c-a3c427bae35b
      source_assumptions:
      - d2730276-e0e5-41de-bb6c-01f7efa03bcc
    - suggestion: '.satisfies("No_of_Votes = CAST(No_of_Votes AS INT)", "Votes are
        integers", lambda f: f == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 11df1e45-acfb-45b4-b9e3-399cda5dec36
      source_assumptions:
      - 9e55662f-f55f-431d-8e0f-6343db477c8b
      - 36dd7930-c52c-4101-8fef-ffa7616cf999
    - suggestion: '.satisfies("IMDB_Rating < 7.0 OR (IMDB_Rating IS NOT NULL AND No_of_Votes
        >= 0)", "Top-picks eligible rows have valid rating and nonnegative votes",
        lambda f: f == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 7c020c09-9759-4273-a707-631e0cf8ec3e
      source_assumptions:
      - 36dd7930-c52c-4101-8fef-ffa7616cf999
    assumptions:
    - text: 'For any record included in the exported top_picks, IMDB_Rating must be
        present and >= 7.0, and No_of_Votes must be a defined non-negative integer.
        This can be validated with constraints like: where(top_picks).isGreaterOrEqual(''IMDB_Rating'',
        7.0) and where(top_picks).isNonNegative(''No_of_Votes'').'
      sources:
      - start_line: 39
        end_line: 40
        file: ''
      - start_line: 53
        end_line: 55
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 63
        end_line: 76
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: 36dd7930-c52c-4101-8fef-ffa7616cf999
    - text: The Bayesian weighted rating wr requires the denominator (No_of_Votes
        + m) to be strictly positive for all rows used in ranking. Therefore, the
        60th percentile m of No_of_Votes must be > 0 and No_of_Votes must be >= 0
        for all rows. This avoids division by zero in wr and ensures quality_score
        is well-defined.
      sources:
      - start_line: 43
        end_line: 47
        file: ''
      - start_line: 40
        end_line: 40
        file: ''
      uid: d2730276-e0e5-41de-bb6c-01f7efa03bcc
    - text: For rows where No_of_Votes == 0, the weighted rating wr should equal the
        global mean rating C, so the resulting quality_score must equal 0.8*C + 0.2*meta_scaled
        (i.e., IMDB_Rating should not influence quality_score when No_of_Votes is
        zero).
      sources:
      - start_line: 43
        end_line: 47
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: baa6585a-fcca-49ca-ac6a-78503f7fb3c7
    - text: Within the ranked base set (IMDB_Rating >= 7.0), ordering is by quality_score
        descending and then by No_of_Votes descending. Thus, for any two rows with
        equal quality_score in base/top_picks, the one with greater No_of_Votes must
        have a smaller (better) display_rank. This can be checked by verifying monotonicity
        of No_of_Votes when quality_score ties occur.
      sources:
      - start_line: 55
        end_line: 58
        file: ''
      uid: 303fc8a9-1624-4bcc-ae66-f62daecbb828
    - text: IMDB_Rating is expected to be a valid rating on the [0, 10] scale and
        numeric; No_of_Votes is expected to be an integer count >= 0. Since both feed
        into wr and quality_score used for sorting and selection, out-of-range IMDB_Rating
        or negative No_of_Votes would invalidate the ranking logic.
      sources:
      - start_line: 39
        end_line: 40
        file: ''
      - start_line: 43
        end_line: 47
        file: ''
      - start_line: 57
        end_line: 57
        file: ''
      uid: 9e55662f-f55f-431d-8e0f-6343db477c8b
