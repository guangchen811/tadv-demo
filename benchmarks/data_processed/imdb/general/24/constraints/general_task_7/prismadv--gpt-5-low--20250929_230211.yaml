      uid: 8082cf70-ed12-4bd6-815d-6e285043fb03
    - text: Meta_score may be null or non-numeric (e.g., 'N/A'); such values are acceptable
        because they will be coerced to null and then imputed with the mean IMDB_Rating
        when computing quality_score. There is no minimum required fraction of non-null
        Meta_score values for the script to run.
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      uid: 9543878f-d748-4c54-a10d-60155d39d736
    - text: To avoid unexpected ranking inflation, Meta_score should not contain extremely
        large positive or negative numeric outliers (e.g., < 0 or > 100). Enforce
        that all non-null values lie within [0, 100].
