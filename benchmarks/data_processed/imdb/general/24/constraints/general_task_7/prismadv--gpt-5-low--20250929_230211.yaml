    - text: 'The ''Poster_Link'' column should be complete (no nulls), because nulls
        produce null asset IDs and propagate to outputs (top_picks and assets_manifest).
        We could represent this assumption as a deequ constraint like this: .isComplete(''Poster_Link'')
        (or in Great Expectations: expect_column_values_to_not_be_null).'
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      uid: fd3c8059-7714-4e0e-b589-5dbca441b5b5
    - text: 'The ''Poster_Link'' values should be non-empty and trimmed (no leading/trailing
        whitespace), to avoid creating distinct asset IDs for visually identical links.
        We could represent this assumption as a deequ constraint like this: .satisfies("CASE
        WHEN Poster_Link IS NOT NULL AND LENGTH(TRIM(Poster_Link)) > 0 AND Poster_Link
        = TRIM(Poster_Link) THEN 1 ELSE 0 END", "Poster_Link non-empty and trimmed",
        lambda x: x == 1.0) (or in Great Expectations: expect_column_values_to_not_match_regex=''^\s|\s$''
        and expect_column_values_to_match_regex=''^.+$'').'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      uid: a025fe19-edd2-416d-8bb7-a91a9b03cee8
    - text: 'The ''Poster_Link'' values should be valid HTTP(S) URLs, since they are
        treated as external asset links and exported to a manifest. We could represent
        this assumption as a deequ constraint like this: .satisfies("CASE WHEN Poster_Link
        RLIKE ''^(?i)https?://.+$'' THEN 1 ELSE 0 END", "Poster_Link URL format",
        lambda x: x == 1.0) (or in Great Expectations: expect_column_values_to_match_regex=''^(?i)https?://.+$'').'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      uid: 67403162-e1e2-49fa-ad51-be07b136521a
    - text: 'The number of distinct ''Poster_Link'' values should be greater than
        zero (at least one valid poster present), as uniqueness is computed and used
        to build asset IDs and stats. We could represent this assumption as a deequ
        constraint like this: .hasNumberOfDistinctValues(''Poster_Link'', lambda d:
        d > 0) (or in Great Expectations: expect_column_unique_value_count_to_be_between(min_value=1)).'
