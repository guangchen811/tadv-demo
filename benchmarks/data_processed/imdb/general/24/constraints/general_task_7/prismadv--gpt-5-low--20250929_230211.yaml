    assumptions:
    - text: 'The input data must include the ''Certificate'' column because it is
        selected for the final output. We could represent this as a check that the
        column exists: hasColumn(''Certificate'').'
      sources:
      - start_line: 72
        end_line: 72
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: 2115bd4c-5a3f-4677-ad2f-e07674e23243
    - text: 'Because ''Certificate'' is exported without any cleaning or imputation,
        it should be mostly non-null for rows that make it into Top Picks (IMDB_Rating
        >= 7.0), otherwise the output will contain many blanks. A reasonable assumption
        is that completeness of ''Certificate'' within the IMDB_Rating >= 7.0 subset
        is at least 0.85. Deequ example: .where("IMDB_Rating >= 7.0").hasCompleteness("Certificate",
        lambda x: x >= 0.85).'
      sources:
      - start_line: 55
        end_line: 62
        file: ''
      - start_line: 72
        end_line: 79
        file: ''
      uid: 9a4af9ea-98ec-4279-b052-fd540435201f
    - text: 'The ''Certificate'' values should behave like a small categorical domain
        (e.g., ratings labels) with limited distinct values. Based on data characteristics
        (approximate 13 distinct values), assume the number of distinct ''Certificate''
        values in the input does not exceed 25. Deequ example: .hasApproxCountDistinct("Certificate",
        lambda x: x <= 25).'
      sources:
      - start_line: 72
        end_line: 72
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: e236dbdc-09ec-4c89-b8fa-da10ca09d39c
    - text: 'The ''Certificate'' values should be string-like (castable to string),
        since they are written to CSV as-is. Deequ example: .satisfies("CASE WHEN
        `Certificate` IS NULL OR CAST(`Certificate` AS STRING) IS NOT NULL THEN 1
        ELSE 0 END", "Certificate string-like", lambda x: x == 1.0).'
      sources:
      - start_line: 72
        end_line: 72
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: 03b5b96d-3fe7-41b6-9678-3a6433085bdc
