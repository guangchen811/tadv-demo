constraints:
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda c: c >= 0.80)'
      - Valid
    - - '.hasPattern(''Gross'', r''^\d{1,3}(,\d{3})*$'', lambda p: p >= 0.90)'
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - '.hasPattern(''Runtime'', r''^\s*\d+\s*min\s*$'', lambda p: p >= 0.98)'
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title,Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'',''Released_Year''], lambda u: u == 1.0)'
      - Valid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    assumptions: []
  Star2:
    code:
    - - .isComplete('Star2')
      - Valid
    assumptions: []
  Star3:
    code:
    - - .isComplete('Star3')
      - Valid
    assumptions: []
  Star4:
    code:
    - - .isComplete('Star4')
      - Valid
    assumptions: []
  cast_fields:
    code:
    - - '.satisfies("length(trim(Star1)) > 0 and lower(trim(Star1)) <> ''nan'' and
        length(trim(Star2)) > 0 and lower(trim(Star2)) <> ''nan'' and length(trim(Star3))
        > 0 and lower(trim(Star3)) <> ''nan'' and length(trim(Star4)) > 0 and lower(trim(Star4))
        <> ''nan'' and Star1 <> Star2 and Star1 <> Star3 and Star1 <> Star4 and Star2
        <> Star3 and Star2 <> Star4 and Star3 <> Star4", lambda r: r == 1.0, [''Star1'',''Star2'',''Star3'',''Star4''])'
      - Invalid
    assumptions: []
