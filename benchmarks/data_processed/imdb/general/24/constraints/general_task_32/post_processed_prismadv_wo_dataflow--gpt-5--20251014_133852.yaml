      reason_if_invalid: ''
      level: warning
      uid: 80260e43-1b76-47f7-b1e7-d15b61c9361f
      source_assumptions:
      - c106cbc9-2993-4eb3-a8b4-b855918009c6
    assumptions:
    - text: 'IMDB_Rating should be numeric and finite for the vast majority of input
        rows (e.g., at least 95%). Non-numeric values may exist but should be rare,
        because the pipeline coerces them to null and then uses the column to compute
        a mean, a weighted ranking, sorting, and numeric rendering. This can be represented
        as a Deequ constraint like: satisfies("CASE WHEN IMDB_Rating IS NOT NULL AND
        IMDB_Rating NOT IN (''NaN'', ''inf'', ''-inf'') AND IMDB_Rating >= -1e308
        AND IMDB_Rating <= 1e308 THEN 1 ELSE 0 END", "IMDB_Rating numeric and finite",
        lambda x: x >= 0.95).'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 24
        end_line: 25
        file: ''
      - start_line: 29
        end_line: 31
        file: ''
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
      uid: 2dd66ee8-73df-4e7c-bef9-48378aa33fb2
    - text: "IMDB_Rating values should lie within the inclusive range [0.0, 10.0]\
        \ for all non-null entries, since the UI scales ratings to a 0\u2013100% star\
        \ bar by multiplying by 10. This can be represented as: satisfies(\"CASE WHEN\
        \ IMDB_Rating IS NULL THEN 1 WHEN IMDB_Rating >= 0 AND IMDB_Rating <= 10 THEN\
        \ 1 ELSE 0 END\", \"IMDB_Rating in [0,10]\", lambda x: x == 1)."
      sources:
      - start_line: 55
        end_line: 55
        file: ''
      uid: 41b9f02c-6d46-49c7-971d-771f5334975b
    - text: 'IMDB_Rating cannot be entirely null or non-numeric; at least one row
        must have a valid finite numeric rating so that the column mean (C) is defined
        and the ranking score is meaningful. This can be represented as: completeness("IMDB_Rating")
        > 0 or numRowsWhere("IMDB_Rating IS NOT NULL AND IMDB_Rating = IMDB_Rating
        AND IMDB_Rating NOT IN (inf, -inf)") >= 1.'
      sources:
      - start_line: 24
        end_line: 24
        file: ''
      uid: c8df8b09-198a-4f82-873e-237b9f8c3868
    - text: 'There should be at least 12 rows with a valid IMDB_Rating (non-null,
        finite, and within [0,10]) so all featured cards can display a numeric rating
        and star bar. This can be represented as: numRowsWhere("IMDB_Rating IS NOT
        NULL AND IMDB_Rating >= 0 AND IMDB_Rating <= 10") >= 12.'
      sources:
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
