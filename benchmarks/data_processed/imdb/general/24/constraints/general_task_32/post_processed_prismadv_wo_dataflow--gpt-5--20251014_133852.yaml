      uid: aca83011-43f9-428a-86a6-71b8b23f292b
    - text: 'No_of_Votes must be a non-negative count whenever IMDB_Rating is finite,
        so that v + m > 0 and the weights v/(v+m) and m/(v+m) are in [0,1] (the code
        enforces m > 0). Consequently, for such rows ranking_score must lie between
        IMDB_Rating and the dataset mean rating C. Example constraints: satisfies(''No_of_Votes
        >= 0'', where = ''isFinite(IMDB_Rating)'') and (after computing C externally)
        satisfies(''ranking_score >= LEAST(IMDB_Rating, :C) AND ranking_score <= GREATEST(IMDB_Rating,
        :C)'', where = ''isFinite(IMDB_Rating) AND No_of_Votes >= 0'').'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 29
        end_line: 30
        file: ''
      uid: 2702b0f6-dde2-4c04-9204-a6f2086c5480
    - text: 'Runtime must contain a numeric minute value parsable to a positive integer
        for every row that will be rendered (i.e., in the featured/top-N set determined
        by ranking_score, IMDB_Rating, No_of_Votes). Example constraints: satisfies("Runtime
        RLIKE ''\\d+''", where = ''ranking_score IS NOT NULL'') and satisfies("CAST(regexp_extract(Runtime,
        ''\\d+'', 0) AS INT) > 0", where = ''ranking_score IS NOT NULL'').'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 44
        end_line: 49
        file: ''
      uid: 4df4c4d7-ae4e-4544-bc0f-fd1224324784
    - text: 'Within a single dataset run, the pair (IMDB_Rating, No_of_Votes) functionally
        determines ranking_score because C and m are global constants computed from
        IMDB_Rating and No_of_Votes. Thus any two rows with identical IMDB_Rating
        and No_of_Votes must have identical ranking_score. Example constraint: hasApproxFunctionalDependency(''ranking_score'',
        [''IMDB_Rating'', ''No_of_Votes'']).'
      sources:
      - start_line: 22
        end_line: 30
        file: ''
      uid: 38891ce0-fda4-427d-99a4-b091b86cd671
