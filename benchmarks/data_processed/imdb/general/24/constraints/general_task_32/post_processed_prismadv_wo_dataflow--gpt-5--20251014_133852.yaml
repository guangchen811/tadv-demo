      - start_line: 51
        end_line: 53
        file: ''
      uid: e90e4dab-acad-4f3b-9c3d-adb4df42f0f4
    - text: The ranking_score column must equal the Bayesian-style weighted blend
        of IMDB_Rating and No_of_Votes computed with dataset-level constants m = quantile_0_60(No_of_Votes)
        and C = avg(IMDB_Rating). Enforce with a Deequ compliance constraint after
        precomputing m and C in the pipeline, e.g., .satisfies("abs(ranking_score
        - ((No_of_Votes/(No_of_Votes + m))*IMDB_Rating + (m/(No_of_Votes + m))*C))
        < 1e-6", "ranking_score_consistency").
      sources:
      - start_line: 22
        end_line: 30
        file: ''
      uid: 819a2046-20c9-49f5-b05a-23371d89b009
    - text: 'Released_Year must be non-null and castable to integer whenever Series_Title
        is present, to construct deterministic and collision-free slugs and to render
        the title with its year. This can be enforced with a conditional multi-column
        constraint: .satisfies("Series_Title IS NULL OR Released_Year IS NOT NULL",
        "year_required_for_slug").'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      - start_line: 54
        end_line: 54
        file: ''
      - start_line: 95
        end_line: 95
        file: ''
      uid: 2fc5ce47-4a3c-41cf-a685-c69b56248fa2
