  '["IMDB_Rating","No_of_Votes"]':
    code:
    - suggestion: '.satisfies("IMDB_Rating IS NOT NULL AND No_of_Votes IS NOT NULL
        AND NOT isnan(IMDB_Rating) AND IMDB_Rating >= 0 AND IMDB_Rating <= 10 AND
        No_of_Votes >= 0", "ratings_votes_valid", assertion=lambda f: f == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: d231896a-792e-4a72-920a-cbd3831e5a1e
      source_assumptions:
      - 8f9e5901-b3eb-4b85-86c6-9c53265983bd
    assumptions:
    - text: 'IMDB_Rating and No_of_Votes must be co-present and finite numerics for
        all rows used for ranking and rendering, with joint domain constraints: 0
        <= IMDB_Rating <= 10 and No_of_Votes >= 0. This prevents NaNs from numeric
        coercion and guarantees the sort, formatting, and arithmetic are valid. Example
        constraints: Deequ .satisfies(''IMDB_Rating IS NOT NULL AND No_of_Votes IS
        NOT NULL AND IMDB_Rating >= 0 AND IMDB_Rating <= 10 AND No_of_Votes >= 0'',
        ''ratings_votes_valid''), plus type checks .hasDataType(''IMDB_Rating'', Fractional,
        false) and .hasDataType(''No_of_Votes'', Integral, false).'
      sources:
      - start_line: 19
        end_line: 20
        file: ''
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 29
        end_line: 29
        file: ''
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 51
        end_line: 53
        file: ''
      - start_line: 101
        end_line: 101
        file: ''
      uid: d479071a-2bfd-4b17-b2cf-f49617a0be7e
    - text: 'The pair (IMDB_Rating, No_of_Votes) functionally determines ranking_score
        for a fixed dataset (because C and m are dataset-level constants). Therefore,
        any two records with the same IMDB_Rating and No_of_Votes must have identical
        ranking_score. Constraint sketch: SQLCheck ensuring per-group consistency:
        SELECT COUNT(*) FROM (SELECT IMDB_Rating, No_of_Votes FROM df GROUP BY IMDB_Rating,
        No_of_Votes HAVING MAX(ranking_score) - MIN(ranking_score) <> 0) t = 0.'
      sources:
      - start_line: 22
        end_line: 25
        file: ''
      - start_line: 29
        end_line: 29
        file: ''
      uid: 8f9e5901-b3eb-4b85-86c6-9c53265983bd
    - text: 'For every row, ranking_score must lie between the row''s IMDB_Rating
        and the global mean IMDB_Rating C (score is a convex combination of r and
        C with weights v/(v+m) and m/(v+m)). Formal bound: MIN(IMDB_Rating, C) <=
        ranking_score <= MAX(IMDB_Rating, C). Constraint approach: compute C = AVG(IMDB_Rating)
        once, then apply a dataset-wide predicate such as .satisfies(''ranking_score
        >= LEAST(IMDB_Rating, {C}) AND ranking_score <= GREATEST(IMDB_Rating, {C})'',
        ''score_within_bounds'').'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 29
        end_line: 29
        file: ''
      uid: 90ffe2bd-d94b-4eba-9997-3107b622dc19
    - text: 'Within any group of rows sharing the same IMDB_Rating value r, the absolute
        deviation |ranking_score - r| must be non-increasing as No_of_Votes increases
        (higher vote counts put more weight on the observed rating). Formally, for
        rows i and j with the same IMDB_Rating r, if No_of_Votes_i >= No_of_Votes_j
        then |ranking_score_i - r| <= |ranking_score_j - r|. Constraint implementation
        (SQL/window): partition by IMDB_Rating, order by No_of_Votes ASC, enforce
        that the sequence of ABS(ranking_score - IMDB_Rating) is monotone non-increasing.'
      sources:
      - start_line: 24
        end_line: 26
        file: ''
      - start_line: 29
        end_line: 29
        file: ''
      uid: e99ba466-6124-48bd-b531-9a76a116471f
  '["IMDB_Rating","No_of_Votes","Poster_Link"]':
    code: []
    assumptions:
    - text: 'IMDB_Rating and No_of_Votes must both be present (non-null), numeric,
        and No_of_Votes must be >= 0 for every record used for ranking and rendering.
        This is required because these two columns are combined arithmetically to
        compute ranking_score and later cast to float/int for display. This can be
        captured as a multi-column compliance constraint such as: (IMDB_Rating IS
        NOT NULL) AND (No_of_Votes IS NOT NULL) AND (No_of_Votes >= 0).'
      sources:
      - start_line: 19
        end_line: 20
        file: ''
      - start_line: 21
        end_line: 31
        file: ''
      - start_line: 51
        end_line: 53
        file: ''
      uid: 3bc64b3c-7bd5-4797-ad35-3c367a3978fb
    - text: 'ranking_score must equal the Bayesian-weighted estimate derived jointly
        from IMDB_Rating and No_of_Votes (with dataset-level constants C = avg(IMDB_Rating)
        and m = quantile(No_of_Votes, 0.60), or m = 1000.0 if the computed m is not
        finite or <= 0). Concretely, for each row: ranking_score = (No_of_Votes /
        (No_of_Votes + m)) * IMDB_Rating + (m / (No_of_Votes + m)) * C, and the value
        must be finite. This can be validated as a multi-column compliance check comparing
        the recomputed score to ranking_score within a small tolerance.'
      sources:
      - start_line: 21
        end_line: 31
        file: ''
      uid: 103d9500-0009-452c-ba2d-559f3bb68059
    - text: 'Rows that are eligible for rendering (i.e., with valid IMDB_Rating and
        No_of_Votes used to select featured items) must have a non-empty Poster_Link,
        since it is used as the image src in the output. This can be expressed as
        a conditional multi-column completeness constraint: IF (IMDB_Rating IS NOT
        NULL AND No_of_Votes IS NOT NULL) THEN length(trim(Poster_Link)) > 0.'
      sources:
      - start_line: 34
        end_line: 34
        file: ''
      - start_line: 47
        end_line: 47
        file: ''
      - start_line: 92
        end_line: 94
        file: ''
      uid: b722ff58-b216-43ef-8deb-4d5698fc5734
