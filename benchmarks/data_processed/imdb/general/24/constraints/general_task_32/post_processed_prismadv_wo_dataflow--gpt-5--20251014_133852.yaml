    code:
    - suggestion: '.satisfies("(`IMDB_Rating` IS NOT NULL AND `IMDB_Rating` = `IMDB_Rating`
        AND `IMDB_Rating` >= -1e308 AND `IMDB_Rating` <= 1e308)", "At least one finite
        numeric IMDB_Rating", lambda x: x >= 1)'
      validity: true
