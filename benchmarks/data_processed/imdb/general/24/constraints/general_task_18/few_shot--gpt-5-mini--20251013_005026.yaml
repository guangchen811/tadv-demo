constraints:
  Gross:
    code:
    - - .containsPattern('Gross', '^\$?[0-9,]+$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isBetween('IMDB_Rating', 0.0, 10.0)
      - Invalid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda x: x >= 0.5)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .containsPattern('Runtime', '^[0-9]{2,3} min$')
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title,Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'',''Released_Year''], lambda x: x == 1.0)'
      - Valid
    assumptions: []
