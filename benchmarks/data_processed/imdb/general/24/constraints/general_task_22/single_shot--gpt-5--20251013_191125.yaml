constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda v: v >= 0.85)'
      - Valid
    - - .isContainedIn('Certificate', ['U', 'G', 'PG', 'TV-PG', 'UA', 'PG-13', 'TV-14',
        'R', 'TV-MA', 'NC-17', 'A', 'Not Rated', 'Unrated', 'Approved', 'Passed',
        'U/A', 'GP'])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda v: v >= 0.75)'
      - Valid
    - - .hasPattern('Gross', r'^\d{1,3}(,\d{3})*$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .hasDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      - Valid
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda v: v >= 0.80)'
      - Valid
    - - .hasDataType('Meta_score', ConstrainableDataTypes.Fractional)
      - Valid
    - - '.hasMax(''Meta_score'', lambda v: v <= 100.0)'
      - Valid
    - - '.hasMin(''Meta_score'', lambda v: v >= 0.0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .hasDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', r'^https?://')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .hasDataType('Released_Year', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Released_Year'', lambda v: v <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^[0-9]{2,3}\s*min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - '.hasMinLength(''Series_Title'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
