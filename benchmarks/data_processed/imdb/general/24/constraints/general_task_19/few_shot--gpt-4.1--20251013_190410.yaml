constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda c: c >= 0.89)'
      - Valid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isBetween('IMDB_Rating', lowerBound=0.0, upperBound=10.0, includeLower=True,
        includeUpper=True)
      - Invalid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isNonNegative('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - '.hasNumberOfDistinctValues(''Series_Title'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
