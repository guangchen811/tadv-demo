constraints:
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda x: x <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda x: x >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMin(''Released_Year'', lambda x: x >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .compliesWithPattern('Runtime', r'^([1-9][0-9]{1,2}) min$')
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - .areUnique(('Series_Title', 'Released_Year'))
      - Invalid
    assumptions: []
