  '["Certificate","Genre"]':
    code: []
    assumptions:
    - text: 'If the Genre indicates family/kid-oriented content (e.g., contains ''family'',
        ''animation'', ''kids'', ''children''), then Certificate must be present and
        within the family-friendly set {''U'',''G'',''PG'',''PG-13'',''UA''}. This
        ensures such titles are not excluded by the family-friendly filter. Example
        Deequ constraint: .satisfies("case when lower(Genre) rlike ''(family|animation|kids|children)''
        then upper(trim(coalesce(Certificate,''''))) in (''U'',''G'',''PG'',''PG-13'',''UA'')
        else true end", "Family genres must have family-friendly certificates")'
      sources:
      - start_line: 45
        end_line: 50
        file: ''
      - start_line: 51
        end_line: 53
        file: ''
      - start_line: 83
        end_line: 86
        file: ''
      uid: f4fe00f2-4103-4a01-82f0-6bcff9107be3
    - text: 'If the Genre indicates adult/erotic content (e.g., contains ''adult''
        or ''erotic''), then Certificate must not be family-friendly and should instead
        be in {''R'',''NC-17'',''A'',''NOT RATED'',''UNRATED''}. Example Deequ constraint:
        .satisfies("case when lower(Genre) rlike ''(adult|erotic)'' then upper(trim(coalesce(Certificate,'''')))
        in (''R'',''NC-17'',''A'',''NOT RATED'',''UNRATED'') else true end", "Adult
        genres must not have family-friendly certificates")'
      sources:
      - start_line: 48
        end_line: 50
        file: ''
      - start_line: 51
        end_line: 53
        file: ''
      uid: aa9879cf-0792-48e3-9729-59fde409f6de
    - text: 'If Certificate is family-friendly (one of {''U'',''G'',''PG'',''PG-13'',''UA''}),
        then Genre must not indicate adult/erotic content (no match to ''(adult|erotic|xxx)'').
        Example Deequ constraint: .satisfies("case when upper(trim(coalesce(Certificate,'''')))
        in (''U'',''G'',''PG'',''PG-13'',''UA'') then not(lower(Genre) rlike ''(adult|erotic|xxx)'')
        else true end", "Family-friendly certificates cannot have adult genres")'
      sources:
      - start_line: 83
        end_line: 86
        file: ''
      - start_line: 51
        end_line: 53
        file: ''
      uid: 18e96c8e-f072-4bf2-ba62-5d1fb7142929
  '["Certificate","Genre","Gross","IMDB_Rating","No_of_Votes","Poster_Link","Released_Year","Runtime","Series_Title"]':
    code: []
    assumptions:
    - text: 'Poster_Link functions as a stable identifier for a movie and must functionally
        determine all output attributes. For any given Poster_Link, the fields Series_Title,
        Released_Year, IMDB_Rating, No_of_Votes, Gross, Certificate, and Genre should
        be consistent across duplicates. This can be enforced as functional dependencies
        such as: isFunctionalDependency(''Poster_Link'', ''Series_Title''), ... ,
        isFunctionalDependency(''Poster_Link'', ''Genre''). Optionally, also enforce
        .isUnique([''Poster_Link'']) to avoid duplicates entirely.'
      sources:
      - start_line: 93
        end_line: 96
        file: ''
      - start_line: 101
        end_line: 104
        file: ''
      uid: 147198c1-9a88-4749-a319-d07f09e99ea6
    - text: The dynamic weighting assumes a well-defined, positive correlation between
        IMDB_Rating and No_of_Votes. To ensure the vote_weight reflects observed correlation
        (rather than defaulting to bounds), the Pearson correlation corr(IMDB_Rating,
        No_of_Votes) should be finite and within [0.20, 0.35]. Represent with two
        constraints, e.g., hasCorrelation('IMDB_Rating','No_of_Votes', lowerBound=0.20)
        and hasCorrelation('IMDB_Rating','No_of_Votes', upperBound=0.35).
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 70
        end_line: 74
        file: ''
      uid: 18e338b1-e540-40c3-a7be-916a75455781
    - text: 'Family-friendly eligibility is derived solely from Certificate; thus,
        for any given Poster_Link, the eligibility decision must be consistent. Enforce
        Poster_Link -> Certificate (or directly Poster_Link -> EligibleFamilyFriendly)
        via functional dependency: isFunctionalDependency(''Poster_Link'',''Certificate'')
        and/or isFunctionalDependency(''Poster_Link'',''EligibleFamilyFriendly'').'
      sources:
      - start_line: 83
        end_line: 86
        file: ''
      - start_line: 93
        end_line: 96
        file: ''
      - start_line: 45
        end_line: 50
        file: ''
      uid: ebc50de0-988c-4311-9e85-51c2b15e39f7
    - text: 'Each logical movie (Series_Title, Released_Year) should appear at most
        once in the ranked outputs to avoid duplicate display of the same title under
        different posters. Enforce multi-column uniqueness: .isUnique([''Series_Title'',
        ''Released_Year'']).'
      sources:
      - start_line: 97
        end_line: 108
        file: ''
      uid: d76517e1-5882-4c92-b81c-575c7efdb1de
