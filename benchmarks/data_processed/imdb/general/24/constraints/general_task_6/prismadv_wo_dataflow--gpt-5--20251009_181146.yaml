    assumptions:
    - text: 'IMDB_Rating must be present and numeric-parsable for all rows; the script
        coerces to numeric and immediately uses it in normalization and scoring without
        imputing missing values. We could represent this with Deequ like: .isComplete("IMDB_Rating")
        and .satisfies("CAST(`IMDB_Rating` AS DOUBLE) IS NOT NULL", "IMDB_Rating numeric",
        lambda x: x == 1.0).'
