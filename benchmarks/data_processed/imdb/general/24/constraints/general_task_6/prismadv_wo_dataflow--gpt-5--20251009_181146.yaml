        end_line: 26
        file: ''
      uid: 80d5d53f-9d40-4a79-9222-6f0616686f55
    - text: 'IMDB_Rating should not be constant; there must be at least 2 distinct
        numeric values so the correlation with votes is defined and ranking is meaningful.
        We could represent this with Deequ like: .hasNumberOfDistinctValues("IMDB_Rating",
