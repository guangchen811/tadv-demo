        end_line: 36
        file: ''
      uid: e089ee7c-284e-4d75-bc0b-4380df25c9cf
    - text: "The parsed Runtime (in minutes) should be within a realistic movie range\
        \ for most rows (e.g., 40 to 240 minutes for >= 95%), given the runtime bonus\
        \ is centered at 100 with sigma\u224835. Deequ example: .satisfies(\"CAST(regexp_extract(Runtime,\
        \ '^(\\\\d+)', 1) AS DOUBLE) BETWEEN 40 AND 240\", \"Runtime minutes range\"\
        , lambda x: x >= 0.95). Great Expectations example (after deriving a parsed\
