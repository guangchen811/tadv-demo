        end_line: 39
        file: ''
      - start_line: 75
        end_line: 81
        file: ''
      uid: cf075561-e885-437b-ae1f-3a3772f4fe7b
    - text: 'Runtime should be parseable to an integer number of minutes in the majority
        of rows (>= 95%). Concretely, the value should start with digits that represent
        minutes so that regexp_extract(Runtime, ''^(\\d+)'', 1) is not null. Deequ
        example: .satisfies("regexp_extract(Runtime, ''^(\\d+)'', 1) IS NOT NULL",
        "Runtime parseable", lambda x: x >= 0.95). Great Expectations example: expect_column_values_to_match_regex(Runtime,
        "^\\s*\\d+").'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      uid: e75f09b4-5c17-4bf8-a9ec-025622de40f8
    - text: 'Runtime values should be expressed in minutes only (not hour-minute formats
        like ''2h 30m''), optionally followed by ''min'' or ''minutes''. This ensures
        the extracted leading number truly represents minutes and avoids mis-parsing
        ''2h 30m'' as 2. Great Expectations example: expect_column_values_to_match_regex(Runtime,
        "^\\s*\\d+\\s*(min|minutes)?\\s*$", mostly=0.95).'
      sources:
