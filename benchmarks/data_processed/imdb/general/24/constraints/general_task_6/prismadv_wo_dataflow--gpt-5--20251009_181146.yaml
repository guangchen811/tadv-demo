        file: ''
      - start_line: 75
        end_line: 81
        file: ''
      uid: 436ba3b7-0dbd-49e0-a538-620990f38bdd
    - text: "IMDB_Rating values should be on the 0\u201310 scale since the code normalizes\
        \ by dividing by 10 without clipping. We could represent this with Deequ like:\
        \ .hasMin(\"IMDB_Rating\", lambda m: m >= 0.0) and .hasMax(\"IMDB_Rating\"\
