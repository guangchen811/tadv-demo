results:
  IMDB_Rating:
    code:
    - suggestion: '.hasMax(''IMDB_Rating'', lambda m: m <= 10.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''IMDB_Rating'', lambda m: m >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: '.hasMin(''Released_Year'', lambda m: m >= 1900)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .hasPattern('Runtime', r'^[1-9][0-9]{1,2} min$')
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Runtime'', r''^[1-9][0-9]{1,2}
        min$'')'' failed on data sample: Value: 0.9 does not meet the constraint requirement!'
      level: error
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
