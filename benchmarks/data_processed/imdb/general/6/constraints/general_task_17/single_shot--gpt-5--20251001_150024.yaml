constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda v: v >= 0.85)'
      - Valid
    - - .hasPattern('Certificate', r'^(U|PG|PG-13|R|NC-17|G|A|18\+|TV-(MA|PG|14|G|Y7))$',
        0.85)
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda v: v >= 0.82)'
      - Valid
    - - .hasPattern('Gross', r'^\d{1,3}(,\d{3})*$', 0.80)
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .hasDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isContainedInRange('IMDB_Rating', 0.0, 10.0)
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda v: v >= 0.80)'
      - Valid
    - - .hasDataType('Meta_score', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isContainedInRange('Meta_score', 0.0, 100.0)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .hasDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .hasPattern('Overview', r'^\s*\S.*$', 1.0)
      - Invalid
    - - .isComplete('Overview')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', r'^https?://', 1.0)
      - Invalid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .hasDataType('Released_Year', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    - - .isContainedInRange('Released_Year', 1900, 2025)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^\s*\d+\s*min\s*$', 1.0)
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .hasPattern('Series_Title', r'^\s*\S.*$', 1.0)
      - Invalid
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - .isUnique(['Series_Title','Released_Year'])
      - Invalid
    assumptions: []
  Star1, Star2, Star3, Star4:
    code:
    - - .areComplete(['Star1','Star2','Star3','Star4'])
      - Valid
    - - .areDistinct(['Star1','Star2','Star3','Star4'])
      - Invalid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    assumptions: []
