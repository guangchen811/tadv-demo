constraints:
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - .isDataType('Meta_score', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isLessThanOrEqualTo('Meta_score', 100.0)
      - Invalid
    - - .isNonNegative('Meta_score')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - '.hasNumberOfDistinctValues(''Poster_Link'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('Poster_Link')
      - Valid
    - - .isDataType('Poster_Link', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isDataType('Released_Year', ConstrainableDataTypes.Integral)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .isComplete('Runtime')
      - Valid
    - - .isDataType('Runtime', ConstrainableDataTypes.String)
      - Invalid
    - - .satisfies('Runtime', "Runtime RLIKE '^\\s*(\\d+)\\s*min\\s*$'", hint='Runtime
        must be in \'X min\' format')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    - - .isDataType('Series_Title', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - .isUnique(['Series_Title', 'Released_Year'])
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isPositive('id')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
