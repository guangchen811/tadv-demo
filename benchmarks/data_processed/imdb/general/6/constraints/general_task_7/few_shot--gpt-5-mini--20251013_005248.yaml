constraints:
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isGreaterThanOrEqualTo('IMDB_Rating', 0)
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - '.hasNumberOfDistinctValues(''Poster_Link'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', '^\s*(\d+)\s*min\s*$')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  title_year_key:
    code:
    - - '.hasNumberOfDistinctValues(''title_year_key'', lambda x: x == 3)'
      - Invalid
    assumptions: []
