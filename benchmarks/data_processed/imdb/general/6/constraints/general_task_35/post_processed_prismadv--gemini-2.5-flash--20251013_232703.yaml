    assumptions:
    - text: 'The ''IMDB_Rating'' column is assumed to contain values that are entirely
        convertible to numeric types (float) without introducing nulls, and the ''Runtime''
        column is assumed to contain string values that consistently match the pattern
        ''X min'' (where X is an integer between 10 and 999) such that they can be
        parsed into non-null integer minutes. This joint validity is crucial because
        the downstream code calculates a ''composite_score'' and filters a ''licensing
        shortlist'' based on both ''IMDB_Rating'' and the parsed ''Runtime'' (''runtime_min'').
        Any records where either conversion or parsing fails (resulting in nulls)
        will either have a null ''composite_score'' or be implicitly excluded from
        the shortlist. The code implicitly assumes a high proportion of records will
        satisfy these conditions for both columns simultaneously.


        We could represent this assumption with Deequ constraints like these:

        .isComplete(''IMDB_Rating'') // Expects no NaNs after pd.to_numeric(..., errors=''coerce'')

        .isNonNegative(''IMDB_Rating'')

        .isLessThanOrEqualTo(''IMDB_Rating'', 10.0)

        .satisfies(''Runtime'', "Runtime.matches(''^([1-9][0-9]{1,2}) min$'')") //
        Ensures Runtime format for parsing

        .hasMinLength(''Runtime'', 6) // e.g., ''10 min'', ''100 min''

        .hasMaxLength(''Runtime'', 7) // e.g., ''999 min''

        // To ensure a high proportion of records meet these joint validity criteria:

        .hasNumberOfRows(df.filter(col(''IMDB_Rating'').isNotNull.and_(col(''Runtime'').rlike(''^([1-9][0-9]{1,2})
        min$''))).count(), _ >= 0.95)'
