      - start_line: 26
        end_line: 33
        file: ''
      - start_line: 55
        end_line: 55
        file: ''
      uid: ec6c7726-2a2f-49e4-9e4a-abfe540f5b5d
    - text: 'For non-null values, ''Gross'' should be parseable as a number after
        removing comma thousands separators; values should not contain currency symbols
        or letters. Example validation: Great Expectations expect_column_values_to_match_regex
        on non-null rows with pattern ''^\s*(\d{1,3}(,\d{3})*|\d+)(\.\d+)?\s*$'';
        Deequ hasPattern(''Gross'', ''^\s*(\d{1,3}(,\d{3})*|\d+)(\.\d+)?\s*$'', complianceFraction
