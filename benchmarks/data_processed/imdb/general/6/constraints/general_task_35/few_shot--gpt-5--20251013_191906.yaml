constraints:
  Gross:
    code:
    - - .hasPattern('Gross', r'^[0-9,]+$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda x: x <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda x: x >= 0.0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMax(''Released_Year'', lambda x: x <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda x: x >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^[1-9][0-9]{1,2} min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .isNonNegative('id')
      - Valid
    assumptions: []
