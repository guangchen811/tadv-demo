constraints:
  Certificate:
    code:
    - - '.satisfies("Certificate IS NULL OR Certificate IN (''U'',''UA'',''U/A'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not
        Rated'',''TV-14'',''TV-MA'')", ''allowed_certificates'', lambda d: d == 1.0)'
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .hasDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      - Valid
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.satisfies(''Meta_score IS NULL OR (Meta_score >= 0 AND Meta_score <= 100)'',
        ''meta_score_range'', lambda d: d == 1.0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .hasDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .isComplete('Overview')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', r'^https?://.*amazon\.com/.+\.jpg$')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .hasDataType('Released_Year', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    - - '.satisfies(''Released_Year >= 1900 AND Released_Year <= year(current_date())'',
        ''released_year_range'', lambda d: d == 1.0)'
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^\s*\d+\s*min\s*$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .hasDataType('Series_Title', ConstrainableDataTypes.String)
      - Invalid
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
