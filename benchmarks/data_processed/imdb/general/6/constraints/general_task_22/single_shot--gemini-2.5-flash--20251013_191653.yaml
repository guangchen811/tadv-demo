constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda x: x >= 0.85)'
      - Valid
    - - .isContainedIn('Certificate', ['U', 'G', 'PG', 'TV-PG', 'UA', 'PG-13', 'TV-14',
        'R', 'TV-MA', 'NC-17', 'A', 'Not Rated', 'Unrated', 'Approved', 'Passed',
        'U/A', 'GP'])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .hasPattern('Genre', r'^[A-Za-z]+(?:, [A-Za-z]+)*$')
      - Invalid
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda x: x >= 0.8)'
      - Valid
    - - .hasPattern('Gross', r'^[0-9,]+$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isGreaterThanOrEqualTo('IMDB_Rating', 1.0)
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda x: x >= 0.8)'
      - Valid
    - - .isGreaterThanOrEqualTo('Meta_score', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('Meta_score', 100.0)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isGreaterThanOrEqualTo('Released_Year', 1900)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^[0-9]{2,3} min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
