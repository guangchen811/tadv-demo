    - text: '''WeightedRank'' is a convex combination of ''HybridRating'' and the
        dataset mean C = avg(''HybridRating'') with weights depending on ''No_of_Votes''
        and m = quantile(''No_of_Votes'', 0.70). Therefore for every row: min(''HybridRating'',
        C) <= ''WeightedRank'' <= max(''HybridRating'', C); additionally, when ''No_of_Votes''
        = 0 then ''WeightedRank'' must equal C. These can be validated as compliance
