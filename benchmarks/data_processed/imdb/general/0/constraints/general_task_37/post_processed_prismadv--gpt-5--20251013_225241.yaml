    - text: 'For any record included in the filtered set (IMDB_Rating >= 7.0), both
        ''Series_Title'' and ''Released_Year'' must be present and valid. Specifically:
        ''Series_Title'' should be non-empty and ''Released_Year'' must be non-null
        and castable to integer. This can be enforced with conditional completeness:
        isCompleteIf(''Series_Title'', ''IMDB_Rating >= 7.0'') and isCompleteIf(''Released_Year'',
        ''IMDB_Rating >= 7.0'').'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 76
        end_line: 77
        file: ''
      uid: a75e9a21-32d9-4efd-8a41-951dcec88017
    - text: There must be at least two records where both 'IMDB_Rating' and 'Meta_score'
        are non-null to compute a meaningful correlation used for 'meta_weight'. This
        can be represented as numRowsWhere('IMDB_Rating IS NOT NULL AND Meta_score
