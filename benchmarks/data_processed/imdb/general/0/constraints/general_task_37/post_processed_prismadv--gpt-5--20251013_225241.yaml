    - text: 'When ''Meta_score'' is null, ''IMDB_Rating'' should be non-null so that
        ''MetaNormFilled'' is defined (fallback to IMDB_Rating). This can be enforced
        as an implication: forAll(''Meta_score IS NULL => IMDB_Rating IS NOT NULL'').'
