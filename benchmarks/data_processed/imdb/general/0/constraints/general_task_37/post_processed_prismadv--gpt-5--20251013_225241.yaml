    - text: 'Series_Title should contain at least one ASCII alphanumeric character
        so that slugify does not collapse the entire title to an empty string. Deequ
        example: .satisfies("CASE WHEN Series_Title RLIKE ''[A-Za-z0-9]'' THEN 1 ELSE
        0 END", "Series_Title has ASCII alnum", lambda x: x == 1.0)'
