  '["MetaNorm","Meta_score"]':
    code: []
    assumptions:
    - text: "MetaNorm is a normalized version of Meta_score on the same 0\u201310\
        \ scale as IMDB_Rating. For any row where Meta_score is not null, MetaNorm\
        \ must equal Meta_score/10 (within a small tolerance), and MetaNorm should\
        \ be null if and only if Meta_score is null. Example constraints: For rows\
        \ where Meta_score IS NOT NULL -> abs(MetaNorm - Meta_score/10.0) <= 1e-6;\
        \ For rows where Meta_score IS NULL -> MetaNorm IS NULL."
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 60
        end_line: 60
        file: ''
      uid: 6d9806ce-b5fd-4848-ad99-2b5c9fc21bd5
    - text: 'MetaNormFilled must equal the row-wise coalesce of MetaNorm and IMDB_Rating:
        if MetaNorm is not null it must equal MetaNormFilled; otherwise MetaNormFilled
        must equal IMDB_Rating. Example constraint: satisfies(''MetaNormFilled = CASE
        WHEN MetaNorm IS NOT NULL THEN MetaNorm ELSE IMDB_Rating END'').'
      sources:
      - start_line: 60
        end_line: 62
        file: ''
      uid: 315ca87d-b38b-4a89-bde9-cfd128ddbfdf
    - text: 'There should be at least 2 rows where both IMDB_Rating and Meta_score
        are non-null to compute a meaningful correlation used for weighting. Example
        constraint: count of rows satisfying (IMDB_Rating IS NOT NULL AND Meta_score
        IS NOT NULL) >= 2.'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      uid: 1e0e9623-0027-43b3-8ba5-ea561477175c
    - text: 'IMDB_Rating and Meta_score are expected to be positively correlated on
        non-null pairs (corr >= 0.4) to justify using the higher meta_weight; otherwise
        a lower weight is used. Example constraint: hasCorrelation(''IMDB_Rating'',
        ''Meta_score'', lowerBound=0.4).'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
