        end_line: 62
        file: ''
      uid: b2a22fd6-5c2c-4802-82c7-4e7990787a15
    - text: '''HybridRating'' must lie between ''IMDB_Rating'' and ''MetaNormFilled''
        for rows where both inputs are non-null, because it is a convex combination
        with 0 < meta_weight < 1. This can be enforced as: forAll(''HybridRating >=
        least(IMDB_Rating, MetaNormFilled) AND HybridRating <= greatest(IMDB_Rating,
        MetaNormFilled)'').'
      sources:
      - start_line: 59
        end_line: 62
        file: ''
      uid: 920c38a0-8350-45dd-a005-b23000d211b8
    - text: For records included in the filtered set (IMDB_Rating >= 7.0), 'WeightedRank'
        must be non-null/finite (requires the denominator v+m > 0 and 'HybridRating'
        not null). Enforce with isCompleteIf('WeightedRank', 'IMDB_Rating >= 7.0')
        and optionally assert that the 70th percentile of 'No_of_Votes' (m) is > 0
        at dataset level.
      sources:
