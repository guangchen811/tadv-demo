    assumptions:
    - text: 'Co-presence: If ''Meta_score'' is non-null on a row, ''IMDB_Rating''
        must also be non-null. This is implied by computing correlation on rows where
        both are present and by using ''IMDB_Rating'' as the fallback when ''Meta_score''
        is missing. We could represent this as a Deequ compliance constraint: .hasCompliance(''meta_imdb_copresence'',
        ''Meta_score IS NULL OR IMDB_Rating IS NOT NULL'', _ >= 1.0)'
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      - start_line: 61
        end_line: 62
        file: ''
      uid: 3d404b3e-d946-408c-9d92-47b2692746c4
    - text: "Scale comparability and positive association: 'Meta_score' is expected\
        \ on a 0\u2013100 scale and 'IMDB_Rating' on a 0\u201310 scale; after scaling\
        \ ('MetaNorm' = Meta_score/10), 'IMDB_Rating' and 'MetaNorm' should be positively\
        \ correlated (e.g., Pearson correlation >= 0.2). We could represent this with\
        \ Deequ: .hasCorrelation('IMDB_Rating', 'MetaNorm', _ >= 0.2)"
      sources:
      - start_line: 57
        end_line: 61
        file: ''
      uid: 49f02d59-ec90-4d82-96ec-488f9c968cc4
    - text: 'Deterministic fallback for hybrid input: ''MetaNormFilled'' must equal
        ''Meta_score/10'' when ''Meta_score'' is present, and equal ''IMDB_Rating''
        when ''Meta_score'' is null. This guards the intended fallback logic used
        to compute the hybrid rating. Deequ compliance example: .hasCompliance(''metanormfilled_logic'',
        ''(Meta_score IS NOT NULL AND ABS(MetaNormFilled - Meta_score/10.0) < 1e-6)
        OR (Meta_score IS NULL AND ABS(MetaNormFilled - IMDB_Rating) < 1e-6)'', _
        >= 1.0)'
      sources:
      - start_line: 60
        end_line: 62
        file: ''
      uid: 463254ca-0fde-4d1c-80e5-6d8aa6228a1d
    - text: 'Eligibility prerequisites for top-feed rows: For rows where ''IMDB_Rating''
        >= 7.0 (i.e., included in ''filtered''), ''Series_Title'' and ''Released_Year''
        must both be non-null and ''Released_Year'' must be castable to integer, since
        ''catalog_id'' is constructed from these fields. Deequ compliance example:
        .hasCompliance(''topfeed_id_prereqs'', ''IMDB_Rating < 7.0 OR (Series_Title
        IS NOT NULL AND Released_Year IS NOT NULL)'', _ >= 1.0)'
      sources:
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 76
        end_line: 77
        file: ''
      uid: 7bb6b40d-4d43-449d-9000-c785f767b3a9
    - text: 'Weighted rank bounds: Because ''WeightedRank'' is a convex combination
        of each row''s ''HybridRating'' (R) and the dataset mean ''HybridRating''
        (C), with weights based on ''No_of_Votes'' and the 70th percentile ''m'',
        each row''s ''WeightedRank'' must lie between ''HybridRating'' and ''C''.
        After computing C externally, a Deequ compliance could be: .hasCompliance(''weighted_rank_bounds'',
        ''LEAST(HybridRating, {C}) <= WeightedRank AND WeightedRank <= GREATEST(HybridRating,
        {C})'', _ >= 1.0)'
      sources:
