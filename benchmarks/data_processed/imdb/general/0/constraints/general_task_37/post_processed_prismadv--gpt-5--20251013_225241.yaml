  '["IMDB_Rating","No_of_Votes","WeightedRank"]':
    code: []
    assumptions:
    - text: "Meta_score and IMDB_Rating are on compatible scales for fusion: Meta_score\
        \ is on a 0\u2013100 scale and IMDB_Rating on a 0\u201310 scale, so MetaNorm\
        \ = Meta_score/10 is comparable to IMDB_Rating. When Meta_score is null, the\
        \ hybrid uses IMDB_Rating as the fallback (MetaNormFilled == IMDB_Rating).\
        \ This can be validated with constraints such as: (a) when Meta_score is null,\
        \ HybridRating should equal IMDB_Rating; (b) when Meta_score is not null,\
        \ Meta_score must lie within [0,100] and IMDB_Rating within [0,10]."
      sources:
      - start_line: 57
        end_line: 62
        file: ''
      - start_line: 39
        end_line: 39
        file: ''
      uid: 98bff37c-33e8-400b-ad41-ffe029cff04d
    - text: WeightedRank relies on a per-row convex combination of HybridRating and
        the dataset mean HybridRating with weights based on No_of_Votes and m = quantile_0.70(No_of_Votes).
        For WeightedRank to be defined for every row, the denominator (No_of_Votes
        + m) must be strictly positive for every row (i.e., m > 0 or No_of_Votes >
        0 for all rows). This can be enforced by first computing m from the batch
        and then asserting No_of_Votes + m > 0 for all rows.
      sources:
      - start_line: 64
        end_line: 68
        file: ''
      uid: 0ebbb5e8-078c-4891-b137-7dd9dfb1b182
    - text: 'Because WeightedRank is a convex combination of each row''s HybridRating
        and the dataset mean HybridRating, for every row WeightedRank must lie between
        HybridRating and the mean HybridRating. Concretely: min(HybridRating, avg(HybridRating))
        <= WeightedRank <= max(HybridRating, avg(HybridRating)).'
      sources:
      - start_line: 65
        end_line: 68
        file: ''
      uid: a109830e-35b1-4929-b85a-b53e59d505b1
    - text: In the subset used to build the feed (IMDB_Rating >= 7.0), the trio [WeightedRank,
        No_of_Votes, IMDB_Rating] must be non-null numeric so that sorting by ['WeightedRank','No_of_Votes','IMDB_Rating']
        in descending order is well-defined. This can be checked with completeness/finite-value
        constraints scoped to rows where IMDB_Rating >= 7.0.
      sources:
      - start_line: 39
        end_line: 40
        file: ''
      - start_line: 62
        end_line: 62
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 87
        end_line: 88
        file: ''
      uid: b927ec62-45e2-41ea-ac16-eaf09cd7dc2d
  '["IMDB_Rating","Released_Year","Series_Title"]':
    code: []
    assumptions:
    - text: The combination of 'Series_Title' and 'Released_Year' should be unique
        across all records (i.e., each title-year pair identifies a single movie).
        This can be enforced as a uniqueness constraint, e.g., .isUnique(['Series_Title','Released_Year']).
      sources:
