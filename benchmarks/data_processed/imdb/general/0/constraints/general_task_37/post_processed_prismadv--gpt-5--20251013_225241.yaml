    - text: 'Series_Title should not be empty or whitespace-only after trimming; otherwise
        the slug created for catalog_id could be empty and result in IDs like ''-<year>''.
        Deequ example: .satisfies("CASE WHEN TRIM(Series_Title) <> '''' THEN 1 ELSE
