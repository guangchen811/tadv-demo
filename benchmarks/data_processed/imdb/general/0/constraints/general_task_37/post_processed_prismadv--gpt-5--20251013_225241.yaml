  '["HybridRating","IMDB_Rating","Meta_score"]':
    code: []
    assumptions:
    - text: 'IMDB_Rating and Meta_score should be positively correlated on rows where
        both are non-null; expected Pearson correlation >= 0.4 to justify increasing
        the Meta critic weight. Example Deequ: .hasCorrelation(''IMDB_Rating'', ''Meta_score'',
        lambda c: c >= 0.4)'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      uid: ccb1d929-2664-4681-9898-4b0b6ec49e84
    - text: 'When Meta_score is null for a row, HybridRating must equal IMDB_Rating
        (because MetaNormFilled backs off to IMDB_Rating). Example Deequ: .satisfies(''CASE
        WHEN Meta_score IS NULL THEN HybridRating = IMDB_Rating ELSE TRUE END'', ''hybrid_equals_imdb_when_meta_missing'',
        lambda f: f == 1.0)'
      sources:
      - start_line: 61
        end_line: 62
        file: ''
      uid: 99680eaa-61cc-452e-b0df-86f5e88afbc3
    - text: 'When both IMDB_Rating and Meta_score are present, HybridRating must lie
        between IMDB_Rating and Meta_score/10 (HybridRating is a convex combination
        of these two values). Example Deequ: .satisfies(''CASE WHEN Meta_score IS
        NOT NULL AND IMDB_Rating IS NOT NULL THEN HybridRating BETWEEN LEAST(IMDB_Rating,
        Meta_score/10.0) AND GREATEST(IMDB_Rating, Meta_score/10.0) ELSE TRUE END'',
        ''hybrid_within_components_range'', lambda f: f == 1.0)'
      sources:
      - start_line: 60
        end_line: 62
        file: ''
      uid: 78d0b3ce-7a26-4fc8-994d-d8a88ad5d432
    - text: 'A sufficient fraction of rows should have both IMDB_Rating and Meta_score
        non-null to compute a meaningful correlation and stable HybridRating; expected
        joint completeness >= 0.8. Example Deequ: .satisfies(''IMDB_Rating IS NOT
        NULL AND Meta_score IS NOT NULL'', ''imdb_meta_joint_completeness'', lambda
        f: f >= 0.8)'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      uid: 077446fe-03cd-4c07-87a3-84cc7c8eef50
  '["HybridRating","No_of_Votes","WeightedRank"]':
    code: []
    assumptions:
    - text: "HybridRating must equal a convex combination of IMDB_Rating and Meta_score/10\
        \ with a global weight w chosen as: w=0.3 if corr(IMDB_Rating, Meta_score)\
        \ > 0.4 on rows where both are non-null, otherwise w=0.1. Formally, for every\
        \ row: HybridRating \u2248 w * coalesce(Meta_score/10, IMDB_Rating) + (1 -\
        \ w) * IMDB_Rating, within a small tolerance (e.g., 1e-6). This can be validated\
        \ by recomputing w from the dataset the same way and checking row-level equality."
      sources:
      - start_line: 57
        end_line: 62
        file: ''
      uid: ee41c21d-4a55-4f62-b85d-fbe3f99921ee
    - text: If Meta_score is null in a row, then HybridRating should equal IMDB_Rating
        exactly (up to a small tolerance), because MetaNormFilled falls back to IMDB_Rating.
      sources:
      - start_line: 60
        end_line: 62
        file: ''
      uid: ca33301d-e76f-4e38-b506-7e2b3c860700
    - text: "If Meta_score is not null, HybridRating must lie between the two inputs\
        \ it blends: min(IMDB_Rating, Meta_score/10) \u2264 HybridRating \u2264 max(IMDB_Rating,\
        \ Meta_score/10)."
      sources:
      - start_line: 60
        end_line: 62
        file: ''
      uid: edc9e230-78a4-46bf-b614-5d9e22060fa3
    - text: "WeightedRank must equal the Bayesian-weighted average of HybridRating\
        \ with the global mean of HybridRating, using No_of_Votes to determine the\
        \ weight: WeightedRank \u2248 (No_of_Votes / (No_of_Votes + m)) * HybridRating\
        \ + (m / (No_of_Votes + m)) * C, where m is the 70th percentile of No_of_Votes\
        \ and C is the mean of HybridRating computed over the dataset."
      sources:
      - start_line: 64
        end_line: 68
        file: ''
      uid: 58fcec2c-42bb-481d-b705-b38f17024beb
    - text: "WeightedRank must be bounded between HybridRating and the global mean\
        \ HybridRating: min(HybridRating, C) \u2264 WeightedRank \u2264 max(HybridRating,\
        \ C), where C is the dataset mean of HybridRating. Additionally, for rows\
        \ where No_of_Votes = 0, WeightedRank should equal C (within a small tolerance)."
      sources:
      - start_line: 64
        end_line: 68
        file: ''
      uid: 1b62cac1-6922-439f-beac-b950ca97c057
    - text: The combination of Series_Title and Released_Year should be unique across
        the exported feed because it is used to form a catalog identifier (catalog_id).
        This can be represented as a uniqueness constraint on [Series_Title, Released_Year]
        for the final dataset.
      sources:
      - start_line: 76
        end_line: 78
        file: ''
      uid: 14e21575-53c0-4813-ad98-be514be2747b
