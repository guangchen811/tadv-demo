        end_line: 62
        file: ''
      uid: e97f9ac1-168b-4aea-be73-6731dd98663f
    - text: 'If Meta_score is null, IMDB_Rating must be non-null (so the fallback
        in MetaNormFilled is always available). Representable in Deequ as: Compliance(''fallback_available'',
        ''Meta_score IS NOT NULL OR IMDB_Rating IS NOT NULL'')'
      sources:
      - start_line: 39
        end_line: 39
        file: ''
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      uid: dee9c93c-b8df-4cf5-bcb0-d8d46170e312
    - text: 'IMDB_Rating and Meta_score are intended to reflect the same underlying
        signal; their Pearson correlation over rows where both are present should
        be non-negative (recommended >= 0.4 as a quality expectation). In Deequ: hasCorrelation(''IMDB_Rating'',
        ''Meta_score'', _ >= 0.0)'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      uid: b447b148-6a1f-4d4c-9eda-c9d6c267371a
    - text: 'For rows included in the feed (IMDB_Rating >= 7.0), Series_Title and
        Released_Year must be present such that a numeric Released_Year can be used
        to build catalog_id. Deequ compliance example: Compliance(''catalog_id_ready_for_filtered'',
        ''IMDB_Rating < 7.0 OR (Series_Title IS NOT NULL AND Released_Year IS NOT
        NULL)'')'
      sources:
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 76
        end_line: 77
        file: ''
      uid: 5c4a4c58-feb9-4f47-99e4-b14d1e3e39ac
    - text: 'HybridRating is a convex combination of MetaNormFilled and IMDB_Rating
        with weights in [0.1, 0.3] and [0.7, 0.9], respectively; therefore HybridRating
        must lie between MetaNormFilled and IMDB_Rating on every row. Deequ compliance
        example: Compliance(''hybrid_in_between'', ''((MetaNormFilled <= IMDB_Rating
        AND HybridRating >= MetaNormFilled AND HybridRating <= IMDB_Rating) OR (MetaNormFilled
        > IMDB_Rating AND HybridRating >= IMDB_Rating AND HybridRating <= MetaNormFilled))'')'
      sources:
      - start_line: 57
        end_line: 62
        file: ''
