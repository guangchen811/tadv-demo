    - text: 'The ''Score'' column is a composite metric derived from ''IMDB_Rating'',
        ''Meta_score'', ''No_of_Votes'', and ''Runtime_Min''. It is assumed that:
        ''IMDB_Rating'' values are numeric and typically within a range of 0 to 10
