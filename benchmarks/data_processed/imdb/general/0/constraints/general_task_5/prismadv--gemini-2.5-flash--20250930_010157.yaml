    - text: 'Within each hierarchical group defined by ''Decade_Label'' and ''GenreToken'',
        movies are sorted and ranked. The primary sorting key is ''Score'' (descending),
        and ''Gross_Num'' (transformed into ''Gross_Tie'') serves as a secondary tie-breaker
        (descending). This implies that ''Score'' and ''Gross_Num'' are expected to
        be numeric and ordered consistently to ensure a stable and meaningful ranking.
        Consequently, the combination of ''Decade_Label'', ''GenreToken'', and ''Rank''
        should be unique. We could represent this assumption as a deequ constraint
        like this: .isUnique([''Decade_Label'', ''GenreToken'', ''Rank''])'
