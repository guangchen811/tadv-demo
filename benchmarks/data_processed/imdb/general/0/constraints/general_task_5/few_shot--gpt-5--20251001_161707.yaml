constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['G','PG','PG-13','R','NC-17','U','UA','A','12','12A','15','18'])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .hasPattern('Genre', r'^[A-Za-z\-]+(,\s*[A-Za-z\-]+)*$')
      - Valid
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasMax(''Meta_score'', lambda v: v <= 100.0)'
      - Valid
    - - '.hasMin(''Meta_score'', lambda v: v >= 0.0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - '.hasMin(''No_of_Votes'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', r'^https?://')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMax(''Released_Year'', lambda v: v <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      - Valid
    - - .hasPattern('Released_Year', r'^\d{4}$')
      - Invalid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^\d{2,3} min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .hasPattern('Series_Title', r'.*\S.*')
      - Valid
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
