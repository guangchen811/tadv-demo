    assumptions:
    - text: 'The columns ''IMDB_Rating'', ''Meta_score'', and ''No_of_Votes'' are
        combined in a weighted average to compute a ''base_score''. This implies an
        assumption that these three metrics are positively correlated, as they all
        contribute positively to the final score. A movie with a high IMDB rating
        is generally expected to have a high Metascore and a high number of votes.

        We could represent this assumption as a deequ constraint like this:

        .correlation(''IMDB_Rating'', ''Meta_score'', _ >= 0.3)

        .correlation(''IMDB_Rating'', ''No_of_Votes'', _ >= 0.3)'
      sources:
      - start_line: 139
        end_line: 147
        file: ''
      uid: 5da4d2d2-7a86-4848-919c-f23444ef59e3
    - text: "The final 'Score' is calculated by multiplying the 'base_score' (derived\
        \ from 'IMDB_Rating', 'Meta_score', 'No_of_Votes') with a 'pacing' factor\
        \ derived from 'Runtime_Min'. This creates a complex relationship where the\
        \ final score depends on all four input columns, assuming they collectively\
        \ represent a movie's quality and pacing.\nWe could represent this relationship\
        \ with a custom deequ constraint that verifies the calculation: \n.satisfies('Score\
        \ = ((0.6 * IMDB_Rating/10.0 + 0.25 * Meta_score/100.0 + 0.15 * log10(No_of_Votes)/6.0)\
        \ * (1.0 - abs(Runtime_Min - 120) / 300.0))', 'score_calculation_check')"
      sources:
      - start_line: 147
        end_line: 148
        file: ''
      uid: 2221b3a3-83b4-479d-a1c9-4a5308fb4bcc
    - text: 'The ranking logic sorts movies first by ''Score'' and then uses ''Gross''
        revenue as a tie-breaker. This implies an assumption that ''Gross'' revenue
        is positively correlated with the primary ''Score''. Movies that rank highly
        based on the score formula are also expected to be high-grossing films.

        We could represent this assumption as a deequ constraint like this:

        .correlation(''Score'', ''Gross_Num'', _ > 0.2)'
      sources:
      - start_line: 162
        end_line: 164
        file: ''
      uid: 104d6c9f-c4c8-4ce0-a4b3-1e5605fd39ea
    - text: 'The ''IMDB_Rating'' and ''No_of_Votes'' columns are used together in
        both the score calculation and the final display logic. Since these metrics
        originate from the same source (IMDb), it''s assumed that a record cannot
        have a rating without a corresponding number of votes. Therefore, if a value
        is present in the ''IMDB_Rating'' column, a value must also be present in
        the ''No_of_Votes'' column.

        We could represent this assumption as a deequ constraint like this:

        .completeness(''No_of_Votes'', where=''IMDB_Rating IS NOT NULL'', _ == 1.0)'
      sources:
      - start_line: 22
        end_line: 37
        file: ''
      - start_line: 139
        end_line: 142
        file: ''
      uid: be6f2b91-fe6b-430f-8f9c-e749206b9c2b
