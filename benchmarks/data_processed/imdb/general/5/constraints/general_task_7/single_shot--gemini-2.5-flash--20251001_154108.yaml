constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda completeness: completeness >= 0.85)'
      - Valid
    - - .isContainedIn('Certificate', ['U', 'A', 'UA', 'PG', 'PG-13', 'R', 'NC-17',
        'G', 'TV-MA', 'TV-14', 'TV-PG', 'TV-G', 'NOT RATED', 'Unrated', 'Approved'])
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda completeness: completeness >= 0.80)'
      - Valid
    - - .isLessThanOrEqualTo('Meta_score', 100.0)
      - Invalid
    - - .isNonNegative('Meta_score')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - '.hasUniqueness(''Poster_Link'', lambda uniqueness: uniqueness >= 0.90)'
      - Invalid
    - - .isComplete('Poster_Link')
      - Valid
    - - .satisfies("Poster_Link LIKE 'https://m.media-amazon.com/images/%'", 'poster_link_format')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isLessThanOrEqualTo('Released_Year', 2024)
      - Invalid
    - - .isNonNegative('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .isComplete('Runtime')
      - Valid
    - - .satisfies("Runtime RLIKE '^\\s*\\d+\\s*min\\s*$'", 'runtime_format_matches_regex')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    - - .isDataType('Series_Title', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    assumptions: []
  Star2:
    code:
    - - .isComplete('Star2')
      - Valid
    assumptions: []
  Star3:
    code:
    - - .isComplete('Star3')
      - Valid
    assumptions: []
  Star4:
    code:
    - - .isComplete('Star4')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
