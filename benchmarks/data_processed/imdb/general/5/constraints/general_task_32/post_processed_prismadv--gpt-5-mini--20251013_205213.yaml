        == ''NR'', otherwise certificate_display == the trimmed string form of Certificate.
        This can be checked with a Deequ-style predicate such as: .satisfies("coalesce(nullif(trim(Certificate),
        ''''), ''NR'') = certificate_display", "certificate_display_consistency").'
      sources:
