  '["IMDB_Rating","No_of_Votes"]':
    code: []
    assumptions:
    - text: 'There must be at least TOP_N (12) rows where both IMDB_Rating and No_of_Votes
        are present (non-null) and finite. The script computes a ranking_score from
        these two columns and then selects the top 12 rows, so if fewer than 12 rows
        have both columns populated the featured selection will be incomplete. Actionable
        check example: count rows satisfying (IMDB_Rating IS NOT NULL AND isFinite(IMDB_Rating)
        AND No_of_Votes IS NOT NULL AND isFinite(No_of_Votes)) >= 12. In Deequ-like
        form you could express this by filtering then asserting an atLeast count for
        the dataset slice: .where("IMDB_Rating IS NOT NULL AND No_of_Votes IS NOT
        NULL").hasSizeAtLeast(12).'
      sources:
      - start_line: 19
        end_line: 34
        file: ''
      uid: a9370563-e80b-44d8-be1f-420f24c38606
    - text: 'To ensure deterministic selection and stable rendering, the tuple (ranking_score,
        IMDB_Rating, No_of_Votes) should not contain exact duplicates for the rows
        used to pick the top entries. The code sorts by these three fields to break
        ties; if many rows have identical values ties will be non-deterministic. Actionable
        check example: assert uniqueness of the three-column combination for the set
        of candidate rows (or at least for the top-K candidates). In Deequ-like form:
        .isUnique(["ranking_score", "IMDB_Rating", "No_of_Votes"]). If full uniqueness
        is too strict, require uniqueness within the top-N slice instead.'
      sources:
      - start_line: 29
        end_line: 34
        file: ''
      - start_line: 51
        end_line: 56
        file: ''
      uid: cd1063b2-9468-40aa-bb16-af7971bb0b40
    - text: "Numeric-range and type agreement between the two columns: IMDB_Rating\
        \ must be finite and within the expected 0.0\u201310.0 range (so star_fill_pct\
        \ = rating * 10 stays within 0\u2013100 before clipping), and No_of_Votes\
        \ must be a finite, non-negative integer. These constraints are required because\
        \ the code casts IMDB_Rating to float and No_of_Votes to int and uses them\
        \ in arithmetic and display. Actionable checks: IMDB_Rating >= 0.0 AND IMDB_Rating\
        \ <= 10.0 AND isFinite(IMDB_Rating); No_of_Votes >= 0 AND isIntegral(No_of_Votes)\
        \ AND isFinite(No_of_Votes). In Deequ-like form: .isContainedInRange(\"IMDB_Rating\"\
        , 0.0, 10.0) and .isNonNegative(\"No_of_Votes\") plus an integer-type check\
        \ (or assert approximateNumDistinctValues/type)."
      sources:
      - start_line: 19
        end_line: 20
        file: ''
      - start_line: 51
        end_line: 56
        file: ''
      - start_line: 29
        end_line: 34
        file: ''
      uid: eefcccad-429a-4d65-93e4-9064d7ad7d03
  '["IMDB_Rating","star_fill_pct"]':
    code: []
    assumptions:
    - text: 'IMDB_Rating is expected to be a numeric, non-missing, finite value in
        the range [0.0, 10.0] for records that are rendered (featured). This is required
        because the code casts IMDB_Rating to float (rating_val) and formats it ("{c[''imdb_rating'']:.1f}")
        and uses it to compute star_fill_pct. Actionable constraint examples:

        - Deequ: .isComplete("IMDB_Rating") and .isContainedInRange("IMDB_Rating",
        0.0, 10.0)

        - Deequ (finite check): .satisfies("IMDB_Rating == IMDB_Rating AND IMDB_Rating
        >= 0.0 AND IMDB_Rating <= 10.0", "imdb_rating_finite_and_in_range")'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
      - start_line: 101
        end_line: 101
        file: ''
      uid: 6a28f1a5-76c9-43b2-a51b-003b8d85df8f
    - text: 'star_fill_pct must exactly reflect a clamped linear transformation of
        IMDB_Rating: star_fill_pct == clamp(IMDB_Rating * 10.0, 0.0, 100.0). This
        is how the visible star bar width is produced, so any divergence means the
        UI will be inconsistent with the rating. Actionable constraint example (Deequ-like):

        - .satisfies("star_fill_pct == least(100.0, greatest(0.0, IMDB_Rating * 10.0))",
        "star_fill_matches_rating")'
      sources:
      - start_line: 51
        end_line: 55
        file: ''
      - start_line: 100
        end_line: 100
        file: ''
      uid: 0109a61d-bc8f-4675-9694-708a8eb21d92
    - text: 'IMDB_Rating and No_of_Votes must both be numeric, non-missing, and finite
        for the ranking calculation to be meaningful and for sorting to behave correctly.
        The ranking_score is computed from both columns and then used to pick top-N
        featured items; records with NaN/Inf in either column can produce invalid
        scores or ordering. Actionable constraints:

        - .isComplete("IMDB_Rating"), .isComplete("No_of_Votes")

        - .satisfies("IMDB_Rating == IMDB_RATING AND No_of_Votes == No_of_Votes",
        "finite_imdb_and_votes")

        - Optionally validate ranking_score is finite: .isComplete("ranking_score")
        and .satisfies("ranking_score == ranking_score", "ranking_score_finite")'
      sources:
      - start_line: 22
        end_line: 30
        file: ''
      - start_line: 34
        end_line: 34
        file: ''
      uid: 8b7024a8-5715-4102-ae7b-f843990d5200
