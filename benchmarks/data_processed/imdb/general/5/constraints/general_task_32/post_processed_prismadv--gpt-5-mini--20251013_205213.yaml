      reason_if_invalid: ''
      level: warning
      uid: cdea6801-e63f-4959-8f29-a5642ac86c10
      source_assumptions:
      - 1b538e17-5575-4961-b6c8-1888054fe0ae
    assumptions:
    - text: 'IMDB_Rating values must be parseable to numeric (float). The code calls
        pd.to_numeric(df[''IMDB_Rating''], errors=''coerce'') which will convert non-parseable
        strings to NaN; such coercion will remove values from mean/score calculations
        and can break downstream rendering. Example validation rules you can convert
        to Deequ or Great Expectations:

        - Deequ (satisfy most values parseable): .satisfies("CASE WHEN TRY_CAST(`IMDB_Rating`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "IMDB_Rating_parseable", lambda
        x: x >= 0.95)

        - Great Expectations: expect_column_values_to_be_of_type or a custom expectation
        that tries to cast values to float and expects a high fraction to succeed
        (e.g. >= 0.95).'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      - start_line: 23
        end_line: 24
        file: ''
      - start_line: 29
        end_line: 29
        file: ''
      uid: b7a2d5af-87e2-435f-a481-13b5d9ef572b
    - text: 'There must be at least one finite numeric IMDB_Rating so that the mean
        C = r.mean() is computable (otherwise C becomes NaN and ranking_score will
        be invalid). Preferably many more than one; at minimum ensure at least one
        non-null numeric value. Example Deequ constraint:

        .satisfies("CASE WHEN `IMDB_Rating` IS NOT NULL AND (NOT is_nan(cast(`IMDB_Rating`
        AS DOUBLE))) THEN 1 ELSE 0 END", "IMDB_Rating_has_some_numeric", lambda x:
        x > 0)

        (Or Great Expectations: expect_column_values_to_not_be_null after casting,
        or assert that count of successfully cast values >= 1.)'
      sources:
      - start_line: 23
        end_line: 24
        file: ''
      - start_line: 29
        end_line: 29
        file: ''
      uid: e36beec4-e991-4720-a86d-0f1bed856dae
    - text: 'To ensure the featured selection and rendering succeed, there should
        be at least TOP_N = 12 rows with finite numeric IMDB_Rating (so featured.head(TOP_N)
        can return items with valid ratings). This can be expressed as: at least 12
        rows where IMDB_Rating is numeric and finite. Example Deequ constraint:

        .satisfies("CASE WHEN `IMDB_Rating` IS NOT NULL AND (NOT is_nan(cast(`IMDB_Rating`
        AS DOUBLE))) THEN 1 ELSE 0 END", "IMDB_Rating_enough_finite", lambda x: x
        >= 12 / (1.0) )

        (Implement as: count of rows with finite IMDB_Rating >= 12.)'
      sources:
      - start_line: 33
        end_line: 34
        file: ''
      - start_line: 44
        end_line: 55
        file: ''
      uid: 6e7de9a6-6cd2-42ab-9abe-163277e95715
    - text: 'IMDB_Rating values are expected to be finite and within the conventional
        IMDB range (0.0 through 10.0). The UI computes star_fill_pct = rating_val
        * 10 and clamps to [0,100], and the HTML prints the rating with one decimal;
        out-of-range or infinite values produce incorrect visuals. Example validation:

        .satisfies("CASE WHEN cast(`IMDB_Rating` AS DOUBLE) BETWEEN 0.0 AND 10.0 THEN
        1 ELSE 0 END", "IMDB_Rating_in_range", lambda x: x == 1.0)

        (Or Great Expectations: expect_column_values_to_be_between(min_value=0.0,
        max_value=10.0)).'
