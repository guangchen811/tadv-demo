        end_line: 50
        file: ''
      - start_line: 57
        end_line: 63
        file: ''
      uid: 0adf31c7-b3c5-4d55-848f-0e2819339ecc
    - text: 'certificate_display should contain no nulls and its values must be drawn
        from the set (distinct non-empty Certificate values) union {''NR''}. Concretely:
        .isComplete("certificate_display") and .isContainedIn("certificate_display",
        allowed_values) where allowed_values = distinct(trim(Certificate)) U {''NR''}.
        Additionally, every row with certificate_display != ''NR'' must have a non-null,
        non-empty Certificate whose trimmed value equals certificate_display.'
      sources:
      - start_line: 49
        end_line: 50
        file: ''
