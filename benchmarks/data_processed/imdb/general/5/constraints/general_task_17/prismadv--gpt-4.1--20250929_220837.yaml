    - text: 'Eligibility for a record (as defined by the ''eligible'' mask) is determined
        by the following multi-column rules: ''imdb_rating'' must be at least 7.0,
        ''runtime_min'' must be between 60 and 210 (inclusive), and ''primary_genre''
        must not be ''Short''. This implies that, for a record to be eligible, all
        three columns (''imdb_rating'', ''runtime_min'', ''primary_genre'') must be
        non-null and satisfy these conditions together.'
