  '["eligible","runtime_min"]':
    code: []
    assumptions:
    - text: 'For a record to be considered eligible (i.e., for the ''eligible'' mask
        to be True), both ''imdb_rating'' and ''runtime_min'' must be non-null and
        valid. Specifically, ''imdb_rating'' must be at least 7.0, and ''runtime_min''
        must be a numeric value between 60 and 210 inclusive. Thus, there is an implicit
        assumption that whenever ''eligible'' is True, both ''imdb_rating'' and ''runtime_min''
        are not null and within their respective bounds. This can be enforced in Deequ
        as a multi-column constraint: .where(''eligible = True'').hasMin(''imdb_rating'',
        _ >= 7.0).hasMax(''imdb_rating'', _ <= 10.0).isComplete(''imdb_rating'').hasMin(''runtime_min'',
        _ >= 60).hasMax(''runtime_min'', _ <= 210).isComplete(''runtime_min'')'
      sources:
      - start_line: 102
        end_line: 106
        file: ''
      uid: 337732d3-813e-4414-8be0-40efdf38fe67
    - text: The computation of 'runtime_component' assumes that 'runtime_min' is numeric
        and not null for all records being scored. If 'runtime_min' is null or non-numeric,
        the scoring logic may produce NaN or erroneous values. Therefore, for all
        rows that are considered for licensing scoring and eligibility, 'runtime_min'
        must be present and a valid number.
      sources:
      - start_line: 52
        end_line: 80
        file: ''
      uid: cbb4b1cc-6a18-46ad-82d1-c3b093a26180
  '["licensing_score","rank","tier"]':
    code: []
    assumptions:
    - text: The 'licensing_score' column must not contain null values for any candidate
        record that is assigned a 'rank' or 'tier'. This ensures that all records
        with a 'rank' or 'tier' have a valid computed score; i.e., licensing_score,
        rank, and tier are always jointly present for each candidate.
      sources:
      - start_line: 99
        end_line: 123
        file: ''
      uid: d5138f1c-3291-41f5-913d-60f9b0a9079f
    - text: The 'rank' column is a unique integer ranking for each candidate (no duplicate
        ranks), and the ordering of 'rank' is strictly determined by descending 'licensing_score'
        values (i.e., higher licensing_score always gets a lower rank number).
      sources:
      - start_line: 112
        end_line: 112
        file: ''
      uid: a68a9cf0-5a06-455b-bd78-1ef7cfdff939
    - text: The 'tier' assignment is deterministically derived from 'licensing_score'
        via quantile thresholds (q_high, q_mid), so for any two records with identical
        'licensing_score', their 'tier' values must also be identical.
      sources:
      - start_line: 113
        end_line: 122
        file: ''
      uid: 132d9362-668a-42e5-9005-ed994d7b0d6a
    - text: When sorting candidates by ['tier', 'rank'], the ordering must correspond
        to descending 'licensing_score' within each tier, and ascending rank reflects
        this order.
      sources:
      - start_line: 129
        end_line: 129
        file: ''
