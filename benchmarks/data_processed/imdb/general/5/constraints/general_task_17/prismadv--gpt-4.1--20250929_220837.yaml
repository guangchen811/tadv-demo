        file: ''
      uid: a780a52f-d6dc-4916-87b8-58272b68d0fe
    - text: 'The ''Series_Title'' column should not contain only whitespace or the
        string value ''nan'' (case insensitive) after stripping, as these would result
        in empty or non-informative titles for downstream processing, which could
        compromise unique ID generation and output quality.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN lower(trim(`Series_Title`)) = ''nan'' OR trim(`Series_Title`)
        = '''' THEN 0 ELSE 1 END", "No Blank or ''nan'' Titles", lambda x: x == 1)

