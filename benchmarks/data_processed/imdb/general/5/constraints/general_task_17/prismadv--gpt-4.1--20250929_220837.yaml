  '["eligible","primary_genre"]':
    code: []
    assumptions:
    - text: The 'primary_genre' column is derived as the first non-empty entry from
        the split of the 'Genre' column (after splitting by commas and trimming whitespace).
        Therefore, every record where 'Genre' is non-null and non-empty should have
        a non-null, non-empty 'primary_genre'.
