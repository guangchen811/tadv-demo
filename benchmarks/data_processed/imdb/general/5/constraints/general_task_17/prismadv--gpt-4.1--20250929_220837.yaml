        end_line: 68
        file: ''
      uid: 0ff2741b-21ca-4ea7-bdc5-bb074d0ffa00
    - text: 'The ''Series_Title'' column is expected to be unique in combination with
        ''Released_Year'' (or ''year''), as the code generates a deterministic ''title_id''
        by slugifying the title and appending the year. This assumes that there are
        no duplicate (Series_Title, Released_Year) pairs in the input data. If there
        are duplicates, the generated ''title_id'' would not be unique, which could
        cause downstream issues.

        We could represent this assumption as a deequ constraint like this:

        .hasUniqueness(["Series_Title", "Released_Year"], lambda x: x == 1)

