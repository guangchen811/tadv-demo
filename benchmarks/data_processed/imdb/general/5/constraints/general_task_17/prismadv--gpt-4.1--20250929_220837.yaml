        be rare or absent, and if present, must be convertible to a clean string representation.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN typeof(`Series_Title`) = ''string'' OR `Series_Title`
        IS NOT NULL THEN 1 ELSE 0 END", "Series_Title String Type", lambda x: x ==
        1)

