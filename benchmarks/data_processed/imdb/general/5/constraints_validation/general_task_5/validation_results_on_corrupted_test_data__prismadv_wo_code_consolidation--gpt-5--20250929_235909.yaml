results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("(`IMDB_Rating` IS NULL) OR (CAST(`IMDB_Rating` AS DOUBLE)
        IS NOT NULL)", "IMDB_Rating numeric when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `IMDB_Rating` IS NULL THEN TRUE WHEN (CAST(`IMDB_Rating`
        AS DOUBLE) >= 0.0 AND CAST(`IMDB_Rating` AS DOUBLE) <= 10.0) THEN TRUE ELSE
        FALSE END", "IMDB_Rating in [0,10] when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`IMDB_Rating` IS NOT NULL", "At least one non-null
        IMDB_Rating", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN LOWER(TRIM(`Certificate`)) = ''nan'' THEN
        0 ELSE 1 END", "No literal ''nan'' in Certificate", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL OR TRIM(`Certificate`)
        = '''' THEN 0 ELSE 1 END", "Some certificates present", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Certificate","Genre"]':
    code:
    - suggestion: '.satisfies("Certificate IS NULL OR TRIM(Certificate) = '''' OR
        UPPER(TRIM(Certificate)) IN (''G'',''PG'',''PG-13'',''R'',''NC-17'',''U'',''UA'',''A'',''12'',''12A'',''15'',''18'')",
        "Certificate within allowed domain (normalized)", lambda x: x >= 0.94)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("Certificate IS NULL OR TRIM(Certificate)
        = '''' OR UPPER(TRIM(Certificate)) IN (''G'',''PG'',''PG-13'',''R'',''NC-17'',''U'',''UA'',''A'',''12'',''12A'',''15'',''18'')",
        "Certificate within allowed domain (normalized)", lambda x: x >= 0.94)'' failed
        on data sample: Value: 0.9375 does not meet the constraint requirement!'
      level: warning
  '["Decade","Year"]':
    code:
    - suggestion: '.satisfies("length(`Released_Year`) = 4 AND `Released_Year` RLIKE
        ''^[0-9]{4}$''", "released_year_format", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.hasCompleteness("Genre", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`Genre` IS NULL) OR (trim(`Genre`) <> '''' AND lower(`Genre`)
        <> ''nan'')", "Genre non-empty and not ''nan'' when present", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("Genre", "^[A-Za-z][A-Za-z\- ]*(, *[A-Za-z][A-Za-z\-
        ]*)*$", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern("Genre", "^(?:Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western)(?:,
        *(?:Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western))*$",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("size(array_distinct(filter(transform(split(`Genre`,
        '',''), x -> trim(x)), x -> x <> ''''))) = size(filter(transform(split(`Genre`,
        '',''), x -> trim(x)), x -> x <> ''''))", "No duplicate Genre tokens per row",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(NOT (`Genre` RLIKE ''(^|,)[ ]*(Family|Animation)[
        ]*(,|$)'')) OR `Certificate` IS NULL OR (upper(`Certificate`) NOT IN (''R'',''NC-17''))",
        "Family/Animation titles not R or NC-17", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.hasCompleteness(''Gross'', lambda x: x >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Gross` IS NULL THEN 1 WHEN regexp_replace(`Gross`,
        '','', '''') RLIKE ''^[0-9]+$'' THEN 1 ELSE 0 END", "Gross parseable after
        removing commas", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Gross` IS NULL THEN 1 WHEN `Gross` RLIKE
        ''^[0-9,]+$'' THEN 1 ELSE 0 END", "Gross contains only digits and commas",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Gross` IS NULL THEN 1 WHEN CAST(regexp_replace(`Gross`,
        '','', '''') AS DOUBLE) >= 0 THEN 1 ELSE 0 END", "Non-negative Gross", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN regexp_replace(`Gross`, '','', '''') RLIKE
        ''^[0-9]+$'' THEN 1 ELSE 0 END", "At least one parseable Gross", lambda x:
        x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Gross","Gross_Num"]':
    code:
    - suggestion: '.satisfies("((`Gross` IS NULL) OR (TRIM(`Gross`) = '''') OR (`Gross`
        RLIKE ''^[0-9]{1,3}(,[0-9]{3})*$'' AND CAST(regexp_replace(`Gross`, '','',
        '''') AS BIGINT) >= 0))", "Gross string is null/blank or a non-negative comma-formatted
        integer", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: '.satisfies("`Poster_Link` IS NOT NULL AND length(trim(`Poster_Link`))
        > 0 AND lower(trim(`Poster_Link`)) <> ''nan''", "Poster_Link non-empty and
        not literal ''nan''", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("Poster_Link", "^https?://[^\s\"<>]+$", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT(trim(`Poster_Link`) RLIKE ''[\"<>]'')", "Poster_Link
        safe characters (no quotes or angle brackets)", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`Poster_Link`)) RLIKE ''^https?://.+[.](jpg|jpeg|png|webp|gif)([?].*)?$''",
        "Poster_Link image-like URLs (>=90%)", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.satisfies("CASE WHEN `Meta_score` IS NULL THEN 1 WHEN CAST(`Meta_score`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Meta_score numeric or null", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Meta_score` IS NULL THEN 1 WHEN CAST(`Meta_score`
        AS DOUBLE) >= 0 AND CAST(`Meta_score` AS DOUBLE) <= 100 THEN 1 ELSE 0 END",
        "Meta_score in [0,100] when present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Meta_score", lambda x: x >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Meta_score` IS NULL THEN 1 WHEN CAST(`Meta_score`
        AS DOUBLE) IS NOT NULL AND ABS(CAST(`Meta_score` AS DOUBLE) - CAST(CAST(`Meta_score`
        AS DOUBLE) AS BIGINT)) < 1e-9 THEN 1 ELSE 0 END", "Meta_score integer-like
        when present", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.hasCompleteness(''No_of_Votes'', lambda c: c >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(typeof(`No_of_Votes`) = \''string\'' AND CAST(`No_of_Votes`
        AS STRING) RLIKE \''^[0-9]+$\'') OR (typeof(`No_of_Votes`) <> \''string\''
        AND CAST(`No_of_Votes` AS BIGINT) = `No_of_Votes`)'', ''votes_integer_like_unformatted'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`No_of_Votes` AS DOUBLE) >= 0'', ''votes_non_negative'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(Released_Year AS STRING) RLIKE ''^[0-9]{4}$''",
        ''Released_Year_four_digits'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(Released_Year AS INT) BETWEEN 1900 AND year(current_date())'',
        ''Released_Year_in_range'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''length(Released_Year) = 4 AND CAST(Released_Year AS
        INT) BETWEEN 1900 AND year(current_date())'', ''At_least_one_valid_Released_Year'',
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''length(trim(Runtime)) > 0'', ''Non-empty Runtime'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Runtime'', ''.*\\b\\d{2,3}\\b.*'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Runtime'', ''^\\d{2,3} min$'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Series_Title:
    code:
    - suggestion: '.hasCompleteness(''Series_Title'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''length(trim(`Series_Title`)) > 0'', ''Non-empty Series_Title
        after trim'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(trim(`Series_Title`)) NOT RLIKE ''^(nan|null|none)$''",
        ''No placeholder titles'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''regexp_like(trim(`Series_Title`), ".*[A-Za-z0-9].*")'',
        ''Title has alphanumeric'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''NOT(regexp_like(`Series_Title`, \''["<>]\''))'', ''No
        HTML-breaking characters in title'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
