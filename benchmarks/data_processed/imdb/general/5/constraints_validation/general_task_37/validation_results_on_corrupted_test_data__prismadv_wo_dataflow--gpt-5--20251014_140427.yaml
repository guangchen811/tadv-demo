results:
  Star1:
    code:
    - suggestion: '.hasCompleteness(''Star1'', lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasDistinctness([''Star1''], lambda d: d >= 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
  Star2:
    code:
    - suggestion: '.hasCompleteness(''Star2'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Star4:
    code:
    - suggestion: '.satisfies(''(IMDB_Rating IS NULL) OR (IMDB_Rating < 7.0) OR (Star4
        IS NOT NULL)'', ''Star4 not null when IMDB_Rating >= 7.0'', lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("cast(`IMDB_Rating` as double) IS NOT NULL", "IMDB_Rating
        convertible to numeric", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("cast(`IMDB_Rating` as double) >= 0 AND cast(`IMDB_Rating`
        as double) <= 10", "IMDB_Rating in 0-10 range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("cast(`IMDB_Rating` as double) >= 7.0", "At least one
        high-rated title", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Certificate:
    code:
    - suggestion: '.hasCompleteness("Certificate", lambda c: c >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL THEN 1 WHEN TRIM(`Certificate`)
        = `Certificate` THEN 1 ELSE 0 END", "No leading/trailing whitespace in Certificate",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Director:
    code:
    - suggestion: '.satisfies("`Director` IS NULL OR `Director` IS NOT NULL", "Director
        column exists", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `IMDB_Rating` >= 7.0 THEN CASE WHEN `Director`
        IS NOT NULL AND TRIM(`Director`) <> '''' THEN 1 ELSE 0 END ELSE 1 END", "Director
        present for feed rows", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.satisfies("(IMDB_Rating < 7.0) OR (Genre IS NOT NULL AND LENGTH(TRIM(Genre))
        > 0)", "Genre present for feed rows", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Genre'', r''^(Action|Adventure|Animation|Biography|Comedy|Crime|Documentary|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Short|Sport|Thriller|War|Western)(\s*,\s*(Action|Adventure|Animation|Biography|Comedy|Crime|Documentary|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Short|Sport|Thriller|War|Western))*$'',
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["HybridRating","IMDB_Rating","Meta_score"]':
    code:
    - suggestion: '.hasCorrelation(''IMDB_Rating'', ''Meta_score'', assertion=lambda
        c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(IMDB_Rating < 7.0) OR (Released_Year IS NOT NULL)'',
        ''year_present_for_high_rated'', assertion=lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Poster_Link:
    code:
    - suggestion: '.satisfies("CASE WHEN Poster_Link IS NOT NULL AND TRIM(Poster_Link)
        <> '''' THEN 1 ELSE 0 END", "Poster_Link present", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Poster_Link RLIKE ''^https?://''", "Poster_Link is
        URL", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Poster_Link RLIKE ''^https?://(m\\.media-amazon\\.com|images-na\\.ssl-images-amazon\\.com)/''",
        "Poster_Link on Amazon CDN", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Poster_Link RLIKE ''\\.jpg$''", "Poster_Link is JPG",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Poster_Link RLIKE ''\\._V1_''", "Poster_Link has V1
        token", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.satisfies(''CASE WHEN `Meta_score` IS NULL THEN 1 WHEN `Meta_score`
        >= 0 AND `Meta_score` <= 100 THEN 1 ELSE 0 END'', ''Meta_score in [0,100]'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `Meta_score` IS NOT NULL AND `IMDB_Rating`
        IS NOT NULL THEN 1 ELSE 0 END'', ''Some Meta/IMDB pairs present'', lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Meta_score'', lambda v: v >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.hasApproxQuantile(''No_of_Votes'', 0.70, lambda q: q > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: warning
  Overview:
    code:
    - suggestion: '.hasCompleteness("Overview", lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueValueRatio(["Overview"], lambda r: r >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.satisfies("CASE WHEN `Released_Year` IS NULL THEN 1 ELSE CASE
        WHEN `Released_Year` <= year(current_date()) THEN 1 ELSE 0 END END", "Released_Year
        not in the future", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''length(trim(Runtime)) > 0'', ''Runtime not blank'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.satisfies("(`IMDB_Rating` < 7.0) OR (`Series_Title` IS NOT NULL
        AND LENGTH(TRIM(`Series_Title`)) > 0)", "Series_Title present for feed", lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`IMDB_Rating` < 7.0) OR (`Series_Title` RLIKE ''(?i).*[a-z0-9].*'')",
        "Series_Title has alphanumeric for slug", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`IMDB_Rating` < 7.0) OR (LENGTH(`Series_Title`) =
        LENGTH(TRIM(`Series_Title`)))", "Series_Title trimmed for feed", lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
