constraints:
  Genre:
    code:
    - - .hasMinLength('Genre', 1)
      - Invalid
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isContainedInRange('IMDB_Rating', lower=0.0, upper=10.0, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', '^https?://.+')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isContainedInRange('Released_Year', lower=1900, upper=2025, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', '^\d+\s*min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .hasMinLength('Series_Title', 1)
      - Invalid
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
