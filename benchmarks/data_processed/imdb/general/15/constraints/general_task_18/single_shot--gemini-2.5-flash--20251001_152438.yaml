constraints:
  Certificate:
    code:
    - - .hasCompleteness('Certificate', 0.89)
      - Invalid
    - - .isDataType('Certificate', 'String')
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    - - .isDataType('Director', 'String')
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    - - .isDataType('Genre', 'String')
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .hasCompleteness('Gross', 0.82)
      - Invalid
    - - .hasPattern('Gross', '^[0-9,]+$')
      - Invalid
    - - .isDataType('Gross', 'String')
      - Invalid
    - - .satisfies("CAST(REPLACE(Gross, ',', '') AS DOUBLE) >= 0", "Gross_non_negative_after_cleaning")
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isDataType('IMDB_Rating', 'Fractional')
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - .hasCompleteness('Meta_score', 0.85)
      - Invalid
    - - .isDataType('Meta_score', 'Fractional')
      - Invalid
    - - .isLessThanOrEqualTo('Meta_score', 100.0)
      - Invalid
    - - .isNonNegative('Meta_score')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isDataType('No_of_Votes', 'Integral')
      - Invalid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .isComplete('Overview')
      - Valid
    - - .isDataType('Overview', 'String')
      - Invalid
    assumptions: []
  Poster_Link:
    code:
    - - .isComplete('Poster_Link')
      - Valid
    - - .isDataType('Poster_Link', 'String')
      - Invalid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isDataType('Released_Year', 'Integral')
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', 2025)
      - Invalid
    - - .isNonNegative('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', '^[0-9]{2,3} min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    - - .isDataType('Runtime', 'String')
      - Invalid
    - - .satisfies("CAST(regexp_extract(Runtime, '([0-9]{2,3})', 1) AS INT) <= 240",
        "Runtime_parsed_max_bound")
      - Valid
    - - .satisfies("CAST(regexp_extract(Runtime, '([0-9]{2,3})', 1) AS INT) >= 45",
        "Runtime_parsed_min_bound")
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    - - .isDataType('Series_Title', 'String')
      - Invalid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - .isUnique(['Series_Title', 'Released_Year'])
      - Invalid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    - - .isDataType('Star1', 'String')
      - Invalid
    assumptions: []
  Star2:
    code:
    - - .isComplete('Star2')
      - Valid
    - - .isDataType('Star2', 'String')
      - Invalid
    assumptions: []
  Star3:
    code:
    - - .isComplete('Star3')
      - Valid
    - - .isDataType('Star3', 'String')
      - Invalid
    assumptions: []
  Star4:
    code:
    - - .isComplete('Star4')
      - Valid
    - - .isDataType('Star4', 'String')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', 'Integral')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
