constraints:
  Gross:
    code:
    - - '.satisfies("Gross IS NULL OR cast(regexp_replace(Gross, '','', '''') as double)
        IS NOT NULL", ''GrossParsableWhenPresent'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .hasDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      - Valid
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda v: v >= 0.01)'
      - Valid
    - - .hasDataType('Meta_score', ConstrainableDataTypes.Fractional)
      - Valid
    - - '.satisfies(''Meta_score IS NULL OR (Meta_score >= 0 AND Meta_score <= 100)'',
        ''MetaScoreRange'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .hasDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .hasDataType('Released_Year', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Released_Year'', lambda v: v <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - '.hasPattern(''Runtime'', ''^\\d{2,3}\\s*min$'', lambda v: v == 1.0)'
      - Valid
    - - .isComplete('Runtime')
      - Valid
    - - '.satisfies("cast(regexp_extract(Runtime, ''(\\d{2,3})'', 1) as int) BETWEEN
        45 AND 240", ''RuntimeMinutesWithinBounds'', lambda v: v == 1.0)'
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title,Released_Year:
    code:
    - - .isUnique(['Series_Title', 'Released_Year'])
      - Invalid
    assumptions: []
