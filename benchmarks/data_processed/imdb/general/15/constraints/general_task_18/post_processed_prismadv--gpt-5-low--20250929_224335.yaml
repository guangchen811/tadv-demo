    use_dataflow: true
    correlation_detection: true
    downstream_task_description: No specific description provided. The script can
      be used for any task.
  llm:
    model_name: gpt-5-low
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  IMDB_Rating:
    code:
    - suggestion: '.hasDataType(''IMDB_Rating'', ConstrainableDataTypes.Fractional,
        lambda x: x == 1.0)'
      validity: false
      reason_if_invalid: 'Skipping data type constraint: .hasDataType(''IMDB_Rating'',
        ConstrainableDataTypes.Fractional, lambda x: x == 1.0)'
      level: error
      uid: 4633dfe3-3ccb-421d-ba17-a05eb996a10f
      source_assumptions:
      - a4f51a22-bdc7-48fd-9fb9-b06dea89be2c
    - suggestion: '.hasMin(''IMDB_Rating'', lambda m: m >= 0.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: f760e25e-d639-470d-93ad-14054e82d40f
      source_assumptions:
      - 016024c0-1f13-43a4-ab5b-8fc6cd98c2e2
    - suggestion: '.hasMax(''IMDB_Rating'', lambda m: m <= 10.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: fd7655e7-ed1c-498e-96bb-b71865e96fd1
      source_assumptions:
      - 016024c0-1f13-43a4-ab5b-8fc6cd98c2e2
    - suggestion: '.hasSize(lambda n: n >= 2).satisfies("`IMDB_Rating` IS NOT NULL
        AND `Meta_score` IS NOT NULL", "Rows with both ratings present (fraction >
        0)", lambda f: f > 0.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 1a002c75-6c33-485d-b15c-b97ba3751766
      source_assumptions:
      - dbf11779-9903-432a-8063-89a7eb5738b2
    - suggestion: '.satisfies("CASE WHEN `Meta_score` IS NULL THEN `IMDB_Rating` IS
        NOT NULL ELSE TRUE END", "IMDB present when Meta_score missing", lambda x:
        x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 0127a3ee-b225-433d-91d1-0d11f5c148b2
      source_assumptions:
      - 40e620eb-5857-471b-9c44-0a716d376e28
    - suggestion: '.hasCompleteness(''IMDB_Rating'', lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: b3864761-b29d-4c9a-b743-dae5331cd1a2
      source_assumptions:
      - 04750960-998f-405c-b6c4-232ef1073ff3
    assumptions:
    - text: 'IMDB_Rating must be numeric/parseable to float for all rows used, since
        it is cast to float and used in arithmetic, correlation, and linear regression.
        A suitable validation is: .isNonNegative(''IMDB_Rating'') combined with a
        type check or a satisfies expression ensuring CAST to double is possible for
        all non-null values.'
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      uid: a4f51a22-bdc7-48fd-9fb9-b06dea89be2c
    - text: "IMDB_Rating should be on a 0\u201310 scale (inclusive). The code normalizes\
        \ it by dividing by 10 without clipping; values outside [0,10] would yield\
        \ invalid normalized scores. A suitable validation is: .hasMin('IMDB_Rating',\
        \ lambda m: m >= 0) and .hasMax('IMDB_Rating', lambda m: m <= 10)."
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 92
        end_line: 92
        file: ''
      uid: 016024c0-1f13-43a4-ab5b-8fc6cd98c2e2
    - text: 'There must be at least two rows where both IMDB_Rating and Meta_score
        are non-null to fit the linear model (np.polyfit with degree 1 requires >=2
        points). A suitable validation is: fraction of rows where IMDB_Rating IS NOT
        NULL AND Meta_score IS NOT NULL is > 0 and count >= 2.'
      sources:
      - start_line: 67
        end_line: 67
        file: ''
      - start_line: 74
        end_line: 77
        file: ''
      uid: dbf11779-9903-432a-8063-89a7eb5738b2
    - text: 'For any row with missing Meta_score, IMDB_Rating should be non-null so
        that Meta_score can be imputed from IMDB_Rating. A suitable validation is:
        .satisfies("CASE WHEN `Meta_score` IS NULL THEN CASE WHEN `IMDB_Rating` IS
        NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "IMDB present when Meta_score missing",
        lambda x: x == 1).'
      sources:
      - start_line: 80
        end_line: 83
        file: ''
      uid: 40e620eb-5857-471b-9c44-0a716d376e28
    - text: IMDB_Rating should not be missing for the vast majority of rows because
        it contributes directly to content_quality without fillna; high null rates
        would propagate NaNs into PopularityIndex. A reasonable validation is completeness
        of IMDB_Rating >= 0.95.
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 92
        end_line: 96
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: 04750960-998f-405c-b6c4-232ef1073ff3
  Gross:
    code:
    - suggestion: '.satisfies("CAST(REGEXP_REPLACE(`Gross`, '','', '''') AS DOUBLE)
        IS NOT NULL", "At least 10% of Gross parseable to double", lambda v: v >=
        0.10)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: de2b0ba6-0ac2-47d8-814f-7980d9608aff
      source_assumptions:
      - af3d27cb-5912-48fb-bb75-d9ca2c81a5dc
      - de6f8f7e-34c1-4d15-bb4e-949a5ded23c3
    - suggestion: '.satisfies("CAST(REGEXP_REPLACE(`Gross`, '','', '''') AS DOUBLE)
        IS NULL OR CAST(REGEXP_REPLACE(`Gross`, '','', '''') AS DOUBLE) >= 0", "Non-negative
        CleanGross where present", lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: ef143c72-3bbb-4e68-b312-fd1e3b325ed3
      source_assumptions:
      - efe819b4-f97a-4ab0-a1e1-2f065b2f9ad9
    - suggestion: '.satisfies("`Gross` IS NULL OR REGEXP_REPLACE(`Gross`, '','', '''')
        RLIKE ''^-?[0-9]+(\\.[0-9]+)?$''", "Gross values sans commas are numeric for
        >=90% of non-nulls (approx)", lambda v: v >= 0.90)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 1d18a721-22d9-45be-a7ed-3080f69d0483
      source_assumptions:
      - 8b98d69d-bb9f-4b9d-bb86-453d3cc1774f
    assumptions:
    - text: The 'Gross' input should be parseable to a numeric USD amount after removing
        thousands separators (commas). Concretely, if we define CleanGross = to_double(regexp_replace(Gross,
        ',', '')), then at least 10% of rows should have CleanGross IS NOT NULL (i.e.,
        be successfully parsed). This ensures the median-based fill and normalization
        behave meaningfully.
      sources:
      - start_line: 55
        end_line: 64
        file: ''
      - start_line: 95
        end_line: 95
        file: ''
      uid: af3d27cb-5912-48fb-bb75-d9ca2c81a5dc
    - text: For all rows where 'Gross' is parseable (CleanGross IS NOT NULL as defined
        above), the value should be non-negative so that log1p(CleanGross) is well-defined.
        In other words, CleanGross >= 0 for all non-null CleanGross.
      sources:
      - start_line: 55
        end_line: 55
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      uid: efe819b4-f97a-4ab0-a1e1-2f065b2f9ad9
    - text: The 'Gross' column may contain nulls or unparseable strings (e.g., missing
        values), and these are acceptable because the code coerces them to null and
        fills them with the median of available values. However, not all values should
        be null/unparseable; there must be at least one non-null CleanGross to compute
        a median-based fill. If enforcing a quantitative rule, require count(CleanGross)
        >= 1.
      sources:
      - start_line: 55
        end_line: 62
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      uid: de6f8f7e-34c1-4d15-bb4e-949a5ded23c3
    - text: The 'Gross' strings should not contain currency symbols or alphabetic
        characters if they are expected to be retained as valid values, since only
        commas are stripped before numeric parsing. Values containing '$', 'USD',
        or other symbols will be treated as null. If enforcing a validity proportion,
        after removing commas require that at least 90% of non-null 'Gross' values
        match the numeric pattern ^-?[0-9]+(\.[0-9]+)?$.
      sources:
      - start_line: 55
        end_line: 55
        file: ''
      uid: 8b98d69d-bb9f-4b9d-bb86-453d3cc1774f
  '["Gross","IMDB_Rating","Meta_score","No_of_Votes","Runtime"]':
    code: []
    assumptions:
    - text: 'The pair [''Series_Title'', ''Released_Year''] must uniquely identify
        each row (no duplicates). We could enforce this with a uniqueness constraint
        like: .isUnique([''Series_Title'', ''Released_Year'']).'
      sources:
      - start_line: 94
        end_line: 101
        file: ''
      uid: db0b5b07-92c0-4435-ad92-33c6d26c3a77
    - text: There must be at least two rows where both 'IMDB_Rating' and 'Meta_score'
        are non-null and numeric, and both columns must have non-zero variance on
        those rows so that correlation and linear regression are well-defined. This
        can be represented as a constraint on completeness of the pair and a check
        that approxCountDistinct > 1 for each within the valid pair filter.
      sources:
      - start_line: 67
        end_line: 77
        file: ''
      uid: 5d3a75bf-3d4c-450d-acb0-2dc4e766ee5c
    - text: 'For any row where ''Meta_score'' is missing, ''IMDB_Rating'' must be
        present and numeric to allow regression-based imputation: (Meta_score IS NULL)
        => (IMDB_Rating IS NOT NULL AND castable to float). This can be expressed
        as a conditional compliance constraint.'
      sources:
      - start_line: 79
        end_line: 85
        file: ''
      uid: c5c37adf-a8d7-45e7-afd7-f085d0d5a835
    - text: The relationship between 'IMDB_Rating' and 'Meta_score' used for imputation
        is assumed to be approximately monotonic increasing (positive slope) so that
        higher ratings predict higher metascores. This supports stable linear imputation
        Meta_score ~ a * IMDB_Rating + b with a > 0. This can be checked by verifying
        that the fitted slope is positive or that the Pearson correlation r >= 0.
      sources:
      - start_line: 67
        end_line: 77
        file: ''
      - start_line: 88
        end_line: 92
        file: ''
      uid: 2be9d7e8-1f34-46da-afe0-3cedc7d8b2ef
  '["IMDB_Rating","Meta_score"]':
    code: []
    assumptions:
    - text: 'There must be at least two records where both ''IMDB_Rating'' and ''Meta_score''
        are non-null, and among those records ''IMDB_Rating'' must have at least two
        distinct values (preferably also ''Meta_score'') so that Pearson correlation
        and linear regression (polyfit) are well-defined. This can be represented
        as constraints like: .hasSatisfyingRows("IMDB_Rating IS NOT NULL AND Meta_score
        IS NOT NULL", atLeast=2) and .hasNumberOfDistinctValues(''IMDB_Rating'', _
        >= 2, where="Meta_score IS NOT NULL").'
      sources:
      - start_line: 67
        end_line: 71
        file: ''
      - start_line: 73
        end_line: 77
        file: ''
      uid: 33a127c0-22f9-49d1-b855-27a5f413909f
    - text: 'For any row where ''Meta_score'' is missing, ''IMDB_Rating'' must be
        present (non-null) because ''IMDB_Rating'' is required to impute ''Meta_score''
        via the fitted linear model. This can be expressed as a conditional completeness
        constraint: .satisfies("CASE WHEN Meta_score IS NULL THEN IMDB_Rating IS NOT
        NULL ELSE true END", ''imdb_required_for_meta_imputation'', 1.0).'
      sources:
      - start_line: 79
        end_line: 85
        file: ''
      uid: 0d17f2c2-b899-4ad5-aeee-8e75c817fdad
    - text: 'The correlation used for weighting must be finite (not NaN). Therefore,
        the Pearson correlation between ''IMDB_Rating'' and ''Meta_score'' over rows
        where both are non-null must be defined. This is ensured by having sufficient
        valid pairs and non-zero variance; it can be captured by constraints ensuring
        at least two valid pairs and variance in the paired values, and optionally
        a custom check that correlation is not NaN. Example: .hasSatisfyingRows("IMDB_Rating
        IS NOT NULL AND Meta_score IS NOT NULL", atLeast=2) and .satisfies("variance(IMDB_Rating)
        > 0 AND variance(Meta_score) > 0", ''nonzero_variance_for_corr'', 1.0).'
      sources:
      - start_line: 67
        end_line: 71
        file: ''
      - start_line: 88
        end_line: 93
        file: ''
      uid: 2980c40b-2aa9-4898-9813-ff0f2abae861
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' must be unique
        across all records, as this composite key is intended to uniquely identify
        rows for ranking and publishing. This can be represented as: .isUnique([''Series_Title'',
        ''Released_Year'']).'
      sources:
      - start_line: 94
        end_line: 101
        file: ''
      uid: 1a98b0c4-6143-4e9f-98ca-c432976c07c8
