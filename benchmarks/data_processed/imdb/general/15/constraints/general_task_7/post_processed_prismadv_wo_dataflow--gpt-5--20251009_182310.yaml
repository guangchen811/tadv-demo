    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' uniquely identifies
        a title. Stable ''catalog_id'' generation and later de-duplication rely on
        this uniqueness. Representable as a constraint like: .isUnique(["Series_Title",
        "Released_Year"]) or .isUnique(["title_year_key"]).'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: 80e873fc-c370-44c0-88e8-0c12e6608e61
    - text: 'There is a one-to-one mapping between ''Poster_Link'' and ''poster_asset_id''.
        Each poster URL maps to exactly one asset id and each asset id corresponds
        to exactly one URL; the pair (poster_asset_id, Poster_Link) should be unique.
        Representable as: .isUnique(["Poster_Link"]) AND .isUnique(["poster_asset_id"])
        and/or .isUnique(["poster_asset_id", "Poster_Link"]).'
      sources:
      - start_line: 30
        end_line: 34
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: 2ae9b86e-ab18-4663-a245-f9beeba193f1
    - text: "The Bayesian weighted rating computation assumes 'IMDB_Rating' and 'No_of_Votes'\
        \ are jointly well-formed: IMDB_Rating is on a 0\u201310 scale and No_of_Votes\
        \ is a non-negative count. Additionally, to avoid division-by-zero in wr =\
        \ (votes/(votes+m))*R + (m/(votes+m))*C, we require votes + m > 0 for all\
        \ rows (implied by at least one row with No_of_Votes > 0). Representable as\
        \ a compliance constraint: .hasCompliance(\"rating_votes_valid\", \"IMDB_Rating\
        \ >= 0 AND IMDB_Rating <= 10 AND No_of_Votes >= 0\") together with a dataset-level\
        \ check like .hasQuantile(\"No_of_Votes\", 0.60, _ > 0)."
      sources:
      - start_line: 39
        end_line: 47
        file: ''
      uid: 81c7953a-6537-44c6-940e-21b640a0529e
    - text: "Scale compatibility between 'Meta_score' and 'IMDB_Rating': when 'Meta_score'\
        \ is present it is on a 0\u2013100 scale so that 'Meta_score'/10 is on the\
        \ same 0\u201310 scale as 'IMDB_Rating'. Consequently, 'quality_score' = 0.8*wr\
        \ + 0.2*(Meta_score/10) should lie in [0, 10]. Representable as: .hasCompliance(\"\
        meta_scale\", \"Meta_score IS NULL OR (Meta_score >= 0 AND Meta_score <= 100)\"\
        ) and .hasCompliance(\"quality_score_range\", \"quality_score >= 0 AND quality_score\
        \ <= 10\")."
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      uid: 263b5d1f-5934-4454-aec7-01b8d9c3cf2b
    - text: 'Rows eligible for Top Picks (IMDB_Rating >= 7.0) must have a computable
        (non-null, finite) ''quality_score'', which depends on ''IMDB_Rating'', ''No_of_Votes'',
        and ''Meta_score''. Representable as a conditional constraint: .hasCompliance("top_picks_quality_score_not_null",
        "(IMDB_Rating >= 7.0) => (quality_score IS NOT NULL)").'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      - start_line: 53
        end_line: 58
        file: ''
      uid: 30c7259b-312e-4ee5-98cd-3a2c5024c39e
