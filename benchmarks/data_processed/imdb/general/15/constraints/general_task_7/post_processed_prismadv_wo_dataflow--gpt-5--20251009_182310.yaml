        file: ''
      uid: 2c39fabe-3165-407b-b845-deeee2fdc661
    - text: 'The ''Certificate'' column may contain nulls (the code does not clean,
        coerce, or impute it and simply writes it through), but based on current data
        completeness (~0.898), at least 85% of rows should be non-null to maintain
        data quality. This can be represented as Deequ hasCompleteness(''Certificate'',
        lambda x: x >= 0.85) or Great Expectations expect_column_values_to_not_be_null
        with mostly >= 0.85.'
      sources:
      - start_line: 63
        end_line: 76
        file: ''
      - start_line: 78
        end_line: 80
        file: ''
      uid: a6a82c54-6e66-4c2f-b700-dcb116f6206c
    - text: 'The ''Certificate'' column should be low-cardinality categorical (movie/TV
        certification labels). Expect approximately no more than 25 distinct values.
        This can be represented as Deequ .approxCountDistinct(''Certificate'', lambda
        x: x <= 25) or Great Expectations expect_column_unique_value_count_to_be_between(min_value=1,
        max_value=25).'
      sources:
      - start_line: 63
        end_line: 76
        file: ''
      uid: 44257cb1-1bdd-4955-a813-924e96051c4c
    - text: 'Values in ''Certificate'' should be pre-trimmed (no leading/trailing
        whitespace) because the pipeline does not normalize this column (while it
        trims other columns). At least 99% of non-null values should satisfy TRIM(Certificate)
