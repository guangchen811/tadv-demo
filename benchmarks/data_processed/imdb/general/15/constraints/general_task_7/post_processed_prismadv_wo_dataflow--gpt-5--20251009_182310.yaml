        end_line: 57
        file: ''
      uid: 23caa6df-4432-4e60-b81c-f6766d9d4977
    - text: 'Functional dependency: (Series_Title, Released_Year) -> catalog_id. Rows
        sharing the same (Series_Title, Released_Year) must share the same ''catalog_id'',
        and ''catalog_id'' must be unique across distinct pairs. This can be enforced
        via isUnique([''catalog_id'']) together with a compliance check that countDistinct(catalog_id)
        == 1 within each (Series_Title, Released_Year) group.'
      sources:
