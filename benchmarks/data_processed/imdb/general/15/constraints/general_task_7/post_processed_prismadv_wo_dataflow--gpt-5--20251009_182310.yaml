    - text: 'For any given (Series_Title, Released_Year), the pair (IMDB_Rating, No_of_Votes)
        must be consistent across duplicate rows (i.e., within each title-year group,
        there is at most one distinct (IMDB_Rating, No_of_Votes) combination). This
        can be enforced as a grouped uniqueness check, e.g., SQL compliance: COUNT(*)
        FROM (SELECT Series_Title, Released_Year, COUNT(DISTINCT CONCAT_WS(''|'',
        CAST(IMDB_Rating AS STRING), CAST(No_of_Votes AS STRING))) AS dc FROM df GROUP
        BY Series_Title, Released_Year HAVING dc > 1) = 0.'
      sources:
      - start_line: 23
        end_line: 27
        file: ''
      - start_line: 39
        end_line: 45
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: 8006e650-72dc-464d-8a30-0983fee2798c
    - text: 'Both ''IMDB_Rating'' and ''No_of_Votes'' are required for the weighted
        rating computation and must be valid concurrently: IMDB_Rating is non-null
        and within [0, 10], and No_of_Votes is non-null and >= 0. Representable as
        Deequ compliance: .hasCompliance("valid_rating_and_votes", "IMDB_Rating IS
        NOT NULL AND IMDB_Rating >= 0 AND IMDB_Rating <= 10 AND No_of_Votes IS NOT
        NULL AND No_of_Votes >= 0", _ == 1.0).'
      sources:
      - start_line: 39
        end_line: 41
        file: ''
      - start_line: 43
        end_line: 48
        file: ''
      uid: cbe79d96-cce6-4dd3-909e-922f852af4bc
    - text: 'To avoid division by zero in the Bayesian weighted rating wr = votes/(votes
        + m) * R + m/(votes + m) * C, the 60th percentile of ''No_of_Votes'' (m) must
        be strictly positive (equivalently, at least 40% of rows have No_of_Votes
        > 0). Representable as Deequ: .hasApproxQuantile("No_of_Votes", 0.60, _ >
        0) or .hasCompliance("pct_votes_positive", "No_of_Votes > 0", _ >= 0.4).'
      sources:
      - start_line: 45
        end_line: 47
        file: ''
      uid: e0eacad3-d06e-4a56-8bda-b15f87236a9d
    - text: 'In the top_picks output, every record must (a) satisfy IMDB_Rating >=
        7.0 and (b) be unique on (Series_Title, Released_Year). Representable as Deequ
        checks on the top_picks dataset: .hasCompliance("top_picks_min_rating", "IMDB_Rating
        >= 7.0", _ == 1.0) and .isUnique(["Series_Title", "Released_Year"]).'
      sources:
      - start_line: 55
        end_line: 61
        file: ''
      uid: 8982c47c-8821-42d1-8529-4a7778f4d54f
