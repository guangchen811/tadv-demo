        end_line: 23
        file: ''
      uid: da9afa86-bd8c-4be8-8bbc-eedcc43bab21
    - text: For the Top Picks subset (IMDB_Rating >= 7.0), there should be at most
        one record per (Series_Title, Released_Year). This can be enforced by checking
        uniqueness of ['Series_Title','Released_Year'] after filtering IMDB_Rating
        >= 7.0, or a compliance rule grouping by the pair and asserting max(count)
        == 1.
      sources:
