        order within each title and produces stable ''catalog_id''s. This can be enforced
        with a compliance constraint on ''Released_Year'' (e.g., rlike ^\d{4}$).'
      sources:
      - start_line: 22
        end_line: 25
        file: ''
      uid: 2957d1bf-7fec-44d7-9759-c6abc9dc44d8
    - text: 'The composite key ''title_year_key'' = Series_Title + ''|'' + Released_Year
        must be unambiguous; therefore neither ''Series_Title'' nor ''Released_Year''
        may contain the ''|'' delimiter. This can be enforced with a compliance constraint:
        NOT(Series_Title rlike ''.*\|.*'') AND NOT(Released_Year rlike ''.*\|.*'').'
      sources:
