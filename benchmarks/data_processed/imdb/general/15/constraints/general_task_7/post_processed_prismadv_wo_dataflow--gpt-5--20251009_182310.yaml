        IS NULL OR `Certificate` = TRIM(`Certificate`) THEN 1 ELSE 0 END", "Certificate
        trimmed", lambda x: x >= 0.99) or Great Expectations expect_column_values_to_match_regex
        for anchored non-space patterns.'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 63
        end_line: 76
        file: ''
      uid: 1089e41e-2be3-4a4f-bfd5-8734115517bd
    - text: 'Values in ''Certificate'' should be short categorical labels comprised
        of alphanumerics and common rating symbols (+, -, /, space). Expect length
        <= 15 and 95% of non-null values to match the regex ^[A-Za-z0-9][A-Za-z0-9
        +\-/]*$. This can be represented as Deequ .hasMaxLength(''Certificate'', lambda
        x: x <= 15) and .satisfies("CASE WHEN `Certificate` IS NULL OR `Certificate`
        RLIKE ''^[A-Za-z0-9][A-Za-z0-9 +\-/]*$'' THEN 1 ELSE 0 END", "Certificate
        charset", lambda x: x >= 0.95), or Great Expectations expect_column_value_lengths_to_be_between
        and expect_column_values_to_match_regex.'
      sources:
      - start_line: 63
        end_line: 76
        file: ''
      uid: bd774b71-0fd9-43c2-a3c2-a3c47706a526
    - text: 'For a given title-year key, ''Certificate'' should be consistent (functional
        dependency: title_year_key -> Certificate). Practically, the number of distinct
        (title_year_key, Certificate) pairs should equal the number of distinct title_year_key
        values among rows where Certificate is not null. This can be represented as
        Deequ uniqueness checks comparing uniqueness of [''title_year_key''] vs [''title_year_key'',
        ''Certificate''] or a custom aggregate asserting countDistinct(title_year_key)
        == countDistinct(title_year_key, Certificate) on non-null Certificate rows.'
      sources:
