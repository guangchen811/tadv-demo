constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda x: x > 0.85)'
      - Valid
    - - '.isContainedIn(''Certificate'', [''U'', ''UA'', ''U/A'', ''A'', ''G'', ''PG'',
        ''PG-13'', ''R'', ''NC-17'', ''Not Rated'', ''TV-14'', ''TV-MA''], lambda
        col: col.isNotNull())'
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .hasDataType('IMDB_Rating', 'Fractional')
      - Invalid
    - - '.hasMax(''IMDB_Rating'', lambda x: x <= 10.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda x: x > 0.8)'
      - Valid
    - - '.isContainedIn(''Meta_score'', [float(i) for i in range(101)], lambda col:
        col.isNotNull())'
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .containsPattern('Poster_Link', r'^https://m\\.media-amazon\\.com/.+?\\.jpg$')
      - Invalid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMin(''Released_Year'', lambda x: x > 1880)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .containsPattern('Runtime', r'^\\d+ min$')
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x: x == 1.0)'
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
