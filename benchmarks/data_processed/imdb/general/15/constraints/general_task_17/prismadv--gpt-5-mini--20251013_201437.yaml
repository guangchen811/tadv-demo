    assumptions:
    - text: 'The ''Gross'' column may contain missing values: nulls, empty strings,
        or the literal string ''nan'' (case-insensitive). The code maps these to NaN
        and treats them as missing when computing monetization features.

        We could represent this assumption as a validation rule (Great Expectations
        / Deequ style):

        - Great Expectations: expect_column_values_to_be_null_or_match_regex for empty
        or ''nan'' cases is allowed; or explicitly allow nulls with expect_column_values_to_not_be_in_set
        when checking presence.

        - Deequ (example predicate to check that such values are considered missing):
        .satisfies("CASE WHEN `Gross` IS NULL OR trim(lower(`Gross`)) = '''' OR trim(lower(`Gross`))
        = ''nan'' THEN 1 ELSE 0 END", "Gross_missing_indicator", lambda x: x >= 0)

        (Meaning: missing/empty/''nan'' values are expected to occur; downstream code
        will treat them as missing.)'
      sources:
      - start_line: 16
        end_line: 25
        file: ''
      - start_line: 54
        end_line: 55
        file: ''
      uid: 428aec97-e328-45b0-8543-5657d336fdfb
    - text: 'Valid non-missing ''Gross'' values are expected to be integer USD amounts,
        optionally containing commas as thousands separators (e.g. ''1,234,567'' or
        ''1234567''). After trimming and removing commas the remaining characters
        must be digits only (regex ''^\d+$''). Values containing currency symbols
        (e.g. ''$''), decimal points, negative signs, parentheses, or other non-digit
        characters will be treated as missing by the parser.

        Deequ-style constraint example:

        .satisfies("CASE WHEN regexp_like(replace(trim(`Gross`), '','', ''''), ''^[0-9]+$'')
        THEN 1 ELSE 0 END", "Gross_integer_format", lambda x: x >= 0.95)

        (Adjust the threshold as appropriate; the code treats any non-matching format
        as missing.)'
      sources:
      - start_line: 19
        end_line: 24
        file: ''
      - start_line: 54
        end_line: 54
        file: ''
      uid: 5411520e-3c83-4183-95e3-2c8111abfc34
    - text: 'There must be at least one (preferably a non-trivial fraction of) rows
        where ''Gross'' is parseable to an integer as above. The pipeline computes
        df[''gross_usd''].median() and uses it to fill missing values and compute
        log1p; if all gross values are missing/unparseable then median() will be NaN
        and monetization features (log_gross and licensing_score) will be invalid.

        Validation predicate (Deequ-style):

        .satisfies("CASE WHEN regexp_like(replace(trim(`Gross`), '','', ''''), ''^[0-9]+$'')
        THEN 1 ELSE 0 END", "Gross_has_some_numeric_rows", lambda x: x > 0)

        (Require fraction > 0; you can raise this to a higher threshold if you need
        a robust median estimate.)'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 92
        end_line: 97
        file: ''
      - start_line: 54
        end_line: 55
        file: ''
      uid: ea1169d8-fe0a-4384-ae76-3930799f25f0
    - text: 'Parsed ''Gross'' amounts should be non-negative whole US dollar amounts
        (no fractional dollars, no negative values). The parser demands only digits
        after removing commas, which enforces whole non-negative integers; negative
        or fractional revenues are not supported and would be treated as missing.

        Deequ-style constraint example:

        .satisfies("CASE WHEN regexp_like(replace(trim(`Gross`), '','', ''''), ''^[0-9]+$'')
        AND cast(replace(trim(`Gross`), '','', '''') AS BIGINT) >= 0 THEN 1 ELSE 0
        END", "Gross_non_negative_integer", lambda x: x == 1)

        (Use ==1 if you require all rows to satisfy this; use a lower threshold if
        some invalid rows are acceptable and will be imputed.)'
      sources:
      - start_line: 22
        end_line: 24
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
