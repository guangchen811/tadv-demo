  '["Certificate","Genre","Gross","IMDB_Rating","Runtime","Star1","Star2","Star3","Star4"]':
    code: []
    assumptions:
    - text: 'The combination of ''title'' and ''year'' should identify records uniquely
        (title + year => deterministic title_id). In other words, there should be
        no two rows with the same title and the same year. (Deequ-style constraint:
        .isUnique(["title","year"]))'
