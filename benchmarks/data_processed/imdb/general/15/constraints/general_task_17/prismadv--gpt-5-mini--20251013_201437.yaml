        end_line: 89
        file: ''
      uid: 6ac6fe78-8560-4dc2-8a6a-a3fe40024382
    - text: 'Certificate values may come in different cases or as non-string types;
        the code converts them with astype(str).str.upper() before checking. Validation
        logic should therefore normalize values using UPPER(TRIM(Certificate)) or
        equivalent before comparing. Example check (informational): ensure that applying
        UPPER(TRIM(...)) does not produce unexpected artifacts (e.g., very long strings).'
      sources:
