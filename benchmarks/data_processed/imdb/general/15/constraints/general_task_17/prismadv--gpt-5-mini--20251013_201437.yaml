      - start_line: 102
        end_line: 106
        file: ''
      uid: 56cdab35-abc6-4af3-be7a-faad3fc1406f
    - text: 'At least one row must have a non-null parsable Gross (gross_usd) so that
        median(log/gross) and normalization (log_gross.max()) are well-defined; additionally,
        for rows where monetization contributes meaningfully to score, Gross strings
        should be numeric after cleaning (so to_int_usd produces an integer). (Deequ-style
        checks: .hasCompleteness("gross_usd", threshold) and .satisfies("gross_usd
        IS NULL OR gross_usd >= 0", "gross_numeric") or a custom row-level parseability
        check on ''Gross'')'
