        end_line: 88
        file: ''
      - start_line: 126
        end_line: 126
        file: ''
      uid: 2f24c667-635f-4dd7-aaf1-e78458da2d30
    - text: 'The ''Certificate'' column is expected to be low-cardinality (a small
        set of repeated rating labels). As a concrete rule, the number of distinct
        Certificate values should be reasonably small (for example <= 30). Example
        Deequ check: .satisfies("CASE WHEN (SELECT COUNT(DISTINCT UPPER(TRIM(`Certificate`)))
        FROM dataset) <= 30 THEN 1 ELSE 0 END", "Certificate cardinality", lambda
        x: x == 1).'
      sources:
