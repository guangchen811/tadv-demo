        ratings). Most non-null Certificate values should match a known rating label
        (for example: ''G'',''PG'',''PG-13'',''R'',''NC-17'',''A'',''18+'',''TV-MA'',''TV-PG'',''TV-14'',''TV-G'',''TV-Y'',''UNRATED'').
        As a practical check require >= 90% of non-null values to be in the expected
        set. Example: .satisfies("CASE WHEN UPPER(TRIM(`Certificate`)) IN (''G'',''PG'',''PG-13'',''R'',''NC-17'',''A'',''18+'',''TV-MA'',''TV-PG'',''TV-14'',''TV-G'',''TV-Y'',''UNRATED'')
        THEN 1 ELSE 0 END", "Valid Certificate labels", lambda x: x >= 0.9).'
      sources:
