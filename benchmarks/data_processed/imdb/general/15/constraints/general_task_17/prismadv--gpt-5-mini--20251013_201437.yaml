        file: ''
      - start_line: 83
        end_line: 85
        file: ''
      uid: 5be956fe-dbfa-48c9-baff-bd35d59eb6c4
    - text: 'The ''Genre'' field must be parseable as a comma-separated list with
        at least one non-empty token, and the derived ''primary_genre'' must be present
        for rows expected to be evaluated (i.e., primary_genre is not null). (Deequ-style
        constraints: .satisfies("primary_genre IS NOT NULL") and .satisfies("size(split(Genre,'',''))
        >= 1 AND trim(split(Genre,'','')[0]) <> ''''") )'
      sources:
      - start_line: 70
        end_line: 73
        file: ''
      - start_line: 102
        end_line: 106
        file: ''
      uid: 504733d4-9ae8-4645-9e45-ffae3322ef29
    - text: 'For any row that will be considered eligible (imdb_rating >= 7.0 and
        primary_genre != ''Short''), runtime_min must be present and within the allowed
        bounds (between 60 and 210 minutes). In other words: (imdb_rating >= 7.0 AND
        primary_genre != ''Short'') => runtime_min BETWEEN 60 AND 210. (Deequ-style:
        .satisfies("(imdb_rating < 7.0) OR (primary_genre = ''Short'') OR (runtime_min
        BETWEEN 60 AND 210)", "eligibility_runtime") )'
      sources:
