    assumptions:
    - text: 'The ''Genre'' column must be present and non-null / non-empty for input
        rows because the code builds a list of genres and uses the first element as
        the primary genre. If ''Genre'' is empty or missing the primary_genre will
        be None and downstream eligibility and output (primary_genre in the feed)
        will be impacted.

        We could represent this as a Deequ/GE constraint such as:

        .satisfies("CASE WHEN `Genre` IS NOT NULL AND TRIM(`Genre`) <> '''' THEN 1
        ELSE 0 END", "Non-empty Genre", lambda x: x == 1.0)

        (or use a threshold like >= 0.99 if you expect tiny amounts of bad rows).'
      sources:
      - start_line: 71
        end_line: 72
        file: ''
      - start_line: 126
        end_line: 127
        file: ''
      uid: 2e41798c-3ae0-4f56-bd9e-ac86c3e26086
    - text: 'Each ''Genre'' value is expected to be a comma-separated list of one
        or more genre labels (e.g. "Action, Adventure, Sci-Fi"). The code splits on
        '','' and treats each comma-separated token (after .strip()) as a genre token,
        so tokens must not be empty after trimming and genre labels must not embed
        unescaped commas.

        Example validation (Deequ/SQL-style):

        .satisfies("CASE WHEN TRIM(`Genre`) RLIKE ''^[^,]+(\s*,\s*[^,]+)*$'' THEN
        1 ELSE 0 END", "Comma-separated genres", lambda x: x == 1.0)

        This enforces that each value contains at least one non-empty token and tokens
        are separated by commas.'
      sources:
      - start_line: 71
        end_line: 72
        file: ''
      uid: a6d714cf-0fec-4a09-af9b-57775d6d6d91
    - text: 'The code derives primary_genre by taking the first token exactly as-is
        (no case normalization). Downstream logic explicitly checks primary_genre
        against the literal ''Short'' (case-sensitive) to exclude short films. Therefore,
        if you expect short films to be excluded, the input must use the capitalization
        ''Short'' (or you must update the code to normalize case). Validate that primary
        genre values are correctly cased/formed; e.g. enforce that lowercasing would
        match known categories if you want case-insensitive behavior.

        Representative check (detects mismatches between exact and lower-cased normalized
        labels):

        .satisfies("CASE WHEN TRIM(SPLIT(`Genre`,'','')[0]) = ''Short'' OR LOWER(TRIM(SPLIT(`Genre`,'','')[0]))
        <> ''short'' THEN 1 ELSE 0 END", "Primary genre casing awareness", lambda
        x: x >= 0.99)

        (Or simpler: require that any row intended to be a short film uses ''Short''
        exactly.)'
      sources:
      - start_line: 71
        end_line: 72
        file: ''
      - start_line: 102
        end_line: 106
        file: ''
      uid: fb816594-9cb4-4cde-a2c7-eb47ec02c59b
    - text: 'The ''Genre'' column should be text (string-like) or otherwise safely
        castable to string. The code does astype(str) and then performs string operations;
        values that are complex types (lists/dicts) or binary blobs may produce unexpected
        serialized strings and break parsing. Example constraint:

        .satisfies("CASE WHEN `Genre` IS NOT NULL THEN 1 ELSE 0 END", "Genre present
        (string-castable)", lambda x: x == 1.0)

        and a complementary check that values match an expected pattern (see prior
        assumption) to ensure they are parseable strings.'
      sources:
      - start_line: 71
        end_line: 72
        file: ''
      - start_line: 42
        end_line: 42
        file: ''
