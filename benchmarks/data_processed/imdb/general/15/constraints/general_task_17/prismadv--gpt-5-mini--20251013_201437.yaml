    - text: 'All four cast columns (Star1, Star2, Star3, Star4) must be present and
        distinct for a valid row. Concretely: none of Star1..Star4 should be empty/null/''nan''
        strings, and within each row the four values must be pairwise different. (Row-level
        predicate; Deequ-style: a satisfies() predicate that asserts non-null/non-empty
        on each star and array_distinct(array(Star1,Star2,Star3,Star4)) )'
      sources:
