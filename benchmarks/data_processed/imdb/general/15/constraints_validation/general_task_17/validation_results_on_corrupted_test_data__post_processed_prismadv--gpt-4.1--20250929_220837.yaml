results:
  Star1:
    code:
    - suggestion: .satisfies("TRIM(LOWER(`Star1`)) != '' AND TRIM(LOWER(`Star1`))
        != 'nan'", "Star1 not empty or 'nan'")
      status: true
      reason_if_failed: ''
      level: error
  Star2:
    code:
    - suggestion: .satisfies("`Star2` IS NOT NULL AND TRIM(`Star2`) != '' AND LOWER(TRIM(`Star2`))
        != 'nan'", "Non-null, non-empty, non-'nan' Star2 values")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Star2` IS NOT NULL AND `Star2` != `Star1` AND `Star2`
        != `Star3` AND `Star2` != `Star4`", "''Star2'' distinct from other star columns",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Star3:
    code:
    - suggestion: '.satisfies("TRIM(LOWER(`Star3`)) IS NOT NULL AND TRIM(`Star3`)
        != '''' AND LOWER(TRIM(`Star3`)) != ''nan''", "Star3 must not be missing,
        blank, or ''nan''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("Star1 IS NOT NULL AND Star2 IS NOT NULL AND Star3 IS
        NOT NULL AND Star4 IS NOT NULL AND TRIM(CAST(`Star1` AS STRING)) != '''' AND
        TRIM(CAST(`Star2` AS STRING)) != '''' AND TRIM(CAST(`Star3` AS STRING)) !=
        '''' AND TRIM(CAST(`Star4` AS STRING)) != '''' AND TRIM(CAST(`Star1` AS STRING))
        != TRIM(CAST(`Star2` AS STRING)) AND TRIM(CAST(`Star1` AS STRING)) != TRIM(CAST(`Star3`
        AS STRING)) AND TRIM(CAST(`Star1` AS STRING)) != TRIM(CAST(`Star4` AS STRING))
        AND TRIM(CAST(`Star2` AS STRING)) != TRIM(CAST(`Star3` AS STRING)) AND TRIM(CAST(`Star2`
        AS STRING)) != TRIM(CAST(`Star4` AS STRING)) AND TRIM(CAST(`Star3` AS STRING))
        != TRIM(CAST(`Star4` AS STRING))", "Star cast columns must be mutually unique,
        present, and non-empty after trimming", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
  Star4:
    code:
    - suggestion: .satisfies("(Star4 IS NOT NULL AND TRIM(CAST(Star4 AS STRING)) !=
        '' AND LOWER(TRIM(CAST(Star4 AS STRING))) != 'nan')", "Star4 non-null, non-empty,
        not 'nan' (str)")
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating:
    code:
    - suggestion: '.satisfies(''IMDB_Rating IS NOT NULL AND CAST(IMDB_Rating AS DOUBLE)
        IS NOT NULL'', ''IMDB_Rating Numeric'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''IMDB_Rating IS NOT NULL AND CAST(IMDB_Rating
        AS DOUBLE) IS NOT NULL'', ''IMDB_Rating Numeric'', lambda x: x == 1.0)'' failed
        on data sample: Value: 0.95 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''IMDB_Rating >= 0 AND IMDB_Rating <= 10'', ''IMDB_Rating
        Range'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''IMDB_Rating >= 0 AND IMDB_Rating
        <= 10'', ''IMDB_Rating Range'', lambda x: x == 1.0)'' failed on data sample:
        Value: 0.95 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''IMDB_Rating >= 7.0'', ''IMDB_Rating Eligibility'',
        lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: '.satisfies("size(split(trim(`Genre`), '','')) >= 1 AND array_min(transform(split(trim(`Genre`),
        '',''), x -> length(trim(x)))) > 0", "Genre: non-empty comma-separated list,
        no empty items")'
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.hasCompleteness(''Gross'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(`Gross` IS NULL) OR (`Gross` = '') OR (lower(`Gross`)
        = 'nan') OR regexp_extract(`Gross`, '^[0-9]{1,3}(,[0-9]{3})*$', 0) = `Gross`",
        "Gross valid pattern")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Gross'', lambda x: x >= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Genre","primary_genre"]':
    code:
    - suggestion: .satisfies("`Genre` IS NOT NULL AND `Genre` != 'Short'", "Eligible
        records must have non-null, non-'Short' Genre")
      status: true
      reason_if_failed: ''
      level: error
  '["IMDB_Rating","eligible"]':
    code:
    - suggestion: .satisfies('CASE WHEN imdb_rating >= 7.0 THEN True ELSE True END',
        'Eligible flag implies IMDB_Rating >= 7.0')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''IMDB_Rating''], lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''haveCompleteness([''IMDB_Rating''], lambda x:
        x == 1.0)'' failed on data sample: Value: 0.95 does not meet the constraint
        requirement!'
      level: error
  No_of_Votes:
    code:
    - suggestion: .isComplete('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  '["Released_Year","Series_Title","title_id"]':
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Released_Year","Series_Title"]':
    code:
    - suggestion: '.haveCompleteness([''Series_Title'', ''Released_Year''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Runtime","runtime_min"]':
    code:
    - suggestion: '.haveCompleteness([''imdb_rating'', ''Runtime''], lambda x: x >=
        0.99)'
      status: false
      reason_if_failed: 'Constraint ''haveCompleteness([''imdb_rating'', ''Runtime''],
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.95 does not meet the
        constraint requirement!'
      level: warning
  Series_Title:
    code:
    - suggestion: .satisfies("`Series_Title` IS NOT NULL AND trim(`Series_Title`)
        <> ''", "No Null or Empty Series_Title")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness(["Series_Title", "Released_Year"], lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("lower(trim(`Series_Title`)) <> 'nan' AND trim(`Series_Title`)
        <> ''", "No Blank or 'nan' Titles")
      status: true
      reason_if_failed: ''
      level: error
