results:
  IMDB_Rating:
    code:
    - suggestion: '.hasMin(''IMDB_Rating'', lambda m: m >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''IMDB_Rating'', lambda m: m <= 10.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasSize(lambda n: n >= 2).satisfies("`IMDB_Rating` IS NOT NULL
        AND `Meta_score` IS NOT NULL", "Rows with both ratings present (fraction >
        0)", lambda f: f > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Meta_score` IS NULL THEN `IMDB_Rating` IS
        NOT NULL ELSE TRUE END", "IMDB present when Meta_score missing", lambda x:
        x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `Meta_score` IS NULL THEN
        `IMDB_Rating` IS NOT NULL ELSE TRUE END", "IMDB present when Meta_score missing",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.99 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: '.hasCompleteness(''IMDB_Rating'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.satisfies("CAST(REGEXP_REPLACE(`Gross`, '','', '''') AS DOUBLE)
        IS NOT NULL", "At least 10% of Gross parseable to double", lambda v: v >=
        0.10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(REGEXP_REPLACE(`Gross`, '','', '''') AS DOUBLE)
        IS NULL OR CAST(REGEXP_REPLACE(`Gross`, '','', '''') AS DOUBLE) >= 0", "Non-negative
        CleanGross where present", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Gross` IS NULL OR REGEXP_REPLACE(`Gross`, '','', '''')
        RLIKE ''^-?[0-9]+(\\.[0-9]+)?$''", "Gross values sans commas are numeric for
        >=90% of non-nulls (approx)", lambda v: v >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.satisfies("Meta_score IS NULL OR (CAST(Meta_score AS DOUBLE) >=
        0 AND CAST(Meta_score AS DOUBLE) <= 100)", "Meta_score within [0,100] when
        present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Meta_score IS NOT NULL OR (IMDB_Rating IS NOT NULL
        AND CAST(IMDB_Rating AS DOUBLE) IS NOT NULL)", "IMDB_Rating present and numeric
        when Meta_score is missing", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("Meta_score IS NOT NULL OR (IMDB_Rating
        IS NOT NULL AND CAST(IMDB_Rating AS DOUBLE) IS NOT NULL)", "IMDB_Rating present
        and numeric when Meta_score is missing", lambda x: x == 1.0)'' failed on data
        sample: Value: 0.99 does not meet the constraint requirement!'
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.satisfies("(`No_of_Votes` IS NULL) OR (CAST(`No_of_Votes` AS DOUBLE)
        IS NOT NULL)", "No_of_Votes parsable as numeric", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative("No_of_Votes", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`No_of_Votes` IS NULL OR NOT (upper(trim(CAST(`No_of_Votes`
        AS STRING))) IN (''INF'',''-INF'',''INFINITY'',''-INFINITY''))", "No infinities
        in No_of_Votes", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''Series_Title'', ''Released_Year''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''Released_Year BETWEEN 1900 AND 2035'', ''Released_Year
        plausible range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: '.hasCompleteness(''Runtime'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Runtime` RLIKE ''.*([0-9]{2,3}).*'' THEN
        1 ELSE 0 END", "Runtime has 2-3 digit minutes", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Runtime` RLIKE ''(?i)^\\s*\\d{2,3}(\\s*(min|mins|minute|minutes))?\\s*$''",
        "Runtime is simple minute format (2-3 digits, optional min label; case-insensitive)",
        lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN CAST(regexp_extract(`Runtime`, ''([0-9]{2,3})'',
        1) AS INT) >= 45 AND CAST(regexp_extract(`Runtime`, ''([0-9]{2,3})'', 1) AS
        INT) <= 240 THEN 1 ELSE 0 END", "Runtime minutes within [45,240]", lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Released_Year","Series_Title"]':
    code:
    - suggestion: '.haveCompleteness([''Series_Title'', ''Released_Year''], lambda
        c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda u:
        u == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''length(trim(`Series_Title`)) > 0'', ''Series_Title
        non-empty after trim'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Series_Title` = trim(`Series_Title`)'', ''Series_Title
        has no leading/trailing whitespace'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
