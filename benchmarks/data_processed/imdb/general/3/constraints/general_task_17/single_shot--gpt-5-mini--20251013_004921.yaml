constraints:
  Certificate:
    code:
    - - 'Check(spark, CheckLevel.Warning, ''Certificate completeness >= 0.89'').hasCompleteness(''Certificate'',
        lambda c: c >= 0.89)'
      - Invalid
    assumptions: []
  Gross:
    code:
    - - 'Check(spark, CheckLevel.Warning, ''Gross completeness >= 0.80'').hasCompleteness(''Gross'',
        lambda c: c >= 0.80)'
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - 'Check(spark, CheckLevel.Error, ''IMDB range and votes non-negative'').hasMin(''IMDB_Rating'',
        lambda v: v >= 0.0).hasMax(''IMDB_Rating'', lambda v: v <= 10.0).isNonNegative(''No_of_Votes'')'
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - 'Check(spark, CheckLevel.Warning, ''Meta_score completeness >= 0.85'').hasCompleteness(''Meta_score'',
        lambda c: c >= 0.85)'
      - Invalid
    assumptions: []
  Poster_Link:
    code:
    - - Check(spark, CheckLevel.Warning, 'Poster link completeness').isComplete('Poster_Link')
      - Invalid
    assumptions: []
  Released_Year:
    code:
    - - 'Check(spark, CheckLevel.Error, ''Released_Year reasonable range'').hasMin(''Released_Year'',
        lambda y: y >= 1870).hasMax(''Released_Year'', lambda y: y <= 2025)'
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - Check(spark, CheckLevel.Error, 'Runtime format minutes').hasPattern('Runtime',
        r'^\s*\d+\s*min\s*$')
      - Invalid
    assumptions: []
  core_fields:
    code:
    - - Check(spark, CheckLevel.Error, 'Core completeness').isComplete('Series_Title').isComplete('Released_Year').isComplete('IMDB_Rating').isComplete('No_of_Votes').isComplete('Runtime').isComplete('Genre').isComplete('Star1').isComplete('Star2').isComplete('Star3').isComplete('Star4')
      - Invalid
    assumptions: []
  primary_genre:
    code:
    - - Check(spark, CheckLevel.Error, 'Primary genre present').isComplete('primary_genre')
      - Invalid
    assumptions: []
  title_id:
    code:
    - - Check(spark, CheckLevel.Error, 'Deterministic title_id uniqueness').isUnique('title_id')
      - Invalid
    assumptions: []
