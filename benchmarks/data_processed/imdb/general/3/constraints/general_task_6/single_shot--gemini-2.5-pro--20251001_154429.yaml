constraints:
  Certificate:
    code:
    - - .compliesWith("Certificate IS NULL OR Certificate IN ('U', 'UA', 'A', 'G',
        'PG', 'PG-13', 'R', 'NC-17', 'NOT RATED', 'UNRATED')", 'Certificate must be
        in the allowed list or NULL')
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .compliesWith("Gross IS NULL OR regexp_replace(Gross, ',', '') RLIKE '^[0-9]+$'",
        'Gross, when not null, should be a numeric string')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isContainedIn('IMDB_Rating', 0.0, 10.0)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .containsURL('Poster_Link')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    - - .isUnique('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isContainedIn('Released_Year', 1888, 2030)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .containsPattern('Runtime', r'^\\d+ min$')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
