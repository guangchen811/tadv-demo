  '["Director","Genre","Gross","IMDB_Rating","No_of_Votes","Released_Year","Runtime","Series_Title"]':
    code: []
    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' must be complete
        and unique across records (serves as the business key). ''Series_Title'' cannot
        be null/blank and ''Released_Year'' must be non-null and castable to integer.
        This can be represented in Deequ as: .isComplete(''Series_Title'').isComplete(''Released_Year'').isUnique([''Series_Title'',''Released_Year'']).'
