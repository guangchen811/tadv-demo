      - start_line: 93
        end_line: 95
        file: ''
      uid: d9ffb569-b0a8-46ba-ae8b-263eec9f6e4c
    - text: 'Functional dependency: For a given (''Series_Title'', ''Released_Year'')
        key, the attributes ''Director'', ''Genre'', ''Runtime'', ''IMDB_Rating'',
        ''No_of_Votes'', and ''Gross'' should not vary across rows (i.e., they are
        determined by the key). This can be enforced with Deequ functional dependency
        checks, e.g., .hasFunctionalDependency(''Director'', [''Series_Title'',''Released_Year''],
        maxViolations=0.0) and similarly for ''Genre'', ''Runtime'', ''IMDB_Rating'',
        ''No_of_Votes'', and ''Gross''.'
      sources:
      - start_line: 93
        end_line: 95
        file: ''
      - start_line: 97
        end_line: 100
        file: ''
      uid: 6433feec-4508-4744-b538-d8b8baa47a0e
    - text: 'Shortlist selection relies on a multi-column predicate: IMDB_Rating >=
        7.0 AND Runtime between 80 and 140 minutes, where Runtime must parse from
        the string pattern ''^[1-9][0-9]{1,2} min$'' into an integer. Therefore, wherever
        ''IMDB_Rating'' is present (it is complete), ''Runtime'' must be parseable
        to a minute value so the predicate can be evaluated for all rows. This can
        be expressed in Deequ as a conditional constraint: satisfies("IMDB_Rating
        < 7.0 OR (Runtime RLIKE ''^[1-9][0-9]{1,2} min$'' AND CAST(regexp_extract(Runtime,''^([1-9][0-9]{1,2})
        min$'',1) AS INT) BETWEEN 80 AND 140)", fraction == 1.0) for the shortlist,
        and at minimum satisfies("Runtime RLIKE ''^[1-9][0-9]{1,2} min$''", fraction
        == 1.0) on the base dataset.'
      sources:
      - start_line: 48
        end_line: 53
        file: ''
      - start_line: 77
        end_line: 81
        file: ''
      uid: d1be07e7-7828-4c09-a523-6dcaccd0871a
