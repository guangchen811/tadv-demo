        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: b210e6d7-9b83-4b12-a6bc-d74fd9f32f56
    - text: 'Non-null ''Gross'' values are expected to be numeric text representing
        revenue, optionally using commas as thousands separators. After removing commas,
        at least 70% of non-null ''Gross'' values should be parseable as numbers.
