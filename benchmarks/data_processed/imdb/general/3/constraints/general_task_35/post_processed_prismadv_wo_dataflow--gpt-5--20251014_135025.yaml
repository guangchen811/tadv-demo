    - text: 'The ''Gross'' column may include placeholder strings for missing values:
        '''', ''nan'', ''NaN'', or ''None''. These should be treated as nulls. However,
        to ensure revenue-based scoring remains meaningful, no more than 90% of rows
        should be these placeholders or nulls (i.e., at least 10% non-missing). This
