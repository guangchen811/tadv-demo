        end_line: 71
        file: ''
      uid: 9f4103a2-e50c-4436-a50c-4f6185dfe846
    - text: 'Most non-null ''Certificate'' values should be from the expected set
        of ratings: {''U'', ''UA'', ''A'', ''G'', ''PG'', ''PG-13'', ''R'', ''NC-17'',
