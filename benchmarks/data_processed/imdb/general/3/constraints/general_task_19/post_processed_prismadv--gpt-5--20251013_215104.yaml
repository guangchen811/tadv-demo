    - text: 'No record that is eligible for the final selection should have an NC-17
        certificate. Concretely: among rows with IMDB_Rating >= 6.5 (quality gate),
        Certificate must not be ''NC-17'' (after nulls are converted to ''Not Rated'').
        Deequ Compliance example: Compliance(''no_nc17_in_selected'', "(IMDB_Rating
        < 6.5) OR (coalesce(Certificate, ''Not Rated'') <> ''NC-17'')", minimumAcceptableValue=1.0).'
