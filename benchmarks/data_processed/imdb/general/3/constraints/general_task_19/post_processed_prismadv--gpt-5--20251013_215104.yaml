  '["IMDB_Rating","No_of_Votes"]':
    code: []
    assumptions:
    - text: 'The pair [''Series_Title'', ''Released_Year''] must uniquely identify
        each record (no duplicate title-year combinations). We could represent this
        as a Deequ constraint: .isUnique([''Series_Title'', ''Released_Year'']).'
      sources:
      - start_line: 35
        end_line: 35
