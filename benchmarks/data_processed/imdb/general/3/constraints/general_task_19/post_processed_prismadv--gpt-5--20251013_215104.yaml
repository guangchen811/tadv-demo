    - text: 'Runtime must be numerically parseable for all rows that can pass the
        downstream selection (IMDB_Rating >= 6.5 and Certificate != ''NC-17''); i.e.,
        those rows must have a minutes value extractable via the ''(\\d+)'' regex.
        Deequ Compliance example: Compliance(''runtime_parseable_for_selected'', "CASE
        WHEN (IMDB_Rating >= 6.5 AND coalesce(Certificate, ''Not Rated'') <> ''NC-17'')
        THEN regexp_extract(Runtime, ''(\\\\d+)'', 1) <> '''' ELSE true END", minimumAcceptableValue=1.0).'
