      uid: 92bebd0d-4bc3-478b-87ed-8c91840f9d62
    - text: 'IMDB_Rating and No_of_Votes must both be present and numeric with sensible
        bounds: IMDB_Rating in [0, 10] and No_of_Votes an integer >= 0. Example Deequ
        constraints: .hasCompleteness(''IMDB_Rating'', 1.0); .hasCompleteness(''No_of_Votes'',
        1.0); .hasDataType(''IMDB_Rating'', ConstrainableDataTypes.Fractional); .hasDataType(''No_of_Votes'',
        ConstrainableDataTypes.Integral); .satisfies(''IMDB_Rating >= 0 AND IMDB_Rating
        <= 10'', ''rating_in_range''); .satisfies(''No_of_Votes >= 0'', ''votes_non_negative'').'
      sources:
      - start_line: 20
        end_line: 22
        file: ''
      - start_line: 37
        end_line: 41
        file: ''
      uid: e9d15657-6c2c-4139-950e-89ac7717a85c
    - text: 'For licensing candidates (suitability > 0) that pass the quality gate
        (IMDB_Rating >= 6.5), the dataset assumes a minimum vote volume consistent
        with the popularity calibration; enforce No_of_Votes >= 1000 when IMDB_Rating
        >= 6.5 and suitability > 0. Example Deequ: .forAllRowsWhere(''IMDB_Rating
        >= 6.5 AND suitability > 0'').satisfies(''No_of_Votes >= 1000'', ''min_votes_for_high_quality'').'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      - start_line: 74
        end_line: 76
        file: ''
      - start_line: 97
        end_line: 98
        file: ''
      uid: a925fdc7-06e9-491f-993a-6db9604b0794
    - text: "The blended quality-popularity component must lie within [0,1]: 0.55*clip(IMDB_Rating/10,0,1)\
        \ + 0.45*clip((log10(greatest(No_of_Votes,1))-3)/3,0,1) \u2208 [0,1]. This\
        \ checks the joint scaling and clipping of rating and votes assumed by the\
        \ scoring. Example Deequ (SQL-style expression): .satisfies('0 <= 0.55*least(greatest(IMDB_Rating/10,0),1)\
        \ + 0.45*least(greatest((log10(greatest(No_of_Votes,1))-3)/3,0),1) AND 0.55*least(greatest(IMDB_Rating/10,0),1)\
        \ + 0.45*least(greatest((log10(greatest(No_of_Votes,1))-3)/3,0),1) <= 1',\
        \ 'blend_in_unit_interval')."
      sources:
      - start_line: 37
        end_line: 41
        file: ''
      - start_line: 80
        end_line: 80
        file: ''
      uid: df583057-b8ef-4069-9306-e02b78e2323e
