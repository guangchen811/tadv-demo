  '["Certificate","Genre","IMDB_Rating","No_of_Votes","Released_Year","Runtime"]':
    code: []
    assumptions:
    - text: 'The pair (Series_Title, Released_Year) is the unique business key for
        each record and must be complete and unique across the dataset. We could represent
        this as Deequ constraints: .isComplete(''Series_Title''), .isComplete(''Released_Year''),
        .isUnique([''Series_Title'',''Released_Year'']).'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: 97278188-4b9a-4e2d-ba38-b4a4eb451c86
    - text: 'Both categorical domains are restricted: (a) every token in Genre (comma-separated)
        must belong to the allowed_genres set; and (b) Certificate must belong to
        the allowed_certificates set (including ''Not Rated''/''Unrated'' used downstream).
        This can be encoded as Deequ compliance constraints, e.g.: Compliance(''genre_tokens_allowed'',
        "size(array_except(transform(split(Genre, ''\\s*,\\s*''), x -> trim(x)), array(''Action'',''Adventure'',''Animation'',''Biography'',''Comedy'',''Crime'',''Documentary'',''Drama'',''Family'',''Fantasy'',''Film-Noir'',''History'',''Horror'',''Music'',''Musical'',''Mystery'',''Romance'',''Sci-Fi'',''Sport'',''Thriller'',''War'',''Western'')))
        = 0"), and .isContainedIn(''Certificate'', Array(''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not
        Rated'',''Unrated'',''Passed'',''Approved'')).'
      sources:
      - start_line: 26
        end_line: 33
        file: ''
      - start_line: 51
        end_line: 56
        file: ''
      - start_line: 58
        end_line: 65
        file: ''
      - start_line: 67
        end_line: 73
        file: ''
      uid: 98ecdefb-13c7-497e-b58d-a8d32e163f80
    - text: 'High ratings should be supported by substantial vote counts (as assumed
        by the popularity calibration). At least 90% of rows with IMDB_Rating >= 8.0
        should have No_of_Votes >= 1000. Deequ Compliance example: Compliance(''high_rating_has_votes'',
        ''CASE WHEN IMDB_Rating >= 8.0 THEN No_of_Votes >= 1000 ELSE true END'', minimumAcceptableValue=0.90).'
