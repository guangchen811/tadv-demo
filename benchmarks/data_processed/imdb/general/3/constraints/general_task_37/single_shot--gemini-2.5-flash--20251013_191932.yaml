constraints:
  Certificate:
    code:
    - - .hasDataType('Certificate', ConstrainableDataTypes.String)
      - Invalid
    - - .isContainedIn('Certificate', ['A', 'G', 'NC-17', 'Not Rated', 'PG', 'PG-13',
        'R', 'TV-14', 'TV-MA', 'U', 'U/A', 'UA'])
      - Invalid
    assumptions: []
  Director:
    code:
    - - .hasDataType('Director', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Director')
      - Valid
    - - .isNonEmpty('Director')
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .hasDataType('Genre', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Genre')
      - Valid
    - - .isNonEmpty('Genre')
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .hasDataType('Gross', ConstrainableDataTypes.String)
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .hasDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isGreaterThanOrEqualTo('IMDB_Rating', 1.0)
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - .hasDataType('Meta_score', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isGreaterThanOrEqualTo('Meta_score', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('Meta_score', 100.0)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .hasDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .hasDataType('Overview', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Overview')
      - Valid
    - - .isNonEmpty('Overview')
      - Invalid
    assumptions: []
  Poster_Link:
    code:
    - - .hasDataType('Poster_Link', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    - - .matchesPattern('Poster_Link', r'https://m.media-amazon.com/images/M/.*\\.jpg')
      - Invalid
    assumptions: []
  Released_Year:
    code:
    - - .hasDataType('Released_Year', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    - - .isGreaterThanOrEqualTo('Released_Year', 1900)
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', 2029)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasDataType('Runtime', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Runtime')
      - Valid
    - - .matchesPattern('Runtime', r'^\\d+\\smin$')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .hasDataType('Series_Title', ConstrainableDataTypes.String)
      - Invalid
    - - .isComplete('Series_Title')
      - Valid
    - - .isNonEmpty('Series_Title')
      - Invalid
    assumptions: []
  Star1:
    code:
    - - .hasDataType('Star1', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Star1')
      - Valid
    - - .isNonEmpty('Star1')
      - Invalid
    assumptions: []
  Star2:
    code:
    - - .hasDataType('Star2', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Star2')
      - Valid
    - - .isNonEmpty('Star2')
      - Invalid
    assumptions: []
  Star3:
    code:
    - - .hasDataType('Star3', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Star3')
      - Valid
    - - .isNonEmpty('Star3')
      - Invalid
    assumptions: []
  Star4:
    code:
    - - .hasDataType('Star4', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Star4')
      - Valid
    - - .isNonEmpty('Star4')
      - Invalid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
