        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasUniqueness([''Series_Title'', ''Released_Year''],
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9047619047619048 does
        not meet the constraint requirement!'
      level: error
  Runtime:
    code:
    - suggestion: .isComplete("Runtime")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("Runtime", "^\\s*(\\d+)\\s*min\\s*$", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.hasCompleteness(''Series_Title'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("trim(`Series_Title`) <> ''''", "Non-empty Series_Title
        after trim", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("locate(''|'', `Series_Title`) = 0", "No pipe in Series_Title",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
