results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies(''`IMDB_Rating` >= 0.0 AND `IMDB_Rating` <= 10.0'',
        ''IMDB_Rating in [0,10]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''IMDB_Rating'', lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`IMDB_Rating` >= 7.0'', ''At least one Top Pick (rating
        >= 7.0)'', lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''NOT isnan(`IMDB_Rating`)'', ''IMDB_Rating not NaN'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Certificate:
    code:
    - suggestion: '.satisfies("`Certificate` IS NULL OR CAST(`Certificate` AS STRING)
        IS NOT NULL", "Certificate string-like", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.satisfies(''(IMDB_Rating < 7.0) OR (Genre IS NOT NULL AND TRIM(Genre)
        <> \''\'')'', ''Top Picks Genre completeness'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","No_of_Votes"]':
    code:
    - suggestion: '.haveCompleteness(columns=[''IMDB_Rating'', ''No_of_Votes''], assertion=lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("IMDB_Rating >= 0 AND IMDB_Rating <= 10", "IMDB_Rating
        in [0,10]", lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("No_of_Votes >= 0", "Nonnegative vote counts", lambda
        f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("No_of_Votes > 0", "At least 60% rows have positive
        votes (ensures m>0)", lambda f: f >= 0.60)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("No_of_Votes = CAST(No_of_Votes AS INT)", "Votes are
        integers", lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("IMDB_Rating < 7.0 OR (IMDB_Rating IS NOT NULL AND No_of_Votes
        >= 0)", "Top-picks eligible rows have valid rating and nonnegative votes",
        lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN Poster_Link IS NOT NULL AND length(trim(Poster_Link))
