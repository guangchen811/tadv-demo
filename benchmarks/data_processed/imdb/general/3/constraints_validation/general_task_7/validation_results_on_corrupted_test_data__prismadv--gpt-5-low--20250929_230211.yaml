        and trimmed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN Poster_Link RLIKE ''(?i)^https?://.+$'' THEN
        1 ELSE 0 END", "Poster_Link HTTP(S) URL format", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`No_of_Votes` > 0'', ''Sufficient positive votes'',
        lambda x: x >= 0.60)'
      status: true
      reason_if_failed: ''
      level: error
  '["Poster_Link","Released_Year","Series_Title"]':
    code:
    - suggestion: '.hasUniqueness(columns=[''Series_Title'', ''Released_Year''], assertion=lambda
        u: u == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasUniqueness(columns=[''Series_Title'', ''Released_Year''],
        assertion=lambda u: u == 1.0)'' failed on data sample: Value: 0.9047619047619048
        does not meet the constraint requirement!'
      level: error
  Released_Year:
    code:
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("trim(`Released_Year`) RLIKE ''^[0-9]{4}$'' AND CAST(trim(`Released_Year`)
