results:
  Certificate:
    code:
    - suggestion: .satisfies("Certificate IS NULL OR Certificate IN ('U','G','PG','TV-PG','UA','PG-13','TV-14','R','TV-MA','NC-17','A','Not
        Rated','Unrated','Approved','Passed','U/A','GP')", 'certificate_values')
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: .satisfies("Gross IS NULL OR Gross RLIKE '^\\d{1,3}(,\\d{3})*$'",
        'gross_format')
      status: false
      reason_if_failed: 'Constraint ''.satisfies("Gross IS NULL OR Gross RLIKE ''^\\d{1,3}(,\\d{3})*$''",
        ''gross_format'')'' failed on data sample: Value: 0.16666666666666666 does
        not meet the constraint requirement!'
      level: error
  IMDB_Rating:
    code:
    - suggestion: '.hasMax(''IMDB_Rating'', lambda x: x <= 10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''IMDB_Rating'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
  Meta_score:
    code:
    - suggestion: .satisfies("Meta_score IS NULL OR (Meta_score >= 0 AND Meta_score
        <= 100)", 'meta_score_range')
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .isComplete('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
  Poster_Link:
    code:
    - suggestion: .satisfies("Poster_Link IS NULL OR Poster_Link RLIKE '^https?://'",
        'poster_link_format')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: .satisfies("Released_Year IS NULL OR (Released_Year >= 1900 AND
        Released_Year <= 2025)", 'released_year_range')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .containsPattern('Runtime', '^[0-9]{2,3} ?min$')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.containsPattern(''Runtime'',
        ''^[0-9]{2,3} ?min$'')'': ''Check'' object has no attribute ''containsPattern'''
      level: error
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: error
