results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("`IMDB_Rating` >= 7.0", "At least one high rating movie",
        lambda c: c > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', lambda x: x > 0.8)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''Certificate'', lambda x:
        x > 0.8)'' failed on data sample: Value: 0.78 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.hasApproxCountDistinct(''Certificate'', lambda x: x < 25)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","Meta_score","No_of_Votes"]':
    code:
    - suggestion: '.hasCorrelation(''IMDB_Rating'', ''No_of_Votes'', lambda x: x >=
        0.1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''IMDB_Rating'', ''Meta_score'', lambda x: x >=
        0.25)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation(''IMDB_Rating'', ''Meta_score'',
        lambda x: x >= 0.25)'' failed on data sample: Value: 0.0024170659223558878
        does not meet the constraint requirement!'
      level: warning
  '["IMDB_Rating","No_of_Votes"]':
    code:
    - suggestion: '.hasCorrelation(''IMDB_Rating'', ''No_of_Votes'', lambda p: p >
        0.2)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Released_Year","Series_Title"]':
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda u:
        u == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Poster_Link:
    code:
    - suggestion: '.haveCompleteness([''Poster_Link''], lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''Poster_Link''], lambda d: d > 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.hasCompleteness("Meta_score", lambda x: x > 0.8, "Meta_score should
        not have excessive nulls")'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("Meta_score IS NULL OR (Meta_score >= 0 AND Meta_score
        <= 100)", "Meta_score is between 0 and 100", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("Meta_score IS NULL OR (Meta_score
        >= 0 AND Meta_score <= 100)", "Meta_score is between 0 and 100", lambda x:
        x == 1)'' failed on data sample: Value: 0.915 does not meet the constraint
        requirement!'
      level: error
  No_of_Votes:
    code:
    - suggestion: '.satisfies("CAST(`No_of_Votes` AS INT) IS NOT NULL", "is_parsable_as_int",
        lambda p: p >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMin("No_of_Votes", lambda min_val: min_val >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation("No_of_Votes", lambda s: s > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Series_Title:
    code:
    - suggestion: .isComplete("Series_Title")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Series_Title` = trim(`Series_Title`) ", "is_trimmed",
        assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness(["Series_Title", "Released_Year"], lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
