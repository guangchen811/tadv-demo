results:
  IMDB_Rating:
    code:
    - suggestion: .satisfies('IMDB_Rating >= 0 AND IMDB_Rating <= 10', 'IMDB_Rating
        in [0, 10]')
      status: true
      reason_if_failed: ''
      level: error
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', lambda x: x >= 0.89)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''Certificate'', lambda x:
        x >= 0.89)'' failed on data sample: Value: 0.78 does not meet the constraint
        requirement!'
      level: warning
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  '["IMDB_Rating","No_of_Votes"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''No_of_Votes''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''IMDB_Rating >= 7.0 AND No_of_Votes IS NOT NULL AND
        IMDB_Rating IS NOT NULL'', ''Top Picks completeness'', lambda x: x == x)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''IMDB_Rating'', ''No_of_Votes''], lambda x:
        x > 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''Poster_Link''], lambda x: x > 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.hasCompleteness(''Meta_score'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Meta_score')
      status: true
      reason_if_failed: ''
      level: warning
  '["Meta_score","quality_score"]':
    code:
    - suggestion: .satisfies("CASE WHEN Meta_score IS NULL OR TRY_CAST(Meta_score
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Meta_score must be numeric or
        null")
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.hasCompleteness(''No_of_Votes'', lambda x: x > 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxQuantile(''No_of_Votes'', 0.60, lambda q: q > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Poster_Link","poster_asset_id"]':
    code:
    - suggestion: '.hasDistinctness([''Poster_Link''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: .satisfies("length(trim(`Released_Year`)) = length(`Released_Year`)",
        "No leading or trailing whitespace in Released_Year")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("`Released_Year` >= 1900 AND `Released_Year` <= 2025",
        "Released_Year plausible range")
      status: true
      reason_if_failed: ''
      level: warning
  '["catalog_id","title_year_key"]':
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''IMDB_Rating >= 7.0'', ''high_rating_filter'').hasUniqueness([''title_year_key''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .hasPattern('Runtime', r'^\s*(\d+)\s*min\s*$', name='Runtime format
        must be integer minutes followed by min')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.hasCompleteness(''Series_Title'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Series_Title', 'Released_Year')
      status: false
      reason_if_failed: 'Constraint ''.isUnique(''Series_Title'', ''Released_Year'')''
        failed on data sample: Value: 0.995 does not meet the constraint requirement!
        Released_Year'
      level: error
    - suggestion: '.satisfies("TRIM(`Series_Title`) <> ''''", "Non-empty Series_Title",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
