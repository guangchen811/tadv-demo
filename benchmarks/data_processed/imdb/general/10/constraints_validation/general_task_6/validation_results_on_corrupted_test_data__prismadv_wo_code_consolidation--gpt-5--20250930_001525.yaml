results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("CAST(`IMDB_Rating` AS DOUBLE) IS NOT NULL", "IMDB_Rating
        castable to DOUBLE", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(CAST(`IMDB_Rating` AS DOUBLE) >= 0.0) AND (CAST(`IMDB_Rating`
        AS DOUBLE) <= 10.0)", "IMDB_Rating in [0,10]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN UPPER(TRIM(`Certificate`)) IN (''U'',''G'',''PG'',''PG-13'',''UA'')
        THEN CAST(`IMDB_Rating` AS DOUBLE) IS NOT NULL ELSE TRUE END", "Rating present
        for family-friendly rows", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation("IMDB_Rating", lambda s: s > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN CAST(`No_of_Votes` AS BIGINT) IS NOT NULL
        THEN CAST(`IMDB_Rating` AS DOUBLE) IS NOT NULL ELSE TRUE END", "Rating present
        when votes present", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.hasCompleteness("Certificate", lambda x: x >= 0.85)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness("Certificate", lambda x: x
        >= 0.85)'' failed on data sample: Value: 0.78 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.satisfies("`Certificate` IS NULL OR upper(trim(`Certificate`))
        IN (''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''NOT RATED'',''UNRATED'')",
        "Valid Certificate Universe", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("upper(trim(`Certificate`)) IN (''U'',''G'',''PG'',''PG-13'',''UA'')",
        "At least one family-friendly row", lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Certificate","Genre"]':
    code:
    - suggestion: '.satisfies("(upper(trim(`Genre`)) NOT RLIKE ''(FAMILY|ANIMATION)'')
        OR (regexp_replace(upper(trim(`Certificate`)), ''[^A-Z0-9]'', '''') IN (''U'',''G'',''PG'',''PG13'',''UA''))",
        "Family genres require family-allowed certificates", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: '.hasCompleteness(''Genre'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Genre'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Genre` IS NOT NULL AND TRIM(`Genre`) <>
        '''' THEN 1 ELSE 0 END", "Non-empty Genre", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN UPPER(TRIM(`Certificate`)) IN (''U'',''G'',''PG'',''PG-13'',''UA'')
        THEN CASE WHEN `Genre` IS NOT NULL AND TRIM(`Genre`) <> '''' THEN 1 ELSE 0
        END ELSE 1 END", "Genre present for eligible rows", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.hasCompleteness("Gross", lambda x: x >= 0.75)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern("Gross", "^\\s*\\d{1,3}(,\\d{3})*(\\.\\d+)?\\s*$|^\\s*\\d+(\\.\\d+)?\\s*$",
        lambda x: x >= 0.8, name="Gross numeric-like formatting")'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN Gross RLIKE ''^\\s*\\d{1,3}(,\\d{3})*(\\.\\d+)?\\s*$|^\\s*\\d+(\\.\\d+)?\\s*$''
        THEN CAST(regexp_replace(Gross, '','', '''') AS DOUBLE) >= 0 ELSE TRUE END",
        "Non-negative Gross when numeric", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["IMDB_Rating","No_of_Votes"]':
    code:
    - suggestion: '.hasCorrelation(''IMDB_Rating'', ''No_of_Votes'', lambda v: v >=
        -1.0 and v <= 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''IMDB_Rating'', ''No_of_Votes'', lambda v: v >=
        0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''cast(IMDB_Rating as double) IS NOT NULL AND cast(No_of_Votes
        as double) IS NOT NULL'', ''both_rating_and_votes_numeric'', lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''cast(IMDB_Rating as double) >= 0 AND cast(IMDB_Rating
        as double) <= 10 AND cast(No_of_Votes as double) >= 0'', ''valid_rating_and_votes_ranges'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Poster_Link'', r''^https?://.+$'', lambda p: p >=
        0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("TRIM(`Poster_Link`) <> '''' AND `Poster_Link` = TRIM(`Poster_Link`)",
        "Poster_Link trimmed and non-empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Poster_Link''], lambda u: u >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.satisfies(''CAST(`No_of_Votes` AS DOUBLE) IS NOT NULL'', ''Votes
        castable to number'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''No_of_Votes'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`No_of_Votes` > 0'', ''Positive votes present'', lambda
        x: x >= 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''No_of_Votes'', lambda d: d >= 2)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`No_of_Votes` AS DOUBLE) IS NOT NULL AND CAST(`IMDB_Rating`
        AS DOUBLE) IS NOT NULL'', ''Paired numeric votes/ratings'', lambda x: x >=
        0.02)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''IMDB_Rating'', ''No_of_Votes'', lambda c: c >=
        -1.0 and c <= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Poster_Link","Released_Year","Series_Title"]':
    code:
    - suggestion: '.satisfies("Series_Title IS NOT NULL AND TRIM(Series_Title) <>
        '''' AND Poster_Link IS NOT NULL AND TRIM(Poster_Link) <> '''' AND Released_Year
        IS NOT NULL", "all_identifiers_present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness(["Series_Title", "Poster_Link", "Released_Year"],
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness(["Series_Title", "Released_Year"], lambda u: u ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness(["Poster_Link"], lambda u: u == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.hasCompleteness(''Released_Year'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Released_Year` IS NOT NULL AND `Released_Year` BETWEEN
        1000 AND 9999", "Released_Year 4-digit and numeric", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: '.hasCompleteness(''Runtime'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Runtime'', ''^[ ]*[0-9]+'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("regexp_extract(Runtime, ''^([0-9]+)'', 1) RLIKE ''^[1-9][0-9]*$''",
        ''Runtime positive minutes'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (Runtime RLIKE ''(h|:)'')", ''Runtime minutes-only
        format'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("length(trim(`Series_Title`)) > 0", "Series_Title_non_empty",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
