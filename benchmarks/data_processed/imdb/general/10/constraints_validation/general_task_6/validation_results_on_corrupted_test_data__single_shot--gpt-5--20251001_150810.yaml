      level: error
    - suggestion: '.hasMax(''Released_Year'', lambda v: v <= 2025)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .hasPattern('Runtime', r'^\d+\s*min$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.hasMinLength(''Series_Title'', lambda v: v >= 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: error
  id:
