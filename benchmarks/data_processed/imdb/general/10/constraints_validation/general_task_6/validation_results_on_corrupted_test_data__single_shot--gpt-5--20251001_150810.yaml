results:
  Certificate:
    code:
    - suggestion: '.isContainedIn(''Certificate'', [''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''NOT
        RATED'',''UNRATED''], lambda v: v >= 0.90)'
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.hasPattern(''Gross'', r''^\d{1,3}(,\d{3})*$'', lambda v: v >=
        0.95)'
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Gross'', r''^\d{1,3}(,\d{3})*$'',
        lambda v: v >= 0.95)'' failed on data sample: Value: 0.835 does not meet the
        constraint requirement!'
      level: error
  IMDB_Rating:
    code:
    - suggestion: .hasDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''IMDB_Rating'',
        ConstrainableDataTypes.Fractional)'
      level: error
    - suggestion: '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating,No_of_Votes:
    code:
    - suggestion: '.hasCorrelation(''IMDB_Rating'', ''No_of_Votes'', lambda c: c >=
        -1.0 and c <= 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Meta_score:
    code:
    - suggestion: .hasDataType('Meta_score', ConstrainableDataTypes.Fractional)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''Meta_score'',
        ConstrainableDataTypes.Fractional)'
      level: error
    - suggestion: '.hasMax(''Meta_score'', lambda v: v <= 100.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasMax(''Meta_score'', lambda v: v <= 100.0)''
        failed on data sample: Value: 9600.0 does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasMin(''Meta_score'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: .hasDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''No_of_Votes'',
        ConstrainableDataTypes.Integral)'
      level: error
    - suggestion: '.hasMin(''No_of_Votes'', lambda v: v >= 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('No_of_Votes')
      status: true
      reason_if_failed: ''
      level: error
  Overview:
    code:
    - suggestion: '.hasMinLength(''Overview'', lambda v: v >= 10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Overview')
      status: true
      reason_if_failed: ''
      level: error
  Poster_Link:
    code:
    - suggestion: '.hasMinLength(''Poster_Link'', lambda v: v >= 10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .hasPattern('Poster_Link', r'^https?://')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
