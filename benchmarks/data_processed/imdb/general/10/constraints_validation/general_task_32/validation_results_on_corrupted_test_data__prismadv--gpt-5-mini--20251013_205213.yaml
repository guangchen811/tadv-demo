results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("CASE WHEN cast(`IMDB_Rating` AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END", "IMDB_Rating_parseable", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN cast(`IMDB_Rating` AS DOUBLE) BETWEEN 0.0
        AND 10.0 THEN 1 ELSE 0 END", "IMDB_Rating_in_range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL OR TRIM(`Certificate`)
        = '''' THEN 1 ELSE 0 END", "Missing_or_Blank_Certificate_Fraction", lambda
        x: x <= 0.15)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `Certificate` IS NULL
        OR TRIM(`Certificate`) = '''' THEN 1 ELSE 0 END", "Missing_or_Blank_Certificate_Fraction",
        lambda x: x <= 0.15)'' failed on data sample: Value: 0.22 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN LENGTH(`Certificate`) <= 50 OR `Certificate`
        IS NULL THEN 1 ELSE 0 END", "Certificate_max_length_50", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN (`Certificate` NOT LIKE ''%<%'' AND `Certificate`
        NOT LIKE ''%>%'') OR `Certificate` IS NULL THEN 1 ELSE 0 END", "Certificate_no_angle_brackets",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN (`Certificate` IS NULL) OR (INSTR(`Certificate`,
        ''\n'') = 0 AND INSTR(`Certificate`, ''\r'') = 0) THEN 1 ELSE 0 END", "Certificate_no_newlines",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Genre` NOT RLIKE ''<|>'' AND lower(`Genre`)
        NOT RLIKE ''script'' THEN 1 ELSE 0 END", "No HTML/script in Genre", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: .isComplete("Poster_Link")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Poster_Link` IS NOT NULL AND trim(`Poster_Link`)
        <> '''' THEN 1 ELSE 0 END", "Poster_Link not blank", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Poster_Link` NOT LIKE ''%\"%'' AND `Poster_Link`
        NOT LIKE ''%<%'' AND `Poster_Link` NOT LIKE ''%>%'' THEN 1 ELSE 0 END", "Poster_Link
        safe for HTML attribute", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.satisfies("CASE WHEN `No_of_Votes` IS NOT NULL AND TRY_CAST(`No_of_Votes`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "No_of_Votes_is_numeric", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `No_of_Votes` IS NOT NULL AND TRY_CAST(`No_of_Votes`
        AS DOUBLE) >= 0 THEN 1 ELSE 0 END", "No_of_Votes_non_negative", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `No_of_Votes` IS NOT NULL AND floor(TRY_CAST(`No_of_Votes`
        AS DOUBLE)) = TRY_CAST(`No_of_Votes` AS DOUBLE) THEN 1 ELSE 0 END", "No_of_Votes_integral",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: .isComplete("Released_Year")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Released_Year` BETWEEN 1800 AND 2025 THEN
        1 ELSE 0 END", "Released_Year plausible range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: '.satisfies("CASE WHEN `Runtime` IS NOT NULL THEN 1 ELSE 0 END",
        "Runtime not null", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Runtime` RLIKE ''.*([0-9]+).*'' THEN 1 ELSE
        0 END", "Runtime contains digits", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(regexp_extract(`Runtime`, ''([0-9]+)'')
        AS INT) BETWEEN 1 AND 600 THEN 1 ELSE 0 END", "Runtime minutes in range 1-600",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Runtime` RLIKE ''.*[0-9]+ *(min|mins|minutes).*''
        THEN 1 ELSE 0 END", "Runtime in minute-style format", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Released_Year","Series_Title"]':
    code:
    - suggestion: '.hasUniqueness([''Series_Title'',''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.haveCompleteness([''Series_Title'',''Released_Year''], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Series_Title:
    code:
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(`Series_Title`) != '''' THEN 1 ELSE
        0 END", "Series_Title not empty", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN regexp_like(`Series_Title`, ''[A-Za-z0-9]'')
        THEN 1 ELSE 0 END", "Series_Title has alphanumeric", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
