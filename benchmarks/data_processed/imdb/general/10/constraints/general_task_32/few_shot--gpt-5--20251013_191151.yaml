constraints:
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - '.hasPattern(''Poster_Link'', r''^https?://'', lambda v: v == 1.0)'
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - '.hasPattern(''Runtime'', r''^\s*\d+\s*min\s*$'', lambda v: v == 1.0)'
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
