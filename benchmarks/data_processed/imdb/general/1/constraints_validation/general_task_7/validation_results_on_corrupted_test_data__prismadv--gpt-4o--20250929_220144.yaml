results:
  IMDB_Rating:
    code:
    - suggestion: .isComplete('IMDB_Rating')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`IMDB_Rating` >= 0 AND `IMDB_Rating` <= 10', 'IMDB Rating
        Valid Range')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''`IMDB_Rating` >= 0 AND `IMDB_Rating`
        <= 10'', ''IMDB Rating Valid Range'')'' failed on data sample: Value: 0.9
        does not meet the constraint requirement!'
      level: warning
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  '["IMDB_Rating","No_of_Votes"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('No_of_Votes >= 0', 'No_of_Votes Non-negative')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .areAnyComplete(['IMDB_Rating', 'No_of_Votes'])
      status: true
      reason_if_failed: ''
      level: error
  '["IMDB_Rating","No_of_Votes","quality_score"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''No_of_Votes''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('IMDB_Rating IS NOT NULL AND No_of_Votes IS NOT NULL',
        'No Null Values in Key Columns')
      status: true
      reason_if_failed: ''
      level: error
  Poster_Link:
    code:
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isUnique('Poster_Link')
      status: true
      reason_if_failed: ''
      level: undefined
  Meta_score:
    code:
    - suggestion: '.hasCompleteness(''Meta_score'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Runtime","Runtime_Minutes"]':
    code:
    - suggestion: '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: .isComplete('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
  '["Released_Year","Series_Title","catalog_id"]':
    code:
    - suggestion: '.satisfies(''IMDB_Rating >= 7.0'', ''High Rating Filter'', lambda
        x: x == 1.0).hasUniqueness([''title_year_key''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: .satisfies('`Series_Title` = TRIM(`Series_Title`)', 'Series_Title
        No Whitespace')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('Series_Title')
      status: true
      reason_if_failed: ''
      level: error
