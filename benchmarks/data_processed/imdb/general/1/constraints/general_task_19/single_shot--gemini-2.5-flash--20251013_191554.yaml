constraints:
  Certificate:
    code:
    - - .isAnyOf('Certificate', ['U', 'UA', 'A', 'G', 'PG', 'PG-13', 'R', 'NC-17',
        'Not Rated', 'Unrated', 'Passed', 'Approved']).setFailureAllowed(0.11)
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isGreaterThanOrEqualTo('IMDB_Rating', lit(0.0))
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', lit(10.0))
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - .isComplete('Overview')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isGreaterThanOrEqualTo('Released_Year', lit(1900))
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', lit(datetime.now().year + 5))
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .isComplete('Runtime')
      - Valid
    - - .matchesPattern('Runtime', r'.*\\d+.*')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - .isUnique(['Series_Title', 'Released_Year'])
      - Invalid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    assumptions: []
  Star2:
    code:
    - - .isComplete('Star2')
      - Valid
    assumptions: []
  Star3:
    code:
    - - .isComplete('Star3')
      - Valid
    assumptions: []
  Star4:
    code:
    - - .isComplete('Star4')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
