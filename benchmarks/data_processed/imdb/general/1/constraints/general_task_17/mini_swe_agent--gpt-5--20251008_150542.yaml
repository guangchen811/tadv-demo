raw_constraints:
- column_name: Series_Title
  code_for_constraint: .isComplete('Series_Title')
- column_name: '[''Series_Title'',''Released_Year'']'
  code_for_constraint: '.hasUniqueness([''Series_Title'',''Released_Year''], lambda
    x: x == 1.0)'
- column_name: Released_Year
  code_for_constraint: '.hasMin(''Released_Year'', lambda x: x >= 1900)'
- column_name: Released_Year
  code_for_constraint: '.hasMax(''Released_Year'', lambda x: x <= 2100)'
- column_name: IMDB_Rating
  code_for_constraint: '.hasMin(''IMDB_Rating'', lambda x: x >= 0)'
- column_name: IMDB_Rating
  code_for_constraint: '.hasMax(''IMDB_Rating'', lambda x: x <= 10)'
- column_name: No_of_Votes
  code_for_constraint: .isNonNegative('No_of_Votes')
- column_name: Runtime
  code_for_constraint: '.hasPattern(''Runtime'', r''\d+'', lambda x: x > 0.9)'
- column_name: Gross
  code_for_constraint: '.hasPattern(''Gross'', r''^[0-9,]+$'', lambda x: x > 0.0)'
- column_name: Star1
  code_for_constraint: .isComplete('Star1')
- column_name: Star2
  code_for_constraint: .isComplete('Star2')
- column_name: Star3
  code_for_constraint: .isComplete('Star3')
- column_name: Star4
  code_for_constraint: .isComplete('Star4')
- column_name: cast_distinct
  code_for_constraint: '.satisfies(\"Star1 <> Star2 AND Star1 <> Star3 AND Star1 <>
    Star4 AND Star2 <> Star3 AND Star2 <> Star4 AND Star3 <> Star4\", ''distinct_stars'',
    lambda x: x == 1.0)'
