    - suggestion: '.satisfies("(LOWER(TRIM(SPLIT(CAST(Genre AS STRING), '','')[0]))
        <> ''short'') OR (TRIM(SPLIT(CAST(Genre AS STRING), '','')[0]) = ''Short'')",
        "Canonical case for ''Short'' primary genre", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
