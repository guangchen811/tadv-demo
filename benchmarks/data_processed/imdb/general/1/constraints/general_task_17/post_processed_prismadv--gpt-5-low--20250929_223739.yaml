      source_assumptions:
      - ee7b02e1-9ab3-48fd-b6c5-edf2707be9b8
    assumptions:
    - text: 'Genre must be present (non-null) and not an empty string after trimming;
        it will be parsed into a list by splitting on commas and trimming whitespace.
        We could represent this as a completeness/trimmed-nonempty check, e.g., Deequ:
        .satisfies("CASE WHEN TRIM(CAST(Genre AS STRING)) IS NOT NULL AND TRIM(CAST(Genre
        AS STRING)) <> '''' THEN 1 ELSE 0 END", "Genre nonempty", lambda x: x == 1.0)'
      sources:
      - start_line: 71
        end_line: 72
        file: ''
      uid: e34f117f-83c8-4d92-9f89-bc9c70c65f80
    - text: 'If multiple genres are provided, they must be comma-separated with optional
        spaces; there should be no leading/trailing commas or empty tokens between
        commas. This can be validated with a pattern like: Deequ .hasPattern("Genre",
        "^\s*[^,]+(\s*,\s*[^,]+)*\s*$")'
      sources:
      - start_line: 71
        end_line: 71
        file: ''
      uid: 17b70e6c-840b-46da-8911-63f17b1afc4a
    - text: 'The first token (primary genre) is used downstream; therefore, the first
        token derived from splitting Genre by commas and trimming must be a meaningful
        label (not empty or the literal ''nan''). Deequ example: .satisfies("CASE
        WHEN TRIM(SPLIT(Genre, '','')[0]) IS NOT NULL AND LOWER(TRIM(SPLIT(Genre,
        '','')[0])) NOT IN ('''', ''nan'', ''none'') THEN 1 ELSE 0 END", "Primary
        genre present", lambda x: x == 1.0)'
      sources:
      - start_line: 71
        end_line: 72
        file: ''
      - start_line: 125
        end_line: 128
        file: ''
      uid: af8f77eb-6be6-4398-8ec4-1419d7d1663a
    - text: 'Titles intended to pass the eligibility filter must not have primary
        genre equal to ''Short'' (comparison is case-sensitive in the current code).
        A validation for data meant to be eligible could enforce that the first token
        != ''Short''. Deequ example: .satisfies("CASE WHEN TRIM(SPLIT(Genre, '','')[0])
        = ''Short'' THEN 0 ELSE 1 END", "Primary genre not Short for eligible", lambda
        x: x == 1.0)'
      sources:
      - start_line: 72
        end_line: 72
        file: ''
      - start_line: 102
        end_line: 106
        file: ''
      uid: d9945f8f-c7e5-47eb-ad7d-e81cbecaac2d
    - text: 'Because the ''Short'' check is case-sensitive and no normalization is
        applied to Genre, the input should use canonical capitalization for genre
        labels (e.g., ''Short'' exactly) to ensure correct gating. A guard validation
        could check that when the canonical label is intended, it appears exactly
        as ''Short''. Deequ example: .satisfies("CASE WHEN LOWER(TRIM(SPLIT(Genre,
        '','')[0])) = ''short'' THEN CASE WHEN TRIM(SPLIT(Genre, '','')[0]) = ''Short''
        THEN 1 ELSE 0 END ELSE 1 END", "Canonical case for ''Short''", lambda x: x
        == 1.0)'
      sources:
      - start_line: 71
        end_line: 72
        file: ''
      - start_line: 105
        end_line: 105
        file: ''
      uid: ee7b02e1-9ab3-48fd-b6c5-edf2707be9b8
  Gross:
    code:
    - suggestion: '.satisfies("CASE WHEN Gross IS NULL THEN True WHEN lower(trim(Gross))
        IN ('''', ''nan'') THEN True WHEN Gross RLIKE ''^\\s*[0-9,]+\\s*$'' THEN True
        ELSE False END", "Gross format (digits/commas only or null)", lambda x: x
        == 1)'
