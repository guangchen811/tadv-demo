        end_line: 90
        file: ''
      - start_line: 126
        end_line: 128
        file: ''
      uid: 62ff9c0a-448b-4c14-8c7c-21fc3b4ca7f9
    - text: 'The ''Certificate'' column may contain null values; nulls are allowed
        and will default to a neutral impact on scoring. However, to avoid skewing
        scores, the null ratio should be reasonably low (e.g., at least 80% completeness).
        Possible rule: completeness(''Certificate'') >= 0.80.'
      sources:
      - start_line: 88
        end_line: 90
        file: ''
      - start_line: 126
        end_line: 128
        file: ''
      uid: 80668741-eebb-4322-823b-78b8b0205f03
    - text: 'Values intended to be recognized as restrictive/adult-only certificates
        should match one of {''R'',''NC-17'',''A'',''18+'',''TV-MA''} after uppercasing
        and trimming; leading/trailing spaces or variants will cause them to be treated
        as neutral. A practical rule: proportion of non-null rows where upper(trim(Certificate))
        is in (''R'',''NC-17'',''A'',''18+'',''TV-MA'',''G'',''PG'',''PG-13'',''TV-G'',''TV-PG'',''TV-14'',''U'',''UA'')
        is >= 0.95 to ensure canonicalization. Example Deequ: .satisfies("CASE WHEN
        `Certificate` IS NULL THEN 1 WHEN upper(trim(`Certificate`)) IN (''R'',''NC-17'',''A'',''18+'',''TV-MA'',''G'',''PG'',''PG-13'',''TV-G'',''TV-PG'',''TV-14'',''U'',''UA'')
        THEN 1 ELSE 0 END", "Certificate in known set", lambda x: x >= 0.95).'
      sources:
      - start_line: 88
        end_line: 90
        file: ''
      uid: 50e0b416-990a-4462-828a-c1aea6b59f53
    - text: 'Spacing should be clean for downweighted categories: values like '' R''
        or ''R '' should not appear; otherwise they will not be recognized as restrictive.
        Possible rule: proportion of rows where upper(`Certificate`) = upper(trim(`Certificate`))
        >= 0.99.'
      sources:
      - start_line: 88
        end_line: 90
        file: ''
      uid: 765b8d58-b671-4557-b7a9-93195f7e1e0d
    - text: 'The ''Certificate'' column should be categorical with a limited number
        of distinct values (e.g., <= 20) consistent with rating systems. Possible
        rule: approximateDistinctness(''Certificate'') <= 20.'
      sources:
      - start_line: 88
        end_line: 90
        file: ''
      - start_line: 126
        end_line: 128
        file: ''
      uid: 1d1365c8-4d62-4820-9792-2144c885e4ab
  '["Certificate","Gross","IMDB_Rating","Runtime","Star1","Star2","Star3","Star4"]':
    code: []
    assumptions:
    - text: 'Each row must have a complete and pairwise-distinct cast across the four
        star columns: ''Star1'', ''Star2'', ''Star3'', and ''Star4''. No value may
        be empty or the literal ''nan'' (case-insensitive) after trimming, and all
        four names must be different. This can be represented as Deequ constraints
        like: .areComplete(["Star1","Star2","Star3","Star4"]) and .satisfies("Star1
        <> '''' AND lower(Star1) <> ''nan'' AND Star2 <> '''' AND lower(Star2) <>
        ''nan'' AND Star3 <> '''' AND lower(Star3) <> ''nan'' AND Star4 <> '''' AND
        lower(Star4) <> ''nan'' AND Star1 <> Star2 AND Star1 <> Star3 AND Star1 <>
        Star4 AND Star2 <> Star3 AND Star2 <> Star4 AND Star3 <> Star4", "cast_pairwise_distinct")'
      sources:
      - start_line: 60
        end_line: 64
        file: ''
      - start_line: 83
        end_line: 85
        file: ''
      uid: f998ce14-9109-438c-92c8-3741699906f0
    - text: 'The combination of ''title'' (normalized from ''Series_Title'') and ''year''
        (numeric ''Released_Year'') should be unique across the dataset, as it is
        used to create a deterministic ''title_id''. This can be expressed in Deequ
        as: .isUnique(["title","year"]).'
      sources:
      - start_line: 66
        end_line: 69
        file: ''
      uid: 45a603b8-8b6d-42f3-a3f2-f59b893db0ff
    - text: 'Eligibility coupling: Rows considered as candidates must jointly satisfy
        multi-column conditions: imdb_rating >= 7.0, runtime_min between 60 and 210
        (inclusive), and primary_genre not equal to ''Short''. This can be enforced
        as a Deequ assertion over the candidate view, or on the full dataset as: .satisfies("NOT
        (imdb_rating >= 7.0 AND runtime_min >= 60 AND runtime_min <= 210 AND primary_genre
        = ''Short'')", "no_shorts_in_eligible_window").'
      sources:
      - start_line: 47
        end_line: 47
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      - start_line: 71
        end_line: 72
        file: ''
      - start_line: 102
        end_line: 109
        file: ''
      uid: 5cc8c34f-8d33-4adb-9a2b-7efaa91205fc
  Genre:
    code:
