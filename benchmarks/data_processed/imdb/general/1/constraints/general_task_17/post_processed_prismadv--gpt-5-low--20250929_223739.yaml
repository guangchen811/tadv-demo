      source_assumptions:
      - 6f4fcbbf-7d4d-4202-8fbc-55cb37e19665
    assumptions:
    - text: 'Gross must be a non-negative whole-dollar amount encoded as digits optionally
        containing commas and surrounding whitespace. Currency symbols, decimal points,
        and negative signs are not allowed. Practical regex for acceptable non-null
        values: ^\s*[0-9,]+\s*$. We could represent this with a Deequ constraint like:
        .satisfies("CASE WHEN Gross IS NULL THEN 1 WHEN lower(trim(Gross)) IN ('''',
        ''nan'') THEN 1 WHEN Gross RLIKE ''^\\s*[0-9,]+\\s*$'' THEN 1 ELSE 0 END",
        "Gross format (digits/commas only or null)", lambda x: x == 1) or, more permissively,
        apply the regex only to non-null/non-empty entries.'
      sources:
      - start_line: 16
        end_line: 25
        file: ''
      - start_line: 54
        end_line: 54
        file: ''
      uid: bcbe83b9-c39e-4350-b33e-52157b2e8996
    - text: 'At least one row must have a parsable Gross value (i.e., matches the
        allowed pattern after trimming and comma removal) so that gross_usd.median()
        is not null. If all rows are null/unparsable, the median stays null and downstream
        licensing_score computations will propagate NaNs and break ranking (int cast).
        We could represent this with a Deequ constraint like: .satisfies("CASE WHEN
        Gross RLIKE ''^\\s*[0-9,]+\\s*$'' THEN 1 ELSE 0 END", "At least one parsable
        Gross", lambda x: x > 0).'
      sources:
      - start_line: 16
        end_line: 25
        file: ''
      - start_line: 54
        end_line: 54
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 92
        end_line: 99
        file: ''
      - start_line: 112
        end_line: 112
        file: ''
      uid: 6f4fcbbf-7d4d-4202-8fbc-55cb37e19665
    - text: 'Gross can be missing or effectively null (actual NULL, empty string,
        or the literal ''nan'' in any case) and such values will be treated as nulls
        in parsing. However, not all rows should be missing/unparsable (see the previous
        assumption). We could represent acceptance of nulls with a completeness constraint
        that allows nulls, plus the previous ''at least one parsable'' constraint.
