      - 36168bc2-7cd1-4ca5-a8eb-c59f6d8d4d39
    - suggestion: '.satisfies("length(regexp_extract(Runtime, ''(\\\\d+)'', 1)) >
        0 AND CAST(regexp_extract(Runtime, ''(\\\\d+)'', 1) AS INT) > 0", "Runtime
        positive minutes", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: bb2f6556-69f2-4c2e-b80a-2695c0baefd0
      source_assumptions:
      - d8f719d6-2971-4f26-8e57-fdecdf07c3af
    assumptions:
    - text: 'Runtime should be provided for the vast majority of rows (e.g., at least
        95% non-null), because it is parsed and used downstream for eligibility and
        scoring. A suitable rule could be: fraction of rows where Runtime IS NOT NULL
        >= 0.95.'
      sources:
      - start_line: 52
        end_line: 52
        file: ''
      - start_line: 103
        end_line: 106
        file: ''
      - start_line: 92
        end_line: 99
        file: ''
      uid: b0725399-a89b-4221-9547-e74b1516ad36
    - text: 'Runtime should be expressed as a single integer count of minutes (optionally
        with a ''min'' suffix), not mixed formats like ''2h 10m'' or text with multiple
        numbers. For example, at least 90% of values should match the pattern: ^\s*\d+\s*(min|mins|minutes)?\s*$.
        This ensures the first-number extraction yields the intended minutes value.'
      sources:
      - start_line: 9
        end_line: 13
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      uid: 47551f19-a3d6-4b9c-beba-6863f912cd6f
    - text: A high fraction of Runtime values should be parseable to an integer minute
        value (e.g., >= 95% where REGEXP_EXTRACT(Runtime, '(\\d+)', 1) is not null),
        otherwise many rows will become ineligible or have NaN scores.
      sources:
      - start_line: 9
        end_line: 13
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      - start_line: 79
        end_line: 80
        file: ''
      - start_line: 92
        end_line: 99
        file: ''
      uid: 8349a360-4d66-4429-b751-ae8bffcbdd1a
    - text: 'For eligibility, parsed runtimes should typically fall within 60 to 210
        minutes. A reasonable constraint is: at least 80% of parsed runtimes (CAST(REGEXP_EXTRACT(Runtime,
        ''(\\d+)'', 1) AS INT)) are between 60 and 210 inclusive.'
      sources:
      - start_line: 103
        end_line: 106
        file: ''
      uid: 36168bc2-7cd1-4ca5-a8eb-c59f6d8d4d39
    - text: 'Parsed Runtime values must be positive integers; zero or negative numbers
        should not occur. A rule could be: fraction of rows with CAST(REGEXP_EXTRACT(Runtime,
        ''(\\d+)'', 1) AS INT) > 0 equals 1.0.'
      sources:
      - start_line: 9
        end_line: 13
        file: ''
      - start_line: 79
        end_line: 80
        file: ''
      uid: d8f719d6-2971-4f26-8e57-fdecdf07c3af
  '["Released_Year","Series_Title"]':
    code: []
    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' must be unique
        across all records. This supports constructing a deterministic ''title_id''
        from title and year without collisions. We could represent this as a Deequ
        constraint: .isUnique(["Series_Title", "Released_Year"]).'
      sources:
      - start_line: 67
        end_line: 68
        file: ''
      - start_line: 45
        end_line: 46
        file: ''
      uid: 7b8c05e0-021a-4ccf-aa77-50085f5ae47c
    - text: 'For rows where ''Released_Year'' is null, ''Series_Title'' must be unique
        to avoid ''title_id'' collisions, since the ID falls back to slug(title) when
        year is missing. In Deequ, enforce uniqueness on the subset with missing year:
        .where("Released_Year IS NULL").isUnique(["Series_Title"]).'
      sources:
      - start_line: 67
        end_line: 68
        file: ''
      - start_line: 28
        end_line: 32
        file: ''
      uid: 1ca05d32-2ebc-4c36-aaaf-4a5272a5350e
  Series_Title:
    code:
    - suggestion: '.satisfies("trim(`Series_Title`) <> '''' AND lower(trim(`Series_Title`))
        <> ''nan''", "Series_Title not empty or ''nan''", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 72b18253-3935-42e1-9dad-8a430dcaf291
      source_assumptions:
      - ad6687fc-fc86-456b-a940-41d918fcdb90
    - suggestion: '.hasPattern(''Series_Title'', ''.*[A-Za-z0-9].*'', lambda x: x
        == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 43f1f78a-ddad-4021-a8ae-26d3b087248f
      source_assumptions:
      - 93b4e4e1-b907-4212-81a6-2697aa9a57b6
    assumptions:
    - text: Series_Title must be present (non-null) for all rows. Although the code
        coerces nulls to the string 'nan', the input should provide actual titles
        to avoid placeholder values propagating into title and title_id.
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: 6c7281bf-4d90-4b3d-844c-e702ef888107
    - text: After trimming whitespace, Series_Title should not be empty and should
        not equal the literal 'nan' (case-insensitive). This ensures the derived 'title'
        is meaningful and prevents placeholder titles from being slugified and used
        in IDs.
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      - start_line: 28
        end_line: 32
        file: ''
      uid: ad6687fc-fc86-456b-a940-41d918fcdb90
    - text: Series_Title should contain at least one alphanumeric character [A-Za-z0-9]
        so that slugify(Series_Title) is not empty. Titles that reduce to an empty
        slug (e.g., only punctuation) would produce invalid or ambiguous title_id
        values.
      sources:
      - start_line: 28
        end_line: 32
        file: ''
      - start_line: 67
        end_line: 68
        file: ''
      uid: 93b4e4e1-b907-4212-81a6-2697aa9a57b6
    - text: 'The combination of normalized title and year must be unique across the
        dataset: slugify(trim(lower(Series_Title))) concatenated with ''-'' and Released_Year
        (as integer) when year is present; otherwise slugify(trim(lower(Series_Title)))
        alone must be unique for rows with missing year. This supports generating
        deterministic, non-colliding title_id values.'
      sources:
      - start_line: 66
        end_line: 68
        file: ''
      - start_line: 28
        end_line: 32
        file: ''
      uid: 3453fe81-95ea-4ecc-97fc-8606413766b4
  '["Star1","Star2","Star3","Star4"]':
    code: []
    assumptions:
    - text: 'Within each record, the four cast columns ''Star1'', ''Star2'', ''Star3'',
        and ''Star4'' must all be present (non-null, non-empty after trimming, and
        not the literal string ''nan'' in any case) and must be pairwise distinct
        after trimming. This can be enforced as a row-level predicate, for example
        in Deequ: .satisfies("trim(Star1) <> '''' AND trim(Star2) <> '''' AND trim(Star3)
        <> '''' AND trim(Star4) <> '''' AND lower(trim(Star1)) <> ''nan'' AND lower(trim(Star2))
        <> ''nan'' AND lower(trim(Star3)) <> ''nan'' AND lower(trim(Star4)) <> ''nan''
        AND trim(Star1) <> trim(Star2) AND trim(Star1) <> trim(Star3) AND trim(Star1)
        <> trim(Star4) AND trim(Star2) <> trim(Star3) AND trim(Star2) <> trim(Star4)
        AND trim(Star3) <> trim(Star4)", ["Star1","Star2","Star3","Star4"])'
      sources:
      - start_line: 60
        end_line: 64
        file: ''
      - start_line: 83
        end_line: 85
        file: ''
      uid: 7e133b0b-9fee-4461-a829-08868737a5ff
    - text: 'For all rows that pass the eligibility filter used for ranking (imdb_rating
        >= 7.0, runtime_min between 60 and 210, and primary_genre not in [''Short'']),
        the cast must be fully valid and diverse as above (i.e., all four of Star1..Star4
        present and mutually distinct), ensuring cast_diversity equals 1.0 for all
        candidates. This can be expressed with a conditional constraint, e.g., in
        Deequ: .satisfies("CASE WHEN (imdb_rating >= 7.0 AND runtime_min >= 60 AND
        runtime_min <= 210 AND primary_genre <> ''Short'') THEN (trim(Star1) <> ''''
        AND trim(Star2) <> '''' AND trim(Star3) <> '''' AND trim(Star4) <> '''' AND
        lower(trim(Star1)) <> ''nan'' AND lower(trim(Star2)) <> ''nan'' AND lower(trim(Star3))
        <> ''nan'' AND lower(trim(Star4)) <> ''nan'' AND trim(Star1) <> trim(Star2)
        AND trim(Star1) <> trim(Star3) AND trim(Star1) <> trim(Star4) AND trim(Star2)
        <> trim(Star3) AND trim(Star2) <> trim(Star4) AND trim(Star3) <> trim(Star4))
        ELSE true END", ["Star1","Star2","Star3","Star4","imdb_rating","runtime_min","primary_genre"])'
      sources:
      - start_line: 83
        end_line: 99
        file: ''
      - start_line: 101
        end_line: 109
        file: ''
      - start_line: 112
        end_line: 122
        file: ''
