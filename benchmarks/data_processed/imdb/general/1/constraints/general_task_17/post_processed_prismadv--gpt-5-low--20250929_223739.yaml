    - suggestion: '.satisfies("TRIM(SPLIT(CAST(Genre AS STRING), '','')[0]) IS NOT
        NULL AND LOWER(TRIM(SPLIT(CAST(Genre AS STRING), '','')[0])) NOT IN ('''',
