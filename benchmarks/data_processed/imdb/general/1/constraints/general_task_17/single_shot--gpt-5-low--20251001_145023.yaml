constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda v: v >= 0.85)'
      - Valid
    - - .isContainedIn('Certificate', ['U','UA','A','PG','PG-13','R','NC-17','TV-MA','TV-14','G','18+','NR'])
      - Invalid
    assumptions: []
  Director:
    code:
    - - .isComplete('Director')
      - Valid
    assumptions: []
  Genre:
    code:
    - - '.containsPattern(''Genre'', ''^[A-Za-z]+(\s*,\s*[A-Za-z]+)*$'', lambda v:
        v >= 0.95)'
      - Invalid
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.containsPattern(''Gross'', ''^[0-9,]+$'', lambda v: v >= 0.90)'
      - Invalid
    - - '.hasCompleteness(''Gross'', lambda v: v >= 0.80)'
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda v: v >= 0.80)'
      - Valid
    - - '.hasMax(''Meta_score'', lambda v: v <= 100.0)'
      - Valid
    - - '.hasMin(''Meta_score'', lambda v: v >= 0.0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - '.hasMinLength(''Overview'', lambda v: v >= 10)'
      - Valid
    - - .isComplete('Overview')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - '.containsPattern(''Poster_Link'', ''^https?://'', lambda v: v == 1.0)'
      - Invalid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - '.satisfies(''Released_Year >= 1900 AND Released_Year <= 2025'', ''year_range'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Runtime:
    code:
    - - '.containsPattern(''Runtime'', ''^\s*\d+\s*min\s*$'', lambda v: v == 1.0)'
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - '.hasMinLength(''Series_Title'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title,Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'',''Released_Year''], lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Star1:
    code:
    - - .isComplete('Star1')
      - Valid
    assumptions: []
  Star1,Star2,Star3,Star4:
    code:
    - - '.satisfies(''Star1 IS NOT NULL AND Star2 IS NOT NULL AND Star3 IS NOT NULL
        AND Star4 IS NOT NULL AND Star1 <> Star2 AND Star1 <> Star3 AND Star1 <> Star4
        AND Star2 <> Star3 AND Star2 <> Star4 AND Star3 <> Star4'', ''cast_unique_and_present'',
        lambda v: v == 1.0)'
      - Invalid
    assumptions: []
  Star2:
    code:
    - - .isComplete('Star2')
      - Valid
    assumptions: []
  Star3:
    code:
    - - .isComplete('Star3')
      - Valid
    assumptions: []
  Star4:
    code:
    - - .isComplete('Star4')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
