    assumptions:
    - text: 'The correlation calculation between ''IMDB_Rating'' and ''Meta_score''
        requires at least two rows where both ''IMDB_Rating'' and ''Meta_score'' are
        non-null. The code branches meta_weight based on that correlation, so a meaningful
        correlation requires >= 2 non-null pairs. (Deequ-style check: ensure at least
        2 rows satisfy isComplete([''IMDB_Rating'',''Meta_score''])).'
      sources:
      - start_line: 57
        end_line: 59
        file: ''
      uid: 6e1eac07-69b3-4114-895b-5326613bcfc7
    - text: 'When ''Meta_score'' is missing, ''IMDB_Rating'' is used to fill ''MetaNormFilled''
        (MetaNormFilled = Meta_score/10 or IMDB_Rating). Therefore any row with null
        ''Meta_score'' that will be used downstream must have a non-null numeric ''IMDB_Rating''.
        A practical constraint: for all rows, if Meta_score IS NULL then IMDB_Rating
        IS NOT NULL. (Deequ-style: .hasCompleteness(''IMDB_Rating'', 1.0) on the subset
        where Meta_score is null or a conditional completeness check).'
      sources:
      - start_line: 60
        end_line: 62
        file: ''
      - start_line: 39
        end_line: 42
        file: ''
      uid: 60aaf5d9-2eed-4924-8292-eece8dedf6b9
    - text: 'The ''HybridRating'' calculation combines ''MetaNormFilled'' and ''IMDB_Rating''
        using meta_weight. For downstream ranking to work, ''HybridRating'' must be
        numeric and finite for rows being ranked. Practical checks: HybridRating is
        not null and falls in a valid rating range (e.g., between 0 and 10). (Deequ-style:
        .isComplete([''HybridRating'']) and .isContainedInRange(''HybridRating'',
        0.0, 10.0)).'
      sources:
      - start_line: 59
        end_line: 62
        file: ''
      - start_line: 64
        end_line: 68
        file: ''
      uid: 7cab109f-954c-4c26-973d-ff2bd6cb6c72
    - text: 'The weighted ranking formula uses (v / (v + m)) and (m / (v + m)) where
        v = ''No_of_Votes'' and m = 70th-quantile(No_of_Votes). To avoid division-by-zero,
        for every row used in ranking the denominator (No_of_Votes + m) must be >
        0. Practically, ensure that the 70th quantile m is > 0 or that not all rows
        have No_of_Votes == 0. (Deequ-style: assert quantile(No_of_Votes, 0.7) > 0
        OR assert that a positive fraction of rows have No_of_Votes > 0; additionally
        ensure WeightedRank is complete/finite).'
      sources:
