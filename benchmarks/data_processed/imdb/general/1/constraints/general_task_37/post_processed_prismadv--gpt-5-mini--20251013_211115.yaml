        end_line: 41
        file: ''
      uid: f23530f3-36c4-4312-b17b-5bdd2b268fe8
    - text: '''Released_Year'' must contain no nulls after ingestion. The code converts
        to pandas nullable integer dtype (Int64) but later calls int(r[''Released_Year''])
        when building catalog_id; that will fail if Released_Year is missing (pd.NA).
