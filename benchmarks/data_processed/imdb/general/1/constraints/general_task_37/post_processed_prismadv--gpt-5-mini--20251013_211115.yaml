        for the subset being ranked/filtering (e.g., after applying IMDB_Rating >=
        7.0). (Deequ-style: on the filtered set, .isComplete([''WeightedRank'',''No_of_Votes'',''IMDB_Rating''])
        and numeric-typed checks).'
