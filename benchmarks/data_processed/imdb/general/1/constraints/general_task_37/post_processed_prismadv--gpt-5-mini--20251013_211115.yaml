        end_line: 41
        file: ''
      - start_line: 76
        end_line: 77
        file: ''
      uid: 4218d2a9-e42f-429d-9748-6a030c21d9d2
    - text: 'Values in ''Released_Year'' should be whole integers (no fractional years).
        The code casts to an integer dtype and later converts to a Python int for
        string formatting; fractional values (e.g., 1999.5) would cause casting or
        int() issues. Represent as: CASE WHEN `Released_Year` RLIKE ''^[0-9]+$'' THEN
        1 ELSE 0 END (expect 1.0) or CASE WHEN FLOOR(CAST(`Released_Year` AS double))
        = CAST(`Released_Year` AS double) THEN 1 ELSE 0 END (expect 1.0).'
      sources:
      - start_line: 41
        end_line: 41
        file: ''
      - start_line: 76
        end_line: 77
        file: ''
      uid: 1003c529-4137-4db5-b88e-5b7bd52674f0
    - text: 'Released_Year values should fall in a plausible calendar range, e.g.
        between a reasonable lower bound (historic earliest movie year) and the current
        year. The script defines current_year = date.today().year (line 43), and a
        future year would be suspicious for a released-year field and might be invalid
        for downstream consumers. Example check (replace {CURRENT_YEAR} with the runtime
        value): CASE WHEN `Released_Year` BETWEEN 1800 AND {CURRENT_YEAR} THEN 1 ELSE
        0 END (expect a high proportion, e.g. 1.0).'
      sources:
