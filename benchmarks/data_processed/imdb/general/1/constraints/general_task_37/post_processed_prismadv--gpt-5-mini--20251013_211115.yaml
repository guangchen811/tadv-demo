        end_line: 55
        file: ''
      uid: 5de56bce-0c4d-4c95-b140-72b5cdafe57d
    - text: 'Poster_Link values that do not match the Amazon image pattern should
        still be valid URL strings (or valid image paths) suitable for inclusion in
        the final feed, since to_cdn will return the original value when no substitution
