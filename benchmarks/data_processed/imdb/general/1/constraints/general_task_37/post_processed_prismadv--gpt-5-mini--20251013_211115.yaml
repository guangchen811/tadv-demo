  '["Poster_CDN","Poster_Link"]':
    code: []
    assumptions:
    - text: Poster_CDN is derived from Poster_Link by applying the to_cdn transformation
        (a regex replacement that converts Amazon image size variants to the standard
        '._V1_UX342_.jpg'). For all rows where Poster_Link is not null, Poster_CDN
        should equal re.sub(r"\._V1_.+?\.jpg", "._V1_UX342_.jpg", Poster_Link). This
        can be checked as a multi-column constraint comparing Poster_CDN to the transformed
        Poster_Link.
      sources:
      - start_line: 16
        end_line: 23
        file: ''
      - start_line: 55
        end_line: 55
        file: ''
      uid: ac7ecbd5-fb4f-465a-9727-1c68f4facd9b
    - text: The code builds a catalog_id from Series_Title and Released_Year using
        slugify(str(Series_Title)) + '-' + int(Released_Year). Therefore, for every
        row that passes the IMDB_Rating filter (IMDB_Rating >= 7.0) and is intended
        for the feed, Series_Title and Released_Year must both be non-null and Released_Year
        must be an integer-like value (convertible to int).
      sources:
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 76
        end_line: 77
        file: ''
      uid: a56b52b9-8e4b-4642-b6cc-85c369d77b2b
    - text: 'WeightedRank is computed from No_of_Votes (v) and HybridRating (R) via
        (v/(v+m))*R + (m/(v+m))*C where m is the 70th percentile of No_of_Votes and
        C is mean(HybridRating). For ranking and sorting to behave as intended, No_of_Votes
        and HybridRating should be numeric and finite and not all No_of_Votes should
        be zero (to avoid m == 0 causing v + m == 0 across rows). As an actionable
        constraint: for rows included in the feed, (No_of_Votes, HybridRating, WeightedRank)
        should be finite numbers.'
      sources:
      - start_line: 64
        end_line: 68
        file: ''
      - start_line: 86
        end_line: 88
        file: ''
      uid: fd5fdca9-3630-4254-aa59-4d1876784aa3
    - text: HybridRating is computed from Meta_score (via MetaNorm -> MetaNormFilled)
        and IMDB_Rating. The code uses MetaNormFilled = Meta_score/10 or fills with
        IMDB_Rating when Meta_score is missing. Therefore, for HybridRating to be
        defined for a row, at least one of Meta_score or IMDB_Rating must be present
        (non-null). In other words, (Meta_score IS NOT NULL) OR (IMDB_Rating IS NOT
        NULL) should hold for feed rows.
      sources:
      - start_line: 57
        end_line: 62
        file: ''
      uid: c9ef6ddb-3fa2-41d0-a3f2-74594bb9970c
