        so if any value is non-numeric it would become null and later code (casting
        and int(...)) would fail. Example Deequ/GE style checks: - Ensure values match
        digits: CASE WHEN `Released_Year` RLIKE ''^[0-9]+$'' THEN 1 ELSE 0 END (expect
        1.0) - Or ensure no coercion to null: CASE WHEN cast(NULLIF(REGEXP_EXTRACT(`Released_Year`,
        ''([0-9]+)''), '''') AS bigint) IS NOT NULL THEN 1 ELSE 0 END (expect 1.0).'
      sources:
