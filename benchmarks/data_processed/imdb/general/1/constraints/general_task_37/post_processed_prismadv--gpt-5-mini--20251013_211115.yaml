    - text: 'The ''No_of_Votes'' values should be non-negative and represent integer
        counts. The code casts values to int after coercion and uses them as counts
        in ranking; negative or fractional vote counts are not meaningful. Validate
        min(No_of_Votes) >= 0 and that values are integral (or coercible to integral
        without loss).

        Example check: .satisfies("CASE WHEN CAST(`No_of_Votes` AS DOUBLE) >= 0 THEN
