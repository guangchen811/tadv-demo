        file: ''
      uid: a4b18bf2-5a60-4b4e-88a5-2bc139cb756e
    - text: 'A large fraction of Poster_Link values are expected to be Amazon-style
        image URLs containing the pattern ''._V1_<variant>.jpg'' so they can be normalized
        to the UX342 variant by the regex substitution. You can encode this as a regex
        check, for example: .satisfies("CASE WHEN `Poster_Link` RLIKE ''\\._V1_.+?\\.jpg''
        THEN 1 ELSE 0 END", "Has Amazon V1 jpg pattern", lambda x: x >= 0.9).'
