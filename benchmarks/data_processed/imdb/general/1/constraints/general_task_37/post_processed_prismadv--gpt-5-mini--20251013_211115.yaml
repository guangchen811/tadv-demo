        apply the canonical mapping {''U/A'' -> ''UA''}; if the resulting value is
        one of the allowed certificates {''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not
        Rated'',''TV-14'',''TV-MA''} then CertificateNorm must equal that resulting
        value; otherwise CertificateNorm must be ''Not Rated''. This can be enforced
        with a predicate-style constraint, for example in Deequ as a boolean SQL predicate:
        (Certificate = ''U/A'' AND CertificateNorm = ''UA'') OR (Certificate IN (''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not
        Rated'',''TV-14'',''TV-MA'') AND CertificateNorm = Certificate) OR (Certificate
        NOT IN (''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not Rated'',''TV-14'',''TV-MA'',''U/A'')
        OR Certificate IS NULL AND CertificateNorm = ''Not Rated'')'
      sources:
      - start_line: 46
        end_line: 54
        file: ''
      uid: 5b51e807-fc94-4e83-87cf-52c79453fce9
    - text: 'All values of CertificateNorm must be within the allowed set plus the
        fallback ''Not Rated'': {''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not
        Rated'',''TV-14'',''TV-MA''}. This can be enforced with a containment constraint
        like .isContainedIn(''CertificateNorm'', allowed_values_with_NotRated).'
      sources:
      - start_line: 46
        end_line: 54
        file: ''
      uid: f901a8e8-6ed2-4541-af35-6751817bf627
    - text: 'If Certificate is null or contains a value not in the allowed set (after
        applying the canonical map), then CertificateNorm must equal ''Not Rated''.
        In Deequ this can be expressed as a predicate: (Certificate IS NULL OR Certificate
        NOT IN (allowed_values_and_canonical_keys)) => CertificateNorm = ''Not Rated''.'
      sources:
      - start_line: 50
        end_line: 54
        file: ''
      uid: f107b7cf-efa9-4052-84f3-6971b27b1cbd
    - text: 'If Certificate is already one of the allowed canonical values (e.g. ''U'',''UA'',''A'',...),
        then CertificateNorm must be identical to Certificate (i.e., no further transformation
        should change those values). This supports a constraint like: for rows with
        Certificate IN (allowed_values) assert CertificateNorm = Certificate.'
      sources:
      - start_line: 50
        end_line: 53
        file: ''
      uid: 8a688240-0eeb-4489-bc6d-65e5c868b766
    - text: 'The special canonical mapping must be applied: when Certificate == ''U/A''
        then CertificateNorm must equal ''UA''. Enforceable as a simple equality check
        for those rows.'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
