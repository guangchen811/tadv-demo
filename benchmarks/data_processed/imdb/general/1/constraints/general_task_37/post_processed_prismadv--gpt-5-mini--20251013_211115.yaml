      uid: e7d0946a-e185-47c9-b179-e673505f1043
    - text: 'All (or a very large fraction of) Poster_Link values should be strings
        (or values that are safely treated as strings). The to_cdn function expects
        a string and uses regex substitutions; if values are not strings the conversion
        may not run as intended. Representable rule: .satisfies("CASE WHEN typeof(`Poster_Link`)
        = ''string'' OR `Poster_Link` IS NULL THEN 1 ELSE 0 END", "Poster_Link is
        string-like", lambda x: x >= 0.99).'
