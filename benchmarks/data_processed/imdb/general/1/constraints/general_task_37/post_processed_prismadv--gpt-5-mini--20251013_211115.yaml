        end_line: 83
        file: ''
      uid: 5b85744e-5c92-4b8b-9bee-fae7d4d5ef7d
    - text: 'After extraction, the minutes must be a positive integer in a reasonable
        movie runtime range. For safety, validate the extracted integer is between
        1 and 600 (or another domain-appropriate bound) so the cast to int and downstream
        uses are valid. Example validation: .satisfies("CASE WHEN CAST(REGEXP_EXTRACT(`Runtime`,
        ''(\\d+)'') AS INT) BETWEEN 1 AND 600 THEN 1 ELSE 0 END", "Runtime minutes
