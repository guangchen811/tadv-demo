        every Poster_Link to produce Poster_CDN which is later included in the output
        feed, so inputs are expected to have Poster_Link present for rows that should
        appear in the feed. This can be expressed as a Deequ/GE check such as: .satisfies("CASE
        WHEN `Poster_Link` IS NOT NULL THEN 1 ELSE 0 END", "Poster_Link not null",
        lambda x: x == 1)'
