  '["IMDB_Rating","Meta_score"]':
    code:
    - suggestion: '.hasCorrelation("IMDB_Rating", "Meta_score", lambda x: x > 0.25)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 0dbe4a26-893e-4d62-a62b-f5fbc35b23a7
      source_assumptions:
