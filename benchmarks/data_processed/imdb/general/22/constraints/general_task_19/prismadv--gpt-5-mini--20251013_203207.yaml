        end_line: 49
        file: ''
      uid: b650ba93-c388-426e-b0ed-8f278f8ab140
    - text: 'Genre is expected to be a comma-separated list of genre names that are
        mapped to per-genre weights. For correct genre preference calculation, each
        comma-separated token should be a known genre (from the allowed set) or else
        the code will apply a default weight of 1.0. Actionable constraint examples:
        validate that every token in Genre splits belongs to allowed_genres (e.g.,
        a custom predicate that ensures all parts in split(Genre, '','') are contained
        in the allowed set), or at least a high coverage (e.g., 95%) of genre tokens
        are in allowed_genres.'
