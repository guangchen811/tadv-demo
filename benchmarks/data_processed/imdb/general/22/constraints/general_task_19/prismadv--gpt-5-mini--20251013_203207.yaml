    - text: 'Certificate values are mapped to suitability weights and missing certificates
        are treated as ''Not Rated'' (fillna(''Not Rated'')). Some certificate values
        (e.g., ''NC-17'') map to a suitability of 0 and are therefore excluded by
        the eligibility mask regardless of IMDB_Rating. Actionable constraint examples:
        Certificate values should be within the expected set (allowed_certificates)
