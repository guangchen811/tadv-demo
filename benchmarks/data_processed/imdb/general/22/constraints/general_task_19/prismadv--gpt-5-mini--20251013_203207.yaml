    - text: 'Meta_score (when present) should lie in a sensible score range, e.g.
        between 0 and 100 inclusive. Metascores are typically on a 0-100 scale and
        downstream consumers will expect bounded values. Represent as:

        .satisfies("CASE WHEN `Meta_score` IS NULL OR (`Meta_score` >= 0 AND `Meta_score`
