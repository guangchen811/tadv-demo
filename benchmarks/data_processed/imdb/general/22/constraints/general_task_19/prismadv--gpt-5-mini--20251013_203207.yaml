        end_line: 22
        file: ''
      - start_line: 40
        end_line: 41
        file: ''
      uid: 3ed0b048-1177-4ea5-bb40-e7ca515d9bcd
    - text: 'Runtime strings are parsed with a regex to extract minutes (runtime_min
        = Runtime.str.extract(r''(\d+)'')). The code then uses those minutes numerically
        to compute engagement. Therefore Runtime must contain a parseable positive
        integer number of minutes for each record used in scoring (e.g., ''123 min''
        or ''123''). Actionable constraint examples: runtime completeness and parsability:
        every Runtime should match the regex ''\\d+'' (.matchesRegex("Runtime", "\\\d+"))
        and extracted minutes > 0.'
      sources:
