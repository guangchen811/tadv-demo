    - text: "IMDB_Rating is converted to numeric and then normalized with a clip to\
        \ [0,1] (rating_score = (IMDB_Rating/10).clip(0,1)). For the quality gate\
        \ and scoring to be meaningful, IMDB_Rating must be numeric and expected to\
        \ lie in the typical 0\u201310 range (no extreme outliers). Actionable constraint\
        \ examples: .isComplete(\"IMDB_Rating\") (for records used in scoring) and\
        \ .isContainedInRange(\"IMDB_Rating\", minValue=0.0, maxValue=10.0). Also\
        \ ensure IMDB_Rating is numeric (no non-parsable strings)."
      sources:
      - start_line: 20
        end_line: 20
        file: ''
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      uid: 076db684-ea28-45e7-add9-19e200c4b751
    - text: 'No_of_Votes is converted to numeric, missing votes are filled with 0,
        and popularity is computed using log10(No_of_Votes.clip(lower=1)). Therefore
        No_of_Votes must be numeric and non-negative integers (>=0). Actionable constraint
        examples: .isComplete("No_of_Votes") or at least numeric parsable, and .isNonNegative("No_of_Votes");
        additionally, ensure integer semantics where appropriate (.isInteger("No_of_Votes")).'
      sources:
