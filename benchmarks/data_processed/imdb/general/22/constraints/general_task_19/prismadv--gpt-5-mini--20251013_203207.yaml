        IMDB_Rating / No_of_Votes), and simply includes it in the output. Represent
        as a Deequ-style constraint that all non-null values parse as numbers, e.g.:

        .satisfies("CASE WHEN `Meta_score` IS NULL OR `Meta_score` RLIKE ''^-?\\d+(\\.\\d+)?$''
        THEN 1 ELSE 0 END", "Meta_score_is_numeric_or_null", lambda x: x == 1)

