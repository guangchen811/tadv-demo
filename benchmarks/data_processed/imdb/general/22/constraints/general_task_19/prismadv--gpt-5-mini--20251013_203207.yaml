  IMDB_Rating:
    code: []
    assumptions:
    - text: 'The pair of columns [''Series_Title'', ''Released_Year''] is used as
        a unique key (set_index(..., verify_integrity=True)). Therefore the dataset
        must not contain duplicate (Series_Title, Released_Year) combinations and
        both fields should be present (non-null) for records considered in downstream
        processing. Actionable constraint examples: Deequ .isUnique(["Series_Title","Released_Year"])
        and require completeness on both columns (e.g., .hasCompleteness("Series_Title",
        1.0) and .hasCompleteness("Released_Year", 1.0) for rows intended to be indexed).'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 35
        end_line: 35
        file: ''
      uid: 77799b6c-f2a2-4a6a-a07b-7a382d6e68d1
    - text: "Scoring combines IMDB_Rating and No_of_Votes (rating_score and pop_score\
        \ are mixed in combined_score). For the score to be meaningful, IMDB_Rating\
        \ must be numeric and No_of_Votes must be a non-negative integer (or at least\
        \ present). In practice enforce: IMDB_Rating is numeric and within expected\
        \ bounds (0.0\u201310.0) and No_of_Votes is non-null and >= 0. Actionable\
        \ constraints: .hasCompleteness(\"IMDB_Rating\", threshold) and .hasCompleteness(\"\
        No_of_Votes\", threshold); .isNonNegative(\"No_of_Votes\"); and a range check\
        \ for IMDB_Rating such as .isContainedInRange(\"IMDB_Rating\", 0.0, 10.0)."
      sources:
      - start_line: 20
        end_line: 20
        file: ''
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 37
        end_line: 41
        file: ''
      - start_line: 79
        end_line: 81
        file: ''
      uid: 2f19835a-69bc-407b-9866-ca2b1fe24396
    - text: 'Released_Year is used to compute age and freshness (current_year - Released_Year).
        Released_Year must be a valid integer year (non-null) and should be <= current_year
        (no future release years) so that age computation is meaningful. Actionable
        constraints: .hasCompleteness("Released_Year", threshold) and conditional
        checks like all(rows where Released_Year IS NOT NULL) => Released_Year <=
        current_year.'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 24
        end_line: 24
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: 4923f5f3-8d12-40e2-9808-a4556a916754
    - text: 'Final selection (eligible_mask & quality_gate) produces results that
        are persisted. For records that are expected in the final output, Runtime
        must be parseable to an integer minute value because runtime_min is extracted
        and used to compute engagement. Enforce that for rows expected in final results
        Runtime contains at least one digit token parseable to int. Actionable constraint:
        a multi-column conditional such as for rows where (Certificate maps to suitability>0
        AND IMDB_Rating >= 6.5) then Runtime must match /\d+/ and be convertible to
        integer (or test with a custom predicate).'
      sources:
      - start_line: 46
        end_line: 46
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 97
        end_line: 98
        file: ''
      uid: 8189b370-6abe-41b8-94b1-2c78816dca95
    - text: 'Genre strings are parsed as comma-separated tokens and mapped to genre_weights
        to compute genre_pref, which then influences combined_score. Therefore Genre
        should contain comma-separated genre tokens (or be non-null) and tokens should
        mostly belong to the expected genre vocabulary (or accept defaults). Actionable
        checks: verify completeness of Genre for rows expected in scoring (.hasCompleteness("Genre",
        threshold)) and validate tokens with a containment check (e.g., assert most
        genre tokens are within the allowed set) or provide a custom UDF-based predicate
        that flags malformed genre values.'
      sources:
      - start_line: 58
        end_line: 66
        file: ''
      - start_line: 83
        end_line: 84
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: 74e2c1d8-85b5-4290-b5bc-08a9f4c557c2
  Certificate:
    code: []
    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' is used as
        a unique key (set as the DataFrame index with verify_integrity=True). Therefore
        these two columns must be non-null and unique as a pair across the dataset.
        Actionable checks: .isComplete([''Series_Title'',''Released_Year'']) and .isUnique([''Series_Title'',''Released_Year'']).'
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      uid: c898f27d-ba72-404b-a7cd-62843ba087e4
    - text: 'IMDB_Rating and No_of_Votes are used together to compute rating_score
        and pop_score. IMDB_Rating must be numeric and lie within [0, 10] so rating_score
        = IMDB_Rating/10 remains bounded; No_of_Votes must be numeric and >= 0 (integers)
        so log10(No_of_Votes.clip(lower=1)) is defined and meaningful. Actionable
        checks: .isBetween(''IMDB_Rating'', 0.0, 10.0) (or numeric completeness plus
        min/max bounds) and .isGreaterOrEqual(''No_of_Votes'', 0) and .hasDataType(''No_of_Votes'',''Integral'').'
      sources:
      - start_line: 19
        end_line: 23
        file: ''
      - start_line: 36
        end_line: 41
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      uid: eb7bb265-9d4c-42ea-93e6-0564cc6b9db9
    - text: 'Released_Year is used to compute age and freshness (current_year - Released_Year).
        Released_Year must be non-null and represent a numeric year not in the future
        (<= current_year) so age_years is non-negative and freshness behaves as intended.
        Actionable checks: .isComplete(''Released_Year'') and .isLessOrEqual(''Released_Year'',
        <current_year>) (substitute runtime current_year) and optionally a sensible
        lower bound check if desired (e.g., >= 1880).'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 24
        end_line: 24
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      - start_line: 34
        end_line: 35
        file: ''
      uid: fc5bd788-5092-4965-81c2-006cd63849c2
    - text: 'Certificate and IMDB_Rating jointly determine final eligibility (eligible_mask
        from Certificate -> suitability and quality_gate from IMDB_Rating >= 6.5).
        For records expected to pass the eligibility filter, Certificate.fillna(''Not
        Rated'') must map deterministically to a known cert_weights entry and that
        mapped suitability must be > 0 when the row should be considered eligible.
        Actionable checks: for rows where IMDB_Rating >= 6.5 assert Certificate.fillna(''Not
        Rated'') is in the set of cert_weights keys, and mapped weight > 0 (e.g.,
        enforce .isContainedIn(''Certificate'', {list_of_known_certs} ) after filling
        nulls).'
      sources:
      - start_line: 67
        end_line: 73
        file: ''
      - start_line: 74
        end_line: 76
        file: ''
      - start_line: 96
        end_line: 98
        file: ''
      uid: c2ed0a2b-f1eb-41e2-811c-54a64a467d9e
    - text: 'Runtime is parsed via a regex to extract an integer number of minutes
        and then used with other signals to compute engagement. Therefore Runtime
        should be present and contain an extractable integer minute value for rows
        that will be scored (i.e., Runtime non-null and matches ''\\d+'' in the string).
        Actionable checks: .isComplete(''Runtime'') (for required rows) and a regex-based
        check ensuring Runtime matches /.*(\d+).*/ or that the extracted runtime_min
