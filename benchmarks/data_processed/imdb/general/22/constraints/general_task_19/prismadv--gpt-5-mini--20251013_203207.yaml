    - text: 'Released_Year is treated as a numeric year and used to compute age relative
        to the current year (age = current_year - Released_Year). Therefore Released_Year
        must be a valid integer year (not null) and must not be in the future (Released_Year
        <= current_year). Actionable constraint examples: Released_Year completeness
        + range check like .isComplete("Released_Year") and .isNonNegative/ .isContainedInRange("Released_Year",
        minValue=1800, maxValue=current_year) or a predicate Released_Year <= current_year.'
      sources:
