    - text: 'Every row must have a non-null, non-empty Series_Title. The code sets
        Series_Title as part of the index (verify_integrity=True) and later resets
        and writes it out; missing or empty titles would break downstream semantics.
        Example deequ-style constraint: .satisfies(''CASE WHEN `Series_Title` IS NOT
        NULL AND trim(`Series_Title`) <> "" THEN 1 ELSE 0 END'', ''Non-null_and_non-empty_Series_Title'',
        lambda x: x == 1.0)'
      sources:
