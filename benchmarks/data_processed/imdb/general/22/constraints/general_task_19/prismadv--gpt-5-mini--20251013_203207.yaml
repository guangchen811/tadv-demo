  No_of_Votes:
    code: []
    assumptions:
    - text: 'The pair of columns [''Series_Title'', ''Released_Year''] is used as
        a unique key (df.set_index(..., verify_integrity=True)). Enforce that the
        combination is unique and both fields are present (non-null) for every record.
        Example Deequ constraints:

        .isUnique([''Series_Title'',''Released_Year''])

        .isComplete(''Series_Title'')

        .isComplete(''Released_Year'')'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: 599e7f0b-df4f-43cb-bbef-62908b52b35a
    - text: 'Released_Year is used together with Series_Title as an index and also
        used to compute age/freshness. Therefore Released_Year and Series_Title must
        both be complete (no nulls) and Released_Year should be a valid year (numeric).
        Example Deequ constraints:

        .isComplete(''Released_Year'')

        .isComplete(''Series_Title'')

        .satisfies(''Released_Year >= 1800 and Released_Year <= {current_year}'',
        ''released_year_in_reasonable_range'')'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: 1ffe9c25-f16a-41d4-a552-eca7aa707a2a
    - text: 'Scoring combines IMDB_Rating and No_of_Votes (rating_score and pop_score
        -> combined_score). For deterministic and meaningful scoring: IMDB_Rating
        must be numeric and within [0, 10], No_of_Votes must be a non-negative integer
        (>= 0). Also prefer both fields to be non-null for records intended to be
        scored. Example Deequ-style checks:

        .satisfies(''IMDB_Rating >= 0 and IMDB_Rating <= 10'', ''rating_in_0_10'')

        .satisfies(''No_of_Votes >= 0'', ''votes_non_negative'')

        .isComplete(''IMDB_Rating'')

        .isComplete(''No_of_Votes'')

        -- Or aggregated predicate for both columns:

        .satisfies(''IMDB_Rating between (0,10) AND No_of_Votes >= 0'', ''rating_and_votes_valid'')'
      sources:
      - start_line: 20
        end_line: 20
        file: ''
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 37
        end_line: 41
        file: ''
      - start_line: 79
        end_line: 85
        file: ''
      uid: 375cd524-0892-4345-96af-d65ca48d041f
    - text: 'Eligibility combines Certificate-derived suitability and IMDB_Rating
        (eligible_mask & quality_gate). For rows that should pass the eligibility
        filter, Certificate must be from the expected domain (no unexpected/unmapped
        values that would produce suitability <= 0) and IMDB_Rating must meet the
        quality threshold (>= 6.5). Example constraints:

        .isContainedIn(''Certificate'', [''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''Not
        Rated'',''Unrated'',''Passed'',''Approved''])

        .satisfies("IMDB_Rating >= 6.5 and Certificate != ''NC-17''", ''eligibility_predicate'')

        (Or use a combined predicate that encodes the mapping used to compute suitability.)'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 75
        file: ''
      - start_line: 96
        end_line: 98
        file: ''
      uid: 9c6d5653-f08f-48e0-b675-32b36f5bac98
  Released_Year:
    code: []
    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' is used as
        a unique key and therefore must be unique and non-null across all records.
        This can be enforced with constraints such as: .isUnique(["Series_Title",
        "Released_Year"]) and .isComplete(["Series_Title", "Released_Year"]).'
      sources:
      - start_line: 17
        end_line: 17
        file: ''
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 35
        end_line: 35
        file: ''
      uid: 533b6f05-326d-4799-a560-581d0d7ff47e
    - text: 'For records that pass the quality gate (IMDB_Rating >= 6.5), ''Released_Year''
        must be present and a valid year not in the distant future (i.e., Released_Year
        <= current_year). This is a conditional multi-column assumption linking IMDB_Rating
        and Released_Year and can be expressed as a filtered constraint, e.g.: .hasCompleteness("Released_Year",
        predicate = (row) -> row.IMDB_Rating >= 6.5) and .assert("Released_Year <=
        current_year", forRowsWhere(IMDB_Rating >= 6.5)).'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 24
        end_line: 24
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      uid: 57e390ea-72ee-4aa5-a0c2-e8e952b48cd9
    - text: 'Any row written out (final output) must have both ''Series_Title'' and
        ''Released_Year'' present because they are exported together and were used
        as the index. In other words, for all rows that will be persisted, both columns
        should be complete: .isComplete(["Series_Title", "Released_Year"]) (or a filtered
        completeness check for rows selected for output).'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      - start_line: 21
        end_line: 21
