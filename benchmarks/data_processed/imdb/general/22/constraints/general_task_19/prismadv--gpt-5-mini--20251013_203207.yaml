  Runtime:
    code: []
    assumptions:
    - text: 'The pair of columns [''Series_Title'', ''Released_Year''] is used as
        a unique key (set_index(..., verify_integrity=True)). Therefore the combination
        of Series_Title and Released_Year must be unique across the dataset. Actionable
        constraint (Deequ-style): .isUnique([''Series_Title'',''Released_Year'']).'
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      uid: eb92ab2f-4246-4dc4-a22d-f7800c421a20
    - text: 'Released_Year is normalized to an integer and then used as part of the
        index and in age/freshness calculations. Therefore Released_Year must be non-null
        (complete) and a valid numeric year for every row that will be indexed. Additionally
        it should be <= current_year (no future release years). Actionable constraints:
        ensure completeness and numeric range, e.g. .isComplete(''Released_Year''),
        .satisfies(''Released_Year <= {current_year}'') or equivalent expressions
        in your constraint language.'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: c3f48e87-1953-4227-9775-e26bda2fa001
    - text: 'The final eligibility filter keeps only rows where suitability > 0 (derived
        from Certificate) AND IMDB_Rating >= 6.5. Practically, rows that meet the
        quality gate (IMDB_Rating >= 6.5) are expected to have Certificates that map
        to positive suitability (i.e., not ''NC-17'', which maps to 0.0). Actionable
        conditional constraint (Deequ-style): ensure there are no rows violating (IMDB_Rating
        >= 6.5) -> (Certificate != ''NC-17'' AND Certificate IN the expected set).
        Example Deequ expression: .satisfies("IMDB_Rating < 6.5 OR Certificate !=
        ''NC-17''"). You can also enforce Certificate membership: .isContainedIn(''Certificate'',
        [...allowed certificate set...]).'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 96
        end_line: 98
        file: ''
      uid: 9cc9bcc3-551b-4436-a69c-163b9613c3fc
    - text: 'Runtime is parsed with a regex extract and cast to int before computing
        engagement. To avoid runtime exceptions and to ensure engagement is meaningful,
        Runtime must contain a numeric minute value for rows that will be scored/output.
        In particular, any row that passes the eligibility & quality filter (suitability>0
        and IMDB_Rating >= 6.5) should have a Runtime string containing digits (parseable).
        Actionable conditional constraint (Deequ-style): .satisfies("IMDB_Rating <
        6.5 OR Certificate = ''NC-17'' OR Runtime rlike ''\\d+''") or more strictly:
        .satisfies("(IMDB_Rating < 6.5) OR (Certificate = ''NC-17'') OR (Runtime rlike
        ''\\d+'')"). This enforces that rows considered for final output have parseable
        runtime minutes.'
      sources:
      - start_line: 46
        end_line: 46
        file: ''
      - start_line: 96
        end_line: 98
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: fc31cd31-f851-4964-a59f-bd04cef529bd
  '["Released_Year","Series_Title"]':
    code: []
    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' is used as
        the dataset''s unique key (set_index(..., verify_integrity=True)). Therefore
        the pair (Series_Title, Released_Year) must be unique across all records.
        This can be expressed as a Deequ constraint like: .isUnique([''Series_Title'',
        ''Released_Year'']).'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 17
        end_line: 21
        file: ''
      uid: d742bd56-a24e-4c70-9fb4-3eb79d580cba
    - text: 'Both ''Series_Title'' and ''Released_Year'' must be complete (no nulls)
        for every record because they are used as the index, later reset into columns,
        written to output, and ''Released_Year'' is used in arithmetic to compute
        age/freshness. Represent as a multi-column completeness constraint, e.g. Deequ:
        .isComplete([''Series_Title'',''Released_Year'']).'
      sources:
      - start_line: 21
        end_line: 44
        file: ''
      uid: 637fdcb7-9b05-4342-90c7-f0c6e47244c9
    - text: 'For every (Series_Title, Released_Year) record used in scoring, ''IMDB_Rating''
        and ''No_of_Votes'' must be numeric and valid: IMDB_Rating should be defined
        and within the expected range [0, 10]; No_of_Votes must be numeric and >=
        0. These are required because rating_score and pop_score perform numeric arithmetic
        (division, log10). Example Deequ constraints: .isComplete([''IMDB_Rating'',''No_of_Votes'']),
        .isContainedIn(''IMDB_Rating'', 0, 10) or .hasMax(''IMDB_Rating'', 10) & .hasMin(''IMDB_Rating'',
        0), and .isNonNegative(''No_of_Votes'').'
      sources:
      - start_line: 19
        end_line: 22
        file: ''
      - start_line: 37
        end_line: 41
        file: ''
      - start_line: 96
        end_line: 98
        file: ''
      uid: 482e60b4-49fd-42ea-a44e-5b91b0548735
    - text: 'For each (Series_Title, Released_Year) record that will be scored, fields
        used for other score components must be parseable / mappable: ''Runtime''
        must contain digits that can be extracted as minutes (regex ''\\d+''), ''Genre''
        should be a string parseable into comma-separated genres (or empty -> default
        weight), and ''Certificate'' must map to a known weight (or be null/empty
        and will be handled). Concretely, require a row-level predicate such as: Runtime
        rlike ''\\d+'' AND (Certificate in the mapping keys OR Certificate is null)
        AND Genre is not an invalid structure, so that runtime_min, genre_pref and
        suitability computations do not fail. This can be implemented as a Deequ isComplete/isMatch
        or custom row predicate.'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      - start_line: 58
        end_line: 66
        file: ''
      - start_line: 67
        end_line: 75
        file: ''
      - start_line: 79
        end_line: 85
        file: ''
      uid: 6a760fd0-8178-47c1-9ea2-cf5fe7f5c3f3
