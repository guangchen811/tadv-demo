    - text: 'The pair (Series_Title, Released_Year) must be unique across the input.
        The code calls df.set_index([''Series_Title'',''Released_Year''], verify_integrity=True),
        which will raise if duplicate key pairs exist. Example validation (logical
        form): ensure there are no duplicate rows when grouping by Series_Title and
        Released_Year. Example deequ-like check (expressed as a predicate): .satisfies(''CASE
        WHEN row_number() OVER (PARTITION BY `Series_Title`,`Released_Year`) = 1 THEN
        1 ELSE 0 END'', ''Unique_SeriesTitle_ReleasedYear'', lambda x: x == 1.0)'
