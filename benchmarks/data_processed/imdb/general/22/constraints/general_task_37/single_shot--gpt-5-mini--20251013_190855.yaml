constraints:
  CertificateNorm:
    code:
    - - .isComplete('CertificateNorm').isContainedIn('CertificateNorm', ['U','UA','A','G','PG','PG-13','R','NC-17','Not
        Rated','TV-14','TV-MA'])
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating').isGreaterThanOrEqual('IMDB_Rating', 0.0).isLessThanOrEqual('IMDB_Rating',
        10.0)
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - .hasDataType('Meta_score', 'Fractional')
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes').isNonNegative('No_of_Votes').hasDataType('No_of_Votes',
        'Integral')
      - Invalid
    assumptions: []
  Poster_CDN:
    code:
    - - .isComplete('Poster_CDN')
      - Invalid
    assumptions: []
  Poster_Link:
    code:
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year').hasDataType('Released_Year', 'Integral').isGreaterThanOrEqual('Released_Year',
        1880).isLessThanOrEqual('Released_Year', 2025)
      - Invalid
    assumptions: []
  RuntimeMinutes:
    code:
    - - .isComplete('RuntimeMinutes').isGreaterThan('RuntimeMinutes', 0)
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  catalog_id:
    code:
    - - .isComplete('catalog_id').isUnique('catalog_id')
      - Invalid
    assumptions: []
