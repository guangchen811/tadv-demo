constraints:
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda x: x <= 10)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^[0-9]{2,3} min$')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  Series_Title, Released_Year:
    code:
    - - '.hasUniqueness([''Series_Title'', ''Released_Year''], lambda x: x == 1.0)'
      - Valid
    assumptions: []
