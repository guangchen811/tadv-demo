    - text: 'Neither ''Series_Title'' nor ''Released_Year'' should contain the delimiter
        ''|'' used to build title_year_key. Because title_year_key is built as Series_Title
        + ''|'' + Released_Year, any existing ''|'' characters in those fields would
        make keys ambiguous and break reversibility/uniqueness assumptions. An actionable
        check: assert no value in Series_Title or Released_Year contains the ''|''
