constraints:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("CASE WHEN cast(IMDB_Rating as double) IS NULL OR (cast(IMDB_Rating
        as double) >= 0.0 AND cast(IMDB_Rating as double) <= 10.0) THEN 1 ELSE 0 END",
        "IMDB_Rating in [0,10] or null", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: b04359cf-198b-449e-a9a9-bbfb3be7a69b
      source_assumptions:
      - 88984dff-f520-436b-90dd-5d1929d0e07c
    - suggestion: '.satisfies("CASE WHEN cast(IMDB_Rating as double) IS NOT NULL THEN
        1 ELSE 0 END", "IMDB_Rating parseable as numeric (>=95%)", lambda x: x >=
        0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 398556cd-4c83-4031-905d-106263ca32d2
      source_assumptions:
      - 218bdf0d-22f8-49ba-84c5-41aa035d9bca
    assumptions:
    - text: 'IMDB_Rating values must be parseable as numeric (floats). The code calls
        pd.to_numeric(df[''IMDB_Rating''], errors=''coerce''), which will convert
        any non-numeric or malformed entries to NaN. To avoid data loss and unexpected
        NaNs in downstream calculations, the input IMDB_Rating column should contain
        numeric values or numeric-encoded strings (e.g., ''7.3''). This can be expressed
        as a validation rule like: proportion of rows where to_numeric(IMDB_Rating)
        IS NOT NULL should be high (for example >= 0.95).'
      sources:
      - start_line: 39
        end_line: 39
        file: ''
      uid: 218bdf0d-22f8-49ba-84c5-41aa035d9bca
    - text: 'There must be at least one (and preferably many) non-missing numeric
        IMDB_Rating values so that the mean (C = R.mean()) is defined and meaningful.
        If all values become NaN after coercion, C will be NaN and ranking/quality
        score behavior will be degraded. A corresponding validation: proportion of
        non-null IMDB_Rating after numeric coercion > 0 (or a stronger threshold if
        desired).'
      sources:
      - start_line: 43
        end_line: 46
        file: ''
      - start_line: 50
        end_line: 50
        file: ''
      uid: 2addfd57-f3b4-4e1e-893a-0654518ea80c
    - text: IMDB_Rating values should be on the expected IMDB scale (typically between
        0 and 10, inclusive). The code compares ratings to 7.0 to select top picks
        and uses the numeric ratings in weighted mean calculations, so out-of-range
        values (negative or >>10) will break the intended semantics. Validate that
        for all non-null ratings, 0.0 <= IMDB_Rating <= 10.0.
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      - start_line: 43
        end_line: 47
        file: ''
      uid: 88984dff-f520-436b-90dd-5d1929d0e07c
    - text: 'Not too many IMDB_Rating values should be coerced to NaN. While a small
        number of non-numeric values is tolerable (they will be treated as missing),
        a large fraction of missing/coerced ratings will reduce the reliability of
        the Bayesian weighting and the top-picks selection. A practical validation
        rule would be: proportion of numeric (non-null) IMDB_Rating after coercion
        >= 0.5 (or a stricter threshold such as >= 0.8) depending on business needs.'
      sources:
      - start_line: 39
        end_line: 39
        file: ''
      - start_line: 43
        end_line: 47
        file: ''
      uid: d7f87c34-585b-472e-bb87-2694cc284a9f
