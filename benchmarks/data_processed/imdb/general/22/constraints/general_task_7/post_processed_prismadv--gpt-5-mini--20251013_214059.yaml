      uid: 3bec04d6-6fdb-4209-bfed-c13bad2c81b7
    - text: 'The extracted numeric runtime (minutes) should be a positive integer
        in a reasonable range (e.g., >= 1). To avoid downstream surprises, you may
        also enforce an upper bound (for example <= 600) depending on business expectations.
        Example Deequ/GX style check on the input column (after regex extraction)
        expressed against derived minutes: .satisfies("CASE WHEN CAST(REGEXP_EXTRACT(`Runtime`,
        ''^\\s*(\\d+)\\s*min\\s*$'') AS INT) >= 1 AND CAST(REGEXP_EXTRACT(`Runtime`,
        ''^\\s*(\\d+)\\s*min\\s*$'') AS INT) <= 600 THEN 1 ELSE 0 END", "Runtime minutes
