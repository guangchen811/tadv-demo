        minutes followed by the literal ''min'' (optional surrounding whitespace).
        Concretely, every Runtime string should match the regex ^\s*(\d+)\s*min\s*$.
        This is required because the code uses str.extract(runtime_pattern)[0] and
        then .astype(int) and will fail if the pattern does not match. Example Deequ/GX
        style check: .satisfies("CASE WHEN `Runtime` RLIKE ''^\\s*(\\d+)\\s*min\\s*$''
        THEN 1 ELSE 0 END", "Runtime format (NNN min)", lambda x: x == 1)'
