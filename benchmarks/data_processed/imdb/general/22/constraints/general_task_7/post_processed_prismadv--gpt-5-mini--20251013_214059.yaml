    assumptions:
    - text: 'IMDB_Rating and No_of_Votes must be numeric and within expected ranges
        because they are used together to compute the Bayesian weighted rating (wr).
        Concretely: IMDB_Rating should be a finite numeric value in the range [0,
        10]; No_of_Votes should be a non-negative integer. Example constraints (Deequ-like
        / predicate form):

        - For all rows: IMDB_Rating IS NOT NULL AND IMDB_Rating >= 0 AND IMDB_Rating
        <= 10

        - For all rows: No_of_Votes IS NOT NULL AND No_of_Votes >= 0 AND floor(No_of_Votes)
        == No_of_Votes'
      sources:
      - start_line: 39
        end_line: 47
        file: ''
      uid: 4baf1e55-1a47-42a4-8816-48a9183edb89
    - text: "The 60th percentile (m) of No_of_Votes must be greater than zero. The\
        \ code computes m = quantile(votes, 0.60) and then uses votes/(votes + m)\
        \ as a denominator \u2014 if m == 0 and votes are 0 this will cause degenerate/invalid\
        \ weighting. Constraint (statistical): quantile(No_of_Votes, 0.60) > 0."
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      uid: d6e3c246-9ad6-4abe-a533-b99301a319cf
    - text: "Meta_score values, when present, should be on a 0\u2013100 scale so that\
        \ meta_scaled = Meta_score / 10.0 yields values comparable to IMDB_Rating\
        \ (expected ~0\u201310). Additionally, when Meta_score is null the code fills\
        \ meta_scaled with C (mean IMDB_Rating), so C should also be in the same [0,10]\
        \ range. Example constraints:\n- For all rows where Meta_score IS NOT NULL:\
        \ Meta_score >= 0 AND Meta_score <= 100\n- C = mean(IMDB_Rating) should satisfy\
        \ 0 <= C <= 10"
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      uid: e9cb828a-d620-4063-b849-1124c828d1e3
    - text: 'Any row that passes the IMDB_Rating >= 7.0 filter (i.e., is eligible
        for ''Top Picks'') must have a computed, finite quality_score and a valid
        No_of_Votes. Concretely: for all rows, (IMDB_Rating < 7.0) OR (quality_score
        IS NOT NULL AND isfinite(quality_score) AND No_of_Votes >= 0). This is required
        because the script sorts by quality_score and No_of_Votes to produce the final
        ranking.'
      sources:
      - start_line: 53
        end_line: 57
        file: ''
      uid: 9eb70958-6e45-433d-b822-5745c41f18ce
    - text: 'The combination of Series_Title and Released_Year (title_year_key) is
        expected to be unique (or at least treated as the stable identifier order-dependent)
        because catalog_id is assigned based on the enumerated title_year_key and
        later duplicates are dropped using title_year_key. Constraint: title_year_key
        must be unique (or the pair (Series_Title, Released_Year) must be unique).'
      sources:
      - start_line: 21
        end_line: 27
        file: ''
      uid: 6758ebd0-0082-4614-b25a-249854d337a5
