constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['U','G','PG','TV-PG','UA','PG-13','TV-14','R','TV-MA','NC-17','A','Not
        Rated','Unrated','Approved','Passed','U/A','GP'])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - .hasPattern('Gross', '^[0-9,]+$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isGreaterThanOrEqualTo('IMDB_Rating', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - .isGreaterThanOrEqualTo('Meta_score', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('Meta_score', 100.0)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', '^https?://')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isGreaterThanOrEqualTo('Released_Year', 1888)
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', 2025)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', '^[0-9]{2,3} min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
