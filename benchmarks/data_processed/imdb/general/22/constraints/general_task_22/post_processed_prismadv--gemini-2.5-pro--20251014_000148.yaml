    - text: 'The ''No_of_Votes'' column must contain non-negative values (>= 0). This
        is strongly implied by the `np.log1p` transformation on line 63, which is
        designed for non-negative inputs. Negative values would result in invalid
        outputs (`NaN` or `-inf`) for the ''pop_component'', corrupting the final
        ranking score. We could represent this assumption as a deequ constraint like
