        non-numeric values. The code calculates a quantile on this column (line 49),
        which requires at least one valid numeric value to avoid returning `NaN`.
        A substantial number of valid data points are necessary for the quantile to
        be a meaningful statistic for the Bayesian rating calculation. We could represent
        this assumption as a deequ constraint like this: .hasCompleteness("No_of_Votes",
        lambda c: c > 0)'
