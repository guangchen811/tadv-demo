        approximately 0 to 100. This is inferred because the code divides the score
        by 10.0 to normalize it to a 0-10 scale, making it comparable with 'IMDB_Rating'
        before they are combined into a 'quality_component'. Values outside this range
        would improperly weight the 'quality_component'.
