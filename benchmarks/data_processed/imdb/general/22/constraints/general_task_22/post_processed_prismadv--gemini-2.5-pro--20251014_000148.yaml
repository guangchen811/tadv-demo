        end_line: 52
        file: ''
      uid: 9e39c5ee-1b00-4e82-b8dc-2aae57ef72f1
    - text: 'When `Meta_score` is missing, its value is imputed using the corresponding
        `IMDB_Rating`. This assumes that `Meta_score` (on a 1-100 scale) and `IMDB_Rating`
        (on a 1-10 scale) are comparable measures of quality and are positively correlated.
        The logic relies on `Meta_score / 10.0` being a suitable proxy for `IMDB_Rating`.
        We could represent this assumption as a deequ constraint checking for a positive
        correlation between the two columns where both are present: `.correlation("Meta_score",
        "IMDB_Rating", _ > 0.3)`.'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: 535e8108-0a42-489c-9a0c-950efad67c87
    - text: 'The `Runtime` column is used to calculate a `runtime_factor` that adjusts
        the final `qa_pop_score`. This assumes that a movie''s runtime has an independent
        impact on its overall appeal, with an ideal runtime centered around 120 minutes.
        The final score is therefore a function of four columns: `Runtime`, `IMDB_Rating`,
        `No_of_Votes`, and `Meta_score`. This implies that two movies with identical
        ratings and vote counts but different runtimes will receive different final
        scores. A constraint could check that the `Runtime` column contains values
        in a format that can be parsed into minutes.'
      sources:
