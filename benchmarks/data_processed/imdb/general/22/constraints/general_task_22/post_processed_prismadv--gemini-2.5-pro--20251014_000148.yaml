        The code also scales `Meta_score` by dividing it by 10, suggesting that the
        values in `Meta_score` are expected to be roughly 10 times the values in `IMDB_Rating`.

        We could represent this assumption as a deequ constraint like this:

        .hasCorrelation("IMDB_Rating", "Meta_score_scaled", _ >= 0.5) where Meta_score_scaled
        is a derived column Meta_score / 10.'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      uid: 2141569f-d7c9-49f0-9707-35d967a66b06
    - text: 'The code calculates a `box_office_score` for movies that have `Gross`
        revenue data. This score combines the `Gross` value with the `qa_pop_score`,
        which is derived from `IMDB_Rating`, `No_of_Votes`, and `Runtime`. The code
        assumes that if a movie has a `Gross` value, it must also have the necessary
        data to compute a `qa_pop_score`. Otherwise, the `box_office_score` would
        be null, and the movie would be excluded from the box office carousel.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("Gross IS NOT NULL ==> (IMDB_Rating IS NOT NULL AND No_of_Votes
        IS NOT NULL AND Runtime IS NOT NULL)", "Gross implies non-null score inputs")'
      sources:
      - start_line: 125
        end_line: 129
        file: ''
      uid: 8d015e94-e4e7-4c9f-bfb3-a37b7a365657
