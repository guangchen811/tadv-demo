    assumptions:
    - text: 'The `IMDB_Rating` and `No_of_Votes` columns are combined to calculate
        a Bayesian average rating. This assumes that `No_of_Votes` reflects the confidence
        in the `IMDB_Rating`, where a higher vote count lends more weight to the item''s
        specific rating over the global average. This implies an expected relationship
        where movies with high `IMDB_Rating` also tend to have a sufficient `No_of_Votes`
        to be considered reliable. We could represent this assumption as a deequ constraint
        checking for a positive correlation between the two columns: `.correlation("IMDB_Rating",
