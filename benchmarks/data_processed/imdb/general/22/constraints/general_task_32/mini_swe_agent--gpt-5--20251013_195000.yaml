raw_constraints:
- column_name: Series_Title
  code_for_constraint: .isComplete('Series_Title')
- column_name: Poster_Link
  code_for_constraint: .isComplete('Poster_Link')
- column_name: Poster_Link
  code_for_constraint: .hasPattern('Poster_Link', '^https?://')
- column_name: IMDB_Rating
  code_for_constraint: .isComplete('IMDB_Rating')
- column_name: IMDB_Rating
  code_for_constraint: .isContainedInRange('IMDB_Rating', lowerBound=0.0, upperBound=10.0,
    includeLowerBound=True, includeUpperBound=True)
- column_name: No_of_Votes
  code_for_constraint: .isComplete('No_of_Votes')
- column_name: No_of_Votes
  code_for_constraint: .isNonNegative('No_of_Votes')
- column_name: Runtime
  code_for_constraint: .isComplete('Runtime')
- column_name: Runtime
  code_for_constraint: .hasPattern('Runtime', '\\d+')
- column_name: id
  code_for_constraint: .isUnique('id')
- column_name: Genre
  code_for_constraint: .isComplete('Genre')
