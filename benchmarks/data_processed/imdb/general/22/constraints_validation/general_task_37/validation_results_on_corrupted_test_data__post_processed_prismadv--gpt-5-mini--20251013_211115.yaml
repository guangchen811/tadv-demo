results:
  Star1:
    code:
    - suggestion: '.satisfies("CASE WHEN `Star1` IS NOT NULL AND trim(`Star1`) <>
        '''' THEN 1 ELSE 0 END", "Star1_non_empty_string", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasNumberOfDistinctValues(''Star1'', lambda x: x >= 400, None,
        1000)'
      status: false
      reason_if_failed: 'Constraint ''hasNumberOfDistinctValues(''Star1'', lambda
        x: x >= 400, None, 1000)'' failed on data sample: Value: 324 does not meet
        the constraint requirement!'
      level: warning
  Star2:
    code:
    - suggestion: .isComplete('Star2')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''Star2''], lambda x: x >= 0.7)'
      status: true
      reason_if_failed: ''
      level: warning
  Star3:
    code:
    - suggestion: .isComplete('Star3')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Star3` RLIKE "^[^\n\r\x00-\x1F]+$" THEN
        1 ELSE 0 END'', ''Star3 printable single-line'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Star4:
    code:
    - suggestion: '.satisfies(''CASE WHEN `Star4` IS NOT NULL AND length(trim(`Star4`))
        > 0 THEN 1 ELSE 0 END'', ''Star4_non_empty'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  IMDB_Rating:
    code:
    - suggestion: '.satisfies("CASE WHEN `IMDB_Rating` RLIKE ''^[0-9]+(\\.[0-9]+)?$''
        THEN 1 ELSE 0 END", "Parseable IMDB_Rating", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `IMDB_Rating` >= 0.0 AND `IMDB_Rating` <=
        10.0 THEN 1 ELSE 0 END", "IMDB_Rating_in_0_10", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
  Certificate:
    code:
    - suggestion: '.satisfies("CASE WHEN upper(trim(`Certificate`)) IN (''U'',''UA'',''U/A'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''NOT
        RATED'',''TV-14'',''TV-MA'') OR `Certificate` IS NULL OR trim(`Certificate`)
        = '''' THEN 1 ELSE 0 END", "Valid Certificates", lambda x: x >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Certificate` IN (''U/A'',''UA'') THEN 1
        ELSE 0 END", "Has UA or U/A", lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL OR REGEXP_LIKE(CAST(`Certificate`
        AS STRING), ''^[A-Za-z0-9/ -]+$'') THEN 1 ELSE 0 END", "CertificateFormat",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Director:
    code:
    - suggestion: '.satisfies("CASE WHEN `Director` IS NOT NULL OR true THEN 1 ELSE
        0 END", "Director column exists", lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Director` IS NOT NULL AND trim(`Director`)
        <> '''' THEN 1 ELSE 0 END", "Director non-empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: .isComplete('Genre')
      status: true
      reason_if_failed: ''
      level: error
  '["HybridRating","IMDB_Rating","MetaNorm","MetaNormFilled","Meta_score","No_of_Votes","WeightedRank"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `Meta_score` IS NULL AND (`IMDB_Rating` IS
        NULL OR `IMDB_Rating` = '''') THEN 0 ELSE 1 END", "If Meta_score is NULL then
        IMDB_Rating must be present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `IMDB_Rating` >= 7.0 THEN CASE WHEN `Series_Title`
        IS NOT NULL AND `Released_Year` IS NOT NULL AND `Released_Year` BETWEEN 1800
        AND 2100 THEN 1 ELSE 0 END ELSE 1 END", "Series_Title and Released_Year must
        be present and reasonable for final feed rows (IMDB_Rating>=7)", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `No_of_Votes` > 0 THEN 1 ELSE 0 END", "There
        must be some positive No_of_Votes (ensures quantile m>0 / avoids all-zero
        votes)", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Poster_Link:
    code:
    - suggestion: .isComplete('Poster_Link')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Poster_Link'', ''\\._V1_.+?\\.jpg'', lambda x: x
        >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Poster_Link'', ''^(https?://|/).*(\\.jpg|\\.jpeg|\\.png)$'',
        lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Meta_score` AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END", "Meta_score parseable as numeric", lambda x: x >= 0.85)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN TRY_CAST(`Meta_score` AS
        DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Meta_score parseable as numeric",
        lambda x: x >= 0.85)'' failed on data sample: Value: 0.8225 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Meta_score` IS NOT NULL THEN 1 ELSE 0 END",
        "Non-null Meta_score fraction", lambda x: x >= 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Meta_score` IS NULL OR (`Meta_score` >=
        0 AND `Meta_score` <= 100) THEN 1 ELSE 0 END", "Meta_score in 0-100", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  No_of_Votes:
    code:
    - suggestion: '.satisfies("CASE WHEN CAST(`No_of_Votes` AS DOUBLE) >= 0 THEN 1
        ELSE 0 END", "No_of_Votes_non_negative", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(`No_of_Votes` AS DOUBLE) = FLOOR(CAST(`No_of_Votes`
        AS DOUBLE)) THEN 1 ELSE 0 END", "No_of_Votes_integral", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxQuantile(''No_of_Votes'', 0.7, lambda q: q > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Overview:
    code:
    - suggestion: .isComplete('Overview')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN length(`Overview`) <= 2000 THEN 1 ELSE 0
        END'', ''Overview length <= 2000'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.satisfies("`Released_Year` RLIKE ''^[0-9]+$''", "Released_Year_all_digits",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Released_Year` BETWEEN 1800 AND 2025", "Released_Year_plausible_range",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: '.satisfies("CASE WHEN CAST(REGEXP_EXTRACT(`Runtime`, ''([0-9]+)'')
        AS INT) BETWEEN 1 AND 600 THEN 1 ELSE 0 END", "Runtime minutes in [1,600]",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN NOT(LOWER(`Runtime`) LIKE ''%h %'' OR LOWER(`Runtime`)
        LIKE ''%hr%'' OR LOWER(`Runtime`) LIKE ''%hour%'') THEN 1 ELSE 0 END", "Runtime
        likely minutes (no hour indicators)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Runtime","RuntimeMinutes"]':
    code:
    - suggestion: '.haveCompleteness(columns=[''Runtime''], assertion=lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.satisfies("CASE WHEN `Series_Title` RLIKE ''[A-Za-z0-9]'' THEN
        1 ELSE 0 END", "Series_Title has alphanumeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
