results:
  IMDB_Rating:
    code:
    - suggestion: '.satisfies(''CASE WHEN `IMDB_Rating` IS NULL OR CAST(`IMDB_Rating`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END'', ''IMDB_Rating is numeric or null'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''IMDB_Rating'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `IMDB_Rating` IS NULL OR (`IMDB_Rating`
        >= 0 AND `IMDB_Rating` <= 10) THEN 1 ELSE 0 END'', ''IMDB_Rating range [0,
        10]'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Certificate:
    code:
    - suggestion: '.satisfies("CASE WHEN `Certificate` IS NULL OR TRIM(`Certificate`)
        = '''' OR `Certificate` IN (''G'', ''PG'', ''PG-13'', ''R'', ''NC-17'', ''U'',
        ''UA'', ''A'', ''12'', ''12A'', ''15'', ''18'') THEN 1 ELSE 0 END", "Valid
        Certificate Values", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Certificate", lambda x: x >= 0.89)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("CASE WHEN `Certificate` = 'nan' THEN 0 ELSE 1 END",
        "Certificate Not NaN String")
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: '.hasCompleteness(''Genre'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''typeof(`Genre`) = "string"'', ''Genre is string'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''array_except(transform(split(trim(`Genre`), ","),
        x -> trim(x)), array("Action", "Adventure", "Animation", "Biography", "Comedy",
        "Crime", "Drama", "Family", "Fantasy", "Film-Noir", "History", "Horror", "Music",
        "Musical", "Mystery", "Romance", "Sci-Fi", "Sport", "Thriller", "War", "Western"))
        = array()'', ''Valid Genre Tokens'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''array_except(transform(split(trim(`Genre`),
        ","), x -> trim(x)), array("Action", "Adventure", "Animation", "Biography",
        "Comedy", "Crime", "Drama", "Family", "Fantasy", "Film-Noir", "History", "Horror",
        "Music", "Musical", "Mystery", "Romance", "Sci-Fi", "Sport", "Thriller", "War",
        "Western")) = array()'', ''Valid Genre Tokens'', lambda x: x >= 0.99)'' failed
        on data sample: Value: 0.92 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''length(trim(`Genre`)) > 0'', ''Non-empty Genre'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Gross:
    code:
    - suggestion: '.satisfies("`Gross` is NULL OR regexp_replace(`Gross`, '','', '''')
        rlike ''^[0-9]+(\.[0-9]+)?$''", "Non-null Gross values are numeric strings
        with optional commas", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Gross'', lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["IMDB_Rating","Meta_score","No_of_Votes","Runtime_Min","Score"]':
    code:
    - suggestion: '.haveCompleteness([''IMDB_Rating'', ''Meta_score'', ''No_of_Votes''],
        lambda x: x >= 0.85)'
      status: false
      reason_if_failed: 'Constraint ''haveCompleteness([''IMDB_Rating'', ''Meta_score'',
        ''No_of_Votes''], lambda x: x >= 0.85)'' failed on data sample: Value: 0.8225
        does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies('(`IMDB_Rating` IS NULL OR CAST(`IMDB_Rating` AS DOUBLE)
        IS NOT NULL) AND (`Meta_score` IS NULL OR CAST(`Meta_score` AS DOUBLE) IS
        NOT NULL) AND (`No_of_Votes` IS NULL OR CAST(`No_of_Votes` AS BIGINT) IS NOT
        NULL)', 'Numeric-castable ratings/votes')
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: '.containsURL(''Poster_Link'', assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''length(trim(`Poster_Link`)) = length(`Poster_Link`)
        AND length(`Poster_Link`) > 0'', ''Poster_Link has no leading/trailing whitespace
        and is non-empty'', assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Meta_score:
    code:
    - suggestion: '.hasCompleteness(''Meta_score'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Meta_score'', lambda x: x >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('(`Meta_score` >= 0 AND `Meta_score` <= 100) OR `Meta_score`
        IS NULL', 'Meta_score in [0,100] or NULL')
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.satisfies(''CAST(`No_of_Votes` AS BIGINT) IS NOT NULL'', ''No_of_Votes
        is integer parseable'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`No_of_Votes` >= 1'', ''No_of_Votes strictly positive'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''No_of_Votes'', lambda m: m < 10000000)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Poster_Link","Series_Title","Year"]':
    code:
    - suggestion: .satisfies('(`Poster_Link` IS NULL) OR (`Series_Title` IS NOT NULL
        AND TRIM(`Series_Title`) != "" AND `Released_Year` IS NOT NULL)', 'Poster_Link
        requires Series_Title and Released_Year')
      status: true
      reason_if_failed: ''
      level: error
  Released_Year:
    code:
    - suggestion: '.hasCompleteness(''Released_Year'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Released_Year')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(Released_Year AS INT) IS NOT NULL'', ''Released_Year
        is integer'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Runtime:
    code:
    - suggestion: .isComplete('Runtime')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .hasPattern('Runtime', r'^\d{2,3} min$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CAST(SPLIT(`Runtime`, " ")[0] AS INT) >= 10 AND CAST(SPLIT(`Runtime`,
        " ")[0] AS INT) <= 999', 'Runtime integer minutes between 10 and 999')
      status: true
      reason_if_failed: ''
      level: error
  '["Runtime","Runtime_Min"]':
    code:
    - suggestion: .satisfies("(Runtime IS NULL OR (CAST(REGEXP_EXTRACT(Runtime, '[0-9]+',
        0) AS INT) >= 40 AND CAST(REGEXP_EXTRACT(Runtime, '[0-9]+', 0) AS INT) <=
        300))", "Runtime in typical movie range")
      status: false
      reason_if_failed: 'Constraint ''satisfies("(Runtime IS NULL OR (CAST(REGEXP_EXTRACT(Runtime,
        ''[0-9]+'', 0) AS INT) >= 40 AND CAST(REGEXP_EXTRACT(Runtime, ''[0-9]+'',
        0) AS INT) <= 300))", "Runtime in typical movie range")'' failed on data sample:
        Value: 0.9975 does not meet the constraint requirement!'
      level: warning
  Series_Title:
    code:
    - suggestion: '.satisfies(''`Series_Title` = TRIM(`Series_Title`)'', ''Series_Title
        whitespace'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''LENGTH(TRIM(`Series_Title`)) > 0'', ''Series_Title
        not empty'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Series_Title","Year"]':
    code:
    - suggestion: '.haveCompleteness([''Series_Title''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
