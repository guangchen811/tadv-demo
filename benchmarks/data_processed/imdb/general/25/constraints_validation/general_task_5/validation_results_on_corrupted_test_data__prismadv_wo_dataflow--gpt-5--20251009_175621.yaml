results:
  IMDB_Rating:
    code:
    - suggestion: '.isNonNegative(''IMDB_Rating'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''IMDB_Rating <= 10'', ''IMDB_Rating<=10'', lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''IMDB_Rating'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Certificate:
    code:
    - suggestion: '.hasCompleteness(''Certificate'', lambda c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  Genre:
    code:
    - suggestion: '.satisfies("(`Genre` IS NOT NULL) AND (length(trim(`Genre`)) >
        0)", "Genre non-null and non-blank", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (lower(`Genre`) RLIKE ''(^|,)\\s*(nan|none|n/a)\\s*(,|$)'')",
        "No placeholder tokens in Genre", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("size(array_distinct(filter(transform(split(`Genre`,
        '',''), x -> trim(x)), x -> x <> ''''))) = size(filter(transform(split(`Genre`,
        '',''), x -> trim(x)), x -> x <> ''''))", "Genre tokens unique within row",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT (`Genre` RLIKE ''[;|/]'')", "Genre uses only commas
        as delimiters", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Gross:
    code:
    - suggestion: '.satisfies("CASE WHEN Gross IS NULL OR Gross = '''' THEN true WHEN
        regexp_replace(Gross, '','', '''') RLIKE ''^[0-9]+([.][0-9]+)?$'' THEN true
        ELSE false END", "Gross numeric-like after removing commas", lambda x: x >=
        0.8)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN Gross IS NULL OR Gross = '''' THEN true WHEN
        CAST(regexp_replace(Gross, '','', '''') AS DOUBLE) >= 0 THEN true ELSE false
        END", "Gross non-negative when present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("regexp_replace(Gross, '','', '''') RLIKE ''^[0-9]+([.][0-9]+)?$''",
        "At least one parseable Gross", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Poster_Link:
    code:
    - suggestion: '.satisfies("`Poster_Link` IS NOT NULL AND TRIM(`Poster_Link`) NOT
        IN ('''', ''nan'', ''NaN'', ''NULL'', ''null'', ''None'', ''none'')", "Poster_Link
        non-empty after trim", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(`Poster_Link`) RLIKE ''^(?i)https?://''", "Poster_Link
        absolute HTTP(S) URL", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("TRIM(`Poster_Link`) RLIKE ''^(?i)https?://''",
        "Poster_Link absolute HTTP(S) URL", lambda x: x == 1.0)'' failed on data sample:
        Value: 0.7325 does not meet the constraint requirement!'
      level: error
  Meta_score:
    code:
    - suggestion: '.satisfies("(`Meta_score` IS NULL) OR (CAST(`Meta_score` AS DOUBLE)
        IS NOT NULL)", "Meta_score numeric when present", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`Meta_score` IS NULL) OR (CAST(`Meta_score` AS DOUBLE)
        BETWEEN 0 AND 100)", "Meta_score range 0-100", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Meta_score` AS DOUBLE) IS NOT NULL", "At least
        one valid Meta_score exists", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Meta_score", lambda c: c >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Meta_score` IS NULL) OR (CAST(CAST(`Meta_score` AS
        DOUBLE) AS BIGINT) = CAST(`Meta_score` AS DOUBLE))", "Meta_score is integer-like
        when present", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
  No_of_Votes:
    code:
    - suggestion: '.hasCompleteness(''No_of_Votes'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`No_of_Votes` >= 1'', ''No_of_Votes lower bound'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Released_Year:
    code:
    - suggestion: '.hasCompleteness(''Released_Year'', lambda f: f >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(TRIM(`Released_Year`) AS INT) BETWEEN 1900 AND
        year(current_date())'', ''Released_Year plausible range'', lambda f: f ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Runtime:
    code:
    - suggestion: .isComplete("Runtime")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("Runtime IS NOT NULL AND TRIM(Runtime) <> ''''", "Runtime
        non-empty after trim", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("Runtime", "^[1-9]\\d{1,2} min$", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Series_Title:
    code:
    - suggestion: '.hasCompleteness(''Series_Title'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''length(trim(`Series_Title`)) > 0'', ''Non-empty Series_Title'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''lower(trim(`Series_Title`)) NOT IN (\''nan\'', \''na\'',
        \''null\'', \''none\'')'', ''No placeholder titles'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Released_Year'', ''Series_Title''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''lower(`Series_Title`) RLIKE \''[a-z0-9]\'''', ''Title
        has ASCII letter or digit'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
