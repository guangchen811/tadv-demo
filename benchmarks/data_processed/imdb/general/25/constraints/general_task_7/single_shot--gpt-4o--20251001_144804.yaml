constraints:
  Certificate:
    code:
    - - '.hasCompleteness(''Certificate'', lambda x: x >= 0.898)'
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasCompleteness(''Gross'', lambda x: x >= 0.828)'
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda x: x >= 0.856)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isContainedIn('Released_Year', range(1900, 2024))
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
