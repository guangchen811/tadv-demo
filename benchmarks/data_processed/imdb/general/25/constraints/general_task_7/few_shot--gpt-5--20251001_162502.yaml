constraints:
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - '.satisfies(''IMDB_Rating >= 7.0'', ''has_some_top_picks'', lambda v: v >
        0.0)'
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.hasMax(''Meta_score'', lambda v: v <= 100.0)'
      - Valid
    - - '.hasMin(''Meta_score'', lambda v: v >= 0.0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - '.containsPattern(''Poster_Link'', r''^https?://'', lambda v: v == 1.0)'
      - Invalid
    - - '.hasDistinctness([''Poster_Link''], lambda v: v >= 0.5)'
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - '.hasMax(''Released_Year'', lambda v: v <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - '.containsPattern(''Runtime'', r''^\s*\d+\s*min\s*$'', lambda v: v == 1.0)'
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  '[''Series_Title'', ''Released_Year'']':
    code:
    - - .isUnique(['Series_Title', 'Released_Year'])
      - Invalid
    assumptions: []
