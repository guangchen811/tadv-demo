constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['U', 'G', 'PG', 'TV-PG', 'UA', 'PG-13', 'TV-14',
        'R', 'TV-MA', 'NC-17', 'A', 'Not Rated', 'Unrated', 'Approved', 'Passed',
        'U/A', 'GP'])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .containsPattern('Genre', r'^[A-Za-z\\-]+(,\\s[A-Za-z\\-]+)*$')
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .compliesWith("Gross IS NULL OR Gross RLIKE '^[0-9,]+$'")
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isBetween('IMDB_Rating', 0.0, 10.0)
      - Invalid
    assumptions: []
  Meta_score:
    code:
    - - '.hasCompleteness(''Meta_score'', lambda x: x >= 0.85)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .containsPattern('Poster_Link', r'^https?://.+')
      - Invalid
    assumptions: []
  Released_Year:
    code:
    - - .isBetween('Released_Year', 1888, 2030)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .containsPattern('Runtime', r'^\\d{2,3} min$')
      - Invalid
    assumptions: []
  _SUCCESS:
    code:
    - - '.hasSize(lambda x: x > 0)'
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
