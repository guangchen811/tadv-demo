constraints:
  Certificate:
    code:
    - - .hasCompleteness('Certificate', 0.85)
      - Invalid
    - - .hasDataType('Certificate', ConstrainableDataTypes.String)
      - Invalid
    - - .isContainedIn('Certificate', ['U', 'UA', 'A', 'G', 'PG', 'PG-13', 'R', 'NC-17',
        'NOT RATED', 'UNRATED'])
      - Invalid
    assumptions: []
  Genre:
    code:
    - - .hasDataType('Genre', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - .hasCompleteness('Gross', 0.8)
      - Invalid
    - - .hasDataType('Gross', ConstrainableDataTypes.String)
      - Valid
    - - .hasPattern('Gross', r'^\d{1,3}(?:,\\d{3})*$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .hasDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .hasDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isPositive('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasDataType('Poster_Link', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    - - .isUnique('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .hasDataType('Released_Year', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    - - .isLessThanOrEqualTo('Released_Year', 2024)
      - Invalid
    - - .isNonNegative('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasDataType('Runtime', ConstrainableDataTypes.String)
      - Valid
    - - .hasPattern('Runtime', r'^\d+ min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .hasDataType('Series_Title', ConstrainableDataTypes.String)
      - Invalid
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
