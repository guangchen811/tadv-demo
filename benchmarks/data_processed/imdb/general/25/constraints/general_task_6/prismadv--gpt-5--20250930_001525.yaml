    - suggestion: '.satisfies("CASE WHEN CAST(`No_of_Votes` AS BIGINT) IS NOT NULL
        THEN CAST(`IMDB_Rating` AS DOUBLE) IS NOT NULL ELSE TRUE END", "Rating present
        when votes present", lambda x: x >= 0.90)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: c4822bb0-c787-4ffd-b866-7b7a292660dd
      source_assumptions:
