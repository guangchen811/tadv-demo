    assumptions:
    - text: 'Released_Year should be present (non-null) for almost all rows because
        it is used to compute recency and the final CompositeScore and is also exported
        as-is. Example validation: Deequ .hasCompleteness(''Released_Year'', lambda
        x: x >= 0.99) or Great Expectations expect_column_values_to_not_be_null with
        mostly=0.99.'
