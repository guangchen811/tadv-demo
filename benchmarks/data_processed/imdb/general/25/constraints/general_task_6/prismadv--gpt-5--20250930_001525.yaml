      - start_line: 54
        end_line: 55
        file: ''
      - start_line: 75
        end_line: 81
        file: ''
      - start_line: 102
        end_line: 105
        file: ''
      uid: ddabed77-2fe7-4e6f-9798-364561b52d12
    - text: 'Released_Year values should be a 4-digit year string after trimming and
        be castable to an integer for the vast majority of rows. This avoids NaNs
        in recency and CompositeScore. Example validation: Great Expectations expect_column_values_to_match_regex
        with regex ''^\s*\d{4}\s*$'' and mostly>=0.98, and/or Deequ .satisfies(''CAST(Released_Year
        AS INT) IS NOT NULL'', ''Released_Year numeric'', lambda x: x >= 0.98).'
      sources:
