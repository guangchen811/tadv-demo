        end_line: 33
        file: ''
      uid: 498d833f-4395-4e0c-bb48-e707e704eabd
    - text: 'Dedup priority invariant across Poster_Link, EligibleFamilyFriendly,
        and CompositeScore: For any Poster_Link group that contains at least one eligible
        row (EligibleFamilyFriendly = true), the retained record after sort+drop_duplicates
        must be the eligible row with the highest CompositeScore within that group.
        This can be validated by checking per Poster_Link that, if max(EligibleFamilyFriendly)
        = 1, then the row with max(CompositeScore) has EligibleFamilyFriendly = 1.
        This is a multi-column grouping constraint across Poster_Link, EligibleFamilyFriendly,
        and CompositeScore.'
