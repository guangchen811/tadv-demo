    - text: 'Correlation computability and sign between IMDB_Rating and No_of_Votes:
        There must be enough rows with both IMDB_Rating and No_of_Votes present and
        numeric to yield a finite, defined correlation, and the observed correlation
        should be non-negative (so the dynamic weighting remains in [0.20, 0.35] after
        clamping). Suggested Deequ: .hasCorrelation("IMDB_Rating","No_of_Votes", _
        >= 0.0) together with a joint completeness check: .compliance("IMDB_Rating
        IS NOT NULL AND No_of_Votes IS NOT NULL").'
      sources:
