        end_line: 108
        file: ''
      - start_line: 101
        end_line: 105
        file: ''
      uid: e03ff797-80f2-42f7-ad05-e2581ff5b7e1
    - text: 'IMDB_Rating should not be constant across the dataset; it should have
        variability so the correlation with No_of_Votes is meaningful. A rule could
        be: Deequ .hasStdDev("IMDB_Rating", lambda s: s > 0) or Great Expectations
        expect_column_stdev_to_be_between("IMDB_Rating", min_value=1e-12).'
      sources:
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 73
        file: ''
      uid: e530cc52-8e3f-450e-b20f-fbc3fcc8c563
    - text: 'Where No_of_Votes is present and numeric, IMDB_Rating should also be
        present and numeric on most rows (e.g., at least 90%) so that the correlation
        is computed on enough data after dropna. A conditional rule could be: Deequ
        .satisfies("CASE WHEN CAST(`No_of_Votes` AS BIGINT) IS NOT NULL THEN CAST(`IMDB_Rating`
        AS DOUBLE) IS NOT NULL ELSE TRUE END", "Rating present when votes present",
        lambda x: x >= 0.90).'
      sources:
