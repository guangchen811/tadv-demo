    - suggestion: '.hasPattern(''Runtime'', ''^[ ]*[0-9]+'', lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: d814e924-524e-4a92-a5a2-bdb6fd7055ea
      source_assumptions:
      - 73ec71ec-9f7e-463c-a78c-c3412eb3cb6f
    - suggestion: '.satisfies("regexp_extract(Runtime, ''^([0-9]+)'', 1) RLIKE ''^[1-9][0-9]*$''",
        ''Runtime positive minutes'', lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 6839c662-577b-4105-a08b-4f3d53bb4846
      source_assumptions:
      - 80c4ca2f-ce70-4f50-bf9f-c0267b96a994
    - suggestion: '.satisfies("NOT (Runtime RLIKE ''(h|:)'')", ''Runtime minutes-only
        format'', lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: e2ac97d3-cea4-4ae8-934a-3fb6655a6a92
      source_assumptions:
      - 38afec65-2ab0-422a-925d-07776e8ab0d5
    assumptions:
    - text: 'The ''Runtime'' column should be complete (no nulls). Missing or null
        values would turn the parsed minutes into NaN, making runtime_bonus NaN and
        thus CompositeScore NaN for those rows, which adversely affects ranking and
        output. Example validations: Deequ -> .hasCompleteness(''Runtime'', lambda
        x: x == 1.0); Great Expectations -> expect_column_values_to_not_be_null(''Runtime'').'
      sources:
      - start_line: 35
        end_line: 38
        file: ''
      - start_line: 75
        end_line: 81
        file: ''
      - start_line: 94
        end_line: 98
        file: ''
      uid: 097c234d-c33b-437f-bcdb-5dbf9e653fd3
    - text: 'The ''Runtime'' values should begin with an integer number of minutes
        at the very start of the string (e.g., ''142 min'', ''142''), so that the
        leading digits can be extracted and converted. At least 95% of rows should
        match this pattern to avoid NaNs in CompositeScore. Example validations: Deequ
        -> .hasPattern(''Runtime'', ''^\\s*\\d+'', lambda x: x >= 0.95); Great Expectations
        -> expect_column_values_to_match_regex(''Runtime'', ''^\s*\d+'', mostly=0.95).'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 75
        end_line: 81
        file: ''
      uid: 73ec71ec-9f7e-463c-a78c-c3412eb3cb6f
    - text: 'The extracted runtime in minutes should be a positive integer (>= 1).
        Example validations: Great Expectations -> expect_column_values_to_match_regex(''Runtime'',
        ''^\s*[1-9]\d*''); Deequ -> .satisfies("CASE WHEN regexp_extract(Runtime,
        ''^(\\d+)'', 1) != '''' AND CAST(regexp_extract(Runtime, ''^(\\d+)'', 1) AS
        INT) >= 1 THEN 1 ELSE 0 END", ''Runtime positive minutes'', lambda x: x >=
        0.95).'
      sources:
      - start_line: 36
        end_line: 38
        file: ''
      - start_line: 75
        end_line: 81
        file: ''
      uid: 80c4ca2f-ce70-4f50-bf9f-c0267b96a994
    - text: "The 'Runtime' should be expressed in minutes-only format (not hour-minute\
        \ strings like '2h 10m' or clock formats like '01:45'), because the code only\
        \ extracts leading digits as minutes. No more than 1\u20135% of rows should\
        \ contain such alternative formats. Example validations: Deequ -> .satisfies(\"\
        CASE WHEN Runtime RLIKE '(h|:)' THEN 0 ELSE 1 END\", 'Runtime minutes-only\
        \ format', lambda x: x >= 0.95); Great Expectations -> expect_column_values_to_not_match_regex('Runtime',\
        \ '(h|:)$', mostly=0.95)."
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 75
        end_line: 81
        file: ''
      uid: 38afec65-2ab0-422a-925d-07776e8ab0d5
