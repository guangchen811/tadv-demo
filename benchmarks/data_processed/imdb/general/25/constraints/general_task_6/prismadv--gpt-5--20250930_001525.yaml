        end_line: 22
        file: ''
      uid: 85c384d5-be02-4365-b73d-e5774f429328
    - text: 'Released_Year should not be in the future relative to the runtime current
        year; any future-dated values should be rare. Example validation: Deequ .satisfies(f''CAST(Released_Year
        AS INT) <= {datetime.now().year}'', ''No future years'', lambda x: x >= 0.99)
        or Great Expectations expect_column_values_to_be_between with max_value=current_year
        and mostly=0.99.'
