    assumptions:
    - text: 'IMDB_Rating must be numeric (castable to double) for all rows, because
        the code coerces it to numeric, divides it by 10, and uses it in correlation
        and scoring. A suitable rule could be: Deequ .satisfies("CAST(`IMDB_Rating`
        AS DOUBLE) IS NOT NULL", "IMDB_Rating numeric", lambda x: x == 1.0) or Great
        Expectations expect_column_values_to_be_of_type("IMDB_Rating", "float")/expect_column_values_to_be_between
        with parseable floats.'
      sources:
      - start_line: 25
        end_line: 26
        file: ''
      - start_line: 33
        end_line: 33
        file: ''
      - start_line: 75
        end_line: 81
        file: ''
      uid: cecdcda9-7c25-4236-b8d5-38e981ae53cc
    - text: 'IMDB_Rating values should lie within [0, 10] inclusive, so that rating_norm
        = IMDB_Rating/10 is in [0, 1] as assumed by the composite score. A suitable
        rule could be: Deequ .satisfies("`IMDB_Rating` >= 0 AND `IMDB_Rating` <= 10",
        "IMDB_Rating in [0,10]", lambda x: x == 1.0) or Great Expectations expect_column_values_to_be_between("IMDB_Rating",
        min_value=0, max_value=10, strict_min=False, strict_max=False).'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 75
        end_line: 81
        file: ''
      uid: 0551c39e-aa39-4038-9d5a-6771a22b2ad2
    - text: "For rows that are eligible for family-friendly ranking (Certificate in\
        \ {U, G, PG, PG-13, UA}), IMDB_Rating should be present and numeric (non-null\
        \ after cast), otherwise the CompositeScore becomes NaN and such rows won\u2019\
        t rank correctly or appear in the top 50 outputs. A conditional rule could\
        \ be: Deequ .satisfies(\"CASE WHEN UPPER(TRIM(`Certificate`)) IN ('U','G','PG','PG-13','UA')\
        \ THEN CAST(`IMDB_Rating` AS DOUBLE) IS NOT NULL ELSE TRUE END\", \"Rating\
        \ present for family-friendly rows\", lambda x: x == 1.0)."
      sources:
      - start_line: 83
        end_line: 86
        file: ''
      - start_line: 97
        end_line: 99
        file: ''
      - start_line: 75
        end_line: 81
        file: ''
