constraints:
  Certificate:
    code:
    - - '.isContainedIn(''Certificate'', [''U'',''UA'',''A'',''G'',''PG'',''PG-13'',''R'',''NC-17'',''NOT
        RATED'',''UNRATED''], lambda v: v >= 0.90)'
      - Valid
    assumptions: []
  Genre:
    code:
    - - .isComplete('Genre')
      - Valid
    assumptions: []
  Gross:
    code:
    - - '.hasPattern(''Gross'', r''^\d{1,3}(,\d{3})*$'', lambda v: v >= 0.95)'
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .hasDataType('IMDB_Rating', ConstrainableDataTypes.Fractional)
      - Valid
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  IMDB_Rating,No_of_Votes:
    code:
    - - '.hasCorrelation(''IMDB_Rating'', ''No_of_Votes'', lambda c: c >= -1.0 and
        c <= 1.0)'
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - .hasDataType('Meta_score', ConstrainableDataTypes.Fractional)
      - Valid
    - - '.hasMax(''Meta_score'', lambda v: v <= 100.0)'
      - Valid
    - - '.hasMin(''Meta_score'', lambda v: v >= 0.0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .hasDataType('No_of_Votes', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMin(''No_of_Votes'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('No_of_Votes')
      - Valid
    assumptions: []
  Overview:
    code:
    - - '.hasMinLength(''Overview'', lambda v: v >= 10)'
      - Valid
    - - .isComplete('Overview')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - '.hasMinLength(''Poster_Link'', lambda v: v >= 10)'
      - Valid
    - - .hasPattern('Poster_Link', r'^https?://')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .hasDataType('Released_Year', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Released_Year'', lambda v: v <= 2025)'
      - Valid
    - - '.hasMin(''Released_Year'', lambda v: v >= 1900)'
      - Valid
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', r'^\d+\s*min$')
      - Valid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - '.hasMinLength(''Series_Title'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMin(''id'', lambda v: v >= 0)'
      - Valid
    assumptions: []
