constraints:
  Certificate:
    code:
    - - '.hasCompleteness("Certificate", lambda x: x >= 0.87, "It should be above
        0.87!")'
      - Valid
    - - '.isContainedIn("Certificate", ["U", "UA", "A", "R", "PG", "PG-13"], lambda
        x: x >= 0.89, "It should be above 0.89!")'
      - Valid
    assumptions: []
  Director:
    code:
    - - .isComplete("Director")
      - Valid
    assumptions: []
  Genre:
    code:
