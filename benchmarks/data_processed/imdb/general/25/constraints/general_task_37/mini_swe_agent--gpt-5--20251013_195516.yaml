raw_constraints:
- column_name: Runtime
  code_for_constraint: .isComplete('Runtime')
- column_name: Runtime
  code_for_constraint: .hasPattern('Runtime', '^\s*\d+\s*min\s*$')
- column_name: IMDB_Rating
  code_for_constraint: '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
- column_name: IMDB_Rating
  code_for_constraint: '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
- column_name: No_of_Votes
  code_for_constraint: .isNonNegative('No_of_Votes')
- column_name: Released_Year
  code_for_constraint: .isComplete('Released_Year')
- column_name: Released_Year
  code_for_constraint: '.hasMin(''Released_Year'', lambda v: v >= 1900)'
- column_name: Released_Year
  code_for_constraint: '.hasMax(''Released_Year'', lambda v: v <= 2100)'
- column_name: Poster_Link
  code_for_constraint: .hasPattern('Poster_Link', '^https?://')
- column_name: Certificate
  code_for_constraint: .isContainedIn('Certificate', ['U', 'UA', 'U/A', 'A', 'G',
    'PG', 'PG-13', 'R', 'NC-17', 'Not Rated', 'TV-14', 'TV-MA'])
- column_name: Series_Title
  code_for_constraint: '.hasCompleteness(''Series_Title'', lambda r: r > 0.9)'
- column_name: Genre
  code_for_constraint: '.hasCompleteness(''Genre'', lambda r: r > 0.9)'
