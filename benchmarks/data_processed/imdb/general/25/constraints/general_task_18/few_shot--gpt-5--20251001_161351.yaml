constraints:
  Gross:
    code:
    - - '.satisfies("Gross IS NULL OR Gross RLIKE ''^[0-9][0-9,]*$''", ''gross_parseable'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  IMDB_Rating:
    code:
    - - '.hasMax(''IMDB_Rating'', lambda v: v <= 10.0)'
      - Valid
    - - '.hasMin(''IMDB_Rating'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('IMDB_Rating')
      - Valid
    assumptions: []
  IMDB_Rating,Meta_score:
    code:
    - - '.hasCorrelation(''IMDB_Rating'', ''Meta_score'', lambda r: r >= -1.0 and
        r <= 1.0)'
      - Valid
    assumptions: []
  Meta_score:
    code:
    - - '.satisfies(''Meta_score IS NULL OR (Meta_score >= 0 AND Meta_score <= 100)'',
        ''meta_score_range'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    assumptions: []
  Runtime:
    code:
    - - '.containsPattern(''Runtime'', r''^\s*\d{2,3}\s*min\s*$'', lambda v: v ==
        1.0)'
      - Invalid
    - - .isComplete('Runtime')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  '[''Series_Title'',''Released_Year'']':
    code:
    - - .isUnique(['Series_Title', 'Released_Year'])
      - Invalid
    assumptions: []
