constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['U','UA','A','G','PG','PG-13','R','NC-17','NOT
        RATED','UNRATED'])
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isGreaterThanOrEqualTo('IMDB_Rating', 0)
      - Invalid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10)
      - Invalid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isLessThanOrEqualTo('Released_Year', 2025)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', '^[0-9]+')
      - Valid
    assumptions: []
