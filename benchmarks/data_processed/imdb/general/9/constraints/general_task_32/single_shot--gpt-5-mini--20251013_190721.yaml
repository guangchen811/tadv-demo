constraints:
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isLessThanOrEqualTo('IMDB_Rating', 10.0)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .matchesRegex('Poster_Link', r'^(http|https)://')
      - Invalid
    assumptions: []
  Released_Year:
    code:
    - - .isGreaterThanOrEqualTo('Released_Year', 1880)
      - Invalid
    - - .isLessThanOrEqualTo('Released_Year', 2100)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .matchesRegex('Runtime', r'\d+')
      - Invalid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
