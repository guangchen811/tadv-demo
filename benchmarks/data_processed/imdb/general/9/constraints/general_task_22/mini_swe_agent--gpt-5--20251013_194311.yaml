raw_constraints:
- column_name: Series_Title
  code_for_constraint: .isComplete('Series_Title')
- column_name: IMDB_Rating
  code_for_constraint: .isComplete('IMDB_Rating')
- column_name: IMDB_Rating
  code_for_constraint: '.hasMin(''IMDB_Rating'', lambda x: x >= 0)'
- column_name: IMDB_Rating
  code_for_constraint: '.hasMax(''IMDB_Rating'', lambda x: x <= 10)'
- column_name: No_of_Votes
  code_for_constraint: .isComplete('No_of_Votes')
- column_name: No_of_Votes
  code_for_constraint: .isNonNegative('No_of_Votes')
- column_name: Runtime
  code_for_constraint: .isComplete('Runtime')
- column_name: Runtime
  code_for_constraint: .containsPattern('Runtime', '^[0-9]{2,3} ?min$')
- column_name: Genre
  code_for_constraint: .isComplete('Genre')
- column_name: Meta_score
  code_for_constraint: .satisfies("Meta_score IS NULL OR (Meta_score >= 0 AND Meta_score
    <= 100)", 'meta_score_range')
- column_name: Released_Year
  code_for_constraint: .satisfies("Released_Year IS NULL OR (Released_Year >= 1900
    AND Released_Year <= 2025)", 'released_year_range')
- column_name: Certificate
  code_for_constraint: .satisfies("Certificate IS NULL OR Certificate IN ('U','G','PG','TV-PG','UA','PG-13','TV-14','R','TV-MA','NC-17','A','Not
    Rated','Unrated','Approved','Passed','U/A','GP')", 'certificate_values')
- column_name: Poster_Link
  code_for_constraint: .satisfies("Poster_Link IS NULL OR Poster_Link RLIKE '^https?://'",
    'poster_link_format')
- column_name: Gross
  code_for_constraint: .satisfies("Gross IS NULL OR Gross RLIKE '^\\d{1,3}(,\\d{3})*$'",
    'gross_format')
