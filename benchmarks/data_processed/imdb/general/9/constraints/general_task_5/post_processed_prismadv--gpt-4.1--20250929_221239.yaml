      uid: 08bc365d-f639-4ddb-ab82-4af0207aec1d
    - text: 'When sorting within each (Decade_Label, GenreToken) group, ranking is
        determined first by ''Score'' (descending), then by ''Gross_Tie'' (descending)
        as a tie-breaker. This assumes that for any records sharing the same ''Decade_Label'',
        ''GenreToken'', and ''Score'', the ''Gross_Tie'' values are sufficient to
        establish a unique rank and avoid ties. This can be encoded as: For each (Decade_Label,
        GenreToken), the tuple (Score, Gross_Tie) should be unique, or at least sufficient
        to break ties in ranking.'
      sources:
      - start_line: 162
        end_line: 165
        file: ''
      uid: 52bd92df-8e1d-4f2e-ab14-00978a315fb2
    - text: 'The ''Score'' column is calculated from ''IMDB_Rating'', ''Meta_score'',
        and ''No_of_Votes'', and further adjusted by ''Runtime_Min''. Therefore, for
        any record, if ''Score'' is not null, then ''IMDB_Rating'', ''Meta_score'',
        ''No_of_Votes'', and ''Runtime_Min'' must also be present and valid (i.e.,
        not null and within valid ranges). This can be formalized as: .where(''Score
        IS NOT NULL'', ''IMDB_Rating IS NOT NULL AND Meta_score IS NOT NULL AND No_of_Votes
        IS NOT NULL AND Runtime_Min IS NOT NULL'')'
      sources:
      - start_line: 139
        end_line: 148
        file: ''
      uid: 01a4455c-2c0e-4e5c-bf2c-34cc14a47e23
    - text: 'For any output row, the combination of (''Decade_Label'', ''GenreToken'',
        ''Series_Title'', ''Year'') should be unique, ensuring that the same film
        does not appear more than once in the same leaderboard group. This can be
        enforced as: .isUnique([''Decade_Label'', ''GenreToken'', ''Series_Title'',
        ''Year''])'
      sources:
      - start_line: 172
        end_line: 176
        file: ''
      - start_line: 184
        end_line: 200
        file: ''
      uid: 9a713336-085c-4c9d-9556-68e366887a88
