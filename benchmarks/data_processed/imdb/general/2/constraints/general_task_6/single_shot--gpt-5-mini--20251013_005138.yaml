constraints:
  Certificate:
    code:
    - - .isContainedIn('Certificate', ['U','G','PG','PG-13','UA','A','R','NC-17','NOT
        RATED','UNRATED'])
      - Invalid
    assumptions: []
  Gross:
    code:
    - - .hasPattern('Gross', '^\\s*$|^\\d{1,3}(,\\d{3})*$')
      - Invalid
    assumptions: []
  IMDB_Rating:
    code:
    - - .isComplete('IMDB_Rating')
      - Valid
    - - .isLessThan('IMDB_Rating', 10.001)
      - Invalid
    - - .isNonNegative('IMDB_Rating')
      - Valid
    assumptions: []
  No_of_Votes:
    code:
    - - .isComplete('No_of_Votes')
      - Valid
    - - .isNonNegative('No_of_Votes')
      - Valid
    assumptions: []
  Poster_Link:
    code:
    - - .hasPattern('Poster_Link', '^(http|https)://')
      - Valid
    - - .isComplete('Poster_Link')
      - Valid
    assumptions: []
  Released_Year:
    code:
    - - .isComplete('Released_Year')
      - Valid
    - - .isGreaterThan('Released_Year', 1887)
      - Invalid
    - - .isLessThan('Released_Year', 2100)
      - Invalid
    assumptions: []
  Runtime:
    code:
    - - .hasPattern('Runtime', '^\\s*\\d+')
      - Valid
    assumptions: []
  Series_Title:
    code:
    - - .isComplete('Series_Title')
      - Valid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
