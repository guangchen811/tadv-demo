  '["Released_Year","Series_Title"]':
    code: []
    assumptions:
    - text: 'The combination of ''Series_Title'' and ''Released_Year'' must be unique
        across all records so that the generated slug/title-year HTML id is unique
        and there are no duplicate cards. This can be represented as a uniqueness
        constraint like: isUnique(["Series_Title", "Released_Year"]).'
      sources:
      - start_line: 31
        end_line: 37
        file: ''
      - start_line: 96
        end_line: 105
        file: ''
      uid: 5ba8c6ef-3ed7-422d-bc29-7df8ea1e0277
    - text: 'Released_Year must be a 4-digit year and be consistent with derived fields:
        Year = int(Released_Year), Decade = floor(Year/10)*10, and Decade_Label =
        concat(string(Decade), ''s''). These can be enforced with compliance constraints
        such as: Released_Year rlike ''^[0-9]{4}$''; cast(Released_Year as int) =
        Year; concat(cast(floor(Year/10)*10 as string), ''s'') = Decade_Label.'
      sources:
      - start_line: 96
        end_line: 105
        file: ''
      uid: 0c1a681c-e3f6-4b2f-98a8-80d26f2ba0ad
    - text: 'Within each (Decade_Label, GenreToken) group, Rank must be unique and
        limited to TOP_K (10). This can be represented as: isUnique(["Decade_Label",
        "GenreToken", "Rank"]) and a compliance constraint Rank >= 1 and Rank <= 10.'
      sources:
      - start_line: 161
        end_line: 168
        file: ''
      uid: fc478b09-83ea-4d5c-ba77-00d7660d1d7d
    - text: 'Tie-breaking behavior: Within each (Decade_Label, GenreToken) group,
        records are ordered by Score desc and then Gross_Tie desc before assigning
        Rank; therefore, for any two rows with equal Score, the one with higher Gross_Tie
        must not receive a higher (worse) Rank. This can be validated by checking,
        per group, that whenever Score values are equal, Rank order is non-increasing
        with Gross_Tie.'
      sources:
      - start_line: 150
        end_line: 156
        file: ''
      - start_line: 161
        end_line: 165
        file: ''
      uid: 62b3696a-7700-4e82-bdfc-598e542f0042
    - text: 'Content policy constraint between Genre and Certificate: If a movie is
        tagged with Family or Animation in GenreToken, then Certificate must not be
        in {R, NC-17}. This can be represented as a conditional compliance constraint:
        CASE WHEN GenreToken IN (''Family'',''Animation'') THEN Certificate NOT IN
        (''R'',''NC-17'') ELSE true END.'
      sources:
      - start_line: 124
        end_line: 130
        file: ''
      - start_line: 131
        end_line: 136
        file: ''
      uid: cb154a8d-c48f-4937-a3eb-d7092f5bf6f7
  '["Runtime","Runtime_Min"]':
    code: []
    assumptions:
    - text: "Runtime must follow the pattern '<2\u20133 digits> min' and Runtime_Min\
        \ must equal the integer minutes parsed from Runtime (no nulls). Representable\
        \ as Deequ constraints: .hasPattern('Runtime', '^\\d{2,3} min$') and .satisfies(\"\
        Runtime_Min = CAST(regexp_extract(Runtime, '(\\\\d{2,3})', 1) AS INT)\", 'Runtime_Min\
        \ matches Runtime') and .isComplete('Runtime_Min')."
      sources:
      - start_line: 1108
        end_line: 1111
        file: ''
      uid: 8ce5c8bd-f99a-4bae-8f82-d930da6ee797
    - text: 'Released_Year must be exactly 4 digits and Year must equal CAST(Released_Year
        AS INT) for all retained rows. Representable as: .hasPattern(''Released_Year'',''^\d{4}$'')
        and .satisfies(''Year = CAST(Released_Year AS INT)'', ''Year matches Released_Year'').'
      sources:
      - start_line: 1097
        end_line: 1105
        file: ''
      uid: 9992bb50-0adb-4f50-b64e-3e3580ec4fc3
    - text: 'Decade and Decade_Label must be consistent with Year: Decade = floor(Year/10)*10
        and Decade_Label = concat(Decade, ''s''). Representable as: .satisfies(''Decade
        = (Year DIV 10) * 10'', ''Decade from Year'') and .satisfies("Decade_Label
        = concat(CAST(Decade AS STRING), ''s'')", ''Decade_Label from Decade'').'
      sources:
      - start_line: 1104
        end_line: 1105
        file: ''
      uid: 33dab22e-b5d6-4566-a598-206302299459
    - text: 'The pair (Series_Title, Year) should be unique across the dataset to
        avoid duplicate HTML ids derived from the slug. Representable as: .isUnique([''Series_Title'',''Year'']).'
      sources:
      - start_line: 1031
        end_line: 1039
        file: ''
      uid: 3e5c4394-19a4-4887-835c-4f6b578e7d47
    - text: 'Within each (Decade_Label, GenreToken) group, Rank values must be unique,
        and in the top_k output Rank must be between 1 and 10 inclusive. Representable
        as: .isUnique([''Decade_Label'',''GenreToken'',''Rank'']) on top_k and .satisfies(''Rank
        >= 1 AND Rank <= 10'', ''Rank range in top_k'').'
      sources:
      - start_line: 1161
        end_line: 1168
        file: ''
      uid: 4052e2be-1d8b-4c01-937d-89d9ac1fb27e
    - text: 'Content-policy constraint: if GenreToken is ''Family'' or ''Animation'',
        Certificate must not be ''R'' or ''NC-17''. Representable as: .satisfies("(GenreToken
        NOT IN (''Family'',''Animation'')) OR (Certificate NOT IN (''R'',''NC-17''))",
        ''Family/Animation not R/NC-17'').'
      sources:
      - start_line: 1131
        end_line: 1135
        file: ''
      - start_line: 1158
        end_line: 1160
        file: ''
      uid: 5599e250-abd2-4ecb-b089-ef667c76c0a9
    - text: "Gross_Tie must be consistent with Gross_Num: if any Gross_Num is non-null,\
        \ then for all rows Gross_Tie = log1p(coalesce(Gross_Num, median(Gross_Num)))/max(log1p(coalesce(Gross_Num,\
        \ median(Gross_Num)))) \u2208 [0,1]; otherwise, Gross_Tie must equal 0.0 for\
        \ all rows. Representable as: when df['Gross_Num'].notna().any() => .satisfies('Gross_Tie\
        \ >= 0 AND Gross_Tie <= 1', 'Gross_Tie normalized'); else => .satisfies('Gross_Tie\
        \ = 0.0', 'Gross_Tie fallback when no Gross')."
      sources:
      - start_line: 1150
        end_line: 1156
        file: ''
      uid: ab91fbb2-28bd-4391-8f72-3766db1f0753
    - text: 'Score depends on Runtime_Min via a pacing factor; therefore, for all
        rows Score must be defined only when Runtime_Min is defined. Representable
        as: .satisfies(''Runtime_Min IS NOT NULL OR Score IS NULL'', ''Score present
        only when Runtime_Min present'').'
      sources:
      - start_line: 1143
        end_line: 1149
        file: ''
      uid: e0e53aff-ae8c-480d-9499-b375bbc5aef8
