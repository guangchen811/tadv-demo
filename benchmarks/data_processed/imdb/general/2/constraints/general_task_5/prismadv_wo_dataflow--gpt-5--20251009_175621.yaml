      - 19a8b1a0-95b2-4c98-832f-be7897f81adc
    - suggestion: '.satisfies("NOT (`Genre` RLIKE ''[;|/]'')", "Genre uses only commas
        as delimiters", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 676bb4f6-a839-45d2-a235-486af6c00400
      source_assumptions:
      - 7f004436-348c-4946-89a8-2086a0a0cac6
    assumptions:
    - text: 'The ''Genre'' column must be a comma-separated list of one or more canonical
        genres from the fixed allowed set: {Action, Adventure, Animation, Biography,
        Comedy, Crime, Drama, Family, Fantasy, Film-Noir, History, Horror, Music,
        Musical, Mystery, Romance, Sci-Fi, Sport, Thriller, War, Western}. Tokens
        must match exactly (case- and hyphen-sensitive). This can be validated with
        a regex that enforces only these tokens and comma separators, for example
        (Great Expectations): expect_column_values_to_match_regex with pattern ''^\s*(Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western)\s*(,\s*(Action|Adventure|Animation|Biography|Comedy|Crime|Drama|Family|Fantasy|Film-Noir|History|Horror|Music|Musical|Mystery|Romance|Sci-Fi|Sport|Thriller|War|Western)\s*)*$''.'
      sources:
      - start_line: 124
        end_line: 127
        file: ''
      - start_line: 128
        end_line: 130
        file: ''
      uid: a297c6ef-8cd7-4852-bfab-077d6a3e095e
    - text: 'The ''Genre'' column should be non-null and not blank after trimming,
        and it must contain at least one token; otherwise the row will drop out of
        the leaderboards after explode/groupby. This can be represented as: Deequ
        .satisfies("CASE WHEN trim(`Genre`) <> '''' THEN 1 ELSE 0 END", "Genre non-blank",
        lambda x: x == 1.0) or Great Expectations expect_column_values_to_not_match_regex_list
        with [''^\s*$''].'
      sources:
      - start_line: 93
        end_line: 95
        file: ''
      - start_line: 128
        end_line: 130
        file: ''
      - start_line: 158
        end_line: 165
        file: ''
      uid: e070af41-49b3-4cbb-847a-b9676e2264d9
    - text: 'Placeholder strings representing missing values must not appear in ''Genre''
        (e.g., ''nan'', ''NaN'', ''None'', ''N/A'', case-insensitive). Because the
        code casts to string before splitting, such placeholders would be treated
        as actual genre tokens and leak into groupings. This can be validated with
        Deequ .satisfies("CASE WHEN lower(trim(`Genre`)) IN (''nan'',''none'',''n/a'')
        THEN 0 ELSE 1 END", "No placeholder in Genre", lambda x: x == 1.0) or Great
        Expectations expect_column_values_to_not_match_regex ''^\s*(?i:(nan|none|n/a))\s*$''.'
      sources:
      - start_line: 93
        end_line: 95
        file: ''
      - start_line: 128
        end_line: 130
        file: ''
      uid: ab6d90ef-1580-41b8-94ec-7d18731eadfb
    - text: 'Within each row, ''Genre'' tokens should be unique after trimming (no
        duplicates like ''Drama, Drama''). Duplicates would create duplicate exploded
        rows and can distort ranking. This can be enforced with a custom check such
        as Deequ .satisfies("size(array_distinct(transform(split(`Genre`, '',''),
        x -> trim(x)))) = size(filter(transform(split(`Genre`, '',''), x -> trim(x)),
        x -> x <> ''''))", "No duplicate genre tokens", lambda x: x == 1.0) or a Great
        Expectations custom expectation on split('','').'
      sources:
      - start_line: 128
        end_line: 130
        file: ''
      - start_line: 158
        end_line: 165
        file: ''
      uid: 19a8b1a0-95b2-4c98-832f-be7897f81adc
    - text: Only commas should be used as delimiters between genres; other separators
        such as semicolons, pipes, or slashes are not expected. Values should follow
        the pattern '<Genre>(, <Genre>)*'. This can be validated with Great Expectations
        expect_column_values_to_not_match_regex '[/;|]' or by enforcing the full allowed-token
        comma-list regex in Assumption 1.
      sources:
      - start_line: 128
        end_line: 130
        file: ''
      uid: 7f004436-348c-4946-89a8-2086a0a0cac6
  Gross:
    code:
    - suggestion: .hasColumn('Gross')
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''.hasColumn(''Gross'')'':
        ''Check'' object has no attribute ''hasColumn'''
      level: error
      uid: 633b316e-42a6-40db-9052-1db1eafda9b6
      source_assumptions:
      - f2f928af-9b16-4b11-8ef3-19f7d4fa1553
    - suggestion: '.satisfies("CASE WHEN Gross IS NULL OR Gross = '''' THEN true WHEN
        regexp_replace(Gross, '','', '''') RLIKE ''^[0-9]+([.][0-9]+)?$'' THEN true
        ELSE false END", "Gross numeric-like after removing commas", lambda x: x >=
        0.8)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: e9ddf371-f6db-41f4-9878-6065c335bcb0
      source_assumptions:
      - c025427c-5f7e-4b8e-a4dd-db131d5b0ee8
    - suggestion: '.satisfies("CASE WHEN Gross IS NULL OR Gross = '''' THEN true WHEN
        CAST(regexp_replace(Gross, '','', '''') AS DOUBLE) >= 0 THEN true ELSE false
        END", "Gross non-negative when present", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: b2da9ea6-b53f-4c11-8847-2331c8747bbc
      source_assumptions:
      - 5b44712a-f06e-47cf-9568-683627886f91
    - suggestion: '.satisfies("regexp_replace(Gross, '','', '''') RLIKE ''^[0-9]+([.][0-9]+)?$''",
        "At least one parseable Gross", lambda x: x > 0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: e207ab95-6cf7-49a5-9be9-78daa298ed7f
      source_assumptions:
      - d67e6410-ab8e-4acc-a91d-38f6b7a6a85a
    assumptions:
    - text: 'The input must contain a ''Gross'' column because it is parsed and used
        to compute a numeric tie-breaker (''Gross_Num'' and ''Gross_Tie''). If the
        column is missing, the script will fail. This can be represented as a schema
        check such as: expect_table_columns_to_match_set including ''Gross'', or Deequ
        hasColumn(''Gross'').'
      sources:
      - start_line: 119
        end_line: 122
        file: ''
      - start_line: 151
        end_line: 157
        file: ''
      uid: f2f928af-9b16-4b11-8ef3-19f7d4fa1553
    - text: 'Non-null ''Gross'' values are expected to be plain numbers optionally
        using comma thousands separators and an optional decimal point, with no currency
        symbols or alphabetic suffixes. Values that do not conform are treated as
        null. Example GE/Deequ-style rule: .satisfies("CASE WHEN Gross IS NULL OR
        Gross = '''' THEN 1 WHEN regexp_replace(Gross, '','', '''') RLIKE ''^[0-9]+(\\.[0-9]+)?$''
        THEN 1 ELSE 0 END", ''Gross is numeric-like after removing commas'', lambda
        x: x >= 0.8).'
      sources:
      - start_line: 119
        end_line: 122
        file: ''
      uid: c025427c-5f7e-4b8e-a4dd-db131d5b0ee8
    - text: 'When parseable, ''Gross'' values should be non-negative so that log1p(Gross)
        is defined and produces a numeric tie-breaker. Suggested rule: .satisfies("CASE
        WHEN Gross IS NULL OR Gross = '''' THEN 1 WHEN CAST(regexp_replace(Gross,
        '','', '''') AS DOUBLE) >= 0 THEN 1 ELSE 0 END", ''Gross non-negative'', lambda
        x: x == 1.0).'
      sources:
      - start_line: 151
        end_line: 155
        file: ''
      uid: 5b44712a-f06e-47cf-9568-683627886f91
    - text: 'At least one row should have a parseable numeric ''Gross'' value; otherwise
        the tie-breaker falls back to a constant and provides no disambiguation. Suggested
        rule: .satisfies("CASE WHEN regexp_replace(Gross, '','', '''') RLIKE ''^[0-9]+(\\.[0-9]+)?$''
        THEN 1 ELSE 0 END", ''At least one parseable Gross'', lambda x: x > 0).'
      sources:
      - start_line: 151
        end_line: 157
        file: ''
      uid: d67e6410-ab8e-4acc-a91d-38f6b7a6a85a
  '["Genre","GenreToken"]':
    code: []
    assumptions:
    - text: 'Every GenreToken value must be exactly one of the trimmed tokens obtained
        by splitting the corresponding Genre string on commas. Deequ-style compliance
        example: .hasCompliance("genreToken_in_genre", "array_contains(transform(split(Genre,
        '',''), x -> trim(x)), GenreToken)")'
      sources:
      - start_line: 128
        end_line: 130
        file: ''
      - start_line: 158
        end_line: 160
        file: ''
      uid: 168481d3-50b0-42f8-8cde-3be4a61405a3
    - text: "All genre tokens used (in both Genre and the derived GenreToken) must\
        \ belong to the allowed genre vocabulary defined in code. This implies GenreToken\
        \ \u2286 allowed_genres. Deequ example: .isContainedIn(\"GenreToken\", [\"\
        Action\",\"Adventure\",\"Animation\",\"Biography\",\"Comedy\",\"Crime\",\"\
        Drama\",\"Family\",\"Fantasy\",\"Film-Noir\",\"History\",\"Horror\",\"Music\"\
        ,\"Musical\",\"Mystery\",\"Romance\",\"Sci-Fi\",\"Sport\",\"Thriller\",\"\
        War\",\"Western\"])."
      sources:
      - start_line: 124
        end_line: 127
        file: ''
      - start_line: 128
        end_line: 130
        file: ''
      - start_line: 158
        end_line: 160
        file: ''
      uid: f659e8cd-9af3-4b15-8e7c-66617d9976e1
    - text: "Within each (Decade_Label, GenreToken) group, Rank values must be unique\
        \ (i.e., no two rows share the same rank within the same decade\u2013genre).\
        \ Deequ example: .isUnique([\"Decade_Label\",\"GenreToken\",\"Rank\"])."
      sources:
      - start_line: 161
        end_line: 165
        file: ''
      uid: 22643424-3e85-40f9-800b-ddf4f7f85762
    - text: "For each (Decade_Label, GenreToken) group, the top_k output must contain\
        \ at most 10 items (i.e., max Rank per group \u2264 10). This can be enforced\
        \ on the emitted dataset by requiring Compliance(\"rank_le_10\", \"Rank <=\
        \ 10\") == 1.0 and (optionally) verifying grouped maxima."
      sources:
      - start_line: 166
        end_line: 168
        file: ''
      uid: c3a0c693-af7b-48ce-91ac-f37aa7b1d653
    - text: 'Decade_Label must be consistent with Year: Decade_Label == concat(string(floor(Year/10)*10),
        ''s''). Deequ compliance example: .hasCompliance("decade_matches_year", "concat((cast(floor(Year/10)*10
        as string)), ''s'') = Decade_Label").'
      sources:
      - start_line: 103
        end_line: 105
        file: ''
      uid: 0085de81-3497-446d-b05e-114450a5a973
    - text: "Within each (Decade_Label, GenreToken) group, lower Rank implies not-lower\
        \ Score and, for equal Score, not-lower Gross_Tie (i.e., ordering consistency:\
        \ sorted by Score desc then Gross_Tie desc). This can be validated with a\
        \ windowed check that Score is non-increasing with Rank and, when Score_t\
        \ == Score_{t+1}, Gross_Tie_t \u2265 Gross_Tie_{t+1}."
      sources:
      - start_line: 162
        end_line: 165
        file: ''
      uid: a4008213-0de3-4c86-b58e-bb08f2d46738
    - text: 'The pair (Series_Title, Year) should be unique across the dataset to
        avoid duplicate HTML element ids derived from safe_slug(f"{Series_Title}-{Year}").
        Deequ example: .isUnique(["Series_Title","Year"]).'
      sources:
      - start_line: 31
        end_line: 39
        file: ''
      - start_line: 68
        end_line: 76
        file: ''
      uid: 62ee6c79-79d5-430d-ab7e-86530f451268
  '["Gross","Gross_Num"]':
    code: []
    assumptions:
    - text: 'Gross must be a comma-formatted numeric string and map deterministically
        to Gross_Num. Specifically: (a) if Gross is not null, it should match the
        regex ''^[0-9,]+$''; (b) if Gross is not null, then Gross_Num must equal CAST(REGEXP_REPLACE(Gross,
        '','', '''') AS DOUBLE); (c) if Gross is null, then Gross_Num must be null.
        Deequ examples: .satisfies("Gross IS NULL OR Gross RLIKE ''^[0-9,]+$''", "Gross
        is numeric with commas when present"); .satisfies("Gross IS NULL OR Gross_Num
        = CAST(REGEXP_REPLACE(Gross, '','', '''') AS DOUBLE)", "Gross_Num equals parsed
        Gross"); .satisfies("Gross IS NOT NULL OR Gross_Num IS NULL", "Gross null
        implies Gross_Num null").'
      sources:
      - start_line: 1119
        end_line: 1122
        file: ''
      uid: 25aad41b-5315-4ceb-9eb6-75ad6dfef6c1
    - text: Within each (Decade_Label, GenreToken) group, ranking is determined by
        Score (descending) with Gross_Tie as a deterministic tie-breaker (descending).
        That is, if two rows have the same Decade_Label and GenreToken and Score_A
        > Score_B, then Rank_A < Rank_B; if Score_A == Score_B, higher Gross_Tie must
        correspond to a better (smaller) Rank. This reflects the pre-sort by [Score
        desc, Gross_Tie desc] before assigning Rank(method='first').
      sources:
      - start_line: 150
        end_line: 156
        file: ''
      - start_line: 162
        end_line: 165
        file: ''
      uid: a0a34475-f135-48d3-b473-69681c0c96d8
    - text: 'The combination (Decade_Label, GenreToken, Rank) must be unique across
        all rows (no duplicate ranks within a (Decade_Label, GenreToken) group). Deequ:
        .isUnique(["Decade_Label", "GenreToken", "Rank"]).'
      sources:
      - start_line: 161
        end_line: 167
        file: ''
      uid: 282cb6a4-ed10-41a9-be3e-bd8481702eac
    - text: 'Decade and Decade_Label must be consistent with Year: Decade = FLOOR(Year/10)*10
        and Decade_Label = CONCAT(CAST(Decade AS STRING), ''s''). Deequ examples:
        .satisfies("Decade = CAST(FLOOR(Year/10)*10 AS INT)", "Decade derived from
        Year"); .satisfies("Decade_Label = CONCAT(CAST(Decade AS STRING), ''s'')",
        "Decade_Label derived from Decade").'
      sources:
      - start_line: 103
        end_line: 106
        file: ''
      uid: d1460713-9a75-493c-ab60-3781c37e256b
    - text: 'Released_Year and Year must be consistent: Released_Year should be exactly
        4 digits and Year must equal CAST(Released_Year AS INT). Deequ examples: .satisfies("Released_Year
        RLIKE ''^\\d{4}$''", "Released_Year format"); .satisfies("Year = CAST(Released_Year
        AS INT)", "Year equals Released_Year as int").'
      sources:
      - start_line: 97
        end_line: 104
        file: ''
      uid: 501859ef-f866-4c9a-8b1d-12ee10a10f3d
    - text: 'The pair (Series_Title, Year) should be unique to avoid duplicate HTML
        ids derived from safe_slug(f"{Series_Title}-{Year}"). Deequ: .isUnique(["Series_Title",
        "Year"]).'
      sources:
      - start_line: 31
        end_line: 39
        file: ''
      uid: dd966dcb-17d8-483f-a77d-d699c1e4e335
    - text: 'Certificate must be content-policy consistent with genre tokens: if GenreToken
        is ''Family'' or ''Animation'', then Certificate must not be ''R'' or ''NC-17''.
        Deequ (on the exploded dataset): .satisfies("(GenreToken NOT IN (''Family'',''Animation''))
        OR (Certificate NOT IN (''R'',''NC-17''))", "Family/Animation titles not rated
        R/NC-17").'
      sources:
      - start_line: 128
        end_line: 134
        file: ''
      uid: f5ee083b-19d6-4ab1-8be6-526b962500d3
  '["Gross_Num","Score"]':
    code: []
    assumptions:
    - text: 'The combination of ''Decade_Label'', ''GenreToken'', and ''Rank'' must
        be unique across the leaderboard so that no decade-genre group contains duplicate
        ranks. We could represent this as a Deequ constraint: .isUnique(["Decade_Label",
        "GenreToken", "Rank"]).'
      sources:
      - start_line: 161
        end_line: 167
        file: ''
      - start_line: 68
        end_line: 74
        file: ''
      uid: ff93a414-373e-4b8d-857c-1bf3132bb1f0
    - text: 'Within each (Decade_Label, GenreToken) group, the intended ordering is
        by Score descending and then by Gross_Num descending (via Gross_Tie). To ensure
        deterministic ranking when Scores tie, the combination (Decade_Label, GenreToken,
        Score, Gross_Num) should be unique among rows that get ranked (or at least
        among the top-k for each group). We could represent this as: .isUnique(["Decade_Label",
        "GenreToken", "Score", "Gross_Num"]).'
      sources:
      - start_line: 150
        end_line: 156
        file: ''
      - start_line: 162
        end_line: 165
        file: ''
      uid: 4cf28ed7-b51b-4a77-a485-17223a94aa1d
    - text: 'Within each (Decade_Label, GenreToken) group, Rank must be consistent
        with Score: if Rank_a < Rank_b then Score_a >= Score_b. This can be validated
        by asserting there is no pair of rows in the same group where Rank is smaller
        but Score is strictly smaller. In Deequ, this can be implemented via a custom
        check over a self-join or by verifying that ordering by Rank ascending equals
        ordering by Score descending within each group.'
      sources:
      - start_line: 162
        end_line: 165
        file: ''
      - start_line: 73
        end_line: 74
        file: ''
      uid: ea589b29-ab1a-4472-a3db-677718d31584
    - text: 'Score is a deterministic function of IMDB_Rating, Meta_score, No_of_Votes
        and Runtime_Min (through the pacing factor), so identical tuples of (IMDB_Rating,
        Meta_score, No_of_Votes, Runtime_Min) must produce identical Score. We could
        represent this as: .hasFunctionalDependency(["IMDB_Rating", "Meta_score",
        "No_of_Votes", "Runtime_Min"], "Score").'
      sources:
      - start_line: 139
        end_line: 148
        file: ''
      - start_line: 143
        end_line: 146
        file: ''
      uid: aef6c769-878b-4b71-a41f-9c5d8e568af7
    - text: When Scores tie within a (Decade_Label, GenreToken) group, the record
        with the larger Gross_Num should receive the better (smaller) Rank because
        Gross_Tie is computed from Gross_Num and used as a secondary sort key. This
        can be validated by checking, for each group, that among equal-Score pairs
        Rank strictly orders by Gross_Num descending. This rule can be implemented
        via a custom SQL-based Deequ 'satisfies' check over pairwise comparisons or
        window logic.
      sources:
      - start_line: 150
        end_line: 156
        file: ''
      - start_line: 162
        end_line: 165
        file: ''
      uid: 156d4d67-e608-42c6-8718-92ed9cfd0679
    - text: Each decade-genre group must contain at most TOP_K=10 items with Rank
        <= 10. In other words, for every (Decade_Label, GenreToken), count_if(Rank
        <= 10) <= 10. This can be validated with an aggregate-by-group check or a
        Deequ 'forAllGroups' style constraint.
      sources:
      - start_line: 166
        end_line: 168
        file: ''
      - start_line: 161
        end_line: 167
        file: ''
      uid: 2167773a-b196-402a-b74d-1bd349483188
    - text: 'Year must equal the 4-digit Released_Year, and Decade_Label must equal
        concat((Year // 10) * 10, ''s''). These can be represented as Deequ ''satisfies''
        constraints such as: satisfies("cast(Released_Year as int) = Year") and satisfies("Decade_Label
        = concat(cast((Year/10)*10 as string), ''s'')").'
      sources:
      - start_line: 96
        end_line: 106
        file: ''
      uid: 04f93137-3bdf-4b61-86f5-5f24da6a2489
    - text: 'Runtime_Min must be the integer minutes extracted from Runtime and Runtime
        must match the pattern ''^[0-9]{2,3} min$''. This can be represented as a
        Deequ ''satisfies'' constraint like: satisfies("Runtime rlike ''^[0-9]{2,3}
        min$'' and Runtime_Min = cast(regexp_extract(Runtime, ''([0-9]{2,3})'', 1)
        as int)").'
      sources:
      - start_line: 108
        end_line: 111
        file: ''
      uid: 40dccaba-1571-4311-939b-79d9252e685e
    - text: 'The combination of Series_Title and Year should be unique across records
        (a single movie release), ensuring that generated HTML ids (safe_slug(f"{title}-{year}"))
        do not collide. We could represent this as: .isUnique(["Series_Title", "Year"]).'
      sources:
      - start_line: 18
        end_line: 34
        file: ''
      uid: c92d6b42-35f4-4f9e-830e-bcd0a1ff537b
    - text: 'In the exploded dataset, if GenreToken is ''Family'' or ''Animation'',
        then Certificate must not be ''R'' or ''NC-17''. This conditional multi-column
        rule can be represented as a Deequ ''satisfies'' constraint: satisfies("(GenreToken
        not in (''Family'',''Animation'')) or (Certificate not in (''R'',''NC-17''))").'
      sources:
      - start_line: 124
        end_line: 134
        file: ''
      - start_line: 158
        end_line: 160
        file: ''
      uid: 498f3771-6650-4553-8571-faf8308177c7
    - text: Gross_Num is the normalized numeric parse of Gross and is used only as
        a tie-breaker for Score ordering. Therefore, within groups where any Gross
        values exist, Gross_Tie must be a monotonic transformation of Gross_Num (non-decreasing
        with Gross_Num), and must lie in [0, 1]. This can be validated via a positive
        correlation check between Gross_Num and Gross_Tie and a bounds check on Gross_Tie.
      sources:
      - start_line: 118
        end_line: 122
        file: ''
      - start_line: 150
        end_line: 156
        file: ''
      - start_line: 162
        end_line: 165
        file: ''
      uid: a7289136-fb5b-4966-9827-a29f3a673e7b
  '["IMDB_Rating","Meta_score","No_of_Votes","Runtime"]':
    code: []
    assumptions:
    - text: 'Runtime must be a canonical string matching the pattern ''^\\d{2,3} min$''
        and be consistent with the derived numeric Runtime_Min. For any row that is
        ranked (Rank is not null), Runtime is required and Runtime_Min must equal
        the integer extracted from Runtime. Example Deequ constraints: .satisfies("Rank
        IS NULL OR Runtime RLIKE ''^\\d{2,3} min$''", ''runtime_format_for_ranked'')
        and .satisfies("Rank IS NULL OR Runtime_Min = CAST(regexp_extract(Runtime,
        ''([0-9]{2,3})'', 1) AS INT)", ''runtime_string_numeric_consistency'').'
      sources:
      - start_line: 108
        end_line: 111
        file: ''
      - start_line: 143
        end_line: 145
        file: ''
      - start_line: 164
        end_line: 167
        file: ''
      uid: 5938786c-a283-4991-905f-bf45301e27f0
    - text: 'Score prerequisites for ranked rows: If a row receives a Rank, IMDB_Rating
        and No_of_Votes must be present and numeric so that rating_norm and vote_norm
        are defined and Score is non-null. Example Deequ constraints: .satisfies("Rank
        IS NULL OR (IMDB_Rating IS NOT NULL AND No_of_Votes IS NOT NULL AND Score
        IS NOT NULL)", ''score_prerequisites_present'') and .satisfies("Rank IS NULL
        OR (CAST(IMDB_Rating AS DOUBLE) IS NOT NULL AND CAST(No_of_Votes AS DOUBLE)
        IS NOT NULL)", ''score_prerequisites_castable'').'
      sources:
      - start_line: 112
        end_line: 118
        file: ''
      - start_line: 139
        end_line: 149
        file: ''
      - start_line: 164
        end_line: 167
        file: ''
      uid: 1d4d1f5d-9b1d-4da7-83ec-0ef447a93013
    - text: 'Value scale consistency for ranked rows: IMDB_Rating must be in [0, 10],
        No_of_Votes must be >= 1, and Meta_score (if present) must be in [0, 100].
        These bounds ensure the downstream normalization (rating/10, meta/100, log10(votes)/6)
        produces expected ranges. Example Deequ constraints: .satisfies("Rank IS NULL
        OR (IMDB_Rating BETWEEN 0 AND 10)", ''imdb_scale_for_ranked'') and .satisfies("Rank
        IS NULL OR (No_of_Votes >= 1)", ''votes_lower_bound_for_ranked'') and .satisfies("Rank
        IS NULL OR Meta_score IS NULL OR (Meta_score BETWEEN 0 AND 100)", ''meta_scale_for_ranked'').'
      sources:
      - start_line: 139
        end_line: 143
        file: ''
      - start_line: 147
        end_line: 149
        file: ''
      - start_line: 164
        end_line: 167
        file: ''
      uid: c98a6623-f848-4037-920a-26bcbd6c5856
    - text: 'Base-score boundedness given scales: For rows where Meta_score is present,
        the weighted normalized sum 0.6*(IMDB_Rating/10) + 0.25*(Meta_score/100) +
        0.15*(log10(greatest(No_of_Votes,1))/6) must lie in [0, 1.0]. Due to the pacing
        clip, the final Score must lie in [0, 1.05]. Example Deequ constraints: .satisfies("Rank
        IS NULL OR Meta_score IS NULL OR (0.6*(IMDB_Rating/10.0) + 0.25*(Meta_score/100.0)
        + 0.15*(log10(greatest(No_of_Votes,1))/6.0)) BETWEEN 0 AND 1.0", ''base_score_bounds'')
        and .satisfies("Rank IS NULL OR Score BETWEEN 0 AND 1.05", ''score_bounds_with_pacing'').'
      sources:
      - start_line: 139
        end_line: 149
        file: ''
      uid: e1536aee-8323-44db-a014-19c545ba4833
    - text: 'Score recomputation consistency: For ranked rows with Meta_score present,
        Score must equal (0.6*(IMDB_Rating/10) + 0.25*(Meta_score/100) + 0.15*(log10(greatest(No_of_Votes,1))/6))
        multiplied by the pacing factor clip(1 - abs(Runtime_Min - 120)/300, 0.8,
        1.05), within a small tolerance (e.g., absolute difference <= 1e-3). Example
        Deequ constraint: .satisfies("Rank IS NULL OR Meta_score IS NULL OR abs(Score
        - ((0.6*(IMDB_Rating/10.0) + 0.25*(Meta_score/100.0) + 0.15*(log10(greatest(No_of_Votes,1))/6.0))
        * greatest(0.8, least(1.05, 1.0 - abs(Runtime_Min - 120)/300.0))))) <= 1e-3",
        ''score_formula_consistency'').'
      sources:
      - start_line: 139
        end_line: 149
        file: ''
      uid: 3145e4dd-6d71-4bd4-ad47-c1d5c177f9df
    - text: 'Within each (Decade_Label, GenreToken) group, Rank values must be unique
        (i.e., no two items share the same Rank in a group). This matches the ranking
        logic using method=''first''. Example Deequ constraint: .isUnique(["Decade_Label",
        "GenreToken", "Rank"]).'
      sources:
