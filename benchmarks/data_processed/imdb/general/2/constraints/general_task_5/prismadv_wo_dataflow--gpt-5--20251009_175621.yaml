  '["Decade_Label","GenreToken","Rank","Score"]':
    code: []
    assumptions:
    - text: 'Decade_Label must be consistent with Year: for every row, Decade_Label
        == concat(cast(floor(Year/10)*10 as string), ''s'') and Year must lie in [floor(Year/10)*10,
        floor(Year/10)*10 + 9]. This can be validated with a Deequ-style check such
