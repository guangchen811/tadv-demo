    - text: 'Within each (Decade_Label, GenreToken) group, ordering by Rank must correspond
        to non-increasing Score (i.e., if Rank1 < Rank2 then Score1 >= Score2). One
        validation approach: ensure COUNT(*) = 0 for rows where LEAD(Score) OVER (PARTITION
        BY Decade_Label, GenreToken ORDER BY Rank) > Score.'
      sources:
      - start_line: 161
        end_line: 165
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      - start_line: 198
        end_line: 199
        file: ''
      uid: 74e6291a-9508-4ea6-b953-9455cca1ae02
    - text: 'Tie-breaking with Gross_Tie among equal Score rows: within each (Decade_Label,
        GenreToken), for any two records with the same Score, the one with higher
        Gross_Tie must have a smaller Rank (Gross_Tie is non-increasing as Rank increases
        when Score is equal). A check could assert COUNT(*) = 0 for rows where Score
        = LAG(Score) AND Gross_Tie > LAG(Gross_Tie) OVER (PARTITION BY Decade_Label,
        GenreToken ORDER BY Rank).'
