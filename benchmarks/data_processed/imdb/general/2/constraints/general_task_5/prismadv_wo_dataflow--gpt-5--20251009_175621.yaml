        end_line: 156
        file: ''
      - start_line: 161
        end_line: 163
        file: ''
      - start_line: 164
        end_line: 165
        file: ''
      uid: 7f4b67e7-063e-47c9-aab7-b56d63ec1399
    - text: 'Top-K bound per group: In the final output, each (Decade_Label, GenreToken)
        group must contain at most 10 rows and max(Rank) per group must be <= 10.
        This can be validated by grouping on (Decade_Label, GenreToken) and asserting
