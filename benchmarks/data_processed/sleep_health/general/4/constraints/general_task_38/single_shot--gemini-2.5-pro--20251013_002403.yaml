constraints:
  Age:
    code:
    - - .isBetween('Age', 18, 100)
      - Invalid
    assumptions: []
  BMI Category:
    code:
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'^\\d{2,3}/\\d{2,3}$')
      - Invalid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isBetween('Heart Rate', 40, 200)
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isBetween('Quality of Sleep', 1, 10)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Sleep Apnea',
        'Insomnia')", 'Sleep Disorder must be null or one of the known disorders')
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isBetween('Sleep Duration', 0, 24)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isBetween('Stress Level', 1, 10)
      - Invalid
    assumptions: []
