raw_constraints:
- column_name: Person ID
  code_for_constraint: .isComplete('Person ID')
- column_name: Person ID
  code_for_constraint: .isUnique('Person ID')
- column_name: Person ID
  code_for_constraint: .hasDataType('Person ID', ConstrainableDataTypes.Integral)
- column_name: Person ID
  code_for_constraint: .isPositive('Person ID')
- column_name: Blood Pressure
  code_for_constraint: .isComplete('Blood Pressure')
- column_name: Blood Pressure
  code_for_constraint: .hasPattern('Blood Pressure', '^[0-9]+/[0-9]+$')
- column_name: Sleep Duration
  code_for_constraint: .isComplete('Sleep Duration')
- column_name: Sleep Duration
  code_for_constraint: .hasDataType('Sleep Duration', ConstrainableDataTypes.Numeric)
- column_name: Sleep Duration
  code_for_constraint: .isNonNegative('Sleep Duration')
- column_name: Quality of Sleep
  code_for_constraint: .isComplete('Quality of Sleep')
- column_name: Quality of Sleep
  code_for_constraint: .hasDataType('Quality of Sleep', ConstrainableDataTypes.Numeric)
- column_name: Quality of Sleep
  code_for_constraint: '.hasMin(''Quality of Sleep'', lambda v: v >= 0)'
- column_name: Quality of Sleep
  code_for_constraint: '.hasMax(''Quality of Sleep'', lambda v: v <= 10)'
- column_name: Physical Activity Level
  code_for_constraint: .isComplete('Physical Activity Level')
- column_name: Physical Activity Level
  code_for_constraint: .hasDataType('Physical Activity Level', ConstrainableDataTypes.Numeric)
- column_name: Physical Activity Level
  code_for_constraint: .isNonNegative('Physical Activity Level')
- column_name: Daily Steps
  code_for_constraint: .isComplete('Daily Steps')
- column_name: Daily Steps
  code_for_constraint: .hasDataType('Daily Steps', ConstrainableDataTypes.Numeric)
- column_name: Daily Steps
  code_for_constraint: .isNonNegative('Daily Steps')
- column_name: Stress Level
  code_for_constraint: .isComplete('Stress Level')
- column_name: Stress Level
  code_for_constraint: .hasDataType('Stress Level', ConstrainableDataTypes.Numeric)
- column_name: Stress Level
  code_for_constraint: .isNonNegative('Stress Level')
- column_name: BMI Category
  code_for_constraint: .isComplete('BMI Category')
- column_name: BMI Category
  code_for_constraint: .isContainedIn('BMI Category', ['Normal', 'Normal Weight',
    'Overweight', 'Obese'])
- column_name: Sleep Disorder
  code_for_constraint: .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
- column_name: Gender
  code_for_constraint: .isContainedIn('Gender', ['Male', 'Female'])
- column_name: Age
  code_for_constraint: .hasDataType('Age', ConstrainableDataTypes.Integral)
- column_name: Age
  code_for_constraint: .isNonNegative('Age')
- column_name: Heart Rate
  code_for_constraint: .hasDataType('Heart Rate', ConstrainableDataTypes.Numeric)
- column_name: Heart Rate
  code_for_constraint: .isPositive('Heart Rate')
