constraints:
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight','Obese','Normal','Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', '^\d{2,3}/\d{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .satisfies('Daily Steps >= 0', 'steps_non_negative')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male','Female'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .satisfies('Physical Activity Level >= 0', 'pal_non_negative')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .satisfies('Quality of Sleep >= 0 AND Quality of Sleep <= 10', 'qos_range')
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .satisfies("Sleep Disorder IN ('Insomnia','Sleep Apnea') OR Sleep Disorder
        IS NULL", 'sleep_disorder_values')
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .satisfies('Sleep Duration >= 0 AND Sleep Duration <= 24', 'sleep_duration_range')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .satisfies('Stress Level >= 0 AND Stress Level <= 10', 'stress_range')
      - Invalid
    assumptions: []
