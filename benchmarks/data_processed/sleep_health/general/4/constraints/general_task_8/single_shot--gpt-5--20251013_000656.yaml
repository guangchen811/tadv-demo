constraints:
  Age:
    code:
    - - '.hasMax(''Age'', lambda v: v <= 120)'
      - Valid
    - - '.hasMin(''Age'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', '^\\d{2,3}/\\d{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - '.hasMax(''Daily Steps'', lambda v: v <= 50000)'
      - Valid
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - '.hasMax(''Heart Rate'', lambda v: v <= 220)'
      - Valid
    - - '.hasMin(''Heart Rate'', lambda v: v >= 30)'
      - Valid
    - - .isComplete('Heart Rate')
      - Valid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    - - .isContainedIn('Occupation', ['Nurse', 'Software Engineer', 'Sales Representative',
        'Engineer', 'Lawyer', 'Teacher', 'Accountant', 'Salesperson', 'Scientist',
        'Doctor'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isPositive('Person ID')
      - Invalid
    assumptions: []
  Physical Activity Level:
    code:
    - - '.hasMax(''Physical Activity Level'', lambda v: v <= 100)'
      - Valid
    - - '.hasMin(''Physical Activity Level'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.hasMax(''Quality of Sleep'', lambda v: v <= 10)'
      - Valid
    - - '.hasMin(''Quality of Sleep'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - '.hasMax(''Sleep Duration'', lambda v: v <= 24.0)'
      - Valid
    - - '.hasMin(''Sleep Duration'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - '.hasMax(''Stress Level'', lambda v: v <= 10)'
      - Valid
    - - '.hasMin(''Stress Level'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
