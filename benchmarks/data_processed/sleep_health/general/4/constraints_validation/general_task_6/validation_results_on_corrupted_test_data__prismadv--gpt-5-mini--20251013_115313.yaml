results:
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Quality of Sleep` BETWEEN 6 AND 9 THEN
        1 ELSE 0 END'', ''Quality of Sleep in 6-9 band'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\s*[0-9]+/[0-9]+\\s*$'', assertion=lambda
        x: x == 1, name=''Blood Pressure format'')'
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Blood Pressure'', ''^\\s*[0-9]+/[0-9]+\\s*$'',
        assertion=lambda x: x == 1, name=''Blood Pressure format'')'' failed on data
        sample: Value: 0.9 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''CASE WHEN CAST(split_part(`Blood Pressure`, \''/\'',
        1) AS INT) BETWEEN 50 AND 250 THEN 1 ELSE 0 END'', ''Systolic plausible range'',
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN CAST(split_part(`Blood Pressure`, \''/\'',
        2) AS INT) BETWEEN 30 AND 160 THEN 1 ELSE 0 END'', ''Diastolic plausible range'',
        lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN CAST(split_part(`Blood
        Pressure`, \''/\'', 2) AS INT) BETWEEN 30 AND 160 THEN 1 ELSE 0 END'', ''Diastolic
        plausible range'', lambda x: x >= 0.99)'' failed on data sample: Value: 0.9
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''CASE WHEN CAST(split_part(`Blood Pressure`, \''/\'',
        1) AS INT) >= CAST(split_part(`Blood Pressure`, \''/\'', 2) AS INT) THEN 1
        ELSE 0 END'', ''Systolic >= Diastolic'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN CAST(split_part(`Blood
        Pressure`, \''/\'', 1) AS INT) >= CAST(split_part(`Blood Pressure`, \''/\'',
        2) AS INT) THEN 1 ELSE 0 END'', ''Systolic >= Diastolic'', lambda x: x >=
        0.99)'' failed on data sample: Value: 0.9 does not meet the constraint requirement!'
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Person ID` IS NOT NULL AND floor(`Person
        ID`) = `Person ID` THEN 1 ELSE 0 END'', ''Person ID integer-valued'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NOT NULL THEN 1 ELSE
        0 END", "Has Some Non-Null Sleep Disorder", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IN (''Sleep Apnea'', ''Insomnia'')
        OR `Sleep Disorder` IS NULL THEN 1 ELSE 0 END", "Known Sleep Disorder Categories",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies(''CASE WHEN `Physical Activity Level` IS NOT NULL AND
        `Daily Steps` IS NOT NULL AND floor(`Physical Activity Level`) = `Physical
        Activity Level` AND floor(`Daily Steps`) = `Daily Steps` AND `Physical Activity
        Level` BETWEEN 0 AND 100 AND `Daily Steps` BETWEEN 0 AND 50000 THEN 1 ELSE
        0 END'', ''Activity columns range and integrality'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["bp_risk","disorder_boost","sedentary_index","sleep_need_index","stress_norm"]':
    code:
    - suggestion: '.satisfies(''CASE WHEN `Blood Pressure` IS NOT NULL AND `Blood
        Pressure` RLIKE "^[0-9]+/[0-9]+$" THEN 1 ELSE 0 END'', ''Blood Pressure parsable
        as systolic/diastolic integers'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN `Blood Pressure` IS NOT
        NULL AND `Blood Pressure` RLIKE "^[0-9]+/[0-9]+$" THEN 1 ELSE 0 END'', ''Blood
        Pressure parsable as systolic/diastolic integers'', lambda x: x == 1)'' failed
        on data sample: Value: 0.9 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Daily Steps` IS NULL OR (`Daily Steps`
        BETWEEN 0 AND 50000) THEN 1 ELSE 0 END'', ''Daily Steps in expected range
        [0,50000] or NULL'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `Physical Activity Level` IS NULL OR (`Physical
        Activity Level` BETWEEN 0 AND 100) THEN 1 ELSE 0 END'', ''Physical Activity
        Level in expected range [0,100] or NULL'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
