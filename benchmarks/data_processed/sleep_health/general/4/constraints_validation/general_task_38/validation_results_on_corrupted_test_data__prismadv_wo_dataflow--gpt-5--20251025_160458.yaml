results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Quality of Sleep` AS DOUBLE) IS NOT NULL AND
        NOT isnan(CAST(`Quality of Sleep` AS DOUBLE)) AND ABS(CAST(`Quality of Sleep`
        AS DOUBLE)) < 1e12", "Quality of Sleep finite numeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x >= 0.95)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''BMI Category'', lambda x:
        x >= 0.95)'' failed on data sample: Value: 0.9266666666666666 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.isContainedIn(''BMI Category'', [''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese''], lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IS NULL THEN 1 ELSE CASE WHEN
        `BMI Category` = TRIM(`BMI Category`) THEN 1 ELSE 0 END END", "BMI Category
        trimmed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` = ''Sleep Apnea'' THEN CASE
        WHEN `BMI Category` IN (''Normal'', ''Normal Weight'', ''Overweight'', ''Obese'')
        THEN 1 ELSE 0 END ELSE 1 END", "Known BMI for apnea rows", lambda x: x >=
        0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasCompleteness("Blood Pressure", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("Blood Pressure", ".*(\\d{2,3})/(\\d{2,3}).*", lambda
        x: x >= 0.95, name="BP SBP/DBP pattern")'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Person ID` AS BIGINT) IS NOT NULL'', ''Person
        ID integer-like'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL", "Sleep
        Duration numeric and non-null", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "Sleep Duration within [0,24] hours", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` >= 3 AND `Sleep Duration` <= 12",
        "Typical Sleep Duration 3-12h", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Sleep Duration'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''cast(`Daily Steps` AS double) IS NOT NULL'', ''Daily
        Steps numeric'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Sleep Apnea'', ''Insomnia''],
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR `Sleep Disorder`
        = TRIM(`Sleep Disorder`) THEN 1 ELSE 0 END", "Sleep Disorder trimmed", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.satisfies("(`Heart Rate` IS NOT NULL) OR (`Heart Rate` IS NULL)",
        "Heart Rate column exists", lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("Heart Rate")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Heart Rate` AS DOUBLE) IS NOT NULL", "Heart Rate
        parsable as numeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Heart Rate` BETWEEN 55 AND 95", "HR in expected range",
        lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies(''CAST(`Stress Level` AS DOUBLE) IS NOT NULL'', ''Stress
        numeric and non-null'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Stress Level` >= 3 AND `Stress Level` <= 8'', ''Stress
        in [3,8]'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`Stress Level` AS INT) = `Stress Level`'', ''Stress
        integer-like'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: '.satisfies(''CAST(Age AS DOUBLE) IS NOT NULL'', ''Age numeric parsable'',
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(Age AS DOUBLE) BETWEEN 18 AND 90'', ''Age within
        plausible adult range'', lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Age","BMI Category","Blood Pressure","Daily Steps","Heart Rate","Person ID","Physical
    Activity Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.satisfies("`Blood Pressure` RLIKE ''^[0-9]{2,3}/[0-9]{2,3}$''
        AND cast(split(`Blood Pressure`, ''/'')[0] as int) > cast(split(`Blood Pressure`,
        ''/'')[1] as int) AND (cast(split(`Blood Pressure`, ''/'')[0] as int) - cast(split(`Blood
        Pressure`, ''/'')[1] as int)) BETWEEN 10 AND 120 AND (cast(split(`Blood Pressure`,
        ''/'')[1] as int) + (cast(split(`Blood Pressure`, ''/'')[0] as int) - cast(split(`Blood
        Pressure`, ''/'')[1] as int))/3.0) BETWEEN 60 AND 150", "Valid BP parse and
        physiology", lambda f: f >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`Blood Pressure` RLIKE ''^[0-9]{2,3}/[0-9]{2,3}$''
        AND cast(split(`Blood Pressure`, ''/'')[0] as int) > cast(split(`Blood Pressure`,
        ''/'')[1] as int) AND (cast(split(`Blood Pressure`, ''/'')[0] as int) - cast(split(`Blood
        Pressure`, ''/'')[1] as int)) BETWEEN 10 AND 120 AND (cast(split(`Blood Pressure`,
        ''/'')[1] as int) + (cast(split(`Blood Pressure`, ''/'')[0] as int) - cast(split(`Blood
        Pressure`, ''/'')[1] as int))/3.0) BETWEEN 60 AND 150", "Valid BP parse and
        physiology", lambda f: f >= 0.99)'' failed on data sample: Value: 0.9 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL AND `Physical Activity Level` IS NOT NULL AND `Stress Level` IS
        NOT NULL AND `Daily Steps` IS NOT NULL AND `Age` IS NOT NULL AND `Heart Rate`
        IS NOT NULL AND `Blood Pressure` RLIKE ''^[0-9]{2,3}/[0-9]{2,3}$''", "Core
        inputs present and BP parseable", lambda f: f >= 0.95)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`Sleep Duration` IS NOT NULL AND
        `Quality of Sleep` IS NOT NULL AND `Physical Activity Level` IS NOT NULL AND
        `Stress Level` IS NOT NULL AND `Daily Steps` IS NOT NULL AND `Age` IS NOT
        NULL AND `Heart Rate` IS NOT NULL AND `Blood Pressure` RLIKE ''^[0-9]{2,3}/[0-9]{2,3}$''",
        "Core inputs present and BP parseable", lambda f: f >= 0.95)'' failed on data
        sample: Value: 0.9 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        c: c == c)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        c: c == c)'
      status: true
      reason_if_failed: ''
      level: error
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies("(`Sleep Disorder` <> ''Sleep Apnea'') OR (`BMI Category`
        IN (''Normal'',''Normal Weight'',''Overweight'',''Obese''))", "apnea_rows_have_valid_bmi_category",
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("(`Sleep Disorder` <> ''Sleep Apnea'')
        OR (`BMI Category` IN (''Normal'',''Normal Weight'',''Overweight'',''Obese''))",
        "apnea_rows_have_valid_bmi_category", lambda v: v == 1.0)'' failed on data
        sample: Value: 0.94 does not meet the constraint requirement!'
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        v: v == v)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        v: v >= 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        v: v == v)'
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("cast(`Sleep Duration` as double) IS NOT NULL AND cast(`Quality
        of Sleep` as double) IS NOT NULL", "sleep_qos_present_and_numeric", lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
