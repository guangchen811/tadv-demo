        failed on data sample: Value: 0.9266666666666666 does not meet the constraint
        requirement!'
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\s*\\d+(?:\\.\\d+)?\\s*/\\s*\\d+(?:\\.\\d+)?\\s*$'',
        lambda x: x >= 0.95)'
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Blood Pressure'', ''^\\s*\\d+(?:\\.\\d+)?\\s*/\\s*\\d+(?:\\.\\d+)?\\s*$'',
        lambda x: x >= 0.95)'' failed on data sample: Value: 0.9 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN CAST(split(`Blood Pressure`, ''/'')[0] AS
        DOUBLE) IS NOT NULL AND CAST(split(`Blood Pressure`, ''/'')[1] AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END", ''BP_parseable'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN CAST(split(`Blood Pressure`, ''/'')[0] AS
        DOUBLE) BETWEEN 40 AND 300 AND CAST(split(`Blood Pressure`, ''/'')[1] AS DOUBLE)
        BETWEEN 20 AND 200 THEN 1 ELSE 0 END", ''BP_ranges'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN CAST(split(`Blood Pressure`,
        ''/'')[0] AS DOUBLE) BETWEEN 40 AND 300 AND CAST(split(`Blood Pressure`, ''/'')[1]
