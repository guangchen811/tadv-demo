      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN TRIM(`BMI Category`) IN
        (''Overweight'',''Normal'',''Obese'',''Normal Weight'') THEN 1 ELSE 0 END",
        "Normalized BMI Category", lambda x: x >= 0.99)'' failed on data sample: Value:
        0.9266666666666666 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Overweight'',''Normal'',''Obese'',''Normal
        Weight'') THEN 1 ELSE 0 END", "Valid BMI Fraction", lambda x: x >= 0.95)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `BMI Category` IN (''Overweight'',''Normal'',''Obese'',''Normal
