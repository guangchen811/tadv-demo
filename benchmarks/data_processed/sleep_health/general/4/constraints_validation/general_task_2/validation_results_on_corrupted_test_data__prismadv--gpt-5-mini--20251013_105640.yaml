        x >= 0.99)'' failed on data sample: Value: 0.9 does not meet the constraint
        requirement!'
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` >= 0 AND `Sleep Duration`
        <= 24 THEN 1 ELSE 0 END", "Sleep Duration in plausible range", lambda x: x
        >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` IS NOT NULL THEN 1 ELSE
        0 END", "Any non-null Sleep Duration", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Daily Steps'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Daily Steps'', lambda x: x <= 100000)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR `Sleep Disorder`
        IN (''Sleep Apnea'',''Insomnia'') THEN 1 ELSE 0 END", "Valid Sleep Disorder
        values (exact match)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR TRIM(`Sleep Disorder`)
        IN (''Sleep Apnea'',''Insomnia'') THEN 1 ELSE 0 END", "Trimmed/Canonical Sleep
        Disorder (>=95% after trim)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN NOT (`Sleep Disorder` IS NULL) OR (`Sleep
        Disorder` IS NULL) THEN 1 ELSE 0 END", "Column present or allowed to be all-null
        (no hard requirement)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` IS NOT NULL AND TRY_CAST(`Heart
        Rate` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Numeric Heart Rate", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("Heart Rate")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Heart Rate` AS DOUBLE) BETWEEN
        30 AND 220 THEN 1 ELSE 0 END", "Physiological Heart Rate range", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Heart Rate` AS DOUBLE) IS NULL
        OR TRY_CAST(`Heart Rate` AS DOUBLE) = FLOOR(TRY_CAST(`Heart Rate` AS DOUBLE))
        THEN 1 ELSE 0 END", "Integer Heart Rate", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Stress Level'', lambda x: x >= 3)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Stress Level'', lambda x: x <= 8)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` BETWEEN 0 AND 100
        AND `Daily Steps` >= 0 THEN 1 ELSE 0 END", "pal_in_0_100_and_steps_non_negative",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24 AND
        (`Quality of Sleep` < 1 OR `Quality of Sleep` > 10)", "QoS within 1..10 for
        plausible Sleep Duration", lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.hasCorrelation(columnA=''Stress Level'', columnB=''Quality of
        Sleep'', assertion=lambda x: abs(x) >= 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
