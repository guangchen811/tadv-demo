results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` IS NOT NULL AND
        `Physical Activity Level` >= 0 AND `Physical Activity Level` <= 100 THEN 1
        ELSE 0 END", "PAL_in_plausible_range_0_100", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` IS NOT NULL AND
        `Daily Steps` IS NOT NULL THEN CASE WHEN `Daily Steps` >= 0 AND `Daily Steps`
        <= 200000 THEN 1 ELSE 0 END ELSE 1 END", "Steps_in_reasonable_range_for_pairs",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` >= 1 AND `Quality of Sleep`
        <= 10 THEN 1 ELSE 0 END", "QoS in [1,10]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Quality of Sleep", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
