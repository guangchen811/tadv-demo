results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete("Physical Activity Level")
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.hasCompleteness("Quality of Sleep", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Obese'', ''Overweight'',
        ''Normal'', ''Normal Weight'') THEN 1 ELSE 0 END", "Valid BMI Categories",
        lambda x: x >= 0.95)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `BMI Category` IN (''Obese'',
        ''Overweight'', ''Normal'', ''Normal Weight'') THEN 1 ELSE 0 END", "Valid
        BMI Categories", lambda x: x >= 0.95)'' failed on data sample: Value: 0.9266666666666666
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.hasCompleteness("BMI Category", lambda x: x >= 0.95)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness("BMI Category", lambda x: x
        >= 0.95)'' failed on data sample: Value: 0.9266666666666666 does not meet
        the constraint requirement!'
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete("Blood Pressure")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("Blood Pressure", "^\\d{2,3}/\\d{2,3}$", assertion=lambda
        x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasPattern("Blood Pressure", "^\\d{2,3}/\\d{2,3}$",
        assertion=lambda x: x == 1.0)'' failed on data sample: Value: 0.9 does not
        meet the constraint requirement!'
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` > 16.0", "Sleep Duration upper bound",
        assertion=lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Sleep Duration'', assertion=lambda x: x
        > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness("Daily Steps", lambda x: x >= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness("Sleep Disorder", lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Sleep Apnea'', ''Insomnia''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete("Heart Rate")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Heart Rate` <= 220", "Heart Rate physiological maximum",
        assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.hasCompleteness(''Stress Level'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("FLOOR(`Stress Level`) = `Stress Level`", "Stress Level
        values are integral", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Stress Level` >= 0 AND `Stress Level` <= 10", "Stress
        Level within expected range [0, 10]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
  '["Age","BMI Category","Diastolic","Heart Rate","Sleep Disorder","Systolic"]':
    code:
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (''Sleep
        Apnea'', ''Insomnia'')", "Valid Sleep Disorder values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`BMI Category` IN (''Overweight'', ''Normal'', ''Obese'',
        ''Normal Weight'')", "Valid BMI Category values", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`BMI Category` IN (''Overweight'',
        ''Normal'', ''Obese'', ''Normal Weight'')", "Valid BMI Category values", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.9266666666666666 does not meet
        the constraint requirement!'
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Diastolic","Physical Activity Level","Quality of Sleep","Sleep Duration","Stress Level","Systolic"]':
    code:
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        x: abs(x) > 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Stress Level'', ''Quality of Sleep'', lambda
        x: x < 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Blood Pressure` RLIKE ''^[0-9]{2,3}/[0-9]{2,3}$''",
        "Blood Pressure Format", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`Blood Pressure` RLIKE ''^[0-9]{2,3}/[0-9]{2,3}$''",
        "Blood Pressure Format", lambda x: x == 1.0)'' failed on data sample: Value:
        0.9 does not meet the constraint requirement!'
      level: error
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        x: x == x)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0'',
        ''Valid Sleep Duration Range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` >= 3.0 AND `Quality of Sleep` <=
        9.0'', ''Valid Quality of Sleep Range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        x: x >= 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Stress Level'', ''Quality of Sleep'', lambda
        x: x <= -0.3)'
      status: true
      reason_if_failed: ''
      level: warning
