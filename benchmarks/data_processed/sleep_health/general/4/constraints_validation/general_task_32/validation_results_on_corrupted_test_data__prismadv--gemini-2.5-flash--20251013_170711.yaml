results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete("Physical Activity Level")
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete("Quality of Sleep")
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''BMI Category'')'' failed on data
        sample: Value: 0.9266666666666666 does not meet the constraint requirement!'
      level: error
    - suggestion: '.isContainedIn(''BMI Category'', [''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: '.satisfies("`Blood Pressure` REGEXP ''^[1-9][0-9]*/[1-9][0-9]*$''",
        "Valid Blood Pressure Format and Positive Values", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`Blood Pressure` REGEXP ''^[1-9][0-9]*/[1-9][0-9]*$''",
        "Valid Blood Pressure Format and Positive Values", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.9 does not meet the constraint requirement!'
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete(column='Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(columnCondition="`Sleep Duration` >= 3.0 AND `Sleep
        Duration` <= 12.0", constraintName="Sleep Duration within 3.0 and 12.0", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x < 1.0, "Sleep
        Disorder column is expected to contain null values, implying completeness
        less than 1.0")'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Insomnia'', ''Sleep Apnea''],
        lambda x: x == 1.0, "Non-null Sleep Disorder values must be ''Insomnia'' or
        ''Sleep Apnea''")'
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Heart Rate` <= 250", "Physiologically plausible Heart
        Rate", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Stress Level` >= 1 AND `Stress Level` <= 10", "Stress
        Level is positive and within expected operational range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: '.hasCompleteness("Age", lambda x: x <= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative("Age", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Age` <= 120", "Plausible Age Range", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        x: x >= 0.3)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration","Stress Level"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` > 7 AND `Stress Level`
        < 5 THEN `Sleep Duration` BETWEEN 6.0 AND 10.0 ELSE TRUE END", "Conditional
        Sleep Duration Range Consistency", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
