results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100'', ''PAL in [0,100]'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.hasCompleteness(''Quality of Sleep'', lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: ".satisfies('`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10',\
        \ 'Quality of Sleep within 0\u201310', lambda x: x == 1)"
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` >= 4 AND `Quality of Sleep` <=
        9'', ''Typical Quality of Sleep range'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Blood Pressure` RLIKE ''^\\s*[0-9]{2,3}\\s*/\\s*[0-9]{2,3}\\s*$''",
        "BP_format_ok", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: false
      reason_if_failed: 'Constraint ''isComplete(''Person ID'')'' failed on data sample:
        Value: 0.98 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies(''`Person ID` >= 0'', ''Non-negative Person IDs'', lambda
        x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`Person ID` >= 0'', ''Non-negative
        Person IDs'', lambda x: x == 1)'' failed on data sample: Value: 0.9733333333333334
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''TRIM(CAST(`Person ID` AS STRING)) = CAST(`Person ID`
        AS STRING)'', ''No surrounding whitespace in Person ID'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''TRIM(CAST(`Person ID` AS STRING))
        = CAST(`Person ID` AS STRING)'', ''No surrounding whitespace in Person ID'',
        lambda x: x == 1)'' failed on data sample: Value: 0.98 does not meet the constraint
        requirement!'
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `Sleep Duration` >= 0 AND `Sleep Duration`
        <= 24 THEN 1 ELSE 0 END'', ''Sleep Duration in plausible range'', lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `Sleep Duration` >= 3 AND `Sleep Duration`
        <= 13 THEN 1 ELSE 0 END'', ''Sleep Duration near scoring window'', lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.hasApproxQuantile(''Daily Steps'', 0.95, lambda q: q <= 30000)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda c: c >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (`Sleep Disorder` IN
        (''Insomnia'',''Sleep Apnea''))", "Sleep Disorder values allowed or NULL",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (`Sleep Disorder` RLIKE
        ''^(Insomnia|Sleep Apnea)$'')", "Sleep Disorder exact match (case/whitespace)",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (TRIM(`Sleep Disorder`)
        NOT IN (''NullValue'',''UNKNOWN'',''Unknown'',''N/A'',''NA'',''None'','''')
        AND LENGTH(TRIM(`Sleep Disorder`)) > 0)", "Sleep Disorder uses NULL for missing;
        no placeholders", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Sleep Disorder", lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Heart Rate` >= 30 AND `Heart Rate` <= 220'', ''Heart
        Rate within [30,220]'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("`Stress Level` IS NOT NULL", "Stress Level completeness",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Stress Level` >= 3 AND `Stress Level` <= 10", "Stress
        Level within expected range [3, 10]", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
  '["Age","Gender","Person ID"]':
    code:
    - suggestion: '.satisfies("(`Person ID` IS NULL) OR (`Age` IS NOT NULL AND `Gender`
        IS NOT NULL)", "ID-demographics co-presence", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(`Gender`) IN (''Male'',''Female'')", ''Valid Gender
        category'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Person ID","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (`Sleep Disorder` IN
        (''Insomnia'',''Sleep Apnea''))", "Sleep Disorder allowed values or null",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL AND NOT
        isnan(CAST(`Sleep Duration` AS DOUBLE)) AND CAST(`Quality of Sleep` AS DOUBLE)
        IS NOT NULL AND NOT isnan(CAST(`Quality of Sleep` AS DOUBLE))", "sleep_fields_complete",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS DOUBLE) >= 0 AND CAST(`Sleep
        Duration` AS DOUBLE) <= 24 AND CAST(`Quality of Sleep` AS DOUBLE) >= 0 AND
        CAST(`Quality of Sleep` AS DOUBLE) <= 10", "sleep_ranges_valid", lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
