results:
  '["recommendations","risk_score"]':
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Quality of Sleep` >= 0 AND `Quality of Sleep` <=
        10'', ''qos_in_0_10'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\s*\d+\s*/\s*\d+\s*$'', lambda
        f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'',
        ''sleep_duration_0_24'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Stress Level` >= 0 AND `Stress Level` <= 10'', ''stress_0_10'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('`Daily Steps`')
      status: true
      reason_if_failed: ''
      level: warning
  Physical Activity Level:
    code:
    - suggestion: .isNonNegative('`Physical Activity Level`')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Physical Activity Level` IS NOT NULL AND `Daily Steps`
        IS NOT NULL'', ''PAL and Steps both present for polyfit'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Stress Level","recommendations"]':
    code:
    - suggestion: .isComplete("Quality of Sleep")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("Stress Level")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Blood Pressure` IS NOT NULL AND regexp_like(`Blood
        Pressure`, ''^[ ]*[0-9]{2,3}[ ]*/[ ]*[0-9]{2,3}[ ]*$'')", "Valid Blood Pressure
        format for Systolic/Diastolic parsing", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Stress Level` BETWEEN 3 AND 8", "Stress Level within
        expected bounds (3-8)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("`Quality of Sleep` BETWEEN 0 AND 10", "QoS in 0-10
        scale", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("lower(trim(`BMI Category`)) IN (''normal'',''normal
        weight'',''overweight'',''obese'')", "BMI Category in expected set", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("length(trim(`BMI Category`)) > 0", "BMI Category non-empty
        after trim", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","Diastolic","Systolic"]':
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\s*\\d{2,3}\\s*/\\s*\\d{2,3}\\s*$'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(TRIM(split(`Blood Pressure`, "/")[0]) AS INT)
        >= CAST(TRIM(split(`Blood Pressure`, "/")[1]) AS INT)'', ''BP systolic_ge_diastolic'',
        lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(CAST(TRIM(split(`Blood Pressure`, "/")[0]) AS INT)
        BETWEEN 80 AND 250) AND (CAST(TRIM(split(`Blood Pressure`, "/")[1]) AS INT)
        BETWEEN 40 AND 150)'', ''BP plausible physiologic range'', lambda v: v >=
        0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: false
      reason_if_failed: 'Constraint ''isComplete(''Person ID'')'' failed on data sample:
        Value: 0.98 does not meet the constraint requirement!'
      level: warning
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL", "Sleep
        Duration numeric", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "Sleep Duration within 0-24h", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.satisfies(''CAST(`Daily Steps` AS DOUBLE) IS NOT NULL AND CAST(`Physical
        Activity Level` AS DOUBLE) IS NOT NULL'', ''Polyfit inputs available'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Daily Steps` AS DOUBLE) >= 0'', ''Daily Steps
        non-negative'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.hasCompleteness(''Heart Rate'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Heart Rate` BETWEEN 30 AND 220", "Heart Rate plausible
        range (bpm)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("`Stress Level` >= 0 AND `Stress Level` <= 10", "Stress
        Level within [0,10]", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('Age')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Age` IS NULL OR (`Age` >= 0 AND `Age` <= 120)'',
        ''Age within plausible human range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["BMI Category","Daily Steps","Diastolic","Physical Activity Level","Quality
    of Sleep","Sleep Duration","Stress Level","Systolic","risk_score"]'
  : code:
    - suggestion: '.hasPattern("Blood Pressure", r"^\s*\d{2,3}\s*/\s*\d{2,3}\s*$",
        lambda v: v == 1.0, name="blood_pressure_format_valid")'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "sleep_duration_range", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Quality of Sleep` BETWEEN 0 AND 10) AND (CAST(`Quality
        of Sleep` AS INT) = `Quality of Sleep`)", "qos_in_0_10_integer", lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Stress Level` BETWEEN 0 AND 10) AND (CAST(`Stress
        Level` AS INT) = `Stress Level`)", "stress_level_in_0_10_integer", lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 200", "pal_plausible_range", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Daily Steps` AS DOUBLE) IS NOT NULL AND `Daily
        Steps` >= 0", "daily_steps_non_negative", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn("BMI Category", ["Overweight", "Normal", "Obese",
        "Normal Weight"])
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","recommendations"]':
    code:
    - suggestion: '.isContainedIn(''BMI Category'', [''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese''], assertion=lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: .isComplete('Physical Activity Level').isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        c: c >= 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Daily Steps` >= 0 AND `Daily Steps` <= 100000'',
        ''Daily Steps plausible range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 200'', ''PAL plausible range'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Diastolic","Systolic"]':
    code:
    - suggestion: '.satisfies("cast(regexp_extract(`Blood Pressure`, ''^([0-9]+)'',
        1) as int) >= cast(regexp_extract(`Blood Pressure`, ''/([0-9]+)$'', 1) as
        int)", "Systolic at least Diastolic (parsed from Blood Pressure)", lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Diastolic","Systolic","recommendations"]':
    code:
    - suggestion: '.satisfies("(CAST(trim(element_at(split(`Blood Pressure`, ''/''),
        1)) AS INT) BETWEEN 70 AND 250) AND (CAST(trim(element_at(split(`Blood Pressure`,
        ''/''), 2)) AS INT) BETWEEN 40 AND 150)", "bp_range_plausible", lambda v:
        v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''Gender'', [''Male'', ''Female''], lambda x: x
        >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Physical Activity Level","recommendations"]':
    code:
    - suggestion: .isNonNegative("`Physical Activity Level`")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Physical Activity Level", lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","qos"]':
    code:
    - suggestion: '.satisfies(''(`Quality of Sleep` >= 0 AND `Quality of Sleep` <=
        10)'', ''QoS within [0,10]'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","recommendations"]':
    code:
    - suggestion: '.satisfies(''`Quality of Sleep` BETWEEN 1 AND 10'', ''QoS in [1,10]'',
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Sleep Duration","recommendations"]':
    code:
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "sleep_duration_is_plausible_hours", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
