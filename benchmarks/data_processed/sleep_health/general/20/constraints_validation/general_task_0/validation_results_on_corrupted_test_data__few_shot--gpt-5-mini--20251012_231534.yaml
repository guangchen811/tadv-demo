results:
  Blood Pressure:
    code:
    - suggestion: .hasPattern('Blood Pressure', '^\\d+/\\d+$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Daily Steps')
      status: false
      reason_if_failed: "Constraint '.isNonNegative('Daily Steps')' failed on data\
        \ sample: org.apache.spark.sql.catalyst.parser.ParseException: \n[PARSE_SYNTAX_ERROR]\
        \ Syntax error at or near '('.(line 1, pos 13)\n\n== SQL ==\nCOALESCE(CAST(Daily\
        \ Steps AS DECIMAL(20,10)), 0.0) >= 0\n-------------^^^\n"
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''Person ID'')'' failed on data
        sample: Value: 0.98 does not meet the constraint requirement!'
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Physical Activity Level:
    code:
    - suggestion: '.hasMax(''Physical Activity Level'', lambda x: x <= 100)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Physical Activity Level'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.hasMax(''Quality of Sleep'', lambda x: x <= 10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Quality of Sleep'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Sleep Duration')
      status: false
      reason_if_failed: "Constraint '.isNonNegative('Sleep Duration')' failed on data\
        \ sample: org.apache.spark.sql.catalyst.parser.ParseException: \n[PARSE_SYNTAX_ERROR]\
        \ Syntax error at or near '('.(line 1, pos 13)\n\n== SQL ==\nCOALESCE(CAST(Sleep\
        \ Duration AS DECIMAL(20,10)), 0.0) >= 0\n-------------^^^\n"
      level: error
  Stress Level:
    code:
    - suggestion: '.hasMax(''Stress Level'', lambda x: x <= 10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Stress Level'', lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
