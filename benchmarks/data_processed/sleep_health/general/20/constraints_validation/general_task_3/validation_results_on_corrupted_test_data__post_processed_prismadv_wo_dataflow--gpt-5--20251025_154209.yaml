        0.95)'
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IS NULL THEN 1 WHEN LENGTH(`BMI
        Category`) = LENGTH(TRIM(`BMI Category`)) THEN 1 ELSE 0 END", "BMI Category
        trimmed", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: '.hasCompleteness("BMI Category", lambda c: c >= 0.99)'
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: '.hasNumberOfDistinctValues("BMI Category", lambda n: (n >= 1) and
        (n <= 4), None, None)'
      status: true
      reason_if_failed: ''
      level: undefined
  Blood Pressure:
    code:
    - suggestion: '.hasCompleteness(''Blood Pressure'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', ''^(\\d{2,3})/(\\d{2,3})$'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: '.hasCompleteness(''Person ID'', lambda c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Person ID')
      status: false
      reason_if_failed: 'Constraint ''isComplete(''Person ID'')'' failed on data sample:
        Value: 0.98 does not meet the constraint requirement!'
      level: warning
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "Sleep Duration within 0-24 hours", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Sleep Duration", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL", "At least one row with both Duration and QoS present", lambda
        x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation("Sleep Duration", lambda s: s > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Daily Steps` AS DOUBLE) IS NOT NULL'', ''Daily
        Steps numeric-parseable'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Daily Steps'', lambda x: x <= 100000)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxQuantile(''Daily Steps'', 0.9, lambda q: q <= 30000)'
