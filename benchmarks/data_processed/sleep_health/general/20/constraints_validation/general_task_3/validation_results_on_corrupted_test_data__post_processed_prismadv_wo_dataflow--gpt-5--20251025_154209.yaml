      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Daily Steps` RLIKE "^[0-9]+$"'', ''Daily Steps integer-like'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda c: c > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (`Sleep Disorder` RLIKE
        ''^(Sleep Apnea|Insomnia)$'')", "Sleep Disorder labels valid when present",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Heart Rate` BETWEEN 30 AND 220", "HR physiological
        range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Heart Rate` BETWEEN 70 AND 120", "HR within modeled
        range", lambda x: x >= 0.56)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`Heart Rate` BETWEEN 70 AND 120",
        "HR within modeled range", lambda x: x >= 0.56)'' failed on data sample: Value:
        0.5533333333333333 does not meet the constraint requirement!'
