  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Stress Level` AS DOUBLE) >= 0 AND CAST(`Stress
        Level` AS DOUBLE) <= 10'', ''Stress Level in [0,10]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(Age AS DOUBLE) BETWEEN 0 AND 120'', ''Age within
        0..120'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(Age AS DOUBLE) = FLOOR(CAST(Age AS DOUBLE))'',
        ''Age integer-like'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies("`Daily Steps` IS NOT NULL AND `Physical Activity Level`
        IS NOT NULL", "ds_pal_nonnull", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(columnA="Daily Steps", columnB="Physical Activity
        Level", assertion=lambda corr: corr >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Quality of Sleep","Sleep Duration","Stress Level"]':
    code:
    - suggestion: '.satisfies("isNotNull(`Sleep Duration`) AND isNotNull(`Quality
        of Sleep`) AND isNotNull(`Stress Level`) AND isNotNull(`Daily Steps`)", "all_core_features_complete",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("isNull(`Daily Steps`) OR isNotNull(`Physical Activity
        Level`)", "pal_present_when_steps_present", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        v: v >= 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda v:
        v >= 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Stress Level", "Quality of Sleep", lambda v: v
        <= -0.1)'
      status: true
      reason_if_failed: ''
      level: warning
