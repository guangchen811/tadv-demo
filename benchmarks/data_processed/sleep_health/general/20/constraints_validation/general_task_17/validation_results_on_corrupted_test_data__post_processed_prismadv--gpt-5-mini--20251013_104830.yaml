results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies(''CASE WHEN `Physical Activity Level` BETWEEN 0 AND
        100 THEN 1 ELSE 0 END'', ''PAL_in_0_100'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `Physical Activity Level` = FLOOR(`Physical
        Activity Level`) THEN 1 ELSE 0 END'', ''PAL_is_integer'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` BETWEEN 0 AND 10 THEN
        1 ELSE 0 END", "Quality in 0-10", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` = FLOOR(`Quality of Sleep`)
        THEN 1 ELSE 0 END", "Quality integer", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN TRIM(`BMI Category`) IN (''Obese'',''Overweight'',''Normal'',''Normal
        Weight'') THEN 1 ELSE 0 END", "Trimmed BMI Category valid", lambda x: x >=
        0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete("Blood Pressure")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(split_part(`Blood Pressure`,''/'',1)
        AS INT) BETWEEN 30 AND 300 AND CAST(split_part(`Blood Pressure`,''/'',2) AS
        INT) BETWEEN 30 AND 200 THEN 1 ELSE 0 END", "BP_reasonable_range", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: false
      reason_if_failed: 'Constraint ''isComplete(''Person ID'')'' failed on data sample:
        Value: 0.98 does not meet the constraint requirement!'
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isPositive(''`Person ID`'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("CASE WHEN cast(`Sleep Duration` as double) IS NOT NULL
        THEN 1 ELSE 0 END", "Sleep Duration is numeric/castable", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` IS NOT NULL THEN 1 ELSE
        0 END", "No missing Sleep Duration", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` >= 0 AND `Sleep Duration`
        <= 24 THEN 1 ELSE 0 END", "Sleep Duration in hours 0-24", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` >= 3 AND `Sleep Duration`
        <= 12 THEN 1 ELSE 0 END", "Sleep Duration within expected human range 3-12
        hours", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Daily Steps` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "Daily Steps parsable as number", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative("`Daily Steps`", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN floor(`Daily Steps`) = `Daily Steps` THEN
        1 ELSE 0 END", "Daily Steps integral", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL THEN 1 WHEN lower(`Sleep
        Disorder`) LIKE ''%sleep apnea%'' OR lower(`Sleep Disorder`) LIKE ''%insomnia%''
        THEN 1 ELSE 0 END", "Sleep Disorder recognized (case-insensitive substring)",
        lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` >= 30 AND `Heart Rate` <= 220
        THEN 1 ELSE 0 END", "Heart Rate in plausible range", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` IS NOT NULL AND floor(cast(`Heart
        Rate` AS double)) = cast(`Heart Rate` AS double) THEN 1 ELSE 0 END", "Heart
        Rate integer", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Stress Level` AS DOUBLE) BETWEEN
        0 AND 10 THEN 1 ELSE 0 END", "Stress Level in [0,10]", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Stress Level` AS DOUBLE) IS NULL
        OR TRY_CAST(`Stress Level` AS DOUBLE) = FLOOR(TRY_CAST(`Stress Level` AS DOUBLE))
        THEN 1 ELSE 0 END", "Stress Level integer-valued (or null)", lambda x: x >=
        0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: '.hasCompleteness("Age", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Age` BETWEEN 0 AND 120 THEN 1 ELSE 0 END",
        "Age_in_range", lambda x: x >= 0.995)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Age` IS NULL THEN 0 WHEN (`Age` - FLOOR(`Age`))
        = 0 THEN 1 ELSE 0 END", "Age_is_integer", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Age","age_risk"]':
    code:
    - suggestion: '.haveCompleteness([''Age''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level","activity_index","activity_protect","vigorous_bonus"]':
    code:
    - suggestion: '.satisfies(''`Daily Steps` >= 0'', ''daily_steps_non_negative'',
        lambda x: x == 1)

        .satisfies(''`Physical Activity Level` >= 0'', ''physical_activity_level_non_negative'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level","sq_risk"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` IS NOT NULL AND `Quality
        of Sleep` >= 0 AND `Quality of Sleep` <= 10 AND `Stress Level` IS NOT NULL
        AND `Stress Level` >= 0 AND `Stress Level` <= 10 THEN 1 ELSE 0 END", "SQ Range
        0-10", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
