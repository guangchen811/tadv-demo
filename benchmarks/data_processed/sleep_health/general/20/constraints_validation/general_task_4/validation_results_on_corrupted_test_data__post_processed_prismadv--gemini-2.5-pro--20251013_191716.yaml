results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete("Physical Activity Level")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation("Physical Activity Level", lambda x: x >
        0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isContainedIn("Quality of Sleep", ["4", "5", "6", "7", "8", "9"])
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: .isContainedIn("BMI Category", ["Normal", "Normal Weight", "Overweight",
        "Obese"])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .hasPattern("Blood Pressure", r"^\d+/\d+$", hint="Blood Pressure
        Format Check")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) > CAST(SPLIT(`Blood
        Pressure`, ''/'')[1] AS INT)", "Systolic > Diastolic Check", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: false
      reason_if_failed: 'Constraint ''isComplete("Person ID")'' failed on data sample:
        Value: 0.98 does not meet the constraint requirement!'
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative("`Person ID`")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax("Person ID", lambda max_val: max_val < 10000000)'
      status: false
      reason_if_failed: 'Constraint ''hasMax("Person ID", lambda max_val: max_val
        < 10000000)'' failed on data sample: Expected type of column Person ID to
        be one of (LongType,IntegerType,org.apache.spark.sql.types.DecimalType$@d5c7148,DoubleType,ByteType,FloatType,ShortType),
        but found StringType instead!'
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete("Sleep Duration")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin("Sleep Duration", lambda min_val: min_val >= 3.0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete("Daily Steps")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative("`Daily Steps`")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation("Daily Steps", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Insomnia'', ''Sleep Apnea''],
        lambda x: x > 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete("Stress Level")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation("Stress Level", lambda sd: sd > 0)'
      status: true
      reason_if_failed: ''
      level: error
  ? '["BMI Category","Blood Pressure","Daily Steps","Person ID","Physical Activity
    Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) > CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT)", "SystolicGreaterThanDiastolic", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Physical Activity Level", "Daily Steps", lambda
        corr: corr > 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda corr:
        corr > 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Stress Level", "Quality of Sleep", lambda corr:
        corr < -0.3)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$' AND CAST(SPLIT(`Blood
        Pressure`, '/')[0] AS INT) > CAST(SPLIT(`Blood Pressure`, '/')[1] AS INT)",
        "Blood Pressure Validation")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`Sleep Duration` >= 3.0 AND `Quality of Sleep` >= 4.0",
        "Synergy Score Prerequisite")
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda c:
        c > 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Stress Level", "Quality of Sleep", lambda c: c
        < -0.3)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Quality of Sleep` >= 4 AND `Sleep Duration` >= 3",
        "SynergyInputConstraint", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation("Physical Activity Level", "Daily Steps", lambda
        x: x > 0.3)'
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda x:
        x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` >= 3.0 AND `Quality of Sleep` >= 4.0",
        "Synergy calculation prerequisites", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
