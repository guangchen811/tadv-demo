  '["Quality of Sleep","qos"]':
    code: []
    assumptions:
    - text: 'The column ''qos'' is intended to be the integer-casted version of ''Quality
        of Sleep'' (i.e., qos == int(Quality of Sleep) for every row). This must hold
        because the code does qos = df[''Quality of Sleep'']; df[''qos''] = qos.astype(int)
        and later logic and recommendations rely on integer comparisons (e.g., qos
        <= 6). Actionable constraint examples: a Deequ-like predicate constraint such
        as .satisfies("qos = cast(Quality of Sleep as Int)", "qos_matches_quality_of_sleep_as_int").'
      sources:
      - start_line: 85
        end_line: 86
        file: ''
      - start_line: 33
        end_line: 36
        file: ''
      uid: ce8298bf-708a-4a6a-a7ee-92d48059d219
    - text: 'Values in ''Quality of Sleep'' (and therefore ''qos'' after casting)
        must be on the expected 0..10 scale so that qos normalization (qos / 10.0)
        yields a value in [0.0, 1.0]. If values fall outside 0..10 the qos_risk computation
        (1.0 - qos_norm) will be invalid or produce out-of-range risk contributions.
        Actionable constraint examples: .satisfies("Quality of Sleep >= 0 AND Quality
        of Sleep <= 10", "quality_of_sleep_in_0_10") or .satisfies("qos / 10.0 BETWEEN
        0.0 AND 1.0", "qos_norm_in_0_1").'
      sources:
      - start_line: 85
        end_line: 88
        file: ''
      - start_line: 133
        end_line: 144
        file: ''
      uid: 60f7424b-a400-4177-95e5-58c37fbd9b53
    - text: 'Whenever ''qos'' <= 6 the generated ''recommendations'' string must include
        the sleep-hygiene suggestion present in build_recommendations ("Optimize sleep
        hygiene: dim lights, avoid screens 60 min pre-bed, keep bedroom cool and dark.").
        This is required because the recommendation generation logic appends that
        string conditionally on qos <= 6. Actionable constraint example: .satisfies("(qos
        <= 6) => recommendations LIKE ''%Optimize sleep hygiene:%''", "recommendation_includes_sleep_hygiene_when_qos_low").'
      sources:
      - start_line: 33
        end_line: 36
        file: ''
      - start_line: 152
        end_line: 153
        file: ''
      uid: fb48c848-f885-4611-80b1-3d2f9a0a342e
    - text: '''Quality of Sleep'' and ''Sleep Duration'' must both be present (non-null
        / numeric) for the per-row risk calculation to be meaningful because duration_risk
        and qos_risk are computed and combined into risk_score. If either is missing
        the combined risk will be NaN or miscomputed. Actionable constraint examples:
        .hasCompleteness(''Quality of Sleep'', 1.0) and .hasCompleteness(''Sleep Duration'',
        1.0), or a conditional constraint .satisfies("Quality of Sleep IS NOT NULL
        AND Sleep Duration IS NOT NULL", "qos_and_duration_present").'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 81
        end_line: 83
