        file: ''
      uid: 3e0838a3-b3d3-44c6-8e4b-b01023d1091b
    - text: 'Both ''Systolic'' and ''Diastolic'' must lie within reasonable numeric
        ranges expected by the bp_stage_risk thresholds so comparisons behave sensibly.
        For example enforce: 50 <= Systolic <= 300 and 30 <= Diastolic <= 200 (or
        an equivalent clinically appropriate range). This can be encoded as a combined
        predicate: .satisfies(''Systolic >= 50 AND Systolic <= 300 AND Diastolic >=
        30 AND Diastolic <= 200'', [''Systolic'',''Diastolic'']).'
      sources:
      - start_line: 8
        end_line: 16
        file: ''
      - start_line: 123
        end_line: 123
        file: ''
      uid: 0232412c-e150-47a6-ab91-a43c1fc0d219
    - text: 'The parsed numeric pair (''Systolic'',''Diastolic'') should be consistent
        with the original ''Blood Pressure'' string: for each row, Blood Pressure
        == f"{Systolic}/{Diastolic}" (or equivalently both parts convert back to the
        original string when formatted). This ensures the derived columns reflect
        the source column and can be enforced as: .satisfies(''Blood Pressure == concat(cast(Systolic
        as string), "/", cast(Diastolic as string))'', [''Blood Pressure'',''Systolic'',''Diastolic'']).'
      sources:
