  BMI Category:
    code:
    - suggestion: .isComplete("BMI Category")
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 4cfd117b-8109-4a16-b9a4-1d969208b272
      source_assumptions:
      - e5ca050f-2d95-4a45-a17f-95465f1b9992
    - suggestion: '.satisfies("CASE WHEN lower(trim(`BMI Category`)) IN (''normal'',''normal
        weight'',''overweight'',''obese'') THEN 1 ELSE 0 END", "Mapped BMI Fraction",
        lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 830e0988-4899-4d99-9baf-0247cdbee787
      source_assumptions:
      - ababa4b4-8535-4f60-aba2-90bec670b519
      - 2ca97956-9788-4ee7-84f6-677e72504df2
      - 1aa1211e-d8e5-471c-bef0-fdb5790ed217
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IS NOT NULL AND trim(`BMI
        Category`) != '''' THEN 1 ELSE 0 END", "BMI Category Not Null/Blank", lambda
        x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 1685b3a9-2973-4992-aabd-e168ac1dd4af
      source_assumptions:
      - 3376d1cd-7f9c-490f-9ca4-fbf30534ef63
    assumptions:
    - text: The input must contain a 'BMI Category' column. The script accesses df['BMI
        Category'] and uses it downstream for risk mapping, recommendation logic,
        and output selection, so the column is required.
      sources:
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 113
        end_line: 113
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      - start_line: 156
        end_line: 156
        file: ''
      uid: e5ca050f-2d95-4a45-a17f-95465f1b9992
    - text: 'Values in ''BMI Category'' should be one of the expected categorical
        labels (case-insensitive): ''normal'', ''normal weight'', ''overweight'',
        or ''obese''. The code maps these lower-cased labels to numeric risk weights;
        values outside this set will be treated as ''unknown'' and receive a default
        risk. A recommended validation rule (Deequ-style) is:

        .satisfies("CASE WHEN lower(trim(`BMI Category`)) IN (''normal'',''normal
        weight'',''overweight'',''obese'') THEN 1 ELSE 0 END", "Valid BMI Category",
        lambda x: x >= 0.95)

        (or require == 1.0 if you need strict coverage).'
      sources:
      - start_line: 113
        end_line: 119
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: ababa4b4-8535-4f60-aba2-90bec670b519
    - text: 'Entries in ''BMI Category'' should be non-null and represent real category
        strings (i.e., not blank/NaN). The code does .astype(str) and .str.lower()
        and relies on these values for mapping and recommendation branching; null/blank
        values will either become the string ''nan'' or be mapped to a default risk.
        A suggested check:

        .satisfies("CASE WHEN `BMI Category` IS NOT NULL AND trim(`BMI Category`)
        != '''' THEN 1 ELSE 0 END", "BMI Category Not Null/Blank", lambda x: x >=
        0.95)

        (or == 1.0 if you expect no missing/blank values).'
      sources:
      - start_line: 113
        end_line: 113
        file: ''
      - start_line: 120
        end_line: 120
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: 3376d1cd-7f9c-490f-9ca4-fbf30534ef63
    - text: 'Values should not contain unexpected leading/trailing whitespace or casing
        variants that would prevent exact lower-case matching. The code lower-cases
        values but does not trim them before mapping or membership checks, so ''overweight
        '' or '' obese'' would be treated as unknown. A validation expressing that
        trimmed lower-case equals the allowed set is:

        .satisfies("CASE WHEN lower(trim(`BMI Category`)) IN (''normal'',''normal
        weight'',''overweight'',''obese'') THEN 1 ELSE 0 END", "Trimmed BMI Category
        Valid", lambda x: x >= 0.95)

        (or use a Great Expectations expectation that lower(trim(value)) is in the
        allowed set).'
      sources:
      - start_line: 113
        end_line: 113
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: 2ca97956-9788-4ee7-84f6-677e72504df2
    - text: 'The proportion of values outside the mapped categories (i.e., values
        that will hit the .fillna(0.1) fallback) should be small (suggest <= 5%).
        If many values are unmapped, risk calculations and recommendations may be
        inaccurate. Deequ-style check:

        .satisfies("CASE WHEN lower(trim(`BMI Category`)) IN (''normal'',''normal
        weight'',''overweight'',''obese'') THEN 1 ELSE 0 END", "Mapped BMI Fraction",
        lambda x: x >= 0.95)

        This enforces that at most 5% are mapped to the default fallback risk.'
      sources:
      - start_line: 119
        end_line: 120
        file: ''
      - start_line: 133
        end_line: 139
        file: ''
      uid: 1aa1211e-d8e5-471c-bef0-fdb5790ed217
  Blood Pressure:
    code:
    - suggestion: '.satisfies(''regexp_like(`Blood Pressure`, "^ *[0-9]{1,3} */ *[0-9]{1,3}
        *$")'', ''Valid BP format (systolic/diastolic integers, no units)'', lambda
        x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 6591ddbf-cb70-49e5-9f01-b39a8ca99e10
      source_assumptions:
      - bfd41314-da27-4895-9c6b-8f91698a72a2
      - 8623c149-9eb7-4a32-b07e-d4fb38772463
      - 7d6dc361-92f7-4b2e-a16d-4189b59d24ab
    - suggestion: '.satisfies(''cast(split(`Blood Pressure`, "/")[0] as double) is
        not null AND cast(split(`Blood Pressure`, "/")[1] as double) is not null'',
        ''Parsable systolic and diastolic'', lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: a9a97a69-35f5-4407-8b64-0699ac3aa2b6
      source_assumptions:
      - 6156bcc2-4a8f-46e2-a66c-371a00a443f8
    - suggestion: '.satisfies(''cast(split(`Blood Pressure`, "/")[0] as int) BETWEEN
        40 AND 300 AND cast(split(`Blood Pressure`, "/")[1] as int) BETWEEN 30 AND
        200'', ''BP values within plausible clinical ranges'', lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: ceef0bbb-1ce7-423a-9830-799099681b9f
      source_assumptions:
      - 2f9071b9-77e2-4599-85ff-4d675e73b1be
    assumptions:
    - text: 'Every input value in the ''Blood Pressure'' column is a non-null string
        in the form ''systolic/diastolic'' (two numeric parts separated by a single
        ''/''). A suitable validation is to require that 100% of rows match a regex
        such as ''^\s*[0-9]{1,3}\s*/\s*[0-9]{1,3}\s*$''. Example Deequ-like constraint:
        .satisfies("regexp_like(`Blood Pressure`, ''^\\s*[0-9]{1,3}\\s*/\\s*[0-9]{1,3}\\s*$'')",
        ''Valid BP format'', lambda x: x == 1.0).'
      sources:
      - start_line: 91
        end_line: 92
        file: ''
      - start_line: 93
        end_line: 96
        file: ''
      uid: bfd41314-da27-4895-9c6b-8f91698a72a2
    - text: 'Both the systolic and diastolic parts must be parseable as numbers and
        convertible to integers (no missing second part, no non-numeric characters,
        and no NaNs after to_numeric). The code calls pd.to_numeric(..., errors=''coerce'')
        and then .astype(int), which will fail if either part cannot be converted
        to a numeric value. Example GE/deequ check: proportion of rows where to_numeric(split_part1)
        IS NOT NULL AND to_numeric(split_part2) IS NOT NULL should be 1.0.'
      sources:
      - start_line: 93
        end_line: 96
        file: ''
      uid: 6156bcc2-4a8f-46e2-a66c-371a00a443f8
    - text: The numeric systolic and diastolic values are expected to be whole numbers
        (integers), not fractional values, because the code casts parsed numbers to
        int with .astype(int). Validate that both parts contain only integer digits
        before parsing (or that after parsing they are integer-valued).
      sources:
      - start_line: 93
        end_line: 96
        file: ''
      uid: 8623c149-9eb7-4a32-b07e-d4fb38772463
    - text: "Systolic and diastolic values should be within plausible clinical ranges\
        \ consistent with subsequent comparisons in bp_stage_risk and recommendation\
        \ logic. For example, systolic should be within roughly 40\u2013300 and diastolic\
        \ within roughly 30\u2013200 so that comparisons like >=120, >=140, >180 and\
        \ >=80, >=90, >120 behave meaningfully. A validation rule could check: CASE\
        \ WHEN CAST(split_part1 AS INT) BETWEEN 40 AND 300 AND CAST(split_part2 AS\
        \ INT) BETWEEN 30 AND 200 THEN 1 ELSE 0 END has high coverage (e.g., >= 0.99\
        \ or == 1.0 depending on strictness)."
      sources:
      - start_line: 8
        end_line: 16
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 123
        end_line: 124
        file: ''
      uid: 2f9071b9-77e2-4599-85ff-4d675e73b1be
    - text: Input values should not include units or trailing text such as 'mmHg'
        attached to the numeric parts (e.g., '120/80 mmHg' or 'BP:120/80'), because
        that would prevent numeric conversion and cause NaNs before the .astype(int)
        cast. Enforce the 'systolic/diastolic' pattern (without unit suffix) across
        the dataset.
      sources:
      - start_line: 91
        end_line: 96
        file: ''
      - start_line: 95
        end_line: 96
        file: ''
