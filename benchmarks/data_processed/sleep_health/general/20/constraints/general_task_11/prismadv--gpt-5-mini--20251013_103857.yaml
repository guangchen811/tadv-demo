  '["BMI Category","bmi_risk"]':
    code: []
    assumptions:
    - text: 'Values in the ''BMI Category'' column (after lowercasing) should be drawn
        from the known set {''normal'', ''normal weight'', ''overweight'', ''obese''}.
        The code lowercases and maps these exact keys to numeric risks, and also checks
        membership for recommendations. A concrete constraint (single-column containment)
        would be: BMI Category (lowercased and trimmed) is contained in the allowed
        set. Example Deequ-style check (pseudo): .isContainedIn(''lower(bmi_category)'',
        [''normal'',''normal weight'',''overweight'',''obese'']).'
      sources:
      - start_line: 113
        end_line: 120
        file: ''
      - start_line: 48
        end_line: 49
        file: ''
      uid: 4a1069aa-ac0a-4381-a4ed-893c08a14a0b
    - text: "If a numeric column 'bmi_risk' exists (or when validating the derived\
        \ risk), its values must correspond to the mapping used in the code: 'normal'\
        \ or 'normal weight' -> 0.05; 'overweight' -> 0.30; 'obese' -> 0.60; any other/unknown\
        \ categories should be 0.10 (the fillna default). This is a multi-column integrity\
        \ rule: for each row, bmi_risk \u2248 mapping(BMI Category) (allow a small\
        \ numeric tolerance, e.g. abs(diff) < 1e-6 or 1e-3). Example predicate for\
        \ Deequ: .satisfies(\"(lower(bmi_category) IN ('normal','normal weight') AND\
        \ approx_equal(bmi_risk,0.05)) OR (lower(bmi_category)='overweight' AND approx_equal(bmi_risk,0.3))\
        \ OR (lower(bmi_category)='obese' AND approx_equal(bmi_risk,0.6)) OR (lower(bmi_category)\
        \ NOT IN (...) AND approx_equal(bmi_risk,0.1))\")."
      sources:
      - start_line: 113
        end_line: 120
        file: ''
      - start_line: 133
        end_line: 139
        file: ''
      uid: 45c5903d-510b-461b-bbdf-c56c803f3859
    - text: Rows whose BMI Category (case-insensitive) is 'overweight' or 'obese'
        should trigger a weight-management recommendation in the output 'recommendations'
        column. Concretely, when lower(BMI Category) IN ('overweight','obese') then
        the 'recommendations' string should contain the weight-management phrase (for
        example contains 'nutrition' or 'weight management' or the exact substring
        'Pair sleep regularity with nutrition planning'). This is a multi-column expectation
        (BMI Category -> recommendations).
      sources:
