      uid: b0df0919-c263-4c69-9709-980d237d4fe4
    - text: 'Systolic and Diastolic must be consistent with each other physiologically:
        for every record Systolic >= Diastolic. This multi-column invariant is required
        by the downstream classification logic and recommendations and can be expressed
        as a Deequ-style predicate: .satisfies(''Systolic >= Diastolic'', [''Systolic'',
        ''Diastolic'']).'
      sources:
      - start_line: 8
