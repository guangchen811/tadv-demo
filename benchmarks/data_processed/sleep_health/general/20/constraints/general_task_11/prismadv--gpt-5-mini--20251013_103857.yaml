        end_line: 57
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: 90aaa119-8285-4961-845f-03b14a4d25e7
    - text: 'BMI Category should not be missing/null (completeness = 1.0 expected)
        so that mapping and recommendation logic behave deterministically. If missing
        values are present they may be coerced to the string ''nan'' and fall through
        to the default risk (0.1) or omit the overweight/obese recommendation. Enforce:
        BMI Category completeness > 0.99 (or = 1.0).'
      sources:
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 113
        end_line: 116
