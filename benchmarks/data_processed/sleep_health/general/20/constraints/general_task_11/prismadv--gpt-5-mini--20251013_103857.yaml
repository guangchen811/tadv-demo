      - 6fbe581b-c3d8-4725-a1c5-35bc868c723e
    assumptions:
    - text: The 'Quality of Sleep' column must be present in the input CSV and accessible
        as df['Quality of Sleep']. The code reads df['Quality of Sleep'] directly
        (no guard) to build downstream fields, so the input must include this column.
      sources:
      - start_line: 85
        end_line: 85
        file: ''
      - start_line: 156
        end_line: 159
        file: ''
      uid: 9e3dea5e-f331-4eef-806d-8bb62dc650dd
    - text: 'Values in ''Quality of Sleep'' must be numeric or string values convertible
        to numeric. The code first coerces numeric columns with pd.to_numeric(...,
        errors=''coerce'') and then immediately does df[''qos''] = qos.astype(int).
        Any value that cannot be parsed to a number will become NaN and will cause
        the subsequent astype(int) to fail or produce incorrect results. Validation
        rule example: ensure that to_double(`Quality of Sleep`) IS NOT NULL for all
        rows (i.e., zero rows are non-convertible).'
      sources:
      - start_line: 72
        end_line: 76
        file: ''
      - start_line: 85
        end_line: 86
        file: ''
      uid: 9978b868-fce5-4d59-88a3-90fdd30b57b0
    - text: 'After numeric conversion, there must be no missing/null values in ''Quality
        of Sleep'' (zero nulls). Because the code casts the converted series to int
        without filling or guarding NaNs (df[''qos''] = qos.astype(int)), the input
        must not contain missing or unconvertible values that would become NaN. Validation
        rule example: .satisfies("CASE WHEN `Quality of Sleep` IS NOT NULL THEN 1
        ELSE 0 END", "QoS present", lambda x: x == 1).'
      sources:
      - start_line: 72
        end_line: 76
        file: ''
      - start_line: 86
        end_line: 86
        file: ''
      uid: b433d292-a873-4e3f-8ec5-82a9d47bc51d
    - text: "Values should be on a 0\u201310 scale (or 1\u201310 where 10 is max).\
        \ The code normalizes qos by dividing by 10.0 (qos_norm = df['qos'] / 10.0)\
        \ and later treats the normalized value as a fraction of a 0\u20131 range;\
        \ a comparison to threshold 6 (qos <= 6) is applied for recommendations. Therefore\
        \ input values should reasonably lie between 0 and 10 inclusive. Validation\
        \ example: .satisfies(\"CASE WHEN `Quality of Sleep` >= 0 AND `Quality of\
        \ Sleep` <= 10 THEN 1 ELSE 0 END\", \"QoS in 0-10\", lambda x: x == 1)."
      sources:
      - start_line: 87
        end_line: 88
        file: ''
      - start_line: 34
        end_line: 35
        file: ''
      uid: 2c229b41-f7eb-4b73-be72-f1b9a49d8680
    - text: 'Values are expected to be integer scores (discrete small set). The code
        casts qos to int (df[''qos''] = qos.astype(int)), which will truncate floats
        silently; to avoid silent data changes require integer-valued input (or explicitly
        allow rounding). Validation example: .satisfies("CASE WHEN `Quality of Sleep`
        % 1 = 0 THEN 1 ELSE 0 END", "QoS integer", lambda x: x >= 0.99).'
      sources:
      - start_line: 86
        end_line: 86
        file: ''
      - start_line: 72
        end_line: 76
        file: ''
