  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Both ''Sleep Duration'' and ''Quality of Sleep'' must be present and
        numeric-convertible for every record because the pipeline (1) coerces these
        columns to numeric, (2) casts ''Quality of Sleep'' to an integer ''qos'',
        and (3) uses both columns together to compute risk and generate recommendations.
        Actionable constraint (Deequ-style): .isComplete(["Sleep Duration", "Quality
        of Sleep"]) and/or .satisfies("Sleep Duration IS NOT NULL AND Quality_of_Sleep
        IS NOT NULL", "both_present"); and ensure both are parseable as numbers (no
        coercion to NaN).'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 85
        end_line: 86
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: 11e416e9-fbbc-4ce9-81ae-9b2754423b7d
    - text: "The pair ('Sleep Duration', 'Quality of Sleep') must fall into expected\
        \ value ranges used by downstream logic: Sleep Duration is expressed in hours\
        \ and should be within a reasonable human range (e.g., 0.0 <= Sleep Duration\
        \ <= 24.0), and Quality of Sleep is an integer-like score on a 0\u201310 scale\
        \ (0 <= Quality of Sleep <= 10). Actionable combined constraint example: .satisfies(\"\
        Sleep Duration >= 0.0 AND Sleep Duration <= 24.0 AND Quality_of_Sleep >= 0\
        \ AND Quality_of_Sleep <= 10\", \"range_check_sleep_qos\")."
      sources:
      - start_line: 81
        end_line: 84
        file: ''
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 85
        end_line: 88
        file: ''
      uid: c433f129-9bd5-445e-b856-c7e8690ae4aa
    - text: 'Casting ''Quality of Sleep'' to integer (df[''qos''] = qos.astype(int))
        and then using that ''qos'' in conditional logic (qos <= 6) implies that ''Quality
        of Sleep'' must be integer-valued (or safely roundable) and not NaN after
        numeric coercion. A multi-column actionable check is to require that Quality
        of Sleep is integer-like and that Sleep Duration is numeric at the same rows
        where recommendations are generated: .satisfies("(Quality_of_Sleep IS NOT
        NULL AND floor(Quality_of_Sleep) = Quality_of_Sleep) AND Sleep Duration IS
        NOT NULL", "qos_integer_and_duration_present").'
      sources:
      - start_line: 85
        end_line: 86
        file: ''
      - start_line: 33
        end_line: 35
        file: ''
      - start_line: 28
        end_line: 31
