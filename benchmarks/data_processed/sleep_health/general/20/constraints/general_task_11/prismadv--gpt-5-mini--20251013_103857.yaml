  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'np.polyfit is applied to the pair of columns ''Physical Activity Level''
        and ''Daily Steps''. Therefore there must be at least two rows where both
        ''Physical Activity Level'' and ''Daily Steps'' are present, numeric and finite,
        and the ''Physical Activity Level'' values are not all identical (otherwise
        the linear fit is undefined or unstable). Actionable checks (Deequ / SQL-style):

        - Ensure at least 2 rows with both values non-null and finite: .satisfies("Physical
        Activity Level IS NOT NULL AND Daily Steps IS NOT NULL", "pal_steps_non_null")
        and assert count >= 2.

        - Ensure variance in ''Physical Activity Level'' across rows used for fitting:
        e.g. compute approx distinct count or stddev > 0: .satisfies("approx_distinct(Physical
        Activity Level) > 1", "pal_not_constant").'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 98
        end_line: 104
        file: ''
      uid: 649a76bb-65e1-41a5-8acf-aaefce0404d8
    - text: 'The code assumes a positive relationship between ''Physical Activity
        Level'' and ''Daily Steps'' (a linear model is fit and used to compute expected
        steps). As a data quality assumption, these two columns should exhibit a positive
        Pearson correlation (suggested threshold: r >= 0.3). Actionable check: compute
        Pearson correlation(Physical Activity Level, Daily Steps) and assert it meets
        the threshold, or use a simple monotonicity check (e.g. median Daily Steps
        increases with buckets of Physical Activity Level).'
      sources:
      - start_line: 98
        end_line: 106
        file: ''
      - start_line: 41
        end_line: 45
        file: ''
      uid: 57e51297-2c9e-4ad3-b34e-0604bd067623
    - text: 'The recommendations logic links numeric PAL thresholds to step-count
        expectations: when ''Physical Activity Level'' >= 90 the code mentions maintaining
        ''>9000 steps''. Therefore rows with Physical Activity Level >= 90 should
        have Daily Steps values consistent with that statement (actionable constraint:
        for PAL >= 90 assert Daily Steps >= 9000). Example Deequ-style predicate:
        .satisfies("(Physical Activity Level < 90) OR (Daily Steps >= 9000)", "high_pal_has_high_steps").'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 98
        end_line: 106
        file: ''
      uid: 1b83d7cf-7eac-4ae3-982f-a8f288182295
    - text: 'The recommendations also assume that low Physical Activity Level corresponds
        to relatively low step counts (the code suggests adding 2000-3000 steps for
        PAL < 60). As a practical multi-column validation, enforce that rows with
        Physical Activity Level < 60 do not report implausibly high Daily Steps (suggested
        check: for PAL < 60 assert Daily Steps <= 7000). Example: .satisfies("(Physical
        Activity Level >= 60) OR (Daily Steps <= 7000)", "low_pal_has_lower_steps").'
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 98
        end_line: 106
        file: ''
      uid: 7f4b9518-6b2f-4a5d-abea-d5a18c812098
    - text: 'Both ''Physical Activity Level'' and ''Daily Steps'' are used numerically
        throughout (fitting, calculations, ratios). They must be non-negative and
        numeric (no Inf/NaN) in the rows used together. Actionable constraint: assert
        numeric and non-negative pairwise: .satisfies("Physical Activity Level IS
        NOT NULL AND Daily Steps IS NOT NULL AND Physical Activity Level >= 0 AND
        Daily Steps >= 0", "pal_steps_non_negative_and_present").'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 105
        end_line: 107
        file: ''
      uid: e0566eb0-c36d-44ff-bceb-972073f1b1bc
  '["Diastolic","Systolic"]':
    code: []
    assumptions:
    - text: 'The raw ''Blood Pressure'' string contains two numeric parts separated
        by a ''/'' for every record, and after parsing both ''Systolic'' and ''Diastolic''
        are present (non-null) and stored as integers. This can be enforced with constraints
        such as: ensure the ''Blood Pressure'' column matches a regex like ''^[0-9]+\/[0-9]+$''
        and that the derived columns are complete: .isComplete([''Systolic'', ''Diastolic'']).'
      sources:
