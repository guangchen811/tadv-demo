      source_assumptions:
      - 831c43a2-fd85-4668-891e-7593e29b8c19
    assumptions:
    - text: 'The ''Physical Activity Level'' column must be non-null for all input
        rows. The code treats this column as numeric and uses its values directly
        (e.g., in regression and threshold checks) without filling or handling missing
        PAL values. Example validation (Deequ/GEsque): .satisfies("CASE WHEN `Physical
        Activity Level` IS NOT NULL THEN 1 ELSE 0 END", "Non-null PAL", lambda x:
        x == 1)'
      sources:
      - start_line: 69
        end_line: 76
        file: ''
      - start_line: 98
        end_line: 105
        file: ''
      uid: ea3e81d3-60f6-4bbc-a65f-e07b15ff34fd
    - text: 'Values in ''Physical Activity Level'' must be numeric (or coercible to
        numeric) and finite. The pipeline calls pd.to_numeric on this column and later
        uses pal.values in np.polyfit and arithmetic operations; non-numeric values
        that coerce to NaN will break downstream math. Example validation: .satisfies("CASE
        WHEN TRY_CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL THEN 1 ELSE
        0 END", "PAL numeric/coercible", lambda x: x == 1)'
      sources:
      - start_line: 72
        end_line: 76
        file: ''
      - start_line: 102
        end_line: 106
        file: ''
      uid: 51695ca0-477e-446f-8c01-f0bed2a72699
    - text: "PAL should be on a bounded, non-negative scale consistent with the code's\
        \ threshold checks (expected roughly 0\u2013100). The code compares PAL to\
        \ 60 and 90 to choose recommendations, so input values outside a reasonable\
        \ 0\u2013100 range are unexpected. Example validation: .satisfies(\"CASE WHEN\
        \ `Physical Activity Level` >= 0 AND `Physical Activity Level` <= 100 THEN\
        \ 1 ELSE 0 END\", \"PAL in 0-100\", lambda x: x >= 0.95)"
      sources:
      - start_line: 42
        end_line: 45
        file: ''
      - start_line: 105
        end_line: 106
        file: ''
      uid: a4b5c579-7bdf-4fa2-ae69-b5a781b58a5f
    - text: 'To support the np.polyfit call, when the dataset has two or more rows
        the column should contain at least two non-identical (variable) numeric values
        paired with valid ''Daily Steps'' values. If all PAL values are identical
        (zero variance) or insufficient valid rows exist, np.polyfit may fail or produce
        degenerate results. Example validation: require count(`Physical Activity Level`
        IS NOT NULL AND `Daily Steps` IS NOT NULL) >= 2 AND approximate_number_distinct(`Physical
        Activity Level`) >= 2'
      sources:
      - start_line: 98
        end_line: 106
        file: ''
      - start_line: 72
        end_line: 76
        file: ''
      uid: 3a174788-ed53-4d10-b4b3-21a00eae69df
    - text: 'PAL is expected to be integral/whole-number-like (metadata indicates
        Integral and code casts numeric types). If decimals are present they should
        be acceptable, but typical inputs are integers (this can be validated by checking
        that values are whole numbers or within a small tolerance). Example validation:
        .satisfies("CASE WHEN abs(`Physical Activity Level` - round(`Physical Activity
        Level`)) < 1e-6 THEN 1 ELSE 0 END", "PAL integral", lambda x: x >= 0.9)'
      sources:
      - start_line: 72
        end_line: 76
        file: ''
      - start_line: 98
        end_line: 105
        file: ''
      uid: 831c43a2-fd85-4668-891e-7593e29b8c19
