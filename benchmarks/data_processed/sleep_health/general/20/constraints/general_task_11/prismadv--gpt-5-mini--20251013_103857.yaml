      uid: 6dd89fbb-fa20-4306-b7ff-76f1c16b12f1
  '["Blood Pressure","Diastolic","Systolic"]':
    code: []
    assumptions:
    - text: 'Every ''Blood Pressure'' value is a string in the form "SYSTOLIC/DIASTOLIC"
        where both parts are integers parseable to numeric types (no missing parts).
        This is required because the code does bp_str.str.split(''/'') and then pd.to_numeric
        on both parts and later astype(int). An actionable constraint example: assert
        all values match regex ''^\d{1,3}/\d{1,3}$'' and both parsed parts are non-null
        (or in Deequ: .hasPattern(''Blood Pressure'',''^\\d{1,3}/\\d{1,3}$'') and
        .isComplete([''Blood Pressure''])).'
      sources:
      - start_line: 90
        end_line: 96
        file: ''
      uid: 2d5ac6a2-c26c-4e9b-95fc-0af6d909253d
    - text: 'The derived ''Systolic'' and ''Diastolic'' columns must be numeric, non-null
        for rows used in downstream logic, and represent physiologically consistent
        pairs (Systolic >= Diastolic). The bp_stage_risk function and later threshold
        checks assume both values exist and are comparable element-wise. Actionable
        constraints: .isComplete([''Systolic'',''Diastolic'']), .satisfies(''Systolic
        >= Diastolic'', [''Systolic'',''Diastolic'']), and range-checks such as Systolic
        in [50,300], Diastolic in [30,200].'
      sources:
      - start_line: 93
        end_line: 96
        file: ''
      - start_line: 8
        end_line: 16
        file: ''
      - start_line: 122
        end_line: 124
        file: ''
      uid: 2e582c16-701f-4bd5-94cc-7954daed07e8
    - text: '''Physical Activity Level'' and ''Daily Steps'' must be numeric and have
        at least two non-null rows so that np.polyfit(pal.values, steps.values, 1)
        can compute a slope and intercept. Additionally, values should be sensible
        for regression (e.g., steps > 0). Actionable constraints: .isComplete([''Physical
        Activity Level'',''Daily Steps'']) for the rows used, assert countNonNull([''Physical
        Activity Level'',''Daily Steps'']) >= 2, and .satisfies(''Daily Steps > 0'',
        [''Daily Steps'']).'
      sources:
      - start_line: 100
        end_line: 106
        file: ''
      uid: 71c142e1-6f83-4138-a7a7-1ddb2161bb2f
    - text: 'All columns that contribute element-wise to the combined risk calculation
        must be aligned (same row-wise length and intended to be present together):
        ''Sleep Duration'', ''Quality of Sleep'' (qos), ''Systolic'', ''Diastolic'',
        ''Stress Level'', ''Physical Activity Level'', ''Daily Steps'', and ''BMI
        Category''. The code computes array-based risk components and then combines
        them element-wise; missing or misaligned values will produce NaNs or runtime
        errors. Actionable constraints: .isComplete([...]) or at minimum require that
        for each row used to produce an output risk_score, the set of these columns
        is present (no-null) or explicitly handle rows with nulls. In Deequ: .hasCompleteness(...)
        or .satisfies(...) across the column set.'
      sources:
      - start_line: 79
        end_line: 88
        file: ''
      - start_line: 90
        end_line: 96
        file: ''
      - start_line: 109
        end_line: 112
        file: ''
      - start_line: 113
        end_line: 121
