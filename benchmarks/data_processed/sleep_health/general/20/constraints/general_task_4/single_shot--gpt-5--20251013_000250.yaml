constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isContainedInRange('Age', 0, 120)
      - Invalid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', '^[0-9]{2,3}/[0-9]{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    - - .satisfies('cast(element_at(split(`Blood Pressure`, '/'), 1) as int) BETWEEN
        70 AND 250', 'bp_sys_between_70_250')
      - Invalid
    - - .satisfies('cast(element_at(split(`Blood Pressure`, '/'), 2) as int) BETWEEN
        40 AND 150', 'bp_dia_between_40_150')
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - '.hasMax(''Daily Steps'', lambda v: v <= 50000)'
      - Valid
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    - - .isContainedInRange('Heart Rate', 30, 220)
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    - - .isContainedIn('Occupation', ['Nurse', 'Software Engineer', 'Sales Representative',
        'Engineer', 'Lawyer', 'Teacher', 'Accountant', 'Salesperson', 'Scientist',
        'Doctor'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - '.hasDataType(''Person ID'', ConstrainableDataTypes.Integral, lambda v: v
        == 1.0)'
      - Valid
    - - '.hasMin(''Person ID'', lambda v: v > 0)'
      - Valid
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isContainedInRange('Physical Activity Level', 0, 200)
      - Invalid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.hasDataType(''Quality of Sleep'', ConstrainableDataTypes.Integral, lambda
        v: v == 1.0)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isContainedInRange('Quality of Sleep', 4, 9)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda v: v >= 0.40)'
      - Valid
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isContainedInRange('Sleep Duration', 0.0, 14.0)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isContainedInRange('Stress Level', 1, 10)
      - Invalid
    assumptions: []
