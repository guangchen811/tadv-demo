constraints:
  Age:
    code:
    - - .hasDataType('Age', ColumnConstraints.DataType.Integral)
      - Invalid
    - - .isComplete('Age')
      - Valid
    - - .isLessThanOrEqualTo('Age', 120)
      - Invalid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .hasDataType('BMI Category', ColumnConstraints.DataType.String)
      - Invalid
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasDataType('Blood Pressure', ColumnConstraints.DataType.String)
      - Invalid
    - - .isComplete('Blood Pressure')
      - Valid
    - - .matchesPattern('Blood Pressure', '^[0-9]{2,3}/[0-9]{2,3}$')
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .hasDataType('Daily Steps', ColumnConstraints.DataType.Integral)
      - Invalid
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .hasDataType('Gender', ColumnConstraints.DataType.String)
      - Invalid
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .hasDataType('Heart Rate', ColumnConstraints.DataType.Integral)
      - Invalid
    - - .isBetween('Heart Rate', 30, 200)
      - Invalid
    - - .isComplete('Heart Rate')
      - Valid
    - - .isPositive('Heart Rate')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .hasDataType('Occupation', ColumnConstraints.DataType.String)
      - Invalid
    - - .isComplete('Occupation')
      - Valid
    - - .isContainedIn('Occupation', ['Nurse', 'Software Engineer', 'Sales Representative',
        'Engineer', 'Lawyer', 'Teacher', 'Accountant', 'Salesperson', 'Scientist',
        'Doctor'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .hasDataType('Person ID', ColumnConstraints.DataType.Integral)
      - Invalid
    - - .isComplete('Person ID')
      - Valid
    - - .isNonNegative('Person ID')
      - Invalid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .hasDataType('Physical Activity Level', ColumnConstraints.DataType.Integral)
      - Invalid
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isPositive('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .hasDataType('Quality of Sleep', ColumnConstraints.DataType.Integral)
      - Invalid
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGreaterThanOrEqualTo('Quality of Sleep', 0)
      - Invalid
    - - .isLessThanOrEqualTo('Quality of Sleep', 10)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .hasDataType('Sleep Disorder', ColumnConstraints.DataType.String)
      - Invalid
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea', None])
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasDataType('Sleep Duration', ColumnConstraints.DataType.Fractional)
      - Invalid
    - - .isBetween('Sleep Duration', 3.0, 12.0)
      - Invalid
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isPositive('Sleep Duration')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .hasDataType('Stress Level', ColumnConstraints.DataType.Integral)
      - Invalid
    - - .isComplete('Stress Level')
      - Valid
    - - .isLessThanOrEqualTo('Stress Level', 10)
      - Invalid
    - - .isNonNegative('Stress Level')
      - Invalid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ColumnConstraints.DataType.Integral)
      - Invalid
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
