        .isContainedIn(''bp_stage'', [''normal'',''elevated'',''stage1'',''stage2'',''crisis''])
        OR a row-level satisfies: .satisfies("bp_stage IN (''normal'',''elevated'',''stage1'',''stage2'',''crisis'')
        OR bp_stage IS NULL")'
