    code: []
    assumptions:
    - text: 'When the raw ''Blood Pressure'' field is non-null it should match the
        pattern ''systolic/diastolic'' so that both derived columns ''bp_sys'' and
        ''bp_dia'' can be parsed. Concretely: if ''Blood Pressure'' is not null then
        both ''bp_sys'' and ''bp_dia'' should be non-null numeric values. This supports
        constraints like: if(notNull(''Blood Pressure'')) then notNull(''bp_sys'')
        and notNull(''bp_dia'') and isNumeric(''bp_sys'') and isNumeric(''bp_dia'').'
