    - text: 'Determinism: bp_stage should be the deterministic function of bp_sys
        and bp_dia implemented by classify_bp. In other words, recomputing the stage
        from bp_sys and bp_dia using the same rules should yield bp_stage (for non-null
        bp_sys and bp_dia). Use a row-level assertion that encodes the classifier
        logic, e.g.:

        .satisfies("(bp_sys IS NOT NULL AND bp_dia IS NOT NULL) -> (CASE WHEN bp_sys
        >= 180 OR bp_dia >= 120 THEN bp_stage = ''crisis'' WHEN bp_sys >= 140 OR bp_dia
        >= 90 THEN bp_stage = ''stage2'' WHEN (130 <= bp_sys AND bp_sys <= 139) OR
        (80 <= bp_dia AND bp_dia <= 89) THEN bp_stage = ''stage1'' WHEN (120 <= bp_sys
        AND bp_sys <= 129 AND bp_dia < 80) THEN bp_stage = ''elevated'' WHEN (bp_sys
        < 120 AND bp_dia < 80) THEN bp_stage = ''normal'' ELSE bp_stage IS NULL END)")

        This captures end-to-end consistency between raw measurements and the assigned
        stage.'
