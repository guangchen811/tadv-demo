  '["bp_dia","bp_sys"]':
    code: []
    assumptions:
    - text: 'bp_stage is deterministically derived from bp_sys and bp_dia according
        to the classify_bp rules. For rows where both bp_sys and bp_dia are non-null,
        the following must hold: if bp_sys >= 180 or bp_dia >= 120 then bp_stage ==
        ''crisis''; elif bp_sys >= 140 or bp_dia >= 90 then bp_stage == ''stage2'';
        elif (130 <= bp_sys <= 139) or (80 <= bp_dia <= 89) then bp_stage == ''stage1'';
        elif (120 <= bp_sys <= 129) and (bp_dia < 80) then bp_stage == ''elevated'';
        elif (bp_sys < 120) and (bp_dia < 80) then bp_stage == ''normal''. This can
        be implemented as a Deequ conditional constraint (satisfies) covering these
        branches.'
      sources:
      - start_line: 9
        end_line: 22
        file: ''
      - start_line: 47
        end_line: 47
        file: ''
      uid: 1dee8e3d-3ab5-418b-bbb9-ccb10d7e78da
    - text: If either bp_sys or bp_dia is null, then bp_stage must be null (NaN).
        The classify_bp function returns NaN when sys or dia is missing, and bp_stage
        is produced from that function.
      sources:
      - start_line: 9
        end_line: 11
        file: ''
      - start_line: 47
        end_line: 47
        file: ''
      uid: 05811220-4894-4973-9ed4-85a6ae3e554f
    - text: The Mean Arterial Pressure ('map') must equal bp_dia + (bp_sys - bp_dia)
        / 3.0 for rows where bp_sys and bp_dia are both non-null. This is a numeric
        equality relation that can be encoded as a Deequ satisfies constraint, e.g.
        satisfies('abs(map - (bp_dia + (bp_sys - bp_dia)/3.0) ) < 1e-6', 'map_consistency').
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      uid: 3d507db0-3c90-4601-8e0e-167fe78d81e0
    - text: 'When bp_sys and bp_dia are present, bp_sys should be greater than or
        equal to bp_dia (physiological expectation). Many downstream computations
        (map and stage logic) assume systolic >= diastolic; enforce bp_sys >= bp_dia
        for non-null rows, e.g. Deequ: satisfies(''bp_sys >= bp_dia or bp_sys is null
        or bp_dia is null'', ''sys_ge_dia'').'
      sources:
      - start_line: 44
        end_line: 48
        file: ''
      uid: c3162f28-eb02-4356-92aa-185503e92766
    - text: bp_sys and bp_dia are produced by parsing the 'Blood Pressure' text using
        the regex r'^\s*(\d{2,3})\s*/\s*(\d{2,3})\s*$'. If the 'Blood Pressure' string
        does not match that pattern, then bp_sys and bp_dia must be null. Conversely,
        when 'Blood Pressure' matches, both bp_sys and bp_dia should be numeric integers
        in the parsed groups.
      sources:
      - start_line: 42
        end_line: 45
        file: ''
      uid: 83b46977-b4a7-4ba2-8804-89c4cef16b7f
    - text: 'Any record with bp_sys >= 180 or bp_dia >= 120 must receive triage_level
        ''High''. The triage logic marks such records as crisis/high (crisis_condition
        includes numeric thresholds and high_condition includes crisis_condition,
        and triage_level maps high_condition -> ''High''). Implement as a constraint:
        for rows where bp_sys >= 180 or bp_dia >= 120, triage_level == ''High''.'
      sources:
      - start_line: 12
        end_line: 13
        file: ''
      - start_line: 147
        end_line: 161
        file: ''
      uid: bf53541b-076e-4742-854d-5f7d01ca21f0
    - text: 'If bp_stage == ''crisis'' then triage_level must be ''High''. The high_condition
        explicitly includes bp_stage == ''crisis'' and triage_level is set to ''High''
        when high_condition is true; enforce consistency: rows with bp_stage == ''crisis''
        should have triage_level == ''High''.'
      sources:
      - start_line: 147
        end_line: 161
        file: ''
