    assumptions:
    - text: 'bp_stage must be consistent with bp_sys and bp_dia according to the classifier
        thresholds. Concretely:

        - If bp_stage == ''crisis'' then (bp_sys >= 180) OR (bp_dia >= 120).

        - If bp_stage == ''stage2'' then (bp_sys >= 140) OR (bp_dia >= 90).

        - If bp_stage == ''stage1'' then (130 <= bp_sys <= 139) OR (80 <= bp_dia <=
        89).

        - If bp_stage == ''elevated'' then (120 <= bp_sys <= 129) AND (bp_dia < 80).

        - If bp_stage == ''normal'' then (bp_sys < 120) AND (bp_dia < 80).

        These can be expressed as row-level assertions (Deequ-style) such as:

        .satisfies("(bp_stage = ''crisis'') -> (bp_sys >= 180 OR bp_dia >= 120)")

        .satisfies("(bp_stage = ''stage2'') -> (bp_sys >= 140 OR bp_dia >= 90)")

