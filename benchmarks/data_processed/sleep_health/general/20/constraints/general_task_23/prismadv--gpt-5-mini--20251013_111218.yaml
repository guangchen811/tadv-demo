    - text: 'bp_sys and bp_dia are numeric and, when both present, systolic should
        be greater than or equal to diastolic (bp_sys >= bp_dia). Additionally, bp_sys
        and bp_dia should be present for the majority of rows used in BP-derived logic
        (map, bp_stage, triage). Example Deequ-style constraints: .hasCompleteness(["bp_sys","bp_dia"],
        expectedFraction) ; .satisfies("bp_sys >= bp_dia") ; .isNonNegative(["bp_sys","bp_dia"]).'
      sources:
      - start_line: 9
        end_line: 21
        file: ''
      - start_line: 41
        end_line: 49
        file: ''
      - start_line: 146
        end_line: 149
        file: ''
      uid: 60d9600f-772c-42bb-9b2c-e891f250a574
    - text: 'bp_stage must be consistent with bp_sys and bp_dia according to the classify_bp
        logic (e.g., ''crisis'' iff bp_sys >= 180 or bp_dia >= 120; ''stage2'' iff
        bp_sys >= 140 or bp_dia >= 90; ''stage1'' iff 130 <= bp_sys <= 139 or 80 <=
        bp_dia <= 89; ''elevated'' iff 120 <= bp_sys <= 129 and bp_dia < 80; ''normal''
        iff bp_sys < 120 and bp_dia < 80). This enables a multi-column integrity check:
        .satisfies(...) comparing bp_stage against bp_sys and bp_dia.'
      sources:
      - start_line: 9
        end_line: 21
        file: ''
      - start_line: 47
        end_line: 49
        file: ''
      - start_line: 127
        end_line: 135
        file: ''
      uid: 57c99835-245c-44d4-9bb9-f52826c63127
    - text: 'Physical Activity Level and Daily Steps must be numeric and show variation
        so that linear modeling and quantile splitting are meaningful. Concretely:
        Physical Activity Level should have non-zero variance (var_pa > 1e-12) and
        there should be at least one row in the top tercile and one in the bottom
        tercile (non-empty top_pa and bottom_pa) with non-null Daily Steps. Example
        constraints: .hasCompleteness(["Physical Activity Level","Daily Steps"], 1.0)
        ; .satisfies("var(Physical Activity Level) > 1e-12") ; checks that count(Physical
        Activity Level >= pa_high) > 0 and count(Physical Activity Level <= pa_low)
        > 0.'
      sources:
      - start_line: 83
        end_line: 101
        file: ''
      - start_line: 86
        end_line: 91
        file: ''
      uid: d02c4b4f-f2fe-4fb3-9440-2969fd660ae8
    - text: 'Expected_steps calculation (alpha + beta * Physical Activity Level) assumes
        both Daily Steps and Physical Activity Level are non-null and expected_steps
        > 0 for the rows of interest. The code clips expected_steps to a minimum of
        1.0, but to avoid degenerate alignment results require: completeness for both
        columns and that expected_steps is finite (not NaN). Example checks: .hasCompleteness(["Physical
        Activity Level","Daily Steps"], expectedFraction) ; .satisfies("isFinite(expected_steps)").'
      sources:
      - start_line: 95
        end_line: 101
        file: ''
      - start_line: 115
        end_line: 118
        file: ''
      uid: 5fe978ca-7eb0-438b-ba2a-e5805dba71fd
    - text: 'Sleep Duration and Quality of Sleep must have paired non-null values
        and some diversity so that correlation and the linear predictor are valid.
        Specifically: there should be at least two rows with both Sleep Duration and
        Quality of Sleep non-null to compute Pearson correlation and variance; there
        should be at least one row with Sleep Duration < 6.0 and at least one with
        Sleep Duration >= 8.0 to compute the short/long group means and bonuses. Example
        constraints: .hasCompleteness(["Sleep Duration","Quality of Sleep"], expectedFraction)
        ; .satisfies("count(Sleep Duration < 6 AND Quality of Sleep IS NOT NULL) >
        0") ; .satisfies("count(Sleep Duration >= 8 AND Quality of Sleep IS NOT NULL)
        > 0").'
      sources:
      - start_line: 68
        end_line: 80
        file: ''
      - start_line: 71
        end_line: 74
        file: ''
      - start_line: 110
        end_line: 113
        file: ''
      uid: 2fb1f73f-ba53-4458-861c-5b2b7e6d65d1
    - text: 'Sleep Disorder values should be in the expected set {''Insomnia'',''Sleep
        Apnea''} or null, because disorder_weights and sd_base_penalty map those exact
        strings. If other categories exist they will be treated as default (fillna/1.0).
        Consider a constraint: .isContainedIn(["Sleep Disorder"],["Insomnia","Sleep
        Apnea",nullValue]) and ensure sufficient non-null occurrences of each category
        if weighting (disorder_weights) is relied upon (i.e., count(''Insomnia'')>0
        and count(''Sleep Apnea'')>0 when you expect weighted adjustments).'
      sources:
      - start_line: 54
        end_line: 66
        file: ''
      - start_line: 137
        end_line: 139
        file: ''
      - start_line: 150
        end_line: 151
        file: ''
      uid: 8c940863-b9cc-49d8-bbce-b8856b7d5167
    - text: 'Triage logic depends on consistent multi-column relationships among bp_stage,
        bp_sys, bp_dia, Heart Rate, sleep_component, activity_component, Daily Steps
        and Physical Activity Level. Practical checks: when bp_stage == ''stage2''
        ensure sleep_component and activity_component are numeric (not NaN) because
        the condition ((sleep_component < 65) | (activity_component < 60)) is evaluated;
        when bp_stage == ''stage1'' ensure sleep_component is numeric for medium triage
        condition; when Sleep Disorder is non-null the comparison (sleep_component
        < 60) requires sleep_component present. Example constraints: .hasCompleteness(["sleep_component","activity_component","bp_stage"],
        expectedFraction) ; .satisfies("(bp_stage == ''stage2'') IMPLIES (sleep_component
        IS NOT NULL AND activity_component IS NOT NULL)").'
      sources:
      - start_line: 146
        end_line: 160
        file: ''
      - start_line: 103
        end_line: 118
        file: ''
      - start_line: 137
        end_line: 139
        file: ''
      uid: d2efed93-de26-4ad8-8054-01778683aa3b
  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'Both ''Daily Steps'' and ''Physical Activity Level'' are present as numeric,
        non-null, and non-negative for records used in downstream calculations. Actionable
        checks: ensure both columns are complete (no nulls) and numeric, and that
        min >= 0. Example constraints (Deequ-style / pseudo): .isComplete([''Daily
        Steps'', ''Physical Activity Level'']) and .hasMin(''Daily Steps'', lowerBound=0)
        and .hasMin(''Physical Activity Level'', lowerBound=0).'
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      - start_line: 83
        end_line: 86
        file: ''
      - start_line: 115
        end_line: 118
        file: ''
      uid: e0c29d1f-dfc3-4740-8e31-f43d0ceb6a35
    - text: 'The ''Physical Activity Level'' column should have non-zero variance
        (var_pa > 1e-12) so the linear fit (beta = cov(pa, steps) / var_pa) is meaningful
        (code falls back to beta=0 when variance is ~0). Actionable check: require
        stddev(''Physical Activity Level'') > 1e-6 or var > 1e-12, and approxNumDistinctValues
        > 1. Example constraint: .hasStandardDeviation(''Physical Activity Level'',
        lowerBound=1e-6).'
      sources:
      - start_line: 95
        end_line: 99
        file: ''
      uid: 070eb480-b5fb-445f-b102-50d7f81b8e19
    - text: 'Tercile-based groups must be non-empty and quantiles distinct: the 1/3
        and 2/3 quantiles of ''Physical Activity Level'' should satisfy pa_low < pa_high,
        and the resulting top_pa and bottom_pa groups must contain at least one record
        each (so top_pa[''Daily Steps''].mean() and bottom_pa[''Daily Steps''].mean()
        are defined). Actionable checks: quantile(''Physical Activity Level'', 1/3)
        < quantile(''Physical Activity Level'', 2/3) and count(Physical Activity Level
        >= pa_high) > 0 and count(Physical Activity Level <= pa_low) > 0.'
      sources:
      - start_line: 86
        end_line: 91
        file: ''
      uid: 57778fe8-3c23-4350-9af5-c94f3c952cd3
    - text: 'There should be at least one record with ''Physical Activity Level''
        >= 60 so the pa60 subgroup and the metric pa60_prop_steps7000 are defined
        (otherwise pa60_prop_steps7000 becomes NaN). Actionable check: count(''Physical
        Activity Level'' >= 60) > 0.'
      sources:
      - start_line: 92
        end_line: 93
        file: ''
      uid: 335edfe0-ec2a-471f-8e1b-9d90ba95b821
    - text: 'The computed expected_steps (= alpha + beta * pa) should be defined (not
        NaN) for the vast majority of rows so alignment = Daily Steps / expected_steps
        is computable. Actionable check: proportion of rows with finite(expected_steps)
        >= 0.95 (or configurable threshold). Example constraint: proportion(isFinite(alpha
        + beta * ''Physical Activity Level'')) >= 0.95.'
      sources:
      - start_line: 98
        end_line: 101
        file: ''
      - start_line: 115
        end_line: 118
        file: ''
      uid: cc813a0c-325c-47be-b265-02b525aa1068
    - text: 'There is an expected non-negative (typically positive) association between
        ''Daily Steps'' and ''Physical Activity Level'' used by downstream diagnostics
        and scoring. Actionable check: Pearson and/or Spearman correlation between
        ''Daily Steps'' and ''Physical Activity Level'' should be >= 0 (or >= small
        positive threshold if a positive relationship is required). Example constraint:
        correlation(''Daily Steps'',''Physical Activity Level'', method=''pearson'')
        >= 0.0.'
      sources:
      - start_line: 83
        end_line: 85
        file: ''
      - start_line: 191
        end_line: 196
        file: ''
      uid: 4c91ac41-624b-4198-b9c8-8b49224a2efd
  '["Heart Rate","hr_penalty"]':
    code: []
    assumptions:
    - text: 'When the raw ''Blood Pressure'' parses to systolic/diastolic (bp_sys,
        bp_dia), both derived columns should be numeric and consistent: bp_sys and
        bp_dia should be non-null for well-formed BP strings, bp_sys >= bp_dia, and
        both should be in a sensible numeric range (e.g. 0 <= bp_sys <= 300 and 0
        <= bp_dia <= 300). Actionable check (Deequ-style): .satisfies("(bp_sys IS
        NOT NULL AND bp_dia IS NOT NULL) OR (Blood Pressure IS NULL)", "bp_parsed_non_null_when_bp_present")
        and .satisfies("bp_sys >= bp_dia AND bp_sys >= 0 AND bp_dia >= 0 AND bp_sys
        <= 300 AND bp_dia <= 300", "bp_range_and_order")'
      sources:
      - start_line: 41
        end_line: 48
        file: ''
      uid: 03d008a7-4766-4cb8-8f41-b5744e35b344
    - text: 'Rows labeled as ''High'' triage_level must satisfy at least one of the
        triggering conditions used to compute ''High'': (bp_stage == ''crisis'') OR
        (bp_sys >= 180) OR (bp_dia >= 120) OR (Heart Rate > 120) OR ((bp_stage ==
        ''stage2'') AND ((sleep_component < 65) OR (activity_component < 60))) OR
        ((Sleep Disorder IN (''Insomnia'',''Sleep Apnea'')) AND (sleep_component <
        60)). Actionable check: .satisfies("triage_level != ''High'' OR (bp_stage
        == ''crisis'' OR bp_sys >= 180 OR bp_dia >= 120 OR `Heart Rate` > 120 OR (bp_stage
        == ''stage2'' AND (sleep_component < 65 OR activity_component < 60)) OR (`Sleep
        Disorder` IN (''Insomnia'',''Sleep Apnea'') AND sleep_component < 60))", "triage_high_consistency")'
      sources:
      - start_line: 146
        end_line: 160
        file: ''
      uid: b3a1ebce-67c9-4bc4-9261-bd3c312feb58
    - text: 'The heart-rate-based penalty (hr_penalty) must be computed from the row''s
        ''Heart Rate'' value using the piecewise formula and scaled by the dataset-level
        hr_outlier_weight: hr_midband_prop = mean(50 <= `Heart Rate` <= 100); hr_outlier_weight
        = 1.0/hr_midband_prop if hr_midband_prop>0 else 1.0; then per-row hr_penalty
        = ( (50 - HR)/50.0 if HR < 50 else 0 ) + ( (HR - 100)/100.0 if HR > 100 else
        0 ) , all multiplied by (0.15 * hr_outlier_weight). Actionable checks: (a)
        verify hr_midband_prop>0 or record that default weight applies; (b) per-row:
        .satisfies("hr_penalty IS NOT NULL => hr_penalty == (((CASE WHEN `Heart Rate`
        < 50 THEN (50 - `Heart Rate`) / 50.0 ELSE 0 END) + (CASE WHEN `Heart Rate`
        > 100 THEN (`Heart Rate` - 100) / 100.0 ELSE 0 END)) * (0.15 * hr_outlier_weight))",
        "hr_penalty_formula")'
      sources:
      - start_line: 51
        end_line: 52
        file: ''
      - start_line: 121
        end_line: 125
        file: ''
      uid: 64fdaecf-6b6a-4967-bd29-6c7a464243dc
    - text: 'The blood-pressure-stage to penalty mapping must match the explicit map:
        bp_penalty == 0.0 when bp_stage == ''normal'', 0.05 when ''elevated'', 0.10
        when ''stage1'', 0.20 when ''stage2'', 0.40 when ''crisis'', and default 0.15
        when bp_stage is NaN or unknown. Actionable check: .satisfies("(bp_stage ==
        ''normal'' AND bp_penalty == 0.0) OR (bp_stage == ''elevated'' AND bp_penalty
        == 0.05) OR (bp_stage == ''stage1'' AND bp_penalty == 0.10) OR (bp_stage ==
        ''stage2'' AND bp_penalty == 0.20) OR (bp_stage == ''crisis'' AND bp_penalty
        == 0.40) OR (bp_stage IS NULL AND bp_penalty == 0.15)", "bp_penalty_map_consistency")'
      sources:
      - start_line: 127
        end_line: 135
        file: ''
      uid: 3b8364d6-b322-4160-b269-3a4db75d0dca
    - text: 'The sleep-disorder penalty (sd_penalty) must equal the per-disorder base
        penalty multiplied by a disorder-specific weight derived from the dataset
        distribution: base mapping {''Insomnia'':0.12, ''Sleep Apnea'':0.18} and disorder_weights
        computed as { ''Insomnia'': 0.5/p_insomnia, ''Sleep Apnea'': 0.5/p_apnea }
        (fallback 1.0 when proportions are zero). Actionable checks: (a) assert p_insomnia
        and p_apnea were computed from non-null ''Sleep Disorder'' values; (b) per-row:
        .satisfies("sd_penalty IS NOT NULL => sd_penalty == (CASE WHEN `Sleep Disorder`
        == ''Insomnia'' THEN 0.12 WHEN `Sleep Disorder` == ''Sleep Apnea'' THEN 0.18
        ELSE 0.0 END) * sd_weight_series", "sd_penalty_formula")'
      sources:
      - start_line: 63
        end_line: 66
        file: ''
      - start_line: 55
        end_line: 61
        file: ''
      - start_line: 137
        end_line: 139
        file: ''
      uid: e213c509-e9c3-456d-baf4-d69e4c5fb164
