    - text: 'Null propagation: classify_bp returns NaN when either bp_sys or bp_dia
        is missing. Therefore rows where bp_sys IS NULL OR bp_dia IS NULL should have
        bp_stage IS NULL. Deequ-style constraint:

        .satisfies("(bp_sys IS NULL OR bp_dia IS NULL) -> bp_stage IS NULL")

        (or the inverse check: (bp_stage IS NOT NULL) -> (bp_sys IS NOT NULL AND bp_dia
        IS NOT NULL)).'
