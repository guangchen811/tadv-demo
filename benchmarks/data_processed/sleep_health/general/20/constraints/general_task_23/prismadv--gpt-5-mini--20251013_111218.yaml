    - text: 'map (Mean Arterial Pressure) is computed deterministically from bp_sys
        and bp_dia. For rows where both bp_sys and bp_dia are non-null, map should
        equal bp_dia + (bp_sys - bp_dia) / 3.0 (allowing a small floating-point tolerance).
        Example Deequ-style check:

        .satisfies("(bp_sys IS NOT NULL AND bp_dia IS NOT NULL) -> abs(map - (bp_dia
        + (bp_sys - bp_dia)/3.0)) < 0.01")'
