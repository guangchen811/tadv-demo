    assumptions:
    - text: 'The ''Blood Pressure'' input strings are expected to be in the form "SYST/DIA"
        where SYST and DIA are 2 or 3 digit integers (optionally surrounded by whitespace).
        Concretely the code extracts using the regex ^\s*(\d{2,3})\s*/\s*(\d{2,3})\s*$
        and will treat any non-matching values as invalid (bp_sys/bp_dia -> NaN).
        A validation rule could require that >= 95% of rows match this pattern, e.g.
        with Great Expectations: expect_column_values_to_match_regex(''Blood Pressure'',
        ''^\s*(\d{2,3})\s*/\s*(\d{2,3})\s*$'', mostly=0.95).'
      sources:
      - start_line: 42
        end_line: 45
        file: ''
      uid: 4ff392aa-892c-4a38-86b2-652d757894dc
    - text: 'After parsing, the systolic (bp_sys) and diastolic (bp_dia) components
        should be numeric integers (no decimals). The parser expects only digit sequences,
        so input should not contain decimals or non-digit characters in the numeric
        parts. A validation rule: require that parsed bp_sys and bp_dia are integral
        (e.g., have zero fractional part) for >= 95% of rows.'
      sources:
      - start_line: 42
        end_line: 45
        file: ''
      - start_line: 47
        end_line: 48
        file: ''
      uid: 3c5e2fb6-b77c-4a69-b6a1-eaf88e29c1bd
    - text: 'Systolic and diastolic values should fall in plausible physiological
        ranges so comparisons/classification behave sensibly. At minimum the pipeline
        expects values up to at least systolic >= 180 and diastolic >= 120; therefore
        inputs should generally be within a safe range (suggested: systolic between
        50 and 250, diastolic between 30 and 180) for >= 95% of rows. Example Deequ
        constraint: .satisfies(''CASE WHEN CAST(split_part(`Blood Pressure`, "/",
        1) AS INT) BETWEEN 50 AND 250 AND CAST(split_part(`Blood Pressure`, "/", 2)
        AS INT) BETWEEN 30 AND 180 THEN 1 ELSE 0 END'', ''BP reasonable range'', lambda
        x: x >= 0.95).'
      sources:
