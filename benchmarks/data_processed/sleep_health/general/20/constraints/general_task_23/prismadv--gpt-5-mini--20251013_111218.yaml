        file: ''
      uid: 294599f3-1447-4c0e-ace9-3f5270e0591f
    - text: '''bp_sys'' and ''bp_dia'' should be numeric and systolic should be strictly
        greater than diastolic for each record (bp_sys > bp_dia). This is required
        for meaningful MAP calculation and for the clinical comparisons made elsewhere.
        A deequ-style constraint: .where(''bp_sys is not null and bp_dia is not null'').satisfies(''bp_sys
        > bp_dia'').'
