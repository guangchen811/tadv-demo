      sources:
      - start_line: 35
        end_line: 39
        file: ''
      - start_line: 86
        end_line: 89
        file: ''
      - start_line: 92
        end_line: 93
        file: ''
      uid: 4fe92ff5-d424-48c1-a895-eab63209eef7
    - text: 'Values should lie on a non-negative bounded scale where thresholds like
        30 and 60 are meaningful (the code checks PA < 30, PA >= 60, and uses quantiles).
        A practical assumption is that PA is between 0 and 100 (inclusive). Validate
        most values fall in this range (e.g., >=99% within bounds).

        Deequ/GX example:

        .satisfies("CASE WHEN `Physical Activity Level` >= 0 AND `Physical Activity
