        (1.0/hr_midband_prop if > 0), so having zero midband entries would trigger
        fallback behavior; requiring at least one midband observation avoids that
        fallback and indicates cohort representativeness.

        We could represent this assumption as a deequ/GRE rule like this:

        .satisfies("CASE WHEN `Heart Rate` >= 50 AND `Heart Rate` <= 100 THEN 1 ELSE
        0 END", "Heart Rate midband proportion > 0", lambda x: x > 0.0)'
