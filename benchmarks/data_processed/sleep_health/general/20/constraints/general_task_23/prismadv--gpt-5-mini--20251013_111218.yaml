    - text: '''bp_sys'' and ''bp_dia'' values should lie in clinically plausible ranges
        that make threshold checks meaningful: e.g., 30 <= bp_sys <= 300 and 20 <=
        bp_dia <= 200 (so comparisons to 120 and 180 are valid). Represent as range
        constraints per column (min/max) and used together to flag invalid BP rows.'
