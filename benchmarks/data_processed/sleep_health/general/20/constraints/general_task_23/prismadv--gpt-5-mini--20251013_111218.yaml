        file: ''
      - start_line: 92
        end_line: 92
        file: ''
      - start_line: 86
        end_line: 87
        file: ''
      uid: 5e0c6755-6d55-405a-bfce-6fe39bf05805
    - text: 'The ''Physical Activity Level'' column must have reasonable variability
        (not a constant column) so that correlations, covariance and the linear predictor
