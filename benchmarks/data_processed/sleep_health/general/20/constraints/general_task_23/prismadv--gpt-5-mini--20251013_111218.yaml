        code computes quantiles, subsetting by value, and uses it in regression).
        Validate that the fraction of non-null values is 100% (or very close to 1.0).

        Deequ/GX example:

        .satisfies("CASE WHEN `Physical Activity Level` IS NOT NULL THEN 1 ELSE 0
