  '["Sleep Disorder","sleep_component"]':
    code: []
    assumptions:
    - text: 'The ''Sleep Disorder'' column contains only the known categories ''Insomnia''
        and ''Sleep Apnea'' (or null). The code maps these two labels to base penalties
        and weights and computes proportions over non-null entries; unexpected categorical
        values will be treated as missing (fillna) and could hide data problems. Actionable
        check (Deequ-style): require that non-null values are contained in the set
        {''Insomnia'',''Sleep Apnea''} (or explicitly allow nulls). Example: .isContainedIn(''Sleep
        Disorder'', [''Insomnia'',''Sleep Apnea'']) (or a conditional containment
        that ignores nulls).'
      sources:
      - start_line: 54
        end_line: 66
        file: ''
      - start_line: 137
        end_line: 139
        file: ''
      uid: ea64a94d-8a43-48fa-90e8-d255a4a08a32
    - text: 'For rows where ''Sleep Disorder'' == ''Insomnia'' or ''Sleep Disorder''
        == ''Sleep Apnea'', the derived ''sleep_component'' must be present (non-null
        and numeric). The triage logic directly uses the boolean expression (df[''Sleep
        Disorder''].isin([''Insomnia'',''Sleep Apnea'']) & (sleep_component < 60)),
        so missing or non-numeric ''sleep_component'' will make the comparison invalid
        or leak to default behavior. Actionable check: enforce completeness / numeric-ness
        of ''sleep_component'' for those filtered rows. Example Deequ predicate: .satisfies("if(Sleep
        Disorder IN (''Insomnia'',''Sleep Apnea''), sleep_component IS NOT NULL, true)").'
      sources:
      - start_line: 108
        end_line: 113
        file: ''
      - start_line: 150
        end_line: 151
        file: ''
      uid: 2b37a8ca-9dac-418b-8857-f6aa71e2c97e
    - text: 'Both ''Insomnia'' and ''Sleep Apnea'' should appear at least once among
        the non-null values of ''Sleep Disorder'' (p_insomnia > 0 and p_apnea > 0).
        The code computes disorder_weights using 0.5 / p_insomnia and 0.5 / p_apnea;
        if either proportion is zero the code uses a fallback but the intended weighting
        assumes both conditions exist. Actionable check: assert counts or proportions
        > 0 for each label among non-null ''Sleep Disorder'' rows (e.g., .satisfies("(count_if(Sleep
        Disorder == ''Insomnia'') > 0) AND (count_if(Sleep Disorder == ''Sleep Apnea'')
        > 0)")).'
      sources:
      - start_line: 59
        end_line: 66
        file: ''
      uid: 4c007022-ea35-499a-875d-7157bf76b765
    - text: '''sleep_component'' is computed from ''Sleep Duration'' and ''Quality
        of Sleep'', and several conditional bonuses/normalizations assume those two
        columns are numeric and (for many rows) non-null. In particular, rows used
        in short_mask (Sleep Duration < 6.0) or long_mask (Sleep Duration >= 8.0)
        require a non-null ''Quality of Sleep'' because bonuses compare Quality of
        Sleep to cohort means. Actionable checks: coerce/verify numeric types for
        both columns and require completeness for rows where Sleep Duration is in
        ranges used for conditional logic. Example Deequ predicates: .isComplete([''Sleep
        Duration'',''Quality of Sleep'']) on the subset where Sleep Duration < 6 or
        Sleep Duration >= 8, and .isNumeric(''Sleep Duration''), .isNumeric(''Quality
        of Sleep'').'
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      - start_line: 68
        end_line: 81
        file: ''
      - start_line: 104
        end_line: 113
