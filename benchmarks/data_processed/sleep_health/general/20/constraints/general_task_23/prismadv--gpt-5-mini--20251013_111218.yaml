    - text: '''bp_stage'' must be consistent with the numeric readings ''bp_sys''
        and ''bp_dia'' according to the classify_bp rules. In other words, for every
        row where bp_sys and bp_dia are available, bp_stage == classify_bp(bp_sys,
        bp_dia). This can be enforced by a row-level predicate that recomputes the
        classification and checks equality with ''bp_stage''.'
