constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    - - .matchesPattern('Blood Pressure', '^\d{2,3}/\d{2,3}$')
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isContainedIn('Daily Steps', [0, 15000])
      - Invalid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - '.hasMax(''Heart Rate'', lambda x: x <= 120)'
      - Valid
    - - '.hasMin(''Heart Rate'', lambda x: x >= 40)'
      - Valid
    - - .isComplete('Heart Rate')
      - Valid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isNonNegative('Person ID')
      - Invalid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isContainedIn('Physical Activity Level', [0, 120])
      - Invalid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isContainedIn('Quality of Sleep', [4, 9])
      - Invalid
    - - .isNonNegative('Quality of Sleep')
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'], include_nulls=False)
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isContainedIn('Sleep Duration', [3.0, 12.0])
      - Invalid
    - - .isNonNegative('Sleep Duration')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isContainedIn('Stress Level', [3, 8])
      - Invalid
    - - .isNonNegative('Stress Level')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
