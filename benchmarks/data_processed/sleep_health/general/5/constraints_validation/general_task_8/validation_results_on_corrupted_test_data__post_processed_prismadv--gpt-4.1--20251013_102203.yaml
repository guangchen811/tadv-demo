results:
  Physical Activity Level:
    code:
    - suggestion: .satisfies('`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100', 'Physical Activity Level in [0,100]')
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9
        AND cast(`Quality of Sleep` as int) = `Quality of Sleep`', 'Quality of Sleep
        in valid range and integer')
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .satisfies('`Blood Pressure` RLIKE "^[0-9]{2,3}/[0-9]{2,3}$"', 'Blood
        Pressure formatted as systolic/diastolic')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CAST(split(`Blood Pressure`, "/")[0] AS int) BETWEEN
        90 AND 200 AND CAST(split(`Blood Pressure`, "/")[1] AS int) BETWEEN 50 AND
        120', 'Blood Pressure values within physiologically plausible range')
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 13.0'',
        ''Sleep Duration plausible range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.satisfies(''`Daily Steps` >= 0'', ''Non-negative Daily Steps'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Daily Steps` <= 50000'', ''Plausible Maximum Daily
        Steps'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''`Daily Steps` <= 50000'', ''Plausible
        Maximum Daily Steps'', lambda x: x == 1)'' failed on data sample: Value: 0.9
        does not meet the constraint requirement!'
      level: warning
  Sleep Disorder:
    code:
    - suggestion: .satisfies('`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ("Insomnia",
        "Sleep Apnea")', 'Valid Sleep Disorder Values')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.41)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Heart Rate` AS BIGINT) = `Heart Rate`'', ''Heart
        Rate is integer'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Heart Rate` >= 30 AND `Heart Rate` <= 220'', ''Heart
        Rate plausible range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Stress Level` IN (3, 4, 5, 6, 7, 8)'', ''Stress Level
        Value Range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Age')
      status: true
      reason_if_failed: ''
      level: error
  '["Age","Gender","Person ID"]':
    code:
    - suggestion: '.hasUniqueness([''Person ID'', ''Gender'', ''Age''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Blood Pressure","bp_dia","bp_sys"]':
    code:
    - suggestion: .satisfies('`Blood Pressure` RLIKE "^[0-9]+/[0-9]+$"', 'Blood Pressure
        format valid')
      status: true
      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Gender', ['Male', 'Female'])
      status: true
      reason_if_failed: ''
      level: error
  '["Person ID","Primary Sleep Disorder","Sleep Disorder"]':
    code:
    - suggestion: '.hasUniqueness([''Person ID'', ''Sleep Disorder''], lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Sleep Disorder","Sleep Duration"]':
    code:
    - suggestion: .satisfies('(`Sleep Duration` >= 0 AND `Sleep Duration` <= 24) AND
        (`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10)', 'Valid sleep duration
        and quality range')
      status: true
      reason_if_failed: ''
      level: warning
