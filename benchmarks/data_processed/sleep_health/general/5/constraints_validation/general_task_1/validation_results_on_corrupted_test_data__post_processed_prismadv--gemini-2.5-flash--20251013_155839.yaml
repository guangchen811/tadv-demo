results:
  Physical Activity Level:
    code:
    - suggestion: '.isNonNegative(''`Physical Activity Level`'', assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("`Daily Steps` IS NOT NULL AND `Physical Activity Level`
        IS NOT NULL", "Sufficient data for polyfit", lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: '.satisfies("`Blood Pressure` RLIKE ''^[1-9][0-9]*/[1-9][0-9]*$''
        AND CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', 1) AS INT) > CAST(SUBSTRING_INDEX(`Blood
        Pressure`, ''/'', -1) AS INT)", "Valid Blood Pressure Format and Values",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`BMI Category` IN (''Obese'', ''Overweight'', ''Normal'',
        ''Normal Weight'')", "Valid BMI Category", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.satisfies("`Blood Pressure` LIKE ''%/%'' AND SIZE(SPLIT(`Blood
        Pressure`, ''/'')) = 2 AND NOT ISNULL(TRY_CAST(SPLIT(`Blood Pressure`, ''/'')[0]
        AS INT)) AND NOT ISNULL(TRY_CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS INT))",
        "ValidBloodPressureFormat", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) >= 0",
        "SystolicNonNegative", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS INT) >= 0",
        "DiastolicNonNegative", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) > CAST(SPLIT(`Blood
        Pressure`, ''/'')[1] AS INT)", "SystolicGreaterThanDiastolic", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .satisfies("`Sleep Duration` > 0", "Sleep Duration is strictly positive")
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isNonNegative("`Daily Steps`")
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.hasDistinctness([''Physical Activity Level''], lambda x: x >=
        0.01)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Blood Pressure` REGEXP ''^[1-9][0-9]*/[1-9][0-9]*$''",
        ''Blood Pressure Format'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: '.hasCompleteness(''Stress Level'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''`Stress Level`'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: '.hasCorrelation("Physical Activity Level", "Daily Steps", lambda
        x: x >= 0.5)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation("Physical Activity Level", "Daily
        Steps", lambda x: x >= 0.5)'' failed on data sample: Value: -0.09045529785496328
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CAST(SUBSTRING_INDEX(CAST(`Blood Pressure` AS STRING),
        ''/'', 1) AS INT) >= 60 AND CAST(SUBSTRING_INDEX(CAST(`Blood Pressure` AS
        STRING), ''/'', 1) AS INT) <= 200", "Systolic blood pressure range check",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","diastolic","systolic"]':
    code:
    - suggestion: '.satisfies("`Blood Pressure` IS NOT NULL AND LENGTH(`Blood Pressure`)
        - LENGTH(REPLACE(`Blood Pressure`, ''/'', '''')) = 1 AND SUBSTRING(`Blood
        Pressure`, 1, INSTR(`Blood Pressure`, ''/'') - 1) RLIKE ''^[0-9]+$'' AND SUBSTRING(`Blood
        Pressure`, INSTR(`Blood Pressure`, ''/'') + 1) RLIKE ''^[0-9]+$''", "Blood
        Pressure Format and Completeness", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation("Physical Activity Level", "Daily Steps", lambda
        x: x >= 0.3)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation("Physical Activity Level", "Daily
        Steps", lambda x: x >= 0.3)'' failed on data sample: Value: -0.09045529785496328
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Daily Steps` >= 0", "Daily Steps Non-Negative", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Physical Activity Level` >= 0", "Physical Activity
        Level Non-Negative", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["diastolic","systolic"]':
    code:
    - suggestion: .satisfies("`Blood Pressure` IS NOT NULL AND `Blood Pressure` RLIKE
        '^[0-9]+\s?/\s?[0-9]+$'", "Blood Pressure Format")
      status: true
      reason_if_failed: ''
      level: undefined
