results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.satisfies(''`Quality of Sleep` >= 0 AND `Quality of Sleep` <=
        10'', ''Quality of Sleep in valid range'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`BMI Category` IN (''Obese'', ''Overweight'', ''Normal'',
        ''Normal Weight'')", "Valid BMI Categories", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Blood Pressure
        format systolic/diastolic (both integers)")
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("regexp_like(`Blood Pressure`, '^[0-9]+/[0-9]+$')", 'Blood
        Pressure format valid')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive('`Sleep Duration`')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('`Daily Steps`')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Daily Steps` <= 60000', 'Daily Steps reasonable upper
        bound')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''`Daily Steps` <= 60000'', ''Daily
        Steps reasonable upper bound'')'' failed on data sample: Value: 0.9 does not
        meet the constraint requirement!'
      level: warning
  Sleep Disorder:
    code:
    - suggestion: .satisfies("`Sleep Disorder` IS NULL OR trim(`Sleep Disorder`) =
        '' OR trim(`Sleep Disorder`) = 'Insomnia' OR trim(`Sleep Disorder`) = 'Sleep
        Apnea'", "Valid Sleep Disorder values")
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: '.hasCompleteness(''Stress Level'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Stress Level` >= 3 AND `Stress Level` <= 8', 'Stress
        Level in [3,8]')
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Age')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Age` <= 120', 'Age is plausible')
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Age","BMI Category","Blood Pressure","Daily Steps","Heart Rate","Physical Activity
    Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: .satisfies('`Blood Pressure` IS NOT NULL AND `Blood Pressure` RLIKE
        "^[0-9]+/[0-9]+$"', 'Blood Pressure format systolic/diastolic')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CAST(`Quality of Sleep` AS INT) BETWEEN 0 AND 10', 'Quality
        of Sleep in [0,10]')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CAST(split(`Blood Pressure`, "/")[0] AS INT) > CAST(split(`Blood
        Pressure`, "/")[1] AS INT)', 'Systolic > Diastolic from Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies(''CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL
        AND CAST(`Daily Steps` AS DOUBLE) IS NOT NULL'', ''Physical Activity Level
        and Daily Steps are numeric'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''NOT (`Physical Activity Level` >= 90 AND (`Daily Steps`
        IS NULL OR `Daily Steps` <= 0))'', ''High activity level requires reasonable
        steps'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: .satisfies('(`Sleep Duration` > 0)', 'Sleep Duration must be strictly
        positive')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`Quality of Sleep` = CAST(`Quality of Sleep` AS INT))
        AND (`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10)', 'Quality of Sleep
        must be integer-like and in [0,10]')
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: .satisfies('(`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10
        AND `Quality of Sleep` = CAST(`Quality of Sleep` AS INT))', 'QualityOfSleep_valid_int_0_10')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`Stress Level` >= 0 AND `Stress Level` <= 10 AND `Stress
        Level` = CAST(`Stress Level` AS INT))', 'StressLevel_valid_int_0_10')
      status: true
      reason_if_failed: ''
      level: warning
