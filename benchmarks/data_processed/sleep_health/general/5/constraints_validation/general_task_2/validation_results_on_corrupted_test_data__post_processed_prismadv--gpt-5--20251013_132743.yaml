results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies("double(`Physical Activity Level`) >= 0 AND double(`Physical
        Activity Level`) <= 100", "PAL within [0,100]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.hasCompleteness(''Quality of Sleep'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMin(''Quality of Sleep'', lambda v: v >= 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Quality of Sleep'', lambda v: v <= 10)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''BMI Category'', [''Overweight'', ''Normal'', ''Obese'',
        ''Normal Weight''], lambda f: f >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`BMI Category` = TRIM(`BMI Category`)'', ''BMI Category
        trimmed'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Blood Pressure` RLIKE ''^\\s*\\d{2,3}(\\.\\d+)?\\s*/\\s*\\d{2,3}(\\.\\d+)?\\s*$''
        THEN CAST(regexp_extract(`Blood Pressure`, ''^\\s*(\\d{2,3}(\\.\\d+)?)\\s*/\\s*(\\d{2,3}(\\.\\d+)?)\\s*$'',
        1) AS DOUBLE) BETWEEN 80 AND 220 ELSE true END", "Systolic plausible range
        on valid rows >=95%", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Blood Pressure` RLIKE ''^\\s*\\d{2,3}(\\.\\d+)?\\s*/\\s*\\d{2,3}(\\.\\d+)?\\s*$''
        THEN CAST(regexp_extract(`Blood Pressure`, ''^\\s*(\\d{2,3}(\\.\\d+)?)\\s*/\\s*(\\d{2,3}(\\.\\d+)?)\\s*$'',
        3) AS DOUBLE) BETWEEN 50 AND 120 ELSE true END", "Diastolic plausible range
        on valid rows >=95%", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Blood Pressure` RLIKE ''^\\s*\\d{2,3}(\\.\\d+)?\\s*/\\s*\\d{2,3}(\\.\\d+)?\\s*$''
        THEN CAST(regexp_extract(`Blood Pressure`, ''^\\s*(\\d{2,3}(\\.\\d+)?)\\s*/\\s*(\\d{2,3}(\\.\\d+)?)\\s*$'',
        1) AS DOUBLE) >= CAST(regexp_extract(`Blood Pressure`, ''^\\s*(\\d{2,3}(\\.\\d+)?)\\s*/\\s*(\\d{2,3}(\\.\\d+)?)\\s*$'',
        3) AS DOUBLE) ELSE true END", "Systolic >= diastolic on valid rows >=95%",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('`Person ID`')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` IS NULL OR (CAST(`Sleep Duration`
        AS DOUBLE) >= 0 AND CAST(`Sleep Duration` AS DOUBLE) <= 24)", "Sleep Duration
        within [0,24] hours for non-null values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.satisfies("CAST(`Daily Steps` AS double) >= 0", "Non-negative
        steps", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Daily Steps` AS double) <= 50000", "Plausible
        steps upper bound", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CAST(`Daily Steps` AS double) <=
        50000", "Plausible steps upper bound", lambda x: x >= 0.99)'' failed on data
        sample: Value: 0.9 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CAST(`Daily Steps` AS double) = CAST(`Daily Steps`
        AS BIGINT)", "Steps are integers", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (TRIM(`Sleep Disorder`)
        IN (''Sleep Apnea'',''Insomnia''))", "Sleep Disorder domain (NULLs allowed)",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.hasCompleteness(''Heart Rate'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Heart Rate'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Heart Rate` >= 40 AND `Heart Rate` <= 120)'', ''HR
        plausible range'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("CAST(`Stress Level` AS DOUBLE) IS NOT NULL", "Stress
        Level numeric parseable (>=95%)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn("Stress Level", ["3","4","5","6","7","8"], lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Person ID"]':
    code:
    - suggestion: '.hasUniqueness([''Person ID'', ''BMI Category''], lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Person ID"]':
    code:
    - suggestion: '.hasUniqueness(columns=[''Person ID''], assertion=lambda u: u ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Daily Steps` IS NOT NULL AND `Physical Activity Level`
        IS NOT NULL", "at_least_one_steps_pal_pair", assertion=lambda n: n >= 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(columnA=''Daily Steps'', columnB=''Physical Activity
        Level'', assertion=lambda c: c >= 0.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation(columnA=''Daily Steps'', columnB=''Physical
        Activity Level'', assertion=lambda c: c >= 0.0)'' failed on data sample: Value:
        -0.09045529785496331 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("NOT (`Blood Pressure` RLIKE ''^[0-9]{2,3}/[0-9]{2,3}$'')",
        "bp_bad_format_zero", assertion=lambda n: n == 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) <= CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT)", "bp_sys_greater_than_dia_violation_zero", assertion=lambda
        n: n == 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Heart Rate","Person ID"]':
    code:
    - suggestion: '.satisfies("(`Blood Pressure` IS NULL) OR (size(split(`Blood Pressure`,
        ''/'')) = 2 AND (CAST(split(`Blood Pressure`, ''/'')[0] AS DOUBLE) IS NULL
        OR CAST(split(`Blood Pressure`, ''/'')[1] AS DOUBLE) IS NULL OR CAST(split(`Blood
        Pressure`, ''/'')[0] AS DOUBLE) > CAST(split(`Blood Pressure`, ''/'')[1] AS
        DOUBLE)))", "Systolic > Diastolic when both present", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        c: c >= 0.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation("Daily Steps", "Physical Activity
        Level", lambda c: c >= 0.0)'' failed on data sample: Value: -0.09045529785496331
        does not meet the constraint requirement!'
      level: warning
  '["Person ID","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("(`Physical Activity Level` IS NOT NULL) AND (`Daily
        Steps` IS NOT NULL)", "at_least_one_valid_pal_steps_row", lambda n: n >= 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness(["Person ID"], lambda u: u == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Person ID","Stress Level"]':
    code:
    - suggestion: '.satisfies(''`Stress Level` IS NOT NULL AND `Sleep Duration` IS
        NOT NULL'', ''sd_pairs'', lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: warning
