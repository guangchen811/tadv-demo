results:
  Physical Activity Level:
    code:
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda x: x
        > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('`Physical Activity Level`')
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies(''`Quality of Sleep` >= 1 AND `Quality of Sleep` <=
        10'', ''QoS_in_logical_range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` <= 6'', ''has_low_QoS_records'',
        lambda num_matching_rows: num_matching_rows > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: .isContainedIn("BMI Category", ["Overweight", "Obese", "Normal",
        "Normal Weight"])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: '.satisfies("`Blood Pressure` RLIKE ''^[0-9]+/[0-9]+$''", "Blood
        Pressure format must be ''systolic/diastolic''", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) > CAST(SPLIT(`Blood
        Pressure`, ''/'')[1] AS INT)", "Systolic must be greater than Diastolic",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "Sleep Duration is within a plausible range (0-24 hours)", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isNonNegative('`Daily Steps`')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (''Insomnia'',
        ''Sleep Apnea'')", "Sleep Disorder values are valid or null", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` = ''Insomnia''", "Dataset contains
        at least one ''Insomnia'' case for threshold calculation", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("`Stress Level` >= 0 AND `Stress Level` <= 10", "StressLevelRangeCheck",
        assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Stress Level'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["BMI Category","Blood Pressure","Daily Steps","Person ID","Physical Activity
    Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) > CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT)", "SystolicGreaterThanDiastolic", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Physical Activity Level", "Daily Steps", lambda
        corr: corr >= 0.5)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation("Physical Activity Level", "Daily
        Steps", lambda corr: corr >= 0.5)'' failed on data sample: Value: -0.09045529785496328
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(`Quality of Sleep` >= 1 AND `Quality of Sleep` <=
        10) AND (`Sleep Duration` >= 0 AND `Sleep Duration` <= 24)", "SleepMetricsRangeCheck",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Blood Pressure","Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) > CAST(SPLIT(`Blood
        Pressure`, ''/'')[1] AS INT)", "SystolicGreaterThanDiastolic", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Quality of Sleep` <= 6 AND `Sleep Duration` >= 7",
        "LowQualityLongSleepPrevalenceCheck", lambda x: x < 0.25)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        x: x >= 0.5)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation(''Daily Steps'', ''Physical
        Activity Level'', lambda x: x >= 0.5)'' failed on data sample: Value: -0.09045529785496331
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''NOT (`Daily Steps` > 10000 AND `Physical Activity
        Level` <= 40)'', ''High_steps_should_not_correspond_to_low_PAL'', lambda x:
        x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''NOT (`Daily Steps` > 10000 AND
        `Physical Activity Level` <= 40)'', ''High_steps_should_not_correspond_to_low_PAL'',
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9666666666666667 does
        not meet the constraint requirement!'
      level: warning
  '["Daily Steps","Physical Activity Level","Quality of Sleep","Sleep Duration","Stress Level"]':
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        corr: corr > 0.5)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation(''Physical Activity Level'',
        ''Daily Steps'', lambda corr: corr > 0.5)'' failed on data sample: Value:
        -0.09045529785496328 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("NOT (`Daily Steps` > 10000 AND `Physical Activity Level`
        <= 40)", "ActivityMetricsConsistency", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("NOT (`Daily Steps` > 10000 AND `Physical
        Activity Level` <= 40)", "ActivityMetricsConsistency", lambda x: x == 1.0)''
        failed on data sample: Value: 0.9666666666666667 does not meet the constraint
        requirement!'
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10
        AND `Sleep Duration` >= 0", "Valid_QoS_and_Sleep_Duration_Ranges", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Quality of Sleep'', ''Sleep Duration'', lambda
        x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Quality of Sleep` <= 6 AND `Sleep Duration` >= 7",
        "low_qos_long_sleep_pattern_exists", lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
