      uid: dda67d4f-b95f-446b-89b3-95638695a430
    - text: 'Every value in the ''Blood Pressure'' column must be a string formatted
        as ''<systolic>/<diastolic>'', where both systolic and diastolic are integers.
        This is required because the code splits the string by ''/'' and casts both
        parts to integers without error handling. Any deviation (e.g., missing ''/'',
        non-integer parts, extra delimiters, or non-numeric values) would cause an
        error. We could represent this assumption as a deequ constraint like this:
        .satisfies("CASE WHEN `Blood Pressure` RLIKE ''^[0-9]+/[0-9]+$'' THEN 1 ELSE
        0 END", "Blood Pressure Format", lambda x: x == 1)'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: 257f623f-693e-40ba-978c-6c087ee00352
    - text: 'The integer values for systolic and diastolic blood pressure (parsed
        from the ''Blood Pressure'' column) should be in plausible physiological ranges,
        as the downstream code calculates risk categories based on systolic and diastolic
        thresholds (e.g., 120, 130, 139, 140 for systolic; 80, 89, 90 for diastolic).
