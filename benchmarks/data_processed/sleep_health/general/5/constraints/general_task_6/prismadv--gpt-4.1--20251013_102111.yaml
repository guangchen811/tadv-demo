        systolic < 70 or > 250, diastolic < 40 or > 150), the risk categorization
        may be meaningless or indicate data issues. We could represent this assumption
        as a deequ constraint like this: .satisfies("CASE WHEN CAST(split(`Blood Pressure`,
        ''/'')[0] AS INT) BETWEEN 70 AND 250 AND CAST(split(`Blood Pressure`, ''/'')[1]
        AS INT) BETWEEN 40 AND 150 THEN 1 ELSE 0 END", "Plausible Blood Pressure Range",
        lambda x: x == 1)'
      sources:
