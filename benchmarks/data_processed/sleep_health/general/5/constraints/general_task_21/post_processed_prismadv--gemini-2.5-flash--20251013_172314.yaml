    - text: 'The ''Stress Level'' column must contain numeric values for all records,
        especially those where ''Sleep Disorder'' is either ''Insomnia'' or ''Sleep
        Apnea''. This is crucial for the accurate calculation of average stress levels
        (`ins_mean_stress`, `ap_mean_stress` on lines 46-47) for these specific groups,
        which are then used to determine the dynamic `stress_threshold` (line 52)
        and `stress_score` (line 58). Non-numeric values would lead to NaN means,
        potentially defaulting the threshold and impacting risk scores. We could represent
        this assumption with a Deequ constraint like: `.isIntegral(''Stress Level'',
        where="`Sleep Disorder` IN (''Insomnia'', ''Sleep Apnea'')")`.'
