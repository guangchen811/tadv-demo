  Physical Activity Level:
    60cc3020-72af-4796-9c4b-82d261f9e3d9: '.isNonNegative(''`Physical Activity Level`'',
      lambda x: x == 1.0)'
  Sleep Duration:
    537135a8-83fe-44f7-b0e5-63a9b1abda9c: '.isNonNegative(''`Sleep Duration`'', lambda
      x: x == 1.0)'
  '["Diastolic","Systolic"]':
    7bffe2e0-618b-4c77-b5f4-18d02cade637: '.satisfies("`Blood Pressure` IS NOT NULL
      AND `Blood Pressure` RLIKE ''^\\d+/\\d+$''", "Blood Pressure Format Validation",
      lambda x: x == 0.0)'
    44d01086-f272-4874-965e-cf4e281d1c66: '.satisfies("CASE WHEN `Sleep Disorder`
      = ''Sleep Apnea'' THEN (`BMI Category` IS NOT NULL AND (`BMI Category` = ''Overweight''
      OR `BMI Category` = ''Obese'')) ELSE TRUE END", "BMI Category for Sleep Apnea
      Records", lambda x: x >= 0.95)'
    67aba0cd-a27b-4735-85e6-66a9f3e10af5: '.satisfies("CAST(SPLIT(`Blood Pressure`,
      ''/'')[0] AS INT) IS NOT NULL AND CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS
      INT) IS NOT NULL", "Systolic and Diastolic are Non-Null Integers", lambda x:
      x == 1.0)'
  '["Quality of Sleep","Sleep Duration"]':
    186ab3a7-a6e3-470d-b23b-24f7b14b0901: '.satisfies("`Quality of Sleep` <= 6 AND
      `Sleep Duration` >= 7", "Low QOS Long Sleep Co-occurrence", lambda x: x >= 0.0)'
  '["Sleep Disorder","Stress Level"]':
    4ff9de4c-6e28-4332-b642-b29ada003677: '.satisfies("`Sleep Disorder` = ''Sleep
      Apnea''", "SleepApneaCategoryExists", lambda x: x > 0)'
