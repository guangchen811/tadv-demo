  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Sleep Duration and Quality of Sleep must both be present and parseable
        as numeric for every record (pairwise completeness = 1.0). Otherwise qos_component,
        duration_component, qos_gap_penalty, and the aggregated risk_score will become
        NaN and the per-row float(score) cast will fail. Deequ example: Check(...).satisfies(''cast(`Sleep
        Duration` as double) IS NOT NULL AND cast(`Quality of Sleep` as double) IS
        NOT NULL'', ''both_numeric_nonnull'', v => v == 1.0)'
      sources:
      - start_line: 19
        end_line: 20
        file: ''
      - start_line: 41
        end_line: 44
        file: ''
      - start_line: 106
        end_line: 117
        file: ''
      - start_line: 121
        end_line: 123
        file: ''
      uid: 7a559d1e-5844-4b7c-9622-43e333c5d602
    - text: 'There must be at least two records where both Sleep Duration and Quality
        of Sleep are numeric (non-null) and Sleep Duration takes at least two distinct
        values among those paired rows, so the linear fit np.polyfit(x, y, 1) is well-posed.
        Deequ examples: Check(...).hasSize(s => s >= 2, where = ''cast(`Sleep Duration`
        as double) IS NOT NULL AND cast(`Quality of Sleep` as double) IS NOT NULL'');
        and Check(...).hasNumberOfDistinctValues(''Sleep Duration'', n => n >= 2,
        where = ''cast(`Quality of Sleep` as double) IS NOT NULL'')'
      sources:
      - start_line: 35
        end_line: 44
        file: ''
      uid: b8942721-3824-41a9-9b34-baca11048151
    - text: 'The correlation between Sleep Duration and Quality of Sleep must be defined
        (non-NaN), implying at least two paired non-null rows with non-zero variance
        in the pair. This ensures the downstream calibration and regression are meaningful.
        Deequ example: Check(...).hasCorrelation(''Sleep Duration'', ''Quality of
        Sleep'', c => !java.lang.Double.isNaN(c))'
      sources:
      - start_line: 35
        end_line: 39
        file: ''
      - start_line: 41
        end_line: 44
        file: ''
      uid: 6de2a223-3770-40e2-a14c-9c8aefdf97a8
  '["Quality of Sleep","Stress Level"]':
    code: []
    assumptions:
    - text: 'There must be at least 2 records where both ''Sleep Duration'' and ''Quality
        of Sleep'' are non-null so that the linear fit (np.polyfit) can be safely
        computed for predicting expected Quality of Sleep from duration. This can
        be represented as a constraint like: count_rows(`Sleep Duration` IS NOT NULL
        AND `Quality of Sleep` IS NOT NULL) >= 2 (e.g., Deequ Analyzer Size with a
        where filter >= 2).'
      sources:
      - start_line: 35
        end_line: 43
        file: ''
      uid: 256c5498-ca70-4016-bbfb-bc3a17d4ce7d
    - text: 'There must be at least 2 records where both ''Stress Level'' and ''Quality
        of Sleep'' are non-null to allow the correlation estimate between stress and
        sleep quality to be computed reliably. This can be represented as a constraint
        like: count_rows(`Stress Level` IS NOT NULL AND `Quality of Sleep` IS NOT
        NULL) >= 2.'
      sources:
      - start_line: 47
        end_line: 52
        file: ''
      uid: 76721ad1-1591-4e99-bf2a-802543333a55
    - text: 'At the population level, ''Quality of Sleep'' should be non-negatively
        correlated with ''Sleep Duration'' (i.e., corr(`Sleep Duration`, `Quality
        of Sleep`) >= 0), reflecting that longer sleep is not associated with worse
        quality. This can be represented as a Deequ correlation constraint: .hasCorrelation(''Sleep
        Duration'', ''Quality of Sleep'', _ >= 0.0).'
      sources:
      - start_line: 35
        end_line: 44
        file: ''
      uid: b3f2e43e-6f24-4b65-85da-f705a6db1d77
    - text: '''Stress Level'' should not be positively correlated with ''Quality of
        Sleep'' (higher stress should not coincide with better sleep quality): corr(`Stress
        Level`, `Quality of Sleep`) <= 0. This can be represented as a Deequ correlation
        constraint: .hasCorrelation(''Stress Level'', ''Quality of Sleep'', _ <= 0.0).'
      sources:
      - start_line: 47
        end_line: 52
        file: ''
      uid: 680def8b-2d3f-4c5b-951b-7668b1e38f4b
    - text: To avoid NaNs propagating into risk_score and alert logic, both 'Quality
        of Sleep' and 'Stress Level' should be present and numeric for all records
        used in scoring. Represent as completeness constraints across both columns,
        e.g., .isComplete('Quality of Sleep') AND .isComplete('Stress Level').
      sources:
      - start_line: 20
        end_line: 21
        file: ''
      - start_line: 106
        end_line: 117
        file: ''
      - start_line: 123
        end_line: 123
        file: ''
      uid: 4151f6bf-97f4-403a-a7e8-cbbff19a28a9
  '["Sleep Duration","Stress Level"]':
    code: []
    assumptions:
    - text: 'There must be at least 2 records where both ''Sleep Duration'' and ''Quality
        of Sleep'' are non-null and numeric to allow the linear regression fit used
        to predict QoS from Sleep Duration. Additionally, ''Sleep Duration'' among
        those paired rows must not be constant (stddev > 0). We could represent this
        with Deequ constraints such as: hasSize(assertion = _ >= 2, where = "`Sleep
        Duration` IS NOT NULL AND `Quality of Sleep` IS NOT NULL") and hasStandardDeviation("Sleep
        Duration", assertion = _ > 0, where = "`Sleep Duration` IS NOT NULL AND `Quality
        of Sleep` IS NOT NULL").'
      sources:
      - start_line: 35
        end_line: 44
        file: ''
      uid: 98e50fa8-00f9-49bc-baa1-b0080c464882
    - text: 'There must be at least 2 records where both ''Sleep Duration'' and ''Stress
        Level'' are non-null and numeric to compute their correlation (used for diagnostics).
        In Deequ: hasSize(assertion = _ >= 2, where = "`Sleep Duration` IS NOT NULL
        AND `Stress Level` IS NOT NULL").'
      sources:
      - start_line: 47
        end_line: 56
        file: ''
      uid: c512f8e7-9fb2-4e13-b7f1-b58f13d553e3
    - text: "Row-level joint range validity: if present, 'Sleep Duration' should lie\
        \ within [0, 24] hours and 'Stress Level' should lie within [3, 8] (dataset\
        \ shows 3\u20138 and code scales stress on [3,8]). Enforce as a multi-column\
        \ compliance check, for example in Deequ: satisfies(\"((`Sleep Duration` IS\
        \ NULL) OR (`Sleep Duration` >= 0 AND `Sleep Duration` <= 24)) AND ((`Stress\
        \ Level` IS NULL) OR (`Stress Level` >= 3 AND `Stress Level` <= 8))\", assertion\
        \ = _ >= 1.0)."
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: 7f3481af-f015-41e8-afa6-8af078deb1ab
    - text: 'High joint completeness is expected so that risk scoring and alert thresholds
        are meaningful. At least 95% of rows should have both ''Sleep Duration'' and
        ''Stress Level'' present. In Deequ: satisfies("`Sleep Duration` IS NOT NULL
        AND `Stress Level` IS NOT NULL", assertion = _ >= 0.95).'
      sources:
      - start_line: 105
        end_line: 117
