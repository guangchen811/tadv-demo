        1) AS DOUBLE) >= CAST(regexp_extract(`Blood Pressure`, ''^\\s*(\\d{2,3}(\\.\\d+)?)\\s*/\\s*(\\d{2,3}(\\.\\d+)?)\\s*$'',
        3) AS DOUBLE) ELSE true END", "Systolic >= diastolic on valid rows >=95%",
        lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 3dd8c35f-036f-4982-8488-adcf3c391400
      source_assumptions:
      - 1490896c-c718-4ba9-8748-d8406712d7c3
    assumptions:
    - text: 'The ''Blood Pressure'' column must be present and the vast majority of
        rows should be in the format ''systolic/diastolic'' (a single slash separating
        two numeric values, optional whitespace allowed). A practical rule: at least
        95% of values match the regex ^\s*\d{2,3}(\.\d+)?\s*/\s*\d{2,3}(\.\d+)?\s*$.
        This ensures the code can split and convert both parts to numbers without
        producing NaNs that would propagate into the risk score.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 106
        end_line: 117
        file: ''
      uid: e3356c78-2eed-4636-a62f-4eff1cb72c0a
    - text: 'For rows that conform to the expected format, systolic and diastolic
        values should be within plausible adult ranges so that scaling and thresholds
        are meaningful. A reasonable expectation is: at least 95% of systolic values
        are between 80 and 220 mmHg, and at least 95% of diastolic values are between
        50 and 120 mmHg.'
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 68
        end_line: 70
        file: ''
      - start_line: 135
        end_line: 135
        file: ''
      uid: 3fb76468-56e0-4d29-868f-c4e6b5dcf62b
    - text: For valid readings, systolic should be greater than or equal to diastolic
        in at least 95% of rows (to guard against swapped values like '80/120').
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 68
        end_line: 70
        file: ''
      - start_line: 135
        end_line: 135
        file: ''
      uid: 1490896c-c718-4ba9-8748-d8406712d7c3
    - text: The fraction of unparsable or missing 'Blood Pressure' values should be
        very low (e.g., less than 5%), because unparsable values will yield NaNs in
        'systolic'/'diastolic', which propagate to 'bp_component' and then to 'risk_score',
        causing NaN scores and defaulting individuals to LOW_RISK.
      sources:
      - start_line: 64
        end_line: 70
        file: ''
      - start_line: 106
        end_line: 117
        file: ''
      uid: 01b1f43c-735a-45bb-9992-f16392eb3afa
    - text: Units should be mmHg with no unit text embedded in the values (e.g., '120/80'
        rather than '120/80 mmHg'), since the code expects plain numeric strings and
        will coerce non-numeric characters to NaN.
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      uid: e0ce2e4a-eba4-4705-ac12-a75739255a0d
