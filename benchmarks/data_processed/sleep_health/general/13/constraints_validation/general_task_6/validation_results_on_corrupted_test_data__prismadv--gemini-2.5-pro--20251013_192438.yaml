results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies("`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100", "''Physical Activity Level'' in range [0, 100]", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete("Quality of Sleep")
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) > CAST(SPLIT(`Blood
        Pressure`, ''/'')[1] AS INT)", "Systolic > Diastolic check", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` > 2.99 AND `Sleep Duration` <= 14.01'',
        ''Sleep Duration must be in range (2.99, 14.01]'', assertion=lambda x: x ==
        1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`Sleep Duration` > 2.99 AND `Sleep
        Duration` <= 14.01'', ''Sleep Duration must be in range (2.99, 14.01]'', assertion=lambda
        x: x == 1.0)'' failed on data sample: Value: 0.98 does not meet the constraint
        requirement!'
      level: error
  Daily Steps:
    code:
    - suggestion: '.satisfies("`Daily Steps` IS NULL OR (`Daily Steps` >= 0 AND `Daily
        Steps` <= 50000)", "''Daily Steps'' must be between 0 and 50000", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Daily Steps", lambda c: c > 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("`Stress Level` >= 3 AND `Stress Level` <= 8", "StressLevelRangeCheck",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Blood Pressure","Daily Steps","Physical Activity Level","Quality of Sleep","Sleep
    Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) > CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT)", "SystolicGreaterThanDiastolic", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation("Physical Activity Level", "Daily Steps", lambda
        x: x >= 0.3)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda x:
        x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        corr: corr > 0)'
      status: true
      reason_if_failed: ''
      level: warning
