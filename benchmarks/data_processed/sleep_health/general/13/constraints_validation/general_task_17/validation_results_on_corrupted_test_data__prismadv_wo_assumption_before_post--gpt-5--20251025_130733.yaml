results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100', 'PA level in [0,100]')
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` BETWEEN 1 AND 10'', ''QoS range
        [1,10]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.isContainedIn(''BMI Category'', [''Obese'', ''Overweight'', ''Normal'',
        ''Normal Weight''], lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''trim(`BMI Category`) = `BMI Category`'', ''BMI Category
        no leading/trailing spaces'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', r''^(\d{2,3})/(\d{2,3})$'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Person ID''], lambda u: u >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'',
        ''sleep_duration_between_0_24'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("(trim(lower(`Sleep Disorder`)) IN (''sleep apnea'',''insomnia''))
        OR (`Sleep Disorder` IS NULL) OR (trim(lower(`Sleep Disorder`)) IN ('''',
        ''nullvalue''))", "sleep_disorder_values_expected", lambda x: x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Sleep Disorder", lambda c: c >= 0.35)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Heart Rate` >= 30 AND `Heart Rate` <= 220'', ''Heart
        Rate plausible physiological range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Stress Level` BETWEEN 0 AND 10'', ''Stress Level
        within expected range [0, 10]'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: '.hasCompleteness(''Age'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Age` >= 0 AND `Age` <= 120'', ''Age within [0,120]'',
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Age","BMI Category","Blood Pressure","Daily Steps","Heart Rate","Person ID","Physical
    Activity Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: .isComplete("Blood Pressure")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("Blood Pressure", "^\\d{2,3}/\\d{2,3}$", lambda f:
        f == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "sleep_duration_reasonable", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Quality of Sleep` BETWEEN 1 AND 10", "quality_of_sleep_range",
        lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Stress Level` BETWEEN 1 AND 10", "stress_level_range",
        lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Age` BETWEEN 0 AND 120", "age_plausible", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Heart Rate` > 0 AND `Heart Rate` <= 250", "heart_rate_plausible",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn("BMI Category", ["Obese", "Overweight", "Normal",
        "Normal Weight"], lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (''Sleep
        Apnea'', ''Insomnia'')", "sleep_disorder_values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Physical Activity Level'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.satisfies(''`Stress Level` >= 0 AND `Stress Level` <= 10'', ''stress_level_range'',
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` >= 0 AND `Quality of Sleep` <=
        10'', ''quality_of_sleep_range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
