results:
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .hasPattern('Blood Pressure', '^\\d{2,3}/\\d{2,3}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(split(`Blood Pressure`, "/")[0] AS INT) BETWEEN
        80 AND 250 AND CAST(split(`Blood Pressure`, "/")[1] AS INT) BETWEEN 40 AND
        140'', ''bp_range_valid'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .hasDataType('Daily Steps', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Daily Steps')
      status: false
      reason_if_failed: "Constraint '.isNonNegative('Daily Steps')' failed on data\
        \ sample: org.apache.spark.sql.catalyst.parser.ParseException: \n[PARSE_SYNTAX_ERROR]\
        \ Syntax error at or near '('.(line 1, pos 13)\n\n== SQL ==\nCOALESCE(CAST(Daily\
        \ Steps AS DECIMAL(20,10)), 0.0) >= 0\n-------------^^^\n"
      level: error
  Heart Rate:
    code:
    - suggestion: .hasDataType('Heart Rate', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Heart Rate` >= 30 AND `Heart Rate` <= 220'', ''heart_rate_range'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .hasDataType('Person ID', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Physical Activity Level:
    code:
    - suggestion: .hasDataType('Physical Activity Level', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Physical Activity Level')
      status: false
      reason_if_failed: "Constraint '.isNonNegative('Physical Activity Level')' failed\
        \ on data sample: org.apache.spark.sql.catalyst.parser.ParseException: \n\
        [PARSE_SYNTAX_ERROR] Syntax error at or near '('.(line 1, pos 13)\n\n== SQL\
        \ ==\nCOALESCE(CAST(Physical Activity Level AS DECIMAL(20,10)), 0.0) >= 0\n\
        -------------^^^\n"
      level: error
  Quality of Sleep:
    code:
    - suggestion: .hasDataType('Quality of Sleep', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Quality of Sleep` >= 0 AND `Quality of Sleep` <=
        10'', ''qos_range'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies(''`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (\''Sleep
        Apnea\'', \''Insomnia\'')'', ''sleep_disorder_allowed_or_null'', lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .hasDataType('Sleep Duration', ConstrainableDataTypes.Fractional)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'',
        ''sleep_duration_range'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: .hasDataType('Stress Level', ConstrainableDataTypes.Integral)
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Stress Level` >= 0 AND `Stress Level` <= 10'', ''stress_range'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
