      - start_line: 32
        end_line: 39
        file: ''
      uid: 593792f8-a970-4953-b535-11abd1f7a5a3
    - text: Daily Steps and Physical Activity Level must both be present and numeric
        for all rows, enabling percentile ranks. Their percentile-based activity_index
        equals the mean of the two percent ranks and thus must lie in [0, 1]; activity_protect
        = 22.0 * activity_index must lie in [0, 22]. A positive monotonic association
        is expected between Daily Steps and Physical Activity Level (e.g., Spearman
        correlation > 0).
