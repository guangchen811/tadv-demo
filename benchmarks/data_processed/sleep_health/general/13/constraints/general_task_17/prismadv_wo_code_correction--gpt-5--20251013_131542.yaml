      uid: 03bf6dc1-0bca-417e-b40b-ebc29a13cb90
    - text: 'Sleep Disorder-to-risk mapping must be consistent: if Sleep Disorder
        contains ''Sleep Apnea'' (case-insensitive) then sd_risk = 16; else if it
        contains ''Insomnia'' then sd_risk = 10; else sd_risk = 0.'
      sources:
      - start_line: 85
        end_line: 87
        file: ''
      uid: 00d4ba9e-34e1-4468-8e22-9889a5becd41
    - text: 'raw_risk must equal the sum of component risks minus activity protections:
        raw_risk = bp_risk + sq_risk + duration_risk + bmi_risk + hr_risk + age_risk
        + sd_risk - activity_protect - vigorous_bonus.'
      sources:
      - start_line: 90
        end_line: 94
        file: ''
      uid: abbe54bc-a501-42cf-8f53-b2c108020848
    - text: 'risk_score must be the clipped and rounded raw_risk: risk_score = round(clip(raw_risk,
        lower=0, upper=100), 2).'
      sources:
      - start_line: 96
        end_line: 96
        file: ''
      uid: b88f9a99-b631-4ac0-bdc1-574620820da2
    - text: 'priority_bucket must be consistent with risk_score bins: risk_score in
        [0, 25] -> ''Low''; (25, 50] -> ''Moderate''; (50, 75] -> ''High''; (75, 100]
        -> ''Critical''.'
      sources:
      - start_line: 99
        end_line: 100
        file: ''
      uid: a040145d-710a-4fb1-b7f9-bdfe7d815a0e
  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'Daily Steps and Physical Activity Level must both be present (non-null)
        and parseable as numeric for every record used, because they are ranked and
        averaged to compute activity_index and also used together in a boolean rule.
        This can be enforced with joint completeness/compliance and numeric-type checks,
        e.g., in Deequ: isComplete(''Daily Steps''), isComplete(''Physical Activity
        Level''), hasDataType(''Daily Steps'', Integral, required = true), hasDataType(''Physical
        Activity Level'', Integral, required = true), and a joint check like hasCompliance(''steps_pa_both_non_null'',
        ''isNotNull(`Daily Steps`) AND isNotNull(`Physical Activity Level`)'', _ ==
        1.0).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 42
        end_line: 46
        file: ''
      uid: 0183f091-ac3b-4688-9345-16c87566af42
    - text: Daily Steps and Physical Activity Level should be positively correlated
        (both are intended to move in the same direction as activity) since the activity_index
        is the average of their percentile ranks. A suitable multi-column constraint
        is to require a minimum correlation, e.g., Deequ hasCorrelation('Daily Steps',
        'Physical Activity Level', _ >= 0.3).
      sources:
      - start_line: 42
        end_line: 45
        file: ''
      uid: 2b5bf637-8c40-4c8b-ae04-3c5d6d5d9a58
    - text: 'Alignment at the vigorous threshold: Rows indicating vigorous activity
        on one measure should generally agree on the other. Concretely, at least 95%
        of rows should satisfy ((Daily Steps >= 10000 AND Physical Activity Level
        >= 60) OR (Daily Steps < 10000 AND Physical Activity Level < 60)). This can
        be enforced with a multi-column compliance constraint, e.g., Deequ hasCompliance(''vigorous_alignment'',
        ''((`Daily Steps` >= 10000 AND `Physical Activity Level` >= 60) OR (`Daily
        Steps` < 10000 AND `Physical Activity Level` < 60))'', _ >= 0.95).'
      sources:
      - start_line: 46
        end_line: 46
        file: ''
      uid: 5ec62a17-3ae9-4721-87e4-197376b3f859
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.haveCompleteness(["Stress Level", "Quality of Sleep"], lambda
        v: v == 1.0)'
      validity: false
      reason_if_invalid: "Constraint '.haveCompleteness([\"Stress Level\", \"Quality\
        \ of Sleep\"], lambda v: v == 1.0)' failed on data sample: org.apache.spark.sql.catalyst.parser.ParseException:\
        \ \n[PARSE_SYNTAX_ERROR] Syntax error at or near 'IS'.(line 1, pos 15)\n\n\
        == SQL ==\n((Stress Level IS NOT NULL) AND (Quality of Sleep IS NOT NULL))\n\
        ---------------^^^\n"
      level: warning
      uid: 458100fb-72a4-41e9-8efc-b39ff037e16a
      source_assumptions:
      - 137655b5-e4a8-462b-877f-672e70d05d7f
    - suggestion: '.satisfies("(`Stress Level` BETWEEN 0 AND 10) AND (`Quality of
        Sleep` BETWEEN 0 AND 10) AND (`Stress Level` = CAST(`Stress Level` AS INT))
        AND (`Quality of Sleep` = CAST(`Quality of Sleep` AS INT))", "sq_inputs_range_int",
        lambda r: r >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: bbf3c764-aabb-4bf7-8d99-4332da06ec17
      source_assumptions:
      - 7d47a9c9-2871-4b83-a9f6-2f09757669e6
    assumptions:
    - text: 'Both ''Stress Level'' and ''Quality of Sleep'' must be present (non-null)
        and numeric in every row to allow arithmetic in the stress/quality risk computation.
        This can be enforced with a Deequ constraint such as: .satisfies("`Stress
        Level` IS NOT NULL AND `Quality of Sleep` IS NOT NULL", "sq_inputs_complete",
        r => r == 1.0).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 49
        end_line: 50
        file: ''
      uid: 220b6f9a-7751-4590-be23-043145763b41
    - text: '''Stress Level'' and ''Quality of Sleep'' should be integer-like Likert
        scores bounded to [0, 10] so that (10 - ''Quality of Sleep'') is non-negative
        and sq_factor is well-defined. This can be enforced with: .satisfies("`Stress
        Level` BETWEEN 0 AND 10 AND `Quality of Sleep` BETWEEN 0 AND 10", "sq_inputs_range",
        r => r >= 0.99).'
      sources:
      - start_line: 49
        end_line: 50
        file: ''
      uid: 137655b5-e4a8-462b-877f-672e70d05d7f
    - text: 'The derived ''sq_risk'' must be deterministically computed from ''Stress
        Level'' and ''Quality of Sleep'' as sq_risk = 2.8 * Stress Level * (10 - Quality
        of Sleep) / 10.0. Example Deequ constraint: .satisfies("ABS(`sq_risk` - 2.8
        * `Stress Level` * (10 - `Quality of Sleep`) / 10.0) < 1e-6", "sq_risk_formula",
        r => r == 1.0).'
      sources:
      - start_line: 49
        end_line: 50
        file: ''
      uid: 7d47a9c9-2871-4b83-a9f6-2f09757669e6
    - text: 'The aggregate ''raw_risk'' must equal the sum of component risks minus
        activity protections: raw_risk = bp_risk + sq_risk + duration_risk + bmi_risk
        + hr_risk + age_risk + sd_risk - activity_protect - vigorous_bonus. Example
        Deequ: .satisfies("ABS(`raw_risk` - (`bp_risk` + `sq_risk` + `duration_risk`
        + `bmi_risk` + `hr_risk` + `age_risk` + `sd_risk` - `activity_protect` - `vigorous_bonus`))
        < 1e-6", "raw_risk_consistency", r => r == 1.0).'
      sources:
      - start_line: 90
        end_line: 94
        file: ''
      uid: cfb43226-5477-42e0-90ca-0949831ce51b
    - text: '''risk_score'' must be the clipped and rounded version of ''raw_risk'':
        risk_score = round(clip(raw_risk, 0, 100), 2). Example Deequ: .satisfies("`risk_score`
        = ROUND(GREATEST(0, LEAST(100, `raw_risk`)), 2)", "risk_score_clip_round",
        r => r == 1.0).'
      sources:
      - start_line: 96
        end_line: 96
        file: ''
      uid: f02c82bf-1129-41ac-9ef8-924b6afde659
    - text: '''priority_bucket'' must be consistent with ''risk_score'' bins used
        in pd.cut: (-0.01,25] -> ''Low'', (25,50] -> ''Moderate'', (50,75] -> ''High'',
        (75,100] -> ''Critical''. Example Deequ: .satisfies("CASE WHEN `risk_score`
        <= 25 THEN ''Low'' WHEN `risk_score` <= 50 THEN ''Moderate'' WHEN `risk_score`
        <= 75 THEN ''High'' ELSE ''Critical'' END = `priority_bucket`", "priority_bucket_from_score",
        r => r == 1.0).'
      sources:
      - start_line: 99
        end_line: 101
        file: ''
      uid: 70299eb3-b394-4608-a799-61a62579e122
    - text: '''vigorous_bonus'' depends jointly on ''Daily Steps'' and ''Physical
        Activity Level'' and must be 5.0 only when both conditions hold, else 0.0:
        vigorous_bonus = CASE WHEN `Daily Steps` >= 10000 AND `Physical Activity Level`
        >= 60 THEN 5.0 ELSE 0.0 END. Example Deequ: .satisfies("`vigorous_bonus` =
        CASE WHEN `Daily Steps` >= 10000 AND `Physical Activity Level` >= 60 THEN
        5.0 ELSE 0.0 END", "vigorous_bonus_logic", r => r == 1.0).'
      sources:
      - start_line: 45
        end_line: 47
        file: ''
      uid: f0b65f4e-66c7-41b0-956f-e3e6fb92d752
