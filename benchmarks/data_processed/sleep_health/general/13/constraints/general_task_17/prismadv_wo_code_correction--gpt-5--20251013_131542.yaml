    assumptions:
    - text: All rows must have a Blood Pressure value matching the exact pattern 'NN/NN'
        or 'NNN/NNN' (two- or three-digit systolic and diastolic). When split, both
        systolic (bp_sys) and diastolic (bp_dia) are present and systolic must be
