    - text: 'Blood-pressure risk mapping must be consistent with parsed systolic/diastolic
        values: if bp_sys >= 180 or bp_dia >= 110 then bp_risk = 35; else if bp_sys
        >= 160 or bp_dia >= 100 then bp_risk = 28; else if bp_sys >= 140 or bp_dia
        >= 90 then bp_risk = 18; else if bp_sys >= 130 or bp_dia >= 85 then bp_risk
        = 6; else bp_risk = 0.'
