      validity: false
      reason_if_invalid: "Constraint '.isNonNegative('Physical Activity Level')' failed\
        \ on data sample: org.apache.spark.sql.catalyst.parser.ParseException: \n\
        [PARSE_SYNTAX_ERROR] Syntax error at or near '('.(line 1, pos 13)\n\n== SQL\
        \ ==\nCOALESCE(CAST(Physical Activity Level AS DECIMAL(20,10)), 0.0) >= 0\n\
        -------------^^^\n"
      level: warning
      uid: 31960d1f-521f-46d3-86f2-5c960fc96f3d
      source_assumptions:
      - 87caba08-e11a-4864-8125-f6dd2eb60666
    assumptions:
    - text: The input must contain the 'Physical Activity Level' column. The code
        references this column directly to compute ranks, activity_index, and vigorous_bonus
        without checking for its presence.
      sources:
      - start_line: 43
        end_line: 46
        file: ''
      uid: 451e6051-1b4d-47cc-9920-3136c0d1d8dd
    - text: 'All ''Physical Activity Level'' values must be parseable as numeric and
        non-null. Non-numeric or missing values are coerced to null, which will propagate
        through ranking and arithmetic to produce NaN activity_protect and NaN risk_score.
        This implies 100% completeness and numeric parseability for this column. Example
        constraints: Deequ completeness(''Physical Activity Level'') >= 1.0 and satisfies(''cast(`Physical
        Activity Level` as double) IS NOT NULL'', ''Physical Activity Level numeric'',
        lambda x: x == 1.0).'
      sources:
      - start_line: 20
        end_line: 25
        file: ''
      - start_line: 43
        end_line: 46
        file: ''
      - start_line: 90
        end_line: 96
        file: ''
      uid: f334618f-d19b-499f-9759-34d9c81c2574
    - text: 'Values in ''Physical Activity Level'' should be non-negative (>= 0).
        While the code does not enforce bounds, negative values would be nonsensical
        for activity and could distort the percentile ranking and the >= 60 vigorous
        threshold. Example constraint: Deequ isNonNegative(''Physical Activity Level'').'
