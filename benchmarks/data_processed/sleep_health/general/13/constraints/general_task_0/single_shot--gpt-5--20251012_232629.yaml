constraints:
  Age:
    code:
    - - .hasDataType('Age', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Age'', lambda v: v <= 120)'
      - Valid
    - - '.hasMin(''Age'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    - - .satisfies("cast(split(`Blood Pressure`, '/')[0] as int) >= cast(split(`Blood
        Pressure`, '/')[1] as int)", 'BP_SystolicGeDiastolic')
      - Valid
    - - .satisfies("cast(split(`Blood Pressure`, '/')[0] as int) BETWEEN 80 AND 200",
        'BP_Systolic_Range')
      - Valid
    - - .satisfies("cast(split(`Blood Pressure`, '/')[1] as int) BETWEEN 50 AND 120",
        'BP_Diastolic_Range')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .hasDataType('Daily Steps', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .hasDataType('Heart Rate', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Heart Rate'', lambda v: v <= 120)'
      - Valid
    - - '.hasMin(''Heart Rate'', lambda v: v >= 40)'
      - Valid
    - - .isComplete('Heart Rate')
      - Valid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    - - .isContainedIn('Occupation', ['Nurse', 'Software Engineer', 'Sales Representative',
        'Engineer', 'Lawyer', 'Teacher', 'Accountant', 'Salesperson', 'Scientist',
        'Doctor'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .hasDataType('Person ID', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .hasDataType('Physical Activity Level', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Physical Activity Level'', lambda v: v <= 100)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .hasDataType('Quality of Sleep', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Quality of Sleep'', lambda v: v <= 10)'
      - Valid
    - - '.hasMin(''Quality of Sleep'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda v: v >= 0.40)'
      - Valid
    - - .satisfies("(`Sleep Disorder` IS NULL) OR (`Sleep Disorder` IN ('Insomnia','Sleep
        Apnea'))", 'SleepDisorder_Values')
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasDataType('Sleep Duration', ConstrainableDataTypes.Fractional)
      - Valid
    - - '.hasMax(''Sleep Duration'', lambda v: v <= 12.0)'
      - Valid
    - - '.hasMin(''Sleep Duration'', lambda v: v >= 3.0)'
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .hasDataType('Stress Level', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Stress Level'', lambda v: v <= 10)'
      - Valid
    - - '.hasMin(''Stress Level'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    assumptions: []
