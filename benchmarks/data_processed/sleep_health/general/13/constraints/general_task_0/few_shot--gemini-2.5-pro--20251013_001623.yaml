constraints:
  Blood Pressure:
    code:
    - - .containsPattern('Blood Pressure', r'^\d+/\d+$')
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.hasMax(''Quality of Sleep'', lambda x: x <= 10)'
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
