constraints:
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', '^\d+/\d+$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isLessThanOrEqualTo('Daily Steps', 50000)
      - Invalid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - '.hasNumberOfDistinctValues(''Person ID'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isLessThanOrEqualTo('Physical Activity Level', 100)
      - Invalid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isGreaterThan('Sleep Duration', 2.99)
      - Invalid
    - - .isLessThan('Sleep Duration', 14.01)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
  bp_diastolic:
    code:
    - - .isComplete('bp_diastolic')
      - Invalid
    - - .isNonNegative('bp_diastolic')
      - Invalid
    assumptions: []
  bp_systolic:
    code:
    - - .isComplete('bp_systolic')
      - Invalid
    - - .isNonNegative('bp_systolic')
      - Invalid
    assumptions: []
