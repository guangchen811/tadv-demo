constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isLessThanOrEqualTo('Age', 100)
      - Invalid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isGreaterThanOrEqualTo('Daily Steps', 0)
      - Invalid
    - - .isLessThanOrEqualTo('Daily Steps', 50000)
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    - - .isGreaterThanOrEqualTo('Heart Rate', 30)
      - Invalid
    - - .isLessThanOrEqualTo('Heart Rate', 220)
      - Invalid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    - - .isContainedIn('Occupation', ['Nurse', 'Software Engineer', 'Sales Representative',
        'Engineer', 'Lawyer', 'Teacher', 'Accountant', 'Salesperson', 'Scientist',
        'Doctor'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isGreaterThanOrEqualTo('Physical Activity Level', 0)
      - Invalid
    - - .isLessThanOrEqualTo('Physical Activity Level', 100)
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGreaterThanOrEqualTo('Quality of Sleep', 4)
      - Invalid
    - - .isLessThanOrEqualTo('Quality of Sleep', 9)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isGreaterThan('Sleep Duration', 2.99)
      - Invalid
    - - .isLessThanOrEqualTo('Sleep Duration', 14.01)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isGreaterThanOrEqualTo('Stress Level', 3)
      - Invalid
    - - .isLessThanOrEqualTo('Stress Level', 8)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
