raw_constraints:
- column_name: Person ID
  code_for_constraint: .isComplete('Person ID')
- column_name: Person ID
  code_for_constraint: .isPositive('Person ID')
- column_name: Gender
  code_for_constraint: .isComplete('Gender')
- column_name: Age
  code_for_constraint: .isComplete('Age')
- column_name: Age
  code_for_constraint: .isNonNegative('Age')
- column_name: Age
  code_for_constraint: .satisfies('`Age` <= 120', 'Age reasonable upper bound')
- column_name: Blood Pressure
  code_for_constraint: .isComplete('Blood Pressure')
- column_name: Blood Pressure
  code_for_constraint: .hasPattern('Blood Pressure', '^\d{2,3}/\d{2,3}$')
- column_name: Sleep Duration
  code_for_constraint: .isComplete('Sleep Duration')
- column_name: Sleep Duration
  code_for_constraint: .isNonNegative('Sleep Duration')
- column_name: Sleep Duration
  code_for_constraint: .satisfies('`Sleep Duration` <= 24', 'Sleep Duration <= 24h')
- column_name: Quality of Sleep
  code_for_constraint: .isComplete('Quality of Sleep')
- column_name: Quality of Sleep
  code_for_constraint: .satisfies('`Quality of Sleep` >= 0 and `Quality of Sleep`
    <= 10', 'QoS in 0..10')
- column_name: Daily Steps
  code_for_constraint: .isComplete('Daily Steps')
- column_name: Daily Steps
  code_for_constraint: .isNonNegative('Daily Steps')
- column_name: Physical Activity Level
  code_for_constraint: .isComplete('Physical Activity Level')
- column_name: Physical Activity Level
  code_for_constraint: .satisfies('`Physical Activity Level` >= 0 and `Physical Activity
    Level` <= 100', 'Activity level in 0..100')
- column_name: Heart Rate
  code_for_constraint: .isComplete('Heart Rate')
- column_name: Heart Rate
  code_for_constraint: .isPositive('Heart Rate')
- column_name: Heart Rate
  code_for_constraint: .satisfies('`Heart Rate` >= 30 and `Heart Rate` <= 220', 'HR
    in physiologic range')
- column_name: Stress Level
  code_for_constraint: .isComplete('Stress Level')
- column_name: Stress Level
  code_for_constraint: .satisfies('`Stress Level` >= 0 and `Stress Level` <= 10',
    'Stress Level in 0..10')
- column_name: Sleep Disorder
  code_for_constraint: .satisfies('`Sleep Disorder` IS NULL OR `Sleep Disorder` IN
    (\'Insomnia\', \'Sleep Apnea\')', 'Sleep Disorder allowed labels or null')
