    - suggestion: '.satisfies("CASE WHEN try_cast(`Sleep Duration` AS double) IS NOT
        NULL AND try_cast(`Quality of Sleep` AS double) IS NOT NULL THEN 1 ELSE 0
        END", ">=2 paired Sleep Duration & QoS", lambda x: x >= 2)'
      validity: false
      reason_if_invalid: 'Constraint ''.satisfies("CASE WHEN try_cast(`Sleep Duration`
        AS double) IS NOT NULL AND try_cast(`Quality of Sleep` AS double) IS NOT NULL
        THEN 1 ELSE 0 END", ">=2 paired Sleep Duration & QoS", lambda x: x >= 2)''
        failed on data sample: Value: 1.0 does not meet the constraint requirement!'
      level: error
      uid: f29c5adc-9d39-4935-88f4-31a35203b956
      source_assumptions:
      - ddd6a1fb-895d-421f-920a-b56ef253e5de
    - suggestion: '.hasCompleteness("Quality of Sleep", lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: d66dda54-ea9a-4cd9-95d6-ca7dbd067f77
      source_assumptions:
      - f5b169d3-d56d-49f5-b2bd-62a23b30af52
    assumptions:
    - text: 'The ''Quality of Sleep'' column must be numeric (or fully convertible
        to numeric). The code calls pd.to_numeric(..., errors=''coerce'') and then
        performs arithmetic, so non-numeric text values will be coerced to NaN and
        can break downstream correlation/regression or produce NaN risk scores. Example
        validation: ensure every value can be parsed as a number (or the fraction
        of numeric-parsable values is 1.0). A Deequ/GX-style rule: .satisfies("CASE
        WHEN try_cast(`Quality of Sleep` AS double) IS NOT NULL THEN 1 ELSE 0 END",
        "QoS is numeric", lambda x: x == 1.0).'
      sources:
      - start_line: 18
        end_line: 21
        file: ''
      uid: 309fcff9-e42c-40cd-831e-a0a2d58dcb83
    - text: 'Values in ''Quality of Sleep'' are expected to lie on a bounded rating
        scale consistent with the formula (10 - qos)/9.0. The code assumes QoS is
        on roughly a 1..10 scale (so that qos=10 -> zero penalty and qos=1 -> max
        penalty). Validate that values fall within the allowed range (e.g., 1 <= Quality
        of Sleep <= 10). A Deequ/GX-style rule: .satisfies("CASE WHEN `Quality of
        Sleep` >= 1 AND `Quality of Sleep` <= 10 THEN 1 ELSE 0 END", "QoS in [1,10]",
        lambda x: x == 1.0).'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 20
        end_line: 20
        file: ''
      uid: fbdfa28c-4d50-414c-a955-0dbdd20ad544
    - text: There must be at least two rows where both Sleep Duration and Quality
        of Sleep are present and numeric. The code uses np.polyfit(sleep_duration[mask_dq],
        qos[mask_dq], 1) (unguarded) and correlation; np.polyfit requires at least
        two paired numeric observations. Validate that count(`Sleep Duration` IS NOT
        NULL AND `Quality of Sleep` IS NOT NULL) >= 2 before running this process.
      sources:
      - start_line: 34
        end_line: 42
        file: ''
      uid: ddd6a1fb-895d-421f-920a-b56ef253e5de
    - text: 'A large majority of rows should have non-null Quality of Sleep values
        (e.g., >= 95%) because qos is used directly in computing qos_component and
        qos_gap_penalty which feed the final risk_score. Missing QoS values propagate
        to NaN in these components and may produce meaningless risk scores/alerts.
        Example validation: .satisfies("CASE WHEN `Quality of Sleep` IS NOT NULL THEN
        1 ELSE 0 END", "QoS non-null fraction", lambda x: x >= 0.95).'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 106
        end_line: 116
        file: ''
      uid: f5b169d3-d56d-49f5-b2bd-62a23b30af52
