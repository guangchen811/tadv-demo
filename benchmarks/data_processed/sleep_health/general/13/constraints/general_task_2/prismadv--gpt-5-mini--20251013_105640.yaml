        and code expect heart rate to be present (completeness used when computing
        hr_component and when constructing per-person alert hr_i), so missing values
        are not acceptable. A corresponding constraint: .satisfies("CASE WHEN `Heart
        Rate` IS NOT NULL THEN 1 ELSE 0 END", "Heart Rate completeness", lambda x:
        x == 1.0).'
