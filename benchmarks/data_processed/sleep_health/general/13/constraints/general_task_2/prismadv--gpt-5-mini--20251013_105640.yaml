    - text: 'The ''Heart Rate'' values are expected to be integral (whole number beats
        per minute). The dataset metadata indicates an integral type and the logic
        treats heart rate as discrete bpm values; enforce that values are integers
        (or integer-encoded strings). Example Deequ-style check: .satisfies("CASE
        WHEN `Heart Rate` IS NULL OR `Heart Rate` = FLOOR(`Heart Rate`) THEN 1 ELSE
