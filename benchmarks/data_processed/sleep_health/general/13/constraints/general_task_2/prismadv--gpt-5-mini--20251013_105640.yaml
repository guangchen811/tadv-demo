    - text: 'Among the rows used for the steps~pal regression, ''Physical Activity
        Level'' must have at least two distinct numeric values (not constant). A constant
        pal would make the linear fit degenerate or unstable. Expressible as: countDistinct(Physical
        Activity Level WHERE Daily Steps IS NOT NULL AND Physical Activity Level IS
        NOT NULL) >= 2.'
