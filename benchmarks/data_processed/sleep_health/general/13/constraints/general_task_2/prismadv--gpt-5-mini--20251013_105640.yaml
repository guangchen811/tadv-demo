    - text: 'The ''Heart Rate'' values represent beats-per-minute and should lie in
        a realistic physiological range. The code encodes risk thresholds around 40,
        55, 95, and 120 bpm (low penalty and high penalty calculations), so inputs
        that are wildly out of physiological range likely indicate data issues. Validate
        that the vast majority of values fall in a plausible range (for example 30
        <= Heart Rate <= 220). A corresponding rule: .satisfies("CASE WHEN `Heart
        Rate` BETWEEN 30 AND 220 THEN 1 ELSE 0 END", "Physiological Heart Rate range",
        lambda x: x >= 0.99).'
