  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 90340239-3660-410f-b85f-c14d38778f48
      source_assumptions:
      - 36f06d58-42b8-4c22-ab36-0be56b0f5d7d
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\s*\\d+(?:\\.\\d+)?\\s*/\\s*\\d+(?:\\.\\d+)?\\s*$'',
        lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 41ba6874-0c15-4b72-99af-d23de7821e2e
      source_assumptions:
      - 64fde6cc-1d0e-47da-ba56-9629cdd14440
      - a9a49427-736b-4706-8dcd-301237669c2f
    - suggestion: '.satisfies("CASE WHEN CAST(split(`Blood Pressure`, ''/'')[0] AS
        DOUBLE) IS NOT NULL AND CAST(split(`Blood Pressure`, ''/'')[1] AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END", ''BP_parseable'', lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 532c0e69-5e59-41bd-ac2e-e215b4c0616c
      source_assumptions:
      - cbc9989e-9f3c-4fa3-b9e8-4c4c7a0625c8
      - a9a49427-736b-4706-8dcd-301237669c2f
    - suggestion: '.satisfies("CASE WHEN CAST(split(`Blood Pressure`, ''/'')[0] AS
        DOUBLE) BETWEEN 40 AND 300 AND CAST(split(`Blood Pressure`, ''/'')[1] AS DOUBLE)
        BETWEEN 20 AND 200 THEN 1 ELSE 0 END", ''BP_ranges'', lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 9723312f-a935-4c49-995e-6b8e6213fe18
      source_assumptions:
      - 8f6387d6-df36-4a8e-82b2-51e382541191
    assumptions:
    - text: 'The input must contain a ''Blood Pressure'' column (no missing column).
        The script reads df[''Blood Pressure''] and uses it downstream, so the column
        must exist for the input files. A possible validation: expect the column to
        be present.'
      sources:
      - start_line: 16
        end_line: 25
        file: ''
      uid: 36f06d58-42b8-4c22-ab36-0be56b0f5d7d
    - text: 'Most ''Blood Pressure'' values should follow the ''systolic/diastolic''
        text format where both parts are parseable as numbers (integers or decimals).
        The code does bp_series.astype(str).str.split(''/'', ...) and then pd.to_numeric(...,
        errors=''coerce''), so the script expects a ''/'' separator and numeric left/right
        parts. A recommended regex to validate each input value is: ''^\s*\d+(?:\.\d+)?\s*/\s*\d+(?:\.\d+)?\s*$''.
        Example validation rules: Great Expectations: expect_column_values_to_match_regex(''Blood
        Pressure'', ''^\s*\d+(?:\.\d+)?\s*/\s*\d+(?:\.\d+)?\s*$''); Deequ: .satisfies("REGEXP_LIKE(`Blood
        Pressure`, ''<regex>'')", ''BP format'', lambda x: x >= 0.95) to require at
        least 95% matching rows.'
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      uid: 64fde6cc-1d0e-47da-ba56-9629cdd14440
    - text: 'A high fraction of rows (e.g. >= 95%) should successfully parse to numeric
        systolic and diastolic values. The code uses to_numeric(errors=''coerce''),
        and numeric NaNs will degrade bp_component and alert logic; to ensure reliable
        scoring/alerts, require most input rows to produce numeric systolic and diastolic.
        Example Deequ-style constraint: .satisfies("CASE WHEN CAST(split_part(`Blood
        Pressure`,''/'',1) AS DOUBLE) IS NOT NULL AND CAST(split_part(`Blood Pressure`,''/'',2)
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", ''BP parseable'', lambda x: x >=
        0.95).'
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 68
        end_line: 70
        file: ''
      uid: cbc9989e-9f3c-4fa3-b9e8-4c4c7a0625c8
    - text: 'Systolic and diastolic numeric values should be within reasonable physiological/operational
        ranges to avoid malformed entries and to align with the script''s clipping/threshold
        behavior. For example, enforce systolic in [40, 300] and diastolic in [20,
        200]. (The code computes risk using 120 and 80 baselines and clips against
        200 and 120, and uses thresholds like systolic >= 140 or diastolic >= 90 for
        alerts.) Example rule: .satisfies("CASE WHEN CAST(split_part(`Blood Pressure`,''/'',1)
        AS DOUBLE) BETWEEN 40 AND 300 AND CAST(split_part(`Blood Pressure`,''/'',2)
        AS DOUBLE) BETWEEN 20 AND 200 THEN 1 ELSE 0 END", ''BP ranges'', lambda x:
        x >= 0.99).'
      sources:
      - start_line: 68
        end_line: 70
        file: ''
      - start_line: 135
        end_line: 136
        file: ''
      uid: 8f6387d6-df36-4a8e-82b2-51e382541191
    - text: 'Both systolic and diastolic values should be numeric when the downstream
        alert logic expects comparisons. The code later casts systolic/diastolic to
        float for per-row alert decisions (sys_i and dia_i) and compares against thresholds;
        therefore, rows intended for alerting should have numeric systolic and diastolic.
        Example Great Expectations: expect_column_values_to_match_regex(''Blood Pressure'',
        ''^\s*\d+(?:\.\d+)?\s*/\s*\d+(?:\.\d+)?\s*$'') with expectation that at least
        95% of rows meet it.'
      sources:
      - start_line: 127
        end_line: 135
        file: ''
      uid: a9a49427-736b-4706-8dcd-301237669c2f
