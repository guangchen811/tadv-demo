    - text: 'The ''Stress Level'' column should be complete (no missing values). The
        pipeline computes stress_component = np.clip((stress - 3.0) / 5.0, 0.0, 1.0)
        and then uses it in the aggregated risk_score; missing Stress Level values
        will produce NaNs that propagate to risk_score and to float(risk_score.iloc[i])
        when writing alerts. A validation rule example: .satisfies("CASE WHEN `Stress
        Level` IS NOT NULL THEN 1 ELSE 0 END", "No null Stress Level", lambda x: x
        == 1)'
