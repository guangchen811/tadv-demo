  '["BMI Category","Blood Pressure"]':
    code: []
    assumptions:
    - text: 'When BMI Category indicates increased weight (BMI Category in {''Overweight'',
        ''Obese''}), the Blood Pressure field must be parseable into numeric systolic/diastolic
        components (format like ''###/##'') so that the alert condition ((systolic
        >= 140 or diastolic >= 90) and bmi in [''Overweight'',''Obese'']) can be evaluated.
        Actionable constraint (Deequ-style):

        .satisfies("NOT (BMI Category IN (''Overweight'',''Obese'') AND (Blood Pressure
        IS NULL OR NOT Blood Pressure RLIKE ''^[0-9]+/[0-9]+$''))", "bp_format_for_high_bmi")

        Or equivalently enforce non-null parsed parts:

        .satisfies("NOT (BMI Category IN (''Overweight'',''Obese'') AND (CAST(split(Blood
        Pressure, ''/'', 1) AS DOUBLE) IS NULL OR CAST(split(Blood Pressure, ''/'',
        2) AS DOUBLE) IS NULL))", "bp_components_not_null_for_high_bmi")'
      sources:
      - start_line: 25
        end_line: 26
        file: ''
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 131
        end_line: 136
        file: ''
      uid: 289faa9b-70ea-4c47-8df9-f22eb444db92
    - text: 'If Blood Pressure indicates elevated values (systolic >= 140 or diastolic
        >= 90) then BMI Category should be present and belong to the expected set
        (valid_bmi = {''Overweight'',''Normal'',''Obese'',''Normal Weight''}) so the
        combined cardiometabolic flag logic can operate. Actionable constraint (Deequ-style):

        .satisfies("NOT ((CAST(split(Blood Pressure,''/'',1) AS DOUBLE) >= 140 OR
        CAST(split(Blood Pressure,''/'',2) AS DOUBLE) >= 90) AND (BMI Category IS
        NULL OR BMI Category NOT IN (''Overweight'',''Normal'',''Obese'',''Normal
        Weight'')))", "elevated_bp_requires_bmi")'
      sources:
      - start_line: 64
        end_line: 70
        file: ''
      - start_line: 83
        end_line: 91
        file: ''
      - start_line: 131
        end_line: 136
        file: ''
      uid: 55b87091-47e7-46a5-961f-843c57cd9044
    - text: 'For reliable bp_component computation, at least one of systolic or diastolic
        must be numeric for rows where BMI Category is not missing (i.e., when BMI
        Category is used downstream in risk and alert logic). Actionable constraint
        (Deequ-style):

        .satisfies("NOT (BMI Category IS NOT NULL AND (CAST(split(Blood Pressure,''/'',1)
        AS DOUBLE) IS NULL AND CAST(split(Blood Pressure,''/'',2) AS DOUBLE) IS NULL))",
        "bp_component_requires_some_numeric_part_when_bmi_present")

        This ensures bp_component calculation (.maximum(bp_sys_pen, bp_dia_pen)) is
        meaningful when BMI is recorded.'
