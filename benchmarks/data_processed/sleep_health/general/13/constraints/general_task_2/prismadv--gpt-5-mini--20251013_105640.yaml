        \ The code compares pal < 60 and steps < 7000 for alert branching and uses\
        \ differences scaled by 4000 when computing activity_component, so values\
        \ outside these ranges would break assumptions behind those heuristics. Expressible\
        \ as: Physical Activity Level BETWEEN 0 AND 100, AND Daily Steps >= 0."
