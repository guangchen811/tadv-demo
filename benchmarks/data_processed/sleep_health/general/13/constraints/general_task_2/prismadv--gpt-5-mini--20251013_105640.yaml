      validity: false
      reason_if_invalid: 'Constraint ''.satisfies("`Physical Activity Level` IS NOT
        NULL AND `Daily Steps` IS NOT NULL", "PAL_and_Steps_paired_count", lambda
        x: x >= 2)'' failed on data sample: Value: 1.0 does not meet the constraint
        requirement!'
      level: error
      uid: 16f0b3a0-f506-458f-821f-e463ab7f3eac
      source_assumptions:
      - 3b38a2b8-2c31-4156-b98a-bfd0fd77b7e1
    - suggestion: '.hasNumberOfDistinctValues(''Physical Activity Level'', lambda
        x: x >= 2)'
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''Physical
        Activity Level'', lambda x: x >= 2)'': Check.hasNumberOfDistinctValues() missing
        2 required positional arguments: ''binningUdf'' and ''maxBins'''
      level: error
      uid: 91579d57-33ff-4298-8e8b-58eb7e9274da
      source_assumptions:
      - 46e5e803-3a9d-45e2-976a-a5daf95196b9
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` IS NOT NULL AND
        `Physical Activity Level` >= 0 AND `Physical Activity Level` <= 100 THEN 1
        ELSE 0 END", "PAL_in_plausible_range_0_100", lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 0d3e03a9-93f2-4c62-9edf-e43de19ff3a2
      source_assumptions:
      - f0872c31-88a3-4e04-918f-5f97aef71641
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` IS NOT NULL AND
        `Daily Steps` IS NOT NULL THEN CASE WHEN `Daily Steps` >= 0 AND `Daily Steps`
        <= 200000 THEN 1 ELSE 0 END ELSE 1 END", "Steps_in_reasonable_range_for_pairs",
        lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 0a02ff55-738d-4972-bb4c-78009d392409
      source_assumptions:
      - b50ec7d5-84a3-4791-a5c4-4224f5be2e6c
    assumptions:
    - text: 'The ''Physical Activity Level'' column is expected to be numeric/integer
        (or convertible to numeric). The code calls pd.to_numeric(..., errors=''coerce'')
        on this column, so non-numeric entries will become null and can break downstream
        numeric operations. Practical validation: at least 95% of rows should successfully
        convert to a finite numeric value. (Represent as e.g. fraction of rows where
        CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL >= 0.95.)'
      sources:
      - start_line: 24
        end_line: 24
        file: ''
      uid: fbbcc152-645b-4de0-bdfb-1fe4e002fecf
    - text: There must be at least two rows where both 'Physical Activity Level' and
        'Daily Steps' are present and numeric. The script computes a correlation and
        then an unconditional linear fit (np.polyfit) between these two columns, which
        requires at least two paired non-null numeric observations. (Represent as
        e.g. COUNT_ROWS WHERE `Physical Activity Level` IS NOT NULL AND `Daily Steps`
        IS NOT NULL >= 2.)
      sources:
      - start_line: 73
        end_line: 79
        file: ''
      uid: 3b38a2b8-2c31-4156-b98a-bfd0fd77b7e1
    - text: Among the paired rows used for fitting, 'Physical Activity Level' must
        exhibit at least two distinct numeric values (not constant). np.polyfit will
        fail or produce meaningless results if the independent variable is constant.
        (Represent as e.g. COUNT_DISTINCT(CASE WHEN `Physical Activity Level` IS NOT
        NULL AND `Daily Steps` IS NOT NULL THEN `Physical Activity Level` END) >=
        2.)
      sources:
      - start_line: 79
        end_line: 81
        file: ''
      uid: 46e5e803-3a9d-45e2-976a-a5daf95196b9
    - text: '''Physical Activity Level'' values should be finite (no Inf/-Inf) and
        non-negative, and should lie in a plausible bounded range so the threshold
        check pal < 60 is meaningful. A practical bound is 0 <= pal <= 100 (adjust
        if your PAL scale differs). (Represent as e.g. fraction of rows with 0 <=
        `Physical Activity Level` AND `Physical Activity Level` <= 100 and is finite
        should be >= 0.95.)'
      sources:
      - start_line: 143
        end_line: 144
        file: ''
      - start_line: 80
        end_line: 81
        file: ''
      uid: f0872c31-88a3-4e04-918f-5f97aef71641
    - text: 'The ''Physical Activity Level'' column should not contain extreme outliers
        that would produce unrealistic predicted steps (pred_steps). Because activity_component
        is computed from (pred_steps - steps)/4000 and clipped, PAL values should
        be on the same scale/units as used historically with ''Daily Steps'' so predictions
        are reasonable. Practical validation: for rows where both columns are present,
        predicted_steps computed from a simple linear model should fall in a realistic
        range (for example 0 <= predicted_steps <= 200000), or check that residuals
        are not extreme for more than a small fraction of rows. (Represent as e.g.
        fraction of rows with 0 <= predicted_steps <= 200000 >= 0.99, or fraction
        with abs(predicted_steps - `Daily Steps`) / 4000 <= some threshold.)'
      sources:
      - start_line: 79
        end_line: 81
        file: ''
      - start_line: 80
        end_line: 81
        file: ''
      uid: b50ec7d5-84a3-4791-a5c4-4224f5be2e6c
