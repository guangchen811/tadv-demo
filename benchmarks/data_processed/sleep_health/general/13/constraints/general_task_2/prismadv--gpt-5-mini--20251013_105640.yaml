    - text: 'The ''Stress Level'' values are expected to lie on the scale the code
        assumes: roughly between 3 and 8 (inclusive). The code normalizes using (stress
        - 3.0)/5.0 so values outside this range will be clipped; to match intended
        semantics, validate numeric range. A validation rule example: .satisfies("CASE
        WHEN `Stress Level` >= 3 AND `Stress Level` <= 8 THEN 1 ELSE 0 END", "Stress
        Level in [3,8]", lambda x: x == 1)'
