    - text: 'When Sleep Disorder is present (non-null), the code expects the disorder
        values to be one of the known tokens used in mapping (''Sleep Apnea'', ''Insomnia'')
        and expects BMI Category to be in the BMI vocabulary so that combined mappings
        and amplifications work as intended. Actionable checks: (1) for rows where
        `Sleep Disorder` IS NOT NULL ensure `Sleep Disorder` IN (''Sleep Apnea'',''Insomnia'')
        or explicitly handle other values; (2) for rows where `Sleep Disorder` IS
        NOT NULL ensure `BMI Category` IN {''Overweight'',''Normal'',''Obese'',''Normal
        Weight''} to make the amplification and ratio calculations meaningful.'
