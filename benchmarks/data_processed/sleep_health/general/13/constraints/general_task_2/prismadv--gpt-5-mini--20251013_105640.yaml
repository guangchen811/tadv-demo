  '["BMI Category","Blood Pressure","Sleep Disorder"]':
    code: []
    assumptions:
    - text: 'The ''Blood Pressure'' column must be parsable as two numeric parts separated
        by ''/''. Both the systolic and diastolic parts should be numeric and fall
        in realistic ranges used by the code (systolic between 40 and 200, diastolic
        between 40 and 120). This is required because the code splits Blood Pressure
        into systolic/diastolic, coerces to numeric and then uses those numeric values
        in comparisons (e.g. sys_i >= 140 or dia_i >= 90) and risk calculations. Example
        actionable checks (Deequ-like):

        - ensure Blood Pressure matches regex ''^[0-9]+/[0-9]+$''

        - derive systolic = toInteger(split(Blood Pressure, ''/'')[0]) and diastolic
        = toInteger(split(Blood Pressure, ''/'')[1]) and assert completeness and range:
        systolic BETWEEN 40 AND 200 AND diastolic BETWEEN 40 AND 120

        These constraints ensure downstream numeric comparisons and bp_component computation
        behave correctly.'
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 127
        end_line: 136
        file: ''
      uid: 9012598b-0a2f-4edd-a917-6b8b0c30a5eb
    - text: 'The ''BMI Category'' column must contain only the expected categorical
        values {''Overweight'', ''Normal'', ''Obese'', ''Normal Weight''} and be present
        (non-null) for records where ''Sleep Disorder'' is non-null. The code maps
        BMI Category to numeric risk and uses bmi_cat.isin([...]) together with Sleep
        Disorder to compute ratio_ok and to amplify apnea risk. Example actionable
        checks:

        - BMI Category isContainedIn the set {''Overweight'',''Normal'',''Obese'',''Normal
        Weight''}

        - For all rows: if Sleep Disorder IS NOT NULL then BMI Category IS NOT NULL
        AND BMI Category IN that set

        This ensures the bmi_risk_map, obese_over_mask and subsequent logic are valid
        and not silently using fillna defaults.'
      sources:
      - start_line: 83
        end_line: 91
        file: ''
      - start_line: 95
        end_line: 103
        file: ''
      uid: f8befabd-e6e5-462f-8d5b-d38ba16a4596
    - text: 'Population-level assumption: among records where ''Sleep Disorder'' ==
        ''Sleep Apnea'', at least 60% should have BMI Category in {''Overweight'',''Obese''}.
        The code computes this fraction and uses it (ratio_ok) as a validation / calibration
        signal: ((sa_mask & obese_over_mask).sum() / sa_count) >= 0.60. Representable
        as an aggregate constraint (Deequ ''satisfies'' style):

        - count_if(Sleep Disorder = ''Sleep Apnea'' AND BMI Category IN (''Overweight'',''Obese''))
        / count_if(Sleep Disorder = ''Sleep Apnea'') >= 0.60

        Note: the code treats sa_count == 0 as acceptable (ratio_ok True), so this
        constraint should be applied only when count_if(Sleep Disorder=''Sleep Apnea'')
        > 0.'
      sources:
      - start_line: 93
        end_line: 98
        file: ''
      uid: 1656c4b1-4038-4a8c-8c1f-d0f372ff11b4
    - text: 'For proper high-risk alert detection, any row with BMI Category in {''Overweight'',''Obese''}
        should have Blood Pressure parsable to numeric systolic/diastolic so the condition
        ''((systolic >= 140 or diastolic >= 90) and bmi in [Overweight, Obese])''
        can be evaluated. In other words: if BMI Category IN (''Overweight'',''Obese'')
        then Blood Pressure should match the ''systolic/diastolic'' pattern and derived
        systolic/diastolic should be non-null. Actionable checks:

        - satisfy: NOT (BMI Category IN (''Overweight'',''Obese'') AND (Blood Pressure
        IS NULL OR NOT matches ''^[0-9]+/[0-9]+$''))

        or equivalently require completeness/parsing of BP for those BMI categories.'
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 127
        end_line: 136
        file: ''
      uid: 0234cfd3-c42e-4ef6-9f26-0e2cbc715025
