      uid: 24c1a634-f474-4c62-ab3d-067819111e90
    - text: 'The ''BMI Category'' column is expected to be complete (no missing values).
        The code reads the column and later indexes/compares values with membership
        tests; while mapping uses fillna(0.0), downstream logic assumes per-row category
        values are available for conditional checks. Validate with e.g. .satisfies("CASE
        WHEN `BMI Category` IS NOT NULL THEN 1 ELSE 0 END", "BMI non-null", lambda
        x: x == 1.0).'
      sources:
      - start_line: 16
        end_line: 26
        file: ''
      - start_line: 121
        end_line: 131
        file: ''
      uid: 17f70796-438c-49f7-9970-8946064d2fbf
    - text: 'Values in ''BMI Category'' must match the exact spellings/casing used
        in the code (no extra leading/trailing whitespace or alternate casing), because
        code uses exact equality, isin() and map() with literal strings. Enforce by
        normalizing (trim, consistent case) before membership or by a validation:
        .satisfies("CASE WHEN TRIM(`BMI Category`) IN (''Overweight'',''Normal'',''Obese'',''Normal
        Weight'') THEN 1 ELSE 0 END", "Normalized BMI Category", lambda x: x >= 0.99).'
      sources:
      - start_line: 84
        end_line: 91
        file: ''
      - start_line: 96
        end_line: 96
        file: ''
      uid: 79f9b97b-2e2f-4dfa-8f57-9a2949a2a33f
    - text: 'Unexpected/unknown BMI Category values (not in the expected set) are
        implicitly treated as low risk by the code because bmi_cat.map(bmi_risk_map).fillna(0.0)
        maps unknowns to 0.0. The input should therefore contain very few unknown
        categories (recommend <= 5%). Validate with .satisfies("CASE WHEN `BMI Category`
        IN (''Overweight'',''Normal'',''Obese'',''Normal Weight'') THEN 1 ELSE 0 END",
        "Valid BMI Fraction", lambda x: x >= 0.95).'
      sources:
      - start_line: 85
        end_line: 91
        file: ''
      uid: b2073a5b-5423-41c9-adbc-a9ee2cb0eaa1
    - text: 'When evaluating sleep-disorder relationships, the code computes the proportion
        of rows where Sleep Disorder == ''Sleep Apnea'' that also have BMI in [''Overweight'',''Obese'']
        and treats >= 60% as the threshold (ratio_ok calculation). If there are any
        ''Sleep Apnea'' rows, the data is expected to have at least 60% of those rows
        labeled ''Overweight'' or ''Obese''. Validate with: .satisfies("CASE WHEN
        `Sleep Disorder` = ''Sleep Apnea'' AND `BMI Category` IN (''Overweight'',''Obese'')
        THEN 1 WHEN `Sleep Disorder` = ''Sleep Apnea'' THEN 0 ELSE NULL END", "Apnea
        overweight fraction", lambda x: x >= 0.60) (apply only when count of Sleep
        Apnea > 0).'
      sources:
