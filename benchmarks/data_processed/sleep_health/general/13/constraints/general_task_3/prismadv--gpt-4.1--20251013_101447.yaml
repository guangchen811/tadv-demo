    - text: 'There should not be any extreme outliers or unrealistic combinations
        in ''Sleep Duration'' and ''Quality of Sleep'' that would cause model predictions
        or residuals to be unreasonably large, as they are used together to compute
        linear predictions and residuals for scoring. This can be represented by a
        multi-column constraint on their joint distribution, for example: .hasMutualInformation([''Sleep
        Duration'', ''Quality of Sleep''], lowerBound=0.01)'
