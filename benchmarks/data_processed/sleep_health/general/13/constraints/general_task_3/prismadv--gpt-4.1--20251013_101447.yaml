      uid: 12956a28-c66a-4903-a43a-b80613d4a568
    - text: 'The columns ''Sleep Duration'' and ''Quality of Sleep'' are jointly used
        to compute insomnia risk, implying that unusually low values in both should
        be rare and meaningful. As such, the fraction of records where both ''Sleep
        Duration'' < 6 and ''Quality of Sleep'' < 5 should not exceed a reasonable
        threshold (e.g., 10%), to avoid model instability. This can be expressed as:
        .where(''Sleep Duration'' < 6 and ''Quality of Sleep'' < 5).count() / total_count
        < 0.1'
