    - text: "The pair (Systolic, Diastolic) must be consistently parseable from the\
        \ 'Blood Pressure' text as two 2\u20133 digit integers separated by a slash,\
        \ and equal the parsed values. This can be enforced with Deequ by combining\
        \ a pattern check and a cross-column consistency check, e.g.: .hasPattern('Blood\
        \ Pressure', '^(\\\\d{2,3})/(\\\\d{2,3})$') and .satisfies(\"Systolic = cast(regexp_extract(`Blood\
        \ Pressure`, '^(\\\\d{2,3})/(\\\\d{2,3})$', 1) as int) AND Diastolic = cast(regexp_extract(`Blood\
        \ Pressure`, '^(\\\\d{2,3})/(\\\\d{2,3})$', 2) as int)\", 'bp_parse_consistent')."
      sources:
      - start_line: 63
        end_line: 65
        file: ''
      uid: ddd7537a-8599-4aa0-9ea1-e9ea43754bb0
  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Both ''Sleep Duration'' and ''Quality of Sleep'' must be present (non-null)
        for all rows, since they are used together without row-wise masking to compute
        predictions, residuals, scores, and risks. This can be represented as a Deequ
        constraint like: .satisfies(''`Sleep Duration` IS NOT NULL AND `Quality of
        Sleep` IS NOT NULL'', fraction >= 1.0).'
      sources:
      - start_line: 45
        end_line: 56
        file: ''
      - start_line: 85
        end_line: 90
        file: ''
      - start_line: 107
        end_line: 109
        file: ''
      - start_line: 127
        end_line: 131
        file: ''
      uid: 4ddc72ed-da81-4bbe-a7d9-d3020064bd8f
    - text: 'There should be a positive monotonic relationship between ''Sleep Duration''
        and ''Quality of Sleep'' (i.e., higher sleep duration generally corresponds
        to higher sleep quality). This can be enforced via a correlation constraint,
        for example: .hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lowerBound=0.1).'
      sources:
      - start_line: 45
        end_line: 50
        file: ''
      - start_line: 165
        end_line: 166
        file: ''
      uid: 8ae72f00-6d95-4fe2-a763-61fed402bfce
    - text: 'Quality of Sleep should be reasonably predictable from Sleep Duration:
        after fitting the linear model QoS = alpha + beta * Duration, the absolute
        residuals should be small for most rows. For example, at least 90% of rows
        should satisfy |`Quality of Sleep` - (alpha + beta * `Sleep Duration`)| <=
        2 * std(`Quality of Sleep`). This can be implemented as a Deequ satisfies
        constraint using the fitted alpha, beta, and QoS std computed in the job.'
      sources:
      - start_line: 50
        end_line: 56
        file: ''
      - start_line: 107
        end_line: 109
        file: ''
      uid: 1ec88abc-16a7-4450-8128-6ae7d08dbd97
    - text: 'To avoid degenerate insomnia calibration, a non-trivial share of records
        should have short sleep or low quality (so insomnia_risk is not identically
        zero). For example: .satisfies(''(`Sleep Duration` < 7.0) OR (`Quality of
        Sleep` < 6.0)'', fraction >= 0.01).'
      sources:
      - start_line: 127
        end_line: 131
        file: ''
      - start_line: 140
        end_line: 140
        file: ''
      uid: 9a58c009-9fe7-468f-b485-471d636c61e1
  '["Quality of Sleep","Stress Level"]':
    code: []
    assumptions:
    - text: 'For computing insomnia_risk and triage_insomnia, the columns Sleep Duration,
        Quality of Sleep, Stress Level, and Daily Steps are jointly non-null and numeric
        for all rows so that insomnia_risk contains no NaNs and quantile/threshold
        computations are well-defined. Example Deequ: .satisfies(''`Sleep Duration`
        IS NOT NULL AND `Quality of Sleep` IS NOT NULL AND `Stress Level` IS NOT NULL
        AND `Daily Steps` IS NOT NULL'', lambda v: v == 1.0)'
      sources:
      - start_line: 128
        end_line: 131
        file: ''
      - start_line: 140
        end_line: 143
        file: ''
      - start_line: 148
        end_line: 152
        file: ''
      uid: 1b1cd321-0ad7-4a02-b3d6-1f0518ee1aba
    - text: "Quality of Sleep and Stress Level are Likert-style integer scales used\
        \ together; both columns must be numeric integers within their expected domains\
        \ and present together. Constraints: Quality of Sleep \u2208 {3,4,5,6,7,8,9},\
        \ Stress Level \u2208 {3,4,5,6,7,8}, and (Quality of Sleep is NULL) == (Stress\
        \ Level is NULL). Example Deequ: .isContainedIn('Quality of Sleep', [3,4,5,6,7,8,9])\
        \ AND .isContainedIn('Stress Level', [3,4,5,6,7,8]) AND .satisfies('(`Quality\
        \ of Sleep` IS NULL) = (`Stress Level` IS NULL)', lambda v: v == 1.0)"
      sources:
      - start_line: 22
        end_line: 26
        file: ''
      - start_line: 58
        end_line: 61
        file: ''
      - start_line: 89
        end_line: 97
        file: ''
      uid: 1ffc46f7-2438-4b50-8510-1005da15ffe3
    - text: 'Stress Level and Quality of Sleep should exhibit a non-positive association
        (higher stress corresponds to lower quality). Enforce via correlation check.
        Example Deequ: .hasCorrelation(''Stress Level'', ''Quality of Sleep'', lambda
        r: r <= 0.0)'
      sources:
      - start_line: 58
        end_line: 61
        file: ''
      - start_line: 128
        end_line: 131
        file: ''
      - start_line: 165
        end_line: 167
        file: ''
      uid: 59d3ecfa-6b32-4b7d-93c0-3c704efb7f52
    - text: 'Sleep Duration and Quality of Sleep have a non-negative association (longer
        sleep weakly increases quality), consistent with the residual-based consistency
        score. Enforce via correlation check. Example Deequ: .hasCorrelation(''Sleep
        Duration'', ''Quality of Sleep'', lambda r: r >= 0.0)'
      sources:
      - start_line: 45
        end_line: 56
        file: ''
      - start_line: 107
        end_line: 109
        file: ''
      - start_line: 165
        end_line: 166
        file: ''
      uid: 850522ae-ce43-4f29-b8dd-1806640a5ef9
    - text: 'Row-level lower bound consistency: Insomnia Risk Score must be at least
        the contribution attributable to Quality of Sleep and Stress Level components,
        since other components are non-negative. Formally, for each row: Insomnia
        Risk Score >= 0.30 * max((6 - `Quality of Sleep`) / 3, 0) + 0.20 * max((`Stress
        Level` - 6) / 4, 0). Example Deequ: .satisfies(''`Insomnia Risk Score` >=
        0.30 * greatest((6.0 - `Quality of Sleep`) / 3.0, 0.0) + 0.20 * greatest((`Stress
        Level` - 6.0) / 4.0, 0.0)'', lambda v: v == 1.0)'
      sources:
      - start_line: 128
        end_line: 131
        file: ''
      - start_line: 150
        end_line: 150
        file: ''
      uid: 0e736d4f-8b06-4fb2-8630-0509e578b617
