        with Deequ: hasDataType(''Age'', Numeric) and completeness(''Age'') == 1.0;
        or Great Expectations: expect_column_values_to_not_be_null(''Age'') and expect_column_values_to_be_in_type_list(''Age'',
        [''int64'',''float64'']).'
