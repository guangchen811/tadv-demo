        ''Sleep Duration IS NOT NULL AND Sleep Duration > 0 AND Quality of Sleep IS
        NOT NULL AND CAST(Quality of Sleep AS INT) = Quality of Sleep AND Quality
        of Sleep >= 0 AND Quality of Sleep <= 10'').'
