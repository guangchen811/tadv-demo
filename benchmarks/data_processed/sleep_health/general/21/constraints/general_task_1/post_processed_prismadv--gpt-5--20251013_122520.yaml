    - text: 'When ''Sleep Disorder'' is populated (after trimming), it must be exactly
        one of {''Insomnia'',''Sleep Apnea''}. Furthermore, for rows where ''Sleep
        Disorder'' is in this set, both ''Sleep Duration'' and ''Quality of Sleep''
        must satisfy the validity in Assumption 1 (non-null, Sleep Duration > 0, and
        Quality of Sleep integer in [0,10]) so that the sleep components and downstream
        risk tier can be computed without NaNs. This can be expressed with two Deequ
        compliance constraints: (1) isCompliance(''sleep_disorder_values'', "Sleep
        Disorder IS NULL OR TRIM(Sleep Disorder) IN (''Insomnia'',''Sleep Apnea'')"),
        and (2) isCompliance(''disorder_rows_have_valid_sleep_inputs'', "(TRIM(Sleep
        Disorder) IN (''Insomnia'',''Sleep Apnea'')) => (Sleep Duration IS NOT NULL
        AND Sleep Duration > 0 AND Quality of Sleep IS NOT NULL AND CAST(Quality of
        Sleep AS INT) = Quality of Sleep AND Quality of Sleep BETWEEN 0 AND 10)").'
