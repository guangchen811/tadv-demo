  '["Quality of Sleep","Sleep Disorder","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Both ''Sleep Duration'' and ''Quality of Sleep'' must be present and
        numeric for every record. In addition, ''Sleep Duration'' must be > 0 (for
        the log and absolute deviation computations), and ''Quality of Sleep'' must
        be an integer between 0 and 10 inclusive (to safely index into the quality_penalty_map).
