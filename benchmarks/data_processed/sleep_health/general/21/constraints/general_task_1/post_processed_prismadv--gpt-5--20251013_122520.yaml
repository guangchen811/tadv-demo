  ? '["Age","BMI Category","Blood Pressure","Daily Steps","Heart Rate","Person ID","Physical
    Activity Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code: []
    assumptions:
    - text: 'Daily Steps and Physical Activity Level are jointly available and consistent
        so a linear model and the mismatch calculation can be computed: (a) at least
        95% of rows have both columns non-null and numeric; (b) their relationship
        is positively correlated (e.g., Pearson r >= 0.2) to avoid nonsensical negative
        slope; (c) values are non-negative. Example Deequ constraints: .satisfies("`Daily
        Steps` IS NOT NULL AND `Physical Activity Level` IS NOT NULL", assertion=">=
        0.95"); .hasCorrelation("Daily Steps", "Physical Activity Level", lowerBound=0.2);
        .satisfies("`Daily Steps` >= 0 AND `Physical Activity Level` >= 0", assertion=">=
        0.99").'
      sources:
      - start_line: 19
        end_line: 26
        file: ''
      - start_line: 27
        end_line: 34
        file: ''
      - start_line: 60
        end_line: 65
        file: ''
      uid: 792c4f48-d607-454e-8fdd-080113ee5b08
    - text: 'Blood Pressure must be parseable as two integers in the form systolic/diastolic,
        with systolic > diastolic and (systolic - diastolic) > 0 so pulse pressure
        and its logarithm are defined. Example Deequ constraints: .matchesPattern("Blood
        Pressure", "^\\d{2,3}/\\d{2,3}$"); .satisfies("cast(split(`Blood Pressure`,
        ''/'')[0] as int) > cast(split(`Blood Pressure`, ''/'')[1] as int)", assertion=">=
        1.0"); .satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) - cast(split(`Blood
        Pressure`, ''/'')[1] as int) > 0", assertion=">= 1.0").'
      sources:
      - start_line: 44
        end_line: 51
        file: ''
      - start_line: 68
        end_line: 77
        file: ''
      uid: b52f9188-5f7d-43f3-a40c-af25cd9d17d7
    - text: 'Sleep Duration and Quality of Sleep must be jointly valid to compute
        the sleep components: Sleep Duration > 0 (log defined and deviation from 8h
        computable) and Quality of Sleep is an integer in [0, 10] so it is a valid
        index into the penalty map. Example Deequ constraints: .satisfies("`Sleep
        Duration` > 0 AND `Quality of Sleep` IS NOT NULL", assertion=">= 1.0"); .satisfies("`Quality
        of Sleep` BETWEEN 0 AND 10 AND `Quality of Sleep` = cast(`Quality of Sleep`
        as int)", assertion=">= 1.0").'
      sources:
      - start_line: 36
        end_line: 43
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      uid: 84c98b13-fcac-4201-9a72-b2e1a44d8301
    - text: 'End-to-end input readiness for risk_score: for each Person ID row, all
        required inputs are simultaneously present and valid so the aggregated risk_score
        is finite (not NaN/Inf). Concretely: Sleep Duration > 0; Quality of Sleep
        integer in [0,10]; Blood Pressure parseable with systolic > diastolic; Daily
        Steps and Physical Activity Level non-null and numeric; Stress Level non-null
        and numeric; BMI Category in {''Obese'',''Overweight'',''Normal'',''Normal
        Weight''}; Age non-null and numeric. Example Deequ constraint (single predicate):
        .satisfies("`Sleep Duration` > 0 AND `Quality of Sleep` BETWEEN 0 AND 10 AND
        `Quality of Sleep` = cast(`Quality of Sleep` as int) AND `Blood Pressure`
        RLIKE ''^\\d{2,3}/\\d{2,3}$'' AND cast(split(`Blood Pressure`, ''/'')[0] as
        int) > cast(split(`Blood Pressure`, ''/'')[1] as int) AND `Daily Steps` IS
        NOT NULL AND `Physical Activity Level` IS NOT NULL AND `Stress Level` IS NOT
        NULL AND `BMI Category` IN (''Obese'',''Overweight'',''Normal'',''Normal Weight'')
        AND `Age` IS NOT NULL", assertion=">= 0.99").'
      sources:
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 60
        end_line: 65
        file: ''
      - start_line: 68
        end_line: 77
        file: ''
      - start_line: 80
        end_line: 82
        file: ''
      - start_line: 83
        end_line: 89
        file: ''
      - start_line: 91
        end_line: 96
        file: ''
      - start_line: 99
        end_line: 109
        file: ''
      uid: 36eea522-9457-4ecb-8d45-6e4dd66a5def
    - text: 'Risk tier must be consistent with the binned risk_score: risk_score <=
        39.999 => ''Low'', 40.0 <= risk_score <= 69.999 => ''Medium'', risk_score
        >= 70.0 => ''High''. Example Deequ constraints (three predicates): .satisfies("(`sleep_risk_score`
        <= 39.999 AND `risk_tier` = ''Low'') OR (`sleep_risk_score` > 39.999)", assertion=">=
        1.0"); .satisfies("(`sleep_risk_score` > 39.999 AND `sleep_risk_score` <=
        69.999 AND `risk_tier` = ''Medium'') OR (`sleep_risk_score` <= 39.999 OR `sleep_risk_score`
        > 69.999)", assertion=">= 1.0"); .satisfies("(`sleep_risk_score` >= 70.0 AND
        `risk_tier` = ''High'') OR (`sleep_risk_score` < 70.0)", assertion=">= 1.0").'
      sources:
      - start_line: 99
        end_line: 109
        file: ''
      - start_line: 112
        end_line: 116
        file: ''
      - start_line: 119
        end_line: 121
        file: ''
      uid: ac3e9a0f-a8a7-42d9-948c-be1882aecb9d
  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'There must be sufficient paired observations to fit a linear model: at
        least 2 rows where both ''Physical Activity Level'' and ''Daily Steps'' are
        non-null, and the variance of ''Physical Activity Level'' within those rows
        is > 0 (i.e., not constant). This can be validated as: compliance("both_present",
        "(`Physical Activity Level` IS NOT NULL) AND (`Daily Steps` IS NOT NULL)",
        fraction >= (2 / rowCount)) and hasStandardDeviation(''Physical Activity Level'',
        _ > 0.0, where=''`Physical Activity Level` IS NOT NULL AND `Daily Steps` IS
        NOT NULL'').'
      sources:
      - start_line: 27
        end_line: 27
        file: ''
      - start_line: 29
        end_line: 33
        file: ''
      uid: f2668e4c-3bfe-4581-9eca-26c825c0a7cb
    - text: "\u2018Physical Activity Level\u2019 and \u2018Daily Steps\u2019 should\
        \ be positively related so that the linear fit is meaningful; specifically,\
        \ the Pearson correlation between them (computed over rows where both are\
        \ non-null) should be > 0.2. Deequ example: hasCorrelation('Physical Activity\
        \ Level', 'Daily Steps', _ >= 0.2, where='`Physical Activity Level` IS NOT\
        \ NULL AND `Daily Steps` IS NOT NULL')."
      sources:
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 60
        end_line: 65
        file: ''
      uid: 0887791d-768a-48cf-8c62-9cbd8d97725a
    - text: "Most records should not be extreme mismatches relative to the regression\
        \ expectation: letting slope, intercept be the OLS fit of Daily Steps ~ Physical\
        \ Activity Level on rows with both present, at least 95% of those rows should\
        \ satisfy abs(`Daily Steps` - (slope*`Physical Activity Level` + intercept))\
        \ / max((slope*`Physical Activity Level` + intercept), 1) <= 1.5. This aligns\
        \ with the code\u2019s 1.5 cap on the mismatch ratio."
      sources:
      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 60
        end_line: 65
        file: ''
      uid: bb78279c-1108-4b56-a07f-8cceed7b047d
    - text: "For individuals with very high \u2018Physical Activity Level\u2019 (>=\
        \ 90), \u2018Daily Steps\u2019 should generally meet the 8000-step target\
        \ used by the shortfall calculation; e.g., among rows with `Physical Activity\
        \ Level` >= 90, at least 80% should have `Daily Steps` >= 8000. Deequ example:\
        \ compliance(\"high_pa_meet_steps\", \"(`Physical Activity Level` >= 90) =>\
        \ (`Daily Steps` >= 8000)\", fraction >= 0.8)."
