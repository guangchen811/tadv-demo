constraints:
  Age:
    code:
    - - .hasDataType('Age', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Age')
      - Valid
    - - .isPositive('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .hasDataType('BMI Category', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasDataType('Blood Pressure', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    - - .satisfies("Blood Pressure LIKE '%/%'", 'Blood Pressure must contain a slash')
      - Invalid
    - - .satisfies("CAST(split(Blood Pressure, '/')[0] AS INT) > 0", 'Systolic pressure
        must be positive')
      - Invalid
    - - .satisfies("CAST(split(Blood Pressure, '/')[0] AS INT) >= CAST(split(Blood
        Pressure, '/')[1] AS INT)", 'Systolic pressure must be greater than or equal
        to diastolic pressure')
      - Invalid
    - - .satisfies("CAST(split(Blood Pressure, '/')[0] AS INT) IS NOT NULL", 'Systolic
        pressure must be an integer')
      - Invalid
    - - .satisfies("CAST(split(Blood Pressure, '/')[1] AS INT) > 0", 'Diastolic pressure
        must be positive')
      - Invalid
    - - .satisfies("CAST(split(Blood Pressure, '/')[1] AS INT) IS NOT NULL", 'Diastolic
        pressure must be an integer')
      - Invalid
    - - .satisfies("SIZE(split(Blood Pressure, '/')) = 2", 'Blood Pressure must have
        two parts separated by a slash')
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .hasDataType('Daily Steps', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .hasDataType('Gender', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .hasDataType('Heart Rate', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Heart Rate')
      - Valid
    - - .isPositive('Heart Rate')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .hasDataType('Occupation', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .hasDataType('Person ID', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Person ID')
      - Valid
    - - .isNonNegative('Person ID')
      - Invalid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .hasDataType('Physical Activity Level', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isGreaterThanOrEqualTo('Physical Activity Level', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('Physical Activity Level', 100.0)
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .hasDataType('Quality of Sleep', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGreaterThanOrEqualTo('Quality of Sleep', 0.0)
      - Invalid
    - - .isLessThanOrEqualTo('Quality of Sleep', 10.0)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.4)'
      - Valid
    - - .hasDataType('Sleep Disorder', ConstrainableDataTypes.String)
      - Valid
    - - .satisfies("Sleep Disorder IS NULL OR Sleep Disorder IN ('Insomnia', 'Sleep
        Apnea')", 'Sleep Disorder must be Insomnia, Sleep Apnea, or null')
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasDataType('Sleep Duration', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isGreaterThanOrEqualTo('Sleep Duration', 3.0)
      - Invalid
    - - .isLessThanOrEqualTo('Sleep Duration', 12.0)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .hasDataType('Stress Level', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    - - .isGreaterThanOrEqualTo('Stress Level', 1.0)
      - Invalid
    - - .isLessThanOrEqualTo('Stress Level', 10.0)
      - Invalid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
