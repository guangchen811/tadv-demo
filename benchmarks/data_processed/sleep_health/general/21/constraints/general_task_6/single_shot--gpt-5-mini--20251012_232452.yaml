constraints:
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isGreaterThanOrEqualTo('Daily Steps', 0)
      - Invalid
    - - .isLessThanOrEqualTo('Daily Steps', 50000)
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isGreaterThanOrEqualTo('Physical Activity Level', 0)
      - Invalid
    - - .isLessThanOrEqualTo('Physical Activity Level', 100)
      - Invalid
    assumptions: []
  Physical Activity Level & Daily Steps:
    code:
    - - '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', ''spearman'',
        lambda c: c is not None)'
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGreaterThanOrEqualTo('Quality of Sleep', 0)
      - Invalid
    - - .isLessThanOrEqualTo('Quality of Sleep', 10)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.isContainedIn(''Sleep Disorder'', [''Insomnia'', ''Sleep Apnea''])  # allow
        nulls in the column'
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isGreaterThan('Sleep Duration', 2.99)
      - Invalid
    - - .isLessThan('Sleep Duration', 14.01)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isGreaterThanOrEqualTo('Stress Level', 0)
      - Invalid
    - - .isLessThanOrEqualTo('Stress Level', 10)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
