      - start_line: 42
        end_line: 43
        file: ''
      uid: 53b36f03-f059-4d8c-b3fb-d2f0035d5f08
    - text: 'Daily Steps should be non-null for the vast majority (ideally all) input
        rows. Dataset metadata shows completeness=1.0 and the code uses .notna() checks
        and casts; many downstream scores use blended_steps computed from Daily Steps,
        so missing values will reduce available data or propagate NaNs. Example validation:
        .satisfies("CASE WHEN `Daily Steps` IS NOT NULL THEN 1 ELSE 0 END", "DailyStepsNotNull",
