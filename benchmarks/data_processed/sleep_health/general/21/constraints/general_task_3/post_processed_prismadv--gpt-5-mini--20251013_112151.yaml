    assumptions:
    - text: 'The ''Sleep Duration'' column must be numeric (or a string readily convertible
        to float). The code calls pd.to_numeric(..., errors=''coerce'') and later
        uses astype(float), so any non-numeric values will be coerced to null which
        will affect downstream correlation, regression and scoring calculations. A
        possible validation rule: require that the column is parseable as numeric
        for most rows, e.g. in Deequ/GEX you could check that all (or a high fraction
        of) values satisfy numeric casting:

        .satisfies("CASE WHEN try_cast(`Sleep Duration` AS DOUBLE) IS NOT NULL THEN
        1 ELSE 0 END", "Sleep Duration numeric/convertible", lambda x: x == 1)'
      sources:
      - start_line: 20
        end_line: 26
        file: ''
      uid: 071faddc-1c61-40fe-a0a8-5892321d763c
    - text: 'The ''Sleep Duration'' values are expressed in hours and should be in
        a reasonable hours range (non-negative and <= 24). The code treats 8.0 and
        7.0 as reference sleep-hours and computes distance from 8 hours, so inputs
        must be hours (fractional allowed). Example validation (all rows within 0..24):

        .satisfies("CASE WHEN `Sleep Duration` >= 0.0 AND `Sleep Duration` <= 24.0
        THEN 1 ELSE 0 END", "Sleep Duration in hours between 0 and 24", lambda x:
        x == 1)'
      sources:
      - start_line: 84
        end_line: 86
        file: ''
      - start_line: 127
        end_line: 127
        file: ''
      uid: a95c7608-6ce2-41e2-a71d-ef9db062174f
    - text: 'There must be at least some rows where both ''Sleep Duration'' and ''Quality
        of Sleep'' are present (non-null). The code computes correlations and fits
        a linear model using paired (duration, quality) rows; if no such pairs exist
        the correlation/regression will be undefined and downstream consistency/triage
        logic will break. A suitable check: ensure the count (or fraction) of rows
        with both columns non-null is > 0 (or above a chosen minimum):

        .satisfies("CASE WHEN `Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL THEN 1 ELSE 0 END", "Duration-Quality pair presence", lambda x:
        x > 0)'
      sources:
      - start_line: 45
        end_line: 56
        file: ''
      uid: 17e7be62-0dd1-40c8-9b89-94fb34023810
    - text: 'A non-trivial fraction of input rows should have a non-null ''Sleep Duration''
        (not all values null). The script uses sleep duration to compute duration_score
        and components of insomnia_risk and quantiles are computed over arrays that
        include duration-derived terms; having all values null would make these computations
        invalid. Example constraint (require at least one non-null, or a higher fraction
        as desired):

        .satisfies("CASE WHEN `Sleep Duration` IS NOT NULL THEN 1 ELSE 0 END", "Sleep
        Duration completeness", lambda x: x > 0)'
      sources:
