        end_line: 1119
        file: ''
      uid: 9a15d565-0cda-456f-8885-b384792a98bc
    - text: 'The ''Age'' column should have no nulls (completeness). The downstream
        code does not handle missing ages before using them in numeric arithmetic
        and percentile-based thresholding (np.quantile), so nulls would propagate
        and may break calibration/JSON output. Represent as: .satisfies("CASE WHEN
        `Age` IS NOT NULL THEN 1 ELSE 0 END", "Age not null", lambda x: x == 1.0).'
