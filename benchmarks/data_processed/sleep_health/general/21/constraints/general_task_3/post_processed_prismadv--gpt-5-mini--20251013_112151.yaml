    - text: 'Rows used for pairwise computations and risk scoring should have both
        ''Quality of Sleep'' and ''Stress Level'' populated (joint completeness).
        The code computes pairwise correlations and uses both columns together to
        compute scores (correlation, stress_score, consistency, insomnia_risk). If
        many rows have one column present but the other missing, correlation and quantile-based
        thresholds may be unstable or produce NaNs. Example actionable checks:

        - require joint completeness: fraction(rows where Quality of Sleep IS NOT
        NULL AND Stress Level IS NOT NULL) >= 0.99

        - or assert a lower bound on the number of rows with both present: count(rows
        where both present) >= N (absolute) or >= fraction * total'
