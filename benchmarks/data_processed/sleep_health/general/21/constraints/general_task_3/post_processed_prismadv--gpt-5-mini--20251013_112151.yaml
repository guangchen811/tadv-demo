        later casts to float, performs arithmetic, and finally rounds/casts to int
        for output, so parsed numeric values are required. Example validation: .satisfies("CASE
        WHEN `Systolic` IS NOT NULL AND `Diastolic` IS NOT NULL AND is_finite(`Systolic`)
        AND is_finite(`Diastolic`) THEN 1 ELSE 0 END", "BP numeric", lambda x: x >=
        0.99).'
