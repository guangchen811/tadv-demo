        \ and have non-null, numeric (or mappable) values for the rows used in calibration.\
        \ Actionable checks: ensure completeness (non-null fraction) and numeric-ness\
        \ for these columns (e.g. .hasCompleteness([...]) and .isNonNegative/validNumeric\
        \ predicates) or compute apnea_risk and assert .hasCompleteness(['apnea_risk'])\
        \ == 1.0 (or >0.0) before calling np.quantile."
