        file: ''
      - start_line: 78
        end_line: 82
        file: ''
      - start_line: 130
        end_line: 131
        file: ''
      uid: b7594023-f840-4eaa-b609-c2187b48b91a
    - text: 'Daily Steps should be non-negative (>= 0). The code treats steps as an
        activity measure and computes a ''steps_low'' penalty using (10000 - Daily
        Steps) / 10000; negative step counts would be semantically invalid. Example
        validation: .satisfies("CASE WHEN `Daily Steps` IS NULL OR `Daily Steps` >=
