        end_line: 61
        file: ''
      - start_line: 93
        end_line: 97
        file: ''
      - start_line: 129
        end_line: 131
        file: ''
      uid: 5e45ac3d-92e9-4504-a091-200a15f8362f
    - text: 'The ''Stress Level'' column is expected to use a small discrete set of
        ordinal values (the provided dataset shows ~6 distinct integer levels). Enforce
        an upper bound on distinct values to catch free-text or erroneous continuous
        values: .satisfies("CASE WHEN cardinality(DISTINCT `Stress Level`) <= 10 THEN
        1 ELSE 0 END", "Small distinct Stress Levels", lambda x: x == 1).'
      sources:
