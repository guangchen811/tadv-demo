    assumptions:
    - text: 'The ''BMI Category'' column is expected to contain the canonical categories:
        ''Obese'', ''Overweight'', ''Normal'', or ''Normal Weight''. At least 95%
        of input rows should have one of these values (values outside this set will
        be mapped to 0.0 by the code and therefore implicitly treated as low risk).

        We could represent this as a deequ-style constraint: .satisfies("CASE WHEN
        `BMI Category` IN (''Obese'',''Overweight'',''Normal'',''Normal Weight'')
        THEN 1 ELSE 0 END", "Valid BMI Category", lambda x: x >= 0.95)'
      sources:
      - start_line: 116
        end_line: 117
        file: ''
      uid: ee555968-919e-497b-a829-5739239c7303
    - text: 'Values in ''BMI Category'' must match the expected strings exactly (case-sensitive,
        including spaces). The code uses a direct .map(...) followed by .fillna(0.0),
        so variants like ''normal'', ''NormalWeight'', '' Obese'', or ''Obese '' will
        not match and will be treated as missing/0.0. Either the input should already
        be canonical or upstream processing should normalize casing/whitespace. A
        validation rule: no more than 5% of values may differ from the canonical strings
        due to casing/whitespace/typos.

        Example deequ constraint: .satisfies("CASE WHEN TRIM(`BMI Category`) IN (''Obese'',''Overweight'',''Normal'',''Normal
        Weight'') THEN 1 ELSE 0 END", "Canonical BMI Category (trimmed)", lambda x:
        x >= 0.95)'
      sources:
      - start_line: 117
        end_line: 117
        file: ''
      uid: 57857ac3-aca5-410b-b6d5-0dd1fd03347c
    - text: 'The ''BMI Category'' column should be present and largely non-null in
        the input (completeness near 100%). While the code fills unmapped/null values
        to 0.0, having many nulls or missing BMI categories will degrade apnea-risk
        calibration. Require e.g. >= 99% non-null entries.

        Example deequ constraint: .satisfies("CASE WHEN `BMI Category` IS NOT NULL
        THEN 1 ELSE 0 END", "BMI Category completeness", lambda x: x >= 0.99)'
      sources:
      - start_line: 16
        end_line: 17
        file: ''
      - start_line: 117
        end_line: 117
        file: ''
