        values assuming these bounds. Example validation: .satisfies("CASE WHEN `Systolic`
        BETWEEN 90 AND 200 AND `Diastolic` BETWEEN 50 AND 120 THEN 1 ELSE 0 END",
        "BP range", lambda x: x >= 0.99).'
      sources:
