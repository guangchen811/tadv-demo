    - text: 'Most stress values should fall in the observed category set (e.g. 3,4,5,6,7,8
        in the current data). To catch unexpected categories, validate: .satisfies("CASE
        WHEN `Stress Level` IN (3,4,5,6,7,8) OR `Stress Level` IS NULL THEN 1 ELSE
        0 END", "Expected Stress Level categories", lambda x: x >= 0.95).'
