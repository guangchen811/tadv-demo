        end_line: 36
        file: ''
      - start_line: 36
        end_line: 39
        file: ''
      uid: 9bbb91cd-19aa-45d5-9151-0a2293e3bbf3
    - text: 'Daily Steps should be integer-valued (no fractional part). The dataset
        type is Integral and the code treats steps as counts; verifying integerness
        prevents subtle issues after pd.to_numeric and float casts. Example validation:
        .satisfies("CASE WHEN `Daily Steps` IS NULL OR `Daily Steps` = FLOOR(`Daily
        Steps`) THEN 1 ELSE 0 END", "DailyStepsIntegral", lambda x: x == 1.0).'
