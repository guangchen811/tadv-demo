    - text: 'Age values should lie in a plausible human range (recommendation: 0 <=
        Age <= 120). Extreme or invalid ages outside this range are likely data errors
        and can distort the clipped age_factor and downstream risk scores. Represent
        as: .satisfies("CASE WHEN `Age` BETWEEN 0 AND 120 THEN 1 ELSE 0 END", "Age
        in plausible range", lambda x: x == 1.0).'
      sources:
      - start_line: 1118
        end_line: 1124
