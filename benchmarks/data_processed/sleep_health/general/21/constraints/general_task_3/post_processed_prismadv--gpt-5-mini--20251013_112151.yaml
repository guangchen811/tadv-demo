        Level` AS DOUBLE) is not null should be >= 0.95 (or another chosen threshold).'
      sources:
      - start_line: 22
        end_line: 26
        file: ''
      uid: 0b8751ee-1041-4b1c-a9d1-a550dcb6b3b3
    - text: 'There must be sufficient overlap between ''Physical Activity Level''
        and ''Daily Steps'' to compute correlations and build a linear mapper. Concretely,
        require at least 2 rows (preferably many more) where both ''Physical Activity
        Level'' and ''Daily Steps'' are non-null and numeric. Represent as a validation
        rule: COUNT(*) WHERE `Physical Activity Level` IS NOT NULL AND `Daily Steps`
        IS NOT NULL >= 2 (or >= N for a stricter requirement).'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 34
        end_line: 39
        file: ''
      uid: 4ad9e109-b037-4645-a134-76dab8f382c0
    - text: 'The ''Physical Activity Level'' values should not be constant (non-zero
        variance) across the overlapping rows used for modeling. The code computes
        var_x and uses it to form a linear mapper; if variance is zero the correlation
        is undefined/meaningless. Represent as a validation rule: variance(`Physical
        Activity Level` WHERE `Daily Steps` IS NOT NULL) > 0 (or stddev > 0).'
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      uid: a93228b2-6f17-4132-8747-cd8be6e20b3f
    - text: 'Values in ''Physical Activity Level'' should be finite and not extreme
        (no infinite values). Also the fraction of nulls should be small because pal_pred_steps
        = alpha + beta * df[''Physical Activity Level''] is computed for all rows
        and NaNs will propagate into blended_steps and activity_score. Represent as
        validation rules: fraction of rows with `Physical Activity Level` IS NULL
        <= 0.05, and fraction with isfinite(`Physical Activity Level`) == 1.0 should
        be >= 0.95.'
      sources:
