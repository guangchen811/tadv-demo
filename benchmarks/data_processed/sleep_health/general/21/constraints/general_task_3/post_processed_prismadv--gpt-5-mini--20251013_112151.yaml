        degenerate. Example validation: .satisfies("CASE WHEN COUNT_DISTINCT(`Daily
        Steps`) >= 2 THEN 1 ELSE 0 END", "DailyStepsVaries", lambda x: x == 1.0) evaluated
        on the subset used for blending.'
      sources:
      - start_line: 42
