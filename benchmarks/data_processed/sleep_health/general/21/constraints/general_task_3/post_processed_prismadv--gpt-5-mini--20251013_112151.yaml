        this as a validation that all rows have Age convertible to numeric, e.g. (Deequ/GX
        style): .satisfies("CASE WHEN try_cast(`Age` AS double) IS NOT NULL THEN 1
        ELSE 0 END", "Age is numeric", lambda x: x == 1.0).'
