    - text: 'The downstream logic assumes a negative association between Stress Level
        and Quality of Sleep (higher stress should correspond to lower sleep quality).
        The script computes Spearman correlation (spearman_stress_q) and then uses
        stress and quality in combined risk/score calculations; model calibration
        and thresholds will be meaningful if the expected direction of association
        holds. Example actionable check:

        - assert spearman_correlation(''Stress Level'',''Quality of Sleep'') < 0.0
        (or at least less than some negative threshold, e.g. < -0.05) and raise a
