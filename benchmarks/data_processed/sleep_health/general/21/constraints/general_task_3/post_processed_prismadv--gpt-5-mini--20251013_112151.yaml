        end_line: 61
        file: ''
      - start_line: 93
        end_line: 96
        file: ''
      uid: ac6c30fd-3d87-400b-9759-f8d43a41018a
    - text: 'Stress Level should lie in a plausible bounded scale (expected roughly
        in 0..10; code uses 6.0 as a mid threshold and maps to a 0..10-derived contribution).
        Represent as: .satisfies("CASE WHEN (`Stress Level` BETWEEN 0 AND 10) OR `Stress
        Level` IS NULL THEN 1 ELSE 0 END", "Stress Level in [0,10]", lambda x: x >=
        0.99).'
      sources:
      - start_line: 93
        end_line: 97
        file: ''
      - start_line: 129
        end_line: 131
        file: ''
      uid: bb466235-7411-4228-939f-ac858c2e86be
    - text: 'The ''Stress Level'' column is expected to be largely present (the code
        uses it to compute means/std, z-scores, a stress_score component and an insomnia
        risk component). Require most rows to be non-null, e.g. >= 95% non-null. Represent
        as: .satisfies("CASE WHEN `Stress Level` IS NOT NULL THEN 1 ELSE 0 END", "Non-null
        Stress Level", lambda x: x >= 0.95).'
      sources:
