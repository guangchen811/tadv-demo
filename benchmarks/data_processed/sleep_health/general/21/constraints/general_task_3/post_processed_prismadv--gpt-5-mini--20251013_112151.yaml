  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'There must be a sufficient number of rows where both ''Sleep Duration''
        and ''Quality of Sleep'' are non-null to compute correlations and fit the
        linear model. Concretely: at least 2 non-null paired rows and non-zero variance
        in ''Sleep Duration'' among those pairs. This can be enforced as (a) a pairwise
        completeness check on (''Sleep Duration'',''Quality of Sleep'') and (b) an
        assertion that variance(Sleep Duration | both not null) > 0. Example actionable
        checks: count(rows where Sleep Duration IS NOT NULL AND Quality of Sleep IS
        NOT NULL) >= 2; var(Sleep Duration WHERE both not null) > 0.'
      sources:
      - start_line: 45
        end_line: 56
        file: ''
      - start_line: 106
        end_line: 109
        file: ''
      uid: 6b531f7b-9c0b-4b34-b1b0-41e100124b47
    - text: '''Quality of Sleep'' is expected to be numeric and lie in the mapping
        range used by the code (values meaningful in the 3..9 band). The code maps
        3..9 to 0..1 and clips outside values; therefore the practical assumption
        is that most values fall within [3,9] and the column is numeric. Actionable
        checks: assert numeric type/coercible to numeric, and assert fraction of rows
        with 3 <= Quality of Sleep <= 9 is high (e.g. > 0.9) or at least above some
        threshold. Example deequ-style constraints: isNumeric(''Quality of Sleep''),
        fraction(where Quality of Sleep BETWEEN 3 AND 9) >= T.'
      sources:
      - start_line: 88
        end_line: 90
        file: ''
      - start_line: 127
        end_line: 128
        file: ''
      uid: abc181c3-67ba-45f8-bb87-2ab2f0af2912
    - text: '''Sleep Duration'' is expected to be numeric and within a realistic hourly
        range (e.g. 0..24). The scoring and triage use differences from 8 hours and
        clip by 3 hours, and also compute durations shortness relative to 7h. Actionable
        checks: assert numeric coercible, and assert most values satisfy 0 <= Sleep
        Duration <= 24 (or a stricter plausible range), and flag extreme outliers.
        Example: isNumeric(''Sleep Duration'') and fraction(where Sleep Duration BETWEEN
        0 AND 24) >= T.'
      sources:
      - start_line: 84
        end_line: 86
        file: ''
      - start_line: 126
        end_line: 127
        file: ''
      uid: 63664d0d-cab4-4114-a7f2-2a3eb1641742
    - text: 'Quality of Sleep must not be constant across the dataset (non-zero standard
        deviation) because the consistency_score divides residuals by 2*q_std. Actionable
        check: stddev(Quality of Sleep WHERE Quality of Sleep IS NOT NULL) > 0. Example:
        assert that the standard deviation of ''Quality of Sleep'' on non-null rows
        exceeds a small epsilon.'
      sources:
      - start_line: 106
        end_line: 109
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: 3840c9ae-12ae-4e6c-ae40-f99e0eaba836
    - text: 'Pairwise completeness between ''Sleep Duration'', ''Quality of Sleep'',
        and any other fields used in insomnia_risk (specifically ''Stress Level''
        and ''Daily Steps'') should be sufficient because insomnia_risk is computed
        as a weighted combination of those columns. Actionable checks: ensure a minimum
        fraction of rows have all four fields non-null before relying on triage thresholds
        or quantiles (e.g. count(rows where Sleep Duration, Quality of Sleep, Stress
        Level, Daily Steps ARE NOT NULL) / total_rows >= T).'
      sources:
      - start_line: 126
        end_line: 131
        file: ''
      - start_line: 45
        end_line: 49
        file: ''
      uid: bacd9b4b-473f-4127-af31-1ee682386c67
  '["Quality of Sleep","Stress Level"]':
    code: []
    assumptions:
    - text: 'Both ''Quality of Sleep'' and ''Stress Level'' are numeric and lie in
        expected ranges required by the scoring logic. Specifically: Quality of Sleep
        should fall in the mapping range [3, 9] (the code maps 3..9 -> 0..1) and Stress
        Level should be in a reasonable stress scale such as [0, 10] (the code standardizes
        and clips values assuming an approximately 0..10 scale). Example actionable
        checks (Deequ-style or similar):

        - enforce numeric types for both columns (coercion already attempted): ensure
        isNumeric([''Quality of Sleep'',''Stress Level''])

        - enforce value ranges: hasMin(''Quality of Sleep'') >= 3, hasMax(''Quality
        of Sleep'') <= 9; hasMin(''Stress Level'') >= 0, hasMax(''Stress Level'')
        <= 10

        - or require high fraction within these ranges: fraction(rows where 3 <= Quality
        of Sleep <= 9 AND 0 <= Stress Level <= 10) >= 0.99'
