        end_line: 43
        file: ''
      - start_line: 130
        end_line: 131
        file: ''
      uid: 29e8d6cc-26d1-40ee-a4f0-d413597ab212
    - text: "Daily Steps should not contain extreme outliers due to data errors; as\
        \ a practical bound, values should be <= 100000. The code uses 10000 as a\
        \ behavioral threshold, so extremely large values likely indicate data problems.\
        \ Example validation: .satisfies(\"CASE WHEN `Daily Steps` IS NULL OR `Daily\
        \ Steps` <= 100000 THEN 1 ELSE 0 END\", \"DailyStepsReasonableMax\", lambda\
        \ x: x >= 0.99) \u2014 tighten to ==1.0 if you require all rows within the\
        \ bound."
      sources:
      - start_line: 130
        end_line: 131
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      uid: 3961606f-ed60-4dba-bb62-40e5d6e4629b
    - text: 'There must be at least two rows where both Daily Steps and Physical Activity
        Level are present and numeric so that correlations and the linear mapper (PAL
        -> Steps) are computable and meaningful. Example validation: .satisfies("CASE
        WHEN `Daily Steps` IS NOT NULL AND `Physical Activity Level` IS NOT NULL THEN
        1 ELSE 0 END", "StepsAndPALPairs", lambda x: x >= 2/float(df.shape[0])) or
        enforce an absolute count check (>=2).'
      sources:
