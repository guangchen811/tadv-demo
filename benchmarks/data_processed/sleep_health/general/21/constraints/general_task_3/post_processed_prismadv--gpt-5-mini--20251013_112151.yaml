        .satisfies("CASE WHEN `Quality of Sleep` IS NULL OR `Quality of Sleep` = FLOOR(`Quality
        of Sleep`) THEN 1 ELSE 0 END", "QoS_is_integer", lambda x: x == 1)

        (If fractional scores are allowed, relax this constraint.)'
      sources:
