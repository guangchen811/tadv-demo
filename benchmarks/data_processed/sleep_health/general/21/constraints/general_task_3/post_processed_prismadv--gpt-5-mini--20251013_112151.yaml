  '["Age","BMI Category","Diastolic","Heart Rate","Systolic"]':
    code: []
    assumptions:
    - text: 'When blood pressure is parsed, Systolic must be greater than Diastolic
        for the same record (Systolic > Diastolic). This is used directly to check
        ordering (line that computes order_ok). Example Deequ-style constraint: .satisfies(''Systolic
        > Diastolic'', ''bp_ordering'')'
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      uid: 7cff5991-1d3d-418e-86ed-18bf722aa680
    - text: 'Systolic and Diastolic should lie in plausible physiological ranges for
        records used in scoring: Systolic between 90 and 200 AND Diastolic between
        50 and 120. The code also uses these ranges when computing BP-based penalties
        and validity (range_ok and bp_score). Example constraint: .satisfies(''Systolic
        >= 90 AND Systolic <= 200 AND Diastolic >= 50 AND Diastolic <= 120'', ''bp_range'')'
      sources:
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 100
        end_line: 104
        file: ''
      uid: 6ecffeb8-ee78-4e28-adba-fae1ca271805
    - text: 'A sufficient share of rows (the code expects stable quantiles and numeric
        arithmetic) must have non-missing, usable values across the five columns used
        to compute apnea risk: BMI Category (mappable to one of the keys used by bmi_map
        or treated as explicit 0.0), Age (numeric), Heart Rate (numeric), Systolic
        (numeric), and Diastolic (numeric). Put another way: the combination of these
        columns should be non-null/convertible to numeric for a majority of rows (e.g.,
        >50%) so apnea_risk and the quantile-based apnea_threshold are well-defined.
        Example Deequ-style checks: a) fraction of rows where (BMI Category in {''Obese'',''Overweight'',''Normal'',''Normal
        Weight''} OR BMI Category is null-but-treated) AND Age is not null AND Heart
        Rate is not null AND Systolic is not null AND Diastolic is not null is >=
        0.5; b) numeric-type assertions on Age, Heart Rate, Systolic, Diastolic.'
      sources:
      - start_line: 116
        end_line: 124
        file: ''
      - start_line: 139
        end_line: 143
        file: ''
      uid: 295333b9-94f7-404b-a1ef-d9c3549edece
    - text: 'Age and Heart Rate should be jointly plausible numeric values (non-missing
        and within realistic bounds) since age_factor and hr_factor are computed together
        for risk scoring. For stability: Age in a realistic range (for example 0..120)
        AND Heart Rate in a plausible range (for example 30..200) for most records.
        Example constraint: .satisfies(''Age >= 0 AND Age <= 120 AND `Heart Rate`
        >= 30 AND `Heart Rate` <= 200'', ''age_hr_plausibility'')'
      sources:
      - start_line: 118
        end_line: 121
        file: ''
      uid: 1606f3a4-fc70-4574-8ae6-be8fa9423de0
  '["Blood Pressure","Diastolic","Systolic"]':
    code: []
    assumptions:
    - text: 'All non-null values in the ''Blood Pressure'' column conform to the pattern
        ''Systolic/Diastolic'' where each of Systolic and Diastolic is 2 or 3 digits
        (e.g. ''120/80''). This is required so that parsing via regex into the ''Systolic''
        and ''Diastolic'' columns succeeds. Example actionable check: assert that
        Blood Pressure matches the regex ^\d{2,3}/\d{2,3}$ for most rows, or represent
        as a constraint like .satisfies("regexp_like(Blood Pressure, ''^\\d{2,3}/\\d{2,3}$'')")
        or, for parsing consistency, .satisfies("(Blood Pressure IS NOT NULL) => (Systolic
        IS NOT NULL AND Diastolic IS NOT NULL)", [''Blood Pressure'',''Systolic'',''Diastolic'']).'
      sources:
      - start_line: 63
        end_line: 65
        file: ''
      uid: d9003dec-b58f-43fa-a790-5596d41aaa48
    - text: 'Whenever a ''Blood Pressure'' value is present and parsed, both derived
        columns ''Systolic'' and ''Diastolic'' must be numeric and non-null. Downstream
        calculations (bp_score, apnea risk) assume numeric Systolic and Diastolic
        values. Actionable constraint: for all rows where Blood Pressure is not null,
        Systolic IS NOT NULL and Diastolic IS NOT NULL (and are numeric). Example:
        .satisfies("(Blood Pressure IS NOT NULL) => (Systolic IS NOT NULL AND Diastolic
        IS NOT NULL)", [''Blood Pressure'',''Systolic'',''Diastolic'']).'
      sources:
      - start_line: 63
        end_line: 65
        file: ''
      - start_line: 100
        end_line: 104
        file: ''
      uid: e362fc6f-89f9-4a8a-ae28-e59ab3edacd0
    - text: 'For records with numeric Systolic and Diastolic, Systolic must be strictly
        greater than Diastolic (Systolic > Diastolic). The code relies on this physiological
        ordering (order_ok) and on comparisons where systolic exceeding diastolic
        would be invalid. Actionable constraint: .satisfies("Systolic > Diastolic",
        [''Systolic'',''Diastolic'']).'
      sources:
      - start_line: 67
        end_line: 69
        file: ''
      uid: 8849a675-dec0-4784-ae7c-3feaa6d6b1ac
    - text: 'Systolic and Diastolic values should lie within expected clinical bounds
        used by the script: Systolic in [90, 200] and Diastolic in [50, 120]. The
        script computes range_ok and uses these values in scoring; out-of-range values
        may indicate parsing or data errors. Actionable constraint: .satisfies("Systolic
        BETWEEN 90 AND 200 AND Diastolic BETWEEN 50 AND 120", [''Systolic'',''Diastolic'']).'
      sources:
      - start_line: 70
        end_line: 104
        file: ''
      uid: dd68536e-2d56-4407-abd8-8e4a4788ecf1
  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'There must be at least two records where both ''Physical Activity Level''
        and ''Daily Steps'' are non-null so that covariance/correlation and the linear
        regression fit are well-defined. In addition the variance of ''Physical Activity
        Level'' computed on those paired rows must be > 0 (otherwise the regression
        slope beta_steps_from_pal is degenerate). Actionable checks (Deequ-style):

        - assert count(*) of rows where Physical Activity Level IS NOT NULL AND Daily
        Steps IS NOT NULL >= 2

        - assert variance(Physical Activity Level) on rows where both present > 0'
      sources:
      - start_line: 28
        end_line: 39
        file: ''
      uid: db0e6ac4-b86e-46e6-b94d-d64d3e6f85b3
    - text: 'The blended_steps calculation and downstream activity_score require that
        for rows used to compute the mean/std of blended_steps there exist a non-empty
        set of rows with both ''Physical Activity Level'' and ''Daily Steps'' present
        (blended_steps = 0.6*Daily Steps + 0.4*pal_pred_steps produces NaN if either
        input is missing). Practically require a non-trivial share of rows (e.g.,
        >0% or a configurable minimum fraction) with both columns non-null so bs_mean
        and bs_std are finite. Actionable checks:

        - assert fraction(rows with Physical Activity Level IS NOT NULL AND Daily
        Steps IS NOT NULL) >= X (X = e.g., 0.01 or other business threshold)

        - assert isFinite(mean(blended_steps)) and isFinite(stddev(blended_steps))'
      sources:
      - start_line: 41
        end_line: 43
        file: ''
      - start_line: 77
        end_line: 82
        file: ''
      uid: 2a39379e-6092-49fb-af4a-31f88ae49a75
    - text: 'The code expects a positive (or at least non-zero) monotonic relationship
        between ''Physical Activity Level'' and ''Daily Steps'' (it computes Pearson
        and Spearman correlations and then uses a linear mapper from PAL to steps).
        Therefore require that the Spearman or Pearson correlation between the two
        columns is computable (not NaN) and optionally above a minimum expected magnitude.
        Actionable checks:

        - assert spearman_correlation(Physical Activity Level, Daily Steps) is finite
        (not NaN)

        - optionally: abs(spearman_correlation) >= T (choose T, e.g. 0.05 or a domain-specific
        threshold)'
      sources:
      - start_line: 28
        end_line: 33
        file: ''
      uid: 62b84210-5e95-4937-88a4-7e3264e2ee31
    - text: 'The insomnia_risk computation combines ''Daily Steps'' with ''Sleep Duration'',
        ''Quality of Sleep'', and ''Stress Level'' (steps_low is derived from Daily
        Steps). This assumes ''Daily Steps'' is numeric and non-negative for the clipping/normalization
        to be meaningful, and that the four inputs are present as numeric values where
        the risk is computed. Actionable checks:

        - assert for rows where insomnia features are evaluated: Daily Steps IS NOT
        NULL AND Daily Steps >= 0 AND Sleep Duration IS NOT NULL AND Quality of Sleep
        IS NOT NULL AND Stress Level IS NOT NULL

        - assert fraction(rows meeting the above) >= Y (Y = business threshold of
        rows where insomnia_risk should be computable)'
      sources:
      - start_line: 126
        end_line: 131
        file: ''
      uid: 2a905adb-9e22-4c4f-a3c9-ba00358ba186
  '["Daily Steps","Quality of Sleep","Sleep Duration","Stress Level"]':
    code: []
    assumptions:
    - text: 'Daily Steps and Physical Activity Level are numeric and there must be
        a non-trivial linear relationship between them for the PAL->steps mapper to
        be meaningful. Concretely: (a) there should be at least 2 rows where both
        ''Daily Steps'' and ''Physical Activity Level'' are non-null; (b) ''Physical
        Activity Level'' should not be constant (i.e., more than one distinct value
        / non-zero variance); (c) both columns should be non-negative integers/floats.
        These can be enforced as Deequ-style checks such as: hasCompleteness([''Daily
        Steps'',''Physical Activity Level'']) >= X (or isComplete for a required minimum),
        and distinctness(''Physical Activity Level'') > 1 (or custom variance check),
        and min(''Daily Steps'') >= 0.'
      sources:
      - start_line: 20
        end_line: 26
        file: ''
      - start_line: 28
        end_line: 43
        file: ''
      uid: 3e1b1e18-697e-4d87-8741-50d72d3832a2
    - text: 'Sleep Duration and Quality of Sleep must be numeric with sufficient variation
        so the linear model predicting Quality from Duration is valid. Concretely:
        (a) at least 2 rows where both ''Sleep Duration'' and ''Quality of Sleep''
        are non-null; (b) ''Sleep Duration'' must have non-zero variance (more than
        one distinct value); (c) both columns should be numeric (Sleep Duration fractional,
        Quality integral). Possible Deequ constraints: hasCompleteness([''Sleep Duration'',''Quality
        of Sleep'']) >= X, distinctness(''Sleep Duration'') > 1, and isNumeric(''Sleep
        Duration'') & isNumeric(''Quality of Sleep'').'
      sources:
      - start_line: 45
        end_line: 56
        file: ''
      - start_line: 84
        end_line: 90
        file: ''
      uid: b5c9e6fe-47b2-41c7-a51c-d5ecbc08af0f
    - text: 'Stress Level and Quality of Sleep must be present as numeric, ordinal
        values for the Spearman correlation and stress-based scoring to be meaningful.
        Concretely: (a) at least 2 rows with both ''Stress Level'' and ''Quality of
        Sleep'' non-null; (b) ''Stress Level'' should not be constant and should lie
        in a plausible ordinal range (e.g., 1..10); (c) both columns numeric. Deequ-style
        checks: hasCompleteness([''Stress Level'',''Quality of Sleep'']) >= X, distinctness(''Stress
        Level'') > 1, and min/max range checks on ''Stress Level'' and numeric-type
        checks.'
      sources:
      - start_line: 58
        end_line: 61
        file: ''
      - start_line: 92
        end_line: 97
        file: ''
      uid: 0d14eb98-b9f4-48b1-ada1-65dd69c0e361
    - text: "Rows used to compute insomnia risk require all four inputs \u2014 Sleep\
        \ Duration, Quality of Sleep, Stress Level and Daily Steps \u2014 to be numeric\
        \ and non-null for a meaningful distribution of insomnia_risk and quantile-based\
        \ thresholding. Concretely: (a) there should be a sufficient number of rows\
        \ (recommended >= 2, preferably many more) where all of ['Sleep Duration','Quality\
        \ of Sleep','Stress Level','Daily Steps'] are non-null; (b) 'Daily Steps'\
        \ should be non-negative. Deequ-style constraints: hasCompleteness(['Sleep\
        \ Duration','Quality of Sleep','Stress Level','Daily Steps']) >= X and min('Daily\
        \ Steps') >= 0."
      sources:
      - start_line: 126
        end_line: 131
        file: ''
      - start_line: 139
        end_line: 141
        file: ''
      uid: 5a593a93-2cc1-4d85-8207-5ff288e16275
    - text: 'When Sleep Duration is present, Quality of Sleep should fall in the expected
        scale used by later mapping (3..9) so that quality_score mapping is meaningful.
        Concretely: for rows where ''Sleep Duration'' is not null, ''Quality of Sleep''
        should typically be within [3,9] (or at least the majority should be). Deequ-style
        checks: forCondition(isNotNull(''Sleep Duration'')).satisfiesRange(''Quality
        of Sleep'', 3, 9) or approximate coverage check like fractionInRange([''Sleep
        Duration'',''Quality of Sleep''], ''Quality of Sleep'' in [3,9]) >= Y.'
      sources:
      - start_line: 45
        end_line: 56
        file: ''
      - start_line: 84
        end_line: 90
        file: ''
      uid: 617afabd-fd84-440b-adee-b5479e4ff3b1
  '["Diastolic","Systolic"]':
    code: []
    assumptions:
    - text: 'The ''Blood Pressure'' column values are expected to be in the form ''Systolic/Diastolic''
        with two- or three-digit integers (e.g. ''120/80''), so that the regex extraction
        yields numeric Systolic and Diastolic parts. A corresponding Deequ-like check:
        .hasPattern(''Blood Pressure'',''^\d{2,3}/\d{2,3}$'') or after extraction
        .isComplete([''Systolic'',''Diastolic'']).'
      sources:
      - start_line: 62
        end_line: 65
        file: ''
      uid: 33b98a37-2866-4bb7-ab36-68f769875494
    - text: 'For a valid blood-pressure measurement, Systolic must be greater than
        Diastolic for the same row. This can be expressed as a multi-column constraint:
        .satisfies(''Systolic > Diastolic'', [''Systolic'',''Diastolic'']).'
      sources:
      - start_line: 67
        end_line: 70
        file: ''
      uid: ab54cd4f-4889-490a-a634-6e0cc8e92020
    - text: 'Systolic and Diastolic values used downstream are assumed to lie in physiologically
        plausible ranges: Systolic roughly between 90 and 200 and Diastolic roughly
        between 50 and 120. Actionable check: .satisfies(''Systolic >= 90 AND Systolic
        <= 200 AND Diastolic >= 50 AND Diastolic <= 120'', [''Systolic'',''Diastolic'']).'
      sources:
      - start_line: 69
        end_line: 70
        file: ''
      uid: 66822877-2436-4a0c-9a7a-74f9d49919d5
    - text: 'Rows used for BP-based scoring and triage assume Systolic and Diastolic
        are numeric and non-null so arithmetic (clipping, normalization, quantiles,
        rounding and int-casting) yields finite results. Enforce with a multi-column
        completeness/finite constraint like: .isComplete([''Systolic'',''Diastolic''])
        and/or .satisfies(''isFinite(Systolic) AND isFinite(Diastolic)'', [''Systolic'',''Diastolic'']).
        (These columns are later used for bp_score, a_bp/apnea_risk calculations and
        final integer output.)'
