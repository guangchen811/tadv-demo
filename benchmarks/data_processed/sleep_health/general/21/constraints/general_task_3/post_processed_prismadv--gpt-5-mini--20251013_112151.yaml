        for ranking and z-scoring). Represent as: .satisfies("CASE WHEN `Stress Level`
        = round(`Stress Level`) OR `Stress Level` IS NULL THEN 1 ELSE 0 END", "Integral
        Stress Level", lambda x: x >= 0.95).'
      sources:
