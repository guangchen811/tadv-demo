        \ non-numeric strings will become NaN and break downstream numeric operations\
        \ and correlations. Example validation (Great Expectations / deequ-style):\
        \ .satisfies(\"CASE WHEN `Daily Steps` IS NULL OR TRY_CAST(`Daily Steps` AS\
