constraints:
  Age:
    code:
    - - .satisfies('Age > 18 AND Age < 100', 'Age should be within a reasonable range')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'\d{2,3}/\d{2,3}')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Heart Rate:
    code:
    - - .isPositive('Heart Rate')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isContainedIn('Quality of Sleep', [4, 5, 6, 7, 8, 9])
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Insomnia', 'Sleep
        Apnea')", 'Sleep Disorder has allowed values or is NULL')
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .isContainedIn('Stress Level', [3, 4, 5, 6, 7, 8])
      - Invalid
    assumptions: []
