constraints:
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Obese', 'Normal', 'Normal Weight'])
      - Valid
    - - .isDataType('BMI Category', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    - - .isDataType('Blood Pressure', ConstrainableDataTypes.String)
      - Invalid
    - - .matchesPattern('Blood Pressure', r'^\d+/\d+$')
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isDataType('Daily Steps', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isDataType('Person ID', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - '.hasStandardDeviation(''Physical Activity Level'', lambda x: x > 0)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isDataType('Physical Activity Level', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isDataType('Quality of Sleep', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isLessThanOrEqualTo('Quality of Sleep', 10)
      - Invalid
    - - .isNonNegative('Quality of Sleep')
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasNumberOfDistinctValues(''Sleep Disorder'', lambda x: x >= 2)'
      - Invalid
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isDataType('Sleep Duration', ConstrainableDataTypes.Fractional)
      - Invalid
    - - .isPositive('Sleep Duration')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isDataType('Stress Level', ConstrainableDataTypes.Integral)
      - Invalid
    - - .isLessThanOrEqualTo('Stress Level', 10)
      - Invalid
    - - .isNonNegative('Stress Level')
      - Invalid
    assumptions: []
