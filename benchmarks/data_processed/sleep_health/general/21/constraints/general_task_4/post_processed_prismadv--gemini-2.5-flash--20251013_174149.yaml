    - text: 'The ''BP_SYS'' and ''BP_DIA'' columns (derived from ''Blood Pressure'')
        must both contain numerical, non-null values (convertible to int/float). This
        is essential for calculating the ''bp_score'' and for determining ''high blood
        pressure'' risk alerts, which involve numerical comparisons against thresholds.

        We could represent this assumption as deequ constraints like:

        .isType(''BP_SYS'', IntegerType())

        .isType(''BP_DIA'', IntegerType())

        .isNotNull(''BP_SYS'')

        .isNotNull(''BP_DIA'')'
      sources:
