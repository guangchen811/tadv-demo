    - text: 'The ''Stress Level'' and ''Quality of Sleep'' columns must both contain
        numerical, non-null values (convertible to float) to enable the calculation
        of their correlation, which is used to calibrate the weight (''w_stress'')
        for the ''base_score''.

        We could represent this assumption as deequ constraints like:

        .isType(''Stress Level'', DoubleType())

        .isType(''Quality of Sleep'', DoubleType())

        .isNotNull(''Stress Level'')

