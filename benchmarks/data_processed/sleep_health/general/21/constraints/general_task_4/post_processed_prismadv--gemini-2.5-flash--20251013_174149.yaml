    - text: 'The ''BMI Category'' column must only contain values from the expected
        set (''Normal'', ''Normal Weight'', ''Overweight'', ''Obese'') to ensure that
        the `bmi_penalty` is numeric and non-null. Both `bmi_penalty` and `disorder_penalty`
        (derived from ''Sleep Disorder'' and handled by `fillna`) must be numeric
        and non-null for their combination into `penalty_total`.

        We could represent this assumption as a deequ constraint like this:

        .isContainedIn("BMI Category", ["Normal", "Normal Weight", "Overweight", "Obese"])'
