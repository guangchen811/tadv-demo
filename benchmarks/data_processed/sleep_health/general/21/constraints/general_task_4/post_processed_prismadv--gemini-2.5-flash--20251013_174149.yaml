      uid: 722b7b7f-8938-4148-81f6-5630ebd0ffb9
    - text: 'The ''Person ID'' column must contain unique and non-negative integral
        values. This is critical because ''Person ID'' is used as a direct array index
        to store corresponding ''SleepHealthIndex'' and ''RiskAlert'' values. If ''Person
        ID'' values are not unique, the ''SleepHealthIndex'' and ''RiskAlert'' values
        for earlier occurrences of a duplicate ''Person ID'' will be silently overwritten.
        If ''Person ID'' values are negative, an `IndexError` will occur.

        We could represent this assumption as deequ constraints like:

        .isUnique(''Person ID'')

        .isNonNegative(''Person ID'')'
