    - text: 'The ''Sleep Duration'' column values must be greater than or equal to
        3.0, and ''Quality of Sleep'' values must be greater than or equal to 4.0.
        This ensures that the normalized intermediate scores (`duration_norm` and
        `qos_norm`) are non-negative, preventing `NaN` results from square root operations
        when calculating the synergy score.

        We could represent this assumption as a deequ constraint like this:

        .isGreaterThanOrEqualTo("Sleep Duration", 3.0)

        .isGreaterThanOrEqualTo("Quality of Sleep", 4.0)'
