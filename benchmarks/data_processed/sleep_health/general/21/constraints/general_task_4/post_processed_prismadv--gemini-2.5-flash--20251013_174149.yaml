        file: ''
      - start_line: 38
        end_line: 40
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: e4b41adf-f4c7-4b57-b225-8c25a3ce1b08
    - text: 'The ''BMI Category'' column is expected to contain values exclusively
        from a predefined set {''Normal'', ''Normal Weight'', ''Overweight'', ''Obese''}.
        The ''Sleep Disorder'' column is expected to contain values exclusively from
        {''Insomnia'', ''Sleep Apnea''} or be null (which are handled by `fillna`).
        These values are mapped to numerical penalties, which are then combined to
        form ''penalty_total''. Any other values in these columns would result in
        NaN penalties, affecting the final ''SleepHealthIndex''.

        We could represent this assumption as deequ constraints like:

        .isContainedIn(''BMI Category'', [''Normal'', ''Normal Weight'', ''Overweight'',
        ''Obese''])

        .isContainedIn(''Sleep Disorder'', [''Insomnia'', ''Sleep Apnea''])'
      sources:
