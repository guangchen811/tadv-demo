      uid: 7d72b1c0-165d-425b-b9cd-8837704f99ac
    - text: 'The ''Physical Activity Level'' and ''Daily Steps'' columns must be numeric
        (convertible to float) and have no null values. This is essential for accurate
        correlation, linear regression, and subsequent activity score calculations.
        Additionally, the mean of ''Daily Steps'' must not be zero to prevent division
        by zero in the activity score calculation.

        We could represent this assumption as a deequ constraint like this:

        .isNumeric("Physical Activity Level").hasCompleteness("Physical Activity Level",
        1.0)

        .isNumeric("Daily Steps").hasCompleteness("Daily Steps", 1.0)

        (and a custom check for .mean("Daily Steps").isGreaterThan(0.0))'
