        of the blood pressure score.

        We could represent this assumption as a deequ constraint like this:

        .isNumeric("BP_SYS").hasCompleteness("BP_SYS", 1.0)

        .isNumeric("BP_DIA").hasCompleteness("BP_DIA", 1.0)'
