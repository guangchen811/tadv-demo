    - text: 'The ''BP_SYS'', ''BP_DIA'', ''Sleep Duration'', ''Quality of Sleep'',
        and ''SleepHealthIndex'' columns must be numeric and have no null values.
        This is essential for the correct evaluation of risk conditions (''high_bp'',
        ''low_sleep'', ''low_index'') and the subsequent ''RiskAlert'' and ''RiskReasons''
        calculations.

        We could represent this assumption as a deequ constraint like this:

        .isNumeric("BP_SYS").hasCompleteness("BP_SYS", 1.0)

        .isNumeric("BP_DIA").hasCompleteness("BP_DIA", 1.0)

        .isNumeric("Sleep Duration").hasCompleteness("Sleep Duration", 1.0)

        .isNumeric("Quality of Sleep").hasCompleteness("Quality of Sleep", 1.0)

        .isNumeric("SleepHealthIndex").hasCompleteness("SleepHealthIndex", 1.0)'
