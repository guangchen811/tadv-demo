fixing_results:
  Quality of Sleep:
    c4b7e597-15fe-4474-a1cf-6e6b190e4c95: '.isContainedIn("Quality of Sleep", ["4",
      "5", "6", "7", "8", "9"], lambda x: x == 1.0)'
  Person ID:
    089de2ff-2834-4b75-b775-40e88a821c88: '.isNonNegative(''`Person ID`'', assertion=lambda
      x: x == 1.0)'
  '["BP_DIA","BP_SYS","Blood Pressure"]':
    4367b2db-b098-4de1-9c3a-9a814aca179a: '.satisfies("`Blood Pressure` RLIKE ''^\d+/\d+$''",
      "Blood Pressure Format", lambda x: x == 0.0)'
  '["BP_DIA","BP_SYS","Quality of Sleep","RiskAlert","RiskReasons","Sleep Duration","SleepHealthIndex"]':
    fe0e8127-48dc-4eed-be74-cd75373c4d87: '.satisfies("CAST(SUBSTRING_INDEX(`Blood
      Pressure`, ''/'', 1) AS INT) >= 0", "BP_SYS Non-Negative", lambda x: x == 1.0)'
  '["Quality of Sleep","Stress Level"]':
    4b4465ad-8c81-4c2d-b408-3b1f778e3724: '.satisfies("(`Quality of Sleep` - 4.0)
      * (`Sleep Duration` - 3.0) >= 0", "Product of normalized offsets must be non-negative",
      lambda x: x == 1.0)'
    e442d10f-aea5-44ac-a152-df75bc408d6a: '.satisfies("`Sleep Duration` < 5.5 OR `Quality
      of Sleep` <= 5", "Low Sleep condition proportion", lambda x: x >= 0.04 and x
      <= 0.4)'
  '["Sleep Disorder","disorder_penalty"]':
    ac074617-68eb-4bbf-8db6-d46ef030cfa7: '.satisfies("CAST(SUBSTRING_INDEX(`Blood
      Pressure`, ''/'', 1) AS INT) IS NOT NULL", "BP_SYS must be an integer", lambda
      x: x == 1.0)'
