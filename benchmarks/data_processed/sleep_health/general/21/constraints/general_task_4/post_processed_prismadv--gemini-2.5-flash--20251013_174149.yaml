      uid: e9aa0246-bef2-45fc-8bfd-dfdeb093e615
    - text: 'The ''Sleep Duration'' and ''Quality of Sleep'' columns must both contain
        numerical, non-null values (convertible to float). Additionally, ''Sleep Duration''
        values should be greater than or equal to 3.0, and ''Quality of Sleep'' values
        should be greater than or equal to 4.0. This ensures that intermediate normalized
        scores (''duration_norm'', ''qos_norm'') are non-negative, preventing errors
        (e.g., NaN from np.sqrt) during the calculation of the ''synergy'' score and
        ensuring accurate risk assessment.

        We could represent this assumption as deequ constraints like:

        .isType(''Sleep Duration'', DoubleType())

        .isType(''Quality of Sleep'', DoubleType())

        .isNotNull(''Sleep Duration'')

        .isNotNull(''Quality of Sleep'')

        .isGreaterThanOrEqualTo(''Sleep Duration'', 3.0)

        .isGreaterThanOrEqualTo(''Quality of Sleep'', 4.0)'
