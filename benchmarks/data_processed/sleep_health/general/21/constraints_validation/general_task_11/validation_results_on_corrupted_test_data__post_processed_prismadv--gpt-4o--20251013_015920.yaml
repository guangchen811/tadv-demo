results:
  Physical Activity Level:
    code:
    - suggestion: .isNonNegative('`Physical Activity Level`')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Physical Activity Level` <= 100', 'Physical Activity
        Level within range')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10',
        'Quality of Sleep range')
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: false
      reason_if_failed: 'Constraint ''isContainedIn(''BMI Category'', [''Normal'',
        ''Normal Weight'', ''Overweight'', ''Obese''])'' failed on data sample: Value:
        0.9733333333333334 does not meet the constraint requirement!'
      level: error
  Blood Pressure:
    code:
    - suggestion: .satisfies('CAST(SPLIT(`Blood Pressure`, "/")[0] AS INT) IS NOT
        NULL AND CAST(SPLIT(`Blood Pressure`, "/")[1] AS INT) IS NOT NULL', 'Valid
        Numeric Blood Pressure Readings')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .satisfies('`Sleep Duration` >= 5.0 AND `Sleep Duration` <= 9.0',
        'Sleep Duration Range')
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .satisfies('`Stress Level` BETWEEN 3 AND 8', 'Valid Stress Level
        Range')
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: '.hasApproxQuantile(''Age'', 0.5, lambda x: x > 20 and x < 60)'
      status: true
      reason_if_failed: ''
      level: undefined
  '["BMI Category","Blood Pressure"]':
    code:
    - suggestion: '.satisfies(''CASE WHEN `Blood Pressure` REGEXP "^[0-9]+/[0-9]+$"
        THEN 1 ELSE 0 END'', ''Blood Pressure Format Check'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN LOWER(`BMI Category`) IN ("normal", "normal
        weight", "overweight", "obese") THEN 1 ELSE 0 END'', ''BMI Category Validity'',
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN LOWER(`BMI Category`)
        IN ("normal", "normal weight", "overweight", "obese") THEN 1 ELSE 0 END'',
        ''BMI Category Validity'', lambda x: x == 1)'' failed on data sample: Value:
        0.9733333333333334 does not meet the constraint requirement!'
      level: error
  '["BMI Category","risk_score"]':
    code:
    - suggestion: .satisfies('`Blood Pressure` IS NOT NULL', 'Blood Pressure Validity')
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: .isComplete('Physical Activity Level').isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        corr: abs(corr) > 0.7)'
      status: true
      reason_if_failed: ''
      level: warning
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Gender', ['Male', 'Female'])
      status: true
      reason_if_failed: ''
      level: error
  '["Physical Activity Level","risk_score"]':
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        x: x > 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: .satisfies('`Sleep Duration` >= 0 AND `Quality of Sleep` >= 0',
        'Non-negative Sleep Values')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''Sleep Duration'', ''Quality of Sleep''], lambda
        x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","risk_score"]':
    code:
    - suggestion: .satisfies('CAST(`Quality of Sleep` AS INT) IS NOT NULL', 'Quality
        of Sleep Int Conversion')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Sleep Duration` IS NOT NULL AND `Physical Activity
        Level` IS NOT NULL AND `Stress Level` IS NOT NULL AND `Daily Steps` IS NOT
        NULL', 'Non-null Numeric Columns')
      status: true
      reason_if_failed: ''
      level: warning
  '["Sleep Duration","risk_score"]':
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Valid Blood
        Pressure Format")
      status: true
      reason_if_failed: ''
      level: error
