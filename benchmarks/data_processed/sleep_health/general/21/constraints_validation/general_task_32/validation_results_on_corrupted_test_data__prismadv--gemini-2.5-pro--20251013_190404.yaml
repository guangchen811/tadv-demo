results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete("Quality of Sleep")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Quality of Sleep` >= 1 AND `Quality of Sleep` <= 10",
        "QoS_within_expected_scale", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: false
      reason_if_failed: 'Constraint ''isContainedIn(''BMI Category'', [''Normal'',
        ''Normal Weight'', ''Overweight'', ''Obese''])'' failed on data sample: Value:
        0.9733333333333334 does not meet the constraint requirement!'
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete("Blood Pressure")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .hasPattern("Blood Pressure", r"^\d+/\d+$")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) > 0
        AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT) > 0", "Positive BP values",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0",
        "Sleep Duration within expected range", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Daily Steps'', lambda x: x <= 25000)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (''Insomnia'',
        ''Sleep Apnea'')", "Expected Sleep Disorder Categories", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Stress Level` >= 3 AND `Stress Level` <= 8 AND `Stress
        Level` = FLOOR(`Stress Level`)'', ''Stress Level is an integer within the
        expected range [3, 8]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete("Age")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isPositive("Age")
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        c: c > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration","Stress Level"]':
    code:
    - suggestion: '.hasCorrelation(''Stress Level'', ''Quality of Sleep'', lambda
        corr: corr < 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Stress Level'', ''Sleep Duration'', lambda corr:
        corr < 0)'
      status: true
      reason_if_failed: ''
      level: warning
