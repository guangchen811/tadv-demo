    code:
    - suggestion: .hasPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
