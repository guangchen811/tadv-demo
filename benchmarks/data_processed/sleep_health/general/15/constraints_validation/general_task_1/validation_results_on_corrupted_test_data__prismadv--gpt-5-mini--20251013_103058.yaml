results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies(''CASE WHEN `Physical Activity Level` >= 0 AND `Physical
        Activity Level` <= 100 THEN 1 ELSE 0 END'', ''PA_in_expected_range'', lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Physical Activity Level'', lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` RLIKE ''^[0-9]+(\\.0+)?$''
        THEN 1 ELSE 0 END", "Numeric-convertible Quality of Sleep", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` IS NOT NULL AND CAST(`Quality
        of Sleep` AS DOUBLE) = FLOOR(CAST(`Quality of Sleep` AS DOUBLE)) THEN 1 ELSE
        0 END", "Quality of Sleep is integer-like (no fractional part)", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(`Quality of Sleep` AS INT) BETWEEN 0
        AND 10 THEN 1 ELSE 0 END", "Quality of Sleep in [0,10]", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Obese'', ''Overweight'',
        ''Normal'', ''Normal Weight'') THEN 1 ELSE 0 END", "Valid BMI Category", lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(`BMI Category`) IN (''Obese'', ''Overweight'',
        ''Normal'', ''Normal Weight'') THEN 1 ELSE 0 END", "Trimmed Valid BMI Category",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.satisfies("CASE WHEN `Blood Pressure` RLIKE ''^[[:space:]]*[0-9]+[[:space:]]*/[[:space:]]*[0-9]+[[:space:]]*$''
        THEN 1 ELSE 0 END", "BP has S/D format", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN (CAST(split_part(`Blood Pressure`, ''/'',
        1) AS INT) - CAST(split_part(`Blood Pressure`, ''/'', 2) AS INT)) > 0 THEN
        1 ELSE 0 END", "Pulse pressure positive", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(split_part(`Blood Pressure`, ''/'',
        1) AS INT) BETWEEN 70 AND 250 AND CAST(split_part(`Blood Pressure`, ''/'',
        2) AS INT) BETWEEN 30 AND 200 THEN 1 ELSE 0 END", "BP in plausible range",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: '.satisfies("`Person ID` IS NOT NULL OR `Person ID` IS NULL", "Person
        ID column exists", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Person ID` RLIKE ''^[0-9]+$'' THEN 1 ELSE
        0 END", "Person ID numeric-int-like", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Sleep Duration` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "Sleep Duration is numeric", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("Sleep Duration")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Sleep Duration` AS DOUBLE) > 0
        THEN 1 ELSE 0 END", "Positive Sleep Duration", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Sleep Duration` AS DOUBLE) >= 0
        AND TRY_CAST(`Sleep Duration` AS DOUBLE) <= 24 THEN 1 ELSE 0 END", "Sleep
        Duration in 0-24 hours", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NULL OR `Daily Steps` >=
        0 THEN 1 ELSE 0 END", "Non-negative Daily Steps", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NULL OR floor(`Daily Steps`)
        = `Daily Steps` THEN 1 ELSE 0 END", "Integer-like Daily Steps", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NOT NULL THEN 1 ELSE 0 END",
        "Daily Steps Completeness", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL THEN 1 WHEN TRIM(`Sleep
        Disorder`) IN (''Insomnia'',''Sleep Apnea'') THEN 1 ELSE 0 END", "Valid Sleep
        Disorder labels", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Heart Rate` AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END", "HeartRateParseable", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` IS NULL THEN 1 WHEN floor(`Heart
        Rate`) = `Heart Rate` THEN 1 ELSE 0 END", "HeartRateIntegral", lambda x: x
        >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` IS NULL THEN 1 WHEN `Heart Rate`
        >= 30 AND `Heart Rate` <= 220 THEN 1 ELSE 0 END", "HeartRateRange", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: '.satisfies(''CASE WHEN `Stress Level` IS NULL OR (`Stress Level`
        >= 0 AND `Stress Level` <= 10) THEN 1 ELSE 0 END'', ''StressLevel_in_0_10'',
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN `Stress Level` IS NULL
        OR (`Stress Level` >= 0 AND `Stress Level` <= 10) THEN 1 ELSE 0 END'', ''StressLevel_in_0_10'',
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9733333333333334 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.hasCompleteness(''Stress Level'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `Stress Level` IS NULL OR FLOOR(`Stress
        Level`) = `Stress Level` THEN 1 ELSE 0 END'', ''StressLevel_integer'', lambda
        x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN `Stress Level` IS NULL
        OR FLOOR(`Stress Level`) = `Stress Level` THEN 1 ELSE 0 END'', ''StressLevel_integer'',
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9733333333333334 does
        not meet the constraint requirement!'
      level: warning
  Age:
    code:
    - suggestion: '.satisfies("CASE WHEN cast(`Age` AS DOUBLE) IS NOT NULL THEN 1
        ELSE 0 END", "Age is numeric / coercible to numeric", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Age` IS NOT NULL THEN 1 ELSE 0 END", "Non-null
        Age fraction", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN cast(`Age` AS DOUBLE) >= 0 AND cast(`Age`
        AS DOUBLE) <= 120 THEN 1 ELSE 0 END", "Age in realistic human range (0-120)",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Age` IS NULL OR floor(cast(`Age` AS DOUBLE))
        = cast(`Age` AS DOUBLE) THEN 1 ELSE 0 END", "Age is integer-valued (or null)",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN cast(`Age` AS DOUBLE) IS NULL THEN 1 ELSE
        0 END", "Fraction of missing or non-numeric Age values (should be small)",
        lambda x: x <= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Age","age_component"]':
    code:
    - suggestion: '.satisfies("`Daily Steps` IS NOT NULL AND `Physical Activity Level`
        IS NOT NULL AND (`Daily Steps` < 0 OR `Physical Activity Level` < 0)", "No
        negative Daily Steps or Physical Activity Level when both present", lambda
        x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Blood Pressure` IS NOT NULL AND (NOT (`Blood Pressure`
        RLIKE ''^[0-9]+/[0-9]+$'') OR CAST(split(`Blood Pressure`, ''/'')[0] AS INT)
        <= CAST(split(`Blood Pressure`, ''/'')[1] AS INT))", "Blood Pressure must
        be ''systolic/diastolic'' parseable as integers with systolic>diastolic",
        lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
