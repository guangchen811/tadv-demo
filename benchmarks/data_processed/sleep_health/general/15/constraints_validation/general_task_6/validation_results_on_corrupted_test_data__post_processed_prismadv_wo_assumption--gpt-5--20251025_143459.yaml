results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies("(`Physical Activity Level` IS NULL) OR (CAST(`Physical
        Activity Level` AS DOUBLE) BETWEEN 0 AND 100)", "PAL within 0-100 when present",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Physical Activity Level` IS NULL) OR (FLOOR(CAST(`Physical
        Activity Level` AS DOUBLE)) = CAST(`Physical Activity Level` AS DOUBLE))",
        "PAL integer-valued when present", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete("Physical Activity Level")
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(`Sleep Duration` > 2.99) AND (`Sleep Duration` <=
        14.01)'', ''sleep_duration_bounds'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Quality of Sleep` BETWEEN 4 AND 9'', ''qos_expected_range'',
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies(''`Quality of Sleep` >= 0 AND `Quality of Sleep` <=
        10'', ''QoS plausible human range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` >= 4 AND `Quality of Sleep` <=
        9'', ''QoS matches historical range'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern("Blood Pressure", "^\\d+/\\d+$", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) >= 70
        AND cast(split(`Blood Pressure`, ''/'')[0] as int) <= 250 AND cast(split(`Blood
        Pressure`, ''/'')[1] as int) >= 40 AND cast(split(`Blood Pressure`, ''/'')[1]
        as int) <= 150", "bp_plausible_range", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) > cast(split(`Blood
        Pressure`, ''/'')[1] as int)", "bp_sys_gt_dia", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isPositive('`Person ID`')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.satisfies(''`Sleep Duration` > 2.99'', ''sleep_duration_lower_bound_for_log'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` <= 14.01'', ''sleep_duration_upper_bound_for_sqrt'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.satisfies("`Daily Steps` >= 0 AND `Daily Steps` <= 50000", "Daily
        Steps in expected range [0, 50000]", lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (''Insomnia'',
        ''Sleep Apnea'')", "sleep_disorder_null_or_known_category", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Sleep Disorder", lambda c: c >= 0.40)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete("Stress Level")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Stress Level` >= 3 AND `Stress Level` <= 8)", "stress_level_range_3_8",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`Stress Level` >= 3 AND `Stress
        Level` <= 8)", "stress_level_range_3_8", lambda x: x == 1)'' failed on data
        sample: Value: 0.9733333333333334 does not meet the constraint requirement!'
      level: warning
  '["Blood Pressure","Quality of Sleep","Sleep Duration","Stress Level"]':
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\s*\\d+\\s*/\\s*\\d+\\s*$'',
        lambda x: x == 1.0, name=''Blood Pressure format d/d'')'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` > 2.99 AND `Sleep Duration` <= 14.01",
        "Sleep Duration domain for log/sqrt", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Stress Level` >= 3 AND `Stress Level` <= 8", "Stress
        Level business range 3-8", lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`Stress Level` >= 3 AND `Stress Level`
        <= 8", "Stress Level business range 3-8", lambda x: x >= 0.98)'' failed on
        data sample: Value: 0.9733333333333334 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9",
        "Quality of Sleep expected range 4-9", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies(''`Daily Steps` >= 0 AND `Daily Steps` <= 50000'', ''Daily
        Steps within expected range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100'', ''Physical Activity Level within expected range'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
