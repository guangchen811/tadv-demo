results:
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .containsPattern('Blood Pressure', '^\\d{2,3}/\\d{2,3}$')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.containsPattern(''Blood
        Pressure'', ''^\\d{2,3}/\\d{2,3}$'')'': ''Check'' object has no attribute
        ''containsPattern'''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Daily Steps` >= 0 AND `Daily Steps` <= 50000', 'Daily
        Steps must be in range [0, 50000]')
      status: true
      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: .isContainedIn('Gender', ['Male', 'Female'])
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100', 'Physical Activity Level must be in range [0, 100]')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Quality of Sleep', ['4', '5', '6', '7', '8', '9'])
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Sleep Duration` > 2.99 AND `Sleep Duration` <= 14.01',
        'Sleep Duration must be in (2.99, 14.01] for log/sqrt transforms')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Stress Level', ['3', '4', '5', '6', '7', '8'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''Stress Level'', [''3'', ''4'',
        ''5'', ''6'', ''7'', ''8''])'' failed on data sample: Value: 0.0 does not
        meet the constraint requirement!'
      level: error
