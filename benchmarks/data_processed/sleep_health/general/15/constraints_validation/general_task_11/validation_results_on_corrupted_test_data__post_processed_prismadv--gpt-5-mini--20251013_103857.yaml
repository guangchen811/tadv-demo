results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` >= 0 AND `Physical
        Activity Level` <= 100 THEN 1 ELSE 0 END", "PAL in 0-100", lambda x: x >=
        0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN abs(`Physical Activity Level` - round(`Physical
        Activity Level`)) < 1e-6 THEN 1 ELSE 0 END", "PAL integral", lambda x: x >=
        0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies(''CASE WHEN CAST(`Quality of Sleep` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END'', ''QoS numeric convertible'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN lower(trim(`BMI Category`)) IN (''normal'',''normal
        weight'',''overweight'',''obese'') THEN 1 ELSE 0 END", "Mapped BMI Fraction",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IS NOT NULL AND trim(`BMI
        Category`) != '''' THEN 1 ELSE 0 END", "BMI Category Not Null/Blank", lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.satisfies(''regexp_like(`Blood Pressure`, "^ *[0-9]{1,3} */ *[0-9]{1,3}
        *$")'', ''Valid BP format (systolic/diastolic integers, no units)'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''cast(split(`Blood Pressure`, "/")[0] as int) BETWEEN
        40 AND 300 AND cast(split(`Blood Pressure`, "/")[1] as int) BETWEEN 30 AND
        200'', ''BP values within plausible clinical ranges'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Sleep Duration` AS double) IS NOT
        NULL THEN 1 ELSE 0 END", "Sleep Duration parseable as double", lambda x: x
        >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Sleep Duration", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` >= 0 AND `Sleep Duration`
        <= 24 THEN 1 ELSE 0 END", "Sleep Duration within realistic hours (0-24)",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NOT NULL AND TRY_CAST(`Daily
        Steps` AS DOUBLE) IS NOT NULL AND TRY_CAST(`Daily Steps` AS DOUBLE) >= 0 AND
        TRY_CAST(`Daily Steps` AS DOUBLE) = CAST(TRY_CAST(`Daily Steps` AS DOUBLE)
        AS BIGINT) THEN 1 ELSE 0 END", "Daily Steps non-negative finite integer",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` BETWEEN 30 AND 220 AND `Heart
        Rate` = CAST(`Heart Rate` AS INT) THEN 1 ELSE 0 END", "HeartRate_valid_range_and_integer",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Stress Level` = ROUND(`Stress Level`) THEN
        1 ELSE 0 END'', ''Stress Level integer-valued'', lambda x: x == 1).satisfies(''CASE
        WHEN `Stress Level` BETWEEN 0 AND 10 THEN 1 ELSE 0 END'', ''Stress Level in
        allowed set 0-10'', lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN `Stress Level` = ROUND(`Stress
        Level`) THEN 1 ELSE 0 END'', ''Stress Level integer-valued'', lambda x: x
        == 1).satisfies(''CASE WHEN `Stress Level` BETWEEN 0 AND 10 THEN 1 ELSE 0
        END'', ''Stress Level in allowed set 0-10'', lambda x: x == 1)'' failed on
        data sample: Value: 0.9733333333333334 does not meet the constraint requirement!'
      level: warning
  Age:
    code:
    - suggestion: '.satisfies("CASE WHEN `Age` >= 0 AND `Age` <= 120 THEN 1 ELSE 0
        END", "Age in plausible human range", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN floor(`Age`) = `Age` THEN 1 ELSE 0 END",
        "Age integer-valued", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: '.isContainedIn(''Gender'', [''Male'',''Female''], lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
