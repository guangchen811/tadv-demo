results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('`Physical Activity Level`')
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10",
        "''Quality of Sleep'' is within the expected range [0, 10]", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: .isComplete("BMI Category")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("LOWER(`BMI Category`) IN (''normal'', ''normal weight'',
        ''overweight'', ''obese'')", "BMI Category contains valid values", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern("Blood Pressure", r"^[0-9]+/[0-9]+$", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isNonNegative("`Sleep Duration`")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("`Sleep Duration` <= 24", "plausible_sleep_duration")
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative(''`Daily Steps`'', assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("`Stress Level` >= 3 AND `Stress Level` <= 10", "StressLevel_in_range_3_to_10",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`Stress Level` >= 3 AND `Stress Level`
        <= 10", "StressLevel_in_range_3_to_10", lambda x: x == 1)'' failed on data
        sample: Value: 0.9733333333333334 does not meet the constraint requirement!'
      level: warning
  '["Age","Gender","Person ID"]':
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        x: x >= 0.4)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["BMI Category","Blood Pressure","Daily Steps","Physical Activity Level","Quality
    of Sleep","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.hasCorrelation("Physical Activity Level", "Daily Steps", lambda
        x: x >= 0.7)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('Sleep Duration').isComplete('Quality of Sleep').isComplete('Blood
        Pressure').isComplete('Stress Level').isComplete('Physical Activity Level').isComplete('Daily
        Steps').isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
  '["Blood Pressure","Diastolic","Systolic"]':
    code:
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) > CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT)", "Systolic > Diastolic", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        x: x > 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Diastolic","Systolic"]':
    code:
    - suggestion: '.satisfies("`Blood Pressure` IS NULL OR `Blood Pressure` LIKE ''%/%''",
        "Blood Pressure must be null or in ''systolic/diastolic'' format", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: .isComplete("Gender")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("Gender", ["Male", "Female"])
      status: true
      reason_if_failed: ''
      level: warning
