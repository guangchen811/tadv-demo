results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete("Physical Activity Level")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Physical Activity Level` >= 0", "PA non-negative",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100", "PA in 0-100 range (>=95%)", lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Quality of Sleep'', lambda m: m >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Quality of Sleep'', lambda M: M <= 10)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.isContainedIn(''BMI Category'', [''Obese'',''Overweight'',''Normal'',''Normal
        Weight''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', ''^[0-9]{2,3}/[0-9]{2,3}$'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(regexp_extract(`Blood Pressure`, ''^([0-9]{2,3})/([0-9]{2,3})$'',
        1) AS INT) BETWEEN 70 AND 250 AND CAST(regexp_extract(`Blood Pressure`, ''^([0-9]{2,3})/([0-9]{2,3})$'',
        2) AS INT) BETWEEN 40 AND 150", "BP plausible ranges", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'',
        ''Sleep Duration in [0,24]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''FLOOR(CAST(`Daily Steps` AS DOUBLE)) = CAST(`Daily
        Steps` AS DOUBLE)'', ''Daily Steps integer semantics'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Daily Steps'', lambda x: x <= 100000)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxQuantile(''Daily Steps'', 0.99, lambda q: q <= 50000)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL THEN 1 WHEN typeof(`Sleep
        Disorder`) = ''string'' THEN 1 ELSE 0 END", "Sleep Disorder non-null values
        must be string", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL THEN 1 WHEN lower(`Sleep
        Disorder`) LIKE ''%sleep apnea%'' OR lower(`Sleep Disorder`) LIKE ''%insomnia%''
        THEN 1 ELSE 0 END", "Valid Sleep Disorder categories", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL THEN 1 WHEN (lower(`Sleep
        Disorder`) LIKE ''%sleep apnea%'') AND (lower(`Sleep Disorder`) LIKE ''%insomnia%'')
        THEN 0 ELSE 1 END", "No multiple sleep disorders in one cell", lambda x: x
        == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.35)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.satisfies(''CAST(`Heart Rate` AS double) IS NOT NULL'', ''Heart
        Rate numeric parseable'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Heart Rate` BETWEEN 30 AND 220'', ''HR plausible
        range'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Heart Rate` = floor(`Heart Rate`)'', ''HR integer
        values'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Stress Level` >= 0 AND `Stress Level` <= 10'', ''Stress
        Level in 0-10'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`Stress Level` >= 0 AND `Stress
        Level` <= 10'', ''Stress Level in 0-10'', lambda x: x == 1.0)'' failed on
        data sample: Value: 0.9733333333333334 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''`Stress Level` = floor(`Stress Level`)'', ''Integer
        Stress Level'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`Stress Level` = floor(`Stress Level`)'',
        ''Integer Stress Level'', lambda x: x == 1.0)'' failed on data sample: Value:
        0.9733333333333334 does not meet the constraint requirement!'
      level: warning
  Age:
    code:
    - suggestion: '.satisfies(''CAST(Age AS DOUBLE) >= 0 AND CAST(Age AS DOUBLE) <=
        120'', ''Age within [0,120]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(Age AS DOUBLE) = FLOOR(CAST(Age AS DOUBLE))'',
        ''Age whole years'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Age","BMI Category","Blood Pressure","Daily Steps","Heart Rate","Person ID","Physical
    Activity Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.satisfies("`Daily Steps` >= 0 AND `Physical Activity Level` >=
        0", "Non-negative steps and activity", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Daily Steps` < 10000) OR (`Physical Activity Level`
        >= 60)", "Consistency for vigorous activity", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Stress Level` BETWEEN 0 AND 10 AND `Quality of Sleep`
        BETWEEN 0 AND 10", "Stress and sleep quality bounded 0-10", lambda x: x ==
        1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`Stress Level` BETWEEN 0 AND 10 AND
        `Quality of Sleep` BETWEEN 0 AND 10", "Stress and sleep quality bounded 0-10",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9733333333333334 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Age` IS NOT NULL AND `Sleep Duration` IS NOT NULL
        AND `Quality of Sleep` IS NOT NULL AND `Physical Activity Level` IS NOT NULL
        AND `Stress Level` IS NOT NULL AND `Heart Rate` IS NOT NULL AND `Daily Steps`
        IS NOT NULL AND `BMI Category` IS NOT NULL AND `Blood Pressure` IS NOT NULL",
        "all_required_inputs_present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.satisfies(''(CAST(`Stress Level` AS DOUBLE) >= 0 AND CAST(`Stress
        Level` AS DOUBLE) <= 10) AND (CAST(`Quality of Sleep` AS DOUBLE) >= 0 AND
        CAST(`Quality of Sleep` AS DOUBLE) <= 10) AND (CAST(`Stress Level` AS DOUBLE)
        * (10 - CAST(`Quality of Sleep` AS DOUBLE)) >= 0) AND (CAST(`Stress Level`
        AS DOUBLE) * (10 - CAST(`Quality of Sleep` AS DOUBLE)) <= 100)'', ''sq_scale_valid'',
        lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''(CAST(`Stress Level` AS DOUBLE)
        >= 0 AND CAST(`Stress Level` AS DOUBLE) <= 10) AND (CAST(`Quality of Sleep`
        AS DOUBLE) >= 0 AND CAST(`Quality of Sleep` AS DOUBLE) <= 10) AND (CAST(`Stress
        Level` AS DOUBLE) * (10 - CAST(`Quality of Sleep` AS DOUBLE)) >= 0) AND (CAST(`Stress
        Level` AS DOUBLE) * (10 - CAST(`Quality of Sleep` AS DOUBLE)) <= 100)'', ''sq_scale_valid'',
        lambda v: v == 1.0)'' failed on data sample: Value: 0.9733333333333334 does
        not meet the constraint requirement!'
      level: warning
