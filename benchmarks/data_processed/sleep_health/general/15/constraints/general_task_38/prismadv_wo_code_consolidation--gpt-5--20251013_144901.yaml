constraints:
  Physical Activity Level:
    code:
    - suggestion: '.hasCompleteness(''Physical Activity Level'', lambda v: v >= 0.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: ff814184-2c37-47c8-8584-01dab53dcb18
      source_assumptions:
      - f76342df-70cf-4c93-b090-93c500a5267b
    - suggestion: '.satisfies("CASE WHEN CAST(`Physical Activity Level` AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END", "PAL numeric parseable", lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: d8446b0d-ee5b-41b8-be71-ddfb4aef9fae
      source_assumptions:
      - 3d301fd4-f304-405a-b2d2-d0cb07b624e6
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda x: x
        > 0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 17146892-bcb4-4a84-aea3-40c9d391d844
      source_assumptions:
      - 655292d1-9136-425f-8099-953ad65b64da
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NOT NULL THEN CASE WHEN
        CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END ELSE
        1 END", "PAL present when steps present", lambda x: x >= 0.90)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: a19f20c4-8f92-4a85-8922-bb5c81c4eea8
      source_assumptions:
      - b0d24203-ad42-45d6-8441-5e64eb5f894b
    assumptions:
    - text: 'The ''Physical Activity Level'' column must exist in the input CSV; the
        code accesses it unconditionally and will error if it is missing. This can
        be validated as: Great Expectations: expect_column_to_exist(''Physical Activity
        Level''); Deequ: hasColumn(''Physical Activity Level'').'
      sources:
      - start_line: 55
        end_line: 55
        file: ''
      uid: f76342df-70cf-4c93-b090-93c500a5267b
    - text: 'The ''Physical Activity Level'' values should be numeric-parseable for
        the vast majority of rows (e.g., at least 95%), since the code coerces to
        numeric and then performs numeric operations without imputing missing values.
        We could represent this with Deequ: .satisfies("CASE WHEN CAST(`Physical Activity
        Level` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "PAL numeric parseable",
        lambda x: x >= 0.95) or Great Expectations: expect_column_values_to_be_of_type(''Physical
        Activity Level'', ''float'') in conjunction with expect_column_values_to_not_be_null
        for at least 95% of rows.'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 55
        end_line: 63
        file: ''
      uid: 3d301fd4-f304-405a-b2d2-d0cb07b624e6
    - text: 'The ''Physical Activity Level'' column should not be constant and should
        have non-zero variance across rows (at least two distinct non-null numeric
        values), otherwise the correlation/regression step collapses and downstream
        ''activity_blend'' and risk scoring can become NaN. Deequ representation:
        .hasStandardDeviation("Physical Activity Level", lambda x: x > 0) or .hasApproxCountDistinct("Physical
        Activity Level", lambda x: x > 1).'
      sources:
      - start_line: 56
        end_line: 63
        file: ''
      - start_line: 92
        end_line: 94
        file: ''
      - start_line: 109
        end_line: 119
        file: ''
      uid: 655292d1-9136-425f-8099-953ad65b64da
    - text: "In rows where 'Daily Steps' is present, 'Physical Activity Level' should\
        \ also be present and numeric for a high fraction of those rows (e.g., at\
        \ least 90%) to enable the steps\u2013PAL calibration. Deequ example: .satisfies(\"\
        CASE WHEN `Daily Steps` IS NOT NULL THEN CASE WHEN CAST(`Physical Activity\
        \ Level` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END\", \"PAL present\
        \ when steps present\", lambda x: x >= 0.90)."
      sources:
      - start_line: 53
        end_line: 63
        file: ''
      uid: b0d24203-ad42-45d6-8441-5e64eb5f894b
