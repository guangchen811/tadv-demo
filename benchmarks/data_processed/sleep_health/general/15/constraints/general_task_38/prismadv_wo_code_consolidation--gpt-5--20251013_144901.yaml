  ? '["Age","BMI Category","Blood Pressure","Daily Steps","Heart Rate","Person ID","Physical
    Activity Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code: []
    assumptions:
    - text: 'Blood Pressure must be parsable as two numeric parts ''SBP/DBP'' for
        every record so that SBP and DBP are non-null after extraction. This enables
        downstream PP and MAP computations. Example constraints: hasPattern(''Blood
        Pressure'', ''^(\d{2,3})/(\d{2,3})$'') and, after parsing, satisfies(''SBP
        IS NOT NULL AND DBP IS NOT NULL'').'
      sources:
      - start_line: 27
        end_line: 30
        file: ''
      uid: 9b46921a-f42d-4366-b34e-05056d774510
    - text: 'Physiological consistency across SBP, DBP, PP, and MAP: SBP must be greater
        than DBP; PP equals SBP - DBP and is non-negative; MAP equals DBP + PP/3 (within
        a small tolerance). Example constraints: satisfies(''SBP > DBP'') and satisfies(''PP
        = SBP - DBP AND PP >= 0'') and satisfies(''abs(MAP - (DBP + (SBP - DBP)/3.0))
        <= 0.5'').'
      sources:
      - start_line: 27
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 71
        file: ''
      uid: 5bea91bd-6238-43f1-9630-91a1d39aabc8
    - text: 'Sleep Duration and Quality of Sleep should both vary (non-zero standard
        deviation) and be non-negatively correlated so that the regression-based restfulness_residual
        is meaningful and stable. Example constraints: isComplete([''Sleep Duration'',''Quality
        of Sleep'']), hasStdDevBetween(''Sleep Duration'', lower=1e-6, upper=None),
        hasStdDevBetween(''Quality of Sleep'', lower=1e-6, upper=None), hasCorrelation(''Sleep
        Duration'',''Quality of Sleep'', lowerBound=0.0, upperBound=1.0).'
      sources:
      - start_line: 41
        end_line: 51
        file: ''
      - start_line: 85
        end_line: 89
        file: ''
      uid: 932df3fe-5716-4292-bc84-60dfdd6a2122
    - text: 'Daily Steps and Physical Activity Level should both have non-zero variance
        and be positively correlated to support the calibration and activity_blend
        computation. Example constraints: hasStdDevBetween(''Daily Steps'', lower=1e-6,
        upper=None), hasStdDevBetween(''Physical Activity Level'', lower=1e-6, upper=None),
        hasCorrelation(''Daily Steps'',''Physical Activity Level'', lowerBound=0.2,
        upperBound=1.0), and for the derived blend distribution: quantile(''activity_blend'',
        0.10) < quantile(''activity_blend'', 0.90).'
      sources:
      - start_line: 54
        end_line: 63
        file: ''
      - start_line: 92
        end_line: 94
        file: ''
      uid: a2b0364b-5e48-44d2-80fb-900088ce04a8
    - text: 'Among records with Sleep Disorder == ''Sleep Apnea'', the share whose
        BMI Category is in {''Overweight'',''Obese''} should be at least 0.60 (the
        baseline implicit in apnea_multiplier). Example constraint: where(''Sleep
        Disorder'' = ''Sleep Apnea'').hasCompliance(''apnea_overweight_share'', ''`BMI
        Category` IN ("Overweight","Obese")'', r => r >= 0.60).'
      sources:
      - start_line: 97
        end_line: 105
        file: ''
      uid: 3ebba1e9-6045-4e77-a1d9-a8327815532a
    - text: 'apnea_component must be zero for all records where Sleep Disorder !=
        ''Sleep Apnea'', and strictly positive when Sleep Disorder == ''Sleep Apnea''
        (with magnitude higher if BMI Category is Overweight/Obese). Example constraints
        on the derived column after computation: satisfies(''(\`Sleep Disorder\` <>
        "Sleep Apnea") => apnea_component = 0'') and satisfies(''(\`Sleep Disorder\`
        = "Sleep Apnea" AND \`BMI Category\` IN ("Overweight","Obese")) => apnea_component
        >= 0.10'') and satisfies(''(\`Sleep Disorder\` = "Sleep Apnea" AND \`BMI Category\`
        NOT IN ("Overweight","Obese")) => apnea_component >= 0.05'').'
      sources:
      - start_line: 97
        end_line: 106
        file: ''
      uid: de96cc8f-cb5d-4bf4-b8b7-1f823351fc90
  '["BMI Category","Sleep Disorder"]':
    code: []
    assumptions:
    - text: 'Among records with Sleep Disorder = ''Sleep Apnea'', at least 60% should
        have BMI Category in {''Overweight'', ''Obese''}. This matches the baseline
        coupling used to scale apnea risk. Example Deequ: .isCompliance("`BMI Category`
        IN (''Overweight'',''Obese'')", where="`Sleep Disorder` = ''Sleep Apnea''",
        assertion: _ >= 0.60)'
      sources:
      - start_line: 97
        end_line: 105
        file: ''
      uid: bf0c0ed1-5ebd-43f3-8d0e-570ed68db798
    - text: 'If Sleep Disorder is NULL or not equal to ''Sleep Apnea'', apnea_component
        must be 0 (because the component is multiplied by the apnea mask). Example
        Deequ: .isCompliance("`apnea_component` = 0", where="`Sleep Disorder` IS NULL
        OR `Sleep Disorder` <> ''Sleep Apnea''", assertion: _ == 1.0)'
      sources:
      - start_line: 97
        end_line: 97
        file: ''
      - start_line: 105
        end_line: 106
        file: ''
      uid: 2d938426-7acc-4040-bd09-46968a4ecc1c
    - text: 'For rows with Sleep Disorder = ''Sleep Apnea'': (a) if BMI Category IN
        (''Overweight'',''Obese''), apnea_component must be >= 0.10; (b) if BMI Category
        NOT IN (''Overweight'',''Obese''), apnea_component must be >= 0.05. These
        lower bounds follow directly from the formula before applying any dataset-level
        multiplier. Example Deequ: .isCompliance("`apnea_component` >= 0.10", where="`Sleep
        Disorder` = ''Sleep Apnea'' AND `BMI Category` IN (''Overweight'',''Obese'')",
        assertion: _ == 1.0) and .isCompliance("`apnea_component` >= 0.05", where="`Sleep
        Disorder` = ''Sleep Apnea'' AND `BMI Category` NOT IN (''Overweight'',''Obese'')",
        assertion: _ == 1.0)'
      sources:
      - start_line: 97
        end_line: 106
        file: ''
      uid: 6b56c228-8074-48f3-9693-f1af3faae669
    - text: 'For rows labeled ''Sleep Apnea'', BMI Category should be present and
        use the recognized labels {''Overweight'',''Obese'',''Normal'',''Normal Weight''}
        so that overweight_obese is computed correctly. Example Deequ: .hasCompleteness("BMI
        Category", where="`Sleep Disorder` = ''Sleep Apnea''", assertion: _ == 1.0)
        and .isContainedIn("BMI Category", Array("Overweight","Obese","Normal","Normal
        Weight"), where="`Sleep Disorder` = ''Sleep Apnea''")'
      sources:
      - start_line: 73
        end_line: 79
        file: ''
      - start_line: 97
        end_line: 98
        file: ''
      uid: 1c5a8eda-5b66-4819-bbdd-7255c724d98e
    - text: 'bmi_risk must be consistent with BMI Category mapping across all rows:
        {''Normal''->0.0, ''Normal Weight''->0.0, ''Overweight''->0.6, ''Obese''->1.0},
        and 0.3 for any other/unrecognized value. Example Deequ: .isCompliance("CASE
        `BMI Category` WHEN ''Normal'' THEN 0.0 WHEN ''Normal Weight'' THEN 0.0 WHEN
        ''Overweight'' THEN 0.6 WHEN ''Obese'' THEN 1.0 ELSE 0.3 END = `bmi_risk`",
        assertion: _ == 1.0)'
      sources:
      - start_line: 73
        end_line: 79
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: f70f4cb6-5862-4dfb-b9da-03f737b01993
  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'Both ''Daily Steps'' and ''Physical Activity Level'' must be present
        for every record, castable to numeric, and finite (no NaN) because they are
        jointly used to compute a correlation, a linear projection (pal_from_steps),
        and quantiles for ''activity_blend''. This can be enforced with Deequ-style
        constraints such as: satisfies(''`Daily Steps` IS NOT NULL AND `Physical Activity
        Level` IS NOT NULL'', ''steps_pal_complete'', _ == 1.0) and satisfies(''NOT
        isnan(cast(`Daily Steps` as double)) AND NOT isnan(cast(`Physical Activity
        Level` as double))'', ''steps_pal_not_nan'', _ == 1.0).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 54
        end_line: 63
        file: ''
      - start_line: 92
        end_line: 94
        file: ''
      - start_line: 109
        end_line: 118
        file: ''
      uid: 7022d7bf-c295-4b72-81a8-ab9c528831a7
    - text: '''Daily Steps'' and ''Physical Activity Level'' must each have non-zero
        variance (not be constant across the dataset) so that the Pearson correlation
        and the regression-based ''pal_from_steps'' are well-defined (not NaN) and
        downstream quantiles of ''activity_blend'' are meaningful. This can be checked
        with: hasStandardDeviation(''Daily Steps'', _ > 0) and hasStandardDeviation(''Physical
        Activity Level'', _ > 0) (or hasNumberOfDistinctValues >= 2 for each).'
      sources:
      - start_line: 54
        end_line: 63
        file: ''
      - start_line: 92
        end_line: 94
        file: ''
      uid: 3fa58a90-4ec9-49df-a87a-470d24a7d44d
    - text: 'The relationship between ''Daily Steps'' and ''Physical Activity Level''
        should be positively correlated (e.g., Pearson correlation >= 0.1) so that
        greater steps imply greater activity and the blended activity measure has
        the intended directionality. This can be expressed as: hasCorrelation(''Daily
        Steps'', ''Physical Activity Level'', _ >= 0.1).'
      sources:
      - start_line: 54
        end_line: 63
        file: ''
      - start_line: 92
        end_line: 94
        file: ''
      - start_line: 109
        end_line: 118
        file: ''
      uid: b5578455-bc8a-42f4-9661-fd9e219d6740
    - text: '''Daily Steps'' and ''Physical Activity Level'' should be non-negative
        for all records (physically meaningful domain), since they jointly feed a
        linear model and scaling to derive ''activity_blend'' and ''activity_protect''.
        A Deequ compliance constraint could be: satisfies(''`Daily Steps` >= 0 AND
        `Physical Activity Level` >= 0'', ''steps_pal_nonneg'', _ == 1.0).'
      sources:
      - start_line: 54
        end_line: 63
        file: ''
      - start_line: 92
        end_line: 94
        file: ''
      uid: 917f22d7-396f-4ec2-8176-7904dbd7be31
  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'The ''Sleep Duration'' and ''Quality of Sleep'' columns must be jointly
        complete and numeric for all rows (no nulls or non-numeric values in either
        column). This can be enforced with a joint non-null predicate at 1.0 completeness,
        e.g., a Deequ satisfies constraint: .satisfies(''`Sleep Duration` IS NOT NULL
        AND `Quality of Sleep` IS NOT NULL'', ''sleep_qual_complete'', r => r == 1.0).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 36
        end_line: 43
        file: ''
      uid: 1138e907-34d6-4f68-9e40-d05fc6de974c
    - text: 'Both ''Sleep Duration'' and ''Quality of Sleep'' must have non-zero variance
        (stddev > 0) across the dataset so that the correlation, regression, and residual-based
        features are well-defined and finite. This can be checked with Deequ: .hasStandardDeviation(''Sleep
        Duration'', _ > 0) and .hasStandardDeviation(''Quality of Sleep'', _ > 0).'
      sources:
      - start_line: 41
        end_line: 47
        file: ''
      uid: f677d73a-0811-41ad-8322-179b0b69aa25
    - text: 'The linear relationship used assumes a non-negative association between
        ''Sleep Duration'' and ''Quality of Sleep''; the Pearson correlation between
        these two columns should be finite and >= 0. This can be represented as a
        Deequ correlation constraint: .hasCorrelation(''Sleep Duration'', ''Quality
        of Sleep'', _ >= 0).'
      sources:
      - start_line: 41
        end_line: 51
        file: ''
      - start_line: 85
        end_line: 89
        file: ''
      uid: e465835c-2628-48fb-9214-20505367e4ee
