      reason_if_invalid: ''
      level: warning
      uid: f65cc0c6-e26f-41f5-a904-925ee58c47ce
      source_assumptions:
      - a74077a5-a539-43e3-b2ca-c7edf20849b4
    - suggestion: '.satisfies(''CAST(`Quality of Sleep` AS DOUBLE) = CAST(CAST(`Quality
        of Sleep` AS BIGINT) AS DOUBLE)'', ''QoS integer-like'', lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: add2283b-0e0e-4daf-8838-d2a204e657d0
      source_assumptions:
      - a74077a5-a539-43e3-b2ca-c7edf20849b4
    assumptions:
    - text: 'The ''Quality of Sleep'' column must exist in the input CSV (it is accessed
        directly without a prior existence check). We could represent this as a Great
        Expectations rule: expect_column_to_exist(''Quality of Sleep'').'
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      uid: 711d6f78-1657-45b9-ba8a-56875f996dd0
    - text: 'All ''Quality of Sleep'' values must be numeric-parsable and finite (no
        non-numeric text, NaN, or +/-Inf) for all rows. Any NaN/Inf will make the
        correlation/regression produce NaNs that propagate into restfulness_residual,
        sleep_risk, and risk_score. We could represent this with Deequ rules: .isComplete(''Quality
        of Sleep'') and .satisfies("isfinite(`Quality of Sleep`)", "QoS finite", lambda
        x: x == 1.0) and .satisfies("CAST(`Quality of Sleep` AS DOUBLE) IS NOT NULL",
        "QoS numeric", lambda x: x == 1.0). Equivalent Great Expectations: expect_column_values_to_not_be_null(''Quality
        of Sleep'') and expect_column_values_to_be_in_type_list(''Quality of Sleep'',
        [''int'', ''float'']).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 42
        end_line: 51
        file: ''
      - start_line: 87
        end_line: 89
        file: ''
      - start_line: 109
        end_line: 119
        file: ''
      uid: f1cb6ae9-2b72-4fc0-97e6-5f65674e824a
    - text: 'The ''Quality of Sleep'' values should not be constant across the dataset
        (positive variance is required). A constant vector leads to corr_sleep_qual
        being set to NaN, which propagates NaNs into restfulness_residual, sleep_risk,
        and risk_score. We could represent this as Deequ: .hasStandardDeviation(''Quality
        of Sleep'', lambda s: s > 0) or Great Expectations: expect_column_stdev_to_be_between(''Quality
        of Sleep'', min_value=1e-9).'
      sources:
      - start_line: 44
        end_line: 45
        file: ''
      - start_line: 47
        end_line: 51
        file: ''
      - start_line: 87
        end_line: 89
        file: ''
      - start_line: 109
        end_line: 119
        file: ''
      uid: 0ae06774-8350-4ed8-8a81-31beaa139cd7
    - text: 'The ''Quality of Sleep'' column is expected to be a bounded rating scale;
        constrain values to a reasonable range such as 0 to 10 (inclusive), preferably
        as whole numbers. This prevents outliers or free-form text from destabilizing
        the regression and downstream risk features. We could represent this as Great
        Expectations: expect_column_values_to_be_between(''Quality of Sleep'', min_value=0,
        max_value=10) and expect_column_values_to_match_regex(''Quality of Sleep'',
        r''^-?\d+$'') (if integers are required). In Deequ: .isNonNegative(''Quality
        of Sleep'') and .satisfies(''`Quality of Sleep` <= 10'', ''QoS upper bound'',
        lambda x: x == 1.0).'
      sources:
      - start_line: 42
        end_line: 51
        file: ''
      - start_line: 87
        end_line: 89
        file: ''
      uid: a74077a5-a539-43e3-b2ca-c7edf20849b4
