      uid: 20f81f2a-e500-4146-a0bd-689c954654dd
    - text: 'Sleep Duration values are in hours and should lie within a human-possible
        range [0, 24]. This aligns with computing sleep debt relative to 8 hours and
        prevents unit mix-ups (e.g., minutes like 480). Deequ examples: .satisfies("CASE
        WHEN `Sleep Duration` >= 0 AND `Sleep Duration` <= 24 THEN 1 ELSE 0 END",
        "Sleep Duration in [0,24] hours", lambda x: x == 1).'
      sources:
      - start_line: 36
        end_line: 40
        file: ''
      uid: 0e15a30c-949c-4588-b2f3-48314619cc71
    - text: 'Most Sleep Duration values should be within [3, 10] hours to match the
        modeling assumption behind the sleep debt clipping (max deficit 5 hours, max
        surplus 2 hours). This avoids saturating derived features for the majority
        of records. A suitable rule: .satisfies("CASE WHEN `Sleep Duration` >= 3 AND
        `Sleep Duration` <= 10 THEN 1 ELSE 0 END", "Typical sleep range", lambda x:
        x >= 0.9).'
      sources:
      - start_line: 36
        end_line: 39
        file: ''
      uid: d33bed9d-4881-4b50-bbaf-64512fa48bb3
    - text: 'The ''Sleep Duration'' column should not be constant; there must be variability
        (at least two distinct non-null values) so that std > 0 and the sleep-quality
        regression is defined (avoiding the constant-vector guard). Deequ example:
        .hasNumberOfDistinctValues("Sleep Duration", lambda x: x >= 2).'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      uid: 4380f106-85fa-406e-9246-523d5269eaf5
    - text: 'Sleep Duration values should be non-negative (no negative hours). A simple
        rule: .satisfies("CASE WHEN `Sleep Duration` >= 0 THEN 1 ELSE 0 END", "Non-negative
        sleep hours", lambda x: x == 1).'
      sources:
