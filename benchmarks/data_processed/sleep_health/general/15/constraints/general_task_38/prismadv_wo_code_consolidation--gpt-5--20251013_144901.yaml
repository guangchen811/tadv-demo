      source_assumptions:
      - 7f48bd1f-7f71-4bb0-ae34-e2d0171751b7
    assumptions:
    - text: 'BMI Category should be a categorical string taking one of exactly these
        values in most rows: ''Normal'', ''Normal Weight'', ''Overweight'', ''Obese''.
        Values outside this set (including nulls) are treated as a default risk of
        0.3, so they should be rare (e.g., at least 95% of values are in the allowed
        set). This can be enforced with a rule like: isContainedIn(''BMI Category'',
        [''Normal'',''Normal Weight'',''Overweight'',''Obese'']) with coverage >=
        0.95.'
      sources:
      - start_line: 73
        end_line: 79
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: 016dc5ee-8b58-4196-933d-3c7ac7b52fd6
    - text: 'BMI Category values must match the allowed labels exactly (case-sensitive,
        no leading/trailing whitespace). Variants like ''overweight'', '' Obese '',
        or ''NORMAL'' will not match and will fall back to the default risk or be
        excluded from overweight/obese logic. This can be validated with a rule such
        as: satisfies("`BMI Category` = trim(`BMI Category`) AND `BMI Category` RLIKE
        ''^(Normal|Normal Weight|Overweight|Obese)$''", ''Exact, trimmed labels'',
        lambda x: x >= 0.95).'
      sources:
      - start_line: 73
        end_line: 79
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: 736fa596-3d27-4cf6-affb-60c5ce935b12
    - text: BMI Category should be mostly non-null (e.g., completeness >= 0.95). While
        the code will assign a default risk (0.3) to null/unknown values and treat
        them as not overweight/obese in apnea coupling, a large fraction of null/unknowns
        would bias risk scoring. This can be enforced with expect_column_values_to_not_be_null('BMI
        Category') with mostly >= 0.95.
      sources:
      - start_line: 79
        end_line: 79
        file: ''
      - start_line: 98
        end_line: 101
        file: ''
      uid: 18c14615-59dd-491b-a225-287c985c63a1
    - text: 'The distinct value set of BMI Category should not exceed the four mapped
        categories in production (i.e., <= 4 distinct values), consistent with the
        hard-coded mapping. This can be enforced with hasNumberOfDistinctValues(''BMI
        Category'', lambda v: v <= 4).'
      sources:
      - start_line: 73
        end_line: 78
        file: ''
      uid: 7f48bd1f-7f71-4bb0-ae34-e2d0171751b7
