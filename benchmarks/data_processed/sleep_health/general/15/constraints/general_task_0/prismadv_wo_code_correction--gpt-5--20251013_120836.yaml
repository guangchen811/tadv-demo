        PAL are positively associated (e.g., correlation >= 0.3); (c) very high PAL
        (>= 90) should generally coincide with high Daily Steps (e.g., >= dataset
        median or 75th percentile). Example Deequ-style constraints: compliance(''pal_range'',
        ''Physical_Activity_Level BETWEEN 0 AND 100''); hasCorrelation(''Daily Steps'',''Physical
        Activity Level'', v => v >= 0.3); compliance(''very_active_implies_high_steps'',
        ''Physical_Activity_Level < 90 OR Daily_Steps >= quantile_Daily_Steps_0_50'').'
      sources:
