  '["Person ID","Quality of Sleep"]':
    code: []
    assumptions:
    - text: "Quality of Sleep and Stress Level are intended to be comparable 10\u2011\
        point scales after normalization: quality_score = `Quality of Sleep`/10 and\
        \ stress_norm = (`Stress Level`\u22121)/9, both in [0,1]. Data should respect\
        \ these bounds so the gap = quality_score \u2212 (1 \u2212 stress_norm) is\
        \ meaningful and bounded. Example Deequ constraint: .satisfies(\"`Quality\
        \ of Sleep` BETWEEN 0 AND 10 AND `Stress Level` BETWEEN 1 AND 10\", \"QoS_and_Stress_scale\"\
        , assertedFraction=1.0)"
      sources:
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: 49495a2f-2b0d-4ad6-9e25-d47899f61fc9
    - text: "Quality of Sleep should be inversely related to Stress Level (higher\
        \ stress tends to lower sleep quality). This expectation underpins both the\
        \ expected_quality = 1 \u2212 stress_norm computation and the HIGH_STRESS_LOW_QUALITY\
        \ alert. Example Deequ constraint: .hasCorrelation(\"Quality of Sleep\", \"\
        Stress Level\", _ <= -0.2)"
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 73
        end_line: 74
        file: ''
      uid: cece4e38-b9dd-4cc3-af1d-97ee36510775
    - text: 'Quality of Sleep should not fall much below the value expected from Stress
        Level: in at least 90% of rows, (`Quality of Sleep`/10.0) >= 1.0 - ((`Stress
        Level` - 1.0)/9.0) - 0.2. This keeps the negative gap (and the resulting penalty)
        within reasonable bounds for most of the data. Example Deequ constraint: .satisfies("(`Quality
        of Sleep`/10.0) >= 1.0 - ((`Stress Level` - 1.0)/9.0) - 0.2", "QoS_not_far_below_expected",
        assertedFraction=0.9)'
      sources:
      - start_line: 55
        end_line: 56
        file: ''
      uid: 4aa3c001-6895-47d1-a813-4b4709404a19
    - text: 'Blood Pressure must be a parsable "systolic/diastolic" pair of integers
        with systolic >= diastolic (to yield a valid MAP and hypertension check).
        Example Deequ constraints: .hasPattern("Blood Pressure", "^\\d{2,3}/\\d{2,3}$")
        and .satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) >= cast(split(`Blood
        Pressure`, ''/'')[1] as int)", "BP_sys_ge_dia", assertedFraction=1.0)'
      sources:
      - start_line: 46
        end_line: 51
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: edac4d63-da1a-4fb9-9ec0-1b6f9131adbf
    - text: 'Daily Steps and Physical Activity Level should be positively associated
        since both contribute to the activity score. Example Deequ constraint: .hasCorrelation("Daily
        Steps", "Physical Activity Level", _ >= 0.3)'
      sources:
      - start_line: 40
        end_line: 44
        file: ''
      uid: b51501b0-9119-42ab-9bb4-98a915d11c49
    - text: 'For every Person ID used to produce outputs, Quality of Sleep must be
        present (non-null), ensuring a valid per-person quality_score and downstream
        index. Example Deequ constraint: .satisfies("`Person ID` IS NOT NULL AND `Quality
        of Sleep` IS NOT NULL", "PersonID_QoS_complete", assertedFraction=1.0)'
      sources:
      - start_line: 90
        end_line: 96
        file: ''
      - start_line: 37
        end_line: 37
        file: ''
      uid: 54c5add9-7305-4dd9-a1fa-b32dd0d22ada
  '["Person ID","Sleep Disorder"]':
    code: []
    assumptions:
    - text: 'Sleep Disorder is a person-level attribute and must be consistent for
        each Person ID. Among all rows sharing the same Person ID, the set of non-null
        Sleep Disorder values must have cardinality <= 1 (i.e., no conflicting disorder
        labels per person). This can be enforced by a grouped distinct-count check,
        for example: groupBy(''Person ID'').agg(countDistinct(coalesce(`Sleep Disorder`,
        NULL) FILTER (IS NOT NULL)) <= 1) or an equivalent Deequ compliance over a
        pre-aggregated table.'
      sources:
      - start_line: 66
        end_line: 66
        file: ''
      - start_line: 90
        end_line: 92
        file: ''
      uid: 8afd381f-128c-471e-80c8-b234f8b87682
    - text: 'For rows where Sleep Disorder is populated with a recognized value (''Insomnia''
        or ''Sleep Apnea''), the combination (''Person ID'', ''Sleep Disorder'') must
        be unique within a batch (i.e., at most one record per person per disorder
        label). This can be represented as a Deequ constraint: .isUnique([''Person
        ID'',''Sleep Disorder''], where="`Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea'')").'
      sources:
      - start_line: 66
        end_line: 66
        file: ''
      - start_line: 90
        end_line: 92
        file: ''
      uid: cd128c76-a7e1-4d42-9382-857f4408c0e3
    - text: 'Whenever Sleep Disorder is populated (i.e., in {''Insomnia'',''Sleep
        Apnea''}), Person ID must be non-null (primary key present on disorder-labeled
        rows). This can be captured with a compliance constraint such as: .addConstraint(Compliance(''person_id_present_when_disorder_present'',
        "(`Sleep Disorder` NOT IN (''Insomnia'',''Sleep Apnea'')) OR (`Person ID`
        IS NOT NULL)")), though current profiling indicates Person ID completeness
        is already 1.0.'
      sources:
      - start_line: 66
        end_line: 66
        file: ''
      - start_line: 90
        end_line: 92
        file: ''
      uid: 908fe578-ed45-421a-a8a7-3a6c8ece0e54
  '["Person ID","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'All required inputs used together to compute SleepHealthIndex must be
        jointly present and parseable on every row: Person ID must be non-null; Sleep
        Duration, Quality of Sleep, Daily Steps, Physical Activity Level, and Stress
        Level must be numeric/castable to float; Blood Pressure must match the pattern
        systolic/diastolic where both parts are integers. This ensures the per-row
        computations (scoring, normalization, penalties) and alert logic can execute
        without NA/type errors.'
      sources:
      - start_line: 36
        end_line: 44
        file: ''
      - start_line: 46
        end_line: 51
        file: ''
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 91
        end_line: 95
        file: ''
      uid: 99596440-a81a-4fef-8b08-d3171b2c0b95
    - text: Daily Steps and Physical Activity Level must be jointly available and
        numeric for each record because activity_score is computed from both (base_activity
        = 0.5 * normalize(Daily Steps) + 0.5 * normalize(Physical Activity Level),
        adjusted for very high Physical Activity Level).
      sources:
      - start_line: 38
        end_line: 44
        file: ''
      uid: b7e63e8b-f958-4faf-9b81-8012a0185fe8
    - text: If Stress Level is high and Quality of Sleep is low (specifically, stress_norm
        >= 0.70 and quality_score < 0.60), then the output must include the reason
        HIGH_STRESS_LOW_QUALITY and set Alert to Yes for that record.
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      - start_line: 81
        end_line: 88
        file: ''
      - start_line: 91
        end_line: 95
        file: ''
      uid: 006f4b82-b9e6-4983-bac1-4d65205a0cad
    - text: If Sleep Duration is below 6.0 hours or above 9.0 hours, the output must
        include the reason INSUFFICIENT_SLEEP and set Alert to Yes for that record.
      sources:
      - start_line: 64
        end_line: 64
        file: ''
      - start_line: 77
        end_line: 78
        file: ''
      - start_line: 81
        end_line: 88
        file: ''
      - start_line: 91
        end_line: 95
        file: ''
      uid: bff07699-90d8-487d-bd65-9176e8c8dba6
    - text: If Blood Pressure indicates hypertension (systolic >= 140 or diastolic
        >= 90 or mean arterial pressure >= 120), then the output must include the
        reason HYPERTENSION_PATTERN, set Alert to Yes, and set Priority to High.
      sources:
      - start_line: 46
        end_line: 51
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      - start_line: 81
        end_line: 87
        file: ''
      - start_line: 91
        end_line: 95
        file: ''
      uid: bef265a0-a8f6-44a3-861a-9f656481b888
    - text: If SleepHealthIndex < 0.60, then the output must include the reason LOW_INDEX,
        set Alert to Yes, and set Priority to High.
      sources:
      - start_line: 58
        end_line: 59
        file: ''
      - start_line: 71
        end_line: 72
        file: ''
      - start_line: 81
        end_line: 87
        file: ''
      - start_line: 91
        end_line: 95
        file: ''
      uid: 0d5f9380-977f-4c34-ba6b-92d3c1fec97c
    - text: Person ID and Sleep Duration should co-occur (both non-null) on every
        row used in the output. Additionally, within a single batch, the dataset should
        avoid multiple rows with the same Person ID that would produce conflicting
        sleep-related metrics; equivalently, for each Person ID there should be at
        most one Sleep Duration value in the file (functional dependency Person ID
        -> Sleep Duration).
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 64
        end_line: 64
        file: ''
      - start_line: 91
        end_line: 92
        file: ''
      uid: 397d0e9b-8067-4acd-851c-97a08468a1cc
  '["Person ID","Stress Level"]':
    code: []
    assumptions:
    - text: "Stress Level and Quality of Sleep are on matched 1\u201310 scales, making\
        \ their normalized forms directly comparable in downstream logic. Specifically,\
        \ stress_norm = normalize(Stress Level, 1, 10) and quality_score = (Quality\
        \ of Sleep)/10 are used together in thresholds and in expected_quality = 1\
        \ - stress_norm. Actionable constraints: enforce both columns simultaneously\
        \ within expected ranges and comparable orientation, e.g., Deequ compliance:\
        \ .where(\"(cast(`Stress Level` as double) between 1 and 10) AND (cast(`Quality\
        \ of Sleep` as double) between 1 and 10)\")."
      sources:
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 52
        end_line: 55
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 28c2db0a-ad9f-431b-b3fb-26f7100d8292
    - text: 'Rows that satisfy high stress and low sleep quality must be labeled with
        the reason HIGH_STRESS_LOW_QUALITY and trigger an alert. Precisely: if normalize(Stress
        Level, 1, 10) >= 0.70 AND (Quality of Sleep)/10 < 0.60, then ''HIGH_STRESS_LOW_QUALITY''
        must be present in Reasons and Alert must be ''Yes''; conversely, if Reasons
        contains ''HIGH_STRESS_LOW_QUALITY'', that predicate must hold. Actionable
        constraints (two-way implication): .compliance("((cast(`Stress Level` as double)
        >= 7 AND cast(`Quality of Sleep` as double) < 6) => array_contains(split(`Reasons`,
        '';''), ''HIGH_STRESS_LOW_QUALITY''))") and .compliance("(array_contains(split(`Reasons`,
        '';''), ''HIGH_STRESS_LOW_QUALITY'') => (cast(`Stress Level` as double) >=
        7 AND cast(`Quality of Sleep` as double) < 6))"); and consistency with Alert:
        .compliance("(array_contains(split(`Reasons`, '';''), ''HIGH_STRESS_LOW_QUALITY'')
        => `Alert` = ''Yes'')").'
      sources:
      - start_line: 70
        end_line: 74
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
      uid: 2b08cd56-4c55-493f-a82d-c0dc82e1904b
    - text: "Stress Level should inversely influence the final SleepHealthIndex: higher\
        \ stress reduces the index (through 1 - stress_norm and the stress\u2013quality\
        \ penalty). Across the dataset, this implies a non-positive association between\
        \ Stress Level and SleepHealthIndex. Actionable constraint example: check\
        \ non-positive correlation or monotonic tendency, e.g., .approxCorrelation(\"\
        Stress Level\", \"SleepHealthIndex\") <= 0."
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 58
        end_line: 59
        file: ''
      - start_line: 92
        end_line: 92
        file: ''
      uid: efaa7773-6599-4c32-bb86-483d93242515
    - text: 'Output rows are keyed by Person ID and must be one-to-one with the computed
        outputs. Person ID should be unique in the output and functionally determine
        SleepHealthIndex, Alert, Priority, and Reasons. Actionable constraints: .isUnique(["Person
        ID"]) and .hasFunctionalDependency("Person ID", ["SleepHealthIndex", "Alert",
        "Priority", "Reasons"]).'
      sources:
      - start_line: 91
        end_line: 95
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: b98b9ae8-8a1f-408a-a5bf-0316fbc191e3
    - text: 'Alert and Priority must be consistent with Reasons. Specifically: Alert
        = ''Yes'' iff Reasons is non-empty; Priority = ''High'' iff Reasons contains
        ''HYPERTENSION_PATTERN'' or ''LOW_INDEX''; Priority = ''Medium'' iff Reasons
        is non-empty and does not contain those high-priority reasons; Priority =
        ''None'' iff Reasons is empty. Actionable constraints: .compliance("((size(split(`Reasons`,
        '';'')) > 0) <=> (`Alert` = ''Yes''))"), .compliance("((array_contains(split(`Reasons`,
        '';''), ''HYPERTENSION_PATTERN'') OR array_contains(split(`Reasons`, '';''),
        ''LOW_INDEX'')) <=> (`Priority` = ''High''))"), and .compliance("((size(split(`Reasons`,
        '';'')) > 0 AND NOT array_contains(split(`Reasons`, '';''), ''HYPERTENSION_PATTERN'')
        AND NOT array_contains(split(`Reasons`, '';''), ''LOW_INDEX'')) <=> (`Priority`
        = ''Medium''))"), plus .compliance("((size(split(`Reasons`, '';'')) = 0) <=>
        (`Priority` = ''None''))").'
      sources:
      - start_line: 81
        end_line: 88
        file: ''
      - start_line: 91
        end_line: 95
        file: ''
      uid: 6c1b887a-4218-4cb9-9186-904cbd8692c1
  '["Quality of Sleep","Stress Level"]':
    code: []
    assumptions:
    - text: "Both 'Quality of Sleep' and 'Stress Level' are measured on the same 1\u2013\
        10 numeric scale and are intended to be directly comparable after normalization\
        \ (quality_score = 'Quality of Sleep'/10.0, stress_norm = normalize('Stress\
        \ Level', 1.0, 10.0)). Therefore, every row should satisfy 1 <= 'Quality of\
        \ Sleep' <= 10 AND 1 <= 'Stress Level' <= 10. Deequ example: .satisfies('(\"\
        Quality of Sleep\" >= 1 AND \"Quality of Sleep\" <= 10) AND (\"Stress Level\"\
        \ >= 1 AND \"Stress Level\" <= 10)', assertion = _.ratio == 1.0)"
      sources:
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 52
        end_line: 52
        file: ''
      uid: f817c3f7-8189-47d9-bf3f-5bc0ff3313af
    - text: 'Inverse relationship consistency: ''Quality of Sleep'' should not be
        materially below what is implied by ''Stress Level''. Specifically, for most
        rows: (''Quality of Sleep''/10.0) >= 1 - ((''Stress Level'' - 1.0)/9.0) -
        0.1 (10% tolerance). At least 90% of records should satisfy this. Deequ example:
        .satisfies(''cast("Quality of Sleep" as double)/10.0 >= 1.0 - ((cast("Stress
        Level" as double) - 1.0)/9.0) - 0.1'', assertion = _.ratio >= 0.9)'
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: 2b77818b-5d42-4ea6-825c-cc0dc78eb7e9
    - text: 'High-stress implies low sleep quality for alerts: among rows with ''Stress
        Level'' >= 8 (i.e., normalize >= 0.70), at least 70% should have ''Quality
        of Sleep'' < 6 (quality_score < 0.60). Deequ example (conditional constraint):
        .satisfies(''"Quality of Sleep" < 6'', where=''"Stress Level" >= 8'', assertion
        = _.ratio >= 0.7)'
      sources:
      - start_line: 70
        end_line: 74
