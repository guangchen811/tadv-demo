        end_line: 51
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      uid: 73010e73-ec78-4dd1-ba90-dbb7571e8030
    - text: "High Quality of Sleep should align with the model\u2019s optimal sleep\
        \ duration range. If Quality of Sleep >= 8 (out of 10), then Sleep Duration\
        \ should be within 7.0\u20139.0 hours (the optimal band used by triangular_score).\
        \ Example Deequ-style constraint: compliance('high_quality_requires_optimal_duration',\
        \ '(Quality_of_Sleep >= 8) => (Sleep_Duration BETWEEN 7.0 AND 9.0)')."
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 37
        end_line: 37
        file: ''
      uid: 26669cd8-bcaf-4586-a695-70f1cf8c8f5e
    - text: "The two activity inputs should be mutually consistent after normalization:\
        \ the absolute difference |normalize(Daily Steps, p5, p95) \u2212 normalize(Physical\
        \ Activity Level, 0, 100)| should be small for most rows (e.g., <= 0.5 for\
        \ >= 95% of rows), guarding against cases reporting very high PAL with very\
        \ low steps or vice versa. Example Deequ-style constraint: compliance('activity_consistency',\
        \ 'abs((Daily_Steps - p5)/(p95 - p5) - (Physical_Activity_Level/100.0)) <=\
        \ 0.5') with p5/p95 from ApproxQuantile analyzers."
      sources:
      - start_line: 38
        end_line: 44
        file: ''
      uid: 21e0e7d7-10fa-4295-a848-c899f9e275af
    - text: "All inputs used to compute SleepHealthIndex must be present and parseable\
        \ per row: Sleep Duration (hours), Quality of Sleep (0\u201310), Daily Steps\
        \ (non-negative integer), Physical Activity Level (0\u2013100), Stress Level\
        \ (1\u201310), and Blood Pressure ('systolic/diastolic'). Enforce multi-column\
        \ completeness and parseability before computing the index. Example Deequ-style\
