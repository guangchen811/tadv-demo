    - text: '''Sleep Duration'' is measured in hours. The thresholds (<6 or >9) and
        the triangular scoring window [3, 12] imply hour units. To catch unit errors
        (e.g., minutes), enforce a human-duration bound such as 0 <= value <= 24 hours.
        Example Deequ rule: .satisfies(''CASE WHEN `Sleep Duration` IS NULL THEN 1
        WHEN `Sleep Duration` >= 0 AND `Sleep Duration` <= 24 THEN 1 ELSE 0 END'',
        ''Sleep Duration in hours range'', lambda x: x == 1).'
      sources:
      - start_line: 36
        end_line: 36
        file: ''
      - start_line: 77
        end_line: 78
        file: ''
      uid: 1fb007ef-997c-4be2-8c90-351bf5d7c304
    - text: 'Values should predominantly lie within [3, 12] hours, matching the triangular
        scoring window used. Suggested rule: at least 95% of non-null ''Sleep Duration''
        values are between 3 and 12. Example Deequ rule: .satisfies(''CASE WHEN `Sleep
        Duration` IS NULL THEN 1 WHEN `Sleep Duration` >= 3 AND `Sleep Duration` <=
        12 THEN 1 ELSE 0 END'', ''Sleep Duration mostly 3-12h'', lambda x: x >= 0.95).'
      sources:
      - start_line: 9
        end_line: 17
        file: ''
      - start_line: 36
        end_line: 36
        file: ''
      uid: 5c0834db-96f0-4fd9-bec8-a773c82093ec
    - text: Missing values in 'Sleep Duration' are allowed. The pipeline treats nulls
        as contributing a zero score in triangular_score and nulls do not trigger
        the 'INSUFFICIENT_SLEEP' alert (comparisons with NaN are False). Therefore,
