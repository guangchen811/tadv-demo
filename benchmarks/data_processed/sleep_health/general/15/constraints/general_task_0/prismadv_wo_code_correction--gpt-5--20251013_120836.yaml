      uid: 95209300-0b88-4f5f-92b5-9d80231ea64e
    - text: 'Joint completeness: ''Person ID'' and ''Physical Activity Level'' must
        both be non-null in the same rows. The code normalizes ''Physical Activity
        Level'' and then pairs the computed metrics with ''Person ID'' without handling
        missing values; any nulls would lead to NaNs or misaligned output. Deequ example:
        .compliance(''Person ID IS NOT NULL AND `Physical Activity Level` IS NOT NULL'',
        1.0)'
      sources:
