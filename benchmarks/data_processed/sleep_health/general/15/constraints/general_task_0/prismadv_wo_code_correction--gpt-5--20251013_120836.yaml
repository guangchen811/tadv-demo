      - start_line: 52
        end_line: 56
        file: ''
      - start_line: 73
        end_line: 74
        file: ''
      uid: 66b27f05-c19f-46be-8125-81c4ae416014
    - text: "If the dataset encodes stress as discrete ratings, values should typically\
        \ be integers on the 1\u201310 scale (no fractional steps). While the code\
        \ will accept floats, most survey-based stress ratings are integers; enforcing\
        \ integer steps can catch bad encodings. We could represent this assumption\
        \ as a deequ constraint like this:\n.satisfies(\"CASE WHEN `Stress Level`\
        \ BETWEEN 1 AND 10 AND floor(`Stress Level`) = `Stress Level` THEN 1 ELSE\
        \ 0 END\", \"Stress Level integer 1\u201310\", lambda x: x >= 0.95)"
