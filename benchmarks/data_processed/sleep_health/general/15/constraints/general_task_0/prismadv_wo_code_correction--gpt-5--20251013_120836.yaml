    - text: 'All values in ''Daily Steps'' must be numeric and castable to float.
        The code passes the column to numpy.percentile and arithmetic operations,
        which require numeric inputs. We could represent this as: Deequ: .hasDataType(''Daily
        Steps'', ConstrainableDataTypes.Integral) OR ConstrainableDataTypes.Fractional,
        or Great Expectations: expect_column_values_to_be_in_type_list with allowed
        types like [''int64'', ''int32'', ''float64'', ''float32'', ''double''].'
