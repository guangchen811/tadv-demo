    - text: 'All non-null values in ''Sleep Duration'' must be numeric (castable to
        float). The code converts the column to floats and performs numeric comparisons;
        non-numeric strings (e.g., ''7h'') would raise errors. Examples: Deequ hasDataType(''Sleep
