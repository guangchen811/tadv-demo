  ? '["Blood Pressure","Daily Steps","Physical Activity Level","Quality of Sleep","Sleep
    Disorder","Sleep Duration","Stress Level"]'
  : code: []
    assumptions:
    - text: 'Row-level completeness across key inputs: Each record must have non-null,
        parseable values for the combined set of columns [''Sleep Duration'', ''Quality
        of Sleep'', ''Daily Steps'', ''Physical Activity Level'', ''Stress Level'',
        ''Blood Pressure''], because the script casts/normalizes them and combines
        them into a single index. Example constraint (Deequ-style): compliance that
        (Sleep Duration IS NOT NULL) AND (Quality of Sleep IS NOT NULL) AND (Daily
        Steps IS NOT NULL) AND (Physical Activity Level IS NOT NULL) AND (Stress Level
        IS NOT NULL) AND (Blood Pressure RLIKE ''^[0-9]{2,3}/[0-9]{2,3}$'') holds
        for 1.0 of rows.'
      sources:
      - start_line: 36
        end_line: 44
        file: ''
      - start_line: 46
        end_line: 53
        file: ''
      - start_line: 58
        end_line: 59
        file: ''
      uid: 9e4dc11f-8e4b-46fb-844d-e3badb207958
    - text: "Inverse Stress\u2013Quality coherence: Normalized Quality of Sleep should\
        \ be at least 1 minus normalized Stress Level for most rows (otherwise a penalty\
        \ is applied). Formally: (Quality of Sleep)/10 >= 1 - (Stress Level - 1)/9\
        \ - tol, for a small tolerance (e.g., tol = 0.1) and for a high fraction (e.g.,\
        \ >= 0.9). This encodes the expected_quality = 1 - normalize(Stress Level,\
        \ 1, 10) relationship used by the script."
      sources:
      - start_line: 52
        end_line: 56
        file: ''
      uid: e0b579ac-c57d-4ae9-a20a-7706daf6ecff
    - text: "Very-active consistency between Physical Activity Level and Daily Steps:\
        \ If 'Physical Activity Level' >= 90 (treated as very active), then 'Daily\
        \ Steps' should be in the top range of the dataset (e.g., >= the 95th percentile\
        \ used for normalization). Example constraint: compliance that CASE WHEN `Physical\
        \ Activity Level` >= 90 THEN `Daily Steps` >= steps_95 ELSE TRUE END holds\
        \ for >= 0.95 of rows, where steps_95 is the dataset\u2019s 95th percentile\
        \ of 'Daily Steps'."
      sources:
      - start_line: 38
        end_line: 44
        file: ''
      uid: 4ca46bf8-83d6-40e9-9a56-5cf6251ccd14
    - text: "Activity signal alignment: The two activity proxies\u2014normalized 'Daily\
        \ Steps' (using dataset 5th/95th percentiles) and normalized 'Physical Activity\
        \ Level' (0\u2013100 scale)\u2014should not diverge greatly since their average\
        \ is used as base activity. Example constraint: for >= 0.95 of rows, | normalize(Daily\
        \ Steps, steps_5, steps_95) - normalize(Physical Activity Level, 0, 100) |\
        \ <= 0.3."
      sources:
      - start_line: 38
        end_line: 44
        file: ''
      uid: c3babbcd-276b-4e88-b49a-2dd370fda6eb
    - text: 'Blood Pressure parsing and intra-measure consistency (systolic/diastolic/MAP):
        ''Blood Pressure'' must be parseable as ''systolic/diastolic'' integers; diastolic
        <= systolic; and mean arterial pressure (MAP = diastolic + (systolic - diastolic)/3)
        must satisfy diastolic <= MAP <= systolic. The hypertension rule is based
        on the combined thresholds systolic >= 140 OR diastolic >= 90 OR MAP >= 120,
        implying values are expected in mmHg ranges. Constraints: regex ''^[0-9]{2,3}/[0-9]{2,3}$'',
        compliance systolic >= diastolic, and compliance diastolic <= MAP AND MAP
        <= systolic.'
      sources:
      - start_line: 46
        end_line: 51
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      uid: 02954e1c-2c9c-48f0-8629-f106668a6489
  '["Blood Pressure","Daily Steps","Physical Activity Level","Quality of Sleep","Sleep Duration","Stress Level"]':
    code: []
    assumptions:
    - text: "Stress Level and Quality of Sleep are comparable 10\u2011point scales\
        \ and are expected to be inversely related, enabling expected_quality = 1.0\
