      reason_if_invalid: ''
      level: warning
      uid: 51e017ab-5368-43bb-8c0f-ef348b37b786
      source_assumptions:
      - ffe18983-52e6-4e8e-892f-294206269b0d
    assumptions:
    - text: 'The ''Blood Pressure'' column must be present for every row (no nulls
        or empty strings). Any missing or empty value would cause the split and integer
        casting to fail. We could represent this as a deequ constraint like: .hasCompleteness("Blood
        Pressure", lambda c: c == 1.0) and .satisfies("LENGTH(TRIM(`Blood Pressure`))
        > 0", "BP not blank", lambda x: x == 1.0).'
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      uid: 4e0488cb-f24f-4c2c-8082-3bc61fec1296
    - text: 'The ''Blood Pressure'' values must strictly match the pattern of two
        integer tokens separated by exactly one slash, with no spaces, units, or decimals
        (e.g., "120/80"). A suitable regex is ^[0-9]+/[0-9]+$. This ensures .str.split(''/'',
        expand=True) yields exactly two parts and .astype(int) succeeds. Deequ example:
        .hasPattern("Blood Pressure", r"^[0-9]+/[0-9]+$", lambda p: p == 1.0).'
      sources:
      - start_line: 46
        end_line: 49
        file: ''
      uid: 81d2703a-df7b-4cd2-8495-d8e6c5547549
    - text: 'Both systolic and diastolic values must be valid non-negative integers
        (no signs, no thousands separators, no decimal points). This is required because
        the code casts both parts to int and compares them numerically. Deequ example:
        .satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) >= 0 AND CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT) >= 0", "BP nonnegative", lambda x: x == 1.0).'
      sources:
      - start_line: 48
        end_line: 49
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      uid: 6e2d5fba-21eb-43a5-a812-74fd61c0bcb3
    - text: 'Physiological ordering should hold: systolic >= diastolic for all rows.
        While the code would still run, this ordering is implicitly expected for a
        meaningful mean arterial pressure and alert logic. Deequ example: .satisfies("CAST(split(`Blood
        Pressure`, ''/'')[0] AS INT) >= CAST(split(`Blood Pressure`, ''/'')[1] AS
        INT)", "Systolic >= Diastolic", lambda x: x == 1.0).'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      uid: 1b565da4-b369-4af6-8bbd-53aa9ad5f767
    - text: 'To keep the BP scoring informative (not saturated by clipping), most
        values should yield a reasonable mean arterial pressure (MAP). A soft expectation
        is that at least 95% of rows have MAP in [60, 140], computed as diastolic
        + (systolic - diastolic) / 3.0. Deequ example: .satisfies("(CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT) + (CAST(split(`Blood Pressure`, ''/'')[0] AS
        INT) - CAST(split(`Blood Pressure`, ''/'')[1] AS INT)) / 3.0) BETWEEN 60 AND
        140", "MAP range (soft)", lambda x: x >= 0.95).'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 58
        end_line: 59
        file: ''
      uid: ffe18983-52e6-4e8e-892f-294206269b0d
