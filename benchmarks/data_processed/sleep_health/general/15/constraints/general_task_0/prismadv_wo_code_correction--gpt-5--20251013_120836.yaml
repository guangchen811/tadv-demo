    - text: 'Domain sanity: ''Daily Steps'' should be non-negative and within a realistic
        human range. Suggested rules: (a) hard bounds 0 <= Daily Steps <= 100000;
        (b) soft bound that at least 95% of values lie within [0, 40000]. We could
        represent this as: Deequ: .hasMin(''Daily Steps'', lambda m: m >= 0) and .hasMax(''Daily
        Steps'', lambda m: m <= 100000) and .satisfies(''CASE WHEN `Daily Steps` BETWEEN
        0 AND 40000 THEN 1 ELSE 0 END'', ''Realistic step range'', lambda p: p >=
        0.95); Great Expectations: expect_column_min_to_be_between(min_value=0), expect_column_max_to_be_between(max_value=100000),
