    - text: "Blood Pressure must be a slash-delimited pair of integers 'systolic/diastolic'\
        \ that can be parsed, with systolic > diastolic, and values in plausible clinical\
        \ ranges (e.g., systolic 90\u2013250, diastolic 50\u2013150). This is required\
        \ to compute MAP and the HYPERTENSION_PATTERN rule (systolic >= 140 OR diastolic\
        \ >= 90 OR MAP >= 120). Example Deequ-style constraints: compliance('bp_format',\
        \ 'Blood_Pressure RLIKE \"^\\\\d{2,3}/\\\\d{2,3}$\"'); compliance('bp_relation',\
        \ 'cast(split(Blood_Pressure, \"/\")[0] as int) > cast(split(Blood_Pressure,\
        \ \"/\")[1] as int)'); compliance('bp_ranges', 'cast(split(Blood_Pressure,\
        \ \"/\")[0] as int) BETWEEN 90 AND 250 AND cast(split(Blood_Pressure, \"/\"\
        )[1] as int) BETWEEN 50 AND 150')."
      sources:
