    - text: 'The ''Daily Steps'' column should have at least two distinct values (i.e.,
        not be constant), so that the 5th and 95th percentiles provide meaningful
        spread for normalization. While the code safeguards a zero range, a constant
        column collapses the signal. We could represent this as: Deequ: .hasNumberOfDistinctValues(''Daily
        Steps'', lambda v: v >= 2) or Great Expectations: expect_column_unique_value_count_to_be_between(min_value=2).'
