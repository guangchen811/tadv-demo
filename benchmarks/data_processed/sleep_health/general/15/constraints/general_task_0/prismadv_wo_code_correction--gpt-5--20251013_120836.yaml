        end_line: 40
        file: ''
      uid: b54eb617-12ea-40ab-9e4b-51a99edf73a9
    - text: 'All ''Daily Steps'' values must be finite (no +Inf/-Inf). Infinite values
        would break percentile computation or normalization. We could represent this
        as: Deequ: .satisfies(''isfinite(`Daily Steps`)'', ''Finite Daily Steps'',
