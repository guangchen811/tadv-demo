        file: ''
      uid: 224dd146-f901-4266-a483-285d4fc48a37
    - text: 'Higher numbers in ''Stress Level'' should indicate higher stress (i.e.,
        the scale orientation is increasing-with-stress). The code treats higher normalized
        stress values as worse (1.0 - stress_norm) and flags high stress when stress_norm
        >= 0.70. If the input used an inverted scale, the results would be misleading.
        While this is semantic, you could enforce it indirectly by documenting the
        scale and checking that values predominantly fall in the expected direction.
        Example documentation rule: "Stress Level is an integer scale where 1 indicates
        lowest stress and 10 indicates highest stress."'
