        satisfies(''cast(split(Blood Pressure, "/")[0] as int) > cast(split(Blood
        Pressure, "/")[1] as int)'', fraction >= 0.99); satisfies(''(cast(split(Blood
        Pressure, "/")[1] as double) + (cast(split(Blood Pressure, "/")[0] as double)
        - cast(split(Blood Pressure, "/")[1] as double))/3) BETWEEN cast(split(Blood
        Pressure, "/")[1] as double) AND cast(split(Blood Pressure, "/")[0] as double)'',
        fraction >= 0.99).'
