  '["Person ID","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'Functional dependency: For any given ''Person ID'', the ''Physical Activity
        Level'' value should be consistent across all records (i.e., a person cannot
        appear with multiple activity levels). This ensures the per-person SleepHealthIndex
        computed using ''Physical Activity Level'' is not duplicated or contradictory
        in the output. Deequ example: .hasFunctionalDependency(''Physical Activity
        Level'', [''Person ID''], maxViolations=0.0)'
      sources:
