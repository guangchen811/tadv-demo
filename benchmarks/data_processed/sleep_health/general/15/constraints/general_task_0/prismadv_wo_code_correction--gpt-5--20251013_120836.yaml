        (e.g., Pearson <= -0.3), and both columns to be within their modeled domains
        (Stress Level in [1,10], Quality of Sleep in [0,10]). Example constraints:
        .hasCorrelation(''Stress Level'', ''Quality of Sleep'', lowerBound=-1.0, upperBound=-0.3);
        .hasMin(''Stress Level'', _ >= 1.0) and .hasMax(''Stress Level'', _ <= 10.0);
        .hasMin(''Quality of Sleep'', _ >= 0.0) and .hasMax(''Quality of Sleep'',
