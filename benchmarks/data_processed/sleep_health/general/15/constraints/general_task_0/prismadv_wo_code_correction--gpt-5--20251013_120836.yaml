        end_line: 44
        file: ''
      - start_line: 90
        end_line: 96
        file: ''
      uid: 90cd5128-0145-435f-8be0-2d76133b0d29
    - text: 'Pair uniqueness: The combination of ''Person ID'' and ''Physical Activity
        Level'' should be unique across rows, ensuring a one-to-one mapping between
        a person and their activity level in the dataset and the generated output.
        Deequ example: .isUnique([''Person ID'', ''Physical Activity Level''])'
      sources:
