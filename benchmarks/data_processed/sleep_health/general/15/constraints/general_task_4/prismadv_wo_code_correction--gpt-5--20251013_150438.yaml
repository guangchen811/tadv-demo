      uid: 0e630630-9df3-49b7-a461-559efe6dfebe
    - text: 'The alerts extract must be a strict subset of the main output where ''RiskAlert''
        is true: all rows in alerts.csv are exactly the rows from df_out with RiskAlert
        = true, preserving the same (''Person ID'',''SleepHealthIndex'',''RiskReasons'').
        This enforces cross-file and cross-column consistency.'
