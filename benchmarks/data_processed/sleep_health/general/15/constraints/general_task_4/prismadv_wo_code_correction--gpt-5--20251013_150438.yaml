    - text: 'Both BP_SYS and BP_DIA must be present (non-null) for every record, since
        they are used in numeric computations and comparisons together. Example Deequ:
        .satisfies("BP_SYS IS NOT NULL AND BP_DIA IS NOT NULL", "bp_parts_non_null").'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      - start_line: 38
        end_line: 40
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: a238c498-c2a9-4248-a24f-2230bdc6590e
    - text: 'Systolic must not be lower than diastolic for any row: BP_SYS >= BP_DIA.
        Example Deequ: .satisfies("BP_SYS >= BP_DIA", "bp_sys_ge_dia").'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: d49c2282-89e1-478c-bc19-e73343f71dcf
    - text: 'RiskAlert must equal the logical OR of the three risk conditions, including
        the high blood pressure rule that depends on both BP_SYS and BP_DIA: RiskAlert
        = ((BP_SYS >= 140 OR BP_DIA >= 90) OR (cast(`Sleep Duration` as double) <
        5.5 OR `Quality of Sleep` <= 5) OR (`SleepHealthIndex` < 60)). Example Deequ:
        .satisfies("( (BP_SYS >= 140 OR BP_DIA >= 90) OR (cast(`Sleep Duration` as
        double) < 5.5 OR `Quality of Sleep` <= 5) OR (`SleepHealthIndex` < 60) ) =
        RiskAlert", "riskalert_consistency").'
      sources:
      - start_line: 85
        end_line: 87
        file: ''
      - start_line: 100
        end_line: 100
        file: ''
      uid: 3fe08494-5540-4667-aa1c-43c02d1f490a
    - text: 'The ''bp'' token in RiskReasons must be present if and only if the high
        blood pressure condition holds (BP_SYS >= 140 OR BP_DIA >= 90). This can be
        enforced with two constraints: (1) If high BP then ''bp'' present: .satisfies("(BP_SYS
        >= 140 OR BP_DIA >= 90) ==> instr(`RiskReasons`, ''bp'') > 0", "riskreason_bp_when_highbp")
        and (2) If ''bp'' present then high BP: .satisfies("(instr(`RiskReasons`,
        ''bp'') > 0) ==> (BP_SYS >= 140 OR BP_DIA >= 90)", "riskreason_bp_only_when_highbp").'
      sources:
      - start_line: 85
        end_line: 85
        file: ''
      - start_line: 89
        end_line: 97
        file: ''
      uid: 1b4adab7-c471-46de-882e-50cfb48d6cce
    - text: 'The tuple (Person ID, SleepHealthIndex, RiskAlert) is used together for
        array-based writing; therefore Person ID must be a non-negative integer and
        unique, and both SleepHealthIndex and RiskAlert must be non-null for those
        rows. Example Deequ: .isUnique(["Person ID"]) and .satisfies("`Person ID`
        >= 0 AND `Person ID` = cast(`Person ID` as int) AND `SleepHealthIndex` IS
        NOT NULL AND `RiskAlert` IS NOT NULL", "pid_indexable_and_outputs_non_null").'
      sources:
      - start_line: 103
        end_line: 110
        file: ''
      - start_line: 108
        end_line: 110
        file: ''
      uid: 71021758-0d33-42b9-afd6-c0df3089dbed
  '["BP_DIA","BP_SYS","Blood Pressure"]':
    code: []
    assumptions:
    - text: 'The ''Blood Pressure'' column must be a string of the form ''<int>/<int>''
        (optionally with surrounding whitespace around numbers), and the derived numeric
        columns ''BP_SYS'' and ''BP_DIA'' must exactly equal the two parsed parts.
        This can be enforced with constraints such as: hasPattern(''Blood Pressure'',
        ''^\s*\d{2,3}\s*/\s*\d{2,3}\s*$'') and a compliance check: BP_SYS = CAST(SPLIT(`Blood
        Pressure`, ''/'')[0] AS INT) AND BP_DIA = CAST(SPLIT(`Blood Pressure`, ''/'')[1]
        AS INT).'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: 9b25b210-c3e2-43be-95e6-61fb79a8ecc1
    - text: 'BP_SYS and BP_DIA must both be present together for each row (no nulls
        when ''Blood Pressure'' is present), must be within plausible physiological
        ranges, and must satisfy BP_SYS > BP_DIA. Example compliance: (BP_SYS IS NOT
        NULL AND BP_DIA IS NOT NULL) AND (BP_SYS BETWEEN 70 AND 250) AND (BP_DIA BETWEEN
        40 AND 150) AND (BP_SYS > BP_DIA).'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      - start_line: 38
        end_line: 40
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: d3e38ced-b750-41b6-b860-4a146792a95a
    - text: 'RiskAlert must equal the logical OR of the three conditions defined in
        code: high blood pressure ((BP_SYS >= 140) OR (BP_DIA >= 90)) OR low sleep
        ((`Sleep Duration` < 5.5) OR (`Quality of Sleep` <= 5)) OR low index (SleepHealthIndex
        < 60). This can be expressed with a compliance constraint: RiskAlert = (((BP_SYS
        >= 140) OR (BP_DIA >= 90)) OR ((`Sleep Duration` < 5.5) OR (`Quality of Sleep`
        <= 5)) OR (SleepHealthIndex < 60)).'
      sources:
      - start_line: 82
        end_line: 82
        file: ''
      - start_line: 85
        end_line: 87
        file: ''
      - start_line: 100
        end_line: 100
        file: ''
      uid: 11b065c1-9931-4152-a3a1-a46060537185
    - text: 'RiskReasons must be consistent with the rule flags: it contains ''bp''
        if and only if ((BP_SYS >= 140) OR (BP_DIA >= 90)); contains ''sleep'' if
        and only if ((`Sleep Duration` < 5.5) OR (`Quality of Sleep` <= 5)); contains
        ''index'' if and only if (SleepHealthIndex < 60). Additionally, RiskReasons
        must be empty if and only if RiskAlert is False. Example compliance (using
        Spark SQL functions): ( (instr(RiskReasons,''bp'')>0) <=> ((BP_SYS >= 140)
        OR (BP_DIA >= 90)) ) AND ( (instr(RiskReasons,''sleep'')>0) <=> ((`Sleep Duration`
        < 5.5) OR (`Quality of Sleep` <= 5)) ) AND ( (instr(RiskReasons,''index'')>0)
        <=> (SleepHealthIndex < 60) ) AND ( (length(RiskReasons)=0) <=> (NOT RiskAlert)
        ).'
      sources:
      - start_line: 89
        end_line: 101
        file: ''
      uid: 5df25ecd-cf20-46de-98a6-c3b9b4b5e3cc
    - text: 'The canonicalized ''Blood Pressure'' string (with whitespace removed)
        must match the reconstruction from the derived columns: regexp_replace(`Blood
        Pressure`, ''\\s+'', '''') = concat(CAST(BP_SYS AS STRING), ''/'', CAST(BP_DIA
        AS STRING)).'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: c3135db9-46a6-4b6d-b0fd-dbd3dd9a11b2
  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'Both ''Physical Activity Level'' and ''Daily Steps'' must be present
        for all rows and castable to numeric (no nulls or non-numeric strings), because
        they are jointly cast to float and used for correlation/regression. This can
        be enforced with Deequ as: .isComplete(''Physical Activity Level'').isComplete(''Daily
        Steps'').hasDataType(''Physical Activity Level'', ConstrainableDataTypes.Integral,
        true).hasDataType(''Daily Steps'', ConstrainableDataTypes.Integral, true)'
      sources:
      - start_line: 20
        end_line: 21
        file: ''
      uid: 901888d5-a8f8-4d65-9915-8c1e9e467b34
    - text: 'The relationship between ''Physical Activity Level'' and ''Daily Steps''
        should be positively correlated (Pearson correlation >= 0.1) to reflect that
        higher activity levels imply more steps. This can be represented in Deequ
        as: .hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lowerBound=0.1,
        upperBound=1.0)'
      sources:
      - start_line: 20
        end_line: 25
        file: ''
      - start_line: 120
        end_line: 132
        file: ''
      uid: 380be619-6ccd-4e62-b9c4-16c5a2afc579
    - text: Average 'Daily Steps' should be non-decreasing with higher 'Physical Activity
        Level' (monotonicity of grouped means by activity level), consistent with
        the linear prediction steps_pred = slope * PA + intercept used for scoring.
        This can be validated by computing mean(Daily Steps) per 'Physical Activity
        Level' and asserting that the sequence is non-decreasing, or by a proxy Spearman/rank
        correlation >= 0.2.
      sources:
      - start_line: 23
        end_line: 25
        file: ''
      - start_line: 42
        end_line: 43
        file: ''
      uid: 63057f56-55ca-443d-bb1a-e4b079a69c63
    - text: 'When ''Physical Activity Level'' > 0, ''Daily Steps'' should be > 0 (and
        the overall mean of ''Daily Steps'' > 0) so that the normalization by steps_mean
        is meaningful and not dominated by zeros. This can be expressed with a conditional
        constraint, e.g., Deequ .satisfies(''CASE WHEN `Physical Activity Level` >
        0 THEN `Daily Steps` > 0 ELSE true END'', ''steps_positive_when_active'',
        lambda p: p >= 0.95) together with .hasMean(''Daily Steps'', _ > 0).'
      sources:
      - start_line: 20
        end_line: 21
        file: ''
      - start_line: 42
        end_line: 43
        file: ''
      uid: d0d1eed6-8144-46f2-b89e-01f7dd9f0d45
  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Both ''Sleep Duration'' and ''Quality of Sleep'' must be present and
        numeric (castable to double) for every record, since they are cast to float
        for correlation and normalization and then combined arithmetically. We could
        represent this as a Deequ constraint like: .satisfies(''`Sleep Duration` IS
        NOT NULL AND `Quality of Sleep` IS NOT NULL AND CAST(`Sleep Duration` AS DOUBLE)
        IS NOT NULL AND CAST(`Quality of Sleep` AS DOUBLE) IS NOT NULL'', ''sleep_qos_numeric'',
        1.0)'
      sources:
      - start_line: 27
        end_line: 27
        file: ''
      - start_line: 31
        end_line: 32
        file: ''
      uid: c4598e8f-8222-40cb-9bf5-727601eaebac
    - text: 'The pair (''Sleep Duration'', ''Quality of Sleep'') must satisfy the
        lower bounds Sleep Duration >= 3.0 and Quality of Sleep >= 4.0 so that the
        normalized values are non-negative and sqrt(qos_norm * duration_norm) is defined
        (non-NaN) for all rows. We could represent this as a Deequ constraint like:
        .satisfies(''`Sleep Duration` >= 3.0 AND `Quality of Sleep` >= 4.0'', ''sleep_qos_min_bounds'',
        1.0)'
      sources:
      - start_line: 31
        end_line: 32
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: 60fe659b-9a12-47ea-a11a-1eb56c2be669
    - text: 'The pair (''Sleep Duration'', ''Quality of Sleep'') should be within
        modeled upper bounds Sleep Duration <= 12.0 and Quality of Sleep <= 9.0 so
        that normalization maps to [0,1] as intended and avoids out-of-domain synergy
        inputs. We could represent this as a Deequ constraint like: .satisfies(''`Sleep
        Duration` <= 12.0 AND `Quality of Sleep` <= 9.0'', ''sleep_qos_max_bounds'',
        1.0)'
      sources:
      - start_line: 31
        end_line: 32
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: ede0536f-ed34-4c6f-9164-4e8869f8e052
    - text: 'The correlation between ''Sleep Duration'' and ''Quality of Sleep'' should
        be defined (finite), implying both columns have variance and co-observations.
        Enforce that the computed correlation is not NaN and lies within [-1, 1].
        We could represent this as a Deequ constraint like: .hasCorrelation(''Sleep
        Duration'', ''Quality of Sleep'', x => x >= -1.0 && x <= 1.0)'
      sources:
      - start_line: 27
        end_line: 27
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      uid: a2a4415f-bb15-43e2-8cf8-aaada9abffe0
    - text: 'Risk logic consistency (low-sleep trigger): If (`Sleep Duration` < 5.5)
        OR (`Quality of Sleep` <= 5), then RiskAlert must be true and ''RiskReasons''
        must contain ''sleep''. We could represent this as a Deequ constraint like:
        .satisfies(''NOT((`Sleep Duration` < 5.5) OR (`Quality of Sleep` <= 5)) OR
        (RiskAlert = TRUE AND array_contains(split(`RiskReasons`, '';''), "sleep"))'',
        ''low_sleep_implies_alert_and_reason'', 1.0)'
      sources:
      - start_line: 86
        end_line: 86
        file: ''
      - start_line: 90
        end_line: 95
        file: ''
      - start_line: 100
        end_line: 101
        file: ''
      uid: 8dfc0426-8a07-49df-bd9a-97eb69151829
    - text: 'Risk reasons exclusivity for sleep: If neither (`Sleep Duration` < 5.5)
        nor (`Quality of Sleep` <= 5) holds, then ''sleep'' must not appear in ''RiskReasons''.
        We could represent this as a Deequ constraint like: .satisfies(''((`Sleep
        Duration` < 5.5) OR (`Quality of Sleep` <= 5)) OR (NOT array_contains(split(`RiskReasons`,
        '';''), "sleep"))'', ''no_sleep_reason_when_not_low'', 1.0)'
      sources:
      - start_line: 86
        end_line: 86
        file: ''
      - start_line: 90
        end_line: 99
        file: ''
      uid: f835909a-b686-4081-9847-2f5fdf1c36a0
  '["Quality of Sleep","Stress Level"]':
    code: []
    assumptions:
    - text: "To keep the synergy term well-defined and avoid NaNs from sqrt(qos_norm\
        \ * duration_norm), the row-wise normalized values must be within [0,1]. This\
        \ implies, for every record: Quality of Sleep is in [4, 9] and Sleep Duration\
        \ is in [3, 12], so that (Quality of Sleep - 4)/5 \u2208 [0,1] and (Sleep\
        \ Duration - 3)/9 \u2208 [0,1]. This can be enforced with a Deequ multi-column\
        \ constraint like: .satisfies('(Quality of Sleep >= 4 AND Quality of Sleep\
        \ <= 9) AND (Sleep Duration >= 3 AND Sleep Duration <= 12)', lambda v: v ==\
        \ 1.0)."
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: 2e915ae1-0487-4c62-9d73-a861f11c6b02
    - text: 'Across the dataset, Stress Level and Quality of Sleep should be non-positively
        correlated (higher stress should not increase sleep quality), i.e., corr(Stress
        Level, Quality of Sleep) <= 0; optionally target <= -0.3 as suggested by the
        weight calibration logic. This can be represented as: .hasCorrelation(''Stress
        Level'', ''Quality of Sleep'', lambda c: c <= 0.0).'
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 62
        end_line: 62
        file: ''
      - start_line: 119
        end_line: 132
        file: ''
      uid: 4906cc8f-114c-4f54-8896-3b4a16950a71
    - text: 'Across the dataset, Sleep Duration and Quality of Sleep should be non-negatively
        correlated (longer sleep should not reduce quality), i.e., corr(Sleep Duration,
        Quality of Sleep) >= 0; optionally target >= 0.2 per the weight calibration.
        This can be represented as: .hasCorrelation(''Sleep Duration'', ''Quality
        of Sleep'', lambda c: c >= 0.0).'
      sources:
      - start_line: 27
        end_line: 27
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 119
        end_line: 132
        file: ''
      uid: c21d30ab-bf94-4f02-b252-3273335b1e17
    - text: 'All rows used in correlations and normalization must have non-null, numeric
        (castable to float) values for both Quality of Sleep and Stress Level. This
        can be enforced with a combined multi-column completeness/type constraint,
        e.g., .satisfies(''is_not_null(`Quality of Sleep`) AND is_not_null(`Stress
        Level`)'', lambda v: v == 1.0) together with .hasDataType(''Quality of Sleep'',
        ConstrainableDataTypes.Integral) and .hasDataType(''Stress Level'', ConstrainableDataTypes.Integral).'
      sources:
      - start_line: 27
        end_line: 33
        file: ''
      - start_line: 34
        end_line: 36
        file: ''
      uid: ad9cf7a7-fee4-4c5f-b087-ef44092be7ec
