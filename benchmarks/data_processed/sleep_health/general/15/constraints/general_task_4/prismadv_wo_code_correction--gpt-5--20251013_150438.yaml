  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies("((0.5 * CASE WHEN `BMI Category` = ''Normal'' THEN
        0.0 WHEN `BMI Category` = ''Normal Weight'' THEN 0.0 WHEN `BMI Category` =
        ''Overweight'' THEN 0.10 WHEN `BMI Category` = ''Obese'' THEN 0.20 ELSE NULL
        END) + (0.5 * CASE WHEN `Sleep Disorder` = ''Insomnia'' THEN 0.20 WHEN `Sleep
        Disorder` = ''Sleep Apnea'' THEN 0.30 ELSE 0.05 END)) IN (0.025, 0.075, 0.125,
        0.10, 0.15, 0.20, 0.25)", "Penalty_total equals one of the allowed discrete
        values", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 13abff21-d244-4229-86ef-735e9381cabf
      source_assumptions:
      - 1b78032d-9188-46d9-b8e2-c421d90c0b73
      - 96c4175f-7ba2-4c1a-b98f-db36635f2cbe
    assumptions:
    - text: "The pair ('BMI Category', 'Sleep Disorder') must deterministically map\
        \ to a numeric penalty_total used in SleepHealthIndex. Requirements: (a) 'BMI\
        \ Category' \u2208 {'Normal','Normal Weight','Overweight','Obese'} with penalties\
        \ {0.0, 0.0, 0.10, 0.20}; (b) 'Sleep Disorder' \u2208 {'Insomnia','Sleep Apnea'}\
        \ with penalties {0.20, 0.30}, otherwise default to 0.05; (c) penalty_total\
        \ = 0.5*bmi_penalty + 0.5*disorder_penalty is non-null and bounded within\
        \ [0.0, 0.25] for every row. This can be represented via a Deequ check that\
        \ enforces the joint domain and validates the computed penalty range with\
        \ a satisfies expression over both columns."
      sources:
      - start_line: 45
        end_line: 51
        file: ''
      - start_line: 53
        end_line: 56
        file: ''
      - start_line: 79
        end_line: 82
        file: ''
      uid: aefe6755-1791-4d36-a594-6356a1f220d2
    - text: For rows where 'Sleep Disorder' is null or not in {'Insomnia','Sleep Apnea'},
        the disorder penalty must default to 0.05 so that the combined penalty_total
        remains defined. Concretely, for such rows penalty_total = 0.5*bmi_penalty
        + 0.025. This multi-column rule guarantees the penalty component is always
        computable from ('BMI Category', 'Sleep Disorder').
      sources:
      - start_line: 53
        end_line: 56
        file: ''
      - start_line: 79
        end_line: 79
        file: ''
      uid: 1b78032d-9188-46d9-b8e2-c421d90c0b73
    - text: "Given the equal weighting of BMI and disorder penalties, the effect of\
        \ the pair ('BMI Category', 'Sleep Disorder') on 'SleepHealthIndex' is bounded:\
        \ for any row, SleepHealthIndex must reflect a reduction factor (1 - penalty_total)\
        \ where penalty_total \u2208 [0.0, 0.25]. Thus, conditional on the same unpenalized\
        \ base score, the SHI of ('Obese','Sleep Apnea') rows must be \u2264 the SHI\
        \ of ('Overweight','Insomnia') \u2264 the SHI of ('Normal' or 'Normal Weight',\
        \ unknown/other). This expresses a monotonicity expectation across the two-column\
        \ severity grid and can be validated via group-level checks (e.g., comparing\
        \ mean SHI by the pair)."
      sources:
      - start_line: 45
        end_line: 56
        file: ''
      - start_line: 79
        end_line: 82
        file: ''
      uid: 96c4175f-7ba2-4c1a-b98f-db36635f2cbe
    - text: 'Risk alignment with index: ''RiskAlert'' must be true whenever ''SleepHealthIndex''
        < 60, and in that case ''RiskReasons'' must include the token ''index''. Conversely,
        if ''index'' appears in ''RiskReasons'', then ''SleepHealthIndex'' < 60 must
        hold. Also, if ''RiskAlert'' is false, ''RiskReasons'' must be an empty string.
        These are multi-column consistency rules across SleepHealthIndex, RiskAlert,
        and RiskReasons.'
      sources:
      - start_line: 87
        end_line: 87
        file: ''
      - start_line: 89
        end_line: 101
        file: ''
      uid: 0caa0e9c-f38a-4e65-b0f9-13eb3ad4a5b5
    - text: 'Array-based export assumes a one-to-one mapping between ''Person ID''
        and (''SleepHealthIndex'',''RiskAlert''): for df[[''Person ID'',''SleepHealthIndex'',''RiskAlert'']],
        ''Person ID'' must be unique, non-negative integers, and the paired ''SleepHealthIndex''
        and ''RiskAlert'' values must be non-null for those IDs. This prevents ambiguous
        or missing assignments when iterating tuples to fill arrays.'
