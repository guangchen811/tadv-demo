    assumptions:
    - text: 'The ''Blood Pressure'' column must be complete (no nulls) for all rows
        because the code immediately applies string operations and integer casts without
        any null handling. This can be enforced as: Deequ: .hasCompleteness(''Blood
        Pressure'', lambda v: v == 1.0) or Great Expectations: expect_column_values_to_not_be_null.'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: b82a4884-8efb-4997-a324-1f123fe813fe
    - text: 'The ''Blood Pressure'' values must strictly match the format ''<systolic>/<diastolic>''
        where both parts are integers with no spaces, units, or decimals (e.g., ''120/80'').
        A suitable rule: Deequ: .hasPattern(''Blood Pressure'', ''^\d+/\d+$'') or
        Great Expectations: expect_column_values_to_match_regex(''^\d+/\d+$'').'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: 7883359d-dab4-4f11-825f-dd2ee449f64f
    - text: 'Both parts of ''Blood Pressure'' must be parseable as base-10 integers
        because the code casts them with .astype(int). Any non-integer tokens (e.g.,
        ''120.0'', ''120a'', leading/trailing spaces) will cause a failure. This can
        be captured via a single-column SQL-style satisfy check: Deequ: .satisfies("CAST(split(`Blood
        Pressure`, ''/'')[0] AS INT) IS NOT NULL AND CAST(split(`Blood Pressure`,
        ''/'')[1] AS INT) IS NOT NULL", ''BP tokens are integers'', lambda x: x ==
        1.0).'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: b00ec88f-f310-45e2-9426-61144f2e148e
    - text: The units for 'Blood Pressure' should be mmHg (implicit from baselines
        120/80 and high-BP thresholds 140/90). Values should therefore be numeric
        without unit suffixes. This is effectively enforced by the regex in the previous
        assumption; any presence of 'mmHg' or 'kPa' would violate it.
      sources:
      - start_line: 38
        end_line: 40
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: 4e36cb07-edfe-4e83-8a10-8162958d6f36
    - text: 'Recommended quality range (to avoid degenerate scoring and misclassification):
        after parsing, systolic should typically be between 70 and 250 and diastolic
        between 40 and 150. While the code will not crash with out-of-range values
        (it clips bp_score), such values are likely erroneous. This can be encoded
        as: Deequ: .satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) BETWEEN
        70 AND 250 AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT) BETWEEN 40 AND
        150", ''BP in plausible human range'', lambda x: x >= 0.98) or Great Expectations:
        expect_column_values_to_match_regex_list with a custom check or a custom expectation
        using split-and-cast.'
