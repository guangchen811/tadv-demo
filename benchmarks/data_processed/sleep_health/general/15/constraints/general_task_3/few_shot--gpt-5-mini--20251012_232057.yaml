constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .containsPattern('Blood Pressure', '^\\d{2,3}/\\d{2,3}$')
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Diastolic:
    code:
    - - '.hasMax(''Diastolic'', lambda x: x <= 120)'
      - Invalid
    - - '.hasMin(''Diastolic'', lambda x: x >= 50)'
      - Invalid
    assumptions: []
  Gender:
    code:
    - - '.hasNumberOfDistinctValues(''Gender'', lambda x: x >= 2)'
      - Invalid
    - - .isComplete('Gender')
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - '.hasMax(''Physical Activity Level'', lambda x: x <= 100)'
      - Valid
    - - '.hasMin(''Physical Activity Level'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.hasMax(''Quality of Sleep'', lambda x: x <= 10)'
      - Valid
    - - '.hasMin(''Quality of Sleep'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.4)'
      - Valid
    - - '.hasNumberOfDistinctValues(''Sleep Disorder'', lambda x: x >= 2)'
      - Invalid
    - - .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - '.hasMax(''Sleep Duration'', lambda x: x <= 24)'
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - '.hasMax(''Stress Level'', lambda x: x <= 10)'
      - Valid
    - - '.hasMin(''Stress Level'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
  Systolic:
    code:
    - - '.hasMax(''Systolic'', lambda x: x <= 200)'
      - Invalid
    - - '.hasMin(''Systolic'', lambda x: x >= 90)'
      - Invalid
    assumptions: []
  Systolic/Diastolic:
    code:
    - - .isGreaterThan('Systolic', 'Diastolic')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
