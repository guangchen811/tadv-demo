constraints:
  Age:
    code:
    - - .hasDataType('Age', 'Integral')
      - Invalid
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .hasDataType('BMI Category', 'String')
      - Invalid
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasCompliance('Diastolic in range [50, 120]', 'CAST(SUBSTRING(Blood Pressure,
        INSTR(Blood Pressure, "/") + 1) AS INT) BETWEEN 50 AND 120')
      - Invalid
    - - .hasCompliance('Systolic greater than Diastolic', 'CAST(SUBSTRING(Blood Pressure,
        1, INSTR(Blood Pressure, "/") - 1) AS INT) > CAST(SUBSTRING(Blood Pressure,
        INSTR(Blood Pressure, "/") + 1) AS INT)')
      - Invalid
    - - .hasCompliance('Systolic in range [90, 200]', 'CAST(SUBSTRING(Blood Pressure,
        1, INSTR(Blood Pressure, "/") - 1) AS INT) BETWEEN 90 AND 200')
      - Invalid
    - - .hasDataType('Blood Pressure', 'String')
      - Invalid
    - - .hasPattern('Blood Pressure', '^[0-9]{2,3}/[0-9]{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .hasDataType('Daily Steps', 'Integral')
      - Invalid
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .hasDataType('Gender', 'String')
      - Invalid
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .hasDataType('Heart Rate', 'Integral')
      - Invalid
    - - .isComplete('Heart Rate')
      - Valid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .hasDataType('Occupation', 'String')
      - Invalid
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .hasDataType('Person ID', 'Integral')
      - Invalid
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .hasDataType('Physical Activity Level', 'Integral')
      - Invalid
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .hasDataType('Quality of Sleep', 'Integral')
      - Invalid
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGreaterThanOrEqualTo('Quality of Sleep', 3)
      - Invalid
    - - .isNonNegative('Quality of Sleep')
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .hasDataType('Sleep Disorder', 'String')
      - Invalid
    - - .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasDataType('Sleep Duration', 'Fractional')
      - Invalid
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isNonNegative('Sleep Duration')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .hasDataType('Stress Level', 'Integral')
      - Invalid
    - - .isComplete('Stress Level')
      - Valid
    - - .isNonNegative('Stress Level')
      - Invalid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', 'Integral')
      - Invalid
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
