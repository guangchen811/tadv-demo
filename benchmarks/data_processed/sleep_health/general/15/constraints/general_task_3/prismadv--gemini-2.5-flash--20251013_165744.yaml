    - text: 'For the calculation of `quality_score`, the ''Quality of Sleep'' column
        is expected to contain numeric values primarily within the range of 3 to 9
        (inclusive). Values outside this range will be clipped to either 0 (for values
        less than 3) or 1 (for values greater than 9) before being scaled, implying
        that values within [3, 9] are the intended input for a meaningful unclipped
        score. We could represent this assumption as a deequ constraint like this:

        `.isGreaterThanOrEqualTo("Quality of Sleep", 3, assertion = Some(x => x >=
        0.95))` and `.isLessThanOrEqualTo("Quality of Sleep", 9, assertion = Some(x
        => x >= 0.95))`'
      sources:
      - start_line: 89
        end_line: 90
        file: ''
      uid: 0413ba26-0d7f-423a-9448-9522cf80290b
    - text: 'For the `insomnia_risk` calculation, specifically the `q_low` component,
        the ''Quality of Sleep'' column is expected to contain numeric values. Values
        equal to or above 6 are considered ''good'' (contributing 0 to `q_low`), while
        values equal to or below 3 are considered ''poor'' (contributing maximally
        to `q_low`). This implies an operational range relevant for risk assessment
        where values below 6 and especially below 3 are significant. We could represent
        the lower bound implication as a deequ constraint like this:

        `.isGreaterThanOrEqualTo("Quality of Sleep", 3, assertion = Some(x => x >=
        0.95))`'
      sources:
      - start_line: 128
        end_line: 128
        file: ''
      uid: 7435a690-3a36-46e1-8927-571914b772b5
