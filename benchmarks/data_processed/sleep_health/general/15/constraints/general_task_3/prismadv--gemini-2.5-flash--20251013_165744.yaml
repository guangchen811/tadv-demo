    - text: 'The ''Sleep Health Score'' is a linear aggregation of component scores.
        This implies that the input columns ''Sleep Duration'', ''Quality of Sleep'',
        ''Daily Steps'', ''Stress Level'', ''Systolic'', and ''Diastolic'' are assumed
        to be non-null and numeric, as their derived scores are combined to compute
        the final score. We could represent this assumption as a deequ constraint
        like this:

        .areComplete([''Sleep Duration'', ''Quality of Sleep'', ''Daily Steps'', ''Stress
        Level'', ''Systolic'', ''Diastolic''])

        .areNumeric([''Sleep Duration'', ''Quality of Sleep'', ''Daily Steps'', ''Stress
        Level'', ''Systolic'', ''Diastolic''])'
