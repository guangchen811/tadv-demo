    - text: 'The ''Systolic'' blood pressure is assumed to be within the reasonable
        physiological range [90, 200], and ''Diastolic'' blood pressure is assumed
        to be within the range [50, 120]. These ranges are used for validation and
        scoring. We could represent this assumption as a deequ constraint like this:

        .isContainedIn(''Systolic'', 90, 200)

        .isContainedIn(''Diastolic'', 50, 120)'
