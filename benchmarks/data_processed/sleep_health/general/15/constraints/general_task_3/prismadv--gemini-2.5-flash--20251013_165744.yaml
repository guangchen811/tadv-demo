    - text: 'There is an expected positive correlation between ''Daily Steps'' and
        ''Physical Activity Level'', implying that as physical activity level increases,
        daily steps tend to increase. This relationship is leveraged for blending
        activity signals. We could represent this assumption as a deequ constraint
