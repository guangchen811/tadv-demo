    - text: 'The ''Blood Pressure'' column is assumed to consistently follow the ''Systolic/Diastolic''
        string format, where both Systolic and Diastolic are 2 or 3 digit numbers.
        This enables the successful extraction and parsing into separate numeric ''Systolic''
        and ''Diastolic'' columns. We could represent this assumption as a deequ constraint
