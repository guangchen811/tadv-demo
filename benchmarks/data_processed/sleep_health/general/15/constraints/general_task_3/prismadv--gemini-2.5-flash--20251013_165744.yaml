    - text: 'For the ''insomnia_risk'' score and subsequent triage to be accurately
        calculated, ''Sleep Duration'', ''Quality of Sleep'', ''Stress Level'', and
        ''Daily Steps'' columns must all contain valid numeric and non-null values.
        This ensures that intermediate risk factors (`dur_short`, `q_low`, `stress_high`,
        `steps_low`) are correctly computed and aggregated. We could represent this
