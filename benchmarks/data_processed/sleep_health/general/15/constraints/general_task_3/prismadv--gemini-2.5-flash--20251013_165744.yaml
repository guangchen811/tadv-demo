    - text: 'The ''Apnea Risk Score'' calculation assumes that ''BMI Category'' (after
        mapping), ''Systolic'', ''Diastolic'', ''Age'', and ''Heart Rate'' are all
        non-null and numeric, and their derived factors are combined with specific
        weights to represent apnea risk. We could represent this assumption as a deequ
        constraint like this:

        .areComplete([''BMI Category'', ''Systolic'', ''Diastolic'', ''Age'', ''Heart
        Rate''])

        .areNumeric([''Systolic'', ''Diastolic'', ''Age'', ''Heart Rate''])'
