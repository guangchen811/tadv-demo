    - text: 'The ''Sleep Disorder'' column is assumed to have a minimum completeness
        (e.g., greater than 10-20%) and its non-null values should be restricted to
        ''Sleep Apnea'' or ''Insomnia''. This ensures that the derived `share_labeled`,
        `apnea_share`, `prior_apnea`, and `prior_insomnia` are statistically meaningful
        for calibrating the triage thresholds.


        Deequ constraint examples:

        .hasCompleteness("Sleep Disorder", 0.1) // Minimum completeness for meaningful
        calibration

        .isContainedIn("Sleep Disorder", Array("Sleep Apnea", "Insomnia")) // For
        non-null values'
