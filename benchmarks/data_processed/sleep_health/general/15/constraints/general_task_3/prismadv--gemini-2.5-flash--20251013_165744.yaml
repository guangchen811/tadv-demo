    - text: 'After parsing ''Blood Pressure'' into ''Systolic'' and ''Diastolic''
        columns, both derived columns must contain numeric values. For all valid blood
        pressure readings, the ''Systolic'' value must be strictly greater than the
        ''Diastolic'' value. Additionally, ''Systolic'' values are expected to be
        between 90 and 200 (inclusive), and ''Diastolic'' values between 50 and 120
