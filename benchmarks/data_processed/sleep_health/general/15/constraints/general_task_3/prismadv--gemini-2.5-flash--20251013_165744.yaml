    - text: 'For the aggregated ''Sleep Health Score'' and ''Apnea Risk Score'' to
        be complete and meaningful for all records, the primary input columns used
        in their calculation (''Age'', ''Heart Rate'', ''BMI Category'', ''Sleep Duration'',
        ''Quality of Sleep'', ''Daily Steps'', ''Physical Activity Level'', ''Stress
        Level'', and the derived ''Systolic'' and ''Diastolic'') are assumed to be
        non-null and numeric where expected, ensuring that all intermediate scores
        and factors (e.g., `duration_score`, `quality_score`, `activity_score`, `stress_score`,
        `bp_score`, `consistency_score`, `bmi_factor`, `age_factor`, `hr_factor`,
        `a_bp`) are also non-null.


        Deequ constraint examples:

        .hasCompleteness("Age", 1.0)

        .hasCompleteness("Heart Rate", 1.0)

        .hasCompleteness("BMI Category", 1.0)

        .isContainedIn("BMI Category", Array("Overweight", "Normal", "Obese", "Normal
        Weight"))

        .hasCompleteness("Sleep Duration", 1.0)

        .hasCompleteness("Quality of Sleep", 1.0)

        .hasCompleteness("Daily Steps", 1.0)

        .hasCompleteness("Physical Activity Level", 1.0)

        .hasCompleteness("Stress Level", 1.0)'
