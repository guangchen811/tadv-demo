    assumptions:
    - text: 'The ''Blood Pressure'' column is assumed to contain values in a consistent
        "Systolic/Diastolic" string format, where both Systolic and Diastolic are
        valid integers. After parsing and conversion, the extracted ''Systolic'' and
        ''Diastolic'' columns are expected to be non-null for all records. Furthermore,
        for every record, the ''Systolic'' blood pressure value must be strictly greater
        than the ''Diastolic'' blood pressure value.


        Deequ constraint examples:

        .hasPattern("Blood Pressure", "^\\d{2,3}/\\d{2,3}$")

        .hasCompleteness("Systolic", 1.0)

        .hasCompleteness("Diastolic", 1.0)

        .satisfies("Systolic > Diastolic", "Systolic must be greater than Diastolic")'
