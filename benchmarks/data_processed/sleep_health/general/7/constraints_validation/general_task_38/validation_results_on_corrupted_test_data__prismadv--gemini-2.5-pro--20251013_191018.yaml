results:
  Physical Activity Level:
    code:
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda x: x
        > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.hasStandardDeviation(''Quality of Sleep'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Quality of Sleep'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: '.isContainedIn(''BMI Category'', [''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese''], lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`BMI Category` = ''Overweight''", "Data contains ''Overweight''
        category", lambda num_rows: num_rows > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`BMI Category` = ''Obese''", "Data contains ''Obese''
        category", lambda num_rows: num_rows > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', ''\\d{2,3}/\\d{2,3}'', assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda c: c >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Sleep Duration'', lambda std: std > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 10.0",
        "Sleep Duration in plausible range", lambda r: r >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Daily Steps'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn("Sleep Disorder", ["Sleep Apnea", "Insomnia"])
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Heart Rate` >= 55 AND `Heart Rate` <= 95", "HeartRateWithinNormalRange",
        lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("`Stress Level` >= 3 AND `Stress Level` <= 8", "StressLevelWithinRange",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Age","Blood Pressure"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `Blood Pressure` RLIKE ''^\\d+/\\d+$'' THEN
        CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) > CAST(SPLIT(`Blood Pressure`,
        ''/'')[1] AS INT) ELSE TRUE END", "SBP should be greater than DBP", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies("NOT (`Sleep Disorder` IS NULL AND `BMI Category` =
        ''Obese'')", "Obese individuals must have a known Sleep Disorder status",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","Heart Rate"]':
    code:
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) > CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT)", "SBP_greater_than_DBP", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        x: x >= 0.3)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda x:
        x > 0.3)'
      status: true
      reason_if_failed: ''
      level: warning
