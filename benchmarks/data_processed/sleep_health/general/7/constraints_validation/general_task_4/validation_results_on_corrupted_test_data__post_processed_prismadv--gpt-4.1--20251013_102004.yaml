results:
  Physical Activity Level:
    code:
    - suggestion: '.hasCompleteness(''Physical Activity Level'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''Physical Activity Level''], lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese'') THEN 1 ELSE 0 END", "Valid BMI Categories", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Blood Pressure
        format is 'int/int'")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CAST(split(`Blood Pressure`, '/')[0] AS int) BETWEEN
        60 AND 250 AND CAST(split(`Blood Pressure`, '/')[1] AS int) BETWEEN 30 AND
        150", "Systolic and diastolic BP values are plausible")
      status: true
      reason_if_failed: ''
      level: warning
  '["Person ID","RiskAlert","SleepHealthIndex"]':
    code:
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Person ID` >= 0 AND cast(`Person ID` as int) = `Person
        ID`'', ''Person ID is non-negative integer'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: '.satisfies(''`Person ID` > 0'', ''Person ID is positive'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .satisfies('`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0',
        'Sleep Duration in plausible human range')
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Daily Steps'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMean(''Daily Steps'', lambda x: x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: .satisfies("CASE WHEN `Sleep Disorder` IS NULL OR `Sleep Disorder`
        IN ('Insomnia', 'Sleep Apnea') THEN 1 ELSE 0 END", "Valid Sleep Disorder Values")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Sleep Disorder", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.hasCompleteness(''Stress Level'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Stress Level` AS DOUBLE) IS NOT NULL'', ''Stress
        Level Numeric'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Stress Level` >= 3 AND `Stress Level` <= 8'', ''Stress
        Level Range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["BP_DIA","BP_SYS","Blood Pressure"]':
    code:
    - suggestion: '.satisfies("`Blood Pressure` IS NOT NULL AND `Blood Pressure` RLIKE
        ''^[0-9]+/[0-9]+$''", "Blood Pressure format is SYS/DIA and not null", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: .satisfies('(`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0)
        AND (`Quality of Sleep` >= 4.0 AND `Quality of Sleep` <= 9.0)', 'Sleep Duration
        and Quality of Sleep within valid range')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''Sleep Duration''], lambda x: x > 0).hasDistinctness([''Quality
        of Sleep''], lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: .satisfies('CAST(`Quality of Sleep` AS INT) IS NOT NULL AND CAST(`Stress
        Level` AS INT) IS NOT NULL', 'Both Quality of Sleep and Stress Level are numeric')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('NOT (`Quality of Sleep` = 4 AND `Sleep Duration` = 3)',
        'No row where both Quality of Sleep and Sleep Duration are at minimum')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Quality of Sleep'', ''Stress Level'', lambda
        x: abs(x) < 0.999)'
      status: true
      reason_if_failed: ''
      level: error
