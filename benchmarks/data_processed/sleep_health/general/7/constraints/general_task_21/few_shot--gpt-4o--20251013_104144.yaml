constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Underweight', 'Normal', 'Overweight', 'Obese'])
      - Invalid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    - - .patternMatch('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea', None])
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isContainedIn('Stress Level', [3, 4, 5, 6, 7, 8])
      - Invalid
    assumptions: []
