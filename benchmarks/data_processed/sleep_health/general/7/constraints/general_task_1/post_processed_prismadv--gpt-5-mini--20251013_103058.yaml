      uid: 4739e1f2-0988-4a0c-9895-5c3421048459
      source_assumptions:
      - 59069c6e-30be-4654-9b13-d214f952d8af
    - suggestion: '.satisfies("`Physical Activity Level` IS NOT NULL AND `Daily Steps`
        IS NOT NULL", "PA_and_Steps_paired", lambda x: x >= 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: ecb26342-a09d-48dd-9346-e3b5e720c018
      source_assumptions:
      - 8ca7c06e-e5ac-4c26-b817-1a8e5af3725a
    - suggestion: '.hasNumberOfDistinctValues(''Physical Activity Level'', lambda
