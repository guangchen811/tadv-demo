    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Obese'', ''Overweight'',
        ''Normal'', ''Normal Weight'') THEN 1 ELSE 0 END", "Valid BMI Category", lambda
        x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 374cce27-97d7-4b5c-a0a8-4df0a8147d6a
      source_assumptions:
      - 853e1985-d219-438a-ab70-1c8af497a20b
    assumptions:
    - text: 'The input must contain a ''BMI Category'' column (the code accesses df[''BMI
        Category''] and maps it to numeric contributions). If the column is missing
        the script will fail. Example validation: require the column to exist in the
        input schema.'
      sources:
      - start_line: 83
        end_line: 89
        file: ''
      uid: fa5b4e51-d4e5-45f8-b494-5ef7ee969799
    - text: 'Most values in ''BMI Category'' should be one of the expected categories
        {''Obese'', ''Overweight'', ''Normal'', ''Normal Weight''}. The code maps
        these exact labels to numeric contributions; unknown labels become a default
        5.0 which may indicate bad or unexpected input. Recommended validation: at
        least 95% of rows should satisfy `BMI Category` in the allowed set. We could
        express this as a deequ-style constraint like: .satisfies(''CASE WHEN `BMI
        Category` IN (\''Obese\'', \''Overweight\'', \''Normal\'', \''Normal Weight\'')
        THEN 1 ELSE 0 END'', ''Valid BMI Category'', lambda x: x >= 0.95).'
      sources:
      - start_line: 83
        end_line: 89
        file: ''
      uid: 853e1985-d219-438a-ab70-1c8af497a20b
    - text: 'Values in ''BMI Category'' are expected to match the category labels
        exactly (case-sensitive, no extra leading/trailing whitespace). Because mapping
        uses exact string keys, variants like '' normal'', ''NORMAL'', or ''Normal
        '' will be treated as unknown. Recommended validation: trimmed values are
        in the allowed set for a high fraction of rows, e.g. .satisfies(''CASE WHEN
        TRIM(`BMI Category`) IN (\''Obese\'', \''Overweight\'', \''Normal\'', \''Normal
        Weight\'') THEN 1 ELSE 0 END'', ''Trimmed Valid BMI Category'', lambda x:
        x >= 0.95).'
      sources:
      - start_line: 83
        end_line: 89
        file: ''
      uid: 00cf6b82-84e9-4121-8204-08d4c20b79a0
    - text: 'The ''BMI Category'' column should not be fully missing for the dataset
        (the provided dataset shows completeness=1.0). If many values are null, the
        mapping will produce NaN and fillna(5.0) will assign a default; to ensure
        expected scoring, validate that the fraction of non-null values is high (e.g.
        >= 0.99). Example: .satisfies(''CASE WHEN `BMI Category` IS NOT NULL THEN
        1 ELSE 0 END'', ''BMI Category not null'', lambda x: x >= 0.99).'
      sources:
      - start_line: 89
        end_line: 89
        file: ''
      uid: d431a83c-3f1d-4295-925e-8825631ce360
  Blood Pressure:
