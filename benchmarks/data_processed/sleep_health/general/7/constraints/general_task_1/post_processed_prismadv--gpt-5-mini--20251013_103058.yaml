        file: ''
      - start_line: 77
        end_line: 77
        file: ''
      uid: 06c0314b-82b4-4e9e-9069-add41ef717d5
    - text: 'Systolic and diastolic values should be within clinically-plausible numeric
        ranges to keep thresholding and log transforms meaningful. For example, require
        systolic in [70, 250] and diastolic in [30, 200]. Example check (Great Expectations):
        .satisfies(lambda row: 70 <= int(row[''Blood Pressure''].split(''/'')[0].strip())
        <= 250 and 30 <= int(row[''Blood Pressure''].split(''/'')[1].strip()) <= 200)

        Example Deequ-like check: .satisfies("CASE WHEN CAST(split_part(`Blood Pressure`,
        ''/'', 1) AS INT) BETWEEN 70 AND 250 AND CAST(split_part(`Blood Pressure`,
        ''/'', 2) AS INT) BETWEEN 30 AND 200 THEN 1 ELSE 0 END", "BP in plausible
