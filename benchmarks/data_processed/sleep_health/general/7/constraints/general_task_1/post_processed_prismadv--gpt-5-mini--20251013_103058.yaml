      uid: d06398ab-8178-43af-9f9e-3b9a59b61deb
    - text: 'There must be no null/missing values in ''Blood Pressure'' in the input
        (every row must have a value), because the code performs string split and
        integer cast without null handling. Example check (Great Expectations): expect_column_values_to_not_be_null(''Blood
        Pressure'')

        Example Deequ-like check: .isComplete(''Blood Pressure'')'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      uid: ab72b285-0a85-474e-9691-6fd2b63e5977
    - text: 'Systolic must be greater than diastolic for each row (pulse pressure
        > 0). The code computes pulse_pressure = systolic - diastolic and then takes
        np.log(pulse_pressure); log is undefined for non-positive values, so pulse_pressure
        must be > 0. Example check (Great Expectations): .satisfies(lambda row: int(row[''Blood
        Pressure''].split(''/'')[0].strip()) - int(row[''Blood Pressure''].split(''/'')[1].strip())
        > 0)

        Example Deequ-like check: .satisfies("CASE WHEN (CAST(split_part(`Blood Pressure`,
        ''/'', 1) AS INT) - CAST(split_part(`Blood Pressure`, ''/'', 2) AS INT)) >
        0 THEN 1 ELSE 0 END", "Pulse pressure positive", lambda x: x == 1)'
