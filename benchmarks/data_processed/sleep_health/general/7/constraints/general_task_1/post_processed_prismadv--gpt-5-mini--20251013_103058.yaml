      uid: d5efc513-2fc5-4a04-87d6-cc0a2909714d
      source_assumptions:
      - 8ca7c06e-e5ac-4c26-b817-1a8e5af3725a
    - suggestion: '.satisfies(''CASE WHEN `Physical Activity Level` >= 0 AND `Physical
        Activity Level` <= 100 THEN 1 ELSE 0 END'', ''PA_in_expected_range'', lambda
        x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 2c6ab9df-2b63-4b2c-a32a-be05cd655760
      source_assumptions:
      - c0b222b3-a95b-4465-b431-b6573d9fcdc2
    assumptions:
    - text: 'The ''Physical Activity Level'' column must be parseable as numeric.
        The code calls pd.to_numeric(..., errors=''coerce'') and later performs numeric
        operations, so the input should contain numeric (integral or float) values
        for this column. As a validation rule: at least 95% of rows should successfully
        convert to numeric (i.e., not become null after coercion). Example check:
        .satisfies("CASE WHEN TRY_CAST(`Physical Activity Level` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "PA_is_numeric", lambda x: x >= 0.95).'
      sources:
      - start_line: 19
        end_line: 25
        file: ''
      uid: 59069c6e-30be-4654-9b13-d214f952d8af
    - text: 'There must be enough paired, non-null numeric rows of ''Physical Activity
        Level'' and ''Daily Steps'' to fit a linear model. The code uses np.polyfit
        on rows where both columns are present, which requires at least two valid
        pairs and non-zero variance in the predictor. As a validation rule: count
        of rows where both are non-null and numeric should be >= 2 (preferably much
        larger), and the ''Physical Activity Level'' values in those rows should have
        more than one distinct value. Example checks: .satisfies("CASE WHEN `Physical
        Activity Level` IS NOT NULL AND `Daily Steps` IS NOT NULL THEN 1 ELSE 0 END",
        "PA_and_Steps_paired", lambda x: x >= 0.01) and .satisfies("CASE WHEN array_distinct(collect_set(`Physical
        Activity Level`)) > 1 THEN 1 ELSE 0 END", "PA_variance_for_fit", lambda x:
        x == 1).'
      sources:
      - start_line: 27
        end_line: 33
        file: ''
      uid: 8ca7c06e-e5ac-4c26-b817-1a8e5af3725a
    - text: 'Values in ''Physical Activity Level'' should be on a sensible, mostly
        positive scale (e.g., 0-100) because the code tests for high activity using
        (Physical Activity Level >= 90) and uses this column to predict steps. As
        a validation rule: at least 95% of values should lie within [0,100] (or another
        expected domain for your data). Example: .satisfies("CASE WHEN `Physical Activity
        Level` >= 0 AND `Physical Activity Level` <= 100 THEN 1 ELSE 0 END", "PA_in_expected_range",
        lambda x: x >= 0.95).'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 29
        end_line: 33
        file: ''
      uid: c0b222b3-a95b-4465-b431-b6573d9fcdc2
    - text: 'The ''Physical Activity Level'' column should not be entirely missing
        (all-null) in the input. The code relies on this column to compute expected_steps
        and downstream activity components; at minimum some non-null values are required.
        As a validation rule: the fraction of non-null ''Physical Activity Level''
        rows should be > 0 (or >= a higher threshold, e.g., 1% or 5% depending on
        needs). Example: .satisfies("CASE WHEN `Physical Activity Level` IS NOT NULL
        THEN 1 ELSE 0 END", "PA_non_null_fraction", lambda x: x > 0).'
      sources:
      - start_line: 19
        end_line: 25
        file: ''
      - start_line: 27
        end_line: 33
        file: ''
      uid: 3c1951ed-9911-4cd9-bb95-dbb58a704ca5
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` RLIKE ''^[0-9]+(\\.0+)?$''
        THEN 1 ELSE 0 END", "Numeric-convertible Quality of Sleep", lambda x: x ==
        1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: cc4825fb-8aa8-4d5e-a62d-8cc599194f5e
      source_assumptions:
      - 2f323963-beb7-4efb-9ae2-bdfb1cedadb1
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` IS NOT NULL AND CAST(`Quality
        of Sleep` AS DOUBLE) = FLOOR(CAST(`Quality of Sleep` AS DOUBLE)) THEN 1 ELSE
        0 END", "Quality of Sleep is integer-like (no fractional part)", lambda x:
        x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: a5823dfc-edb5-4593-a572-b64d4df23d54
      source_assumptions:
      - 6aae2db5-e837-4a40-823e-126ad52fa398
    - suggestion: '.satisfies("CASE WHEN CAST(`Quality of Sleep` AS INT) BETWEEN 0
        AND 10 THEN 1 ELSE 0 END", "Quality of Sleep in [0,10]", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 3b9e99a2-f999-4cfa-9111-fd665d4fc7e9
      source_assumptions:
      - f7bb735a-1fc3-4051-af44-04a0ceb52523
    assumptions:
    - text: 'The ''Quality of Sleep'' column must contain no null values in the input.
        The code converts the column to numeric (coercing invalid values to NaN) and
        then immediately performs q.astype(int) which will raise or produce incorrect
        results if any NaNs are present. Example validation (Deequ/Great Expectations
        style):

        - Deequ-like: .satisfies("CASE WHEN `Quality of Sleep` IS NOT NULL THEN 1
        ELSE 0 END", "No null Quality of Sleep", lambda x: x == 1)

        - Great Expectations: expect_column_values_to_not_be_null(''Quality of Sleep'')'
      sources:
      - start_line: 19
        end_line: 25
        file: ''
      - start_line: 39
        end_line: 41
        file: ''
      uid: 2c80f47c-9809-4da0-b332-986e17a0b1f5
    - text: 'All non-null values in ''Quality of Sleep'' must be integer-like (no
        fractional values). The code computes int_like on dropna and then casts the
        whole column to int (q.astype(int)), so fractional values would be unexpected
        and may change semantics. Example validation:

        - Deequ-like: .satisfies("CASE WHEN `Quality of Sleep` IS NOT NULL AND CAST(`Quality
        of Sleep` AS DOUBLE) = FLOOR(CAST(`Quality of Sleep` AS DOUBLE)) THEN 1 ELSE
        0 END", "Quality is integer", lambda x: x == 1)

        - Great Expectations: expect_column_values_to_be_in_type_list(''Quality of
        Sleep'', [''INTEGER'']) or a custom expectation checking floor(value)==value'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      uid: 6aae2db5-e837-4a40-823e-126ad52fa398
    - text: 'Values in ''Quality of Sleep'' must be valid integer indices into the
        quality_penalty_map, i.e. within the inclusive range 0 through 10. The code
        uses the integer values to index an array of length 11 (quality_penalty_map)
        and uses those values downstream in the risk score; out-of-range or negative
        indices would produce incorrect mapping or indexing errors. Example validation:

        - Deequ-like: .satisfies("CASE WHEN `Quality of Sleep` BETWEEN 0 AND 10 THEN
        1 ELSE 0 END", "Quality in [0,10]", lambda x: x == 1)

        - Great Expectations: expect_column_values_to_be_between(''Quality of Sleep'',
        min_value=0, max_value=10)'
      sources:
      - start_line: 42
        end_line: 43
        file: ''
      - start_line: 41
        end_line: 41
        file: ''
      uid: f7bb735a-1fc3-4051-af44-04a0ceb52523
    - text: 'The ''Quality of Sleep'' values must be numeric-convertible (strings
        that represent numbers are acceptable). The code calls pd.to_numeric(...,
        errors=''coerce'') before further processing; if values are not convertible
        to numeric the coercion will produce NaNs and lead to failure due to the assumptions
        above. Example validation:

        - Deequ-like: .satisfies("CASE WHEN TRY_CAST(`Quality of Sleep` AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END", "Numeric convertible Quality", lambda x: x
        == 1)

        - Great Expectations: expect_column_values_to_match_regex(''Quality of Sleep'',
        r''^\d+(\.0+)?$'') or a custom check that casting to float does not produce
        null'
      sources:
      - start_line: 19
        end_line: 25
        file: ''
      uid: 2f323963-beb7-4efb-9ae2-bdfb1cedadb1
  BMI Category:
    code:
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: error
