        Pressure'', r''^\s*\d+\s*/\s*\d+\s*$'')

        Example Deequ-like check: .satisfies("CASE WHEN TRY_CAST(split_part(`Blood
        Pressure`, ''/'', 1) AS INT) IS NOT NULL AND TRY_CAST(split_part(`Blood Pressure`,
        ''/'', 2) AS INT) IS NOT NULL THEN 1 ELSE 0 END","BP parts integer-convertible",
