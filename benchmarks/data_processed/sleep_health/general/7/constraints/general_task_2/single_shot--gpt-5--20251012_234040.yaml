constraints:
  Age:
    code:
    - - '.hasMax(''Age'', lambda v: v <= 120)'
      - Valid
    - - '.hasMin(''Age'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    - - '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) > cast(split(`Blood
        Pressure`, ''/'')[1] as int)", ''bp_sys_gt_dia'', lambda v: v >= 0.98)'
      - Valid
    - - '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) BETWEEN 80 AND
        200", ''bp_systolic_range'', lambda v: v >= 0.98)'
      - Valid
    - - '.satisfies("cast(split(`Blood Pressure`, ''/'')[1] as int) BETWEEN 50 AND
        120", ''bp_diastolic_range'', lambda v: v >= 0.98)'
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - '.hasMax(''Daily Steps'', lambda v: v <= 50000)'
      - Valid
    - - '.hasMin(''Daily Steps'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Daily Steps')
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - '.hasMax(''Heart Rate'', lambda v: v <= 220)'
      - Valid
    - - '.hasMin(''Heart Rate'', lambda v: v >= 40)'
      - Valid
    - - .isComplete('Heart Rate')
      - Valid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    - - .isContainedIn('Occupation', ['Nurse', 'Software Engineer', 'Sales Representative',
        'Engineer', 'Lawyer', 'Teacher', 'Accountant', 'Salesperson', 'Scientist',
        'Doctor'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - '.hasMax(''Physical Activity Level'', lambda v: v <= 100)'
      - Valid
    - - '.hasMin(''Physical Activity Level'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.hasMax(''Quality of Sleep'', lambda v: v <= 10)'
      - Valid
    - - '.hasMin(''Quality of Sleep'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda v: v >= 0.40)'
      - Valid
    - - .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - '.hasMax(''Sleep Duration'', lambda v: v <= 24.0)'
      - Valid
    - - '.hasMin(''Sleep Duration'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - '.hasMax(''Stress Level'', lambda v: v <= 10)'
      - Valid
    - - '.hasMin(''Stress Level'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
