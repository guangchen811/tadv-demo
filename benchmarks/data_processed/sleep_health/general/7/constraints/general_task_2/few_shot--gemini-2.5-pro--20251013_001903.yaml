constraints:
  BMI Category:
    code:
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isBetween('Quality of Sleep', 1, 10, inclusive=True)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .compliesWith('`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ("Sleep Apnea",
        "Insomnia")')
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .isBetween('Stress Level', 1, 10, inclusive=True)
      - Invalid
    assumptions: []
