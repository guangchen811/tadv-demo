constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isGreaterThan('Age', 17)
      - Invalid
    - - .isLessThan('Age', 100)
      - Invalid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'^\\d{2,3}/\\d{2,3}$')
      - Invalid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isGreaterThanOrEqualTo('Daily Steps', 0)
      - Invalid
    - - .isLessThanOrEqualTo('Daily Steps', 15000)
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    - - .isGreaterThan('Heart Rate', 20)
      - Invalid
    - - .isLessThan('Heart Rate', 250)
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isGreaterThanOrEqualTo('Physical Activity Level', 0)
      - Invalid
    - - .isLessThanOrEqualTo('Physical Activity Level', 120)
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGreaterThan('Quality of Sleep', 0)
      - Invalid
    - - .isLessThan('Quality of Sleep', 11)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.4)'
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isGreaterThan('Sleep Duration', 2.9)
      - Invalid
    - - .isLessThan('Sleep Duration', 24.0)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isGreaterThan('Stress Level', 0)
      - Invalid
    - - .isLessThan('Stress Level', 11)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
