constraints:
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'^\\d+/\\d+$')
      - Invalid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isBetween('Physical Activity Level', 0, 100)
      - Invalid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isBetween('Quality of Sleep', 4, 9)
      - Invalid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .satisfies('`Sleep Duration` > 2.99 AND `Sleep Duration` <= 14.01', 'Sleep
        Duration within bounds for log/sqrt')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .isBetween('Stress Level', 3, 8)
      - Invalid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
