        ID") or .satisfies("CASE WHEN count_distinct(`Person ID`) / count(*) >= 0.99
        THEN 1 ELSE 0 END", "Person ID approx unique", lambda x: x == 1) or Great
        Expectations: expect_compound_columns_to_be_unique([''Person ID'']). If duplicates
        are allowed by design, relax this to an expectation that duplicates are rare
