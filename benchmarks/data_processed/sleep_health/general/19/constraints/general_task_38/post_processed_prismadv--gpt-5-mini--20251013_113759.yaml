fixing_results:
  Quality of Sleep:
    324ac1c7-ec1e-4397-a2e6-df5ea7c167e8: '.hasNumberOfDistinctValues("Quality of
      Sleep", lambda x: x >= 2, None, 100)'
  Sleep Disorder:
    f6640e0b-c30b-4161-a8c4-59550384ecc1: '.satisfies("CASE WHEN `Sleep Disorder`
      IS NULL THEN 1 WHEN `Sleep Disorder` IN (''Sleep Apnea'',''Insomnia'') THEN
      1 ELSE 0 END", "Allowed Sleep Disorder categories", lambda x: x >= 0.95)'
  '["Blood Pressure","DBP","SBP"]':
    dfc7e92f-b366-4aab-95a4-0c42d3650e54: '.satisfies("CASE WHEN `Blood Pressure`
      RLIKE ''^\\d{2,3}/\\d{2,3}$'' THEN CASE WHEN split(`Blood Pressure`, ''/'')[0]
      RLIKE ''^\\d{2,3}$'' AND split(`Blood Pressure`, ''/'')[1] RLIKE ''^\\d{2,3}$''
      THEN 1 ELSE 0 END ELSE 1 END", "BP_parse_has_parts", lambda x: x == 1)'
    ff2d3d48-5b12-4c9e-adec-d9aeab15df1c: '.satisfies("CASE WHEN `Blood Pressure`
      IS NOT NULL AND instr(`Blood Pressure`,''/'')>0 THEN CASE WHEN CAST(element_at(split(`Blood
      Pressure`,''/''),1) AS INT) >= CAST(element_at(split(`Blood Pressure`,''/''),2)
      AS INT) THEN 1 ELSE 0 END ELSE 1 END", "systolic_ge_diastolic", lambda x: x
      == 1)'
