      - start_line: 29
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 71
        file: ''
      - start_line: 131
        end_line: 134
        file: ''
      uid: 91265b7b-f6ba-4845-a692-2b2c9dd7289f
  '["DBP","SBP"]':
    code: []
    assumptions:
    - text: 'SBP and DBP are parsed together from the same ''Blood Pressure'' string
        and should co-occur: for every record either both SBP and DBP are non-null
        or both are null. Actionable check (Deequ-style): .satisfies(''isNull(SBP)
        == isNull(DBP)'', ''sbp_dbp_coexistence'')'
      sources:
      - start_line: 26
        end_line: 30
        file: ''
      uid: 46416e32-ff4a-41e6-9e62-47f82efc2321
    - text: 'Systolic pressure (SBP) should be greater than or equal to diastolic
        pressure (DBP) for each record (i.e., SBP >= DBP), since pulse pressure PP
        is computed as SBP - DBP and negative PP is physiologically suspicious. Actionable
        check: .satisfies(''SBP >= DBP'', ''sbp_ge_dbp'')'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      uid: 59026210-32d1-4640-8a54-e1594e1be5b6
    - text: 'Derived fields PP and MAP must be consistent with SBP and DBP: PP ==
        SBP - DBP and MAP == DBP + PP / 3.0 (allow a small numeric tolerance when
        implementing). Actionable checks: .satisfies(''abs(PP - (SBP - DBP)) < 1e-6'',
        ''pp_consistent'') and .satisfies(''abs(MAP - (DBP + (SBP - DBP)/3.0)) < 1e-6'',
        ''map_consistent'')'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      uid: a7531ec4-840d-41ee-8816-affd3a139577
    - text: 'Because the regex extraction expects 2-3 digit numbers for each component,
        SBP and DBP should be integers within the 2-3 digit range produced by the
        parser (practical numeric bounds: e.g., 10 <= SBP <= 999 and 10 <= DBP <=
        999). Actionable check: .satisfies(''SBP >= 10 AND SBP <= 999 AND DBP >= 10
        AND DBP <= 999'', ''sbp_dbp_bounds'')'
      sources:
      - start_line: 26
        end_line: 29
        file: ''
      uid: 65a73829-59a3-4ee7-8a4e-bb4e98803276
  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'There must be a non-trivial set of rows where both ''Daily Steps'' and
        ''Physical Activity Level'' are present (non-null) and numeric. The downstream
        code computes correlations, regressions and quantiles on these two columns,
        so require at least 30 rows where both columns are non-null. An actionable
        constraint example (Deequ-style): .hasNonNullCount([''Daily Steps'',''Physical
        Activity Level'']) >= 30'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      uid: 8864c01c-bffd-4684-a4fa-18fc234f008d
    - text: 'The two columns should each exhibit non-zero variability (std > 0) across
        the rows used for modelling. The code guards constant vectors but depends
        on finite std to compute a meaningful slope/correlation and to avoid producing
        all-NaN ''pal_from_steps'' and downstream NaNs. An actionable constraint example:
        ensure std(Daily Steps) > 0 and std(Physical Activity Level) > 0 (or equivalently:
        distinct count > 1 for each column). In Deequ terms: .hasDistinctness(''Daily
        Steps'') > 0.0 AND .hasDistinctness(''Physical Activity Level'') > 0.0 (or
        require distinct count >= 2).'
      sources:
      - start_line: 54
        end_line: 61
        file: ''
      uid: d1dd5d93-de5f-450e-92c5-d4ab73e7e55e
    - text: 'The combined derived metric ''activity_blend'' (which mixes the original
        ''Physical Activity Level'' and a regression-based estimate from ''Daily Steps'')
        must have non-zero range so quantile based scaling is meaningful. Concretely,
        activity_blend.quantile(0.9) should be strictly greater than activity_blend.quantile(0.1),
        and activity_blend should not be all-NaN. An actionable constraint example:
        require activity_blend_q90 > activity_blend_q10 and .hasCompleteness([''activity_blend''])
        >= 0.9 (or at least > 0.0 to ensure some values exist).'
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 92
        end_line: 93
        file: ''
      uid: e1f63eba-f7a8-43fb-a54f-6f40a3c23194
  '["Daily Steps","Physical Activity Level","activity_blend","activity_protect"]':
    code: []
    assumptions:
    - text: 'There must be a sufficient number of rows where both ''Daily Steps''
        and ''Physical Activity Level'' are present and numeric so that a correlation
        / linear calibration can be estimated. Concretely: require that the pair (Daily
        Steps, Physical Activity Level) is non-null for a non-trivial fraction of
        the dataset (e.g., completeness > 0 and preferably > 0.9). This enables the
        code that computes np.corrcoef(steps, pal) and the regression-like pal_from_steps
        to operate on real data.'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      - start_line: 57
        end_line: 63
        file: ''
      uid: 6662c38e-9bed-4d40-8965-e635708ed44d
    - text: '''Daily Steps'' and ''Physical Activity Level'' should not be constant
        vectors (each should have more than one distinct value / std > 0). If either
        column is constant (std == 0) the code sets corr_steps_pal = NaN and pal_from_steps
        will be degenerate, causing many downstream derived values to be NaN/meaningless.
        A practical constraint: approxNumDistinctValues(Daily Steps) > 1 AND approxNumDistinctValues(Physical
        Activity Level) > 1 (or population std > 0).'
      sources:
      - start_line: 54
        end_line: 59
        file: ''
      uid: 45d25720-58f4-47af-8ec5-05459e34f396
    - text: The derived column 'activity_blend' must be computable (non-null / finite)
        for a sufficient number of rows so that quantiles (0.1 and 0.9) are defined
        and act_index can be derived. In practice require completeness(activity_blend)
        > 0 (preferably > 0.9) and that activity_blend contains finite values (no
        inf/NaN) for enough rows to compute quantile(0.1) and quantile(0.9).
      sources:
      - start_line: 60
        end_line: 63
        file: ''
      - start_line: 92
        end_line: 94
        file: ''
      uid: 2907365f-ab6c-4980-9f93-07b856a1269f
    - text: '''activity_protect'' should lie in [0.0, 1.0] and be (strongly) negatively
        associated with ''activity_blend'' (higher activity_blend should correspond
        to lower activity_protect). This follows from activity_protect = 1.0 - scale01(activity_blend,
        q10, q90). A practical multicolumn check: activity_protect values in [0,1]
        and Spearman (or Pearson) correlation between activity_blend and activity_protect
        is strongly negative (e.g., correlation <= -0.8).'
      sources:
      - start_line: 92
        end_line: 94
        file: ''
      - start_line: 63
        end_line: 63
        file: ''
      - start_line: 1116
        end_line: 1117
        file: ''
      uid: b704cb7f-d9e5-4436-9447-ee144ea4ae1a
  '["Heart Rate","hr_index"]':
    code: []
    assumptions:
    - text: The column 'hr_index' is computed deterministically from 'Heart Rate'
        using the scale01 mapping with lo=55.0 and hi=95.0. Concretely, for each row
        hr_index == clip((Heart Rate - 55.0) / (95.0 - 55.0 + 1e-9), 0.0, 1.0). This
        can be enforced as a multi-column constraint that checks the equality (within
        a small numerical tolerance) between hr_index and the scaled Heart Rate.
      sources:
      - start_line: 67
        end_line: 68
        file: ''
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      uid: 3e461229-a9c4-43fe-8f6d-8d81abe07262
    - text: All rows that are written to the detailed output are expected to have
        a valid numeric 'Heart Rate' so that 'hr_index' can be computed for them (i.e.,
        Heart Rate converts to numeric without resulting NaN and hr_index is not null).
        In other words, after pd.to_numeric(errors='coerce') on 'Heart Rate' there
        should be no nulls in 'Heart Rate' and no nulls in 'hr_index' for rows included
        in the output file.
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      - start_line: 131
        end_line: 134
        file: ''
      uid: 795a5e2a-c91c-44f5-ab34-22511f015682
    - text: The derived 'hr_index' must lie in the closed interval [0.0, 1.0] and
        be finite for every row used in scoring. This is expected because scale01
        clips values to [0,1] and hr_index is later combined into 'risk_score'; enforce
        the multi-column constraint that hr_index is between 0 and 1 and not NaN/Inf.
      sources:
      - start_line: 67
        end_line: 68
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      - start_line: 109
        end_line: 119
        file: ''
      uid: 762c87a3-2d70-4ef5-ae6e-11178b363f71
    - text: Because hr_index is a monotonic increasing linear transform of Heart Rate
        (positive slope mapping from Heart Rate to hr_index), the ordering of rows
        by 'Heart Rate' should be preserved by 'hr_index' (i.e., Heart Rate_a > Heart
        Rate_b implies hr_index_a >= hr_index_b, except where clipping at 0/1 occurs).
        This can be checked as a multi-column monotonicity constraint between 'Heart
        Rate' and 'hr_index' (allowing ties and accounting for clipping at bounds).
      sources:
      - start_line: 67
        end_line: 68
        file: ''
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 82
        end_line: 82
        file: ''
      uid: f7cd53f1-3cd6-4abe-854f-5331453857f6
  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Both ''Sleep Duration'' and ''Quality of Sleep'' must be present, numeric
        (coercible to float), and non-null for every row so that the subsequent correlation/regression
        and residual computations produce meaningful values. Actionable checks: isComplete([''Sleep
        Duration'',''Quality of Sleep'']) and that pd.to_numeric on these columns
        does not produce NaNs (or equivalently all values are numeric strings / numbers).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 36
        end_line: 42
        file: ''
      uid: 040f05bc-27de-4202-b0d7-1bcec6d88c3a
    - text: 'The pair (''Sleep Duration'', ''Quality of Sleep'') should not be constant
        columns: each column must have non-zero variance (std > 0) across the dataset
        so that correlation and the regression-derived prediction (pred_quality) are
        defined and not degenerate. Actionable check: assert df[''Sleep Duration''].std(ddof=0)
        > 0 and df[''Quality of Sleep''].std(ddof=0) > 0 (or a Deequ custom constraint
        requiring std > 0 for both columns).'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: 9350bb38-fcb9-4767-b315-b1013d4a5474
    - text: 'Values for the two columns must lie in realistic, bounded ranges together:
        ''Sleep Duration'' should represent hours-of-sleep in a plausible range (e.g.,
        0.0 <= Sleep Duration <= 24.0) and ''Quality of Sleep'' should lie within
        the expected subjective/ordinal scale (e.g., 0 <= Quality of Sleep <= 10).
        These bounds ensure the sleep_debt calculation (8.0 - hours) and the quality
        regression produce interpretable results. Actionable checks: between(''Sleep
        Duration'', 0.0, 24.0) && between(''Quality of Sleep'', 0.0, 10.0).'
      sources:
      - start_line: 36
        end_line: 38
        file: ''
      - start_line: 42
        end_line: 42
        file: ''
      uid: 640a9eb8-1d11-45c1-aee8-10ab770cab03
    - text: 'The combination of ''Sleep Duration'' and ''Quality of Sleep'' should
        produce finite, non-NaN predicted quality and residual values (pred_quality
        and restfulness_residual). In practice this means (a) both columns have finite
        numeric values (no +inf/-inf), and (b) the computed correlation/regression
        does not produce NaN/Inf. Actionable checks: no NaNs in the derived columns
        pred_quality/restfulness_residual (or equivalently assert isFinite(pred_quality)
        and isFinite(restfulness_residual) after computing them).'
      sources:
      - start_line: 44
        end_line: 51
        file: ''
      - start_line: 86
        end_line: 89
        file: ''
      uid: e9c03498-9bc1-4bbc-9f5b-3e2de1ab4abe
  '["Stress Level","stress_index"]':
    code: []
    assumptions:
    - text: 'The column ''stress_index'' must equal the scaled transformation of ''Stress
        Level'' using scale01 with lo=3.0 and hi=8.0. Concretely: stress_index = clip((Stress
        Level - 3.0) / (8.0 - 3.0), 0.0, 1.0). Implement as a multi-column constraint
        that recomputes the scaled value from ''Stress Level'' (after numeric coercion)
        and checks equality to ''stress_index'' within a small floating tolerance
        (e.g., 1e-6).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 81
        end_line: 83
        file: ''
      uid: f550f9f8-e850-424a-9410-247c0f6491da
    - text: 'The ''risk_score'' column must equal the (possibly clipped) weighted
        sum of component indices: risk_score = clip(0.25*bp_index + 0.20*bmi_risk
        + 0.15*age_index + 0.10*stress_index + 0.10*hr_index + 0.15*sleep_risk + 0.10*activity_protect
        + apnea_component, 0.0, 1.0). Implement as a multi-column constraint that
        computes this sum from the listed columns and verifies that ''risk_score''
        equals the clipped sum within a small tolerance.'
      sources:
      - start_line: 110
        end_line: 119
        file: ''
      uid: ed6f15ec-6216-4b28-a90c-c505c7f77a51
    - text: 'The boolean ''prioritized_for_outreach'' must be set exactly for the
        top quartile of ''risk_score'': prioritized_for_outreach == (risk_score >=
        quantile(risk_score, 0.75)). Implement as a dataset-level multi-column constraint
        that computes the 0.75 quantile of ''risk_score'' and checks that each row''s
        boolean matches the comparison.'
      sources:
      - start_line: 121
        end_line: 123
        file: ''
      uid: 5404a645-c352-4a97-8b31-97ba206c5283
    - text: 'The relationship between ''Stress Level'' and ''stress_index'' should
        be monotonic non-decreasing: for any two rows i,j, if Stress Level_i > Stress
        Level_j then stress_index_i >= stress_index_j. This guards consistency of
        the scaling mapping and can be expressed as a pairwise (or binned) monotonicity
        constraint between the two columns.'
      sources:
      - start_line: 81
        end_line: 83
        file: ''
      uid: 04c94af4-8b51-482a-ab4f-8b70e28d8011
  '["prioritized_for_outreach","risk_score"]':
    code: []
    assumptions:
    - text: 'The column ''risk_score'' is computed as the clipped weighted sum of
        the component columns: 0.25*bp_index + 0.20*bmi_risk + 0.15*age_index + 0.10*stress_index
        + 0.10*hr_index + 0.15*sleep_risk + 0.10*activity_protect + apnea_component,
        then clipped to [0.0, 1.0]. Actionable check: for non-null rows assert abs(risk_score
        - clip(weighted_sum,0,1)) <= epsilon (small tolerance, e.g. 1e-6). In Deequ-like
        form you can implement a row-level constraint that counts rows where abs(risk_score
        - clipped_weighted_sum) > tol and asserts that count == 0 or is very small.'
      sources:
      - start_line: 109
        end_line: 119
        file: ''
      uid: 76e3b970-9f82-4e0c-b746-1209a06880c4
    - text: 'The boolean ''prioritized_for_outreach'' is determined by comparing ''risk_score''
        to the dataset 75th percentile (threshold = risk_score.quantile(0.75)). Actionable
        checks: (a) compute threshold = quantile(risk_score, 0.75) and assert for
        all rows prioritized_for_outreach == (risk_score >= threshold) (ties may allow
        slightly more than 25% flagged); (b) ensure no rows are flagged True with
        risk_score < threshold and no rows are flagged False with risk_score > threshold
        (or report count of violations).'
      sources:
      - start_line: 121
        end_line: 123
        file: ''
      uid: baf1d26c-aaec-4475-9797-4a76b3a7bf2e
    - text: "Approximately the top quartile of records (\u224825% of non-null risk_score\
        \ rows) should have prioritized_for_outreach == True. Actionable check: fraction(prioritized_for_outreach\
        \ == True) \u2248 0.25 within a small tolerance (allowing for ties at the\
        \ threshold), i.e. abs(frac_true - 0.25) <= delta (choose delta, e.g. 0.02)."
      sources:
      - start_line: 121
        end_line: 123
        file: ''
      uid: e25279eb-27c7-49e4-82d4-cc9d37ea0733
    - text: 'Blood-pressure-derived columns must be internally consistent: for rows
        where SBP and DBP are numeric and non-null, PP == SBP - DBP and MAP == DBP
        + PP/3.0, and bp_index equals scale01(MAP, 85.0, 130.0) (within numeric tolerance).
        Actionable checks: assert abs(PP - (SBP - DBP)) <= tol and abs(MAP - (DBP
        + PP/3.0)) <= tol and abs(bp_index - clipped((MAP-85)/(130-85))) <= tol for
        non-null rows.'
      sources:
      - start_line: 26
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 71
        file: ''
      uid: 20f72e8d-2c73-4bc2-a60f-9b160b3ea979
    - text: 'The apnea_component should be > 0 only for rows where Sleep Disorder
        == ''Sleep Apnea'' (and its magnitude depends on BMI Category). Conversely,
        rows without Sleep Apnea should have apnea_component == 0. Actionable checks:
        assert all rows with Sleep Disorder != ''Sleep Apnea'' have apnea_component
        == 0 (or very near 0) and all rows with Sleep Disorder == ''Sleep Apnea''
        have apnea_component >= 0, with additional expectation that overweight/obese
        Sleep Apnea rows have larger apnea_component on average (dataset-level check).'
      sources:
      - start_line: 96
        end_line: 106
        file: ''
      uid: 4fc68a27-e5cf-4f90-9c54-becadcd3b0a6
