    use_dataflow: true
    correlation_detection: true
    downstream_task_description: No specific description provided. The script can
      be used for any task.
  llm:
    model_name: gpt-5-mini
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  Physical Activity Level:
    code:
    - suggestion: '.hasCompleteness(''Physical Activity Level'', lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: deaa8015-dfb0-4417-87a5-970cf26e5eff
      source_assumptions:
      - d38008b3-dc33-42c9-a6c7-c2b5099609e4
      - a22cdf2a-8404-4e88-923f-22e631f7f707
      - 91e442d8-e4f5-48c3-99f4-bdfb449c2f69
    - suggestion: '.hasDataType(''Physical Activity Level'', ''Numeric'', lambda x:
        x >= 0.95)'
      validity: false
      reason_if_invalid: 'Skipping data type constraint: .hasDataType(''Physical Activity
        Level'', ''Numeric'', lambda x: x >= 0.95)'
      level: error
      uid: f78e4c91-8d36-48b2-960c-3bddc3e64220
      source_assumptions:
      - a22cdf2a-8404-4e88-923f-22e631f7f707
    - suggestion: '.hasNumberOfDistinctValues(''Physical Activity Level'', lambda
        x: x >= 2)'
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''Physical
        Activity Level'', lambda x: x >= 2)'': Check.hasNumberOfDistinctValues() missing
        2 required positional arguments: ''binningUdf'' and ''maxBins'''
      level: error
      uid: f5f06891-735d-497e-a992-fcc2c8b5ced3
      source_assumptions:
      - 7d3b0725-57e7-415e-b899-0f0ce15352d2
    - suggestion: '.hasSize(lambda s: s >= 100)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 3bd8f513-ce5e-4828-81e5-3bf2afc46318
      source_assumptions:
      - 91e442d8-e4f5-48c3-99f4-bdfb449c2f69
    assumptions:
    - text: The input must contain a column named 'Physical Activity Level'. The code
        uses this column without checking its presence (it is included in numeric
        coercion and later accessed directly), so the column must exist in the input
        CSV.
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 55
        end_line: 55
        file: ''
      uid: d38008b3-dc33-42c9-a6c7-c2b5099609e4
    - text: 'The ''Physical Activity Level'' values must be numeric (or string values
        that can be losslessly coerced to numeric) and finite. The code first coerces
        to numeric (pd.to_numeric with errors=''coerce'') and then casts to float
        and performs arithmetic; if many values fail coercion to numeric the downstream
        computations (correlation, means, quantiles) will produce NaNs. A practical
        validation rule: after coercion to numeric, at least 95% of rows should be
        non-null and finite. Example Deequ-style constraint: .satisfies("CASE WHEN
        `Physical Activity Level` IS NOT NULL AND `Physical Activity Level` NOT IN
        (''NaN'',''nan'') THEN 1 ELSE 0 END", "PAL_non_null_finite", lambda x: x >=
        0.95).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: a22cdf2a-8404-4e88-923f-22e631f7f707
    - text: 'The ''Physical Activity Level'' column must have variability (not be
        a constant column). The code relies on its standard deviation (pal.std) to
        compute correlation and a regression-based prediction from steps; if pal.std
        == 0 the correlation is treated as missing and the downstream ''activity_blend''
        will become invalid. Validate that the column has more than one distinct numeric
        value (distinct_count >= 2) or that std > 0. Example Great Expectations: expect_column_unique_value_count_to_be_between(column=''Physical
        Activity Level'', min_value=2).'
      sources:
      - start_line: 55
        end_line: 59
        file: ''
      - start_line: 60
        end_line: 63
        file: ''
      uid: 7d3b0725-57e7-415e-b899-0f0ce15352d2
    - text: 'There must be enough valid (numeric, finite) rows to compute quantiles
        and downstream statistics used for activity-based protection. The code computes
        activity_blend and then uses its 0.1 and 0.9 quantiles to scale activity;
        if most activity_blend values are NaN or if the column is too small, quantile()
        will be unreliable. Ensure a sufficiently large fraction of rows are numeric
        (e.g., >= 5% of the dataset and preferably >= 100 rows) or at least that the
        non-null count is > 1. Example Deequ-style constraint: .satisfies("CASE WHEN
        `Physical Activity Level` IS NOT NULL THEN 1 ELSE 0 END", "PAL_enough_non_null",
        lambda x: x >= 0.95).'
      sources:
      - start_line: 63
        end_line: 63
        file: ''
      - start_line: 92
        end_line: 94
        file: ''
      uid: 91e442d8-e4f5-48c3-99f4-bdfb449c2f69
  Quality of Sleep:
    code:
    - suggestion: '.hasCompleteness("Quality of Sleep", lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: ad8ecfbe-e2f0-46c1-bfb1-19d1a3fca007
      source_assumptions:
      - d98c9711-9631-4550-98b2-e11ccbfac4cb
    - suggestion: '.hasNumberOfDistinctValues("Quality of Sleep", lambda x: x >= 2,
        None, 100)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 324ac1c7-ec1e-4397-a2e6-df5ea7c167e8
      source_assumptions:
      - 0c9688f5-8dd8-4309-8a96-30b7aa9cb5c1
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` >= 0 AND `Quality of Sleep`
        <= 10 THEN 1 ELSE 0 END", "Quality of Sleep in [0,10]", lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: d8d71b89-c9e5-47fa-96e0-30bb3dddf013
      source_assumptions:
      - 4388f885-6630-4b4a-9c7d-f08f8dbc09f2
    - suggestion: '.satisfies("CASE WHEN floor(`Quality of Sleep`) = `Quality of Sleep`
        THEN 1 ELSE 0 END", "Quality of Sleep is integer", lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: ecbac2ad-83d1-402a-88f7-d0decdfaa1e6
      source_assumptions:
      - 3d4d4b26-3d95-4325-9fcd-f2912aef0808
    assumptions:
    - text: 'The ''Quality of Sleep'' column must be parseable as a numeric value.
        The code coerces this column to numeric (pd.to_numeric with errors=''coerce'')
        and then performs numeric operations, so non-numeric values will become NULL
        and will break downstream statistics if they are widespread. Suggested validation:
        check that a high fraction of rows are numeric/non-null (e.g. >= 95%). Example
        Deequ-like check: .satisfies("CASE WHEN `Quality of Sleep` IS NOT NULL THEN
        1 ELSE 0 END", "Non-null Quality of Sleep", lambda x: x >= 0.95).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 42
        end_line: 42
        file: ''
      uid: d98c9711-9631-4550-98b2-e11ccbfac4cb
    - text: 'The ''Quality of Sleep'' column should contain more than one distinct
        numeric value (i.e. variance > 0 / distinct count >= 2). If the column is
        constant (std == 0) the code sets correlation to NaN which propagates to predicted
        quality and produces NaNs in residuals; that in turn can make quantile-based
        computations fail. Example validation: .satisfies("countDistinct(`Quality
        of Sleep`) >= 2", "Quality of Sleep has variance", lambda x: x == True).'
      sources:
      - start_line: 44
        end_line: 51
        file: ''
      - start_line: 85
        end_line: 89
        file: ''
      uid: 0c9688f5-8dd8-4309-8a96-30b7aa9cb5c1
    - text: 'Values in ''Quality of Sleep'' are expected to lie in a bounded, human-interpretable
        range (for example a 0-10 or 1-10 sleep-quality scale). Out-of-range values
        are likely invalid and will distort means/standard deviations used for prediction
        and residuals. Example validation: .satisfies("CASE WHEN `Quality of Sleep`
        >= 0 AND `Quality of Sleep` <= 10 THEN 1 ELSE 0 END", "Quality of Sleep in
        [0,10]", lambda x: x >= 0.99).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 42
        end_line: 51
        file: ''
      uid: 4388f885-6630-4b4a-9c7d-f08f8dbc09f2
    - text: 'The ''Quality of Sleep'' values should be integral / discrete (no unexpected
        fractional values). The dataset describes this as an integral column and the
        code treats it as numeric; fractional values may indicate upstream data issues.
        Example validation: .satisfies("CASE WHEN floor(`Quality of Sleep`) = `Quality
        of Sleep` THEN 1 ELSE 0 END", "Quality of Sleep is integer", lambda x: x >=
        0.99).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 42
        end_line: 42
        file: ''
      uid: 3d4d4b26-3d95-4325-9fcd-f2912aef0808
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Normal'',''Normal Weight'',''Overweight'',''Obese'')
        THEN 1 ELSE 0 END", "Valid BMI Categories (exact match)", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: c5c9260a-5a53-443b-9a8c-bd8375b49740
      source_assumptions:
      - ee728fc2-d9b3-4ead-b11b-462778d00497
      - 4604a366-c064-4250-95cc-c9b00c465294
    - suggestion: '.satisfies("CASE WHEN TRIM(`BMI Category`) IN (''Overweight'',''Obese'')
        THEN 1 ELSE 0 END", "Presence of Overweight/Obese (>=1% rows)", lambda x:
        x >= 0.01)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 2ac3e4b0-4a62-4368-bbdb-ec2a10c51986
      source_assumptions:
      - 7f0c288a-33c8-4988-982f-8db1d40e60da
    assumptions:
    - text: 'The input ''BMI Category'' column should contain only the canonical categories:
        ''Normal'', ''Normal Weight'', ''Overweight'', or ''Obese''. The downstream
        mapping expects these exact labels and will treat any other value as ''unmapped''
        and assign a default risk (0.3). This can be expressed as a validation rule
        such as: .satisfies("CASE WHEN `BMI Category` IN (''Normal'',''Normal Weight'',''Overweight'',''Obese'')
        THEN 1 ELSE 0 END", "Valid BMI Categories", lambda x: x == 1.0).'
      sources:
      - start_line: 73
        end_line: 79
        file: ''
      - start_line: 98
        end_line: 99
        file: ''
      uid: ee728fc2-d9b3-4ead-b11b-462778d00497
    - text: 'Values in ''BMI Category'' must match the expected strings exactly (including
        capitalization and absence of leading/trailing whitespace), because the code
        uses exact string equality and .isin/.map on the cast string values. A practical
        check is to validate the trimmed value belongs to the allowed set, e.g.: .satisfies("CASE
        WHEN TRIM(`BMI Category`) IN (''Normal'',''Normal Weight'',''Overweight'',''Obese'')
        THEN 1 ELSE 0 END", "Normalized BMI Category", lambda x: x == 1.0).'
      sources:
      - start_line: 79
        end_line: 79
        file: ''
      - start_line: 98
        end_line: 99
        file: ''
      uid: 4604a366-c064-4250-95cc-c9b00c465294
    - text: 'Unexpected or missing BMI Category values will be mapped to a default
        risk (0.3) by the code (via .map(...).fillna(0.3)). To avoid large bias from
        this fallback, the fraction of rows with values outside the canonical set
        (or null) should be small (e.g., <= 5%). This can be represented as: .satisfies("CASE
        WHEN `BMI Category` IN (''Normal'',''Normal Weight'',''Overweight'',''Obese'')
        THEN 1 ELSE 0 END", "Fraction of mapped BMI Categories", lambda x: x >= 0.95).'
      sources:
      - start_line: 73
        end_line: 79
        file: ''
      uid: ba099ef1-ce4c-418b-aacc-9250884615fd
    - text: "The 'Overweight' and 'Obese' labels must be present and spelled exactly\
        \ when the input is expected to influence apnea-related logic: the code computes\
        \ overweight_obese = BMI Category in ['Overweight','Obese'] and uses that\
        \ boolean in apnea multiplier and apnea_component calculations. If these labels\
        \ are missing/misspelled the apnea effect will not be applied correctly. Validate\
        \ presence/spelling if apnea behavior is important (e.g., .satisfies(\"CASE\
        \ WHEN `BMI Category` IN ('Overweight','Obese') THEN 1 ELSE 0 END\", \"Has\
        \ Overweight/Obese Labels\", lambda x: x >= 0.0) \u2014 or stronger: >= a\
        \ domain-specific minimum proportion)."
      sources:
      - start_line: 98
        end_line: 106
        file: ''
      uid: 7f0c288a-33c8-4988-982f-8db1d40e60da
  Blood Pressure:
    code:
    - suggestion: '.satisfies("CASE WHEN cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        1) AS INT) BETWEEN 70 AND 250 AND cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        2) AS INT) BETWEEN 30 AND 150 AND cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        1) AS INT) > cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        2) AS INT) THEN 1 ELSE 0 END", "Physiologic BP ranges and ordering", lambda
        x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 14396268-95f4-479d-99e8-84cba7df445f
      source_assumptions:
      - 8754e5b4-648f-4744-9aec-01d88deb15d8
    assumptions:
    - text: 'The ''Blood Pressure'' column values should contain a systolic/diastolic
        pair as two- or three-digit integers separated by a slash (for example ''120/80'').
        In other words the input should include a substring matching the regex ^[0-9]{2,3}/[0-9]{2,3}$
        (or at least contain such a numeric pair). This is required because the code
        extracts SBP and DBP using a regex and then converts them to numeric before
        computing PP and MAP. We expect the vast majority of rows (e.g. >= 95%) to
        match this pattern so downstream numeric features are available. A corresponding
        Deequ/GE-style check could be: .satisfies("CASE WHEN regexp_like(`Blood Pressure`,
        ''^[0-9]{2,3}/[0-9]{2,3}$'') THEN 1 ELSE 0 END", "Valid BP format", lambda
        x: x >= 0.95).'
      sources:
      - start_line: 27
        end_line: 29
        file: ''
      - start_line: 32
        end_line: 33
        file: ''
      uid: fb7b6f34-5c0d-4320-8157-365a9e16502b
    - text: 'SBP and DBP must be parseable as integers for most rows. The code relies
        on extracting SBP and DBP and then calling pd.to_numeric(errors=''coerce'')
        and using those numeric values to compute PP and MAP. Therefore the input
        should not contain non-numeric or malformed systolic/diastolic values for
        a large fraction of rows (recommend >= 95% parsed successfully). Example Deequ/GE
        check: .satisfies("CASE WHEN cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        1) AS DOUBLE) IS NOT NULL AND cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        2) AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Parsable SBP/DBP", lambda x:
        x >= 0.95).'
      sources:
      - start_line: 28
        end_line: 30
        file: ''
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 71
        file: ''
      uid: 243ce977-468e-44ac-873a-d43a6057306b
    - text: 'Systolic (SBP) and diastolic (DBP) values should lie in plausible physiological
        ranges and SBP should be greater than DBP for valid records. For example enforce
        SBP in roughly [70, 250] and DBP in roughly [30, 150], and SBP > DBP for most
        rows (recommend >= 95%). This prevents invalid MAP/PP computations and reduces
        propagation of NaNs into risk_score. Example check: .satisfies("CASE WHEN
        cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'', 1) AS
        INT) BETWEEN 70 AND 250 AND cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        2) AS INT) BETWEEN 30 AND 150 AND cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        1) AS INT) > cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        2) AS INT) THEN 1 ELSE 0 END", "Physiologic BP ranges and ordering", lambda
        x: x >= 0.95).'
      sources:
      - start_line: 28
        end_line: 33
        file: ''
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 71
        file: ''
      uid: 8754e5b4-648f-4744-9aec-01d88deb15d8
    - text: 'The ''Blood Pressure'' field should not be logically empty or consist
        of placeholder strings for most rows. The code casts values to string and
        then attempts regex extraction; placeholder text (e.g., '''', ''N/A'', ''unknown'')
        or missing values will fail to extract and produce NaNs that propagate into
        MAP and risk_score. Require a high non-empty/valid-string rate (recommend
        >= 95%). Example check: .satisfies("CASE WHEN `Blood Pressure` IS NOT NULL
        AND trim(`Blood Pressure`) <> '''' THEN 1 ELSE 0 END", "Non-empty BP", lambda
        x: x >= 0.95).'
      sources:
      - start_line: 27
        end_line: 29
        file: ''
      - start_line: 131
        end_line: 135
        file: ''
      uid: 22ef1f1f-dd0a-478a-a0e4-d257bb36282b
    - text: 'If unit labels or extra text are present, they must not obscure the numeric
        ''NNN/NNN'' pair: the input must contain a plain numeric slash pair somewhere
        in the string (e.g., ''120/80 mmHg'' is acceptable only if the ''120/80''
        substring is present). The regex extraction in the code only captures two-
        or three-digit numbers separated by ''/'', so values without that substring
        will not parse. Example check: .satisfies("CASE WHEN regexp_like(`Blood Pressure`,
        ''([0-9]{2,3}/[0-9]{2,3})'') THEN 1 ELSE 0 END", "Contains numeric BP pair",
        lambda x: x >= 0.95).'
      sources:
      - start_line: 27
        end_line: 29
        file: ''
      - start_line: 28
        end_line: 28
        file: ''
      uid: c609d894-2bde-4eb2-9c72-7c1d6338bb8e
