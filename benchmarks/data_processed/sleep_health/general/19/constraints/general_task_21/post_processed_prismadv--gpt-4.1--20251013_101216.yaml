    - text: The relationship between 'Quality of Sleep' and 'Sleep Duration' assumes
        that higher values of 'Quality of Sleep' (on a scale presumably up to 10)
        proportionally increase the effective 'restful_hours', i.e., 'restful_hours'
        = 'Sleep Duration' * ('Quality of Sleep'/10). This assumes that 'Quality of
        Sleep' values are on a consistent scale, typically between 0 and 10, and that
        the computation is meaningful for all records.
      sources:
      - start_line: 26
        end_line: 30
        file: ''
      - start_line: 118
        end_line: 118
        file: ''
      uid: 2b06fe18-2994-4ccd-8477-11e9506b714b
    - text: For the flag 'low_qos_long_sleep', the code assumes that a record with
        'Quality of Sleep' <= 6 and 'Sleep Duration' >= 7 is a meaningful condition.
        This means both columns must be numeric and on comparable scales, and the
        thresholds 6 (for Quality of Sleep) and 7 (for Sleep Duration) are valid for
        all rows.
      sources:
      - start_line: 75
        end_line: 75
        file: ''
      uid: 7509de75-5580-40bd-86d3-704adc535a79
    - text: 'The combination of ''Quality of Sleep'', ''Sleep Duration'', and the
        derived ''restful_hours'' must be consistent: for every row, ''restful_hours''
        should equal ''Sleep Duration'' * (''Quality of Sleep''/10) within a small
        numerical tolerance.'
      sources:
