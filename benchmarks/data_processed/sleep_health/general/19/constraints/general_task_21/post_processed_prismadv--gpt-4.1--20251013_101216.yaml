        Apnea' groups to calibrate a stress threshold. Thus, there must be at least
        one row with 'Sleep Disorder' == 'Insomnia' and one row with 'Sleep Disorder'
        == 'Sleep Apnea', each having a valid (non-null) 'Stress Level' value, to
        ensure the calibration is meaningful.
