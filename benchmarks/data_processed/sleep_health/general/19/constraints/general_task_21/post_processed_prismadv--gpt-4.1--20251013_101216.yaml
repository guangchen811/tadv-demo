  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Both ''Quality of Sleep'' and ''Sleep Duration'' columns must have valid,
        non-null, and correctly typed numeric values for every record, since they
        are used together to compute ''restful_hours'' and logical conditions. This
        can be expressed as a completeness constraint on both columns and a type constraint
        on both columns. Example Deequ: .hasCompleteness(''Quality of Sleep'', 1.0).hasCompleteness(''Sleep
        Duration'', 1.0).hasDataType(''Quality of Sleep'', ConstrainableDataTypes.Integral).hasDataType(''Sleep
        Duration'', ConstrainableDataTypes.Fractional)'
      sources:
      - start_line: 26
        end_line: 30
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: 7dc09a95-d718-44c8-9a5b-bbbf1d369596
    - text: For any record where 'Sleep Duration' is greater than or equal to 7, if
        'Quality of Sleep' is less than or equal to 6, this combination is flagged
        as a risk factor (low_qos_long_sleep). Therefore, the co-occurrence of high
        'Sleep Duration' (>=7) and low 'Quality of Sleep' (<=6) should be rare or
        monitored. This can be expressed as an anomaly check or as an expectation
        on the joint distribution of these two columns.
      sources:
      - start_line: 75
        end_line: 75
        file: ''
      uid: ea042990-b4fc-4b3f-893b-0e3d730fea45
    - text: The computed 'restful_hours' column is derived from the product of 'Sleep
        Duration' and a normalized 'Quality of Sleep' (qos / 10.0). This assumes that
        'Quality of Sleep' values are reasonably bounded (e.g., between 0 and 10)
        and that the product results in a plausible number of restful hours (e.g.,
        not exceeding the possible sleep duration). This can be enforced by a constraint
        that 'restful_hours' <= 'Sleep Duration' for all records.
      sources:
      - start_line: 30
        end_line: 30
        file: ''
      - start_line: 118
        end_line: 118
        file: ''
      uid: f545bc06-1ffc-4b6e-9b0d-a3ea047c1183
