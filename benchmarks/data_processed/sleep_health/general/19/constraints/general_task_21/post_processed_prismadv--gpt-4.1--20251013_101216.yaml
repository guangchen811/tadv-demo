    - text: '''Quality of Sleep'' and ''Sleep Duration'' are used together to identify
        cases of ''low quality but long sleep'' (i.e., where ''Quality of Sleep''
        <= 6 and ''Sleep Duration'' >= 7). This assumes both columns have compatible
        scales and thresholds, and that their joint distribution makes the condition
