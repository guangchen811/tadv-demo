constraints:
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    - - .patternMatches('Blood Pressure', '^[0-9]{2,3}/[0-9]{2,3}$')
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isContainedIn('Quality of Sleep', [4, 5, 6, 7, 8, 9])
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
