results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Physical Activity Level` BETWEEN 0 AND 100', 'Valid
        Physical Activity Level Range')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .satisfies("`Blood Pressure` is not NULL", "Complete Blood Pressure")
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Valid Blood
        Pressure Format")
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies("CAST(SPLIT(`Blood Pressure`, '/')[0] AS DOUBLE) IS NOT
        NULL AND CAST(SPLIT(`Blood Pressure`, '/')[1] AS DOUBLE) IS NOT NULL", "Numeric
        Systolic and Diastolic")
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies("CAST(SPLIT(`Blood Pressure`, '/')[0] AS DOUBLE) BETWEEN
        90 AND 180 AND CAST(SPLIT(`Blood Pressure`, '/')[1] AS DOUBLE) BETWEEN 60
        AND 120", "Reasonable Blood Pressure Values")
      status: true
      reason_if_failed: ''
      level: undefined
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: false
      reason_if_failed: 'Constraint ''isUnique(''Person ID'')'' failed on data sample:
        Value: 0.92 does not meet the constraint requirement!'
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'',
        ''Reasonable Sleep Duration'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Heart Rate` >= 40 AND `Heart Rate` <= 100', 'Heart
        Rate Range')
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.hasCompleteness(''Stress Level'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('Age >= 0 AND Age <= 100', 'Age within valid range')
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasUniqueness([''Person ID'', ''Gender'', ''Age''], lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: '.satisfies("CASE WHEN Gender IN (''Male'', ''Female'') THEN 1 ELSE
        0 END", ''Valid Gender Values'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: undefined
  '["Primary Sleep Disorder","Sleep Disorder"]':
    code:
    - suggestion: .satisfies("CASE WHEN `Sleep Disorder` IS NOT NULL THEN `Sleep Disorder`
        IN ('Insomnia', 'Sleep Apnea') ELSE TRUE END", "Valid Sleep Disorder Values")
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: .satisfies("`Sleep Duration` >= 4 AND `Sleep Duration` <= 12 AND
        `Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10", "Valid Sleep Duration
        and Quality of Sleep Range")
      status: true
      reason_if_failed: ''
      level: error
  '["Sleep Disorder","Stress Level"]':
    code:
    - suggestion: '.hasUniqueness([''Person ID'', ''Sleep Disorder''], lambda x: x
        >= 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Stress Level` >= 3 AND `Stress Level` <= 10', 'Valid
        Stress Level Range')
      status: true
      reason_if_failed: ''
      level: error
  '["avg_diastolic_bp","avg_heart_rate","avg_systolic_bp"]':
    code:
    - suggestion: .satisfies('`Blood Pressure` RLIKE "^[0-9]+/[0-9]+$"', 'Valid Blood
        Pressure Format')
      status: true
      reason_if_failed: ''
      level: error
