      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Stress Level'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
