results:
  Age:
    code:
    - suggestion: '.hasMax(''Age'', lambda v: v <= 120)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Age')
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .hasPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Daily Steps')
      status: false
      reason_if_failed: "Constraint '.isNonNegative('Daily Steps')' failed on data\
        \ sample: org.apache.spark.sql.catalyst.parser.ParseException: \n[PARSE_SYNTAX_ERROR]\
        \ Syntax error at or near '('.(line 1, pos 13)\n\n== SQL ==\nCOALESCE(CAST(Daily\
        \ Steps AS DECIMAL(20,10)), 0.0) >= 0\n-------------^^^\n"
      level: error
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Gender', ['Male', 'Female'])
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: '.hasMax(''Heart Rate'', lambda v: v <= 220)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Heart Rate'', lambda v: v >= 30)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: false
      reason_if_failed: 'Constraint ''.isUnique(''Person ID'')'' failed on data sample:
        Value: 0.92 does not meet the constraint requirement!'
      level: error
  Physical Activity Level:
    code:
    - suggestion: '.hasMax(''Physical Activity Level'', lambda v: v <= 100)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Physical Activity Level')
      status: false
      reason_if_failed: "Constraint '.isNonNegative('Physical Activity Level')' failed\
        \ on data sample: org.apache.spark.sql.catalyst.parser.ParseException: \n\
        [PARSE_SYNTAX_ERROR] Syntax error at or near '('.(line 1, pos 13)\n\n== SQL\
        \ ==\nCOALESCE(CAST(Physical Activity Level AS DECIMAL(20,10)), 0.0) >= 0\n\
        -------------^^^\n"
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.hasMax(''Quality of Sleep'', lambda v: v <= 10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Quality of Sleep'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
