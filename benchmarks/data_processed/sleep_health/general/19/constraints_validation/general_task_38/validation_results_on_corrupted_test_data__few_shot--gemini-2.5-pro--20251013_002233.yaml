results:
  Age:
    code:
    - suggestion: .isNonNegative('Age')
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .hasPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isUnique('Person ID')
      status: false
      reason_if_failed: 'Constraint ''.isUnique(''Person ID'')'' failed on data sample:
        Value: 0.92 does not meet the constraint requirement!'
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.hasNumberOfDistinctValues(''Sleep Duration'', lambda x: x > 1)'
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''Sleep
        Duration'', lambda x: x > 1)'': Check.hasNumberOfDistinctValues() missing
        2 required positional arguments: ''binningUdf'' and ''maxBins'''
      level: error
  Stress Level:
    code:
    - suggestion: .isContainedIn('Stress Level', ['3', '4', '5', '6', '7', '8'])
      status: true
      reason_if_failed: ''
      level: error
