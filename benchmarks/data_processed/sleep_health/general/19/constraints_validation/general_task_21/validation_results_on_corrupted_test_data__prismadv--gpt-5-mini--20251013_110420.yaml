results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Physical Activity Level'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Physical Activity Level'', lambda x: x <= 100)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda x: x
        > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete("Quality of Sleep")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin("Quality of Sleep", lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax("Quality of Sleep", lambda x: x <= 10)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`BMI Category` = TRIM(`BMI Category`)'', ''BMI Category
        has no leading/trailing whitespace'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''BMI Category'', [''Normal'',''Normal Weight'',''Overweight'',''Obese''],
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.satisfies("CASE WHEN `Blood Pressure` IS NOT NULL AND regexp_like(`Blood
        Pressure`, ''^ *[0-9]+ */ *[0-9]+ *$'') THEN 1 ELSE 0 END", "BP has one systolic/diastolic
        pair and contains only digits", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(split(`Blood Pressure`, ''/'')[0] AS
        INT) BETWEEN 60 AND 250 AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT)
        BETWEEN 40 AND 160 THEN 1 ELSE 0 END", "BP in plausible clinical range", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: false
      reason_if_failed: 'Constraint ''isUnique("Person ID")'' failed on data sample:
        Value: 0.92 does not meet the constraint requirement!'
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Sleep Duration` AS double) IS NOT
        NULL THEN 1 ELSE 0 END", "Sleep Duration parseable as numeric", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Sleep Duration", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Sleep Duration` AS double) IS NOT
        NULL AND TRY_CAST(`Sleep Duration` AS double) >= 0 AND TRY_CAST(`Sleep Duration`
        AS double) <= 24 THEN 1 ELSE 0 END", "Sleep Duration in [0,24] hours", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.satisfies("cast(`Daily Steps` as double) is not NULL", "Daily
        Steps_numeric_convertible_>=95pct", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("cast(`Daily Steps` as double) is not NULL", "Daily
        Steps_all_numeric", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(`Daily Steps` as double) = cast(cast(cast(`Daily
        Steps` as double) as bigint) as double)", "Daily Steps_integer_valued", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(`Daily Steps` as double) <= 100000", "Daily Steps_within_reasonable_range_95pct",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR `Sleep Disorder`
        IN (''Insomnia'',''Sleep Apnea'') THEN 1 ELSE 0 END", "Allowed Sleep Disorder
        labels", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` IS NOT NULL", "Some labeled Sleep
        Disorder rows", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` = ''Insomnia''", "Has Insomnia label",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` = ''Sleep Apnea''", "Has Sleep Apnea
        label", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` = ''Insomnia'' AND `Stress
        Level` IS NOT NULL THEN 1 ELSE 0 END", "Insomnia rows have stress measurements",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` = ''Sleep Apnea'' AND `BMI
        Category` IS NOT NULL THEN 1 ELSE 0 END", "Apnea rows have BMI Category",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("CASE WHEN REGEXP_LIKE(`Stress Level`, ''^[0-9]+(\\.[0-9]+)?$'')
        THEN 1 ELSE 0 END", "Stress numeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Stress Level` >= 0 AND `Stress Level` <=
        10 THEN 1 ELSE 0 END", "Stress in 0-10", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea'') THEN CASE WHEN `Stress Level` IS NOT NULL AND REGEXP_LIKE(`Stress
        Level`, ''^[0-9]+(\\.[0-9]+)?$'') THEN 1 ELSE 0 END ELSE 1 END", "Stress present
        and numeric for labeled rows", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  ? '["BMI Category","Blood Pressure","Daily Steps","Person ID","Physical Activity
    Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.satisfies("CAST(split_part(`Blood Pressure`,''/'',1) AS INTEGER)
        IS NOT NULL AND CAST(split_part(`Blood Pressure`,''/'',2) AS INTEGER) IS NOT
        NULL", "BP Parsable", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(split_part(`Blood Pressure`,''/'',1) AS INTEGER)
        BETWEEN 80 AND 250 AND CAST(split_part(`Blood Pressure`,''/'',2) AS INTEGER)
        BETWEEN 40 AND 150 AND CAST(split_part(`Blood Pressure`,''/'',1) AS INTEGER)
        >= CAST(split_part(`Blood Pressure`,''/'',2) AS INTEGER)", "BP Ranges and
        Ordering", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Quality of Sleep` AS INTEGER) IS NOT NULL AND
        CAST(`Quality of Sleep` AS INTEGER) BETWEEN 0 AND 10", "Quality of Sleep Numeric
        and 0-10", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL AND CAST(`Sleep
        Duration` AS DOUBLE) >= 0", "Sleep Duration Numeric and Non-Negative", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS DOUBLE) * (CAST(`Quality of
        Sleep` AS DOUBLE)/10.0) <= CAST(`Sleep Duration` AS DOUBLE) AND CAST(`Sleep
        Duration` AS DOUBLE) * (CAST(`Quality of Sleep` AS DOUBLE)/10.0) >= 0", "Restful
        Hours Bounds (derived)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL
        AND CAST(`Daily Steps` AS DOUBLE) IS NOT NULL", "PAL and Daily Steps Numeric
        and Non-Null", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT(`Sleep Disorder` IN (''Insomnia'',''Sleep Apnea''))
        OR (CAST(`Stress Level` AS INTEGER) IS NOT NULL AND CAST(`Stress Level` AS
        INTEGER) BETWEEN 0 AND 10)", "Labeled Rows Have Valid Stress Level", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT(`Sleep Disorder` = ''Sleep Apnea'') OR `BMI Category`
        IN (''Normal'',''Normal Weight'',''Overweight'',''Obese'')", "Labeled Sleep
        Apnea Rows Have Known BMI Category", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Daily Steps` AS INTEGER) >= 0", "Daily Steps
        Non-Negative", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Physical Activity Level` AS DOUBLE) BETWEEN 0
        AND 100", "Physical Activity Level In 0-100 Range", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`BMI Category` IN (''Normal'',''Normal Weight'',''Overweight'',''Obese'')",
        "BMI Category Known Set", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10
        AND floor(`Quality of Sleep`) = `Quality of Sleep`", "qos_0_10_int", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "sleep_duration_hours_range", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Quality of Sleep`/10.0) >= 0 AND (`Quality of Sleep`/10.0)
        <= 1", "qos_fraction_0_1", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
