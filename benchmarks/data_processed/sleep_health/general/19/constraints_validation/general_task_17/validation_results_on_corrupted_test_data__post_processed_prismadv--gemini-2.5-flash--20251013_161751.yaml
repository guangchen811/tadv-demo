results:
  Physical Activity Level:
    code:
    - suggestion: '.isNonNegative("`Physical Activity Level`", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax("Physical Activity Level", lambda x: x >= 60)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9",
        "Quality of Sleep valid range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: '.isContainedIn(''BMI Category'', [''Obese'', ''Overweight'', ''Normal'',
        ''Normal Weight''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete("Blood Pressure")
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: false
      reason_if_failed: 'Constraint ''isUnique(''Person ID'')'' failed on data sample:
        Value: 0.92 does not meet the constraint requirement!'
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('`Sleep Duration`')
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isNonNegative('`Daily Steps`')
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: '.hasCompleteness(''Heart Rate'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMin(''Heart Rate'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("`Stress Level` >= 3 AND `Stress Level` <= 8", "Stress
        Level within [3,8]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","bmi_risk"]':
    code:
    - suggestion: '.satisfies("(`BMI Category` IS NULL) OR (`BMI Category` IN (''Obese'',
        ''Overweight'', ''Normal'', ''Normal Weight''))", "Valid BMI Category Values",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Daily Steps` IS NOT NULL) AND (`Physical Activity
        Level` IS NOT NULL)", "daily_steps_physical_activity_level_completeness",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Blood Pressure","bp_dia","bp_sys"]':
    code:
    - suggestion: .hasPattern("Blood Pressure", "^\\d{2,3}/\\d{2,3}$")
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level","activity_index","activity_protect"]':
    code:
    - suggestion: .satisfies("`Daily Steps` IS NOT NULL AND `Physical Activity Level`
        IS NOT NULL", "Daily Steps and Physical Activity Level must be non-null")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Daily Steps` >= 0 AND `Physical Activity Level` >=
        0", "Daily Steps and Physical Activity Level must be non-negative", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level","vigorous_bonus"]':
    code:
    - suggestion: '.satisfies("`Daily Steps` IS NOT NULL AND `Daily Steps` RLIKE ''^[0-9]+$''
        AND `Physical Activity Level` IS NOT NULL AND `Physical Activity Level` RLIKE
        ''^[0-9]+$''", "Numeric and Non-null Activity Data", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Heart Rate","hr_risk"]':
    code:
    - suggestion: .hasPattern("Blood Pressure", "^(\\d{2,3})/(\\d{2,3})$")
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Stress Level","sq_factor","sq_risk"]':
    code:
    - suggestion: '.satisfies("`Quality of Sleep` <= 10", "Quality of Sleep upper
        bound", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Sleep Disorder","sd_risk"]':
    code:
    - suggestion: .isComplete('Daily Steps').isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("lower(`Sleep Disorder`) LIKE ''%sleep apnea%'' AND
        lower(`Sleep Disorder`) LIKE ''%insomnia%''", "Sleep Disorder Mutual Exclusivity",
        lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Sleep Duration","duration_risk"]':
    code:
    - suggestion: '.satisfies("`Daily Steps` IS NOT NULL AND `Physical Activity Level`
        IS NOT NULL AND `Daily Steps` >= 0 AND `Physical Activity Level` >= 0", "Daily
        Steps and Physical Activity Level Validity", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Stress Level` IS NOT NULL AND `Quality of Sleep` IS
        NOT NULL AND `Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10", "Stress
        Level and Quality of Sleep Validity", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  ? '["activity_protect","age_risk","bmi_risk","bp_risk","duration_risk","hr_risk","raw_risk","sd_risk","sq_risk","vigorous_bonus"]'
  : code:
    - suggestion: '.hasPattern("Blood Pressure", "^\\d{2,3}/\\d{2,3}$", lambda x:
        x == 1.0, "BP_Parsing_Success")'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Daily Steps` IS NOT NULL AND `Physical Activity Level`
        IS NOT NULL AND `Daily Steps` >= 0 AND `Physical Activity Level` >= 0", "Activity_Metrics_Input_Validity",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Stress Level` IS NOT NULL AND `Quality of Sleep` IS
        NOT NULL AND `Stress Level` >= 0 AND `Quality of Sleep` >= 0 AND `Quality
        of Sleep` <= 10", "SQ_Metrics_Validity", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["bp_dia","bp_risk","bp_sys"]':
    code:
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) >= 60
        AND CAST(split(`Blood Pressure`, ''/'')[0] AS INT) <= 250 AND CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT) >= 40 AND CAST(split(`Blood Pressure`, ''/'')[1]
        AS INT) <= 150", "bp_physiological_range_check", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["priority_bucket","risk_score"]':
    code:
    - suggestion: '.satisfies("CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', 1) AS
        INT) >= 0", "bp_sys_non_negative", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Daily Steps` >= 0", "Daily_Steps_non_negative", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Physical Activity Level` >= 0", "Physical_Activity_Level_non_negative",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Stress Level` >= 0", "Stress_Level_non_negative",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10",
        "Quality_of_Sleep_range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
