results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies("`Physical Activity Level` IS NOT NULL AND `Daily Steps`
        IS NOT NULL", "PAL_and_Steps_paired_count", lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` IS NOT NULL AND
        `Physical Activity Level` >= 0 AND `Physical Activity Level` <= 100 THEN 1
        ELSE 0 END", "PAL_in_plausible_range_0_100", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` IS NOT NULL AND
        `Daily Steps` IS NOT NULL THEN CASE WHEN `Daily Steps` >= 0 AND `Daily Steps`
        <= 200000 THEN 1 ELSE 0 END ELSE 1 END", "Steps_in_reasonable_range_for_pairs",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` >= 1 AND `Quality of Sleep`
        <= 10 THEN 1 ELSE 0 END", "QoS in [1,10]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(split(`Blood Pressure`, ''/'')[0] AS
        DOUBLE) IS NOT NULL AND CAST(split(`Blood Pressure`, ''/'')[1] AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END", ''BP_parseable'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN CAST(split(`Blood Pressure`, ''/'')[0] AS
        DOUBLE) BETWEEN 40 AND 300 AND CAST(split(`Blood Pressure`, ''/'')[1] AS DOUBLE)
        BETWEEN 20 AND 200 THEN 1 ELSE 0 END", ''BP_ranges'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: false
      reason_if_failed: 'Constraint ''isUnique(''Person ID'')'' failed on data sample:
        Value: 0.92 does not meet the constraint requirement!'
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.satisfies("TRY_CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL AND
        TRY_CAST(`Quality of Sleep` AS DOUBLE) IS NOT NULL", "At least one numeric
        Sleep Duration+Quality pair", lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` >= 0 AND `Sleep Duration`
        <= 24 THEN 1 ELSE 0 END", "Sleep Duration in plausible range", lambda x: x
        >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NOT NULL AND `Physical Activity
        Level` IS NOT NULL THEN 1 ELSE 0 END", "Steps-PAL pair count", lambda x: x
        >= 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Daily Steps'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Daily Steps'', lambda x: x <= 100000)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR `Sleep Disorder`
        IN (''Sleep Apnea'',''Insomnia'') THEN 1 ELSE 0 END", "Valid Sleep Disorder
        values (exact match)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete("Heart Rate")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Heart Rate` AS DOUBLE) BETWEEN
        30 AND 220 THEN 1 ELSE 0 END", "Physiological Heart Rate range", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Heart Rate` AS DOUBLE) IS NULL
        OR TRY_CAST(`Heart Rate` AS DOUBLE) = FLOOR(TRY_CAST(`Heart Rate` AS DOUBLE))
        THEN 1 ELSE 0 END", "Integer Heart Rate", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.isContainedIn(''Stress Level'', [''3'', ''4'', ''5'', ''6'', ''7'',
        ''8''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` BETWEEN 0 AND 100
        AND `Daily Steps` >= 0 THEN 1 ELSE 0 END", "pal_in_0_100_and_steps_non_negative",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL", "At least 1 paired Sleep Duration and Quality of Sleep", lambda
        x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24 AND
        (`Quality of Sleep` < 1 OR `Quality of Sleep` > 10)", "QoS within 1..10 for
        plausible Sleep Duration", lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.satisfies("`Quality of Sleep` IS NOT NULL AND `Stress Level` IS
        NOT NULL", "enough_cooccurring_qos_stress", lambda x: x >= (2.0 / 224.0))'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(columnA=''Stress Level'', columnB=''Quality of
        Sleep'', assertion=lambda x: abs(x) >= 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
