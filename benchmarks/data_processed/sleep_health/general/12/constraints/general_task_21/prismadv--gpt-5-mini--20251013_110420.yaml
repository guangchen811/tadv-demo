    - text: 'Values in ''Physical Activity Level'' should be non-negative and lie
        within a reasonable bounded range (e.g., 0 to 100). The code compares PAL
        to a threshold of 40 (sedentary_flag = pal <= 40), so negative or very-large-outlier
