    assumptions:
    - text: 'The ''Blood Pressure'' column is always a two-part string of the form
        ''Systolic/Diastolic'' that can be parsed into two integers. After parsing,
        Systolic and Diastolic should be within realistic physiological ranges and
        Systolic should be >= Diastolic. Actionable checks (Deequ-style / SQL-style):

        - Ensure format: Blood Pressure matches regex ''^\\d+\\/\\d+$'' (no missing
        or extra parts).

        - Ensure parsability: .satisfies("CAST(split_part(`Blood Pressure`,''/'',1)
        AS INTEGER) IS NOT NULL AND CAST(split_part(`Blood Pressure`,''/'',2) AS INTEGER)
        IS NOT NULL")

        - Ensure ranges: 80 <= Systolic <= 250 AND 40 <= Diastolic <= 150

        - Ensure ordering: Systolic >= Diastolic

        This prevents exceptions at df[''Blood Pressure''].str.split(...).astype(int)
        and enforces the assumptions used later when comparing Systolic/Diastolic
        to clinical thresholds.'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      uid: f597c2cf-e4c1-4afc-8d32-94c63c5e429e
    - text: 'The ''Quality of Sleep'' and ''Sleep Duration'' columns must be numeric
        and consistent so restful_hours = Sleep Duration * (Quality of Sleep / 10)
        is valid and bounded. Concrete checks:

        - ''Quality of Sleep'' is numeric (parsable to integer) and lies in the expected
        0-10 scale (e.g. 0 <= QoS <= 10).

        - ''Sleep Duration'' is numeric (float) and non-negative.

        - As a derived invariant: restful_hours <= Sleep Duration (since qos/10 <=
        1) and restful_hours >= 0.

        Deequ-style examples: .isComplete([''Quality of Sleep'',''Sleep Duration'']),
        .isNonNegative(''Sleep Duration''), .satisfies(''`Quality of Sleep` BETWEEN
        0 AND 10'') and .satisfies(''(`Sleep Duration` * (`Quality of Sleep`/10))
        <= `Sleep Duration`'').'
      sources:
      - start_line: 25
        end_line: 33
        file: ''
      uid: 6cda4928-459d-40a8-bfc2-dba45f4260ae
    - text: 'The ''Physical Activity Level'' (pal) and ''Daily Steps'' (steps) columns
        must be numeric, non-null and have sufficient variation so correlation and
        scaling computations are valid. Concrete checks:

        - Both columns are numeric (parsable), non-null for rows used in the correlation.

        - Neither column should have zero population standard deviation (pal_std >
        0 and steps_std > 0) to avoid division-by-zero when computing expected_steps_from_pal.

        - The correlation r2 = corr(pal, steps) should be finite (not NaN/Inf) so
        expected_steps_from_pal is defined.

        Deequ-style suggestions: .isComplete([''Physical Activity Level'',''Daily
        Steps'']), .satisfies(''stddev(`Physical Activity Level`) > 0''), .satisfies(''stddev(`Daily
        Steps`) > 0''), .satisfies(''corr(`Physical Activity Level`,`Daily Steps`)
        IS NOT NULL'').'
      sources:
      - start_line: 35
        end_line: 45
        file: ''
      uid: 1e2ba4b0-9cdf-468f-8ab6-1979ff623090
    - text: 'When using labeled rows (Sleep Disorder in [''Insomnia'',''Sleep Apnea''])
        to compute class statistics, the labeled subset must contain valid Stress
        Level and BMI Category values. Concretely:

        - Rows where Sleep Disorder == ''Insomnia'' or ''Sleep Apnea'' must have non-null,
        numeric ''Stress Level'' values so ins_mean_stress and ap_mean_stress are
        meaningful.

        - For rows labeled ''Sleep Apnea'', ''BMI Category'' must be populated with
        one of the known categories (e.g. ''Normal'',''Normal Weight'',''Overweight'',''Obese'')
        so apnea_over_prop can be computed.

        Actionable checks: .isComplete([''Sleep Disorder'',''Stress Level'',''BMI
        Category'']) on the labeled subset, .satisfies("`Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea'') AND `Stress Level` BETWEEN 0 AND 10") and .isContainedIn(''BMI Category'',[''Normal'',''Normal
        Weight'',''Overweight'',''Obese'']).'
      sources:
      - start_line: 49
        end_line: 56
        file: ''
      - start_line: 62
        end_line: 63
        file: ''
      uid: 4f76db3f-8b2a-44f2-90b8-d304ac377bbd
    - text: 'The ''Daily Steps'' and ''Physical Activity Level'' columns must be on
        the expected scales and non-negative because they are jointly used to compute
        the sedentary flag and coaching decisions. Concrete checks:

        - ''Daily Steps'' is an integer >= 0 and uses the same unit implied by thresholds
        (e.g. thresholds 3000 and 8000 make sense for the data).

        - ''Physical Activity Level'' is numeric and in a bounded range (e.g. 0 <=
        pal <= 100) consistent with comparisons to 40.

        - For rows where risk_insomnia is true, ''Daily Steps'' should be non-null
        so the conditional modules (progressive_activity_plan) can be determined.

        Deequ-style examples: .isNonNegative(''Daily Steps''), .satisfies(''`Physical
        Activity Level` BETWEEN 0 AND 100''), .satisfies(''NOT(risk_insomnia == 1
        AND `Daily Steps` IS NULL)'') (or ensure completeness of Daily Steps for insomnia-risk
        rows).'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 69
        end_line: 104
        file: ''
      uid: cdbd2e8a-bdb1-4b43-be82-59d04fdba7b2
    - text: 'Combined conditions used to score apnea risk require multiple columns
        to be present and consistent: ''BMI Category'', parsed Systolic/Diastolic,
        ''Quality of Sleep'' and ''Sleep Duration'' must all be available and valid
        for each row where apnea risk is assessed. Concretely:

        - BMI Category in the known set [''Normal'',''Normal Weight'',''Overweight'',''Obese'']
        and not null.

        - Parsed Systolic/Diastolic numeric and within the physiological ranges assumed
        in the bp check.

        - Quality of Sleep and Sleep Duration numeric so low_qos_long_sleep = (qos
        <= 6 AND sleep_duration >= 7) is well-defined.

        Actionable constraints: .isComplete([''BMI Category'',''Blood Pressure'',''Quality
        of Sleep'',''Sleep Duration'']) and the earlier range/format checks on Blood
        Pressure and QoS.'
      sources:
      - start_line: 73
        end_line: 77
        file: ''
      uid: 647005bb-c882-4b7a-881d-dea2028643e5
  '["BMI Category","Sleep Disorder","Stress Level"]':
    code: []
    assumptions:
    - text: 'When both ''Sleep Duration'' and ''Quality of Sleep'' are present, ''Quality
        of Sleep'' must be numeric and lie in the range [0, 10] and ''Sleep Duration''
        must be non-negative. This ensures restful_hours = Sleep Duration * (Quality
        of Sleep / 10) is well-defined and restful_hours <= Sleep Duration. Actionable
        constraints (Deequ-like):

        - For rows where Sleep Duration is not null, assert Quality of Sleep is numeric
        and between 0 and 10 (inclusive).

        - Assert Sleep Duration >= 0 for rows where Quality of Sleep is not null.

        - Optionally enforce restful_hours <= Sleep Duration after computation (or
        enforce Quality of Sleep <= 10 to guarantee this).'
      sources:
      - start_line: 25
        end_line: 33
        file: ''
      uid: d40b9f40-5bd6-4916-a489-0f6e85717697
    - text: 'There must be sufficient paired, non-null variability in ''Physical Activity
        Level'' and ''Daily Steps'' to compute a meaningful correlation and to avoid
        division by zero when standardizing. Concretely: at least two rows where both
        ''Physical Activity Level'' and ''Daily Steps'' are non-null, and the standard
        deviation of ''Physical Activity Level'' across rows used must be > 0. Actionable
        constraints:

        - count(rows where both ''Physical Activity Level'' and ''Daily Steps'' are
        present) >= 2

        - stddev(''Physical Activity Level'') > 0 (or distinct count of ''Physical
        Activity Level'' > 1)

        These prevent division-by-zero and NaN in the correlation-based expected steps
        calculation.'
      sources:
      - start_line: 35
        end_line: 46
        file: ''
      uid: 051ad507-13c8-4e5d-bc78-26fb9796c4e4
    - text: 'For rows labeled with a sleep disorder (Sleep Disorder in [''Insomnia'',''Sleep
        Apnea'']), ''Stress Level'' must be numeric and present so that ins_mean_stress
        and ap_mean_stress are meaningful. Additionally, for rows with Sleep Disorder
        == ''Sleep Apnea'', ''BMI Category'' must be present so that apnea_over_prop
        (proportion overweight/obese among apnea cases) is computable. Actionable
        constraints:

        - completeness of ''Stress Level'' conditional on Sleep Disorder in {Insomnia,
        Sleep Apnea} should be high (ideally 100%).

        - completeness of ''BMI Category'' conditional on Sleep Disorder == ''Sleep
        Apnea'' should be high.

        - ''Stress Level'' should be numeric and within expected range (e.g., 0-10)
        for labeled rows.'
      sources:
      - start_line: 49
        end_line: 56
        file: ''
      - start_line: 62
        end_line: 63
        file: ''
      uid: 64b60846-cd8c-408e-a38c-aa545925504b
    - text: '''Blood Pressure'' must be in the form ''systolic/diastolic'' where both
        parts are parseable as integers, and the derived ''Systolic'' and ''Diastolic''
        values must be within reasonable physiological ranges so that bp_high calculation
        is valid. Concretely:

        - every non-null ''Blood Pressure'' should match the pattern ''^\s*\d+\s*/\s*\d+\s*$''
        and both parts parse to integers.

        - enforce Systolic in a plausible range (e.g., 70 <= Systolic <= 250) and
        Diastolic in a plausible range (e.g., 40 <= Diastolic <= 150).

        These ensure the Systolic/Diastolic columns exist and comparisons (Systolic
        >= 130 or Diastolic >= 85) behave as intended.'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 73
        end_line: 75
        file: ''
      uid: 2fdb8dee-a828-4e16-b5a7-0250006204ad
    - text: 'To compute the sedentary_flag ((steps <= 3000) | (pal <= 40)) meaningfully,
        at least one of ''Daily Steps'' or ''Physical Activity Level'' should be present
        for each row. Actionable constraint:

        - fraction of rows where both ''Daily Steps'' and ''Physical Activity Level''
        are null should be near 0 (or below an acceptable threshold), ensuring sedentary_flag
        is computable for most rows.'
