        end_line: 31
        file: ''
      uid: a9216e24-fddb-4722-b98e-7bd90bf42452
    - text: "The 'Quality of Sleep' column represents an integer score on a 0\u2013\
        10 scale (inclusive). The code converts it to int and divides by 10 to get\
        \ a fraction used as a multiplier, so values must lie in [0,10]. Example Deequ-style\
        \ constraints:\n.satisfies(\"`Quality of Sleep` >= 0 AND `Quality of Sleep`\
        \ <= 10 AND floor(`Quality of Sleep`) = `Quality of Sleep`\", \"qos_0_10_int\"\
        )"
      sources:
      - start_line: 25
        end_line: 31
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: f5b692b8-f591-4ca7-9695-a6036bff6dc8
    - text: 'The ''Sleep Duration'' column is measured in hours and must be a non-negative,
        bounded numeric (e.g., between 0 and 24 hours). The downstream logic treats
        this as hourly duration (used directly in restful_hours and thresholding with
        >= 7). Example Deequ-style constraint:

        .satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24", "sleep_duration_hours_range")'
      sources:
      - start_line: 27
        end_line: 31
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: f90e7936-f9c3-4d3e-9b7d-22f58dbd3519
    - text: 'The combination of the two columns must be consistent so that the computed
        restful hours is in [0, Sleep Duration]; equivalently the fraction (Quality
        of Sleep / 10) must be in [0,1]. This prevents unexpected inflation of restful_hours
        and ensures downstream deficit logic is valid. Example Deequ-style constraints:

        .satisfies("(`Quality of Sleep`/10.0) >= 0 AND (`Quality of Sleep`/10.0) <=
        1", "qos_fraction_0_1")

        // or directly:

        .satisfies("(`Sleep Duration` * (`Quality of Sleep`/10.0)) >= 0 AND (`Sleep
        Duration` * (`Quality of Sleep`/10.0)) <= `Sleep Duration`", "restful_hours_bounds")'
      sources:
