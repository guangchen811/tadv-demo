  '["BMI Category","is_over_obese"]':
    code: []
    assumptions:
    - text: 'The binary flag is_over_obese must be exactly consistent with the categorical
        BMI Category: is_over_obese == 1 iff BMI Category is one of [''Overweight'',''Obese''].
        Actionable checks that can be implemented as multi-column constraints:

        - Assert no mismatches: for every row, (BMI Category in [''Overweight'',''Obese''])
        == (is_over_obese == 1).

        - Deequ-style suggestion: .satisfies("(BMI Category IN (''Overweight'',''Obese''))
        = (is_over_obese = 1)", "is_over_obese_consistency")'
