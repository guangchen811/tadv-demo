        file: ''
      - start_line: 43
        end_line: 44
        file: ''
      uid: c04e04d4-eb08-4588-a40e-2aa28c6871c6
    - text: 'There must be sufficient paired numeric observations of ''Physical Activity
        Level'' and ''Daily Steps'' (at least two rows where both are numeric/non-null)
