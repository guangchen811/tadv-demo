    - text: 'Quality of Sleep and Sleep Duration must be numeric and within expected
        ranges before computing restful_hours and low_qos_long_sleep. Actionable constraints:

        - ''Quality of Sleep'' should be numeric and lie in an expected scale (0..10)
        since the code divides by 10.0.

        - ''Sleep Duration'' should be numeric and non-negative (interpreted as hours);
