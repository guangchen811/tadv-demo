    - suggestion: '.satisfies("CASE WHEN CAST(split(`Blood Pressure`, ''/'')[0] AS
        INT) BETWEEN 60 AND 250 AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT)
        BETWEEN 40 AND 160 THEN 1 ELSE 0 END", "BP in plausible clinical range", lambda
        x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 86915a8c-08e1-46e3-83d0-56caae43c700
      source_assumptions:
      - dc26d3e0-d1ce-41b2-bb32-891321cb1b39
    assumptions:
    - text: 'Every input value in the ''Blood Pressure'' column is non-null and contains
        exactly one ''/'' separating two components (systolic and diastolic). The
        code splits on ''/'' and indexes [0] and [1] without null/length checks, so
        missing values or missing/extra slashes would cause errors. This can be represented
        as a validation rule (example Deequ/SQL style):

        .satisfies("CASE WHEN `Blood Pressure` IS NOT NULL AND regexp_like(`Blood
        Pressure`, ''^\\s*\d+\\s*/\\s*\d+\\s*$'') THEN 1 ELSE 0 END", "BP has one
        systolic/diastolic pair", lambda x: x == 1.0)'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      uid: 0f346bf9-cc78-4be0-a668-4d23f79f448a
    - text: 'Both components of ''Blood Pressure'' (the parts before and after ''/'')
        must be integer-valued strings (no letters, no units like ''mmHg'', no decimal
        points) so that .astype(int) succeeds. If a small number of rows may be malformed,
        the proportion of rows that satisfy integer parseability should be very high
        (e.g. >= 0.99). Example validation:

        .satisfies("CASE WHEN regexp_like(trim(split(`Blood Pressure`, ''/'')[0]),
        ''^\\d+$'') AND regexp_like(trim(split(`Blood Pressure`, ''/'')[1]), ''^\\d+$'')
        THEN 1 ELSE 0 END", "BP components are integer strings", lambda x: x >= 0.99)'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      uid: 847e09f7-67f0-44b6-96b8-d41ad3fe8659
    - text: 'Systolic and diastolic values should fall in plausible numeric ranges
        so downstream comparisons (e.g. systolic >= 130 or diastolic >= 85) are meaningful.
        A suggested assumption is: systolic in [60, 250] and diastolic in [40, 160]
        (tolerances can be adjusted). Example validation:

        .satisfies("CASE WHEN CAST(split(`Blood Pressure`, ''/'')[0] AS INT) BETWEEN
        60 AND 250 AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT) BETWEEN 40 AND
        160 THEN 1 ELSE 0 END", "BP in plausible range", lambda x: x >= 0.99)'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: dc26d3e0-d1ce-41b2-bb32-891321cb1b39
    - text: 'There should be no extraneous characters (units, commas, plus/minus signs)
        or leading/trailing text around the numeric components. The code expects plain
        numeric substrings that can be cast to int directly (no pre-cleaning). Example
        validation:

        .satisfies("CASE WHEN regexp_like(trim(split(`Blood Pressure`, ''/'')[0]),
        ''^\\d+$'') AND regexp_like(trim(split(`Blood Pressure`, ''/'')[1]), ''^\\d+$'')
        THEN 1 ELSE 0 END", "BP components contain only digits", lambda x: x == 1.0)'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
