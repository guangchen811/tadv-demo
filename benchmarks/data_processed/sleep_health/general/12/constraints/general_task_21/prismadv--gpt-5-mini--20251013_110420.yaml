        \ parseable as numeric values before downstream arithmetic. This is required\
        \ because the code calls pd.to_numeric on both and then performs numeric operations\
        \ combining them (restful_hours calculation and boolean comparisons). Example\
        \ Deequ-style constraints:\n.isComplete([\"Quality of Sleep\", \"Sleep Duration\"\
        ]) \n// and to ensure numeric-ness (expressed as a predicate):\n.satisfies(\"\
        isNumeric(`Quality of Sleep`) AND isNumeric(`Sleep Duration`)\", \"numeric_qos_sleep\"\
        )"
