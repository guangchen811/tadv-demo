        end_line: 69
        file: ''
      - start_line: 35
        end_line: 35
        file: ''
      uid: 3558f085-18d8-4b69-8d0e-d7d8476f5913
    - text: 'The ''Physical Activity Level'' column must not be constant across the
        dataset (standard deviation > 0 and at least two distinct values). The code
        divides by pal_std and uses pal in correlation and scaling (expected_steps_from_pal
