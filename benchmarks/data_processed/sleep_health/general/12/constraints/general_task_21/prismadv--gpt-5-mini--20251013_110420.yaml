    - text: 'Physical Activity Level and Daily Steps must be numeric and have sufficient
        non-null variability before using correlation-based expectation. Actionable
        constraints:

        - Both ''Physical Activity Level'' and ''Daily Steps'' should be present (non-null)
        for a large majority of rows used in the correlation.

        - Neither column should be constant (stddev > 0) to avoid division-by-zero
