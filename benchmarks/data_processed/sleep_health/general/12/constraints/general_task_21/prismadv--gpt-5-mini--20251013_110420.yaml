  Blood Pressure:
    code:
    - suggestion: '.satisfies("CASE WHEN `Blood Pressure` IS NOT NULL AND regexp_like(`Blood
        Pressure`, ''^ *[0-9]+ */ *[0-9]+ *$'') THEN 1 ELSE 0 END", "BP has one systolic/diastolic
        pair and contains only digits", lambda x: x == 1.0)'
