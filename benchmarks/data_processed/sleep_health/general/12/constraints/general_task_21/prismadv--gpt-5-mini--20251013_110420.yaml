    - text: 'When computing apnea_over_prop and calibrating apnea thresholds, the
        rows with Sleep Disorder == ''Sleep Apnea'' must have BMI Category present
        and valid. Actionable checks:

        - For rows where Sleep Disorder = ''Sleep Apnea'', BMI Category must be non-null.

        - For those rows, BMI Category values should belong to the known set (e.g.
        {''Normal'',''Normal Weight'',''Overweight'',''Obese''}). If not enough labeled
        rows exist the code falls back to 0.7, so enforce at least one labeled row
        with valid BMI Category for calibration.

        - Deequ-style suggestions: .hasCompleteness(''BMI Category'').where("Sleep
        Disorder = ''Sleep Apnea''") and .isContainedIn(''BMI Category'', [''Normal'',''Normal
        Weight'',''Overweight'',''Obese'']).where("Sleep Disorder = ''Sleep Apnea''")'
