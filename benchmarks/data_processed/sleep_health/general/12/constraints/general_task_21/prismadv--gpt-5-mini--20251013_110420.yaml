    assumptions:
    - text: 'Every ''Blood Pressure'' value is formatted as ''<systolic>/<diastolic>''
        (two integer tokens separated by a single ''/''), so that df[''Blood Pressure''].str.split(''/'').str[0].astype(int)
        and str[1].astype(int) will succeed without errors. Actionable checks: assert
        ''Blood Pressure'' matches regex ''^[0-9]+/[0-9]+$'' for all rows; ensure
        that after parsing, ''Systolic'' and ''Diastolic'' are complete (non-null)
        and equal to the integer parts of ''Blood Pressure''. In Deequ-like form:
        .hasPattern(''Blood Pressure'', ''^[0-9]+/[0-9]+$'') and .isComplete([''Systolic'',''Diastolic''])
        (plus a custom satisfy that parsed parts equal the numeric columns).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 111
        end_line: 125
        file: ''
      uid: 075e1101-da59-4c27-9dce-836088dfc0d1
    - text: 'For each record, the parsed numeric Systolic value must be greater than
        or equal to the parsed numeric Diastolic value (Systolic >= Diastolic). This
        enforces physiological consistency and prevents reversed/malformed readings
        before computing bp_high. Actionable check: .satisfies(''Systolic >= Diastolic'',
        [''Systolic'',''Diastolic'']).'
      sources:
      - start_line: 22
        end_line: 24
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: daa270dd-7493-4c20-93a2-0157e6a0b9a1
    - text: 'Systolic and Diastolic values should lie within plausible clinical bounds
        so the threshold comparisons (Systolic >= 130 or Diastolic >= 85) are meaningful
        and extreme outliers do not break downstream scoring. Suggested numeric ranges:
        Systolic in [70, 250] and Diastolic in [40, 150] (or at minimum non-negative
        and below a reasonable upper bound). Actionable checks: .satisfies(''Systolic
        >= 70 AND Systolic <= 250'', [''Systolic'']) and .satisfies(''Diastolic >=
        40 AND Diastolic <= 150'', [''Diastolic'']).'
      sources:
      - start_line: 22
        end_line: 24
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: 9bb7a48d-9948-441b-96e1-e06a6853a161
  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'Physical Activity Level and Daily Steps are both numeric, non-null (no
        missing or non-parsable entries for the rows used), non-negative, and have
        non-zero variance across the dataset. The code computes pal_std and steps_std
        and divides by pal_std, and computes correlation; this requires stddev(Physical
        Activity Level) > 0 and stddev(Daily Steps) > 0 and a finite Pearson correlation.
        Example actionable constraints (Deequ-style):

        - isComplete(["Physical Activity Level", "Daily Steps"])  # no nulls

        - satisfies("stddev(Physical Activity Level) > 0")

        - satisfies("stddev(Daily Steps) > 0")

        - satisfies("isFinite(corr(Physical Activity Level, Daily Steps))")

        - satisfies("min(Daily Steps) >= 0")

        '
      sources:
      - start_line: 35
        end_line: 46
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 103
        end_line: 104
        file: ''
      uid: 7dd6e2c7-9d52-4a91-b053-bebe68720a34
    - text: 'Physical Activity Level and Daily Steps are measured on compatible scales
        for thresholding operations: PAL is expected to fall within a bounded range
        (e.g. 0-100) and Daily Steps is expected to be an integer count (>= 0). Code
        uses (pal <= 40) and steps thresholds (<=3000, <8000) and normalizes gaps
        by 4000. Example actionable constraints:

        - satisfies("min(Physical Activity Level) >= 0 and max(Physical Activity Level)
        <= 100")

        - satisfies("min(Daily Steps) >= 0")

        - isContainedIn("Daily Steps", "Integral") or type-checking to ensure integer
        counts

        '
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 69
        end_line: 69
        file: ''
      - start_line: 103
        end_line: 104
        file: ''
      uid: e57bd16c-382c-40af-8c56-c72224281cb9
    - text: '''Blood Pressure'' must parse into two integer parts and the derived
        Systolic and Diastolic must be physiologically consistent: both parse cleanly
        as integers, Systolic >= Diastolic for each row, and both lie in plausible
        ranges (e.g. Systolic in [70,250], Diastolic in [40,150]). Example actionable
        constraints:

        - satisfies("Blood Pressure LIKE ''%/%'' AND try_cast(split(Blood Pressure,
        ''/'')[0] AS int) IS NOT NULL AND try_cast(split(Blood Pressure, ''/'')[1]
        AS int) IS NOT NULL")

        - satisfies("Systolic >= Diastolic")

        - satisfies("Systolic BETWEEN 70 AND 250 AND Diastolic BETWEEN 40 AND 150")

        '
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 73
        end_line: 74
        file: ''
      uid: 7eee2f4c-ac95-48cc-b136-df976657ea3a
    - text: 'Quality of Sleep and Sleep Duration are numeric and jointly valid for
        computing restful_hours: ''Quality of Sleep'' must be parseable to integer
        values on a 0-10 scale and ''Sleep Duration'' must be numeric (hours) within
        a plausible range (e.g. 0-24). Both should be non-null for rows where restful_hours
        is evaluated and used (and for the low_qos_long_sleep check). Example actionable
        constraints:

        - isComplete(["Quality of Sleep", "Sleep Duration"])  # or at least for rows
        used downstream

        - satisfies("Quality of Sleep BETWEEN 0 AND 10")

        - satisfies("Sleep Duration >= 0 AND Sleep Duration <= 24")

        '
      sources:
      - start_line: 25
        end_line: 33
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: 7b775f59-fa11-4687-9496-9025464f0d2c
    - text: 'For labeled-row calibration: when Sleep Disorder is ''Insomnia'' or ''Sleep
        Apnea'', Stress Level and BMI Category must be present and parseable. The
        code computes mean Stress Level grouped by these disorders and computes proportion
        of BMI Category in [''Overweight'',''Obese''] for apnea rows; this requires
        that for rows with Sleep Disorder in the label set, Stress Level is numeric
        and BMI Category contains expected categories. Example actionable constraints:

        - satisfies("(Sleep Disorder NOT IN (''Insomnia'',''Sleep Apnea'')) OR (Stress
        Level IS NOT NULL AND isFinite(Stress Level))")

        - isContainedIn("BMI Category", [list of allowed categories]) for rows where
        Sleep Disorder = ''Sleep Apnea''

        '
      sources:
      - start_line: 49
        end_line: 56
        file: ''
      - start_line: 62
        end_line: 64
        file: ''
      uid: 1559ae3a-0bea-4603-85b6-6f4c55fdc67e
