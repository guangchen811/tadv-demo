constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isLessThanOrEqualTo('Age', 120)
      - Invalid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', '^\\d{2,3}/\\d{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isLessThanOrEqualTo('Daily Steps', 50000)
      - Invalid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isBetween('Heart Rate', 30, 200)
      - Invalid
    - - .isComplete('Heart Rate')
      - Valid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isLessThanOrEqualTo('Physical Activity Level', 100)
      - Invalid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isBetween('Quality of Sleep', 1, 10)
      - Invalid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - .hasCompleteness('Sleep Disorder', 0.4, ConstraintStatus.Warning)
      - Invalid
    - - .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia', None], ConstraintStatus.Warning)
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isLessThanOrEqualTo('Sleep Duration', 12)
      - Invalid
    - - .isNonNegative('Sleep Duration')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isBetween('Stress Level', 1, 10)
      - Invalid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
