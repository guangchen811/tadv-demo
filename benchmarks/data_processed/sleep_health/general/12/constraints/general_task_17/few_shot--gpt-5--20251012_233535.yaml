constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', '^\d{2,3}/\d{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    - - .isPositive('Heart Rate')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isNonNegative('Person ID')
      - Invalid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - '.hasMax(''Physical Activity Level'', lambda x: x <= 100)'
      - Valid
    - - '.hasMin(''Physical Activity Level'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.hasMax(''Quality of Sleep'', lambda x: x <= 10)'
      - Valid
    - - '.hasMin(''Quality of Sleep'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.4)'
      - Valid
    - - .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - '.hasMax(''Sleep Duration'', lambda x: x <= 24)'
      - Valid
    - - '.hasMin(''Sleep Duration'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - '.hasMax(''Stress Level'', lambda x: x <= 10)'
      - Valid
    - - '.hasMin(''Stress Level'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
