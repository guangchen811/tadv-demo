    - suggestion: '.satisfies("CAST(split_part(`Blood Pressure`,''/'',1) AS DOUBLE)
        > CAST(split_part(`Blood Pressure`,''/'',2) AS DOUBLE)", "Systolic > Diastolic",
        lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: c8cdb50d-db47-4c5b-9517-440cd3711a15
      source_assumptions:
      - 874db587-8cf7-4a96-b1fb-06c268d4aff3
    assumptions:
    - text: 'Blood Pressure must be present (non-null) for essentially all rows. The
        script does not fill missing or invalid values; if Blood Pressure is null
        or unparsable, bp_component becomes NaN and propagates to risk_score. We could
        represent this as: Deequ: .hasCompleteness(''Blood Pressure'', lambda x: x
        >= 0.99) or Great Expectations: expect_column_values_to_not_be_null with mostly=0.99.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 64
        end_line: 71
        file: ''
      - start_line: 106
        end_line: 117
        file: ''
      uid: b89ba505-27c1-4a33-b74d-eb96d7c59792
    - text: 'Blood Pressure values should be formatted as two numeric parts separated
        by a single ''/'': ''<systolic>/<diastolic>'' (optional whitespace allowed),
        with no units or extra text. Both parts must be parseable as numbers. Example
        validation: Great Expectations: expect_column_values_to_match_regex(''^\s*\d+(\.\d+)?\s*/\s*\d+(\.\d+)?\s*$'')
        with mostly>=0.99. Deequ: .satisfies("CASE WHEN `Blood Pressure` RLIKE ''^\\s*\\d+(\\.\\d+)?\\s*/\\s*\\d+(\\.\\d+)?\\s*$''
        THEN 1 ELSE 0 END", ''BP slash-numeric format'', lambda x: x >= 0.99).'
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      uid: bc89bf88-608b-4dff-9f9d-3f5dbde5595f
    - text: 'Both systolic and diastolic components must be present and numeric for
        each row (i.e., neither side missing after the split). If either side fails
        to parse to a number, np.maximum(sys_pen, dia_pen) yields NaN, which makes
        risk_score NaN and suppresses hypertension-based alerts. We could represent
        this as: Deequ: .satisfies("CASE WHEN CAST(split_part(`Blood Pressure`,''/'',1)
        AS DOUBLE) IS NOT NULL AND CAST(split_part(`Blood Pressure`,''/'',2) AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END", ''BP parts parseable'', lambda x: x >= 0.99).'
      sources:
      - start_line: 64
        end_line: 71
        file: ''
      - start_line: 133
        end_line: 136
        file: ''
      uid: 96933d9c-1bf6-4d04-976e-842271c493fe
    - text: 'To keep the risk scaling meaningful (not always saturated or zero), most
        systolic values should lie within approximately [80, 200] and most diastolic
        values within [50, 120]. Outside these bands, penalties clip at 0 or 1. Example
        validation: Deequ: .satisfies("CASE WHEN CAST(split_part(`Blood Pressure`,''/'',1)
        AS DOUBLE) BETWEEN 80 AND 200 AND CAST(split_part(`Blood Pressure`,''/'',2)
        AS DOUBLE) BETWEEN 50 AND 120 THEN 1 ELSE 0 END", ''BP in expected operating
        range'', lambda x: x >= 0.95).'
      sources:
      - start_line: 68
        end_line: 70
        file: ''
      uid: 87eea8a4-f9ae-485e-98b4-940b98171b6f
    - text: 'Systolic should generally be greater than diastolic (to avoid swapped
        entries like ''80/120''). While the code will run, swapped values would distort
        risk and alert logic. Example validation: Deequ: .satisfies("CASE WHEN CAST(split_part(`Blood
        Pressure`,''/'',1) AS DOUBLE) > CAST(split_part(`Blood Pressure`,''/'',2)
        AS DOUBLE) THEN 1 ELSE 0 END", ''Systolic > Diastolic'', lambda x: x >= 0.99).'
      sources:
      - start_line: 64
        end_line: 66
        file: ''
      - start_line: 133
        end_line: 136
        file: ''
      uid: 874db587-8cf7-4a96-b1fb-06c268d4aff3
