    - suggestion: '.satisfies("CAST(split_part(`Blood Pressure`,''/'',1) AS DOUBLE)
        BETWEEN 80 AND 200 AND CAST(split_part(`Blood Pressure`,''/'',2) AS DOUBLE)
        BETWEEN 50 AND 120", "BP in expected operating range", lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
