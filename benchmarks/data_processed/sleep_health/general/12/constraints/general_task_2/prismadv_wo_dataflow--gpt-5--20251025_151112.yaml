      uid: 4c41ef18-0f1d-4bb7-90a0-23b3ef101e63
    - text: '''Sleep Duration'' values should be numeric (parseable to float) for
        most rows, since non-numeric values are coerced to null and later used in
        arithmetic and modeling. Require at least 95% of rows to be parseable to numeric.
        Example: Deequ: .satisfies("CASE WHEN CAST(`Sleep Duration` AS DOUBLE) IS
        NOT NULL THEN 1 ELSE 0 END", "Numeric Sleep Duration", lambda x: x >= 0.95);
        Great Expectations: expect_column_values_to_be_of_type(''Sleep Duration'',
        [''float'',''int''], mostly=0.95) or expect_column_values_to_match_regex(''Sleep
        Duration'', ''^-?([0-9]+\.?[0-9]*|\.[0-9]+)$'', mostly=0.95).'
      sources:
      - start_line: 19
        end_line: 19
        file: ''
      uid: ce73033e-0053-4f47-b134-ba39d83e0882
    - text: '''Sleep Duration'' is measured in hours and should fall within human-possible
        bounds. Enforce hard bounds 0 <= Sleep Duration <= 24 for all rows, and a
        soft expectation that at least 95% lie in [3, 12] hours (given the scoring
        uses an optimum of 7.5 hours and scales deviations by 4.5). Examples: Deequ
        (hard): .isNonNegative(''Sleep Duration'') and .satisfies("`Sleep Duration`
        <= 24", "Max 24h", lambda x: x == 1.0); Deequ (soft): .satisfies("`Sleep Duration`
        BETWEEN 3 AND 12", "Typical Sleep Range", lambda x: x >= 0.95); Great Expectations:
        expect_column_values_to_be_between(''Sleep Duration'', min_value=0, max_value=24)
        and expect_column_values_to_be_between(''Sleep Duration'', min_value=3, max_value=12,
        mostly=0.95).'
      sources:
      - start_line: 29
        end_line: 33
        file: ''
      uid: 7ee63061-7c01-41a0-a1ee-400312c1cb31
    - text: 'There must be at least 2 rows where both ''Sleep Duration'' and ''Quality
        of Sleep'' are valid numeric (non-null and finite) to allow the unguarded
        linear regression fit to succeed. This can be encoded as: Deequ: .satisfies("CASE
        WHEN CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL AND CAST(`Quality of Sleep`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Valid Duration-QoS Pairs", lambda
        frac: frac >= 2.0 / count) or Great Expectations: expect_condition_parser(''both_valid'',
        condition="(Sleep Duration) IS NOT NULL AND (Quality of Sleep) IS NOT NULL
        AND isfinite(Sleep Duration) AND isfinite(Quality of Sleep)", mostly=2.0/row_count).'
