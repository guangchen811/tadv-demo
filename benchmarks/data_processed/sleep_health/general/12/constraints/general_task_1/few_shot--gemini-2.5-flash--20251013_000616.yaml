constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isPositive('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'^\d+/\d+$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isPositive('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    - - .isPositive('Heart Rate')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isPositive('Person ID')
      - Invalid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isPositive('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGraterThanOrEqualTo('Quality of Sleep', 0)
      - Invalid
    - - .isLessThanOrEqualTo('Quality of Sleep', 10)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.4)'
      - Valid
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'], where='`Sleep
        Disorder` IS NOT NULL')
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isPositive('Sleep Duration')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isNonNegative('Stress Level')
      - Invalid
    assumptions: []
  Systolic > Diastolic:
    code:
    - - .hasCompliance('systolic_greater_than_diastolic', 'systolic > diastolic')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isPositive('id')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
