constraints:
  Age:
    code:
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight','Normal','Obese','Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male','Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - '.hasApproxCountDistinct(''Person ID'', lambda x: x >= 220)'
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .hasDataType('Quality of Sleep', 'Integral')
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.40)'
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasDataType('Sleep Duration', 'Fractional')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - '.hasApproxCountDistinct(''Stress Level'', lambda x: x == 6)'
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
