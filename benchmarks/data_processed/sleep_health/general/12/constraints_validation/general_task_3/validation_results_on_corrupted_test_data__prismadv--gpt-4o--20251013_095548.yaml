results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda x: x
        > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Quality of Sleep` BETWEEN 3 AND 9', 'Quality of Sleep
        Range')
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .hasPattern('Blood Pressure', r'\d{2,3}/\d{2,3}')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Daily Steps` >= 0 AND `Daily Steps` <= 20000', 'Valid
        Daily Steps Range')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Heart Rate` BETWEEN 20 AND 150', 'Reasonable Heart
        Rate Range')
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''Stress Level''], lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: '.satisfies(''Age >= 0'', ''Valid Age Range'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: undefined
  '["Age","BMI Category","Heart Rate","Sleep Disorder"]':
    code:
    - suggestion: .satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Sleep
        Apnea', 'Insomnia')", "Valid Sleep Disorder Values")
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        x: abs(x) > 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NOT NULL AND `Physical Activity
        Level` IS NOT NULL THEN 1 ELSE 0 END", "Daily Steps and Physical Activity
        Level Completeness", lambda x: x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` IS NOT NULL AND `Quality
        of Sleep` IS NOT NULL THEN 1 ELSE 0 END", "Sleep Duration and Quality of Sleep
        Completeness", lambda x: x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Stress Level` IS NOT NULL AND `Quality of
        Sleep` IS NOT NULL THEN 1 ELSE 0 END", "Stress Level and Quality of Sleep
        Completeness", lambda x: x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` IS NOT NULL AND `Quality
        of Sleep` IS NOT NULL AND `Stress Level` IS NOT NULL AND `Daily Steps` IS
        NOT NULL THEN 1 ELSE 0 END", "Insomnia Risk Completeness", lambda x: x >=
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR `Sleep Disorder`
        IN (''Sleep Apnea'', ''Insomnia'') THEN 1 ELSE 0 END", "Sleep Disorder Validity",
        lambda x: x >= 0.415)'
      status: true
      reason_if_failed: ''
      level: warning
  Occupation:
    code:
    - suggestion: .isComplete('Occupation')
      status: true
      reason_if_failed: ''
      level: undefined
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        x: x > 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Sleep Duration` >= 0 AND `Quality of Sleep` >= 0',
        'Non-negative Values for Sleep Duration and Quality of Sleep')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`Sleep Duration` >= 0 AND `Quality
        of Sleep` >= 0'', ''Non-negative Values for Sleep Duration and Quality of
        Sleep'')'' failed on data sample: Value: 0.9933333333333333 does not meet
        the constraint requirement!'
      level: error
