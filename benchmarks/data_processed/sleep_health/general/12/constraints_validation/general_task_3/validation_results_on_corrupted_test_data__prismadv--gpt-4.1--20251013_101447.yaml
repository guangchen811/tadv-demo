results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.satisfies(''TRY_CAST(`Quality of Sleep` AS DOUBLE) IS NOT NULL'',
        ''Numeric Quality of Sleep'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Quality of Sleep'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` >= 3 AND `Quality of Sleep` <=
        9'', ''QoS Range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(split(`Blood Pressure`, "/")[0] AS INT) > CAST(split(`Blood
        Pressure`, "/")[1] AS INT)'', ''Systolic Greater Than Diastolic'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(split(`Blood Pressure`, "/")[0] AS INT) BETWEEN
        90 AND 200'', ''Systolic Range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(split(`Blood Pressure`, "/")[1] AS INT) BETWEEN
        50 AND 120'', ''Diastolic Range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Sleep Duration` >= 0 AND `Sleep Duration` <= 16', 'Sleep
        Duration plausible range')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`Sleep Duration` >= 0 AND `Sleep
        Duration` <= 16'', ''Sleep Duration plausible range'')'' failed on data sample:
        Value: 0.9933333333333333 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.hasDistinctness([''Sleep Duration''], lambda d: d > 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .satisfies('(`Physical Activity Level` IS NULL) OR (`Daily Steps`
        IS NOT NULL)', 'Daily Steps present when PAL present')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: .satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Sleep
        Apnea', 'Insomnia')", "Sleep Disorder values valid")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Heart Rate` >= 40 AND `Heart Rate` <= 180', 'Heart
        Rate in plausible physiological range')
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Stress Level` >= 3 AND `Stress Level` <= 8'', ''Stress
        Level Range'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('Age >= 0 AND Age <= 120', 'Age plausible human range')
      status: true
      reason_if_failed: ''
      level: warning
  '["Age","BMI Category","Blood Pressure","Diastolic","Heart Rate","Sleep Disorder","Systolic"]':
    code:
    - suggestion: .satisfies("(`BMI Category` NOT IN ('Obese', 'Overweight', 'Normal',
        'Normal Weight')) OR (`BMI Category` IN ('Obese', 'Overweight', 'Normal',
        'Normal Weight') AND `BMI Category` IS NOT NULL)", "BMI Category Mapping Completeness")
      status: true
      reason_if_failed: ''
      level: warning
  '["Age","BMI Category","Blood Pressure","Diastolic","Heart Rate","Systolic"]':
    code:
    - suggestion: '.satisfies(''`BMI Category` IN ("Obese", "Overweight", "Normal",
        "Normal Weight")'', ''BMI Category valid values'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: .satisfies('((`Daily Steps` IS NULL AND `Physical Activity Level`
        IS NULL) OR (`Daily Steps` IS NOT NULL AND `Physical Activity Level` IS NOT
        NULL))', 'Steps and PAL present together')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('((`Daily Steps` IS NULL OR `Physical Activity Level`
        IS NULL) OR (CAST(`Daily Steps` AS DOUBLE) IS NOT NULL AND CAST(`Physical
        Activity Level` AS DOUBLE) IS NOT NULL))', 'Steps and PAL coercible to numeric
        when present')
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]':
    code:
    - suggestion: .satisfies('(`Sleep Disorder` IS NULL) OR (`Sleep Disorder` IN ("Sleep
        Apnea", "Insomnia"))', 'Sleep Disorder valid labels')
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: .satisfies('`Quality of Sleep` IS NOT NULL AND `Stress Level` IS
        NOT NULL AND CAST(`Quality of Sleep` AS DOUBLE) BETWEEN 3 AND 9 AND CAST(`Stress
        Level` AS DOUBLE) BETWEEN 3 AND 8', 'QoS and Stress Level numeric and in valid
        range')
      status: true
      reason_if_failed: ''
      level: error
