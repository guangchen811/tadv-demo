results:
  Physical Activity Level:
    code:
    - suggestion: .satisfies('`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100', 'Physical Activity Level in [0,100]')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        corr: corr >= 0.3)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation(''Physical Activity Level'',
        ''Daily Steps'', lambda corr: corr >= 0.3)'' failed on data sample: Value:
        0.19165626166115782 does not meet the constraint requirement!'
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10',
        'Quality of Sleep in range 0-10')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies(''`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0'',
        ''Sleep Duration plausible human range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` >= 6.0 AND `Sleep Duration` <= 9.0'',
        ''Sleep Duration sufficient sleep window'', lambda x: x >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda x: x == 1.0).hasCompleteness(''Physical
        Activity Level'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Daily Steps` >= 0', 'Daily Steps must be non-negative')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: .satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Insomnia',
        'Sleep Apnea')", "Valid Sleep Disorder Values")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Sleep Disorder", lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .satisfies('(`Stress Level` >= 1 AND `Stress Level` <= 10)', 'Stress
        Level in [1,10]')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Stress Level', ['3', '4', '5', '6', '7', '8'])
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","Quality of Sleep"]':
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Blood Pressure
        format is systolic/diastolic")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CAST(split(`Blood Pressure`, '/')[0] AS INT) BETWEEN
        50 AND 250 AND CAST(split(`Blood Pressure`, '/')[1] AS INT) BETWEEN 30 AND
        150 AND `Quality of Sleep` BETWEEN 0 AND 10", "Blood Pressure and Quality
        of Sleep value ranges")
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","Daily Steps","Physical Activity Level","Quality of Sleep","Sleep Duration","Stress Level"]':
    code:
    - suggestion: .satisfies('`Person ID` IS NOT NULL', 'Person ID completeness')
      status: true
      reason_if_failed: ''
      level: error
  '["Blood Pressure","Sleep Duration"]':
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Blood Pressure
        format should be systolic/diastolic integers")
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: .satisfies('CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL
        AND CAST(`Daily Steps` AS DOUBLE) IS NOT NULL', 'Physical Activity and Steps
        are numeric and not missing')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        corr: corr is None or corr >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('TRUE', 'Physical Activity Level and Daily Steps are
        on comparable normalized scales')
      status: true
      reason_if_failed: ''
      level: warning
