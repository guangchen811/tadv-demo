results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100', 'Valid Range for Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        x: abs(x) > 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Sleep Duration` >= 0 AND `Sleep Duration` <= 24', 'Valid
        Sleep Duration Range')
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMean(''Daily Steps'', lambda m: m >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Daily Steps` / 10000.0 <= 1.0', 'Daily Steps Normalization
        Check')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''`Daily Steps` / 10000.0 <= 1.0'',
        ''Daily Steps Normalization Check'')'' failed on data sample: Value: 0.9 does
        not meet the constraint requirement!'
      level: warning
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.41517857142857145)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''Sleep Disorder'', lambda
        x: x >= 0.41517857142857145)'' failed on data sample: Value: 0.41333333333333333
        does not meet the constraint requirement!'
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Heart Rate` >= 50 AND `Heart Rate` <= 120', 'Valid
        Heart Rate Range')
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        x: x >= 0.7)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation(''Daily Steps'', ''Physical
        Activity Level'', lambda x: x >= 0.7)'' failed on data sample: Value: 0.19165626166115782
        does not meet the constraint requirement!'
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: .satisfies('`Sleep Duration` >= 0 AND `Quality of Sleep` >= 0',
        'Non-negative Sleep Metrics')
      status: true
      reason_if_failed: ''
      level: error
