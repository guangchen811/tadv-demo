results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 120'', ''PAL plausible range [0,120]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete("Quality of Sleep")
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN LOWER(TRIM(`BMI Category`)) IN (''normal'',''normal
        weight'',''overweight'',''obese'') THEN 1 ELSE 0 END", "Valid BMI Category
        domain", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("BMI Category", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IS NULL THEN 0 WHEN LENGTH(TRIM(`BMI
        Category`)) = 0 THEN 0 ELSE 1 END", "BMI Category non-empty when present",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IS NULL THEN 1 WHEN `BMI Category`
        = TRIM(`BMI Category`) THEN 1 ELSE 0 END", "BMI Category trimmed", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\s*\d+\s*/\s*\d+\s*$'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("size(split(`Blood Pressure`, ''/'')) = 2 AND trim(split(`Blood
        Pressure`, ''/'')[0]) <> '''' AND trim(split(`Blood Pressure`, ''/'')[1])
        <> ''''", "BP has two parts", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(trim(split(`Blood Pressure`, ''/'')[0]) as int)
        BETWEEN 70 AND 250 AND cast(trim(split(`Blood Pressure`, ''/'')[1]) as int)
        BETWEEN 40 AND 150", "BP plausible range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(CAST(`Person ID` AS STRING)) <> ''''", "Person
        ID not empty after trim", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` >= 0.0 AND `Sleep Duration` <= 24.0'',
        ''Sleep Duration within plausible human hours [0,24]'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxQuantile(''Sleep Duration'', 0.5, lambda q: (q >= 5.0)
        and (q <= 9.0))'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete("Daily Steps")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` BETWEEN 0 AND 40000 THEN 1
        ELSE 0 END", "Daily Steps plausible range (0-40k) >=99%", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `Daily Steps` BETWEEN
        0 AND 40000 THEN 1 ELSE 0 END", "Daily Steps plausible range (0-40k) >=99%",
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.9 does not meet the
        constraint requirement!'
      level: warning
    - suggestion: '.hasMin("Daily Steps", lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax("Daily Steps", lambda x: x <= 100000)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` IS NULL OR CAST(`Heart Rate`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Heart Rate numeric-convertible",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Stress Level'', lambda m: m >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Stress Level'', lambda m: m <= 10)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Stress Level` BETWEEN 3 AND 8'', ''Stress typical
        range'', lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Age` >= 0 AND `Age` <= 120'', ''Age plausible range'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["BMI Category","Daily Steps","Diastolic","Physical Activity Level","Quality
    of Sleep","Sleep Duration","Stress Level","Systolic","risk_score"]'
  : code:
    - suggestion: '.satisfies("`Blood Pressure` RLIKE ''^[0-9]{2,3}/[0-9]{2,3}$''",
        ''bp_format'', assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(columnA=''Physical Activity Level'', columnB=''Daily
        Steps'', assertion=lambda x: x >= 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","Diastolic","Systolic"]':
    code:
    - suggestion: '.satisfies("TRIM(`Blood Pressure`) RLIKE ''^[0-9]{2,3} */ *[0-9]{2,3}$''",
        "BP format is NN/NN or NNN/NNN with optional internal spaces", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(columnA=''Physical Activity Level'', columnB=''Daily
        Steps'', assertion=lambda c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Gender:
    code:
    - suggestion: '.hasCompleteness(''Gender'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("trim(`Gender`) IN (''Male'',''Female'')", "Valid Gender
        values", lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","qos"]':
    code:
    - suggestion: '.satisfies(''NOT isnan(`Physical Activity Level`) AND NOT isnan(`Daily
        Steps`)'', ''pal_steps_not_nan'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Stress Level","recommendations"]':
    code:
    - suggestion: '.satisfies("size(split(`Blood Pressure`, ''/'')) = 2", "bp_two_parts",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
