        file: ''
      uid: ffdfd083-5040-4b0e-9611-722e65eb3cc9
    - text: 'Each tag present in the semicolon-delimited ''Triggers'' must be justified
        by the corresponding input columns in the same row: (a) ''high_bp'' -> parsed
        systolic >= 140 or diastolic >= 90 from Blood Pressure; (b) ''short_sleep''
        -> Sleep Duration < 6.0; (c) ''long_sleep'' -> Sleep Duration > 9.0; (d) ''low_sleep_quality''
        -> Quality of Sleep <= 6; (e) ''low_activity'' -> Daily Steps < 5000; (f)
        ''high_stress'' -> Stress Level >= 7; (g) ''obesity'' -> BMI Category = ''Obese'';
        (h) ''sleep_disorder'' -> Sleep Disorder in {''Insomnia'', ''Sleep Apnea''}.
        Suggested Deequ approach: one satisfies per tag, e.g., satisfies("if(array_contains(split(`Triggers`,'';''),''high_bp''),
        cast(split(`Blood Pressure`,''/'' )[0] as int) >= 140 or cast(split(`Blood
        Pressure`,''/'' )[1] as int) >= 90, true)", ''trig_high_bp'') and analogous
        checks for the other tags.'
