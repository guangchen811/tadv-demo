    - text: 'Risk Tier must be consistent with Risk Score bins produced by pd.cut:
        Risk Score <= 9 -> ''Low''; 9 < Risk Score <= 17 -> ''Moderate''; 17 < Risk
        Score <= 25 -> ''High''; Risk Score > 25 -> ''Critical''. Suggested constraint:
        satisfies("(case when `Risk Score` <= 9 then ''Low'' when `Risk Score` <=
        17 then ''Moderate'' when `Risk Score` <= 25 then ''High'' else ''Critical''
        end) = `Risk Tier`", ''tier_matches_score'').'
      sources:
