    - text: 'The ''Blood Pressure'' field must be parsable into two integer components
        ''systolic'' and ''diastolic'' (format ###/##), and those components must
        jointly satisfy medical plausibility and ordering: systolic > diastolic, systolic
        in [70, 250], diastolic in [40, 150]. This ensures both bp risk computation
        and triggers do not fail or misclassify. Suggested constraints: hasPattern(''Blood
        Pressure'',''^[0-9]{2,3}/[0-9]{2,3}$'') and satisfies(''cast(split(`Blood
        Pressure`,''/'' )[0] as int) > cast(split(`Blood Pressure`,''/'' )[1] as int)
        and cast(split(`Blood Pressure`,''/'' )[0] as int) between 70 and 250 and
        cast(split(`Blood Pressure`,''/'' )[1] as int) between 40 and 150'',''bp_parse_and_range'').'
