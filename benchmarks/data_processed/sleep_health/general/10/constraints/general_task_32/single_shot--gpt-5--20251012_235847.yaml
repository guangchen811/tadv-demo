constraints:
  Age:
    code:
    - - '.hasDataType(''Age'', ConstrainableDataTypes.Integral, lambda v: v == 1.0)'
      - Valid
    - - '.hasMax(''Age'', lambda v: v <= 100)'
      - Valid
    - - '.hasMin(''Age'', lambda v: v >= 18)'
      - Valid
    - - .isComplete('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', '^[0-9]{2,3}/[0-9]{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - '.hasDataType(''Daily Steps'', ConstrainableDataTypes.Integral, lambda v:
        v == 1.0)'
      - Valid
    - - '.hasMax(''Daily Steps'', lambda v: v <= 30000)'
      - Valid
    - - '.hasMin(''Daily Steps'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Daily Steps')
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - '.hasDataType(''Heart Rate'', ConstrainableDataTypes.Integral, lambda v: v
        == 1.0)'
      - Valid
    - - '.hasMax(''Heart Rate'', lambda v: v <= 220)'
      - Valid
    - - '.hasMin(''Heart Rate'', lambda v: v >= 30)'
      - Valid
    - - .isComplete('Heart Rate')
      - Valid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    - - .isContainedIn('Occupation', ['Nurse', 'Software Engineer', 'Sales Representative',
        'Engineer', 'Lawyer', 'Teacher', 'Accountant', 'Salesperson', 'Scientist',
        'Doctor'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - '.hasDataType(''Person ID'', ConstrainableDataTypes.Integral, lambda v: v
        == 1.0)'
      - Valid
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - '.hasDataType(''Physical Activity Level'', ConstrainableDataTypes.Integral,
        lambda v: v == 1.0)'
      - Valid
    - - '.hasMax(''Physical Activity Level'', lambda v: v <= 120)'
      - Valid
    - - '.hasMin(''Physical Activity Level'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.hasDataType(''Quality of Sleep'', ConstrainableDataTypes.Integral, lambda
        v: v == 1.0)'
      - Valid
    - - '.hasMax(''Quality of Sleep'', lambda v: v <= 10)'
      - Valid
    - - '.hasMin(''Quality of Sleep'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda v: v >= 0.4)'
      - Valid
    - - .satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Insomnia','Sleep
        Apnea')", 'sleep_disorder_valid')
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - '.hasDataType(''Sleep Duration'', ConstrainableDataTypes.Fractional, lambda
        v: v == 1.0)'
      - Valid
    - - '.hasMax(''Sleep Duration'', lambda v: v <= 12.0)'
      - Valid
    - - '.hasMin(''Sleep Duration'', lambda v: v >= 3.0)'
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - '.hasDataType(''Stress Level'', ConstrainableDataTypes.Integral, lambda v:
        v == 1.0)'
      - Valid
    - - '.hasMax(''Stress Level'', lambda v: v <= 10)'
      - Valid
    - - '.hasMin(''Stress Level'', lambda v: v >= 1)'
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
  id:
    code:
    - - '.hasDataType(''id'', ConstrainableDataTypes.Integral, lambda v: v == 1.0)'
      - Valid
    - - '.hasMin(''id'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('id')
      - Valid
    assumptions: []
