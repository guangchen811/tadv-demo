constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight','Normal','Obese','Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Diastolic:
    code:
    - - .isComplete('Diastolic')
      - Invalid
    - - .isNonNegative('Diastolic')
      - Invalid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - '.hasNumberOfDistinctValues(''Person ID'', lambda x: x > 0)'
      - Invalid
    - - .isComplete('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isNonNegative('Quality of Sleep')
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isNonNegative('Sleep Duration')
      - Invalid
    assumptions: []
  Systolic:
    code:
    - - .isComplete('Systolic')
      - Invalid
    - - .isNonNegative('Systolic')
      - Invalid
    assumptions: []
