        end_line: 43
        file: ''
      - start_line: 54
        end_line: 56
        file: ''
      uid: 8d6ab070-e8e0-48c3-b36f-ebe08f210fa6
    - text: '''Blood Pressure'' must be parseable as ''systolic/diastolic'' with both
        parts integers, and systolic must be strictly greater than diastolic so that
        pulse pressure is positive and log(pulse_pressure) is defined. Constraint
        examples (Deequ): .compliance(''`Blood Pressure` RLIKE ^\\d{2,3}/\\d{2,3}$'',
        _ == 1.0) and .compliance(''cast(split(`Blood Pressure`, "/")[0] as int) >
        cast(split(`Blood Pressure`, "/")[1] as int)'', _ == 1.0)'
      sources:
