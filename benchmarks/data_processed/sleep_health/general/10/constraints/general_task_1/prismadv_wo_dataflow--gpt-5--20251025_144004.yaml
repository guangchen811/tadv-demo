    - text: '''Person ID'' is used as the key for output; for any given ''Person ID'',
        all input fields used to compute risk_score should be consistent (no duplicated
        IDs with conflicting values). This can be enforced as a functional dependency:
        Person ID -> [''Daily Steps'',''Physical Activity Level'',''Sleep Duration'',''Quality
        of Sleep'',''Stress Level'',''Heart Rate'',''BMI Category'',''Blood Pressure'',''Sleep
        Disorder'',''Age''], or by requiring .isUnique(''Person ID'').'
