        to allow np.polyfit to run. This can be represented as Deequ checks such as:
        .isComplete(["Daily Steps", "Physical Activity Level"]) and a compliance check
        like .satisfies("`Daily Steps` IS NOT NULL AND `Physical Activity Level` IS
        NOT NULL", "both_present", lambda v: v == 1.0) and a size check ensuring at
        least 2 rows overall.'
