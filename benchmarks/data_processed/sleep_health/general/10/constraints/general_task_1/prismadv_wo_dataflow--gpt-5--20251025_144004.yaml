    code: []
    assumptions:
    - text: 'Both ''Daily Steps'' and ''Physical Activity Level'' must be non-null
        together for all records used in scoring, so that the regression fit and the
        activity mismatch computation do not yield NaNs. This can be enforced as a
        multi-column completeness/compliance constraint, e.g., Deequ: .hasCompliance(''steps_and_pa_present'',
        ''`Daily Steps` IS NOT NULL AND `Physical Activity Level` IS NOT NULL'', r
