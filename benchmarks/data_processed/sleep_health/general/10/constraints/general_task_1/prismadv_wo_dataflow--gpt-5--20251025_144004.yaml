        end_line: 77
        file: ''
      uid: 23fe4445-2d2c-4199-a6ce-d1af98dea890
    - text: 'The relationship between ''Physical Activity Level'' and ''Daily Steps''
        is assumed to be monotonic/approximately linear so the first-degree fit is
        meaningful and normalized deviations are bounded. Constraint example (Deequ):
        .hasCorrelation(''Physical Activity Level'', ''Daily Steps'', _ >= 0.2)'
