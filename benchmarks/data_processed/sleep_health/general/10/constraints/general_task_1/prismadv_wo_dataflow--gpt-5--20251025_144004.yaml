    - text: 'There must be sufficient paired data to fit the linear model relating
        ''Physical Activity Level'' to ''Daily Steps'': at least two rows where both
        columns are non-null and with at least two distinct ''Physical Activity Level''
        values among those rows. Example constraints: Deequ .hasCompliance(''enough_pairs'',
        ''`Daily Steps` IS NOT NULL AND `Physical Activity Level` IS NOT NULL'', frac
        => frac == 1.0) combined with .hasApproxCountDistinct(''Physical Activity
        Level'', _ >= 2, where = ''`Daily Steps` IS NOT NULL'').'
      sources:
