        end_line: 26
        file: ''
      - start_line: 29
        end_line: 33
        file: ''
      uid: a520e72a-9228-4b71-bbbf-ff4becf59658
    - text: "The 'Physical Activity Level' values should be within a bounded 0\u2013\
        100 scale; values \u2265 90 are treated as very high in the code, implying\
        \ a percentage-like scale. Example validation: Great Expectations expect_column_values_to_be_between('Physical\
        \ Activity Level', min_value=0, max_value=100, allow_cross_type_comparisons=True,\
        \ mostly=1.0) or Deequ .isNonNegative('Physical Activity Level') combined\
        \ with .satisfies('`Physical Activity Level` <= 100', 'PA upper bound', lambda\
        \ x: x == 1.0)."
      sources:
