        end_line: 26
        file: ''
      - start_line: 60
        end_line: 65
        file: ''
      uid: 47cc1b44-59c9-4e31-89ee-3794ad14b21f
    - text: 'Sleep components assume ''Sleep Duration'' > 0 (np.log is taken) and
        ''Quality of Sleep'' is an integer in [0,10] (it is cast to int and used as
        an index into an 11-element penalty map). Constraint example (Deequ): .compliance(''`Sleep
        Duration` > 0 AND `Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10 AND
        `Quality of Sleep` = cast(`Quality of Sleep` as int)'', _ == 1.0)'
      sources:
