      uid: 381b3e1a-13c3-4e8d-b64c-2757755ede72
    - text: 'The ''Physical Activity Level'' values must be numeric and finite (no
        non-numeric strings, NaN after coercion, or +/-Infinity). The script coerces
        to numeric and then fits a linear model, which requires finite numeric inputs.
        Example validation: Great Expectations expect_column_values_to_be_in_type_list([''int64'',''float64'',''double''])
