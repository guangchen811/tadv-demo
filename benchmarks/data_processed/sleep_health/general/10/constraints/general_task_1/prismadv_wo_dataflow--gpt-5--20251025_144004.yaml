        generally be high (e.g., >= 8000). This aligns with the shortfall threshold
        used in activity scoring. Example Deequ constraint: .satisfies("CASE WHEN
        `Physical Activity Level` >= 90 THEN `Daily Steps` >= 8000 ELSE TRUE END",
