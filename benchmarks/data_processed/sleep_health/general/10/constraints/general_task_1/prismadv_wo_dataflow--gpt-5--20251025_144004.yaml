        can fit a line. Basis for constraint: count_non_null_pairs(''Physical Activity
        Level'',''Daily Steps'') >= 2. In Deequ, approximate with a compliance on
        ''!isnull(`Physical Activity Level`) AND !isnull(`Daily Steps`)'' being above
        a small threshold or implement a custom analyzer to enforce a minimum absolute
        count.'
      sources:
