    - text: 'Blood Pressure must be a string formatted as "systolic/diastolic" where
        both parts are integers, systolic > diastolic, and pulse pressure (systolic
        - diastolic) > 0 to permit the logarithm used downstream. This can be encoded
        as a Deequ compliance check, for example: .satisfies("cast(split(`Blood Pressure`,
        ''/'')[0] as int) > cast(split(`Blood Pressure`, ''/'')[1] as int) AND cast(split(`Blood
        Pressure`, ''/'')[1] as int) > 0", "bp_valid", lambda v: v == 1.0).'
