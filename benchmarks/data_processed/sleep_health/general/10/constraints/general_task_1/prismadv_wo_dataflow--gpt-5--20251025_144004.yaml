        end_line: 33
        file: ''
      uid: 82555ec0-682e-4fc2-8d87-37df2d41d724
    - text: '''Physical Activity Level'' and ''Daily Steps'' should be non-negative
        numbers for all rows used in activity scoring, to avoid pathological ratios
        in the shortfall and mismatch components. Constraint example (Deequ): .where(''!isnull(`Physical
        Activity Level`) AND !isnull(`Daily Steps`)'').compliance(''`Physical Activity
        Level` >= 0 AND `Daily Steps` >= 0'', _ == 1.0)'
      sources:
