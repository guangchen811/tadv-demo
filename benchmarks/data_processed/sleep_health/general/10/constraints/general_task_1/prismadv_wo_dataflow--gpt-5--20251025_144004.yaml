        end_line: 31
        file: ''
      uid: cd52bf77-20b3-4f14-88b6-a4dd175968d9
    - text: '''Physical Activity Level'' and ''Daily Steps'' should have a positive
        association consistent with the linear model assumption; for example, the
        Pearson correlation between the two columns should be greater than 0.2. This
        can be expressed as Deequ: .hasCorrelation(''Physical Activity Level'', ''Daily
        Steps'', _ > 0.2).'
      sources:
      - start_line: 28
        end_line: 33
        file: ''
      uid: 059d4407-82f9-4bb4-a31b-34572bd9969a
    - text: 'For the vast majority of records (e.g., at least 95%), the relative deviation
        of ''Daily Steps'' from the regression-predicted steps based on ''Physical
        Activity Level'' should be no more than 1.5, aligning with the downstream
        clipping. This can be enforced by computing the same slope/intercept as in
        the pipeline and a compliance check: abs(`Daily Steps` - (slope*`Physical
        Activity Level` + intercept)) / greatest((slope*`Physical Activity Level`
        + intercept), 1) <= 1.5 with required compliance >= 0.95.'
      sources:
