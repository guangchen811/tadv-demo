        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 68
        end_line: 77
        file: ''
      uid: fc33eaeb-f98d-4db3-be25-9e49fc4d27fb
    - text: "Each value in the 'Blood Pressure' column must be a string containing\
        \ exactly one forward slash ('/') character. This slash must separate two\
        \ distinct parts, both of which are valid integer representations. For example,\
        \ '120/80' is a valid format, but '120', '120/80/60', or 'abc/def' are not.\
        \ The code relies on splitting the string into exactly two integer-convertible\
        \ components. \nWe could represent this assumption as a deequ constraint like\
        \ this:\n.satisfies(\"`Blood Pressure` LIKE '%/%' AND SIZE(SPLIT(`Blood Pressure`,\
        \ '/')) = 2 AND NOT ISNULL(TRY_CAST(SPLIT(`Blood Pressure`, '/')[0] AS INT))\
        \ AND NOT ISNULL(TRY_CAST(SPLIT(`Blood Pressure`, '/')[1] AS INT))\", \"ValidBloodPressureFormat\"\
        )"
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      uid: ed776e27-3471-4f36-a913-763f832caa65
    - text: "Both the systolic (the first part before the slash) and diastolic (the\
        \ second part after the slash) blood pressure values, once parsed as integers,\
        \ must be non-negative. Blood pressure values are physiologically positive\
        \ or zero, and the code's subsequent logical comparisons for blood pressure\
        \ stages implicitly assume non-negative values. \nWe could represent this\
        \ assumption as a deequ constraint like this:\n.satisfies(\"CAST(SPLIT(`Blood\
        \ Pressure`, '/')[0] AS INT) >= 0\", \"SystolicNonNegative\")\n.satisfies(\"\
        CAST(SPLIT(`Blood Pressure`, '/')[1] AS INT) >= 0\", \"DiastolicNonNegative\"\
        )"
      sources:
      - start_line: 44
        end_line: 44
        file: ''
      - start_line: 68
        end_line: 76
        file: ''
      uid: ffabfe78-5f05-431f-9923-df06564c71fd
    - text: "The systolic blood pressure (the integer value before the slash) must\
        \ be strictly greater than the diastolic blood pressure (the integer value\
        \ after the slash). This is a critical assumption because the code calculates\
        \ `pulse_pressure = systolic - diastolic` and then applies `np.log(pulse_pressure)`.\
        \ The natural logarithm function requires its argument to be strictly positive,\
        \ thus `systolic - diastolic` must be greater than zero. \nWe could represent\
        \ this assumption as a deequ constraint like this:\n.satisfies(\"CAST(SPLIT(`Blood\
        \ Pressure`, '/')[0] AS INT) > CAST(SPLIT(`Blood Pressure`, '/')[1] AS INT)\"\
        , \"SystolicGreaterThanDiastolic\")"
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: b319e20b-766d-4592-8b7d-4e28e1604d5d
