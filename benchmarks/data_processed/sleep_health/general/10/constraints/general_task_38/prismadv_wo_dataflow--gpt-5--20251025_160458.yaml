        end_line: 51
        file: ''
      uid: 1feae020-70c8-4427-be23-7cf7ccd7dc94
    - text: 'Both Sleep Duration and Quality of Sleep should exhibit non-zero variance
        across the dataset (i.e., std > 0) to avoid degenerate correlation/regression.
        Representable as: .hasStandardDeviationBetween(''Sleep Duration'', 1e-9, None)
        and .hasStandardDeviationBetween(''Quality of Sleep'', 1e-9, None).'
      sources:
      - start_line: 44
        end_line: 47
        file: ''
      uid: e930e3a8-abd8-4902-b5fb-e069ba3ab5e1
    - text: 'Blood pressure-derived columns must be internally consistent: SBP > DBP
        for all rows; PP equals SBP - DBP; MAP equals DBP + PP/3 within a small tolerance
        (e.g., abs(MAP - (DBP + (SBP-DBP)/3)) <= 0.5). Representable as Deequ .satisfies
        constraints combining these columns.'
      sources:
      - start_line: 26
        end_line: 34
        file: ''
      uid: 88260346-1ecf-425c-b7e0-654f1657179f
    - text: 'Daily Steps and Physical Activity Level should be positively correlated
        (corr >= 0.1) to justify the blended activity feature. Representable as: .hasCorrelation(''Daily
        Steps'', ''Physical Activity Level'', _ >= 0.1).'
      sources:
      - start_line: 53
        end_line: 64
        file: ''
      uid: 5741e3dc-a6b1-4a1d-af99-d58e7511ecff
    - text: 'Among records with Sleep Apnea, a substantial fraction should be Overweight
        or Obese (e.g., fraction >= 0.5), reflecting the scoring baseline of 0.60
        used for the apnea multiplier. Representable as a conditional compliance:
        .where(''`Sleep Disorder` = "Sleep Apnea"'').hasCompliance(''apnea_bmi_link'',
        ''`BMI Category` IN ("Overweight", "Obese")'', _ >= 0.5).'
      sources:
      - start_line: 96
        end_line: 105
        file: ''
      uid: 0057644e-3298-41b8-addd-1113d274b633
    - text: 'The aggregate risk_score should equal the specified weighted sum of its
        components plus apnea_component, and lie within [0, 1]. Representable as:
        .satisfies(''abs(`risk_score` - (0.25*`bp_index` + 0.20*`bmi_risk` + 0.15*`age_index`
        + 0.10*`stress_index` + 0.10*`hr_index` + 0.15*`sleep_risk` + 0.10*`activity_protect`
        + `apnea_component`)) <= 1e-6'', ''risk_score_formula'', 1.0) and .isNonNegative(''risk_score'')
        with an upper-bound check .satisfies(''`risk_score` <= 1.0'', ''risk_score_upper'',
        1.0).'
