results:
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Quality of Sleep'', lambda x: x >= 4.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Quality of Sleep'', lambda x: x <= 9.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` >= 6 AND `Quality of Sleep` <=
        9'', ''qos_in_effective_range_majority'', lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.satisfies("CASE WHEN LENGTH(REGEXP_REPLACE(`Blood Pressure`, ''[^/]'',
        '''')) = 1 THEN 1 ELSE 0 END", "Contains exactly one slash", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN SPLIT(`Blood Pressure`, ''/'')[0] RLIKE ''^[0-9]+$''
        THEN 1 ELSE 0 END", "Systolic part is integral string", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN SPLIT(`Blood Pressure`, ''/'')[1] RLIKE ''^[0-9]+$''
        THEN 1 ELSE 0 END", "Diastolic part is integral string", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS
        INT) > 0 THEN 1 ELSE 0 END", "Systolic is positive", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS
        INT) > 0 THEN 1 ELSE 0 END", "Diastolic is positive", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Blood Pressure", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS
        INT) >= 60 AND CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) <= 250 THEN
        1 ELSE 0 END", "Systolic BP in plausible range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS
        INT) >= 30 AND CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS INT) <= 150 THEN
        1 ELSE 0 END", "Diastolic BP in plausible range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("regexp_extract(`Blood Pressure`, ''^\\d+/\\d+$'', 0)
        IS NOT NULL", "Blood Pressure Format", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` > 2.99", "Sleep Duration Lower Bound",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` <= 14.01", "Sleep Duration Upper Bound",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.hasCompleteness("Stress Level", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin("Stress Level", lambda x: x >= 3)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax("Stress Level", lambda x: x <= 8)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies("`Daily Steps` >= 0 AND `Daily Steps` <= 50000 AND `Physical
        Activity Level` >= 0 AND `Physical Activity Level` <= 100", "Valid Physical
        Activity and Daily Steps Ranges", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`Daily Steps` >= 0 AND `Daily Steps`
        <= 50000 AND `Physical Activity Level` >= 0 AND `Physical Activity Level`
        <= 100", "Valid Physical Activity and Daily Steps Ranges", lambda x: x ==
        1.0)'' failed on data sample: Value: 0.9733333333333334 does not meet the
        constraint requirement!'
      level: error
  '["Sleep Disorder","disorder_boost"]':
    code:
    - suggestion: '.satisfies("REGEXP_LIKE(`Blood Pressure`, ''^[0-9]+/[0-9]+$'')",
        "Blood Pressure Format Validation", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["bp_risk","disorder_boost","priority_score","sedentary_index","sleep_need_index","stress_norm"]':
    code:
    - suggestion: '.satisfies("`Sleep Duration` > 2.99", "Sleep Duration lower bound
        check", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` < 14.01", "Sleep Duration upper bound
        check", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Quality of Sleep` >= 6 AND `Quality of Sleep` <= 9",
        "Quality of Sleep meaningful range", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Daily Steps` >= 0", "Daily Steps non-negative check",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100", "Physical Activity Level range check", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`Physical Activity Level` >= 0 AND
        `Physical Activity Level` <= 100", "Physical Activity Level range check",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9733333333333334 does
        not meet the constraint requirement!'
      level: error
