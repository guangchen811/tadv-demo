raw_constraints:
- column_name: id
  code_for_constraint: .isComplete('id')
- column_name: Person ID
  code_for_constraint: .isComplete('Person ID')
- column_name: Gender
  code_for_constraint: .isComplete('Gender')
- column_name: Age
  code_for_constraint: .isComplete('Age')
- column_name: Occupation
  code_for_constraint: .isComplete('Occupation')
- column_name: Sleep Duration
  code_for_constraint: .isComplete('Sleep Duration')
- column_name: Quality of Sleep
  code_for_constraint: .isComplete('Quality of Sleep')
- column_name: Physical Activity Level
  code_for_constraint: .isComplete('Physical Activity Level')
- column_name: Stress Level
  code_for_constraint: .isComplete('Stress Level')
- column_name: BMI Category
  code_for_constraint: .isComplete('BMI Category')
- column_name: Blood Pressure
  code_for_constraint: .isComplete('Blood Pressure')
- column_name: Heart Rate
  code_for_constraint: .isComplete('Heart Rate')
- column_name: Daily Steps
  code_for_constraint: .isComplete('Daily Steps')
- column_name: Gender
  code_for_constraint: .isContainedIn('Gender', ['Male','Female'])
- column_name: Age
  code_for_constraint: .isNonNegative('Age')
- column_name: Sleep Duration
  code_for_constraint: .isNonNegative('Sleep Duration')
- column_name: Quality of Sleep
  code_for_constraint: .isNonNegative('Quality of Sleep')
- column_name: Physical Activity Level
  code_for_constraint: .isNonNegative('Physical Activity Level')
- column_name: Stress Level
  code_for_constraint: .isNonNegative('Stress Level')
- column_name: Heart Rate
  code_for_constraint: .isNonNegative('Heart Rate')
- column_name: Daily Steps
  code_for_constraint: .isNonNegative('Daily Steps')
- column_name: Age
  code_for_constraint: '.hasMax(''Age'', lambda m: m <= 120)'
- column_name: Sleep Duration
  code_for_constraint: '.hasMax(''Sleep Duration'', lambda m: m <= 16)'
- column_name: Quality of Sleep
  code_for_constraint: '.hasMax(''Quality of Sleep'', lambda m: m <= 10)'
- column_name: Stress Level
  code_for_constraint: '.hasMax(''Stress Level'', lambda m: m <= 10)'
- column_name: Physical Activity Level
  code_for_constraint: '.hasMax(''Physical Activity Level'', lambda m: m <= 200)'
- column_name: Heart Rate
  code_for_constraint: '.hasMax(''Heart Rate'', lambda m: m <= 220)'
- column_name: Daily Steps
  code_for_constraint: '.hasMax(''Daily Steps'', lambda m: m <= 100000)'
- column_name: BMI Category
  code_for_constraint: .isContainedIn('BMI Category', ['Obese','Overweight','Normal','Normal
    Weight'])
- column_name: Sleep Disorder
  code_for_constraint: .isContainedIn('Sleep Disorder', ['Sleep Apnea','Insomnia'])
- column_name: Blood Pressure
  code_for_constraint: .hasPattern('Blood Pressure', r'^\\d{2,3}/\\d{2,3}$')
- column_name: Systolic_vs_Diastolic
  code_for_constraint: .satisfies('Systolic > Diastolic', 'bp_order_valid')
- column_name: BP_Range
  code_for_constraint: .satisfies('Systolic BETWEEN 90 AND 200 AND Diastolic BETWEEN
    50 AND 120', 'bp_range_valid')
