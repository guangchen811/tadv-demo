        end_line: 85
        file: ''
      uid: acc602eb-35f4-4677-9a06-c16477ccc10d
    - text: Mean 'Daily Steps' among the top tercile of 'Physical Activity Level'
        must be greater than the mean among the bottom tercile. This can be implemented
        by computing two filtered means (PA >= 67th percentile vs. PA <= 33rd percentile)
        and asserting mean_top > mean_bottom.
      sources:
