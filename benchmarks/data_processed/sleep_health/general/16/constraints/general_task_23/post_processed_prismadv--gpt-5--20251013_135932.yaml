    3ecfd74a-fc9d-40ac-a259-59a49be16a27: '.satisfies(''CAST(`Sleep Duration` AS DOUBLE)
      IS NOT NULL AND CAST(`Quality of Sleep` AS DOUBLE) IS NOT NULL'', ''Rows with
      both SD and QoS numeric'', lambda x: x >= 1)'
  Daily Steps:
    c5919ebf-7844-4c2f-9e37-4cb155182011: '.satisfies(''`Daily Steps` IS NOT NULL
      AND NOT isnan(CAST(`Daily Steps` AS DOUBLE))'', ''daily_steps_numeric_finite_95pct'',
      lambda x: x >= 0.95)'
    45d6d2ac-e735-4402-b360-c830150f8ce4: '.satisfies("`Daily Steps` >= 0", "non_negative_daily_steps",
      lambda x: x == 1)'
  '["Blood Pressure","Quality of Sleep","Sleep Duration"]':
    2cfe1ce2-f081-40bc-bd55-1aa9295de5ac: '.satisfies("CASE WHEN regexp_like(`Blood
      Pressure`, ''(\\d{2,3})\\s*/\\s*(\\d{2,3})'') THEN cast(regexp_extract(`Blood
      Pressure`, ''(\\d{2,3})\\s*/\\s*(\\d{2,3})'', 1) as int) >= cast(regexp_extract(`Blood
      Pressure`, ''(\\d{2,3})\\s*/\\s*(\\d{2,3})'', 2) as int) ELSE TRUE END", "bp_sys_ge_dia",
      lambda v: v >= 0.99)'
