  '["Blood Pressure","Heart Rate"]':
    code: []
    assumptions:
    - text: 'Blood Pressure must be parseable into two numeric components (bp_sys,
        bp_dia) for every row using the pattern ''NN/NN'' or ''NNN/NNN''; after parsing,
        both bp_sys and bp_dia should be non-null. Deequ example: .hasPattern(''Blood
        Pressure'', ''^\\s*\\d{2,3}\\s*/\\s*\\d{2,3}\\s*$'') and .satisfies(''bp_sys
        IS NOT NULL AND bp_dia IS NOT NULL'', 1.0).'
