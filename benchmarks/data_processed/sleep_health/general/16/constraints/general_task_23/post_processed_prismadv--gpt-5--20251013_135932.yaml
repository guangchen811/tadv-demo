        end_line: 45
        file: ''
      uid: d038e4af-a52b-4008-9001-291bf3ae0b46
    - text: 'For physiologically valid readings, when bp_sys and bp_dia are non-null:
        bp_sys >= bp_dia and bp_sys BETWEEN 70 AND 250 and bp_dia BETWEEN 40 AND 150.
        Deequ example: .satisfies(''(bp_sys IS NULL AND bp_dia IS NULL) OR (bp_sys
        >= bp_dia AND bp_sys BETWEEN 70 AND 250 AND bp_dia BETWEEN 40 AND 150)'',
        1.0).'
      sources:
      - start_line: 42
        end_line: 47
        file: ''
      uid: a1f19df7-2caa-42c8-b3a6-29d0a5836e06
    - text: 'bp_stage must be consistent with bp_sys and bp_dia per the classifier
        logic. For all rows with non-null bp_sys and bp_dia: CASE WHEN (bp_sys >=
        180 OR bp_dia >= 120) THEN ''crisis'' WHEN (bp_sys >= 140 OR bp_dia >= 90)
        THEN ''stage2'' WHEN ((bp_sys BETWEEN 130 AND 139) OR (bp_dia BETWEEN 80 AND
        89)) THEN ''stage1'' WHEN ((bp_sys BETWEEN 120 AND 129) AND (bp_dia < 80))
        THEN ''elevated'' WHEN (bp_sys < 120 AND bp_dia < 80) THEN ''normal'' ELSE
        ''normal'' END must equal bp_stage. Deequ example: .satisfies(''bp_sys IS
        NULL OR bp_dia IS NULL OR (CASE WHEN (bp_sys >= 180 OR bp_dia >= 120) THEN
        \''crisis\'' WHEN (bp_sys >= 140 OR bp_dia >= 90) THEN \''stage2\'' WHEN ((bp_sys
        BETWEEN 130 AND 139) OR (bp_dia BETWEEN 80 AND 89)) THEN \''stage1\'' WHEN
        ((bp_sys BETWEEN 120 AND 129) AND (bp_dia < 80)) THEN \''elevated\'' WHEN
        (bp_sys < 120 AND bp_dia < 80) THEN \''normal\'' ELSE \''normal\'' END) =
        bp_stage'', 1.0).'
      sources:
      - start_line: 9
        end_line: 21
        file: ''
      - start_line: 47
        end_line: 47
        file: ''
      uid: e518824e-5fbf-4812-b8c3-bb6454ecc0e6
    - text: 'Mean arterial pressure (map) must be consistent with bp_sys and bp_dia:
        map = bp_dia + (bp_sys - bp_dia)/3. Use a small tolerance for floating-point
        comparisons. Deequ example: .satisfies(''bp_sys IS NULL OR bp_dia IS NULL
        OR ABS(map - (bp_dia + (bp_sys - bp_dia)/3.0)) < 1e-6'', 1.0).'
      sources:
      - start_line: 48
        end_line: 48
        file: ''
      uid: aa850f01-cf08-4aa7-a7e8-ff5c5ce2a19f
    - text: 'Crisis triage rule must hold: If (bp_stage = ''crisis'') OR (bp_sys >=
        180) OR (bp_dia >= 120) OR (Heart Rate > 120), then triage_level must be ''High''.
        Deequ example: .satisfies(''CASE WHEN (bp_stage = \''crisis\'' OR bp_sys >=
        180 OR bp_dia >= 120 OR `Heart Rate` > 120) THEN triage_level = \''High\''
        ELSE TRUE END'', 1.0).'
      sources:
      - start_line: 147
        end_line: 151
        file: ''
      - start_line: 160
        end_line: 160
        file: ''
      uid: e1d2f9ac-bd19-42e6-a64c-6c84223f5f2a
    - text: 'bp_penalty must equal the stage-to-penalty mapping derived from bp_stage:
        normal->0.0, elevated->0.05, stage1->0.10, stage2->0.20, crisis->0.40; if
        bp_stage is null, bp_penalty should default to 0.15. Deequ example: .satisfies(''(bp_stage
        = \''normal\'' AND bp_penalty = 0.0) OR (bp_stage = \''elevated\'' AND bp_penalty
        = 0.05) OR (bp_stage = \''stage1\'' AND bp_penalty = 0.10) OR (bp_stage =
        \''stage2\'' AND bp_penalty = 0.20) OR (bp_stage = \''crisis\'' AND bp_penalty
        = 0.40) OR (bp_stage IS NULL AND bp_penalty = 0.15)'', 1.0).'
      sources:
      - start_line: 127
        end_line: 135
        file: ''
      uid: 3b9bea7e-e0a1-404e-a359-ccf62f792c9b
    - text: 'Penalty points composition must be consistent: penalty_points = 100*(hr_penalty
        + bp_penalty + sd_penalty). Deequ example: .satisfies(''ABS(penalty_points
        - 100*(hr_penalty + bp_penalty + sd_penalty)) < 1e-6'', 1.0).'
      sources:
