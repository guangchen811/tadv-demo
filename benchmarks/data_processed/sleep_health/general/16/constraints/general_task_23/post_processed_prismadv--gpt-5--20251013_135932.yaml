        end_line: 46
        file: ''
      - start_line: 171
        end_line: 172
        file: ''
      uid: 89c31bd0-f2ca-49b6-af64-ee9d4dccb145
    - text: 'The derived ''bp_stage'' must be consistent with (''bp_sys'',''bp_dia'')
        per the classification logic: crisis if (sys >= 180 OR dia >= 120); stage2
        if (sys >= 140 OR dia >= 90) and not crisis; stage1 if ((130 <= sys AND sys
        <= 139) OR (80 <= dia AND dia <= 89)); elevated if (120 <= sys AND sys <=
        129) AND (dia < 80); normal if (sys < 120 AND dia < 80). Representable as
        a compliance constraint verifying bp_stage equals this CASE expression for
        all rows (compliance = 1.0).'
      sources:
