  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'The relationship between ''Daily Steps'' and ''Physical Activity Level''
        should be positive: both Pearson and Spearman correlations between the two
        columns should be >= 0.2. This supports the use of a linear expectation of
        steps from activity and triage rules relying on their alignment. This can
        be represented with a Deequ constraint like: .hasCorrelation(''Daily Steps'',
        ''Physical Activity Level'', _ >= 0.2) (and a similar custom check for Spearman
        or an ordinal monotonicity check).'
      sources:
      - start_line: 84
        end_line: 85
        file: ''
      - start_line: 95
        end_line: 101
        file: ''
      - start_line: 155
        end_line: 157
        file: ''
      uid: 217f9185-5be1-42dd-85b9-4e732ff72d45
    - text: 'Mean ''Daily Steps'' in the top tercile of ''Physical Activity Level''
        should be greater than or equal to the mean in the bottom tercile. Concretely:
        mean(Daily Steps | Physical Activity Level >= q67) >= mean(Daily Steps | Physical
        Activity Level <= q33).'
      sources:
      - start_line: 86
        end_line: 91
        file: ''
      uid: 12f3d3be-2b77-47d6-8e24-ef829a553ba0
    - text: Within the subgroup where 'Physical Activity Level' >= 60, at least 60%
        of rows should have 'Daily Steps' >= 7000. This can be encoded as a conditional
        compliance constraint (e.g., in Deequ using a where-filter on the subset or
        via a global predicate NOT(Physical Activity Level >= 60) OR (Daily Steps
        >= 7000) with an appropriate threshold).
      sources:
      - start_line: 92
        end_line: 94
        file: ''
      uid: 1bbd0034-444a-4b6c-93c6-08af03e0f590
    - text: 'Rows should be pairwise-complete and numeric for both ''Daily Steps''
        and ''Physical Activity Level'' (i.e., in the same rows, both columns are
        present and castable to numeric), so that correlations and the expected-steps
        alignment are computed on the intended population. Enforce with a compliance
        check: (Daily Steps IS NOT NULL) AND (Physical Activity Level IS NOT NULL)
        >= 1.0, after numeric coercion.'
      sources:
      - start_line: 35
        end_line: 39
        file: ''
      - start_line: 84
        end_line: 101
        file: ''
      - start_line: 115
        end_line: 118
