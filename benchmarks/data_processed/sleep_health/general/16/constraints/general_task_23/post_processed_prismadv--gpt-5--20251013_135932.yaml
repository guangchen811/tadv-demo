        end_line: 21
        file: ''
      - start_line: 47
        end_line: 47
        file: ''
      uid: e6fe321a-c996-4396-86a4-ccadb599d27f
    - text: 'Any record with crisis-level blood pressure (bp_stage = ''crisis'' OR
        bp_sys >= 180 OR bp_dia >= 120) must have triage_level = ''High''. Enforceable
        via a compliance constraint: CASE WHEN (bp_stage = ''crisis'' OR bp_sys >=
        180 OR bp_dia >= 120) THEN triage_level = ''High'' ELSE true END, with asserted
        compliance = 1.0.'
      sources:
      - start_line: 147
        end_line: 147
        file: ''
      - start_line: 160
        end_line: 160
        file: ''
      uid: d28a3f35-e756-4b67-bbaa-63dbb0c837c2
    - text: 'Daily Steps and Physical Activity Level should be positively associated
        at the cohort level: both Pearson and Spearman correlations between ''Daily
        Steps'' and ''Physical Activity Level'' should be non-negative (e.g., >= 0.2).
        In Deequ: hasCorrelation(''Daily Steps'',''Physical Activity Level'', _ >=
        0.2) and a similar check for Spearman (via a custom analyzer or by computing
        it upstream).'
      sources:
