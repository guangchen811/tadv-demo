  '["Quality of Sleep","Sleep Disorder","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'High joint completeness and numeric convertibility are required for ''Sleep
        Duration'' and ''Quality of Sleep'' because the code computes correlation,
        regression, and a weighted sleep_component from them. At least 0.95 of records
        should have both columns non-null and numeric. Possible Deequ: .satisfies("(Sleep
        Duration is not null) AND (Quality of Sleep is not null)", _ >= 0.95, "sleep_duration_quality_joint_completeness").'
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      - start_line: 69
        end_line: 81
        file: ''
      - start_line: 104
        end_line: 109
        file: ''
      uid: 0f4a4147-de4b-4d42-8b27-a47747f1a07e
    - text: 'The relationship between ''Sleep Duration'' and ''Quality of Sleep''
        is expected to be non-negative (positive or neutral). The Pearson correlation
        should be >= 0.0 and there must be non-zero variance in ''Sleep Duration''
        where ''Quality of Sleep'' is present to avoid a degenerate slope. Possible
        Deequ: .hasCorrelation("Sleep Duration", "Quality of Sleep", _ >= 0.0) and
        .satisfies("approx_count_distinct(case when `Quality of Sleep` is not null
        then `Sleep Duration` end) >= 2", _ >= 1.0, "duration_variance_with_quality").'
      sources:
      - start_line: 69
        end_line: 71
        file: ''
      - start_line: 76
        end_line: 81
        file: ''
      - start_line: 106
        end_line: 108
        file: ''
      uid: 6601b97e-a014-4402-83c2-de2897a64558
    - text: 'Long sleepers should have at least as high average sleep quality as short
        sleepers. Formally: mean(Quality of Sleep | Sleep Duration >= 8.0) >= mean(Quality
        of Sleep | Sleep Duration < 6.0). Possible Deequ: .satisfies("avg(case when
        `Sleep Duration` >= 8.0 then `Quality of Sleep` end) >= avg(case when `Sleep
        Duration` < 6.0 then `Quality of Sleep` end)", _ >= 1.0, "long_vs_short_quality").'
      sources:
      - start_line: 71
        end_line: 75
        file: ''
      - start_line: 111
        end_line: 113
        file: ''
      uid: 090a1fb5-9130-4000-b98d-013d8d0f5294
    - text: 'Members labeled with a sleep disorder (''Insomnia'' or ''Sleep Apnea'')
        are expected to have lower average ''Quality of Sleep'' than members without
        a disorder, aligning with the triage logic that escalates disorder cases when
        sleep_component (driven by Quality and Duration) is low. Possible Deequ: .satisfies("avg(case
        when `Sleep Disorder` in (''Insomnia'',''Sleep Apnea'') then `Quality of Sleep`
        end) <= avg(case when `Sleep Disorder` is null then `Quality of Sleep` end)",
        _ >= 1.0, "disorder_quality_gap").'
      sources:
      - start_line: 151
        end_line: 152
        file: ''
      - start_line: 104
        end_line: 109
        file: ''
      uid: 38991730-2cd3-4bc8-ab78-6e47e947b091
    - text: 'Whenever ''Sleep Disorder'' is non-null, both ''Sleep Duration'' and
        ''Quality of Sleep'' must also be present and numeric so that sleep_component
        and triage can be evaluated consistently for those rows. Possible Deequ: .satisfies("(`Sleep
        Disorder` is null) OR ((`Sleep Duration` is not null) AND (`Quality of Sleep`
        is not null))", _ >= 1.0, "disorder_requires_sleep_measures").'
      sources:
      - start_line: 151
        end_line: 152
        file: ''
      - start_line: 104
        end_line: 109
        file: ''
      uid: b38e9b38-0c0e-41d3-ba28-89dba2b808b2
  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Sleep Duration and Quality of Sleep must be simultaneously non-null and
        numeric for essentially all records, because they are combined in correlation,
        regression, and per-row scoring without per-row null handling. This can be
        enforced with a Deequ compliance like: .satisfies("Sleep Duration IS NOT NULL
        AND Quality of Sleep IS NOT NULL", "pairwise_non_null", p => p >= 0.99).'
      sources:
      - start_line: 35
        end_line: 39
        file: ''
      - start_line: 69
        end_line: 74
        file: ''
      - start_line: 76
        end_line: 81
        file: ''
      - start_line: 104
        end_line: 108
        file: ''
      - start_line: 111
        end_line: 113
        file: ''
      uid: aad73861-dcb7-4762-9f6b-9539b79ba170
    - text: 'The Pearson correlation between Sleep Duration and Quality of Sleep is
        expected to be non-negative and defined (not NaN), so that the duration contributes
        positively to the sleep_component weight. Representable as a Deequ correlation
        constraint: .hasCorrelation("Sleep Duration", "Quality of Sleep", Some(0.0),
        Some(1.0)).'
      sources:
      - start_line: 69
        end_line: 71
        file: ''
      - start_line: 106
        end_line: 108
        file: ''
      - start_line: 187
        end_line: 189
        file: ''
      uid: 80a801ab-5811-4c8e-9238-44413a0c6831
    - text: 'Cohort-level quality ordering: mean Quality of Sleep among short sleepers
        (Sleep Duration < 6.0) should be less than or equal to mean Quality of Sleep
        among long sleepers (Sleep Duration >= 8.0). This matches the bonus logic
        and prevents pathological cohorts. This can be implemented as an aggregate
        comparison (e.g., via a custom Deequ metric or SQL-based check): AVG(Quality
        of Sleep) FILTER (WHERE Sleep Duration < 6.0) <= AVG(Quality of Sleep) FILTER
        (WHERE Sleep Duration >= 8.0).'
      sources:
      - start_line: 71
        end_line: 74
        file: ''
      - start_line: 111
        end_line: 113
        file: ''
      uid: d108f6ad-1e1b-4f9e-9fb9-82798fad4663
    - text: 'Adequate support for both duration segments used in bonuses: there should
        be at least 10 records with non-null Quality of Sleep in each of the Sleep
        Duration segments (< 6.0 and >= 8.0). In Deequ: check.where("Sleep Duration
        < 6.0 AND Quality of Sleep IS NOT NULL").hasSize(_ >= 10) and check.where("Sleep
        Duration >= 8.0 AND Quality of Sleep IS NOT NULL").hasSize(_ >= 10).'
      sources:
      - start_line: 71
        end_line: 74
        file: ''
      - start_line: 111
        end_line: 112
        file: ''
      uid: 30695e32-ffff-404f-82fc-408fb735a093
    - text: 'Identifiability for the linear predictor: among rows with both fields
        present, Sleep Duration must have non-zero variance (at least two distinct
        values) so that the quality-on-duration regression is well-defined. In Deequ:
        check.where("Quality of Sleep IS NOT NULL").hasNumberOfDistinctValues("Sleep
        Duration", _ >= 2).'
      sources:
      - start_line: 69
        end_line: 71
        file: ''
      - start_line: 76
        end_line: 81
        file: ''
