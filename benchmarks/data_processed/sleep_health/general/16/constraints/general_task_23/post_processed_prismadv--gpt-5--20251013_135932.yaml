        end_line: 91
        file: ''
      uid: 6578beac-f52a-42db-b070-c8dcf345c9ec
    - text: 'For members with ''Physical Activity Level'' >= 60, a substantial share
        should reach at least 7000 ''Daily Steps''. Enforce as a conditional compliance
        constraint: CASE WHEN `Physical Activity Level` >= 60 THEN `Daily Steps` >=
        7000 ELSE true END with an asserted compliance proportion (e.g., >= 0.6).'
      sources:
