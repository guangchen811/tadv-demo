    assumptions:
    - text: 'The ''Blood Pressure'' column must exist in the input and be populated
        (non-null and non-empty after trimming) for the vast majority of rows (e.g.,
        completeness >= 0.95). This is required because the code reads and uses this
        column directly and includes it in the output. Example Deequ constraint: .satisfies("CASE
        WHEN `Blood Pressure` IS NOT NULL AND TRIM(CAST(`Blood Pressure` AS STRING))
        <> '''' THEN 1 ELSE 0 END", "BP present", lambda x: x >= 0.95)'
      sources:
      - start_line: 42
        end_line: 45
        file: ''
      - start_line: 170
        end_line: 173
        file: ''
      uid: 37de83f0-b85e-4afc-b029-2b77b70450ec
    - text: 'The ''Blood Pressure'' values should be parseable as exactly two or three
        digits, a slash ''/'', and two or three digits, with optional surrounding
        whitespace and no units or extra text (i.e., it should match ^\s*(\d{2,3})\s*/\s*(\d{2,3})\s*$).
        At least 95% of rows should match this format so that systolic and diastolic
        can be extracted. Example Deequ constraint: .satisfies("CASE WHEN CAST(`Blood
        Pressure` AS STRING) RLIKE ''^\\s*(\\d{2,3})\\s*/\\s*(\\d{2,3})\\s*$'' THEN
        1 ELSE 0 END", "BP format", lambda x: x >= 0.95)'
      sources:
      - start_line: 42
        end_line: 45
        file: ''
      uid: 0af40ab4-b169-4710-a361-2f75ae879c7b
    - text: 'The ''Blood Pressure'' values are expected to be in mmHg and within plausible
        adult ranges so the classification thresholds make sense. After parsing, the
        first number (systolic) should typically be between 70 and 250 and the second
        number (diastolic) between 40 and 150 for at least 95% of rows. Example Deequ
        constraints: .satisfies("CASE WHEN CAST(regexp_extract(`Blood Pressure`, ''^\\s*(\\d{2,3})\\s*/\\s*(\\d{2,3})\\s*$'',
        1) AS INT) BETWEEN 70 AND 250 THEN 1 ELSE 0 END", "Sys in range", lambda x:
        x >= 0.95) and .satisfies("CASE WHEN CAST(regexp_extract(`Blood Pressure`,
        ''^\\s*(\\d{2,3})\\s*/\\s*(\\d{2,3})\\s*$'', 2) AS INT) BETWEEN 40 AND 150
        THEN 1 ELSE 0 END", "Dia in range", lambda x: x >= 0.95)'
      sources:
      - start_line: 9
        end_line: 21
        file: ''
      - start_line: 147
        end_line: 147
        file: ''
      uid: b1aef6cb-b9a3-4141-8deb-f9d520b665ba
    - text: 'For the vast majority of rows, the systolic value should be greater than
        or equal to the diastolic value (e.g., >= 0.98 of rows), consistent with how
        Mean Arterial Pressure and the staging logic are used. Example Deequ constraint:
        .satisfies("CASE WHEN CAST(regexp_extract(`Blood Pressure`, ''^\\s*(\\d{2,3})\\s*/\\s*(\\d{2,3})\\s*$'',
        1) AS INT) >= CAST(regexp_extract(`Blood Pressure`, ''^\\s*(\\d{2,3})\\s*/\\s*(\\d{2,3})\\s*$'',
        2) AS INT) THEN 1 ELSE 0 END", "Sys >= Dia", lambda x: x >= 0.98)'
      sources:
      - start_line: 48
        end_line: 48
        file: ''
      - start_line: 9
        end_line: 21
        file: ''
