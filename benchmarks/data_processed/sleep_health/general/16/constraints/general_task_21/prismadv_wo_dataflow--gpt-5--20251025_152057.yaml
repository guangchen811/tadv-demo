        end_line: 21
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: aa899350-fa3c-4d97-b072-fcbf529ab8fb
    - text: 'Quality of Sleep and Sleep Duration are jointly on compatible scales
        for computing restful_hours = Sleep Duration * (QoS/10): QoS must be an integer
        in [0, 10], and Sleep Duration must be a non-negative number of hours, reasonably
        within [0, 24]. Under these constraints, restful_hours is finite and bounded
        by Sleep Duration for all rows. Example Deequ constraint: .satisfies("cast(`Quality
        of Sleep` as int) BETWEEN 0 AND 10 AND cast(`Sleep Duration` as double) BETWEEN
        0 AND 24", ''qos_sleep_scales'')'
      sources:
      - start_line: 22
        end_line: 26
        file: ''
      - start_line: 27
        end_line: 27
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: 848b4ba5-b169-407e-b12f-d6fe74d0a4e7
    - text: "The 'low_qos_long_sleep' condition combines Quality of Sleep and Sleep\
        \ Duration. We assume that whenever Sleep Duration >= 7 hours, QoS exists\
        \ and remains on the 0\u201310 integer scale to make this predicate well-defined.\
        \ Example Deequ constraint: .satisfies(\"CASE WHEN cast(`Sleep Duration` as\
        \ double) >= 7 THEN cast(`Quality of Sleep` as int) BETWEEN 0 AND 10 ELSE\
        \ TRUE END\", 'qos_defined_when_long_sleep')"
      sources:
