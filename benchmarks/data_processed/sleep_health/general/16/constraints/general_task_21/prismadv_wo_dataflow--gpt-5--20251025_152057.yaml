    - text: 'Co-completeness and numeric parseability: ''Quality of Sleep'', ''Sleep
        Duration'', and ''Stress Level'' must all be present and parseable as numbers
        for the same rows (no nulls or non-numeric values), since they are combined
        to produce risk scores. Example Deequ: .satisfies(''NOT isnull(`Quality of
        Sleep`) AND NOT isnull(`Sleep Duration`) AND NOT isnull(`Stress Level`)'',
        ''qos_sleep_stress_nonnull'')'
