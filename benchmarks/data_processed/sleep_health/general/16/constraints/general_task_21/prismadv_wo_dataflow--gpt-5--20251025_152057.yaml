  ? '["BMI Category","Blood Pressure","Daily Steps","Person ID","Physical Activity
    Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code: []
    assumptions:
    - text: 'Blood Pressure must be parseable into integer Systolic and Diastolic
        values via the pattern NNN/NNN, and for every row Systolic > Diastolic. This
        supports creating bp_high and avoids parse errors. Example Deequ constraints:
        .hasPattern("Blood Pressure", "^\\d{2,3}/\\d{2,3}$") and .satisfies("cast(split(`Blood
        Pressure`, ''/'')[0] as INT) > cast(split(`Blood Pressure`, ''/'')[1] as INT)",
        "systolic_gt_diastolic").'
      sources:
      - start_line: 20
        end_line: 21
        file: ''
      - start_line: 66
        end_line: 66
        file: ''
      uid: 46773f41-4b45-44bb-a0ac-c82f6d1f5b47
    - text: 'Quality of Sleep and Sleep Duration must be on compatible scales: Quality
        of Sleep is an integer in [0, 10], Sleep Duration is in hours within [0, 24],
        and the computed restful_hours = Sleep Duration * (Quality of Sleep / 10)
        must not exceed Sleep Duration. Example Deequ constraints: .satisfies("`Quality
        of Sleep` BETWEEN 0 AND 10 AND `Sleep Duration` >= 0 AND `Sleep Duration`
        <= 24", "qos_duration_range") and .satisfies("(`Sleep Duration` * (`Quality
        of Sleep`/10.0)) <= `Sleep Duration`", "restful_le_duration").'
      sources:
      - start_line: 22
        end_line: 29
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: bf8f8ad2-3854-4db2-8575-3b8c149304a8
    - text: 'Physical Activity Level and Daily Steps must be numeric with non-zero
        variance so that their correlation and expected-steps calculation are defined.
        The Pearson correlation between them should be finite (not NaN). Example Deequ
        constraints: .hasStandardDeviation("Physical Activity Level", GreaterThan(0))
        and .hasStandardDeviation("Daily Steps", GreaterThan(0)) and .hasCorrelation("Physical
        Activity Level", "Daily Steps", -1.0, 1.0).'
      sources:
      - start_line: 31
        end_line: 41
        file: ''
      uid: 0fa3451a-e822-4737-8d29-6733fa1cdbe0
    - text: "For records labeled with a Sleep Disorder (Insomnia or Sleep Apnea),\
        \ Stress Level must be present (non-null) and numeric on a 0\u201310 scale,\
        \ to allow reliable group-wise thresholds. Example Deequ constraints: .isComplete(\"\
        Stress Level\").where(\"`Sleep Disorder` IN ('Insomnia','Sleep Apnea')\")\
        \ and .satisfies(\"`Stress Level` BETWEEN 0 AND 10\", \"stress_scale\").where(\"\
        `Sleep Disorder` IN ('Insomnia','Sleep Apnea')\")."
      sources:
      - start_line: 42
        end_line: 48
        file: ''
      - start_line: 57
        end_line: 59
        file: ''
      uid: e24ca5c8-3b76-4229-b4d2-256cb56371d1
    - text: 'For rows where Sleep Disorder is ''Sleep Apnea'', BMI Category must be
        in the expected enumeration {''Normal'', ''Normal Weight'', ''Overweight'',
        ''Obese''} (no unexpected labels), because the apnea_over_prop calculation
        relies on this set. Example Deequ constraint: .isContainedIn("BMI Category",
        ["Normal","Normal Weight","Overweight","Obese"]).where("`Sleep Disorder` =
        ''Sleep Apnea''").'
