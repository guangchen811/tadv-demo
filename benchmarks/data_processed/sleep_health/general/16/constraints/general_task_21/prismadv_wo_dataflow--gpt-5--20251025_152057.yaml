    - text: 'All ''Physical Activity Level'' values should be present (non-null) and
        parseable as numeric for every record so that correlation and downstream calculations
        do not become NaN. We could represent this assumption as deequ constraints
        like these: .completeness(''Physical Activity Level'', lambda x: x == 1.0)
