        (e.g., completeness >= 0.9 under that condition). Deequ examples: hasCompleteness(''Stress
        Level'', where=''`Sleep Disorder` IN ("Insomnia","Sleep Apnea")'', assertion
        >= 0.9) and hasDataType(''Stress Level'', FractionalOrIntegral, where=''`Sleep
