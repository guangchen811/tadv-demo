        end_line: 41
        file: ''
      uid: 8c222111-f87e-4440-9244-c835d143036c
    - text: 'The ''Physical Activity Level'' values should be on a consistent, bounded
        scale where a threshold of 40 is meaningful; a reasonable expectation is that
        values lie between 0 and 100 inclusive. We could represent this assumption
        as deequ constraints like these: .hasMin(''Physical Activity Level'', lambda
        m: m >= 0) and .hasMax(''Physical Activity Level'', lambda m: m <= 100) (or
        as Great Expectations: expect_column_values_to_be_between(min_value=0, max_value=100))'
