        file: ''
      - start_line: 37
        end_line: 41
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      uid: c1aabff5-5296-4a19-93af-db55c34a9d60
    - text: 'The ''Physical Activity Level'' column should exhibit variability (not
        be constant) so that its standard deviation is greater than 0; otherwise,
        the expected-steps calculation will involve division by zero or produce infinities/NaNs.
        We could represent this assumption as a deequ constraint like this: .hasStandardDeviation(''Physical
