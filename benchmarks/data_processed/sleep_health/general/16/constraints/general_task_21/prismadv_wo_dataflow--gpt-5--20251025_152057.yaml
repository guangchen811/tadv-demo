  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'Both ''Physical Activity Level'' and ''Daily Steps'' must be numeric,
        complete (no nulls), and non-negative across all rows so they can be safely
        used for correlation, standard deviation/mean calculations, and thresholding
        (<= 3000 for steps, <= 40 for activity). Possible Deequ constraints: .isComplete(''Physical
        Activity Level'') and .isComplete(''Daily Steps''); .hasDataType(''Physical
        Activity Level'', ConstrainableDataTypes.Integral) and .hasDataType(''Daily
        Steps'', ConstrainableDataTypes.Integral); .compliance(''non_negative_activity'',
        ''`Physical Activity Level` >= 0 AND `Daily Steps` >= 0'', _ >= 1.0).'
      sources:
