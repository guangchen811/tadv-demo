        end_line: 36
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      uid: f1b37413-ebb1-420a-98d9-a72ce365670d
    - text: 'The correlation-based projection expected_steps_from_pal requires a finite
        correlation between ''Physical Activity Level'' and ''Daily Steps'' and a
        non-zero standard deviation of ''Physical Activity Level'' to avoid division
        by zero (steps_std/pal_std) and NaNs. Possible Deequ constraints: .hasStandardDeviation(''Physical
        Activity Level'', _ > 0); .hasNumberOfDistinctValues(''Physical Activity Level'',
        _ >= 2) and .hasNumberOfDistinctValues(''Daily Steps'', _ >= 2); .hasCorrelation(''Physical
        Activity Level'', ''Daily Steps'', v => !v.isNaN && v >= -1.0 && v <= 1.0).'
      sources:
      - start_line: 33
        end_line: 41
        file: ''
      uid: cbc20414-f9a3-46e4-8f01-76f55284c6f9
    - text: 'Daily Steps should be non-negatively associated with Physical Activity
        Level (higher activity level should not predict fewer steps overall). Enforce
        a non-negative Pearson correlation between the two columns. Possible Deequ
        constraint: .hasCorrelation(''Physical Activity Level'', ''Daily Steps'',
        v => v >= 0.0).'
      sources:
      - start_line: 37
        end_line: 41
        file: ''
