  '["BMI Category","Blood Pressure","Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Blood Pressure encodes two integers as ''Systolic/Diastolic'' for every
        row, and the parsed values must satisfy Systolic > Diastolic. This is required
        to safely compute bp_high downstream. Example Deequ constraint: .satisfies("regexp_like(`Blood
        Pressure`, ''^[0-9]{2,3}/[0-9]{2,3}$'') AND cast(split(`Blood Pressure`, ''/'')[0]
        as int) > cast(split(`Blood Pressure`, ''/'')[1] as int)", ''bp_format_and_order'')'
      sources:
