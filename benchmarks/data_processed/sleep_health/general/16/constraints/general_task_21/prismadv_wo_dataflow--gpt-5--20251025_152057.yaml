        end_line: 24
        file: ''
      - start_line: 67
        end_line: 67
        file: ''
      uid: df80c2d5-9454-4d9a-8c7a-5063ec1a54a2
    - text: 'All inputs needed for apnea_risk_score are simultaneously valid on each
        row: (a) BMI Category is in the expected vocabulary {''Overweight'',''Obese'',''Normal'',''Normal
        Weight''}, (b) Blood Pressure parseable as NN/NN and yields integers, and
        (c) Quality of Sleep and Sleep Duration are numeric on the stated scales.
        This ensures apnea_risk_score is computable for every record. Example Deequ
        constraint: .satisfies("`BMI Category` IN (''Overweight'',''Obese'',''Normal'',''Normal
        Weight'') AND regexp_like(`Blood Pressure`, ''^[0-9]{2,3}/[0-9]{2,3}$'') AND
        cast(`Quality of Sleep` as int) BETWEEN 0 AND 10 AND cast(`Sleep Duration`
        as double) >= 0", ''inputs_ready_for_apnea_risk'')'
      sources:
      - start_line: 65
        end_line: 69
        file: ''
      - start_line: 20
        end_line: 21
        file: ''
      - start_line: 22
        end_line: 24
        file: ''
      uid: 1354dae8-be1b-4bea-a60c-013281a6029a
    - text: 'The numeric parts derived from Blood Pressure are plausible adult values
        so the high-BP predicate is meaningful: Systolic in [70, 250] and Diastolic
        in [40, 150]. Example Deequ constraint: .satisfies("cast(split(`Blood Pressure`,
        ''/'')[0] as int) BETWEEN 70 AND 250 AND cast(split(`Blood Pressure`, ''/'')[1]
        as int) BETWEEN 40 AND 150", ''bp_ranges_plausible'')'
