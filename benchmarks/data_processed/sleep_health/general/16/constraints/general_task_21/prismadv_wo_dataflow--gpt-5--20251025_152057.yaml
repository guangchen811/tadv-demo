      uid: c2ce5e85-2d8b-4d7b-8aa3-588a52f348fc
    - text: 'Both Sleep Disorder categories (''Insomnia'' and ''Sleep Apnea'') must
        be present (at least one record each) among non-null labels so that ins_mean_stress
        and ap_mean_stress are defined and the dynamic stress_threshold does not fall
        back to the default. Example Deequ constraints: .where("`Sleep Disorder` =
        ''Insomnia''").hasSize(_ >= 1) and .where("`Sleep Disorder` = ''Sleep Apnea''").hasSize(_
        >= 1).'
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 46
        end_line: 52
        file: ''
      uid: 6b3e2409-b8f2-454a-b880-206aa5143965
    - text: 'All non-null Sleep Disorder values should be in the domain {''Insomnia'',''Sleep
        Apnea''} so that all labeled rows consistently contribute to the stress_threshold
        calculation; otherwise, Stress Level from other labels would affect stress_score
        but not the threshold, creating bias. Example Deequ constraint: .where("`Sleep
        Disorder` IS NOT NULL").isContainedIn(''Sleep Disorder'', [''Insomnia'',''Sleep
        Apnea'']).'
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      - start_line: 57
        end_line: 59
        file: ''
      uid: 20b81d0c-9dcf-4c34-acb3-65e2f547fb4b
    - text: "The averaged per-category Stress Level (mean of 'Insomnia' and 'Sleep\
        \ Apnea' means) used as stress_threshold should fall within the 0\u201310\
        \ scale implied by Stress Level, ensuring the normalization denominator (10\
        \ - stress_threshold) remains positive and meaningful. This is satisfied when\
        \ labeled-subset Stress Level values are bounded within [0,10]. Example Deequ\
        \ constraints: .where(\"`Sleep Disorder` IN ('Insomnia','Sleep Apnea')\").hasMin('Stress\
        \ Level', _ >= 0) and .where(\"`Sleep Disorder` IN ('Insomnia','Sleep Apnea')\"\
        ).hasMax('Stress Level', _ <= 10)."
      sources:
      - start_line: 49
        end_line: 52
        file: ''
      - start_line: 58
        end_line: 59
