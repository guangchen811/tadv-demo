  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Restful hours is defined from the two inputs as: restful_hours = `Sleep
        Duration` * (`Quality of Sleep` / 10.0). Consequently, for every row: 0 <=
        restful_hours <= `Sleep Duration`. We could validate this with constraints
        such as: .satisfies("`restful_hours` = `Sleep Duration` * (`Quality of Sleep`
        / 10.0)", "restful_hours_definition") and .satisfies("`restful_hours` >= 0
        AND `restful_hours` <= `Sleep Duration`", "restful_hours_bounds").'
      sources:
      - start_line: 22
        end_line: 29
        file: ''
      - start_line: 110
        end_line: 110
        file: ''
      uid: d09096ac-6f40-45dc-8809-68a6fdb54900
    - text: 'The ''low_qos_long_sleep'' condition depends jointly on the two columns
        and should be computed as: low_qos_long_sleep = 1 if (`Quality of Sleep` <=
        6 AND `Sleep Duration` >= 7), else 0. This can be enforced with a derived-column
        check like: .satisfies("CASE WHEN `Quality of Sleep` <= 6 AND `Sleep Duration`
        >= 7 THEN 1 ELSE 0 END = `low_qos_long_sleep`", "low_qos_long_sleep_definition").'
      sources:
      - start_line: 67
        end_line: 68
        file: ''
      uid: 484f44ce-0643-4edd-9ab2-9cae3273b6d6
    - text: '`Quality of Sleep` and `Sleep Duration` must be jointly usable in arithmetic
        without coercion to null: `Quality of Sleep` must parse as an integer and
        `Sleep Duration` as a numeric for every row. A joint completeness/numericity
        guard can be expressed as: .satisfies("`Quality of Sleep` RLIKE ''^[0-9]+$''
        AND `Sleep Duration` IS NOT NULL", "qos_sleepduration_joint_valid").'
      sources:
      - start_line: 22
        end_line: 26
        file: ''
      uid: 5ee85c5d-c3bc-414b-9dc1-1a2af0537746
    - text: 'Because `Quality of Sleep` is used as a proportion of `Sleep Duration`,
        the per-row ratio restful_hours / `Sleep Duration` must be within [0, 1] (with
        restful_hours = 0 when `Sleep Duration` = 0). This can be validated as: .satisfies("CASE
        WHEN `Sleep Duration` > 0 THEN (`Sleep Duration` * (`Quality of Sleep` / 10.0))
        / `Sleep Duration` BETWEEN 0 AND 1 ELSE (`Sleep Duration` * (`Quality of Sleep`
        / 10.0)) = 0 END", "restful_hours_ratio_bounds").'
      sources:
      - start_line: 22
        end_line: 29
        file: ''
      uid: 2aa99ef8-909e-47bc-8cb8-f3628be2beac
  '["Quality of Sleep","Sleep Duration","Stress Level"]':
    code: []
    assumptions:
    - text: "Quality of Sleep and Sleep Duration must be numerically consistent with\
        \ the restful-hours model used downstream: 'Quality of Sleep' is a 0\u2013\
        10 rating (integer scale) and 'Sleep Duration' is a non-negative number of\
        \ hours. For every row, (Sleep Duration * (Quality of Sleep / 10.0)) must\
        \ be between 0 and Sleep Duration (cannot exceed total hours slept). Example\
        \ Deequ: .satisfies('`Sleep Duration` >= 0 AND `Quality of Sleep` BETWEEN\
        \ 0 AND 10 AND (`Sleep Duration` * (`Quality of Sleep`/10.0)) >= 0 AND (`Sleep\
        \ Duration` * (`Quality of Sleep`/10.0)) <= `Sleep Duration`', 'restful_hours_consistency')"
