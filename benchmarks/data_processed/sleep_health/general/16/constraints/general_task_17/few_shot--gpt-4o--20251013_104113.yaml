constraints:
  Age:
    code:
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isGreaterThan('Daily Steps', 0)
      - Invalid
    assumptions: []
  Heart Rate:
    code:
    - - .isGreaterThan('Heart Rate', 0)
      - Invalid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isGreaterThan('Physical Activity Level', 0)
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isGreaterThan('Quality of Sleep', 0)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia', ''])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isGreaterThan('Sleep Duration', 0)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isGreaterThan('Stress Level', 0)
      - Invalid
    assumptions: []
