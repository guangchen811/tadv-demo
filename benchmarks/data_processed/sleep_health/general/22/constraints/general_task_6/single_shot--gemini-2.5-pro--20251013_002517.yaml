constraints:
  BMI Category:
    code:
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .containsPattern('Blood Pressure', '^\\d{2,3}/\\d{2,3}$')
      - Invalid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .satisfies('`Daily Steps` >= 0 AND `Daily Steps` <= 50000', 'Daily Steps must
        be in range [0, 50000]')
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .satisfies('`Physical Activity Level` >= 0 AND `Physical Activity Level` <=
        100', 'Physical Activity Level must be in range [0, 100]')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isContainedIn('Quality of Sleep', ['4', '5', '6', '7', '8', '9'])
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .satisfies('`Sleep Duration` > 2.99 AND `Sleep Duration` <= 14.01', 'Sleep
        Duration must be in (2.99, 14.01] for log/sqrt transforms')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isContainedIn('Stress Level', ['3', '4', '5', '6', '7', '8'])
      - Valid
    assumptions: []
