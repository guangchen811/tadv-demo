constraints:
  Age:
    code:
    - - .hasColumn('Age')
      - Invalid
    - - '.hasMax(''Age'', lambda v: v <= 100)'
      - Valid
    - - '.hasMin(''Age'', lambda v: v >= 18)'
      - Valid
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .hasColumn('BMI Category')
      - Invalid
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasColumn('Blood Pressure')
      - Invalid
    - - .hasPattern('Blood Pressure', '^[0-9]{2,3}/[0-9]{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    - - '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) > CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT)", ''bp_order_systolic_gt_diastolic'', lambda
        v: v == 1.0)'
      - Valid
    - - '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) BETWEEN 90 AND
        200", ''bp_systolic_range'', lambda v: v >= 0.99)'
      - Valid
    - - '.satisfies("CAST(split(`Blood Pressure`, ''/'')[1] AS INT) BETWEEN 50 AND
        120", ''bp_diastolic_range'', lambda v: v >= 0.99)'
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .hasColumn('Daily Steps')
      - Invalid
    - - '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda c: c
        > 0.3)'
      - Valid
    - - '.hasMax(''Daily Steps'', lambda v: v <= 50000)'
      - Valid
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .hasColumn('Gender')
      - Invalid
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .hasColumn('Heart Rate')
      - Invalid
    - - '.hasMax(''Heart Rate'', lambda v: v <= 220)'
      - Valid
    - - '.hasMin(''Heart Rate'', lambda v: v >= 30)'
      - Valid
    - - .isComplete('Heart Rate')
      - Valid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .hasColumn('Person ID')
      - Invalid
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .hasColumn('Physical Activity Level')
      - Invalid
    - - '.hasMax(''Physical Activity Level'', lambda v: v <= 100)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .hasColumn('Quality of Sleep')
      - Invalid
    - - '.hasMax(''Quality of Sleep'', lambda v: v <= 9)'
      - Valid
    - - '.hasMin(''Quality of Sleep'', lambda v: v >= 3)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda v: v >= 0.35)'
      - Valid
    - - '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (''Sleep Apnea'',''Insomnia'')",
        ''sleep_disorder_valid_values'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasColumn('Sleep Duration')
      - Invalid
    - - '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda c: c > 0.1)'
      - Valid
    - - '.hasMax(''Sleep Duration'', lambda v: v <= 14.0)'
      - Valid
    - - '.hasMin(''Sleep Duration'', lambda v: v >= 2.0)'
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .hasColumn('Stress Level')
      - Invalid
    - - '.hasMax(''Stress Level'', lambda v: v <= 10)'
      - Valid
    - - '.hasMin(''Stress Level'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
