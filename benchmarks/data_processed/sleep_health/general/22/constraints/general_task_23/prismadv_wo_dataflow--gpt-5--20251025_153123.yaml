        be represented as: hasPattern(''Blood Pressure'', ''^\s*\d{2,3}\s*/\s*\d{2,3}\s*$'')
        and satisfies(''Blood Pressure IS NULL OR (bp_sys IS NOT NULL AND bp_dia IS
