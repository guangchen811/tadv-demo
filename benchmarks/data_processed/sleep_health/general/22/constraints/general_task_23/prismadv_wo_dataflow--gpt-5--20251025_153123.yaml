        end_line: 152
        file: ''
      - start_line: 103
        end_line: 113
        file: ''
      uid: df2cfe59-9780-48bc-9ded-272f9b286161
    - text: 'Value ranges jointly assumed for normalization: ''Quality of Sleep''
        should lie within [0, 10] and ''Sleep Duration'' within a physiologically
        plausible range (e.g., [0, 24]) so that normalization and clipping behave
        as intended. This can be represented as a single multi-column compliance check,
        for example: .satisfies("`Quality of Sleep` BETWEEN 0 AND 10 AND `Sleep Duration`
        BETWEEN 0 AND 24", "sleep_ranges", _ >= 0.99).'
      sources:
      - start_line: 103
        end_line: 109
        file: ''
      uid: 6f52b0e7-76f1-442d-876e-9004e731cde5
  '["Quality of Sleep","Sleep Duration"]':
