        end_line: 45
        file: ''
      uid: 444fb64b-0ad1-4530-be9c-a3b0a43116d6
    - text: 'Physiologically, systolic must be greater than or equal to diastolic:
        bp_sys >= bp_dia whenever both are present. Constraint example: satisfies("(bp_sys
        IS NULL OR bp_dia IS NULL) OR (bp_sys >= bp_dia)", "bp_sys >= bp_dia").'
      sources:
      - start_line: 41
        end_line: 45
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: 37ef4f1f-83ad-4732-b74b-54eddac932c5
    - text: 'The ''bp_stage'' label must be consistent with the thresholds applied
        to (bp_sys, bp_dia): crisis if (bp_sys >= 180 OR bp_dia >= 120), stage2 if
        (bp_sys >= 140 OR bp_dia >= 90) and not crisis, stage1 if ((130 <= bp_sys
        <= 139) OR (80 <= bp_dia <= 89)) and not stage2/crisis, elevated if ((120
        <= bp_sys <= 129) AND (bp_dia < 80)), normal if ((bp_sys < 120) AND (bp_dia
        < 80)). This can be encoded as one or more multi-column satisfies checks reflecting
        these implications.'
      sources:
      - start_line: 9
        end_line: 21
        file: ''
      - start_line: 46
        end_line: 47
        file: ''
      uid: 9fa70f5b-4ce2-443d-8aa8-64d0e6133af9
    - text: 'Mean Arterial Pressure (map) must equal the diastolic-weighted formula
        from systolic and diastolic: map = bp_dia + (bp_sys - bp_dia) / 3.0 when both
        bp_sys and bp_dia are non-null (allowing a small numeric tolerance). Also,
        given bp_sys >= bp_dia, map should lie between bp_dia and bp_sys inclusive.
        Constraint examples: satisfies("(bp_sys IS NULL OR bp_dia IS NULL OR map IS
        NULL) OR ABS(map - (bp_dia + (bp_sys - bp_dia)/3.0)) <= 1e-6", "map formula"),
        and satisfies("(bp_sys IS NULL OR bp_dia IS NULL OR map IS NULL) OR (map >=
        bp_dia AND map <= bp_sys)", "map bounds").'
      sources:
      - start_line: 48
        end_line: 49
        file: ''
      uid: 8069b7ba-0eb6-4758-b8d8-4a99fe90b80b
    - text: "Crisis triage implication: if any of the crisis triggers hold \u2014\
        \ (bp_stage = 'crisis') OR (bp_sys >= 180) OR (bp_dia >= 120) OR (Heart Rate\
        \ > 120) \u2014 then triage_level must be 'High'. Constraint example: satisfies(\"\
        CASE WHEN (bp_stage = 'crisis' OR bp_sys >= 180 OR bp_dia >= 120 OR `Heart\
        \ Rate` > 120) THEN triage_level = 'High' ELSE true END\", \"crisis implies\
        \ High triage\")."
      sources:
      - start_line: 146
        end_line: 151
        file: ''
      - start_line: 160
        end_line: 160
        file: ''
      uid: ca01ceea-c458-4520-97a6-10fef7de3029
  '["Blood Pressure","Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Blood Pressure must be a slash-delimited systolic/diastolic pair that
