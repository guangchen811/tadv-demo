        end_line: 101
        file: ''
      - start_line: 115
        end_line: 118
        file: ''
      - start_line: 156
        end_line: 156
        file: ''
      uid: 8a42c125-d6c8-4e1d-a122-546e9ad95b39
    - text: 'Daily Steps should be positively associated with Physical Activity Level:
        the Pearson and Spearman correlations between ''Daily Steps'' and ''Physical
        Activity Level'' should be non-negative. This can be represented as a Deequ
        constraint: .hasCorrelation(''Daily Steps'', ''Physical Activity Level'',
        _ >= 0.0) for both Pearson and Spearman.'
