      uid: 62f0a85d-990d-4ee6-a85c-968ce81f22aa
    - text: 'The ''Sleep Duration'' values are expected to be in hours (not minutes
        or other units), consistent with thresholds at 5, 6, and 8 used in masks and
        normalization. To guard unit errors, constrain values to a plausible hour
        range, e.g., at least 99% between 0 and 24. We could represent this as: Deequ:
        .satisfies("(`Sleep Duration` >= 0) AND (`Sleep Duration` <= 24)", "Sleep
        Duration hour-scale", lambda p: p >= 0.99) or Great Expectations: expect_column_values_to_be_between(''Sleep
        Duration'', min_value=0, max_value=24, mostly=0.99).'
      sources:
      - start_line: 71
        end_line: 72
        file: ''
      - start_line: 105
        end_line: 105
        file: ''
      uid: c621eebb-fdda-4869-b46f-b8539e38daec
    - text: 'There must be enough non-null and variable ''Sleep Duration'' values
        (among rows where ''Quality of Sleep'' is non-null) to compute a finite Pearson
        correlation, because the correlation is used directly to weight duration vs.
        quality; if the correlation is NaN (e.g., too few pairs or zero variance),
        w_dur becomes NaN and makes sleep_component NaN for all rows. Enforce: at
        least 2 rows where both ''Sleep Duration'' and ''Quality of Sleep'' are non-null
        and the standard deviation of ''Sleep Duration'' in that subset is > 0. Example
        rules: Deequ: .size(where="`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL", lambda n: n >= 2) AND .hasStandardDeviation(''Sleep Duration'',
        lambda s: s > 0, where="`Quality of Sleep` IS NOT NULL"); Great Expectations:
        expect_column_values_to_not_be_null(''Sleep Duration'', mostly=1.0, condition_parser=''great_expectations__experimental__'',
        row_condition=''`Quality of Sleep` IS NOT NULL'') AND expect_column_stdev_to_be_between(''Sleep
        Duration'', min_value=1e-6, condition_parser=''great_expectations__experimental__'',
        row_condition=''`Quality of Sleep` IS NOT NULL'').'
      sources:
