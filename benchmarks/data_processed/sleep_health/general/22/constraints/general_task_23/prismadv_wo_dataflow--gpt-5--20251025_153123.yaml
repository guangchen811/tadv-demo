        end_line: 105
        file: ''
      uid: 773ecc90-3bff-4481-9b80-7e600cebe2aa
    - text: 'The ''Quality of Sleep'' column should be mostly non-null (e.g., completeness
        >= 0.95). The code does not fill nulls and uses the column in arithmetic and
        comparisons, so missing values will yield NaNs in components and scores. Example
        (Deequ): .hasCompleteness(''Quality of Sleep'', _ >= 0.95).'
      sources:
      - start_line: 69
        end_line: 82
        file: ''
      - start_line: 103
        end_line: 114
        file: ''
      uid: fdd47fa2-b50a-4e3d-93b9-1dd8b9aef7cf
    - text: 'To avoid NaN weights and degenerate scoring, there should be sufficient
        non-null and non-constant ''Quality of Sleep'' values among rows where ''Sleep
        Duration'' is non-null, so that Pearson correlation is defined. For example:
        among rows with `Sleep Duration` NOT NULL, count of non-null `Quality of Sleep`
        >= 2 and number of distinct non-null `Quality of Sleep` >= 2 (or conditional
        stddev > 0).'
      sources:
      - start_line: 69
        end_line: 71
        file: ''
