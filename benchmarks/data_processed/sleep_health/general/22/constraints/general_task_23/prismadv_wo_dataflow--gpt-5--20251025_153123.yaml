    - text: 'Monotonicity across activity tertiles: the mean of ''Daily Steps'' for
        the top third of ''Physical Activity Level'' should be greater than or equal
        to the mean for the bottom third. This can be validated by computing pa_low=quantile(1/3)
        and pa_high=quantile(2/3), then asserting mean(Daily Steps | PAL >= pa_high)
        >= mean(Daily Steps | PAL <= pa_low) as a custom aggregate check.'
      sources:
      - start_line: 86
        end_line: 91
        file: ''
      uid: b1f2689c-d7a9-41a6-b41e-5e75025b2f2c
    - text: 'High activity should align with higher steps: among rows with ''Physical
        Activity Level'' >= 60, the proportion with ''Daily Steps'' >= 7000 should
        be at least as high as in the rest of the dataset (or meet a minimum compliance
        such as >= 0.5). This can be encoded with Deequ compliance checks, e.g., .hasCompliance(''high_pa_steps'',
        "`Physical Activity Level` >= 60 => `Daily Steps` >= 7000", _ >= 0.5), and
        optionally compare it to the compliance in the complementary group (PAL <
        60).'
      sources:
      - start_line: 92
        end_line: 94
        file: ''
      uid: 991c32b8-c267-461a-ac7e-97af65b60a35
  '["Quality of Sleep","Sleep Disorder","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Both ''Sleep Duration'' and ''Quality of Sleep'' must be non-null simultaneously
        for every row used in scoring/triage. This can be represented as a Deequ constraint:
        .satisfies("`Sleep Duration` IS NOT NULL AND `Quality of Sleep` IS NOT NULL",
        "sleep_pair_complete", _ >= 1.0).'
      sources:
      - start_line: 103
        end_line: 113
        file: ''
      uid: ae01dab0-7eee-4e40-add3-551b7347c883
    - text: 'The Pearson correlation between ''Sleep Duration'' and ''Quality of Sleep''
        across non-null rows should be non-negative (>= 0.0), reflecting that longer
        sleep should not systematically reduce reported quality. This can be represented
        as a Deequ constraint: .hasCorrelation("Sleep Duration", "Quality of Sleep",
        _ >= 0.0).'
      sources:
      - start_line: 68
        end_line: 71
        file: ''
      - start_line: 106
        end_line: 108
        file: ''
      uid: c932bddd-36a6-4d24-8a43-303a5714eb6c
    - text: 'Average ''Quality of Sleep'' among long sleepers (Sleep Duration >= 8.0)
        should be at least as high as among short sleepers (Sleep Duration < 6.0).
        Formally: mean_if(`Quality of Sleep`, `Sleep Duration` >= 8.0) - mean_if(`Quality
        of Sleep`, `Sleep Duration` < 6.0) >= 0. This can be implemented via grouped
        aggregates (SQL or custom analyzer) and an assertion on the difference.'
      sources:
      - start_line: 71
        end_line: 74
        file: ''
      uid: 9448dc54-c9bd-40cb-b515-9d8edb579b6d
    - text: 'When ''Sleep Disorder'' is labeled as ''Insomnia'' or ''Sleep Apnea'',
        both ''Sleep Duration'' and ''Quality of Sleep'' must be present (non-null),
        since triage uses the label together with the sleep component (derived from
        both columns). Deequ example: .satisfies("CASE WHEN `Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea'') THEN (`Sleep Duration` IS NOT NULL AND `Quality of Sleep` IS NOT
        NULL) ELSE true END", "sd_requires_sleep_metrics", _ >= 1.0).'
      sources:
