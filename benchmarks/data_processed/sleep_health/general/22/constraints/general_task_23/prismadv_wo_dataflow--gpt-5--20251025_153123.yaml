    - text: 'bp_stage must be consistent with bp_sys and bp_dia according to the classify_bp
        rules: (1) crisis iff (bp_sys >= 180 OR bp_dia >= 120), (2) stage2 iff (bp_sys
        >= 140 OR bp_dia >= 90) and not crisis, (3) stage1 iff ((130 <= bp_sys AND
        bp_sys <= 139) OR (80 <= bp_dia AND bp_dia <= 89)) and not stage2/crisis,
        (4) elevated iff (120 <= bp_sys AND bp_sys <= 129) AND (bp_dia < 80), (5)
        normal iff (bp_sys < 120 AND bp_dia < 80). These can be checked as bidirectional
