  '["Blood Pressure","bp_dia","bp_sys"]':
    code: []
    assumptions:
    - text: 'Blood Pressure must be a parseable systolic/diastolic pair and must produce
        non-null numeric bp_sys and bp_dia. Specifically, every non-null ''Blood Pressure''
        value should match the pattern ''[2-3 digits] / [2-3 digits]'' (spaces optional),
        and ''bp_sys'' and ''bp_dia'' should be non-null numerics. Representable in
        Deequ as, for example: satisfies(''(regexp_replace(Blood Pressure, "\\s+",
        "") RLIKE "^(\\d{2,3})/(\\d{2,3})$")'', [''Blood Pressure'']) and satisfies(''(Blood
        Pressure IS NULL) OR (bp_sys IS NOT NULL AND bp_dia IS NOT NULL)'', [''Blood
        Pressure'',''bp_sys'',''bp_dia'']).'
      sources:
      - start_line: 41
        end_line: 45
        file: ''
      uid: a0e1b05b-4489-4b36-8469-2b9eec825f69
    - text: 'Systolic blood pressure should be greater than or equal to diastolic
        blood pressure whenever both are present, ensuring physiological consistency
        for downstream MAP and stage calculations. Deequ: satisfies(''(bp_sys IS NULL
        OR bp_dia IS NULL) OR (bp_sys >= bp_dia)'', [''bp_sys'',''bp_dia'']).'
      sources:
      - start_line: 9
        end_line: 21
        file: ''
      - start_line: 48
        end_line: 48
        file: ''
      uid: 25de8a09-7f5a-4d0e-a018-a2344e439edd
    - text: 'bp_stage must be deterministically consistent with bp_sys and bp_dia
        per the classification logic: (1) If (bp_sys >= 180 OR bp_dia >= 120) then
        bp_stage = ''crisis''; (2) Else if (bp_sys >= 140 OR bp_dia >= 90) then bp_stage
        = ''stage2''; (3) Else if ((130 <= bp_sys AND bp_sys <= 139) OR (80 <= bp_dia
        AND bp_dia <= 89)) then bp_stage = ''stage1''; (4) Else if ((120 <= bp_sys
        AND bp_sys <= 129) AND (bp_dia < 80)) then bp_stage = ''elevated''; (5) Else
        if ((bp_sys < 120) AND (bp_dia < 80)) then bp_stage = ''normal''. These can
        be enforced as implication-style Deequ satisfies constraints that skip rows
        with null bp_sys/bp_dia, e.g.: satisfies(''(bp_sys IS NULL OR bp_dia IS NULL)
        OR NOT((bp_sys >= 180) OR (bp_dia >= 120)) OR (bp_stage = ''''crisis'''')'',
        [''bp_sys'',''bp_dia'',''bp_stage'']); satisfies(''(bp_sys IS NULL OR bp_dia
        IS NULL) OR NOT(((bp_sys >= 140) OR (bp_dia >= 90)) AND NOT((bp_sys >= 180)
        OR (bp_dia >= 120))) OR (bp_stage = ''''stage2'''')'', [''bp_sys'',''bp_dia'',''bp_stage'']);
        satisfies(''(bp_sys IS NULL OR bp_dia IS NULL) OR NOT( ((bp_sys BETWEEN 130
        AND 139) OR (bp_dia BETWEEN 80 AND 89)) AND ((bp_sys < 140) AND (bp_dia <
        90)) ) OR (bp_stage = ''''stage1'''')'', [''bp_sys'',''bp_dia'',''bp_stage'']);
        satisfies(''(bp_sys IS NULL OR bp_dia IS NULL) OR NOT( (bp_sys BETWEEN 120
        AND 129) AND (bp_dia < 80) ) OR (bp_stage = ''''elevated'''')'', [''bp_sys'',''bp_dia'',''bp_stage'']);
        satisfies(''(bp_sys IS NULL OR bp_dia IS NULL) OR NOT( (bp_sys < 120) AND
        (bp_dia < 80) ) OR (bp_stage = ''''normal'''')'', [''bp_sys'',''bp_dia'',''bp_stage'']).'
      sources:
      - start_line: 9
        end_line: 21
        file: ''
      - start_line: 46
        end_line: 47
        file: ''
      uid: 3aa9d5d5-f7e3-4219-9100-94699e2fcd37
    - text: 'Mean Arterial Pressure ''map'' must equal the formula derived from bp_sys
        and bp_dia: map = bp_dia + (bp_sys - bp_dia) / 3.0 for rows where both bp_sys
        and bp_dia are present (allowing a small numeric tolerance). Deequ: satisfies(''(bp_sys
        IS NULL OR bp_dia IS NULL OR map IS NULL) OR (abs(map - (bp_dia + (bp_sys
        - bp_dia)/3.0)) <= 1e-6)'', [''bp_sys'',''bp_dia'',''map'']).'
      sources:
      - start_line: 48
        end_line: 48
        file: ''
      uid: aa20e27c-b94a-4da8-8999-0e25ca7673b6
    - text: 'The normalized string representation of Blood Pressure must match the
        parsed numeric components: removing spaces, Blood Pressure should equal concat(cast(bp_sys
        as string), ''/'', cast(bp_dia as string)). Deequ: satisfies(''(regexp_replace(Blood
        Pressure, "\\s+", "") = concat(cast(bp_sys as string), ''''/'''', cast(bp_dia
        as string)))'', [''Blood Pressure'',''bp_sys'',''bp_dia'']).'
      sources:
      - start_line: 41
        end_line: 45
        file: ''
      - start_line: 170
        end_line: 173
        file: ''
      uid: 5a387790-6370-4262-8656-87ded9dc719d
  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'Both ''Physical Activity Level'' and ''Daily Steps'' must be present
        (non-null) and numeric for all records because they are jointly used in correlations,
        quantiles, a linear expectation model, and triage logic. This can be enforced
        with Deequ checks such as: .isComplete(''Physical Activity Level''), .isComplete(''Daily
        Steps''), and .hasDataType(''Physical Activity Level'', ConstrainableDataTypes.Integral),
        .hasDataType(''Daily Steps'', ConstrainableDataTypes.Integral).'
