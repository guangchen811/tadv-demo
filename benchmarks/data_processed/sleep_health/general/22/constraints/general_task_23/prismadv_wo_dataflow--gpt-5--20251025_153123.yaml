        \ (Deequ) satisfies: CASE WHEN `Quality of Sleep` IS NULL THEN 1 WHEN CAST(`Quality\
        \ of Sleep` AS DOUBLE) BETWEEN 0 AND 10 THEN 1 ELSE 0 END, ratio == 1.0."
