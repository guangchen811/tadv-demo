      uid: 7dde4096-8805-4a2a-b997-eb6a29dac0cf
      source_assumptions:
      - a647ab4c-ad61-44f9-aeda-eb6e5bd407e1
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` >= 60 THEN 1 ELSE
        0 END", "Presence of PA >= 60", lambda x: x > 0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 4ee74e55-c07d-4edb-84a1-a17003e9ebf3
      source_assumptions:
      - 67ae7438-8fca-440b-915b-74bdc2e33518
    assumptions:
    - text: 'The ''Physical Activity Level'' column must be numeric (parseable) for
        the vast majority of rows and should not be entirely null after parsing, because
        the script computes correlations, quantiles, thresholds, and a regression
        using this column without imputing it. A practical rule is: at least 95% of
        values are non-null after parsing to numeric. We could represent this as a
        Deequ constraint like: .satisfies("CASE WHEN `Physical Activity Level` IS
        NOT NULL THEN 1 ELSE 0 END", "PA non-null", lambda x: x >= 0.95).'
      sources:
      - start_line: 35
        end_line: 40
        file: ''
      - start_line: 84
        end_line: 101
        file: ''
      - start_line: 115
        end_line: 119
        file: ''
      - start_line: 156
        end_line: 156
        file: ''
      uid: b6565a85-78cf-4eab-b3d4-513799a548aa
    - text: 'The ''Physical Activity Level'' values should be non-negative for all
        non-null rows (negative activity is not meaningful and would distort thresholds/comparisons).
        We could represent this as a Deequ constraint: .satisfies("CASE WHEN `Physical
        Activity Level` IS NULL THEN 1 WHEN `Physical Activity Level` >= 0 THEN 1
        ELSE 0 END", "PA non-negative", lambda x: x == 1).'
      sources:
      - start_line: 92
        end_line: 94
        file: ''
      - start_line: 156
        end_line: 156
        file: ''
      uid: 42b345a8-1940-4b93-a5ab-1f0da167eebe
    - text: "The 'Physical Activity Level' column should be on a human-plausible scale\
        \ consistent with the code\u2019s absolute thresholds (30 for low, 60 for\
        \ high). To prevent outliers from breaking the expected-steps model and activity\
        \ scoring, the upper tail should be bounded; for example, the 99th percentile\
        \ should be <= 200. We could represent this as a Deequ constraint: .hasQuantileBetween(\"\
        Physical Activity Level\", 0.99, 0, 200)."
      sources:
      - start_line: 92
        end_line: 94
        file: ''
      - start_line: 156
        end_line: 156
        file: ''
      - start_line: 86
        end_line: 91
        file: ''
      uid: 2e9b9c2c-71c4-4588-9309-a5cfe5782ea2
    - text: 'The ''Physical Activity Level'' column should have sufficient variability
        (not be constant), otherwise regression and correlation become degenerate.
        Require at least two distinct non-null values. We could represent this as
        a Deequ constraint: .hasApproxCountDistinct("Physical Activity Level", lambda
        d: d >= 2).'
      sources:
      - start_line: 84
        end_line: 101
        file: ''
      - start_line: 86
        end_line: 91
        file: ''
      uid: a647ab4c-ad61-44f9-aeda-eb6e5bd407e1
    - text: 'For the diagnostic metric pa60_prop_steps7000 to be meaningful, at least
        one record should have ''Physical Activity Level'' >= 60. We could represent
        this as a Deequ constraint: .satisfies("CASE WHEN `Physical Activity Level`
        >= 60 THEN 1 ELSE 0 END", "Presence of PA >= 60", lambda p: p > 0).'
      sources:
      - start_line: 92
        end_line: 94
        file: ''
      uid: 67ae7438-8fca-440b-915b-74bdc2e33518
