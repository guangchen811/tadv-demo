        => (bp_sys is not null and bp_dia is not null)", ''bp_parseable'', _.compliance
        >= 0.95).'
      sources:
      - start_line: 41
        end_line: 45
        file: ''
      uid: 23727ce4-9c85-438b-844a-38af44a814a8
    - text: 'Physiological consistency of parsed blood pressure: whenever ''bp_sys''
        and ''bp_dia'' are present, systolic should be greater than or equal to diastolic.
        Constraint: .satisfies(''bp_sys >= bp_dia'', ''bp_sys_ge_dia'', _.compliance
        >= 0.98).'
      sources:
      - start_line: 41
        end_line: 49
        file: ''
      uid: cba919e5-f77f-4b01-9e87-a9188b10acd7
    - text: 'Blood pressure stage is fully determined by ''bp_sys'' and ''bp_dia''
        according to the classifier thresholds used. For all rows with non-null ''bp_sys''/''bp_dia'',
        ''bp_stage'' should equal: CASE WHEN (bp_sys >= 180 OR bp_dia >= 120) THEN
        ''crisis'' WHEN (bp_sys >= 140 OR bp_dia >= 90) THEN ''stage2'' WHEN ((bp_sys
        BETWEEN 130 AND 139) OR (bp_dia BETWEEN 80 AND 89)) THEN ''stage1'' WHEN ((bp_sys
        BETWEEN 120 AND 129) AND (bp_dia < 80)) THEN ''elevated'' WHEN (bp_sys < 120
        AND bp_dia < 80) THEN ''normal'' ELSE ''normal'' END. Constraint example:
        .satisfies("CASE WHEN (bp_sys >= 180 OR bp_dia >= 120) THEN ''crisis'' WHEN
        (bp_sys >= 140 OR bp_dia >= 90) THEN ''stage2'' WHEN ((bp_sys >= 130 AND bp_sys
        <= 139) OR (bp_dia >= 80 AND bp_dia <= 89)) THEN ''stage1'' WHEN ((bp_sys
        >= 120 AND bp_sys <= 129) AND (bp_dia < 80)) THEN ''elevated'' WHEN (bp_sys
        < 120 AND bp_dia < 80) THEN ''normal'' ELSE ''normal'' END = bp_stage", ''bp_stage_consistent'',
        _.compliance >= 0.99).'
      sources:
      - start_line: 9
        end_line: 22
        file: ''
      - start_line: 46
        end_line: 48
        file: ''
      uid: 533417d9-3074-432d-85fa-ec4dc2efb560
    - text: 'Mean Arterial Pressure (map) should lie between diastolic and systolic
        pressures, since map = bp_dia + (bp_sys - bp_dia) / 3. Constraint: .satisfies(''(map
        >= bp_dia) AND (map <= bp_sys)'', ''map_within_sys_dia'', _.compliance >=
        0.99).'
      sources:
      - start_line: 44
        end_line: 49
        file: ''
      uid: e83f6427-9fbb-4611-ae1a-e067ae6248c1
    - text: 'Sleep Duration and Quality of Sleep move together positively across the
        cohort. Two checks: (a) Pearson correlation between ''Sleep Duration'' and
        ''Quality of Sleep'' should be non-negative (e.g., >= 0.1): .hasCorrelation(''Sleep
        Duration'',''Quality of Sleep'', _ >= 0.1). (b) The average ''Quality of Sleep''
        among long sleepers (Sleep Duration >= 8.0) should be at least as high as
        among short sleepers (Sleep Duration < 6.0). This can be implemented via two
        filtered mean checks or a post-aggregation assertion comparing the two means.'
      sources:
      - start_line: 68
        end_line: 75
        file: ''
      uid: dae73238-fe5e-4116-9aad-994f34003747
    - text: 'Daily Steps should increase with Physical Activity Level. Three cohort-level
        checks: (a) Pearson correlation between ''Daily Steps'' and ''Physical Activity
        Level'' should be positive (e.g., >= 0.2): .hasCorrelation(''Daily Steps'',''Physical
        Activity Level'', _ >= 0.2). (b) Mean steps for the top tercile of ''Physical
        Activity Level'' should be greater than or equal to mean steps for the bottom
        tercile; implement via quantile computation and two filtered mean checks.
        (c) Among rows with ''Physical Activity Level'' >= 60, at least half should
        have ''Daily Steps'' >= 7000: .where(''`Physical Activity Level` >= 60'').satisfies(''`Daily
        Steps` >= 7000'', ''pa60_steps7000'', _.compliance >= 0.5).'
      sources:
      - start_line: 83
        end_line: 94
        file: ''
      uid: 10a1ec1a-4e95-42f9-8b47-f2e380acf440
    - text: 'Escalation rule consistency for crisis vitals: if any of (bp_sys >= 180,
        bp_dia >= 120, Heart Rate > 120) is true, the derived ''triage_level'' should
        be ''High''. Constraint: .satisfies("((bp_sys >= 180) OR (bp_dia >= 120) OR
        (`Heart Rate` > 120)) => (triage_level = ''High'')", ''crisis_escalates_high'',
        _.compliance = 1.0).'
      sources:
      - start_line: 146
        end_line: 151
        file: ''
      - start_line: 160
        end_line: 160
        file: ''
      uid: 37ab32bc-7833-48f3-bd34-efca96261eef
  '["Blood Pressure","Heart Rate"]':
    code: []
    assumptions:
    - text: 'Blood Pressure must be parseable into systolic and diastolic integers.
        For every non-null ''Blood Pressure'', the derived columns ''bp_sys'' and
        ''bp_dia'' should be non-null (parsed from the NN/NN pattern). This can be
        enforced with a multi-column constraint such as: satisfies("CASE WHEN `Blood
        Pressure` IS NULL THEN true ELSE (bp_sys IS NOT NULL AND bp_dia IS NOT NULL)
        END", "bp parsed").'
      sources:
