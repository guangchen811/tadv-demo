results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Physical Activity Level` AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END", "PA_numeric_parseable", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` >= 0 AND `Physical
        Activity Level` <= 100 THEN 1 ELSE 0 END", "PA_range_0_100", lambda x: x >=
        0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda x: x
        > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` = CAST(`Physical
        Activity Level` AS INT) THEN 1 ELSE 0 END", "PA_integer_values", lambda x:
        x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` BETWEEN 0 AND 10 THEN
        1 ELSE 0 END", "quality_in_0_10_range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL", "sleep_duration_and_quality_paired_non_null", lambda x: x >=
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation("Quality of Sleep", lambda x: x > 1e-6)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` IS NULL THEN 1 WHEN CAST(`Quality
        of Sleep` AS INT) = `Quality of Sleep` THEN 1 ELSE 0 END", "quality_is_integer_or_null_fraction",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(regexp_extract(`Blood Pressure`, ''^\\\s*(\\\d{2,3})\\\s*/\\\s*(\\\d{2,3})\\\s*$'',
        1) AS INT) BETWEEN 50 AND 250 AND CAST(regexp_extract(`Blood Pressure`, ''^\\\s*(\\\d{2,3})\\\s*/\\\s*(\\\d{2,3})\\\s*$'',
        2) AS INT) BETWEEN 30 AND 180 THEN 1 ELSE 0 END", "BP reasonable range", lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: '.satisfies("CASE WHEN CAST(`Person ID` AS BIGINT) IS NOT NULL THEN
        1 ELSE 0 END", "Person ID integer-like", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` IS NULL OR (`Sleep Duration`
        >= 0.0 AND `Sleep Duration` <= 24.0) THEN 1 ELSE 0 END", "Sleep Duration in
        0-24 hours", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL", "Sleep Duration-Quality paired count", lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation("Sleep Duration", lambda x: x > 1e-6)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Sleep Duration", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` >= 0 THEN 1 ELSE 0 END", "DailyStepsNonNegative",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` >= 0 AND `Daily Steps` <= 10000
        THEN 1 ELSE 0 END", "DailyStepsWithinScale", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` IS NOT NULL AND
        `Daily Steps` IS NOT NULL THEN 1 ELSE 0 END", "PA_and_Steps_nonnull_fraction",
        lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxQuantile("Physical Activity Level", 0.6666666667, lambda
        q: q is not None)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea'') THEN CASE WHEN `Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Sleep disorder rows have duration
        and quality", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL THEN 1 WHEN `Sleep
        Disorder` IN (''Insomnia'',''Sleep Apnea'') THEN 1 ELSE 0 END", "Sleep Disorder
        values are only Insomnia, Sleep Apnea or NULL", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `Sleep Disorder` IS NULL
        THEN 1 WHEN `Sleep Disorder` IN (''Insomnia'',''Sleep Apnea'') THEN 1 ELSE
        0 END", "Sleep Disorder values are only Insomnia, Sleep Apnea or NULL", lambda
        x: x == 1)'' failed on data sample: Value: 0.9866666666666667 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` = ''Insomnia''", "At least one Insomnia
        record exists", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` = ''Sleep Apnea''", "At least one
        Sleep Apnea record exists", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` >= 0 AND `Heart Rate` <= 220
        THEN 1 ELSE 0 END", "Heart Rate plausible range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` >= 50 AND `Heart Rate` <= 100
        THEN 1 ELSE 0 END", "Heart Rate midband proportion > 0", lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN floor(`Heart Rate`) = `Heart Rate` THEN 1
        ELSE 0 END", "Heart Rate is integer", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Stress Level` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "StressLevelNumeric", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Stress Level` IN (3,4,5,6,7,8) OR `Stress
        Level` IS NULL THEN 1 ELSE 0 END", "StressLevelAllowedValues", lambda x: x
        >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Stress Level` IS NOT NULL THEN 1 ELSE 0
        END", "StressLevelNonNull", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL", "At least one paired row", lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness(columns=[''Sleep Duration''], assertion=lambda
        x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
