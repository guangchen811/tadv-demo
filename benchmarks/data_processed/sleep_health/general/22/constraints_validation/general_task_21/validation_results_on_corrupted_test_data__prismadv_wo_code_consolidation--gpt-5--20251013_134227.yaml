results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies("cast(`Physical Activity Level` AS DOUBLE) IS NOT NULL",
        "PAL numeric (>=95% parsable)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("cast(`Physical Activity Level` AS DOUBLE) BETWEEN 0
        AND 100", "PAL in [0,100] inclusive", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation("Physical Activity Level", lambda s: s >
        1e-6)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`Daily Steps` IS NULL) OR (cast(`Physical Activity
        Level` AS DOUBLE) IS NOT NULL)", "PAL present when Steps present", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.hasCompleteness(''Quality of Sleep'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Quality of Sleep` AS DOUBLE) IS NOT NULL AND
        NOT isnan(CAST(`Quality of Sleep` AS DOUBLE))'', ''QoS numeric and non-NaN'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Quality of Sleep` AS DOUBLE) = FLOOR(CAST(`Quality
        of Sleep` AS DOUBLE))'', ''QoS is whole number'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`Quality of Sleep` AS DOUBLE) >= 0 AND CAST(`Quality
        of Sleep` AS DOUBLE) <= 10'', ''QoS within [0,10]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''Quality of Sleep'', lambda v: v <= 11)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''BMI Category'', [''Overweight'',''Obese'',''Normal'',''Normal
        Weight''], lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("TRIM(`BMI Category`) = `BMI Category`", "BMI Category
        trimmed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn('BMI Category', ['Underweight', 'Normal', 'Normal
        Weight', 'Overweight', 'Obese'])
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("trim(`Blood Pressure`) <> ''''", "Blood Pressure not
        empty", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', r''^\s*\d{2,3}\s*/\s*\d{2,3}\s*$'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) BETWEEN
        80 AND 240 AND cast(split(`Blood Pressure`, ''/'')[1] as int) BETWEEN 40 AND
        140 AND cast(split(`Blood Pressure`, ''/'')[1] as int) < cast(split(`Blood
        Pressure`, ''/'')[0] as int)", "BP plausible range and ordering", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: '.hasCompleteness(''Person ID'', lambda c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL'', ''Sleep
        Duration parse success (>=99%)'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(CAST(`Sleep Duration` AS DOUBLE) >= 0) AND (CAST(`Sleep
        Duration` AS DOUBLE) <= 24)'', ''Sleep Duration within 0-24 hours'', lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness("Daily Steps", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` BETWEEN 0 AND 40000 THEN 1
        ELSE 0 END", "Daily Steps plausible range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation("Daily Steps", lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct("Daily Steps", lambda x: x >= 2)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Physical Activity Level` IS NULL) OR (`Daily Steps`
        IS NOT NULL)", "Steps present when PAL present", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NULL THEN 1 WHEN CAST(`Daily
        Steps` AS BIGINT) = `Daily Steps` THEN 1 ELSE 0 END", "Steps integer-like",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Insomnia'', ''Sleep Apnea''],
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''isContainedIn(''Sleep Disorder'', [''Insomnia'',
        ''Sleep Apnea''], lambda x: x == 1.0)'' failed on data sample: Value: 0.9866666666666667
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` = ''Insomnia''", "At least one Insomnia
        label present", lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea'') THEN CAST(`Stress Level` AS DOUBLE) IS NOT NULL ELSE true END", "Labeled
        Stress Level numeric and non-null", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Stress Level` AS INT) IS NOT NULL AND CAST(`Stress
        Level` AS DOUBLE) = CAST(`Stress Level` AS INT) AND CAST(`Stress Level` AS
        INT) BETWEEN 1 AND 10", "Stress Level must be integer 1-10", lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Diastolic","Quality of Sleep","Sleep Duration","Systolic"]':
    code:
    - suggestion: '.satisfies("regexp_replace(`Blood Pressure`, ''\\s+'', '''') RLIKE
        ''^[0-9]+/[0-9]+$''", "bp_two_int_tokens", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Blood Pressure","Diastolic","Systolic"]':
    code:
    - suggestion: '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) >= cast(split(`Blood
        Pressure`, ''/'')[1] as int)", "bp_systolic_ge_diastolic", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
