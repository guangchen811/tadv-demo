results:
  Age:
    code:
    - suggestion: '.hasMax(''Age'', lambda x: x <= 120)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Age')
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .hasPattern('Blood Pressure', '^[0-9]{2,3}/[0-9]{2,3}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Daily Steps')
      status: false
      reason_if_failed: "Constraint '.isNonNegative('Daily Steps')' failed on data\
        \ sample: org.apache.spark.sql.catalyst.parser.ParseException: \n[PARSE_SYNTAX_ERROR]\
        \ Syntax error at or near '('.(line 1, pos 13)\n\n== SQL ==\nCOALESCE(CAST(Daily\
        \ Steps AS DECIMAL(20,10)), 0.0) >= 0\n-------------^^^\n"
      level: error
  Heart Rate:
    code:
    - suggestion: '.hasMax(''Heart Rate'', lambda x: x <= 220)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Heart Rate'', lambda x: x >= 30)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Physical Activity Level:
    code:
    - suggestion: '.hasMax(''Physical Activity Level'', lambda x: x <= 120)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Physical Activity Level'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.hasMax(''Quality of Sleep'', lambda x: x <= 10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Quality of Sleep'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''Sleep Disorder'', [''Insomnia'',
        ''Sleep Apnea''])'' failed on data sample: Value: 0.9866666666666667 does
        not meet the constraint requirement!'
      level: error
  Sleep Duration:
    code:
    - suggestion: '.hasMax(''Sleep Duration'', lambda x: x <= 24.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Sleep Duration'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: '.hasMax(''Stress Level'', lambda x: x <= 10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Stress Level'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
