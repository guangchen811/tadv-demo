results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL",
        "PAL numeric castable", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Physical Activity Level` AS DOUBLE) BETWEEN 0
        AND 100", "PAL within 0_100", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Quality of Sleep'', lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Quality of Sleep'', lambda x: x <= 10)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.satisfies("`Blood Pressure` IS NOT NULL AND TRIM(`Blood Pressure`)
        <> ''''", "BP completeness", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (cast(`Person ID` as string) RLIKE ''^\\s*$'')",
        "Person ID not empty or blank", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("cast(`Person ID` as string) RLIKE ''^[0-9]+$''", "Person
        ID is non-negative whole number", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.satisfies(''CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL'', ''Sleep
        Duration numeric'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0'',
        ''Sleep Duration domain [3,12] hours'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Daily Steps` >= -1000000000000 AND `Daily Steps`
        <= 1000000000000'', ''Daily Steps finite bounds'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR TRIM(`Sleep Disorder`)
        = '''' THEN 1 WHEN `Sleep Disorder` IN (''Insomnia'',''Sleep Apnea'') THEN
        1 ELSE 0 END", "Valid Sleep Disorder values", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `Sleep Disorder` IS NULL
        OR TRIM(`Sleep Disorder`) = '''' THEN 1 WHEN `Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea'') THEN 1 ELSE 0 END", "Valid Sleep Disorder values", lambda x: x ==
        1)'' failed on data sample: Value: 0.9866666666666667 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR TRIM(`Sleep Disorder`)
        = '''' THEN 1 WHEN LOWER(TRIM(`Sleep Disorder`)) IN (''nullvalue'',''na'',''n/a'',''unknown'')
        THEN 0 ELSE 1 END", "No placeholder missing tokens in Sleep Disorder", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete("Stress Level")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Stress Level` AS DOUBLE) IS NOT NULL", "Stress
        Level numeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Stress Level` AS DOUBLE) BETWEEN 1 AND 10", "Stress
        Level range [1,10]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Stress Level` AS DOUBLE) = CAST(CAST(`Stress
        Level` AS DOUBLE) AS INT) AND CAST(`Stress Level` AS DOUBLE) BETWEEN 1 AND
        10", "Stress Level integer 1-10", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
