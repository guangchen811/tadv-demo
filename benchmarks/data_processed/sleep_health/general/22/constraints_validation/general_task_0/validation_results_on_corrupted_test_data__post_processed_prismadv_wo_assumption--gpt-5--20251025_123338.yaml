results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies("`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100", "PAL in [0,100]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies(''`Quality of Sleep` >= 1 AND `Quality of Sleep` <=
        10'', ''Quality of Sleep within 1-10'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Blood Pressure","Daily Steps","Physical Activity Level","Quality of Sleep","Sleep
    Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', ''^[0-9]{2,3}/[0-9]{2,3}$'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Quality of Sleep` >= 0 AND `Quality of Sleep` <=
        10'', ''QoS within [0,10]'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0'',
        ''Sleep Duration within scoring domain'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Daily Steps` >= 0'', ''Non-negative daily steps'',
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100'', ''Physical Activity Level scale'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Stress Level` >= 1 AND `Stress Level` <= 10'', ''Stress
        Level scale'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Insomnia'', ''Sleep Apnea''],
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', ''^[0-9]{1,3} */ *[0-9]{1,3}'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(regexp_extract(`Blood Pressure`, ''^([0-9]{2,3})
        */ *([0-9]{2,3})$'', 1) AS INT) >= CAST(regexp_extract(`Blood Pressure`, ''^([0-9]{2,3})
        */ *([0-9]{2,3})$'', 2) AS INT)", "bp_systolic_ge_diastolic", lambda x: x
        >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Blood Pressure","Daily Steps","Person ID","Physical Activity Level","Quality
    of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Insomnia'', ''Sleep Apnea''],
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''isContainedIn(''Sleep Disorder'', [''Insomnia'',
        ''Sleep Apnea''], lambda x: x == 1.0)'' failed on data sample: Value: 0.9866666666666667
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\s*\\d{2,3}\\s*/\\s*\\d{2,3}\\s*$'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(split(`Blood Pressure`, "/")[0] AS INT) BETWEEN
        70 AND 250 AND CAST(split(`Blood Pressure`, "/")[1] AS INT) BETWEEN 40 AND
        150'', ''BP plausible range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Stress Level` >= 1 AND `Stress Level` <= 10'', ''Stress
        Level in [1,10]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` >= 1 AND `Quality of Sleep` <=
        10'', ''Quality of Sleep in [1,10]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100'', ''Physical Activity Level in [0,100]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'',
        ''Sleep Duration plausible hours [0,24]'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: '.hasUniqueness([''Person ID''], lambda u: u >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "sleep_duration_0_24_hours", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0",
        "sleep_duration_within_scoring_support", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.satisfies(''NOT isnan(CAST(`Daily Steps` AS DOUBLE))'', ''Daily
        Steps no NaNs'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative(''`Daily Steps`'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.4)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete("Stress Level")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Stress Level` BETWEEN 1 AND 10", "Stress Level on
        1-10 scale", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","Daily Steps","Physical Activity Level","Quality of Sleep","Sleep Duration","Stress Level"]':
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\d+/\d+$'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Daily Steps` >= 0', 'Daily Steps non-negative')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100', 'pal_in_0_100')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Quality of Sleep` BETWEEN 1 AND 10', 'quality_between_1_10')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Stress Level` BETWEEN 1 AND 10', 'stress_between_1_10')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0',
        'sleep_duration_expected_range')
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''`Daily Steps`'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100)'', ''pal_in_range_0_100'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: .satisfies('`Stress Level` BETWEEN 1 AND 10', 'Stress Level in [1,10]')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Quality of Sleep` BETWEEN 1 AND 10', 'Quality of Sleep
        in [1,10]')
      status: true
      reason_if_failed: ''
      level: warning
