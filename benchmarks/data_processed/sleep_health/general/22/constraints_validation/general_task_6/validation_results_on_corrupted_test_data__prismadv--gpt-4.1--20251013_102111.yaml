results:
  Physical Activity Level:
    code:
    - suggestion: .satisfies('(`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100 AND `Physical Activity Level` = FLOOR(`Physical Activity Level`))',
        'PAL is integer in [0, 100]')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Blood Pressure` RLIKE ''^[0-9]+/[0-9]+$''", "Blood
        Pressure Format", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(split(`Blood Pressure`, ''/'')[0] AS
        INT) BETWEEN 70 AND 250 AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT)
        BETWEEN 40 AND 150 THEN 1 ELSE 0 END", "Plausible Blood Pressure Range", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: '.hasCompleteness(''Person ID'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Person ID` AS BIGINT) IS NOT NULL'', ''Person
        ID is integer'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .satisfies('(`Daily Steps` >= 0 AND `Daily Steps` <= 50000) AND
        (`Physical Activity Level` >= 0 AND `Physical Activity Level` <= 100)', 'Daily
        Steps and PAL in valid range')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      status: false
      reason_if_failed: 'Constraint ''isContainedIn(''Sleep Disorder'', [''Sleep Apnea'',
        ''Insomnia''])'' failed on data sample: Value: 0.9866666666666667 does not
        meet the constraint requirement!'
      level: error
  '["Blood Pressure","bp_diastolic","bp_systolic"]':
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Blood Pressure
        format is systolic/diastolic and both are integers")
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level","sedentary_index"]':
    code:
    - suggestion: .satisfies('(`Physical Activity Level` IS NOT NULL AND `Daily Steps`
        IS NOT NULL AND `Physical Activity Level` >= 0 AND `Physical Activity Level`
        <= 100 AND `Daily Steps` >= 0 AND `Daily Steps` <= 50000)', 'Valid sedentary_index
        computation')
      status: true
      reason_if_failed: ''
      level: error
  '["Person ID","Sleep Disorder"]':
    code:
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Sleep
        Apnea','Insomnia'))", "Valid Sleep Disorder values")
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`Sleep Disorder` IS NULL OR `Sleep
        Disorder` IN (''Sleep Apnea'',''Insomnia''))", "Valid Sleep Disorder values")''
        failed on data sample: Value: 0.9866666666666667 does not meet the constraint
        requirement!'
      level: error
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies(''`Sleep Duration` > 2.99 AND `Sleep Duration` < 14.01'',
        ''Sleep Duration in (2.99, 14.01)'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Quality of Sleep` >= 4 AND `Quality of Sleep` <=
        9'', ''Quality of Sleep in [4,9]'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration","sleep_need_index"]':
    code:
    - suggestion: .satisfies('(`Sleep Duration` > 2.99) AND (`Sleep Duration` < 14.01)',
        'Sleep Duration in valid log/sqrt bounds')
      status: true
      reason_if_failed: ''
      level: error
  '["Stress Level","stress_norm"]':
    code:
    - suggestion: '.satisfies(''`Stress Level` IN (3,4,5,6,7,8)'', ''Stress Level
        allowed values'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
