results:
  Physical Activity Level:
    code:
    - suggestion: '.hasCompleteness(''Physical Activity Level'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        x: x > 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Physical Activity Level'', lambda x: x >= 90)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete("Sleep Duration")
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda c: c > 0.5, ''Daily Steps
        must have enough data for model fitting'')'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        corr: corr > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      status: false
      reason_if_failed: 'Constraint ''isContainedIn(''Sleep Disorder'', [''Insomnia'',
        ''Sleep Apnea''])'' failed on data sample: Value: 0.9866666666666667 does
        not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` = TRIM(`Sleep
        Disorder`)", "Sleep Disorder has no leading/trailing whitespace", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .satisfies("`Stress Level` IS NULL OR (`Stress Level` >= 0 AND `Stress
        Level` <= 10)", "StressLevelRangeCheck")
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: '.hasCompleteness(''Age'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''Age'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Age","BMI Category","Stress Level"]':
    code:
    - suggestion: '.hasCorrelation(''Age'', ''Stress Level'', lambda x: abs(x) < 0.7)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        x: x >= 0.5)'
      status: true
      reason_if_failed: ''
      level: error
