constraints:
  Age:
    code:
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - '.hasNumberOfDistinctValues(''Sleep Duration'', lambda x: x > 1)'
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isContainedIn('Stress Level', ['3', '4', '5', '6', '7', '8'])
      - Valid
    assumptions: []
