      - start_line: 27
        end_line: 33
        file: ''
      uid: 806f2da0-6ead-451f-bd9f-1608a7848e28
    - text: The columns 'Sleep Duration' and 'Quality of Sleep' are both required
        to be present and numeric for the calculation of correlation and regression-based
        features. It is assumed that neither column should be entirely constant or
        all-null, and both should contain sufficient variance for correlation/regression
        to be meaningful.
      sources:
      - start_line: 36
        end_line: 52
        file: ''
      uid: 9834d580-b47f-4681-86a6-909aa8dbc62d
    - text: The columns 'Daily Steps' and 'Physical Activity Level' are both required
        to be present and numeric for calibration (correlation and regression). It
        is assumed that both columns should have matching, non-null values for each
        record, and neither column should be entirely constant or all-null.
      sources:
      - start_line: 54
        end_line: 64
        file: ''
      uid: 86d7d6d6-d25f-438a-9b4f-0cb724532273
    - text: The columns 'BMI Category' and 'Sleep Disorder' are used together to compute
        the apnea-related component. It is assumed that when 'Sleep Disorder' is 'Sleep
        Apnea', the value in 'BMI Category' is always one of ['Normal', 'Normal Weight',
        'Overweight', 'Obese'], and that the distribution of these categories is meaningful
        for apnea_ratio calculation.
      sources:
      - start_line: 97
        end_line: 107
        file: ''
      uid: c970780a-395b-4a01-8295-b95259d599f1
    - text: The final 'risk_score' is a weighted sum of 'bp_index', 'bmi_risk', 'age_index',
        'stress_index', 'hr_index', 'sleep_risk', 'activity_protect', and 'apnea_component'.
        It is assumed that all these component columns are present, numeric, and on
        a compatible scale (normalized to [0, 1]) for the aggregation to be valid.
      sources:
      - start_line: 109
        end_line: 119
        file: ''
      uid: 77181a77-f71a-4528-b7a5-fa4b398c7399
    - text: The columns 'sleep_debt_pos' and 'restfulness_residual' are jointly required
        and must be numeric to compute 'sleep_risk'. It is assumed that both columns
        are present, numeric, and their combination as indices is meaningful for risk
        scoring.
