  '["prioritized_for_outreach","risk_score"]':
    code: []
    assumptions:
    - text: The columns 'SBP' and 'DBP' are both derived from 'Blood Pressure', and
        it is assumed that for all records where 'Blood Pressure' is present, both
        'SBP' and 'DBP' will be non-null numeric values and SBP >= DBP (systolic >=
        diastolic) for medically valid blood pressure readings.
      sources:
      - start_line: 27
        end_line: 33
        file: ''
      uid: 982853be-f479-4dbc-be69-5ec3c3f773db
    - text: The columns 'Sleep Duration' and 'Quality of Sleep' are both required
        to be numeric and non-null when computing their correlation, regression, and
        the 'restfulness_residual' feature. Their distributions must not be constant
        vectors (i.e., each must have more than one unique value) to avoid generating
        NaN correlations or division by zero.
      sources:
      - start_line: 36
        end_line: 51
        file: ''
      uid: 1d3695c2-0103-44c1-b4e9-d4f71eb9973e
    - text: The columns 'Daily Steps' and 'Physical Activity Level' are both required
        to be numeric and non-null for calibration and correlation computations. Both
        must have sufficient variation (not be constant vectors) to avoid NaN correlations
        and to ensure the blended activity index is meaningful.
      sources:
      - start_line: 54
        end_line: 63
        file: ''
      uid: 3d9b8a8c-0b59-40db-b4de-63aa025fb9e3
    - text: The columns 'Sleep Disorder' and 'BMI Category' are used together to compute
        the 'apnea_component'. When 'Sleep Disorder' is 'Sleep Apnea', the corresponding
        'BMI Category' value should be either 'Overweight' or 'Obese' for the apnea_ratio
        to be above the baseline of 0.60. It is assumed that 'Sleep Disorder' and
        'BMI Category' are both present and valid strings for these records.
      sources:
      - start_line: 97
        end_line: 107
        file: ''
      uid: 43759eb7-65bb-4a9c-8fcb-7dacbf4460a6
    - text: 'The columns ''risk_score'' and ''prioritized_for_outreach'' are linked
        such that ''prioritized_for_outreach'' is True if and only if ''risk_score''
        is greater than or equal to the 75th percentile (top quartile) of ''risk_score''
        in the dataset. This implies a dependency and monotonicity: all records prioritized
        for outreach have risk_scores at or above the threshold.'
      sources:
      - start_line: 122
        end_line: 123
        file: ''
      uid: 8da58023-425f-4477-8673-b74a541f9340
    - text: The columns 'bp_index', 'bmi_risk', 'age_index', 'hr_index', 'stress_index',
        'sleep_risk', 'activity_protect', and 'apnea_component' must all be present
        and numeric for each record to successfully compute 'risk_score'. Each of
        these columns must not have null values for any record where 'risk_score'
        is computed.
