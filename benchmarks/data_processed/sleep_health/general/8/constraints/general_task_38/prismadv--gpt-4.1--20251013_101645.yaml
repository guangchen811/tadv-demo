    assumptions:
    - text: The columns 'SBP' and 'DBP' are both derived from parsing the 'Blood Pressure'
        column and are used together to compute 'PP' (pulse pressure) and 'MAP' (mean
        arterial pressure). It is assumed that for every record where 'Blood Pressure'
        is present, both 'SBP' and 'DBP' will be present and numeric, and 'SBP' >=
        'DBP'.
