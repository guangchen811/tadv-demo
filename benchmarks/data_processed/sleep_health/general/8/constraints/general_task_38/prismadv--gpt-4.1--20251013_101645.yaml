      - start_line: 86
        end_line: 89
        file: ''
      uid: cb5063dd-8e6b-4d71-9e08-801b4a602219
    - text: For each record, the columns 'bp_index', 'bmi_risk', 'age_index', 'hr_index',
        'stress_index', 'sleep_risk', 'activity_protect', and 'apnea_component' must
        all be present and non-null in order to compute a valid 'risk_score'.
