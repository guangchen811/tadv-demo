constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isGreaterThanOrEqualTo('Age', 0)
      - Invalid
    - - .isIntegral('Age')
      - Invalid
    - - .isLessThanOrEqualTo('Age', 100)
      - Invalid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    - - .satisfies("Blood Pressure RLIKE '^\\d{2,3}/\\d{2,3}$'", "Blood Pressure format
        is SYS/DIA integers")
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isGreaterThanOrEqualTo('Daily Steps', 0)
      - Invalid
    - - .isIntegral('Daily Steps')
      - Invalid
    - - .isLessThanOrEqualTo('Daily Steps', 15000)
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    - - .isGreaterThanOrEqualTo('Heart Rate', 30)
      - Invalid
    - - .isIntegral('Heart Rate')
      - Invalid
    - - .isLessThanOrEqualTo('Heart Rate', 200)
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .hasMinLength('Occupation', 1)
      - Invalid
    - - .isComplete('Occupation')
      - Valid
    - - .isDataType('Occupation', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isIntegral('Person ID')
      - Invalid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isGreaterThanOrEqualTo('Physical Activity Level', 0)
      - Invalid
    - - .isIntegral('Physical Activity Level')
      - Invalid
    - - .isLessThanOrEqualTo('Physical Activity Level', 120)
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGreaterThanOrEqualTo('Quality of Sleep', 1)
      - Invalid
    - - .isIntegral('Quality of Sleep')
      - Invalid
    - - .isLessThanOrEqualTo('Quality of Sleep', 10)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      - Valid
    - - .isDataType('Sleep Disorder', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isFractional('Sleep Duration')
      - Invalid
    - - .isGreaterThanOrEqualTo('Sleep Duration', 3.0)
      - Invalid
    - - .isLessThanOrEqualTo('Sleep Duration', 12.0)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isGreaterThanOrEqualTo('Stress Level', 1)
      - Invalid
    - - .isIntegral('Stress Level')
      - Invalid
    - - .isLessThanOrEqualTo('Stress Level', 10)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isIntegral('id')
      - Invalid
    assumptions: []
