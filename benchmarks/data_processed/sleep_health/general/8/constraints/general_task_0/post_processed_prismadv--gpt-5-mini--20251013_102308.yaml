    - text: '''Quality of Sleep'' is expected to be on a 0-to-10 scale so that quality_score
        = Quality of Sleep / 10 yields values in [0.0, 1.0]. Similarly, ''Stress Level''
        is expected to lie in the 1-to-10 range so that normalize(Stress Level, 1.0,
        10.0) yields values in [0.0, 1.0]. Violations (values outside those ranges)
        will be clipped by the normalize/clip operations and will change the intended
        interpretation of the combined metrics.'
