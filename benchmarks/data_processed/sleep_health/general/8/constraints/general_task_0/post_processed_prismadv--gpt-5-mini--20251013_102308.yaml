prismadv_config:
  model:
    use_async: true
    use_dataflow: true
    correlation_detection: true
    downstream_task_description: No specific description provided. The script can
      be used for any task.
  llm:
    model_name: gpt-5-mini
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  Physical Activity Level:
    code: []
    assumptions:
    - text: 'Both ''Physical Activity Level'' and ''Daily Steps'' must be present
        and numeric for the rows used to compute activity. The code computes steps_norm
        = normalize(df[''Daily Steps''], s_min, s_max) and pal_norm = normalize(df[''Physical
        Activity Level''], 0.0, 100.0) and then combines them (base_activity = 0.5
        * steps_norm + 0.5 * pal_norm). This implies that for meaningful results both
        columns should be convertible to float and not null in the same rows. Actionable
        checks (Deequ-style): ensure joint completeness and numeric-convertibility,
        e.g. ensure no row has (isNull(''Daily Steps'') XOR isNull(''Physical Activity
        Level'')), and both columns are numeric.'
      sources:
      - start_line: 35
        end_line: 44
        file: ''
      uid: 47958ede-53ed-48c2-a073-2d0f8770bcb1
    - text: '''Physical Activity Level'' must be on a 0..100 scale and ''Daily Steps''
        must be non-negative, so that pal_norm and steps_norm produce values in [0,1]
        and the weighted combination is meaningful. Concretely: ''Physical Activity
        Level'' values should be contained in [0,100] and ''Daily Steps'' should be
        >= 0 for all rows. Actionable checks: isContainedInRange(''Physical Activity
        Level'', 0, 100) and isNonNegative(''Daily Steps'').'
      sources:
      - start_line: 40
        end_line: 44
        file: ''
      - start_line: 43
        end_line: 43
        file: ''
      uid: fc8b90cb-9fad-4068-b633-4b3eb8cbf845
    - text: 'The normalization procedure assumes a non-degenerate spread of ''Daily
        Steps'' so that the 5th percentile is strictly less than the 95th percentile
        (s_min < s_max). Because steps_norm is used together with pal_norm to compute
        base_activity, there should be meaningful variation in ''Daily Steps'' (i.e.
        not all rows identical). Actionable checks: assert approxQuantile(''Daily
        Steps'', 0.05) < approxQuantile(''Daily Steps'', 0.95) and/or that the inter-percentile
        range > 0.'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      uid: b04b3348-bbba-4611-80c8-f76f8429426f
    - text: 'For rows flagged as very active by the code ((df[''Physical Activity
        Level''] >= 90)), ''Physical Activity Level'' must be numeric and present
        (so the boolean comparison and subsequent arithmetic with very_active are
        valid) and pal_norm should be high (near 1). Practically, enforce that when
        ''Physical Activity Level'' >= 90 then ''Physical Activity Level'' is not
        null and within [90,100]. Actionable check: conditional constraint such as
        forAll rows: if ''Physical Activity Level'' >= 90 then ''Physical Activity
        Level'' <= 100 and not null.'
      sources:
      - start_line: 41
        end_line: 44
        file: ''
      uid: ba0b74dd-98c3-4da7-bd07-233630bfa4e2
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("CASE WHEN cast(`Quality of Sleep` AS DOUBLE) >= 0 AND
        cast(`Quality of Sleep` AS DOUBLE) <= 10 THEN 1 ELSE 0 END", "QualityIn0to10",
        lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 7489740a-923e-4937-80c1-56838f59056b
      source_assumptions:
      - 7d93a8ad-49c8-48a0-b833-14c3d9f5abf5
    assumptions:
    - text: 'The ''Quality of Sleep'' column must be non-null for every row in the
        input. The code casts this column to float and uses its values in arithmetic,
        comparisons, and indexing (division by 10, subtraction from expected quality,
        elementwise comparisons), so missing values would break or change the logic.
        Example validation rules: Great Expectations: expect_column_values_to_not_be_null(''Quality
        of Sleep''). Deequ-style: .satisfies(''CASE WHEN `Quality of Sleep` IS NOT
        NULL THEN 1 ELSE 0 END'', ''NoNullQuality'', lambda x: x == 1).'
      sources:
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 55
        end_line: 55
        file: ''
      - start_line: 70
        end_line: 70
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: ad1983db-7039-4835-bd74-cd5490476ff8
    - text: 'The ''Quality of Sleep'' column must be numeric (convertible to float
        / integral). The code performs df[''Quality of Sleep''].astype(float) and
        numeric arithmetic (division, subtraction, clipping), so values must be parseable
        as numbers (preferably integers). Example validation rules: Great Expectations:
        expect_column_values_to_be_in_type_list(''Quality of Sleep'', [''int64'',
        ''float64'']) or expect_column_values_to_match_regex(''Quality of Sleep'',
        ''^-?\d+(\.\d+)?$''). Deequ-style: .satisfies(''CASE WHEN try_cast(`Quality
        of Sleep` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END'', ''QualityNumeric'',
        lambda x: x == 1).'
      sources:
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      uid: 1f77d385-3011-4738-9492-d278e8c4bcd9
    - text: 'The ''Quality of Sleep'' values are expected to be on a 0-10 scale (integers
        or floats between 0 and 10 inclusive). The code divides the column by 10 to
        get a 0.0-1.0 ''quality_score'' and later compares that score to thresholds
        like 0.60; if input values fall outside 0-10 the derived scores and condition
        checks will be invalid. Example validation rules: Great Expectations: expect_column_values_to_be_between(''Quality
        of Sleep'', min_value=0, max_value=10, strict_min=False, strict_max=False).
        Deequ-style: .satisfies(''CASE WHEN `Quality of Sleep` >= 0 AND `Quality of
        Sleep` <= 10 THEN 1 ELSE 0 END'', ''QualityIn0to10'', lambda x: x == 1).'
      sources:
      - start_line: 37
        end_line: 37
        file: ''
      - start_line: 55
        end_line: 56
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 7d93a8ad-49c8-48a0-b833-14c3d9f5abf5
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', ''^[0-9]+/[0-9]+$'' , lambda x:
        x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 52fee97e-d5e3-4c86-976e-1dfc3822e6a1
      source_assumptions:
      - 26301ad9-7d05-465a-a8d5-94d17baf1cb2
      - 811f95a4-8fb7-4228-aca3-90a8a8e6202f
    - suggestion: '.satisfies("CAST(split_part(`Blood Pressure`,''/'',1) AS INT) BETWEEN
        50 AND 250 AND CAST(split_part(`Blood Pressure`,''/'',2) AS INT) BETWEEN 30
        AND 150", "BP_ranges", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 3abedee1-8c20-4d81-93d1-c115e538d385
      source_assumptions:
      - 3f0499e4-077a-405d-9944-4c5b58a20998
    - suggestion: '.satisfies("CAST(split_part(`Blood Pressure`,''/'',1) AS INT) >=
        CAST(split_part(`Blood Pressure`,''/'',2) AS INT)", "systolic_ge_diastolic",
        lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 5cab1845-4c33-49d0-92bd-4a60d5782076
      source_assumptions:
      - 7a5435bd-1208-45f8-8deb-fc6a104ee7f7
    assumptions:
    - text: 'The ''Blood Pressure'' column contains no missing values (every record
        has a value). The code calls df[''Blood Pressure''].astype(str) and immediately
        splits and casts the parts to int, so missing or null input would break assumptions
        about having two numeric parts. Example check: a non-null constraint or Great
        Expectations expectation: expect_column_values_to_not_be_null(''Blood Pressure'').'
      sources:
      - start_line: 46
        end_line: 46
        file: ''
      uid: 8b46371a-d084-423a-8ada-a51e2a93deb5
    - text: 'Each value in ''Blood Pressure'' uses the format ''SYSTOLIC/DIASTOLIC''
        with exactly one ''/'' separator and two components. The code uses .str.split(''/'',
        expand=True) and then uses the two resulting parts as systolic and diastolic.
        A suitable validation: assert that the string matches the regex ''^[0-9]+/[0-9]+$''
        or that splitting on ''/'' yields exactly two non-empty parts for >= 95% (or
        100%) of rows.'
      sources:
      - start_line: 46
        end_line: 48
        file: ''
      uid: 26301ad9-7d05-465a-a8d5-94d17baf1cb2
    - text: 'Both the systolic and diastolic components are integer-valued strings
        (no decimal points, no non-digit characters, and no leading/trailing whitespace)
        so that .astype(int) succeeds. Example validation: REGEXP_LIKE(`Blood Pressure`,
        ''^[0-9]+/[0-9]+$'') or split and check each part matches ''^[0-9]+$''.'
      sources:
      - start_line: 48
        end_line: 49
        file: ''
      uid: 811f95a4-8fb7-4228-aca3-90a8a8e6202f
    - text: 'Systolic and diastolic values are within realistic numeric ranges so
        downstream numeric computations and comparisons are meaningful. For example:
        50 <= systolic <= 250 and 30 <= diastolic <= 150 (adjust thresholds to your
        domain). This ensures map_pressure = diastolic + (systolic - diastolic)/3.0
        is finite and falls in an expected range for the normalize(map_pressure, 95.0,
        120.0) call and the hypertension checks. Example validation: check numeric
        bounds after extracting parts, or use a SQL-like predicate such as CASE WHEN
        CAST(split_part(`Blood Pressure`,''/'',1) AS INT) BETWEEN 50 AND 250 AND CAST(split_part(`Blood
        Pressure`,''/'',2) AS INT) BETWEEN 30 AND 150 THEN 1 ELSE 0 END.'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: 3f0499e4-077a-405d-9944-4c5b58a20998
    - text: 'Systolic is greater than or equal to diastolic for each record (systolic
        >= diastolic). Many downstream calculations and domain checks (e.g., MAP calculation
        and hypertension logic) assume physiologically that systolic is not less than
        diastolic. Validation: assert CAST(split_part(`Blood Pressure`,''/'',1) AS
        INT) >= CAST(split_part(`Blood Pressure`,''/'',2) AS INT) for most (or all)
        rows.'
      sources:
      - start_line: 48
        end_line: 50
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: 7a5435bd-1208-45f8-8deb-fc6a104ee7f7
  Person ID:
    code:
    - suggestion: '.satisfies("CASE WHEN `Person ID` RLIKE ''^[0-9]+$'' THEN 1 ELSE
        0 END", "Person ID integral/castable", lambda x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 621103cf-0679-4ac5-9026-14593fabe021
      source_assumptions:
      - be2d09f9-93ae-4111-aeb2-32ea68b616b9
    - suggestion: .isUnique("Person ID")
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 68d4555d-9544-4a3c-8282-84428acb6e05
      source_assumptions:
      - 9e694778-b113-4b47-9b38-7a699354f5f1
    assumptions:
    - text: "The input must contain a 'Person ID' column and every row must have a\
        \ non-null Person ID (no missing values). This is required because the code\
        \ reads the CSV and writes df['Person ID'] into the output file \uADF8\uB300\
        \uB85C; missing Person ID values would result in empty identifiers in the\
        \ output. We could represent this assumption as a Deequ/Greatexpectations-style\
        \ constraint, for example:\n.satisfies(\"CASE WHEN `Person ID` IS NOT NULL\
        \ THEN 1 ELSE 0 END\", \"Person ID not null\", lambda x: x == 1)"
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 90
        end_line: 92
        file: ''
      uid: 6a8ec963-c6f5-4263-ac7e-dbcd969f518d
    - text: 'Values in ''Person ID'' should be integral (or at least castable to an
        integer type). The script expects to treat Person ID as an identifier (metadata
        says Integral) and writes it through to output without transformations, so
        input values should be numeric integers or castable to integer to avoid downstream
        type/casting errors. Example constraint:

        .satisfies("CASE WHEN try_cast(`Person ID` AS BIGINT) IS NOT NULL THEN 1 ELSE
        0 END", "Person ID integral/castable", lambda x: x == 1)'
      sources:
      - start_line: 35
        end_line: 35
        file: ''
      - start_line: 90
        end_line: 92
        file: ''
      uid: be2d09f9-93ae-4111-aeb2-32ea68b616b9
    - text: 'Person ID is expected to identify rows (i.e., be unique per record).
        The code outputs Person ID alongside computed metrics and (implicitly) treats
        each row as a single individual''s record; to avoid ambiguous mapping downstream,
        Person ID should be unique per row. Example constraint:

        .satisfies("CASE WHEN COUNT(DISTINCT `Person ID`) = COUNT(*) THEN 1 ELSE 0
        END", "Person ID unique", lambda x: x == 1)'
      sources:
      - start_line: 90
        end_line: 92
        file: ''
      - start_line: 98
        end_line: 98
        file: ''
      uid: 9e694778-b113-4b47-9b38-7a699354f5f1
  Sleep Duration:
    code: []
    assumptions:
    - text: 'Daily Steps and Physical Activity Level must be present and comparable
        so that base_activity = 0.5*steps_norm + 0.5*pal_norm yields meaningful values.
        Concretely: (a) ''Daily Steps'' should be numeric and have spread so that
        the 5th percentile is strictly less than the 95th percentile (s_min < s_max)
        so normalization is not degenerate; (b) ''Physical Activity Level'' should
        be numeric and lie in the expected range [0, 100] so pal_norm is in [0,1].
        Example Deequ-style checks: .isComplete(["Daily Steps","Physical Activity
        Level"]) ; assert percentile(0.05, "Daily Steps") < percentile(0.95, "Daily
        Steps") ; .isContainedInRange("Physical Activity Level", 0.0, 100.0).'
      sources:
      - start_line: 38
        end_line: 44
        file: ''
      uid: 3cb6af4d-1205-4898-af60-2853afc1b56f
    - text: 'Quality of Sleep and Stress Level must be in their expected clinical
        input ranges so the derived quality_score and stress_norm are both within
        [0,1]. Concretely: ''Quality of Sleep'' should be numeric in [0,10] (so quality_score
        = Quality of Sleep / 10 in [0,1]) and ''Stress Level'' should be numeric in
        [1,10] (so normalize(Stress Level, 1, 10) yields stress_norm in [0,1]). Example
        checks: .isComplete(["Quality of Sleep","Stress Level"]) ; .isContainedInRange("Quality
        of Sleep", 0.0, 10.0) ; .isContainedInRange("Stress Level", 1.0, 10.0).'
      sources:
      - start_line: 37
        end_line: 56
        file: ''
      uid: e65071d6-ffaa-4478-8980-32754dc37071
    - text: 'Blood Pressure must parse reliably into systolic and diastolic integers
        so both the per-row hypertension check and mean arterial pressure calculation
        are valid. Concretely: ''Blood Pressure'' strings should contain exactly one
        ''/'' and split into two parts that are integers; those integers should be
        non-negative and (optionally) systolic >= diastolic. Example checks: every
        row matches regex ''^[0-9]+/[0-9]+$'' ; parsed_systolic and parsed_diastolic
        are integers and >= 0 ; (optional) parsed_systolic >= parsed_diastolic. This
        enables correct computation of map_pressure and bp_score.'
      sources:
      - start_line: 46
        end_line: 51
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      uid: 3b37ba8e-b133-4b16-b25b-03b1d66e22fc
    - text: 'Sleep Duration, Quality of Sleep and Stress Level must jointly be numeric
        and within expected ranges used by downstream logic that computes the Sleep
        Health Index and alerts. Concretely: ''Sleep Duration'' should be numeric
        and within a plausible hourly range (e.g., 0.0 to 24.0) and preferably within
        the scoring range [3.0, 12.0] used by triangular_score; ''Quality of Sleep''
        and ''Stress Level'' must satisfy the ranges in the previous assumption so
        gap and stress_quality_penalty computations behave as intended. Example checks:
        .isComplete(["Sleep Duration","Quality of Sleep","Stress Level"]) ; .isContainedInRange("Sleep
        Duration", 0.0, 24.0) (and optionally [3.0,12.0]).'
      sources:
      - start_line: 36
        end_line: 59
        file: ''
      - start_line: 64
        end_line: 79
        file: ''
      uid: ff1f308f-d17a-4d6a-8ead-bcc4751b55ec
    - text: 'The ''Sleep Disorder'' column should only contain the expected categories
        (empty string / missing, ''Insomnia'', ''Sleep Apnea'', or other known labels)
        because downstream logic checks membership against [''Insomnia'',''Sleep Apnea'']
        to set has_disorder and then uses that together with SleepHealthIndex to add
        a ''DISORDER_FLAG''. Example checks: .isComplete(["Sleep Disorder"]) or allow
        missing but ensure values are in allowed set e.g. .isContainedIn(["Sleep Disorder"],
        ['''', ''Insomnia'', ''Sleep Apnea'', /* other allowed values */]).'
      sources:
      - start_line: 66
        end_line: 80
        file: ''
      uid: cb9093b4-03aa-40c6-aa17-d2cc5232039b
