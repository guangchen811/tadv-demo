    - text: 'The code treats the scaled Quality of Sleep (Quality of Sleep / 10) and
        the transformed Stress Level (1.0 - normalize(Stress Level, 1.0, 10.0)) as
        comparable quantities and computes gap = quality_score - expected_quality.
        Therefore, for meaningful results the two columns should be consistent such
        that for the majority of rows the absolute difference abs((Quality of Sleep
        / 10) - (1 - normalize(Stress Level, 1.0, 10.0))) is small. An actionable
        constraint example: at least 80% of rows should satisfy abs((Quality of Sleep
        / 10) - (1 - normalize(Stress Level, 1.0, 10.0))) <= 0.2.'
