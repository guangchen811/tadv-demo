        some variation in the data; a constant column would make steps_norm meaningless.
        Example deequ-style check: .satisfies("CASE WHEN countDistinct(`Daily Steps`)
        > 1 THEN 1 ELSE 0 END", "Daily Steps not constant", lambda x: x == 1)'
      sources:
