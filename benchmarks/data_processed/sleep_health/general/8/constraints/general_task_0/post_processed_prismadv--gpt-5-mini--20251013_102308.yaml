    - text: For rows where 'Sleep Disorder' is one of {'Insomnia', 'Sleep Apnea'},
        the pipeline expects a computed 'SleepHealthIndex' value that is numeric and
        within [0,1]. At minimum, when Sleep Disorder is present the input should
        still supply the numeric fields used to compute the index (Sleep Duration,
        Quality of Sleep, Daily Steps or Physical Activity Level, Blood Pressure,
        Stress Level) so the index can be produced and the DISORDER_FLAG check (shi
        < 0.75) can be evaluated. Also, the 'Sleep Disorder' column should contain
        only the expected category labels or be empty.
      sources:
