      uid: fa42c143-3426-4571-9d7b-c638d64b3c7b
    - text: 'The ''Sleep Duration'' and resulting ''SleepHealthIndex'' are used together
        to generate the ''INSUFFICIENT_SLEEP'' reason: when Sleep Duration < 6.0 or
        > 9.0 the code appends ''INSUFFICIENT_SLEEP''. Therefore ''Sleep Duration''
        must be numeric and meaningful (e.g., in hours and within a plausible range
        such as [0,24]) so these comparisons work; the computed SleepHealthIndex should
        also be numeric in [0,1] for later thresholding (e.g. shi < 0.60 and shi <
        0.75).'
