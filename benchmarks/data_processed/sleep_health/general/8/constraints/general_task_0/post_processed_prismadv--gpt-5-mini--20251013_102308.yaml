        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: 2f5dd568-928b-4181-b8e5-41b9c32273d0
    - text: 'The ''Daily Steps'' values should be non-negative (>= 0). Steps are used
        as a measure of activity and then normalized to [0,1]; negative step counts
        are not meaningful for this processing. Example deequ-style check: .satisfies("CASE
        WHEN `Daily Steps` >= 0 THEN 1 ELSE 0 END", "Non-negative Daily Steps", lambda
