    - text: 'The ''HIGH_STRESS_LOW_QUALITY'' alert uses both columns together: it
        triggers when normalized stress >= 0.70 and quality_score < 0.60. This assumes
        the mapping from raw Stress Level to stress_norm puts clinically/highly stressed
        raw values above the threshold (i.e., Stress Level values that map to stress_norm
