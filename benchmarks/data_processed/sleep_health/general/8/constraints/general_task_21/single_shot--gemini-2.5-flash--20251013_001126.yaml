constraints:
  BMI Category:
    code:
    - - .hasDataType('BMI Category', 'String')
      - Invalid
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasDataType('Blood Pressure', 'String')
      - Invalid
    - - .isComplete('Blood Pressure')
      - Valid
    - - .matchesPattern('Blood Pressure', '^\d{2,3}/\d{2,3}$')
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .hasDataType('Daily Steps', 'Integral')
      - Invalid
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .hasDataType('Gender', 'String')
      - Invalid
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .hasDataType('Heart Rate', 'Integral')
      - Invalid
    - - .isComplete('Heart Rate')
      - Valid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .hasDataType('Occupation', 'String')
      - Invalid
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .hasDataType('Person ID', 'Integral')
      - Invalid
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .hasDataType('Physical Activity Level', 'Integral')
      - Invalid
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .hasDataType('Quality of Sleep', 'Integral')
      - Invalid
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isLessThanOrEqualTo('Quality of Sleep', 10)
      - Invalid
    - - .isNonNegative('Quality of Sleep')
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .hasCompleteness('Sleep Disorder', 0.4)
      - Invalid
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'], allow_nulls=True)
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasDataType('Sleep Duration', 'Fractional')
      - Invalid
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isNonNegative('Sleep Duration')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .hasDataType('Stress Level', 'Integral')
      - Invalid
    - - .isComplete('Stress Level')
      - Valid
    - - .isLessThanOrEqualTo('Stress Level', 10)
      - Invalid
    - - .isNonNegative('Stress Level')
      - Invalid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', 'Integral')
      - Invalid
    - - .isComplete('id')
      - Valid
    assumptions: []
