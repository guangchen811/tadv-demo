constraints:
  Age:
    code:
    - - '.hasMax(''Age'', lambda x: x <= 120)'
      - Valid
    - - '.hasMin(''Age'', lambda x: x >= 0)'
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    - - '.satisfies("`Blood Pressure` rlike ''^[0-9]{2,3}/[0-9]{2,3}$''", "bp_format_valid",
        lambda v: v == 1.0)'
      - Valid
    - - '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) > cast(split(`Blood
        Pressure`, ''/'')[1] as int)", "systolic_greater_than_diastolic", lambda v:
        v == 1.0)'
      - Valid
    - - '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) between 80 and
        250 and cast(split(`Blood Pressure`, ''/'')[1] as int) between 40 and 150",
        "bp_values_in_plausible_range", lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - '.hasMax(''Heart Rate'', lambda x: x <= 230)'
      - Valid
    - - .isPositive('Heart Rate')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - '.hasMax(''Physical Activity Level'', lambda x: x <= 100)'
      - Valid
    - - '.hasMin(''Physical Activity Level'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.hasMax(''Quality of Sleep'', lambda x: x <= 10)'
      - Valid
    - - '.hasMin(''Quality of Sleep'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea'')", "sleep_disorder_values_or_null", lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - '.hasMax(''Sleep Duration'', lambda x: x <= 24)'
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isPositive('Sleep Duration')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - '.hasMax(''Stress Level'', lambda x: x <= 10)'
      - Valid
    - - '.hasMin(''Stress Level'', lambda x: x >= 0)'
      - Valid
    assumptions: []
