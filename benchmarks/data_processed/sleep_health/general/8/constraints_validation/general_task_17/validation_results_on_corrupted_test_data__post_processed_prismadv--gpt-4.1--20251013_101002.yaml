results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('`Physical Activity Level`')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.satisfies(''`Quality of Sleep` IN (4, 5, 6, 7, 8, 9)'', ''Valid
        Quality of Sleep Range'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","bmi_risk"]':
    code:
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .hasPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Blood Pressure'', r''^\d{2,3}/\d{2,3}$'')''
        failed on data sample: Value: 0.9 does not meet the constraint requirement!'
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'',
        ''Valid Sleep Duration Range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Daily Steps` <= 100000'', ''Plausible Step Range'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasDistinctness([''Daily Steps''], lambda x: x > 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: .satisfies("`Sleep Disorder` IS NULL OR LOWER(`Sleep Disorder`)
        IN ('sleep apnea', 'insomnia')", "Valid or missing Sleep Disorder")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Heart Rate` >= 30 AND `Heart Rate` <= 220', 'Heart
        Rate within realistic human range')
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Stress Level', ['3', '4', '5', '6', '7', '8'])
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Age` >= 0 AND `Age` <= 120'', ''Age is reasonable'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Age","age_risk"]':
    code:
    - suggestion: '.haveCompleteness([''Age''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CASE WHEN Age >= 65 THEN 1 WHEN Age >= 50 AND Age <
        65 THEN 1 WHEN Age < 50 THEN 1 ELSE 0 END = 1', 'Age risk mapping')
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level","activity_index"]':
    code:
    - suggestion: .satisfies('`Daily Steps` >= 0 AND `Physical Activity Level` >=
        0', 'Non-negative daily steps and physical activity')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Daily Steps` <= 100000 AND `Physical Activity Level`
        <= 500', 'Plausible activity value bounds')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Daily Steps` >= 10000 AND `Physical Activity Level`
        >= 60 OR `Daily Steps` < 10000 OR `Physical Activity Level` < 60', 'Vigorous
        bonus threshold logic applies')
      status: true
      reason_if_failed: ''
      level: warning
  ? '["activity_protect","age_risk","bmi_risk","bp_risk","duration_risk","hr_risk","raw_risk","sd_risk","sq_risk","vigorous_bonus"]'
  : code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda x: x == 1)

        .hasCompleteness(''Physical Activity Level'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["bp_dia","bp_risk","bp_sys"]':
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]{2,3}/[0-9]{2,3}$'", "Blood
        Pressure Format Valid")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`Blood Pressure` RLIKE ''^[0-9]{2,3}/[0-9]{2,3}$''",
        "Blood Pressure Format Valid")'' failed on data sample: Value: 0.9 does not
        meet the constraint requirement!'
      level: error
  '["sq_factor","sq_risk"]':
    code:
    - suggestion: .satisfies('`Stress Level` >= 0 AND `Quality of Sleep` >= 0 AND
        `Quality of Sleep` <= 10', 'Stress Level and Quality of Sleep in valid range')
      status: true
      reason_if_failed: ''
      level: error
