results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete("Physical Activity Level")
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9",
        "Quality of Sleep within expected range [4,9]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("Quality of Sleep")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("((`Quality of Sleep` - 4.0) / 5.0) * ((`Sleep Duration`
        - 3.0) / 9.0) >= 0", "Synergy sqrt argument non-negative", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.isContainedIn("BMI Category", ["Normal", "Normal Weight", "Overweight",
        "Obese"], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("BMI Category")
      status: true
      reason_if_failed: ''
      level: warning
  ? '["BMI Category","Blood Pressure","Daily Steps","Physical Activity Level","Quality
    of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) BETWEEN
        70 AND 250 AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT) BETWEEN 40 AND
        150", "blood_pressure_plausible_range", lambda x: x >= 0.95)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CAST(split(`Blood Pressure`, ''/'')[0]
        AS INT) BETWEEN 70 AND 250 AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT)
        BETWEEN 40 AND 150", "blood_pressure_plausible_range", lambda x: x >= 0.95)''
        failed on data sample: Value: 0.9 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0",
        "sleep_duration_3_to_12", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9",
        "quality_of_sleep_4_to_9", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Stress Level` >= 0 AND `Stress Level` <= 10", "stress_level_0_to_10",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''BMI Category'', [''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese''], lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Insomnia'', ''Sleep Apnea''],
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', r''^\s*\d{1,3}\s*/\s*\d{1,3}\s*$'',
        lambda v: v == 1, name=''bp_has_sys_dia_format'')'
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Blood Pressure'', r''^\s*\d{1,3}\s*/\s*\d{1,3}\s*$'',
        lambda v: v == 1, name=''bp_has_sys_dia_format'')'' failed on data sample:
        Value: 0.9 does not meet the constraint requirement!'
      level: error
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'',
        ''Sleep Duration in 0-24 hours'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''((`Sleep Duration` - 3.0) / 9.0) * ((`Quality of Sleep`
        - 4.0) / 5.0) >= 0'', ''Synergy sqrt argument non-negative'', lambda x: x
        >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.isContainedIn("Sleep Disorder", ["Insomnia", "Sleep Apnea"], lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Sleep Disorder", lambda x: x >= 0.40)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies(''`Stress Level` BETWEEN 1 AND 10'', ''stress_level_between_1_10'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Stress Level'', lambda sd: sd > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.40)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("size(split(`Blood Pressure`, ''/'')) = 2", "bp_has_two_parts",
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("size(split(`Blood Pressure`, ''/''))
        = 2", "bp_has_two_parts", lambda x: x == 1)'' failed on data sample: Value:
        0.9 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) is not
        null AND cast(split(`Blood Pressure`, ''/'')[1] as int) is not null", "bp_parts_are_ints",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0",
        "sleep_duration_expected_range_for_scaling", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9",
        "quality_of_sleep_expected_range_for_scaling", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) BETWEEN
        70 AND 250 AND cast(split(`Blood Pressure`, ''/'')[1] as int) BETWEEN 40 AND
        150", "bp_parts_plausible_ranges", lambda x: x >= 0.95)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("cast(split(`Blood Pressure`, ''/'')[0]
        as int) BETWEEN 70 AND 250 AND cast(split(`Blood Pressure`, ''/'')[1] as int)
        BETWEEN 40 AND 150", "bp_parts_plausible_ranges", lambda x: x >= 0.95)'' failed
        on data sample: Value: 0.9 does not meet the constraint requirement!'
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: .satisfies('`Sleep Duration` >= 3.0 AND `Quality of Sleep` >= 4.0',
        'non_negative_normalization_inputs')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Sleep Duration` <= 12.0', 'sleep_duration_upper_bound')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Sleep Duration'', lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Quality of Sleep'', lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
