results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete("Quality of Sleep")
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete("BMI Category")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn("BMI Category", ["Normal", "Normal Weight", "Overweight",
        "Obese"])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) >= 0
        AND CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) <= 300", "Blood Pressure
        SYS values within 0-300", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS INT) >= 0
        AND CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS INT) <= 200", "Blood Pressure
        DIA values within 0-200", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[1]
        AS INT) >= 0 AND CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS INT) <= 200", "Blood
        Pressure DIA values within 0-200", lambda x: x == 1.0)'' failed on data sample:
        Value: 0.9 does not meet the constraint requirement!'
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete("Sleep Duration")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 3.0", "Sleep Duration minimum value",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', assertion=lambda x: x >= 0.4)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Insomnia'', ''Sleep Apnea''],
        assertion=lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete("Stress Level")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin("Stress Level", lambda x: x is not None)'
      status: true
      reason_if_failed: ''
      level: error
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies("`BMI Category` IN (''Normal'', ''Normal Weight'', ''Overweight'',
        ''Obese'')", "Valid BMI Categories", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["BMI Category","bmi_penalty"]':
    code:
    - suggestion: '.satisfies("`BMI Category` IN (''Normal'', ''Normal Weight'', ''Overweight'',
        ''Obese'')", "BMI Category Valid Values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Person ID","RiskAlert","SleepHealthIndex"]':
    code:
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Person ID` >= 0", "Person ID Non-Negative", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL AND `Sleep Duration` >= 3.0 AND `Quality of Sleep` >= 4.0", "Sleep
        Duration and Quality Conditions", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`BMI Category` IN (''Normal'', ''Normal Weight'', ''Overweight'',
        ''Obese'') AND (`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (''Insomnia'',
        ''Sleep Apnea''))", "BMI and Sleep Disorder Categories", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["BP_DIA","BP_SYS","Quality of Sleep","RiskAlert","RiskReasons","Sleep Duration","SleepHealthIndex"]':
    code:
    - suggestion: '.hasUniqueness(["Person ID"], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("Blood Pressure", "^\\d+/\\d+$", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasPattern("Blood Pressure", "^\\d+/\\d+$",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9 does not meet the
        constraint requirement!'
      level: error
    - suggestion: '.hasCompleteness("Physical Activity Level", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Daily Steps", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMean("Daily Steps", lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Sleep Duration", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Quality of Sleep", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Stress Level", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn("BMI Category", ["Normal", "Normal Weight", "Overweight",
        "Obese"], assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Person ID` AS INT) = `Person ID`", "Person ID
        Integral", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["BP_DIA","BP_SYS","Blood Pressure"]':
    code:
    - suggestion: '.satisfies("`Person ID` >= 0 AND `Person ID` = FLOOR(`Person ID`)
        AND `Person ID` IS NOT NULL", "Person ID is non-negative integer", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation("Physical Activity Level", "Daily Steps", lambda
        x: x > 0.3)'
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL AND CAST(`Quality
        of Sleep` AS DOUBLE) IS NOT NULL", "Numeric Sleep Data", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 3.0", "Min Sleep Duration", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Quality of Sleep` >= 4.0", "Min Quality of Sleep",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda x:
        x >= 0.2)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation("Stress Level", "Quality of Sleep", lambda x: x
        <= -0.3)'
      status: true
      reason_if_failed: ''
      level: error
  '["Sleep Disorder","disorder_penalty"]':
    code:
    - suggestion: '.satisfies("CAST(`Physical Activity Level` AS FLOAT) IS NOT NULL",
        "Physical Activity Level is float convertible", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Daily Steps` AS FLOAT) IS NOT NULL", "Daily Steps
        is float convertible", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS FLOAT) IS NOT NULL", "Sleep
        Duration is float convertible", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Quality of Sleep` AS FLOAT) IS NOT NULL", "Quality
        of Sleep is float convertible", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Stress Level` AS FLOAT) IS NOT NULL", "Stress
        Level is float convertible", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("((CAST(`Quality of Sleep` AS FLOAT) >= 4.0 AND CAST(`Sleep
        Duration` AS FLOAT) >= 3.0) OR (CAST(`Quality of Sleep` AS FLOAT) < 4.0 AND
        CAST(`Sleep Duration` AS FLOAT) < 3.0))", "Non-negative product for synergy
        calculation", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`BMI Category` IN (''Normal'', ''Normal Weight'', ''Overweight'',
        ''Obese'')", "BMI Category must be valid for mapping", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness(columns=["Person ID"], assertion=lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Person ID` >= 0", "Person ID must be non-negative",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Person ID` AS INT) IS NOT NULL AND `Person ID`
        = CAST(`Person ID` AS INT)", "Person ID must be an integer", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
