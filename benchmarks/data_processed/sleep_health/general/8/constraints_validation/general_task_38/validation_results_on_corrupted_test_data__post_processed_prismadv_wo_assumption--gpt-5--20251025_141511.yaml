results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies(''`Physical Activity Level` IS NOT NULL AND NOT isnan(`Physical
        Activity Level`)'', ''pal_not_null_and_not_nan'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''`Physical Activity Level`'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        c: c >= -1 and c <= 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` >= 0 AND `Quality of Sleep` <=
        10'', ''QoS range [0,10]'', lambda c: c >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Quality of Sleep'', lambda s: s > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.isContainedIn("BMI Category", ["Normal", "Normal Weight", "Overweight",
        "Obese"], lambda f: f >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("BMI Category", lambda c: c == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`BMI Category` IS NULL) OR (`BMI Category` = TRIM(`BMI
        Category`))", "BMI Category trimmed", lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasNumberOfDistinctValues("BMI Category", lambda n: n <= 4, binningUdf=None,
        maxBins=1000)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete("Blood Pressure")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT(`Blood Pressure` RLIKE ''(?i)\\d{2,3}\\s*/\\s*\\d{2,3}'')
        OR (CAST(regexp_extract(`Blood Pressure`, ''(?i).*?(\\d{2,3})\\s*/\\s*(\\d{2,3}).*'',
        1) AS INT) BETWEEN 70 AND 250 AND CAST(regexp_extract(`Blood Pressure`, ''(?i).*?(\\d{2,3})\\s*/\\s*(\\d{2,3}).*'',
        2) AS INT) BETWEEN 40 AND 140 AND CAST(regexp_extract(`Blood Pressure`, ''(?i).*?(\\d{2,3})\\s*/\\s*(\\d{2,3}).*'',
        1) AS INT) >= CAST(regexp_extract(`Blood Pressure`, ''(?i).*?(\\d{2,3})\\s*/\\s*(\\d{2,3}).*'',
        2) AS INT))", "bp_plausible_ranges_and_order", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness(["Person ID"], lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "sleep_duration_between_0_24", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxCountDistinct(''Sleep Duration'', lambda x: x >= 2)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete("Daily Steps")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("`Daily Steps` >= 0", "Daily Steps non-negative")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation("Daily Steps", lambda s: s > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR UPPER(TRIM(`Sleep Disorder`))
        IN (''SLEEP APNEA'',''INSOMNIA'')", "Sleep Disorder allowed values", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Sleep Disorder", lambda c: c >= 0.35)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.hasCompleteness(''Heart Rate'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isPositive(''`Heart Rate`'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Heart Rate` >= 35 AND `Heart Rate` <= 220'', ''Heart
        Rate physiological range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Heart Rate` >= 55 AND `Heart Rate` <= 95'', ''Heart
        Rate mostly within scale window'', lambda x: x >= 0.70)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''Stress Level'', [''3'', ''4'', ''5'', ''6'', ''7'',
        ''8''], lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Age` >= 0 AND `Age` <= 120'', ''Age plausible range
        [0,120]'', lambda f: f >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Age","BMI Category","Blood Pressure","Daily Steps","Heart Rate","Person ID","Physical
    Activity Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.hasCompleteness(''Person ID'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Duration` >= 0.0 AND `Sleep Duration` <= 24.0'',
        ''sleep_duration_range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Quality of Sleep'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` >= 1 AND `Quality of Sleep` <=
        10'', ''quality_of_sleep_range'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Blood Pressure'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Age` >= 0 AND `Age` <= 120'', ''age_range'', lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Heart Rate` >= 30 AND `Heart Rate` <= 220'', ''heart_rate_range'',
        lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Stress Level` >= 1 AND `Stress Level` <= 10'', ''stress_level_range'',
        lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('`Physical Activity Level`')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Daily Steps` >= 0 AND `Daily Steps` <= 50000'', ''daily_steps_range'',
        lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (\''Sleep
        Apnea\'', \''Insomnia\'')'', ''sleep_disorder_allowed_values'', lambda x:
        x >= 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.40)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: '.isContainedIn(''BMI Category'', [''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese''], assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Sleep Apnea'', ''Insomnia''],
        assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Sleep Disorder'', assertion=lambda x: x >= 0.35)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","DBP","SBP"]':
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\d{2,3}/\d{2,3}$'', lambda f:
        f >= 0.95, name=''Valid Blood Pressure format dd[/]dd'')'
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Blood Pressure'', ''^\d{2,3}/\d{2,3}$'',
        lambda f: f >= 0.95, name=''Valid Blood Pressure format dd[/]dd'')'' failed
        on data sample: Value: 0.9 does not meet the constraint requirement!'
      level: warning
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: warning
  '["DBP","SBP"]':
    code:
    - suggestion: '.satisfies("`Blood Pressure` IS NULL OR (CAST(SPLIT(`Blood Pressure`,
        ''/'')[0] AS INT) BETWEEN 10 AND 999)", "SystolicBP_in_2to3_digits", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.isNonNegative(''`Daily Steps`'', lambda frac: frac >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Daily Steps'', lambda s: s > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda s: s
        > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "sleep_duration_plausible_range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''Quality of Sleep'', [''4'', ''5'', ''6'', ''7'',
        ''8'', ''9''], lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
