results:
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("CASE WHEN cast(`Quality of Sleep` AS DOUBLE) >= 0 AND
        cast(`Quality of Sleep` AS DOUBLE) <= 10 THEN 1 ELSE 0 END", "QualityIn0to10",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', ''^[0-9]+/[0-9]+$'' , lambda x:
        x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.hasPattern(''Blood Pressure'', ''^[0-9]+/[0-9]+$''
        , lambda x: x == 1)'' failed on data sample: Value: 0.9 does not meet the
        constraint requirement!'
      level: error
    - suggestion: '.satisfies("CAST(split_part(`Blood Pressure`,''/'',1) AS INT) BETWEEN
        50 AND 250 AND CAST(split_part(`Blood Pressure`,''/'',2) AS INT) BETWEEN 30
        AND 150", "BP_ranges", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CAST(split_part(`Blood Pressure`,''/'',1)
        AS INT) BETWEEN 50 AND 250 AND CAST(split_part(`Blood Pressure`,''/'',2) AS
        INT) BETWEEN 30 AND 150", "BP_ranges", lambda x: x == 1)'' failed on data
        sample: Value: 0.9 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CAST(split_part(`Blood Pressure`,''/'',1) AS INT) >=
        CAST(split_part(`Blood Pressure`,''/'',2) AS INT)", "systolic_ge_diastolic",
        lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CAST(split_part(`Blood Pressure`,''/'',1)
        AS INT) >= CAST(split_part(`Blood Pressure`,''/'',2) AS INT)", "systolic_ge_diastolic",
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.9 does not meet the
        constraint requirement!'
      level: warning
  Person ID:
    code:
    - suggestion: '.satisfies("CASE WHEN `Person ID` RLIKE ''^[0-9]+$'' THEN 1 ELSE
        0 END", "Person ID integral/castable", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NOT NULL AND `Daily Steps`
        NOT IN (''Inf'',''-Inf'') AND CAST(`Daily Steps` AS DOUBLE) = CAST(`Daily
        Steps` AS DOUBLE) THEN 1 ELSE 0 END", "Valid Daily Steps Finite", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` >= 0 THEN 1 ELSE 0 END", "Non-negative
        Daily Steps", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea'') OR `Sleep Disorder` = '''' OR `Sleep Disorder` IS NULL THEN 1 ELSE
        0 END", "Valid Sleep Disorder Labels", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("CASE WHEN try_cast(`Stress Level` AS double) IS NOT
        NULL THEN 1 ELSE 0 END", "Stress Level numeric", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN try_cast(`Stress Level` AS double) >= 1 AND
        try_cast(`Stress Level` AS double) <= 10 THEN 1 ELSE 0 END", "Stress Level
        within 1..10", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Stress Level", "Quality of Sleep", lambda x: x
        <= -0.05)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN round(try_cast(`Stress Level` AS double))
        = try_cast(`Stress Level` AS double) THEN 1 ELSE 0 END", "Stress Level integral",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies("`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100", "PAL_in_range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasDistinctness([''Daily Steps''], lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''Physical Activity Level''], lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
