results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Physical Activity Level` AS DOUBLE) = floor(CAST(`Physical
        Activity Level` AS DOUBLE))'', ''PAL integer'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`Physical Activity Level` AS DOUBLE) >= 0 AND
        CAST(`Physical Activity Level` AS DOUBLE) <= 100'', ''PAL in [0,100]'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Quality of Sleep` BETWEEN 6 AND 9 THEN
        1 ELSE 0 END'', ''QoS in [6,9]'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `Quality of Sleep` = floor(`Quality of Sleep`)
        THEN 1 ELSE 0 END'', ''QoS integer-like'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasCompleteness(''Blood Pressure'', lambda r: r == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(trim(split(`Blood Pressure`, ''/'')[0]) AS INT)
        BETWEEN 70 AND 260 AND CAST(trim(split(`Blood Pressure`, ''/'')[1]) AS INT)
        BETWEEN 40 AND 160", ''BP plausible adult range'', lambda r: r == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CAST(trim(split(`Blood Pressure`,
        ''/'')[0]) AS INT) BETWEEN 70 AND 260 AND CAST(trim(split(`Blood Pressure`,
        ''/'')[1]) AS INT) BETWEEN 40 AND 160", ''BP plausible adult range'', lambda
        r: r == 1.0)'' failed on data sample: Value: 0.9 does not meet the constraint
        requirement!'
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete("Sleep Duration")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` > 2.99 AND `Sleep Duration` <= 14.01",
        "Sleep Duration safe domain", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT isNaN(`Sleep Duration`)", "Sleep Duration not NaN",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMin(''Daily Steps'', lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Daily Steps'', lambda x: x <= 50000)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Physical Activity Level` IS NULL) OR (`Daily Steps`
        IS NOT NULL)'', ''Steps present when PAL present'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (NOT (lower(trim(`Sleep
        Disorder`)) IN ('''', ''none'', ''no'', ''false'', ''0'', ''unknown'', ''n/a'',
        ''na'')))", "Valid disorder encoding", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (lower(trim(`Sleep Disorder`))
        IN (''sleep apnea'', ''insomnia''))", "Sleep Disorder allowed set", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Stress Level` >= 3 AND `Stress Level` <= 8'', ''Stress
        Level in [3,8]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
