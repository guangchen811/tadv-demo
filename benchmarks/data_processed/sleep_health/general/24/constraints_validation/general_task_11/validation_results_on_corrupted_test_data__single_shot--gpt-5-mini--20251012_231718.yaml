results:
  Age:
    code:
    - suggestion: .isNonNegative('Age')
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Overweight','Normal','Obese','Normal
        Weight'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: .isContainedIn('Gender', ['Male','Female'])
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
  Occupation:
    code:
    - suggestion: .isComplete('Occupation')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: '.hasApproxCountDistinct(''Person ID'', lambda x: x >= 220)'
      status: false
      reason_if_failed: 'Constraint ''.hasApproxCountDistinct(''Person ID'', lambda
        x: x >= 220)'' failed on data sample: Value: 151.0 does not meet the constraint
        requirement!'
      level: error
  Quality of Sleep:
    code:
    - suggestion: .hasDataType('Quality of Sleep', 'Integral')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasDataType(''Quality
        of Sleep'', ''Integral'')'': ''str'' object has no attribute ''_get_java_object'''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.40)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''Sleep Disorder'', lambda
        x: x >= 0.40)'' failed on data sample: Value: 0.21333333333333335 does not
        meet the constraint requirement!'
      level: error
  Sleep Duration:
    code:
    - suggestion: .hasDataType('Sleep Duration', 'Fractional')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.hasDataType(''Sleep Duration'',
        ''Fractional'')'': ''str'' object has no attribute ''_get_java_object'''
      level: error
  Stress Level:
    code:
    - suggestion: '.hasApproxCountDistinct(''Stress Level'', lambda x: x == 6)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
