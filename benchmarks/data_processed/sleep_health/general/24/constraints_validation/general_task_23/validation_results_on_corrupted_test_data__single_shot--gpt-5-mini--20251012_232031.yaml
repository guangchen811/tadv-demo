results:
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category').isContainedIn('BMI Category', ['Normal',
        'Overweight', 'Obese', 'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure').hasPattern('Blood Pressure', r'^\s*\d{2,3}\s*/\s*\d{2,3}\s*$')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.isComplete(''Daily Steps'').hasMin(''Daily Steps'', lambda v:
        v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: .isComplete('Gender').isContainedIn('Gender', ['Male', 'Female'])
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: '.isComplete(''Heart Rate'').hasMin(''Heart Rate'', lambda v: v
        >= 30).hasMax(''Heart Rate'', lambda v: v <= 220)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Physical Activity Level:
    code:
    - suggestion: '.isComplete(''Physical Activity Level'').hasMin(''Physical Activity
        Level'', lambda v: v >= 0).hasMax(''Physical Activity Level'', lambda v: v
        <= 100)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.isComplete(''Quality of Sleep'').hasMin(''Quality of Sleep'',
        lambda v: v >= 0).hasMax(''Quality of Sleep'', lambda v: v <= 10)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda c: c >= 0.4)'
      status: false
      reason_if_failed: 'Constraint ''.hasCompleteness(''Sleep Disorder'', lambda
        c: c >= 0.4)'' failed on data sample: Value: 0.21333333333333335 does not
        meet the constraint requirement!'
      level: error
  Sleep Duration:
    code:
    - suggestion: '.isComplete(''Sleep Duration'').hasMin(''Sleep Duration'', lambda
        v: v >= 0.0).hasMax(''Sleep Duration'', lambda v: v <= 24.0)'
      status: true
      reason_if_failed: ''
      level: error
  bp_dia:
    code:
    - suggestion: '.isComplete(''bp_dia'').hasMin(''bp_dia'', lambda v: v >= 0).hasMax(''bp_dia'',
        lambda v: v <= 200)'
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''bp_dia'').hasMin(''bp_dia'', lambda
        v: v >= 0).hasMax(''bp_dia'', lambda v: v <= 200)'' failed on data sample:
        Input data does not include column bp_dia!'
      level: error
  bp_stage:
    code:
    - suggestion: .isComplete('bp_stage').isContainedIn('bp_stage', ['normal', 'elevated',
        'stage1', 'stage2', 'crisis'])
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''bp_stage'').isContainedIn(''bp_stage'',
        [''normal'', ''elevated'', ''stage1'', ''stage2'', ''crisis''])'' failed on
        data sample: Input data does not include column bp_stage!'
      level: error
  bp_sys:
    code:
    - suggestion: '.isComplete(''bp_sys'').hasMin(''bp_sys'', lambda v: v >= 0).hasMax(''bp_sys'',
        lambda v: v <= 300)'
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''bp_sys'').hasMin(''bp_sys'', lambda
        v: v >= 0).hasMax(''bp_sys'', lambda v: v <= 300)'' failed on data sample:
        Input data does not include column bp_sys!'
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
  sleep_wellness_score:
    code:
    - suggestion: '.hasMin(''sleep_wellness_score'', lambda v: v >= 0.0).hasMax(''sleep_wellness_score'',
        lambda v: v <= 100.0)'
      status: false
      reason_if_failed: 'Constraint ''.hasMin(''sleep_wellness_score'', lambda v:
        v >= 0.0).hasMax(''sleep_wellness_score'', lambda v: v <= 100.0)'' failed
        on data sample: Input data does not include column sleep_wellness_score!'
      level: error
  triage_level:
    code:
    - suggestion: .isComplete('triage_level').isContainedIn('triage_level', ['High',
        'Medium', 'None'])
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''triage_level'').isContainedIn(''triage_level'',
        [''High'', ''Medium'', ''None''])'' failed on data sample: Input data does
        not include column triage_level!'
      level: error
