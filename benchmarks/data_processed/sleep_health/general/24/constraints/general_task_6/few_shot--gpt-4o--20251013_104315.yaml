constraints:
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isContainedIn('Daily Steps', range(0, 50001))
      - Invalid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isContainedIn('Physical Activity Level', range(0, 101))
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isContainedIn('Quality of Sleep', range(3, 10))
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isComplete('Sleep Disorder')
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - '.isContainedIn(''Sleep Duration'', lambda x: 3 <= x <= 14)'
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isContainedIn('Stress Level', range(3, 9))
      - Invalid
    assumptions: []
