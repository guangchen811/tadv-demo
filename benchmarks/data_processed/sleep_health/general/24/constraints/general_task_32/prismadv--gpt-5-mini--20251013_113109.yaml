      uid: 71cdb391-84e6-45ad-9fdb-e4817221d259
    - text: "'Quality of Sleep' and 'Stress Level' share a common ordinal numeric\
        \ scale (expected integer-like ratings around 1\u201310) and are used interchangeably\
        \ in normalization and threshold logic. The code normalizes both by (value\
        \ - 5)/5 and uses integer thresholds (e.g. Quality of Sleep <= 6 for low_quality,\
        \ Stress Level >= 7 for high_stress). Actionable constraints: enforce that\
        \ both columns contain values within an expected domain (e.g. integers in\
        \ [1,10] or at least bounded numeric values), e.g. .isContainedIn('Quality\
        \ of Sleep', [1..10]) and .isContainedIn('Stress Level', [1..10]) or numeric-range\
        \ checks like .isGreaterThanOrEqualTo('Quality of Sleep', 1) & .isLessThanOrEqualTo('Quality\
        \ of Sleep', 10) (same for Stress Level)."
      sources:
      - start_line: 16
        end_line: 17
        file: ''
      - start_line: 126
        end_line: 131
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: d9777ad4-59cc-41eb-8591-2bf0d3f6b1a5
    - text: "'Sleep Duration' is measured in hours (float) and is used jointly with\
        \ the other two columns for both normalization and threshold-based triggers.\
        \ The code (a) computes under/over relative to 7.0 and 9.0, (b) clips values\
        \ to [3.0, 12.0] for normalization, and (c) uses thresholds (<6.0, >9.0) to\
        \ create triggers. Actionable constraints: enforce 'Sleep Duration' is numeric\
        \ and within a realistic hourly range (e.g. 0.0\u201324.0) and \u2014 if business\
        \ logic requires \u2014 that a high proportion of rows fall within the normalization\
        \ range (e.g. >= 95% within [3.0,12.0]) so clipping is not excessively altering\
        \ data. Example checks: .hasMin('Sleep Duration', 0.0), .hasMax('Sleep Duration',\
