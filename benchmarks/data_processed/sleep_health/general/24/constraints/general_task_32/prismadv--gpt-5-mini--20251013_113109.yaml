        add into risk_score; missing or non-numeric Age will produce NaN age_risk
        and propagate to risk_score. Enforceable checks: .isComplete([''Age'']), .isNumeric([''Age''])
        and a range check such as all(Age >= 0 and Age <= 120). Example Deequ constraints:
        .hasCompleteness(''Age'', 1.0) and .satisfies(''Age >= 0 AND Age <= 120'',
        ''age_reasonable_range'')'
