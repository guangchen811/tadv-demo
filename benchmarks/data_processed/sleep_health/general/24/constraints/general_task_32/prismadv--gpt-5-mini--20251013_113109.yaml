    - text: Quality of Sleep and Stress Level must be numeric and parseable. If Quality
        of Sleep <= 6 then the 'Triggers' entry for that row must include 'low_sleep_quality'.
        Both fields are normalized and used in recovery_risk and stress_direct_risk
        calculations, so they must be within an expected scale (e.g., 0-10) or otherwise
        handled to avoid invalid normalization results.
