        Weight'',''Overweight'',''Obese'') THEN 1 ELSE 0 END", "Valid BMI Categories",
        lambda x: x == 1) or Great Expectations: expect_column_values_to_be_in_set(''BMI
        Category'', [''Normal'',''Normal Weight'',''Overweight'',''Obese'']).'
      sources:
      - start_line: 58
        end_line: 65
        file: ''
      - start_line: 91
        end_line: 91
        file: ''
      - start_line: 132
        end_line: 132
        file: ''
      uid: e8641cf3-d663-4844-99df-26763dd4ec31
    - text: 'There must be zero percent of BMI Category values outside the allowed
        set (i.e., proportion of unmapped/unknown BMI Category values should be 0).
        If any values are unmapped, bmi_risk will contain NaNs which can propagate
        into risk_score, risk tier assignment, and the run summary. Represent as a
        validation like: DEEQU: .satisfies("CASE WHEN `BMI Category` IN (''Normal'',''Normal
        Weight'',''Overweight'',''Obese'') THEN 1 ELSE 0 END", "Allowed BMI Coverage",
