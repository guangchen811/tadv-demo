  '["Blood Pressure","diastolic","systolic"]':
    code: []
    assumptions:
    - text: The 'Blood Pressure' column is a string in the exact 'systolic/diastolic'
        format (one slash separating two integer parts) for every row. Both parts
        must be present and parseable as integers. This can be enforced with a pattern
        check like .matchesPattern('Blood Pressure', '^\\d+/\\d+$') before splitting,
        and/or by asserting completeness of the derived parts after split.
