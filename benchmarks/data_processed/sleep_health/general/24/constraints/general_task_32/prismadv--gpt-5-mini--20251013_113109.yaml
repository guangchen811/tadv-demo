    - text: The final risk_score is the sum of many component series (sleep_dur_risk,
        recovery_risk, activity_risk, bp_risk, hr_risk, bmi_risk, sd_penalty, age_risk,
        stress_direct_risk). Therefore none of the inputs used to compute those components
        should produce NaN for any row. Concretely, the source columns ['Sleep Duration',
        'Quality of Sleep', 'Stress Level', 'Daily Steps', 'Physical Activity Level',
        'Blood Pressure', 'Heart Rate', 'BMI Category', 'Sleep Disorder', 'Age'] must
        be present and parseable to the expected types (numeric or mapped categories)
