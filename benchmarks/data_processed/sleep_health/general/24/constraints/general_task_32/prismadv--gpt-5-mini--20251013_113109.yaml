    assumptions:
    - text: 'All rows must have non-null, numeric-convertible values for the three
        columns used together: ''Quality of Sleep'', ''Stress Level'' and ''Sleep
        Duration''. The code calls .astype(float) and performs arithmetic across these
        columns (normalization, clipping, weighted sum and comparisons) without null
        checks, so missing or non-numeric values will raise errors or produce NaNs.
        Actionable constraints (Deequ-style): enforce completeness for each column
        and that every value is parsable as a finite double. Example constraints:
        .hasCompleteness(''Quality of Sleep'', 1.0), .hasCompleteness(''Stress Level'',
        1.0), .hasCompleteness(''Sleep Duration'', 1.0) and a custom check that values
        are numeric/finite (no NaN/Inf) for these columns.'
      sources:
      - start_line: 9
        end_line: 12
        file: ''
      - start_line: 15
        end_line: 20
        file: ''
      - start_line: 83
        end_line: 86
