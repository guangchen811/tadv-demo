    assumptions:
    - text: 'The ''Blood Pressure'' field is formatted as two components separated
        by a single ''/'' (systolic/diastolic) for every non-null record, and splitting
        yields exactly two parts that can be cast to integers. Actionable check: ensure
        bp_series.str.split(''/'', expand=True) always produces two columns and that
        both parts match an integer regex before astype(int). Example constraint:
        require that Blood Pressure matches regex ''^[0-9]+/[0-9]+$'' (or equivalently
        that split_part_count == 2 and both parts are numeric).'
      sources:
      - start_line: 30
        end_line: 34
        file: ''
      - start_line: 83
        end_line: 87
        file: ''
      uid: 96cffd02-a1ec-40be-8b4a-6e3f12363592
    - text: 'After parsing, both ''systolic'' and ''diastolic'' columns must be non-null
        and convertible to integers for every row for which blood-pressure-based risk
        is computed. Actionable checks: .isComplete([''systolic'',''diastolic''])
        or a satisfies constraint ensuring not null for both columns before compute_bp_risk
        is called.'
      sources:
      - start_line: 31
        end_line: 34
        file: ''
      - start_line: 37
        end_line: 48
        file: ''
      - start_line: 87
        end_line: 88
        file: ''
      uid: b326b73f-3695-46f0-acdd-436431160cb5
    - text: 'Systolic and diastolic must maintain the physiological ordering systolic
        >= diastolic for each record (i.e., the first parsed value is the systolic
        pressure and should not be less than the diastolic). Actionable check: a row-level
        predicate ''systolic >= diastolic'' must hold for all rows. Example Deequ-like
        constraint: .satisfies(''systolic >= diastolic'', ''systolic_ge_diastolic'')'
      sources:
      - start_line: 31
        end_line: 34
        file: ''
      - start_line: 37
        end_line: 47
        file: ''
      - start_line: 117
        end_line: 121
        file: ''
      uid: 8cffd0da-8cc5-48d5-972f-49d29a94a39e
    - text: 'Both ''systolic'' and ''diastolic'' values should lie within plausible
        physiological ranges so the comparison thresholds in compute_bp_risk are meaningful.
        For example enforce systolic in [50, 300] and diastolic in [30, 200] (or other
        domain-appropriate bounds). Actionable checks: .isBetween(''systolic'', 50,
        300) and .isBetween(''diastolic'', 30, 200) or equivalent satisfies predicates.'
      sources:
      - start_line: 37
        end_line: 47
        file: ''
      - start_line: 117
        end_line: 121
        file: ''
      uid: 6911ce4d-ea41-4b69-8cad-1a674772b0ec
    - text: 'Rows must have both ''systolic'' and ''diastolic'' available whenever
        downstream logic uses them jointly (risk scoring and triggers). In particular,
        evaluation of categories like normal ((sys < 120) & (dia < 80)) and stage
        criteria expect both columns present; missing either should be treated as
        invalid for BP-based risk. Actionable check: require completeness of both
        columns for rows included in risk calculation and trigger generation.'
      sources:
