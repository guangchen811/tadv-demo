        file: ''
      uid: 026089ea-97cd-4eda-b5d4-1ce41be848a8
    - text: 'After splitting, both derived columns ''systolic'' and ''diastolic''
        must be non-null and integer-convertible for all rows, and lie within plausible
        physiological bounds (e.g. systolic in [0,300], diastolic in [0,200]). Actionable
        constraints: .isComplete([''systolic'',''diastolic'']) and numeric-range checks
        (e.g. .isBetween(''systolic'', 0, 300) and .isBetween(''diastolic'', 0, 200)).
        These are required because the BP categorization logic (between/>= checks)
        assumes numeric, non-missing values.'
