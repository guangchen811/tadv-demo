    - text: 'Each ''Blood Pressure'' value must follow the pattern ''systolic/diastolic''
        (exactly one ''/'' separator) where both systolic and diastolic are integer
        strings (optionally with surrounding whitespace) and there are exactly two
        components. A suitable regex-based check: expect_column_values_to_match_regex(''Blood
        Pressure'', r''^\s*\d+\s*/\s*\d+\s*$'') or .satisfies("CASE WHEN `Blood Pressure`
        RLIKE ''^\\s*\\d+\\s*/\\s*\\d+\\s*$'' THEN 1 ELSE 0 END", "BP format", lambda
        x: x >= 0.99).'
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 87
        end_line: 87
        file: ''
      uid: aeb6e380-d5df-441a-99a1-cbd38fc1f79c
    - text: 'Both parts (systolic and diastolic) must be parseable as integers (no
        trailing units like ''mmHg'', no non-numeric tokens). The code calls .astype(int)
        on the split components, which will fail if values cannot be cast to int.
        Suggested validation after parsing or via regex and cast-check: .satisfies("CASE
        WHEN `Blood Pressure` RLIKE ''^\\s*\\d+\\s*/\\s*\\d+\\s*$'' THEN 1 ELSE 0
        END", "BP integer-parsable", lambda x: x == 1).'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 87
        end_line: 87
        file: ''
      uid: a4a0906e-822a-4abc-8e14-000f48e7eac7
    - text: 'Systolic and diastolic values should be within reasonable physiological
        ranges to match the later threshold logic. For example, require systolic in
        [50, 300] and diastolic in [30, 200]. These ranges prevent nonsensical values
        that would break risk calculations and trigger logic. Example checks after
        extracting ints: expect_column_values_to_be_between(''systolic'', min_value=50,
        max_value=300) and expect_column_values_to_be_between(''diastolic'', min_value=30,
