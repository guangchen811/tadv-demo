        end_line: 86
        file: ''
      uid: fab90adc-2612-4164-ba6a-525860920150
    - text: "The inputs to compute_activity_risk \u2014 'Daily Steps' and 'Physical\
        \ Activity Level' \u2014 must be numeric and within the ranges used by the\
        \ code: 'Daily Steps' in [0,15000] and 'Physical Activity Level' in [0,120].\
        \ Enforce with numeric and range checks (e.g. .isBetween('Daily Steps', 0,\
        \ 15000) and .isBetween('Physical Activity Level', 0, 120))."
      sources:
      - start_line: 23
        end_line: 27
        file: ''
      - start_line: 86
        end_line: 86
        file: ''
      uid: 6c980222-73e3-443d-9c33-4de68651cac8
    - text: 'All per-component risk Series computed from different columns (sleep_dur_risk,
        recovery_risk, activity_risk, bp_risk, hr_risk, bmi_risk, sd_penalty, age_risk,
        stress_direct_risk) must be row-aligned with the original DataFrame (same
        index and length) so that elementwise summation to form risk_score is valid.
        Practically: derived Series should have the same number of rows as df and
        identical indices; enforce by checking completeness of the source columns
        and that no rows are dropped or reindexed during transformation.'
      sources:
      - start_line: 99
        end_line: 109
        file: ''
      - start_line: 84
        end_line: 96
        file: ''
      uid: afa9e2ec-6c81-4652-8915-e4efb2d649f1
    - text: 'The per-row trigger logic assumes several columns are present, of the
        expected types, and non-missing for comparisons: ''Sleep Duration'' (numeric,
        used with < and >), ''Quality of Sleep'' (numeric, used with <=), ''Daily
        Steps'' (numeric, used with <), ''Stress Level'' (numeric, used with >=),
        ''BMI Category'' (categorical string containing values like ''Obese''), and
        ''Sleep Disorder'' (string or null; if non-null it must be comparable to set
        {''Insomnia'',''Sleep Apnea''}). Enforce with completeness and type checks
        (e.g. .isNumeric for the numeric columns and .isContainedIn for categorical
        values) so the per-row if-conditions do not error or behave unexpectedly.'
      sources:
      - start_line: 117
        end_line: 136
        file: ''
      - start_line: 90
        end_line: 96
        file: ''
      uid: 55b9ee5a-1438-4f6f-9542-caddc307a1a9
