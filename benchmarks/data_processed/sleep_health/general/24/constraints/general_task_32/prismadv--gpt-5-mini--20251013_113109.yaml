    - text: '''Daily Steps'' and ''Physical Activity Level'' must be numeric and non-null
        because compute_activity_risk normalizes and clips them and the triggers logic
        checks Daily Steps < 5000. Enforceable checks: .isComplete([''Daily Steps'',''Physical
        Activity Level'']), .isNumeric(...) and optional range checks (e.g. Daily
        Steps >= 0). Example Deequ constraints: .hasCompleteness([''Daily Steps'',''Physical
        Activity Level''], 1.0) and .satisfies(''`Daily Steps` >= 0'', ''daily_steps_non_negative'')'
