        ''short_sleep''; if Sleep Duration > 9.0 it must include ''long_sleep''. Sleep
        Duration is also used in compute_sleep_duration_risk and compute_recovery_risk
        (which clips to [3.0, 12.0]), so values should be present and sensible to
        avoid NaNs or meaningless clamping.'
