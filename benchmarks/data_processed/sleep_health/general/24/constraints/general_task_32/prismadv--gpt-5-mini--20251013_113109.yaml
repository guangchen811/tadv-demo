        end_line: 95
        file: ''
      - start_line: 99
        end_line: 109
        file: ''
      - start_line: 111
        end_line: 115
        file: ''
      uid: e9c477e6-3091-4283-8e48-fc9a84996430
    - text: "The trio of columns used to compute recovery_risk \u2014 'Quality of\
        \ Sleep', 'Stress Level', and 'Sleep Duration' \u2014 must be numeric (or\
        \ coercible to numeric) and non-null for rows where recovery_risk is expected.\
        \ compute_recovery_risk normalizes these values and clips Sleep Duration to\
        \ [3,12]; missing or non-numeric entries will produce NaNs and corrupt the\
        \ summed risk_score. Enforceable checks: .isComplete(['Quality of Sleep','Stress\
        \ Level','Sleep Duration']), .isNumeric(...) and optional bounds check for\
        \ Sleep Duration (e.g. between 0 and 24). Example Deequ constraints: .hasCompleteness(['Quality\
        \ of Sleep','Stress Level','Sleep Duration'], 1.0) and .satisfies('`Sleep\
        \ Duration` >= 0 AND `Sleep Duration` <= 24', 'sleep_duration_bounds')"
