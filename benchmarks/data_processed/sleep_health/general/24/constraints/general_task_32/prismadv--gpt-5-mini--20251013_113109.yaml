    - text: 'For all rows where blood pressure is present, the parsed systolic and
        diastolic values must be physiologically plausible and ordered: systolic >
        diastolic, systolic within [50,250], diastolic within [30,150]. The downstream
        BP risk logic assumes meaningful numeric ranges and uses thresholds up to
        systolic >=180 and diastolic >=120. Actionable constraints: .isNonNull(''systolic''),
        .isNonNull(''diastolic''), .isGreaterThan(''systolic'',''diastolic''), .isGreaterThanOrEqualTo(''systolic'',50),
        .isLessThanOrEqualTo(''systolic'',250), .isGreaterThanOrEqualTo(''diastolic'',30),
        .isLessThanOrEqualTo(''diastolic'',150).'
