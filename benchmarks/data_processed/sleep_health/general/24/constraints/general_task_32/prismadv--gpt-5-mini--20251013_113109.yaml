    - text: '''Daily Steps'' and ''Physical Activity Level'' must be numeric and non-negative.
        If Daily Steps < 5000 then the ''Triggers'' entry must include ''low_activity''.
        compute_activity_risk clamps Daily Steps to [0, 15000] and PAL to [0, 120],
        so source values should be present and parseable to ensure meaningful activity_risk
        values.'
