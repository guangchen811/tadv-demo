    assumptions:
    - text: 'The ''Quality of Sleep'' column must be non-null (complete) in the input
        data. The code treats values from this column as required for recovery risk
        calculation and for trigger logic (if row[''Quality of Sleep''] <= 6). A corresponding
        validation rule could be e.g. a deequ constraint: .satisfies("CASE WHEN `Quality
        of Sleep` IS NOT NULL THEN 1 ELSE 0 END", "Quality of Sleep not null", lambda
        x: x == 1.0).'
      sources:
