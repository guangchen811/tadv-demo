    - text: "The three inputs to compute_recovery_risk \u2014 'Quality of Sleep',\
        \ 'Stress Level', and 'Sleep Duration' \u2014 must be numeric (float-convertible)\
        \ and on expected scales: 'Quality of Sleep' and 'Stress Level' should be\
        \ within a 0\u201310-like range (so normalization (x-5)/5 is meaningful),\
        \ and 'Sleep Duration' should be a plausible hours value (e.g. between 0 and\
        \ 24). Constraints: .isNumeric(...) and .isBetween for each column (e.g. .isBetween('Quality\
        \ of Sleep', 0, 10), .isBetween('Stress Level', 0, 10), .isBetween('Sleep\
        \ Duration', 0, 24))."
