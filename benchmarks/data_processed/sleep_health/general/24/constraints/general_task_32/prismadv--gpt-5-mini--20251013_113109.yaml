        file: ''
      uid: e60ac2f2-cd89-4049-9218-1a7500701749
    - text: 'Columns that contribute numeric components to risk_score should not produce
        NaN when combined. Specifically, the following inputs must be present and
        valid so the sum of components (sleep_dur_risk, recovery_risk, activity_risk,
        bp_risk, hr_risk, bmi_risk, sd_penalty, age_risk, stress_direct_risk) yields
        a finite risk_score for each row: ''Sleep Duration'', ''Quality of Sleep'',
        ''Stress Level'', ''Daily Steps'', ''Physical Activity Level'', ''Blood Pressure''
        (parsable), ''Heart Rate'', ''BMI Category'' (mapped to known categories)
        and ''Age''. Enforceable check: for every row, all of the derived component
        values are finite (not NaN/Inf) or equivalently require completeness and valid
        formats for the listed input columns. Example Deequ approach: require completeness
        of all listed columns and explicit validation rules that each mapping/conversion
        will succeed (e.g. isIn for BMI Category, regex for Blood Pressure, numeric
        ranges for others).'
      sources:
      - start_line: 99
        end_line: 109
        file: ''
      - start_line: 111
        end_line: 115
        file: ''
      uid: e6bb8a0a-b337-4107-95db-0472b43333a6
    - text: 'Values in ''BMI Category'' must belong to the mapping keys used by bmi_risk_map
        ([''Normal'',''Normal Weight'',''Overweight'',''Obese'']). Any other category
        yields NaN from .map(...) and will make bmi_risk NaN and potentially make
        risk_score NaN. Enforceable checks: .isIn(''BMI Category'', [''Normal'',''Normal
        Weight'',''Overweight'',''Obese'']) with completeness. Example Deequ constraint:
        .hasCompleteness(''BMI Category'', 1.0) and .satisfies(''`BMI Category` IN
        ("Normal","Normal Weight","Overweight","Obese")'', ''bmi_allowed_values'')'
