        end_line: 24
        file: ''
      uid: e20fcd6b-4a52-4f93-adee-cbdaecaa55b0
    - text: 'The ''Physical Activity Level'' column should have some variability (at
        least two distinct values). It is used in percentile ranking (rank(pct=True)),
        which is meaningful only if there is more than one distinct value. Example
