    - text: 'For every row, priority_bucket label must correspond to the risk_score
        binning used in pd.cut: risk_score in (-0.01, 25] -> ''Low''; (25, 50] ->
        ''Moderate''; (50, 75] -> ''High''; (75, 100] -> ''Critical''. This can be
        enforced as a multi-condition constraint, e.g. .satisfies("(risk_score > -0.01
        AND risk_score <= 25 AND priority_bucket = ''Low'') OR (risk_score > 25 AND
        risk_score <= 50 AND priority_bucket = ''Moderate'') OR (risk_score > 50 AND
