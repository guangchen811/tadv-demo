    - text: 'The parsed systolic should be greater than or equal to the diastolic
        in each record (physiologically required): bp_sys >= bp_dia. Enforceable as
        a row-level predicate such as .satisfies("bp_sys >= bp_dia") or equivalent
        Deequ constraint over both columns.'
      sources:
      - start_line: 26
        end_line: 36
        file: ''
      uid: b62979f2-2c36-47f5-81c4-b462d62fdca2
    - text: 'Both ''Daily Steps'' and ''Physical Activity Level'' must be numeric
        and complete (no nulls) so ranking and the activity_index computation are
        valid. Additionally, ''Daily Steps'' should be non-negative integers and ''Physical
        Activity Level'' should be on a 0-100 scale (the code treats >=60 as the vigorous
        threshold). The derived ''vigorous_bonus'' must equal 5 when (Daily Steps
        >= 10000 AND Physical Activity Level >= 60), otherwise 0. Enforceable checks:
        .isComplete(["Daily Steps","Physical Activity Level"]) ; .isNonNegative("Daily
        Steps") ; .isBetween("Physical Activity Level", 0, 100) ; .satisfies("vigorous_bonus
        == IF(Daily Steps >= 10000 AND Physical Activity Level >= 60, 5, 0)").'
      sources:
      - start_line: 19
        end_line: 46
        file: ''
      uid: 59062a7b-7c16-455a-a6c5-d02309c2ed1a
    - text: "Both 'Stress Level' and 'Quality of Sleep' must be numeric and within\
        \ the expected 0\u201310 scale so the calculation sq_factor = Stress Level\
        \ * (10 - Quality of Sleep) / 10.0 (and sq_risk = 2.8 * sq_factor) is valid.\
        \ Enforceable checks: .isComplete([\"Stress Level\",\"Quality of Sleep\"])\
        \ ; .isBetween(\"Stress Level\", 0, 10) ; .isBetween(\"Quality of Sleep\"\
        , 0, 10) ; .satisfies(\"sq_risk == 2.8 * (Stress Level * (10 - Quality of\
        \ Sleep) / 10.0)\")."
      sources:
      - start_line: 19
        end_line: 50
        file: ''
      uid: 20c51620-32cc-40c7-abb8-7a03d485e3e4
    - text: 'All component risk columns used in the final aggregation must be numeric
        and complete so raw_risk is computed deterministically: bp_risk, sq_risk,
        duration_risk, bmi_risk, hr_risk, age_risk, sd_risk, activity_protect and
        vigorous_bonus. Also enforce non-negativity on the positive risk components
        and on activity_protect/vigorous_bonus where appropriate. The aggregate must
        equal the explicit expression: raw_risk == (bp_risk + sq_risk + duration_risk
        + bmi_risk + hr_risk + age_risk + sd_risk - activity_protect - vigorous_bonus).
        Enforceable checks: .isComplete([...list of columns...]) ; .isNonNegative(["bp_risk","sq_risk","duration_risk","bmi_risk","hr_risk","age_risk","sd_risk","activity_protect","vigorous_bonus"])
        ; .satisfies("raw_risk == bp_risk + sq_risk + duration_risk + bmi_risk + hr_risk
        + age_risk + sd_risk - activity_protect - vigorous_bonus").'
      sources:
