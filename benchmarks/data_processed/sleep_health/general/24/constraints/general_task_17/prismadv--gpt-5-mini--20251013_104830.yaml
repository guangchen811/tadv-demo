        file: ''
      - start_line: 43
        end_line: 46
        file: ''
      uid: 2acc7927-0817-4c79-afaa-53585e3f63a5
    - text: 'The ''Physical Activity Level'' values are expected to be on a 0-100
        scale (inclusive). The code treats a value >= 60 as a ''vigorous'' cutoff
        and uses percentile ranking together with steps to compute activity protection,
        so values outside 0-100 would be semantically inconsistent. Example check:
