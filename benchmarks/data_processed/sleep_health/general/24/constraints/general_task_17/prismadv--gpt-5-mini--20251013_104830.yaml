        to compute it should also be present (non-null): bp_risk, sq_risk, duration_risk,
        bmi_risk, hr_risk, age_risk, sd_risk, activity_protect, and vigorous_bonus.
        In logical form: (risk_score IS NULL) OR (bp_risk IS NOT NULL AND sq_risk
        IS NOT NULL AND duration_risk IS NOT NULL AND bmi_risk IS NOT NULL AND hr_risk
        IS NOT NULL AND age_risk IS NOT NULL AND sd_risk IS NOT NULL AND activity_protect
        IS NOT NULL AND vigorous_bonus IS NOT NULL). This ensures the aggregated score
