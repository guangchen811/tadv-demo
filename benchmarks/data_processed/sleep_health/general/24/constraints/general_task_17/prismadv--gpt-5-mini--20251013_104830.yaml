    - text: 'For every row, raw_risk is computed as the sum of the component risk
        contributions minus activity protection and vigorous bonus: raw_risk = bp_risk
        + sq_risk + duration_risk + bmi_risk + hr_risk + age_risk + sd_risk - activity_protect
        - vigorous_bonus. This can be enforced in Deequ (or similar) as a row-level
        equality constraint, e.g. .satisfies(''raw_risk = bp_risk + sq_risk + duration_risk
        + bmi_risk + hr_risk + age_risk + sd_risk - activity_protect - vigorous_bonus'',
