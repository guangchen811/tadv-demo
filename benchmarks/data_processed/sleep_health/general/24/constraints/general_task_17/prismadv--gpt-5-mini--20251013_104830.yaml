        \ of Sleep', min_value=0, max_value=10) / Deequ: .satisfies(\"CASE WHEN `Quality\
        \ of Sleep` BETWEEN 0 AND 10 THEN 1 ELSE 0 END\", 'Quality in 0-10', lambda\
