      uid: f8aae883-cf46-49f6-902a-f7a19c67049b
    - text: "The final 'risk_score' must be the clipped (0\u2013100) and rounded representation\
        \ of 'raw_risk'. Enforceable checks: .isBetween(\"risk_score\", 0.0, 100.0)\
        \ ; .satisfies(\"risk_score == ROUND(CLAMP(raw_risk, 0, 100), 2)\") (or equivalent\
        \ check that verifies risk_score equals raw_risk clipped to [0,100] and rounded\
        \ to two decimals). This ensures subsequent bucketing (Low/Moderate/High/Critical)\
        \ is applied to expected values."
      sources:
      - start_line: 96
        end_line: 100
