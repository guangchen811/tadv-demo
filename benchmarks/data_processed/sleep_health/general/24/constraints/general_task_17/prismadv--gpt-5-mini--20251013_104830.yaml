  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN TRIM(`BMI Category`) IN (''Obese'',''Overweight'',''Normal'',''Normal
        Weight'') THEN 1 ELSE 0 END", "Trimmed BMI Category valid", lambda x: x >=
        0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: e44a02c4-2498-459e-8fe8-c943a99ed7b0
      source_assumptions:
      - 79a2a7cd-e605-4710-b740-6e672e90e678
      - e27fd00f-eb3b-4eef-9758-6d02465e0d71
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IS NULL OR TRIM(`BMI Category`)
        NOT IN (''Obese'',''Overweight'',''Normal'',''Normal Weight'') THEN 1 ELSE
        0 END", "Unknown or null BMI Category fraction", lambda x: x <= 0.05)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 2abf64ce-7187-4719-aaef-a38ffe1a64ea
      source_assumptions:
      - b16ef1a8-8a96-48ce-80a6-18aa6fb14235
    assumptions:
    - text: 'The ''BMI Category'' column is expected to use the categorical labels:
        ''Obese'', ''Overweight'', ''Normal'', or ''Normal Weight''. The code maps
        these exact strings to numeric risks (Obese->12, Overweight->6, Normal->0,
        Normal Weight->0). Any value outside this set will not match the mapping and
        will be treated as unknown (mapped to NaN then filled to 0). A validation
        rule (Deequ-style) could be: .satisfies("CASE WHEN `BMI Category` IN (''Obese'',''Overweight'',''Normal'',''Normal
        Weight'') THEN 1 ELSE 0 END", "Valid BMI Category", lambda x: x >= 0.95)'
      sources:
      - start_line: 63
        end_line: 70
        file: ''
      uid: 79a2a7cd-e605-4710-b740-6e672e90e678
    - text: 'The input may contain nulls or unexpected BMI Category values, but the
        code will silently convert those to a zero bmi_risk via .map(...).fillna(0).
        Therefore the fraction of null/unknown BMI Category values should be small
        (e.g., <= 5%) so that unexpected categories do not mask data quality issues.
        A validation rule could be: .satisfies("CASE WHEN `BMI Category` IS NULL OR
        `BMI Category` NOT IN (''Obese'',''Overweight'',''Normal'',''Normal Weight'')
        THEN 1 ELSE 0 END", "Unknown or null BMI Category fraction", lambda x: x <=
        0.05)'
      sources:
      - start_line: 63
        end_line: 70
        file: ''
      uid: b16ef1a8-8a96-48ce-80a6-18aa6fb14235
    - text: 'Matching is exact and case-sensitive: labels must have correct spelling,
        casing, and no extra whitespace because map() uses exact string keys. Validate
        trimmed / canonicalized values or assert that trimmed values are in the expected
        set. Example validation: .satisfies("CASE WHEN TRIM(`BMI Category`) IN (''Obese'',''Overweight'',''Normal'',''Normal
        Weight'') THEN 1 ELSE 0 END", "Trimmed BMI Category valid", lambda x: x >=
        0.95)'
      sources:
      - start_line: 63
        end_line: 70
        file: ''
      uid: e27fd00f-eb3b-4eef-9758-6d02465e0d71
    - text: 'Both ''Normal'' and ''Normal Weight'' are recognized and intentionally
        map to the same risk (0). The input is allowed to contain either form as synonyms;
        validation can allow both. Example: .satisfies("CASE WHEN `BMI Category` IN
        (''Normal'',''Normal Weight'') THEN 1 ELSE 0 END", "Normal synonyms present",
        lambda x: x >= 0.0)'
      sources:
      - start_line: 63
        end_line: 70
        file: ''
      uid: a07ad684-1b7e-456a-87de-836e81feed73
