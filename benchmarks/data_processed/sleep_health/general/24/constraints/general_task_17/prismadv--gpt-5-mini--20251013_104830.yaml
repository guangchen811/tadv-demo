      source_assumptions:
      - f97b668e-d06f-4b20-ae80-aa8a0fe71b26
    assumptions:
    - text: "Every value in the 'Blood Pressure' column must be parseable as two integers\
        \ separated by a single forward slash, matching the regular expression ^(\\\
        d{2,3})/(\\d{2,3})$ (i.e., Systolic/Diastolic where each part is 2\u20133\
        \ digits). The code immediately extracts these two groups and converts them\
        \ to int without null/format handling, so this must hold for essentially 100%\
        \ of rows. Example validation (Deequ/SQL-like): .satisfies(\"CASE WHEN `Blood\
        \ Pressure` RLIKE '^(\\\\d{2,3})/(\\\\d{2,3})$' THEN 1 ELSE 0 END\", \"BP_parseable\"\
        , lambda x: x == 1.0) or Great Expectations: expect_column_values_to_match_regex('Blood\
        \ Pressure', r'^(\\d{2,3})/(\\d{2,3})$', mostly=1.0)."
      sources:
      - start_line: 27
        end_line: 29
        file: ''
      uid: 0f3a34f6-affd-49f0-9f0f-df7504ab0af7
    - text: 'There should be no missing or malformed ''Blood Pressure'' entries (completeness
        and valid format): because the code converts extracted parts directly to int,
        any rows that fail the regex will produce NaNs or errors. In other words,
        the input column must not contain nulls or non-conforming strings. Example
        validation: .satisfies("CASE WHEN `Blood Pressure` IS NOT NULL AND `Blood
        Pressure` RLIKE ''^(\\d{2,3})/(\\d{2,3})$'' THEN 1 ELSE 0 END", "BP_present_and_parseable",
        lambda x: x == 1.0).'
      sources:
      - start_line: 27
        end_line: 29
        file: ''
      uid: d5db9b13-c5c1-4707-89d9-a9d82372ec50
    - text: "The numeric systolic and diastolic parts (after parsing) should be within\
        \ plausible numeric ranges so the downstream threshold checks are meaningful.\
        \ At minimum they must be integers in the range allowed by the regex (10\u2013\
        999), but practically you can validate e.g. systolic between 30 and 300 and\
        \ diastolic between 30 and 200. Example validation (SQL-like after parsing):\
        \ .satisfies(\"CASE WHEN CAST(split_part(`Blood Pressure`,'/',1) AS INT) BETWEEN\
        \ 30 AND 300 AND CAST(split_part(`Blood Pressure`,'/',2) AS INT) BETWEEN 30\
        \ AND 200 THEN 1 ELSE 0 END\", \"BP_reasonable_range\", lambda x: x >= 0.99).\
        \ This ensures values used in conditions like >=130/85, >=140/90, etc. are\
        \ sensible."
      sources:
      - start_line: 33
        end_line: 36
        file: ''
      - start_line: 27
        end_line: 29
        file: ''
      uid: f97b668e-d06f-4b20-ae80-aa8a0fe71b26
    - text: 'The ''Blood Pressure'' values must not contain extra characters (units
        or text) or leading/trailing whitespace, because the regex used in extraction
        is anchored (^) and ($) and requires exact digit groups and a single ''/''.
        Example validation: expect_column_values_to_match_regex(''Blood Pressure'',
        r''^(\d{2,3})/(\d{2,3})$'').'
      sources:
      - start_line: 27
        end_line: 27
        file: ''
      uid: c2d9197b-5cb1-4650-b94e-4479275d5b17
