        columns ''bp_sys'' and ''bp_dia'' without producing nulls. Enforceable checks:
        ''Blood Pressure'' completeness and regex match (e.g. every value matches
        ^(\d{2,3})/(\d{2,3})$), and after parsing ''bp_sys'' and ''bp_dia'' are complete
        integers and lie within physiological bounds (example constraints: bp_sys
        between 30 and 300, bp_dia between 20 and 200). In Deequ-like form: .isComplete("Blood
        Pressure") ; .containsPattern("Blood Pressure", "^(\\d{2,3})/(\\d{2,3})$")
        ; .isComplete(["bp_sys","bp_dia"]) ; .isBetween("bp_sys", 30, 300) ; .isBetween("bp_dia",
