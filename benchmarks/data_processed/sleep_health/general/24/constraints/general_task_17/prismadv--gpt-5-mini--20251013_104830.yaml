        end_line: 46
        file: ''
      uid: 9a523ac9-1157-4a64-80a1-9554e94fd268
    - text: 'The ''Physical Activity Level'' column should contain integer (whole
        number) values (no fractional values). Metadata indicates an integral type
        and downstream logic compares to integer thresholds (>= 60). Example check:
