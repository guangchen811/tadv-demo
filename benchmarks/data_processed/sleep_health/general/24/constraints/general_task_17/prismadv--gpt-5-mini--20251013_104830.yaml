        of the explicit raw aggregation computed from component risk columns: raw
        = bp_risk + sq_risk + duration_risk + bmi_risk + hr_risk + age_risk + sd_risk
        - activity_protect - vigorous_bonus; then risk_score == round( min(max(raw,
        0), 100), 2 ). Enforce as a row-level equality or predicate (for example:
        risk_score = round(least(greatest(bp_risk + sq_risk + duration_risk + bmi_risk
        + hr_risk + age_risk + sd_risk - activity_protect - vigorous_bonus, 0), 100),
        2)).'
