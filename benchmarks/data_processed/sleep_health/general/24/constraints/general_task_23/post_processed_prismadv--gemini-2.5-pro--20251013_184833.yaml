fixing_results:
  Quality of Sleep:
    ce7daf46-d492-49b0-bb4a-1cdfb1d4e9b3: '.hasApproxCountDistinct("Quality of Sleep",
      lambda x: x > 1)'
  Blood Pressure:
    8c0fda1c-91a6-44b3-874c-19e43729caff: .hasPattern('Blood Pressure', r'(^\s*(\d{2,3})\s*/\s*(\d{2,3})\s*$)|(^0\.0$)')
  Sleep Duration:
    1e757408-61d9-40a1-bed0-a84463ad5ba9: '.hasApproxCountDistinct(''Sleep Duration'',
      lambda x: x > 1)'
  Daily Steps:
    9bf803ad-0a16-402e-9cf9-a4720b7583a7: '.isNonNegative(''`Daily Steps`'', assertion=lambda
      x: x == 1.0)'
  ? '["Blood Pressure","Daily Steps","Heart Rate","Person ID","Physical Activity Level","Quality
    of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : 8bc18faf-1743-4078-8862-2f9894316528: '.satisfies("CASE WHEN `Sleep Disorder`
      IN (''Insomnia'', ''Sleep Apnea'') THEN `Quality of Sleep` < 8 ELSE TRUE END",
      "DisorderImpliesLowerSleepQuality", lambda x: x > 0.85)'
  '["Blood Pressure","Heart Rate"]':
    4fa6b52c-f6fb-451f-bcee-fe24072a6a13: '.satisfies("CAST(split(`Blood Pressure`,
      ''/'')[0] AS INT) > CAST(split(`Blood Pressure`, ''/'')[1] AS INT)", "Systolic
      should be greater than Diastolic BP", lambda x: x == 1.0)'
