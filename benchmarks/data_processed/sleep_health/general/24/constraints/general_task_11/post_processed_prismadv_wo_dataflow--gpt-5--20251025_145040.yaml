    assumptions:
    - text: 'Blood Pressure is supplied as a single string in the form ''<Systolic>/<Diastolic>''
        and is losslessly and completely parseable into integer columns Systolic and
        Diastolic. Furthermore, Systolic and Diastolic must be positive and satisfy
        Systolic >= Diastolic. We could represent this as Deequ constraints like:

        - .hasPattern("Blood Pressure", "^\\s*\\d+\\s*/\\s*\\d+\\s*$")

        - .areComplete(["Systolic", "Diastolic"]) and .satisfies("`Systolic` > 0 AND
        `Diastolic` > 0", "bp_positive")

        - .satisfies("`Systolic` >= `Diastolic`", "bp_sys_ge_dia")

        - .satisfies("regexp_replace(`Blood Pressure`, ''\\s+'', '''') = concat(cast(`Systolic`
        as string), ''/'', cast(`Diastolic` as string))", "bp_string_matches_parts")'
      sources:
      - start_line: 90
        end_line: 97
        file: ''
      uid: bec3af7a-729d-4502-9e73-7e098a7f8356
    - text: "The derived column qos must equal Quality of Sleep cast to integer, and\
        \ both columns must be present. Given downstream logic and data profile, qos\
        \ should be in the 4\u20139 integral range. We could represent this as Deequ\
        \ constraints like:\n- .areComplete([\"Quality of Sleep\", \"qos\"]) \n- .satisfies(\"\
        `qos` = cast(`Quality of Sleep` as int)\", \"qos_equals_qos_int\") \n- .isContainedIn(\"\
        qos\", [4,5,6,7,8,9])"
      sources:
      - start_line: 85
        end_line: 88
        file: ''
      - start_line: 33
        end_line: 36
        file: ''
      uid: a4e56c8a-485d-4f70-b021-caaa2d99d9bd
    - text: "For the linear fit between Physical Activity Level and Daily Steps to\
        \ work, both columns must be numeric and complete (no nulls or NaNs) when\
        \ the dataset has at least two rows. We could represent this as Deequ constraints\
        \ like:\n- .areComplete([\"Physical Activity Level\", \"Daily Steps\"]) \n\
        - .satisfies(\"isnan(`Physical Activity Level`) = false AND isnan(`Daily Steps`)\
        \ = false\", \"pal_steps_not_nan\")"
      sources:
      - start_line: 72
        end_line: 77
        file: ''
      - start_line: 98
        end_line: 107
        file: ''
      uid: 72b37fe5-2a57-4dfc-adc4-039f91d6c52a
    - text: 'risk_band must be consistent with risk_score binning: Low for risk_score
        <= 33.3, Moderate for 33.3 < risk_score <= 66.6, and High for 66.6 < risk_score
        <= 100. We could represent this as a Deequ constraint like:

        - .satisfies("(risk_score <= 33.3 AND risk_band = ''Low'') OR (risk_score
        > 33.3 AND risk_score <= 66.6 AND risk_band = ''Moderate'') OR (risk_score
        > 66.6 AND risk_band = ''High'')", "risk_band_consistency")'
      sources:
