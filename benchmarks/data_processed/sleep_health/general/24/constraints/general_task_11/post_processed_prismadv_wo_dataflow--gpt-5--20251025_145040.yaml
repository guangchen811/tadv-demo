    - text: 'High overall risk should trigger escalation guidance: if risk_score >=
        70 then the ''recommendations'' text must include sleep study guidance. Example
        constraint: satisfies("(`risk_score` < 70) OR lower(`recommendations`) LIKE
        ''%sleep study%''",''highrisk_reco_present'').'
