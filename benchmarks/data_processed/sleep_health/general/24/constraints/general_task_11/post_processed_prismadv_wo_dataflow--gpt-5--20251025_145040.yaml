    code: []
    assumptions:
    - text: 'The ''Blood Pressure'' column must be parseable into two numeric parts
        ''Systolic'' and ''Diastolic'', and the derived columns must be complete integers
        consistent with the original string (i.e., for all rows, concat(Systolic,
        ''/'', Diastolic) == Blood Pressure). This can be enforced with: hasPattern(''Blood
        Pressure'', ''^[0-9]{2,3}/[0-9]{2,3}$''), isComplete([''Systolic'',''Diastolic'']),
