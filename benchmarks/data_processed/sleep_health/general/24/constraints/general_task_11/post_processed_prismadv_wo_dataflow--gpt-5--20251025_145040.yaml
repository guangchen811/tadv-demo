    - text: 'The ''risk_band'' must be consistent with ''risk_score'' using the exact
        binning: risk_score in [0, 33.3] -> ''Low''; (33.3, 66.6] -> ''Moderate'';
        (66.6, 100] -> ''High''. Also, ''risk_score'' must lie within [0, 100] for
        all rows. Example constraint: .satisfies("(risk_score >= 0 AND risk_score
        <= 100) AND ((risk_score <= 33.3 AND risk_band = ''Low'') OR (risk_score >
        33.3 AND risk_score <= 66.6 AND risk_band = ''Moderate'') OR (risk_score >
        66.6 AND risk_band = ''High''))", "risk_band_matches_score")'
