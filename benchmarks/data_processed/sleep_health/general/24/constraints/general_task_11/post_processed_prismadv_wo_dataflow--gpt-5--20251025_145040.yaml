        end_line: 16
        file: ''
      uid: 78b0fa24-3828-4bd8-a598-471a0ee1a0be
    - text: The recommendations field must contain the phrase 'Discuss blood pressure
        with your clinician; consider home BP monitoring.' if and only if (Systolic
        >= 140) OR (Diastolic >= 90). If both Systolic < 140 and Diastolic < 90, that
        phrase must be absent.
