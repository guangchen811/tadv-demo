    - text: 'Hypertensive readings should trigger hypertension guidance: if Systolic
        >= 140 OR Diastolic >= 90 then the ''recommendations'' text must mention blood
        pressure. Example constraint: satisfies("(NOT(`Systolic` >= 140 OR `Diastolic`
        >= 90)) OR lower(`recommendations`) LIKE ''%blood pressure%''", ''bp_reco_present'').'
