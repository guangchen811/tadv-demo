        end_line: 16
        file: ''
      - start_line: 91
        end_line: 97
        file: ''
      uid: d26440aa-1734-4ac0-955e-52b46ea6e20e
    - text: For each row, exactly one of the BP categories (normal, elevated, stage1,
        stage2, crisis), defined by logical combinations of Systolic and Diastolic,
        must evaluate to true (i.e., the categories are mutually exclusive and collectively
        exhaustive for valid values).
      sources:
