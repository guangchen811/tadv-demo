        end_line: 151
        file: ''
      uid: de786b31-ca79-471a-b239-19ec7d396a98
    - text: "The recommendations column must include specific guidance when trigger\
        \ conditions across multiple columns are met. We could represent these as\
        \ Deequ satisfies constraints (Spark SQL) such as:\n- Sleep Duration coaching:\
        \ .satisfies(\"(`Sleep Duration` >= 6.0) OR instr(recommendations, 'Target\
        \ 7\u20139 hours') > 0\", \"rec_sleep_short\") and .satisfies(\"(`Sleep Duration`\
        \ <= 9.0) OR instr(recommendations, 'Keep time-in-bed under 9 hours') > 0\"\
        , \"rec_sleep_long\")\n- Quality of sleep: .satisfies(\"(`qos` > 6) OR instr(recommendations,\
        \ 'Optimize sleep hygiene') > 0\", \"rec_qos_low\")\n- Stress management:\
        \ .satisfies(\"(`Stress Level` < 7) OR instr(recommendations, 'Practice 10\
        \ minutes of breathing') > 0\", \"rec_stress_high\")\n- Activity alignment:\
        \ .satisfies(\"(`Physical Activity Level` >= 60) OR instr(recommendations,\
        \ 'Add 2000\u20133000 steps/day') > 0\", \"rec_activity_low\") and .satisfies(\"\
        (`Physical Activity Level` < 90) OR instr(recommendations, 'Maintain vigorous\
        \ activity days') > 0\", \"rec_activity_high\")\n- BMI and BP: .satisfies(\"\
        (lower(`BMI Category`) NOT IN ('overweight','obese')) OR instr(recommendations,\
        \ 'Pair sleep regularity with nutrition planning') > 0\", \"rec_bmi_heavy\"\
        ) and .satisfies(\"( (`Systolic` < 140) AND (`Diastolic` < 90) ) OR instr(recommendations,\
        \ 'Discuss blood pressure') > 0\", \"rec_hypertension\")\n- High-risk escalation:\
        \ .satisfies(\"(risk_score < 70) OR instr(recommendations, 'Consider a sleep\
        \ study') > 0\", \"rec_high_risk\")"
