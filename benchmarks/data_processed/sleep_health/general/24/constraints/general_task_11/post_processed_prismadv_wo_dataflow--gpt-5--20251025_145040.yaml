    - text: 'The qos helper column must equal the integer-cast of Quality of Sleep,
        and its associated recommendation must align: (a) qos = CAST(`Quality of Sleep`
        AS INT); (b) If qos <= 6 then recommendations contains the sleep hygiene phrase,
        else it does not. Deequ examples: .satisfies("qos = CAST(`Quality of Sleep`
        AS INT)", "qos_cast_match") and .satisfies("CASE WHEN qos <= 6 THEN instr(recommendations,
        ''Optimize sleep hygiene'') > 0 ELSE instr(recommendations, ''Optimize sleep
        hygiene'') = 0 END", "qos_rec_alignment")'
      sources:
      - start_line: 85
        end_line: 86
        file: ''
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: 638b463f-5063-4ea5-a440-4463bcc2ca53
    - text: "Sleep Duration must align with corresponding recommendation phrases:\
        \ (a) If Sleep Duration < 6.0, recommendations contains \"Target 7\u20139\
        \ hours nightly; add a 15\u201330 min wind-down before bed.\" (b) If Sleep\
        \ Duration > 9.0, recommendations contains \"Keep time-in-bed under 9 hours;\
        \ maintain a consistent wake time.\" (c) Otherwise, neither of these two phrases\
        \ should appear. Deequ example: two CASE-based .satisfies constraints on instr(recommendations,\
        \ ...)."
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: 85a01d2e-295a-4a8a-a138-86e18a7f7dde
    - text: 'If lower(BMI Category) IN (''overweight'',''obese''), recommendations
        must contain "Pair sleep regularity with nutrition planning to support weight
        management." Otherwise, that phrase should be absent. Deequ example: .satisfies("CASE
        WHEN lower(`BMI Category`) IN (''overweight'',''obese'') THEN instr(recommendations,
        ''Pair sleep regularity with nutrition'') > 0 ELSE instr(recommendations,
        ''Pair sleep regularity with nutrition'') = 0 END", "bmi_rec_alignment")'
      sources:
