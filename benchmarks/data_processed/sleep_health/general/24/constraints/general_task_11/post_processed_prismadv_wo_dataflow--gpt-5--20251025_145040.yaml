  '["Sleep Duration","recommendations"]':
    code: []
    assumptions:
    - text: "For all rows: if Sleep Duration < 6.0 then recommendations must contain\
        \ the substring 'Target 7\u20139 hours nightly; add a 15\u201330 min wind-down\
        \ before bed.', and if Sleep Duration > 9.0 then recommendations must contain\
        \ 'Keep time-in-bed under 9 hours; maintain a consistent wake time.'. (Deequ-style:\
        \ conditional contains checks on 'recommendations' under the corresponding\
        \ Sleep Duration predicates.)"
      sources:
      - start_line: 25
        end_line: 31
        file: ''
      uid: 9f3c3651-bedb-4d17-9ff8-1810c042cf1b
    - text: 'The helper column ''qos'' must equal int(cast(''Quality of Sleep'')),
        and whenever qos <= 6 the recommendations must contain ''Optimize sleep hygiene:
        dim lights, avoid screens 60 min pre-bed, keep bedroom cool and dark.''. (Two
        constraints: equality between columns ''qos'' and int(''Quality of Sleep''),
        and a conditional contains check on recommendations when qos <= 6.)'
      sources:
      - start_line: 85
        end_line: 87
        file: ''
      - start_line: 34
        end_line: 35
        file: ''
      uid: eb4637b3-b32a-47d6-a77e-4d045479d329
    - text: If Stress Level >= 7, recommendations must contain 'Practice 10 minutes
        of breathing or body-scan each evening; consider CBT-I techniques.'.
      sources:
      - start_line: 38
        end_line: 39
        file: ''
      uid: 0610bb8c-7d43-4a67-a8f5-a6f8b278418d
    - text: "If Physical Activity Level < 60, recommendations must contain 'Add 2000\u2013\
        3000 steps/day via 3x10-min brisk walks.'; if Physical Activity Level >= 90,\
        \ recommendations must contain 'Maintain vigorous activity days with >9000\
        \ steps and 1\u20132 easy recovery days.'."
      sources:
      - start_line: 42
        end_line: 45
        file: ''
      uid: f64b1306-a7be-4336-ba4a-2396911b004c
    - text: If BMI Category is 'overweight' or 'obese' (case-insensitive), recommendations
        must contain 'Pair sleep regularity with nutrition planning to support weight
        management.'.
      sources:
      - start_line: 48
        end_line: 49
        file: ''
      uid: 851d5765-28c1-4366-8e2e-14f058dac258
    - text: 'If Systolic >= 140 or Diastolic >= 90, recommendations must contain ''Discuss
        blood pressure with your clinician; consider home BP monitoring.''. The converse
        also holds: if recommendations contain that substring, at least one of Systolic
        >= 140 or Diastolic >= 90 must be true.'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      uid: ecc2a30e-c7bc-40ed-a793-55f06137678b
    - text: 'If risk_score >= 70, recommendations must contain ''Consider a sleep
        study to evaluate for apnea; use snore/SpO2 tracking if available.''. The
        converse also holds: if recommendations contain that substring then risk_score
        >= 70.'
      sources:
      - start_line: 54
        end_line: 55
        file: ''
      uid: 5be9dce5-7a69-41ba-9ca3-83bb8f025f82
    - text: 'The ''Blood Pressure'' string must be parseable as ''Systolic/Diastolic''
        with both parts numeric; and the parsed integers must equal the Systolic and
        Diastolic columns respectively. (Constraint example: Blood Pressure matches
        the regex ^\d{2,3}/\d{2,3}$ and cast(split(Blood Pressure,''/'')[0]) == Systolic
        and cast(split(Blood Pressure,''/'')[1]) == Diastolic.)'
      sources:
      - start_line: 90
        end_line: 97
        file: ''
      uid: a8084cd8-2bd0-46e3-85e0-d9977b6530db
    - text: 'risk_band must be consistent with risk_score as: [0.0, 33.3] -> ''Low'';
        (33.3, 66.6] -> ''Moderate''; (66.6, 100.0] -> ''High''. (Two-way consistency:
        risk_band value implies the corresponding numeric interval for risk_score
        and vice versa.)'
      sources:
      - start_line: 145
        end_line: 151
        file: ''
      uid: a7161fec-cf03-4914-bef7-9fcb4667d043
    - text: Given the BP risk mapping and weights, if Systolic > 180 or Diastolic
        > 120 (hypertensive crisis), then risk_score >= 25.0; if (140 <= Systolic
        <= 180) or (90 <= Diastolic <= 120) (stage 2), then risk_score >= 20.0. (These
        are lower bounds because other risk components are non-negative.)
