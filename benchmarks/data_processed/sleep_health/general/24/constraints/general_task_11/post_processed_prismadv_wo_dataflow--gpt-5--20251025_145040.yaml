    - text: 'For modeling consistency, Physical Activity Level and Daily Steps must
        be jointly present (non-null) on all rows used to fit the linear model; at
        least two rows must satisfy this. Deequ examples: .hasSize(_ >= 2) and .satisfies("`Physical
        Activity Level` IS NOT NULL AND `Daily Steps` IS NOT NULL", "activity_steps_completeness")'
