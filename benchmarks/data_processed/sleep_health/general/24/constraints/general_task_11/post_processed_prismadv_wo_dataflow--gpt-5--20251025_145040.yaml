    - text: 'Physical activity and steps should align: ''Physical Activity Level''
        and ''Daily Steps'' must exhibit a positive relationship. Enforce, for example,
        Pearson correlation >= 0.1, and for high activity days (Physical Activity
        Level >= 90), steps should generally be high (e.g., Daily Steps >= 9000).
        Example constraints: hasCorrelation(''Physical Activity Level'',''Daily Steps'',
        _ >= 0.1); satisfies("(`Physical Activity Level` < 90) OR (`Daily Steps` >=
        9000)", ''pal90_min_steps'').'
