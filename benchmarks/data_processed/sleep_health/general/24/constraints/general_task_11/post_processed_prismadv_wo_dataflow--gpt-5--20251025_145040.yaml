    - text: 'risk_score and risk_band must be consistent: risk_score must be within
        [0, 100], and risk_band must be the binning of risk_score as Low for [0,33.3],
        Moderate for (33.3,66.6], and High for (66.6,100]. Example constraints: satisfies("`risk_score`
        >= 0 AND `risk_score` <= 100", ''risk_score_bounds''); satisfies("CASE WHEN
        `risk_score` <= 33.3 THEN `risk_band` = ''Low'' WHEN `risk_score` <= 66.6
        THEN `risk_band` = ''Moderate'' ELSE `risk_band` = ''High'' END", ''risk_band_consistency'').'
