        end_line: 49
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: d770b224-3f5f-4882-96a4-1012169255e0
    - text: 'If risk_score >= 70, recommendations must contain "Consider a sleep study
        to evaluate for apnea; use snore/SpO2 tracking if available." If risk_score
        < 70, that phrase must be absent. Deequ example: .satisfies("CASE WHEN risk_score
        >= 70 THEN instr(recommendations, ''Consider a sleep study'') > 0 ELSE instr(recommendations,
        ''Consider a sleep study'') = 0 END", "highrisk_rec_alignment")'
