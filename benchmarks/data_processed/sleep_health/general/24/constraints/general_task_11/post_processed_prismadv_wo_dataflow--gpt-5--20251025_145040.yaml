    assumptions:
    - text: 'Blood pressure must be consistently represented across columns: ''Blood
        Pressure'' must be of the form ''NN/NN'' or ''NNN/NN'' etc., and its parsed
        parts must equal the numeric ''Systolic'' and ''Diastolic'' columns. Additionally,
        ''Systolic'' must be greater than or equal to ''Diastolic''. Example constraints:
        hasPattern(''Blood Pressure'',''^[0-9]{2,3}/[0-9]{2,3}$''); satisfies("cast(split(`Blood
        Pressure`,''/'')[0] as int) = `Systolic` AND cast(split(`Blood Pressure`,''/'')[1]
        as int) = `Diastolic`", ''bp_matches_parts''); satisfies("`Systolic` >= `Diastolic`",
        ''systolic_ge_diastolic''); isComplete([''Blood Pressure'',''Systolic'',''Diastolic'']).'
