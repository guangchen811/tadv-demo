    - text: 'Blood pressure fields are consistent across columns: the ''Blood Pressure''
        string must equal the concatenation of the parsed numeric parts ''Systolic''
        and ''Diastolic'' (i.e., ''Blood Pressure'' == f"{Systolic}/{Diastolic}").
        Both ''Systolic'' and ''Diastolic'' must be non-null integers for every row
        to avoid failures in int casting and to ensure correct risk and recommendation
        logic. Example constraint: .satisfies("Systolic IS NOT NULL AND Diastolic
        IS NOT NULL AND concat(Systolic, ''/'', Diastolic) = `Blood Pressure`", "bp_fields_consistent")'
