      uid: 7db314be-2936-4e63-b43e-cc55f5291fbb
    - text: 'risk_band must be consistent with risk_score bins used for pd.cut: risk_score
        <= 33.3 => ''Low''; 33.3 < risk_score <= 66.6 => ''Moderate''; 66.6 < risk_score
        <= 100.0 => ''High''. Deequ example: .satisfies("CASE WHEN risk_score <= 33.3
        THEN risk_band = ''Low'' WHEN risk_score <= 66.6 THEN risk_band = ''Moderate''
        ELSE risk_band = ''High'' END", "risk_band_consistency")'
