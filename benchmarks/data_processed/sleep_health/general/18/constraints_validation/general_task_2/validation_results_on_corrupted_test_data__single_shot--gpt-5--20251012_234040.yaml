results:
  Age:
    code:
    - suggestion: '.hasMax(''Age'', lambda v: v <= 120)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Age'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .hasPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) > cast(split(`Blood
        Pressure`, ''/'')[1] as int)", ''bp_sys_gt_dia'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) BETWEEN
        80 AND 200", ''bp_systolic_range'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(split(`Blood Pressure`, ''/'')[1] as int) BETWEEN
        50 AND 120", ''bp_diastolic_range'', lambda v: v >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.hasMax(''Daily Steps'', lambda v: v <= 50000)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Daily Steps'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Gender', ['Male', 'Female'])
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: '.hasMax(''Heart Rate'', lambda v: v <= 220)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Heart Rate'', lambda v: v >= 40)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
  Occupation:
    code:
    - suggestion: .isComplete('Occupation')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Occupation', ['Nurse', 'Software Engineer', 'Sales
        Representative', 'Engineer', 'Lawyer', 'Teacher', 'Accountant', 'Salesperson',
        'Scientist', 'Doctor'])
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn(''Occupation'', [''Nurse'', ''Software
        Engineer'', ''Sales Representative'', ''Engineer'', ''Lawyer'', ''Teacher'',
        ''Accountant'', ''Salesperson'', ''Scientist'', ''Doctor''])'' failed on data
        sample: Value: 0.9933333333333333 does not meet the constraint requirement!'
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Physical Activity Level:
    code:
    - suggestion: '.hasMax(''Physical Activity Level'', lambda v: v <= 100)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Physical Activity Level'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.hasMax(''Quality of Sleep'', lambda v: v <= 10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Quality of Sleep'', lambda v: v >= 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda v: v >= 0.40)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.hasMax(''Sleep Duration'', lambda v: v <= 24.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Sleep Duration'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: '.hasMax(''Stress Level'', lambda v: v <= 10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Stress Level'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
