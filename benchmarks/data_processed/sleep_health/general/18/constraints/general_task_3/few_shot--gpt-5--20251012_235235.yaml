constraints:
  Age:
    code:
    - - '.hasMax(''Age'', lambda x: x <= 120)'
      - Valid
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .containsPattern('Blood Pressure', '^\d{2,3}/\d{2,3}$')
      - Invalid
    - - .isComplete('Blood Pressure')
      - Valid
    - - .satisfies("cast(split(`Blood Pressure`, '/')[0] as int) BETWEEN 90 AND 200
        AND cast(split(`Blood Pressure`, '/')[1] as int) BETWEEN 50 AND 120 AND cast(split(`Blood
        Pressure`, '/')[0] as int) > cast(split(`Blood Pressure`, '/')[1] as int)",
        'bp_range_and_order')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Heart Rate:
    code:
    - - '.hasMax(''Heart Rate'', lambda x: x <= 220)'
      - Valid
    - - .isComplete('Heart Rate')
      - Valid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - '.hasMax(''Physical Activity Level'', lambda x: x <= 100)'
      - Valid
    - - '.hasMin(''Physical Activity Level'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.hasMax(''Quality of Sleep'', lambda x: x <= 9)'
      - Valid
    - - '.hasMin(''Quality of Sleep'', lambda x: x >= 3)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - .satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Sleep Apnea','Insomnia')",
        'valid_sleep_disorder')
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - '.hasMax(''Sleep Duration'', lambda x: x <= 24)'
      - Valid
    - - '.hasMin(''Sleep Duration'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - '.hasMax(''Stress Level'', lambda x: x <= 10)'
      - Valid
    - - '.hasMin(''Stress Level'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
