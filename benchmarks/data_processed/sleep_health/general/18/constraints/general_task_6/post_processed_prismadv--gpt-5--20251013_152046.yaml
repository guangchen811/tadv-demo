      source_assumptions:
      - 1cab4adb-dd4c-40b3-82c2-94246a5205a5
    - suggestion: '.satisfies("CAST(trim(split(`Blood Pressure`, ''/'')[0]) AS INT)
        BETWEEN 70 AND 260 AND CAST(trim(split(`Blood Pressure`, ''/'')[1]) AS INT)
        BETWEEN 40 AND 160", ''BP plausible adult range'', lambda r: r == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 77951a67-c636-4f88-a69a-f0ef86ca78a0
      source_assumptions:
      - 92d83bf4-b4b7-48f0-8590-20844e6d6076
    assumptions:
    - text: 'The ''Blood Pressure'' column must be present (non-null) for every record,
        because the code splits and casts every value without any null handling. We
        could represent this as a Deequ constraint like: .hasCompleteness(''Blood
        Pressure'', lambda r: r == 1.0) or .satisfies(''`Blood Pressure` IS NOT NULL'',
        ''BP not null'', lambda r: r == 1.0).'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: f1176b70-c94c-4f3e-b770-eca0622de013
    - text: 'Every ''Blood Pressure'' value must match the exact format ''systolic/diastolic''
        with exactly one slash and only digits (optional whitespace around the slash);
        no units (e.g., ''mmHg'') or extra characters. This ensures split(''/'') yields
        exactly two numeric tokens and both .astype(int) calls succeed. Example Deequ
        constraint: .satisfies(''`Blood Pressure` RLIKE "^\\s*\\d+\\s*/\\s*\\d+\\s*$"'',
        ''BP format'', lambda r: r == 1.0).'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: 1cab4adb-dd4c-40b3-82c2-94246a5205a5
    - text: 'The values are in mmHg and within plausible adult ranges so that risk
        staging using the 120/130/140 (systolic) and 80/90 (diastolic) cutoffs is
        meaningful. For all rows: CAST(split(`Blood Pressure`, ''/'')[0] AS INT) BETWEEN
        70 AND 260 AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT) BETWEEN 40 AND
        160. Example Deequ constraint: .satisfies(''CAST(split(`Blood Pressure`, "/")[0]
        AS INT) BETWEEN 70 AND 260 AND CAST(split(`Blood Pressure`, "/")[1] AS INT)
        BETWEEN 40 AND 160'', ''BP plausible range'', lambda r: r == 1.0).'
      sources:
      - start_line: 17
        end_line: 18
        file: ''
      - start_line: 34
        end_line: 39
        file: ''
      uid: 92d83bf4-b4b7-48f0-8590-20844e6d6076
