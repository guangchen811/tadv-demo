  '["Blood Pressure","Quality of Sleep","Sleep Duration","Stress Level"]':
    code: []
    assumptions:
    - text: 'The ''Blood Pressure'' field must split into exactly two integer parts
        ''bp_systolic'' and ''bp_diastolic'' (format like ''120/80''), and after parsing
        we assume bp_systolic >= bp_diastolic for all records. This can be validated
        with a compliance constraint such as: pattern match on ''Blood Pressure''
        plus compliance(''bp_systolic_ge_diastolic'', ''bp_systolic >= bp_diastolic'').'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: d6b99d89-ef82-4369-8d84-d1b5cec82e5f
    - text: 'The ''bp_risk'' column must be a deterministic function of ''bp_systolic''
        and ''bp_diastolic'': 1.0 if (bp_systolic >= 140 OR bp_diastolic >= 90), 0.7
        if (130 <= bp_systolic <= 139 OR 80 <= bp_diastolic <= 89), 0.3 if (120 <=
        bp_systolic <= 129 AND bp_diastolic < 80), and 0.0 otherwise. This can be
        enforced via a compliance check equating ''bp_risk'' to this piecewise definition.'
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      uid: 6221fe4d-fe5e-4d81-8da3-fa8e1383a6fd
    - text: When Sleep Duration is within the recommended band (7.0 to 9.0 hours inclusive)
        and Quality of Sleep is high (>= 8), the computed 'sleep_need_index' must
        be <= 0.134 (since sleep_deficit=0 and the quality term contributes at most
        0.4*(1 - 2/3) = 0.1333...).
      sources:
      - start_line: 42
        end_line: 46
        file: ''
      uid: 89b8f0f8-26f6-4b1b-a86e-888c5e170333
    - text: When Sleep Duration is within [7.0, 9.0] and Quality of Sleep is <= 6
        (clipped to 6), the 'sleep_need_index' must equal 0.4 exactly (sleep_deficit=0
        and quality term becomes 0.4*(1 - 0) = 0.4).
      sources:
      - start_line: 42
        end_line: 46
        file: ''
      uid: f15d4fc7-4d66-482e-b685-843587c6d811
    - text: 'The ''stress_norm'' column must be a deterministic scaling of ''Stress
        Level'': stress_norm = ((Stress Level - 3)/5) clipped to [0,1]. In particular,
        Stress Level <= 3 implies stress_norm = 0 and Stress Level >= 8 implies stress_norm
        = 1.'
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      uid: ee360639-bad6-49a7-8fc3-e5dea882aa01
    - text: 'Eligibility must be True whenever any of the drivers exceed their thresholds:
        (sleep_need_index > 0.25) OR (bp_risk >= 0.3) OR (stress_norm > 0.5) => eligible
        == True. This can be encoded as a compliance constraint over these columns.'
      sources:
      - start_line: 61
        end_line: 65
        file: ''
      uid: 78f61d5e-bae5-477d-9785-8e2ab7212ad8
    - text: All rows that are ineligible must have priority_score == 0.0. (i.e., eligible
        == False => priority_score == 0.0).
      sources:
      - start_line: 76
        end_line: 76
        file: ''
      uid: ec291fd3-b6c1-4309-92aa-4043bc90b998
    - text: 'For eligible rows, priority_score must equal clip(0,1) of the weighted
        components: 0.45*sleep_need_index + 0.20*bp_risk + 0.20*stress_norm + 0.15*sedentary_index
        + disorder_boost. (For ineligible rows, priority_score must be 0.0 per a separate
        rule.) This can be checked with a compliance expression conditional on eligible
        == True.'
      sources:
      - start_line: 67
        end_line: 73
        file: ''
      - start_line: 76
        end_line: 76
        file: ''
      uid: ee4042ad-51e3-4e5d-b6a0-1f70de229392
    - text: Because 'Blood Pressure' is parsed into 'bp_systolic'/'bp_diastolic' and
        used for risk and eligibility, we assume that 'Blood Pressure' contains exactly
        one '/' and both parts are present for every record (no missing pairwise components).
        This can be represented as a completeness/pattern compliance across the trio
        ('Blood Pressure', 'bp_systolic', 'bp_diastolic').
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      - start_line: 34
        end_line: 39
        file: ''
      - start_line: 61
        end_line: 65
        file: ''
      uid: 21d21a48-91f2-49b4-a50c-8f8ad7a90d25
  '["Blood Pressure","bp_diastolic","bp_systolic"]':
    code: []
    assumptions:
    - text: 'Column ''Blood Pressure'' must be a non-null string in the format ''SYS/DIA''
        with exactly one ''/'' and both parts parseable as integers. The derived columns
        must match those parts exactly: cast(split(Blood Pressure,''/'')[0]) == bp_systolic
        and cast(split(Blood Pressure,''/'')[1]) == bp_diastolic. Example Deequ: .hasPattern(''Blood
        Pressure'', ''^[0-9]{2,3}/[0-9]{2,3}$'') and .satisfies(''cast(split(`Blood
        Pressure`, "/")[0] as INT) = `bp_systolic` AND cast(split(`Blood Pressure`,
        "/")[1] as INT) = `bp_diastolic`'', ''forall'').'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: 8ea171cb-3565-4f7b-a575-938d2ed7f695
    - text: 'Physiological ordering: for every record, bp_systolic should be strictly
        greater than bp_diastolic. Example Deequ: .satisfies(''`bp_systolic` > `bp_diastolic`'',
        ''forall'').'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      - start_line: 34
        end_line: 39
        file: ''
      uid: 627fc8f1-dbc0-4942-9abc-d37989695cf2
    - text: 'bp_risk is a deterministic function of bp_systolic and bp_diastolic using
        the specified thresholds: if (bp_systolic >= 140 OR bp_diastolic >= 90) then
        bp_risk = 1.0; else if ((130 <= bp_systolic <= 139) OR (80 <= bp_diastolic
        <= 89)) then bp_risk = 0.7; else if ((120 <= bp_systolic <= 129) AND (bp_diastolic
        < 80)) then bp_risk = 0.3; else bp_risk = 0.0. Example Deequ: .satisfies(''`bp_risk`
        = CASE WHEN (`bp_systolic` >= 140 OR `bp_diastolic` >= 90) THEN 1.0 WHEN ((`bp_systolic`
        BETWEEN 130 AND 139) OR (`bp_diastolic` BETWEEN 80 AND 89)) THEN 0.7 WHEN
        ((`bp_systolic` BETWEEN 120 AND 129) AND (`bp_diastolic` < 80)) THEN 0.3 ELSE
        0.0 END'', ''forall'').'
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      uid: 920b15af-16ad-4c9c-81a5-db7b0450d393
    - text: 'The eligibility flag is fully determined by three features: eligible
        == ((sleep_need_index > 0.25) OR (bp_risk >= 0.3) OR (stress_norm > 0.5)).
        Example Deequ: .satisfies(''`eligible` = ((`sleep_need_index` > 0.25) OR (`bp_risk`
        >= 0.3) OR (`stress_norm` > 0.5))'', ''forall'').'
      sources:
      - start_line: 61
        end_line: 65
        file: ''
      uid: 7e0dad61-919c-4c6c-9e94-1142f0d4bdf1
    - text: 'For all ineligible records, priority_score must be exactly 0.0. Example
        Deequ: .satisfies(''CASE WHEN NOT `eligible` THEN `priority_score` = 0.0 ELSE
        TRUE END'', ''forall'').'
      sources:
      - start_line: 61
        end_line: 65
        file: ''
      - start_line: 76
        end_line: 76
        file: ''
      uid: 4fdb8d99-7de9-467e-938d-36342d644f2d
    - text: 'For eligible records, priority_score must equal the clipped weighted
        sum of component indices plus disorder_boost: priority_score == clip(0.45*sleep_need_index
        + 0.20*bp_risk + 0.20*stress_norm + 0.15*sedentary_index + disorder_boost,
        0, 1). To account for floating point error, validate within a small epsilon.
        Example Deequ: .satisfies(''CASE WHEN `eligible` THEN abs(`priority_score`
        - least(1.0, greatest(0.0, 0.45*`sleep_need_index` + 0.20*`bp_risk` + 0.20*`stress_norm`
        + 0.15*`sedentary_index` + `disorder_boost`))) < 1e-6 ELSE TRUE END'', ''forall'').'
      sources:
      - start_line: 67
        end_line: 73
        file: ''
      - start_line: 76
        end_line: 76
        file: ''
      uid: a3542ff4-26c9-44ec-bcd0-0fe5517b5962
