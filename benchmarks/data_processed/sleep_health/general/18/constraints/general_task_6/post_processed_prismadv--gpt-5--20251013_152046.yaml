    - suggestion: '.satisfies(''(0.5 * log1p(`Daily Steps`) / log(50001) + 0.5 * (`Physical
        Activity Level` / 100.0)) >= 0 AND (0.5 * log1p(`Daily Steps`) / log(50001)
        + 0.5 * (`Physical Activity Level` / 100.0)) <= 1'', ''normalized_activity_in_0_1'',
