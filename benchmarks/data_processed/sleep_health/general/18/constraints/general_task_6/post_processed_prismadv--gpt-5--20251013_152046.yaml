    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (lower(trim(`Sleep Disorder`))
        IN (''sleep apnea'', ''insomnia''))", "Sleep Disorder allowed set", lambda
        x: x == 1)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 46c3b454-c4f1-40de-9872-1fc1b9a1374b
      source_assumptions:
      - c6db42a2-01b8-477f-9c05-37fb403b02ca
    assumptions:
    - text: 'The input must include the ''Sleep Disorder'' column. If it is missing,
        computing disorder_flag and disorder_boost will fail. This can be represented
        as a schema check, e.g., Deequ: .hasColumn(''Sleep Disorder'') or Great Expectations:
        expect_table_columns_to_contain_set([''Sleep Disorder'']).'
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      uid: 9ed046f3-ec29-4abd-ab2f-243b51f20111
    - text: 'Nullability and encoding semantics: Any non-null value in ''Sleep Disorder''
        is treated as indicating a disorder (and adds a boost). Therefore, ''no disorder''
        must be encoded as NULL, not as placeholder strings/tokens. The column may
        contain nulls, but non-null values must not be in {'''', ''none'', ''no'',
        ''false'', ''0'', ''unknown'', ''n/a'', ''na''} after trimming and lowercasing.
        Example Deequ constraint: .satisfies("CASE WHEN `Sleep Disorder` IS NULL THEN
        1 WHEN lower(trim(`Sleep Disorder`)) IN ('''', ''none'',''no'',''false'',''0'',''unknown'',''n/a'',''na'')
        THEN 0 ELSE 1 END", "Valid disorder encoding", lambda x: x == 1). In Great
        Expectations: expect_column_values_to_not_be_in_set with the above set (mostly=1.0)
        and ignore nulls, after trimming/lowering.'
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 171d4c7b-2afd-4d45-a01d-600144bb6f19
    - text: 'Allowed values when present: When ''Sleep Disorder'' is not null, it
        should be one of the known categories {''Sleep Apnea'', ''Insomnia''} (case-insensitive),
        to avoid counting unrelated strings as a disorder. Example Deequ constraint:
        .satisfies("CASE WHEN `Sleep Disorder` IS NULL THEN 1 WHEN lower(trim(`Sleep
        Disorder`)) IN (''sleep apnea'',''insomnia'') THEN 1 ELSE 0 END", "Sleep Disorder
        allowed set", lambda x: x == 1). In Great Expectations: expect_column_values_to_be_in_set([''Sleep
        Apnea'',''Insomnia''], mostly=1.0) with ignore nulls and case/whitespace normalization.'
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      uid: c6db42a2-01b8-477f-9c05-37fb403b02ca
