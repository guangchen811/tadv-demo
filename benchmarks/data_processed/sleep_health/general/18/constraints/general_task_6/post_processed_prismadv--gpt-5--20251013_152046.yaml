    assumptions:
    - text: The 'Quality of Sleep' column must be present and non-null for all rows.
        It is used directly in arithmetic and normalization without any null-imputation;
        nulls would propagate into 'sleep_need_index' and then into 'eligible' and
        'priority_score' that are written to the output. We could represent this as
        Deequ completeness('Quality of Sleep') >= 1.0 or Great Expectations expect_column_values_to_not_be_null.
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      - start_line: 61
        end_line: 76
        file: ''
      - start_line: 79
        end_line: 85
        file: ''
      uid: d465656b-dd50-4bba-b4a0-17bd90f7098f
    - text: The 'Quality of Sleep' column should be numeric (integer or float) so
        that clip and arithmetic operations succeed. We could represent this as Great
        Expectations expect_column_values_to_be_in_type_list with types like ['int64','int32','float64','float32'],
        or as Deequ hasDataType('Quality of Sleep', ConstrainableDataTypes.Integral)
        OR hasDataType('Quality of Sleep', ConstrainableDataTypes.Fractional).
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      uid: ee41a84e-1f8e-472a-b2cc-607c7b10c1dc
    - text: 'At least 95% of ''Quality of Sleep'' values should fall within the range
        [6, 9] to avoid heavy clipping and distortion of the normalized score used
        in ''sleep_need_index'' and eligibility/prioritization. We could represent
        this as a Deequ proportion constraint: .satisfies("CASE WHEN `Quality of Sleep`
        BETWEEN 6 AND 9 THEN 1 ELSE 0 END", "QoS in [6,9]", lambda x: x >= 0.95).'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      - start_line: 61
        end_line: 72
        file: ''
      - start_line: 79
        end_line: 82
        file: ''
      uid: a4f4ae9a-7ee3-448d-a617-54ca19e4db00
    - text: 'The ''Quality of Sleep'' values should be integer-like (no fractional
        part) for at least 95% of rows, consistent with the dataset profile and the
        typical discrete sleep-quality scale. We could represent this as a Deequ proportion
        constraint: .satisfies("CASE WHEN `Quality of Sleep` = floor(`Quality of Sleep`)
        THEN 1 ELSE 0 END", "QoS integer-like", lambda x: x >= 0.95).'
      sources:
      - start_line: 45
        end_line: 45
        file: ''
      uid: f3919756-82e6-49c9-96bc-141f37497607
