      source_assumptions:
      - d3430f86-7926-4c03-b7cb-b8bc5f3c948f
    assumptions:
    - text: 'Every row must have both ''Physical Activity Level'' and ''Daily Steps''
        present (non-null), because they are used together for correlation and to
        compute the sedentary_index. Deequ example: check.satisfies(''`Physical Activity
        Level` IS NOT NULL AND `Daily Steps` IS NOT NULL'', ''pal_steps_nonnull'').hasCompliance(''pal_steps_nonnull'',
        _ == 1.0)'
      sources:
      - start_line: 23
        end_line: 31
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: 45ebd4cd-c5c5-4d8a-803e-71e99258ad1a
    - text: 'For all rows, ''Physical Activity Level'' must be within [0, 100] and
        ''Daily Steps'' within [0, 50000] simultaneously, to ensure the log and normalization
        are well-defined and bounded. Deequ example: check.satisfies(''`Physical Activity
        Level` BETWEEN 0 AND 100 AND `Daily Steps` BETWEEN 0 AND 50000'', ''pal_steps_valid_range'').hasCompliance(''pal_steps_valid_range'',
        _ == 1.0)'
      sources:
      - start_line: 26
        end_line: 26
        file: ''
      - start_line: 29
        end_line: 29
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: 65ea5ab4-0c8b-4910-addd-39af387e4a25
    - text: 'There must be enough co-present pairs of ''Physical Activity Level''
        and ''Daily Steps'' to compute a correlation (at least 2 rows where both are
        non-null). Deequ example: check.hasSize(_ >= 2, where = ''`Physical Activity
        Level` IS NOT NULL AND `Daily Steps` IS NOT NULL'')'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      uid: 17fda10b-8f72-4446-82af-e09623420909
    - text: 'The relationship between ''Physical Activity Level'' and ''Daily Steps''
        should be non-negative (Spearman correlation >= 0) over rows where both are
        present, reflecting that both measure activity in the same direction. Deequ
        example: check.hasCorrelation(''Physical Activity Level'', ''Daily Steps'',
        _ >= 0.0)'
      sources:
      - start_line: 31
        end_line: 31
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: 7de0c1c0-c5c7-44e1-8aef-89f4eba1cdfd
    - text: 'The combined normalized activity score 0.5*log1p(Daily Steps)/log(50001)
        + 0.5*(Physical Activity Level/100) should lie within [0, 1] for all rows
        (so sedentariness = 1 - that average stays in [0,1] without relying on clipping).
        Deequ example: check.satisfies(''0 <= 0.5 * log1p(`Daily Steps`) / log(50001)
        + 0.5 * (`Physical Activity Level` / 100) AND 0.5 * log1p(`Daily Steps`) /
        log(50001) + 0.5 * (`Physical Activity Level` / 100) <= 1'', ''normalized_activity_in_0_1'').hasCompliance(''normalized_activity_in_0_1'',
        _ == 1.0)'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      uid: 9f5a6d28-251b-4bdd-88e3-c09f69edbf29
    - text: 'Eligibility-priority coupling: If ''eligible'' is false, then ''priority_score''
        must be exactly 0.0. Deequ example: check.satisfies(''NOT `eligible` => `priority_score`
        = 0.0'', ''ineligible_priority_zero'').hasCompliance(''ineligible_priority_zero'',
        _ == 1.0)'
      sources:
      - start_line: 60
        end_line: 73
        file: ''
      - start_line: 76
        end_line: 76
        file: ''
      uid: d3430f86-7926-4c03-b7cb-b8bc5f3c948f
  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: "Sleep Duration must be strictly between 2.99 and 14.01 so that both derived\
        \ features sleep_log_edge = log(Sleep Duration \u2212 2.99) and sleep_upper_headroom\
        \ = sqrt(14.01 \u2212 Sleep Duration) are real-valued (finite, not NaN/Inf)\
        \ for every row. We could represent this assumption as a deequ constraint\
        \ like this: .satisfies('(`Sleep Duration` > 2.99) AND (`Sleep Duration` <\
        \ 14.01)', 'sleep_duration_domain')"
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      uid: a4dfb3f4-37c7-4777-b9aa-94156630e82c
    - text: 'The pair (Sleep Duration, Quality of Sleep) functionally determines sleep_need_index
        via the implemented business rule: sleep_need_index = clip(0.6 * min(((CASE
        WHEN `Sleep Duration` < 7.0 THEN 7.0 - `Sleep Duration` WHEN `Sleep Duration`
        > 9.0 THEN `Sleep Duration` - 9.0 ELSE 0.0 END) / 4.0), 1.0) + 0.4 * (1.0
        - ((clip(`Quality of Sleep`, 6, 9) - 6) / 3.0)), 0.0, 1.0). We could represent
        this assumption as a deequ constraint like this: .satisfies(''`sleep_need_index`
        = least(greatest(0.6 * least(((CASE WHEN `Sleep Duration` < 7.0 THEN 7.0 -
        `Sleep Duration` WHEN `Sleep Duration` > 9.0 THEN `Sleep Duration` - 9.0 ELSE
        0.0 END) / 4.0), 1.0) + 0.4 * (1.0 - least(greatest((least(greatest(`Quality
        of Sleep`, 6), 9) - 6) / 3.0, 0.0), 1.0)), 0.0), 1.0)'', ''sleep_need_index_deterministic'')'
      sources:
      - start_line: 42
        end_line: 46
        file: ''
      uid: 40341cfb-fd10-42ef-97f7-498bb9aea057
    - text: "For rows where Sleep Duration is within the recommended band (7.0 \u2264\
        \ Sleep Duration \u2264 9.0), the sleep deficit term is zero and sleep_need_index\
        \ depends only on Quality of Sleep: sleep_need_index = 0.4 * (1.0 \u2212 ((clip(`Quality\
        \ of Sleep`, 6, 9) \u2212 6) / 3.0)). We could represent this assumption as\
        \ a deequ constraint like this: .satisfies('(`Sleep Duration` < 7.0 OR `Sleep\
        \ Duration` > 9.0) OR (`sleep_need_index` = 0.4 * (1.0 - ((least(greatest(`Quality\
        \ of Sleep`, 6), 9) - 6) / 3.0)))', 'sni_no_deficit_depends_only_on_qos')"
      sources:
      - start_line: 42
        end_line: 46
        file: ''
      uid: eb1020a7-8093-44bc-8f5d-69a455641cb0
    - text: 'If sleep_need_index exceeds 0.25 then eligible must be true (sleep_need_index
        alone is sufficient for eligibility even if other risk factors are low). We
        could represent this assumption as a deequ constraint like this: .satisfies(''(`sleep_need_index`
        <= 0.25) OR (`eligible` = true)'', ''sni_threshold_implies_eligibility'')'
      sources:
      - start_line: 61
        end_line: 65
        file: ''
      uid: 6e794cef-31ed-4d1e-b65e-07b2dcf9c976
    - text: 'Priority score must be consistent with eligibility and its component
        signals: (a) For ineligible rows, priority_score = 0.0 exactly; (b) For eligible
        rows, priority_score = clip(0.45*sleep_need_index + 0.20*bp_risk + 0.20*stress_norm
        + 0.15*sedentary_index + disorder_boost, 0, 1). We could represent these assumptions
