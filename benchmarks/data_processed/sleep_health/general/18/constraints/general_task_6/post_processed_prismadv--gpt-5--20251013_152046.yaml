        = least(greatest(0.45*`sleep_need_index` + 0.20*`bp_risk` + 0.20*`stress_norm`
        + 0.15*`sedentary_index` + `disorder_boost`, 0.0), 1.0))'', ''priority_formula_when_eligible'')
        AND .satisfies(''(`eligible` = true) OR (`priority_score` = 0.0)'', ''priority_zero_when_ineligible'')'
