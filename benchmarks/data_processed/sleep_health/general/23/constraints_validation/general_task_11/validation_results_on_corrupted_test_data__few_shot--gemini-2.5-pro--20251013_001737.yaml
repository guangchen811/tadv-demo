results:
  Age:
    code:
    - suggestion: .isNonNegative('Age')
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .compliesWithPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      status: false
      reason_if_failed: 'Unable to instantiate constraint ''.compliesWithPattern(''Blood
        Pressure'', r''^\d{2,3}/\d{2,3}$'')'': ''Check'' object has no attribute ''compliesWithPattern'''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''Blood Pressure'')'' failed on
        data sample: Value: 0.9933333333333333 does not meet the constraint requirement!'
      level: error
  Person ID:
    code:
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
