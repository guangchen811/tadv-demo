        Level` <= 100)", "pa_level_in_0_100", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Physical Activity Level", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies(''`Quality of Sleep` BETWEEN 0 AND 10'', ''Quality of
        Sleep in valid range [0,10]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Quality of Sleep` AS INT) = `Quality of Sleep`'',
