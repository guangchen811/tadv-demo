results:
  Physical Activity Level:
    code:
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda x: x
        > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative(''`Physical Activity Level`'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete("Quality of Sleep")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin("Quality of Sleep", lambda x: x >= 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax("Quality of Sleep", lambda x: x <= 10)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.isContainedIn("BMI Category", ["Overweight", "Obese", "Normal",
        "Normal Weight"], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', r''^\d+/\d+$'', lambda x: x ==
        1.0)'
      status: false
      reason_if_failed: 'Constraint ''hasPattern(''Blood Pressure'', r''^\d+/\d+$'',
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9733333333333334 does
        not meet the constraint requirement!'
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative(''`Sleep Duration`'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` <= 24", "Sleep Duration max 24 hours",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness("Daily Steps", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin("Daily Steps", lambda x: x >= 0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IN (''Insomnia'', ''Sleep
        Apnea'') OR `Sleep Disorder` IS NULL THEN 1 ELSE 0 END", "Expected Sleep Disorder
        Values or Null", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` = ''Insomnia''", "Presence of Insomnia
        records", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` = ''Sleep Apnea''", "Presence of Sleep
        Apnea records", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete("Stress Level")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin("Stress Level", lambda x: x >= 3)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax("Stress Level", lambda x: x <= 8)'
      status: true
      reason_if_failed: ''
      level: error
  '["BMI Category","Diastolic","Quality of Sleep","Sleep Duration","Systolic"]':
    code:
    - suggestion: '.satisfies("`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10",
        "QualityOfSleepRange", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Blood Pressure","Diastolic","Systolic"]':
    code:
    - suggestion: '.satisfies("`Blood Pressure` IS NOT NULL AND INSTR(`Blood Pressure`,
        ''/'') > 0 AND LENGTH(`Blood Pressure`) - LENGTH(REPLACE(`Blood Pressure`,
        ''/'', '''')) = 1 AND TRY_CAST(SUBSTRING(`Blood Pressure`, 1, INSTR(`Blood
        Pressure`, ''/'') - 1) AS INT) IS NOT NULL AND TRY_CAST(SUBSTRING(`Blood Pressure`,
        INSTR(`Blood Pressure`, ''/'') + 1) AS INT) IS NOT NULL", "Blood Pressure
        Format Validation", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("`Blood Pressure` IS NOT NULL AND
        INSTR(`Blood Pressure`, ''/'') > 0 AND LENGTH(`Blood Pressure`) - LENGTH(REPLACE(`Blood
        Pressure`, ''/'', '''')) = 1 AND TRY_CAST(SUBSTRING(`Blood Pressure`, 1, INSTR(`Blood
        Pressure`, ''/'') - 1) AS INT) IS NOT NULL AND TRY_CAST(SUBSTRING(`Blood Pressure`,
        INSTR(`Blood Pressure`, ''/'') + 1) AS INT) IS NOT NULL", "Blood Pressure
        Format Validation", lambda x: x == 1.0)'' failed on data sample: Value: 0.9733333333333334
        does not meet the constraint requirement!'
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation("Physical Activity Level", "Daily Steps", lambda
        x: x >= 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` > 40 THEN `Daily
        Steps` > 3000 ELSE TRUE END", "High Physical Activity Level should generally
        correspond to non-sedentary Daily Steps", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level","Quality of Sleep","Sleep Duration","Stress Level"]':
    code:
    - suggestion: '.satisfies("CAST(`Quality of Sleep` AS INT) = `Quality of Sleep`",
        "Quality of Sleep is Integral", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL", "Sleep
        Duration is Numeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL",
        "Physical Activity Level is Numeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Daily Steps` AS DOUBLE) IS NOT NULL", "Daily
        Steps is Numeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`Sleep Disorder` IN (''Insomnia'', ''Sleep Apnea''))
        OR (CAST(`Stress Level` AS INT) = `Stress Level`)", "Conditional Stress Level
        Integral Check", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Diastolic","Systolic"]':
    code:
    - suggestion: '.satisfies("`Blood Pressure` IS NOT NULL AND `Blood Pressure` RLIKE
        ''^\\d+/\\d+$''", "Blood Pressure Format Validation", lambda x: x == 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`BMI Category` IS NOT NULL AND CAST(`Quality of Sleep`
        AS INT) IS NOT NULL AND CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL", "BMI
        Category, Quality of Sleep, Sleep Duration Non-Null and Type Compatible",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10",
        "Quality of Sleep Score Range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "Sleep Duration Hours Range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Quality of Sleep` <= 6 AND `Sleep Duration` >= 7",
        "Low QOS Long Sleep Co-occurrence", lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Sleep Disorder","Stress Level"]':
    code:
    - suggestion: '.satisfies("`Sleep Disorder` = ''Sleep Apnea''", "SleepApneaCategoryExists",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
