results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete("Physical Activity Level")
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.hasCompleteness("Quality of Sleep", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Quality of Sleep` >= 1", "Quality of Sleep must be
        >= 1", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Quality of Sleep` <= 10", "Quality of Sleep must be
        <= 10", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese'') THEN 1 ELSE 0 END", "Valid BMI Categories", assertion=lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("BMI Category", assertion=lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: false
      reason_if_failed: 'Constraint ''isComplete(''Blood Pressure'')'' failed on data
        sample: Value: 0.9933333333333333 does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasPattern(column=''Blood Pressure'', pattern=''^[^/]+/[^/]+$'',
        assertion=lambda x: x == 1.0, name=''Blood Pressure format X/Y'')'
      status: false
      reason_if_failed: 'Constraint ''hasPattern(column=''Blood Pressure'', pattern=''^[^/]+/[^/]+$'',
        assertion=lambda x: x == 1.0, name=''Blood Pressure format X/Y'')'' failed
        on data sample: Value: 0.9733333333333334 does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasPattern(column=''Blood Pressure'', pattern=''^\\d+/\\d+$'',
        assertion=lambda x: x >= 0.95, name=''Blood Pressure components are numeric'')'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', 1) AS
        DOUBLE) >= 40 AND CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', 1) AS DOUBLE)
        <= 250", "Plausible Systolic BP Range", assertion=lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', -1) AS
        DOUBLE) >= 30 AND CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', -1) AS DOUBLE)
        <= 150", "Plausible Diastolic BP Range", assertion=lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness("Sleep Duration", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 15",
        "sleep_duration_typical_range", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Sleep Apnea'', ''Insomnia''],
        assertion=lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: '.hasCompleteness(''Heart Rate'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Heart Rate` >= 40 AND `Heart Rate` <= 120", "Heart
        Rate within expected physiological range", assertion=lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete("Stress Level")
      status: true
      reason_if_failed: ''
      level: error
  '["BMI Category","Blood Pressure","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies("regexp_extract(`Blood Pressure`, ''^(\\d+(\\.\\d+)?)/(\\d+(\\.\\d+)?)$'',
        0) IS NOT NULL", "BP_Format_Check", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("regexp_extract(`Blood Pressure`,
        ''^(\\d+(\\.\\d+)?)/(\\d+(\\.\\d+)?)$'', 0) IS NOT NULL", "BP_Format_Check",
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9933333333333333 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(split(`Blood Pressure`, ''/'')[0]
        AS DOUBLE) IS NOT NULL AND TRY_CAST(split(`Blood Pressure`, ''/'')[1] AS DOUBLE)
        IS NOT NULL THEN CAST(split(`Blood Pressure`, ''/'')[0] AS DOUBLE) >= CAST(split(`Blood
        Pressure`, ''/'')[1] AS DOUBLE) ELSE TRUE END", "Systolic_GE_Diastolic", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", assertion=lambda
        x: abs(x) >= 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
