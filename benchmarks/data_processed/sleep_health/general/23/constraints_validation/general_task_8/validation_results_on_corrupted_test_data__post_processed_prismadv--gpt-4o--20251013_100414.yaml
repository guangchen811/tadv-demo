      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: '.satisfies("CASE WHEN Gender IN (''Male'', ''Female'') THEN 1 ELSE
