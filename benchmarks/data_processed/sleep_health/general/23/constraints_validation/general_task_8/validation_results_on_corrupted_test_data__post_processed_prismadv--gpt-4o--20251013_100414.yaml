results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Physical Activity Level` BETWEEN 0 AND 100', 'Valid
        Physical Activity Level Range')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .satisfies('`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10',
        'Valid Quality of Sleep Range')
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Valid Blood
        Pressure Format")
      status: false
      reason_if_failed: 'Constraint ''satisfies("`Blood Pressure` RLIKE ''^[0-9]+/[0-9]+$''",
