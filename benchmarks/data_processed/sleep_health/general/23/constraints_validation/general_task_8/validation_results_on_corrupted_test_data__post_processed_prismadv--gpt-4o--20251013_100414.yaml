        does not meet the constraint requirement!'
      level: undefined
    - suggestion: .satisfies("CAST(SPLIT(`Blood Pressure`, '/')[0] AS DOUBLE) BETWEEN
        90 AND 180 AND CAST(SPLIT(`Blood Pressure`, '/')[1] AS DOUBLE) BETWEEN 60
        AND 120", "Reasonable Blood Pressure Values")
      status: false
      reason_if_failed: 'Constraint ''satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[0]
        AS DOUBLE) BETWEEN 90 AND 180 AND CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS
        DOUBLE) BETWEEN 60 AND 120", "Reasonable Blood Pressure Values")'' failed
        on data sample: Value: 0.9733333333333334 does not meet the constraint requirement!'
      level: undefined
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'',
