      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('`Daily Steps`')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Heart Rate` >= 40 AND `Heart Rate` <= 100', 'Heart
        Rate Range')
      status: true
      reason_if_failed: ''
      level: warning
  '["Sleep Disorder","Stress Level"]':
    code:
    - suggestion: '.hasCompleteness(''Stress Level'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''Person ID'', ''Sleep Disorder''], lambda x: x
        >= 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Stress Level` >= 3 AND `Stress Level` <= 10', 'Valid
        Stress Level Range')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: '.satisfies(''`Stress Level` >= 3 AND `Stress Level` <= 10'', ''Valid
        Stress Level Range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('Age >= 0 AND Age <= 100', 'Age within valid range')
