      reason_if_failed: ''
      level: undefined
  '["Primary Sleep Disorder","Sleep Disorder"]':
    code:
    - suggestion: .satisfies("CASE WHEN `Sleep Disorder` IS NOT NULL THEN `Sleep Disorder`
