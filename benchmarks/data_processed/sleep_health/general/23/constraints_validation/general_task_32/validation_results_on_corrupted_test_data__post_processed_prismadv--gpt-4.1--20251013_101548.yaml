results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 120'', ''PAL in valid range'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9',
        'Quality of Sleep in [4, 9]')
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Blood Pressure
        format is systolic/diastolic integers")
      status: false
      reason_if_failed: 'Constraint ''satisfies("`Blood Pressure` RLIKE ''^[0-9]+/[0-9]+$''",
        "Blood Pressure format is systolic/diastolic integers")'' failed on data sample:
        Value: 0.9733333333333334 does not meet the constraint requirement!'
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies(''`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0'',
        ''Plausible Sleep Duration'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Daily Steps` AS BIGINT) = `Daily Steps`'', ''Daily
        Steps Integral'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Daily Steps` <= 15000'', ''Daily Steps Upper Bound'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: .satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Insomnia',
        'Sleep Apnea')", "Valid Sleep Disorder Values")
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Heart Rate` >= 30 AND `Heart Rate` <= 220', 'Heart
        Rate physiological range')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: '.satisfies(''CAST(`Stress Level` AS DOUBLE) IS NOT NULL'', ''Stress
        Level Numeric'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Stress Level` IN (3, 4, 5, 6, 7, 8)'', ''Valid Stress
        Level Values'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Age` AS DOUBLE) IS NOT NULL'', ''Age Numeric'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(`Age` <= 55) OR (`Age` > 55 AND `Age` <= 60) OR (`Age`
        > 60 AND `Age` <= 65) OR (`Age` > 65)'', ''Age Bins'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: .satisfies("(`BMI Category` IN ('Normal', 'Normal Weight', 'Overweight',
        'Obese')) AND (`BMI Category` IS NOT NULL)", "BMI Category valid and not null")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("(`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Insomnia',
        'Sleep Apnea'))", "Sleep Disorder allowed values or null")
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Triggers"]':
    code:
    - suggestion: .satisfies('`BMI Category` IN ("Normal", "Normal Weight", "Overweight",
        "Obese")', 'BMI Category valid values')
      status: true
      reason_if_failed: ''
      level: error
  '["Blood Pressure","diastolic","systolic"]':
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Blood Pressure
        format systolic/diastolic, both integer")
      status: false
      reason_if_failed: 'Constraint ''satisfies("`Blood Pressure` RLIKE ''^[0-9]+/[0-9]+$''",
        "Blood Pressure format systolic/diastolic, both integer")'' failed on data
        sample: Value: 0.9733333333333334 does not meet the constraint requirement!'
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: .satisfies('CAST(`Daily Steps` AS DOUBLE) IS NOT NULL AND CAST(`Physical
        Activity Level` AS DOUBLE) IS NOT NULL', 'Daily Steps and Physical Activity
        Level must be numeric')
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Triggers"]':
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Sleep Duration","Triggers"]':
    code:
    - suggestion: .satisfies('(`Sleep Duration` IS NOT NULL) AND (CAST(`Sleep Duration`
        AS DOUBLE) IS NOT NULL)', 'Sleep Duration must be present and convertible
        to float')
      status: true
      reason_if_failed: ''
      level: error
