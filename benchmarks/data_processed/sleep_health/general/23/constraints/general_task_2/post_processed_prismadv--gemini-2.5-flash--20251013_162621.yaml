    - text: 'A significant clinical relationship is assumed between ''Sleep Disorder''
        and ''BMI Category'': among all individuals diagnosed with ''Sleep Apnea'',
        at least 60% are expected to also be classified as ''Overweight'' or ''Obese''.
        This assumption is used to validate the dataset''s adherence to known medical
        patterns and ensure the logic for amplifying apnea risk with higher BMI is
        well-founded.

        We could represent this assumption as a deequ constraint like this:

        .onData(df.filter("`Sleep Disorder` = ''Sleep Apnea''"))

        .hasCompliance("`BMI Category` IN (''Overweight'', ''Obese'')", ConstraintLevel.Error,
        0.60, Some("At least 60% of Sleep Apnea cases should be Overweight or Obese"))'
