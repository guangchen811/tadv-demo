      uid: 0908d000-afd4-4e7e-9926-b6599e1d4c06
    - text: 'To ensure meaningful calculation of the `duration_component` and `stress_component`
        (which are combined into the final `risk_score`), ''Sleep Duration'' values
        are implicitly assumed to be within 3.0 and 12.0 hours, and ''Stress Level''
        values are implicitly assumed to be within 3.0 and 8.0. Values outside these
        ranges will be clipped, potentially masking extreme data points and affecting
        the interpretability of the risk score. We could represent this assumption
        as deequ constraints like this: `.hasMin("Sleep Duration", 3.0).hasMax("Sleep
        Duration", 12.0).hasMin("Stress Level", 3.0).hasMax("Stress Level", 8.0)`.'
