    - text: 'The ''Stress Level'' and ''Sleep Duration'' columns are expected to contain
        a sufficient number of non-null records (at least 2) to allow for correlation
        analysis. We could represent this assumption as a deequ constraint like this:
        `.hasCorrelation("Stress Level", "Sleep Duration", _ => _ != null)`.'
