constraints:
  Age:
    code:
    - - .hasDataType('Age', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Age')
      - Valid
    - - .satisfies('Age >= 0 AND Age <= 120', 'Age between 0 and 120')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .hasDataType('BMI Category', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .containsPattern('Blood Pressure', '^\d{2,3}/\d{2,3}$')
      - Invalid
    - - .hasDataType('Blood Pressure', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .hasDataType('Daily Steps', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    - - .satisfies('`Daily Steps` <= 50000', 'Daily Steps <= 50000')
      - Valid
    assumptions: []
  Gender:
    code:
    - - .hasDataType('Gender', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .hasDataType('Heart Rate', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Heart Rate')
      - Valid
    - - .satisfies('`Heart Rate` >= 30 AND `Heart Rate` <= 220', 'Heart rate between
        30 and 220')
      - Valid
    assumptions: []
  Occupation:
    code:
    - - .hasDataType('Occupation', ConstrainableDataTypes.String)
      - Valid
    - - .isComplete('Occupation')
      - Valid
    - - .isContainedIn('Occupation', ['Nurse', 'Software Engineer', 'Sales Representative',
        'Engineer', 'Lawyer', 'Teacher', 'Accountant', 'Salesperson', 'Scientist',
        'Doctor'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .hasDataType('Person ID', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Person ID')
      - Valid
    - - .isPositive('Person ID')
      - Invalid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .hasDataType('Physical Activity Level', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .satisfies('`Physical Activity Level` >= 0 AND `Physical Activity Level` <=
        200', 'PAL between 0 and 200')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .hasDataType('Quality of Sleep', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .satisfies('`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10', 'QoS between
        0 and 10')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - .hasDataType('Sleep Disorder', ConstrainableDataTypes.String)
      - Valid
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasDataType('Sleep Duration', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    - - .satisfies('`Sleep Duration` >= 0.0 AND `Sleep Duration` <= 24.0', 'Sleep
        Duration in [0,24]')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .hasDataType('Stress Level', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    - - .satisfies('`Stress Level` >= 0 AND `Stress Level` <= 10', 'Stress level between
        0 and 10')
      - Valid
    assumptions: []
