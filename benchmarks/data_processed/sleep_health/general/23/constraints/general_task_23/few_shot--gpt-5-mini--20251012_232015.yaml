constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - '.hasNumberOfDistinctValues(''Gender'', lambda x: x == 2)'
      - Invalid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    - - .isLessThanOrEqualTo('Heart Rate', 200)
      - Invalid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isLessThanOrEqualTo('Physical Activity Level', 100)
      - Invalid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isLessThanOrEqualTo('Quality of Sleep', 10)
      - Invalid
    - - .isNonNegative('Quality of Sleep')
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda x: x > 0.0)'
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isNonNegative('Sleep Duration')
      - Invalid
    assumptions: []
  bp_dia:
    code:
    - - .isLessThanOrEqualTo('bp_dia', 300)
      - Invalid
    - - .isNonNegative('bp_dia')
      - Invalid
    assumptions: []
  bp_stage:
    code:
    - - .isContainedIn('bp_stage', ['normal','elevated','stage1','stage2','crisis'])
      - Invalid
    assumptions: []
  bp_sys:
    code:
    - - .isLessThanOrEqualTo('bp_sys', 300)
      - Invalid
    - - .isNonNegative('bp_sys')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
