results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL
        AND NOT isnan(CAST(`Physical Activity Level` AS DOUBLE))'', ''PAL numeric-castable
        and finite'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Quality of Sleep'', lambda s: s > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.isContainedIn(''BMI Category'', [''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`BMI Category` = TRIM(`BMI Category`) AND LENGTH(TRIM(`BMI
        Category`)) > 0'', ''BMI Category trimmed and non-empty'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasCompleteness(''Blood Pressure'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', ''^[0-9]+/[0-9]+$'', lambda x:
        x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''hasPattern(''Blood Pressure'', ''^[0-9]+/[0-9]+$'',
        lambda x: x == 1.0)'' failed on data sample: Value: 0.9533333333333334 does
        not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) IS NOT
        NULL AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT) IS NOT NULL", ''BP
        tokens are integers'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CAST(split(`Blood Pressure`, ''/'')[0]
        AS INT) IS NOT NULL AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT) IS
        NOT NULL", ''BP tokens are integers'', lambda x: x == 1.0)'' failed on data
        sample: Value: 0.9533333333333334 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) BETWEEN
        70 AND 250 AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT) BETWEEN 40 AND
        150", ''BP in plausible human range'', lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CAST(split(`Blood Pressure`, ''/'')[0]
        AS INT) BETWEEN 70 AND 250 AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT)
        BETWEEN 40 AND 150", ''BP in plausible human range'', lambda x: x >= 0.98)''
        failed on data sample: Value: 0.9533333333333334 does not meet the constraint
        requirement!'
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax("Person ID", lambda x: x <= 1000000)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'',
        ''Sleep Duration plausible range [0,24] hours'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Duration` >= 3 AND `Sleep Duration` <= 12'',
        ''Sleep Duration typically within [3,12] hours'', lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasSize(lambda v: v >= 2)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness("Daily Steps", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea'')", "Valid Sleep Disorder values when present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` IN (''Insomnia'',''Sleep Apnea'')",
        "Known Sleep Disorder coverage >= 20%", lambda x: x >= 0.20)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.hasCompleteness(''Stress Level'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Stress Level` IN (3,4,5,6,7,8) THEN 1 ELSE
        0 END'', ''Stress Level domain (95% in {3..8})'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies("((0.5 * CASE WHEN `BMI Category` = ''Normal'' THEN
        0.0 WHEN `BMI Category` = ''Normal Weight'' THEN 0.0 WHEN `BMI Category` =
        ''Overweight'' THEN 0.10 WHEN `BMI Category` = ''Obese'' THEN 0.20 ELSE NULL
        END) + (0.5 * CASE WHEN `Sleep Disorder` = ''Insomnia'' THEN 0.20 WHEN `Sleep
        Disorder` = ''Sleep Apnea'' THEN 0.30 ELSE 0.05 END)) IN (0.025, 0.075, 0.125,
        0.10, 0.15, 0.20, 0.25)", "Penalty_total equals one of the allowed discrete
        values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
