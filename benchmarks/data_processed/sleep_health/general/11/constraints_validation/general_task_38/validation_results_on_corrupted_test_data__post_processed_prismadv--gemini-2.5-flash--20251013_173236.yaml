results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete("Physical Activity Level")
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Quality of Sleep'', lambda std_dev: std_dev
        > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9",
        "Quality of Sleep Range Check", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese'') THEN 1 ELSE 0 END", "Valid BMI Categories", lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete("BMI Category")
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\d{2,3}/\\d{2,3}$'', assertion=lambda
        x: x >= 0.99, name=''Blood Pressure format check'')'
      status: false
      reason_if_failed: 'Constraint ''hasPattern(''Blood Pressure'', ''^\\d{2,3}/\\d{2,3}$'',
        assertion=lambda x: x >= 0.99, name=''Blood Pressure format check'')'' failed
        on data sample: Value: 0.9533333333333334 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', 1) AS
        INT) >= 60 AND CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', 1) AS INT) <=
        200", ''SBP physiological range'', assertion=lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness("Sleep Duration", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 10.0",
        "Sleep Duration within typical range", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Daily Steps'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("`Sleep Disorder` = ''Sleep Apnea''", "Sleep Apnea present
        in Sleep Disorder column", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete("Heart Rate")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` >= 55.0 AND `Heart Rate` <=
        95.0 THEN 1 ELSE 0 END", "Heart Rate mostly within 55-95 bpm", lambda x: x
        >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("`Stress Level` >= 3.0 AND `Stress Level` <= 8.0", "Stress
        Level within expected range", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: '.hasCompleteness(''Age'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''Age'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Age` <= 120", "Plausible Age Upper Bound", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Age","BMI Category","Blood Pressure","Daily Steps","Heart Rate","Physical Activity
    Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level","risk_score"]'
  : code:
    - suggestion: .hasPattern("Blood Pressure", "^\\d{2,3}/\\d{2,3}$")
      status: false
      reason_if_failed: 'Constraint ''hasPattern("Blood Pressure", "^\\d{2,3}/\\d{2,3}$")''
        failed on data sample: Value: 0.9533333333333334 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.satisfies("`Sleep Disorder` = ''Sleep Apnea'' AND `BMI Category`
        IN (''Overweight'', ''Obese'')", "Sleep Apnea with Overweight/Obese BMI co-occurrence",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Sleep Disorder","apnea_component"]':
    code:
    - suggestion: '.satisfies("`BMI Category` IN (''Normal'', ''Normal Weight'', ''Overweight'',
        ''Obese'')", "Valid BMI Category Values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness(columns=[''Person ID''], assertion=lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["BMI Category","bmi_risk"]':
    code:
    - suggestion: '.satisfies("`Sleep Disorder` = ''Sleep Apnea'' AND (`BMI Category`
        = ''Overweight'' OR `BMI Category` = ''Obese'')", "Apnea BMI Coupling", lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["prioritized_for_outreach","risk_score"]':
    code:
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        x: x == x)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` = ''Sleep Apnea'' THEN (`BMI
        Category` IS NOT NULL AND `BMI Category` IN (''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese'')) ELSE TRUE END", "Valid BMI for Sleep Apnea", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["DBP","MAP","PP"]':
    code:
    - suggestion: '.hasUniqueness([''Person ID''], assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration","restfulness_residual"]':
    code:
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda x:
        abs(x) >= 0.3)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Sleep Duration","sleep_debt","sleep_debt_pos"]':
    code:
    - suggestion: '.satisfies("GREATEST(-2.0, LEAST(5.0, 8.0 - `Sleep Duration`))
        >= -2.0 AND GREATEST(-2.0, LEAST(5.0, 8.0 - `Sleep Duration`)) <= 5.0 AND
        GREATEST(0.0, GREATEST(-2.0, LEAST(5.0, 8.0 - `Sleep Duration`))) >= 0.0",
        "sleep_debt_derived_ranges", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
