results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete("Physical Activity Level")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Physical Activity Level` = floor(`Physical Activity
        Level`)", "PAL must be integer", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100", "PAL within [0, 100]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete("Quality of Sleep")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Quality of Sleep` >= 6 AND `Quality of Sleep` <= 9",
        "QoS in 6-9", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\s*\d+\s*/\s*\d+\s*$'', lambda
        x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''hasPattern(''Blood Pressure'', ''^\s*\d+\s*/\s*\d+\s*$'',
        lambda x: x == 1)'' failed on data sample: Value: 0.9533333333333334 does
        not meet the constraint requirement!'
      level: error
  Person ID:
    code:
    - suggestion: '.hasCompleteness(''Person ID'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness("Sleep Duration", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`Sleep Duration` > 2.99) AND (`Sleep Duration` <=
        14.01)", "Sleep Duration within supported range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Daily Steps` >= 0 AND `Daily Steps` <= 50000'', ''Daily
        Steps range 0-50000'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR lower(trim(`Sleep
        Disorder`)) NOT IN (''unknown'',''n/a'',''na'',''none'',''null'','''') THEN
        1 ELSE 0 END", "No placeholder tokens in Sleep Disorder", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR `Sleep Disorder`
        IN (''Insomnia'',''Sleep Apnea'') THEN 1 ELSE 0 END", "Valid disorder labels",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Sleep Disorder", lambda v: v >= 0.25 and v <=
        0.60)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Stress Level` BETWEEN 3 AND 8", "Stress Level range
        [3,8]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isContainedIn(''Stress Level'', [''3'', ''4'', ''5'', ''6'', ''7'',
        ''8''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
