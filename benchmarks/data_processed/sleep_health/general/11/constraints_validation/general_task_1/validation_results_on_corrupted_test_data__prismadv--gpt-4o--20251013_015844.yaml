results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies('`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10',
        'Quality of Sleep within valid range')
      status: true
      reason_if_failed: ''
      level: undefined
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Obese', 'Overweight', 'Normal',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .satisfies("`Blood Pressure` IS NOT NULL", "Blood Pressure should
        not be NULL")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .hasPattern('Blood Pressure', r'^\d+/\d+$')
      status: false
      reason_if_failed: 'Constraint ''hasPattern(''Blood Pressure'', r''^\d+/\d+$'')''
        failed on data sample: Value: 0.9533333333333334 does not meet the constraint
        requirement!'
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: undefined
  Sleep Disorder:
    code:
    - suggestion: .satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Insomnia',
        'Sleep Apnea')", "Valid Sleep Disorder Values")
      status: true
      reason_if_failed: ''
      level: undefined
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: undefined
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('Age >= 0 AND Age <= 120', 'Age within realistic range')
      status: true
      reason_if_failed: ''
      level: warning
  '["Age","BMI Category"]':
    code:
    - suggestion: .satisfies('`Age` >= 0', 'Non-negative Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`BMI Category` IN ("Obese", "Overweight", "Normal",
        "Normal Weight")', 'Valid BMI Category')
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        x: abs(x) >= 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: .satisfies('CAST(`Quality of Sleep` AS INTEGER) = `Quality of Sleep`',
        'Quality of Sleep Integer Check')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        x: True)'
      status: true
      reason_if_failed: ''
      level: warning
