prismadv_config:
  model:
    use_async: true
    use_dataflow: true
    correlation_detection: true
    downstream_task_description: No specific description provided. The script can
      be used for any task.
  llm:
    model_name: gpt-5-mini
    temperature: 0.6
    max_tokens: null
    seed: null
  io:
    overwrite: false
constraints:
  Physical Activity Level:
    code: []
    assumptions:
    - text: 'Whenever both ''Physical Activity Level'' and ''Daily Steps'' are used
        together (e.g., correlation and paired masks), their values must lie in the
        expected business ranges: ''Physical Activity Level'' in [0, 100] and ''Daily
        Steps'' in [0, 50000]. Actionable multi-column constraint examples:

        - SQL/Deequ-style predicate: .satisfies("Physical Activity Level >= 0 AND
        Physical Activity Level <= 100 AND Daily Steps >= 0 AND Daily Steps <= 50000",
        "pal_steps_in_range")

        - Or enforce per-row predicate when both columns are non-null: if (Physical
        Activity Level IS NOT NULL AND Daily Steps IS NOT NULL) then the above range
        predicate must hold.'
      sources:
      - start_line: 23
        end_line: 31
        file: ''
      uid: cbcdb663-e762-4b93-ac1f-64e69e9bbb1a
    - text: "Rows used to compute the sedentary_index (and therefore contribute to\
        \ the final priority_score) must have both 'Physical Activity Level' and 'Daily\
        \ Steps' present and numeric. Additionally, 'Physical Activity Level' is expected\
        \ to be integer-valued (no fractional component) so division by 100 yields\
        \ a valid normalized value. Actionable constraints:\n- Require completeness\
        \ for the pair: .satisfies(\"Physical Activity Level IS NOT NULL AND Daily\
        \ Steps IS NOT NULL\", \"pal_steps_non_null_for_sedentary\") or a multi-column\
        \ completeness check for output rows.\n- Enforce integerness: .satisfies(\"\
        floor(Physical Activity Level) = Physical Activity Level\", \"pal_is_integer\"\
        )\n- And keep the range check from assumption 1 to guarantee pal/100 \u2208\
        \ [0,1]."
      sources:
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 48
        end_line: 51
        file: ''
      - start_line: 79
        end_line: 85
        file: ''
      uid: 6fb3d9ea-e147-4236-8d77-0a749ca296be
    - text: 'The Spearman correlation computation between ''Physical Activity Level''
        and ''Daily Steps'' requires sufficient paired, non-constant data: among rows
        where both columns are non-null there must be at least two paired records
        and each column should have more than one distinct value (i.e., not constant).
        Actionable checks:

        - Paired count >= 2: .satisfies("count(*) FILTER (WHERE Physical Activity
        Level IS NOT NULL AND Daily Steps IS NOT NULL) >= 2", "pal_steps_min_pairs")

        - Variability: .satisfies("approx_distinct(Physical Activity Level) > 1 AND
        approx_distinct(Daily Steps) > 1", "pal_steps_variability")'
      sources:
      - start_line: 27
        end_line: 31
        file: ''
      - start_line: 23
        end_line: 26
        file: ''
      uid: d01cf916-3338-4069-a31c-4b22c0aa8540
    - text: 'Because sedentary_index is incorporated into the weighted base_priority
        and final priority_score (and these values are output as columns), rows missing
        either ''Physical Activity Level'' or ''Daily Steps'' will produce NaN in
        sedentary_index and can propagate to priority_score. Therefore for any row
        expected to produce a valid ''priority_score'' in the output, at least one
        of these must hold: either both ''Physical Activity Level'' and ''Daily Steps''
        are non-null and in-range, or the pipeline must explicitly fill/handle missing
        values. Actionable multi-column constraint: .satisfies("(Physical Activity
        Level IS NOT NULL AND Daily Steps IS NOT NULL AND Physical Activity Level
        BETWEEN 0 AND 100 AND Daily Steps BETWEEN 0 AND 50000) OR <policy_for_missing_values_applied>",
        "pal_steps_complete_or_imputed")'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      - start_line: 67
        end_line: 76
        file: ''
      - start_line: 79
        end_line: 85
        file: ''
      uid: 6a71617f-b03e-49f9-b1a0-7a25766e9e99
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 11ddfe08-95ad-41f0-b4eb-5cebb927bd2c
      source_assumptions:
      - cd8b4d63-c931-4a94-9570-6e4e3ffcb724
    - suggestion: '.hasDataType(''Quality of Sleep'', ''Integral'', lambda x: x ==
        1.0)'
      validity: false
      reason_if_invalid: 'Skipping data type constraint: .hasDataType(''Quality of
        Sleep'', ''Integral'', lambda x: x == 1.0)'
      level: error
      uid: 31aff4f2-58ba-451f-ab85-592a590535f6
      source_assumptions:
      - 30e849c1-7234-4b7e-bb83-bf7f931b9f63
    - suggestion: '.satisfies(''CASE WHEN `Quality of Sleep` BETWEEN 6 AND 9 THEN
        1 ELSE 0 END'', ''Quality of Sleep in 6-9 band'', lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 3a0b52b4-c5de-4b3e-9809-2bb83b01e6d7
      source_assumptions:
      - bf7bb407-b0c5-4742-92fb-6e7a409733e7
    assumptions:
    - text: 'The input ''Quality of Sleep'' column must not contain NULLs (the code
        reads it directly and does not fill or guard against missing values). Example
        Deequ/GE check: .satisfies("CASE WHEN `Quality of Sleep` IS NOT NULL THEN
        1 ELSE 0 END", "Non-null Quality of Sleep", lambda x: x == 1.0)'
      sources:
      - start_line: 15
        end_line: 15
        file: ''
      - start_line: 45
        end_line: 46
        file: ''
      uid: cd8b4d63-c931-4a94-9570-6e4e3ffcb724
    - text: 'The input ''Quality of Sleep'' values must be numeric (integral) or safely
        castable to numeric, because the code performs numeric clipping and arithmetic
        on this column. Example check: .satisfies("CASE WHEN `Quality of Sleep` BETWEEN
        -999999 AND 999999 AND `Quality of Sleep` = CAST(CAST(`Quality of Sleep` AS
        DOUBLE) AS DOUBLE) THEN 1 ELSE 0 END", "Numeric Quality of Sleep", lambda
        x: x == 1.0)'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      uid: 30e849c1-7234-4b7e-bb83-bf7f931b9f63
    - text: 'Most input ''Quality of Sleep'' values are expected to fall in the 6-9
        range (the code clips to [6,9] and normalizes on that band). Based on the
        provided dataset, >= 95% of values are within [6,9]; enforceable check: .satisfies("CASE
        WHEN `Quality of Sleep` BETWEEN 6 AND 9 THEN 1 ELSE 0 END", "Quality of Sleep
        in 6-9 band", lambda x: x >= 0.95)'
      sources:
      - start_line: 45
        end_line: 46
        file: ''
      uid: bf7bb407-b0c5-4742-92fb-6e7a409733e7
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: ff45b74f-b9ca-46ee-94f2-ef987fec9159
      source_assumptions:
      - a0a01b40-eb7e-4a62-ac12-adf06751c546
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\s*[0-9]+/[0-9]+\\s*$'', assertion=lambda
        x: x == 1, name=''Blood Pressure format'')'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 66de9f88-0c97-418c-bf68-62a5164112c9
      source_assumptions:
      - 44626d7d-ff6d-4cce-92e4-4883796eccac
    - suggestion: '.satisfies(''CASE WHEN CAST(split_part(`Blood Pressure`, \''/\'',
        1) AS INT) BETWEEN 50 AND 250 THEN 1 ELSE 0 END'', ''Systolic plausible range'',
        lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 60bc52e3-69e6-43b9-b311-96bcf126b5f4
      source_assumptions:
      - 54e5c73e-44c3-42a5-a3f0-8342d98c2fe1
    - suggestion: '.satisfies(''CASE WHEN CAST(split_part(`Blood Pressure`, \''/\'',
        2) AS INT) BETWEEN 30 AND 160 THEN 1 ELSE 0 END'', ''Diastolic plausible range'',
        lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: bb455721-37c4-4d3d-ab31-b57062873c45
      source_assumptions:
      - 54e5c73e-44c3-42a5-a3f0-8342d98c2fe1
    - suggestion: '.satisfies(''CASE WHEN CAST(split_part(`Blood Pressure`, \''/\'',
        1) AS INT) >= CAST(split_part(`Blood Pressure`, \''/\'', 2) AS INT) THEN 1
        ELSE 0 END'', ''Systolic >= Diastolic'', lambda x: x >= 0.99)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: ea851d51-8173-482c-99d6-ee8340a8a520
      source_assumptions:
      - a57f1b8c-2d48-4355-b9c1-baf715521139
    assumptions:
    - text: 'The ''Blood Pressure'' column must be non-null for all input rows because
        the code calls string operations and splits on this column without null checks
        (parsing and integer conversion will fail on NaNs).

        We could represent this as a Deequ constraint like:

        .satisfies(''CASE WHEN `Blood Pressure` IS NOT NULL THEN 1 ELSE 0 END'', ''Non-null
        Blood Pressure'', lambda x: x == 1)

        '
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: a0a01b40-eb7e-4a62-ac12-adf06751c546
    - text: 'Each ''Blood Pressure'' value must follow the exact ''systolic/diastolic''
        integer format with exactly one ''/'' and no extra characters or units (e.g.
        ''120/80''). Both sides should be integer digit sequences (no decimals, no
        letters, leading/trailing whitespace should be cleaned). This is required
        because the code uses .str.split(''/'', expand=True) and then astype(int).

        We could represent this as a Deequ constraint like:

        .satisfies(''CASE WHEN REGEXP_LIKE(`Blood Pressure`, ''''^[0-9]+/[0-9]+$'''')
        THEN 1 ELSE 0 END'', ''Blood Pressure format'', lambda x: x == 1)

        '
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: 44626d7d-ff6d-4cce-92e4-4883796eccac
    - text: 'After splitting, systolic and diastolic parts must parse to integers
        within plausible physiological bounds so downstream threshold logic is meaningful.
        For example: systolic in [50, 250] and diastolic in [30, 160]. (You can tighten
        these bounds if you know the population.)

        We could represent these as Deequ constraints like:

        .satisfies(''CASE WHEN CAST(split_part(`Blood Pressure`, ''''/'''', 1) AS
        INT) BETWEEN 50 AND 250 THEN 1 ELSE 0 END'', ''Systolic plausible range'',
        lambda x: x >= 0.99)

        .satisfies(''CASE WHEN CAST(split_part(`Blood Pressure`, ''''/'''', 2) AS
        INT) BETWEEN 30 AND 160 THEN 1 ELSE 0 END'', ''Diastolic plausible range'',
        lambda x: x >= 0.99)

        (Use >=0.99 if you allow a small fraction of outliers, or ==1 if you require
        all rows to comply.)'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      - start_line: 34
        end_line: 39
        file: ''
      uid: 54e5c73e-44c3-42a5-a3f0-8342d98c2fe1
    - text: 'Systolic should be greater than or equal to diastolic for each record
        (systolic >= diastolic). The code assumes numeric bp_systolic and bp_diastolic
        and computes risk bands separately; implausible inversions may indicate malformed
        input.

        We could represent this as a Deequ constraint like:

        .satisfies(''CASE WHEN CAST(split_part(`Blood Pressure`, ''''/'''', 1) AS
        INT) >= CAST(split_part(`Blood Pressure`, ''''/'''', 2) AS INT) THEN 1 ELSE
        0 END'', ''Systolic >= Diastolic'', lambda x: x >= 0.99)

        '
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      - start_line: 34
        end_line: 39
        file: ''
      uid: a57f1b8c-2d48-4355-b9c1-baf715521139
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 26781f74-c55a-4699-ac0e-eede826c39aa
      source_assumptions:
      - a8be4599-4694-47fa-9df4-77c30410b213
    - suggestion: '.satisfies(''CASE WHEN `Person ID` IS NOT NULL AND floor(`Person
        ID`) = `Person ID` THEN 1 ELSE 0 END'', ''Person ID integer-valued'', lambda
        x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: b777cf1e-b051-42c8-8197-cf9162ff765e
      source_assumptions:
      - 974931c1-6058-4768-a885-a1af1bf43c71
    - suggestion: .isUnique('Person ID')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: e5927fc9-f06c-426b-88ac-3d63e823f440
      source_assumptions:
      - 092b11c4-dc85-4857-aea4-fde394efb816
    assumptions:
    - text: 'The input must contain a ''Person ID'' value for every row (no null/missing
        Person ID). The script reads the CSV and writes ''Person ID'' into the output
        file, so missing IDs would break downstream joins or identification. Example
        Deequ/GE rule: .satisfies("CASE WHEN `Person ID` IS NOT NULL THEN 1 ELSE 0
        END", "Person ID not null", lambda x: x == 1.0)  (or Great Expectations: expect_column_values_to_not_be_null(''Person
        ID'')).'
      sources:
      - start_line: 15
        end_line: 15
        file: ''
      - start_line: 79
        end_line: 85
        file: ''
      uid: a8be4599-4694-47fa-9df4-77c30410b213
    - text: 'Each ''Person ID'' should be an integer-valued identifier (no fractional
        values or non-numeric formatting). The dataset and downstream consumers expect
        an integral identifier column. Example Deequ/GE rule: .satisfies("CASE WHEN
        `Person ID` IS NOT NULL AND floor(`Person ID`) = `Person ID` THEN 1 ELSE 0
        END", "Person ID integer-valued", lambda x: x == 1.0)  (or Great Expectations:
        expect_column_values_to_be_in_type_list(''Person ID'', [''INTEGER''])).'
      sources:
      - start_line: 15
        end_line: 15
        file: ''
      - start_line: 79
        end_line: 85
        file: ''
      uid: 974931c1-6058-4768-a885-a1af1bf43c71
    - text: 'Person ID should uniquely identify rows (no duplicate Person ID values).
        The output CSV is intended for downstream orchestration and identification,
        so Person ID is expected to act as a primary key. Example Deequ/GE rule: .satisfies("CASE
        WHEN COUNT(DISTINCT `Person ID`) = COUNT(`Person ID`) THEN 1 ELSE 0 END",
        "Person ID unique", lambda x: x == 1.0)  (or Great Expectations: expect_column_values_to_be_unique(''Person
        ID'')).'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      - start_line: 79
        end_line: 85
        file: ''
      uid: 092b11c4-dc85-4857-aea4-fde394efb816
  Sleep Duration:
    code: []
    assumptions:
    - text: 'All rows must have ''Sleep Duration'' inside the valid domain required
        by the vectorized transforms: specifically, (''Sleep Duration'' - 2.99) must
        be strictly positive for np.log to be defined, and (14.01 - ''Sleep Duration'')
        must be non-negative for np.sqrt to be defined. Concretely: ''Sleep Duration''
        > 2.99 AND ''Sleep Duration'' <= 14.01 for every record. Actionable constraint
        examples:

        - Deequ: .isGreaterThan(''Sleep Duration'', 2.99) AND .isLessOrEqual(''Sleep
        Duration'', 14.01)

        - Spark/Pandas checks: assert ((df[''Sleep Duration''] > 2.99) & (df[''Sleep
        Duration''] <= 14.01)).all()

        '
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      uid: 2fa2e3c3-2dd4-4255-8a8f-5ca402d2bb1d
    - text: 'Both ''Sleep Duration'' and ''Quality of Sleep'' must be present and
        numeric for the sleep-need computation to be reliable. The code computes a
        blended ''sleep_need_index'' from a duration-based deficit and a normalized
        quality score which uses df[''Quality of Sleep''].clip(6,9); if ''Quality
        of Sleep'' is missing or non-numeric the result will be NaN and will corrupt
        downstream scoring. Actionable constraint examples:

        - Deequ: .isComplete(["Sleep Duration", "Quality of Sleep"]) and .hasDataType("Quality
        of Sleep", "Double") (or equivalent numeric-type check)

        - Range check for Quality of Sleep (recommended): .isGreaterThanOrEqualTo(''Quality
        of Sleep'', 0) and .isLessThanOrEqualTo(''Quality of Sleep'', 10) (or tighter
        6-9 expectation if business requires)

        '
      sources:
      - start_line: 42
        end_line: 46
        file: ''
      uid: 3a688768-5cab-4045-a72e-670afcc93814
    - text: 'Columns combined into the eligibility and priority calculation must be
        numeric and bounded so base_priority and final ''priority_score'' behave as
        intended. In particular, ensure that ''sleep_need_index'', ''bp_risk'', ''stress_norm'',
        and ''sedentary_index'' are all finite numeric values (no NaN/Inf) and lie
        in the expected [0,1] business range before aggregation/clip. Actionable constraint
        examples:

        - Deequ: .isComplete(["sleep_need_index","bp_risk","stress_norm","sedentary_index"])
        and for each column .isBetween(col, 0.0, 1.0)

        - Additional: assert numeric types for these columns so the weighted sum in
        base_priority does not produce NaN

        '
      sources:
      - start_line: 61
        end_line: 73
        file: ''
      - start_line: 76
        end_line: 76
        file: ''
      uid: feee45c0-384a-4fe1-9cb1-a05d79d99f6a
  Daily Steps:
    code: []
    assumptions:
    - text: 'Rows used for the PAL vs Daily Steps Spearman correlation must have both
        ''Physical Activity Level'' and ''Daily Steps'' present (non-null) and within
        expected business ranges: ''Physical Activity Level'' in [0, 100] and ''Daily
        Steps'' in [0, 50000]. This can be enforced as a multi-column constraint such
        as: require rows where pal IS NOT NULL and steps IS NOT NULL to satisfy 0
        <= pal <= 100 and 0 <= Daily Steps <= 50000.'
      sources:
      - start_line: 23
        end_line: 31
        file: ''
      - start_line: 27
        end_line: 29
        file: ''
      uid: af79e502-511a-4b98-9d2e-f7a6909111f0
    - text: 'The computation of sedentary_index depends on both ''Daily Steps'' and
        ''Physical Activity Level'' being numeric, non-null and in-range so that steps_norm
        = log1p(Daily Steps)/log(50001) is defined and pal_norm = Physical Activity
        Level/100.0 is meaningful. Concretely: Daily Steps must be >= 0 (so log1p
        is defined) and Physical Activity Level must be between 0 and 100. Rows that
        violate these should be considered invalid for sedentary_index computation.'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      - start_line: 23
        end_line: 26
        file: ''
      - start_line: 27
        end_line: 29
        file: ''
      uid: e01c897a-5a77-41c6-9b72-f0c97698c6e2
    - text: There must be a sufficient number of paired non-null observations of ('Physical
        Activity Level', 'Daily Steps') to compute a stable Spearman correlation.
        Enforce a minimum count of rows where both columns are non-null (e.g., at
        least 30 paired rows) before trusting corr() output or before downstream logic
        that depends on that correlation.
      sources:
      - start_line: 23
        end_line: 31
        file: ''
      uid: 97c8b91d-23e4-4739-ad0b-93091f0cb231
    - text: For eligible members (rows where the downstream eligibility logic evaluates
        to True), 'Daily Steps' and 'Physical Activity Level' should be present and
        in-range so that priority_score (which uses sedentary_index) is a well-defined
        numeric value. In other words, for rows with eligible == True, require Daily
        Steps >= 0 (<=50000) and Physical Activity Level in [0,100].
      sources:
      - start_line: 61
        end_line: 76
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: c1852701-18f3-4252-905f-b1436a398ae2
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NOT NULL THEN 1 ELSE
        0 END", "Has Some Non-Null Sleep Disorder", lambda x: x > 0)'
      validity: true
      reason_if_invalid: ''
