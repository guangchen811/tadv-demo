    - text: 'The ''eligible'' column is a boolean that must exactly reflect the logical
        OR of the three score-based conditions: (sleep_need_index > 0.25) OR (bp_risk
        >= 0.3) OR (stress_norm > 0.5). In other words, for every row eligible ==
        ((sleep_need_index > 0.25) OR (bp_risk >= 0.3) OR (stress_norm > 0.5)). This
        can be enforced as a multi-column constraint such as: allRows(eligible ==
        ((sleep_need_index > 0.25) OR (bp_risk >= 0.3) OR (stress_norm > 0.5))).'
      sources:
      - start_line: 61
        end_line: 65
        file: ''
      uid: 2ed2af12-a12a-4d8f-808d-97ac5de5e688
    - text: 'The ''priority_score'' must equal the clipped weighted sum of the component
        indices plus the disorder boost for eligible rows, and must be 0.0 for ineligible
        rows. Formally: for rows where eligible == True, priority_score == clip(0.45*sleep_need_index
        + 0.20*bp_risk + 0.20*stress_norm + 0.15*sedentary_index + disorder_boost,
        0.0, 1.0). For rows where eligible == False, priority_score == 0.0. In practice
        enforceable as two constraints: (1) allRows(if eligible then approxEqual(priority_score,
        clip(...), tolerance)) and (2) allRows(if not eligible then priority_score
        == 0.0).'
      sources:
      - start_line: 67
        end_line: 76
        file: ''
      uid: faa1c936-1bfe-497a-964a-77151f14f9cf
    - text: 'The ''bp_risk'' column is derived from numeric bp_systolic and bp_diastolic
        parsed from the ''Blood Pressure'' string ''systolic/diastolic''. Therefore
        every ''Blood Pressure'' value must be parsable into two integers (systolic
        and diastolic), and bp_risk must take one of the four allowed numeric values
        produced by the selection logic: {1.0, 0.7, 0.3, 0.0}. Enforceable constraints:
        allRows(Blood Pressure matches regex ''^\d+/\d+$''), allRows(bp_systolic is
        integer AND bp_diastolic is integer), and allRows(bp_risk IN {1.0,0.7,0.3,0.0}).'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      - start_line: 33
        end_line: 39
        file: ''
      uid: 93d65fd8-8f17-42d4-8701-8443ad11076d
    - text: 'The ''sleep_need_index'' is computed from ''Sleep Duration'' and ''Quality
        of Sleep'' and is clipped to [0,1]. In particular: sleep_need_index == clip(0.6
        * min((max(7.0 - dur, 0), (dur - 9.0 if dur>9 else 0)) / 4.0) + 0.4 * (1.0
        - ((Quality of Sleep clipped to [6,9] - 6)/3.0)), 0.0, 1.0). Special-case
        actionable rule: if Sleep Duration is between 7.0 and 9.0 (inclusive) AND
        Quality of Sleep >= 9, then sleep_need_index must equal 0.0. Enforce as numeric-equality
        (or approxEqual) constraints and range checks (0 <= sleep_need_index <= 1).'
      sources:
      - start_line: 41
        end_line: 46
        file: ''
      uid: 20be19ad-eed6-4d7f-be72-03bc65b1f517
    - text: 'The ''sedentary_index'' is computed jointly from ''Daily Steps'' and
        ''Physical Activity Level'' and must be in [0,1]. Preconditions in the code
        indicate expected ranges for the inputs: 0 <= Daily Steps <= 50000 and 0 <=
        Physical Activity Level <= 100. When inputs are within these ranges, sedentary_index
        must equal (1.0 - (0.5 * log1p(Daily Steps) / log(50001) + 0.5 * Physical
        Activity Level / 100.0)) clipped to [0,1]. Enforceable constraints: allRows(
        (Daily Steps is null OR (Daily Steps between 0 and 50000)) AND (Physical Activity
        Level is null OR (Physical Activity Level between 0 and 100)) ), plus for
        rows where both inputs are present and in-range: approxEqual(sedentary_index,
        formula, tolerance), and 0 <= sedentary_index <= 1.'
      sources:
      - start_line: 23
        end_line: 31
        file: ''
      - start_line: 48
        end_line: 51
        file: ''
      uid: dd8d01bc-4bf8-4424-bc5d-f9c9f5be3a7c
    - text: 'The ''disorder_boost'' column is a binary boost derived from the ''Sleep
        Disorder'' field: disorder_boost == 0.1 when Sleep Disorder is present (not
        null) and disorder_boost == 0.0 when Sleep Disorder is null. Enforceable as:
        allRows(disorder_boost IN {0.0, 0.1}) and allRows(if Sleep Disorder is not
        null then disorder_boost == 0.1 else disorder_boost == 0.0).'
      sources:
      - start_line: 56
        end_line: 58
        file: ''
      - start_line: 67
        end_line: 73
        file: ''
      uid: 297e1f3c-54c2-4ac8-a810-a132cd0b541d
