        end_line: 58
        file: ''
      uid: 31fa548a-39d7-410b-b5bc-5315db40f125
    - text: '''sleep_need_index'' must equal the specified combination of sleep duration
        deficit and quality-of-sleep normalization and be clipped to [0,1]. Concretely:
        let dur = Sleep Duration; sleep_deficit = if dur < 7.0 then 7.0 - dur elif
        dur > 9.0 then dur - 9.0 else 0.0; sleep_deficit_scaled = min(sleep_deficit
        / 4.0, 1.0); qos_norm = clip((Quality of Sleep clipped to [6,9] minus 6) /
        3.0, 0, 1); then sleep_need_index == clip_0_1(0.6 * sleep_deficit_scaled +
        0.4 * (1.0 - qos_norm)). This is a deterministic row-level formula that can
        be asserted with a .satisfies constraint.'
      sources:
      - start_line: 41
        end_line: 46
        file: ''
      uid: 0b6e3b9b-7830-4ba3-a281-a13e53c2a7e5
    - text: '''sedentary_index'' must be computed from ''Daily Steps'' and ''Physical
        Activity Level'' according to the formula: steps_norm = log1p(Daily Steps)
        / log(50001); pal_norm = Physical Activity Level / 100.0; sedentary_index
        == clip_0_1(1.0 - (0.5 * steps_norm + 0.5 * pal_norm)). Also assert sedentary_index
        in [0,1]. This can be enforced with a Deequ .satisfies expression comparing
        computed value to sedentary_index within a tiny numeric tolerance if necessary.'
