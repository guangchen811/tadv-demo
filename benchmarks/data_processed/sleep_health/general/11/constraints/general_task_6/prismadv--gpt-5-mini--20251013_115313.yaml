    assumptions:
    - text: 'Both ''Physical Activity Level'' and ''Daily Steps'' are expected to
        be present (non-null) for most rows because the code computes steps_norm and
        pal_norm over the full columns and uses them to derive ''sedentary_index''
        and ultimately ''priority_score'' without any null-handling. If these columns
        contain nulls, sedentary_index (and thus priority_score) will be NaN for those
        rows. Actionable constraints (Deequ-style):

        - Ensure completeness of both columns: .isComplete(["Physical Activity Level",
        "Daily Steps"])  OR an equivalent custom constraint that the count of rows
        where both columns are non-null equals the number of rows to be scored.

        - Alternatively, require the number of rows with both non-null values to be
        >= N (see next assumption).

        '
      sources:
      - start_line: 23
        end_line: 31
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      - start_line: 67
        end_line: 73
        file: ''
      uid: 6846e0c3-db82-4c43-96cf-67a67df1278d
    - text: 'The two activity columns must lie in the expected business ranges so
        the subsequent normalizations produce values in [0,1]: ''Physical Activity
        Level'' should be integer-valued and in the inclusive range [0, 100]; ''Daily
        Steps'' should be integer-valued and in the inclusive range [0, 50000]. Actionable
        constraints (Deequ-style/pseudocode):

        - Physical Activity Level range & integrality: .isBetween("Physical Activity
        Level", 0, 100) and .satisfies("floor(Physical Activity Level) = Physical
        Activity Level") or equivalent check for integerness.

        - Daily Steps range & integrality: .isBetween("Daily Steps", 0, 50000) and
        .satisfies("floor(Daily Steps) = Daily Steps").

        These guarantees are required because steps_norm = log1p(Daily Steps)/log(50001)
        and pal_norm = Physical Activity Level/100.0 assume the numerator and denominators
        produce values in [0,1].'
      sources:
      - start_line: 25
        end_line: 26
        file: ''
      - start_line: 27
        end_line: 29
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: 1abe8c21-4847-4172-a2ea-09bbc0941868
    - text: 'The Spearman correlation corr_pal_steps is computed on paired non-null
        entries. The code assumes there are a sufficient number of paired observations
        to compute a meaningful correlation. Actionable constraint (Deequ-style/pseudocode):

        - Require at least a minimum number of paired, valid rows: count(where notnull(Physical
        Activity Level) AND notnull(Daily Steps) AND Physical Activity Level between
        0 and 100 AND Daily Steps between 0 and 50000) >= 3 (or >=2 as a mathematical
        minimum).'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      uid: 424e37ea-f77c-471f-bfbd-fc706814ef21
  '["Daily Steps","Physical Activity Level","sedentary_index"]':
    code: []
    assumptions:
    - text: 'There must be at least two rows where both ''Physical Activity Level''
        and ''Daily Steps'' are non-null so that the Spearman correlation calc can
        run and produce a meaningful result. Actionable checks: ensure count(rows
        where Physical Activity Level IS NOT NULL AND Daily Steps IS NOT NULL) >=
        2. In Deequ / constraint form this can be enforced with a custom check such
        as: .satisfies("(Physical Activity Level IS NOT NULL) AND (Daily Steps IS
        NOT NULL)", "pal_and_steps_present") with an expectation that the resulting
        number of passing rows >= 2 (or a dataset-specific threshold).'
      sources:
      - start_line: 23
        end_line: 31
        file: ''
      uid: 819d8e5b-3a42-40c9-9f40-89fefcc700e1
    - text: 'For rows used in downstream calculations (i.e., where both columns are
        present), ''Physical Activity Level'' values should be integers in the closed
        interval [0, 100] and ''Daily Steps'' values should be integers in the closed
        interval [0, 50000]. Actionable checks: for rows where both columns are not
        null assert (Physical Activity Level >= 0 AND Physical Activity Level <= 100
        AND floor(Physical Activity Level) = Physical Activity Level) AND (Daily Steps
        >= 0 AND Daily Steps <= 50000 AND floor(Daily Steps) = Daily Steps). In Deequ
        this can be expressed as a combination of min/max checks per column (.hasMin/.hasMax)
        plus a row-level predicate via .satisfies to assert integerness and the joint
        not-null requirement.'
      sources:
      - start_line: 25
        end_line: 26
        file: ''
      - start_line: 28
        end_line: 29
        file: ''
      uid: cc71d0f4-486b-440c-8f67-96d5104a94b5
    - text: 'The ''sedentary_index'' column is derived from ''Daily Steps'' and ''Physical
        Activity Level'' using the formula: sedentary_index = (1.0 - (0.5 * (log1p(Daily
        Steps) / log(50001)) + 0.5 * (Physical Activity Level / 100.0))).clip(0, 1).
        Actionable check: for each row where the inputs are present, assert approximate
        equality between stored sedentary_index and this formula (allow a small tolerance
        for floating point error), e.g. .satisfies("abs(sedentary_index - (1 - (0.5*log1p(Daily
        Steps)/log(50001) + 0.5*(Physical Activity Level/100)))) <= 1e-6", ["sedentary_index",
        "Daily Steps", "Physical Activity Level"]).'
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      uid: c18f53d4-d8f0-4a89-acfb-b01d3a868872
    - text: 'For rows where ''Physical Activity Level'' and/or ''Daily Steps'' are
        present and used to compute the index, the resulting ''sedentary_index'' must
        lie in the closed interval [0, 1]. Actionable check: assert 0.0 <= sedentary_index
        <= 1.0 for all rows (or at least for all rows where inputs are not null).
        In Deequ this can be expressed as .hasMin(''sedentary_index'', 0.0) and .hasMax(''sedentary_index'',
        1.0) or a row-level .satisfies predicate that only applies when input columns
        are present.'
      sources:
      - start_line: 51
        end_line: 51
        file: ''
      uid: 382b60cb-850a-4dee-9e83-74e03a5ac8f6
  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Both ''Sleep Duration'' and ''Quality of Sleep'' must be present (non-null)
        and numeric for every row because they are combined to compute ''sleep_need_index'',
        which the downstream logic uses for eligibility and prioritization. Example
        Deequ-style constraints:

        .isComplete(["Sleep Duration", "Quality of Sleep"])  # no nulls in either
        column

        .satisfies("sleep_cols_finite", "isFinite(`Sleep Duration`) AND isFinite(`Quality
        of Sleep`)")'
      sources:
      - start_line: 41
        end_line: 46
        file: ''
      uid: 7c1238f1-b85b-4dd4-b331-78e6d5ce801b
    - text: 'All rows used by the downstream transforms should have ''Sleep Duration''
        inside the open-closed interval (2.99, 14.01] to avoid math errors in intermediate
        transforms: np.log(Sleep Duration - 2.99) requires Sleep Duration > 2.99;
        np.sqrt(14.01 - Sleep Duration) requires Sleep Duration <= 14.01. Example
        Deequ constraint:

        .satisfies("sleep_duration_bounds", "(`Sleep Duration` > 2.99) AND (`Sleep
        Duration` <= 14.01)")'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 41
        end_line: 46
        file: ''
      uid: 21998892-0c9e-4943-af1e-96d1ebf9a881
    - text: 'The joint semantics used to compute ''sleep_need_index'' imply conditional
        relationships between the two columns: specifically, when ''Sleep Duration''
        is in the recommended band [7.0, 9.0] AND ''Quality of Sleep'' is at the top
        of the QoS scale (>= 9), the derived sleep_need_index should be 0.0. This
        can be enforced as a conditional constraint, e.g.:

        .satisfies("no_need_when_optimal", "((`Sleep Duration` >= 7.0 AND `Sleep Duration`
        <= 9.0 AND `Quality of Sleep` >= 9) = (`sleep_need_index` = 0.0))")'
      sources:
      - start_line: 42
        end_line: 46
        file: ''
      uid: 24cb387a-62c7-458d-8b7a-68afc7439ee2
  '["Quality of Sleep","Sleep Duration","sleep_need_index"]':
    code: []
    assumptions:
    - text: 'When Sleep Duration is within the recommended band [7.0, 9.0] and Quality
        of Sleep is at or above 9 (after the clip to 9), the computed sleep_need_index
        will be exactly 0.0. In other words: if 7.0 <= Sleep Duration <= 9.0 and Quality
        of Sleep >= 9 then sleep_need_index == 0.0. (Derived from qos_norm clipping
        and the sleep_need_index formula.) This can be enforced as a conditional multi-column
        constraint.'
      sources:
      - start_line: 42
        end_line: 46
        file: ''
      uid: e30c503d-bef6-47ee-ae11-6b47afd8a0a1
    - text: 'For any record with Sleep Duration in the recommended band [7.0, 9.0],
        the sleep_need_index must be <= 0.4. Rationale: when sleep_deficit == 0 the
        maximum contribution from Quality of Sleep term is 0.4 (Quality clipped to
        6 yields qos_norm=0 -> 0.4). Enforceable as a conditional multi-column bound:
        if 7.0 <= Sleep Duration <= 9.0 then sleep_need_index <= 0.4.'
      sources:
      - start_line: 42
        end_line: 46
        file: ''
      uid: 79dc1f89-2dc1-4425-9f65-4906d07e6229
    - text: For any record, the sleep_need_index must be at least the contribution
        coming from duration deviation alone (i.e., even with the best possible Quality
        of Sleep). Formally, let sleep_deficit = (7.0 - Sleep Duration) if Sleep Duration
        < 7.0, sleep_deficit = (Sleep Duration - 9.0) if Sleep Duration > 9.0, else
        0.0. Let scaled = min(sleep_deficit / 4.0, 1.0). Then sleep_need_index >=
        0.6 * scaled. This yields a lower bound on sleep_need_index derived from the
        duration term alone and is enforceable as a multi-column constraint.
      sources:
      - start_line: 42
        end_line: 46
        file: ''
      uid: 80b2ce24-43fa-4780-8f7c-573d63d953bc
    - text: 'The computed sleep_need_index must always lie in the closed interval
        [0.0, 1.0] given Sleep Duration and Quality of Sleep (the code applies a final
        .clip(0, 1)). Enforce as a multi-column invariant relating the derived column
        to its inputs: 0.0 <= sleep_need_index <= 1.0 for all rows.'
      sources:
      - start_line: 44
        end_line: 46
        file: ''
      uid: f134109f-2977-47f2-a388-b28771130f6e
  '["Sleep Disorder","disorder_boost"]':
    code: []
    assumptions:
    - text: 'disorder_boost is derived directly from the presence of a Sleep Disorder
        value: for every row, if ''Sleep Disorder'' is not null then ''disorder_boost''
        == 0.1, otherwise ''disorder_boost'' == 0.0. This can be enforced as a row-level
        conditional constraint, e.g. (isNull(Sleep Disorder) AND disorder_boost ==
        0.0) OR (NOT isNull(Sleep Disorder) AND disorder_boost == 0.1).'
      sources:
      - start_line: 56
        end_line: 58
        file: ''
      uid: f4fc61b8-33e9-475f-8957-eadf18c36a31
    - text: 'For rows that are marked ineligible (eligible == False), the pipeline
        sets priority_score to 0.0. Enforce: for all rows where eligible is false,
        priority_score == 0.0.'
      sources:
      - start_line: 75
        end_line: 76
        file: ''
      uid: 6878b510-8a53-463f-a0f9-28c79b4faf17
    - text: 'For rows where eligible == True, priority_score equals the clipped sum
        of the computed base_priority and disorder_boost. Concretely: base_priority
        = 0.45*sleep_need_index + 0.20*bp_risk + 0.20*stress_norm + 0.15*sedentary_index,
        and priority_score == clip(base_priority + disorder_boost, 0.0, 1.0). This
        should be checked within a small numerical tolerance for floating-point arithmetic.'
      sources:
      - start_line: 67
        end_line: 73
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      uid: d733e9ff-0ea9-44c0-a7f5-071dee56fdec
    - text: 'When ''Sleep Disorder'' is present (not null), its value should be one
        of the expected disorder labels seen in the data (e.g., ''Sleep Apnea'' or
        ''Insomnia'') and those rows must have disorder_boost == 0.1. Enforce: NOT
        isNull(Sleep Disorder) => (Sleep Disorder IN {''Sleep Apnea'',''Insomnia''}
        AND disorder_boost == 0.1).'
      sources:
      - start_line: 56
        end_line: 58
        file: ''
      uid: 59add2df-92e5-41a8-9ba6-5b2021d9db7e
  '["Stress Level","stress_norm"]':
    code: []
    assumptions:
    - text: 'The column ''stress_norm'' is computed directly from ''Stress Level''
        using the formula: stress_norm == clip((Stress Level - 3.0) / 5.0, 0.0, 1.0).
        This must hold for every row (i.e., stress_norm is not an independently-populated
        column but a deterministic function of Stress Level). As a Deequ-style constraint
        this can be expressed as a row-level assertion such as: .satisfies("stress_norm
        == least(greatest((`Stress Level` - 3.0) / 5.0, 0.0), 1.0)") or equivalently
        checked by comparing computed values against the stored stress_norm.'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      uid: fb4ccf4f-7b62-4678-afc3-159963f63709
    - text: 'For Stress Level values within the business-mapping band [3, 8] (inclusive),
        stress_norm must equal the simple linear mapping without clipping: stress_norm
        == (Stress Level - 3.0) / 5.0. (Edge behaviour for values <3 or >8 is covered
        by the clipping rule above.) A corresponding constraint: .satisfies("(`Stress
        Level` >= 3 AND `Stress Level` <= 8) => stress_norm == (`Stress Level` - 3.0)
        / 5.0").'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      uid: 54484d83-e292-4a42-9ef9-208ea1a8252b
    - text: 'The eligibility flag must reflect the logical OR that includes stress_norm:
        whenever stress_norm > 0.5 the row must be marked eligible == True (because
        eligible is computed as (sleep_need_index > 0.25) OR (bp_risk >= 0.3) OR (stress_norm
        > 0.5)). Enforceable as a multi-column constraint: .satisfies("stress_norm
        > 0.5 => eligible == true").'
      sources:
      - start_line: 61
        end_line: 65
        file: ''
      uid: 05b9cebb-ed46-4c79-9844-4c5740117e1c
