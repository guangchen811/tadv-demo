    - text: 'For rows where eligible == False, ''priority_score'' must be exactly
        0.0. For rows where eligible == True, ''priority_score'' must equal the clipped
        sum of the base_priority and disorder_boost: priority_score == clip_0_1(0.45*sleep_need_index
        + 0.20*bp_risk + 0.20*stress_norm + 0.15*sedentary_index + disorder_boost).
        This is a row-level equality relation and can be enforced with two satisfies
        constraints (one for eligible False, one for eligible True) or a single conditional
        expression in Deequ, e.g.: .satisfies("(NOT eligible AND priority_score =
        0.0) OR (eligible AND priority_score = greatest(0.0, least(1.0, 0.45*sleep_need_index
        + 0.20*bp_risk + 0.20*stress_norm + 0.15*sedentary_index + disorder_boost)))").'
      sources:
