        end_line: 76
        file: ''
      uid: 415cd0f7-3ee1-475c-9d17-0bdde36bde2f
    - text: '''bp_risk'' must be consistent with the systolic/diastolic classification
        rules used to compute it. Specifically: if bp_risk == 1.0 then (bp_systolic
        >= 140 OR bp_diastolic >= 90); else if bp_risk == 0.7 then ((bp_systolic >=
        130 AND bp_systolic <= 139) OR (bp_diastolic >= 80 AND bp_diastolic <= 89));
        else if bp_risk == 0.3 then ((bp_systolic >= 120 AND bp_systolic <= 129) AND
        bp_diastolic < 80); else bp_risk == 0.0 and none of the above conditions hold.
        Also assert bp_risk is one of the allowed values {0.0, 0.3, 0.7, 1.0}. These
        are row-level logical constraints that can be expressed with Deequ .satisfies
        expressions or with a combination of .isContainedIn and conditional .satisfies.'
      sources:
      - start_line: 33
        end_line: 39
        file: ''
      uid: 5add8136-4ea8-411b-833d-dcde94171f64
    - text: '''disorder_boost'' must be 0.1 exactly when the ''Sleep Disorder'' column
        is non-null, and 0.0 when ''Sleep Disorder'' is null. Equivalently: disorder_boost
        in {0.0, 0.1} and disorder_boost == 0.1 <=> Sleep Disorder IS NOT NULL. In
        Deequ: .satisfies("(Sleep_Disorder IS NOT NULL AND disorder_boost = 0.1) OR
        (Sleep_Disorder IS NULL AND disorder_boost = 0.0)").'
      sources:
