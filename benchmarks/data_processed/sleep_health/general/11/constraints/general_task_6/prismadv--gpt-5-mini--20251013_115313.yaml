      - 8eaeae39-d313-41ab-b039-f13196f15366
      - 36d9bd27-dcb7-4a46-b688-ae6dd1a6be83
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IN (''Sleep Apnea'', ''Insomnia'')
        OR `Sleep Disorder` IS NULL THEN 1 ELSE 0 END", "Known Sleep Disorder Categories",
        lambda x: x >= 0.95)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 169fd37d-fac5-4e46-a78b-ef444c85bd85
      source_assumptions:
      - 7b281843-ce66-43fa-896b-93d9fc795ecd
    - suggestion: '.satisfies("CASE WHEN TRIM(COALESCE(`Sleep Disorder`, '''')) <>
        '''' THEN 1 ELSE 0 END", "Non-empty Sleep Disorder Strings", lambda x: x >=
        0.95)'
      validity: false
      reason_if_invalid: 'Constraint ''.satisfies("CASE WHEN TRIM(COALESCE(`Sleep
        Disorder`, '''')) <> '''' THEN 1 ELSE 0 END", "Non-empty Sleep Disorder Strings",
        lambda x: x >= 0.95)'' failed on data sample: Value: 0.41517857142857145 does
        not meet the constraint requirement!'
      level: warning
      uid: d14411ac-b4a8-4d4d-aef3-bd7adcb801eb
      source_assumptions:
      - 23da9412-b335-4dd5-a147-9649ef2172d1
    assumptions:
    - text: 'The ''Sleep Disorder'' column may contain NULL/missing values and the
        code treats any non-NULL value as indicating a disorder. In other words, presence
        (not the specific string) is used as a boolean flag. This means input data
        is allowed to have missing entries and the pipeline will treat non-null as
        True. Example deequ-like check: .satisfies("CASE WHEN `Sleep Disorder` IS
        NOT NULL THEN 1 ELSE 0 END", "Has Some Non-Null Sleep Disorder", lambda x:
        x > 0)'
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      uid: 8eaeae39-d313-41ab-b039-f13196f15366
    - text: "Non-NULL values of 'Sleep Disorder' are not inspected or parsed by downstream\
        \ logic \u2014 they are treated uniformly (every non-null value results in\
        \ the same boost). Therefore the code does not require a particular format\
        \ or parsing of the disorder strings; however it does rely on the distinction\
        \ between NULL and non-NULL. This can be represented as a validation that\
        \ non-null values exist and that the column is usable as a presence flag:\
        \ .satisfies(\"CASE WHEN `Sleep Disorder` IS NOT NULL THEN 1 ELSE 0 END\"\
        , \"Presence usable as flag\", lambda x: x > 0)"
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 36d9bd27-dcb7-4a46-b688-ae6dd1a6be83
    - text: 'Non-NULL values should be drawn from the expected set of disorder labels
        (based on observed data: ''Sleep Apnea'' and ''Insomnia''). Unexpected categories
        should be rare. Suggested deequ-like constraint: .satisfies("CASE WHEN `Sleep
        Disorder` IN (''Sleep Apnea'', ''Insomnia'') OR `Sleep Disorder` IS NULL THEN
        1 ELSE 0 END", "Known Sleep Disorder Categories", lambda x: x >= 0.95)'
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      uid: 7b281843-ce66-43fa-896b-93d9fc795ecd
    - text: 'When present (non-NULL), ''Sleep Disorder'' values should be non-empty,
        non-whitespace strings (so that presence is meaningful). Suggested deequ-like
        constraint: .satisfies("CASE WHEN TRIM(COALESCE(`Sleep Disorder`, '''')) <>
        '''' THEN 1 ELSE 0 END", "Non-empty Sleep Disorder Strings", lambda x: x >=
        0.95)'
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      uid: 23da9412-b335-4dd5-a147-9649ef2172d1
  Stress Level:
    code: []
    assumptions:
    - text: The derived column 'stress_norm' is computed directly from 'Stress Level'
        by ((Stress Level - 3.0) / 5.0) clipped to [0,1]. Therefore every row should
        satisfy stress_norm == min(max((Stress Level - 3.0) / 5.0, 0.0), 1.0) and
        stress_norm must be within [0.0, 1.0]. This yields a check that ties the two
        columns exactly (useful as a row-level equality constraint).
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      uid: 346a38d6-ac1c-4ea7-8ea9-19f16323b87e
    - text: 'Eligibility is defined as the boolean OR of three derived conditions:
        (sleep_need_index > 0.25) OR (bp_risk >= 0.3) OR (stress_norm > 0.5). Thus
        for every row the ''eligible'' column must equal that boolean expression computed
        from the three columns sleep_need_index, bp_risk and stress_norm.'
      sources:
      - start_line: 61
        end_line: 64
        file: ''
      uid: 618f9912-5b40-4cb9-979e-53be9c5e83c2
    - text: For rows where eligible is False, priority_score must be exactly 0.0.
        For rows where eligible is True, priority_score must equal clipped(base_priority
        + disorder_boost) where base_priority = 0.45*sleep_need_index + 0.20*bp_risk
        + 0.20*stress_norm + 0.15*sedentary_index and disorder_boost is 0.1 when 'Sleep
        Disorder' is present, otherwise 0.0. All priority_score values must be in
        [0.0, 1.0]. (This is a functional multi-column constraint across eligible,
        priority_score, sleep_need_index, bp_risk, stress_norm, sedentary_index and
        Sleep Disorder/disorder_boost.)
      sources:
      - start_line: 67
        end_line: 76
        file: ''
      - start_line: 56
        end_line: 58
        file: ''
      uid: b0868c53-705d-4817-b3d3-8136722dd61e
    - text: 'The ''bp_risk'' value is deterministically derived from bp_systolic and
        bp_diastolic with the following mapping: bp_risk == 1.0 if (bp_systolic >=
        140) OR (bp_diastolic >= 90); else bp_risk == 0.7 if ((bp_systolic between
        130 and 139) OR (bp_diastolic between 80 and 89)); else bp_risk == 0.3 if
        ((bp_systolic between 120 and 129) AND (bp_diastolic < 80)); else bp_risk
        == 0.0. Therefore every row must satisfy this logical relationship between
        bp_risk, bp_systolic and bp_diastolic.'
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      uid: feec5cce-49b4-4fa2-8179-84ac7e731651
    - text: Because stress_norm is compared to 0.5 when computing eligibility and
        Stress Level is an integer-like clinical score, the code implies that stress_norm
        > 0.5 <=> Stress Level > 5.5. Given integer Stress Level values, this effectively
        means stress_norm > 0.5 if and only if Stress Level >= 6. Enforce consistency
        between Stress Level and stress_norm around that threshold (useful for row-level
        checks and for interpreting which records are flagged eligible solely due
        to stress).
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      - start_line: 61
        end_line: 64
        file: ''
      uid: 564f69cc-c053-4f8b-9cde-08f5eea05999
    - text: 'The transformations on Sleep Duration require numeric values in a safe
        range: np.log(Sleep Duration - 2.99) requires Sleep Duration > 2.99, and np.sqrt(14.01
        - Sleep Duration) requires Sleep Duration <= 14.01. Therefore rows used by
        these derived fields (`sleep_log_edge` and `sleep_upper_headroom`) must have
        Sleep Duration in (2.99, 14.01].'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      uid: fa4b8fd9-3bd9-4e5d-bb8b-e164b36ce98a
    - text: 'Physical Activity Level and Daily Steps are later normalized and used
        in combination: pal_norm = Physical Activity Level / 100.0 and steps_norm
        = log1p(Daily Steps) / log(50001). The code defines expected ranges pal in
        [0,100] and steps in [0,50000]. Enforce that when both are non-null and used
        together (pair_mask_as), pal and Daily Steps fall within these ranges to ensure
        meaningful normalization and correlation computations.'
      sources:
      - start_line: 23
        end_line: 31
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: 96b4c44d-1fcf-4562-bb4e-9ecb5dd0469b
  '["Blood Pressure","bp_diastolic","bp_systolic"]':
    code: []
    assumptions:
    - text: 'The ''Blood Pressure'' column is formatted as two integer parts separated
        by a single ''/'' (e.g. ''120/80''). Every value must match the regex ''^\d+\/\d+$''
        so that splitting on ''/'' yields exactly two numeric strings that can be
        cast to int. Example actionable checks: .hasPattern(''Blood Pressure'', ''^\\d+\\/\\d+$'')
        and after split assert completeness of both parts.'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: cc03252e-763c-4815-8a48-e50c6da95d20
    - text: 'After splitting, both derived columns ''bp_systolic'' and ''bp_diastolic''
        must be present, non-null, and integer-castable for every record. Additionally
        they should be within physiological bounds and consistent with each other:
        bp_systolic in [70, 250], bp_diastolic in [30, 150], and bp_systolic >= bp_diastolic.
        Example Deequ-style checks: .isComplete([''bp_systolic'',''bp_diastolic'']),
        .hasMin(''bp_systolic'', 70), .hasMax(''bp_systolic'', 250), .hasMin(''bp_diastolic'',
        30), .hasMax(''bp_diastolic'', 150) and a multi-column check enforcing bp_systolic
        >= bp_diastolic (or assert no rows where bp_systolic < bp_diastolic).'
      sources:
      - start_line: 17
        end_line: 18
        file: ''
      - start_line: 34
        end_line: 39
        file: ''
      uid: 592e2fb1-1b77-4024-9c5b-c9df2c50ae62
    - text: 'The risk-category logic relies on both bp_systolic and bp_diastolic being
        valid numeric values simultaneously because categories use combined comparisons
        (e.g. stage2: sys >= 140 OR dia >= 90; stage1: sys in [130,139] OR dia in
        [80,89]; elevated: sys in [120,129] AND dia < 80). Therefore there must be
        no rows where one BP component is null/missing while the other is present.
        Example checks: .isComplete([''bp_systolic'',''bp_diastolic'']) and assert
        no rows violating the combined predicate semantics (e.g. no malformed pairs).'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      uid: a52e9ab6-737a-4270-adcb-4d23fc3e2439
    - text: 'The downstream scoring combines multiple normalized features into ''priority_score''.
        The contributing columns (''sleep_need_index'', ''bp_risk'', ''stress_norm'',
        ''sedentary_index'', ''disorder_boost'') must be numeric and lie in expected
        ranges so weighted sum behavior is meaningful. Specifically: sleep_need_index,
        bp_risk, stress_norm, sedentary_index should be in [0.0, 1.0]; disorder_boost
        should be small (expected values 0.0 or 0.1). Example checks: .isComplete([...])
        and .hasMin/Max for each (min 0.0, max 1.0) and .isContainedIn(''disorder_boost'',[0.0,0.1]).'
      sources:
      - start_line: 67
        end_line: 73
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      uid: 9eefd425-a750-4c13-99f0-b5aa1bf4dd55
    - text: 'Eligibility is computed via a logical OR across three derived columns
        ((sleep_need_index > 0.25) OR (bp_risk >= 0.3) OR (stress_norm > 0.5)). For
        this to be meaningful, the three source columns must all be present and comparable
        (numeric). In particular, bp_risk must use the expected categorical numeric
        scale (expected values include 0.0, 0.3, 0.7, 1.0). Example checks: .isComplete([''sleep_need_index'',''bp_risk'',''stress_norm''])
        and assert bp_risk is contained in the expected set or within [0.0,1.0].'
      sources:
      - start_line: 61
        end_line: 65
        file: ''
      - start_line: 36
        end_line: 39
        file: ''
      uid: ddfcf142-0b7c-46c8-ad6d-be877a3852ed
    - text: 'The output selection assumes the listed columns exist together: ''Person
        ID'', ''eligible'', ''priority_score'', ''sleep_need_index'', ''sedentary_index'',
        ''bp_risk'', and ''stress_norm''. All must be present to write the output
        without errors. Example check: .isComplete([...]) over the listed out_cols.'
      sources:
      - start_line: 79
        end_line: 83
        file: ''
      uid: af7725c2-a04a-4a54-af4c-2d02f973baa3
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.haveCompleteness(columns=[''Physical Activity Level'', ''Daily
        Steps''], assertion=lambda x: x == 1.0)'
