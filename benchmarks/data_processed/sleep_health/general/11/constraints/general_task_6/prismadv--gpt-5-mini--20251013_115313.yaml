    assumptions:
    - text: 'The parsed bp_systolic and bp_diastolic columns (derived from the ''Blood
        Pressure'' text column) must be non-null integers and logically consistent:
        for each record bp_systolic >= bp_diastolic. This enables the threshold comparisons
        used downstream (stage/elevated detection). Example Deequ-style constraint:
        .satisfies("bp_systolic >= bp_diastolic", ["bp_systolic", "bp_diastolic"])
        and require non-null: .isComplete(["bp_systolic","bp_diastolic"])'
      sources:
      - start_line: 14
        end_line: 18
        file: ''
      - start_line: 34
        end_line: 39
        file: ''
      uid: fa7cf9c3-a952-450b-ab65-5444db338c26
    - text: 'The numeric bp_risk value must be consistent with the systolic/diastolic
        thresholds used to compute it. Concretely, for every row: if bp_risk == 1.0
        then (bp_systolic >= 140 OR bp_diastolic >= 90); else if bp_risk == 0.7 then
        ((130 <= bp_systolic <= 139) OR (80 <= bp_diastolic <= 89)); else if bp_risk
        == 0.3 then (120 <= bp_systolic <= 129 AND bp_diastolic < 80); else bp_risk
        == 0.0. Example Deequ-style checks (one per branch): .satisfies("(bp_risk
        = 1.0) => (bp_systolic >= 140 OR bp_diastolic >= 90)", ["bp_risk","bp_systolic","bp_diastolic"])
        and similar for other branches; also enforce bp_risk is contained in the allowed
        set: .isContainedIn("bp_risk", [0.0, 0.3, 0.7, 1.0]).'
      sources:
      - start_line: 34
        end_line: 39
        file: ''
      uid: cdfb5af6-3db2-464b-8435-725d1943097e
    - text: 'The ''eligible'' boolean column must exactly reflect the logical OR of
        the three conditions used to compute it: (sleep_need_index > 0.25) OR (bp_risk
        >= 0.3) OR (stress_norm > 0.5). Example Deequ-style constraint: .satisfies("eligible
        = (sleep_need_index > 0.25 OR bp_risk >= 0.3 OR stress_norm > 0.5)", ["eligible","sleep_need_index","bp_risk","stress_norm"]).
        Also enforce ''eligible'' is boolean-like (only True/False).'
      sources:
      - start_line: 61
        end_line: 65
        file: ''
      uid: 9f90fb30-46a7-49f8-8491-46481b06be16
    - text: 'For rows marked ineligible (eligible == False), priority_score must be
        exactly 0.0. Conversely, if eligible == True, priority_score should be >=
        0.0 and <= 1.0. Example Deequ checks: .satisfies("(NOT eligible) => (priority_score
        = 0.0)", ["eligible","priority_score"]) and .isBetween("priority_score", 0.0,
        1.0).'
      sources:
      - start_line: 67
        end_line: 76
        file: ''
      uid: 5ce283df-6308-40e9-8aef-f188b5cab147
    - text: 'At least a minimal number of paired observations must exist for computing
        the Spearman correlation between ''Physical Activity Level'' and ''Daily Steps'':
        i.e., there should be >= 2 rows where both columns are non-null (preferably
        more for a stable estimate). Example check: require count(rows where Physical
        Activity Level IS NOT NULL AND Daily Steps IS NOT NULL) >= 2, implemented
        as a Deequ custom check or .satisfies("(count if (Physical Activity Level
        is not null AND Daily Steps is not null)) >= 2", ["Physical Activity Level","Daily
        Steps"]).'
