constraints:
  Age:
    code:
    - - .hasDataType('Age', 'Integral')
      - Invalid
    - - .isComplete('Age')
      - Valid
    - - .isLessThanOrEqualTo('Age', 120)
      - Invalid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .hasDataType('BMI Category', 'String')
      - Invalid
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasDataType('Blood Pressure', 'String')
      - Invalid
    - - .isComplete('Blood Pressure')
      - Valid
    - - .matchesPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')_regex_check
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .hasDataType('Daily Steps', 'Integral')
      - Invalid
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .hasDataType('Gender', 'String')
      - Invalid
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .hasDataType('Heart Rate', 'Integral')
      - Invalid
    - - .isComplete('Heart Rate')
      - Valid
    - - .isGreaterThanOrEqualTo('Heart Rate', 30)
      - Invalid
    - - .isLessThanOrEqualTo('Heart Rate', 200)
      - Invalid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .hasDataType('Occupation', 'String')
      - Invalid
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .hasDataType('Person ID', 'Integral')
      - Invalid
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .hasDataType('Physical Activity Level', 'Integral')
      - Invalid
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .hasDataType('Quality of Sleep', 'Integral')
      - Invalid
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGreaterThanOrEqualTo('Quality of Sleep', 1)
      - Invalid
    - - .isLessThanOrEqualTo('Quality of Sleep', 10)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .hasDataType('Sleep Disorder', 'String')
      - Invalid
    - - .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'], include_nulls=True)
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasDataType('Sleep Duration', 'Fractional')
      - Invalid
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isLessThanOrEqualTo('Sleep Duration', 24.0)
      - Invalid
    - - .isNonNegative('Sleep Duration')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .hasDataType('Stress Level', 'Integral')
      - Invalid
    - - .isComplete('Stress Level')
      - Valid
    - - .isGreaterThanOrEqualTo('Stress Level', 1)
      - Invalid
    - - .isLessThanOrEqualTo('Stress Level', 10)
      - Invalid
    assumptions: []
  id:
    code:
    - - .hasDataType('id', 'Integral')
      - Invalid
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
