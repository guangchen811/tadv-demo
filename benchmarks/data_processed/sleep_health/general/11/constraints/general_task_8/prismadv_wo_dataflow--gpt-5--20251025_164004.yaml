      - start_line: 103
        end_line: 106
        file: ''
      uid: 2c4ad6bb-e69a-4693-87b9-f3beb944dae2
    - text: 'Inputs used together for the sleep component must be jointly complete:
        ''Sleep Duration'' and ''Quality of Sleep'' should both be non-null on rows
        used to compute ''sleep_component'' to avoid propagating NaNs. Deequ example:
        satisfies(''(Sleep Duration IS NOT NULL) AND (Quality of Sleep IS NOT NULL)'',
        ''sleep_inputs_complete'').'
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      - start_line: 97
        end_line: 99
        file: ''
      uid: 521ed958-10ff-4518-b79f-2869f026be9d
    - text: 'Inputs used together for the activity component must be jointly complete:
        ''Daily Steps'' and ''Physical Activity Level'' should both be non-null on
        rows used to compute ''activity_component''. Deequ example: satisfies(''(Daily
        Steps IS NOT NULL) AND (Physical Activity Level IS NOT NULL)'', ''activity_inputs_complete'').'
      sources:
      - start_line: 29
        end_line: 31
        file: ''
      - start_line: 99
        end_line: 100
        file: ''
      uid: adec22af-11c6-4fef-9b5c-abeadd3473ae
    - text: 'Cardio component inputs must be jointly present when used: if both ''bp_sys''
        and ''bp_dia'' are non-null, then ''Heart Rate'' must also be non-null to
        compute ''cardio_component''. Deequ example: satisfies(''((bp_sys IS NULL)
        OR (bp_dia IS NULL)) OR (Heart Rate IS NOT NULL)'', ''hr_present_when_bp_present'').'
      sources:
      - start_line: 33
        end_line: 38
        file: ''
      uid: 32bd79d4-3e09-4133-99c3-7c6bdc5655b0
    - text: 'Sleep disorder mapping and stress normalization are used together in
        score adjustment; therefore, if ''Sleep Disorder'' is provided, it must be
        one of {''Insomnia'',''Sleep Apnea''} and ''Stress Level'' must be within
        the intended 3..10 scale. A combined compliance: satisfies(''(Sleep Disorder
        IS NULL) OR ((Sleep Disorder IN (\''Insomnia\'', \''Sleep Apnea\'')) AND (Stress
        Level BETWEEN 3 AND 10))'', ''disorder_domain_and_stress_scale'').'
      sources:
      - start_line: 40
        end_line: 41
        file: ''
      - start_line: 45
        end_line: 49
        file: ''
      - start_line: 53
        end_line: 54
        file: ''
      uid: a89f661c-a8b4-4cb3-a2d5-1d2bcccb3485
    - text: 'Per-person sleep disorder consistency: within each ''Person ID'', there
        should be at most one distinct non-null ''Sleep Disorder'' value across records
        (the code reduces to a per-person mode). This can be checked by grouping:
        for each Person ID, countDistinct(non-null ''Sleep Disorder'') <= 1.'
      sources:
      - start_line: 56
        end_line: 68
        file: ''
      - start_line: 71
        end_line: 81
        file: ''
      uid: 3e7401b7-c040-4b9d-989e-3cce6eac34fc
    - text: 'Final score adjustment should never increase the base score because it
        multiplies by a disorder factor <= 1 and subtracts a non-negative stress penalty.
        Enforce: ''sleep_wellness_score'' <= 100 * clip(0.5 * sleep_component + 0.2
        * activity_component + 0.3 * cardio_component, 0, 1). In Deequ on materialized
        columns: satisfies(''sleep_wellness_score <= score'', ''adjustment_does_not_increase_score'').'
      sources:
      - start_line: 51
        end_line: 54
        file: ''
      uid: 9c95d9b4-22ed-4894-a7dd-529ab31000fb
    - text: 'Weekly BP aggregates should be coherent: if either ''avg_systolic_bp''
        or ''avg_diastolic_bp'' is non-null, then both must be non-null and ''avg_systolic_bp''
        > ''avg_diastolic_bp''. Deequ example on weekly output: satisfies(''((avg_systolic_bp
        IS NULL) AND (avg_diastolic_bp IS NULL)) OR (avg_systolic_bp IS NOT NULL AND
        avg_diastolic_bp IS NOT NULL AND avg_systolic_bp > avg_diastolic_bp)'', ''weekly_bp_coherence'').'
      sources:
      - start_line: 56
        end_line: 68
        file: ''
      - start_line: 82
        end_line: 91
        file: ''
      - start_line: 103
        end_line: 106
        file: ''
      uid: 8e299a93-40ca-4e36-9654-7cd3bd68edd7
    - text: 'Demographics are assumed constant within a person over the aggregated
        period: for each ''Person ID'', ''Gender'' and ''Age'' should not vary across
        rows (aggregation uses ''first''). Constraint idea: per Person ID, countDistinct(Gender)=1
        and countDistinct(Age)=1.'
      sources:
