  '["Sleep Disorder","Stress Level"]':
    code:
    - suggestion: '.satisfies("((`Sleep Disorder` IS NULL) OR ((`Sleep Disorder` IN
        (''Insomnia'',''Sleep Apnea'')) AND (`Stress Level` BETWEEN 3 AND 10)))",
        "disorder_domain_and_stress_scale", assertion=lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
