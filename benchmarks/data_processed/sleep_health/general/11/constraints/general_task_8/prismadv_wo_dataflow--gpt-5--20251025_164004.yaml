      source_assumptions:
      - 52fd1bd7-818c-474c-af32-58fc0c8b6679
    assumptions:
    - text: The 'Blood Pressure' column is expected to be fully populated (no nulls)
        for all input rows, since it is split and converted to numbers without any
        missing-value handling. This can be validated as completeness('Blood Pressure')
        == 1.0.
      sources:
      - start_line: 17
        end_line: 19
        file: ''
      uid: 27687a8b-7a6b-43d9-bef7-9f344ddf9f63
    - text: Values in 'Blood Pressure' should be in the string format 'systolic/diastolic'
        with exactly one '/' delimiter and both sides numeric (optional whitespace
        is allowed), e.g., '120/80'. At least 95% of rows should match the regex '^\s*\d+(\.\d+)?\s*/\s*\d+(\.\d+)?\s*$'.
      sources:
      - start_line: 17
        end_line: 19
        file: ''
      uid: 6dbae586-4812-4418-aeeb-695a90eced5f
    - text: "After parsing, systolic and diastolic values should be plausible mmHg\
        \ magnitudes consistent with later thresholds: require systolic between 70\
        \ and 250 and diastolic between 40 and 150 for at least 95% of rows. This\
        \ aligns with the code\u2019s use of targets 120/80 and high-BP thresholds\
        \ 140/90."
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 103
        end_line: 106
        file: ''
      uid: b4795dc8-9b18-4e3c-a3a2-0d27dcd0fb30
    - text: "Systolic blood pressure should be greater than or equal to diastolic\
        \ blood pressure in at least 98% of rows (to avoid negative pulse pressure\
