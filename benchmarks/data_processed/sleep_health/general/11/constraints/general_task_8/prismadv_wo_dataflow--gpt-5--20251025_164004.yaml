    assumptions:
    - text: 'The ''Sleep Duration'' column must be numeric (castable to floating point)
        because it is used in arithmetic (subtraction, absolute value, division) and
        averaged. A suitable validation is to ensure all values can be cast to DOUBLE/float.
        Example (Deequ): .satisfies("CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL",
        "Sleep Duration is numeric", lambda x: x == 1.0). In Great Expectations: expect_column_values_to_be_of_type(''Sleep
        Duration'', ''float64'') or expect_column_values_to_be_in_type_list with [''float64'',''float32'',''int64'',''int32''].'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      uid: e421577f-7405-40ed-8c28-48ee021b1a79
    - text: 'The ''Sleep Duration'' column should be non-null for essentially all
        records (ideally 100%) to avoid NaNs propagating into the sleep components
        and to allow meaningful per-person means. Example (Deequ): .isComplete(''Sleep
        Duration'') or .satisfies("`Sleep Duration` IS NOT NULL", "Sleep Duration
        completeness", lambda x: x == 1.0).'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 61
        end_line: 61
        file: ''
      - start_line: 125
        end_line: 127
        file: ''
      uid: 67d80a99-d84c-4dce-993c-409db58e8d85
    - text: "The 'Sleep Duration' values represent hours (not minutes), aligned to\
        \ human sleep norms and thresholds used for recommendations (e.g., 7\u2013\
        9 hours). Enforce a hard domain of 0 to 24 hours. Example (Deequ): .satisfies(\"\
        `Sleep Duration` >= 0 AND `Sleep Duration` <= 24\", \"Sleep Duration in 0-24\
        \ hours\", lambda x: x == 1.0). In Great Expectations: expect_column_values_to_be_between('Sleep\
        \ Duration', min_value=0, max_value=24)."
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 84
        end_line: 84
        file: ''
      - start_line: 97
        end_line: 99
        file: ''
      uid: 884bf49f-7471-4c91-a673-c1edb8c0b465
    - text: 'Most ''Sleep Duration'' values should fall within a realistic adult range
        centered around 8 hours; at least 95% of values should be between 3 and 12
        hours. Example (Deequ): .satisfies("CASE WHEN `Sleep Duration` >= 3 AND `Sleep
        Duration` <= 12 THEN 1 ELSE 0 END", "Reasonable sleep duration band", lambda
        x: x >= 0.95). In Great Expectations: expect_column_values_to_be_between(''Sleep
        Duration'', 3, 12, mostly=0.95).'
      sources:
      - start_line: 21
        end_line: 21
        file: ''
      - start_line: 97
        end_line: 99
        file: ''
      uid: 1dc9b5b6-4052-4c12-abfe-51f23862d376
    - text: For the vast majority of persons, there should be at least one non-null
        'Sleep Duration' entry so that a per-person average ('avg_sleep_hours') can
        be computed and used in recommendations. A practical check is that the proportion
        of Person IDs with count_non_null('Sleep Duration') >= 1 is at least 0.95.
        This can be implemented by grouping by 'Person ID' and validating the share
        of groups with a positive non-null count.
      sources:
      - start_line: 56
        end_line: 68
        file: ''
      - start_line: 97
        end_line: 99
        file: ''
      - start_line: 125
        end_line: 127
        file: ''
      uid: 2eff2af9-f844-4ba0-86bf-63b8dde6d010
