        is non-null, then both ''bp_sys'' and ''bp_dia'' must be successfully parsed
        (non-null), and they must satisfy ''bp_sys'' >= ''bp_dia''. Also, ''pulse_pressure''
        must equal ''bp_sys'' - ''bp_dia'' and be non-negative. These can be expressed
        via conditional row-level rules, e.g., in Deequ: .satisfies("isnull(`Blood
        Pressure`) OR (NOT isnull(`bp_sys`) AND NOT isnull(`bp_dia`))", "bp_parsed"),
        .satisfies("isnull(`bp_sys`) OR isnull(`bp_dia`) OR `bp_sys` >= `bp_dia`",
        "bp_order"), and .satisfies("isnull(`pulse_pressure`) OR (`pulse_pressure`
        = `bp_sys` - `bp_dia` AND `pulse_pressure` >= 0)", "pulse_pressure_valid").'
      sources:
      - start_line: 17
        end_line: 20
        file: ''
      - start_line: 33
        end_line: 38
        file: ''
      uid: 0b69b7e7-1f6e-48c4-a240-731c0546c957
    - text: 'Weekly BP averages coherence: In the aggregated output, ''avg_systolic_bp''
        and ''avg_diastolic_bp'' should be either both null or both non-null for a
        person, and when present must satisfy ''avg_systolic_bp'' >= ''avg_diastolic_bp''.
        These can be enforced with row-level rules on the weekly dataset, e.g., in
        Deequ: .satisfies("(isnull(`avg_systolic_bp`) AND isnull(`avg_diastolic_bp`))
        OR (NOT isnull(`avg_systolic_bp`) AND NOT isnull(`avg_diastolic_bp`))", "avg_bp_null_sync")
        and .satisfies("isnull(`avg_systolic_bp`) OR isnull(`avg_diastolic_bp`) OR
        `avg_systolic_bp` >= `avg_diastolic_bp`", "avg_bp_order").'
      sources:
      - start_line: 65
        end_line: 66
        file: ''
      - start_line: 88
        end_line: 90
        file: ''
      - start_line: 103
        end_line: 105
        file: ''
      uid: 95e80950-f16e-4172-acee-634b98a0d213
    - text: 'Primary sleep disorder is one-per-person in weekly data: After aggregation,
        ''Person ID'' functionally determines ''Primary Sleep Disorder'' (at most
        one primary category per person, allowing null if no disorder reported). This
        can be enforced with Deequ: .hasFunctionalDependency(''Person ID'', ''Primary
        Sleep Disorder'').'
      sources:
      - start_line: 79
        end_line: 81
        file: ''
      - start_line: 82
        end_line: 91
        file: ''
      uid: 07b40122-c8fe-469e-a212-a9374b5032b9
  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: Sleep Duration and Quality of Sleep must both be present (non-null) and
        numeric in every record because they are combined arithmetically to compute
        sleep_component and later averaged and used in recommendations. This can be
        enforced as a multi-column row-level constraint such as Deequ .satisfies("`Sleep
        Duration` IS NOT NULL AND `Quality of Sleep` IS NOT NULL", assertion=1.0)
        and (optionally) a numeric check like .satisfies("isnan(cast(`Sleep Duration`
        as double)) = false AND isnan(cast(`Quality of Sleep` as double)) = false",
        assertion=1.0).
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      - start_line: 56
        end_line: 63
        file: ''
      - start_line: 97
        end_line: 99
        file: ''
      uid: da57d43c-c701-412a-a02e-3ecaae599d33
    - text: "Sleep Duration and Quality of Sleep are expected to be on compatible,\
        \ bounded scales as implied by their downstream transformations: Quality of\
        \ Sleep is an integer score on a 0\u201310 scale (divided by 10), and Sleep\
        \ Duration is a reasonable nightly duration centered around 8 hours, with\
        \ values outside 3\u201313 hours treated as fully penalized. Enforce jointly\
        \ with a multi-column predicate, e.g., Deequ .satisfies(\"`Quality of Sleep`\
        \ BETWEEN 0 AND 10 AND (`Quality of Sleep` % 1) = 0 AND `Sleep Duration` BETWEEN\
        \ 3 AND 13\", assertion=0.98) to allow a small tolerance for outliers."
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      uid: 922e5d72-c0b6-4b18-b864-a1a71ed386f4
    - text: In the aggregated weekly dataset, avg_sleep_hours and avg_sleep_quality
        must co-occur (both non-null) for any person included, since the recommendation
        logic evaluates both in the same condition. Enforce on the weekly output with
        a multi-column constraint such as Deequ .satisfies("`avg_sleep_hours` IS NOT
        NULL AND `avg_sleep_quality` IS NOT NULL", assertion=1.0).
      sources:
