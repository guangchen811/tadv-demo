        no leading/trailing whitespace if stored as strings). They should be parseable
        to integers without loss. Validate with a type check for integer types (e.g.,
        GE expect_column_values_to_be_in_type_list ['int64','int32']) or, if stored
        as strings, with a regex like '^[0-9]+$' plus a trimmed-equality check.
      sources:
      - start_line: 57
        end_line: 68
        file: ''
      - start_line: 79
        end_line: 81
        file: ''
      uid: 0d9329f2-973b-41a7-93e1-a3a696d17f4c
