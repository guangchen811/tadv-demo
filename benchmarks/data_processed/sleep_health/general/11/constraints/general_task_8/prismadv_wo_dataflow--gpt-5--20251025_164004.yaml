    assumptions:
    - text: 'Blood pressure components parsed from ''Blood Pressure'' must be jointly
        valid: when ''Blood Pressure'' is present and yields parsable numbers, both
        ''bp_sys'' and ''bp_dia'' must be non-null and numeric, with bp_sys > bp_dia
        (positive pulse pressure). This can be enforced as a compliance rule like:
        satisfies(''(bp_sys IS NOT NULL AND bp_dia IS NOT NULL) AND (bp_sys > bp_dia)'',
        ''bp_sys_gt_dia'').'
      sources:
      - start_line: 17
        end_line: 20
        file: ''
      - start_line: 33
        end_line: 38
