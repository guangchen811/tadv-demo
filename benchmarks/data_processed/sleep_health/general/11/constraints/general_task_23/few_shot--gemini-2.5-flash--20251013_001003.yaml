constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isIntegral('Age')
      - Invalid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'^\s*\d{2,3}\s*/\s*\d{2,3}\s*$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isIntegral('Daily Steps')
      - Invalid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - '.hasCompliance(''Heart Rate midband prop'', ''Heart Rate >= 50 AND Heart
        Rate <= 100'', lambda x: x >= 0.5)'
      - Invalid
    - - .isComplete('Heart Rate')
      - Valid
    - - .isGreaterThanOrEqualTo('Heart Rate', 20.0)
      - Invalid
    - - .isIntegral('Heart Rate')
      - Invalid
    - - .isLessThanOrEqualTo('Heart Rate', 200.0)
      - Invalid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isIntegral('Person ID')
      - Invalid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isIntegral('Physical Activity Level')
      - Invalid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGreaterThanOrEqualTo('Quality of Sleep', 1.0)
      - Invalid
    - - .isIntegral('Quality of Sleep')
      - Invalid
    - - .isLessThanOrEqualTo('Quality of Sleep', 10.0)
      - Invalid
    - - .isNonNegative('Quality of Sleep')
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda x: x > 0.1)'
      - Valid
    - - '.hasNumberOfDistinctValues(''Sleep Disorder'', lambda x: x >= 2)'
      - Invalid
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isGreaterThanOrEqualTo('Sleep Duration', 3.0)
      - Invalid
    - - .isLessThanOrEqualTo('Sleep Duration', 12.0)
      - Invalid
    - - .isNonNegative('Sleep Duration')
      - Invalid
    - - .isNumeric('Sleep Duration')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isGreaterThanOrEqualTo('Stress Level', 1.0)
      - Invalid
    - - .isIntegral('Stress Level')
      - Invalid
    - - .isLessThanOrEqualTo('Stress Level', 10.0)
      - Invalid
    - - .isNonNegative('Stress Level')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isIntegral('id')
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
