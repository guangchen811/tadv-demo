results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100'', ''PAL range 0-100'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies(''CAST(`Quality of Sleep` AS DOUBLE) IS NOT NULL'',
        ''QoS numeric'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Quality of Sleep` AS DOUBLE) = FLOOR(CAST(`Quality
        of Sleep` AS DOUBLE))'', ''QoS integer'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMin(''Quality of Sleep'', lambda m: m >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Quality of Sleep'', lambda m: m <= 10)'
      status: false
      reason_if_failed: 'Constraint ''.hasMax(''Quality of Sleep'', lambda m: m <=
        10)'' failed on data sample: Value: 90.0 does not meet the constraint requirement!'
      level: error
  BMI Category:
    code:
    - suggestion: '.satisfies("`BMI Category` IS NULL OR `BMI Category` IS NOT NULL",
        "BMI Category column must exist", lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''BMI Category'', [''Obese'',''Overweight'',''Normal'',''Normal
        Weight''], lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IS NULL THEN 1 WHEN `BMI Category`
        = TRIM(`BMI Category`) THEN 1 ELSE 0 END", "BMI labels unpadded", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\s*\d+\s*/\s*\d+\s*$'', lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Person ID` AS STRING) = trim(CAST(`Person ID`
        AS STRING))", "Person ID trimmed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.satisfies(''CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL'', ''Sleep
        Duration numeric parsable'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` > 0", "Sleep Duration > 0", lambda
        f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Sleep Duration'', lambda m: m <= 24)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Daily Steps` IS NOT NULL AND `Physical Activity Level`
        IS NOT NULL'', ''At least one row with steps and activity'', lambda x: x >=
        1)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (TRIM(`Sleep Disorder`)
        = '''') OR (TRIM(`Sleep Disorder`) IN (''Insomnia'',''Sleep Apnea''))", "Sleep
        Disorder domain (NULL/blank allowed; otherwise Insomnia or Sleep Apnea)",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Heart Rate` >= 30 AND `Heart Rate` <= 220", "Heart
        Rate in physiological range [30,220]", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Heart Rate` AS DOUBLE) = CAST(CAST(`Heart Rate`
        AS DOUBLE) AS BIGINT)", "Heart Rate is integer-like", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("(`Stress Level` IS NULL) OR ((CAST(`Stress Level` AS
        DOUBLE) >= 0) AND (CAST(`Stress Level` AS DOUBLE) <= 10))", "Stress Level
        within [0,10] when present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: '.satisfies("`Age` IS NULL OR `Age` IS NOT NULL", "Age column exists",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Age` IS NULL OR CAST(`Age` AS DOUBLE) IS NOT NULL",
        "Age is numeric or null", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Age` IS NULL OR CAST(`Age` AS DOUBLE) >= 0", "Age
        non-negative when present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
