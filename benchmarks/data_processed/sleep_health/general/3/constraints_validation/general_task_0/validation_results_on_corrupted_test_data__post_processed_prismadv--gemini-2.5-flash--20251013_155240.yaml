results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete("Physical Activity Level")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin("Physical Activity Level", lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax("Physical Activity Level", lambda x: x <= 100.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10",
        "Quality of Sleep valid range", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`Quality of Sleep` >= 0 AND `Quality
        of Sleep` <= 10", "Quality of Sleep valid range", lambda x: x == 1.0)'' failed
        on data sample: Value: 0.9 does not meet the constraint requirement!'
      level: error
  Blood Pressure:
    code:
    - suggestion: '.satisfies("CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', 1) AS
        INT) >= CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', -1) AS INT)", "Systolic
        Greater Equal Diastolic", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0",
        "Sleep Duration within expected range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR `Sleep Disorder`
        IN (''Insomnia'', ''Sleep Apnea'') THEN 1 ELSE 0 END", "Valid Sleep Disorder
        Values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: '.satisfies("`Stress Level` >= 1.0 AND `Stress Level` <= 10.0",
        "Stress Level within 1 to 10", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Blood Pressure","Daily Steps","Physical Activity Level","Quality of Sleep","Sleep
    Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.satisfies("`Blood Pressure` RLIKE ''^[0-9]+/[0-9]+$''", "Blood
        Pressure Format", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', 1) AS
        INT) >= CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', -1) AS INT)", "Systolic
        Greater Than Diastolic", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Stress Level'', ''Quality of Sleep'', lambda
        x: x <= -0.3)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation(''Stress Level'', ''Quality
        of Sleep'', lambda x: x <= -0.3)'' failed on data sample: Value: -0.11707330861307427
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Daily Steps` >= 0", "Daily Steps Non-Negative", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100", "Physical Activity Level Range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` = ''''
        OR `Sleep Disorder` = ''Insomnia'' OR `Sleep Disorder` = ''Sleep Apnea''",
        "Sleep Disorder Valid Values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        x: x >= 0.3)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.satisfies("`Quality of Sleep` / 10.0 - (1.0 - (`Stress Level`
        - 1.0) / 9.0) >= 0", "Stress Quality Relationship", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Stress Level` >= 7.3 AND `Quality of Sleep` < 6.0",
        "High Stress Low Quality Combination", lambda x: x <= 0.02)'
      status: true
      reason_if_failed: ''
      level: warning
