results:
  Age:
    code:
    - suggestion: '.hasMax(''Age'', lambda v: v <= 100)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Age'', lambda v: v >= 18)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .hasPattern('Blood Pressure', r'^\d{2,3}/\d{2,3}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.hasMin(''Daily Steps'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: .isContainedIn('Gender', ['Male', 'Female'])
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: '.hasMax(''Heart Rate'', lambda v: v <= 200)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Heart Rate'', lambda v: v >= 30)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Physical Activity Level:
    code:
    - suggestion: '.hasMax(''Physical Activity Level'', lambda v: v <= 100)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Physical Activity Level'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.hasMax(''Quality of Sleep'', lambda v: v <= 10)'
      status: false
      reason_if_failed: 'Constraint ''.hasMax(''Quality of Sleep'', lambda v: v <=
        10)'' failed on data sample: Value: 90.0 does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasMin(''Quality of Sleep'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda c: c <= 0.5)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .hasDataType('Sleep Duration', 'DoubleType')
      status: false
      reason_if_failed: 'Skipping data type constraint: .hasDataType(''Sleep Duration'',
        ''DoubleType'')'
      level: error
    - suggestion: '.hasMax(''Sleep Duration'', lambda v: v <= 24.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Sleep Duration'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: '.hasMax(''Stress Level'', lambda v: v <= 10)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Stress Level'', lambda v: v >= 1)'
      status: true
      reason_if_failed: ''
      level: error
  id:
    code:
    - suggestion: .isComplete('id')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('id')
      status: true
      reason_if_failed: ''
      level: error
