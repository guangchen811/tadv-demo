results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies(''`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100'', ''Physical Activity Level within 0-100'', lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10",
        "QoS within 0-10", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`Quality of Sleep` >= 0 AND `Quality
        of Sleep` <= 10", "QoS within 0-10", lambda x: x >= 0.99)'' failed on data
        sample: Value: 0.9 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(`Quality of Sleep` % 1) = 0", "QoS is integer-like",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\s*\\d+(\\.\\d+)?\\s*/\\s*\\d+(\\.\\d+)?\\s*$'',
        lambda x: x >= 0.95, ''BP format at least 95%'')'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(TRIM(split(`Blood Pressure`, ''/'')[0]) AS DOUBLE)
        BETWEEN 70 AND 250 AND CAST(TRIM(split(`Blood Pressure`, ''/'')[1]) AS DOUBLE)
        BETWEEN 40 AND 150", "BP plausible range >=95%", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(TRIM(split(`Blood Pressure`, ''/'')[0]) AS DOUBLE)
        >= CAST(TRIM(split(`Blood Pressure`, ''/'')[1]) AS DOUBLE)", "Systolic >=
        Diastolic >=98%", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(CAST(`Person ID` AS STRING)) = CAST(`Person ID`
        AS STRING) AND TRIM(CAST(`Person ID` AS STRING)) RLIKE ''^[0-9]+$'' AND CAST(TRIM(CAST(`Person
        ID` AS STRING)) AS BIGINT) >= 0", "Person ID integer-like non-negative", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS DOUBLE) >= 0 AND CAST(`Sleep
        Duration` AS DOUBLE) <= 24", "Sleep Duration in 0-24 hours", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS DOUBLE) >= 3 AND CAST(`Sleep
        Duration` AS DOUBLE) <= 12", "Reasonable sleep duration band (3-12h)", lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('`Daily Steps`')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Daily Steps` BETWEEN 0 AND 20000'', ''Plausible daily
        steps range'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Insomnia'', ''Sleep Apnea''],
        lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Disorder` IS NULL OR `Sleep Disorder` = TRIM(`Sleep
        Disorder`)'', ''No leading/trailing whitespace in Sleep Disorder'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR (LENGTH(TRIM(`Sleep Disorder`))
        > 0 AND UPPER(TRIM(`Sleep Disorder`)) NOT IN (''NA'', ''NAN'', ''NONE'', ''NULL'',
        ''UNKNOWN'', ''NULLVALUE''))", "No placeholder strings used for null Sleep
        Disorder", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Heart Rate'', lambda x: x >= 30)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Heart Rate'', lambda x: x <= 220)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Heart Rate` >= 40 AND `Heart Rate` <= 120'', ''Heart
        Rate typical range 95pct'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("`Stress Level` IS NULL OR CAST(`Stress Level` AS DOUBLE)
        IS NOT NULL", "Stress Level numeric parseable", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Stress Level` IS NULL OR (`Stress Level` >= 0 AND
        `Stress Level` <= 10)", "Stress Level within 0-10", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Stress Level` BETWEEN 3 AND 10", "Stress Level mostly
        3-10", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Stress Level'', lambda c: c >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Stress Level` IS NULL OR (`Stress Level` = FLOOR(`Stress
        Level`))", "Stress Level mostly integers", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Age'', lambda m: m >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Age'', lambda m: m <= 120)'
      status: true
      reason_if_failed: ''
      level: error
  '["Age","Person ID"]':
    code:
    - suggestion: '.satisfies("`Heart Rate` IS NOT NULL AND regexp_like(`Blood Pressure`,
        ''^[0-9]+\\s*/\\s*[0-9]+$'')", "cardio_inputs_complete", assertion=lambda
        v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("regexp_like(`Blood Pressure`, ''^[0-9]+\\s*/\\s*[0-9]+$'')
        AND CAST(split(`Blood Pressure`, ''/'')[0] AS DOUBLE) >= CAST(split(`Blood
        Pressure`, ''/'')[1] AS DOUBLE)", "bp_ordering", assertion=lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","Heart Rate"]':
    code:
    - suggestion: '.satisfies("(`Blood Pressure` RLIKE ''^[0-9]{2,3}/[0-9]{2,3}$'')
        AND CAST(split(`Blood Pressure`, ''/'')[0] AS DOUBLE) IS NOT NULL AND CAST(split(`Blood
        Pressure`, ''/'')[1] AS DOUBLE) IS NOT NULL AND CAST(split(`Blood Pressure`,
        ''/'')[0] AS DOUBLE) > 0 AND CAST(split(`Blood Pressure`, ''/'')[1] AS DOUBLE)
        > 0 AND CAST(split(`Blood Pressure`, ''/'')[0] AS DOUBLE) > CAST(split(`Blood
        Pressure`, ''/'')[1] AS DOUBLE)", "Valid BP format, positive parts, and systolic
        > diastolic", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(CAST(split(`Blood Pressure`, ''/'')[0] AS DOUBLE)
        - CAST(split(`Blood Pressure`, ''/'')[1] AS DOUBLE)) BETWEEN 10 AND 120",
        "Physiological pulse pressure range (10..120 mmHg)", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS DOUBLE) BETWEEN
        80 AND 220 AND CAST(split(`Blood Pressure`, ''/'')[1] AS DOUBLE) BETWEEN 40
        AND 140 AND `Heart Rate` BETWEEN 40 AND 200 AND CAST(split(`Blood Pressure`,
        ''/'')[0] AS DOUBLE) > CAST(split(`Blood Pressure`, ''/'')[1] AS DOUBLE)",
        "Cardio inputs within adult physiological ranges and consistent", lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies("(`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100) AND (`Daily Steps` >= 0)", "activity_inputs_valid", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        c: c >= 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT ((`Daily Steps` >= 10000) AND (`Physical Activity
        Level` < 20))", "no_high_steps_low_pal", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("NOT ((`Physical Activity Level` >= 80) AND (`Daily
        Steps` < 8000))", "no_high_pal_low_steps", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Gender:
    code:
    - suggestion: '.satisfies("TRIM(`Gender`) IN (''Male'', ''Female'')", "Gender
        allowed set", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Sleep Disorder","Stress Level"]':
    code:
    - suggestion: '.satisfies("((`Sleep Disorder` IS NULL) OR ((`Sleep Disorder` IN
        (''Insomnia'',''Sleep Apnea'')) AND (`Stress Level` BETWEEN 3 AND 10)))",
        "disorder_domain_and_stress_scale", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
