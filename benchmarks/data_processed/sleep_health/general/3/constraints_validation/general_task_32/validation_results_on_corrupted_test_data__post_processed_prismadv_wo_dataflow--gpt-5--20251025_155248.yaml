results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 120'', ''PAL within expected range [0,120]'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(`Quality of Sleep` >= 1 AND `Quality of Sleep` <=
        10)'', ''QoS range 1-10'', lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(`Quality of Sleep` >= 1 AND `Quality
        of Sleep` <= 10)'', ''QoS range 1-10'', lambda v: v == 1.0)'' failed on data
        sample: Value: 0.9 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''(`Quality of Sleep` >= 4 AND `Quality of Sleep` <=
        9)'', ''QoS 4-9 mostly'', lambda v: v >= 0.95)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(`Quality of Sleep` >= 4 AND `Quality
        of Sleep` <= 9)'', ''QoS 4-9 mostly'', lambda v: v >= 0.95)'' failed on data
        sample: Value: 0.9 does not meet the constraint requirement!'
      level: warning
  BMI Category:
    code:
    - suggestion: '.isContainedIn(''BMI Category'', [''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\d{1,3}/\d{1,3}$'', lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''cast(split(`Blood Pressure`, "/")[0] as int) BETWEEN
        70 AND 250 AND cast(split(`Blood Pressure`, "/")[1] as int) BETWEEN 40 AND
        150'', ''BP plausible range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Person ID` >= 0'', ''Non-negative Person IDs'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`Person ID` AS STRING) NOT IN (\''NullValue\'',\''null\'',\''NULL\'',\''NaN\'',\''nan\'')'',
        ''No sentinel nulls in Person ID'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Sleep Duration'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Sleep Duration'', lambda x: x <= 24.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxQuantile(''Sleep Duration'', 0.025, lambda q: q >= 3.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasApproxQuantile(''Sleep Duration'', 0.975, lambda q: q <= 12.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isNonNegative(''`Daily Steps`'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Daily Steps` <= 15000 OR `Daily Steps` IS NULL)'',
        ''Daily Steps <= 15000 for >=95%'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Daily Steps` IS NULL OR CAST(`Daily Steps` AS DOUBLE)
        = FLOOR(CAST(`Daily Steps` AS DOUBLE)))'', ''Daily Steps are whole numbers
        (>=99%)'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IS NOT
        NULL", "Sleep Disorder column exists", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL THEN 1 WHEN TRIM(`Sleep
        Disorder`) IN (''Insomnia'',''Sleep Apnea'') THEN 1 ELSE 0 END", "Sleep Disorder
        domain (trimmed)", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Heart Rate` >= 30 AND `Heart Rate` <= 220'', ''Heart
        Rate plausible adult range'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''cast(`Stress Level` as double) IS NOT NULL'', ''Stress
        Level castable to double'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Stress Level` >= 0 AND `Stress Level` <= 10'', ''Stress
        Level within 0-10'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: '.satisfies("`Age` >= 18 AND `Age` <= 100", "Age in [18, 100]",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Age","BMI Category","Blood Pressure","Daily Steps","Heart Rate","Person ID","Physical
    Activity Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.hasCompleteness(''Quality of Sleep'', lambda x: x == 1.0)

        .hasCompleteness(''Stress Level'', lambda x: x == 1.0)

        .hasCompleteness(''Sleep Duration'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(`Quality of Sleep` as double) is not null and
        cast(`Stress Level` as double) is not null and cast(`Sleep Duration` as double)
        is not null", "recovery_inputs_castable", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(`Daily Steps` as double) >= 0 and cast(`Physical
        Activity Level` as double) >= 0", "activity_inputs_nonneg", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Blood Pressure` rlike ''^[0-9]{2,3}/[0-9]{2,3}$''",
        "bp_format_valid", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) > cast(split(`Blood
        Pressure`, ''/'')[1] as int) and cast(split(`Blood Pressure`, ''/'')[0] as
        int) between 70 and 250 and cast(split(`Blood Pressure`, ''/'')[1] as int)
        between 40 and 150", "bp_parse_and_range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies("0 <= (0.7 * least(greatest(cast(`Daily Steps` as double),
        0), 15000)/15000 + 0.3 * least(greatest(cast(`Physical Activity Level` as
        double), 0), 120)/120) AND (0.7 * least(greatest(cast(`Daily Steps` as double),
        0), 15000)/15000 + 0.3 * least(greatest(cast(`Physical Activity Level` as
        double), 0), 120)/120) <= 1", "activity_index_in_0_1", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN cast(`Daily Steps` as double) < 5000 THEN
        (0.7 * least(greatest(cast(`Daily Steps` as double), 0), 15000)/15000 + 0.3
        * least(greatest(cast(`Physical Activity Level` as double), 0), 120)/120)
        < 0.6 ELSE true END", "low_steps_implies_index_below_0_6", lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("cast(`Daily Steps` as double) >= 0 AND cast(`Daily
        Steps` as double) <= 15000 AND cast(`Physical Activity Level` as double) >=
        0 AND cast(`Physical Activity Level` as double) <= 120", "steps_pal_within_expected_ranges",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
