results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .satisfies('`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9',
        'Valid Range for Quality of Sleep')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''`Quality of Sleep` >= 4 AND `Quality
        of Sleep` <= 9'', ''Valid Range for Quality of Sleep'')'' failed on data sample:
        Value: 0.9 does not meet the constraint requirement!'
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .satisfies('`Blood Pressure` RLIKE "^[0-9]+/[0-9]+$"', 'Valid Blood
        Pressure Format')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CAST(SPLIT(`Blood Pressure`, "/")[0] AS INT) >= 0 AND
        CAST(SPLIT(`Blood Pressure`, "/")[1] AS INT) >= 0', 'Non-Negative Blood Pressure
        Values')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: undefined
  Sleep Duration:
    code:
    - suggestion: .satisfies('`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0',
        'Valid Sleep Duration Range for Normalization')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies(''CASE WHEN `Sleep Disorder` IS NOT NULL THEN 1 ELSE
        0 END'', ''Null Sleep Disorder Values'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: '.satisfies(''CASE WHEN `Sleep Disorder` IN ("Insomnia", "Sleep
        Apnea") THEN 1 ELSE 0 END'', ''Valid Sleep Disorder Categories'', lambda x:
        x >= 0.415)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN `Sleep Disorder` IN ("Insomnia",
        "Sleep Apnea") THEN 1 ELSE 0 END'', ''Valid Sleep Disorder Categories'', lambda
        x: x >= 0.415)'' failed on data sample: Value: 0.41333333333333333 does not
        meet the constraint requirement!'
      level: undefined
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Stress Level'', lambda x: x < float(''inf'')).hasMax(''Stress
        Level'', lambda x: x > float(''-inf''))'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies(''(`BMI Category` IN ("Normal", "Normal Weight", "Overweight",
        "Obese"))'', ''Valid BMI Category'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(`Sleep Disorder` IN ("Insomnia", "Sleep Apnea"))'',
        ''Valid Sleep Disorder'', lambda x: x >= 0.415)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''(`Sleep Disorder` IN ("Insomnia",
        "Sleep Apnea"))'', ''Valid Sleep Disorder'', lambda x: x >= 0.415)'' failed
        on data sample: Value: 0.41333333333333333 does not meet the constraint requirement!'
      level: warning
  '["BP_DIA","BP_SYS"]':
    code:
    - suggestion: '.satisfies("`Blood Pressure` RLIKE ''^[0-9]+/[0-9]+$''", "Blood
        Pressure Format", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["BP_DIA","BP_SYS","Blood Pressure"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `Blood Pressure` REGEXP ''^[0-9]+/[0-9]+$''
        THEN 1 ELSE 0 END", "Valid Blood Pressure Format", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["RiskAlert","RiskReasons","SleepHealthIndex"]':
    code:
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Blood Pressure'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        x: True)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Person ID` > 0', 'Positive Person ID')
      status: true
      reason_if_failed: ''
      level: error
  '["Person ID","RiskAlert"]':
    code:
    - suggestion: .satisfies('`Person ID` > 0', 'Person ID Positive Check')
      status: true
      reason_if_failed: ''
      level: error
  '["Person ID","SleepHealthIndex"]':
    code:
    - suggestion: '.satisfies(''`Blood Pressure` IS NOT NULL AND `Blood Pressure`
        RLIKE "^[0-9]+/[0-9]+$"'', ''Valid Blood Pressure Format'', lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Person ID` > 0'', ''Positive Person ID'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        x: x >= 0.2)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation(''Sleep Duration'', ''Quality
        of Sleep'', lambda x: x >= 0.2)'' failed on data sample: Value: 0.0901457765412394
        does not meet the constraint requirement!'
      level: warning
    - suggestion: .satisfies('`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0',
        'Sleep Duration Range')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9',
        'Quality of Sleep Range')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''`Quality of Sleep` >= 4 AND `Quality
        of Sleep` <= 9'', ''Quality of Sleep Range'')'' failed on data sample: Value:
        0.9 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.hasStandardDeviation(''Sleep Duration'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Quality of Sleep'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.hasCorrelation(''Stress Level'', ''Quality of Sleep'', lambda
        x: -1 <= x <= 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9',
        'Quality of Sleep within expected range')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''`Quality of Sleep` >= 4 AND `Quality
        of Sleep` <= 9'', ''Quality of Sleep within expected range'')'' failed on
        data sample: Value: 0.9 does not meet the constraint requirement!'
      level: warning
    - suggestion: .satisfies('`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0',
        'Sleep Duration within expected range')
      status: true
      reason_if_failed: ''
      level: warning
