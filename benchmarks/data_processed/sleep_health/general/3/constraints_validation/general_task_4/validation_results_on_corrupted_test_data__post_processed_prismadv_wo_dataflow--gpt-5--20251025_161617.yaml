results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''ABS(CAST(`Physical Activity Level` AS DOUBLE)) < 1E12'',
        ''PAL finite'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("`Quality of Sleep` IS NOT NULL AND CAST(`Quality of
        Sleep` AS DOUBLE) IS NOT NULL", "QoS non-null and numeric", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9",
        "QoS in [4,9]", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`Quality of Sleep` >= 4 AND `Quality
        of Sleep` <= 9", "QoS in [4,9]", lambda x: x == 1.0)'' failed on data sample:
        Value: 0.9 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.isContainedIn("Quality of Sleep", ["4", "5", "6", "7", "8", "9"],
        lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.isContainedIn("Quality of Sleep", ["4", "5",
        "6", "7", "8", "9"], lambda x: x == 1.0)'' failed on data sample: Value: 0.9
        does not meet the constraint requirement!'
      level: warning
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`BMI Category` = TRIM(`BMI Category`) AND `BMI Category`
        IN (''Normal'',''Normal Weight'',''Overweight'',''Obese'')", "BMI Category
        trimmed and exact match", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.satisfies("`Blood Pressure` RLIKE ''^[[:space:]]*[0-9]+[[:space:]]*/[[:space:]]*[0-9]+[[:space:]]*$''",
        ''BP format'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) BETWEEN
        70 AND 250 AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT) BETWEEN 40 AND
        150", ''BP plausible mmHg range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: '.satisfies(''CAST(`Person ID` AS BIGINT) IS NOT NULL'', ''Person
        ID integer-like'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isPositive(''`Person ID`'', lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Person ID'', lambda m: m <= 1000000)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`Sleep Duration` AS DOUBLE) >= 3.0 AND CAST(`Sleep
        Duration` AS DOUBLE) <= 12.0'', ''Sleep Duration in [3,12] hours'', lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative(''`Daily Steps`'', lambda f: f == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (`Sleep Disorder` IN
        (''Insomnia'',''Sleep Apnea''))", "Sleep Disorder in allowed set (ignoring
        nulls)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea'') THEN 1 ELSE 0 END", "Share of recognized Sleep Disorder labels",
        lambda x: x >= 0.30)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Stress Level'', ''Quality of Sleep'', lambda
        c: c <= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies("(`BMI Category` IN (''Normal'',''Normal Weight'',''Overweight'',''Obese''))
        AND (0.0 <= 0.5 * (CASE WHEN `BMI Category` = ''Overweight'' THEN 0.10 WHEN
        `BMI Category` = ''Obese'' THEN 0.20 ELSE 0.0 END) + 0.5 * (CASE WHEN `Sleep
        Disorder` = ''Insomnia'' THEN 0.20 WHEN `Sleep Disorder` = ''Sleep Apnea''
        THEN 0.30 ELSE 0.05 END)) AND (0.5 * (CASE WHEN `BMI Category` = ''Overweight''
        THEN 0.10 WHEN `BMI Category` = ''Obese'' THEN 0.20 ELSE 0.0 END) + 0.5 *
        (CASE WHEN `Sleep Disorder` = ''Insomnia'' THEN 0.20 WHEN `Sleep Disorder`
        = ''Sleep Apnea'' THEN 0.30 ELSE 0.05 END) <= 1.0)", "valid_bmi_sleepDisorder_penalty_total",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea''))", "sleep_disorder_null_or_allowed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
