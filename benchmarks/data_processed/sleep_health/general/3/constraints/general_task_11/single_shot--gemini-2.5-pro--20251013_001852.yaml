constraints:
  Age:
    code:
    - - .hasDataType('Age', ConstrainableDataTypes.Integral)
      - Valid
    - - .isBetween('Age', 18, 100)
      - Invalid
    assumptions: []
  BMI Category:
    code:
    - - .isContainedIn('BMI Category', ['Normal', 'Overweight', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', r'^\\d{2,3}/\\d{2,3}$')
      - Invalid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isPositive('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isBetween('Heart Rate', 40, 120)
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isPositive('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isBetween('Quality of Sleep', 1, 10)
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasDataType('Sleep Duration', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isBetween('Sleep Duration', 4.0, 12.0)
      - Invalid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .isBetween('Stress Level', 1, 10)
      - Invalid
    assumptions: []
