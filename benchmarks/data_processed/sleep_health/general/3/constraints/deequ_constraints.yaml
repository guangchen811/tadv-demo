constraints:
  Age:
    code:
    - - .isComplete("Age")
      - Valid
    - - .isContainedIn("Age", ["43", "38", "44", "32", "50", "45", "53", "39", "33",
        "37", "30", "36", "49", "57", "52", "42", "31", "59", "35", "28", "41", "29",
        "48", "58", "54", "55", "51"])
      - Valid
    - - '.isContainedIn("Age", ["43", "38", "44", "32", "50", "45", "53", "39", "33",
        "37", "30", "36", "49", "57", "52", "42", "31", "59", "35", "28", "41"], lambda
        x: x >= 0.86, "It should be above 0.86!")'
      - Valid
    - - .isNonNegative("Age")
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete("BMI Category")
      - Valid
    - - .isContainedIn("BMI Category", ["Normal", "Overweight", "Normal Weight", "Obese"])
      - Valid
    - - '.isContainedIn("BMI Category", ["Normal", "Overweight"], lambda x: x >= 0.88,
        "It should be above 0.88!")'
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete("Blood Pressure")
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete("Daily Steps")
      - Valid
    - - .isNonNegative("Daily Steps")
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete("Gender")
      - Valid
    - - .isContainedIn("Gender", ["Female", "Male"])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete("Heart Rate")
      - Valid
    - - .isNonNegative("Heart Rate")
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .isComplete("Occupation")
      - Valid
    - - '.isContainedIn("Occupation", ["Doctor", "Nurse", "Engineer", "Lawyer", "Accountant",
        "Teacher", "Salesperson"], lambda x: x >= 0.94, "It should be above 0.94!")'
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete("Person ID")
      - Valid
    - - .isNonNegative("Person ID")
      - Invalid
    - - .isUnique("Person ID")
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete("Physical Activity Level")
      - Valid
    - - .isNonNegative("Physical Activity Level")
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete("Quality of Sleep")
      - Valid
    - - '.isContainedIn("Quality of Sleep", ["8", "6", "7", "9"], lambda x: x >= 0.95,
        "It should be above 0.95!")'
      - Valid
    - - .isNonNegative("Quality of Sleep")
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness("Sleep Disorder", lambda x: x >= 0.33, "It should be above
        0.33!")'
      - Valid
    - - .isContainedIn("Sleep Disorder", ["Sleep Apnea", "Insomnia"])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete("Sleep Duration")
      - Valid
    - - .isNonNegative("Sleep Duration")
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete("Stress Level")
      - Valid
    - - .isContainedIn("Stress Level", ["4", "5", "8", "3", "7", "6"])
      - Valid
    - - '.isContainedIn("Stress Level", ["4", "5", "8", "3", "7"], lambda x: x >=
        0.87, "It should be above 0.87!")'
      - Valid
    - - .isNonNegative("Stress Level")
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete("id")
      - Valid
    - - .isNonNegative("id")
      - Valid
    - - .isUnique("id")
      - Valid
    assumptions: []
