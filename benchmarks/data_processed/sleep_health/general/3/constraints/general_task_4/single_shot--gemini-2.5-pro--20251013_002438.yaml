constraints:
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .compliesWithPattern('Blood Pressure', r'^\\d+/\\d+$')
      - Invalid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isNonNegative('Person ID')
      - Invalid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isContainedIn('Quality of Sleep', [4, 5, 6, 7, 8, 9])
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Insomnia', 'Sleep
        Apnea')", 'Sleep Disorder must be null or one of the known disorders')
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isPositive('Sleep Duration')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isContainedIn('Stress Level', [3, 4, 5, 6, 7, 8])
      - Invalid
    assumptions: []
