constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    - - .patternMatch('Blood Pressure', r'^[0-9]{2,3}/[0-9]{2,3}$')
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isLessThanOrEqualTo('Daily Steps', 50000)
      - Invalid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - '.hasNumberOfDistinctValues(''Gender'', lambda x: x == 2)'
      - Invalid
    - - .isComplete('Gender')
      - Valid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isNonNegative('Person ID')
      - Invalid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isLessThanOrEqualTo('Physical Activity Level', 100)
      - Invalid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGreaterThanOrEqualTo('Quality of Sleep', 4)
      - Invalid
    - - .isLessThanOrEqualTo('Quality of Sleep', 9)
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isGreaterThan('Sleep Duration', 3.0)
      - Invalid
    - - .isLessThanOrEqualTo('Sleep Duration', 14.0)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isGreaterThanOrEqualTo('Stress Level', 3)
      - Invalid
    - - .isLessThanOrEqualTo('Stress Level', 8)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isNonNegative('id')
      - Valid
    assumptions: []
