    assumptions:
    - text: 'The input must contain a column named ''Sleep Disorder'' because the
        code directly accesses it to compute a boost flag. We could represent this
        as: Deequ: hasColumn("Sleep Disorder"); Great Expectations: expect_column_to_exist("Sleep
        Disorder").'
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      uid: 7b30ad2c-d1aa-4b1b-a940-fca3ede2b40f
    - text: 'Missingness is allowed and should be represented as true null/NA values
        recognized by pandas (not placeholder strings). Any placeholder tokens like
        ''Unknown'', ''N/A'', ''NA'', ''None'', ''null'', or empty string must not
        appear as non-null values, otherwise rows will be incorrectly treated as having
        a disorder. We could represent this as: Deequ: .satisfies("CASE WHEN `Sleep
        Disorder` IS NULL OR lower(trim(`Sleep Disorder`)) NOT IN (''unknown'',''n/a'',''na'',''none'',''null'','''')
        THEN 1 ELSE 0 END", "No placeholder tokens in Sleep Disorder", lambda x: x
        == 1); Great Expectations: expect_column_values_to_not_match_regex_list with
        regexes for ^\s*$, ^(?i)(unknown|n/?a|none|null)$.'
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      uid: 77bca705-1b26-4ee0-9186-1d2219c756b4
    - text: 'When present (non-null), ''Sleep Disorder'' values should be categorical
        labels from the known set {''Insomnia'', ''Sleep Apnea''}. To allow gradual
        taxonomy changes, require that at least 95% of non-null values are within
        this set. We could represent this as: Deequ: .satisfies("CASE WHEN `Sleep
        Disorder` IS NULL OR `Sleep Disorder` IN (''Insomnia'',''Sleep Apnea'') THEN
        1 ELSE 0 END", "Valid disorder labels", lambda x: x >= 0.95); Great Expectations:
        expect_column_values_to_be_in_set with mostly=0.95 on non-null values.'
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      uid: 3a33c922-3b6f-43f2-88f6-b5a3d490fc01
    - text: "To prevent unexpected category explosion, the number of distinct non-null\
        \ values in 'Sleep Disorder' should be small (based on current data \u2248\
        2). Cap non-null distinct values at 3. We could represent this as: Deequ:\
        \ .where(\"`Sleep Disorder` IS NOT NULL\").approxCountDistinct(\"Sleep Disorder\"\
        ) <= 3; Great Expectations: expect_column_unique_value_count_to_be_between(min_value=1,\
        \ max_value=3) evaluated on non-null values."
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      uid: de349cb3-8d93-4cde-8e60-6f24cafbc779
    - text: "Based on current data characteristics (completeness \u2248 0.415), expect\
        \ the non-null ratio (completeness) of 'Sleep Disorder' to fall within a broad\
        \ band, e.g., between 0.25 and 0.60. We could represent this as: Deequ: hasCompleteness(\"\
        Sleep Disorder\", lambda v: v >= 0.25 and v <= 0.60); Great Expectations:\
        \ expect_column_values_to_not_be_null with mostly between 0.25 and 0.60."
      sources:
      - start_line: 57
        end_line: 58
        file: ''
      uid: f463d302-960f-4a67-ad01-7f82f8e1ef53
    - text: '''Sleep Disorder'' should be stored as a string/categorical type (object
        in pandas). We could represent this as: Deequ: hasDataType("Sleep Disorder",
        ConstrainableDataTypes.String); Great Expectations: expect_column_values_to_be_in_type_list
        with allowed types ["object", "string"].'
      sources:
      - start_line: 57
        end_line: 58
