    assumptions:
    - text: 'The ''Stress Level'' column must be non-null for all rows. It is used
        to compute ''stress_norm'' and then consumed in eligibility and priority calculations;
        nulls would propagate NaNs into ''priority_score'' or incorrectly exclude
        members from eligibility checks. We could represent this assumption as a deequ
        constraint like: .satisfies("`Stress Level` IS NOT NULL", "Stress Level not
        null", lambda x: x == 1.0) or .hasCompleteness("Stress Level", lambda x: x
        == 1.0).'
      sources:
      - start_line: 54
        end_line: 55
        file: ''
      - start_line: 61
        end_line: 65
        file: ''
      - start_line: 68
        end_line: 72
        file: ''
      uid: 55dd660c-dee4-4d5c-884a-f5775e6b805d
    - text: 'The ''Stress Level'' column must be numeric (preferably integer-coded).
        The code performs arithmetic ((`Stress Level` - 3.0) / 5.0); non-numeric values
        would raise errors or produce invalid results. We could represent this as:
        deequ .satisfies("CAST(`Stress Level` AS DOUBLE) IS NOT NULL", "Stress Level
        numeric", lambda x: x == 1.0) and optionally enforce integrality with .satisfies("FLOOR(`Stress
        Level`) = `Stress Level`", "Stress Level integral", lambda x: x == 1.0).'
      sources:
      - start_line: 54
        end_line: 54
        file: ''
      uid: 5cf420f8-3c63-4600-8a01-80af64daf34a
    - text: 'The ''Stress Level'' values are expected to be within the inclusive range
        [3, 8]. The normalization maps 3 -> 0 and 8 -> 1 and clips anything outside
        this range; values outside the range indicate unexpected input. We could represent
        this as: deequ .satisfies("`Stress Level` BETWEEN 3 AND 8", "Stress Level
        range [3,8]", lambda x: x == 1.0) or Great Expectations expect_column_values_to_be_between(min_value=3,
        max_value=8, strict_min=False, strict_max=False).'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
      uid: eda115ca-8ff9-4312-b3c4-c7ae1fb3b167
    - text: 'Operationally, ''Stress Level'' should be a 6-point discrete scale with
        allowed values {3, 4, 5, 6, 7, 8}. This aligns the input to the business scale
        implied by the normalization and avoids unintended clipping or fractional
        encodings. We could represent this as: deequ .satisfies("CASE WHEN `Stress
        Level` IN (3,4,5,6,7,8) THEN 1 ELSE 0 END", "Stress Level allowed set", lambda
        x: x == 1.0) or Great Expectations expect_column_values_to_be_in_set([3,4,5,6,7,8]).'
      sources:
      - start_line: 53
        end_line: 55
        file: ''
