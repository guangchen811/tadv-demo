  '["Blood Pressure","Quality of Sleep","Sleep Duration","Stress Level"]':
    code: []
    assumptions:
    - text: 'Column ''Blood Pressure'' must be a two-part string ''systolic/diastolic''
        that splits cleanly into two integers, where systolic > diastolic. This enables
        safe creation and downstream use of ''bp_systolic'' and ''bp_diastolic'' and
        correct bp_risk staging. Deequ-style example: .satisfies("size(split(`Blood
        Pressure`, ''/'')) = 2 and cast(split(`Blood Pressure`, ''/'')[0] as int)
        is not null and cast(split(`Blood Pressure`, ''/'')[1] as int) is not null
        and cast(split(`Blood Pressure`, ''/'')[0] as int) > cast(split(`Blood Pressure`,
        ''/'')[1] as int)", 1.0)'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      - start_line: 34
        end_line: 39
        file: ''
      uid: d506f0a1-b414-4b47-9f0e-99650744fb4f
    - text: 'Columns ''Sleep Duration'' and ''Quality of Sleep'' must jointly be present
        and within operational ranges required by downstream math: Sleep Duration
        > 2.99 and < 14.01 (to keep log and sqrt defined) AND Quality of Sleep is
        an integer within [3, 9]. Deequ-style example: .satisfies("`Sleep Duration`
        > 2.99 and `Sleep Duration` < 14.01 and `Quality of Sleep` >= 3 and `Quality
        of Sleep` <= 9", 1.0)'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 42
        end_line: 46
        file: ''
      uid: 371f8cdf-ba64-4999-b27d-af8143b4595c
    - text: 'Any record whose ''Blood Pressure'' falls into elevated or hypertensive
        categories must be marked eligible. Formally, if systolic >= 140 OR diastolic
        >= 90 OR (130 <= systolic <= 139) OR (80 <= diastolic <= 89) OR (120 <= systolic
        <= 129 AND diastolic < 80), then eligible == true. Deequ-style example: .satisfies("(cast(split(`Blood
        Pressure`, ''/'')[0] as int) >= 140 or cast(split(`Blood Pressure`, ''/'')[1]
        as int) >= 90 or (cast(split(`Blood Pressure`, ''/'')[0] as int) between 130
        and 139) or (cast(split(`Blood Pressure`, ''/'')[1] as int) between 80 and
        89) or ((cast(split(`Blood Pressure`, ''/'')[0] as int) between 120 and 129)
        and cast(split(`Blood Pressure`, ''/'')[1] as int) < 80)) implies (`eligible`
        = true)", 1.0)'
      sources:
      - start_line: 36
        end_line: 39
        file: ''
      - start_line: 61
        end_line: 65
        file: ''
      uid: d8064e0a-7cb2-4c53-8f4f-375af9e74204
    - text: 'Records that are low-risk across all four inputs should be ineligible
        and have zero priority: if 7 <= Sleep Duration <= 9 AND Quality of Sleep >=
        8 AND Stress Level <= 5 AND (''Blood Pressure'' systolic < 120 AND diastolic
        < 80), then eligible == false AND priority_score == 0. Deequ-style example:
        .satisfies("((`Sleep Duration` >= 7 and `Sleep Duration` <= 9) and `Quality
        of Sleep` >= 8 and `Stress Level` <= 5 and cast(split(`Blood Pressure`, ''/'')[0]
        as int) < 120 and cast(split(`Blood Pressure`, ''/'')[1] as int) < 80) implies
        (`eligible` = false and `priority_score` = 0.0)", 1.0)'
      sources:
      - start_line: 42
        end_line: 46
        file: ''
      - start_line: 54
        end_line: 54
        file: ''
      - start_line: 36
        end_line: 39
        file: ''
      - start_line: 61
        end_line: 77
        file: ''
      uid: fa629a12-6967-4b73-bb42-0aee636084e0
  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'Daily Steps and Physical Activity Level must be simultaneously non-null
        (co-presence) for every record, since they are used together for correlation
        and to compute sedentary_index. We could represent this as a Deequ constraint:
        .satisfies(''`Daily Steps` IS NOT NULL AND `Physical Activity Level` IS NOT
        NULL'', assertion=1.0)'
      sources:
      - start_line: 23
        end_line: 31
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: 63ad688e-efad-4493-acf9-1ec012bf37f2
    - text: 'Domain bounds must hold jointly: Daily Steps in [0, 50000] and Physical
        Activity Level in [0, 100] for all rows, ensuring valid normalization and
        log1p usage. We could represent this as a Deequ constraint: .satisfies(''`Daily
        Steps` >= 0 AND `Daily Steps` <= 50000 AND `Physical Activity Level` >= 0
        AND `Physical Activity Level` <= 100'', assertion=1.0)'
      sources:
      - start_line: 25
        end_line: 29
        file: ''
      - start_line: 49
        end_line: 51
        file: ''
      uid: 988761f0-915b-4ae2-82e1-fd0378d56b87
    - text: 'Activity measures should be positively associated: the correlation between
        Daily Steps and Physical Activity Level should be non-negative (expected positive).
        In Deequ (using Pearson as a proxy), this can be checked with: .hasCorrelation(''Daily
        Steps'', ''Physical Activity Level'', _ >= 0.0)'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      uid: 9ffa396b-c8d3-4a6b-9ec4-8f18ad693647
    - text: "The normalized activity blend must lie within [0, 1] for every row: (0.5\
        \ * log1p(Daily Steps) / log(50001)) + (0.5 * Physical Activity Level / 100)\
        \ \u2208 [0, 1]. This ensures the computed sedentary_index = 1 - blend stays\
        \ well-defined without relying on clipping. Deequ example: .satisfies('(0.5\
        \ * (log1p(`Daily Steps`) / log(50001))) + (0.5 * (`Physical Activity Level`\
        \ / 100.0)) >= 0 AND (0.5 * (log1p(`Daily Steps`) / log(50001))) + (0.5 *\
        \ (`Physical Activity Level` / 100.0)) <= 1', assertion=1.0)"
      sources:
      - start_line: 49
        end_line: 51
        file: ''
      uid: 3ea7a9ec-b1d3-4c32-b903-f24623636912
  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Rows must have both ''Sleep Duration'' and ''Quality of Sleep'' present
        (non-null) together, since ''sleep_need_index'' depends on both. This can
        be enforced with a compliance constraint that the pairwise completeness is
        1.0 (e.g., in Deequ: Compliance("sleep_inputs_present", "`Sleep Duration`
        IS NOT NULL AND `Quality of Sleep` IS NOT NULL", 1.0)).'
      sources:
      - start_line: 41
        end_line: 46
        file: ''
      uid: 77e0a22d-a5e0-4c68-84c0-6ae99b291ac0
    - text: '''sleep_need_index'' must be a deterministic function of ''Sleep Duration''
        and ''Quality of Sleep'' exactly as computed in the code. A compliance check
        can assert equality (within a small epsilon) to: least(greatest(0.6 * least((case
        when `Sleep Duration` < 7 then 7 - `Sleep Duration` when `Sleep Duration`
        > 9 then `Sleep Duration` - 9 else 0 end) / 4.0, 1.0) + 0.4 * (1 - least(greatest((least(greatest(`Quality
        of Sleep`, 6), 9) - 6) / 3.0, 0.0), 1.0)), 0.0), 1.0).'
      sources:
      - start_line: 41
        end_line: 46
        file: ''
      uid: 1cb4d76e-b281-450e-b499-20af2c526219
    - text: 'If ''Sleep Duration'' is within the recommended band [7, 9] and ''Quality
        of Sleep'' is at least 9, then ''sleep_need_index'' must be exactly 0. In
        Deequ, a compliance rule: NOT((`Sleep Duration` BETWEEN 7 AND 9) AND (`Quality
        of Sleep` >= 9)) OR (`sleep_need_index` = 0.0).'
      sources:
      - start_line: 41
        end_line: 46
        file: ''
      uid: 5dd8f90a-b14f-4901-af21-126cab6ecb16
    - text: 'If ''Sleep Duration'' is within [7, 9], then ''sleep_need_index'' must
        be at most 0.4 (since the duration deficit term is zero and only the QoS term
        contributes). Compliance: NOT(`Sleep Duration` BETWEEN 7 AND 9) OR (`sleep_need_index`
        <= 0.4).'
      sources:
      - start_line: 41
        end_line: 46
        file: ''
      uid: 0d1cf971-deec-4ce8-9772-5cd36a45fd31
    - text: 'If ''Sleep Duration'' is within [7, 9] and ''Quality of Sleep'' is at
        most 6 (clipped to the lower bound in the formula), then ''sleep_need_index''
        must be exactly 0.4. Compliance: NOT((`Sleep Duration` BETWEEN 7 AND 9) AND
        (`Quality of Sleep` <= 6)) OR (`sleep_need_index` = 0.4).'
      sources:
      - start_line: 41
        end_line: 46
        file: ''
      uid: bf6373df-93f5-4613-a722-cbc2fc118c24
