        Blood Pressure) column. If SBP is less than DBP, the derived ''PP'' (Pulse
        Pressure) would be negative, which is not physiologically typical and might
        indicate data quality issues.

        We could represent this assumption as a deequ constraint like this:

        .isGreaterThanOrEqualTo("SBP", "DBP")'
