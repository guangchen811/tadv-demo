    assumptions:
    - text: The `sleep_debt` column is functionally derived from `Sleep Duration`
        by calculating `8.0 - Sleep Duration` and then clipping the result to the
        range [-2.0, 5.0]. Subsequently, `sleep_debt_pos` is functionally derived
        from `sleep_debt` by taking the maximum of `sleep_debt` and 0.0. This assumes
        that `Sleep Duration` is a numerical column, and consequently, `sleep_debt`
        values are expected to be within [-2.0, 5.0] and `sleep_debt_pos` values are
        expected to be non-negative.
      sources:
      - start_line: 36
        end_line: 39
        file: ''
      uid: e9375a36-5fd9-4531-afba-753400caea93
    - text: For the correlation and linear regression analysis between 'Sleep Duration'
        and 'Quality of Sleep' to be meaningful and avoid `np.nan` results, both columns
        are assumed to contain numerical values and possess sufficient variance (i.e.,
        not be constant across all records). If either column has zero standard deviation,
        the correlation coefficient and subsequent regression parameters will be undefined
        or non-meaningful for predictive purposes.
      sources:
      - start_line: 42
        end_line: 51
        file: ''
      uid: 63e12b05-657e-4e3b-8dbc-f0c06d1ab68f
    - text: The `sleep_risk` column is computed as a weighted sum of `sleep_debt_index`
        (derived from `sleep_debt_pos`) and `resid_index` (derived from `restfulness_residual`).
        It is assumed that `sleep_debt_pos` and `restfulness_residual` are numerical,
        and their scaled versions (`sleep_debt_index`, `resid_index` via `scale01`)
        are within the expected range of [0, 1] for accurate aggregation into `sleep_risk`.
      sources:
      - start_line: 86
        end_line: 89
        file: ''
      uid: 38c7b9c1-6f45-4fd3-a0ef-adc97b9b2102
    - text: The `risk_score` column aggregates multiple component indices including
        `bp_index`, `bmi_risk`, `age_index`, `stress_index`, `hr_index`, `sleep_risk`,
        `activity_protect`, and `apnea_component`. It is assumed that all these component
        columns are numerical and consistently scaled (typically to [0, 1]) to allow
        for a meaningful weighted sum that represents an aggregate risk, prior to
        the final clipping to [0.0, 1.0].
      sources:
      - start_line: 109
        end_line: 119
        file: ''
      uid: 1638cfe8-d2be-4d19-9145-1e32dc8c65d8
    - text: When sorting the output by `prioritized_for_outreach`, `risk_score`, and
        `Person ID`, it is assumed that `Person ID` uniquely identifies each record.
        This ensures a stable and deterministic sort order, especially when `prioritized_for_outreach`
        and `risk_score` values are identical across multiple records.
      sources:
      - start_line: 127
        end_line: 128
        file: ''
      uid: e5aa54fd-caa4-49ab-b6c3-0682e0931126
