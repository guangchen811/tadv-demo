        than zero). If either column contains only constant values, the correlation
        and subsequent regression coefficients will be undefined (NaN), leading to
        NaN values in the derived ''restfulness_residual'' column.

        We could represent this assumption as a deequ constraint like this:

        .hasMinStandardDeviation("Sleep Duration", 0.001)

        .hasMinStandardDeviation("Quality of Sleep", 0.001)'
