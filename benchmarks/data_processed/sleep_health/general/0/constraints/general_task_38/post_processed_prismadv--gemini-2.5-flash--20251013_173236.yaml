    assumptions:
    - text: For every record, the 'SBP' (Systolic Blood Pressure) value is expected
        to be strictly greater than the 'DBP' (Diastolic Blood Pressure) value. This
        ensures that the derived 'PP' (Pulse Pressure) is always a positive value,
        which is clinically consistent.
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      uid: b9eb5561-884d-46f7-a466-dc74a2fccd25
    - text: Both 'Sleep Duration' and 'Quality of Sleep' columns are assumed to have
        a standard deviation greater than zero. This is essential for computing a
        meaningful correlation and subsequent regression, which are used to derive
        'restfulness_residual'. If either column lacks variance, the correlation coefficient
        will be NaN, potentially invalidating the derived feature.
      sources:
      - start_line: 42
        end_line: 51
        file: ''
      uid: 4ee2411a-b8e7-442d-8714-ff5b831d7ffd
    - text: Both 'Daily Steps' and 'Physical Activity Level' columns are assumed to
        have a standard deviation greater than zero. This is essential for computing
        a meaningful correlation and subsequent regression, which are used to derive
        'activity_blend'. If either column lacks variance, the correlation coefficient
        will be NaN, potentially invalidating the derived feature.
      sources:
      - start_line: 54
        end_line: 63
        file: ''
      uid: c51ef036-bb93-47cb-8431-262c97de9774
    - text: When a record indicates 'Sleep Apnea' in the 'Sleep Disorder' column,
        it is assumed that the corresponding 'BMI Category' column contains a valid,
        non-null category such as 'Normal', 'Overweight', or 'Obese'. This ensures
        that the `apnea_component` calculation can accurately reflect the combined
        risk factors of sleep apnea and BMI status.
      sources:
      - start_line: 97
        end_line: 106
        file: ''
      uid: 0f36c7a8-8c86-4306-bca8-f7b1a8816cee
    - text: All columns used as components to calculate the final 'risk_score' (namely
        'bp_index', 'bmi_risk', 'age_index', 'stress_index', 'hr_index', 'sleep_risk',
        'activity_protect', and 'apnea_component') are assumed to be non-null for
        every record. The presence of null values in any of these components will
        propagate and result in a null 'risk_score', which can lead to incomplete
        or inaccurate prioritization.
      sources:
      - start_line: 109
        end_line: 118
        file: ''
      uid: 20816ece-0c54-48b8-99d2-e22d728744f0
    - text: The 'Person ID' column is assumed to contain unique values across all
        records. This uniqueness is critical for ensuring a stable and deterministic
        sorting order when multiple records share the same 'prioritized_for_outreach'
        status and 'risk_score', as 'Person ID' serves as the final tie-breaker.
      sources:
      - start_line: 127
        end_line: 128
        file: ''
