constraints:
  Age:
    code:
    - - .isComplete("Age")
      - Valid
    - - .isLessThanOrEqualTo("Age", 100.0)
      - Invalid
    - - .isNonNegative("Age")
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete("BMI Category")
      - Valid
    - - .isContainedIn("BMI Category", ["Normal", "Normal Weight", "Overweight", "Obese"])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete("Blood Pressure")
      - Valid
    - - .satisfies("Blood Pressure RLIKE '[0-9]+/[0-9]+'", "Blood Pressure format
        check")
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete("Daily Steps")
      - Valid
    - - .isNonNegative("Daily Steps")
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete("Gender")
      - Valid
    - - .isContainedIn("Gender", ["Male", "Female"])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete("Heart Rate")
      - Valid
    - - .isGreaterThanOrEqualTo("Heart Rate", 40.0)
      - Invalid
    - - .isLessThanOrEqualTo("Heart Rate", 120.0)
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .isComplete("Occupation")
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete("Person ID")
      - Valid
    - - .isNonNegative("Person ID")
      - Invalid
    - - .isUnique("Person ID")
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete("Physical Activity Level")
      - Valid
    - - .isNonNegative("Physical Activity Level")
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete("Quality of Sleep")
      - Valid
    - - .isGreaterThanOrEqualTo("Quality of Sleep", 4.0)
      - Invalid
    - - .isLessThanOrEqualTo("Quality of Sleep", 9.0)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .hasCompleteness("Sleep Disorder", 0.4)
      - Invalid
    - - .isContainedIn("Sleep Disorder", ["Insomnia", "Sleep Apnea"])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete("Sleep Duration")
      - Valid
    - - .isGreaterThanOrEqualTo("Sleep Duration", 3.0)
      - Invalid
    - - .isLessThanOrEqualTo("Sleep Duration", 12.0)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete("Stress Level")
      - Valid
    - - .isGreaterThanOrEqualTo("Stress Level", 3.0)
      - Invalid
    - - .isLessThanOrEqualTo("Stress Level", 8.0)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete("id")
      - Valid
    - - .isNonNegative("id")
      - Valid
    - - .isUnique("id")
      - Valid
    assumptions: []
