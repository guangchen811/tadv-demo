constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - '.hasNumberOfDistinctValues(''BMI Category'', lambda x: x == 4)'
      - Invalid
    - - .isComplete('BMI Category')
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - '.hasNumberOfDistinctValues(''Gender'', lambda x: x == 2)'
      - Invalid
    - - .isComplete('Gender')
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - '.hasNumberOfDistinctValues(''Occupation'', lambda x: x == 10)'
      - Invalid
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasNumberOfDistinctValues(''Sleep Disorder'', lambda x: x >= 0)'
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isNonNegative('Sleep Duration')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isNonNegative('Stress Level')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
