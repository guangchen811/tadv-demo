constraints:
  Age:
    code:
    - - .isComplete('Age').isGreaterThanOrEqualTo('Age', 0).isLessThanOrEqualTo('Age',
        120)
      - Invalid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category').isContainedIn('BMI Category', ['Normal','Normal
        Weight','Overweight','Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  DBP:
    code:
    - - .isComplete('DBP').isGreaterThanOrEqualTo('DBP', 30).isLessThanOrEqualTo('DBP',
        160)
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps').isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender').isContainedIn('Gender', ['Male','Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate').isGreaterThanOrEqualTo('Heart Rate', 30).isLessThanOrEqualTo('Heart
        Rate', 220)
      - Invalid
    assumptions: []
  MAP:
    code:
    - - .isComplete('MAP').isGreaterThanOrEqualTo('MAP', 30).isLessThanOrEqualTo('MAP',
        200)
      - Invalid
    assumptions: []
  PP:
    code:
    - - .isGreaterThanOrEqualTo('PP', 0)
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - '.isUnique(''Person ID'').hasApproxCountDistinct(''Person ID'', lambda x:
        x >= 200)'
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level').isGreaterThanOrEqualTo('Physical Activity
        Level', 0).isLessThanOrEqualTo('Physical Activity Level', 100)
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep').isGreaterThanOrEqualTo('Quality of Sleep',
        0).isLessThanOrEqualTo('Quality of Sleep', 10)
      - Invalid
    assumptions: []
  SBP:
    code:
    - - .isComplete('SBP').isGreaterThanOrEqualTo('SBP', 50).isLessThanOrEqualTo('SBP',
        250)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.4).isContainedIn(''Sleep
        Disorder'', [''Sleep Apnea'',''Insomnia''])'
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration').isGreaterThanOrEqualTo('Sleep Duration', 0.0).isLessThanOrEqualTo('Sleep
        Duration', 24.0)
      - Invalid
    assumptions: []
  activity_protect:
    code:
    - - .isComplete('activity_protect').isGreaterThanOrEqualTo('activity_protect',
        0.0).isLessThanOrEqualTo('activity_protect', 1.0)
      - Invalid
    assumptions: []
  age_index:
    code:
    - - .isGreaterThanOrEqualTo('age_index', 0.0).isLessThanOrEqualTo('age_index',
        1.0)
      - Invalid
    assumptions: []
  apnea_component:
    code:
    - - .isNonNegative('apnea_component')
      - Invalid
    assumptions: []
  bmi_risk:
    code:
    - - .isGreaterThanOrEqualTo('bmi_risk', 0.0).isLessThanOrEqualTo('bmi_risk', 1.0)
      - Invalid
    assumptions: []
  bp_index:
    code:
    - - .isGreaterThanOrEqualTo('bp_index', 0.0).isLessThanOrEqualTo('bp_index', 1.0)
      - Invalid
    assumptions: []
  hr_index:
    code:
    - - .isGreaterThanOrEqualTo('hr_index', 0.0).isLessThanOrEqualTo('hr_index', 1.0)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isUnique('id')
      - Valid
    assumptions: []
  prioritized_for_outreach:
    code:
    - - .isComplete('prioritized_for_outreach').isContainedIn('prioritized_for_outreach',
        [True, False])
      - Invalid
    assumptions: []
  risk_score:
    code:
    - - .isComplete('risk_score').isGreaterThanOrEqualTo('risk_score', 0.0).isLessThanOrEqualTo('risk_score',
        1.0)
      - Invalid
    assumptions: []
  sleep_debt:
    code:
    - - .isGreaterThanOrEqualTo('sleep_debt', -2.0).isLessThanOrEqualTo('sleep_debt',
        5.0)
      - Invalid
    assumptions: []
  sleep_debt_pos:
    code:
    - - .isNonNegative('sleep_debt_pos')
      - Invalid
    assumptions: []
  sleep_risk:
    code:
    - - .isGreaterThanOrEqualTo('sleep_risk', 0.0).isLessThanOrEqualTo('sleep_risk',
        1.0)
      - Invalid
    assumptions: []
  stress_index:
    code:
    - - .isGreaterThanOrEqualTo('stress_index', 0.0).isLessThanOrEqualTo('stress_index',
        1.0)
      - Invalid
    assumptions: []
