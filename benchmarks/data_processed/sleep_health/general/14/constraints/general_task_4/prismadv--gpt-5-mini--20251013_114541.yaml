    - text: 'Values in ''Sleep Duration'' are interpreted as hours and should be non-negative
        and within a plausible human range (e.g., 0 to 24). The code compares Sleep
        Duration against numeric thresholds (e.g., < 5.5) and normalizes by subtracting
        3.0 and dividing by 9.0, so extreme or negative values would be semantically
        incorrect. Example constraint:

        .satisfies(''CASE WHEN `Sleep Duration` BETWEEN 0 AND 24 THEN 1 ELSE 0 END'',
        ''sleep_duration_plausible_hours'', lambda x: x >= 0.99)

        (Adjust bounds or required fraction as needed.)'
