      uid: 3fe1b2fa-7098-48ca-8c66-dc73f3a858ad
    - text: 'To ensure the normalization and synergy computation behave as intended
        (avoid NaNs from sqrt and produce non-negative normalized values), the pipeline
        expects typical Sleep Duration values >= 3.0 (so duration_norm = (Sleep Duration
        - 3.0)/9.0 is >= 0). For the normalization to fall roughly in [0,1] the practical
        expected upper bound is ~12.0 hours. You can enforce this as a soft constraint
        (e.g., >=95% of rows):

        .satisfies(''CASE WHEN `Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0
        THEN 1 ELSE 0 END'', ''sleep_duration_within_expected_norm_range'', lambda
        x: x >= 0.95)

        If you cannot guarantee this for all rows, at minimum ensure a large fraction
        meet it so sqrt(qos_norm * duration_norm) and the synergy formula behave stably.'
