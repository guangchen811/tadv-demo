        \ in the interval [3.0, 12.0] (so (Sleep Duration - 3.0)/9.0 \u2208 [0,1])\
        \ and 'Quality of Sleep' should be in the interval [4.0, 9.0] (so (Quality\
        \ of Sleep - 4.0)/5.0 \u2208 [0,1]). This ensures the normalization behaves\
        \ as intended and that later clipping/interpretation is consistent."
      sources:
      - start_line: 31
        end_line: 32
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: 4aa5de07-62a3-4302-b730-c2446a9dda1d
    - text: The product of the normalized values ( (Sleep Duration - 3.0)/9.0 * (Quality
        of Sleep - 4.0)/5.0 ) must be >= 0 on every row. The code computes np.sqrt(qos_norm
        * duration_norm) without guarding against negative products, so the product
        must be non-negative to avoid NaNs/complex results.
      sources:
      - start_line: 31
        end_line: 32
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: 61130937-e738-4542-8048-5057cb01cd8b
    - text: Both 'Sleep Duration' and 'Quality of Sleep' should have more than one
        distinct value across the dataset so that correlation calculation is meaningful.
        The script computes corr(Sleep Duration, Quality of Sleep) and uses it to
        adjust weights; if either column is constant the correlation is undefined
        or zero and the calibration is invalid.
      sources:
      - start_line: 27
        end_line: 27
        file: ''
      - start_line: 60
        end_line: 62
        file: ''
      uid: aa2c93d9-39fa-4bab-a617-47fd67d35e32
    - text: Higher values in both 'Sleep Duration' and 'Quality of Sleep' indicate
        better sleep (same directionality). The code normalizes both with offsets
        that map higher raw values to higher normalized scores, uses them together
        in a synergy score, and uses thresholds (Sleep Duration < 5.5 OR Quality of
        Sleep <= 5) to mark 'low sleep'. Enforce that the scales are oriented so larger
        => better for both columns.
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 58
        end_line: 58
