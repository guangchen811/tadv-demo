        file: ''
      uid: 9541026e-b9be-4b18-9340-916a24d7a09f
    - text: 'Person ID must be a non-negative integer, not null, and unique across
        records because the script allocates arrays of length max(Person ID) + 1 and
        indexes them by Person ID. Actionable constraints examples: isComplete([''Person
        ID'']); isInteger([''Person ID'']); assert min(''Person ID'') >= 0; and isUnique([''Person
        ID'']).'
      sources:
