    - text: 'Sleep Duration must have non-zero variability (not be constant) so that
        correlation with ''Quality of Sleep'' is computable (corr(...) should not
        be NaN). The code uses this correlation to adjust weights; a constant column
        would produce NaN and can break downstream weight calculations. Example check
