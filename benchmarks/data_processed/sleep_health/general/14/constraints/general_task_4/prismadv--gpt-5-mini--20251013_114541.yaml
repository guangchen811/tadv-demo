    - text: 'The ''Daily Steps'' values should be non-negative and in a realistic
        range (>= 0). The column represents step counts and is used in ratio comparisons
        and mean-based scaling; negative values would be semantically invalid. Example
        deequ-like check: .satisfies("CASE WHEN `Daily Steps` >= 0 THEN 1 ELSE 0 END",
