    - text: 'The high-blood-pressure rule ((BP_SYS >= 140) | (BP_DIA >= 90)) and subsequent
        boolean logic assume BP_SYS and BP_DIA contain no nulls and are comparable
        with numeric thresholds so that elementwise comparisons produce valid booleans
        used for RiskAlert and reason assembly. Actionable checks: enforce no nulls
        and numeric types for both columns (Deequ-style: .hasNoNulls([''BP_SYS'',''BP_DIA'']),
        .isNumeric([''BP_SYS'',''BP_DIA''])).'
