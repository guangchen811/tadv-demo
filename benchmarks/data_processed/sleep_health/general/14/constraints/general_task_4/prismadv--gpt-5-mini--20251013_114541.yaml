  : code: []
    assumptions:
    - text: 'The ''Blood Pressure'' column contains values in the format ''SYS/DIA''
        where both SYS and DIA are integer numeric strings (no missing parts). After
        splitting, ''BP_SYS'' and ''BP_DIA'' must be parseable to integers for every
        record. Actionable constraints examples: hasPattern(''Blood Pressure'',''^[0-9]+\/[0-9]+$'');
        isComplete([''Blood Pressure'']); and isComplete([''BP_SYS'',''BP_DIA''])
        after the split (or equivalent checks that splitting yields two non-null integer
        parts).'
      sources:
      - start_line: 15
        end_line: 18
        file: ''
      uid: 6dfb3227-4601-40a2-9c95-992b2ffb6303
    - text: 'Physical Activity Level and Daily Steps must be numeric and complete
        (no nulls) and present together for each row because they are used to compute
        correlation and a regression (pa.corr(steps), slope/intercept and steps_pred).
        Actionable constraints examples: isComplete([''Physical Activity Level'',''Daily
        Steps'']); isNumeric([''Physical Activity Level'',''Daily Steps'']); and (optionally)
        check that variance(Physical Activity Level) > 0 to ensure regression denominator
        is meaningful.'
      sources:
      - start_line: 20
        end_line: 25
        file: ''
      - start_line: 42
        end_line: 43
        file: ''
      uid: 9481d3bc-4d6e-4eb1-aa13-6e7d6bee78c4
    - text: 'Sleep Duration and Quality of Sleep must be numeric and complete for
        per-row operations (correlation, normalization and the synergy formula). In
        particular, to avoid taking sqrt of a negative product in synergy, the normalized
        values should be non-negative: (Sleep Duration - 3.0)/9.0 >= 0 and (Quality
        of Sleep - 4.0)/5.0 >= 0 (i.e., Sleep Duration >= 3.0 and Quality of Sleep
        >= 4.0) for records expected to produce meaningful synergy. Actionable constraints
        examples: isComplete([''Sleep Duration'',''Quality of Sleep'']); isNumeric([''Sleep
        Duration'',''Quality of Sleep'']); and assert Sleep Duration >= 3.0 and Quality
        of Sleep >= 4.0 for rows where synergy must be computed safely.'
      sources:
      - start_line: 27
        end_line: 32
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: 863e4726-3d1b-47cd-ad89-ea89150c0e82
    - text: 'Stress Level, Sleep Duration and Quality of Sleep must be numeric and
        complete when computing correlations and when deriving stress-based scores
        (corr_stress_q, stress_score). Actionable constraints examples: isComplete([''Stress
        Level'',''Quality of Sleep'',''Sleep Duration'']); isNumeric([''Stress Level'',''Quality
        of Sleep'',''Sleep Duration'']).'
      sources:
      - start_line: 27
        end_line: 36
        file: ''
      - start_line: 60
        end_line: 62
        file: ''
      uid: 23f2c2b4-6176-4f95-b9d6-0b8807e57a2d
    - text: 'BMI Category and Sleep Disorder must map to numeric penalties used in
        the combined penalty_total. Concretely: BMI Category values should belong
        to the mapped set {''Normal'',''Normal Weight'',''Overweight'',''Obese''}
        so that bmi_penalty is numeric (not NaN). Sleep Disorder may be null but mapping
        must produce a numeric disorder_penalty (the code fills null with unknown_penalty).
        Actionable constraints examples: isContainedIn(''BMI Category'', {...}); isComplete([''BMI
        Category'']) or at least ensure mapped bmi_penalty is not null for rows used
        in penalty calculations; and allow Sleep Disorder in {''Insomnia'',''Sleep
        Apnea''} or null (nulls are acceptable because they are filled).'
      sources:
