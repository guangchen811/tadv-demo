        .satisfies(''CASE WHEN stddev(`Sleep Duration`) IS NOT NULL AND stddev(`Sleep
        Duration`) > 0 THEN 1 ELSE 0 END'', ''sleep_duration_non_constant'', lambda
        x: x == 1.0)

        Or assert that the number of distinct values is > 1: .satisfies(''CASE WHEN
        cardinality(array_distinct(collect_list(`Sleep Duration`))) > 1 THEN 1 ELSE
        0 END'', ''sleep_duration_has_variance'', lambda x: x == 1.0).'
