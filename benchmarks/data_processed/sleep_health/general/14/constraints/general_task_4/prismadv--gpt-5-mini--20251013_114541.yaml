  '["BMI Category","bmi_penalty"]':
    code: []
    assumptions:
    - text: 'All values in the ''BMI Category'' column must belong to the set {"Normal",
        "Normal Weight", "Overweight", "Obese"} so that the mapping to ''bmi_penalty''
        produces a defined numeric value. Actionable: enforce a containment constraint
        on BMI Category (e.g. Deequ: .isContainedIn("BMI Category", ["Normal","Normal
        Weight","Overweight","Obese"])) and/or a row-level predicate that checks mapping
        success.'
      sources:
      - start_line: 45
        end_line: 52
        file: ''
      uid: d6649613-faeb-4da6-8d8e-aa45593ff100
    - text: 'After mapping, the derived column ''bmi_penalty'' must be non-null and
        finite for every row (no NaNs), because subsequent arithmetic (penalty_total
        and SHI) assumes numeric values. Actionable: require completeness and isFinite
        on bmi_penalty (e.g. Deequ: .isComplete("bmi_penalty") and custom predicate
        to ensure isFinite(bmi_penalty)).'
      sources:
      - start_line: 45
        end_line: 52
        file: ''
      - start_line: 79
        end_line: 80
        file: ''
      uid: 76239427-bda9-4fcc-af4c-830ec4696c89
    - text: 'The mapping between ''BMI Category'' and ''bmi_penalty'' must be exact
        and stable: BMI Category == ''Normal'' or ''Normal Weight'' => bmi_penalty
        == 0.0; ''Overweight'' => 0.10; ''Obese'' => 0.20. Actionable: implement row-level
        conditional checks (e.g. Deequ satisfies predicates like "(BMI Category ==
        ''Obese'') => bmi_penalty == 0.20", etc.).'
      sources:
      - start_line: 45
        end_line: 52
        file: ''
      - start_line: 51
        end_line: 51
        file: ''
      uid: a7c11807-d10a-4db5-a345-be472cb18085
    - text: 'The combined penalty computation uses both ''bmi_penalty'' and ''disorder_penalty'':
        penalty_total = clip(0.5*bmi_penalty + 0.5*disorder_penalty, 0.0, 1.0). Therefore
        both ''bmi_penalty'' and ''disorder_penalty'' must be numeric and not NaN,
        and the resulting penalty_total must be within [0.0, 1.0] for all rows. Actionable:
        enforce numeric/finite on both penalty columns and a range constraint on penalty_total
        (e.g. Deequ: custom predicate or .isNonNegative and <=1 checks on penalty_total).'
      sources:
      - start_line: 53
        end_line: 56
        file: ''
      - start_line: 79
        end_line: 80
        file: ''
      uid: 52cd424b-5b84-4a04-afc5-d76b16dff868
    - text: 'Because ''disorder_penalty'' uses a fillna(default) but ''bmi_penalty''
        does not, unexpected or unmapped BMI Category values will produce NaN penalty_total
        even when Sleep Disorder is present or filled. Therefore ensure that for every
        row either the BMI Category is valid (see assumption 1) so bmi_penalty is
        defined, independent of Sleep Disorder validity. Actionable: enforce simultaneous
        validity of (''BMI Category'' in allowed set) AND (disorder mapping produces
        numeric) where required, e.g. a Deequ row-level predicate that verifies isFinite(bmi_penalty)
        and isFinite(disorder_penalty).'
      sources:
      - start_line: 45
        end_line: 56
        file: ''
      - start_line: 79
        end_line: 81
        file: ''
      uid: cf4c336c-6e51-48fd-99ae-9ca0e12d080c
  '["BP_DIA","BP_SYS"]':
    code: []
    assumptions:
    - text: 'The original ''Blood Pressure'' text field always contains exactly two
        numeric parts separated by a single ''/'' (for example ''120/80''). After
        splitting, both parts are convertible to integer, so BP_SYS and BP_DIA are
        populated for every row without parsing errors. Actionable checks that can
