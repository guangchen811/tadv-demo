        physiological ranges (suggested actionable ranges: BP_SYS in [50, 250], BP_DIA
        in [30, 150]). Example Deequ-style checks: .isContainedInRange(''BP_SYS'',
        50, 250), .isContainedInRange(''BP_DIA'', 30, 150), and .isNumeric([''BP_SYS'',''BP_DIA'']).'
