results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL'',
        ''PAL numeric parse'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Physical Activity Level` AS DOUBLE) BETWEEN
        0 AND 120'', ''PAL range [0,120]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete("Quality of Sleep")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Quality of Sleep` AS DOUBLE) IS NOT NULL", "QoS
        numeric parseable", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CAST(`Quality of Sleep` AS DOUBLE)
        IS NOT NULL", "QoS numeric parseable", lambda x: x == 1.0)'' failed on data
        sample: Value: 0.9733333333333334 does not meet the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CAST(`Quality of Sleep` AS DOUBLE) = CAST(CAST(`Quality
        of Sleep` AS DOUBLE) AS INT)", "QoS integer-like", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CAST(`Quality of Sleep` AS DOUBLE)
        = CAST(CAST(`Quality of Sleep` AS DOUBLE) AS INT)", "QoS integer-like", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.9733333333333334 does not meet
        the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CAST(`Quality of Sleep` AS DOUBLE) >= 0 AND CAST(`Quality
        of Sleep` AS DOUBLE) <= 10", "QoS range [0,10]", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CAST(`Quality of Sleep` AS DOUBLE)
        >= 0 AND CAST(`Quality of Sleep` AS DOUBLE) <= 10", "QoS range [0,10]", lambda
        x: x == 1.0)'' failed on data sample: Value: 0.9733333333333334 does not meet
        the constraint requirement!'
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("lower(trim(`BMI Category`)) IN (''normal'',''normal
        weight'',''overweight'',''obese'')", "Valid BMI Category domain", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`BMI Category` IS NULL) OR (length(`BMI Category`)
        = length(trim(`BMI Category`)))", "No surrounding whitespace in BMI Category",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`BMI Category` IS NOT NULL) AND lower(trim(`BMI Category`))
        IN (''normal'',''normal weight'',''overweight'',''obese'')", "Known BMI Category
        rate", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasCompleteness(''Blood Pressure'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''size(split(`Blood Pressure`, "/")) = 2'', ''BP has
        exactly two parts'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''cast(split(`Blood Pressure`, "/")[0] as double) is
        not null AND cast(split(`Blood Pressure`, "/")[1] as double) is not null'',
        ''BP parts are numeric'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''size(split(`Blood Pressure`, "/")) = 2 AND cast(split(`Blood
        Pressure`, "/")[0] as double) is not null AND cast(split(`Blood Pressure`,
        "/")[1] as double) is not null'', ''BP parseable for all rows'', lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Person ID` AS BIGINT) IS NOT NULL AND `Person
        ID` >= 0'', ''Person ID numeric non-negative'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMin(''Sleep Duration'', lambda m: m >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Sleep Duration'', lambda m: m <= 24)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Duration` >= 6.0 AND `Sleep Duration` <= 9.0'',
        ''Sleep in 6-9h band'', lambda x: x >= 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Daily Steps'', lambda x: x <= 50000)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete("Stress Level")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`Stress Level` >= 1) AND (`Stress Level` <= 10)",
        "Stress Level within 1-10 inclusive", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: '.satisfies("CASE WHEN CAST(`Age` AS DOUBLE) IS NOT NULL THEN 1
        ELSE 0 END", "Age parsable", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Age` BETWEEN 0 AND 120", "Age plausible range", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies(''isnotnull(cast(`Physical Activity Level` as double))
        AND NOT isnan(cast(`Physical Activity Level` as double)) AND isnotnull(cast(`Daily
        Steps` as double)) AND NOT isnan(cast(`Daily Steps` as double))'', ''pal_steps_numeric_parseable'',
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        c: c >= 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `Physical Activity Level` >= 90 THEN `Daily
        Steps` >= 9000 ELSE true END'', ''vigorous_implies_high_steps'', lambda v:
        v >= 0.7)'
      status: true
      reason_if_failed: ''
      level: warning
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("lower(Gender) IN (''male'',''female'')", "Valid Gender
        categories", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
