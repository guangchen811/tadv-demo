results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete("Physical Activity Level")
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.hasCompleteness("Quality of Sleep", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Obese'', ''Overweight'',
        ''Normal'', ''Normal Weight'') THEN 1 ELSE 0 END", "Valid BMI Categories",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern("Blood Pressure", "^\\d{2,3}/\\d{2,3}$", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.isPositive(''`Sleep Duration`'', assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` > 16.0", "Sleep Duration upper bound",
        assertion=lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Sleep Duration'', assertion=lambda x: x
