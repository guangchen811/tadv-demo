results:
  Physical Activity Level:
    code:
    - suggestion: '.hasCompleteness(''Physical Activity Level'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda sd: sd
        > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Quality of Sleep` AS DOUBLE) IS
        NOT NULL THEN 1 ELSE 0 END", "QualityOfSleepIsNumeric", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN TRY_CAST(`Quality of Sleep`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "QualityOfSleepIsNumeric", lambda
        x: x == 1)'' failed on data sample: Value: 0.9733333333333334 does not meet
        the constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` >= 3.0 AND `Quality of
        Sleep` <= 9.0 THEN 1 ELSE 0 END", "QoS_in_3_9", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` IS NULL OR `Quality of
        Sleep` = FLOOR(`Quality of Sleep`) THEN 1 ELSE 0 END", "QoS_is_integer", lambda
        x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN `Quality of Sleep` IS NULL
        OR `Quality of Sleep` = FLOOR(`Quality of Sleep`) THEN 1 ELSE 0 END", "QoS_is_integer",
        lambda x: x >= 0.99)'' failed on data sample: Value: 0.9733333333333334 does
        not meet the constraint requirement!'
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Obese'',''Overweight'',''Normal'',''Normal
        Weight'') THEN 1 ELSE 0 END", "Valid BMI Category", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(`BMI Category`) IN (''Obese'',''Overweight'',''Normal'',''Normal
        Weight'') THEN 1 ELSE 0 END", "Canonical BMI Category (trimmed)", lambda x:
        x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("BMI Category", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\d{2,3}/\\d{2,3}$'', lambda
        x: x >= 0.99, name=''BP format'')'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: '.satisfies(''CASE WHEN `Person ID` IS NOT NULL OR `Person ID` IS
        NULL THEN 1 ELSE 0 END'', ''Has Person ID column'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Person ID` RLIKE "^[0-9]+$" THEN 1 ELSE
        0 END'', ''Person ID is integer-like'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies(''CASE WHEN `Sleep Duration` IS NULL OR (`Sleep Duration`
        >= 0.0 AND `Sleep Duration` <= 24.0) THEN 1 ELSE 0 END'', ''Sleep Duration
        in hours between 0 and 24'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL'', ''Duration-Quality pair presence'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Sleep Duration` IS NOT NULL'', ''Sleep Duration completeness'',
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NULL OR TRY_CAST(`Daily
        Steps` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "DailyStepsNumericOrNull",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NOT NULL THEN 1 ELSE 0 END",
        "DailyStepsNotNull", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NULL OR `Daily Steps` >=
        0 THEN 1 ELSE 0 END", "DailyStepsNonNegative", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NULL OR `Daily Steps` <=
        100000 THEN 1 ELSE 0 END", "DailyStepsReasonableMax", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NULL OR `Daily Steps` =
        FLOOR(`Daily Steps`) THEN 1 ELSE 0 END", "DailyStepsIntegral", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Heart Rate` AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END", "Heart Rate parseable as numeric", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` IS NOT NULL THEN 1 ELSE 0 END",
        "Non-null Heart Rate fraction", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Heart Rate` AS DOUBLE) BETWEEN
        30 AND 200 THEN 1 ELSE 0 END", "Heart Rate in plausible range (30-200 bpm)",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("CASE WHEN try_cast(`Stress Level` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "Numeric Stress Level", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Stress Level` = round(`Stress Level`) OR
        `Stress Level` IS NULL THEN 1 ELSE 0 END", "Integral Stress Level", lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN (`Stress Level` BETWEEN 0 AND 10) OR `Stress
        Level` IS NULL THEN 1 ELSE 0 END", "Stress Level in [0,10]", lambda x: x >=
        0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Stress Level` IS NOT NULL THEN 1 ELSE 0
        END", "Non-null Stress Level", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Stress Level` IN (3,4,5,6,7,8) OR `Stress
        Level` IS NULL THEN 1 ELSE 0 END", "Expected Stress Level categories", lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN try_cast(`Age` AS double) IS NOT NULL THEN
        1 ELSE 0 END", "Age is numeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Age` BETWEEN 0 AND 120 THEN 1 ELSE 0 END",
        "Age in plausible range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
