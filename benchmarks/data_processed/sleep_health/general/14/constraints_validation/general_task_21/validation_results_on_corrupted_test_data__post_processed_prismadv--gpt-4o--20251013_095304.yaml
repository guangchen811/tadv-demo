results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .satisfies('`Quality of Sleep` BETWEEN 0 AND 10', 'Quality of Sleep
        Range')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`Quality of Sleep` BETWEEN 0 AND
        10'', ''Quality of Sleep Range'')'' failed on data sample: Value: 0.9733333333333334
        does not meet the constraint requirement!'
      level: error
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Overweight', 'Obese', 'Normal',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Blood Pressure
        format validation")
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'',
        ''Valid Sleep Duration Range'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Daily Steps'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Daily Steps` >= 1000 AND `Daily Steps` <= 20000', 'Realistic
        Daily Steps')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IN (''Insomnia'', ''Sleep
        Apnea'') OR `Sleep Disorder` IS NULL THEN 1 ELSE 0 END", "Valid Sleep Disorder
        Values", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x > 0.415)'
      status: false
      reason_if_failed: 'Constraint ''hasCompleteness(''Sleep Disorder'', lambda x:
        x > 0.415)'' failed on data sample: Value: 0.41333333333333333 does not meet
        the constraint requirement!'
      level: warning
  Stress Level:
    code:
    - suggestion: .satisfies('`Stress Level` >= 3 AND `Stress Level` <= 8', 'Stress
        Level range validation')
      status: true
      reason_if_failed: ''
      level: error
  '["BMI Category","Diastolic","Systolic"]':
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Blood Pressure
        Format")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`BMI Category` IN ('Overweight', 'Obese', 'Normal',
        'Normal Weight')", "Valid BMI Categories")
      status: true
      reason_if_failed: ''
      level: error
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.4)'
      status: true
      reason_if_failed: ''
      level: error
  '["Blood Pressure","Diastolic","Systolic"]':
    code:
    - suggestion: '.satisfies(''`Blood Pressure` RLIKE "^[0-9]+/[0-9]+$"'', ''Blood
        Pressure Format'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        x: x >= 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Daily Steps` <= 3000) OR (`Physical Activity Level`
        <= 40)'', ''Sedentary flag condition'', lambda x: x >= 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.hasCompleteness(''Quality of Sleep'', lambda x: x == 1.0).hasCompleteness(''Sleep
        Duration'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10',
        'Quality of Sleep range')
      status: false
      reason_if_failed: 'Constraint ''satisfies(''`Quality of Sleep` >= 0 AND `Quality
        of Sleep` <= 10'', ''Quality of Sleep range'')'' failed on data sample: Value:
        0.9733333333333334 does not meet the constraint requirement!'
      level: error
  '["Sleep Disorder","Stress Level"]':
    code:
    - suggestion: .satisfies("(`Sleep Disorder` IN ('Insomnia', 'Sleep Apnea') OR
        `Sleep Disorder` IS NULL)", "Valid Sleep Disorder Values")
      status: true
      reason_if_failed: ''
      level: error
