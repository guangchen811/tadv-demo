results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Physical Activity Level` >= 0 AND `Physical
        Activity Level` <= 100 THEN 1 ELSE 0 END'', ''Physical Activity Level within
        0..100'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("CASE WHEN try_cast(`Quality of Sleep` AS double) IS
        NOT NULL THEN 1 ELSE 0 END", "Quality numeric", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN try_cast(`Quality of Sleep`
        AS double) IS NOT NULL THEN 1 ELSE 0 END", "Quality numeric", lambda x: x
        == 1)'' failed on data sample: Value: 0.9733333333333334 does not meet the
        constraint requirement!'
      level: error
    - suggestion: '.satisfies("CASE WHEN try_cast(`Quality of Sleep` AS double) >=
        0 AND try_cast(`Quality of Sleep` AS double) <= 10 THEN 1 ELSE 0 END", "Quality
        in 0..10", lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("CASE WHEN try_cast(`Quality of Sleep`
        AS double) >= 0 AND try_cast(`Quality of Sleep` AS double) <= 10 THEN 1 ELSE
        0 END", "Quality in 0..10", lambda x: x >= 0.99)'' failed on data sample:
        Value: 0.9733333333333334 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` IS NOT NULL THEN 1 ELSE
        0 END", "Quality non-null", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN try_cast(`Quality of Sleep` AS double) =
        floor(try_cast(`Quality of Sleep` AS double)) THEN 1 ELSE 0 END", "Quality
        integer-like", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: '.satisfies("CASE WHEN `Person ID` IS NOT NULL THEN 1 ELSE 0 END",
        "Person ID completeness", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Person ID` = CAST(`Person ID` AS BIGINT)
        THEN 1 ELSE 0 END", "Person ID is integral", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` IS NOT NULL AND TRY_CAST(`Sleep
        Duration` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Sleep Duration is numeric",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("Sleep Duration")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Sleep Duration` AS DOUBLE) >= 0
        AND TRY_CAST(`Sleep Duration` AS DOUBLE) <= 24 THEN 1 ELSE 0 END", "Sleep
        Duration in 0..24 hours", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` IS NOT NULL AND `Sleep Duration`
        = `Sleep Duration` AND ABS(TRY_CAST(`Sleep Duration` AS DOUBLE)) < 1e9 THEN
        1 ELSE 0 END", "Finite Sleep Duration", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.satisfies("`Daily Steps` IS NOT NULL", "Non-null Daily Steps",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Daily Steps` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "Parsable Numeric Daily Steps", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` = FLOOR(`Daily Steps`) THEN
        1 ELSE 0 END", "Integer Daily Steps", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` <= 100000 THEN 1 ELSE 0 END",
        "Max Daily Steps <=100000", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies(''CASE WHEN `Sleep Disorder` IS NOT NULL THEN 1 ELSE
        0 END'', ''Non-null Sleep Disorder fraction'', lambda x: x >= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `Sleep Disorder` IN (\''Insomnia\'', \''Sleep
        Apnea\'') OR `Sleep Disorder` IS NULL THEN 1 ELSE 0 END'', ''Valid Sleep Disorder
        categories'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN trim(`Sleep Disorder`) IN (\''Insomnia\'',
        \''Sleep Apnea\'') OR `Sleep Disorder` IS NULL THEN 1 ELSE 0 END'', ''Trimmed
        valid categories'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete("Heart Rate")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Heart Rate` AS double) IS NOT NULL
        THEN 1 ELSE 0 END", "HeartRate_Numeric", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Heart Rate` AS double) >= 30 AND
        TRY_CAST(`Heart Rate` AS double) <= 220 THEN 1 ELSE 0 END", "HeartRate_PlausibleRange",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Stress Level` BETWEEN 0 AND 10 THEN 1 ELSE
        0 END", "Stress Level in 0..10", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete("Age")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Age` BETWEEN 0 AND 120 THEN 1 ELSE 0 END",
        "Plausible Age Range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Age","Gender","Person ID"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR `Sleep Disorder`
        IN (''Insomnia'',''Sleep Apnea'') THEN 1 ELSE 0 END", "Sleep Disorder values
        are null or within known labels", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies(''CASE WHEN CAST(`Daily Steps` AS DOUBLE) IS NOT NULL
        AND CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END'',
        ''Numeric Steps and Activity'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN CAST(`Physical Activity Level` AS DOUBLE)
        BETWEEN 0.0 AND 100.0 AND CAST(`Daily Steps` AS DOUBLE) >= 0.0 AND CAST(`Daily
        Steps` AS DOUBLE) <= 100000.0 THEN 1 ELSE 0 END'', ''Activity Ranges'', lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''ABS(CAST(`Daily Steps` AS DOUBLE)/10000.0 - CAST(`Physical
        Activity Level` AS DOUBLE)/100.0) <= 0.5'', ''steps_activity_agreement'',
        lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''Gender'', [''Male'',''Female''], lambda x: x ==
        1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Gender'', ''^[A-Za-z]+$'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
