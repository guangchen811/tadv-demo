        including `age_index` (from `Age`) and `bmi_risk` (from `BMI Category`). This
        linear combination assumes that the contributions of age and BMI to the total
        risk are additive and independent. It does not model any interaction effects,
        meaning the risk associated with a specific `BMI Category` is assumed to be
        constant across all `Age` groups. This assumption would be challenged if there
        is a strong statistical relationship between `Age` and `BMI Category` in the
        data (e.g., if older individuals are significantly more likely to be in the
        ''Overweight'' or ''Obese'' categories).

        We could represent this assumption as a Deequ constraint by binning the ''Age''
        column and performing a Chi-Squared test for independence against ''BMI Category'':

        `.chiSquareTest("Age_binned", "BMI Category", lambda p_value: p_value > 0.05)`'
