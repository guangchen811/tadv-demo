  Physical Activity Level:
    db0e93d0-a7f4-46e2-bfbf-e28f3152798f: '.isNonNegative("`Physical Activity Level`",
      lambda x: x == 1.0)'
  Quality of Sleep:
    07b484a8-6754-4141-920d-7e238fc05725: '.isNonNegative(''`Quality of Sleep`'',
      assertion=lambda x: x == 1.0)'
  Daily Steps:
    85e5b697-7a96-416e-b6c2-ceaa8e5d4f17: .isNonNegative('`Daily Steps`')
  ? '["BMI Category","Daily Steps","Diastolic","Physical Activity Level","Quality
    of Sleep","Sleep Duration","Stress Level","Systolic"]'
  : bff5873d-dc9c-492f-aab1-487c37428a66: '.satisfies("CAST(SPLIT(TRIM(regexp_replace(`Blood
      Pressure`, ''[^0-9/]'', '''')), ''/'')[0] AS INT) >= 0 AND CAST(SPLIT(TRIM(regexp_replace(`Blood
      Pressure`, ''[^0-9/]'', '''')), ''/'')[1] AS INT) >= 0 AND CAST(SPLIT(TRIM(regexp_replace(`Blood
      Pressure`, ''[^0-9/]'', '''')), ''/'')[0] AS INT) BETWEEN 60 AND 200 AND CAST(SPLIT(TRIM(regexp_replace(`Blood
      Pressure`, ''[^0-9/]'', '''')), ''/'')[1] AS INT) BETWEEN 40 AND 130 AND CAST(SPLIT(TRIM(regexp_replace(`Blood
      Pressure`, ''[^0-9/]'', '''')), ''/'')[0] AS INT) >= CAST(SPLIT(TRIM(regexp_replace(`Blood
      Pressure`, ''[^0-9/]'', '''')), ''/'')[1] AS INT)", "Valid Blood Pressure Readings",
      lambda x: x == 1.0)'
  '["Diastolic","Systolic"]':
    f01fdc82-0b2d-4992-90e9-70b592d8c870: '.satisfies("INSTR(`Blood Pressure`, ''/'')
      > 0 AND CAST(CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', 1) AS INT) AS STRING)
      = SUBSTRING_INDEX(`Blood Pressure`, ''/'', 1) AND CAST(CAST(SUBSTRING_INDEX(`Blood
      Pressure`, ''/'', -1) AS INT) AS STRING) = SUBSTRING_INDEX(`Blood Pressure`,
      ''/'', -1)", "Derived Systolic and Diastolic match original Blood Pressure string
      parts", lambda x: x == 1.0)'
