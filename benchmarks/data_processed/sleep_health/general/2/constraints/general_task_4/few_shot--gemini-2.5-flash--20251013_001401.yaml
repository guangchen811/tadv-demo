constraints:
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    - - .matchesPattern('Blood Pressure', r"^\d+/\d+$")
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isPositive('Person ID')
      - Invalid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - '.hasNumberOfDistinctValues(''Physical Activity Level'', lambda x: x > 1)'
      - Invalid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.hasNumberOfDistinctValues(''Quality of Sleep'', lambda x: x > 1)'
      - Invalid
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGreaterThanOrEqualTo('Quality of Sleep', 4.0)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'], includeNulls=True)
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - '.hasNumberOfDistinctValues(''Sleep Duration'', lambda x: x > 1)'
      - Invalid
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isGreaterThanOrEqualTo('Sleep Duration', 3.0)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - '.hasNumberOfDistinctValues(''Stress Level'', lambda x: x > 1)'
      - Invalid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
