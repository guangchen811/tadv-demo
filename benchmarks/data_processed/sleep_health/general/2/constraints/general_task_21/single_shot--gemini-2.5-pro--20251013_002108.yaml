constraints:
  Age:
    code:
    - - .isPositive('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('`BMI Category`')
      - Valid
    - - .isContainedIn('`BMI Category`', ['Overweight', 'Normal', 'Obese', 'Normal
        Weight'])
      - Invalid
    assumptions: []
  Blood Pressure:
    code:
    - - .compliesWith('`Blood Pressure`', r'^\d{2,3}/\d{2,3}$')
      - Invalid
    - - .isComplete('`Blood Pressure`')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('`Daily Steps`')
      - Valid
    - - .isNonNegative('`Daily Steps`')
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isBetween('`Heart Rate`', 40, 180)
      - Invalid
    - - .isComplete('`Heart Rate`')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('`Person ID`')
      - Valid
    - - .isUnique('`Person ID`')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('`Physical Activity Level`')
      - Valid
    - - .isNonNegative('`Physical Activity Level`')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isBetween('`Quality of Sleep`', 4, 9)
      - Invalid
    - - .isComplete('`Quality of Sleep`')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - .satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ('Insomnia', 'Sleep
        Apnea')", '`Sleep Disorder` must be null or a known disorder')
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('`Sleep Duration`')
      - Valid
    - - .isPositive('`Sleep Duration`')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .isBetween('`Stress Level`', 1, 10)
      - Invalid
    - - .isComplete('`Stress Level`')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
