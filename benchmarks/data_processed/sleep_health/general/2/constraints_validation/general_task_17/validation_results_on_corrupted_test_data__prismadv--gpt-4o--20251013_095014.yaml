results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Physical Activity Level` >= 0 AND `Physical Activity
        Level` <= 100', 'Valid Physical Activity Level Range')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''`Physical Activity Level` >= 0
        AND `Physical Activity Level` <= 100'', ''Valid Physical Activity Level Range'')''
        failed on data sample: Value: 0.7 does not meet the constraint requirement!'
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies('`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10',
        'Quality of Sleep range check')
      status: true
      reason_if_failed: ''
      level: undefined
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`BMI Category` IN ('Obese', 'Overweight', 'Normal',
        'Normal Weight')", "Valid BMI Categories")
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: undefined
  Person ID:
    code:
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies('`Daily Steps` >= 0', 'Non-negative Daily Steps')
      status: true
      reason_if_failed: ''
      level: undefined
  Sleep Disorder:
    code:
    - suggestion: .satisfies("`Sleep Disorder` IN ('Sleep Apnea', 'Insomnia') OR `Sleep
        Disorder` IS NULL", "Valid Sleep Disorders")
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Stress Level', ['3', '4', '5', '6', '7', '8'])
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
  '["Age","age_risk"]':
    code:
    - suggestion: '.hasUniqueness([''Age''], lambda x: x < 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["priority_bucket","risk_score"]':
    code:
    - suggestion: '.haveCompleteness([''Age''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Sleep Duration","duration_risk"]':
    code:
    - suggestion: .satisfies('`Sleep Duration` >= 0', 'Positive Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''Sleep Duration''], lambda x: x > 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["activity_protect","age_risk","bmi_risk","bp_risk","duration_risk","hr_risk","raw_risk","risk_score","sd_risk","sq_risk","vigorous_bonus"]'
  : code:
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
