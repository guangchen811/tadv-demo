results:
  Age:
    code:
    - suggestion: '.hasMax(''Age'', lambda v: v <= 120)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Age'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
