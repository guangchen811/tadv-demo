constraints:
  Age:
    code:
    - - '.hasMax(''Age'', lambda v: v <= 120)'
      - Valid
    - - '.hasMin(''Age'', lambda v: v >= 0)'
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', '^\d{2,3}/\d{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - '.hasMax(''Daily Steps'', lambda v: v <= 50000)'
      - Valid
    - - '.hasMin(''Daily Steps'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Daily Steps')
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda v: v
        >= 0.0)'
      - Valid
    - - '.hasMax(''Physical Activity Level'', lambda v: v <= 100)'
      - Valid
    - - '.hasMin(''Physical Activity Level'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .satisfies('cast(`Physical Activity Level` as int) = `Physical Activity Level`',
        'pal_is_integer')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.hasMax(''Quality of Sleep'', lambda v: v <= 9)'
      - Valid
    - - '.hasMin(''Quality of Sleep'', lambda v: v >= 4)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - '.hasMax(''Sleep Duration'', lambda v: v <= 14.01)'
      - Valid
    - - '.hasMin(''Sleep Duration'', lambda v: v > 2.99)'
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
