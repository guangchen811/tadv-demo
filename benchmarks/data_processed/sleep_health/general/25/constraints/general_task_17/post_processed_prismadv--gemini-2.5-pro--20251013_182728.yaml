      uid: 6b7619e7-f580-494b-acfa-f6a0853e0e4a
    - text: 'The ''Daily Steps'' and ''Physical Activity Level'' columns are expected
        to be positively correlated. The code combines them into a single ''activity_index''
        by averaging their ranks, which assumes they both measure a similar underlying
        concept of physical activity. A strong positive correlation validates this
        combination. We could represent this assumption as a deequ constraint like
        this:

