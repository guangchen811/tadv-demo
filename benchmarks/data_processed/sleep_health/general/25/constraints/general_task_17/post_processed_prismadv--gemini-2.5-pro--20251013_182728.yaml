    - text: 'The ''Stress Level'' and ''Quality of Sleep'' columns are expected to
        be negatively correlated. The code calculates a risk factor where high stress
        and low sleep quality (represented as ''10 - Quality of Sleep'') are multiplied
        together. This formulation implies that as stress level increases, sleep quality
        is expected to decrease. We could represent this assumption as a deequ constraint
        like this:

        .hasCorrelation("Stress Level", "Quality of Sleep", _ <= -0.3)'
