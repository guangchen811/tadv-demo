    assumptions:
    - text: 'Quality of Sleep, Stress Level, and Sleep Duration must all be present
        (non-null after NA parsing) and numeric for every record because they are
        jointly used in arithmetic and threshold logic. Suggested constraints: hasCompleteness(''Quality
        of Sleep'', 1.0), hasCompleteness(''Stress Level'', 1.0), hasCompleteness(''Sleep
        Duration'', 1.0), and enforce numeric types for all three columns.'
      sources:
      - start_line: 83
        end_line: 85
        file: ''
      - start_line: 16
        end_line: 20
        file: ''
      uid: a3bfa554-5e76-4242-8185-90d99214cb75
    - text: "Quality of Sleep and Stress Level are on the same discrete 1\u201310\
        \ (Likert-like) integer scale (centered at 5 and used with thresholds at 6\
        \ and 7). Both columns should contain integer values within a shared bounded\
        \ domain (e.g., [3, 9] based on observed data, or [1, 10] if using the full\
        \ scale). Suggested constraints: hasMin('Quality of Sleep') >= 3 and hasMax('Quality\
        \ of Sleep') <= 9; hasMin('Stress Level') >= 3 and hasMax('Stress Level')\
        \ <= 9; and enforce integral data type for both."
      sources:
      - start_line: 16
        end_line: 17
        file: ''
      - start_line: 126
        end_line: 127
        file: ''
      - start_line: 131
        end_line: 131
        file: ''
      uid: 43767b76-1dae-4715-a239-6508f963f6e8
    - text: 'Sleep Duration is expected to be in hours and within the physiological
        range [3.0, 12.0]; values outside are clipped before use in recovery risk.
        Additionally, Sleep Duration drives trigger semantics: if Sleep Duration <
        6.0 then ''Triggers'' must contain ''short_sleep'', and if Sleep Duration
        > 9.0 then ''Triggers'' must contain ''long_sleep''. Suggested constraints:
        hasMin(''Sleep Duration'') >= 3.0 and hasMax(''Sleep Duration'') <= 12.0;
        plus row-level rules such as satisfies("(`Sleep Duration` < 6.0) -> array_contains(split(Triggers,
        '';''), ''short_sleep'')", compliance = 1.0) and satisfies("(`Sleep Duration`
        > 9.0) -> array_contains(split(Triggers, '';''), ''long_sleep'')", compliance
        = 1.0).'
      sources:
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 122
        end_line: 125
        file: ''
      - start_line: 136
        end_line: 136
        file: ''
      uid: d0555b6b-6d9d-42af-9314-f9a02cc126ab
    - text: 'Quality of Sleep and Stress Level thresholds must be reflected in ''Triggers'':
        if Quality of Sleep <= 6 then ''Triggers'' must contain ''low_sleep_quality'';
        if Stress Level >= 7 then ''Triggers'' must contain ''high_stress''. Suggested
        constraints: satisfies("(`Quality of Sleep` <= 6) -> array_contains(split(Triggers,
        '';''), ''low_sleep_quality'')", compliance = 1.0) and satisfies("(`Stress
        Level` >= 7) -> array_contains(split(Triggers, '';''), ''high_stress'')",
        compliance = 1.0).'
