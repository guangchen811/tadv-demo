      - start_line: 117
        end_line: 121
        file: ''
      uid: 4c2293c4-e610-4e87-938c-871989d1fd5b
    - text: 'Risk Tier must be consistent with Risk Score binning: Low if Risk Score
        <= 9, Moderate if (9, 17], High if (17, 25], Critical if > 25. Example constraint:
        satisfies(''case when `Risk Score` <= 9 then `Risk Tier` = "Low" when `Risk
        Score` <= 17 then `Risk Tier` = "Moderate" when `Risk Score` <= 25 then `Risk
        Tier` = "High" else `Risk Tier` = "Critical" end'', ''risk_tier_matches_score'').'
      sources:
