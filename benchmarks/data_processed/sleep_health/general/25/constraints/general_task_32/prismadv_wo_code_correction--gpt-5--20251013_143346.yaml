        file: ''
      - start_line: 138
        end_line: 143
        file: ''
      uid: 9a58419d-5e48-4e80-8bca-543d60f014c1
    - text: "The trigger 'obesity' must be present if and only if BMI Category ==\
        \ 'Obese'. Enforce as satisfies('((`BMI Category` = \"Obese\") = (instr(`Triggers`,\
        \ \"obesity\") > 0))', ['BMI Category','Triggers']) and ensure BMI Category\
        \ \u2208 {'Normal','Normal Weight','Overweight','Obese'} via isContainedIn."
