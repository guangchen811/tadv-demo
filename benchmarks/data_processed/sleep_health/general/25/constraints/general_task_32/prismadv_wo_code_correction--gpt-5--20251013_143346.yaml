  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'Both ''Daily Steps'' and ''Physical Activity Level'' must be present
        and castable to numeric for every row (row-level co-presence), since they
        are cast to float and combined without null handling. This can be checked
        as a single multi-column compliance such as: hasCompliance(''steps_pal_complete_numeric'',
        ''cast(`Daily Steps` as double) is not null AND cast(`Physical Activity Level`
        as double) is not null'', assertion = _ >= 1.0).'
      sources:
      - start_line: 23
        end_line: 27
        file: ''
      - start_line: 86
        end_line: 86
        file: ''
      uid: e591325b-282e-430a-bbaf-1d561520aa93
    - text: '''Daily Steps'' and ''Physical Activity Level'' values should lie within
        the modeled domain so clipping does not materially alter results: 0 <= Daily
        Steps <= 15000 AND 0 <= Physical Activity Level <= 120 (ideally for all rows,
        or at least a very high fraction, e.g., >= 0.99). This can be expressed as
        a multi-column compliance: hasCompliance(''steps_pal_in_range'', ''`Daily
        Steps` BETWEEN 0 AND 15000 AND `Physical Activity Level` BETWEEN 0 AND 120'',
        assertion = _ >= 0.99).'
      sources:
      - start_line: 24
        end_line: 25
        file: ''
      uid: 8594816c-dea2-4220-8204-bb47e69f4f1a
    - text: 'The weighted normalized activity score derived from both columns must
        be within [0, 1]: S = 0.7 * LEAST(GREATEST(`Daily Steps`, 0), 15000) / 15000
        + 0.3 * LEAST(GREATEST(`Physical Activity Level`, 0), 120) / 120. A multi-column
        compliance can verify this: hasCompliance(''activity_score_unit_interval'',
        ''0 <= 0.7*least(greatest(`Daily Steps`,0),15000)/15000.0 + 0.3*least(greatest(`Physical
        Activity Level`,0),120)/120.0 AND 0.7*least(greatest(`Daily Steps`,0),15000)/15000.0
        + 0.3*least(greatest(`Physical Activity Level`,0),120)/120.0 <= 1'', assertion
        = _ >= 1.0).'
      sources:
      - start_line: 24
        end_line: 27
        file: ''
      uid: 6ecde11e-e63a-4f29-b6df-71756f8cf93e
    - text: 'Consistency between input and output: If a row is flagged with the ''low_activity''
        trigger then Daily Steps must be < 5000, and if Daily Steps >= 5000 then ''low_activity''
        must not appear in the ''Triggers'' string. This can be captured as: hasCompliance(''low_activity_trigger_consistency'',
        ''((`Daily Steps` < 5000) AND array_contains(split(`Triggers`, '';''), "low_activity"))
        OR ((`Daily Steps` >= 5000) AND NOT array_contains(split(`Triggers`, '';''),
        "low_activity"))'', assertion = _ >= 1.0).'
      sources:
      - start_line: 117
        end_line: 136
        file: ''
      uid: 19b31c04-787b-437d-89e9-b4bd6e2ccbd9
    - text: 'After deriving an ''activity_risk'' column using the same formula as
        in the pipeline, its value must be within [0, 6] for all rows (since max penalty
        occurs when both inputs are at 0). This enforces the joint transformation
        of the two inputs: hasCompliance(''activity_risk_bounds'', ''`activity_risk`
        >= 0 AND `activity_risk` <= 6'', assertion = _ >= 1.0).'
      sources:
      - start_line: 23
        end_line: 27
        file: ''
      - start_line: 99
        end_line: 103
        file: ''
