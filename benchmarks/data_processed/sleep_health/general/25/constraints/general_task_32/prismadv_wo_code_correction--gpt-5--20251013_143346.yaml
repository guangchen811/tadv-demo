    - text: 'Sleep Duration should have no missing values (completeness 1.0). Missing
        values would propagate NaNs into sleep_dur_risk, recovery_risk, and then into
        the overall risk_score and Risk Tier. We could represent this as: Deequ: .hasCompleteness(''Sleep
        Duration'', lambda c: c == 1.0); Great Expectations: expect_column_values_to_not_be_null(''Sleep
        Duration'').'
      sources:
      - start_line: 84
        end_line: 85
        file: ''
      - start_line: 18
        end_line: 20
        file: ''
      - start_line: 99
        end_line: 109
        file: ''
      - start_line: 111
        end_line: 115
        file: ''
      - start_line: 83
        end_line: 83
        file: ''
      uid: 1382dc74-39d8-438b-97b8-710b3ab1b72f
    - text: 'Most Sleep Duration values should fall within a plausible human range
        of 3 to 12 hours. Recommend asserting that at least 95% of values are in [3.0,
        12.0]. We could represent this as: Deequ: .satisfies(''`Sleep Duration` >=
        3.0 AND `Sleep Duration` <= 12.0'', ''Sleep Duration plausible range (95%)'',
        lambda p: p >= 0.95); Great Expectations: expect_column_values_to_be_between(''Sleep
        Duration'', 3.0, 12.0, mostly=0.95).'
      sources:
      - start_line: 18
        end_line: 18
        file: ''
      - start_line: 122
        end_line: 125
        file: ''
      uid: ec1b74aa-e8de-4b6e-bc4b-1eae671cf7ba
    - text: 'Sleep Duration values must be finite and physically possible: no negatives
        and no values above 24 hours. We could represent this as: Deequ: .isNonNegative(''Sleep
        Duration'') AND .satisfies(''isfinite(`Sleep Duration`) AND `Sleep Duration`
        <= 24.0'', ''Sleep Duration physical bounds'', lambda p: p == 1.0); Great
        Expectations: expect_column_values_to_be_between(''Sleep Duration'', 0.0,
        24.0) and expect_column_values_to_not_be_in_set(''Sleep Duration'', [inf,
        -inf]).'
      sources:
