    assumptions:
    - text: 'Blood Pressure must decompose into exactly two integer components: ''Blood
        Pressure (systolic)'' and ''Blood Pressure (diastolic)'' (parsed from the
        ''Blood Pressure'' string as systolic/diastolic). Both components must be
        present (non-null) and integer-parsable for every record. This supports downstream
        int casts and all subsequent logic that uses both values together. Example
        constraint: satisfies(''systolic IS NOT NULL AND diastolic IS NOT NULL'',
        ''bp_parts_not_null'').'
