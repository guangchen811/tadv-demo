    - text: 'The ''Blood Pressure'' field must be a valid ''systolic/diastolic'' pair
        of integers. After splitting, both parsed columns must be non-null and satisfy
        systolic > diastolic. This can be enforced as: containsPattern(''Blood Pressure'',
        ''^[0-9]{2,3}/[0-9]{2,3}$'') and then, after parsing into columns, satisfies(''systolic
        > diastolic'', [''systolic'',''diastolic'']).'
      sources:
      - start_line: 30
        end_line: 34
        file: ''
      - start_line: 37
        end_line: 47
        file: ''
      - start_line: 120
        end_line: 121
        file: ''
      uid: c07073bd-0d9f-4817-a029-e688566c5e12
    - text: 'Quality of Sleep, Stress Level, and Sleep Duration must be present (non-null)
        and numeric together for every row, since they are jointly normalized and
        combined in compute_recovery_risk and later summed into the final risk_score.
        This can be represented as a joint completeness predicate: satisfies(''Quality
        of Sleep IS NOT NULL AND Stress Level IS NOT NULL AND Sleep Duration IS NOT
        NULL'', [''Quality of Sleep'',''Stress Level'',''Sleep Duration'']).'
      sources:
      - start_line: 15
        end_line: 20
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      - start_line: 99
        end_line: 109
        file: ''
      uid: f993b341-2d8d-4dca-8146-018b343c8d58
    - text: "Daily Steps and Physical Activity Level are used together to compute\
        \ activity risk; both must be non-null, non-negative, and typically within\
        \ the operational ranges implied by clipping: 0 \u2264 Daily Steps \u2264\
        \ 15000 and 0 \u2264 Physical Activity Level \u2264 120. This can be enforced\
        \ as satisfies('`Daily Steps` >= 0 AND `Daily Steps` <= 15000 AND `Physical\
        \ Activity Level` >= 0 AND `Physical Activity Level` <= 120', ['Daily Steps','Physical\
        \ Activity Level'])."
      sources:
      - start_line: 23
        end_line: 27
        file: ''
      - start_line: 86
        end_line: 86
        file: ''
      uid: 1a5d0443-0d51-4cf2-a35c-33265830f68b
    - text: 'Risk Tier must be consistent with the Risk Score binning used to derive
        it: (-inf, 9] => ''Low'', (9, 17] => ''Moderate'', (17, 25] => ''High'', (25,
        inf) => ''Critical''. Enforce as satisfies(''((`Risk Score` <= 9 AND `Risk
        Tier` = "Low") OR (`Risk Score` > 9 AND `Risk Score` <= 17 AND `Risk Tier`
        = "Moderate") OR (`Risk Score` > 17 AND `Risk Score` <= 25 AND `Risk Tier`
        = "High") OR (`Risk Score` > 25 AND `Risk Tier` = "Critical"))'', [''Risk
        Score'',''Risk Tier'']).'
      sources:
      - start_line: 99
        end_line: 109
        file: ''
      - start_line: 111
        end_line: 115
        file: ''
      - start_line: 138
        end_line: 143
        file: ''
      uid: f1cf00cd-b2fc-45fc-b27c-77e8e7541bbf
    - text: 'The trigger ''high_bp'' must exactly reflect the parsed blood pressure
        rule: (systolic >= 140 OR diastolic >= 90) iff ''high_bp'' appears in the
        Triggers string. This can be enforced as satisfies(''((cast(split(`Blood Pressure`,
        "/")[0] as int) >= 140 OR cast(split(`Blood Pressure`, "/")[1] as int) >=
        90) = (instr(`Triggers`, "high_bp") > 0))'', [''Blood Pressure'',''Triggers'']).'
      sources:
      - start_line: 30
        end_line: 34
        file: ''
      - start_line: 117
        end_line: 122
        file: ''
      - start_line: 138
        end_line: 143
        file: ''
      uid: c71a1f1a-d8d4-4457-8ff2-c5ab06f39438
    - text: "The trigger 'sleep_disorder' must be present if and only if Sleep Disorder\
        \ \u2208 {'Insomnia','Sleep Apnea'} and the Sleep Disorder values must be\
        \ from that set when non-null. Enforce as: isContainedIn('Sleep Disorder',\
        \ ['Insomnia','Sleep Apnea'], allowNulls=true) and satisfies('( (`Sleep Disorder`\
        \ IN (\"Insomnia\",\"Sleep Apnea\")) = (instr(`Triggers`, \"sleep_disorder\"\
        ) > 0) )', ['Sleep Disorder','Triggers'])."
      sources:
      - start_line: 68
        end_line: 73
        file: ''
      - start_line: 134
