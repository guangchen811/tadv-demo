        end_line: 18
        file: ''
      - start_line: 10
        end_line: 12
        file: ''
      - start_line: 122
        end_line: 125
        file: ''
      uid: ee41667f-493a-4de0-bc9b-c6766ac22469
    - text: "Sleep Duration values are in hours (not minutes). Thresholds and normalization\
        \ (6, 7, 9 hours; clamping to [3,12]) imply values are hour-based. The 0\u2013\
        24 bound above helps enforce this unit. We could represent this by checking\
        \ the upper bound and plausible range rules together (no additional rule required\
        \ beyond bounds)."
