    - text: 'Physical Activity Level values should fall within the expected range
        [0, 120]. The code clips values to [0, 120] and normalizes by 120; values
        outside this range likely indicate unit or data-entry errors. We could enforce
        that at least 95% of values are within [0, 120] using a Deequ constraint like:
        .satisfies("CASE WHEN `Physical Activity Level` BETWEEN 0 AND 120 THEN 1 ELSE
        0 END", "PAL in range [0,120]", lambda x: x >= 0.95).'
