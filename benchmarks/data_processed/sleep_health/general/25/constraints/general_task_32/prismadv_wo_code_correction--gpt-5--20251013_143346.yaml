        end_line: 34
        file: ''
      - start_line: 87
        end_line: 88
        file: ''
      uid: ef48c7a5-5cfd-43d6-9e37-76334ae29df3
    - text: 'Physiological ordering between the blood pressure components should hold:
        ''Blood Pressure (systolic)'' >= ''Blood Pressure (diastolic)'' for all rows.
        Example constraint: satisfies(''systolic >= diastolic'', ''bp_sys_ge_dia'').'
      sources:
      - start_line: 30
        end_line: 34
        file: ''
      - start_line: 37
        end_line: 42
        file: ''
      uid: 9d2e6cd1-d9b5-4ac1-90bb-0e571328d1df
    - text: 'The presence of the ''high_bp'' trigger must be consistent with blood
        pressure components: ''high_bp'' is included in ''Triggers'' if and only if
        (systolic >= 140 OR diastolic >= 90). Example constraint (two directions):
        satisfies(''(systolic >= 140 OR diastolic >= 90) <= (array_contains(split(Triggers,
        ";"), "high_bp"))'', ''high_bp_trigger_forward'') and satisfies(''array_contains(split(Triggers,
        ";"), "high_bp") <= (systolic >= 140 OR diastolic >= 90)'', ''high_bp_trigger_backward'').'
