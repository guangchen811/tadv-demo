    - text: Each 'Blood Pressure' value must match the format 'systolic/diastolic'
        with exactly one '/' separator and both sides present. A suitable validation
        is to require the regex ^\s*\d+\s*/\s*\d+\s*$ for all values (e.g., with Deequ
        hasPattern or Great Expectations expect_column_values_to_match_regex).
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 87
        end_line: 87
        file: ''
      uid: de734922-8fd6-4f1a-bf1e-7ebf6cb5f424
    - text: 'Both components in ''Blood Pressure'' must be parseable as integers (no
        decimals, commas, units, or text like ''mmHg''). This follows from parts[0].astype(int)
        and parts[1].astype(int) and can be enforced with a regex as above or a cast
        check; e.g., in Deequ: satisfies("CAST(REGEXP_EXTRACT(`Blood Pressure`, ''^(\\s*\\d+)\\s*/\\s*(\\d+)\\s*$'',
        1) AS INT) IS NOT NULL AND CAST(REGEXP_EXTRACT(`Blood Pressure`, ''^(\\s*\\d+)\\s*/\\s*(\\d+)\\s*$'',
        2) AS INT) IS NOT NULL", ''BP integers'', lambda x: x == 1.0).'
      sources:
      - start_line: 32
        end_line: 33
        file: ''
      - start_line: 87
        end_line: 87
        file: ''
      uid: e2ae1112-b914-4bd8-bf57-654334d4a9ce
    - text: "The 'Blood Pressure' values must represent measurements in mmHg (not\
        \ kPa or other units), since the risk classification thresholds (e.g., 120/80,\
        \ 130/80\u201389, 140/90, 180/120) are in mmHg. A practical validation proxy\
        \ is to ensure values fall within plausible mmHg ranges (see next assumption)."
      sources:
      - start_line: 37
        end_line: 42
        file: ''
      - start_line: 120
        end_line: 120
        file: ''
      uid: d6cde202-8d05-4cb8-be90-2cb17bb593c7
    - text: 'The parsed systolic and diastolic values should be physiologically plausible
        and non-negative to avoid misclassification. A reasonable rule is: systolic
        between 70 and 250 inclusive and diastolic between 40 and 150 inclusive for
        at least 99% of rows. In Deequ, for example: satisfies("CAST(REGEXP_EXTRACT(`Blood
        Pressure`, ''^(\\s*\\d+)\\s*/\\s*(\\d+)\\s*$'', 1) AS INT) BETWEEN 70 AND
        250 AND CAST(REGEXP_EXTRACT(`Blood Pressure`, ''^(\\s*\\d+)\\s*/\\s*(\\d+)\\s*$'',
        2) AS INT) BETWEEN 40 AND 150", ''Plausible BP range'', lambda x: x >= 0.99).'
      sources:
      - start_line: 37
        end_line: 42
        file: ''
      - start_line: 30
        end_line: 34
        file: ''
