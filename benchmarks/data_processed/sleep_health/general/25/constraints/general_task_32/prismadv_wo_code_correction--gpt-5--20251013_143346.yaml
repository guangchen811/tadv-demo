    assumptions:
    - text: 'Physical Activity Level must be numeric (parsable as float) for all rows.
        The code calls .astype(float) on this column without coercion or error handling,
        so any non-numeric token (e.g., ''Unknown'') would raise and stop the run.
        We could represent this as a Deequ constraint like: .hasDataType("Physical
        Activity Level", ConstrainableDataTypes.Numeric) or .satisfies("`Physical
        Activity Level` RLIKE ''^-?\\d+(\\.\\d+)?$''", "PAL numeric", lambda x: x
        == 1.0).'
      sources:
      - start_line: 86
        end_line: 86
        file: ''
      uid: f8ab7add-eb17-4f24-b75f-4b1d60f3e5db
    - text: 'Physical Activity Level should be non-null for all rows (completeness
        = 1.0). Missing values propagate through compute_activity_risk into risk_score
        and risk_tier, resulting in NaN scores and a ''nan'' Risk Tier that suppresses
        alerts and skews summary metrics. We could represent this as a Deequ constraint
        like: .isComplete("Physical Activity Level") or .satisfies("CASE WHEN `Physical
        Activity Level` IS NOT NULL THEN 1 ELSE 0 END", "PAL non-null", lambda x:
        x == 1.0).'
      sources:
      - start_line: 86
        end_line: 86
        file: ''
      - start_line: 102
        end_line: 102
        file: ''
      - start_line: 112
