        end_line: 115
        file: ''
      - start_line: 138
        end_line: 143
        file: ''
      uid: 4fd3233a-038c-4cd3-a51d-0c6a2976c434
    - text: 'Minimum Risk Score must respect the blood-pressure-induced floor (since
        all components are non-negative): if (systolic >= 180 OR diastolic >= 120)
        then Risk Score >= 12; else if (systolic >= 140 OR diastolic >= 90) then Risk
        Score >= 8; else if (systolic BETWEEN 130 AND 139 OR diastolic BETWEEN 80
        AND 89) then Risk Score >= 5; else if (systolic BETWEEN 120 AND 129 AND diastolic
        < 80) then Risk Score >= 2. Example constraint: a set of satisfies() checks
        for each case.'
