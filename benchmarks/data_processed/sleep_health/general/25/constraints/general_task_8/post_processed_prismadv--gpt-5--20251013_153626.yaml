        end_line: 20
        file: ''
      uid: 4f8d4290-ae62-45d2-b57d-ab3ef2adb91f
    - text: 'To ensure weekly aggregation and coaching logic have meaningful BP data,
        a high proportion of records should produce valid numeric systolic and diastolic
        after parsing (e.g., >= 95%). Example rule: Deequ .satisfies("CAST(regexp_extract(`Blood
        Pressure`, ''^(\\s*)(\\d{2,3})\\s*/\\s*(\\d{2,3})\\s*$'', 2) AS DOUBLE) IS
        NOT NULL AND CAST(regexp_extract(`Blood Pressure`, ''^(\\s*)(\\d{2,3})\\s*/\\s*(\\d{2,3})\\s*$'',
        3) AS DOUBLE) IS NOT NULL", ''BP_parsed_nonnull'', lambda x: x >= 0.95).'
      sources:
