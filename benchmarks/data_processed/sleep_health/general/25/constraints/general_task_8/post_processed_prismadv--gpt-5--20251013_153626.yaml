        \ range (10\u2013100). Example rule: Deequ .satisfies(\"(CAST(regexp_extract(`Blood\
        \ Pressure`, '^(\\\\s*)(\\\\d{2,3})\\\\s*/\\\\s*(\\\\d{2,3})\\\\s*$', 2) AS\
        \ DOUBLE) - CAST(regexp_extract(`Blood Pressure`, '^(\\\\s*)(\\\\d{2,3})\\\
        \\s*/\\\\s*(\\\\d{2,3})\\\\s*$', 3) AS DOUBLE)) BETWEEN 10 AND 100\", 'Pulse_pressure_ok',\
