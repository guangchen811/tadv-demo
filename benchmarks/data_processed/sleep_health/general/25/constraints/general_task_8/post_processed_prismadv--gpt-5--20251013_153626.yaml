        end_line: 62
        file: ''
      uid: 5f564414-8466-42ab-9ecf-7d06f42d6536
    - text: "The 'Quality of Sleep' values should be on a 0\u201310 scale. The code\
        \ normalizes by dividing by 10 and later compares the mean to a threshold\
        \ of 6, implying the original scale is 0\u201310 (or 1\u201310). Deequ example:\
        \ .satisfies('`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10', 'Quality\
        \ of Sleep within 0\u201310', lambda x: x == 1)"
      sources:
      - start_line: 22
        end_line: 22
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      uid: 7f638361-58e7-432a-9909-33e670392c8e
    - text: "Given observed data characteristics, at least 95% of 'Quality of Sleep'\
        \ values should fall within 4\u20139 (typical operating range), even though\
        \ the accepted domain is 0\u201310. This guards against unexpected outliers\
        \ without over-constraining the domain. Deequ example: .satisfies('`Quality\
        \ of Sleep` >= 4 AND `Quality of Sleep` <= 9', 'Typical Quality of Sleep range',\
