        ID'' IS NULL) OR (''Age'' IS NOT NULL AND ''Gender'' IS NOT NULL).'
      sources:
      - start_line: 57
        end_line: 60
        file: ''
      - start_line: 125
        end_line: 128
        file: ''
      uid: fe4ed72b-1267-4add-929c-71f60bdd22ea
    - text: 'Weekly BP aggregates preserve physiological order: In the weekly output,
        when both are available, ''avg_systolic_bp'' must be >= ''avg_diastolic_bp''
        per ''Person ID''. Validate with a row-level compliance on the weekly dataset:
        (avg_systolic_bp >= avg_diastolic_bp) OR (avg_systolic_bp IS NULL OR avg_diastolic_bp
        IS NULL).'
      sources:
      - start_line: 57
        end_line: 68
        file: ''
      - start_line: 103
        end_line: 105
        file: ''
      uid: a967f6d8-391b-4f9f-ab3e-d2deccfe7351
  '["Blood Pressure","Heart Rate"]':
    code: []
    assumptions:
    - text: "The 'Blood Pressure' column must be of the form 'S/D' (two 2\u20133 digit\
        \ numbers separated by a slash) so that it reliably parses into the numeric\
        \ columns 'bp_sys' and 'bp_dia' for every record. This enables downstream\
        \ BP risk computation used together with Heart Rate in the cardio component.\
        \ We could represent this as Deequ constraints like: .hasPattern(\"Blood Pressure\"\
        , \"^\\\\s*\\\\d{2,3}\\\\s*/\\\\s*\\\\d{2,3}\\\\s*$\") and .hasSatisfying(\"\
        bp_sys IS NOT NULL AND bp_dia IS NOT NULL\", 1.0)."
      sources:
      - start_line: 17
        end_line: 19
        file: ''
      - start_line: 34
        end_line: 38
        file: ''
      uid: 1be8a472-7531-4d1c-b3e2-281417ec786c
    - text: 'Systolic BP must be greater than or equal to diastolic BP for all rows
        (i.e., pulse_pressure = bp_sys - bp_dia >= 0), ensuring values are not swapped.
        This can be encoded as a multi-column Deequ compliance constraint: .hasSatisfying("bp_sys
        >= bp_dia", 1.0).'
      sources:
      - start_line: 20
        end_line: 20
        file: ''
      - start_line: 34
        end_line: 35
        file: ''
      uid: efa75ac1-ca06-41ad-ba76-15fa97833d57
    - text: 'For each record used in scoring, Heart Rate, bp_sys, and bp_dia must
        be simultaneously non-null to avoid NaN propagation into cardio_component
        and the final score. This joint completeness can be enforced with a multi-column
        Deequ compliance constraint: .hasSatisfying("`Heart Rate` IS NOT NULL AND
        bp_sys IS NOT NULL AND bp_dia IS NOT NULL", 1.0).'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 51
        end_line: 54
        file: ''
      uid: 6de66689-5362-4a19-a6b9-015b7d1c7933
    - text: 'On the weekly aggregated dataset, the relationship between systolic and
        diastolic BP must be preserved: avg_systolic_bp >= avg_diastolic_bp for every
        Person ID. This can be expressed in Deequ as: .hasSatisfying("`avg_systolic_bp`
        >= `avg_diastolic_bp`", 1.0).'
      sources:
      - start_line: 57
        end_line: 68
        file: ''
      - start_line: 81
        end_line: 91
        file: ''
      uid: 3b803324-c748-4c43-a3b3-a78610aed978
    - text: 'On the weekly aggregated dataset, the cardiovascular summary fields used
        together in recommendations must be jointly present: avg_systolic_bp, avg_diastolic_bp,
        and avg_heart_rate should be non-null on the same rows so the elevated-BP/HR
        recommendation logic can evaluate. This joint completeness can be enforced
        with Deequ: .hasSatisfying("`avg_systolic_bp` IS NOT NULL AND `avg_diastolic_bp`
        IS NOT NULL AND `avg_heart_rate` IS NOT NULL", 1.0).'
      sources:
      - start_line: 81
        end_line: 91
        file: ''
      - start_line: 103
        end_line: 106
        file: ''
      - start_line: 118
        end_line: 118
        file: ''
      uid: c986786c-313c-431c-8584-b2fbc2135cc1
  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: "Both 'Daily Steps' and 'Physical Activity Level' are required (non-null),\
        \ non-negative numeric fields, with 'Physical Activity Level' expressed on\
        \ a 0\u2013100 scale. Their normalized weighted sum 0.8 * (Daily Steps / 10000)\
        \ + 0.2 * (Physical Activity Level / 100) should already lie within [0, 1]\
        \ for at least 99% of rows (i.e., clipping is rare). Example Deequ constraints:\
        \ .isComplete(['Daily Steps','Physical Activity Level']); .satisfies('`Daily\
        \ Steps` >= 0 and `Physical Activity Level` >= 0 and `Physical Activity Level`\
        \ <= 100', 'pal_steps_domain', lambda r: r == 1.0); .satisfies('0.8*(`Daily\
        \ Steps`/10000.0)+0.2*(`Physical Activity Level`/100.0) >= 0 and 0.8*(`Daily\
        \ Steps`/10000.0)+0.2*(`Physical Activity Level`/100.0) <= 1', 'activity_mix_in_range',\
        \ lambda r: r >= 0.99)."
      sources:
      - start_line: 29
        end_line: 31
        file: ''
      - start_line: 51
        end_line: 54
        file: ''
      uid: e337231b-6e76-4a63-bd99-b9573f6d6756
    - text: '''Daily Steps'' and ''Physical Activity Level'' should be positively
        related as they both measure activity; the Pearson correlation between them
        should be non-negative and preferably above 0.3. Example Deequ constraint:
        .hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda c: c
        >= 0.3).'
      sources:
      - start_line: 29
        end_line: 31
        file: ''
      uid: 9c07f65a-fd22-48d5-9981-e9c060e4e738
    - text: 'Contradictory combinations of these columns should be rare: very high
        ''Physical Activity Level'' (>= 80) should not co-occur with extremely low
        ''Daily Steps'' (< 2000), and very low ''Physical Activity Level'' (<= 20)
        should not co-occur with extremely high ''Daily Steps'' (> 20000). Fewer than
        2% of rows may violate this. Example Deequ constraint: .satisfies(''not ((`Physical
        Activity Level` >= 80 and `Daily Steps` < 2000) or (`Physical Activity Level`
        <= 20 and `Daily Steps` > 20000))'', ''pal_steps_concordance'', lambda r:
        r >= 0.98).'
      sources:
      - start_line: 29
        end_line: 31
        file: ''
      uid: 68ae27a3-5b7d-4da0-82b0-beda5fa5e265
    - text: 'Near-zero ''Daily Steps'' should align with a minimal ''Physical Activity
        Level'': if Daily Steps <= 100, then Physical Activity Level <= 10 in at least
        95% of rows. Example Deequ constraint: .satisfies(''not (`Daily Steps` <=
        100 and `Physical Activity Level` > 10)'', ''pal_steps_zero_consistency'',
        lambda r: r >= 0.95).'
      sources:
      - start_line: 29
        end_line: 31
        file: ''
      uid: b1af8ccd-8407-482e-8a49-f29a5140d878
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 8cda12f5-5403-4a5f-b3ad-7f6756b74dbd
      source_assumptions:
      - 7fe0713b-6865-4fa5-9d43-b61d54963256
    - suggestion: '.satisfies("TRIM(`Gender`) IN (''Male'',''Female'')", ''Valid Gender
        category'', lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 441d9989-4f7d-4118-9a76-02f3197a60f2
      source_assumptions:
      - e598f392-0e83-42bf-a902-3ae85d1ef0fa
    assumptions:
    - text: 'The input must contain a ''Gender'' column and it should be complete
        (no nulls) so that groupby(...).agg({''Gender'':''first''}) and the final
        export including ''Gender'' do not produce missing values. Possible validations:
        Deequ hasCompleteness(''Gender'', lambda x: x == 1.0); Great Expectations
        expect_column_values_to_not_be_null(''Gender'').'
      sources:
      - start_line: 58
        end_line: 58
        file: ''
      - start_line: 125
        end_line: 128
        file: ''
      uid: 7fe0713b-6865-4fa5-9d43-b61d54963256
    - text: 'The ''Gender'' values should be limited to the categories {''Male'',''Female''}
        (exact casing, no leading/trailing whitespace), since the value is passed
        through unchanged to outputs. Possible validations: Deequ satisfies("CASE
        WHEN TRIM(`Gender`) IN (''Male'',''Female'') THEN 1 ELSE 0 END", "Valid Gender",
        lambda x: x == 1.0); Great Expectations expect_column_values_to_be_in_set([''Male'',''Female'']).'
      sources:
      - start_line: 58
        end_line: 58
        file: ''
      - start_line: 125
        end_line: 128
        file: ''
      uid: e598f392-0e83-42bf-a902-3ae85d1ef0fa
    - text: 'The ''Gender'' value must be consistent within each ''Person ID'' (no
        person appears with multiple genders), because the aggregation takes the first
        value per person, which would be arbitrary if conflicting values exist. Possible
        validations: using SQL/Great Expectations, expect_query_result_row_count_to_be_zero
        on "SELECT `Person ID` FROM df GROUP BY `Person ID` HAVING COUNT(DISTINCT
        `Gender`) > 1"; with Deequ, perform an aggregateBy(''Person ID'') and assert
        for every group that countDistinct(''Gender'') == 1 (e.g., via a custom analyzer
        or by verifying no group has >1 distinct ''Gender'').'
      sources:
      - start_line: 57
        end_line: 68
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: 729e4094-128a-438a-a846-19b7165ea3dd
  '["Person ID","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (`Sleep Disorder` IN
        (''Insomnia'',''Sleep Apnea''))", "Sleep Disorder allowed values or null",
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 16fdd51c-eac5-4893-968a-a8f608ec6cb5
      source_assumptions:
      - 74700731-0741-46e7-8bba-f6fc5f3a4c6d
    assumptions:
    - text: 'Within each Person ID, the demographic attributes used in the weekly
        aggregation (Age and Gender) are invariant across all records for that person.
        This justifies aggregating them with ''first''. This can be represented as
        group-level constraints such as: per Person ID, distinct_count(Gender) ==
        1 and distinct_count(Age) == 1.'
      sources:
      - start_line: 57
        end_line: 68
        file: ''
      uid: af893145-e824-44b1-ae8c-9f2a3a9a0521
    - text: 'For each Person ID, the non-null Sleep Disorder category does not vary
        over time (i.e., at most one distinct non-null value per person). This ensures
        the derived ''Primary Sleep Disorder'' is well-defined and recommendations
        are consistent. Representable as a group-level constraint: per Person ID,
        distinct_count(Sleep Disorder where Sleep Disorder is not null) <= 1.'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 79
        end_line: 81
        file: ''
      - start_line: 107
        end_line: 112
        file: ''
      uid: 67f80a1b-e5ef-4c07-949d-63ac57fb1148
    - text: 'All non-null Sleep Disorder values must be in the allowed set {''Insomnia'',''Sleep
        Apnea''}. Values outside this set would skip the disorder penalty and tailored
        recommendations. This can be enforced as: isContainedIn(''Sleep Disorder'',
        [''Insomnia'',''Sleep Apnea'']) when Sleep Disorder is not null.'
      sources:
      - start_line: 45
        end_line: 48
        file: ''
      - start_line: 107
        end_line: 112
        file: ''
      uid: 74700731-0741-46e7-8bba-f6fc5f3a4c6d
    - text: "Each Person ID has exactly one corresponding 'Primary Sleep Disorder'\
        \ in the per-person dataset used for the weekly outputs (i.e., Person ID uniquely\
        \ determines Primary Sleep Disorder in that result; join cardinality agg \u2194\
        \ disorder_by_person is 1:1 on Person ID). This can be enforced by ensuring\
        \ uniqueness of 'Person ID' in both aggregated frames prior to merge."
      sources:
      - start_line: 57
        end_line: 68
        file: ''
      - start_line: 79
        end_line: 81
        file: ''
      - start_line: 125
        end_line: 128
        file: ''
      uid: fca9faf8-6205-429d-98b0-041ac245975c
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS DOUBLE) IS NOT NULL AND NOT
        isnan(CAST(`Sleep Duration` AS DOUBLE)) AND CAST(`Quality of Sleep` AS DOUBLE)
        IS NOT NULL AND NOT isnan(CAST(`Quality of Sleep` AS DOUBLE))", "sleep_fields_complete",
        lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 2dce031d-b0e9-43ba-87b2-ad9531c984fe
      source_assumptions:
      - a7917030-93c5-4e6f-b8c0-5df08c953467
    - suggestion: '.satisfies("CAST(`Sleep Duration` AS DOUBLE) >= 0 AND CAST(`Sleep
        Duration` AS DOUBLE) <= 24 AND CAST(`Quality of Sleep` AS DOUBLE) >= 0 AND
        CAST(`Quality of Sleep` AS DOUBLE) <= 10", "sleep_ranges_valid", lambda v:
        v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 4851740f-9d66-4b48-90e0-4e94ce762faf
      source_assumptions:
      - ee60e86c-4861-45ad-b05a-0c9f0f681c02
    assumptions:
    - text: "Every row must have simultaneous, numeric values for both 'Sleep Duration'\
        \ (hours) and 'Quality of Sleep' (0\u201310), since they are jointly transformed\
        \ and combined into 'sleep_component' and subsequently impact the score and\
        \ weekly aggregates. Example Deequ-style constraint: .satisfies('Sleep Duration\
        \ IS NOT NULL AND Quality of Sleep IS NOT NULL AND isFinite(CAST(Sleep Duration\
        \ AS DOUBLE)) AND isFinite(CAST(Quality of Sleep AS DOUBLE))', 'sleep_fields_complete')"
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      - start_line: 51
        end_line: 54
        file: ''
      - start_line: 57
        end_line: 63
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      uid: c4b0bc9c-fb2f-4033-8286-41f4d95fe1c2
    - text: '''Sleep Duration'' and ''Quality of Sleep'' must lie on their intended
        scales so their joint combination is meaningful: 0 <= Sleep Duration <= 24
        (hours) and 0 <= Quality of Sleep <= 10 (points). This matches the centering
        at 8 hours, division by 10, and the recommendation thresholds at 7 and 6.
        Example Deequ-style constraint: .satisfies(''Sleep Duration >= 0 AND Sleep
        Duration <= 24 AND Quality of Sleep >= 0 AND Quality of Sleep <= 10'', ''sleep_ranges_valid'')'
      sources:
      - start_line: 21
        end_line: 22
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      uid: a7917030-93c5-4e6f-b8c0-5df08c953467
    - text: 'For every ''Person ID'' group, both ''Sleep Duration'' and ''Quality
        of Sleep'' must have at least one non-null row so that the per-person averages
        (''avg_sleep_hours'', ''avg_sleep_quality'') used for recommendations are
        defined. Example (per-group) constraint concept: for all groups by Person
        ID, count_if(Sleep Duration IS NOT NULL AND Quality of Sleep IS NOT NULL)
        > 0.'
      sources:
      - start_line: 57
        end_line: 63
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      uid: ee60e86c-4861-45ad-b05a-0c9f0f681c02
    - text: 'On the weekly (aggregated) dataset, the paired averages must remain within
        their scales so the joint rule in recommendations is valid: 0 <= avg_sleep_hours
        <= 24 and 0 <= avg_sleep_quality <= 10. Example Deequ-style constraint: .satisfies(''avg_sleep_hours
        >= 0 AND avg_sleep_hours <= 24 AND avg_sleep_quality >= 0 AND avg_sleep_quality
        <= 10'', ''weekly_sleep_scales_valid'')'
      sources:
      - start_line: 82
        end_line: 90
        file: ''
      - start_line: 97
        end_line: 97
        file: ''
      - start_line: 125
        end_line: 128
        file: ''
      uid: 59de06f9-6570-4228-8782-5bd2e1ce7ea5
    - text: 'The derived ''sleep_component'' must be consistent with the joint transformation
        of ''Sleep Duration'' and ''Quality of Sleep'': sleep_component = clip(0.6
        * clip(1 - abs(Sleep Duration - 8.0) / 5.0, 0, 1) + 0.4 * (Quality of Sleep
        / 10.0), 0, 1). As a check, verify the recomputed value matches within a small
        tolerance and is non-null for all rows. Example Deequ-style constraint: .satisfies(''abs(sleep_component
        - greatest(0.0, least(1.0, 0.6 * greatest(0.0, least(1.0, 1 - abs(Sleep Duration
        - 8.0)/5.0)) + 0.4 * (Quality of Sleep/10.0)))) < 1e-6'', ''sleep_component_consistent'')'
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      uid: 45dd9aa0-62b5-42b0-a6e7-a1a0c8d2fea3
