        end_line: 38
        file: ''
      - start_line: 103
        end_line: 106
        file: ''
      uid: d0491f72-69f9-41c4-a8e0-2cec2721a3e1
    - text: "When parsed, systolic should be greater than or equal to diastolic, and\
