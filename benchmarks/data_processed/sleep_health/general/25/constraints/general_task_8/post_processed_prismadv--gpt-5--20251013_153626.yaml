      - start_line: 17
        end_line: 19
        file: ''
      uid: fd4a9a38-640b-4da0-91d3-4dff1549ad23
    - text: "At least 95% of 'Blood Pressure' values should match the format 'systolic/diastolic'\
        \ with exactly one slash and both parts numeric (2\u20133 digits), e.g., '120/80',\
        \ and no units or extra text. Example rule: Deequ .satisfies(\"`Blood Pressure`\
        \ RLIKE '^\\\\s*[0-9]{2,3}\\\\s*/\\\\s*[0-9]{2,3}\\\\s*$'\", 'BP_format_ok',\
