        \ Pressure', '^\\s*[0-9]{2,3}\\s*/\\s*[0-9]{2,3}\\s*$')."
      sources:
      - start_line: 17
        end_line: 19
        file: ''
      - start_line: 51
        end_line: 54
        file: ''
      uid: 92713c72-0ce6-47c2-b9cb-f18bd591d8dd
    - text: "When parsed, the systolic value should be in a plausible range (80\u2013\
        200) and the diastolic value in a plausible range (40\u2013120) to keep downstream\
        \ risk and scores meaningful. This can be enforced on the input via parsed\
        \ extraction: Deequ .satisfies(\"CAST(regexp_extract(`Blood Pressure`, '^(\\\
        \\s*)(\\\\d{2,3})\\\\s*/\\\\s*(\\\\d{2,3})\\\\s*$', 2) AS DOUBLE) BETWEEN\
        \ 80 AND 200 AND CAST(regexp_extract(`Blood Pressure`, '^(\\\\s*)(\\\\d{2,3})\\\
        \\s*/\\\\s*(\\\\d{2,3})\\\\s*$', 3) AS DOUBLE) BETWEEN 40 AND 120\", 'BP_ranges_ok',\
