        is not null (e.g. a Deequ-style check: .isComplete([''bp_sys'',''bp_dia''])
        or a predicate constraint like .satisfies(''not(isNull(bp_sys)) AND not(isNull(bp_dia))'',
        "bp_parsed_successfully")).'
      sources:
      - start_line: 17
        end_line: 19
        file: ''
      uid: a545870b-aec8-4d04-ace1-580d31a06ab5
    - text: 'Systolic and diastolic pressure should be physiologically ordered: ''bp_sys''
        >= ''bp_dia'' for each record, and the computed ''pulse_pressure'' = bp_sys
        - bp_dia should be non-negative. Actionable constraints: .satisfies(''bp_sys
        >= bp_dia'', ''systolic_ge_diastolic'') and .satisfies(''bp_sys - bp_dia >=
        0'', ''non_negative_pulse_pressure'').'
      sources:
      - start_line: 20
        end_line: 20
        file: ''
      - start_line: 34
        end_line: 37
        file: ''
      uid: 7abc719d-df7d-4b4a-afa8-e38c37102e26
    - text: 'Cardio component calculation requires numeric, non-null values for the
        trio (''bp_sys'', ''bp_dia'', ''Heart Rate''). For the cardio_component to
        be meaningful, all three columns should be present (not null) and numeric
        at the row level. Actionable constraints: .isComplete([''bp_sys'',''bp_dia'',''Heart
        Rate'']) or .satisfies(''not(isNull(bp_sys)) AND not(isNull(bp_dia)) AND not(isNull(Heart
        Rate))'', ''cardio_inputs_present'').'
      sources:
      - start_line: 32
        end_line: 38
        file: ''
      - start_line: 36
        end_line: 36
        file: ''
      uid: 125208cc-f960-47c4-9871-82487b0bd348
    - text: "The weekly-aggregation columns used in recommendations \u2014 'avg_systolic_bp',\
        \ 'avg_diastolic_bp' and 'avg_heart_rate' \u2014 must be numeric (not NaN)\
        \ for the recommendation logic to evaluate blood-pressure / heart-rate based\
        \ alerts. Actionable constraints after aggregation: .isComplete(['avg_systolic_bp','avg_diastolic_bp','avg_heart_rate'])\
        \ or targeted predicate checks like .satisfies('not(isNull(avg_systolic_bp))\
        \ OR not(isNull(avg_heart_rate))', 'at_least_one_cv_metric_present')."
      sources:
