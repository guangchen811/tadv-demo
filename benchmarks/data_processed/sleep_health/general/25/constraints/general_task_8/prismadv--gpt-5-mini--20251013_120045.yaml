        Disorder excluding nulls) == Primary Sleep Disorder. Example check: for each
        Person ID, compute mode_non_null = argmax_{v != null} count(Sleep Disorder
        = v) (or null if none); assert mode_non_null == Primary Sleep Disorder.'
