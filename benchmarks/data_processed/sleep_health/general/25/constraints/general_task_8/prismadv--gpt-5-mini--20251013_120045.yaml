  '["Age","Daily Steps","Heart Rate","Physical Activity Level","Quality of Sleep","Sleep Duration","Stress Level"]':
    code: []
    assumptions:
    - text: 'Sleep Duration and Quality of Sleep are numeric and lie in expected real-world
        ranges the scoring assumes (Sleep Duration in hours between 0 and 24; Quality
        of Sleep on a 0-10 scale). This is required because sleep_component = clip(0.6
        * duration_component + 0.4 * (Quality of Sleep / 10.0)) and out-of-range values
        will distort the 0..1 component. Example actionable Deequ-style constraint:
        .satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24 AND `Quality
        of Sleep` >= 0 AND `Quality of Sleep` <= 10", "sleep_range_check")'
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      uid: 3e42ee02-bfa4-44af-b32b-722dc28e1cd6
    - text: 'Daily Steps and Physical Activity Level must be non-negative and within
        the expected scaling windows the activity_component assumes (Daily Steps >=
        0; Physical Activity Level between 0 and 100). The code scales steps by 10000
        and activity level by 100 then mixes them, so negative or >100 activity-level
        values or negative steps will break the intended 0..1 scaling. Example constraint:
        .satisfies("`Daily Steps` >= 0 AND `Physical Activity Level` >= 0 AND `Physical
        Activity Level` <= 100", "activity_scale_check")'
      sources:
      - start_line: 28
        end_line: 31
        file: ''
      uid: b925fcd4-4e77-4b99-b274-7845abb2717c
    - text: 'bp_sys and bp_dia (derived from the ''Blood Pressure'' string) must be
        numeric, bp_sys should be greater than bp_dia for physiological consistency,
        and both should lie within reasonable physiological bounds (suggested: systolic
        50..250, diastolic 30..150). The script computes pulse_pressure = bp_sys -
        bp_dia and later uses bp_sys/bp_dia to compute risks without checks, so invalid
        ordering or extreme values will produce incorrect cardio_component. Example
        combined constraint: .satisfies("`bp_sys` IS NOT NULL AND `bp_dia` IS NOT
        NULL AND `bp_sys` > `bp_dia` AND `bp_sys` >= 50 AND `bp_sys` <= 250 AND `bp_dia`
        >= 30 AND `bp_dia` <= 150", "bp_physio_check")'
      sources:
      - start_line: 17
        end_line: 20
        file: ''
      - start_line: 34
        end_line: 38
        file: ''
      uid: 5f94e679-455c-4bf0-ab46-ab91dba0ac23
    - text: 'Heart Rate must be numeric and in a plausible range together with the
        BP fields because cardio_component mixes HR and BP-derived risks (Heart Rate
        between 30 and 220 bpm, non-null when bp_sys/bp_dia are present). The code
        computes hr_risk = clip(abs(Heart Rate - 70) / 30, 0, 1) and combines it with
        BP risk; missing or extreme HR values will distort cardio score. Example constraint:
        .satisfies("`Heart Rate` >= 30 AND `Heart Rate` <= 220 AND (`bp_sys` IS NULL
        OR (`bp_sys` IS NOT NULL AND `bp_dia` IS NOT NULL))", "hr_bp_presence_check")'
      sources:
      - start_line: 34
        end_line: 38
        file: ''
      - start_line: 56
        end_line: 66
        file: ''
      uid: 0a40ba4b-3219-4d61-95e1-f2cc31451ae9
    - text: 'Aggregated averages used for recommendations (avg_sleep_hours, avg_sleep_quality,
        avg_daily_steps, avg_stress_level, avg_systolic_bp, avg_diastolic_bp, avg_heart_rate)
        must be numeric and on the expected scales so the conditional recommendation
        thresholds behave correctly. For example, avg_sleep_quality must remain within
        0..10 and avg_daily_steps >= 0; avg_* fields should not all be NULL for a
        Person ID because gen_reco checks these values with numeric comparisons. Example
        combined check: .satisfies("`avg_sleep_hours` IS NULL OR (`avg_sleep_hours`
        >= 0 AND `avg_sleep_hours` <= 24) AND `avg_sleep_quality` >= 0 AND `avg_sleep_quality`
        <= 10 AND `avg_daily_steps` >= 0", "agg_avg_range_check")'
      sources:
      - start_line: 56
        end_line: 68
        file: ''
      - start_line: 94
        end_line: 116
        file: ''
      uid: 577a7112-c112-408e-a314-4d2851c8a05e
    - text: 'Values in ''Sleep Disorder'' and the derived ''Primary Sleep Disorder''
        must be consistent with the mapping used for disorder_factor (the code only
        maps ''Insomnia'' and ''Sleep Apnea'' to penalties and otherwise leaves factor=1.0).
        To ensure recommendations tied to specific disorders fire correctly, primary
        disorders should be either one of the mapped keys or treated as ''None'' (NULL).
