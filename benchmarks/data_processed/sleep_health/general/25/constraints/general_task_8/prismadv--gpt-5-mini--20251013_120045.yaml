  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Sleep Duration is provided as numeric hours and Quality of Sleep is provided
        on a 0-10 integer scale; both columns must be non-null and within expected
        bounds so the scaling (Sleep Duration compared to 8.0 and Quality of Sleep
        divided by 10.0) is valid. Actionable constraints examples:

        - Require completeness: Sleep Duration and Quality of Sleep completeness ==
        1.0 (or above a high threshold).

        - Range checks: 0.0 <= Sleep Duration <= 24.0 and 0 <= Quality of Sleep <=
        10.

        (Deequ-style examples: .hasCompleteness(''Sleep Duration'', 1.0), .hasCompleteness(''Quality
        of Sleep'', 1.0); .isContainedIn(''Sleep Duration'', 0.0, 24.0); .isContainedIn(''Quality
        of Sleep'', 0, 10))'
