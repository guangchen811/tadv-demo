      - start_line: 17
        end_line: 19
        file: ''
      - start_line: 34
        end_line: 37
        file: ''
      uid: 466c8951-2289-472d-bd51-394f9a72f4f0
    - text: 'For each Person ID, there should be at least one record where both bp_sys
        and bp_dia are non-null so aggregated avg_systolic_bp and avg_diastolic_bp
        are produced (used later for recommendations). Actionable checks:

        - At raw-row level: ensure at least one row per Person ID satisfies (bp_sys
        IS NOT NULL AND bp_dia IS NOT NULL).

        - Post-aggregation: ensure avg_systolic_bp and avg_diastolic_bp are complete
        (non-null) in the weekly/aggregated output.'
      sources:
      - start_line: 56
        end_line: 68
        file: ''
      - start_line: 103
        end_line: 106
        file: ''
      uid: 2bed80f8-c62b-4e99-9d3b-aee048cc7db7
    - text: 'The original ''Blood Pressure'' input string uses the ''systolic/diastolic''
        format so splitting produces two numeric parts that become bp_sys and bp_dia.
        If the format deviates, bp_sys/bp_dia will be coerced to NaN and downstream
        components/risk computations will be affected. Actionable constraint example
        on raw input:

        - .satisfies("`Blood Pressure` RLIKE ''^[0-9]+\\/[0-9]+''", ["Blood Pressure"])'
      sources:
      - start_line: 17
        end_line: 19
        file: ''
      uid: bc8f1c1f-c3fd-4b77-a2b2-6b09ef563ad2
    - text: 'At the aggregated/person level, the cardio recommendation logic expects
        at least one of avg_systolic_bp, avg_diastolic_bp, or avg_heart_rate to be
        present so the condition (avg_systolic_bp >= 140 OR avg_diastolic_bp >= 90
        OR avg_heart_rate >= 90) can be evaluated. Actionable check: ensure for each
        Person ID at least one of these aggregated fields is non-null.'
      sources:
      - start_line: 56
        end_line: 68
        file: ''
      - start_line: 103
        end_line: 106
        file: ''
