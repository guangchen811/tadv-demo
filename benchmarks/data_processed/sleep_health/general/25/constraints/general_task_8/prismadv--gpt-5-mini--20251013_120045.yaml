      uid: b4a66010-4063-43b0-a9ef-6311cd47ed69
    - text: 'The row-level computed sleep_component (which mixes a Sleep Duration-based
        term and a Quality of Sleep-based term) must be finite and lie in [0, 1] whenever
        Sleep Duration and Quality of Sleep are valid numbers. This ensures downstream
        clipping and scoring behave as expected. Actionable constraints:

        - For any row where Sleep Duration and Quality of Sleep are non-null and numeric,
        sleep_component is not null/NaN and 0.0 <= sleep_component <= 1.0.

        (Deequ-style: assert that for all rows with isFinite(''Sleep Duration'') AND
        isFinite(''Quality of Sleep''), the derived column ''sleep_component'' is
        between 0 and 1 and completeness of ''sleep_component'' == 1.0.)'
      sources:
      - start_line: 21
        end_line: 26
        file: ''
      - start_line: 50
        end_line: 54
        file: ''
      uid: 533aed83-fdb6-456b-a2b5-be6767d7f09a
    - text: 'At the weekly (per-Person ID) aggregation step, require that at least
        one of the aggregated sleep signals is present per person so recommendations
        can be evaluated: for each Person ID, avg_sleep_hours OR avg_sleep_quality
        should be non-null. Preferably both should be present for reliable recommendations.
        Actionable constraints:

        - No Person ID should have both aggregated Sleep Duration and aggregated Quality
        of Sleep as null.

        (Deequ-style: group-by ''Person ID'' and assert that count of groups where
        mean(''Sleep Duration'') is null AND mean(''Quality of Sleep'') is null ==
        0.)'
      sources:
