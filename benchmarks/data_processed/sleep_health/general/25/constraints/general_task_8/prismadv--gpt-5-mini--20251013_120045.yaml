  '["bp_dia","bp_sys"]':
    code: []
    assumptions:
    - text: 'For every record, bp_sys and bp_dia are numeric and reflect a valid systolic/diastolic
        pair such that systolic >= diastolic. Equivalently, pulse_pressure = bp_sys
        - bp_dia should be non-negative. Actionable constraint examples (Deequ-style):

        - .satisfies("bp_sys >= bp_dia", ["bp_sys", "bp_dia"])  # per-row

        - .satisfies("(bp_sys - bp_dia) >= 0", ["bp_sys", "bp_dia"])'
