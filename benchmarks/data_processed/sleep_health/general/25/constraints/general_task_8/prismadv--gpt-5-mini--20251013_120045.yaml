    - text: 'Cross-column/person consistency: If a Person''s Primary Sleep Disorder
        == X (where X is ''Insomnia'' or ''Sleep Apnea''), then there must exist at
        least one original-row record for that Person ID where Sleep Disorder == X
        and that row''s disorder_factor equals the mapped value for X (0.85 for Insomnia,
        0.75 for Sleep Apnea). This ties Primary Sleep Disorder, Sleep Disorder and
        disorder_factor together and ensures the primary label is supported by underlying
        rows and mapping application. Example group-level constraint: for each Person
        ID with Primary Sleep Disorder = ''Insomnia'', exists row with (Person ID,
        Sleep Disorder=''Insomnia'' AND disorder_factor=0.85); similarly for ''Sleep
        Apnea''.'
