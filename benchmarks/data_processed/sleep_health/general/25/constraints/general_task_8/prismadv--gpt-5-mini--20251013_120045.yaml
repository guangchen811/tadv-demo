    - text: 'Primary Sleep Disorder is the non-null mode of Sleep Disorder per person:
        For each Person ID, Primary Sleep Disorder should be null/None only if that
        person has no non-null Sleep Disorder entries; otherwise Primary Sleep Disorder
        must equal the most frequent non-null Sleep Disorder value for that Person
