    assumptions:
    - text: 'The original ''Blood Pressure'' string values follow a systolic/diastolic
        pattern such that splitting on ''/'' yields two parts that can be parsed as
        numeric values. Concretely, most rows should match a regex like ''^\s*\d+(\.\d+)?\s*/\s*\d+(\.\d+)?\s*$''
        and after the split both resulting columns (''bp_sys'' and ''bp_dia'') should
        be non-null/numeric. Example Deequ-style constraints: .hasPattern(''Blood
        Pressure'', ''^\\s*\\d+(\\.\\d+)?\\s*/\\s*\\d+(\\.\\d+)?\\s*$'') and .isComplete([''bp_sys'',''bp_dia'']).'
      sources:
      - start_line: 17
        end_line: 19
        file: ''
      uid: 77b6dd93-4181-4185-99d7-984f0bae360e
    - text: 'Systolic and diastolic values are expected to be numerically present
        together for a given record (i.e., rows meant for scoring should have both
        ''bp_sys'' and ''bp_dia'' populated). This supports subsequent computations
        (pulse_pressure and cardio risk) which assume both values exist. Actionable
        checks: .isComplete([''bp_sys'',''bp_dia'']) and/or a coverage constraint
        like fraction of rows where both are not null should be high (e.g., > 0.95).'
      sources:
      - start_line: 18
        end_line: 20
        file: ''
      - start_line: 34
        end_line: 38
        file: ''
      uid: 86d82c2e-a7d2-497a-9af8-eac245af7204
    - text: 'Physiologically consistent relationship: systolic should be greater than
        or equal to diastolic for records (bp_sys >= bp_dia). The code computes pulse_pressure
        = bp_sys - bp_dia and uses it in risk calculations, so negative pulse pressures
        indicate malformed or swapped values. Actionable constraint: .satisfies(''bp_sys
        >= bp_dia'', ''systolic_gte_diastolic'') or check fraction of rows satisfying
        bp_sys >= bp_dia is near 1.0.'
      sources:
      - start_line: 20
        end_line: 20
        file: ''
      - start_line: 34
        end_line: 37
        file: ''
      uid: 4d014c4d-b4d7-468b-a1c0-71fa1ccbc24d
    - text: 'Joint plausibility bounds for the pair (bp_sys, bp_dia): their difference
        (pulse_pressure) should be non-negative and within a plausible upper bound
        (e.g., 0 <= bp_sys - bp_dia <= 200), and both values should fall in reasonable
        ranges (for example 30 <= bp_dia <= 200 and 60 <= bp_sys <= 300). These constraints
        prevent extreme outliers from distorting risk scoring. Actionable Deequ-style
        constraints: .satisfies(''bp_sys - bp_dia >= 0 AND bp_sys - bp_dia <= 200'',
        ''pulse_pressure_range'') and .satisfies(''bp_sys BETWEEN 60 AND 300 AND bp_dia
        BETWEEN 30 AND 200'', ''bp_physiologic_range'').'
      sources:
      - start_line: 20
        end_line: 20
        file: ''
      - start_line: 34
        end_line: 38
        file: ''
      uid: 131c136f-0a88-4270-b164-c95aedfcb040
    - text: 'At the aggregated (weekly) level, avg_systolic_bp and avg_diastolic_bp
        are expected to be present together for a person when used for recommendation
        logic. The recommendation that flags elevated cardiovascular risk only runs
        when both averages are non-null, so valid persons should typically have both
        averages populated. Actionable checks: .isComplete([''avg_systolic_bp'',''avg_diastolic_bp''])
        at the weekly level or ensure a high fraction of persons have both not null.'
