        end_line: 20
        file: ''
      - start_line: 34
        end_line: 36
        file: ''
      uid: af71af50-8edd-431f-85e7-336a08be7a4f
    - text: 'bp_sys and bp_dia values fall within plausible clinical bounds (to avoid
        garbage values that break risk calculations). A concrete check: bp_sys in
        [70, 250] and bp_dia in [40, 150]. Actionable constraint example:

        - .satisfies("bp_sys >= 70 AND bp_sys <= 250 AND bp_dia >= 40 AND bp_dia <=
        150", ["bp_sys", "bp_dia"])'
