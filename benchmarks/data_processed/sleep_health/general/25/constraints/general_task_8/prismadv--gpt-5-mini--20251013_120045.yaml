    - text: 'Most rows should follow the pattern ''systolic/diastolic'' where both
        sides are numeric (integers or decimals). The code uses str.split(''/'', n=1)
        and then pd.to_numeric(..., errors=''coerce''), so non-matching patterns become
        NaN and will affect downstream numeric calculations. A practical rule is that
        at least 95% of values match a regex like ''^\s*\d+(\.\d+)?\s*/\s*\d+(\.\d+)?\s*$''.
        Example Deequ-style check: .satisfies("CASE WHEN regexp_like(`Blood Pressure`,
        ''^\\s*\\d+(\\.\\d+)?\\s*/\\s*\\d+(\\.\\d+)?\\s*$'') THEN 1 ELSE 0 END", "BP
        format numeric/numeric", lambda x: x >= 0.95).'
      sources:
      - start_line: 17
        end_line: 19
        file: ''
      - start_line: 34
        end_line: 35
        file: ''
      uid: c8f81b47-80e4-444b-b822-53638603dc73
    - text: 'When parsed to numeric, systolic and diastolic values should fall in
        plausible medical ranges to avoid nonsensical results in risk computations
        and thresholds. Reasonable bounds are systolic in [50, 250] mmHg and diastolic
        in [30, 150] mmHg. Enforce that a high fraction (e.g., 99%) of parsed values
        lie within these intervals. Example checks: .satisfies("CASE WHEN to_numeric(split_part(`Blood
        Pressure`,''/'',1)) BETWEEN 50 AND 250 THEN 1 ELSE 0 END", "Systolic plausible
        range", lambda x: x >= 0.99) and .satisfies("CASE WHEN to_numeric(split_part(`Blood
        Pressure`,''/'',2)) BETWEEN 30 AND 150 THEN 1 ELSE 0 END", "Diastolic plausible
        range", lambda x: x >= 0.99).'
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 51
        end_line: 53
        file: ''
      - start_line: 103
        end_line: 106
        file: ''
      uid: e8e5a0d1-6533-4429-b178-1dc98fbe9d05
    - text: 'There should be at least one valid numeric BP reading per Person ID so
        that aggregation (mean of bp_sys and bp_dia per person) produces a numeric
        average for use in recommendations. In other words, for each Person ID, the
        count of rows where both parsed systolic and diastolic are numeric should
        be >= 1. Example check (group-wise): for each Person ID, COUNT(CASE WHEN is_numeric(systolic)
        AND is_numeric(diastolic) THEN 1 END) >= 1.'
