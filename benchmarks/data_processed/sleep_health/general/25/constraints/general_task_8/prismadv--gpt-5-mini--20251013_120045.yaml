  '["Person ID","Primary Sleep Disorder","Sleep Disorder"]':
    code: []
    assumptions:
    - text: 'Consistency: For each Person ID, the non-null Sleep Disorder values should
        be consistent (i.e., there should be at most one distinct non-null Sleep Disorder
        per Person ID). This is required because the code derives a single ''Primary
        Sleep Disorder'' by taking the mode per Person ID and later uses that single
        value for recommendations. Actionable checks: (a) pandas: ensure df.groupby(''Person
        ID'')[''Sleep Disorder''].nunique(dropna=True).max() <= 1. (b) Deequ-style/group-check:
        for every Person ID, countDistinct(Sleep Disorder EXCLUDING NULL) <= 1 (or
        assert max over groups <= 1).'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 79
        end_line: 81
        file: ''
      uid: 1c8fe1b4-633c-498b-ae30-0eee2052c664
    - text: 'Derivation correctness: ''Primary Sleep Disorder'' must equal the most
        frequent non-null ''Sleep Disorder'' value for that Person ID (mode excluding
        NaN). If a person has no non-null Sleep Disorder entries, Primary Sleep Disorder
        should be null. Actionable checks: (a) Recompute per-person mode: primary
        = df.groupby(''Person ID'')[''Sleep Disorder''].apply(lambda g: g.dropna().mode().iloc[0]
        if g.dropna().size>0 else None) and assert equality with the produced ''Primary
        Sleep Disorder''. (b) Deequ: assert that for each Person ID, Primary Sleep
        Disorder == argmax_{val}(count(Sleep Disorder == val)).'
      sources:
      - start_line: 71
        end_line: 76
        file: ''
      - start_line: 79
        end_line: 81
        file: ''
      uid: 1855d9f5-4c38-49ff-b422-ed7a1d935595
    - text: 'Value domain: All non-null values in ''Sleep Disorder'' (and therefore
        computed ''Primary Sleep Disorder'') are expected to be one of the known categories
        used in the code: {''Insomnia'', ''Sleep Apnea''}. The mapping to disorder_factor
        and later recommendation logic only handles these two labels explicitly, so
        unexpected labels may lead to incorrect scoring or missing recommendations.
        Actionable checks: (a) enforce that non-null Sleep Disorder values are contained
        in the allowed set, e.g. .isContainedIn(''Sleep Disorder'', [''Insomnia'',''Sleep
        Apnea'']) for Deequ or df[''Sleep Disorder''].dropna().isin({''Insomnia'',''Sleep
        Apnea''}).all(). (b) same containment check for ''Primary Sleep Disorder''.'
      sources:
      - start_line: 45
        end_line: 48
        file: ''
      - start_line: 107
        end_line: 112
        file: ''
      uid: db26431b-fe8e-4623-953d-cf920c868e7b
    - text: 'One-to-one join expectation: After aggregation, each Person ID should
        appear exactly once in the weekly output and the merge of aggregated rows
        with the per-person Primary Sleep Disorder should not create duplicate Person
        ID rows. Concretely, both the aggregated frame (agg) and the disorder_by_person
        frame should have unique Person ID keys prior to the merge so that the left-join
        yields one row per Person ID. Actionable checks: assert agg[''Person ID''].is_unique
        and disorder_by_person[''Person ID''].is_unique before the merge, or in Deequ
        assert uniqueness of the [''Person ID''] key in both datasets.'
      sources:
      - start_line: 56
        end_line: 68
        file: ''
      - start_line: 79
        end_line: 81
        file: ''
      uid: 34654099-72f4-4c33-8956-b97ef42ce83e
