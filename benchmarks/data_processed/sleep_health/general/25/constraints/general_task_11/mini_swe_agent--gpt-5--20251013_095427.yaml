raw_constraints:
- column_name: Person ID
  code_for_constraint: .isComplete('Person ID')
- column_name: Person ID
  code_for_constraint: .isNonNegative('Person ID')
- column_name: Person ID
  code_for_constraint: .isUnique(['Person ID'])
- column_name: Age
  code_for_constraint: .isComplete('Age')
- column_name: Age
  code_for_constraint: .isNonNegative('Age')
- column_name: Age
  code_for_constraint: '.hasMax(''Age'', lambda x: x <= 120)'
- column_name: Gender
  code_for_constraint: .isComplete('Gender')
- column_name: Gender
  code_for_constraint: .isContainedIn('Gender', ['Male', 'Female', 'Other'])
- column_name: Sleep Duration
  code_for_constraint: .isComplete('Sleep Duration')
- column_name: Sleep Duration
  code_for_constraint: .isNonNegative('Sleep Duration')
- column_name: Sleep Duration
  code_for_constraint: '.hasMax(''Sleep Duration'', lambda x: x <= 24.0)'
- column_name: Quality of Sleep
  code_for_constraint: .isComplete('Quality of Sleep')
- column_name: Quality of Sleep
  code_for_constraint: '.hasMin(''Quality of Sleep'', lambda x: x >= 0)'
- column_name: Quality of Sleep
  code_for_constraint: '.hasMax(''Quality of Sleep'', lambda x: x <= 10)'
- column_name: Physical Activity Level
  code_for_constraint: .isComplete('Physical Activity Level')
- column_name: Physical Activity Level
  code_for_constraint: .isNonNegative('Physical Activity Level')
- column_name: Stress Level
  code_for_constraint: .isComplete('Stress Level')
- column_name: Stress Level
  code_for_constraint: '.hasMin(''Stress Level'', lambda x: x >= 0)'
- column_name: Stress Level
  code_for_constraint: '.hasMax(''Stress Level'', lambda x: x <= 10)'
- column_name: BMI Category
  code_for_constraint: .isComplete('BMI Category')
- column_name: BMI Category
  code_for_constraint: .isContainedIn('BMI Category', ['Normal', 'Normal Weight',
    'Overweight', 'Obese'])
- column_name: Blood Pressure
  code_for_constraint: .isComplete('Blood Pressure')
- column_name: Blood Pressure
  code_for_constraint: .hasPattern('Blood Pressure', '^\d{2,3}/\d{2,3}$')
- column_name: Daily Steps
  code_for_constraint: .isComplete('Daily Steps')
- column_name: Daily Steps
  code_for_constraint: .isNonNegative('Daily Steps')
- column_name: Heart Rate
  code_for_constraint: '.hasMin(''Heart Rate'', lambda x: x >= 0)'
