results:
  Physical Activity Level:
    code:
    - suggestion: '.hasCompleteness("Physical Activity Level", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Daily Steps` IS NOT NULL AND `Physical Activity Level`
        IS NOT NULL", "PAL-steps paired availability", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(`Quality of Sleep` >= 3 AND `Quality of Sleep` <=
        9)'', ''QoS in [3,9] (>=95%)'', lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` = CAST(`Quality of Sleep` AS INT)'',
        ''QoS integer-like (>=95%)'', lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Obese'',''Overweight'',''Normal'',''Normal
        Weight'') THEN 1 ELSE 0 END", "Valid BMI categories", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.satisfies("CAST(regexp_extract(`Blood Pressure`, ''^([0-9]{2,3})/([0-9]{2,3})$'',
        1) AS INT) IS NOT NULL AND CAST(regexp_extract(`Blood Pressure`, ''^([0-9]{2,3})/([0-9]{2,3})$'',
        2) AS INT) IS NOT NULL", "BP parsed not null", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(regexp_extract(`Blood Pressure`, ''^([0-9]{2,3})/([0-9]{2,3})$'',
        1) AS INT) > CAST(regexp_extract(`Blood Pressure`, ''^([0-9]{2,3})/([0-9]{2,3})$'',
        2) AS INT)", "BP order Systolic>Diastolic", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(regexp_extract(`Blood Pressure`, ''^([0-9]{2,3})/([0-9]{2,3})$'',
        1) AS INT) BETWEEN 90 AND 200 AND CAST(regexp_extract(`Blood Pressure`, ''^([0-9]{2,3})/([0-9]{2,3})$'',
        2) AS INT) BETWEEN 50 AND 120", "BP physiological range", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("`Person ID` RLIKE '^[0-9]+$'", "Person ID numeric (digits
        only)")
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.satisfies("(`Sleep Duration` >= 0 AND `Sleep Duration` <= 24)",
        "Sleep Duration in [0,24] hours", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`Sleep Duration` >= 5 AND `Sleep Duration` <= 11)",
        ">=90% of Sleep Duration within [5,11] hours", lambda v: v >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Daily Steps` AS DOUBLE) IS NOT NULL'', ''Daily
        Steps numeric parseable'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Daily Steps` AS DOUBLE) IS NOT NULL AND CAST(`Physical
        Activity Level` AS DOUBLE) IS NOT NULL'', ''At least one row with Steps and
        PAL'', lambda v: v > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Daily Steps` AS DOUBLE) >= 0'', ''Daily Steps
        non-negative'', lambda v: v == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CAST(`Daily Steps` AS DOUBLE) >=
        0'', ''Daily Steps non-negative'', lambda v: v == 1.0)'' failed on data sample:
        Value: 0.9866666666666667 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''CAST(`Daily Steps` AS DOUBLE) <= 200000'', ''Daily
        Steps plausible upper bound'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`Daily Steps` AS DOUBLE) = CAST(CAST(`Daily Steps`
        AS BIGINT) AS DOUBLE)'', ''Daily Steps must be integers'', lambda v: v ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL THEN 1 WHEN `Sleep
        Disorder` = TRIM(`Sleep Disorder`) AND `Sleep Disorder` IN (''Sleep Apnea'',''Insomnia'')
        THEN 1 ELSE 0 END", ''Sleep Disorder valid labels when present'', lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: .isComplete("Heart Rate")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` >= 30 AND `Heart Rate` <= 220
        THEN 1 ELSE 0 END", "Heart Rate plausible bounds", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` BETWEEN 20 AND 120 THEN 1 ELSE
        0 END", "HR central range", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies(''`Stress Level` >= 1 AND `Stress Level` <= 10'', ''Stress
        Level in [1, 10]'', lambda v: v == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete("Age")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Age` BETWEEN 0 AND 120", "Age plausible range", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Age","BMI Category","Diastolic","Heart Rate","Systolic"]':
    code:
    - suggestion: '.satisfies("`Blood Pressure` rlike ''^[0-9]{2,3}/[0-9]{2,3}$''",
        ''bp_format'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Blood Pressure","Diastolic","Systolic"]':
    code:
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) > CAST(SPLIT(`Blood
        Pressure`, ''/'')[1] AS INT)", "bp_physiologic_order", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) BETWEEN
        90 AND 200 AND CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS INT) BETWEEN 50 AND
        120", "bp_range_ok", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CONCAT(CAST(CAST(SPLIT(`Blood Pressure`, ''/'')[0]
        AS INT) AS STRING), ''/'', CAST(CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS
        INT) AS STRING)) = `Blood Pressure`", "bp_text_matches_columns", lambda v:
        v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
