results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies("CAST(`Physical Activity Level` AS double) IS NOT NULL",
        "Physical Activity Level numeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative("`Physical Activity Level`")
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Quality of Sleep'', lambda m: m >= 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Quality of Sleep'', lambda M: M <= 10)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` >= 6 AND `Quality of Sleep` <=
        9'', ''QoS mostly 6-9'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("(`BMI Category` IS NULL) OR (`BMI Category` IS NOT
        NULL)", "BMI Category column exists", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''BMI Category'', [''Obese'', ''Overweight'', ''Normal'',
        ''Normal Weight''], lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`BMI Category` = trim(`BMI Category`)", "BMI labels
        trimmed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\d{2,3}/\\d{2,3}$'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: '.satisfies("`Person ID` IS NOT NULL OR `Person ID` IS NULL", "Person
        ID column exists", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Person ID", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Person ID` AS BIGINT) IS NOT NULL", "Person ID
        integral or castable", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.satisfies(''CAST(`Sleep Duration` AS DOUBLE) >= 0 AND CAST(`Sleep
        Duration` AS DOUBLE) <= 24'', ''Sleep Duration realistic range'', lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative(''`Daily Steps`'', lambda f: f == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''isNonNegative(''`Daily Steps`'', lambda f: f
        == 1.0)'' failed on data sample: Value: 0.9866666666666667 does not meet the
        constraint requirement!'
      level: error
    - suggestion: '.hasMax(''Daily Steps'', lambda m: m >= 10000)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL THEN 1 WHEN LOWER(`Sleep
        Disorder`) RLIKE ''(sleep apnea|insomnia)'' THEN 1 ELSE 0 END", "Recognized
        Sleep Disorder labels", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Sleep Disorder", lambda x: x >= 0.40)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.satisfies("CAST(`Heart Rate` AS DOUBLE) IS NOT NULL", "Heart Rate
        parseable", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Heart Rate'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Heart Rate` BETWEEN 30 AND 220", "Resting HR plausible
        range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(CAST(`Heart Rate` AS DOUBLE) IS NULL) OR (CAST(`Heart
        Rate` AS DOUBLE) = FLOOR(CAST(`Heart Rate` AS DOUBLE)))", "Heart Rate integer
        bpm", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Stress Level` >= 1 AND `Stress Level` <= 10'', ''Stress
        Level in 1-10'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: '.hasCompleteness(''Age'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''Age >= 0 AND Age <= 120'', ''Age plausible range'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Age","BMI Category","Blood Pressure","Daily Steps","Heart Rate","Person ID","Physical
    Activity Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.satisfies("CAST(`Daily Steps` AS DOUBLE) IS NOT NULL AND CAST(`Physical
        Activity Level` AS DOUBLE) IS NOT NULL", "Daily Steps and Physical Activity
        Level present and numeric", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        c: c is not None and c > 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Stress Level` BETWEEN 0 AND 10 AND `Quality of Sleep`
        BETWEEN 0 AND 10", "Stress Level and Quality of Sleep within 0-10 scale",
        lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Stress Level", "Quality of Sleep", lambda c: c
        is not None and c < 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.satisfies("`Stress Level` IS NOT NULL AND `Quality of Sleep` IS
        NOT NULL", "stress_sleep_completeness", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Stress Level` BETWEEN 0 AND 10) AND (`Quality of
        Sleep` BETWEEN 0 AND 10) AND (`Stress Level` = CAST(`Stress Level` AS INT))
        AND (`Quality of Sleep` = CAST(`Quality of Sleep` AS INT))", "sq_inputs_range_int",
        lambda r: r >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
