results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies("CASE WHEN try_cast(`Physical Activity Level` AS double)
        IS NOT NULL AND try_cast(`Physical Activity Level` AS double) = try_cast(`Physical
        Activity Level` AS double) AND ABS(try_cast(`Physical Activity Level` AS double))
        < 1e308 THEN 1 ELSE 0 END", "PhysicalActivity_finite", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Quality of Sleep'', lambda x: x >= 4)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Quality of Sleep'', lambda x: x <= 9)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isContainedIn(''Quality of Sleep'', [''4'', ''5'', ''6'', ''7'',
        ''8'', ''9''], lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Normal'',''Normal Weight'',''Overweight'',''Obese'')
        AND TRIM(`BMI Category`) = `BMI Category` THEN 1 ELSE 0 END", "Exact-match
        BMI Category", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\s*\\d+\\s*/\\s*\\d+\\s*$'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Person ID` = CAST(`Person ID` AS BIGINT)
        THEN 1 ELSE 0 END'', ''Person ID integral'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('`Person ID`')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Person ID'', lambda x: x <= 10000000)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies(''CASE WHEN `Sleep Duration` IS NOT NULL AND TRY_CAST(`Sleep
        Duration` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END'', ''sleep_duration_numeric_and_not_null'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN TRY_CAST(`Sleep Duration` AS DOUBLE) BETWEEN
        0 AND 24 THEN 1 ELSE 0 END'', ''sleep_duration_plausible_hours'', lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN TRY_CAST(`Sleep Duration` AS DOUBLE) >=
        3.0 AND TRY_CAST(`Sleep Duration` AS DOUBLE) <= 12.0 THEN 1 ELSE 0 END'',
        ''sleep_duration_within_expected_norm_range'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.satisfies(''CASE WHEN TRY_CAST(`Daily Steps` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END'', ''Daily Steps numeric'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Daily Steps` >= 0 THEN 1 ELSE 0 END'',
        ''Daily Steps non-negative'', lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN `Daily Steps` >= 0 THEN
        1 ELSE 0 END'', ''Daily Steps non-negative'', lambda x: x == 1.0)'' failed
        on data sample: Value: 0.9866666666666667 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.hasSize(lambda x: x >= 2)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMean(''Daily Steps'', lambda v: (v is not None) and (v == v)
        and (v != float(''inf'')) and (v != -float(''inf'')))'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IN (''Insomnia'',''Sleep
        Apnea'') OR `Sleep Disorder` IS NULL THEN 1 ELSE 0 END", "Valid Sleep Disorder
        values or NULL (>=95% expected)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN typeof(`Sleep Disorder`) IN (''string'',''null'')
        THEN 1 ELSE 0 END", "Type is string or null (no complex types)", lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: '.hasCompleteness("Stress Level", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Stress Level` BETWEEN 3 AND 8 THEN 1 ELSE
        0 END", "StressLevelRange", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Stress Level", "Quality of Sleep", lambda x: x
        < 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BP_DIA","BP_SYS","Blood Pressure"]':
    code:
    - suggestion: '.satisfies("CAST(element_at(split(`Blood Pressure`, ''/''), 1)
        AS INT) >= 40 AND CAST(element_at(split(`Blood Pressure`, ''/''), 1) AS INT)
        <= 250 AND CAST(element_at(split(`Blood Pressure`, ''/''), 2) AS INT) >= 20
        AND CAST(element_at(split(`Blood Pressure`, ''/''), 2) AS INT) <= 150", "BP_sys_dia_within_reasonable_bounds",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("size(split(`Blood Pressure`, ''/'')) = 2 AND element_at(split(`Blood
        Pressure`, ''/''), 1) rlike ''^[0-9]+$'' AND element_at(split(`Blood Pressure`,
        ''/''), 2) rlike ''^[0-9]+$'' AND `Sleep Duration` IS NOT NULL AND `Quality
        of Sleep` IS NOT NULL AND `Sleep Duration` rlike ''^[0-9]+(\\.[0-9]+)?$''
        AND `Quality of Sleep` rlike ''^[0-9]+(\\.[0-9]+)?$''", "bp_and_sleep_columns_complete_and_numeric",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(columnA=''Physical Activity Level'', columnB=''Daily
        Steps'', assertion=lambda x: (x == x) and (abs(x) <= 1.0))'
      status: true
      reason_if_failed: ''
      level: error
  '["Sleep Disorder","disorder_penalty"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` = ''Insomnia'' THEN 0.20
        WHEN `Sleep Disorder` = ''Sleep Apnea'' THEN 0.30 WHEN `Sleep Disorder` IS
        NULL THEN 0.05 ELSE NULL END IS NOT NULL AND CASE WHEN `Sleep Disorder` =
        ''Insomnia'' THEN 0.20 WHEN `Sleep Disorder` = ''Sleep Apnea'' THEN 0.30 WHEN
        `Sleep Disorder` IS NULL THEN 0.05 ELSE NULL END >= 0.05 AND CASE WHEN `Sleep
        Disorder` = ''Insomnia'' THEN 0.20 WHEN `Sleep Disorder` = ''Sleep Apnea''
        THEN 0.30 WHEN `Sleep Disorder` IS NULL THEN 0.05 ELSE NULL END <= 0.30",
        "disorder_penalty mapping finite and bounded", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `BMI Category` = ''Normal'' THEN 0.0 WHEN
        `BMI Category` = ''Normal Weight'' THEN 0.0 WHEN `BMI Category` = ''Overweight''
        THEN 0.10 WHEN `BMI Category` = ''Obese'' THEN 0.20 ELSE NULL END IS NOT NULL
        AND CASE WHEN `BMI Category` = ''Normal'' THEN 0.0 WHEN `BMI Category` = ''Normal
        Weight'' THEN 0.0 WHEN `BMI Category` = ''Overweight'' THEN 0.10 WHEN `BMI
        Category` = ''Obese'' THEN 0.20 ELSE NULL END >= 0.0 AND CASE WHEN `BMI Category`
        = ''Normal'' THEN 0.0 WHEN `BMI Category` = ''Normal Weight'' THEN 0.0 WHEN
        `BMI Category` = ''Overweight'' THEN 0.10 WHEN `BMI Category` = ''Obese''
        THEN 0.20 ELSE NULL END <= 0.20", "bmi_penalty mapping finite and bounded",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
