results:
  Physical Activity Level:
    code:
    - suggestion: '.hasCompleteness(''Physical Activity Level'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda x: x
        > 1e-12)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Physical Activity Level` IS NULL OR (`Physical Activity
        Level` >= 0 AND `Physical Activity Level` <= 100)'', ''PhysicalActivityLevel_RangeCheck'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10",
        "Quality of Sleep within range [0, 10]", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 4 AND `Sleep Duration` <= 12",
        "Sleep duration within reasonable range", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        c: c > 0.5)'
      status: false
      reason_if_failed: 'Constraint ''hasCorrelation(''Daily Steps'', ''Physical Activity
        Level'', lambda c: c > 0.5)'' failed on data sample: Value: 0.4085269158517064
        does not meet the constraint requirement!'
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.satisfies("`Heart Rate` >= 50 AND `Heart Rate` <= 100", "Heart
        Rate within normal range [50, 100]", lambda x: x > 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Heart Rate` <= 120", "Heart Rate not in crisis range
        (> 120)", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete("Stress Level")
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Blood Pressure","Daily Steps","Heart Rate","Person ID","Physical Activity Level","Quality
    of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.satisfies("CASE WHEN `Blood Pressure` IS NULL THEN TRUE ELSE CAST(trim(split(`Blood
        Pressure`, ''/'')[0]) AS INT) >= CAST(trim(split(`Blood Pressure`, ''/'')[1])
        AS INT) END", "SystolicNotLessThanDiastolic", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda corr:
        corr >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        corr: corr > 0.1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("NOT (`Daily Steps` < 3000 AND `Physical Activity Level`
        > 80)", "NoLowStepsHighActivityAnomaly", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) >= CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT)", "SystolicBP_GTE_DiastolicBP", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        c: c >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        corr: corr > 0.5)'
      status: false
      reason_if_failed: 'Constraint ''hasCorrelation("Daily Steps", "Physical Activity
        Level", lambda corr: corr > 0.5)'' failed on data sample: Value: 0.4085269158517064
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Daily Steps` < 5000 AND `Physical Activity Level`
        < 30", "MediumRiskLowActivityPrevalence", lambda x: x < 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        c: c > 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
