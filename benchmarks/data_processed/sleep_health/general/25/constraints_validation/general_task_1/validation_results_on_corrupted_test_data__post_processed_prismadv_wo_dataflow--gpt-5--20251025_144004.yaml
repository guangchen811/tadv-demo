results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('`Physical Activity Level`')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Physical Activity Level` <= 100'', ''PA upper bound'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.hasCompleteness(''Quality of Sleep'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: '.isContainedIn(''BMI Category'', [''Obese'', ''Overweight'', ''Normal'',
        ''Normal Weight''], lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`BMI Category` IS NULL) OR (TRIM(`BMI Category`) =
        `BMI Category`)", "BMI Category trimmed", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\s*\\d+\\s*/\\s*\\d+\\s*$'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) > CAST(SPLIT(`Blood
        Pressure`, ''/'')[1] AS INT)", ''BP systolic greater than diastolic'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: '.hasCompleteness(''Person ID'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasDistinctness([''Person ID''], lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Person ID` AS BIGINT) IS NOT NULL", "Person ID
        integer-like", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Person ID` AS STRING) = TRIM(CAST(`Person ID`
        AS STRING))", "No surrounding whitespace in Person ID", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` > 0 AND `Sleep Duration` <= 24", "Sleep
        Duration in (0,24]", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isNonNegative('`Daily Steps`')
      status: false
      reason_if_failed: 'Constraint ''isNonNegative(''`Daily Steps`'')'' failed on
        data sample: Value: 0.9866666666666667 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Daily Steps` IS NULL OR (`Daily Steps` = CAST(`Daily
        Steps` AS BIGINT))", "Daily Steps integer-like", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR (TRIM(`Sleep Disorder`)
        = '''') OR (TRIM(`Sleep Disorder`) IN (''Insomnia'', ''Sleep Apnea''))", "Sleep
        Disorder values trimmed and allowed or null/empty", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''(`Stress Level` >= 0 AND `Stress Level` <= 10) OR
        `Stress Level` IS NULL'', ''Stress Level within [0,10] (NULL allowed)'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Stress Level'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: '.satisfies("CAST(`Age` AS double) IS NOT NULL", "Age parseable",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness("Age", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Age` AS double) BETWEEN 0 AND 120", "Age plausible
        range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(CAST(`Age` AS double) IS NULL) OR (CAST(`Age` AS double)
        = FLOOR(CAST(`Age` AS double)))", "Age integer-like", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(CAST(`Age` AS double) IS NULL) OR (CAST(`Age` AS double)
        <> 0)", "Age zero fraction low", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["diastolic","systolic"]':
    code:
    - suggestion: '.satisfies("`Blood Pressure` IS NOT NULL AND instr(`Blood Pressure`,
        ''/'') > 0 AND CAST(substring_index(`Blood Pressure`, ''/'', 1) AS INT) IS
        NOT NULL AND CAST(substring_index(`Blood Pressure`, ''/'', -1) AS INT) IS
        NOT NULL AND CAST(substring_index(`Blood Pressure`, ''/'', 1) AS INT) > CAST(substring_index(`Blood
        Pressure`, ''/'', -1) AS INT)", "bp_valid_and_systolic_gt_diastolic", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
