results:
  Physical Activity Level:
    code:
    - suggestion: '.hasCompleteness(''Physical Activity Level'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasSize(lambda s: s >= 100)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.hasCompleteness("Quality of Sleep", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` >= 0 AND `Quality of Sleep`
        <= 10 THEN 1 ELSE 0 END", "Quality of Sleep in [0,10]", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN floor(`Quality of Sleep`) = `Quality of Sleep`
        THEN 1 ELSE 0 END", "Quality of Sleep is integer", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN TRIM(`BMI Category`) IN (''Normal'',''Normal
        Weight'',''Overweight'',''Obese'') THEN 1 ELSE 0 END", "Fraction of mapped
        BMI Categories", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IN (''Normal'',''Normal Weight'',''Overweight'',''Obese'')
        THEN 1 ELSE 0 END", "Valid BMI Categories (exact match)", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN TRIM(`BMI Category`) IN (''Overweight'',''Obese'')
        THEN 1 ELSE 0 END", "Presence of Overweight/Obese (>=1% rows)", lambda x:
        x >= 0.01)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.satisfies("CASE WHEN regexp_like(`Blood Pressure`, ''([0-9]{2,3}/[0-9]{2,3})'')
        THEN 1 ELSE 0 END", "Contains numeric BP pair", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        1) IS NOT NULL AND regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        2) IS NOT NULL THEN 1 ELSE 0 END", "Parsable SBP/DBP", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        1) AS INT) BETWEEN 70 AND 250 AND cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        2) AS INT) BETWEEN 30 AND 150 AND cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        1) AS INT) > cast(regexp_extract(`Blood Pressure`, ''([0-9]{2,3})/([0-9]{2,3})'',
        2) AS INT) THEN 1 ELSE 0 END", "Physiologic BP ranges and ordering", lambda
        x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Blood Pressure` IS NOT NULL AND trim(`Blood
        Pressure`) <> '''' THEN 1 ELSE 0 END", "Non-empty BP", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Person ID` IS NOT NULL AND floor(`Person
        ID`) = `Person ID` THEN 1 ELSE 0 END", "Person ID integer-valued", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Sleep Duration` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "Sleep Duration parseable as numeric", lambda x:
        x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Sleep Duration` AS DOUBLE) IS NOT
        NULL AND TRY_CAST(`Sleep Duration` AS DOUBLE) >= 0 AND TRY_CAST(`Sleep Duration`
        AS DOUBLE) <= 24 THEN 1 ELSE 0 END", "Sleep Duration in hours range (0-24)
        for parsed values", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Sleep Duration` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "Non-null / parseable Sleep Duration fraction (overlap
        with downstream features)", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.satisfies(''CASE WHEN TRY_CAST(`Daily Steps` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END'', ''Daily Steps numeric-convertible'', lambda x: x
        >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Daily Steps'', lambda x: x > 1e-6)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN TRY_CAST(`Daily Steps` AS DOUBLE) IS NOT
        NULL AND TRY_CAST(`Daily Steps` AS DOUBLE) >= 0 AND floor(TRY_CAST(`Daily
        Steps` AS DOUBLE)) = TRY_CAST(`Daily Steps` AS DOUBLE) THEN 1 ELSE 0 END'',
        ''Daily Steps valid counts'', lambda x: x >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''satisfies(''CASE WHEN TRY_CAST(`Daily Steps`
        AS DOUBLE) IS NOT NULL AND TRY_CAST(`Daily Steps` AS DOUBLE) >= 0 AND floor(TRY_CAST(`Daily
        Steps` AS DOUBLE)) = TRY_CAST(`Daily Steps` AS DOUBLE) THEN 1 ELSE 0 END'',
        ''Daily Steps valid counts'', lambda x: x >= 0.99)'' failed on data sample:
        Value: 0.9866666666666667 does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR `Sleep Disorder`
        IN (''Sleep Apnea'',''Insomnia'') THEN 1 ELSE 0 END", "Sleep Disorder in expected
        set or null", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` = ''Sleep Apnea'' THEN 1
        ELSE 0 END", "Exact Sleep Apnea labeling (code expects exact ''Sleep Apnea'')",
        lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR LOWER(`Sleep
        Disorder`) NOT IN (''nan'',''none'',''na'',''n/a'') THEN 1 ELSE 0 END", "No
        literal missing-value strings in Sleep Disorder", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.satisfies("CASE WHEN CAST(`Heart Rate` AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END", "HeartRateNumeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("Heart Rate")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Heart Rate` >= 30 AND `Heart Rate` <= 220
        THEN 1 ELSE 0 END", "HeartRatePlausibleRange", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("CASE WHEN `Stress Level` IS NOT NULL THEN 1 ELSE 0
        END", "Stress Level present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("Stress Level")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Stress Level` >= 3 AND `Stress Level` <=
        8 THEN 1 ELSE 0 END", "Stress Level in [3,8]", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Stress Level` IN (3,4,5,6,7,8) THEN 1 ELSE
        0 END", "Stress Level in allowed categories (3-8)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: '.satisfies("CAST(`Age` AS DOUBLE) IS NOT NULL", "Age parseable
        as numeric", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Age` AS DOUBLE) IS NOT NULL", "At least some
        numeric Age values present (>=1% of rows)", lambda x: x >= 0.01)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(`Age` AS DOUBLE) >= 0 AND CAST(`Age` AS DOUBLE)
        <= 120", "Age within plausible human range (>=99% between 0 and 120)", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Age` AS DOUBLE) BETWEEN 30 AND 70", "Sufficient
        coverage in scaling window [30,70] (>=5% of rows)", lambda x: x >= 0.05)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` = ''Sleep Apnea'' THEN CASE
        WHEN `BMI Category` IN (''Normal'',''Normal Weight'',''Overweight'',''Obese'')
        THEN 1 ELSE 0 END ELSE 1 END", "apnea_bmi_valid", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
