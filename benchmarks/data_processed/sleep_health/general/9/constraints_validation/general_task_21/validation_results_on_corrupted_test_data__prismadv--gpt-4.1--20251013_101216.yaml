results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Quality of Sleep` >= 4 AND `Quality of Sleep` <=
        9'', ''Quality of Sleep in [4,9]'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Blood Pressure
        Format")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CAST(split(`Blood Pressure`, '/')[0] AS int) >= 70 AND
        CAST(split(`Blood Pressure`, '/')[0] AS int) <= 250 AND CAST(split(`Blood
        Pressure`, '/')[1] AS int) >= 40 AND CAST(split(`Blood Pressure`, '/')[1]
        AS int) <= 150", "Blood Pressure Range")
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Sleep Duration` >= 0 AND `Sleep Duration` <= 24', 'Sleep
        Duration plausible human range')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Daily Steps` >= 0 AND `Daily Steps` <= 20000'', ''Plausible
        step count'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Daily Steps'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: .satisfies('`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ("Insomnia",
        "Sleep Apnea")', 'Sleep Disorder only null or valid labels')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies("(`Sleep Disorder` != ''Sleep Apnea'' OR (`BMI Category`
        IN (''Overweight'', ''Obese'', ''Normal'', ''Normal Weight'') AND `BMI Category`
        IS NOT NULL))", "Sleep Apnea rows must have valid BMI Category", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`Sleep Disorder` != ''Sleep Apnea'' OR `BMI Category`
        IS NOT NULL)", "BMI Category completeness for Sleep Apnea", lambda x: x >=
        0.9)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("((`Sleep Disorder` NOT IN (''Insomnia'', ''Sleep Apnea''))
        OR `BMI Category` IN (''Overweight'', ''Obese'', ''Normal'', ''Normal Weight''))",
        "BMI Category values valid for labeled disorders", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
  '["Blood Pressure","Diastolic","Systolic"]':
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Blood Pressure
        format is Systolic/Diastolic")
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        r: abs(r) > 0.5)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation(''Physical Activity Level'',
        ''Daily Steps'', lambda r: abs(r) > 0.5)'' failed on data sample: Value: 0.1168215256926334
        does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies('`Physical Activity Level` >= 0 AND `Daily Steps` >=
        0', 'Non-negative activity and steps')
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level","Stress Level"]':
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        c: c is not None and c >= 0.3)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation(''Physical Activity Level'',
        ''Daily Steps'', lambda c: c is not None and c >= 0.3)'' failed on data sample:
        Value: 0.1168215256926334 does not meet the constraint requirement!'
      level: error
    - suggestion: .satisfies('(`Physical Activity Level` >= 0 AND `Daily Steps` >=
        0)', 'No negative values for activity or steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Physical Activity Level` >= 80 THEN `Daily
        Steps` > 5000 ELSE TRUE END'', ''High activity should not have low steps'',
        lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN `Physical Activity Level`
        >= 80 THEN `Daily Steps` > 5000 ELSE TRUE END'', ''High activity should not
        have low steps'', lambda x: x >= 0.98)'' failed on data sample: Value: 0.9733333333333334
        does not meet the constraint requirement!'
      level: warning
  '["Quality of Sleep","Sleep Duration","Stress Level"]':
    code:
    - suggestion: .satisfies('CAST(`Quality of Sleep` AS DOUBLE) IS NOT NULL AND CAST(`Sleep
        Duration` AS DOUBLE) IS NOT NULL', 'Quality and Duration Numeric')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`Quality of Sleep` <= 6 AND `Sleep Duration` >= 7)
        OR (`Quality of Sleep` > 6 OR `Sleep Duration` < 7)', 'Low QoS & Long Sleep
        Meaningful')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('CAST(`Stress Level` AS DOUBLE) IS NOT NULL', 'Stress
        Level Numeric for Label Filter')
      status: true
      reason_if_failed: ''
      level: error
