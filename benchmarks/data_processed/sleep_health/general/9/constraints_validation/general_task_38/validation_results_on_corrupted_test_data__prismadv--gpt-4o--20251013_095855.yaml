results:
  Physical Activity Level:
    code:
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda x: x
        > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        x: x is not None)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.hasStandardDeviation(''Quality of Sleep'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Sleep Duration'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        x: abs(x) > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: undefined
  Blood Pressure:
    code:
    - suggestion: .hasPattern('Blood Pressure', '\\d{2,3}/\\d{2,3}')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: undefined
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Sleep Duration` >= 3 AND `Sleep Duration` <= 10', 'Bounded
        Sleep Duration')
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: .satisfies("`Sleep Disorder` IN ('Sleep Apnea', 'Insomnia') OR `Sleep
        Disorder` IS NULL", "Valid Sleep Disorder Values")
      status: true
      reason_if_failed: ''
      level: undefined
  Heart Rate:
    code:
    - suggestion: .satisfies('`Heart Rate` >= 55.0 AND `Heart Rate` <= 95.0', 'Valid
        Heart Rate Range')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: undefined
  Stress Level:
    code:
    - suggestion: .satisfies('`Stress Level` BETWEEN 3 AND 8', 'Stress Level in Range')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''`Stress Level` BETWEEN 3 AND 8'',
        ''Stress Level in Range'')'' failed on data sample: Value: 0.9 does not meet
        the constraint requirement!'
      level: error
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
  '["Age","age_index"]':
    code:
    - suggestion: '.haveCompleteness([''Age''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Heart Rate","hr_index"]':
    code:
    - suggestion: '.satisfies(''`Heart Rate` >= 55 AND `Heart Rate` <= 95'', ''Heart
        Rate Range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
