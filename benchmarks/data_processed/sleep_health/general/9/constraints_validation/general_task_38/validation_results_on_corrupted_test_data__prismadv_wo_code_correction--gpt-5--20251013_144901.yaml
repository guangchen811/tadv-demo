results:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies("CASE WHEN CAST(`Physical Activity Level` AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END", "PAL numeric parseable", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda x: x
        > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` IS NOT NULL THEN CASE WHEN
        CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END ELSE
        1 END", "PAL present when steps present", lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.hasStandardDeviation(''Quality of Sleep'', lambda s: s > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Quality of Sleep` >= 0 AND `Quality of Sleep` <=
        10'', ''QoS within 0-10'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`Quality of Sleep` AS DOUBLE) = CAST(CAST(`Quality
        of Sleep` AS BIGINT) AS DOUBLE)'', ''QoS integer-like'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("`BMI Category` = TRIM(`BMI Category`) AND `BMI Category`
        RLIKE ''^(Normal|Normal Weight|Overweight|Obese)$''", ''Exact BMI labels trimmed,
        case-sensitive'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasCompleteness(''Blood Pressure'', lambda c: c >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Blood Pressure` RLIKE ''^[0-9]{2,3}/[0-9]{2,3}$''",
        "Blood Pressure parseable SBP/DBP", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete("Sleep Duration")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` >= 0 AND `Sleep Duration`
        <= 24 THEN 1 ELSE 0 END", "Sleep Duration in [0,24] hours", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Sleep Duration` >= 3 AND `Sleep Duration`
        <= 10 THEN 1 ELSE 0 END", "Typical sleep range 3-10h", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasStandardDeviation(''Daily Steps'', lambda s: s > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR TRIM(`Sleep Disorder`)
        IN (''Sleep Apnea'',''Insomnia'')", "Sleep Disorder domain (nulls allowed,
        exact case, trimmed)", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.hasCompleteness(''Heart Rate'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Heart Rate` >= 55 AND `Heart Rate` <= 95'', ''HR
        in expected band (55-95 bpm)'', lambda x: x >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Heart Rate` >= 30 AND `Heart Rate` <= 200'', ''HR
        plausible range (30-200 bpm)'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.hasCompleteness(''Stress Level'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(`Stress Level` AS INT) IN (3,4,5,6,7,8)
        THEN 1 ELSE 0 END", "Stress Level allowed set", lambda x: x >= 0.98)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN CAST(`Stress Level` AS
        INT) IN (3,4,5,6,7,8) THEN 1 ELSE 0 END", "Stress Level allowed set", lambda
        x: x >= 0.98)'' failed on data sample: Value: 0.9 does not meet the constraint
        requirement!'
      level: warning
    - suggestion: '.hasCompleteness(''Stress Level'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: '.hasCompleteness(''Age'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Age` AS DOUBLE) IS NOT NULL'', ''Age is numeric
        and non-null'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(CAST(`Age` AS DOUBLE) IS NOT NULL) AND ((CAST(`Age`
        AS DOUBLE) - FLOOR(CAST(`Age` AS DOUBLE))) = 0)'', ''Age is integer-like'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`Age` AS DOUBLE) BETWEEN 0 AND 120'', ''Age in
        [0,120]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`Age` AS DOUBLE) BETWEEN 30 AND 70'', ''Age mostly
        30-70'', lambda x: x >= 0.8)'
      status: true
      reason_if_failed: ''
      level: warning
