results:
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Quality of Sleep` <= 10'', ''Quality of Sleep is
        at most 10'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete("BMI Category")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isContainedIn("BMI Category", ["Obese", "Overweight", "Normal",
        "Normal Weight"])
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete("Blood Pressure")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .hasPattern("Blood Pressure", r"^(\d{2,3})/(\d{2,3})$")
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete("Sleep Duration")
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24", "Sleep
        Duration is within a plausible range")
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x < 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`Stress Level` >= 1 AND `Stress Level` <= 10", "Stress
        Level is within a plausible range of 1 to 10")
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`Stress Level` >= 1 AND `Stress
        Level` <= 10", "Stress Level is within a plausible range of 1 to 10")'' failed
        on data sample: Value: 0.9 does not meet the constraint requirement!'
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Age')
      status: true
      reason_if_failed: ''
      level: warning
  ? '["Age","BMI Category","Blood Pressure","Daily Steps","Heart Rate","Physical Activity
    Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.satisfies("CAST(split_part(`Blood Pressure`, ''/'', 1) AS INT)
        > CAST(split_part(`Blood Pressure`, ''/'', 2) AS INT)", "SystolicGreaterThanDiastolic",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        x: x >= 0.5)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation("Daily Steps", "Physical Activity
        Level", lambda x: x >= 0.5)'' failed on data sample: Value: 0.11682152569263345
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.hasCorrelation("Stress Level", "Quality of Sleep", lambda x: x
        <= -0.3)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation("Stress Level", "Quality of
        Sleep", lambda x: x <= -0.3)'' failed on data sample: Value: -0.025598461048840893
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Daily Steps` >= 10000 AND `Physical Activity Level`
        >= 60", "AtLeastOneVigorousActivity", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Age","BMI Category","Blood Pressure","Heart Rate"]':
    code:
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) > CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT)", "SystolicGreaterThanDiastolic", lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Daily Steps` >= 10000 AND `Physical Activity Level`
        >= 60", "VigorousBonusApplicable", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Disorder","Sleep Duration"]':
    code:
    - suggestion: '.hasCorrelation("Stress Level", "Quality of Sleep", lambda c: c
        < 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.satisfies("`Stress Level` * (10 - `Quality of Sleep`) >= 0", "sq_factor_should_be_non_negative",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
