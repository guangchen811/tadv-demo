results:
  Age:
    code:
    - suggestion: '.hasMax(''Age'', lambda v: v <= 120)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Age'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .hasPattern('Blood Pressure', '^\d{2,3}/\d{2,3}$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.hasMax(''Daily Steps'', lambda v: v <= 50000)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Daily Steps'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Gender', ['Male', 'Female'])
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('Heart Rate')
      status: false
      reason_if_failed: "Constraint '.isNonNegative('Heart Rate')' failed on data\
        \ sample: org.apache.spark.sql.catalyst.parser.ParseException: \n[PARSE_SYNTAX_ERROR]\
        \ Syntax error at or near '('.(line 1, pos 13)\n\n== SQL ==\nCOALESCE(CAST(Heart\
        \ Rate AS DECIMAL(20,10)), 0.0) >= 0\n-------------^^^\n"
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Physical Activity Level:
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Physical Activity Level'', lambda v: v <= 100)'
      status: false
      reason_if_failed: 'Constraint ''.hasMax(''Physical Activity Level'', lambda
        v: v <= 100)'' failed on data sample: Value: 90000.0 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.hasMin(''Physical Activity Level'', lambda v: v >= 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('cast(`Physical Activity Level` as int) = `Physical Activity
        Level`', 'pal_is_integer')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.hasMax(''Quality of Sleep'', lambda v: v <= 9)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Quality of Sleep'', lambda v: v >= 4)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.hasMax(''Sleep Duration'', lambda v: v <= 14.01)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Sleep Duration'', lambda v: v > 2.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
