results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10',
        'Quality of Sleep in [0,10]')
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .hasPattern('Blood Pressure', '^\s*\d{2,3}\s*/\s*\d{2,3}\s*$')
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .satisfies('((`Sleep Duration` < 6.0 AND `Quality of Sleep` IS NOT
        NULL) OR (`Sleep Duration` >= 8.0 AND `Quality of Sleep` IS NOT NULL) OR (`Sleep
        Duration` >= 6.0 AND `Sleep Duration` < 8.0) OR (`Sleep Duration` IS NULL))',
        'Quality of Sleep present for short/long sleep duration')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`Sleep Duration` >= 0.0 AND `Sleep Duration` <= 24.0)
        OR `Sleep Duration` IS NULL', 'Sleep Duration plausible range')
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Daily Steps` > 0'', ''Daily Steps rarely zero'',
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Daily Steps'', lambda x: x >= 10000)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: .satisfies("`Sleep Disorder` IN ('Insomnia', 'Sleep Apnea') OR `Sleep
        Disorder` IS NULL", "Valid Sleep Disorder Values")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness("Sleep Disorder", lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Heart Rate:
    code:
    - suggestion: .satisfies('(`Heart Rate` IS NOT NULL) AND (CAST(`Heart Rate` AS
        DOUBLE) >= 0)', 'Heart Rate Non-null and Numeric')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
  ? '["Daily Steps","Heart Rate","Physical Activity Level","Quality of Sleep","Sleep
    Disorder","Sleep Duration","bp_dia","bp_stage","bp_sys"]'
  : code:
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        x: x is None or abs(x) > 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        x: x is None or x > 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('(`Sleep Duration` >= 0) AND (`Quality of Sleep` >= 0)
        AND (`Quality of Sleep` <= 10)', 'Sleep Duration and Quality of Sleep value
        ranges')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`Daily Steps` > 0) AND (`Physical Activity Level` >
        0)', 'Daily Steps and Physical Activity Level positive')
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        x: abs(x) >= 0.45)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation(''Physical Activity Level'',
        ''Daily Steps'', lambda x: abs(x) >= 0.45)'' failed on data sample: Value:
        0.1168215256926334 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies(''(`Physical Activity Level` >= 60 AND `Daily Steps`
        >= 7000) OR (`Physical Activity Level` < 60)'', ''High PA implies High Steps'',
        lambda x: x >= 0.85)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''NOT (`Physical Activity Level` < 30 AND `Daily Steps`
        < 5000)'', ''Low Steps and Activity Rare'', lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Disorder","Sleep Duration"]':
    code:
    - suggestion: '.satisfies(''(`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL AND `Sleep Duration` >= 0 AND `Quality of Sleep` >= 0 AND `Quality
        of Sleep` <= 10)'', ''Valid Sleep Duration and Quality'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('(`Sleep Disorder` IS NULL OR `Sleep Disorder` IN ("Insomnia",
        "Sleep Apnea"))', 'Sleep Disorder Values Valid')
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.satisfies(''(`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL)'', ''No Nulls for Sleep Duration and Quality of Sleep'', lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        x: abs(x) <= 1.0 and abs(x) >= 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Sleep Duration` >= 0 AND `Sleep Duration` <= 24
        AND `Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10)'', ''Sleep Duration
        and Quality of Sleep scale check'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Sleep Duration` < 6.0)'', ''Short Sleep Duration
        Group Exists'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Sleep Duration` >= 8.0)'', ''Long Sleep Duration
        Group Exists'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
