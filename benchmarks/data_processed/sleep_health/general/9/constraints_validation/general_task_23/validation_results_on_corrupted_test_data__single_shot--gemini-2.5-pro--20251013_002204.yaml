results:
  Age:
    code:
    - suggestion: .isPositive('Age')
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .hasPattern('Blood Pressure', r'^\s*\d{2,3}\s*/\s*\d{2,3}\s*$')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
