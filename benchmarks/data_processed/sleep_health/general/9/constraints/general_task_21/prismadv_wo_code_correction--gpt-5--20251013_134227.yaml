    - text: "For rows labeled as 'Insomnia' or 'Sleep Apnea' in 'Sleep Disorder',\
        \ 'Stress Level' must be numeric, non-null, and on a 0\u201310 scale for the\
        \ large majority (e.g., >= 0.9) of those rows, since class-wise means and\
        \ thresholds are computed from it. Deequ examples: check.where(\"`Sleep Disorder`\
        \ IN ('Insomnia','Sleep Apnea')\").hasCompleteness('Stress Level', lambda\
        \ v: v >= 0.9); check.where(\"`Sleep Disorder` IN ('Insomnia','Sleep Apnea')\"\
        ).hasCompliance(\"stress_in_0_10\", \"cast(`Stress Level` as double) >= 0\
        \ AND cast(`Stress Level` as double) <= 10\", lambda v: v >= 0.9)."
