    assumptions:
    - text: 'Blood Pressure parsing consistency: The ''Blood Pressure'' field must
        split into exactly two integer tokens that become the ''Systolic'' and ''Diastolic''
        columns. The derived columns must be non-null integers and satisfy Systolic
        > Diastolic. Additionally, after trimming spaces, concat(Systolic, ''/'',
        Diastolic) must equal the original ''Blood Pressure'' string. Deequ examples:
        .satisfies(''Systolic > Diastolic'', ''systolic_gt_diastolic''); .satisfies("regexp_replace(`Blood
        Pressure`, ''\\s+'', '''') = concat(cast(Systolic as string), ''/'', cast(Diastolic
        as string))", ''bp_text_matches_parts'').'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      uid: f6817cae-e505-4cfd-b356-c78760618ed7
    - text: 'Restful hours determinism across Sleep Duration and Quality of Sleep:
        restful_hours must equal Sleep Duration * (Quality of Sleep / 10) up to rounding
        tolerance, and therefore 0 <= restful_hours <= Sleep Duration when 0 <= Quality
        of Sleep <= 10. Deequ example: .satisfies(''abs(restful_hours - `Sleep Duration`
        * (`Quality of Sleep` / 10.0)) <= 0.01'', ''restful_hours_definition'').'
      sources:
      - start_line: 26
        end_line: 33
        file: ''
      - start_line: 111
        end_line: 119
        file: ''
      uid: 03c27425-8cfe-4110-8ab0-3023c29e7eac
    - text: 'Apnea risk score must be a deterministic function of BMI Category, Systolic/Diastolic,
        and Quality of Sleep/Sleep Duration: apnea_risk_score = 0.6*I(BMI Category
        in [''Overweight'',''Obese'']) + 0.2*I(Systolic >= 130 or Diastolic >= 85)
        + 0.2*I(Quality of Sleep <= 6 and Sleep Duration >= 7). Deequ example: .satisfies("`apnea_risk_score`
        = 0.6*IF(`BMI Category` IN (''Overweight'',''Obese''),1,0) + 0.2*IF(Systolic
        >= 130 OR Diastolic >= 85,1,0) + 0.2*IF(`Quality of Sleep` <= 6 AND `Sleep
        Duration` >= 7,1,0)", ''apnea_score_formula'').'
      sources:
      - start_line: 73
        end_line: 77
        file: ''
      - start_line: 111
        end_line: 116
        file: ''
      uid: e08b19d4-b24e-4e73-a140-08eaf2cc0a26
    - text: 'No-signal consistency: If BMI Category is NOT in [''Overweight'',''Obese''],
        Systolic < 130, Diastolic < 85, and NOT(Quality of Sleep <= 6 and Sleep Duration
        >= 7), then apnea_risk_score must equal 0 and risk_sleep_apnea must be 0.
        Deequ example: .satisfies("IF(`BMI Category` NOT IN (''Overweight'',''Obese'')
        AND Systolic < 130 AND Diastolic < 85 AND NOT(`Quality of Sleep` <= 6 AND
        `Sleep Duration` >= 7), `apnea_risk_score` = 0 AND `risk_sleep_apnea` = 0,
        TRUE)", ''apnea_zero_when_no_signals'').'
      sources:
      - start_line: 73
        end_line: 77
        file: ''
      - start_line: 81
        end_line: 85
        file: ''
      - start_line: 111
        end_line: 116
        file: ''
      uid: 0594e8cc-eeed-4864-94ed-2e2f5f74b8c8
    - text: 'Threshold-to-flag coherence (global bound): Because apnea_threshold is
        clipped to [0.45, 0.65], any row with apnea_risk_score < 0.45 must have risk_sleep_apnea
        = 0, and any row with apnea_risk_score >= 0.65 must have risk_sleep_apnea
        = 1. Deequ examples: .satisfies(''IF(`apnea_risk_score` < 0.45, `risk_sleep_apnea`
        = 0, TRUE)'', ''apnea_flag_low_bound''); .satisfies(''IF(`apnea_risk_score`
        >= 0.65, `risk_sleep_apnea` = 1, TRUE)'', ''apnea_flag_high_bound'').'
      sources:
      - start_line: 77
        end_line: 85
        file: ''
      uid: e8f329c3-190c-4c91-a4e4-e9aed3556421
    - text: 'Label-calibration prior on BMI Category: Within the labeled calibration
        subset where Sleep Disorder == ''Sleep Apnea'', the fraction of rows with
        BMI Category in [''Overweight'',''Obese''] should be near 0.7 (e.g., within
        [0.6, 0.85]) to make the threshold calibration meaningful. Deequ example:
        .where("`Sleep Disorder` = ''Sleep Apnea''").satisfies("avg(IF(`BMI Category`
        IN (''Overweight'',''Obese''), 1.0, 0.0)) BETWEEN 0.6 AND 0.85", ''apnea_overweight_rate'').'
      sources:
      - start_line: 49
        end_line: 53
        file: ''
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
