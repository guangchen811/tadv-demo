      uid: 9321abac-f384-47de-9559-1e70cfdce3c8
    - text: 'Both derived columns ''Systolic'' and ''Diastolic'' are present for every
        row and contain integral numeric values (no nulls, no non-numeric strings).
        Deequ representation:

        .isComplete("Systolic").isComplete("Diastolic")

        .hasDataType("Systolic", Integral)

        .hasDataType("Diastolic", Integral)'
