  ? '["BMI Category","Blood Pressure","Daily Steps","Person ID","Physical Activity
    Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code: []
    assumptions:
    - text: 'Blood Pressure must be split into two integer fields (Systolic and Diastolic)
        using the pattern NN[ N]/NN[ N]. After parsing, Systolic and Diastolic must
        satisfy clinical consistency: 80 <= Systolic <= 250, 40 <= Diastolic <= 150,
        and Systolic >= Diastolic. This supports computing bp_high from both numbers.
        Example Deequ constraints: .satisfies("regexp_like(`Blood Pressure`, ''^[0-9]{2,3}/[0-9]{2,3}$'')",
        1.0); .satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS int) BETWEEN 80
        AND 250", 1.0); .satisfies("CAST(split(`Blood Pressure`, ''/'')[1] AS int)
        BETWEEN 40 AND 150", 1.0); .satisfies("CAST(split(`Blood Pressure`, ''/'')[0]
        AS int) >= CAST(split(`Blood Pressure`, ''/'')[1] AS int)", 1.0).'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: 146e5a64-faed-4d51-bc58-a29cf96e7bfd
    - text: "Quality of Sleep (QoS) and Sleep Duration must be jointly consistent\
        \ with the restful-hours computation: treating QoS as a 0\u201310 integer\
        \ scale used as a proportion, for all rows with Sleep Duration >= 0, 0 <=\
        \ Sleep Duration * (QoS / 10.0) <= Sleep Duration. Also require QoS in [0,\
        \ 10]. Example Deequ: .satisfies(\"CASE WHEN `Sleep Duration` >= 0 THEN (`Sleep\
        \ Duration` * (`Quality of Sleep` / 10.0)) >= 0 AND (`Sleep Duration` * (`Quality\
        \ of Sleep` / 10.0)) <= `Sleep Duration` ELSE false END\", 1.0); .satisfies(\"\
        `Quality of Sleep` BETWEEN 0 AND 10\", 1.0)."
      sources:
      - start_line: 26
        end_line: 33
        file: ''
      uid: 9a273bca-83a5-4bf2-9cd5-ba8aabf4af5a
    - text: 'Physical Activity Level and Daily Steps should exhibit a positive correlation
        strong enough to justify the correlation-based expected steps calculation.
        Require Pearson correlation >= 0.2 and that both columns have variance (non-constant).
        Example Deequ: .hasCorrelation("Physical Activity Level", "Daily Steps", _
        >= 0.2); plus guardrails like .hasNumberOfDistinctValues("Physical Activity
        Level", _ > 1) and .hasNumberOfDistinctValues("Daily Steps", _ > 1).'
      sources:
      - start_line: 35
        end_line: 47
        file: ''
      uid: 558b93da-6b35-4f04-b176-558ffcc248fa
    - text: "For rows labeled with a sleep disorder (Insomnia or Sleep Apnea), Stress\
        \ Level must be present and on the same 0\u201310 scale used downstream. Example\
        \ Deequ: .satisfies(\"CASE WHEN `Sleep Disorder` IN ('Insomnia','Sleep Apnea')\
        \ THEN `Stress Level` IS NOT NULL AND `Stress Level` BETWEEN 0 AND 10 ELSE\
        \ true END\", 1.0)."
      sources:
      - start_line: 50
        end_line: 60
        file: ''
      - start_line: 65
        end_line: 67
        file: ''
      uid: 34d437e2-7f98-4be8-b4bd-7fb84316ec3a
    - text: 'Among records labeled Sleep Apnea, a majority should be Overweight or
        Obese to align with how apnea_threshold is calibrated. Enforce that P(BMI
        Category IN (''Overweight'',''Obese'') | Sleep Disorder = ''Sleep Apnea'')
        >= 0.6. Example Deequ: check on the filtered subset (where = "`Sleep Disorder`
        = ''Sleep Apnea''") with .satisfies("`BMI Category` IN (''Overweight'',''Obese'')",
        0.6).'
      sources:
      - start_line: 62
        end_line: 64
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
      uid: 5423aa58-0d59-45b0-8fd4-42caead1b729
    - text: 'Person ID acts as a key for the features used downstream: no two rows
        with the same Person ID may disagree on Blood Pressure, Sleep Duration, Quality
        of Sleep, Daily Steps, Physical Activity Level, Stress Level, or BMI Category.
        Practically, enforce Person ID uniqueness, or if duplicates are allowed, enforce
        equality of these fields within each Person ID. Example Deequ: .isUnique(["Person
        ID"]). If duplicates are expected, add a compliance check like .satisfies("COUNT(*)
        OVER (PARTITION BY `Person ID`, `Blood Pressure`, `Sleep Duration`, `Quality
        of Sleep`, `Daily Steps`, `Physical Activity Level`, `Stress Level`, `BMI
        Category`) = COUNT(*) OVER (PARTITION BY `Person ID`)"'
      sources:
      - start_line: 111
        end_line: 125
        file: ''
      uid: d4078174-2f64-43c5-850f-346e8ec4f28e
    - text: 'For labeled Sleep Apnea rows, a non-trivial proportion should also satisfy
        the high-blood-pressure condition used in apnea scoring: P((Systolic >= 130
        OR Diastolic >= 85) | Sleep Disorder = ''Sleep Apnea'') >= 0.2. This ties
        together Sleep Disorder with the two BP components derived from Blood Pressure.
        Example Deequ: filter where = "`Sleep Disorder` = ''Sleep Apnea''" and require
        .satisfies("CAST(split(`Blood Pressure`,''/'')[0] AS int) >= 130 OR CAST(split(`Blood
        Pressure`,''/'')[1] AS int) >= 85", 0.2).'
      sources:
