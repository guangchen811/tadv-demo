    - text: '''Blood Pressure'' must be parseable into integer ''Systolic''/''Diastolic''
        components and satisfy physiological ordering and ranges used downstream.
        Specifically: it should match the pattern NNN/NNN; after parsing, Systolic
        >= Diastolic; and reasonable bounds hold (e.g., 90 <= Systolic <= 250 and
        50 <= Diastolic <= 150). Deequ examples: check.hasCompliance("bp_format",
        "`Blood Pressure` rlike ''^[0-9]{2,3}/[0-9]{2,3}$''", lambda v: v >= 0.99);
        after deriving columns, check.hasCompliance("bp_order_and_range", "`Systolic`
        >= `Diastolic` AND `Systolic` BETWEEN 90 AND 250 AND `Diastolic` BETWEEN 50
        AND 150", lambda v: v >= 0.99).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 74
        end_line: 75
        file: ''
      uid: bc6b5d81-57ef-4f75-807f-47d833786900
    - text: '''Quality of Sleep'' and ''Sleep Duration'' must jointly support the
        restful-hours computation. Assumptions: (a) ''Quality of Sleep'' is an integer
        in [0,10]; (b) ''Sleep Duration'' is numeric and within [0,24]; (c) the effective
        sleep fraction (Quality of Sleep / 10) must be <= 1 so that restful_hours
        = Sleep Duration * (QoS/10) does not exceed Sleep Duration. Deequ examples:
        check.hasCompliance("qos_scale", "cast(`Quality of Sleep` as int) BETWEEN
        0 AND 10", lambda v: v >= 0.99); check.hasCompliance("sleep_duration_bounds",
        "cast(`Sleep Duration` as double) BETWEEN 0 AND 24", lambda v: v >= 0.99);
        check.hasCompliance("restful_fraction_le_1", "cast(`Quality of Sleep` as double)/10.0
        <= 1", lambda v: v >= 0.99).'
      sources:
      - start_line: 25
        end_line: 33
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: 46a007bc-ea40-4d85-912d-c9ab96caca73
    - text: '''Physical Activity Level'' and ''Daily Steps'' should exhibit a positive
        correlation and non-degenerate variance to make the correlation-based expectation
        meaningful. For example, require Pearson correlation >= 0.2 and both columns
        to have non-zero standard deviation. Deequ examples: check.hasCorrelation(''Physical
        Activity Level'', ''Daily Steps'', lambda v: v >= 0.2); check.hasStandardDeviation(''Physical
        Activity Level'', lambda v: v > 0); check.hasStandardDeviation(''Daily Steps'',
        lambda v: v > 0).'
      sources:
