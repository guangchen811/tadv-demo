  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'Both ''Physical Activity Level'' and ''Daily Steps'' must be present
        and parseable as numeric on the same rows (pairwise completeness), because
        they are used together for correlation, thresholding, and downstream recommendations.
        Representable in Deequ as: .satisfies(''!isnull(Physical Activity Level) AND
        !isnull(Daily Steps)'', ''pal_steps_not_null'', p => p == 1.0) and .satisfies(''try_cast(Physical
        Activity Level as double) IS NOT NULL AND try_cast(Daily Steps as double)
        IS NOT NULL'', ''pal_steps_numeric'', p => p == 1.0).'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 38
        end_line: 47
        file: ''
      - start_line: 69
        end_line: 71
        file: ''
      uid: fe800a2d-b7c0-4e3e-8c38-41f9050e49b7
    - text: '''Physical Activity Level'' and ''Daily Steps'' must both exhibit variability
        (stddev > 0 and at least two distinct values) so that correlation is defined
        and the expected-steps formula does not divide by zero (pal_std > 0). Deequ
        examples: .hasStandardDeviation(''Physical Activity Level'', _ > 0) and .hasStandardDeviation(''Daily
        Steps'', _ > 0), combined with .hasNumberOfDistinctValues(''Physical Activity
        Level'', _ >= 2) and .hasNumberOfDistinctValues(''Daily Steps'', _ >= 2).'
      sources:
      - start_line: 39
        end_line: 45
        file: ''
      uid: 5b94fffb-31cb-45a8-b9b0-c08d7a6344e7
    - text: '''Physical Activity Level'' and ''Daily Steps'' should be positively
        associated so that the correlation-based expectation for steps given activity
        is meaningful. For instance, enforce a non-negative (preferably moderately
        positive) correlation: .hasCorrelation(''Physical Activity Level'', ''Daily
        Steps'', c => c >= 0.2).'
      sources:
      - start_line: 38
        end_line: 46
        file: ''
      uid: 88aa03e1-8766-4e05-be45-62f83f4145ef
    - text: 'Cross-threshold consistency: rows with very low steps (<= 3000) should
        rarely co-occur with high activity level (> 40). Enforce that this inconsistent
        combination is uncommon (e.g., at most 10% of rows): .satisfies(''NOT ((Daily
        Steps <= 3000) AND (Physical Activity Level > 40))'', ''few_highPAL_lowSteps'',
        p => p >= 0.9).'
      sources:
      - start_line: 69
        end_line: 71
        file: ''
      uid: 8740c3d3-2d9a-49e2-976d-cd67ab660925
    - text: 'Cross-threshold consistency with coaching logic: rows with low activity
        level (<= 40) should rarely have high daily steps (>= 8000). Enforce that
        this is uncommon (e.g., at most 10% of rows): .satisfies(''NOT ((Daily Steps
        >= 8000) AND (Physical Activity Level <= 40))'', ''few_lowPAL_highSteps'',
        p => p >= 0.9).'
      sources:
      - start_line: 69
        end_line: 71
        file: ''
      - start_line: 99
        end_line: 104
        file: ''
      uid: 570dfea6-b278-4953-9e05-51d95138f418
  '["Daily Steps","Physical Activity Level","Quality of Sleep","Sleep Duration","Stress Level"]':
    code: []
    assumptions:
    - text: 'Physical Activity Level and Daily Steps must both be numeric and non-null
        for all rows, and they should exhibit a positive correlation (e.g., Pearson
        r >= 0.2). Also, both columns must have non-zero variance so the linear expectation
        steps_mean + r * (steps_std/pal_std) * (pal - pal_mean) is defined. We could
        represent this with Deequ-like constraints: satisfies(''isnotnull(`Physical
        Activity Level`) AND isnotnull(`Daily Steps`)'', fraction >= 1.0) and hasCorrelation(''Physical
        Activity Level'',''Daily Steps'', lowerBound=0.2, upperBound=1.0).'
      sources:
      - start_line: 35
        end_line: 36
        file: ''
      - start_line: 39
        end_line: 46
        file: ''
      uid: e730d925-8ed7-47db-8a1f-ef28150a541c
    - text: 'The sedentary thresholds across Daily Steps and Physical Activity Level
        should be consistent: when Daily Steps <= 3000, Physical Activity Level should
        typically be <= 40 (rare violations, e.g., <= 5%). This can be expressed as:
        satisfies(''CASE WHEN `Daily Steps` <= 3000 THEN `Physical Activity Level`
        <= 40 ELSE true END'', fraction >= 0.95).'
      sources:
      - start_line: 69
        end_line: 69
        file: ''
      uid: dc381e0c-48d3-41ee-ade0-a9d9f2d16418
    - text: "Quality of Sleep must be an integer score on a 0\u201310 scale and Sleep\
        \ Duration must be numeric (hours); the contradictory pattern of low Quality\
        \ of Sleep with long Sleep Duration should be uncommon (e.g., at most 30%\
        \ of records satisfy (`Quality of Sleep` <= 6 AND `Sleep Duration` >= 7)).\
        \ Deequ-style: satisfies('isnotnull(`Quality of Sleep`) AND isnotnull(`Sleep\
        \ Duration`)', fraction >= 1.0) and satisfies('NOT((`Quality of Sleep` <=\
        \ 6) AND (`Sleep Duration` >= 7))', fraction >= 0.7)."
      sources:
      - start_line: 26
        end_line: 27
        file: ''
      - start_line: 30
        end_line: 33
        file: ''
      - start_line: 75
        end_line: 75
        file: ''
      uid: 73679a48-2b48-4e1b-b65e-f761143fe845
    - text: 'For labeled cohorts used to calibrate stress thresholds, there should
        be sufficient labeled data and available Stress Level values: at least 5 rows
        per label (Insomnia, Sleep Apnea) and >= 95% completeness of Stress Level
        within these labeled subsets. Deequ-like: hasSize(where=''`Sleep Disorder`
        = "Insomnia"'', assertion: _ >= 5); hasSize(where=''`Sleep Disorder` = "Sleep
        Apnea"'', assertion: _ >= 5); completeness(''Stress Level'', where=''`Sleep
        Disorder` IN ("Insomnia","Sleep Apnea")'', assertion: _ >= 0.95).'
      sources:
      - start_line: 50
        end_line: 55
        file: ''
      - start_line: 57
        end_line: 60
        file: ''
      - start_line: 65
        end_line: 67
        file: ''
      uid: aaeb630d-751f-428c-b5f9-d01450ff6125
    - text: 'Parsed blood pressure components must be consistent: Systolic and Diastolic
        parsed from ''Blood Pressure'' must be integers and Systolic > Diastolic for
        all rows (to make downstream bp_high calculation meaningful). Deequ-like:
        satisfies(''Systolic > Diastolic'', fraction >= 1.0).'
      sources:
      - start_line: 22
        end_line: 24
        file: ''
      - start_line: 75
        end_line: 77
        file: ''
      uid: b612612a-23ee-40f4-a5c3-b82ad1d9eafa
  '["Diastolic","Systolic"]':
    code: []
    assumptions:
    - text: 'The ''Blood Pressure'' column must be in the canonical ''<Systolic>/<Diastolic>''
        format with exactly one slash and both parts parseable as integers. After
        parsing, the round-trip must hold: concat(CAST(Systolic AS STRING), ''/'',
        CAST(Diastolic AS STRING)) equals trim(Blood Pressure) for every row. Example
        Deequ: .satisfies("Systolic IS NOT NULL AND Diastolic IS NOT NULL AND concat(CAST(Systolic
        AS STRING), ''/'', CAST(Diastolic AS STRING)) = trim(`Blood Pressure`)", 1.0)'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      uid: d36c33c3-b8f7-40c9-bdc7-99c5c5e0a005
    - text: 'Physiological ordering must hold across the two BP components: for every
        record Systolic >= Diastolic. Example Deequ: .satisfies("Systolic >= Diastolic",
        1.0)'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: d4265b16-81a0-4864-84fc-2390cc1b05ac
    - text: 'The two BP components are co-complete because they are parsed from a
        single field: either both Systolic and Diastolic are present or neither. In
        this pipeline they must both be present (no partial missingness). Example
        Deequ (strict): .satisfies("Systolic IS NOT NULL AND Diastolic IS NOT NULL",
        1.0) or (co-completeness): .satisfies("(Systolic IS NULL AND Diastolic IS
        NULL) OR (Systolic IS NOT NULL AND Diastolic IS NOT NULL)", 1.0)'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      uid: 1bb55887-6713-435b-8a21-2d6e28433b71
    - text: 'Restful sleep derivation must be consistent across columns: restful_hours
        = `Sleep Duration` * (`Quality of Sleep` / 10.0), with restful_hours <= `Sleep
        Duration` and `Quality of Sleep` in [0, 10]. Example Deequ: .satisfies("restful_hours
        = `Sleep Duration` * (`Quality of Sleep` / 10.0) AND restful_hours <= `Sleep
        Duration` AND `Quality of Sleep` BETWEEN 0 AND 10", 1.0)'
      sources:
      - start_line: 26
        end_line: 27
        file: ''
      - start_line: 30
        end_line: 30
        file: ''
      - start_line: 118
        end_line: 118
        file: ''
      - start_line: 122
        end_line: 122
        file: ''
      uid: 5aef1c2f-fd9b-4ff1-8ce0-0ec067c0eefb
  '["Quality of Sleep","Sleep Duration"]':
    code: []
    assumptions:
    - text: 'Both ''Sleep Duration'' and ''Quality of Sleep'' are present and numeric
        on every row, with ''Quality of Sleep'' being integer-parsable, because they
        are jointly used in arithmetic (conversion to numeric and multiplication).
        We could represent this as Deequ checks like: .isComplete("Sleep Duration").isComplete("Quality
        of Sleep").satisfies("cast(`Sleep Duration` as double) is not null AND cast(`Quality
        of Sleep` as int) is not null", "sleep_qos_numeric", assertion = 1.0).'
      sources:
      - start_line: 26
        end_line: 27
        file: ''
      - start_line: 30
        end_line: 30
        file: ''
      uid: 698c7101-e9a3-4b02-a14a-1afc69b650d4
    - text: "'Quality of Sleep' is an integer score on a 0\u201310 scale used as a\
        \ proportion of 'Sleep Duration' to compute restful hours. Therefore, for\
        \ every record: 0 <= Quality of Sleep <= 10, Sleep Duration >= 0 (and realistically\
        \ <= 24), and Sleep Duration * (Quality of Sleep/10.0) lies in [0, Sleep Duration].\
        \ We could encode this with Deequ: .satisfies(\"`Quality of Sleep` >= 0 AND\
        \ `Quality of Sleep` <= 10 AND `Sleep Duration` >= 0\", \"qos_scale_and_duration_nonneg\"\
        , 1.0) and .satisfies(\"`Sleep Duration` * (`Quality of Sleep`/10.0) >= 0\
        \ AND `Sleep Duration` * (`Quality of Sleep`/10.0) <= `Sleep Duration`\",\
        \ \"restful_hours_bounds\", 1.0)."
      sources:
      - start_line: 30
        end_line: 33
        file: ''
      uid: aa77d618-ee14-4a54-9219-639bef143936
    - text: "The business definition of \"low quality long sleep\" used downstream\
        \ is the joint condition: (Quality of Sleep <= 6) AND (Sleep Duration >= 7).\
        \ This assumes QoS is on a 0\u201310 integer scale and Sleep Duration is in\
        \ hours, making these thresholds meaningful and comparable. This predicate\
        \ can be validated directly with a Deequ row-level condition such as: .satisfies(\"\
        (`Sleep Duration` >= 7 AND `Quality of Sleep` <= 6) OR NOT(`Sleep Duration`\
        \ >= 7 AND `Quality of Sleep` <= 6)\", \"low_qos_long_sleep_predicate_evaluable\"\
        , 1.0), or by explicitly recomputing the flag as an expression (\"(`Sleep\
        \ Duration` >= 7) AND (`Quality of Sleep` <= 6)\") and checking it is boolean/non-null."
      sources:
      - start_line: 75
        end_line: 77
        file: ''
      uid: 378b3545-c450-49dd-bb39-2b8b7cd642de
  '["Sleep Disorder","Stress Level"]':
    code: []
    assumptions:
    - text: "Within the labeled subset where Sleep Disorder \u2208 {'Insomnia','Sleep\
        \ Apnea'}, Stress Level must be present and numeric for all such rows, and\
        \ there must be at least one row for each label so that ins_mean_stress and\
        \ ap_mean_stress are defined (no NaN) and the adaptive insomnia_threshold\
        \ uses real data rather than the fallback. We could represent this as Deequ\
        \ constraints such as: hasCompleteness('Stress Level', _ == 1.0, where = \"\
        `Sleep Disorder` = 'Insomnia'\"); hasCompleteness('Stress Level', _ == 1.0,\
        \ where = \"`Sleep Disorder` = 'Sleep Apnea'\"); and size checks per class\
        \ (count(where = ...) >= 1 for both labels)."
      sources:
      - start_line: 50
        end_line: 60
        file: ''
      - start_line: 65
        end_line: 67
        file: ''
      uid: e27bec23-8a80-4aa7-a5f7-495256270915
    - text: "Stress Level should be on a 0\u201310 scale for rows used in calibration\
        \ (Sleep Disorder \u2208 {'Insomnia','Sleep Apnea'}) so that (stress \u2212\
        \ stress_threshold)/(10 \u2212 stress_threshold) is meaningful and bounded.\
        \ This can be captured as a conditional multi-column constraint: hasCompliance('stress_in_0_10_on_labeled',\
        \ \"(`Sleep Disorder` IN ('Insomnia','Sleep Apnea')) => (`Stress Level` >=\
        \ 0 AND `Stress Level` <= 10)\", _ == 1.0)."
      sources:
      - start_line: 57
        end_line: 60
        file: ''
      - start_line: 65
        end_line: 67
        file: ''
      uid: 8ceda585-532a-4d50-b01d-b508b0ff4975
    - text: "For rows labeled Sleep Apnea, BMI Category should be available and the\
        \ proportion of 'Overweight' or 'Obese' among them should be high (expected\
        \ \u2248 0.7; enforce e.g., within [0.6, 0.9]) to keep apnea_threshold calibration\
        \ consistent. Deequ examples: hasCompleteness('BMI Category', _ == 1.0, where\
        \ = \"`Sleep Disorder` = 'Sleep Apnea'\"); hasCompliance('apnea_over_obese_rate',\
        \ \"`BMI Category` IN ('Overweight','Obese')\", fractionBetween = [0.6, 0.9],\
        \ where = \"`Sleep Disorder` = 'Sleep Apnea'\")."
      sources:
      - start_line: 62
        end_line: 64
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
      uid: e348cfd9-2e0a-450b-bbc5-863870367d9b
    - text: "Blood Pressure must be parseable into two integer components 'Systolic'\
        \ and 'Diastolic' per row, with Systolic > Diastolic and realistic ranges\
        \ (e.g., 80 \u2264 Systolic \u2264 250 and 40 \u2264 Diastolic \u2264 150),\
        \ because these two columns are used jointly to compute bp_high and apnea_risk_score.\
        \ Example Deequ: hasCompliance('bp_parsed_ordered', 'Systolic > Diastolic\
        \ AND Systolic BETWEEN 80 AND 250 AND Diastolic BETWEEN 40 AND 150', _ ==\
        \ 1.0) applied to rows where Blood Pressure is not null/parsable."
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 74
        end_line: 78
        file: ''
      uid: c713645c-e622-4181-8387-f0372133be64
    - text: 'Physical Activity Level and Daily Steps must both have non-zero variance
        and a defined (non-NaN) correlation so expected_steps_from_pal and activity_shortfall
        can be computed. Example constraints: hasStandardDeviation(''Physical Activity
        Level'', _ > 0); hasStandardDeviation(''Daily Steps'', _ > 0); hasCorrelation(''Physical
        Activity Level'',''Daily Steps'', v => !isNaN(v)).'
      sources:
      - start_line: 35
        end_line: 47
        file: ''
      uid: 0ccfe7c3-3f81-4655-b26d-f2dbab9d48f3
    - text: "Quality of Sleep and Sleep Duration jointly drive restful_hours and the\
        \ normalized restful_deficit used in insomnia_risk_score; to keep these computations\
        \ valid and bounded, enforce that Quality of Sleep is an integer in [0,10]\
        \ and Sleep Duration is non-negative (which implies 0 \u2264 restful_hours\
        \ \u2264 Sleep Duration). Example constraints: hasCompliance('qos_scale_with_duration',\
        \ '(`Quality of Sleep` BETWEEN 0 AND 10) AND (`Sleep Duration` >= 0)', _ ==\
        \ 1.0)."
      sources:
      - start_line: 26
        end_line: 33
        file: ''
      - start_line: 71
        end_line: 71
        file: ''
      uid: eac3a484-8754-4e7b-b427-c84cfec65aef
