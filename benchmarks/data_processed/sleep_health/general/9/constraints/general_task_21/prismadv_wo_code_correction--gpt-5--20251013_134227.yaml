  Blood Pressure:
    code:
    - suggestion: '.satisfies("trim(`Blood Pressure`) <> ''''", "Blood Pressure not
        empty", lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 5c45e977-5586-4a33-91cb-ca4dd9b6ae33
      source_assumptions:
      - 2d1c4df3-c9bd-4918-9859-0aa79f6e9f19
    - suggestion: '.hasPattern(''Blood Pressure'', r''^\s*\d{2,3}\s*/\s*\d{2,3}\s*$'',
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 40a8d7ba-a8b1-4417-a5ce-b43adf19c60f
      source_assumptions:
      - 2beaacfc-f41a-4a1d-92ce-7e4880124fbd
    - suggestion: '.satisfies("cast(split(`Blood Pressure`, ''/'')[0] as int) BETWEEN
        80 AND 240 AND cast(split(`Blood Pressure`, ''/'')[1] as int) BETWEEN 40 AND
        140 AND cast(split(`Blood Pressure`, ''/'')[1] as int) < cast(split(`Blood
        Pressure`, ''/'')[0] as int)", "BP plausible range and ordering", lambda x:
        x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: d8269e7d-95d4-4a1b-bfa4-cbcec5e36b56
      source_assumptions:
      - 01f41296-77fd-450b-8bb3-97733ecf2e3d
      - b20867d7-fc25-4bca-9884-53613a99fb45
    assumptions:
    - text: 'The ''Blood Pressure'' column must be present and non-null for every
        row, and must not be an empty string. This is required because the code immediately
        splits and casts it without null handling. We could represent this as Deequ
        constraints like: .isComplete(''Blood Pressure'') and .satisfies("CASE WHEN
        trim(`Blood Pressure`) <> '''' THEN 1 ELSE 0 END", "Non-empty BP", lambda
        x: x == 1.0). In Great Expectations: expect_column_values_to_not_be_null(''Blood
        Pressure'') and expect_column_values_to_match_regex(''Blood Pressure'', r''^\s*\S.*'').'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      uid: 2d1c4df3-c9bd-4918-9859-0aa79f6e9f19
    - text: 'The ''Blood Pressure'' column must be a slash-separated pair of integers
        (no units or extra tokens), e.g., ''120/80''. Exactly two parts separated
        by one ''/'', and both parts must be comprised only of digits (optionally
        surrounded by whitespace). We could represent this as a Deequ pattern check:
        .hasPattern(''Blood Pressure'', r''^\s*\d{2,3}\s*/\s*\d{2,3}\s*$'', lambda
        x: x == 1.0). In Great Expectations: expect_column_values_to_match_regex(''Blood
        Pressure'', r''^\s*\d{2,3}\s*/\s*\d{2,3}\s*$'').'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      uid: 2beaacfc-f41a-4a1d-92ce-7e4880124fbd
    - text: 'The parsed systolic and diastolic values from ''Blood Pressure'' should
        be within plausible adult ranges and satisfy diastolic < systolic. For example:
        80 <= systolic <= 240, 40 <= diastolic <= 140, and diastolic < systolic. We
        could represent this as a Deequ row-level constraint: .satisfies("cast(split(`Blood
        Pressure`, ''/'')[0] as int) BETWEEN 80 AND 240 AND cast(split(`Blood Pressure`,
        ''/'')[1] as int) BETWEEN 40 AND 140 AND cast(split(`Blood Pressure`, ''/'')[1]
        as int) < cast(split(`Blood Pressure`, ''/'')[0] as int)", "BP plausible range",
        lambda x: x == 1.0). In Great Expectations: expect_column_values_to_match_regex
        for format plus expect_condition_metric_to_be_greater_than on a query that
        enforces these bounds.'
      sources:
      - start_line: 20
        end_line: 23
        file: ''
      - start_line: 74
        end_line: 77
        file: ''
      uid: 01f41296-77fd-450b-8bb3-97733ecf2e3d
    - text: The 'Blood Pressure' values are assumed to be measured in mmHg (not other
        units), because downstream thresholds classify high BP at systolic >= 130
        or diastolic >= 85. If values are not in mmHg, risk scoring will be invalid.
        This can be captured indirectly by asserting plausible mmHg ranges (above)
        or by a metadata/contract check on units.
      sources:
      - start_line: 74
        end_line: 77
        file: ''
      uid: b20867d7-fc25-4bca-9884-53613a99fb45
