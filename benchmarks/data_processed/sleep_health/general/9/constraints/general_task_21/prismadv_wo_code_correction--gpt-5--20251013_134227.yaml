    assumptions:
    - text: 'The ''Blood Pressure'' column must contain exactly one slash-delimited
        pair of integers ''Systolic/Diastolic'' for every row; both parts must be
        present and parseable as integers. Deequ representation:

        .isComplete("Blood Pressure")

        .hasPattern("Blood Pressure", "^\\s*\\d{2,3}\\s*/\\s*\\d{2,3}\\s*$")'
      sources:
