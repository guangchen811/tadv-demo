      uid: 16862727-2edf-468a-83ed-c49e337b9a31
    - text: 'Physiological ordering holds: for every record, Systolic >= Diastolic.
        Deequ representation:

        .satisfies("Systolic >= Diastolic", "all")'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: 6c047e59-707a-4075-b7ae-8b013d204ad6
    - text: 'Plausible mmHg ranges jointly hold across both columns: 80 <= Systolic
        <= 250 AND 40 <= Diastolic <= 150. Deequ representation:

        .satisfies("Systolic >= 80 AND Systolic <= 250 AND Diastolic >= 40 AND Diastolic
        <= 150", "all")'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 74
        end_line: 74
        file: ''
      uid: ac1c5571-4a21-444c-be82-f1c1c218b385
    - text: 'Round-trip consistency with the source field: the original ''Blood Pressure''
        string equals the concatenation of the parsed parts, i.e., Blood Pressure
        == concat(Systolic, ''/'', Diastolic). Deequ representation (Spark SQL expression):

        .satisfies("trim(`Blood Pressure`) = concat(cast(Systolic as string), ''/'',
        cast(Diastolic as string))", "all")'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
      - start_line: 123
        end_line: 124
        file: ''
      uid: 10ca7d2a-893d-493a-ba2d-972ba9861939
    - text: 'Hypertension flag logic used downstream assumes consistent thresholds
        across both columns: bp_high is true iff (Systolic >= 130 OR Diastolic >=
        85). When validating derived outputs, rows with Systolic < 130 AND Diastolic
        < 85 must contribute 0 to the blood-pressure component of apnea_risk_score.
        Deequ representation (compliance rule tying inputs to output):

        .satisfies("(Systolic < 130 AND Diastolic < 85) => apnea_risk_score <= 0.6
        * is_over_obese + 0.2 * low_qos_long_sleep + 1e-6", "all")'
      sources:
