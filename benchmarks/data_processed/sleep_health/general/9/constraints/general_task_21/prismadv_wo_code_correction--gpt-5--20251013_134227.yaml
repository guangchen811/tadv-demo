    - suggestion: '.where("`Sleep Disorder` = ''Sleep Apnea''").satisfies("`BMI Category`
        NOT IN (''Overweight'',''Obese'')", "Apnea BMI upper bound", lambda x: x >=
        0.1)'
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''.where("`Sleep Disorder`
        = ''Sleep Apnea''").satisfies("`BMI Category` NOT IN (''Overweight'',''Obese'')",
        "Apnea BMI upper bound", lambda x: x >= 0.1)'': Method doesn''t exist in class
        com.amazon.deequ.checks.Check, class has to be filterable'
      level: warning
      uid: 31710672-09cd-46e1-8cd0-88f5e9e99487
      source_assumptions:
      - 2d6fe5ae-a388-44fc-9a86-eb5d866eaef9
    assumptions:
    - text: 'The ''BMI Category'' column should be essentially complete (>= 99% non-null),
        since it is used both to compute a per-row overweight/obese flag and to calibrate
        apnea thresholds on labeled rows. We could represent this as: Deequ: .hasCompleteness(''BMI
        Category'', lambda x: x >= 0.99) or Great Expectations: expect_column_values_to_not_be_null(''BMI
        Category'', mostly=0.99).'
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 17d9c0f0-44ca-4043-8b50-36f0492c85a2
    - text: 'The ''BMI Category'' values must come from a controlled, case-sensitive
        set and match exactly (no synonyms or misspellings), so that exact membership
        checks work: {''Overweight'', ''Obese'', ''Normal'', ''Normal Weight''}. We
        could represent this as: Deequ: .satisfies("CASE WHEN TRIM(''BMI Category'')
        IN (''Overweight'',''Obese'',''Normal'',''Normal Weight'') THEN 1 ELSE 0 END",
        ''BMI Category domain'', lambda x: x >= 0.99) or Great Expectations: expect_column_values_to_be_in_set(''BMI
        Category'', [''Overweight'',''Obese'',''Normal'',''Normal Weight''], mostly=0.99).'
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: 46d499ea-1e64-4120-a133-f5d686dd424b
    - text: 'The ''BMI Category'' values should have no leading or trailing whitespace;
        otherwise exact .isin([''Overweight'',''Obese'']) matches will fail. We could
        represent this as: Deequ: .satisfies("CASE WHEN TRIM(''BMI Category'') = ''BMI
        Category'' THEN 1 ELSE 0 END", ''BMI Category trimmed'', lambda x: x == 1.0)
        or Great Expectations: expect_column_values_to_match_regex(''BMI Category'',
        r''^\S(.*\S)?$'').'
      sources:
      - start_line: 73
        end_line: 73
        file: ''
      uid: 334421ae-80b7-40bc-b59e-bd20699452ab
    - text: 'The ''BMI Category'' column should have a small, fixed vocabulary (e.g.,
        3 to 5 distinct values) consistent with categorical BMI bands. We could represent
        this as: Deequ: .hasNumberOfDistinctValues(''BMI Category'', lambda x: x >=
        3 and x <= 5) or Great Expectations: expect_column_unique_value_count_to_be_between(''BMI
        Category'', min_value=3, max_value=5).'
      sources:
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 73
        end_line: 73
        file: ''
      uid: a296152b-bca2-4f31-9f1c-5cb9f0587a16
    - text: 'Within rows labeled ''Sleep Apnea'', the proportion of ''BMI Category''
        in {''Overweight'',''Obese''} should be roughly aligned with the expected
        70% used for calibration (e.g., between 50% and 90%). This keeps the threshold
        tuning in a plausible range. We could represent this as two Deequ constraints
        using a where filter: (1) .where("`Sleep Disorder` = ''Sleep Apnea''").satisfies("CASE
        WHEN `BMI Category` IN (''Overweight'',''Obese'') THEN 1 ELSE 0 END", ''Apnea
        BMI lower bound'', lambda x: x >= 0.5) and (2) .where("`Sleep Disorder` =
        ''Sleep Apnea''").satisfies("CASE WHEN `BMI Category` NOT IN (''Overweight'',''Obese'')
        THEN 1 ELSE 0 END", ''Apnea BMI upper bound'', lambda x: x >= 0.1). In Great
        Expectations, implement equivalent where/filter logic with two expectations
        to enforce the lower and upper bounds.'
      sources:
      - start_line: 49
        end_line: 53
        file: ''
      - start_line: 62
        end_line: 63
        file: ''
      - start_line: 81
        end_line: 81
        file: ''
