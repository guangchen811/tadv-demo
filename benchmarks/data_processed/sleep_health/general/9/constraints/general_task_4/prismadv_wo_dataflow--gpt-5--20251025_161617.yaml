        (CASE WHEN `Sleep Disorder` = ''Insomnia'' THEN 0.20 WHEN `Sleep Disorder`
        = ''Sleep Apnea'' THEN 0.30 ELSE 0.05 END) <= 1.0)", "valid_bmi_sleepDisorder_penalty_total",
