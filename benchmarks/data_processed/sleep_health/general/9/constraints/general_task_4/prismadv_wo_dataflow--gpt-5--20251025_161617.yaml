    assumptions:
    - text: 'The ''Blood Pressure'' column must be present and fully non-null for
        all rows, because the code immediately splits and casts it to integers without
        any null handling. Deequ example: .hasCompleteness(''Blood Pressure'', lambda
        v: v == 1.0). Great Expectations example: expect_column_values_to_not_be_null(''Blood
        Pressure'').'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: 26118f1b-76ff-48fc-a0d6-f2323f2e50fd
    - text: 'Every ''Blood Pressure'' value must be a string formatted as two integer
        tokens separated by a single slash (optionally with surrounding spaces), e.g.,
        ''120/80''. No units or decimals are allowed (values like ''120 mmHg/80''
        or ''120.5/80'' would fail). This ensures both parts can be split and cast
        to int. Deequ example: .satisfies("CASE WHEN `Blood Pressure` RLIKE ''^[[:space:]]*[0-9]+[[:space:]]*/[[:space:]]*[0-9]+[[:space:]]*$''
        THEN 1 ELSE 0 END", ''BP format'', lambda x: x == 1.0). Great Expectations
        example: expect_column_values_to_match_regex(''Blood Pressure'', ''^\s*\d+\s*/\s*\d+\s*$'').'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: a6b35d55-c6a3-477e-bdca-40bd2bd4ff0f
    - text: 'Each ''Blood Pressure'' value must split into exactly two components
        (systolic and diastolic). Rows producing fewer than two tokens after splitting
        on ''/'' (e.g., missing delimiter) will cause int casting to fail. Deequ example:
        .satisfies("size(split(`Blood Pressure`, ''/'')) = 2", ''BP has two parts'',
        lambda x: x == 1.0).'
      sources:
      - start_line: 16
        end_line: 18
        file: ''
      uid: 44679bf1-c41c-4d58-b902-42a613ee9472
    - text: 'The ''Blood Pressure'' values are expected to be in mmHg units (not kPa
        or other units), consistent with the use of canonical thresholds 120/80 for
        scoring and 140/90 for high BP flags. A practical validation is to check plausible
        mmHg ranges on the parsed parts, e.g., systolic in [70, 250] and diastolic
        in [40, 150], with a high compliance rate. Deequ example: .satisfies("CAST(split(`Blood
        Pressure`, ''/'')[0] AS INT) BETWEEN 70 AND 250 AND CAST(split(`Blood Pressure`,
        ''/'')[1] AS INT) BETWEEN 40 AND 150", ''BP in plausible mmHg range'', lambda
        x: x >= 0.99).'
      sources:
