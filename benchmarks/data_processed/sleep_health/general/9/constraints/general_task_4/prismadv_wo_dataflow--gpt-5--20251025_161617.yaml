    - text: 'Rows used for activity-based scoring must have both ''Physical Activity
        Level'' and ''Daily Steps'' present and numeric for each record to avoid NaNs
        propagating into ''SleepHealthIndex''. Enforce with a joint completeness compliance:
        .compliance("pa_steps_complete", "NOT isnull(`Physical Activity Level`) AND
        NOT isnull(`Daily Steps`)").'
