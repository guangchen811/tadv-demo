        end_line: 56
        file: ''
      - start_line: 79
        end_line: 80
        file: ''
      uid: a11868b3-0769-4796-9738-512adb8be423
    - text: 'The normalized sleep features used in synergy must not produce a negative
        product before the square root: (`Sleep Duration` - 3.0) * (`Quality of Sleep`
        - 4.0) >= 0 for every row. This ensures sqrt(qos_norm * duration_norm) is
        defined. Enforce with a Deequ compliance on both columns: .compliance("sqrt_arg_nonnegative",
        "(`Sleep Duration` - 3.0) * (`Quality of Sleep` - 4.0) >= 0").'
      sources:
      - start_line: 31
        end_line: 33
        file: ''
      - start_line: 58
        end_line: 58
        file: ''
      uid: b6696b7e-40d5-4f19-8215-fa9a6796ee4f
    - text: 'Blood pressure components must be consistent: for every row, BP_SYS >
        BP_DIA (systolic strictly greater than diastolic) and both must be present
        as integers. This can be enforced with a multi-column Deequ compliance: .compliance("bp_sys_gt_dia",
        "`BP_SYS` > `BP_DIA`").'
