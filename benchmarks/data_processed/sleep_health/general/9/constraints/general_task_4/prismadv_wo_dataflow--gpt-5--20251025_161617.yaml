    assumptions:
    - text: 'For every row, the combination of ''BMI Category'' and ''Sleep Disorder''
        must yield a defined, bounded penalty_total. Concretely: (a) ''BMI Category''
        must be one of {''Normal'',''Normal Weight'',''Overweight'',''Obese''} so
        that bmi_penalty is not null; (b) ''Sleep Disorder'' may be null; if present
        it should be either ''Insomnia'' or ''Sleep Apnea'' (any other value will
        be treated as unknown_penalty = 0.05). This can be enforced with a Deequ compliance
        such as: `(`BMI Category` IN (''Normal'',''Normal Weight'',''Overweight'',''Obese''))
        AND (0.0 <= 0.5 * CASE WHEN `BMI Category`=''Overweight'' THEN 0.10 WHEN `BMI
        Category`=''Obese'' THEN 0.20 ELSE 0.0 END + 0.5 * CASE WHEN `Sleep Disorder`=''Insomnia''
        THEN 0.20 WHEN `Sleep Disorder`=''Sleep Apnea'' THEN 0.30 ELSE 0.05 END AND
        0.5 * CASE ... + 0.5 * CASE ... <= 1.0)`.'
