constraints:
  Age:
    code:
    - - .isComplete('Age').isNonNegative('Age').isLessThan('Age', 120)
      - Invalid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category').isContainedIn('BMI Category', ['Normal', 'Normal
        Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure').containsEmail('Blood Pressure', False) == False
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps').isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender').isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate').isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation').isContainedIn('Occupation', ['Nurse', 'Software
        Engineer', 'Sales Representative', 'Engineer', 'Lawyer', 'Teacher', 'Accountant',
        'Salesperson', 'Scientist', 'Doctor'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level').isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep').isBetween('Quality of Sleep', 1, 10, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia', None, 'nan',
        'NullValue'])
      - Invalid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration').isNonNegative('Sleep Duration').isGreaterThan('Sleep
        Duration', 0.0).isLessThanOrEqualTo('Sleep Duration', 24.0)
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level').isBetween('Stress Level', 1, 10, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
