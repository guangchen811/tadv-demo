  Blood Pressure:
    code: []
    assumptions:
    - text: The 'Blood Pressure' column contains string values in the format 'systolic/diastolic',
        where both systolic and diastolic are integers. There are no missing or malformed
        values, so every value can be split into exactly two parts (systolic and diastolic),
        both of which can be parsed as integers.
