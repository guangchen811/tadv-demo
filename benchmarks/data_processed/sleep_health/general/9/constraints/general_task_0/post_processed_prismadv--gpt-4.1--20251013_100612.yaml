      - start_line: 46
        end_line: 49
        file: ''
      uid: c4ce8cd2-368c-40b3-991a-11a870ce3521
    - text: 'For each record, the derived ''systolic'' and ''diastolic'' values from
        ''Blood Pressure'' must satisfy: if systolic >= 140 or diastolic >= 90 or
        the mean arterial pressure (calculated as diastolic + (systolic - diastolic)
        / 3.0) >= 120, then the record is flagged for ''HYPERTENSION_PATTERN''. This
        implies that both systolic and diastolic values must be present and within
        a reasonable physiological range, and their combination is used for logic
        downstream.'
      sources:
      - start_line: 48
        end_line: 51
        file: ''
      - start_line: 75
        end_line: 76
        file: ''
      uid: c04a72a9-81c7-4b8a-b8d5-1c2881418530
    - text: The calculation of mean arterial pressure (MAP) requires both 'systolic'
        and 'diastolic' to be valid integers for every row. Any record where either
        value is missing or non-integer would cause downstream errors.
      sources:
