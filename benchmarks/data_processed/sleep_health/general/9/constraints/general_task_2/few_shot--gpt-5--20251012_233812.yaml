constraints:
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', '^\\d{2,3}/\\d{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    - - '.satisfies(''CAST(split(`Blood Pressure`, "/")[0] AS INT) BETWEEN 80 AND
        250 AND CAST(split(`Blood Pressure`, "/")[1] AS INT) BETWEEN 40 AND 140'',
        ''bp_range_valid'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .hasDataType('Daily Steps', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Heart Rate:
    code:
    - - .hasDataType('Heart Rate', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Heart Rate')
      - Valid
    - - '.satisfies(''`Heart Rate` >= 30 AND `Heart Rate` <= 220'', ''heart_rate_range'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .hasDataType('Person ID', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .hasDataType('Physical Activity Level', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .hasDataType('Quality of Sleep', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    - - '.satisfies(''`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10'', ''qos_range'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.satisfies(''`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (\''Sleep Apnea\'',
        \''Insomnia\'')'', ''sleep_disorder_allowed_or_null'', lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasDataType('Sleep Duration', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    - - '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'', ''sleep_duration_range'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .hasDataType('Stress Level', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    - - '.satisfies(''`Stress Level` >= 0 AND `Stress Level` <= 10'', ''stress_range'',
        lambda v: v == 1.0)'
      - Valid
    assumptions: []
