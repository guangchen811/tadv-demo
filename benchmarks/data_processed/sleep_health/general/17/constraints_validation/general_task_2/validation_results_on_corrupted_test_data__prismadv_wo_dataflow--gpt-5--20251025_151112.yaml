results:
  Physical Activity Level:
    code:
    - suggestion: '.hasCompleteness(''Physical Activity Level'', lambda x: x >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL'',
        ''PAL numeric parseable >= 95%'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(CAST(`Physical Activity Level` AS DOUBLE) IS NULL)
        OR (CAST(`Physical Activity Level` AS DOUBLE) >= 0 AND CAST(`Physical Activity
        Level` AS DOUBLE) <= 100)'', ''PAL in [0,100] when parseable'', lambda x:
        x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Quality of Sleep` >= 1 AND `Quality of Sleep` <=
        10'', ''QoS in [1,10]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.isContainedIn(''BMI Category'', [''Overweight'', ''Normal'', ''Obese'',
        ''Normal Weight''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''BMI Category'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasCompleteness(''Blood Pressure'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\s*\\d+(\\.\\d+)?\\s*/\\s*\\d+(\\.\\d+)?\\s*$'',
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(split_part(`Blood Pressure`,''/'',1) AS DOUBLE)
        IS NOT NULL AND CAST(split_part(`Blood Pressure`,''/'',2) AS DOUBLE) IS NOT
        NULL", "BP parts parseable", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(split_part(`Blood Pressure`,''/'',1) AS DOUBLE)
        BETWEEN 80 AND 200 AND CAST(split_part(`Blood Pressure`,''/'',2) AS DOUBLE)
        BETWEEN 50 AND 120", "BP in expected operating range", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(split_part(`Blood Pressure`,''/'',1) AS DOUBLE)
        > CAST(split_part(`Blood Pressure`,''/'',2) AS DOUBLE)", "Systolic > Diastolic",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.satisfies("`Sleep Duration` <= 24", "Max 24h", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 3 AND `Sleep Duration` <= 12",
        "Typical Sleep Range (3-12h)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.satisfies("(`Daily Steps` IS NULL) OR (CAST(`Daily Steps` AS DOUBLE)
        IS NOT NULL)", "Daily Steps numeric-parsable", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`Physical Activity Level` IS NULL) OR (`Daily Steps`
        IS NOT NULL)", "PAL present implies Steps present", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Daily Steps` IS NULL) OR ((CAST(`Daily Steps` AS
        DOUBLE) >= 0) AND (CAST(`Daily Steps` AS DOUBLE) = CAST(CAST(`Daily Steps`
        AS BIGINT) AS DOUBLE)))", "Daily Steps are non-negative integer-like", lambda
        x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''satisfies("(`Daily Steps` IS NULL) OR ((CAST(`Daily
        Steps` AS DOUBLE) >= 0) AND (CAST(`Daily Steps` AS DOUBLE) = CAST(CAST(`Daily
        Steps` AS BIGINT) AS DOUBLE)))", "Daily Steps are non-negative integer-like",
        lambda x: x == 1)'' failed on data sample: Value: 0.9733333333333334 does
        not meet the constraint requirement!'
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.isContainedIn(''Sleep Disorder'', [''Sleep Apnea'', ''Insomnia''],
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.hasCompleteness(''Heart Rate'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Heart Rate` >= 40 AND `Heart Rate` <= 120", "HR in
        expected range", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Heart Rate` AS DOUBLE) IS NOT NULL AND CAST(`Heart
        Rate` AS DOUBLE) = CAST(CAST(`Heart Rate` AS DOUBLE) AS INT)", "HR integer-like",
        lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("CAST(`Stress Level` AS DOUBLE) IS NOT NULL", "Stress
        Level numeric (>=95% castable)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Stress Level` AS DOUBLE) BETWEEN 3 AND 8", "Stress
        Level in [3,8] (>=95%)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda r:
        r >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.hasCorrelation(columnA=''Sleep Duration'', columnB=''Quality of
        Sleep'', assertion=lambda c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(columnA=''Stress Level'', columnB=''Quality of
        Sleep'', assertion=lambda c: c <= -0.1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(columnA=''Stress Level'', columnB=''Sleep Duration'',
        assertion=lambda c: c <= -0.1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(columnA=''Physical Activity Level'', columnB=''Daily
        Steps'', assertion=lambda c: c >= 0.2)'
      status: false
      reason_if_failed: 'Constraint ''hasCorrelation(columnA=''Physical Activity Level'',
        columnB=''Daily Steps'', assertion=lambda c: c >= 0.2)'' failed on data sample:
        Value: 0.1797818990808545 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(`Blood Pressure` IS NOT NULL) AND (cast(split(`Blood
        Pressure`, ''/'')[0] as double) IS NULL OR cast(split(`Blood Pressure`, ''/'')[1]
        as double) IS NULL OR cast(split(`Blood Pressure`, ''/'')[0] as double) <=
        cast(split(`Blood Pressure`, ''/'')[1] as double))", "bp_parsing_or_order_violation",
        assertion=lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: warning
