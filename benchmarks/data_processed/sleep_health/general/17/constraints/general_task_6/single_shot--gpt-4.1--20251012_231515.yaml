constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isBetween('Daily Steps', 0, 50000, includeLowerBound=True, includeUpperBound=True)
      - Invalid
    - - .isComplete('Daily Steps')
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isBetween('Physical Activity Level', 0, 100, includeLowerBound=True, includeUpperBound=True)
      - Invalid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.41)'
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isBetween('Sleep Duration', 3.0, 14.0, includeLowerBound=True, includeUpperBound=True)
      - Invalid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isContainedIn('Stress Level', [3, 4, 5, 6, 7, 8])
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
