      level: warning
      uid: 989a84c8-6dd4-4556-b64e-1f769a097175
      source_assumptions:
      - 8f80ada2-43c8-46af-bb9c-1da618bee7a2
    assumptions:
    - text: 'The ''Blood Pressure'' column must be present and populated for every
        row; missing or blank values are not allowed. The code immediately parses
        and casts the extracted parts to integers, which will fail if any value is
        missing or unparsable. Example validation: Deequ completeness(''Blood Pressure'')
        == 1.0 or Great Expectations expect_column_values_to_not_be_null.'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      uid: b43440e3-de4e-41f6-a2fe-93ef51c650ad
    - text: 'Every ''Blood Pressure'' value must strictly match the pattern NN/NN
        or NNN/NNN (two or three digits, a single slash, then two or three digits)
        with no spaces, units, or extra characters. Example validation: Deequ hasPattern(''Blood
        Pressure'', ''^[0-9]{2,3}/[0-9]{2,3}$'') with assertion on ratio == 1.0, or
        Great Expectations expect_column_values_to_match_regex with the same pattern
        and mostly=1.0.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      uid: 010ca2f6-c974-486a-b873-e2fe22c004e6
    - text: 'Both parts of ''Blood Pressure'' must be parseable as integers (no decimals
        or signs). This is implied by the regex and the immediate astype(int) casting
        on the extracted groups. Example validation: ensure 100% match to the regex
        in the previous assumption (which guarantees integer-only parts) or use a
        custom map expectation to cast both parts to int without errors.'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      uid: 35d7ecb2-24ad-4d01-b5b0-29c8da1746c5
    - text: 'The numeric values represented by ''Blood Pressure'' should be in plausible
        physiological ranges to produce meaningful risk scores: systolic between 70
        and 250 inclusive, and diastolic between 40 and 150 inclusive. Example validation:
        Deequ satisfies("CAST(regexp_extract(`Blood Pressure`, ''^(\\d{2,3})/(\\d{2,3})$'',
        1) AS INT) BETWEEN 70 AND 250 AND CAST(regexp_extract(`Blood Pressure`, ''^(\\d{2,3})/(\\d{2,3})$'',
        2) AS INT) BETWEEN 40 AND 150", ''BP plausible ranges'', lambda x: x == 1.0)
        or a Great Expectations custom column_map expectation.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 30
        end_line: 35
        file: ''
      uid: 0d4e7ff3-5487-45fc-b4e5-5bec11a2a714
    - text: 'In the vast majority of rows, systolic should be greater than or equal
        to diastolic (e.g., at least 95% of values). This guards against swapped or
        malformed readings that would distort risk calculations. Example validation:
        Deequ satisfies("CAST(regexp_extract(`Blood Pressure`, ''^(\\d{2,3})/(\\d{2,3})$'',
        1) AS INT) >= CAST(regexp_extract(`Blood Pressure`, ''^(\\d{2,3})/(\\d{2,3})$'',
        2) AS INT)", ''Systolic >= Diastolic'', lambda x: x >= 0.95) or an equivalent
        Great Expectations custom check.'
      sources:
      - start_line: 25
        end_line: 25
        file: ''
      - start_line: 30
        end_line: 35
        file: ''
