      - start_line: 59
        end_line: 65
        file: ''
      uid: 866d60de-4e68-457a-a3e7-9c723746980b
    - text: 'Null or unexpected values in ''BMI Category'' should be rare (at least
        95% of rows should be in the allowed set), because unmapped/null values are
        converted to 0 risk via fillna(0), which would otherwise understate risk.
        Example Deequ: .satisfies("CASE WHEN `BMI Category` IN (''Obese'',''Overweight'',''Normal'',''Normal
        Weight'') THEN 1 ELSE 0 END", "Valid BMI Category", lambda x: x >= 0.95).'
      sources:
      - start_line: 59
        end_line: 65
        file: ''
      uid: 232a6343-45bb-48b3-aae4-5e0608b64bd0
    - text: '''BMI Category'' values should not contain leading or trailing whitespace,
        since no trimming is performed and whitespace would cause mismatches with
        the mapping keys. Example Deequ: .satisfies("CASE WHEN `BMI Category` = TRIM(`BMI
        Category`) THEN 1 ELSE 0 END", "Trimmed BMI Category", lambda x: x >= 0.99).'
      sources:
      - start_line: 65
        end_line: 65
        file: ''
      uid: a2649445-840d-4381-b5c3-535a173e4c63
    - text: 'The number of distinct values in ''BMI Category'' should not exceed 4,
        aligning with the expected domain {''Obese'',''Overweight'',''Normal'',''Normal
