      - start_line: 39
        end_line: 42
        file: ''
      uid: 2b9dfe77-a808-4a00-84e1-ea791c3f229a
    - text: 'All values in ''Physical Activity Level'' must be parseable as numeric
        and non-null in the input. The code coerces non-numeric values to NaN but
        never imputes; any NaN will propagate through rank/activity_protect into raw_risk
        and risk_score, resulting in NaN outputs. This can be represented as Deequ/GE
