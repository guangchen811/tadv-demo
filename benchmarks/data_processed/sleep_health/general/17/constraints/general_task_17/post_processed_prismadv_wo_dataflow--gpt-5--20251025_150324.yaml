      - 33257982-ea40-41de-b8c4-149be18f1b38
    assumptions:
    - text: 'Blood Pressure must be a valid systolic/diastolic pair for every record:
        it must match the pattern "NN/NN" or "NNN/NN" (two or three digits each),
        and the parsed systolic value must be greater than or equal to the diastolic
        value. This is required because the code splits and casts both parts to integers
        and then applies thresholds to both. Example Deequ constraints: .hasPattern("Blood
        Pressure", "^\\d{2,3}/\\d{2,3}$") and a compliance check: cast(regexp_extract(`Blood
        Pressure`, ''(\\d{2,3})/(\\d{2,3})'', 1) as int) >= cast(regexp_extract(`Blood
        Pressure`, ''(\\d{2,3})/(\\d{2,3})'', 2) as int).'
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 31
        end_line: 34
        file: ''
      uid: cbc4aa1a-998c-4962-a052-627d13b5f7b5
    - text: 'Daily Steps and Physical Activity Level must both be present, numeric,
        and non-negative for all records, since they are jointly ranked and averaged
        to form activity_index and used together to compute a vigorous bonus. Example
        Deequ constraints: .hasCompleteness("Daily Steps", 1.0), .hasCompleteness("Physical
        Activity Level", 1.0), and a compliance check: `Daily Steps` >= 0 AND `Physical
        Activity Level` >= 0.'
      sources:
      - start_line: 38
        end_line: 42
        file: ''
      uid: bfece127-cc91-48d9-b52a-c664b258091e
    - text: 'Consistency for vigorous activity: if Daily Steps is at least 10000,
        Physical Activity Level should be at least 60 (to avoid unit/scale mismatches
        that would prevent the intended AND condition from ever being met). Example
        Deequ compliance: (`Daily Steps` < 10000) OR (`Physical Activity Level` >=
        60).'
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      uid: c1541d12-5454-4ea6-ae3c-5dfea2ac80b9
    - text: "Stress Level and Quality of Sleep are jointly used to compute a risk\
        \ factor as Stress * (10 - Quality of Sleep)/10; therefore both columns must\
        \ be on a bounded 0\u201310 integer scale and non-null. Example Deequ constraints:\
        \ .hasCompleteness(\"Stress Level\", 1.0), .hasCompleteness(\"Quality of Sleep\"\
        , 1.0), and a compliance check: `Stress Level` BETWEEN 0 AND 10 AND `Quality\
        \ of Sleep` BETWEEN 0 AND 10."
      sources:
      - start_line: 43
        end_line: 44
        file: ''
      uid: 257a9a46-f4a5-4c05-9095-0954836b0af1
    - text: 'All required inputs used together to compute the risk score must be simultaneously
        present for each row: Age, Sleep Duration, Quality of Sleep, Physical Activity
        Level, Stress Level, Heart Rate, Daily Steps, BMI Category, and Blood Pressure.
        Missing or non-numeric values in any of these will propagate to NaNs in intermediate
        metrics and risk_score. Example Deequ compliance combining all: Age IS NOT
        NULL AND `Sleep Duration` IS NOT NULL AND `Quality of Sleep` IS NOT NULL AND
        `Physical Activity Level` IS NOT NULL AND `Stress Level` IS NOT NULL AND `Heart
        Rate` IS NOT NULL AND `Daily Steps` IS NOT NULL AND `BMI Category` IS NOT
        NULL AND `Blood Pressure` IS NOT NULL.'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 38
        end_line: 45
        file: ''
      - start_line: 47
        end_line: 76
        file: ''
      uid: 33257982-ea40-41de-b8c4-149be18f1b38
  '["Daily Steps","Physical Activity Level"]':
    code: []
    assumptions:
    - text: 'Both ''Daily Steps'' and ''Physical Activity Level'' must be present
        and fully numeric for every row (no nulls or non-parsable values), because
        they are ranked and jointly used to compute downstream fields. This can be
        enforced with Deequ constraints such as: isComplete(''Daily Steps''), isComplete(''Physical
        Activity Level''), hasDataType(''Daily Steps'', Integral), hasDataType(''Physical
        Activity Level'', Integral).'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 38
        end_line: 42
        file: ''
      - start_line: 84
        end_line: 90
        file: ''
      uid: 241cbd47-bfe0-4626-b557-071a36738901
    - text: '''Daily Steps'' and ''Physical Activity Level'' should be non-negative
        simultaneously (no row should have a negative value in either), since they
        are ranked and compared against non-negative thresholds. This can be expressed
        as a single multi-column Deequ rule: satisfies(''`Daily Steps` >= 0 AND `Physical
        Activity Level` >= 0'', ''non_negative_steps_and_pa'', r => r == 1.0).'
      sources:
      - start_line: 38
        end_line: 42
        file: ''
      uid: 5d90d04a-ae6d-4241-a222-1a5b026c58b6
    - text: '''Daily Steps'' and ''Physical Activity Level'' are intended to measure
        the same underlying construct (physical activity) and are combined via the
        mean of their percentile ranks; therefore they should be positively correlated.
        Represent with a Deequ correlation constraint such as: hasCorrelation(''Daily
        Steps'', ''Physical Activity Level'', lowerBound=0.1, upperBound=1.0).'
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      uid: 50abd7b4-eb6f-4be7-90d2-23eba55e4257
    - text: Both 'Daily Steps' and 'Physical Activity Level' should exhibit sufficient
        variability so percentile ranking is meaningful (i.e., not constant columns).
        Enforce with Deequ distinct-value constraints on both columns, e.g., hasNumberOfDistinctValues('Daily
        Steps', _ >= 5) and hasNumberOfDistinctValues('Physical Activity Level', _
        >= 5).
      sources:
      - start_line: 38
        end_line: 41
        file: ''
      uid: 0f9cc532-a57a-411d-8057-d8aedda23af3
    - text: The joint high-activity condition used to grant a vigorous bonus relies
        on the conjunction of thresholds across both columns; to keep this rule meaningful,
        the units/scales should align so that the predicate (`Daily Steps` >= 10000
        AND `Physical Activity Level` >= 60) is feasible in the data. This can be
        guarded with a Deequ multi-column compliance check ensuring some non-zero
        coverage, e.g., satisfies('`Daily Steps` >= 10000 AND `Physical Activity Level`
        >= 60', 'vigorous_condition_feasible', fraction >= 0.001).
      sources:
      - start_line: 42
        end_line: 42
        file: ''
      uid: 6e2f1f8b-bab3-4f6d-828c-6bb234d23a2e
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.satisfies(''(CAST(`Stress Level` AS DOUBLE) >= 0 AND CAST(`Stress
        Level` AS DOUBLE) <= 10) AND (CAST(`Quality of Sleep` AS DOUBLE) >= 0 AND
        CAST(`Quality of Sleep` AS DOUBLE) <= 10) AND (CAST(`Stress Level` AS DOUBLE)
        * (10 - CAST(`Quality of Sleep` AS DOUBLE)) >= 0) AND (CAST(`Stress Level`
        AS DOUBLE) * (10 - CAST(`Quality of Sleep` AS DOUBLE)) <= 100)'', ''sq_scale_valid'',
        lambda v: v == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: warning
      uid: 9eb233c0-a974-4ee4-b12e-76ae14159e33
      source_assumptions:
      - bd0f9023-3899-4d95-8ce4-f71d5b15882c
    assumptions:
    - text: "Stress Level and Quality of Sleep are on 0\u201310 integer scales and\
        \ are used jointly to compute risk. For every row: 0 <= Stress Level <= 10,\
        \ 0 <= Quality of Sleep <= 10, and Stress Level * (10 - Quality of Sleep)\
        \ is in [0, 100]. Example Deequ: .satisfies('Stress Level >= 0 and Stress\
        \ Level <= 10 and `Quality of Sleep` >= 0 and `Quality of Sleep` <= 10 and\
        \ Stress Level * (10 - `Quality of Sleep`) >= 0 and Stress Level * (10 - `Quality\
        \ of Sleep`) <= 100', 'sq_scale_valid')"
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 43
        end_line: 45
        file: ''
      uid: bd0f9023-3899-4d95-8ce4-f71d5b15882c
    - text: 'Pairwise completeness for Stress Level and Quality of Sleep: both columns
        must be non-null and numeric for every record (no unparsable values), since
        they are multiplied without fillna. Example Deequ: .satisfies(''isnotnull(Stress
        Level) AND isnotnull(`Quality of Sleep`)'', ''sq_pair_complete'')'
      sources:
      - start_line: 20
        end_line: 24
        file: ''
      - start_line: 43
        end_line: 45
        file: ''
      uid: 26ac89ff-7396-439a-a2dd-c53912293789
    - text: 'Co-presence and threshold logic for Daily Steps and Physical Activity
        Level: both must be non-null and non-negative together (used for ranking and
        averaging), and vigorous_bonus should equal 5.0 iff (Daily Steps >= 10000
        AND Physical Activity Level >= 60), otherwise 0. Example Deequ: .satisfies(''isnotnull(`Daily
        Steps`) AND isnotnull(`Physical Activity Level`) AND `Daily Steps` >= 0 AND
        `Physical Activity Level` >= 0'', ''activity_pair_present'').and(.satisfies(''((`Daily
        Steps` >= 10000 AND `Physical Activity Level` >= 60 AND vigorous_bonus = 5.0)
        OR (NOT(`Daily Steps` >= 10000 AND `Physical Activity Level` >= 60) AND vigorous_bonus
        = 0))'', ''vigorous_bonus_logic''))'
      sources:
      - start_line: 38
        end_line: 43
        file: ''
      uid: 2bfbbbb2-e806-4053-911a-9da23aba5261
    - text: "Blood Pressure must parse into systolic/diastolic 2\u20133 digit integers\
        \ and obey clinical ordering (bp_sys >= bp_dia) after extraction. Example\
        \ Deequ: .satisfies('`Blood Pressure` RLIKE ^\\\\d{2,3}/\\\\d{2,3}$', 'bp_format').and(.satisfies('bp_sys\
        \ >= bp_dia', 'bp_order'))"
      sources:
      - start_line: 25
        end_line: 27
        file: ''
      - start_line: 30
        end_line: 37
        file: ''
      uid: a1313ee4-129d-4f3f-aa0f-0b52bad4ded8
    - text: 'risk_score must equal raw_risk clipped to [0,100] and rounded to 2 decimals.
        Example Deequ: .satisfies(''risk_score = round(case when raw_risk < 0 then
        0 when raw_risk > 100 then 100 else raw_risk end, 2)'', ''risk_clip_round'')'
      sources:
      - start_line: 83
        end_line: 91
        file: ''
      uid: c915dfe3-4526-4e45-b90e-5f11b2de08f2
    - text: 'priority_bucket must be consistent with risk_score bins: 0 <= risk_score
        <= 25 => ''Low''; 25 < risk_score <= 50 => ''Moderate''; 50 < risk_score <=
        75 => ''High''; 75 < risk_score <= 100 => ''Critical''. Example Deequ: .satisfies(''(risk_score
        <= 25 AND priority_bucket = "Low") OR (risk_score > 25 AND risk_score <= 50
        AND priority_bucket = "Moderate") OR (risk_score > 50 AND risk_score <= 75
        AND priority_bucket = "High") OR (risk_score > 75 AND risk_score <= 100 AND
        priority_bucket = "Critical")'', ''priority_bucket_consistent'')'
      sources:
      - start_line: 92
        end_line: 95
        file: ''
      uid: 218b8779-b299-433f-863f-c4dc4eef3b3c
