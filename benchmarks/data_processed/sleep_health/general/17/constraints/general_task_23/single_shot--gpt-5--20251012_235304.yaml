constraints:
  Age:
    code:
    - - .hasDataType('Age', ConstrainableDataTypes.Integral)
      - Valid
    - - .isBetween('Age', lowerBound=10, upperBound=100, includeLowerBound=True, includeUpperBound=True)
      - Invalid
    - - .isComplete('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Underweight', 'Normal', 'Normal Weight',
        'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - '.hasPattern(''Blood Pressure'', ''^\\s*\\d{2,3}\\s*/\\s*\\d{2,3}\\s*$'',
        lambda v: v >= 0.99)'
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .hasDataType('Daily Steps', ConstrainableDataTypes.Integral)
      - Valid
    - - .isBetween('Daily Steps', lowerBound=0, upperBound=50000, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    - - .isComplete('Daily Steps')
      - Valid
    assumptions: []
  Daily Steps vs Physical Activity Level:
    code:
    - - '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda v: v
        >= 0.3)'
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .hasDataType('Heart Rate', ConstrainableDataTypes.Integral)
      - Valid
    - - .isBetween('Heart Rate', lowerBound=40, upperBound=120, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    - - .isComplete('Heart Rate')
      - Valid
    assumptions: []
  Occupation:
    code:
    - - .isComplete('Occupation')
      - Valid
    - - .isContainedIn('Occupation', ['Nurse', 'Software Engineer', 'Sales Representative',
        'Engineer', 'Lawyer', 'Teacher', 'Accountant', 'Salesperson', 'Scientist',
        'Doctor'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .hasDataType('Physical Activity Level', ConstrainableDataTypes.Integral)
      - Valid
    - - .isBetween('Physical Activity Level', lowerBound=0, upperBound=100, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .hasDataType('Quality of Sleep', ConstrainableDataTypes.Integral)
      - Valid
    - - .isBetween('Quality of Sleep', lowerBound=1, upperBound=10, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda v: v >= 0.4)'
      - Valid
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasDataType('Sleep Duration', ConstrainableDataTypes.Fractional)
      - Valid
    - - .isBetween('Sleep Duration', lowerBound=0.0, upperBound=14.0, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - .hasDataType('Stress Level', ConstrainableDataTypes.Integral)
      - Valid
    - - .isBetween('Stress Level', lowerBound=1, upperBound=10, includeLowerBound=True,
        includeUpperBound=True)
      - Invalid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
