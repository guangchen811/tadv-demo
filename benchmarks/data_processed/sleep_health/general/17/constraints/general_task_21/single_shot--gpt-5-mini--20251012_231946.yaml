constraints:
  BMI Category:
    code:
    - - .isContainedIn('BMI Category', ['Overweight','Normal','Obese','Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', '^\\d+/\\d+$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male','Female'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isGreaterThanOrEqualTo('Quality of Sleep', 0)
      - Invalid
    - - .isLessThanOrEqualTo('Quality of Sleep', 10)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.4)'
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isNonNegative('Sleep Duration')
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    assumptions: []
