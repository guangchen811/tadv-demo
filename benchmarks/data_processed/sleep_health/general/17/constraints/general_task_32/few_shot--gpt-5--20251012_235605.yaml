constraints:
  Age:
    code:
    - - '.hasMax(''Age'', lambda x: x <= 120)'
      - Valid
    - - .isComplete('Age')
      - Valid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight', 'Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', '^[0-9]{2,3}/[0-9]{2,3}$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Heart Rate:
    code:
    - - '.hasMax(''Heart Rate'', lambda x: x <= 220)'
      - Valid
    - - '.hasMin(''Heart Rate'', lambda x: x >= 30)'
      - Valid
    - - .isComplete('Heart Rate')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - '.hasMax(''Physical Activity Level'', lambda x: x <= 120)'
      - Valid
    - - '.hasMin(''Physical Activity Level'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.hasMax(''Quality of Sleep'', lambda x: x <= 10)'
      - Valid
    - - '.hasMin(''Quality of Sleep'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - '.hasMax(''Sleep Duration'', lambda x: x <= 24.0)'
      - Valid
    - - '.hasMin(''Sleep Duration'', lambda x: x >= 0.0)'
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  Stress Level:
    code:
    - - '.hasMax(''Stress Level'', lambda x: x <= 10)'
      - Valid
    - - '.hasMin(''Stress Level'', lambda x: x >= 0)'
      - Valid
    - - .isComplete('Stress Level')
      - Valid
    assumptions: []
