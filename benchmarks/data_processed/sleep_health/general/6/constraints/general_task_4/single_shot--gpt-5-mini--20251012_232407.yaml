constraints:
  Age:
    code:
    - - .isBetween('Age', 0, 120)
      - Invalid
    - - .isComplete('Age')
      - Valid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Normal','Normal Weight','Overweight','Obese'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .hasPattern('Blood Pressure', '^\\d+/\\d+$')
      - Valid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male','Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isBetween('Heart Rate', 30, 200)
      - Invalid
    - - .isComplete('Heart Rate')
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isBetween('Physical Activity Level', 0, 1000)
      - Invalid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isBetween('Quality of Sleep', 1, 10)
      - Invalid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda x: x >= 0.3)'
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isBetween('Sleep Duration', 0.0, 24.0)
      - Invalid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
