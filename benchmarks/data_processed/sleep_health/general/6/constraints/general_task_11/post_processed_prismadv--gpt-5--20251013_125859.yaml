        end_line: 105
        file: ''
      uid: adda5728-af8b-4eae-a3c0-8a86aea30f38
    - text: 'If a row meets the condition (''Systolic'' >= 140 OR ''Diastolic'' >=
        90), then the ''recommendations'' field must contain the blood-pressure guidance
        text. For example: .satisfies("(NOT (Systolic >= 140 OR Diastolic >= 90))
        OR instr(recommendations, ''Discuss blood pressure'') > 0", "bp_high_rec_present").'
