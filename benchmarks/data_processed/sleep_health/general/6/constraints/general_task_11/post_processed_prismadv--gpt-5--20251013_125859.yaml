        file: ''
      uid: 65fa0e3f-1e8b-4f07-9224-511e2bb0ab2a
    - text: 'If risk_score >= 70 for a row, then the ''recommendations'' field must
        include the escalation guidance (sleep study). For example: .satisfies("(risk_score
        < 70) OR instr(recommendations, ''Consider a sleep study'') > 0", "high_risk_rec_present").'
      sources:
