constraints:
  Physical Activity Level:
    code:
    - suggestion: '.satisfies(''CAST(`Physical Activity Level` AS DOUBLE) BETWEEN
        0 AND 120'', ''PAL range [0,120]'', lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: 9afb6c62-7925-4740-90c5-517f33e7efb5
      source_assumptions:
      - 47c9bd78-4d1f-46e9-af87-0687cde757ea
    - suggestion: '.hasNumberOfDistinctValues(''Physical Activity Level'', lambda
        n: n >= 2)'
      validity: false
      reason_if_invalid: 'Unable to instantiate constraint ''.hasNumberOfDistinctValues(''Physical
        Activity Level'', lambda n: n >= 2)'': Check.hasNumberOfDistinctValues() missing
        2 required positional arguments: ''binningUdf'' and ''maxBins'''
      level: warning
      uid: 7905f7eb-a39a-4798-b391-a542a8306ed1
      source_assumptions:
      - 662cf894-6973-4e46-b20f-d11ae4435908
    assumptions:
    - text: 'The ''Physical Activity Level'' column must exist in the input CSV because
        it is accessed unconditionally for modeling, recommendations, and is included
        in the final output selection. We could represent this assumption as a Deequ
        constraint like: check.hasColumn(''Physical Activity Level'').'
      sources:
      - start_line: 98
        end_line: 98
        file: ''
      - start_line: 42
        end_line: 45
        file: ''
      - start_line: 156
        end_line: 160
        file: ''
      uid: 85cfbf87-4832-4646-9429-d775157b279b
    - text: 'All ''Physical Activity Level'' values must be numeric-parsable and non-null;
        any non-numeric or missing values would be coerced to NaN and then used by
        np.polyfit and arithmetic without filtering, propagating NaNs and breaking
        downstream scoring. We could represent this as Deequ constraints like: check.isComplete(''Physical
        Activity Level'') and check.satisfies(''CAST(`Physical Activity Level` AS
        DOUBLE) IS NOT NULL'', ''PAL numeric parse'', lambda x: x == 1.0).'
      sources:
      - start_line: 72
        end_line: 76
        file: ''
      - start_line: 102
        end_line: 102
        file: ''
      - start_line: 105
        end_line: 105
        file: ''
      - start_line: 42
        end_line: 45
        file: ''
      uid: 23a5c97f-b1bf-4e20-b147-216745ab2ce4
    - text: 'The ''Physical Activity Level'' values should be finite and within a
        realistic range (e.g., 0 to 120). This keeps the recommendation thresholds
        (<60 and >=90) meaningful and avoids unstable regression behavior. We could
        represent this assumption as Deequ constraints like: check.hasMin(''Physical
        Activity Level'', lambda m: m >= 0) and check.hasMax(''Physical Activity Level'',
        lambda m: m <= 120), or equivalently check.satisfies(''`Physical Activity
        Level` BETWEEN 0 AND 120'', ''PAL range'', lambda x: x == 1.0).'
      sources:
      - start_line: 42
        end_line: 45
        file: ''
      - start_line: 102
        end_line: 105
        file: ''
      uid: 47c9bd78-4d1f-46e9-af87-0687cde757ea
    - text: 'When the dataset has at least two rows, ''Physical Activity Level'' should
        not be constant across all records (i.e., should have at least two distinct
        values) to avoid a degenerate linear fit in np.polyfit. We could represent
        this assumption as a Deequ constraint like: check.hasNumberOfDistinctValues(''Physical
        Activity Level'', lambda n: n >= 2).'
      sources:
      - start_line: 102
        end_line: 102
        file: ''
      uid: 662cf894-6973-4e46-b20f-d11ae4435908
  Quality of Sleep:
