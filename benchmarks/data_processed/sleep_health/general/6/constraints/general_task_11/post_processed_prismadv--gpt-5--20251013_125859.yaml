  ? '["BMI Category","Daily Steps","Diastolic","Physical Activity Level","Quality
    of Sleep","Sleep Duration","Stress Level","Systolic","risk_score"]'
  : code: []
    assumptions:
    - text: 'Blood pressure fields are consistent and physiologically plausible across
        columns: (a) ''Blood Pressure'' must be a non-null string in the form ''Systolic/Diastolic''
        with both sides numeric; (b) the derived ''Systolic'' and ''Diastolic'' columns
        must be non-null integers; (c) Systolic >= Diastolic; (d) Systolic is between
        80 and 250 and Diastolic between 40 and 150; and (e) the string column must
        equal concat(Systolic, ''/'', Diastolic). We could represent this as Deequ
        constraints like: .isComplete("Blood Pressure"), .isComplete("Systolic").isComplete("Diastolic"),
        .satisfies("Systolic >= Diastolic", "bp_ordering"), .satisfies("Systolic BETWEEN
        80 AND 250 AND Diastolic BETWEEN 40 AND 150", "bp_range"), .satisfies("`Blood
        Pressure` = concat(CAST(Systolic AS STRING), ''/'', CAST(Diastolic AS STRING))",
        "bp_string_consistency").'
      sources:
      - start_line: 91
        end_line: 96
        file: ''
      - start_line: 8
        end_line: 16
        file: ''
      - start_line: 123
        end_line: 123
        file: ''
      - start_line: 50
        end_line: 51
        file: ''
      uid: 5dfe31ef-ba09-4108-a766-747a1340051b
    - text: 'Physical activity and steps move together: ''Physical Activity Level''
        and ''Daily Steps'' must both be complete and numeric, and exhibit a positive
        association so the linear fit is meaningful. Concretely: (a) both columns
        are non-null in the same rows; (b) there are at least two distinct values
        in each; and (c) Pearson correlation between them is >= 0.2. Deequ examples:
        .satisfies("`Physical Activity Level` IS NOT NULL AND `Daily Steps` IS NOT
        NULL", "pal_steps_complete"), .hasNumberOfDistinctValues("Physical Activity
        Level", _ >= 2), .hasNumberOfDistinctValues("Daily Steps", _ >= 2), .hasCorrelation("Physical
        Activity Level", "Daily Steps", lowerBound=0.2).'
      sources:
      - start_line: 72
        end_line: 76
        file: ''
      - start_line: 98
        end_line: 107
        file: ''
      uid: aa9a0f42-c8e8-425b-ad9e-56a5c6d8ea12
    - text: 'Risk band is a deterministic bucketing of risk_score: risk_band must
        be ''Low'' when risk_score <= 33.3, ''Moderate'' when 33.3 < risk_score <=
        66.6, and ''High'' when risk_score > 66.6; additionally, risk_score must be
        within [0, 100]. Deequ example: .satisfies("(risk_score <= 33.3 AND risk_band
        = ''Low'') OR (risk_score > 33.3 AND risk_score <= 66.6 AND risk_band = ''Moderate'')
        OR (risk_score > 66.6 AND risk_band = ''High'')", "risk_band_consistency"),
        and .satisfies("risk_score >= 0 AND risk_score <= 100", "risk_score_range").'
      sources:
      - start_line: 142
        end_line: 150
        file: ''
      uid: 8c2dff71-90f0-47db-adce-61ecf4c07b50
    - text: 'High blood pressure across Systolic/Diastolic must trigger the corresponding
        recommendation text. If (Systolic >= 140 OR Diastolic >= 90) then ''recommendations''
        should contain the substring ''Discuss blood pressure with your clinician''.
        Deequ example: .satisfies("CASE WHEN (Systolic >= 140 OR Diastolic >= 90)
        THEN instr(recommendations, ''Discuss blood pressure with your clinician'')
        > 0 ELSE true END", "bp_recommendation_present").'
      sources:
      - start_line: 48
        end_line: 51
        file: ''
      - start_line: 152
        end_line: 154
        file: ''
      uid: 7bbe9b92-e5ad-4d34-a691-17827de59ae7
    - text: 'BMI category and recommendations align: if lower(`BMI Category`) is ''overweight''
        or ''obese'', the ''recommendations'' string should include a weight-management
        message (e.g., contains ''weight management''). Deequ example: .satisfies("CASE
        WHEN lower(`BMI Category`) IN (''overweight'',''obese'') THEN instr(recommendations,
        ''weight management'') > 0 ELSE true END", "bmi_recommendation_present").'
      sources:
      - start_line: 47
        end_line: 49
        file: ''
      - start_line: 152
        end_line: 154
        file: ''
      uid: b16781b3-fb17-482d-b4c0-570f34a30699
  ? '["BMI Category","Diastolic","Physical Activity Level","Sleep Duration","Stress
    Level","Systolic","qos","recommendations","risk_score"]'
  : code: []
    assumptions:
    - text: 'The ''Blood Pressure'' column must be present and formatted as ''<int>/<int>''
        for every row so that ''Systolic'' and ''Diastolic'' can be parsed without
        nulls and cast to integers. Additionally, the concatenation concat(cast(Systolic
        as string), ''/'', cast(Diastolic as string)) should equal the whitespace-stripped
        ''Blood Pressure'' value.

        Example Deequ constraints:

        - .hasPattern(''Blood Pressure'', ''^\d{2,3}/\d{2,3}$'')

        - .satisfies("concat(cast(Systolic as string), ''/'', cast(Diastolic as string))
        = regexp_replace(`Blood Pressure`, '' '', '''')", ''bp_string_matches_components'')

        - .completeness(''Systolic'', 1.0).and(.completeness(''Diastolic'', 1.0))'
      sources:
      - start_line: 90
        end_line: 96
        file: ''
      - start_line: 122
        end_line: 123
        file: ''
      uid: 3b66a55e-6ae8-4cbf-916e-944877dc2b78
    - text: 'There must be at least two rows with non-null, finite values in both
        ''Physical Activity Level'' and ''Daily Steps'' to allow np.polyfit to run;
        in practice both columns should be complete (no nulls) and numeric across
        the dataset.

        Example Deequ constraints:

        - .size() >= 2

        - .completeness(''Physical Activity Level'', 1.0)

        - .completeness(''Daily Steps'', 1.0)

        - .satisfies(''`Physical Activity Level` IS NOT NULL AND `Daily Steps` IS
        NOT NULL'', ''pal_steps_nonnull'')'
      sources:
      - start_line: 72
        end_line: 76
        file: ''
      - start_line: 98
        end_line: 106
        file: ''
      uid: b7e3b550-90ab-4372-979f-007b89681fb3
    - text: "The derived 'qos' column must equal the integer-cast of 'Quality of Sleep'\
        \ for all rows; values should be within the expected 1\u201310 scale.\nExample\
        \ Deequ constraints:\n- .satisfies('qos = CAST(`Quality of Sleep` AS INT)',\
        \ 'qos_matches_qos_raw')\n- .satisfies('qos BETWEEN 1 AND 10', 'qos_in_range')"
      sources:
      - start_line: 85
        end_line: 87
        file: ''
      - start_line: 33
        end_line: 35
        file: ''
      uid: 927a9e3d-5ac4-4f7f-8c1e-45647822e6b4
    - text: 'If ''Systolic'' >= 140 OR ''Diastolic'' >= 90, then ''recommendations''
        must contain the blood pressure escalation advice substring ''Discuss blood
        pressure with your clinician''.

        Example Deequ constraint:

        - .satisfies("CASE WHEN Systolic >= 140 OR Diastolic >= 90 THEN recommendations
        LIKE ''%Discuss blood pressure with your clinician%'' ELSE true END", ''bp_recommendation_present'')'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: 5a28ad35-076a-4273-b822-2437e0efb86c
    - text: 'If ''risk_score'' >= 70, then ''recommendations'' must include the high-risk
        escalation substring ''Consider a sleep study''.

        Example Deequ constraint:

        - .satisfies("CASE WHEN risk_score >= 70 THEN recommendations LIKE ''%Consider
        a sleep study%'' ELSE true END", ''high_risk_recommendation_present'')'
      sources:
      - start_line: 54
        end_line: 55
        file: ''
      - start_line: 149
        end_line: 153
        file: ''
      uid: ab000699-52b3-4be8-a7ae-6f7cebdd0dc0
    - text: 'If lower(''BMI Category'') IN (''overweight'',''obese''), then ''recommendations''
        must include the weight management substring ''Pair sleep regularity with
        nutrition planning''.

        Example Deequ constraint:

        - .satisfies("CASE WHEN lower(`BMI Category`) IN (''overweight'',''obese'')
        THEN recommendations LIKE ''%Pair sleep regularity with nutrition planning%''
        ELSE true END", ''bmi_recommendation_present'')'
      sources:
      - start_line: 48
        end_line: 49
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: b15469a1-7e10-41d6-8e6f-a3c8cea30eac
    - text: "If 'Sleep Duration' < 6.0, then 'recommendations' must contain the short-sleep\
        \ coaching substring 'Target 7\u20139 hours nightly'.\nExample Deequ constraint:\n\
        - .satisfies(\"CASE WHEN `Sleep Duration` < 6.0 THEN recommendations LIKE\
        \ '%Target 7\u20139 hours nightly%' ELSE true END\", 'short_sleep_recommendation_present')"
      sources:
      - start_line: 28
        end_line: 29
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: 8e3d964b-7d4e-4021-bfaa-24663a631974
    - text: 'If ''Sleep Duration'' > 9.0, then ''recommendations'' must contain the
        long-sleep coaching substring ''Keep time-in-bed under 9 hours''.

        Example Deequ constraint:

        - .satisfies("CASE WHEN `Sleep Duration` > 9.0 THEN recommendations LIKE ''%Keep
        time-in-bed under 9 hours%'' ELSE true END", ''long_sleep_recommendation_present'')'
      sources:
      - start_line: 30
        end_line: 31
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: 4cf8e0d0-6bbe-4268-970b-07abee4b0cb2
    - text: 'If ''qos'' <= 6, then ''recommendations'' must include the sleep hygiene
        substring ''Optimize sleep hygiene''.

        Example Deequ constraint:

        - .satisfies("CASE WHEN qos <= 6 THEN recommendations LIKE ''%Optimize sleep
        hygiene%'' ELSE true END", ''qos_recommendation_present'')'
      sources:
      - start_line: 34
        end_line: 35
        file: ''
      - start_line: 153
