      uid: 970974b2-5a4e-45ae-898f-141c32459d8a
    - text: 'The ''risk_band'' must be consistent with ''risk_score'' binning: ''Low''
        if 0 <= risk_score <= 33.3, ''Moderate'' if 33.3 < risk_score <= 66.6, and
        ''High'' if 66.6 < risk_score <= 100.0. Representable as: .satisfies("CASE
        WHEN risk_score <= 33.3 THEN risk_band = ''Low'' WHEN risk_score <= 66.6 THEN
        risk_band = ''Moderate'' ELSE risk_band = ''High'' END", "risk_band_matches_score").'
