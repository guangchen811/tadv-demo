    assumptions:
    - text: 'The ''Blood Pressure'' column must be in the form "<systolic>/<diastolic>"
        (exactly one slash, both parts integer), such that the derived ''Systolic''
        and ''Diastolic'' columns are non-null integers for all rows and round-trip
        back to the original value (ignoring whitespace). We could represent this
        as Deequ constraints like: .satisfies("Systolic IS NOT NULL AND Diastolic
        IS NOT NULL", "bp_parts_not_null") and .satisfies("regexp_replace(`Blood Pressure`,
