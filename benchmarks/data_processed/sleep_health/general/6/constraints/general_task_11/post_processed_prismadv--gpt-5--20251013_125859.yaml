        end_line: 113
        file: ''
      - start_line: 48
        end_line: 49
        file: ''
      uid: 574bbf98-b6e5-4435-9837-dc47b3c7f7c8
    - text: 'Null or unexpected ''BMI Category'' values (i.e., values not in {''Normal'',''Normal
