    - text: 'The ''Blood Pressure'' string and the numeric ''Systolic''/''Diastolic''
        columns must be consistent: ''Blood Pressure'' matches the pattern ^\d{2,3}/\d{2,3}$
        and, for every row, CAST(split(`Blood Pressure`, ''/'')[0] AS INT) = `Systolic`
        AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT) = `Diastolic`. Example
        constraints: .hasPattern(''Blood Pressure'', ''^\\d{2,3}/\\d{2,3}$''); .satisfies("CAST(split(`Blood
        Pressure`, ''/'')[0] AS INT) = `Systolic` AND CAST(split(`Blood Pressure`,
        ''/'')[1] AS INT) = `Diastolic`", ''bp_components_consistent'', 1.0).'
      sources:
      - start_line: 90
        end_line: 97
        file: ''
      uid: bed35936-3ca6-462c-9d30-d3c16c07a467
    - text: 'There must be at least two rows with non-null pairs of (''Physical Activity
        Level'', ''Daily Steps'') and ''Physical Activity Level'' must have >1 distinct
        non-null value so that the linear fit (polyfit) can be computed. Example constraints:
        .hasCompleteness(''Physical Activity Level'', c >= 1.0) and .hasCompleteness(''Daily
        Steps'', c >= 1.0) when dataset is small, or alternatively .satisfies("NOT
        isnull(`Physical Activity Level`) AND NOT isnull(`Daily Steps`)", ''pal_steps_pair_present'',
        fraction >= 2/rowCount); plus .hasNumberOfDistinctValues(''Physical Activity
        Level'', v >= 2).'
      sources:
      - start_line: 98
        end_line: 107
        file: ''
      uid: e4678e0b-f40b-4295-b5fe-2fc17a4b3b01
    - text: 'The pair (''risk_score'', ''risk_band'') must be consistent: 0 <= risk_score
        <= 100 and risk_band is Low if risk_score <= 33.3, Moderate if 33.3 < risk_score
        <= 66.6, High if 66.6 < risk_score <= 100. Example constraints: .satisfies("risk_score
        >= 0 AND risk_score <= 100", ''risk_score_in_range'', 1.0); .satisfies("(risk_score
        <= 33.3 AND risk_band = ''Low'') OR (risk_score > 33.3 AND risk_score <= 66.6
        AND risk_band = ''Moderate'') OR (risk_score > 66.6 AND risk_band = ''High'')",
        ''risk_band_mapping'', 1.0).'
      sources:
      - start_line: 142
        end_line: 150
        file: ''
      uid: 6aa4d82f-6691-49d2-9be3-fb84435af1d7
    - text: 'Recommendations must reflect low sleep quality: if qos <= 6 then the
        ''recommendations'' text contains the sleep-hygiene guidance. Example constraint:
        .satisfies("CASE WHEN qos <= 6 THEN recommendations LIKE ''%Optimize sleep
        hygiene%'' ELSE true END", ''rec_qos_low_contains_hygiene'', 1.0).'
      sources:
      - start_line: 34
        end_line: 36
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: d2d5e5d8-e5a1-4c97-97a9-2eb110aa7f16
    - text: 'Recommendations must reflect hypertensive readings: if (`Systolic` >=
        140 OR `Diastolic` >= 90) then the ''recommendations'' text contains the blood-pressure
        advice. Example constraint: .satisfies("CASE WHEN (`Systolic` >= 140 OR `Diastolic`
        >= 90) THEN recommendations LIKE ''%Discuss blood pressure%'' ELSE true END",
        ''rec_bp_high_contains_bp_advice'', 1.0).'
      sources:
      - start_line: 50
        end_line: 51
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: a7e64dc3-459f-4428-ab9b-3931fe3cc2cf
    - text: 'Recommendations must reflect high overall risk: if risk_score >= 70 then
        the ''recommendations'' text contains the high-risk escalation message. Example
        constraint: .satisfies("CASE WHEN risk_score >= 70 THEN recommendations LIKE
        ''%sleep study%'' ELSE true END", ''rec_high_risk_contains_escalation'', 1.0).'
      sources:
      - start_line: 54
        end_line: 55
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: 96b15dfc-873a-4c6f-88ba-078644a2aaaf
  '["risk_band","risk_score"]':
    code: []
    assumptions:
    - text: 'risk_band must be consistent with risk_score binning: (-0.1, 33.3] ->
        ''Low'', (33.3, 66.6] -> ''Moderate'', (66.6, 100.0] -> ''High''. Representable
        in Deequ as a single compliance constraint, e.g., compliance(''risk_band_matches_score'',
        "(risk_score <= 33.3 AND risk_band = ''Low'') OR (risk_score > 33.3 AND risk_score
        <= 66.6 AND risk_band = ''Moderate'') OR (risk_score > 66.6 AND risk_score
        <= 100.0 AND risk_band = ''High'')").'
      sources:
      - start_line: 145
        end_line: 151
        file: ''
      uid: ac25f33b-3ce3-4989-9be3-a8e9f6aef068
    - text: 'Blood Pressure must parse cleanly into two numeric components and match
        Systolic/Diastolic: BP string should be of the form ''<int>/<int>'', and Systolic
        = left part, Diastolic = right part; both must be non-null integers. Deequ
        compliance example: compliance(''bp_parse_consistency'', "Blood Pressure RLIKE
        ''^[ ]*[0-9]+[ ]*/[ ]*[0-9]+[ ]*$'' AND cast(split(Blood Pressure, ''/'')[0]
        as int) = Systolic AND cast(split(Blood Pressure, ''/'')[1] as int) = Diastolic").'
      sources:
      - start_line: 90
        end_line: 97
        file: ''
      uid: a9c618ad-acbb-46af-bc9a-e184dbc2b3c1
    - text: 'Physiologic consistency of BP components: Systolic must be strictly greater
        than Diastolic for all records. Deequ compliance example: compliance(''bp_physiologic_order'',
        ''Systolic > Diastolic'').'
      sources:
      - start_line: 8
        end_line: 22
        file: ''
      - start_line: 90
        end_line: 97
        file: ''
      uid: b5c74833-842b-47fd-b961-667dff73ef50
    - text: 'If BP is in hypertensive crisis (Systolic > 180 OR Diastolic > 120),
        the aggregated risk_score must be at least approximately 25.0 given the weights
        and clipping used. Deequ compliance example: compliance(''crisis_implies_min_risk'',
        ''(Systolic > 180 OR Diastolic > 120) => risk_score >= 25.0'').'
      sources:
      - start_line: 8
        end_line: 22
        file: ''
      - start_line: 126
        end_line: 144
        file: ''
      uid: d23d9923-4beb-426e-bf94-debae6ae6468
    - text: 'If risk_score >= 70, recommendations must include the escalated-care
        phrase ''Consider a sleep study to evaluate for apnea''. Deequ compliance
        example: compliance(''high_risk_has_apnea_note'', "(risk_score < 70) OR recommendations
        LIKE ''%Consider a sleep study to evaluate for apnea%''").'
      sources:
      - start_line: 54
        end_line: 55
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: c5efb19f-b2f3-4821-9446-3491e1c1d5fe
    - text: 'If Systolic >= 140 OR Diastolic >= 90, recommendations must include the
        hypertension guidance ''Discuss blood pressure with your clinician''. Deequ
        compliance example: compliance(''htn_recommendation_present'', "NOT (Systolic
        >= 140 OR Diastolic >= 90) OR recommendations LIKE ''%Discuss blood pressure
        with your clinician%''").'
      sources:
      - start_line: 48
        end_line: 51
        file: ''
      - start_line: 153
        end_line: 153
        file: ''
      uid: 1d957580-3d66-4541-b2f0-03d37ad4ddcf
    - text: 'When risk_score is non-null, risk_band must be one of {''Low'',''Moderate'',''High''}
        (i.e., not the ''nan'' string). Deequ compliance example: compliance(''band_defined_when_score_defined'',
        "risk_score IS NULL OR risk_band IN (''Low'',''Moderate'',''High'')").'
      sources:
      - start_line: 145
        end_line: 151
        file: ''
      uid: bf502393-b7c5-49c3-a391-4fb375b9f620
