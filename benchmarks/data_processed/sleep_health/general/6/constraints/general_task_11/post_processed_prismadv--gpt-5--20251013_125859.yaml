        file: ''
      uid: 000e1d54-868e-4589-973e-0b7f78d810d1
    - text: 'Given the bp_stage_risk weights (w_bp = 0.25), the minimum overall ''risk_score''
        is bounded by BP stage: if (''Systolic'' >= 140 OR ''Diastolic'' >= 90) then
        risk_score >= 20.0; if (''Systolic'' > 180 OR ''Diastolic'' > 120) then risk_score
        >= 25.0. These can be checked with: .satisfies("(NOT (Systolic >= 140 OR Diastolic
        >= 90)) OR risk_score >= 20.0", "min_score_stage2") and .satisfies("(NOT (Systolic
        > 180 OR Diastolic > 120)) OR risk_score >= 25.0", "min_score_crisis").'
