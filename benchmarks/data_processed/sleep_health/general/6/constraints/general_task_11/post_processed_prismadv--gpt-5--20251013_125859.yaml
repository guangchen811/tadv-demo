      reason_if_invalid: ''
      level: warning
      uid: d2a74cb9-e59a-4f2a-946e-3e58503d26e8
      source_assumptions:
      - 253d3861-9c7b-4376-8809-68ecc920d693
    assumptions:
    - text: 'The ''Quality of Sleep'' column must be present in the input CSV with
        exactly this name. This is required because the code directly indexes df[''Quality
        of Sleep''] and includes it in the fixed list of numeric columns. Possible
        validation: expect_column_to_exist(''Quality of Sleep'').'
      sources:
      - start_line: 72
        end_line: 73
        file: ''
      - start_line: 85
        end_line: 85
        file: ''
      uid: c4b42fd7-109b-4679-8450-ba7fdd03b4fc
    - text: 'All ''Quality of Sleep'' values must be parseable as numeric and non-null
        for every row. The pipeline coerces to numeric (errors=''coerce'') and immediately
        casts to int; any non-numeric or null would become NaN and then fail on astype(int).
        Possible validation: completeness(''Quality of Sleep'') == 1.0 and satisfies(''CASE
        WHEN TRY_CAST(`Quality of Sleep` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END'',
        ''QoS numeric'', lambda x: x == 1).'
      sources:
      - start_line: 72
        end_line: 76
        file: ''
      - start_line: 85
        end_line: 86
        file: ''
      uid: ad781f04-6ca6-40df-bc75-804678659ba7
    - text: 'The ''Quality of Sleep'' values should be integers (integer-like). The
        code casts the series to int and uses the integer value for recommendations
        and risk calculation; decimals would be truncated. Possible validation: satisfies(''CASE
        WHEN `Quality of Sleep` = CAST(`Quality of Sleep` AS INT) THEN 1 ELSE 0 END'',
        ''QoS integer'', lambda x: x == 1).'
      sources:
      - start_line: 86
        end_line: 86
        file: ''
      - start_line: 34
        end_line: 34
        file: ''
      uid: 75122bfd-7106-4f4a-bb27-b351609948a2
    - text: 'The ''Quality of Sleep'' scale is expected to be within 0 to 10 inclusive.
        The code normalizes by dividing by 10 and interprets higher as better; values
        outside [0,10] would distort the risk before later clipping and miscalibrate
        recommendations around the <= 6 threshold. Possible validation: hasMin(''Quality
        of Sleep'', lambda x: x >= 0) and hasMax(''Quality of Sleep'', lambda x: x
        <= 10).'
      sources:
      - start_line: 87
        end_line: 88
        file: ''
      - start_line: 34
        end_line: 34
        file: ''
      uid: 253d3861-9c7b-4376-8809-68ecc920d693
