    - text: It is assumed that for all records, the systolic blood pressure ('bp_sys')
        is greater than or equal to the diastolic blood pressure ('bp_dia'). Violations
        of this relationship may indicate data errors or physiologically impossible
        readings, potentially leading to misleading risk scores.
