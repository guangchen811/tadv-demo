results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Physical Activity Level` >= 0 AND `Physical Activity
        Level` < 200'', ''PAL plausible range'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Quality of Sleep` >= 4 AND `Quality of Sleep` <= 9',
        'Quality of Sleep in [4, 9]')
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.hasSize(lambda n: n >= 2)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMax(''Daily Steps'', lambda x: x <= 50000)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: false
      reason_if_failed: 'Constraint ''.isComplete(''BMI Category'')'' failed on data
        sample: Value: 0.9266666666666666 does not meet the constraint requirement!'
      level: error
    - suggestion: .isContainedIn('BMI Category', ['Normal', 'Normal Weight', 'Overweight',
        'Obese'])
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Sleep Duration'', lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Sleep Duration` >= 0 AND `Sleep Duration` <= 24', 'Sleep
        Duration in realistic range')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.hasCompleteness(''Sleep Disorder'', lambda x: x > 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
  '["BMI Category","Sleep Disorder"]':
    code:
    - suggestion: '.satisfies(''CASE WHEN `Sleep Disorder` = "Sleep Apnea" THEN CASE
        WHEN `BMI Category` IN ("Overweight", "Obese") THEN 1 ELSE 0 END ELSE 1 END'',
        ''Sleep Apnea BMI Consistency'', lambda x: x >= 0.60)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Sleep Disorder` IS NOT NULL THEN CASE WHEN
        `BMI Category` IN ("Overweight", "Obese", "Normal", "Normal Weight") THEN
        1 ELSE 0 END ELSE 1 END'', ''Valid BMI Category for Non-null Sleep Disorder'',
        lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN `Sleep Disorder` IS NOT
        NULL THEN CASE WHEN `BMI Category` IN ("Overweight", "Obese", "Normal", "Normal
        Weight") THEN 1 ELSE 0 END ELSE 1 END'', ''Valid BMI Category for Non-null
        Sleep Disorder'', lambda x: x == 1)'' failed on data sample: Value: 0.96 does
        not meet the constraint requirement!'
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: .satisfies('((`Daily Steps` IS NULL AND `Physical Activity Level`
        IS NULL) OR (`Daily Steps` IS NOT NULL AND `Physical Activity Level` IS NOT
        NULL))', 'Daily Steps and Physical Activity Level Mutual Completeness')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        c: abs(c) > 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('(`Daily Steps` >= 0 AND `Daily Steps` <= 50000 AND `Physical
        Activity Level` >= 0 AND `Physical Activity Level` <= 200)', 'Steps and PAL
        plausible human range')
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: .satisfies('(`Quality of Sleep` BETWEEN 4 AND 9) AND (`Stress Level`
        BETWEEN 3 AND 8)', 'Quality of Sleep and Stress Level within expected integer
        ranges')
      status: true
      reason_if_failed: ''
      level: warning
