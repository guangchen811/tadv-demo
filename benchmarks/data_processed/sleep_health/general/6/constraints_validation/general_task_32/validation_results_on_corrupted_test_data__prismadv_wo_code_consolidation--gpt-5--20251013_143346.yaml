results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `Physical Activity Level` BETWEEN 0 AND
        120 THEN 1 ELSE 0 END'', ''PAL in range [0,120]'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.hasCompleteness("Quality of Sleep", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Quality of Sleep` >= 1 AND `Quality of Sleep` <= 10",
        "QoS in 1-10", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Quality of Sleep` AS DOUBLE) = CAST(`Quality
        of Sleep` AS BIGINT)", "QoS integer-like", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: .isComplete("BMI Category")
      status: false
      reason_if_failed: 'Constraint ''.isComplete("BMI Category")'' failed on data
        sample: Value: 0.9266666666666666 does not meet the constraint requirement!'
      level: error
    - suggestion: '.isContainedIn("BMI Category", ["Normal", "Normal Weight", "Overweight",
        "Obese"], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("TRIM(`BMI Category`) = `BMI Category`", "BMI Category
        trimming", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("TRIM(`BMI Category`) = `BMI Category`",
        "BMI Category trimming", lambda x: x == 1.0)'' failed on data sample: Value:
        0.9266666666666666 does not meet the constraint requirement!'
      level: warning
  Blood Pressure:
    code:
    - suggestion: .isComplete("Blood Pressure")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern("Blood Pressure", "^\\s*\\d+\\s*/\\s*\\d+\\s*$", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(TRIM(substring_index(`Blood Pressure`, ''/'',
        1)) AS INT) BETWEEN 70 AND 250 AND CAST(TRIM(substring_index(`Blood Pressure`,
        ''/'', -1)) AS INT) BETWEEN 40 AND 150", "Plausible BP range", lambda x: x
        >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: '.hasCompleteness(''Person ID'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(`Person ID` AS BIGINT) IS NOT NULL AND CAST(`Person
        ID` AS BIGINT) >= 0'', ''Person ID integer and non-negative'', lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Duration` >= 3.0 AND `Sleep Duration` <= 12.0'',
        ''Sleep Duration plausible range (95%)'', lambda v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Duration` >= 0 AND `Sleep Duration` <= 24'',
        ''Sleep Duration physical bounds'', lambda p: p == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness(''Daily Steps'', lambda c: c >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Daily Steps` IS NULL) OR (`Daily Steps` >= 0)'',
        ''Non-negative Daily Steps'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''(`Daily Steps` IS NULL) OR (`Daily Steps` <= 15000)'',
        ''Steps within modeled upper range'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("(`Sleep Disorder` IS NULL) OR ((`Sleep Disorder` =
        TRIM(`Sleep Disorder`)) AND (`Sleep Disorder` IN (''Insomnia'',''Sleep Apnea'')))",
        "Sleep Disorder domain and formatting", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("(`Heart Rate` IS NULL) OR (CAST(`Heart Rate` AS DOUBLE)
        IS NOT NULL)", "HR_numeric_if_present", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Heart Rate'', lambda v: v >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Heart Rate` IS NULL) OR (CAST(`Heart Rate` AS DOUBLE)
        > 0)", "HR_strictly_positive", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Heart Rate` IS NULL) OR (CAST(`Heart Rate` AS DOUBLE)
        BETWEEN 50 AND 110)", "HR_normal_band", lambda x: x >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Stress Level` >= 0 AND `Stress Level` <= 10'', ''Stress
        Level in [0,10]'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''ABS(CAST(`Stress Level` AS DOUBLE) - ROUND(CAST(`Stress
        Level` AS DOUBLE))) < 1e-9'', ''Stress Level mostly integer (>=95%)'', lambda
        v: v >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CAST(Age AS DOUBLE) IS NOT NULL'', ''Age numeric parsable'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''Age >= 0 AND Age <= 120'', ''Age plausible range'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure (diastolic)","Blood Pressure (systolic)"]':
    code:
    - suggestion: '.satisfies("(`Blood Pressure` RLIKE ''^\\s*([0-9]+)\\s*/\\s*([0-9]+)\\s*$'')
        AND CAST(regexp_extract(`Blood Pressure`, ''^\\s*([0-9]+)\\s*/\\s*([0-9]+)\\s*$'',
        1) AS INT) >= CAST(regexp_extract(`Blood Pressure`, ''^\\s*([0-9]+)\\s*/\\s*([0-9]+)\\s*$'',
        2) AS INT)", "bp_sys_ge_dia", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
