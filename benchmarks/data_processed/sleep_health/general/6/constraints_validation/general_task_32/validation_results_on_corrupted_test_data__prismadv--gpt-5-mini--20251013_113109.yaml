results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` IS NULL THEN 0
        ELSE CASE WHEN `Physical Activity Level` >= 0 AND `Physical Activity Level`
        <= 120 THEN 1 ELSE 0 END END", "Physical Activity Level in [0,120]", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Physical Activity Level` IS NULL THEN 1
        ELSE CASE WHEN round(`Physical Activity Level`, 0) = `Physical Activity Level`
        THEN 1 ELSE 0 END END", "Physical Activity Level integer-like", lambda x:
        x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete("Quality of Sleep")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Quality of Sleep` AS DOUBLE) IS
        NOT NULL THEN 1 ELSE 0 END", "Quality of Sleep numeric", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` BETWEEN 1 AND 10 THEN
        1 ELSE 0 END", "Quality of Sleep in 1..10", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Quality of Sleep` = FLOOR(`Quality of Sleep`)
        THEN 1 ELSE 0 END", "Quality of Sleep integer-valued", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("CASE WHEN `BMI Category` IS NOT NULL THEN 1 ELSE 0
        END", "BMI not null", lambda x: x == 1)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CASE WHEN `BMI Category` IS NOT
        NULL THEN 1 ELSE 0 END", "BMI not null", lambda x: x == 1)'' failed on data
        sample: Value: 0.9266666666666666 does not meet the constraint requirement!'
      level: error
    - suggestion: '.isContainedIn(''BMI Category'', [''Normal'',''Normal Weight'',''Overweight'',''Obese''],
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', r''^\s*\d+\s*/\s*\d+\s*$'', assertion=lambda
        x: x == 1.0, name=''BP pattern'')'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(trim(split(`Blood Pressure`, ''/'')[0])
        AS INT) BETWEEN 50 AND 300 AND CAST(trim(split(`Blood Pressure`, ''/'')[1])
        AS INT) BETWEEN 30 AND 200 THEN 1 ELSE 0 END", "BP reasonable ranges", lambda
        x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete("Person ID")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique("Person ID")
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete("Sleep Duration")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "Sleep Duration plausible range", lambda x: x >= 0.995)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 3 AND `Sleep Duration` <= 12",
        "Sleep Duration mostly within normalization clip", lambda x: x >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: .isComplete("Daily Steps")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`Daily Steps` AS DOUBLE) IS NOT
        NULL THEN 1 ELSE 0 END", "Numeric Daily Steps", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` <= 15000 THEN 1 ELSE 0 END",
        "Steps <= 15000 (>=95% rows)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Daily Steps` = CAST(`Daily Steps` AS BIGINT)
        THEN 1 ELSE 0 END", "Integer Daily Steps (>=99% rows)", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR `Sleep Disorder`
        IN (''Insomnia'',''Sleep Apnea'') THEN 1 ELSE 0 END", "Sleep Disorder values
        are NULL or known", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IS NULL OR `Sleep Disorder`
        = trim(`Sleep Disorder`) THEN 1 ELSE 0 END", "Sleep Disorder has no leading/trailing
        whitespace (exact-match sensitive)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.satisfies("cast(`Heart Rate` as double) IS NOT NULL", "HeartRate_numeric",
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete("Heart Rate")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("cast(`Heart Rate` as double) >= 30 AND cast(`Heart
        Rate` as double) <= 220", "HeartRate_plausible_range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("cast(`Heart Rate` as double) IS NOT NULL AND floor(cast(`Heart
        Rate` as double)) = cast(`Heart Rate` as double)", "HeartRate_integer", lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CASE WHEN `Stress Level` >= 0 AND `Stress Level` <=
        10 THEN 1 ELSE 0 END'', ''Stress Level in [0,10]'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''CASE WHEN floor(`Stress Level`) = `Stress Level` THEN
        1 ELSE 0 END'', ''Stress Level integer'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete("Age")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN `Age` BETWEEN 0 AND 120 THEN 1 ELSE 0 END",
        "Age in realistic range", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN `Age` = FLOOR(`Age`) THEN 1 ELSE 0 END",
        "Age integer-valued", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration","Stress Level"]':
    code:
    - suggestion: '.satisfies("CASE WHEN CAST(`Quality of Sleep` AS DOUBLE) IS NOT
        NULL AND CAST(`Stress Level` AS DOUBLE) IS NOT NULL AND CAST(`Sleep Duration`
        AS DOUBLE) IS NOT NULL THEN 1 ELSE 0 END", "Numeric-parsable Quality/Stress/SleepDuration",
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(`Quality of Sleep` AS DOUBLE) BETWEEN
        1 AND 10 AND CAST(`Stress Level` AS DOUBLE) BETWEEN 1 AND 10 THEN 1 ELSE 0
        END", "Quality of Sleep and Stress Level within [1,10]", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN CAST(`Sleep Duration` AS DOUBLE) BETWEEN
        0.0 AND 24.0 THEN 1 ELSE 0 END", "Sleep Duration within realistic range [0,24]
        hours", lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN CAST(`Sleep Duration` AS DOUBLE) BETWEEN
        3.0 AND 12.0 THEN 1 ELSE 0 END", ">=95% of rows have Sleep Duration within
        normalization range [3,12]", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
