    - text: 'The ''sedentary_index'' is calculated as a weighted average of normalized
        ''Daily Steps'' and ''Physical Activity Level''. It is assumed that both ''Daily
        Steps'' and ''Physical Activity Level'' columns are numerical and non-null
        for this calculation to proceed without errors and produce a valid ''sedentary_index''
