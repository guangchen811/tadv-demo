        file: ''
      uid: ad723cb0-b916-4275-a875-e79a1d3e3696
    - text: 'The ''eligible'' column is assumed to be a boolean (or convertible to
        boolean) and directly controls the ''priority_score''. Specifically, if a
        record is marked as not ''eligible'' (False), its ''priority_score'' is expected
        to be 0.0. This implies a logical consistency between these two columns. We
        could represent this assumption as a Deequ constraint like this: .hasCustomConstraint(col("eligible")
        === true || col("priority_score") === 0.0, Some("ineligible_priority_is_zero"))'
