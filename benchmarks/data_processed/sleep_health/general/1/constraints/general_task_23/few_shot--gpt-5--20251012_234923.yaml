constraints:
  BMI Category:
    code:
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .containsPattern('Blood Pressure', r'^\s*(\d{2,3})\s*/\s*(\d{2,3})\s*$')
      - Invalid
    - - .isComplete('Blood Pressure')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - .hasDataType('Daily Steps', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Daily Steps'', lambda v: v <= 50000)'
      - Valid
    - - '.hasMin(''Daily Steps'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Daily Steps')
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .hasDataType('Heart Rate', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Heart Rate'', lambda v: v <= 220)'
      - Valid
    - - '.hasMin(''Heart Rate'', lambda v: v >= 30)'
      - Valid
    - - .isComplete('Heart Rate')
      - Valid
    assumptions: []
  Occupation:
    code:
    - - .isContainedIn('Occupation', ['Nurse', 'Software Engineer', 'Sales Representative',
        'Engineer', 'Lawyer', 'Teacher', 'Accountant', 'Salesperson', 'Scientist',
        'Doctor'])
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .hasDataType('Person ID', ConstrainableDataTypes.Integral)
      - Valid
    - - .isComplete('Person ID')
      - Valid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .hasDataType('Physical Activity Level', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Physical Activity Level'', lambda v: v <= 100)'
      - Valid
    - - '.hasMin(''Physical Activity Level'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Physical Activity Level')
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - .hasDataType('Quality of Sleep', ConstrainableDataTypes.Integral)
      - Valid
    - - '.hasMax(''Quality of Sleep'', lambda v: v <= 10)'
      - Valid
    - - '.hasMin(''Quality of Sleep'', lambda v: v >= 0)'
      - Valid
    - - .isComplete('Quality of Sleep')
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - .isContainedIn('Sleep Disorder', ['Insomnia', 'Sleep Apnea'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .hasDataType('Sleep Duration', ConstrainableDataTypes.Fractional)
      - Valid
    - - '.hasMax(''Sleep Duration'', lambda v: v <= 24.0)'
      - Valid
    - - '.hasMin(''Sleep Duration'', lambda v: v >= 0.0)'
      - Valid
    - - .isComplete('Sleep Duration')
      - Valid
    assumptions: []
