constraints:
  BMI Category:
    code:
    - - .isComplete('BMI Category').isContainedIn('BMI Category', ['Normal', 'Overweight',
        'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure').hasPattern('Blood Pressure', r'^\s*\d{2,3}\s*/\s*\d{2,3}\s*$')
      - Valid
    assumptions: []
  Daily Steps:
    code:
    - - '.isComplete(''Daily Steps'').hasMin(''Daily Steps'', lambda v: v >= 0)'
      - Valid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender').isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - '.isComplete(''Heart Rate'').hasMin(''Heart Rate'', lambda v: v >= 30).hasMax(''Heart
        Rate'', lambda v: v <= 220)'
      - Valid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - '.isComplete(''Physical Activity Level'').hasMin(''Physical Activity Level'',
        lambda v: v >= 0).hasMax(''Physical Activity Level'', lambda v: v <= 100)'
      - Valid
    assumptions: []
  Quality of Sleep:
    code:
    - - '.isComplete(''Quality of Sleep'').hasMin(''Quality of Sleep'', lambda v:
        v >= 0).hasMax(''Quality of Sleep'', lambda v: v <= 10)'
      - Valid
    assumptions: []
  Sleep Disorder:
    code:
    - - '.hasCompleteness(''Sleep Disorder'', lambda c: c >= 0.4)'
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - '.isComplete(''Sleep Duration'').hasMin(''Sleep Duration'', lambda v: v >=
        0.0).hasMax(''Sleep Duration'', lambda v: v <= 24.0)'
      - Valid
    assumptions: []
  bp_dia:
    code:
    - - '.isComplete(''bp_dia'').hasMin(''bp_dia'', lambda v: v >= 0).hasMax(''bp_dia'',
        lambda v: v <= 200)'
      - Invalid
    assumptions: []
  bp_stage:
    code:
    - - .isComplete('bp_stage').isContainedIn('bp_stage', ['normal', 'elevated', 'stage1',
        'stage2', 'crisis'])
      - Invalid
    assumptions: []
  bp_sys:
    code:
    - - '.isComplete(''bp_sys'').hasMin(''bp_sys'', lambda v: v >= 0).hasMax(''bp_sys'',
        lambda v: v <= 300)'
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isUnique('id')
      - Valid
    assumptions: []
  sleep_wellness_score:
    code:
    - - '.hasMin(''sleep_wellness_score'', lambda v: v >= 0.0).hasMax(''sleep_wellness_score'',
        lambda v: v <= 100.0)'
      - Invalid
    assumptions: []
  triage_level:
    code:
    - - .isComplete('triage_level').isContainedIn('triage_level', ['High', 'Medium',
        'None'])
      - Invalid
    assumptions: []
