constraints:
  Age:
    code:
    - - .isComplete('Age')
      - Valid
    - - .isDataType('Age', ConstrainableDataTypes.Long)
      - Invalid
    - - .isNonNegative('Age')
      - Valid
    assumptions: []
  Apnea Risk Score:
    code:
    - - .isLessThanOrEqualTo('Apnea Risk Score', 1.0)
      - Invalid
    - - .isNonNegative('Apnea Risk Score')
      - Invalid
    assumptions: []
  BMI Category:
    code:
    - - .isComplete('BMI Category')
      - Valid
    - - .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese', 'Normal Weight'])
      - Valid
    assumptions: []
  Blood Pressure:
    code:
    - - .isComplete('Blood Pressure')
      - Valid
    - - .isDataType('Blood Pressure', ConstrainableDataTypes.String)
      - Invalid
    - - .matchesPattern('Blood Pressure', r'\d{2,3}/\d{2,3}')
      - Invalid
    assumptions: []
  Daily Steps:
    code:
    - - .isComplete('Daily Steps')
      - Valid
    - - .isDataType('Daily Steps', ConstrainableDataTypes.Long)
      - Invalid
    - - .isNonNegative('Daily Steps')
      - Invalid
    assumptions: []
  Diastolic:
    code:
    - - .isDataType('Diastolic', ConstrainableDataTypes.Long)
      - Invalid
    - - .isGreaterThanOrEqualTo('Diastolic', 50.0)
      - Invalid
    - - .isLessThanOrEqualTo('Diastolic', 120.0)
      - Invalid
    assumptions: []
  Gender:
    code:
    - - .isComplete('Gender')
      - Valid
    - - .isContainedIn('Gender', ['Male', 'Female'])
      - Valid
    assumptions: []
  Heart Rate:
    code:
    - - .isComplete('Heart Rate')
      - Valid
    - - .isDataType('Heart Rate', ConstrainableDataTypes.Long)
      - Invalid
    - - .isNonNegative('Heart Rate')
      - Invalid
    assumptions: []
  Insomnia Risk Score:
    code:
    - - .isLessThanOrEqualTo('Insomnia Risk Score', 1.0)
      - Invalid
    - - .isNonNegative('Insomnia Risk Score')
      - Invalid
    assumptions: []
  Occupation:
    code:
    - - .hasNumberOfDistinctValues('Occupation', ConstraintComparison.GreaterThanOrEqualTo,
        10)
      - Invalid
    - - .isComplete('Occupation')
      - Valid
    - - .isDataType('Occupation', ConstrainableDataTypes.String)
      - Invalid
    assumptions: []
  Person ID:
    code:
    - - .isComplete('Person ID')
      - Valid
    - - .isDataType('Person ID', ConstrainableDataTypes.Long)
      - Invalid
    - - .isUnique('Person ID')
      - Valid
    assumptions: []
  Physical Activity Level:
    code:
    - - .isComplete('Physical Activity Level')
      - Valid
    - - .isDataType('Physical Activity Level', ConstrainableDataTypes.Long)
      - Invalid
    - - .isNonNegative('Physical Activity Level')
      - Invalid
    assumptions: []
  Quality of Sleep:
    code:
    - - .isComplete('Quality of Sleep')
      - Valid
    - - .isDataType('Quality of Sleep', ConstrainableDataTypes.Long)
      - Invalid
    - - .isGreaterThanOrEqualTo('Quality of Sleep', 4.0)
      - Invalid
    - - .isLessThanOrEqualTo('Quality of Sleep', 9.0)
      - Invalid
    assumptions: []
  Sleep Disorder:
    code:
    - - .hasCompleteness('Sleep Disorder', ConstraintComparison.GreaterThanOrEqualTo,
        0.4)
      - Invalid
    - - .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia', 'NullValue'])
      - Valid
    assumptions: []
  Sleep Duration:
    code:
    - - .isComplete('Sleep Duration')
      - Valid
    - - .isDataType('Sleep Duration', ConstrainableDataTypes.Double)
      - Invalid
    - - .isNonNegative('Sleep Duration')
      - Invalid
    assumptions: []
  Sleep Health Score:
    code:
    - - .isLessThanOrEqualTo('Sleep Health Score', 100.0)
      - Invalid
    - - .isNonNegative('Sleep Health Score')
      - Invalid
    assumptions: []
  Stress Level:
    code:
    - - .isComplete('Stress Level')
      - Valid
    - - .isDataType('Stress Level', ConstrainableDataTypes.Long)
      - Invalid
    - - .isGreaterThanOrEqualTo('Stress Level', 3.0)
      - Invalid
    - - .isLessThanOrEqualTo('Stress Level', 8.0)
      - Invalid
    assumptions: []
  Systolic:
    code:
    - - .isDataType('Systolic', ConstrainableDataTypes.Long)
      - Invalid
    - - .isGreaterThanOrEqualTo('Systolic', 90.0)
      - Invalid
    - - .isLessThanOrEqualTo('Systolic', 200.0)
      - Invalid
    - - .satisfies('Systolic > Diastolic', 'Systolic_greater_than_Diastolic', ConstraintComparison.GreaterThanOrEqualTo,
        0.95)
      - Invalid
    assumptions: []
  id:
    code:
    - - .isComplete('id')
      - Valid
    - - .isDataType('id', ConstrainableDataTypes.Long)
      - Invalid
    - - .isUnique('id')
      - Valid
    assumptions: []
