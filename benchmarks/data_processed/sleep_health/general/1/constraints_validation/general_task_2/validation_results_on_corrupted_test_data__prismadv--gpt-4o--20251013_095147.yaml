results:
  Physical Activity Level:
    code:
    - suggestion: '.hasCompleteness(''Physical Activity Level'', lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.hasCompleteness(''Quality of Sleep'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Quality of Sleep` >= 0 AND `Quality of Sleep` <=
        10'', ''Valid Quality of Sleep Range'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  BMI Category:
    code:
    - suggestion: .isContainedIn('BMI Category', ['Overweight', 'Normal', 'Obese',
        'Normal Weight'])
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .isComplete('Blood Pressure')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CAST(SPLIT(`Blood Pressure`, "/")[0] AS INT) BETWEEN
        40 AND 200 AND CAST(SPLIT(`Blood Pressure`, "/")[1] AS INT) BETWEEN 40 AND
        120', 'Valid Blood Pressure Range')
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Daily Steps` >= 0', 'Daily Steps Non-Negative')
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''`Daily Steps` >= 0'', ''Daily Steps
        Non-Negative'')'' failed on data sample: Value: 0.98 does not meet the constraint
        requirement!'
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies(''CASE WHEN `Sleep Disorder` IS NOT NULL THEN 1 ELSE
        0 END'', ''Null Sleep Disorder Values'', lambda x: x >= 0.415)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies(''CASE WHEN `Sleep Disorder` IS NOT
        NULL THEN 1 ELSE 0 END'', ''Null Sleep Disorder Values'', lambda x: x >= 0.415)''
        failed on data sample: Value: 0.41333333333333333 does not meet the constraint
        requirement!'
      level: undefined
    - suggestion: '.satisfies("CASE WHEN `Sleep Disorder` IN (''Sleep Apnea'', ''Insomnia'')
        OR `Sleep Disorder` IS NULL THEN 1 ELSE 0 END", ''Valid Sleep Disorder Values'',
        lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: undefined
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: undefined
    - suggestion: .satisfies('`Stress Level` >= 3 AND `Stress Level` <= 8', 'Stress
        Level Range')
      status: true
      reason_if_failed: ''
      level: undefined
  '["BMI Category","Blood Pressure"]':
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Valid Blood
        Pressure Format")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("`BMI Category` IN ('Overweight', 'Normal', 'Obese',
        'Normal Weight')", "Valid BMI Category")
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        corr: abs(corr) > 0.5)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation(''Daily Steps'', ''Physical
        Activity Level'', lambda corr: abs(corr) > 0.5)'' failed on data sample: Value:
        0.32654084020934704 does not meet the constraint requirement!'
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: .satisfies('`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL', 'Sleep Duration and Quality of Sleep Completeness')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Stress Level` IS NOT NULL AND `Quality of Sleep` IS
        NOT NULL', 'Stress Level and Quality of Sleep Completeness')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Stress Level` IS NOT NULL AND `Sleep Duration` IS NOT
        NULL', 'Stress Level and Sleep Duration Completeness')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Daily Steps` IS NOT NULL AND `Physical Activity Level`
        IS NOT NULL', 'Daily Steps and Physical Activity Level Completeness')
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
