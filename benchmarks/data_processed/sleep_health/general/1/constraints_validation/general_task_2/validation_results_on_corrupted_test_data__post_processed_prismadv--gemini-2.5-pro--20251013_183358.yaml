results:
  Physical Activity Level:
    code:
    - suggestion: '.hasCorrelation(''Physical Activity Level'', ''Daily Steps'', lambda
        c: abs(c) > 0.3)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Physical Activity Level'', lambda x: x < 150)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("`Quality of Sleep` IS NULL OR (`Quality of Sleep` >=
        1 AND `Quality of Sleep` <= 10)", "QualityOfSleep_range_check", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Quality of Sleep'', ''Sleep Duration'', lambda
        corr: corr > 0.1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Quality of Sleep'', ''Stress Level'', lambda
        corr: corr < -0.1)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.isContainedIn(''BMI Category'', [''Normal'', ''Normal Weight'',
        ''Overweight'', ''Obese''], assertion=lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern("Blood Pressure", "^\\d{2,3}/\\d{2,3}$", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) > 0
        AND CAST(split(`Blood Pressure`, ''/'')[1] AS INT) > 0", "Blood Pressure components
        are positive", assertion=lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("`Sleep Duration` IS NOT NULL", "at_least_one_valid_sleep_duration_entry",
        lambda n: n >= 1)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isNonNegative('`Daily Steps`')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''`Daily Steps`'')'' failed on
        data sample: Value: 0.98 does not meet the constraint requirement!'
      level: error
  Sleep Disorder:
    code:
    - suggestion: .isContainedIn('Sleep Disorder', ['Sleep Apnea', 'Insomnia'])
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.satisfies("`Heart Rate` >= 40 AND `Heart Rate` <= 120", "Heart
        Rate within physiological range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies("`Stress Level` IS NULL OR (`Stress Level` >= 3 AND
        `Stress Level` <= 8)", "StressLevel_in_range_3_to_8", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["BMI Category","Blood Pressure","Daily Steps","Heart Rate","Person ID","Physical
    Activity Level","Quality of Sleep","Sleep Disorder","Sleep Duration","Stress Level"]'
  : code:
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda corr:
        corr >= 0.3)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Stress Level", "Quality of Sleep", lambda corr:
        corr <= -0.3)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Stress Level", "Sleep Duration", lambda corr:
        corr <= -0.3)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(split(`Blood Pressure`, ''/'')[0] AS INT) > CAST(split(`Blood
        Pressure`, ''/'')[1] AS INT)", "SystolicGreaterThanDiastolic", lambda n: n
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        corr: corr >= 0.5)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation("Daily Steps", "Physical Activity
        Level", lambda corr: corr >= 0.5)'' failed on data sample: Value: 0.32654084020934704
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("(`Daily Steps` < 7000 AND `Physical Activity Level`
        < 60) OR `Daily Steps` >= 7000", "LowStepsCooccurWithLowPAL", lambda n: n
        >= 0.9)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        x: x > 0.4)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation("Daily Steps", "Physical Activity
        Level", lambda x: x > 0.4)'' failed on data sample: Value: 0.32654084020934704
        does not meet the constraint requirement!'
      level: warning
    - suggestion: '.satisfies("`Daily Steps` < 7000 AND `Physical Activity Level`
        < 60", "Assert presence of moderate risk activity pattern", lambda x: x >
        0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda c:
        c > 0.2)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`Sleep Duration` IS NOT NULL AND `Quality of Sleep`
        IS NOT NULL'', ''joint_completeness_check'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Stress Level"]':
    code:
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda x:
        x >= 0.5)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Stress Level", "Quality of Sleep", lambda x: x
        <= -0.3)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Stress Level", "Sleep Duration", lambda x: x <=
        -0.2)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Sleep Duration","Stress Level"]':
    code:
    - suggestion: '.hasCorrelation(''Stress Level'', ''Sleep Duration'', lambda corr:
        -0.85 < corr < 0)'
      status: true
      reason_if_failed: ''
      level: warning
