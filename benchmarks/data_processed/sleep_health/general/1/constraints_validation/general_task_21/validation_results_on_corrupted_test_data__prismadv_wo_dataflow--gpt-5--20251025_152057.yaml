results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL
        AND NOT isnan(CAST(`Physical Activity Level` AS DOUBLE))'', ''PAL numeric
        parseable'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasStandardDeviation(''Physical Activity Level'', lambda s: s
        > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin(''Physical Activity Level'', lambda m: m >= 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Physical Activity Level'', lambda m: m <= 100)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''cast(`Quality of Sleep` as double) = floor(cast(`Quality
        of Sleep` as double))'', ''QoS integer-coded'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''cast(`Quality of Sleep` as double) >= 1 AND cast(`Quality
        of Sleep` as double) <= 10'', ''QoS within [1,10]'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.isContainedIn(''BMI Category'', [''Overweight'', ''Obese'', ''Normal'',
        ''Normal Weight''], lambda f: f >= 0.98)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''BMI Category'', lambda c: c >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''trim(`BMI Category`) = `BMI Category`'', ''BMI Category
        trimmed (no leading/trailing spaces)'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''`BMI Category` = initcap(trim(`BMI Category`))'',
        ''BMI Category capitalization (Title Case)'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasCompleteness(''Blood Pressure'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasPattern(''Blood Pressure'', ''^\\s*\\d+\\s*/\\s*\\d+\\s*$'',
        lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: '.hasCompleteness(''Person ID'', lambda v: v >= 0.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCompleteness(''Person ID'', lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: '.satisfies("cast(`Sleep Duration` AS DOUBLE) IS NOT NULL", "Sleep
        Duration parseable (>=95%)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("cast(`Sleep Duration` AS DOUBLE) >= 0 AND cast(`Sleep
        Duration` AS DOUBLE) <= 24", "Sleep Duration range [0,24] (>=99%)", lambda
        x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CASE WHEN cast(`Quality of Sleep` AS DOUBLE) IS NOT
        NULL THEN cast(`Sleep Duration` AS DOUBLE) IS NOT NULL ELSE true END", "Sleep
        Duration present when QoS numeric (>=95%)", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  Daily Steps:
    code:
    - suggestion: '.satisfies("CAST(`Daily Steps` AS DOUBLE) IS NOT NULL", "Daily
        Steps numeric and non-null >=99%", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasMin("Daily Steps", lambda m: m >= 0)'
      status: false
      reason_if_failed: 'Constraint ''.hasMin("Daily Steps", lambda m: m >= 0)'' failed
        on data sample: Value: -2713.1554863876245 does not meet the constraint requirement!'
      level: warning
    - suggestion: '.hasMax("Daily Steps", lambda m: m <= 50000)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(`Daily Steps` AS DOUBLE) = CAST(CAST(`Daily Steps`
        AS DOUBLE) AS BIGINT)", "Daily Steps whole-number-like >=99%", lambda x: x
        >= 0.99)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("CAST(`Daily Steps` AS DOUBLE) =
        CAST(CAST(`Daily Steps` AS DOUBLE) AS BIGINT)", "Daily Steps whole-number-like
        >=99%", lambda x: x >= 0.99)'' failed on data sample: Value: 0.7 does not
        meet the constraint requirement!'
      level: warning
    - suggestion: '.hasStandardDeviation("Daily Steps", lambda s: s > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.isContainedIn("Sleep Disorder", ["Insomnia", "Sleep Apnea"], lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Stress Level:
    code:
    - suggestion: '.satisfies(''cast(`Stress Level` as double) is not null'', ''Stress
        Level numeric and non-null'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''cast(`Stress Level` as double) >= 0 AND cast(`Stress
        Level` as double) <= 10'', ''Stress Level in [0,10]'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies(''cast(`Stress Level` as double) = floor(cast(`Stress
        Level` as double))'', ''Stress Level integer-like'', lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
  '["BMI Category","Sleep Disorder","Stress Level"]':
    code:
    - suggestion: '.satisfies("NOT (`Sleep Disorder` IN (''Insomnia'',''Sleep Apnea''))
        OR (CAST(`Stress Level` AS DOUBLE) IS NOT NULL AND CAST(`Stress Level` AS
        DOUBLE) >= 0 AND CAST(`Stress Level` AS DOUBLE) <= 10)", "Labeled rows must
        have valid 0-10 Stress Level", lambda v: v == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Sleep Disorder` = ''Insomnia'') AND (CAST(`Stress
        Level` AS DOUBLE) IS NOT NULL AND CAST(`Stress Level` AS DOUBLE) >= 0 AND
        CAST(`Stress Level` AS DOUBLE) <= 10)", "At least one Insomnia row with valid
        0-10 Stress Level", lambda v: v > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("(`Sleep Disorder` = ''Sleep Apnea'') AND (CAST(`Stress
        Level` AS DOUBLE) IS NOT NULL AND CAST(`Stress Level` AS DOUBLE) >= 0 AND
        CAST(`Stress Level` AS DOUBLE) <= 10)", "At least one Sleep Apnea row with
        valid 0-10 Stress Level", lambda v: v > 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
