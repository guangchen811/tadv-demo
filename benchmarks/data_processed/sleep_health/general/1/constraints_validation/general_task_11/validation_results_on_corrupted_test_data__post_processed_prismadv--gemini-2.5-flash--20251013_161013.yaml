results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete("Physical Activity Level")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative("`Physical Activity Level`", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.isNonNegative(''`Quality of Sleep`'', assertion=lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasMax(''Quality of Sleep'', lambda x: x <= 10)'
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: '.satisfies("lower(CAST(COALESCE(`BMI Category`, '''') AS STRING))
        IN (''normal'', ''normal weight'', ''overweight'', ''obese'')", "Expected
        BMI Categories Coverage", assertion=lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Blood Pressure:
    code:
    - suggestion: '.hasPattern("Blood Pressure", "^\\d+/\\d+$", assertion=lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', 1) AS
        INT) BETWEEN 50 AND 250", "Systolic Blood Pressure in plausible range", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', -1) AS
        INT) BETWEEN 30 AND 150", "Diastolic Blood Pressure in plausible range", assertion=lambda
        x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("`Sleep Duration` >= 0 AND `Sleep Duration` <= 24",
        "Plausible Sleep Duration", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('`Daily Steps`')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''`Daily Steps`'')'' failed on
        data sample: Value: 0.98 does not meet the constraint requirement!'
      level: error
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: .isComplete("Stress Level")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Stress Level` >= 3 AND `Stress Level` <= 10", "Stress
        Level within expected range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: '.hasCompleteness(''Age'', lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  ? '["BMI Category","Daily Steps","Diastolic","Physical Activity Level","Quality
    of Sleep","Sleep Duration","Stress Level","Systolic"]'
  : code:
    - suggestion: '.satisfies("CAST(SPLIT(TRIM(regexp_replace(`Blood Pressure`, ''[^0-9/]'',
        '''')), ''/'')[0] AS INT) >= 0 AND CAST(SPLIT(TRIM(regexp_replace(`Blood Pressure`,
        ''[^0-9/]'', '''')), ''/'')[1] AS INT) >= 0 AND CAST(SPLIT(TRIM(regexp_replace(`Blood
        Pressure`, ''[^0-9/]'', '''')), ''/'')[0] AS INT) BETWEEN 60 AND 200 AND CAST(SPLIT(TRIM(regexp_replace(`Blood
        Pressure`, ''[^0-9/]'', '''')), ''/'')[1] AS INT) BETWEEN 40 AND 130 AND CAST(SPLIT(TRIM(regexp_replace(`Blood
        Pressure`, ''[^0-9/]'', '''')), ''/'')[0] AS INT) >= CAST(SPLIT(TRIM(regexp_replace(`Blood
        Pressure`, ''[^0-9/]'', '''')), ''/'')[1] AS INT)", "Valid Blood Pressure
        Readings", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("LOWER(`BMI Category`) IN (''normal'', ''normal weight'',
        ''overweight'', ''obese'')", "Valid BMI Category Values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.hasCorrelation("Physical Activity Level", "Daily Steps", lambda
        x: x > 0.7)'
      status: false
      reason_if_failed: 'Constraint ''.hasCorrelation("Physical Activity Level", "Daily
        Steps", lambda x: x > 0.7)'' failed on data sample: Value: 0.3265408402093471
        does not meet the constraint requirement!'
      level: error
  '["Diastolic","Systolic"]':
    code:
    - suggestion: '.satisfies("INSTR(`Blood Pressure`, ''/'') > 0 AND CAST(CAST(SUBSTRING_INDEX(`Blood
        Pressure`, ''/'', 1) AS INT) AS STRING) = SUBSTRING_INDEX(`Blood Pressure`,
        ''/'', 1) AND CAST(CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', -1) AS INT)
        AS STRING) = SUBSTRING_INDEX(`Blood Pressure`, ''/'', -1)", "Derived Systolic
        and Diastolic match original Blood Pressure string parts", lambda x: x ==
        1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: '.isContainedIn(''Gender'', [''Male'', ''Female''], lambda x: x
        == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
