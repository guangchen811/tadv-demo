results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('`Physical Activity Level`')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies(''`Physical Activity Level` <= 200'', ''Physical Activity
        Level in reasonable range'', lambda x: x == 1)'
      status: true
      reason_if_failed: ''
      level: warning
  Quality of Sleep:
    code:
    - suggestion: .isComplete('Quality of Sleep')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Quality of Sleep', ['4', '5', '6', '7', '8', '9'])
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: .satisfies('`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10',
        'Quality of Sleep in [0,10]')
      status: true
      reason_if_failed: ''
      level: warning
  BMI Category:
    code:
    - suggestion: .isComplete('BMI Category')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("lower(`BMI Category`) IN ('normal', 'normal weight',
        'overweight', 'obese')", "Valid BMI Category")
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]{2,3}/[0-9]{2,3}$'", "Blood
        Pressure format is Systolic/Diastolic, both numeric")
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies("CAST(split(`Blood Pressure`, '/')[0] AS int) BETWEEN
        70 AND 250 AND CAST(split(`Blood Pressure`, '/')[1] AS int) BETWEEN 40 AND
        150", "Blood Pressure physiologically plausible ranges")
      status: true
      reason_if_failed: ''
      level: error
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('CAST(`Person ID` AS INT) IS NOT NULL', 'Person ID Integral')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasUniqueness([''Person ID''], lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Duration:
    code:
    - suggestion: .isComplete('Sleep Duration')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Sleep Duration` >= 4.0 AND `Sleep Duration` <= 12.0',
        'Sleep Duration plausible range')
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: .isComplete('Daily Steps')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isNonNegative('`Daily Steps`')
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative(''`Daily Steps`'')'' failed on
        data sample: Value: 0.98 does not meet the constraint requirement!'
      level: error
  Heart Rate:
    code:
    - suggestion: .isComplete('Heart Rate')
      status: true
      reason_if_failed: ''
      level: error
  Stress Level:
    code:
    - suggestion: .isComplete('Stress Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .satisfies('`Stress Level` >= 3 AND `Stress Level` <= 8', 'Stress
        Level in valid range [3,8]')
      status: true
      reason_if_failed: ''
      level: warning
  Age:
    code:
    - suggestion: .isComplete('Age')
      status: true
      reason_if_failed: ''
      level: error
  '["BMI Category","risk_score"]':
    code:
    - suggestion: .satisfies('LOWER(`BMI Category`) IN ("normal", "normal weight",
        "overweight", "obese")', 'BMI Category valid values')
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","Diastolic","Systolic"]':
    code:
    - suggestion: .satisfies("`Blood Pressure` RLIKE '^[0-9]+/[0-9]+$'", "Blood Pressure
        format is 'Systolic/Diastolic' with both numeric")
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Physical Activity Level","risk_score"]':
    code:
    - suggestion: .satisfies('CAST(`Physical Activity Level` AS DOUBLE) IS NOT NULL
        AND CAST(`Daily Steps` AS DOUBLE) IS NOT NULL', 'Physical Activity Level and
        Daily Steps must be numeric and non-null')
      status: true
      reason_if_failed: ''
      level: error
  Gender:
    code:
    - suggestion: .isComplete('Gender')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isContainedIn('Gender', ['Male', 'Female'])
      status: true
      reason_if_failed: ''
      level: error
  '["Quality of Sleep","risk_score"]':
    code:
    - suggestion: .satisfies('cast(`Sleep Duration` as double) IS NOT NULL AND cast(`Quality
        of Sleep` as double) IS NOT NULL AND cast(`Physical Activity Level` as double)
        IS NOT NULL AND cast(`Stress Level` as double) IS NOT NULL AND cast(`Daily
        Steps` as double) IS NOT NULL', 'Numeric columns must be parseable')
      status: true
      reason_if_failed: ''
      level: error
  '["Stress Level","risk_score"]':
    code:
    - suggestion: .satisfies('`Stress Level` >= 3 AND `Stress Level` <= 8', 'Stress
        Level range [3,8]')
      status: true
      reason_if_failed: ''
      level: error
