results:
  Physical Activity Level:
    code:
    - suggestion: .isComplete('Physical Activity Level')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative(''`Physical Activity Level`'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Quality of Sleep:
    code:
    - suggestion: '.satisfies("`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10",
        "Quality of Sleep Value Range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Blood Pressure:
    code:
    - suggestion: '.hasPattern(''Blood Pressure'', r''^\s*(\d{2,3})\s*/\s*(\d{2,3})\s*$'',
        lambda x: x >= 0.90)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCompleteness(''Blood Pressure'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Person ID:
    code:
    - suggestion: .isComplete('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: .isUnique('Person ID')
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative(''`Person ID`'', lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Sleep Duration:
    code:
    - suggestion: '.satisfies("`Blood Pressure` IS NULL OR (LENGTH(TRIM(`Blood Pressure`))
        > 0 AND `Blood Pressure` LIKE ''%/%'' AND SIZE(SPLIT(`Blood Pressure`, ''/''))
        = 2 AND TRY_CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS DOUBLE) IS NOT NULL
        AND TRY_CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS DOUBLE) IS NOT NULL)", "Blood
        Pressure successfully parsed", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` < 6.0", "Has short sleep records",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Duration` >= 8.0", "Has long sleep records",
        lambda x: x > 0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (''Insomnia'',
        ''Sleep Apnea'')", "Valid Sleep Disorder values", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  Daily Steps:
    code:
    - suggestion: '.hasCompleteness("Daily Steps", lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.isNonNegative("`Daily Steps`", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.isNonNegative("`Daily Steps`", lambda x: x
        == 1.0)'' failed on data sample: Value: 0.98 does not meet the constraint
        requirement!'
      level: error
    - suggestion: '.satisfies("`Daily Steps` <= 30000", "Daily Steps upper bound check",
        lambda x: x >= 0.99)'
      status: true
      reason_if_failed: ''
      level: warning
  Sleep Disorder:
    code:
    - suggestion: '.satisfies("`Sleep Disorder` IS NULL OR `Sleep Disorder` IN (''Insomnia'',
        ''Sleep Apnea'')", "Valid Sleep Disorder Categories", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda c:
        c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        c: c >= 0.0)'
      status: true
      reason_if_failed: ''
      level: warning
  Heart Rate:
    code:
    - suggestion: '.satisfies("`Blood Pressure` IS NOT NULL AND SIZE(SPLIT(`Blood
        Pressure`, ''/'')) = 2 AND TRY_CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT)
        IS NOT NULL AND TRY_CAST(SPLIT(`Blood Pressure`, ''/'')[1] AS INT) IS NOT
        NULL AND CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) >= CAST(SPLIT(`Blood
        Pressure`, ''/'')[1] AS INT)", "bp_numeric_and_order_validity", lambda x:
        x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.hasCorrelation(''Sleep Duration'', ''Quality of Sleep'', lambda
        x: x >= 0.3)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        x: x >= 0.3)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Blood Pressure","bp_dia","bp_sys"]':
    code:
    - suggestion: '.satisfies("CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', 1) AS
        INT) > 0 AND CAST(SUBSTRING_INDEX(`Blood Pressure`, ''/'', -1) AS INT) > 0",
        "Positive Blood Pressure Readings", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
  '["Daily Steps","Heart Rate","Physical Activity Level","Quality of Sleep","Sleep Disorder","Sleep Duration","bp_stage"]':
    code:
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda x:
        x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.hasCorrelation("Daily Steps", "Physical Activity Level", lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Daily Steps","Physical Activity Level"]':
    code:
    - suggestion: '.satisfies("`Daily Steps` >= 0 AND `Physical Activity Level` >=
        0", "Non-negative Activity Metrics", lambda x: x == 1.0)'
      status: false
      reason_if_failed: 'Constraint ''.satisfies("`Daily Steps` >= 0 AND `Physical
        Activity Level` >= 0", "Non-negative Activity Metrics", lambda x: x == 1.0)''
        failed on data sample: Value: 0.98 does not meet the constraint requirement!'
      level: error
    - suggestion: '.hasCorrelation(''Daily Steps'', ''Physical Activity Level'', lambda
        x: x > 0)'
      status: true
      reason_if_failed: ''
      level: warning
  '["Quality of Sleep","Sleep Duration"]':
    code:
    - suggestion: '.hasCorrelation("Sleep Duration", "Quality of Sleep", lambda x:
        x >= 0.3)'
      status: true
      reason_if_failed: ''
      level: error
    - suggestion: '.satisfies("`Quality of Sleep` >= 0 AND `Quality of Sleep` <= 10",
        "Quality of Sleep Range Check", lambda x: x >= 0.95)'
      status: true
      reason_if_failed: ''
      level: warning
    - suggestion: '.satisfies("`Sleep Duration` >= 5.0 AND `Sleep Duration` <= 8.0",
        "Sleep Duration Range Check", lambda x: x >= 0.80)'
      status: true
      reason_if_failed: ''
      level: warning
  '["bp_dia","bp_stage","bp_sys"]':
    code:
    - suggestion: '.satisfies("TRY_CAST(SPLIT(TRIM(`Blood Pressure`), ''/'')[0] AS
        INT) IS NOT NULL AND TRY_CAST(SPLIT(TRIM(`Blood Pressure`), ''/'')[1] AS INT)
        IS NOT NULL AND TRY_CAST(SPLIT(TRIM(`Blood Pressure`), ''/'')[0] AS INT) <
        TRY_CAST(SPLIT(TRIM(`Blood Pressure`), ''/'')[1] AS INT)", "Systolic Less
        Than Diastolic (Violation)", lambda x: x == 0)'
      status: true
      reason_if_failed: ''
      level: error
  '["bp_dia","bp_sys"]':
    code:
    - suggestion: '.satisfies("CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) >= 10
        AND CAST(SPLIT(`Blood Pressure`, ''/'')[0] AS INT) <= 300 AND CAST(SPLIT(`Blood
        Pressure`, ''/'')[1] AS INT) >= 10 AND CAST(SPLIT(`Blood Pressure`, ''/'')[1]
        AS INT) <= 200", "BP_realistic_range", lambda x: x == 1.0)'
      status: true
      reason_if_failed: ''
      level: error
