constraints:
- .isComplete('City')
- .satisfies("trim(City) <> ''", 'city_not_blank')
- .satisfies("City = trim(City)", 'city_trimmed')
- .satisfies("City IN ('Ahmedabad','Kolkata','Mumbai','Navi Mumbai','Bengaluru','Dharamshala')",
  'city_allowed_values')
- .satisfies("City != 'Bangalore'", 'no_bangalore_after_standardization')
- .satisfies("City != 'Dharamsala'", 'no_dharamsala_after_standardization')
- .satisfies("City RLIKE '^[A-Za-z ]+$'", 'city_alpha_space')
