constraints:
  City:
    code:
    - suggestion: '.satisfies("CASE WHEN `City` IS NOT NULL THEN 1 ELSE 0 END", "Non-null
        City", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `City` IN (''Ahmedabad'',''Kolkata'',''Navi
        Mumbai'',''Mumbai'',''Bengaluru'',''Dharamshala'') THEN 1 ELSE 0 END", "City
        in canonical set after normalization", lambda x: x >= 0.95)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `City` IN (''Ahmedabad'',''Kolkata'',''Navi
        Mumbai'',''Mumbai'',''Bengaluru'',''Dharamshala'',''Bangalore'',''Dharamsala'')
        THEN 1 ELSE 0 END", "City in allowed input set (includes legacy spellings)",
        lambda x: x >= 0.99)'
      validity: null
      level: warning
    - suggestion: '.satisfies("CASE WHEN `City` IN (''bangalore'',''dharamsala'')
        THEN 1 ELSE 0 END", "Lowercase legacy spellings absent (pipeline is case-sensitive)",
        lambda x: x == 0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''City'' column must not contain nulls (completeness = 1.0). We expect
        every row to have a City value. Example validation (Deequ/GX style): .satisfies("CASE
        WHEN `City` IS NOT NULL THEN 1 ELSE 0 END", "Non-null City", lambda x: x ==
        1)'
      sources:
      - start_line: 1
        end_line: 23
        file: ''
    - text: 'The ''City'' column is a string/categorical field drawn from a small,
        controlled set of city names. Based on dataset characteristics and the normalization
        in code, expected values include at least: ''Ahmedabad'', ''Kolkata'', ''Navi
        Mumbai'', ''Mumbai'', plus canonical forms ''Bengaluru'' and ''Dharamshala''
        (and their legacy spellings ''Bangalore'' and ''Dharamsala'' which the code
        normalizes). Example validation: .satisfies("CASE WHEN `City` IN (''Ahmedabad'',''Kolkata'',''Navi
        Mumbai'',''Mumbai'',''Bengaluru'',''Bengaluru'',''Dharamshala'',''Dharamsala'',''Bangalore'')
        THEN 1 ELSE 0 END", "City in known set", lambda x: x >= 0.95)'
      sources:
      - start_line: 1
        end_line: 23
        file: ''
    - text: 'The input may contain legacy/alternate spellings ''Bangalore'' and ''Dharamsala''
        which the downstream code expects to normalize to ''Bengaluru'' and ''Dharamshala''
        respectively. Therefore these legacy spellings are considered valid input
        and should be allowed (and will be replaced). Example validation to ensure
        these mappings are present/handled: check fraction of rows where City IN (''Bangalore'',''Dharamsala'')
        is >= 0 or ensure post-normalization City IN canonical set.'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
    - text: 'The code uses exact string replacement (case-sensitive). Thus the input
        is expected to use the same capitalization/spelling for legacy names (e.g.,
        ''Bangalore'', not ''bangalore'' or ''BANGALORE''). If the data contains different
        casing/variants, the current replacement will not normalize them. Example
        validation: .satisfies("CASE WHEN `City` IN (''bangalore'',''bangalore '',''bengaluru''.lower())
        THEN 1 ELSE 0 END", "Lowercase legacy names present", lambda x: x == 0) or
        alternatively assert that LOWER(`City`) does not contain legacy values unless
        the pipeline will lower-case before replacement.'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
