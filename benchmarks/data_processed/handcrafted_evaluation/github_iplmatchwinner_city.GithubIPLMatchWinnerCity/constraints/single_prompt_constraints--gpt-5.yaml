constraints:
- .isComplete('City')
- .hasMinLength('City', 3)
- '.hasPattern(''City'', r''^(?!.*\bBangalore\b)(?!.*\bDharamsala\b).*$'', lambda
  v: v == 1.0, matchFull=True)'
- '.hasPattern(''City'', r''^\S(?:.*\S)?$'', lambda v: v == 1.0, matchFull=True)'
- '.hasPattern(''City'', r''^[A-Za-z .-]+$'', lambda v: v == 1.0, matchFull=True)'
