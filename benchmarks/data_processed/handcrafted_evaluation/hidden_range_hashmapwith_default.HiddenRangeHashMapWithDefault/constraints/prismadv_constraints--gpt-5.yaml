constraints:
  booking_id:
    code:
    - suggestion: '.satisfies("(`status` IS NULL OR `status` = ''NO_ACTION'') OR `booking_id`
        IS NOT NULL", "Booking ID present for actionable rows", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("(`status` IS NULL OR `status` = ''NO_ACTION'') OR (`booking_id`
        IS NOT NULL AND SUM(CASE WHEN `status` IS NOT NULL AND `status` <> ''NO_ACTION''
        THEN 1 ELSE 0 END) OVER (PARTITION BY `booking_id`) = 1)", "Unique booking_id
        among actionable rows", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("(`status` IS NULL OR `status` = ''NO_ACTION'') OR (`booking_id`
        IS NOT NULL AND CAST(`booking_id` AS DOUBLE) IS NOT NULL AND CAST(`booking_id`
        AS BIGINT) IS NOT NULL AND CAST(`booking_id` AS DOUBLE) = CAST(`booking_id`
        AS BIGINT))", "booking_id integral for actionable rows", lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: The 'booking_id' column must be non-null for any row where an action will
        be scheduled (i.e., rows where 'status' is not null and not equal to 'NO_ACTION').
        This can be validated as a conditional completeness constraint.
      sources:
      - start_line: 10
        end_line: 13
        file: ''
    - text: The 'booking_id' values should be unique among rows where an action will
        be scheduled (i.e., where 'status' is not null and not equal to 'NO_ACTION'),
        to prevent scheduling the same booking multiple times.
      sources:
      - start_line: 10
        end_line: 13
        file: ''
    - text: The 'booking_id' column should have a consistent integral (integer) data
        type for rows where it is used (actionable rows), since it is passed directly
        to 'schedule_next_action' without type conversion.
      sources:
      - start_line: 13
        end_line: 13
        file: ''
  status:
    code:
    - suggestion: .isComplete("status")
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status IS NULL OR status = ''NO_ACTION''
        THEN 1 ELSE CASE WHEN status IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END END", "Valid actionable status", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status IS NULL THEN 1 ELSE CASE WHEN status
        = UPPER(status) AND status = TRIM(status) THEN 1 ELSE 0 END END", "Status
        uppercase and trimmed", lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.isContainedIn("status", ["COMPLETED","CANCELLED","IN_PROGRESS","UNDER_REVIEW","NO_ACTION"],
        lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''status'' column is expected to be non-null for rows that should
        be processed; otherwise those rows will be skipped by the conditional. We
        can enforce full completeness to avoid unintended skips. Deequ example: .isComplete("status")'
      sources:
      - start_line: 11
        end_line: 11
        file: ''
    - text: 'For any row where ''status'' is not NULL and not equal to ''NO_ACTION'',
        the value must be one of {"COMPLETED", "CANCELLED", "IN_PROGRESS", "UNDER_REVIEW"}
        so that the dictionary lookup returns a valid action (not None) before scheduling.
        Deequ example: .satisfies("CASE WHEN status IS NULL OR status = ''NO_ACTION''
        THEN 1 ELSE CASE WHEN status IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END END", "Valid actionable status", lambda x: x == 1.0)'
      sources:
      - start_line: 2
        end_line: 5
        file: ''
      - start_line: 8
        end_line: 8
        file: ''
      - start_line: 11
        end_line: 13
        file: ''
    - text: 'All non-null ''status'' values should be canonicalized (uppercase and
        without leading/trailing whitespace) to match dictionary keys exactly. Deequ
        example: .satisfies("CASE WHEN status IS NULL THEN 1 ELSE CASE WHEN status
        = UPPER(status) AND status = TRIM(status) THEN 1 ELSE 0 END END", "Status
        uppercase and trimmed", lambda x: x == 1.0)'
      sources:
      - start_line: 2
        end_line: 5
        file: ''
      - start_line: 12
        end_line: 12
        file: ''
    - text: 'The domain of ''status'' should be restricted to {"COMPLETED", "CANCELLED",
        "IN_PROGRESS", "UNDER_REVIEW", "NO_ACTION"} (or NULL) to prevent unknown statuses
        that would yield a None action. Great Expectations example: expect_column_values_to_be_in_set(column="status",
        value_set=["COMPLETED","CANCELLED","IN_PROGRESS","UNDER_REVIEW","NO_ACTION"],
        mostly=1.0, include_null=True)'
      sources:
      - start_line: 2
        end_line: 5
        file: ''
      - start_line: 8
        end_line: 8
        file: ''
      - start_line: 12
        end_line: 13
        file: ''
