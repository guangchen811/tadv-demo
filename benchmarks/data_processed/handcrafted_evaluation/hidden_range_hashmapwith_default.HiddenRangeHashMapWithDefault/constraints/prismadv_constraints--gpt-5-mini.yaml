constraints:
  status:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` IS NULL OR `status` = ''NO_ACTION''
        OR `status` IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Allowed statuses (including NO_ACTION)", lambda x: x
        == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` IS NOT NULL THEN 1 ELSE 0 END",
        "Non-null status fraction", lambda x: x > 0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''status'' column may contain null values and the code explicitly
        checks for them (pd.isna). The code will skip rows where status is null, so
        input is allowed to have nulls but there should be at least some non-null
        statuses to process. Example validation (Deequ-style): .satisfies("CASE WHEN
        `status` IS NOT NULL THEN 1 ELSE 0 END", "Non-null status fraction", lambda
        x: x > 0).'
      sources:
      - start_line: 11
        end_line: 11
        file: ''
    - text: 'The ''status'' column uses a sentinel value ''NO_ACTION'' which the code
        compares to skip processing. ''NO_ACTION'' is an allowed value in the input
        and rows equal to it will be ignored by the action lookup. Example validation:
        .satisfies("CASE WHEN `status` = ''NO_ACTION'' OR `status` IS NULL OR `status`
        IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'') THEN 1 ELSE
        0 END", "Allowed statuses (including NO_ACTION)", lambda x: x == 1).'
      sources:
      - start_line: 8
        end_line: 11
        file: ''
    - text: 'All non-null, non-''NO_ACTION'' values in ''status'' should be one of
        the keys expected by action_per_status: ''COMPLETED'', ''CANCELLED'', ''IN_PROGRESS'',
        or ''UNDER_REVIEW''. The code uses exact string equality to look up actions,
        so status values must match these keys exactly (case-sensitive) to ensure
        action_per_status.get(...) returns a valid action. Example validation: .satisfies("CASE
        WHEN `status` IS NULL OR `status` = ''NO_ACTION'' OR `status` IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Valid/mapped statuses", lambda x: x == 1).'
      sources:
      - start_line: 1
        end_line: 6
        file: ''
      - start_line: 11
        end_line: 12
        file: ''
