constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` = ''COMPLETED'' THEN CASE WHEN `email`
        IS NOT NULL AND trim(`email`) <> '''' THEN 1 ELSE 0 END ELSE 1 END", "Email
        present for completed bookings", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` = ''COMPLETED'' THEN CASE WHEN `email`
        RLIKE ''^[^@\\s]+@[^@\\s]+\\.[^@\\s]+'' THEN 1 ELSE 0 END ELSE 1 END", "Valid
        email format for completed bookings", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` <> ''COMPLETED'' THEN 1 ELSE CASE
        WHEN `email` IS NOT NULL THEN 1 ELSE 0 END END", "Email allowed null for non-completed",
        lambda x: x >= 0.0)'
      validity: null
      level: warning
    - suggestion: '.hasDataType("email", "String", lambda x: x >= 0.75)'
      validity: null
      level: warning
    assumptions:
    - text: 'For any input row where status == ''COMPLETED'', the ''email'' field
        must be present (not NULL) and not an empty/whitespace-only string. This is
        required because the code sends an email for each completed booking. Example
        Deequ-style check: .satisfies("CASE WHEN `status` = ''COMPLETED'' THEN CASE
        WHEN `email` IS NOT NULL AND trim(`email`) <> '''' THEN 1 ELSE 0 END ELSE
        1 END", "Email present for completed bookings", lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
    - text: 'For any input row where status == ''COMPLETED'', the ''email'' value
        should be a valid-looking email address (e.g. contain an ''@'' and a domain).
        This prevents runtime errors or undeliverable messages when send_email is
        called. Example Deequ-style check (regex): .satisfies("CASE WHEN `status`
        = ''COMPLETED'' THEN CASE WHEN `email` RLIKE ''^[^@\\s]+@[^@\\s]+\\.[^@\\s]+''
        THEN 1 ELSE 0 END ELSE 1 END", "Valid email format for completed bookings",
        lambda x: x == 1)'
      sources:
      - start_line: 2
        end_line: 4
        file: ''
    - text: 'The ''email'' column may contain NULLs in the input overall (dataset
        completeness ~0.75), but code expects non-null emails for completed bookings.
        Therefore, it''s acceptable for non-completed rows to have NULL emails, but
        not for completed ones. Example Deequ-style informational constraint: .satisfies("CASE
        WHEN `status` <> ''COMPLETED'' THEN 1 ELSE CASE WHEN `email` IS NOT NULL THEN
        1 ELSE 0 END END", "Email allowed null for non-completed", lambda x: x >=
        0.0)'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
    - text: 'Values in ''email'' should be strings (or safely castable to string)
        because send_email will be called with row[''email'']. Example check: .isContainedIn("email",
        <string-castable-or-string-values>) or type assertion ensuring `email` is
        of string type or not complex objects.'
      sources:
      - start_line: 3
        end_line: 4
        file: ''
