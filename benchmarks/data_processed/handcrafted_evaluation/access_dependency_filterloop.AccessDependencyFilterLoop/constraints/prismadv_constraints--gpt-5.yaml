constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' THEN (email IS NOT
        NULL AND TRIM(email) <> '''') ELSE TRUE END", "Email non-null and non-empty
        when status is COMPLETED", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' THEN email RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$''
        ELSE TRUE END", "Email format valid when status is COMPLETED", lambda x: x
        == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasDataType("email", ConstrainableDataTypes.String, lambda x:
        x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: For all rows where status == 'COMPLETED', the 'email' column must be non-null
        and non-empty, since the code sends an email without any null/empty checks.
        This can be validated with a conditional rule (apply only to rows with status
        = COMPLETED) requiring email IS NOT NULL and TRIM(email) <> ''.
      sources:
      - start_line: 2
        end_line: 4
        file: ''
    - text: For rows where status == 'COMPLETED', 'email' values should match a standard
        email format (e.g., local@domain.tld) to ensure the downstream send_email
        call succeeds. This can be validated with a conditional regex check (e.g.,
        '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$') applied only to rows with
        status = COMPLETED.
      sources:
      - start_line: 2
        end_line: 4
        file: ''
    - text: The 'email' column should be of string type (or safely castable to string)
        because it is passed directly to send_email.
      sources:
      - start_line: 4
        end_line: 4
        file: ''
  status:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` IS NULL OR `status` IN (''COMPLETED'',''CANCELLED'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Valid status domain", lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("`status` IS NULL OR `status` = UPPER(TRIM(`status`))",
        "Status normalized (uppercase, no surrounding spaces)", lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: .hasDataType("status", ConstrainableDataTypes.String)
      validity: null
      level: warning
    assumptions:
    - text: 'The ''status'' column is a categorical string used to filter completed
        bookings. All non-null values should be exactly one of: ''COMPLETED'', ''CANCELLED'',
        or ''UNDER_REVIEW'' (based on the current dataset histogram). Nulls may be
        present in the input and will be dropped before use. We could represent this
        assumption as a deequ constraint like this: .satisfies("CASE WHEN `status`
        IS NULL OR `status` IN (''COMPLETED'',''CANCELLED'',''UNDER_REVIEW'') THEN
        1 ELSE 0 END", "Valid status domain", lambda x: x == 1.0)'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
    - text: 'Status values are already normalized for exact, case-sensitive matching:
        trimming and uppercasing should not change any non-null value (ensuring df[''status'']
        == ''COMPLETED'' works as intended). We could represent this as: .satisfies("`status`
        IS NULL OR `status` = UPPER(TRIM(`status`))", "Status normalized (uppercase,
        no surrounding spaces)", lambda x: x == 1.0)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''status'' column should be of string type so it can be compared
        to the string literal ''COMPLETED''. We could represent this with deequ as:
        .hasDataType("status", ConstrainableDataTypes.String)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
