constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' AND status IS NOT
        NULL THEN CASE WHEN email IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Non-null
        email for completed bookings", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' AND status IS NOT
        NULL THEN CASE WHEN email RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$''
        THEN 1 ELSE 0 END ELSE 1 END", "Valid email format for completed bookings",
        lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''email'' column is expected to be non-null for all rows where ''status''
        is not null and ''status'' equals ''COMPLETED'', because the code sends emails
        to these users without checking for missing email values. Input data should
        therefore ensure that for any row with a non-null ''status'' of ''COMPLETED'',
        the ''email'' field is also non-null. We could represent this assumption as
        a deequ constraint like this: .satisfies("CASE WHEN status = ''COMPLETED''
        AND status IS NOT NULL THEN CASE WHEN email IS NOT NULL THEN 1 ELSE 0 END
        ELSE 1 END", "Non-null email for completed bookings", lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
    - text: 'The ''email'' column is assumed to contain valid email address strings
        for all rows where an email is sent, as the code directly passes the value
        of ''email'' to the send_email function. Input data should therefore ensure
        that for any row with a non-null ''status'' of ''COMPLETED'', the ''email''
        field contains a syntactically valid email address. We could represent this
        assumption as a deequ constraint like this: .satisfies("CASE WHEN status =
        ''COMPLETED'' AND status IS NOT NULL THEN CASE WHEN email RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$''
        THEN 1 ELSE 0 END ELSE 1 END", "Valid email format for completed bookings",
        lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
  status:
    code:
    - suggestion: .isComplete('status')
      validity: null
      level: error
    - suggestion: .isContainedIn('status', ['COMPLETED', 'CANCELLED', 'UNDER_REVIEW'])
      validity: null
      level: error
    assumptions:
    - text: The 'status' column must not contain any null values in the input data,
        because the code drops rows where 'status' is null before any further processing.
        This means downstream logic assumes 'status' is always present for every row.
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: The 'status' column is expected to contain only a small set of categorical
        string values, including 'COMPLETED', 'CANCELLED', and 'UNDER_REVIEW', as
        these are the only observed distinct values in the data and the code explicitly
        filters for 'COMPLETED'. Other unexpected or misspelled values could cause
        downstream logic to malfunction or silently exclude rows.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
