constraints:
- .isComplete('email', where="status = 'COMPLETED'")
- '.satisfies("status != ''COMPLETED'' OR trim(email) <> ''''", "non_empty_email_for_completed",
  lambda v: v == 1.0)'
- '.satisfies("status != ''COMPLETED'' OR email RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$''",
  "valid_email_format_for_completed", lambda v: v == 1.0)'
- '.satisfies("status != ''COMPLETED'' OR email = trim(email)", "no_surrounding_spaces_in_email_for_completed",
  lambda v: v == 1.0)'
