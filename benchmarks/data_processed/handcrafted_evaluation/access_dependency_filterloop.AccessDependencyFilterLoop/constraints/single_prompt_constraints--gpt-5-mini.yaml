constraints:
- .satisfies("status <> 'COMPLETED' OR email IS NOT NULL", "completed_bookings_have_email")
- .satisfies("status <> 'COMPLETED' OR email LIKE '%@%.%'", "completed_emails_basic_format")
- .satisfies("status <> 'COMPLETED' OR trim(email) = email", "completed_emails_no_surrounding_whitespace")
