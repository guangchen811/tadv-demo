constraints:
  cost:
    code:
    - suggestion: '.satisfies("`cost` IS NOT NULL", "cost_not_null", lambda x: x ==
        1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("`cost` > 0", "cost_positive", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("isfinite(CAST(`cost` AS DOUBLE))", "cost_numeric_and_finite",
        lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''cost'' column must be non-null for all rows because the code applies
        math.log directly without handling missing values. We could represent this
        assumption as a deequ constraint like this: .satisfies("CASE WHEN `cost` IS
        NOT NULL THEN 1 ELSE 0 END", "cost_not_null", lambda x: x == 1.0)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''cost'' column must contain strictly positive values (> 0) because
        the natural logarithm is undefined for zero or negative numbers. We could
        represent this assumption as a deequ constraint like this: .satisfies("CASE
        WHEN `cost` > 0 THEN 1 ELSE 0 END", "cost_positive", lambda x: x == 1.0)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''cost'' column must be numeric and finite (ints/floats; no strings,
        booleans, or infinities) so that math.log can be applied element-wise without
        type errors. We could represent this assumption as a Great Expectations rule
        like this: expect_column_values_to_be_in_type_list(column="cost", type_list=["INTEGER",
        "FLOAT"])'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
