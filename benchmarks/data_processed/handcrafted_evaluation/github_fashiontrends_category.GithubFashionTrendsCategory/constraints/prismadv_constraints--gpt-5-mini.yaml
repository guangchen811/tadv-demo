    - suggestion: '.satisfies(''CASE WHEN `category` IS NOT NULL THEN 1 ELSE 0 END'',
        ''Non-null category share'', lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `category` IS NULL THEN 1 WHEN `category`
        IN (0, 1, 0.0, 1.0) THEN 1 ELSE 0 END'', ''Valid category values'', lambda
        x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `category` IS NULL THEN 1 WHEN try_cast(`category`
        AS double) IS NOT NULL THEN 1 ELSE 0 END'', ''Category is numeric-parsable'',
        lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.hasApproxCountDistinct(''category'', lambda x: x >= 2)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''category'' column may contain NULL values because the code explicitly
        filters rows with df[''category''].notnull(). The input data is allowed to
        have missing categories, but there must be some non-null category values so
        that a target vector y can be formed. Example validation (Deequ-style): .satisfies(''CASE
        WHEN `category` IS NOT NULL THEN 1 ELSE 0 END'', ''Non-null category share'',
        lambda x: x > 0)'
      sources:
      - start_line: 10
        end_line: 10
        file: ''
    - text: 'The ''category'' column is used as the target variable y for modeling
        (y = df2.category). Therefore the column should contain valid label values
        suitable for supervised learning. In this dataset it is expected to be binary
        (two classes). Example validation: .satisfies(''CASE WHEN `category` IN (0,
        1, 0.0, 1.0) THEN 1 ELSE 0 END'', ''Valid category values'', lambda x: x ==
        1)'
      sources:
      - start_line: 11
        end_line: 12
        file: ''
    - text: 'The ''category'' column should be numeric (fractional) or at least parseable
        to numeric, since the dataset lists it as Fractional and it is used directly
        as y without casting. Example validation: .satisfies(''CASE WHEN try_cast(`category`
        AS double) IS NOT NULL THEN 1 ELSE 0 END'', ''Category is numeric-parsable'',
        lambda x: x == 1)'
      sources:
      - start_line: 12
        end_line: 12
        file: ''
    - text: 'The ''category'' column must contain at least two distinct classes (>=
        2 unique values) so that a meaningful train/test split and supervised task
        can proceed. Example validation: .satisfies(''CASE WHEN cardinality(array_distinct(collect_list(`category`)))
        >= 2 THEN 1 ELSE 0 END'', ''At least two category classes'', lambda x: x ==
        1)'
      sources:
      - start_line: 12
        end_line: 13
        file: ''
