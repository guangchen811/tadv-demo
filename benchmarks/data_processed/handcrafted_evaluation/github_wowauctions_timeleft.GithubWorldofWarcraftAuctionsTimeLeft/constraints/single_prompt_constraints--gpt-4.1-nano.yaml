constraints:
- .isComplete('time_left')
- .hasUniqueConstraint('auction_id')
- .hasDataType('collection_year', 'Integer')
- .hasDataType('collection_month', 'Integer')
- .hasDataType('collection_day', 'Integer')
- .hasDataType('collection_hour', 'Integer')
- .isContainedIn('time_left', {'< 0.5 Hrs', '0.5-2 Hrs', '2-12 Hrs', '12-48 Hrs'})
