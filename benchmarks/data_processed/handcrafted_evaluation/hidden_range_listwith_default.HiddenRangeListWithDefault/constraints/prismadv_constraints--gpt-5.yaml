constraints:
  booking_id:
    code:
    - suggestion: '.satisfies(''status IS NULL OR status = -1 OR booking_id IS NOT
        NULL'', ''booking_id present for actionable rows'', lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: .where('status IS NOT NULL AND status <> -1').isUnique('booking_id')
      validity: null
      level: warning
    - suggestion: '.hasDataType(''booking_id'', ConstrainableDataTypes.Integral, lambda
        x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''booking_id'' column must be non-null for any row where status IS
        NOT NULL and status != -1 (skip_action), because it is passed to schedule_next_action
        without a null check. Possible validation: Deequ .where("status IS NOT NULL
        AND status <> -1").isComplete("booking_id") (or Great Expectations expect_column_values_to_not_be_null
        with a row_condition of ''status != null and status != -1'').'
      sources:
      - start_line: 5
        end_line: 7
        file: ''
    - text: 'For rows that meet the action condition (status IS NOT NULL and status
        != -1), ''booking_id'' values should be unique to avoid scheduling multiple
        actions for the same booking. Possible validation: Deequ .where("status IS
        NOT NULL AND status <> -1").isUnique("booking_id").'
      sources:
      - start_line: 4
        end_line: 7
        file: ''
    - text: 'The ''booking_id'' column should contain integral (integer) values, as
        it is used as an identifier and passed directly to schedule_next_action without
        casting. Possible validation: Deequ .hasDataType("booking_id", ConstrainableDataTypes.Integral)
        or Great Expectations expect_column_values_to_be_of_type("booking_id", "int64").'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
  status:
    code:
    - suggestion: .hasDataType('status', ConstrainableDataTypes.Integral)
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` IS NULL OR `status` = -1 THEN 1
        WHEN `status` BETWEEN 0 AND 3 THEN 1 ELSE 0 END", "Valid status values for
        action indexing", lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'All non-null ''status'' values that are not equal to -1 must be valid
        indices into the action list. With 4 actions, this means ''status'' must be
        in {0, 1, 2, 3}. Nulls and -1 are allowed and should be skipped. This can
        be represented as a constraint such as: satisfies("CASE WHEN `status` IS NULL
        OR `status` = -1 THEN 1 WHEN `status` BETWEEN 0 AND 3 THEN 1 ELSE 0 END",
        "Valid status values", lambda x: x == 1.0).'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 5
        end_line: 6
        file: ''
    - text: 'The ''status'' column should be of integral type (no floats or strings),
        since it is used to index a Python list. This can be represented as a data
        type constraint such as: hasDataType("status", ConstrainableDataTypes.Integral)
        or Great Expectations expect_column_values_to_be_in_type_list with integer
        types.'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
