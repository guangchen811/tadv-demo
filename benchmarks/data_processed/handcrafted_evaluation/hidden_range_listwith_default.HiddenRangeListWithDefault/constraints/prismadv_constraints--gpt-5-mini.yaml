constraints:
  status:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` IS NULL OR `status` = -1 OR (`status`
        BETWEEN 0 AND 3) THEN 1 ELSE 0 END", "StatusInAllowedIndexRange", lambda x:
        x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` IN (0, 1) THEN 1 ELSE 0 END", "StatusIn_{0,1}",
        lambda x: x == 1)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''status'' column, when not null and not equal to the sentinel skip_action
        (-1), must be an integer index into action_per_status (length 4). Concretely,
        any status value that will be used to select an action must be in the range
        0..3 (inclusive); values outside this range will cause an IndexError at action_per_status[row[''status'']].

        We could represent this as a deequ/GE constraint, for example:

        .satisfies("CASE WHEN `status` IS NULL OR `status` = -1 OR (`status` BETWEEN
        0 AND 3) THEN 1 ELSE 0 END", "StatusInAllowedIndexRange", lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 6
        file: ''
    - text: 'The code explicitly treats nulls and the sentinel value -1 as rows to
        skip: it checks pd.isna(row[''status'']) and compares row[''status''] != skip_action.
        Therefore input may contain NULLs and/or -1; such rows will be skipped rather
        than indexed. If the input should contain no NULLs, enforce that separately.

        Examples for checks:

        - To assert NULLs are allowed (no check needed in runtime): no constraint
        required.

        - To assert there are no NULLs in input: .satisfies("CASE WHEN `status` IS
        NOT NULL THEN 1 ELSE 0 END", "NoNullStatus", lambda x: x == 1)'
      sources:
      - start_line: 2
        end_line: 5
        file: ''
    - text: 'Based on the dataset histogram, ''status'' currently contains only values
        {0, 1}. If this is an expected invariant of the input, enforce that status
        is one of these values. This is compatible with the indexing use (0 and 1
        are valid indices).

        We could represent this as:

        .satisfies("CASE WHEN `status` IN (0, 1) THEN 1 ELSE 0 END", "StatusIn_{0,1}",
        lambda x: x == 1)'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
