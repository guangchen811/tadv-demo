constraints:
  cost:
    code:
    - suggestion: '.satisfies("CASE WHEN cost IS NULL THEN 1 WHEN CAST(cost AS DOUBLE)
        IS NOT NULL THEN 1 ELSE 0 END", "Cost numeric or null", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN cost IS NULL THEN 1 WHEN CAST(cost AS DOUBLE)
        > 0 THEN 1 ELSE 0 END", "Positive non-null cost", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("cost IS NOT NULL", "Cost completeness (monitor)", lambda
        x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: The 'cost' column in the input data may contain null values; rows with
        null 'cost' will be dropped before further processing, so validation should
        not require full completeness of this column.
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'All non-null values in the ''cost'' column must be strictly greater than
        0; there should be zero records with cost <= 0. This can be represented as
        a Deequ constraint like .isPositive(''cost'') or .satisfies(''CASE WHEN cost
        IS NULL THEN 1 WHEN cost > 0 THEN 1 ELSE 0 END'', ''Positive cost'', lambda
        x: x == 1.0).'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: The 'cost' column must be numeric (e.g., integer or decimal) so that comparison
        to 0 is valid and does not raise a type error.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
