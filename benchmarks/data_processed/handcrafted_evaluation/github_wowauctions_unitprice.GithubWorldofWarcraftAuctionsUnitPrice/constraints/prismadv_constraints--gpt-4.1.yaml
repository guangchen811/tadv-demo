constraints:
  buyout:
    code:
    - suggestion: '.hasDataType(''buyout'', ''Fractional'', lambda x: x >= 1.0)'
      validity: null
      level: error
    assumptions:
    - text: The 'buyout' column can contain null values, as the code explicitly fills
        nulls with zero before performing arithmetic operations. The code expects
        that nulls are possible and handles them gracefully, so input data may have
        missing 'buyout' values.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: The 'buyout' column is expected to contain numeric (fractional) values,
        as it is used in arithmetic addition with 'unit_price' and then cast to string
        after the addition. Non-numeric types (such as strings or complex objects)
        would cause errors.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
  cost:
    code:
    - suggestion: '.satisfies(''(`unit_price` IS NOT NULL OR `buyout` IS NOT NULL)'',
        ''unit_price or buyout present'', lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CAST(`unit_price` AS DOUBLE) IS NOT NULL OR CAST(`buyout`
        AS DOUBLE) IS NOT NULL'', ''unit_price or buyout numeric'', lambda x: x ==
        1)'
      validity: null
      level: error
    - suggestion: '.satisfies(''(CAST(`unit_price` AS DOUBLE) >= 0 OR `unit_price`
        IS NULL) AND (CAST(`buyout` AS DOUBLE) >= 0 OR `buyout` IS NULL)'', ''unit_price
        and buyout non-negative'', lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies(''(CAST(COALESCE(`unit_price`, 0) AS BIGINT) + CAST(COALESCE(`buyout`,
        0) AS BIGINT)) >= 1000000'', ''cost has at least 6 digits'', lambda x: x ==
        1)'
      validity: null
      level: error
    assumptions:
    - text: The input data must have at least one of the columns 'unit_price' or 'buyout'
        present and numeric per row, as 'cost' is computed by summing these two columns
        after filling missing values with 0. At least one of these values should be
        non-null for each row; otherwise, 'cost' will be 0 for that row. Both columns
        should be parseable as numbers.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: The resulting 'cost' column is expected to represent a combined price
        as an integer value, in a format where the last six digits encode silver and
        copper subunits (e.g., gold, silver, copper). Therefore, the input 'unit_price'
        and 'buyout' values should be such that their sum, when cast to string, always
        has at least six digits (i.e., values >= 1000000, or else left-padded with
        zeros), to allow extraction of gold, silver, and copper via string slicing.
        Otherwise, downstream code will extract incorrect denominations.
      sources:
      - start_line: 2
        end_line: 7
        file: ''
    - text: The input data must not produce negative values in 'unit_price' or 'buyout',
        as negative prices would result in a negative 'cost', which may break the
        downstream denomination extraction logic.
      sources:
      - start_line: 2
        end_line: 7
        file: ''
  unit_price:
    code:
    - suggestion: .hasDataType('unit_price', ConstrainableDataTypes.Fractional)
      validity: null
      level: error
    - suggestion: .isComplete('unit_price')
      validity: null
      level: warning
    assumptions:
    - text: 'The ''unit_price'' column can contain null values in the input data,
        as the code explicitly fills missing ''unit_price'' values with 0 when calculating
        ''cost''. However, at least some values in ''unit_price'' must not be null,
        otherwise all ''cost'' values would be derived solely from ''buyout''.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN `unit_price` IS NULL THEN 1 ELSE 0 END", "Null unit_price
        Values", lambda x: x >= 0)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''unit_price'' column is expected to contain numeric (fractional)
        values, as it is used in arithmetic addition with ''buyout'', and then cast
        to string. Non-numeric values in ''unit_price'' would cause errors in this
        operation.

        We could represent this assumption as a deequ constraint like this:

        .hasDataType("unit_price", ConstrainableDataTypes.Fractional)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
