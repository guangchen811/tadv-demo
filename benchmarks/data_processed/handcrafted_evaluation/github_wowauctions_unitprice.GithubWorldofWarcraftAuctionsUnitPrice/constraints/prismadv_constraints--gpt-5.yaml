constraints:
  unit_price:
    code:
    - suggestion: '.hasCompleteness(''unit_price'', lambda v: v >= 0.01)'
      validity: null
      level: warning
    - suggestion: '.satisfies(''CASE WHEN `unit_price` IS NULL THEN true WHEN `unit_price`
        >= 0 AND `unit_price` = FLOOR(`unit_price`) THEN true ELSE false END'', ''unit_price_nonneg_integer'',
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN coalesce(`unit_price`, 0) > 0 AND coalesce(`buyout`,
        0) > 0 THEN false ELSE true END'', ''unit_price_buyout_not_both_positive'',
        lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''unit_price'' column may contain nulls; the code explicitly fills
        missing values with 0 when computing cost. However, at least some rows must
        have a non-null ''unit_price'' (i.e., completeness > 0). Example Deequ constraint:
        .hasCompleteness(''unit_price'', _ >= 0.01)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''unit_price'' column must be numeric, non-negative, and represent
        an integer amount in the smallest currency unit (copper). Any fractional values
        (e.g., with a decimal part) or negative values would break the subsequent
        string-based denomination parsing. Example Deequ constraint: .satisfies("CASE
        WHEN `unit_price` IS NULL THEN 1 WHEN `unit_price` >= 0 AND `unit_price` =
        FLOOR(`unit_price`) THEN 1 ELSE 0 END", "unit_price_nonneg_integer", _ ==
        1.0)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 5
        end_line: 7
        file: ''
    - text: 'Mutual exclusivity with ''buyout'': for each row, at most one of ''unit_price''
        or ''buyout'' should be present/positive. If both are provided, summing them
        will overstate the cost; if one is present, the other should be null or zero.
        Example Deequ constraint: .satisfies("CASE WHEN coalesce(`unit_price`,0) >
        0 AND coalesce(`buyout`,0) > 0 THEN 0 ELSE 1 END", "unit_price_buyout_not_both_positive",
        _ == 1.0)'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
    - text: 'The ''unit_price'' values are expected to be expressed in the smallest
        currency unit (copper), so that when the total cost is converted to a string,
        it contains only digits (no decimal points or signs) and can be sliced into
        gold/silver/copper segments. Example Deequ constraint: .satisfies("CASE WHEN
        `unit_price` IS NULL THEN 1 WHEN `unit_price` = FLOOR(`unit_price`) AND `unit_price`
        >= 0 THEN 1 ELSE 0 END", "unit_price_is_copper_units", _ == 1.0)'
      sources:
      - start_line: 5
        end_line: 7
        file: ''
