constraints:
  unit_price:
    code:
    - suggestion: '.satisfies("CASE WHEN `unit_price` IS NULL THEN 1 ELSE 0 END",
        "Has_Nulls", lambda x: x >= 0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("CASE WHEN `unit_price` IS NULL OR `unit_price` >= 0
        THEN 1 ELSE 0 END", "unit_price_non_negative", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `unit_price` IS NULL OR floor(`unit_price`)
        = `unit_price` THEN 1 ELSE 0 END", "unit_price_integer", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN regexp_like(cast((coalesce(unit_price,0)+coalesce(buyout,0))
        AS STRING), ''^[0-9]{6,}$'') THEN 1 ELSE 0 END", "cost_string_format", lambda
        x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''unit_price'' column may contain nulls (the code calls unit_price.fillna(0)),
        so missing values are expected and handled by the pipeline. Example deequ-style
        check (just documents expectation): .satisfies("CASE WHEN `unit_price` IS
        NULL THEN 1 ELSE 0 END", "Has_Nulls", lambda x: x >= 0).'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''unit_price'' column must be numeric and non-negative: the code
        adds unit_price to buyout and interprets the sum as a currency amount, so
        negative or non-numeric values will break the logic. Deequ/Gross-check example:
        .satisfies("CASE WHEN `unit_price` IS NULL OR `unit_price` >= 0 THEN 1 ELSE
        0 END", "unit_price_non_negative", lambda x: x == 1).'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 5
        end_line: 7
        file: ''
    - text: "The 'unit_price' column should not contain fractional (sub-integer) values\
        \ \u2014 values should be whole units of the smallest currency denomination\
        \ (no fractional cents/copper). The code converts the numeric sum to a string\
        \ and slices fixed character positions to extract gold/silver/copper, which\
        \ requires integer totals. Deequ-style check: .satisfies(\"CASE WHEN `unit_price`\
        \ IS NULL OR floor(`unit_price`) = `unit_price` THEN 1 ELSE 0 END\", \"unit_price_integer\"\
        , lambda x: x == 1)."
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 5
        end_line: 7
        file: ''
    - text: 'For the string slicing used to extract gold/silver/copper to work, the
        summed cost (coalesce(unit_price,0) + coalesce(buyout,0)) must produce an
        integer whose string representation contains only digits and is long enough
        so the slices exist (the code indexes positions like str[:-6], str[-6:-4],
        str[-4:-2]). In practice this means the combined numeric cost should be represented
        as a digits-only string with at least 6 characters. Example validation (checks
        both columns together): .satisfies("CASE WHEN regexp_like(cast((coalesce(unit_price,0)+coalesce(buyout,0))
        AS STRING), ''^[0-9]{6,}$'') THEN 1 ELSE 0 END", "cost_string_format", lambda
        x: x == 1).'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 5
        end_line: 7
        file: ''
