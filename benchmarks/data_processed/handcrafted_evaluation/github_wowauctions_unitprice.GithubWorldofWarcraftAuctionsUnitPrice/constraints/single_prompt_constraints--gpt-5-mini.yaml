constraints:
- .hasDataType('unit_price', 'DoubleType')
- .satisfies('unit_price > 0 OR unit_price IS NULL', 'unit_price_positive_if_present')
- .satisfies('quantity <= 1 OR unit_price IS NOT NULL', 'unit_price_present_for_stackable_items')
- .satisfies('unit_price < 1000000000 OR unit_price IS NULL', 'unit_price_reasonable_upper_bound')
