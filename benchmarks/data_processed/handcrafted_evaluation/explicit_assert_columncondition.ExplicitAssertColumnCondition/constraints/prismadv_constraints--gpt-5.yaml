constraints:
  email:
    code:
    - suggestion: .hasColumn('email')
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' THEN (email IS NOT
        NULL) ELSE TRUE END", "Email present for COMPLETED", lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The input data must contain the ''email'' column.

        We could represent this assumption as a Deequ constraint like this:

        .hasColumn(''email'')'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'For all rows where status == ''COMPLETED'', the ''email'' value must
        be non-null. Null emails are allowed for other statuses.

        We could represent this assumption as a Deequ constraint like this:

        .satisfies("CASE WHEN status = ''COMPLETED'' THEN CASE WHEN email IS NOT NULL
        THEN 1 ELSE 0 END ELSE 1 END", "Email present for COMPLETED", lambda x: x
        == 1.0)

        Or in Great Expectations:

        expect_column_values_to_not_be_null(column=''email'', condition_parser=''pandas'',
        row_condition=''status == "COMPLETED"'')'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
  status:
    code:
    - suggestion: '.satisfies("(status <> ''COMPLETED'') OR (email IS NOT NULL)",
        "Email present for COMPLETED", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status IN (''COMPLETED'',''CANCELLED'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Valid status domain", lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("(status = TRIM(status)) AND (status RLIKE ''^[A-Z_]+$'')",
        "Status uppercase and trimmed", lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.hasCompleteness("status", lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'For every row where `status` equals ''COMPLETED'', the corresponding
        `email` must be non-null. This can be captured as a conditional constraint,
        e.g., Deequ: .satisfies("CASE WHEN `status` = ''COMPLETED'' THEN CASE WHEN
        `email` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Email present for COMPLETED",
        lambda x: x == 1.0).'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The `status` column should be constrained to the known category set:
        ''COMPLETED'', ''CANCELLED'', ''UNDER_REVIEW'' (exact matches). Example Deequ
        rule: .satisfies("CASE WHEN `status` IN (''COMPLETED'',''CANCELLED'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Valid status domain", lambda x: x == 1.0).'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
      - start_line: 5
        end_line: 5
        file: ''
    - text: The `status` values should be uppercase and free of leading/trailing whitespace
        to ensure exact string comparisons succeed (e.g., 'COMPLETED' not 'completed'
        or ' COMPLETED '). This can be enforced with a regex like ^[A-Z_]+$ and a
        trim check.
      sources:
      - start_line: 5
        end_line: 5
        file: ''
    - text: 'The `status` column should be complete (no nulls). Example Deequ: .hasCompleteness("status",
        lambda x: x == 1.0).'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
