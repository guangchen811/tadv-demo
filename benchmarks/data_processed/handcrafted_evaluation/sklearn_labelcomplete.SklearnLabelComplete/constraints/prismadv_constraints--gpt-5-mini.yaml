constraints:
  status:
    code:
    - suggestion: '.satisfies(''CASE WHEN `status` IS NOT NULL THEN 1 ELSE 0 END'',
        ''Non-null status'', lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `status` IN (0, 1) THEN 1 ELSE 0 END'',
        ''Status in {0,1}'', lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `status` = 0 THEN 1 ELSE 0 END'', ''Has
        class 0'', lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `status` = 1 THEN 1 ELSE 0 END'', ''Has
        class 1'', lambda x: x > 0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''status'' column must contain no null/missing values because it
        is used as the target y for model training (LogisticRegression.fit) and the
        model requires a label for each training row.

        We could represent this assumption as a Deequ/Great Expectations-style constraint,
        e.g.:

        .satisfies("CASE WHEN `status` IS NOT NULL THEN 1 ELSE 0 END", "Non-null status",
        lambda x: x == 1)'
      sources:
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'The ''status'' column should be binary and only contain the values 0
        and 1 (or values that reliably map to 0/1). LogisticRegression is being used
        for a binary classification target, so unexpected/extra label values will
        break or mis-train the model.

        We could represent this assumption as a constraint like:

        .satisfies("CASE WHEN `status` IN (0, 1) THEN 1 ELSE 0 END", "Status in {0,1}",
        lambda x: x == 1)'
      sources:
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'Both classes must be present in the input data (at least one row with
        status == 0 and at least one row with status == 1). Training a binary classifier
        requires both classes to appear in the training set.

        We could represent this as two constraints, for example:

        .satisfies("CASE WHEN `status` = 0 THEN 1 ELSE 0 END", "Has class 0", lambda
        x: x > 0)

        .satisfies("CASE WHEN `status` = 1 THEN 1 ELSE 0 END", "Has class 1", lambda
        x: x > 0)'
      sources:
      - start_line: 8
        end_line: 9
        file: ''
