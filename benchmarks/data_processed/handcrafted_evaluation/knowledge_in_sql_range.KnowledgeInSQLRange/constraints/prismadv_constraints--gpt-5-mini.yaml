constraints:
  status:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` = ''UNDER_REVIEW'' THEN 1 ELSE 0
        END", "Has UNDER_REVIEW", lambda x: x > 0)'
      validity: false
      level: error
    - suggestion: '.satisfies("`status` is not NULL", "No null status", lambda x:
        x == 1)'
      validity: true
      level: warning
    - suggestion: '.satisfies("CASE WHEN `status` IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Known status categories", lambda x: x >= 0.95)'
      validity: true
      level: error
    assumptions:
    - text: 'The ''status'' column is expected to contain the category ''UNDER_REVIEW''
        because the downstream query filters WHERE status = ''UNDER_REVIEW'' to identify
        potential fraud cases. In other words, the input data should include at least
        one row with status = ''UNDER_REVIEW'' (otherwise the query will always return
        0). This can be expressed as a validation rule, for example:

        .satisfies("CASE WHEN `status` = ''UNDER_REVIEW'' THEN 1 ELSE 0 END", "Has
        UNDER_REVIEW", lambda x: x > 0)'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
    - text: 'The ''status'' column should be non-null for rows evaluated by the query
        because the code performs an equality comparison on status. Represent this
        as a constraint requiring no nulls in the input data for this column:

        .satisfies("CASE WHEN `status` IS NOT NULL THEN 1 ELSE 0 END", "No null status",
        lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
    - text: 'Status values are expected to come from a known set of categories that
        includes ''UNDER_REVIEW'' (and the observed categories ''COMPLETED'', ''CANCELLED'',
        ''IN_PROGRESS''). Unexpected/typo values (including case differences) should
        be rare. This can be enforced as, for example, at least 95% of rows having
        status in the allowed set:

        .satisfies("CASE WHEN `status` IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Known status categories", lambda x: x >= 0.95)

        (Adjust the threshold as needed for your tolerance of unknown categories.)'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
