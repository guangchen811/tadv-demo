constraints:
  status:
    code:
    - suggestion: '.satisfies("CASE WHEN status = ''UNDER_REVIEW'' THEN 1 ELSE 0 END",
        "Presence of UNDER_REVIEW", lambda x: x > 0)'
      validity: false
      level: error
    - suggestion: '.satisfies("CASE WHEN status IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Valid status labels", lambda x: x == 1.0)'
      validity: true
      level: error
    - suggestion: '.satisfies("CASE WHEN cost > 10000 THEN CASE WHEN status IS NOT
        NULL THEN 1 ELSE 0 END ELSE 1 END", "Status not null for high-cost rows",
        lambda x: x == 1.0)'
      validity: true
      level: warning
    - suggestion: '.hasCompleteness("status", lambda x: x == 1.0)'
      validity: true
      level: warning
    - suggestion: '.satisfies("CASE WHEN status = TRIM(status) AND status = UPPER(status)
        THEN 1 ELSE 0 END", "Status normalization (trim + uppercase)", lambda x: x
        == 1.0)'
      validity: true
      level: warning
    assumptions:
    - text: 'The ''status'' column''s domain must include the literal ''UNDER_REVIEW''
        (exact spelling and case), and at least one row in the input data should contain
        this value; otherwise the fraud-case count will always be zero. We could represent
        this assumption as a deequ constraint like this: .satisfies("CASE WHEN status
        = ''UNDER_REVIEW'' THEN 1 ELSE 0 END", "Presence of UNDER_REVIEW", lambda
        x: x > 0) and as a Great Expectations rule like this: expect_column_distinct_values_to_contain_set(value_set={"UNDER_REVIEW"}).'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
    - text: 'The ''status'' column should be restricted to a controlled vocabulary
        that includes ''UNDER_REVIEW'' (e.g., {''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW''})
        so that variant labels do not break the equality predicate. We could represent
        this as a deequ constraint: .satisfies("CASE WHEN status IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Valid status labels", lambda x: x == 1.0) or as a Great
        Expectations rule: expect_column_values_to_be_in_set(value_set=["COMPLETED","CANCELLED","IN_PROGRESS","UNDER_REVIEW"]).'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
    - text: 'The ''status'' column should be non-null across all input rows to avoid
        silently excluding rows from the equality filter. We could represent this
        as a deequ constraint: .hasCompleteness("status", lambda x: x == 1.0) or,
        more specifically for the downstream filter, .satisfies("CASE WHEN cost >
        10000 THEN CASE WHEN status IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Status
        not null for high-cost rows", lambda x: x == 1.0).'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
    - text: 'The ''status'' values should be normalized (trimmed and uppercase) so
        that exact string matching with ''UNDER_REVIEW'' succeeds and is not broken
        by casing or whitespace. We could represent this as a deequ constraint: .satisfies("CASE
        WHEN status = TRIM(status) AND status = UPPER(status) THEN 1 ELSE 0 END",
        "Status normalization", lambda x: x == 1.0) or as a Great Expectations rule:
        expect_column_values_to_match_regex(regex="^[A-Z_]+$").'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
