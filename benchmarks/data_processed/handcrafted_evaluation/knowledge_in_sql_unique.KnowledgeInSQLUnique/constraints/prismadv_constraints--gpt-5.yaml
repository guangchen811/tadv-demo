constraints:
  booking_id:
    code:
    - suggestion: .isUnique("booking_id")
      validity: null
      level: error
    - suggestion: '.satisfies("booking_id IS NOT NULL", "booking_id not null", lambda
        x: x == 1)'
      validity: null
      level: error
    - suggestion: '.hasDataType("booking_id", ConstrainableDataTypes.Integral, lambda
        x: x == 1)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''booking_id'' column must be unique across all input rows (acts
        as a primary key). Otherwise, later rows with the same ''booking_id'' would
        overwrite earlier entries in the booking_details dictionary. Deequ example:
        .isUnique("booking_id"). Great Expectations example: expect_column_values_to_be_unique("booking_id").'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'The ''booking_id'' column must be complete (no nulls), since values are
        used as dictionary keys; nulls (None) would create ambiguous or undesirable
        keys. Deequ example: .hasCompleteness("booking_id", lambda v: v == 1.0). Great
        Expectations example: expect_column_values_to_not_be_null("booking_id").'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'The ''booking_id'' column should be integer-typed (integral) and consistently
        typed to ensure deterministic dictionary keys and to align with the schema
        used in the DuckDB query. Deequ example: .hasDataType("booking_id", ConstrainableDataTypes.Integral).
        Great Expectations example: expect_column_values_to_be_in_type_list("booking_id",
        ["int64", "int32", "Int64"]).'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
      - start_line: 8
        end_line: 9
        file: ''
  cost:
    code:
    - suggestion: .isComplete('cost')
      validity: null
      level: error
    - suggestion: '.hasDataType(''cost'', ConstrainableDataTypes.Numeric, lambda x:
        x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''cost >= 0'', ''Non-negative cost'', lambda x: x ==
        1.0)'
      validity: null
      level: warning
    assumptions:
    - text: The input dataset must contain a 'cost' column; otherwise the SELECT and
        downstream processing will fail. This can be validated with Great Expectations
        using expect_table_columns_to_contain_set(['cost']).
      sources:
      - start_line: 5
        end_line: 6
        file: ''
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'The ''cost'' column should be complete (no nulls) for all processed rows;
        null + 10 would propagate a null and break the intent of computing a numeric
        ''real_cost''. Deequ example: isComplete(''cost''). Great Expectations: expect_column_values_to_not_be_null.'
      sources:
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'The ''cost'' column values must be numeric (preferably integral) so that
        adding the numeric ''additional_cost'' succeeds. Deequ example: hasDataType(''cost'',
        ConstrainableDataTypes.Numeric). Great Expectations: expect_column_values_to_be_in_type_list([''INTEGER'',
        ''BIGINT'', ''FLOAT'', ''DECIMAL'']).'
      sources:
      - start_line: 9
        end_line: 9
        file: ''
    - text: 'The ''cost'' column should be non-negative (>= 0), consistent with observed
        data and the computation of a positive surcharge. Deequ example: hasMin(''cost'',
        _ >= 0) or satisfies(''cost >= 0'', ''Non-negative cost'', _ >= 1.0). Great
        Expectations: expect_column_min_to_be_greater_than_or_equal_to 0.'
