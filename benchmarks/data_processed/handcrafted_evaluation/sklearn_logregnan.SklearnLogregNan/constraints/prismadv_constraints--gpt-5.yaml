constraints:
  cost:
    code:
    - suggestion: .isComplete("cost")
      validity: null
      level: error
    - suggestion: '.satisfies("NOT isnan(cost)", "No NaNs in cost", lambda x: x ==
        1.0)'
      validity: null
      level: error
    - suggestion: '.hasDataType("cost", ConstrainableDataTypes.Numeric, lambda x:
        x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("cost >= 0", "Non-negative cost", lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''cost'' column must be complete for all rows used to train the model:
        no nulls and no NaN values are allowed because values are directly stacked
        into X and scikit-learn''s LogisticRegression does not accept missing values.
        Possible validations: Deequ .isComplete("cost") and .satisfies("NOT isnan(cost)",
        "No NaNs in cost", lambda x: x == 1.0); Great Expectations expect_column_values_to_not_be_null(''cost'')
        and expect_column_values_to_not_be_nan(''cost'').'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 8
        end_line: 8
        file: ''
    - text: 'The ''cost'' column must be numeric (integral or fractional) and coercible
        to float, since it is concatenated with numeric one-hot encoded features and
        passed to LogisticRegression. Possible validations: Deequ .hasDataType("cost",
        ConstrainableDataTypes.Numeric); Great Expectations expect_column_values_to_be_in_type_list(''cost'',
        [''INTEGER'', ''LONG'', ''FLOAT'', ''DOUBLE'', ''DECIMAL'']).'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 8
        end_line: 8
        file: ''
    - text: 'The ''cost'' column is expected to be non-negative (>= 0). The provided
        data shows only positive values, and negative costs would likely indicate
        bad input. Possible validations: Deequ .hasMin("cost", lambda m: m >= 0);
        Great Expectations expect_column_min_to_be_greater_than_or_equal_to(''cost'',
        0).'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
  location:
    code:
    - suggestion: '.satisfies("`location` IS NOT NULL", "location not null", lambda
        x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasDataType("location", ConstrainableDataTypes.String, lambda
        x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `location` IN (''A'',''B'',''C'') THEN 1
        ELSE 0 END", "Valid locations", lambda x: x >= 0.95)'
      validity: null
      level: warning
    - suggestion: '.hasApproxCountDistinct("location", lambda v: v >= 1 and v <= 100)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''location'' column must be complete (no nulls) because it is directly
        one-hot encoded without any imputation. This can be enforced as a Deequ constraint:
        .hasCompleteness(''location'', lambda v: v == 1.0) or Great Expectations:
        expect_column_values_to_not_be_null(''location'').'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
    - text: 'The ''location'' column should contain string/categorical scalar values
        (e.g., pandas dtype object/str) suitable for scikit-learn''s OneHotEncoder.
        This can be enforced with Deequ: .hasDataType(''location'', ConstrainableDataTypes.String)
        or Great Expectations: expect_column_values_to_be_in_type_list(''location'',
        [''object'', ''string'']).'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
    - text: 'The ''location'' values are expected to be within a small, known set
        observed during development: {''A'', ''B'', ''C''}; allow at most 5% outside
        this set. Deequ example: .satisfies("CASE WHEN `location` IN (''A'',''B'',''C'')
        THEN 1 ELSE 0 END", "Valid locations", lambda x: x >= 0.95).'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
    - text: 'The number of distinct ''location'' categories should be reasonably small
        to keep the dense one-hot matrix (sparse_output=False) tractable; for example,
        unique value count between 1 and 100. Great Expectations: expect_column_unique_value_count_to_be_between(''location'',
        min_value=1, max_value=100) or Deequ: .hasNumberOfDistinctValues(''location'',
        lambda v: v <= 100).'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
  status:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` = ''COMPLETED'' THEN 1 ELSE 0 END",
        "Any COMPLETED in status", lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` <> ''COMPLETED'' OR `status` IS
        NULL THEN 1 ELSE 0 END", "Any non-COMPLETED in status", lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'')
        THEN 1 ELSE 0 END", "Known status domain", lambda x: x >= 0.95)'
      validity: null
      level: warning
    - suggestion: '.satisfies("CASE WHEN `status` IS NULL THEN 1 WHEN `status` = UPPER(TRIM(`status`))
        THEN 1 ELSE 0 END", "Canonical casing/whitespace for status", lambda x: x
        >= 0.99)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''status'' column must contain both positive and negative class examples
        for the target definition y = (status == ''COMPLETED''). Specifically, there
        should be at least one ''COMPLETED'' and at least one value not equal to ''COMPLETED'',
        otherwise LogisticRegression.fit will fail due to a single class in y. We
        could represent this with two constraints, e.g.: satisfies(CASE WHEN status
        = ''COMPLETED'' THEN 1 ELSE 0 END, ''Any COMPLETED'', lambda x: x > 0) and
        satisfies(CASE WHEN status <> ''COMPLETED'' OR status IS NULL THEN 1 ELSE
        0 END, ''Any non-COMPLETED'', lambda x: x > 0).'
      sources:
      - start_line: 7
        end_line: 8
        file: ''
    - text: 'Status values are expected to be within the known domain {''COMPLETED'',
        ''CANCELLED'', ''IN_PROGRESS''} (based on observed data); unexpected categories
        should be rare. This can be validated as: satisfies(CASE WHEN status IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'')
        THEN 1 ELSE 0 END, ''Known status domain'', lambda x: x >= 0.95).'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
    - text: 'Status values should use canonical formatting so that ''COMPLETED'' positives
        are correctly identified (case-sensitive match, no leading/trailing whitespace).
        This can be validated as: satisfies(CASE WHEN status IS NULL THEN 1 WHEN status
        = UPPER(TRIM(status)) THEN 1 ELSE 0 END, ''Canonical casing/whitespace'',
        lambda x: x >= 0.99).'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
