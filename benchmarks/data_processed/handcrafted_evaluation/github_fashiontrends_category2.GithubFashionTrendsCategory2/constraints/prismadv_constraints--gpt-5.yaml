constraints:
  category:
    code:
    - suggestion: '.satisfies("(`category` IS NULL) OR (`category` IN (0, 1))", "Category
        is binary when present", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("`category` = 0", "At least one row with category 0",
        lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("`category` = 1", "At least one row with category 1",
        lambda x: x > 0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''category'' column in the input data may contain nulls, but there
        must be at least 2 rows where ''category'' is not null so that train_test_split
        can create non-empty train and test sets. This can be represented as a validation
        like: count_of_rows_where(category IS NOT NULL) >= 2.'
      sources:
      - start_line: 10
        end_line: 10
        file: ''
      - start_line: 13
        end_line: 13
        file: ''
    - text: 'The ''category'' column is used as the target variable and is expected
        to be binary with values limited to {0, 1}. This can be represented as a constraint
        like: category IN (0, 1) for all non-null rows.'
      sources:
      - start_line: 12
        end_line: 13
        file: ''
    - text: 'Among non-null ''category'' values, there should be exactly 2 distinct
        values (i.e., the task expects a binary target). This can be represented as:
        distinct_non_null_values(category) == 2.'
      sources:
      - start_line: 12
        end_line: 13
        file: ''
  comments:
    code:
    - suggestion: '.hasDataType("comments", ConstrainableDataTypes.String, lambda
        x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN category IS NOT NULL THEN CASE WHEN comments
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Comments present when used", lambda
        x: x >= 0.95)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''comments'' column must exist and contain string-like values because
        it is directly selected and passed as the feature vector (X) without any casting
        or preprocessing. We could represent this with validation rules like: Deequ:
        .hasColumn("comments").hasDataType("comments", ConstrainableDataTypes.String)
        ; Great Expectations: expect_column_to_exist("comments"); expect_column_values_to_be_in_type_list("comments",
        ["str", "string", "object"]).'
      sources:
      - start_line: 11
        end_line: 13
        file: ''
    - text: 'Among rows used for modeling (where ''category'' is not null), the ''comments''
        column should be present (non-null) for the vast majority of rows. Given the
        provided data shows 100% completeness for ''comments'', set a tolerance such
        as at least 95% non-null when category is not null. We could represent this
        as: Deequ: .satisfies("CASE WHEN category IS NOT NULL THEN CASE WHEN comments
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Comments present when used", lambda
        x: x >= 0.95) ; Great Expectations: expect_column_values_to_not_be_null("comments",
        mostly=0.95, row_condition="category IS NOT NULL").'
      sources:
      - start_line: 10
        end_line: 13
        file: ''
