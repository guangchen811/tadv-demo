constraints:
  result:
    code:
    - suggestion: .isComplete('result')
      validity: null
      level: error
    - suggestion: '.satisfies("`result` IN (''runs'',''wickets'',''tie'')", ''Valid
        result categories'', lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("(NOT ((CAST(`super_over` AS STRING) IN (''1'',''true'',''True'',''TRUE''))
        OR (`super_over` = true) OR (`super_over` = 1))) OR (`result` = ''tie'')",
        ''Super over requires tie result'', lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("(`result` <> ''wickets'') OR (`result_margin` <= 10)",
        ''Wickets margin cannot exceed 10'', lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''result'' column must be non-null for all rows (so that equality
        checks like result == ''tie'' or result == ''wickets'' are meaningful). This
        can be enforced as a completeness check: completeness(''result'') == 1.0.'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
    - text: The 'result' column is a categorical string with allowed, lowercase values
        only in {'runs', 'wickets', 'tie'}. This can be enforced with a set-membership
        rule (e.g., expect_column_values_to_be_in_set or a Deequ satisfies check ensuring
        result IN ('runs','wickets','tie')).
      sources:
      - start_line: 5
        end_line: 6
        file: ''
    - text: 'If super_over is true (or 1), then ''result'' must equal ''tie''. This
        can be enforced with a conditional rule: CASE WHEN super_over IN (1, true,
        ''true'') THEN CASE WHEN result = ''tie'' THEN 1 ELSE 0 END ELSE 1 END should
        be 1.0.'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
    - text: 'If ''result'' = ''wickets'', then result_margin must be <= 10. This can
        be enforced with a conditional rule: CASE WHEN result = ''wickets'' THEN CASE
        WHEN result_margin <= 10 THEN 1 ELSE 0 END ELSE 1 END should be 1.0.'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
  result_margin:
    code:
    - suggestion: .isComplete('result_margin')
      validity: null
      level: error
    - suggestion: '.hasDataType(''result_margin'', ConstrainableDataTypes.Integral,
        lambda v: v == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN lower(`result`) = ''wickets'' THEN (`result_margin`
        <= 10) ELSE true END", "Wicket margin <= 10", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("`result_margin` <= `target_runs`", "Margin <= target_runs",
        lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''result_margin'' column must be present (no nulls) and numeric (integral)
        in all rows so that it can be safely compared to constants (e.g., 10) and
        to ''target_runs''. We could represent this with Deequ as: .hasCompleteness(''result_margin'',
        lambda v: v == 1.0) and .hasDataType(''result_margin'', ConstrainableDataTypes.Integral,
        lambda v: v == 1.0); or with Great Expectations as: expect_column_values_to_not_be_null(''result_margin'')
        and expect_column_values_to_be_in_type_list(''result_margin'', [''int'', ''int64'']).'
      sources:
      - start_line: 6
        end_line: 7
        file: ''
    - text: 'If the match result is ''wickets'', the ''result_margin'' must be less
        than or equal to 10. We could represent this with Deequ as: .satisfies("CASE
        WHEN lower(`result`) = ''wickets'' THEN (`result_margin` <= 10) ELSE true
        END", ''Wicket margin <= 10'', lambda x: x == 1.0); or with Great Expectations
        as a conditional expectation: expect_column_values_to_be_between(''result_margin'',
        min_value=None, max_value=10, condition_parser=''python'', row_condition="result.str.lower()
        == ''wickets''").'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
    - text: 'For every row, ''result_margin'' must be less than or equal to ''target_runs''.
        We could represent this with Deequ as: .satisfies("`result_margin` <= `target_runs`",
        ''Margin <= target_runs'', lambda x: x == 1.0); or with Great Expectations
        as: expect_column_pair_values_A_to_be_less_than_or_equal_to_B(''result_margin'',
        ''target_runs'').'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
  super_over:
    code:
    - suggestion: '.hasNumberOfDistinctValues("super_over", lambda n: n <= 2)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN CAST(super_over AS STRING) IN (''1'',''true'',''True'',''TRUE'',''Y'',''Yes'',''YES'',''T'',''t'')
        THEN CASE WHEN result = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "Super over
        only occurs for ties", lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''super_over'' column is a binary indicator representing whether
        a super over occurred. It should contain no more than two distinct non-null
        values (e.g., True/False, 1/0, or ''Y''/''N''). This can be represented as
        a Deequ constraint like: .hasNumberOfDistinctValues("super_over", lambda n:
        n <= 2). To allow matches with no super overs at all, the distinct count may
        be 1.'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
    - text: 'If ''super_over'' indicates that a super over occurred, then ''result''
        must be ''tie''. In other words, there must be no rows where ''super_over''
        is affirmative and ''result'' is not ''tie''. This can be represented as a
        Deequ constraint like: .satisfies("CASE WHEN CAST(super_over AS STRING) IN
        (''1'',''true'',''True'',''Y'',''Yes'') THEN CASE WHEN result = ''tie'' THEN
        1 ELSE 0 END ELSE 1 END", "Super over only occurs for ties", lambda x: x ==
        1.0).'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
  target_overs:
    code:
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasDataType(''target_overs'', ConstrainableDataTypes.Integral,
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN target_overs >= 0 THEN 1 ELSE 0 END'', ''Non-negative
        target_overs'', lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN target_overs <= 20 THEN 1 ELSE 0 END'',
        ''Target overs <= 20'', lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''target_overs'' column must never exceed 20. We could represent
        this assumption as a Deequ constraint like this: .satisfies(''CASE WHEN target_overs
        <= 20 THEN 1 ELSE 0 END'', ''Target overs <= 20'', lambda x: x == 1.0)'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
    - text: 'The ''target_overs'' column should be complete (no nulls) so the rule
        can be validated for every record. We could represent this assumption as a
        Deequ constraint like this: .hasCompleteness(''target_overs'', lambda x: x
        == 1.0)'
      sources:
      - start_line: 3
        end_line: 4
        file: ''
    - text: 'The ''target_overs'' column should be numeric, ideally an integer count
        of overs. We could represent this assumption as a Deequ constraint like this:
        .hasDataType(''target_overs'', ConstrainableDataTypes.Integral, lambda x:
        x == 1.0)'
      sources:
      - start_line: 3
        end_line: 4
        file: ''
    - text: 'The ''target_overs'' column should be non-negative (overs cannot be less
        than 0). We could represent this assumption as a Deequ constraint like this:
        .satisfies(''CASE WHEN target_overs >= 0 THEN 1 ELSE 0 END'', ''Non-negative
        target_overs'', lambda x: x == 1.0)'
      sources:
      - start_line: 3
        end_line: 4
        file: ''
  target_runs:
    code:
    - suggestion: '.satisfies("`target_runs` IS NOT NULL", "target_runs is complete",
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasDataType("target_runs", ConstrainableDataTypes.Integral, lambda
        x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_runs` >= 0 THEN 1 ELSE 0 END", "Non-negative
        target_runs", lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result_margin` IS NULL THEN 1 WHEN `target_runs`
        IS NULL THEN 0 ELSE CASE WHEN `result_margin` <= `target_runs` THEN 1 ELSE
        0 END END", "Result margin not above target runs", lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: The 'target_runs' column must be complete (no nulls), since it is directly
        compared against 'result_margin' without any null handling in the downstream
        validation.
      sources:
      - start_line: 7
        end_line: 7
        file: ''
    - text: The 'target_runs' column must be numeric integral (integer) to support
        the comparison with 'result_margin' in the downstream rule. A suitable constraint
        would be to enforce an integral data type.
      sources:
      - start_line: 7
        end_line: 7
        file: ''
    - text: 'The ''target_runs'' column should be non-negative, as negative targets
        are not meaningful and would invalidate the comparison with a (non-negative)
        ''result_margin''. This can be enforced with a rule like: .satisfies("CASE
        WHEN `target_runs` >= 0 THEN 1 ELSE 0 END", "Non-negative target_runs", lambda
        x: x == 1.0).'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
    - text: 'For every row where ''result_margin'' is not null, ''result_margin''
        must be less than or equal to ''target_runs''. This can be represented as:
        .satisfies("CASE WHEN `result_margin` IS NULL THEN 1 WHEN `target_runs` IS
        NULL THEN 0 ELSE CASE WHEN `result_margin` <= `target_runs` THEN 1 ELSE 0
        END END", "Result margin not above target runs", lambda x: x == 1.0).'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
column_data_flow_locations:
  target_overs: []
  super_over: []
  result: []
  result_margin: []
  target_runs: []
