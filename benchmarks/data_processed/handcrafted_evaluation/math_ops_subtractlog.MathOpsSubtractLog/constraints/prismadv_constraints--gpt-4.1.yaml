    assumptions:
    - text: 'The ''cost'' column must contain only non-null integer values, since
        it is used in arithmetic operations and there is no null handling in the code.
        The column should not contain any missing values at all.

        We could represent this assumption as a deequ constraint like this:

        .hasCompleteness(''cost'', lambda x: x == 1.0)

        .isNonNegative(''cost'') # if negative values are not expected, though here
        only subtraction is performed.'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
    - text: 'All values in the ''cost'' column should be greater than 23, since the
        code subtracts 23 and then applies the logarithm (which is only defined for
        positive numbers). If any value is less than or equal to 23, math.log will
        fail.

        We could represent this assumption as a deequ constraint like this:

        .satisfies(''cost > 23'', ''Cost greater than 23'', lambda x: x == 1.0)'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
