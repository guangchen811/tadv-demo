constraints:
  cost:
    code:
    - suggestion: '.hasCompleteness("cost", lambda v: v == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("cast(`cost` as double) is not null AND isfinite(cast(`cost`
        as double))", "Cost must be numeric and finite", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("`cost` > 23", "Cost must be > 23", lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''cost'' column must be complete (no nulls), since the code subtracts
        23 and then applies a logarithm without any null handling. This can be validated
        with Deequ as: .hasCompleteness("cost", lambda v: v == 1.0), or with Great
        Expectations: expect_column_values_to_not_be_null.'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
    - text: 'The ''cost'' column must be numeric and finite (integers/floats), because
        subtraction and math.log require numeric inputs. This can be validated with
        Deequ as a data type check (e.g., .hasDataType("cost", ConstrainableDataTypes.Integral)
        or ConstrainableDataTypes.Fractional) and with Great Expectations: expect_column_values_to_be_in_type_list
        (e.g., ["int", "long", "float", "double"]).'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
    - text: 'All ''cost'' values must be strictly greater than 23 so that (cost -
        23) > 0 and math.log is defined. This can be validated with Deequ: .satisfies("`cost`
        > 23", "Cost must be > 23", lambda r: r == 1.0), or with Great Expectations:
        expect_column_values_to_be_between(min_value=23, strict_min=True).'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
