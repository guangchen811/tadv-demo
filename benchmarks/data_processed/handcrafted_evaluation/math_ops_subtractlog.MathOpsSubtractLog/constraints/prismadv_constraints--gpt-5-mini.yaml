constraints:
  cost:
    code:
    - suggestion: '.satisfies("CASE WHEN `cost` IS NOT NULL THEN 1 ELSE 0 END", "Non-null
        cost", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`cost` AS DOUBLE) IS NOT NULL THEN
        1 ELSE 0 END", "Cost is numeric", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`cost` AS DOUBLE) > 23 THEN 1 ELSE
        0 END", "Cost > 23 (log input positive)", lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''cost'' column must be non-null for all rows because the code subtracts
        23 and then applies math.log without any null-handling. Represent as a completeness
        constraint, e.g. Deequ: .satisfies("CASE WHEN `cost` IS NOT NULL THEN 1 ELSE
        0 END", "Non-null cost", lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
    - text: 'The ''cost'' column must be numeric/integer so arithmetic subtraction
        and math.log are valid. Represent as a predicate that values can be cast to
        numeric, e.g. .satisfies("CASE WHEN TRY_CAST(`cost` AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END", "Cost is numeric", lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
    - text: 'After subtracting 23 the value passed to math.log must be positive, i.e.
        cost - 23 > 0. Therefore the input ''cost'' must be strictly greater than
        23 for every row. Represent as: .satisfies("CASE WHEN `cost` > 23 THEN 1 ELSE
        0 END", "Cost > 23", lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
