constraints:
- .isComplete('toss_winner')
- .hasDataType('toss_winner', ConstrainableDataTypes.String)
- '.hasPattern(''toss_winner'', r''.+'', ''toss_winner_not_empty'', lambda v: v ==
  1.0)'
- '.satisfies(''(toss_winner = team1) OR (toss_winner = team2)'', ''toss_winner_is_team1_or_team2'',
  lambda v: v == 1.0)'
