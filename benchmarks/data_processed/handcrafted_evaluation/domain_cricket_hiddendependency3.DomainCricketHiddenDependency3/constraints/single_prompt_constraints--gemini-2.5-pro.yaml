constraints:
- .isComplete('toss_winner')
- .satisfies("toss_winner = team1 OR toss_winner = team2", 'toss_winner must be one
  of the playing teams')
- .satisfies("(SELECT sum(case when toss_winner = team1 then 1.0 else 0.0 end) / count(*)
  FROM __THIS__) BETWEEN 0.4 AND 0.6", 'Home team toss win rate should be between
  40% and 60%')
