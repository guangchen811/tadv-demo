constraints:
  team1:
    code:
    - suggestion: '.hasSize(lambda n: n > 0)'
      validity: null
      level: error
    - suggestion: '.hasCompleteness(''team1'', lambda c: c == 1.0)'
      validity: null
      level: warning
    - suggestion: '.hasDataType(''team1'', ConstrainableDataTypes.String, lambda x:
        x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies(''team1 = trim(team1)'', ''team1_trimmed'', lambda x:
        x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies(''toss_winner = team1'', ''home_toss_win_rate'', lambda
        x: x >= 0.4 and x <= 0.6)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''team1'' column must be complete (no nulls) so that the equality
        check with ''toss_winner'' is meaningful and not biased by missing values.
        Deequ example: .hasCompleteness(''team1'', lambda c: c == 1.0). Great Expectations
        example: expect_column_values_to_not_be_null(''team1'').'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''team1'' column should be of string/categorical type and use a consistent
        canonical format (e.g., trimmed, no leading/trailing spaces) so that exact
        string equality with ''toss_winner'' works as intended. Deequ examples: .hasDataType(''team1'',
        ConstrainableDataTypes.String) and .satisfies(''team1 = trim(team1)'', ''team1_trimmed'',
        lambda x: x == 1.0). Great Expectations examples: expect_column_values_to_be_of_type(''team1'',
        ''object'') and expect_column_values_to_not_match_regex(''team1'', ''^\\s|\\s$'').'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The input dataset (and thus the ''team1'' column) must have at least
        one row to avoid division by zero when computing the rate. Deequ example:
        .hasSize(lambda n: n > 0). Great Expectations example: expect_table_row_count_to_be_between(min_value=1).'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The fraction of rows where toss_winner equals team1 should be between
        0.4 and 0.6 (inclusive). Deequ example: .satisfies(''CASE WHEN toss_winner
        = team1 THEN 1 ELSE 0 END'', ''home_toss_win_rate'', lambda x: x >= 0.4 and
        x <= 0.6). Great Expectations example: expect_condition_value_counts_to_be_between(condition=''toss_winner
        == team1'', min_value=0.4, max_value=0.6, mostly=1.0).'
      sources:
      - start_line: 2
        end_line: 4
        file: ''
  toss_winner:
    code:
    - suggestion: '.hasCompleteness(''toss_winner'', lambda v: v == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `toss_winner` = `team1` OR `toss_winner`
        = `team2` THEN 1 ELSE 0 END'', ''Toss winner is a participating team'', lambda
        r: r == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `toss_winner` = `team1` THEN 1 ELSE 0 END'',
        ''Share of toss_winner equal to team1'', lambda r: r >= 0.4 and r <= 0.6)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''toss_winner'' column must be complete (no nulls) for all rows,
        since the code compares it directly to ''team1'' and divides by the total
        number of rows without excluding nulls. A suitable Deequ rule could be: .hasCompleteness(''toss_winner'',
        lambda v: v == 1.0).'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'Each ''toss_winner'' value should be one of the two participating teams
        in the same row (either ''team1'' or ''team2''), so the comparison to ''team1''
        is meaningful. A suitable Deequ rule could be: .satisfies(''CASE WHEN `toss_winner`
        = `team1` OR `toss_winner` = `team2` THEN 1 ELSE 0 END'', ''Toss winner is
        a participating team'', lambda r: r == 1.0).'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The proportion of rows where ''toss_winner'' equals ''team1'' should
        be between 40% and 60%, otherwise the downstream code flags it as suspicious.
        A suitable Deequ rule could be: .satisfies(''CASE WHEN `toss_winner` = `team1`
        THEN 1 ELSE 0 END'', ''Share of toss_winner equal to team1'', lambda r: r
        >= 0.4 and r <= 0.6).'
      sources:
      - start_line: 2
        end_line: 4
        file: ''
