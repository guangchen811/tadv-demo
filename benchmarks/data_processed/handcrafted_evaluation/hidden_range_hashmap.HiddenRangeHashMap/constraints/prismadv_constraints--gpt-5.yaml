constraints:
  booking_id:
    code:
    - suggestion: '.satisfies("status IS NULL OR booking_id IS NOT NULL", "booking_id
        present when status present", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasDataType("booking_id", ConstrainableDataTypes.Integral, lambda
        x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: .isUnique("booking_id")
      validity: null
      level: warning
    assumptions:
    - text: 'The ''booking_id'' must be present (non-null) whenever ''status'' is
        not null, since it is passed to schedule_next_action without its own null
        check. We could represent this as a Deequ constraint like: .satisfies("CASE
        WHEN status IS NOT NULL THEN CASE WHEN booking_id IS NOT NULL THEN 1 ELSE
        0 END ELSE 1 END", "booking_id present when status present", lambda x: x ==
        1.0).'
      sources:
      - start_line: 9
        end_line: 11
        file: ''
    - text: 'The ''booking_id'' should be an integer identifier (integral type), i.e.,
        values should not contain decimals or non-numeric strings. This can be enforced
        with Deequ: .hasDataType("booking_id", ConstrainableDataTypes.Integral).'
      sources:
      - start_line: 11
        end_line: 11
        file: ''
    - text: 'The ''booking_id'' should be unique across rows to avoid scheduling duplicate
        actions for the same booking. This can be enforced with Deequ: .isUnique("booking_id")
        (or .uniqueValueRatio("booking_id", lambda x: x == 1.0)).'
      sources:
      - start_line: 11
        end_line: 11
        file: ''
  status:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` IS NULL THEN true ELSE TRIM(`status`)
        IN (''COMPLETED'', ''CANCELLED'', ''IN_PROGRESS'', ''UNDER_REVIEW'') END",
        "status in allowed set when not null", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.hasDataType("status", ConstrainableDataTypes.String, lambda x:
        x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'For any non-null ''status'', its trimmed value must be one of: COMPLETED,
        CANCELLED, IN_PROGRESS, UNDER_REVIEW. Enforce via a membership rule that ignores
        nulls (e.g., compliance: CASE WHEN status IS NULL THEN true ELSE TRIM(status)
        IN (COMPLETED, CANCELLED, IN_PROGRESS, UNDER_REVIEW) END must be 100%; or
        GE expect_column_values_to_be_in_set with nulls ignored).'
      sources:
      - start_line: 1
        end_line: 6
        file: ''
      - start_line: 9
        end_line: 11
        file: ''
    - text: The 'status' column may be null; rows with null status are intentionally
        skipped, so no strict not-null constraint should be enforced on this column.
      sources:
      - start_line: 9
        end_line: 9
        file: ''
    - text: '''status'' should be string/text so that exact matching against the mapping
        keys works; enforce string type for this column to avoid non-string values
        being treated as unknown.'
      sources:
      - start_line: 1
        end_line: 6
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
