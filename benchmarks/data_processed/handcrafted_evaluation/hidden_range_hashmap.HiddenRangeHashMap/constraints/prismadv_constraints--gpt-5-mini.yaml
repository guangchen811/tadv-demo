        end_line: 6
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
    - text: 'The ''status'' column should be a categorical string with low cardinality
        (no more than the mapping keys). We could express this as a constraint on
        distinct count: .satisfies("CASE WHEN distinct_count(`status`) <= 4 THEN 1
        ELSE 0 END", "StatusCardinalityAtMost4", lambda x: x == 1). This protects
        against unexpected proliferation of status values that the code does not handle.'
      sources:
