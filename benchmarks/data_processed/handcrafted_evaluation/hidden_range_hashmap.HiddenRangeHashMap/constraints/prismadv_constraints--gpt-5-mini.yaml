        IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'') OR `status`
        IS NULL THEN 1 ELSE 0 END", "StatusTrimmedAndExactMatch", lambda x: x == 1).'
      sources:
