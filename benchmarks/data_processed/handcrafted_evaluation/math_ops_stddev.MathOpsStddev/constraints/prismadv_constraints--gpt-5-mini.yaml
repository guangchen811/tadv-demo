constraints:
  cost:
    code:
    - suggestion: '.satisfies("CASE WHEN `cost` IS NOT NULL THEN 1 ELSE 0 END", "Non-null
        cost", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN regexp_like(cast(`cost` AS STRING), ''^-?\\d+$'')
        THEN 1 ELSE 0 END", "Integer-like cost values", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN stddev(`cost`) > 0 THEN 1 ELSE 0 END", "Positive
        cost stddev", lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''cost'' column must not contain null (missing) values because the
        code computes df[''cost''].mean() and df[''cost''].std() and then divides
        by the std. If nulls are present, the mean/std may be computed on fewer rows
        and downstream normalization may be incorrect. Represent as a validation rule
        (Deequ-like): .satisfies("CASE WHEN `cost` IS NOT NULL THEN 1 ELSE 0 END",
        "Non-null cost", lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''cost'' column must be numeric (integral or convertible to numeric)
        so that mean() and std() are valid operations. Represent as a validation rule:
        .satisfies("CASE WHEN regexp_like(cast(`cost` AS STRING), ''^-?\\d+$'') THEN
        1 ELSE 0 END", "Integer-like cost values", lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''cost'' column should have non-zero variance (standard deviation
        > 0). If all values are identical (std == 0) the normalization divides by
        zero and will produce NaNs/Infs. Represent as a validation rule: .satisfies("CASE
        WHEN stddev(`cost`) > 0 THEN 1 ELSE 0 END", "Positive cost stddev", lambda
        x: x == 1)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
