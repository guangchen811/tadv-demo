constraints:
  result:
    code:
    - suggestion: '.satisfies("result IN (''runs'', ''wickets'', ''tie'')", "result_allowed_values",
        lambda v: v == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("result IS NOT NULL", "result_non_null", lambda v: v
        == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("(NOT super_over) OR (result = ''tie'')", "super_over_implies_tie",
        lambda v: v == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("(result <> ''wickets'') OR (result_margin <= 10)",
        "wickets_margin_cap", lambda v: v == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''result'' column is a categorical string with allowed values exclusively
        in {''runs'', ''wickets'', ''tie''} (lowercase). No other values are expected.
        We could represent this as: Deequ -> .isContainedIn("result", ["runs", "wickets",
        "tie"]) or Great Expectations -> expect_column_values_to_be_in_set(column="result",
        value_set=["runs", "wickets", "tie"]).'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
    - text: 'The ''result'' column must be non-null for all rows, since downstream
        rules compare it to literal strings (''tie'', ''wickets''). We could represent
        this as: Deequ -> .hasCompleteness("result", lambda v: v == 1.0) or Great
        Expectations -> expect_column_values_to_not_be_null(column="result").'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
    - text: 'If super_over is true for a row, then result must equal ''tie''. We could
        represent this as: Deequ -> .satisfies("(super_over = TRUE) <= (result = ''tie'')",
        "super_over_implies_tie", lambda v: v == 1.0) or equivalently .satisfies("CASE
        WHEN super_over = TRUE THEN CASE WHEN result = ''tie'' THEN 1 ELSE 0 END ELSE
        1 END", "super_over_implies_tie", lambda v: v == 1.0). In Great Expectations,
        use expect_multicolumn_condition to assert: NOT super_over OR result = ''tie''.'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
    - text: 'If result = ''wickets'', then result_margin must be <= 10. We could represent
        this as: Deequ -> .satisfies("CASE WHEN result = ''wickets'' THEN result_margin
        <= 10 ELSE TRUE END", "wickets_margin_cap", lambda v: v == 1.0) or Great Expectations
        -> expect_multicolumn_condition to assert: (result != ''wickets'') OR (result_margin
        <= 10).'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
  result_margin:
    code:
    - suggestion: '.hasCompleteness("result_margin", lambda v: v == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("`result_margin` = CAST(`result_margin` AS BIGINT)",
        "result_margin is integer", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN (`result_margin`
        <= 10) ELSE true END", "Wickets margin upper bound", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `target_runs` IS NOT NULL THEN (`result_margin`
        <= `target_runs`) ELSE true END", "Margin not above target_runs", lambda x:
        x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''result_margin'' column must be non-null for all input rows, since
        downstream validation rules compare it numerically. Possible Deequ rule: .hasCompleteness("result_margin",
        lambda v: v == 1.0). Great Expectations equivalent: expect_column_values_to_not_be_null.'
      sources:
      - start_line: 6
        end_line: 7
        file: ''
    - text: 'The ''result_margin'' column must contain integer numeric values (parsable
        to integers), because it is used in numeric comparisons. This can be enforced
        with a Deequ rule such as: .satisfies("`result_margin` = cast(`result_margin`
        AS BIGINT)", "result_margin is integer", lambda x: x == 1.0), or with Great
        Expectations: expect_column_values_to_be_in_type_list with types ["INTEGER",
        "BIGINT", "LONG"].'
      sources:
      - start_line: 6
        end_line: 7
        file: ''
    - text: 'If the match result is ''wickets'', then ''result_margin'' must be less
        than or equal to 10. Deequ example: .satisfies("CASE WHEN `result` = ''wickets''
        THEN (`result_margin` <= 10) ELSE true END", "Wickets margin upper bound",
        lambda x: x == 1.0).'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
    - text: 'For every row, ''result_margin'' must be less than or equal to ''target_runs''.
        Deequ example: .satisfies("CASE WHEN `target_runs` IS NOT NULL THEN (`result_margin`
        <= `target_runs`) ELSE true END", "Margin not above target_runs", lambda x:
        x == 1.0).'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
  super_over:
    code:
    - suggestion: '.satisfies("lower(trim(cast(`super_over` as string))) IN (''0'',''1'',''true'',''false'',''y'',''n'',''yes'',''no'',''t'',''f'')",
        "super_over only has binary-like tokens", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.hasApproxCountDistinct(''super_over'', lambda x: x <= 2)'
      validity: null
      level: error
    - suggestion: '.satisfies("(CASE WHEN lower(trim(cast(`super_over` as string)))
        IN (''1'',''true'',''y'',''yes'',''t'') THEN lower(trim(`result`)) = ''tie''
        ELSE TRUE END) AND (CASE WHEN lower(trim(`result`)) <> ''tie'' THEN lower(trim(cast(`super_over`
        as string))) IN (''0'',''false'',''n'',''no'',''f'') ELSE TRUE END)", "Super
        over consistency with result tie", lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: The 'super_over' column is a binary indicator denoting whether a super
        over occurred in the match. It should contain only two distinct values representing
        'yes' or 'no' (for example, {0,1} or {False,True} or {'N','Y'}) and no other
        categories.
      sources:
      - start_line: 5
        end_line: 5
        file: ''
    - text: For any row where 'super_over' indicates that a super over occurred (e.g.,
        values like 1/True/'Y'), the 'result' must be 'tie' (case-insensitive). Equivalently,
        if 'result' is not 'tie', then 'super_over' must indicate no super over (e.g.,
        0/False/'N').
      sources:
      - start_line: 5
        end_line: 5
        file: ''
  target_overs:
    code:
    - suggestion: '.hasDataType(''target_overs'', ConstrainableDataTypes.Numeric,
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasCompleteness(''target_overs'', lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''`target_overs` <= 20'', ''target_overs_max_20'', lambda
        x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''`target_overs` >= 0'', ''target_overs_non_negative'',
        lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''target_overs'' column must be numeric and non-null so the ''never
        above 20'' rule can be evaluated reliably. Possible validations: Deequ ->
        hasDataType(''target_overs'', ConstrainableDataTypes.Numeric) and hasCompleteness(''target_overs'',
        lambda c: c == 1.0); Great Expectations -> expect_column_values_to_not_be_null(''target_overs'')
        and expect_column_values_to_be_in_type_list(''target_overs'', [''INTEGER'',
        ''FLOAT'', ''DOUBLE'', ''DECIMAL'']).'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
    - text: 'All ''target_overs'' values must be less than or equal to 20 (T20 games
        can be reduced by rain but must never exceed 20 overs). Possible validations:
        Deequ -> satisfies(''`target_overs` <= 20'', ''target_overs_max_20'', lambda
        x: x == 1.0); Great Expectations -> expect_column_values_to_be_between(''target_overs'',
        max_value=20, strict_max=true).'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
    - text: '''target_overs'' should not contain negative values. Possible validations:
        Deequ -> satisfies(''`target_overs` >= 0'', ''target_overs_non_negative'',
        lambda x: x == 1.0); Great Expectations -> expect_column_values_to_be_between(''target_overs'',
        min_value=0, strict_min=false).'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
  target_runs:
    code:
    - suggestion: .isComplete('target_runs')
      validity: null
      level: error
    - suggestion: '.hasDataType(''target_runs'', ConstrainableDataTypes.Integral,
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN result_margin IS NULL THEN 1 WHEN target_runs
        >= result_margin THEN 1 ELSE 0 END", "margin_le_target", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN target_runs >= 0 THEN 1 ELSE 0 END", "non_negative_target_runs",
        lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''target_runs'' column must be present (non-null) for all records
        so that the comparison with ''result_margin'' can be performed. We could represent
        this assumption as a Deequ constraint like: .isComplete(''target_runs'').'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
    - text: 'The ''target_runs'' column should contain integer numeric values to support
        numeric comparison against ''result_margin''. We could represent this assumption
        as a Deequ constraint like: .hasDataType(''target_runs'', ConstrainableDataTypes.Integral,
        matchFull=True).'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
    - text: 'For every row where ''result_margin'' is not null, ''target_runs'' must
        be greater than or equal to ''result_margin''. We could represent this assumption
        as a Deequ constraint like: .satisfies("CASE WHEN result_margin IS NULL THEN
        1 WHEN target_runs >= result_margin THEN 1 ELSE 0 END", "margin_le_target",
        lambda x: x == 1.0).'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
    - text: '''target_runs'' must be non-negative (>= 0), as negative runs are invalid
        and would contradict comparisons with a non-negative margin. We could represent
        this assumption as a Deequ constraint like: .satisfies("CASE WHEN target_runs
        >= 0 THEN 1 ELSE 0 END", "non_negative_target_runs", lambda x: x == 1.0).'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
column_data_flow_locations:
  target_overs: []
  super_over: []
  result: []
  result_margin: []
  target_runs: []
