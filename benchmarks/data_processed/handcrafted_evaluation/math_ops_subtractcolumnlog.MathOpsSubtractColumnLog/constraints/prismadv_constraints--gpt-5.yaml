constraints:
  cost:
    code:
    - suggestion: '.hasCompleteness("cost", lambda v: v == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("CAST(`cost` AS DOUBLE) IS NOT NULL AND NOT(is_nan(CAST(`cost`
        AS DOUBLE))) AND NOT(is_infinite(CAST(`cost` AS DOUBLE)))", "numeric_and_finite_cost",
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("(CAST(`profit` AS DOUBLE) - CAST(`cost` AS DOUBLE))
        > 0", "positive_profit_after_cost", lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''cost'' column should be complete (no nulls) in the input data so
        that dropping nulls does not remove rows needed downstream. This can be validated
        as: Deequ: .hasCompleteness("cost", lambda v: v == 1.0) or GE: expect_column_values_to_not_be_null.'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''cost'' column should be numeric (integral or fractional) and finite
        so it can participate in arithmetic with ''profit''. This can be validated
        as: Deequ: .hasDataType("cost", ConstrainableDataTypes.Integral) OR .hasDataType("cost",
        ConstrainableDataTypes.Fractional); and optionally .satisfies("NOT(is_nan(`cost`))
        AND NOT(is_infinite(`cost`))", "finite_cost", lambda x: x == 1.0). GE: expect_column_values_to_be_in_type_list
        with numeric types.'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'For all rows used downstream, ''profit'' must be strictly greater than
        ''cost'' so that profit_after_cost = profit - cost is positive and log(profit_after_cost)
        is defined. This can be validated as: Deequ: .satisfies("(`profit` - `cost`)
        > 0", "positive_profit_after_cost", lambda v: v == 1.0) or GE: expect_row_condition_to_be_true
        where condition is (profit - cost) > 0.'
      sources:
      - start_line: 2
        end_line: 3
        file: ''
  profit:
    code:
    - suggestion: '.hasCompleteness("profit", lambda c: c > 0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("`profit` IS NULL OR CAST(`profit` AS DOUBLE) IS NOT
        NULL", "Profit numeric when present", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("(`profit` IS NULL OR `cost` IS NULL) OR (CAST(`profit`
        AS DOUBLE) - CAST(`cost` AS DOUBLE) > 0)", "Positive profit_after_cost", lambda
        x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''profit'' column may contain null values because rows with null
        ''profit'' (and ''cost'') are explicitly dropped before any computation. To
        ensure there is at least some usable data, assume at least one row has a non-null
        ''profit''. We could represent this as a Deequ constraint like: .hasCompleteness("profit",
        lambda c: c > 0)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'All non-null values in ''profit'' must be numeric (integral or fractional)
        to allow subtraction and subsequent computations. We could represent this
        as a Deequ constraint like: .hasDataType("profit", ConstrainableDataTypes.Integral)
        or .hasDataType("profit", ConstrainableDataTypes.Fractional)'
      sources:
      - start_line: 2
        end_line: 3
        file: ''
    - text: 'For every row with non-null ''profit'' and ''cost'', ''profit'' must
        be strictly greater than ''cost'' so that profit_after_cost (= profit - cost)
        is positive and log(profit_after_cost) is defined. We could represent this
        as a Deequ constraint like: .satisfies("(`profit` IS NULL OR `cost` IS NULL)
        OR (`profit` - `cost` > 0)", "Positive profit_after_cost", lambda x: x ==
        1.0)'
      sources:
      - start_line: 2
        end_line: 3
        file: ''
