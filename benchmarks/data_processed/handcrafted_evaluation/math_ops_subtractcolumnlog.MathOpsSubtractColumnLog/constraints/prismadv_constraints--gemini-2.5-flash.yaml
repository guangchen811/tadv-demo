constraints:
  profit:
    code:
    - suggestion: '.satisfies("profit IS NOT NULL", "Non-null profit values for profit
        column", lambda x: x > 0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: dd278e5a-ef65-48b5-bd22-2b261cca8fba
      source_assumptions:
      - 1a527f1b-b19a-4f08-a646-6d4c7a475489
    - suggestion: '.hasDataType("profit", "Numeric", lambda x: x == 1.0)'
      validity: false
      reason_if_invalid: 'Skipping data type constraint: .hasDataType("profit", "Numeric",
        lambda x: x == 1.0)'
      level: error
      uid: e96b09d0-0093-4fba-803b-88183b661a74
      source_assumptions:
      - 5ef45b28-0732-4ea6-a90a-8dcab0b95998
    - suggestion: '.satisfies("CASE WHEN profit IS NOT NULL AND cost IS NOT NULL THEN
        profit > cost ELSE TRUE END", "Profit must be greater than cost for log operation",
        lambda x: x == 1.0)'
      validity: true
      reason_if_invalid: ''
      level: error
      uid: e0fb4ef8-7d9f-47ab-8698-57959da3eac3
      source_assumptions:
      - 901b5f9f-ca17-4e94-ad6b-6a89913eda6c
    assumptions:
    - text: 'The ''profit'' column could contain null values in the input data. The
        code explicitly handles these by dropping rows where ''profit'' (or ''cost'')
        is null. This implies that while nulls are permissible, it is assumed that
        not all values in the column will be null, as some non-null values are expected
        for downstream calculations. We could represent this assumption as a deequ
        constraint like this: .hasCompleteness("profit", _ >= 0.0) to allow for nulls,
        or .satisfies("profit IS NOT NULL", "Non-null profit values", lambda x: x
        > 0) to ensure at least some non-null values are present.'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
      uid: 1a527f1b-b19a-4f08-a646-6d4c7a475489
    - text: 'The ''profit'' column should be of a numeric data type (e.g., Integral
        or Fractional). This is an implicit assumption because arithmetic operations
        (subtraction) are performed on it to calculate ''profit_after_cost''. We could
        represent this assumption as a deequ constraint like this: .isDataType("profit",
        "Numeric").'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      uid: 5ef45b28-0732-4ea6-a90a-8dcab0b95998
    - text: 'For all rows where ''profit'' and ''cost'' are not null (i.e., after
        the `dropna` operation), the ''profit'' column''s value must be strictly greater
        than its corresponding ''cost'' column''s value (i.e., `profit > cost`). This
        is an implicit assumption because the `math.log` function, applied to `profit
        - cost`, requires its input to be strictly positive. We could represent this
        assumption as a deequ constraint like this: .satisfies("CASE WHEN profit IS
        NOT NULL AND cost IS NOT NULL THEN profit > cost ELSE TRUE END", "Profit must
        be greater than cost for log operation", lambda x: x == 1.0).'
      sources:
      - start_line: 2
        end_line: 3
        file: ''
      uid: 901b5f9f-ca17-4e94-ad6b-6a89913eda6c
