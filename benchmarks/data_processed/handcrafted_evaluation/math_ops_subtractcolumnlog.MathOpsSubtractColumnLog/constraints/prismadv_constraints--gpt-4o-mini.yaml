constraints:
  cost:
    code:
    - suggestion: '.satisfies(''CASE WHEN `cost` IS NULL THEN 1 ELSE 0 END'', ''Null
        Cost Values'', lambda x: x == 0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `cost` < 0 THEN 1 ELSE 0 END'', ''Negative
        Cost Values'', lambda x: x == 0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''cost'' column should not contain any null values, as the code drops
        rows with null values in the ''cost'' column before performing calculations.
        We could represent this assumption as a deequ constraint like this: .satisfies(''CASE
        WHEN `cost` IS NULL THEN 1 ELSE 0 END'', ''Null Cost Values'', lambda x: x
        == 0)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''cost'' column must have non-negative values, as it is used in a
        calculation where profit is reduced by cost, implying that cost should not
        exceed profit. We could represent this assumption as a deequ constraint like
        this: .satisfies(''CASE WHEN `cost` < 0 THEN 1 ELSE 0 END'', ''Negative Cost
        Values'', lambda x: x == 0)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
  profit:
    code:
    - suggestion: .isComplete('profit')
      validity: null
      level: undefined
    - suggestion: .isNonNegative('profit')
      validity: null
      level: undefined
    assumptions:
    - text: The 'profit' column must not contain any null values, as the code drops
        rows with null values in the 'profit' column before performing any calculations.
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: The 'profit' column must contain only non-negative values since the log
        transformation applied on 'profit_after_cost' requires all values to be greater
        than zero.
      sources:
      - start_line: 3
        end_line: 3
        file: ''
  profit_after_cost:
    code:
    - suggestion: '.satisfies("CASE WHEN `profit` IS NULL OR `cost` IS NULL THEN 1
        ELSE 0 END", "Null Profit or Cost Values", lambda x: x == 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `profit_after_cost` IS NULL THEN 1 ELSE 0
        END", "Null Profit After Cost Values", lambda x: x == 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `profit_after_cost` <= 0 THEN 1 ELSE 0 END",
        "Non-positive Profit After Cost Values", lambda x: x == 0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''profit'' and ''cost'' columns may contain null values, as the code
        drops rows with null values in these columns before calculating ''profit_after_cost''.
        We could represent this assumption as a deequ constraint like this: .satisfies("CASE
        WHEN `profit` IS NULL OR `cost` IS NULL THEN 1 ELSE 0 END", "Null Profit or
        Cost Values", lambda x: x == 0)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''profit_after_cost'' column should not contain null values, as it
        is derived from the subtraction of ''cost'' from ''profit''. This implies
        that both ''profit'' and ''cost'' must have valid (non-null) values for the
        calculation. We could represent this assumption as a deequ constraint like
        this: .satisfies("CASE WHEN `profit_after_cost` IS NULL THEN 1 ELSE 0 END",
        "Null Profit After Cost Values", lambda x: x == 0)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''profit_after_cost'' column must have positive values before applying
        the logarithm function, as the logarithm of zero or negative numbers is undefined.
        This means that ''profit'' must be greater than ''cost''. We could represent
        this assumption as a deequ constraint like this: .satisfies("CASE WHEN `profit_after_cost`
        <= 0 THEN 1 ELSE 0 END", "Non-positive Profit After Cost Values", lambda x:
        x == 0)'
      sources:
      - start_line: 3
        end_line: 3
        file: ''
  profit_after_cost_smoothed:
    code:
    - suggestion: .isComplete('profit')
      validity: null
      level: undefined
    - suggestion: .isComplete('cost')
      validity: null
      level: undefined
    - suggestion: .satisfies('profit >= cost', 'Valid Profit After Cost')
      validity: null
      level: undefined
    - suggestion: .satisfies('profit_after_cost > 0', 'Valid Profit After Cost Smoothed')
      validity: null
      level: undefined
    assumptions:
    - text: The 'profit' and 'cost' columns may contain null values, as the code drops
        rows with null values in these columns before calculating 'profit_after_cost'.
        Therefore, the input data for 'profit' and 'cost' should not have any null
        values.
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''profit_after_cost'' column must be non-negative because it is calculated
        as ''profit'' minus ''cost'', and the assumption is that ''profit'' is greater
        than or equal to ''cost'' for valid entries. This can be represented as a
        deequ constraint like this: .satisfies(''profit >= cost'', ''Valid Profit
        After Cost'')'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: The 'profit_after_cost_smoothed' column must have values greater than
        zero, as the code applies a logarithm function which is only defined for positive
        values. Therefore, the input data for 'profit_after_cost' must be greater
        than zero.
      sources:
      - start_line: 3
        end_line: 3
        file: ''
