constraints:
  profit:
    code:
    - suggestion: '.satisfies(''CASE WHEN `profit` IS NOT NULL THEN 1 ELSE 0 END'',
        ''Non-null profit fraction'', lambda x: x > 0)'
      validity: null
      level: warning
    - suggestion: '.satisfies(''CASE WHEN TRY_CAST(`profit` AS DOUBLE) IS NOT NULL
        THEN 1 ELSE 0 END'', ''Profit is numeric'', lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `profit` IS NOT NULL AND `cost` IS NOT NULL
        AND (`profit` - `cost`) > 0 THEN 1 ELSE 0 END'', ''profit_minus_cost_positive'',
        lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The input ''profit'' column may contain null values because the code
        explicitly drops rows with nulls in [''profit'', ''cost''] (df.dropna). The
        pipeline therefore tolerates nulls in the raw input but will remove those
        rows before downstream arithmetic. Example validation (ensure there is at
        least some non-null data or decide acceptable null fraction): .satisfies(''CASE
        WHEN `profit` IS NOT NULL THEN 1 ELSE 0 END'', ''Non-null profit fraction'',
        lambda x: x > 0)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''profit'' column must be numeric/integral (or castable to numeric)
        because the code subtracts ''cost'' from ''profit'' (df[''profit''] - df[''cost'']).
        Validate that values are numeric/castable to double/integer. Example validation:
        .satisfies(''CASE WHEN TRY_CAST(`profit` AS DOUBLE) IS NOT NULL THEN 1 ELSE
        0 END'', ''Profit is numeric'', lambda x: x == 1)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'For math.log to succeed, the computed profit_after_cost (= profit - cost)
        must be strictly positive for all rows that remain after dropping nulls. In
        input terms this means: for every row where profit and cost are both present,
        profit > cost. Example validation: .satisfies(''CASE WHEN `profit` IS NOT
        NULL AND `cost` IS NOT NULL AND (`profit` - `cost`) > 0 THEN 1 ELSE 0 END'',
        ''profit_minus_cost_positive'', lambda x: x == 1)'
      sources:
      - start_line: 2
        end_line: 3
        file: ''
