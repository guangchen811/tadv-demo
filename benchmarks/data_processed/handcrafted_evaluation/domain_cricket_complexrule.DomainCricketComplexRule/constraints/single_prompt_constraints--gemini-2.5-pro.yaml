constraints:
- .satisfies("CASE WHEN (toss_decision = 'bat' AND winner = toss_winner) OR (toss_decision
  = 'field' AND winner <> toss_winner) THEN result = 'runs' WHEN (toss_decision =
  'field' AND winner = toss_winner) OR (toss_decision = 'bat' AND winner <> toss_winner)
  THEN result = 'wickets' ELSE 1=1 END", "Result consistency with toss and winner")
