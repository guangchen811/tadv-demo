constraints:
- .isComplete('result')
- .isContainedIn('result', ['runs', 'wickets'])
- .satisfies("CASE WHEN toss_decision = 'bat' AND winner = toss_winner THEN result
  = 'runs' ELSE TRUE END", "Result must be 'runs' when toss winner bats and wins")
- .satisfies("CASE WHEN toss_decision = 'field' AND winner != toss_winner THEN result
  = 'runs' ELSE TRUE END", "Result must be 'runs' when toss winner fields and loses")
- .satisfies("CASE WHEN toss_decision = 'field' AND winner = toss_winner THEN result
  = 'wickets' ELSE TRUE END", "Result must be 'wickets' when toss winner fields and
  wins")
- .satisfies("CASE WHEN toss_decision = 'bat' AND winner != toss_winner THEN result
  = 'wickets' ELSE TRUE END", "Result must be 'wickets' when toss winner bats and
  loses")
