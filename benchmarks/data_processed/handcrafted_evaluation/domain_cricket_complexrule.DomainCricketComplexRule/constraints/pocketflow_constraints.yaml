constraints:
- .isComplete('result')
- .hasOnlyValues('result', ['runs', 'wickets'])
- .assertion('ALL rows where toss_decision == "bat" and winner == toss_winner have
  result == "runs"', 'Result should be "runs" when toss_decision="bat" and winner
  == toss_winner')
- .assertion('ALL rows where toss_decision == "bat" and winner != toss_winner have
  result == "wickets"', 'Result should be "wickets" when toss_decision="bat" and winner
  != toss_winner')
- .assertion('ALL rows where toss_decision == "field" and winner == toss_winner have
  result == "wickets"', 'Result should be "wickets" when toss_decision="field" and
  winner == toss_winner')
- .assertion('ALL rows where toss_decision == "field" and winner != toss_winner have
  result == "runs"', 'Result should be "runs" when toss_decision="field" and winner
  != toss_winner')
