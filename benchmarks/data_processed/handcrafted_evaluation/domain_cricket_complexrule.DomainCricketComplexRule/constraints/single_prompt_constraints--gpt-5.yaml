constraints:
- .isComplete('result')
- .isContainedIn('result', ['runs', 'wickets'])
- .satisfies("NOT (toss_decision = 'bat' AND winner = toss_winner) OR result = 'runs'",
  'result_runs_when_bat_and_winner')
- .satisfies("NOT (toss_decision = 'field' AND winner != toss_winner) OR result =
  'runs'", 'result_runs_when_field_and_not_winner')
- .satisfies("NOT (toss_decision = 'field' AND winner = toss_winner) OR result = 'wickets'",
  'result_wickets_when_field_and_winner')
- .satisfies("NOT (toss_decision = 'bat' AND winner != toss_winner) OR result = 'wickets'",
  'result_wickets_when_bat_and_not_winner')
