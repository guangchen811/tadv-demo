constraints:
- '.satisfies("status != ''COMPLETED'' OR email IS NOT NULL", ''email_present_when_completed'',
  lambda v: v == 1.0)'
- '.satisfies("status != ''COMPLETED'' OR (email IS NOT NULL AND TRIM(email) <> '''')",
  ''email_non_empty_when_completed'', lambda v: v == 1.0)'
- '.satisfies("status != ''COMPLETED'' OR (email IS NOT NULL AND email RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+[.][A-Za-z]{2,}$'')",
  ''email_format_when_completed'', lambda v: v == 1.0)'
