constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' THEN email IS NOT
        NULL ELSE TRUE END", "Email not null when status is COMPLETED", lambda x:
        x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' THEN email RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$''
        ELSE TRUE END", "Valid email format when status is COMPLETED", lambda x: x
        == 1)'
      validity: null
      level: error
    assumptions:
    - text: The 'email' column can contain null values in the input data, as the code
        does not drop or fill nulls in 'email' before using it. However, since the
        code collects emails for rows where 'status' == 'COMPLETED' and then uses
        these emails in the send_email function, it implicitly assumes that for rows
        with 'status' == 'COMPLETED', the 'email' field should not be null. Otherwise,
        send_email would be called with a null value.
      sources:
      - start_line: 5
        end_line: 9
        file: ''
    - text: The 'email' column should contain valid email addresses (i.e., strings
        that look like valid emails) for all rows where 'status' == 'COMPLETED', because
        these values are used as recipients in send_email. If an invalid or malformed
        email is present, the downstream email sending logic may fail.
      sources:
      - start_line: 5
        end_line: 9
        file: ''
  status:
    code:
    - suggestion: '.hasCompleteness(''status'', lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''`status` = "COMPLETED"'', ''at least one completed'',
        lambda x: x > 0)'
      validity: null
      level: warning
    - suggestion: .isContainedIn('status', ["COMPLETED", "CANCELLED", "UNDER_REVIEW"])
      validity: null
      level: error
    assumptions:
    - text: 'The ''status'' column should not contain any null values in the input
        data, as all rows with null ''status'' values are dropped before further processing.
        This means that downstream code expects ''status'' to be present for every
        row that is processed. We could represent this assumption as a deequ constraint
        like this: .hasCompleteness(''status'', lambda x: x == 1.0)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''status'' column is expected to contain the value ''COMPLETED''
        for at least some rows, as the downstream logic specifically checks for rows
        where status == ''COMPLETED''. If there are no such rows, collected_emails
        will be empty and no emails will be sent. We could represent this assumption
        as a deequ constraint like this: .contains(''status'', ''COMPLETED'')'
      sources:
      - start_line: 4
        end_line: 9
        file: ''
    - text: 'The ''status'' column is expected to contain a small, finite set of categorical
        values, based on the histogram and the code''s logic. Unexpected or unseen
        values in ''status'' may cause the business logic to behave incorrectly (e.g.,
        missing expected emails). We could represent this assumption as a deequ constraint
        like this: .isContainedIn(''status'', [''COMPLETED'', ''CANCELLED'', ''UNDER_REVIEW''])'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
