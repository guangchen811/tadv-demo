constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` = ''COMPLETED'' THEN CASE WHEN `email`
        IS NOT NULL AND LENGTH(TRIM(`email`)) > 0 THEN 1 ELSE 0 END ELSE 1 END", "Non-null
        and non-empty email for completed rows", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` = ''COMPLETED'' THEN CASE WHEN `email`
        RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'' THEN 1 ELSE 0
        END ELSE 1 END", "Valid email format for completed rows", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` = ''COMPLETED'' THEN CASE WHEN `email`
        IS NOT NULL AND typeof(`email`) = ''string'' THEN 1 ELSE 0 END ELSE 1 END",
        "Email must be string for completed rows", lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'For every input row where status == ''COMPLETED'', the email column must
        be present (not null and not empty after trimming). We could represent this
        as a Deequ constraint like: .satisfies("CASE WHEN `status` = ''COMPLETED''
        THEN CASE WHEN `email` IS NOT NULL AND TRIM(`email`) <> '''' THEN 1 ELSE 0
        END ELSE 1 END", "Non-null email for completed rows", lambda x: x == 1.0)'
      sources:
      - start_line: 4
        end_line: 5
        file: ''
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'For rows where status == ''COMPLETED'', email values must be syntactically
        valid email addresses (e.g., local-part@domain.tld). We could represent this
        as a Deequ constraint like: .satisfies("CASE WHEN `status` = ''COMPLETED''
        THEN CASE WHEN `email` RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$''
        THEN 1 ELSE 0 END ELSE 1 END", "Valid email format for completed rows", lambda
        x: x == 1.0)'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'For rows where status == ''COMPLETED'', email values should be of string
        type (no non-string or NaN/None values). In Great Expectations, this can be
        expressed conditionally as: expect_column_values_to_be_of_type(''email'',
        ''str'', row_condition="status == ''COMPLETED''")'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
      - start_line: 8
        end_line: 9
        file: ''
  status:
    code:
    - suggestion: .hasColumn('status')
      validity: null
      level: error
    - suggestion: '.hasCompleteness(''status'', lambda c: c >= 0.0)'
      validity: null
      level: warning
    - suggestion: '.isContainedIn(''status'', [''COMPLETED'', ''CANCELLED'', ''UNDER_REVIEW''],
        lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies(''CASE WHEN status IS NULL THEN 1 WHEN status = upper(trim(status))
        THEN 1 ELSE 0 END'', ''Status normalized'', lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The input must include the ''status'' column; otherwise the pipeline
        (dropna on ''status'' and equality checks) will fail. This can be validated,
        for example, with Deequ: .hasColumn(''status'').'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''status'' column may contain null values in the input; rows with
        null ''status'' are expected and will be dropped before use. Validation should
        therefore not require completeness == 1.0. (Example Deequ: allow nulls by
        not enforcing a strict completeness threshold; or .hasCompleteness(''status'',
        lambda c: c >= 0.0)).'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'All non-null ''status'' values should belong to the known set of categories
        {''COMPLETED'', ''CANCELLED'', ''UNDER_REVIEW''} so that the exact match for
        ''COMPLETED'' works as intended. We could represent this as a Deequ constraint
        that also permits nulls: .satisfies("CASE WHEN status IS NULL THEN 1 WHEN
        status IN (''COMPLETED'',''CANCELLED'',''UNDER_REVIEW'') THEN 1 ELSE 0 END",
        "Valid status domain", lambda x: x == 1.0).'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
    - text: 'All non-null ''status'' values should be canonicalized (trimmed and uppercase)
        so the case-sensitive literal comparison status == ''COMPLETED'' is reliable.
        For example (Deequ): .satisfies("CASE WHEN status IS NULL THEN 1 WHEN status
        = upper(trim(status)) THEN 1 ELSE 0 END", "Status normalized", lambda x: x
        == 1.0).'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
