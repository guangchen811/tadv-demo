constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' AND email IS NOT NULL
        THEN 1 ELSE 0 END", "Non-null emails for COMPLETED", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' AND email RLIKE ''^[^
        @]+@[^ @]+\\.[^ @]+'' THEN 1 ELSE 0 END", "Valid email format for COMPLETED",
        lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.hasDataType("email", "String", lambda x: x >= 0.95)'
      validity: null
      level: warning
    assumptions:
    - text: 'For any input row where status == ''COMPLETED'', the ''email'' value
        must be non-null. The code appends row[''email''] for completed rows and then
        calls send_email(email) without checking for null, so the input must guarantee
        an email exists for completed bookings.

        We could represent this as a Deequ-style constraint like:

        .satisfies("CASE WHEN status = ''COMPLETED'' AND email IS NOT NULL THEN 1
        ELSE 0 END", "Non-null emails for COMPLETED", lambda x: x == 1)'
      sources:
      - start_line: 3
        end_line: 5
        file: ''
    - text: 'For any input row where status == ''COMPLETED'', the ''email'' value
        should be a valid email string (basic format: local@domain.tld). The code
        sends these email strings to send_email() without validation, so the input
        should ensure they conform to an email pattern.

        We could represent this as a Deequ-style constraint like:

        .satisfies("CASE WHEN status = ''COMPLETED'' AND email RLIKE ''^[^ @]+@[^
        @]+\\.[^ @]+'' THEN 1 ELSE 0 END", "Valid email format for COMPLETED", lambda
        x: x == 1)'
      sources:
      - start_line: 4
        end_line: 9
        file: ''
    - text: 'Non-null ''email'' values should be strings (not other types). The code
        treats email as a string and passes it to send_email(), so for any non-null
        input the type should be textual.

        We could represent this as a constraint (Great Expectations style) like:

        .expect_column_values_to_be_of_type(''email'', ''STRING'')

        Or as a Deequ-style satisfier for non-null values: .satisfies("CASE WHEN email
        IS NULL THEN 1 ELSE CASE WHEN email RLIKE ''.*'' THEN 1 ELSE 0 END END", "Email
        is string-like for non-null entries", lambda x: x == 1)'
      sources:
      - start_line: 5
        end_line: 9
        file: ''
