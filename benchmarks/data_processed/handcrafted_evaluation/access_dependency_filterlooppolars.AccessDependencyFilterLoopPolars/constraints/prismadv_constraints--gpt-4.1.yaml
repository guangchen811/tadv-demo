constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' THEN CASE WHEN email
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Non-null emails for completed
        bookings", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' THEN CASE WHEN email
        RLIKE ''^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$'' THEN 1 ELSE 0 END ELSE 1 END", "Valid
        email format for completed bookings", lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''email'' column should be non-null for all rows where ''status''
        is ''COMPLETED'', because the code iterates over ''completed_bookings'' and
        directly accesses ''row["email"]'' without checking for nulls. Since ''completed_bookings''
        is filtered after dropping nulls in ''status'', this assumption applies to
        rows where ''status'' is not null and equals ''COMPLETED''.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN status = ''COMPLETED'' THEN CASE WHEN email IS NOT NULL
        THEN 1 ELSE 0 END ELSE 1 END", "Non-null emails for completed bookings", lambda
        x: x == 1)'
      sources:
      - start_line: 2
        end_line: 5
        file: ''
    - text: 'The ''email'' column is expected to contain valid email addresses as
        strings for rows where ''status'' is ''COMPLETED'', because the downstream
        operation is to send an email using the value in ''email''.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN status = ''COMPLETED'' THEN CASE WHEN email RLIKE ''^[^@\s]+@[^@\s]+\.[^@\s]+$''
        THEN 1 ELSE 0 END ELSE 1 END", "Valid email format for completed bookings",
        lambda x: x == 1)'
      sources:
      - start_line: 4
        end_line: 5
        file: ''
  status:
    code:
    - suggestion: '.hasCompleteness(''status'', lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status IN (''COMPLETED'', ''CANCELLED'',
        ''UNDER_REVIEW'') THEN 1 ELSE 0 END", "Valid Status Values", lambda x: x ==
        1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''status'' column should not contain any null values in the input
        data, as the code drops rows where ''status'' is null before further processing.
        This means that for downstream tasks to function as intended, all rows must
        have a non-null ''status'' value.

        We could represent this assumption as a deequ constraint like this:

        .hasCompleteness(''status'', lambda x: x == 1.0)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''status'' column should contain only the expected values: ''COMPLETED'',
        ''CANCELLED'', or ''UNDER_REVIEW''. The code filters for ''COMPLETED'', and
        the dataset histogram indicates these are the only present values. Input data
        should not contain any other values in ''status''.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN status IN (''COMPLETED'', ''CANCELLED'', ''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Valid Status Values", lambda x: x == 1.0)'
      sources:
      - start_line: 3
        end_line: 3
        file: ''
