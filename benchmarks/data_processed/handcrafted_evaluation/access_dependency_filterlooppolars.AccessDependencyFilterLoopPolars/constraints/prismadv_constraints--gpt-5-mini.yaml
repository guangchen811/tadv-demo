constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` = ''COMPLETED'' THEN CASE WHEN `email`
        IS NOT NULL AND trim(`email`) <> '''' THEN 1 ELSE 0 END ELSE 1 END", "CompletedHaveEmail",
        lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` = ''COMPLETED'' AND `email` IS NOT
        NULL THEN CASE WHEN `email` LIKE ''%_@_%._%'' THEN 1 ELSE 0 END ELSE 1 END",
        "CompletedEmailFormat", lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'For any row with status == ''COMPLETED'', the ''email'' column must be
        non-null and non-empty because the code calls send_email(row[''email''], ...)
        for completed bookings. This can be represented as a validation rule (Deequ-style)
        that requires all completed bookings to have an email, for example: .satisfies(''CASE
        WHEN `status` = \''COMPLETED\'' THEN CASE WHEN `email` IS NOT NULL AND trim(`email`)
        <> '''' THEN 1 ELSE 0 END ELSE 1 END'', ''CompletedHaveEmail'', lambda x:
        x == 1)'
      sources:
      - start_line: 2
        end_line: 5
        file: ''
    - text: 'Rows with status == ''COMPLETED'' should have a syntactically valid email
        string (at minimum: contain an ''@'' and a dot in the domain part). The code
