        a basic email pattern, for example: .satisfies(''CASE WHEN `status` = \''COMPLETED\''
        AND `email` IS NOT NULL THEN CASE WHEN `email` LIKE "%_@_%._%" THEN 1 ELSE
        0 END ELSE 1 END'', ''CompletedEmailFormat'', lambda x: x == 1)'
