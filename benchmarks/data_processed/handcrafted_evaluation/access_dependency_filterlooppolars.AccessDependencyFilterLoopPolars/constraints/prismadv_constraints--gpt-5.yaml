constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' THEN CASE WHEN email
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Email present for completed",
        lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' THEN CASE WHEN email
        RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'' THEN 1 ELSE 0
        END ELSE 1 END", "Valid email for completed", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: .hasDataType("email", ConstrainableDataTypes.String)
      validity: null
      level: error
    assumptions:
    - text: 'For any row where status = ''COMPLETED'', the ''email'' column must be
        non-null so that send_email(row[''email''], ...) can be called without errors.
        This can be represented as a Deequ constraint like: .satisfies("CASE WHEN
        status = ''COMPLETED'' THEN CASE WHEN email IS NOT NULL THEN 1 ELSE 0 END
        ELSE 1 END", "Email present for completed", lambda x: x == 1). In Great Expectations:
        expect_column_values_to_not_be_null on ''email'' with a row condition status
        == ''COMPLETED''.'
      sources:
      - start_line: 3
        end_line: 5
        file: ''
    - text: 'For any row where status = ''COMPLETED'', the ''email'' value should
        be a valid, non-empty email address (basic pattern). This can be represented
        as a Deequ constraint: .satisfies("CASE WHEN status = ''COMPLETED'' THEN CASE
        WHEN email RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'' THEN
        1 ELSE 0 END ELSE 1 END", "Valid email for completed", lambda x: x == 1).
        In Great Expectations: expect_column_values_to_match_regex with the same pattern
        and a row condition status == ''COMPLETED''.'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
    - text: 'The ''email'' column must exist in the input schema and contain string-like
        values (especially for rows with status = ''COMPLETED''), since it is passed
        directly to send_email. This can be represented as a Deequ constraint: .hasDataType(''email'',
        ConstrainableDataTypes.String) or a conditional .satisfies to ensure CAST(email
        AS STRING) is not null when status = ''COMPLETED''. In Great Expectations:
        expect_column_to_exist and expect_column_values_to_be_of_type(''email'', ''String'').'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
  status:
    code:
    - suggestion: '.hasDataType(''status'', ConstrainableDataTypes.String, lambda
        x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.isContainedIn(''status'', [''COMPLETED'', ''CANCELLED'', ''UNDER_REVIEW''],
        lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("`status` IS NULL OR trim(`status`) = `status`", "status
        no leading/trailing whitespace", lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("`status` IS NULL OR `status` RLIKE ''^[A-Z_]+$''",
        "status uppercase tokens with underscores only", lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''status'' column in the input may contain null values; rows with
        null status are intentionally removed before any downstream use. Convertible
        validation intent: allow nulls in the raw input (no strict completeness requirement
        on ''status'').'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''status'' field is treated as a categorical code and must match
        the literal ''COMPLETED'' exactly (case-sensitive, no extra whitespace) for
        a booking to be recognized as completed. Suggested validations: expect values
        to be upper-case tokens with underscores only (e.g., regex ^[A-Z_]+$) and
        ensure trimming before comparison; ensure ''COMPLETED'' is an allowed category.'
      sources:
      - start_line: 3
        end_line: 3
        file: ''
    - text: 'Based on current data characteristics, the ''status'' domain is expected
        to be within {''COMPLETED'', ''CANCELLED'', ''UNDER_REVIEW''}; values outside
        this set are unexpected and would be ignored by the current logic. Convertible
        validation: values_in_set on that set (e.g., Deequ isContainedIn or GE expect_column_values_to_be_in_set).'
      sources:
      - start_line: 3
        end_line: 3
        file: ''
    - text: 'The ''status'' column should exist and be string-like (or castable to
        string) so that equality comparisons against the literal ''COMPLETED'' behave
        as intended. Convertible validation: expect_column_to_exist(''status'') and
        expect column dtype to be a string type.'
      sources:
      - start_line: 2
        end_line: 3
        file: ''
