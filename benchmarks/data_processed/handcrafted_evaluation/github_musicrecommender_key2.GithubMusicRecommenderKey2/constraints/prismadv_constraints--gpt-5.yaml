constraints:
  key:
    code:
    - suggestion: .hasDataType('key', ConstrainableDataTypes.Integral)
      validity: null
      level: error
    - suggestion: '.hasCompleteness(''key'', lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN key != -1 THEN 1 ELSE 0 END'', ''Valid keys
        (not -1)'', lambda x: x >= 0.95)'
      validity: null
      level: warning
    - suggestion: '.satisfies(''CASE WHEN key = -1 OR key >= 0 THEN 1 ELSE 0 END'',
        ''Non-negative keys or sentinel'', lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''key'' column must exist and be of an integral (numeric) type so
        that comparisons to -1 behave as intended. Example Deequ rule: .hasDataType(''key'',
        ConstrainableDataTypes.Integral)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The fraction of rows with ''key'' equal to -1 (a sentinel for invalid
        keys) should be small (e.g., <= 5%), since these rows are dropped before further
        processing. Example Deequ rule: .satisfies(''CASE WHEN key != -1 THEN 1 ELSE
        0 END'', ''Valid keys (not -1)'', lambda x: x >= 0.95)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'Apart from the sentinel -1 (which is removed), all ''key'' values should
        be non-negative. Example Deequ rule: .satisfies(''CASE WHEN key = -1 OR key
        >= 0 THEN 1 ELSE 0 END'', ''Non-negative keys or sentinel'', lambda x: x ==
        1.0)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''key'' column should have no null values (completeness = 1.0), as
        nulls are not handled by the filter and could leak into downstream steps.
        Example Deequ rule: .hasCompleteness(''key'', lambda x: x == 1.0)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
