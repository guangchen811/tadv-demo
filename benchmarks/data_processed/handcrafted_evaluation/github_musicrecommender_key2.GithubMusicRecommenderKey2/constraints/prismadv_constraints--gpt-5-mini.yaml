    code:
    - suggestion: .isComplete('key')
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN TRY_CAST(`key` AS BIGINT) IS NOT NULL THEN
        1 ELSE 0 END'', ''Key is integer-castable'', lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `key` != -1 THEN 1 ELSE 0 END'', ''Has non
        -1 rows'', lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `key` = -1 THEN 1 ELSE 0 END'', ''Fraction
        of -1 keys (informational)'', lambda x: x >= 0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''key'' column may contain a sentinel value -1 which the code explicitly
        filters out (rows with key == -1 are removed). We should validate that the
        input can contain -1 values and that there is at least one row that is not
        -1 so the dataset is not emptied by this filter. Example validations (Deequ-style):

        .satisfies("CASE WHEN `key` = -1 THEN 1 ELSE 0 END", "Fraction of -1 keys",
        lambda x: x >= 0)  # detect presence of sentinel -1

        .satisfies("CASE WHEN `key` != -1 THEN 1 ELSE 0 END", "Has non -1 rows", lambda
        x: x > 0)  # ensure not all rows are -1'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''key'' column is expected to be non-null in the input (the code
        compares values to -1 without null-checks). We should assert completeness
        for this column. Example validation (Deequ-style):

        .satisfies("CASE WHEN `key` IS NOT NULL THEN 1 ELSE 0 END", "Non-null key",
        lambda x: x == 1)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''key'' column should be numeric/integral (comparable to -1). The
        code assumes integer semantics, so input values must be castable to integers
        (no unexpected strings). Example validation (Deequ-style):

        .satisfies("CASE WHEN TRY_CAST(`key` AS BIGINT) IS NOT NULL THEN 1 ELSE 0
        END", "Key is integer-castable", lambda x: x == 1)'
      sources:
