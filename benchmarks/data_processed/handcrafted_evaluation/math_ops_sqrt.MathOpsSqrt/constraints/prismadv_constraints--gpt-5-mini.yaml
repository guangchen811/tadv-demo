constraints:
  cost:
    code:
    - suggestion: '.satisfies("CASE WHEN `cost` IS NOT NULL THEN 1 ELSE 0 END", "cost_not_null",
        lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN TRY_CAST(`cost` AS DOUBLE) IS NOT NULL THEN
        1 ELSE 0 END", "cost_numeric", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `cost` - 10 >= 0 THEN 1 ELSE 0 END", "cost_minus_hidden_nonnegative",
        lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''cost'' column must not contain null values. The code uses df[''cost'']
        in arithmetic and then applies math.sqrt without any null handling, so any
        NULL/NaN would raise an error. We can represent this as a Deequ/validation
        rule such as:

        .satisfies("CASE WHEN `cost` IS NOT NULL THEN 1 ELSE 0 END", "cost_not_null",
        lambda x: x == 1)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''cost'' column must be numeric (integral or castable to numeric).
        The code subtracts a numeric hidden_cost and calls math.sqrt, so values must
        be numeric (and finite) to allow the arithmetic and sqrt. We can represent
        this as:

        .satisfies("CASE WHEN TRY_CAST(`cost` AS DOUBLE) IS NOT NULL THEN 1 ELSE 0
        END", "cost_numeric", lambda x: x == 1)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'For every input row, cost - hidden_cost must be >= 0 (equivalently cost
        >= 10) because math.sqrt is applied to (cost - hidden_cost) and sqrt of a
        negative would error. This must hold for all rows of the input. We can represent
        this as:

        .satisfies("CASE WHEN `cost` - 10 >= 0 THEN 1 ELSE 0 END", "cost_minus_hidden_nonnegative",
        lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
