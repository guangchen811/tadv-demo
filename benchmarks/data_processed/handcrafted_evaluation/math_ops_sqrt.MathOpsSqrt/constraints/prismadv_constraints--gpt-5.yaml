constraints:
  cost:
    code:
    - suggestion: '.hasCompleteness("cost", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: .hasDataType("cost", ConstrainableDataTypes.Numeric)
      validity: null
      level: error
    - suggestion: '.satisfies("(`cost` >= 10)", "cost_at_least_hidden_cost", lambda
        x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''cost'' column must contain numeric, non-null values because the
        code subtracts a numeric constant and applies math.sqrt to each element. We
        could represent this assumption as a deequ constraint like this:

        .hasCompleteness("cost", lambda x: x == 1.0)

        .hasDataType("cost", ConstrainableDataTypes.Integral)  // or ConstrainableDataTypes.Numeric

        And as Great Expectations:

        expect_column_values_to_not_be_null("cost")

        expect_column_values_to_be_in_type_list("cost", ["int64", "int32", "float64",
        "float32"])'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'All values in the ''cost'' column must be at least 10 so that (cost -
        hidden_cost) >= 0 and math.sqrt does not raise a domain error. We could represent
        this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN `cost` >= 10 THEN 1 ELSE 0 END", "cost_at_least_hidden_cost",
        lambda x: x == 1.0)

        (or) .hasMin("cost", lambda m: m >= 10)

        And as Great Expectations:

        expect_column_values_to_be_between("cost", min_value=10, allow_cross_type_comparisons=True)'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
