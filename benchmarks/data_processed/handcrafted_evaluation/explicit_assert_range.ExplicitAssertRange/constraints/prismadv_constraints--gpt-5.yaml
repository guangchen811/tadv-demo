constraints:
  status:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` IS NULL OR `status` IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Status domain (nulls allowed)", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.hasApproxCountDistinct("status", lambda v: v <= 4)'
      validity: null
      level: error
    assumptions:
    - text: 'All non-null values in the ''status'' column must be one of the allowed
        categories: ''COMPLETED'', ''CANCELLED'', ''IN_PROGRESS'', or ''UNDER_REVIEW''.
        No other category values are permitted. We could represent this as a Deequ
        constraint: .satisfies("CASE WHEN `status` IS NULL OR `status` IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Status domain (nulls allowed)", lambda x: x == 1) or
        as a Great Expectations rule: expect_column_values_to_be_in_set(column="status",
        value_set=["COMPLETED","CANCELLED","IN_PROGRESS","UNDER_REVIEW"], ignore_row_if="either_value_is_missing").'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
    - text: 'The ''status'' column should have no more than 4 distinct non-null categories
        (since only the four allowed categories are valid). This can be enforced as
        a Deequ constraint: .hasNumberOfDistinctValues("status", lambda v: v <= 4)
        with nulls excluded, or as a Great Expectations rule: expect_column_unique_value_count_to_be_between("status",
        min_value=0, max_value=4, ignore_row_if="either_value_is_missing").'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
