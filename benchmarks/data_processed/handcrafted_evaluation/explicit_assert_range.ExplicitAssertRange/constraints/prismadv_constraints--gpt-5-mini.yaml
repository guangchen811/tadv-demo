constraints:
  status:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` IS NULL THEN 1 ELSE CASE WHEN `status`
        IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'') THEN 1 ELSE
        0 END END", "Valid or null statuses", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasApproxCountDistinct("status", lambda x: x <= 4)'
      validity: null
      level: error
    assumptions:
    - text: 'All non-null values in the ''status'' column must be one of the allowed
        categories: ''COMPLETED'', ''CANCELLED'', ''IN_PROGRESS'', or ''UNDER_REVIEW''.
        In other words, the set of observed (non-null) statuses should be a subset
        of {COMPLETED, CANCELLED, IN_PROGRESS, UNDER_REVIEW}. This can be represented
        as a validation (Deequ/GRE) constraint such as: .satisfies("CASE WHEN `status`
        IS NULL THEN 1 ELSE CASE WHEN `status` IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END END", "Valid statuses", lambda x: x == 1.0)'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'Null/missing values in ''status'' are ignored by the code (nunique(dropna=True)),
        so missing values are allowed and will not be checked by the assertion. If
        you want to enforce no missing statuses, add an explicit non-null check; otherwise
        assume nulls are acceptable. Example Deequ representation to allow nulls but
        validate non-null values: .satisfies("CASE WHEN `status` IS NULL THEN 1 ELSE
        CASE WHEN `status` IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END END", "Valid or null statuses", lambda x: x == 1.0)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The number of distinct non-null status values in the input must be <=
        4 (the size of the allowed set). Equivalently, distinct non-null statuses
        should not exceed the allowed categories. This can be represented as a uniqueness/domain-size
        check, e.g.: .satisfies("CASE WHEN cardinality(array_distinct(filter(x ->
        x IS NOT NULL, collect_set(`status`)))) <= 4 THEN 1 ELSE 0 END", "Max distinct
        statuses", lambda x: x == 1.0) or by verifying that uniqueCount(`status`)
        <= 4 on non-null rows.'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
      - start_line: 2
        end_line: 2
        file: ''
