constraints:
  behaviour:
    code:
    - suggestion: '.hasDataType(''behaviour'', ConstrainableDataTypes.String, lambda
        x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasCompleteness(''behaviour'', lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies(''LENGTH(TRIM(behaviour)) > 0'', ''No blank behaviour'',
        lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("TRIM(behaviour) RLIKE ''^(killer|socializer|achiever|explorer)$''",
        ''Valid behaviour categories'', lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("TRIM(behaviour) IN (''killer'',''socializer'',''achiever'',''explorer'')",
        ''At least one valid behaviour present'', lambda x: x > 0)'
      validity: null
      level: error
    assumptions:
    - text: 'The input must contain a ''behaviour'' column with string values. This
        can be enforced with Deequ: hasDataType(''behaviour'', ConstrainableDataTypes.String)
        (and implicitly column existence), or with Great Expectations: expect_column_to_exist(''behaviour'')
        and expect_column_values_to_be_of_type(''behaviour'', ''str'' or ''object'').'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
      - start_line: 4
        end_line: 7
        file: ''
    - text: 'All values in ''behaviour'' must be exactly one of {''killer'', ''socializer'',
        ''achiever'', ''explorer''} (case-sensitive, no leading or trailing whitespace).
        This can be enforced with Deequ: satisfies("CASE WHEN TRIM(behaviour) RLIKE
        ''^(killer|socializer|achiever|explorer)$'' THEN 1 ELSE 0 END", ''Valid behaviour'',
        lambda x: x == 1.0) or isContainedIn(''behaviour'', [''killer'',''socializer'',''achiever'',''explorer'']);
        with Great Expectations: expect_column_values_to_be_in_set and/or expect_column_values_to_match_regex(''^(killer|socializer|achiever|explorer)$'').'
      sources:
      - start_line: 3
        end_line: 3
        file: ''
      - start_line: 4
        end_line: 7
        file: ''
    - text: 'The ''behaviour'' column should have no nulls and no blank/whitespace-only
        strings, since direct equality checks are used without null/blank handling.
        This can be enforced with Deequ: hasCompleteness(''behaviour'', lambda x:
        x == 1.0) and satisfies(''LENGTH(TRIM(behaviour)) > 0'', ''No blank behaviour'',
        lambda x: x == 1.0); with Great Expectations: expect_column_values_to_not_be_null
        and expect_column_values_to_not_match_regex(''^\s*$'').'
      sources:
      - start_line: 4
        end_line: 7
        file: ''
    - text: 'There should be at least one record whose ''behaviour'' is in {''killer'',''socializer'',''achiever'',''explorer''}
        so the pie chart has a positive total (matplotlib pie requires sum(sizes)
        > 0). This can be enforced with Deequ: satisfies("CASE WHEN TRIM(behaviour)
        IN (''killer'',''socializer'',''achiever'',''explorer'') THEN 1 ELSE 0 END",
        ''At least one valid behaviour'', lambda x: x > 0).'
      sources:
      - start_line: 4
        end_line: 8
        file: ''
      - start_line: 10
        end_line: 12
        file: ''
