constraints:
- .hasDataType('behaviour', ConstrainableDataTypes.String)
- .isContainedIn('behaviour', ['killer', 'socializer', 'achiever', 'explorer'], where="behaviour
  IS NOT NULL AND length(trim(behaviour)) > 0")
- '.hasNumberOfDistinctValues(''behaviour'', lambda v: v <= 4, where="behaviour IS
  NOT NULL AND length(trim(behaviour)) > 0")'
