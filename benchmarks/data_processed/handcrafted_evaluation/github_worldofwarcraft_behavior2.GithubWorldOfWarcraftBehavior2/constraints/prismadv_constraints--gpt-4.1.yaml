constraints:
  behaviour:
    code:
    - suggestion: '.satisfies("behaviour IN (''killer'', ''socializer'', ''achiever'',
        ''explorer'')", "Valid Behaviour Classes", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.hasCompleteness("behaviour", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("behaviour <> ''''", "No Empty Behaviour Values", lambda
        x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''behaviour'' column is expected to contain only the values ''killer'',
        ''socializer'', ''achiever'', or ''explorer'', as the code counts occurrences
        of these four categories. Any other value (including empty strings or nulls)
        is implicitly treated as not belonging to any class and will not be counted
        in the pie chart. Therefore, the input data should have ''behaviour'' values
        restricted to these four classes for meaningful chart output.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN behaviour IN (''killer'', ''socializer'', ''achiever'',
        ''explorer'') THEN 1 ELSE 0 END", "Valid Behaviour Classes", lambda x: x ==
        1)'
      sources:
      - start_line: 3
        end_line: 7
        file: ''
    - text: 'The ''behaviour'' column is assumed to be non-null (i.e., should not
        contain missing values or empty strings) for the code to correctly count instances
        in each class and to ensure the pie chart is meaningful. As the code does
        not handle missing or empty values, such values will be ignored in the count
        and pie chart, potentially leading to misleading results. Therefore, the input
        data should have no missing or empty ''behaviour'' values.

        We could represent this assumption as a deequ constraint like this:

        .hasCompleteness("behaviour", lambda x: x == 1.0)'
      sources:
      - start_line: 4
        end_line: 7
        file: ''
  evolution:
    code:
    - suggestion: .isComplete('evolution')
      validity: null
      level: error
    assumptions:
    - text: The 'evolution' column must be present in the input data, as it is explicitly
