    assumptions:
    - text: 'The ''winner'' column must not contain null/missing values. The code
        counts rows where winner = team1 and where winner = team2 and then asserts
        that the sum equals the total number of rows; if winner were NULL for any
        row those comparisons would not be counted and the assertion could fail. We
        could represent this assumption as a deequ constraint like this: .satisfies(''CASE
        WHEN `winner` IS NOT NULL THEN 1 ELSE 0 END'', ''Winner non-null'', lambda
        x: x == 1)'
      sources:
