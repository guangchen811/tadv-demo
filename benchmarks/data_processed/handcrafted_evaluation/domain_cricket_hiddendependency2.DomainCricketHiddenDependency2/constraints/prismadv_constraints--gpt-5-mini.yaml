        end_line: 12
        file: ''
    - text: 'For every input row, the ''winner'' value must equal either the row''s
        ''team1'' or the row''s ''team2'' value (i.e., the winner is always one of
        the two competing teams). The downstream check home_wins + out_wins == len(df)
