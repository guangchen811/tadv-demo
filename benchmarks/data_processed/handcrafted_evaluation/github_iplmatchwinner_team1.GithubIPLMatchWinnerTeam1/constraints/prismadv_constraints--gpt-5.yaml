        end_line: 23
        file: ''
    - text: 'The ''City'' values should be consistently formatted (no leading/trailing
        whitespace and standard casing) so exact string replacements apply. We could
        represent this with Deequ as regex-based satisfactions, for example: .satisfies("CASE
        WHEN City RLIKE ''^\\S(.*\\S)?$'' THEN 1 ELSE 0 END", ''City trimmed'', lambda
        x: x == 1.0) and optionally enforce title case with .satisfies("CASE WHEN
        City RLIKE ''^([A-Z][a-z]+)( [A-Z][a-z]+)*$'' THEN 1 ELSE 0 END", ''City title
