constraints:
  cost:
    code:
    - suggestion: '.hasDataType("cost", "Integral", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: .isComplete("cost")
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `cost` > 0 THEN 1 ELSE 0 END", "cost_positive",
        lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `location` = ''A'' THEN CASE WHEN `cost`
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "cost_present_for_location_A",
        lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''cost'' column must be numeric (integral/real) because it is passed
        to a numeric transform (np.log) and then combined with other numeric features
        for model training. This can be checked with a validation such as: all values
        have a numeric type (e.g., dtype is integer/float) and are convertible to
        float.'
      sources:
      - start_line: 10
        end_line: 11
        file: ''
    - text: 'All values in the ''cost'' column must be non-null (no missing values).
        The code applies a numerical transform and then fits a model without any fill/na-handling,
        so missing cost values would cause errors. A possible validation: completeness
        of ''cost'' == 1.0 (or no NULLs).'
      sources:
      - start_line: 10
        end_line: 13
        file: ''
    - text: 'All values in the ''cost'' column must be strictly greater than 0 (cost
        > 0). The code applies np.log(cost); log is undefined for zero or negative
        values and would produce -inf/NaN or raise an error. A corresponding check:
        CASE WHEN `cost` > 0 THEN 1 ELSE 0 END should be 1 for all rows.'
      sources:
      - start_line: 8
        end_line: 10
        file: ''
    - text: After filtering by location (df = df[df['location'] == 'A']), the number
        of 'cost' values must align with the number of encoded location rows so that
        np.column_stack((locations, costs_smoothed)) produces a valid feature matrix.
        In other words, len(df['cost']) must equal the number of rows in the OneHotEncoder
        output. Validate that the row count of 'cost' matches the row count of the
        other feature arrays.
      sources:
      - start_line: 7
        end_line: 11
        file: ''
