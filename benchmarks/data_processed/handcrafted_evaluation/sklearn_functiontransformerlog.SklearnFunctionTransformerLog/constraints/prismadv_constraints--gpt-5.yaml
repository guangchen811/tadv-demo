constraints:
  cost:
    code:
    - suggestion: '.satisfies("CASE WHEN location = ''A'' THEN cost IS NOT NULL ELSE
        TRUE END", "Cost completeness for A", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN location = ''A'' THEN cost > 0 ELSE TRUE
        END", "Cost positive for A", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN location = ''A'' THEN CAST(cost AS DOUBLE)
        IS NOT NULL ELSE TRUE END", "Cost numeric (castable) for A", lambda x: x ==
        1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'For all rows that will be used (where location == ''A''), the ''cost''
        column must be complete (no nulls). This is required because the code applies
        np.log to ''cost'' without any null handling and then uses the result as a
        feature. Example validation: Deequ completeness on ''cost'' with filter location
        = ''A'' equals 1.0; or Great Expectations expect_column_values_to_not_be_null
        with a row_condition location == ''A''.'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
      - start_line: 10
        end_line: 10
        file: ''
    - text: 'For all rows where location == ''A'', the ''cost'' values must be strictly
        positive (> 0) so that np.log(cost) is defined and finite. Example validation:
        Deequ satisfies("CASE WHEN location = ''A'' THEN cost > 0 ELSE TRUE END",
        ''Cost positive for A'', lambda p: p == 1.0); or Great Expectations expect_column_values_to_be_between
        with min_value=0, strict_min=True under condition location == ''A''.'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
      - start_line: 8
        end_line: 10
        file: ''
      - start_line: 13
        end_line: 13
        file: ''
    - text: 'The ''cost'' column must be numeric (parseable to float) so that np.log
        can be applied. Example validation: Deequ hasDataType(''cost'', ConstrainableDataTypes.Numeric)
        or a custom satisfies(CASE WHEN TRY_CAST(cost AS DOUBLE) IS NOT NULL THEN
        1 ELSE 0 END, ..., lambda p: p == 1.0).'
      sources:
      - start_line: 8
        end_line: 10
        file: ''
  location:
    code:
    - suggestion: '.satisfies("CASE WHEN `location` = ''A'' THEN 1 ELSE 0 END", "At
        least one ''A'' location", lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `location` IN (''A'',''B'',''C'') THEN 1
        ELSE 0 END", "Valid location codes", lambda x: x == 1)'
      validity: null
      level: warning
    - suggestion: '.satisfies("`location` IS NOT NULL", "Non-null location", lambda
        x: x == 1)'
      validity: null
      level: warning
    assumptions:
    - text: 'The input must contain at least one record where the ''location'' column
        equals exactly ''A'' (case- and whitespace-sensitive). The code filters to
        location == ''A'' and then fits an encoder/model; if there are no ''A'' rows,
        the filtered dataset is empty and fit/transform will fail. We could represent
        this assumption as a deequ constraint like this: .satisfies("CASE WHEN `location`
        = ''A'' THEN 1 ELSE 0 END", "At least one ''A'' location", lambda x: x > 0)'
      sources:
      - start_line: 7
        end_line: 13
        file: ''
    - text: 'The ''location'' column should be a categorical string field with standardized
        codes; at minimum, values should be drawn from a small, known set and not
        contain case/whitespace variants. Based on current data, the allowed set is
        {''A'',''B'',''C''}. We could represent this assumption as a deequ constraint
        like this: .satisfies("CASE WHEN `location` IN (''A'',''B'',''C'') THEN 1
        ELSE 0 END", "Valid location codes", lambda x: x == 1)'
      sources:
      - start_line: 7
        end_line: 9
        file: ''
    - text: 'The ''location'' column should not contain nulls in the input data, since
        the code does not handle missing values before filtering/encoding. We could
        represent this assumption as a deequ constraint like this: .satisfies("CASE
        WHEN `location` IS NOT NULL THEN 1 ELSE 0 END", "Non-null location", lambda
        x: x == 1)'
      sources:
      - start_line: 7
        end_line: 9
        file: ''
  status:
    code:
    - suggestion: '.satisfies("(`location` = ''A'' AND `status` = ''COMPLETED'')",
        "At least one COMPLETED for A", lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("(`location` = ''A'' AND `status` <> ''COMPLETED'')",
        "At least one non-COMPLETED for A", lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` IN (''COMPLETED'', ''CANCELLED'',
        ''IN_PROGRESS'') THEN 1 ELSE 0 END", "Valid status categories", lambda x:
        x >= 0.99)'
      validity: null
      level: warning
    - suggestion: '.satisfies("`status` IS NOT NULL", "status completeness", lambda
        x: x == 1)'
      validity: null
      level: warning
    assumptions:
    - text: 'After filtering to rows where location = ''A'', the ''status'' column
        must contain both classes relative to the label: at least one row with status
        = ''COMPLETED'' and at least one row with status != ''COMPLETED''. This ensures
        LogisticRegression receives two classes. A practical check is that, among
        rows with location = ''A'', the proportion of status = ''COMPLETED'' is >
        0 and < 1.'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
      - start_line: 12
        end_line: 13
        file: ''
    - text: The 'status' column should use canonical, case-sensitive string categories
        and include the literal 'COMPLETED'. Expected allowed values are {'COMPLETED',
        'CANCELLED', 'IN_PROGRESS'}; values outside this set should be disallowed
        or extremely rare.
      sources:
      - start_line: 12
        end_line: 12
        file: ''
    - text: The 'status' column should be complete (no nulls), because missing values
        would be implicitly treated as not 'COMPLETED' by the equality comparison
        when constructing the target label y.
      sources:
      - start_line: 12
        end_line: 12
        file: ''
