constraints:
  result:
    code:
    - suggestion: .isComplete("result")
      validity: null
      level: error
    - suggestion: .isContainedIn("result", ["runs", "wickets", "tie"])
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN super_over = true THEN result = ''tie'' ELSE
        true END", "Super over implies tie", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN result = ''wickets'' THEN result_margin <=
        10 ELSE true END", "Wickets margin limit", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("result = LOWER(TRIM(result))", "Result lower-case and
        trimmed", lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''result'' column must be non-null because the downstream rules compare
        it against specific literals (''tie'' and ''wickets''). We could represent
        this with a Deequ constraint like: .isComplete("result").'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
    - text: 'The ''result'' column should be a categorical string limited to the set
        {''runs'', ''wickets'', ''tie''} to align with the rule checks. We could represent
        this with a Deequ constraint like: .isContainedIn("result", ["runs", "wickets",
        "tie"]).'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
    - text: 'If super_over is true, then ''result'' must be ''tie''. We could represent
        this with a Deequ constraint like: .satisfies("CASE WHEN super_over = true
        THEN result = ''tie'' ELSE true END", "Super over implies tie", lambda x:
        x == 1.0).'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
    - text: 'If ''result'' = ''wickets'', then result_margin must be <= 10. We could
        represent this with a Deequ constraint like: .satisfies("CASE WHEN result
        = ''wickets'' THEN result_margin <= 10 ELSE true END", "Wickets margin limit",
        lambda x: x == 1.0).'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
    - text: 'The ''result'' values should be lower-case and trimmed (no leading/trailing
        spaces) to match the exact string comparisons used (''tie'', ''wickets'').
        We could represent this with a Deequ constraint like: .satisfies("result =
        LOWER(TRIM(result))", "Result lower-case and trimmed", lambda x: x == 1.0).'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
  result_margin:
    code:
    - suggestion: '.satisfies("`result_margin` IS NOT NULL", "result_margin is non-null",
        lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.hasDataType("result_margin", ConstrainableDataTypes.Integral,
        lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` = ''wickets'' THEN `result_margin`
        <= 10 ELSE true END", "Wickets result_margin <= 10 when result is wickets",
        lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("`result_margin` <= `target_runs`", "result_margin <=
        target_runs", lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: The 'result_margin' column must be non-null for all rows because the downstream
        logic compares it to constants and other columns.
      sources:
      - start_line: 6
        end_line: 7
        file: ''
    - text: The 'result_margin' column must be a numeric integer value (counts of
        runs/wickets) so it can be compared against 10 and 'target_runs'.
      sources:
      - start_line: 6
        end_line: 7
        file: ''
    - text: If result == 'wickets', then 'result_margin' must be less than or equal
        to 10.
      sources:
      - start_line: 6
        end_line: 6
        file: ''
    - text: The 'result_margin' must be less than or equal to 'target_runs' for every
        row.
      sources:
      - start_line: 7
        end_line: 7
        file: ''
  super_over:
    code:
    - suggestion: '.satisfies("CASE WHEN `super_over` IS NOT NULL AND CAST(`super_over`
        AS STRING) NOT IN (''0'',''false'',''no'',''False'',''No'') THEN CASE WHEN
        lower(`result`) = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "Super over only
        on ties", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `result` IS NULL OR lower(`result`) <> ''tie''
        THEN CASE WHEN `super_over` IS NULL OR CAST(`super_over` AS STRING) IN (''0'',''false'',''no'',''False'',''No'')
        THEN 1 ELSE 0 END ELSE 1 END", "No super over unless tie", lambda x: x ==
        1)'
      validity: null
      level: error
    assumptions:
    - text: 'Rows where the ''super_over'' column indicates a super over (i.e., a
        truthy/positive value) must have ''result'' equal to ''tie'' (case-insensitive).
        In other words: super_over => lower(result) = ''tie''. This can be validated
        by ensuring there are zero rows where super_over is truthy and result is null
        or not ''tie''. For example (Deequ): .satisfies("CASE WHEN `super_over` IS
        NOT NULL AND CAST(`super_over` AS STRING) NOT IN (''0'',''false'',''no'',''False'',''No'')
        THEN CASE WHEN lower(`result`) = ''tie'' THEN 1 ELSE 0 END ELSE 1 END", "Super
        over only on ties", lambda x: x == 1)'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
    - text: 'If ''result'' is not ''tie'' (or is null), the ''super_over'' column
        must not indicate a super over (should be false/0/null). In other words: lower(result)
        != ''tie'' => NOT super_over. For example (Deequ): .satisfies("CASE WHEN `result`
        IS NULL OR lower(`result`) <> ''tie'' THEN CASE WHEN `super_over` IS NULL
        OR CAST(`super_over` AS STRING) IN (''0'',''false'',''no'',''False'',''No'')
        THEN 1 ELSE 0 END ELSE 1 END", "No super over unless tie", lambda x: x ==
        1)'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
  target_overs:
    code:
    - suggestion: '.satisfies("`target_overs` <= 20", "Target overs upper bound",
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: .isComplete("target_overs")
      validity: null
      level: error
    - suggestion: '.hasDataType("target_overs", ConstrainableDataTypes.Integral, lambda
        x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''target_overs'' column must never exceed 20; values less than or
        equal to 20 are valid (reduced-overs matches are allowed). We could represent
        this as: Deequ -> .satisfies("`target_overs` <= 20", "Target overs upper bound",
        lambda x: x == 1.0); Great Expectations -> expect_column_values_to_be_between(column="target_overs",
        max_value=20).'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
    - text: 'The ''target_overs'' column should be complete (no nulls) so that the
        upper-bound rule can be evaluated for every row. We could represent this as:
        Deequ -> .isComplete("target_overs"); Great Expectations -> expect_column_values_to_not_be_null(column="target_overs").'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
    - text: 'The ''target_overs'' column should be numeric integral (integer) to support
        the comparison against 20 and reflect overs allocation. We could represent
        this as: Deequ -> .hasDataType("target_overs", ConstrainableDataTypes.Integral,
        assertNullable=false); Great Expectations -> expect_column_values_to_be_in_type_list(column="target_overs",
        type_list=["IntegerType","LongType","int","long"]).'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
  target_runs:
    code:
    - suggestion: .isComplete('target_runs')
      validity: null
      level: error
    - suggestion: '.hasDataType(''target_runs'', ConstrainableDataTypes.Integral,
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''target_runs >= 0'', ''non_negative_target_runs'',
        lambda v: v == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies(''result_margin IS NULL OR target_runs >= result_margin'',
        ''margin_not_above_target_runs'', lambda v: v == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''target_runs'' column must be complete (no NULLs), because the validation
        compares ''result_margin'' to ''target_runs'' without null handling. This
        should be enforced even if current data shows completeness 1.0. Deequ example:
        .isComplete(''target_runs''); Great Expectations example: expect_column_values_to_not_be_null(''target_runs'').'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
    - text: 'The ''target_runs'' column must be numeric integral to support the comparison
        with ''result_margin''. Deequ example: .hasDataType(''target_runs'', ConstrainableDataTypes.Integral);
        Great Expectations example: expect_column_values_to_be_in_type_list(''target_runs'',
        [''IntegerType'', ''LongType'']).'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
    - text: 'The ''target_runs'' column should be non-negative (>= 0) to adhere to
        cricket rules (runs cannot be negative). Deequ example: .satisfies(''target_runs
        >= 0'', ''non_negative_target_runs'', lambda v: v == 1.0); Great Expectations
        example: expect_column_min_to_be_between(''target_runs'', min_value=0).'
      sources:
      - start_line: 3
        end_line: 3
        file: ''
    - text: 'For every row, the ''result_margin'' must not exceed ''target_runs''
        (i.e., result_margin <= target_runs). Deequ example: .satisfies(''result_margin
        IS NULL OR target_runs >= result_margin'', ''margin_not_above_target_runs'',
        lambda v: v == 1.0); Great Expectations example: expect_column_pair_values_A_to_be_greater_than_B(''target_runs'',
        ''result_margin'', or_equal_to=True).'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
column_data_flow_locations:
  target_overs: []
  super_over: []
  result: []
  result_margin: []
  target_runs: []
