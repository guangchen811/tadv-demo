constraints:
- .isComplete('creditor_name')
- .hasDataType('creditor_name', ConstrainableDataTypes.String)
- '.satisfies(''length(trim(creditor_name)) > 0'', ''no_blank_creditor_name'', lambda
  v: v == 1.0)'
- '.satisfies(''length(creditor_name) <= 120'', ''creditor_name_max_length_120'',
  lambda v: v == 1.0)'
