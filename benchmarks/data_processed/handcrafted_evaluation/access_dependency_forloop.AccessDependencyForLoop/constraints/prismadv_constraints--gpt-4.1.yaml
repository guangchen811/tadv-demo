constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' AND status IS NOT
        NULL THEN CASE WHEN email IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Non-null
        email for completed status", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' AND status IS NOT
        NULL THEN CASE WHEN email RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$''
        THEN 1 ELSE 0 END ELSE 1 END", "Valid email format for completed status",
        lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''email'' column should be non-null for rows where ''status'' is
        not null and equal to ''COMPLETED'', as the code attempts to send an email
        to these users. If ''email'' is null in such cases, the downstream function
        ''send_email'' may fail or behave unexpectedly.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN status = ''COMPLETED'' AND status IS NOT NULL THEN CASE
        WHEN email IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Non-null email for
        completed status", lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 3
        file: ''
    - text: 'The ''email'' column is expected to contain valid email addresses for
        rows with ''status'' == ''COMPLETED'', since these values are used as recipients
        in the ''send_email'' function. Invalid email formats could cause delivery
        failures or errors in the downstream process.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN status = ''COMPLETED'' AND status IS NOT NULL THEN CASE
        WHEN email RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'' THEN
        1 ELSE 0 END ELSE 1 END", "Valid email format for completed status", lambda
        x: x == 1)'
      sources:
      - start_line: 3
        end_line: 3
        file: ''
  status:
    code:
    - suggestion: '.hasDataType(''status'', ''String'', lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: .isContainedIn('status', ['COMPLETED', 'CANCELLED', 'UNDER_REVIEW'])
      validity: null
      level: error
    assumptions:
    - text: The 'status' column may contain null values, as the code explicitly checks
        for nulls using pd.isna before further evaluating the value. Therefore, downstream
        logic expects that missing values are possible in the input data.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: The 'status' column is expected to contain the value 'COMPLETED' as a
        valid category, since the code checks for rows where status == 'COMPLETED'.
        Input data should only use recognized status values, which, according to the
        data profile, are 'COMPLETED', 'CANCELLED', and 'UNDER_REVIEW'.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: The 'status' column should contain only string values, as indicated by
        the data type profile and the equality comparison to the string 'COMPLETED'
        in the code.
      sources:
      - start_line: 2
        end_line: 2
        file: ''
