constraints:
- .satisfies("status != 'COMPLETED' OR email IS NOT NULL", 'email_not_null_for_completed')
- .satisfies("status != 'COMPLETED' OR TRIM(email) != ''", 'email_not_empty_for_completed')
- .satisfies("status != 'COMPLETED' OR email RLIKE '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'",
  'email_pattern_for_completed')
