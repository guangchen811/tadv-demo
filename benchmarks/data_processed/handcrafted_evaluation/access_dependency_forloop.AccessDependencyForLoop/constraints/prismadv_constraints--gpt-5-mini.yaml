constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` = ''COMPLETED'' THEN CASE WHEN `email`
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Completed rows have email", lambda
        x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` = ''COMPLETED'' AND `email` IS NOT
        NULL AND REGEXP_LIKE(`email`, ''^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$'') THEN 1 ELSE
        0 END", "Valid email format for completed", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `email` IS NULL THEN 1 ELSE 0 END", "Email
        null fraction <= 25%", lambda x: x <= 0.25)'
      validity: null
      level: warning
    assumptions:
    - text: 'For any row where status == ''COMPLETED'', the ''email'' value must be
        non-null because the code calls send_email(row[''email''], ...) without checking
        for missing email. This can be expressed as a Deequ/SQL-like constraint: .satisfies("CASE
        WHEN `status` = ''COMPLETED'' THEN CASE WHEN `email` IS NOT NULL THEN 1 ELSE
        0 END ELSE 1 END", "Completed rows have email", lambda x: x == 1).'
      sources:
      - start_line: 1
        end_line: 3
        file: ''
    - text: 'For rows with status == ''COMPLETED'', the ''email'' should be a syntactically
        valid email address (e.g. contains one ''@'' and a domain). Example constraint:
        .satisfies("CASE WHEN `status` = ''COMPLETED'' AND `email` IS NOT NULL AND
        REGEXP_LIKE(`email`, ''^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$'') THEN 1 ELSE 0 END",
        "Valid email format for completed", lambda x: x == 1).'
      sources:
      - start_line: 1
        end_line: 3
        file: ''
    - text: 'The ''email'' column may contain nulls in the input data overall (dataset
        completeness ~0.75). The code does not fill missing emails before calling
        send_email, so input validation should allow nulls generally but must ensure
        completed rows are populated. If you want to assert the observed null rate,
        you could use: .satisfies("CASE WHEN `email` IS NULL THEN 1 ELSE 0 END", "Null
        email fraction", lambda x: x <= 0.25).'
      sources:
      - start_line: 1
        end_line: 3
        file: ''
