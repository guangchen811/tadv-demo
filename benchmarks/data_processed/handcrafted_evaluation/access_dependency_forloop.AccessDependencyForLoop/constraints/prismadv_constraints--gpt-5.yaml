constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` IS NOT NULL AND `status` = ''COMPLETED''
        THEN CASE WHEN `email` IS NOT NULL AND TRIM(`email`) <> '''' THEN 1 ELSE 0
        END ELSE 1 END", "Email present for COMPLETED", lambda x: x >= 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` IS NOT NULL AND `status` = ''COMPLETED''
        THEN CASE WHEN `email` RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$''
        THEN 1 ELSE 0 END ELSE 1 END", "Valid email format for COMPLETED", lambda
        x: x >= 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'For any row where status is not null and equals ''COMPLETED'', the email
        column must be present (non-null) and non-empty because it is passed directly
        to send_email without a null/empty check. This can be represented as a Deequ
        constraint: .satisfies("CASE WHEN status IS NOT NULL AND status = ''COMPLETED''
        THEN CASE WHEN email IS NOT NULL AND TRIM(email) <> '''' THEN 1 ELSE 0 END
        ELSE 1 END", "Email present for COMPLETED", lambda x: x >= 1.0)'
      sources:
      - start_line: 2
        end_line: 3
        file: ''
    - text: 'For any row where status is not null and equals ''COMPLETED'', the email
        value should be a syntactically valid email address. This can be represented
        as a Deequ constraint: .satisfies("CASE WHEN status IS NOT NULL AND status
        = ''COMPLETED'' THEN CASE WHEN email RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$''
        THEN 1 ELSE 0 END ELSE 1 END", "Valid email format for COMPLETED", lambda
        x: x >= 1.0)'
      sources:
      - start_line: 2
        end_line: 3
        file: ''
  status:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` IN (''COMPLETED'',''CANCELLED'',''UNDER_REVIEW'')
        THEN 1 ELSE 0 END", "Valid status values", lambda x: x >= 0.95)'
      validity: null
      level: error
    - suggestion: .hasDataType("status", ConstrainableDataTypes.String)
      validity: null
      level: warning
    - suggestion: '.satisfies("CASE WHEN `status` IS NULL THEN 1 WHEN `status` = UPPER(`status`)
        AND TRIM(`status`) = `status` THEN 1 ELSE 0 END", "Status uppercase and trimmed",
        lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.hasCompleteness("status", lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''status'' column should use a controlled vocabulary with uppercase
        tokens and no spaces: COMPLETED, CANCELLED, UNDER_REVIEW. At least 95% of
        non-null values should be in this set. Example Deequ: .satisfies("CASE WHEN
        `status` IN (''COMPLETED'',''CANCELLED'',''UNDER_REVIEW'') THEN 1 ELSE 0 END",
        "Valid status values", lambda x: x >= 0.95).'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''status'' column should be of string type. Example Deequ: .hasDataType("StringType").
        In Great Expectations (Pandas): expect_column_values_to_be_of_type(''status'',
        ''object'').'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'Non-null ''status'' values should be uppercase and have no leading/trailing
        whitespace so direct equality to "COMPLETED" works as intended. Example Deequ:
        .satisfies("CASE WHEN `status` IS NULL THEN 1 WHEN `status` = UPPER(`status`)
        AND TRIM(`status`) = `status` THEN 1 ELSE 0 END", "Status uppercase and trimmed",
        lambda x: x == 1.0).'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'The ''status'' column should be complete (no nulls) in the input data
        (current data shows 100% completeness). Example Deequ: .hasCompleteness("status",
        lambda x: x == 1.0).'
      sources:
      - start_line: 1
        end_line: 3
        file: ''
