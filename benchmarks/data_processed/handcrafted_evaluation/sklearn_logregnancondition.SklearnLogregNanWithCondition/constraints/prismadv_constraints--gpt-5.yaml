constraints:
  cost:
    code:
    - suggestion: '.satisfies("CASE WHEN `location` = ''A'' THEN CASE WHEN `cost`
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Cost non-null for rows with location
        A", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasDataType("cost", ConstrainableDataTypes.Integral, lambda x:
        x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `location` = ''A'' THEN CASE WHEN `cost`
        BETWEEN 1 AND 100 THEN 1 ELSE 0 END ELSE 1 END", "Cost mostly within training-like
        range", lambda x: x >= 0.95)'
      validity: null
      level: warning
    - suggestion: '.satisfies("CASE WHEN `location` = ''A'' THEN CASE WHEN `cost`
        BETWEEN 0 AND 1000000000 THEN 1 ELSE 0 END ELSE 1 END", "Cost finite and reasonably
        bounded", lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''cost'' column must be non-null for all input rows that will be
        used (rows where location = ''A''), because it is directly stacked into the
        feature matrix without any imputation or row dropping and scikit-learn''s
        LogisticRegression does not accept NaN values. We could represent this as
        a deequ constraint like: .satisfies("CASE WHEN `location` = ''A'' THEN CASE
        WHEN `cost` IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Cost non-null for
        rows with location A", lambda x: x == 1.0)'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
      - start_line: 7
        end_line: 7
        file: ''
      - start_line: 9
        end_line: 9
        file: ''
    - text: 'The ''cost'' column must be numeric/integral (parsable to numbers) so
        it can be reshaped and used as a feature in the model input matrix. We could
        represent this as a deequ constraint like: .hasDataType("cost", ConstrainableDataTypes.Integral)'
      sources:
      - start_line: 7
        end_line: 7
        file: ''
      - start_line: 9
        end_line: 9
        file: ''
    - text: 'All ''cost'' values used by the model should be finite and positive,
        with the vast majority within the training-like range [1, 100] observed in
        the provided data, to avoid issues from unscaled extreme values. We could
        represent this with deequ constraints like: .satisfies("CASE WHEN `location`
        = ''A'' THEN CASE WHEN `cost` BETWEEN 1 AND 100 THEN 1 ELSE 0 END ELSE 1 END",
        "Cost mostly within training-like range", lambda x: x >= 0.95) and .satisfies("CASE
        WHEN `location` = ''A'' THEN CASE WHEN `cost` BETWEEN 0 AND 1000000000 THEN
        1 ELSE 0 END ELSE 1 END", "Cost finite and reasonably bounded", lambda x:
        x == 1.0)'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
      - start_line: 7
        end_line: 7
        file: ''
      - start_line: 9
        end_line: 9
        file: ''
  location:
    code:
    - suggestion: '.hasDataType(''location'', ConstrainableDataTypes.String, lambda
        x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `location` = ''A'' THEN 1 ELSE 0 END", "At
        least one ''A''", lambda x: x > 0)'
      validity: null
      level: error
    assumptions:
    - text: 'The input must contain a column named ''location'' with string/categorical
        values (not mixed numeric types), because the code compares it to the literal
        ''A'' and feeds it to OneHotEncoder. This can be validated, for example, with
        Deequ: .hasDataType(''location'', ConstrainableDataTypes.String) or with Great
        Expectations: expect_column_values_to_be_of_type(''location'', ''object'')/(''str'').'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
    - text: 'The input data must include at least one record where location == ''A''
        so that the filtered DataFrame is non-empty and OneHotEncoder/model fitting
        can proceed. We could represent this as a Deequ constraint like: .satisfies("CASE
        WHEN `location` = ''A'' THEN 1 ELSE 0 END", "At least one ''A''", lambda x:
        x > 0).'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
  status:
    code:
    - suggestion: '.satisfies("`location` = ''A'' AND `status` = ''COMPLETED''", "At
        least one positive class for y", lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("`location` = ''A'' AND `status` <> ''COMPLETED''",
        "At least one negative class for y", lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("`status` IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'')",
        "Known Status Categories", lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: .isComplete("status")
      validity: null
      level: warning
    - suggestion: .hasDataType("status", ConstrainableDataTypes.String)
      validity: null
      level: warning
    assumptions:
    - text: 'Within the input data, among rows where location == ''A'' (the subset
        used for training), the ''status'' column must contain at least one ''COMPLETED''
        value so that y has a positive class and LogisticRegression.fit does not fail.
        We could represent this as a Deequ constraint like this: .satisfies("CASE
        WHEN location = ''A'' AND status = ''COMPLETED'' THEN 1 ELSE 0 END", "At least
        one positive class for y", lambda x: x > 0)'
      sources:
      - start_line: 5
        end_line: 9
        file: ''
    - text: 'Within the input data, among rows where location == ''A'', the ''status''
        column must also contain at least one value not equal to ''COMPLETED'' so
        that y has a negative class and LogisticRegression.fit sees two classes. We
        could represent this as a Deequ constraint like this: .satisfies("CASE WHEN
        location = ''A'' AND status <> ''COMPLETED'' THEN 1 ELSE 0 END", "At least
        one negative class for y", lambda x: x > 0)'
      sources:
      - start_line: 5
        end_line: 9
        file: ''
    - text: 'The ''status'' values should be limited to the known uppercase categories
        {''COMPLETED'', ''CANCELLED'', ''IN_PROGRESS''} to avoid unexpected labels
        being silently treated as the negative class. We could represent this as a
        Deequ constraint like this: .satisfies("CASE WHEN status IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'')
        THEN 1 ELSE 0 END", "Known Status Categories", lambda x: x == 1.0)'
      sources:
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'The ''status'' column should be complete (no nulls) in the input data,
        so that nulls are not inadvertently interpreted as not ''COMPLETED''. We could
        represent this as a Deequ constraint like this: .isComplete("status")'
      sources:
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'The ''status'' column should be a string/text field (or coercible to
        string) so that the equality comparison to ''COMPLETED'' behaves as expected.
        We could represent this as a Deequ constraint like this: .hasDataType("status",
        ConstrainableDataTypes.String)'
      sources:
      - start_line: 8
        end_line: 8
        file: ''
