      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `cost` IS NULL THEN 1 ELSE 0 END", "Null
        Cost Values", lambda x: x == 0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''cost'' column should contain only integral values, as indicated
        by its data type being integral. We could represent this assumption as a deequ
        constraint like this: .satisfies("CASE WHEN `cost` IS NOT NULL AND `cost`
        = CAST(`cost` AS INT) THEN 1 ELSE 0 END", "Integral Cost Values", lambda x:
        x > 0)'
      sources:
      - start_line: 1
        end_line: 4
        file: ''
