constraints:
  status:
    code:
    - suggestion: '.satisfies("CASE WHEN `status` IS NOT NULL THEN 1 ELSE 0 END",
        "status_not_null", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` = ''COMPLETED'' THEN 1 ELSE 0 END",
        "has_completed_label", lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` != ''COMPLETED'' THEN 1 ELSE 0 END",
        "has_non_completed_label", lambda x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `status` IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'')
        THEN 1 ELSE 0 END", "status_in_expected_set", lambda x: x == 1)'
      validity: null
      level: warning
    - suggestion: '.hasDataType("status", "String", lambda x: x == 1)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''status'' column must not contain nulls because the code directly
        computes y = df[''status''] == ''COMPLETED'' and passes y to model.fit without
        any null-handling. A representative Deequ constraint:

        .satisfies("CASE WHEN `status` IS NOT NULL THEN 1 ELSE 0 END", "status_not_null",
        lambda x: x == 1)'
      sources:
      - start_line: 8
        end_line: 8
        file: ''
    - text: 'The input must include the exact string ''COMPLETED'' (case-sensitive)
        in the ''status'' column because the label is built by equality to ''COMPLETED''.
        If capitalization or surrounding whitespace vary, the comparison will yield
        False. A representative Deequ constraint:

        .satisfies("CASE WHEN `status` = ''COMPLETED'' THEN 1 ELSE 0 END", "has_completed_label",
        lambda x: x > 0)'
      sources:
      - start_line: 8
        end_line: 8
        file: ''
    - text: 'When converted to the binary target y (status == ''COMPLETED''), there
        must be at least two classes present (i.e., at least one True and at least
        one False). LogisticRegression.fit requires at least two classes and will
        fail if y is constant. A representative Deequ constraint pair:

        .satisfies("CASE WHEN `status` = ''COMPLETED'' THEN 1 ELSE 0 END", "prop_completed",
        lambda x: x > 0)  -- at least one completed

        .satisfies("CASE WHEN `status` != ''COMPLETED'' THEN 1 ELSE 0 END", "prop_not_completed",
        lambda x: x > 0)  -- at least one non-completed'
      sources:
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'The ''status'' values should be drawn from the expected categories (e.g.,
        COMPLETED, CANCELLED, IN_PROGRESS). Unexpected categories will still be treated
        as not ''COMPLETED'' but may indicate data issues. A representative Deequ
        constraint:

        .satisfies("CASE WHEN `status` IN (''COMPLETED'',''CANCELLED'',''IN_PROGRESS'')
        THEN 1 ELSE 0 END", "status_in_expected_set", lambda x: x == 1)'
      sources:
      - start_line: 8
        end_line: 8
        file: ''
    - text: 'The ''status'' column is expected to be a string type (non-numeric);
        the code performs string equality. Ensure values are strings to avoid unexpected
        behavior. A representative Deequ check (type-like):

        .satisfies("CASE WHEN typeof(`status`) = ''string'' OR `status` IS NOT NULL
        THEN 1 ELSE 0 END", "status_is_string_or_nonnull", lambda x: x == 1)'
      sources:
      - start_line: 8
        end_line: 8
        file: ''
