constraints:
  cost:
    code:
    - suggestion: '.satisfies("`cost` IS NOT NULL", "Cost not null", lambda x: x ==
        1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CAST(`cost` AS DOUBLE) IS NOT NULL", "Cost numeric-castable",
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("isfinite(CAST(`cost` AS DOUBLE))", "Cost finite", lambda
        x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''cost'' column must be complete (no nulls) for every row used, because
        it is directly concatenated into the feature matrix and passed to LogisticRegression,
        which does not accept missing values. We could represent this assumption as
        a Deequ constraint like: .satisfies("CASE WHEN `cost` IS NOT NULL THEN 1 ELSE
        0 END", "Cost not null", lambda x: x == 1.0) or .hasCompleteness("cost", lambda
        v: v == 1.0). In Great Expectations: expect_column_values_to_not_be_null(column="cost").'
      sources:
      - start_line: 7
        end_line: 9
        file: ''
    - text: 'The ''cost'' column values must be numeric (integers or floats) so that
        they can be stacked with numeric one-hot features and consumed by scikit-learn.
        Values should either already be numeric or be safely castable to float. We
        could represent this as a Deequ constraint: .satisfies("CAST(`cost` AS DOUBLE)
        IS NOT NULL", "Cost numeric-castable", lambda x: x == 1.0). In Great Expectations:
        expect_column_values_to_be_in_type_list(column="cost", type_list=["int64","int32","float64","float32","long","double","decimal"]).'
      sources:
      - start_line: 7
        end_line: 9
        file: ''
    - text: 'The ''cost'' column values must be finite real numbers (no NaN, +Inf,
        or -Inf), since LogisticRegression requires finite numeric inputs. We could
        represent this as a Deequ constraint: .satisfies("isfinite(CAST(`cost` AS
        DOUBLE))", "Cost finite", lambda x: x == 1.0). In Great Expectations: expect_column_values_to_not_be_in_set(column="cost",
        value_set=[inf, -inf]).'
      sources:
      - start_line: 7
        end_line: 9
        file: ''
  location:
    code:
    - suggestion: '.satisfies(''`location` IS NOT NULL'', ''Location must be non-null'',
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("`location` IN (''US'',''EU'',''AS'',''AFR'',''AUS'')",
        ''Location in allowed set'', lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasDataType(''location'', ConstrainableDataTypes.String, lambda
        x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''`location` = trim(`location`)'', ''No surrounding
        whitespace'', lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''location'' column must be non-null for all rows. OneHotEncoder
        is called with handle_unknown=''error'' and no category for null/NaN, so any
        null would cause transform to fail. Example validation: Deequ hasCompleteness(''location'',
        lambda v: v == 1.0) or Great Expectations expect_column_values_to_not_be_null.'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
    - text: 'The ''location'' column values must be strictly within the closed set
        {''US'',''EU'',''AS'',''AFR'',''AUS''}. Any other value should be considered
        invalid because the encoder is configured with these categories and handle_unknown=''error''.
        Example validation: Deequ isContainedIn(''location'', Array(''US'',''EU'',''AS'',''AFR'',''AUS''),
        lambda x: x == 1.0) or Great Expectations expect_column_values_to_be_in_set([...])
        with result_format=''COMPLETE''.'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
    - text: 'The ''location'' column should be of string type (exact, case-sensitive
        codes). The encoder expects categorical/string-like values that match the
        specified categories exactly (e.g., ''US'' not ''us'' and without extra whitespace).
        Example validation: Deequ hasDataType(''location'', ConstrainableDataTypes.String)
        and satisfies(''location = trim(location)'', ''No surrounding whitespace'',
        lambda x: x == 1.0) or Great Expectations expect_column_values_to_be_of_type(''object'')
        and expect_column_values_to_match_regex_list([''^(US|EU|AS|AFR|AUS)$'']).'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
  status:
    code:
    - suggestion: .isComplete('status')
      validity: null
      level: error
    - suggestion: '.satisfies("status = ''COMPLETED''", "HasPositiveClass", lambda
        x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("status <> ''COMPLETED''", "HasNegativeClass", lambda
        x: x > 0)'
      validity: null
      level: error
    - suggestion: .isContainedIn('status', ['COMPLETED','CANCELLED','IN_PROGRESS'])
      validity: null
      level: warning
    - suggestion: .hasDataType('status', ConstrainableDataTypes.String)
      validity: null
      level: error
    assumptions:
    - text: 'The ''status'' column should be complete (no nulls), since it is directly
        compared to the literal ''COMPLETED'' to create the target label without any
        null-handling. Deequ example: isComplete(''status'').'
      sources:
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'The dataset must contain at least one ''COMPLETED'' row and at least
        one non-''COMPLETED'' row so that the binary target y has two classes for
        LogisticRegression. Deequ examples: satisfies(''CASE WHEN status = ''''COMPLETED''''
        THEN 1 ELSE 0 END'', ''HasPositiveClass'', lambda x: x > 0) and satisfies(''CASE
        WHEN status <> ''''COMPLETED'''' THEN 1 ELSE 0 END'', ''HasNegativeClass'',
        lambda x: x > 0).'
      sources:
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'The ''status'' column should use standardized uppercase categorical values,
        expected to be in the set {''COMPLETED'', ''CANCELLED'', ''IN_PROGRESS''}.
        This avoids unexpected labels being treated as the negative class. Deequ example:
        isContainedIn(''status'', [''COMPLETED'',''CANCELLED'',''IN_PROGRESS'']).'
      sources:
      - start_line: 8
        end_line: 8
        file: ''
    - text: 'The ''status'' column should be of string type, as the code performs
        string equality against ''COMPLETED''. Deequ example: hasDataType(''status'',
        ConstrainableDataTypes.String).'
      sources:
      - start_line: 8
        end_line: 8
        file: ''
