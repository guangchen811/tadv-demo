constraints:
  behaviour:
    code:
    - suggestion: '.satisfies("CASE WHEN `behaviour` IS NOT NULL THEN 1 ELSE 0 END",
        "No null behaviours", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `behaviour` IN (''killer'',''socializer'',''achiever'',''explorer'')
        THEN 1 ELSE 0 END", "At least one known behaviour", lambda x: x >= 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `behaviour` = ''killer'' THEN 1 ELSE 0 END",
        "Count for class killer >= 1", lambda x: x >= 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `behaviour` = ''socializer'' THEN 1 ELSE
        0 END", "Count for class socializer >= 1", lambda x: x >= 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `behaviour` = ''achiever'' THEN 1 ELSE 0
        END", "Count for class achiever >= 1", lambda x: x >= 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `behaviour` = ''explorer'' THEN 1 ELSE 0
        END", "Count for class explorer >= 1", lambda x: x >= 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN TRIM(`behaviour`) IN (''killer'',''socializer'',''achiever'',''explorer'')
        THEN 1 ELSE 0 END", "Trimmed behaviour in classes >= 1%", lambda x: x >= 0.01)'
      validity: null
      level: warning
    - suggestion: '.satisfies("CASE WHEN `behaviour` IN (''killer'',''socializer'',''achiever'',''explorer'')
        THEN 1 ELSE 0 END", "Valid behaviour categories fraction >= 1%", lambda x:
        x >= 0.01)'
      validity: null
      level: warning
    - suggestion: '.satisfies("CASE WHEN `behaviour` = '''' THEN 1 ELSE 0 END", "Empty
        behaviour fraction <= 50%", lambda x: x <= 0.5)'
      validity: null
      level: warning
    assumptions:
    - text: "The 'behaviour' column is expected to contain values from the set {'killer',\
        \ 'socializer', 'achiever', 'explorer'}. Values not in this set will be encoded\
        \ as -1 and removed from the training set, so the input should include a non\u2011\
        negligible fraction of rows with behaviours in this set (at minimum at least\
        \ one row, preferably a small percentage of the dataset). Example Deequ-style\
        \ constraint: .satisfies(\"CASE WHEN `behaviour` IN ('killer','socializer','achiever','explorer')\
        \ THEN 1 ELSE 0 END\", \"Valid behaviour categories\", lambda x: x >= 0.01)\
        \  (or use >= 1 row: lambda x: x >= 1)"
      sources:
      - start_line: 1
        end_line: 1
        file: ''
      - start_line: 6
        end_line: 15
        file: ''
    - text: 'The code checks membership using exact string equality. Therefore ''behaviour''
        values must match the class tokens exactly (case-sensitive and without extra
        whitespace). If values are not normalized (different case or surrounding spaces),
        they will be treated as unknown and dropped. Example constraint to enforce
        trimmed exact matches: .satisfies("CASE WHEN TRIM(`behaviour`) IN (''killer'',''socializer'',''achiever'',''explorer'')
        THEN 1 ELSE 0 END", "Trimmed behaviour in classes", lambda x: x >= 0.01)'
      sources:
      - start_line: 4
        end_line: 11
        file: ''
    - text: 'The column may contain placeholder/missing labels represented as the
        empty string ''''. The code will treat empty strings as not-in-classes (encoded
        to -1) and remove them from training. As an input-data assumption, quantify
        an acceptable maximum fraction of empty-string values so you don''t drop most
        of the dataset. Example constraint: .satisfies("CASE WHEN `behaviour` = ''''
        THEN 1 ELSE 0 END", "Empty behaviour fraction", lambda x: x <= 0.5) (adjust
        threshold as required)'
      sources:
      - start_line: 5
        end_line: 15
        file: ''
    - text: 'Each class intended for model training should have at least one example
        in the input data. If a class has zero examples after encoding, the training/learning
        process may be invalid. Example per-class constraint (for each c in classes):
        .satisfies("CASE WHEN `behaviour` = ''c'' THEN 1 ELSE 0 END", "Count for class
        c", lambda x: x >= 1)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
      - start_line: 14
        end_line: 15
        file: ''
    - text: 'The code does not explicitly handle null/NaN values (it only checks membership).
        While the current dataset reports completeness=1.0, ensure the input does
        not contain nulls; nulls would be treated as not-in-classes and become -1.
        Example constraint: .satisfies("CASE WHEN `behaviour` IS NOT NULL THEN 1 ELSE
        0 END", "No null behaviours", lambda x: x == 1)'
      sources:
      - start_line: 5
        end_line: 11
        file: ''
