constraints:
- .hasDataType('behaviour', ConstrainableDataTypes.String)
- .satisfies("behaviour IS NULL OR TRIM(behaviour) = '' OR lower(behaviour) IN ('killer','socializer','achiever','explorer')",
  'behaviour_values_valid')
- '.satisfies("lower(behaviour) IN (''killer'',''socializer'',''achiever'',''explorer'')",
  ''behaviour_has_training_rows'', lambda v: v >= 0.05)'
- '.hasApproxCountDistinct(''behaviour'', lambda v: v >= 2, where="lower(behaviour)
  IN (''killer'',''socializer'',''achiever'',''explorer'')")'
