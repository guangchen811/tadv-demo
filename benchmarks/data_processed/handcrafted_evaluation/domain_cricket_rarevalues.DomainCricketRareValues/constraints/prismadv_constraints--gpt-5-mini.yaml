    - suggestion: '.satisfies("CASE WHEN typeof(`result`) IN (''string'',''character'')
        THEN 1 ELSE 0 END", "ResultIsString", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN trim(lower(`result`)) IN (''tie'',''no_result'',''runs'',''wickets'')
        THEN 1 ELSE 0 END", "AllowedResultLabels", lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: The input dataset must contain a column named 'result' (the code assigns
        col_with_result = 'result' and uses it in the query).
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''result'' column should be a string (or values that can be compared
        to string literals). The code performs equality comparisons against string
        literals (''tie'' and ''no_result''), so values must be text or castable to
        text for those comparisons to behave as intended. Example Deequ-style check:
        .satisfies("CASE WHEN typeof(`result`) IN (''string'',''character'') THEN
        1 ELSE 0 END", "ResultIsString", lambda x: x == 1)'
      sources:
      - start_line: 2
        end_line: 5
        file: ''
    - text: 'The code expects exact matches to the lowercase strings ''tie'' and ''no_result''
        (comparisons are literal and thus effectively case-sensitive and sensitive
        to surrounding whitespace). If the dataset uses different casing or extra
        whitespace (e.g., ''Tie'', '' NO_RESULT'', ''no result''), the query will
        not count those as undecided. To validate consistent labeling you can require
        normalized values or exact values. Example Deequ constraint (enforce exact
        allowed labels): .satisfies("CASE WHEN trim(lower(`result`)) IN (''tie'',''no_result'',''runs'',''wickets'')
        THEN 1 ELSE 0 END", "AllowedResultLabels", lambda x: x == 1)'
      sources:
      - start_line: 2
        end_line: 5
        file: ''
    - text: 'If your downstream logic assumes only a small set of possible results,
        ensure the ''result'' column contains only those expected categories (e.g.,
        ''runs'', ''wickets'', and the undecided labels ''tie'' or ''no_result'').
        This can be expressed as a validation that all values are in the allowed set.
        Example Deequ constraint: .satisfies("CASE WHEN `result` IN (''runs'',''wickets'',''tie'',''no_result'')
        THEN 1 ELSE 0 END", "ResultInAllowedSet", lambda x: x == 1)'
      sources:
      - start_line: 2
        end_line: 5
        file: ''
