    - text: 'The ''result'' column must exist in the input data and be of a string/text
        type so it can be compared to string literals in SQL. Possible validation:
        Deequ hasDataType(''result'', ConstrainableDataTypes.String) and Great Expectations
        expect_column_to_exist(''result'') + expect_column_values_to_be_of_type(''result'',
        ''str'').'
