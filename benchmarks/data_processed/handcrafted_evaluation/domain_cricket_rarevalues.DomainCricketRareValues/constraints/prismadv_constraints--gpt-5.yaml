      validity: null
      level: warning
    - suggestion: '.satisfies("CASE WHEN `result` IS NULL THEN 1 WHEN LOWER(TRIM(`result`))
        = `result` THEN 1 ELSE 0 END", "result lowercase and trimmed", lambda x: x
        == 1.0)'
      validity: null
      level: warning
    - suggestion: .isComplete('result')
      validity: null
