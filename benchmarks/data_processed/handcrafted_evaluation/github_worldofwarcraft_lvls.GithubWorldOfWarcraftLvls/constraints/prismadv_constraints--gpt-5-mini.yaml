constraints:
  lvl_start:
    code:
    - suggestion: .isComplete("lvl_start")
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `lvl_start` IS NOT NULL AND floor(`lvl_start`)
        = `lvl_start` THEN 1 ELSE 0 END", "Integer lvl_start", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `lvl_start` BETWEEN 0 AND 100 THEN 1 ELSE
        0 END", "lvl_start in 0-100", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `lvl_start` BETWEEN 29 AND 70 THEN 1 ELSE
        0 END", "Most lvl_start in observed range", lambda x: x >= 0.95)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''lvl_start'' column must not contain nulls. The code subtracts lvl_end
        from lvl_start without any null-handling, and the dataset completeness is
        1.0. We could represent this as a Deequ/GE constraint such as: .satisfies("CASE
        WHEN `lvl_start` IS NOT NULL THEN 1 ELSE 0 END", "Non-null lvl_start", lambda
        x: x == 1).'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
    - text: 'The ''lvl_start'' column must be numeric/integral because it is used
        in arithmetic (subtraction to compute ''evolution''). We expect integer values
        (no fractional parts). Example Deequ-style check: .satisfies("CASE WHEN `lvl_start`
        IS NOT NULL AND floor(`lvl_start`) = `lvl_start` THEN 1 ELSE 0 END", "Integer
        lvl_start", lambda x: x == 1).'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
    - text: 'Values in ''lvl_start'' should lie within a reasonable domain. Based
        on the observed histogram the values fall between 29 and 70; as a conservative
        input-data rule you can require values to be within [0,100], and optionally
        require that at least 95% of values fall within the observed range [29,70].
        Example checks: .satisfies("CASE WHEN `lvl_start` BETWEEN 0 AND 100 THEN 1
        ELSE 0 END", "lvl_start in 0-100", lambda x: x == 1) and .satisfies("CASE
        WHEN `lvl_start` BETWEEN 29 AND 70 THEN 1 ELSE 0 END", "Most lvl_start in
        observed range", lambda x: x >= 0.95).'
      sources:
      - start_line: 1
        end_line: 2
        file: ''
