      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''ballnumber'' column should represent the ball index within an over
        and be in the set {0,1,2,3,4,5} (i.e., between 0 and 5 inclusive). This keeps
        ''(overs * 6 + ballnumber)'' aligned with standard 6-ball overs and avoids
        negative or overcounted ''balls_left''. A Deequ-style constraint could be
        expressed as: .satisfies("ballnumber >= 0 AND ballnumber <= 5", "ballnumber
        in [0,5]", lambda x: x == 1.0)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'Cross-column consistency: for any row, ''(overs * 6 + ballnumber)'' should
        be between 0 and 120 inclusive so that ''balls_left'' remains within [0, 120].
        A Deequ-style constraint could be: .satisfies("(overs * 6 + ballnumber) >=
        0 AND (overs * 6 + ballnumber) <= 120", "valid balls accounting", lambda x:
        x == 1.0)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
