    - suggestion: '.satisfies(''(`overs` * 6 + `ballnumber`) BETWEEN 0 AND 120'',
        ''Balls bowled within T20 limit'', lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''overs'' column must be complete (no nulls) and numeric/integral,
        since it is used directly in arithmetic to compute balls_left without any
        null handling or casting. This can be represented as: completeness(''overs'')
        == 1.0 and a numeric/integral type check.'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''overs'' column should represent the count of completed overs in
        a T20 innings and be within the range [0, 19]. Values outside this range would
        imply more than 120 balls or negative balls_left. This can be represented
        as: satisfies(''`overs` BETWEEN 0 AND 19'', ''Valid overs range'', lambda
        x: x == 1.0).'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'Cross-column constraint involving ''overs'': (`overs` * 6 + `ballnumber`)
        must be between 0 and 120 (inclusive) so that balls_left = 120 - (overs*6
        + ballnumber) is never negative and does not exceed 120. Equivalently, when
        `overs` = 19, `ballnumber` should be in [0, 5]. This can be represented as:
        satisfies(''(`overs` * 6 + `ballnumber`) BETWEEN 0 AND 120'', ''Balls bowled
        within T20 limit'', lambda x: x == 1.0).'
