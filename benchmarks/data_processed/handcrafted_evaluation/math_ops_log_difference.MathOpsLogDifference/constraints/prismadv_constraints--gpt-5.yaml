constraints:
  cost:
    code:
    - suggestion: .isComplete("cost")
      validity: null
      level: error
    - suggestion: '.satisfies("CAST(`cost` AS DOUBLE) IS NOT NULL", "cost is numeric",
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("(CAST(`cost` AS DOUBLE) - CAST(`reduction` AS DOUBLE))
        > 0", "Positive argument to log", lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''cost'' column must not contain null values because the code performs
        arithmetic and applies math.log without any null handling. We could represent
        this assumption as a deequ constraint like this: .isComplete("cost")'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'The ''cost'' column must be numeric (integral or fractional) so that
        subtraction with ''reduction'' is valid. We could represent this assumption
        as a deequ constraint like this: .hasDataType("cost", ConstrainableDataTypes.Integral)
        or .hasDataType("cost", ConstrainableDataTypes.Fractional)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'For every row, ''cost'' must be strictly greater than the corresponding
        ''reduction'' so that (cost - reduction) > 0 and math.log is defined (no zero
        or negative inputs). We could represent this assumption as a deequ constraint
        like this: .satisfies("CASE WHEN (`cost` - `reduction`) > 0 THEN 1 ELSE 0
        END", "Positive argument to log", lambda x: x == 1.0)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
  reduction:
    code:
    - suggestion: .isComplete("reduction")
      validity: null
      level: error
    - suggestion: .hasDataType("reduction", ConstrainableDataTypes.Integral)
      validity: null
      level: error
    - suggestion: '.satisfies("(`cost` - `reduction`) > 0", "Positive log input",
        lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''reduction'' column must be numeric and non-null for all rows so
        that (cost - reduction) can be computed without type errors or unintended
        NaNs before applying log. We could represent this assumption as a deequ constraint
        like this: .isComplete("reduction") and .hasDataType("reduction", ConstrainableDataTypes.Integral)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'For every row, (cost - reduction) must be strictly greater than 0 (i.e.,
        reduction < cost) so that math.log receives a positive input and does not
        raise a domain error. We could represent this assumption as a deequ constraint
        like this: .satisfies("(`cost` - `reduction`) > 0", "Positive log input",
        lambda x: x == 1.0)'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
