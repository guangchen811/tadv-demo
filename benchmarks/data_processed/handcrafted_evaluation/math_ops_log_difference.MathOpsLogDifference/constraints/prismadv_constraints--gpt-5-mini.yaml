        end_line: 1
        file: ''
    - text: 'The ''cost'' column must not contain null/missing values because the
        code uses it in arithmetic and immediately applies math.log; null would cause
        an error. Represent as: .isComplete("cost") or .satisfies("CASE WHEN `cost`
        IS NOT NULL THEN 1 ELSE 0 END", "cost_not_null", lambda x: x == 1).'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
    - text: 'Values in the ''cost'' column must be numeric (integral or castable to
        numeric) so subtraction and log can be computed. You can validate with a rule
        like: .satisfies("CASE WHEN `cost` RLIKE ''^-?\\d+$'' THEN 1 ELSE 0 END",
