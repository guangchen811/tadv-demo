    - text: 'The value in the ''cost'' column must be strictly greater than the value
        in the ''reduction'' column for every row. This is because the `math.log`
        function is applied to their difference, and the logarithm is only defined
        for positive numbers (i.e., `cost - reduction > 0`).

        We could represent this assumption as a deequ constraint like this:

        .satisfies("`cost` > `reduction`", "cost must be greater than reduction",
        lambda x: x == 1.0)'
