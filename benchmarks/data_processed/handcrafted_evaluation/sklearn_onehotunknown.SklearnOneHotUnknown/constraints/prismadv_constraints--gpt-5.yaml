constraints:
  cost:
    code:
    - suggestion: '.hasDataType(''cost'', ConstrainableDataTypes.Numeric, lambda f:
        f == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasCompleteness(''cost'', lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN cost IS NOT NULL AND isfinite(CAST(cost
        AS DOUBLE)) THEN 1 ELSE 0 END'', ''Finite cost'', lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies(''cost >= 0'', ''Non-negative cost'', lambda x: x ==
        1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''cost'' column must be numeric (integers or floats), not strings
        or mixed types, because it is passed directly into a numeric feature matrix
        for model fitting. Example validation: Deequ .hasDataType(''cost'', ConstrainableDataTypes.Numeric,
        lambda f: f == 1.0) or Great Expectations expect_column_values_to_be_in_type_list
        with types like [''int64'',''float64'',''int32'',''float32''].'
      sources:
      - start_line: 7
        end_line: 9
        file: ''
    - text: 'The ''cost'' column must be complete (no nulls/NaNs) since scikit-learn''s
        LogisticRegression cannot fit with missing values. Example validation: Deequ
        .hasCompleteness(''cost'', lambda x: x == 1.0) or Great Expectations expect_column_values_to_not_be_null.'
      sources:
      - start_line: 7
        end_line: 9
        file: ''
    - text: 'The ''cost'' column must contain only finite values (no +Inf/-Inf), as
        the model fit requires finite numeric inputs. Example validation: Deequ .satisfies(''CASE
        WHEN cost IS NOT NULL AND isfinite(CAST(cost AS DOUBLE)) THEN 1 ELSE 0 END'',
        ''Finite cost'', lambda x: x == 1.0) or Great Expectations expect_column_values_to_be_between
        with very wide bounds and allow_infinity=False.'
      sources:
      - start_line: 7
        end_line: 9
        file: ''
    - text: 'The ''cost'' column should be non-negative (cost >= 0). This aligns with
        the observed data and common domain semantics for costs, helping prevent training/serving
        skew after deployment. Example validation: Deequ .hasMin(''cost'', lambda
        m: m >= 0) or Great Expectations expect_column_min_to_be_greater_than_or_equal_to
        0.'
      sources:
      - start_line: 7
        end_line: 10
        file: ''
  location:
    code:
    - suggestion: '.satisfies("`location` IN (''US'',''EU'',''AS'',''AFR'',''AUS'')",
        "Valid locations", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasCompleteness("location", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasDataType("location", ConstrainableDataTypes.String, lambda
        x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''location'' column values must exactly belong to the closed set
        {''US'', ''EU'', ''AS'', ''AFR'', ''AUS''} (case-sensitive, no extra whitespace).
        100% of rows should satisfy this. Example validations: Deequ .isContainedIn(''location'',
        [''US'',''EU'',''AS'',''AFR'',''AUS'']) or .satisfies("CASE WHEN `location`
        IN (''US'',''EU'',''AS'',''AFR'',''AUS'') THEN 1 ELSE 0 END", ''Valid locations'',
        lambda x: x == 1.0); Great Expectations expect_column_values_to_be_in_set(''location'',
        [''US'',''EU'',''AS'',''AFR'',''AUS'']).'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
    - text: 'The ''location'' column must be complete (no nulls). Example validations:
        Deequ .hasCompleteness(''location'', lambda x: x == 1.0); Great Expectations
        expect_column_values_to_not_be_null(''location'').'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
    - text: 'The ''location'' column values should be of string/object type to match
        the expected categorical encoder input. Example validations: Deequ .hasDataType(''location'',
        ConstrainableDataTypes.String) or .satisfies("CASE WHEN typeof(`location`)
        = ''string'' THEN 1 ELSE 0 END", ''Location is string'', lambda x: x == 1.0);
        Great Expectations expect_column_values_to_be_in_type_list(''location'', [''str'',
        ''object'']).'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
  status:
    code:
    - suggestion: '.hasCompleteness(''status'', lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("status = ''COMPLETED''", "has_positive_class", lambda
        x: x > 0)'
      validity: null
      level: error
    - suggestion: '.satisfies("status <> ''COMPLETED''", "has_negative_class", lambda
        x: x > 0)'
      validity: null
      level: error
    - suggestion: '.isContainedIn(''status'', [''COMPLETED'',''CANCELLED'',''IN_PROGRESS''],
        lambda x: x == 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''status'' column must be non-null for all rows used to train the
        model, since it is directly compared to a string without any null handling.
        This can be validated as: Deequ: .hasCompleteness(''status'', lambda x: x
        == 1.0) or Great Expectations: expect_column_values_to_not_be_null(''status'').'
      sources:
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'The ''status'' column must contain at least one ''COMPLETED'' and at
        least one non-''COMPLETED'' value so that the target y has two classes for
        LogisticRegression. This can be validated as: Deequ: .satisfies("CASE WHEN
        status = ''COMPLETED'' THEN 1 ELSE 0 END", "has_positive_class", lambda x:
        x > 0).satisfies("CASE WHEN status = ''COMPLETED'' THEN 1 ELSE 0 END", "has_negative_class",
        lambda x: x < 1) or Great Expectations: expect_column_proportion_of_unique_values_to_be_between
        on a boolean map of (status == ''COMPLETED'') to enforce 0 < proportion <
        1, or use two expectations on the count of ''COMPLETED'' and count of not
        ''COMPLETED''.'
      sources:
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'The ''status'' values should use the exact expected labels/casing so
        that ''COMPLETED'' is correctly identified as the positive class; statuses
        should be within {''COMPLETED'', ''CANCELLED'', ''IN_PROGRESS''}. This can
        be validated as: Deequ: .isContainedIn(''status'', [''COMPLETED'',''CANCELLED'',''IN_PROGRESS''])
        or Great Expectations: expect_column_values_to_be_in_set(''status'', [''COMPLETED'',''CANCELLED'',''IN_PROGRESS'']).'
      sources:
      - start_line: 8
        end_line: 8
        file: ''
