        .satisfies("CASE WHEN `location` IS NOT NULL THEN 1 ELSE 0 END", "Non-null
        location", lambda x: x == 1)'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
    - text: 'All values in the ''location'' column must be one of the expected categories:
        ''US'', ''EU'', ''AS'', ''AFR'', or ''AUS''. The encoder is configured with
        these known_locations and handle_unknown=''error'', so any value outside this
        set will cause transform() to fail. Represent as a validation rule such as:

        .satisfies("CASE WHEN `location` IN (''US'',''EU'',''AS'',''AFR'',''AUS'')
        THEN 1 ELSE 0 END", "Allowed locations", lambda x: x == 1)'
      sources:
      - start_line: 5
        end_line: 6
        file: ''
    - text: 'Values in ''location'' must match the allowed category strings exactly
        (case-sensitive, with no unexpected leading/trailing whitespace), because
        the code does no normalization before OneHotEncoder matching. Represent as
        validation rules such as:

        .satisfies("CASE WHEN `location` IS NOT NULL AND TRIM(`location`) = `location`
        THEN 1 ELSE 0 END", "No surrounding whitespace in location", lambda x: x ==
        1)

        and/or

        .satisfies("CASE WHEN `location` IN (''US'',''EU'',''AS'',''AFR'',''AUS'')
        THEN 1 ELSE 0 END", "Allowed locations (exact match)", lambda x: x == 1)'
