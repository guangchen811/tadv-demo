constraints:
  email:
    code:
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' THEN CASE WHEN email
        IS NOT NULL AND LENGTH(TRIM(email)) > 0 THEN 1 ELSE 0 END ELSE 1 END", "Email
        present for COMPLETED", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' THEN CASE WHEN email
        RLIKE ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'' THEN 1 ELSE 0
        END ELSE 1 END", "Email format for COMPLETED", lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: .where("status = 'COMPLETED'").isUnique("email")
      validity: null
      level: warning
    assumptions:
    - text: 'For rows where status = ''COMPLETED'', the email column must be non-null
        and non-empty (after trimming). We could represent this as a conditional completeness
        constraint, for example:

        Deequ: .satisfies("CASE WHEN status = ''COMPLETED'' THEN CASE WHEN email IS
        NOT NULL AND LENGTH(TRIM(email)) > 0 THEN 1 ELSE 0 END ELSE 1 END", "Email
        present for COMPLETED", lambda x: x == 1.0)

        Great Expectations: expect_column_values_to_not_be_null with row_condition="status
        == ''COMPLETED''" and expect_column_values_to_not_match_regex with regex="^\s*$"
        and mostly=1.0 (to ensure non-empty).'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'For rows where status = ''COMPLETED'', values in the email column should
        match a standard email pattern. We could represent this as:

        Deequ: .satisfies("CASE WHEN status = ''COMPLETED'' THEN CASE WHEN email RLIKE
        ''^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'' THEN 1 ELSE 0 END ELSE
        1 END", "Email format for COMPLETED", lambda x: x == 1.0)

        Great Expectations: expect_column_values_to_match_regex with regex="^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$"
        and row_condition="status == ''COMPLETED''".'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'Among rows where status = ''COMPLETED'', email values should be unique
        to avoid sending duplicate confirmations to the same address. We could represent
        this as:

        Deequ: .where("status = ''COMPLETED''").isUnique("email")

        Great Expectations: expect_column_values_to_be_unique with row_condition="status
        == ''COMPLETED''".'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
      - start_line: 8
        end_line: 9
        file: ''
  status:
    code:
    - suggestion: .hasDataType("status", ConstrainableDataTypes.String)
      validity: null
      level: error
    - suggestion: .isComplete("status")
      validity: null
      level: warning
    - suggestion: .isContainedIn("status", ["COMPLETED", "CANCELLED", "UNDER_REVIEW"])
      validity: null
      level: warning
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' THEN 1 ELSE 0 END",
        "HasCompleted", lambda x: x > 0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''status'' column should be complete (no NULLs) and stored as a String,
        since it is compared to a string literal in the SQL filter. This can be validated
        with Deequ: .isComplete("status") and .hasDataType("status", ConstrainableDataTypes.String);
        or Great Expectations: expect_column_values_to_not_be_null and expect_column_values_to_be_of_type(''str'').'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
    - text: 'The ''status'' column should contain only the expected enumerated values:
        {''COMPLETED'', ''CANCELLED'', ''UNDER_REVIEW''} to ensure the equality check
        matches standardized values. This can be validated with Deequ: .isContainedIn("status",
