      sources:
      - start_line: 5
        end_line: 5
        file: ''
    - text: 'There should be at least one row with status = ''COMPLETED'' so that
        the downstream email-sending step produces work. This can be validated with
        Deequ: .satisfies("CASE WHEN status = ''COMPLETED'' THEN 1 ELSE 0 END", "HasCompleted",
