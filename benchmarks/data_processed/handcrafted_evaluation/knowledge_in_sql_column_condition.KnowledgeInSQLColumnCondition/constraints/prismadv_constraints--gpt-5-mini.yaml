constraints:
  email:
    code:
    - suggestion: '.hasDataType("email", "String", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' AND email IS NOT NULL
        THEN 1 ELSE 0 END", "Non-null emails for completed rows", lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN status = ''COMPLETED'' AND regexp_like(email,
        ''^[^@]+@[^@]+\.[^@]+$'') THEN 1 ELSE 0 END", "Valid email format for completed
        rows", lambda x: x == 1)'
      validity: null
      level: warning
    assumptions:
    - text: 'The input dataset must contain the ''email'' column and its values should
        be string-like (or convertible to string). The SQL query selects SELECT email
        FROM df, so if the column is missing or contains non-string/unserializable
        objects the query or downstream processing may fail. Example checks you could
        enforce: Great Expectations: expect_column_to_exist(''email'') and expect_column_values_to_be_of_type(''email'',
        ''string'').'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
    - text: 'For rows where status = ''COMPLETED'', the ''email'' value must be non-null.
        The code selects email for completed rows and immediately calls send_confirmation_mail(row[0]),
        so a NULL/None email will likely cause an error or invalid behavior. Example
        Deequ constraint: .satisfies("CASE WHEN status = ''COMPLETED'' AND email IS
        NOT NULL THEN 1 ELSE 0 END", "Non-null emails for completed rows", lambda
        x: x == 1). Example Great Expectations style: expect_column_values_to_not_be_null(''email'',
        condition="status == ''COMPLETED''").'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
      - start_line: 8
        end_line: 9
        file: ''
    - text: 'For rows where status = ''COMPLETED'', the ''email'' values should be
        syntactically valid email addresses (at least contain a single ''@'' and a
        domain part, e.g. match a simple regex). The emails are used to send confirmations,
        so they should look like proper addresses. Example Deequ constraint using
        a regex: .satisfies("CASE WHEN status = ''COMPLETED'' AND regexp_like(email,
        ''^[^@]+@[^@]+\\.[^@]+$'') THEN 1 ELSE 0 END", "Valid email format for completed
        rows", lambda x: x == 1). Example Great Expectations: expect_column_values_to_match_regex(''email'',
        ''^[^@]+@[^@]+\.[^@]+$'', condition="status == ''COMPLETED''").'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
      - start_line: 8
        end_line: 9
        file: ''
