constraints:
- .isComplete('email')
- .satisfies("status != 'COMPLETED' OR email IS NOT NULL", 'completed_email_present')
- .satisfies("email IS NULL OR email RLIKE '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'",
  'email_format_valid')
- .satisfies("email IS NULL OR trim(email) = email", 'email_no_surrounding_whitespace')
- .satisfies("email IS NULL OR email != ''", 'email_not_empty')
