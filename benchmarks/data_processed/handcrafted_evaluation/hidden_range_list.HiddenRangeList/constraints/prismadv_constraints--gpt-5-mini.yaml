constraints:
  status:
    code:
    - suggestion: '.satisfies(''CASE WHEN `status` IS NULL THEN 1 WHEN `status` BETWEEN
        0 AND 3 THEN 1 ELSE 0 END'', ''StatusIndexValid'', lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `status` IS NULL THEN 1 WHEN `status` =
        FLOOR(`status`) THEN 1 ELSE 0 END'', ''StatusIsInteger'', lambda x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies(''CASE WHEN `status` IS NOT NULL THEN 1 ELSE 0 END'',
        ''NonNullStatusExists'', lambda x: x > 0)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''status'' column must contain integer values that are valid indices
        into action_per_status (which has length 4). Concretely, input values should
        be in the inclusive range 0..3. Values < 0 or >= 4 will raise an IndexError
        or produce unintended mappings (negative indices in Python). Example deequ-style
        check: .satisfies(''CASE WHEN `status` IS NOT NULL AND `status` BETWEEN 0
        AND 3 THEN 1 ELSE 0 END'', ''StatusIndexValid'', lambda x: x == 1)'
      sources:
      - start_line: 1
        end_line: 5
        file: ''
    - text: 'Null / missing ''status'' values are permissible because the code guards
        with pd.isna(row[''status'']) and will skip rows where status is missing.
        Ensure missing values are represented as proper null/NA (so pandas'' isna
        detects them). Optionally validate that there are some non-null statuses if
        downstream work expects any actions to be scheduled. Example deequ-style check
        to require at least one non-null: .satisfies(''CASE WHEN `status` IS NOT NULL
        THEN 1 ELSE 0 END'', ''NonNullStatusFraction'', lambda x: x > 0)'
      sources:
      - start_line: 4
        end_line: 5
        file: ''
    - text: 'The ''status'' values must be integer-valued (not fractional floats or
        non-numeric strings) because they are used as list indices. Validate that
        non-null values are equal to their integer floor. Example deequ-style check:
        .satisfies(''CASE WHEN `status` IS NULL THEN 1 WHEN `status` = FLOOR(`status`)
        THEN 1 ELSE 0 END'', ''StatusIsInteger'', lambda x: x == 1)'
      sources:
      - start_line: 5
        end_line: 5
        file: ''
