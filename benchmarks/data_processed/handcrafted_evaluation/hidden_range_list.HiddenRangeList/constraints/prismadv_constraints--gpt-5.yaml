constraints:
  booking_id:
    code:
    - suggestion: '.satisfies("CASE WHEN status IS NOT NULL THEN CASE WHEN booking_id
        IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "booking_id present when actionable",
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasUniqueness(["booking_id"], lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("CAST(booking_id AS BIGINT) IS NOT NULL", "booking_id
        integer-like", lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''booking_id'' column must be non-null for all rows where ''status''
        is not null, because schedule_next_action is invoked with booking_id only
        in that case. Example Deequ constraint: .satisfies("CASE WHEN status IS NOT
        NULL THEN CASE WHEN booking_id IS NOT NULL THEN 1 ELSE 0 END ELSE 1 END",
        "booking_id present when actionable", lambda x: x == 1.0)'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
    - text: '''booking_id'' values should be unique across the input to avoid scheduling
        duplicate actions for the same booking. Example Deequ constraint: .hasUniqueness(["booking_id"],
        lambda x: x == 1.0)'
      sources:
      - start_line: 3
        end_line: 6
        file: ''
    - text: '''booking_id'' should be integer-like (actual integers or strings castable
        to BIGINT) since it is used as an identifier in downstream calls. Example
        Deequ constraint: .satisfies("CAST(booking_id AS BIGINT) IS NOT NULL", "booking_id
        integer-like", lambda x: x == 1.0)'
      sources:
      - start_line: 6
        end_line: 6
        file: ''
  status:
    code:
    - suggestion: '.satisfies("(`status` IS NULL) OR (`status` IN (0,1,2,3))", "status_valid_index",
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.hasCompleteness("status", lambda c: c <= 1.0)'
      validity: null
      level: warning
    assumptions:
    - text: 'All non-null values in the ''status'' column must be valid indices into
        the action_per_status list, i.e., integers in {0, 1, 2, 3}. This prevents
        out-of-range or negative-index access when selecting action_per_status[status].
        We could represent this as a Deequ constraint like: .satisfies("CASE WHEN
        `status` IS NULL THEN 1 WHEN `status` IN (0,1,2,3) THEN 1 ELSE 0 END", "status_domain",
        lambda x: x == 1.0) or as range checks: .hasMin("status", lambda m: m >= 0)
        and .hasMax("status", lambda m: m <= 3).'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
      - start_line: 5
        end_line: 5
        file: ''
    - text: 'The ''status'' column may contain null values; rows with null status
        are intentionally skipped by the processing. Validation should therefore not
        require completeness = 1.0. If you want an explicit permissive rule, you can
        encode null-tolerant domain validation as in Assumption 1 (which treats NULLs
        as valid), or allow any null rate with Deequ: .completeness("status", lambda
        c: c <= 1.0).'
      sources:
      - start_line: 4
        end_line: 4
        file: ''
