constraints:
- .isComplete('Team1')
- .hasMinLength('Team1', 1)
- .hasPattern('Team1', r'^(?!.*(Delhi Daredevils|Deccan Chargers|Gujarat Lions|Kings
  XI Punjab)).+$')
- .isContainedIn('Team1', ['Chennai Super Kings', 'Delhi Capitals', 'Gujarat Titans',
  'Kolkata Knight Riders', 'Lucknow Super Giants', 'Mumbai Indians', 'Punjab Kings',
  'Rajasthan Royals', 'Royal Challengers Bangalore', 'Sunrisers Hyderabad'])
