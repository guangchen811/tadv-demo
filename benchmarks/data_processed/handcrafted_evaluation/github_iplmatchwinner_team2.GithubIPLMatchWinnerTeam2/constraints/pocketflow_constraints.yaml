constraints:
- .isComplete("Team1")
- '.hasPattern("Team1", r''.+'', assertion=lambda x: x == 1.0)'
- .isContainedIn("Team1", ["Rajasthan Royals", "Gujarat Titans", "Royal Challengers
  Bangalore", "Lucknow Super Giants", "Sunrisers Hyderabad", "Punjab Kings", "Mumbai
  Indians", "Chennai Super Kings", "Delhi Capitals", "Kolkata Knight Riders"])
- .doesNotContain("Team1", "Delhi Daredevils")
- .doesNotContain("Team1", "Deccan Chargers")
- .doesNotContain("Team1", "Gujarat Lions")
- .doesNotContain("Team1", "Kings XI Punjab")
- .hasMaxLength("Team1", 30)
- .hasMinLength("Team1", 4)
- '.hasPattern("Team1", r''^[A-Za-z& \-.]+$'', assertion=lambda x: x == 1.0)'
- '.hasNumberOfDistinctValues("Team1", lambda x: x >= 8)'
