constraints:
  City:
    code:
    - suggestion: '.satisfies("City IS NULL OR typeof(City) = ''string''", "City is
        string or null", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("City IS NULL OR City = trim(City)", "City values are
        trimmed", lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("NOT (lower(City) IN (''bangalore'',''dharamsala''))
        OR City IN (''Bangalore'',''Dharamsala'')", "Exact tokens for deprecated City
        names", lambda x: x == 1.0)'
      validity: null
      level: warning
    - suggestion: '.satisfies("NOT (City IN (''Bangalore'',''Dharamsala''))", "City
        already canonical", lambda x: x >= 0.95)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''City'' column must exist and all non-null values must be string-like
        so that the .str.replace operations can run without error. This can be represented
        as: Deequ.hasDataType(''City'', ConstrainableDataTypes.String) and/or .satisfies(''CASE
        WHEN City IS NULL THEN 1 WHEN typeof(City) = "string" THEN 1 ELSE 0 END'',
        ''City is string or null'', lambda x: x == 1.0).'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
    - text: 'City values should be trimmed (no leading/trailing whitespace), otherwise
        the exact-match replacements (''Bangalore'' -> ''Bengaluru'', ''Dharamsala''
        -> ''Dharamshala'') may not fire. This can be represented as: Deequ.satisfies(''CASE
        WHEN City IS NULL THEN 1 WHEN City = trim(City) THEN 1 ELSE 0 END'', ''City
        values are trimmed'', lambda x: x == 1.0) or GreatExpectations expect_column_values_to_be_in_set
        after applying a trim MapExpectation.'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
    - text: 'For the two known deprecated variants, the input should use the exact
        spellings and casing ''Bangalore'' and ''Dharamsala'' (if they appear at all);
        other case/whitespace variations (e.g., ''bangalore'', '' Bangalore '') are
        unexpected because the code uses literal exact replaces. Represent as: Deequ.satisfies(''CASE
        WHEN lower(City) IN ("bangalore","dharamsala") THEN City IN ("Bangalore","Dharamsala")
        ELSE 1 END'', ''Exact tokens for deprecated City names'', lambda x: x == 1.0).'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
    - text: 'Deprecated spellings should be rare in the input; at least 95% of City
        values should already be canonical (i.e., not equal to ''Bangalore'' or ''Dharamsala'').
        This can be represented as: Deequ.satisfies(''CASE WHEN City IN ("Bangalore","Dharamsala")
        THEN 0 ELSE 1 END'', ''City already canonical'', lambda x: x >= 0.95).'
      sources:
      - start_line: 22
        end_line: 23
        file: ''
  Team1:
    code:
    - suggestion: '.hasDataType(''Team1'', ConstrainableDataTypes.String, lambda x:
        x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("COALESCE(NOT (lower(Team1) IN (''delhi daredevils'',''deccan
        chargers'',''gujarat lions'',''kings xi punjab'') AND Team1 NOT IN (''Delhi
        Daredevils'',''Deccan Chargers'',''Gujarat Lions'',''Kings XI Punjab'')),
        TRUE)", "Legacy team names exactly cased in Team1", lambda x: x == 1)'
      validity: null
      level: warning
    - suggestion: '.satisfies("Team1 IN (''Chennai Super Kings'',''Royal Challengers
        Bangalore'',''Rajasthan Royals'',''Delhi Capitals'',''Lucknow Super Giants'',''Sunrisers
        Hyderabad'',''Gujarat Titans'',''Punjab Kings'',''Mumbai Indians'',''Kolkata
        Knight Riders'',''Delhi Daredevils'',''Deccan Chargers'',''Gujarat Lions'',''Kings
        XI Punjab'')", "Team1 in allowed canonical or legacy team names", lambda x:
        x == 1)'
      validity: null
      level: warning
    assumptions:
    - text: 'The ''Team1'' column must be string-typed (values are strings or nulls
        only) so that the pandas .str accessor works without error during the series
        of .str.replace operations. This can be represented as a Deequ rule like:
        hasDataType(''Team1'', ConstrainableDataTypes.String).'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 11
        end_line: 11
        file: ''
      - start_line: 16
        end_line: 16
        file: ''
    - text: 'Only the following legacy team names are expected in ''Team1'', and they
        must be spelled exactly (case-sensitive, exact spacing): ''Delhi Daredevils'',
        ''Deccan Chargers'', ''Gujarat Lions'', ''Kings XI Punjab''. No other spelling
        variants or abbreviations are expected. This can be validated, for example,
        with a Deequ satisfies rule that fails if lower(Team1) is one of the four
        legacy names but Team1 is not exactly equal to the correctly cased string.'
      sources:
      - start_line: 1
        end_line: 1
        file: ''
      - start_line: 6
        end_line: 6
        file: ''
      - start_line: 11
        end_line: 11
        file: ''
      - start_line: 16
        end_line: 16
        file: ''
    - text: "Every value in 'Team1' is assumed to be either already a canonical IPL\
        \ team name or one of the four supported legacy names {'Delhi Daredevils','Deccan\
        \ Chargers','Gujarat Lions','Kings XI Punjab'} that the code will normalize.\
        \ Values outside this union are unexpected. This can be represented as a Deequ\
        \ satisfies rule checking Team1 \u2208 CanonicalTeams \u222A {'Delhi Daredevils','Deccan\
        \ Chargers','Gujarat Lions','Kings XI Punjab'}. A reasonable CanonicalTeams\
