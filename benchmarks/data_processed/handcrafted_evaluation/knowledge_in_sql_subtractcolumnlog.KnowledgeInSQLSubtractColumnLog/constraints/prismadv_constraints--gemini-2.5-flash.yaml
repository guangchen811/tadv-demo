      uid: 8729311c-bc5b-40aa-9166-5f0aa039efa6
    - text: 'For the `math.log` operation to succeed without errors, the ''profit''
        column (along with the ''cost'' column) is implicitly assumed to contain non-null
        values for all rows that are not filtered out by the initial SQL query and
        where `profit_after_cost` is expected to be a valid number. If either ''profit''
        or ''cost'' is null, their difference (`profit - cost`) will result in a NULL
        value, which `math.log` cannot process. Therefore, for successful end-to-end
        execution, ''profit'' (and ''cost'') must be non-null in all such rows.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN profit IS NOT NULL AND cost IS NOT NULL THEN 1 ELSE
        0 END", "Both Profit and Cost must be non-null for log calculation", lambda
        x: x == 1.0)'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 4
        end_line: 4
        file: ''
      - start_line: 6
        end_line: 6
        file: ''
      uid: 5d89da82-cc90-40a2-b34a-12bedfbcdfb1
    - text: 'For all rows where both ''profit'' and ''cost'' are non-null, it is assumed
        that the ''profit'' column''s value is strictly greater than the ''cost''
        column''s value (`profit - cost > 0`). This is a critical assumption because
        the derived `profit_after_cost` column is used as input for `math.log`, which
        strictly requires a positive argument. If `profit - cost` is not positive,
        the `math.log` operation will fail.

        We could represent this assumption as a deequ constraint like this:

        .satisfies("CASE WHEN profit IS NOT NULL AND cost IS NOT NULL THEN profit
        - cost > 0 ELSE TRUE END", "Profit minus Cost must be positive for valid rows",
        lambda x: x == 1.0)'
