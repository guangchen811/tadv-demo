    assumptions:
    - text: 'The ''profit'' column is assumed to contain numeric values (e.g., Integral
        or Float) because it is directly used in arithmetic operations (subtraction)
        and indirectly contributes to a value that is transformed by a logarithmic
        function (`math.log`).

        We could represent this assumption as a deequ constraint like this:

        .hasDataType("profit", "Integral")'
