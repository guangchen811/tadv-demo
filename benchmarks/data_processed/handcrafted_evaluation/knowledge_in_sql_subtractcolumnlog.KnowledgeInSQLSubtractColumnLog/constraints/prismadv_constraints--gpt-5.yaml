constraints:
  cost:
    code:
    - suggestion: '.satisfies("CASE WHEN cost IS NOT NULL THEN CASE WHEN profit IS
        NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Profit present when cost present",
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN profit IS NOT NULL THEN CASE WHEN cost IS
        NOT NULL THEN 1 ELSE 0 END ELSE 1 END", "Cost present when profit present",
        lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN profit IS NOT NULL AND cost IS NOT NULL THEN
        CASE WHEN profit - cost > 0 THEN 1 ELSE 0 END ELSE 1 END", "Positive profit
        minus cost for log", lambda x: x == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'If ''cost'' is non-null in a row, ''profit'' must also be non-null so
        that ''profit - cost'' is defined for rows that pass the filter and to avoid
        applying log to a null result. We could represent this as a deequ constraint:
        .satisfies(''CASE WHEN cost IS NOT NULL THEN CASE WHEN profit IS NOT NULL
        THEN 1 ELSE 0 END ELSE 1 END'', ''Profit present when cost present'', lambda
        x: x == 1.0)'
      sources:
      - start_line: 2
        end_line: 6
        file: ''
    - text: 'If ''profit'' is non-null in a row, ''cost'' must also be non-null so
        that ''profit - cost'' is defined and log is applied only to valid numeric
        results. We could represent this as a deequ constraint: .satisfies(''CASE
        WHEN profit IS NOT NULL THEN CASE WHEN cost IS NOT NULL THEN 1 ELSE 0 END
        ELSE 1 END'', ''Cost present when profit present'', lambda x: x == 1.0)'
      sources:
      - start_line: 2
        end_line: 6
        file: ''
    - text: 'For all rows where both ''profit'' and ''cost'' are non-null, ''profit
        - cost'' must be strictly greater than 0 to ensure the logarithm is defined
        (no zero or negative inputs). We could represent this as a deequ constraint:
        .satisfies(''CASE WHEN profit IS NOT NULL AND cost IS NOT NULL THEN CASE WHEN
        profit - cost > 0 THEN 1 ELSE 0 END ELSE 1 END'', ''Positive profit minus
        cost for log'', lambda x: x == 1.0)'
      sources:
      - start_line: 2
        end_line: 6
        file: ''
  profit:
    code:
    - suggestion: '.satisfies("(profit IS NULL) OR (CAST(profit AS DOUBLE) IS NOT
        NULL)", "profit is numeric (integral or fractional)", lambda x: x == 1.0)'
      validity: null
      level: error
    - suggestion: '.satisfies("NOT (profit IS NOT NULL AND cost IS NOT NULL) OR ((profit
        - cost) > 0)", "Positive profit_after_cost when both present", lambda x: x
        == 1.0)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''profit'' column must be numeric (integral or fractional) so it
        can participate in arithmetic subtraction (profit - cost). We could represent
        this as a validation such as Deequ: .hasDataType("profit", ConstrainableDataTypes.Integral)
        or .hasDataType("profit", ConstrainableDataTypes.Fractional); or Great Expectations:
        expect_column_values_to_be_in_type_list for numeric types.'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'For any row where both ''profit'' and ''cost'' are not NULL, (profit
        - cost) must be strictly greater than 0 to avoid math.log domain errors (log
        of zero or negative is invalid). This can be enforced with a Deequ constraint
        like: .satisfies("CASE WHEN profit IS NOT NULL AND cost IS NOT NULL THEN (profit
        - cost) > 0 ELSE 1 END", "Positive profit_after_cost", lambda v: v == 1.0).'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
      - start_line: 6
        end_line: 6
        file: ''
