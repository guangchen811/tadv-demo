constraints:
  profit:
    code:
    - suggestion: '.satisfies("CASE WHEN `profit` IS NOT NULL AND `profit` = CAST(`profit`
        AS BIGINT) THEN 1 ELSE 0 END", "Profit is integral and non-null", lambda x:
        x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN `profit` IS NOT NULL AND `cost` IS NOT NULL
        AND (`profit` - `cost`) > 0 THEN 1 ELSE 0 END", "profit_after_cost > 0", lambda
        x: x == 1)'
      validity: null
      level: error
    - suggestion: '.satisfies("CASE WHEN (`profit` IS NULL AND `cost` IS NOT NULL)
        OR (`profit` IS NOT NULL AND `cost` IS NULL) THEN 0 ELSE 1 END", "no rows
        with exactly one of profit/cost null", lambda x: x == 1)'
      validity: null
      level: error
    assumptions:
    - text: 'The ''profit'' column is numeric/integral and suitable for arithmetic
        subtraction (the code computes `profit - cost`). Represent as a validation
        rule / deequ constraint like:

        .satisfies("CASE WHEN `profit` IS NOT NULL AND `profit` = CAST(`profit` AS
        BIGINT) THEN 1 ELSE 0 END", "Profit is integral and non-null", lambda x: x
        == 1)

        This ensures profit values are numeric integers and not malformed strings
        or other types.'
      sources:
      - start_line: 2
        end_line: 2
        file: ''
    - text: 'To safely apply math.log to the derived value, the subtraction result
        `profit - cost` must be strictly positive and not null for every row that
        the code processes. In input-data terms: for all rows where the code will
        select (those matching the WHERE), `profit` and `cost` should both be present
        and `profit - cost > 0`.

        Represent as a deequ constraint like:

        .satisfies("CASE WHEN `profit` IS NOT NULL AND `cost` IS NOT NULL AND (`profit`
        - `cost`) > 0 THEN 1 ELSE 0 END", "profit_after_cost > 0", lambda x: x ==
        1)

        This guarantees the argument to math.log is positive and non-null.'
      sources:
      - start_line: 2
        end_line: 6
        file: ''
    - text: 'The WHERE clause permits rows where one of `profit` or `cost` is NULL,
        but later code assumes a numeric, non-null subtraction result. Therefore the
        input should not contain rows where exactly one of `profit` or `cost` is NULL
        (no XOR nulls). Equivalently, either both are non-null (preferred) or both
        null; practically, ensure both are non-null for processed rows.

        Represent as a deequ constraint like:

        .satisfies("CASE WHEN (`profit` IS NULL AND `cost` IS NOT NULL) OR (`profit`
        IS NOT NULL AND `cost` IS NULL) THEN 0 ELSE 1 END", "no rows with exactly
        one of profit/cost null", lambda x: x == 1)

        This prevents NULL propagation into `profit - cost` which would break math.log.'
      sources:
      - start_line: 4
        end_line: 6
        file: ''
