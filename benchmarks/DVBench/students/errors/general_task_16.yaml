- RangeViolation:
    Columns:
      - Previous qualification (grade)
    Params:
      severity: 0.03
      sampling: CAR
      min_value: 0
      max_value: 200
      strategy: above_max
- OutlierInjection:
    Columns:
      - Unemployment rate
    Params:
      severity: 0.05
      sampling: CAR
      strategy: iqr_based
      factor: 3.0
