# Multi-column stress test: financial + academic columns
- GaussianNoise:
    Columns:
      - Scholarship holder
    Params:
      severity: 0.02
      sampling: CAR
- RangeViolation:
    Columns:
      - Curricular units 2nd sem (grade)
    Params:
      severity: 0.03
      sampling: CAR
      min_value: 0
      max_value: 20
      strategy: random
- MaskValues:
    Columns:
      - Previous qualification (grade)
    Params:
      severity: 0.02
      sampling: CAR
