# Target: Combined - MaskValues on Meta_score + OutlierInjection on IMDB_Rating
- MaskValues:
    Columns:
      - Meta_score
    Params:
      severity: 0.10
      sampling: CAR
- OutlierInjection:
    Columns:
      - IMDB_Rating
    Params:
      severity: 0.03
      sampling: CAR
      strategy: zscore_based
      factor: 4.0
