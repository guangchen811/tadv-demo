# Target: Combined - DataTypeViolation on Gross + RangeViolation on Released_Year
- DataTypeViolation:
    Columns:
      - Gross
    Params:
      severity: 0.05
      sampling: CAR
      strategy: strings_in_numeric
- RangeViolation:
    Columns:
      - Released_Year
    Params:
      severity: 0.02
      sampling: CAR
      strategy: above_max
      max_value: 2025
