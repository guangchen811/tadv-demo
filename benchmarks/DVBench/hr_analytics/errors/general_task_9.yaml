- MaskValues:
    Columns:
      - EmployeeNumber
      - JobSatisfaction
      - MonthlyIncome
      - Age
    Params:
      severity: 0.3
- Scaling:
    Columns:
      - MonthlyIncome
      - Age
    Params:
      severity: 0.1
      sampling: CAR
- StringNoise:
    Columns:
      - MaritalStatus
    Params:
