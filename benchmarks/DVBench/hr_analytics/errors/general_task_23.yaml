# Target: Combined - MaskValues on satisfaction columns + OutlierInjection on DistanceFromHome
- MaskValues:
    Columns:
      - JobSatisfaction
      - WorkLifeBalance
    Params:
      severity: 0.05
      sampling: CAR
- OutlierInjection:
    Columns:
      - DistanceFromHome
    Params:
      severity: 0.05
      sampling: CAR
      strategy: iqr_based
      factor: 4.0
