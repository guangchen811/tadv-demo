- CrossColumnInconsistency:
    Columns:
      - YearsAtCompany
      - TotalWorkingYears
    Params:
      severity: 0.05
      sampling: CAR
      column_pairs:
        - [YearsAtCompany, TotalWorkingYears, less_equal] # YearsAtCompany <= TotalWorkingYears is valid, so we violate it

- RangeViolation:
    Columns:
      - YearsSinceLastPromotion
    Params:
      severity: 0.03
      sampling: CAR
      strategy: below_min
      min_value: 0
